</span><span data-dcnode-id="766"><h5 class="name" data-dcnode-id="767" style="font-size: 0.83em;"><span data-dcnode-id="768" instrument_node="">Asked by: Larbi Rivkin</span></h5></span><span data-dcnode-id="765" instrument_node="">
</span><span data-dcnode-id="761" style="margin-inline-start: 0.6em;"><span data-dcnode-id="764" instrument_node="">asked in category: General </span><small data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Last Updated: 13th February, 2020</span></small></span><span data-dcnode-id="760" instrument_node="">
</span><h1 data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">What is the main theme of the entire Bible?</span></h1><span data-dcnode-id="757" instrument_node="">
</span></div><span data-dcnode-id="755" instrument_node="">
</span><div class="answer" data-dcnode-id="688" style="font-size:16px;"><span data-dcnode-id="754" instrument_node="">
</span><div data-dcnode-id="744"><span data-dcnode-id="745"><span data-dcnode-id="746"><span data-dcnode-id="753" instrument_node="">The </span><b data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">theme</span></b><span data-dcnode-id="750" instrument_node=""> of the </span><b data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Bible</span></b><span data-dcnode-id="747" instrument_node=""> is the sanctification of GOD'S NAME JEHOVAH and the vindication of his universal sovereignty through Christ's messianic Kingdom. Matthew 6:9,10: “You must pray then this way: Our Father in the heavens, let your name be sanctified.</span></span></span></div><br data-dcnode-id="743"><p data-dcnode-id="736"><a class="lc" data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//askinglot.com/open-detail/273579" rel="nofollow" target="_blank"><span data-dcnode-id="742" instrument_node="">Click to see full answer</span></a><span data-dcnode-id="740" instrument_node="">. </span><br data-dcnode-id="739"><br data-dcnode-id="738"><span data-dcnode-id="737" instrument_node=""> Thereof,  what is the central message of the Bible?</span></p><p data-dcnode-id="729"><span data-dcnode-id="730"><span data-dcnode-id="731"><span data-dcnode-id="735" instrument_node="">The core </span><b data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">message of the Bible</span></b><span data-dcnode-id="732" instrument_node=""> has two components. First, to make the whole earth and extension of heaven. Second, to achieve that objective through human beings who would progressively mature into GOD's full nature. GOD would rule all creation with these mature sons (both men and women).</span></span></span></p><p data-dcnode-id="712"><span data-dcnode-id="728" instrument_node="">Secondly,  what is the central theme of the Bible according to Geisler? </span><span data-dcnode-id="713"><span data-dcnode-id="714"><span data-dcnode-id="727" instrument_node="">Believing the fundamental Christian claim that the purpose of the </span><b data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Bible</span></b><span data-dcnode-id="724" instrument_node=""> is to present the Savior, </span><b data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Geisler</span></b><span data-dcnode-id="721" instrument_node=""> focuses on Christ as the unity and unfolding message of the whole of Scripture. Christ is the tie between the Testaments, the content of the canon, and the unifying </span><b data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">theme</span></b><span data-dcnode-id="718" instrument_node=""> within each book of the </span><b data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Bible</span></b><span data-dcnode-id="715" instrument_node="">.</span></span></span></p><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node=""> Accordingly,  what are the major themes in the book of Genesis?</span></p><p data-dcnode-id="699"><span data-dcnode-id="709" instrument_node=""> </span><span data-dcnode-id="700"><span data-dcnode-id="701"><span data-dcnode-id="708" instrument_node="">The </span><b data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">major themes</span></b><span data-dcnode-id="705" instrument_node=""> of the </span><b data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">book of Genesis</span></b><span data-dcnode-id="702" instrument_node=""> are all about what its name implies; beginnings. The beginning of the universe and life on earth are the primary subjects. It also accounts for the beginnings of sin, the fallen state of the world, the need for a redeemer, and the promise of His coming (Gen. 3:15).</span></span></span></p><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">What is the main message of the New Testament?</span></p><p data-dcnode-id="690"><span data-dcnode-id="691"><span data-dcnode-id="692"><span data-dcnode-id="696" instrument_node="">The </span><b data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">main theme of the New Testament</span></b><span data-dcnode-id="693" instrument_node=""> is that man can become a child of God. Jesus Christ came to reconciled and restore man to the image and likeness of God through his atoning work on the cross.</span></span></span></p><span data-dcnode-id="689" instrument_node="">
</span></div><span data-dcnode-id="687" instrument_node="">
</span></div><span data-dcnode-id="685" instrument_node="">

</span><h3 class="other_questions" data-dcnode-id="662"><span data-dcnode-id="666" instrument_node="">
</span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//askinglot.com/goto/273579A4" rel="nofollow" target="_blank"><span data-dcnode-id="665" instrument_node="">What is the Bible's purpose?</span></a><span data-dcnode-id="663" instrument_node="">
</span></h3><span data-dcnode-id="661" instrument_node="">
</span><div class="related-answer" data-dcnode-id="659" style="font-size:14px;"><span data-dcnode-id="660" instrument_node="">
								The Bible's purpose is twofold. The first is to show us all have broken God's Law. James 2:10 declares, "For whoever keeps the whole law but fails in one point has become accountable for all of it" (ESV). God's Law reveals how all people have sinned against God and are deserving of the fullness of His judgment. 
							</span></div><span data-dcnode-id="658" instrument_node="">

</span><div class="content_inner" data-dcnode-id="639"><span data-dcnode-id="649" instrument_node="">
</span><h3 class="other_questions" data-dcnode-id="644"><span data-dcnode-id="648" instrument_node="">
</span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//askinglot.com/goto/273579A5" rel="nofollow" target="_blank"><span data-dcnode-id="647" instrument_node="">What are biblical themes?</span></a><span data-dcnode-id="645" instrument_node="">
</span></h3><span data-dcnode-id="643" instrument_node="">
</span><div class="related-answer" data-dcnode-id="641" style="font-size:14px;"><span data-dcnode-id="642" instrument_node="">
								The great biblical themes are about God, his revealed works of creation, provision, judgment, deliverance, his covenant, and his promises. The Bible sees what happens to mankind in the light of God's nature, righteousness, faithfulness, mercy, and love. 
							</span></div><span data-dcnode-id="640" instrument_node="">
