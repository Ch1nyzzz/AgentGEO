</span><div class="article-content retro-folders" data-dcnode-id="1014" id="main-article"><span data-dcnode-id="2879" instrument_node="">
</span><p data-dcnode-id="2878"></p><div class="quoteright" data-dcnode-id="2875" style="width:349px;"><div class="lazy_load_img_box" data-dcnode-id="2876" style="padding-top:140.11%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/meltybposter_9743.jpg" border="0" class="embeddedimage" data-dcnode-id="2877" height="489" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/meltybposter_9743.jpg&amp;raw" width="349"></div></div><span data-dcnode-id="2874" instrument_node="">Spin-off </span><a class="twikilink" data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FightingGame" title="/pmwiki/pmwiki.php/Main/FightingGame"><span data-dcnode-id="2873" instrument_node="">Fighting Game</span></a><span data-dcnode-id="2871" instrument_node=""> based on </span><a class="twikilink" data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Nasuverse" title="/pmwiki/pmwiki.php/Franchise/Nasuverse"><span data-dcnode-id="2870" instrument_node="">TYPE-MOON</span></a><span data-dcnode-id="2868" instrument_node="">'s famous visual novel, </span><em data-dcnode-id="2865"><a class="twikilink" data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Tsukihime" title="/pmwiki/pmwiki.php/VisualNovel/Tsukihime"><span data-dcnode-id="2867" instrument_node="">Tsukihime</span></a></em><span data-dcnode-id="2864" instrument_node="">. As a direct sequel to </span><em data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">Tsukihime</span></em><span data-dcnode-id="2861" instrument_node=""> and </span><em data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">Kagetsu Tohya</span></em><span data-dcnode-id="2858" instrument_node="">, it is rather story-heavy, expanding the </span><a class="twikilink" data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Canon" title="/pmwiki/pmwiki.php/Main/Canon"><span data-dcnode-id="2857" instrument_node="">canon</span></a><span data-dcnode-id="2855" instrument_node=""> considerably; a surprisingly large amount of content can be taken as correct interpretations of various characters' skills and abilities.</span><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2849"><span class="ad-caption" data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2850" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">First co-developed by Watanabe Production (now French-Bread) and TYPE-MOON and released for the PC, the game has gone through several iterations:</span></p><ul data-dcnode-id="2731"><li data-dcnode-id="2842"><span data-dcnode-id="2846" instrument_node=""> </span><em data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">Melty Blood</span></em><span data-dcnode-id="2843" instrument_node="">: The original, with the first storyline (Story Mode). Six playable characters with eight unlockable. Released in 2002.</span></li><li data-dcnode-id="2837"><span data-dcnode-id="2841" instrument_node=""> </span><em data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Re-ACT</span></em><span data-dcnode-id="2838" instrument_node="">: Introduced Arcade Mode (unique string of matches for each character, and second storyline), new move sets for doppelganger characters, and two new playable characters (Len, Satsuki). Released in 2004. "Story Mode" tells a branching story of how the initial Tatari as Wallachia was beaten, and is not included in later iterations.</span></li><li data-dcnode-id="2832"><span data-dcnode-id="2836" instrument_node=""> </span><em data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Re-ACT Final Tuned</span></em><span data-dcnode-id="2833" instrument_node="">: Patch that upgraded the game to resemble its console port. Introduced a new, analog-friendly control scheme, multi-button commands, interface adjustments, and changeable color schemes. Released in 2005.</span></li><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2826"><span class="ad-caption" data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2827" id="proper-ad-tvtropes_mobile_ad_2"></div></div><li data-dcnode-id="2821"><span data-dcnode-id="2825" instrument_node=""> </span><em data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">Act Cadenza</span></em><span data-dcnode-id="2822" instrument_node="">: Arcade (then later console) port that, as a result of its focus on the fighting aspect, took out Story Mode (the first storyline). Introduced two new playable characters (Aoko Aozaki, Kouma Kishima) and upgraded sprites. Released in 2006.</span></li><li data-dcnode-id="2813"><span data-dcnode-id="2820" instrument_node=""> </span><em data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">Act Cadenza Version B</span></em><span data-dcnode-id="2817" instrument_node="">: Update (later PC port) that tweaked the controls to be a bit more context-sensitive. Introduced Tag-Team Mode, Four-Player Mode, the training dummy, </span><a class="twikilink" data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PromotedToPlayable" title="/pmwiki/pmwiki.php/Main/PromotedToPlayable"><span data-dcnode-id="2816" instrument_node="">White Len as a playable character,</span></a><span data-dcnode-id="2814" instrument_node=""> stat changes for many characters, and a hidden storyline for Neko-Arc Chaos that introduced a new hidden boss, known as Neko-Chaos Black G666, that when beaten unlocks a new mode. Released in 2007.</span></li><li data-dcnode-id="2805"><span data-dcnode-id="2812" instrument_node=""> </span><em data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Actress Again</span></em><span data-dcnode-id="2809" instrument_node="">: Added new fighting styles (Crescent/Half/Full Moon) and moves, new Guard Meter, and two new playable characters (Roa and Riesbyfe). The console version gets 3 more characters: </span><a class="twikilink" data-dcnode-id="2807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners" title="/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners"><span data-dcnode-id="2808" instrument_node="">Shiki Ryougi</span></a><span data-dcnode-id="2806" instrument_node="">, Akiha in her Seifuku outfit, and "Archetype:Earth", a fully-powered, fully awoken Arcueid.</span></li><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2799"><span class="ad-caption" data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2800" id="proper-ad-tvtropes_mobile_ad_3"></div></div><li data-dcnode-id="2768"><span data-dcnode-id="2798" instrument_node=""> </span><em data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">Actress Again Current Code</span></em><span data-dcnode-id="2795" instrument_node="">: Essentially the PlayStation 2 version of </span><em data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">Actress Again</span></em><span data-dcnode-id="2792" instrument_node=""> brought back to the arcade with some slight tweaking. Among the differences: different hardware (Sega RingWide instead of NAOMI), HQ2X Filtering on sprites, and some new visual effects, but nothing else major. It was later updated to Ver. 1.05 which adds one more playable character in the form of </span><a class="twikilink" data-dcnode-id="2790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmallGirlBigGun" title="/pmwiki/pmwiki.php/Main/SmallGirlBigGun"><span data-dcnode-id="2791" instrument_node="">Powerd Ciel</span></a><span data-dcnode-id="2789" instrument_node=""> (yes, it's spelled that way, and the official term is Executioner Ciel). A final update has been released which includes a </span><a class="twikilink" data-dcnode-id="2787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PromotedToPlayable" title="/pmwiki/pmwiki.php/Main/PromotedToPlayable"><span data-dcnode-id="2788" instrument_node="">fully playable,</span></a><span data-dcnode-id="2786" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Nerf" title="/pmwiki/pmwiki.php/Main/Nerf"><span data-dcnode-id="2785" instrument_node="">non-broken version</span></a><span data-dcnode-id="2783" instrument_node=""> of Archetype:Earth. It was later ported to PC in at the end of 2011, based on the latest arcade revision (Ver. 1.07). A </span><a class="urllink" data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//shoryuken.com/index.php%3Fp%3D7877"><span data-dcnode-id="2782" instrument_node="">demo</span><img data-dcnode-id="2781" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2779" instrument_node=""> for the PC version is available. The game was </span><a class="urllink" data-dcnode-id="2776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//arcsystemworksu.com/arc-system-works-releasing-5-titles-on-steam-by-summer-2016/"><span data-dcnode-id="2778" instrument_node="">published by</span><img data-dcnode-id="2777" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2775" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/ArcSystemWorks" title="/pmwiki/pmwiki.php/Creator/ArcSystemWorks"><span data-dcnode-id="2774" instrument_node="">Arc System Works</span></a><span data-dcnode-id="2772" instrument_node=""> for worldwide release through </span><a class="twikilink" data-dcnode-id="2770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Steam" title="/pmwiki/pmwiki.php/UsefulNotes/Steam"><span data-dcnode-id="2771" instrument_node="">Steam</span></a><span data-dcnode-id="2769" instrument_node=""> on April 19, 2016.</span></li><li data-dcnode-id="2732"><span data-dcnode-id="2767" instrument_node=""> </span><em data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">Type Lumina</span></em><span data-dcnode-id="2764" instrument_node="">: Set in a </span><a class="twikilink" data-dcnode-id="2762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatIf" title="/pmwiki/pmwiki.php/Main/WhatIf"><span data-dcnode-id="2763" instrument_node="">What If?</span></a><span data-dcnode-id="2761" instrument_node=""> of the </span><em data-dcnode-id="2758"><a class="twikilink" data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Tsukihime" title="/pmwiki/pmwiki.php/VisualNovel/Tsukihime"><span data-dcnode-id="2760" instrument_node="">Tsukihime</span></a></em><span data-dcnode-id="2757" instrument_node=""> remake, </span><em data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Type Lumina</span></em><span data-dcnode-id="2754" instrument_node=""> is a </span><a class="twikilink" data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityReboot" title="/pmwiki/pmwiki.php/Main/ContinuityReboot"><span data-dcnode-id="2753" instrument_node="">Continuity Reboot</span></a><span data-dcnode-id="2751" instrument_node=""> of the series, shrinking the roster to thirteen and featuring new characters Noel and Vlov who made their debut in the remake. </span><a class="twikilink" data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/FateStayNight" title="/pmwiki/pmwiki.php/VisualNovel/FateStayNight"><span data-dcnode-id="2750" instrument_node="">Saber</span></a><span data-dcnode-id="2748" instrument_node=""> also appears as a </span><a class="twikilink" data-dcnode-id="2746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuestFighter" title="/pmwiki/pmwiki.php/Main/GuestFighter"><span data-dcnode-id="2747" instrument_node="">Guest Fighter</span></a><span data-dcnode-id="2745" instrument_node="">. It was released internationally on September 30, 2021, a month after the remake's release. It is available for </span><a class="twikilink" data-dcnode-id="2743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/NintendoSwitch" title="/pmwiki/pmwiki.php/UsefulNotes/NintendoSwitch"><span data-dcnode-id="2744" instrument_node="">Nintendo Switch</span></a><span data-dcnode-id="2742" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Playstation4" title="/pmwiki/pmwiki.php/UsefulNotes/Playstation4"><span data-dcnode-id="2741" instrument_node="">Playstation 4</span></a><span data-dcnode-id="2739" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/XboxOne" title="/pmwiki/pmwiki.php/UsefulNotes/XboxOne"><span data-dcnode-id="2738" instrument_node="">Xbox One</span></a><span data-dcnode-id="2736" instrument_node="">, and PC via </span><a class="twikilink" data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Steam" title="/pmwiki/pmwiki.php/UsefulNotes/Steam"><span data-dcnode-id="2735" instrument_node="">Steam</span></a><span data-dcnode-id="2733" instrument_node="">.</span></li></ul><p data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">What sets it apart is the atmosphere and the characters, who have powers rarely seen in fighting games in general.</span></p><ul data-dcnode-id="2713"><li data-dcnode-id="2724"><span data-dcnode-id="2728" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LifeMeter" title="/pmwiki/pmwiki.php/Main/LifeMeter"><span data-dcnode-id="2727" instrument_node="">Life Meter</span></a><span data-dcnode-id="2725" instrument_node="">: one for health (Physical Strength, yellow) and another (Vital Source, Red) for actual health-recovery limit.</span></li><li data-dcnode-id="2719"><span data-dcnode-id="2723" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManaMeter" title="/pmwiki/pmwiki.php/Main/ManaMeter"><span data-dcnode-id="2722" instrument_node="">Mana Meter</span></a><span data-dcnode-id="2720" instrument_node="">: Magic Circuits, 0 to 300%, or 200% if playing Actress Again and using the Half-Moon Style. Used for special shielding, EX Specials, Shield bunkering, and combos. Can also recover health (up to the limit mentioned above).</span></li><li data-dcnode-id="2714"><span data-dcnode-id="2718" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChargeMeter" title="/pmwiki/pmwiki.php/Main/ChargeMeter"><span data-dcnode-id="2717" instrument_node="">Charge Meter</span></a><span data-dcnode-id="2715" instrument_node="">: certain attacks and some specials can be charged. In the game terminology these are called "Blowback Edges" but are usually simply referred to as charged attacks.</span></li></ul><p data-dcnode-id="2705"><span data-dcnode-id="2712" instrument_node="">It has incorporated many features from other fighting games; clashing (two attacks hit and cancel each other), cancelling (cancel one move into another), shielding and EX-Shielding (the latter allows for a riposte at cost of the Magic Circuit). Regular combos can be powered up by using the Magic Circuit. </span><a class="twikilink" data-dcnode-id="2710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LimitBreak" title="/pmwiki/pmwiki.php/Main/LimitBreak"><span data-dcnode-id="2711" instrument_node="">Specials made during Heat or Blood Heat</span></a><span data-dcnode-id="2709" instrument_node=""> Mode (when Magic Circuit is high) are called Arc Drives. Counters made during Blood Heat are called Last Arcs that </span><a class="twikilink" data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RuleOfCool" title="/pmwiki/pmwiki.php/Main/RuleOfCool"><span data-dcnode-id="2708" instrument_node="">look very cool</span></a><span data-dcnode-id="2706" instrument_node=""> and deal a ton of damage with some causing Circuit Break to the opponent (self-explanatory).</span></p><p data-dcnode-id="2697"><span data-dcnode-id="2704" instrument_node="">Where </span><em data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">Melty Blood</span></em><span data-dcnode-id="2701" instrument_node=""> really begins to stand out are in the ways it plays with fighting game conventions. For starters, each special move a character has carries a super variant activated by doing the input and pressing the heavy attack button. This gives characters an unusually high amount of super moves for a fighting game, especially when one factors in the game's high meter gain. Upon reaching full meter, the player automatically enters into Heat Mode, which slowly drains meter and gives access to techniques like bursting and the aforementioned Arc Drives. This threat of all your meter being drained unless you efficiently use it coupled with easy to access and plentiful supers creates a game where resources are constantly being spent and insanely cool moves are being tossed out all the time. Later iterations would add further character diversity with the introduction of Moons, unique movesets for each character that can drastically change how each character plays to the point where official tier lists place the same character at multiple tiers depending on which Moon they have equipped. The combo oriented Crescent Moon, the powerful resource-spending Full Moon and the balanced Half Moon provide unique opportunities to play the same character and effectively triple the size of the cast. Lastly, </span><em data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">Melty Blood</span></em><span data-dcnode-id="2698" instrument_node=""> is unique in that its air mobility for the cast is universal. Every character gets a double jump and an air dash whenever they enter into the air, meaning it can be difficult to pin people down as they zip about the stage. All of this combines to form a fighter that thrives on Rule of Cool while still providing a deep and enthralling experience.</span></p><p data-dcnode-id="2687"><span data-dcnode-id="2696" instrument_node="">Gameplay footage can be seen here </span><a class="urllink" data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D5ip3QBqQ5UQ"><span data-dcnode-id="2695" instrument_node="">here</span><img data-dcnode-id="2694" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2692" instrument_node="">. The game made its American professional tournament debut at Evolution 2010. A tournament-centric fansite exists for Western fans in the form of </span><a class="urllink" data-dcnode-id="2689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.meltybread.com/"><span data-dcnode-id="2691" instrument_node="">Melty Bread</span><img data-dcnode-id="2690" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2688" instrument_node="">.</span></p><p data-dcnode-id="2672"><span data-dcnode-id="2686" instrument_node="">Received a </span><a class="twikilink" data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpiritualSuccessor" title="/pmwiki/pmwiki.php/Main/SpiritualSuccessor"><span data-dcnode-id="2685" instrument_node="">Spiritual Successor</span></a><span data-dcnode-id="2683" instrument_node=""> in 2012 called </span><em data-dcnode-id="2680"><a class="twikilink" data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/UnderNightInBirth" title="/pmwiki/pmwiki.php/VideoGame/UnderNightInBirth"><span data-dcnode-id="2682" instrument_node=""> Under Night In-Birth</span></a></em><span data-dcnode-id="2679" instrument_node="">, where Sion appears as a </span><a class="twikilink" data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuestFighter" title="/pmwiki/pmwiki.php/Main/GuestFighter"><span data-dcnode-id="2678" instrument_node="">Guest Fighter</span></a><span data-dcnode-id="2676" instrument_node=""> (under the re-tweaked name of Sion </span><em data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Eltnum</span></em><span data-dcnode-id="2673" instrument_node=""> Atlasia).</span></p><p data-dcnode-id="2667"><span data-dcnode-id="2671" instrument_node="">For blood that actually melts things, see </span><a class="twikilink" data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BloodyMurder" title="/pmwiki/pmwiki.php/Main/BloodyMurder"><span data-dcnode-id="2670" instrument_node="">Bloody Murder</span></a><span data-dcnode-id="2668" instrument_node="">.</span></p><p data-dcnode-id="2666"></p><hr data-dcnode-id="2665"><p data-dcnode-id="2664"></p><h2 data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Provides Examples Of:</span></h2><ul data-dcnode-id="2406"><li data-dcnode-id="2648"><span data-dcnode-id="2661" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptedOut" title="/pmwiki/pmwiki.php/Main/AdaptedOut"><span data-dcnode-id="2660" instrument_node="">Adapted Out</span></a><span data-dcnode-id="2658" instrument_node="">: Due to </span><em data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Type Lumina</span></em><span data-dcnode-id="2655" instrument_node=""> being set over a week before the remake, unlike the original where it served as a sequel to </span><em data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">Tsukihime</span></em><span data-dcnode-id="2652" instrument_node="">, TATARI and Sion have been explicitly stated to not be part of the new plot written for </span><em data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Lumina</span></em><span data-dcnode-id="2649" instrument_node="">.</span></li><li data-dcnode-id="2631"><span data-dcnode-id="2647" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlasPoorVillain" title="/pmwiki/pmwiki.php/Main/AlasPoorVillain"><span data-dcnode-id="2646" instrument_node="">Alas, Poor Villain</span></a><span data-dcnode-id="2644" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2636" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2643" instrument_node=""> Zepia laments his failure to prevent </span><a class="twikilink" data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EndOfTheWorldAsWeKnowIt" title="/pmwiki/pmwiki.php/Main/EndOfTheWorldAsWeKnowIt"><span data-dcnode-id="2642" instrument_node="">Program No. Six</span></a><span data-dcnode-id="2640" instrument_node=""> in his </span><a class="twikilink" data-dcnode-id="2638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalSpeech" title="/pmwiki/pmwiki.php/Main/FinalSpeech"><span data-dcnode-id="2639" instrument_node="">Final Speech</span></a><span data-dcnode-id="2637" instrument_node=""> to Sion, but his last words in the manga adaption is a more fitting example:</span></span><div class="indent" data-dcnode-id="2632"><span data-dcnode-id="2635" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2633" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2634" instrument_node=""> "I just wanted a future that could not be foretold..."</span></span></div></li><li data-dcnode-id="2621"><span data-dcnode-id="2630" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllJustADream" title="/pmwiki/pmwiki.php/Main/AllJustADream"><span data-dcnode-id="2629" instrument_node="">All Just a Dream</span></a><span data-dcnode-id="2627" instrument_node="">:</span><ul data-dcnode-id="2622"><li data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node=""> Hisui's route in Act Cadenza.</span></li><li data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node=""> Ryougi believes that her route is this.</span></li></ul></li><li data-dcnode-id="2613"><span data-dcnode-id="2620" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllThereInTheManual" title="/pmwiki/pmwiki.php/Main/AllThereInTheManual"><span data-dcnode-id="2619" instrument_node="">All There in the Manual</span></a><span data-dcnode-id="2617" instrument_node="">: Every game assumes you have played the original visual novels as well as any previous iterations.</span><ul data-dcnode-id="2614"><li data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node=""> This kind of gets thrown away as of Act Cadenza though, whose Arcade mode stories don't tie in to the original visual novels the way it did in the original Melty Blood or Re-ACT.</span></li></ul></li><li data-dcnode-id="2591"><span data-dcnode-id="2612" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnimationBump" title="/pmwiki/pmwiki.php/Main/AnimationBump"><span data-dcnode-id="2611" instrument_node="">Animation Bump</span></a><span data-dcnode-id="2609" instrument_node="">: Compared to her appearance in </span><em data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Re-Act</span></em><span data-dcnode-id="2606" instrument_node="">, </span><span class="spoiler" data-dcnode-id="2592" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2605" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AttackOfTheFiftyFootWhatever" title="/pmwiki/pmwiki.php/Main/AttackOfTheFiftyFootWhatever"><span data-dcnode-id="2604" instrument_node="">G-Akiha</span></a><span data-dcnode-id="2602" instrument_node=""> recieved </span><em data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">quite</span></em><span data-dcnode-id="2599" instrument_node=""> the improvement when it came to her animation in </span><em data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">Actress Again</span></em><span data-dcnode-id="2596" instrument_node="">'s </span><a class="twikilink" data-dcnode-id="2594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossRush" title="/pmwiki/pmwiki.php/Main/BossRush"><span data-dcnode-id="2595" instrument_node="">Boss Rush</span></a><span data-dcnode-id="2593" instrument_node="">, going from a static sprite with only one visible arm to a fluidly-animated monster of a boss character.</span></span></li><li data-dcnode-id="2583"><span data-dcnode-id="2590" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiFrustrationFeature" title="/pmwiki/pmwiki.php/Main/AntiFrustrationFeature"><span data-dcnode-id="2589" instrument_node="">Anti-Frustration Feature</span></a><span data-dcnode-id="2587" instrument_node="">: Inputting throws (grab) command on the ground in </span><em data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">Type Lumina</span></em><span data-dcnode-id="2584" instrument_node=""> will have your character run forward a short distance before grabbing the opponent if they are within throw range instead of grabbing on the spot (and possibly whiffing due to throw's traditional short range nature in fighting games, which often bugs newbies to no end) Note that this does not effect the defending side at all; the running phase have limited range, and throws can still be avoided or broken out in the same manner as before.</span></li><li data-dcnode-id="2570"><span data-dcnode-id="2582" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiVillain" title="/pmwiki/pmwiki.php/Main/AntiVillain"><span data-dcnode-id="2581" instrument_node="">Anti-Villain</span></a><span data-dcnode-id="2579" instrument_node="">: Even though he is an </span><a class="twikilink" data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AxCrazy" title="/pmwiki/pmwiki.php/Main/AxCrazy"><span data-dcnode-id="2578" instrument_node="">Ax-Crazy</span></a><span data-dcnode-id="2576" instrument_node=""> vampire, Walachia's ultimate goal was to </span><span class="spoiler" data-dcnode-id="2571" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2575" instrument_node=""> somehow prevent </span><a class="twikilink" data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt" title="/pmwi ir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="2430" instrument_node="">Final Boss</span></a><span data-dcnode-id="2428" instrument_node=""> fight against the terrifying </span><a class="twikilink" data-dcnode-id="2426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AttackOfTheFiftyFootWhatever" title="/pmwiki/pmwiki.php/Main/AttackOfTheFiftyFootWhatever"><span data-dcnode-id="2427" instrument_node="">G-Akiha</span></a><span data-dcnode-id="2425" instrument_node="">, now with a </span><em data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">considerable</span></em><span data-dcnode-id="2422" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnimationBump" title="/pmwiki/pmwiki.php/Main/AnimationBump"><span data-dcnode-id="2421" instrument_node="">Animation Bump</span></a><span data-dcnode-id="2419" instrument_node="">.</span></span></li><li data-dcnode-id="2412"><span data-dcnode-id="2416" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Bowdlerise" title="/pmwiki/pmwiki.php/Main/Bowdlerise"><span data-dcnode-id="2415" instrument_node="">Bowdlerise</span></a><span data-dcnode-id="2413" instrument_node="">: Later installments for the series dropped the blood splash effect some attacks inflicted on the opponents, such as Shiki Tohno and Shiki Nanaya's Arc Drives, and specific attacks from other characters as well.</span></li><li data-dcnode-id="2407"><span data-dcnode-id="2411" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes. ebcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners" title="/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners"><span data-dcnode-id="2389" instrument_node="">Shiki Ryogi</span></a><span data-dcnode-id="2387" instrument_node=""> is in Actress Again, despite </span><img class="trivia1 rounded" data-dcnode-id="2386" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-trivia.png&amp;raw" title="This example contains a TRIVIA entry. It should be moved to the TRIVIA tab."><a class="twikilink" data-dcnode-id="2384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordOfGod" title="/pmwiki/pmwiki.php/Main/WordOfGod"><span data-dcnode-id="2385" instrument_node="">Word of God</span></a><span data-dcnode-id="2383" instrument_node=""> saying they were in separate continuities. But then, </span><a class="twikilink" data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Nasuverse" title="/pmwiki/pmwiki.php/Franchise/Nasuverse"><span data-dcnode-id="2382" instrument_node="">Nasuverse</span></a><span data-dcnode-id="2380" instrument_node=""> continuity is a funny thing. In her route, Ryougi says that the events of her route must be </span><a class="twikilink" data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllJustADream" title="/pmwiki/pmwiki.php/Main/AllJustADream"><span data-dcnode-id="2379" instrument_node="">All Just a Dream</span></a><span data-dcnode-id="2377" instrument_node="">.</span></li><li data-dcnode-id="2371"><span data-dcnode-id="2375" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Catgirl" title="/pmwiki/pmwiki.php/Main/Catgirl"><span data-dcnode-id="2374" instrument_node="">Catgirl</span></a><span data-dcnode-id="2372" instrument_node="">: Len. Made from the corpse of a kitten and the soul of a dead little girl, she ended up equally cat and girl. Also, White Len, who mirrors Len's existence.</span></li><li data-dcnode-id="2362"><span data-dcnode-id="2370" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CatchPhrase" title="/pmwiki/pmwiki.php/Main/CatchPhrase"><span data-dcnode-id="2369" instrument_node="">Catchphrase</span></a><span data-dcnode-id="2367" instrument_node="">: Before, during, and after matches, characters will recite both original lines and those from previous games (the top of the </span><em data-dcnode-id="2364"><a class="twikilink" data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Tsukihime" title="/pmwiki/pmwiki.php/VisualNovel/Tsukihime"><span data-dcnode-id="2366" instrument_node="">Tsukihime</span></a></em><span data-dcnode-id="2363" instrument_node=""> entry has one).</span></li><li data-dcnode-id="2347"><span data-dcnode-id="2361" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChickMagnet" title="/pmwiki/pmwiki.php/Main/ChickMagnet"><span data-dcnode-id="2360" instrument_node="">Chick Magnet</span></a><span data-dcnode-id="2358" instrument_node="">: The Tohno Gland: works on </span><a class="twikilink" data-dcnode-id="2356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheUnwantedHarem" title="/pmwiki/pmwiki.php/Main/TheUnwantedHarem"><span data-dcnode-id="2357" instrument_node="">every single potential female protagonist, ever</span></a><span data-dcnode-id="2355" instrument_node="">. Except, apparently, Ryougi, who isn't impressed.</span><div class="indent" data-dcnode-id="2348"><span data-dcnode-id="2354" instrument_node=""> </span><strong data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">Shiki Ryougi</span></strong><span data-dcnode-id="2351" instrument_node="">: You're ten years too early to talk about how to kill something... rather, three years too late? I'm your senior when it comes to these eyes, lady-killer. </span><em data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">(victory quote over Shiki Tohno)</span></em></div></li><li data-dcnode-id="2342"><span data-dcnode-id="2346" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChineseGirl" title="/pmwiki/pmwiki.php/Main/ChineseGirl"><span data-dcnode-id="2345" instrument_node="">Chinese Girl</span></a><span data-dcnode-id="2343" instrument_node="">: Miyako, whose kung fu gets an insane boost because of Wallachia.</span></li><li data-dcnode-id="2334"><span data-dcnode-id="2341" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CombinationAttack" title="/pmwiki/pmwiki.php/Main/CombinationAttack"><span data-dcnode-id="2340" instrument_node="">Combination Attack</span></a><span data-dcnode-id="2338" instrument_node="">: Hisui and Kohaku (when used together), Sion's Last Arc (with the "ghost" of another character), Wallachia's Arc Drive (with doppelgangers of various characters appearing for just an instant to hit the opponent).</span><ul data-dcnode-id="2335"><li data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node=""> Actress Again adds teams of Kohaku &amp; Mech-Hisui and Mech-Hisui and Neco-Arc.</span></li></ul></li></ul><ul data-dcnode-id="2188"><li data-dcnode-id="2307"><span data-dcnode-id="2331" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ComicBookAdaptation" title="/pmwiki/pmwiki.php/Main/ComicBookAdaptation"><span data-dcnode-id="2330" instrument_node="">Comic-Book Adaptation</span></a><span data-dcnode-id="2328" instrument_node="">: A manga is being written based off this game. Unlike the </span><em data-dcnode-id="2325"><a class="twikilink" data-dcnode-id="2326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Tsukihime" title="/pmwiki/pmwiki.php/VisualNovel/Tsukihime"><span data-dcnode-id="2327" instrument_node="">Tsukihime</span></a></em><span data-dcnode-id="2324" instrument_node=""> anime adaptation, this is more of </span><a class="twikilink" data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationDistillation" title="/pmwiki/pmwiki.php/Main/AdaptationDistillation"><span data-dcnode-id="2323" instrument_node="">Adaptation Distillation</span></a><span data-dcnode-id="2321" instrument_node="">. It condenses the plot and characters together in an excellent way. Also replaces the fight against Nero/Nrvnqsr that happened in the original game as a sign that Tatari is gaining power with with an </span><em data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">excellent</span></em><span data-dcnode-id="2318" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2312" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2317" instrument_node=""> </span><img class="ymmv1 rounded" data-dcnode-id="2316" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="2314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TearJerker" title="/pmwiki/pmwiki.php/Main/TearJerker"><span data-dcnode-id="2315" instrument_node="">Tear Jerker</span></a><span data-dcnode-id="2313" instrument_node=""> of an arc in which Tatari takes the form of Satsuki</span></span><span data-dcnode-id="2311" instrument_node="">.</span><ul data-dcnode-id="2308"><li data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node=""> Did well enough to get a second season which is... well, you could still call it a distillation, only this time what it's distilling is all the ridiculously insane parts of the games, like Mecha-Hisui and that sort of thing. It's... interesting.</span></li></ul></li><li data-dcnode-id="2272"><span data-dcnode-id="2306" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CompanyCrossReferences" title="/pmwiki/pmwiki.php/Main/CompanyCrossReferences"><span data-dcnode-id="2305" instrument_node="">Company Cross References</span></a><span data-dcnode-id="2303" instrument_node="">:</span><ul data-dcnode-id="2273"><li data-dcnode-id="2290"><span data-dcnode-id="2302" instrument_node=""> Neko-Arc Chaos' Last Arc involves dropping a giant </span><a class="twikilink" data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/FateStayNight" title="/pmwiki/pmwiki.php/VisualNovel/FateStayNight"><span data-dcnode-id="2301" instrument_node="">Kaleidostick </span></a><span data-dcnode-id="2299" instrument_node="">(from </span><em data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">Fate/hollow ataraxia</span></em><span data-dcnode-id="2296" instrument_node="">) on the opponent. Neko-Arc's Last Arc does the same, </span><em data-dcnode-id="2291"><span data-dcnode-id="2295" instrument_node="">but with the goddamn </span><a class="twikilink" data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Nasuverse" title="/pmwiki/pmwiki.php/Franchise/Nasuverse"><span data-dcnode-id="2294" instrument_node="">Nasu</span></a><span data-dcnode-id="2292" instrument_node=""> mushroom avatar instead.</span></em></li><li data-dcnode-id="2285"><span data-dcnode-id="2289" instrument_node=""> Everyone in </span><em data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">Type Lumina</span></em><span data-dcnode-id="2286" instrument_node=""> has a Saber Alter palette available as a character color choice.</span></li><li data-dcnode-id="2274"><span data-dcnode-id="2284" instrument_node=""> In </span><em data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Type Lumina</span></em><span data-dcnode-id="2281" instrument_node=""> Aoko mentions </span><a class="twikilink" data-dcnode-id="2279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/LordElMelloiIICaseFiles" title="/pmwiki/pmwiki.php/LightNovel/LordElMelloiIICaseFiles"><span data-dcnode-id="2280" instrument_node="">El-Melloi</span></a><span data-dcnode-id="2278" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/MahoutsukaiNoYoru" title="/pmwiki/pmwiki.php/VisualNovel/MahoutsukaiNoYoru"><span data-dcnode-id="2277" instrument_node="">Touko, and Alice</span></a><span data-dcnode-id="2275" instrument_node=""> during her ending.</span></li></ul></li><li data-dcnode-id="2261"><span data-dcnode-id="2271" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityNod" title="/pmwiki/pmwiki.php/Main/ContinuityNod"><span data-dcnode-id="2270" instrument_node="">Continuity Nod</span></a><span data-dcnode-id="2268" instrument_node="">: To other Type-Moon works:</span><ul data-dcnode-id="2262"><li data-dcnode-id="2263"><span data-dcnode-id="2267" instrument_node=""> After defeating Dust of Osiris in Ryougi's route, White Len asks her if she was summoned by </span><a class="twikilink" data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/FateStayNight" title="/pmwiki/pmwiki.php/VisualNovel/FateStayNight"><span data-dcnode-id="2266" instrument_node="">the Counter Force</span></a><span data-dcnode-id="2264" instrument_node=""> to get rid of TATARI for them.</span></li></ul></li><li data-dcnode-id="2256"><span data-dcnode-id="2260" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoolAndUnusualPunishment" title="/pmwiki/pmwiki.php/Main/CoolAndUnusualPunishment"><span data-dcnode-id="2259" instrument_node="">Cool and Unusual Punishment</span></a><span data-dcnode-id="2257" instrument_node="">: In the manga, Akiha's punishment for Kohaku attempting to take over the Tohno mansion (and wiping out the Tohno family's fortune in the process of mass-producing her Mecha-Hisui army) is to invite everyone to a beach party - and Kohaku isn't allowed to change out of her heavy kimono and apron. She collapses approximately halfway through the day.</span></li><li data-dcnode-id="2240"><span data-dcnode-id="2255" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoolVersusAwesome" title="/pmwiki/pmwiki.php/Main/CoolVersusAwesome"><span data-dcnode-id="2254" instrument_node="">Cool Versus Awesome</span></a><span data-dcnode-id="2252" instrument_node="">: Ryougi's ending </span><span class="spoiler" data-dcnode-id="2250" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2251" instrument_node="">against a fully powered Archetype:Earth; a.k.a. "Princess Arcueid."</span></span><span data-dcnode-id="2249" instrument_node=""> </span><span class="notelabel" data-dcnode-id="2246" onclick="togglenote('note038ct');" style="cursor: pointer;"><sup data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2244" id="note038ct" isnote="true" onclick="togglenote('note038ct');" style="display: none; cursor: pointer;"><span data-dcnode-id="2245" instrument_node=""> Hidden because of length: "RS: ........! What is this aura!? You mean I got the wrong one!? AE: So it seems. The providence of the Air (Sky) and the providence of the Star (planet) are separate things, ours paths ones that will diverge one day and move apart. AE: And yet It cannot suffer even that? Apparently, It has deemed that if they are fated to conflict, it is all the same to conclude things here. AE: What impatience. The fault lies in that your Aspect (or maybe Phase?) is an Order that encompasses all. It is all well to have many options, but to lack uniformity is a deplorable thing is it not? RS: What the.....I can't see your death isn’t the problem, no, you have no death. RS: You're........so, you're the one. AE: Yes, you need say no more. The target the Being that summoned you to eliminate is this vessel, the manifestation of lifespan (Life) most far-reaching on this planet. AE: But even that is of little meaning, for you, you came simply to bring death to that which does not die, did you not? Your actions are ones drenched with emotion, but I will not mock that. AE: Because, I am the same. Gazing at the severed limbs scattered about there, I cannot help but make a terrible smile. Thus, I will answer your provocation. RS: Heh, so you want revenge for that weirdo huh? All of this is going to be a dream anyway and everything will be back just the way it was when we wake up, but my, aren't you the faithful one. RS: But hey, why not? You got me interested, monster, because I can understand just how you feel. AE: That is excellent. Then. Flee in terror, peon. End my smile with thy death. RS: Says you, vampire. Whatever you are, however many billions long your life is, it doesn't matter. RS: Either way, it's the end of the dream. Let's do it. I'll show you that I can kill anything alive, even god.</span></span><span data-dcnode-id="2243" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeftHanging" title="/pmwiki/pmwiki.php/Main/LeftHanging"><span data-dcnode-id="2242" instrument_node="">We don't know what happens next.</span></a></li><li data-dcnode-id="2232"><span data-dcnode-id="2239" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreepyChildrenSinging" title="/pmwiki/pmwiki.php/Main/CreepyChildrenSinging"><span data-dcnode-id="2238" instrument_node="">Creepy Children Singing</span></a><span data-dcnode-id="2236" instrument_node="">: The track "Tsukimori no Toki ni" consists of a young girl singing a song about </span><a class="twikilink" data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Yandere" title="/pmwiki/pmwiki.php/Main/Yandere"><span data-dcnode-id="2235" instrument_node="">not being beloved as she used to be and finding herself regrettably holding a blade</span></a><span data-dcnode-id="2233" instrument_node="">, but the verses are arranged as a sort of Japanese counting song using the hito-futa-mi system.</span></li><li data-dcnode-id="2215"><span data-dcnode-id="2231" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrossOver" title="/pmwiki/pmwiki.php/Main/CrossOver"><span data-dcnode-id="2230" instrument_node="">Crossover</span></a><span data-dcnode-id="2228" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners" title="/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners"><span data-dcnode-id="2227" instrument_node="">Shiki Ryogi</span></a><span data-dcnode-id="2225" instrument_node=""> in the console version of Actress Again. Taking bets on how many ports/releases it takes for </span><a class="twikilink" data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/FateStayNight" title="/pmwiki/pmwiki.php/VisualNovel/FateStayNight"><span data-dcnode-id="2224" instrument_node="">Saber</span></a><span data-dcnode-id="2222" instrument_node=""> to find her way in.</span><ul data-dcnode-id="2216"><li data-dcnode-id="2217"><span data-dcnode-id="2221" instrument_node=""> Lo and behold, Saber has been confirmed for </span><em data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Type Lumina's</span></em><span data-dcnode-id="2218" instrument_node=""> roster, so the answer is either two or three, depending on if you count baseline Actress Again or not.</span></li></ul></li><li data-dcnode-id="2210"><span data-dcnode-id="2214" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrouchingMoronHiddenBadass" title="/pmwiki/pmwiki.php/Main/CrouchingMoronHiddenBadass"><span data-dcnode-id="2213" instrument_node="">Crouching Moron, Hidden Badass</span></a><span data-dcnode-id="2211" instrument_node="">: Shiki Tohno, again. The guy really just loves living.</span></li><li data-dcnode-id="2194"><span data-dcnode-id="2209" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CursedWithAwesome" title="/pmwiki/pmwiki.php/Main/CursedWithAwesome"><span data-dcnode-id="2208" instrument_node="">Cursed with Awesome</span></a><span data-dcnode-id="2206" instrument_node="">: It's easier to list the characters who aren't.</span><ul data-dcnode-id="2195"><li data-dcnode-id="2201"><span data-dcnode-id="2205" instrument_node=""> Mystic Eyes of Death Perception: horrible headaches, shortened life, death with frequent use. Then again, you can destroy anything that exists under Gaia.</span><ul data-dcnode-id="2202"><li data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node=""> Originally for Shiki Tohno, fixed for him later on for gameplay reasons. Ryougi seems to have no problems with it...because their eyes don't have the exact same source.</span></li></ul></li><li data-dcnode-id="2196"><span data-dcnode-id="2200" instrument_node=""> Vampirism: </span><a class="twikilink" data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurSoulsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurSoulsAreDifferent"><span data-dcnode-id="2199" instrument_node="">changes your soul</span></a><span data-dcnode-id="2197" instrument_node="">, slowly kills your measly human body, undying thirst for blood. Then again, superhuman strength, perception, agility, and immortality (as long as you drink blood) are nice perks...</span></li></ul></li><li data-dcnode-id="2189"><span data-dcnode-id="2193" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadToBeginWith" title="/pmwiki/pmwiki.php/Main/DeadToBeginWith"><span data-dcnode-id="2192" instrument_node="">Dead to Begin With</span></a><span data-dcnode-id="2190" instrument_node="">: Only Satsuki, really, as the undead form of vampire. Arcueid is a True Ancestor — a form of vampire that isn't undead. Len's not so much undead as half-alive, due to her artificial creation from dead things.</span></li></ul><ul data-dcnode-id="1926"><li data-dcnode-id="2182"><span data-dcnode-id="2186" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DefeatMeansFriendship" title="/pmwiki/pmwiki.php/Main/DefeatMeansFriendship"><span data-dcnode-id="2185" instrument_node="">Defeat Means Friendship</span></a><span data-dcnode-id="2183" instrument_node="">: Sion and Shiki, Sion and Akiha (generally more so when Sion loses).</span></li><li data-dcnode-id="2158"><span data-dcnode-id="2181" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DemotedToExtra" title="/pmwiki/pmwiki.php/Main/DemotedToExtra"><span data-dcnode-id="2180" instrument_node="">Demoted to Extra</span></a><span data-dcnode-id="2178" instrument_node="">:</span><ul data-dcnode-id="2159"><li data-dcnode-id="2173"><span data-dcnode-id="2177" instrument_node=""> Satsuki wasn't even in the original game, despite the story allegedly following her non-existent route. Even when she was introduced into the games as of Re-ACT, she's still not on Shiki's romance radar. And in the Manga Adaptation, </span><span class="spoiler" data-dcnode-id="2175" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2176" instrument_node=""> it's not Sacchin at all, but just a Tatari avatar</span></span><span data-dcnode-id="2174" instrument_node="">.</span></li><li data-dcnode-id="2160"><span data-dcnode-id="2172" instrument_node=""> Despite being the villain of </span><em data-dcnode-id="2169"><a class="twikilink" data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Tsukihime" title="/pmwiki/pmwiki.php/VisualNovel/Tsukihime"><span data-dcnode-id="2171" instrument_node="">Tsukihime</span></a></em><span data-dcnode-id="2168" instrument_node="">, Roa (who amusingly is half-responsible for Satsuki's vampirism) doesn't appear until </span><em data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Actress Again</span></em><span data-dcnode-id="2165" instrument_node="">. The other guy, </span><img class="trivia1 rounded" data-dcnode-id="2164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-trivia.png&amp;raw" title="This example contains a TRIVIA entry. It should be moved to the TRIVIA tab."><a class="twikilink" data-dcnode-id="2162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NamesTheSame" title="/pmwiki/pmwiki.php/Main/NamesTheSame"><span data-dcnode-id="2163" instrument_node="">SHIKI Tohno</span></a><span data-dcnode-id="2161" instrument_node=""> hasn't appeared at all. Isn't it sad, Capslock-kun?</span></li></ul></li><li data-dcnode-id="2153"><span data-dcnode-id="2157" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Doppelganger" title="/pmwiki/pmwiki.php/Main/Doppelganger"><span data-dcnode-id="2156" instrument_node="">Doppelgänger</span></a><span data-dcnode-id="2154" instrument_node="">: Lots of 'em.</span></li><li data-dcnode-id="2100"><span data-dcnode-id="2152" instrument_node=""> </span><img class="trivia1 rounded" data-dcnode-id="2151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-trivia.png&amp;raw" title="This example contains a TRIVIA entry. It should be moved to the TRIVIA tab."><a class="twikilink" data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DevelopmentGag" title="/pmwiki/pmwiki.php/Main/DevelopmentGag"><span data-dcnode-id="2150" instrument_node="">Development Gag</span></a><span data-dcnode-id="2148" instrument_node="">: In the </span><a class="twikilink" data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossRush" title="/pmwiki/pmwiki.php/Main/BossRush"><span data-dcnode-id="2147" instrument_node="">Boss Rush</span></a><span data-dcnode-id="2145" instrument_node="">, </span><span class="spoiler" data-dcnode-id="2140" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2144" instrument_node=""> you face what is said to be the regular Akiha in her Half Moon groove as the penultimate opponent, but Shiki's dialogue with her reveals that she is, in fact, the Half Moon Akiha from </span><em data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">the original arcade version of Actress Again</span></em><span data-dcnode-id="2141" instrument_node="">, who was considered one of the most broken characters in the game at the time. Kohaku and Neco-Arc hang a gigantic lampshade over this;</span></span><div class="indent" data-dcnode-id="2120"><strong data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Kohaku:</span></strong><span data-dcnode-id="2137" instrument_node=""> </span><em data-dcnode-id="2134"><span class="spoiler" data-dcnode-id="2135" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2136" instrument_node="">As a matter of fact, that Akiha-sama there is the strongest of the strong! She's the one who rampaged all across the country back before</span></span></em><span data-dcnode-id="2133" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2131" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2132" instrument_node="">Actress Again</span></span><span data-dcnode-id="2130" instrument_node=""> </span><em data-dcnode-id="2121"><span class="spoiler" data-dcnode-id="2122" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2129" instrument_node="">updated to </span><a class="twikilink" data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpdatedRerelease" title="/pmwiki/pmwiki.php/Main/UpdatedRerelease"><span data-dcnode-id="2128" instrument_node="">Ver.A</span></a><span data-dcnode-id="2126" instrument_node="">... the H-Akiha who placed at the top of </span><a class="twikilink" data-dcnode-id="2124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterTiers" title="/pmwiki/pmwiki.php/Main/CharacterTiers"><span data-dcnode-id="2125" instrument_node="">the tier lists</span></a><span data-dcnode-id="2123" instrument_node=""> by a wide margin!</span></span></em></div><div class="indent" data-dcnode-id="2101"><strong data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Neco-Arc:</span></strong><span data-dcnode-id="2117" instrument_node=""> </span><em data-dcnode-id="2102"><span class="spoiler" data-dcnode-id="2103" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2116" instrument_node=""> Hmm... </span><a class="twikilink" data-dcnode-id="2114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameBreaker" title="/pmwiki/pmwiki.php/Main/GameBreaker"><span data-dcnode-id="2115" instrument_node="">her cheap j.C cross-up, her super high defense, and her extreme rushdown</span></a><span data-dcnode-id="2113" instrument_node="">... you could say that </span><a class="twikilink" data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ComplacentGamingSyndrome" title="/pmwiki/pmwiki.php/Main/ComplacentGamingSyndrome"><span data-dcnode-id="2112" instrument_node="">they</span></a><span data-dcnode-id="2110" instrument_node=""> were cranking out H-Akihas all over town. A true </span><a class="twikilink" data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IncrediblyLamePun" title="/pmwiki/pmwiki.php/Main/IncrediblyLamePun"><span data-dcnode-id="2109" instrument_node="">H-hell</span></a><span data-dcnode-id="2107" instrument_node="">... or maybe </span><a class="twikilink" data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/GuiltyGear" title="/pmwiki/pmwiki.php/VideoGame/GuiltyGear"><span data-dcnode-id="2106" instrument_node="">heaven</span></a><span data-dcnode-id="2104" instrument_node="">?</span></span></em></div></li><li data-dcnode-id="2092"><span data-dcnode-id="2099" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownloadableContent" title="/pmwiki/pmwiki.php/Main/DownloadableContent"><span data-dcnode-id="2098" instrument_node="">Downloadable Content</span></a><span data-dcnode-id="2096" instrument_node="">: </span><em data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Type Lumina</span></em><span data-dcnode-id="2093" instrument_node=""> is the first game in the series to feature DLC additions to its roster with Dead Apostle Noel and Aoko Aozaki being the first ones in the lineup.</span></li><li data-dcnode-id="2069"><span data-dcnode-id="2091" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EasterEgg" title="/pmwiki/pmwiki.php/Main/EasterEgg"><span data-dcnode-id="2090" instrument_node="">Easter Egg</span></a><span data-dcnode-id="2088" instrument_node="">: If you play the PC version of </span><em data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Act Cadenza</span></em><span data-dcnode-id="2085" instrument_node=""> on a specific date, the game puts itself into </span><a class="twikilink" data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HolidayMode" title="/pmwiki/pmwiki.php/Main/HolidayMode"><span data-dcnode-id="2084" instrument_node="">Holiday Mode</span></a><span data-dcnode-id="2082" instrument_node="">, and you'll get an image at the title screen, referencing that date. </span><span class="notelabel" data-dcnode-id="2079" onclick="togglenote('note1b6sw');" style="cursor: pointer;"><sup data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2077" id="note1b6sw" isnote="true" onclick="togglenote('note1b6sw');" style="display: none; cursor: pointer;"><span data-dcnode-id="2078" instrument_node="">Or, if you don't want to wait, you can also change the date on your PC</span></span><ul data-dcnode-id="2070"><li data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node=""> On September 9th, you get a "Happy Birthday, Len!" image.</span></li><li data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node=""> On December 25th, you get a Merry Christmas image.</span></li><li data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node=""> On January 1st, you get a Happy New Year image.</span></li></ul></li><li data-dcnode-id="2036"><span data-dcnode-id="2068" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnemyWithin" title="/pmwiki/pmwiki.php/Main/EnemyWithin"><span data-dcnode-id="2067" instrument_node="">Enemy Within</span></a><span data-dcnode-id="2065" instrument_node="">: The entire point of characters like Nanaya Shiki, Sion Tatari, Red Arcueid (Warcueid), and White Len. Many of them physically manifest due to Wallachia's (and later, </span><span class="spoiler" data-dcnode-id="2063" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2064" instrument_node="">White Len's</span></span><span data-dcnode-id="2062" instrument_node="">) power.</span><ul data-dcnode-id="2037"><li data-dcnode-id="2057"><span data-dcnode-id="2061" instrument_node=""> Shiki Nanaya: what Shiki Tohno would have become — an amoral, assassin-of-demons who </span><a class="twikilink" data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilFeelsGood" title="/pmwiki/pmwiki.php/Main/EvilFeelsGood"><span data-dcnode-id="2060" instrument_node="">loves his job</span></a><span data-dcnode-id="2058" instrument_node="">.</span></li><li data-dcnode-id="2050"><span data-dcnode-id="2056" instrument_node=""> Red Arcueid: Arcueid if she gave in to her bloodlust, using her normally-restrained powers to kill.</span><ul data-dcnode-id="2051"><li data-dcnode-id="2052"><span data-dcnode-id="2055" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2053" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2054" instrument_node="">Archetype:Earth. The Full power of Arcueid Brunestud; not given in to just bloodlust but as a copy of the Crimson Moon itself. As in, the original vampire template.</span></span></li></ul></li><li data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node=""> Akiha Vermilion: Same deal as Red Arcueid - Akiha Vermilion has lost pretty much all of her humanity.</span></li><li data-dcnode-id="2038"><span data-dcnode-id="2047" instrument_node=""> Sion Tatari: Sion if </span><span class="spoiler" data-dcnode-id="2045" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2046" instrument_node="">she completely becomes the next Tatari</span></span><span data-dcnode-id="2044" instrument_node="">. This is treated as an "</span><a class="twikilink" data-dcnode-id="2042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlternateContinuity" title="/pmwiki/pmwiki.php/Main/AlternateContinuity"><span data-dcnode-id="2043" instrument_node="">Alternate Continuity</span></a><span data-dcnode-id="2041" instrument_node="">" character. Sion Tatari and "Good" Sion as playables don't exist in the same timeline. </span><span class="spoiler" data-dcnode-id="2039" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2040" instrument_node=""> And the Dust of Osiris is a third Sion.</span></span></li></ul></li><li data-dcnode-id="2006"><span data-dcnode-id="2035" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnemyWithout" title="/pmwiki/pmwiki.php/Main/EnemyWithout"><span data-dcnode-id="2034" instrument_node="">Enemy Without</span></a><span data-dcnode-id="2032" instrument_node="">: This is basically the point of the Tatari's ability in th t"><span data-dcnode-id="1901" instrument_node="">Shiki</span></a><span data-dcnode-id="1899" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SempaiKohai" title="/pmwiki/pmwiki.php/Main/SempaiKohai"><span data-dcnode-id="1898" instrument_node="">Ciel</span></a><span data-dcnode-id="1896" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FriendlyNeighborhoodVampire" title="/pmwiki/pmwiki.php/Main/FriendlyNeighborhoodVampire"><span data-dcnode-id="1895" instrument_node="">Arcueid</span></a><span data-dcnode-id="1893" instrument_node=""> have against each other, to that they have against </span><a class="twikilink" data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="1892" instrument_node="">Nero</span></a><span data-dcnode-id="1890" instrument_node=""> or Roa.</span></li><li data-dcnode-id="1884"><span data-dcnode-id="1888" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GambitRoulette" title="/pmwiki/pmwiki.php/Main/GambitRoulette"><span data-dcnode-id="1887" instrument_node="">Gambit Roulette</span></a><span data-dcnode-id="1885" instrument_node="">: Through training, Alchemists have the mental capacity to plan every possible outcome for a situation. However, once they reach a certain level they realize all paths through history inevitably lead to the destruction of humanity and the planet itself, and are driven to despair and complete insanity by the fact that they can't plan a way out of it.</span></li><li data-dcnode-id="1879"><span data-dcnode-id="1883" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GratuitousLatin" title="/pmwiki/pmwiki.php/Main/GratuitousLatin"><span data-dcnode-id="1882" instrument_node="">Gratuitous Latin</span></a><span data-dcnode-id="1880" instrument_node="">: Used often throughout the backgrounds of various stages, such as graffiti under a bridge declaring "Cogito ergo sum", "Dum spiro spero" and "Et arma et verba vulnerant" being carved into the walls of a temple, or a neon sign saying "Nihil sub sole novum".</span></li><li data-dcnode-id="1871"><span data-dcnode-id="1878" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FutureBadass" title="/pmwiki/pmwiki.php/Main/FutureBadass"><span data-dcnode-id="1877" instrument_node="">Future Badass</span></a><span data-dcnode-id="1875" instrument_node="">: The Dust of Osirus is </span><span class="spoiler" data-dcnode-id="1873" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1874" instrument_node=""> a clone of Sion who became the Tatari</span></span><span data-dcnode-id="1872" instrument_node="">.</span></li><li data-dcnode-id="1866"><span data-dcnode-id="1870" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenkiGirl" title="/pmwiki/pmwiki.php/Main/GenkiGirl"><span data-dcnode-id="1869" instrument_node="">Genki Girl</span></a><span data-dcnode-id="1867" instrument_node="">: Miyako, Kohaku.</span></li><li data-dcnode-id="1855"><span data-dcnode-id="1865" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GlassCannon" title="/pmwiki/pmwiki.php/Main/GlassCannon"><span data-dcnode-id="1864" instrument_node="">Glass Cannon</span></a><span data-dcnode-id="1862" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WithGreatPowerComesGreatInsanity" title="/pmwiki/pmwiki.php/Main/WithGreatPowerComesGreatInsanity"><span data-dcnode-id="1861" instrument_node="">Vermillion Akiha</span></a><span data-dcnode-id="1859" instrument_node=""> has insanely powerful attacks, but the second lowest defense in the game. The only character lower is Neco-Arc Chaos. Ironically, normal Akiha has the second HIGHEST defense in the game — the only character who's higher is the horribly-broken </span><span class="spoiler" data-dcnode-id="1857" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1858" instrument_node=""> Archetype:Earth</span></span><span data-dcnode-id="1856" instrument_node=""> (at least before she got nerfed in Current Code).</span></li><li data-dcnode-id="1844"><span data-dcnode-id="1854" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GratuitousEnglish" title="/pmwiki/pmwiki.php/Main/GratuitousEnglish"><span data-dcnode-id="1853" instrument_node="">Gratuitous English</span></a><span data-dcnode-id="1851" instrument_node="">: Just look at the </span><em data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">title</span></em><span data-dcnode-id="1848" instrument_node="">. It gets worse, naturally.</span><ul data-dcnode-id="1845"><li data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node=""> The names refer to the Tatari's habit of referring to everything it does in stage terminolo
