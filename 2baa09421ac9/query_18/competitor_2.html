gy.</span></li></ul></li><li data-dcnode-id="1815"><span data-dcnode-id="1843" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuestFighter" title="/pmwiki/pmwiki.php/Main/GuestFighter"><span data-dcnode-id="1842" instrument_node="">Guest Fighter</span></a><span data-dcnode-id="1840" instrument_node="">:</span><ul data-dcnode-id="1816"><li data-dcnode-id="1825"><span data-dcnode-id="1839" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners" title="/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners"><span data-dcnode-id="1838" instrument_node="">Shiki Ryougi</span></a><span data-dcnode-id="1836" instrument_node="">. Melty Blood also donated a </span><a class="twikilink" data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuestFighter" title="/pmwiki/pmwiki.php/Main/GuestFighter"><span data-dcnode-id="1835" instrument_node="">Guest Fighter</span></a><span data-dcnode-id="1833" instrument_node=""> to French-Bread's next game, </span><em data-dcnode-id="1830"><a class="twikilink" data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/UnderNightInBirth" title="/pmwiki/pmwiki.php/VideoGame/UnderNightInBirth"><span data-dcnode-id="1832" instrument_node=""> Under Night In-Birth</span></a></em><span data-dcnode-id="1829" instrument_node=""> - Sion Eltnam (</span><a class="twikilink" data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpellMyNameWithAnS" title="/pmwiki/pmwiki.php/Main/SpellMyNameWithAnS"><span data-dcnode-id="1828" instrument_node="">spelled Eltnum</span></a><span data-dcnode-id="1826" instrument_node="">) Atlasia.</span></li><li data-dcnode-id="1817"><span data-dcnode-id="1824" instrument_node=""> For </span><em data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Type Lumina</span></em><span data-dcnode-id="1821" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/FateStayNight" title="/pmwiki/pmwiki.php/VisualNovel/FateStayNight"><span data-dcnode-id="1820" instrument_node="">Saber, AKA Artoria Pendragon</span></a><span data-dcnode-id="1818" instrument_node=""> makes a playable apperance.</span></li></ul></li><li data-dcnode-id="1804"><span data-dcnode-id="1814" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HalfHumanHybrid" title="/pmwiki/pmwiki.php/Main/HalfHumanHybrid"><span data-dcnode-id="1813" instrument_node="">Half-Human Hybrid</span></a><span data-dcnode-id="1811" instrument_node="">: Akiha Tohno/Vermilion Akiha, Kouma Kishima.</span><ul data-dcnode-id="1805"><li data-dcnode-id="1806"><span data-dcnode-id="1810" instrument_node=""> Arguably, Len, due to being part human and part cat. White Len is even a Tri-hybrid, of a human girl, a cat, and </span><span class="spoiler" data-dcnode-id="1808" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1809" instrument_node="">TATARI</span></span><span data-dcnode-id="1807" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1789"><span data-dcnode-id="1803" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hammerspace" title="/pmwiki/pmwiki.php/Main/Hammerspace"><span data-dcnode-id="1802" instrument_node="">Hammerspace</span></a><span data-dcnode-id="1800" instrument_node="">: Many, including Ciel, who can </span><a class="twikilink" data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThrowingYourSwordAlwaysWorks" title="/pmwiki/pmwiki.php/Main/ThrowingYourSwordAlwaysWorks"><span data-dcnode-id="1799" instrument_node="">throw dozens of swords without a break</span></a><span data-dcnode-id="1797" instrument_node="">, Mech-Hisui with tools like a </span><a class="twikilink" data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillItWithFire" title="/pmwiki/pmwiki.php/Main/KillItWithFire"><span data-dcnode-id="1796" instrument_node="">flamethrower</span></a><span data-dcnode-id="1794" instrument_node="">, Sion with an unlimited amount of ammo and most notably Hisui who has exploding bentos, chairs, an always filled watering can, a bucket full of water, several cooking tools (including pans, ladles and a wok) </span><img class="ymmv1 rounded" data-dcnode-id="1793" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FridgeLogic" title="/pmwiki/pmwiki.php/Main/FridgeLogic"><span data-dcnode-id="1792" instrument_node="">even though she can't cook</span></a><span data-dcnode-id="1790" instrument_node="">, and a...table.</span></li><li data-dcnode-id="1776"><span data-dcnode-id="1788" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HappyEndingOverride" title="/pmwiki/pmwiki.php/Main/HappyEndingOverride"><span data-dcnode-id="1787" instrument_node="">Happy Ending Override</span></a><span data-dcnode-id="1785" instrument_node="">: Miyako's story in </span><em data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Type Lumnina</span></em><span data-dcnode-id="1782" instrument_node=""> ends with her defeating Akiha, thus allowing Shiki go return back home with his little sister where they can spend their lives together. When you boot up Boss Rush, it begins with </span><span class="spoiler" data-dcnode-id="1777" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1781" instrument_node="">Neco-Arc </span><em data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">breaking the ending to pieces</span></em><span data-dcnode-id="1778" instrument_node="">, informing Miyako that her "story" was nothing more than a dream scenario she was having, something she can't achieve unless she does something about her shyness.</span></span></li><li data-dcnode-id="1649"><span data-dcnode-id="1775" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Homage" title="/pmwiki/pmwiki.php/Main/Homage"><span data-dcnode-id="1774" instrument_node="">Homage</span></a><span data-dcnode-id="1772" instrument_node="">: Several to scenes in </span><em data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Tsukihime</span></em><span data-dcnode-id="1769" instrument_node=""> and </span><em data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Kagetsu Tohya</span></em><span data-dcnode-id="1766" instrument_node=""> (and </span><em data-dcnode-id="1763"><a class="twikilink" data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners" title="/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners"><span data-dcnode-id="1765" instrument_node="">The Garden of Sinners</span></a></em><span data-dcnode-id="1762" instrument_node=""> in </span><em data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Actress Again</span></em><span data-dcnode-id="1759" instrument_node="">):</span><ul data-dcnode-id="1650"><li data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node=""> Shiki Tohno's Arc Drive, the Seventeen Piece Dissection, is an homage to how Shiki cuts Arcueid into seventeen pieces in their first meeting. His quote during his Last Arc is the exact same as what he said when he defeated Roa in Arcueid's route of Tsukihime.</span></li><li data-dcnode-id="1752"><span data-dcnode-id="1756" instrument_node=""> Arcueid's Last Arc, when used against Shiki, will hit exactly 18 times; a revenge for his "17 Dissection" of her in the beginning of </span><em data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Tsukihime</span></em><span data-dcnode-id="1753" instrument_node="">.</span></li><li data-dcnode-id="1727"><span data-dcnode-id="1751" instrument_node=""> Hisui's Last Arc is a jab at the numerous grammar mistakes she made in the original </span><em data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Tsukihime</span></em><span data-dcnode-id="1748" instrument_node="">, including the famous "You </span><em data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">will be</span></em><span data-dcnode-id="1745" instrument_node=""> the criminal". Her Arc Drive is a more badass version of the ridiculous-looking attack she uses in "Omogirisou" in </span><em data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Kagetsu Tohya</span></em><span data-dcnode-id="1742" instrument_node="">.</span><ul data-dcnode-id="1728"><li data-dcnode-id="1729"><span data-dcnode-id="1741" instrument_node=""> As for special moves, her picnic lunch explosive trap is </span><a class="twikilink" data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LethalChef" title="/pmwiki/pmwiki.php/Main/LethalChef"><span data-dcnode-id="1740" instrument_node="">plum sandwiches</span></a><span data-dcnode-id="1738" instrument_node="">. She can also pull out the Chair. Yes, </span><a class="urllink" data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lurkmore.com/w/images/9/9e/Thischair.jpg"><span data-dcnode-id="1737" instrument_node="">''that'' chair. That chair. That chair.</span><img data-dcnode-id="1736" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">◊</span></small><span data-dcnode-id="1732" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MadnessMantra" title="/pmwiki/pmwiki.php/Main/MadnessMantra"><span data-dcnode-id="1731" instrument_node="">That chair. That chair. That chair. That chair. That chair...</span></a></li></ul></li><li data-dcnode-id="1719"><span data-dcnode-id="1726" instrument_node=""> Shiki Nanaya's Last Arc is the exact same move that he uses against Shiki Tohno in </span><em data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Kagetsu Tohya</span></em><span data-dcnode-id="1723" instrument_node=""> (he throws his knife at the heart, and simultaneously </span><a class="twikilink" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FlashStep" title="/pmwiki/pmwiki.php/Main/FlashStep"><span data-dcnode-id="1722" instrument_node="">leap</span></a><span data-dcnode-id="1720" instrument_node=""> over their head and break their neck).</span></li><li data-dcnode-id="1714"><span data-dcnode-id="1718" instrument_node=""> Satsuki's Arc Drive does extra damage against Shiki Tohno (and Shiki Nanaya) as revenge for failing to protect her in </span><em data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Tsukihime</span></em><span data-dcnode-id="1715" instrument_node=""> - despite it having been out of his power to do so at the time. To emphasize the point, her Arc Drive ends with her screaming "BAKA!" ("idiot!") to the person on the receiving end, but changes to "USOTSUKI!" ("liar!") against both Shikis.</span></li><li data-dcnode-id="1709"><span data-dcnode-id="1713" instrument_node=""> Kohaku's Arc Drive involves a quick change into the Chinese dress and accent she cosplays in during </span><em data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Kagetsu Tohya</span></em><span data-dcnode-id="1710" instrument_node="">.</span></li><li data-dcnode-id="1671"><span data-dcnode-id="1708" instrument_node=""> For </span><a class="twikilink" data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners" title="/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners"><span data-dcnode-id="1707" instrument_node="">Shiki Ryougi</span></a><span data-dcnode-id="1705" instrument_node="">:</span><ul data-dcnode-id="1672"><li data-dcnode-id="1696"><span data-dcnode-id="1704" instrument_node=""> Her </span><img class="ymmv1 rounded" data-dcnode-id="1703" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/SugarWiki/AwesomeMusic" title="/pmwiki/pmwiki.php/SugarWiki/AwesomeMusic"><span data-dcnode-id="1702" instrument_node="">leitmotif</span></a><span data-dcnode-id="1700" instrument_node=""> makes it into her stage in </span><em data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Actress Again</span></em><span data-dcnode-id="1697" instrument_node="">, which is titled "...and nothing heart" (the subtitle of the second chapter and movie).</span></li><li data-dcnode-id="1685"><span data-dcnode-id="1695" instrument_node=""> Some of her moves are taken from the movies (the jump and upside-down spin knifing the enemy in the head is from the first movie against one of the ghosts; the throw is from the third movie against Asagami Fujino (with the addition of a stab), and her Last Arc is from the fifth movie </span><span class="spoiler" data-dcnode-id="1693" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1694" instrument_node=""> with the appearance of a katana-wielding Void!Shiki</span></span><span data-dcnode-id="1692" instrument_node="">). And speaking of that Last Arc, it is a </span><a class="twikilink" data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitKill" title="/pmwiki/pmwiki.php/Main/OneHitKill"><span data-dcnode-id="1691" instrument_node="">One-Hit Kill</span></a><span data-dcnode-id="1689" instrument_node=""> against you if you're in Heat or Blood Heat. Not so when you got hit? Well then, go into Heat or Blood Heat later in the round </span><em data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">and see your HP get drained to one point.</span></em><span data-dcnode-id="1686" instrument_node=""> Truly a god-killing technique.</span></li><li data-dcnode-id="1673"><span data-dcnode-id="1684" instrument_node=""> Some of her lines come from the movies. The most awesome came from the third movie (where she says that </span><a class="twikilink" data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassBoast" title="/pmwiki/pmwiki.php/Main/BadassBoast"><span data-dcnode-id="1683" instrument_node="">she could kill anything that exists, even a god</span></a><span data-dcnode-id="1681" instrument_node="">), </span><span class="spoiler" data-dcnode-id="1674" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1680" instrument_node=""> which she repeats in the end of her story mode in </span><em data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Actress Again</span></em><span data-dcnode-id="1677" instrument_node=""> against </span><a class="twikilink" data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NighInvulnerable" title="/pmwiki/pmwiki.php/Main/NighInvulnerable"><span data-dcnode-id="1676" instrument_node="">Archetype:Earth.</span></a></span></li></ul></li><li data-dcnode-id="1663"><span data-dcnode-id="1670" instrument_node=""> Finally (though maybe a coincidence), </span><a class="urllink" data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DPYRMv_SgOiI"><span data-dcnode-id="1669" instrument_node="">this video</span><img data-dcnode-id="1668" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1666" instrument_node=""> shows a palette-swapped Ryougi. </span><span class="spoiler" data-dcnode-id="1664" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1665" instrument_node=""> Why hello there, Lio.</span></span></li><li data-dcnode-id="1659"><span data-dcnode-id="1662" instrument_node=""> Also already in Act Cadenza: Aoko tells the enemy in one of her winning quotes to beat up a </span><a class="twikilink" data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners" title="/pmwiki/pmwiki.php/LightNovel/TheGardenOfSinners"><span data-dcnode-id="1661" instrument_node="">teacher-like, smoking woman, who uses her name to get money from the Association.</span></a></li><li data-dcnode-id="1651"><span data-dcnode-id="1658" instrument_node=""> </span><a class="urllink" data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//img188.imageshack.us/img188/932/crosscounterl.jpg"><span data-dcnode-id="1657" instrument_node="">In the first game we got this.</span><img data-dcnode-id="1656" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">◊</span></small><span data-dcnode-id="1652" instrument_node=""> A homage to a scene in Kagetsu Tohya in which Arcueid stole Ciel's lunch, resulting in a fist fight between the two in which they knocked each other out.</span></li></ul></li><li data-dcnode-id="1633"><span data-dcnode-id="1648" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HornyDevils" title="/pmwiki/pmwiki.php/Main/HornyDevils"><span data-dcnode-id="1647" instrument_node="">Horny Devils</span></a><span data-dcnode-id="1645" instrument_node="">: Len and White Len, which ups the </span><img class="ymmv1 rounded" data-dcnode-id="1644" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Squick" title="/pmwiki/pmwiki.php/Main/Squick"><span data-dcnode-id="1643" instrument_node="">Squick</span></a><span data-dcnode-id="1641" instrument_node=""> since they both </span><em data-dcnode-id="1638"><a class="twikilink" data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReallySevenHundredYearsOld" title="/pmwiki/pmwiki.php/Main/ReallySevenHundredYearsOld"><span data-dcnode-id="1640" instrument_node="">look</span></a></em><span data-dcnode-id="1637" instrument_node=""> about </span><a class="twikilink" data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoYay" title="/pmwiki/pmwiki.php/Main/NoYay"><span data-dcnode-id="1636" instrument_node="">twelve</span></a><span data-dcnode-id="1634" instrument_node="">.</span></li><li data-dcnode-id="1616"><span data-dcnode-id="1632" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JigSawPuzzlePlot" title="/pmwiki/pmwiki.php/Main/JigSawPuzzlePlot"><span data-dcnode-id="1631" instrument_node="">Jig Saw Puzzle Plot</span></a><span data-dcnode-id="1629" instrument_node="">: It's tricky to get the entire plot of Melty Blood because the first part was in Story Mode of "Re-Act" and that wasn't carried over to later versions.</span><ul data-dcnode-id="1617"><li data-dcnode-id="1618"><span data-dcnode-id="1628" instrument_node=""> And even then there's </span><em data-dcnode-id="1624"><a class="twikilink" data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VisualNovel" title="/pmwiki/pmwiki.php/Main/VisualNovel"><span data-dcnode-id="1627" instrument_node="">Visual Novel</span></a><span data-dcnode-id="1625" instrument_node="">/Tsukihime</span></em><span data-dcnode-id="1623" instrument_node=""> and </span><em data-dcnode-id="1620"><a class="createlink" data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/KagetsuTohya" title="/pmwiki/pmwiki.php/VisualNovel/KagetsuTohya"><span data-dcnode-id="1622" instrument_node="">Kagetsu Tohya</span></a></em><span data-dcnode-id="1619" instrument_node=""> for everyone's backstories.</span></li></ul></li><li data-dcnode-id="1606"><span data-dcnode-id="1615" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JokeCharacter" title="/pmwiki/pmwiki.php/Main/JokeCharacter"><span data-dcnode-id="1614" instrument_node="">Joke Character</span></a><span data-dcnode-id="1612" instrument_node="">: Neco-Arc, the adorable super-deformed cat-eared Arcueid. Neco-Arc Chaos, the same thing for Nrvnqsr Chaos, except not as adorable, smoking a cigarette, and swearing quite a bit.</span><ul data-dcnode-id="1607"><li data-dcnode-id="1608"><span data-dcnode-id="1611" instrument_node=""> And in terms of the story, there are several instances of Satsuki and White Len trying hard not to become a </span><a class="twikilink" data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PaintingTheMedium" title="/pmwiki/pmwiki.php/Main/PaintingTheMedium"><span data-dcnode-id="1610" instrument_node="">"gag character."</span></a></li></ul></li><li data-dcnode-id="1598"><span data-dcnode-id="1605" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnifeNut" title="/pmwiki/pmwiki.php/Main/KnifeNut"><span data-dcnode-id="1604" instrument_node="">Knife Nut</span></a><span data-dcnode-id="1602" instrument_node="">: Shiki Tohno and Shiki Nanaya.</span><ul data-dcnode-id="1599"><li data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node=""> And Shiki Ryougi. Ciel can also qualify.</span></li></ul></li><li data-dcnode-id="1578"><span data-dcnode-id="1597" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LargeHam" title="/pmwiki/pmwiki.php/Main/LargeHam"><span data-dcnode-id="1596" instrument_node="">Large Ham</span></a><span data-dcnode-id="1594" instrument_node="">: Neco-Arc Chaos' voice acting. </span><em data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">JYAN JYA JYANNNNNN~</span></em><ul data-dcnode-id="1579"><li data-dcnode-id="1586"><span data-dcnode-id="1591" instrument_node=""> </span><em data-dcnode-id="1587"><strong data-dcnode-id="1588"><a class="twikilink" data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GratuitousEnglish" title="/pmwiki/pmwiki.php/Main/GratuitousEnglish"><span data-dcnode-id="1590" instrument_node="">"HEY, TAXI!"</span></a></strong></em></li><li data-dcnode-id="1580"><span data-dcnode-id="1585" instrument_node=""> Neco-Arc Chaos' voice actor is Jyouji Nakata, who has a </span><a class="urllink" data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imdb.com/name/nm0620381/"><span data-dcnode-id="1584" instrument_node="">very extensive resume</span><img data-dcnode-id="1583" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1581" instrument_node=""> of hammy villains. Including Nrvnqsr Chaos himself.</span></li></ul></li><li data-dcnode-id="1573"><span data-dcnode-id="1577" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Leitmotif" title="/pmwiki/pmwiki.php/Main/Leitmotif"><span data-dcnode-id="1576" instrument_node="">Leitmotif</span></a><span data-dcnode-id="1574" instrument_node="">: Every character has their own stage, which is tied to a specific theme song.</span></li><li data-dcnode-id="1568"><span data-dcnode-id="1572" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LethalJokeCharacter" title="/pmwiki/pmwiki.php/Main/LethalJokeCharacter"><span data-dcnode-id="1571" instrument_node="">Lethal Joke Character</span></a><span data-dcnode-id="1569" instrument_node="">: Neco-Arc, Neco-Arc Chaos. Also, the noncombative characters in the original games — the twin maids, for example — are given comedic moves (most of Hisui's are tied to her cleaning of the mansion, for example).</span></li><li data-dcnode-id="1560"><span data-dcnode-id="1567" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoveHurts" title="/pmwiki/pmwiki.php/Main/LoveHurts"><span data-dcnode-id="1566" instrument_node="">Love Hurts</span></a><span data-dcnode-id="1564" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1562" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1563" instrument_node=""> Archetype:Earth</span></span><span data-dcnode-id="1561" instrument_node="">'s Last Arc (pre-Current Code) is pretty much a guaranteed KO for any opponent. Any, that is, except for Tohno Shiki. When against Shiki as the opponent, her Last Arc does significantly less damage than usual, only cutting around a quarter of his health.</span></li><li data-dcnode-id="1552"><span data-dcnode-id="1559" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicalEyes" title="/pmwiki/pmwiki.php/Main/MagicalEyes"><span data-dcnode-id="1558" instrument_node="">Magical Eyes</span></a><span data-dcnode-id="1556" instrument_node="">: Shiki Tohno's Mystic Eyes of Death Perception that can see the "concept of death" on anything. His Arc Drives </span><em data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">shatter the entire screen</span></em><span data-dcnode-id="1553" instrument_node="">.</span></li><li data-dcnode-id="1544"><span data-dcnode-id="1551" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="1550" instrument_node="">Meaningful Name</span></a><span data-dcnode-id="1548" instrument_node="">: Wallachia is a vampire. The real world Wallachia was a small country (now part of Romania) from whence Vlad the Impaler, the man </span><a class="twikilink" data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Dracula" title="/pmwiki/pmwiki.php/Main/Dracula"><span data-dcnode-id="1547" instrument_node="">Dracula</span></a><span data-dcnode-id="1545" instrument_node=""> is based on, came from.</span></li><li data-dcnode-id="1539"><span data-dcnode-id="1543" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MergingTheBranches" title="/pmwiki/pmwiki.php/Main/MergingTheBranches"><span data-dcnode-id="1542" instrument_node="">Merging the Branches</span></a><span data-dcnode-id="1540" instrument_node="">: The game declares a combination of two endings (Ciel's and Kohaku's) plus events that never actually happened in any canon route.</span></li><li data-dcnode-id="1496"><span data-dcnode-id="1538" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MirrorMatch" title="/pmwiki/pmwiki.php/Main/MirrorMatch"><span data-dcnode-id="1537" instrument_node="">Mirror Match</span></a><span data-dcnode-id="1535" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="1534" instrument_node="">Lampshaded</span></a><span data-dcnode-id="1532" instrument_node=""> in Re-Act by Ciel and Arcueid in Arcueid's story mode, among other examples.</span><div class="indent" data-dcnode-id="1512"><strong data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Arcueid:</span></strong><span data-dcnode-id="1529" instrument_node=""> </span><em data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Look who it is. Are you the real one?</span></em><span data-dcnode-id="1526" instrument_node=""> </span><br data-dcnode-id="1525"><strong data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Ciel:</span></strong><span data-dcnode-id="1522" instrument_node=""> </span><em data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">That is understandable. I had to kick around many of my fake selves before I came here.</span></em><span data-dcnode-id="1519" instrument_node=""> </span><br data-dcnode-id="1518"><strong data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Arcueid:</span></strong><span data-dcnode-id="1515" instrument_node=""> </span><em data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">If you're involved in something that troublesome, you're the real one. So, how are you doing Ciel?</span></em></div><ul data-dcnode-id="1497"><li data-dcnode-id="1507"><span data-dcnode-id="1511" instrument_node=""> There are several curious matchups: for example, you can put normal Sion against Sion Tatari, despite the fact that both exist in separate timelines. Even more curious if you put any of them against </span><span class="spoiler" data-dcnode-id="1509" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1510" instrument_node="">The Dust Of Osiris</span></span><span data-dcnode-id="1508" instrument_node="">.</span></li><li data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node=""> Or, what about putting normal characters against Tatari avatars, such as Shiki Tohno Vs. Shiki Nanaya?</span></li><li data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node=""> Or what about normal Akiha Vs. Vermillion Akiha? Or any of tham against G-Akiha?</span></li><li data-dcnode-id="1498"><span data-dcnode-id="1502" instrument_node=""> Or Arcueid Vs. Red Arcueid, or Vs. </span><span class="spoiler" data-dcnode-id="1500" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1501" instrument_node="">Archetype:Earth</span></span><span data-dcnode-id="1499" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1488"><span data-dcnode-id="1495" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MixAndMatchCritters" title="/pmwiki/pmwiki.php/Main/MixAndMatchCritters"><span data-dcnode-id="1494" instrument_node="">Mix-and-Match Critters</span></a><span data-dcnode-id="1492" instrument_node=""> + </span><a class="twikilink" data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TwoBeingsOneBody" title="/pmwiki/pmwiki.php/Main/TwoBeingsOneBody"><span data-dcnode-id="1491" instrument_node="">X Beings, 1 Body</span></a><span data-dcnode-id="1489" instrument_node="">: The whole existence of Nero/Nrvnqsr Chaos, whose body is made of chaos and consists of 666 beasts, who share consciousness with him.</span></li><li data-dcnode-id="1477"><span data-dcnode-id="1487" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MusicalNod" title="/pmwiki/pmwiki.php/Main/MusicalNod"><span data-dcnode-id="1486" instrument_node="">Musical Nod</span></a><span data-dcnode-id="1484" instrument_node="">: The soundtrack of </span><em data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Type Lumina</span></em><span data-dcnode-id="1481" instrument_node=""> is mostly new content, but the Moonlit Altar stage music has the first section of "Blood Drain", the opening for </span><em data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Actress Again</span></em><span data-dcnode-id="1478" instrument_node="">, in its composition.</span></li><li data-dcnode-id="1472"><span data-dcnode-id="1476" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NinjaMaid" title="/pmwiki/pmwiki.php/Main/NinjaMaid"><span data-dcnode-id="1475" instrument_node="">Ninja Maid</span></a><span data-dcnode-id="1473" instrument_node="">: Kohaku and Hisui (thanks to the influence of TATARI; they are otherwise total non-combatants).</span></li><li data-dcnode-id="1455"><span data-dcnode-id="1471" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoAntagonist" title="/pmwiki/pmwiki.php/Main/NoAntagonist"><span data-dcnode-id="1470" instrument_node="">No Antagonist</span></a><span data-dcnode-id="1468" instrument_node="">: Unlike all of the other games in the series, </span><em data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Act Cadenza</span></em><span data-dcnode-id="1465" instrument_node=""> does not have an overarching </span><a class="twikilink" data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1464" instrument_node="">Big Bad</span></a><span data-dcnode-id="1462" instrument_node=""> who drives the plot like Wallachia, White Len/Aoko, and the Dust of Osiris have/would do in the games inbetween, with most of </span><em data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">AC</span></em><span data-dcnode-id="1459" instrument_node="">'s storylines covering 'dream match' scenarios from the perspectives of various characters (such as Nrvnqsr settling his score with Arcueid, or Shiki battling his 'sensei' Aoko </span><a class="twikilink" data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SNKBoss" title="/pmwiki/pmwiki.php/Main/SNKBoss"><span data-dcnode-id="1458" instrument_node="">on more fairer terms than when he did in the previous game</span></a><span data-dcnode-id="1456" instrument_node="">).</span></li><li data-dcnode-id="1439"><span data-dcnode-id="1454" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoPronunciationGuide" title="/pmwiki/pmwiki.php/Main/NoPronunciationGuide"><span data-dcnode-id="1453" instrument_node="">No Pronunciation Guide</span></a><span data-dcnode-id="1451" instrument_node="">: How the hell do you pronounce </span><em data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Nrvnqsr</span></em><span data-dcnode-id="1448" instrument_node="">? </span><span class="notelabel" data-dcnode-id="1445" onclick="togglenote('note298gn');" style="cursor: pointer;"><sup data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1440" id="note298gn" isnote="true" onclick="togglenote('note298gn');" style="display: none; cursor: pointer;"><span data-dcnode-id="1444" instrument_node="">It's pronounced 'Nero'. The weird spelling is because those letters correspond to the Hebrew numbering system (for "Nero Caesar") and they add up to </span><a class="twikilink" data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NumberOfTheBeast" title="/pmwiki/pmwiki.php/Main/NumberOfTheBeast"><span data-dcnode-id="1443" instrument_node="">666</span></a><span data-dcnode-id="1441" instrument_node="">.</span></span></li><li data-dcnode-id="1429"><span data-dcnode-id="1438" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotSoDifferentRemark" title="/pmwiki/pmwiki.php/Main/NotSoDifferentRemark"><span data-dcnode-id="1437" instrument_node="">"Not So Different" Remark</span></a><span data-dcnode-id="1435" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1430" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1434" instrument_node=""> What Walachia tells Sion when Shiki and her confront him. He tells her that they cannot live without taking something from others, information for Sion and Blood for Walachia. This causes her to freak out and allow her </span><a class="twikilink" data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperPoweredEvilSide" title="/pmwiki/pmwiki.php/Main/SuperPoweredEvilSide"><span data-dcnode-id="1433" instrument_node="">Superpowered Evil Side</span></a><span data-dcnode-id="1431" instrument_node=""> to take over, and Walachia lets her loose on Shiki.</span></span></li><li data-dcnode-id="1421"><span data-dcnode-id="1428" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OddCouple" title="/pmwiki/pmwiki.php/Main/OddCouple"><span data-dcnode-id="1427" instrument_node="">Odd Couple</span></a><span data-dcnode-id="1425" instrument_node="">: Shiki and Arcueid (a </span><a class="twikilink" data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Canon" title="/pmwiki/pmwiki.php/Main/Canon"><span data-dcnode-id="1424" instrument_node="">Canon</span></a><span data-dcnode-id="1422" instrument_node=""> pairing.)</span></li><li data-dcnode-id="1414"><span data-dcnode-id="1420" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OddFriendship" title="/pmwiki/pmwiki.php/Main/OddFriendship"><span data-dcnode-id="1419" instrument_node="">Odd Friendship</span></a><span data-dcnode-id="1417" instrument_node="">: Satsuki and Sion (tragic vampires unite!). </span><span class="spoiler" data-dcnode-id="1415" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1416" instrument_node=""> Now with Riesbyfe-brand Spirit Church Knight goodness!</span></span></li><li data-dcnode-id="1404"><span data-dcnode-id="1413" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Ojou" title="/pmwiki/pmwiki.php/Main/Ojou"><span data-dcnode-id="1412" instrument_node="">Ojou</span></a><span data-dcnode-id="1410" instrument_node="">: Akiha.</span><ul data-dcnode-id="1405"><li data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node=""> Akiha even has an attack, consisting of her crossing her arms and push-kicking her opponent, nicknamed "Gangster Princess Kick" by fans.</span></li><li data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node=""> Ryougi Shiki can qualify as well.</span></li></ul></li><li data-dcnode-id="1390"><span data-dcnode-id="1403" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneSteveLimit" title="/pmwiki/pmwiki.php/Main/OneSteveLimit"><span data-dcnode-id="1402" instrument_node="">One Steve Limit</span></a><span data-dcnode-id="1400" instrument_node="">: Subverted. As of </span><em data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Melty Blood: Actress Again</span></em><span data-dcnode-id="1397" instrument_node="">, there are at least three Shikis.</span><ul data-dcnode-id="1391"><li data-dcnode-id="1392"><span data-dcnode-id="1396" instrument_node=""> Also, two Sions, (technically) two Lens, two Arcueids, three Akihas, and depending on your interpretation, the Neko versions of Arcueid and Nero Chaos may also count, as well as Mech-Hisui being based off Hisui. </span><span class="spoiler" data-dcnode-id="1394" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1395" instrument_node=""> Plus the 17th and 18th incarnations of Roa may also count...</span></span><span data-dcnode-id="1393" instrument_node=""> And as of version 1.05, there is now another Ciel which is essentially a playable version of Executioner Ciel from Re-ACT.</span></li></ul></li><li data-dcnode-id="1385"><span data-dcnode-id="1389" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnlyMostlyDead" title="/pmwiki/pmwiki.php/Main/OnlyMostlyDead"><span data-dcnode-id="1388" instrument_node="">Only Mostly Dead</span></a><span data-dcnode-id="1386" instrument_node="">: Characters defeated in Story Mode are never actually dead. Except the bad guys.</span></li></ul><ul data-dcnode-id="1144"><li data-dcnode-id="1378"><span data-dcnode-id="1382" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PolarOppositeTwins" title="/pmwiki/pmwiki.php/Main/PolarOppositeTwins"><span data-dcnode-id="1381" instrument_node="">Polar Opposite Twins</span></a><span data-dcnode-id="1379" instrument_node="">: Hisui and Kohaku.</span></li><li data-dcnode-id="1370"><span data-dcnode-id="1377" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PuppetFighter" title="/pmwiki/pmwiki.php/Main/PuppetFighter"><span data-dcnode-id="1376" instrument_node="">Puppet Fighter</span></a><span data-dcnode-id="1374" instrument_node="">: In </span><em data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Actress Again</span></em><span data-dcnode-id="1371" instrument_node=""> we have a team conformed by Kohaku &amp; Mech-Hisui, and other by Mech-Hisui &amp; Neko Arc: You control Kohaku in the first one, and Mech Hisui in the second, with their partners ready to assist when called via special moves, however, unlike Hisui &amp; Kohaku (Who also counts), You can't change characters.</span></li><li data-dcnode-id="1356"><span data-dcnode-id="1369" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RecurringRiff" title="/pmwiki/pmwiki.php/Main/RecurringRiff"><span data-dcnode-id="1368" instrument_node="">Recurring Riff</span></a><span data-dcnode-id="1366" instrument_node="">: Aoko's theme is an instrumental rock remix of the original game's main theme song.</span><ul data-dcnode-id="1357"><li data-dcnode-id="1358"><span data-dcnode-id="1365" instrument_node=""> Ciel's new stage in </span><em data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Actress Again</span></em><span data-dcnode-id="1362" instrument_node=""> is yet another remix of the very same theme, but this time with a (naturally) </span><a class="twikilink" data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OminousLatinChanting" title="/pmwiki/pmwiki.php/Main/OminousLatinChanting"><span data-dcnode-id="1361" instrument_node="">Ominous Latin Chanting</span></a><span data-dcnode-id="1359" instrument_node=""> motif to it.</span></li></ul></li><li data-dcnode-id="1348"><span data-dcnode-id="1355" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RetCon" title="/pmwiki/pmwiki.php/Main/RetCon"><span data-dcnode-id="1354" instrument_node="">Retcon</span></a><span data-dcnode-id="1352" instrument_node="">: Nero/Nrvnqsr Chaos as the boss of the first game was later retconned to be a Tatari Avatar.</span><ul data-dcnode-id="1349"><li data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node=""> Then again, a fair bit of stuff was retconned when they did Re-ACT.</span></li></ul></li><li data-dcnode-id="1333"><span data-dcnode-id="1347" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SequelHook" title="/pmwiki/pmwiki.php/Main/SequelHook"><span data-dcnode-id="1346" instrument_node="">Sequel Hook</span></a><span data-dcnode-id="1344" instrument_node="">: In </span><em data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Type Lumina</span></em><span data-dcnode-id="1341" instrument_node="">, any foreshadowing to the upcoming routes in </span><em data-dcnode-id="1338"><a class="twikilink" data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Tsukihime" title="/pmwiki/pmwiki.php/VisualNovel/Tsukihime"><span data-dcnode-id="1340" instrument_node="">Tsukihime -The other side of red garden-</span></a></em><span data-dcnode-id="1337" instrument_node=""> could count. Of particular note is Noel's ending which hints at a her having a potential role in </span><a class="twikilink" data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AscendedExtra" title="/pmwiki/pmwiki.php/Main/AscendedExtra"><span data-dcnode-id="1336" instrument_node="">Satsuki Yumizuka's</span></a><span data-dcnode-id="1334" instrument_node=""> route.</span></li><li data-dcnode-id="1299"><span data-dcnode-id="1332" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="1331" instrument_node="">Shout-Out</span></a><span data-dcnode-id="1329" instrument_node="">:</span><ul data-dcnode-id="1300"><li data-dcnode-id="1309"><span data-dcnode-id="1328" instrument_node=""> Giant Akiha is one </span><a class="twikilink" data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IncrediblyLamePun" title="/pmwiki/pmwiki.php/Main/IncrediblyLamePun"><span data-dcnode-id="1327" instrument_node="">bigass</span></a><span data-dcnode-id="1325" instrument_node=""> shoutout to Apocalypse as encountered in </span><em data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">X-Men VS Street Fighter / Marvel Superheroes vs. Street Fighter</span></em><span data-dcnode-id="1322" instrument_node="">, complete with </span><a class="twikilink" data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EyeBeams" title="/pmwiki/pmwiki.php/Main/EyeBeams"><span data-dcnode-id="1321" instrument_node="">Eye Beams</span></a><span data-dcnode-id="1319" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThisIsADrill" title="/pmwiki/pmwiki.php/Main/ThisIsADrill"><span data-dcnode-id="1318" instrument_node="">drill attack</span></a><span data-dcnode-id="1316" instrument_node="">, her onscreen appearance consisting only of one arm and upper body... The only gameplay difference is that she can turn to face either direction, as opposed to Apocalypse, who was </span><a class="twikilink" data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AchillesHeel" title="/pmwiki/pmwiki.php/Main/AchillesHeel"><span data-dcnode-id="1315" instrument_node="">easy pickings</span></a><span data-dcnode-id="1313" instrument_node=""> once you got behind him.</span><ul data-dcnode-id="1310"><li data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node=""> Getting there is another story entirely. GIANT UPPER!!!!!</span></li></ul></li><li data-dcnode-id="1301"><span data-dcnode-id="1308" instrument_node=""> From the </span><em data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">All Around TYPE-MOON</span></em><span data-dcnode-id="1305" instrument_node=""> drama CD comes Ryougi calling Arcueid "stupid woman" in her victory quote, as well as </span><em data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">"This is the answer -de gozaru!"</span></em><span data-dcnode-id="1302" instrument_node=""> after a Last Arc Finish.</span></li></ul></li><li data-dcnode-id="1260"><span data-dcnode-id="1298" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlidingScaleOfSillinessVersusSeriousness" title="/pmwiki/pmwiki.php/Main/SlidingScaleOfSillinessVersusSeriousness"><span data-dcnode-id="1297" instrument_node="">Sliding Scale of Silliness vs. Seriousness</span></a><span data-dcnode-id="1295" instrument_node="">: Within the same game, there's two "modes" of reality. One is completely serious, the grimdark world of </span><em data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Tsukihime</span></em><span data-dcnode-id="1292" instrument_node=""> and all. The other has super deformed catgirls and catboys, mecha-maids, Magical Amber, and Giant Akiha. Satsuki has to put up with both.</span><ul data-dcnode-id="1261"><li data-dcnode-id="1281"><span data-dcnode-id="1291" instrument_node=""> In fact, it has gone so out of control that there are </span><em data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">two</span></em><span data-dcnode-id="1288" instrument_node=""> manga adaptations : </span><em data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Melty Blood</span></em><span data-dcnode-id="1285" instrument_node="">, that puts up with the Sion/Wallachia serious storyline, and </span><em data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Melty Blood ACT Two</span></em><span data-dcnode-id="1282" instrument_node="">, which follows the raw silliness of Miyako and Kohaku's antics.</span></li><li data-dcnode-id="1262"><span data-dcnode-id="1280" instrument_node=""> In general, if we include an </span><a class="twikilink" data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AffectionateParody" title="/pmwiki/pmwiki.php/Main/AffectionateParody"><span data-dcnode-id="1279" instrument_node="">Affectionate Parody</span></a><span data-dcnode-id="1277" instrument_node=""> named </span><em data-dcnode-id="1274"><a class="twikilink" data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/CarnivalPhantasm" title="/pmwiki/pmwiki.php/Anime/CarnivalPhantasm"><span data-dcnode-id="1276" instrument_node="">Carnival Phantasm</span></a></em><span data-dcnode-id="1273" instrument_node="">, we might place </span><em data-dcnode-id="1270"><a class="twikilink" data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Tsukihime" title="/pmwiki/pmwiki.php/VisualNovel/Tsukihime"><span data-dcnode-id="1272" instrument_node="">Tsukihime</span></a></em><span data-dcnode-id="1269" instrument_node=""> in the serious extreme, and </span><em data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Carnival Phantasm</span></em><span data-dcnode-id="1266" instrument_node=""> in the silly extreme, with </span><em data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Melty Blood</span></em><span data-dcnode-id="1263" instrument_node=""> in the middle.</span></li></ul></li><li data-dcnode-id="1255"><span data-dcnode-id="1259" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SharedLifeMeter" title="/pmwiki/pmwiki.php/Main/SharedLifeMeter"><span data-dcnode-id="1258" instrument_node="">Shared Life Meter</span></a><span data-dcnode-id="1256" instrument_node="">: Hisui &amp; Kohaku, when fighting together, share the same life bar, and it depletes regardless on who's in charge. Should they be KO'ed, the girl receiving the last blow will be the one who is knocked down, while the other laments the defeat.</span></li><li data-dcnode-id="1239"><span data-dcnode-id="1254" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SNKBoss" title="/pmwiki/pmwiki.php/Main/SNKBoss"><span data-dcnode-id="1253" instrument_node="">SNK Boss</span></a><span data-dcnode-id="1251" instrument_node="">: Certain non-playable characters verge on this (Executioner Ciel, G-Akiha, etc...)</span><ul data-dcnode-id="1240"><li data-dcnode-id="1246"><span data-dcnode-id="1250" instrument_node=""> Mech-Hisui, but that's namely </span><a class="twikilink" data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AxeCrazy" title="/pmwiki/pmwiki.php/Main/AxeCrazy"><span data-dcnode-id="1249" instrument_node="">due to her playstyle</span></a><span data-dcnode-id="1247" instrument_node="">.</span></li><li data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1243" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1244" instrument_node=""> Archetype:Earth pre-Current Code definitely qualifies with insane frame advantage, high damage output and defense, an exclusive Moon Style (Eclipse) which allows her to Circuit Spark even if she's not in Max Mode and automatically refills her Magic Circuit gauge and not to mention her damn infinite combo.</span></span><span data-dcnode-id="1242" instrument_node=""> Largely why she's banned in tournament play.</span></li></ul></li><li data-dcnode-id="1228"><span data-dcnode-id="1238" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpellMyNameWithAnS" title="/pmwiki/pmwiki.php/Main/SpellMyNameWithAnS"><span data-dcnode-id="1237" instrument_node="">Spell My Name with an "S"</span></a><span data-dcnode-id="1235" instrument_node="">: The Neco characters. Is it Ne</span><em data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">c</span></em><span data-dcnode-id="1232" instrument_node="">o or Ne</span><em data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">k</span></em><span data-dcnode-id="1229" instrument_node="">o? Most people can't seem to agree on it (there are even examples of it on this very page), though most people use Neco. Interestingly, their names are spelt as Neko in Japanese, while TYPE-MOON decided to romanize it as Neco for the English translations.</span></li><li data-dcnode-id="1223"><span data-dcnode-id="1227" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperDeformed" title="/pmwiki/pmwiki.php/Main/SuperDeformed"><span data-dcnode-id="1226" instrument_node="">Super-Deformed</span></a><span data-dcnode-id="1224" instrument_node="">: Neco-Arc and Neco-Arc Chaos.</span></li><li data-dcnode-id="1215"><span data-dcnode-id="1222" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperpoweredEvilSide" title="/pmwiki/pmwiki.php/Main/SuperpoweredEvilSide"><span data-dcnode-id="1221" instrument_node="">Superpowered Evil Side</span></a><span data-dcnode-id="1219" instrument_node="">: Vermilion Akiha and Sion Tatari. Also, see </span><a class="twikilink" data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnemyWithin" title="/pmwiki/pmwiki.php/Main/EnemyWithin"><span data-dcnode-id="1218" instrument_node="">Enemy Within</span></a><span data-dcnode-id="1216" instrument_node=""> above.</span></li><li data-dcnode-id="1204"><span data-dcnode-id="1214" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuspiciouslySimilarSubstitute" title="/pmwiki/pmwiki.php/Main/SuspiciouslySimilarSubstitute"><span data-dcnode-id="1213" instrument_node="">Suspiciously Similar Substitute</span></a><span data-dcnode-id="1211" instrument_node="">: In terms of function, </span><span class="spoiler" data-dcnode-id="1209" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1210" instrument_node="">White Len for Wallachia</span></span><span data-dcnode-id="1208" instrument_node=""> in </span><em data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Act Cadenza</span></em><span data-dcnode-id="1205" instrument_node="">; they are very different otherwise.</span></li><li data-dcnode-id="1196"><span data-dcnode-id="1203" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TagTeamTwins" title="/pmwiki/pmwiki.php/Main/TagTeamTwins"><span data-dcnode-id="1202" instrument_node="">Tag Team Twins</span></a><span data-dcnode-id="1200" instrument_node="">: Hisui and Kohaku can fight solo, or together as a team: </span><a class="twikilink" data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SharedLifeMeter" title="/pmwiki/pmwiki.php/Main/SharedLifeMeter"><span data-dcnode-id="1199" instrument_node="">They share the same life bar</span></a><span data-dcnode-id="1197" instrument_node="">, you play one at a time (with the other providing some special moves) but you can change them at any time; they even have an Arc Drive move where they can stun their opponent on place, and proceed to beat him/her up.</span></li><li data-dcnode-id="1172"><span data-dcnode-id="1195" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimeTravel" title="/pmwiki/pmwiki.php/Main/TimeTravel"><span data-dcnode-id="1194" instrument_node="">Time Travel</span></a><span data-dcnode-id="1192" instrument_node="">: The first Tatari is </span><a class="twikilink" data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NighInvulnerable" title="/pmwiki/pmwiki.php/Main/NighInvulnerable"><span data-dcnode-id="1191" instrument_node="">Nigh-Invulnerable</span></a><span data-dcnode-id="1189" instrument_node=""> unless his </span><a class="twikilink" data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurseEscapeClause" title="/pmwiki/pmwiki.php/Main/CurseEscapeClause"><span data-dcnode-id="1188" instrument_node="">Curse Escape Clause</span></a><span data-dcnode-id="1186" instrument_node=""> is met. </span><span class="spoiler" data-dcnode-id="1184" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1185" instrument_node=""> The Red Moon shines down on him. Since this won't happen until 1000 years or so; Arcueid reaches forward in time and pulls the moon temporarily to the present; so that Shiki or Sion can destroy him permanently.</span></span><ul data-dcnode-id="1173"><li data-dcnode-id="1174"><span data-dcnode-id="1183" instrument_node=""> This leads to the events of </span><em data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Actress Again</span></em><span data-dcnode-id="1180" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1176" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1179" instrument_node=""> in the alternate future that Arcueid pulled the moon from; humanity died and only the Dust Of Osiris was left. She follows the moon to the present and decides she'll end the world </span><em data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">now</span></em></span><span data-dcnode-id="1175" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1150"><span data-dcnode-id="1171" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TitleDrop" title="/pmwiki/pmwiki.php/Main/TitleDrop"><span data-dcnode-id="1170" instrument_node="">Title Drop</span></a><span data-dcnode-id="1168" instrument_node="">: Arcueid's Blood Heat Arc Drive is called "Melty Blood." Though Arc is the main heroine of the franchise, Sion is technically the main heroine of this spin-off, not that it really matters given the nature of this game.</span><ul data-dcnode-id="1151"><li data-dcnode-id="1152"><span data-dcnode-id="1167" instrument_node=""> There is also the stage in which </span><a class="twikilink" data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="1166" instrument_node="">the Dust of Osiris</span></a><span data-dcnode-id="1164" instrument_node=""> is fought in </span><em data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Actress Again</span></em><span data-dcnode-id="1161" instrument_node="">, "</span><a class="twikilink" data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Alchemy" title="/pmwiki/pmwiki.php/UsefulNotes/Alchemy"><span data-dcnode-id="1160" instrument_node="">Emerald Table</span></a><span data-dcnode-id="1158" instrument_node="">: Melty Blood Texture;" </span><span class="spoiler" data-dcnode-id="1153" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1157" instrument_node="">the </span><a class="twikilink" data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlternateUniverse" title="/pmwiki/pmwiki.php/Main/AlternateUniverse"><span data-dcnode-id="1156" instrument_node="">Alternate Universe</span></a><span data-dcnode-id="1154" instrument_node=""> in which most of humanity has perished and has been turned into Philosopher's Stones (which make up the blood-red sand in the background) that are used to empower TATARI.</span></span></li></ul></li><li data-dcnode-id="1145"><span data-dcnode-id="1149" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooSpicyForYogSothoth" title="/pmwiki/pmwiki.php/Main/TooSpicyForYogSothoth"><span data-dcnode-id="1148" instrument_node="">Too Spicy for Yog-Sothoth</span></a><span data-dcnode-id="1146" instrument_node="">: In Nero Chao's win quote against Kohaku, he tells her he will spare her life and she should leave. It really has to mean something if the embodiment of chaos, who usually eats and devours his victims, tells you to leave because his beasts have trouble dealing with you.</span></li></ul><ul data-dcnode-id="1017"><li data-dcnode-id="1130"><span data-dcnode-id="1142" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VampireRefugee" title="/pmwiki/pmwiki.php/Main/VampireRefugee"><span data-dcnode-id="1141" instrument_node="">Vampire Refugee</span></a><span data-dcnode-id="1139" instrument_node="">: Sion is actively looking to reverse her vampirism, and despite her </span><a class="twikilink" data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperPoweredEvilSide" title="/pmwiki/pmwiki.php/Main/SuperPoweredEvilSide"><span data-dcnode-id="1138" instrument_node="">Superpowered Evil Side</span></a><span data-dcnode-id="1136" instrument_node="">; does manage to handle most of the symptoms quite well in her "good" storyline; though Arcueid says an outright "cure" is impossible.</span><ul data-dcnode-id="1131"><li data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node=""> Sion falls and falls hard in her "V. Sion" story branch.</span></li><li data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node=""> Vampire Sion's summons in-game are actually her friends and are "good" (Riesbyfe, Arcueid, Akiha, Satsuki, Ciel), as opposed to Wallachia's summons of Tatari "villains" (Red Arcueid, Nero Chaos, Shiki Nanaya and Vermillion Akiha).</span></li></ul></li><li data-dcnode-id="1125"><span data-dcnode-id="1129" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TechnoBabble" title="/pmwiki/pmwiki.php/Main/TechnoBabble"><span data-dcnode-id="1128" instrument_node="">Techno Babble</span></a><span data-dcnode-id="1126" instrument_node="">: Sion with the Etherlite in the storyline.</span></li><li data-dcnode-id="1120"><span data-dcnode-id="1124" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TournamentPlay" title="/pmwiki/pmwiki.php/Main/TournamentPlay"><span data-dcnode-id="1123" instrument_node="">Tournament Play</span></a><span data-dcnode-id="1121" instrument_node="">: Popular with arcade and PC versions. Was part of the Super Battle Opera tournament lineup in 2006, 2007, 2008 and 2010 and Evo 2010, and is considered one of the most balanced 2D fighters ever made.</span></li><li data-dcnode-id="1115"><span data-dcnode-id="1119" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Tsundere" title="/pmwiki/pmwiki.php/Main/Tsundere"><span data-dcnode-id="1118" instrument_node="">Tsundere</span></a><span data-dcnode-id="1116" instrument_node="">: Akiha, White Len. Sion probably counts as well towards Shiki at times.</span></li><li data-dcnode-id="1101"><span data-dcnode-id="1114" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnexpectedGameplayChange" title="/pmwiki/pmwiki.php/Main/UnexpectedGameplayChange"><span data-dcnode-id="1113" instrument_node="">Unexpected Gameplay Change</span></a><span data-dcnode-id="1111" instrument_node="">: In </span><em data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Current Code</span></em><span data-dcnode-id="1108" instrument_node="">, playing as </span><span class="spoiler" data-dcnode-id="1106" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1107" instrument_node=""> Archetype:Earth</span></span><span data-dcnode-id="1105" instrument_node=""> through the arcade mode will pit you against 10 stages instead of the usual 9. Also, on the last stage, </span><span class="spoiler" data-dcnode-id="1103" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1104" instrument_node=""> you suddenly get to control Arcueid, fighting Archetype:Earth as the final boss</span></span><span data-dcnode-id="1102" instrument_node="">.</span></li><li data-dcnode-id="1081"><span data-dcnode-id="1100" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ViolentlyProtectiveGirlfriend" title="/pmwiki/pmwiki.php/Main/ViolentlyProtectiveGirlfriend"><span data-dcnode-id="1099" instrument_node="">Violently Protective Girlfriend</span></a><span data-dcnode-id="1097" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1095" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1096" instrument_node=""> Archetype:Earth!</span></span><span data-dcnode-id="1094" instrument_node="">Arcueid. Although her 'girlfriend' status is questionable, </span><span class="spoiler" data-dcnode-id="1092" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1093" instrument_node=""> when Ryougi Shiki kills Tohno Shiki at the end of her story route in Actress Again, the exchange below occurs. Despite the fact that Archetype:Earth claims not to have anything resembling sentimentality, the sight of Tohno's corpse is enough for her to have the desire to kill Ryougi.</span></span><div class="indent" data-dcnode-id="1082"><strong data-dcnode-id="1088"><span class="spoiler" data-dcnode-id="1090" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1091" instrument_node=""> Archetype:Earth</span></span><span data-dcnode-id="1089" instrument_node="">:</span></strong><span data-dcnode-id="1087" instrument_node=""> Looking at those battered limbs, an awful smile comes over me. Therefore, I am willing to buy into this challenge. </span><br data-dcnode-id="1086"><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Ryougi Shiki:</span></strong><span data-dcnode-id="1083" instrument_node=""> Heh, is this vengeance for that weird person a while back?</span></div></li><li data-dcnode-id="1076"><span data-dcnode-id="1080" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WallJump" title="/pmwiki/pmwiki.php/Main/WallJump"><span data-dcnode-id="1079" instrument_node="">Wall Jump</span></a><span data-dcnode-id="1077" instrument_node="">: Ciel, who can then throw a projectile or go for a kick.</span></li><li data-dcnode-id="1058"><span data-dcnode-id="1075" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WaveMotionGun" title="/pmwiki/pmwiki.php/Main/WaveMotionGun"><span data-dcnode-id="1074" instrument_node="">Wave-Motion Gun</span></a><span data-dcnode-id="1072" instrument_node="">: Sion's Black Barrel Replica, which is a lesser copy of the </span><a class="twikilink" data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="1071" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="1069" instrument_node=""> fighting weapon from </span><em data-dcnode-id="1066"><a class="twikilink" data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/AngelNotes" title="/pmwiki/pmwiki.php/Literature/AngelNotes"><span data-dcnode-id="1068" instrument_node="">Angel Notes</span></a></em><span data-dcnode-id="1065" instrument_node="">.</span><ul data-dcnode-id="1059"><li data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node=""> Aoko has wave motion </span><em data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">finger</span></em><span data-dcnode-id="1061" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1044"><span data-dcnode-id="1057" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeirdnessCensor" title="/pmwiki/pmwiki.php/Main/WeirdnessCensor"><span data-dcnode-id="1056" instrument_node="">Weirdness Censor</span></a><span data-dcnode-id="1054" instrument_node="">: Inverted. People noticing </span><a class="twikilink" data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UrbanLegends" title="/pmwiki/pmwiki.php/Main/UrbanLegends"><span data-dcnode-id="1053" instrument_node="">strangeness that isn't there</span></a><span data-dcnode-id="1051" instrument_node=""> actually </span><em data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">causes</span></em><span data-dcnode-id="1048" instrument_node=""> the </span><a class="twikilink" data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1047" instrument_node="">Big Bad</span></a><span data-dcnode-id="1045" instrument_node=""> to appear. It would be hard to explain.</span></li><li data-dcnode-id="1039"><span data-dcnode-id="1043" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WritersCanNotDoMath" title="/pmwiki/pmwiki.php/Main/WritersCanNotDoMath"><span data-dcnode-id="1042" instrument_node="">Writers Can Not Do Math</span></a><span data-dcnode-id="1040" instrument_node="">: Despite being called Seventeen Piece Dissection, Shiki's Another Arc Drive hits seventeen times. Go on, try cutting something seventeen times and see how many pieces you get.</span></li><li data-dcnode-id="1025"><span data-dcnode-id="1038" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouWillBeSpared" title="/pmwiki/pmwiki.php/Main/YouWillBeSpared"><span data-dcnode-id="1037" instrument_node="">You Will Be Spared</span></a><span data-dcnode-id="1035" instrument_node="">: During </span><span class="spoiler" data-dcnode-id="1033" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1034" instrument_node=""> Archetype:Earth</span></span><span data-dcnode-id="1032" instrument_node="">'s story mode, she decides on a whim to try destroying the planet and everyone on it just to see what it's like. Before she does so, she promises that she'll spare the lives of two people - the first is, obviously, </span><a class="twikilink" data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OfficialCouple" title="/pmwiki/pmwiki.php/Main/OfficialCouple"><span data-dcnode-id="1031" instrument_node="">Shiki</span></a><span data-dcnode-id="1029" instrument_node="">, and second is her </span><a class="twikilink" data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FriendlyEnemy" title="/pmwiki/pmwiki.php/Main/FriendlyEnemy"><span data-dcnode-id="1028" instrument_node="">sort-of-enemy sort-of-friend Ciel</span></a><span data-dcnode-id="1026" instrument_node="">.</span></li><li data-dcnode-id="1018"><span data-dcnode-id="1024" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZettaiRyouiki" title="/pmwiki/pmwiki.php/Main/ZettaiRyouiki"><span data-dcnode-id="1023" instrument_node="">Zettai Ryouiki</span></a><span data-dcnode-id="1021" instrument_node="">: Sion's legs. As well as Ciel when she's with her </span><a class="twikilink" data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BFG" title="/pmwiki/pmwiki.php/Main/BFG"><span data-dcnode-id="1020" instrument_node="">BFG</span></a></li></ul><hr data-dcnode-id="1016"><span data-dcnode-id="1015" instrument_node="">
