cnode-id="1058"><span data-dcnode-id="1064" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoulPoweredEngine" title="/pmwiki/pmwiki.php/Main/SoulPoweredEngine"><span data-dcnode-id="1063" instrument_node="">Soul-Powered Engine</span></a><span data-dcnode-id="1061" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1059" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1060" instrument_node="">Hyzante manufactures Aelfric with the remains of deceased hospital patients.</span></span></li><li data-dcnode-id="1050"><span data-dcnode-id="1057" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpareToTheThrone" title="/pmwiki/pmwiki.php/Main/SpareToTheThrone"><span data-dcnode-id="1056" instrument_node="">Spare to the Throne</span></a><span data-dcnode-id="1054" instrument_node="">: In the trailer, Roland is introduced as the second son to Glenbrook's royal family. This gives him relatively high leeway as a prince since he is not succeeding the throne, but this later comes back to haunt him after Aesfrost kills off most of the royal family and puts a </span><em data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">lot</span></em><span data-dcnode-id="1051" instrument_node=""> of pressure on him as the last surviving heir.</span></li><li data-dcnode-id="1039"><span data-dcnode-id="1049" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpritePolygonMix" title="/pmwiki/pmwiki.php/Main/SpritePolygonMix"><span data-dcnode-id="1048" instrument_node="">Sprite/Polygon Mix</span></a><span data-dcnode-id="1046" instrument_node="">: The "HD-2D" aesthetic of </span><em data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Octopath</span></em><span data-dcnode-id="1043" instrument_node=""> returns, with </span><a class="twikilink" data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Retraux" title="/pmwiki/pmwiki.php/Main/Retraux"><span data-dcnode-id="1042" instrument_node="">16-bit sprites</span></a><span data-dcnode-id="1040" instrument_node=""> backed by 3D-modeled settings and modern visual effects.</span></li><li data-dcnode-id="1031"><span data-dcnode-id="1038" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SquishyWizard" title="/pmwiki/pmwiki.php/Main/SquishyWizard"><span data-dcnode-id="1037" instrument_node="">Squishy Wizard</span></a><span data-dcnode-id="1035" instrument_node="">: Enemy </span><a class="twikilink" data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MilitaryMage" title="/pmwiki/pmwiki.php/Main/MilitaryMage"><span data-dcnode-id="1034" instrument_node="">Military Mage</span></a><span data-dcnode-id="1032" instrument_node=""> units in the demos are weak to physical attacks and have low HP. The playable casters are also rather low on HP, though they lack the physical vulnerability.</span></li><li data-dcnode-id="1017"><span data-dcnode-id="1030" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoryBranching" title="/pmwiki/pmwiki.php/Main/StoryBranching"><span data-dcnode-id="1029" instrument_node="">Story Branching</span></a><span data-dcnode-id="1027" instrument_node="">: The trailer promotes player choice as a vital influence over the game's plot. The Debut Demo gives a taste of this in various ways, such as your </span><a class="twikilink" data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DialogueTree" title="/pmwiki/pmwiki.php/Main/DialogueTree"><span data-dcnode-id="1026" instrument_node="">Dialogue Tree</span></a><span data-dcnode-id="1024" instrument_node=""> choices influencing the invisible </span><a class="twikilink" data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmaMeter" title="/pmwiki/pmwiki.php/Main/KarmaMeter"><span data-dcnode-id="1023" instrument_node="">Karma Meter</span></a><span data-dcnode-id="1021" instrument_node=""> to determine what optional characters can join you right before the Chapter VII fight, a major vote in Chapter VII where the party decides whether or not to turn Prince Roland over to their enemies, and the drastically different consequences of the result. In the full game, the player is allowed to see the path they've taken via the War Chronicle, </span><a class="twikilink" data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InSpiteOfANail" title="/pmwiki/pmwiki.php/Main/InSpiteOfANail"><span data-dcnode-id="1020" instrument_node="">which also indicates points where the branches reconverge regardless of prior decisions</span></a><span data-dcnode-id="1018" instrument_node="">.</span></li><li data-dcnode-id="1012"><span data-dcnode-id="1016" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuspiciouslySmallArmy" title="/pmwiki/pmwiki.php/Main/SuspiciouslySmallArmy"><span data-dcnode-id="1015" instrument_node="">Suspiciously Small Army</span></a><span data-dcnode-id="1013" instrument_node="">: Apparently the reserve divisions with which Avlora is making a three-pronged attack in Chapter VII consist of about three men each.</span></li><li data-dcnode-id="1001"><span data-dcnode-id="1011" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeAThirdOption" title="/pmwiki/pmwiki.php/Main/TakeAThirdOption"><span data-dcnode-id="1010" instrument_node="">Take a Third Option</span></a><span data-dcnode-id="1008" instrument_node="">: When the Scales of Conviction are used in Chapter XVII (17), it determines </span><span class="spoiler" data-dcnode-id="1006" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1007" instrument_node="">whether the endgame focuses on Benedict (Utility/Liberty, causing Roland to leave), Roland (Morality/Utility, causing Frederica to leave), or Frederica (Liberty/Morality, causing Benedict to leave)</span></span><span data-dcnode-id="1005" instrument_node="">. However, </span><span class="spoiler" data-dcnode-id="1003" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1004" instrument_node="">if certain paths were taken throughout the game (Not using Wolffort's fire traps so you can use them later, transporting illegal salt for Sorsely to gain an edge on the Consortium, revealing Roland's identity to Svarog so he becomes an ally, keeping Jerrom and the Rosellans your allies to learn the truth behind the Rosellans' history, and visiting Wolffort alongside Milo so Symon can encourage Serenoa with his parting words), you can refuse to use the Scales and allow Serenoa to convince the various factions to compromise for the greater good</span></span><span data-dcnode-id="1002" instrument_node="">.</span></li><li data-dcnode-id="993"><span data-dcnode-id="1000" instrument_node=""> </span><a class="twikilink" data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TalkingToTheDead" title="/pmwiki/pmwiki.php/Main/TalkingToTheDead"><span data-dcnode-id="999" instrument_node="">Talking to the Dead</span></a><span data-dcnode-id="997" instrument_node="">: In the Liberty endgame, </span><span class="spoiler" data-dcnode-id="995" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="996" instrument_node="">Serenoa and Frederica visit Symon's grave on the eve of a meeting with Aesfrost. They then hide nearby when Benedict unexpectedly arrives to tell the grave how much he regretted letting Symon and Regna use Serenoa's mother as a political pawn, and how he's planned to make up for it by turning Serenoa into a more powerful leader than either of them were</span></span><span data-dcnode-id="994" instrument_node="">.</span></li><li data-dcnode-id="981"><span data-dcnode-id="992" instrument_node=""> </span><a class="twikilink" data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TitleThemeTune" title="/pmwiki/pmwiki.php/Main/TitleThemeTune"><span data-dcnode-id="991" instrument_node="">Title Theme Tune</span></a><span data-dcnode-id="989" instrument_node="">: The game's main theme song is titled "</span><a class="urllink" data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D6aXa0xOD5ac"><span data-dcnode-id="988" instrument_node="">Song of TRIANGLE STRATEGY</span><img data-dcnode-id="987" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="985" instrument_node="">" and, despite having Japanese lyrics, </span><a class="twikilink" data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForeignLanguageTitle" title="/pmwiki/pmwiki.php/Main/ForeignLanguageTitle"><span data-dcnode-id="984" instrument_node="">states the English title of the game at numerous points</span></a><span data-dcnode-id="982" instrument_node="">.</span></li><li data-dcnode-id="970"><span data-dcnode-id="980" instrument_node=""> </span><a class="twikilink" data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGameCaringPotential" title="/pmwiki/pmwiki.php/Main/VideoGameCaringPotential"><span data-dcnode-id="979" instrument_node="">Video Game Caring Potential</span></a><span data-dcnode-id="977" instrument_node="">: Though it increases the difficulty of the battles at hand, you can take the high road such as not burning down homes at Wolffort or in a later chapter, </span><span class="spoiler" data-dcnode-id="975" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="976" instrument_node="">refraining from flooding the Crown City of Whiteholm in the process of retaking the castle</span></span><span data-dcnode-id="974" instrument_node="">. This also crops up in the divergences such as refusing to surrender Roland or in a later chapter, </span><span class="spoiler" data-dcnode-id="972" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="973" instrument_node="">defying Hyzante’s demands to hand over the Roselle and fighting back</span></span><span data-dcnode-id="971" instrument_node="">.</span></li><li data-dcnode-id="962"><span data-dcnode-id="969" instrument_node=""> </span><a class="twikilink" data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGameCrueltyPotential" title="/pmwiki/pmwiki.php/Main/VideoGameCrueltyPotential"><span data-dcnode-id="968" instrument_node="">Video Game Cruelty Potential</span></a><span data-dcnode-id="966" instrument_node="">: The Scales of Conviction in Chapter VII allows the player to hand over Roland, and you can </span><a class="twikilink" data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KickTheDog" title="/pmwiki/pmwiki.php/Main/KickTheDog"><span data-dcnode-id="965" instrument_node="">Kick the Dog</span></a><span data-dcnode-id="963" instrument_node=""> by convincing him or other people to not do so. If you say the right things, you can even make said vote a unanimous decision (which would actually include Roland himself).</span></li><li data-dcnode-id="954"><span data-dcnode-id="961" instrument_node=""> </span><a class="twikilink" data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeCannotGoOnWithoutYou" title="/pmwiki/pmwiki.php/Main/WeCannotGoOnWithoutYou"><span data-dcnode-id="960" instrument_node="">We Cannot Go On Without You</span></a><span data-dcnode-id="958" instrument_node="">: In Chapter VI, if Roland bites it, it's an immediate </span><a class="twikilink" data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameOver" title="/pmwiki/pmwiki.php/Main/GameOver"><span data-dcnode-id="957" instrument_node="">Game Over</span></a><span data-dcnode-id="955" instrument_node="">.</span></li><li data-dcnode-id="947"><span data-dcnode-id="953" instrument_node=""> </span><a class="twikilink" data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamEpisode" title="/pmwiki/pmwiki.php/Main/WhamEpisode"><span data-dcnode-id="952" instrument_node="">Wham Episode</span></a><span data-dcnode-id="950" instrument_node="">: Regardless of the path chosen, the end of Chapter XV is a severe blow to Serenoa and his major allies. </span><span class="spoiler" data-dcnode-id="948" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="949" instrument_node="">Frederica learns the truth behind Rosellan enslavement and vows to liberate them at any cost; Roland's morality falls to pieces as he deals with the Royalist faction; and either Benedict or Symon reveals to Serenoa that he's actually Regna's son and the true heir of Glenbrook.</span></span></li><li data-dcnode-id="934"><span data-dcnode-id="946" instrument_node=""> </span><a class="twikilink" data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatTheHellHero" title="/pmwiki/pmwiki.php/Main/WhatTheHellHero"><span data-dcnode-id="945" instrument_node="">What the Hell, Hero?</span></a><span data-dcnode-id="943" instrument_node="">: This comes strangely from Avlora if you defeat her by using the secret traps against her forces. She will call you and your allies bastards for going so far to win the fight. Same if you choose to defect to Hyzante when Aesfrost directs you to attack them in the path where you give Roland over to Aesfrost, she feels genuinely betrayed that you would side with the supposed enemy.</span><ul data-dcnode-id="935"><li data-dcnode-id="936"><span data-dcnode-id="942" instrument_node=""> During the endgame, </span><span class="spoiler" data-dcnode-id="937" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="941" instrument_node="">unless you are able to follow the </span><a class="twikilink" data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="940" instrument_node="">Golden Ending</span></a><span data-dcnode-id="938" instrument_node=""> route, you will receive this from either Roland, Frederica, or Benedict depending on which path you choose. They will be infuriated enough by the group's decision to ignore the Scales of Conviction and attempt to make Serenoa change his mind by physical force, forcing Serenoa to fight them in combat while they call him out for his decision (though in Frederica's case, he really just endures her fire magic, never actually striking her). Upon their defeat, Roland and Frederica leave the party and House Wolffort forever; Benedict also leaves the party, though largely upon Serenoa's command for him to take care of the people of the Wolffort demesne in case he, Serenoa, is unable to return due to reprisals from Hyzante or Aesfrost, which Benedict agrees to.</span></span></li></ul></li><li data-dcnode-id="929"><span data-dcnode-id="933" instrument_node=""> </span><a class="twikilink" data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatTheHellPlayer" title="/pmwiki/pmwiki.php/Main/WhatTheHellPlayer"><span data-dcnode-id="932" instrument_node="">What the Hell, Player?</span></a><span data-dcnode-id="930" instrument_node="">: If you persuade your allies to vote one way during the Scales of Conviction vote only to vote against them, they will castigate you; either appalled that you toyed with them or questioning the strength of your own convictions.</span></li><li data-dcnode-id="919"><span data-dcnode-id="928" instrument_node=""> </span><a class="twikilink" data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheWindowOrTheStairs" title="/pmwiki/pmwiki.php/Main/TheWindowOrTheStairs"><span data-dcnode-id="927" instrument_node="">The Window or the Stairs</span></a><span data-dcnode-id="925" instrument_node="">: In Chapter VII, when faced with the </span><a class="twikilink" data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SadisticChoice" title="/pmwiki/pmwiki.php/Main/SadisticChoice"><span data-dcnode-id="924" instrument_node="">Sadistic Choice</span></a><span data-dcnode-id="922" instrument_node=""> of whether or not to surrender Roland, most of the characters think it'll be easier to capitulate to the Aesfrosti. It also seems like the chance to avoid fighting Avlora. </span><span class="spoiler" data-dcnode-id="920" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="921" instrument_node="">Doing so means you lose Serenoa's childhood friend, you have to fight the army of a former ally, and the country is devastated. Fighting to defend Roland gives a much more hopeful outcome.</span></span></li><li data-dcnode-id="909"><span data-dcnode-id="918" instrument_node=""> </span><a class="twikilink" data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheWorfEffect" title="/pmwiki/pmwiki.php/Main/TheWorfEffect"><span data-dcnode-id="917" instrument_node="">The Worf Effect</span></a><span data-dcnode-id="915" instrument_node="">: Ser Maxwell is known in Glenbrook as one of the most powerful warriors in Norzelia, worthy of the nickname </span><a class="twikilink" data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RedBaron" title="/pmwiki/pmwiki.php/Main/RedBaron"><span data-dcnode-id="914" instrument_node="">"The Dawnspear"</span></a><span data-dcnode-id="912" instrument_node="">. At the end of Chapter VI, he launches a mighty attack against Avlora's elite squadron, wiping out most of them in a single blow. </span><span class="spoiler" data-dcnode-id="910" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="911" instrument_node="">Unfortunately, Avlora herself still stands, and smites Maxwell with an even stronger attack that gravely wounds him, though it's ambiguous if he is killed.</span></span></li><li data-dcnode-id="889"><span data-dcnode-id="908" instrument_node=""> </span><a class="twikilink" data-dcnode-id="906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldHalfFull" title="/pmwiki/pmwiki.php/Main/WorldHalfFull"><span data-dcnode-id="907" instrument_node="">World Half Full</span></a><span data-dcnode-id="905" instrument_node="">: The two factors most holding Norzelia from positive sociological progress are limited resources and the inherent selfishness of people; it’s eventually revealed that a lot of the conflict came about because </span><span class="spoiler" data-dcnode-id="903" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="904" instrument_node="">Hyzante built its whole identity on their abundance of salt</span></span><span data-dcnode-id="902" instrument_node="">, to the point that </span><span class="spoiler" data-dcnode-id="900" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="901" instrument_node="">they enslaved the Roselle to prevent the truth about it being mineable from coming out so they could remain wealthy based on their monopoly, even fabricating their caste-based religion to enforce it</span></span><span data-dcnode-id="899" instrument_node="">. </span><span class="spoiler" data-dcnode-id="897" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="898" instrument_node="">Idore Delmira</span></span><span data-dcnode-id="896" instrument_node=""> admits that he lost his faith in the inherent goodness of both people and an inherent ideal of morality when his prayers were unanswered, and concluded that people needed to be controlled for their own good; however, the </span><a class="twikilink" data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="895" instrument_node="">Golden Ending</span></a><span data-dcnode-id="893" instrument_node=""> proves him wrong as </span><span class="spoiler" data-dcnode-id="891" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="892" instrument_node="">a unified goal in the leadership in Norzelia’s nations enables the land to finally prosper in the creation of a just and fair society where people always strive to improve the world rather than tear it apart for short-sighted gains</span></span><span data-dcnode-id="890" instrument_node="">.</span></li><li data-dcnode-id="884"><span data-dcnode-id="888" instrument_node=""> </span><a class="twikilink" data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouHaveFailedMe" title="/pmwiki/pmwiki.php/Main/YouHaveFailedMe"><span data-dcnode-id="887" instrument_node="">You Have Failed Me</span></a><span data-dcnode-id="885" instrument_node="">: Gustadolph's siblings threaten Avlora with this, but the Archduke averts it if she loses - he just tells her to calm down and try again. Then again, it is implied that he adopted her or in some other way handpicked her.</span></li></ul><p data-dcnode-id="882"></p><hr data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">
