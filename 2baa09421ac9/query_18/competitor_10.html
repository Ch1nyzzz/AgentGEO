ir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FromBadToWorse" title="/pmwiki/pmwiki.php/Main/FromBadToWorse"><span data-dcnode-id="1733" instrument_node="">From Bad to Worse</span></a><span data-dcnode-id="1731" instrument_node="">: Chapter VII gives you the option of choosing whether or not to surrender Roland to Aesfrost. </span><span class="spoiler" data-dcnode-id="1726" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1730" instrument_node="">Doing so has </span><em data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">severe</span></em><span data-dcnode-id="1727" instrument_node=""> consequences; Aesfrost captures both the Prince and two of the three High Houses, then the Archduke forces Roland to send Wolffort to attack House Falkes. Falkes destroys the entire countryside in the ensuing battle, and promptly after the party discovers that the Archduke intends to have Roland executed for his "crimes".</span></span></li><li data-dcnode-id="1697"><span data-dcnode-id="1724" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStoryIntegration" title="/pmwiki/pmwiki.php/Main/GameplayAndStoryIntegration"><span data-dcnode-id="1723" instrument_node="">Gameplay and Story Integration</span></a><span data-dcnode-id="1721" instrument_node="">: In the Utilized Moral Ending </span><span class="spoiler" data-dcnode-id="1719" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1720" instrument_node=""> Frederica leaves the party due to conflicting motives</span></span><span data-dcnode-id="1718" instrument_node="">. Should the player check the encampment, they'll see that the mock battle </span><span class="spoiler" data-dcnode-id="1716" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1717" instrument_node=""> where Frederica is required to deploy</span></span><span data-dcnode-id="1715" instrument_node=""> is no longer available.</span><ul data-dcnode-id="1698"><li data-dcnode-id="1704"><span data-dcnode-id="1714" instrument_node=""> On </span><a class="twikilink" data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="1713" instrument_node="">New Game+</span></a><span data-dcnode-id="1711" instrument_node="">, while you carry over units and can mostly have them deployed </span><a class="twikilink" data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation" title="/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation"><span data-dcnode-id="1710" instrument_node="">even if narratively it’s non-compatible</span></a><span data-dcnode-id="1708" instrument_node="">, you cannot deploy duplicate of units featuring on certain maps. This includes Cordelia on Chapter II (as she’s a spectator of the tournament); Travis and/or Trish on Chapters IX and Chapter XV Liberty; and </span><span class="spoiler" data-dcnode-id="1706" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1707" instrument_node="">Avlora on Chapter VII Morality, Chapter VIII’s two Utility route maps, and Chapter XIV’s Liberty and Morality maps</span></span><span data-dcnode-id="1705" instrument_node="">.</span></li><li data-dcnode-id="1699"><span data-dcnode-id="1703" instrument_node=""> Additionally, the game gives </span><a class="twikilink" data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MutuallyExclusivePartyMembers" title="/pmwiki/pmwiki.php/Main/MutuallyExclusivePartyMembers"><span data-dcnode-id="1702" instrument_node="">Mutually Exclusive Party Members</span></a><span data-dcnode-id="1700" instrument_node=""> some narrative leeway, such that you can argue that Rudolph/Corentin joins the army later, even if their home country wasn’t visited in Chapter III, or that the Chapter XV units can all be said to have joined the Wolffort army under variations of their respective routes (as they all happen concurrently regardless).</span></li></ul></li><li data-dcnode-id="1686"><span data-dcnode-id="1696" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation" title="/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation"><span data-dcnode-id="1695" instrument_node="">Gameplay and Story Segregation</span></a><span data-dcnode-id="1693" instrument_node="">: The </span><a class="twikilink" data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="1692" instrument_node="">New Game+</span></a><span data-dcnode-id="1690" instrument_node=""> allows the player to use units they've recruited in a previous playthrough. As early as Chapter 2, they can use characters like </span><span class="spoiler" data-dcnode-id="1688" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1689" instrument_node=""> Maxwell, Avlora, and Travis to name a few</span></span><span data-dcnode-id="1687" instrument_node=""> despite being away from the party in the main story.</span></li><li data-dcnode-id="1670"><span data-dcnode-id="1685" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenderEqualEnsemble" title="/pmwiki/pmwiki.php/Main/GenderEqualEnsemble"><span data-dcnode-id="1684" instrument_node="">Gender-Equal Ensemble</span></a><span data-dcnode-id="1682" instrument_node="">: The main party is comprised of four men (Serenoa, Roland, Benedict, and Erador) and four women (Frederica, Geela, Anna, and Hughette). The entire roster also becomes this if the player considers Decimal as female.</span><ul data-dcnode-id="1671"><li data-dcnode-id="1677"><span data-dcnode-id="1681" instrument_node=""> For men, we have Serenoa, Roland, Benedict, Erador, Corentin, Rudolph, Julio, Narve, Lionel, Jens, Archibald, Flanagan, Quahaug, </span><span class="spoiler" data-dcnode-id="1679" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1680" instrument_node=""> Travis, and Maxwell</span></span><span data-dcnode-id="1678" instrument_node="">.</span></li><li data-dcnode-id="1672"><span data-dcnode-id="1676" instrument_node=""> For women, we have Frederica, Geela, Anna, Hughette, Hossabara, Ezana, Medina, Picoletta, Groma, Decimal, Giovanna, </span><span class="spoiler" data-dcnode-id="1674" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1675" instrument_node=""> Cordelia, Milo, Trish, and Avlora</span></span><span data-dcnode-id="1673" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1653"><span data-dcnode-id="1669" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GeoEffects" title="/pmwiki/pmwiki.php/Main/GeoEffects"><span data-dcnode-id="1668" instrument_node="">Geo Effects</span></a><span data-dcnode-id="1666" instrument_node="">:</span><ul data-dcnode-id="1654"><li data-dcnode-id="1661"><span data-dcnode-id="1665" instrument_node=""> The game's trailer places emphasis on manipulating the environment to your advantage, such as igniting dry grass with fire magic, casting ice magic to have the fire melt the ice into water, then casting lightning magic to electrify the water and deal </span><a class="twikilink" data-dcnode-id="1663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AreaOfEffect" title="/pmwiki/pmwiki.php/Main/AreaOfEffect"><span data-dcnode-id="1664" instrument_node="">Area of Effect</span></a><span data-dcnode-id="1662" instrument_node=""> damage to all enemies standing in the resulting puddle. Another instance involves using fire magic to burn down a house on the field to clear a path.</span></li><li data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node=""> The demos place heavy emphasis on height as an advantageous property. Units with ranged weapons like Bows can gain additional range while attacking from a tile higher than other targets. Serenoa's Hawk Dive ability gains a scaling damage boost depending on the height of the tile he's standing on relative to that of the target's, and Anna's Surmount allows her to expend an action to move to an adjacent tile up to 15 height units from her current tile.</span></li><li data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node=""> The Debut Demo also has Corentin, whose passive ability "TP+ on Ice" gives him an additional TP every turn if he's standing on a Frozen tile.</span></li><li data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node=""> Giovanna, as a geologist, depends on the tile she's standing on to use her skills. Puddles allow her to heal allies, wheat and grasslands allow her to conjure vines to attack the enemy, etc.</span></li></ul></li><li data-dcnode-id="1648"><span data-dcnode-id="1652" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiantFlyer" title="/pmwiki/pmwiki.php/Main/GiantFlyer"><span data-dcnode-id="1651" instrument_node="">Giant Flyer</span></a><span data-dcnode-id="1649" instrument_node="">: One of the continent’s most unique fauna is the greathawk, a horse-sized avian with wings strong enough to carry an adult rider without straining itself. Lore notes mention that they were once numerous in the south Glenbrook forests but due to habitat loss they’re most populous in the Aesfrosti mountains nowadays, and being more suited to the climate than horses they’re a favoured mount of the military. Though they aren’t all-around ideal for every situation; in Chapter VI, if Serenoa suggest that Hughette fly Roland to safety with Flugie, she notes that he would strain under multiple passengers and fly much slower, which would make them an obvious target for archers and other scouts.</span></li><li data-dcnode-id="1632"><span data-dcnode-id="1647" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodzillaThreshold" title="/pmwiki/pmwiki.php/Main/GodzillaThreshold"><span data-dcnode-id="1646" instrument_node="">Godzilla Threshold</span></a><span data-dcnode-id="1644" instrument_node="">: In Chapter VII, during the chapter's Persuasion Phase you can learn from a guard about House Wolffort's "secret weapon", a special attribute of the mountain that has the power to repel any attacker. If you want to avoid surrendering Roland to Aesfrost, you can use this knowledge to greatly sway most party members over to your side. </span><span class="spoiler" data-dcnode-id="1642" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1643" instrument_node="">If the party chooses to fight back, Benedict reveals that the "secret weapon" involves flooding the mountain's channels with oil and setting it alight, causing mass destruction and harming both friend and foe alike. Frederica and Roland are understandably horrified that their backup option is destroying the land of innocent people and putting their lives at risk, but Benedict and Serenoa remind them that this is the choice they've made.</span></span><span data-dcnode-id="1641" instrument_node=""> Can be subverted, as you don't </span><em data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">have</span></em><span data-dcnode-id="1638" instrument_node=""> to make use of this in order to beat the scenario, and the characters will show relief that they didn't need to resort to this if you manage to do so. </span><span class="spoiler" data-dcnode-id="1633" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1637" instrument_node="">Fighting back but not using the "secret weapon" is also a necessary part of getting the </span><a class="twikilink" data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1636" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1634" instrument_node="">.</span></span></li><li data-dcnode-id="1627"><span data-dcnode-id="1631" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuestStarPartyMember" title="/pmwiki/pmwiki.php/Main/GuestStarPartyMember"><span data-dcnode-id="1630" instrument_node="">Guest-Star Party Member</span></a><span data-dcnode-id="1628" instrument_node="">: You will occasionally be accompanied by AI-controlled allies in battle, such as Sycras in Chapter III on the Aesfrost route, Exharme in Chapter III on the Hyzante route, or Ser Maxwell in Chapter VI.</span></li><li data-dcnode-id="1622"><span data-dcnode-id="1626" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroAntagonist" title="/pmwiki/pmwiki.php/Main/HeroAntagonist"><span data-dcnode-id="1625" instrument_node="">Hero Antagonist</span></a><span data-dcnode-id="1623" instrument_node="">: If you choose to capitulate to Aesfrost in Chapter VII, Lord Landroi Falkes takes this role. He is just a loyal subject of the king who is opposing you because you buckled the knee to save your own hide and are now serving invading marauders.</span></li><li data-dcnode-id="1598"><span data-dcnode-id="1621" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="1620" instrument_node="">Heroic Sacrifice</span></a><span data-dcnode-id="1618" instrument_node="">:</span><ul data-dcnode-id="1599"><li data-dcnode-id="1610"><span data-dcnode-id="1617" instrument_node=""> At the end of Chapter VI, </span><span class="spoiler" data-dcnode-id="1612" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1616" instrument_node="">Maxwell decides to stay back to hold off Aesfrost's troops while Serenoa and his party escape down the river on a boat. He is seemingly struck down by Avlora, though the game invokes </span><a class="twikilink" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeverFoundTheBody" title="/pmwiki/pmwiki.php/Main/NeverFoundTheBody"><span data-dcnode-id="1615" instrument_node="">Never Found the Body</span></a><span data-dcnode-id="1613" instrument_node=""> shortly after</span></span><span data-dcnode-id="1611" instrument_node="">.</span></li><li data-dcnode-id="1605"><span data-dcnode-id="1609" instrument_node=""> Later on in Chapter VII, Roland wants to give himself up to Aesfrost to protect House Wolffort and his friends from further bloodshed. While a majority of the party is in agreement, if Serenoa gathers the right intel, he </span><em data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">can</span></em><span data-dcnode-id="1606" instrument_node=""> make Roland buckle and choose to fight back.</span></li><li data-dcnode-id="1600"><span data-dcnode-id="1604" instrument_node=""> In the Moral Freedoms ending, </span><span class="spoiler" data-dcnode-id="1602" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1603" instrument_node="">Serenoa himself does this, holding back Idore from rushing after Idore rushes after them the Roselle as a desperation attack and empowered with Alferic. Erador even pleads with Serenoa to let him take the hit, but Serenoa notices that there is no time and begs everyone to leave, and live on</span></span><span data-dcnode-id="1601" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1590"><span data-dcnode-id="1597" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HollywoodTactics" title="/pmwiki/pmwiki.php/Main/HollywoodTactics"><span data-dcnode-id="1596" instrument_node="">Hollywood Tactics</span></a><span data-dcnode-id="1594" instrument_node="">: Present in some battles, notably "Avlora's Assault" in which the alleged military genius initially sends most of her men to get bottlenecked on a single staircase instead of circling around to the other one with more than one or two men even if you leave it undefended. This seems to be intentional, making it not an example of </span><a class="twikilink" data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialStupidity" title="/pmwiki/pmwiki.php/Main/ArtificialStupidity"><span data-dcnode-id="1593" instrument_node="">Artificial Stupidity</span></a><span data-dcnode-id="1591" instrument_node="">.</span></li><li data-dcnode-id="1574"><span data-dcnode-id="1589" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HomeFieldAdvantage" title="/pmwiki/pmwiki.php/Main/HomeFieldAdvantage"><span data-dcnode-id="1588" instrument_node="">Home Field Advantage</span></a><span data-dcnode-id="1586" instrument_node="">: Depending on what you decide to do with Roland in Chapter VII:</span><ul data-dcnode-id="1575"><li data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node=""> The House Wolffort field gives a slight upper hand to the player; they start on higher ground and have access to House Wolffort's secret weapon. However, enemy archers start on rooftops that are otherwise difficult to access for grounded units.</span></li><li data-dcnode-id="1576"><span data-dcnode-id="1583" instrument_node=""> The House Falkes field is </span><em data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">substantially</span></em><span data-dcnode-id="1580" instrument_node=""> tougher; the enemies have the height advantage this time, and the bulk of their forces consists of archers and battlemages who can wittle away at your units with very little in the way of counterplay. Not to mention the boss is </span><em data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">also</span></em><span data-dcnode-id="1577" instrument_node=""> an archer who will not hesitate to tear holes through your team once he gets going.</span></li></ul></li><li data-dcnode-id="1566"><span data-dcnode-id="1573" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AHouseDivided" title="/pmwiki/pmwiki.php/Main/AHouseDivided"><span data-dcnode-id="1572" instrument_node="">A House Divided</span></a><span data-dcnode-id="1570" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Downplayed" title="/pmwiki/pmwiki.php/Main/Downplayed"><span data-dcnode-id="1569" instrument_node="">Downplayed</span></a><span data-dcnode-id="1567" instrument_node="">. In the Debut Demo / Chapter VII of the full game, the cast are divided on what to do about Roland, causing tension between more or less everyone present. However, the presence of the Scales of Conviction allows them to mostly settle their differences.</span></li><li data-dcnode-id="1561"><span data-dcnode-id="1565" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnIcePerson" title="/pmwiki/pmwiki.php/Main/AnIcePerson"><span data-dcnode-id="1564" instrument_node="">An Ice Person</span></a><span data-dcnode-id="1562" instrument_node="">: In the demos, Corentin, Aesfrosti, and Hyzante mage units.</span></li><li data-dcnode-id="1556"><span data-dcnode-id="1560" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InMediasRes" title="/pmwiki/pmwiki.php/Main/InMediasRes"><span data-dcnode-id="1559" instrument_node="">In Medias Res</span></a><span data-dcnode-id="1557" instrument_node="">: The Debut Demo starts at Chapter VI, with Aesfrost launching a surprise attack on Glenbrook and forcing the protagonists to flee with the last remaining heir to the throne, Prince Roland.</span></li><li data-dcnode-id="1548"><span data-dcnode-id="1555" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InfoDump" title="/pmwiki/pmwiki.php/Main/InfoDump"><span data-dcnode-id="1554" instrument_node="">Info Dump</span></a><span data-dcnode-id="1552" instrument_node="">: Due to the whole </span><a class="twikilink" data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InMediasRes" title="/pmwiki/pmwiki.php/Main/InMediasRes"><span data-dcnode-id="1551" instrument_node="">In Medias Res</span></a><span data-dcnode-id="1549" instrument_node=""> bit in the Debut Demo, the introductory cutscene comprises a relatively lengthy explanation about the game's setting, the backstory, and the events immediately leading up to Chapter VI, where the demo picks up.</span></li><li data-dcnode-id="1537"><span data-dcnode-id="1547" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InSpiteOfANail" title="/pmwiki/pmwiki.php/Main/InSpiteOfANail"><span data-dcnode-id="1546" instrument_node="">In Spite of a Nail</span></a><span data-dcnode-id="1544" instrument_node="">: Although your "conviction" throughout the game will determine which characters are determined and which battles are fought, a glance at the War Chronicle reveals that there are multiple points of convergence; for example, regardless of which side is taken in Chapter III, the routes reconverge for Chapter IV. The story plays out the same overall narrative beats up until the endgame where the finale breaks off to </span><a class="twikilink" data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MultipleEndings" title="/pmwiki/pmwiki.php/Main/MultipleEndings"><span data-dcnode-id="1543" instrument_node="">Multiple Endings</span></a><span data-dcnode-id="1541" instrument_node="">. However, your actions will still have long-term consequences, namely which characters are recruited and </span><span class="spoiler" data-dcnode-id="1539" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1540" instrument_node="">whether or not Serenoa can avoid using the Scales in Chapter XVII</span></span><span data-dcnode-id="1538" instrument_node="">.</span></li><li data-dcnode-id="1532"><span data-dcnode-id="1536" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IsometricProjection" title="/pmwiki/pmwiki.php/Main/IsometricProjection"><span data-dcnode-id="1535" instrument_node="">Isometric Projection</span></a><span data-dcnode-id="1533" instrument_node="">: The default view is isometric, but players have free camera control and can even swap to a top-down view.</span></li><li data-dcnode-id="1524"><span data-dcnode-id="1531" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItOnlyWorksOnce" title="/pmwiki/pmwiki.php/Main/ItOnlyWorksOnce"><span data-dcnode-id="1530" instrument_node="">It Only Works Once</span></a><span data-dcnode-id="1528" instrument_node="">: Each </span><a class="twikilink" data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LimitBreak" title="/pmwiki/pmwiki.php/Main/LimitBreak"><span data-dcnode-id="1527" instrument_node="">Quietus</span></a><span data-dcnode-id="1525" instrument_node=""> can only be used once in a given encounter.</span></li><li data-dcnode-id="1519"><span data-dcnode-id="1523" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IWantThemAlive" title="/pmwiki/pmwiki.php/Main/IWantThemAlive"><span data-dcnode-id="1522" instrument_node="">I Want Them Alive!</span></a><span data-dcnode-id="1520" instrument_node="">: In Chapter VII, Gustadolph wants Roland surrendered to him alive, and Serenoa can use this as an argument to convince his companions to capitulate.</span></li><li data-dcnode-id="1511"><span data-dcnode-id="1518" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmaMeter" title="/pmwiki/pmwiki.php/Main/KarmaMeter"><span data-dcnode-id="1517" instrument_node="">Karma Meter</span></a><span data-dcnode-id="1515" instrument_node="">: The game uses an unconventional variant; instead of a traditional "good/evil" or "law/chaos" meter, </span><em data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Triangle Strategy</span></em><span data-dcnode-id="1512" instrument_node=""> features a meter with three ends: morality, liberty, and utility, none of which are inherently good or bad choices. Decisions made at various points in the game contribute points to an invisible meter that can influence progress later on.</span></li><li data-dcnode-id="1506"><span data-dcnode-id="1510" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnowWhenToFoldEm" title="/pmwiki/pmwiki.php/Main/KnowWhenToFoldEm"><span data-dcnode-id="1509" instrument_node="">Know When to Fold 'Em</span></a><span data-dcnode-id="1507" instrument_node="">: In Chapter VII, the proponents of surrendering Roland point out Aesfrost's significant military advantage and claim that to try to fight back would only get them and the civilians they have a duty to protect killed.</span></li><li data-dcnode-id="1496"><span data-dcnode-id="1505" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LetsSplitUpGang" title="/pmwiki/pmwiki.php/Main/LetsSplitUpGang"><span data-dcnode-id="1504" instrument_node="">Let's Split Up, Gang!</span></a><span data-dcnode-id="1502" instrument_node="">: Should the Chapter VII vote end with turning over Roland, he will (of course) be separated from the main party for some time. Chapter XV also has Roland, Benedict, and Frederica heading in separate directions for a task, with the Scales of Conviction deciding which one Serenoa accompanies. </span><span class="spoiler" data-dcnode-id="1497" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1501" instrument_node="">The </span><a class="twikilink" data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1500" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1498" instrument_node=""> route starts with Serenoa making the decision to split the party into three regiments, each consisting of up to nine units (including Serenoa himself) plus a commander, meaning that all 30 playable characters can potentially see action. Benedict's group will lure the Hyzantian army into the Wolffort fire traps, Roland's group will rendezvous with Svarog to deal with Gustadolph, and Frederica's group will instigate the Rosellans in Hyzante into rebelling. The party reunites after all three battles are fought.</span></span></li><li data-dcnode-id="1488"><span data-dcnode-id="1495" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LogicalWeakness" title="/pmwiki/pmwiki.php/Main/LogicalWeakness"><span data-dcnode-id="1494" instrument_node="">Logical Weakness</span></a><span data-dcnode-id="1492" instrument_node="">: The Aesfrosti units, who come from a land of ice and snow, are </span><a class="twikilink" data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ElementalRockPaperScissors" title="/pmwiki/pmwiki.php/Main/ElementalRockPaperScissors"><span data-dcnode-id="1491" instrument_node="">weak to fire damage</span></a><span data-dcnode-id="1489" instrument_node="">.</span></li><li data-dcnode-id="1483"><span data-dcnode-id="1487" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManaMeter" title="/pmwiki/pmwiki.php/Main/ManaMeter"><span data-dcnode-id="1486" instrument_node="">Mana Meter</span></a><span data-dcnode-id="1484" instrument_node="">: At the start of every turn, a unit gains 1 TP; for a unit to use most of its abilities beyond its normal attack, it must have TP to burn as a cost. Some units have the ability to gain back additional TP conditionally, such as Frederica, who gains a TP after defeating an enemy, or Corentin, who gains an additional TP at the start of his turn if he's standing on a Frozen tile.</span></li><li data-dcnode-id="1473"><span data-dcnode-id="1482" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="1481" instrument_node="">Meaningful Name</span></a><span data-dcnode-id="1479" instrument_node="">: </span><em data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Nor</span></em><span data-dcnode-id="1476" instrument_node="">zelia, with Aesfrost being an icy northern tundra, with rumours of eastern and western lands that are unexplored by the locals. </span><span class="spoiler" data-dcnode-id="1474" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1475" instrument_node="">Centralia being to the south, too.</span></span></li><li data-dcnode-id="1468"><span data-dcnode-id="1472" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeanwhileScene" title="/pmwiki/pmwiki.php/Main/MeanwhileScene"><span data-dcnode-id="1471" instrument_node="">Meanwhile Scene</span></a><span data-dcnode-id="1469" instrument_node="">: Character Stories are small cutscenes that occur in other locations that the party currently are not at. They provide world building to show how the rest of the world is being affected.</span></li><li data-dcnode-id="1442"><span data-dcnode-id="1467" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MultipleEndings" title="/pmwiki/pmwiki.php/Main/MultipleEndings"><span data-dcnode-id="1466" instrument_node="">Multiple Endings</span></a><span data-dcnode-id="1464" instrument_node="">: Although </span><a class="twikilink" data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoryBranching" title="/pmwiki/pmwiki.php/Main/StoryBranching"><span data-dcnode-id="1463" instrument_node="">Story Branching</span></a><span data-dcnode-id="1461" instrument_node=""> offers the player multiple different options throughout the game, it's ultimately the decision made in </span><span class="spoiler" data-dcnode-id="1459" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1460" instrument_node="">Chapter XVII (17)</span></span><span data-dcnode-id="1458" instrument_node=""> that determines which of </span><span class="spoiler" data-dcnode-id="1456" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1457" instrument_node="">four</span></span><span data-dcnode-id="1455" instrument_node=""> endings will be reached.</span><ul data-dcnode-id="1443"><li data-dcnode-id="1444"><span data-dcnode-id="1454" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1453" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1451" instrument_node="">: Out of the various outcomes, the one in which </span><span class="spoiler" data-dcnode-id="1449" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1450" instrument_node="">Serenoa convinces his allies to compromise instead of using the Scales</span></span><span data-dcnode-id="1448" instrument_node=""> is the hardest to access, benefits the most characters, and is the only path in which </span><span class="spoiler" data-dcnode-id="1446" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1447" instrument_node="">Avlora joins the party</span></span><span data-dcnode-id="1445" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1415"><span data-dcnode-id="1441" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MutuallyExclusivePartyMembers" title="/pmwiki/pmwiki.php/Main/MutuallyExclusivePartyMembers"><span data-dcnode-id="1440" instrument_node="">Mutually Exclusive Party Members</span></a><span data-dcnode-id="1438" instrument_node="">:</span><ul data-dcnode-id="1416"><li data-dcnode-id="1433"><span data-dcnode-id="1437" instrument_node=""> You can only recruit certain units by making specific story choices; either Rudolph or Corentin depending on which version of Chapter III you choose, and either Milo, Cordelia, Travis, or Trish will join in Chapter XV (and which of the two bandits has the potential to join is dependent on a decision back in Chapter XI). Upon starting a </span><a class="twikilink" data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="1436" instrument_node="">New Game+</span></a><span data-dcnode-id="1434" instrument_node="">, however, you keep all recruited party members and can now pick a choice that recruits one of their counterparts, meaning that it will take a minimum of four playthroughs to have every party member at once.</span></li><li data-dcnode-id="1417"><span data-dcnode-id="1432" instrument_node=""> There's a case of this in the endgame as well, due to </span><a class="twikilink" data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakingTheFellowship" title="/pmwiki/pmwiki.php/Main/BreakingTheFellowship"><span data-dcnode-id="1431" instrument_node="">Breaking the Fellowship</span></a><span data-dcnode-id="1429" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1425" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1428" instrument_node="">either Frederica, Roland, or Benedict will leave the party depending on your decision in Chapter XVII, and will not return until </span><a class="twikilink" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="1427" instrument_node="">New Game+</span></a></span><span data-dcnode-id="1424" instrument_node="">...unless </span><span class="spoiler" data-dcnode-id="1419" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1423" instrument_node="">you're on the </span><a class="twikilink" data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1422" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1420" instrument_node=""> route, in which not only do they all stay for the story's climax, but they are also joined by Avlora</span></span><span data-dcnode-id="1418" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1406"><span data-dcnode-id="1414" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="1413" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="1411" instrument_node="">: The theocratic Hyzante creates a special flame-based energy called Aelfric. </span><em data-dcnode-id="1408"><a class="twikilink" data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/OctopathTraveler" title="/pmwiki/pmwiki.php/VideoGame/OctopathTraveler"><span data-dcnode-id="1410" instrument_node="">Octopath Traveler</span></a></em><span data-dcnode-id="1407" instrument_node=""> had Aelfric as the god worshipped by the largest church in Orsterra and is typically represented by a flame.</span></li><li data-dcnode-id="1394"><span data-dcnode-id="1405" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NintendoHard" title="/pmwiki/pmwiki.php/Main/NintendoHard"><span data-dcnode-id="1404" instrument_node="">Nintendo Hard</span></a><span data-dcnode-id="1402" instrument_node="">: Much like Square Enix's prior </span><em data-dcnode-id="1399"><a class="twikilink" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BravelyDefaultII" title="/pmwiki/pmwiki.php/VideoGame/BravelyDefaultII"><span data-dcnode-id="1401" instrument_node="">Bravely Default II</span></a></em><span data-dcnode-id="1398" instrument_node=""> demos, </span><em data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">TRIANGLE STRATEGY</span></em><span data-dcnode-id="1395" instrument_node="">'s demo difficulty is higher than what players can expect in the final version of the game.</span></li><li data-dcnode-id="1369"><span data-dcnode-id="1393" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeverFoundTheBody" title="/pmwiki/pmwiki.php/Main/NeverFoundTheBody"><span data-dcnode-id="1392" instrument_node="">Never Found the Body</span></a><span data-dcnode-id="1390" instrument_node="">:</span><ul data-dcnode-id="1370"><li data-dcnode-id="1379"><span data-dcnode-id="1389" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1387" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1388" instrument_node="">Maxwell</span></span><span data-dcnode-id="1386" instrument_node=""> is seemingly struck down by Avlora in Chapter VI. However, </span><span class="spoiler" data-dcnode-id="1381" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1385" instrument_node="">his spear and body are not found later by one of the Wolffort scouts. Depending on your </span><a class="twikilink" data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmaMeter" title="/pmwiki/pmwiki.php/Main/KarmaMeter"><span data-dcnode-id="1384" instrument_node="">Karma Meter</span></a><span data-dcnode-id="1382" instrument_node="">, it can be revealed that he survived, and he rejoins the party</span></span><span data-dcnode-id="1380" instrument_node="">.</span></li><li data-dcnode-id="1371"><span data-dcnode-id="1378" instrument_node=""> Similarly, regardless of whether Serenoa chose Utility, Liberty, or Morality for Chapter XIII, the resulting versions of Chapter XIV all involve </span><span class="spoiler" data-dcnode-id="1373" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1377" instrument_node="">Avlora ending up in the river and her body becoming "lost". If you're on the </span><a class="twikilink" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1376" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1374" instrument_node=""> route, she not only survives, but also joins the party</span></span><span data-dcnode-id="1372" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1364"><span data-dcnode-id="1368" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="1367" instrument_node="">New Game+</span></a><span data-dcnode-id="1365" instrument_node="">: Loading a completed save file transfers over your party, along with their levels, items and equipment upgrades while scaling up the enemies in battles to retain difficulty. The conviction system is also made a lot more transparent, pointing out how to raise each aspect, along with how many points in each have been accumulated and how many more are needed to unlock additional battlers.</span></li><li data-dcnode-id="1356"><span data-dcnode-id="1363" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoBloodForPhlebotinum" title="/pmwiki/pmwiki.php/Main/NoBloodForPhlebotinum"><span data-dcnode-id="1362" instrument_node="">No Blood for Phlebotinum</span></a><span data-dcnode-id="1360" instrument_node="">: Each of the three nations controls a resource that the others would like to have; Aesfrost control most of the iron stores and are able to craft strong weapons and innovate, Hyzante has a monopoly on salt that is vital for human life, and Glenbrook has control of the rivers which allow trade to flourish. 30 years prior to the start of the story, all of the nations were engaged in a conflict called </span><em data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">The Saltiron War</span></em><span data-dcnode-id="1357" instrument_node="">, vying for control over these resources.</span></li><li data-dcnode-id="1342"><span data-dcnode-id="1355" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NominalImportance" title="/pmwiki/pmwiki.php/Main/NominalImportance"><span data-dcnode-id="1354" instrument_node="">Nominal Importance</span></a><span data-dcnode-id="1352" instrument_node="">: Played with. While the four shopkeeps at the player's encampment are recruitable characters, they are only given names, character portraits and profiles from the cutscenes in which they're recruited onward, and are otherwise only referred to by adjectives like most other minor NPCs. Similarly, three of the five </span><a class="twikilink" data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OptionalPartyMember" title="/pmwiki/pmwiki.php/Main/OptionalPartyMember"><span data-dcnode-id="1351" instrument_node="">Optional Party Members</span></a><span data-dcnode-id="1349" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarlyBirdCameo" title="/pmwiki/pmwiki.php/Main/EarlyBirdCameo"><span data-dcnode-id="1348" instrument_node="">that show up at the fighting tournament at the beginning of the game</span></a><span data-dcnode-id="1346" instrument_node=""> go unnamed and without portraits and profiles. This sequence in particular stand out, as it is otherwise used primarily as a means of introducing the game's </span><a class="twikilink" data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoadsAndLoadsOfCharacters" title="/pmwiki/pmwiki.php/Main/LoadsAndLoadsOfCharacters"><span data-dcnode-id="1345" instrument_node="">sizable supporting cast</span></a><span data-dcnode-id="1343" instrument_node="">.</span></li><li data-dcnode-id="1334"><span data-dcnode-id="1341" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonstandardGameOver" title="/pmwiki/pmwiki.php/Main/NonstandardGameOver"><span data-dcnode-id="1340" instrument_node="">Non-Standard Game Over</span></a><span data-dcnode-id="1338" instrument_node="">: During "In The Still of Night," one of the possible twelfth chapters, </span><span class="spoiler" data-dcnode-id="1336" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1337" instrument_node="">if Serenoa fails to find the key to prove the Hyzantian faith fraudulent, House Wolffort will end up crushed by the Hyzantian Army in a narration scene</span></span><span data-dcnode-id="1335" instrument_node="">.</span></li><li data-dcnode-id="1324"><span data-dcnode-id="1333" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoOneSeesTheBoss" title="/pmwiki/pmwiki.php/Main/NoOneSeesTheBoss"><span data-dcnode-id="1332" instrument_node="">No One Sees the Boss</span></a><span data-dcnode-id="1330" instrument_node="">: The Hierophant of Hyzante is allegedly a figure seated on a throne behind curtains, as looking upon their face is forbidden (their portrait is obscured). They speak, but only to a chosen mouthpiece. </span><span class="spoiler" data-dcnode-id="1325" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1329" instrument_node="">They're finally seen in the Liberty Ending and </span><a class="twikilink" data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1328" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1326" instrument_node="">.</span></span></li><li data-dcnode-id="1299"><span data-dcnode-id="1323" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotQuiteTheRightThing" title="/pmwiki/pmwiki.php/Main/NotQuiteTheRightThing"><span data-dcnode-id="1322" instrument_node="">Not Quite the Right Thing</span></a><span data-dcnode-id="1320" instrument_node="">: Zig-Zagged. Most of the time, there is one option that obviously seems like the wrong choice, and most of the time, it is. But in order to get the </span><a class="twikilink" data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1319" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1317" instrument_node="">, you </span><em data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">need</span></em><span data-dcnode-id="1314" instrument_node=""> to compromise on your morals once: </span><span class="spoiler" data-dcnode-id="1312" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1313" instrument_node="">agreeing to illegally transport the salt for Ende, as the intended recipient turns out to be Svarog, and his trust is needed to put an end to Gustadolph's machinations</span></span><span data-dcnode-id="1311" instrument_node="">. The other option seems more morally correct, but leads to the more bittersweet endings.</span><ul data-dcnode-id="1300"><li data-dcnode-id="1301"><span data-dcnode-id="1310" instrument_node=""> To a lesser extent, taking the morally-dubious route in a few Chapters won’t negate the chance to reach the </span><a class="twikilink" data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1309" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1307" instrument_node="">. </span><span class="spoiler" data-dcnode-id="1302" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1306" instrument_node="">In Chapter VII, it’s technically easier to fight Landroi than it is to defeat Avlora without the fire traps, but regardless you </span><em data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">must</span></em><span data-dcnode-id="1303" instrument_node=""> not used any of them to avoid getting locked out from the Conviction endgame.</span></span></li></ul></li><li data-dcnode-id="1288"><span data-dcnode-id="1298" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ObviouslyEvil" title="/pmwiki/pmwiki.php/Main/ObviouslyEvil"><span data-dcnode-id="1297" instrument_node="">Obviously Evil</span></a><span data-dcnode-id="1295" instrument_node="">: Played with. A sizable number of the game's supporting cast sport </span><a class="twikilink" data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlasherSmile" title="/pmwiki/pmwiki.php/Main/SlasherSmile"><span data-dcnode-id="1294" instrument_node="">evil grins</span></a><span data-dcnode-id="1292" instrument_node=""> or </span><a class="twikilink" data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmugSmiler" title="/pmwiki/pmwiki.php/Main/SmugSmiler"><span data-dcnode-id="1291" instrument_node="">smug smirks</span></a><span data-dcnode-id="1289" instrument_node=""> in their character portraits despite being introduced on relatively friendly terms with the protagonists, and while the majority of them are indeed revealed to be scheming opportunists only looking out for themselves, the game's unique morality system that focuses on personal convictions rather than binary metrics like good and evil means that they may end up becoming the player's allies rather than enemies depending on how the story progresses.</span></li><li data-dcnode-id="1283"><span data-dcnode-id="1287" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OffWithHisHead" title="/pmwiki/pmwiki.php/Main/OffWithHisHead"><span data-dcnode-id="1286" instrument_node="">Off with His Head!</span></a><span data-dcnode-id="1284" instrument_node="">: King Regna is executed by beheading.</span></li><li data-dcnode-id="1269"><span data-dcnode-id="1282" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OptionalPartyMember" title="/pmwiki/pmwiki.php/Main/OptionalPartyMember"><span data-dcnode-id="1281" instrument_node="">Optional Party Member</span></a><span data-dcnode-id="1279" instrument_node="">: You can recruit some optional units by viewing </span><a class="twikilink" data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeanwhileScene" title="/pmwiki/pmwiki.php/Main/MeanwhileScene"><span data-dcnode-id="1278" instrument_node="">Character Stories</span></a><span data-dcnode-id="1276" instrument_node=""> unlocked by reaching required values of the </span><a class="twikilink" data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmaMeter" title="/pmwiki/pmwiki.php/Main/KarmaMeter"><span data-dcnode-id="1275" instrument_node="">Karma Meter</span></a><span data-dcnode-id="1273" instrument_node="">. Some units require a high value of a single ideology (ex. Decimal requires 1600 points of Morality), while others require minimum values in two different ideologies (ex. Julio requires 275 points in Morality and 110 in Utility). However, all of your values (and party members) carry over to a </span><a class="twikilink" data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="1272" instrument_node="">New Game+</span></a><span data-dcnode-id="1270" instrument_node="">, so it's not required to spend each run near-exclusively devoting yourself to one belief to obtain everyone.</span></li><li data-dcnode-id="1264"><span data-dcnode-id="1268" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OutlivingOnesOffspring" title="/pmwiki/pmwiki.php/Main/OutlivingOnesOffspring"><span data-dcnode-id="1267" instrument_node="">Outliving One's Offspring</span></a><span data-dcnode-id="1265" instrument_node="">: Downplayed in the Debut Demo. Crown Prince Frani predeceases his father King Regna by a few days.</span></li><li data-dcnode-id="1259"><span data-dcnode-id="1263" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OutOfFocus" title="/pmwiki/pmwiki.php/Main/OutOfFocus"><span data-dcnode-id="1262" instrument_node="">Out of Focus</span></a><span data-dcnode-id="1260" instrument_node="">: Any of the optional characters, and Corentin in the Debut Demo, have no involvement in the main story and simply are there after you recruit them. They can be spoken to in the Encampment, but have no story relevance.</span></li><li data-dcnode-id="1254"><span data-dcnode-id="1258" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PeopleOfHairColor" title="/pmwiki/pmwiki.php/Main/PeopleOfHairColor"><span data-dcnode-id="1257" instrument_node="">People of Hair Color</span></a><span data-dcnode-id="1255" instrument_node="">: The Rosellans are a persecuted ethnic minority tending to have pink hair.</span></li><li data-dcnode-id="1249"><span data-dcnode-id="1253" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PinballProtagonist" title="/pmwiki/pmwiki.php/Main/PinballProtagonist"><span data-dcnode-id="1252" instrument_node="">Pinball Protagonist</span></a><span data-dcnode-id="1250" instrument_node="">: House Wolffort can spend the first third of the game as this depending on your choices, particularly if they choose to hand Roland over to Aesfrost. They find themselves completely at the mercy of Aesfrost without any real agency of their own as Aesfrost and Hyzante begin to clash with each other. Finding a way to gain some power and agency serves as the initial goal of House Wolffort, though it continues to remain a struggle for the entire game as in the end they are but a small house in conflict with two full fledged nations with all the military might and bargaining power that brings.</span></li><li data-dcnode-id="1244"><span data-dcnode-id="1248" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PragmaticHero" title="/pmwiki/pmwiki.php/Main/PragmaticHero"><span data-dcnode-id="1247" instrument_node="">Pragmatic Hero</span></a><span data-dcnode-id="1245" instrument_node="">: The trailer introduces Benedict as a representative of "those who pursue pragmatic utility". In the Debut Demo, he is perfectly willing to advocate ruthless actions that he believes will serve the greater good such as throwing Roland under the bus to protect the Wolffort demesne or lighting the castle town on fire to slow the enemy advance.</span></li><li data-dcnode-id="1239"><span data-dcnode-id="1243" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PrestigeClass" title="/pmwiki/pmwiki.php/Main/PrestigeClass"><span data-dcnode-id="1242" instrument_node="">Prestige Class</span></a><span data-dcnode-id="1240" instrument_node="">: Units can promote to stronger classes once they reach an appropriate level and pay an appropriate amount of resources.</span></li><li data-dcnode-id="1234"><span data-dcnode-id="1238" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PretextForWar" title="/pmwiki/pmwiki.php/Main/PretextForWar"><span data-dcnode-id="1237" instrument_node="">Pretext for War</span></a><span data-dcnode-id="1235" instrument_node="">: Gustadolph claims that King Regna attempted to steal the riches of the Grand Norzelian Mines and murdered his cousin Dragan as a pretext for his invasion.</span></li><li data-dcnode-id="1229"><span data-dcnode-id="1233" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PuppetKing" title="/pmwiki/pmwiki.php/Main/PuppetKing"><span data-dcnode-id="1232" instrument_node="">Puppet King</span></a><span data-dcnode-id="1230" instrument_node="">: Gustadolph's stated intention for allowing Cordelia to live is so he can have her officially crowned queen while he acts as regent.</span></li><li data-dcnode-id="1224"><span data-dcnode-id="1228" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PurposelyOverpowered" title="/pmwiki/pmwiki.php/Main/PurposelyOverpowered"><span data-dcnode-id="1227" instrument_node="">Purposely Overpowered</span></a><span data-dcnode-id="1225" instrument_node="">: Ser Maxwell in Chapter VI isn't invincible but he's far stronger than the rest of the party, serving as the rearguard while the others retreat toward the bridge.</span></li><li data-dcnode-id="1208"><span data-dcnode-id="1223" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheQuisling" title="/pmwiki/pmwiki.php/Main/TheQuisling"><span data-dcnode-id="1222" instrument_node="">The Quisling</span></a><span data-dcnode-id="1220" instrument_node="">:</span><ul data-dcnode-id="1209"><li data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node=""> The Royal Advisor Patriatte is extremely quick to suck up to the Aesfrosti, acting more as their personal servant than an actual advisor.</span></li><li data-dcnode-id="1214"><span data-dcnode-id="1217" instrument_node=""> Lord Telliore wavers on this once he hears of the Aesfrosti invasion. </span><span class="spoiler" data-dcnode-id="1215" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1216" instrument_node="">He willingly joins the Aesfrosti if House Wolffort capitulates but remains on the fence if House Wolffort resists the Aesfrosti army, though the demo ends before his plan at the end is revealed.</span></span></li><li data-dcnode-id="1210"><span data-dcnode-id="1213" instrument_node=""> Serenoa himself can choose to be this by handing over Prince Roland to Aesfrost without a fight in Chapter VII, even if he does so reluctantly, justifying it to himself that he's doing it to prevent more harm from coming to Glenbrook. </span><span class="spoiler" data-dcnode-id="1211" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1212" instrument_node="">However, the Aesfrosti are more than happy to force House Wolffort to do their dirty work like ordering them to put down their own countrymen in the rebellious House Falkes.</span></span></li></ul></li><li data-dcnode-id="1203"><span data-dcnode-id="1207" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RedBaron" title="/pmwiki/pmwiki.php/Main/RedBaron"><span data-dcnode-id="1206" instrument_node="">Red Baron</span></a><span data-dcnode-id="1204" instrument_node="">: Ser Maxwell is known as the Dawnspear for his prowess in battle.</span></li><li data-dcnode-id="1198"><span data-dcnode-id="1202" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RequiredPartyMember" title="/pmwiki/pmwiki.php/Main/RequiredPartyMember"><span data-dcnode-id="1201" instrument_node="">Required Party Member</span></a><span data-dcnode-id="1199" instrument_node="">: In Chapter VI of the Debut Demo, Roland must be deployed.</span></li><li data-dcnode-id="1168"><span data-dcnode-id="1197" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReveal" title="/pmwiki/pmwiki.php/Main/TheReveal"><span data-dcnode-id="1196" instrument_node="">The Reveal</span></a><span data-dcnode-id="1194" instrument_node="">: You know how in </span><a class="twikilink" data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealLife" title="/pmwiki/pmwiki.php/Main/RealLife"><span data-dcnode-id="1193" instrument_node="">Real Life</span></a><span data-dcnode-id="1191" instrument_node="">, finding salt is easy and the only place it would be an issue is the desert? The reason it's so rare in this setting is because </span><span class="spoiler" data-dcnode-id="1186" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1190" instrument_node="">Hyzante keeps everyone stupid. They </span><em data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">know</span></em><span data-dcnode-id="1187" instrument_node=""> where salt comes from, and they've spread propaganda to prevent anyone from realizing Salt Mines (or looking for the ocean) could work. In fact, the reason Hyzante persecutes the Rosellans is because their ancestors almost revealed the secrets of mining salt from the earth, which would have ruined the Hyzantians</span></span><span data-dcnode-id="1185" instrument_node="">.</span><ul data-dcnode-id="1169"><li data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node=""> Serenoa </span><span class="spoiler" data-dcnode-id="1182" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1183" instrument_node="">is Roland's older half-brother. Technically (somehow, for a common-born), he holds legitimacy for the throne, and can conquer Norzelia in one ending</span></span><span data-dcnode-id="1181" instrument_node="">.</span></li><li data-dcnode-id="1170"><span data-dcnode-id="1179" instrument_node=""> The Hierophant of Hyzante's religion </span><span class="spoiler" data-dcnode-id="1177" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1178" instrument_node="">is nothing more than a mechanical puppet which Idore uses to maintain control over Hyzante</span></span><span data-dcnode-id="1176" instrument_node="">. Additionally, </span><span class="spoiler" data-dcnode-id="1172" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1175" instrument_node="">it runs on Aelfric, which is manufactured from </span><a class="twikilink" data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoulPoweredEngine" title="/pmwiki/pmwiki.php/Main/SoulPoweredEngine"><span data-dcnode-id="1174" instrument_node="">their hospital's deceased</span></a></span><span data-dcnode-id="1171" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1155"><span data-dcnode-id="1167" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RoyalsWhoActuallyDoSomething" title="/pmwiki/pmwiki.php/Main/RoyalsWhoActuallyDoSomething"><span data-dcnode-id="1166" instrument_node="">Royals Who Actually Do Something</span></a><span data-dcnode-id="1164" instrument_node="">:</span><ul data-dcnode-id="1156"><li data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node=""> Frederica is the daughter of the royal family of Aesfrost and happens to double as a well-trained mage who specializes in fire magic.</span></li><li data-dcnode-id="1157"><span data-dcnode-id="1161" instrument_node=""> Likewise, Roland is the second prince of the royal family of Glenbrook and the nation's last surviving heir. The demo also shows that he's </span><em data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">very</span></em><span data-dcnode-id="1158" instrument_node=""> skilled on a horse and packs a damn wallop with a lance.</span></li></ul></li><li data-dcnode-id="1126"><span data-dcnode-id="1154" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SadisticChoice" title="/pmwiki/pmwiki.php/Main/SadisticChoice"><span data-dcnode-id="1153" instrument_node="">Sadistic Choice</span></a><span data-dcnode-id="1151" instrument_node="">: Chapter VII has the party facing a particularly cruel dilemma: hand Roland, Serenoa's </span><a class="twikilink" data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChildhoodFriend" title="/pmwiki/pmwiki.php/Main/ChildhoodFriend"><span data-dcnode-id="1150" instrument_node="">Childhood Friend</span></a><span data-dcnode-id="1148" instrument_node=""> and last heir to the throne, over to Aesfrost to protect House Wolffort and in the process submit to the enemy's rule, or protect Roland against nigh-insurmountable odds and put both their own lives and the lives of everyone in House Wolffort at risk for the sake of honor and vengeance.</span><ul data-dcnode-id="1127"><li data-dcnode-id="1128"><span data-dcnode-id="1147" instrument_node=""> The final decision will alienate one of your main supporters, since every outcome will involve getting a </span><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">lot</span></em><span data-dcnode-id="1144" instrument_node=""> of people killed. </span><span class="spoiler" data-dcnode-id="1136" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1143" instrument_node="">Roland's Utility choice involves throwing the Rosellans under the bus </span><a class="twikilink" data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForTheGreaterGood" title="/pmwiki/pmwiki.php/Main/ForTheGreaterGood"><span data-dcnode-id="1142" instrument_node="">For the Greater Good</span></a><span data-dcnode-id="1140" instrument_node="">, which alienates Frederica for burying the truth and leaving her people to certain death. Frederica's Morality choice involves a massive </span><a class="twikilink" data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewThisImOuttaHere" title="/pmwiki/pmwiki.php/Main/ScrewThisImOuttaHere"><span data-dcnode-id="1139" instrument_node="">Screw This, I'm Outta Here!</span></a><span data-dcnode-id="1137" instrument_node=""> to save the Rosellans and restore their kingdom, which Benedict calls out for abandoning their own citizens to the nonexistent mercy of endless conflict. Benedict's Liberty choice involves seizing the throne and crushing Hyzante with Aesfrost's support once and for all, which angers Roland for trying to become like the very dictators who started the war in the first place.</span></span><span data-dcnode-id="1135" instrument_node=""> The only way to avoid disastrous consequences is </span><span class="spoiler" data-dcnode-id="1130" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1134" instrument_node="">to </span><a class="twikilink" data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeAThirdOption" title="/pmwiki/pmwiki.php/Main/TakeAThirdOption"><span data-dcnode-id="1133" instrument_node="">Take a Third Option</span></a><span data-dcnode-id="1131" instrument_node=""> and avoid the decision altogether</span></span><span data-dcnode-id="1129" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1121"><span data-dcnode-id="1125" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SaltTheEarth" title="/pmwiki/pmwiki.php/Main/SaltTheEarth"><span data-dcnode-id="1124" instrument_node="">Salt the Earth</span></a><span data-dcnode-id="1122" instrument_node="">: If you choose to capitulate to Aesfrost, Landroi orders the Falkes demesne burned to the ground rather than see Aesfrost take it over.</span></li><li data-dcnode-id="1114"><span data-dcnode-id="1120" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScamReligion" title="/pmwiki/pmwiki.php/Main/ScamReligion"><span data-dcnode-id="1119" instrument_node="">Scam Religion</span></a><span data-dcnode-id="1117" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1115" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1116" instrument_node="">The entirety of Hyzante's religion was made up from the start when in ancient times those who monopolized the salt of the Source attacked the visiting Roselle who wished to share the truth of salt in the new continent of Norzelia; the Holy State of Hyzante feared losing its control of the world and persecuted the Roselle for daring to speak the truth of salt, fabricating the Goddess and Her teachings to justify Hyzante's monopoly over salt and framing the Roselle as thieves to have a designated enemy who deserved punishment.</span></span></li><li data-dcnode-id="1106"><span data-dcnode-id="1113" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SceneryPorn" title="/pmwiki/pmwiki.php/Main/SceneryPorn"><span data-dcnode-id="1112" instrument_node="">Scenery Porn</span></a><span data-dcnode-id="1110" instrument_node="">: Just like </span><em data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Octopath</span></em><span data-dcnode-id="1107" instrument_node="">, the game's "HD-2D" artstyle does an amazing job creating lush visuals that emulate SNES and PS1 era RPGs.</span></li><li data-dcnode-id="1098"><span data-dcnode-id="1105" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SciFiWritersHaveNoSenseOfScale" title="/pmwiki/pmwiki.php/Main/SciFiWritersHaveNoSenseOfScale"><span data-dcnode-id="1104" instrument_node="">Sci-Fi Writers Have No Sense of Scale</span></a><span data-dcnode-id="1102" instrument_node="">: Even given slave labor, it is highly unlikely that all the salt in all three kingdoms for every person could be supplied and transported from a single, albeit large saltwater lake as presented, and even more unlikely that </span><span class="spoiler" data-dcnode-id="1100" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1101" instrument_node="">given how much mining Aesfrost does, they would never have found salt in mines before the events of the game</span></span><span data-dcnode-id="1099" instrument_node="">.</span></li><li data-dcnode-id="1077"><span data-dcnode-id="1097" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="1096" instrument_node="">Shout-Out</span></a><span data-dcnode-id="1094" instrument_node="">: One of the lines Serenoa says in the cutscene after locking into the </span><a class="twikilink" data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1093" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1091" instrument_node=""> is "</span><a class="twikilink" data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TacticsOgre" title="/pmwiki/pmwiki.php/VideoGame/TacticsOgre"><span data-dcnode-id="1090" instrument_node="">let us cling together</span></a><span data-dcnode-id="1088" instrument_node="">."</span><ul data-dcnode-id="1078"><li data-dcnode-id="1084"><span data-dcnode-id="1087" instrument_node=""> Anna's highest promoted class is Master Assassin, and the promotion </span><a class="twikilink" data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/AssassinsCreed" title="/pmwiki/pmwiki.php/Franchise/AssassinsCreed"><span data-dcnode-id="1086" instrument_node="">colors her clothing white.</span></a></li><li data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node=""> The new colors of Groma's final class, Divine Fist, match </span><a class="twikilink" data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/StreetFighterII" title="/pmwiki/pmwiki.php/VideoGame/StreetFighterII"><span data-dcnode-id="1082" instrument_node="">Chun-Li's uniform</span></a><span data-dcnode-id="1080" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1070"><span data-dcnode-id="1076" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlaveryIsASpecialKindOfEvil" title="/pmwiki/pmwiki.php/Main/SlaveryIsASpecialKindOfEvil"><span data-dcnode-id="1075" instrument_node="">Slavery Is a Special Kind of Evil</span></a><span data-dcnode-id="1073" instrument_node="">: In later chapters, it quickly becomes evident that </span><span class="spoiler" data-dcnode-id="1071" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1072" instrument_node="">Hyzante relies upon Rosellan slaves to provide cheap labor to harvest salt. It really says something that Hyzante is the nation that gets screwed over the most in one of the game's three normal endings and is the only one to really get screwed over in another normal game ending along with the golden route.</span></span></li><li data-dcnode-id="1065"><span data-dcnode-id="1069" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmallSecludedWorld" title="/pmwiki/pmwiki.php/Main/SmallSecludedWorld"><span data-dcnode-id="1068" instrument_node="">Small, Secluded World</span></a><span data-dcnode-id="1066" instrument_node="">: Norzelia. It's small enough to march across half a kingdom in one day, and near the beginning it's noted that nobody knows what lies beyond the southern waterfall over the mountains or beyond the Hyzantian desert because there simply isn't enough salt to equip such a voyage properly.</span></li><li data-d
