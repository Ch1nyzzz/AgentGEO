</span><div class="article-content retro-folders" data-dcnode-id="879" id="main-article"><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2329"></p><div class="quoteright" data-dcnode-id="2326" style="width:350px;"><div class="lazy_load_img_box" data-dcnode-id="2327" style="padding-top:141.63%"><img alt="https://mediaproxy.tvtropes.org/width/350/https://static.tvtropes.org/pmwiki/pub/images/trianglestrategy.png" border="0" class="embeddedimage" data-dcnode-id="2328" height="496" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mediaproxy.tvtropes.org/width/350/https%3A//static.tvtropes.org/pmwiki/pub/images/trianglestrategy.png&amp;raw" width="350"></div></div><em data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Triangle Strategy</span></em><span data-dcnode-id="2322" instrument_node=""> is a </span><a class="twikilink" data-dcnode-id="2320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StrategyRPG" title="/pmwiki/pmwiki.php/Main/StrategyRPG"><span data-dcnode-id="2321" instrument_node="">Strategy RPG</span></a><span data-dcnode-id="2319" instrument_node=""> from </span><a class="twikilink" data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/SquareEnix" title="/pmwiki/pmwiki.php/Creator/SquareEnix"><span data-dcnode-id="2318" instrument_node="">Square Enix</span></a><span data-dcnode-id="2316" instrument_node=""> for the </span><a class="twikilink" data-dcnode-id="2314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/NintendoSwitch" title="/pmwiki/pmwiki.php/UsefulNotes/NintendoSwitch"><span data-dcnode-id="2315" instrument_node="">Nintendo Switch</span></a><span data-dcnode-id="2313" instrument_node="">, released on March 4th, 2022. It is the second game in the company's "</span><a class="twikilink" data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpritePolygonMix" title="/pmwiki/pmwiki.php/Main/SpritePolygonMix"><span data-dcnode-id="2312" instrument_node="">HD-2D</span></a><span data-dcnode-id="2310" instrument_node="">" series after 2018's </span><em data-dcnode-id="2307"><a class="twikilink" data-dcnode-id="2308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/OctopathTraveler" title="/pmwiki/pmwiki.php/VideoGame/OctopathTraveler"><span data-dcnode-id="2309" instrument_node="">Octopath Traveler</span></a></em><span data-dcnode-id="2306" instrument_node="">, and takes after classic Square Enix strategy RPGs such as </span><em data-dcnode-id="2303"><a class="twikilink" data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyTactics" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyTactics"><span data-dcnode-id="2305" instrument_node="">Final Fantasy Tactics</span></a></em><span data-dcnode-id="2302" instrument_node=""> and </span><em data-dcnode-id="2299"><a class="twikilink" data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TacticsOgre" title="/pmwiki/pmwiki.php/VideoGame/TacticsOgre"><span data-dcnode-id="2301" instrument_node="">Tactics Ogre</span></a></em><span data-dcnode-id="2298" instrument_node="">.</span><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2292"><span class="ad-caption" data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2293" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="2287"><span data-dcnode-id="2291" instrument_node="">The continent of Norzelia is ruled over by three nations: Glenbrook, which controls the continent's river and primary trade route; Aesfrost, which controls the continent's supply of iron; and Hyzante, which controls the continent's supply of salt. Thirty years ago, these limited resources led to the three nations becoming embroiled in a gruesome conflict known as </span><a class="twikilink" data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreatOffscreenWar" title="/pmwiki/pmwiki.php/Main/GreatOffscreenWar"><span data-dcnode-id="2290" instrument_node="">the Saltiron War</span></a><span data-dcnode-id="2288" instrument_node="">, which eventually ended in an uneasy truce.</span></p><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">However, after decades of fragile peace, war threatens to engulf Norzelia once again when the newly-crowned Archduke of Aesfrost - Gustadolph Aesfrost - suddenly invades Glenbrook under seemingly false pretenses, executing its king and seeking to capture the rest of the royal family.</span></p><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Serenoa Wolffort - the young heir to Glenbrook's powerful House Wolffort - sets out with his allies to save Norzelia from another era of bloodshed, and becomes entangled in a dark web of political intrigue and deceit.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2277"><span class="ad-caption" data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2278" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="2269"><span data-dcnode-id="2276" instrument_node="">The game's key mechanic is "conviction", a three-sided </span><a class="twikilink" data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmaMeter" title="/pmwiki/pmwiki.php/Main/KarmaMeter"><span data-dcnode-id="2275" instrument_node="">Karma Meter</span></a><span data-dcnode-id="2273" instrument_node=""> (hence the title) based around three factors: Utility, Morality, and Liberty. Responses to other characters via a </span><a class="twikilink" data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DialogueTree" title="/pmwiki/pmwiki.php/Main/DialogueTree"><span data-dcnode-id="2272" instrument_node="">Dialogue Tree</span></a><span data-dcnode-id="2270" instrument_node=""> can influence Serenoa's disposition towards a specific factor, which can alter the story's progress and what kinds of characters will join the party. In addition, at critical turning points the party will vote on major decisions using the Scales of Conviction, during which Serenoa can gather information and use it to attempt to influence his allies' decisions, potentially causing a drastic turn in how events unfold.</span></p><p data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">A preliminary "Debut Demo" was released on the Switch's eShop the same day of the game's reveal, allowing players to play early versions of Chapters 6 and 7. Feedback from this demo was used to shape the game during the rest of its development, with a proper demo released on February 8th, 2022. This demo allows players to play through the game's first three chapters and transfer their saves to the full version.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2261"><span class="ad-caption" data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2262" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="2255"><span data-dcnode-id="2260" instrument_node="">The game's reveal trailer can be found </span><a class="urllink" data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/fAUCRImUpis"><span data-dcnode-id="2259" instrument_node="">here</span><img data-dcnode-id="2258" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2256" instrument_node="">.</span></p><hr data-dcnode-id="2254"><h2 data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">This game and its demo provide examples of:</span></h2><ul data-dcnode-id="883"><li data-dcnode-id="2247"><span data-dcnode-id="2251" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbdicateTheThrone" title="/pmwiki/pmwiki.php/Main/AbdicateTheThrone"><span data-dcnode-id="2250" instrument_node="">Abdicate the Throne</span></a><span data-dcnode-id="2248" instrument_node="">: Early on, Lord Symon abdicates his position as Lord of House Wolffort in favor of his son Seranoa.</span></li><li data-dcnode-id="2242"><span data-dcnode-id="2246" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActuallyFourMooks" title="/pmwiki/pmwiki.php/Main/ActuallyFourMooks"><span data-dcnode-id="2245" instrument_node="">Actually Four Mooks</span></a><span data-dcnode-id="2243" instrument_node="">: Somehow inverted for both the heroes and the villains. Chapter VII clearly states that House Wolffort and Aesfrost both sport substantial and powerful armies; however, in actual gameplay, the player's "army" consists solely of the playable cast, and the Aesfrosti forces are just Avlora and a manageable number of mooks. Even more bizarre is that Wolffort is stated to have suffered heavy losses as a result of the battle regardless of how many units you actually lose.</span></li><li data-dcnode-id="2231"><span data-dcnode-id="2241" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllLovingHero" title="/pmwiki/pmwiki.php/Main/AllLovingHero"><span data-dcnode-id="2240" instrument_node="">All-Loving Hero</span></a><span data-dcnode-id="2238" instrument_node="">: The trailer introduces Frederica with the line "Those who respect the liberty of all." Also, she tends to respond to </span><a class="twikilink" data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SadisticChoice" title="/pmwiki/pmwiki.php/Main/SadisticChoice"><span data-dcnode-id="2237" instrument_node="">Sadistic Choices</span></a><span data-dcnode-id="2235" instrument_node=""> by wanting to </span><a class="twikilink" data-dcnode-id="2233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeAThirdOption" title="/pmwiki/pmwiki.php/Main/TakeAThirdOption"><span data-dcnode-id="2234" instrument_node="">find another way</span></a><span data-dcnode-id="2232" instrument_node=""> instead of making sacrifices. She's notably one of two people who by default refuses to hand over Roland in Chapter VII, the other being Hughette.</span></li><li data-dcnode-id="2221"><span data-dcnode-id="2230" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnAesop" title="/pmwiki/pmwiki.php/Main/AnAesop"><span data-dcnode-id="2229" instrument_node="">An Aesop</span></a><span data-dcnode-id="2227" instrument_node="">: True Democracy requires </span><em data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">tolerance, understanding, and acceptance</span></em><span data-dcnode-id="2224" instrument_node="">. </span><span class="spoiler" data-dcnode-id="2222" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2223" instrument_node="">In the Golden Ending, Serenoa realizes the three plans his advisors are giving him, however noble, are moral extremes that will sacrifice innocents to save others. By convincing them to ease up and work together, they form a plan that combines all three viewpoints into a viable way to save Norzelia without throwing anyone under the bus.</span></span></li><li data-dcnode-id="2211"><span data-dcnode-id="2220" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndNowForSomeoneCompletelyDifferent" title="/pmwiki/pmwiki.php/Main/AndNowForSomeoneCompletelyDifferent"><span data-dcnode-id="2219" instrument_node="">And Now for Someone Completely Different</span></a><span data-dcnode-id="2217" instrument_node="">: To an extent. </span><span class="spoiler" data-dcnode-id="2212" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2216" instrument_node="">Chapter XVIII of the </span><a class="twikilink" data-dcnode-id="2214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="2215" instrument_node="">Golden Ending</span></a><span data-dcnode-id="2213" instrument_node=""> route has the player take control of Benedict, Roland, and Frederica during the exploration phase of their respective regiments.</span></span></li><li data-dcnode-id="2179"><span data-dcnode-id="2210" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures" title="/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures"><span data-dcnode-id="2209" instrument_node="">Anti-Frustration Features</span></a><span data-dcnode-id="2207" instrument_node="">:</span><ul data-dcnode-id="2180"><li data-dcnode-id="2202"><span data-dcnode-id="2206" instrument_node=""> You retain any EXP you've earned if you fail a map. This allows you to eventually power your way through tough situations without having to rely on </span><a class="twikilink" data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SaveScumming" title="/pmwiki/pmwiki.php/Main/SaveScumming"><span data-dcnode-id="2205" instrument_node="">Save Scumming</span></a><span data-dcnode-id="2203" instrument_node="">.</span></li><li data-dcnode-id="2197"><span data-dcnode-id="2201" instrument_node=""> While the </span><a class="twikilink" data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmaMeter" title="/pmwiki/pmwiki.php/Main/KarmaMeter"><span data-dcnode-id="2200" instrument_node="">Karma Meter</span></a><span data-dcnode-id="2198" instrument_node=""> is invisible during the first playthrough to dissuade from "gaming" the system, making any decision that has an effect plays a unique "scales" animation to alert you that your actions have resulted in a change.</span></li><li data-dcnode-id="2189"><span data-dcnode-id="2196" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="2195" instrument_node="">New Game+</span></a><span data-dcnode-id="2193" instrument_node=""> makes the behind-the-scenes mechanics of the </span><a class="twikilink" data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmaMeter" title="/pmwiki/pmwiki.php/Main/KarmaMeter"><span data-dcnode-id="2192" instrument_node="">Karma Meter</span></a><span data-dcnode-id="2190" instrument_node=""> fully visible, including informing the player what Conviction values are necessary to recruit characters that haven't been recruited yet, making it much easier to explore all the routes.</span></li><li data-dcnode-id="2181"><span data-dcnode-id="2188" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="2186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="2187" instrument_node="">Golden Ending</span></a><span data-dcnode-id="2185" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2183" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2184" instrument_node="">forces you to split your party up into three separate teams, which is far more demanding of your use of, and proficiency with, the roster than any other point in the game. Given that the odds are low that you've actually trained enough characters to properly handle all three fronts, the game mitigates this by having Avlora join you, and she has an ability that makes her stronger the fewer allies you deploy, making low-manning one of these groups more viable at least</span></span><span data-dcnode-id="2182" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2174"><span data-dcnode-id="2178" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiGrinding" title="/pmwiki/pmwiki.php/Main/AntiGrinding"><span data-dcnode-id="2177" instrument_node="">Anti-Grinding</span></a><span data-dcnode-id="2175" instrument_node="">: Characters above the recommended level for a battle will gain less experience points per action, making it grindy and painful to have characters more than two levels above the battle's level.</span></li><li data-dcnode-id="2161"><span data-dcnode-id="2173" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcWords" title="/pmwiki/pmwiki.php/Main/ArcWords"><span data-dcnode-id="2172" instrument_node="">Arc Words</span></a><span data-dcnode-id="2170" instrument_node="">:</span><ul data-dcnode-id="2162"><li data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node=""> The word "conviction" recurs often in both the reveal trailer and the demo.</span></li><li data-dcnode-id="2163"><span data-dcnode-id="2167" instrument_node=""> The phrase "chosen path" comes up often in the demo as well, reflecting the </span><a class="twikilink" data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoryBranching" title="/pmwiki/pmwiki.php/Main/StoryBranching"><span data-dcnode-id="2166" instrument_node="">Story Branching</span></a><span data-dcnode-id="2164" instrument_node=""> aspect of the game.</span></li></ul></li><li data-dcnode-id="2156"><span data-dcnode-id="2160" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArrangedMarriage" title="/pmwiki/pmwiki.php/Main/ArrangedMarriage"><span data-dcnode-id="2159" instrument_node="">Arranged Marriage</span></a><span data-dcnode-id="2157" instrument_node="">: Serenoa and Frederica were betrothed some time before the game begins, and some dialogue indicates that the invasion happens on the day their wedding was supposed to be held.</span></li><li data-dcnode-id="2140"><span data-dcnode-id="2155" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AwesomeButImpractical" title="/pmwiki/pmwiki.php/Main/AwesomeButImpractical"><span data-dcnode-id="2154" instrument_node="">Awesome, but Impractical</span></a><span data-dcnode-id="2152" instrument_node="">:</span><ul data-dcnode-id="2141"><li data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node=""> Medina is a support unit with rather powerful healing skills, the ability to heal twice in one turn, and the ability to give other allies TP. The big downside is that her healing comes from empowered healing items. This can be an issue as most of your money will likely be going towards upgrading your weapons, which can be quite expensive at higher tiers. And healing items can be rather pricey. So unless you go out of your way to grind the training missions for cash, you may not have enough healing items to make her more practical to use than other healers who use magic instead. This is mitigated on NG+ and any future runs after that when you begin to wind down on needing money to upgrade your gear, so more money is available for consumable items instead.</span></li><li data-dcnode-id="2142"><span data-dcnode-id="2149" instrument_node=""> Decimal has total immunity to status effects, and most of its skills have very high range. However, these skills are limited in what they can actually </span><em data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">hit</span></em><span data-dcnode-id="2146" instrument_node="">, and require you to pay attention to both your enemies' HP and your allies' TP. Additionally, Decimal is further constrained by being the only character to </span><em data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">not</span></em><span data-dcnode-id="2143" instrument_node=""> gain TP upon starting a turn, instead gaining 3 TP at the end of a turn if it did not move or attack, thus forcing you to either wait a while before using its skills again or have another character that can grant it TP (like the aforementioned Medina) to speed the process along.</span></li></ul></li><li data-dcnode-id="2132"><span data-dcnode-id="2139" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BackStab" title="/pmwiki/pmwiki.php/Main/BackStab"><span data-dcnode-id="2138" instrument_node="">Back Stab</span></a><span data-dcnode-id="2136" instrument_node="">: Attacking a unit from behind always deals a </span><a class="twikilink" data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CriticalHit" title="/pmwiki/pmwiki.php/Main/CriticalHit"><span data-dcnode-id="2135" instrument_node="">Critical Hit</span></a><span data-dcnode-id="2133" instrument_node=""> and awards a Kudos bonus for doing so.</span></li><li data-dcnode-id="2116"><span data-dcnode-id="2131" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BackgroundMusicOverride" title="/pmwiki/pmwiki.php/Main/BackgroundMusicOverride"><span data-dcnode-id="2130" instrument_node="">Background Music Override</span></a><span data-dcnode-id="2128" instrument_node="">: Used in a couple of occasions:</span><ul data-dcnode-id="2117"><li data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node=""> If you choose to fight Aesfrost in Chapter VII, you'll come face to face with their top general, Avlora. At the start of the fight, she'll simply stand in the back and let the mooks have their way with you. However, if a unit gets close enough to rile her, she'll start going on the offensive and the music will change from the usual triumphant battle theme to a very tense and urgent theme. Quite fitting, considering it's basically impossible for any of your units to best her in single-man combat as she'll rip your units to shreds if given the chance.</span></li><li data-dcnode-id="2120"><span data-dcnode-id="2125" instrument_node=""> During chapter XIII, should you go for the Morality or Utility route, once you engage Thalas or Erika, the music will switch to </span><a class="urllink" data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DMj22DIzfMlc"><span data-dcnode-id="2124" instrument_node="">"Combat -Destiny-"</span><img data-dcnode-id="2123" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2121" instrument_node="">. Made especially more powerful during the Morality route, in which Frederica shows her newfound resolve and triumphantly fights back her abusers.</span></li><li data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node=""> In chapter XV, in the pragmatic route, the very somber music "Unwavering Spear -Roland’s Battle" is replaced with a more standard and hopeful battle theme once you engage Patriate.</span></li></ul></li><li data-dcnode-id="2111"><span data-dcnode-id="2115" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassBoast" title="/pmwiki/pmwiki.php/Main/BadassBoast"><span data-dcnode-id="2114" instrument_node="">Badass Boast</span></a><span data-dcnode-id="2112" instrument_node="">: In chapter VII, if the vote decides to fight back against Aesfrost, Serenoa declares that "We surrender Prince Roland to no one! The Aesfrosti shall get our blades between their ribs, and thank us for the honor!"</span></li><li data-dcnode-id="2101"><span data-dcnode-id="2110" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BaitAndSwitch" title="/pmwiki/pmwiki.php/Main/BaitAndSwitch"><span data-dcnode-id="2109" instrument_node="">Bait-and-Switch</span></a><span data-dcnode-id="2107" instrument_node="">: First impressions and trailers imply Roland, Frederica and Benedict are aligned with Morality, Liberty and Utility respectively. </span><span class="spoiler" data-dcnode-id="2102" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2106" instrument_node="">While this is true for most of the game, for the final route split (besides the </span><a class="twikilink" data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="2105" instrument_node="">Golden Ending</span></a><span data-dcnode-id="2103" instrument_node="">) Roland's route represents Utility, Frederica's is Morality, and Benedict's is Liberty.</span></span></li><li data-dcnode-id="2093"><span data-dcnode-id="2100" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBattleDidntCount" title="/pmwiki/pmwiki.php/Main/TheBattleDidntCount"><span data-dcnode-id="2099" instrument_node="">The Battle Didn't Count</span></a><span data-dcnode-id="2097" instrument_node="">: Defeat Avlora in combat during the second battle of Chapter VII's Morality route, and she still manages to retreat. Thankfully, this trope also works in your favor, as the game averts </span><a class="twikilink" data-dcnode-id="2095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroMustSurvive" title="/pmwiki/pmwiki.php/Main/HeroMustSurvive"><span data-dcnode-id="2096" instrument_node="">&lt;Hero&gt; Must Survive</span></a><span data-dcnode-id="2094" instrument_node=""> regarding Roland.</span></li><li data-dcnode-id="2079"><span data-dcnode-id="2092" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeautyEqualsGoodness" title="/pmwiki/pmwiki.php/Main/BeautyEqualsGoodness"><span data-dcnode-id="2091" instrument_node="">Beauty Equals Goodness</span></a><span data-dcnode-id="2089" instrument_node="">: Generally, you can tell a character's ultimate alignment based on how they look in their portrait. The majority of the villainous characters in the game either look ugly or sinister in their portraits, while anyone who looks beautiful or noble tends to be either a potential ally or someone who may pull a </span><a class="twikilink" data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceTurn" title="/pmwiki/pmwiki.php/Main/HeelFaceTurn"><span data-dcnode-id="2088" instrument_node="">Heel–Face Turn</span></a><span data-dcnode-id="2086" instrument_node="">. For an example of the former, see </span><span class="spoiler" data-dcnode-id="2084" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2085" instrument_node="">Patriatte, who serves Glenbrook yet immediately turns around to support Aesfrost when they take over, then turns around again when Roland reclaims Glenbrook and attempts to turn him into his faction's puppet while also stealing from Glenbrook's citizens</span></span><span data-dcnode-id="2083" instrument_node="">. For an example of the latter, see </span><span class="spoiler" data-dcnode-id="2081" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2082" instrument_node="">General Avlora, who despite working for Aesfrost has a sense of honor and nobility and despises Aesfrost's double-dealings. And in the Golden Route, she will even defect to your side</span></span><span data-dcnode-id="2080" instrument_node="">.</span></li><li data-dcnode-id="2071"><span data-dcnode-id="2078" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBadEnsemble" title="/pmwiki/pmwiki.php/Main/BigBadEnsemble"><span data-dcnode-id="2077" instrument_node="">Big Bad Ensemble</span></a><span data-dcnode-id="2075" instrument_node="">: Archduke Gustadolph Aesfrost and </span><span class="spoiler" data-dcnode-id="2073" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2074" instrument_node="">Minister Idore Delmira</span></span><span data-dcnode-id="2072" instrument_node=""> are the architects of the two-way conflict that has the very soul of Norzelia itself on the line.</span></li><li data-dcnode-id="2051"><span data-dcnode-id="2070" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="2069" instrument_node="">Bittersweet Ending</span></a><span data-dcnode-id="2067" instrument_node="">:</span><ul data-dcnode-id="2052"><li data-dcnode-id="2063"><span data-dcnode-id="2066" instrument_node=""> Moral Freedoms: </span><span class="spoiler" data-dcnode-id="2064" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2065" instrument_node="">Serenoa sacrifices himself to destroy Hyzante's corrupt leaders and liberate the Rosellan people. The Roselle leave Norzelia and return overseas to their mythical promised land, where they live happily ever after. Meanwhile, the chaos that House Wolffort sowed in Norzelia to enable this slave liberation plunges the continent into a generation of total war within and between the three nations. Benedict sides with Aesfrost and becomes the ruthless right-hand man to Gustadolph, in exchange for ruling over the conquered former Wolffort demesne.</span></span></li><li data-dcnode-id="2058"><span data-dcnode-id="2062" instrument_node=""> Freed Utility: </span><span class="spoiler" data-dcnode-id="2060" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2061" instrument_node="">Serenoa ascends the throne, crushes Hyzante, liberates the Roselle, and creates a lasting peace between Aesfrost and Glenbrook. Norzelia's newfound salt supplies and Hyzante's alkali research are made freely available to the public, creating a new age of industry and entrepreneurism. Unfortunately, Serenoa's deference to Benedict's dispassionate rule of law results in him failing to protect the poor and marginalised (including the Roselle), and the lower classes are devastated by poverty as the gap between the rich and poor only widens. In response, Roland allies with Idore to build a resistance movement of the downtrodden</span></span><span data-dcnode-id="2059" instrument_node="">.</span></li><li data-dcnode-id="2053"><span data-dcnode-id="2057" instrument_node=""> Utilized Morality: </span><span class="spoiler" data-dcnode-id="2055" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2056" instrument_node="">Serenoa and Roland manage to unite the entire continent under Hyzante, and are appointed to the Saintly Seven as their reward. A lasting peace comes to Norzelia as the wealth and technology of Hyzante spreads to every corner of the continent, and the followers of the Goddess - no matter their status - want for nothing. However, anyone who rebels or rejects the teachings of the Goddess is punished by death or enslavement, and the Roselle remain as the slave caste enabling the lifestyles of the faithful. Frederica becomes an outcast preacher and cult leader who tirelessly attempts to spread the truth of Hyzante's deceptions to the public</span></span><span data-dcnode-id="2054" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2046"><span data-dcnode-id="2050" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackAndGreyMorality" title="/pmwiki/pmwiki.php/Main/BlackAndGreyMorality"><span data-dcnode-id="2049" instrument_node="">Black-and-Grey Morality</span></a><span data-dcnode-id="2047" instrument_node="">: Serenoa and his comrades are very well-meaning people, but being a mere vassal house torn between two opposing nations often forces him to make less than ideal choices to ensure his people's survival. The leaders of said two opposing nations tend to be scheming bastards with very few members who are particularly sympathetic, and those who are sympathetic know that the leaders they work for aren't very good people.</span></li><li data-dcnode-id="2038"><span data-dcnode-id="2045" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BraggingRightsReward" title="/pmwiki/pmwiki.php/Main/BraggingRightsReward"><span data-dcnode-id="2044" instrument_node="">Bragging Rights Reward</span></a><span data-dcnode-id="2042" instrument_node="">: Beating the game without any ally deaths rewards you with the Plumage of Immortality, an accessory that has a 50% chance of reviving a unit. While it can be used in </span><a class="twikilink" data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="2041" instrument_node="">New Game+</span></a><span data-dcnode-id="2039" instrument_node="">, its unreliability makes it generally inferior to the guaranteed, once-per-battle revive from the Resurrection Earring that can be obtained about halfway through a playthrough.</span></li><li data-dcnode-id="2028"><span data-dcnode-id="2037" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakingTheFellowship" title="/pmwiki/pmwiki.php/Main/BreakingTheFellowship"><span data-dcnode-id="2036" instrument_node="">Breaking the Fellowship</span></a><span data-dcnode-id="2034" instrument_node="">: Once you reach the endgame, </span><span class="spoiler" data-dcnode-id="2030" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2033" instrument_node="">Serenoa's top three advisors will be so idealistically opposed to each other that you will lose one depending on which of the three basic ending routes you choose (Frederica in Roland's route, Benedict in Frederica's Route, and Roland in Benedict's route). The only way to prevent any of them leaving is by going for the </span><a class="twikilink" data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="2032" instrument_node="">Golden Ending</span></a></span><span data-dcnode-id="2029" instrument_node="">.</span></li><li data-dcnode-id="2023"><span data-dcnode-id="2027" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BringHelpBack" title="/pmwiki/pmwiki.php/Main/BringHelpBack"><span data-dcnode-id="2026" instrument_node="">Bring Help Back</span></a><span data-dcnode-id="2024" instrument_node="">: At the end of Chapter VII, if the player chose to protect Roland, Benedict has Anna go to Hyzante to request aid.</span></li><li data-dcnode-id="2018"><span data-dcnode-id="2022" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButThouMust" title="/pmwiki/pmwiki.php/Main/ButThouMust"><span data-dcnode-id="2021" instrument_node="">But Thou Must!</span></a><span data-dcnode-id="2019" instrument_node="">: If the conditions for the true ending have been met, Serenoa will ask himself a series of questions, and the player must choose the correct answers to proceed. However, choosing one of the "wrong" options will cause him to contemplate and reject it, and the player is redirected back to the previous dialogue choices.</span></li><li data-dcnode-id="2004"><span data-dcnode-id="2017" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCavalryArrivesLate" title="/pmwiki/pmwiki.php/Main/TheCavalryArrivesLate"><span data-dcnode-id="2016" instrument_node="">The Cavalry Arrives Late</span></a><span data-dcnode-id="2014" instrument_node="">: Before the second fight in Chapter VII, House Falkes gets a </span><a class="twikilink" data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RousingSpeech" title="/pmwiki/pmwiki.php/Main/RousingSpeech"><span data-dcnode-id="2013" instrument_node="">Rousing Speech</span></a><span data-dcnode-id="2011" instrument_node=""> and declare that they're marching off to fight at House Wolffort. They don't show up to help if you fight the Aesfrosti. In fact, they only </span><em data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">do</span></em><span data-dcnode-id="2008" instrument_node=""> appear if you decide to </span><a class="twikilink" data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CavalryBetrayal" title="/pmwiki/pmwiki.php/Main/CavalryBetrayal"><span data-dcnode-id="2007" instrument_node="">fight them</span></a><span data-dcnode-id="2005" instrument_node="">.</span></li><li data-dcnode-id="1999"><span data-dcnode-id="2003" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CantDropTheHero" title="/pmwiki/pmwiki.php/Main/CantDropTheHero"><span data-dcnode-id="2002" instrument_node="">Can't Drop the Hero</span></a><span data-dcnode-id="2000" instrument_node="">: Serenoa must be deployed for all storyline battles.</span></li><li data-dcnode-id="1988"><span data-dcnode-id="1998" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CastOfSnowflakes" title="/pmwiki/pmwiki.php/Main/CastOfSnowflakes"><span data-dcnode-id="1997" instrument_node="">Cast of Snowflakes</span></a><span data-dcnode-id="1995" instrument_node="">: The game has a massive number of story-relevant characters, including a grand total of </span><span class="spoiler" data-dcnode-id="1993" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1994" instrument_node="">thirty</span></span><span data-dcnode-id="1992" instrument_node=""> party members, each with unique abilities and </span><a class="twikilink" data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeanwhileScene" title="/pmwiki/pmwiki.php/Main/MeanwhileScene"><span data-dcnode-id="1991" instrument_node="">Character Stories</span></a><span data-dcnode-id="1989" instrument_node="">.</span></li><li data-dcnode-id="1973"><span data-dcnode-id="1987" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColorCodedForYourConvenience" title="/pmwiki/pmwiki.php/Main/ColorCodedForYourConvenience"><span data-dcnode-id="1986" instrument_node="">Color-Coded for Your Convenience</span></a><span data-dcnode-id="1984" instrument_node="">:</span><ul data-dcnode-id="1974"><li data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node=""> The game has grid squares colored differently if an enemy unit can attack that unit while it's on that square. Blue squares mean that the unit is safe from harm, while purple squares mean that it can be damaged.</span></li><li data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node=""> On the world map, territory controlled by Glenbrook is highlighted green, territory controlled by Aesfrost is highlighted red, and territory controlled by Hyzante is colored purple.</span></li><li data-dcnode-id="1975"><span data-dcnode-id="1979" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmaMeter" title="/pmwiki/pmwiki.php/Main/KarmaMeter"><span data-dcnode-id="1978" instrument_node="">Karma Meter</span></a><span data-dcnode-id="1976" instrument_node=""> and Path Traveled have colors for Morality (green), Liberty (red), and Utility (yellow).</span></li></ul></li><li data-dcnode-id="1965"><span data-dcnode-id="1972" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CommieLand" title="/pmwiki/pmwiki.php/Main/CommieLand"><span data-dcnode-id="1971" instrument_node="">Commie Land</span></a><span data-dcnode-id="1969" instrument_node="">: Hyzante is a theocratic version. Citizens who profess the faith are fed, housed, and given universal healthcare for free via the state-owned monopoly on the vital-for-life salt produced by an army of Roselle slaves. At the same time, "heretics" are hunted down and executed, and the state also determines how research is applied and generally forbids anyone it deems vital from leaving (with a particular mountain fortress as a sort of Berlin Wall). Naturally, it's filled with corrupt </span><a class="twikilink" data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ObstructiveBureaucrat" title="/pmwiki/pmwiki.php/Main/ObstructiveBureaucrat"><span data-dcnode-id="1968" instrument_node="">obstructive bureaucrats</span></a><span data-dcnode-id="1966" instrument_node=""> who scheme against each other's departments.</span></li><li data-dcnode-id="1960"><span data-dcnode-id="1964" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContractualBossImmunity" title="/pmwiki/pmwiki.php/Main/ContractualBossImmunity"><span data-dcnode-id="1963" instrument_node="">Contractual Boss Immunity</span></a><span data-dcnode-id="1961" instrument_node="">: Bosses can ignore your attempts to inflict certain status ailments. For example, in Chapter VII, Avlora is totally immune to all status effects (but can still be insta-killed by the booby traps in Wolffort), while Landroi is immune to blindness and provocation (but can still be put to sleep and paralyzed). The Quietus skill Missed Opportunity bypasses this, and can inflict Stop on enemies that are otherwise immune to it.</span></li><li data-dcnode-id="1953"><span data-dcnode-id="1959" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorruptChurch" title="/pmwiki/pmwiki.php/Main/CorruptChurch"><span data-dcnode-id="1958" instrument_node="">Corrupt Church</span></a><span data-dcnode-id="1956" instrument_node="">: Early on, it becomes clear that the Holy State of Hyzante's religion is not all it's cracked up to be, what with how "heathens" who dare share their research with the outside world are dealt with, how the Rosellans are persecuted with impunity, and the exorbitant taxation and sale of the salt they control. </span><span class="spoiler" data-dcnode-id="1954" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1955" instrument_node="">Perhaps unsurprisingly, Hyzante ultimately ends up being the worst of the antagonistic forces once its dark secrets and the truth of the Rosellans come to light, making even the sociopathic Gustadolph seem like a saint by comparison. In fact, three out of four routes has a leader of Hyzante as the final boss—two of which is the very person driving all the conflict and one of which is merely a tool of that same person—while the one non-Hyzante final boss is an emotionally distraught and normally well-meaning man who has lost it from tragedy after tragedy. This is taken to a new level once it is revealed the person spearheading it outright changed the original scriptures to suit his own twisted end, likely resulting in even the first Saltiron war to begin with.</span></span></li><li data-dcnode-id="1941"><span data-dcnode-id="1952" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CultureClash" title="/pmwiki/pmwiki.php/Main/CultureClash"><span data-dcnode-id="1951" instrument_node="">Culture Clash</span></a><span data-dcnode-id="1949" instrument_node="">: The three nations in Norzelia all operate under much difference circumstances, which is something discussed at length by the characters who note that not each nation is entirely perfect. One of the primary conflicts in the story involves Aesfrost and Hyzante attempting to enact their way of living on the rest of Norzelia.</span><ul data-dcnode-id="1942"><li data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node=""> The Grand Duchy of Aesfrost is a meritocracy where people are given the freedom and opportunity to become prosperous regardless of their background and status. However, not everyone is successful and the gap between the rich and poverty-stricken is more pronounced than the other nations.</span></li><li data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node=""> The Holy State of Hyzante is a strict theocracy in which everyone is treated equally but they lack freedom. As a result, there isn't any poverty but everyone must work on the occupation and tasks assigned to them by the Saintly Seven and they must abide by strict beliefs in accordance with the Goddess of Salt.</span></li><li data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node=""> Glenbrook is an aristocracy lead by a king and queen. The rigid system where one's station is primarily based on their bloodline allows for its citizens to live in relative peace despite the obvious inequality. However, the royalty and nobles are prone to corruption and power abuse, and regularly manipulate Glenbrooks' citizens for their own gain.</span></li></ul></li><li data-dcnode-id="1936"><span data-dcnode-id="1940" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CutscenePowerToTheMax" title="/pmwiki/pmwiki.php/Main/CutscenePowerToTheMax"><span data-dcnode-id="1939" instrument_node="">Cutscene Power to the Max</span></a><span data-dcnode-id="1937" instrument_node="">: After the battle with Booker, when he attempts to flee, Anna leaps across the entire map to cut him down. In actual gameplay, she has no such ability, the closest being a skill that lets her move up or down any height.</span></li><li data-dcnode-id="1928"><span data-dcnode-id="1935" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkerAndEdgier" title="/pmwiki/pmwiki.php/Main/DarkerAndEdgier"><span data-dcnode-id="1934" instrument_node="">Darker and Edgier</span></a><span data-dcnode-id="1932" instrument_node="">: The trailer and Debut Demo make it clear the game is more grim and serious than any previous game made by the team. The Debut Demo itself has several important characters die, and the main character is forced to make a </span><a class="twikilink" data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SadisticChoice" title="/pmwiki/pmwiki.php/Main/SadisticChoice"><span data-dcnode-id="1931" instrument_node="">Sadistic Choice</span></a><span data-dcnode-id="1929" instrument_node=""> almost right away.</span></li><li data-dcnode-id="1905"><span data-dcnode-id="1927" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DecidedByOneVote" title="/pmwiki/pmwiki.php/Main/DecidedByOneVote"><span data-dcnode-id="1926" instrument_node="">Decided by One Vote</span></a><span data-dcnode-id="1924" instrument_node="">:</span><ul data-dcnode-id="1906"><li data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node=""> In the Debut Demo, based on Chapter VII of the full game, if you only change one person's mind from "surrender Roland" to "protect Roland", and then vote to protect Roland yourself, this will cause the Scales of Conviction vote to become a 4-to-4 tie. However, since you're playing as Serenoa, the lord of House Wolffort, you'll be chosen to cast the "tiebreaker vote", which you can then use to make the votes 5 to 4 in favor of whichever you choose. In the actual full game, the situation is somewhat changed, so that Frederica, Hughette, and Erador are for staving off the Aesfrosti, Benedict, Roland, and Geela are for surrender, and Anna is the undecided swing vote (with Serenoa no longer able to place his own vote).</span></li><li data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node=""> In the Prologue Demo / Chapter III, the vote over which nation to visit on a diplomatic mission is initially set up this way. Roland, Hughette, and Erador are in favor of Aesfrost; Benedict, Frederica, and Geela are in favor of Hyzante; and Anna is the undecided swing vote.</span></li><li data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node=""> If the Chapter VII vote swung to Utility, Roland will leave the party for a time; the subsequent Chapter VIII thus has six rather than seven votes with two (Benedict and Geela) being undecided. It’s also the first opportunity in the full game for two options to tie, at which point Serenoa does cast the tiebreaker vote like he could in the Debut Demo.</span></li><li data-dcnode-id="1907"><span data-dcnode-id="1917" instrument_node=""> Chapter XIII is the first three-way vote of the game, and it is similarly initially split in this fashion; Benedict and Anna advocate </span><span class="spoiler" data-dcnode-id="1915" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1916" instrument_node="">breaking a dam to flood Aesfrosti troops (but also damaging the Crown City)</span></span><span data-dcnode-id="1914" instrument_node="">; Roland and Hughette want to </span><span class="spoiler" data-dcnode-id="1912" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1913" instrument_node="">destroy a warship to cut off the Aesfrosti's escape route</span></span><span data-dcnode-id="1911" instrument_node="">; Frederica and Geela suggest </span><span class="spoiler" data-dcnode-id="1909" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1910" instrument_node="">destroying a bridge in order to trap the Aesfrosti in Glenbrook Castle</span></span><span data-dcnode-id="1908" instrument_node="">, and Erador is the undecided swing vote. Zigzagged with the later three-way votes — Chapters XV and XVII both have a ‘’minimum’’ of two undecided voters, but it’s nonetheless possible to fail at swaying them in the desired direction and potentially need a tie-breaker.</span></li></ul></li><li data-dcnode-id="1888"><span data-dcnode-id="1904" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeusAngstMachina" title="/pmwiki/pmwiki.php/Main/DeusAngstMachina"><span data-dcnode-id="1903" instrument_node="">Deus Angst Machina</span></a><span data-dcnode-id="1901" instrument_node="">: For how short the Debut Demo is, the story </span><em data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">really</span></em><span data-dcnode-id="1898" instrument_node=""> shits on Roland. </span><span class="spoiler" data-dcnode-id="1896" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1897" instrument_node="">Aesfrosti forces invade his home and murder his entire family except his sister, his loyal friend Ser Maxwell falls in battle and is left for dead, and he's forced to flee with Aesfrosti forces coming to kill him</span></span><span data-dcnode-id="1895" instrument_node="">. It gets worse if the heroes decide to surrender him to Aesfrost in Chapter VII, as </span><span class="spoiler" data-dcnode-id="1893" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1894" instrument_node="">he is forced by the Archduke to send his own friends to kill their allies, and ends up in gaol with the Archduke intending to order his execution</span></span><span data-dcnode-id="1892" instrument_node="">. While things settle down for a time after </span><span class="spoiler" data-dcnode-id="1890" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1891" instrument_node="">he fakes his death</span></span><span data-dcnode-id="1889" instrument_node="">, this is only the start of the world’s efforts to break him.</span></li><li data-dcnode-id="1845"><span data-dcnode-id="1887" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DevelopersForesight" title="/pmwiki/pmwiki.php/Main/DevelopersForesight"><span data-dcnode-id="1886" instrument_node="">Developers' Foresight</span></a><span data-dcnode-id="1884" instrument_node="">:</span><ul data-dcnode-id="1846"><li data-dcnode-id="1879"><span data-dcnode-id="1883" instrument_node=""> In the Debut Demo, where Serenoa gets a vote, if you successfully convinced a character to change their opinion, only to then pick the option they would have chosen originally, the characters you spoke to will react to your decision both in text and in flavor audio lines, in most cases </span><a class="twikilink" data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatTheHellHero" title="/pmwiki/pmwiki.php/Main/WhatTheHellHero"><span data-dcnode-id="1882" instrument_node="">being confused or annoyed by your seemingly inconsistent choices</span></a><span data-dcnode-id="1880" instrument_node="">. For example, on what to do about Roland, Benedict will outright express his disappointment if you convinced him to reconsider only to then decide to hand Roland over anyway. In particular, Erador is rightfully upset at you for doing so, being the only member to start off undecided, and he accuses you of setting him up for failure. In the full game Serenoa no longer gets a vote himself.</span></li><li data-dcnode-id="1869"><span data-dcnode-id="1878" instrument_node=""> In the Debut Demo / Chapter VII's Liberty route, if you decide to not use the traps laid out in the Wolffort city after bringing it up as a way to even the odds, the cutscene after will have the characters acknowledge their victory without having to sacrifice any of the city to do so, with Serenoa expressing relief he was not forced to use a </span><a class="twikilink" data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodzillaThreshold" title="/pmwiki/pmwiki.php/Main/GodzillaThreshold"><span data-dcnode-id="1877" instrument_node="">Godzilla Threshold</span></a><span data-dcnode-id="1875" instrument_node="">. </span><span class="spoiler" data-dcnode-id="1870" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1874" instrument_node="">This is also a requirement to unlock the </span><a class="twikilink" data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1873" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1871" instrument_node="">.</span></span></li><li data-dcnode-id="1864"><span data-dcnode-id="1868" instrument_node=""> If you somehow end up in a situation where the votes are evenly split, the game will account for this by invoking </span><a class="twikilink" data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DecidedByOneVote" title="/pmwiki/pmwiki.php/Main/DecidedByOneVote"><span data-dcnode-id="1867" instrument_node="">Decided by One Vote</span></a><span data-dcnode-id="1865" instrument_node="">, since as the ruler of House Wolffort, Serenoa has the authority to decide.</span></li><li data-dcnode-id="1847"><span data-dcnode-id="1863" instrument_node=""> When fighting the </span><a class="twikilink" data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrueFinalBoss" title="/pmwiki/pmwiki.php/Main/TrueFinalBoss"><span data-dcnode-id="1862" instrument_node="">True Final Boss</span></a><span data-dcnode-id="1860" instrument_node=""> at the end of the </span><a class="twikilink" data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1859" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1857" instrument_node=""> route, every single playable character has a line of voiced dialogue that plays when they first interact with the boss. This includes lines for the three characters who join in versions of Chapter XV that </span><em data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">don't</span></em><span data-dcnode-id="1854" instrument_node=""> lead to the </span><a class="twikilink" data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1853" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1851" instrument_node="">, but can be deployed if playing on a </span><a class="twikilink" data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="1850" instrument_node="">New Game+</span></a><span data-dcnode-id="1848" instrument_node=""> run. As a secondary layer of foresight, characters like Geela who would almost never attack the boss directly will instead play their line simply by taking any action in the boss's general vicinity.</span></li></ul></li><li data-dcnode-id="1834"><span data-dcnode-id="1844" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DialogueTree" title="/pmwiki/pmwiki.php/Main/DialogueTree"><span data-dcnode-id="1843" instrument_node="">Dialogue Tree</span></a><span data-dcnode-id="1841" instrument_node="">: Characters with "!" icons over their heads can be given one of three responses; depending on what kind of answer Serenoa gives, it will influence the </span><a class="twikilink" data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmaMeter" title="/pmwiki/pmwiki.php/Main/KarmaMeter"><span data-dcnode-id="1840" instrument_node="">Karma Meter</span></a><span data-dcnode-id="1838" instrument_node=""> and potentially alter the game's story. During the Persuasion Phase before using the Scales of Conviction, you can persuade characters toward a specific decision in much the same way; two generic responses are available by default, but sleuthing around to gather intel can unlock an additional 3rd option that can potentially — but not always — have a much greater influence on your allies. For example, in Chapter VII, Frederica's unlocked option will fail to make her consider surrendering Roland whatsoever; only insisting </span><a class="twikilink" data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheNeedsOfTheMany" title="/pmwiki/pmwiki.php/Main/TheNeedsOfTheMany"><span data-dcnode-id="1837" instrument_node="">The Needs of the Many</span></a><span data-dcnode-id="1835" instrument_node=""> will do so.</span></li><li data-dcnode-id="1827"><span data-dcnode-id="1833" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DirtyCoward" title="/pmwiki/pmwiki.php/Main/DirtyCoward"><span data-dcnode-id="1832" instrument_node="">Dirty Coward</span></a><span data-dcnode-id="1830" instrument_node="">: The narrative notes House Telliore to be quick to bend to higher authority if it means saving the skin on their backs, a stark contrast to House Falkes who is loyal to Glenbrook to the bitter end. </span><span class="spoiler" data-dcnode-id="1828" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1829" instrument_node="">If the party chooses to surrender Roland in Chapter VII, Telliore surrenders itself to Aesfrost as well, and the narrator notes that Telliore has their heads buried so deep in the sand that they politely ignore that the Falkes countryside was razed by their own men in the wake of battle with House Wolffort.</span></span></li><li data-dcnode-id="1820"><span data-dcnode-id="1826" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DominoMask" title="/pmwiki/pmwiki.php/Main/DominoMask"><span data-dcnode-id="1825" instrument_node="">Domino Mask</span></a><span data-dcnode-id="1823" instrument_node="">: Ser Maxwell is seen wearing one. </span><span class="spoiler" data-dcnode-id="1821" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1822" instrument_node="">In Chapter VII, the bloodstained mask is later found by Wolffort scouts and handed over to Serenoa and Roland as proof that even the Dawnspear has fallen in battle. Roland then uses it as a disguise to avoid Aesfrost's forces.</span></span></li><li data-dcnode-id="1815"><span data-dcnode-id="1819" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerBeginning" title="/pmwiki/pmwiki.php/Main/DownerBeginning"><span data-dcnode-id="1818" instrument_node="">Downer Beginning</span></a><span data-dcnode-id="1816" instrument_node="">: The Debut Demo begins with Glenbrook's capital already having fallen to Aesfrost's surprise invasion.</span></li><li data-dcnode-id="1805"><span data-dcnode-id="1814" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarnYourHappyEnding" title="/pmwiki/pmwiki.php/Main/EarnYourHappyEnding"><span data-dcnode-id="1813" instrument_node="">Earn Your Happy Ending</span></a><span data-dcnode-id="1811" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1806" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1810" instrument_node="">The </span><a class="twikilink" data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1809" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1807" instrument_node=""> route requires you to choose specific routes to achieve it. Not using the Wolffort wildfire would give the party an edge against Exharme's assault, being party to the illegal salt trade would influence Clarus to aid Serenoa in sneaking into the Source, revealing Roland's identity would make Svarog an ally, defending the Roselle would encourage them to revolt against Hyzante, and being at Symon's side when assassins strike allows him to encourage Serenoa to follow his own convictions. It's a tedious task but it would ensure that Roland, Benedict, and Frederica would all remain in your party.</span></span></li><li data-dcnode-id="1800"><span data-dcnode-id="1804" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ElementalRockPaperScissors" title="/pmwiki/pmwiki.php/Main/ElementalRockPaperScissors"><span data-dcnode-id="1803" instrument_node="">Elemental Rock–Paper–Scissors</span></a><span data-dcnode-id="1801" instrument_node="">: Various units are weak to different types of damage, including Fire, Ice, Thunder, and physical damage. Exploiting a weakness deals more damage than usual and earns free Kudos.</span></li><li data-dcnode-id="1795"><span data-dcnode-id="1799" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EveryoneHasASpecialMove" title="/pmwiki/pmwiki.php/Main/EveryoneHasASpecialMove"><span data-dcnode-id="1798" instrument_node="">Everyone Has a Special Move</span></a><span data-dcnode-id="1796" instrument_node="">: The game has 30 units to potentially recruit and while they can be split into basic role groups like front-line damage dealers, mages, healers, etc. virtually every character has a unique niche not filled by other characters or certain upsides that make them worth using over other characters in the same general role.</span></li><li data-dcnode-id="1790"><span data-dcnode-id="1794" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FallingDamage" title="/pmwiki/pmwiki.php/Main/FallingDamage"><span data-dcnode-id="1793" instrument_node="">Falling Damage</span></a><span data-dcnode-id="1791" instrument_node="">: Using skills that have a knock-back attack while on a high enough spot will cause the person to fall off and take extra damage.</span></li><li data-dcnode-id="1778"><span data-dcnode-id="1789" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseFlagOperation" title="/pmwiki/pmwiki.php/Main/FalseFlagOperation"><span data-dcnode-id="1788" instrument_node="">False Flag Operation</span></a><span data-dcnode-id="1786" instrument_node="">:</span><ul data-dcnode-id="1779"><li data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node=""> Gustadolph invades Glenbrook under the pretext that Glenbrook is responsible for the murder of his cousin Dragan, thus breaking the truce. The heroes claim they saw Gustadolph arrange the death of Dragan instead, but decide not to reveal this publicly because it would be useless with the war already started.</span></li><li data-dcnode-id="1780"><span data-dcnode-id="1783" instrument_node=""> If the party agrees to surrender Prince Roland, they will attempt to parlay with House Falkes in an attempt to avoid a battle. </span><span class="spoiler" data-dcnode-id="1781" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1782" instrument_node="">Unfortunately, right before Serenoa can meet with the House, Aesfrost's army shows up at Falkes's doorstep. The Lord interprets this as a dirty trick by Wolffort and attacks the party before deliberations can even take place.</span></span></li></ul></li><li data-dcnode-id="1753"><span data-dcnode-id="1777" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture" title="/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture"><span data-dcnode-id="1776" instrument_node="">Fantasy Counterpart Culture</span></a><span data-dcnode-id="1774" instrument_node="">: The setting is a hodge-podge of various Eurasian cultures, set in a landlocked region that exists in isolation from other civilizations (and given the Norzelia Falls, may be well above sea level). As such:</span><ul data-dcnode-id="1754"><li data-dcnode-id="1763"><span data-dcnode-id="1773" instrument_node=""> Hyzante is a version of the Abbasid Caliphate </span><a class="twikilink" data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArabianNightsDays" title="/pmwiki/pmwiki.php/Main/ArabianNightsDays"><span data-dcnode-id="1772" instrument_node="">at its height</span></a><span data-dcnode-id="1770" instrument_node=""> set in </span><a class="twikilink" data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AncientEgypt" title="/pmwiki/pmwiki.php/Main/AncientEgypt"><span data-dcnode-id="1769" instrument_node="">Ancient Egypt</span></a><span data-dcnode-id="1767" instrument_node="">, highly advanced in science and medicine but a fanatical theocracy unwilling to share anything with "heathens". (As if to prove the point, people stop and turn in the direction of the shrine to pray in the streets.) They also talk about equality yet build everything off the backs of an oppressed labor caste and dictate each person's job, making them </span><a class="twikilink" data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChummyCommies" title="/pmwiki/pmwiki.php/Main/ChummyCommies"><span data-dcnode-id="1766" instrument_node="">Chummy Commies</span></a><span data-dcnode-id="1764" instrument_node=""> at best. There is even a difference in design regarding the main Hyzantian mages and the researchers who rebelled along with Plinius Naveste, the former resembling the Islamic peoples while the latter instead vaguely resemble Ancient Egyptians by contrast.</span></li><li data-dcnode-id="1759"><span data-dcnode-id="1762" instrument_node=""> The oppressed Roselle, meanwhile, are Jewish stand-ins, with aesthetics that pull on both traditional Japanese and Native American imagery. They labour at the Source just as the Hebrew slaves in Egypt (supposedly) tirelessly worked on infrastructure. </span><span class="spoiler" data-dcnode-id="1760" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1761" instrument_node="">They also migrated from Centralia, an ancestral home to which one ending has them return after escaping their enslavement, furthering the parallels.</span></span></li><li data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node=""> On the other hand, Nordic, industrialized Aesfrost came out the worst in the most recent war and seek revenge, making them equivalent to post-WWI Germany (down to their etymology). Being the least-densely populated nation who live in the frosty northern tundra has parallels to Russia, while in geographic relation to Glenbrook they resemble Switzerland.</span></li><li data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node=""> Finally, Glenbrook itself is mercantile and arable, having a massive river system that periodically floods due to the glaciers of Aesfrosti territory, giving similarities to France; the Royalists are a faction of aristocrats with heavy court influence, while the large demesnes of the Three High Houses jointly give their ruling lords attributes of both dukes (being second to the king in power) and marquesses (border lords who were the homeland’s first lines of defence).</span></li></ul></li><li data-dcnode-id="1748"><span data-dcnode-id="1752" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FightFireWithFire" title="/pmwiki/pmwiki.php/Main/FightFireWithFire"><span data-dcnode-id="1751" instrument_node="">Fight Fire with Fire</span></a><span data-dcnode-id="1749" instrument_node="">: Hughette has a passive debuff called Hawk's Bane that increases the damage she takes from Bows despite being a Bow user herself. Roland has a similar passive called Knight's Bane that makes him take more damage with spears despite his weapon being a spear as well.</span></li><li data-dcnode-id="1740"><span data-dcnode-id="1747" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FireIceLightning" title="/pmwiki/pmwiki.php/Main/FireIceLightning"><span data-dcnode-id="1746" instrument_node="">Fire, Ice, Lightning</span></a><span data-dcnode-id="1744" instrument_node="">: The game has the elements of fire, ice and lightning form a </span><a class="twikilink" data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GeoEffects" title="/pmwiki/pmwiki.php/Main/GeoEffects"><span data-dcnode-id="1743" instrument_node="">Geo Effects</span></a><span data-dcnode-id="1741" instrument_node=""> combo. You either use fire magic to set the land ablaze and then ice magic to cool the fire into puddles of water, or use ice magic to freeze the land and then fire magic to melt the ice into water. You then use lightning magic to fry anyone standing in the water.</span></li><li data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FriendlyFireproof" title="/pmwiki/pmwiki.php/Main/FriendlyFireproof"><span data-dcnode-id="1738" instrument_node="">Friendly Fireproof</span></a><span data-dcnode-id="1736" instrument_node="">: Zigzagged. Your basic magic attacks will not strike allies; using lightning magic on water, however, will.</span></li><li data-dcnode-id="1725"><span data-dcnode-id="1734" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1732" href="https://chatnoir-webcontent.chatno
