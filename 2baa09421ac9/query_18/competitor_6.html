tps://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatIsThisThingYouCallLove" title="/pmwiki/pmwiki.php/Main/WhatIsThisThingYouCallLove"><span data-dcnode-id="2376" instrument_node="">What Is This Thing You Call "Love"?</span></a><span data-dcnode-id="2374" instrument_node="">.</span></li><li data-dcnode-id="2351"><span data-dcnode-id="2372" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreyAndGrayMorality" title="/pmwiki/pmwiki.php/Main/GreyAndGrayMorality"><span data-dcnode-id="2371" instrument_node="">Grey-and-Gray Morality</span></a><span data-dcnode-id="2369" instrument_node="">: Both the Order of the Flaming Rose and the Scoia'tael have legitimate goals, ideals, and grievances, which they go over painstakingly. But the Order is composed of fanatical nutjobs whose ideal of protecting people is killing every non-human in sight </span><span class="spoiler" data-dcnode-id="2367" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2368" instrument_node="">and they are secretly working in tandem with Salamandra</span></span><span data-dcnode-id="2366" instrument_node="">, and the Squirrels are terrorists who end up killing many more civilians, which just makes life harder for the very people they profess to save.</span><ul data-dcnode-id="2352"><li data-dcnode-id="2361"><span data-dcnode-id="2365" instrument_node=""> In the cutscenes, Geralt explicitly reflects on the fact that </span><a class="twikilink" data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeAThirdOption" title="/pmwiki/pmwiki.php/Main/TakeAThirdOption"><span data-dcnode-id="2364" instrument_node="">he should never take sides</span></a><span data-dcnode-id="2362" instrument_node="">.</span></li><li data-dcnode-id="2357"><span data-dcnode-id="2360" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackAndGreyMorality" title="/pmwiki/pmwiki.php/Main/BlackAndGreyMorality"><span data-dcnode-id="2359" instrument_node="">Salamandra, however, is pretty much explicitly evil.</span></a></li><li data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node=""> If you side with the Order of the Flaming Rose, you'll find that several of them really do follow the ideals they profess. In this story branch, the conflict ends with a civil war between the good and corrupt factions.</span></li><li data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node=""> Conversely, side with the Scoia'tael, and you'll find that there really isn't much more to them than meets the eye. They're arguably less "dark" than the Order to begin with however, so it probably equals out in the end.</span></li></ul></li><li data-dcnode-id="2346"><span data-dcnode-id="2350" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HannibalLecture" title="/pmwiki/pmwiki.php/Main/HannibalLecture"><span data-dcnode-id="2349" instrument_node="">Hannibal Lecture</span></a><span data-dcnode-id="2347" instrument_node="">: The Professor, at least three times. Hilariously subverted by Geralt during the showdown in the caverns under Vizima.</span></li><li data-dcnode-id="2341"><span data-dcnode-id="2345" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroesPreferSwords" title="/pmwiki/pmwiki.php/Main/HeroesPreferSwords"><span data-dcnode-id="2344" instrument_node="">Heroes Prefer Swords</span></a><span data-dcnode-id="2342" instrument_node="">: Enforced by the gameplay mechanics. Witcher combat styles are based entirely around the sword. While you can carry axes, daggers, spiked clubs and torches, they're not really of any use since assigning points to sword fighting styles makes using swords increasingly more powerful as the game goes on. There's also the fact that silver swords are more effective against monsters, making other weapons practically useless.</span></li><li data-dcnode-id="2336"><span data-dcnode-id="2340" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroesWantRedHeads" title="/pmwiki/pmwiki.php/Main/HeroesWantRedHeads"><span data-dcnode-id="2339" instrument_node="">Heroes Want Redheads</span></a><span data-dcnode-id="2337" instrument_node="">: Triss and Shani, the two contenders for serious love interests in this game, are both redheads. The only major female character that is not redhead is Toruviel (and to, some extent, also Carmen).</span></li><li data-dcnode-id="2328"><span data-dcnode-id="2335" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HolyGrail" title="/pmwiki/pmwiki.php/Main/HolyGrail"><span data-dcnode-id="2334" instrument_node="">Holy Grail</span></a><span data-dcnode-id="2332" instrument_node="">: The Holy Grail is brought up at one point, all of the standard (touched by Jesus, ancient conspiracy, and "self perfection") ideas are theories about it in universe.</span><ul data-dcnode-id="2329"><li data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node=""> Jesus is replaced by a prophet named Lebioda (as mentioned above) and various legends have slight name changes.</span></li></ul></li><li data-dcnode-id="2321"><span data-dcnode-id="2327" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HookerWithAHeartOfGold" title="/pmwiki/pmwiki.php/Main/HookerWithAHeartOfGold"><span data-dcnode-id="2326" instrument_node="">Hooker with a Heart of Gold</span></a><span data-dcnode-id="2324" instrument_node="">: Carmen. </span><span class="spoiler" data-dcnode-id="2322" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2323" instrument_node="">She wants to cure her lover of lycanthropy. With Geralt's help, she can succeed.</span></span></li><li data-dcnode-id="2310"><span data-dcnode-id="2320" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HotterAndSexier" title="/pmwiki/pmwiki.php/Main/HotterAndSexier"><span data-dcnode-id="2319" instrument_node="">Hotter and Sexier</span></a><span data-dcnode-id="2317" instrument_node="">: While the books made it clear that Geralt </span><a class="twikilink" data-dcnode-id="2315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReallyGetsAround" title="/pmwiki/pmwiki.php/Main/ReallyGetsAround"><span data-dcnode-id="2316" instrument_node="">Really Gets Around</span></a><span data-dcnode-id="2314" instrument_node="">, the games are somewhat infamous for their level of sexual content. This game in particular has an almost absurd number of </span><a class="twikilink" data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OptionalSexualEncounter" title="/pmwiki/pmwiki.php/Main/OptionalSexualEncounter"><span data-dcnode-id="2313" instrument_node="">Optional Sexual Encounters</span></a><span data-dcnode-id="2311" instrument_node="">. The sequel significantly cuts down on the number of encounters, but counteracts that with some very explicit cutscenes.</span></li><li data-dcnode-id="2305"><span data-dcnode-id="2309" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HotWitch" title="/pmwiki/pmwiki.php/Main/HotWitch"><span data-dcnode-id="2308" instrument_node="">Hot Witch</span></a><span data-dcnode-id="2306" instrument_node="">: Abigail. Technically, she's more of an alchemist, but the villagers view her as a witch regardless.</span></li><li data-dcnode-id="2281"><span data-dcnode-id="2304" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumansAreTheRealMonsters" title="/pmwiki/pmwiki.php/Main/HumansAreTheRealMonsters"><span data-dcnode-id="2303" instrument_node="">Humans Are the Real Monsters</span></a><span data-dcnode-id="2301" instrument_node="">: Oh yes. You may think you've seen the scum of the earth when you've finished dealing with the zealots, rapists, murderers, and bandits in the </span><em data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">prologue</span></em><span data-dcnode-id="2298" instrument_node="">, but you haven't even scratched the surface. That guardsman trying to bust up a local drug ring? He's probably addicted to the same drugs and hoping to turn the situation to his advantage. That doddering harmless old man? He's even worse. That nun who sacrifices her time and energy to help dying plague victims, potentially exposing herself to the deadly disease for no tangible reward whatsoever? </span><em data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">She eats babies.</span></em><span data-dcnode-id="2295" instrument_node=""> (Well, not really, but it wouldn't surprise you.)</span><ul data-dcnode-id="2289"><li data-dcnode-id="2290"><span data-dcnode-id="2294" instrument_node=""> The phrase </span><em data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Humans are monsters</span></em><span data-dcnode-id="2291" instrument_node=""> itself appears very often. Usually in a conversation with Zoltan.</span></li></ul><div class="indent" data-dcnode-id="2282"><em data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">"Witchers are known to carry two blades. A silver blade for monsters and steel for humans."</span></em><span data-dcnode-id="2286" instrument_node=""> </span><br data-dcnode-id="2285"><em data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">"Both are for monsters."</span></em></div></li><li data-dcnode-id="2273"><span data-dcnode-id="2280" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HyperspaceArsenal" title="/pmwiki/pmwiki.php/Main/HyperspaceArsenal"><span data-dcnode-id="2279" instrument_node="">Hyperspace Arsenal</span></a><span data-dcnode-id="2277" instrument_node="">: Zigzagged. Geralt actual stash is invisible (his armours don't seem to include pockets or backpacks, except the small strap in which he can store a few potions for quick access) but it only contains tiny items (food, potions, books, scrolls, alchemical ingredients, etc). The bigger items (weapons, armours, and trophies) are carried in special item slots and actually appear on Geralt ingame; they can't be put in the stash.</span><ul data-dcnode-id="2274"><li data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node=""> The fact that items put into storage at one inn can be withdrawn from any other inn is never explained.</span></li></ul></li><li data-dcnode-id="2268"><span data-dcnode-id="2272" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IHaveYouNowMyPretty" title="/pmwiki/pmwiki.php/Main/IHaveYouNowMyPretty"><span data-dcnode-id="2271" instrument_node="">I Have You Now, My Pretty</span></a><span data-dcnode-id="2269" instrument_node="">: Subverted. During the final duel, Salamander claims he has captured Geralt's love interest (Triss or Shani, depending on the choices made throughout the game), but he is bluffing.</span></li><li data-dcnode-id="2255"><span data-dcnode-id="2267" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IdentityAmnesia" title="/pmwiki/pmwiki.php/Main/IdentityAmnesia"><span data-dcnode-id="2266" instrument_node="">Identity Amnesia</span></a><span data-dcnode-id="2264" instrument_node="">: Geralt has amnesia, and has to be told who/what he is and what he can do.</span><ul data-dcnode-id="2256"><li data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node=""> Unusually, he doesn't get it back immediately, but instead creates a new one.</span></li><li data-dcnode-id="2257"><span data-dcnode-id="2261" instrument_node=""> However, it is restored in the sequel, as his memory was lost </span><span class="spoiler" data-dcnode-id="2259" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2260" instrument_node="">when meeting the Wild Hunt</span></span><span data-dcnode-id="2258" instrument_node="">. A second meeting may have allowed for it to come back.</span></li></ul></li><li data-dcnode-id="2247"><span data-dcnode-id="2254" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IJustWantToBeNormal" title="/pmwiki/pmwiki.php/Main/IJustWantToBeNormal"><span data-dcnode-id="2253" instrument_node="">I Just Want to Be Normal</span></a><span data-dcnode-id="2251" instrument_node="">: The source of </span><span class="spoiler" data-dcnode-id="2249" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2250" instrument_node="">Berengar</span></span><span data-dcnode-id="2248" instrument_node="">'s bitterness.</span></li><li data-dcnode-id="2242"><span data-dcnode-id="2246" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImplausibleFencingPowers" title="/pmwiki/pmwiki.php/Main/ImplausibleFencingPowers"><span data-dcnode-id="2245" instrument_node="">Implausible Fencing Powers</span></a><span data-dcnode-id="2243" instrument_node="">: Geralt's speed and dexterity as a fencer is justified by his mutations. Much is made about his ability to deflect crossbow bolts in flight.</span></li><li data-dcnode-id="2237"><span data-dcnode-id="2241" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/INeedAFreakingDrink" title="/pmwiki/pmwiki.php/Main/INeedAFreakingDrink"><span data-dcnode-id="2240" instrument_node="">I Need a Freaking Drink</span></a><span data-dcnode-id="2238" instrument_node="">: Said by Shani if you are on the Neutral path during chapter 5. As a doctor, she sets up a field hospital in the middle of a battlefield between the Order and the Scoia'tael and is treating both sides indiscriminately. Scoia'tael members barge in her hospital and, after seeing that she is treating humans, try to kill them and her. After Geralt dispose of them, members of the Order enter the hospital. Shani tells them that they are late and that their help is no longer needed, only for them to start attacking her and her non-humans patients when they realize she is helping non-humans. Once again, Geralt deals with them, leaving behind a bloody mess in the middle of the hospital. At this point, a very shaken and distraught Shani says she needs a drink.</span></li><li data-dcnode-id="2229"><span data-dcnode-id="2236" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InUniverseGameClock" title="/pmwiki/pmwiki.php/Main/InUniverseGameClock"><span data-dcnode-id="2235" instrument_node="">In-Universe Game Clock</span></a><span data-dcnode-id="2233" instrument_node="">: The Witcher has a day/night cycle set to approximately 60 real-life minutes to a in-game day. This and </span><a class="twikilink" data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeYourTime" title="/pmwiki/pmwiki.php/Main/TakeYourTime"><span data-dcnode-id="2232" instrument_node="">Take Your Time</span></a><span data-dcnode-id="2230" instrument_node=""> are averted in the quest to survive the striga to daybreak (if the player opts to). No matter where the sun/moon are, the period from the moment the striga is encountered until the final candle extinguishes at daybreak will always take the same amount of real time, and game time will adjust accordingly.</span></li><li data-dcnode-id="2218"><span data-dcnode-id="2228" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InsurmountableWaistHeightFence" title="/pmwiki/pmwiki.php/Main/InsurmountableWaistHeightFence"><span data-dcnode-id="2227" instrument_node="">Insurmountable Waist-Height Fence</span></a><span data-dcnode-id="2225" instrument_node="">: Seen in the opening cinematic, Geralt is a rather flexible and agile character capable of parkouring his way over high walls. In the actual game, he can't climb over a cart or a couple of barrels. Extremely painful to see in at least around the encounter with the </span><span class="spoiler" data-dcnode-id="2223" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2224" instrument_node="">Werewolf</span></span><span data-dcnode-id="2222" instrument_node="">, when there is only one way to get out of the area that is in no way apparent when there are open roads in plain view, and in the swamp where you are cut off from the </span><span class="spoiler" data-dcnode-id="2220" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2221" instrument_node="">Mage's Tower, which is magically sealed anyway</span></span><span data-dcnode-id="2219" instrument_node=""> by overgrown vegetation despite your character carrying around two swords and likely axes or hatchets as well, not even counting in signs Aard and Igni — again leaving you only one route to get to your destination. In a game that generally is very lenient on how you go about things, this is very jarring when it comes ahead.</span></li><li data-dcnode-id="2213"><span data-dcnode-id="2217" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterfaceSpoiler" title="/pmwiki/pmwiki.php/Main/InterfaceSpoiler"><span data-dcnode-id="2216" instrument_node="">Interface Spoiler</span></a><span data-dcnode-id="2214" instrument_node="">: There's at least one point in the game where the player can get an early clue that something is up about a given character from how Geralt's wolf medallion starts shaking like crazy on the HUD when standing close to them.</span></li><li data-dcnode-id="2208"><span data-dcnode-id="2212" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IntoxicationMechanic" title="/pmwiki/pmwiki.php/Main/IntoxicationMechanic"><span data-dcnode-id="2211" instrument_node="">Intoxication Mechanic</span></a><span data-dcnode-id="2209" instrument_node="">: While Geralt doesn't drink for fun, most of his alchemical concoctions are alcohol-based (and many contain additional ingredients like hellebore, mistletoe and wolfsbane), so drinking too many of them puts him in an intoxicated state, characterized by distortions in the game graphics, as well as his character model swaying randomly side to side when walking. Fortunately, this only lasts for a short while (justified by the witcher's enhanced physique).</span></li><li data-dcnode-id="2198"><span data-dcnode-id="2207" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IronicEcho" title="/pmwiki/pmwiki.php/Main/IronicEcho"><span data-dcnode-id="2206" instrument_node="">Ironic Echo</span></a><span data-dcnode-id="2204" instrument_node="">: At the end of Chapter 3 from the Professor: </span><span class="spoiler" data-dcnode-id="2199" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2203" instrument_node="">"Witchers </span><em data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">can</span></em><span data-dcnode-id="2200" instrument_node=""> parry bolts in flight."</span></span></li><li data-dcnode-id="2188"><span data-dcnode-id="2197" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItWillNeverCatchOn" title="/pmwiki/pmwiki.php/Main/ItWillNeverCatchOn"><span data-dcnode-id="2196" instrument_node="">It Will Never Catch On</span></a><span data-dcnode-id="2194" instrument_node="">:</span><ul data-dcnode-id="2189"><li data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node=""> Kalkstein mentions he has a theory that is effectively the basic concept of atoms; Geralt tells him to tell him about it later in a manner indicating disinterest, and the general consensus by NPCs is that Kalkstein is crazy.</span></li><li data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node=""> During Chapter III you can actually encounter another scientist character, and through studying certain in-game texts or just selecting the right dialogue options through trial-and-error, you can convince him about Kalkstein's theories.</span></li></ul></li><li data-dcnode-id="2177"><span data-dcnode-id="2187" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustifiedTrope" title="/pmwiki/pmwiki.php/Main/JustifiedTrope"><span data-dcnode-id="2186" instrument_node="">Justified Trope</span></a><span data-dcnode-id="2184" instrument_node="">: Witcher Mutations are responsible for more than a few, such as </span><a class="twikilink" data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BottomlessBladder" title="/pmwiki/pmwiki.php/Main/BottomlessBladder"><span data-dcnode-id="2183" instrument_node="">Bottomless Bladder</span></a><span data-dcnode-id="2181" instrument_node=""> (the sleeping part anyways) and </span><a class="twikilink" data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HyperactiveMetabolism" title="/pmwiki/pmwiki.php/Main/HyperactiveMetabolism"><span data-dcnode-id="2180" instrument_node="">Hyperactive Metabolism</span></a><span data-dcnode-id="2178" instrument_node="">.</span></li><li data-dcnode-id="2172"><span data-dcnode-id="2176" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarlMarxHatesYourGuts" title="/pmwiki/pmwiki.php/Main/KarlMarxHatesYourGuts"><span data-dcnode-id="2175" instrument_node="">Karl Marx Hates Your Guts</span></a><span data-dcnode-id="2173" instrument_node="">: Goods have the same fixed prices everywhere - and selling an item typically nets you just one fifth of what it would cost to buy.</span></li><li data-dcnode-id="2164"><span data-dcnode-id="2171" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmicDeath" title="/pmwiki/pmwiki.php/Main/KarmicDeath"><span data-dcnode-id="2170" instrument_node="">Karmic Death</span></a><span data-dcnode-id="2168" instrument_node="">: </span><em data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">That sword is for monsters</span></em><span data-dcnode-id="2165" instrument_node="">, indeed.</span></li><li data-dcnode-id="2159"><span data-dcnode-id="2163" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KickTheDog" title="/pmwiki/pmwiki.php/Main/KickTheDog"><span data-dcnode-id="2162" instrument_node="">Kick the Dog</span></a><span data-dcnode-id="2160" instrument_node="">: Plenty, by everyone.</span></li><li data-dcnode-id="2151"><span data-dcnode-id="2158" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KleptomaniacHero" title="/pmwiki/pmwiki.php/Main/KleptomaniacHero"><span data-dcnode-id="2157" instrument_node="">Kleptomaniac Hero</span></a><span data-dcnode-id="2155" instrument_node="">: True to traditional RPG form, Geralt can wander into a home, rummage through containers, and take what he pleases. This is lampshaded by a few characters who will question him for entering their homes, and sometimes it sounds like one of the occupants is objecting when they're simply spouting an idle comment. There are never any consequences for brazen burglary. Only twice does a character object to Geralt entering their house, and these two are ones that Geralt </span><em data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">actually has a reason</span></em><span data-dcnode-id="2152" instrument_node=""> to be allowed in (one has the occupant's daughter ask him to kill a monster in the basement, the 2nd has someone who explicitly invited Geralt renting the 2nd floor). Very rarely, however, is anything decent found by this; the best to be found is potion bases and common books.</span></li><li data-dcnode-id="2140"><span data-dcnode-id="2150" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Knighting" title="/pmwiki/pmwiki.php/Main/Knighting"><span data-dcnode-id="2149" instrument_node="">Knighting</span></a><span data-dcnode-id="2147" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2141" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2146" instrument_node="">Geralt gets one from the Lady of the Lake if he solves the quest Ripples by advocating peace between the Vodyanoi and the villagers. Which is ironic, considering that Geralt was already knighted once by Queen Meve in </span><em data-dcnode-id="2143"><a class="twikilink" data-dcnode-id="2144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BaptismOfFire" title="/pmwiki/pmwiki.php/Literature/BaptismOfFire"><span data-dcnode-id="2145" instrument_node="">Baptism of Fire</span></a></em><span data-dcnode-id="2142" instrument_node="">.</span></span></li><li data-dcnode-id="2135"><span data-dcnode-id="2139" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnightInSourArmor" title="/pmwiki/pmwiki.php/Main/KnightInSourArmor"><span data-dcnode-id="2138" instrument_node="">Knight in Sour Armor</span></a><span data-dcnode-id="2136" instrument_node="">: Geralt and Vincent. Siegfried starts to gravitate towards this as the game progresses.</span></li><li data-dcnode-id="2130"><span data-dcnode-id="2134" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnightTemplar" title="/pmwiki/pmwiki.php/Main/KnightTemplar"><span data-dcnode-id="2133" instrument_node="">Knight Templar</span></a><span data-dcnode-id="2131" instrument_node="">: The Order of the Flaming Rose and the Reverend.</span></li><li data-dcnode-id="2119"><span data-dcnode-id="2129" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmaHoudini" title="/pmwiki/pmwiki.php/Main/KarmaHoudini"><span data-dcnode-id="2128" instrument_node="">Karma Houdini</span></a><span data-dcnode-id="2126" instrument_node="">: Let's start out here with a guard in chapter one, who </span><span class="spoiler" data-dcnode-id="2124" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2125" instrument_node="">gets away with rape</span></span><span data-dcnode-id="2123" instrument_node=""> and then... It might just be easier to list who does </span><em data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">not</span></em><span data-dcnode-id="2120" instrument_node=""> get away with it.</span></li><li data-dcnode-id="2111"><span data-dcnode-id="2118" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LastRequest" title="/pmwiki/pmwiki.php/Main/LastRequest"><span data-dcnode-id="2117" instrument_node="">Last Request</span></a><span data-dcnode-id="2115" instrument_node="">: See </span><a class="twikilink" data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BatmanGambit" title="/pmwiki/pmwiki.php/Main/BatmanGambit"><span data-dcnode-id="2114" instrument_node="">Batman Gambit</span></a><span data-dcnode-id="2112" instrument_node="">.</span></li><li data-dcnode-id="2106"><span data-dcnode-id="2110" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LateArrivalSpoiler" title="/pmwiki/pmwiki.php/Main/LateArrivalSpoiler"><span data-dcnode-id="2109" instrument_node="">Late-Arrival Spoiler</span></a><span data-dcnode-id="2107" instrument_node="">: If you play this game, then you'll find out that Geralt died at the end of the books.</span></li><li data-dcnode-id="2095"><span data-dcnode-id="2105" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LighterAndSofter" title="/pmwiki/pmwiki.php/Main/LighterAndSofter"><span data-dcnode-id="2104" instrument_node="">Lighter and Softer</span></a><span data-dcnode-id="2102" instrument_node="">: The video games, shockingly enough. Part of this is due to reversing </span><span class="spoiler" data-dcnode-id="2100" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2101" instrument_node="">Geralt's death. As bad as the world is, Geralt's continued existence goes a long way to making it a better place.</span></span><span data-dcnode-id="2099" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WMG" title="/pmwiki/pmwiki.php/Main/WMG"><span data-dcnode-id="2098" instrument_node="">Possibly</span></a><span data-dcnode-id="2096" instrument_node=""> justified by Ciri's role at the very end of the saga.</span></li><li data-dcnode-id="2090"><span data-dcnode-id="2094" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoadBearingBoss" title="/pmwiki/pmwiki.php/Main/LoadBearingBoss"><span data-dcnode-id="2093" instrument_node="">Load-Bearing Boss</span></a><span data-dcnode-id="2091" instrument_node="">: Inverted. In Chapter 3 you have to collapse a dungeon to kill the Kikimore Queen.</span></li><li data-dcnode-id="2076"><span data-dcnode-id="2089" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoadsAndLoadsOfLoading" title="/pmwiki/pmwiki.php/Main/LoadsAndLoadsOfLoading"><span data-dcnode-id="2088" instrument_node="">Loads and Loads of Loading</span></a><span data-dcnode-id="2086" instrument_node="">: The Witcher is particularly infamous for this — though the Enhanced Edition fixes this... except with the </span><em data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">quick</span></em><span data-dcnode-id="2083" instrument_node="">saves. The issue with quicksaves is because the game </span><em data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">doesn't overwrite them</span></em><span data-dcnode-id="2080" instrument_node="">- it's easy to rack up 6 </span><em data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">gigabytes</span></em><span data-dcnode-id="2077" instrument_node=""> of save files before the game is even half-finished.</span></li><li data-dcnode-id="2061"><span data-dcnode-id="2075" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LostInTranslation" title="/pmwiki/pmwiki.php/Main/LostInTranslation"><span data-dcnode-id="2074" instrument_node="">Lost in Translation</span></a><span data-dcnode-id="2072" instrument_node="">: It's often painfully clear that the original script was not in English, and the voice acting doesn't help. The Enhanced Edition is better about this.</span><ul data-dcnode-id="2062"><li data-dcnode-id="2063"><span data-dcnode-id="2071" instrument_node=""> Thaler's name is an example of the trope in the French translation. It is a </span><a class="twikilink" data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="2070" instrument_node="">Meaningful Name</span></a><span data-dcnode-id="2068" instrument_node="">, he is a fence having </span><a class="urllink" data-dcnode-id="2065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Thaler"><span data-dcnode-id="2067" instrument_node="">the name of an old European money</span><img data-dcnode-id="2066" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2064" instrument_node="">. In the French translation, he is named Talar, which is the Polish word for it. It is especially strange, as the word "thaler" exists in French too.</span></li></ul></li><li data-dcnode-id="2053"><span data-dcnode-id="2060" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LovecraftLite" title="/pmwiki/pmwiki.php/Main/LovecraftLite"><span data-dcnode-id="2059" instrument_node="">Lovecraft Lite</span></a><span data-dcnode-id="2057" instrument_node="">: In one quest, Geralt can fight and kill </span><span class="spoiler" data-dcnode-id="2054" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="2055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/HPLovecraft" title="/pmwiki/pmwiki.php/Creator/HPLovecraft"><span data-dcnode-id="2056" instrument_node="">Dagon. Yes, THAT Dagon.</span></a></span></li><li data-dcnode-id="2041"><span data-dcnode-id="2052" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MadScientist" title="/pmwiki/pmwiki.php/Main/MadScientist"><span data-dcnode-id="2051" instrument_node="">Mad Scientist</span></a><span data-dcnode-id="2049" instrument_node="">:</span><ul data-dcnode-id="2042"><li data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node=""> Azar Javed is a magical version of this.</span></li><li data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node=""> Kalkstein is a more traditional example.</span></li><li data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node=""> For that matter, all the witchers are Mad Alchemists, concocting and imbibing potions that are so toxic that merely one is enough to kill a normal person. Witchers are merely more resistant, so they can take several in a row before dying.</span></li></ul></li><li data-dcnode-id="2033"><span data-dcnode-id="2040" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicKnight" title="/pmwiki/pmwiki.php/Main/MagicKnight"><span data-dcnode-id="2039" instrument_node="">Magic Knight</span></a><span data-dcnode-id="2037" instrument_node="">: Azar Javed is more than able to fight with a sword when his magic is </span><span class="spoiler" data-dcnode-id="2035" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2036" instrument_node="">weakened from fighting in a place of an opposing element</span></span><span data-dcnode-id="2034" instrument_node="">. In fact, in a latter fight when he is at full strength, his physical power is his main means of offense, and he prefers to use magic only for stunning Geralt. Witchers use simple spells ("signs") in combat. Also, the first thing you see of the Flaming Rose grandmaster is a person in platemail throwing a fireball.</span></li><li data-dcnode-id="2025"><span data-dcnode-id="2032" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMagocracy" title="/pmwiki/pmwiki.php/Main/TheMagocracy"><span data-dcnode-id="2031" instrument_node="">The Magocracy</span></a><span data-dcnode-id="2029" instrument_node="">: A borderline case. Mages are ostensibly servants and advisors to crowned heads, yet in reality they hold great sway over kings and orchestrate political events through their secret </span><a class="twikilink" data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheOmniscientCouncilOfVagueness" title="/pmwiki/pmwiki.php/Main/TheOmniscientCouncilOfVagueness"><span data-dcnode-id="2028" instrument_node="">Conclave</span></a><span data-dcnode-id="2026" instrument_node="">.</span></li><li data-dcnode-id="1996"><span data-dcnode-id="2024" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="2023" instrument_node="">Meaningful Name</span></a><span data-dcnode-id="2021" instrument_node="">:</span><ul data-dcnode-id="1997"><li data-dcnode-id="2004"><span data-dcnode-id="2020" instrument_node=""> Azar Javed. This couples with a </span><a class="twikilink" data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BilingualBonus" title="/pmwiki/pmwiki.php/Main/BilingualBonus"><span data-dcnode-id="2019" instrument_node="">Bilingual Bonus</span></a><span data-dcnode-id="2017" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PropheticNames" title="/pmwiki/pmwiki.php/Main/PropheticNames"><span data-dcnode-id="2016" instrument_node="">Prophetic Name</span></a><span data-dcnode-id="2014" instrument_node=""> — it means </span><span class="spoiler" data-dcnode-id="2009" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2013" instrument_node="">"Flame Eternal" in Persian. Yes, of course he's explicitly said to be drawing magic mostly from fire, but... What was that bit about Jacques de Aldersberg being </span><a class="twikilink" data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheChessmaster" title="/pmwiki/pmwiki.php/Main/TheChessmaster"><span data-dcnode-id="2012" instrument_node="">The Chessmaster</span></a><span data-dcnode-id="2010" instrument_node="">, again?</span></span><span data-dcnode-id="2008" instrument_node=""> Also, in real life, "Azar" would be an embarrassing name for a badass like that — it's a real, but </span><em data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">female</span></em><span data-dcnode-id="2005" instrument_node=""> name.</span></li><li data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node=""> Thaler. A fence with a money name.</span></li><li data-dcnode-id="1998"><span data-dcnode-id="2001" instrument_node=""> The Salamandra counts too. </span><span class="spoiler" data-dcnode-id="1999" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2000" instrument_node="">Guess which other organization has fire as its main theme.</span></span></li></ul></li><li data-dcnode-id="1982"><span data-dcnode-id="1995" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeleeATrois" title="/pmwiki/pmwiki.php/Main/MeleeATrois"><span data-dcnode-id="1994" instrument_node="">Mêlée à Trois</span></a><span data-dcnode-id="1992" instrument_node="">: The Blue Eyes quest ends by a fight between </span><a class="twikilink" data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnightTemplar" title="/pmwiki/pmwiki.php/Main/KnightTemplar"><span data-dcnode-id="1991" instrument_node="">Patrick de Weyze</span></a><span data-dcnode-id="1989" instrument_node=""> and his knights against the </span><span class="spoiler" data-dcnode-id="1987" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1988" instrument_node="">vampire</span></span><span data-dcnode-id="1986" instrument_node=""> prostitutes of the House of the Night. If Geralt made the worst decision of </span><span class="spoiler" data-dcnode-id="1984" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1985" instrument_node="">sleeping with the vampire prostitutes (alienating De Weyze) then deciding that he don't have to intervene to protect the prostitutes (alienating them)</span></span><span data-dcnode-id="1983" instrument_node="">, he will have to fight both groups while they are also hostile to each other.</span></li><li data-dcnode-id="1977"><span data-dcnode-id="1981" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ModestyBedsheet" title="/pmwiki/pmwiki.php/Main/ModestyBedsheet"><span data-dcnode-id="1980" instrument_node="">Modesty Bedsheet</span></a><span data-dcnode-id="1978" instrument_node="">: The first sex card for Triss qualifies, as does the censored version of Shani's.</span></li><li data-dcnode-id="1969"><span data-dcnode-id="1976" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoneyForNothing" title="/pmwiki/pmwiki.php/Main/MoneyForNothing"><span data-dcnode-id="1975" instrument_node="">Money for Nothing</span></a><span data-dcnode-id="1973" instrument_node="">: The game makes a decent attempt to avoid it, but being decent at fist fights or </span><a class="twikilink" data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SaveScumming" title="/pmwiki/pmwiki.php/Main/SaveScumming"><span data-dcnode-id="1972" instrument_node="">Save Scumming</span></a><span data-dcnode-id="1970" instrument_node=""> at dice poker means you have little to worry about in terms of money.</span></li><li data-dcnode-id="1964"><span data-dcnode-id="1968" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoneySpider" title="/pmwiki/pmwiki.php/Main/MoneySpider"><span data-dcnode-id="1967" instrument_node="">Money Spider</span></a><span data-dcnode-id="1965" instrument_node="">: Type 2: monsters carry alchemical components whilst bandits and monsters that were once humans carry money only.</span></li><li data-dcnode-id="1959"><span data-dcnode-id="1963" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MultipleEndings" title="/pmwiki/pmwiki.php/Main/MultipleEndings"><span data-dcnode-id="1962" instrument_node="">Multiple Endings</span></a><span data-dcnode-id="1960" instrument_node="">: All depressing; there really isn't a "good" ending here. For once, being an RPG protagonist doesn't guarantee a happy ending for the rest of the world.</span></li><li data-dcnode-id="1954"><span data-dcnode-id="1958" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MundaneUtility" title="/pmwiki/pmwiki.php/Main/MundaneUtility"><span data-dcnode-id="1957" instrument_node="">Mundane Utility</span></a><span data-dcnode-id="1955" instrument_node="">: Run out of flints to light a campfire? No problem, just light it with the Igni sign.</span></li><li data-dcnode-id="1943"><span data-dcnode-id="1953" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceDayDeadlyNight" title="/pmwiki/pmwiki.php/Main/NiceDayDeadlyNight"><span data-dcnode-id="1952" instrument_node="">Nice Day, Deadly Night</span></a><span data-dcnode-id="1950" instrument_node="">: </span><em data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">The Witcher</span></em><span data-dcnode-id="1947" instrument_node=""> has a day-night cycle, and while some monsters roam out in the open during the day (and they become </span><em data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">worse</span></em><span data-dcnode-id="1944" instrument_node=""> at night), the vast majority come out at night. This is especially noticeable in the first act, which takes place in and around a small village surrounded by woods, but happens even in Vyzima, a capital city, later on.</span></li><li data-dcnode-id="1925"><span data-dcnode-id="1942" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero" title="/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero"><span data-dcnode-id="1941" instrument_node="">Nice Job Breaking It, Hero</span></a><span data-dcnode-id="1939" instrument_node="">:</span><ul data-dcnode-id="1926"><li data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node=""> If you don't pay attention in the second chapter, you will end up playing straight into the Big Bad's Hands.</span></li><li data-dcnode-id="1927"><span data-dcnode-id="1936" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1928" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1935" instrument_node="">The entirety of the story. By rescuing Alvin at the beginning, putting him under the parentage of either Triss or Shani, acting as a father figure, and sharing various bits of wisdom, Geralt shapes the personality of what will eventually become the </span><a class="twikilink" data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1934" instrument_node="">Big Bad</span></a><span data-dcnode-id="1932" instrument_node=""> once a </span><a class="twikilink" data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StableTimeLoop" title="/pmwiki/pmwiki.php/Main/StableTimeLoop"><span data-dcnode-id="1931" instrument_node="">Stable Time Loop</span></a><span data-dcnode-id="1929" instrument_node=""> occurs.</span></span></li></ul></li><li data-dcnode-id="1920"><span data-dcnode-id="1924" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NocturnalMooks" title="/pmwiki/pmwiki.php/Main/NocturnalMooks"><span data-dcnode-id="1923" instrument_node="">Nocturnal Mooks</span></a><span data-dcnode-id="1921" instrument_node="">: The vast majority of the Witcher's Bestiary are nocturnal and only appear at night. Places in which monsters appear in the day, the swamp in Chapter 2 and 3, for example, turn into deathtraps at night.</span></li><li data-dcnode-id="1915"><span data-dcnode-id="1919" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoIndoorVoice" title="/pmwiki/pmwiki.php/Main/NoIndoorVoice"><span data-dcnode-id="1918" instrument_node="">No Indoor Voice</span></a><span data-dcnode-id="1916" instrument_node="">: For the Elite Guards in King Foltest's Palace, this is apparently the only way of communicating.</span></li><li data-dcnode-id="1910"><span data-dcnode-id="1914" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotInThisForYourRevolution" title="/pmwiki/pmwiki.php/Main/NotInThisForYourRevolution"><span data-dcnode-id="1913" instrument_node="">Not in This for Your Revolution</span></a><span data-dcnode-id="1911" instrument_node="">: One dialog option allows Geralt to claim his motivations for the first game are entirely because Salamandra robbed him and killed a friend.</span></li><li data-dcnode-id="1894"><span data-dcnode-id="1909" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotSoHarmlessVillain" title="/pmwiki/pmwiki.php/Main/NotSoHarmlessVillain"><span data-dcnode-id="1908" instrument_node="">Not-So-Harmless Villain</span></a><span data-dcnode-id="1906" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1895" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1905" instrument_node="">The Reverend at first seems like a slightly </span><a class="twikilink" data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkAss" title="/pmwiki/pmwiki.php/Main/JerkAss"><span data-dcnode-id="1904" instrument_node="">Jerkass</span></a><span data-dcnode-id="1902" instrument_node=""> but ultimately well meaning priest. You quickly learn that he's actually a </span><a class="twikilink" data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnightTemplar" title="/pmwiki/pmwiki.php/Main/KnightTemplar"><span data-dcnode-id="1901" instrument_node="">fanatical</span></a><span data-dcnode-id="1899" instrument_node=""> nutjob who first had his own daughter thrown out of the village and now scapegoats the local mage as the cause of the recent increase in monsters, and even provokes most of the villagers into a howling lynch mob. Oh, and if you stop the (unjust) lynching? </span><em data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">He sics his cronies on you, despite the fact that you just killed the monster that was plaguing the village</span></em><span data-dcnode-id="1896" instrument_node="">!</span></span></li><li data-dcnode-id="1889"><span data-dcnode-id="1893" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NowWhereWasIGoingAgain" title="/pmwiki/pmwiki.php/Main/NowWhereWasIGoingAgain"><span data-dcnode-id="1892" instrument_node="">Now, Where Was I Going Again?</span></a><span data-dcnode-id="1890" instrument_node="">: Overcome by a comprehensive journal carried by Geralt on his objectives, though there are sometimes too many things going on at once to easily keep track of.</span></li><li data-dcnode-id="1877"><span data-dcnode-id="1888" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ObfuscatingStupidity" title="/pmwiki/pmwiki.php/Main/ObfuscatingStupidity"><span data-dcnode-id="1887" instrument_node="">Obfuscating Stupidity</span></a><span data-dcnode-id="1885" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1883" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1884" instrument_node="">Princess Adda.</span></span><span data-dcnode-id="1882" instrument_node=""> She's not of </span><img class="ymmv1 rounded" data-dcnode-id="1881" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagnificentBastard" title="/pmwiki/pmwiki.php/Main/MagnificentBastard"><span data-dcnode-id="1880" instrument_node="">Magnificent Bastard</span></a><span data-dcnode-id="1878" instrument_node=""> quality, but she plays a sweet idiot all the time while scheming a fairly big coup.</span></li><li data-dcnode-id="1866"><span data-dcnode-id="1876" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OffscreenMomentOfAwesome" title="/pmwiki/pmwiki.php/Main/OffscreenMomentOfAwesome"><span data-dcnode-id="1875" instrument_node="">Offscreen Moment of Awesome</span></a><span data-dcnode-id="1873" instrument_node="">: While you were stuck in teleport limbo during the Salamandra base attack, The Professor and some salamanders pay Triss a visit (if you put Alvin in her custody). Alvin describes it, citing the smell of "</span><a class="twikilink" data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillItWithFire" title="/pmwiki/pmwiki.php/Main/KillItWithFire"><span data-dcnode-id="1872" instrument_node="">burnt meat</span></a><span data-dcnode-id="1870" instrument_node="">", and that Triss </span><a class="twikilink" data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GroinAttack" title="/pmwiki/pmwiki.php/Main/GroinAttack"><span data-dcnode-id="1869" instrument_node="">had at the Prof's two best friends</span></a><span data-dcnode-id="1867" instrument_node="">.</span></li><li data-dcnode-id="1861"><span data-dcnode-id="1865" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitKill" title="/pmwiki/pmwiki.php/Main/OneHitKill"><span data-dcnode-id="1864" instrument_node="">One-Hit Kill</span></a><span data-dcnode-id="1862" instrument_node="">: The kikimore queen is explicitly stated as being able to kill a man in one hit. This includes Geralt, which forces the player to find an alternate way of killing the queen.</span></li><li data-dcnode-id="1856"><span data-dcnode-id="1860" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnlySixFaces" title="/pmwiki/pmwiki.php/Main/OnlySixFaces"><span data-dcnode-id="1859" instrument_node="">Only Six Faces</span></a><span data-dcnode-id="1857" instrument_node="">: Even most of the unique characters have body-doubles (or triples or more) elsewhere in the game.</span></li><li data-dcnode-id="1848"><span data-dcnode-id="1855" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OptionalSexualEncounter" title="/pmwiki/pmwiki.php/Main/OptionalSexualEncounter"><span data-dcnode-id="1854" instrument_node="">Optional Sexual Encounter</span></a><span data-dcnode-id="1852" instrument_node="">: </span><em data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Many</span></em><span data-dcnode-id="1849" instrument_node=""> in the game, to the point of infamy, and the fact that the scenes are paradoxically PG-13 while the literal trading cards gained for doing them are explicit doesn't help.</span></li><li data-dcnode-id="1843"><span data-dcnode-id="1847" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ParryingBullets" title="/pmwiki/pmwiki.php/Main/ParryingBullets"><span data-dcnode-id="1846" instrument_node="">Parrying Bullets</span></a><span data-dcnode-id="1844" instrument_node="">: Subverted when the Professor comments that he's heard witchers can parry arrows in flight just before he shoots Leo, a witcher trainee, with a crossbow. Later played straight when Geralt blocks a crossbow bolt, causing the Professor to remark, 'I guess it was true after all.'</span></li><li data-dcnode-id="1838"><span data-dcnode-id="1842" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PeninsulaOfPowerLeveling" title="/pmwiki/pmwiki.php/Main/PeninsulaOfPowerLeveling"><span data-dcnode-id="1841" instrument_node="">Peninsula of Power Leveling</span></a><span data-dcnode-id="1839" instrument_node="">: Every chapter has at least one location where enemies with high EXP rewards will always respawn. Special mention goes to Raven's Crypt in Chapter 5, which is worth several thousand EXP per run.</span></li><li data-dcnode-id="1820"><span data-dcnode-id="1837" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PermanentlyMissableContent" title="/pmwiki/pmwiki.php/Main/PermanentlyMissableContent"><span data-dcnode-id="1836" instrument_node="">Permanently Missable Content</span></a><span data-dcnode-id="1834" instrument_node="">: There's a minor example for the game's </span><a class="twikilink" data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InfinityPlusOneSword" title="/pmwiki/pmwiki.php/Main/InfinityPlusOneSword"><span data-dcnode-id="1833" instrument_node="">Infinity+1 Steel Sword</span></a><span data-dcnode-id="1831" instrument_node="">. While you can get it after killing all of the Trophy Monsters, you can also get it by completing </span><a class="urllink" data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//witcher.wikia.com/wiki/Zahin_Schmartz"><span data-dcnode-id="1830" instrument_node="">the dentist's</span><img data-dcnode-id="1829" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1827" instrument_node=""> sidequest in Chapter 3. The problem is that you need to give him a Barghest Skull, which can only be obtained in Chapter 1 (and most probably sold all their skulls to Abigail in the same chapter, since they're </span><a class="twikilink" data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VendorTrash" title="/pmwiki/pmwiki.php/Main/VendorTrash"><span data-dcnode-id="1826" instrument_node="">useless otherwise</span></a><span data-dcnode-id="1824" instrument_node="">). Don't have any Barghest Skulls? You'll need to choose between either the </span><a class="twikilink" data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InfinityPlusOneSword" title="/pmwiki/pmwiki.php/Main/InfinityPlusOneSword"><span data-dcnode-id="1823" instrument_node="">Infinity+1</span></a><span data-dcnode-id="1821" instrument_node=""> Steel or Silver Sword (assuming you did do the Trophy Monster hunts).</span></li><li data-dcnode-id="1803"><span data-dcnode-id="1819" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PotionBrewingMechanic" title="/pmwiki/pmwiki.php/Main/PotionBrewingMechanic"><span data-dcnode-id="1818" instrument_node="">Potion-Brewing Mechanic</span></a><span data-dcnode-id="1816" instrument_node="">: Like in </span><a class="twikilink" data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheWitcher" title="/pmwiki/pmwiki.php/Literature/TheWitcher"><span data-dcnode-id="1815" instrument_node="">the novels</span></a><span data-dcnode-id="1813" instrument_node="">, alchemy is an essential part. By harvesting plants and slain monsters, Geralt collects ingredients, and each ingredient contains one specific (</span><a class="twikilink" data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColorCodedForYourConvenience" title="/pmwiki/pmwiki.php/Main/ColorCodedForYourConvenience"><span data-dcnode-id="1812" instrument_node="">Color-Coded for Your Convenience</span></a><span data-dcnode-id="1810" instrument_node="">) alchemical essence. Hard-coded into the game are specific combinations of these essences that, if mixed in a specific order, create potions of specific effects. Geralt can learn these recipes from books and NPCs or discover them by experimenting. Some unique ingredients, usually obtained from quests, can even be mixed into mutagenic potions that permanently unlock certain bonuses in a form of </span><a class="twikilink" data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonstandardSkillLearning" title="/pmwiki/pmwiki.php/Main/NonstandardSkillLearning"><span data-dcnode-id="1809" instrument_node="">Nonstandard Skill Learning</span></a><span data-dcnode-id="1807" instrument_node="">. Rarely for a game, crafting potions takes time—at least an hour of </span><a class="twikilink" data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RestingRecovery" title="/pmwiki/pmwiki.php/Main/RestingRecovery"><span data-dcnode-id="1806" instrument_node="">meditating in a safe location</span></a><span data-dcnode-id="1804" instrument_node="">—and requires a "potion base," an alcoholic beverage whose quality determines how many ingredients in total you can mix.</span></li><li data-dcnode-id="1796"><span data-dcnode-id="1802" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThePowerOfFriendship" title="/pmwiki/pmwiki.php/Main/ThePowerOfFriendship"><span data-dcnode-id="1801" instrument_node="">The Power of Friendship</span></a><span data-dcnode-id="1799" instrument_node="">: Depending on Geralt's actions and solutions during the first game, several characters will come and aid Geralt in his time of need. Examples include </span><span class="spoiler" data-dcnode-id="1797" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1798" instrument_node="">Vincent, who aids you against Salamandra soldiers if you cure his lycanthropy; Siegfried, who vouches for you to the guards if you teamed up fighting the cockatrice; Zoltan, if you side with the Scoia'tel, becomes your wingman through burning Vizima; and a few characters may appear during the endgame in de Aldersberg's vision, such as your love interest, Adda, and Celina.</span></span></li><li data-dcnode-id="1783"><span data-dcnode-id="1795" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerPerversionPotential" title="/pmwiki/pmwiki.php/Main/PowerPerversionPotential"><span data-dcnode-id="1794" instrument_node="">Power Perversion Potential</span></a><span data-dcnode-id="1792" instrument_node="">:</span><ul data-dcnode-id="1784"><li data-dcnode-id="1787"><span data-dcnode-id="1791" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InUniverse" title="/pmwiki/pmwiki.php/Main/InUniverse"><span data-dcnode-id="1790" instrument_node="">In-Universe</span></a><span data-dcnode-id="1788" instrument_node="">, the best part of immunity to disease and mutation-induced sterility? Ability to sleep around without consequence.</span></li><li data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node=""> One of the ways to identify a witcher is that they give 'tingling' sensations. Neither book nor game shies away from the implications of that.</span></li></ul></li><li data-dcnode-id="1765"><span data-dcnode-id="1782" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PrecisionFStrike" title="/pmwiki/pmwiki.php/Main/PrecisionFStrike"><span data-dcnode-id="1781" instrument_node="">Precision F-Strike</span></a><span data-dcnode-id="1779" instrument_node="">: You know </span><a class="twikilink" data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheStoic" title="/pmwiki/pmwiki.php/Main/TheStoic"><span data-dcnode-id="1778" instrument_node="">Geralt</span></a><span data-dcnode-id="1776" instrument_node=""> is pretty pissed when he starts swearing.</span><div class="indent" data-dcnode-id="1766"><span data-dcnode-id="1775" instrument_node=""> </span><strong data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Geralt:</span></strong><span data-dcnode-id="1772" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1770" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1771" instrument_node="">(To the Professor at the end of chapter 3)</span></span><span data-dcnode-id="1769" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShutUpHannibal" title="/pmwiki/pmwiki.php/Main/ShutUpHannibal"><span data-dcnode-id="1768" instrument_node="">You're so full of shit, Professor!</span></a></div></li><li data-dcnode-id="1749"><span data-dcnode-id="1764" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RatedMForManly" title="/pmwiki/pmwiki.php/Main/RatedMForManly"><span data-dcnode-id="1763" instrument_node="">Rated M for Manly</span></a><span data-dcnode-id="1761" instrument_node="">: You play as a man who hunts monsters for coin full-time, and on his spare time he enjoys drinking, gambling, arm-wrestling, fist-fighting, and having sex with </span><a class="twikilink" data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReallyGetsAround" title="/pmwiki/pmwiki.php/Main/ReallyGetsAround"><span data-dcnode-id="1760" instrument_node="">lots of different women.</span></a><span data-dcnode-id="1758" instrument_node=""> He does not curse much (he still has his moments), but some of the people he associates with </span><a class="twikilink" data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClusterFBomb" title="/pmwiki/pmwiki.php/Main/ClusterFBomb"><span data-dcnode-id="1757" instrument_node="">more than make up for it.</span></a><span data-dcnode-id="1755" instrument_node=""> He also has a </span><a class="twikilink" data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PermaStubble" title="/pmwiki/pmwiki.php/Main/PermaStubble"><span data-dcnode-id="1754" instrument_node="">Perma-Stubble</span></a><span data-dcnode-id="1752" instrument_node=""> and is </span><a class="twikilink" data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodScarsEvilScars" title="/pmwiki/pmwiki.php/Main/GoodScarsEvilScars"><span data-dcnode-id="1751" instrument_node="">heavily scarred.</span></a></li><li data-dcnode-id="1739"><span data-dcnode-id="1748" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RatedMForMoney" title="/pmwiki/pmwiki.php/Main/RatedMForMoney"><span data-dcnode-id="1747" instrument_node="">Rated M for Money</span></a><span data-dcnode-id="1745" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustifiedTrope" title="/pmwiki/pmwiki.php/Main/JustifiedTrope"><span data-dcnode-id="1744" instrument_node="">Justified Trope</span></a><span data-dcnode-id="1742" instrument_node="">; the original novels were characterized by strong sexual themes. </span><span data-dcnode-id="1740" style="display:none"><span data-dcnode-id="1741" instrument_node="">invoked</span></span></li><li data-dcnode-id="1734"><span data-dcnode-id="1738" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReadyForLovemaking" title="/pmwiki/pmwiki.php/Main/ReadyForLovemaking"><span data-dcnode-id="1737" instrument_node="">Ready for Lovemaking</span></a><span data-dcnode-id="1735" instrument_node="">: The "cards" collected in the first game depict Geralt's partners in this fashion.</span></li><li data-dcnode-id="1729"><span data-dcnode-id="1733" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReallyGetsAround" title="/pmwiki/pmwiki.php/Main/ReallyGetsAround"><span data-dcnode-id="1732" instrument_node="">Really Gets Around</span></a><span data-dcnode-id="1730" instrument_node="">: There a couple dozen women that Geralt can bed all throughout the game, sometimes more than once.</span></li><li data-dcnode-id="1724"><span data-dcnode-id="1728" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RegeneratingHealth" title="/pmwiki/pmwiki.php/Main/RegeneratingHealth"><span data-dcnode-id="1727" instrument_node="">Regenerating Health</span></a><span data-dcnode-id="1725" instrument_node="">: A talent provides a slow regeneration of health (1 hp every second), although there's potions that can be mixed for much faster recovery.</span></li><li data-dcnode-id="1719"><span data-dcnode-id="1723" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheRevolutionWillNotBeCivilized" title="/pmwiki/pmwiki.php/Main/TheRevolutionWillNotBeCivilized"><span data-dcnode-id="1722" instrument_node="">The Revolution Will Not Be Civilized</span></a><span data-dcnode-id="1720" instrument_node="">: The Scoia'tael, who routinely kill civilians and enjoy it.</span></li><li data-dcnode-id="1712"><span data-dcnode-id="1718" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RewatchBonus" title="/pmwiki/pmwiki.php/Main/RewatchBonus"><span data-dcnode-id="1717" instrument_node="">Rewatch Bonus</span></a><span data-dcnode-id="1715" instrument_node="">: During Geralt's conversation with Jacques de Aldersberg towards the end of the game, Jacques makes references to choices the player made throughout the game. Many of these make even more sense when you discover that Jacques is </span><span class="spoiler" data-dcnode-id="1713" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1714" instrument_node=""> Alvin.</span></span></li><li data-dcnode-id="1707"><span data-dcnode-id="1711" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RomanceSidequest" title="/pmwiki/pmwiki.php/Main/RomanceSidequest"><span data-dcnode-id="1710" instrument_node="">Romance Sidequest</span></a><span data-dcnode-id="1708" instrument_node="">: Geralt can start a serious relationship with either Triss or Shani, and, to a lesser extent, with Toruviel or Rayla. Not counting the other dozen or so of women he just sleeps with.</span></li><li data-dcnode-id="1702"><span data-dcnode-id="1706" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RoyalsWhoActuallyDoSomething" title="/pmwiki/pmwiki.php/Main/RoyalsWhoActuallyDoSomething"><span data-dcnode-id="1705" instrument_node="">Royals Who Actually Do Something</span></a><span data-dcnode-id="1703" instrument_node="">: Foltest and Radovid.</span></li><li data-dcnode-id="1697"><span data-dcnode-id="1701" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SadisticChoice" title="/pmwiki/pmwiki.php/Main/SadisticChoice"><span data-dcnode-id="1700" instrument_node="">Sadistic Choice</span></a><span data-dcnode-id="1698" instrument_node="">: Many of Geralt's choices, both in the main story and sidequests, are this.</span></li><li data-dcnode-id="1687"><span data-dcnode-id="1696" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SaveScumming" title="/pmwiki/pmwiki.php/Main/SaveScumming"><span data-dcnode-id="1695" instrument_node="">Save Scumming</span></a><span data-dcnode-id="1693" instrument_node="">:</span><ul data-dcnode-id="1688"><li data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node=""> Discouraged by the time it usually takes for the effects of decisions to be seen. Worth noting is that the game doesn't overwrite autosaves — which mostly just leads to humongous save file folders.</span></li><li data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node=""> Entirely valid for dice poker, though.</span></li></ul></li><li data-dcnode-id="1682"><span data-dcnode-id="1686" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScareChord" title="/pmwiki/pmwiki.php/Main/ScareChord"><span data-dcnode-id="1685" instrument_node="">Scare Chord</span></a><span data-dcnode-id="1683" instrument_node="">: The music that plays in the fields in Chapter 4 has one. Oddly enough, it's just part of the track, rather than tied to a specific event.</span></li><li data-dcnode-id="1677"><span data-dcnode-id="1681" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SceneryPorn" title="/pmwiki/pmwiki.php/Main/SceneryPorn"><span data-dcnode-id="1680" instrument_node="">Scenery Porn</span></a><span data-dcnode-id="1678" instrument_node="">: Chapter 4 is set in a largely tranquil countryside far from the grime and grit of Vizima. Even with the engine limitations, the clearer skies and open fields can be quite lovely.</span></li><li data-dcnode-id="1672"><span data-dcnode-id="1676" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewThisImOuttaHere" title="/pmwiki/pmwiki.php/Main/ScrewThisImOuttaHere"><span data-dcnode-id="1675" instrument_node="">Screw This, I'm Outta Here!</span></a><span data-dcnode-id="1673" instrument_node="">: Actually an in-game decision; Geralt can choose to divorce himself entirely
