from the conflict between the Squirrels and Order during the first game.</span></li><li data-dcnode-id="1667"><span data-dcnode-id="1671" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SequelHook" title="/pmwiki/pmwiki.php/Main/SequelHook"><span data-dcnode-id="1670" instrument_node="">Sequel Hook</span></a><span data-dcnode-id="1668" instrument_node="">: The ending of the first game sets up for the second game.</span></li><li data-dcnode-id="1651"><span data-dcnode-id="1666" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShamingTheMob" title="/pmwiki/pmwiki.php/Main/ShamingTheMob"><span data-dcnode-id="1665" instrument_node="">Shaming the Mob</span></a><span data-dcnode-id="1663" instrument_node="">: If Geralt sides with Abigail during the first chapter, he'll deliver an epic one to the villagers who are getting ready to </span><a class="twikilink" data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BurnTheWitch" title="/pmwiki/pmwiki.php/Main/BurnTheWitch"><span data-dcnode-id="1662" instrument_node="">Burn the Witch!</span></a><span data-dcnode-id="1660" instrument_node="">. The irony being that, </span><span class="spoiler" data-dcnode-id="1652" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1659" instrument_node="">Abigail </span><em data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">is</span></em><span data-dcnode-id="1656" instrument_node=""> a cultist of an extremely nasty old god, and she </span><em data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">is</span></em><span data-dcnode-id="1653" instrument_node=""> guilty of some of the villager's accusations.</span></span></li><li data-dcnode-id="1646"><span data-dcnode-id="1650" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SociopathicHero" title="/pmwiki/pmwiki.php/Main/SociopathicHero"><span data-dcnode-id="1649" instrument_node="">Sociopathic Hero</span></a><span data-dcnode-id="1647" instrument_node="">: White Rayla becomes this if you side with the Order.</span></li><li data-dcnode-id="1641"><span data-dcnode-id="1645" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StanceSystem" title="/pmwiki/pmwiki.php/Main/StanceSystem"><span data-dcnode-id="1644" instrument_node="">Stance System</span></a><span data-dcnode-id="1642" instrument_node="">: The game features three fighting styles, each specialized against a particular type of enemy: Strong against slow, armored opponents; Fast against agile enemies; and Group against multiple surrounding mooks. Using the wrong style spells death quickly: strong enemies shrug off Fast, fast enemies dodge Strong, and groups quickly stun-lock Geralt unless he uses Group. These styles can only be used with swords, which renders all other weapons in the game pretty useless.</span></li><li data-dcnode-id="1633"><span data-dcnode-id="1640" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuspiciouslySimilarSubstitute" title="/pmwiki/pmwiki.php/Main/SuspiciouslySimilarSubstitute"><span data-dcnode-id="1639" instrument_node="">Suspiciously Similar Substitute</span></a><span data-dcnode-id="1637" instrument_node="">: Alvin is a powerful Source who carries the Elder Blood who randomly uttered the Prophecy of Ithlinne, who is a catalyst for Geralt's growth as a person, who has a magical "accident" during his training with Triss involving a destroyed shed, and is sort-of raised by Geralt and (canonically) a sorceress....making him Ciri from the novel series, except somehow all this development is shoved into a few months or so (maybe) instead of close to seven years as it was in the novels. </span><span class="spoiler" data-dcnode-id="1635" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1636" instrument_node="">He even ends up time-traveling and is wanted by the Wild Hunt like Ciri is.</span></span><span data-dcnode-id="1634" instrument_node="">.</span></li><li data-dcnode-id="1623"><span data-dcnode-id="1632" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SheatheYourSword" title="/pmwiki/pmwiki.php/Main/SheatheYourSword"><span data-dcnode-id="1631" instrument_node="">Sheathe Your Sword</span></a><span data-dcnode-id="1629" instrument_node="">: The game's intro, which is a retelling of the first short story from the books, has Geralt mostly dodging and, most notably, not using his silver sword against Striga!Adda. </span><span class="spoiler" data-dcnode-id="1624" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1628" instrument_node=""> When forced to face her late in the game, simply dodging until the candles burn out instead of killing her earns a </span><a class="twikilink" data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1627" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1625" instrument_node=""> for that questline and nets Geralt a unique steel sword as a reward.</span></span></li><li data-dcnode-id="1547"><span data-dcnode-id="1622" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="1621" instrument_node="">Shout-Out</span></a><span data-dcnode-id="1619" instrument_node="">:</span><ul data-dcnode-id="1548"><li data-dcnode-id="1609"><span data-dcnode-id="1618" instrument_node=""> Detective </span><a class="urllink" data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Raymond_Chandler"><span data-dcnode-id="1617" instrument_node="">Raymond</span><img data-dcnode-id="1616" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1614" instrument_node=""> </span><a class="urllink" data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Philip_Marlowe"><span data-dcnode-id="1613" instrument_node="">Maarloeve</span><img data-dcnode-id="1612" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1610" instrument_node="">.</span></li><li data-dcnode-id="1604"><span data-dcnode-id="1608" instrument_node=""> In the dialogue right before the boss fight in Chapter 1, one of dialogue options is "</span><a class="twikilink" data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/SuddenImpact" title="/pmwiki/pmwiki.php/Film/SuddenImpact"><span data-dcnode-id="1607" instrument_node="">Go ahead, make my day.</span></a><span data-dcnode-id="1605" instrument_node="">"</span></li><li data-dcnode-id="1598"><span data-dcnode-id="1603" instrument_node=""> The story of an alchemist named "</span><a class="urllink" data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Alfred_Nobel"><span data-dcnode-id="1602" instrument_node="">Alfred Nabel</span><img data-dcnode-id="1601" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1599" instrument_node="">" who invented an alchemical formula that could blast through granite for mining purposes. Other people quickly realized that it would also be very effective in warfare, and he committed suicide, burning his lab as well while mages kept the secret from spreading.</span></li><li data-dcnode-id="1585"><span data-dcnode-id="1597" instrument_node=""> Many more shout-outs that will be completely lost to people who don't know Poland well.</span><ul data-dcnode-id="1586"><li data-dcnode-id="1589"><span data-dcnode-id="1596" instrument_node=""> Adam who, as Celina puts it, </span><em data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">suffers for millions</span></em><span data-dcnode-id="1593" instrument_node=""> is a direct reference to Adam Mickiewicz, while the conflict between two sisters with raspberries in the background is a reference to the poem </span><em data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Balladyna</span></em><span data-dcnode-id="1590" instrument_node=""> by Juliusz Słowacki. Both poets are main representatives of Polish Romanticism.</span></li><li data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node=""> At the beginning of the Epilogue, Radovid and Foltest are discussing their course of action. Radovid says he'll provide "fraternal assistance" to Foltest's forces, which Foltest rapidly and quite angrily dismisses, saying that the term "fraternal assistance" somehow rubs him the wrong way. In real life this term was routinely used by the Soviets in regards to their Eastern Bloc subordinate states, while the nature of the "assistance" was suspiciously akin to "we send them our coal, and in return they take our sugar". No wonder most Poles were rubbed the wrong way by the term.</span></li></ul></li><li data-dcnode-id="1574"><span data-dcnode-id="1584" instrument_node=""> A suspiciously-familiar theory about the Holy Grail being a woman is attributed to one </span><a class="twikilink" data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DanBrown" title="/pmwiki/pmwiki.php/Creator/DanBrown"><span data-dcnode-id="1583" instrument_node="">Bronze Dan</span></a><span data-dcnode-id="1581" instrument_node="">.</span><ul data-dcnode-id="1575"><li data-dcnode-id="1576"><span data-dcnode-id="1580" instrument_node=""> The delivery of that theory makes it more of a </span><a class="twikilink" data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeThat" title="/pmwiki/pmwiki.php/Main/TakeThat"><span data-dcnode-id="1579" instrument_node="">Take That!</span></a><span data-dcnode-id="1577" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1570"><span data-dcnode-id="1573" instrument_node=""> The Lumberjacks in the swamp will sometimes discuss their love of </span><a class="twikilink" data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/MontyPythonsFlyingCircus" title="/pmwiki/pmwiki.php/Series/MontyPythonsFlyingCircus"><span data-dcnode-id="1572" instrument_node="">pressing flowers and going to taverns dressed as women.</span></a></li><li data-dcnode-id="1554"><span data-dcnode-id="1569" instrument_node=""> The boss of Chapter 4 is </span><span class="spoiler" data-dcnode-id="1559" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="1568" instrument_node="">Dagon</span></a><span data-dcnode-id="1566" instrument_node="">, a </span><a class="twikilink" data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PhysicalGod" title="/pmwiki/pmwiki.php/Main/PhysicalGod"><span data-dcnode-id="1565" instrument_node="">Physical God</span></a><span data-dcnode-id="1563" instrument_node=""> straight out of the </span><a class="twikilink" data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/CthulhuMythos" title="/pmwiki/pmwiki.php/Franchise/CthulhuMythos"><span data-dcnode-id="1562" instrument_node="">Cthulhu Mythos</span></a><span data-dcnode-id="1560" instrument_node="">.</span></span><span data-dcnode-id="1558" instrument_node=""> The Bestiary entry for which begins with </span><em data-dcnode-id="1555"><a class="twikilink" data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/HPLovecraft" title="/pmwiki/pmwiki.php/Creator/HPLovecraft"><span data-dcnode-id="1557" instrument_node="">That is not dead which can eternal lie; and with strange aeons, even death may die.</span></a></em></li><li data-dcnode-id="1549"><span data-dcnode-id="1553" instrument_node=""> One of the fighting styles learned during the Prologue is called "</span><a class="twikilink" data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TazMania" title="/pmwiki/pmwiki.php/WesternAnimation/TazMania"><span data-dcnode-id="1552" instrument_node="">Temerian Devil</span></a><span data-dcnode-id="1550" instrument_node="">". Appropriatly, this is the fighting style made to fight against groups of enemies, especially with circling sword blows and wirlwind attacks.</span></li></ul></li><li data-dcnode-id="1519"><span data-dcnode-id="1546" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShutUpHannibal" title="/pmwiki/pmwiki.php/Main/ShutUpHannibal"><span data-dcnode-id="1545" instrument_node="">Shut Up, Hannibal!</span></a><span data-dcnode-id="1543" instrument_node="">:</span><ul data-dcnode-id="1520"><li data-dcnode-id="1529"><span data-dcnode-id="1542" instrument_node=""> Geralt's response to villains' </span><a class="twikilink" data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HannibalLecture" title="/pmwiki/pmwiki.php/Main/HannibalLecture"><span data-dcnode-id="1541" instrument_node="">Hannibal Lecture</span></a><span data-dcnode-id="1539" instrument_node=""> generally consists of this, </span><a class="twikilink" data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadpanSnarker" title="/pmwiki/pmwiki.php/Main/DeadpanSnarker"><span data-dcnode-id="1538" instrument_node="">DeadpanSnarking</span></a><span data-dcnode-id="1536" instrument_node="">, or </span><a class="twikilink" data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TalkToTheFist" title="/pmwiki/pmwiki.php/Main/TalkToTheFist"><span data-dcnode-id="1535" instrument_node="">Talk to the Fist</span></a><span data-dcnode-id="1533" instrument_node="">. In fact, the final level consists of Geralt constantly doing this to the </span><a class="twikilink" data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1532" instrument_node="">Big Bad</span></a><span data-dcnode-id="1530" instrument_node="">'s attempts to justify his actions.</span></li><li data-dcnode-id="1521"><span data-dcnode-id="1528" instrument_node=""> Before you fight </span><a class="twikilink" data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDragon" title="/pmwiki/pmwiki.php/Main/TheDragon"><span data-dcnode-id="1527" instrument_node="">The Professor</span></a><span data-dcnode-id="1525" instrument_node=""> for the last time, the </span><a class="twikilink" data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmugSnake" title="/pmwiki/pmwiki.php/Main/SmugSnake"><span data-dcnode-id="1524" instrument_node="">Smug Snake</span></a><span data-dcnode-id="1522" instrument_node=""> lectures Geralt on how Witchers are unnatural freaks. Geralt can either debate him or tell him to shut the fuck up.</span></li></ul></li><li data-dcnode-id="1514"><span data-dcnode-id="1518" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlidingScaleOfIdealismVersusCynicism" title="/pmwiki/pmwiki.php/Main/SlidingScaleOfIdealismVersusCynicism"><span data-dcnode-id="1517" instrument_node="">Sliding Scale of Idealism Versus Cynicism</span></a><span data-dcnode-id="1515" instrument_node="">: Very cynical. Idealist characters are few and far between, and even they are willing to wade through corpses if it should further their goals. It's not as if good things can't happen at all, but they tend to be on the personal level and few and far between, which makes it all the more sweet when something does go right.</span></li><li data-dcnode-id="1504"><span data-dcnode-id="1513" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StableTimeLoop" title="/pmwiki/pmwiki.php/Main/StableTimeLoop"><span data-dcnode-id="1512" instrument_node="">Stable Time Loop</span></a><span data-dcnode-id="1510" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1505" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1509" instrument_node="">A theory about the creation of the </span><a class="twikilink" data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1508" instrument_node="">Big Bad</span></a><span data-dcnode-id="1506" instrument_node="">.</span></span></li><li data-dcnode-id="1499"><span data-dcnode-id="1503" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StandardRoyalCourt" title="/pmwiki/pmwiki.php/Main/StandardRoyalCourt"><span data-dcnode-id="1502" instrument_node="">Standard Royal Court</span></a><span data-dcnode-id="1500" instrument_node="">: Foltest has one. Other kings probably do as well, though you don't get to interact with them that much.</span></li><li data-dcnode-id="1494"><span data-dcnode-id="1498" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoryBranchFavoritism" title="/pmwiki/pmwiki.php/Main/StoryBranchFavoritism"><span data-dcnode-id="1497" instrument_node="">Story Branch Favoritism</span></a><span data-dcnode-id="1495" instrument_node="">: The game splits into three distinct paths mid-game, one for the Order and the Scoia'tael and a neutral one. The latter features more content and is actually harder to unlock. This is justified by the eponymous Witchers' code, which forbids them from taking sides in conflicts—so the neutral path makes the most sense in-story.</span></li><li data-dcnode-id="1489"><span data-dcnode-id="1493" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoryBranching" title="/pmwiki/pmwiki.php/Main/StoryBranching"><span data-dcnode-id="1492" instrument_node="">Story Branching</span></a><span data-dcnode-id="1490" instrument_node="">: The game has a major story branching in chapter 5, depending on which faction (if any) Geralt sides with. The branches only converge again towards the end of the Epilogue.</span></li><li data-dcnode-id="1478"><span data-dcnode-id="1488" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuicidalOverconfidence" title="/pmwiki/pmwiki.php/Main/SuicidalOverconfidence"><span data-dcnode-id="1487" instrument_node="">Suicidal Overconfidence</span></a><span data-dcnode-id="1485" instrument_node="">: At the end of Chapter I, if you side with Abigail. Knowing that you are a skilled fighter who just killed the monster which plagued the village for quite some time, and that you are probably high on potions, </span><a class="twikilink" data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BullyingADragon" title="/pmwiki/pmwiki.php/Main/BullyingADragon"><span data-dcnode-id="1484" instrument_node="">a group of villagers attack you</span></a><span data-dcnode-id="1482" instrument_node="">. Partly justified in that they thought Geralt to be exhausted and wounded after killing The Beast. Even if it was a </span><a class="twikilink" data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="1481" instrument_node="">Curb-Stomp Battle</span></a><span data-dcnode-id="1479" instrument_node="">.</span></li><li data-dcnode-id="1447"><span data-dcnode-id="1477" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperHero" title="/pmwiki/pmwiki.php/Main/SuperHero"><span data-dcnode-id="1476" instrument_node="">Super Hero</span></a><span data-dcnode-id="1474" instrument_node="">: Bizarrely enough, </span><span class="spoiler" data-dcnode-id="1472" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1473" instrument_node="">a guard officer turned into a werewolf</span></span><span data-dcnode-id="1471" instrument_node=""> hunts thugs as a </span><a class="twikilink" data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Batman" title="/pmwiki/pmwiki.php/Franchise/Batman"><span data-dcnode-id="1470" instrument_node="">Batman-esque</span></a><span data-dcnode-id="1468" instrument_node=""> (without gadgets) vigilante by night.</span><ul data-dcnode-id="1448"><li data-dcnode-id="1456"><span data-dcnode-id="1467" instrument_node=""> This is even </span><a class="twikilink" data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="1466" instrument_node="">lampshaded</span></a><span data-dcnode-id="1464" instrument_node=""> by Geralt, who quips something like "The secret base of </span><span class="spoiler" data-dcnode-id="1462" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1463" instrument_node="">Vincent the werewolf</span></span><span data-dcnode-id="1461" instrument_node=""> - he thinks he is a superhero?!" (</span><img class="ymmv1 rounded" data-dcnode-id="1460" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FridgeLogic" title="/pmwiki/pmwiki.php/Main/FridgeLogic"><span data-dcnode-id="1459" instrument_node="">Don't ask how he knows what a "superhero" is</span></a><span data-dcnode-id="1457" instrument_node="">).</span></li><li data-dcnode-id="1449"><span data-dcnode-id="1455" instrument_node=""> Probably from the same source Dandelion learned about cognitive dissonance, </span><em data-dcnode-id="1451"><a class="twikilink" data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakingTheFourthWall" title="/pmwiki/pmwiki.php/Main/BreakingTheFourthWall"><span data-dcnode-id="1454" instrument_node="">Breaking the Fourth Wall</span></a><span data-dcnode-id="1452" instrument_node=""> for Dummies</span></em><span data-dcnode-id="1450" instrument_node="">. Considering that terms like "genetics" and "mutant" get thrown around often, it's pretty clear that the world has plenty of anachronistic aspects to it, probably thanks to magic and alchemy. Why shouldn't there be superhero fiction in a world with real, superpowered Witchers?</span></li></ul></li><li data-dcnode-id="1442"><span data-dcnode-id="1446" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/STDImmunity" title="/pmwiki/pmwiki.php/Main/STDImmunity"><span data-dcnode-id="1445" instrument_node="">STD Immunity</span></a><span data-dcnode-id="1443" instrument_node="">: Witchers are, due to their mutations, immune to disease in general, and that includes STDs.</span></li><li data-dcnode-id="1437"><span data-dcnode-id="1441" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Stripperiffic" title="/pmwiki/pmwiki.php/Main/Stripperiffic"><span data-dcnode-id="1440" instrument_node="">Stripperiffic</span></a><span data-dcnode-id="1438" instrument_node="">: Triss's little green dress for formal events leaves little to the imagination.</span></li><li data-dcnode-id="1420"><span data-dcnode-id="1436" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeAThirdOption" title="/pmwiki/pmwiki.php/Main/TakeAThirdOption"><span data-dcnode-id="1435" instrument_node="">Take a Third Option</span></a><span data-dcnode-id="1433" instrument_node="">: A number of opportunities throughout the game:</span><ul data-dcnode-id="1421"><li data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node=""> The biggest decision in the main plot allows this. In the course of the story, several dialogs stat that Geralt will have to choose a side in the incoming war. He can eventually ally with the Order or the rebels, but he also can actually remain neutral.</span></li><li data-dcnode-id="1422"><span data-dcnode-id="1430" instrument_node=""> The developers do seem to favor certain quest choices, though. One of the more obvious examples of this is the quest Ripples. There are three resolutions to this quest: siding with the vodyanoi, siding with the villagers, or the neutral path of siding with the Lady of the Lake. Siding with the vodyanoi rewards you with a sword that's not particularly great and can easily be found in abundance later. Siding with the villagers gives you a piece of </span><a class="twikilink" data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VendorTrash" title="/pmwiki/pmwiki.php/Main/VendorTrash"><span data-dcnode-id="1429" instrument_node="">Vendor Trash</span></a><span data-dcnode-id="1427" instrument_node=""> that can be sold for a pretty decent amount or given as a gift, but at that point you won't really need it. Siding with the Lady gives you a sword that is both unique and quite nice and a skill point. Given Geralt's </span><img class="ymmv1 rounded" data-dcnode-id="1426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrueNeutral" title="/pmwiki/pmwiki.php/Main/TrueNeutral"><span data-dcnode-id="1425" instrument_node="">True Neutral</span></a><span data-dcnode-id="1423" instrument_node=""> personality is canon, though, giving the neutral path the biggest reward might be justified.</span></li></ul></li><li data-dcnode-id="1404"><span data-dcnode-id="1419" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeThat" title="/pmwiki/pmwiki.php/Main/TakeThat"><span data-dcnode-id="1418" instrument_node="">Take That!</span></a><span data-dcnode-id="1416" instrument_node="">:</span><ul data-dcnode-id="1405"><li data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node=""> A really mean one to Andrew Golota (curiously absent from the Polish version, though, where he's named "Hugo Berronta").</span></li><li data-dcnode-id="1406"><span data-dcnode-id="1413" instrument_node=""> The hermit claiming to be an expert on the </span><a class="twikilink" data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HolyGrail" title="/pmwiki/pmwiki.php/Main/HolyGrail"><span data-dcnode-id="1412" instrument_node="">Holy Grail</span></a><span data-dcnode-id="1410" instrument_node=""> shows some contempt for </span><a class="twikilink" data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DanBrown" title="/pmwiki/pmwiki.php/Creator/DanBrown"><span data-dcnode-id="1409" instrument_node="">Dan Brown</span></a><span data-dcnode-id="1407" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1364"><span data-dcnode-id="1403" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeYourTime" title="/pmwiki/pmwiki.php/Main/TakeYourTime"><span data-dcnode-id="1402" instrument_node="">Take Your Time</span></a><span data-dcnode-id="1400" instrument_node="">: Wander and grind as long as you like; imminent destruction merely awaits Geralt to instigate it. When reaching Chapter-ending quests, characters will drop hints that now would be a good time to 'take care of anything you need to' before proceeding.</span><ul data-dcnode-id="1365"><li data-dcnode-id="1392"><span data-dcnode-id="1399" instrument_node=""> At least one sidequest in the game is actually a </span><a class="twikilink" data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimedMission" title="/pmwiki/pmwiki.php/Main/TimedMission"><span data-dcnode-id="1398" instrument_node="">Timed Mission</span></a><span data-dcnode-id="1396" instrument_node=""> unbeknownst to the player. Specifically, during the chapter 2 quest "A Long Way from Home" if you decide to leave the swamp while the quest is active, then the quest will fail and </span><span class="spoiler" data-dcnode-id="1394" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1395" instrument_node="">all the woodcutters will die. Well, except Yaren Bolt, the lone survivor</span></span><span data-dcnode-id="1393" instrument_node="">, who will now be mighty pissed. Do note that Yaren tells Geralt that it is an urgent problem, so at least the game gives you a warning.</span></li><li data-dcnode-id="1366"><span data-dcnode-id="1391" instrument_node=""> In some cases, you can take more time before setting a plot event in motion simply by putting off visiting a specific location. Assuming you </span><span class="spoiler" data-dcnode-id="1389" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1390" instrument_node="">allowed the Scoia'tael to take Haren Brogg's goods</span></span><span data-dcnode-id="1388" instrument_node=""> in Chapter 1, you may want to steer clear of </span><span class="spoiler" data-dcnode-id="1386" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1387" instrument_node="">Raymond Maarloeve</span></span><span data-dcnode-id="1385" instrument_node=""> in Chapter 2 till </span><span class="spoiler" data-dcnode-id="1383" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1384" instrument_node="">you've met Coleman at the Hairy Bear Inn and finished his quests</span></span><span data-dcnode-id="1382" instrument_node="">. This is because the game </span><a class="twikilink" data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EventFlag" title="/pmwiki/pmwiki.php/Main/EventFlag"><span data-dcnode-id="1381" instrument_node="">triggers</span></a><span data-dcnode-id="1379" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1377" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1378" instrument_node="">Coleman's death</span></span><span data-dcnode-id="1376" instrument_node=""> the moment you step foot in </span><span class="spoiler" data-dcnode-id="1374" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1375" instrument_node="">the detective's house</span></span><span data-dcnode-id="1373" instrument_node="">. There is also the party organized by Declan Leuvaarden in the beginning of the third chapter (which is </span><a class="twikilink" data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EventFlag" title="/pmwiki/pmwiki.php/Main/EventFlag"><span data-dcnode-id="1372" instrument_node="">a critical point in the plot</span></a><span data-dcnode-id="1370" instrument_node=""> : it is supposed to happen in 6 p.m. the first day, but will be infinitely delayed until Geralt goes there, even allowing to complete most of the chapter other quests before.</span><ul data-dcnode-id="1367"><li data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node=""> Declan even seems to be throwing a new banquet every day during all of chapter 3, as Triss will spend all her evenings there and only return home at around 4 in the morning.</span></li></ul></li></ul></li><li data-dcnode-id="1359"><span data-dcnode-id="1363" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TentacledTerror" title="/pmwiki/pmwiki.php/Main/TentacledTerror"><span data-dcnode-id="1362" instrument_node="">Tentacled Terror</span></a><span data-dcnode-id="1360" instrument_node="">: Boss creature Zeugl is basically a giant octopus with a piranha-like head.</span></li><li data-dcnode-id="1354"><span data-dcnode-id="1358" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThemeNaming" title="/pmwiki/pmwiki.php/Main/ThemeNaming"><span data-dcnode-id="1357" instrument_node="">Theme Naming</span></a><span data-dcnode-id="1355" instrument_node="">: Potions are usually named after birds or animals.</span></li><li data-dcnode-id="1349"><span data-dcnode-id="1353" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheScourgeOfGod" title="/pmwiki/pmwiki.php/Main/TheScourgeOfGod"><span data-dcnode-id="1352" instrument_node="">The Scourge of God</span></a><span data-dcnode-id="1350" instrument_node="">: The Beast in Chapter 1 is claimed to be the embodiment of gods' vengeance, whether its the in-game description, or Alvin's vision. In the chapter, it appears to Geralt near key locations related to certain criminal activity. It's barghast minions are also appear at each of the Eternal Fire shrines that need to be lit.</span></li><li data-dcnode-id="1342"><span data-dcnode-id="1348" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThreateningMediator" title="/pmwiki/pmwiki.php/Main/ThreateningMediator"><span data-dcnode-id="1347" instrument_node="">Threatening Mediator</span></a><span data-dcnode-id="1345" instrument_node="">: Geralt saving Abigail in Chapter 1 provides the page quote.</span><div class="indent" data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">"You have two options. Wait until I leave and try to murder Abigail ... but then I'll come back. I'll slay every lice-ridden peasant, anything that moves and can't climb a tree. Or you can try to live honorable lives, clear your conscience, and start again. The choice is yours."</span></div></li><li data-dcnode-id="1334"><span data-dcnode-id="1341" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThrowingYourSwordAlwaysWorks" title="/pmwiki/pmwiki.php/Main/ThrowingYourSwordAlwaysWorks"><span data-dcnode-id="1340" instrument_node="">Throwing Your Sword Always Works</span></a><span data-dcnode-id="1338" instrument_node="">: Subverted in an early cutscene, in which Geralt throws his sword at an enemy only to have it get stuck in the wall. It </span><em data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">would</span></em><span data-dcnode-id="1335" instrument_node=""> have worked, had the target not teleported away.</span></li><li data-dcnode-id="1329"><span data-dcnode-id="1333" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThunderBoltIron" title="/pmwiki/pmwiki.php/Main/ThunderBoltIron"><span data-dcnode-id="1332" instrument_node="">Thunder Bolt Iron</span></a><span data-dcnode-id="1330" instrument_node="">: New weapons can be crafted from "meteorite ore".</span></li><li data-dcnode-id="1309"><span data-dcnode-id="1328" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TraumaInducedAmnesia" title="/pmwiki/pmwiki.php/Main/TraumaInducedAmnesia"><span data-dcnode-id="1327" instrument_node="">Trauma-Induced Amnesia</span></a><span data-dcnode-id="1325" instrument_node="">: NPCs speculate Geralt lost his memory from either a </span><a class="twikilink" data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NearDeathExperience" title="/pmwiki/pmwiki.php/Main/NearDeathExperience"><span data-dcnode-id="1324" instrument_node="">Near-Death Experience</span></a><span data-dcnode-id="1322" instrument_node=""> or, more strongly implied, because he's </span><a class="twikilink" data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BackFromTheDead" title="/pmwiki/pmwiki.php/Main/BackFromTheDead"><span data-dcnode-id="1321" instrument_node="">Back from the Dead</span></a><span data-dcnode-id="1319" instrument_node="">.</span><ul data-dcnode-id="1310"><li data-dcnode-id="1311"><span data-dcnode-id="1318" instrument_node=""> In the sequel, it's revealed that </span><span class="spoiler" data-dcnode-id="1313" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1317" instrument_node="">he gave his life for Yennefer and that encounters with </span><a class="twikilink" data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheWildHunt" title="/pmwiki/pmwiki.php/Main/TheWildHunt"><span data-dcnode-id="1316" instrument_node="">The Wild Hunt</span></a><span data-dcnode-id="1314" instrument_node=""> can cause madness or amnesia</span></span><span data-dcnode-id="1312" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1304"><span data-dcnode-id="1308" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TwentyBearAsses" title="/pmwiki/pmwiki.php/Main/TwentyBearAsses"><span data-dcnode-id="1307" instrument_node="">20 Bear Asses</span></a><span data-dcnode-id="1305" instrument_node="">: Recurring quests in every chapter. A few things make this more bearable than most examples; hunting monsters for cash is ostensibly Geralt's day job, the quests are more of "collect as you do real quests", the drop-rates are high, and there is a perfectly good in-game reason for why someone would want these specific bear asses (alchemy, mostly). This also serves the gameplay purpose of familiarizing the player with where alchemical ingredients can be found, and giving an opportunity to collect a surplus for their own use.</span></li><li data-dcnode-id="1296"><span data-dcnode-id="1303" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnexplainedRecovery" title="/pmwiki/pmwiki.php/Main/UnexplainedRecovery"><span data-dcnode-id="1302" instrument_node="">Unexplained Recovery</span></a><span data-dcnode-id="1300" instrument_node="">: Well, you probably know this already; Geralt was supposedly </span><a class="twikilink" data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KilledOffForReal" title="/pmwiki/pmwiki.php/Main/KilledOffForReal"><span data-dcnode-id="1299" instrument_node="">Killed Off for Real</span></a><span data-dcnode-id="1297" instrument_node=""> in the original novels, only to be resurrected in the game. The sequels go into more detail on how this came to be.</span></li><li data-dcnode-id="1288"><span data-dcnode-id="1295" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnintentionallyUnwinnable" title="/pmwiki/pmwiki.php/Main/UnintentionallyUnwinnable"><span data-dcnode-id="1294" instrument_node="">Unintentionally Unwinnable</span></a><span data-dcnode-id="1292" instrument_node="">: Some sidequests (like Vesna Hood's sex card and getting the parcel to Coleman) become unwinnable if either die. As a lot of quests are imbricated into each other, there are some </span><a class="twikilink" data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="1291" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="1289" instrument_node=""> moments because not achieving some sidequests and main quests in a specific order or in a specific way makes a few sidequests unwinnable.</span></li><li data-dcnode-id="1281"><span data-dcnode-id="1287" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VampiresAreSexGods" title="/pmwiki/pmwiki.php/Main/VampiresAreSexGods"><span data-dcnode-id="1286" instrument_node="">Vampires Are Sex Gods</span></a><span data-dcnode-id="1284" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1282" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1283" instrument_node="">The Trader District brothel employees are all vampiric prostitutes.</span></span></li><li data-dcnode-id="1268"><span data-dcnode-id="1280" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideogameCrueltyPotential" title="/pmwiki/pmwiki.php/Main/VideogameCrueltyPotential"><span data-dcnode-id="1279" instrument_node="">Videogame Cruelty Potential</span></a><span data-dcnode-id="1277" instrument_node="">:</span><ul data-dcnode-id="1269"><li data-dcnode-id="1272"><span data-dcnode-id="1276" instrument_node=""> A particularly nasty example early in the game can have Geralt </span><span class="spoiler" data-dcnode-id="1274" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1275" instrument_node="">sleeping with a young, sexy witch with the promise to protect her, only to hand her to an angry mob who kills her a couple of minutes later</span></span><span data-dcnode-id="1273" instrument_node="">.</span></li><li data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node=""> The "Dogcatcher of Vizima" sidequest requires Geralt to kill six wandering dogs in order to harvest some fat in their body. The problem is that dogs aren't hostile at all (unless provoked), so the easiest way to complete the quest is to coldbloodly attack harmless creatures (which grant a ridiculously low amount of experience points). There actually are ways to complete the quest without Geralt killing them himself. The fat can be bought from some merchants, found in houses or rarely as loot from Salamandra assassins. As you have two chapters to complete the quest, it's fairly easy to get the 6 you need just by looking for them casually.</span></li></ul></li><li data-dcnode-id="1261"><span data-dcnode-id="1267" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainWithGoodPublicity" title="/pmwiki/pmwiki.php/Main/VillainWithGoodPublicity"><span data-dcnode-id="1266" instrument_node="">Villain with Good Publicity</span></a><span data-dcnode-id="1264" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1262" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1263" instrument_node="">The Reverend and Jacques De Aldersberg.</span></span></li><li data-dcnode-id="1250"><span data-dcnode-id="1260" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainousBreakdown" title="/pmwiki/pmwiki.php/Main/VillainousBreakdown"><span data-dcnode-id="1259" instrument_node="">Villainous Breakdown</span></a><span data-dcnode-id="1257" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1255" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1256" instrument_node="">The Reverend if you side with Abigail</span></span><span data-dcnode-id="1254" instrument_node="">, </span><span class="spoiler" data-dcnode-id="1252" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1253" instrument_node="">Jacques during the final battle</span></span><span data-dcnode-id="1251" instrument_node="">, and several others.</span></li><li data-dcnode-id="1245"><span data-dcnode-id="1249" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VisibleSilence" title="/pmwiki/pmwiki.php/Main/VisibleSilence"><span data-dcnode-id="1248" instrument_node="">Visible Silence</span></a><span data-dcnode-id="1246" instrument_node="">: A NPC at a party Geralt goes to. Subverted, as you can get him drunk to get him to talk.</span></li><li data-dcnode-id="1237"><span data-dcnode-id="1244" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WalkingArmory" title="/pmwiki/pmwiki.php/Main/WalkingArmory"><span data-dcnode-id="1243" instrument_node="">Walking Armory</span></a><span data-dcnode-id="1241" instrument_node="">: Geralt can have up to </span><em data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">five</span></em><span data-dcnode-id="1238" instrument_node=""> weapon slots. Three are for "big" weapons (mainly Silver and Steel swords), and one or two "small" slots for a secondary side weapon. Only one weapon for each slot may be carried at a time, and all of them are stowed visibly somewhere on Geralt's body.</span></li><li data-dcnode-id="1232"><span data-dcnode-id="1236" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WellIntentionedExtremist" title="/pmwiki/pmwiki.php/Main/WellIntentionedExtremist"><span data-dcnode-id="1235" instrument_node="">Well-Intentioned Extremist</span></a><span data-dcnode-id="1233" instrument_node="">: Most characters who claim to have noble goals are this. Faction leaders Jacques de Aldersburg and Yaevinn fit the trope especially well.</span></li><li data-dcnode-id="1214"><span data-dcnode-id="1231" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamShot" title="/pmwiki/pmwiki.php/Main/WhamShot"><span data-dcnode-id="1230" instrument_node="">Wham Shot</span></a><span data-dcnode-id="1228" instrument_node="">:</span><ul data-dcnode-id="1215"><li data-dcnode-id="1223"><span data-dcnode-id="1227" instrument_node=""> The amulet held in Jacques' hand </span><span class="spoiler" data-dcnode-id="1225" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1226" instrument_node="">which matches the one that was given to Alvin earlier</span></span><span data-dcnode-id="1224" instrument_node="">.</span></li><li data-dcnode-id="1216"><span data-dcnode-id="1222" instrument_node=""> The very </span><em data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">last</span></em><span data-dcnode-id="1219" instrument_node=""> shot in the game, where </span><span class="spoiler" data-dcnode-id="1217" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1218" instrument_node="">Geralt removes the hood of the assassin who tried to kill King Foltest and sees he bears yellow, catlike eyes.</span></span></li></ul></li><li data-dcnode-id="1192"><span data-dcnode-id="1213" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatTheHellHero" title="/pmwiki/pmwiki.php/Main/WhatTheHellHero"><span data-dcnode-id="1212" instrument_node="">What the Hell, Hero?</span></a><span data-dcnode-id="1210" instrument_node="">: No matter what you do, you are going to get at least a couple of these from other characters. And with good reason. Special mention should be given to the </span><span class="spoiler" data-dcnode-id="1206" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1209" instrument_node="">King Of </span><a class="twikilink" data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheWildHunt" title="/pmwiki/pmwiki.php/Main/TheWildHunt"><span data-dcnode-id="1208" instrument_node="">The Wild Hunt</span></a></span><span data-dcnode-id="1205" instrument_node=""> at the end of the game, who lists out the negative consequences of </span><a class="twikilink" data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="1204" instrument_node="">EVERY SINGLE ONE of your major game choices.</span></a><span data-dcnode-id="1202" instrument_node=""> He also conveniently </span><a class="twikilink" data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AccentuateTheNegative" title="/pmwiki/pmwiki.php/Main/AccentuateTheNegative"><span data-dcnode-id="1201" instrument_node="">forgets to mention</span></a><span data-dcnode-id="1199" instrument_node=""> your decisions that actually made lives </span><em data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">better</span></em><span data-dcnode-id="1196" instrument_node=""> for people, such as </span><span class="spoiler" data-dcnode-id="1194" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1195" instrument_node="">Vincent and Carmen, the vodyanoi and the residents of Murky Waters, and Princess Adda and King Radovid</span></span><span data-dcnode-id="1193" instrument_node="">.</span></li><li data-dcnode-id="1175"><span data-dcnode-id="1191" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WholePlotReference" title="/pmwiki/pmwiki.php/Main/WholePlotReference"><span data-dcnode-id="1190" instrument_node="">Whole Plot Reference</span></a><span data-dcnode-id="1188" instrument_node="">: A number of situations from the game are retellings of short stories and plot points from the books. The introduction cutscene is basically retelling the first story in Witcher lore, "The Witcher".</span><ul data-dcnode-id="1176"><li data-dcnode-id="1177"><span data-dcnode-id="1187" instrument_node=""> Chapter 4 could be described like "</span><a class="twikilink" data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/CthulhuMythos" title="/pmwiki/pmwiki.php/Franchise/CthulhuMythos"><span data-dcnode-id="1186" instrument_node="">Cthulhu Mythos</span></a><span data-dcnode-id="1184" instrument_node=""> meets </span><a class="twikilink" data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Myth/ArthurianLegend" title="/pmwiki/pmwiki.php/Myth/ArthurianLegend"><span data-dcnode-id="1183" instrument_node="">Arthurian Legend</span></a><span data-dcnode-id="1181" instrument_node=""> meets </span><a class="twikilink" data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheLastOfTheseIsNotLikeTheOthers" title="/pmwiki/pmwiki.php/Main/TheLastOfTheseIsNotLikeTheOthers"><span data-dcnode-id="1180" instrument_node="">Polish literature classics</span></a><span data-dcnode-id="1178" instrument_node="">".</span></li></ul></li><li data-dcnode-id="1157"><span data-dcnode-id="1174" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WithGreatPowerComesGreatInsanity" title="/pmwiki/pmwiki.php/Main/WithGreatPowerComesGreatInsanity"><span data-dcnode-id="1173" instrument_node="">With Great Power Comes Great Insanity</span></a><span data-dcnode-id="1171" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1166" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1170" instrument_node="">Massively magic-gifted Alvin becomes the mad human supremacist Jacques de Aldersberg through visions of a horrible future, warring humans and Otherlings, and </span><a class="twikilink" data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerIncontinence" title="/pmwiki/pmwiki.php/Main/PowerIncontinence"><span data-dcnode-id="1169" instrument_node="">involuntary time travel</span></a><span data-dcnode-id="1167" instrument_node="">.</span></span><ul data-dcnode-id="1158"><li data-dcnode-id="1159"><span data-dcnode-id="1165" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1160" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1164" instrument_node="">That's left deliberately inconclusive, and Jacques stands as example enough without the connection to Alvin. You get a lot of clues though, such as Jacques's </span><a class="twikilink" data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HannibalLecture" title="/pmwiki/pmwiki.php/Main/HannibalLecture"><span data-dcnode-id="1163" instrument_node="">Hannibal Lecture</span></a><span data-dcnode-id="1161" instrument_node=""> using some of the expressions you used when talking with Alvin earlier.</span></span></li></ul></li><li data-dcnode-id="1152"><span data-dcnode-id="1156" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WithUsOrAgainstUs" title="/pmwiki/pmwiki.php/Main/WithUsOrAgainstUs"><span data-dcnode-id="1155" instrument_node="">With Us or Against Us</span></a><span data-dcnode-id="1153" instrument_node="">: Yaevinn pretty much gives Geralt this ultimatum in the "Gold Rush" quest. Either the Witcher can assist him and his guerillas in clearing out some monsters blocking the escape route from the bank they just robbed and stay in the Scoia'tael's good graces. Or Geralt can walk away and forever be deemed an enemy.</span></li><li data-dcnode-id="1126"><span data-dcnode-id="1151" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouMonster" title="/pmwiki/pmwiki.php/Main/YouMonster"><span data-dcnode-id="1150" instrument_node="">You Monster!</span></a><span data-dcnode-id="1148" instrument_node="">: Two examples.</span><ul data-dcnode-id="1130"><li data-dcnode-id="1136"><span data-dcnode-id="1147" instrument_node=""> In a conversation with Zoltan:</span><div class="indent" data-dcnode-id="1137"><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Zoltan:</span></strong><span data-dcnode-id="1144" instrument_node=""> Witchers are known to carry two blades. A silver blade for monsters and steel for humans. </span><br data-dcnode-id="1143"><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Geralt:</span></strong><span data-dcnode-id="1140" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumansAreTheRealMonsters" title="/pmwiki/pmwiki.php/Main/HumansAreTheRealMonsters"><span data-dcnode-id="1139" instrument_node="">Both are for monsters.</span></a></div></li><li data-dcnode-id="1131"><span data-dcnode-id="1135" instrument_node=""> The Big Bad, during the final fight, knocks Geralt's Steel Sword away, and Geralt moves to impale him with his Silver Sword (</span><a class="twikilink" data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CutsceneIncompetence" title="/pmwiki/pmwiki.php/Main/CutsceneIncompetence"><span data-dcnode-id="1134" instrument_node="">despite Geralt likely carrying an extra steel sword</span></a><span data-dcnode-id="1132" instrument_node="">); before being killed, he states:</span></li></ul><div class="indent" data-dcnode-id="1127"><em data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">"That sword is for monsters!"</span></em></div></li><li data-dcnode-id="1121"><span data-dcnode-id="1125" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouNeedToGetLaid" title="/pmwiki/pmwiki.php/Main/YouNeedToGetLaid"><span data-dcnode-id="1124" instrument_node="">You Need to Get Laid</span></a><span data-dcnode-id="1122" instrument_node="">: Geralt to Kalkstein at one point during a sidequest.</span></li></ul><hr data-dcnode-id="1119"><div class="indent" data-dcnode-id="1116"><em data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">"And so ends this tale. And Geralt would go on to have many more adventures. But that's another story."</span></em></div><hr data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">
