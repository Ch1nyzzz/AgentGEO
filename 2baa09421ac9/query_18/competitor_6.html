</span><div class="article-content retro-folders" data-dcnode-id="1113" id="main-article"><span data-dcnode-id="3082" instrument_node="">
</span><p data-dcnode-id="3078"></p><div class="quoteright" data-dcnode-id="3075" style="width:350px;"><div class="lazy_load_img_box" data-dcnode-id="3076" style="padding-top:76.22%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/the_witcher_1.jpg" border="0" class="embeddedimage" data-dcnode-id="3077" height="266" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/the_witcher_1.jpg&amp;raw" width="349"></div></div><div class="indent" data-dcnode-id="3069"><em data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">"Death, the final judgement. The Beast has met its end once. It doesn't fear death, it is death. How will you defeat human villainy? With your sword? You who died and still walk amongst the living?"</span></em><div class="indent" data-dcnode-id="3070"><strong data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">— Eredin Bréacc Glas</span></strong></div></div><em data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">The Witcher</span></em><span data-dcnode-id="3066" instrument_node=""> is a computer </span><a class="twikilink" data-dcnode-id="3064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RolePlayingGame" title="/pmwiki/pmwiki.php/Main/RolePlayingGame"><span data-dcnode-id="3065" instrument_node="">Role-Playing Game</span></a><span data-dcnode-id="3063" instrument_node=""> in which you play Geralt of Rivia, a monster hunter questing to regain his memories whilst pursuing revenge against a mysterious group known as the Salamandra. It was based on an upgraded version of the </span><em data-dcnode-id="3060"><a class="twikilink" data-dcnode-id="3061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/NeverwinterNights" title="/pmwiki/pmwiki.php/VideoGame/NeverwinterNights"><span data-dcnode-id="3062" instrument_node="">Neverwinter Nights</span></a></em><span data-dcnode-id="3059" instrument_node=""> Aurora engine, developed by </span><a class="twikilink" data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/CDProjektRED" title="/pmwiki/pmwiki.php/Creator/CDProjektRED"><span data-dcnode-id="3058" instrument_node="">CD Projekt RED</span></a><span data-dcnode-id="3056" instrument_node=""> and released in late 2007.</span><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="3050"><span class="ad-caption" data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">Advertisement:</span></span><div data-dcnode-id="3051" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="3034"><span data-dcnode-id="3049" instrument_node="">The title is set in </span><a class="twikilink" data-dcnode-id="3047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheVerse" title="/pmwiki/pmwiki.php/Main/TheVerse"><span data-dcnode-id="3048" instrument_node="">The 'Verse</span></a><span data-dcnode-id="3046" instrument_node=""> introduced by Andrzej Sapkowski's novel </span><a class="twikilink" data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TheWitcher" title="/pmwiki/pmwiki.php/Franchise/TheWitcher"><span data-dcnode-id="3045" instrument_node="">of the same name</span></a><span data-dcnode-id="3043" instrument_node="">. It sold unexpectedly well both in the US and worldwide, given that it was a niche PC game based on a book mostly unknown outside of Central Europe. A sequel, </span><em data-dcnode-id="3040"><a class="twikilink" data-dcnode-id="3041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheWitcher2AssassinsOfKings" title="/pmwiki/pmwiki.php/VideoGame/TheWitcher2AssassinsOfKings"><span data-dcnode-id="3042" instrument_node="">The Witcher 2: Assassins of Kings</span></a></em><span data-dcnode-id="3039" instrument_node="">, was released on May 17, 2011. A third game, </span><em data-dcnode-id="3036"><a class="twikilink" data-dcnode-id="3037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheWitcher3WildHunt" title="/pmwiki/pmwiki.php/VideoGame/TheWitcher3WildHunt"><span data-dcnode-id="3038" instrument_node="">The Witcher 3: Wild Hunt</span></a></em><span data-dcnode-id="3035" instrument_node=""> was released on May 19, 2015.</span></p><p data-dcnode-id="3023"><span data-dcnode-id="3033" instrument_node="">Interestingly, the first Witcher game has a rather extensive post-release history. A remake of the first game titled </span><em data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">The Witcher: Rise Of The White Wolf</span></em><span data-dcnode-id="3030" instrument_node=""> was to be released for the Xbox 360 and Playstation 3 in 2009, featuring a brand new engine and more action-oriented combat system in the vein of </span><a class="twikilink" data-dcnode-id="3028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheWitcher2AssassinsOfKings" title="/pmwiki/pmwiki.php/VideoGame/TheWitcher2AssassinsOfKings"><span data-dcnode-id="3029" instrument_node="">the then-upcoming sequel</span></a><span data-dcnode-id="3027" instrument_node="">. Unfortunately, it was cancelled in 2009 due to disagreements between CD Projekt Red and co-developer Widescreen Games. However, in 2012, a group of modders </span><em data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">endorsed by CD Projekt Red</span></em><span data-dcnode-id="3024" instrument_node=""> began work on an ambitious mod for the Enhanced Edition, also titled "Rise Of The White Wolf," that introduced new story elements, a seriously overhauled interface, an improved combat system, and updated graphics. The mod was released in 2014 to great acclaim and is now seen by many as the definitive way to play the original.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="3017"><span class="ad-caption" data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">Advertisement:</span></span><div data-dcnode-id="3018" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="3010"><em data-dcnode-id="3014"><strong data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">Note:</span></strong></em><span data-dcnode-id="3013" instrument_node=""> </span><em data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">The tropes listed on both this and the YMMV page are for the vanilla Enhanced Edition. The updates/changes made in the "Rise Of The White Wolf" overhaul are not included at the moment.</span></em></p><p data-dcnode-id="3009"></p><hr data-dcnode-id="3008"><h2 data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">The Game Provides Examples Of:</span></h2><p data-dcnode-id="3005"></p><ul data-dcnode-id="1120"><li data-dcnode-id="3000"><span data-dcnode-id="3004" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActionCommands" title="/pmwiki/pmwiki.php/Main/ActionCommands"><span data-dcnode-id="3003" instrument_node="">Action Commands</span></a><span data-dcnode-id="3001" instrument_node="">: Sword attacks are chained with correctly timed mouse-clicks.</span></li><li data-dcnode-id="2995"><span data-dcnode-id="2999" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllGirlsWantBadBoys" title="/pmwiki/pmwiki.php/Main/AllGirlsWantBadBoys"><span data-dcnode-id="2998" instrument_node="">All Girls Want Bad Boys</span></a><span data-dcnode-id="2996" instrument_node="">: There's a nameless villager woman who Geralt can lay in the Outskirts of Vizima. You'll know she's near if she points out that you look like "quite the dangerous one."</span></li><li data-dcnode-id="2981"><span data-dcnode-id="2994" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllWomenAreLustful" title="/pmwiki/pmwiki.php/Main/AllWomenAreLustful"><span data-dcnode-id="2993" instrument_node="">All Women Are Lustful</span></a><span data-dcnode-id="2991" instrument_node="">: The medieval European stereotype of all women being </span><a class="twikilink" data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheVamp" title="/pmwiki/pmwiki.php/Main/TheVamp"><span data-dcnode-id="2990" instrument_node="">The Vamp</span></a><span data-dcnode-id="2988" instrument_node=""> is in full force in the game's </span><a class="twikilink" data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDungAges" title="/pmwiki/pmwiki.php/Main/TheDungAges"><span data-dcnode-id="2987" instrument_node="">The Dung Ages</span></a><span data-dcnode-id="2985" instrument_node=""> setting, and many of them do live up to the stereotype. (A minor villain goes on a misogynist "all women are evil succubi leading men into sin" rant while riling up a mob to </span><a class="twikilink" data-dcnode-id="2983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BurnTheWitch" title="/pmwiki/pmwiki.php/Main/BurnTheWitch"><span data-dcnode-id="2984" instrument_node="">Burn the Witch!</span></a><span data-dcnode-id="2982" instrument_node=""> who ironically kicked a man in the groin earlier for trying to rape her.)</span></li><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2975"><span class="ad-caption" data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2976" id="proper-ad-tvtropes_mobile_ad_3"></div></div><li data-dcnode-id="2970"><span data-dcnode-id="2974" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllSwordsAreTheSame" title="/pmwiki/pmwiki.php/Main/AllSwordsAreTheSame"><span data-dcnode-id="2973" instrument_node="">All Swords Are the Same</span></a><span data-dcnode-id="2971" instrument_node="">: Averted. Silver and Steel swords both have different skill paths on the character development tree, as the fighting styles are apparently different for the two types of swords.</span></li><li data-dcnode-id="2950"><span data-dcnode-id="2969" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbiguouslyEvil" title="/pmwiki/pmwiki.php/Main/AmbiguouslyEvil"><span data-dcnode-id="2968" instrument_node="">Ambiguously Evil</span></a><span data-dcnode-id="2966" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2964" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2965" instrument_node="">Abigail</span></span><span data-dcnode-id="2963" instrument_node="">. There's evidence to suggest that the accusations levied against </span><span class="spoiler" data-dcnode-id="2961" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2962" instrument_node="">her</span></span><span data-dcnode-id="2960" instrument_node=""> have some merit, and </span><span class="spoiler" data-dcnode-id="2958" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2959" instrument_node="">she's implied to be a member of the Cult of the Lionheaded Spider, which is seriously bad juju</span></span><span data-dcnode-id="2957" instrument_node="">. However, </span><span class="spoiler" data-dcnode-id="2955" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2956" instrument_node="">Abigail</span></span><span data-dcnode-id="2954" instrument_node=""> always proves to be helpful to Geralt and </span><em data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">appears</span></em><span data-dcnode-id="2951" instrument_node=""> to be harmless when left alone.</span></li><li data-dcnode-id="2945"><span data-dcnode-id="2949" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmnesiacResonance" title="/pmwiki/pmwiki.php/Main/AmnesiacResonance"><span data-dcnode-id="2948" instrument_node="">Amnesiac Resonance</span></a><span data-dcnode-id="2946" instrument_node="">: In the first game, Geralt begins the game afflicted with amnesia, but still competent in the witcher's unique schools of martial arts.</span></li><li data-dcnode-id="2940"><span data-dcnode-id="2944" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures" title="/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures"><span data-dcnode-id="2943" instrument_node="">Anti-Frustration Features</span></a><span data-dcnode-id="2941" instrument_node="">: The first time you visit a shop, its contents become part of your save. So if you accidentally sell something you need later, as long as you can still access that merchant it'll still be there.</span></li><li data-dcnode-id="2935"><span data-dcnode-id="2939" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiHero" title="/pmwiki/pmwiki.php/Main/AntiHero"><span data-dcnode-id="2938" instrument_node="">Anti-Hero</span></a><span data-dcnode-id="2936" instrument_node="">: Geralt. Depending on player choices. Despite this, Geralt will probably come off as one of the more noble characters in the game, despite his cynical and violent nature.</span></li><li data-dcnode-id="2928"><span data-dcnode-id="2934" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiVillain" title="/pmwiki/pmwiki.php/Main/AntiVillain"><span data-dcnode-id="2933" instrument_node="">Anti-Villain</span></a><span data-dcnode-id="2931" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2929" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2930" instrument_node="">Jacques de Aldersberg. He believes that his plans will save humanity from a prophesied doom.</span></span></li><li data-dcnode-id="2917"><span data-dcnode-id="2927" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ApocalypseHow" title="/pmwiki/pmwiki.php/Main/ApocalypseHow"><span data-dcnode-id="2926" instrument_node="">Apocalypse How</span></a><span data-dcnode-id="2924" instrument_node="">: Type 0: The coming ice age that </span><span class="spoiler" data-dcnode-id="2922" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2923" instrument_node="">de Aldersberg</span></span><span data-dcnode-id="2921" instrument_node=""> foresaw will apparently turn the descendants of humanity into savage animals, but </span><span class="spoiler" data-dcnode-id="2919" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2920" instrument_node="">he says that the only way for humanity to survive would be a mass exodus south, which he gives as the reason for creating his mutants</span></span><span data-dcnode-id="2918" instrument_node="">.</span></li><li data-dcnode-id="2912"><span data-dcnode-id="2916" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcadianInterlude" title="/pmwiki/pmwiki.php/Main/ArcadianInterlude"><span data-dcnode-id="2915" instrument_node="">Arcadian Interlude</span></a><span data-dcnode-id="2913" instrument_node="">: Chapter 4.</span></li><li data-dcnode-id="2907"><span data-dcnode-id="2911" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArrowCatch" title="/pmwiki/pmwiki.php/Main/ArrowCatch"><span data-dcnode-id="2910" instrument_node="">Arrow Catch</span></a><span data-dcnode-id="2908" instrument_node="">: Played with. The Professor comments on rumors that witchers are trained to catch arrows in flight, just before he shoots Leo. Geralt can learn to catch arrows, and demonstrates this in a cutscene by parrying a crossbow bolt, causing the Professor to realize that the rumors were true.</span></li><li data-dcnode-id="2898"><span data-dcnode-id="2906" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialAtmosphericActions" title="/pmwiki/pmwiki.php/Main/ArtificialAtmosphericActions"><span data-dcnode-id="2905" instrument_node="">Artificial Atmospheric Actions</span></a><span data-dcnode-id="2903" instrument_node="">: The initial release's stiff animations and dull faces caused NPC interactions to range from disenchanting to </span><img class="ymmv1 rounded" data-dcnode-id="2902" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="2900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UncannyValley" title="/pmwiki/pmwiki.php/Main/UncannyValley"><span data-dcnode-id="2901" instrument_node="">freaky</span></a><span data-dcnode-id="2899" instrument_node="">. Fixed in the Enhanced Edition, which significantly expanded and improved the animation and expression.</span></li><li data-dcnode-id="2893"><span data-dcnode-id="2897" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AscendedExtra" title="/pmwiki/pmwiki.php/Main/AscendedExtra"><span data-dcnode-id="2896" instrument_node="">Ascended Extra</span></a><span data-dcnode-id="2894" instrument_node="">: This game started the series' trend of taking bit players from the books and expanding on them. These characters included Triss, Shani, Radovid, and Princess Adda.</span></li><li data-dcnode-id="2877"><span data-dcnode-id="2892" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassBookworm" title="/pmwiki/pmwiki.php/Main/BadassBookworm"><span data-dcnode-id="2891" instrument_node="">Badass Bookworm</span></a><span data-dcnode-id="2889" instrument_node="">:</span><ul data-dcnode-id="2878"><li data-dcnode-id="2881"><span data-dcnode-id="2888" instrument_node=""> A villainous example with the Professor, though we never see much of his Professor-ness.</span><ul data-dcnode-id="2882"><li data-dcnode-id="2883"><span data-dcnode-id="2887" instrument_node=""> In the original he is called Magister and is prone to </span><a class="twikilink" data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SesquipedalianLoquaciousness" title="/pmwiki/pmwiki.php/Main/SesquipedalianLoquaciousness"><span data-dcnode-id="2886" instrument_node="">Sesquipedalian Loquaciousness</span></a><span data-dcnode-id="2884" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node=""> Geralt will inevitably be this as the game goes on, as the only way to learn new monsters entries is to read books about them.</span></li></ul></li><li data-dcnode-id="2872"><span data-dcnode-id="2876" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassNormal" title="/pmwiki/pmwiki.php/Main/BadassNormal"><span data-dcnode-id="2875" instrument_node="">Badass Normal</span></a><span data-dcnode-id="2873" instrument_node="">: Despite not being a mutant or using magic, Siegfried and other knights are still competent at fighting monsters. As explained in the second game, who needs a witcher when you have a garrison?</span></li><li data-dcnode-id="2867"><span data-dcnode-id="2871" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BarbieDollAnatomy" title="/pmwiki/pmwiki.php/Main/BarbieDollAnatomy"><span data-dcnode-id="2870" instrument_node="">Barbie Doll Anatomy</span></a><span data-dcnode-id="2868" instrument_node="">: Bruxas and Alps (two kind of female vampires always naked) look like this in the censored version of the game, in which their crotches are blank and their chests are covered by scales or hair. In the uncensored version, they have breasts, nipples, and pubic hair.</span></li><li data-dcnode-id="2856"><span data-dcnode-id="2866" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BasiliskAndCockatrice" title="/pmwiki/pmwiki.php/Main/BasiliskAndCockatrice"><span data-dcnode-id="2865" instrument_node="">Basilisk and Cockatrice</span></a><span data-dcnode-id="2863" instrument_node="">: Basilisks and cockatrices feature as monsters in </span><em data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">The Witcher</span></em><span data-dcnode-id="2860" instrument_node=""> and </span><em data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">The Witcher 3</span></em><span data-dcnode-id="2857" instrument_node="">, where they are classified as being relatives of wyverns. Notably a cockatrice is the target in the only storyline-relevant trophy hunt in the first game. These basilisks and cockatrices lack the ability to petrify enemies, an ability the codex states is inaccurate folklore.</span></li><li data-dcnode-id="2846"><span data-dcnode-id="2855" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BatmanGambit" title="/pmwiki/pmwiki.php/Main/BatmanGambit"><span data-dcnode-id="2854" instrument_node="">Batman Gambit</span></a><span data-dcnode-id="2852" instrument_node="">: Geralt orchestrates a hilarious one at the end of chapter 3. He uses Triss's jealousy and anger to ensure his escape </span><span class="spoiler" data-dcnode-id="2847" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2851" instrument_node="">when confronted by Princess Adda: he asks for a kiss as a </span><a class="twikilink" data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LastRequest" title="/pmwiki/pmwiki.php/Main/LastRequest"><span data-dcnode-id="2850" instrument_node="">last wish</span></a><span data-dcnode-id="2848" instrument_node=""> and the sorceress teleports him on the double.</span></span></li><li data-dcnode-id="2836"><span data-dcnode-id="2845" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BattleInTheCenterOfTheMind" title="/pmwiki/pmwiki.php/Main/BattleInTheCenterOfTheMind"><span data-dcnode-id="2844" instrument_node="">Battle in the Center of the Mind</span></a><span data-dcnode-id="2842" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2837" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2841" instrument_node="">The finale. Unusual in that it occurs in the </span><a class="twikilink" data-dcnode-id="2839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="2840" instrument_node="">Big Bad</span></a><span data-dcnode-id="2838" instrument_node="">'s mind.</span></span></li><li data-dcnode-id="2831"><span data-dcnode-id="2835" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BettingMiniGame" title="/pmwiki/pmwiki.php/Main/BettingMiniGame"><span data-dcnode-id="2834" instrument_node="">Betting Mini Game</span></a><span data-dcnode-id="2832" instrument_node="">: Dice Poker and fist-fighting.</span></li><li data-dcnode-id="2823"><span data-dcnode-id="2830" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BettyAndVeronica" title="/pmwiki/pmwiki.php/Main/BettyAndVeronica"><span data-dcnode-id="2829" instrument_node="">Betty and Veronica</span></a><span data-dcnode-id="2827" instrument_node="">: Shani (a pretty, sweet healer) and Triss (a sexy, scheming sorceress). </span><span class="spoiler" data-dcnode-id="2824" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="2825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CuttingOffTheBranches" title="/pmwiki/pmwiki.php/Main/CuttingOffTheBranches"><span data-dcnode-id="2826" instrument_node="">In the sequel, Triss is the canonical choice.</span></a></span></li><li data-dcnode-id="2818"><span data-dcnode-id="2822" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BloodyMurder" title="/pmwiki/pmwiki.php/Main/BloodyMurder"><span data-dcnode-id="2821" instrument_node="">Bloody Murder</span></a><span data-dcnode-id="2819" instrument_node="">: One of the potions in Geralt's arsenal turns his blood into poison, causing vampiric monsters to take damage if they try and feed on him. The downside is that it also jacks up Geralt's own body toxicity in the process.</span></li><li data-dcnode-id="2805"><span data-dcnode-id="2817" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="2816" instrument_node="">Bonus Boss</span></a><span data-dcnode-id="2814" instrument_node="">: Regularly throughout the game, in the form of trophy hunts. Also </span><span class="spoiler" data-dcnode-id="2806" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2813" instrument_node="">immediately after beating the </span><a class="twikilink" data-dcnode-id="2811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="2812" instrument_node="">Big Bad</span></a><span data-dcnode-id="2810" instrument_node="">, you have the option to fight what amounts to </span><em data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">the personification of Death itself</span></em><span data-dcnode-id="2807" instrument_node=""> to deliver the coup-de-grace.</span></span></li><li data-dcnode-id="2797"><span data-dcnode-id="2804" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BookEnds" title="/pmwiki/pmwiki.php/Main/BookEnds"><span data-dcnode-id="2803" instrument_node="">Bookends</span></a><span data-dcnode-id="2801" instrument_node="">: The opening cinematic is a retelling of one of the first short stories in the franchise. </span><span class="spoiler" data-dcnode-id="2799" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2800" instrument_node="">One of the quests in Chapter 5 is the closest you can get to actually playing through it</span></span><span data-dcnode-id="2798" instrument_node="">.</span></li><li data-dcnode-id="2792"><span data-dcnode-id="2796" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokenBridge" title="/pmwiki/pmwiki.php/Main/BrokenBridge"><span data-dcnode-id="2795" instrument_node="">Broken Bridge</span></a><span data-dcnode-id="2793" instrument_node="">: Typically for a story-driven RPG, there are lots of straightforward examples. A subversion stands out, however - there is a literal broken bridge in Murky Waters. An NPC is busy repairing it, there is a quest to help him, but he won't finish it nor make any measurable progress before you leave the village in the other direction. When Geralt asks the builder what's on the other side he says it's nothing but fields and meadows. Even if the bridge was fixed there would be nothing of interest on the other side.</span></li><li data-dcnode-id="2784"><span data-dcnode-id="2791" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButThouMust" title="/pmwiki/pmwiki.php/Main/ButThouMust"><span data-dcnode-id="2790" instrument_node="">But Thou Must!</span></a><span data-dcnode-id="2788" instrument_node="">: There's no third option for the "Gold Rush" sidequest. You </span><em data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">must</span></em><span data-dcnode-id="2785" instrument_node=""> side with either the Order or the Scoia'tel. You can't even skip the quest, for you'll be dragged into it automatically. Whatever choice you make here sets the course for the rest of the game.</span></li><li data-dcnode-id="2777"><span data-dcnode-id="2783" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCasanova" title="/pmwiki/pmwiki.php/Main/TheCasanova"><span data-dcnode-id="2782" instrument_node="">The Casanova</span></a><span data-dcnode-id="2780" instrument_node="">: It's very easy to play Geralt this way; he can sleep with about twenty different women throughout the game, several of which </span><a class="twikilink" data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NominalImportance" title="/pmwiki/pmwiki.php/Main/NominalImportance"><span data-dcnode-id="2779" instrument_node="">don't even have names.</span></a></li><li data-dcnode-id="2772"><span data-dcnode-id="2776" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChasteHero" title="/pmwiki/pmwiki.php/Main/ChasteHero"><span data-dcnode-id="2775" instrument_node="">Chaste Hero</span></a><span data-dcnode-id="2773" instrument_node="">: Siegfried of Denesle, your main Order contact.</span></li><li data-dcnode-id="2759"><span data-dcnode-id="2771" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheChessmaster" title="/pmwiki/pmwiki.php/Main/TheChessmaster"><span data-dcnode-id="2770" instrument_node="">The Chessmaster</span></a><span data-dcnode-id="2768" instrument_node="">:</span><ul data-dcnode-id="2760"><li data-dcnode-id="2763"><span data-dcnode-id="2767" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2765" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2766" instrument_node="">Jacques de Aldersberg</span></span><span data-dcnode-id="2764" instrument_node="">.</span></li><li data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node=""> Quite a few chess 'enthusiasts' appear during the backroom politicking of Chapter 3; among them, Declan and Triss could be considered masters.</span></li></ul></li><li data-dcnode-id="2746"><span data-dcnode-id="2758" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChivalrousPervert" title="/pmwiki/pmwiki.php/Main/ChivalrousPervert"><span data-dcnode-id="2757" instrument_node="">Chivalrous Pervert</span></a><span data-dcnode-id="2755" instrument_node="">: Geralt treats his </span><em data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">many</span></em><span data-dcnode-id="2752" instrument_node=""> prospective flings in a gentlemanly way. There are exceptions though, </span><span class="spoiler" data-dcnode-id="2747" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2751" instrument_node="">You </span><em data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">can</span></em><span data-dcnode-id="2748" instrument_node=""> sleep with Abigail, and then leave her to burn at the stake, or betray a brothel run by female vampires after making love to them.</span></span></li><li data-dcnode-id="2741"><span data-dcnode-id="2745" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CloseCallHaircut" title="/pmwiki/pmwiki.php/Main/CloseCallHaircut"><span data-dcnode-id="2744" instrument_node="">Close-Call Haircut</span></a><span data-dcnode-id="2742" instrument_node="">: Done by Geralt to the Striga/Princess Adda in the opening cutscene.</span></li><li data-dcnode-id="2730"><span data-dcnode-id="2740" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClusterFBomb" title="/pmwiki/pmwiki.php/Main/ClusterFBomb"><span data-dcnode-id="2739" instrument_node="">Cluster F-Bomb</span></a><span data-dcnode-id="2737" instrument_node="">: People sure have colorful vocabularies for a fantasy game.</span><ul data-dcnode-id="2731"><li data-dcnode-id="2732"><span data-dcnode-id="2736" instrument_node=""> Most characters do not swear or use only mild profanities. And then there is </span><a class="twikilink" data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SirSwearsALot" title="/pmwiki/pmwiki.php/Main/SirSwearsALot"><span data-dcnode-id="2735" instrument_node="">Thaler</span></a><span data-dcnode-id="2733" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2717"><span data-dcnode-id="2729" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CollectionSidequest" title="/pmwiki/pmwiki.php/Main/CollectionSidequest"><span data-dcnode-id="2728" instrument_node="">Collection Sidequest</span></a><span data-dcnode-id="2726" instrument_node="">:</span><ul data-dcnode-id="2718"><li data-dcnode-id="2721"><span data-dcnode-id="2725" instrument_node=""> Killing and bringing back the heads of ten </span><a class="twikilink" data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="2724" instrument_node="">Bonus Boss</span></a><span data-dcnode-id="2722" instrument_node=""> monsters scattered throughout all five chapters will earn you one of the best witcher swords in the game (either steel or silver ones).</span></li><li data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node=""> A dentist in chapter three will pay you for bringing him the teeth of various monsters.</span></li></ul></li><li data-dcnode-id="2706"><span data-dcnode-id="2716" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheComputerIsACheatingBastard" title="/pmwiki/pmwiki.php/Main/TheComputerIsACheatingBastard"><span data-dcnode-id="2715" instrument_node="">The Computer Is a Cheating Bastard</span></a><span data-dcnode-id="2713" instrument_node="">: Dice Poker, in the initial version, was </span><a class="twikilink" data-dcnode-id="2711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialStupidity" title="/pmwiki/pmwiki.php/Main/ArtificialStupidity"><span data-dcnode-id="2712" instrument_node="">a cakewalk</span></a><span data-dcnode-id="2710" instrument_node="">, with the AI often rerolling excellent scores or not rerolling absolute stinkers. Patched, however, it's a nightmare. Specifically, the computer has a built-in advantage by always playing last, which means that it always knows exactly what it needs to get to beat you (and can thus decide how many and which dice to reroll to best accomplish that).</span><ul data-dcnode-id="2707"><li data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node=""> And with even a basic understanding of probability calculation, the number of times the AI beats you even when you have an advantage after the first throw (especially the higher difficulty opponents) seems not very believable.</span></li></ul></li><li data-dcnode-id="2698"><span data-dcnode-id="2705" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ConservationOfNinjutsu" title="/pmwiki/pmwiki.php/Main/ConservationOfNinjutsu"><span data-dcnode-id="2704" instrument_node="">Conservation of Ninjutsu</span></a><span data-dcnode-id="2702" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="2701" instrument_node="">The 'group' fighting-style</span></a><span data-dcnode-id="2699" instrument_node=""> is more effective when used against a group of enemies than a lone opponent, and by more effective, "It's easier to get multiple enemies into a range it can be used than it is to fight them one on one without it". Played straight somewhat by design, as the Group style carries an inherent critical chance that will be applied on every single opponent within range. Because of that, you can usually find yourself in a situation where one second you are surrounded by a large pack of mobs, the next all of them drop dead instantly from the critical strike that the style dealt out.</span></li><li data-dcnode-id="2684"><span data-dcnode-id="2697" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityNod" title="/pmwiki/pmwiki.php/Main/ContinuityNod"><span data-dcnode-id="2696" instrument_node="">Continuity Nod</span></a><span data-dcnode-id="2694" instrument_node="">:</span><ul data-dcnode-id="2685"><li data-dcnode-id="2688"><span data-dcnode-id="2693" instrument_node=""> The opening cutscene reenacts Geralt's first monster battle in </span><em data-dcnode-id="2690"><a class="twikilink" data-dcnode-id="2691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheLastWish" title="/pmwiki/pmwiki.php/Literature/TheLastWish"><span data-dcnode-id="2692" instrument_node="">The Last Wish</span></a></em><span data-dcnode-id="2689" instrument_node="">.</span></li><li data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node=""> The inkeeper in Act 4 will tell you an abridged version of the story of Ciri.</span></li></ul></li><li data-dcnode-id="2672"><span data-dcnode-id="2683" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityPorn" title="/pmwiki/pmwiki.php/Main/ContinuityPorn"><span data-dcnode-id="2682" instrument_node="">Continuity Porn</span></a><span data-dcnode-id="2680" instrument_node="">: More often and gratuitous than the standard porn, with many references to the novels thrown in for no other reason than to please the fans. On the other hand, the game is perfectly playable by those who don't know original material, and according to </span><img class="trivia1 rounded" data-dcnode-id="2679" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-trivia.png&amp;raw" title="This example contains a TRIVIA entry. It should be moved to the TRIVIA tab."><a class="twikilink" data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordOfGod" title="/pmwiki/pmwiki.php/Main/WordOfGod"><span data-dcnode-id="2678" instrument_node="">Word of God</span></a><span data-dcnode-id="2676" instrument_node="">, they are an </span><a class="twikilink" data-dcnode-id="2674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlternateUniverse" title="/pmwiki/pmwiki.php/Main/AlternateUniverse"><span data-dcnode-id="2675" instrument_node="">Alternate Universe</span></a><span data-dcnode-id="2673" instrument_node=""> sequel to the books with story input by Sapkowski.</span></li><li data-dcnode-id="2667"><span data-dcnode-id="2671" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContractualBossImmunity" title="/pmwiki/pmwiki.php/Main/ContractualBossImmunity"><span data-dcnode-id="2670" instrument_node="">Contractual Boss Immunity</span></a><span data-dcnode-id="2668" instrument_node="">: Averted. Most bosses can be stunned/knocked down and instakilled.</span></li><li data-dcnode-id="2656"><span data-dcnode-id="2666" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrapsackWorld" title="/pmwiki/pmwiki.php/Main/CrapsackWorld"><span data-dcnode-id="2665" instrument_node="">Crapsack World</span></a><span data-dcnode-id="2663" instrument_node="">: Absolutely. Essentially, the problem is that almost no one has the capacity for empathizing with people outside their social group... and a lot of peoples' social groups consist only of their own selves. As an illustration, consider this: many monsters in the Witcher world are created through human acts of evil. For instance, </span><a class="twikilink" data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManEatingPlant" title="/pmwiki/pmwiki.php/Main/ManEatingPlant"><span data-dcnode-id="2662" instrument_node="">echinopses</span></a><span data-dcnode-id="2660" instrument_node=""> grow in places where people were murdered, and </span><a class="twikilink" data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FishPeople" title="/pmwiki/pmwiki.php/Main/FishPeople"><span data-dcnode-id="2659" instrument_node="">drowners</span></a><span data-dcnode-id="2657" instrument_node=""> are the transfigured bodies of evil men whose bodies were thrown into the water. You will fight a LOT of drowners and echinopses in this game.</span></li><li data-dcnode-id="2651"><span data-dcnode-id="2655" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrazyPrepared" title="/pmwiki/pmwiki.php/Main/CrazyPrepared"><span data-dcnode-id="2654" instrument_node="">Crazy-Prepared</span></a><span data-dcnode-id="2652" instrument_node="">: A key component of the witcher profession, and encouraged through gameplay given the difficulty of combat, even on normal. With a large number of potions, oils, and bombs that are available through alchemy, Geralt is essentially handicapped if you're not making use of those items.</span></li><li data-dcnode-id="2639"><span data-dcnode-id="2650" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrystalDragonJesus" title="/pmwiki/pmwiki.php/Main/CrystalDragonJesus"><span data-dcnode-id="2649" instrument_node="">Crystal Dragon Jesus</span></a><span data-dcnode-id="2647" instrument_node="">: The Church of the </span><strike data-dcnode-id="2644"><a class="twikilink" data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Eberron" title="/pmwiki/pmwiki.php/TabletopGame/Eberron"><span data-dcnode-id="2646" instrument_node="">Silver</span></a></strike><span data-dcnode-id="2643" instrument_node=""> Eternal Flame, another goddess draws from the </span><a class="twikilink" data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheHecateSisters" title="/pmwiki/pmwiki.php/Main/TheHecateSisters"><span data-dcnode-id="2642" instrument_node="">The Hecate Sisters</span></a><span data-dcnode-id="2640" instrument_node="">. A prophet by the name Lebioda replaces Jesus in the Holy Grail legend.</span></li><li data-dcnode-id="2634"><span data-dcnode-id="2638" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CutscenePowerToTheMax" title="/pmwiki/pmwiki.php/Main/CutscenePowerToTheMax"><span data-dcnode-id="2637" instrument_node="">Cutscene Power to the Max</span></a><span data-dcnode-id="2635" instrument_node="">: While you can learn it early in the game, Geralt will parry the Professor's crossbow bolt in Chapter 3 even if you don't.</span></li><li data-dcnode-id="2629"><span data-dcnode-id="2633" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CuttingTheKnot" title="/pmwiki/pmwiki.php/Main/CuttingTheKnot"><span data-dcnode-id="2632" instrument_node="">Cutting the Knot</span></a><span data-dcnode-id="2630" instrument_node="">: One quest is to complete a potion that requires a virgin's tears. The quest giver recommends a brick maker (who is as far away from the quest giver as possible) who is rumored to be a virgin. You could go all the way over to the brick maker and verify the rumor... or you could just ask a nun in the temple less than a block away (or your Order contact if you sided with them).</span></li><li data-dcnode-id="2621"><span data-dcnode-id="2628" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadpanSnarker" title="/pmwiki/pmwiki.php/Main/DeadpanSnarker"><span data-dcnode-id="2627" instrument_node="">Deadpan Snarker</span></a><span data-dcnode-id="2625" instrument_node="">: Geralt would certainly qualify, as would several others. Sharp wit seems to be a coping mechanism for the </span><a class="twikilink" data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldHalfEmpty" title="/pmwiki/pmwiki.php/Main/WorldHalfEmpty"><span data-dcnode-id="2624" instrument_node="">world</span></a><span data-dcnode-id="2622" instrument_node=""> they live in.</span></li><li data-dcnode-id="2616"><span data-dcnode-id="2620" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DesperatelyLookingForAPurposeInLife" title="/pmwiki/pmwiki.php/Main/DesperatelyLookingForAPurposeInLife"><span data-dcnode-id="2619" instrument_node="">Desperately Looking for a Purpose in Life</span></a><span data-dcnode-id="2617" instrument_node="">: Witchers, which were formerly a necessity in the world, are now classed as obsolete. Geralt can ask questions of this effect at a few points.</span></li><li data-dcnode-id="2609"><span data-dcnode-id="2615" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DidYouJustPunchOutCthulhu" title="/pmwiki/pmwiki.php/Main/DidYouJustPunchOutCthulhu"><span data-dcnode-id="2614" instrument_node="">Did You Just Punch Out Cthulhu?</span></a><span data-dcnode-id="2612" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2610" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2611" instrument_node="">Dagon's close enough, although you don't beat him directly. The Beast from Chapter 1 is viewed as a punishment from the gods. The King of the Wild Hunt isn't the same kind of phenomenon, but is greatly feared as no one knows just how powerful he really is.</span></span></li><li data-dcnode-id="2604"><span data-dcnode-id="2608" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DigitalBikini" title="/pmwiki/pmwiki.php/Main/DigitalBikini"><span data-dcnode-id="2607" instrument_node="">Digital Bikini</span></a><span data-dcnode-id="2605" instrument_node="">: The initial US release removed all the explicit nudity. It was later restored as free DLC.</span></li><li data-dcnode-id="2594"><span data-dcnode-id="2603" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDragon" title="/pmwiki/pmwiki.php/Main/TheDragon"><span data-dcnode-id="2602" instrument_node="">The Dragon</span></a><span data-dcnode-id="2600" instrument_node="">: The Professor acts as one for the mage Azar Javed. </span><span class="spoiler" data-dcnode-id="2595" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2599" instrument_node="">Azar Javed himself is actually just The Dragon to the REAL </span><a class="twikilink" data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="2598" instrument_node="">Big Bad</span></a><span data-dcnode-id="2596" instrument_node="">.</span></span></li><li data-dcnode-id="2584"><span data-dcnode-id="2593" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerBeginning" title="/pmwiki/pmwiki.php/Main/DownerBeginning"><span data-dcnode-id="2592" instrument_node="">Downer Beginning</span></a><span data-dcnode-id="2590" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBadGuysWin" title="/pmwiki/pmwiki.php/Main/TheBadGuysWin"><span data-dcnode-id="2589" instrument_node="">The bandits win</span></a><span data-dcnode-id="2587" instrument_node=""> - they get what they want (witchers's mutagens and instructions to them), kill Leo, the last witcher apprentice, and manage to escape. </span><a class="twikilink" data-dcnode-id="2585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouCantThwartStageOne" title="/pmwiki/pmwiki.php/Main/YouCantThwartStageOne"><span data-dcnode-id="2586" instrument_node="">Fortunately, it's only the beginning.</span></a></li><li data-dcnode-id="2576"><span data-dcnode-id="2583" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DualWielding" title="/pmwiki/pmwiki.php/Main/DualWielding"><span data-dcnode-id="2582" instrument_node="">Dual Wielding</span></a><span data-dcnode-id="2580" instrument_node="">: While Geralt normally uses only one sword at a time, the </span><a class="twikilink" data-dcnode-id="2578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChargedAttack" title="/pmwiki/pmwiki.php/Main/ChargedAttack"><span data-dcnode-id="2579" instrument_node="">Charged Attack</span></a><span data-dcnode-id="2577" instrument_node=""> for the Group Steel Style has Geralt taking a sword in each hand and carving through anyone who gets too close.</span></li><li data-dcnode-id="2555"><span data-dcnode-id="2575" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarlyInstallmentWeirdness" title="/pmwiki/pmwiki.php/Main/EarlyInstallmentWeirdness"><span data-dcnode-id="2574" instrument_node="">Early Installment Weirdness</span></a><span data-dcnode-id="2572" instrument_node="">:</span><ul data-dcnode-id="2556"><li data-dcnode-id="2564"><span data-dcnode-id="2571" instrument_node=""> While still a pretty great game, the rookie mistakes of the by then newly funded CD Project are clearly visible in the game's storyline. Many characters are just </span><a class="twikilink" data-dcnode-id="2569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Expies" title="/pmwiki/pmwiki.php/Main/Expies"><span data-dcnode-id="2570" instrument_node="">Expies</span></a><span data-dcnode-id="2568" instrument_node=""> or </span><a class="twikilink" data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuspiciouslySimilarSubstitutes" title="/pmwiki/pmwiki.php/Main/SuspiciouslySimilarSubstitutes"><span data-dcnode-id="2567" instrument_node="">Suspiciously Similar Substitutes</span></a><span data-dcnode-id="2565" instrument_node=""> for book characters (Azar Javed for Vilgefortz, Alvin for Ciri, Triss' characterization resembles Yennefer's etc) and the storyline revisits almost every part of the books, while at the same time, they almost never talk about anything that happened before. The sequels gradually form their own compelling storyline, create independent characters and resolve old plotlines from the books.</span></li><li data-dcnode-id="2559"><span data-dcnode-id="2563" instrument_node=""> A more minor example would be the quest journal and character glossary. In the first game, both are written from Geralt's point of view, and are appropriately factual and dry. The next two games changed it so that Dandelion wrote them based on what Geralt told him some time after the fact. As such, </span><a class="twikilink" data-dcnode-id="2561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LemonyNarrator" title="/pmwiki/pmwiki.php/Main/LemonyNarrator"><span data-dcnode-id="2562" instrument_node="">they tend to be laced with his biases and sense of humor</span></a><span data-dcnode-id="2560" instrument_node="">.</span></li><li data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node=""> The combat system is a bizarre mixture of classic CRPG combat and a rhythm game, in contrast to the more straightforward action RPG combat of the two sequels.</span></li></ul></li><li data-dcnode-id="2550"><span data-dcnode-id="2554" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarnYourHappyEnding" title="/pmwiki/pmwiki.php/Main/EarnYourHappyEnding"><span data-dcnode-id="2553" instrument_node="">Earn Your Happy Ending</span></a><span data-dcnode-id="2551" instrument_node="">: There aren't many choices you can make in this game that seem to have an unambiguously good outcome, at least from Geralt's perspective. Those that are, however, are always choices that require you to intentionally take a harder path: for instance, saving Princess Adda requires you to fight her and keep her busy for all of an in-game night without killing her.</span></li><li data-dcnode-id="2545"><span data-dcnode-id="2549" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Expy" title="/pmwiki/pmwiki.php/Main/Expy"><span data-dcnode-id="2548" instrument_node="">Expy</span></a><span data-dcnode-id="2546" instrument_node="">: Azar Javed from the game is a thinly veiled Expy of Rience, henchman of Vilgefortz from the books. Their backstory is pretty much identical — both went to the same school of magic and were kicked out for their shady dealings. Same goes for Professor (Magister in the Polish version) — his behaviour and speech patterns make him a shout out to a minor villain from the saga, and in the English version he ended up with an identical nickname.</span></li><li data-dcnode-id="2534"><span data-dcnode-id="2544" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FactionSpecificEndings" title="/pmwiki/pmwiki.php/Main/FactionSpecificEndings"><span data-dcnode-id="2543" instrument_node="">Faction-Specific Endings</span></a><span data-dcnode-id="2541" instrument_node="">: The game has the </span><a class="twikilink" data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnightTemplar" title="/pmwiki/pmwiki.php/Main/KnightTemplar"><span data-dcnode-id="2540" instrument_node="">Order of the Flaming Rose</span></a><span data-dcnode-id="2538" instrument_node=""> ending, the </span><a class="twikilink" data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaResistance" title="/pmwiki/pmwiki.php/Main/LaResistance"><span data-dcnode-id="2537" instrument_node="">Scoia'tael</span></a><span data-dcnode-id="2535" instrument_node=""> ending, and the neutral/lone wolf ending.</span></li><li data-dcnode-id="2526"><span data-dcnode-id="2533" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FanDisservice" title="/pmwiki/pmwiki.php/Main/FanDisservice"><span data-dcnode-id="2532" instrument_node="">Fan Disservice</span></a><span data-dcnode-id="2530" instrument_node="">: We have the fetching Triss Merigold, we have sexual trysts galore memorialized with "romance cards" with some </span><a class="twikilink" data-dcnode-id="2528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReadyForLovemaking" title="/pmwiki/pmwiki.php/Main/ReadyForLovemaking"><span data-dcnode-id="2529" instrument_node="">quite interesting</span></a><span data-dcnode-id="2527" instrument_node=""> images on them, we have Dryads and Nymphs and Ladies of The Lake who have no need for clothing, we have Alps and Bruxas which are quite shapeley fem-monsters... and then we have the Devourers, which will be making you thumb through the Journal's Characters page for those romance cards to use as brain bleach.</span></li><li data-dcnode-id="2521"><span data-dcnode-id="2525" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Fanservice" title="/pmwiki/pmwiki.php/Main/Fanservice"><span data-dcnode-id="2524" instrument_node="">Fanservice</span></a><span data-dcnode-id="2522" instrument_node="">: There are lots of women that Geralt can sleep with, and doing so gets him a card featuring a painting of said girl in a very sexy pose and dress (when she's dressed in anything, that is).</span></li><li data-dcnode-id="2516"><span data-dcnode-id="2520" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticRacism" title="/pmwiki/pmwiki.php/Main/FantasticRacism"><span data-dcnode-id="2519" instrument_node="">Fantastic Racism</span></a><span data-dcnode-id="2517" instrument_node="">: By just about all the races towards each other.</span></li><li data-dcnode-id="2511"><span data-dcnode-id="2515" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyKitchenSink" title="/pmwiki/pmwiki.php/Main/FantasyKitchenSink"><span data-dcnode-id="2514" instrument_node="">Fantasy Kitchen Sink</span></a><span data-dcnode-id="2512" instrument_node="">: Many monsters, prophecies, and side quests are based on fairy tales or mythology.</span></li><li data-dcnode-id="2474"><span data-dcnode-id="2510" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Foreshadowing" title="/pmwiki/pmwiki.php/Main/Foreshadowing"><span data-dcnode-id="2509" instrument_node="">Foreshadowing</span></a><span data-dcnode-id="2507" instrument_node="">:</span><ul data-dcnode-id="2475"><li data-dcnode-id="2499"><span data-dcnode-id="2506" instrument_node=""> Early in the game, </span><span class="spoiler" data-dcnode-id="2504" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2505" instrument_node="">Vincent</span></span><span data-dcnode-id="2503" instrument_node=""> makes a cryptic comment </span><span class="spoiler" data-dcnode-id="2501" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2502" instrument_node="">about the moon. Later in the game, it turns out he is a werewolf</span></span><span data-dcnode-id="2500" instrument_node="">.</span></li><li data-dcnode-id="2487"><span data-dcnode-id="2498" instrument_node=""> Also the </span><span class="spoiler" data-dcnode-id="2496" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2497" instrument_node="">Salamander</span></span><span data-dcnode-id="2495" instrument_node=""> itself. It is also a mythical creature commonly </span><span class="spoiler" data-dcnode-id="2493" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2494" instrument_node="">associated with fire. Can you think of any other organization with a name consisting of a reference to fire?</span></span><span data-dcnode-id="2492" instrument_node="">. Possibly doubles as </span><img class="ymmv1 rounded" data-dcnode-id="2491" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FridgeBrilliance" title="/pmwiki/pmwiki.php/Main/FridgeBrilliance"><span data-dcnode-id="2490" instrument_node="">Fridge Brilliance</span></a><span data-dcnode-id="2488" instrument_node="">.</span></li><li data-dcnode-id="2483"><span data-dcnode-id="2486" instrument_node=""> Likewise, in the first chapter, the priest agrees to help you to some degree because there is apparently a passage in his scriptures that describes you and the current situation almost exactly, and suggests a course of action. </span><span class="spoiler" data-dcnode-id="2484" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2485" instrument_node="">After finishing the game, think about who's in charge of the church at the time, and how and why that passage would exist.</span></span></li><li data-dcnode-id="2476"><span data-dcnode-id="2482" instrument_node=""> There's some foreshadowing of the </span><a class="twikilink" data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterfaceSpoiler" title="/pmwiki/pmwiki.php/Main/InterfaceSpoiler"><span data-dcnode-id="2481" instrument_node="">Interface Spoiler</span></a><span data-dcnode-id="2479" instrument_node=""> variety early in Chapter 2. </span><span class="spoiler" data-dcnode-id="2477" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2478" instrument_node="">Did you notice your monster-detecting medallion going berserk when you're in Raymond Maarloeve's house?</span></span></li></ul></li><li data-dcnode-id="2463"><span data-dcnode-id="2473" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FixFic" title="/pmwiki/pmwiki.php/Main/FixFic"><span data-dcnode-id="2472" instrument_node="">Fix Fic</span></a><span data-dcnode-id="2470" instrument_node="">: The game series effectively serves as an officially licensed one by undoing the </span><a class="twikilink" data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GainaxEnding" title="/pmwiki/pmwiki.php/Main/GainaxEnding"><span data-dcnode-id="2469" instrument_node="">Gainax Ending</span></a><span data-dcnode-id="2467" instrument_node=""> of the saga and bringing Geralt </span><a class="twikilink" data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BackFromTheDead" title="/pmwiki/pmwiki.php/Main/BackFromTheDead"><span data-dcnode-id="2466" instrument_node="">Back from the Dead</span></a><span data-dcnode-id="2464" instrument_node="">.</span></li><li data-dcnode-id="2455"><span data-dcnode-id="2462" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForgedLetter" title="/pmwiki/pmwiki.php/Main/ForgedLetter"><span data-dcnode-id="2461" instrument_node="">Forged Letter</span></a><span data-dcnode-id="2459" instrument_node="">: A major plot point in chapter 3, where Thaler suspects that someone is forging the absent King Foltest's letters. </span><span class="spoiler" data-dcnode-id="2457" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2458" instrument_node="">He is right</span></span><span data-dcnode-id="2456" instrument_node="">.</span></li><li data-dcnode-id="2447"><span data-dcnode-id="2454" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Feelies" title="/pmwiki/pmwiki.php/Main/Feelies"><span data-dcnode-id="2453" instrument_node="">Feelies</span></a><span data-dcnode-id="2451" instrument_node="">: Various editions in various countries came with </span><em data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">a lot</span></em><span data-dcnode-id="2448" instrument_node="">.</span></li><li data-dcnode-id="2439"><span data-dcnode-id="2446" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FullFrontalAssault" title="/pmwiki/pmwiki.php/Main/FullFrontalAssault"><span data-dcnode-id="2445" instrument_node="">Full-Frontal Assault</span></a><span data-dcnode-id="2443" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurVampiresAreDifferent" title="/pmwiki/pmwiki.php/Main/OurVampiresAreDifferent"><span data-dcnode-id="2442" instrument_node="">Bruxa</span></a><span data-dcnode-id="2440" instrument_node=""> wear no clothes when they fight you. Neither do the hag-like devourers, though unlike the former, they just seem to be animalistic creatures.</span></li><li data-dcnode-id="2432"><span data-dcnode-id="2438" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GainaxEnding" title="/pmwiki/pmwiki.php/Main/GainaxEnding"><span data-dcnode-id="2437" instrument_node="">Gainax Ending</span></a><span data-dcnode-id="2435" instrument_node="">: The Epilogue takes place in </span><span class="spoiler" data-dcnode-id="2433" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2434" instrument_node="">a vision of the distant future created by the Grand Master of the Flaming Rose, who is conjuring apparitions of people Geralt met while rambling only somewhat coherently about philosophy in the middle of an arctic wasteland inhabited by monstrous distant descendants of the human race. And there are enough facts to make it very plausible that he really is an older Alvin who traveled back in time, though none of the characters directly says or implies it.</span></span></li><li data-dcnode-id="2422"><span data-dcnode-id="2431" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GeniusBruiser" title="/pmwiki/pmwiki.php/Main/GeniusBruiser"><span data-dcnode-id="2430" instrument_node="">Genius Bruiser</span></a><span data-dcnode-id="2428" instrument_node="">: Azar Javed. The villain who spends the whole game using magic fights </span><span class="spoiler" data-dcnode-id="2423" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2427" instrument_node="">his final battle by </span><a class="twikilink" data-dcnode-id="2425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DualWielding" title="/pmwiki/pmwiki.php/Main/DualWielding"><span data-dcnode-id="2426" instrument_node="">Dual Wielding</span></a><span data-dcnode-id="2424" instrument_node=""> giant flaming maces.</span></span></li><li data-dcnode-id="2411"><span data-dcnode-id="2421" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenreRoulette" title="/pmwiki/pmwiki.php/Main/GenreRoulette"><span data-dcnode-id="2420" instrument_node="">Genre Roulette</span></a><span data-dcnode-id="2418" instrument_node="">: </span><em data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">The Witcher: Music Inspired by the Game</span></em><span data-dcnode-id="2415" instrument_node="">, one of two soundtracks packaged with the Enhanced Edition. The songs cycle between folk music, pop, and </span><a class="twikilink" data-dcnode-id="2413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeavyMithril" title="/pmwiki/pmwiki.php/Main/HeavyMithril"><span data-dcnode-id="2414" instrument_node="">Heavy Mithril</span></a><span data-dcnode-id="2412" instrument_node="">.</span></li><li data-dcnode-id="2406"><span data-dcnode-id="2410" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenreSavvy" title="/pmwiki/pmwiki.php/Main/GenreSavvy"><span data-dcnode-id="2409" instrument_node="">Genre Savvy</span></a><span data-dcnode-id="2407" instrument_node="">: Geralt is well aware of "traditional" endings to common fantasy stories, and sarcastically brings them up constantly. He also sees through the excuses and lectures of the bad guys and tries to cut straight to the chase several times.</span></li><li data-dcnode-id="2399"><span data-dcnode-id="2405" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiantEnemyCrab" title="/pmwiki/pmwiki.php/Main/GiantEnemyCrab"><span data-dcnode-id="2404" instrument_node="">Giant Enemy Crab</span></a><span data-dcnode-id="2402" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2400" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2401" instrument_node="">The Koshchey.</span></span></li><li data-dcnode-id="2391"><span data-dcnode-id="2398" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiveMeYourInventoryItem" title="/pmwiki/pmwiki.php/Main/GiveMeYourInventoryItem"><span data-dcnode-id="2397" instrument_node="">Give Me Your Inventory Item</span></a><span data-dcnode-id="2395" instrument_node="">: A few NPCs will give you a reward for giving them potions that only you can make.</span><ul data-dcnode-id="2392"><li data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node=""> Or, in one case, bread.</span></li></ul></li><li data-dcnode-id="2386"><span data-dcnode-id="2390" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoWaitOutside" title="/pmwiki/pmwiki.php/Main/GoWaitOutside"><span data-dcnode-id="2389" instrument_node="">Go Wait Outside</span></a><span data-dcnode-id="2387" instrument_node="">: Played dead straight. Any time you are asked to "come back tomorrow", all you need to do to speed things up is just leave and re-enter the area.</span></li><li data-dcnode-id="2381"><span data-dcnode-id="2385" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreaterScopeVillain" title="/pmwiki/pmwiki.php/Main/GreaterScopeVillain"><span data-dcnode-id="2384" instrument_node="">Greater-Scope Villain</span></a><span data-dcnode-id="2382" instrument_node="">: The King of the Wild Hunt. He has barely any affiliation with Salamandra, but he constantly stalks Geralt throughout the game and alludes to having a greater plan in mind for the witcher. That plan is only ever learned about in the sequels.</span></li><li data-dcnode-id="2373"><span data-dcnode-id="2380" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreenSkinnedSpaceBabe" title="/pmwiki/pmwiki.php/Main/GreenSkinnedSpaceBabe"><span data-dcnode-id="2379" instrument_node="">Green-Skinned Space Babe</span></a><span data-dcnode-id="2377" instrument_node="">: Not from space, but a green-skinned non-human, with an alien culture that gives opportunity for an adult variation of </span><a class="twikilink" data-dcnode-id="2375" href="ht
