</span><div class="article-content retro-folders" data-dcnode-id="1321" id="main-article"><span data-dcnode-id="5199" instrument_node="">
</span><p data-dcnode-id="5198"></p><div class="quoteright" data-dcnode-id="5195" style="width:350px;"><div class="lazy_load_img_box" data-dcnode-id="5196" style="padding-top:46.57%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/nitw.jpg" border="0" class="embeddedimage" data-dcnode-id="5197" height="163" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/nitw.jpg&amp;raw" width="350"></div></div><div class="acaptionright" data-dcnode-id="5192" style="width:350px;"><a class="twikilink" data-dcnode-id="5193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Tagline" title="/pmwiki/pmwiki.php/Main/Tagline"><span data-dcnode-id="5194" instrument_node="">At the end of everything, hold onto anything.</span></a></div><p data-dcnode-id="5191"></p><div class="indent" data-dcnode-id="5181"><em data-dcnode-id="5189"><span data-dcnode-id="5190" instrument_node="">"Everything sucks forever."</span></em><div class="indent" data-dcnode-id="5182"><span data-dcnode-id="5188" instrument_node="">—</span><strong data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">Mae</span></strong><span data-dcnode-id="5185" instrument_node=""> to Gregg, </span><a class="twikilink" data-dcnode-id="5183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MissingTrailerScene" title="/pmwiki/pmwiki.php/Main/MissingTrailerScene"><span data-dcnode-id="5184" instrument_node="">from the trailer</span></a></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="5175"><span class="ad-caption" data-dcnode-id="5179"><span data-dcnode-id="5180" instrument_node="">Advertisement:</span></span><div data-dcnode-id="5176" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="5162"><em data-dcnode-id="5173"><span data-dcnode-id="5174" instrument_node="">Night in the Woods</span></em><span data-dcnode-id="5172" instrument_node=""> is an </span><a class="twikilink" data-dcnode-id="5170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdventureGame" title="/pmwiki/pmwiki.php/Main/AdventureGame"><span data-dcnode-id="5171" instrument_node="">adventure</span></a><span data-dcnode-id="5169" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlatformGame" title="/pmwiki/pmwiki.php/Main/PlatformGame"><span data-dcnode-id="5168" instrument_node="">platformer</span></a><span data-dcnode-id="5166" instrument_node=""> developed by Infinite Fall and published by Finji. The player controls </span><a class="twikilink" data-dcnode-id="5164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerCharacter" title="/pmwiki/pmwiki.php/Main/PlayerCharacter"><span data-dcnode-id="5165" instrument_node="">Mae</span></a><span data-dcnode-id="5163" instrument_node="">, a recent college dropout, who has returned to her hometown, the sleepy mining town of Possum Springs. There, she struggles with the changes to her home and her former friends - Bea, Gregg, Angus, and Germ. As Mae struggles with finding her own identity and coping with the massive changes in her life, she begins to have odd dreams with ominous messages, and discovers hints of some mysterious force living out in the woods of her community.</span></p><p data-dcnode-id="5138"><span data-dcnode-id="5161" instrument_node="">Notable for reaching its </span><a class="urllink" data-dcnode-id="5158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickstarter.com/projects/1307515311/night-in-the-woods/"><span data-dcnode-id="5160" instrument_node="">Kickstarter</span><img data-dcnode-id="5159" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5157" instrument_node=""> goal in just over a day. </span><a class="urllink" data-dcnode-id="5154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nightinthewoods.com/"><span data-dcnode-id="5156" instrument_node="">The official website can be found here.</span><img data-dcnode-id="5155" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5153" instrument_node=""> In December 2013, a companion game titled </span><em data-dcnode-id="5149"><a class="urllink" data-dcnode-id="5150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//finji.itch.io/longest-night"><span data-dcnode-id="5152" instrument_node="">Longest Night</span><img data-dcnode-id="5151" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="5148" instrument_node=""> was released. In December 2014, a second supplemental game, </span><em data-dcnode-id="5144"><a class="urllink" data-dcnode-id="5145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//finji.itch.io/lost-constellation"><span data-dcnode-id="5147" instrument_node="">Lost Constellation,</span><img data-dcnode-id="5146" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="5143" instrument_node=""> was made available as well. The game was released on February 21, 2017, and a release on the Xbox One with both supplemental games on December 13th. On that same date, the PC version as well as the Xbox One version received a free update called </span><a class="urllink" data-dcnode-id="5140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vimeo.com/240361764"><span data-dcnode-id="5142" instrument_node="">"Weird Autumn Edition"</span><img data-dcnode-id="5141" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5139" instrument_node=""> that added in numerous scrapped scenes and occurrences. This same update was available for the PS4 in January 2018. The game was also released for Nintendo Switch in February 2018, and for iOS in September 2021.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="5132"><span class="ad-caption" data-dcnode-id="5136"><span data-dcnode-id="5137" instrument_node="">Advertisement:</span></span><div data-dcnode-id="5133" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="5120"><a class="urllink" data-dcnode-id="5129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DeEErDK1FJtI"><span data-dcnode-id="5131" instrument_node="">Announcement Trailer</span><img data-dcnode-id="5130" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5128" instrument_node="">, </span><a class="urllink" data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Du17kM8oSz3k"><span data-dcnode-id="5127" instrument_node="">Release Trailer</span><img data-dcnode-id="5126" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5124" instrument_node="">, </span><a class="urllink" data-dcnode-id="5121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vimeo.com/240361764"><span data-dcnode-id="5123" instrument_node="">Weird Autumn Edition Trailer</span><img data-dcnode-id="5122" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></p><p data-dcnode-id="5119"></p><hr data-dcnode-id="5118"><h2 data-dcnode-id="5113"><span data-dcnode-id="5117" instrument_node=""> </span><em data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">Night in the Woods</span></em><span data-dcnode-id="5114" instrument_node=""> provides examples of:</span></h2><p data-dcnode-id="5112"></p><div class="folderlabel toggle-all-folders-button" data-dcnode-id="5110" onclick="toggleAllFolders();"><span data-dcnode-id="5111" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><p data-dcnode-id="5109"></p><div class="folderlabel" data-dcnode-id="5107" onclick="togglefolder('folder0');"><span data-dcnode-id="5108" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;A-E&nbsp;</span></div><div class="folder" data-dcnode-id="4052" id="folder0" isfolder="true" style="display:block;"><ul data-dcnode-id="4053"><li data-dcnode-id="5097"><span data-dcnode-id="5106" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbandonedMine" title="/pmwiki/pmwiki.php/Main/AbandonedMine"><span data-dcnode-id="5105" instrument_node="">Abandoned Mine</span></a><span data-dcnode-id="5103" instrument_node="">:</span><ul data-dcnode-id="5098"><li data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node=""> Whatever's in the woods, it's just behind the shuttered mines.</span></li><li data-dcnode-id="5099"><span data-dcnode-id="5100" instrument_node=""> The mines cast a long shadow over the whole town. Decades back they provided for the town and made it prosperous, but were also a cause of a lot of deaths and some terrible working conditions.</span></li></ul></li><li data-dcnode-id="5089"><span data-dcnode-id="5096" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AccidentalMurder" title="/pmwiki/pmwiki.php/Main/AccidentalMurder"><span data-dcnode-id="5095" instrument_node="">Accidental Murder</span></a><span data-dcnode-id="5093" instrument_node="">: Bea brings up at the end that </span><span class="spoiler" data-dcnode-id="5091" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5092" instrument_node="">she and the others due to causing a cave-in have potentially left a dozen people to starve in the dark. Even Gregg is shaken up by this, but Angus says if given a choice he would have done it again. This leads to everyone staring at him in surprise</span></span><span data-dcnode-id="5090" instrument_node="">.</span></li><li data-dcnode-id="5081"><span data-dcnode-id="5088" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Acrofatic" title="/pmwiki/pmwiki.php/Main/Acrofatic"><span data-dcnode-id="5087" instrument_node="">Acrofatic</span></a><span data-dcnode-id="5085" instrument_node="">: Hard as it is to tell from the art style, Mae is indeed supposed to be quite overweight, as stated in her dialogue, and sprite's general roundness, and she just spent the last year mostly eating pizza, and not moving. This doesn't stop her at all from running around, making high jumps, and balancing on insulated power cables. Then again, she </span><em data-dcnode-id="5083"><span data-dcnode-id="5084" instrument_node="">is</span></em><span data-dcnode-id="5082" instrument_node=""> a cat.</span></li><li data-dcnode-id="5019"><span data-dcnode-id="5080" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdultFear" title="/pmwiki/pmwiki.php/Main/AdultFear"><span data-dcnode-id="5079" instrument_node="">Adult Fear</span></a><span data-dcnode-id="5077" instrument_node="">: This could be called "Adult Fear: The Game" with how often it plays at grown-up concerns and worries.</span><ul data-dcnode-id="5020"><li data-dcnode-id="5067"><span data-dcnode-id="5076" instrument_node=""> The game </span><em data-dcnode-id="5074"><span data-dcnode-id="5075" instrument_node="">starts</span></em><span data-dcnode-id="5073" instrument_node=""> with Mae walking home through the woods because her parents didn't know she was coming home that day. Mae is a tiny 20 year old "naive" girl in her aunt's words, who wanders through the dark and </span><a class="twikilink" data-dcnode-id="5071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooDumbToLive" title="/pmwiki/pmwiki.php/Main/TooDumbToLive"><span data-dcnode-id="5072" instrument_node="">jumps on power lines</span></a><span data-dcnode-id="5070" instrument_node="">. Aunt Molly, who is a local cop, finds Mae, chews her out for being reckless, and takes her home. Mae's dad feels really guilty when she tells him that he forgot the day she was coming home. </span><span class="spoiler" data-dcnode-id="5068" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5069" instrument_node="">It gets worse when you find out a cult has been kidnapping people who wouldn't be missed, and Mae was a sitting duck. If not for her aunt, she would probably be sacrificed by the cult.</span></span></li><li data-dcnode-id="5060"><span data-dcnode-id="5066" instrument_node=""> There is also Mae dropping out of college, having to go home, and now wondering what she will do with her life without an education or hope. In addition, Mae has </span><span class="spoiler" data-dcnode-id="5061" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5065" instrument_node="">an undiagnosed and untreated mental illness that could possibly be a dissociative disorder. It's not clear, though, and it's best not to presume. You would expect that Mae would be able to find therapy, cognitive behavioral methods, or medication, but all her doctor gives her is a </span><em data-dcnode-id="5063"><span data-dcnode-id="5064" instrument_node="">journal</span></em><span data-dcnode-id="5062" instrument_node=""> as a form of treatment. Not in addition to other methods, just "keep a journal" and that's all. At college, Mae was still unable to find better resources and dropped out.</span></span></li><li data-dcnode-id="5052"><span data-dcnode-id="5059" instrument_node=""> The town of Possum Springs is on the verge of going belly up due to the closure of the mines and factories in the area. The only thing keeping the town going is the local </span><a class="twikilink" data-dcnode-id="5057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FictionalCounterpart" title="/pmwiki/pmwiki.php/Main/FictionalCounterpart"><span data-dcnode-id="5058" instrument_node="">Ham Panther</span></a><span data-dcnode-id="5056" instrument_node="">, (possibly) the highway access to the nearby parks, </span><span class="spoiler" data-dcnode-id="5054" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5055" instrument_node=""> and a cult of townsfolk who are appeasing an elder god to keep the town prosperous. And even that's pretty ambiguous</span></span><span data-dcnode-id="5053" instrument_node="">.</span></li><li data-dcnode-id="5050"><span data-dcnode-id="5051" instrument_node=""> Mae's parents are concerned about losing the house to the bank after taking out a mortgage to pay for Mae's tuition. Mae also feels really guilty about this, knowing the sacrifices they made.</span></li><li data-dcnode-id="5046"><span data-dcnode-id="5049" instrument_node=""> Bea is constantly surly and resentful because she has been forced to act as de facto manager to the family hardware store after losing her mother to cancer and her father's subsequent meltdown. </span><span class="spoiler" data-dcnode-id="5047" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5048" instrument_node=""> Her father even warns her of potential sexual assault from one of their staff, but they can't fire him because he's their best repairman and losing him would be a major blow to their business.</span></span></li><li data-dcnode-id="5041"><span data-dcnode-id="5045" instrument_node=""> Pastor Karen is fighting furiously against the town council to start a program to help get the homeless off the street. </span><span class="spoiler" data-dcnode-id="5043" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5044" instrument_node="">She ultimately does not succeed</span></span><span data-dcnode-id="5042" instrument_node="">.</span></li><li data-dcnode-id="5037"><span data-dcnode-id="5040" instrument_node=""> Casey, a young adult friend of the gang's, has been missing for nearly a year, with his parents and friends concerned for his safety. </span><span class="spoiler" data-dcnode-id="5038" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5039" instrument_node=""> Sadly, he wasn't that far away, being one of many sacrifices that "nobody will miss".</span></span></li><li data-dcnode-id="5035"><span data-dcnode-id="5036" instrument_node=""> Mae's constant nightmares begin taking their toll on her mental health, and everyone can tell.</span></li><li data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node=""> Even the background characters deal with adult fears. A pair of Smelters fans grow distant as one of them reveals he plans to move out of town, a coworker convinces a woman to stay at a job she hates because it might pay better than going to work elsewhere, etc.</span></li><li data-dcnode-id="5028"><span data-dcnode-id="5032" instrument_node=""> In the climax, when Mae convinces her friends to find the ghost, </span><span class="spoiler" data-dcnode-id="5030" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5031" instrument_node="">she ends up with a serious head injury. Her aunt finds her and brings her home, but Mae's parents are worried sick when she wakes up and wanders to her friends' place. In the epilogue, Mae agrees with her mother to set ground rules since she nearly died</span></span><span data-dcnode-id="5029" instrument_node="">.</span></li><li data-dcnode-id="5026"><span data-dcnode-id="5027" instrument_node=""> During one of the hangout sessions with Germ, he'll recount a pretty chilling story of being followed on his way home by one of the transients he met, where he had to hide in a tree to wait for the man to go away and then make a run for it.</span></li><li data-dcnode-id="5021"><span data-dcnode-id="5025" instrument_node=""> The whole group nearly </span><span class="spoiler" data-dcnode-id="5023" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5024" instrument_node=""> gets buried alive inside a collapsed mine</span></span><span data-dcnode-id="5022" instrument_node=""> with nobody knowing where they are.</span></li></ul></li><li data-dcnode-id="5003"><span data-dcnode-id="5018" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnAesop" title="/pmwiki/pmwiki.php/Main/AnAesop"><span data-dcnode-id="5017" instrument_node="">An Aesop</span></a><span data-dcnode-id="5015" instrument_node="">:</span><ul data-dcnode-id="5004"><li data-dcnode-id="5010"><span data-dcnode-id="5014" instrument_node=""> Everything is going to come to an end at some point. However, being emotional about it isn't a bad thing; as long as you have something to hold onto at the end, there is a reason to be hopeful and know your life isn't pointless. It's okay to be frustrated and sad that something is gone, but there is </span><strong data-dcnode-id="5012"><span data-dcnode-id="5013" instrument_node="">always</span></strong><span data-dcnode-id="5011" instrument_node=""> a reason to keep going and move forward.</span></li><li data-dcnode-id="5005"><span data-dcnode-id="5009" instrument_node=""> Mental health is vastly misunderstood, and the services that come with therapy are scarce in rural areas. Mae mentions that </span><span class="spoiler" data-dcnode-id="5007" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5008" instrument_node="">with her breakdown, Dr. Hank's advice that she keep a journal is utterly useless to help with her disassociation. College was just as bad, where she found no resources and dropped out so as not to lose touch with reality</span></span><span data-dcnode-id="5006" instrument_node="">.</span></li></ul></li><li data-dcnode-id="4993"><span data-dcnode-id="5002" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AffablyEvil" title="/pmwiki/pmwiki.php/Main/AffablyEvil"><span data-dcnode-id="5001" instrument_node="">Affably Evil</span></a><span data-dcnode-id="4999" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4994" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4998" instrument_node="">The cultists who have been kidnapping and sacrificing vagrants and criminals to the Black Goat. They clearly don't enjoy the acts they are committing and have no plans to hurt Mae and the others even if they choose not to join the cult. They were even very apologetic for almost shooting Mae and most of them held nothing against Gregg for shooting one of them with an arrow (victim of said shooting being the sole exception, but that's to be expected). And everything the cult does, they do for the sake of the town. Shame it involves sacrificing those they consider the garbage of society to an </span><a class="twikilink" data-dcnode-id="4996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="4997" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="4995" instrument_node=""> that might not even be real.</span></span></li><li data-dcnode-id="4981"><span data-dcnode-id="4992" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AffectionateNickname" title="/pmwiki/pmwiki.php/Main/AffectionateNickname"><span data-dcnode-id="4991" instrument_node="">Affectionate Nickname</span></a><span data-dcnode-id="4989" instrument_node="">:</span><ul data-dcnode-id="4982"><li data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node=""> Mae's dad calls her "kitten". She responds well to it.</span></li><li data-dcnode-id="4985"><span data-dcnode-id="4986" instrument_node=""> Gregg refers to Angus as "cap'n," and Angus in turn calls Gregg "bug."</span></li><li data-dcnode-id="4983"><span data-dcnode-id="4984" instrument_node=""> Before their falling out, Bea used to call Mae "MaeDay".</span></li></ul></li><li data-dcnode-id="4968"><span data-dcnode-id="4980" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlienGeometries" title="/pmwiki/pmwiki.php/Main/AlienGeometries"><span data-dcnode-id="4979" instrument_node="">Alien Geometries</span></a><span data-dcnode-id="4977" instrument_node="">: Mae's dreams run on this logic, especially the "musical band" dreams. There are buildings which seem to overlap each other, roads that go nowhere, and lights that turn on as soon as Mae walks past them. Everything is also tinged in a faint neon glow, and the gravity is far lower than normal, seeing as how Mae can jump from the ground to the roof of a building.</span><ul data-dcnode-id="4969"><li data-dcnode-id="4970"><span data-dcnode-id="4976" instrument_node=""> The Historical Society, with its overabundance of elevators, most of which only connect two floors, with no stairs in between. Mae even specifically notes that this design makes no sense, even when trying to think of a logical explanation. </span><span class="spoiler" data-dcnode-id="4971" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4975" instrument_node="">The building's connection to the Black Goat could have it veering into </span><a class="twikilink" data-dcnode-id="4973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchLocation" title="/pmwiki/pmwiki.php/Main/EldritchLocation"><span data-dcnode-id="4974" instrument_node="">Eldritch Location</span></a><span data-dcnode-id="4972" instrument_node=""> territory.</span></span></li></ul></li><li data-dcnode-id="4963"><span data-dcnode-id="4967" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllGermansAreNazis" title="/pmwiki/pmwiki.php/Main/AllGermansAreNazis"><span data-dcnode-id="4966" instrument_node="">All Germans Are Nazis</span></a><span data-dcnode-id="4964" instrument_node="">: Averted. Gregg sometimes wears a pickelhaube helmet that he reveals in an event with him that it belonged to his great-great-grandfather who (presumably) fought for Germany in World War I. Mae assumes it's the one the "fascists" wore, this annoys Gregg and he reminds her that's the wrong war and at the time they were not fascists. He even refers to Germany as "not the bad guys". It's implied that he means the German Empire, rather than Nazi Germany. Whether he's correct or in denial is unclear due to his strained relationship with his family.</span></li><li data-dcnode-id="4955"><span data-dcnode-id="4962" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAllegedBoss" title="/pmwiki/pmwiki.php/Main/TheAllegedBoss"><span data-dcnode-id="4961" instrument_node="">The Alleged Boss</span></a><span data-dcnode-id="4959" instrument_node="">: Mr. Santello owns the local hardware store, but entrusts all of its operations to his daughter Bea, and is never seen on the premises. He used to be more active before </span><span class="spoiler" data-dcnode-id="4957" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4958" instrument_node="">his wife's death and his resulting mental breakdown</span></span><span data-dcnode-id="4956" instrument_node="">.</span></li><li data-dcnode-id="4950"><span data-dcnode-id="4954" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlliterativeName" title="/pmwiki/pmwiki.php/Main/AlliterativeName"><span data-dcnode-id="4953" instrument_node="">Alliterative Name</span></a><span data-dcnode-id="4951" instrument_node="">: Arnold A. Applebaum.</span></li><li data-dcnode-id="4943"><span data-dcnode-id="4949" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllThereInTheManual" title="/pmwiki/pmwiki.php/Main/AllThereInTheManual"><span data-dcnode-id="4948" instrument_node="">All There in the Manual</span></a><span data-dcnode-id="4946" instrument_node="">: Minor details not specifically mentioned in-game are in the game's code, such as the cranky bird in Underhill being named Varney. </span><span class="spoiler" data-dcnode-id="4944" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4945" instrument_node=""> Tellingly, all doodles tied to the Black Goat also reference the goat constellation: Ibon, the First Singer...</span></span></li><li data-dcnode-id="4933"><span data-dcnode-id="4942" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlmightyJanitor" title="/pmwiki/pmwiki.php/Main/AlmightyJanitor"><span data-dcnode-id="4941" instrument_node="">Almighty Janitor</span></a><span data-dcnode-id="4939" instrument_node="">: The Janitor, who appears at key moments to give Mae some cryptic advice while doing some kind of maintenance work. </span><span class="spoiler" data-dcnode-id="4934" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4938" instrument_node=""> At the end, he even knows Mae's name, with implications he </span><a class="twikilink" data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane" title="/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane"><span data-dcnode-id="4937" instrument_node="">might be more than a normal janitor</span></a><span data-dcnode-id="4935" instrument_node="">. The fact that a statue looking just like him is on the graveyard only raises more questions as well.</span></span></li><li data-dcnode-id="4923"><span data-dcnode-id="4932" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbiguousDisorder" title="/pmwiki/pmwiki.php/Main/AmbiguousDisorder"><span data-dcnode-id="4931" instrument_node="">Ambiguous Disorder</span></a><span data-dcnode-id="4929" instrument_node="">:</span><ul data-dcnode-id="4924"><li data-dcnode-id="4927"><span data-dcnode-id="4928" instrument_node=""> As the game goes on, it becomes more and more apparent that something has happened that messed with Mae's mental state. Bea suggests she possibly has depression or anxiety after a traumatic event in her childhood; said event matches up with a textbook description of dissociation. The near-end of the game seems to imply Mae has psychosis or derealization disorder.</span></li><li data-dcnode-id="4925"><span data-dcnode-id="4926" instrument_node=""> Gregg mentions having "really up up days and really down down days," and exhibits some poor impulse control, and self-destructive habits when particularly "up". Bea explicitly says he is probably bipolar.</span></li></ul></li><li data-dcnode-id="4918"><span data-dcnode-id="4922" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbiguouslyChristian" title="/pmwiki/pmwiki.php/Main/AmbiguouslyChristian"><span data-dcnode-id="4921" instrument_node="">Ambiguously Christian</span></a><span data-dcnode-id="4919" instrument_node="">: The religion of the cast features churches, Easter, popes, Sunday school, and a video cover associates crosses with priests, but the local church's main symbol is an eight pointed star, and the female pastor refers to God with "they" pronouns. Religion is often discussed by the characters, especially with the atheist Angus and the observant Bea, but denominations are never stated.</span></li><li data-dcnode-id="4892"><span data-dcnode-id="4917" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbitionIsEvil" title="/pmwiki/pmwiki.php/Main/AmbitionIsEvil"><span data-dcnode-id="4916" instrument_node="">Ambition Is Evil</span></a><span data-dcnode-id="4914" instrument_node="">: Inverted. To the citizens of Possum Springs, not having ambition is considered irresponsible.</span><ul data-dcnode-id="4893"><li data-dcnode-id="4906"><span data-dcnode-id="4913" instrument_node=""> Possum Springs is a </span><a class="twikilink" data-dcnode-id="4911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DyingTown" title="/pmwiki/pmwiki.php/Main/DyingTown"><span data-dcnode-id="4912" instrument_node="">Dying Town</span></a><span data-dcnode-id="4910" instrument_node=""> and there are few opportunities. Everyone in the game is angry at Mae for dropping out of college. She spends her days engaging in reckless criminal behavior, and shows no regard for the sacrifices others have made. Her parents want to know why, and are worried when Mae won't open up to them. Bea calls her out for not taking advantage of the opportunities that college offered </span><span class="spoiler" data-dcnode-id="4908" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4909" instrument_node="">though in one route, she offers sympathy and a possible solution on hearing why Mae dropped out</span></span><span data-dcnode-id="4907" instrument_node="">.</span></li><li data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node=""> Bea wants more than to be her dad's unpaid manager at the Pickaxe but is trapped because her dad doesn't listen to her, they have endless bills from her mother's cancer treatment even though she's gone, and they can't afford college tuition.</span></li><li data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node=""> Angus and Gregg are saving up money to go to Bright Harbor, to be in a better town that's less homophobic.</span></li><li data-dcnode-id="4894"><span data-dcnode-id="4901" instrument_node=""> The trope also gets discussed, since Mae reveals that </span><span class="spoiler" data-dcnode-id="4896" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4900" instrument_node="">she suffered a breakdown and couldn't even go to class, as well as her confessing to her mother that she feels like she messed up her parents' lives. This shows that she </span><em data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">wants</span></em><span data-dcnode-id="4897" instrument_node=""> to be ambitious, but her brain won't let her</span></span><span data-dcnode-id="4895" instrument_node="">.</span></li></ul></li><li data-dcnode-id="4881"><span data-dcnode-id="4891" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmicableExes" title="/pmwiki/pmwiki.php/Main/AmicableExes"><span data-dcnode-id="4890" instrument_node="">Amicable Exes</span></a><span data-dcnode-id="4888" instrument_node="">: You find out that Mae briefly dated Cole in high school, but their prom date was a disaster of epic proportions. (It involved her biting him so hard he bled while trying to kiss him, and </span><a class="twikilink" data-dcnode-id="4886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItMakesSenseInContext" title="/pmwiki/pmwiki.php/Main/ItMakesSenseInContext"><span data-dcnode-id="4887" instrument_node="">him nearly choking to death on paper towels, while she vomited in the sink</span></a><span data-dcnode-id="4885" instrument_node="">.) Mae is understandably anxious about seeing him at a party, but it appears Cole would like to try for this trope with her — he doesn't bring up what happened, and acts warmly towards her when he sees her. Unfortunately, Mae is raging drunk, and begins publicly ranting at him. (And then </span><em data-dcnode-id="4883"><span data-dcnode-id="4884" instrument_node="">he</span></em><span data-dcnode-id="4882" instrument_node=""> apologizes for upsetting her, possibly in hopes of calming her down.) The whole thing ends with Mae puking and swiftly being brought home by Bea, leaving a very confused (and sober) Cole.</span></li><li data-dcnode-id="4876"><span data-dcnode-id="4880" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndNowForSomeoneCompletelyDifferent" title="/pmwiki/pmwiki.php/Main/AndNowForSomeoneCompletelyDifferent"><span data-dcnode-id="4879" instrument_node="">And Now for Someone Completely Different</span></a><span data-dcnode-id="4877" instrument_node="">: In a brief scene in Angus and Gregg's apartment, all of the main characters except Mae are there. The player briefly takes control of either Gregg or Bea (depending on who the player had Mae grow closer to) until Mae shows up at the door.</span></li><li data-dcnode-id="4868"><span data-dcnode-id="4875" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndYourRewardIsInteriorDecorating" title="/pmwiki/pmwiki.php/Main/AndYourRewardIsInteriorDecorating"><span data-dcnode-id="4874" instrument_node="">And Your Reward Is Interior Decorating</span></a><span data-dcnode-id="4872" instrument_node="">: In the </span><em data-dcnode-id="4870"><span data-dcnode-id="4871" instrument_node="">Weird Autumn Edition</span></em><span data-dcnode-id="4869" instrument_node="">, you can talk to Mr. Salvi at the Trolleyside Tunnel and go on an adventure with him to collect some antiques out of four junk piles (you can pick only one item out of two in each junk pile), fending off bats with your boat light on the way, until you get to the end with a forgotten mural. You will not only get a notebook sketch on completing this, but the items you collected on your journey will serve as interior decorations for your attic bedroom.</span></li><li data-dcnode-id="4863"><span data-dcnode-id="4867" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnotherSideAnotherStory" title="/pmwiki/pmwiki.php/Main/AnotherSideAnotherStory"><span data-dcnode-id="4866" instrument_node="">Another Side, Another Story</span></a><span data-dcnode-id="4864" instrument_node="">: You are offered different perspectives depending on whether you decide to spend time with Gregg or Bea. Particularly, regarding Angus and Gregg's relationship, since doing Bea's route ends with Bea stating the possibility of them breaking up in the future, while playing Gregg's route will imply that their relationship is deeper and more meaningful than what she believes.</span></li><li data-dcnode-id="4855"><span data-dcnode-id="4862" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArbitrarySkepticism" title="/pmwiki/pmwiki.php/Main/ArbitrarySkepticism"><span data-dcnode-id="4861" instrument_node="">Arbitrary Skepticism</span></a><span data-dcnode-id="4859" instrument_node="">: </span><a class="twikilink" data-dcnode-id="4857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZigZagged" title="/pmwiki/pmwiki.php/Main/ZigZagged"><span data-dcnode-id="4858" instrument_node="">Zig-Zagged</span></a><span data-dcnode-id="4856" instrument_node="">. When Mae thinks she sees a ghost, her friends firmly assess that ghosts don't exist but they agree with her that she saw something. Angus says he finds a living person more dangerous. In the game itself, there are newspaper clipping of ghost sightings, explained by ethylene poisoning.</span></li><li data-dcnode-id="4850"><span data-dcnode-id="4854" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcWords" title="/pmwiki/pmwiki.php/Main/ArcWords"><span data-dcnode-id="4853" instrument_node="">Arc Words</span></a><span data-dcnode-id="4851" instrument_node="">: "I won't die here." The phrase repeatedly appears both in the supplemental games and in the game proper, even as the title and subject of one of the band's songs.</span></li><li data-dcnode-id="4788"><span data-dcnode-id="4849" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcSymbol" title="/pmwiki/pmwiki.php/Main/ArcSymbol"><span data-dcnode-id="4848" instrument_node="">Arc Symbol</span></a><span data-dcnode-id="4846" instrument_node="">:</span><ul data-dcnode-id="4789"><li data-dcnode-id="4836"><span data-dcnode-id="4845" instrument_node=""> </span><em data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">Holes</span></em><span data-dcnode-id="4842" instrument_node="">. Candy tells Mae about a sinkhole that appeared while she was sleeping. Mae tells the Donut Wolf cashier that the last time she ate Eternity Sauce, she dug a hole in the yard and slept in it. The first level of Demontower is called </span><em data-dcnode-id="4840"><span data-dcnode-id="4841" instrument_node="">The Hole</span></em><span data-dcnode-id="4839" instrument_node="">. The Sky Cat tells Mae that there is a hole that is constantly growing at the center of everything. </span><span class="spoiler" data-dcnode-id="4837" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4838" instrument_node="">The Black Goat cultists kill their victims by throwing them into a subterranean hole.</span></span></li><li data-dcnode-id="4828"><span data-dcnode-id="4835" instrument_node=""> </span><em data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">Stars</span></em><span data-dcnode-id="4832" instrument_node="">. After being electrocuted, Mae meets Sharkle, who tells her that she will join her ancestors among the stars. Mr. Chazokov and Mae stargaze together. Angus and Mae also discuss constellations during their evening hike in the forest. The Sky Cat tells Mae that a hole is growing between the stars. </span><span class="spoiler" data-dcnode-id="4830" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4831" instrument_node="">The cultists explain that Black Goat is black like the space between stars. The painting that Gregg and Mae find at the historical society depicts Black Goat descending from the stars.</span></span><span data-dcnode-id="4829" instrument_node=""> In the "Lost Constellation" mini-game, Adina is searching for the Ghost Star. In another mini-game called "Longest Night", Mae and her friends identify constellations.</span></li><li data-dcnode-id="4820"><span data-dcnode-id="4827" instrument_node=""> </span><em data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">Pentagrams</span></em><span data-dcnode-id="4824" instrument_node="">. The achievement icon associated with meeting the goth kids features pentagrams. When Mae holds Bombshell's hand, a pentagram appears over their joined hands. </span><span class="spoiler" data-dcnode-id="4822" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4823" instrument_node="">In the mine shaft, the Black Goat cult has arranged rafters in the shape of a pentagram.</span></span><span data-dcnode-id="4821" instrument_node=""> Pentagrams also appear in the Demontower video game on Mae's computer. In the "Lost Constellation" mini-game, the door to the Huncher's house is engraved with a pentagram.</span></li><li data-dcnode-id="4815"><span data-dcnode-id="4819" instrument_node=""> </span><em data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">Rats</span></em><span data-dcnode-id="4816" instrument_node="">. Mae feeds baby rats nesting in a parade float she finds in a storage room. These rats proliferate and later run rampant through the downtown area and abandoned Food Donkey. In the Demontower game, swarming balls of rats attack Pale Cat.</span></li><li data-dcnode-id="4807"><span data-dcnode-id="4814" instrument_node=""> </span><em data-dcnode-id="4812"><span data-dcnode-id="4813" instrument_node="">Severed arms</span></em><span data-dcnode-id="4811" instrument_node="">. Mae and her friends discover a severed arm outside of a diner. </span><span class="spoiler" data-dcnode-id="4809" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4810" instrument_node="">Eide's arm is severed by an elevator when he attacks Mae.</span></span><span data-dcnode-id="4808" instrument_node=""> In the "Lost Constellation" mini-game, Adina finds a severed arm in the snow, and the Huncher has several severed arms suspended from the ceiling of her house.</span></li><li data-dcnode-id="4790"><span data-dcnode-id="4806" instrument_node=""> </span><em data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">Fall</span></em><span data-dcnode-id="4803" instrument_node=""> (both the season and the verb). Fall is the season of fading/ending/dying. Possum Springs — a dying town — is noted to look particularly lovely in fall. It's also Mae's favorite season:she mentions fall and autumn trees when asking the </span><span class="spoiler" data-dcnode-id="4801" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4802" instrument_node="">Sky Cat</span></span><span data-dcnode-id="4800" instrument_node=""> about things that matter to her. One of the band's songs is "Weird Autumn," another word for the season, and it's sung by a group of people in the last days of their youth before they have to take on a more adult role. The name of the third chapter "The Long Fall," is a pun that ties the two meanings of "fall" together: the fact that this will be a complicated and tortuous autumn, and </span><span class="spoiler" data-dcnode-id="4798" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4799" instrument_node=""> the band's descent into the dark side of Possum Springs</span></span><span data-dcnode-id="4797" instrument_node="">. It also references </span><span class="spoiler" data-dcnode-id="4795" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4796" instrument_node="">the cult's method of sacrifice/execution: being cast into a pit</span></span><span data-dcnode-id="4794" instrument_node="">. Other significant falls are Mae's drop from the telephone pole when she arrives back in Possum Springs, the unfortunate fate of the young girl that Jenny's Field is named after, the way Mae gets injured later in the game, and </span><span class="spoiler" data-dcnode-id="4792" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4793" instrument_node="">the elevator drop that kills one cultist and traps the rest</span></span><span data-dcnode-id="4791" instrument_node="">.</span></li></ul></li><li data-dcnode-id="4772"><span data-dcnode-id="4787" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtStyleDissonance" title="/pmwiki/pmwiki.php/Main/ArtStyleDissonance"><span data-dcnode-id="4786" instrument_node="">Art-Style Dissonance</span></a><span data-dcnode-id="4784" instrument_node="">: Rendered in a flat, paper cutout style, of the sort used in school decorations and children's books, with </span><a class="twikilink" data-dcnode-id="4782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FunnyAnimal" title="/pmwiki/pmwiki.php/Main/FunnyAnimal"><span data-dcnode-id="4783" instrument_node="">Funny Animal</span></a><span data-dcnode-id="4781" instrument_node=""> characters inspired by the works of </span><a class="twikilink" data-dcnode-id="4779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RichardScarry" title="/pmwiki/pmwiki.php/Creator/RichardScarry"><span data-dcnode-id="4780" instrument_node="">Richard Scarry</span></a><span data-dcnode-id="4778" instrument_node="">. It delves into depression, mental illness in general, sociopolitical issues, and </span><span class="spoiler" data-dcnode-id="4773" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4777" instrument_node="">an </span><a class="twikilink" data-dcnode-id="4775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="4776" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="4774" instrument_node=""> that may or may not be real.</span></span></li><li data-dcnode-id="4764"><span data-dcnode-id="4771" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AscendToAHigherPlaneOfExistence" title="/pmwiki/pmwiki.php/Main/AscendToAHigherPlaneOfExistence"><span data-dcnode-id="4770" instrument_node="">Ascend to a Higher Plane of Existence</span></a><span data-dcnode-id="4768" instrument_node="">: The musicians in the reoccurring dream Mae has may be </span><span class="spoiler" data-dcnode-id="4766" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4767" instrument_node="">a band that used to play in town who eventually started trying to play to ghosts in the woods before dying of exposure one night</span></span><span data-dcnode-id="4765" instrument_node="">.</span></li><li data-dcnode-id="4754"><span data-dcnode-id="4763" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AstralProjection" title="/pmwiki/pmwiki.php/Main/AstralProjection"><span data-dcnode-id="4762" instrument_node="">Astral Projection</span></a><span data-dcnode-id="4760" instrument_node="">: The main protagonist Mae Borowski was originally going to have the power, which would have only been activated when she dreams at night, in order to help tell her what's going on in the town that she is living in. However, in the final game, it's </span><a class="twikilink" data-dcnode-id="4758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnreliableNarrator" title="/pmwiki/pmwiki.php/Main/UnreliableNarrator"><span data-dcnode-id="4759" instrument_node="">ambiguous if she's actually astral projecting or if it's just a combination of the stress of coming back home and</span></a><span data-dcnode-id="4757" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4755" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4756" instrument_node=""> her underlying mental disorder.</span></span></li><li data-dcnode-id="4747"><span data-dcnode-id="4753" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AuthorAvatar" title="/pmwiki/pmwiki.php/Main/AuthorAvatar"><span data-dcnode-id="4752" instrument_node="">Author Avatar</span></a><span data-dcnode-id="4750" instrument_node="">: Pastor Karen seems to be partially based both on Scott Benson back when he was a speaker for a church, and the liberal pastor of said church. </span><span class="spoiler" data-dcnode-id="4748" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4749" instrument_node=""> Karen combines the pastors left-leaning interpretation of scripture with Scott's wavering faith in God and effort to help other people believe, so they won't hurt as much, even though he didn't fully believe in God himself.</span></span></li><li data-dcnode-id="4742"><span data-dcnode-id="4746" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BatterUp" title="/pmwiki/pmwiki.php/Main/BatterUp"><span data-dcnode-id="4745" instrument_node="">Batter Up!</span></a><span data-dcnode-id="4743" instrument_node="">: Mae weaponizes a baseball bat on a few occasions, like smashing fluorescent light bulbs with Gregg. She also uses one in one of her dreams to smash things in a dream version of town.</span></li><li data-dcnode-id="4735"><span data-dcnode-id="4741" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BearyFriendly" title="/pmwiki/pmwiki.php/Main/BearyFriendly"><span data-dcnode-id="4740" instrument_node="">Beary Friendly</span></a><span data-dcnode-id="4738" instrument_node="">: Angus is Gregg's loving boyfriend, who is friendly and compassionate to his friends, despite coming from </span><a class="twikilink" data-dcnode-id="4736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkAndTroubledPast" title="/pmwiki/pmwiki.php/Main/DarkAndTroubledPast"><span data-dcnode-id="4737" instrument_node="">a terrible and tragic upbringing.</span></a></li><li data-dcnode-id="4700"><span data-dcnode-id="4734" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeingWatched" title="/pmwiki/pmwiki.php/Main/BeingWatched"><span data-dcnode-id="4733" instrument_node="">Being Watched</span></a><span data-dcnode-id="4731" instrument_node="">: The game on the whole, as </span><span class="spoiler" data-dcnode-id="4729" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4730" instrument_node=""> the protagonists have no idea who the cultists really are.</span></span><span data-dcnode-id="4728" instrument_node=""> Also tied to the large, almost unsettling eyes of the characters.</span><ul data-dcnode-id="4701"><li data-dcnode-id="4702"><span data-dcnode-id="4727" instrument_node=""> Specifically, all three "ghost hunts" Mae can undertake in Chapter 3 have this trope occur towards the end, </span><span class="spoiler" data-dcnode-id="4725" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4726" instrument_node=""> with Mae and whoever is accompanying her being watched by a hooded cultist hiding in the dark</span></span><span data-dcnode-id="4724" instrument_node="">.</span><ul data-dcnode-id="4703"><li data-dcnode-id="4714"><span data-dcnode-id="4723" instrument_node=""> The trip to the Historical Society with Gregg ends with </span><span class="spoiler" data-dcnode-id="4716" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4722" instrument_node=""> them being chased by someone else in the building. As Mae climbs down the fire escape to get away, the "ghost" </span><a class="twikilink" data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JumpScare" title="/pmwiki/pmwiki.php/Main/JumpScare"><span data-dcnode-id="4721" instrument_node="">suddenly appears in a window nearby</span></a><span data-dcnode-id="4719" instrument_node="">, </span><a class="twikilink" data-dcnode-id="4717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NothingIsScarier" title="/pmwiki/pmwiki.php/Main/NothingIsScarier"><span data-dcnode-id="4718" instrument_node="">silent and unmoving</span></a></span><span data-dcnode-id="4715" instrument_node="">.</span></li><li data-dcnode-id="4709"><span data-dcnode-id="4713" instrument_node=""> The trip to the graveyard with Bea has </span><span class="spoiler" data-dcnode-id="4711" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4712" instrument_node=""> the two of them open a coffin and desecrate a grave, only for Bea point out that someone is hiding nearby, watching them</span></span><span data-dcnode-id="4710" instrument_node="">.</span></li><li data-dcnode-id="4704"><span data-dcnode-id="4708" instrument_node=""> The stargazing trip with Angus to Possum Jump concludes when </span><span class="spoiler" data-dcnode-id="4706" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4707" instrument_node=""> Angus tells Mae that there's someone standing right behind them in the woods, just staring at them</span></span><span data-dcnode-id="4705" instrument_node="">.</span></li></ul></li></ul></li><li data-dcnode-id="4687"><span data-dcnode-id="4699" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BewareTheNiceOnes" title="/pmwiki/pmwiki.php/Main/BewareTheNiceOnes"><span data-dcnode-id="4698" instrument_node="">Beware the Nice Ones</span></a><span data-dcnode-id="4696" instrument_node="">: Angus is a </span><a class="twikilink" data-dcnode-id="4694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GentleGiant" title="/pmwiki/pmwiki.php/Main/GentleGiant"><span data-dcnode-id="4695" instrument_node="">Gentle Giant</span></a><span data-dcnode-id="4693" instrument_node=""> with asthma, who adores Gregg and cooks for his friends. </span><span class="spoiler" data-dcnode-id="4688" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4692" instrument_node="">When he finds out the cult has killed people, however, and one tries to kill Mae, he goes for the elevator lever in the mine and saves her life. He doesn't regret that dropping the elevator logically must have killed Mae's attacker and left the others stranded in the dark, unlike Bea. He does </span><em data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">not</span></em><span data-dcnode-id="4689" instrument_node=""> like bad people, having grown up in an abusive household, and he's furious that the cult was trying to recruit them. Angus doesn't even believe in hell, but he hopes the cult members go there.</span></span></li><li data-dcnode-id="4673"><span data-dcnode-id="4686" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="4685" instrument_node="">Bittersweet Ending</span></a><span data-dcnode-id="4683" instrument_node="">: While the mystery is solved and </span><span class="spoiler" data-dcnode-id="4681" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4682" instrument_node="">the cultists for the Black Goat are killed so that the sacrifices stop</span></span><span data-dcnode-id="4680" instrument_node="">, Mae is still alone in the world and has no idea what she's going to do next with her life. Bea is still stuck in the job she hates, unable to pursue her dreams, and Gregg and Angus have an uncertain future together if Bea and Gregg's own predictions are correct. Even then, they only have so long left before the town is hit with </span><em data-dcnode-id="4678"><span data-dcnode-id="4679" instrument_node="">another</span></em><span data-dcnode-id="4677" instrument_node=""> disaster that could injure or kill even more people, with the town eventually dying as a result. In the end, all the group has left is each other, spending what are potentially their last real times as friends with one another. Mae mends ties with her family and appears ready to open up to them about </span><span class="spoiler" data-dcnode-id="4675" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4676" instrument_node="">her mental problems and why she dropped out of college, while her dad plans to do the same</span></span><span data-dcnode-id="4674" instrument_node="">.</span></li><li data-dcnode-id="4653"><span data-dcnode-id="4672" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BookEnds" title="/pmwiki/pmwiki.php/Main/BookEnds"><span data-dcnode-id="4671" instrument_node="">Bookends</span></a><span data-dcnode-id="4669" instrument_node="">:</span><ul data-dcnode-id="4654"><li data-dcnode-id="4665"><span data-dcnode-id="4668" instrument_node=""> The first page of Mae's journal is a simple message simply stating "RIP Granddad", the final page is an equally simple statement of </span><span class="spoiler" data-dcnode-id="4666" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4667" instrument_node=""> "RIP Casey".</span></span></li><li data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node=""> Also, the music for the original Kickstarter trailer reappears in the end credits, and the two tracks bookend the OST.</span></li><li data-dcnode-id="4659"><span data-dcnode-id="4662" instrument_node=""> Near the beginning of the game, the group finds a severed arm lying on the ground outside the Snack Falcon, </span><span class="spoiler" data-dcnode-id="4660" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4661" instrument_node=""> which is the first clue they and the player receive as to the existence of the cult. Their final encounter with the same cult is when the injured cultist appears in the mine shaft elevator and tries to kill Mae, resulting in his arm getting severed when Angus drops the elevator on him.</span></span></li><li data-dcnode-id="4655"><span data-dcnode-id="4658" instrument_node=""> The game starts with Mae making her way into Possum Springs through the woods, at night. </span><span class="spoiler" data-dcnode-id="4656" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4657" instrument_node="">The game proper before the epilogue ends with the gang fighting for their lives deep within the woods at night. Lampshaded, foreshadowed, and properly title dropped by the Janitor during the Harfest play: "We begin and we end, at night, in the woods."</span></span></li></ul></li><li data-dcnode-id="4643"><span data-dcnode-id="4652" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BothSidesHaveAPoint" title="/pmwiki/pmwiki.php/Main/BothSidesHaveAPoint"><span data-dcnode-id="4651" instrument_node="">Both Sides Have a Point</span></a><span data-dcnode-id="4649" instrument_node="">: After eating dinner with Bea, Mae finds out that Bea has to run the Old Pickaxe because </span><span class="spoiler" data-dcnode-id="4644" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4648" instrument_node="">her father has suffered a nervous breakdown and doesn't do much. She tells Bea </span><a class="twikilink" data-dcnode-id="4646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouAreBetterThanYouThinkYouAre" title="/pmwiki/pmwiki.php/Main/YouAreBetterThanYouThinkYouAre"><span data-dcnode-id="4647" instrument_node="">You Are Better Than You Think You Are</span></a><span data-dcnode-id="4645" instrument_node=""> and that she could leave her dad. Bea gets furious and tells her that unlike Mae, who has no responsibilities and pays no consequences for her actions, she doesn't have a choice but to help her father because no one else will. Mae is correct that Bea has a choice, and Bea is right that no one else will pick up the slack.</span></span></li><li data-dcnode-id="4638"><span data-dcnode-id="4642" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BootsOfToughness" title="/pmwiki/pmwiki.php/Main/BootsOfToughness"><span data-dcnode-id="4641" instrument_node="">Boots of Toughness</span></a><span data-dcnode-id="4639" instrument_node="">: It's hard to tell with the art style but Mae, the player character, points out in a line of dialogue, that she's wearing boots, which fits her tough tomboy personality.</span></li><li data-dcnode-id="4629"><span data-dcnode-id="4637" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreadEggsMilkSquick" title="/pmwiki/pmwiki.php/Main/BreadEggsMilkSquick"><span data-dcnode-id="4636" instrument_node="">Bread, Eggs, Milk, Squick</span></a><span data-dcnode-id="4634" instrument_node="">: On Day 3, if you examine the family portrait on the second floor, Mae has this to say:</span><div class="indent" data-dcnode-id="4630"><strong data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">Mae:</span></strong><span data-dcnode-id="4631" instrument_node=""> Home. Where everyone knows my name. And my mom's name. And my dad's name. And about that time I put that kid in the hospital.</span></div></li><li data-dcnode-id="4624"><span data-dcnode-id="4628" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokenBridge" title="/pmwiki/pmwiki.php/Main/BrokenBridge"><span data-dcnode-id="4627" instrument_node="">Broken Bridge</span></a><span data-dcnode-id="4625" instrument_node="">: Through much of the story, parts of Mae's hometown are blocked off by construction workers.</span></li><li data-dcnode-id="4619"><span data-dcnode-id="4623" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BuffySpeak" title="/pmwiki/pmwiki.php/Main/BuffySpeak"><span data-dcnode-id="4622" instrument_node="">Buffy Speak</span></a><span data-dcnode-id="4620" instrument_node="">: Mae refers to the concept of a virgin birth as 'one of those God things' and 'when you have a baby because God'.</span></li><li data-dcnode-id="4596"><span data-dcnode-id="4618" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButThouMust" title="/pmwiki/pmwiki.php/Main/ButThouMust"><span data-dcnode-id="4617" instrument_node="">But Thou Must!</span></a><span data-dcnode-id="4615" instrument_node="">:</span><ul data-dcnode-id="4597"><li data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node=""> At the first party, you cannot progress, or even leave, without directing Mae to keep drinking beer, despite her comments that she doesn't like it, Greg and Angus' comments about her being a lightweight, and some of Mae's earlier comments suggesting that she doesn't have a good track record when it comes to parties. The predictable happens.</span></li><li data-dcnode-id="4608"><span data-dcnode-id="4612" instrument_node=""> The game usually employs this to ensure that there is no way to play Mae as a saint. For example, the </span><em data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">player</span></em><span data-dcnode-id="4609" instrument_node=""> may not want to shoplift, and will probably feel that Mae should be causing as little trouble as possible for Bea after the fiasco at the party... but on your outing to the mall, there's no way of getting out of the clothing store without stealing a belt buckle.</span></li><li data-dcnode-id="4598"><span data-dcnode-id="4607" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="4606" instrument_node="">Lampshaded</span></a><span data-dcnode-id="4604" instrument_node=""> after Mae's dinner with Bea; their conversation gradually gets worse over time as Bea discusses her lack of options regarding her future. There are only two options Mae can use and they both result in Bea kicking her out of her apartment. The kicker? Both of those options basically say, </span><a class="twikilink" data-dcnode-id="4602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InnocentlyInsensitive" title="/pmwiki/pmwiki.php/Main/InnocentlyInsensitive"><span data-dcnode-id="4603" instrument_node="">"There's always</span></a><span data-dcnode-id="4601" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlatantLies" title="/pmwiki/pmwiki.php/Main/BlatantLies"><span data-dcnode-id="4600" instrument_node="">a choice."</span></a></li></ul></li><li data-dcnode-id="4584"><span data-dcnode-id="4595" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallBack" title="/pmwiki/pmwiki.php/Main/CallBack"><span data-dcnode-id="4594" instrument_node="">Call-Back</span></a><span data-dcnode-id="4592" instrument_node="">:</span><ul data-dcnode-id="4585"><li data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node=""> If you go to the park with Angus, there's a callback to the Longest Night minigame that was released as a promo for the game. In the promo, Angus is well versed in nearly all the constellations and what they mean. However, the entire thing turns out to be a dream Mae wakes up from. In the game proper, when at the park with Angus, Mae asks Angus to remind her what the constellations mean but he has no knowledge of any of them. Mae realizes that she thought he knew because he knew what they meant in a dream she had.</span></li><li data-dcnode-id="4586"><span data-dcnode-id="4589" instrument_node=""> An easy-to-miss example: one of Mae's earliest dreams involves destroying a semi-abstract sculpture of an (anthropomorphic) bird, repeatedly knocking herself around in the process. </span><span class="spoiler" data-dcnode-id="4587" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4588" instrument_node="">Much later in the game, when she talks about the dissociative/depressive episode that led to her dropping out of college, she mentions being terrified of a statue that fits this description.</span></span></li></ul></li><li data-dcnode-id="4579"><span data-dcnode-id="4583" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CantHoldHisLiquor" title="/pmwiki/pmwiki.php/Main/CantHoldHisLiquor"><span data-dcnode-id="4582" instrument_node="">Can't Hold Her Liquor</span></a><span data-dcnode-id="4580" instrument_node="">: Mae, by her own admission, "gets woozy on cough syrup", so it's not surprising that she immediately gets sloppy drunk on three cups of watered-down beer.</span></li><li data-dcnode-id="4572"><span data-dcnode-id="4578" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CassandraTruth" title="/pmwiki/pmwiki.php/Main/CassandraTruth"><span data-dcnode-id="4577" instrument_node="">Cassandra Truth</span></a><span data-dcnode-id="4575" instrument_node="">: In the epilogue, Lori doesn't believe Mae when she tells her </span><span class="spoiler" data-dcnode-id="4573" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4574" instrument_node=""> she spent the night being chased by "a death cult of conservative uncles".</span></span></li><li data-dcnode-id="4567"><span data-dcnode-id="4571" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CellPhonesAreUseless" title="/pmwiki/pmwiki.php/Main/CellPhonesAreUseless"><span data-dcnode-id="4570" instrument_node="">Cell Phones Are Useless</span></a><span data-dcnode-id="4568" instrument_node="">: Many of the in-game problems could have been solved in seconds (or never even started) if the town had any reception.</span></li><li data-dcnode-id="4549"><span data-dcnode-id="4566" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CentralTheme" title="/pmwiki/pmwiki.php/Main/CentralTheme"><span data-dcnode-id="4565" instrument_node="">Central Theme</span></a><span data-dcnode-id="4563" instrument_node="">: One of them being self-sacrifice for the benefit of others, particularly for the ones you love.</span><ul data-dcnode-id="4550"><li data-dcnode-id="4561"><span data-dcnode-id="4562" instrument_node=""> Mae's parents took out another mortgage on their house so that they could pay for her college.</span></li><li data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node=""> Bea supports her father, even though he does nothing in return and doing this means that she is unable to pursue her dream of going to college.</span></li><li data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node=""> Greg tones down his carefree, crime-filled way in order to be with his boyfriend Angus.</span></li><li data-dcnode-id="4551"><span data-dcnode-id="4556" instrument_node=""> Even </span><span class="spoiler" data-dcnode-id="4552" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4555" instrument_node="">the cult gets a twisted version of this, as all their sacrifices are for the benefit of their town. However, they don't make </span><a class="twikilink" data-dcnode-id="4553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanSacrifice" title="/pmwiki/pmwiki.php/Main/HumanSacrifice"><span data-dcnode-id="4554" instrument_node="">self-sacrifices...</span></a></span></li></ul></li><li data-dcnode-id="4535"><span data-dcnode-id="4548" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterDevelopment" title="/pmwiki/pmwiki.php/Main/CharacterDevelopment"><span data-dcnode-id="4547" instrument_node="">Character Development</span></a><span data-dcnode-id="4545" instrument_node="">: Mae at the game's beginning is a </span><a class="twikilink" data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StepfordSnarker" title="/pmwiki/pmwiki.php/Main/StepfordSnarker"><span data-dcnode-id="4544" instrument_node="">Stepford Snarker</span></a><span data-dcnode-id="4542" instrument_node=""> who engages in reckless criminal behavior and won't tell anyone why she dropped out of college. Beatrice calls her out for this, as does her mother Candy Borowski. Regardless of any route she takes, her friends confront her with a </span><a class="twikilink" data-dcnode-id="4540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkassRealization" title="/pmwiki/pmwiki.php/Main/JerkassRealization"><span data-dcnode-id="4541" instrument_node="">Jerkass Realization</span></a><span data-dcnode-id="4539" instrument_node=""> and she </span><span class="spoiler" data-dcnode-id="4537" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4538" instrument_node="">tries to be better for their sake. She apologizes to Beatrice for outing her college-less status at a party, or to Angus for enabling Greg's criminal behavior depending on with whom you spend your nights. Then after her near-death experience, she opens up to her friends about her mental illness, and plans to do the same with her parents. While she still has no long-term plans for the future, she wants to cherish the people in
