"> It's inverted if you choose to spend the most time with Bea, who constantly calls Mae out on her immature attitude and behavior, and helps Mae to grow more as a person.</span></li></ul></li><li data-dcnode-id="1671"><span data-dcnode-id="1692" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheUnreveal" title="/pmwiki/pmwiki.php/Main/TheUnreveal"><span data-dcnode-id="1691" instrument_node="">The Unreveal</span></a><span data-dcnode-id="1689" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1684" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1688" instrument_node=""> Even after being killed off, we </span><em data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">never</span></em><span data-dcnode-id="1685" instrument_node=""> learn any of the cult members' identities. Some of them refer to each other by name, but they're names of people we never meet out of "costume."</span></span><span data-dcnode-id="1683" instrument_node=""> In a particularly frustrating touch, </span><span class="spoiler" data-dcnode-id="1681" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1682" instrument_node=""> the "ghost" attacks Mae in the finale and Mae manages to kick their mask off, but they're in silhouette the whole time, preventing any potential recognition</span></span><span data-dcnode-id="1680" instrument_node="">.</span><ul data-dcnode-id="1672"><li data-dcnode-id="1673"><span data-dcnode-id="1679" instrument_node=""> In fact, one of the most major reveals in the Weird Autumn Edition is </span><span class="spoiler" data-dcnode-id="1674" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1678" instrument_node="">how many previously-missing characters are </span><em data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">not</span></em><span data-dcnode-id="1675" instrument_node=""> associated with the cult, such as Aunt Molly, the City Council, and a few assorted NPCs such as a wolf lady downtown.</span></span></li></ul></li><li data-dcnode-id="1666"><span data-dcnode-id="1670" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnusualEuphemism" title="/pmwiki/pmwiki.php/Main/UnusualEuphemism"><span data-dcnode-id="1669" instrument_node="">Unusual Euphemism</span></a><span data-dcnode-id="1667" instrument_node="">: Mae and a few of the others say the word "eff" instead of "fuck". Which according to the developers was done to prevent an "M" rating. Other swear words seem to be fine however.</span></li><li data-dcnode-id="1658"><span data-dcnode-id="1665" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UsedToBeASweetKid" title="/pmwiki/pmwiki.php/Main/UsedToBeASweetKid"><span data-dcnode-id="1664" instrument_node="">Used to Be a Sweet Kid</span></a><span data-dcnode-id="1662" instrument_node="">: Subverted; Mae is a snarky </span><a class="twikilink" data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NightmareFetishist" title="/pmwiki/pmwiki.php/Main/NightmareFetishist"><span data-dcnode-id="1661" instrument_node="">Nightmare Fetishist</span></a><span data-dcnode-id="1659" instrument_node="">.</span></li><li data-dcnode-id="1653"><span data-dcnode-id="1657" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VitriolicBestBuds" title="/pmwiki/pmwiki.php/Main/VitriolicBestBuds"><span data-dcnode-id="1656" instrument_node="">Vitriolic Best Buds</span></a><span data-dcnode-id="1654" instrument_node="">: Mae and Gregg in are prone to lobbying several rounds of "too bad you didn't [die in some exaggeratedly horrific way]" at each other whenever they meet. They're still very close and supportive of each other.</span></li><li data-dcnode-id="1648"><span data-dcnode-id="1652" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VoiceGrunting" title="/pmwiki/pmwiki.php/Main/VoiceGrunting"><span data-dcnode-id="1651" instrument_node="">Voice Grunting</span></a><span data-dcnode-id="1649" instrument_node="">: The Longest Night supplemental game has this, while the main game doesn't, oddly enough. It does give some idea of how the characters sound like in relation to the others; Angus for one has a much deeper grunt than the rest of the gang.</span></li><li data-dcnode-id="1640"><span data-dcnode-id="1647" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WaterGunsAndBalloons" title="/pmwiki/pmwiki.php/Main/WaterGunsAndBalloons"><span data-dcnode-id="1646" instrument_node="">Water Guns and Balloons</span></a><span data-dcnode-id="1644" instrument_node="">: The </span><em data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Weird Autumn Edition</span></em><span data-dcnode-id="1641" instrument_node=""> has two minigames at Harfest, one of which involves throwing water balloons at the City Council of Possum Springs, who pose as Halloween monsters respectively.</span></li><li data-dcnode-id="1630"><span data-dcnode-id="1639" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WellIntentionedExtremist" title="/pmwiki/pmwiki.php/Main/WellIntentionedExtremist"><span data-dcnode-id="1638" instrument_node="">Well-Intentioned Extremist</span></a><span data-dcnode-id="1636" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1631" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1635" instrument_node=""> The cult as a whole. They're otherwise normal people trying to protect their families from dying and their home from rotting away and being forgotten; to do this, however, they believe they need to make ritual sacrifices to an </span><a class="twikilink" data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="1634" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="1632" instrument_node=""> within the mines whenever it hungers.</span></span></li><li data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeUsedToBeFriends" title="/pmwiki/pmwiki.php/Main/WeUsedToBeFriends"><span data-dcnode-id="1628" instrument_node="">We Used to Be Friends</span></a><span data-dcnode-id="1626" instrument_node="">: Mae and Bea abruptly ended their friendship in the seventh grade. They become friends again over the course of the game.</span></li><li data-dcnode-id="1592"><span data-dcnode-id="1624" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamEpisode" title="/pmwiki/pmwiki.php/Main/WhamEpisode"><span data-dcnode-id="1623" instrument_node="">Wham Episode</span></a><span data-dcnode-id="1621" instrument_node="">:</span><ul data-dcnode-id="1593"><li data-dcnode-id="1614"><span data-dcnode-id="1620" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1615" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1619" instrument_node="">The first night in the woods. That's where it will really hit you that the characters are a </span><a class="twikilink" data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DysfunctionJunction" title="/pmwiki/pmwiki.php/Main/DysfunctionJunction"><span data-dcnode-id="1618" instrument_node="">Dysfunction Junction</span></a><span data-dcnode-id="1616" instrument_node="">, with Mae revealing about her dad's old drinking problem and Bea tells Mae about her dead mom.</span></span></li><li data-dcnode-id="1607"><span data-dcnode-id="1613" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1608" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1612" instrument_node="">Harfest/Halloween, where the supernatural plot finally kicks into action as Mae sees someone </span><em data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">get abducted</span></em><span data-dcnode-id="1609" instrument_node="">.</span></span></li><li data-dcnode-id="1594"><span data-dcnode-id="1606" instrument_node=""> Near the end of the game, depending on whether you've hung out with Bea or Gregg more, there's </span><em data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">two</span></em><span data-dcnode-id="1603" instrument_node=""> possible ones. On Bea's route, </span><span class="spoiler" data-dcnode-id="1601" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1602" instrument_node="">after ruining her night at the college party, she vocalizes her hatred for Mae.</span></span><span data-dcnode-id="1600" instrument_node=""> On Gregg's route, </span><span class="spoiler" data-dcnode-id="1595" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1599" instrument_node="">he and Angus end up having a big argument, the first and </span><em data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">only</span></em><span data-dcnode-id="1596" instrument_node=""> time that any problems with their relationship are shown to exist outside Gregg's head.</span></span></li></ul></li></ul><ul data-dcnode-id="1458"><li data-dcnode-id="1553"><span data-dcnode-id="1589" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamLine" title="/pmwiki/pmwiki.php/Main/WhamLine"><span data-dcnode-id="1588" instrument_node="">Wham Line</span></a><span data-dcnode-id="1586" instrument_node="">:</span><ul data-dcnode-id="1554"><li data-dcnode-id="1577"><span data-dcnode-id="1585" instrument_node=""> When Bea is driving a drunk Mae home and Mae tells Bea to say hello to her mom for her.</span><div class="indent" data-dcnode-id="1578"><span data-dcnode-id="1584" instrument_node=""> </span><strong data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Bea</span></strong><span data-dcnode-id="1581" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1579" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1580" instrument_node="">Goddammit, Mae... My mother is DEAD.</span></span></div></li><li data-dcnode-id="1568"><span data-dcnode-id="1576" instrument_node=""> When Angus and Mae are done with their stargazing.</span><div class="indent" data-dcnode-id="1569"><span data-dcnode-id="1575" instrument_node=""> </span><strong data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Angus:</span></strong><span data-dcnode-id="1572" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1570" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1571" instrument_node="">There's someone behind us.</span></span></div></li><li data-dcnode-id="1555"><span data-dcnode-id="1567" instrument_node=""> Right after </span><span class="spoiler" data-dcnode-id="1565" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1566" instrument_node="">Mae and the gang learn about the sacrifices in the mines and how they choose their victims</span></span><span data-dcnode-id="1564" instrument_node="">:</span><div class="indent" data-dcnode-id="1556"><span data-dcnode-id="1563" instrument_node=""> </span><strong data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Mae:</span></strong><span data-dcnode-id="1560" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1557" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SeekingTheMissingFindingTheDead" title="/pmwiki/pmwiki.php/Main/SeekingTheMissingFindingTheDead"><span data-dcnode-id="1559" instrument_node="">Casey...</span></a></span></div></li></ul></li><li data-dcnode-id="1548"><span data-dcnode-id="1552" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatHappenedToTheMouse" title="/pmwiki/pmwiki.php/Main/WhatHappenedToTheMouse"><span data-dcnode-id="1551" instrument_node="">What Happened to the Mouse?</span></a><span data-dcnode-id="1549" instrument_node="">: When the gang finds an arm at the start of the game, they decide to poke it with a stick. Upon doing so, they notice there is a diamond tattoo on it. One of the gang says that they found a clue. The tattoo is never referenced again.</span></li><li data-dcnode-id="1525"><span data-dcnode-id="1547" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatTheHellHero" title="/pmwiki/pmwiki.php/Main/WhatTheHellHero"><span data-dcnode-id="1546" instrument_node="">What the Hell, Hero?</span></a><span data-dcnode-id="1544" instrument_node="">:</span><ul data-dcnode-id="1526"><li data-dcnode-id="1537"><span data-dcnode-id="1543" instrument_node=""> Bea gets mad at Mae for acting like a drunk fool at the first party in the game. Mae had also forgotten that Bea's mother had died, and is acting irresponsibly, complete with having wasted her college opportunities. </span><span class="spoiler" data-dcnode-id="1538" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1542" instrument_node="">With that said, she is more sympathetic when Mae tells her in the Bea path </span><em data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">why</span></em><span data-dcnode-id="1539" instrument_node=""> she dropped out, though she is right about the other parts.</span></span></li><li data-dcnode-id="1533"><span data-dcnode-id="1536" instrument_node=""> Mae gets angry at her friends when they won't believe her about a ghost, because she did see something, and someone has been watching them during their ghost hangouts. It doesn't help that they all realize she was </span><span class="spoiler" data-dcnode-id="1534" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1535" instrument_node="">half-right; it wasn't a ghost, but rather an actual person kidnapping others and tossing them down a deep hole into the mine.</span></span></li><li data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node=""> Angus is furious on seeing that Mae is encouraging Gregg to revert to his previous criminal behavior, which he was cleaning up so that the couple could move to Bright Harbor.</span></li><li data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node=""> Mae gets in a shot by telling Angus and Gregg that Gregg choosing to be a criminal isn't completely her fault. Gregg acknowledges this and vows to be better.</span></li><li data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node=""> Jackie tells off Mae for humiliating Bea at a college party and for being a jerk. It's all very true. This motivates Mae to chase after Bea, to apologize and to hear her out.</span></li></ul></li><li data-dcnode-id="1504"><span data-dcnode-id="1524" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhyDontYouJustShootHim" title="/pmwiki/pmwiki.php/Main/WhyDontYouJustShootHim"><span data-dcnode-id="1523" instrument_node="">Why Don't You Just Shoot Him?</span></a><span data-dcnode-id="1521" instrument_node="">:</span><ul data-dcnode-id="1505"><li data-dcnode-id="1514"><span data-dcnode-id="1520" instrument_node=""> Horribly averted when </span><span class="spoiler" data-dcnode-id="1518" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1519" instrument_node="">cult members are chasing Mae. When they fire at her, they miss, but she ends up careening into a ravine, suffering a nasty head injury as a result.</span></span><span data-dcnode-id="1517" instrument_node=""> Then discussed when </span><span class="spoiler" data-dcnode-id="1515" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1516" instrument_node="">they apologize to Mae, since they didn't want to actually kill her.</span></span></li><li data-dcnode-id="1510"><span data-dcnode-id="1513" instrument_node=""> Averted; in the climax Gregg does </span><span class="spoiler" data-dcnode-id="1511" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1512" instrument_node="">shoot the cultist that Mae was approaching with a crossbow, non fatally. Then when he threatens to do the same to Casey's murderer, the cult reveals that they are armed, and force Gregg to put down his crossbow.</span></span></li><li data-dcnode-id="1506"><span data-dcnode-id="1509" instrument_node=""> Again averted when the </span><span class="spoiler" data-dcnode-id="1507" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1508" instrument_node="">cultists explain why they aren't killing Mae and her friends, especially when Mae threatens to go and tell the police; they're getting old, and they need a new generation to pick up where they left off and kill for the Black Goat, that they don't target people who would be missed to avoid drawing attention (even if the gang weren't sacrificed, their collective disappearances would cause a big stir), and that there isn't anything the gang could do to really stop the cult after leaving, due to there being no way to identify its members.</span></span></li></ul></li><li data-dcnode-id="1491"><span data-dcnode-id="1503" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WrongGenreSavvy" title="/pmwiki/pmwiki.php/Main/WrongGenreSavvy"><span data-dcnode-id="1502" instrument_node="">Wrong Genre Savvy</span></a><span data-dcnode-id="1500" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZigZagged" title="/pmwiki/pmwiki.php/Main/ZigZagged"><span data-dcnode-id="1499" instrument_node="">Zig-Zagged</span></a><span data-dcnode-id="1497" instrument_node="">. After the events from Harfest, Mae starts believing she's in a ghost story, and refers to horror movies when talking to Aunt Molly </span><span class="spoiler" data-dcnode-id="1495" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1496" instrument_node="">about the "ghost" and his kidnap victim</span></span><span data-dcnode-id="1494" instrument_node="">. However, while she is right that something horrific is going on, she ends up being wrong on everything else: </span><span class="spoiler" data-dcnode-id="1492" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1493" instrument_node="">she shouts, "the Cop always dies!" at Aunt Molly, but the Weird Autumn update revealed that Molly survives the events. Also, the "ghost" is actually a human being, albeit a murderous one that nearly kills Mae.</span></span></li><li data-dcnode-id="1483"><span data-dcnode-id="1490" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldOfFunnyAnimals" title="/pmwiki/pmwiki.php/Main/WorldOfFunnyAnimals"><span data-dcnode-id="1489" instrument_node="">World of Funny Animals</span></a><span data-dcnode-id="1487" instrument_node="">: A world populated by anthropomorphic cats, dogs, bears, birds, alligators, rodents, goats, etc., as well as feral animals running around. On top of that, there are examples of </span><a class="twikilink" data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FurryConfusion" title="/pmwiki/pmwiki.php/Main/FurryConfusion"><span data-dcnode-id="1486" instrument_node="">feral and domesticated versions of the anthropomorphic animals</span></a><span data-dcnode-id="1484" instrument_node="">, like people having pet dogs despite anthropomorphic dogs walking around a few feet away.</span></li><li data-dcnode-id="1472"><span data-dcnode-id="1482" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/XRaySparks" title="/pmwiki/pmwiki.php/Main/XRaySparks"><span data-dcnode-id="1481" instrument_node="">X-Ray Sparks</span></a><span data-dcnode-id="1479" instrument_node="">: Mae being subject to </span><a class="twikilink" data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HarmlessElectrocution" title="/pmwiki/pmwiki.php/Main/HarmlessElectrocution"><span data-dcnode-id="1478" instrument_node="">Harmless Electrocution</span></a><span data-dcnode-id="1476" instrument_node=""> is a </span><a class="twikilink" data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RunningGag" title="/pmwiki/pmwiki.php/Main/RunningGag"><span data-dcnode-id="1475" instrument_node="">Running Gag</span></a><span data-dcnode-id="1473" instrument_node="">, and when she is, her skeleton is invariably visible. It stands out as one of the only real visual gags in a relatively realistic story.</span></li><li data-dcnode-id="1464"><span data-dcnode-id="1471" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouHaveToBelieveMe" title="/pmwiki/pmwiki.php/Main/YouHaveToBelieveMe"><span data-dcnode-id="1470" instrument_node="">You Have to Believe Me!</span></a><span data-dcnode-id="1468" instrument_node="">: Mae is annoyed that no one believes her about a "ghost". It gets to the point where her friends only follow her into the woods not because they believe her, but they don't want her wandering around at night. Eventually they all realize the "ghost" was </span><span class="spoiler" data-dcnode-id="1466" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1467" instrument_node="">a hooded figure kidnapping children for a cult</span></span><span data-dcnode-id="1465" instrument_node="">.</span></li><li data-dcnode-id="1459"><span data-dcnode-id="1463" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouMeanXmas" title="/pmwiki/pmwiki.php/Main/YouMeanXmas"><span data-dcnode-id="1462" instrument_node="">You Mean "Xmas"</span></a><span data-dcnode-id="1460" instrument_node="">: Apparently the townsfolk of Possum Springs celebrate the Winter Solstice festival called "Longest Night". One tradition is for the inhabitants to sit outside by the campfire at night and spot the thirteen constellations.</span></li></ul></div><p data-dcnode-id="1456"></p><div class="folderlabel" data-dcnode-id="1454" onclick="togglefolder('folder4');"><span data-dcnode-id="1455" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Lost Constellation&nbsp;</span></div><div class="folder" data-dcnode-id="1340" id="folder4" isfolder="true" style="display:block;"><ul data-dcnode-id="1341"><li data-dcnode-id="1446"><span data-dcnode-id="1453" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AscendedGlitch" title="/pmwiki/pmwiki.php/Main/AscendedGlitch"><span data-dcnode-id="1452" instrument_node="">Ascended Glitch</span></a><span data-dcnode-id="1450" instrument_node="">: When the game originally came out, jumping over the cliff allowed you to skip </span><span class="spoiler" data-dcnode-id="1448" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1449" instrument_node="">forming an entourage and extending the bridge</span></span><span data-dcnode-id="1447" instrument_node=""> as the game would assume you had gotten over legitimately. As of the 1.1 update, you can still jump over, and while you are not allowed to skip ahead in the story, there is unique dialogue for doing so.</span></li><li data-dcnode-id="1428"><span data-dcnode-id="1445" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="1444" instrument_node="">Bittersweet Ending</span></a><span data-dcnode-id="1442" instrument_node="">:</span><ul data-dcnode-id="1429"><li data-dcnode-id="1438"><span data-dcnode-id="1441" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1439" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1440" instrument_node="">Adina Astra disappeared and likely died after the story ends, but she was briefly reunited with the spirit of her lover and finally viewed the Ghost Star.</span></span></li><li data-dcnode-id="1430"><span data-dcnode-id="1437" instrument_node=""> Also, the </span><a class="twikilink" data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FramingDevice" title="/pmwiki/pmwiki.php/Main/FramingDevice"><span data-dcnode-id="1436" instrument_node="">Framing Device</span></a><span data-dcnode-id="1434" instrument_node="">, if you've played the main game. "Lost Constellation" ends with Mae happy, Granddad alive, and everything seeming just peachy. </span><a class="twikilink" data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoomedByCanon" title="/pmwiki/pmwiki.php/Main/DoomedByCanon"><span data-dcnode-id="1433" instrument_node="">But we all know that won't last forever</span></a><span data-dcnode-id="1431" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1420"><span data-dcnode-id="1427" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallForward" title="/pmwiki/pmwiki.php/Main/CallForward"><span data-dcnode-id="1426" instrument_node="">Call-Forward</span></a><span data-dcnode-id="1424" instrument_node="">: Mae says that Granddad won't see her kids because she's going to have hound dogs instead. Granddad dies before the start of </span><em data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Night in the Woods</span></em><span data-dcnode-id="1421" instrument_node="">, so he isn't around when Mae's mother mistakenly thinks Mae is pregnant. The first two lines of the Prayer of the Forest God are one of the quotes that the player can choose for Granddad to have said before he died.</span></li><li data-dcnode-id="1413"><span data-dcnode-id="1419" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicHorrorStory" title="/pmwiki/pmwiki.php/Main/CosmicHorrorStory"><span data-dcnode-id="1418" instrument_node="">Cosmic Horror Story</span></a><span data-dcnode-id="1416" instrument_node="">: While seeking an audience with the Forest God, Adina finds out that </span><span class="spoiler" data-dcnode-id="1414" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1415" instrument_node="">he's been poisoned, and that is affecting her access to the frozen lake. He dies despite her efforts to thwart his poisoners, and she goes out onto the lake alone.</span></span></li><li data-dcnode-id="1408"><span data-dcnode-id="1412" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DevelopersForesight" title="/pmwiki/pmwiki.php/Main/DevelopersForesight"><span data-dcnode-id="1411" instrument_node="">Developers' Foresight</span></a><span data-dcnode-id="1409" instrument_node="">: At one point, there's a cliff you aren't supposed to cross yet. Not only is there unique dialogue for jumping off the cliff repeatedly, but there's also unique dialogue for using the game's ice physics to build up enough speed to jump to the other side before you're supposed to be there.</span></li><li data-dcnode-id="1400"><span data-dcnode-id="1407" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoomedByCanon" title="/pmwiki/pmwiki.php/Main/DoomedByCanon"><span data-dcnode-id="1406" instrument_node="">Doomed by Canon</span></a><span data-dcnode-id="1404" instrument_node="">: Granddad dies before the start of </span><em data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Night in the Woods</span></em><span data-dcnode-id="1401" instrument_node="">.</span></li><li data-dcnode-id="1395"><span data-dcnode-id="1399" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FramingDevice" title="/pmwiki/pmwiki.php/Main/FramingDevice"><span data-dcnode-id="1398" instrument_node="">Framing Device</span></a><span data-dcnode-id="1396" instrument_node="">: Adina's Adventure is a bedtime story that Granddad is telling to a younger Mae, during Longest Night.</span></li><li data-dcnode-id="1390"><span data-dcnode-id="1394" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FromTheMouthsOfBabes" title="/pmwiki/pmwiki.php/Main/FromTheMouthsOfBabes"><span data-dcnode-id="1393" instrument_node="">From the Mouths of Babes</span></a><span data-dcnode-id="1391" instrument_node="">: Mae's commentary on the tale is hilarious. Granddad is equally amused and tells her to never change.</span></li><li data-dcnode-id="1383"><span data-dcnode-id="1389" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumbleGoal" title="/pmwiki/pmwiki.php/Main/HumbleGoal"><span data-dcnode-id="1388" instrument_node="">Humble Goal</span></a><span data-dcnode-id="1386" instrument_node="">: Adina only wanted to </span><span class="spoiler" data-dcnode-id="1384" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1385" instrument_node="">see her dead lover again and find the Star where all souls go to after death.</span></span></li><li data-dcnode-id="1378"><span data-dcnode-id="1382" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane" title="/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane"><span data-dcnode-id="1381" instrument_node="">Maybe Magic, Maybe Mundane</span></a><span data-dcnode-id="1379" instrument_node="">: Grandpa lampshades this when Mae asks him if the tale really happened. He says if it could have, but it happened a long time ago regardless.</span></li><li data-dcnode-id="1370"><span data-dcnode-id="1377" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OlderThanTheyLook" title="/pmwiki/pmwiki.php/Main/OlderThanTheyLook"><span data-dcnode-id="1376" instrument_node="">Older Than They Look</span></a><span data-dcnode-id="1374" instrument_node="">: The child kidnapped by the Huncher. After the Huncher </span><span class="spoiler" data-dcnode-id="1372" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1373" instrument_node=""> is killed by the Forest God for poisoning it</span></span><span data-dcnode-id="1371" instrument_node=""> she says, "Until a few minutes ago, I was younger than you" and begins speaking to Adina using terms like "child".</span></li><li data-dcnode-id="1365"><span data-dcnode-id="1369" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NightmareFetishist" title="/pmwiki/pmwiki.php/Main/NightmareFetishist"><span data-dcnode-id="1368" instrument_node="">Nightmare Fetishist</span></a><span data-dcnode-id="1366" instrument_node="">: Mae is really into the tale, especially when ghosts and severed body parts are involved.</span></li><li data-dcnode-id="1357"><span data-dcnode-id="1364" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="1363" instrument_node="">"The Reason You Suck" Speech</span></a><span data-dcnode-id="1361" instrument_node="">: Adina gives one to the Forest God, who is angry that Brown told Adina it was sick. The Forest God threatens Brown but Adina says she won't allow Brown to be hurt, and that he's a good man, something the Forest God doesn't understand. She then calls the God a big dumb animal before bluntly telling him he's going to die </span><span class="spoiler" data-dcnode-id="1359" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1360" instrument_node=""> because he was poisoned by the Huncher</span></span><span data-dcnode-id="1358" instrument_node="">.</span></li><li data-dcnode-id="1352"><span data-dcnode-id="1356" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewDestiny" title="/pmwiki/pmwiki.php/Main/ScrewDestiny"><span data-dcnode-id="1355" instrument_node="">Screw Destiny</span></a><span data-dcnode-id="1353" instrument_node="">: Adina points out to the cat that she survived her encounter with the Forest God, when the cat predicted she would die. He goes "meh" about it since he has been there more times than Adina and has never died. Though it's possible he meant a figurative death, as the story is about Adina moving on.</span></li><li data-dcnode-id="1347"><span data-dcnode-id="1351" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SnowMeansDeath" title="/pmwiki/pmwiki.php/Main/SnowMeansDeath"><span data-dcnode-id="1350" instrument_node="">Snow Means Death</span></a><span data-dcnode-id="1348" instrument_node="">: A cat warns Adina that if she goes into the woods, she will die. It's snowing hard, and much harder when she reaches the Forest God's realm. Adina almost freezes to death because of the Huncher, the same way the Huncher's twin sister died in a frozen pond.</span></li><li data-dcnode-id="1342"><span data-dcnode-id="1346" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooGoodForThisSinfulEarth" title="/pmwiki/pmwiki.php/Main/TooGoodForThisSinfulEarth"><span data-dcnode-id="1345" instrument_node="">Too Good for This Sinful Earth</span></a><span data-dcnode-id="1343" instrument_node="">: Godtender Brown. He stays out in the blizzard, greeting travelers who want to see the Forest God, whom he is very loyal to. He is torn about how the Forest God is sick and feels useless because he can't help, though he doesn't know that the God doesn't care about him in the same way.</span></li></ul></div><hr data-dcnode-id="1339"><p data-dcnode-id="1338"></p><div class="indent" data-dcnode-id="1324"><em data-dcnode-id="1325"><a class="twikilink" data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnexpectedGameplayChange" title="/pmwiki/pmwiki.php/Main/UnexpectedGameplayChange"><span data-dcnode-id="1337" instrument_node="">I just wanna die anywhere else</span></a><span data-dcnode-id="1335" instrument_node=""> </span><br data-dcnode-id="1334"><a class="twikilink" data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathSong" title="/pmwiki/pmwiki.php/Main/DeathSong"><span data-dcnode-id="1333" instrument_node="">If only I could die anywhere else </span><br data-dcnode-id="1332"><span data-dcnode-id="1331" instrument_node="">So come with me, let's die anywhere else </span><br data-dcnode-id="1330"><span data-dcnode-id="1329" instrument_node="">Anywhere... </span><br data-dcnode-id="1328"><span data-dcnode-id="1327" instrument_node="">Just not here...</span></a></em></div><hr data-dcnode-id="1323"><span data-dcnode-id="1322" instrument_node="">
