her life and respect them</span></span><span data-dcnode-id="4536" instrument_node="">.</span></li><li data-dcnode-id="4530"><span data-dcnode-id="4534" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CheatedAngle" title="/pmwiki/pmwiki.php/Main/CheatedAngle"><span data-dcnode-id="4533" instrument_node="">Cheated Angle</span></a><span data-dcnode-id="4531" instrument_node="">: Due to the game's art style, this happens with any character who is a fox, reptile or a bird (Bea, Gregg and Germ being prominent examples), their features (beaks, snouts, etc.) are facing left or right, depending on where they stand. But their eyes just turn to the screen when they have to face forwards. Mae and Angus are aversions, since they are shown from a front angle in promotional art.</span></li><li data-dcnode-id="4516"><span data-dcnode-id="4529" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChekhovsGun" title="/pmwiki/pmwiki.php/Main/ChekhovsGun"><span data-dcnode-id="4528" instrument_node="">Chekhov's Gun</span></a><span data-dcnode-id="4526" instrument_node="">:</span><ul data-dcnode-id="4517"><li data-dcnode-id="4522"><span data-dcnode-id="4525" instrument_node=""> The abandoned mine shafts in town. </span><span class="spoiler" data-dcnode-id="4523" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4524" instrument_node="">Mae and her friends find out that the cult sacrifices people there. Also it's where the cult dies, thanks to Angus causing a cave-in to save Mae.</span></span></li><li data-dcnode-id="4518"><span data-dcnode-id="4521" instrument_node=""> A mine shaft elevator. </span><span class="spoiler" data-dcnode-id="4519" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4520" instrument_node="">When the injured cultist comes up in the elevator and attacks Mae, who's been injured and unable to move properly, Angus weaponizes the lever to send the elevator straight down to the bottom. The impact crushes the cultist's head and severs his arm.</span></span></li></ul></li><li data-dcnode-id="4509"><span data-dcnode-id="4515" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChekhovsGunman" title="/pmwiki/pmwiki.php/Main/ChekhovsGunman"><span data-dcnode-id="4514" instrument_node="">Chekhov's Gunman</span></a><span data-dcnode-id="4512" instrument_node="">: Germ, the only fan of the gang's band. </span><span class="spoiler" data-dcnode-id="4510" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4511" instrument_node="">The opening that Mae finds while climbing out of the mine leads to a well in Germ's backyard. He gets some rope to pull the others out, and dynamite to block the entrance.</span></span></li><li data-dcnode-id="4501"><span data-dcnode-id="4508" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChekhovsSkill" title="/pmwiki/pmwiki.php/Main/ChekhovsSkill"><span data-dcnode-id="4507" instrument_node="">Chekhov's Skill</span></a><span data-dcnode-id="4505" instrument_node="">: Mae's ability to jump and climb, which is revealed at the beginning of the game. </span><span class="spoiler" data-dcnode-id="4503" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4504" instrument_node="">Despite suffering a nasty head injury, she manages to jump to an opening in the climax, so that her friends can escape the mine shaft</span></span><span data-dcnode-id="4502" instrument_node="">.</span></li><li data-dcnode-id="4490"><span data-dcnode-id="4500" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClandestineChemist" title="/pmwiki/pmwiki.php/Main/ClandestineChemist"><span data-dcnode-id="4499" instrument_node="">Clandestine Chemist</span></a><span data-dcnode-id="4497" instrument_node="">: Implied to be the case with </span><span class="spoiler" data-dcnode-id="4495" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4496" instrument_node=""> your missing / deceased friend Casey</span></span><span data-dcnode-id="4494" instrument_node="">, as one of </span><span class="spoiler" data-dcnode-id="4492" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4493" instrument_node=""> his murderers</span></span><span data-dcnode-id="4491" instrument_node=""> refers to him cooking up meth with a cousin.</span></li><li data-dcnode-id="4476"><span data-dcnode-id="4489" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColonCancer" title="/pmwiki/pmwiki.php/Main/ColonCancer"><span data-dcnode-id="4488" instrument_node="">Colon Cancer</span></a><span data-dcnode-id="4486" instrument_node="">: The </span><a class="twikilink" data-dcnode-id="4484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameWithinAGame" title="/pmwiki/pmwiki.php/Main/GameWithinAGame"><span data-dcnode-id="4485" instrument_node="">Game Within a Game</span></a><span data-dcnode-id="4483" instrument_node=""> that Mae can play is a </span><a class="twikilink" data-dcnode-id="4481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Roguelike" title="/pmwiki/pmwiki.php/Main/Roguelike"><span data-dcnode-id="4482" instrument_node="">roguelike</span></a><span data-dcnode-id="4480" instrument_node=""> entitled </span><em data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">Ancient Doom Spire: Demontower: Part IV - Slaughter of the Blood Thief</span></em><span data-dcnode-id="4477" instrument_node="">.</span></li><li data-dcnode-id="4471"><span data-dcnode-id="4475" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColorCodedForYourConvenience" title="/pmwiki/pmwiki.php/Main/ColorCodedForYourConvenience"><span data-dcnode-id="4474" instrument_node="">Color-Coded for Your Convenience</span></a><span data-dcnode-id="4472" instrument_node="">: The dialogue text of key characters are color coded. Gregg is yellow, Bea is blue, Angus is red, and Germ is green. It's especially handy in later scenes where there's a lot of walking in very dark areas.</span></li><li data-dcnode-id="4451"><span data-dcnode-id="4470" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ComicallyMissingThePoint" title="/pmwiki/pmwiki.php/Main/ComicallyMissingThePoint"><span data-dcnode-id="4469" instrument_node="">Comically Missing the Point</span></a><span data-dcnode-id="4467" instrument_node="">: Mae does this at times.</span><div class="indent" data-dcnode-id="4463"><strong data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">Mae:</span></strong><span data-dcnode-id="4464" instrument_node=""> Our eyes evolved to notice movement.</span></div><div class="indent" data-dcnode-id="4456"><strong data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">Bea:</span></strong><span data-dcnode-id="4460" instrument_node=""> Like </span><a class="twikilink" data-dcnode-id="4458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/JurassicPark" title="/pmwiki/pmwiki.php/Film/JurassicPark"><span data-dcnode-id="4459" instrument_node="">dinosaurs</span></a><span data-dcnode-id="4457" instrument_node="">?</span></div><div class="indent" data-dcnode-id="4452"><strong data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">Mae:</span></strong><span data-dcnode-id="4453" instrument_node=""> If the dinosaur is moving!</span></div></li><li data-dcnode-id="4427"><span data-dcnode-id="4450" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ConversationalTroping" title="/pmwiki/pmwiki.php/Main/ConversationalTroping"><span data-dcnode-id="4449" instrument_node="">Conversational Troping</span></a><span data-dcnode-id="4447" instrument_node="">: </span><a class="twikilink" data-dcnode-id="4445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InvokedTrope" title="/pmwiki/pmwiki.php/Main/InvokedTrope"><span data-dcnode-id="4446" instrument_node="">Invoked</span></a><span data-dcnode-id="4444" instrument_node=""> by Mae during a conversation with Aunt Molly, a policewoman.</span><div class="indent" data-dcnode-id="4428"><strong data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">Mae:</span></strong><span data-dcnode-id="4441" instrument_node=""> Are you </span><em data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">trying</span></em><span data-dcnode-id="4438" instrument_node=""> to kick off a horror movie?! </span><a class="twikilink" data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotNowKiddo" title="/pmwiki/pmwiki.php/Main/NotNowKiddo"><span data-dcnode-id="4437" instrument_node="">Nobody believes the girl who saw a ghost!</span></a><span data-dcnode-id="4435" instrument_node=""> Well, I've got bad news for you: </span><a class="twikilink" data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorruptHick" title="/pmwiki/pmwiki.php/Main/CorruptHick"><span data-dcnode-id="4434" instrument_node="">the cop</span></a><span data-dcnode-id="4432" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PoliceAreUseless" title="/pmwiki/pmwiki.php/Main/PoliceAreUseless"><span data-dcnode-id="4431" instrument_node="">always dies</span></a><span data-dcnode-id="4429" instrument_node="">!</span></div></li><li data-dcnode-id="4419"><span data-dcnode-id="4426" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CordonBleughChef" title="/pmwiki/pmwiki.php/Main/CordonBleughChef"><span data-dcnode-id="4425" instrument_node="">Cordon Bleugh Chef</span></a><span data-dcnode-id="4423" instrument_node="">: Mae can pick up all sorts of bizarre ingredients at the grocery store. Both Bea and her dad can comment on how awful her choices are. Subverted if Mae makes the "correct" choice of ingredients for dinner, which is a bit of a </span><a class="twikilink" data-dcnode-id="4421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="4422" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="4420" instrument_node=""> if you want to get the "Accidentally Good Dinner" achievement (see below).</span></li><li data-dcnode-id="4412"><span data-dcnode-id="4418" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicHorrorStory" title="/pmwiki/pmwiki.php/Main/CosmicHorrorStory"><span data-dcnode-id="4417" instrument_node="">Cosmic Horror Story</span></a><span data-dcnode-id="4415" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4413" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4414" instrument_node="">What the game eventually turns out to be as soon as the Black Goat stuff comes up. Mae also meets a strange entity in her dreams that appears to be godlike.</span></span></li><li data-dcnode-id="4398"><span data-dcnode-id="4411" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrystalDragonJesus" title="/pmwiki/pmwiki.php/Main/CrystalDragonJesus"><span data-dcnode-id="4410" instrument_node="">Crystal Dragon Jesus</span></a><span data-dcnode-id="4408" instrument_node="">: Sort of, and sort of an </span><a class="twikilink" data-dcnode-id="4406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterfaithSmoothie" title="/pmwiki/pmwiki.php/Main/InterfaithSmoothie"><span data-dcnode-id="4407" instrument_node="">Interfaith Smoothie</span></a><span data-dcnode-id="4405" instrument_node="">. Popes and Sunday School at church exist, as do Halloween and Easter (but not Christmas, which is replaced with "</span><a class="twikilink" data-dcnode-id="4403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouMeanXmas" title="/pmwiki/pmwiki.php/Main/YouMeanXmas"><span data-dcnode-id="4404" instrument_node="">Longest Night</span></a><span data-dcnode-id="4402" instrument_node="">", some sort of winter solstice festival), and a video cover associates crosses with a priest. Yet, despite having a statue out of a pope outside, Mae's church has the primary symbol of an eight-pointed star and a female pastor who refers to God with the gender-neutral pronoun "They". A local "Virgin Mary"-style shrine also has a flame symbol on it. Mae got in trouble at Sunday School for getting mad about the story of the Broken Snake, the first thing that talked. One of their Saints is known to breathe fire </span><a class="twikilink" data-dcnode-id="4400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImAHumanitarian" title="/pmwiki/pmwiki.php/Main/ImAHumanitarian"><span data-dcnode-id="4401" instrument_node="">and eat people</span></a><span data-dcnode-id="4399" instrument_node="">... okay, that last one is disprovable by historical records. Except the last part.</span></li><li data-dcnode-id="4387"><span data-dcnode-id="4397" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CutHisHeartOutWithASpoon" title="/pmwiki/pmwiki.php/Main/CutHisHeartOutWithASpoon"><span data-dcnode-id="4396" instrument_node="">Cut His Heart Out with a Spoon</span></a><span data-dcnode-id="4394" instrument_node="">: While robbing an abandoned </span><a class="twikilink" data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuckECheeses" title="/pmwiki/pmwiki.php/Main/SuckECheeses"><span data-dcnode-id="4393" instrument_node="">Suck E. Cheese's</span></a><span data-dcnode-id="4391" instrument_node=""> store (Food Donkey), Mae finally gets fed up with Steve Scriggins being a </span><a class="twikilink" data-dcnode-id="4389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Jerkass" title="/pmwiki/pmwiki.php/Main/Jerkass"><span data-dcnode-id="4390" instrument_node="">Jerkass</span></a><span data-dcnode-id="4388" instrument_node="">, telling him, "Scriggins! Bite my entire ass! Go legally brain dead from lack of oxygen due to choking on my entire ass!"</span></li><li data-dcnode-id="4382"><span data-dcnode-id="4386" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkAndTroubledPast" title="/pmwiki/pmwiki.php/Main/DarkAndTroubledPast"><span data-dcnode-id="4385" instrument_node="">Dark and Troubled Past</span></a><span data-dcnode-id="4383" instrument_node="">: Nearly every character has one. Gregg is the only one of the main cast without any explicit baggage in his past, and it turns out even he has a pretty meaty traumatic incident he's never talked about.</span></li><li data-dcnode-id="4372"><span data-dcnode-id="4381" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkReprise" title="/pmwiki/pmwiki.php/Main/DarkReprise"><span data-dcnode-id="4380" instrument_node="">Dark Reprise</span></a><span data-dcnode-id="4378" instrument_node="">:</span><ul data-dcnode-id="4373"><li data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node=""> A somber, heavier version of "Die Anywhere Else" plays towards the end of Bea's final outing, "Proximity".</span></li><li data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node=""> "Shapes", which plays when Mae is discussing her violent breakdown, is a slower and more somber version of songs that play whenever she's being overly destructive, such as "Clanky Must Die" and "I'm Going to Break Something".</span></li></ul></li><li data-dcnode-id="4365"><span data-dcnode-id="4371" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathByIrony" title="/pmwiki/pmwiki.php/Main/DeathByIrony"><span data-dcnode-id="4370" instrument_node="">Death by Irony</span></a><span data-dcnode-id="4368" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4366" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4367" instrument_node="">When Mae and her friends leave the mines the cultists force Gregg to leave his crossbow behind. Later, Eide attacks Mae in the elevator, forcing Angus to use the lever to kill him. The elevator crashing leads to a cave-in either killing the entire cult or trapping them to starve or suffocate. If Gregg still had his crossbow he probably could have just shot Eide and the cultists could have survived.</span></span></li><li data-dcnode-id="4352"><span data-dcnode-id="4364" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathSeeker" title="/pmwiki/pmwiki.php/Main/DeathSeeker"><span data-dcnode-id="4363" instrument_node="">Death Seeker</span></a><span data-dcnode-id="4361" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4353" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4360" instrument_node="">After suffering a nasty head injury, and realizing that her fear of the "ghost" was entirely rational and led to her friends being endangered, Mae goes </span><em data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">back</span></em><span data-dcnode-id="4357" instrument_node=""> to the mine shaft to confront the strange figure. Given her saying </span><a class="twikilink" data-dcnode-id="4355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItsAllMyFault" title="/pmwiki/pmwiki.php/Main/ItsAllMyFault"><span data-dcnode-id="4356" instrument_node="">It's All My Fault</span></a><span data-dcnode-id="4354" instrument_node=""> and quietly saying "I love you" to her sleeping friends, it's highly likely that Mae thought she was going to die.</span></span></li><li data-dcnode-id="4344"><span data-dcnode-id="4351" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DelayedDiagnosis" title="/pmwiki/pmwiki.php/Main/DelayedDiagnosis"><span data-dcnode-id="4350" instrument_node="">Delayed Diagnosis</span></a><span data-dcnode-id="4348" instrument_node="">: Played with in that Mae never gets an actual diagnosis, but after the incident where she </span><span class="spoiler" data-dcnode-id="4346" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4347" instrument_node="">beat Andy Cullen with a bat during a mental breakdown</span></span><span data-dcnode-id="4345" instrument_node=""> six years prior, she went to Dr. Hank, who is terrible at dealing with mental health issues. All he gave her was a journal, which she admits isn't really much help.</span></li><li data-dcnode-id="4336"><span data-dcnode-id="4343" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DevelopersForesight" title="/pmwiki/pmwiki.php/Main/DevelopersForesight"><span data-dcnode-id="4342" instrument_node="">Developers' Foresight</span></a><span data-dcnode-id="4340" instrument_node="">: Often if you don't trigger certain conversations, later dialogue will reflect that. For instance, if you don't talk to Mae's mom on Halloween, </span><span class="spoiler" data-dcnode-id="4338" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4339" instrument_node="">you never get into the argument with her</span></span><span data-dcnode-id="4337" instrument_node="">, so later conversations with her and Mae's dad reflect that change.</span></li><li data-dcnode-id="4331"><span data-dcnode-id="4335" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiegeticSoundtrackUsage" title="/pmwiki/pmwiki.php/Main/DiegeticSoundtrackUsage"><span data-dcnode-id="4334" instrument_node="">Diegetic Soundtrack Usage</span></a><span data-dcnode-id="4332" instrument_node="">: Saleem is a violinist who can be found playing along with the background music on a roof in Towne Centre.</span></li><li data-dcnode-id="4312"><span data-dcnode-id="4330" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DickDastardlyStopsToCheat" title="/pmwiki/pmwiki.php/Main/DickDastardlyStopsToCheat"><span data-dcnode-id="4329" instrument_node="">Dick Dastardly Stops to Cheat</span></a><span data-dcnode-id="4327" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4313" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4326" instrument_node=""> At the climax, a member of the </span><a class="twikilink" data-dcnode-id="4324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="4325" instrument_node="">Big Bad</span></a><span data-dcnode-id="4323" instrument_node="">'s team ends up </span><a class="twikilink" data-dcnode-id="4321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpannerInTheWorks" title="/pmwiki/pmwiki.php/Main/SpannerInTheWorks"><span data-dcnode-id="4322" instrument_node="">accidentally screwing over every other bad guy</span></a><span data-dcnode-id="4320" instrument_node=""> thanks to </span><a class="twikilink" data-dcnode-id="4318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RevengeBeforeReason" title="/pmwiki/pmwiki.php/Main/RevengeBeforeReason"><span data-dcnode-id="4319" instrument_node="">a misguided attempt at vengeance</span></a><span data-dcnode-id="4317" instrument_node="">. The Cult of the Black Goat would have gotten away with everything if Eide didn't just have to have his revenge for getting shot in the shoulder by Gregg. Because Eide attacked Mae, not only did Eide </span><a class="twikilink" data-dcnode-id="4315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnArmAndALeg" title="/pmwiki/pmwiki.php/Main/AnArmAndALeg"><span data-dcnode-id="4316" instrument_node="">get his arm lopped off by a falling elevator</span></a><span data-dcnode-id="4314" instrument_node=""> (most likely bleeding to death as a result), he trapped himself and the other cultists at the bottom of the mineshaft with no way out. And this was after explicit orders by the rest of the villain's allies to just let it go.</span></span></li><li data-dcnode-id="4300"><span data-dcnode-id="4311" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DidYouJustFlipOffCthulhu" title="/pmwiki/pmwiki.php/Main/DidYouJustFlipOffCthulhu"><span data-dcnode-id="4310" instrument_node="">Did You Just Flip Off Cthulhu?</span></a><span data-dcnode-id="4308" instrument_node="">:</span><div class="indent" data-dcnode-id="4301"><strong data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">Mae:</span></strong><span data-dcnode-id="4305" instrument_node=""> Oh shut up already. I know this won't save me in the end. But I don't need it to save me forever. I just need it to save me now. So if you're gonna kill me right here, then do it. If not- (to </span><span class="spoiler" data-dcnode-id="4303" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4304" instrument_node="">the Black Goat</span></span><span data-dcnode-id="4302" instrument_node="">).</span></div></li><li data-dcnode-id="4292"><span data-dcnode-id="4299" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DisneyAcidSequence" title="/pmwiki/pmwiki.php/Main/DisneyAcidSequence"><span data-dcnode-id="4298" instrument_node="">Disney Acid Sequence</span></a><span data-dcnode-id="4296" instrument_node="">: Mae's dreams get trippier and trippier about Possum Springs falling further into ruin with each dream. In the </span><em data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">Weird Autumn Edition</span></em><span data-dcnode-id="4293" instrument_node="">, both the band practices and the guitar-playing in Mae's room are kind of in space, with the "Pumpkin Head Guy" video in the former getting creepy visuals, and the latter's songs showing Mae floating and playing guitar in space with trippy visuals around her.</span></li><li data-dcnode-id="4265"><span data-dcnode-id="4291" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoesThisRemindYouOfAnything" title="/pmwiki/pmwiki.php/Main/DoesThisRemindYouOfAnything"><span data-dcnode-id="4290" instrument_node="">Does This Remind You of Anything?</span></a><span data-dcnode-id="4288" instrument_node="">:</span><ul data-dcnode-id="4266"><li data-dcnode-id="4277"><span data-dcnode-id="4287" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4285" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4286" instrument_node="">The cult's willingness to sacrifice those who "won't be missed" to the Black Goat, in order to cling to whatever prosperity they have left,</span></span><span data-dcnode-id="4284" instrument_node=""> is a pretty blatant allegory for real-life people willing to throw minorities and outcasts under the bus for the same reason. This is </span><a class="twikilink" data-dcnode-id="4282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="4283" instrument_node="">noted by the characters</span></a><span data-dcnode-id="4281" instrument_node="">, one of whom outright calls them </span><span class="spoiler" data-dcnode-id="4279" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4280" instrument_node="">a death cult of conservative uncles</span></span><span data-dcnode-id="4278" instrument_node="">.</span></li><li data-dcnode-id="4269"><span data-dcnode-id="4276" instrument_node=""> Also with religion being a heavy theme throughout the story, </span><span class="spoiler" data-dcnode-id="4274" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4275" instrument_node=""> the cult</span></span><span data-dcnode-id="4273" instrument_node=""> may also be seen as an allegory of religious extremist groups who </span><span class="spoiler" data-dcnode-id="4271" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4272" instrument_node=""> kill innocent people</span></span><span data-dcnode-id="4270" instrument_node=""> in order to please a spiritual power and achieve personal gains.</span></li><li data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node=""> When Mae first encounters the City Council, they discuss the issue on what to do with a statue of a war soldier (most likely Mae's ancestor), whether they should keep it or take it down for the sake of funding or attracting new businesses. This could be reminiscent on the issue on what to do with the Confederate statues or flags in the aftermath of the Charleston church shooting in 2015.</span></li></ul></li><li data-dcnode-id="4246"><span data-dcnode-id="4264" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DontGoInTheWoods" title="/pmwiki/pmwiki.php/Main/DontGoInTheWoods"><span data-dcnode-id="4263" instrument_node="">Don't Go in the Woods</span></a><span data-dcnode-id="4261" instrument_node="">: At first, the woods seem creepy but harmless, local teens even throwing parties there. You </span><em data-dcnode-id="4259"><span data-dcnode-id="4260" instrument_node="">definitely</span></em><span data-dcnode-id="4258" instrument_node=""> don't want to go in them alone, or go too deep into them, however. </span><span class="spoiler" data-dcnode-id="4256" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4257" instrument_node="">Or you just might get kidnapped and sacrificed by a cult...</span></span><ul data-dcnode-id="4247"><li data-dcnode-id="4248"><span data-dcnode-id="4255" instrument_node=""> The titular woods are home to a incorporeal, teleporting, kidnapping entity that begins to stalk </span><a class="twikilink" data-dcnode-id="4253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerCharacter" title="/pmwiki/pmwiki.php/Main/PlayerCharacter"><span data-dcnode-id="4254" instrument_node="">Mae</span></a><span data-dcnode-id="4252" instrument_node=""> once she becomes aware of it, and is later shown to be </span><span class="spoiler" data-dcnode-id="4250" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4251" instrument_node=""> a member of a murderous cult that was empowered by their eldritch god</span></span><span data-dcnode-id="4249" instrument_node="">.</span></li></ul></li><li data-dcnode-id="4241"><span data-dcnode-id="4245" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DotingGrandparent" title="/pmwiki/pmwiki.php/Main/DotingGrandparent"><span data-dcnode-id="4244" instrument_node="">Doting Grandparent</span></a><span data-dcnode-id="4242" instrument_node="">: Mae's late grandfather was this. What little we see of their relationship makes it clear he adored Mae, and he frequently indulged her love for gruesome horror stories, a love he shared. Mae obviously still misses him, though she prefers to dwell on the good parts of their relationship.</span></li><li data-dcnode-id="4231"><span data-dcnode-id="4240" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DugTooDeep" title="/pmwiki/pmwiki.php/Main/DugTooDeep"><span data-dcnode-id="4239" instrument_node="">Dug Too Deep</span></a><span data-dcnode-id="4237" instrument_node="">: Implicitly; the town used to be a mining town, but incidents of subterranean gas causing hallucinations eventually shut it down. </span><span class="spoiler" data-dcnode-id="4232" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4236" instrument_node=""> Around the same time a cult surrounding the deepest pit in the mines sprung up, under the belief that in it rested an </span><a class="twikilink" data-dcnode-id="4234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="4235" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="4233" instrument_node=""> that demanded human sacrifice. It's ambiguous if it actually exists or it's just more hallucinations.</span></span></li><li data-dcnode-id="4224"><span data-dcnode-id="4230" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DyingAlone" title="/pmwiki/pmwiki.php/Main/DyingAlone"><span data-dcnode-id="4229" instrument_node="">Dying Alone</span></a><span data-dcnode-id="4227" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4225" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4226" instrument_node=""> Invoked. The cult specifically targets people who have never stood out and won't be missed.</span></span></li><li data-dcnode-id="4214"><span data-dcnode-id="4223" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DyingTown" title="/pmwiki/pmwiki.php/Main/DyingTown"><span data-dcnode-id="4222" instrument_node="">Dying Town</span></a><span data-dcnode-id="4220" instrument_node="">: Ever since the mines closed down, Possum Springs has seen better days. There's a lack of jobs, a lot of people are leaving town, no money's coming in, and the citizens seem to accept it all as fatalistic fact that their lives are getting worse. </span><span class="spoiler" data-dcnode-id="4215" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4219" instrument_node="">The end of the game talks about it in a </span><a class="twikilink" data-dcnode-id="4217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicHorrorStory" title="/pmwiki/pmwiki.php/Main/CosmicHorrorStory"><span data-dcnode-id="4218" instrument_node="">Cosmic Horror Story</span></a><span data-dcnode-id="4216" instrument_node=""> sense; if the Black Goat doesn't get sacrifices, the town will be abandoned, nothing will grow, and everyone will die.</span></span></li><li data-dcnode-id="4206"><span data-dcnode-id="4213" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DysfunctionJunction" title="/pmwiki/pmwiki.php/Main/DysfunctionJunction"><span data-dcnode-id="4212" instrument_node="">Dysfunction Junction</span></a><span data-dcnode-id="4210" instrument_node="">: All four main characters are dealing with traumas from their past, are unhappy with some aspects of their lives, have to deal with </span><a class="twikilink" data-dcnode-id="4208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdultFear" title="/pmwiki/pmwiki.php/Main/AdultFear"><span data-dcnode-id="4209" instrument_node="">Adult Fear</span></a><span data-dcnode-id="4207" instrument_node=""> and some of them being outright stated to have mental disorders. The rest of the town is also like this; no one seems to be happy, and a lot of people are frustrated at various things.</span></li><li data-dcnode-id="4165"><span data-dcnode-id="4205" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Eagleland" title="/pmwiki/pmwiki.php/Main/Eagleland"><span data-dcnode-id="4204" instrument_node="">Eagleland</span></a><span data-dcnode-id="4202" instrument_node="">: While the location of Possum Springs is never specified, there are many names, objects and details which heavily hint that Possum Springs is located somewhere near </span><a class="twikilink" data-dcnode-id="4200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Pittsburgh" title="/pmwiki/pmwiki.php/UsefulNotes/Pittsburgh"><span data-dcnode-id="4201" instrument_node="">Pittsburgh</span></a><span data-dcnode-id="4199" instrument_node="">, Pennsylvania.</span><ul data-dcnode-id="4166"><li data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node=""> Possum Springs was originally a mining town, a heavy industry in Pennsylvania and Appalachia in general.</span></li><li data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node=""> It's located in "Deep Hollow County". There's a Deep Hollow stream in a mining area in Pennsylvania.</span></li><li data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node=""> The last name of Borowski and references to "the old country" implies an Eastern European heritage; PA has a large demographic of Eastern European immigrants and descendants.</span></li><li data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node=""> The Snack Falcon and its logo somewhat resembles Wawa, a popular chain of convenience stores in PA.</span></li><li data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node=""> The local football team is named the "Smelters," and the logo is very similar to that of the Pittsburgh Steelers.</span></li><li data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node=""> There's an issue with sinkholes in Possum Springs, caving in and destroying houses from the underground mines. The almost ghost town of Centralia, PA has been partially destroyed by sinkholes caused by an underground coal mine fire that's been burning continuously since 1962.</span></li><li data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node=""> Pierogies are a popular food in the game as they are in the real life Pittsburgh area.</span></li><li data-dcnode-id="4179"><span data-dcnode-id="4184" instrument_node=""> Bea mentions that the library that she and Mae visit is one of the nicer ones around, and that it was funded by "some rich guy" back in the day, mirroring the </span><a class="urllink" data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carnegie_library"><span data-dcnode-id="4183" instrument_node="">Carnegie Libraries</span><img data-dcnode-id="4182" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="4180" instrument_node="">; Andrew Carnegie helped establish over 2,500 libraries, and the first American one was in Pittsburgh.</span></li><li data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node=""> Mae can meet a Russian hiker passing through on the Great Deciduous Trail, which is apparently one of the National Scenic Trails. Both the Appalachian and North Country Trail pass through Pennsylvania, the latter going through the greater Pittsburgh area.</span></li><li data-dcnode-id="4175"><span data-dcnode-id="4176" instrument_node=""> Barnstars, horseshoe-like objects thought to bring good luck that are especially common in Pennsylvania, are featured on a couple of background houses.</span></li><li data-dcnode-id="4167"><span data-dcnode-id="4174" instrument_node=""> The places that Possum Springs </span><em data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">can't</span></em><span data-dcnode-id="4171" instrument_node=""> be are Idaho, as Mae mentions to Rabies her dream of moving to a farm there, anywhere on the West Coast, since Selmers references it (and Silicon Valley in particular) as being far away, or west of the Midwest in general, since if Mae hung out with Bea enough, in the epilogue the two talk about planning a road trip "out west to where the land gets flat" (most likely the Great Plains) and seeing </span><a class="twikilink" data-dcnode-id="4169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FictionalCounterpart" title="/pmwiki/pmwiki.php/Main/FictionalCounterpart"><span data-dcnode-id="4170" instrument_node="">Fictional Counterpart</span></a><span data-dcnode-id="4168" instrument_node=""> versions of some of the Midwest's well-known tourist traps and roadside attractions.</span></li></ul></li><li data-dcnode-id="4154"><span data-dcnode-id="4164" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarNotch" title="/pmwiki/pmwiki.php/Main/EarNotch"><span data-dcnode-id="4163" instrument_node="">Ear Notch</span></a><span data-dcnode-id="4161" instrument_node="">: Mae has a couple small nicks in her left ear, which is appropriate given her history of violence and recklessness (she claims it was from a </span><a class="twikilink" data-dcnode-id="4159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FurryConfusion" title="/pmwiki/pmwiki.php/Main/FurryConfusion"><span data-dcnode-id="4160" instrument_node="">dog bite</span></a><span data-dcnode-id="4158" instrument_node="">). Two of Germ's friends (the ones who </span><em data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">have</span></em><span data-dcnode-id="4155" instrument_node=""> ears; the third is a bird) have more prominent ones.</span></li><li data-dcnode-id="4140"><span data-dcnode-id="4153" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EasyLevelTrick" title="/pmwiki/pmwiki.php/Main/EasyLevelTrick"><span data-dcnode-id="4152" instrument_node="">Easy Level Trick</span></a><span data-dcnode-id="4150" instrument_node="">: The boss of </span><em data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">Demontower's</span></em><span data-dcnode-id="4147" instrument_node=""> Leafy Graves is quite challenging. However, its arena is guaranteed to have a patch of spikes in the upper left corner — </span><a class="twikilink" data-dcnode-id="4145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialStupidity" title="/pmwiki/pmwiki.php/Main/ArtificialStupidity"><span data-dcnode-id="4146" instrument_node="">spikes that can eventually kill the boss when it repeatedly lands on top of them</span></a><span data-dcnode-id="4144" instrument_node="">. All the player has to do is clean out any other enemies that spawn and dash-deflect the boss' knives (preferably against a wall to avoid </span><a class="twikilink" data-dcnode-id="4142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CollisionDamage" title="/pmwiki/pmwiki.php/Main/CollisionDamage"><span data-dcnode-id="4143" instrument_node="">Collision Damage</span></a><span data-dcnode-id="4141" instrument_node="">).</span></li><li data-dcnode-id="4135"><span data-dcnode-id="4139" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Egging" title="/pmwiki/pmwiki.php/Main/Egging"><span data-dcnode-id="4138" instrument_node="">Egging</span></a><span data-dcnode-id="4136" instrument_node="">: Mae has done this, among her list of other petty crimes.</span></li><li data-dcnode-id="4121"><span data-dcnode-id="4134" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="4133" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="4131" instrument_node="">:</span><ul data-dcnode-id="4122"><li data-dcnode-id="4127"><span data-dcnode-id="4130" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4128" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4129" instrument_node=""> The Black Goat. It's described as being "black like the black between the stars," and its mere existence in this reality is causing the complete corruption of Possum Springs.</span></span></li><li data-dcnode-id="4123"><span data-dcnode-id="4126" instrument_node=""> Also, </span><span class="spoiler" data-dcnode-id="4124" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4125" instrument_node="">the God-Cat in Mae's dream. It exists contemporaneously with all of space and time, observes time as if all events are happening at once, speaks of a hole growing in all things, and shows Mae blind, twitching creatures at the edge of reality.</span></span></li></ul></li><li data-dcnode-id="4116"><span data-dcnode-id="4120" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ElectricSlide" title="/pmwiki/pmwiki.php/Main/ElectricSlide"><span data-dcnode-id="4119" instrument_node="">Electric Slide</span></a><span data-dcnode-id="4117" instrument_node="">: When alone, Mae spends more time on power lines than on the sidewalk.</span></li><li data-dcnode-id="4104"><span data-dcnode-id="4115" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EmbarrassingNickname" title="/pmwiki/pmwiki.php/Main/EmbarrassingNickname"><span data-dcnode-id="4114" instrument_node="">Embarrassing Nickname</span></a><span data-dcnode-id="4112" instrument_node="">:</span><ul data-dcnode-id="4105"><li data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node=""> Jeremy Warton goes by "Germ Warfare", which Mae considers to be this. He just started hanging out with the others one day...</span></li><li data-dcnode-id="4106"><span data-dcnode-id="4109" instrument_node=""> Mae's is "Killer" </span><span class="spoiler" data-dcnode-id="4107" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4108" instrument_node=""> because of that one time she put someone in the hospital by attacking them with a baseball bat.</span></span></li></ul></li><li data-dcnode-id="4096"><span data-dcnode-id="4103" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EpicFail" title="/pmwiki/pmwiki.php/Main/EpicFail"><span data-dcnode-id="4102" instrument_node="">Epic Fail</span></a><span data-dcnode-id="4100" instrument_node="">: One possible dialogue path reveals that when Mae tried to make out with her high school prom date, he ended up bleeding copiously. She herself doesn't seem to be exactly sure how she managed to pull off that one. And then she almost choked him to death by stuffing paper napkins in his mouth to staunch the bleeding. And then she nearly choked on an almond and threw up on him. And </span><em data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">then</span></em><span data-dcnode-id="4097" instrument_node=""> she tried to hide the evidence by clogging the toilet with the paper towels she'd shoved in his mouth. Not her finest hour.</span></li><li data-dcnode-id="4091"><span data-dcnode-id="4095" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EternalEmployee" title="/pmwiki/pmwiki.php/Main/EternalEmployee"><span data-dcnode-id="4094" instrument_node="">Eternal Employee</span></a><span data-dcnode-id="4092" instrument_node="">: Bea at the Ol' Pickaxe and Gregg at the Snack Falcon. Subverted with Angus, who only works the day shift at Video Rentals "Too."</span></li><li data-dcnode-id="4073"><span data-dcnode-id="4090" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EtherealChoir" title="/pmwiki/pmwiki.php/Main/EtherealChoir"><span data-dcnode-id="4089" instrument_node="">Ethereal Choir</span></a><span data-dcnode-id="4087" instrument_node="">/</span><a class="twikilink" data-dcnode-id="4085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForDoomTheBellTolls" title="/pmwiki/pmwiki.php/Main/ForDoomTheBellTolls"><span data-dcnode-id="4086" instrument_node="">For Doom the Bell Tolls</span></a><span data-dcnode-id="4084" instrument_node="">: In </span><em data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">Demontower</span></em><span data-dcnode-id="4081" instrument_node="">, you get this chilling music that plays when you get to the final battle with the Blood Thief.</span><ul data-dcnode-id="4074"><li data-dcnode-id="4075"><span data-dcnode-id="4080" instrument_node=""> Also, the former trope is played straight with "</span><a class="urllink" data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D6DxwKgwTLh8"><span data-dcnode-id="4079" instrument_node="">Sharkle Dream</span><img data-dcnode-id="4078" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="4076" instrument_node="">", in which Mae has a near-death experience in Gregg's path.</span></li></ul></li><li data-dcnode-id="4059"><span data-dcnode-id="4072" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExplainExplainOhCrap" title="/pmwiki/pmwiki.php/Main/ExplainExplainOhCrap"><span data-dcnode-id="4071" instrument_node="">Explain, Explain... Oh, Crap!</span></a><span data-dcnode-id="4069" instrument_node="">:</span><ul data-dcnode-id="4060"><li data-dcnode-id="4065"><span data-dcnode-id="4068" instrument_node=""> While exploring the Historical Society after hours, Gregg and Mae hear strange clunking sounds. They come to the Map room, which has an animatronic making the sound every time someone presses the button. Gregg would be relieved, except Mae points out that it only moves if someone is in the room. This must mean that </span><a class="twikilink" data-dcnode-id="4066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OhCrap" title="/pmwiki/pmwiki.php/Main/OhCrap"><span data-dcnode-id="4067" instrument_node="">someone else is in the building.</span></a></li><li data-dcnode-id="4061"><span data-dcnode-id="4064" instrument_node=""> In the climax, as </span><span class="spoiler" data-dcnode-id="4062" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4063" instrument_node="">the cult explains that they only kidnap and dispose of the delinquents, vagrants, and kids who wouldn't be missed, Mae says only one name: "Casey..."</span></span></li></ul></li><li data-dcnode-id="4054"><span data-dcnode-id="4058" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Expy" title="/pmwiki/pmwiki.php/Main/Expy"><span data-dcnode-id="4057" instrument_node="">Expy</span></a><span data-dcnode-id="4055" instrument_node="">: Deceased magnate Arnold A. Applebaum is one for historical industrialist Andrew Carnegie, down to the union-busting and self-glorification.</span></li></ul></div><p data-dcnode-id="4051"></p><div class="folderlabel" data-dcnode-id="4049" onclick="togglefolder('folder1');"><span data-dcnode-id="4050" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;F-M&nbsp;</span></div><div class="folder" data-dcnode-id="2920" id="folder1" isfolder="true" style="display:block;"><ul data-dcnode-id="2921"><li data-dcnode-id="4024"><span data-dcnode-id="4048" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FatalFlaw" title="/pmwiki/pmwiki.php/Main/FatalFlaw"><span data-dcnode-id="4047" instrument_node="">Fatal Flaw</span></a><span data-dcnode-id="4045" instrument_node="">:</span><ul data-dcnode-id="4025"><li data-dcnode-id="4040"><span data-dcnode-id="4044" instrument_node=""> Mae's is her unwillingness to open up about her problems. Her friends and family want to help her — at least, Gregg and Angus want to — but she doesn't want to talk about </span><span class="spoiler" data-dcnode-id="4042" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4043" instrument_node="">her disassociation episodes recurring at college. It's not until she nearly dies and Gregg tells her that people care about her, that she decides to open up and confess about her issues with Gregg or Bea, and with her parents</span></span><span data-dcnode-id="4041" instrument_node="">.</span></li><li data-dcnode-id="4033"><span data-dcnode-id="4039" instrument_node=""> The flaw of the </span><a class="twikilink" data-dcnode-id="4037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="4038" instrument_node="">Big Bad</span></a><span data-dcnode-id="4036" instrument_node=""> is </span><span class="spoiler" data-dcnode-id="4034" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4035" instrument_node="">their unwillingness to change. They believe they must sacrifice people to keep Possum Springs prosperous, despite the fact that the town is obviously dying regardless of their actions. Bea calls them out for it, but they remain stubborn. This later leads to their deaths, either by the cave-in or by slow starvation and suffocation.</span></span></li><li data-dcnode-id="4026"><span data-dcnode-id="4032" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDragon" title="/pmwiki/pmwiki.php/Main/TheDragon"><span data-dcnode-id="4031" instrument_node="">The Dragon</span></a><span data-dcnode-id="4029" instrument_node="">'s flaw is </span><span class="spoiler" data-dcnode-id="4027" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4028" instrument_node="">his obsessive watching over Mae and her friends when they go ghost-hunting, and his targeting her specifically. While Angus, Bea and Gregg are skeptical that it's the same figure that Mae chased on Harfest, she identifies him and is further convinced that he has something to do with the kidnapping. It's notable that in the climax he attacks Mae when Gregg was the one who shot him with the crossbow. When he attacks Mae from the mine elevator, Angus smashes his head and cuts off his arm using the elevator.</span></span></li></ul></li><li data-dcnode-id="4011"><span data-dcnode-id="4023" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FictionalConstellations" title="/pmwiki/pmwiki.php/Main/FictionalConstellations"><span data-dcnode-id="4022" instrument_node="">Fictional Constellations</span></a><span data-dcnode-id="4020" instrument_node="">:</span><ul data-dcnode-id="4012"><li data-dcnode-id="4015"><span data-dcnode-id="4019" instrument_node=""> During Longest Night (equivalent to the real-life winter solstice), one pastime is to sit at a campfire and spot the thirteen constellations in the night sky. Gameplay in the supplemental game of the same name involves linking the stars. There's a "lost constellation" of which the Ghost Star is a part, featured in the second supplemental game, Lost Constellation. This receives a </span><a class="twikilink" data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallBack" title="/pmwiki/pmwiki.php/Main/CallBack"><span data-dcnode-id="4018" instrument_node="">Call-Back</span></a><span data-dcnode-id="4016" instrument_node=""> in the main game if Mae hangs out with Angus (who knows much less about them than he did in Mae's dream).</span></li><li data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node=""> On certain days, Mae can find Mr. Chazokov on a roof to spot dusk stars, which are "wandering stars" only visible for a short period in spring and fall. Each dusk star has a name and character lore attached to it, such as Simone the Fighter and Castys.</span></li></ul></li><li data-dcnode-id="4003"><span data-dcnode-id="4010" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FlavorText" title="/pmwiki/pmwiki.php/Main/FlavorText"><span data-dcnode-id="4009" instrument_node="">Flavor Text</span></a><span data-dcnode-id="4007" instrument_node="">: Quite a lot of it, and you often have to examine things several times to see it all, especially if you're gunning to </span><a class="twikilink" data-dcnode-id="4005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CollectionSidequest" title="/pmwiki/pmwiki.php/Main/CollectionSidequest"><span data-dcnode-id="4006" instrument_node="">get all of Mae's notebook sketches</span></a><span data-dcnode-id="4004" instrument_node="">.</span></li><li data-dcnode-id="3896"><span data-dcnode-id="4002" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Foreshadowing" title="/pmwiki/pmwiki.php/Main/Foreshadowing"><span data-dcnode-id="4001" instrument_node="">Foreshadowing</span></a><span data-dcnode-id="3999" instrument_node="">:</span><ul data-dcnode-id="3897"><li data-dcnode-id="3992"><span data-dcnode-id="3998" instrument_node=""> Two of the quotes from Grandpa's ghost stories in the intro. The specific quotes are </span><span class="spoiler" data-dcnode-id="3996" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3997" instrument_node=""> "They feared death, so they ate the young.", foreshadowing how the cult would sacrifice the young and directionless to preserve themselves and the town,</span></span><span data-dcnode-id="3995" instrument_node=""> and </span><span class="spoiler" data-dcnode-id="3993" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3994" instrument_node=""> "They went looking for the gods, and died in lonely places", foreshadowing how the cult, after seeking the Black Goat, ends up trapped inside the abandoned mine.</span></span></li><li data-dcnode-id="3987"><span data-dcnode-id="3991" instrument_node=""> At several points, people mention </span><span class="spoiler" data-dcnode-id="3989" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3990" instrument_node=""> cults</span></span><span data-dcnode-id="3988" instrument_node="">.</span></li><li data-dcnode-id="3983"><span data-dcnode-id="3986" instrument_node=""> When Angus fixes Mae's computer, he says it's not magic, just ones and zeroes. </span><span class="spoiler" data-dcnode-id="3984" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3985" instrument_node="">If you stargaze with him, he says he doesn't believe in a God, or if there is a God, he doesn't care.</span></span></li><li data-dcnode-id="3979"><span data-dcnode-id="3982" instrument_node=""> Pentagrams are seen in a few places, such as the Demontower minigame or the secret handshake used by the cute girl at the party. </span><span class="spoiler" data-dcnode-id="3980" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3981" instrument_node=""> One final five-pointed star forms from the wooden supports in the mine shaft.</span></span></li><li data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node=""> You can find a missing poster for Casey before you learn he disappeared.</span></li><li data-dcnode-id="3973"><span data-dcnode-id="3976" instrument_node=""> Mae at one point teases Gregg by saying she wants to see his head get stuck and chopped off by elevator doors. </span><span class="spoiler" data-dcnode-id="3974" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3975" instrument_node=""> Guess what happens to one of the cultists in the mine?</span></span></li><li data-dcnode-id="3968"><span data-dcnode-id="3972" instrument_node=""> Mae earlier chided Gregg for teasing her by saying it was too bad she didn't get crushed in a falling elevator by pointing out that it's a legitimate phobia of hers. </span><span class="spoiler" data-dcnode-id="3970" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3971" instrument_node=""> At the climax, she narrowly avoids this exact fate</span></span><span data-dcnode-id="3969" instrument_node="">.</span></li><li data-dcnode-id="3964"><span data-dcnode-id="3967" instrument_node=""> Mr. Chazokov tells Mae during a stargazing session that the gods in the legends they discuss are just metaphors for unfortunate things that can't be controlled (such as death, disease, natural disasters, etc.). </span><span class="spoiler" data-dcnode-id="3965" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3966" instrument_node="">As is the Black Goat, metafictionally.</span></span></li><li data-dcnode-id="3959"><span data-dcnode-id="3963" instrument_node=""> Mae's last conversation with her mother at home has a big one for the upcoming climax: "You... We... Wouldn't be in this mess if I wasn't such a massive screw up. </span><span class="spoiler" data-dcnode-id="3961" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3962" instrument_node=""> I just want to fall into a pit and die right now.</span></span><span data-dcnode-id="3960" instrument_node="">"</span></li><li data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node=""> Mae eventually expresses her romantic preferences, essentially wanting someone, gender irrelevant, who's strong enough to beat her in a fight. If you pay attention to the porn popups on her computer early on, you'll notice ads for "Meet Burly Singles in Your Area" and "Tough Angry Singles".</span></li><li data-dcnode-id="3949"><span data-dcnode-id="3956" instrument_node=""> Right before going to the party in the woods, choosing the right choices will have Mae reveal some of her experience when she was in college, like how she wasn't able to make any friends while she was there. At the party, while drunk, she talks about the statue of the founder and how to her, it just looked like shapes, which is foreshadowing that she might have dissociation.</span><ul data-dcnode-id="3950"><li data-dcnode-id="3951"><span data-dcnode-id="3955" instrument_node=""> Mae also mentions during the party that she gets "woozy on cough syrup". Later, </span><span class="spoiler" data-dcnode-id="3953" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3954" instrument_node=""> when discussing her mental breakdown in college, she mentions chugging down bottles of the stuff just to be able to sleep</span></span><span data-dcnode-id="3952" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3933"><span data-dcnode-id="3948" instrument_node=""> While not plot foreshadowing, Mae's walk home from the bus station has three certain actions that relate to future interactions with her friends:</span><ul data-dcnode-id="3934"><li data-dcnode-id="3943"><span data-dcnode-id="3947" instrument_node=""> Directly outside the bus station, the fireflies begin to swarm around her if she jumps into them. </span><span class="spoiler" data-dcnode-id="3945" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3946" instrument_node=""> Attracting fireflies is required at the end of Bea's second hangout</span></span><span data-dcnode-id="3944" instrument_node="">.</span></li><li data-dcnode-id="3939"><span data-dcnode-id="3942" instrument_node=""> In the pit, Mae has to cause a pile of logs to slip by jumping on one to break it loose. </span><span class="spoiler" data-dcnode-id="3940" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3941" instrument_node=""> Mae breaks a fallen tree with Gregg in his third hangout, as well as breaking a branch in Bea's investigation quest.</span></span></li><li data-dcnode-id="3935"><span data-dcnode-id="3938" instrument_node=""> In the playground it's possible to spin the pirate ship's wheel by jumping near it. </span><span class="spoiler" data-dcnode-id="3936" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3937" instrument_node=""> Repeat this with the four windmills around Towne Centre (three in Part 2, and one in Part 3) to release their payloads, and you get more lines of dialogue with Angus during his investigation quest.</span></span></li></ul></li><li data-dcnode-id="3911"><span data-dcnode-id="3932" instrument_node=""> There are hints that Mae suffers from </span><span class="spoiler" data-dcnode-id="3930" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3931" instrument_node="">serious mental health issues</span></span><span data-dcnode-id="3929" instrument_node=""> very early on. If you open the options menu early in the game, you can see some rather obvious and hollow-sounding </span><span class="spoiler" data-dcnode-id="3927" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3928" instrument_node="">psychologist-speak</span></span><span data-dcnode-id="3926" instrument_node=""> phrases written in the diary, such as "Count to ten!" "Take a deep breath!" and "I.P.S - Identify possible solutions!" </span><span class="spoiler" data-dcnode-id="3921" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3925" instrument_node="">The diary is the closest thing Mae got to treatment after suffering a serious breakdown:her parents had no option but to take her to the town doctor, a jack-of-all-trades whose strength was definitely </span><em data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">not</span></em><span data-dcnode-id="3922" instrument_node=""> in psychology or psychiatry.</span></span><ul data-dcnode-id="3912"><li data-dcnode-id="3913"><span data-dcnode-id="3920" instrument_node=""> On a related note, the unreliability of </span><span class="spoiler" data-dcnode-id="3918" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3919" instrument_node="">the town doctor</span></span><span data-dcnode-id="3917" instrument_node=""> is mentioned in a random early game conversation, where one resident expresses doubt and discomfort about having to rely on him, only to be shouted down by another two residents who don't have any problem with him </span><span class="spoiler" data-dcnode-id="3915" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3916" instrument_node="">and his multi-discipline approach</span></span><span data-dcnode-id="3914" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3906"><span data-dcnode-id="3910" instrument_node=""> If Mae goes with Bea to fix the heater, she'll tell Mae about the hunting camps and warn her to not "like get shot or anything". A possible option later the same night leads Mae to wonder what it's like to get stuck in a cave. </span><span class="spoiler" data-dcnode-id="3908" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3909" instrument_node="">Mae's later shot at by the cultists, who are wielding hunting weapons. Soon after she gets stuck in a cave for a while (as does the cult, but they don't get back out)</span></span><span data-dcnode-id="3907" instrument_node="">.</span></li><li data-dcnode-id="3902"><span data-dcnode-id="3905" instrument_node=""> A chat with Germ will have him mention a frightening experience where a strange man stalked him for hours, Germ only escaping once night fell. </span><span class="spoiler" data-dcnode-id="3903" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3904" instrument_node="">Given Germ is a tree dwelling vagabond and the cult sacrifices those who they feel won't be missed, it's very likely they were eyeing him as a sacrifice to The Black Goat.</span></span></li><li data-dcnode-id="3898"><span data-dcnode-id="3901" instrument_node=""> In one of Bea's hangouts, she and Bea attend a party with Bea's friend Jackie, a goat who's introduced (aside from a cameo in chapter 2) decrying fascism. </span><span class="spoiler" data-dcnode-id="3899" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3900" instrument_node=""> The villains of the game turn out to be trying to sacrifice "undesirables" who they feel don't contribute anything in the hope of preserving past glory as they see it; which would very much be the aim of a fascist government. Ironically by sacrificing them to a goat.</span></span></li></ul></li><li data-dcnode-id="3888"><span data-dcnode-id="3895" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FoolishSiblingResponsibleSibling" title="/pmwiki/pmwiki.php/Main/FoolishSiblingResponsibleSibling"><span data-dcnode-id="3894" instrument_node="">Foolish Sibling, Responsible Sibling</span></a><span data-dcnode-id="3892" instrument_node="">: They may not be related, but Mae and Bea have this vibe. Mae has a loving relationship with her parents and could afford to go off to college, but remains completely immature and dropped out. Bea, meanwhile, lost her mother and was forced to stay behind to work to keep her father's shop afloat, maturing in the process. She expresses her frustration about this multiple times. </span><span class="spoiler" data-dcnode-id="3890" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3891" instrument_node=""> Subverted when it is revealed that Mae has serious, untreated mental problems, to the point where even Bea stops thinking of herself and Mae like this</span></span><span data-dcnode-id="3889" instrument_node="">.</span></li><li data-dcnode-id="3854"><span data-dcnode-id="3887" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FourTemperamentEnsemble" title="/pmwiki/pmwiki.php/Main/FourTemperamentEnsemble"><span data-dcnode-id="3886" instrument_node="">Four-Temperament Ensemble</span></a><span data-dcnode-id="3884" instrument_node="">:</span><ul data-dcnode-id="3855"><li data-dcnode-id="3879"><span data-dcnode-id="3883" instrument_node=""> Sanguine: </span><a class="twikilink" data-dcnode-id="3881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SadClown" title="/pmwiki/pmwiki.php/Main/SadClown"><span data-dcnode-id="3882" instrument_node="">Gregg</span></a><span data-dcnode-id="3880" instrument_node=""> (optimistic, excitable, emotionally unstable, and a reckless risk-taker).</span></li><li data-dcnode-id="3874"><span data-dcnode-id="3878" instrument_node=""> Choleric: </span><a class="twikilink" data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoserProtagonist" title="/pmwiki/pmwiki.php/Main/LoserProtagonist"><span data-dcnode-id="3877" instrument_node="">Mae</span></a><span data-dcnode-id="3875" instrument_node=""> (the leader of the group (whether the others agree with that or not), rebellious, and hot-headed).</span></li><li data-dcnode-id="3869"><span data-dcnode-id="3873" instrument_node=""> Melancholic: </span><a class="twikilink" data-dcnode-id="3871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheSnarkKnight" title="/pmwiki/pmwiki.php/Main/TheSnarkKnight"><span data-dcnode-id="3872" instrument_node="">Bea</span></a><span data-dcnode-id="3870" instrument_node=""> (depressed, emotionally distant, hard working, and intelligent).</span></li><li data-dcnode-id="3864"><span data-dcnode-id="3868" instrument_node=""> Phlegmatic: </span><a class="twikilink" data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AgentScully" title="/pmwiki/pmwiki.php/Main/AgentScully"><span data-dcnode-id="3867" instrument_node="">Angus</span></a><span data-dcnode-id="3865" instrument_node=""> (kind, socially awkward, and reserved to the point of appearing emotionless).</span></li><li data-dcnode-id="3856"><span data-dcnode-id="3863" instrument_node=""> Eclectic: </span><a class="twikilink" data-dcnode-id="3861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SixthRanger" title="/pmwiki/pmwiki.php/Main/SixthRanger"><span data-dcnode-id="3862" instrument_node="">Germ</span></a><span data-dcnode-id="3860" instrument_node=""> (the only one who has no personal demons eating away at him; he even has a good family in the </span><em data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">Weird Autumn Edition</span></em><span data-dcnode-id="3857" instrument_node="">).</span></li></ul></li><li data-dcnode-id="3841"><span data-dcnode-id="3853" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FragileSpeedster" title="/pmwiki/pmwiki.php/Main/FragileSpeedster"><span data-dcnode-id="3852" instrument_node="">Fragile Speedster</span></a><span data-dcnode-id="3850" instrument_node="">: The player character in </span><em data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">Demontower</span></em><span data-dcnode-id="3847" instrument_node=""> as you progress through the levels; your dashing ability increases, while your maximum health decreases. </span><span class="spoiler" data-dcnode-id="3842" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3846" instrument_node=""> This continues until they're a </span><a class="twikilink" data-dcnode-id="3844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitPointWonder" title="/pmwiki/pmwiki.php/Main/OneHitPointWonder"><span data-dcnode-id="3845" instrument_node="">One-Hit-Point Wonder</span></a><span data-dcnode-id="3843" instrument_node=""> on the last level.</span></span></li><li data-dcnode-id="3828"><span data-dcnode-id="3840" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FreudianExcuseIsNoExcuse" title="/pmwiki/pmwiki.php/Main/FreudianExcuseIsNoExcuse"><span data-dcnode-id="3839" instrument_node="">Freudian Excuse Is No Excuse</span></a><span data-dcnode-id="3837" instrument_node="">: At the end of the game, once </span><a class="twikilink" data-dcnode-id="3835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheHeavy" title="/pmwiki/pmwiki.php/Main/TheHeavy"><span data-dcnode-id="3836" instrument_node="">The Heavy</span></a><span data-dcnode-id="3834" instrument_node=""> has been defeated, almost all main characters show a hint of sadness for them. Mentioning that they were driven by a desperate desire of saving the town they lived in, and that they said to not enjoy the things they did. Angus is the one to call out that they shouldn't pity them. </span><span class="spoiler" data-dcnode-id="3829" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3833" instrument_node=""> The Cult of the Black Goat had, unnecessarily and in an act of desperation, sacrificed the homeless and the ones that people "wouldn't miss," in order to ask an </span><a class="twikilink" data-dcnode-id="3831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="3832" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="3830" instrument_node=""> to save their town, and Angus feels no sympathy for, among them, having sacrifi
