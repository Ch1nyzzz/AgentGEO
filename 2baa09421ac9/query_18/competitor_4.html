k" data-dcnode-id="2422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RayOfHopeEnding" title="/pmwiki/pmwiki.php/Main/RayOfHopeEnding"><span data-dcnode-id="2423" instrument_node="">"Ray of Hope" Ending</span></a><span data-dcnode-id="2421" instrument_node="">: Although things haven't really changed for the group, Mae seems to have a more optimistic outlook about her life by the end. </span><span class="spoiler" data-dcnode-id="2419" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2420" instrument_node="">She considers becoming a janitor and plans to talk to her parents about what happened at college, while her dad will talk about his work problems. Bea has renewed her friendship with Mae, and Angus and Gregg move forward with their plans to leave Possum Springs. The gang will also meet for band practice.</span></span></li><li data-dcnode-id="2399"><span data-dcnode-id="2417" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReasonableAuthorityFigure" title="/pmwiki/pmwiki.php/Main/ReasonableAuthorityFigure"><span data-dcnode-id="2416" instrument_node="">Reasonable Authority Figure</span></a><span data-dcnode-id="2414" instrument_node="">:</span><ul data-dcnode-id="2400"><li data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node=""> Mr. Chazokov. He's disappointed that Mae dropped out of college but still invites her to stargaze with him.</span></li><li data-dcnode-id="2401"><span data-dcnode-id="2411" instrument_node=""> Aunt Molly. She takes Mae home when finding the latter jumping on power lines to get home through the woods at night, while warning her and Mae's mother that such behavior could get Mae arrested in the future. She also takes care of the severed arm outside the diner and orders Mae and her friends to do the buddy system. </span><span class="spoiler" data-dcnode-id="2406" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2410" instrument_node="">When Mae witnesses kidnapping on Harfest and tells Aunt Molly about a </span><a class="twikilink" data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RightForTheWrongReasons" title="/pmwiki/pmwiki.php/Main/RightForTheWrongReasons"><span data-dcnode-id="2409" instrument_node="">ghost</span></a><span data-dcnode-id="2407" instrument_node=""> she saw, her Aunt doesn't believe her and takes home, apparently ignoring the incident. Next time Mae meets her, she offhandedly mentions sweeping the whole area with someone after Mae's report.</span></span><span data-dcnode-id="2405" instrument_node=""> In the climax, we learn that she and her partner Dan searched frantically for an </span><span class="spoiler" data-dcnode-id="2403" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2404" instrument_node="">injured Mae when her friends reported her missing and that weird people with guns were firing at them. Aunt Molly gets Mae to the hospital and orders the friend group to stay in one location— Angus and Gregg's apartment— until they could figure out what the heck happened. The next day, Molly admits to Mae that she isn't entirely sure what sort of trouble her niece got into, but she would rather not know because what she can grasp of it plus the weird phone calls indicates that it's not pretty. Mae doesn't exactly thank Molly for saving her life, but she is a little nicer about it</span></span><span data-dcnode-id="2402" instrument_node="">.&nbsp;</span></li></ul></li><li data-dcnode-id="2391"><span data-dcnode-id="2398" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RecurringRiff" title="/pmwiki/pmwiki.php/Main/RecurringRiff"><span data-dcnode-id="2397" instrument_node="">Recurring Riff</span></a><span data-dcnode-id="2395" instrument_node="">: Some melodies appear in different tracks throughout the game. For example, the melody played by the violinist can also be heard in the first level of </span><em data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Demontower</span></em><span data-dcnode-id="2392" instrument_node="">.</span></li><li data-dcnode-id="2376"><span data-dcnode-id="2390" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RedShirt" title="/pmwiki/pmwiki.php/Main/RedShirt"><span data-dcnode-id="2389" instrument_node="">Red Shirt</span></a><span data-dcnode-id="2387" instrument_node="">:</span><ul data-dcnode-id="2377"><li data-dcnode-id="2382"><span data-dcnode-id="2386" instrument_node=""> The random </span><span class="spoiler" data-dcnode-id="2384" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2385" instrument_node="">silhouetted kid that gets kidnapped on Harfest</span></span><span data-dcnode-id="2383" instrument_node="">.</span></li><li data-dcnode-id="2378"><span data-dcnode-id="2381" instrument_node=""> The Harleys mention that </span><span class="spoiler" data-dcnode-id="2379" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2380" instrument_node="">a girl from Mulvey went missing after Harfest.</span></span></li></ul></li><li data-dcnode-id="2363"><span data-dcnode-id="2375" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RepressionNeverEndsWell" title="/pmwiki/pmwiki.php/Main/RepressionNeverEndsWell"><span data-dcnode-id="2374" instrument_node="">Repression Never Ends Well</span></a><span data-dcnode-id="2372" instrument_node="">: As a teenager Mae started </span><span class="spoiler" data-dcnode-id="2370" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2371" instrument_node=""> suffering from some form of disassociation disorder</span></span><span data-dcnode-id="2369" instrument_node="">, which went untreated and eventually </span><span class="spoiler" data-dcnode-id="2367" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2368" instrument_node=""> caused her to put another kid in hospital during a softball game</span></span><span data-dcnode-id="2366" instrument_node="">. The local doctor was pretty much the only avenue of treatment her parents had for her, and since he wasn't a psychiatrist, he didn't do much aside from having Mae write a journal and "suppress her anger". As a result, when she left for university </span><span class="spoiler" data-dcnode-id="2364" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2365" instrument_node=""> while she didn't have another attack, she couldn't function in this new environment, and basically spent two years crying in her room, before coming home at the start of the game.</span></span></li><li data-dcnode-id="2356"><span data-dcnode-id="2362" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheResenter" title="/pmwiki/pmwiki.php/Main/TheResenter"><span data-dcnode-id="2361" instrument_node="">The Resenter</span></a><span data-dcnode-id="2359" instrument_node="">: Bea is shown to be resentful of Mae for getting the chance to go to college, that Bea herself never got, and then seemingly throwing it away without a care by abruptly dropping out. </span><span class="spoiler" data-dcnode-id="2357" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2358" instrument_node=""> However, Bea gets over it when she learns that Mae dropped out, because she was having a mental breakdown.</span></span></li><li data-dcnode-id="2339"><span data-dcnode-id="2355" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ResolvedNoodleIncident" title="/pmwiki/pmwiki.php/Main/ResolvedNoodleIncident"><span data-dcnode-id="2354" instrument_node="">Resolved Noodle Incident</span></a><span data-dcnode-id="2352" instrument_node="">:</span><ul data-dcnode-id="2340"><li data-dcnode-id="2345"><span data-dcnode-id="2351" instrument_node=""> Mae doesn't like to talk about the time she went with Cole to their high school senior prom and it ended in disaster. If you go with Bea to the graveyard in Act III and tell the Goth Teens an embarrassing story from high school, Mae will reveal all the gruesome, humiliating details: </span><span class="spoiler" data-dcnode-id="2346" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2350" instrument_node=""> Mae went in for a kiss, but somehow screwed up, and bit Cole on the lip. She dragged Cole into the bathroom, and stuffed his mouth with paper towels, to stop the bleeding, while nervously eating candied almonds she'd stolen from the refreshments table. Then she nearly choked on an almond and puked, while trying to give herself the Heimlich maneuver. Then someone came in and, in a moment of panic, Mae tried to flush the paper towels she'd shoved in Cole's mouth down the toilet, causing it to overflow. Cole left early, and Mae was forced to get a ride home from Josh, a kid who rode to prom on a </span><em data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">tractor</span></em><span data-dcnode-id="2347" instrument_node="">.</span></span></li><li data-dcnode-id="2341"><span data-dcnode-id="2344" instrument_node=""> There are repeated references to Mae putting another kid in the hospital when she was younger, an incident she doesn't like to talk about. Near the end of the game we get the whole story: </span><span class="spoiler" data-dcnode-id="2342" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2343" instrument_node=""> Mae had a nasty dissociative episode during a softball game that lead to her lashing out.</span></span></li></ul></li><li data-dcnode-id="2330"><span data-dcnode-id="2338" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RippedFromTheHeadlines" title="/pmwiki/pmwiki.php/Main/RippedFromTheHeadlines"><span data-dcnode-id="2337" instrument_node="">Ripped from the Headlines</span></a><span data-dcnode-id="2335" instrument_node="">: Possum Springs is based on small Pennsylvania towns, and Selma ("Selmers") went to rehab for a prescription painkiller addiction. As of the time of the game's release (2017), Pennsylvania was experiencing an </span><a class="urllink" data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.poconorecord.com/news/20160923/pennsylvania-opioid-addiction-statistics-are-staggering"><span data-dcnode-id="2334" instrument_node="">epidemic</span><img data-dcnode-id="2333" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2331" instrument_node=""> of prescription opioid abuse.</span></li><li data-dcnode-id="2317"><span data-dcnode-id="2329" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RightForTheWrongReasons" title="/pmwiki/pmwiki.php/Main/RightForTheWrongReasons"><span data-dcnode-id="2328" instrument_node="">Right for the Wrong Reasons</span></a><span data-dcnode-id="2326" instrument_node="">: When Mae happens to see </span><span class="spoiler" data-dcnode-id="2324" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2325" instrument_node=""> a kidnapping</span></span><span data-dcnode-id="2323" instrument_node="">, she (being something of a womanchild) assumes that a ghost is responsible, and goes ghost hunting. While she doesn't find any evidence of ghosts at the creepy historical sites she can investigate, </span><span class="spoiler" data-dcnode-id="2318" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2322" instrument_node="">the actual culprit </span><em data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">is</span></em><span data-dcnode-id="2319" instrument_node=""> present, since they and their organization are deeply involved with the town's history.</span></span></li><li data-dcnode-id="2309"><span data-dcnode-id="2316" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RodAndReelRepurposed" title="/pmwiki/pmwiki.php/Main/RodAndReelRepurposed"><span data-dcnode-id="2315" instrument_node="">Rod And Reel Repurposed</span></a><span data-dcnode-id="2313" instrument_node="">: If you choose to tag along when Bea goes on a house call to fix an old furnace, you can attempt to </span><a class="twikilink" data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MacGyvering" title="/pmwiki/pmwiki.php/Main/MacGyvering"><span data-dcnode-id="2312" instrument_node="">cobble together</span></a><span data-dcnode-id="2310" instrument_node=""> a fix of your own using various objects you find around the basement, including a fishing pole. All it does is fall apart, which is probably for the best.</span></li><li data-dcnode-id="2278"><span data-dcnode-id="2308" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RunningGag" title="/pmwiki/pmwiki.php/Main/RunningGag"><span data-dcnode-id="2307" instrument_node="">Running Gag</span></a><span data-dcnode-id="2305" instrument_node="">:</span><ul data-dcnode-id="2279"><li data-dcnode-id="2297"><span data-dcnode-id="2304" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlapstickKnowsNoGender" title="/pmwiki/pmwiki.php/Main/SlapstickKnowsNoGender"><span data-dcnode-id="2303" instrument_node="">Mae getting shocked</span></a><span data-dcnode-id="2301" instrument_node=""> with various kinds of </span><a class="twikilink" data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HarmlessElectrocution" title="/pmwiki/pmwiki.php/Main/HarmlessElectrocution"><span data-dcnode-id="2300" instrument_node="">Harmless Electrocution</span></a><span data-dcnode-id="2298" instrument_node="">.</span></li><li data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node=""> Mae being dragged into performing a song she doesn't know during band practice.</span></li><li data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node=""> Gregg and Mae muttering, "Crimes," to each other.</span></li><li data-dcnode-id="2288"><span data-dcnode-id="2292" instrument_node=""> Gregg and Mae thinking up various painful ways that the other person could have died, and increasingly getting into </span><a class="twikilink" data-dcnode-id="2290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CruelAndUnusualDeath" title="/pmwiki/pmwiki.php/Main/CruelAndUnusualDeath"><span data-dcnode-id="2291" instrument_node="">Cruel and Unusual Death</span></a><span data-dcnode-id="2289" instrument_node=""> territory. Often phrased as "too bad you didn't [die in this horribly gruesome manner]."</span></li><li data-dcnode-id="2280"><span data-dcnode-id="2287" instrument_node=""> Mae frequently writes "GREGG RULZ OK" in her journal when making an entry that involves him.</span><ul data-dcnode-id="2281"><li data-dcnode-id="2282"><span data-dcnode-id="2286" instrument_node=""> Extended to Jen in </span><em data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">Weird Autumn</span></em><span data-dcnode-id="2283" instrument_node="">, whom Mae describes as "GREGG'S COUSIN OK".</span></li></ul></li></ul></li></ul></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2270"><span class="ad-caption" data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2271" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="2269"></p><div class="folderlabel" data-dcnode-id="2267" onclick="togglefolder('folder3');"><span data-dcnode-id="2268" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;S-Z&nbsp;</span></div><div class="folder" data-dcnode-id="1457" id="folder3" isfolder="true" style="display:block;"><ul data-dcnode-id="1591"><li data-dcnode-id="2256"><span data-dcnode-id="2266" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SamusIsAGirl" title="/pmwiki/pmwiki.php/Main/SamusIsAGirl"><span data-dcnode-id="2265" instrument_node="">Samus Is a Girl</span></a><span data-dcnode-id="2263" instrument_node="">: The Palecat from </span><em data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Demontower</span></em><span data-dcnode-id="2260" instrument_node=""> is androgynous-looking, and only revealed to be female in the </span><em data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">bad</span></em><span data-dcnode-id="2257" instrument_node=""> ending.</span></li><li data-dcnode-id="2246"><span data-dcnode-id="2255" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SeekingTheMissingFindingTheDead" title="/pmwiki/pmwiki.php/Main/SeekingTheMissingFindingTheDead"><span data-dcnode-id="2254" instrument_node="">Seeking the Missing, Finding the Dead</span></a><span data-dcnode-id="2252" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2247" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2251" instrument_node=""> Mae comes home to find out her friend Casey disappeared without a word awhile back. No one aside from his parents seem too concerned — Mae's other friends theorize he simply skipped town like he always wanted to. But there are multiple hints something may have happened to him, culminating to the climax of the game, when you find out that the cultists kidnapped him and sacrificed him to the </span><a class="twikilink" data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="2250" instrument_node="">Black Goat</span></a><span data-dcnode-id="2248" instrument_node="">, figuring he wouldn't be missed. Mae and her friends are all horrified by this, and to make matters worse, because no one will ever believe them about the cult, and all the cultists are dead (or close to it) by the end of the game, meaning there's no proof for their story, they can't tell anyone about what they saw. Casey's parents will never know the truth.</span></span></li><li data-dcnode-id="2241"><span data-dcnode-id="2245" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SeinfeldianConversation" title="/pmwiki/pmwiki.php/Main/SeinfeldianConversation"><span data-dcnode-id="2244" instrument_node="">Seinfeldian Conversation</span></a><span data-dcnode-id="2242" instrument_node="">: Characters often drift into this in optional conversations, such as realizing that "orange drink" is the only way they've ever referred to that kind of juice.</span></li><li data-dcnode-id="2228"><span data-dcnode-id="2240" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SerialKillerBaiting" title="/pmwiki/pmwiki.php/Main/SerialKillerBaiting"><span data-dcnode-id="2239" instrument_node="">Serial Killer Baiting</span></a><span data-dcnode-id="2237" instrument_node="">: Mae becomes aware of a mysterious "ghost" kidnapping people. Half way through the final chapter, the band are staying over at Gregg and Angus's apartment. </span><span class="spoiler" data-dcnode-id="2229" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2236" instrument_node=""> Mae, </span><a class="twikilink" data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InjuredPlayerCharacterStage" title="/pmwiki/pmwiki.php/Main/InjuredPlayerCharacterStage"><span data-dcnode-id="2235" instrument_node="">suffering a concussion and barely able to move after an encounter with the villains</span></a><span data-dcnode-id="2233" instrument_node="">, decides to go out looking for the "ghost" alone (since it targets people who won't be missed), although it's strongly implied her plan isn't as much to catch the ghost as </span><a class="twikilink" data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrivenToSuicide" title="/pmwiki/pmwiki.php/Main/DrivenToSuicide"><span data-dcnode-id="2232" instrument_node="">die knowing the truth</span></a><span data-dcnode-id="2230" instrument_node="">. Luckily, when she confronts them, her friends show up to save her, playing the trope straight (and making it much less mysterious after a crossbow bolt to the shoulder).</span></span></li><li data-dcnode-id="2207"><span data-dcnode-id="2227" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShaggyDogStory" title="/pmwiki/pmwiki.php/Main/ShaggyDogStory"><span data-dcnode-id="2226" instrument_node="">"Shaggy Dog" Story</span></a><span data-dcnode-id="2224" instrument_node="">:</span><ul data-dcnode-id="2208"><li data-dcnode-id="2219"><span data-dcnode-id="2223" instrument_node=""> Pastor Karen's story is essentially this. </span><span class="spoiler" data-dcnode-id="2221" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2222" instrument_node="">Spends the entirety of the story trying to convince the City Council to let her start a program to give the homeless somewhere to stay, starting with Bruce, a vagrant who is relatively new in town. In the end though, the Council rules against her motion and even before then, Bruce already decided to leave, not wanting to burden Kate with his presence.</span></span><span data-dcnode-id="2220" instrument_node=""> Though she is clearly unhappy about it all, she takes it in pretty good stride.</span></li><li data-dcnode-id="2209"><span data-dcnode-id="2218" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2210" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2217" instrument_node="">And, of course, Mae's search for Casey. Despite brief </span><a class="twikilink" data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HopeSpot" title="/pmwiki/pmwiki.php/Main/HopeSpot"><span data-dcnode-id="2216" instrument_node="">hope spots</span></a><span data-dcnode-id="2214" instrument_node="">, such as telling Mr. Chazokov that missing is not the same as dead and asking Angel to ask around after Casey, he's revealed to </span><a class="twikilink" data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PosthumousCharacter" title="/pmwiki/pmwiki.php/Main/PosthumousCharacter"><span data-dcnode-id="2213" instrument_node="">be one of the victims of the cult</span></a><span data-dcnode-id="2211" instrument_node="">. He's gone.</span></span></li></ul></li><li data-dcnode-id="2200"><span data-dcnode-id="2206" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShipperOnDeck" title="/pmwiki/pmwiki.php/Main/ShipperOnDeck"><span data-dcnode-id="2205" instrument_node="">Shipper on Deck</span></a><span data-dcnode-id="2203" instrument_node="">: Mae thinks Angus and Gregg make the cutest couple and won't hesitate to express it. Bea inverts it, as she thinks Angus and Gregg are together because they're the only gay men in Possum Springs, and that they'll break up when they meet new people in Bright Harbor </span><span class="spoiler" data-dcnode-id="2201" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2202" instrument_node="">It's worth noting that their relationship is actually much deeper and more meaningful to them than what Bea thinks, although it's fair that she wouldn't know, considering neither of them talk about it unless Mae hangs out with them to bond.</span></span></li><li data-dcnode-id="2178"><span data-dcnode-id="2199" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheShrink" title="/pmwiki/pmwiki.php/Main/TheShrink"><span data-dcnode-id="2198" instrument_node="">The Shrink</span></a><span data-dcnode-id="2196" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGhost" title="/pmwiki/pmwiki.php/Main/TheGhost"><span data-dcnode-id="2195" instrument_node="">The unseen</span></a><span data-dcnode-id="2193" instrument_node=""> Dr. Hank is Mae's therapist. </span><span class="spoiler" data-dcnode-id="2179" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2192" instrument_node="">He turns out to be The Harmful Shrink — specifically, he's </span><em data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">so</span></em><span data-dcnode-id="2189" instrument_node=""> ineffective, it crosses over into being harmful. His idea of treatment for Mae's obvious mental problems, which have resulted in her having a nervous breakdown and previously led to her putting a kid in the hospital, is a </span><em data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">journal</span></em><span data-dcnode-id="2186" instrument_node="">. Not in tandem with other treatment — just "keep a journal" and </span><em data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">that's it</span></em><span data-dcnode-id="2183" instrument_node="">. He also encourages Mae to "repress" her anger, rather than actually work through it. Bea lampshades this if you become close friends with her, pointing out that Dr. Hank treats a </span><em data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">lot</span></em><span data-dcnode-id="2180" instrument_node=""> of different kinds of health problems, and that he's obviously incompetent at treating the mental kind.</span></span></li><li data-dcnode-id="2014"><span data-dcnode-id="2177" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="2176" instrument_node="">Shout-Out</span></a><span data-dcnode-id="2174" instrument_node="">:</span><ul data-dcnode-id="2015"><li data-dcnode-id="2168"><span data-dcnode-id="2173" instrument_node=""> If Mae looks at the Possum Springs mural at the bus station, at one point she quips, "Prepare for disappointment, ye who enter here," a parody of "Abandon all hope, ye who enter here" from Dante's </span><em data-dcnode-id="2170"><a class="twikilink" data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheDivineComedy" title="/pmwiki/pmwiki.php/Literature/TheDivineComedy"><span data-dcnode-id="2172" instrument_node="">The Divine Comedy</span></a></em><span data-dcnode-id="2169" instrument_node="">.</span></li><li data-dcnode-id="2163"><span data-dcnode-id="2167" instrument_node=""> The blue canary night light in the Borowski home is a reference to </span><a class="twikilink" data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/TheyMightBeGiants" title="/pmwiki/pmwiki.php/Music/TheyMightBeGiants"><span data-dcnode-id="2166" instrument_node="">They Might Be Giants</span></a><span data-dcnode-id="2164" instrument_node=""> song "Birdhouse in Your Soul".</span></li><li data-dcnode-id="2145"><span data-dcnode-id="2162" instrument_node=""> Possibly one: the eventual reveal in the latter half of the game, </span><span class="spoiler" data-dcnode-id="2154" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2161" instrument_node="">an </span><a class="twikilink" data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="2160" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="2158" instrument_node=""> with deep ties to the lore at the bottom of a mine shaft, revealed when the miners </span><a class="twikilink" data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DugTooDeep" title="/pmwiki/pmwiki.php/Main/DugTooDeep"><span data-dcnode-id="2157" instrument_node="">Dug Too Deep</span></a><span data-dcnode-id="2155" instrument_node="">, and slowly corrupting a small town</span></span><span data-dcnode-id="2153" instrument_node="">, is also the eventual reveal in </span><em data-dcnode-id="2150"><a class="twikilink" data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Desperation" title="/pmwiki/pmwiki.php/Literature/Desperation"><span data-dcnode-id="2152" instrument_node="">Desperation</span></a></em><span data-dcnode-id="2149" instrument_node=""> by </span><a class="twikilink" data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/StephenKing" title="/pmwiki/pmwiki.php/Creator/StephenKing"><span data-dcnode-id="2148" instrument_node="">Stephen King</span></a><span data-dcnode-id="2146" instrument_node="">.</span></li><li data-dcnode-id="2139"><span data-dcnode-id="2144" instrument_node=""> Gregg mentions that Angus plays a game called Sword People Online, which may be a reference to </span><em data-dcnode-id="2141"><a class="twikilink" data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/SwordArtOnline" title="/pmwiki/pmwiki.php/LightNovel/SwordArtOnline"><span data-dcnode-id="2143" instrument_node="">Sword Art Online</span></a></em><span data-dcnode-id="2140" instrument_node="">.</span></li><li data-dcnode-id="2127"><span data-dcnode-id="2138" instrument_node=""> The plot of a small, dilapidated town with sagging industry and general decay turning to </span><span class="spoiler" data-dcnode-id="2136" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2137" instrument_node="">Eldritch gods for help revitalizing the town through ritualistic sacrifice because the beast promised to revive the town if they cooperated</span></span><span data-dcnode-id="2135" instrument_node=""> is very reminiscent of </span><em data-dcnode-id="2132"><a class="twikilink" data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheShadowOverInnsmouth" title="/pmwiki/pmwiki.php/Literature/TheShadowOverInnsmouth"><span data-dcnode-id="2134" instrument_node="">The Shadow Over Innsmouth</span></a></em><span data-dcnode-id="2131" instrument_node=""> by </span><a class="twikilink" data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/HPLovecraft" title="/pmwiki/pmwiki.php/Creator/HPLovecraft"><span data-dcnode-id="2130" instrument_node="">H. P. Lovecraft</span></a><span data-dcnode-id="2128" instrument_node="">.</span></li><li data-dcnode-id="2119"><span data-dcnode-id="2126" instrument_node=""> The reveal of </span><span class="spoiler" data-dcnode-id="2120" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2125" instrument_node=""> a group of townsfolk in a cult dedicated to keeping their town clean and stable by murdering undesirables or those who would disturb the peace, all wear matching outfits, and explain themselves as being a positive force for the town, is almost certainly a shout-out to </span><em data-dcnode-id="2122"><a class="twikilink" data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/HotFuzz" title="/pmwiki/pmwiki.php/Film/HotFuzz"><span data-dcnode-id="2124" instrument_node="">Hot Fuzz</span></a></em><span data-dcnode-id="2121" instrument_node="">.</span></span></li><li data-dcnode-id="2102"><span data-dcnode-id="2118" instrument_node=""> Angus mentions the Bell constellation reminds him of "prog rock album covers", which most likely refers to Nektar's </span><a class="urllink" data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cleorecs.com/store/wp-content/uploads/2013/01/9957-Nektar-JCOTE-5X5.jpg"><span data-dcnode-id="2117" instrument_node="">Journey to the Centre of the Eye</span><img data-dcnode-id="2116" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">◊</span></small><span data-dcnode-id="2112" instrument_node=""> or the cover to </span><a class="twikilink" data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/PinkFloyd" title="/pmwiki/pmwiki.php/Music/PinkFloyd"><span data-dcnode-id="2111" instrument_node="">Pink Floyd</span></a><span data-dcnode-id="2109" instrument_node="">'s live album, </span><a class="urllink" data-dcnode-id="2106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cdn-s3.allmusic.com/release-covers/500/0000/361/0000361780.jpg"><span data-dcnode-id="2108" instrument_node="">Pulse</span><img data-dcnode-id="2107" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">◊</span></small><span data-dcnode-id="2103" instrument_node="">.</span></li><li data-dcnode-id="2093"><span data-dcnode-id="2101" instrument_node=""> In yet another Lovecraft allusion, one of the lyrics in Pumpkin Head Guy almost perfectly name-drops the title of Lovecraft's novella, </span><em data-dcnode-id="2098"><a class="twikilink" data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheWhispererInDarkness" title="/pmwiki/pmwiki.php/Literature/TheWhispererInDarkness"><span data-dcnode-id="2100" instrument_node="">The Whisperer in Darkness</span></a></em><span data-dcnode-id="2097" instrument_node="">, "A whisper in the dark..." Considering the other, previously mentioned allusions to the </span><a class="twikilink" data-dcnode-id="2095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/CthulhuMythos" title="/pmwiki/pmwiki.php/Franchise/CthulhuMythos"><span data-dcnode-id="2096" instrument_node="">Cthulhu Mythos</span></a><span data-dcnode-id="2094" instrument_node=""> scattered throughout the game, it likely isn't a coincidence.</span></li><li data-dcnode-id="2088"><span data-dcnode-id="2092" instrument_node=""> Mae can lie to Gregg about having porn pop-ups cleaned from her computer, to which he'll respond: "</span><a class="twikilink" data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheSimpsons" title="/pmwiki/pmwiki.php/WesternAnimation/TheSimpsons"><span data-dcnode-id="2091" instrument_node="">Why must you turn the Internet into a den of lies?</span></a><span data-dcnode-id="2089" instrument_node="">"</span></li><li data-dcnode-id="2082"><span data-dcnode-id="2087" instrument_node=""> Gregg can mention watching a TV show about a no-nonsense judge called Judge Cathy. Germ's grandmother watches a similar show called Judge Janice. Both seem to be references to </span><em data-dcnode-id="2084"><a class="twikilink" data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/JudgeJudy" title="/pmwiki/pmwiki.php/Series/JudgeJudy"><span data-dcnode-id="2086" instrument_node="">Judge Judy</span></a></em><span data-dcnode-id="2083" instrument_node="">.</span></li><li data-dcnode-id="2064"><span data-dcnode-id="2081" instrument_node=""> When you talk to Lori M. on the first rainy day, she mentions making a horror film in which a person </span><a class="twikilink" data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EyeScream" title="/pmwiki/pmwiki.php/Main/EyeScream"><span data-dcnode-id="2080" instrument_node="">stabs another in the eye</span></a><span data-dcnode-id="2078" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnifeNut" title="/pmwiki/pmwiki.php/Main/KnifeNut"><span data-dcnode-id="2077" instrument_node="">with a knife</span></a><span data-dcnode-id="2075" instrument_node="">; her speech balloon then shows a knife marked "REAL" stabbing an eyeball marked "FAKE". This is kind of a reference to the eye-slashing scene in the 1929 film by </span><a class="twikilink" data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/LuisBunuel" title="/pmwiki/pmwiki.php/Creator/LuisBunuel"><span data-dcnode-id="2074" instrument_node="">Luis Buñuel</span></a><span data-dcnode-id="2072" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/SalvadorDali" title="/pmwiki/pmwiki.php/Creator/SalvadorDali"><span data-dcnode-id="2071" instrument_node="">Salvador Dalí</span></a><span data-dcnode-id="2069" instrument_node="">, entitled </span><em data-dcnode-id="2066"><a class="twikilink" data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/UnChienAndalou" title="/pmwiki/pmwiki.php/Film/UnChienAndalou"><span data-dcnode-id="2068" instrument_node="">Un Chien Andalou</span></a></em><span data-dcnode-id="2065" instrument_node="">.</span></li><li data-dcnode-id="2030"><span data-dcnode-id="2063" instrument_node=""> Mae's favorite band in-universe, the </span><a class="twikilink" data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoomMetal" title="/pmwiki/pmwiki.php/Main/DoomMetal"><span data-dcnode-id="2062" instrument_node="">Doom Metal</span></a><span data-dcnode-id="2060" instrument_node=""> band Witchdagger, is a reference to </span><a class="twikilink" data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoomMetal" title="/pmwiki/pmwiki.php/Main/DoomMetal"><span data-dcnode-id="2059" instrument_node="">stoner metal band</span></a><span data-dcnode-id="2057" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Sleep" title="/pmwiki/pmwiki.php/Music/Sleep"><span data-dcnode-id="2056" instrument_node="">Sleep</span></a><span data-dcnode-id="2054" instrument_node="">, with </span><a class="urllink" data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DxQc7vNZC6hQ"><span data-dcnode-id="2053" instrument_node="">Space Dragon</span><img data-dcnode-id="2052" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2050" instrument_node=""> being very similar bass and riff-wise to </span><a class="urllink" data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D2bRuKExTfGM"><span data-dcnode-id="2049" instrument_node="">Dragonaut</span><img data-dcnode-id="2048" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2046" instrument_node="">. Other Sleep references include the </span><a class="urllink" data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/7-2K4jnMwK0/maxresdefault.jpg"><span data-dcnode-id="2045" instrument_node="">robed and masked figure seen behind Mae as she drifts in the void</span><img data-dcnode-id="2044" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">◊</span></small><span data-dcnode-id="2040" instrument_node=""> resembling the band's mascots, the </span><a class="urllink" data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f4.bcbits.com/img/a3576407478_10.jpg"><span data-dcnode-id="2039" instrument_node="">Weedians on the cover of Dopesmoker</span><img data-dcnode-id="2038" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">◊</span></small><span data-dcnode-id="2034" instrument_node="">, and Mae's recitation of the song's apparent lyrics before she plays seems to be a reference to the vocal style on the aforementioned album, long, drawn out notes with themes of wandering and nomads. </span><a class="twikilink" data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordOfGod" title="/pmwiki/pmwiki.php/Main/WordOfGod"><span data-dcnode-id="2033" instrument_node="">Word of God</span></a><span data-dcnode-id="2031" instrument_node=""> confirmed that Sleep are ALSO one of Mae's favorite bands.</span></li><li data-dcnode-id="2016"><span data-dcnode-id="2029" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2017" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2028" instrument_node=""> A cult in an isolated rural town suffering economic hardship performs </span><a class="twikilink" data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanSacrifice" title="/pmwiki/pmwiki.php/Main/HumanSacrifice"><span data-dcnode-id="2027" instrument_node="">Human Sacrifice</span></a><span data-dcnode-id="2025" instrument_node=""> in the hopes it can bring back prosperity. Is this </span><em data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Night in the Woods</span></em><span data-dcnode-id="2022" instrument_node="">, or </span><em data-dcnode-id="2019"><a class="twikilink" data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheWickerMan1973" title="/pmwiki/pmwiki.php/Film/TheWickerMan1973"><span data-dcnode-id="2021" instrument_node="">The Wicker Man</span></a></em><span data-dcnode-id="2018" instrument_node="">?</span></span></li></ul></li><li data-dcnode-id="1996"><span data-dcnode-id="2013" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShowWithinAShow" title="/pmwiki/pmwiki.php/Main/ShowWithinAShow"><span data-dcnode-id="2012" instrument_node="">Show Within a Show</span></a><span data-dcnode-id="2010" instrument_node="">:</span><ul data-dcnode-id="1997"><li data-dcnode-id="2005"><span data-dcnode-id="2009" instrument_node=""> </span><em data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Lost Constellation</span></em><span data-dcnode-id="2006" instrument_node=""> is a ghost story told by the characters.</span></li><li data-dcnode-id="2000"><span data-dcnode-id="2004" instrument_node=""> In the main game, Mae's father watches </span><em data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">Garbo and Malloy</span></em><span data-dcnode-id="2001" instrument_node="">, a comedy show.</span></li><li data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node=""> A game within a game example with Demontower, a game that can be played on Mae's laptop.</span></li></ul></li><li data-dcnode-id="1986"><span data-dcnode-id="1995" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SignsOfDisrepair" title="/pmwiki/pmwiki.php/Main/SignsOfDisrepair"><span data-dcnode-id="1994" instrument_node="">Signs of Disrepair</span></a><span data-dcnode-id="1992" instrument_node="">: In one of Mae's dreams, there is an illuminated sign reading "DURKILLESBURG." And you have a </span><a class="twikilink" data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BatterUp" title="/pmwiki/pmwiki.php/Main/BatterUp"><span data-dcnode-id="1991" instrument_node="">baseball bat</span></a><span data-dcnode-id="1989" instrument_node="">. It's popular among players to reduce the sign to "___KILLE___R_", </span><span class="spoiler" data-dcnode-id="1987" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1988" instrument_node=""> which the game later reveals is a nickname Mae earned after beating a kid with a baseball bat.</span></span></li><li data-dcnode-id="1976"><span data-dcnode-id="1985" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SleepCute" title="/pmwiki/pmwiki.php/Main/SleepCute"><span data-dcnode-id="1984" instrument_node="">Sleep Cute</span></a><span data-dcnode-id="1982" instrument_node="">: In the </span><em data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Weird Autumn</span></em><span data-dcnode-id="1979" instrument_node=""> edition, if you have Mae take a nap in the church when her mother suggests it. </span><span class="spoiler" data-dcnode-id="1977" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1978" instrument_node="">The ghost of her beloved grandfather appears, watches Mae sleep for a moment, and smiles.</span></span></li><li data-dcnode-id="1971"><span data-dcnode-id="1975" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmallTownBoredom" title="/pmwiki/pmwiki.php/Main/SmallTownBoredom"><span data-dcnode-id="1974" instrument_node="">Small Town Boredom</span></a><span data-dcnode-id="1972" instrument_node="">: Mae and Gregg's random acts of vandalism are largely a way to entertain themselves in their middle-of-nowhere town.</span></li><li data-dcnode-id="1950"><span data-dcnode-id="1970" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpannerInTheWorks" title="/pmwiki/pmwiki.php/Main/SpannerInTheWorks"><span data-dcnode-id="1969" instrument_node="">Spanner in the Works</span></a><span data-dcnode-id="1967" instrument_node="">:</span><ul data-dcnode-id="1951"><li data-dcnode-id="1962"><span data-dcnode-id="1966" instrument_node=""> Mae ends up being this for </span><span class="spoiler" data-dcnode-id="1964" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1965" instrument_node="">the cult. Her "ghost investigation" leads to her friends discovering the cult at the abandoned mine shafts, which in turn leads to Mae and the others going to confront the cultists</span></span><span data-dcnode-id="1963" instrument_node="">.</span></li><li data-dcnode-id="1957"><span data-dcnode-id="1961" instrument_node=""> Germ ends up </span><span class="spoiler" data-dcnode-id="1959" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1960" instrument_node="">being the only person we know who has escaped the cult, based on an optional dialogue with him. He also helps Mae rescue her friends from the well in his backyard</span></span><span data-dcnode-id="1958" instrument_node="">.</span></li><li data-dcnode-id="1952"><span data-dcnode-id="1956" instrument_node=""> On the Gregg path, Mae becomes this by </span><span class="spoiler" data-dcnode-id="1954" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1955" instrument_node="">encouraging Gregg's criminal behavior. Note that Gregg was committing petty crimes before Mae returned, such as shoplifting and engaging in petty theft, but he finds it harder to hide from Angus, who wants to make sure Gregg doesn't go to jail. Eventually, Angus confronts them both, which makes Gregg admit that he has to shape up</span></span><span data-dcnode-id="1953" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1935"><span data-dcnode-id="1949" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StealthPun" title="/pmwiki/pmwiki.php/Main/StealthPun"><span data-dcnode-id="1948" instrument_node="">Stealth Pun</span></a><span data-dcnode-id="1946" instrument_node="">: Mae is prone to sniping at people who annoy her and going to great lengths to find fault with them. One might even say that she can be a bit </span><em data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">catty.</span></em><ul data-dcnode-id="1936"><li data-dcnode-id="1937"><span data-dcnode-id="1943" instrument_node=""> Holes are a recurring motif in the story, which takes place during autumn, or </span><em data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">fall</span></em><span data-dcnode-id="1940" instrument_node="">. </span><span class="spoiler" data-dcnode-id="1938" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1939" instrument_node=""> The climax of the game involves Mae falling into a hole.</span></span></li></ul></li><li data-dcnode-id="1930"><span data-dcnode-id="1934" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StickyFingers" title="/pmwiki/pmwiki.php/Main/StickyFingers"><span data-dcnode-id="1933" instrument_node="">Sticky Fingers</span></a><span data-dcnode-id="1931" instrument_node="">: Mae shoplifts, amongst other petty crimes, compulsively.</span></li><li data-dcnode-id="1922"><span data-dcnode-id="1929" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoryBranching" title="/pmwiki/pmwiki.php/Main/StoryBranching"><span data-dcnode-id="1928" instrument_node="">Story Branching</span></a><span data-dcnode-id="1926" instrument_node="">: Dialogue and certain story elements (like who Mae </span><span class="spoiler" data-dcnode-id="1924" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1925" instrument_node=""> sleeps with on the couch the day after she comes out of the hospital</span></span><span data-dcnode-id="1923" instrument_node="">) change depending on dialogue choices. Choosing to not show up on the days certain events happen can even cause potential conversations to never happen, and sidequests to never kick off.</span></li><li data-dcnode-id="1910"><span data-dcnode-id="1921" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StraightManAndWiseGuy" title="/pmwiki/pmwiki.php/Main/StraightManAndWiseGuy"><span data-dcnode-id="1920" instrument_node="">Straight Man and Wise Guy</span></a><span data-dcnode-id="1918" instrument_node="">: </span><em data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Garbo &amp; Malloy</span></em><span data-dcnode-id="1915" instrument_node="">, a comedy duo Mae and her father enjoy watching. They trade roles depending on who is setting up the joke.</span><div class="indent" data-dcnode-id="1911"><span data-dcnode-id="1914" instrument_node=""> </span><em data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">"That's a whoppah!"</span></em></div></li><li data-dcnode-id="1900"><span data-dcnode-id="1909" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StepfordSnarker" title="/pmwiki/pmwiki.php/Main/StepfordSnarker"><span data-dcnode-id="1908" instrument_node="">Stepford Snarker</span></a><span data-dcnode-id="1906" instrument_node="">: Mae for most of the game is a </span><a class="twikilink" data-dcnode-id="1904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadpanSnarker" title="/pmwiki/pmwiki.php/Main/DeadpanSnarker"><span data-dcnode-id="1905" instrument_node="">Deadpan Snarker</span></a><span data-dcnode-id="1903" instrument_node=""> that pretends she doesn't care about her problems. </span><span class="spoiler" data-dcnode-id="1901" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1902" instrument_node="">Towards the end she apologizes to her mother for being a screw-up, and while recovering from her head injury talks to Gregg or Bea about why she dropped out of college.</span></span></li><li data-dcnode-id="1892"><span data-dcnode-id="1899" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StylisticSuck" title="/pmwiki/pmwiki.php/Main/StylisticSuck"><span data-dcnode-id="1898" instrument_node="">Stylistic Suck</span></a><span data-dcnode-id="1896" instrument_node="">: The Harfest play which Bea ropes Mae into performing is this, even if you choose to try and follow along with the script, likely due to the numerous rewrites it suffered over the years. Mae, Gregg, and the Janitor frequently break character; Bea can barely contain the contempt she feels about having to narrate the whole fiasco, and while Danny and Bill both get their lines right, their performance is more wooden than the store countertop they're using as a stage. Even Germ's additional street friends and the trolley system tunnel kids make up the audience and laugh at how hilarious this performance is if Mae gets her lines right in the </span><em data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Weird Autumn Edition</span></em><span data-dcnode-id="1893" instrument_node="">.</span></li><li data-dcnode-id="1882"><span data-dcnode-id="1891" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperDoc" title="/pmwiki/pmwiki.php/Main/SuperDoc"><span data-dcnode-id="1890" instrument_node="">Super Doc</span></a><span data-dcnode-id="1888" instrument_node="">: Dr. Hank takes care of all of Possum Springs' medical, dental and psychiatric needs. </span><span class="spoiler" data-dcnode-id="1883" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1887" instrument_node="">Deconstructed when dialogue makes it abundantly clear that he does none of them well, especially in the field of therapy. Treating Mae's disorder amounted to telling her to repress her anger and keep a journal, which is evidently his go-to suggestion. Bea and Selmers </span><a class="twikilink" data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="1886" instrument_node="">lampshades</span></a><span data-dcnode-id="1884" instrument_node=""> just how bad Dr. Hank and his suggestions are, and Selmers had to go to someone else for her rehab.</span></span></li><li data-dcnode-id="1866"><span data-dcnode-id="1881" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SurprisinglyRealisticOutcome" title="/pmwiki/pmwiki.php/Main/SurprisinglyRealisticOutcome"><span data-dcnode-id="1880" instrument_node="">Surprisingly Realistic Outcome</span></a><span data-dcnode-id="1878" instrument_node="">:</span><ul data-dcnode-id="1867"><li data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node=""> A sidequest has Mae introduce Saleem, a bear violinist, and Sadie, a cat saxophonist, who start playing together. Mae expresses that the two will get married one day, but Saleem is already seeing someone else and Sadie says looking after her kid leaves her with no time for a relationship. Just because two people have similar interests does not mean they'll hook up.</span></li><li data-dcnode-id="1868"><span data-dcnode-id="1875" instrument_node=""> A family doctor, who thinks simple psychotherapy is the answer to every mental disorder, turns out to be </span><em data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">very</span></em><span data-dcnode-id="1872" instrument_node=""> ill-equipped to handle </span><span class="spoiler" data-dcnode-id="1870" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1871" instrument_node="">Mae's illness</span></span><span data-dcnode-id="1869" instrument_node="">. Yes, there are numerous success stories, but antipsycotics tend to be more reliable for such severe cases. He should've referred her to a real psychiatrist at the very least.</span></li></ul></li><li data-dcnode-id="1853"><span data-dcnode-id="1865" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SymbolSwearing" title="/pmwiki/pmwiki.php/Main/SymbolSwearing"><span data-dcnode-id="1864" instrument_node="">Symbol Swearing</span></a><span data-dcnode-id="1862" instrument_node="">: In a game which uses a lot of normal swearing and only censors "fuck" into "eff", this still manages to make an appearance </span><span class="spoiler" data-dcnode-id="1860" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1861" instrument_node="">after Gregg shoots the cultist with the crossbow</span></span><span data-dcnode-id="1859" instrument_node="">.</span><div class="indent" data-dcnode-id="1854"><span data-dcnode-id="1858" instrument_node=""> </span><strong data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Gregg:</span></strong><span data-dcnode-id="1855" instrument_node=""> I am gonna *$%ing %*$**$%**$% you!!!</span></div></li><li data-dcnode-id="1848"><span data-dcnode-id="1852" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Tagline" title="/pmwiki/pmwiki.php/Main/Tagline"><span data-dcnode-id="1851" instrument_node="">Tagline</span></a><span data-dcnode-id="1849" instrument_node="">: "At the end of everything, hold on to anything."</span></li><li data-dcnode-id="1840"><span data-dcnode-id="1847" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TapOnTheHead" title="/pmwiki/pmwiki.php/Main/TapOnTheHead"><span data-dcnode-id="1846" instrument_node="">Tap on the Head</span></a><span data-dcnode-id="1844" instrument_node="">: Deconstructed. </span><span class="spoiler" data-dcnode-id="1842" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1843" instrument_node="">Mae gets a severe head injury in the climax, and her family has to take her to the hospital where she's in serious danger of dying. For the rest of the subsequent chapter, she's walking sluggishly and on the verge of throwing up. While she's fine the next day, her parents understandably aren't since they don't understand how she wandered off while injured</span></span><span data-dcnode-id="1841" instrument_node="">.</span></li><li data-dcnode-id="1832"><span data-dcnode-id="1839" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TastesLikeDiabetes" title="/pmwiki/pmwiki.php/Main/TastesLikeDiabetes"><span data-dcnode-id="1838" instrument_node="">Tastes Like Diabetes</span></a><span data-dcnode-id="1836" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InUniverse" title="/pmwiki/pmwiki.php/Main/InUniverse"><span data-dcnode-id="1835" instrument_node="">In-Universe</span></a><span data-dcnode-id="1833" instrument_node="">. Even as a child, Mae absolutely hated the cloying wholesomeness of Charity Bearity.</span></li><li data-dcnode-id="1825"><span data-dcnode-id="1831" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TaughtByExperience" title="/pmwiki/pmwiki.php/Main/TaughtByExperience"><span data-dcnode-id="1830" instrument_node="">Taught by Experience</span></a><span data-dcnode-id="1828" instrument_node="">: After going around for most of the game not carrying any weapons, even when </span><span class="spoiler" data-dcnode-id="1826" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1827" instrument_node="">realizing that Mae saw someone dangerous, Gregg arms himself with a crossbow in the climax.</span></span></li><li data-dcnode-id="1817"><span data-dcnode-id="1824" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TeamMom" title="/pmwiki/pmwiki.php/Main/TeamMom"><span data-dcnode-id="1823" instrument_node="">Team Mom</span></a><span data-dcnode-id="1821" instrument_node="">: Bea is this reluctantly. She takes charge when Mae wants to find the ghost she saw on Harfest </span><span class="spoiler" data-dcnode-id="1819" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1820" instrument_node="">kidnapping someone</span></span><span data-dcnode-id="1818" instrument_node="">, makes sure to drive Mae home safely for most of the game, and even tucks her in at one point when the latter is too drunk.</span></li><li data-dcnode-id="1804"><span data-dcnode-id="1816" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheseQuestionsThree" title="/pmwiki/pmwiki.php/Main/TheseQuestionsThree"><span data-dcnode-id="1815" instrument_node="">These Questions Three...</span></a><span data-dcnode-id="1813" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayedForLaughs" title="/pmwiki/pmwiki.php/Main/PlayedForLaughs"><span data-dcnode-id="1812" instrument_node="">Played for Laughs</span></a><span data-dcnode-id="1810" instrument_node="">. The trio of goth teenagers won't let Mae and Bea enter the graveyard without answering three questions... when did they first have sex, what was their most embarrassing moment, and what their ideal date would be. Bea thinks this is ridiculous, but she and Mae go along with it. </span><span class="spoiler" data-dcnode-id="1805" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1809" instrument_node=""> Then, afterwards, the teens admit there's nothing they can do to actually </span><em data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">stop</span></em><span data-dcnode-id="1806" instrument_node=""> them from entering, and they could've gone on in at anytime. Mae and Bea are not amused.</span></span></li><li data-dcnode-id="1785"><span data-dcnode-id="1803" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThereAreNoTherapists" title="/pmwiki/pmwiki.php/Main/ThereAreNoTherapists"><span data-dcnode-id="1802" instrument_node="">There Are No Therapists</span></a><span data-dcnode-id="1800" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AvertedTrope" title="/pmwiki/pmwiki.php/Main/AvertedTrope"><span data-dcnode-id="1799" instrument_node="">Actually, there is.</span></a><span data-dcnode-id="1797" instrument_node=""> Dr. Hank is, </span><a class="twikilink" data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperDoc" title="/pmwiki/pmwiki.php/Main/SuperDoc"><span data-dcnode-id="1796" instrument_node="">among other things</span></a><span data-dcnode-id="1794" instrument_node="">, the town's therapist, and Mae and Selmers both mention seeing him. His usual technique seems to be "Write it down in a journal." </span><span class="spoiler" data-dcnode-id="1786" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1793" instrument_node="">However, it's actually </span><a class="twikilink" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoubleSubverted" title="/pmwiki/pmwiki.php/Main/DoubleSubverted"><span data-dcnode-id="1792" instrument_node="">Double Subverted</span></a><span data-dcnode-id="1790" instrument_node="">: he's shown to be </span><em data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">utterly incompetent</span></em><span data-dcnode-id="1787" instrument_node=""> at being a therapist, with his journal method not really helping Mae with her multitude of disorders.</span></span></li><li data-dcnode-id="1778"><span data-dcnode-id="1784" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThisIsSomethingHesGotToDoHimself" title="/pmwiki/pmwiki.php/Main/ThisIsSomethingHesGotToDoHimself"><span data-dcnode-id="1783" instrument_node="">This Is Something He's Got to Do Himself</span></a><span data-dcnode-id="1781" instrument_node="">: Subverted. </span><span class="spoiler" data-dcnode-id="1779" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1780" instrument_node=""> In one dialogue option Mae insists she go into the mine to confront the cult alone. Her friends shrug it off and continue to follow her.</span></span></li><li data-dcnode-id="1770"><span data-dcnode-id="1777" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TickTockTune" title="/pmwiki/pmwiki.php/Main/TickTockTune"><span data-dcnode-id="1776" instrument_node="">Tick Tock Tune</span></a><span data-dcnode-id="1774" instrument_node="">: "Tick Tock", a playable song added with the Weird Autumn update, originally a kids' show tune about the clock, but </span><a class="twikilink" data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SubvertedKidsShow" title="/pmwiki/pmwiki.php/Main/SubvertedKidsShow"><span data-dcnode-id="1773" instrument_node="">turned dark</span></a><span data-dcnode-id="1771" instrument_node=""> by Mae and Gregg.</span></li><li data-dcnode-id="1762"><span data-dcnode-id="1769" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TitleDrop" title="/pmwiki/pmwiki.php/Main/TitleDrop"><span data-dcnode-id="1768" instrument_node="">Title Drop</span></a><span data-dcnode-id="1766" instrument_node="">: During the Harfest play and </span><span class="spoiler" data-dcnode-id="1764" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1765" instrument_node=""> when the group is trapped in the mine shaft</span></span><span data-dcnode-id="1763" instrument_node="">.</span></li><li data-dcnode-id="1752"><span data-dcnode-id="1761" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TokenMinorityCouple" title="/pmwiki/pmwiki.php/Main/TokenMinorityCouple"><span data-dcnode-id="1760" instrument_node="">Token Minority Couple</span></a><span data-dcnode-id="1758" instrument_node="">: Bea </span><em data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">believes</span></em><span data-dcnode-id="1755" instrument_node=""> this to be the case of Gregg and Angus, the only gay people in town: </span><span class="spoiler" data-dcnode-id="1753" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1754" instrument_node="">at the end of her story path, she believes that once they move to Bright Harbor, Angus will leave Gregg due to having "better options".</span></span></li><li data-dcnode-id="1745"><span data-dcnode-id="1751" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TokenReligiousTeammate" title="/pmwiki/pmwiki.php/Main/TokenReligiousTeammate"><span data-dcnode-id="1750" instrument_node="">Token Religious Teammate</span></a><span data-dcnode-id="1748" instrument_node="">: Bea who at times indicates ambiguously towards having religious leanings. </span><span class="spoiler" data-dcnode-id="1746" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1747" instrument_node=""> She prays before going into the woods at the game's climax.</span></span></li><li data-dcnode-id="1740"><span data-dcnode-id="1744" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Tomboy" title="/pmwiki/pmwiki.php/Main/Tomboy"><span data-dcnode-id="1743" instrument_node="">Tomboy</span></a><span data-dcnode-id="1741" instrument_node="">: Mae has very little traditionally feminine interests, while being very sporty and athletic. Even her friends address her as "bro" or "dude".</span></li><li data-dcnode-id="1722"><span data-dcnode-id="1739" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooDumbToLive" title="/pmwiki/pmwiki.php/Main/TooDumbToLive"><span data-dcnode-id="1738" instrument_node="">Too Dumb to Live</span></a><span data-dcnode-id="1736" instrument_node="">:</span><ul data-dcnode-id="1723"><li data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node=""> Mae spends a good portion of the game using power lines to get around. She tries to do this at first to get into town over the fence; Aunt Molly finds her and takes her home. Later on to find extra playable content you have to climb on the power lines all around town.</span></li><li data-dcnode-id="1724"><span data-dcnode-id="1733" instrument_node=""> When going to explore the "ghost" sightings, Mae and the others don't think to arm themselves even though according to Mae she saw the ghost </span><span class="spoiler" data-dcnode-id="1731" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1732" instrument_node="">kidnapping someone</span></span><span data-dcnode-id="1730" instrument_node="">. After Mae </span><span class="spoiler" data-dcnode-id="1725" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1729" instrument_node="">barely survives running from the cult, she goes </span><em data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">back</span></em><span data-dcnode-id="1726" instrument_node=""> while suffering a head injury and not up to par in terms of combat. Though it's implied she was trying to die, believing it was her fault the ghost was threatening her friends. Gregg calls her out for her actions because he cares about her, and so do the others.</span></span></li></ul></li><li data-dcnode-id="1708"><span data-dcnode-id="1721" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TownWithADarkSecret" title="/pmwiki/pmwiki.php/Main/TownWithADarkSecret"><span data-dcnode-id="1720" instrument_node="">Town with a Dark Secret</span></a><span data-dcnode-id="1718" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1713" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1717" instrument_node="">There's a cult of people who are kidnapping people and sacrificing them to an </span><a class="twikilink" data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="1716" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="1714" instrument_node="">, which may or may not exist, in hopes of reviving the town.</span></span><span data-dcnode-id="1712" instrument_node=""> Most of the town has </span><em data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">no</span></em><span data-dcnode-id="1709" instrument_node=""> idea.</span></li><li data-dcnode-id="1703"><span data-dcnode-id="1707" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrueCompanions" title="/pmwiki/pmwiki.php/Main/TrueCompanions"><span data-dcnode-id="1706" instrument_node="">True Companions</span></a><span data-dcnode-id="1704" instrument_node="">: Gregg from the start, along with Angus and Bea. Despite their own problems and their conflicts with Mae's shortsighted behavior, the four all care about each other and stick together to the very end. Gregg says as much in the climax.</span></li><li data-dcnode-id="1693"><span data-dcnode-id="1702" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ToxicFriendInfluence" title="/pmwiki/pmwiki.php/Main/ToxicFriendInfluence"><span data-dcnode-id="1701" instrument_node="">Toxic Friend Influence</span></a><span data-dcnode-id="1699" instrument_node="">: This shows up if you choose to spend the most time with Gregg. Mae and Gregg's friendship as teenagers was primarily built on various petty crimes, but with Mae off at college, Gregg was straightening up, and getting his life back together... and then Mae shows up back in town at the beginning of the game. </span><span class="spoiler" data-dcnode-id="1697" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1698" instrument_node=""> Gregg's boyfriend Angus takes notice of this, and he eventually blows up at Gregg and Mae over it, though the three are able to work things out.</span></span><ul data-dcnode-id="1694"><li data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="
