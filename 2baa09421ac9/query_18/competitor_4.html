regg stable.</span></li></ul></li><li data-dcnode-id="3104"><span data-dcnode-id="3110" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MasterOfNone" title="/pmwiki/pmwiki.php/Main/MasterOfNone"><span data-dcnode-id="3109" instrument_node="">Master of None</span></a><span data-dcnode-id="3107" instrument_node="">: Dr. Hank is the town's resident doctor. As discussed by the townsfolk, Dr. Hank tries to do every field of medicine, but he doesn't do any field of medicine particularly well. </span><span class="spoiler" data-dcnode-id="3105" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3106" instrument_node="">Especially not mental health therapy. Dr. Hank's entire solution for Mae's mental problems is to have her keep a journal of the things she's thinking about. Not in addition to talking to a therapist, taking medication, or anything else; just "keep a journal" and that's it. As Mae's continuing mental health struggles show, this is absurdly ineffective.</span></span></li><li data-dcnode-id="3096"><span data-dcnode-id="3103" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MasterOfUnlocking" title="/pmwiki/pmwiki.php/Main/MasterOfUnlocking"><span data-dcnode-id="3102" instrument_node="">Master of Unlocking</span></a><span data-dcnode-id="3100" instrument_node="">: Gregg is shown to have this ability. He's able to pick open two elevator locks in the dark, while under extreme stress, using nothing but a pair of pliers and a paperclip. Even before that, he's got a set of lock picks that could have made the job even easier. In the </span><em data-dcnode-id="3098"><span data-dcnode-id="3099" instrument_node="">Weird Autumn Edition</span></em><span data-dcnode-id="3097" instrument_node="">, we do see Gregg use a lock pick to unlock the basement door in the Historical Society Museum, while Mae is holding a flashlight over him, but once he finishes picking the lock, an owl suddenly attacks him, causing him to lose the lock picks (and Mae to drop the flashlight), before they make their way in to escape.</span></li><li data-dcnode-id="3082"><span data-dcnode-id="3095" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MatureAnimalStory" title="/pmwiki/pmwiki.php/Main/MatureAnimalStory"><span data-dcnode-id="3094" instrument_node="">Mature Animal Story</span></a><span data-dcnode-id="3092" instrument_node="">: </span><em data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Night in the Woods</span></em><span data-dcnode-id="3089" instrument_node=""> features a cast full of anthropomorphic animals. It also features alcohol, swearing, serious themes about mental health and growing up in a </span><a class="twikilink" data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DyingTown" title="/pmwiki/pmwiki.php/Main/DyingTown"><span data-dcnode-id="3088" instrument_node="">Dying Town</span></a><span data-dcnode-id="3086" instrument_node="">, a mysterious kidnapping or two, </span><a class="twikilink" data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArsonMurderAndJaywalking" title="/pmwiki/pmwiki.php/Main/ArsonMurderAndJaywalking"><span data-dcnode-id="3085" instrument_node="">and vandalism</span></a><span data-dcnode-id="3083" instrument_node="">.</span></li><li data-dcnode-id="3040"><span data-dcnode-id="3081" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane" title="/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane"><span data-dcnode-id="3080" instrument_node="">Maybe Magic, Maybe Mundane</span></a><span data-dcnode-id="3078" instrument_node="">:</span><ul data-dcnode-id="3041"><li data-dcnode-id="3068"><span data-dcnode-id="3077" instrument_node=""> The nature of the "ghost" Mae keeps seeing around town. She is convinced that it really is a ghost that is </span><span class="spoiler" data-dcnode-id="3075" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3076" instrument_node="">kidnapping people</span></span><span data-dcnode-id="3074" instrument_node="">, while her friends whenever they see it assume that it's a guard or a hunter. The truth is </span><span class="spoiler" data-dcnode-id="3069" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3073" instrument_node="">none of them are right. It isn't a ghost, but it IS a cultist supposedly powered by an </span><a class="twikilink" data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="3072" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="3070" instrument_node=""> with the ability to walk through walls.</span></span></li><li data-dcnode-id="3063"><span data-dcnode-id="3067" instrument_node=""> The Janitor has a recurring and cryptic appearance through the game. In the end, he might be just someone really old and experienced who happens to be wise and be in the right place at the right time, </span><span class="spoiler" data-dcnode-id="3065" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3066" instrument_node="">at the end, he knows Mae's name even though she never introduced herself. He is possibly God or another entity as there is even a statue of him in the graveyard</span></span><span data-dcnode-id="3064" instrument_node="">.</span></li><li data-dcnode-id="3046"><span data-dcnode-id="3062" instrument_node=""> Mae has recurring nightmares of a astral band in strange places that always end with she meeting a gigantic and bizarre creature. It's hinted at the possibility that Mae has some sort of connection to the supernatural and that those entities are some sort of </span><a class="twikilink" data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicHorror" title="/pmwiki/pmwiki.php/Main/CosmicHorror"><span data-dcnode-id="3061" instrument_node="">Cosmic Horror</span></a><span data-dcnode-id="3059" instrument_node="">, </span><span class="spoiler" data-dcnode-id="3054" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3058" instrument_node="">and the cult practicing </span><a class="twikilink" data-dcnode-id="3056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanSacrifice" title="/pmwiki/pmwiki.php/Main/HumanSacrifice"><span data-dcnode-id="3057" instrument_node="">Human Sacrifice</span></a><span data-dcnode-id="3055" instrument_node=""> to keep the town prosperous worships it</span></span><span data-dcnode-id="3053" instrument_node="">, or if it's just converging delusions of the involved parties. The nature of Mae's dreams are ultimately left unexplained, though there is genuinely a possibility that Mae is sick and is hallucinating in her nightmares, </span><span class="spoiler" data-dcnode-id="3051" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3052" instrument_node="">not helped that the end of the game confirms she has some sort of psychosis, with symptoms of dissociation and sleep paralysis</span></span><span data-dcnode-id="3050" instrument_node=""> and one of the newspaper in the library reveals that there was some sort of gas leak in town that makes people hallucinate. Then again, the possibility that </span><span class="spoiler" data-dcnode-id="3048" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3049" instrument_node="">her apparent mental illness is the result of The Black Goat reaching into her mind</span></span><span data-dcnode-id="3047" instrument_node=""> is ultimately left just as open.</span></li><li data-dcnode-id="3042"><span data-dcnode-id="3045" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3043" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3044" instrument_node="">Whether or not The Black Goat actually exists is never explicitly confirmed. It is left open to interpretation whether the cult's superstitions have any grounding in reality.</span></span></li></ul></li><li data-dcnode-id="3029"><span data-dcnode-id="3039" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MiniGame" title="/pmwiki/pmwiki.php/Main/MiniGame"><span data-dcnode-id="3038" instrument_node="">Mini-Game</span></a><span data-dcnode-id="3036" instrument_node="">: When Mae hangs out with her friends, the gameplay switches to this, such as a </span><a class="twikilink" data-dcnode-id="3034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RhythmGame" title="/pmwiki/pmwiki.php/Main/RhythmGame"><span data-dcnode-id="3035" instrument_node="">Rhythm Game</span></a><span data-dcnode-id="3033" instrument_node=""> during band practice and a </span><a class="twikilink" data-dcnode-id="3031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StealthBasedGame" title="/pmwiki/pmwiki.php/Main/StealthBasedGame"><span data-dcnode-id="3032" instrument_node="">Stealth-Based Game</span></a><span data-dcnode-id="3030" instrument_node=""> when shoplifting.</span></li><li data-dcnode-id="3024"><span data-dcnode-id="3028" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MistakenForPregnant" title="/pmwiki/pmwiki.php/Main/MistakenForPregnant"><span data-dcnode-id="3027" instrument_node="">Mistaken for Pregnant</span></a><span data-dcnode-id="3025" instrument_node="">: Mae's mother briefly wonders if Mae is pregnant. This has nothing to do with Mae's weight, however — she gets this idea because Mae dropped out of college, seemingly out of nowhere, to come and live at home, and has been feeling physically ill, and has been unusually moody and avoidant. Of course, it's nothing like that at all, but Mae's mother is surprisingly supportive, and open-minded when she asks Mae about it.</span></li><li data-dcnode-id="2986"><span data-dcnode-id="3023" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoodWhiplash" title="/pmwiki/pmwiki.php/Main/MoodWhiplash"><span data-dcnode-id="3022" instrument_node="">Mood Whiplash</span></a><span data-dcnode-id="3020" instrument_node="">:</span><ul data-dcnode-id="2987"><li data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node=""> Mae wanders into the woods alone, at night, after no one picks her up at the bus station. She then sees a flashlight and fears the worst. Then the person holding the flashlight speaks, and Mae starts to snark with an annoyed expression. It's her aunt Molly, or rather Aunt Mallcop. Aunt Molly then takes her home, pointing out the alternative is that Mae spends the night in jail.</span></li><li data-dcnode-id="3011"><span data-dcnode-id="3017" instrument_node=""> After a fun band practice, Mae and her friends find </span><span class="spoiler" data-dcnode-id="3012" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3016" instrument_node="">a severed arm lying in the road. Even the music acknowledges the change. Then </span><a class="twikilink" data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackComedy" title="/pmwiki/pmwiki.php/Main/BlackComedy"><span data-dcnode-id="3015" instrument_node="">Black Comedy</span></a><span data-dcnode-id="3013" instrument_node=""> ensues when Mae pokes the arm with a stick.</span></span></li><li data-dcnode-id="3004"><span data-dcnode-id="3010" instrument_node=""> At the party, a drunken Mae first moans about </span><span class="spoiler" data-dcnode-id="3005" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3009" instrument_node="">embarrassing herself in front of her ex. She then rants about wanting to cut people with a knife, and throws up her dinner tacos. Bea takes her home, revealing to the audience and a forgetful Mae that her mother died, and that she's bitter about not going to college. After this, Bea helps a drunken Mae to her room and tucks her into bed. </span><em data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Then</span></em><span data-dcnode-id="3006" instrument_node=""> Mae has a scary, trippy dream about smashing things with a baseball bat.</span></span></li><li data-dcnode-id="2997"><span data-dcnode-id="3003" instrument_node=""> At Harfest, Mae and Gregg help Bea with a </span><a class="twikilink" data-dcnode-id="3001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StylisticSuck" title="/pmwiki/pmwiki.php/Main/StylisticSuck"><span data-dcnode-id="3002" instrument_node="">Stylistic Suck</span></a><span data-dcnode-id="3000" instrument_node=""> Halloween ghost play about the town. They have fun with it, especially since Mae had to memorize her lines in five minutes. Bea and Gregg after the show tell Mae that she can't join them on their respective trips for business and romance. When Mae is trying to figure out what to do, however, </span><span class="spoiler" data-dcnode-id="2998" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2999" instrument_node="">she sees someone being kidnapped.</span></span></li><li data-dcnode-id="2990"><span data-dcnode-id="2996" instrument_node=""> The ghost hunt with Angus in the state park is a sad but ultimately touching scene where Angus tells Mae about his </span><a class="twikilink" data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbusiveParents" title="/pmwiki/pmwiki.php/Main/AbusiveParents"><span data-dcnode-id="2995" instrument_node="">Abusive Parents</span></a><span data-dcnode-id="2993" instrument_node=""> and his disbelief in gods or the supernatural, and the two are having a pleasant time stargazing and getting to know each other better. </span><span class="spoiler" data-dcnode-id="2991" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2992" instrument_node=""> At least until Angus notices that they're being watched by one of the cultists, and the two run for their lives back to Bea's car.</span></span></li><li data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node=""> In Lost Constellation, what you hear about the Huncher before you meet her makes her out to be terrifying, but in person, she and the Kid turn out to be pretty funny. Then you find out what she's done and what her origins are.</span></li></ul></li><li data-dcnode-id="2981"><span data-dcnode-id="2985" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MultipleChoicePast" title="/pmwiki/pmwiki.php/Main/MultipleChoicePast"><span data-dcnode-id="2984" instrument_node="">Multiple-Choice Past</span></a><span data-dcnode-id="2982" instrument_node="">: In the opening, the player makes a series of choices about what Mae remembers most about the year her grandfather died, including the disasters that struck Possum Hollow (the flood or the new highway taking away all the traffic from town), his favorite quote from the Prayer of the Forest God, and what he was staring at in his final moments.</span></li><li data-dcnode-id="2954"><span data-dcnode-id="2980" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MultipleEndings" title="/pmwiki/pmwiki.php/Main/MultipleEndings"><span data-dcnode-id="2979" instrument_node="">Multiple Endings</span></a><span data-dcnode-id="2977" instrument_node="">: While the ultimate outcome of the story doesn't change, there are two possible variations of the ending:</span><ul data-dcnode-id="2955"><li data-dcnode-id="2963"><span data-dcnode-id="2976" instrument_node=""> Mae hangs out with Bea the most and becomes her best friend. Bea's route </span><span class="spoiler" data-dcnode-id="2965" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2975" instrument_node="">results in Bea calling out Mae for her bullshit, and Mae does seem to grow as a person because of it, even declaring "I'm an asshole." in the cemetery. The ending also has Mae suggest the two of them go on a </span><a class="twikilink" data-dcnode-id="2973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RoadTripPlot" title="/pmwiki/pmwiki.php/Main/RoadTripPlot"><span data-dcnode-id="2974" instrument_node="">road trip</span></a><span data-dcnode-id="2972" instrument_node="">, with Mae countering Bea's question about her dissociation when away from Possum Springs with the statement "You're home enough." </span><a class="twikilink" data-dcnode-id="2970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterDevelopment" title="/pmwiki/pmwiki.php/Main/CharacterDevelopment"><span data-dcnode-id="2971" instrument_node="">Bea's route results in Mae becoming closer to her, and maturing as a person</span></a><span data-dcnode-id="2969" instrument_node=""> by Bea's </span><a class="twikilink" data-dcnode-id="2967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrutalHonesty" title="/pmwiki/pmwiki.php/Main/BrutalHonesty"><span data-dcnode-id="2968" instrument_node="">Brutal Honesty</span></a><span data-dcnode-id="2966" instrument_node=""> towards Mae's immaturity</span></span><span data-dcnode-id="2964" instrument_node="">.</span></li><li data-dcnode-id="2956"><span data-dcnode-id="2962" instrument_node=""> Mae hangs out with Gregg the most and becomes his best friend. Gregg's route </span><span class="spoiler" data-dcnode-id="2958" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2961" instrument_node="">seems to change Gregg more, with Mae pushing him to do more crimes with her, or at least he gets worse at hiding them from Angus. However, in Donut Wolf, Angus calls him and Mae out on this. Gregg agrees to stop doing crimes, and Mae ultimately understands and supports this. At the end, Mae asks Gregg if she can move with him and Angus to Bright Harbor, and Gregg ultimately says no, but does say that Mae can visit any time she wants. This ending makes it more like </span><a class="twikilink" data-dcnode-id="2959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterDevelopment" title="/pmwiki/pmwiki.php/Main/CharacterDevelopment"><span data-dcnode-id="2960" instrument_node="">Mae's return to the town changed Gregg for the negative, and that ultimately Angus helps him finally mature. Instead of Mae changing because of her friend, her friend changes because of her</span></a></span><span data-dcnode-id="2957" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2927"><span data-dcnode-id="2953" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MummiesAtTheDinnerTable" title="/pmwiki/pmwiki.php/Main/MummiesAtTheDinnerTable"><span data-dcnode-id="2952" instrument_node="">Mummies at the Dinner Table</span></a><span data-dcnode-id="2950" instrument_node="">: Minor character Mrs. Miranda apparently mummified her husband after he died and kept him in her house.</span><div class="indent" data-dcnode-id="2928"><strong data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Bea:</span></strong><span data-dcnode-id="2947" instrument_node=""> Wait for it... </span><br data-dcnode-id="2946"><strong data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Mrs. Miranda:</span></strong><span data-dcnode-id="2943" instrument_node=""> You can't take a woman's husband just because he's dead! </span><br data-dcnode-id="2942"><strong data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">Bea:</span></strong><span data-dcnode-id="2939" instrument_node=""> </span><em data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">There</span></em><span data-dcnode-id="2936" instrument_node=""> it is. </span><br data-dcnode-id="2935"><strong data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Mae:</span></strong><span data-dcnode-id="2932" instrument_node=""> </span><em data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">Holy God</span></em><span data-dcnode-id="2929" instrument_node="">.</span></div></li><li data-dcnode-id="2922"><span data-dcnode-id="2926" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MundaneMadeAwesome" title="/pmwiki/pmwiki.php/Main/MundaneMadeAwesome"><span data-dcnode-id="2925" instrument_node="">Mundane Made Awesome</span></a><span data-dcnode-id="2923" instrument_node="">: "Ride the chariot to donut hell!"</span></li></ul></div><p data-dcnode-id="2919"></p><div class="folderlabel" data-dcnode-id="2917" onclick="togglefolder('folder2');"><span data-dcnode-id="2918" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;N-R&nbsp;</span></div><div class="folder" data-dcnode-id="2276" id="folder2" isfolder="true" style="display:block;"><ul data-dcnode-id="2277"><li data-dcnode-id="2912"><span data-dcnode-id="2916" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NamesToRunAwayFromReallyFast" title="/pmwiki/pmwiki.php/Main/NamesToRunAwayFromReallyFast"><span data-dcnode-id="2915" instrument_node="">Names to Run Away from Really Fast</span></a><span data-dcnode-id="2913" instrument_node="">: Intentionally done with Germ's pet possum, Rabies. Germ wanted the other possums to respect Rabies, so he named him after something they'd be scared of.</span></li><li data-dcnode-id="2898"><span data-dcnode-id="2911" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NEET" title="/pmwiki/pmwiki.php/Main/NEET"><span data-dcnode-id="2910" instrument_node="">NEET</span></a><span data-dcnode-id="2908" instrument_node="">: Mae Borowski, the protagonist. She drops out of college due to </span><span class="spoiler" data-dcnode-id="2900" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2907" instrument_node=""> having such severe disassociative episodes, that she can't even function at school anymore, which </span><a class="twikilink" data-dcnode-id="2905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane" title="/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane"><span data-dcnode-id="2906" instrument_node="">may or may not, have been caused by an</span></a><span data-dcnode-id="2904" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="2903" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="2901" instrument_node=""> known as the Black Goat</span></span><span data-dcnode-id="2899" instrument_node="">. Mae spends most of the game running around town, talking to her friends, committing crimes, and doing womanchild things, while her parents encourage her to have some ambition.</span></li><li data-dcnode-id="2893"><span data-dcnode-id="2897" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NerdyInhaler" title="/pmwiki/pmwiki.php/Main/NerdyInhaler"><span data-dcnode-id="2896" instrument_node="">Nerdy Inhaler</span></a><span data-dcnode-id="2894" instrument_node="">: Angus needs an inhaler, and while he may be the most 'nerdy' person in his group of friends, he's also probably the most physically imposing.</span></li><li data-dcnode-id="2882"><span data-dcnode-id="2892" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeurodiversityIsSupernatural" title="/pmwiki/pmwiki.php/Main/NeurodiversityIsSupernatural"><span data-dcnode-id="2891" instrument_node="">Neurodiversity Is Supernatural</span></a><span data-dcnode-id="2889" instrument_node="">: While </span><a class="twikilink" data-dcnode-id="2887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane" title="/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane"><span data-dcnode-id="2888" instrument_node="">it's left ambiguous</span></a><span data-dcnode-id="2886" instrument_node="">, it's implied </span><span class="spoiler" data-dcnode-id="2884" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2885" instrument_node=""> the influence of the Black Goat</span></span><span data-dcnode-id="2883" instrument_node=""> is, if not the cause of Mae's disassociative episodes, making them worse.</span></li><li data-dcnode-id="2877"><span data-dcnode-id="2881" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewJobAsThePlotDemands" title="/pmwiki/pmwiki.php/Main/NewJobAsThePlotDemands"><span data-dcnode-id="2880" instrument_node="">New Job as the Plot Demands</span></a><span data-dcnode-id="2878" instrument_node="">: Danny is this and fully aware of it. Having been canned from his construction job, he spends the rest of the game struggling to keep employment, including brief stints at the Ol' Pickaxe and the Clik-Clak Diner. In the epilogue, he's shown to have gotten a job at a new taco joint in town.</span></li><li data-dcnode-id="2869"><span data-dcnode-id="2876" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NextSundayAD" title="/pmwiki/pmwiki.php/Main/NextSundayAD"><span data-dcnode-id="2875" instrument_node="">Next Sunday A.D.</span></a><span data-dcnode-id="2873" instrument_node="">: While the plotline begins in late October of 2017, the game was released in February 2017. While the game is set in a </span><a class="twikilink" data-dcnode-id="2871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldOfFunnyAnimals" title="/pmwiki/pmwiki.php/Main/WorldOfFunnyAnimals"><span data-dcnode-id="2872" instrument_node="">World of Funny Animals</span></a><span data-dcnode-id="2870" instrument_node="">, it's otherwise very similar to our modern day.</span></li><li data-dcnode-id="2859"><span data-dcnode-id="2868" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJobFixingItVillain" title="/pmwiki/pmwiki.php/Main/NiceJobFixingItVillain"><span data-dcnode-id="2867" instrument_node="">Nice Job Fixing It, Villain</span></a><span data-dcnode-id="2865" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2860" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2864" instrument_node="">The cult had already disarmed Gregg at gunpoint and pointed out to the group that they can't tell the police what happened, since the gang doesn't know any of the cultist' faces. Mae can't think straight due to her head injury, so the gang decides to head home to regroup and think a plan, ideally to not </span><em data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">become</span></em><span data-dcnode-id="2861" instrument_node=""> the next generation of cultists. Then the cultist that Gregg injured with his crossbow comes up the elevator shaft and attacks Mae. Angus weaponizing the elevator against him causes a cave-in; while the gang gets out thanks to Mae's adrenaline rush allowing her to climb and find an opening, the rest of the cult is trapped down below. While Bea is shaken at the possibility, Angus points out that the cult were bad people.</span></span></li><li data-dcnode-id="2849"><span data-dcnode-id="2858" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NightmareFetishist" title="/pmwiki/pmwiki.php/Main/NightmareFetishist"><span data-dcnode-id="2857" instrument_node="">Nightmare Fetishist</span></a><span data-dcnode-id="2855" instrument_node="">:</span><ul data-dcnode-id="2850"><li data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node=""> Mae's mother, of all people. Her favorite books are about either grisly murders, or tales of survival against wanton human cruelty (such as "Barrel Boy", who was locked inside a barrel his entire childhood).</span></li><li data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node=""> Lori loves horror movies. She also reveals her daydreams about being a monster to Mae when they hang out by the train tracks.</span></li></ul></li><li data-dcnode-id="2844"><span data-dcnode-id="2848" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonhumansLackAttributes" title="/pmwiki/pmwiki.php/Main/NonhumansLackAttributes"><span data-dcnode-id="2847" instrument_node="">Nonhumans Lack Attributes</span></a><span data-dcnode-id="2845" instrument_node="">: When Mae meets Bombshell at Jackie's party, Bombshell is wearing a low-cut V-neck blouse. Since Bombshell is a bear, the blouse doesn't reveal anything.</span></li><li data-dcnode-id="2825"><span data-dcnode-id="2843" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoodleIncident" title="/pmwiki/pmwiki.php/Main/NoodleIncident"><span data-dcnode-id="2842" instrument_node="">Noodle Incident</span></a><span data-dcnode-id="2840" instrument_node="">:</span><ul data-dcnode-id="2826"><li data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node=""> Mae mentions a "cement incident" where apparently some old things from the house were lost from being encased in cement.</span></li><li data-dcnode-id="2827"><span data-dcnode-id="2837" instrument_node=""> While riding in Mr. Salvi's boat, we hear the </span><a class="twikilink" data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OrphanedPunchline" title="/pmwiki/pmwiki.php/Main/OrphanedPunchline"><span data-dcnode-id="2836" instrument_node="">tail-end</span></a><span data-dcnode-id="2834" instrument_node=""> of a story about how he </span><a class="twikilink" data-dcnode-id="2832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SavingChristmas" title="/pmwiki/pmwiki.php/Main/SavingChristmas"><span data-dcnode-id="2833" instrument_node="">saved Longest Night</span></a><span data-dcnode-id="2831" instrument_node="">. From Mae's follow-up questions, he never told his kids what happened because it would "spoil the magic", the incident left him with </span><a class="twikilink" data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EveryScarHasAStory" title="/pmwiki/pmwiki.php/Main/EveryScarHasAStory"><span data-dcnode-id="2830" instrument_node="">a scar on his neck</span></a><span data-dcnode-id="2828" instrument_node=""> and, while the police never caught the culprit, they will likely never return to Possum Springs.</span></li></ul></li><li data-dcnode-id="2811"><span data-dcnode-id="2824" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NostalgiaFilter" title="/pmwiki/pmwiki.php/Main/NostalgiaFilter"><span data-dcnode-id="2823" instrument_node="">Nostalgia Filter</span></a><span data-dcnode-id="2821" instrument_node="">: Almost every middle-aged person in Possum Springs has one of these. They're still mourning the loss of the mines that used to be the lifeblood of the town, and </span><span class="spoiler" data-dcnode-id="2819" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2820" instrument_node="">the cult's</span></span><span data-dcnode-id="2818" instrument_node=""> main motivation is to restore life to the town via the mines. Mae's dad bemoans that in the old days, bosses respected workers, workers respected the bosses, and everyone got a day's wage for a day's work. However, stop to read the non-ghost related microfiche in the library, and you'll release they are not so much rose-tinting the past as soaking it with pink paint: the mines were so dangerous that people </span><em data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">above</span></em><span data-dcnode-id="2815" instrument_node=""> the ground weren't safe from their faulty structure (see: Jenny's Field, the boy who heard voices), the bosses' neglect of safety caused many fatalities, and the strike action taken to try and make working conditions less lethal resulted in the mine owners </span><em data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">calling in the army</span></em><span data-dcnode-id="2812" instrument_node="">. Thus, the idea that "mines opening = wonderful perfect blue-collar world" isn't just flawed, it's ludicrous.</span></li><li data-dcnode-id="2804"><span data-dcnode-id="2810" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NothingExcitingEverHappensHere" title="/pmwiki/pmwiki.php/Main/NothingExcitingEverHappensHere"><span data-dcnode-id="2809" instrument_node="">Nothing Exciting Ever Happens Here</span></a><span data-dcnode-id="2807" instrument_node="">: Possum Springs is a sleepy mountain town with not a lot going on except for the new superstore, the Harfest festival, and </span><span class="spoiler" data-dcnode-id="2805" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2806" instrument_node=""> a robed cult kidnapping undesirables and feeding them to an elder god.</span></span></li><li data-dcnode-id="2796"><span data-dcnode-id="2803" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NudeColoredClothes" title="/pmwiki/pmwiki.php/Main/NudeColoredClothes"><span data-dcnode-id="2802" instrument_node="">Nude-Colored Clothes</span></a><span data-dcnode-id="2800" instrument_node="">: Possibly unintentional, but in pre-release material, Mae's black jeans and sneakers make her look like a </span><a class="twikilink" data-dcnode-id="2798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HalfDressedCartoonAnimal" title="/pmwiki/pmwiki.php/Main/HalfDressedCartoonAnimal"><span data-dcnode-id="2799" instrument_node="">Half-Dressed Cartoon Animal</span></a><span data-dcnode-id="2797" instrument_node=""> at first glance. In the final game, her pants and shoes are adjusted to lighter colors, likely to avoid this.</span></li><li data-dcnode-id="2785"><span data-dcnode-id="2795" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheOldCountry" title="/pmwiki/pmwiki.php/Main/TheOldCountry"><span data-dcnode-id="2794" instrument_node="">The Old Country</span></a><span data-dcnode-id="2792" instrument_node="">: Mentioned in passing by Mae, particularly about their family's old cuckoo clock. Judging by the name, one would assume it's Poland, but the only other countries specifically mentioned as existing are Russia and Italy, and the latter was in the context of a historical pope who </span><a class="twikilink" data-dcnode-id="2790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouKillItYouBoughtIt" title="/pmwiki/pmwiki.php/Main/YouKillItYouBoughtIt"><span data-dcnode-id="2791" instrument_node="">killed and ate his rival</span></a><span data-dcnode-id="2789" instrument_node="">, as well as having a pretty good horror movie industry, so it's anyone's guess. When Mae's father is telling her a folktale from there in </span><em data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">Lost Constellation</span></em><span data-dcnode-id="2786" instrument_node="">, he only refers to it as "back where my grandparents came from".</span></li><li data-dcnode-id="2778"><span data-dcnode-id="2784" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheOldGods" title="/pmwiki/pmwiki.php/Main/TheOldGods"><span data-dcnode-id="2783" instrument_node="">The Old Gods</span></a><span data-dcnode-id="2781" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2779" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2780" instrument_node=""> The Black Goat, a creature "as black as the space between stars" that lives in a hole in a long-abandoned mine. Unless sated with human sacrifices, he will bring destruction upon the town.</span></span></li><li data-dcnode-id="2767"><span data-dcnode-id="2777" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OldShame" title="/pmwiki/pmwiki.php/Main/OldShame"><span data-dcnode-id="2776" instrument_node="">Old Shame</span></a><span data-dcnode-id="2774" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InUniverse" title="/pmwiki/pmwiki.php/Main/InUniverse"><span data-dcnode-id="2773" instrument_node="">In-Universe</span></a><span data-dcnode-id="2771" instrument_node="">. "Go Get Dead, Angel Face" is Mae's. It's even available as an option to practice in Mae's bedroom in the </span><em data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">Weird Autumn</span></em><span data-dcnode-id="2768" instrument_node=""> edition, but selecting it causes Mae to refuse to play it and remove it from the list of options. Forever.</span></li><li data-dcnode-id="2762"><span data-dcnode-id="2766" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OlderThanTheyLook" title="/pmwiki/pmwiki.php/Main/OlderThanTheyLook"><span data-dcnode-id="2765" instrument_node="">Older Than They Look</span></a><span data-dcnode-id="2763" instrument_node="">: The central character, Mae, is twenty years old, but could easily be mistaken for a teenager, partially because of the game's storybook esque art style, and partially because Mae's the shortest of her friends, is a womanchild, and doesn't have a job or driver's license.</span></li><li data-dcnode-id="2754"><span data-dcnode-id="2761" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHourWorkWeek" title="/pmwiki/pmwiki.php/Main/OneHourWorkWeek"><span data-dcnode-id="2760" instrument_node="">One-Hour Work Week</span></a><span data-dcnode-id="2758" instrument_node="">: Bea (who works very hard at a job she doesn't like much) </span><a class="twikilink" data-dcnode-id="2756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RunningGag" title="/pmwiki/pmwiki.php/Main/RunningGag"><span data-dcnode-id="2757" instrument_node="">repeatedly wonders</span></a><span data-dcnode-id="2755" instrument_node=""> how Gregg manages to hold on to his job, given how casually he skips work whenever something more interesting turns up.</span></li><li data-dcnode-id="2743"><span data-dcnode-id="2753" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheOneWhoMadeItOut" title="/pmwiki/pmwiki.php/Main/TheOneWhoMadeItOut"><span data-dcnode-id="2752" instrument_node="">The One Who Made It Out</span></a><span data-dcnode-id="2750" instrument_node="">: The game has this as a theme, as it's centered on a small </span><a class="twikilink" data-dcnode-id="2748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DyingTown" title="/pmwiki/pmwiki.php/Main/DyingTown"><span data-dcnode-id="2749" instrument_node="">Dying Town</span></a><span data-dcnode-id="2747" instrument_node="">. Gregg recounts a story from his childhood about </span><span class="spoiler" data-dcnode-id="2745" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2746" instrument_node=""> how he accidentally let loose his uncle's sheep, and how nearly all of them, either returned or died. Only one of them escaped to the woods, and Gregg says that he wants to do the same</span></span><span data-dcnode-id="2744" instrument_node="">.</span></li><li data-dcnode-id="2735"><span data-dcnode-id="2742" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneSteveLimit" title="/pmwiki/pmwiki.php/Main/OneSteveLimit"><span data-dcnode-id="2741" instrument_node="">One Steve Limit</span></a><span data-dcnode-id="2739" instrument_node="">: Averted with the </span><em data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">three</span></em><span data-dcnode-id="2736" instrument_node=""> neighborhood kids all named "Harley". There's also probably two people called Dan in town; the cat that keeps changing jobs throughout the game, and the unseen Dan that Aunt Molly mentioned helped her with searching the woods for the kidnapped kid Mae reported.</span></li><li data-dcnode-id="2712"><span data-dcnode-id="2734" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OOCIsSeriousBusiness" title="/pmwiki/pmwiki.php/Main/OOCIsSeriousBusiness"><span data-dcnode-id="2733" instrument_node="">OOC Is Serious Business</span></a><span data-dcnode-id="2731" instrument_node="">:</span><ul data-dcnode-id="2713"><li data-dcnode-id="2721"><span data-dcnode-id="2730" instrument_node=""> Anytime Angus gets angry, with Angus being a </span><a class="twikilink" data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GentleGiant" title="/pmwiki/pmwiki.php/Main/GentleGiant"><span data-dcnode-id="2729" instrument_node="">Gentle Giant</span></a><span data-dcnode-id="2727" instrument_node=""> and a </span><a class="twikilink" data-dcnode-id="2725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceGuy" title="/pmwiki/pmwiki.php/Main/NiceGuy"><span data-dcnode-id="2726" instrument_node="">Nice Guy</span></a><span data-dcnode-id="2724" instrument_node="">, Mae knows that something is wrong. </span><span class="spoiler" data-dcnode-id="2722" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2723" instrument_node="">Such as when he fights with Gregg after a bad night outing to get donuts, or when he says he doesn't regret leaving the cult to die.</span></span></li><li data-dcnode-id="2714"><span data-dcnode-id="2720" instrument_node=""> Happy-go-lucky Gregg is certainly not so in the climax. </span><span class="spoiler" data-dcnode-id="2716" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2719" instrument_node="">Gregg wields a crossbow when an injured Mae goes back to the mines, and yells at her for trying to die. Then he gets furious on hearing the cult killed Casey, threatening to shoot whoever did it with an arrow with "He was my friend, you bastards!" at the cult. The only reason Gregg doesn't fire is because the cult thought to bring guns, resulting in a </span><a class="twikilink" data-dcnode-id="2717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MexicanStandoff" title="/pmwiki/pmwiki.php/Main/MexicanStandoff"><span data-dcnode-id="2718" instrument_node="">Mexican Standoff</span></a></span><span data-dcnode-id="2715" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2704"><span data-dcnode-id="2711" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OpaqueNerdGlasses" title="/pmwiki/pmwiki.php/Main/OpaqueNerdGlasses"><span data-dcnode-id="2710" instrument_node="">Opaque Nerd Glasses</span></a><span data-dcnode-id="2708" instrument_node="">: Angus, Mae's father and Adina Astra from </span><em data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Lost Constellation</span></em><span data-dcnode-id="2705" instrument_node=""> obviously. Though due to the art style, every bespectacled character seems to have opaque glasses.</span></li><li data-dcnode-id="2694"><span data-dcnode-id="2703" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OpenMindedParent" title="/pmwiki/pmwiki.php/Main/OpenMindedParent"><span data-dcnode-id="2702" instrument_node="">Open-Minded Parent</span></a><span data-dcnode-id="2700" instrument_node="">: Mae's mom tries to be this, and mostly succeeds. She's understanding and patient when Mae drops out of college abruptly and asks to come home, and doesn't push her too much, though she clearly wants to know what happened. When she briefly gets the wrong idea and thinks Mae came home because </span><a class="twikilink" data-dcnode-id="2698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MistakenForPregnant" title="/pmwiki/pmwiki.php/Main/MistakenForPregnant"><span data-dcnode-id="2699" instrument_node="">she's pregnant</span></a><span data-dcnode-id="2697" instrument_node="">, she doesn't freak out or get angry, and immediately starts assuring Mae that she'll do whatever he can to help her, and that she understands completely. She sometimes loses her patience with Mae, and even gets in an argument with her over Mae dropping out, but afterwards, she almost immediately owns that she went too far, and assures Mae that she trusts she had a good reason. </span><span class="spoiler" data-dcnode-id="2695" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2696" instrument_node="">It's this trust that allows Mae to say that she'll finally open up to her mom after the business with the Cult of the Black Goat is over.</span></span></li><li data-dcnode-id="2666"><span data-dcnode-id="2693" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OppositesAttract" title="/pmwiki/pmwiki.php/Main/OppositesAttract"><span data-dcnode-id="2692" instrument_node="">Opposites Attract</span></a><span data-dcnode-id="2690" instrument_node="">: Gregg the </span><a class="twikilink" data-dcnode-id="2688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnifeNut" title="/pmwiki/pmwiki.php/Main/KnifeNut"><span data-dcnode-id="2689" instrument_node="">knife-wielding</span></a><span data-dcnode-id="2687" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HellBentForLeather" title="/pmwiki/pmwiki.php/Main/HellBentForLeather"><span data-dcnode-id="2686" instrument_node="">leather-clad</span></a><span data-dcnode-id="2684" instrument_node="">, petty criminal (albeit he's trying to turn his life around) with Angus the </span><a class="twikilink" data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SharpDressedMan" title="/pmwiki/pmwiki.php/Main/SharpDressedMan"><span data-dcnode-id="2683" instrument_node="">neatly dressed</span></a><span data-dcnode-id="2681" instrument_node="">, polite, </span><a class="twikilink" data-dcnode-id="2679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NerdGlasses" title="/pmwiki/pmwiki.php/Main/NerdGlasses"><span data-dcnode-id="2680" instrument_node="">bespectacled</span></a><span data-dcnode-id="2678" instrument_node="">, science geek.</span><ul data-dcnode-id="2667"><li data-dcnode-id="2668"><span data-dcnode-id="2677" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiscussedTrope" title="/pmwiki/pmwiki.php/Main/DiscussedTrope"><span data-dcnode-id="2676" instrument_node="">Discussed</span></a><span data-dcnode-id="2674" instrument_node=""> in Bea's route at the end. </span><span class="spoiler" data-dcnode-id="2669" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2673" instrument_node="">Bea believes that when Gregg and Angus move to the big city and meet new people, they might break up, with Angus realizing there are better options for him than Gregg out there and that fit him better. Of course, if the player chooses to go ghost hunting with Angus, he will point out that Gregg saved him from his </span><a class="twikilink" data-dcnode-id="2671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbusiveParents" title="/pmwiki/pmwiki.php/Main/AbusiveParents"><span data-dcnode-id="2672" instrument_node="">Abusive Parents</span></a><span data-dcnode-id="2670" instrument_node="">, so their relationship might be deeper and more meaningful that what Bea thinks.</span></span></li></ul></li><li data-dcnode-id="2658"><span data-dcnode-id="2665" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OrangeBlueContrast" title="/pmwiki/pmwiki.php/Main/OrangeBlueContrast"><span data-dcnode-id="2664" instrument_node="">Orange/Blue Contrast</span></a><span data-dcnode-id="2662" instrument_node="">: A frequent choice of colors from the background to the main character herself. Especially prevalent </span><span class="spoiler" data-dcnode-id="2660" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2661" instrument_node=""> in the mine</span></span><span data-dcnode-id="2659" instrument_node=""> at the end of the game.</span></li><li data-dcnode-id="2653"><span data-dcnode-id="2657" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurLichesAreDifferent" title="/pmwiki/pmwiki.php/Main/OurLichesAreDifferent"><span data-dcnode-id="2656" instrument_node="">Our Liches Are Different</span></a><span data-dcnode-id="2654" instrument_node="">: One of the dusk star constellations depicts Gramercy the Medium, whose spirit possessed his own corpse after he died, allowing him to live on as an undead being while retaining his sapience. Mae isn't particularly impressed by the story.</span></li><li data-dcnode-id="2645"><span data-dcnode-id="2652" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurVampiresAreDifferent" title="/pmwiki/pmwiki.php/Main/OurVampiresAreDifferent"><span data-dcnode-id="2651" instrument_node="">Our Vampires Are Different</span></a><span data-dcnode-id="2649" instrument_node="">: As briefly mentioned in one of Gregg's hangouts, a defining characteristic of vampires in this universe is </span><em data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">shiny</span></em><span data-dcnode-id="2646" instrument_node=""> teeth rather than sharp teeth, since lots of people have sharp teeth anyway.</span></li><li data-dcnode-id="2640"><span data-dcnode-id="2644" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PainfulRhyme" title="/pmwiki/pmwiki.php/Main/PainfulRhyme"><span data-dcnode-id="2643" instrument_node="">Painful Rhyme</span></a><span data-dcnode-id="2641" instrument_node="">: One of Fisherman Joe's poems has him awkwardly try to rhyme "storm" and "home." Mae mocks this by drawing a picture in her journal of a fish with a hat and briefcase saying, "Honey, I'm horm."</span></li><li data-dcnode-id="2633"><span data-dcnode-id="2639" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ParentalNeglect" title="/pmwiki/pmwiki.php/Main/ParentalNeglect"><span data-dcnode-id="2638" instrument_node="">Parental Neglect</span></a><span data-dcnode-id="2636" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2634" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2635" instrument_node="">Double subverted. While Mae bemoans this when having to walk home through the woods, her parents sincerely did forget that she was coming home a day early. When she's actually in town, her parents are more than willing to spend time with her. It then becomes double-subverted when we learn her father is a recovering alcoholic.</span></span></li><li data-dcnode-id="2619"><span data-dcnode-id="2632" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PartingWordsRegret" title="/pmwiki/pmwiki.php/Main/PartingWordsRegret"><span data-dcnode-id="2631" instrument_node="">Parting Words Regret</span></a><span data-dcnode-id="2629" instrument_node="">:</span><ul data-dcnode-id="2620"><li data-dcnode-id="2625"><span data-dcnode-id="2628" instrument_node=""> Averted between Mae and her mother, if they have that nasty fight on Harfest. They apologize to each other the next morning and are on good terms when </span><span class="spoiler" data-dcnode-id="2626" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2627" instrument_node="">Mae gets a potentially fatal head injury.</span></span></li><li data-dcnode-id="2621"><span data-dcnode-id="2624" instrument_node=""> Played straight when Mae argues with her friends about the ghost being real or not. </span><span class="spoiler" data-dcnode-id="2622" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2623" instrument_node="">Nevertheless, they follow her into the woods when she insists on going, because being in the woods alone is dangerous. Then she suffers her head injury, and her friends are worried sick while hiding in Gregg and Angus's apartment.</span></span></li></ul></li><li data-dcnode-id="2614"><span data-dcnode-id="2618" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PeekABooCorpse" title="/pmwiki/pmwiki.php/Main/PeekABooCorpse"><span data-dcnode-id="2617" instrument_node="">Peek-a-Boo Corpse</span></a><span data-dcnode-id="2615" instrument_node="">: Courtesy of the late "Little Joe".</span></li><li data-dcnode-id="2602"><span data-dcnode-id="2613" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PermanentlyMissableContent" title="/pmwiki/pmwiki.php/Main/PermanentlyMissableContent"><span data-dcnode-id="2612" instrument_node="">Permanently Missable Content</span></a><span data-dcnode-id="2610" instrument_node="">:</span><ul data-dcnode-id="2603"><li data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node=""> You only have so many days to do things you want with your friends. Realistically, you can only reach the end of Bea or Gregg's storylines once per playthrough, and even then they have multiple endings.</span></li><li data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node=""> There's also various side activities in the town, which don't take time out of each day, but are plentiful enough to be easily passed by.</span></li><li data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node=""> When Mae chooses to go ghost hunting with her friends, there are three available options between Bea, Gregg and Angus. You can only see two of them per playthrough.</span></li></ul></li><li data-dcnode-id="2590"><span data-dcnode-id="2601" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PetTheDog" title="/pmwiki/pmwiki.php/Main/PetTheDog"><span data-dcnode-id="2600" instrument_node="">Pet the Dog</span></a><span data-dcnode-id="2598" instrument_node="">:</span><ul data-dcnode-id="2591"><li data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node=""> Aunt Molly's first act is to take Mae home when the latter is walking home alone in the woods. For the rest of the game she's a bit obstreperous.</span></li><li data-dcnode-id="2592"><span data-dcnode-id="2595" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2593" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2594" instrument_node="">The janitor appears to a comatose Mae and her parents, and appears to heal her. There are some implications that the janitor is a god, or God, but in his previous interaction with Mae he had simply asked her to get him a free soda.</span></span></li></ul></li><li data-dcnode-id="2582"><span data-dcnode-id="2589" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PleaseDontLeaveMe" title="/pmwiki/pmwiki.php/Main/PleaseDontLeaveMe"><span data-dcnode-id="2588" instrument_node="">Please, Don't Leave Me</span></a><span data-dcnode-id="2586" instrument_node="">: A platonic example; when Mae suffers from her </span><span class="spoiler" data-dcnode-id="2584" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2585" instrument_node="">head injury, there's a scene where the people she befriended all gather and ask her to wake up because they don't want her to die. Lori says she wants Mae to star in her movie, Selmers says that Mae hearing her poems makes her happy, and Mr. Chazokov starts crying as he recounts stargazing with Mae</span></span><span data-dcnode-id="2583" instrument_node="">.</span></li><li data-dcnode-id="2571"><span data-dcnode-id="2581" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PleaseWakeUp" title="/pmwiki/pmwiki.php/Main/PleaseWakeUp"><span data-dcnode-id="2580" instrument_node="">Please Wake Up</span></a><span data-dcnode-id="2578" instrument_node="">: A heartbreaking subversion. </span><span class="spoiler" data-dcnode-id="2573" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2577" instrument_node="">Mae falls unconscious after getting a severe head injury in the climax. The neighbors she befriended in the game — you can do Selmers, Lori and Mr. Chazokov— gather. They all say they want Mae to wake up, with Mr. Chazokov bursting into tears as he recounts stargazing with her, thinking she's going to die. Fortunately, the janitor appears and Mae </span><em data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">does</span></em><span data-dcnode-id="2574" instrument_node=""> wake up after he seems to heal her. The next day, after all the fracas with the cult, Mae can go to each of them and reassure her new friends that she's okay</span></span><span data-dcnode-id="2572" instrument_node="">.</span></li><li data-dcnode-id="2555"><span data-dcnode-id="2570" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PoliceAreUseless" title="/pmwiki/pmwiki.php/Main/PoliceAreUseless"><span data-dcnode-id="2569" instrument_node="">Police Are Useless</span></a><span data-dcnode-id="2567" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZigZagged" title="/pmwiki/pmwiki.php/Main/ZigZagged"><span data-dcnode-id="2566" instrument_node="">Zig-Zagged</span></a><span data-dcnode-id="2564" instrument_node=""> with Aunt Molly. She </span><em data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">does</span></em><span data-dcnode-id="2561" instrument_node=""> find Mae on the first night and takes her home, instead of letting her walk through the woods. </span><span class="spoiler" data-dcnode-id="2557" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2560" instrument_node="">She also finds Mae when the latter goes missing near the climax, after the cult chases her and causes her to have a head injury, and it is implied at the end that she is aware that Mae is in some way connected to the "strange" calls she got in the epilogue, but doesn't pursue it because </span><a class="twikilink" data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlausibleDeniability" title="/pmwiki/pmwiki.php/Main/PlausibleDeniability"><span data-dcnode-id="2559" instrument_node="">she doesn't want to know</span></a></span><span data-dcnode-id="2556" instrument_node="">.</span></li><li data-dcnode-id="2547"><span data-dcnode-id="2554" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PositiveFriendInfluence" title="/pmwiki/pmwiki.php/Main/PositiveFriendInfluence"><span data-dcnode-id="2553" instrument_node="">Positive Friend Influence</span></a><span data-dcnode-id="2551" instrument_node="">: In Bea's route, she will play this to the womanchild Mae. Because Bea is bitter over Mae getting the chances she could never have, and not even caring due to her own immaturity, she will call Mae out on her behavior, how she can't just waltz through life not caring, and being a burden for everyone else, her parents, and friends especially, to support. In face of that, and of all Bea suffered between </span><span class="spoiler" data-dcnode-id="2549" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2550" instrument_node=""> her father's dismissive attitude, her mother's death, and working with a possible sexual abuser</span></span><span data-dcnode-id="2548" instrument_node="">, Mae is forced in the realization she has to grow up and mature.</span></li><li data-dcnode-id="2522"><span data-dcnode-id="2546" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PosthumousCharacter" title="/pmwiki/pmwiki.php/Main/PosthumousCharacter"><span data-dcnode-id="2545" instrument_node="">Posthumous Character</span></a><span data-dcnode-id="2543" instrument_node="">: Quite a few:</span><ul data-dcnode-id="2523"><li data-dcnode-id="2539"><span data-dcnode-id="2542" instrument_node=""> Mae's Grandpa's last words are the subject of the game's opening, and the events of his life come up in several sidequests. </span><span class="spoiler" data-dcnode-id="2540" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2541" instrument_node=""> The Weird Autumn edition adds a scene where his ghost appears to watch over Mae while she naps in the Church.</span></span></li><li data-dcnode-id="2534"><span data-dcnode-id="2538" instrument_node=""> Bea's mother gets very little characterisation beyond Mae drunkenly sobbing about how nice she was. Her death is mostly what forced Bea to grow up much faster than </span><a class="twikilink" data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WomanChild" title="/pmwiki/pmwiki.php/Main/WomanChild"><span data-dcnode-id="2537" instrument_node="">Mae</span></a><span data-dcnode-id="2535" instrument_node="">.</span></li><li data-dcnode-id="2524"><span data-dcnode-id="2533" instrument_node=""> On a more spoilery note </span><span class="spoiler" data-dcnode-id="2525" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2532" instrument_node=""> Casey, whose status as a missing person is felt several times throughout the game turns out to be a case of </span><a class="twikilink" data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SeekingTheMissingFindingTheDead" title="/pmwiki/pmwiki.php/Main/SeekingTheMissingFindingTheDead"><span data-dcnode-id="2531" instrument_node="">Seeking the Missing, Finding the Dead</span></a><span data-dcnode-id="2529" instrument_node="">. The fact that the villains considered his life worth so little that they were willing to sacrifice him to </span><a class="twikilink" data-dcnode-id="2527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="2528" instrument_node="">the Black Goat</span></a><span data-dcnode-id="2526" instrument_node=""> without worrying about anyone missing him helps drive home that they are, indeed, the bad guys.</span></span></li></ul></li><li data-dcnode-id="2512"><span data-dcnode-id="2521" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PragmaticVillainy" title="/pmwiki/pmwiki.php/Main/PragmaticVillainy"><span data-dcnode-id="2520" instrument_node="">Pragmatic Villainy</span></a><span data-dcnode-id="2518" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2513" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2517" instrument_node="">Even though they are </span><a class="twikilink" data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AffablyEvil" title="/pmwiki/pmwiki.php/Main/AffablyEvil"><span data-dcnode-id="2516" instrument_node="">Affably Evil</span></a><span data-dcnode-id="2514" instrument_node="">, the cult for the Black Goat isn't messing around. When Gregg pulls his crossbow on them, several of them pull out guns, explaining that they have them for protection against wild animals in the woods. And they let Mae's group go peacefully, seeing as how none of them fit the standard of "people that nobody would miss" that the cult requires to sacrifice someone. This is in spite of Gregg shooting one of their members in the shoulder with a crossbow.</span></span></li><li data-dcnode-id="2487"><span data-dcnode-id="2511" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PreAsskickingOneLiner" title="/pmwiki/pmwiki.php/Main/PreAsskickingOneLiner"><span data-dcnode-id="2510" instrument_node="">Pre-Asskicking One-Liner</span></a><span data-dcnode-id="2508" instrument_node="">: Mae says one </span><span class="spoiler" data-dcnode-id="2503" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2507" instrument_node="">when trying to get the goth guys at the party to move away from their car so she can </span><a class="twikilink" data-dcnode-id="2505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItMakesSenseInContext" title="/pmwiki/pmwiki.php/Main/ItMakesSenseInContext"><span data-dcnode-id="2506" instrument_node="">get across the rooftops to the river</span></a><span data-dcnode-id="2504" instrument_node="">. It kind of works</span></span><span data-dcnode-id="2502" instrument_node="">.</span><div class="indent" data-dcnode-id="2488"><strong data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Mae:</span></strong><span data-dcnode-id="2499" instrument_node=""> If you don't get away from your damn car, I'm gonna run it over your damn head. </span><br data-dcnode-id="2498"><strong data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">Goth Guy:</span></strong><span data-dcnode-id="2495" instrument_node=""> Can you even drive? </span><br data-dcnode-id="2494"><strong data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Mae:</span></strong><span data-dcnode-id="2491" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImpliedDeathThreat" title="/pmwiki/pmwiki.php/Main/ImpliedDeathThreat"><span data-dcnode-id="2490" instrument_node="">Wanna find out, citizen?</span></a></div></li><li data-dcnode-id="2482"><span data-dcnode-id="2486" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PredatoryBusiness" title="/pmwiki/pmwiki.php/Main/PredatoryBusiness"><span data-dcnode-id="2485" instrument_node="">Predatory Business</span></a><span data-dcnode-id="2483" instrument_node="">: The Ham Panther supermarket is a downplayed example of this, as everyone knows it's not the workers' fault, but there are still quite a few people, potentially including Mae, unhappy that it drove the folksy, apparently family-run Food Donkey and its animatronic performers out of business.</span></li><li data-dcnode-id="2474"><span data-dcnode-id="2481" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PreviousPlayerCharacterCameo" title="/pmwiki/pmwiki.php/Main/PreviousPlayerCharacterCameo"><span data-dcnode-id="2480" instrument_node="">Previous Player-Character Cameo</span></a><span data-dcnode-id="2478" instrument_node="">: Adina Astra from </span><em data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">Longest Night: Lost Constellation</span></em><span data-dcnode-id="2475" instrument_node=""> can be seen as a constellation during one of the "Dusk Star Hunting" sidequests.</span></li><li data-dcnode-id="2469"><span data-dcnode-id="2473" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProgressiveInstrumentation" title="/pmwiki/pmwiki.php/Main/ProgressiveInstrumentation"><span data-dcnode-id="2472" instrument_node="">Progressive Instrumentation</span></a><span data-dcnode-id="2470" instrument_node="">: Features certain levels where you search for four ghosts. Each area starts off silent, but as you locate each one, they'll begin playing an instrument, until the entire band is performing.</span></li><li data-dcnode-id="2459"><span data-dcnode-id="2468" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProperlyParanoid" title="/pmwiki/pmwiki.php/Main/ProperlyParanoid"><span data-dcnode-id="2467" instrument_node="">Properly Paranoid</span></a><span data-dcnode-id="2465" instrument_node="">: As Gregg or Bea lampshade in the climax, though Mae was scared it was a resurgence </span><span class="spoiler" data-dcnode-id="2460" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2464" instrument_node="">of her disassociation, she </span><em data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">did</span></em><span data-dcnode-id="2461" instrument_node=""> see a kidnapping on Harfest and it isn't connected to her mental illness.</span></span></li><li data-dcnode-id="2443"><span data-dcnode-id="2458" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PsychoPsychologist" title="/pmwiki/pmwiki.php/Main/PsychoPsychologist"><span data-dcnode-id="2457" instrument_node="">Psycho Psychologist</span></a><span data-dcnode-id="2455" instrument_node="">: Demonstrates an example who isn't actively malicious in his intent with patients, but he </span><em data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">does</span></em><span data-dcnode-id="2452" instrument_node=""> show that incompetence can be equally dangerous. </span><span class="spoiler" data-dcnode-id="2444" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2451" instrument_node=""> Namely, Dr. Hank, the town's </span><a class="twikilink" data-dcnode-id="2449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperDoc" title="/pmwiki/pmwiki.php/Main/SuperDoc"><span data-dcnode-id="2450" instrument_node="">general medical practitioner</span></a><span data-dcnode-id="2448" instrument_node="">, makes "keep a journal" and "repress your issues" into </span><em data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">every</span></em><span data-dcnode-id="2445" instrument_node=""> therapy solution, which leaves protagonist Mae Borowski incredibly ill equipped to deal with her own dissociation and psychosis, leaving her to viciously attack another child, and later drop out of college when her symptoms flared up, and frightened her away.</span></span></li><li data-dcnode-id="2435"><span data-dcnode-id="2442" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PunnyName" title="/pmwiki/pmwiki.php/Main/PunnyName"><span data-dcnode-id="2441" instrument_node="">Punny Name</span></a><span data-dcnode-id="2439" instrument_node="">: Perhaps. The name "Mae Borowski" abbreviates to </span><em data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Mae B.</span></em><span data-dcnode-id="2436" instrument_node="">, and her onetime best friend is "Bea".</span></li><li data-dcnode-id="2430"><span data-dcnode-id="2434" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/QuirkyTown" title="/pmwiki/pmwiki.php/Main/QuirkyTown"><span data-dcnode-id="2433" instrument_node="">Quirky Town</span></a><span data-dcnode-id="2431" instrument_node="">: Possum Springs, filled with dozens of hooligans and a lot of weirdos.</span></li><li data-dcnode-id="2425"><span data-dcnode-id="2429" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RapidFireNo" title="/pmwiki/pmwiki.php/Main/RapidFireNo"><span data-dcnode-id="2428" instrument_node="">Rapid-Fire "No!"</span></a><span data-dcnode-id="2426" instrument_node="">: Mae's reaction when Pastabilities closes down.</span></li><li data-dcnode-id="2418"><span data-dcnode-id="2424" instrument_node=""> </span><a class="twikilin
