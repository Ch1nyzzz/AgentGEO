ced their friend Casey.</span></span></li><li data-dcnode-id="3823"><span data-dcnode-id="3827" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFriendNobodyLikes" title="/pmwiki/pmwiki.php/Main/TheFriendNobodyLikes"><span data-dcnode-id="3826" instrument_node="">The Friend Nobody Likes</span></a><span data-dcnode-id="3824" instrument_node="">: Steve Scriggins is a sleazy guy who hangs out with Gregg and Mae sometimes, even though neither of them like him at all.</span></li><li data-dcnode-id="3815"><span data-dcnode-id="3822" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FunWithSubtitles" title="/pmwiki/pmwiki.php/Main/FunWithSubtitles"><span data-dcnode-id="3821" instrument_node="">Fun with Subtitles</span></a><span data-dcnode-id="3819" instrument_node="">: At one point, Mae is incredibly drunk. The dialogue options are crisp and eloquent almost to the point of </span><a class="twikilink" data-dcnode-id="3817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExpospeakGag" title="/pmwiki/pmwiki.php/Main/ExpospeakGag"><span data-dcnode-id="3818" instrument_node="">Expospeak Gag</span></a><span data-dcnode-id="3816" instrument_node="">, but what she actually says is slurred and wobbly.</span></li><li data-dcnode-id="3780"><span data-dcnode-id="3814" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FurryConfusion" title="/pmwiki/pmwiki.php/Main/FurryConfusion"><span data-dcnode-id="3813" instrument_node="">Furry Confusion</span></a><span data-dcnode-id="3811" instrument_node="">:</span><ul data-dcnode-id="3781"><li data-dcnode-id="3803"><span data-dcnode-id="3810" instrument_node=""> Possum Springs contains both anthro and non-anthro rodents, cats, birds, and raccoons. Mae has a stuffed raccoon, her prom date was an anthro raccoon. Her parents have a bird in a cage. Lori M. is an anthro mouse usually found perched next to a building full of non-anthro rats. Mae's grandfather tells of a </span><em data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">talking</span></em><span data-dcnode-id="3807" instrument_node=""> cat in </span><em data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">Lost Constellation</span></em><span data-dcnode-id="3804" instrument_node=""> as if a talking cat were unnatural, even though both he and his granddaughter are anthro cats. When breaking into the Shreigeist house, Gregg gets attacked by an owl.</span></li><li data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node=""> Probably the most blatant example is when Mae talks about how a dog chewed up her ear when she was young, causing to look like it does at the present. She then says something along the lines of "The joke is on him though, dogs only live for like 10 years, unlike people."</span></li><li data-dcnode-id="3788"><span data-dcnode-id="3800" instrument_node=""> Lori M. refers to "the human spirit." Scott Benson </span><a class="urllink" data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curiouscat.me/bombsfall/post/127359166"><span data-dcnode-id="3799" instrument_node="">implies that</span><img data-dcnode-id="3798" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3796" instrument_node=""> </span><a class="urllink" data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curiouscat.me/bombsfall/post/61877427"><span data-dcnode-id="3795" instrument_node="">"human" refers to</span><img data-dcnode-id="3794" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3792" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallASmeerpARabbit" title="/pmwiki/pmwiki.php/Main/CallASmeerpARabbit"><span data-dcnode-id="3791" instrument_node="">any kind of sapient animal in this universe</span></a><span data-dcnode-id="3789" instrument_node="">.</span></li><li data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node=""> There are references to buck hunting season in the game even though there are deer people wandering around the town.</span></li><li data-dcnode-id="3782"><span data-dcnode-id="3785" instrument_node=""> If Mae fails to raise the rats in Mallard's Tomb, she'll complain about the fact her father owns a bird to Germ when he asks her if she has any pets. </span><a class="twikilink" data-dcnode-id="3783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HypocriticalHumor" title="/pmwiki/pmwiki.php/Main/HypocriticalHumor"><span data-dcnode-id="3784" instrument_node="">Germ agrees with her that birds are the worst.</span></a></li></ul></li><li data-dcnode-id="3760"><span data-dcnode-id="3779" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FurryReminder" title="/pmwiki/pmwiki.php/Main/FurryReminder"><span data-dcnode-id="3778" instrument_node="">Furry Reminder</span></a><span data-dcnode-id="3776" instrument_node="">:</span><ul data-dcnode-id="3761"><li data-dcnode-id="3771"><span data-dcnode-id="3775" instrument_node=""> Mae can play with a ball of yarn despite finding it "patronizing," and if she ends up going to Donut Wolf with Gregg and Angus </span><span class="spoiler" data-dcnode-id="3773" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3774" instrument_node="">she's able to seriously scratch up a mirror with her bare hands,</span></span><span data-dcnode-id="3772" instrument_node=""> so she clearly has claws.</span></li><li data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node=""> If the player interacts with the bird in the bird cage in Mae's house, Mae will state that she never liked that bird.</span></li><li data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node=""> Mae can jump three times her own height and walk on power lines, because she's a cat.</span></li><li data-dcnode-id="3762"><span data-dcnode-id="3766" instrument_node=""> Many of the constellations in </span><em data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">Longest Night</span></em><span data-dcnode-id="3763" instrument_node=""> are referred to as being anthropomorphic, and others are said to resemble other characters: Bea mentions that her mother always said she resembled Harmonium, Germ is said to resemble Invenerus (Specifically with the beak), and Lucio is specifically cited as a fox. In the game proper, Mae refers to Corvin the Thief as "asscat".</span></li></ul></li><li data-dcnode-id="3752"><span data-dcnode-id="3759" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GallowsHumor" title="/pmwiki/pmwiki.php/Main/GallowsHumor"><span data-dcnode-id="3758" instrument_node="">Gallows Humor</span></a><span data-dcnode-id="3756" instrument_node="">: Many characters. Greg and Mae tease each other about possible horrible and unlikely deaths. Mae's dad comments that she shouldn't go out "unarmed" after </span><span class="spoiler" data-dcnode-id="3754" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3755" instrument_node="">Mae and her band find a severed arm</span></span><span data-dcnode-id="3753" instrument_node="">, and Mae's mother jokes that it shouldn't be too hard to find out who said item belonged to, with she and Mae acting out a light-hearted skit about someone locating the owner.</span></li><li data-dcnode-id="3740"><span data-dcnode-id="3751" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStoryIntegration" title="/pmwiki/pmwiki.php/Main/GameplayAndStoryIntegration"><span data-dcnode-id="3750" instrument_node="">Gameplay and Story Integration</span></a><span data-dcnode-id="3748" instrument_node="">: The bass minigame can be </span><em data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">very</span></em><span data-dcnode-id="3745" instrument_node=""> difficult, and the first time Mae has band practice you'll have had, at most, two cracks at it before and can't have practiced "Die Anywhere Else" yet, so it's hard to do well. This makes perfect sense story-wise, as Mae hasn't played in ages, thus losing much of her skill, and the song is new to her.</span><div class="indent" data-dcnode-id="3741"><strong data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">Mae:</span></strong><span data-dcnode-id="3742" instrument_node=""> I literally do not know this song.</span></div></li><li data-dcnode-id="3714"><span data-dcnode-id="3739" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameWithinAGame" title="/pmwiki/pmwiki.php/Main/GameWithinAGame"><span data-dcnode-id="3738" instrument_node="">Game Within a Game</span></a><span data-dcnode-id="3736" instrument_node="">: </span><em data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">Demontower</span></em><span data-dcnode-id="3733" instrument_node="">, a </span><a class="twikilink" data-dcnode-id="3731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Roguelike" title="/pmwiki/pmwiki.php/Main/Roguelike"><span data-dcnode-id="3732" instrument_node="">roguelike</span></a><span data-dcnode-id="3730" instrument_node=""> Mae can play on her laptop. Potentially a </span><a class="twikilink" data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="3729" instrument_node="">Shout-Out</span></a><span data-dcnode-id="3727" instrument_node=""> to </span><em data-dcnode-id="3724"><a class="twikilink" data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheBindingOfIsaac" title="/pmwiki/pmwiki.php/VideoGame/TheBindingOfIsaac"><span data-dcnode-id="3726" instrument_node="">The Binding of Isaac</span></a></em><span data-dcnode-id="3723" instrument_node=""> or </span><em data-dcnode-id="3720"><a class="twikilink" data-dcnode-id="3721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/EnterTheGungeon" title="/pmwiki/pmwiki.php/VideoGame/EnterTheGungeon"><span data-dcnode-id="3722" instrument_node="">Enter the Gungeon</span></a></em><span data-dcnode-id="3719" instrument_node="">, with a hefty helping of </span><em data-dcnode-id="3716"><a class="twikilink" data-dcnode-id="3717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSouls" title="/pmwiki/pmwiki.php/VideoGame/DarkSouls"><span data-dcnode-id="3718" instrument_node="">Dark Souls</span></a></em><span data-dcnode-id="3715" instrument_node="">.</span></li><li data-dcnode-id="3701"><span data-dcnode-id="3713" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GarageBand" title="/pmwiki/pmwiki.php/Main/GarageBand"><span data-dcnode-id="3712" instrument_node="">Garage Band</span></a><span data-dcnode-id="3710" instrument_node="">: The four mains occasionally take evening breaks to play in a band together — Angus on vocals, Gregg on lead guitar, Mae on bass, and Bea using a computerized drum kit.</span><span class="notelabel" data-dcnode-id="3707" onclick="togglenote('note0iysx');" style="cursor: pointer;"><sup data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3702" id="note0iysx" isnote="true" onclick="togglenote('note0iysx');" style="display: none; cursor: pointer;"><span data-dcnode-id="3706" instrument_node="">The fact that 3/4ths of the band are LGBTQ (Gregg and Angus are gay and Mae is pan) may or may not make them a </span><a class="twikilink" data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Queercore" title="/pmwiki/pmwiki.php/Main/Queercore"><span data-dcnode-id="3705" instrument_node="">queercore</span></a><span data-dcnode-id="3703" instrument_node=""> band.</span></span></li><li data-dcnode-id="3696"><span data-dcnode-id="3700" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GayBestFriend" title="/pmwiki/pmwiki.php/Main/GayBestFriend"><span data-dcnode-id="3699" instrument_node="">Gay Best Friend</span></a><span data-dcnode-id="3697" instrument_node="">: Subverted with Gregg, in that the title is literal. Rather than be like the stereotypical swishy gay character who dishes out advice to his female friends, he's just Mae's childhood bestie who joins her in her acts of petty vandalism and just happens to be homosexual. (And Mae herself is not straight either.)</span></li><li data-dcnode-id="3688"><span data-dcnode-id="3695" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Gayngst" title="/pmwiki/pmwiki.php/Main/Gayngst"><span data-dcnode-id="3694" instrument_node="">Gayngst</span></a><span data-dcnode-id="3692" instrument_node="">: Downplayed with Gregg and Angus. Their relationship and the fact that they live together is depicted as entirely normal by both the narrative and all of the present characters. However, they mention that they've both </span><a class="twikilink" data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkAndTroubledPast" title="/pmwiki/pmwiki.php/Main/DarkAndTroubledPast"><span data-dcnode-id="3691" instrument_node="">gone through a lot of trauma to get to this level of normalcy</span></a><span data-dcnode-id="3689" instrument_node=""> and are desperate to move somewhere where they aren't the only queer people they know (which Bea theorizes is the only reason they're together in the first place).</span></li><li data-dcnode-id="3677"><span data-dcnode-id="3687" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodWasMyCopilot" title="/pmwiki/pmwiki.php/Main/GodWasMyCopilot"><span data-dcnode-id="3686" instrument_node="">God Was My Copilot</span></a><span data-dcnode-id="3684" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3682" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3683" instrument_node=""> The Janitor is implied to be some sort of supernatural force, possibly even God itself towards the end of the game, he even knows Mae's name. The God(?) Mae meets in her dream point out that the thing Mae calls God doesn't exist, or at least is working in such a subtle manner, that is impossible for them to see, which would be fitting of a Janitor</span></span><span data-dcnode-id="3681" instrument_node="">. There is though a plausible explanation to a lot that happens around him, and some are possibly just a coincidence, so it ends in a </span><a class="twikilink" data-dcnode-id="3679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane" title="/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane"><span data-dcnode-id="3680" instrument_node="">Maybe Magic, Maybe Mundane</span></a><span data-dcnode-id="3678" instrument_node=""> situation.</span></li><li data-dcnode-id="3669"><span data-dcnode-id="3676" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AGoodNameForARockBand" title="/pmwiki/pmwiki.php/Main/AGoodNameForARockBand"><span data-dcnode-id="3675" instrument_node="">A Good Name for a Rock Band</span></a><span data-dcnode-id="3673" instrument_node="">: If you talk to Mr. Chazokov on the first day of Act 2, he'll tell Mae, he's looking for "dusk stars". You can have Mae reply, "Dusk Stars is the name of my </span><a class="twikilink" data-dcnode-id="3671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Shoegazing" title="/pmwiki/pmwiki.php/Main/Shoegazing"><span data-dcnode-id="3672" instrument_node="">shoegaze</span></a><span data-dcnode-id="3670" instrument_node=""> band."</span></li><li data-dcnode-id="3662"><span data-dcnode-id="3668" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodShepherd" title="/pmwiki/pmwiki.php/Main/GoodShepherd"><span data-dcnode-id="3667" instrument_node="">Good Shepherd</span></a><span data-dcnode-id="3665" instrument_node="">: Pastor Karen. She's a very kind woman, is trying to open a homeless shelter, and gladly strikes up a friendship with Mae, despite Mae's religious beliefs (or lack thereof). She uses her faith as a tool to help people of all backgrounds, creeds, and lifestyles. </span><span class="spoiler" data-dcnode-id="3663" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3664" instrument_node=""> She privately admits her own faith in God is wavering, and she hopes that, by convincing other people to believe, she can convince herself, too.</span></span></li><li data-dcnode-id="3657"><span data-dcnode-id="3661" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Goth" title="/pmwiki/pmwiki.php/Main/Goth"><span data-dcnode-id="3660" instrument_node="">Goth</span></a><span data-dcnode-id="3658" instrument_node="">: Bea. She becomes more positive over the course of the game, however.</span></li><li data-dcnode-id="3652"><span data-dcnode-id="3656" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreenGators" title="/pmwiki/pmwiki.php/Main/GreenGators"><span data-dcnode-id="3655" instrument_node="">Green Gators</span></a><span data-dcnode-id="3653" instrument_node="">: Bea Santello, one of the main characters of the game, is a bluish-green crocodile.</span></li><li data-dcnode-id="3647"><span data-dcnode-id="3651" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrowingUpSucks" title="/pmwiki/pmwiki.php/Main/GrowingUpSucks"><span data-dcnode-id="3650" instrument_node="">Growing Up Sucks</span></a><span data-dcnode-id="3648" instrument_node="">: Growing pains and arrested development are some of the biggest themes in the game from the start, touching on everything from the mingled disillusionment and longing one feels upon looking upon their own naivety as a kid - especially with regards to losing the faith they were once able to take for granted when they were young - to how daunting the future looks when a person is thrust into young adulthood despite not having grown out of old coping mechanisms and bad habits yet, and they're now able to see old and familiar things in their lives start to decay with age.</span></li><li data-dcnode-id="3624"><span data-dcnode-id="3646" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="3645" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="3643" instrument_node="">: If you're going for the "Seriously?" trophy, you have your work cut out for you, as you will have to traverse each and every inch of Possum Springs, multiple times, looking for things to examine and people to talk to. The description even lampshades just how hard this achievement is.</span><div class="indent" data-dcnode-id="3639"><span data-dcnode-id="3642" instrument_node=""> </span><em data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">"All sketches? We made the game and have never gotten this. Wow."</span></em></div><ul data-dcnode-id="3625"><li data-dcnode-id="3633"><span data-dcnode-id="3638" instrument_node=""> The "Accidentally Good Dinner" achievement (</span><a class="urllink" data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DkCDnv00dq3g"><span data-dcnode-id="3637" instrument_node="">see video</span><img data-dcnode-id="3636" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3634" instrument_node="">) can be a bit tricky if you want to make dinner for Bea and her dad. There are four good recipes out of dozens of possible combinations of ingredients.</span></li><li data-dcnode-id="3626"><span data-dcnode-id="3632" instrument_node=""> The questions the Thryy Wyrd Tyyns ask you when you first meet them on the cliff near the First Coalescence Church, about which spooky thing you have encountered in your life. </span><span class="spoiler" data-dcnode-id="3630" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3631" instrument_node="">From the clue on your journal and at the beginning of the game, the answer is obvious: a shipwreck.</span></span><span data-dcnode-id="3629" instrument_node=""> Also, about what God is like: </span><span class="spoiler" data-dcnode-id="3627" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3628" instrument_node="">it foreshadows what you will meet in the final dream in Part III (the Sky Cat), and it is "uncaring and distant".</span></span></li></ul></li><li data-dcnode-id="3614"><span data-dcnode-id="3623" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HaveYouToldAnyoneElse" title="/pmwiki/pmwiki.php/Main/HaveYouToldAnyoneElse"><span data-dcnode-id="3622" instrument_node="">Have You Told Anyone Else?</span></a><span data-dcnode-id="3620" instrument_node="">: Inverted in the climax. </span><span class="spoiler" data-dcnode-id="3615" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3619" instrument_node="">When Mae asks the cultists why the latter is monologuing about what they do, including </span><em data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">murder</span></em><span data-dcnode-id="3616" instrument_node="">, the cultists point out that they can't go to the police. Even with Mae's word, the police will only know that hooded figures meet in a mine shaft to throw people down a pit. Plus, the cultists know Mae and her friends, as well as where they live, but Mae and her friends don't know who the cultists are.</span></span></li><li data-dcnode-id="3603"><span data-dcnode-id="3613" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HellIsThatNoise" title="/pmwiki/pmwiki.php/Main/HellIsThatNoise"><span data-dcnode-id="3612" instrument_node="">Hell Is That Noise</span></a><span data-dcnode-id="3610" instrument_node="">: A bassy screeching sound appears whenever the "ghost" shows up. At one point </span><span class="spoiler" data-dcnode-id="3608" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3609" instrument_node=""> Mae acknowledges she's been hearing it in her head</span></span><span data-dcnode-id="3607" instrument_node="">. In a GDD conference </span><a class="urllink" data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DCEJ6Mfd9Ic0"><span data-dcnode-id="3606" instrument_node="">one of the developers noted that the sound was deliberately played in a way that made it feel like it was coming from Mae herself.</span><img data-dcnode-id="3605" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></li><li data-dcnode-id="3596"><span data-dcnode-id="3602" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeKnowsTooMuch" title="/pmwiki/pmwiki.php/Main/HeKnowsTooMuch"><span data-dcnode-id="3601" instrument_node="">He Knows Too Much</span></a><span data-dcnode-id="3599" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3597" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3598" instrument_node="">Mae and her friends get too close to the cult's business, and are nearly killed by them.</span></span></li><li data-dcnode-id="3588"><span data-dcnode-id="3595" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HesBack" title="/pmwiki/pmwiki.php/Main/HesBack"><span data-dcnode-id="3594" instrument_node="">He's Back!</span></a><span data-dcnode-id="3592" instrument_node="">: At the start of the fourth chapter </span><span class="spoiler" data-dcnode-id="3590" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3591" instrument_node=""> Mae's concussed in a fall while running from the cultists, and is limited to clutching herself and walking. After they're trapped in the cave, she has an encounter (maybe?) with the eldritch monster they were sacrificing people to, and delivers a badass boast to make it leave her alone. At that point what should be needed to save the day, but a jumping puzzle? Cue Mae saying she feels better and the full jumping mechanics being restored</span></span><span data-dcnode-id="3589" instrument_node="">.</span></li><li data-dcnode-id="3583"><span data-dcnode-id="3587" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HiddenDepths" title="/pmwiki/pmwiki.php/Main/HiddenDepths"><span data-dcnode-id="3586" instrument_node="">Hidden Depths</span></a><span data-dcnode-id="3584" instrument_node="">: Gregg can actually write really good music. When the band jams, Mae even mentions that they can look into playing at venues if they want to continue.</span></li><li data-dcnode-id="3573"><span data-dcnode-id="3582" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumansAreTheRealMonsters" title="/pmwiki/pmwiki.php/Main/HumansAreTheRealMonsters"><span data-dcnode-id="3581" instrument_node="">Humans Are the Real Monsters</span></a><span data-dcnode-id="3579" instrument_node="">: Well, "humans," but regardless, </span><span class="spoiler" data-dcnode-id="3574" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3578" instrument_node="">as terrifying as the Black Goat is, it's ultimately just a destructive, unknowable, and quite possibly near-mindless force. On the other hand, the cult members are fully aware of what they're doing and </span><em data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">don't care</span></em><span data-dcnode-id="3575" instrument_node=""> because, the way they see it, they're targeting undesirables to protect their way of life.</span></span></li><li data-dcnode-id="3539"><span data-dcnode-id="3572" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HypocriticalHumor" title="/pmwiki/pmwiki.php/Main/HypocriticalHumor"><span data-dcnode-id="3571" instrument_node="">Hypocritical Humor</span></a><span data-dcnode-id="3569" instrument_node="">: During the mall trip with Bea, she dismisses the local Hot Topic </span><a class="twikilink" data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Expy" title="/pmwiki/pmwiki.php/Main/Expy"><span data-dcnode-id="3568" instrument_node="">Expy</span></a><span data-dcnode-id="3566" instrument_node=""> as being for teenagers and claims to be embarrassed to even be there... and yet her outfit comes from that store.</span><div class="indent" data-dcnode-id="3559"><strong data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">Mae</span></strong><span data-dcnode-id="3563" instrument_node="">: </span><em data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">[Pointing to a copy of Bea's dress in a rack]</span></em><span data-dcnode-id="3560" instrument_node=""> Hey, isn't that...</span></div><div class="indent" data-dcnode-id="3555"><strong data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Bea</span></strong><span data-dcnode-id="3556" instrument_node="">: Shut up.</span></div><ul data-dcnode-id="3540"><li data-dcnode-id="3550"><span data-dcnode-id="3554" instrument_node=""> Shortly after, if you ignore the shoplifting scene you can find a short conversation between the two with Mae complaining about the lack of any good music in the store, saying it's all for twelve year olds. Bea then points out that the store is draped wall to wall with merchandise from Mae's favorite band and that </span><a class="twikilink" data-dcnode-id="3552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManChild" title="/pmwiki/pmwiki.php/Main/ManChild"><span data-dcnode-id="3553" instrument_node="">Mae herself</span></a><span data-dcnode-id="3551" instrument_node=""> isn't far off from being a twelve year old.</span></li><li data-dcnode-id="3541"><span data-dcnode-id="3549" instrument_node=""> Gregg and Mae discuss how much of a scumbag criminal Steve Scriggins is during </span><em data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">"Crimes"</span></em><span data-dcnode-id="3546" instrument_node="">, while glorifying their own crimes.</span><div class="indent" data-dcnode-id="3542"><strong data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">Mae</span></strong><span data-dcnode-id="3543" instrument_node="">: So should we smash a window to get this out of here?</span></div></li></ul></li><li data-dcnode-id="3534"><span data-dcnode-id="3538" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ICantBelieveItsNotHeroin" title="/pmwiki/pmwiki.php/Main/ICantBelieveItsNotHeroin"><span data-dcnode-id="3537" instrument_node="">I Can't Believe It's Not Heroin!</span></a><span data-dcnode-id="3535" instrument_node="">: The player is never told what the eternity sauce at the Donut Wolf is made of, but after saying that she didn't want any, Mae said that the last time she had eternity sauce, she stayed up all night digging a hole in her backyard with her parents finding her asleep at the bottom of the hole the next morning.</span></li><li data-dcnode-id="3527"><span data-dcnode-id="3533" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IJustWantToBeNormal" title="/pmwiki/pmwiki.php/Main/IJustWantToBeNormal"><span data-dcnode-id="3532" instrument_node="">I Just Want to Be Normal</span></a><span data-dcnode-id="3530" instrument_node="">: Bea. She's stuck working constantly to keep her father's store open and her bills paid. </span><span class="spoiler" data-dcnode-id="3528" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3529" instrument_node=""> With her mother's death and father's subsequent breakdown, any hope of going to college and living a normal life like she dreamed of has been shattered as she tries to keep what's left of her family going.</span></span></li><li data-dcnode-id="3520"><span data-dcnode-id="3526" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IllKillYou" title="/pmwiki/pmwiki.php/Main/IllKillYou"><span data-dcnode-id="3525" instrument_node="">I'll Kill You!</span></a><span data-dcnode-id="3523" instrument_node="">: Gregg says this when </span><span class="spoiler" data-dcnode-id="3521" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3522" instrument_node="">the cult reveals that they killed Casey, his and Mae's best friend. He just can't because the cultists have guns and he has a crossbow. Later on, however, when Bea points out that the cave-in will trap the cultists underground, Gregg denies that it was murder.</span></span></li><li data-dcnode-id="3513"><span data-dcnode-id="3519" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/INeverToldYouMyName" title="/pmwiki/pmwiki.php/Main/INeverToldYouMyName"><span data-dcnode-id="3518" instrument_node="">I Never Told You My Name</span></a><span data-dcnode-id="3516" instrument_node="">: In the epilogue, </span><span class="spoiler" data-dcnode-id="3514" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3515" instrument_node=""> the Janitor calls Mae by name, and Mae realizes she never told it to him.</span></span></li><li data-dcnode-id="3508"><span data-dcnode-id="3512" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IWantGrandkids" title="/pmwiki/pmwiki.php/Main/IWantGrandkids"><span data-dcnode-id="3511" instrument_node="">I Want Grandkids</span></a><span data-dcnode-id="3509" instrument_node="">: Mae's mother mistakenly begins to suspect that Mae's worsening health in the third act is actually morning sickness, and the possibility that her daughter is pregnant is the only thing that breaks the concern, that she was otherwise displaying for Mae's condition.</span></li><li data-dcnode-id="3501"><span data-dcnode-id="3507" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InTheEndYouAreOnYourOwn" title="/pmwiki/pmwiki.php/Main/InTheEndYouAreOnYourOwn"><span data-dcnode-id="3506" instrument_node="">In the End, You Are on Your Own</span></a><span data-dcnode-id="3504" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3502" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3503" instrument_node="">A defied trope. Mae wanders off to confront the "ghost" on her own, only for Gregg, Angus and Bea to arrive and shoot him with Gregg's crossbow. Through the rest of the game, the three friends refuse to abandon Mae. The final lines of Mae in the game are along the lines of "We may die tomorrow, but at least I am not alone today thanks to being with you guys".</span></span></li><li data-dcnode-id="3491"><span data-dcnode-id="3500" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InelegantBlubbering" title="/pmwiki/pmwiki.php/Main/InelegantBlubbering"><span data-dcnode-id="3499" instrument_node="">Inelegant Blubbering</span></a><span data-dcnode-id="3497" instrument_node="">: Mae after the party does this </span><span class="spoiler" data-dcnode-id="3492" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3496" instrument_node="">while drunk after relearning that Bea's mother is dead. By the time Bea pulls up to Mae's house, </span><a class="twikilink" data-dcnode-id="3494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OcularGushers" title="/pmwiki/pmwiki.php/Main/OcularGushers"><span data-dcnode-id="3495" instrument_node="">Ocular Gushers</span></a><span data-dcnode-id="3493" instrument_node=""> is ensuing.</span></span></li><li data-dcnode-id="3484"><span data-dcnode-id="3490" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InjuredPlayerCharacterStage" title="/pmwiki/pmwiki.php/Main/InjuredPlayerCharacterStage"><span data-dcnode-id="3489" instrument_node="">Injured Player Character Stage</span></a><span data-dcnode-id="3487" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3485" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3486" instrument_node="">The final chapter has Mae grievously wounded after she falls down a mountainside escaping the cult. The player guides a slow-moving Mae back to town. Sudden inexplicable changes of scenery suggest that Mae is experiencing memory loss, fading in and out of consciousness, or suffered a concussion in the fall.</span></span></li><li data-dcnode-id="3474"><span data-dcnode-id="3483" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InnocentlyInsensitive" title="/pmwiki/pmwiki.php/Main/InnocentlyInsensitive"><span data-dcnode-id="3482" instrument_node="">Innocently Insensitive</span></a><span data-dcnode-id="3480" instrument_node="">: All over the place. Because a good number of the characters conceal their issues and traumas, what seems like perfectly ordinary conversation can trample all over one of the participant's feelings. For example, people in town constantly taunt Mae about dropping out of college, either complaining that she has it too easy, joking about it, or sneering that a waster like her was never going to cope at college. The adult residents in particular seem to think that they're just being </span><a class="twikilink" data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrutallyHonest" title="/pmwiki/pmwiki.php/Main/BrutallyHonest"><span data-dcnode-id="3479" instrument_node="">Brutally Honest</span></a><span data-dcnode-id="3477" instrument_node=""> or dealing out tough love, but </span><span class="spoiler" data-dcnode-id="3475" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3476" instrument_node="">Mae didn't drop out because she was a slacker — she dropped out because her mental health issues made college a nightmare.</span></span></li><li data-dcnode-id="3466"><span data-dcnode-id="3473" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InsultOfEndearment" title="/pmwiki/pmwiki.php/Main/InsultOfEndearment"><span data-dcnode-id="3472" instrument_node="">Insult of Endearment</span></a><span data-dcnode-id="3470" instrument_node="">: Mae and Greggory go back and forth on one another, discussing the grisly bodily harm and/or death they </span><em data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">didn't</span></em><span data-dcnode-id="3467" instrument_node=""> suffer in their latest shenanigans.</span></li><li data-dcnode-id="3459"><span data-dcnode-id="3465" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterruptedSuicide" title="/pmwiki/pmwiki.php/Main/InterruptedSuicide"><span data-dcnode-id="3464" instrument_node="">Interrupted Suicide</span></a><span data-dcnode-id="3462" instrument_node="">: Gregg believes he does this in the climax </span><span class="spoiler" data-dcnode-id="3460" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3461" instrument_node="">if Mae told him and not Beatrice about her disassociation. He tells Mae firmly that even if he doesn't understand what she's going through, he's not going to let her die on him, and it's not her fault that the cult started hurting people and stalking them.</span></span></li><li data-dcnode-id="3454"><span data-dcnode-id="3458" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterspeciesRomance" title="/pmwiki/pmwiki.php/Main/InterspeciesRomance"><span data-dcnode-id="3457" instrument_node="">Interspecies Romance</span></a><span data-dcnode-id="3455" instrument_node="">: Mainly, Gregg (a fox) with Angus (a bear). The player character, Mae (who is a cat), used to date a raccoon boy back when she was in junior high; and if the player decides to have Mae crash a college party, she has the option of flirting with a woman nicknamed "Bombshell" (who is a bear).</span></li><li data-dcnode-id="3447"><span data-dcnode-id="3453" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IronicEcho" title="/pmwiki/pmwiki.php/Main/IronicEcho"><span data-dcnode-id="3452" instrument_node="">Ironic Echo</span></a><span data-dcnode-id="3450" instrument_node="">: "Nothing to be scared of down there. Just a party." First used by Bea to calm Mae before attending a party, later echoed by Mae before </span><span class="spoiler" data-dcnode-id="3448" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3449" instrument_node="">descending into the mines to confront the cult.</span></span></li><li data-dcnode-id="3436"><span data-dcnode-id="3446" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IrrationalHatred" title="/pmwiki/pmwiki.php/Main/IrrationalHatred"><span data-dcnode-id="3445" instrument_node="">Irrational Hatred</span></a><span data-dcnode-id="3443" instrument_node="">: Mae is never anything but abrasive to her aunt Molly, despite Molly seeming to be a fairly mild-mannered </span><a class="twikilink" data-dcnode-id="3441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReasonableAuthorityFigure" title="/pmwiki/pmwiki.php/Main/ReasonableAuthorityFigure"><span data-dcnode-id="3442" instrument_node="">Reasonable Authority Figure</span></a><span data-dcnode-id="3440" instrument_node="">. The reasons are never stated - either there is some bad blood between them that's never explicitly brought up, or it's simply that </span><a class="twikilink" data-dcnode-id="3438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoolPeopleRebelAgainstAuthority" title="/pmwiki/pmwiki.php/Main/CoolPeopleRebelAgainstAuthority"><span data-dcnode-id="3439" instrument_node="">Mae just generally resents authority figures</span></a><span data-dcnode-id="3437" instrument_node="">.</span></li><li data-dcnode-id="3429"><span data-dcnode-id="3435" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItsAllMyFault" title="/pmwiki/pmwiki.php/Main/ItsAllMyFault"><span data-dcnode-id="3434" instrument_node="">It's All My Fault</span></a><span data-dcnode-id="3432" instrument_node="">: Mae says this in the climax when </span><span class="spoiler" data-dcnode-id="3430" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3431" instrument_node="">Gregg shoots the cultist to save her. Her friends tell her that she didn't cause the cultists to commit murder or endanger them, and that they're there for her.</span></span></li><li data-dcnode-id="3405"><span data-dcnode-id="3428" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkassHasAPoint" title="/pmwiki/pmwiki.php/Main/JerkassHasAPoint"><span data-dcnode-id="3427" instrument_node="">Jerkass Has a Point</span></a><span data-dcnode-id="3425" instrument_node="">:</span><ul data-dcnode-id="3406"><li data-dcnode-id="3420"><span data-dcnode-id="3424" instrument_node=""> Aunt "Mallcop" does have a point in that Mae shouldn't be wandering in the woods on her own to get home, especially to walk on power lines. She points out that Mae by being a </span><a class="twikilink" data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManChild" title="/pmwiki/pmwiki.php/Main/ManChild"><span data-dcnode-id="3423" instrument_node="">Woman Child</span></a><span data-dcnode-id="3421" instrument_node=""> is naive about the world, and thus more vulnerable to getting hurt. Mae ultimately agrees with the sentiment, even if she's snarky about it.</span></li><li data-dcnode-id="3412"><span data-dcnode-id="3419" instrument_node=""> Subverted during Bea's route. Bea gives Mae a </span><a class="twikilink" data-dcnode-id="3417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatTheHellHero" title="/pmwiki/pmwiki.php/Main/WhatTheHellHero"><span data-dcnode-id="3418" instrument_node="">What the Hell, Hero?</span></a><span data-dcnode-id="3416" instrument_node=""> speech for </span><span class="spoiler" data-dcnode-id="3414" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3415" instrument_node=""> wasting her college opportunities, while Bea would kill to have gotten the chance to attend college. Bea backs off from this one when she finds out Mae left because she was having mental health issues</span></span><span data-dcnode-id="3413" instrument_node="">.</span></li><li data-dcnode-id="3407"><span data-dcnode-id="3411" instrument_node=""> Mae gets one in on the Gregg path: when Angus blames her for enabling Gregg's criminal tendencies, she angrily asks him how it's </span><em data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">her</span></em><span data-dcnode-id="3408" instrument_node=""> fault when Gregg is the one committing the crimes. This causes both Angus and Gregg to back off, and for Gregg to vow to stop his crimes for Angus's sake.</span></li></ul></li><li data-dcnode-id="3395"><span data-dcnode-id="3404" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JumpScare" title="/pmwiki/pmwiki.php/Main/JumpScare"><span data-dcnode-id="3403" instrument_node="">Jump Scare</span></a><span data-dcnode-id="3401" instrument_node="">:</span><ul data-dcnode-id="3396"><li data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node=""> When on Gregg's ghost hunt, Mae and Gregg hear a lot of odd noises in-universe. Turns out it's an old animatronic that isn't quite fixed yet. Later in the same scenario, the "ghost" randomly appears in a window when the two are running down a fire escape.</span></li><li data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node=""> Earlier, when Gregg is picking a lock to get in to the museum, an owl will loudly screech and swoop in on the two of them out of nowhere just as Gregg gets the door open.</span></li></ul></li><li data-dcnode-id="3382"><span data-dcnode-id="3394" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KaizoTrap" title="/pmwiki/pmwiki.php/Main/KaizoTrap"><span data-dcnode-id="3393" instrument_node="">Kaizo Trap</span></a><span data-dcnode-id="3391" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3383" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3390" instrument_node=""> Wherever the </span><a class="twikilink" data-dcnode-id="3388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="3389" instrument_node="">Final Boss</span></a><span data-dcnode-id="3387" instrument_node=""> of Demontower falls, they leave a pool of blood that's just as harmful as the rest of the blood in the game-within-a-game. Since the player character is a </span><a class="twikilink" data-dcnode-id="3385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitPointWonder" title="/pmwiki/pmwiki.php/Main/OneHitPointWonder"><span data-dcnode-id="3386" instrument_node="">One-Hit-Point Wonder</span></a><span data-dcnode-id="3384" instrument_node=""> at this point, avoid it if you don't want to restart the level.</span></span></li><li data-dcnode-id="3374"><span data-dcnode-id="3381" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Keet" title="/pmwiki/pmwiki.php/Main/Keet"><span data-dcnode-id="3380" instrument_node="">Keet</span></a><span data-dcnode-id="3378" instrument_node="">: Gregg cheerfully screams most of his lines, seemingly can't keep still, and is super excited about everything that's happening.</span><div class="indent" data-dcnode-id="3375"><em data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Let's do some criiiimes!</span></em></div></li><li data-dcnode-id="3363"><span data-dcnode-id="3373" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnifeFight" title="/pmwiki/pmwiki.php/Main/KnifeFight"><span data-dcnode-id="3372" instrument_node="">Knife Fight</span></a><span data-dcnode-id="3370" instrument_node="">: </span><a class="twikilink" data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManChild" title="/pmwiki/pmwiki.php/Main/ManChild"><span data-dcnode-id="3369" instrument_node="">Mae</span></a><span data-dcnode-id="3367" instrument_node=""> and her friend Gregg have playful knife fights for... fun, </span><a class="twikilink" data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnlyAFleshWound" title="/pmwiki/pmwiki.php/Main/OnlyAFleshWound"><span data-dcnode-id="3366" instrument_node="">only nicking each others' hands</span></a><span data-dcnode-id="3364" instrument_node="">, instead of going full-on dangerous.</span></li><li data-dcnode-id="3334"><span data-dcnode-id="3362" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LamePunReaction" title="/pmwiki/pmwiki.php/Main/LamePunReaction"><span data-dcnode-id="3361" instrument_node="">Lame Pun Reaction</span></a><span data-dcnode-id="3359" instrument_node="">: Mae's dad's attempts to make a funny about family taco night are... not well received.</span><div class="indent" data-dcnode-id="3355"><strong data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">Dad:</span></strong><span data-dcnode-id="3356" instrument_node=""> The family that tacos together rockos together.</span></div><div class="indent" data-dcnode-id="3351"><strong data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">Mae:</span></strong><span data-dcnode-id="3352" instrument_node=""> ...</span></div><div class="indent" data-dcnode-id="3347"><strong data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">Mom:</span></strong><span data-dcnode-id="3348" instrument_node=""> Honey no.</span></div><div class="indent" data-dcnode-id="3341"><strong data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">Dad:</span></strong><span data-dcnode-id="3344" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DefensiveWhat" title="/pmwiki/pmwiki.php/Main/DefensiveWhat"><span data-dcnode-id="3343" instrument_node="">What?</span></a></div><div class="indent" data-dcnode-id="3335"><strong data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">Mae:</span></strong><span data-dcnode-id="3338" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThatMakesMeFeelAngry" title="/pmwiki/pmwiki.php/Main/ThatMakesMeFeelAngry"><span data-dcnode-id="3337" instrument_node="">I am so angry right now.</span></a></div></li><li data-dcnode-id="3329"><span data-dcnode-id="3333" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="3332" instrument_node="">Lampshade Hanging</span></a><span data-dcnode-id="3330" instrument_node="">: It was already established that Mae knows all the stories of the nighttime constellations, so when there's a sideplot involving finding constellations in stars at dusk, she asks why she's never heard of these before. The answer? By the time they got to dusk star formations, they had already used all the well-known legends and myths.</span></li><li data-dcnode-id="3319"><span data-dcnode-id="3328" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaserGuidedKarma" title="/pmwiki/pmwiki.php/Main/LaserGuidedKarma"><span data-dcnode-id="3327" instrument_node="">Laser-Guided Karma</span></a><span data-dcnode-id="3325" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3320" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3324" instrument_node="">The cult shoves its victims down a pit in the mine, one that has a long fall. The person falling would be awake for a long time while heading towards the bottom, if the Black Goat doesn't eat them first. Thanks to Mae and her friends causing a cave-in, the cult is </span><a class="twikilink" data-dcnode-id="3322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BuriedAlive" title="/pmwiki/pmwiki.php/Main/BuriedAlive"><span data-dcnode-id="3323" instrument_node="">Buried Alive</span></a><span data-dcnode-id="3321" instrument_node=""> in the mine, and it's possible that the impact made them fall into the pit.</span></span></li><li data-dcnode-id="3308"><span data-dcnode-id="3318" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeadBassist" title="/pmwiki/pmwiki.php/Main/LeadBassist"><span data-dcnode-id="3317" instrument_node="">Lead Bassist</span></a><span data-dcnode-id="3315" instrument_node="">: Mae Borowski is a Type C by virtue of being the </span><a class="twikilink" data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerCharacter" title="/pmwiki/pmwiki.php/Main/PlayerCharacter"><span data-dcnode-id="3314" instrument_node="">Player Character</span></a><span data-dcnode-id="3312" instrument_node="">, who just happens to play bass; the four friends never perform in public, leaving their actual memorability up in the air. Then again, depending on how well you play during each practice, she potentially demonstrates an amazing talent at improvising songs that she has </span><em data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">never</span></em><span data-dcnode-id="3309" instrument_node=""> performed before.</span></li><li data-dcnode-id="3292"><span data-dcnode-id="3307" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeftTheBackgroundMusicOn" title="/pmwiki/pmwiki.php/Main/LeftTheBackgroundMusicOn"><span data-dcnode-id="3306" instrument_node="">Left the Background Music On</span></a><span data-dcnode-id="3304" instrument_node="">:</span><ul data-dcnode-id="3293"><li data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node=""> The Deep Hollow Hollerers provide the background music of Mae's dreams with each instrument joining in when Mae finds its respective player.</span></li><li data-dcnode-id="3294"><span data-dcnode-id="3301" instrument_node=""> In the second and third days of Part III, during the third section of Possum Springs, Mae suddenly hears violin music belonging to Saleem, who lives on the topmost roof near the First Coalescence Church (whose music can be heard </span><a class="urllink" data-dcnode-id="3298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DF4e_Lr-inaw"><span data-dcnode-id="3300" instrument_node="">here</span><img data-dcnode-id="3299" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3297" instrument_node="">). He will stop playing the violin if you talk to him for a conversation. The same goes for when you talk to Sadie the saxophonist at the Husker Bee Ballroom. </span><span class="spoiler" data-dcnode-id="3295" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3296" instrument_node="">If Mae manages to get them both to reconcile, then when she enters the ballroom on the last day of Part III, both Sadie's saxophone and Saleem's violin can be heard, and can only stop if you talk to them for a moment. Even better is that the duo can now be heard at the Trolleyside Tunnel in the Epilogue, and one of the teens lampshades that they wish Saleem and Sadie would "shut the eff up" if you talk to them.</span></span></li></ul></li><li data-dcnode-id="3256"><span data-dcnode-id="3291" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Leitmotif" title="/pmwiki/pmwiki.php/Main/Leitmotif"><span data-dcnode-id="3290" instrument_node="">Leitmotif</span></a><span data-dcnode-id="3288" instrument_node="">: All four main characters have melodies that are associated with them; Gregg and Bea both have musical stings that are repeated elsewhere in the soundtrack (The Snack Falcon </span><em data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">Gregg</span></em><span data-dcnode-id="3285" instrument_node=""> theme and both renditions of </span><em data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">Crimes</span></em><span data-dcnode-id="3282" instrument_node=""> for Gregg, </span><em data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">MaeBea</span></em><span data-dcnode-id="3279" instrument_node=""> for Bea). Angus has a theme that's represented in </span><em data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">Video Outpost "Too"</span></em><span data-dcnode-id="3276" instrument_node="">, </span><em data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">Angus at Home</span></em><span data-dcnode-id="3273" instrument_node="">, and </span><em data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Angus Climbs the Hill</span></em><span data-dcnode-id="3270" instrument_node="">. Mae's theme is typically associated with her being destructive and stretches throughout </span><em data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Durkillesburg</span></em><span data-dcnode-id="3267" instrument_node="">, </span><em data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">Clanky Must Die</span></em><span data-dcnode-id="3264" instrument_node="">, </span><em data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">I'm Going to Break Something</span></em><span data-dcnode-id="3261" instrument_node=""> and </span><em data-dcnode-id="3258"><a class="twikilink" data-dcnode-id="3259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkReprise" title="/pmwiki/pmwiki.php/Main/DarkReprise"><span data-dcnode-id="3260" instrument_node="">Shapes</span></a></em><span data-dcnode-id="3257" instrument_node="">.</span></li><li data-dcnode-id="3231"><span data-dcnode-id="3255" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LetsGetDangerous" title="/pmwiki/pmwiki.php/Main/LetsGetDangerous"><span data-dcnode-id="3254" instrument_node="">Let's Get Dangerous!</span></a><span data-dcnode-id="3252" instrument_node="">:</span><ul data-dcnode-id="3245"><li data-dcnode-id="3248"><span data-dcnode-id="3251" instrument_node=""> Gregg, in the ending. </span><span class="spoiler" data-dcnode-id="3249" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3250" instrument_node="">He gets a crossbow to defend himself and his friends.</span></span></li><li data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node=""> This simple, repeated exchange between Mae and Gregg always signals that they are about to get real about some shit.</span></li></ul><div class="indent" data-dcnode-id="3237"><strong data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Gregg:</span></strong><span data-dcnode-id="3242" instrument_node=""> Crimes? </span><br data-dcnode-id="3241"><strong data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">Mae:</span></strong><span data-dcnode-id="3238" instrument_node=""> Crimes.</span></div><ul data-dcnode-id="3232"><li data-dcnode-id="3233"><span data-dcnode-id="3236" instrument_node=""> Angus would like to raise Gregg a notch. </span><span class="spoiler" data-dcnode-id="3234" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3235" instrument_node="">As the gang leaves the mine shaft, using the old elevator, the cultist that Gregg shot reappears. He grabs the nearest person, Mae, who's injured and can only kick at him. Angus then grabs the elevator lever and switches it, so that the cultist loses an arm and crushes his head.</span></span></li></ul></li><li data-dcnode-id="3211"><span data-dcnode-id="3230" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LetsMeetTheMeat" title="/pmwiki/pmwiki.php/Main/LetsMeetTheMeat"><span data-dcnode-id="3229" instrument_node="">Let's Meet the Meat</span></a><span data-dcnode-id="3227" instrument_node="">: Parodied. During the first hang-out with Greg, Mae recalls being weirded out by an animatronic pig, that would sometimes be on display at the Food Donkey with stuff like sausage links.</span><div class="indent" data-dcnode-id="3212"><strong data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">Steve:</span></strong><span data-dcnode-id="3224" instrument_node=""> Eatin' his own kind. </span><br data-dcnode-id="3223"><strong data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">Mae:</span></strong><span data-dcnode-id="3220" instrument_node=""> Or </span><em data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">her</span></em><span data-dcnode-id="3217" instrument_node=""> own kind. </span><br data-dcnode-id="3216"><strong data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">Steve:</span></strong><span data-dcnode-id="3213" instrument_node=""> Whatever, PC-Police...</span></div></li><li data-dcnode-id="3201"><span data-dcnode-id="3210" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LivingMotionDetector" title="/pmwiki/pmwiki.php/Main/LivingMotionDetector"><span data-dcnode-id="3209" instrument_node="">Living Motion Detector</span></a><span data-dcnode-id="3207" instrument_node="">: The main mechanic of the </span><a class="twikilink" data-dcnode-id="3205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StealthBasedGame" title="/pmwiki/pmwiki.php/Main/StealthBasedGame"><span data-dcnode-id="3206" instrument_node="">shoplifting segments</span></a><span data-dcnode-id="3204" instrument_node="">. Mae even says that people evolved to track movement, so as long as she doesn't move when they're looking at her, she's fine. </span><a class="twikilink" data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGuardsMustBeCrazy" title="/pmwiki/pmwiki.php/Main/TheGuardsMustBeCrazy"><span data-dcnode-id="3203" instrument_node="">Even if the clerk is looking right at her with the stolen item in her grasp.</span></a></li><li data-dcnode-id="3177"><span data-dcnode-id="3200" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LongSongShortScene" title="/pmwiki/pmwiki.php/Main/LongSongShortScene"><span data-dcnode-id="3199" instrument_node="">Long Song, Short Scene</span></a><span data-dcnode-id="3197" instrument_node="">: </span><a class="urllink" data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//infiniteammo.bandcamp.com/track/the-intercom"><span data-dcnode-id="3196" instrument_node="">"The Intercom"</span><img data-dcnode-id="3195" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3193" instrument_node="">, </span><a class="urllink" data-dcnode-id="3190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//infiniteammo.bandcamp.com/track/clanky-must-die"><span data-dcnode-id="3192" instrument_node="">"Clanky Must Die"</span><img data-dcnode-id="3191" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3189" instrument_node="">, and </span><a class="urllink" data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//infiniteammo.bandcamp.com/track/im-going-to-break-something"><span data-dcnode-id="3188" instrument_node="">"I'm Going to Break Something"</span><img data-dcnode-id="3187" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3185" instrument_node="">, which play through short sequences that can be completed long before the songs even reach their climaxes, and the particularly catchy </span><a class="urllink" data-dcnode-id="3182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//infiniteammo.bandcamp.com/track/skate-wolf"><span data-dcnode-id="3184" instrument_node="">"Skate Wolf"</span><img data-dcnode-id="3183" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3181" instrument_node=""> can barely be heard in the scene it appears in. Players are also unlikely to catch the entirety of all four Astral songs, due to </span><a class="twikilink" data-dcnode-id="3179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VariableMix" title="/pmwiki/pmwiki.php/Main/VariableMix"><span data-dcnode-id="3180" instrument_node="">variable mixing</span></a><span data-dcnode-id="3178" instrument_node="">, and the sequences ending shortly after activating all four band members.</span></li><li data-dcnode-id="3158"><span data-dcnode-id="3176" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoserProtagonist" title="/pmwiki/pmwiki.php/Main/LoserProtagonist"><span data-dcnode-id="3175" instrument_node="">Loser Protagonist</span></a><span data-dcnode-id="3173" instrument_node="">: Mae Borowski, main character, is a pansexual college dropout, whose untreated neuroses catapult her out of college, and back to her </span><a class="twikilink" data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DyingTown" title="/pmwiki/pmwiki.php/Main/DyingTown"><span data-dcnode-id="3172" instrument_node="">hometown.</span></a><span data-dcnode-id="3170" instrument_node=""> The very next day, she manages to throw up on her ex-boyfriend at a party. While it's initially played for laughs, it becomes increasingly clear that she genuinely needs help... and being the main character of a </span><a class="twikilink" data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GhostStory" title="/pmwiki/pmwiki.php/Main/GhostStory"><span data-dcnode-id="3169" instrument_node="">Ghost Story</span></a><span data-dcnode-id="3167" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3162" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3166" instrument_node="">(or rather, a </span><a class="twikilink" data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicHorrorStory" title="/pmwiki/pmwiki.php/Main/CosmicHorrorStory"><span data-dcnode-id="3165" instrument_node="">Cosmic Horror Story</span></a><span data-dcnode-id="3163" instrument_node="">)</span></span><span data-dcnode-id="3161" instrument_node="">, </span><a class="twikilink" data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SanitySlippage" title="/pmwiki/pmwiki.php/Main/SanitySlippage"><span data-dcnode-id="3160" instrument_node="">only makes things worse for her.</span></a></li><li data-dcnode-id="3146"><span data-dcnode-id="3157" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MacGyvering" title="/pmwiki/pmwiki.php/Main/MacGyvering"><span data-dcnode-id="3156" instrument_node="">MacGyvering</span></a><span data-dcnode-id="3154" instrument_node="">: Spoofed. While hanging out with Bea during a house call to fix Mrs. Miranda's noisy furnace, Mae attempts to cobble together a fix of her own, using the objects you find in the basement: a fan, a fishing pole, a badminton racket, and a garden gnome. There are a few options available, all of them look ridiculous, and </span><a class="twikilink" data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SurprisinglyRealisticOutcome" title="/pmwiki/pmwiki.php/Main/SurprisinglyRealisticOutcome"><span data-dcnode-id="3153" instrument_node="">all of them just fall apart, before you even get a chance to try it out</span></a><span data-dcnode-id="3151" instrument_node="">. Oh, and while you were messing around, Bea already fixed the problem, because she does this sort of thing for a living.</span><div class="indent" data-dcnode-id="3147"><strong data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">Bea:</span></strong><span data-dcnode-id="3148" instrument_node=""> "Way to go, Mae. Please don't fix anything ever again."</span></div></li><li data-dcnode-id="3141"><span data-dcnode-id="3145" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMall" title="/pmwiki/pmwiki.php/Main/TheMall"><span data-dcnode-id="3144" instrument_node="">The Mall</span></a><span data-dcnode-id="3142" instrument_node="">: It's possible to visit a dying shopping mall at one point, which helps remind Bea and Mae of more carefree times.</span></li><li data-dcnode-id="3133"><span data-dcnode-id="3140" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MamaBear" title="/pmwiki/pmwiki.php/Main/MamaBear"><span data-dcnode-id="3139" instrument_node="">Mama Bear</span></a><span data-dcnode-id="3137" instrument_node="">: Aunt Molly portrays herself as this. She offers Mae a ride home on threat of arresting her, when Mae was dreading a walk through the woods at night, alone. It's somewhat justified in that Mae was jumping on the power lines, which is dangerous. In the climax, we find out offscreen that she and her partner combed the woods to find </span><span class="spoiler" data-dcnode-id="3135" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3136" instrument_node="">Mae after her friends reported that weird guys in hoods shot at them and forced them to split up. Aunt Molly quickly got Mae to the hospital and notified her parents</span></span><span data-dcnode-id="3134" instrument_node="">.&nbsp;</span></li><li data-dcnode-id="3111"><span data-dcnode-id="3132" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManChild" title="/pmwiki/pmwiki.php/Main/ManChild"><span data-dcnode-id="3131" instrument_node="">Manchild</span></a><span data-dcnode-id="3129" instrument_node="">:</span><ul data-dcnode-id="3112"><li data-dcnode-id="3115"><span data-dcnode-id="3128" instrument_node=""> Mae is a character study in arrested development. At age 20, she's still immature, unemployed, and rudderless in life. She amuses herself with petty crimes, despite being old enough to know better.</span><ul data-dcnode-id="3116"><li data-dcnode-id="3117"><span data-dcnode-id="3127" instrument_node=""> She is a twenty-year-old college drop-out who acts like a rebellious teenager, compulsively committing petty crimes, and having a hard time talking to other people her age about more adult concerns. This strains her relationships with her parents and most of her friends, except her partner in crimes, Gregg. Her flighty exterior also </span><a class="twikilink" data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeneathTheMask" title="/pmwiki/pmwiki.php/Main/BeneathTheMask"><span data-dcnode-id="3126" instrument_node="">hides</span></a><span data-dcnode-id="3124" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3119" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3123" instrument_node="">some </span><em data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">severe</span></em><span data-dcnode-id="3120" instrument_node=""> mental issues, including a textbook case of dissociation / derealization</span></span><span data-dcnode-id="3118" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node=""> Gregg is also this, albeit to a lesser degree than Mae. Even though Gregg has a job, an apartment, and a serious romantic relationship (unlike Mae), he demonstrates immaturity on multiple occasions. He commits petty crimes and allows Steven to shoplift from Snack Falcon, even though both could get him arrested and/or fired. He nurses grand plans for moving to Bright Harbor with Angus, oblivious to how unrealistic his dream is. Angus even ends up calling Mae out for encouraging this behavior despite his best efforts to keep G
