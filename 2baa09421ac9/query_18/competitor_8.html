</span><div class="article-content retro-folders" data-dcnode-id="1023" id="main-article"><span data-dcnode-id="3806" instrument_node="">
</span><p data-dcnode-id="3805"></p><div class="quoteright" data-dcnode-id="3802" style="width:350px;"><div class="lazy_load_img_box" data-dcnode-id="3803" style="padding-top:94.29%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/splash.png" border="0" class="embeddedimage" data-dcnode-id="3804" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/splash.png&amp;raw" width="350"></div></div><div class="acaptionright" data-dcnode-id="3800" style="width:350px;"><span data-dcnode-id="3801" instrument_node="">"This is bigger than you."</span></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="3794"><span class="ad-caption" data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">Advertisement:</span></span><div data-dcnode-id="3795" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="3771"><em data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">Iconoclasts</span></em><span data-dcnode-id="3791" instrument_node=""> is a </span><a class="twikilink" data-dcnode-id="3789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Metroidvania" title="/pmwiki/pmwiki.php/Main/Metroidvania"><span data-dcnode-id="3790" instrument_node="">Metroidvania</span></a><span data-dcnode-id="3788" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlatformGame" title="/pmwiki/pmwiki.php/Main/PlatformGame"><span data-dcnode-id="3787" instrument_node="">Platform Game</span></a><span data-dcnode-id="3785" instrument_node=""> developed by Joakim "</span><a class="twikilink" data-dcnode-id="3783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/Konjak" title="/pmwiki/pmwiki.php/Creator/Konjak"><span data-dcnode-id="3784" instrument_node="">konjak</span></a><span data-dcnode-id="3782" instrument_node="">" Sandberg and published by Bifrost Entertainment, formerly a </span><a class="twikilink" data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Retraux" title="/pmwiki/pmwiki.php/Main/Retraux"><span data-dcnode-id="3781" instrument_node="">retraux</span></a><span data-dcnode-id="3779" instrument_node=""> </span><em data-dcnode-id="3776"><a class="twikilink" data-dcnode-id="3777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/CaveStory" title="/pmwiki/pmwiki.php/VideoGame/CaveStory"><span data-dcnode-id="3778" instrument_node="">Cave Story</span></a></em><span data-dcnode-id="3775" instrument_node="">-influenced project called </span><em data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">Ivory Springs</span></em><span data-dcnode-id="3772" instrument_node="">. It was in development for seven years before finally releasing in January of 2018.</span></p><p data-dcnode-id="3763"><span data-dcnode-id="3770" instrument_node="">Robin is a mechanic (complete with </span><a class="twikilink" data-dcnode-id="3768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WrenchWench" title="/pmwiki/pmwiki.php/Main/WrenchWench"><span data-dcnode-id="3769" instrument_node="">massive wrench</span></a><span data-dcnode-id="3767" instrument_node="">) living in a world that's slowly withering away. Her society relies on Ivory, an energy source controlled by a powerful organization called One Concern, which is the center of a religion represented by a figure known as Mother. Robin is not permitted to do mechanical work due to their regulations, but she does it anyway. When she's found out and becomes a sinner in the eyes of the world, she embarks on an adventure with other outcasts in order to stop </span><a class="twikilink" data-dcnode-id="3765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="3766" instrument_node="">Mother</span></a><span data-dcnode-id="3764" instrument_node=""> and One Concern once and for all, and find out what's really happening to the planet.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="3757"><span class="ad-caption" data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">Advertisement:</span></span><div data-dcnode-id="3758" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="3744"><span data-dcnode-id="3756" instrument_node="">The game's release trailer is </span><a class="urllink" data-dcnode-id="3753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DFnUN19xGIzU"><span data-dcnode-id="3755" instrument_node="">here</span><img data-dcnode-id="3754" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3752" instrument_node="">. Links to buy the game, as well as downloads for the 2012 alpha and the </span><em data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">Ivory Springs</span></em><span data-dcnode-id="3749" instrument_node=""> alpha, can be found </span><a class="urllink" data-dcnode-id="3746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.konjak.org/"><span data-dcnode-id="3748" instrument_node="">on Konjak's website</span><img data-dcnode-id="3747" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3745" instrument_node="">.</span></p><hr data-dcnode-id="3743"><h2 data-dcnode-id="3739"><em data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">Iconoclasts</span></em><span data-dcnode-id="3740" instrument_node=""> contains examples of the following tropes:</span></h2><ul data-dcnode-id="1026"><li data-dcnode-id="3728"><span data-dcnode-id="3738" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActionGirl" title="/pmwiki/pmwiki.php/Main/ActionGirl"><span data-dcnode-id="3737" instrument_node="">Action Girl</span></a><span data-dcnode-id="3735" instrument_node="">: Robin and Mina both travel through the base of One Concern operatives, fight </span><a class="twikilink" data-dcnode-id="3733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperSoldier" title="/pmwiki/pmwiki.php/Main/SuperSoldier"><span data-dcnode-id="3734" instrument_node="">Super Soldiers</span></a><span data-dcnode-id="3732" instrument_node="">, and manage to </span><span class="spoiler" data-dcnode-id="3730" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3731" instrument_node="">topple an entire corrupt regime and save the world at the same time</span></span><span data-dcnode-id="3729" instrument_node="">.</span></li><li data-dcnode-id="3706"><span data-dcnode-id="3727" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdvancingBossOfDoom" title="/pmwiki/pmwiki.php/Main/AdvancingBossOfDoom"><span data-dcnode-id="3726" instrument_node="">Advancing Boss of Doom</span></a><span data-dcnode-id="3724" instrument_node="">:</span><ul data-dcnode-id="3707"><li data-dcnode-id="3716"><span data-dcnode-id="3723" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3721" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3722" instrument_node="">The Omega Controller</span></span><span data-dcnode-id="3720" instrument_node="">, first as a </span><a class="twikilink" data-dcnode-id="3718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RiseToTheChallenge" title="/pmwiki/pmwiki.php/Main/RiseToTheChallenge"><span data-dcnode-id="3719" instrument_node="">Rise to the Challenge</span></a><span data-dcnode-id="3717" instrument_node=""> scenario on an elevator platform and then as a horizontal chase where it takes the form of a buzzsaw. In both cases, Robin has to repel the boss with bombs.</span></li><li data-dcnode-id="3708"><span data-dcnode-id="3715" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3713" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3714" instrument_node="">Fitzroy</span></span><span data-dcnode-id="3712" instrument_node=""> slowly crawls towards Robin for his first two phases, which only makes it harder to keep dodging attacks from </span><span class="spoiler" data-dcnode-id="3710" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3711" instrument_node="">the golem face made of Ivory rising out of his back, which represents his memory of Leticia as she once was, and of her after she lost her face to Transcendence, respectively</span></span><span data-dcnode-id="3709" instrument_node="">.</span></li></ul></li><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="3700"><span class="ad-caption" data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">Advertisement:</span></span><div data-dcnode-id="3701" id="proper-ad-tvtropes_mobile_ad_3"></div></div><li data-dcnode-id="3695"><span data-dcnode-id="3699" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AGodAmI" title="/pmwiki/pmwiki.php/Main/AGodAmI"><span data-dcnode-id="3698" instrument_node="">A God Am I</span></a><span data-dcnode-id="3696" instrument_node="">: Being the physical representative of the Starworm, Mother is prone to this. Royal also shows signs of this, since he's supposed to be Mother's successor.</span></li><li data-dcnode-id="3688"><span data-dcnode-id="3694" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlienBlood" title="/pmwiki/pmwiki.php/Main/AlienBlood"><span data-dcnode-id="3693" instrument_node="">Alien Blood</span></a><span data-dcnode-id="3691" instrument_node="">: Two separate examples. </span><span class="spoiler" data-dcnode-id="3689" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3690" instrument_node="">Transcended individuals bleed white, as they've become totally infused with Ivory. Then, the final boss may have blue feathers, but its blood is green.</span></span></li><li data-dcnode-id="3677"><span data-dcnode-id="3687" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllForNothing" title="/pmwiki/pmwiki.php/Main/AllForNothing"><span data-dcnode-id="3686" instrument_node="">All for Nothing</span></a><span data-dcnode-id="3684" instrument_node="">: All the pain and sacrifice to get </span><span class="spoiler" data-dcnode-id="3682" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3683" instrument_node="">Royal to the moon to commune with the Starworm ends up not mattering — Royal can't even get the thing to respond to him. He does end up wounding Him, which then allowed Robin to defeat Him, but he could have done that on the planet, too</span></span><span data-dcnode-id="3681" instrument_node="">. In a larger sense, </span><span class="spoiler" data-dcnode-id="3679" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3680" instrument_node="">all the panic and strife over the Starworm's return ends up not mattering either, since Robin still kicks its ass</span></span><span data-dcnode-id="3678" instrument_node="">.</span></li><li data-dcnode-id="3666"><span data-dcnode-id="3676" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllThereInTheManual" title="/pmwiki/pmwiki.php/Main/AllThereInTheManual"><span data-dcnode-id="3675" instrument_node="">All There in the Manual</span></a><span data-dcnode-id="3673" instrument_node="">: The official names of two late-game bosses (</span><span class="spoiler" data-dcnode-id="3668" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3672" instrument_node="">the cat Mother rides on is named Oedipuss after her pet cat, and Black's </span><a class="twikilink" data-dcnode-id="3670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneWingedAngel" title="/pmwiki/pmwiki.php/Main/OneWingedAngel"><span data-dcnode-id="3671" instrument_node="">One-Winged Angel</span></a><span data-dcnode-id="3669" instrument_node=""> form is the Ivory Beast</span></span><span data-dcnode-id="3667" instrument_node="">) can only be found on the game's soundtrack.</span></li><li data-dcnode-id="3647"><span data-dcnode-id="3665" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllTheWorldsAreAStage" title="/pmwiki/pmwiki.php/Main/AllTheWorldsAreAStage"><span data-dcnode-id="3664" instrument_node="">All the Worlds are a Stage</span></a><span data-dcnode-id="3662" instrument_node="">:</span><ul data-dcnode-id="3648"><li data-dcnode-id="3654"><span data-dcnode-id="3661" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3659" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3660" instrument_node="">The Impact Zone</span></span><span data-dcnode-id="3658" instrument_node=""> consists of several rooms themed after previous locations, each containing enemies from previous areas </span><span class="spoiler" data-dcnode-id="3656" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3657" instrument_node="">infested with the blue eyes</span></span><span data-dcnode-id="3655" instrument_node="">.</span></li><li data-dcnode-id="3649"><span data-dcnode-id="3653" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3651" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3652" instrument_node="">The Omega Controller</span></span><span data-dcnode-id="3650" instrument_node=""> constantly causes the terrain to cycle through the different area textures as you ascend the elevator shaft.</span></li></ul></li><li data-dcnode-id="3640"><span data-dcnode-id="3646" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllYourBaseAreBelongToUs" title="/pmwiki/pmwiki.php/Main/AllYourBaseAreBelongToUs"><span data-dcnode-id="3645" instrument_node="">All Your Base Are Belong to Us</span></a><span data-dcnode-id="3643" instrument_node="">: Barely a few hours pass between Robin, Mina and Royal getting to Isilugar, and the attack on it by the One Concern. </span><span class="spoiler" data-dcnode-id="3641" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3642" instrument_node="">It gets moved to prevent them from sending back-up down there, and the whole battle works out well for the Isi, but disastrous for the One Concern, since the only person to die in the battle is Agent White, earlier considered to be nigh-immortal. They also lose ten soldiers prisoner, while Isi only lose Samba, who is eventually recovered by Mina anyway.</span></span></li><li data-dcnode-id="3625"><span data-dcnode-id="3639" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnAesop" title="/pmwiki/pmwiki.php/Main/AnAesop"><span data-dcnode-id="3638" instrument_node="">An Aesop</span></a><span data-dcnode-id="3636" instrument_node="">:</span><ul data-dcnode-id="3626"><li data-dcnode-id="3629"><span data-dcnode-id="3635" instrument_node=""> Take time to grieve over the deaths of your loved one. If you don't, you may act irrationally and lash out in ways you'll later regret. </span><span class="spoiler" data-dcnode-id="3630" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3634" instrument_node="">This bites both Elro and Agent Black </span><em data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">hard.</span></em><span data-dcnode-id="3631" instrument_node=""> Elro makes a huge mistake that essentially kickstarts the conflict of the game because he didn't think rationally when Agent Grey was simply asking him to calm down and Agent Black slowly goes off the deep end demonizing Elro and Robin for what Elro did instead of taking Chrome's advice and taking time to come to terms with the death of Grey.</span></span></li><li data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node=""> Don't let yourself get weighed down by what other people expect of you. Each of the supporting characters are weighed down by what is expected of them (or what they expect of others) and what that costs them personally, while wrestling with their own selfish impulses that only make things worse. Robin, on the flipside, is characterized by her staunch devotion to doing whatever she can to help regardless of what anyone thinks, and her sense of self-sacrifice makes her a true hero.</span></li></ul></li><li data-dcnode-id="3614"><span data-dcnode-id="3624" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AncientAstronauts" title="/pmwiki/pmwiki.php/Main/AncientAstronauts"><span data-dcnode-id="3623" instrument_node="">Ancient Astronauts</span></a><span data-dcnode-id="3621" instrument_node="">: It's heavily implied that </span><span class="spoiler" data-dcnode-id="3616" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3620" instrument_node="">all of the humans are descendants of colonists who migrated from Earth to an alien planet. The Isi found and recovered an ancient colony ship which they revere as a sacred artifact, and their city has paintings of known human landmarks such as the Taj Mahal. The Concern similarly have a colony ship in their possession which they use for research purposes. Hidden </span><a class="twikilink" data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CypherLanguage" title="/pmwiki/pmwiki.php/Main/CypherLanguage"><span data-dcnode-id="3619" instrument_node="">alien text</span></a><span data-dcnode-id="3617" instrument_node=""> hints that the planet that the game takes place on was originally a fuel depot for birdlike starship pilots, and at least one of them has visited the planet before</span></span><span data-dcnode-id="3615" instrument_node="">.</span></li><li data-dcnode-id="3604"><span data-dcnode-id="3613" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndIMustScream" title="/pmwiki/pmwiki.php/Main/AndIMustScream"><span data-dcnode-id="3612" instrument_node="">And I Must Scream</span></a><span data-dcnode-id="3610" instrument_node="">: It's implied that being possessed by the blue eye creatures feels like this. </span><span class="spoiler" data-dcnode-id="3605" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3609" instrument_node="">It's further implied that if Starworm was alive, and not just a mech, then this is what it felt for untold years as the pilot controlled it through the blue eyes. If so, then the pilot being killed by the Starworm "malfunctioning" and attacking him instead of you might not have been a malfunction at all, but the Starworm regaining control over its body and spending its last moments before death </span><a class="twikilink" data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDogBitesBack" title="/pmwiki/pmwiki.php/Main/TheDogBitesBack"><span data-dcnode-id="3608" instrument_node="">getting revenge on the asshole who enslaved it to use as a spaceship</span></a><span data-dcnode-id="3606" instrument_node="">.</span></span></li><li data-dcnode-id="3589"><span data-dcnode-id="3603" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndNowForSomeoneCompletelyDifferent" title="/pmwiki/pmwiki.php/Main/AndNowForSomeoneCompletelyDifferent"><span data-dcnode-id="3602" instrument_node="">And Now for Someone Completely Different</span></a><span data-dcnode-id="3600" instrument_node="">:</span><ul data-dcnode-id="3590"><li data-dcnode-id="3596"><span data-dcnode-id="3599" instrument_node=""> One part of Ferrier Shockwood is played entirely as Mina after she gets separated from Robin and Elro, complete with her own boss fight against a Controller. </span><span class="spoiler" data-dcnode-id="3597" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3598" instrument_node="">She gets another unique segment during One Concern East, which ends with the Mendeleev fight.</span></span></li><li data-dcnode-id="3591"><span data-dcnode-id="3595" instrument_node=""> Elro gets a segment during </span><span class="spoiler" data-dcnode-id="3593" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3594" instrument_node="">One Concern East as well, though most of it is him limping through the hallway with only a few enemies present. He fights Lawrence at the end of it</span></span><span data-dcnode-id="3592" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3582"><span data-dcnode-id="3588" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Antepiece" title="/pmwiki/pmwiki.php/Main/Antepiece"><span data-dcnode-id="3587" instrument_node="">Antepiece</span></a><span data-dcnode-id="3585" instrument_node="">: When Robin arrives at City One, she's stopped by a gatekeeper, and the only way to get past him is to use the Usurper's charge shot, which pulls him off the high platform and onto the ground. </span><span class="spoiler" data-dcnode-id="3583" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3584" instrument_node="">This weakness is shared with Mother, the boss fought a few minutes after this scene.</span></span></li><li data-dcnode-id="3542"><span data-dcnode-id="3581" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures" title="/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures"><span data-dcnode-id="3580" instrument_node="">Anti-Frustration Features</span></a><span data-dcnode-id="3578" instrument_node="">:</span><ul data-dcnode-id="3543"><li data-dcnode-id="3570"><span data-dcnode-id="3577" instrument_node=""> Robin's </span><a class="twikilink" data-dcnode-id="3575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GroundPound" title="/pmwiki/pmwiki.php/Main/GroundPound"><span data-dcnode-id="3576" instrument_node="">Ground Pound</span></a><span data-dcnode-id="3574" instrument_node=""> normally goes straight down. However, it has a minor homing effect on enemies, meaning that you'll still land the hit if you attempt to </span><a class="twikilink" data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoombaStomp" title="/pmwiki/pmwiki.php/Main/GoombaStomp"><span data-dcnode-id="3573" instrument_node="">Goomba Stomp</span></a><span data-dcnode-id="3571" instrument_node=""> an enemy but your aim is slightly off.</span></li><li data-dcnode-id="3562"><span data-dcnode-id="3569" instrument_node=""> During boss fights, incidental dialogue said by the NPC heroes will give hints as to how to defeat them. For instance, in the </span><a class="twikilink" data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClimaxBoss" title="/pmwiki/pmwiki.php/Main/ClimaxBoss"><span data-dcnode-id="3568" instrument_node="">Climax Boss</span></a><span data-dcnode-id="3566" instrument_node=""> fight in City One, Mina will shout "come down here, coward!" at the boss, hinting that you need to use the Usurper's charge shot to bring them to the ground. These hints will also be highlighted in red text for you to </span><a class="twikilink" data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoticeThis" title="/pmwiki/pmwiki.php/Main/NoticeThis"><span data-dcnode-id="3565" instrument_node="">notice exactly what you need to do</span></a><span data-dcnode-id="3563" instrument_node="">.</span></li><li data-dcnode-id="3554"><span data-dcnode-id="3561" instrument_node=""> In Challenge Mode, Lawrence takes six hits to defeat instead of twelve. Very convenient for a fight </span><a class="twikilink" data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitPointWonder" title="/pmwiki/pmwiki.php/Main/OneHitPointWonder"><span data-dcnode-id="3560" instrument_node="">where one mistake means repeating it</span></a><span data-dcnode-id="3558" instrument_node=""> and you're playing as Elro, who is </span><a class="twikilink" data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MightyGlacier" title="/pmwiki/pmwiki.php/Main/MightyGlacier"><span data-dcnode-id="3557" instrument_node="">extremely slow but quite strong</span></a><span data-dcnode-id="3555" instrument_node="">.</span></li><li data-dcnode-id="3546"><span data-dcnode-id="3553" instrument_node=""> The first boss fight with Agent Black features </span><a class="twikilink" data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysAccurateAttack" title="/pmwiki/pmwiki.php/Main/AlwaysAccurateAttack"><span data-dcnode-id="3552" instrument_node="">an attack that Robin cannot dodge no matter what</span></a><span data-dcnode-id="3550" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HPToOne" title="/pmwiki/pmwiki.php/Main/HPToOne"><span data-dcnode-id="3549" instrument_node="">reduces her HP to critical levels</span></a><span data-dcnode-id="3547" instrument_node="">. As compensation, weak enemies will always spawn right after Black uses this move, and these enemies will always drop health pick-ups.</span></li><li data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node=""> A late-game boss fight featuers Robin trapped in a room with poison gas. Taking damage from this gas is unavoidable, with Robin's health bar essentially acting as a time limit for the fight. As compensation, her health drains much slower than any other time where she runs out of oxygen.</span></li></ul></li><li data-dcnode-id="3516"><span data-dcnode-id="3541" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiMagic" title="/pmwiki/pmwiki.php/Main/AntiMagic"><span data-dcnode-id="3540" instrument_node="">Anti-Magic</span></a><span data-dcnode-id="3538" instrument_node="">:</span><ul data-dcnode-id="3517"><li data-dcnode-id="3528"><span data-dcnode-id="3537" instrument_node=""> The Isi's seeds have extremely volatile reactions when exposed to Ivory, making them grow instantaneously; this makes them an excellent tool for wrecking Concern technology, which is reliant on Ivory. Royal also notes that even though his powers allow him to control plants enough to sprout them in the middle of the desert at will, he is completely unable to affect the plants grown from these seeds </span><span class="spoiler" data-dcnode-id="3535" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3536" instrument_node="">because Royal's powers work by manipulating the Ivory in an object, but the Isi plants don't have any Ivory in them because they're from Earth</span></span><span data-dcnode-id="3534" instrument_node="">. They also work disturbingly well on </span><span class="spoiler" data-dcnode-id="3529" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3533" instrument_node="">humans who have been injected with Ivory, being used to take out Agent White and Mother (Agent Black </span><a class="twikilink" data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Determinator" title="/pmwiki/pmwiki.php/Main/Determinator"><span data-dcnode-id="3532" instrument_node="">resists their effects</span></a><span data-dcnode-id="3530" instrument_node=""> until the blue eyes mutate her). When Robin jams a seed into the Starworm, the resulting explosion causes a wave of nature to overtake the whole planet.</span></span></li><li data-dcnode-id="3518"><span data-dcnode-id="3527" instrument_node=""> Detritus is a pinkish-purple powder that is produced whenever an object is drained of its Ivory. It is very much anti-Ivory, negating the </span><a class="twikilink" data-dcnode-id="3525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HealingFactor" title="/pmwiki/pmwiki.php/Main/HealingFactor"><span data-dcnode-id="3526" instrument_node="">Healing Factor</span></a><span data-dcnode-id="3524" instrument_node=""> of </span><span class="spoiler" data-dcnode-id="3522" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3523" instrument_node="">ivory-infused individuals</span></span><span data-dcnode-id="3521" instrument_node=""> and, in the case of Royal, completely shutting down his powers. </span><span class="spoiler" data-dcnode-id="3519" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3520" instrument_node="">Black kills Royal in a pit of Detritus at the end of One Concern West (she planned to kill Chrome there, but he had other plans), though he revives himself shortly after his body leaves the room. Elro's work with the ChemiCo Contra led to him inventing a serum that instantly removes Ivory from matter and turns it into Detritus, which is one of the few things that can kill Transcended humans.</span></span></li></ul></li><li data-dcnode-id="3502"><span data-dcnode-id="3515" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AppliedPhlebotinum" title="/pmwiki/pmwiki.php/Main/AppliedPhlebotinum"><span data-dcnode-id="3514" instrument_node="">Applied Phlebotinum</span></a><span data-dcnode-id="3512" instrument_node="">: Ivory is used to power all technology and the Concern's stranglehold on it is the basis for their control of all society besides the pirates/Isi, who get it from underwater Ivory pustules. It can function as a battery for a home, a component to be used in </span><a class="twikilink" data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItemCrafting" title="/pmwiki/pmwiki.php/Main/ItemCrafting"><span data-dcnode-id="3511" instrument_node="">Item Crafting</span></a><span data-dcnode-id="3509" instrument_node="">, </span><span class="spoiler" data-dcnode-id="3507" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3508" instrument_node="">a source of immortality and superpowers for those with the necessary constitution</span></span><span data-dcnode-id="3506" instrument_node="">, and ultimately </span><span class="spoiler" data-dcnode-id="3504" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3505" instrument_node="">gasoline for some alien bird's space truck</span></span><span data-dcnode-id="3503" instrument_node="">.</span></li><li data-dcnode-id="3497"><span data-dcnode-id="3501" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcWords" title="/pmwiki/pmwiki.php/Main/ArcWords"><span data-dcnode-id="3500" instrument_node="">Arc Words</span></a><span data-dcnode-id="3498" instrument_node="">: "This is bigger than you." Said to both the heroes and the villains, it's frequently used to talk down to someone or to try and convince them to back off. It never works. This ties into the game's theme of not conforming to what's expected of you.</span></li><li data-dcnode-id="3484"><span data-dcnode-id="3496" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialLimbs" title="/pmwiki/pmwiki.php/Main/ArtificialLimbs"><span data-dcnode-id="3495" instrument_node="">Artificial Limbs</span></a><span data-dcnode-id="3493" instrument_node="">: At first, they appear as simply a necessary attribute of an agent. Agent White has cybernetic eyes that allow him to shoot </span><a class="twikilink" data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EyeBeams" title="/pmwiki/pmwiki.php/Main/EyeBeams"><span data-dcnode-id="3492" instrument_node="">Eye Beams</span></a><span data-dcnode-id="3490" instrument_node="">, Agent Chrome has cybernetic legs, and Agent Black is revealed to have cybernetic arms. Eventually, Royal reveals that </span><span class="spoiler" data-dcnode-id="3485" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3489" instrument_node="">any individual who survives Transcendence but doesn't perfectly merge with the Ivory like Mother and Royal did will end up with a certain body part consumed by the Ivory. Said body part is then replaced by an implant that gives said individual their powers, while itself functioning only due to the Ivory in the rest of the person's body. As such, General Chrome has cybernetic legs and Agent Grey had cybernetic neck or </span><em data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">ears</span></em><span data-dcnode-id="3486" instrument_node="">. Ash, who complained about gut pains, might have lost an internal organ to gain invisibility.</span></span></li><li data-dcnode-id="3479"><span data-dcnode-id="3483" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseChemistry" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseChemistry"><span data-dcnode-id="3482" instrument_node="">Artistic License – Chemistry</span></a><span data-dcnode-id="3480" instrument_node="">: Elro refers to his formula as a binary compound. In reality the formula is a trinary compound; it requires both parts of the formula and Ivory Oil for the reaction to occur. The compound itself is inert until it meets with the Ivory Oil.</span></li><li data-dcnode-id="3474"><span data-dcnode-id="3478" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AssShove" title="/pmwiki/pmwiki.php/Main/AssShove"><span data-dcnode-id="3477" instrument_node="">Ass Shove</span></a><span data-dcnode-id="3475" instrument_node="">: The boss fight against Kibuka requires you to position it so Royal can flip it over, then throw a bomb into its rear exhaust.</span></li><li data-dcnode-id="3469"><span data-dcnode-id="3473" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AttackItsWeakPoint" title="/pmwiki/pmwiki.php/Main/AttackItsWeakPoint"><span data-dcnode-id="3472" instrument_node="">Attack Its Weak Point</span></a><span data-dcnode-id="3470" instrument_node="">: The majority of the bosses possess weak points of some kind that need to be hit in order to defeat them. Only the comparatively rare human bosses are the exception.</span></li><li data-dcnode-id="3459"><span data-dcnode-id="3468" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AwesomeButImpractical" title="/pmwiki/pmwiki.php/Main/AwesomeButImpractical"><span data-dcnode-id="3467" instrument_node="">Awesome, but Impractical</span></a><span data-dcnode-id="3465" instrument_node="">:</span><ul data-dcnode-id="3460"><li data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node=""> Many of the tweaks end up being this, mainly because a tweak "breaks" when Robin takes damage. In addition, Robin only has three tweak slots for the entire game, so powerful combat Tweaks (such as faster charge shot renewal, a wall-piercing Usurper Shot, and massive Roller Bomb explosions) are going to be set aside for the ones that let you move faster, solve puzzles quicker, and take less damage.</span></li><li data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node=""> The Roller Bomb's charge shot is a powerful missile with the highest range of any attacks Robin can use. Unfortunately, in addition to the long charge and cooldown time it has, it can only fire straight forward and needs a split second to ready itself before it blasts off; if the missile hits anything in the short range it flies before igniting, the attack is wasted. You'll probably use the missile for puzzle-solving and an incidental enemy or two, since it's all but useless against bosses.</span></li></ul></li><li data-dcnode-id="3413"><span data-dcnode-id="3458" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassBoast" title="/pmwiki/pmwiki.php/Main/BadassBoast"><span data-dcnode-id="3457" instrument_node="">Badass Boast</span></a><span data-dcnode-id="3455" instrument_node="">:</span><ul data-dcnode-id="3414"><li data-dcnode-id="3445"><span data-dcnode-id="3454" instrument_node=""> Several human antagonists get to say them:</span><div class="indent" data-dcnode-id="3446"><strong data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">Agent Black:</span></strong><span data-dcnode-id="3451" instrument_node=""> When you know no-one has got your back, you learn to prepare to fight in any situation. Let us grieve existence, together. </span><br data-dcnode-id="3450"><strong data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">Mother:</span></strong><span data-dcnode-id="3447" instrument_node=""> I am the mother of this earth. You are challenging the very ground you walk on.</span></div></li><li data-dcnode-id="3433"><span data-dcnode-id="3444" instrument_node=""> Mina gives Mother's boast an </span><a class="twikilink" data-dcnode-id="3442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IronicEcho" title="/pmwiki/pmwiki.php/Main/IronicEcho"><span data-dcnode-id="3443" instrument_node="">Ironic Echo</span></a><span data-dcnode-id="3441" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3439" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3440" instrument_node="">the first time Mother is knocked down during the battle, allowing Mina to apply her seeds</span></span><span data-dcnode-id="3438" instrument_node="">:</span><div class="indent" data-dcnode-id="3434"><strong data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">Mina:</span></strong><span data-dcnode-id="3435" instrument_node=""> Have a fistful of MY earth!</span></div></li><li data-dcnode-id="3415"><span data-dcnode-id="3432" instrument_node=""> Amusingly, the first such boast is said by Benley, a minor character at Settlement 17 pub who could obviously never live up to it:</span><div class="indent" data-dcnode-id="3416"><strong data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">Barten:</span></strong><span data-dcnode-id="3429" instrument_node=""> That moon has been coming apart for decades now. The more it crumbles, the more Penance seems to happen. </span><br data-dcnode-id="3428"><strong data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">Turkosa:</span></strong><span data-dcnode-id="3425" instrument_node=""> It's because of sin, isn't it? Do you think pieces of the moon could fall on us too? </span><br data-dcnode-id="3424"><strong data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">Barten:</span></strong><span data-dcnode-id="3421" instrument_node=""> Benley wouldn't allow it. </span><br data-dcnode-id="3420"><strong data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">Benley:</span></strong><span data-dcnode-id="3417" instrument_node=""> I would punch it back into orbit with my own fist, girl!</span></div></li></ul></li><li data-dcnode-id="3408"><span data-dcnode-id="3412" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadGuyBar" title="/pmwiki/pmwiki.php/Main/BadGuyBar"><span data-dcnode-id="3411" instrument_node="">Bad-Guy Bar</span></a><span data-dcnode-id="3409" instrument_node="">: The Community Center (more or less a pub, even though alcohol is in short supply) in Settlement 17 is used as a hangout place for the One Concern while they're keeping tabs on the town, much to Black's annoyance.</span></li><li data-dcnode-id="3394"><span data-dcnode-id="3407" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BaitAndSwitch" title="/pmwiki/pmwiki.php/Main/BaitAndSwitch"><span data-dcnode-id="3406" instrument_node="">Bait-and-Switch</span></a><span data-dcnode-id="3404" instrument_node="">: Ash mentions that his daughter volunteered for Transcendence in order to become like him. The player will most likely assume he is referring to </span><span class="spoiler" data-dcnode-id="3402" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3403" instrument_node="">Black, the only female agent encountered up to this point</span></span><span data-dcnode-id="3401" instrument_node="">, but the credits imply that he was actually referring to </span><span class="spoiler" data-dcnode-id="3396" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3400" instrument_node="">Nobel. This was </span><a class="twikilink" data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Foreshadowing" title="/pmwiki/pmwiki.php/Main/Foreshadowing"><span data-dcnode-id="3399" instrument_node="">foreshadowed</span></a><span data-dcnode-id="3397" instrument_node=""> by Nobel's superpower being invisibility, like Ash</span></span><span data-dcnode-id="3395" instrument_node="">.</span></li><li data-dcnode-id="3383"><span data-dcnode-id="3393" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BareYourMidriff" title="/pmwiki/pmwiki.php/Main/BareYourMidriff"><span data-dcnode-id="3392" instrument_node="">Bare Your Midriff</span></a><span data-dcnode-id="3390" instrument_node="">: A popular fashion choice among the Isi, including Samba, the pink-haired girl who likes sitting on couches, and all of the men who don't </span><a class="twikilink" data-dcnode-id="3388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WalkingShirtlessScene" title="/pmwiki/pmwiki.php/Main/WalkingShirtlessScene"><span data-dcnode-id="3389" instrument_node="">forgo a shirt entirely</span></a><span data-dcnode-id="3387" instrument_node=""> (except Gustavo and the scientists). Agent Black also does this under her coat, which </span><a class="twikilink" data-dcnode-id="3385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCoatsAreOff" title="/pmwiki/pmwiki.php/Main/TheCoatsAreOff"><span data-dcnode-id="3386" instrument_node="">she discards before your first fight against her</span></a><span data-dcnode-id="3384" instrument_node=""> and never puts back on for the rest of the game.</span></li><li data-dcnode-id="3373"><span data-dcnode-id="3382" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BattleInTheCenterOfTheMind" title="/pmwiki/pmwiki.php/Main/BattleInTheCenterOfTheMind"><span data-dcnode-id="3381" instrument_node="">Battle in the Center of the Mind</span></a><span data-dcnode-id="3379" instrument_node="">: We finally find out what the One Concern "prototype" does when </span><span class="spoiler" data-dcnode-id="3374" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3378" instrument_node="">Starworm uses the real thing on Robin, and she has to face off against </span><a class="twikilink" data-dcnode-id="3376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MindRape" title="/pmwiki/pmwiki.php/Main/MindRape"><span data-dcnode-id="3377" instrument_node="">shadow creatures who represent the people she failed, while the backgrounds portray said failure</span></a><span data-dcnode-id="3375" instrument_node="">. The first creature carries Elro's broken sword, and has his ruined house standing in a sunflower field ("Sunflower" being Elro's nickname for Robin), with the statues of his wife and daughter in the background. Mina's shadow has the graves of her Isi ancestors filling the background, Robin presumably thinking they would've lived if she could have stopped the One Concern sooner. The triangle-headed apparition representing Royal has the broken moon where he died. Agent Black has a literal black void, both it and her figure being a skeleton referring to her death at Robin's hands. The first three cannot be damaged conventionally and must be bypassed by turning on switches, which represents Robin's unwillingness to hurt others and desire to “fix” things. All but Black that is. "She" must either be shot again, or allowed to crawl past and explode on her own.</span></span></li><li data-dcnode-id="3368"><span data-dcnode-id="3372" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BattleInTheRain" title="/pmwiki/pmwiki.php/Main/BattleInTheRain"><span data-dcnode-id="3371" instrument_node="">Battle in the Rain</span></a><span data-dcnode-id="3369" instrument_node="">: The battle by the rocket against Agent Black is fought during a torrential downpour.</span></li><li data-dcnode-id="3349"><span data-dcnode-id="3367" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="3366" instrument_node="">Big Bad</span></a><span data-dcnode-id="3364" instrument_node="">: </span><a class="twikilink" data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilMatriarch" title="/pmwiki/pmwiki.php/Main/EvilMatriarch"><span data-dcnode-id="3363" instrument_node="">Mother</span></a><span data-dcnode-id="3361" instrument_node=""> is the leader of the </span><a class="twikilink" data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheTheocracy" title="/pmwiki/pmwiki.php/Main/TheTheocracy"><span data-dcnode-id="3360" instrument_node="">One Concern</span></a><span data-dcnode-id="3358" instrument_node=""> who is responsible for the despotic tyranny it is subjecting the world to. </span><span class="spoiler" data-dcnode-id="3350" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3357" instrument_node="">After her death, </span><a class="twikilink" data-dcnode-id="3355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive" title="/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive"><span data-dcnode-id="3356" instrument_node="">Emmet Darland</span></a><span data-dcnode-id="3354" instrument_node=""> takes over and tries to stop the heroes from reaching the moon; once they do, </span><a class="twikilink" data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="3353" instrument_node="">the Starworm</span></a><span data-dcnode-id="3351" instrument_node=""> becomes the final threat who tries to destroy the world for its Ivory.</span></span></li><li data-dcnode-id="3342"><span data-dcnode-id="3348" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBadDuumvirate" title="/pmwiki/pmwiki.php/Main/BigBadDuumvirate"><span data-dcnode-id="3347" instrument_node="">Big Bad Duumvirate</span></a><span data-dcnode-id="3345" instrument_node="">: Implied, de-facto example; while Mother is the official leader of the One Concern, the Suits, particularly Emmet Darland, seem to be at least sharing power with her, and are often the ones directly overseeing her projects. </span><span class="spoiler" data-dcnode-id="3343" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3344" instrument_node="">Once Mother dies, Emmet and the Suits take over what remains of the One Concern, intending to carry out her plan to flee to the moon.</span></span></li><li data-dcnode-id="3318"><span data-dcnode-id="3341" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigDamnHeroes" title="/pmwiki/pmwiki.php/Main/BigDamnHeroes"><span data-dcnode-id="3340" instrument_node="">Big Damn Heroes</span></a><span data-dcnode-id="3338" instrument_node="">:</span><ul data-dcnode-id="3319"><li data-dcnode-id="3325"><span data-dcnode-id="3337" instrument_node=""> In Darland Ascent, </span><span class="spoiler" data-dcnode-id="3333" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3336" instrument_node="">Robin and Royal are cornered by the Omega Controller and about to be shredded, when suddenly Captain Myron busts through the ceiling on his ship. When the Omega Controller rams it, the ship </span><em data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">breaks its armor</span></em></span><span data-dcnode-id="3332" instrument_node="">.</span><div class="indent" data-dcnode-id="3326"><strong data-dcnode-id="3328"><span class="spoiler" data-dcnode-id="3330" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3331" instrument_node="">Myron</span></span><span data-dcnode-id="3329" instrument_node="">:</span></strong><span data-dcnode-id="3327" instrument_node=""> I'll have my audience with you, marauder!</span></div></li><li data-dcnode-id="3320"><span data-dcnode-id="3324" instrument_node=""> The game heavily implies that </span><span class="spoiler" data-dcnode-id="3322" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3323" instrument_node="">Teegan showed up and pushed the other button to launch the rocket after Elro refused to</span></span><span data-dcnode-id="3321" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3304"><span data-dcnode-id="3317" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigShutUp" title="/pmwiki/pmwiki.php/Main/BigShutUp"><span data-dcnode-id="3316" instrument_node="">Big "SHUT UP!"</span></a><span data-dcnode-id="3314" instrument_node="">: Black delivers a "SHUT... UP!" in large, vibrating text towards a calm-as-always Chrome in One Concern West, shortly before </span><a class="twikilink" data-dcnode-id="3312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RageBreakingPoint" title="/pmwiki/pmwiki.php/Main/RageBreakingPoint"><span data-dcnode-id="3313" instrument_node="">beating the shit out of him with some</span></a><span data-dcnode-id="3311" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExtremeMeleeRevenge" title="/pmwiki/pmwiki.php/Main/ExtremeMeleeRevenge"><span data-dcnode-id="3310" instrument_node="">Extreme Mêlée Revenge</span></a><span data-dcnode-id="3308" instrument_node=""> until Chrome bleeds out onto the floor. Since he's Transcended, </span><a class="twikilink" data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodThingYouCanHeal" title="/pmwiki/pmwiki.php/Main/GoodThingYouCanHeal"><span data-dcnode-id="3307" instrument_node="">Chrome gets better shortly thereafter</span></a><span data-dcnode-id="3305" instrument_node="">.</span></li><li data-dcnode-id="3297"><span data-dcnode-id="3303" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="3302" instrument_node="">Bittersweet Ending</span></a><span data-dcnode-id="3300" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3298" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3299" instrument_node="">On the one hand, the One Concern theocracy falls, and its remaining forces are led by clueless Tolo, and no longer have the power to harass Isi or intimidate peaceful people with Penance. Robin stops Armageddon from occurring by destroying the Starworm and its pilot to prevent him from siphoning off the remaining Ivory keeping the planet together, while nature repairs the planet after she sticks an Isi seed into Starworm's Ivory-infused corpse. It's also implied ChemiCo Contra are making headway into alternative energy research to ensure the planet won't come so close to the brink again. On the other hand, the demise of One Concern's transcended leaders like Mother, Chrome and Royal results in dozens of rank-and-file soldiers dying in the civil war, while most pupils at the Tower were killed by Mother's Corners, and the remainder appear unable to adapt to the independent life. The cycle of revenge between Agent Black and Elro ends with the former dying a horrible death, her remains burnt up in the atmosphere as B-17 took off, while the latter is alive, but crippled and embittered.</span></span></li><li data-dcnode-id="3292"><span data-dcnode-id="3296" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackoutBasement" title="/pmwiki/pmwiki.php/Main/BlackoutBasement"><span data-dcnode-id="3295" instrument_node="">Blackout Basement</span></a><span data-dcnode-id="3293" instrument_node="">: The Dark Cave area of Darland Ascent is appropriately badly lit. Robin's wrench acts as a small flashlight when charged, and she can activate generators to turn on lampposts.</span></li><li data-dcnode-id="3273"><span data-dcnode-id="3291" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlessedWithSuck" title="/pmwiki/pmwiki.php/Main/BlessedWithSuck"><span data-dcnode-id="3290" instrument_node="">Blessed with Suck</span></a><span data-dcnode-id="3288" instrument_node="">:</span><ul data-dcnode-id="3274"><li data-dcnode-id="3280"><span data-dcnode-id="3287" instrument_node=""> Along with the usual superpowers and immortality, </span><span class="spoiler" data-dcnode-id="3281" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3286" instrument_node="">Transcending caused Agent Black to suffer constant, unrelenting headaches which she describes as feeling like knives cutting her, meaning they are most likely </span><a class="urllink" data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cluster_headache"><span data-dcnode-id="3285" instrument_node="">cluster headaches</span><img data-dcnode-id="3284" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3282" instrument_node="">, known for their extreme intensity. She has been like this for almost 200 years, so it's no wonder she's such a grouch all the time, and why her sanity could take such an abrupt nosedive as it did.</span></span></li><li data-dcnode-id="3275"><span data-dcnode-id="3279" instrument_node=""> Agents in general are stuck with this, as the very act of Transcending has caused them to </span><span class="spoiler" data-dcnode-id="3277" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3278" instrument_node="">lose limbs or organs which require prosthetic replacement. Chronic pain also seems to be a common symptom as well, since Ash also mentions suffering heavy pains in his gut</span></span><span data-dcnode-id="3276" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3254"><span data-dcnode-id="3272" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BloodlessCarnage" title="/pmwiki/pmwiki.php/Main/BloodlessCarnage"><span data-dcnode-id="3271" instrument_node="">Bloodless Carnage</span></a><span data-dcnode-id="3269" instrument_node="">: None of the dead bodies seen in the game, whether it's </span><span class="spoiler" data-dcnode-id="3267" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3268" instrument_node="">One Concern soldiers killed in their civil war or the Tower's pupils killed by Mother's Corners</span></span><span data-dcnode-id="3266" instrument_node=""> ever display blood. The only exceptions are the </span><a class="twikilink" data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlienBlood" title="/pmwiki/pmwiki.php/Main/AlienBlood"><span data-dcnode-id="3265" instrument_node="">Alien Blood</span></a><span data-dcnode-id="3263" instrument_node=""> of </span><span class="spoiler" data-dcnode-id="3261" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3262" instrument_node="">the Transcended individuals, which is white like Ivory, and the green blood of the final boss, an actual alien.</span></span><ul data-dcnode-id="3255"><li data-dcnode-id="3256"><span data-dcnode-id="3260" instrument_node=""> However, a scene when Agent Black subverts this when </span><span class="spoiler" data-dcnode-id="3258" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3259" instrument_node="">she rips off Elro’s arm, as it has a couple of blood splatters. Elro spends the rest of the game walking around with a bandaged but still oozing stump where his arm used to be, his med-tape and shirt thoroughly saturated with his own blood</span></span><span data-dcnode-id="3257" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3230"><span data-dcnode-id="3253" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BodyHorror" title="/pmwiki/pmwiki.php/Main/BodyHorror"><span data-dcnode-id="3252" instrument_node="">Body Horror</span></a><span data-dcnode-id="3250" instrument_node="">:</span><ul data-dcnode-id="3231"><li data-dcnode-id="3242"><span data-dcnode-id="3249" instrument_node=""> The entire process of </span><span class="spoiler" data-dcnode-id="3247" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3248" instrument_node="">Transcending, which involves injecting Ivory directly into a person's body. A few people will succeed and survive the process with superpowers, though some will lose body parts in the process. And the many that fail basically melt into puddles of white goo.</span></span><span data-dcnode-id="3246" instrument_node=""> Even if it does work out, </span><span class="spoiler" data-dcnode-id="3244" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3245" instrument_node="">those who Transcend are plagued by sharp chronic pains, and Transcended people who live long enough will find themselves consumed by the Ivory; Father is essentially comatose, Fitzroy turned into a mindless being made of dripping Ivory, while Leticia kept her sanity but is no longer recognizably human</span></span><span data-dcnode-id="3243" instrument_node="">.</span></li><li data-dcnode-id="3237"><span data-dcnode-id="3241" instrument_node=""> Agent Black takes the cake when </span><span class="spoiler" data-dcnode-id="3239" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3240" instrument_node="">the blue eyes try to possess her while Isi Seeds sprout from her body. The end result is a giant monstrosity with Ivory trees sprouting all over its body and clusters of eyes hidden inside said trees</span></span><span data-dcnode-id="3238" instrument_node="">.</span></li><li data-dcnode-id="3232"><span data-dcnode-id="3236" instrument_node=""> The horrors of chemistry are demonstrated when </span><span class="spoiler" data-dcnode-id="3234" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3235" instrument_node="">Elro develops a serum that forcibly ejects all Ivory from matter, causing the object to turn into Detritus dust. Its real purpose is to be used on Transcended humans, who are practically filled with Ivory. The result? The affected person's skin turns purple as they start deforming and boiling alive, until they explode into a fine purple mist</span></span><span data-dcnode-id="3233" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3216"><span data-dcnode-id="3229" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Bowdlerise" title="/pmwiki/pmwiki.php/Main/Bowdlerise"><span data-dcnode-id="3228" instrument_node="">Bowdlerise</span></a><span data-dcnode-id="3226" instrument_node="">: In the original release of the game (as well as </span><em data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">Ivory Springs</span></em><span data-dcnode-id="3223" instrument_node=""> and the 2012 demo), while escaping from Settlement 17's jail through the rafters, the noise Robin makes is covered up by One Concern troopers cracking lewd "if you know what I mean" jokes and laughing. Later patches changed these into simpler puns. Konjak's official reason for changing the jokes is that they didn't fit well with the tone the game has early on before hitting </span><a class="twikilink" data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CerebusSyndrome" title="/pmwiki/pmwiki.php/Main/CerebusSyndrome"><span data-dcnode-id="3222" instrument_node="">Cerebus Syndrome</span></a><span data-dcnode-id="3220" instrument_node="">. It helps that it keeps the troopers more sympathetic, since the original jokes painted them as </span><a class="twikilink" data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PoliticallyIncorrectVillain" title="/pmwiki/pmwiki.php/Main/PoliticallyIncorrectVillain"><span data-dcnode-id="3219" instrument_node="">Politically Incorrect Villains</span></a><span data-dcnode-id="3217" instrument_node="">, which doesn't align with how sympathetically they're treated in the rest of the game.</span></li><li data-dcnode-id="3205"><span data-dcnode-id="3215" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="3214" instrument_node="">Bonus Boss</span></a><span data-dcnode-id="3212" instrument_node="">: There are two, </span><span class="spoiler" data-dcnode-id="3210" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3211" instrument_node="">Mother's Corners and Fitzroy</span></span><span data-dcnode-id="3209" instrument_node="">, both requiring some serious </span><a class="twikilink" data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="3208" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="3206" instrument_node=""> to find.</span></li><li data-dcnode-id="3198"><span data-dcnode-id="3204" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BoomHeadshot" title="/pmwiki/pmwiki.php/Main/BoomHeadshot"><span data-dcnode-id="3203" instrument_node="">Boom, Headshot!</span></a><span data-dcnode-id="3201" instrument_node="">: Lawrence executes a hapless One Concern Attacker in this manner, before </span><span class="spoiler" data-dcnode-id="3199" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3200" instrument_node="">turning around to face Elro.</span></span></li><li data-dcnode-id="3187"><span data-dcnode-id="3197" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BoringButPractical" title="/pmwiki/pmwiki.php/Main/BoringButPractical"><span data-dcnode-id="3196" instrument_node="">Boring, but Practical</span></a><span data-dcnode-id="3194" instrument_node="">: The Iron Heart tweak. All it does is absorbing the damage from a single hit before breaking, but the fact that it's possible to stack three of them at a time and landing shots on an enemy helps regenerate a broken tweak means that they're incredibly useful to have equipped for most boss battles. </span><span class="spoiler" data-dcnode-id="3189" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3193" instrument_node="">Plus, it's the only way to avoid being a </span><a class="twikilink" data-dcnode-id="3191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitPointWonder" title="/pmwiki/pmwiki.php/Main/OneHitPointWonder"><span data-dcnode-id="3192" instrument_node="">One-Hit-Point Wonder</span></a><span data-dcnode-id="3190" instrument_node=""> in Challenge Mode</span></span><span data-dcnode-id="3188" instrument_node="">.</span></li><li data-dcnode-id="3173"><span data-dcnode-id="3186" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossArenaRecovery" title="/pmwiki/pmwiki.php/Main/BossArenaRecovery"><span data-dcnode-id="3185" instrument_node="">Boss Arena Recovery</span></a><span data-dcnode-id="3183" instrument_node="">: Many bosses will summon some type of minion or use a destroyable projectile attack that has a chance to drop health. The </span><span class="spoiler" data-dcnode-id="3181" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3182" instrument_node="">first</span></span><span data-dcnode-id="3180" instrument_node=""> fight against Agent Black is a particularly egregious example: Three times during the fight she uses an unavoidable attack that always brings you down to </span><a class="twikilink" data-dcnode-id="3178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HPToOne" title="/pmwiki/pmwiki.php/Main/HPToOne"><span data-dcnode-id="3179" instrument_node="">one hit away from death</span></a><span data-dcnode-id="3177" instrument_node="">, and then immediately summons a bunch of weak Controllers that are guaranteed to drop health pickups while she just slowly walks around doing the "</span><a class="twikilink" data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSoulsI" title="/pmwiki/pmwiki.php/VideoGame/DarkSoulsI"><span data-dcnode-id="3176" instrument_node="">Well! What is it?</span></a><span data-dcnode-id="3174" instrument_node="">" gesture and not attacking, giving you plenty of time to kill the Controllers and get your health meter up to 75% full.</span></li><li data-dcnode-id="3165"><span data-dcnode-id="3172" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossRush" title="/pmwiki/pmwiki.php/Main/BossRush"><span data-dcnode-id="3171" instrument_node="">Boss Rush</span></a><span data-dcnode-id="3169" instrument_node="">: An alternate game mode once the main story is beaten. Light Rush and Heavy Rush constitute about 45% of the game's bosses each, Full Rush uses the bosses from both Light and Heavy Rush, and Lethal Rush reuses the bosses from Heavy Rush, but removes the </span><a class="twikilink" data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RegeneratingShieldStaticHealth" title="/pmwiki/pmwiki.php/Main/RegeneratingShieldStaticHealth"><span data-dcnode-id="3168" instrument_node="">Regenerating Tweaks</span></a><span data-dcnode-id="3166" instrument_node=""> that all the other boss rushes have.</span></li><li data-dcnode-id="3142"><span data-dcnode-id="3164" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BraggingRightsReward" title="/pmwiki/pmwiki.php/Main/BraggingRightsReward"><span data-dcnode-id="3163" instrument_node="">Bragging Rights Reward</span></a><span data-dcnode-id="3161" instrument_node="">: For the purposes of a single playthrough, the </span><a class="twikilink" data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoubleJump" title="/pmwiki/pmwiki.php/Main/DoubleJump"><span data-dcnode-id="3160" instrument_node="">Double Jump</span></a><span data-dcnode-id="3158" instrument_node=""> tweak granted after </span><span class="spoiler" data-dcnode-id="3156" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3157" instrument_node="">defeating Mother's Corners</span></span><span data-dcnode-id="3155" instrument_node=""> is useless, since all that's left of the story by the time they're available to fight is </span><span class="spoiler" data-dcnode-id="3153" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3154" instrument_node="">to confront the Starworm</span></span><span data-dcnode-id="3152" instrument_node="">. It can still be carried over to a </span><a class="twikilink" data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="3151" instrument_node="">New Game+</span></a><span data-dcnode-id="3149" instrument_node="">, however. Same goes for </span><span class="spoiler" data-dcnode-id="3147" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3148" instrument_node="">defeating Fitzroy</span></span><span data-dcnode-id="3146" instrument_node="">, since the tweak from his fight is a </span><a class="twikilink" data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JokeItem" title="/pmwiki/pmwiki.php/Main/JokeItem"><span data-dcnode-id="3145" instrument_node="">Joke Item</span></a><span data-dcnode-id="3143" instrument_node=""> meant to make things more challenging.</span></li><li data-dcnode-id="3131"><span data-dcnode-id="3141" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButtMonkey" title="/pmwiki/pmwiki.php/Main/ButtMonkey"><span data-dcnode-id="3140" instrument_node="">Butt-Monkey</span></a><span data-dcnode-id="3138" instrument_node="">: The Silver Watchman just can't catch a break. He gets his ass kicked by you three times, his fourth attempt to kill you </span><span class="spoiler" data-dcnode-id="3133" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3137" instrument_node="">accidentally saves your life instead, then he gets possessed by the blue eyes (and gets his ass kicked by you again in his possessed state), and finally he is taken out by </span><em data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">Royal</span></em><span data-dcnode-id="3134" instrument_node=""> of all people, who drops a boulder on top of him, trapping him underwater where his teleportation powers don't work, drowning him</span></span><span data-dcnode-id="3132" instrument_node="">.</span></li><li data-dcnode-id="3123"><span data-dcnode-id="3130" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CardboardPrison" title="/pmwiki/pmwiki.php/Main/CardboardPrison"><span data-dcnode-id="3129" instrument_node="">Cardboard Prison</span></a><span data-dcnode-id="3127" instrument_node="">: The trio of Robin, Mina, and Elro find themselves caught by the Concern and locked in The Tower’s jail cells at one point. Mina and Elro are locked up tight, but Robin’s cell includes a floor plate that s
