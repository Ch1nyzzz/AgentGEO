3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpikesOfDoom" title="/pmwiki/pmwiki.php/Main/SpikesOfDoom"><span data-dcnode-id="2414" instrument_node="">Spikes of Doom</span></a><span data-dcnode-id="2412" instrument_node=""> nearby that you can make them run into which will kill them. They also are the game's only non-respawning enemies.</span></li></ul></li><li data-dcnode-id="2401"><span data-dcnode-id="2408" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InjuredPlayerCharacterStage" title="/pmwiki/pmwiki.php/Main/InjuredPlayerCharacterStage"><span data-dcnode-id="2407" instrument_node="">Injured Player Character Stage</span></a><span data-dcnode-id="2405" instrument_node="">: The short segment where you play as </span><span class="spoiler" data-dcnode-id="2403" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2404" instrument_node="">Elro is after Black rips his arm off</span></span><span data-dcnode-id="2402" instrument_node="">, so he is slowly limping around and barely leaves the ground when jumping. Despite this, he manages to have an awesome boss fight at the end of the section.</span></li><li data-dcnode-id="2383"><span data-dcnode-id="2400" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterfaceSpoiler" title="/pmwiki/pmwiki.php/Main/InterfaceSpoiler"><span data-dcnode-id="2399" instrument_node="">Interface Spoiler</span></a><span data-dcnode-id="2397" instrument_node="">:</span><ul data-dcnode-id="2384"><li data-dcnode-id="2390"><span data-dcnode-id="2396" instrument_node=""> There are five save slots, each with a different character's sprite marking it. First is Robin, the player character. Mina, the first player to join your party, is second, followed by your third party member, Royal. </span><span class="spoiler" data-dcnode-id="2394" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2395" instrument_node="">This is your first big clue that Elro didn't die with the rest of his family in the Penance, as he's the fourth save icon.</span></span><span data-dcnode-id="2393" instrument_node=""> Averted with </span><span class="spoiler" data-dcnode-id="2391" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2392" instrument_node="">Agent Black, who is the fifth save slot yet never joins the party.</span></span></li><li data-dcnode-id="2385"><span data-dcnode-id="2389" instrument_node=""> There is a menu box that shows which tweaks Robin has made, with dots representing tweaks that she hasn't discovered. There are only around fourteen dots in the menu, but enough empty space in the box to hold two more icons; those spaces are for the schematics placed near the two </span><a class="twikilink" data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="2388" instrument_node="">Bonus Bosses</span></a><span data-dcnode-id="2386" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2376"><span data-dcnode-id="2382" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Irony" title="/pmwiki/pmwiki.php/Main/Irony"><span data-dcnode-id="2381" instrument_node="">Irony</span></a><span data-dcnode-id="2379" instrument_node="">: One easy-to-miss example: When asked about One Concern, Yon at the Settlement 17's Church replies that they exist to "enforce His will of a preserved, untouched planet." In reality, </span><span class="spoiler" data-dcnode-id="2377" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2378" instrument_node="">One Concern's Ivory mining is the main reason the planet is suffering earthquakes as the planet's crust has difficulty holding itself together and resisting magma beneath, and if things continued the same way, it would have collapsed like the moon. Once One Concern leadership understood this, they opted to build a rocket to escape the planet and potentially relocate the rest of the population there if they had enough time, rather than trying to reverse the process. Moreover, the planet is anything but preserved: Omega Controller changes the shape of the entire continents at its whim. Since its destruction summons the Star Worm, the best One Concern came up with was to execute any map-makers so that the secret wouldn't get out.</span></span></li><li data-dcnode-id="2364"><span data-dcnode-id="2375" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IronicEcho" title="/pmwiki/pmwiki.php/Main/IronicEcho"><span data-dcnode-id="2374" instrument_node="">Ironic Echo</span></a><span data-dcnode-id="2372" instrument_node="">:</span><ul data-dcnode-id="2365"><li data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node=""> When Agent Black sees the way that the Isi have treated the ark early in the game, she is appalled and calls them savages and rants about their mistreatment of it and how the One Concern must recover the vessel. When Mina sees that the One Concern have an ark of their own much later on, she goes on a very similar rant.</span></li><li data-dcnode-id="2366"><span data-dcnode-id="2369" instrument_node=""> During the credits: </span><span class="spoiler" data-dcnode-id="2367" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2368" instrument_node="">the Ivory spores seen around the planet after Robin restored its original environment through injecting Isi seed into Star Worm's body are the same ones that fly around during the third phase of Agent Black's final fight.</span></span></li></ul></li><li data-dcnode-id="2340"><span data-dcnode-id="2363" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkWithAHeartOfGold" title="/pmwiki/pmwiki.php/Main/JerkWithAHeartOfGold"><span data-dcnode-id="2362" instrument_node="">Jerk with a Heart of Gold</span></a><span data-dcnode-id="2360" instrument_node="">:</span><ul data-dcnode-id="2341"><li data-dcnode-id="2352"><span data-dcnode-id="2359" instrument_node=""> Royal. He means well and can be nice when he's not </span><a class="twikilink" data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItsAllAboutMe" title="/pmwiki/pmwiki.php/Main/ItsAllAboutMe"><span data-dcnode-id="2358" instrument_node="">focusing on himself</span></a><span data-dcnode-id="2356" instrument_node="">, but it's clear the One Concern have their claws in him </span><span class="spoiler" data-dcnode-id="2354" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2355" instrument_node="">with the whole thing about him being Mother's heir</span></span><span data-dcnode-id="2353" instrument_node="">.</span></li><li data-dcnode-id="2342"><span data-dcnode-id="2351" instrument_node=""> Elro is fairly nasty to everyone, but he has the best interests of Robin and her friends at heart, and he's been broken by the events of the prologue. </span><span class="spoiler" data-dcnode-id="2343" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2350" instrument_node="">In reality, he’s a </span><a class="twikilink" data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkWithAHeartOfJerk" title="/pmwiki/pmwiki.php/Main/JerkWithAHeartOfJerk"><span data-dcnode-id="2349" instrument_node="">Jerk with a Heart of Jerk</span></a><span data-dcnode-id="2347" instrument_node="">, as the traumatic events of the storyline push him into </span><a class="twikilink" data-dcnode-id="2345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainProtagonist" title="/pmwiki/pmwiki.php/Main/VillainProtagonist"><span data-dcnode-id="2346" instrument_node="">Villain Protagonist</span></a><span data-dcnode-id="2344" instrument_node=""> territory.</span></span></li></ul></li><li data-dcnode-id="2333"><span data-dcnode-id="2339" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillTheGod" title="/pmwiki/pmwiki.php/Main/KillTheGod"><span data-dcnode-id="2338" instrument_node="">Kill the God</span></a><span data-dcnode-id="2336" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2334" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2335" instrument_node="">Robin sets out to destroy the Starworm after Royal's death, as it's her last option. It works, and in the process reveals it was never a god at all.</span></span></li><li data-dcnode-id="2328"><span data-dcnode-id="2332" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="2331" instrument_node="">Lampshade Hanging</span></a><span data-dcnode-id="2329" instrument_node="">: In Isilugar, after Robin defeats the One Concern soldiers, a few of them can be seen in a prison cell, still holding their guns. If you talk with the Isi guard, he says not to worry as they took all their ammo out. This was so Konjak didn't have to make new sprites just for this scene.</span></li><li data-dcnode-id="2323"><span data-dcnode-id="2327" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall" title="/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall"><span data-dcnode-id="2326" instrument_node="">Leaning on the Fourth Wall</span></a><span data-dcnode-id="2324" instrument_node="">: In the beginning of the game, Agent Black drops a bunch of info on Robin and follows it with "Well, that's your backstory out of the way."</span></li><li data-dcnode-id="2316"><span data-dcnode-id="2322" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LikeAnOldMarriedCouple" title="/pmwiki/pmwiki.php/Main/LikeAnOldMarriedCouple"><span data-dcnode-id="2321" instrument_node="">Like an Old Married Couple</span></a><span data-dcnode-id="2319" instrument_node="">: Mina and Samba have this vibe going on. </span><span class="spoiler" data-dcnode-id="2317" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2318" instrument_node="">In the credits, it's revealed that they are indeed a couple, although they made it pretty obvious throughout the game even outside of this trope.</span></span></li><li data-dcnode-id="2309"><span data-dcnode-id="2315" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LostTechnology" title="/pmwiki/pmwiki.php/Main/LostTechnology"><span data-dcnode-id="2314" instrument_node="">Lost Technology</span></a><span data-dcnode-id="2312" instrument_node="">: At Darland Ascent, it's revealed that </span><span class="spoiler" data-dcnode-id="2310" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2311" instrument_node="">the Controllers the One Concern use to enforce their will were reverse-engineered from the Omega Controller during Father's reign, with the technology being lost once the facility had to be abandoned. Sadly for the rest of the world, the pit they pull them from has enough in good enough shape that they're likely to not run out anytime soon.</span></span></li><li data-dcnode-id="2285"><span data-dcnode-id="2308" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane" title="/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane"><span data-dcnode-id="2307" instrument_node="">Maybe Magic, Maybe Mundane</span></a><span data-dcnode-id="2305" instrument_node="">:</span><ul data-dcnode-id="2286"><li data-dcnode-id="2291"><span data-dcnode-id="2304" instrument_node=""> On the one hand, Ivory is revered as sacred and powerful for good reason, as it can cause superpowers in those exposed to high amounts of the stuff, ultimately culminating in psychic powers that border on </span><a class="twikilink" data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealityWarping" title="/pmwiki/pmwiki.php/Main/RealityWarping"><span data-dcnode-id="2303" instrument_node="">Reality Warping</span></a><span data-dcnode-id="2301" instrument_node=""> and an absurdly powerful </span><a class="twikilink" data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HealingFactor" title="/pmwiki/pmwiki.php/Main/HealingFactor"><span data-dcnode-id="2300" instrument_node="">Healing Factor</span></a><span data-dcnode-id="2298" instrument_node="">. </span><span class="spoiler" data-dcnode-id="2296" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2297" instrument_node="">Not to mention removal of it causes things to turn into a purple dust that inhibits said powers.</span></span><span data-dcnode-id="2295" instrument_node=""> On the other hand, </span><span class="spoiler" data-dcnode-id="2293" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2294" instrument_node="">considering how the birdman piloting the Starworm (AKA Him) treats the stuff, it may just be a strange, mutagenic oil</span></span><span data-dcnode-id="2292" instrument_node="">.</span></li><li data-dcnode-id="2287"><span data-dcnode-id="2290" instrument_node=""> There's a comparable quandary with the "Penance". </span><span class="spoiler" data-dcnode-id="2288" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2289" instrument_node="">While a house being ground down from underneath by a Controller acting as a giant buzzsaw is clearly not magical, it's unclear how much control the One Concern has over the process. Even Black appears genuinely uncertain when she asks Robin if she's the reason for all the Penance in her Settlement, so it's possible all Penance happens because the Omega Controller sent minor Controllers there, while One Concern can at most signal which house they would like destroyed, and ensure City One remains untouched. As such, Mrs. Andress' Penance for creating small maps was probably Omega Controller's own decision to ensure its planet-altering properties are not found out, since no-one besides Mr. Andress appears to have even known of it.</span></span></li></ul></li><li data-dcnode-id="2278"><span data-dcnode-id="2284" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="2283" instrument_node="">Meaningful Name</span></a><span data-dcnode-id="2281" instrument_node="">: "Iconoclast" has two general meanings: "a person who attacks cherished beliefs or institutions" and "a destroyer of images used in religious worship". Robin and her friends end up doing both in spades over the course of the game as they fight against One Concern. </span><span class="spoiler" data-dcnode-id="2279" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2280" instrument_node="">Even "God" itself does it, if unwittingly: lest you think the pilot of the Starworm was just to deflate the serious tone of the game, in fact it is the biggest Iconoclast in the story, its mere existence jossing all religious context the Starworm had.</span></span></li><li data-dcnode-id="2273"><span data-dcnode-id="2277" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MechaMooks" title="/pmwiki/pmwiki.php/Main/MechaMooks"><span data-dcnode-id="2276" instrument_node="">Mecha-Mooks</span></a><span data-dcnode-id="2274" instrument_node="">: This is One Concern's primary means of offense aside from their troops, mostly showing up in their late-game facilities.</span></li><li data-dcnode-id="2263"><span data-dcnode-id="2272" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MegaNeko" title="/pmwiki/pmwiki.php/Main/MegaNeko"><span data-dcnode-id="2271" instrument_node="">Mega Neko</span></a><span data-dcnode-id="2269" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2264" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2268" instrument_node="">Mother fights you by using her </span><a class="twikilink" data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealityWarper" title="/pmwiki/pmwiki.php/Main/RealityWarper"><span data-dcnode-id="2267" instrument_node="">Reality Warper</span></a><span data-dcnode-id="2265" instrument_node=""> powers to form a giant cat out of pavement, cars, and other objects in the vicinity, which she rides on.</span></span></li><li data-dcnode-id="2258"><span data-dcnode-id="2262" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MickeyMousing" title="/pmwiki/pmwiki.php/Main/MickeyMousing"><span data-dcnode-id="2261" instrument_node="">Mickey Mousing</span></a><span data-dcnode-id="2259" instrument_node="">: Downplayed. The footsteps of each playable character are distinct, and they all provide different percussion-like beats when they move.</span></li><li data-dcnode-id="2247"><span data-dcnode-id="2257" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MindRape" title="/pmwiki/pmwiki.php/Main/MindRape"><span data-dcnode-id="2256" instrument_node="">Mind Rape</span></a><span data-dcnode-id="2254" instrument_node="">: The Starworm is capable of doing this to people, as </span><span class="spoiler" data-dcnode-id="2252" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2253" instrument_node="">Robin and Royal</span></span><span data-dcnode-id="2251" instrument_node=""> find out the hard way. It appears that the Concern is also working on reverse engineering a gun that can replicate the effects. Careful attention will show that their prototype ended up in the hands of a sea captain who uses it to recruit and control his crew... and briefly in Mina's hands, when she </span><em data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">fired</span></em><span data-dcnode-id="2248" instrument_node=""> at Robin but Robin dodged it.</span></li><li data-dcnode-id="2234"><span data-dcnode-id="2246" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MirrorBoss" title="/pmwiki/pmwiki.php/Main/MirrorBoss"><span data-dcnode-id="2245" instrument_node="">Mirror Boss</span></a><span data-dcnode-id="2243" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2235" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2242" instrument_node="">The </span><a class="twikilink" data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="2241" instrument_node="">Final Boss</span></a><span data-dcnode-id="2239" instrument_node=""> is a humanoid avian starship pilot/mechanic who fights using a wrench and several different types of </span><a class="twikilink" data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GroundPound" title="/pmwiki/pmwiki.php/Main/GroundPound"><span data-dcnode-id="2238" instrument_node="">Ground Pound</span></a><span data-dcnode-id="2236" instrument_node="">.</span></span></li><li data-dcnode-id="2223"><span data-dcnode-id="2233" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MissingSecret" title="/pmwiki/pmwiki.php/Main/MissingSecret"><span data-dcnode-id="2232" instrument_node="">Missing Secret</span></a><span data-dcnode-id="2230" instrument_node="">: There's a door in </span><span class="spoiler" data-dcnode-id="2228" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2229" instrument_node="">One Concern West</span></span><span data-dcnode-id="2227" instrument_node=""> that says that should the end of the world occur, scan your white ticket here. There's a way to get a white ticket as a sidequest item. </span><a class="twikilink" data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt" title="/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt"><span data-dcnode-id="2226" instrument_node="">The End of the World as We Know It</span></a><span data-dcnode-id="2224" instrument_node=""> begins to happen at the end of the game. Think these three things are related? They aren't.</span></li><li data-dcnode-id="2198"><span data-dcnode-id="2222" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoodWhiplash" title="/pmwiki/pmwiki.php/Main/MoodWhiplash"><span data-dcnode-id="2221" instrument_node="">Mood Whiplash</span></a><span data-dcnode-id="2219" instrument_node="">:</span><ul data-dcnode-id="2199"><li data-dcnode-id="2208"><span data-dcnode-id="2218" instrument_node=""> From amusing to serious: Mina tells Robin not to point her butt at her </span><span class="spoiler" data-dcnode-id="2210" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2217" instrument_node="">seconds before Agent Black gives Royal </span><a class="twikilink" data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="2216" instrument_node="">"The Reason You Suck" Speech</span></a><span data-dcnode-id="2214" instrument_node="">, brutalizes and (</span><a class="twikilink" data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HealingFactor" title="/pmwiki/pmwiki.php/Main/HealingFactor"><span data-dcnode-id="2213" instrument_node="">temporarily</span></a><span data-dcnode-id="2211" instrument_node="">) kills him</span></span><span data-dcnode-id="2209" instrument_node="">.</span></li><li data-dcnode-id="2200"><span data-dcnode-id="2207" instrument_node=""> From serious to amusing: </span><span class="spoiler" data-dcnode-id="2202" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2206" instrument_node="">The final boss battle has Robin undergo and break out of </span><a class="twikilink" data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MindRape" title="/pmwiki/pmwiki.php/Main/MindRape"><span data-dcnode-id="2205" instrument_node="">Mind Rape</span></a><span data-dcnode-id="2203" instrument_node=""> fighting against the Starworm, only for a giant muscular bird-person to jump out of it and squawk angrily at her, almost as if he's throwing a tantrum at his Starworm getting wrecked and the depot running low on Ivory</span></span><span data-dcnode-id="2201" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2190"><span data-dcnode-id="2197" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MookMaker" title="/pmwiki/pmwiki.php/Main/MookMaker"><span data-dcnode-id="2196" instrument_node="">Mook Maker</span></a><span data-dcnode-id="2194" instrument_node="">: The Kerthunk mech of the One Concern, and the Inti machine </span><span class="spoiler" data-dcnode-id="2192" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2193" instrument_node="">used to move Isilugar, but taken over by the Controller at first</span></span><span data-dcnode-id="2191" instrument_node=""> are both reduced to spamming weak Controllers in the last stage of their battles.</span></li><li data-dcnode-id="2169"><span data-dcnode-id="2189" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoralMyopia" title="/pmwiki/pmwiki.php/Main/MoralMyopia"><span data-dcnode-id="2188" instrument_node="">Moral Myopia</span></a><span data-dcnode-id="2186" instrument_node="">: Royal has a severe case of </span><a class="twikilink" data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProtagonistCenteredMorality" title="/pmwiki/pmwiki.php/Main/ProtagonistCenteredMorality"><span data-dcnode-id="2185" instrument_node="">Protagonist-Centered Morality</span></a><span data-dcnode-id="2183" instrument_node="">. Whereas Mother, whom he is meant to succeed, understands that people living under One Concern accept her as a goddess </span><strong data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">not</span></strong><span data-dcnode-id="2180" instrument_node=""> just because of her power, but because she's using it for their good (even if it's her theocracy's understanding of good), Royal does not bother to act on anything but his feelings, expects "his people" to surrender their interests to his whims, and doesn't seem to care about killing them when they are in the way. He expresses this most clearly when he's </span><span class="spoiler" data-dcnode-id="2178" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2179" instrument_node="">imprisoned in a Detritus-filled room at the One Concern HQ</span></span><span data-dcnode-id="2177" instrument_node="">:</span><div class="indent" data-dcnode-id="2170"><strong data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Royal:</span></strong><span data-dcnode-id="2174" instrument_node=""> I have EVERY RIGHT. I am a son of HE, THE ALMIGHTY! What's a train compared to me? What's </span><span class="spoiler" data-dcnode-id="2172" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2173" instrument_node="">swordsman Silver</span></span><span data-dcnode-id="2171" instrument_node=""> compared to me? My choices are divine! Like Mother's!</span></div></li><li data-dcnode-id="2152"><span data-dcnode-id="2168" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MouthOfSauron" title="/pmwiki/pmwiki.php/Main/MouthOfSauron"><span data-dcnode-id="2167" instrument_node="">Mouth of Sauron</span></a><span data-dcnode-id="2165" instrument_node="">: People who Transcend completely have their hair turn </span><a class="twikilink" data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MysticalWhiteHair" title="/pmwiki/pmwiki.php/Main/MysticalWhiteHair"><span data-dcnode-id="2164" instrument_node="">Ivory white,</span></a><span data-dcnode-id="2162" instrument_node=""> and are known as Mediums, who are said to be the only ones who are blessed enough to relay the Starworm's will to the rest of humanity. They wield psychokinetic abilities </span><span class="spoiler" data-dcnode-id="2160" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2161" instrument_node="">to manipulate objects that contain Ivory, but nothing else,</span></span><span data-dcnode-id="2159" instrument_node=""> and are treated much the way a king or queen would by the rest of the One Concern. </span><span class="spoiler" data-dcnode-id="2154" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2158" instrument_node="">Played with a bit in that the Sauron they're truly the mouth of are the </span><a class="twikilink" data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive" title="/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive"><span data-dcnode-id="2157" instrument_node="">Suits</span></a><span data-dcnode-id="2155" instrument_node=""> as opposed to the Starworm itself</span></span><span data-dcnode-id="2153" instrument_node="">.</span></li><li data-dcnode-id="2147"><span data-dcnode-id="2151" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MrExposition" title="/pmwiki/pmwiki.php/Main/MrExposition"><span data-dcnode-id="2150" instrument_node="">Mr. Exposition</span></a><span data-dcnode-id="2148" instrument_node="">: Old man named Yon at the Settlement 17's Church only exists to fill you in on the basic tenets of One Concern's beliefs.</span></li><li data-dcnode-id="2136"><span data-dcnode-id="2146" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyBelovedSmother" title="/pmwiki/pmwiki.php/Main/MyBelovedSmother"><span data-dcnode-id="2145" instrument_node="">My Beloved Smother</span></a><span data-dcnode-id="2143" instrument_node="">: Mina's mother constantly guilt-trips her daughter with the usual "You never visit! You're leaving me again! You don't love me!", as well as suggesting Mina get together with that </span><a class="twikilink" data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJewishBoy" title="/pmwiki/pmwiki.php/Main/NiceJewishBoy"><span data-dcnode-id="2142" instrument_node="">Nice Isi Boy</span></a><span data-dcnode-id="2140" instrument_node=""> who keeps asking about her. Since she is in a wheelchair, this could also cross over into </span><a class="twikilink" data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DisabilityAsAnExcuseForJerkassery" title="/pmwiki/pmwiki.php/Main/DisabilityAsAnExcuseForJerkassery"><span data-dcnode-id="2139" instrument_node="">Disability as an Excuse for Jerkassery</span></a><span data-dcnode-id="2137" instrument_node="">.</span></li><li data-dcnode-id="2116"><span data-dcnode-id="2135" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyGodWhatHaveIDone" title="/pmwiki/pmwiki.php/Main/MyGodWhatHaveIDone"><span data-dcnode-id="2134" instrument_node="">My God, What Have I Done?</span></a><span data-dcnode-id="2132" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2118" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2131" instrument_node="">Even though Royal had crossed the </span><a class="twikilink" data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DespairEventHorizon" title="/pmwiki/pmwiki.php/Main/DespairEventHorizon"><span data-dcnode-id="2130" instrument_node="">Despair Event Horizon</span></a><span data-dcnode-id="2128" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathSeeker" title="/pmwiki/pmwiki.php/Main/DeathSeeker"><span data-dcnode-id="2127" instrument_node="">asked to be left behind to die</span></a><span data-dcnode-id="2125" instrument_node=""> on the decompressing Midway moonbase, Robin obviously still feels enormously guilty for doing so. As soon as she lands back in Blockrock, the first thing she does is sit in the </span><a class="twikilink" data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TroubledFetalPosition" title="/pmwiki/pmwiki.php/Main/TroubledFetalPosition"><span data-dcnode-id="2124" instrument_node="">Troubled Fetal Position</span></a><span data-dcnode-id="2122" instrument_node=""> and cry, and during the </span><a class="twikilink" data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BattleInTheCenterOfTheMind" title="/pmwiki/pmwiki.php/Main/BattleInTheCenterOfTheMind"><span data-dcnode-id="2121" instrument_node="">Battle in the Center of the Mind</span></a><span data-dcnode-id="2119" instrument_node=""> portion of the Starworm boss, one of the shadows represents Robin's guilt for leaving behind Royal</span></span><span data-dcnode-id="2117" instrument_node="">.</span></li><li data-dcnode-id="2108"><span data-dcnode-id="2115" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="2114" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="2112" instrument_node="">: The Isi lady who's always seen sitting on couches in Isilugar is based on the design for Mina that was used in </span><em data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Mina of the Pirates</span></em><span data-dcnode-id="2109" instrument_node="">, one of Konjak's earliest big projects and the origin of Mina's name and base design.</span></li><li data-dcnode-id="2101"><span data-dcnode-id="2107" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeckSnap" title="/pmwiki/pmwiki.php/Main/NeckSnap"><span data-dcnode-id="2106" instrument_node="">Neck Snap</span></a><span data-dcnode-id="2104" instrument_node="">: The way Agent Black kills </span><span class="spoiler" data-dcnode-id="2102" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2103" instrument_node="">Royal at the Detritus pit at the One Concern West, before Robin drags him to safety where he could revive.</span></span></li><li data-dcnode-id="2062"><span data-dcnode-id="2100" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheNeedsOfTheMany" title="/pmwiki/pmwiki.php/Main/TheNeedsOfTheMany"><span data-dcnode-id="2099" instrument_node="">The Needs of the Many</span></a><span data-dcnode-id="2097" instrument_node="">: One of the </span><a class="twikilink" data-dcnode-id="2095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CentralTheme" title="/pmwiki/pmwiki.php/Main/CentralTheme"><span data-dcnode-id="2096" instrument_node="">Central Themes</span></a><span data-dcnode-id="2094" instrument_node=""> of the game. Both the heroes and the villains undergo a philosophy of doing the wrong thing for the right reason, or </span><a class="twikilink" data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShootTheDog" title="/pmwiki/pmwiki.php/Main/ShootTheDog"><span data-dcnode-id="2093" instrument_node="">doing something wicked for what they feel is right</span></a><span data-dcnode-id="2091" instrument_node="">. But while the heroes are willing to self-sacrifice in pursuit of the needs of the many, the villains aren't; the bad guys are either massive </span><a class="twikilink" data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hypocrite" title="/pmwiki/pmwiki.php/Main/Hypocrite"><span data-dcnode-id="2090" instrument_node="">hypocrites</span></a><span data-dcnode-id="2088" instrument_node=""> who say they're acting for the good of humanity but really care only about saving their own skin, or intentionally manipulating this attitude for personal gain.</span><ul data-dcnode-id="2063"><li data-dcnode-id="2071"><span data-dcnode-id="2087" instrument_node=""> Robin, Mina, Royal, and Elro all practice some form of self-sacrifice in the name of the greater good. Robin has </span><a class="twikilink" data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChronicHeroSyndrome" title="/pmwiki/pmwiki.php/Main/ChronicHeroSyndrome"><span data-dcnode-id="2086" instrument_node="">Chronic Hero Syndrome</span></a><span data-dcnode-id="2084" instrument_node="">, Mina pursues the One Concern in the name of saving the Isi (</span><a class="twikilink" data-dcnode-id="2082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSelfDeprecation" title="/pmwiki/pmwiki.php/Main/HeroicSelfDeprecation"><span data-dcnode-id="2083" instrument_node="">even if she hates herself for it for constantly abandoning her mother and her girlfriend</span></a><span data-dcnode-id="2081" instrument_node="">), Elro is willing to </span><span class="spoiler" data-dcnode-id="2076" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2080" instrument_node="">attempt a </span><a class="twikilink" data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="2079" instrument_node="">Heroic Sacrifice</span></a><span data-dcnode-id="2077" instrument_node=""> in the name of saving Robin's life by confronting Agent Black alone</span></span><span data-dcnode-id="2075" instrument_node="">, and Royal eventually comes to lose his </span><a class="twikilink" data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HolierThanThou" title="/pmwiki/pmwiki.php/Main/HolierThanThou"><span data-dcnode-id="2074" instrument_node="">Holier Than Thou</span></a><span data-dcnode-id="2072" instrument_node=""> attitude in the name of helping the good guys and saving the world.</span></li><li data-dcnode-id="2064"><span data-dcnode-id="2070" instrument_node=""> Agent Black, Agent Chrome, and Mother are all primarily interested in themselves. </span><span class="spoiler" data-dcnode-id="2065" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2069" instrument_node="">Agent Black is a </span><a class="twikilink" data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hypocrite" title="/pmwiki/pmwiki.php/Main/Hypocrite"><span data-dcnode-id="2068" instrument_node="">hypocrite</span></a><span data-dcnode-id="2066" instrument_node=""> who slowly goes insane with grief and thinks that the world isn't worth saving, Agent Chrome preaches obeying Mother but secretly wants to take over the One Concern for himself, and Mother preaches loving all of her children while secretly wanting to use each and every single one of them for herself; if they can't help her anymore, they're worthless.</span></span></li></ul></li><li data-dcnode-id="2057"><span data-dcnode-id="2061" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="2060" instrument_node="">New Game+</span></a><span data-dcnode-id="2058" instrument_node="">: Beating the game allows you to save a completed file. Continuing the file will restart the game, but keep all of your Tweaks and materials that you've found.</span></li><li data-dcnode-id="2032"><span data-dcnode-id="2056" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero" title="/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero"><span data-dcnode-id="2055" instrument_node="">Nice Job Breaking It, Hero</span></a><span data-dcnode-id="2053" instrument_node="">:</span><ul data-dcnode-id="2033"><li data-dcnode-id="2049"><span data-dcnode-id="2052" instrument_node=""> Royal is particularly good at this. </span><span class="spoiler" data-dcnode-id="2050" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2051" instrument_node="">First, he accidentally activates and is forced to destroy the Omega Controller, which throws the planet's ecosystem out of balance and summons the Starworm. He heads to City One to confront Mother to have him heal Elro's arm, which basically allows Chrome to start his rebellion, which sparks a vicious civil war in City One. Royal also attacks the Starworm when it ignores him, only causing it to be angered and attack the planet. Though that last one may have been for the best, as the attack left a vulnerable spot on the Starworm, and it's likely a fight would have occurred regardless of Royal's assault.</span></span></li><li data-dcnode-id="2034"><span data-dcnode-id="2048" instrument_node=""> Elro is a </span><a class="twikilink" data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnightTemplarBigBrother" title="/pmwiki/pmwiki.php/Main/KnightTemplarBigBrother"><span data-dcnode-id="2047" instrument_node="">Knight Templar Big Brother</span></a><span data-dcnode-id="2045" instrument_node=""> of the first order, and his actions </span><a class="twikilink" data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMillstone" title="/pmwiki/pmwiki.php/Main/TheMillstone"><span data-dcnode-id="2044" instrument_node="">cause more problems than they solve</span></a><span data-dcnode-id="2042" instrument_node="">. </span><span class="spoiler" data-dcnode-id="2035" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2041" instrument_node="">In particular, he started the whole affair by killing Agent Grey in a </span><a class="twikilink" data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MomentOfWeakness" title="/pmwiki/pmwiki.php/Main/MomentOfWeakness"><span data-dcnode-id="2040" instrument_node="">Moment of Weakness</span></a><span data-dcnode-id="2038" instrument_node="">, which fueled Agent Black's hatred for him and his family, including Robin. Later in the game, Elro attempts to confront Black one-on-one, and </span><a class="twikilink" data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnArmAndALeg" title="/pmwiki/pmwiki.php/Main/AnArmAndALeg"><span data-dcnode-id="2037" instrument_node="">gets his arm ripped off for his troubles. Then, when he has to press a button to launch a rocket into space with Robin on it, Elro outright refuses to do it, even though Robin needs to go to the moonbase to save the world. Mina even shoots Elro in the leg to prevent him from leaving. Later on, it's heavily implied that Teegan had to push the button to launch the rocket instead of Elro because of how stubborn he was.</span></a></span></li></ul></li><li data-dcnode-id="2025"><span data-dcnode-id="2031" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJobFixingItVillain" title="/pmwiki/pmwiki.php/Main/NiceJobFixingItVillain"><span data-dcnode-id="2030" instrument_node="">Nice Job Fixing It, Villain</span></a><span data-dcnode-id="2028" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2026" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2027" instrument_node="">Had the Silver Watchman not tackled Robin and ended up pushing her out of the tower in an attempt to kill her, it's very likely Agent Black would have successfully shot and killed Robin then and there.</span></span></li><li data-dcnode-id="2020"><span data-dcnode-id="2024" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NinjaPirateZombieRobot" title="/pmwiki/pmwiki.php/Main/NinjaPirateZombieRobot"><span data-dcnode-id="2023" instrument_node="">Ninja Pirate Zombie Robot</span></a><span data-dcnode-id="2021" instrument_node="">: Chrome is a cyborg cowboy general with superpowers who's also a cult leader of sorts.</span></li><li data-dcnode-id="2013"><span data-dcnode-id="2019" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoNameGiven" title="/pmwiki/pmwiki.php/Main/NoNameGiven"><span data-dcnode-id="2018" instrument_node="">No Name Given</span></a><span data-dcnode-id="2016" instrument_node="">: The ending credits list the name of every character, enemy, and boss in the game. </span><span class="spoiler" data-dcnode-id="2014" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2015" instrument_node="">Except the Birdman, whose name is left blank.</span></span></li><li data-dcnode-id="2003"><span data-dcnode-id="2012" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoNonsenseNemesis" title="/pmwiki/pmwiki.php/Main/NoNonsenseNemesis"><span data-dcnode-id="2011" instrument_node="">No-Nonsense Nemesis</span></a><span data-dcnode-id="2009" instrument_node="">: Agent Black is very much a student of the </span><a class="twikilink" data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhyDontYouJustShootHim" title="/pmwiki/pmwiki.php/Main/WhyDontYouJustShootHim"><span data-dcnode-id="2008" instrument_node="">Why Don't You Just Shoot Him?</span></a><span data-dcnode-id="2006" instrument_node=""> school of thought. </span><span class="spoiler" data-dcnode-id="2004" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2005" instrument_node="">Indeed, she almost shoots Robin point blank in The Tower, and is only stopped by the Silver Watchman tackling Robin through the wall and out of the room they were in due to wanting to kill her himself.</span></span></li><li data-dcnode-id="1995"><span data-dcnode-id="2002" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonIndicativeName" title="/pmwiki/pmwiki.php/Main/NonIndicativeName"><span data-dcnode-id="2001" instrument_node="">Non-Indicative Name</span></a><span data-dcnode-id="1999" instrument_node="">: Agent Black is a very pale girl. Agent White is a </span><a class="twikilink" data-dcnode-id="1997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScaryBlackMan" title="/pmwiki/pmwiki.php/Main/ScaryBlackMan"><span data-dcnode-id="1998" instrument_node="">Scary Black Man</span></a><span data-dcnode-id="1996" instrument_node="">.</span></li><li data-dcnode-id="1984"><span data-dcnode-id="1994" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoOSHACompliance" title="/pmwiki/pmwiki.php/Main/NoOSHACompliance"><span data-dcnode-id="1993" instrument_node="">No OSHA Compliance</span></a><span data-dcnode-id="1991" instrument_node="">: Everything concerning the chemical sorting minigame you have to do to get the grenade launcher attachment. First off, despite being contained in what look like secure boxes, those will </span><a class="twikilink" data-dcnode-id="1989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MadeOfExplodium" title="/pmwiki/pmwiki.php/Main/MadeOfExplodium"><span data-dcnode-id="1990" instrument_node="">combust spontaneously</span></a><span data-dcnode-id="1988" instrument_node=""> if chemicals are mixed. Furthermore, mixing any amount of triangle-labelled chemicals with circle-labelled chemicals causes a massive chain reaction explosion, so naturally, you'd have to be pretty careful with handling them, right? No, the One Concern soldier carrying the chemicals has no regard to what is being put where, and another one gets bored and instructs him to </span><a class="twikilink" data-dcnode-id="1986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DifficultyByAcceleration" title="/pmwiki/pmwiki.php/Main/DifficultyByAcceleration"><span data-dcnode-id="1987" instrument_node="">move faster</span></a><span data-dcnode-id="1985" instrument_node="">, giving you less reaction time to put the carrier on the correct level. Finally, once you beat the helicopter boss while on the train, Royal jumps in and blasts the cargo with his powers... except, you can see the triangle and circle labels pasted to the car you're standing on top of, and the subsequent explosion from the mixed chemicals causes the entire train to topple and crash.</span></li><li data-dcnode-id="1977"><span data-dcnode-id="1983" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotSoInvincibleAfterAll" title="/pmwiki/pmwiki.php/Main/NotSoInvincibleAfterAll"><span data-dcnode-id="1982" instrument_node="">Not So Invincible After All</span></a><span data-dcnode-id="1980" instrument_node="">: The agents are unkillable agents of the One Concern. Then </span><span class="spoiler" data-dcnode-id="1978" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1979" instrument_node=""> not one, but two are killed in quick succession.</span></span></li><li data-dcnode-id="1967"><span data-dcnode-id="1976" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotSoStoic" title="/pmwiki/pmwiki.php/Main/NotSoStoic"><span data-dcnode-id="1975" instrument_node="">Not So Stoic</span></a><span data-dcnode-id="1973" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1968" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1972" instrument_node="">Agent White's death by Ivory-accelerated Isi Seed growth clearly terrifies Agent Black, while Grey's death at the hands of Elro actually made her break down. And that's not getting into her </span><a class="twikilink" data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SanitySlippage" title="/pmwiki/pmwiki.php/Main/SanitySlippage"><span data-dcnode-id="1971" instrument_node="">Sanity Slippage</span></a><span data-dcnode-id="1969" instrument_node=""> in the game's climax after she's lost everything.</span></span></li><li data-dcnode-id="1962"><span data-dcnode-id="1966" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotThatKindOfDoctor" title="/pmwiki/pmwiki.php/Main/NotThatKindOfDoctor"><span data-dcnode-id="1965" instrument_node="">Not That Kind of Doctor</span></a><span data-dcnode-id="1963" instrument_node="">: Inverted. Dr. Gustavo is a medical doctor who says he's not the right kind of doctor to deal with the craziness of the Tower's pupils.</span></li><li data-dcnode-id="1951"><span data-dcnode-id="1961" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneTimeDungeon" title="/pmwiki/pmwiki.php/Main/OneTimeDungeon"><span data-dcnode-id="1960" instrument_node="">One-Time Dungeon</span></a><span data-dcnode-id="1958" instrument_node="">: Unusually for a metroidvania, there are several sections in the areas that get locked off through plot progression, such as the </span><span class="spoiler" data-dcnode-id="1956" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1957" instrument_node="">Omega Controller tunnels</span></span><span data-dcnode-id="1955" instrument_node=""> in Darland Ascent and nearly all of </span><span class="spoiler" data-dcnode-id="1953" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1954" instrument_node="">One Concern East</span></span><span data-dcnode-id="1952" instrument_node="">. Collectibles are never placed in these areas, so no items can be missed in them.</span></li><li data-dcnode-id="1938"><span data-dcnode-id="1950" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnlyAFleshWound" title="/pmwiki/pmwiki.php/Main/OnlyAFleshWound"><span data-dcnode-id="1949" instrument_node="">Only a Flesh Wound</span></a><span data-dcnode-id="1947" instrument_node="">: Elro is a notable example of this. First, he loses an eye, but gets off with an </span><a class="twikilink" data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EyepatchOfPower" title="/pmwiki/pmwiki.php/Main/EyepatchOfPower"><span data-dcnode-id="1946" instrument_node="">Eyepatch of Power</span></a><span data-dcnode-id="1944" instrument_node="">. Then, </span><span class="spoiler" data-dcnode-id="1942" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1943" instrument_node="">Agent Black rips off his arm, yet he doesn't bleed out (though he does receive medical help from Chrome's army a short while later. He also goes back to wielding his sword in the other hand soon afterwards.</span></span><span data-dcnode-id="1941" instrument_node=""> Lastly, </span><span class="spoiler" data-dcnode-id="1939" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1940" instrument_node="">he is shot in the leg by Mina, severely enough to lose consciousness for a while, and yet eventually regains consciousness by the time Robin gets back from the moon. Again he receives medical help afterwards, but it's unclear how much time passed since then. At the end of the game, Elro is left crippled but very much alive.</span></span></li><li data-dcnode-id="1925"><span data-dcnode-id="1937" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PhlebotinumOverload" title="/pmwiki/pmwiki.php/Main/PhlebotinumOverload"><span data-dcnode-id="1936" instrument_node="">Phlebotinum Overload</span></a><span data-dcnode-id="1934" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1926" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1933" instrument_node="">A combination of ivory blood, the Isi seeds, and the blue eyes causes Agent Black to mutate into a </span><a class="twikilink" data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BodyHorror" title="/pmwiki/pmwiki.php/Main/BodyHorror"><span data-dcnode-id="1932" instrument_node="">horrific</span></a><span data-dcnode-id="1930" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HellIsThatNoise" title="/pmwiki/pmwiki.php/Main/HellIsThatNoise"><span data-dcnode-id="1929" instrument_node="">screaming</span></a><span data-dcnode-id="1927" instrument_node=""> monster.</span></span></li><li data-dcnode-id="1912"><span data-dcnode-id="1924" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThePigPen" title="/pmwiki/pmwiki.php/Main/ThePigPen"><span data-dcnode-id="1923" instrument_node="">The Pig-Pen</span></a><span data-dcnode-id="1921" instrument_node="">: Mina apparently isn't too keen on bathing frequently, since a </span><a class="twikilink" data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RunningGag" title="/pmwiki/pmwiki.php/Main/RunningGag"><span data-dcnode-id="1920" instrument_node="">Running Gag</span></a><span data-dcnode-id="1918" instrument_node=""> throughout the game is that she smells absolutely awful. </span><span class="spoiler" data-dcnode-id="1913" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1917" instrument_node="">During the fight against Ash, she </span><em data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">has</span></em><span data-dcnode-id="1914" instrument_node=""> to hide in the pools of water, since he can smell her when she hides in the bushes.</span></span></li><li data-dcnode-id="1907"><span data-dcnode-id="1911" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PistolWhipping" title="/pmwiki/pmwiki.php/Main/PistolWhipping"><span data-dcnode-id="1910" instrument_node="">Pistol-Whipping</span></a><span data-dcnode-id="1908" instrument_node="">: Mina's melee attack involves using her shotgun like a club.</span></li><li data-dcnode-id="1898"><span data-dcnode-id="1906" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerNudge" title="/pmwiki/pmwiki.php/Main/PlayerNudge"><span data-dcnode-id="1905" instrument_node="">Player Nudge</span></a><span data-dcnode-id="1903" instrument_node="">: The boss battle against </span><span class="spoiler" data-dcnode-id="1900" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdvancingBossOfDoom" title="/pmwiki/pmwiki.php/Main/AdvancingBossOfDoom"><span data-dcnode-id="1902" instrument_node="">the Omega Controller</span></a></span><span data-dcnode-id="1899" instrument_node=""> starts with a nearby One Concern soldier throwing grenades at it to knock it back, hinting that the player should use their concussion bombs to do the same.</span></li><li data-dcnode-id="1893"><span data-dcnode-id="1897" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayingWithFire" title="/pmwiki/pmwiki.php/Main/PlayingWithFire"><span data-dcnode-id="1896" instrument_node="">Playing with Fire</span></a><span data-dcnode-id="1894" instrument_node="">: Mendeleev's powerset involves throwing around jets of fire, lighting herself on fire, and throwing fireballs.</span></li><li data-dcnode-id="1875"><span data-dcnode-id="1892" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlotTunnel" title="/pmwiki/pmwiki.php/Main/PlotTunnel"><span data-dcnode-id="1891" instrument_node="">Plot Tunnel</span></a><span data-dcnode-id="1889" instrument_node="">: There are large chunks of the game where the plot restricts Robin from backtracking to other areas until she makes enough progress.</span><ul data-dcnode-id="1876"><li data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node=""> After Robin washes up at Shard Wasteland, she's locked out of Blockrock until the first act of the game wraps up following Isilugar Labs, since she can't get out of Shard Wasteland without the electified wrench. This plot tunnel has several smaller plot tunnels within: Robin can't return to Shard Wasteland once she gets to Isilugar, and she can't leave Isilugar Labs until she beats Agent White.</span></li><li data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node=""> Once Robin gets captured at the end of Ferrier Shockwood, she has to go through two areas (The Tower and Darland Ascent) with no way of leaving either until Mina unlocks a fast travel station for her.</span></li><li data-dcnode-id="1877"><span data-dcnode-id="1884" instrument_node=""> You can't leave </span><span class="spoiler" data-dcnode-id="1882" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1883" instrument_node="">One Concern West</span></span><span data-dcnode-id="1881" instrument_node=""> once you enter it, and after finishing the plot there you have a brief opportunity to fast-travel out of it to resume exploring; go any further, and you enter the first section of the endgame and can't return to exploring until right before </span><a class="twikilink" data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheVeryDefinitelyFinalDungeon" title="/pmwiki/pmwiki.php/Main/TheVeryDefinitelyFinalDungeon"><span data-dcnode-id="1880" instrument_node="">The Very Definitely Final Dungeon</span></a><span data-dcnode-id="1878" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1846"><span data-dcnode-id="1874" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PoorCommunicationKills" title="/pmwiki/pmwiki.php/Main/PoorCommunicationKills"><span data-dcnode-id="1873" instrument_node="">Poor Communication Kills</span></a><span data-dcnode-id="1871" instrument_node="">:</span><ul data-dcnode-id="1847"><li data-dcnode-id="1863"><span data-dcnode-id="1870" instrument_node=""> Mother blames Royal for </span><span class="spoiler" data-dcnode-id="1868" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1869" instrument_node="">hastening the end of the world by destroying an Omega Controller, whose demise sent out a signal to the Starworm to come down, and made the earthquakes afflicting the planet from Ivory loss completely uncontrollable</span></span><span data-dcnode-id="1867" instrument_node="">. However, Mother (and the other One Concern officials) are also partially at fault because none of them bothered telling Royal anything that was going on, namely </span><span class="spoiler" data-dcnode-id="1865" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1866" instrument_node="">that Ivory mining has left the planet on the brink of destruction, destroying the Omega Controller would just make things worse, and the One Concern has been working on a rocket to help at least part of humanity escape before it's too late</span></span><span data-dcnode-id="1864" instrument_node="">.</span></li><li data-dcnode-id="1855"><span data-dcnode-id="1862" instrument_node=""> Equally, when Royal first suggests his plan to </span><span class="spoiler" data-dcnode-id="1860" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1861" instrument_node="">see Mother to heal Elro,</span></span><span data-dcnode-id="1859" instrument_node=""> neither Robin nor Elro himself bother to tell him that </span><span class="spoiler" data-dcnode-id="1857" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1858" instrument_node="">Elro murdered an agent unprovoked, and so is highly unlikely to receive help at the best of times. Of course, Royal also neglects to mention that he's merely talking about spiritual healing rather than physical healing; had the rest of the party known from the start, they likely wouldn't have bothered trying to confront Mother in the first place</span></span><span data-dcnode-id="1856" instrument_node="">.</span></li><li data-dcnode-id="1848"><span data-dcnode-id="1854" instrument_node=""> Nobody bothered to fill General Chrome in on the details of the One Concern's ultimate goal. His anger at learning about the plan and </span><span class="spoiler" data-dcnode-id="1850" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1853" instrument_node="">finding out that he and his men were going to be left behind is part of what inspires him to kick off the </span><a class="twikilink" data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnemyCivilWar" title="/pmwiki/pmwiki.php/Main/EnemyCivilWar"><span data-dcnode-id="1852" instrument_node="">Enemy Civil War</span></a></span><span data-dcnode-id="1849" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1831"><span data-dcnode-id="1845" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PublicDomainSoundtrack" title="/pmwiki/pmwiki.php/Main/PublicDomainSoundtrack"><span data-dcnode-id="1844" instrument_node="">Public Domain Soundtrack</span></a><span data-dcnode-id="1842" instrument_node="">: </span><a class="urllink" data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DnHJpOBFzIYo"><span data-dcnode-id="1841" instrument_node="">Moonlight</span><img data-dcnode-id="1840" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1838" instrument_node="">, the theme that plays during </span><span class="spoiler" data-dcnode-id="1836" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1837" instrument_node="">the last Agent Black fight, and also the scene leading to Royal's demise</span></span><span data-dcnode-id="1835" instrument_node="">, is essentially a remix of the beginning of </span><a class="twikilink" data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/LudwigVanBeethoven" title="/pmwiki/pmwiki.php/Music/LudwigVanBeethoven"><span data-dcnode-id="1834" instrument_node="">Ludwig van Beethoven</span></a><span data-dcnode-id="1832" instrument_node="">'s "Moonlight Sonata".</span></li><li data-dcnode-id="1817"><span data-dcnode-id="1830" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PuppeteerParasite" title="/pmwiki/pmwiki.php/Main/PuppeteerParasite"><span data-dcnode-id="1829" instrument_node="">Puppeteer Parasite</span></a><span data-dcnode-id="1827" instrument_node="">: The blue eyes you encounter in the Dark Cave (and seemingly everywhere else since) have this power. You'll occasionally find them stuck to the local wildlife and even to robots, although it doesn't seem to change their behavior much (most are hostile to you either way). When </span><span class="spoiler" data-dcnode-id="1825" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1826" instrument_node="">the Silver Watchman</span></span><span data-dcnode-id="1824" instrument_node=""> gets possessed, their influence becomes much more evident. </span><span class="spoiler" data-dcnode-id="1819" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1823" instrument_node="">You find him catatonic staring blankly into space, and later he fights by wildly swinging his sword around, completely abandoning his former precise, teleport-powered fighting style. The... </span><em data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">thing</span></em><span data-dcnode-id="1820" instrument_node=""> that is possessing him even does so by attaching a tentacle to his head and dragging him around like a puppet on a string</span></span><span data-dcnode-id="1818" instrument_node="">.</span></li><li data-dcnode-id="1806"><span data-dcnode-id="1816" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PurpleIsPowerful" title="/pmwiki/pmwiki.php/Main/PurpleIsPowerful"><span data-dcnode-id="1815" instrument_node="">Purple Is Powerful</span></a><span data-dcnode-id="1813" instrument_node="">: Purple seems to be the signature colour of the One Concern, </span><a class="twikilink" data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheTheocracy" title="/pmwiki/pmwiki.php/Main/TheTheocracy"><span data-dcnode-id="1812" instrument_node="">The Theocracy</span></a><span data-dcnode-id="1810" instrument_node=""> that rules the planet. All of the </span><a class="twikilink" data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/QuirkyMinibossSquad" title="/pmwiki/pmwiki.php/Main/QuirkyMinibossSquad"><span data-dcnode-id="1809" instrument_node="">Quirky Miniboss Squad</span></a><span data-dcnode-id="1807" instrument_node=""> uses purple, and the Transcended all have purple artificial limbs.</span></li><li data-dcnode-id="1801"><span data-dcnode-id="1805" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/QuirkyMinibossSquad" title="/pmwiki/pmwiki.php/Main/QuirkyMinibossSquad"><span data-dcnode-id="1804" instrument_node="">Quirky Miniboss Squad</span></a><span data-dcnode-id="1802" instrument_node="">: The Reborns — Lawrence, Nobel, and Mendeleev — who are fought at One Concern East.</span></li><li data-dcnode-id="1719"><span data-dcnode-id="1800" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RageBreakingPoint" title="/pmwiki/pmwiki.php/Main/RageBreakingPoint"><span data-dcnode-id="1799" instrument_node="">Rage Breaking Point</span></a><span data-dcnode-id="1797" instrument_node="">: While Black never did like Chrome, this reaches its nadir in One Concern West when </span><span class="spoiler" data-dcnode-id="1795" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1796" instrument_node="">Chrome reveals that City One is willing to ditch all of One Concern on a dying planet</span></span><span data-dcnode-id="1794" instrument_node="">.</span><div class="indent" data-dcnode-id="1726"><strong data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Chrome:</span></strong><span data-dcnode-id="1791" instrument_node=""> Children... This is a tumultuous moment. We lack our prior comforts. What little we had. Frustrations rise... Questions become loud inquiries. But it is a time where we must first give sacrifice, so that together we can achieve greatness beyond what we had. What have you given up in the chase of a dream? Would you risk your own life? Perhaps... Perhaps you would, knowing your dream had been thwarted by someone else... ? </span><br data-dcnode-id="1790"><strong data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Black:</span></strong><span data-dcnode-id="1787" instrument_node=""> Chrome... ? </span><br data-dcnode-id="1786"><strong data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Chrome:</span></strong><span data-dcnode-id="1783" instrument_node=""> I have learned much. Your dreams are set. </span><span class="spoiler" data-dcnode-id="1781" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1782" instrument_node="">You exist solely to produce a rocket. It's a vessel meant only for mindless children, to leave you behind, and to die from a tragedy Royal has brought upon you.</span></span><span data-dcnode-id="1780" instrument_node=""> </span><br data-dcnode-id="1779"><strong data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Black:</span></strong><span data-dcnode-id="1776" instrument_node=""> *leaps off of the couch, doing a double </span><a class="twikilink" data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AngryFistShake" title="/pmwiki/pmwiki.php/Main/AngryFistShake"><span data-dcnode-id="1775" instrument_node="">Angry Fist-Shake</span></a><span data-dcnode-id="1773" instrument_node="">* </span><em data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">CHROME!!</span></em><span data-dcnode-id="1770" instrument_node=""> </span><br data-dcnode-id="1769"><strong data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Chrome:</span></strong><span data-dcnode-id="1766" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1764" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1765" instrument_node="">Royal angered the almighty HIM and He is coming to answer Royal's sins. Your "royalty" has only brought you doom, but I bring you a solution. You have withstood much frustration, all from your set place in society. I spend every day seeing you suffer. Follow me, and I will have dialogue with Mother, and save the good, honest people here and elsewhere.</span></span><span data-dcnode-id="1763" instrument_node=""> </span><br data-dcnode-id="1762"><strong data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Black:</span></strong><span data-dcnode-id="1759" instrument_node=""> *</span><a class="twikilink" data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HighPressureEmotion" title="/pmwiki/pmwiki.php/Main/HighPressureEmotion"><span data-dcnode-id="1758" instrument_node="">entire head turns a deep shade of red</span></a><span data-dcnode-id="1756" instrument_node="">* </span><em data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">WHAT ARE YOU DOING?</span></em><span data-dcnode-id="1753" instrument_node=""> </span><br data-dcnode-id="1752"><strong data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Chrome:</span></strong><span data-dcnode-id="1749" instrument_node=""> Fated sister, you told me to not selfishly give thought only to individuals. I am here now, thinking of us all. </span><br data-dcnode-id="1748"><em data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">*Black leaps to the podium and punches Chrome off of it*</span></em><span data-dcnode-id="1745" instrument_node=""> </span><br data-dcnode-id="1744"><strong data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Black:</span></strong><span data-dcnode-id="1741" instrument_node=""> </span><em data-dcnode-id="1738"><a class="twikilink" data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigShutUp" title="/pmwiki/pmwiki.php/Main/BigShutUp"><span data-dcnode-id="1740" instrument_node="">SHUT... UP!!</span></a></em><span data-dcnode-id="1737" instrument_node=""> </span><br data-dcnode-id="1736"><strong data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Chrome:</span></strong><span data-dcnode-id="1733" instrument_node=""> Fated sister, you are still emotional and blinded from your grief. You must take your time to come to your- </span><br data-dcnode-id="1732"><em data-dcnode-id="1727"><span data-dcnode-id="1731" instrument_node="">*Black tackles Chrome and </span><a class="twikilink" data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoHoldsBarredBeatdown" title="/pmwiki/pmwiki.php/Main/NoHoldsBarredBeatdown"><span dat
