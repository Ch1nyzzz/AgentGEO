he can stomp through to easily crawl out of her cell. Admittedly, not many people can </span><a class="twikilink" data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GroundPound" title="/pmwiki/pmwiki.php/Main/GroundPound"><span data-dcnode-id="3126" instrument_node="">Ground Pound</span></a><span data-dcnode-id="3124" instrument_node=""> as well as Robin.</span></li><li data-dcnode-id="3106"><span data-dcnode-id="3122" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CerebusSyndrome" title="/pmwiki/pmwiki.php/Main/CerebusSyndrome"><span data-dcnode-id="3121" instrument_node="">Cerebus Syndrome</span></a><span data-dcnode-id="3119" instrument_node="">: The game starts out as a wacky adventure as Robin struggles against cartoonish, </span><a class="twikilink" data-dcnode-id="3117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LargeHam" title="/pmwiki/pmwiki.php/Main/LargeHam"><span data-dcnode-id="3118" instrument_node="">Large Ham</span></a><span data-dcnode-id="3116" instrument_node=""> villains, but as the game goes on, the villains get </span><em data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">far</span></em><span data-dcnode-id="3113" instrument_node=""> less cartoonish as we see just how depraved and despotic the One Concern is. By the end, </span><span class="spoiler" data-dcnode-id="3108" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3112" instrument_node="">a large number of people have died in a bloody civil war, and the final battle is against an outright </span><a class="twikilink" data-dcnode-id="3110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="3111" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="3109" instrument_node=""> that threatens to consume the entire world</span></span><span data-dcnode-id="3107" instrument_node="">.</span></li><li data-dcnode-id="3098"><span data-dcnode-id="3105" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChekhovsHobby" title="/pmwiki/pmwiki.php/Main/ChekhovsHobby"><span data-dcnode-id="3104" instrument_node="">Chekhov's Hobby</span></a><span data-dcnode-id="3102" instrument_node="">: Elro's job is a chemist. He's apparently good enough to </span><span class="spoiler" data-dcnode-id="3100" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3101" instrument_node="">create a serum that will forcibly remove all Ivory from any object, which makes it very effective at killing Ivory-infused people such as agents</span></span><span data-dcnode-id="3099" instrument_node="">.</span></li><li data-dcnode-id="3090"><span data-dcnode-id="3097" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCobblersChildrenHaveNoShoes" title="/pmwiki/pmwiki.php/Main/TheCobblersChildrenHaveNoShoes"><span data-dcnode-id="3096" instrument_node="">The Cobbler's Children Have No Shoes</span></a><span data-dcnode-id="3094" instrument_node="">: The only doctor in the game </span><span class="spoiler" data-dcnode-id="3092" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3093" instrument_node="">has an incurable disease</span></span><span data-dcnode-id="3091" instrument_node="">.</span></li><li data-dcnode-id="3085"><span data-dcnode-id="3089" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColorfulThemeNaming" title="/pmwiki/pmwiki.php/Main/ColorfulThemeNaming"><span data-dcnode-id="3088" instrument_node="">Colorful Theme Naming</span></a><span data-dcnode-id="3086" instrument_node="">: All the One Concern members have codenames based off of shades of grey. Agents White, Black, and Grey, and General Chrome, Ash, and The Silver Watchman.</span></li><li data-dcnode-id="3080"><span data-dcnode-id="3084" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ConcussionFrags" title="/pmwiki/pmwiki.php/Main/ConcussionFrags"><span data-dcnode-id="3083" instrument_node="">Concussion Frags</span></a><span data-dcnode-id="3081" instrument_node="">: The grenades thrown by One Concern Attackers have practically no range at all. On the bright side, they can at least bounce between floor and ceiling a few times, making them difficult to avoid.</span></li><li data-dcnode-id="3055"><span data-dcnode-id="3079" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrapsaccharineWorld" title="/pmwiki/pmwiki.php/Main/CrapsaccharineWorld"><span data-dcnode-id="3078" instrument_node="">Crapsaccharine World</span></a><span data-dcnode-id="3076" instrument_node="">:</span><ul data-dcnode-id="3056"><li data-dcnode-id="3071"><span data-dcnode-id="3075" instrument_node=""> The world under One Concern seems to be prosperous and happy, with green pastures and the like, especially the paradise of City One, which is white, beautiful, and peaceful. However, this is only if you are in the Concern's favor- those who are branded heretics are hunted down and killed via Penance, in which you are trapped in your home and it is brought down upon you. Agents of the Concern have it little better, as they are forced into the horrific Transendence experiments where their blood is replaced with Ivory; many do not even survive, and those who do are tormented by their bodies. And lastly, </span><span class="spoiler" data-dcnode-id="3073" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3074" instrument_node="">the world is falling apart mainly because of One Concern's Ivory mining, and rather than stop, the elites opt to build a rocket, escape, and leave everyone else to die</span></span><span data-dcnode-id="3072" instrument_node="">.</span></li><li data-dcnode-id="3057"><span data-dcnode-id="3070" instrument_node=""> Downplayed with Isilugar. At first glance, it seems like a perfectly pleasant place to live in. In a lot of ways, </span><a class="twikilink" data-dcnode-id="3068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SugarBowl" title="/pmwiki/pmwiki.php/Main/SugarBowl"><span data-dcnode-id="3069" instrument_node="">it is</span></a><span data-dcnode-id="3067" instrument_node="">, specially if you compare it with life in the Settlements where even minor, unintended crimes can result in Penance. Life in Isilugar is more relaxed and free, with the Isi religion being all about love and reproduction. That last part has a catch, however. Turns out the Isi religion is not perfect, either. Arranged marriages are common, and procreation is seen as a vital responsibility of every adult, which means that people who are unable or unwilling to reproduce, </span><span class="spoiler" data-dcnode-id="3065" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3066" instrument_node="">like Doctor Gustavo, who doesn't want to pass on his genetic disease</span></span><span data-dcnode-id="3064" instrument_node="">, are seen as outcasts, through no fault of their own. That also means that </span><span class="spoiler" data-dcnode-id="3062" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3063" instrument_node="">Mina and Samba's relationship</span></span><span data-dcnode-id="3061" instrument_node=""> is probably </span><em data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">also</span></em><span data-dcnode-id="3058" instrument_node=""> frowned upon, which might explain why it's played with such ambiguity throughout the game.</span></li></ul></li><li data-dcnode-id="3021"><span data-dcnode-id="3054" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CruelAndUnusualDeath" title="/pmwiki/pmwiki.php/Main/CruelAndUnusualDeath"><span data-dcnode-id="3053" instrument_node="">Cruel and Unusual Death</span></a><span data-dcnode-id="3051" instrument_node="">: Quite a few of them.</span><ul data-dcnode-id="3022"><li data-dcnode-id="3046"><span data-dcnode-id="3050" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3048" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3049" instrument_node="">Agent White</span></span><span data-dcnode-id="3047" instrument_node="">: Killed by an Isi seed growing into an Ivory tree, ripping through their back.</span></li><li data-dcnode-id="3041"><span data-dcnode-id="3045" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3043" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3044" instrument_node="">Mother of the One Concern</span></span><span data-dcnode-id="3042" instrument_node="">: Same as above, except with their entire body exploding into an Ivory tree, with the rest of them turning into bubbling Ivory foam.</span></li><li data-dcnode-id="3036"><span data-dcnode-id="3040" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3038" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3039" instrument_node="">Agent Grey and General Chrome</span></span><span data-dcnode-id="3037" instrument_node="">: Gets boiled alive and explodes into Detritus dust thanks to Elro's anti-Ivory serum.</span></li><li data-dcnode-id="3028"><span data-dcnode-id="3035" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3033" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3034" instrument_node="">Agent Black</span></span><span data-dcnode-id="3032" instrument_node="">: Transforms into a monster made up of Ivory trees and the "blue eye" substance, suffers from an acute case of </span><a class="twikilink" data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YourHeadASplode" title="/pmwiki/pmwiki.php/Main/YourHeadASplode"><span data-dcnode-id="3031" instrument_node="">spontaneous cranial combustion</span></a><span data-dcnode-id="3029" instrument_node="">, then has their body burned up in the planet's atmosphere.</span></li><li data-dcnode-id="3023"><span data-dcnode-id="3027" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3025" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3026" instrument_node="">The pilot of the Starworm</span></span><span data-dcnode-id="3024" instrument_node="">: Gets their head crushed in by the Starworm.</span></li></ul></li><li data-dcnode-id="3013"><span data-dcnode-id="3020" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CycleOfRevenge" title="/pmwiki/pmwiki.php/Main/CycleOfRevenge"><span data-dcnode-id="3019" instrument_node="">Cycle of Revenge</span></a><span data-dcnode-id="3017" instrument_node="">: The whole thing starts when </span><span class="spoiler" data-dcnode-id="3015" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3016" instrument_node="">Robin and Elro's father's death is presumably caused by the Concern, causing Elro to kill Agent Grey in revenge, causing Agent Black to pursue Robin and Elro in response, starting Robin's quest to rescue Elro and take down the One Concern for good</span></span><span data-dcnode-id="3014" instrument_node="">.</span></li><li data-dcnode-id="3005"><span data-dcnode-id="3012" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CypherLanguage" title="/pmwiki/pmwiki.php/Main/CypherLanguage"><span data-dcnode-id="3011" instrument_node="">Cypher Language</span></a><span data-dcnode-id="3009" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3007" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3008" instrument_node="">The manual gives a translation for some of the glyphs that show up in the Impact Zone and other areas</span></span><span data-dcnode-id="3006" instrument_node="">.</span></li><li data-dcnode-id="3000"><span data-dcnode-id="3004" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkReprise" title="/pmwiki/pmwiki.php/Main/DarkReprise"><span data-dcnode-id="3003" instrument_node="">Dark Reprise</span></a><span data-dcnode-id="3001" instrument_node="">: The final boss theme, "Castle Doctrine", happens to be a remixed version of the second boss theme, "Machines".</span></li><li data-dcnode-id="2983"><span data-dcnode-id="2999" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathOfAChild" title="/pmwiki/pmwiki.php/Main/DeathOfAChild"><span data-dcnode-id="2998" instrument_node="">Death of a Child</span></a><span data-dcnode-id="2996" instrument_node="">: On several occasions.</span><ul data-dcnode-id="2984"><li data-dcnode-id="2992"><span data-dcnode-id="2995" instrument_node=""> First one is when </span><span class="spoiler" data-dcnode-id="2993" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2994" instrument_node="">Robin's niece, Ella, is killed along with her mother through "Penance" when Robin is caught fixing Ivory tech at Elro's house.</span></span></li><li data-dcnode-id="2985"><span data-dcnode-id="2991" instrument_node=""> Then, it happens when </span><span class="spoiler" data-dcnode-id="2989" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2990" instrument_node="">officials at The Tower respond to pupil Gerry briefly escaping and seeing the outside world by staging his suicide in a theatrical play to ensure compliance from the rest.</span></span><span data-dcnode-id="2988" instrument_node=""> Much later on, </span><span class="spoiler" data-dcnode-id="2986" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2987" instrument_node="">most of the same pupils get killed by Mother's Corners, deluded into thinking this will bring Mother back and reset the world.</span></span></li></ul></li><li data-dcnode-id="2971"><span data-dcnode-id="2982" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DefrostingIceQueen" title="/pmwiki/pmwiki.php/Main/DefrostingIceQueen"><span data-dcnode-id="2981" instrument_node="">Defrosting Ice Queen</span></a><span data-dcnode-id="2979" instrument_node="">: Michi becomes this if you </span><span class="spoiler" data-dcnode-id="2977" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2978" instrument_node="">give her a white ticket</span></span><span data-dcnode-id="2976" instrument_node="">. Originally content to tell Robin to stop bothering her, she'll head to Settlement 17 before the final boss battle, just to look for Robin.</span><div class="indent" data-dcnode-id="2972"><strong data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">Michi:</span></strong><span data-dcnode-id="2973" instrument_node=""> If the worst doesn't happen, let's see each other again. I want to discuss wrenches with you... Robin.</span></div></li><li data-dcnode-id="2953"><span data-dcnode-id="2970" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DevelopersForesight" title="/pmwiki/pmwiki.php/Main/DevelopersForesight"><span data-dcnode-id="2969" instrument_node="">Developers' Foresight</span></a><span data-dcnode-id="2967" instrument_node="">:</span><ul data-dcnode-id="2954"><li data-dcnode-id="2957"><span data-dcnode-id="2966" instrument_node=""> After being taken into </span><a class="twikilink" data-dcnode-id="2964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoGearLevel" title="/pmwiki/pmwiki.php/Main/NoGearLevel"><span data-dcnode-id="2965" instrument_node="">The Tower</span></a><span data-dcnode-id="2963" instrument_node="">, it's possible to use a </span><a class="twikilink" data-dcnode-id="2961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodBadBugs" title="/pmwiki/pmwiki.php/Main/GoodBadBugs"><span data-dcnode-id="2962" instrument_node="">long dive</span></a><span data-dcnode-id="2960" instrument_node=""> to enter the Strange Contraption entrance without your wrench. In order to keep players from getting stuck, this Strange Contraption entrance is one of the only ones that doesn't require you to use your wrench to leave.</span><span data-dcnode-id="2958" style="display:none"><span data-dcnode-id="2959" instrument_node="">invoked</span></span></li><li data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node=""> When you get to the moon base, the area still has lower gravity if you jump. While you're required to carry Royal for a bit, Robin's jump height is still higher than average, but still affected by Royal's weight.</span></li></ul></li><li data-dcnode-id="2940"><span data-dcnode-id="2952" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DidYouJustPunchOutCthulhu" title="/pmwiki/pmwiki.php/Main/DidYouJustPunchOutCthulhu"><span data-dcnode-id="2951" instrument_node="">Did You Just Punch Out Cthulhu?</span></a><span data-dcnode-id="2949" instrument_node="">: Subverted with the final boss, </span><span class="spoiler" data-dcnode-id="2941" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2948" instrument_node="">the Starworm Himself. Right after you </span><em data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">finally</span></em><span data-dcnode-id="2945" instrument_node=""> beat it into submission, a hatch in His head opens cleanly to reveal a cockpit... with a very pissed, wrench-wielding bird-man inside. It's not actually an </span><a class="twikilink" data-dcnode-id="2943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="2944" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="2942" instrument_node="">.</span></span></li><li data-dcnode-id="2929"><span data-dcnode-id="2939" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DieChairDie" title="/pmwiki/pmwiki.php/Main/DieChairDie"><span data-dcnode-id="2938" instrument_node="">Die, Chair, Die!</span></a><span data-dcnode-id="2936" instrument_node="">: You get Ivory Squares for breaking both the small light-grey busts of Mother and the similarly colored Isi icons. The game </span><em data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">is</span></em><span data-dcnode-id="2933" instrument_node=""> called </span><em data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Iconoclasts</span></em><span data-dcnode-id="2930" instrument_node=""> after all.</span></li><li data-dcnode-id="2924"><span data-dcnode-id="2928" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoesThisRemindYouOfAnything" title="/pmwiki/pmwiki.php/Main/DoesThisRemindYouOfAnything"><span data-dcnode-id="2927" instrument_node="">Does This Remind You of Anything?</span></a><span data-dcnode-id="2925" instrument_node="">: Anything involving Ivory, especially in the early half of the game. It's white, gooey, and has a weird smell according to Mina. There's also the thing where One Concern agents can be filled with seed from the procreation-worshiping Isi to make them explode in splurts of the pearly liquid...</span></li><li data-dcnode-id="2917"><span data-dcnode-id="2923" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DragonTheirFeet" title="/pmwiki/pmwiki.php/Main/DragonTheirFeet"><span data-dcnode-id="2922" instrument_node="">Dragon Their Feet</span></a><span data-dcnode-id="2920" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2918" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2919" instrument_node="">Agent Black and General Chrome manage to outlive Mother. Chrome doesn't get far before he's taken care of, but Black lives long enough to fight Robin one last time, long after she has a reason to keep fighting her beyond revenge.</span></span></li><li data-dcnode-id="2888"><span data-dcnode-id="2916" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrivenToSuicide" title="/pmwiki/pmwiki.php/Main/DrivenToSuicide"><span data-dcnode-id="2915" instrument_node="">Driven to Suicide</span></a><span data-dcnode-id="2913" instrument_node="">: A few examples.</span><ul data-dcnode-id="2889"><li data-dcnode-id="2908"><span data-dcnode-id="2912" instrument_node=""> Early in the timeline: </span><span class="spoiler" data-dcnode-id="2910" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2911" instrument_node="">Agent Black mentions her repeated suicide attempts untold numbers of years ago, until she finally accepted it was too easy for her to be brought back</span></span><span data-dcnode-id="2909" instrument_node="">.</span></li><li data-dcnode-id="2903"><span data-dcnode-id="2907" instrument_node=""> We first get to see what the "prototype" Tolo mentioned at the One Concern camp does when </span><span class="spoiler" data-dcnode-id="2905" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2906" instrument_node="">a pupil at the tower, Gerry, briefly escapes it inside Hazard Armor and sees that the outside world is fine</span></span><span data-dcnode-id="2904" instrument_node=""> so he's shot with it, and led to commit suicide by falling.</span></li><li data-dcnode-id="2895"><span data-dcnode-id="2902" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2900" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2901" instrument_node="">Mr. Andress</span></span><span data-dcnode-id="2899" instrument_node=""> is implied to commit suicide by drowning. At one point, he can be seen sitting on a dock, and when talked to will muse about </span><span class="spoiler" data-dcnode-id="2897" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2898" instrument_node="">his dead wife and how she always wanted to teach him how to swim. On later visits, he's nowhere to be seen</span></span><span data-dcnode-id="2896" instrument_node="">.</span></li><li data-dcnode-id="2890"><span data-dcnode-id="2894" instrument_node=""> After the events of City One, </span><span class="spoiler" data-dcnode-id="2892" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2893" instrument_node="">Aisling Ferrier and Emmet Darland are seen trying to strangle each other with their scarves, fearful of the incoming Star Worm. It's somewhat fitting, given that Darland was one of those who ordered to stage Gerry's suicide. The end credits, however, reveal that he survives, while Ferrier is nowhere to be seen. Also in that same scene, another suit has blown his brains out, slumped over a desk with a gun in his hand</span></span><span data-dcnode-id="2891" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2871"><span data-dcnode-id="2887" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DroppedABridgeOnHim" title="/pmwiki/pmwiki.php/Main/DroppedABridgeOnHim"><span data-dcnode-id="2886" instrument_node="">Dropped a Bridge on Him</span></a><span data-dcnode-id="2884" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2882" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2883" instrument_node="">The Silver Watchman</span></span><span data-dcnode-id="2881" instrument_node=""> gets hit with a simultaneously figurative </span><em data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">and</span></em><span data-dcnode-id="2878" instrument_node=""> literal version of this. The last time we see him, </span><span class="spoiler" data-dcnode-id="2873" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2877" instrument_node="">he's seemingly </span><a class="twikilink" data-dcnode-id="2875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorthyOpponent" title="/pmwiki/pmwiki.php/Main/WorthyOpponent"><span data-dcnode-id="2876" instrument_node="">admitting respect for Robin</span></a><span data-dcnode-id="2874" instrument_node=""> and not attacking her. She starts to walk up to him... and then a chunk of the ceiling (with Royal aboard) falls out, trapping the Silver Watchman in a pool of water where his teleporting ability doesn't work</span></span><span data-dcnode-id="2872" instrument_node="">.</span></li><li data-dcnode-id="2863"><span data-dcnode-id="2870" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DualBoss" title="/pmwiki/pmwiki.php/Main/DualBoss"><span data-dcnode-id="2869" instrument_node="">Dual Boss</span></a><span data-dcnode-id="2867" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2865" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2866" instrument_node="">Mother's Corners</span></span><span data-dcnode-id="2864" instrument_node=""> are an example where both bosses share the same health bar, and either boss can choose to hop into the background temporarily while the other keeps attacking.</span></li><li data-dcnode-id="2852"><span data-dcnode-id="2862" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EasierThanEasy" title="/pmwiki/pmwiki.php/Main/EasierThanEasy"><span data-dcnode-id="2861" instrument_node="">Easier Than Easy</span></a><span data-dcnode-id="2859" instrument_node="">: The Relaxed difficulty mode, in which the player character has infinite health and gets infinite air underwater; their Tweaks still get broken if they take damage, though. There's only two instances where the player can die in this mode: </span><span class="spoiler" data-dcnode-id="2854" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2858" instrument_node="">getting crushed to death during the Omega Controller fight, and </span><a class="twikilink" data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimedMission" title="/pmwiki/pmwiki.php/Main/TimedMission"><span data-dcnode-id="2857" instrument_node="">running out of time</span></a><span data-dcnode-id="2855" instrument_node=""> when escaping Midway</span></span><span data-dcnode-id="2853" instrument_node="">.</span></li><li data-dcnode-id="2819"><span data-dcnode-id="2851" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EasterEgg" title="/pmwiki/pmwiki.php/Main/EasterEgg"><span data-dcnode-id="2850" instrument_node="">Easter Egg</span></a><span data-dcnode-id="2848" instrument_node="">:</span><ul data-dcnode-id="2820"><li data-dcnode-id="2843"><span data-dcnode-id="2847" instrument_node=""> There are two One Concern soldiers with a lot of optional banter between each other who only make appearances if you go to obscure chest locations the first time you have access to them. One can be found in Shard Desert (right before you meet Royal, up and to the left of the save statue), another appears in Ferrier Shockwood (drop through the floor in the room to the left of the crafting table), and one more appears in </span><span class="spoiler" data-dcnode-id="2845" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2846" instrument_node="">One Concern West</span></span><span data-dcnode-id="2844" instrument_node=""> after getting the Usurper Gun (two rooms to the right of the save statue after the gun; use it on the bomb-throwing snake on the right and climb down the hidden ladder).</span></li><li data-dcnode-id="2821"><span data-dcnode-id="2842" instrument_node=""> </span><span data-dcnode-id="2840" style="display:none"><span data-dcnode-id="2841" instrument_node="">invoked</span></span><span data-dcnode-id="2839" instrument_node=""> The first time you visit the third floor on the left side of the Tower, there are two Bastion guards hanging out behind some </span><a class="twikilink" data-dcnode-id="2837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InsurmountableWaistHeightFence" title="/pmwiki/pmwiki.php/Main/InsurmountableWaistHeightFence"><span data-dcnode-id="2838" instrument_node="">boxes you can't climb over</span></a><span data-dcnode-id="2836" instrument_node="">. Using a </span><a class="twikilink" data-dcnode-id="2834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodBadBugs" title="/pmwiki/pmwiki.php/Main/GoodBadBugs"><span data-dcnode-id="2835" instrument_node="">long dive</span></a><span data-dcnode-id="2833" instrument_node=""> to jump over the boxes reveals that unlike most characters you aren't supposed to interact with, these two actually have some </span><a class="twikilink" data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakingTheFourthWall" title="/pmwiki/pmwiki.php/Main/BreakingTheFourthWall"><span data-dcnode-id="2832" instrument_node="">fourth wall-busting dialogue</span></a><span data-dcnode-id="2830" instrument_node="">:</span><div class="indent" data-dcnode-id="2826"><strong data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">Right Guard:</span></strong><span data-dcnode-id="2827" instrument_node=""> This game is too linear for skips.</span></div><div class="indent" data-dcnode-id="2822"><strong data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">Left Guard:</span></strong><span data-dcnode-id="2823" instrument_node=""> Watch out for softlocks.</span></div></li></ul></li><li data-dcnode-id="2809"><span data-dcnode-id="2818" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="2817" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="2815" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2810" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2814" instrument_node="">The final boss, the Starworm (also known as "Him"), a giant, pale worm-like </span><em data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">thing</span></em><span data-dcnode-id="2811" instrument_node=""> that destroyed the moon and that the higher-ups of One Concern are attempting to escape via rocket from. This is actually subverted when it's revealed the Starworm is really a spaceship piloted by an alien bird-man who just wants his gas tank filled up with Ivory and doesn't even know what humans are.</span></span></li><li data-dcnode-id="2796"><span data-dcnode-id="2808" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EliteMooks" title="/pmwiki/pmwiki.php/Main/EliteMooks"><span data-dcnode-id="2807" instrument_node="">Elite Mooks</span></a><span data-dcnode-id="2805" instrument_node="">: The aptly named Bastion Elites. Whereas the regular One Concern soldiers wear grey uniform with blue helmet visors and fight with submachine guns and grenades, Bastion Elites have also possess white breastplates and white helmets with purple visors. Their main weapon is a like an evolved version of Robin's stun gun, whose bomb shots produce a fiery </span><a class="twikilink" data-dcnode-id="2803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShockwaveStomp" title="/pmwiki/pmwiki.php/Main/ShockwaveStomp"><span data-dcnode-id="2804" instrument_node="">Shockwave Stomp</span></a><span data-dcnode-id="2802" instrument_node=""> running in both directions, while their primary shot is also powerful (though it can be deflected at them with a wrench.) They can also dodge shots and rapidly cover distance by sliding along the ground.</span><ul data-dcnode-id="2797"><li data-dcnode-id="2798"><span data-dcnode-id="2801" instrument_node=""> The trope is subverted, though, in that while they are better suited to close-range indoor fighting, they are not exceedingly powerful next to the regular Attackers and Defenders. In particular, a full burst from the Attacker's submachine gun still does far more damage than any of the Elite's attacks, even though it's easier for the player to dodge. As such, </span><span class="spoiler" data-dcnode-id="2799" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2800" instrument_node="">when Mother's death and Chrome's revelations trigger a civil war between Bastion Elites formerly loyal to Mother, and Attackers/Defenders loyal to Chrome, the visible casualties appear in a strict 1/1 ratio. In the end, Bastion Elites appear completely wiped out, at least at City One, with regular Attackers prevailing, even if it only happened through sheer numbers.</span></span></li></ul></li><li data-dcnode-id="2789"><span data-dcnode-id="2795" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnemyCivilWar" title="/pmwiki/pmwiki.php/Main/EnemyCivilWar"><span data-dcnode-id="2794" instrument_node="">Enemy Civil War</span></a><span data-dcnode-id="2792" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2790" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2791" instrument_node="">When Chrome finds out about Mother's plan to flee to the Moon with a select few chosen ones and leave the rest of humanity behind, he stages a revolt to overthrow Mother.</span></span></li><li data-dcnode-id="2781"><span data-dcnode-id="2788" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EyeBeams" title="/pmwiki/pmwiki.php/Main/EyeBeams"><span data-dcnode-id="2787" instrument_node="">Eye Beams</span></a><span data-dcnode-id="2785" instrument_node="">: Agent White's main ability. Its properties actually change depending on the colour of sunglasses he is wearing. Red makes him shoot a fiery beam of death, while blue gives him a </span><a class="twikilink" data-dcnode-id="2783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FreezeRay" title="/pmwiki/pmwiki.php/Main/FreezeRay"><span data-dcnode-id="2784" instrument_node="">Freeze Ray</span></a><span data-dcnode-id="2782" instrument_node="">.</span></li><li data-dcnode-id="2774"><span data-dcnode-id="2780" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EyepatchOfPower" title="/pmwiki/pmwiki.php/Main/EyepatchOfPower"><span data-dcnode-id="2779" instrument_node="">Eyepatch of Power</span></a><span data-dcnode-id="2777" instrument_node="">: Elro gets one after </span><span class="spoiler" data-dcnode-id="2775" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2776" instrument_node="">surviving the Penance that killed his wife and daughter.</span></span></li><li data-dcnode-id="2763"><span data-dcnode-id="2773" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FailedAttemptAtDrama" title="/pmwiki/pmwiki.php/Main/FailedAttemptAtDrama"><span data-dcnode-id="2772" instrument_node="">Failed Attempt at Drama</span></a><span data-dcnode-id="2770" instrument_node="">: Subverted. After the </span><a class="twikilink" data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClimaxBoss" title="/pmwiki/pmwiki.php/Main/ClimaxBoss"><span data-dcnode-id="2769" instrument_node="">Climax Boss</span></a><span data-dcnode-id="2767" instrument_node=""> fight in City One, </span><span class="spoiler" data-dcnode-id="2765" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2766" instrument_node="">Chrome says that the Starworm will show everyone a sign that he is the rightful ruler of the One Concern, and that Mother is a failure. There's a bit of an awkward silence before Chrome tries again, and then Mother explodes into an Isi tree</span></span><span data-dcnode-id="2764" instrument_node="">.</span></li><li data-dcnode-id="2758"><span data-dcnode-id="2762" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticSlur" title="/pmwiki/pmwiki.php/Main/FantasticSlur"><span data-dcnode-id="2761" instrument_node="">Fantastic Slur</span></a><span data-dcnode-id="2759" instrument_node="">: Throughout the beginning of the game there's constant mention from One Concern loyalists of "pirates". As it turns out, they are referring to the Isi, an ethnic group of people with their own religion, who live off the grid to protect themselves from One Concern. The Isi indeed take offense to the term.</span></li><li data-dcnode-id="2750"><span data-dcnode-id="2757" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Fauxshadowing" title="/pmwiki/pmwiki.php/Main/Fauxshadowing"><span data-dcnode-id="2756" instrument_node="">Fauxshadowing</span></a><span data-dcnode-id="2754" instrument_node="">: In the first few minutes of the game, you can find people wondering if the moon breaking apart is going to result in pieces of it falling down on the planet. This is the </span><strong data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">one</span></strong><span data-dcnode-id="2751" instrument_node=""> thing that ends up not happening (or even mattering).</span></li><li data-dcnode-id="2737"><span data-dcnode-id="2749" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FeedItABomb" title="/pmwiki/pmwiki.php/Main/FeedItABomb"><span data-dcnode-id="2748" instrument_node="">Feed It a Bomb</span></a><span data-dcnode-id="2746" instrument_node="">:</span><ul data-dcnode-id="2738"><li data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node=""> Both varieties of Croaktus in Shard Wastelands will eat bomb projectiles shot at them, blowing up shortly thereafter.</span></li><li data-dcnode-id="2739"><span data-dcnode-id="2743" instrument_node=""> The Inti machine, used by the Isi to </span><span class="spoiler" data-dcnode-id="2741" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2742" instrument_node="">move Isilugar around</span></span><span data-dcnode-id="2740" instrument_node=""> has to have bomb projectiles shot into its mouth during the second stage of the battle.</span></li></ul></li><li data-dcnode-id="2732"><span data-dcnode-id="2736" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForWantOfANail" title="/pmwiki/pmwiki.php/Main/ForWantOfANail"><span data-dcnode-id="2735" instrument_node="">For Want of a Nail</span></a><span data-dcnode-id="2733" instrument_node="">: Pretty much the only reason Robin and Elro didn't die in the tunnels underneath Ferrier Shockwood is because the Carver machine was missing a single tooth in its buzzsaw.</span></li><li data-dcnode-id="2699"><span data-dcnode-id="2731" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Foreshadowing" title="/pmwiki/pmwiki.php/Main/Foreshadowing"><span data-dcnode-id="2730" instrument_node="">Foreshadowing</span></a><span data-dcnode-id="2728" instrument_node="">: Quite a few things get hinted at pretty early on.</span><ul data-dcnode-id="2700"><li data-dcnode-id="2720"><span data-dcnode-id="2727" instrument_node=""> After beating the first boss, you may notice </span><span class="spoiler" data-dcnode-id="2722" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2726" instrument_node="">some large black feathers attached to the underside of the planet spine you fought the boss on, which obviously came from the Birdman (or at least </span><em data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">a</span></em><span data-dcnode-id="2723" instrument_node=""> Birdman)</span></span><span data-dcnode-id="2721" instrument_node="">.</span></li><li data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node=""> The Agents being superhuman is shown by Agent White throwing Robin into the wall in the scene introducing the Agents.</span></li><li data-dcnode-id="2710"><span data-dcnode-id="2717" instrument_node=""> Agent Black's constant headaches get a small foreshadow by her pinching the bridge of her nose in almost every scene before her fights. A slightly bigger piece of foreshadowing is how she winces every time Agent White suddenly bursts out in his </span><a class="twikilink" data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LargeHam" title="/pmwiki/pmwiki.php/Main/LargeHam"><span data-dcnode-id="2716" instrument_node="">Large Ham</span></a><span data-dcnode-id="2714" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoIndoorVoice" title="/pmwiki/pmwiki.php/Main/NoIndoorVoice"><span data-dcnode-id="2713" instrument_node="">No Indoor Voice</span></a><span data-dcnode-id="2711" instrument_node="">.</span></li><li data-dcnode-id="2705"><span data-dcnode-id="2709" instrument_node=""> At the One Concern camp in the Shard Desert, the other wanted fugitive is a "Myron" whose mapmaking is illegal. The reason </span><em data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">why</span></em><span data-dcnode-id="2706" instrument_node=""> doesn't become clear until Darland Ascent.</span></li><li data-dcnode-id="2701"><span data-dcnode-id="2704" instrument_node=""> Samba and Mina's dialogues </span><span class="spoiler" data-dcnode-id="2702" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2703" instrument_node="">drop massive hints towards their relationship.</span></span></li></ul></li><li data-dcnode-id="2670"><span data-dcnode-id="2698" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFundamentalist" title="/pmwiki/pmwiki.php/Main/TheFundamentalist"><span data-dcnode-id="2697" instrument_node="">The Fundamentalist</span></a><span data-dcnode-id="2695" instrument_node="">: Chrome genuinely believes in the religion he follows, and quotes the One Concern equivalent of </span><a class="twikilink" data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="2694" instrument_node="">The Bible</span></a><span data-dcnode-id="2692" instrument_node=""> or </span><a class="twikilink" data-dcnode-id="2690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheQuran" title="/pmwiki/pmwiki.php/Literature/TheQuran"><span data-dcnode-id="2691" instrument_node="">The Qur'an</span></a><span data-dcnode-id="2689" instrument_node=""> frequently, </span><em data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">even during boss fights</span></em><span data-dcnode-id="2686" instrument_node="">. He's also a hard line believer in everything that his religion is </span><em data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">against</span></em><span data-dcnode-id="2683" instrument_node="">, though he's open to discussion about the the differences and ideology between the pirate's religion and his own. </span><span class="spoiler" data-dcnode-id="2671" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2682" instrument_node="">Once he leads the One Concern militia into City One, he becomes a full-tilt </span><a class="twikilink" data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkMessiah" title="/pmwiki/pmwiki.php/Main/DarkMessiah"><span data-dcnode-id="2681" instrument_node="">Dark Messiah</span></a><span data-dcnode-id="2679" instrument_node="">, wishing to remake the world after thinking himself to be "chosen" once he </span><a class="twikilink" data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoSell" title="/pmwiki/pmwiki.php/Main/NoSell"><span data-dcnode-id="2678" instrument_node="">No Sells</span></a><span data-dcnode-id="2676" instrument_node=""> one of Elro's syringes of anti-Ivory material and losing faith in the higher echelons of One Concern. In reality, said syringe was only one of the two parts of the </span><a class="urllink" data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Binary_liquid"><span data-dcnode-id="2675" instrument_node="">binary liquid</span><img data-dcnode-id="2674" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2672" instrument_node="">, and he's killed in the Bastion when Elro hits him with the other component.</span></span></li><li data-dcnode-id="2665"><span data-dcnode-id="2669" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FlippingTheBird" title="/pmwiki/pmwiki.php/Main/FlippingTheBird"><span data-dcnode-id="2668" instrument_node="">Flipping the Bird</span></a><span data-dcnode-id="2666" instrument_node="">: Agent Black tells a Bastion trooper that she is going to crush his skull using only her two middle fingers.</span></li><li data-dcnode-id="2646"><span data-dcnode-id="2664" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiantSpaceFleaFromNowhere" title="/pmwiki/pmwiki.php/Main/GiantSpaceFleaFromNowhere"><span data-dcnode-id="2663" instrument_node="">Giant Space Flea from Nowhere</span></a><span data-dcnode-id="2661" instrument_node="">:</span><ul data-dcnode-id="2647"><li data-dcnode-id="2657"><span data-dcnode-id="2660" instrument_node=""> Interestingly, it's not the enormous worm from the stars </span><span class="spoiler" data-dcnode-id="2658" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2659" instrument_node="">that crashes down onto your planet — the worm's pretty well established in the lore of the game, and bears a resemblance to some previously fought bosses. It's the giant, muscular alien bird piloting the worm, who was never hinted at before the fight, and is never properly explained afterward as the game ends. Context allows you to piece together that the planet used to be a fuel depot for starship pilots like him that was colonized by humans, but he's still an alien bird of an otherwise unknown species, with no dialogue and no connection to any other characters, and he's the final boss.</span></span></li><li data-dcnode-id="2648"><span data-dcnode-id="2656" instrument_node=""> Similarly, the </span><span class="spoiler" data-dcnode-id="2654" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2655" instrument_node="">blue eye corruption seems to appear out of nowhere after Robin escapes the Tower and it's never explained what exactly it is. Computers in the underground area hint it's some sort of biotech, it can be seen when using the fast travel system at the core of the planet, it is present at the core of the Omega Controller, and the Starworm has a cluster of the eyes roughly where another creature would have actual eyes.</span></span><ul data-dcnode-id="2649"><li data-dcnode-id="2650"><span data-dcnode-id="2653" instrument_node=""> There's speculation that the </span><span class="spoiler" data-dcnode-id="2651" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2652" instrument_node="">blue eye substance is produced by the bird pilot species, whether naturally or through technology, and its existence is what allowed it to control Star Worm all along. For what it's worth, the article positing that link, among other things, was retweeted by konjak himself.</span></span></li></ul></li></ul></li><li data-dcnode-id="2638"><span data-dcnode-id="2645" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GivenNameReveal" title="/pmwiki/pmwiki.php/Main/GivenNameReveal"><span data-dcnode-id="2644" instrument_node="">Given Name Reveal</span></a><span data-dcnode-id="2642" instrument_node="">: Out of all the Agents, we only learn Black's real name: </span><span class="spoiler" data-dcnode-id="2640" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2641" instrument_node="">Madelyn Binoche</span></span><span data-dcnode-id="2639" instrument_node="">.</span></li><li data-dcnode-id="2633"><span data-dcnode-id="2637" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GivingSomeoneThePointerFinger" title="/pmwiki/pmwiki.php/Main/GivingSomeoneThePointerFinger"><span data-dcnode-id="2636" instrument_node="">Giving Someone the Pointer Finger</span></a><span data-dcnode-id="2634" instrument_node="">: Agent White really likes doing this, even using it as an attack in his boss fight.</span></li><li data-dcnode-id="2615"><span data-dcnode-id="2632" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoombaStomp" title="/pmwiki/pmwiki.php/Main/GoombaStomp"><span data-dcnode-id="2631" instrument_node="">Goomba Stomp</span></a><span data-dcnode-id="2629" instrument_node="">: One of the ways in which Robin can attack. It obviously doesn't work on </span><a class="twikilink" data-dcnode-id="2627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheSpiny" title="/pmwiki/pmwiki.php/Main/TheSpiny"><span data-dcnode-id="2628" instrument_node="">The Spiny</span></a><span data-dcnode-id="2626" instrument_node=""> enemies like , or the electrified One Concern mechs, but is a very useful way to knock out various One Concern soldiers, who have a hard time shooting upwards to defend from it, with </span><a class="twikilink" data-dcnode-id="2624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShieldBearingMook" title="/pmwiki/pmwiki.php/Main/ShieldBearingMook"><span data-dcnode-id="2625" instrument_node="">Defenders</span></a><span data-dcnode-id="2623" instrument_node=""> only able to attack along the ground. </span><span class="spoiler" data-dcnode-id="2616" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="2621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="2622" instrument_node="">Final Boss</span></a><span data-dcnode-id="2620" instrument_node=""> tries using it </span><em data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">on you</span></em><span data-dcnode-id="2617" instrument_node=""> during the second phase.</span></span></li><li data-dcnode-id="2606"><span data-dcnode-id="2614" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreenAesop" title="/pmwiki/pmwiki.php/Main/GreenAesop"><span data-dcnode-id="2613" instrument_node="">Green Aesop</span></a><span data-dcnode-id="2611" instrument_node="">: An energy crisis is brewing in the background of the plot due to both the Tri and the Isi's overreliance on the non-renewable fuel, of which one can draw eerily similar parallels with real-world oil. Unlike oil drilling, mining for Ivory doesn't destroy the ecosystem... but instead </span><em data-dcnode-id="2608"><a class="twikilink" data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpToEleven" title="/pmwiki/pmwiki.php/Main/UpToEleven"><span data-dcnode-id="2610" instrument_node="">can fracture a chunk of the world into space if done too much</span></a></em><span data-dcnode-id="2607" instrument_node="">.</span></li><li data-dcnode-id="2601"><span data-dcnode-id="2605" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GroundPound" title="/pmwiki/pmwiki.php/Main/GroundPound"><span data-dcnode-id="2604" instrument_node="">Ground Pound</span></a><span data-dcnode-id="2602" instrument_node="">: Robin starts out with the ability to do a midair flip and stomp downwards, which can break red blocks. It’s a surprisingly effective attack as well: many enemies can’t attack Robin while she's jumping on their heads (such as the Concern soldiers), and the stomp deals good damage even late in the game and will home in if Robin isn't perfectly aligned above an enemy.</span></li><li data-dcnode-id="2545"><span data-dcnode-id="2600" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="2599" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="2597" instrument_node="">:</span><ul data-dcnode-id="2546"><li data-dcnode-id="2589"><span data-dcnode-id="2596" instrument_node=""> The last event of The Tower requires Robin to break into Black's office to </span><span class="spoiler" data-dcnode-id="2594" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2595" instrument_node="">attempt to save Elro</span></span><span data-dcnode-id="2593" instrument_node="">, which manages to be more confusing than intended. In the preceding cutscene, Mina laments that she's lost her seeds and can't blow up the office's gate; Robin picked up the seeds while she was infiltrating the tower, so this seems to hint that Robin must figure out how to use the seeds or hand them over to Mina. Neither option is possible (the seeds don't come up again until One Concern West), and the actual solution is to </span><span class="spoiler" data-dcnode-id="2591" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2592" instrument_node="">jump up to a hidden ledge that leads to a crawlspace going directly into Black's room</span></span><span data-dcnode-id="2590" instrument_node="">, which is marked by a small outcropping but is easy to miss in the panic.</span></li><li data-dcnode-id="2583"><span data-dcnode-id="2588" instrument_node=""> All three key item quests have a confusing trait to them. Laurie's letter delivery is simply transferring key items back and forth between two people, but the location of the second person is hidden well. The cupcake quest starts simple since you can find its NPC in several areas, but the person you give the item to in Ferrier Shockwood just takes it without giving you anything; you must go back to the original person to get a different item and then backtrack to receive your reward. The Soldier's RSVP is the trickiest: you can get the letter after Isilugar Labs, but it won't be relevant until the end of One Concern West (at which point the game encourages to progress to the endgame), and </span><span class="spoiler" data-dcnode-id="2584" title="you can set spoilers visible by default on your profile"><em data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">you can't deliver the item</span></em><span data-dcnode-id="2585" instrument_node=""> since the recipient was killed in Black's rampage, so after examining the body you have to return to the Isilugar jail cell to report your failure and receive the quest reward.</span></span></li><li data-dcnode-id="2558"><span data-dcnode-id="2582" instrument_node=""> Both </span><a class="twikilink" data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="2581" instrument_node="">Bonus Bosses</span></a><span data-dcnode-id="2579" instrument_node=""> are tricky to activate, especially for players who make a habit of exploring past areas as soon as they can.</span><ul data-dcnode-id="2559"><li data-dcnode-id="2571"><span data-dcnode-id="2578" instrument_node=""> For </span><span class="spoiler" data-dcnode-id="2576" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2577" instrument_node="">Fitzroy</span></span><span data-dcnode-id="2575" instrument_node="">, you first have to meet Leticia in five separate locations; the first time is in Blockrock right in the open, but the rest are in out-of-the-way areas around the map, one of which requires the Galvanized Wrench to reach (she places her flag in the room next to where she is, as a slight hint). The hiding spots are sequenced and she sometimes only appears after enough story progression, making it more confusing. After the final encounter, you have to </span><span class="spoiler" data-dcnode-id="2573" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2574" instrument_node="">swim to the secret cavern deep within Glass Strait</span></span><span data-dcnode-id="2572" instrument_node="">; the only hint for this is that Leticia's flag is on the water's surface, but it's in an area that has little purpose otherwise.</span></li><li data-dcnode-id="2560"><span data-dcnode-id="2570" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2568" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2569" instrument_node="">Mother's Corners</span></span><span data-dcnode-id="2567" instrument_node=""> can only be fought at the </span><em data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">very</span></em><span data-dcnode-id="2564" instrument_node=""> end of the game after </span><span class="spoiler" data-dcnode-id="2562" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2563" instrument_node="">the Starworm crash-lands in Blockrock</span></span><span data-dcnode-id="2561" instrument_node="">, where it really doesn't seem like there’s anything else to do (unless you notice a missing space in the tweak collection box). It's at least easier to find the items necessary for the fight, though they are spread out a bit and one is way back in The Tower. The hint the items give is also a bit confusing.</span></li></ul></li><li data-dcnode-id="2547"><span data-dcnode-id="2557" instrument_node=""> There are only slight hints that the Usurper Gun's swapping shot works on </span><span class="spoiler" data-dcnode-id="2555" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2556" instrument_node="">City One's gatekeeper</span></span><span data-dcnode-id="2554" instrument_node=""> and </span><span class="spoiler" data-dcnode-id="2552" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2553" instrument_node="">Mother</span></span><span data-dcnode-id="2551" instrument_node="">, and no hints that it can </span><span class="spoiler" data-dcnode-id="2549" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2550" instrument_node="">remove the blue eyes protecting enemies in the Impact Zone</span></span><span data-dcnode-id="2548" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2537"><span data-dcnode-id="2544" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HarderThanHard" title="/pmwiki/pmwiki.php/Main/HarderThanHard"><span data-dcnode-id="2543" instrument_node="">Harder Than Hard</span></a><span data-dcnode-id="2541" instrument_node="">: After beating the game, you unlock Challenge Mode, where you are a </span><a class="twikilink" data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitPointWonder" title="/pmwiki/pmwiki.php/Main/OneHitPointWonder"><span data-dcnode-id="2540" instrument_node="">One-Hit-Point Wonder</span></a><span data-dcnode-id="2538" instrument_node="">. Iron Hearts will still soak up a hit, but enemies don't drop Ivory cubes to repair them. Instead, they are repaired at Save Statues.</span></li><li data-dcnode-id="2520"><span data-dcnode-id="2536" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HellIsThatNoise" title="/pmwiki/pmwiki.php/Main/HellIsThatNoise"><span data-dcnode-id="2535" instrument_node="">Hell Is That Noise</span></a><span data-dcnode-id="2533" instrument_node="">: The screams of the mutated </span><span class="spoiler" data-dcnode-id="2531" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2532" instrument_node="">Agent Black</span></span><span data-dcnode-id="2530" instrument_node=""> in her final fight are downright </span><em data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">bone-chilling</span></em><span data-dcnode-id="2527" instrument_node="">.</span><ul data-dcnode-id="2521"><li data-dcnode-id="2522"><span data-dcnode-id="2526" instrument_node=""> The glitchy, distorted sounds after Robin gets shot with what amounts to a </span><a class="twikilink" data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BattleInTheCenterOfTheMind" title="/pmwiki/pmwiki.php/Main/BattleInTheCenterOfTheMind"><span data-dcnode-id="2525" instrument_node="">Battle in the Center of the Mind</span></a><span data-dcnode-id="2523" instrument_node=""> gun are incredibly creepy, leading into a similarly warped soundtrack for said battle.</span></li></ul></li><li data-dcnode-id="2515"><span data-dcnode-id="2519" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheHeretic" title="/pmwiki/pmwiki.php/Main/TheHeretic"><span data-dcnode-id="2518" instrument_node="">The Heretic</span></a><span data-dcnode-id="2516" instrument_node="">: Well, considering the game is called 'Iconoclasts'...</span></li><li data-dcnode-id="2501"><span data-dcnode-id="2514" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroesPreferSwords" title="/pmwiki/pmwiki.php/Main/HeroesPreferSwords"><span data-dcnode-id="2513" instrument_node="">Heroes Prefer Swords</span></a><span data-dcnode-id="2511" instrument_node="">: Inverted. Robin herself favors her stun gun and her trusty wrench. The setting is a mix of modern and sci-fi, so most other characters use guns or explosives. As a result, there's a total of only four sword-wielding characters across the game. Three of them are villains: The katana-wielding Silver Watchman, and Mother's Corners, two warriors who each carry broadswords. The remaining sword user, </span><span class="spoiler" data-dcnode-id="2509" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2510" instrument_node="">Elro</span></span><span data-dcnode-id="2508" instrument_node="">, is not a villain, but </span><span class="spoiler" data-dcnode-id="2503" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2507" instrument_node="">he is a bitter and stubborn man that kickstarted the biggest conflicts in the plot, and his nihilistic attitude nearly has the team fail, </span><em data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">several times</span></em><span data-dcnode-id="2504" instrument_node="">. Also, by the end, he kills with no remorse. It even plays into his combat style: Robin merely stuns human enemies, but Elro uses his sword to go in for the kill. It really says something that the only Reborn who did not survive the fight at One Concern East was Lawrence, who fought Elro and got a sword to the back (while he was down, mind you) for his troubles</span></span><span data-dcnode-id="2502" instrument_node="">.</span></li><li data-dcnode-id="2496"><span data-dcnode-id="2500" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicMime" title="/pmwiki/pmwiki.php/Main/HeroicMime"><span data-dcnode-id="2499" instrument_node="">Heroic Mime</span></a><span data-dcnode-id="2497" instrument_node="">: Robin does not speak at all and only communicates through emotes and body language (and a few dialogue choices), but everybody seems to understand her anyways.</span></li><li data-dcnode-id="2485"><span data-dcnode-id="2495" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HiddenElfVillage" title="/pmwiki/pmwiki.php/Main/HiddenElfVillage"><span data-dcnode-id="2494" instrument_node="">Hidden Elf Village</span></a><span data-dcnode-id="2492" instrument_node="">: Isilugar, an underwater town that's home to the Isi (known as "pirates" elsewhere, not that the Isi are </span><a class="twikilink" data-dcnode-id="2490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticSlur" title="/pmwiki/pmwiki.php/Main/FantasticSlur"><span data-dcnode-id="2491" instrument_node="">fans of the term</span></a><span data-dcnode-id="2489" instrument_node="">), an ethnic group with their own separate religion. The town is equipped with its own labs, Ivory-mining facilities, and a machine that </span><span class="spoiler" data-dcnode-id="2487" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2488" instrument_node="">moves the town around to avoid detection by the One Concern</span></span><span data-dcnode-id="2486" instrument_node="">.</span></li><li data-dcnode-id="2468"><span data-dcnode-id="2484" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HideYourLesbians" title="/pmwiki/pmwiki.php/Main/HideYourLesbians"><span data-dcnode-id="2483" instrument_node="">Hide Your Lesbians</span></a><span data-dcnode-id="2481" instrument_node="">: Despite how obvious it is from the get-go, </span><span class="spoiler" data-dcnode-id="2479" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2480" instrument_node="">Mina and Samba</span></span><span data-dcnode-id="2478" instrument_node=""> are never explicitly stated to be a couple (</span><span class="spoiler" data-dcnode-id="2476" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2477" instrument_node="">at least until the ending credits</span></span><span data-dcnode-id="2475" instrument_node="">). </span><a class="twikilink" data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustifiedTrope" title="/pmwiki/pmwiki.php/Main/JustifiedTrope"><span data-dcnode-id="2474" instrument_node="">Justified</span></a><span data-dcnode-id="2472" instrument_node=""> in that </span><span class="spoiler" data-dcnode-id="2470" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2471" instrument_node="">Isi culture places an extremely high importance on procreation, which likely means same-sex relationships are not tolerated and they have to keep it secret</span></span><span data-dcnode-id="2469" instrument_node="">.</span></li><li data-dcnode-id="2461"><span data-dcnode-id="2467" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HoistByHisOwnPetard" title="/pmwiki/pmwiki.php/Main/HoistByHisOwnPetard"><span data-dcnode-id="2466" instrument_node="">Hoist by His Own Petard</span></a><span data-dcnode-id="2464" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2462" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2463" instrument_node="">During the third phase against the Starworm, the Birdman reactivates it once he gets low on HP. This comes back to bite him when the Starworm's right hand crushes him before dying itself.</span></span></li><li data-dcnode-id="2454"><span data-dcnode-id="2460" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HonorBeforeReason" title="/pmwiki/pmwiki.php/Main/HonorBeforeReason"><span data-dcnode-id="2459" instrument_node="">Honor Before Reason</span></a><span data-dcnode-id="2457" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2455" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2456" instrument_node="">Agent Black admits that keeping Royal and Robin from using the rocket to attempt to reason with Him is a poor decision, but her orders to protect the rocket are the only point of stability she has to cling to at that point.</span></span></li><li data-dcnode-id="2435"><span data-dcnode-id="2453" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImplacableMan" title="/pmwiki/pmwiki.php/Main/ImplacableMan"><span data-dcnode-id="2452" instrument_node="">Implacable Man</span></a><span data-dcnode-id="2450" instrument_node="">: Two of the boss fights near the rocket.</span><ul data-dcnode-id="2436"><li data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node=""> While you are trying to get the elevator working, defeating the boss is not an option; you must fix the elevator and get out of there.</span></li><li data-dcnode-id="2437"><span data-dcnode-id="2447" instrument_node=""> A more classic version is </span><span class="spoiler" data-dcnode-id="2445" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2446" instrument_node="">Elro, going up against Lawrence.</span></span><span data-dcnode-id="2444" instrument_node=""> He can shoot, throw knives, punch him if he gets too close, but unless he runs out of HP, </span><span class="spoiler" data-dcnode-id="2442" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2443" instrument_node="">Elro</span></span><span data-dcnode-id="2441" instrument_node=""> keeps. On. Coming. Good thing you're playing as him, and your job is just to </span><a class="twikilink" data-dcnode-id="2439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoSell" title="/pmwiki/pmwiki.php/Main/NoSell"><span data-dcnode-id="2440" instrument_node="">No-Sell</span></a><span data-dcnode-id="2438" instrument_node=""> Lawrence's attacks while you keep marching up and stabbing him.</span></li></ul></li><li data-dcnode-id="2430"><span data-dcnode-id="2434" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InfinityMinusOneSword" title="/pmwiki/pmwiki.php/Main/InfinityMinusOneSword"><span data-dcnode-id="2433" instrument_node="">Infinity -1 Sword</span></a><span data-dcnode-id="2431" instrument_node="">: The Usurper gun, which is acquired roughly three-fourths of the way through the game. It deals more damage than the standard stun pistol, hits enemies multiple times, and kills many enemies that are otherwise outright invincible. However, its shots lack the homing ability of the standard gun, and shooting too rapidly will cause it to overheat, limiting its DPS.</span></li><li data-dcnode-id="2409"><span data-dcnode-id="2429" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InvincibleMinorMook" title="/pmwiki/pmwiki.php/Main/InvincibleMinorMook"><span data-dcnode-id="2428" instrument_node="">Invincible Minor Mook</span></a><span data-dcnode-id="2426" instrument_node="">: There are a lot of enemies that start off invincible (such as the Ghosmo ghosts), but the Usurper Gun can kill a lot of them. Ones that are always invincible include:</span><ul data-dcnode-id="2410"><li data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node=""> Herculeans are big one-eyed boulders that can't be destroyed, though they can be knocked back by Robin's wrench. One found early on can be killed by slamming it into the ceiling with a door, but this isn't an option for any others.</span></li><li data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node=""> The Hazard Armor enemies are special Concern troops that can't be hurt or even stunned. The first time you encounter one is in a pseudo-boss fight where you have to play chicken with it while breaking down an ice block, but later ones just have to be avoided.</span></li><li data-dcnode-id="2411"><span data-dcnode-id="2421" instrument_node=""> Blue-eye possessed Bipedro enemies also can't be damaged... by </span><em data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">you</span></em><span data-dcnode-id="2418" instrument_node="">. However, you need them to break down certain walls for you, so it's probably a good thing that you can't accidentally kill them and render the game </span><a class="twikilink" data-dcnode-id="2416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Unwinnable" title="/pmwiki/pmwiki.php/Main/Unwinnable"><span data-dcnode-id="2417" instrument_node="">Unwinnable</span></a><span data-dcnode-id="2415" instrument_node="">. After they are done, there is usually a convenient pit of </span><a class="twikilink" data-dcnode-id="241
