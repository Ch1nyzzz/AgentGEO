a-dcnode-id="1730" instrument_node="">proceeds to lay him out</span></a><span data-dcnode-id="1728" instrument_node="">*</span></em></div><ul data-dcnode-id="1720"><li data-dcnode-id="1721"><span data-dcnode-id="1725" instrument_node=""> Mina and Elro never really did see eye-to-eye, but when </span><span class="spoiler" data-dcnode-id="1723" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1724" instrument_node="">she and Elro trek all the way to the buttons to launch the rocket with Robin and Royal into space, only for Elro to refuse to press his and begin walking to the rocket to retrieve Robin, Mina is so fed up with him that she blasts him in the leg with her shotgun</span></span><span data-dcnode-id="1722" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1696"><span data-dcnode-id="1718" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Railroading" title="/pmwiki/pmwiki.php/Main/Railroading"><span data-dcnode-id="1717" instrument_node="">Railroading</span></a><span data-dcnode-id="1715" instrument_node="">:</span><ul data-dcnode-id="1697"><li data-dcnode-id="1708"><span data-dcnode-id="1714" instrument_node=""> There's no getting around an event at Midway. </span><span class="spoiler" data-dcnode-id="1709" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1713" instrument_node="">You have to leave Royal to die on a decompressing Midway, as one scanner is pulled too far away from the door to work while you're carrying him, and the other is just flat out broken, meaning trying to use the Usurper Shot to position him near it would be pointless </span><a class="twikilink" data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation" title="/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation"><span data-dcnode-id="1712" instrument_node="">even if it did work</span></a><span data-dcnode-id="1710" instrument_node="">. The game even twists the knife by giving you way more time than you need to escape, as if to suggest that there is actually a way to save him when there isn't.</span></span></li><li data-dcnode-id="1698"><span data-dcnode-id="1707" instrument_node=""> Far more egregious example at City One. </span><span class="spoiler" data-dcnode-id="1699" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1706" instrument_node="">Usually, you are locked into a boss battle by the One Concern metal doors activating behind you. However, this doesn't happen when fighting Mother, because all she wants is for you to get out of the way, and let her converse with her people in peace. She even offers to talk to you at the Bastion at first, before ordering Bastion Elites to escort you there. Yet, you are forced to fight regardless, the way out blocked by an </span><a class="twikilink" data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InvisibleWall" title="/pmwiki/pmwiki.php/Main/InvisibleWall"><span data-dcnode-id="1705" instrument_node="">Invisible Wall</span></a><span data-dcnode-id="1703" instrument_node="">, even though the reason you wanted to meet her in the first place was so that she could </span><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">heal</span></strong><span data-dcnode-id="1700" instrument_node=""> Elro, which she obviously can't do at all once she's dead.</span></span></li></ul></li><li data-dcnode-id="1691"><span data-dcnode-id="1695" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RainbowSpeak" title="/pmwiki/pmwiki.php/Main/RainbowSpeak"><span data-dcnode-id="1694" instrument_node="">Rainbow Speak</span></a><span data-dcnode-id="1692" instrument_node="">: Anything important is usually highlighted in red. This includes hints and things that may not seem important at the time ("cartography?").</span></li><li data-dcnode-id="1665"><span data-dcnode-id="1690" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="1689" instrument_node="">"The Reason You Suck" Speech</span></a><span data-dcnode-id="1687" instrument_node="">: Agent Black gives a long one to Royal </span><span class="spoiler" data-dcnode-id="1685" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1686" instrument_node="">when she encounters him in the detritus pit outside One Concern West, where he can't use his powers, and after he killed the Silver Watchman</span></span><span data-dcnode-id="1684" instrument_node="">. A fragment of it below:</span><div class="indent" data-dcnode-id="1666"><strong data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Black:</span></strong><span data-dcnode-id="1681" instrument_node=""> You are a sheltered child. You don't know rejection. </span><span class="spoiler" data-dcnode-id="1676" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1680" instrument_node="">The world will die within </span><strong data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">days</span></strong><span data-dcnode-id="1677" instrument_node=""> because of you.</span></span><span data-dcnode-id="1675" instrument_node=""> You are now the antithesis of everything you hoped to be. </span><br data-dcnode-id="1674"><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Royal:</span></strong><span data-dcnode-id="1671" instrument_node=""> What are you talking about? </span><br data-dcnode-id="1670"><strong data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Black:</span></strong><span data-dcnode-id="1667" instrument_node=""> How would you rule, Royal? When was the last time you could feel for another person? You are a faultless production. Never had discomfort. Never had true misery. You could never relate to people. You're beyond change.</span></div></li><li data-dcnode-id="1641"><span data-dcnode-id="1664" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RecurringBoss" title="/pmwiki/pmwiki.php/Main/RecurringBoss"><span data-dcnode-id="1663" instrument_node="">Recurring Boss</span></a><span data-dcnode-id="1661" instrument_node="">:</span><ul data-dcnode-id="1642"><li data-dcnode-id="1656"><span data-dcnode-id="1660" instrument_node=""> Two bladed Controllers are fought in the game: one with Robin as a </span><a class="twikilink" data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WarmUpBoss" title="/pmwiki/pmwiki.php/Main/WarmUpBoss"><span data-dcnode-id="1659" instrument_node="">Warm-Up Boss</span></a><span data-dcnode-id="1657" instrument_node=""> in Blockrock, and another with Mina in Ferrier Shockwood.</span></li><li data-dcnode-id="1648"><span data-dcnode-id="1655" instrument_node=""> The Silver Watchman is fought four times. The first three fights are in The Tower, with one and two being </span><a class="twikilink" data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DuelBoss" title="/pmwiki/pmwiki.php/Main/DuelBoss"><span data-dcnode-id="1654" instrument_node="">Duel Boss</span></a><span data-dcnode-id="1652" instrument_node=""> encounters and the third being a gimmick fight inside a tiny elevator. You face him one last time in Dark Cave, where </span><span class="spoiler" data-dcnode-id="1650" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1651" instrument_node="">he’s being used as a puppet by the Possessed Thunk, a Kerthunk mecha infested with the blue eyeballs</span></span><span data-dcnode-id="1649" instrument_node="">.</span></li><li data-dcnode-id="1643"><span data-dcnode-id="1647" instrument_node=""> Agent Black is the boss of both One Concern West and </span><span class="spoiler" data-dcnode-id="1645" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1646" instrument_node="">the Rocket Platform, where she's technically fought three times; once as an invincible enemy while activating the rocket, another time as a true rematch in front of the rocket, and then as the Ivory Beast, which has two forms</span></span><span data-dcnode-id="1644" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1634"><span data-dcnode-id="1640" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RedHerring" title="/pmwiki/pmwiki.php/Main/RedHerring"><span data-dcnode-id="1639" instrument_node="">Red Herring</span></a><span data-dcnode-id="1637" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1635" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1636" instrument_node="">The first time you see a Transcendence chamber it is made very clear that it is a Big Deal. Then Elro gets hurt. Then Elro starts bleeding to death near a Transcendence chamber. Then it is mentioned that nothing can heal Elro's missing arm short of stuffing him in a Transcendence chamber. Then nothing happens.</span></span></li><li data-dcnode-id="1616"><span data-dcnode-id="1633" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RelationshipValues" title="/pmwiki/pmwiki.php/Main/RelationshipValues"><span data-dcnode-id="1632" instrument_node="">Relationship Values</span></a><span data-dcnode-id="1630" instrument_node="">: Say the right things to a few characters and the </span><span class="spoiler" data-dcnode-id="1627" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BattleInTheCenterOfTheMind" title="/pmwiki/pmwiki.php/Main/BattleInTheCenterOfTheMind"><span data-dcnode-id="1629" instrument_node="">Battle in the Center of the Mind</span></a></span><span data-dcnode-id="1626" instrument_node=""> right before the </span><a class="twikilink" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="1625" instrument_node="">Final Boss</span></a><span data-dcnode-id="1623" instrument_node=""> has one or more phases become easier </span><span class="spoiler" data-dcnode-id="1621" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1622" instrument_node="">by stunning them once you activate a switch</span></span><span data-dcnode-id="1620" instrument_node="">, and Mina might join you for the </span><a class="twikilink" data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="1619" instrument_node="">Final Boss</span></a><span data-dcnode-id="1617" instrument_node=""> itself.</span></li><li data-dcnode-id="1606"><span data-dcnode-id="1615" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Retraux" title="/pmwiki/pmwiki.php/Main/Retraux"><span data-dcnode-id="1614" instrument_node="">Retraux</span></a><span data-dcnode-id="1612" instrument_node="">: The </span><em data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Ivory Springs</span></em><span data-dcnode-id="1609" instrument_node=""> version was very much so, and the newer version still has elements like square flowers. However, they have become a plot element, </span><span class="spoiler" data-dcnode-id="1607" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1608" instrument_node="">being a sign that the planet is artificial, and everything is made of Ivory. Isi still possess seeds of real plants from Earth, which are round and contain no Ivory (thus Royal can't manipulate them).</span></span></li><li data-dcnode-id="1593"><span data-dcnode-id="1605" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RightHandVersusLeftHand" title="/pmwiki/pmwiki.php/Main/RightHandVersusLeftHand"><span data-dcnode-id="1604" instrument_node="">Right Hand Versus Left Hand</span></a><span data-dcnode-id="1602" instrument_node="">: The upper echelons of One Concern are rather disorganized, thanks to an unfortunate combination of </span><a class="twikilink" data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PoorCommunicationKills" title="/pmwiki/pmwiki.php/Main/PoorCommunicationKills"><span data-dcnode-id="1601" instrument_node="">poor communication</span></a><span data-dcnode-id="1599" instrument_node="">, differing ideologies, and a lack of strong, decisive leadership from Mother. As such, they often end up getting in each other's way, </span><span class="spoiler" data-dcnode-id="1595" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1598" instrument_node="">before things break down into a total </span><a class="twikilink" data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnemyCivilWar" title="/pmwiki/pmwiki.php/Main/EnemyCivilWar"><span data-dcnode-id="1597" instrument_node="">Enemy Civil War</span></a></span><span data-dcnode-id="1594" instrument_node="">.</span></li><li data-dcnode-id="1583"><span data-dcnode-id="1592" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RingOutBoss" title="/pmwiki/pmwiki.php/Main/RingOutBoss"><span data-dcnode-id="1591" instrument_node="">Ring-Out Boss</span></a><span data-dcnode-id="1589" instrument_node="">:</span><ul data-dcnode-id="1584"><li data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node=""> Double subverted with the Carver. Once reduced to just a head, all the Carver machine in Ferrier Shockwood can do is spin its blades to produce debris. Elro will jam his sword into the blades to lock them up, at which point Robin has to charge up and grab a rail to ram into the head and knock it back; this repeats for a while, with Robin occasionally dislodging Elro’s sword from the ceiling, until the Carver nearly falls off a cliff (the "abyss" was only a few feet deep, but the Controller that Mina was chasing pops out and wrecks it).</span></li><li data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node=""> Mendeleev works somewhat like this. If she's shot while she's in the air outside of her fiery mode, she gets knocked back and temporarily stunned. If she falls into an active electric current in this state, she gets zapped and loses a lot more health than she does from individual shotgun blasts.</span></li></ul></li><li data-dcnode-id="1575"><span data-dcnode-id="1582" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RelationshipReveal" title="/pmwiki/pmwiki.php/Main/RelationshipReveal"><span data-dcnode-id="1581" instrument_node="">Relationship Reveal</span></a><span data-dcnode-id="1579" instrument_node="">: Though it's heavily implied throughout the game, </span><span class="spoiler" data-dcnode-id="1577" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1578" instrument_node="">the ending credits show Mina and Samba reuniting for the first time since Samba's rescue from the Tower. The two ladies start passionately making out, confirming that the two of them are girlfriends</span></span><span data-dcnode-id="1576" instrument_node="">.</span></li><li data-dcnode-id="1570"><span data-dcnode-id="1574" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RocketFist" title="/pmwiki/pmwiki.php/Main/RocketFist"><span data-dcnode-id="1573" instrument_node="">Rocket Fist</span></a><span data-dcnode-id="1571" instrument_node="">: Inti does this during the first phase of its battle.</span></li><li data-dcnode-id="1554"><span data-dcnode-id="1569" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SadBattleMusic" title="/pmwiki/pmwiki.php/Main/SadBattleMusic"><span data-dcnode-id="1568" instrument_node="">Sad Battle Music</span></a><span data-dcnode-id="1566" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1564" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1565" instrument_node="">The final fight against Black</span></span><span data-dcnode-id="1563" instrument_node=""> has this, though it stops being sad once </span><span class="spoiler" data-dcnode-id="1559" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1562" instrument_node="">she goes </span><a class="twikilink" data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneWingedAngel" title="/pmwiki/pmwiki.php/Main/OneWingedAngel"><span data-dcnode-id="1561" instrument_node="">One-Winged Angel</span></a></span><span data-dcnode-id="1558" instrument_node="">. The same sad music returns outside of battle when </span><span class="spoiler" data-dcnode-id="1556" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1557" instrument_node="">you are escaping from Midway, and are forced to leave Royal behind to die</span></span><span data-dcnode-id="1555" instrument_node="">.</span></li><li data-dcnode-id="1537"><span data-dcnode-id="1553" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SanitySlippage" title="/pmwiki/pmwiki.php/Main/SanitySlippage"><span data-dcnode-id="1552" instrument_node="">Sanity Slippage</span></a><span data-dcnode-id="1550" instrument_node="">:</span><ul data-dcnode-id="1538"><li data-dcnode-id="1546"><span data-dcnode-id="1549" instrument_node=""> Agent Black's sanity doesn't slip away so much as take a running leap off of the deep end after the first time you beat her in One Concern West's detritus pit. </span><span class="spoiler" data-dcnode-id="1547" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1548" instrument_node="">We don't see the actual process, but once she shows up again at One Concern East for her rematch, she's clearly not in the best place, mentally speaking.</span></span></li><li data-dcnode-id="1539"><span data-dcnode-id="1545" instrument_node=""> Mother's Corners are an even more severe example. When they are first seen in the flesh (after being featured on multiple wall frescoes earlier) next to Mother, they are giving measured advice </span><span class="spoiler" data-dcnode-id="1543" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1544" instrument_node="">just before the battle that kills her</span></span><span data-dcnode-id="1542" instrument_node="">. The next time you encounter them, they have devolved to </span><span class="spoiler" data-dcnode-id="1540" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1541" instrument_node="">killing all the Tower pupils they can find in a belief this will bring Mother back, and crying out for your blood once they encounter you.</span></span></li></ul></li><li data-dcnode-id="1510"><span data-dcnode-id="1536" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShaggyDogStory" title="/pmwiki/pmwiki.php/Main/ShaggyDogStory"><span data-dcnode-id="1535" instrument_node="">"Shaggy Dog" Story</span></a><span data-dcnode-id="1533" instrument_node="">: The plight of the </span><span class="spoiler" data-dcnode-id="1527" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1532" instrument_node="">acolytes Mother was grooming in isolation to be the chosen ones to escape to Midway. Mina leaves the entrance to the Tower open, allowing the acolytes to wander into the outside world for the first time. Unfortunately, the result is that many of them die from the elements or are murdered by Mother's Corners, with the few surviving ones devolving into </span><em data-dcnode-id="1529"><a class="twikilink" data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/LordOfTheFlies" title="/pmwiki/pmwiki.php/Literature/LordOfTheFlies"><span data-dcnode-id="1531" instrument_node="">Lord of the Flies</span></a></em><span data-dcnode-id="1528" instrument_node=""> level dysfunction</span></span><span data-dcnode-id="1526" instrument_node="">.</span><ul data-dcnode-id="1511"><li data-dcnode-id="1512"><span data-dcnode-id="1525" instrument_node=""> Royal's </span><span class="spoiler" data-dcnode-id="1523" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1524" instrument_node="">plan to communicate with the Starworm as well, though in this case the Shaggy Dog is agent Black. Having lost everything, Black found one last point of stability in guarding the rocket from anyone who would dare to use it. This unfortunately included the one person capable of beating her in a fight.</span></span><span data-dcnode-id="1522" instrument_node=""> The really sad part comes from the fact </span><span class="spoiler" data-dcnode-id="1518" title="you can set spoilers visible by default on your profile"><em data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">her death might have been avoided</span></em><span data-dcnode-id="1519" instrument_node=""> if Royal had waited for the Star Worm to descend to Earth, and then joined Robin as she would have tried to fight the Starworm anyway, allowing Black to live.</span></span><ul data-dcnode-id="1513"><li data-dcnode-id="1514"><span data-dcnode-id="1517" instrument_node=""> Then again, </span><span class="spoiler" data-dcnode-id="1515" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1516" instrument_node="">once Royal triggered Star Worm's arrival by destroying the Omega Controller, the best thing to do was probably to just wait for His arrival and get ready for a fight. Going to City One and killing Mother accomplished nothing; Chrome might have still triggered a civil war once Mother rejected his overtures, but it would have likely ended in a stalemate, and Mother would have escaped like she planned. It might not have been just, but at least the pupils wouldn't have died.</span></span></li></ul></li></ul></li><li data-dcnode-id="1499"><span data-dcnode-id="1509" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShieldBearingMook" title="/pmwiki/pmwiki.php/Main/ShieldBearingMook"><span data-dcnode-id="1508" instrument_node="">Shield-Bearing Mook</span></a><span data-dcnode-id="1506" instrument_node="">: The One Concern Defenders, who attack by producing a blue </span><a class="twikilink" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShockwaveStomp" title="/pmwiki/pmwiki.php/Main/ShockwaveStomp"><span data-dcnode-id="1505" instrument_node="">Shockwave Stomp</span></a><span data-dcnode-id="1503" instrument_node="">, and are immune to regular melee and ranged attacks from the front due to their shields. They are still somewhat affected by the bomb detonations, but the easiest way to knock them out is through </span><a class="twikilink" data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoombaStomp" title="/pmwiki/pmwiki.php/Main/GoombaStomp"><span data-dcnode-id="1502" instrument_node="">Goomba Stomp</span></a><span data-dcnode-id="1500" instrument_node="">.</span></li><li data-dcnode-id="1482"><span data-dcnode-id="1498" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShieldedCoreBoss" title="/pmwiki/pmwiki.php/Main/ShieldedCoreBoss"><span data-dcnode-id="1497" instrument_node="">Shielded Core Boss</span></a><span data-dcnode-id="1495" instrument_node="">: The fight against </span><span class="spoiler" data-dcnode-id="1493" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1494" instrument_node="">Possessed Thunk</span></span><span data-dcnode-id="1492" instrument_node=""> involves damaging </span><span class="spoiler" data-dcnode-id="1490" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1491" instrument_node="">the Silver Watchman (who is being puppeted around on blue eye strings)</span></span><span data-dcnode-id="1489" instrument_node=""> until he falls over, then attacking the main boss while it </span><span class="spoiler" data-dcnode-id="1487" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1488" instrument_node="">repairs the strings</span></span><span data-dcnode-id="1486" instrument_node="">. Eventually, the boss gives up on this and starts charging at Robin, though fortunately it's </span><a class="twikilink" data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeakenedByTheLight" title="/pmwiki/pmwiki.php/Main/WeakenedByTheLight"><span data-dcnode-id="1485" instrument_node="">Weakened by the Light</span></a><span data-dcnode-id="1483" instrument_node="">.</span></li><li data-dcnode-id="1463"><span data-dcnode-id="1481" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShockAndAwe" title="/pmwiki/pmwiki.php/Main/ShockAndAwe"><span data-dcnode-id="1480" instrument_node="">Shock and Awe</span></a><span data-dcnode-id="1478" instrument_node="">: Robin's wrench gets an upgrade that lets her charge it with electricity by spinning it, and a second upgrade that lets her bombs and missiles become charged as well. </span><span class="spoiler" data-dcnode-id="1476" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1477" instrument_node="">The Birdman can do the same thing with his wrench</span></span><span data-dcnode-id="1475" instrument_node="">.</span><ul data-dcnode-id="1464"><li data-dcnode-id="1465"><span data-dcnode-id="1474" instrument_node=""> Pure electric attacks (not counting blue energy </span><a class="twikilink" data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShockwaveStomp" title="/pmwiki/pmwiki.php/Main/ShockwaveStomp"><span data-dcnode-id="1473" instrument_node="">Shockwave Stomp</span></a><span data-dcnode-id="1471" instrument_node=""> attacks) are also used by One Concern's Spotters, which have electricity running along their whole body to prevent you from </span><a class="twikilink" data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoombaStomp" title="/pmwiki/pmwiki.php/Main/GoombaStomp"><span data-dcnode-id="1470" instrument_node="">jumping on them</span></a><span data-dcnode-id="1468" instrument_node=""> and Agent Black, who can zap lightning on ground level, as well as Isi's Inti machine, which zaps lightning from its fingers during the first phase of its battle, when </span><span class="spoiler" data-dcnode-id="1466" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1467" instrument_node="">it's taken over by a Controller during the One Concern attack on Isilugar.</span></span></li></ul></li><li data-dcnode-id="1455"><span data-dcnode-id="1462" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShockwaveStomp" title="/pmwiki/pmwiki.php/Main/ShockwaveStomp"><span data-dcnode-id="1461" instrument_node="">Shockwave Stomp</span></a><span data-dcnode-id="1459" instrument_node="">: A shockwave of blue energy running along the ground at a considerable height, and often in both directions, is an attack frequently associated with One Concern forces like Defenders, the Silver Watchman, </span><span class="spoiler" data-dcnode-id="1457" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1458" instrument_node="">Mother</span></span><span data-dcnode-id="1456" instrument_node=""> and even the Isi toolboxes that were taken over by the Controllers.</span></li><li data-dcnode-id="1450"><span data-dcnode-id="1454" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShortRangeShotgun" title="/pmwiki/pmwiki.php/Main/ShortRangeShotgun"><span data-dcnode-id="1453" instrument_node="">Short-Range Shotgun</span></a><span data-dcnode-id="1451" instrument_node="">: Handily averted by Mina’s pilfered shotgun, which has more range than any of Robin’s gun types, but absolutely no spread.</span></li><li data-dcnode-id="1445"><span data-dcnode-id="1449" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SigilSpam" title="/pmwiki/pmwiki.php/Main/SigilSpam"><span data-dcnode-id="1448" instrument_node="">Sigil Spam</span></a><span data-dcnode-id="1446" instrument_node="">: Everything belonging to One Concern has their hollow triangle symbol plastered all over it.</span></li><li data-dcnode-id="1434"><span data-dcnode-id="1444" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SignpostTutorial" title="/pmwiki/pmwiki.php/Main/SignpostTutorial"><span data-dcnode-id="1443" instrument_node="">Signpost Tutorial</span></a><span data-dcnode-id="1441" instrument_node="">: By means of signs that you walk past that expand to show how to perform commands. Some reappear in </span><span class="spoiler" data-dcnode-id="1439" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1440" instrument_node="">The Tower</span></span><span data-dcnode-id="1438" instrument_node=""> to serve as reminders as you </span><span class="spoiler" data-dcnode-id="1436" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1437" instrument_node="">recollect your equipment</span></span><span data-dcnode-id="1435" instrument_node="">.</span></li><li data-dcnode-id="1429"><span data-dcnode-id="1433" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SkeletonMotif" title="/pmwiki/pmwiki.php/Main/SkeletonMotif"><span data-dcnode-id="1432" instrument_node="">Skeleton Motif</span></a><span data-dcnode-id="1430" instrument_node="">: Seen in the second and third boss of the game - the One Concern's Kerthunk mech and Isi's Kibuka walker. Even though they are made by two diametrically opposed sides of the conflict, and fight in a different manner, both still feature a body section shaped like a skull.</span></li><li data-dcnode-id="1419"><span data-dcnode-id="1428" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmallGirlBigGun" title="/pmwiki/pmwiki.php/Main/SmallGirlBigGun"><span data-dcnode-id="1427" instrument_node="">Small Girl, Big Gun</span></a><span data-dcnode-id="1425" instrument_node="">: Robin wields a massive wrench, although her actual </span><em data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">gun</span></em><span data-dcnode-id="1422" instrument_node=""> is appropriately sized, as is Mina's shotgun. </span><span class="spoiler" data-dcnode-id="1420" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1421" instrument_node="">Agent Black, however, shows up for her rematch wielding a rocket launcher with a length that's nearly double her height. Considering that she's Transcended though, it still works.</span></span></li><li data-dcnode-id="1406"><span data-dcnode-id="1418" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmugSuper" title="/pmwiki/pmwiki.php/Main/SmugSuper"><span data-dcnode-id="1417" instrument_node="">Smug Super</span></a><span data-dcnode-id="1415" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkWithAHeartOfGold" title="/pmwiki/pmwiki.php/Main/JerkWithAHeartOfGold"><span data-dcnode-id="1414" instrument_node="">As polite as he's capable of being</span></a><span data-dcnode-id="1412" instrument_node="">, Royal has pretty clearly let his psionic powers influence how he perceives others. </span><span class="spoiler" data-dcnode-id="1407" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1411" instrument_node="">Mother doesn't display this nearly as openly, </span><a class="twikilink" data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImpliedTrope" title="/pmwiki/pmwiki.php/Main/ImpliedTrope"><span data-dcnode-id="1410" instrument_node="">but the fact that she seems pretty comfortable with everyone else being considered lesser than her has to indicate something about her personality</span></a><span data-dcnode-id="1408" instrument_node="">.</span></span></li><li data-dcnode-id="1398"><span data-dcnode-id="1405" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoapOperaDisease" title="/pmwiki/pmwiki.php/Main/SoapOperaDisease"><span data-dcnode-id="1404" instrument_node="">Soap Opera Disease</span></a><span data-dcnode-id="1402" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1400" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1401" instrument_node="">Dr. Gustavo</span></span><span data-dcnode-id="1399" instrument_node=""> has an unspecified genetic disease, which makes him somewhat of a social outcast among the Isi since their culture highly values procreation and he refuses to have children since they would inherit his disease.</span></li><li data-dcnode-id="1387"><span data-dcnode-id="1397" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheSocialDarwinist" title="/pmwiki/pmwiki.php/Main/TheSocialDarwinist"><span data-dcnode-id="1396" instrument_node="">The Social Darwinist</span></a><span data-dcnode-id="1394" instrument_node="">: Lawrence takes a full tilt into this after </span><span class="spoiler" data-dcnode-id="1392" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1393" instrument_node="">Mother's death</span></span><span data-dcnode-id="1391" instrument_node="">. By the time he's </span><span class="spoiler" data-dcnode-id="1389" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1390" instrument_node="">confronted by Elro</span></span><span data-dcnode-id="1388" instrument_node="">, he's gleefully shot multiple One Concern soldiers and executes the last one point-blank while giving a speech on how they must become ever stronger to be the best protectors. He continues to spout quotes of this nature all the way through his battle.</span></li><li data-dcnode-id="1379"><span data-dcnode-id="1386" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpinAttack" title="/pmwiki/pmwiki.php/Main/SpinAttack"><span data-dcnode-id="1385" instrument_node="">Spin Attack</span></a><span data-dcnode-id="1383" instrument_node="">: In the Possessed Thunk fight </span><span class="spoiler" data-dcnode-id="1381" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1382" instrument_node="">the Silver Watchman it controls</span></span><span data-dcnode-id="1380" instrument_node=""> swings his sword so fast he resembles a buzzsaw, especially since he's hanging on a string a few feet off the ground the whole time.</span></li><li data-dcnode-id="1371"><span data-dcnode-id="1378" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheSpiny" title="/pmwiki/pmwiki.php/Main/TheSpiny"><span data-dcnode-id="1377" instrument_node="">The Spiny</span></a><span data-dcnode-id="1375" instrument_node="">: The first enemies encountered are small spiny creatures called Pluro, which can't be stomped at, but are easily shot or defeated with a wrench.</span><ul data-dcnode-id="1372"><li data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node=""> Then, there are the Squints, which are much stronger enemies of this nature encountered in the Isilugar Depths. They are heavily armored, and positioned in such a way that simply stunning them with a bomb shot still leaves their spiny backs blocking the path. Instead, you must curve it in such a way that it detonates the explosive tip of their tail.</span></li></ul></li><li data-dcnode-id="1358"><span data-dcnode-id="1370" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StealthBasedMission" title="/pmwiki/pmwiki.php/Main/StealthBasedMission"><span data-dcnode-id="1369" instrument_node="">Stealth-Based Mission</span></a><span data-dcnode-id="1367" instrument_node="">:</span><ul data-dcnode-id="1359"><li data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node=""> Early in the game, Robin has to escape from jail by crawling through the community center’s attic. The Concern soldiers having a break near the bar will periodically laugh loudly at each other’s crude jokes, allowing Robin to crawl forward unheard until she can get away.</span></li><li data-dcnode-id="1360"><span data-dcnode-id="1364" instrument_node=""> The fight with </span><span class="spoiler" data-dcnode-id="1362" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1363" instrument_node="">Ash</span></span><span data-dcnode-id="1361" instrument_node=""> is a stealth-based boss. The boss is invisible, and if he sees Robin or Mina out of hiding, he’ll rush to them (regardless of who the player is controlling) and slam them into the ground for unavoidable damage. To deal damage, the duo has to stay in hiding spots (there are bushes and puddles to hide in, but Mina can only hide in puddles) until he starts wandering around; his location is signaled by sound waves and rustling grass, and he’s vulnerable to attack at this time.</span></li></ul></li><li data-dcnode-id="1350"><span data-dcnode-id="1357" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StupidityIsTheOnlyOption" title="/pmwiki/pmwiki.php/Main/StupidityIsTheOnlyOption"><span data-dcnode-id="1356" instrument_node="">Stupidity Is the Only Option</span></a><span data-dcnode-id="1354" instrument_node="">: Sure, Elro, let's ask your sister to repair the technology in your home, as is explicitly forbidden and punished to death by One Concern, right when the One Concern agents are around the place, and not, say, a couple days later! It's particularly galling given that Black and the rest were in a rush, and would have soon had to leave to meet Royal at Chrome's camp, while he wanted repairs done </span><em data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">for the winter</span></em><span data-dcnode-id="1351" instrument_node="">, so there was absolutely no rush.</span></li><li data-dcnode-id="1339"><span data-dcnode-id="1349" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheStoic" title="/pmwiki/pmwiki.php/Main/TheStoic"><span data-dcnode-id="1348" instrument_node="">The Stoic</span></a><span data-dcnode-id="1346" instrument_node="">: Agent Black, whose main emotions seem to be apathy and annoyance. Though battles against her late in the game prove she's </span><a class="twikilink" data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotSoStoic" title="/pmwiki/pmwiki.php/Main/NotSoStoic"><span data-dcnode-id="1345" instrument_node="">Not So Stoic</span></a><span data-dcnode-id="1343" instrument_node=""> when she starts having a </span><a class="twikilink" data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainousBreakdown" title="/pmwiki/pmwiki.php/Main/VillainousBreakdown"><span data-dcnode-id="1342" instrument_node="">Villainous Breakdown</span></a><span data-dcnode-id="1340" instrument_node="">.</span></li><li data-dcnode-id="1331"><span data-dcnode-id="1338" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SurroundedByIdiots" title="/pmwiki/pmwiki.php/Main/SurroundedByIdiots"><span data-dcnode-id="1337" instrument_node="">Surrounded by Idiots</span></a><span data-dcnode-id="1335" instrument_node="">: Agent Black's habitual attitude. It's not so much that she's actually smarter as a combination of a permanent migraine (duplicating the usual effect of the trope) and having no real ideology beyond her job of </span><em data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">keeping things functioning</span></em><span data-dcnode-id="1332" instrument_node=""> while being surrounded by idealists who believe nothing should be done except in accordance with their personal value system or religion.</span></li><li data-dcnode-id="1326"><span data-dcnode-id="1330" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TacticalSuicideBoss" title="/pmwiki/pmwiki.php/Main/TacticalSuicideBoss"><span data-dcnode-id="1329" instrument_node="">Tactical Suicide Boss</span></a><span data-dcnode-id="1327" instrument_node="">: In its first phase, the Kerthunk boss can only be damaged when it throws its metal arm upwards, exposing a bolt that can be cranked to reveal its weak spot (which Mina shoots).</span></li><li data-dcnode-id="1309"><span data-dcnode-id="1325" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TechnicalPacifist" title="/pmwiki/pmwiki.php/Main/TechnicalPacifist"><span data-dcnode-id="1324" instrument_node="">Technical Pacifist</span></a><span data-dcnode-id="1322" instrument_node="">: All of Robin's attacks only kill </span><a class="twikilink" data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatMeasureIsANonHuman" title="/pmwiki/pmwiki.php/Main/WhatMeasureIsANonHuman"><span data-dcnode-id="1321" instrument_node="">the local wildlife</span></a><span data-dcnode-id="1319" instrument_node="">, and destroy </span><a class="twikilink" data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MechaMooks" title="/pmwiki/pmwiki.php/Main/MechaMooks"><span data-dcnode-id="1318" instrument_node="">robotic enemies and machines</span></a><span data-dcnode-id="1316" instrument_node="">. Human enemies are merely knocked out, with visible </span><a class="twikilink" data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CirclingBirdies" title="/pmwiki/pmwiki.php/Main/CirclingBirdies"><span data-dcnode-id="1315" instrument_node="">circling stars</span></a><span data-dcnode-id="1313" instrument_node=""> above their heads. </span><span class="spoiler" data-dcnode-id="1311" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1312" instrument_node="">Throughout the entire story, she only ever directly kills one person out of necessity: Agent Black</span></span><span data-dcnode-id="1310" instrument_node="">. In contrast, Mina's shotgun and Elro's sword actually do kill human enemies.</span></li><li data-dcnode-id="1304"><span data-dcnode-id="1308" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TeleportSpam" title="/pmwiki/pmwiki.php/Main/TeleportSpam"><span data-dcnode-id="1307" instrument_node="">Teleport Spam</span></a><span data-dcnode-id="1305" instrument_node="">: The Silver Watchman's main ability, which he uses to dodge your attacks as well as close the distance to strike with his sword.</span></li><li data-dcnode-id="1296"><span data-dcnode-id="1303" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TennisBoss" title="/pmwiki/pmwiki.php/Main/TennisBoss"><span data-dcnode-id="1302" instrument_node="">Tennis Boss</span></a><span data-dcnode-id="1300" instrument_node="">: Happens in the first phases of the Possessed Thunk boss fight where </span><span class="spoiler" data-dcnode-id="1298" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1299" instrument_node="">you have to knock back the charged projectile generated by the possessed Silver Watchman, which he can also knock back to you a couple of times before failing at that.</span></span><span data-dcnode-id="1297" instrument_node=""> Then again, you can just jump upwards to dodge that attack entirely.</span></li><li data-dcnode-id="1255"><span data-dcnode-id="1295" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThemeNaming" title="/pmwiki/pmwiki.php/Main/ThemeNaming"><span data-dcnode-id="1294" instrument_node="">Theme Naming</span></a><span data-dcnode-id="1292" instrument_node="">:</span><ul data-dcnode-id="1256"><li data-dcnode-id="1284"><span data-dcnode-id="1291" instrument_node=""> Every Transcended that isn't a </span><a class="twikilink" data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MouthOfSauron" title="/pmwiki/pmwiki.php/Main/MouthOfSauron"><span data-dcnode-id="1290" instrument_node="">Medium</span></a><span data-dcnode-id="1288" instrument_node=""> is named after a shade of grey: Black, White, Ash, Silver, Chrome and, er, </span><a class="twikilink" data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShapedLikeItself" title="/pmwiki/pmwiki.php/Main/ShapedLikeItself"><span data-dcnode-id="1287" instrument_node="">Grey</span></a><span data-dcnode-id="1285" instrument_node="">.</span></li><li data-dcnode-id="1270"><span data-dcnode-id="1283" instrument_node=""> The Reborns appear to be named after famous scientists: </span><a class="urllink" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dmitri_Mendeleev"><span data-dcnode-id="1282" instrument_node="">Mendeleev</span><img data-dcnode-id="1281" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1279" instrument_node="">, </span><a class="urllink" data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Nobel"><span data-dcnode-id="1278" instrument_node="">Nobel</span><img data-dcnode-id="1277" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1275" instrument_node="">, and </span><a class="urllink" data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ernest_Lawrence"><span data-dcnode-id="1274" instrument_node="">Lawrence</span><img data-dcnode-id="1273" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1271" instrument_node="">. Elements 101, 102 and 103 of the periodic table are named after these scientists, furthering the shared theme.</span></li><li data-dcnode-id="1257"><span data-dcnode-id="1269" instrument_node=""> All the areas in the game are named after one of the One Concern's human officials:</span><ul data-dcnode-id="1258"><li data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node=""> Blockrock - Bea Blockrock</span></li><li data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node=""> Glass Strait - Joseph Glass</span></li><li data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node=""> Shard Desert - Oliver Shard</span></li><li data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node=""> Ferrier Shockwood - Aisling Ferrier</span></li><li data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node=""> Darland Ascent - Emmet Darland</span></li></ul></li></ul></li><li data-dcnode-id="1241"><span data-dcnode-id="1254" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TomboyAndGirlyGirl" title="/pmwiki/pmwiki.php/Main/TomboyAndGirlyGirl"><span data-dcnode-id="1253" instrument_node="">Tomboy and Girly Girl</span></a><span data-dcnode-id="1251" instrument_node="">: Mina and Robin. Mina carries a large shotgun, </span><a class="twikilink" data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PistolWhip" title="/pmwiki/pmwiki.php/Main/PistolWhip"><span data-dcnode-id="1250" instrument_node="">bashes things with the butt of her gun</span></a><span data-dcnode-id="1248" instrument_node="">, has enough body odor that a trained hunter can track by scent, and gets angry a lot. Her chosen profession at the start of the game is wandering the world looking for stuff to steal as a thief. Robin may be a mechanic with an oversized wrench, but also </span><a class="twikilink" data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TechnicalPacifist" title="/pmwiki/pmwiki.php/Main/TechnicalPacifist"><span data-dcnode-id="1247" instrument_node="">carries a small stun pistol</span></a><span data-dcnode-id="1245" instrument_node="">, apparently bathes regularly, gets flustered and scared far more easily, and dolls up her hair. Her chosen profession at the start of the game is to fix up and nurture a settlement near where she lives. This distinction is on display in the fight against </span><span class="spoiler" data-dcnode-id="1243" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1244" instrument_node="">Mother, wherein Robin counters and dodges Mother's attacks, occasionally stunning Mother and pulling her out from protection while Mina is the one to do the actual damage against her by shoving seeds into her body, after Robin has made her vulnerable</span></span><span data-dcnode-id="1242" instrument_node="">.</span></li><li data-dcnode-id="1234"><span data-dcnode-id="1240" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ToneShift" title="/pmwiki/pmwiki.php/Main/ToneShift"><span data-dcnode-id="1239" instrument_node="">Tone Shift</span></a><span data-dcnode-id="1237" instrument_node="">: Agent Black heralds the more serious parts of the story. </span><span class="spoiler" data-dcnode-id="1235" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1236" instrument_node="">Especially once she rips off Elro's arm with her bare hands. That's where the story really takes a turn for the darker.</span></span></li><li data-dcnode-id="1229"><span data-dcnode-id="1233" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TurnsRed" title="/pmwiki/pmwiki.php/Main/TurnsRed"><span data-dcnode-id="1232" instrument_node="">Turns Red</span></a><span data-dcnode-id="1230" instrument_node="">: Averted. Most bosses tend to become weaker as the battle goes, forced to use less effective and impressive attacks as they become more and more damaged.</span></li><li data-dcnode-id="1222"><span data-dcnode-id="1228" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnderwaterBase" title="/pmwiki/pmwiki.php/Main/UnderwaterBase"><span data-dcnode-id="1227" instrument_node="">Underwater Base</span></a><span data-dcnode-id="1225" instrument_node="">: Pretty much what Isilugar is. </span><span class="spoiler" data-dcnode-id="1223" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1224" instrument_node="">It's implied that it was a former colony ship used to settle this planet by humans from the original Earth.</span></span></li><li data-dcnode-id="1206"><span data-dcnode-id="1221" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UndyingLoyalty" title="/pmwiki/pmwiki.php/Main/UndyingLoyalty"><span data-dcnode-id="1220" instrument_node="">Undying Loyalty</span></a><span data-dcnode-id="1218" instrument_node="">: The basic One Concern </span><a class="twikilink" data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mooks" title="/pmwiki/pmwiki.php/Main/Mooks"><span data-dcnode-id="1217" instrument_node="">Mooks</span></a><span data-dcnode-id="1215" instrument_node=""> all have complete loyalty to General Chrome, and refuse to let anyone but Chrome and possibly his </span><a class="twikilink" data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NumberTwo" title="/pmwiki/pmwiki.php/Main/NumberTwo"><span data-dcnode-id="1214" instrument_node="">Number Two</span></a><span data-dcnode-id="1212" instrument_node=""> Tolo order them around. Not the </span><a class="twikilink" data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EliteMooks" title="/pmwiki/pmwiki.php/Main/EliteMooks"><span data-dcnode-id="1211" instrument_node="">Elite Mooks</span></a><span data-dcnode-id="1209" instrument_node=""> of the Bastion, not the Agents, not even Mother herself. </span><span class="spoiler" data-dcnode-id="1207" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1208" instrument_node="">They all universally back Chrome when he rebels against Mother, and go to war against Bastion Elites, who were loyal only to Mother herself. Even after Chrome dies, the end-game credits show the few surviving ones paying respects at his grave.</span></span></li><li data-dcnode-id="1195"><span data-dcnode-id="1205" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheUnfought" title="/pmwiki/pmwiki.php/Main/TheUnfought"><span data-dcnode-id="1204" instrument_node="">The Unfought</span></a><span data-dcnode-id="1202" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1200" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1201" instrument_node="">General Chrome</span></span><span data-dcnode-id="1199" instrument_node=""> is never fought in true combat. </span><span class="spoiler" data-dcnode-id="1197" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1198" instrument_node="">He rides on the helicopter that you fight at the end of Shard Wasteland, but all he does is quote One Concern scripture while the helicopter is piloted by a generic Mook. He is ultimately killed by Elro’s serum at the end of City One</span></span><span data-dcnode-id="1196" instrument_node="">.</span></li><li data-dcnode-id="1184"><span data-dcnode-id="1194" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnexpectedlyRealisticGameplay" title="/pmwiki/pmwiki.php/Main/UnexpectedlyRealisticGameplay"><span data-dcnode-id="1193" instrument_node="">Unexpectedly Realistic Gameplay</span></a><span data-dcnode-id="1191" instrument_node="">: Swimming of all things follows real-life rules. You can mash the jump button to swim faster, but your </span><a class="twikilink" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OxygenMeter" title="/pmwiki/pmwiki.php/Main/OxygenMeter"><span data-dcnode-id="1190" instrument_node="">Oxygen Meter</span></a><span data-dcnode-id="1188" instrument_node=""> will deplete more quickly. By swimming at your default, agonizingly slow speed, you conserve oxygen much better and can cover far more distance. The game never tells you this, </span><span class="spoiler" data-dcnode-id="1186" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1187" instrument_node="">and knowing it is required to reach Fitzroy. It's impossible even with three Breathlesses equipped if you mash</span></span><span data-dcnode-id="1185" instrument_node="">.</span></li><li data-dcnode-id="1171"><span data-dcnode-id="1183" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UngratefulBastard" title="/pmwiki/pmwiki.php/Main/UngratefulBastard"><span data-dcnode-id="1182" instrument_node="">Ungrateful Bastard</span></a><span data-dcnode-id="1180" instrument_node="">: You'd think </span><span class="spoiler" data-dcnode-id="1178" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1179" instrument_node="">the Silver Watchman</span></span><span data-dcnode-id="1177" instrument_node=""> would be a little more grateful that you </span><span class="spoiler" data-dcnode-id="1175" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1176" instrument_node="">freed him from his blue eye possession</span></span><span data-dcnode-id="1174" instrument_node="">. He still tries to kill you again the next time you see him, but quickly subverted when he planted his sword to the ground, a common visual shorthand of a warrior's salute. </span><span class="spoiler" data-dcnode-id="1172" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1173" instrument_node="">Pity Royal came crashing on him, and drowned him.</span></span></li><li data-dcnode-id="1161"><span data-dcnode-id="1170" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainHasAPoint" title="/pmwiki/pmwiki.php/Main/VillainHasAPoint"><span data-dcnode-id="1169" instrument_node="">Villain Has a Point</span></a><span data-dcnode-id="1167" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1162" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1166" instrument_node="">Towards the end of the game, Black calls out Robin for her brother Elro "think[ing] he has enemies all around him", which is fairly valid considering he mistrusts everyone Robin meets and killed </span><a class="twikilink" data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TokenGoodTeammate" title="/pmwiki/pmwiki.php/Main/TokenGoodTeammate"><span data-dcnode-id="1165" instrument_node="">the friendly Agent Gray</span></a><span data-dcnode-id="1163" instrument_node=""> with no prompting.</span></span></li><li data-dcnode-id="1151"><span data-dcnode-id="1160" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VomitIndiscretionShot" title="/pmwiki/pmwiki.php/Main/VomitIndiscretionShot"><span data-dcnode-id="1159" instrument_node="">Vomit Indiscretion Shot</span></a><span data-dcnode-id="1157" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1152" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1156" instrument_node="">Agent Black pukes up Ivory rocket fuel multiple times during the second battle against her, after drinking it in an attempt to keep her </span><a class="twikilink" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HealingFactor" title="/pmwiki/pmwiki.php/Main/HealingFactor"><span data-dcnode-id="1155" instrument_node="">Healing Factor</span></a><span data-dcnode-id="1153" instrument_node=""> going and stay on her feet after you've shoved multiple Isi seeds into her.</span></span></li><li data-dcnode-id="1146"><span data-dcnode-id="1150" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WalkingShirtlessScene" title="/pmwiki/pmwiki.php/Main/WalkingShirtlessScene"><span data-dcnode-id="1149" instrument_node="">Walking Shirtless Scene</span></a><span data-dcnode-id="1147" instrument_node="">: Chrome. Some of the Isi men also wear open shirts.</span></li><li data-dcnode-id="1136"><span data-dcnode-id="1145" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WellIntentionedExtremist" title="/pmwiki/pmwiki.php/Main/WellIntentionedExtremist"><span data-dcnode-id="1144" instrument_node="">Well-Intentioned Extremist</span></a><span data-dcnode-id="1142" instrument_node="">: Even the most tyrannical of One Concern's rules do have a reasoning behind them. Executing the unlicensed mechanics who work with Ivory? </span><span class="spoiler" data-dcnode-id="1140" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1141" instrument_node="">The whole planet is made of Ivory, and its consumption is causing earthquakes and will lead to the planet's crust collapsing, so they cannot allow it to happen faster than they can finish building the rockets that would take the people elsewhere.</span></span><span data-dcnode-id="1139" instrument_node=""> Making cartography a capital crime as well? </span><span class="spoiler" data-dcnode-id="1137" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1138" instrument_node="">The planet is artificial, and it's constantly changing due to the Omega Controller, who was left behind by the Star Worm itself and so cannot be touched for fear of summoning it. There are even hints that the Omega Controller can trigger Penance itself to cover up its own existence.</span></span></li><li data-dcnode-id="1115"><span data-dcnode-id="1135" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatHappenedToTheMouse" title="/pmwiki/pmwiki.php/Main/WhatHappenedToTheMouse"><span data-dcnode-id="1134" instrument_node="">What Happened to the Mouse?</span></a><span data-dcnode-id="1132" instrument_node="">: There are quite a number of NPCs and side characters that are briefly seen but never mentioned again. For example:</span><ul data-dcnode-id="1116"><li data-dcnode-id="1127"><span data-dcnode-id="1131" instrument_node=""> Thor and Thandie finally manage to reach City One, </span><span class="spoiler" data-dcnode-id="1129" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1130" instrument_node="">right on the same day civil war breaks out between Chrome and Mother's factions.</span></span><span data-dcnode-id="1128" instrument_node=""> They are never seen or mentioned again.</span></li><li data-dcnode-id="1122"><span data-dcnode-id="1126" instrument_node=""> We never see any sort of resolution regarding </span><span class="spoiler" data-dcnode-id="1124" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1125" instrument_node="">Mina's strained relationship with her mother</span></span><span data-dcnode-id="1123" instrument_node="">.</span></li><li data-dcnode-id="1117"><span data-dcnode-id="1121" instrument_node=""> The last we see of </span><span class="spoiler" data-dcnode-id="1119" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1120" instrument_node="">Royal, Robin is forced to leave him behind in the decompressing Midway moonbase. It's not clear if he actually died or not, but seeing as he's effectively immortal with the only known methods of permanently dispatching him being the seeds or Elro's serum, it's highly likely he's still stranded up there, dying and regenerating endlessly</span></span><span data-dcnode-id="1118" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1104"><span data-dcnode-id="1114" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhereItAllBegan" title="/pmwiki/pmwiki.php/Main/WhereItAllBegan"><span data-dcnode-id="1113" instrument_node="">Where It All Began</span></a><span data-dcnode-id="1111" instrument_node="">: The entrance to the last stretch of the game before the </span><a class="twikilink" data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="1110" instrument_node="">Final Boss</span></a><span data-dcnode-id="1108" instrument_node=""> opens up in the exact same spot where you fought the very </span><em data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">first</span></em><span data-dcnode-id="1105" instrument_node=""> boss.</span></li><li data-dcnode-id="1079"><span data-dcnode-id="1103" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhoWantsToLiveForever" title="/pmwiki/pmwiki.php/Main/WhoWantsToLiveForever"><span data-dcnode-id="1102" instrument_node="">Who Wants to Live Forever?</span></a><span data-dcnode-id="1100" instrument_node="">:</span><ul data-dcnode-id="1080"><li data-dcnode-id="1089"><span data-dcnode-id="1099" instrument_node=""> A </span><a class="twikilink" data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="1098" instrument_node="">Bonus Boss</span></a><span data-dcnode-id="1096" instrument_node=""> says something to this effect. </span><span class="spoiler" data-dcnode-id="1094" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1095" instrument_node="">Leticia sure doesn't, as noted when Robin defeats Fitzroy</span></span><span data-dcnode-id="1093" instrument_node="">.</span><div class="indent" data-dcnode-id="1090"><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">"Eternity" is only the dream of irresponsible children. Nothing with a propensity for fear would ever endure eternity.</span></em></div></li><li data-dcnode-id="1081"><span data-dcnode-id="1088" instrument_node=""> As revealed right before the last fight with Agent Black, </span><span class="spoiler" data-dcnode-id="1083" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1087" instrument_node="">she's tried to kill herself multiple times, but she always keeps coming back to life, which has pushed her over the edge mentally. It takes a </span><a class="twikilink" data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RasputinianDeath" title="/pmwiki/pmwiki.php/Main/RasputinianDeath"><span data-dcnode-id="1086" instrument_node="">Rasputinian Death</span></a><span data-dcnode-id="1084" instrument_node=""> to get rid of her</span></span><span data-dcnode-id="1082" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1074"><span data-dcnode-id="1078" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhyDontYouJustShootHim" title="/pmwiki/pmwiki.php/Main/WhyDontYouJustShootHim"><span data-dcnode-id="1077" instrument_node="">Why Don't You Just Shoot Him?</span></a><span data-dcnode-id="1075" instrument_node="">: Agent Black nearly says this word-for-word when Chrome insists on going through an unnecessary execution scene.</span></li><li data-dcnode-id="1067"><span data-dcnode-id="1073" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldHealingWave" title="/pmwiki/pmwiki.php/Main/WorldHealingWave"><span data-dcnode-id="1072" instrument_node="">World-Healing Wave</span></a><span data-dcnode-id="1070" instrument_node="">: One occurs after </span><span class="spoiler" data-dcnode-id="1068" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1069" instrument_node="">Robin injects an Isi seed into Star Worm's corpse, which contained extraordinary amounts of Ivory. This causes natural, "round" plants, rather than the artificial square ones, to sprout all over the planet. It had also stopped the earthquakes, which were a precursor to the planet's crust collapsing apart due to being weakened by Ivory mining.</span></span></li><li data-dcnode-id="1062"><span data-dcnode-id="1066" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WrenchWench" title="/pmwiki/pmwiki.php/Main/WrenchWench"><span data-dcnode-id="1065" instrument_node="">Wrench Wench</span></a><span data-dcnode-id="1063" instrument_node="">: The heroine, Robin, to the point of having a gigantic wrench that is used for most of the gameplay.</span></li><li data-dcnode-id="1057"><span data-dcnode-id="1061" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/XRaySparks" title="/pmwiki/pmwiki.php/Main/XRaySparks"><span data-dcnode-id="1060" instrument_node="">X-Ray Sparks</span></a><span data-dcnode-id="1058" instrument_node="">: Mendeleev gets zapped in this manner if she falls into an electricity bar during her fight.</span></li><li data-dcnode-id="1050"><span data-dcnode-id="1056" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouAreInCommandNow" title="/pmwiki/pmwiki.php/Main/YouAreInCommandNow"><span data-dcnode-id="1055" instrument_node="">You Are in Command Now</span></a><span data-dcnode-id="1053" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1051" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1052" instrument_node="">Tolo inherits command of what remains of Chrome's forces after Chrome's death.</span></span></li><li data-dcnode-id="1043"><span data-dcnode-id="1049" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YourHeadAsplode" title="/pmwiki/pmwiki.php/Main/YourHeadAsplode"><span data-dcnode-id="1048" instrument_node="">Your Head Asplode</span></a><span data-dcnode-id="1046" instrument_node="">: The demise of </span><span class="spoiler" data-dcnode-id="1044" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1045" instrument_node="">Agent Black's final form, preceded by her uttering "HEAD... ACHE..." for one final time.</span></span></li><li data-dcnode-id="1036"><span data-dcnode-id="1042" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouKilledMyFather" title="/pmwiki/pmwiki.php/Main/YouKilledMyFather"><span data-dcnode-id="1041" instrument_node="">You Killed My Father</span></a><span data-dcnode-id="1039" instrument_node="">: Though it's not exactly clear what caused the death of Robin and Elro's father, Elro clearly lays the blame on the Concern. </span><span class="spoiler" data-dcnode-id="1037" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1038" instrument_node="">This is what causes him to create his anti-Ivory chemical which he uses to kill Agent Grey.</span></span></li><li data-dcnode-id="1027"><span data-dcnode-id="1035" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZeroEffortBoss" title="/pmwiki/pmwiki.php/Main/ZeroEffortBoss"><span data-dcnode-id="1034" instrument_node="">Zero-Effort Boss</span></a><span data-dcnode-id="1032" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1028" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1031" instrument_node="">The final shadow creature during the final boss's first phase (Black) can be shot without any resistance. </span><a class="twikilink" data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DevelopersForesight" title="/pmwiki/pmwiki.php/Main/DevelopersForesight"><span data-dcnode-id="1030" instrument_node="">If the player lets it crawl to the other side, it ends up exploding anyway.</span></a></span></li></ul><hr data-dcnode-id="1025"><span data-dcnode-id="1024" instrument_node="">
