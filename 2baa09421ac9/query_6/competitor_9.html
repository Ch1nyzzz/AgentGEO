 data-dcnode-id="2341" instrument_node="">Don't blame or scold them.</span></span></li><li class="q-relative" data-dcnode-id="2336" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2337" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2338" instrument_node="">Don't just give hopes but also suggest a way to solve it.</span></span></li><li class="q-relative" data-dcnode-id="2333" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2334" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2335" instrument_node="">Try to highlight the possible available ways to solve it.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2329" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2330" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2331" instrument_node="">One of my student, I took a three days behavioural session for him, after failing in the main assessments, he was given a last chance to clear it, if not he has to resign as per company policy.</span></span></p><span data-dcnode-id="2328" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2325" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2326" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2327" instrument_node="">Two days before his exam (last chance) he contacted me and said he wants to talk something important. When I saw him, I saw a totally different person, not the one whom I met during that behavioural session.</span></span></p><span data-dcnode-id="2324" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2321" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2322" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2323" instrument_node="">He used to be very active, smiling, giggling, happy all the time and now his face is expressionless, I couldn't even hear him. He started saying things slowly</span></span></p><span data-dcnode-id="2320" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2313" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2318" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2319" instrument_node="">“</span></span><span data-dcnode-id="2316" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2317" instrument_node="">Mam I couldn't get the required marks to clear the exam, in 0.2 marks I failed and I need to retake the test and that will be my last chance.</span></span><span data-dcnode-id="2314" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2315" instrument_node="">”</span></span></p><span data-dcnode-id="2312" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2309" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2310" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2311" instrument_node="">I didn't know what to say because I am in no position to help him, I teach a different language, he is getting trained in a different language on which I have no idea. I don't even understand why did he contact me all of a sudden and telling all this, knowing that I can't do anything about it.</span></span></p><span data-dcnode-id="2308" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2305" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2306" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2307" instrument_node="">I asked him what I can do for him.</span></span></p><span data-dcnode-id="2304" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2297" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2302" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2303" instrument_node="">“</span></span><span data-dcnode-id="2300" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2301" instrument_node="">For the past few days, I am in depression. I couldn't eat or sleep properly. I am trying my best, every time I did lot of hard work and yet am failing. I couldn't accept this. If I leave this job, its very difficult. My family..</span></span><span data-dcnode-id="2298" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2299" instrument_node="">”</span></span></p><span data-dcnode-id="2296" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2293" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2294" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2295" instrument_node="">When he said the word depression, I understood what he wanted, what's happening to him, I listened to whatever he had to say. Whenever he came to see me or called me, this is what I told him</span></span></p><span data-dcnode-id="2292" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2289" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2290" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2291" instrument_node="">Don't think anything negative, don't decide anything, you did a lot of hard work, it will not let you down, just stay calm for the next two days, try to concentrate on the topics where you couldn't score much last time, and whatever happens don't lose hope. Don't give up on yourself, I know you are a good learner, give it a try one more time.</span></span></p><span data-dcnode-id="2288" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2283" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2286" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2287" instrument_node="">“</span></span><span data-dcnode-id="2284" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2285" instrument_node="">What if I couldn't clear this time also.. ?”</span></span></p><span data-dcnode-id="2282" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2277" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2280" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2281" instrument_node="">You will clear. You are going to get that required marks. Trust your hard work and have faith in god. I will pray for you</span></span><span data-dcnode-id="2278" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2279" instrument_node="">.</span></span></p><span data-dcnode-id="2276" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2273" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2274" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2275" instrument_node="">That's all I could say to him everytime. I listened to him and said “you will clear, definitely you will clear.” And I gave him few suggestions on how can he prepare for the exam to get maximum marks. That's all.</span></span></p><span data-dcnode-id="2272" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2269" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2270" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2271" instrument_node="">Yesterday he got his final results. He cleared and he sent me this message.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2266" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="2267" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="2268" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-ee758051ed436c8ed7dfc10bf84b3123-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2263" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2264" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2265" instrument_node="">I helped and supported him only by listening to him, giving him hopes.</span></span></p><span data-dcnode-id="2262" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2255" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2260" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2261" instrument_node="">The best thing you can do to someone who needs help, even if you can't really help them is “</span></span><span data-dcnode-id="2258" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="2259" instrument_node="">Listen to them and tell them they are going to make it</span></span><span data-dcnode-id="2256" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2257" instrument_node="">.”</span></span></p><span data-dcnode-id="2254" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2251" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2252" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2253" instrument_node="">Akshaya Yuva,</span></span></p><span data-dcnode-id="2250" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2247" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2248" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2249" instrument_node="">Technical Trainer, Wipro.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2170" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2171" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2172" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2186" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2213" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2214" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2224" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2225" style="box-sizing: border-box; position: relative;"><button aria-label="24 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="2226" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transition-timing-function: ease-out; border-width: 0px; outline: none; color: inherit; background-color: transparent;" tabindex="0"><di al; background: none;"><span data-dcnode-id="1952" instrument_node="">"Vahiguru is the gurmantra; by repeating it thou hast thy ego erased,"</span></span><span data-dcnode-id="1949" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1950" instrument_node=""> (Varan X111.2). In the </span></span><span class="q-inline" data-dcnode-id="1942" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sikhiwiki.org/index.php/Guru_Granth_Sahib" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.sikhiwiki.org"><span data-dcnode-id="1948" instrument_node="">Guru Granth Sahib</span></a><span class="q-inlineBlock" data-dcnode-id="1943" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1944"><svg data-dcnode-id="1945" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1946" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1940" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1941" instrument_node="">, the gurmantra to be practised is referred to as nam, i.e. the Divine Name. Absorption in nam, i.e. constant remembrance of God's Name is repeatedly recommended. "All gains—spiritual and material—flow from concentration on nam" (GG, 290). "Gather the riches of God's Name; thus wilt thou earn honour in the hereafter," (GG, 1311). "Grant me the merit (O God) of remaining attached to thy Name." This nam, according to </span></span><span class="q-inline" data-dcnode-id="1933" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sikhiwiki.org/index.php/Sikh" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.sikhiwiki.org"><span data-dcnode-id="1939" instrument_node="">Sikh</span></a><span class="q-inlineBlock" data-dcnode-id="1934" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1935"><svg data-dcnode-id="1936" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1937" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1931" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1932" instrument_node=""> tradition, Guru Nanak received in a mystical experience, during his disxappearance into the Bein rivulet which is described in the </span></span><span class="q-inline" data-dcnode-id="1924" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sikhiwiki.org/index.php/Puratan_Janam_Sakhi" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.sikhiwiki.org"><span data-dcnode-id="1930" instrument_node="">Puratan Janam Sakhi</span></a><span class="q-inlineBlock" data-dcnode-id="1925" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1926"><svg data-dcnode-id="1927" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1928" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1922" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1923" instrument_node=""> in terms of a direct communion with the Divine Lord. "As the Lord willed, Nanak the devotee was escorted to His Presence. Then a cup filled with amrit (nectar) was given him with the command, 'Nanak, this is the cup of Name-adoration. Drink it. . . Go, rejoice in My Name and teach others to do so. . . I have bestowed upon thee the gift of My Name. . ." It is believed that the Name Guru Nanak revealed was Vahiguru.</span></span></p><span data-dcnode-id="1920" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1910" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1918" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1919" instrument_node="">Source: </span></span><span class="q-inline" data-dcnode-id="1911" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sikhiwiki.org/index.php/Gurmantar" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.sikhiwiki.org"><span data-dcnode-id="1917" instrument_node="">SikhiWiki, free Sikh encyclopedia.</span></a><span class="q-inlineBlock" data-dcnode-id="1912" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1913"><svg data-dcnode-id="1914" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1915" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="1909" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1898" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1907" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1908" instrument_node="">We’ve </span></span><span data-dcnode-id="1905" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1906" instrument_node="">gurbani</spa ight: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="1683" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="1684" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1701" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1704" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1705" instrument_node="">Have you thought why we say “Jaya Hey” 7–8 times in our National Anthem?</span></span><span data-dcnode-id="1702" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1703" instrument_node=""> Does it make us less patriotic? The answer is simple: We have a standard time of 52 seconds to recite National Anthem. And our National Anthem is much more than “Jaya Hey”. Those 52 seconds remind us diversity in culture of our country and thank God for sustaining such an awesome unity among such a diverse country. Those 52 seconds also remind us that we must dedicate remaining 23 hours 59 minutes and 8 seconds of rest of day for maintaining this diversity.</span></span></p><span data-dcnode-id="1700" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1697" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1698" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1699" instrument_node="">Similarly there is a standard set in reciting Ardaas and Ardaas is</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1685" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1686" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1687" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1688" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1689" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1694" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1695" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1696" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1690" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span clas -display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1671" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1672" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1673" instrument_node="">Similarly there is a standard set in reciting Ardaas and Ardaas is completed generally within 5–6 minutes. Those 5–6 minutes remind each Sikh of such a glorious history of Sikhism and how brave Sikhs laid down their lives for the sake of protecting religion, society and country. In other words, Ardaas is much more than reciting Waheguru. Ardaas reminds Sikhs about their duty to raise the standard of their lives upto the level that Sikhism demands. Waheguru signifies the importance of Guru to achieve this target.</span></span></p><span data-dcnode-id="1670" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1667" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1668" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1669" instrument_node="">Ardaas to Sikhism is like National Anthem to the country. Certainly, the Anthem can’t be made up of just 3 words!</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1590" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1591" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1592" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1606" style="box-sizing: vness(isthigfar) from lord he can carry on his life without guilty n hoping the lord almighty will forgive his sin n the next time before he commit any bad thing his conscience will confront him.but if u hurt anyone isthigfar will never help untill he personsally ask apalogize to the hurted one.untill that hurted person forgive god will not accept his forgiveness.this way both will get peacful heart n peacful life n next time he wont hurt others.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1272" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1273"><div class="q-box unzoomed" data-dcnode-id="1274" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-1c197a7a6e2e7f0e080a34362fb61f40-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1200" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1201" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1202" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1216" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1238" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1239" style="box-sizing: border-box; displa
