re rid of the darkness of worldly love." </span></span><span data-dcnode-id="5000" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5001" instrument_node="">(Guru Amar Das, Wadhans, pg. 559)</span></span></p><span data-dcnode-id="4998" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4993" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4996" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4997" instrument_node="">"The Vedas know not God's greatness. Brahmas can realize not His secrets. The incarnations know not His limit. Infinite is God, the Transcendent Lord. His state, He Himself knows. Others speak of Him from mere hearsay. Shiva knows not the Lord's way. The gods have grown weary searching for Him. The goddesses know not His mystery. Over all is the Unseen Supreme Lord." </span></span><span data-dcnode-id="4994" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4995" instrument_node="">(Guru Arjan, Ramkali, pg. 894)</span></span></p><span data-dcnode-id="4992" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4987" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4990" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4991" instrument_node="">"Reading and reciting the Vedas Brahma grew weary. He found not even a sesame's worth of God. The strivers and adepts roam about wailing. They too are bewitched by mammon. There have been ten incarnations, kings and forsakers like Shiva. They too found not Thine limit, thou some grew weary of smearing their body with ashes." </span></span><span data-dcnode-id="4988" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4989" instrument_node="">(Guru Arjan Dev, Suhi, pg. 747)</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="4986" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4913" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4914" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4915" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4929" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4951" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4952" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4962" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4963" style="box-sizing: border-box; position: relative;"><button aria-label="25 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cur ywhere; direction: ltr;"><span data-dcnode-id="4765" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4766" instrument_node="">Ram, Allah, Waheguru are not for chanting. According to the scriptures, mantras are chanted for attainment of God and salvation by taking initiation of complete Saint.</span></span></p><span data-dcnode-id="4763" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4760" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4761" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4762" instrument_node="">Amrit Vaani, Raag Aasa, Mehla 1</span></span></p><span data-dcnode-id="4759" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4756" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4757" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4758" instrument_node="">(Shri Guru Granth, page no. 420)</span></span></p><span data-dcnode-id="4755" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4742" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4743" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4754" instrument_node="">ਜਿਨ੍ਹ੍ਹੀ ਨਾਮੁ ਵਿਸਾਰਿਆ ਦੂਜੈ ਭਰਮਿ ਭੁਲਾਈ ॥</span><br data-dcnode-id="4753"><span data-dcnode-id="4752" instrument_node="">ਮੂਲੁ ਛੋਡਿ ਡਾਲੀ ਲਗੇ ਕਿਆ ਪਾਵਹਿ ਛਾਈ ॥੧॥</span><br data-dcnode-id="4751"><span data-dcnode-id="4750" instrument_node="">ਸਾਹਿਬੁ ਮੇਰਾ ਏਕੁ ਹੈ ਅਵਰੁ ਨਹੀ ਭਾਈ ॥</span><br data-dcnode-id="4749"><span data-dcnode-id="4748" instrument_node="">ਕਿਰਪਾ ਤੇ ਸੁਖੁ ਪਾਇਆ ਸਾਚੇ ਪਰਥਾਈ ॥੩॥</span><br data-dcnode-id="4747"><span data-dcnode-id="4746" instrument_node="">ਗੁਰ ਕੀ ਸੇਵਾ ਸੋ ਕਰੇ ਜਿਸੁ ਆਪਿ ਕਰਾਏ ॥</span><br data-dcnode-id="4745"><span data-dcnode-id="4744" instrument_node="">ਨਾਨਕ ਸਿਰੁ ਦੇ ਛੂਟੀਐ ਦਰਗਹ ਪਤਿ ਪਾਏ ॥੮॥੧੮॥</span></span></p><span data-dcnode-id="4741" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4738" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4739" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4740" instrument_node="">Aasa Mehla1</span></span></p><span data-dcnode-id="4737" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4734" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4735" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4736" instrument_node="">Meaning:-</span></span></p><span data-dcnode-id="4733" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4730" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4731" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4732" instrument_node="">The meaning of the above-mentioned sacred speech is that Shri Nanak Ji is saying that those who, forgetting the real naam of Purna Parmatma, are doing jaap of naams of the other gods in misapprehension, they, as if, instead of the root (Purna Parmatma) are watering (worshipping) the branches (the three Gunas, Rajgun– Brahma, Satgun–Vishnu, Tamgun–Shiv Ji). No happiness can be achieved by that sadhna, which means that the plant will dry out and you will not be able to sit in its shade. The essence is that doing baseless bhakti is a useless endeavour. There is no benefit out of it. It is also evident in Holy Gita, Adhyay 16, and Shlok 23-24.</span></span></p><span data-dcnode-id="4729" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4718" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4727" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4728" instrument_node="">To achieve that Purna Parmatma (</span></span><span data-dcnode-id="4725" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4726" instrument_node="">Kabir Saheb</span></span><span data-dcnode-id="4723" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4724" instrument_node="">), one has to leave ones imaginary sadhna, surrender to the Complete Gurudev (</span></span><span data-dcnode-id="4721" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4722" instrument_node="">Saint Rampal Ji</span></span><span data-dcnode-id="4719" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4720" instrument_node="">) and chant the true Naam/Mantra. Only then, complete liberation is possible. Otherwise, one will go to hell after death.</span></span></p><span data-dcnode-id="4717" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4714" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4715" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4716" instrument_node="">To get more information about that you may read Book like “Jeene ki Rah” (way of living)</span></span></p></span></span></div></div></div></div></div></div></div><div ata-dcnode-id="4541" instrument_node="">Nobody ‘moved the Kaaba’, such stories are silly fantasies featured in hagiographies written after he passed away, and used by family cults to gain popularity.</span></span></p><span data-dcnode-id="4538" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4535" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4536" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4537" instrument_node="">Guru Nanak is not God, and never claimed to be (he was very much against the idea).</span></span></p><span data-dcnode-id="4534" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4531" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4532" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4533" instrument_node="">He is not a prophet, and never claimed to be.</span></span></p><span data-dcnode-id="4530" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4527" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4528" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4529" instrument_node="">He is not an avatar or deity, and never claimed to be (and very much ridiculed the idea of avatars/deities being worshipped, whose magnificence is nothing compared to the one true God).</span></span></p><span data-dcnode-id="4526" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4523" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; dir a-dcnode-id="4045" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4046" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4047" instrument_node="">Uppar Valah</span></span></li><li class="q-relative" data-dcnode-id="4037" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span class="q-inline" data-dcnode-id="4038" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sikhiwiki.org/index.php%3Ftitle%3DMalik%26action%3Dedit%26redlink%3D1" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: bold; font-style: normal; background: none;" target="_blank" title="www.sikhiwiki.org"><span data-dcnode-id="4044" instrument_node="">Malik</span></a><span class="q-inlineBlock" data-dcnode-id="4039" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4040"><svg data-dcnode-id="4041" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4042" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4033" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4034" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4035" instrument_node="">and damodar and many more. The usage of different names implies everyone is directing us to meditate on one true god from where all the incarnations are derived.</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3949" style="box-sizing: border-box; position: relative; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4030" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4031" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4032" instrument_node="">ਅਵਤਾਰ ਨ ਜਾਨਹਿ ਅੰਤੁ ॥ ਪਰਮੇਸਰੁ ਪਾਰਬ੍ਰਹਮ ਬੇਅੰਤੁ ॥੧॥</span></span></p><span data-dcnode-id="4029" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4026" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4027" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4028" instrument_node="">Incarnated beings do not know His limit. The Transcendent Lord, the Supreme Lord God, is infinite. ||1|| (Guru Granth Sahib Ji, Ang 894)</span></span></p><span data-dcnode-id="4025" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4022" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4023" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4024" instrument_node="">ਜੁਗਹ ਜੁਗਹ ਕੇ ਰਾਜੇ ਕੀਏ ਗਾਵਹਿ ਕਰਿ ਅਵਤਾਰੀ ॥</span></span></p><span data-dcnode-id="4021" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4018" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4019" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4020" instrument_node="">ਤਿਨ ਭੀ ਅੰਤੁ ਨ ਪਾਇਆ ਤਾ ਕਾ ਕਿਆ ਕਰਿ ਆਖਿ ਵੀਚਾਰੀ ॥੭॥</span></span></p><span data-dcnode-id="4017" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4014" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4015" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4016" instrument_node="">In each and every age, He creates the kings, who are sung of as His Incarnations. Even they have not found His limits; what can I speak of and contemplate? ||7|| (Guru Granth Sahib Ji, Ang 422)</span></span></p><span data-dcnode-id="4013" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4008" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4009" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4012" instrument_node="">ਕੋਟਿ ਬਿਸਨ ਅਵਤਾਰ ਸੰਕਰ ਜਟਾਧਾਰ ॥</span><br data-dcnode-id="4011"><span data-dcnode-id="4010" instrument_node=""> ਚਾਹਹਿ ਤੁਝਹਿ ਦਇਆਰ ਮਨਿ ਤਨਿ ਰੁਚ ਅਪਾਰ ॥</span></span></p><span data-dcnode-id="4007" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4004" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4005" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4006" instrument_node="">Millions of incarnations of Vishnu and Shiva, with matted hair yearn for You, O Merciful Lord; their minds and bodies are filled with infinite longing. (Guru Granth Sahib Ji, Ang 455)</span></span></p><span data-dcnode-id="4003" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4000" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4001" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4002" instrument_node="">ਦਸ ਅਉਤਾਰ ਰਾਜੇ ਹੋਇ ਵਰਤੇ ਮਹਾਦੇਵ ਅਉਧੂਤਾ ॥ ਤਿਨ੍‍ ਭੀ ਅੰਤੁ ਨ ਪਾਇਓ ਤੇਰਾ ਲਾਇ ਥਕੇ ਬਿਭੂਤਾ ॥੩॥</span></span></p><span data-dcnode-id="3999" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3987" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3997" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3998" instrument_node="">There were ten regal incarnations</span></span><span class="q-inline" data-dcnode-id="3990" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.searchsikhism.com/sikhism-and-hinduism/avatars%23_edn2" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.searchsikhism.com"><span data-dcnode-id="3996" instrument_node="">[2]</span></a><span class="q-inlineBlock" data-dcnode-id="3991" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3992"><svg data-dcnode-id="3993" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3994" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3988" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3989" instrument_node=""> of Vishnu; and then there was Shiva, the renunciate. He did not find Your limits either, although he grew weary of smearing his body with ashes. ||3|| (Guru Granth Sahib Ji, Ang 747)</span></span></p><span data-dcnode-id="3986" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3983" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3984" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3985" instrument_node="">ਬਿਨ ਕਰਤਾਰ ਨ ਕਿਰਤਮ ਮਾਨੋ ॥ ਆਦਿ ਅਜੋਨਿ ਅਜੈ ਅਬਿਨਾਸੀ ਤਿਹ ਪਰਮੇਸਰ ਜਾਨੋ॥੧॥ ਰਹਾਉ ॥</span></span></p><span data-dcnode-id="3982" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3979" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3980" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3981" instrument_node="">Except Waheguru (God), do not accept anyone as the ruler and controller of the world. The one who has been here from the beginning, the one who is away from births, the one who is matchless, and the one who cannot be destroyed, know that He is Waheguru (God). (Shabad Hazaray, Guru Gobind Singh Ji)</span></span></p><span data-dcnode-id="3978" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3975" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3976" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3977" instrument_node="">ਸੋ ਕਿਮ ਮਾਨਸ ਰੂਪ ਕਹਾਏ ॥ ਸਿਧ ਸਮਾਧ ਸਾਧ ਕਰ ਹਾਰੇ ਕਯੋਹੂੰ ਨ ਦੇਖਨ ਪਾਏ॥੧॥ ਰਹਾਉ ॥</span></span></p><span data-dcnode-id="3974" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3971" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3972" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3973" instrument_node="">How can we accept God coming into this world in human form?The Siddhas (people who try to attain spiritual powers by living in jungles) are tired by sitting with their eyes closed to find and see God but are been unable to. (Shabad Hazaray, Guru Gobind Singh Ji)</span></span></p><span data-dcnode-id="3970" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3967" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3968" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3969" instrument_node="">ਕਾਹੂ ਨੇ ਰਾਮ ਕਹਯੋ ਕ੍ਰਿਸ਼ਨਾ ਕਹੁ ਕਾਹੂ ਮਨੈ ਅਵਤਾਰਨ ਮਾਨਯੋ ॥</span></span></p><span data-dcnode-id="3966" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3963" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3964" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3965" instrument_node="">ਫੋਕਟ ਧਰਮ ਬਿਸਾਰ ਸਭੈ ਕਰਤਾਰ ਹੀ ਕਉ ਕਰਤਾ ਜੀਅ ਜਾਨਯੋ ॥੧੨॥</span></span></p><span data-dcnode-id="3962" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3959" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3960" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3961" instrument_node="">Someone calls him Ram or Krishna and someone believes in His incarnations, but my mind has forsaken all useless actions and has accepted only the One Creator. ||12|| (33 Sawayeas, Guru Gobind Singh Ji)</span></span></p><span data-dcnode-id="3958" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3955" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3956" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3957" instrument_node="">ਦਸ ਅਵਤਾਰ ਅਕਾਰ ਕਰ ਏਕੰਕਾਰ ਨ ਅਲਖ ਲਖਾਯਾ ॥</span></span></p><span data-dcnode-id="3954" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3951" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3952" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3953" instrument_node="">Ten incarnations also flourished but none could perceive ek-oankar, the supreme Lord. (Bhai Gurdas Ji, Vaar 16)</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3950" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3872" style="box-sizing: border-box;"><div class="q-box Action node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3505" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3506" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3507" instrument_node="">Now, why Waheguru wasn't used by Sikh Gurus in their hymns?</span></span></p><span data-dcnode-id="3504" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3501" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3502" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3503" instrument_node="">Because at the time of the Gurus, Waheguru was owed also to the Gurus as Great or Wonderful Teac</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3489" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3490" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3491" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3492" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; t pan class="q-box qu-userSelect--text" data-dcnode-id="3205" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3481" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3482" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3483" instrument_node="">First thing first, what is the meaning of Waheguru?</span></span></p><span data-dcnode-id="3480" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3477" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3478" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3479" instrument_node="">Waheguru is a compound of two words, one from Persian and the other from Sanskrit, joined in a symbolic relationship to define the indefinable, indescribable Ultimate Reality. ‘Wah’ in Persian is an interjection of wonder and admiration. ‘Guru’ in Sanskrit means great, venerable, spiritual preceptor and has been frequently used by Guru Nanak and his successors for SatGuru (True Guru) or God.</span></span></p><span data-dcnode-id="3476" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3473" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3474" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3475" instrument_node="">Now, why Waheguru wasn't used by Sikh Gurus in their hymns?</span></span></p><span data-dcnode-id="3472" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3469" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3470" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3471" instrument_node="">Because at the time of the Gurus, Waheguru was owed also to the Gurus as Great or Wonderful Teacher (not to be confused with Supreme God/SatGuru/Akal Purakh), especially the founder of Sikh faith, Guru Nanak, himself, by the followers. Also, Gurus wrote hymns as a universal scripture for the whole humanity, hence their outlook for adopting different names of God was secular and not sectarian. But Bhat Gayand, who was bard and served Guru Arjun, was the first to introduce Waheguru in Guru Granth Sahib in two versions: Wahguru (3 times) and Waheguru (13 times). Bhat Gayand's hymns are an eulogy for Guru Ram Das and for the praise of formless supreme god.</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3404" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3466" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3467" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3468" instrument_node="">The Gur(Wisdom) is the Boat, and the Guru(God) is the Boatman. Without the Gur(Wisdom or Knowledge of Gurmat), no one can cross over.</span></span></p><span data-dcnode-id="3465" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3462" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3463" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3464" instrument_node="">By Gur's Grace(Grace of Spiritual Wisdom), God is obtained. Without the Gur(Spiritual Wisdom), no one is liberated.</span></span></p><span data-dcnode-id="3461" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3458" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3459" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3460" instrument_node="">Gur(Wisdom) of Nanak dwells near the Creator Lord.</span></span></p><span data-dcnode-id="3457" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3454" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3455" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3456" instrument_node="">He established Lehnaa as Guru, and enshrined His Light in the world.</span></span></p><span data-dcnode-id="3453" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3450" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3451" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3452" instrument_node="">Lehnaa established the path of righteousness and Dharma</span></span></p><span data-dcnode-id="3449" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3446" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3447" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3448" instrument_node="">Which He passed on to Guru Amar Daas, of the Bhalla dynasty.</span></span></p><span data-dcnode-id="3445" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3442" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3443" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3444" instrument_node="">Then, He firmly established the Great Raam Daas of the Sodhi dynasty.</span></span></p><span data-dcnode-id="3441" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3438" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3439" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3440" instrument_node="">He was blessed with the treasure of the Lord's Name; throughout the four ages, it is inexhaustible. Serving the Gur(wisdom), He received His reward.</span></span></p><span data-dcnode-id="3437" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3434" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3435" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3436" instrument_node="">Those who bow at His Feet and seek His Sanctuary, are blessed with peace; those Gurmukhs are blessed with supreme bliss.</span></span></p><span data-dcnode-id="3433" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3430" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3431" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3432" instrument_node="">The Guru's Body is the Embodiment of the Supreme Lord God, our Lord and Master, the Form of the Primal Being, who nourishes and cherishes all.</span></span></p><span data-dcnode-id="3429" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3426" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3427" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3428" instrument_node="">The Master of the Universe, the very Life of the World pervades the sea and the land, manifesting Himself in myriads of ways.</span></span></p><span data-dcnode-id="3425" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3422" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3423" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3424" instrument_node="">So serve the Guru, the True Guru; His ways and means are inscrutable. The Great Guru Raam Daas is the Boat to carry us across.</span></span></p><span data-dcnode-id="3421" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3418" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3419" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3420" instrument_node="">The Supreme Guru is the Lord and Master over all; so serve the True Guru, in thought, word and deed.</span></span></p><span data-dcnode-id="3417" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3414" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3415" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3416" instrument_node="">Waahay Guru, Waahay Guru, Waahay Guru, Waahay Jee-o.</span></span></p><span data-dcnode-id="3413" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3410" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3411" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3412" instrument_node="">Your servants are totally fulfilled, throughout the ages; O Waahay Guru, it is all You, forever.</span></span></p><span data-dcnode-id="3409" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3406" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3407" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3408" instrument_node="">O Formless Lord God, You are eternally intact; no one can say how You came into being.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3405" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3401" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3402" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3403" instrument_node="">The main purpose of these savaiyyas is to acclaim the Gurus, not as individuals but as the revelation they embodied. The Bhats saw the Gurus as one light, as one spirit passing from one body to the other. This concept of all the Gurus being one light, one voice has informed all along the Sikh belief and development and constitutes today a fundamental principle of the faith.</span></span></p><span data-dcnode-id="3400" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3397" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3398" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3399" instrument_node="">But it was Bhai Gurdas (1551 - 1636, nephew of Guru Amar Das, and served Guru Ram Das, Guru Arjan Dev and Guru Hargobind) who promoted Waheguru Gurmantar (Word of the divine) as a recitation of distinctive name of the formless Supreme Being in the Sikh dispensation, like Yahweh in Judaism and Allah in Islam. Bhai Gurdas was the personal scribe of Guru Arjan Dev.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3394" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3395" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3396" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-0f29b6d63a2d4ad1aad775dc13c6c981-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><ul class="q-box" data-dcnode-id="3390" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3391" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3392" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3393" instrument_node="">Bhai Gurdas writing down Guru Arjan Dev's dictations.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3387" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3388" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3389" instrument_node="">And eventually, recitation of Waheguru became very popular in Sikh religion after its adoption by Guru Gobind Singh as a salutation for the Khalsa:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3382" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3384" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3385" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3386" instrument_node="">Waheguru ji Ka Khalsa, Waheguru ji Ki Fateh.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3383" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3379" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3380" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3381" instrument_node="">Translation: Hail the Khalsa who belongs to the formless supreme God ! Hail the formless supreme God to whom belongs the victory.</span></span></p><span data-dcnode-id="3378" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3375" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3376" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3377" instrument_node="">Since then, Waheguru became part of the Sikh prayer and a common form of salutation among the Sikhs.</span></span></p><span data-dcnode-id="3374" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3371" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3372" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3373" instrument_node="">Now, when you read a storybook, would you rather begin from 1st chapter or somewhere in between to get the complete understanding of the story? Similarly, you should read Guru Granth Sahib from the beginning to understand the meaning as all hymns were specifically written, chosen and interconnect with one another.</span></span></p><span data-dcnode-id="3370" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3367" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3368" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3369" instrument_node="">Once you have the complete understanding of Guru Granth Sahib, you would be able to conclude that:</span></span></p><span data-dcnode-id="3366" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3359" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3364" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3365" instrument_node="">Waheguru = Jot (Divine light/Spirit) = SatGuru</span></span><span data-dcnode-id="3362" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3363" instrument_node="">= </span></span><span data-dcnode-id="3360" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3361" instrument_node="">Gur Shabad = Akal Purakh (God)</span></span></p><span data-dcnode-id="3358" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3355" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3356" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3357" instrument_node="">Bhai Gurdas has referred Waheguru as Gur Shabad in his Vaaraan (Ballads).</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3338" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3352" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3353" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3354" instrument_node="">vaahaguroo gur sabadh lai piram piaalaa chup chabolaa|</span></span></p><span data-dcnode-id="3351" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3348" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3349" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3350" instrument_node="">The Guru's word he receives is Vahiguru, the wondrous Lord, and remains silently immersed in delight.</span></span></p><span data-dcnode-id="3347" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3344" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3345" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3346" instrument_node="">vaahiguroo gur ma(n)tr hai jap haumai khoiee|</span></span></p><span data-dcnode-id="3343" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3340" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3341" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3342" instrument_node="">His Guru-manta is Vahiguru, whose recitation erases egotism.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3339" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3335" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3336" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3337" instrument_node="">Bhai Gurdas considered Waheguru as Gur Mantar, and he also clarified that Waheguru means Shabad (Hymn) of Guru. This, he has clarified in his above mentioned Vaaraan itself and also in many other Vaaraan. When we take a closer look of this Vaar, then we find that the first sentence of this Vaar is connected with the following Shabad of Guru Nanak in which Guru Nanak have stated:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3294" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3320" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3333" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3334" instrument_node="">pavan aram</span></span><span data-dcnode-id="3331" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3332" instrument_node="">bh</span></span><span data-dcnode-id="3329" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3330" instrument_node=""> sa</span></span><span data-dcnode-id="3327" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3328" instrument_node="">t</span></span><span data-dcnode-id="3325" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3326" instrument_node="">gur ma</span></span><span data-dcnode-id="3323" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3324" instrument_node="">t</span></span><span data-dcnode-id="3321" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3322" instrument_node=""> vaylaa.</span></span></p><span data-dcnode-id="3319" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3316" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3317" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3318" instrument_node="">From the air came the beginning. This is the age of the True Guru's Teachings.</span></span></p><span data-dcnode-id="3315" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3300" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3313" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3314" instrument_node="">saba</span></span><span data-dcnode-id="3311" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3312" instrument_node="">d</span></span><span data-dcnode-id="3309" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3310" instrument_node=""> guroo sura</span></span><span data-dcnode-id="3307" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3308" instrument_node="">t</span></span><span data-dcnode-id="3305" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3306" instrument_node=""> </span></span><span data-dcnode-id="3303" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3304" instrument_node="">Dh</span></span><span data-dcnode-id="3301" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3302" instrument_node="">un chaylaa.</span></span></p><span data-dcnode-id="3299" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3296" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3297" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3298" instrument_node="">The Shabad is the Guru, upon whom I lovingly focus my consciousness; I am the chaylaa, the disciple.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3295" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3291" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3292" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3293" instrument_node="">The last sentence of this Vaar is related with the following Shabad.</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3268" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3284" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3289" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3290" instrument_node="">man baychai sa</span></span><span data-dcnode-id="3287" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3288" instrument_node="">t</span></span><span data-dcnode-id="3285" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3286" instrument_node="">gur kai paas.</span></span></p><span data-dcnode-id="3283" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3280" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3281" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3282" instrument_node="">One who sells his mind to the True Guru</span></span></p><span data-dcnode-id="3279" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3274" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3277" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3278" instrument_node="">t</span></span><span data-dcnode-id="3275" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3276" instrument_node="">is sayvak kay kaaraj raas.</span></span></p><span data-dcnode-id="3273" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3270" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3271" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3272" instrument_node="">that humble servant's affairs are resolved.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3269" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3265" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3266" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3267" instrument_node="">This means that if we do not submit ourselves to the teachings of the Guru, the ego within us would not go away. Till we overcome our ego, good qualities would not generate within us. This is possible only if we make Gur Shabad as part and parcel of our life.</span></span></p><span data-dcnode-id="3264" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3257" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3262" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3263" instrument_node="">Waheguru can be used for Satgur and</span></span><span data-dcnode-id="3260" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3261" instrument_node=""> </span></span><span data-dcnode-id="3258" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3259" instrument_node="">Akal Purakh (God), the supreme formless god in Sikhism. Guru Gobind Singh has also used:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3252" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3254" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3255" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3256" instrument_node="">Ek On Kar Waheguru Ji Ke Fateh</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3253" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3249" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3250" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3251" instrument_node="">beside the traditional Ek Onkaar Satgur Parsaad at the beginning of some of his compositions.</span></span></p><span data-dcnode-id="3248" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3245" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3246" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3247" instrument_node="">Source and Further Reading:</span></span></p><ul class="q-box" data-dcnode-id="3206" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3242" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3243" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3244" instrument_node="">Study of Guru Granth Sahib</span></span></li><li class="q-relative" data-dcnode-id="3239" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3240" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3241" instrument_node="">Study of Bhai Gurdas's Vaaraan</span></span></li><li class="q-relative" data-dcnode-id="3231" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span class="q-inline" data-dcnode-id="3232" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learnreligions.com/waheguru-wondrous-enlightener-2993088" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.learnreligions.com"><span data-dcnode-id="3238" instrument_node="">What Is the Meaning of Sikhism Term Waheguru?</span></a><span class="q-inlineBlock" data-dcnode-id="3233" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3234"><svg data-dcnode-id="3235" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3236" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></li><li class="q-relative" data-dcnode-id="3223" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span class="q-inline" data-dcnode-id="3224" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sikhiwiki.org/index.php/Waheguru" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.sikhiwiki.org"><span data-dcnode-id="3230" instrument_node="">Waheguru - Wonderful Guru</span></a><span class="q-inlineBlock" data-dcnode-id="3225" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: ltr;"><span data-dcnode-id="2977" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2978" instrument_node="">Kaval nain maḍɦur bain koti sain saᴺg sobɦ kahaṭ maa jasoḍ jisahi ḍahee bɦaaṭu kɦaahi jeeū ॥</span></span></p><span data-dcnode-id="2975" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2972" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2973" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2974" instrument_node="">ਤੇਰੇ ਕਮਲ ਵਰਗੇ ਨੇਤ੍ਰ ਹਨ, (ਮੇਰੇ ਵਾਸਤੇ ਤਾਂ ਤੂੰ ਹੀ ਹੈਂ ਜਿਸ ਨੂੰ) ਮਾਂ ਜਸੋਧਾ ਆਖਦੀ ਸੀ 'ਹੇ ਲਾਲ (ਆ), ਦਹੀਂ ਚਾਉਲ ਖਾ।'</span></span></p><span data-dcnode-id="2971" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2968" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2969" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2970" instrument_node="">ਸਵਈਏ ਮਹਲੇ ਚਉਥੇ ਕੇ (ਭਟ ਗਯੰਦ) ੬:੨ {੧੪੦੨} ੧੨</span></span></p><span data-dcnode-id="2967" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2964" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2965" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2966" instrument_node="">ਦੇਖਿ ਰੂਪੁ ਅਤਿ ਅਨੂਪੁ ਮੋਹ ਮਹਾ ਮਗ ਭਈ ਕਿੰਕਨੀ ਸਬਦ ਝਨਤਕਾਰ ਖੇਲੁ ਪਾਹਿ ਜੀਉ ॥</span></span></p><span data-dcnode-id="2963" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2960" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2961" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2962" instrument_node="">Ḍekɦi roopu ạṭi ạnoopu moh mahaa mag bɦēe kiᴺkanee sabaḍ jɦanaṭakaar kɦelu paahi jeeū ॥</span></span></p><span data-dcnode-id="2959" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2956" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2957" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2958" instrument_node="">ਜਦੋਂ ਤੂੰ ਖੇਡ ਮਚਾਉਂਦਾ ਸੈਂ, ਤੇਰੀ ਤੜਾਗੀ ਦੀ ਛਣਕਾਰ ਦੀ ਅਵਾਜ਼ ਪੈਂਦੀ ਸੀ, ਤੇਰੇ ਅੱਤ ਸੋਹਣੇ ਮੁਖੜੇ ਨੂੰ ਵੇਖ ਕੇ (ਮਾਂ ਜਸੋਧਾ) ਤੇਰੇ ਪਿਆਰ ਵਿਚ ਮਗਨ ਹੋ ਜਾਂਦੀ ਸੀ।</span></span></p><span data-dcnode-id="2955" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2952" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2953" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2954" instrument_node="">ਸਵਈਏ ਮਹਲੇ ਚਉਥੇ ਕੇ (ਭਟ ਗਯੰਦ) ੬:੩ {੧੪੦੨} ੧੩</span></span></p><span data-dcnode-id="2951" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2948" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2949" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2950" instrument_node="">ਕਾਲ ਕਲਮ ਹੁਕਮੁ ਹਾਥਿ ਕਹਹੁ ਕਉਨੁ ਮੇਟਿ ਸਕੈ ਈਸੁ ਬੰਮ੍ਯ੍ਯੁ ਗ੍ਯ੍ਯਾਨੁ ਧ੍ਯ੍ਯਾਨੁ ਧਰਤ ਹੀਐ ਚਾਹਿ ਜੀਉ ॥</span></span></p><span data-dcnode-id="2947" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2944" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2945" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2946" instrument_node="">Kaal kalam hukamu haaṭɦi kahahu kaūnu meti sakai ēesu baᴹmayu gʸaanu ḍɦʸaanu ḍɦaraṭ heeạai cɦaahi jeeū ॥</span></span></p><span data-dcnode-id="2943" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2940" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2941" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2942" instrument_node="">ਕਾਲ ਦੀ ਕਲਮ ਤੇ ਹੁਕਮ (ਗੁਰੂ ਦੇ ਹੀ) ਹੱਥ ਵਿਚ ਹਨ। ਦੱਸੋ, ਕਉਣ (ਗੁਰੂ ਦੇ ਹੁਕਮ ਨੂੰ) ਮਿਟਾ ਸਕਦਾ ਹੈ? ਸ਼ਿਵ ਤੇ ਬ੍ਰਹਮਾ (ਗੁਰੂ ਦੇ ਬਖ਼ਸ਼ੇ ਹੋਏ) ਗਿਆਨ ਤੇ ਧਿਆਨ ਨੂੰ ਆਪਣੇ ਹਿਰਦੇ ਵਿਚ ਧਾਰਨ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹਨ।</span></span></p><span data-dcnode-id="2939" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2936" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2937" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2938" instrument_node="">ਸਵਈਏ ਮਹਲੇ ਚਉਥੇ ਕੇ (ਭਟ ਗਯੰਦ) ੬:੪ {੧੪੦੨} ੧੪</span></span></p><span data-dcnode-id="2935" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2932" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2933" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2934" instrument_node="">ਸਤਿ ਸਾਚੁ ਸ੍ਰੀ ਨਿਵਾਸੁ ਆਦਿ ਪੁਰਖੁ ਸਦਾ ਤੁਹੀ ਵਾਹਿਗੁਰੂ ਵਾਹਿਗੁਰੂ ਵਾਹਿਗੁਰੂ ਵਾਹਿ ਜੀਉ ॥੧॥੬॥</span></span></p><span data-dcnode-id="2931" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2928" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2929" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2930" instrument_node="">Saṭi saacɦu sree nivaasu ạaḍi purakɦu saḍaa ṭuhee vaahiguroo vaahiguroo vaahiguroo vaahi jeeū ॥16॥</span></span></p><span data-dcnode-id="2927" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2924" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2925" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2926" instrument_node="">ਹੇ ਗੁਰੂ! ਤੂੰ ਅਚਰਜ ਹੈਂ, ਤੂੰ ਸਤਿ ਸਰੂਪ ਹੈਂ, ਤੂੰ ਅਟੱਲ ਹੈਂ, ਤੂੰ ਹੀ ਲੱਛਮੀ ਟਿਕਾਣਾ ਹੈਂ, ਤੂੰ ਹੀ ਆਦਿ ਪੁਰਖੁ ਹੈਂ ਤੇ ਸਦਾ ਥਿਰ ਹੈਂ ॥੧॥੬॥</span></span></p><span data-dcnode-id="2923" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2920" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2921" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2922" instrument_node="">ਸਵਈਏ ਮਹਲੇ ਚਉਥੇ ਕੇ (ਭਟ ਗਯੰਦ) ੬:੫ {੧੪੦੨} ੧੪</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2843" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2844" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2845" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2859" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2886" style="box-sizing: border-box; display: inline nk: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2592"><svg data-dcnode-id="2593" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2594" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2566" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2567" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2568"><span class="q-box qu-userSelect--text" data-dcnode-id="2569" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2570" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2571" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2580" instrument_node="">If we look back at the history of various religions of the world, Islam started about 1300 years ago, Christianity about 2000 years ago, and Buddhism about 2500 years ago. The Bhagavad-gita, on the other hand, was spoken about 5000 years ago. Within Bhagavad-gita Lord Krishna informs Arjuna that he had already spoken the Bhagavad-gita to Vivaswan, presiding deity of the sun planet at least 120,400,000 years ago and in human society it has been present for over two million years [BG 4.1]. The Vedas are the oldest body of wisdom coming from the dawn of creation through word of mouth, written down about 5000 years ago by Krishna Dvaipayana Vyas for the benefit of people in the age of Kaliyuga. Sanatana dharma being the oldest religion, it encompasses wisdom to suit the nature and the inclination of people who range from morally degraded to the spiritually exalted. Sanatana dharma does not refer to any sectarian process of religion. It is the eternal function of the eternal living entities in relationship with the eternal Supreme Lord.</span><br data-dcnode-id="2579"><span data-dcnode-id="2578" instrument_node=""> </span><br data-dcnode-id="2577"><span data-dcnode-id="2576" instrument_node="">In the Bible, Jesus calls himself the son and representative of God. In the Koran, Mohammed calls himself a prophet or a messenger of God. The question therefore begs itself: who is God? Only God Himself knows this answer completely, and therefore we should hear from Him. In the Bhagavad-gita, which is the summum bonum of all Vedic literatures, Lord Krishna declares Himself to be the Supreme Personality of Godhead, and He specifically asserts His supremacy over the well-known gods or demigods of the Vedic pantheon.</span><br data-dcnode-id="2575"><span data-dcnode-id="2574" instrument_node=""> </span><br data-dcnode-id="2573"><span data-dcnode-id="2572" instrument_node="">Unfortunately, many people think of Lord Shri Krishna as an ordinary person, while some admit that He was an extraordinary person with great mystic powers! But actually according to Bhagavad-gita and other scriptures, Lord Krishna is neither an ordinary person nor an extraordinary person. He is the Supreme Personality of Godhead, the supreme controller, the supreme proprietor, the supreme enjoyer, the one whom no one can ever equal or surpass in any aspect.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2488" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2489" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out
