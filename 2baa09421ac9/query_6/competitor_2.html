</span><span data-dcnode-id="2367" id="freeTextContainer18004539334856071984"><span data-dcnode-id="2368" instrument_node="">The Shâhnameh recounts the history of Iran, beginning with the creation of the world and the introduction of the arts of civilization (fire, cooking, metallurgy, law, etc.) to the Aryans and ends with the Arab conquest of Persia. The work is not precisely chronological, but there is a general movement through time. Some of the characters live for hundreds of years (as do some of the characters in the Bible), but most have normal life spans. There are many shahs who come and go, as well as heroes</span></span><span data-dcnode-id="2366" instrument_node="">
</span><span data-dcnode-id="2355" id="freeText18004539334856071984" style="display:none"><span data-dcnode-id="2365" instrument_node="">The Shâhnameh recounts the history of Iran, beginning with the creation of the world and the introduction of the arts of civilization (fire, cooking, metallurgy, law, etc.) to the Aryans and ends with the Arab conquest of Persia. The work is not precisely chronological, but there is a general movement through time. Some of the characters live for hundreds of years (as do some of the characters in the Bible), but most have normal life spans. There are many shahs who come and go, as well as heroes and villains, who also come and go. The only lasting images are that of Greater Iran itself, and a succession of sunrises and sunsets, no two ever exactly alike, yet illustrative of the passage of time.</span><br data-dcnode-id="2364"><span data-dcnode-id="2363" instrument_node="">The Shahnameh is largely his effort to preserve the memory of Iran's golden days and transmit it to a new generation so that they could learn and try to build a better world. Ferdowsi started his composition of the Shahnameh in the Samanid era in 977 A.D and completed it around 1010 A.D. during the Ghaznavid era.”</span><br data-dcnode-id="2362"><span data-dcnode-id="2361" instrument_node="">متاسفانه بسیاری از روایت های شاهنامه که در بازار کتاب یافت می شوند، تایید نشده و نا شناس اند، و پر از ابیات منسوب به فردوسی و گاه با تحریف های بسیار. در میان شاهنامه های موجود، دو روایت که از طرف شاهنامه شناسان تدوین و تایید شده، عبارتند از شاهنامه ی چاپ مسکو در 9 جلد و شاهنامه به روایت دکتر جلال خالقی مطلق در هفت جلد. در این دو شاهنامه که از روی نسخ معتبر در موزه های معروفی چون "آرمیتاژ"، موزه ی لندن، موزه ی توپکاپی در ترکیه و...استخراج و تدوین شده، ابیات الحاقی، تا حد ممکن تفکیک شده اند.</span><br data-dcnode-id="2360"><br data-dcnode-id="2359"><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author_blog_p </span><span data-dcnode-id="2267" id="freeText2833056100949823246" style="display:none"><span data-dcnode-id="2268" instrument_node="">Who am I to rate or review Abolqasem Ferdowsi's ancient and classic Shahnameh, The Persian Book of Kings? Since I only know a smattering of Persian, nor can I comment on Dick Davis' translation from the original into English, which I have heard is excellent, but cannot verify. This is a volume which I dip into and will still be doing so in the years ahead, so I will take it from my currently reading list even though I am halfway. It is fascinating and I am enjoying it but that is not the only reason to rate a book. The scope of the original Shahnameh is huge: it covers 700 years of the history of Persia from creation to the Arab conquest, written in verse, in nine volumes. If it needs rating at all, it would be presumptuous to give less than five stars.</span></span><span data-dcnode-id="2266" instrument_node="">

</span><span data-dcnode-id="2185" id="freeTextContainer6451342015558807114"><span data-dcnode-id="2192" instrument_node="">Finally finished reading </span><i data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Shahnameh</span></i><span data-dcnode-id="2189" instrument_node=""> today, the Persian Book of Kings, translated by Dick Davis. Arranged like a royal chronicle, the book falls into two parts, the first legendary half, teeming with hero-kings and demons, and the second more "realistic" half, closer as the history is to Ferdowsi's own time. The turning point lies in the reign of Sekandar (Alexander the Great), who is depicted initially as a world conqueror, but later, more importantly, as a seeker of knowledge.</span><br data-dcnode-id="2188"><br data-dcnode-id="2187"><span data-dcnode-id="2186" instrument_node="">I like the legends </span></span><span data-dcnode-id="2184" instrument_node="">
</span><span data-dcnode-id="2170" id="freeText6451342015558807114" style="display:none"><span data-dcnode-id="2183" instrument_node="">Finally finished reading </span><i data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Shahnameh</span></i><span data-dcnode-id="2180" instrument_node=""> today, the Persian Book of Kings, translated by Dick Davis. Arranged like a royal chronicle, the book falls into two parts, the first legendary half, teeming with hero-kings and demons, and the second more "realistic" half, closer as the history is to Ferdowsi's own time. The turning point lies in the reign of Sekandar (Alexander the Great), who is depicted initially as a world conqueror, but later, more importantly, as a seeker of knowledge.</span><br data-dcnode-id="2179"><br data-dcnode-id="2178"><span data-dcnode-id="2177" instrument_node="">I like the legends better. They have more colorful characters, and livelier adventures.The defeat of Zahhak the Demon King by Feraydun, the Simorgh (magical bird) that raised Sam and helped him in his distress, the riddles posed to Zal by Manuchehr's priests, the seven trials of Rostam, the duel between Rostam and his son Sohrab, which I first read as a poem by Matthew Arnold. The characters in the second half may be more complex, less easy to pin down, but the struggle between hero and king is played out in never-ending, repetitive warfare.</span><br data-dcnode-id="2176"><br data-dcnode-id="2175"><span data-dcnode-id="2174" instrument_node="">The prose of the translation reads well, but the poetry is rather lame. Too much is sacrificed to rhyming the couplets. I don't know Ferdowsi's method of versification, but Davis's poetry reads like Pope's translation of </span><i data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">The Odyssey</span></i><span data-dcnode-id="2171" instrument_node="">. Fortunately, most of the translation is in prose. I know I will return to this treasure house of stories again and again.</span></span><span data-dcnode-id="2169" instrument_node="">

</span><span data-dcnode-id="1981" id="freeText13529078976731860606" style="display:none"><span data-dcnode-id="1988" instrument_node="">Well, it's been a while since I tackled this bad boy, and what a big boy it is. Picture this: you're a poet, you're Zoroastrian, it's about 1000 years after this Christ fellow (whom you don't know) got to meet his maker (curiously, himself), and you decide it would be a good idea to record the complete history of the great Persian empires whose final vestiges has been overrun by those pesky Moslems. Oh yeah, and it takes you thirty years to write it. There is a reason it is a cornerstone of Persian literature.</span><br data-dcnode-id="1987"><br data-dcnode-id="1986"><span data-dcnode-id="1985" instrument_node=""> The summary of the book here in Goodreads is accurate. This is a national epic covering thousands of years of myth and history, beginning with the creation of all things, the building of various empires, rollicking adventures, the occasonial romance, and a final, crumbling decline into subservience. There is so much in here you could just have it sit on your shelf and pick and choose portions to read as you please, a huge treasury of tales. Or, you could be a glutton of punishment like me and decide to read it from beginning to end. The cycles of inheritors to great kingdoms being abandoned, growing to maturity, and taking back their kingdom by strength can become repetitive if you read it this way. It probably took me three months.</span><br data-dcnode-id="1984"><br data-dcnode-id="1983"><span data-dcnode-id="1982" instrument_node=""> I'd recommend just reading sections at time so you can get a flavor of the times. It's well worth it for armchair time-travellers. </span></span><span data-dcnode-id="1980" instrument_node="">

</span><span data-dcnode-id="1811" id="freeTextContainer8912964651901079537"><span data-dcnode-id="1812" instrument_node="">Dick Davis’s English is the closest I’ll ever get to Persia’s national epic, a multivolume poem condensed here to a version that leavens the inevitable tedium of the chronicle with a remarkable string of well-realized vignettes related in supple, vivid language. In Dick’s translation, each of the many kings and heroes of Ferdowsi’s giant epic miraculously stay distinct, and you get enough of each story—especially the famous Rostam’s—to develop a feel for the aesthetic predilections of classical </span></span><span data-dcnode-id="1810" instrument_node="">
</span><span data-dcnode-id="1798" id="freeText8912964651901079537" style="display:none"><span data-dcnode-id="1809" instrument_node="">Dick Davis’s English is the closest I’ll ever get to Persia’s national epic, a multivolume poem condensed here to a version that leavens the inevitable tedium of the chronicle with a remarkable string of well-realized vignettes related in supple, vivid language. In Dick’s translation, each of the many kings and heroes of Ferdowsi’s giant epic miraculously stay distinct, and you get enough of each story—especially the famous Rostam’s—to develop a feel for the aesthetic predilections of classical Persian poetry: the jewels spilled out from goblets, the kingly demons, the cypress-statured heroes, the thwarted loves, the splendiferous banquets, the raven-haired princesses, and shah after shah passing along the regal glow of his </span><i data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">farr</span></i><span data-dcnode-id="1806" instrument_node="">. Undercutting the bling is Ferdowsi’s insistent warning that glory’s born to fade, and death meets us all when the wine cup’s dry: a little sour pathos to season the narrative sweet. </span><br data-dcnode-id="1805"><br data-dcnode-id="1804"><span data-dcnode-id="1803" instrument_node="">For the historian, the </span><i data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Shahnameh</span></i><span data-dcnode-id="1800" instrument_node=""> gives one of the few windows onto pre-Islamic Persia, as Ferdowsi carefully collected the myths and stories preserved in sources that were willfully forgotten at the glittering Muslim courts: “No one has any knowledge of those first days, unless he has heard tales passed down from father to son.” Ferdowsi, who ended his days (and this volume) lamenting how little his efforts brought him, created a way to be distinctly Persian but still Islamic, and his work lives on in the plots of a thousand and one Bollywood films, as well as in this terrific one-volume translation by the man the backflap calls without blinking “the greatest translator of Persian poetry.” </span><br data-dcnode-id="1799"></span><span data-dcnode-id="1797" instrument_node="">

</span><span data-dcnode-id="1707" id="freeTextContainer14665425439969504628"><span data-dcnode-id="1717" instrument_node="">Started this masterpiece of Persian poetry in January 2017 and finished it in August 2017, dedicating an hour a day every day.</span><br data-dcnode-id="1716"><br data-dcnode-id="1715"><span data-dcnode-id="1714" instrument_node="">This was not an easy task for me to accomplish, as I have been away from Iran for 40 years, during which I did not read any books in Farsi.</span><br data-dcnode-id="1713"><br data-dcnode-id="1712"><span data-dcnode-id="1711" instrument_node=""> I realized immediately that I need help!</span><br data-dcnode-id="1710"><br data-dcnode-id="1709"><span data-dcnode-id="1708" instrument_node="">First and foremost, there was the question of the pronunciation of many words, especially the names of the characters. What helped: the audio version of Shahnameh done for the Institute of the B</span></span><span data-dcnode-id="1706" instrument_node="">
</span><span data-dcnode-id="1683" id="freeText14665425439969504628" style="display:none"><span data-dcnode-id="1705" instrument_node="">Started this masterpiece of Persian poetry in January 2017 and finished it in August 2017, dedicating an hour a day every day.</span><br data-dcnode-id="1704"><br data-dcnode-id="1703"><span data-dcnode-id="1702" instrument_node="">This was not an easy task for me to accomplish, as I have been away from Iran for 40 years, during which I did not read any books in Farsi.</span><br data-dcnode-id="1701"><br data-dcnode-id="1700"><span data-dcnode-id="1699" instrument_node=""> I realized immediately that I need help!</span><br data-dcnode-id="1698"><br data-dcnode-id="1697"><span data-dcnode-id="1696" instrument_node="">First and foremost, there was the question of the pronunciation of many words, especially the names of the characters. What helped: the audio version of Shahnameh done for the Institute of the Blind (narrator: Esmaeel Ghader-Panah). Using the print and audio versions simultaneously had another advantage: it brought the stories to life and made them much more enjoyable. The audio edition can be downloaded from many sites, including </span><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chamanara.net/Shahnameh%2520Audio.htm" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1695" instrument_node="">http://www.chamanara.net/Shahnameh%20...</span></a><br data-dcnode-id="1693"><br data-dcnode-id="1692"><span data-dcnode-id="1691" instrument_node="">The highly educational lectures of the late Prof. Mohammad Jafar Mahjoub were also of immense help. Besides describing some of the stories in detail, he explains the political and historical situation during Ferdowsi’s time and how the poet spent most of his life and wealth to do research and gather stories that were passed oraly from one generation to the next for 1000 years. These lectures can be downloaded from </span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/Mohammad-Jafar-MahjoubDr-212868288724295/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1690" instrument_node="">https://www.facebook.com/Mohammad-Jaf...</span></a><br data-dcnode-id="1688"><br data-dcnode-id="1687"><span data-dcnode-id="1686" instrument_node=""> I should also mention that many of the Shahnameh stories are discussed by several Persian literature enthusiasts and are available online. I particularly like </span><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/search/str/mehdi%252Babedinejad%252B%2525D8%2525B4%2525D8%2525A7%2525D9%252587%2525D9%252586%2525D8%2525A7%2525D9%252585%2525D9%252587/keywords_blended_posts%3Ffilters_rp_author%3D%257B%2522name%2522%253A%2522author%2522%252C%2522args%2522%253A%2522100000150942119%2522%257D" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1685" instrument_node="">https://www.facebook.com/search/str/m...</span></a></span><span data-dcnode-id="1682" instrument_node="">

</span><span data-dcnode-id="1398" id="freeTextContainer9858129266696037870"><span data-dcnode-id="1399" instrument_node="">The hallmark of this exquisite edition of the grand Shahnameh is its artwork, illustrations and design by Hamid Rahmanian - hundred upon hundreds of beautiful traditional miniatures, folios and images with gem-like luminosity and exquisite detail, used as is and also creatively merged, combined, manipulated, reimagined and reconfigured to create new characters, scenes, sequences, patterns, repetition and backdrops. It must have been a process laborious and passionate - ten thousand hours of rese</span></span><span data-dcnode-id="1397" instrument_node="">
</span><span data-dcnode-id="1386" id="freeText9858129266696037870" style="display:none"><span data-dcnode-id="1396" instrument_node="">The hallmark of this exquisite edition of the grand Shahnameh is its artwork, illustrations and design by Hamid Rahmanian - hundred upon hundreds of beautiful traditional miniatures, folios and images with gem-like luminosity and exquisite detail, used as is and also creatively merged, combined, manipulated, reimagined and reconfigured to create new characters, scenes, sequences, patterns, repetition and backdrops. It must have been a process laborious and passionate - ten thousand hours of research and dedication is what the artist informs us is the time investment. This is the output of someone with the sensibility of an art connoisseur and the skills of a modern film editor and graphic artist. They artwork and panels really augment the reading experience and bring forth the best of what a masterfully produced illustrated book has to offer. There is much attention to detail as lovely little drawings of animals and birds, calligraphy, arabesques and floral patterns adorn separators, margins and title pages. The Shahnameh of course lends itself to such visual reinterpretation given the iconic nature of its stories and characters as well as the fact that the high art of Persian, Indian Mughal and Ottoman painting and miniature has so often been employed to commemorate, illustrate and celebrate such grand epic tales. This adds another glorious chapter to that cherished tradition.</span><br data-dcnode-id="1395"><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">The Book of Kings itself is of course arguably the fundamental literary text of the Persian speaking world and highly compelling a component of world literature, tracing the lives and rule of real and mythical pre-Islamic kings of Persia up till the time of Zarathustra, and their tales of love and valor, deceit and decline, redemption and loss, and so much more. Time and again, we are reminded of the transience of life and the importance of good deeds in order to leave a lasting impression. But even the best of men make fatal mistakes and fall victim to folly, avarice, indolence, lust, jealousy, ambition and cruelty. And there are always consequences. Fate plays a role and prophesies have a bearing on the course of events but men of destiny also mold and shape it. Valour and courage matter as do strength and skill in battle but what matters equally if not more is justice, wisdom, foresight and resourcefulness. Evil always lurks around the corner but prevails only when we let it; though often the evil of a few in power leads to the misery of thousands who are innocent. While telling tales historical and mythical the Shahnameh provides constant reminders of what are the nobler and more praiseworthy options in life and as a ruler in contrast to the ignoble and reprehensible ones. The Ahmad Sadri translation is clear and readable but I do intend to read now a celebrated verse translation in Urdu as well as in English order to be able to do full justice to the original Persian text's music and lyricism.</span><br data-dcnode-id="1392"><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">As to the sequence of the stories, we start with the Kings of yore Kayumars, Hushang, Tahmures, the mighty Jamshid, and the serpent king Zahhak and then move to the sons of Feraydun. Along the way we read the love story of the white-haired Zaul raised by the magical Simorgh and beautiful Rudabeh. Along comes that hero of heroes Rostam who is to play such a cardinal savior's role for the Persian empire during its various crises and battles with Turan and others. We are instructed then in what kinds of destruction a land and people can be plunged into due to the follies of kings such as Kay Kavous. Then arrives Sohrab and that greatest of tragedies of the fatal battle between him and his father Rostam which is the outcome of a series of highly unfortunate events and misunderstandings. We learn of the martyred prince Siavosh and the various bloody battles that are spawned in the wake of that event. Kay Khosrow and Forud figure prominently in subsequent events and there follow the great wars of nations with Iran besieged. </span><br data-dcnode-id="1389"><br data-dcnode-id="1388"><span data-dcnode-id="1387" instrument_node="">It is not just a world of royal and mighty men and to a certain extent women, but also that of demons such as Akvaun and the White Demon as well as others from the legendary land of demons Mazandaran. Moving on, Bizhan and Manizeh have a perilous adventure and King Afrasiyab finally falls after a lifetime of intrigue, turmoil and conflict. Then those like Esfandiar thirst for the crown and cause mayhem and events lead finally to the demise of the Knightly House and to the death of its leader Rostam. Interspersed between these larger events are multiple lesser ones as well as a huge cast of lesser kings, courtiers, queens, princesses, sages, villains, warriors and much more prominently other great champions and knights of Persia with their closely protected and much vaunted code of chivalry. We learn also of an ancient landscape, its regions and cities, the architecture of the times, court mannerisms and customs, the hunting expeditions as well as the equipment of war, and the larger normative framework. Kindness doesn't always lead to gratitude and geniality to submission. Like in life there is deceit, mischief, madness and mayhem. But regardless, there is also empathy, largesse, gallantry and wisdom. All must become dust. But the noble are remembered and adored while those who fall short are reviled and don't even get remembered without revulsion.</span></span><span data-dcnode-id="1385" instrument_node="">

</span><span data-dcnode-id="1265" id="freeText17379870118515011176" style="display:none"><span data-dcnode-id="1269" instrument_node="">I picked up Shahnameh twice before, even purchasing a used copy the second time, but could not get into it. This time I was determined to read it and I am so glad I invested the energy and the determination. It requires both as it does get somewhat repetitive in terms of descriptors for the noble knights and savagery of battle and the beauty of women, the fruit of deceit, envy, greed, treachery, fratricide, patricide, infanticide, but it is worth the time. I only wish I had been able to read it in its original language, as its narrative must be so subtly nuanced and multi-layered. </span><br data-dcnode-id="1268"><br data-dcnode-id="1267"><span data-dcnode-id="1266" instrument_node="">Aside from what has already been written on it as a literary repository of Persia's pre-Islamic glory, of which I have little knowledge, it appears also to me to be a primer on how to live a life that is noble and worthy of renown, a life that understands that Death is no respecter of persons of either high or low rank and that everyone, if they can uncover it, must find and live their destiny--or they will not understand the twists and turns of their destiny as they are delivered up to it. The good guys don't always win, but they are immortalized for their noble actions. There are some wonderful vignettes which involve a hero's trials and challenges, and mythical beasts and places, and in particular, the hero King Sekandar's journey. I couldn't really put it down as it drew to a close. </span></span><span data-dcnode-id="1264" instrument_node="">

</span><span data-dcnode-id="406" id="freeTextContainer8777465888515517556"><span data-dcnode-id="409" instrument_node="">Abolqasem Ferdowsi (Persian: ابوالقاسم فردوسی), the son of a wealthy land owner, was born in 935 in a small village named Paj near Tus in Khorasan which is situated in today's Razavi Khorasan province in Iran.</span><br data-dcnode-id="408"><span data-dcnode-id="407" instrument_node="">He devoted more than 35 years to his great epic, the Shāhnāmeh. It was originally composed for presentation to the Samanid princes of Khorasan, who were the chief instigators of the revival o</span></span><span data-dcnode-id="405" instrument_node="">
</span><span data-dcnode-id="396" id="freeText8777465888515517556" style="display:none"><span data-dcnode-id="404" instrument_node="">Abolqasem Ferdowsi (Persian: ابوالقاسم فردوسی), the son of a wealthy land owner, was born in 935 in a small village named Paj near Tus in Khorasan which is situated in today's Razavi Khorasan province in Iran.</span><br data-dcnode-id="403"><span data-dcnode-id="402" instrument_node="">He devoted more than 35 years to his great epic, the Shāhnāmeh. It was originally composed for presentation to the Samanid princes of Khorasan, who were the chief instigators of the revival of Iranian cultural traditions after the Arab conquest of the seventh century. Ferdowsi started his composition of the Shahnameh in the Samanid era in 977 A.D. During Ferdowsi's lifetime the Samanid dynasty was conquered by the Ghaznavid Empire. After 30 years of hard work, he finished the book and two or three years after that, Ferdowsi went to Ghazni, the Ghaznavid capital, to present it to the king, Sultan Mahmud.</span><br data-dcnode-id="401"><br data-dcnode-id="400"><span data-dcnode-id="399" instrument_node="">Ferdowsi is said to have died around 1020 in poverty at the age of 85, embittered by royal neglect, though fully confident of his work's ultimate success and fame, as he says in the verse:</span><br data-dcnode-id="398"><span data-dcnode-id="397" instrument_node="">" ... I suffered during these thirty years, but I have revived the Iranians (Ajam) with the Persian language; I shall not die since I am alive again, as I have spread the seeds of this language ..."</span></span><span data-dcnode-id="395" instrument_node="">
