</span><span data-dcnode-id="5419" id="freeText3057273288907605139" style="display:none"><span data-dcnode-id="5423" instrument_node="">Among the great works of world literature, perhaps one of the least familiar to English readers is the "Shahnameh: ThePersian Book of Kings," the national epic of Persia. This prodigious narrative, composed by the poet Ferdowsi between the years 980 and 1010, tells the story of pre- Islamic Iran, beginning in the mythic time of Creation and continuing forward to the Arab invasion in the seventh century. As a window on the world, "Shahnameh" belongs in the company of such literary masterpieces as Dante's "Divine Comedy," the plays of Shakespeare, the epics of Homer- classics whose reach and range bring whole cultures into view. In its pages are unforgettable moments of national triumph and failure, human courage and cruelty, blissful love and bitter grief.</span><br data-dcnode-id="5422"><br data-dcnode-id="5421"><span data-dcnode-id="5420" instrument_node="">In tracing the roots of Iran, "Shahnameh" initially draws on the depths of legend and then carries its story into historical times, when ancient Persia was swept into an expanding Islamic empire. Now Dick Davis, the greatest modern translator of Persian poetry, has revisited that poem, turning the finest stories of Ferdowsi's original into an elegant combination of prose and verse. For the first time in English, in the most complete form possible, readers can experience "Shahnameh" in the same way that Iranian storytellers have lovingly conveyed it in Persian for the past thousand years.</span></span><span data-dcnode-id="5418" instrument_node="">

</span></b><span data-dcnode-id="4491" instrument_node=""> Ferdowsi.</span><br data-dcnode-id="4490"><br data-dcnode-id="4489"><span data-dcnode-id="4488" instrument_node="">Firdowsi Tusi (c. 940–1020), or Ferdowsi was a Persian poet and the author of Shahnameh (Book of Kings), which is the world's longest epic poem created by a single poet, and the national epic of Greater Iran. </span><br data-dcnode-id="4487"><br data-dcnode-id="4486"><span data-dcnode-id="4485" instrument_node="">Ferdowsi is celebrated as the most influential figure in Persian literature and one of the greatest in the history of literature.</span></span><span data-dcnode-id="4483" instrument_node="">
</span><span data-dcnode-id="4440" id="freeText2883295535720992032" style="display:none"><b data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">شاهنامه فردوسی (شش جلد)؛ = Shahnameh: The Persian Book of Kings, Abolqasem Ferdowsi</span></b><br data-dcnode-id="4480"><br data-dcnode-id="4479"><b data-dcnode-id="4472"><span data-dcnode-id="4478" instrument_node="">
</span><i data-dcnode-id="4474"><span data-dcnode-id="4477" instrument_node="">I have struggled much these thirty years</span><br data-dcnode-id="4476"><span data-dcnode-id="4475" instrument_node="">in order to keep Persian.</span></i><span data-dcnode-id="4473" instrument_node="">
</span></b><span data-dcnode-id="4471" instrument_node=""> Ferdowsi.</span><br data-dcnode-id="4470"><br data-dcnode-id="4469"><span data-dcnode-id="4468" instrument_node="">Firdowsi Tusi (c. 940–1020), or Ferdowsi was a Persian poet and the author of Shahnameh (Book of Kings), which is the world's longest epic poem created by a single poet, and the national epic of Greater Iran. </span><br data-dcnode-id="4467"><br data-dcnode-id="4466"><span data-dcnode-id="4465" instrument_node="">Ferdowsi is celebrated as the most influential figure in Persian literature and one of the greatest in the history of literature. Among the great works of world literature, perhaps one of the least familiar to English readers is the Shahnameh: The Persian Book of Kings, the national epic of Persia. </span><br data-dcnode-id="4464"><br data-dcnode-id="4463"><span data-dcnode-id="4462" instrument_node="">This prodigious narrative, composed by the poet Ferdowsi between the years 980 and 1010, tells the story of preislamic Iran, beginning in the mythic time of Creation and continuing forward to the Arab invasion in the seventh century.</span><br data-dcnode-id="4461"><br data-dcnode-id="4460"><span data-dcnode-id="4459" instrument_node="">As a window on the world, Shahnameh belongs in the company of such literary masterpieces as Dante's Divine Comedy, the plays of Shakespeare, the epics of Homer— classics whose reach and range bring whole cultures into view. In its pages are unforgettable moments of national triumph and failure, human courage and cruelty, blissful love and bitter grief.</span><br data-dcnode-id="4458"><br data-dcnode-id="4457"><span data-dcnode-id="4456" instrument_node="">In tracing the roots of Iran, Shahnameh initially draws on the depths of legend and then carries its story into historical times, when ancient Persia was swept into an expanding Islamic empire. </span><br data-dcnode-id="4455"><br data-dcnode-id="4454"><span data-dcnode-id="4453" instrument_node="">تاریخ خوانش ای نسخه: روز دهم ماه ژوئن سال2009میلادی</span><br data-dcnode-id="4452"><br data-dcnode-id="4451"><span data-dcnode-id="4450" instrument_node="">عنوان: شاهنامه فردوسی؛ شاعر: ابوالقاسم فردوسی؛ ویرایش: فریدون جنیدی؛ تهران، بنیاد نیشابور، نشر بلخ؛ سال1387؛ در شش جلد؛ شابک دوره9789646337442؛ موضوع: شعر شاعران ایران - سده چهارم هجری - سده11میلادی</span><br data-dcnode-id="4449"><br data-dcnode-id="4448"><span data-dcnode-id="4447" instrument_node="">شاهنامه اثر حکیم «ابوالقاسم فردوسی طوسی»، حماسه ‌ای منظوم، دربرگیرنده نزدیک به پنجاه هزار بیت تا نزدیک به شصت و یک هزار بیت است و یکی از بزرگ‌ترین و برجسته‌ ترین سروده‌ های حماسیِ جهان است، که سرایش آن دست‌آوردِ دست‌کم سی سال کارِ پیوسته ی این سخن‌سرای نامدار ایرانی است؛ موضوع این شاهکار ادبی، افسانه‌ ها و تاریخ ایران از آغاز تا حمله ی عرب‌ها به ایران در سده ی هفتم میلادی است (شاهنامه از سه بخش اسطوره، پهلوانی و تاریخی شکل گرفته است) که در چهار دودمان پادشاهیِ «پیشدادیان»، «کیانیان»، «اشکانیان» و «ساسانیان» گنجانده می‌شود</span><br data-dcnode-id="4446"><br data-dcnode-id="4445"><span data-dcnode-id="4444" instrument_node="">فردوسی سرایش خود و منبع آن را چندین بار «نامه»، «نامه ی باستان»، «نامه ی خسروان»، «نامه ی شهریار» و از این دست نامیده، اما در هیچ‌جای، آن را «شاهنامه» یا در تنگنای وزن، «شهنامه» نام نداده ‌است؛ تنها در یک بیت از هجونامه «شهنامه» آمده ‌است؛ اما همه ی آثار منظوم و منثور در آن روزگار را — که دربردارنده ی پادشاهی ایران، از کیومرث تا یزدگرد بود، بیشتر «شاهنامه» خوانده‌ اند، و نام منبع فردوسی هم «شاهنامه ی ابومنصوری» بوده است؛ گذشته از این‌ها، منابع پس از فردوسی، اثر او را «شاهنامه» نامیده‌ اند، و در همه ی دست‌نویس‌های آن و برگردان عربی نیز، نام آن «شاهنامه» آمده‌ است؛ با نگرش به این نشانه‌ ها و اینکه «شاهنامه» برگردان پارسی «خدای ‌نامگ» در پهلوی بوده، گمانی برجای نمی‌ماند که نام این کتاب «شاهنامه» بوده ‌است</span><br data-dcnode-id="4443"><br data-dcnode-id="4442"><span data-dcnode-id="4441" instrument_node="">تاریخ بهنگام رسانی 09/04/1399هجری خورشیدی؛ 29/01/1401هجری خورشیدی؛ ا. شربیانی</span></span><span data-dcnode-id="4439" instrument_node="">

</span><span data-dcnode-id="4337" id="freeTextContainer3102216099545936145"><span data-dcnode-id="4341" instrument_node="">The history of the world is a history of jerks. Starting with Gilgamesh, our earliest epic hero, who makes everyone wrestle him until they are exhausted then goes off to sleep with their wives while they pray to the gods to deliver them, to Achilles sulking in his tent, the Athenians sentencing Socrates to die because he talks too much, or Tacitus writing of how Caligula, Claudius, and Nero ruled through assassination and manipulation.</span><br data-dcnode-id="4340"><br data-dcnode-id="4339"><span data-dcnode-id="4338" instrument_node="">Sure, there are always a few level-headed, intelligent fellow</span></span><span data-dcnode-id="4336" instrument_node="">
</span><span data-dcnode-id="4299" id="freeText3102216099545936145" style="display:none"><span data-dcnode-id="4335" instrument_node="">The history of the world is a history of jerks. Starting with Gilgamesh, our earliest epic hero, who makes everyone wrestle him until they are exhausted then goes off to sleep with their wives while they pray to the gods to deliver them, to Achilles sulking in his tent, the Athenians sentencing Socrates to die because he talks too much, or Tacitus writing of how Caligula, Claudius, and Nero ruled through assassination and manipulation.</span><br data-dcnode-id="4334"><br data-dcnode-id="4333"><span data-dcnode-id="4332" instrument_node="">Sure, there are always a few level-headed, intelligent fellows, like Caesar, Odysseus, the Sire de Coucy--and in the Shahnameh, Rostam--but even they can't escape the machinations of the headstrong, foolish jerks that surround them. As far as Epics go, the Shahnameh is one of the darkest I've read, with a jerk quotient that's off the charts. The whole thing progresses as a series of blood feuds, deadly (and tragic) misunderstandings, endless duels over minor points of honor, fathers against sons, sons against mothers, uncles against everyone, mistrust and malicious rumor, and greed-driven betrayals.</span><br data-dcnode-id="4331"><br data-dcnode-id="4330"><span data-dcnode-id="4329" instrument_node="">Sure, there are a few genuinely reasonable guys throughout, but you can always bet that, in the end, some unstable noble with a chip on his shoulder is going to mess everything up. However, that isn't to say that the jerks are nonsensical or comically evil--pretty much every one has a good side, a sense of honor, a family--it's just that most of them seem to have the emotional self-control of a toddler.</span><br data-dcnode-id="4328"><br data-dcnode-id="4327"><span data-dcnode-id="4326" instrument_node="">It reminded me of the nobles in </span><a data-dcnode-id="4324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/568236.A_Distant_Mirror" rel="nofollow noopener"><span data-dcnode-id="4325" instrument_node="">A Distant Mirror</span></a><span data-dcnode-id="4323" instrument_node=""> who would spend all of their crusading gold on matching green silk doublets and then show up to the battle without armor or supplies. Certainly, I never found the characters' actions unlikely, though I would have appreciated a bit more explanation from Ferdowsi on precisely </span><i data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">why</span></i><span data-dcnode-id="4320" instrument_node=""> certain individuals kept making the same stupid errors. Much of the depth and sympathy in the </span><i data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">Iliad</span></i><span data-dcnode-id="4317" instrument_node=""> stems from the fact that Homer uses the power of rhetoric to make it easy to understand the motivations behind all the pointless conflicts.</span><br data-dcnode-id="4316"><br data-dcnode-id="4315"><span data-dcnode-id="4314" instrument_node="">Ferdowsi is a masterful writer, however, and his prose is full of a vital energy, a poetry of odd and evocative metaphors that made the scenes something more than simply real--made them mythical. The image of an elephant's legs being so stained with man's blood that they seem to be 'pillars of coral', or Rustam's statement that, though he serves the Shah, he is still king of the world, his horse a throne, his sword a seal, his helm a crown, or this description of the coming of a Great Prophet (though I am unsure which one) to Persia:</span><br data-dcnode-id="4313"><blockquote data-dcnode-id="4308"><span data-dcnode-id="4312" instrument_node="">
</span><i data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">He reared throughout the realm a tree of godly foliage, and men rested beneath its branches. And whosoever ate of the leaves thereof was learned in all that regardeth the life to come, but whosoever who ate of the branches was perfect in wisdom and faith.</span></i><span data-dcnode-id="4309" instrument_node="">
</span></blockquote><br data-dcnode-id="4307"><span data-dcnode-id="4306" instrument_node="">Unfortunately, this translation is incomplete, ending before the coming of Eskandar (Alexander the Great), the full poem being longer than the Iliad and Odyssey combined, so it seems the rest shall have to wait.</span><br data-dcnode-id="4305"><br data-dcnode-id="4304"><span data-dcnode-id="4303" instrument_node="">Also delightful, particularly for the devoted fantasist, is the depiction of remarkable and wondrous magics of many sorts, from guardian spirits and races of magical beings, both fair and wicked, to great wizard-kings who transform into poison-spitting serpents and watch the world through crystal globes. It is always inspiring to witness depictions of magic that truly surprise and mystify the reader, capable of suggesting a marvelous world somewhere beyond our own.</span><br data-dcnode-id="4302"><br data-dcnode-id="4301"><span data-dcnode-id="4300" instrument_node="">Of course, to any student of the tradition of the cultural epic, the great work which captures the spirit of a people and an age, and sets the precedent for all works to follow, few works are equal in scope, artistry, and influence--perhaps only that of Homer and Virgil, the Ramayana and Mahabharata of India, the Four Great Novels of China, and the Bible.</span></span><span data-dcnode-id="4298" instrument_node="">

</span><span data-dcnode-id="3995" id="freeTextContainer13246517270385193639"><i data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">Shahnameh: The Epic of Persian Kings</span></i><span data-dcnode-id="3996" instrument_node=""> is a formidable book &amp; most translations do not include the entire manuscript. Having read parts of the translation by Dick Davis, I was informed that a new translation was in the works, just as I prepared for a visit to Iran during the summer of 2012 &amp; quite conveniently taking a mini-course on the book, taught by Prof. Ahmad Sadri, who just happened to be the person doing the new translation. The new translation in an oversized format within a slipcase, wit</span></span><span data-dcnode-id="3994" instrument_node="">
</span><span data-dcnode-id="3922" id="freeText13246517270385193639" style="display:none"><i data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">Shahnameh: The Epic of Persian Kings</span></i><span data-dcnode-id="3991" instrument_node=""> is a formidable book &amp; most translations do not include the entire manuscript. Having read parts of the translation by Dick Davis, I was informed that a new translation was in the works, just as I prepared for a visit to Iran during the summer of 2012 &amp; quite conveniently taking a mini-course on the book, taught by Prof. Ahmad Sadri, who just happened to be the person doing the new translation. The new translation in an oversized format within a slipcase, with wonderful illustrations by Hamid Rahmanian, appeared in 2013.</span><br data-dcnode-id="3990"><br data-dcnode-id="3989"><img class="gr-hostedUserImg" data-dcnode-id="3988" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1590277679i/29530368._SY540_.jpg&amp;raw"><br data-dcnode-id="3987"><br data-dcnode-id="3986"><span data-dcnode-id="3985" instrument_node="">The </span><i data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">Shahnameh</span></i><span data-dcnode-id="3982" instrument_node=""> comes with a considerable preamble because it is perhaps the most important book within Iran, a mix of mythology, history &amp; epic poetry, detailing 4 love stories &amp; 4 tragedies, 60,000 lines in all and the source of performance art in Iranian cafes &amp; elsewhere in the country. </span><br data-dcnode-id="3981"><br data-dcnode-id="3980"><span data-dcnode-id="3979" instrument_node="">It is said to be twice the size of Homer's </span><i data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">Odyssey</span></i><span data-dcnode-id="3976" instrument_node=""> &amp; </span><i data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">Iliad</span></i><span data-dcnode-id="3973" instrument_node=""> combined, expressed in an active voice (unlike Homer), with some of the tales going back to the 5th century B.C.E. and ending at about the time of the time of the Arab conquest of Iran in 651 C.E. The conquest caused the displacement of the Zoroastrian religion by Islam, though Zoroastrian New Year is still proudly celebrated in Iran in March. </span><br data-dcnode-id="3972"><br data-dcnode-id="3971"><span data-dcnode-id="3970" instrument_node="">Reading the new translation is akin to reading a graphic novel, with beautiful computer-generated illustrations by Rahmanian on every page, making it far more visually dynamic than other translations. The author of the </span><i data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">Shahnameh</span></i><span data-dcnode-id="3967" instrument_node="">, Ferdowsi (which means paradise in Farsi or Persian) speaks directly to the reader &amp; often inserts what might be called guidelines for ethical action. </span><br data-dcnode-id="3966"><br data-dcnode-id="3965"><span data-dcnode-id="3964" instrument_node="">Among the things the book accomplished was to preserve the language of Iran when the conquering Arabs had demanded that it be replaced by Arabic. Thus, the </span><i data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">Shahnameh</span></i><span data-dcnode-id="3961" instrument_node=""> is not just an epic book of stories but a source of Iranian pride that incorporates science, art, philosophy &amp; especially Persian culture &amp; language, all in ferment after the Arab conquest. </span><br data-dcnode-id="3960"><br data-dcnode-id="3959"><img class="gr-hostedUserImg" data-dcnode-id="3958" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1590277679i/29530369._SX540_.jpg&amp;raw"><br data-dcnode-id="3957"><br data-dcnode-id="3956"><span data-dcnode-id="3955" instrument_node="">The stories of folk heroes such as the knight Rostam (a sort of Persian superman figure who lived 800 years) match Persia (today's Iran) against the forces of the mythical empire of Turan, or "the East", an area that today includes Turkmenistan, the old Silk Road area of China &amp; similar regions and Rostam seems the invincible force called on periodically to rescue those kings who have made decisions that imperil them. Rostam is also a sort of "Oedipus in reverse", killing his own unrecognized son. </span><br data-dcnode-id="3954"><br data-dcnode-id="3953"><span data-dcnode-id="3952" instrument_node="">As a word of warning, there are countless bloody battles &amp; beheadings, including some of the more heroic folks within the epic. Alas, even valiant &amp; always resourceful Rostam &amp; his incredible horse Rakhsh are ultimately betrayed by a family member and perish.</span><br data-dcnode-id="3951"><br data-dcnode-id="3950"><img class="gr-hostedUserImg" data-dcnode-id="3949" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1590280177i/29530452._SX540_.jpg&amp;raw"><br data-dcnode-id="3948"><br data-dcnode-id="3947"><span data-dcnode-id="3946" instrument_node="">While the Persian kings are portrayed with halos, they are quite fallible &amp; often need to be rescued and their various misdirections of authority are explained by authorial cautions in italics. Ferdowi calls the specific chapters "tales" but cautions that they are allegorical--rendered myths or "truths revealed in disguise". There is a magical quality about the book, in part because of the exceedingly colorful illustrations by Rahmanian but also because of the inserted bits of wisdom offered by Ferdowsi:</span><blockquote data-dcnode-id="3938"><span data-dcnode-id="3945" instrument_node="">There is no parity between joy &amp; grief in this den of strife; One thing remains after we're gone: a good name; And that's the lesson of Kay Khosrow's life. </span><br data-dcnode-id="3944"><br data-dcnode-id="3943"><span data-dcnode-id="3942" instrument_node="">Life is full of mysteries to ponder; None can unravel this riddle of existence: So don't squander your labors on the surface of the stories; Look instead at the truths behind the signs; Where faith &amp; reason are at peace. </span><br data-dcnode-id="3941"><br data-dcnode-id="3940"><span data-dcnode-id="3939" instrument_node="">The fickle world, capriciously grants favors &amp; ever inflicts unjust pain. Fortunate is the one who supplants worries for serenity of the heart, calms his covetous nature &amp; shares his wealth, without fears &amp; petty qualms.</span></blockquote><span data-dcnode-id="3937" instrument_node="">Out of context, this may seem like fortune cookie wisdom but appearing after battles lost, children slain, willful alliances that fail, family disloyalty &amp; untold mistakes of judgement, Ferdowsi's commentary is uplifting. The author believes in divine forces, inescapable fates and reminds the reader that life in impermanent, thus cautioning to avoid greed &amp; attempt to be happy because all else is illusory. </span><br data-dcnode-id="3936"><br data-dcnode-id="3935"><img class="gr-hostedUserImg" data-dcnode-id="3934" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1590277679i/29530370._SX540_.jpg&amp;raw"><span data-dcnode-id="3933" instrument_node=""> </span><br data-dcnode-id="3932"><span data-dcnode-id="3931" instrument_node=""> </span><br data-dcnode-id="3930"><span data-dcnode-id="3929" instrument_node="">It seems appropriate to have at long last read The "Persian Book of Kings" because the epic book by Absolqasen Ferdowsi was finally completed after 30+ years in 1010 &amp; so by doubling that date, we have 2020. At book's end, the author comments:</span><blockquote data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">Magnificent buildings decay by the dint of time; And exposure to the elements wrecks even a house of flint; For 3 decades have I suffered to restore; This Persian tongue &amp; now my work is done.</span></blockquote><span data-dcnode-id="3926" instrument_node="">*There is a helpful genealogy of the main characters + an excellent introduction to the illustrations by Hamid Rahmanian, a creative effort that took 10,000 hours to achieve. **Included within my review are photo images of the translator, my friend Ahmad Sadri; the image of the author, Ferdowsi + two examples of the wonderful illustrations by Hamid Rahmanian in this new version of the </span><i data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">Shahnameh</span></i><span data-dcnode-id="3923" instrument_node="">, an epic book I very much enjoyed.</span></span><span data-dcnode-id="3921" instrument_node="">

</span><span data-dcnode-id="3814" id="freeTextContainer16811620196539686043"><i data-dcnode-id="3818"><span data-dcnode-id="3823" instrument_node="">The olden kings gave us the gift of a peaceful holiday.</span><br data-dcnode-id="3822"><span data-dcnode-id="3821" instrument_node="">Calling for wine and musicians at the onset of spring</span><br data-dcnode-id="3820"><span data-dcnode-id="3819" instrument_node="">They forgave, they forgot, and drank their worries away.</span></i><br data-dcnode-id="3817"><br data-dcnode-id="3816"><span data-dcnode-id="3815" instrument_node="">This is a review of the edition of Shanameh published by the Quantuck Lane Press. It is an adaptation, as labeled on the first page; it is certainly shorter than the full text as listed for the Penguin etc. editions. But it is accompanied by beautifully ornate, full illustrations on every page, original to the edition, and the text ce</span></span><span data-dcnode-id="3813" instrument_node="">
</span><span data-dcnode-id="3733" id="freeText16811620196539686043" style="display:none"><i data-dcnode-id="3807"><span data-dcnode-id="3812" instrument_node="">The olden kings gave us the gift of a peaceful holiday.</span><br data-dcnode-id="3811"><span data-dcnode-id="3810" instrument_node="">Calling for wine and musicians at the onset of spring</span><br data-dcnode-id="3809"><span data-dcnode-id="3808" instrument_node="">They forgave, they forgot, and drank their worries away.</span></i><br data-dcnode-id="3806"><br data-dcnode-id="3805"><span data-dcnode-id="3804" instrument_node="">This is a review of the edition of Shanameh published by the Quantuck Lane Press. It is an adaptation, as labeled on the first page; it is certainly shorter than the full text as listed for the Penguin etc. editions. But it is accompanied by beautifully ornate, full illustrations on every page, original to the edition, and the text certainly seems adequate to get a good sense of the full work. This is a large scale (about 14 inches tall and 10 wide) deluxe production. The one I have from the library is covered in bright green cloth with a gold and maroon emblem on the front. The illustrations are stunning, and repay close attention. You can see several two-page spreads using the ‘more’ button below the large picture of the cover at:</span><br data-dcnode-id="3803"><br data-dcnode-id="3802"><a data-dcnode-id="3800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.barnesandnoble.com/w/shahnameh-ferdowsi/1111013803%3Fean%3D9781593720513" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3801" instrument_node="">http://www.barnesandnoble.com/w/shahn...</span></a><br data-dcnode-id="3799"><br data-dcnode-id="3798"><span data-dcnode-id="3797" instrument_node="">There is a long tradition of illustrations for the Shanameh, both for Iranian patrons and for export to the Ottoman Empire and India. The introduction doesn’t discuss how this fits into Islamic prohibitions of figurative art. There was a major exhibition of Shanameh art at the Metropolitan Museum of Art several years ago, and it would be interesting to compare these contemporary, but traditional, illustrations with the ones in the catalog:</span><br data-dcnode-id="3796"><br data-dcnode-id="3795"><a data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/16115834-a-king-s-book-of-kings" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3794" instrument_node="">https://www.goodreads.com/book/show/1...</span></a><br data-dcnode-id="3792"><br data-dcnode-id="3791"><span data-dcnode-id="3790" instrument_node="">Wikipedia says Ferdowsi wrote this between 977 and 1010. It portrays Iran from earliest time until the Islamic conquest in the seventh century. The only religion mentioned in it is Zoroastrianism.</span><br data-dcnode-id="3789"><br data-dcnode-id="3788"><span data-dcnode-id="3787" instrument_node="">The translation/adaptation is a mix of prose and poetry, although my extracts here only quote the infrequent poetic pieces. Ferdowsi’s original consists of 50,000 couplets. As in the Bible, some people live for hundreds of years, while others age and die around them. There are fairies and demons, although in this adaptation humans are by far the main characters. </span><br data-dcnode-id="3786"><br data-dcnode-id="3785"><span data-dcnode-id="3784" instrument_node="">I’m not going to try to summarize the Wikipedia commentary of the Shanameh’s importance in Persian history, language and literature here; but learning about the role of the poem would be well worth while. The lack of any useful forward or notes in this book is a drawback but it is clearly not meant as a scholarly or complete version--this edition is about the story and the art.</span><br data-dcnode-id="3783"><br data-dcnode-id="3782"><span data-dcnode-id="3781" instrument_node="">At first the names and genealogy go by at dizzying speed, but the story settles in to a tale of three of four generations of two main familes in Persia and a handful in Turan, to the northeast of modern Iran (Turkmenestan). A surface reaction is that nothing changes from Herodotus to today’s New York Times: the lead story is endless rounds of vengeance and beheadings. Massive armies and endless battles. For generations and generations. This is the national epic of Iran, the stories all children presumably hear from infancy. They also hear beautiful prose and poetry, and they hear about heros who try to cauterize the last emotional wounds and stop the cycle of revenge.</span><br data-dcnode-id="3780"><br data-dcnode-id="3779"><i data-dcnode-id="3773"><span data-dcnode-id="3778" instrument_node="">False confidence leads a foolish man to slaughter.</span><br data-dcnode-id="3777"><span data-dcnode-id="3776" instrument_node="">He stomps on solid ground but it turns out to be</span><br data-dcnode-id="3775"><span data-dcnode-id="3774" instrument_node="">A layer of straw floating on a puddle of water.</span></i><br data-dcnode-id="3772"><br data-dcnode-id="3771"><span data-dcnode-id="3770" instrument_node="">At a deeper level, there is an epic story of dynasties and political negotiations about what kind of government will prevail. Ferdowsi is also an incredible psychologist. His kings and warriors are always in flux between their impetuous impulses and reflective wisdom. </span><br data-dcnode-id="3769"><br data-dcnode-id="3768"><i data-dcnode-id="3755"><span data-dcnode-id="3767" instrument_node="">The world is full of mysteries as it makes and breaks. </span><br data-dcnode-id="3766"><span data-dcnode-id="3765" instrument_node="">Love and wisdom forsook them both, nor did</span><br data-dcnode-id="3764"><span data-dcnode-id="3763" instrument_node="">One of them pause to correct his mistakes.</span><br data-dcnode-id="3762"><br data-dcnode-id="3761"><span data-dcnode-id="3760" instrument_node="">Fish, onager, and beasts of burden in their mangers</span><br data-dcnode-id="3759"><span data-dcnode-id="3758" instrument_node="">Know their own, but greed so blinded father and son</span><br data-dcnode-id="3757"><span data-dcnode-id="3756" instrument_node="">That they faced each other as strangers.</span></i><br data-dcnode-id="3754"><br data-dcnode-id="3753"><span data-dcnode-id="3752" instrument_node="">He portrays many of the early kings of Persia and weak or disastrous rulers, who embroiled their countries in unnecessary wars and were vindictive or unappreciative of the brave defenders. Other rulers, however, were upright and wise, and fostered art, science and justice. There is a touching story of one king at only sixty years old, worn down by his duties, climbing a mountain in winter to die, disappearing, and the heroes who accompanied him against his counsel dying in the blizzard as well. One gets a sense of the different cultural background of simultaneous political and military leaders and dynasties that I read as a very old tradition that may be a source of the later approach to the very different scopes of political and religious rule, when compared to the modern West. Just a guess.</span><br data-dcnode-id="3751"><br data-dcnode-id="3750"><span data-dcnode-id="3749" instrument_node="">Women are not omitted. There is a story that is very close to the Greek Phaedre, with disastrous results. Other women are mothers with wise advice, beautiful daughters and brides, and brave widows committing mass suicide to avoid capture as war booty. Horses are just about as important as lovers. As the supreme hero Rostam is finally returned in state to his city after a gruesome death by treachery at the end of the work, his faithful horse is treated to the same honored trip via a bejeweled platform on an elephant.</span><br data-dcnode-id="3748"><br data-dcnode-id="3747"><i data-dcnode-id="3734"><span data-dcnode-id="3746" instrument_node="">Magnificent buildings decay by the dint of time</span><br data-dcnode-id="3745"><span data-dcnode-id="3744" instrument_node="">And exposure to the elements wrecks even a house of flint</span><br data-dcnode-id="3743"><span data-dcnode-id="3742" instrument_node="">But the poetic edifice I have erected in rhyme</span><br data-dcnode-id="3741"><br data-dcnode-id="3740"><span data-dcnode-id="3739" instrument_node="">Shall endure the contagion of the rain and the sun. </span><br data-dcnode-id="3738"><span data-dcnode-id="3737" instrument_node="">For three decades have I thus suffered to restore</span><br data-dcnode-id="3736"><span data-dcnode-id="3735" instrument_node="">This Persian tongue and now my work is done. </span></i></span><span data-dcnode-id="3732" instrument_node="">

</span><span data-dcnode-id="3621" id="freeTextContainer5866173458844628339"><span data-dcnode-id="3628" instrument_node="">Time is beneficial when reading this one.</span><br data-dcnode-id="3627"><br data-dcnode-id="3626"><span data-dcnode-id="3625" instrument_node="">I originally started this July 2017 and am now finished December 2018. That would be a year and a half spent with this book. And it's so incredibly appropriate because this book is a chronicle of Persia's history told through the lineage of its kings.</span><br data-dcnode-id="3624"><br data-dcnode-id="3623"><span data-dcnode-id="3622" instrument_node="">This book begins with the Persian creation story with all of its absolute wild, unpredictable magical elements. The early stories contain magic &amp; mythological creatures. I'm sure if you grew up with classic W</span></span><span data-dcnode-id="3620" instrument_node="">
</span><span data-dcnode-id="3555" id="freeText5866173458844628339" style="display:none"><span data-dcnode-id="3619" instrument_node="">Time is beneficial when reading this one.</span><br data-dcnode-id="3618"><br data-dcnode-id="3617"><span data-dcnode-id="3616" instrument_node="">I originally started this July 2017 and am now finished December 2018. That would be a year and a half spent with this book. And it's so incredibly appropriate because this book is a chronicle of Persia's history told through the lineage of its kings.</span><br data-dcnode-id="3615"><br data-dcnode-id="3614"><span data-dcnode-id="3613" instrument_node="">This book begins with the Persian creation story with all of its absolute wild, unpredictable magical elements. The early stories contain magic &amp; mythological creatures. I'm sure if you grew up with classic Western Fairy tales, there's one that will shock you: 'Western writers stole that idea from here!' Trust me, once you read it, it's unmistakable which one I'm referring to.</span><br data-dcnode-id="3612"><br data-dcnode-id="3611"><span data-dcnode-id="3610" instrument_node="">The bulk of this amazing book are travelling, letters, battles, marital allegiances, powerful women &amp; the men who fail to take the solid advice of their ladies. Some of the battles are pretty exciting to read when the dust rises up &amp; we lose sight of who's winning. Other battles &amp; shifts of kingly power are difficult to follow because anytime you condense 1000's of years of history into 900 pages, there's going to be A LOT of names mentioned with how they all relate to each other. Don't fret though, just read on.</span><br data-dcnode-id="3609"><br data-dcnode-id="3608"><span data-dcnode-id="3607" instrument_node="">Dick Davis' language sings all through Persia's history. His approach to task is fantastic. He condenses each of the original books. The original length is a collection of encyclopedias of course. So he's vey systematic about what he includes and how he showcases some of the more poetic scenes. In his introduction, he admits to leaving out some offending passages that newcomers to Persian literature could be turned off by. Instead, he evens out the coverage of many kings which is a slight change from the original author, Ferdowsi's approach. He does this to give a more comprehensive coverage of the original book within a limited number of pages. Some kings still receive a whole lot more attention &amp; this reflects the original. </span><br data-dcnode-id="3606"><br data-dcnode-id="3605"><span data-dcnode-id="3604" instrument_node="">What I appreciate most of all with Davis' translation is he renders this epic poem into a highly readable edition for those completely unfamiliar with Persian Literature or even the culture of this entire world &amp; its history. It doesn't read like a beginner's book, there's still plenty of complexity to keep the most avid reader busy looking up references for a few years at least. </span><br data-dcnode-id="3603"><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">For those poetic scenes, often they are key moments in the story that I'm sure Persian folks know well &amp; love. Davis kept them in poetic language with meter &amp; rhyme. These are some of the most beautiful parts of the book &amp; makes me want to read a poetic translation of The Shahnameh. Not only because they are emotionally driven scenes but also because Davis writes like a poet.</span><br data-dcnode-id="3600"><br data-dcnode-id="3599"><span data-dcnode-id="3598" instrument_node="">Here's an example from near the beginning. This brief poem describes the birth of Rostam, the greatest hero in this book. And one of the coolest characters I've read during my epics project so far.</span><br data-dcnode-id="3597"><br data-dcnode-id="3596"><span data-dcnode-id="3595" instrument_node="">"He'll master all the beasts of earth and air,</span><br data-dcnode-id="3594"><span data-dcnode-id="3593" instrument_node="">He'll terrify the dragon in its lair;</span><br data-dcnode-id="3592"><span data-dcnode-id="3591" instrument_node="">When such a voice rings out, the leopard gnaws</span><br data-dcnode-id="3590"><span data-dcnode-id="3589" instrument_node="">In anguished terror its unyielding claws;</span><br data-dcnode-id="3588"><span data-dcnode-id="3587" instrument_node="">Wild on the battlefield that voice will make</span><br data-dcnode-id="3586"><span data-dcnode-id="3585" instrument_node="">The hardened hearts of iron warriors quake;</span><br data-dcnode-id="3584"><span data-dcnode-id="3583" instrument_node="">Of cypress stature and of mammoth might,</span><br data-dcnode-id="3582"><span data-dcnode-id="3581" instrument_node="">Two miles will barley show his javelin's flight."</span><br data-dcnode-id="3580"><br data-dcnode-id="3579"><span data-dcnode-id="3578" instrument_node="">(Rostam, The Son of Zal-Dastan, </span><br data-dcnode-id="3577"><span data-dcnode-id="3576" instrument_node="">The Birth of Rostam, </span><br data-dcnode-id="3575"><span data-dcnode-id="3574" instrument_node="">Page 104-105)</span><br data-dcnode-id="3573"><br data-dcnode-id="3572"><span data-dcnode-id="3571" instrument_node="">The one shortcoming is I wish this edition contains a map for the various locations everyone traveled to. There are quite a few and a map would improve my understanding of the text immensely. I'm sure many of these place names have been renamed over time so google maps is no help whatsoever. I've tried searching for maps of The Shahnameh online, but with no English success so far. </span><br data-dcnode-id="3570"><br data-dcnode-id="3569"><span data-dcnode-id="3568" instrument_node="">If you're interested in getting into Persian Literature, of course the well known poems of Rumi and other mystics are a great starting point. As an introduction, I highly recommend The Conference of the Birds, also translated by Dick Davis.</span><br data-dcnode-id="3567"><br data-dcnode-id="3566"><span data-dcnode-id="3565" instrument_node="">This could be a great book if you enjoy epic long tomes filled with adventure, complex who's who, some mythological elements, history &amp; some references to writing as it's developing throughout history with plenty of battle scenes &amp; some romance mixed in.</span><br data-dcnode-id="3564"><br data-dcnode-id="3563"><span data-dcnode-id="3562" instrument_node="">Keep in mind, it's 900 pages with almost constant warfares, so it's certainly not for everyone. The shifts in power &amp; keeping track of who's who &amp; why they have a grievence was the most grinding aspect of this read. The battles certainly were not grinding to read for some reason.</span><br data-dcnode-id="3561"><br data-dcnode-id="3560"><span data-dcnode-id="3559" instrument_node="">A brief video review:</span><br data-dcnode-id="3558"><a data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/5gzhH0DRNP8" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3557" instrument_node="">https://youtu.be/5gzhH0DRNP8</span></a></span><span data-dcnode-id="3554" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="3345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/15822302-robert-sheppard%3Fshelf%3Dworld-literature"><span data-dcnode-id="3346" instrument_node="">world-literature</span></a><span data-dcnode-id="3344" instrument_node="">

</span><span data-dcnode-id="3332" id="freeTextContainer4409547375549124272"><span data-dcnode-id="3337" instrument_node="">PERSIAN MASTERPIECES OF WORLD LITERATURE--RUMI'S "BOOK OF LOVE &amp; SUFI POEMS," OMAR KHAYYAM'S "RUBAIYAT," ATTAR'S "PARLIAMENT OF THE BIRDS," NIZAMI'S "LAYLA &amp; MAJNUN," FIRDUSI'S "SHAHNAMA," POEMS AND GHAZALS OF HAFIZ &amp; GHALIB ---FROM THE WORLD LITERATURE FORUM RECOMMENDED CLASSICS AND MASTERPIECES SERIES VIA GOODREADS—-ROBERT SHEPPARD, EDITOR-IN-CHIEF</span><br data-dcnode-id="3336"><br data-dcnode-id="3335"><br data-dcnode-id="3334"><span data-dcnode-id="3333" instrument_node="">Goethe honored Persian Literature as one of the four great literary traditions of World Literature, or "Weltliteratur" as he named it. In his "West-</span></span><span data-dcnode-id="3331" instrument_node="">
</span><span data-dcnode-id="3040" id="freeText4409547375549124272" style="display:none"><span data-dcnode-id="3330" instrument_node="">PERSIAN MASTERPIECES OF WORLD LITERATURE--RUMI'S "BOOK OF LOVE &amp; SUFI POEMS," OMAR KHAYYAM'S "RUBAIYAT," ATTAR'S "PARLIAMENT OF THE BIRDS," NIZAMI'S "LAYLA &amp; MAJNUN," FIRDUSI'S "SHAHNAMA," POEMS AND GHAZALS OF HAFIZ &amp; GHALIB ---FROM THE WORLD LITERATURE FORUM RECOMMENDED CLASSICS AND MASTERPIECES SERIES VIA GOODREADS—-ROBERT SHEPPARD, EDITOR-IN-CHIEF</span><br data-dcnode-id="3329"><br data-dcnode-id="3328"><br data-dcnode-id="3327"><span data-dcnode-id="3326" instrument_node="">Goethe honored Persian Literature as one of the four great literary traditions of World Literature, or "Weltliteratur" as he named it. In his "West-Oestlicher Divan" or (West-East Divan) he celebrated a German translation of the poems of the immortal Persian poet Hafiz (1326-90)as a major revelation of the genius of Persian poetry and its place in World Literature. He called on all writers in Germany and the West to rise to their cosmopolitan duty to widen their cultural horizons globally beyond their own familiar tradition of the West in order to strengthen their own creative powers and participate in the globalization of literature and human consciousness:</span><br data-dcnode-id="3325"><br data-dcnode-id="3324"><span data-dcnode-id="3323" instrument_node="">"I am more and more convinced, that poetry is the universal possession of mankind, revealing itself everywhere and at all times in hundreds and hundreds of men . . . I therefore like to look about me in foreign nations, and advise everyone to do the same. National literature is now a rather unmeaning term; the epoch of world literature is at hand, and everyone must strive to hasten its approach." </span><br data-dcnode-id="3322"><br data-dcnode-id="3321"><span data-dcnode-id="3320" instrument_node="">Matthew Arnold, another keen admirer of Persian Literature who included the classic tale of "Sohrab and Rustum" in his own poetry, seconded Goethe's view on the crucial necessity for all educated and civilized people in the West and elsewhere---writers, critics and readers, to look for "the best that has been known and thought in the world" without respect to borders, languages, political or religious differences, stating in his seminal essay "The Function of Criticism at the Present Time:" </span><br data-dcnode-id="3319"><br data-dcnode-id="3318"><span data-dcnode-id="3317" instrument_node="">"But criticism, real criticism, obeys an instinct prompting it to try to know the best that is known and thought in the world, irrespectively of practice, politics, and everything of the kind; and to value knowledge and thought as they approach this best, without the intrusion of any other considerations whatever......one may say, that to get anywhere near this standard, every critic should try and possess one great literature, at least, besides his own; and the more unlike his own, the better."</span><br data-dcnode-id="3316"><br data-dcnode-id="3315"><span data-dcnode-id="3314" instrument_node="">It is in this spirit that World Literature Forum has embarked on this series of "Recommended Classics and Masterpieces of World Literature," on LinkedIn, Facebook, Goodreads and Wordpress, including this entry on Persian Literature, to introduce to the literary community and global Republic of Letters in the age of Globalization and the Internet, new authors, works and international perspectives. </span><br data-dcnode-id="3313"><br data-dcnode-id="3312"><br data-dcnode-id="3311"><br data-dcnode-id="3310"><span data-dcnode-id="3309" instrument_node="">INTRODUCTION TO PERSIAN LITERATURE'S CONTRIBUTIONS TO WORLD LITERATURE</span><br data-dcnode-id="3308"><br data-dcnode-id="3307"><br data-dcnode-id="3306"><span data-dcnode-id="3305" instrument_node="">The immense contribution of Persian literature and culture to World Literature and the history of global civilization is highly underappreciated, especially in recent times of political and religious conflict. Most of us in the West get our first impressions of Persian civilization from our reading of 5th century Greek history,foremost Herodtodus, in which the Ancient Greeks in the infancy of their own national history, and when "The West" was a mere notional concept, successfully resisted the invasions of a much greater "superpower" Persian Empire under Darius and Xerxes, followed centuries later by the an Greek triumph over it under Alexander the Great. At this time Persia was already the heir and transmitter of a Mesopotamian culture of 3000 years, including contributions from Sumerian, Assyrian, Babylonian and later Egyptian cultures that became part of the Achemaenid Persian Empire. </span><br data-dcnode-id="3304"><br data-dcnode-id="3303"><span data-dcnode-id="3302" instrument_node="">From the time of Alexander our cultural myopia often loses sight of the immense further contributions of Persian culture, both inside and outside the confines of Iran proper, down to the present. Nietzsche's landmark book "Also Sprach Zarathrustra," (Thus Spake Zarathrustra) reminds us of the continuing philosophical and spiritual contributions of Persian culture, across various centuries and dynasties. In the field of Renaissance Studies, or "Early Modern Studies" the contribution of the Arabic Golden Age (750-1250) to the rise of the Western Renaissance through preservation and transmission of the Greek and Roman classics such as Aristotle and Plato through Arabic translations is beginning to be known and appreciated. Less well recognized, however, is the crucial role of Persian culture in enabling that transmission, and thereby the Renaissance itself. </span><br data-dcnode-id="3301"><br data-dcnode-id="3300"><br data-dcnode-id="3299"><br data-dcnode-id="3298"><span data-dcnode-id="3297" instrument_node="">THE PERSIANS AS KEY ENABLERS OF THE WESTERN RENAISSANCE</span><br data-dcnode-id="3296"><br data-dcnode-id="3295"><br data-dcnode-id="3294"><br data-dcnode-id="3293"><span data-dcnode-id="3292" instrument_node="">Even before the rise of Islam Persia was instrumental in preserving the works and culture of classical antiquity from the intolerant Christian suppression under the Byzantine Empire. The thousand year old Great Library of Alexandria was first burnt and destroyed in the Christian represssion of "pagan" culture under the fundamentalist Theodosius, with the job probably being finalized in the Muslim conquest of Egypt. Many classical scholars fled the Byzantine Christian repression in both Alexandria and Constantinople, along with many Nestorian Christians who were branded "heretics," and settled in Persia, finding work and asylum at the renown Academy of Gondishapur of the Sassanian Persian dynasty. There they were employed in a systematic project to translate all outside works into Persian and preserve their texts and scholarly tradition. </span><br data-dcnode-id="3291"><br data-dcnode-id="3290"><br data-dcnode-id="3289"><span data-dcnode-id="3288" instrument_node="">With the coming of Islam and its conquests the Persian scholarly, administrative and technocratic community once again played a highly critical role in enabling the rise of the Arabic Golden Age that then passed on the knowledge and texts of the classical world to enable the Western Renaissance. A critical turning point was the establishment of the Abbasid Caliphate in Baghdad, which occured largely because of Persian support, especially that of the elite and scholarly Persian Barmacids, who then became the Vizirs under the Abbasid Caliphs, most memorably in the case of the Barmacid Jafar, who served as the Vizir of the Caliph Haroun al-Rashid in Baghdad, immortalized in the tales of the "One Thousand and One Nights." </span><br data-dcnode-id="3287"><br data-dcnode-id="3286"><span data-dcnode-id="3285" instrument_node="">By necessity the non-urban Arab conquerors turned to professional administrators, scholars and technocrats bred in the older empires such as the Persians. Though armed with the authority and force of the newly founded religion the aid of such scholarly, administrative and technocratic elites such as the Barmacids (Barmakids) of Persia was crucial in preventing the breakdown of the new domain. A crucial turning point in history was when after internecine conflict in the succession to the leadership after Mohammad, the Abbasid Caliphate took power and moved the headquarters from the Ummayad capital in Damascus to the newly founded capital in Baghdad. Moving the power center from the Arabian tribal lands allowed the Persians to assume a dominant role in its administration, though hereditary succession still derived from the lineage of Mohammad. The Persian language came into common use within the royal court and in administration on a widespread basis.</span><br data-dcnode-id="3284"><br data-dcnode-id="3283"><span data-dcnode-id="3282" instrument_node="">Crucially for literature, culture and the flourishing of the Arab Golden Age civilization, the Persian scholars and admiistrators succeeded in changing the culture of the Caliphate from a narrow Arab ethnocentricity to an inclusive cosmopolitan outlook open to outside influences and progressive internal development, albeit within the framework of the consensus of the Islamic religion and guiding Arabic traditions. The Barmacid Vizirs under Haroun Al-Rashid and Mamun established a key institution, the "House of Wisdom" or "Bayt-al-Hikma" which in and of itself, along with replicated instituions elsewhere in the Caliphate, may be credited with preservation of the bulk of the heritage of classical antiquity and perhaps enabling the rise of the Renaissance in the West. Especially under the Caliph Manun the House of Wisdom grew to become a national library, a center of translation from all languages and cultures into Arabic and Persian and a national Academy of Arts and Sciences supporting scholarly research, writing and projects.</span><br data-dcnode-id="3281"><br data-dcnode-id="3280"><span data-dcnode-id="3279" instrument_node="">The House of Wisdom was based on and inherited much of the resource base of the prior Sassanid Academy of Gondishapur. Scholars were employed and recruited as civil servants with tenure and high pay and engaged in independent research and scientific experimentation. The faculty was cosmopolitan and drawn from all cultures and religions. The head of the translation department was a Christian, Husayn ibn Ishaq (809-873). Scholars associated with the House of Wisdom included Al-Khwarizmi, the inventor of algebra, algorithims and the mathematician who introduced the Indian decimal system and zero into Arabic science and mathematics as later copied in the West, Alhazen (al-Haythem) the pioneer of Optics, Al-Kindi, master of cryptography, and the Banu Musa Brothers whose "Book of Ingenious Machines" founded the study of Arabic mechanics and engineering. The House of Wisdom's goal was to translate all the world's knowledge into Arabic and Persian, including that of the Greek and Roman heritage, Egyptian, Mesopotamian and Indian. </span><br data-dcnode-id="3278"><br data-dcnode-id="3277"><span data-dcnode-id="3276" instrument_node="">Interestingly, the Barmacids who became the Abbasid Caliph's Vizirs, or prime ministers, though new Muslims,were descended from Buddhist administrators of the monestery Nava Vihāra (Nawbahar) west of Balkh in the Sassanid Persian empire. The monestery was a renown center of learning referred to by the Chinese master translator Xuanzong, who was translating Indian scriptures into Chinese during the Tang Dynasty around the same period. This Barmacid Buddhist origin also facilitated the transfer of Indian mathematics and philosophy to the Arab world at an early time. The Barmacids also after the Arab defeat of the Chinese at the Battle of Talas brought Chinese paper-making technology to the Arab world, setting up the two first paper mills in Baghdad and in Cordoba in Spain, both of which became enduring centers of scholarship and publishing. It is no exaggeration to believe that without the House of Wisdom in Baghdad, emulated in many other Muslim cities, Aristotle and much of the heritage of antiquity might have been lost to the West, and their "re-birth" in the Renaissance made impossible. </span><br data-dcnode-id="3275"><br data-dcnode-id="3274"><br data-dcnode-id="3273"><br data-dcnode-id="3272"><span data-dcnode-id="3271" instrument_node="">KEY MASTERPIECES OF WORLD LITERATURE FROM PERSIA</span><br data-dcnode-id="3270"><br data-dcnode-id="3269"><br data-dcnode-id="3268"><br data-dcnode-id="3267"><span data-dcnode-id="3266" instrument_node="">THE IMMORTAL SUFI MYSTIC POET RUMI</span><br data-dcnode-id="3265"><br data-dcnode-id="3264"><span data-dcnode-id="3263" instrument_node="">Jalal al-Din Rumi (1207-1273) is one of the great poets of the Persian language, a Sufi mystic who was the founder of the Mevlevi Sufi and Dervish mystic order and a spiritual explorer of the realms of desire, passion and the quest for union of the soul with God, Allah. Rumi was a scholar and professor when he encountered a famous wandering Dervish, Shams al-Din Tabrizi, who persuaded him to abandon his academic studies and devote himself to the mystic path. From that time he received illumination and the love of God became the basis of his life. Contrary to Muslim practice Rumi gave music and dance a central place in his religious expression, developing the order of dervish dancers as a spiritual approach to unity with God. His diwan (collected poems) and ghazals (love poems) display a wide range of emotions and themes, from sexual love and passion, drunkenness, mystical longing to the holiest intimacy with the mystic presence of God, Allah. His broad tolerance and openness of spirit and keen sense of individuality is expressed in his lyrical voice:</span><br data-dcnode-id="3262"><br data-dcnode-id="3261"><span data-dcnode-id="3260" instrument_node="">What can I do, Submitters to God? I do not know myself.</span><br data-dcnode-id="3259"><span data-dcnode-id="3258" instrument_node="">I am neither Christian nor Jew, neither Zoroastrian nor Muslim,</span><br data-dcnode-id="3257"><span data-dcnode-id="3256" instrument_node="">I am not from east or west, not from land or sea,</span><br data-dcnode-id="3255"><span data-dcnode-id="3254" instrument_node="">not from the shafts of nature nor from the spheres of the firmament,</span><br data-dcnode-id="3253"><span data-dcnode-id="3252" instrument_node="">not of the earth, not of water, not of air, not of fire.</span><br data-dcnode-id="3251"><span data-dcnode-id="3250" instrument_node="">I am not from the highest heaven, not from this world,</span><br data-dcnode-id="3249"><span data-dcnode-id="3248" instrument_node="">not from existence, not from being.</span><br data-dcnode-id="3247"><span data-dcnode-id="3246" instrument_node="">I am not from India, not from China, not from Bulgar, not from Saqsin,</span><br data-dcnode-id="3245"><span data-dcnode-id="3244" instrument_node="">not from the realm of the two Iraqs, not from the land of Khurasan</span><br data-dcnode-id="3243"><span data-dcnode-id="3242" instrument_node="">I am not from the world, not from beyond,</span><br data-dcnode-id="3241"><span data-dcnode-id="3240" instrument_node="">not from heaven and not from hell.</span><br data-dcnode-id="3239"><span data-dcnode-id="3238" instrument_node="">I am not from Adam, not from Eve, not from paradise and not from Ridwan.</span><br data-dcnode-id="3237"><br data-dcnode-id="3236"><span data-dcnode-id="3235" instrument_node="">My place is placeless, my trace is traceless,</span><br data-dcnode-id="3234"><span data-dcnode-id="3233" instrument_node="">no body, no soul, I am from the soul of souls.</span><br data-dcnode-id="3232"><span data-dcnode-id="3231" instrument_node="">I have chased out duality, lived the two worlds as one.</span><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">One I seek, one I know, one I see, one I call.</span><br data-dcnode-id="3228"><span data-dcnode-id="3227" instrument_node="">He is the first, he is the last, he is the outer, he is the inner.</span><br data-dcnode-id="3226"><span data-dcnode-id="3225" instrument_node="">Beyond "He" and "He is" I know no other.</span><br data-dcnode-id="3224"><span data-dcnode-id="3223" instrument_node="">I am drunk from the cup of love, the two worlds have escaped me.</span><br data-dcnode-id="3222"><span data-dcnode-id="3221" instrument_node="">I have no concern but carouse and rapture.</span><br data-dcnode-id="3220"><span data-dcnode-id="3219" instrument_node="">If one day in my life I spend a moment without you</span><br data-dcnode-id="3218"><span data-dcnode-id="3217" instrument_node="">from that hour and that time I would repent my life.</span><br data-dcnode-id="3216"><span data-dcnode-id="3215" instrument_node="">If one day I am given a moment in solitude with you</span><br data-dcnode-id="3214"><span data-dcnode-id="3213" instrument_node="">I will trample the two worlds underfoot and dance forever.</span><br data-dcnode-id="3212"><span data-dcnode-id="3211" instrument_node="">O Sun of Tabriz (Shams Tabrizi), I am so tipsy here in this world,</span><br data-dcnode-id="3210"><span data-dcnode-id="3209" instrument_node="">I have no tale to tell but tipsiness and rapture.</span><br data-dcnode-id="3208"><br data-dcnode-id="3207"><br data-dcnode-id="3206"><span data-dcnode-id="3205" instrument_node="">OMAR KHAYYAM'S "RUBAIYAT"</span><br data-dcnode-id="3204"><br data-dcnode-id="3203"><br data-dcnode-id="3202"><span data-dcnode-id="3201" instrument_node="">Omar Khayyam (1048-1131) was a renown mathematician, poet, astronomer, scientist and founders of the field of algebra. In the Islamic world he is more remembered for his mathematical contributions than his poetry, whereas in the West he has been immortalized by the loose adaptaion of his verse in "The Rubaiyat" by Edward FitzGerald. </span><br data-dcnode-id="3200"><br data-dcnode-id="3199"><br data-dcnode-id="3198"><span data-dcnode-id="3197" instrument_node="">The Moving Finger writes; and, having writ,</span><br data-dcnode-id="3196"><span data-dcnode-id="3195" instrument_node="">  Moves on: nor all thy Piety nor Wit,</span><br data-dcnode-id="3194"><span data-dcnode-id="3193" instrument_node=""> Shall lure it back to cancel half a Line,</span><br data-dcnode-id="3192"><span data-dcnode-id="3191" instrument_node="">  Nor all thy Tears wash out a Word of it.</span><br data-dcnode-id="3190"><br data-dcnode-id="3189"><span data-dcnode-id="3188" instrument_node="">But helpless pieces in the game He plays,</span><br data-dcnode-id="3187"><span data-dcnode-id="3186" instrument_node="">  Upon this chequer-board of Nights and Days,</span><br data-dcnode-id="3185"><span data-dcnode-id="3184" instrument_node=""> He hither and thither moves, and checks… and slays,</span><br data-dcnode-id="3183"><span data-dcnode-id="3182" instrument_node="">  Then one by one, back in the Closet lays. </span><br data-dcnode-id="3181"><br data-dcnode-id="3180"><span data-dcnode-id="3179" instrument_node="">A Book of Verses underneath the Bough,</span><br data-dcnode-id="3178"><span data-dcnode-id="3177" instrument_node="">  A Jug of Wine, a Loaf of Bread—and Thou,</span><br data-dcnode-id="3176"><span data-dcnode-id="3175" instrument_node=""> Beside me singing in the Wilderness,</span><br data-dcnode-id="3174"><span data-dcnode-id="3173" instrument_node="">  And oh, Wilderness is Paradise enow.</span><br data-dcnode-id="3172"><br data-dcnode-id="3171"><span data-dcnode-id="3170" instrument_node="">Myself when young did eagerly frequent</span><br data-dcnode-id="3169"><span data-dcnode-id="3168" instrument_node="">  Doctor and Saint, and heard great Argument</span><br data-dcnode-id="3167"><span data-dcnode-id="3166" instrument_node=""> About it and about: but evermore</span><br data-dcnode-id="3165"><span data-dcnode-id="3164" instrument_node="">  Came out of the same Door as in I went.</span><br data-dcnode-id="3163"><br data-dcnode-id="3162"><span data-dcnode-id="3161" instrument_node="">Into this Universe, and why not knowing,</span><br data-dcnode-id="3160"><span data-dcnode-id="3159" instrument_node="">  Nor whence, like Water willy-nilly flowing:</span><br data-dcnode-id="3158"><span data-dcnode-id="3157" instrument_node=""> And out of it, as Wind along the Waste,</span><br data-dcnode-id="3156"><span data-dcnode-id="3155" instrument_node="">  I know not whither, willy-nilly blowing.</span><br data-dcnode-id="3154"><br data-dcnode-id="3153"><span data-dcnode-id="3152" instrument_node="">And that inverted Bowl we call The Sky,</span><br data-dcnode-id="3151"><span data-dcnode-id="3150" instrument_node="">  Whereunder crawling coop’t we live and die,</span><br data-dcnode-id="3149"><span data-dcnode-id="3148" instrument_node=""> Lift not thy hands to It for help—for It</span><br data-dcnode-id="3147"><span data-dcnode-id="3146" instrument_node="">  Rolls impotently on as Thou or I.</span><br data-dcnode-id="3145"><br data-dcnode-id="3144"><br data-dcnode-id="3143"><br data-dcnode-id="3142"><span data-dcnode-id="3141" instrument_node="">ATTAR'S "PARLIAMENT OF THE BIRDS"</span><br data-dcnode-id="3140"><br data-dcnode-id="3139"><span data-dcnode-id="3138" instrument_node="">Farid al-Din al-'Attar (1119-1190) was another great mystic poet influenced by the Sufi tradition. His most famous work is the symbolic and allegorical "Parliament of the Birds" in which a flock of diverse birds led by the Hoopoe set off on a questing journey to find the ultimate bird, the Simurgh, and make him their King. Over many trials and hardships of a world-spanning flight all but thirty of the birds perish before reaching the land of their intention. But there is nothing there. Then the thirty survivors realize that they themselves are the yearned for Simurgh. They then transcendentally merge into one, and by so doing they also perish in the divine, in the ultimate act of Sufi fulfillment and realization. </span><br data-dcnode-id="3137"><br data-dcnode-id="3136"><br data-dcnode-id="3135"><span data-dcnode-id="3134" instrument_node="">NIZAMI'S "LAYLA AND MAJNUM</span><br data-dcnode-id="3133"><br data-dcnode-id="3132"><br data-dcnode-id="3131"><span data-dcnode-id="3130" instrument_node="">Nizami Ganjavi (1141-1209) is considered the greatest romantic epic poet in Persian Literature. One of his best known tales is that of "Layla and Majnun" which is often considered "The Persian Romeo and Juliet," a tale of "star-crossed lovers." In it Majnun falls hopelessly and insanely in love with Layla. Her father forbids her to marry him, citing his poverty and his eccentric madness into which his love has spilled over. Majnun abandons himself to wandering in the desert and peering after her from afar, while Layla submits to her father's will and marries another, but refuses to consummate the union. In the end Layla dies of a broken heart and Majnun. Later Majnun is found dead beside her grave, leaving behind a poem carved in a nearby rock:</span><br data-dcnode-id="3129"><br data-dcnode-id="3128"><span data-dcnode-id="3127" instrument_node="">I pass by these walls, the walls of Layla</span><br data-dcnode-id="3126"><span data-dcnode-id="3125" instrument_node="">And I kiss this wall and that wall</span><br data-dcnode-id="3124"><br data-dcnode-id="3123"><span data-dcnode-id="3122" instrument_node="">It’s not Love of the houses that has taken my heart</span><br data-dcnode-id="3121"><span data-dcnode-id="3120" instrument_node="">But of the One who dwells in those houses</span><br data-dcnode-id="3119"><br data-dcnode-id="3118"><br data-dcnode-id="3117"><span data-dcnode-id="3116" instrument_node="">FIRDUSI'S "SHAHNAMAH"</span><br data-dcnode-id="3115"><br data-dcnode-id="3114"><span data-dcnode-id="3113" instrument_node="">Firdusi (Firdawsi) is considered the greatest epic poet of Persian Literature, celebrated for his "Shahnamah" or "The Book of Kings." The Shahnamah is a national epic which recounts the kings and dynasties of Iran's past. Being written in a Muslim context it begins with the creation and gives accounts of Persia's Zoroastrian heritage limited by the Muslim worldview. It contains such epic tales as that of "Sohrab and Rustum" in which a king kills his own son, not recognizing him, which was also rendered by Matthew Arnold in English. </span><br data-dcnode-id="3112"><br data-dcnode-id="3111"><br data-dcnode-id="3110"><span data-dcnode-id="3109" instrument_node="">HAFIZ</span><br data-dcnode-id="3108"><br data-dcnode-id="3107"><br data-dcnode-id="3106"><span data-dcnode-id="3105" instrument_node="">Shams al-Din Muhammad Shirzai (1317-1389) is known by his pen-name Hafiz and is considered the father of the "ghazal" or love poem. He led a rich and full life, like many other Persian young men, though Muslim, enjoying excesses of women and wine. Hafiz is celebrated for interweaving the erotic and the mystic, the melancholy of mortality and fate, as well as philosophical paradoxes into his intensely emotional love songs. </span><br data-dcnode-id="3104"><br data-dcnode-id="3103"><br data-dcnode-id="3102"><br data-dcnode-id="3101"><span data-dcnode-id="3100" instrument_node="">GHALIB</span><br data-dcnode-id="3099"><br data-dcnode-id="3098"><br data-dcnode-id="3097"><span data-dcnode-id="3096" instrument_node="">Ghalib (1797-1869) was born in Agra in Muslim northern India and wrote ghazals and poems in both Persian and Urdu. This reminds us that Persian was a literary, court and governmental language used alongside Arabic from the Ottoman Empire to Iran and throughout India, such that Persian Literature is not by any means confined to Iran. Urdu in India and Pakistan is heavily influenced by Persian as a legacy of the Mughul Empire, which used Persian as its official language. Ghalib like Hafiz and Rumi wrote ghazals of sensuous love, wine, women, song and the decay of the Mughul empire as it lost control to the British. Like Byron he was an aristocratic rebel with a touch of self-destructiveness about him. More modern in his consciousness, he exhibits a scepticism towards both political loyalty and religious orthodoxy and faith. </span><br data-dcnode-id="3095"><br data-dcnode-id="3094"><br data-dcnode-id="3093"><span data-dcnode-id="3092" instrument_node="">SPIRITUS MUNDI AND PERSIAN LITERATURE</span><br data-dcnode-id="3091"><br data-dcnode-id="3090"><br data-dcnode-id="3089"><span data-dcnode-id="3088" instrument_node="">The tradition of Persian Literature is reflected in my own contemporary epic novel, Spiritus Mundi. The protagonists in Spiritus Mundi embark on a quest to create a United Nations Parliamentary Assembly, a globalized version of the EU Parliament as a new organ of the UN. En route, taking a theme from Attar's "Parliament of the Birds" they discover that they themselves constitute and embody the object of their quest, the People of the World, just as the thirty birds came to constitute the mystic "Simurgh" which they had sought. One of the characters in Spiritus Mundi Mohammad ala Rushdie, is a Sufi novice of the Mevlevi dervish order and Sufi themes abound in the work, including poems from Rumi and Mohammad's spiritual musings on Sufism in the modern world, as well as "Opening the Gates of Ijtihad" as means of renovating modern Islam. </span><br data-dcnode-id="3087"><br data-dcnode-id="3086"><br data-dcnode-id="3085"><span data-dcnode-id="3084" instrument_node="">For a fuller discussion of the concept of World Literature you are invited to look into the extended discussion in the new book Spiritus Mundi, by Robert Sheppard, one of the principal themes of which is the emergence and evolution of World Literature:</span><br data-dcnode-id="3083"><br data-dcnode-id="3082"><br data-dcnode-id="3081"><span data-dcnode-id="3080" instrument_node="">For Discussions on World Literature and n Literary Criticism in Spiritus Mundi: </span><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//worldliteratureandliterarycrit/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3079" instrument_node="">http://worldliteratureandliterarycrit</span></a><span data-dcnode-id="3077" instrument_node="">...</span><br data-dcnode-id="3076"><br data-dcnode-id="3075"><br data-dcnode-id="3074"><span data-dcnode-id="3073" instrument_node="">Robert Sheppard</span><br data-dcnode-id="3072"><br data-dcnode-id="3071"><br data-dcnode-id="3070"><span data-dcnode-id="3069" instrument_node="">Editor-in-Chief</span><br data-dcnode-id="3068"><span data-dcnode-id="3067" instrument_node="">World Literature Forum</span><br data-dcnode-id="3066"><span data-dcnode-id="3065" instrument_node="">Author, Spiritus Mundi Novel</span><br data-dcnode-id="3064"><span data-dcnode-id="3063" instrument_node="">Author’s Blog: </span><br data-dcnode-id="3062"><a data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//robertalexandersheppard.wordpr/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3061" instrument_node="">http://robertalexandersheppard.wordpr</span></a><span data-dcnode-id="3059" instrument_node="">...</span><br data-dcnode-id="3058"><span data-dcnode-id="3057" instrument_node="">Spiritus Mundi on Goodreads: </span><br data-dcnode-id="3056"><a data-dcnode-id="3054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/17" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3055" instrument_node="">http://www.goodreads.com/book/show/17</span></a><span data-dcnode-id="3053" instrument_node="">...</span><br data-dcnode-id="3052"><span data-dcnode-id="3051" instrument_node="">Spiritus Mundi on Amazon, Book I: </span><a data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/dp/B00CIGJFGO" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3050" instrument_node="">http://www.amazon.com/dp/B00CIGJFGO</span></a><br data-dcnode-id="3048"><span data-dcnode-id="3047" instrument_node="">Spiritus Mundi, Book II: The Romance </span><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/dp/B00CGM8BZG" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3046" instrument_node="">http://www.amazon.com/dp/B00CGM8BZG</span></a><br data-dcnode-id="3044"><br data-dcnode-id="3043"><br data-dcnode-id="3042"><span data-dcnode-id="3041" instrument_node="">Copyright Robert Sheppard 2013 All Rights Reserved </span></span><span data-dcnode-id="3039" instrument_node="">

</span><span data-dcnode-id="2940" id="freeTextContainer903209491339416671"><span data-dcnode-id="2959" instrument_node="">My literary travels around Iran continued this month with </span><i data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Shahnameh</span></i><span data-dcnode-id="2956" instrument_node="">, and boy was it a long trip. Clocking in at 854 pages (not including glossaries and indices), it took me nearly a month to read, and not for lack of interest; the stories are, for the most part, fascinating.</span><br data-dcnode-id="2955"><br data-dcnode-id="2954"><span data-dcnode-id="2953" instrument_node="">Originally, my plan was to sample stories from </span><i data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">Shahnameh</span></i><span data-dcnode-id="2950" instrument_node=""> to get an idea of Persian mythology. </span><i data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Shahnameh</span></i><span data-dcnode-id="2947" instrument_node=""> is roughly the Persian equivalent of </span><i data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">The Odyssey</span></i><span data-dcnode-id="2944" instrument_node=""> or </span><i data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">Beowulf</span></i><span data-dcnode-id="2941" instrument_node="">, covering stories of Persian heroes and historical events. Un</span></span><span data-dcnode-id="2939" instrument_node="">
</span><span data-dcnode-id="2898" id="freeText903209491339416671" style="display:none"><span data-dcnode-id="2938" instrument_node="">My literary travels around Iran continued this month with </span><i data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">Shahnameh</span></i><span data-dcnode-id="2935" instrument_node="">, and boy was it a long trip. Clocking in at 854 pages (not including glossaries and indices), it took me nearly a month to read, and not for lack of interest; the stories are, for the most part, fascinating.</span><br data-dcnode-id="2934"><br data-dcnode-id="2933"><span data-dcnode-id="2932" instrument_node="">Originally, my plan was to sample stories from </span><i data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">Shahnameh</span></i><span data-dcnode-id="2929" instrument_node=""> to get an idea of Persian mythology. </span><i data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Shahnameh</span></i><span data-dcnode-id="2926" instrument_node=""> is roughly the Persian equivalent of </span><i data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">The Odyssey</span></i><span data-dcnode-id="2923" instrument_node=""> or </span><i data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Beowulf</span></i><span data-dcnode-id="2920" instrument_node="">, covering stories of Persian heroes and historical events. Unlike Western epics, however, it does not focus on one hero, but chronologically explores the reigns of Persia's kings from roughly 600 BC to the Arab invasions of the 7th Century AD. 1300 years is quite a lot to cover, even in 854 pages, and the translator, Dick Davis, still chose to leave out what I'm guessing are the really boring parts. </span><br data-dcnode-id="2919"><br data-dcnode-id="2918"><span data-dcnode-id="2917" instrument_node="">The translation is well-written and intriguing, but not entirely in verse (unlike the original). Davis chooses select portions to commit to poetry, using prose for the majority of the text, and this was fine with me. It made for a quicker read while dealing with the essence of the story.</span><br data-dcnode-id="2916"><br data-dcnode-id="2915"><span data-dcnode-id="2914" instrument_node="">I loved the early stories the best, those about Sam, Zal, and Rostam, the epic heroes on par with Achilles. Rostam in particular is a legendary warrior (not a Persian king) whose trials and travails keep the Persian nation safe and secure from the various invading forces. </span><br data-dcnode-id="2913"><br data-dcnode-id="2912"><span data-dcnode-id="2911" instrument_node="">And boy, was Persia invaded a LOT. </span><br data-dcnode-id="2910"><br data-dcnode-id="2909"><span data-dcnode-id="2908" instrument_node="">The later stories take on more of a historical account that can be likened to Herodotus or Thucydides, and frankly, it's a bit repetitious: </span><br data-dcnode-id="2907"><br data-dcnode-id="2906"><span data-dcnode-id="2905" instrument_node="">New king is crowned! New king rules justly. King marries daughter of Chinese/Byzantine emperor to form alliance. Someone gets invaded anyway. Hero goes off to fight and save Persia. King slights hero and he gets cranky. King recognizes fault/King gets angry, begins to rule unjustly/drinks too much. King repents of flaws on deathbed. New king is crowned! (repeat)</span><br data-dcnode-id="2904"><br data-dcnode-id="2903"><span data-dcnode-id="2902" instrument_node="">Actually, the middle bit about the hero sounds a lot like Achilles, but this plot sequence begins with Rostam and recycles all the way through the reigns of various kings. With Rostam it is new and interesting, but by the time I got to Bahram Chubineh 700 pages later, it was old hat. In his forward, Davis makes it clear that the deliberately cut the repetitious bits, but when the stories of kings and heroes mirror each other due to flaws in human nature, there's not much to be done. </span><br data-dcnode-id="2901"><br data-dcnode-id="2900"><span data-dcnode-id="2899" instrument_node="">Overall, I'd recommend the first 300 pages or so. The rest is interesting, but if you're tight for time you can still get the general idea.</span></span><span data-dcnode-id="2897" instrument_node="">

</span><span data-dcnode-id="2571" id="freeText8711881002512461396" style="display:none"><span data-dcnode-id="2572" instrument_node="">I am not so presumptuous as to review the Shahnameh. Does one review Shakespeare or Augustine? But I will comment on Dick Davis' excellent translation. Some people complain that it's written in prose; others complain that it's written in poetry. Yet the magic of this translation is the incorporation of the two. As he says in the introduction, Davis' goal is not to faithfully reproduce the tens of thousands of lines of poetry that took Ferdowsi 30 years to write. Rather, he opts for a combination of prose and poetry that emulates the way that the Shahnameh is most often performed in a style called "Naqqali". Basically, Davis is presenting the poem to us in the way that uncounted Iranians have received it for hundreds of years -- don't complain!!</span></span><span data-dcnode-id="2570" instrument_node="">
