</span><h1 class="scale--2 contentHeader__sectionTitle" data-dcnode-id="2174" id="section-title"><span data-dcnode-id="2175" instrument_node="">Persian Letters Summary</span></h1><span data-dcnode-id="2173" instrument_node="">
</span><div class="section__purchase" data-dcnode-id="2172"></div><span data-dcnode-id="2171" instrument_node="">
</span><p class="byline--secondary" data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">These notes were contributed by members of the GradeSaver community.
We are thankful for their contributions and encourage you to make your&nbsp;own.
</span></p><span data-dcnode-id="2168" instrument_node="">
</span><p class="byline--secondary" data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Written by R A&nbsp;Williams
</span></p><span data-dcnode-id="2165" instrument_node="">
</span><article class="section__article" data-dcnode-id="728" itemprop="articleBody" role="article"><span data-dcnode-id="2164" instrument_node="">
</span><div class="ad js--contentAdMove is--hidden" data-dcnode-id="2157" data-placement="1"><span data-dcnode-id="2163" instrument_node="">
</span><div data-ad="" data-dcnode-id="2159" data-mq="(max-width: 574px)"><span data-dcnode-id="2162" instrument_node="">
</span><span data-dcnode-id="2160" instrument_node="">
</span></div><span data-dcnode-id="2158" instrument_node="">
</span></div><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">This summary is based on the John Davidson translation, published in 1899 by Gibbings &amp; Co., London. The translation is in the public domain and is available at</span></p><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2151"><a data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rbsche.people.wm.edu/teaching/plp/"><span data-dcnode-id="2153" instrument_node="">http://rbsche.people.wm.edu/teaching/plp/ </span></a></p><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2143"><strong data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Letter 1</span></strong><span data-dcnode-id="2147" instrument_node="">: from </span><a data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/persian-letters/study-guide/character-list%23usbek"><span data-dcnode-id="2146" instrument_node="">Usbek</span></a><span data-dcnode-id="2144" instrument_node=""> (Tauris) to his friend Rustan (Ispahan)</span></p><span data-dcnode-id="2142" instrument_node="">
</span><div class="ad js--contentAdMove" data-dcnode-id="2130" data-placement="4"><span data-dcnode-id="2141" instrument_node="">
</span><div data-ad="" data-dcnode-id="2137" data-mq="(min-width: 575px)"><span data-dcnode-id="2140" instrument_node="">
</span><div data-dcnode-id="2139" id="div-gpt-ad-1433266440411-3"></div><span data-dcnode-id="2138" instrument_node="">
</span></div><span data-dcnode-id="2136" instrument_node="">
</span><div data-ad="" data-dcnode-id="2132" data-mq="(max-width: 574px)"><span data-dcnode-id="2135" instrument_node="">
</span><span data-dcnode-id="2133" instrument_node="">
</span></div><span data-dcnode-id="2131" instrument_node="">
</span></div><p data-dcnode-id="2125"><span data-dcnode-id="2129" instrument_node="">Usbek explains that he and </span><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/persian-letters/study-guide/character-list%23rica"><span data-dcnode-id="2128" instrument_node="">Rica</span></a><span data-dcnode-id="2126" instrument_node=""> stayed only one day at Koum, continuing to Tauris immediately, and will be continuing to Erzeroum to stay there for some time. He claims to be traveling in search of knowledge, but asks what is being said about his departure.</span></p><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2120"><strong data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Letter 2</span></strong><span data-dcnode-id="2121" instrument_node="">: from Usbek (Tauris) to his chief black Eunuch (the Seraglio in Ispahan)</span></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">This letter is dated three days after the previous one. Usbek explains that it is the addressee’s duty to watch over Usbek’s women, enforcing their dutiful and virtuous behavior and punishing them on his behalf should their modesty lapse. Ironically, the addressee is himself a slave and must submit to the lawful commands of the women he governs. Usbek reminds the addressee that he has raised him from the lowest ranks to the position of Usbek’s greatest trust, and explains that he is giving his permission for the women may be taken into the country, but tells the Eunuch to constantly remind the women of how powerless they are.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2109"><strong data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Letter 3</span></strong><span data-dcnode-id="2113" instrument_node="">: from </span><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/persian-letters/study-guide/character-list%23zachi"><span data-dcnode-id="2112" instrument_node="">Zachi</span></a><span data-dcnode-id="2110" instrument_node=""> (Seraglio at Ispahan) to Usbek (Tauris)</span></p><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">This letter was written about a month before the two that precede it. It is written by Zachi, one of Usbek’s wives. She describes a trip to the country with the chief of the Eunuchs (incidentally, this would have occurred prior to Usbek having given permission for this to occur). Zachi recalls her past happiness with Usbek and is pining after him. She recalls an erotic scene in which she and Usbek’s other wives, having asserted their superiority in beauty, challenged him to pick the most beautiful. But those good days are in the past: she now asserts that Usbek has abandoned them.</span></p><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2101"><strong data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Letter 4</span></strong><span data-dcnode-id="2102" instrument_node="">: from Zéphis (Seraglio at Ispahan) to Usbek (Erzeroum)</span></p><span data-dcnode-id="2100" instrument_node="">
</span><div class="ad js--contentAdMove" data-dcnode-id="2093" data-placement="10"><span data-dcnode-id="2099" instrument_node="">
</span><div data-ad="" data-dcnode-id="2095" data-mq="(min-width: 575px)"><span data-dcnode-id="2098" instrument_node="">
</span><div data-dcnode-id="2097" id="div-gpt-ad-1433266440411-4"></div><span data-dcnode-id="2096" instrument_node="">
</span></div><span data-dcnode-id="2094" instrument_node="">
</span></div><p data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">This letter was written after the first two, and the fact it is addressed to Usbek at Erzeroum suggests that at least one and possibly both of the first two letters have been received. She is upset because the Chief Black Eunuch has accused her of inappropriate conduct with a female slave Zelida.</span></p><span data-dcnode-id="2090" instrument_node="">
</span><p data-dcnode-id="2086"><strong data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node=""> Letter 5</span></strong><span data-dcnode-id="2087" instrument_node="">: Rustan (in Ispahan) to Usbek (Erzeroum)</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Rustan is replying to Usbek’s first letter, saying that nobody knows why Usbek left, forsaking his wives, relations, and friends. This suggests that Usbek did not tell anyone of the reason behind his departure, and that it was abrupt and unexpected. Rica’s mother is very upset at her son’s absence, and Rustan doesn’t know how to explain it to anyone.</span></p><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2078"><strong data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node=""> Letter 6</span></strong><span data-dcnode-id="2079" instrument_node="">: Usbek (in Erzeroum) to his friend Nessir (Ispahan)</span></p><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Usbek describes his travel from Erivan, during which time he reached Erzeroum. Here, Usbek and Rica stopped and stayed three or four months. Erzeroum is part of the “Osmanli” or Ottoman Empire, and is outside Persian territory and in Turkey. Usbek misses his wives. Although he claims to have “forestalled” love for them, he is still extremely jealous of them. He is also sad because his friends aren’t allowed to ask any questions about his departure. Clearly something is amiss: Usbek claimed in his first letter to Rustan that he and Rica left in search of knowledge, and the excuse should probably be circulating, but something has occurred that makes the excuse implausible. The reader should now understand that there is more behind Usbek’s departure than the desire to study abroad.</span></p><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2070"><strong data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node=""> Letter 7</span></strong><span data-dcnode-id="2071" instrument_node="">: Fatmé (the Seraglio at Ispahan) to Usbek (Erzeroum)</span></p><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">A third wife of Usbek’s is writing to him. She says he has been gone two months. She claims to be enthralled by Usbek’s beauty, although in fairness she was never allowed to look at any other men prior to being married to him. She expresses physical passion and sexual frustration, because the only man she is permitted to allow to satisfy her is unavailable. She expresses her love for him. Fatmé is under the impression that Usbek will weary of his travels and return home. This is the only time that Fatmé writes, or is even mentioned by name. There is a location called the Gardens of Fatmé, however both the Gardens and Fatmé herself are named after somebody else.</span></p><span data-dcnode-id="2066" instrument_node="">
</span><p data-dcnode-id="2062"><strong data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Letter 8</span></strong><span data-dcnode-id="2063" instrument_node="">: Usbek (Erzeroum) to Rustan (Ispahan)</span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Usbek acknowledges the receipt of the letter from Rustan. He claims to have no remorse about his departure, because he is following the dictates of “his own free soul”, which he deems to be above the “petty maxims” that guide his enemies. For the first time, Usbek reveals some information about himself that should have been well known to a close friend. He has been a courtier since early youth, yet he is committed to the cultivation of his own virtue and the rejection of vice. He spoke truth to power, found himself “unable” to engage in flattery, and must have been rewarded for it because other ministers became jealous of him. He left the “corrupt” court, feigning an interest in science, but claims to have become genuinely attached to it (although none of his subsequent letters describe scientific or technical wonders). But after receiving information that his enemies were planning something horrible for him, Usbek went to the King, explained his desire to study science in the West, and received the King’s approval. He set out quickly enough to stymie his enemies.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">There are a few things wrong with Usbek’s account. Had he the King’s approval and protection, particularly in public, it is unlikely his enemies would have succeeded in carrying off whatever plot they had dreamed up. Furthermore, he asks Rustan to not defend Usbek or offer any explanation except to his friends. The last line suggests that Usbek may have left permanently and that his enemies still pose a danger to him.</span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2051"><strong data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">Letter 9</span></strong><span data-dcnode-id="2052" instrument_node="">: The Chief Eunuch (the Seraglio in Ispahan) to Ibbi, (Erzeroum)</span></p><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">The Chief Eunuch, who is not the Chief Black Eunuch, is writing to another of Usbek’s eunuchs who is traveling with him on his adventures. The Chief Eunuch envies Ibbi the new sights and entertainments, because he hates his job. He is bored. After fifty years of work, he has never known a peaceful moment.</span></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">As a very young man, the Chief Eunuch agreed to let his first master have him made into a eunuch, thinking that the sacrifice of his passions would be repaid by wealth, he was cruelly cheated. Having been castrated he is unable to have sex in the normal way, but his desire for it was unaffected. Although he would much rather have seduced and loved the women in his care, he was forced to feign anger and annoyance. He lost control of himself and took some physical liberties with a woman in his care, and she blackmailed him into allowing her to do whatever she wanted.</span></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">At this point in his life, the Chief Eunuch regards all women with indifference. In fact, he goes out of his way to abuse his authority to annoy and antagonize Usbek’s wives. They are therefore his enemies. They do not taunt him but send him on meaningless errands and pretend that someone else is about to do something that is less than virtuous. Meanwhile, since Usbek favors his wives, he is treated as always being in the wrong. He described a scene in which he delivered an unwilling, complaining woman to his master’s bed, and listened to her objections. At last, ruin overtook him and he was—and perhaps is now—the victim of what he describes as an amorous intrigue.</span></p><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2037"><strong data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node=""> Letter 10</span></strong><span data-dcnode-id="2038" instrument_node="">: Mirza (Ispahan) to his friend Usbek, (Erzeroum)</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Mirza misses Usbek and Rica. He describes some excellent debates and disputes on morality, particularly one about whether true happiness consists in pleasure and sensual gratification, or in the practice of virtue. Mirza is unsatisfied with the mollahs’ religiously inspired answer. He asks Usbek to explain what he means by the idea that “men were made to be virtuous” and that “justice is as indispensable to existence as life itself”. This identifies Mirza as a thinker, philosopher, and debater who proposes to correspond with Usbek some more about deep philosophical thoughts.</span></p><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2029"><strong data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Letter 11</span></strong><span data-dcnode-id="2030" instrument_node="">: from Usbek (Erzeroum) to Mirza (Ispahan)</span></p><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Usbek begins with an allegorical story about the tribe called Troglodites. Initially, this group of people were ruled only by their own savage instincts. They practiced subsistence farming, each planting only enough to satisfy himself. When one man carried off his neighbor’s wife and the two men quarreled, the man they asked to judge the matter told him he didn’t care. So the man whose wife had been stolen immediately stole the judge’s wife instead. The Troglodites’ self-interest kept them from bargaining effectively or exchanging their goods, since neither person cared whether the other party got what he needed out of the deal. A physician from a nearby country cured the Troglodites during a great plague, but they refused to pay him for his effort. When the disease broke out again, he refused to help them.</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2021"><strong data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Letter 12</span></strong><span data-dcnode-id="2022" instrument_node="">: Usbek (Erzeroum) to Mirza (Ispahan)</span></p><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">This is a continuation of Letter 11. Only two families of Troglodites were spared from the plague, and they happened to be people who were humane and lovers of virtue. They survived by living far away from their self-absorbed fellows. Their virtue was rewarded by the earth, and the two families multiplied, creating generation after generation of happy, pro-social people. Selfishness and covetousness was completely unknown among them.</span></p><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2013"><strong data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Letter 13</span></strong><span data-dcnode-id="2014" instrument_node="">: Usbek (Erzeroum) to Mirza (Ispahan)</span></p><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">This is a continuation of Letter 12. Usbek described how the Troglodites went out of their way to ease each other’s burdens and find ways to make another happy. They did things that improved their community, such as planting trees to provide shade to workers. Another nation, hearing of the Troglodites’ prosperity, plotted to carry off their cattle. The Troglodites responded with: “come join us, we’ll share what we’ve got.” The invaders decided to make war, but were repulsed by the Troglodites’ courage and willingness to lay down their lives to protect each other. So despite a nearly Athenian level of disinclination to war, the Troglodites turned out to be good at it.</span></p><span data-dcnode-id="2009" instrument_node="">
</span><p data-dcnode-id="2005"><strong data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Letter 14</span></strong><span data-dcnode-id="2006" instrument_node="">: Usbek (Erzeroum) to Mirza (Ispahan)</span></p><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">When the Troglodites increased in number, they decided to find the most just man among themselves, who was the most venerable by reason of age and virtue. The man they chose as King didn’t wish to serve as such, and claimed that the Troglodites needed no ruler but virtue, and that they were making a mistake.</span></p><span data-dcnode-id="2001" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">All this talk about virtue, and about living a virtue-based life instead of following one’s own desires, contradicts what Usbek himself actually does. Back in Letter 8, he asserted that following the commands of his own heart was better than following the “maxims” of his enemies or submitting himself to rules. When it comes to his own conduct, Usbek judges himself by a different standard and does not need to do “virtuous” things by upholding his duty, attending to his home and family, or even returning from exile or bringing his wives to him. So the justice and pro-social regard for other people’s well-being, which Usbek studiously ignores, is a virtue he preaches but does not seem to practice.</span></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1994"><strong data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Letter 15</span></strong><span data-dcnode-id="1995" instrument_node="">: the First Eunuch (the Seraglio at Ispahan) to Jaron, the black Eunuch (Erzeroum)</span></p><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">The First Eunuch is writing to a man he regards as a son. Jaron, according to the First Eunuch, is in danger of being corrupted by contact with “unbelieving Christians”. He appears to believe that Usbek is going to return, at which point he could take Jaron to Mecca.</span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1986"><strong data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Letter 16</span></strong><span data-dcnode-id="1987" instrument_node="">: Usbek (Erzeroum) to the Mollah Mehemet Ali (Koum)</span></p><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Usbek begins by flattering the “divine Mollah”, praising his perfection and knowledge. This exaggerated flattery contradicts Usbek’s statement in Letter 8 that he was “unable” to practice flattery as a courtier would generally do. This further undermines Usbek’s excuse for leaving, and it exposes him as a liar despite all of his claims to virtue and honesty. He begs for the benefit of the Mollah’s divine knowledge.</span></p><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1978"><strong data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Letter 17</span></strong><span data-dcnode-id="1979" instrument_node="">: Usbek (Erzeroum) to the Mollah Mehemet Ali (Koum)</span></p><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Usbek, voyaging in a strange land, is experiencing doubt. He flatters the Mollah again, and asks for some clarification about the reasons behind some common Islamic practices. He asks why pork is forbidden, why touching a corpse is forbidden, and why it is necessary to wash so frequently. Usbek is trying to reason out the logic behind these various injunctions. He asks whether it is reasonable to let his senses judge whether something is clean or unclean.</span></p><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1970"><strong data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Letter 18</span></strong><span data-dcnode-id="1971" instrument_node="">: Mollah Mehemet Ali (Koum) to Usbek (Erzeroum)</span></p><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">The Mollah is answering both of Usbek’s letters to him and possibly others. He calls Usbek on his flattery, saying that he respects the life of the Mollahs but doesn’t have the courage to embrace and follow it. He suggests that Usbek simply reads the traditions of other learned men, or the Quran itself, to answer all his questions. After aptly chastising Usbek, the Mollah describes a physically impossible scene in which a pig was created out of elephant excrement. Because Usbek either does not know this story or chooses to not believe it, the Mollah describes him as “ignorant”.</span></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1962"><strong data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Letter 19</span></strong><span data-dcnode-id="1963" instrument_node="">: Usbek (Smyrna) to Rustan (Ispahan)</span></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Usbek and Rica are on the move again. They left Erzeroum, stayed only eight days at Tocat, and after thirty-five days they came to Smyrna. During this time, Usbek notices that the Ottoman Empire is in ruins. The pashas are corrupt and bankrupt, so they plunder the provinces they are appointed to govern. The militia runs amok and does whatever it wants. Cities are deserted, the country is desolate, and commerce is neglected. The Christians and Jews who are doing actual work are taxed and harassed. Property laws aren’t being respected and the people in power do whatever they like. But even the art of war is not advancing, since people cling to their backward ways instead of embracing or improving new technology like the Europeans do.</span></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1954"><strong data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Letter 20</span></strong><span data-dcnode-id="1955" instrument_node="">: Usbek (Smyrna) to Zachi (the Seraglio in Ispahan)</span></p><span data-dcnode-id="1953" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Usbek is telling Zachi off for having broken one of the many irrational laws of the seraglio, and was found alone with Nadir, a white eunuch, in her chamber. Apparently she should have used one of the black eunuchs to run errands instead. This somehow robs Usbek of honor. He taunts Zachi, asking her whether he thinks she could actually escape. He blames Zachi for a “gratuitous wrong” in order to satisfy her “sinful desires”, and questions what would happen if she were actually allowed her freedom or if she escaped the seraglio. He claims that all Zachi’s companions are happy in the seraglio and consider it a welcome refuge from the terrible world outside.</span></p><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">Exactly how Usbek came by this information is not clear. He may have received letters besides what were printed, or he might have other sources of information real or imagined. At this point in the narrative the reader already knows that Usbek is mistaken about a number of things, including exactly who did what with or to whom.</span></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Usbek is terrified about what would happen if Zachi were left to herself, with no defense other than her love for him and her sense of duty. He says her love for him has been shaken, although it has been due to his own conduct, and claims Zachi is derelict in her duty. Usbek takes the side of the Chief Eunuch, saying that the familiarities Zachi supposedly took with Zelida were unbecoming. Yet in letter 4, written by Zéphis, it is clear that Zéphis, and not Zachi, is the one who was punished for inappropriate behavior with the young slave Zelida. Accordingly, the other wrong for which Usbek rebukes Zachi might also be either imaginary or committed by some other woman.</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1939"><span data-dcnode-id="1943" instrument_node="">For the first time, Usbek mentions his “new” wife </span><a data-dcnode-id="1941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/persian-letters/study-guide/character-list%23roxana"><span data-dcnode-id="1942" instrument_node="">Roxana</span></a><span data-dcnode-id="1940" instrument_node="">, bringing the total to four: Zachi, Zéphis, Fatmé, and Roxana. Only Zachi, Zéphis, and Fatmé have written to Usbek. Later in the book a letter appears from another wife named Zélis, bringing the total to five, which is one more than Usbek’s sacred Koran allows. Usbek claims that all four women are equal in beauty, however Roxana is virtuous as well so he loves her better.</span></p><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1934"><strong data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node=""> Letter 21</span></strong><span data-dcnode-id="1935" instrument_node="">: Usbek (Smyrna) to the Chief White Eunuch (the Seraglio in Ispahan)</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">This letter is rebuking the man Usbek left in charge of the Seraglio for having allowed the eunuch Nadir to be summoned into one of the women’s bedrooms (possibly Zachi’s) which are apparently off limits to him. Usbek is now aware that “some” of his wives are angry and restless, so he resolves to do the thing that annoys them most and surround them with more black eunuchs. He threatens to punish the Chief Eunuch as well.</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1926"><strong data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node=""> Letter 22</span></strong><span data-dcnode-id="1927" instrument_node="">: Jaron (Smyrna) to the Chief White Eunuch (the Seraglio in Ispahan)</span></p><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Jaron is upset at being told to return to guard the Seraglio. He would far rather have continued traveling with Usbek toward the west. Usbek, he says, is grieving and suspicious about his wives’ behavior and anxious to exert a stronger control on them from afar. But instead of moving closer, he is continuing to travel in the West.</span></p><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1915"><strong data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Letter 23</span></strong><span data-dcnode-id="1919" instrument_node="">: Usbek (Leghorn) to his friend </span><a data-dcnode-id="1917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/persian-letters/study-guide/character-list%23ibben"><span data-dcnode-id="1918" instrument_node="">Ibben</span></a><span data-dcnode-id="1916" instrument_node=""> (Smyrna)</span></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Usbek describes the way Italian women are allowed to look at men through a window, go out every day provided they are with some other old woman, or wear only one veil. All their male relatives are allowed to visit them, and it doesn’t bother their husbands. This is the first Christian town Usbek has ever been in. He’s excited and plans to continue to Paris by way of Marseille.</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1907"><strong data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Letter 24</span></strong><span data-dcnode-id="1908" instrument_node="">: Rica (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">This is the first letter written by the young, sarcastic Rica. The two men have been in Paris about a month. He compares Paris to Ispahan, noting the higher houses in Paris and the dense population. Rica describes the French as being obsessed by vehicles. Rica satirically describes the French king as a great magician: he describes the printing of paper money by the King, and the resulting inflation, as the King exercising his power over his subjects’ belief. But more powerful still is the Pope, who can make the King believe that three and one are the same number, that bread is not bread, and that wine is blood. These are references to the Holy Trinity and the sacramental bread and wine used in the Holy Communion which are deemed to take on the spiritual value of the body and blood of Christ when used as symbols in the Communion. Rica describes the ongoing debate over the French Constitution and asserts that it is the women who are chiefly responsible for the changes in government.</span></p><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1899"><strong data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Letter 25</span></strong><span data-dcnode-id="1900" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1893"><span data-dcnode-id="1897" instrument_node="">Usbek says that Ibben’s nephew </span><a data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/persian-letters/study-guide/character-list%23rhedi"><span data-dcnode-id="1896" instrument_node="">Rhedi</span></a><span data-dcnode-id="1894" instrument_node=""> has left Smyrna to visit Italy. Usbek and Rica are still traveling together and Usbek expresses gratitude for Ibben’s having hosted them in Smyrna. He expresses a desire to see Ibben again soon, which suggests that Usbek’s stay in Paris will not be long.</span></p><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1888"><strong data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node=""> Letter 26</span></strong><span data-dcnode-id="1889" instrument_node="">: Usbek (Paris) to Roxana (the Seraglio at Ispahan)</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Usbek explains to Roxana, his favorite wife, how happy he thinks she is in Persia as opposed to in France, where the Persian notions of shame and virtue are unknown. He relates how, during the first days of their marriage, Roxana ran away from him and hid. She even attacked him with a dagger. Two months passed in the struggle, at which point Usbek essentially raped her. She then regarded him as an enemy who had outraged her, and for three months she could not look at him without blushing with what Usbek describes as modesty. She continued to avoid him and make no attempt to please him. This somehow turned Usbek on.</span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">In Paris, unlike in Ispahan, women are not served by eunuchs. They walk around with their faces showing, and they have what Usbek describes as a brute-like independence. Usbek believes very few of them are unfaithful to their husbands, because although they might flirt they are brought up with a sense of virtue that prevents them from doing more. Yet Persian women must be locked away, not for fear of what they might do if they escaped, but because contact with other men would somehow damage them and render them unclean. Usbek says that “we” Persian men are not really afraid of infidelity, but of their wives’ loss of purity.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Despite everything he just admitted having done to his wife, Usbek believes she loves him. Even as she competes with the other women, refusing to dance in sync with them, Usbek thinks it’s out of love for him. He says that she deserves a husband who would never leave her. But to a modern reader (and perhaps to a contemporary one as well) Roxana is most likely thrilled that Usbek is gone.</span></p><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1874"><strong data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Letter 27</span></strong><span data-dcnode-id="1875" instrument_node="">: Usbek (Paris) to Nessir, (Ispahan)</span></p><span data-dcnode-id="1873" instrument_node="">
</span><p data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Usbek says he is having Ibben send a box from Smyrna to Nessir, containing some presents. Rica is doing well but Usbek is deeply depressed. He tells him to not tell his wives how depressed he is.</span></p><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1866"><strong data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Letter 28</span></strong><span data-dcnode-id="1867" instrument_node="">: Rica (Paris) to an unknown person</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Rica describes a theater comedy, where people are running about indulging in romantic excesses, and describes an Opera performer who, seven or eight months pregnant by an Abbe who either raped her or seduced her with promises of marriage (her story varies), asks Rica to take her back to Ispahan, where she thinks she could make a very good living.</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1858"><strong data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Letter 29</span></strong><span data-dcnode-id="1859" instrument_node="">: Rica (Paris) to Ibben, at Smyrna</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Rica is satirically describing the Pope, the bishops to whom all the annoying work is delegated, and a number of heresies and new doctrines that are being debated. In Spain and Portugal, people are still occasionally burned at the stake for doing so. The religious judges apparently always find an accused person guilty, condemning the accused to death and taking all his property to console themselves afterwards.</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1850"><strong data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Letter 30</span></strong><span data-dcnode-id="1851" instrument_node="">: Rica (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Rica describes the Parisians’ response to him. He’s stared at a lot when out in public, and his portrait is suddenly everywhere. He’s fashionable because of his novelty. But when he exchanges his attire for the same kind of clothing men wear in Paris, he disappears from notice and is treated more normally.</span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1842"><strong data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node=""> Letter 31</span></strong><span data-dcnode-id="1843" instrument_node="">: Rhedi (Venice) to Usbek (Paris)</span></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Young Rhedi from Smyrna has arrived at Venice, where he is astonished to see towers and churches rising out of the water. But the city lacks pure water. Rhedi is doing what Usbek proposed to do while abroad: he is studying medicine, physics, astronomy, commerce, government, and the arts. This is a contrast with what Usbek appears to be doing (moping and complaining to and about his wives).</span></p><span data-dcnode-id="1838" instrument_node="">
</span><p data-dcnode-id="1834"><strong data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Letter 32</span></strong><span data-dcnode-id="1835" instrument_node="">: Rica (Paris) to an unknown person.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Rica is looking at the public almshouse set up to help wounded soldiers, who, having been disabled in the service of their country, are excluded from it. He is led through Paris by a blind man, who has been playing cards with another blind man. But he’s heading into a church, which he expects to be far less crowded than the streets.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1826"><strong data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node=""> Letter 33</span></strong><span data-dcnode-id="1827" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Usbek is complaining about the price of wine. In Persia, where it is illegal, people drink it to excess and alcoholism is a major social problem. In Paris, the princes are allowed to use it and it appears to do them no harm (suggesting that the brainpower of the elite is not so good to begin with). Usbek speaks approvingly of the practice of altering one’s mental state for medical or emotional reasons. Quite possibly he’s drunk.</span></p><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1818"><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node=""> Letter 34</span></strong><span data-dcnode-id="1819" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Usbek is comparing the women of Persia to those of France. The Persian women are “finer” but the Frenchwomen are prettier. He is no longer shocked by them, and enjoys their good humor. In Persia, women’s health is supposedly preserved by the dull and uniform seraglio life, but in France men and women alike are more cheerful. He describes the French antipathy for people who keep slaves and eunuchs, but the man he quotes writes those institutions off as being the predictable vices of people raised by slaves and eunuchs instead of being well brought up.</span></p><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1810"><strong data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Letter 35</span></strong><span data-dcnode-id="1811" instrument_node="">: Usbek (Paris) to his cousin Gemchid (Tauris)</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Usbek asks his cousin, who is a dervish, whether Christians might be proto-Muslims because of some similarities in belief and custom.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1802"><strong data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Letter 36</span></strong><span data-dcnode-id="1803" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Usbek describes the French coffee-house tradition. A great deal of debate and argument occurs there, while at the Sorbonne and the University people do it for a living.</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1794"><strong data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Letter 37</span></strong><span data-dcnode-id="1795" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Usbek is complaining about the elderly King Louis XIV, who is a mess of contradictions. Usbek lists some of them.</span></p><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1786"><strong data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Letter 38</span></strong><span data-dcnode-id="1787" instrument_node="">: Rica (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Rica is debating whether women’s liberty is a good thing. He presents both sides, then resorts to a quotation from the Prophet.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1778"><strong data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node=""> Letter 39</span></strong><span data-dcnode-id="1779" instrument_node="">: Hagi Ibbi (Paris) to the Jew Ben Joshua, Mohammedan Proselyte (Smyrna)</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">A man who has made the pilgrimage to Mecca, is writing to a Muslim of Jewish descent at Smyrna, sharing an account of the somewhat fantastic circumstances of Mohammed’s birth. This letter is postmarked from Paris, and is the first time Ibbi is mentioned. Nothing is known about him at this point except that he has been to Mecca, which suggests that he is very religious. He may also be well read in the legends and histories of his religion.</span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1770"><strong data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node=""> Letter 40</span></strong><span data-dcnode-id="1771" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Usbek is morose again. He speaks of the futility of ceremonies such as funerals, and suggest that people should be “bewailed” at their birth instead for all the sorrow they endure. He says that mirth and sadness are nearly always false, and public ritual is stupid and extravagant.</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1762"><strong data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Letter 41</span></strong><span data-dcnode-id="1763" instrument_node="">: The Chief Black Eunuch (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">One of the black eunuchs, Ishmael, has died and the Chief Black Eunuch wanted to replace him by castrating one of the slaves from Usbek’s country estate. The man escaped and has threatened to write to Usbek.</span></p><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1754"><strong data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Letter 42</span></strong><span data-dcnode-id="1755" instrument_node="">: Pharan (the Gardens of Fatmé) to Usbek (Paris)</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Pharan is writing to Usbek to complain that the Chief Black Eunuch has held a grudge against him and tried to castrate him. He says that if he were castrated he would die of grief. He adores Usbek and begs for help. How he will get it—it takes several months for letters to travel from Persia to France and back again—is not clear.</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1746"><strong data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Letter 43</span></strong><span data-dcnode-id="1747" instrument_node="">: Usbek (Paris) to Pharan (the Gardens of Fatmé)</span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Usbek tells Pharan he must be spared and forbids his other slaves to attempt to harm or castrate him. They are to purchase the eunuch they need.</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1738"><strong data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Letter 44</span></strong><span data-dcnode-id="1739" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Usbek is satisfying Rhedi’s thirst for knowledge by telling him how the three French privileged classes (the Church, the military, and the nobility) have contempt for one another.</span></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1730"><strong data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node=""> Letter 45</span></strong><span data-dcnode-id="1731" instrument_node="">: Rica (Paris) to Usbek (somewhere else)</span></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Usbek has gone somewhere. Rica writes to him to describe an encounter with a man who is convinced he has discovers how to make the Philosopher’s Stone.</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1722"><strong data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Letter 46</span></strong><span data-dcnode-id="1723" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Usbek describes the local habit of discussing and debating religion instead of observing it. How to pray, how to kneel, and whether a particular piece of meat is appropriate to eat varies depending on whom you ask.</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1714"><strong data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Letter 47</span></strong><span data-dcnode-id="1715" instrument_node="">: Zachi (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Zachi and Zéphis have patched up a quarrel. Zachi threw a big party to honor Zéphis, inviting all of Usbek’s female relatives. They came on horseback (having been allowed to ride, though veiled). But when Usbek’s wives went into the country they had to ride in a palanquin, and in a box in a ferry to avoid other people on a river. A storm blew in, and the sailor suggested the women be freed so as to save themselves. The eunuchs insisted they would rather let the women drown. The Chief Eunuch threatened to kill anyone who tried to save the women, and the eunuchs killed two men who got too near the box where the women were being carried. The discrepancy between how Usbek’s family travels and how he requires his wives to travel is notable. At this point the reader must begin to question whether the very extreme rules of Usbek’s seraglio are normal even by contemporary Persian standards.</span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1706"><strong data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Letter 48</span></strong><span data-dcnode-id="1707" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Usbek describes people he meets at a fancy party: a farmer-general, a priest, a poet, an old soldier, and a rake.</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1698"><strong data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Letter 49</span></strong><span data-dcnode-id="1699" instrument_node="">: Rica (Paris) to Usbek (somewhere else)</span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Again, Rica and Usbek appear to have parted company. Rica describes a friar who comes to ask him to obtain, from the Persian king, an establishment in Casbin for two or three Capuchin friars. Initially Rica thinks the man wants to emigrate to Persia, and is supportive. But the friar is simply looking for an excuse to establish a colony there. Rica refuses.</span></p><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1690"><strong data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node=""> Letter 50</span></strong><span data-dcnode-id="1691" instrument_node="">: Rica (Paris) to an unknown person</span></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Rica describes a habit whereby people brag of their own modesty and virtue. He says he likes people who apply themselves to their duty and do not dwell on discussions of virtue, so that the reader must wonder what he makes of Usbek, who obsesses over it. The people Rica meets talk constantly of themselves. He describes a man who brags about his modesty (which is contradictory).</span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1682"><strong data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Letter 51</span></strong><span data-dcnode-id="1683" instrument_node="">: Nargum, the Persian Envoy in Muscovy, to Usbek (Paris)</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">For the first time, Usbek is contacted by a representative of the Persian government. He asks Usbek why he had to hear of it from somebody besides Usbek. Nargum has been in Muscovy (Moscow) for five years. He does not like the climate and he speaks highly of the Tsar, Peter II who is now known as Peter the Great. Nargum describes some differences between Russian and Persian culture.</span></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">A certain amount of domestic violence is—he says—customary and expected in Muscovy, to the point where he says the Russian women do not feel loved if they are not occasionally beaten or mistreated by their husbands. The author indicates that these customs “have changed”, and to a modern reader the intent is clearly satirical, however to a contemporary reader may have had some difficulty understanding the irony and sarcasm in the allegory.</span></p><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Throughout the novel, the family can be regarded as an allegory for a state, with the patriarch of the family representing the head of the state and the other members of the family, such as wives and children, representing the subjects. This allegorical significance will be of particular interest in the context of Usbek’s own absentee rulership of his seraglio.</span></p><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1668"><strong data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Letter 52</span></strong><span data-dcnode-id="1669" instrument_node="">: Rica (Paris) to Usbek (elsewhere)</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Rica describes some women he met at a party. There were four, separated in years by about twenty years apiece with the eldest being eighty and the youngest twenty or twenty-two. Each woman criticizes the one older than herself for displaying an interest in makeup, fashion, or adornment that is appropriate only to the younger set. He flatters each of the older women by pretending to think that she is about twenty years younger than she really is.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1660"><strong data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Letter 53</span></strong><span data-dcnode-id="1661" instrument_node="">: Zélis (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">This is the first appearance of Usbek’s fifth wife, previously not mentioned She is not Usbek's most recent wife (that would be Roxana). But unlike the other three who have written so far, she does not flatter Usbek with professions of love.</span></p><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Zélis explains that Cosrou, the white eunuch, has asked for the slave woman Zelida in marriage. Zelida’s mother does not object, nor does Zelida herself. Zélis considers the match to be a farce but has heard that eunuchs are indeed capable of having some kind of sexual pleasure, just not in the usual way. She is still frustrated: she seeks love but cannot find it.</span></p><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1649"><strong data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node=""> Letter 54</span></strong><span data-dcnode-id="1650" instrument_node="">: Rica (Paris) to Usbek (elsewhere)</span></p><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Rica describes a man he overheard next door: for the last three days he’s been ignored. He’s been nursing witticisms and charming stories in my head, hoping to shine socially, and failing. His friend proposes to act as a sort of partner, with each of them making the other look good and helping him in conversation.</span></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1641"><strong data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Letter 55</span></strong><span data-dcnode-id="1642" instrument_node="">: Rica (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Rica is explaining that, in Europe, people consummate their marriages immediately instead of contesting the issue as is customary in Persia. In France, a jealous husband is universally hated. Adultery is not uncommon, but instead of making a big deal about it the victims practice a combination of savoir-faire and revenge.</span></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1633"><strong data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Letter 56</span></strong><span data-dcnode-id="1634" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Usbek explains the Parisian fascination with gambling. Women are particularly fond of it, and can bankrupt their husbands. So Usbek believes that the Persian law that forbids it is good. He believes that the Prophet’s laws are intended to control and subdue people who might otherwise give in to their extreme passions.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1625"><strong data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Letter 57</span></strong><span data-dcnode-id="1626" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Usbek describes two groups of people maintained by Parisians: courtesans and “dervishes” or priests. He describes his encounter with a casuist who specializes in finding excuses and weaseling out of duty. In Persia, he would have been executed by impalement for it.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1617"><strong data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Letter 58</span></strong><span data-dcnode-id="1618" instrument_node="">: Rica (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Rica describes various confidence schemes being run in Paris: alchemy, magic, or the renewable virginity of a prostitute. Professors of languages or arts teach what they do not know.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1609"><strong data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Letter 59</span></strong><span data-dcnode-id="1610" instrument_node="">: Rica (Paris) to Usbek (off somewhere else again)</span></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Usbek has been stepping out of Paris a lot lately, except all his letters originate from there. By now the reader must be wondering just where Usbek is going so frequently but briefly. Rica describes a party in which people always seemed to judge the merits of other things in terms of immediate application to their own self-interest. They consider a law or policy good if it benefits them personally.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1601"><strong data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node=""> Letter 60</span></strong><span data-dcnode-id="1602" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Usbek is replying to a letter, not included, in which Ibben asks whether there are Jews in France. Usbek says that, yes, there are, and that they are associated with banking and money related businesses. There’s a great deal of pride in the French Jewish community, as in Persia, and an invincible attachment to religion that manifests as a refusal to completely integrate with the cultures of the nations in which they reside.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1593"><strong data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Letter 61</span></strong><span data-dcnode-id="1594" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Usbek describes a conversation with a priest, who informs him that priests must attempt to avoid offending people. He uses, as an example, the story of the Emperor Theodosius.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1585"><strong data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Letter 62</span></strong><span data-dcnode-id="1586" instrument_node="">: Zélis (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Zélis and Usbek have a daughter, who is now seven years old. She is being sequestered in the inner apartments of the seraglio early, instead of waiting for the age of ten. Zélis’s goal is to deprive her daughter of the liberty of childhood so as to get her accustomed to confinement. Zélis disagrees that women should be forced into the seraglio as adults, because it makes them miserable. However, despite all the guards, restraints, and oversights Usbek puts in place, Zélis has realized that Usbek’s constant jealousy makes him more of a prisoner than she. She realizes that she has the power to make him uneasy, and so she enjoys doing it. Although Zélis calls Usbek her “dear” husband, she does not express any particular love for him. She is resigned to being treated poorly and like a criminal despite having done nothing wrong. But in the seraglio she has discovered pleasures of which Usbek knows nothing. Whether these are intellectual, spiritual, or sexual pleasures is not clear. But she taunts Usbek, telling him to continue to have her watched. She dreads nothing except his indifference. This is the first time one of Usbek’s wives openly defies him.</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1577"><strong data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Letter 63</span></strong><span data-dcnode-id="1578" instrument_node="">: Rica (Paris) to Usbek (outside Paris)</span></p><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Now the reader learns where Usbek has been going during his frequent departures from Paris. He is going into the country, and living in a pleasant house where he can think and speculate at will. Rica is going into society and adopting European manners. He is particularly pleased to have learned more about women in just a month of being in Paris than he could have learned in a seraglio in thirty years.</span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1569"><strong data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Letter 64</span></strong><span data-dcnode-id="1570" instrument_node="">: The Chief of the Black Eunuchs (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">This letter is written a week after Zélis’s challenge. War has broken out in the seraglio again, and even the eunuchs are taking sides. However everybody is united against the letter writer, who is despised despite his position of authority. The Chief of the Black Eunuchs explains to Usbek how to run an orderly seraglio. In the kind of system he proposes, each woman has her own space, and everything runs on a schedule. The women enter the bathing area one at a time, at an appointed hour, and there is silence overall since the women do not interact with each other or communicate. Access to the master of the seraglio is a privilege, not a right, decided by the Chief Eunuch.</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">The letter writer believes that if he was allowed to punish the wayward women and run the seraglio the way he knows how, everything would be orderly and Usbek would be shown the proper respect. Yet at this point in the story over two years have passed since Usbek’s departure. The letter writer does not ask whether Usbek is coming back.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1558"><strong data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Letter 65</span></strong><span data-dcnode-id="1559" instrument_node="">: Usbek (Paris) to his wives (the Seraglio at Ispahan)</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">This letter is a response to the last one, which—the reader will note—took months to arrive. Usbek asks his wives to behave, to stop quarreling, and to obey the Chief Black Eunuch. He wants to be remembered as their husband, not their master. But at this point he has really made no distinction between the two.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1550"><strong data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Letter 66</span></strong><span data-dcnode-id="1551" instrument_node="">: Rica (Paris) to an unknown person</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Today, Rica is mocking the French fascination for science. Everyone wants to be a wit, and to write books. This doesn’t please Rica, because wit is fleeting whereas books have a longer life. He is also not a fan of compilations in which compilers pick and choose the highlights from other people’s work and publish them separately.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1542"><strong data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node=""> Letter 67</span></strong><span data-dcnode-id="1543" instrument_node="">: Ibben (Smyrna) to Usbek (Paris)</span></p><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Usbek hasn’t written lately, and Ibben is worried about him. He thinks perhaps Usbek has found other friends to occupy his time. Ibben’s philosophy is to live—wherever he is—as though that will be his location for the rest of his life. He seeks out and makes friends.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Ibben relates the tale of a Guerbre Zoroastrian man named Apheridon and his wife Astarte. Among the Guerbre, sibling marriage is considered a good thing. Apheridon fell in love with his sister, but their father knew that such a marriage was taboo under Islamic customs and law. So he placed his daughter in service to a sultana, where she was taught to forget the Guerbre ways. When the girl reached maturity, she was married to a eunuch. Eventually her brother Apheridon got permission to visit her. Their love for one another was in no way diminished, but Astarte had lost her faith and direction after years of being required to follow another religion. Apheridon slipped her a copy of Zoroaster’s work. After reading it, Astarte remembered who she was: a Guerbre woman who had every right to follow her customs, and who was still in love with Apheridon.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Astarte used a file and rope to escape her seraglio and ran away with Apheridon. The two had their marriage solemnized by a Guerbre priest. They lived peacefully in Georgia, until Astarte was kidnapped in a Tartar raid and sold to a Jewish trade caravan heading for Turkey, leaving behind only a little daughter.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">To free Astarte, Apheridon sold himself and their daughter to an Armenian merchant. Astarte, however, came to the merchant and offered her services too. The merchant agreed that if they served him for a year he would set the family free, and he did. The family moved to Tiflis and then to Smyrna, where Apheridon brought his family with him. He has since met the Armenian merchant again and has been able to repay the favor.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Analytically speaking, this story shows the extreme difference between Usbek’s behavior—abandoning his wives and living abroad, allowing others to care for them, and issuing rebukes instead of correcting the problems in person—and Apheridon’s. Apheridon willingly sacrifices himself for the sake of the woman who risked everything to marry him.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1522"><strong data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node=""> Letter 68</span></strong><span data-dcnode-id="1523" instrument_node="">: Rica (Paris) to Usbek (elsewhere)</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Rica is describing a magistrate. He expects the man to be preoccupied with other people’s business. Yet the magistrate is not preoccupied, because he just doesn’t care. He keeps no study, sold his library, and used the money to pay for the post (which he purchased). As a judge, he feels no need to stuff his head with knowledge, because the lawyers tell him everything he needs to know while presenting their case. Rica wonders whether the judge is being frequently deceived.</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1514"><strong data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node=""> Letter 69</span></strong><span data-dcnode-id="1515" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Usbek now considers himself a philosopher. Instead of combining the best attributes of humanity to create an image or concept of God, he says that God is His own law. Usbek believes it is impossible that God should predict the future, “because that which has not happened does not exist, and consequently, cannot be known.” God cannot read a will that does not exist, because until the mind is made up, the thing to be decided is not inside it.</span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1506"><strong data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node=""> Letter 70</span></strong><span data-dcnode-id="1507" instrument_node="">: Zélis (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Zélis is writing to Usbek, telling him that Soliman (most likely a relative) agreed to allow his daughter to marry a young man named Suphis. The dowry had been agreed upon and the marriage consummated, but Suphis mutilated the girl, claiming she was not a virgin, and sent her back to her father. If Zélis’s daughter were ever subjected to such a fate, Zélis says she would die of grief.</span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1498"><strong data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Letter 71</span></strong><span data-dcnode-id="1499" instrument_node="">: Usbek (Paris) to Zélis (the Seraglio at Ispahan)</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Usbek expresses sympathy not for the injured young woman, but for her father Soliman and the honor of the family. Suphis was within his rights under the law. He is pleased that Zélis is paying attention to “her” daughter’s education and he expresses hope that she have a good husband and live in wealth and comfort. He also wishes to see her in all her glory. Of course this desire does not imply an actual intention to return to Ispahan. It is now late in 1714. Nearly four years have passed since Usbek left.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1490"><strong data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node=""> Letter 72</span></strong><span data-dcnode-id="1491" instrument_node="">: Rica (Paris) to Ibben (somewhere else, not necessarily Smyrna)</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Rica describes a man who is convinced he knows everything, whose mind is not troubled with the least doubt. Because he has read Tavernier and Chardin, who described Persia in writing, he believes he knows the country better than Rica, who lived there all his life.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1482"><strong data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Letter 73</span></strong><span data-dcnode-id="1483" instrument_node="">: Rica (Paris) to someone unknown</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Rica is now mocking the French Academy, which is a kind of intellectual tribunal responsible for establishing and enforcing the rules of the French language.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1474"><strong data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Letter 74</span></strong><span data-dcnode-id="1475" instrument_node="">: Usbek (Paris) to Rica (somewhere else)</span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">For the first time, Usbek is in Paris and Rica is not. Usbek has been introduced to a man who is a great lord. He finds him supercilious, haughty, indifferent, and inconsiderate of others. Usbek thinks about how terrible it would have been if he and Rica, back in Persia, had behaved in a similar way. But he pats himself on the back by assuring Rica that they did not. Because they did not have to win the respect of the people below them, Usbek claimed that they did their very best to win their affection and show compassion. Only on the battlefield did they assume haughty looks or expressions. But this statement blatantly contradicts Usbek’s attitude and conduct toward his wives.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1466"><strong data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node=""> Letter 75</span></strong><span data-dcnode-id="1467" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Usbek notices that the Christians he’s met have a vast difference between profession and belief, between belief and conviction, and between conviction and practice. For many, religion is a subject of debate. Many people demand that the priests prove things that they themselves cannot disprove, but have made up a mind not to believe.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1458"><strong data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Letter 76</span></strong><span data-dcnode-id="1459" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Usbek complains to Ibben that he is depressed, forced to labor for a society to which he refuses to belong, and held to an agreement made without his consent. European law is very much against suicide.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1450"><strong data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Letter 77</span></strong><span data-dcnode-id="1451" instrument_node="">: Ibben (Smyrna) to Usbek (Paris)</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Ibben comforts Usbek by reinterpreting misfortunes as warnings instead of punishments. In the context of Usbek's family trouble, Ibben's words can be taken as a suggestion that Usbek should get home as quickly as possible, or else find a way to bring his wives to him.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1442"><strong data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Letter 78</span></strong><span data-dcnode-id="1443" instrument_node="">: Rica (Paris) to Usbek (elsewhere)</span></p><span data-dcnode-id="1441" instrument_node="">
