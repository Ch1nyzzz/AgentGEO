</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Rica is sending a copy of a Frenchman’s description of Spain which presents a critical view of the contemporary Spanish monarchy and of the Inquisition.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1434"><strong data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Letter 79</span></strong><span data-dcnode-id="1435" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Usbek is describing legislators or lawmakers as inferior people who, having lucked into some power, proceed to use it to advance their own prejudices and whims. He states that “morality makes better citizens than law”.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1426"><strong data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Letter 80</span></strong><span data-dcnode-id="1427" instrument_node="">: The Chief Black Eunuch (the Seraglio at Fatmé) to Usbek (Paris)</span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">The Chief Black Eunuch has just bought a young Circassian slave girl for Usbek’s enjoyment upon his return. It is now 1715, and more than four years have passed since Usbek’s departure. The Chief Black Eunuch is writing from a second seraglio at Fatmé. This appears to be Usbek's country estate.</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1418"><strong data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node=""> Letter 81</span></strong><span data-dcnode-id="1419" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Usbek is describing the many varieties and forms of government he has seen in Europe, which differs from the uniform rules of policy he says are “the same” everywhere in Asia. He believes that the best government is the one run with the least amount of difficulty and friction. Usbek notices that people obey the law better when punishment is mild instead of severe. He states that when punishment is too severe, rebellion will occur. This statement foreshadows the rebellion in the seraglio.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1410"><strong data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node=""> Letter 82</span></strong><span data-dcnode-id="1411" instrument_node="">: Nargum (Muscovy) to Usbek (Paris)</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Nargum is extolling the “Tartars”, meaning the Mongols, whom he describes as the “veritable ruler of the earth”. Besides having conquered China twice, they have subdued Muscovy, taken over much of the Mogul empire, and made conquests in Europe, Asia, and even Africa. Yet they gave no thought to commemorating their fame.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1402"><strong data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Letter 83</span></strong><span data-dcnode-id="1403" instrument_node="">: Rica (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Rica describes the Carthusian monks, who periodically take vows of silence and are known for not speaking much. He segues into a story about how a person who is a good listener, or who can draw out a story from anyone, can be a social success.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1394"><strong data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node=""> Letter 84</span></strong><span data-dcnode-id="1395" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Usbek is speculating as to why people behave unjustly. He says it is because they are acting out of self-interest, and they prefer their own satisfaction to that of other people. But he does not believe that such self-interested behavior, or injustice, is ever committed by God.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1386"><strong data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Letter 85</span></strong><span data-dcnode-id="1387" instrument_node="">: Rica (Paris) to an unknown person</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Rica has visited the Hotel des Invalides, established for the retirement and comfort of disabled soldiers. He believes that fallen soldiers should have their names immortalized for posterity, and he is greatly impressed with a king who would establish such an institution.</span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1378"><strong data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Letter 86</span></strong><span data-dcnode-id="1379" instrument_node="">: Usbek (Paris) to Mirza (Ispahan)</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">After a long silence, Usbek is writing to his friend Mirza again. This time he’s speaking against bigotry. Yet he himself practices extreme ethnic bigotry in his interactions with his “Black Eunuchs”, and gender based bigotry in controlling and dominating his wives. Usbek likes the idea of multiple competing religions, and thinks that having more than one option make people more zealous and loyal to their own faith.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1370"><strong data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node=""> Letter 87</span></strong><span data-dcnode-id="1371" instrument_node="">: Rica (Paris) to an unknown person</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">In France, according to Rica, people exert only nominal authority over one another. If there is an actual dispute, the law punishes excessive abuse of authority. Rica describes a court of law.</span></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1362"><strong data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Letter 88</span></strong><span data-dcnode-id="1363" instrument_node="">: Rica (Paris) to an unknown person</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Rica describes some people who are “society itself”: social butterflies who are always in a hurry, always talking to people, and constantly visiting, congratulating, or consoling others. One of them died, and on his tomb was engraved a list of his accomplishments, which were entirely social.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1354"><strong data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node=""> Letter 89</span></strong><span data-dcnode-id="1355" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">According to Usbek, but ironically to the modern reader, Paris is full of liberty and equality (fraternity, the third part of the goal of the French Revolution, not being mentioned). People are supposedly not jealous about rank as much as they are about who has the best horses. Pleasure, rank, and recognition is associated with access to the King and ministers, and having ancestors, debts, and independent sources of wealth. People can be “great” by an accident of birth. By contrast, in Persia the only people considered great are the ones on whom the monarch bestows official authority.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1346"><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node=""> Letter 90</span></strong><span data-dcnode-id="1347" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Usbek equates the desire for glory with the instinct of self-preservation. But glory is “never the companion of slavery”. According to this logic, Usbek’s household can never be glorious, but Usbek characteristically overlooks the fact.</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1338"><strong data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node=""> Letter 91</span></strong><span data-dcnode-id="1339" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Usbek describes the “point of honor” or key objective of every profession, particularly the military profession. In the distant past, the French used these points of honor to regulate their lives. This recalls Letter 79, in which Usbek said that morality makes better citizens than laws. Yet, as is often the case with Usbek, when he sees his ideal put into practice he doesn’t really like it. Dueling was the way to resolve disputes of honor, and frequently the contest went to the best fighter as opposed to the person who had right on his side. Dueling was therefore outlawed and made punishable by death. This produces a Catch-22 of sorts: if one follows the law of honor (and fights a duel) he will be condemned to death, but if he does not, he is banished socially.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1330"><strong data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node=""> Letter 92</span></strong><span data-dcnode-id="1331" instrument_node="">: Usbek (Paris) to Rustan (Ispahan)</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Usbek describes a charlatan who is presenting himself as a Persian ambassador in a way that misrepresents and embarrasses them. He asks Rustan to say nothing of it to the King, because so much of what the comedic charlatan mocks is actually true.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1322"><strong data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Letter 93</span></strong><span data-dcnode-id="1323" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Louis XIV, the Sun King, is dead. His heir, a great-grandson, is only five years old. Already there is strife between the Regent (the new King’s uncle) and Parliament.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1314"><strong data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Letter 94</span></strong><span data-dcnode-id="1315" instrument_node="">: Usbek (Paris) to his brother, who is a Santon at the Monastery of Casbin</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Usbek begins by flattering his brother, who is living a cloistered religious life much like a monk. He, Usbek, is being tormented by temptations. It is 1715, more than four years since Usbek left Ispahan. Usbek is beset by doubt.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1306"><strong data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Letter 95</span></strong><span data-dcnode-id="1307" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Usbek is explaining the differences between civil law, which regulates the affairs of individuals, and international law.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1298"><strong data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Letter 96</span></strong><span data-dcnode-id="1299" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">This is a continuation of the last letter. Usbek believes there should be magistrates to mediate disputes between citizens, but that nobody should interfere in disputes between nations. He believes that disputes are almost always clearly defined and easily decided. He also believes that the only kind of just wars are to repel an attacking enemy or to aid an ally who is under attack (thereby interfering in a dispute between nations). These two beliefs contradict one another. The rest of the letter is a rationalization.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">The letter, and its rather naive assumptions, suggest that Usbek himself has never experienced war. Having supposedly lived most of his life as a courtier he must have seen a great deal of politics in Persia, and the reader must wonder exactly how he could retain such a simplistic and inaccurate view of the world.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1287"><strong data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Letter 97</span></strong><span data-dcnode-id="1288" instrument_node="">: the Chief Eunuch (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">The Chief Eunuch, not the Chief Black Eunuch, has bought another woman. This time he bought one for Usbek’s brother, the governor of Mazenderan (who is clearly not the brother who is the reclusive religious scholar) and another for Usbek. The woman, a “yellow” one from the kingdom of Visapour, is extremely beautiful. The eunuchs have noticed that the more women are in the seraglio, the less trouble they give to the eunuchs. Things appear to have cleared up for the moment, however it would be best if Usbek returned. The Chief Eunuch begs him to do so.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1279"><strong data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node=""> Letter 98</span></strong><span data-dcnode-id="1280" instrument_node="">: Usbek (Paris) to Hassim, Dervish of the Mountain of Jaron</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">This is another religious and philosophical letter, however instead of asking for enlightenment Usbek is informing. He relates how Western philosophers, deprived of the “perfection” of Oriental wisdom, have used reason to lead them to some of the same insights and laws. He describes some basic laws of physics as he understands them, but he does not understand them very well. For a man who had a sincere love of science, Usbek doesn’t seem to have learned any during his journey, which is now well into its sixth year.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1271"><strong data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Letter 99</span></strong><span data-dcnode-id="1272" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Usbek is talking about socioeconomic mobility. In France, people periodically become extremely rich (or lose everything) due to a change in circumstances.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1263"><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Letter 100</span></strong><span data-dcnode-id="1264" instrument_node="">: Rica (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Rica is describing the excesses of French fashion, particularly for the women. He describes ridiculously high heels, tall headdresses, and wide skirts.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1255"><strong data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Letter 101</span></strong><span data-dcnode-id="1256" instrument_node="">: Rica (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">This is a continuation of the last letter. Rica describes the influence of fashion on the French people, who find foreign clothing and fashion ridiculous but who frequently change their own, in some pretty radical ways as he has described in his previous letter. In terms of policy, politics, and philosophy Rica says the French are content to import most of their laws and ideas from elsewhere—this is a clear dramatic irony even to a contemporary reader who would be familiar with some of the Enlightenment thought that was originating in France at that time.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1247"><strong data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Letter 102</span></strong><span data-dcnode-id="1248" instrument_node="">: Usbek (Paris) to an unknown person</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Usbek is describing the ongoing debate over the French Constitution. He also describes a man behaving irrationally and uttering nonsense, claiming that he was inspired by the Holy Ghost. According to Usbek—who is now speaking as readily and sarcastically as young Rica—the man needed inspiration from such a source, and was in grave need of enlightenment. This letter is unusual, because in terms of tone and content it is more similar to Rica’s voice and style than to Usbek’s. Usbek is a morose pedant not given to verbal quips.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1239"><strong data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Letter 103</span></strong><span data-dcnode-id="1240" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Usbek is describing the various states in Europe, of which only a few are truly united and ruled by a monarch. There is a multitude of tiny states, and the Italian city-states tend to be vassals of more powerful neighbors. He notes that, when a state in Persia is run poorly and a person angers his sovereign, that person will be put to death. This penalty is identical to the penalty for an assassination attempt. So a person who has incurred the Persian sovereign’s wrath has nothing to lose by attempting an assassination. In Europe, by contrast, people who upset the ruler are simply excluded from Court. Accordingly, fewer European princes die violently.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1231"><strong data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Letter 104</span></strong><span data-dcnode-id="1232" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Usbek relates a statement made by a “sensible European” saying that the princes of Asia made a mistake by shutting itself up instead of by being visible to the people. Quoting that source, Usbek says that it’s surprising there aren’t more assassinations given the despotic conduct of some of the rulers and local rulers in Persia and elsewhere.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1223"><strong data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Letter 105</span></strong><span data-dcnode-id="1224" instrument_node="">: Usbek (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1221" instrument_node="">Usbek draws distinctions between the ways European nations interact with their rulers. English kings rule as first among equals, and the only tie that can bind them is gratitude. Oddly enough, nobody in Europe who decides to dethrone a king believes that he himself is a usurper, but believes that the king has behaved unjustly toward his people. This is a reference to Charles I of England. At the time the </span><a data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/persian-letters"><span data-dcnode-id="1220" instrument_node="">Persian Letters</span></a><span data-dcnode-id="1218" instrument_node=""> were published, the French Revolution had not yet occurred, nor had the execution of Louis XVI and Marie-Antoinette. That didn’t happen for another forty years. Yet to a modern reader, this letter contains a warning.</span></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1212"><strong data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Letter 106</span></strong><span data-dcnode-id="1213" instrument_node="">: Rhedi (Venice) to Usbek (Paris)</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Rhedi tells Usbek that he’s not impressed with new technology, art, and science as cultivated in the West, because it keeps being used destructively. The princes of Europe no longer trust their own citizens, and since the invention of gunpowder, no fortress is impregnable and there is no such thing as a refuge from violence. He dreads that one day human beings will discover an even more efficient way to kill one another. According to Rhedi, all the monarchies have been founded by war, and ignorance of the arts. They have been destroyed by over cultivation of the arts which weakens the state militarily or ends in an over empowerment of the constituency that necessitates a change in leadership. Persia itself may be in danger from the Mongol hordes. In closing, Rhedi reflects on a “happier time” or Golden Age in which everything was peaceful and simple. This reflects a radical lack of knowledge of history. Human beings have always fought with one another and have usually struggled for survival. This was obvious even in the 1700s.</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1204"><strong data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node=""> Letter 107</span></strong><span data-dcnode-id="1205" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Usbek is responding to Rhedi’s letter and calling him on the hypocrisy of leaving his country to acquire knowledge, yet despising “all” knowledge. This is a reduction to absurdity; Usbek is exaggerating Rhedi’s point in order to argue. A super-weapon, according to Usbek, would immediately be limited by law of nations and suppressed by unanimous consent: princes want to gain subjects, not soil. This, for a courtier, is an incredibly naive statement. But Usbek makes a very good counterargument to the notion that a fondness for the arts makes people weak. He points out that artists are driven by self-interest just like other people, and that the art they create is worth something. It lasts a long time and contributes to the wealth of the kingdom. The more wealth in the kingdom, the more powerful the ruler.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1196"><strong data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Letter 108</span></strong><span data-dcnode-id="1197" instrument_node="">: Rica (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Rica describes the young King, Louis XV. He’s surrounded by women—female caretakers—but Rica notes that he’s also the one monarch who has the least use for them, given his youth. Yet, in fairness, the previous king was governed by women too because of the amount of influence his mistresses and female friends had with regard to government appointments and favors.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1188"><strong data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Letter 109</span></strong><span data-dcnode-id="1189" instrument_node="">: Usbek (Paris) to an unknown person</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Usbek describes the French journal, which at the time was not a newspaper so much as a notice of newly available books hot off the press. The journals contain comments on the new books that are mostly positive, however authors cannot tolerate criticism.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1180"><strong data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Letter 110</span></strong><span data-dcnode-id="1181" instrument_node="">: Rica (Paris) to an unknown person</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Rica describes the University of Paris and an argument concerning how to pronounce the French letter “Q”. This is an incident that actually occurred. Montesquieu simply found it ridiculous and repeated the story because it fit the other events of the Letters.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1172"><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node=""> Letter 111</span></strong><span data-dcnode-id="1173" instrument_node="">: Rica (Paris) to an unknown person</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Rica is describing the activities of a fine lady, which revolves around her toilette, her parties, and her entertainments. At a recent supper party in the country, which was dull, the ladies insisted they were all being thoroughly amused. Rica’s power of wit evaded him and he fell asleep.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1164"><strong data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Letter 112</span></strong><span data-dcnode-id="1165" instrument_node="">: Usbek (Paris) to an unknown person</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Usbek is describing the present fashion of writing and speaking almost exclusively about the events that occurred during the late King’s minority. Few things are written except accounts of these times. This is odd and disturbing: for example it is fashionable to speak ill of Cardinal Mazarin, who died in 1661. It is now 1718.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1156"><strong data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Letter 113</span></strong><span data-dcnode-id="1157" instrument_node="">: Rhedi (Venice) to Usbek (Paris)</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Rhedi believes the world very underpopulated compared to the way it supposedly once was. No matter where he goes, he sees nothing but ruins of ancient Italian buildings that were far more impressive and powerful than what he sees now. There is not necessarily any truth to Rhedi’s assertion that the ancient world was more populous, however some resources such as the trees that once covered that part of the world had been long since depleted.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1148"><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Letter 114</span></strong><span data-dcnode-id="1149" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Usbek believes that the answer to Rhedi’s question revolves around plagues such as the Black Death. He believes that many disasters that befell humanity were a result of divine will.</span></p><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1140"><strong data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Letter 115</span></strong><span data-dcnode-id="1141" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">This is a continuation of the last letter. Usbek discusses polygamy, which was prohibited in the Roman world. He sees a conflict between the number of wives permitted by the Koran and the injunction to satisfy all of them. He is starting to think that eunuchs, who are necessary to guard women, represent a waste of human potential. Apparently locking up the women in the first place is not something he regards as a waste of human potential. Accordingly, instead of resulting in a lot of children, polygamy as practiced in the Persian fashion limits the population because of all the people necessary to provide slaves for the seraglio, which ensures they are not available to marry and reproduce.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1132"><strong data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node=""> Letter 116</span></strong><span data-dcnode-id="1133" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Usbek compares the institution of slavery in ancient Rome to that of contemporary Persia. In Rome, Usbek believes the slaves were more efficiently used to the benefit of the republic.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1124"><strong data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Letter 117</span></strong><span data-dcnode-id="1125" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Usbek expounds upon divorce, which was forbidden in Christianity. Being unable to divorce made large numbers of people miserable. Instead of working to resolve problems, mindful of the option of ending the marriage, people to whom divorce was forbidden felt trapped and treated each other poorly. Miserable people tend to not have large numbers of children together, in Usbek’s opinion.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1116"><strong data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Letter 119</span></strong><span data-dcnode-id="1117" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Usbek describes the number of priests and nuns who take vows of celibacy and chastity, who are not marrying and reproducing, and points to this trend as a reason for the perceived drop in population since antiquity. He is still replying to Rhedi’s question about population change.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1108"><strong data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Letter 119</span></strong><span data-dcnode-id="1109" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Usbek is speculating about the reason for a perceived decline in population in Africa, compared to ancient times. He thinks it must be depopulated due to the habit of selling people to the European slave traders for transportation to the American colonies for the past two hundred years.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1100"><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node=""> Letter 120</span></strong><span data-dcnode-id="1101" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Usbek continues to speculate about the reason behind population decline.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1092"><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Letter 121</span></strong><span data-dcnode-id="1093" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Usbek speculates that, in hunter-gatherer or “savage” societies the population is sparse because hunting and fishing are often unproductive. Also, in such societies, women have the option of ending their pregnancies. According to Usbek they do so in order to remain attractive to their husbands, however if an unmarried woman hides her pregnancy and the child dies she herself is put to death. Usbek does not quite understand why any woman, not wishing to be put to death for a late miscarriage and lacking family resources to feed and care for a child, would find it expedient to simply end the pregnancy early and thereby avoid the risk of being blamed for a late miscarriage and put to death for it.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1084"><strong data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Letter 122</span></strong><span data-dcnode-id="1085" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Usbek speculates about the effect of colonial expansion on population. He believes it weakens the countries from which the colonists originate without strengthening the destination country. However Usbek does not appear to have taken into account any actual census or quantitative information about the Americas.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1076"><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Letter 123</span></strong><span data-dcnode-id="1077" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Increase of population, says Usbek, is aided by a mild government.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1068"><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Letter 124</span></strong><span data-dcnode-id="1069" instrument_node="">: Usbek (Paris) to the Mollah Mehemet Ali, Guardian of the Three Tombs (Koum)</span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Having perhaps recovered from the rebuke of Letter 9 (it's been a few years), Usbek writes again asking the purpose of the fasts and sack cloths. The Ottoman Empire has just been shaken by two different defeats. Given this setback, Usbek wants to know why the fasting continues.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1060"><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node=""> Letter 125</span></strong><span data-dcnode-id="1061" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Usbek marvels at the great financial gifts given by princes to their courtiers. They are surrounded by greedy people yet they continue to give, possibly to bribe but also to play people off against each other. Usbek imagines that in time he will soon see a royal decree stating that, owing to the immense number of favors granted to office-seekers and pension-seekers, the Crown is obliged to tax the peasants and working class for an extra fifth of their income in order to cover the expense.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1052"><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node=""> Letter 126</span></strong><span data-dcnode-id="1053" instrument_node="">: Rica (Paris) to an unknown person</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Rica wonders what religion should offer a virtuous person. He relates the story of a woman from India who, having lost her husband, went to the governor of her city to ask to burn herself to meet her standards of religious decency and carry on family tradition. She was denied permission, and during the investigation one of the holy men who recommended her self-immolation encouraged her to go through with it anyway, so that she could be reunited with her husband in the afterlife and begin another more eternal marriage. At that point she lost all interest and accepted Islam on the spot.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">It is not clear exactly to whom Rica is writing, however it is important to note that his raunchiest letters and the ones with sexual content are not addressed to any of the other named characters. Given the subsequent events in the seraglio, it would be quite comical if the confiscated letter that appears later in the book had been written to one of Usbek's wives.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1041"><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node=""> Letter 127</span></strong><span data-dcnode-id="1042" instrument_node="">: Rica (Paris) to Usbek (out in the country)</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Rica is expecting Usbek to return, and is forwarding some letters from Ispahan. There has been a change of position with regard to the Spanish ambassador. He feels great sympathy for everyone involved in the intrigue.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1033"><strong data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node=""> Letter 128</span></strong><span data-dcnode-id="1034" instrument_node="">: Rica (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">King Charles XII of Sweden, his conquest ended by a head wound in Norway, is dead. Rica has abandoned sobriety out of necessity, risking his relationship with Usbek in the process.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1025"><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node=""> Letter 129</span></strong><span data-dcnode-id="1026" instrument_node="">: Rica (Paris) to Usbek (out in the country)</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Rica describes the behavior of a “geometer” or mathematician who specializes in geometry. The man is interested only in quantitative information and behaves in a very social awkward way.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1017"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node=""> Letter 130</span></strong><span data-dcnode-id="1018" instrument_node="">: Rica to an unknown person</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Rica describes the “Quidnuncs” who imagine themselves of great consequences. They know a great deal of trivia, and they anticipate the future. They hang out in the Tuileries and habitually prognosticate about politics and military matters. They also frequently bet on the results.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1009"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Letter 131</span></strong><span data-dcnode-id="1010" instrument_node="">: Rhedi (Venice) to Rica (Paris)</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Rhedi recounts a history of republics—a topic which interests him.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1001"><strong data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Letter 132</span></strong><span data-dcnode-id="1002" instrument_node="">: Rica (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Rica describes a man who has a great deal of income from his land, but is ruined by excessive debt. Another man has been ruined by converting his income into worthless bank-notes. Also present is an astrologer and a Quidnunc, both of which predict imminent disaster.</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="993"><strong data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Letter 133</span></strong><span data-dcnode-id="994" instrument_node="">: Rica (Paris) to an unknown person</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Rica has visited a major library that is supported by a monastery, such that they are required to admit the public within certain hours. He asks the monk about some of the books, but the monk has no clue. The librarian is the one who does all the work, yet the monks consider him worthless and an unnecessary expense because he works for the library instead of contributing to the monastery. The monk forces Rica out of the library, shuts the door, and rushes off to his prayers, because being seen there is far more important than performing the work for which the monastery was built.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="985"><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node=""> Letter 134</span></strong><span data-dcnode-id="986" instrument_node="">: Rica (Paris) to an unknown person</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">This time Rica talks to a different man at the library. Some of the books are interpretations of the Scriptures, so Rica thinks there must no longer be many doubts about religion. Yet the books are chiefly explanations about what the authors believed, based on their interpretation. There is a great deal of debate in the Christian community over doctrine and Scripture.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="977"><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node=""> Letter 135</span></strong><span data-dcnode-id="978" instrument_node="">: Rica (Paris) to the unknown person</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Rica’s new friend, the librarian, continues to introduce books by grammarians, commentators, and other people who have been able to dispense with common sense. Likewise there are orators, geometers, and metaphysical books. There are books about medicine, anatomy, and even judicial astrology which is well respected in Persia. The librarian is shocked, however Rica explains that all the Persian astrologists together commit less folly than the average French algebraist.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="969"><strong data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Letter 136</span></strong><span data-dcnode-id="970" instrument_node="">: Rica (Paris) to the unknown person</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Now the books being introduced relate to modern history: the Church, the Pope, the Roman Empire and other nations.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="961"><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node=""> Letter 137</span></strong><span data-dcnode-id="962" instrument_node="">: Rica (Paris) to an unknown person</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Now Rica is describing the poetry section of the library. Both he and his guide find poetry irritating and romantic poetry especially dull.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="953"><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Letter 138</span></strong><span data-dcnode-id="954" instrument_node="">: Rica (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Rica is describing four changes in the financial system within three years. There is a great deal of economic confusion in France due to the Duke of Noailles, John Law—who put the economy into what he thought was a better state of order—and the stock market is making some people suddenly rich but others suddenly poor.</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="945"><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node=""> Letter 139</span></strong><span data-dcnode-id="946" instrument_node="">: Rica (Paris) to Ibben (Smyrna)</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Rica describes the decision of Queen Ulrica-Eleonora of Sweden to share the government with her husband.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="937"><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node=""> Letter 140</span></strong><span data-dcnode-id="938" instrument_node="">: Rica (Paris) to Usbek (elsewhere)</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Rica describes the exile of Parliament, which opposed the edicts of John Law.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="929"><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Letter 141</span></strong><span data-dcnode-id="930" instrument_node="">: Rica (Paris) to Usbek (elsewhere)</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Rica relates the story, told to him by a woman who knew the Koran extremely well, of a jealous husband named Ibrahim who killed his wife Anais for objecting to cruel treatment.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Anais was received in a paradise where every possible pleasure was provided for her, including men who dedicated themselves to her pleasure. She commanded one to take the form of her husband, go to the seraglio, get rid of Ibrahim, and stay there until she recalled him. This he did, and he treated the women with so much more decency and courtesy that they preferred him over their real husband. However in order to keep the eunuchs from asserting the status quo even in Ibrahim’s absence, because they had done so while the angelic servant carried Ibrahim two thousand miles away, he found it necessary to stay for three years. During this time he spent all Ibrahim’s money and fathered a bunch of children with his wives.</span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">This missive contains a few subtle criticisms of John Law’s economic reforms, but taken literally must have driven Usbek wild with jealous rage because it coincides with some trouble in his own seraglio. To an essayist who wishes to implicate Rica in the destruction of Usbek's seraglio, this letter is vital evidence because it contains a suggestion that Rica somehow knows what's going on even before Usbek does. As will be revealed in later letters, things are deteriorating there. It is now 1720 and the men have been gone nearly nine years.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="915"><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node=""> Letter 142</span></strong><span data-dcnode-id="916" instrument_node="">: Rica (Paris) to Usbek (elsewhere)</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">This letter presents a satire, in which the author criticizes the financial System of John Law. The satire is presented not through Rica’s observations, but in two enclosed letters. The first is purportedly from a collector of antiques who pays top value for old items such as Diogenes’ lamp and a mirror once belonging to Virgil, however it is obvious that many of the old items are counterfeit and that the rest are without value.</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">The second letter "included" by Rica is an allegorical satire about a man who, armed with a bag of winds, defrauds the people of Betica of much of their wealth. The System of John Law, in which the French government sought to improve and regulate the failing French economy through a series of royal decrees that deprived many families of their accumulated wealth and that enriched only speculators, is presented in an allegorical fashion.</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="904"><strong data-dcnode-id="906"><span data-dcnode-id="907" instrument_node=""> Letter 143</span></strong><span data-dcnode-id="905" instrument_node="">: Rica (Paris) to Nathaniel Levi, Jewish Physician (Leghorn, Italy)</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Rica appears to be replying to a question from Levi about what Rica thinks of amulets or talismans. Rica acknowledges that both he and Levi are from groups of people known for their superstition. Rica himself carries about an impressive number of passages from the holy Koran along with the names of various dervishes and saintly people. This, to the reader, will be surprising given how Rica responded to the superstitions of others in earlier letters. Rica says he carries the letters out of long habit and a desire to do what other men of his tradition do. He presents it as the equivalent of wearing lots of jewelry and personal ornaments. He does not really believe that the arrangement of certain letters on a page can protect a person from accident or disease. Rica doesn’t really believe that spells or invisible powers can influence a battle as much as armies, troop positions, the situation of the field, and the experience of the generals.</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">As a postscript, which is longer than the letter, Rica includes a satirical letter from a country physician to one in Paris. A patient is suffering from insomnia, but instead of taking the opium prescribed by his physician (a dangerous and addictive substance) he calls upon a bookseller to provide a cure for insomnia: an extremely dull and boring book. The physician therefore proposes the work of other writers as purgatives, emetics—to make the patient vomit—and a work with lengthy sentences to cure asthma by increasing the desire to breathe.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="893"><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Letter 144</span></strong><span data-dcnode-id="894" instrument_node="">: Usbek (Paris) to Rica (also in Paris)</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">This is one of the letters added by Montesquieu in 1754. Usbek is deploring the influence of vanity on people who have too much of it. Given the events of the last letters in the novel, he may be talking about himself.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="885"><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Letter 145</span></strong><span data-dcnode-id="886" instrument_node="">: Usbek (Paris) to an unknown person</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Usbek describes the behavior of a man of genius, and the attributes and behaviors he mentions bear a striking resemblance to himself. But a scientist’s lot is not a happy one. To illustrate his point, Usbek includes a letter from a savant who, having dissected a neighbor’s dog, is subsequently blamed for every dog in the neighborhood who disappears. He then provides his own analysis, showing how the people who attain excellence in science, history, and other fields of study are respected and admired only by other people in their own field.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Usbek is suggesting that he, personally, has been wrongly accused or punished for excellence. This, perhaps, was his reason for leaving Persia and living in self-imposed exile. This, perhaps, is his reason for going so frequently out into the country. But there’s a problem with such a hypothesis: the text provides no evidence of Usbek actually studying, writing, or publishing anything that would acquaint him personally with the consequences of excellence. Yet he takes on the tone of a martyr nonetheless.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="874"><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node=""> Letter 146</span></strong><span data-dcnode-id="875" instrument_node="">: Usbek (Paris) to Rhedi (Venice)</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Usbek states, as a maxim, that a minister cannot be great unless he is sincere. He mentions a fact he believes Rhedi should know: that the trip to France is not Usbek’s first voyage abroad, and that he travelled in the Indies for a long time. This is interesting new information for the reader. Did Usbek travel as an unencumbered single man, the way Rica did, or is this not the first time he has abandoned his family for years on end? Also, why has this accomplished world traveler never performed the Hajj pilgrimage?</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Usbek describes a nation in which, led by a minister who set a bad example, the people in an entire nation adopted a victim mentality and used any available means, including legal redress, to support “iniquitous deeds” to avenge with real consequences these imagined slights. This letter is another satire on the economic system of John Law, with emphasis on the dubious value of paper money.</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="863"><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Letter 147</span></strong><span data-dcnode-id="864" instrument_node="">: The Chief Eunuch (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">The Chief Eunuch has observed several violations of protocol from Usbek’s wives, who after nine years appear to have decided that Usbek is gone permanently. Zélis let her veil fall on the way to the mosque, so that other people saw her face. Whether the wardrobe malfunction was accidental or deliberate is not clear, but the Chief Eunuch believes it was deliberate. Zachi was caught in bed with one of her maids, and the Chief Eunuch has intercepted a letter but does not know who the addressee might be. Furthermore, a young man was observed in the seraglio garden; he made his escape by scaling the wall. Between all these things and the facts he has not yet discovered, the Chief Eunuch is certain Usbek has been betrayed by at least one of his wives.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">This letter creates a turning point in the plot, because up until now the Chief Eunuch, having been ensnared in a romantic intrigue as per the events of Letter 9, has not been satisfied with Usbek's injunction to his wives to play nicely and to obey. Interestingly, the offenses the Chief Eunuch describes are all the sort of thing that could be noticed by other people and reported independently to Usbek. To prevent disaster to himself, the Chief Eunuch turns on the women, effectively throwing them under a bus by pretending he was never involved in the deception.</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Note the 1718 date on the letter. It takes four to six months from a letter to travel between Paris and Ispahan. While these things were occurring, and while the seraglio was collapsing, Usbek was pontificating about how a good and gentle government, a just monarchy where the leader sets a good example, is necessary to the propagation of the species.</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="849"><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Letter 148</span></strong><span data-dcnode-id="850" instrument_node="">: Usbek (Paris) to the Chief Eunuch (the Seraglio at Ispahan)</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Usbek gives unlimited license to the Chief Eunuch to punish, chastise, and bring secrets to light. He says to “purify” the seraglio and will hold the Chief Eunuch responsible for the slightest fault. He also says it was most likely Zélis who was supposed to receive the letter. This could be because of Zélis’s letter to him in which she asserted that she’d found other ways to occupy her time and comfort herself for the loss of the absent Usbek.</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="841"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Letter 149</span></strong><span data-dcnode-id="842" instrument_node="">: Narsit (the Seraglio at Ispahan) to Usbek</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Narsit reports that the Chief Eunuch has died. Two days after his death, a letter for the Chief Eunuch arrived. Narsit, having taken the Chief Eunuch’s place, does not open it. So the instructions to enforce order are ignored. Narsit does not mention any particular disorder in the seraglio, which suggests that the Chief Eunuch did not discuss the problems with him. This is consistent with the notion that the Chief Eunuch has been blackmailed or bribed into going along with bad behavior, or that the Chief Eunuch's report to Usbek might be false or exaggerated in order to obtain power to punish the women he despises.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="833"><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Letter 150</span></strong><span data-dcnode-id="834" instrument_node="">: Usbek (Paris) to Narsit (the Seraglio at Ispahan)</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Usbek rebukes Narsit for not opening the letter to the Chief Eunuch. He says the seraglio is in complete disorder and instructs Narsit to enforce the rules.</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="822"><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Letter 151</span></strong><span data-dcnode-id="826" instrument_node="">: </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/persian-letters/study-guide/character-list%23solim"><span data-dcnode-id="825" instrument_node="">Solim</span></a><span data-dcnode-id="823" instrument_node=""> (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">It is unclear as to exactly who Solim is: he might be the Soliman whose daughter was mutilated by her bridegroom, or he might be another eunuch. In any case he is someone in whom the Chief Eunuch confided. He reveals that a letter from Usbek has been intercepted and stolen prior to its arrival. Exactly who arranged the interception is unclear, but there are at least two young men involved because the slave in charge of Usbek’s country home has been bribed to conceal them in a hidden room. The women are relaxed, happy, and having a good time except for Roxana who maintains her customary aloof behavior.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">At this point, the reader still has no direct evidence of bad behavior from the women, apart from the Chief Eunuch’s word which has been communicated directly to Usbek and also indirectly to Solim.Solim has not personally seen any of the incidents the Chief Eunuch reported, but he is definitely is in a position to advance his career at the women’s expense.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="811"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Letter 152</span></strong><span data-dcnode-id="812" instrument_node="">: Narsit (the Seraglio at Fatmé) to Usbek (Paris)</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Now we know more about the second seraglio: it is one that Usbek’s wives frequently occupy themselves. But Roxana and Zélis were anxious to visit, and judging by the last letter the reader can deduce that each of them has a lover there.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Narsit congratulates himself on running a well-ordered seraglio and mentions that the slave sent to retrieve the letter from Usbek from some Armenian merchants was robbed: the letter was taken (suggesting that the woman to whom it was written has influence outside the seraglio). Would Usbek please write again?</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="800"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node=""> Letter 153</span></strong><span data-dcnode-id="801" instrument_node="">: Usbek (Paris) to Solim (the Seraglio at Ispahan)</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Usbek places all power in Solim, to enforce his vengeance. He indicates that he is Solim’s “master”, meaning that Solim and the aforementioned Soliman are not in fact the same person, and promises rewards for restoring order to the seraglio. Meanwhile, Solim is effectively promoted to Chief Eunuch.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="792"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Letter 154</span></strong><span data-dcnode-id="793" instrument_node="">: Usbek (Paris) to all of his wives (the Seraglio at Ispahan)</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Usbek informs his wives that Solim is now the Chief Eunuch, and will punish them and enforce discipline.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="784"><strong data-dcnode-id="786"><span data-dcnode-id="787" instrument_node=""> Letter 155</span></strong><span data-dcnode-id="785" instrument_node="">: Usbek (Paris) to Nessir (Ispahan)</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Usbek is whining about how he’s living in an offensive, barbarous country far away from everything in which he is interested. Clearly science has lost its appeal. He is depressed because of the events occurring in the seraglio. He cannot endure exile any longer. He claims to have asked Rica to return “a thousand times”, but Rica refuses and somehow keeps the older man in Paris. He proposes to return to Persia, even though in the process he might “hand his head to his enemies”. This indicates that whatever crime Usbek may have committed is severe enough to still be punishable by death even nine years later, and that the apparent favor of the Persian king is not enough security to protect him should he return.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Usbek is also worried about exactly what he will do, or what he can do, if he has to personally order punishments. While Usbek remains in Paris he can order dire punishments through his eunuchs and pretend to be personally innocent of the grief they cause. If he is personally present, he will be too sad and emotional to actually enforce the level of rigor he desires. No matter how welcoming his wives are, he will still have his suspicions and his jealousy. He believes that slaves, who he considers to be incapable of love, are better off than he is, because he is miserable. The modern reader will feel very little sympathy for him at this point.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="773"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Letter 156</span></strong><span data-dcnode-id="774" instrument_node="">: Roxana (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Roxana is furious at the outrageous activity of a “tiger”, Solim, who is raging and punishing at will. He has tortured two white eunuchs, sold off the women’s slaves, and beaten both Zachi and Zélis. Each of the women is confined to her personal apartment, forced to wear a veil even while alone, and prohibited to speak or write. The only thing they are allowed to do is weep. Their sleep is being interrupted constantly by new eunuchs who take turns waking the women up with suspicions that may or may not be real. Roxana says that her troubles will end with her life, and that she will not give Usbek time to put an end to the physical, verbal, or emotional abuse ordered on his behalf. She intends to take her own life.</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="765"><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node=""> Letter 157</span></strong><span data-dcnode-id="766" instrument_node="">: Zachi (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Zachi is complaining because Solim beat her in a humiliating way, asserting that he was following Usbek’s orders. Although she’s maintained a constant love for Usbek, dedicating every moment to him, she cannot endure the humiliation. She begs Usbek to return to either love her or allow her to die at his feet. This suggest that Zachi also plans to take her own life.</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="757"><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node=""> Letter 158</span></strong><span data-dcnode-id="758" instrument_node="">: Zélis (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Zélis has also been beaten, and wonders why Usbek thinks he has any grounds to condemn her, having been a thousand leagues away for years. She understands that Solim’s barbarous treatment of her is on Usbek’s orders, and that Usbek is solely to blame for what is being done to her. She asserts that she no longer loves him, and that she has lost respect for him. His soul, she says, is debased and he has become cruel.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="749"><strong data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Letter 159</span></strong><span data-dcnode-id="750" instrument_node="">: Solim (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Solim has bad news: despite the beatings and the constant surveillance, and perhaps because she herself is not being watched since she has managed to deflect suspicion onto the other women, Roxana managed to sneak a lover into the seraglio. The eunuchs surprised him. He stabbed Solim and made a long defense, wounding several of the other eunuchs who surrounded him until he himself was killed. He plans to punish the women immediately.</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="741"><strong data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Letter 160</span></strong><span data-dcnode-id="742" instrument_node="">: Solim (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Solim has decided he is going to punish, and he’s thrilled at the idea. He’s actually going to shed blood. This suggests that he may kill Roxana or at least severely harm her.</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="733"><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node=""> Letter 161</span></strong><span data-dcnode-id="734" instrument_node="">: Roxana (the Seraglio at Ispahan) to Usbek (Paris)</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Roxana has taken poison and will die presently, but before she leaves she sends off a letter to Usbek. She reveals that although she hates Usbek and has always hated him, she figured out how to transform his seraglio into a place that still had some comfort and love for her. She has no reason to live, now that the man she loved is dead, and oh, by the way, she has also murdered the eunuchs. So Solim won’t get to spill any blood after all—he is dead because Roxana found a way to kill him before he attacked her—and the other wives, if they are still alive, are free to leave or to do whatever else they please.</span></p><span data-dcnode-id="729" instrument_node="">
</span></article><span data-dcnode-id="727" instrument_node="">
