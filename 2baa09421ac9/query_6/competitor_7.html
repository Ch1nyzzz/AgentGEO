</span><span data-dcnode-id="1670" id="freeTextContainer13823322612181826134"><br data-dcnode-id="1685"><br data-dcnode-id="1684"><span data-dcnode-id="1683" instrument_node="">WORLD LITERATURE CLASSICS FROM MUGHAL DYNASTY INDIA---GHALIB--MASTER OF THE LOVE GHAZAL, SAUDA--MASTER SATIRIST, KABIR--POET SAINT OF RELIGIOUS TOLERANCE, MIR TAQI MIR, BANARASIDAS, BABUR, JAHANGIR AND AKBAR THE GREAT---FROM THE WORLD LITERATURE FORUM RECOMMENDED CLASSICS AND MASTERPIECES SERIES VIA GOODREADS—-ROBERT SHEPPARD, EDITOR-IN-CHIEF</span><br data-dcnode-id="1682"><br data-dcnode-id="1681"><br data-dcnode-id="1680"><br data-dcnode-id="1679"><br data-dcnode-id="1678"><br data-dcnode-id="1677"><span data-dcnode-id="1676" instrument_node="">THE MUGHAL EMPIRE IN INDIA (1526-1857)</span><br data-dcnode-id="1675"><br data-dcnode-id="1674"><br data-dcnode-id="1673"><br data-dcnode-id="1672"><span data-dcnode-id="1671" instrument_node="">In the 1500's the Mughals under their leader Babur made their way into India, expanding under Akbar the Great, and bui</span></span><span data-dcnode-id="1669" instrument_node="">
</span><span data-dcnode-id="1425" id="freeText13823322612181826134" style="display:none"><br data-dcnode-id="1668"><br data-dcnode-id="1667"><span data-dcnode-id="1666" instrument_node="">WORLD LITERATURE CLASSICS FROM MUGHAL DYNASTY INDIA---GHALIB--MASTER OF THE LOVE GHAZAL, SAUDA--MASTER SATIRIST, KABIR--POET SAINT OF RELIGIOUS TOLERANCE, MIR TAQI MIR, BANARASIDAS, BABUR, JAHANGIR AND AKBAR THE GREAT---FROM THE WORLD LITERATURE FORUM RECOMMENDED CLASSICS AND MASTERPIECES SERIES VIA GOODREADS—-ROBERT SHEPPARD, EDITOR-IN-CHIEF</span><br data-dcnode-id="1665"><br data-dcnode-id="1664"><br data-dcnode-id="1663"><br data-dcnode-id="1662"><br data-dcnode-id="1661"><br data-dcnode-id="1660"><span data-dcnode-id="1659" instrument_node="">THE MUGHAL EMPIRE IN INDIA (1526-1857)</span><br data-dcnode-id="1658"><br data-dcnode-id="1657"><br data-dcnode-id="1656"><br data-dcnode-id="1655"><span data-dcnode-id="1654" instrument_node="">In the 1500's the Mughals under their leader Babur made their way into India, expanding under Akbar the Great, and built one of the most remarkable empires in history before being suceeded by the rule of the British Empire. They extended their sway over the greater part of South Asia bringing an era of peace and stability that allowed the economy and society to flourish. The Mughal Empire ruled over 150 million people at a time when Britain had fewer than 10 million, France less than 20 and even the comparable Ottoman Empire less than 30 million. They stimulated a wide range of cultural interactions and transformations that were to enrich the Indian world in remarkable ways,, from miniature painting, to calligraphy and the growth of the Urdu language and script to the splendor of the Taj Mahal, one of the wonders of world architecture. Equally important if less well appreciated in the West is the magnificent literature the Mughals produced and patronized, first in the imperial language of the court, Persian, and from the early eighteenth century, in Urdu, a north Indian language closely related to Hindi but using the Mughal Persian script and adding a large vocabulary of loan-words and cultural allusions, genres and aesthetics from Persian and Muslim Arabic. Writers of global significance from this period include such renown figues as Ghalib, master of the ghazal love poem, Sauda the great prose satirist, the Jain writer Banarasidas, Mir Taqi Mir, the great poet of religious tolerance Kabir, and even the journals and lagacies of the Mughal Emperors themselves, such as Babur, Jahangir and Akbar the Great. </span><br data-dcnode-id="1653"><br data-dcnode-id="1652"><span data-dcnode-id="1651" instrument_node="">Though geographically the sub-continent of India is somewhat isolated from its Eurasian surroundings by the barrier of the Himalayas, it has nonetheless remained a significant "crossroads of the world" in which movements of peoples and cultures have brought great cross-fertilization from the time of the arrival of the Vedic Aryans onward to include the movements of Greeks and Persians, Kushans and Scythians, Buddhist monks from China and Japan, Mongols and Timurids, Muslims, the Portugese, French and the global British Empire. As such it has also been renown as a cradle of spirituality, the origin of Hindu, Buddhist, Jain, Sikh and other religions, as well as bearing the influence of other religious traditions such as Christianity and Islam. </span><br data-dcnode-id="1650"><br data-dcnode-id="1649"><span data-dcnode-id="1648" instrument_node="">The Moghal Empire was one of the three Muslim empires which arose following the Mongol destruction of the Abbasid Caliphate in the 13th century, which were often referred to as the "Gunpowder Empires" as part of their power and consolidation arose from the use of firearms and cannon, as exemplified in the Ottoman Janissary Corps. Thus the Ottoman Empire (1300-1922), the Safavid Persian Empire (1501-1736)which institutionalized the Shi'a religion in Iran, and the Mughal Empire (1526-1857) bridged the era from the fall of the Caliphate to the Mongols to the rise of global Western Imperialism. At the early stages they dwarfed the European states and their relative demise was anything but a foregone conclusion, the Ottomans almost taking Vienna; if America had not been discovered global history might have turned out quite otherwise.</span><br data-dcnode-id="1647"><br data-dcnode-id="1646"><span data-dcnode-id="1645" instrument_node="">As the West ascended to supremacy reinforced by the Renaissance, Reformation, Scientific Revolution and Industrial Revolution their empires gradually dismembered and absorbed their relatively stagnant Islamic rivals, particularly the modernizing Russian Empire (1547-1917) to the north and the economically, scientifically and culturally dynamic British Empire (1497-1970), which was destined to supplant all three as the largest and most powerful empire in all of world history, ruling over more than one-fourth of all global land area and human population. Nonetheless, for centuries the three Islamic empires constructively competed and also learned from each other cultually, sharing the Arabic language,Islamic religion and sharia law in the religious domain, as well as the Persian language for administration, diplomacy and culture in the royal courts, forming an impressive era of Islamic civilization. </span><br data-dcnode-id="1644"><br data-dcnode-id="1643"><br data-dcnode-id="1642"><br data-dcnode-id="1641"><span data-dcnode-id="1640" instrument_node="">The mission of the World Literature Forum is to introduce to readers coming from their own national literary traditions such as the West, to the great writers of all the world's literary traditions whose contribution and influence beyond their own borders have had an influence on the formation of our emerging World Literature in our age of globalization, unprecedented travel and interaction of cultures including the instantaneous global communications of the Age of the Internet and the cross-border e-Book. The contributions of India and the Muslim world including those of the Mughal Dynasty in India form a rich part of this common heritage of mankind. </span><br data-dcnode-id="1639"><br data-dcnode-id="1638"><br data-dcnode-id="1637"><br data-dcnode-id="1636"><br data-dcnode-id="1635"><span data-dcnode-id="1634" instrument_node="">KABIR, RENOWN POET OF RELIGIOUS TOLERANCE AND SPIRITUALITY</span><br data-dcnode-id="1633"><br data-dcnode-id="1632"><br data-dcnode-id="1631"><br data-dcnode-id="1630"><span data-dcnode-id="1629" instrument_node="">An early figure in the mixing of the Vedic and Muslim traditions was that of the poet Kabir (1440-1518) born as an illegitimate child of a Brahmin mother in Varanasi who was raised by a Muslim family, then became a desciple of the Vaisnava Saint Ramananda. As such he turned away from the intolerance of sectarian religion on all sides and strove for the unification of all spiritual traditions in an ecumenical mysticism, Muslim, Sufi, Hindu, Sikh and Buddhist, seeking after a simple "oneness" with God in all manifestations. He was also a staunch champion of the poor and oppressed and a devoted opponent of social injustice in all forms. Persecuted at times by all sides in the collision of faiths, Kabir's legend describes his victory in trials by a Sultan, a Brahmin, a Qazi, a merchant and god, and he became the subject of folk legends that still inspire tolerance in sectarian strife between Muslims and Hindus down to the present. </span><br data-dcnode-id="1628"><br data-dcnode-id="1627"><span data-dcnode-id="1626" instrument_node="">His greatest work is the "Bijak" (the "Seedling"), an idea of the fundamental oneness of man, and the oneness of man and God. He often advocated leaving aside the Qur'an and Vedas and simply following the Sahaja path, or the Simple/Natural Way to Oneness in God. He believed in the Vedantic concept of atman, but unlike earlier orthodox Vedantins, he spurned the Hindu societal caste system and murti-pujan (idol worship), showing clear belief in both bhakti and Sufi ideas. The major part of Kabir's work was collected as a bhagat by the fifth Sikh guru, Guru Arjan Dev, and incorporated into the Sikh scripture, "Guru Granth Sahib." An example of his poetry showing openess and tolerance is "Saints, I See the World is Mad:"</span><br data-dcnode-id="1625"><br data-dcnode-id="1624"><br data-dcnode-id="1623"><br data-dcnode-id="1622"><br data-dcnode-id="1621"><span data-dcnode-id="1620" instrument_node="">Saints, I See the World Is Mad</span><br data-dcnode-id="1619"><br data-dcnode-id="1618"><br data-dcnode-id="1617"><span data-dcnode-id="1616" instrument_node="">Saints, I see the world is mad.</span><br data-dcnode-id="1615"><span data-dcnode-id="1614" instrument_node="">If I tell the truth they rush to beat me,</span><br data-dcnode-id="1613"><span data-dcnode-id="1612" instrument_node="">If I lie they trust me.</span><br data-dcnode-id="1611"><span data-dcnode-id="1610" instrument_node="">I've seen the pious Hindus, rule-followers,</span><br data-dcnode-id="1609"><span data-dcnode-id="1608" instrument_node="">early morning bath-takers---</span><br data-dcnode-id="1607"><span data-dcnode-id="1606" instrument_node="">killing souls, they worship rocks.</span><br data-dcnode-id="1605"><span data-dcnode-id="1604" instrument_node="">They know nothing.</span><br data-dcnode-id="1603"><span data-dcnode-id="1602" instrument_node="">I've seen plenty of Muslim teachers, holy men</span><br data-dcnode-id="1601"><span data-dcnode-id="1600" instrument_node="">reading their holy books</span><br data-dcnode-id="1599"><span data-dcnode-id="1598" instrument_node="">and teaching their pupils techniques.</span><br data-dcnode-id="1597"><span data-dcnode-id="1596" instrument_node="">They know just as much.</span><br data-dcnode-id="1595"><span data-dcnode-id="1594" instrument_node="">And posturing yogis, hypocrites,</span><br data-dcnode-id="1593"><span data-dcnode-id="1592" instrument_node="">hearts crammed with pride,</span><br data-dcnode-id="1591"><span data-dcnode-id="1590" instrument_node="">praying to brass, to stones, reeling</span><br data-dcnode-id="1589"><span data-dcnode-id="1588" instrument_node="">with pride in their pilgrimage,</span><br data-dcnode-id="1587"><span data-dcnode-id="1586" instrument_node="">fixing their caps and their prayer-beads,</span><br data-dcnode-id="1585"><span data-dcnode-id="1584" instrument_node="">painting their brow-marks and arm-marks,</span><br data-dcnode-id="1583"><span data-dcnode-id="1582" instrument_node="">braying their hymns and their couplets,</span><br data-dcnode-id="1581"><span data-dcnode-id="1580" instrument_node="">reeling. The never heard of soul.</span><br data-dcnode-id="1579"><span data-dcnode-id="1578" instrument_node="">The Hindu says Ram is the Beloved,</span><br data-dcnode-id="1577"><span data-dcnode-id="1576" instrument_node="">The Turk says Rahim.</span><br data-dcnode-id="1575"><span data-dcnode-id="1574" instrument_node="">Then they kill each other.</span><br data-dcnode-id="1573"><span data-dcnode-id="1572" instrument_node="">No one knows the secret.</span><br data-dcnode-id="1571"><span data-dcnode-id="1570" instrument_node="">They buzz their mantras from house to house,</span><br data-dcnode-id="1569"><span data-dcnode-id="1568" instrument_node="">puffed with pride.</span><br data-dcnode-id="1567"><span data-dcnode-id="1566" instrument_node="">The pupils drown along with their gurus.</span><br data-dcnode-id="1565"><span data-dcnode-id="1564" instrument_node="">In the end they're sorry.</span><br data-dcnode-id="1563"><span data-dcnode-id="1562" instrument_node="">Kabir says, listen saints:</span><br data-dcnode-id="1561"><span data-dcnode-id="1560" instrument_node="">They're all deluded!</span><br data-dcnode-id="1559"><span data-dcnode-id="1558" instrument_node="">Whatever I say, nobody gets it.</span><br data-dcnode-id="1557"><span data-dcnode-id="1556" instrument_node="">It's too simple.</span><br data-dcnode-id="1555"><br data-dcnode-id="1554"><br data-dcnode-id="1553"><br data-dcnode-id="1552"><br data-dcnode-id="1551"><span data-dcnode-id="1550" instrument_node="">THE MUGHAL EMPERORS AS AUTHORS---BABUR, AKBAR THE GREAT AND JAHANGIR </span><br data-dcnode-id="1549"><br data-dcnode-id="1548"><br data-dcnode-id="1547"><br data-dcnode-id="1546"><span data-dcnode-id="1545" instrument_node="">BABUR</span><br data-dcnode-id="1544"><br data-dcnode-id="1543"><br data-dcnode-id="1542"><span data-dcnode-id="1541" instrument_node="">The first Moghul Emperor, Babur (1483-1530) laid the foundations of the later empire by leading his army from the steppes and highlands of Samarkand and Afghanistan down into the plains of India. In addition to being a conqueror he was also a keen writer, and his autobiography, the "Baburnama" or "Memoirs of Babur" has been compared to the "Meditations" of Marcus Aurelius and the "Confessions" of Augustine and Rousseau, for its uncommon candor in the presentation of self. It is sometimes regarded as the first autobiography in the entire Muslim world, establishing the genre. His personality emerges from such small details as his correcting the spelling errors in the letters of his son and successor as Emperor, Humayun, and his catalogue of his likes and dislikes. He liked gardens with flowing water; he disliked India. Having conquered it, he writes of India: "It is a strange country. Compared to ours, it is another world, this unpleasant and inharmonious India." He did not stay long after the conquest but returned to the highlands; but his sons and successors did, making the Mughal Dynasty. </span><br data-dcnode-id="1540"><br data-dcnode-id="1539"><br data-dcnode-id="1538"><br data-dcnode-id="1537"><span data-dcnode-id="1536" instrument_node="">AKBAR THE GREAT---EMPEROR OF RELIGIOUS TOLERANCE AND REASON</span><br data-dcnode-id="1535"><br data-dcnode-id="1534"><br data-dcnode-id="1533"><span data-dcnode-id="1532" instrument_node="">Akbar the Great (1542-16050 was great in more ways than one, being not only a conquering general who extended the Mughal Empire southwards to take in nearly all of India, but also like Kabir a seeker after tolerance, peaceful coexistence and unity within the Empire across the divide of Hindu-Muslim sectarianism. He abolished the Muslim tax on other religious communities and encouraged intermarriage between Muslim and Hindu princes and princesses and royal courts. He was fond of literature, and created a library of over 24,000 volumes written in Sanskrit, Hindustani, Persian, Greek, Latin, Arabic and Kashmiri, staffed by many scholars, translators, artists, calligraphers, scribes, bookbinders and readers. Holy men of many faiths, poets, architects and artisans adorned his court from all over the world for study and discussion. He encouraged open and free debate and intercourse at the royal court between all the religions, even including atheists, first shifting his personal belief from orthodox Islam to the mystic Muslim interpretations of the Sufis, then reacting against the too prominent bigotry within his own Muslim faith to found a short-lived unsuccessful rationalist-syncretistic religion to unite all religions within India, termed Din-i-Ilahi, or Universal Peace. Needless to say, such efforts at religious tolerance and rationalism outraged fundamentalists within his own Muslim and other faiths, and ultimately his efforts, like those of Akhnaton in Egypt to found a more rationalist monotheism, were defeated by the reactionary clerics who after his death termed his policies heresy and returned to the traditions of orthodoxy and intolerance. </span><br data-dcnode-id="1531"><br data-dcnode-id="1530"><br data-dcnode-id="1529"><span data-dcnode-id="1528" instrument_node="">JAHANGIR</span><br data-dcnode-id="1527"><br data-dcnode-id="1526"><span data-dcnode-id="1525" instrument_node="">Jahangir, son of Akbar the Great and a Rajasthani Princess, was fluent in Hindi, though he composed his "Autobiography" in the court Persian of the royal family. While not so penetrating as that of Babur, it is strikingly modern in revealing his personality in modern dilemmas such as his struggle with substance abuse---addiction to wine and opium, his search for spirituality from both Hindu and Muslim sources, and his almost childlike fascination with the natural world, including a passion for exotic things such as American Turkeys, pineapples, and African zebras. </span><br data-dcnode-id="1524"><br data-dcnode-id="1523"><br data-dcnode-id="1522"><span data-dcnode-id="1521" instrument_node="">SAUDA----THE GREAT MUGHAL SATIRIST</span><br data-dcnode-id="1520"><br data-dcnode-id="1519"><br data-dcnode-id="1518"><span data-dcnode-id="1517" instrument_node="">Sauda is the penname of Mirza Muhammad Rafi (1713-1781) one of the greates prose writers, poets and satirists of the Urdu language. Urdu and Hindi, those peculiar twin languages of the Indian subcontinent are essentially the same language, yet divided into two by the usage of two different scripts for writing, Persian and Devangari, and the differing religions and cultures of their respective communities, being largely though not exclusively, Muslim and Hindu respectively. Urdu is also distinguished by the heavy influence of court Persian and of Arabic from the mosque. While Urdu literary culture was generally conservative, Sauda was anything but tradition-bound. With fierce independence of mind and an acid tongue, little around him escaped his wit and caustic laceration, including the Mughal Emperor himself. The Emperor fancied himself a good poet and often summoned literary men to hear him recite his works. Being thus called into the presence of the emperor, he remarked that his Royal Highness had composed a great many poems, asking him:</span><br data-dcnode-id="1516"><br data-dcnode-id="1515"><span data-dcnode-id="1514" instrument_node="">"How many poems do you compose a day?"</span><br data-dcnode-id="1513"><br data-dcnode-id="1512"><span data-dcnode-id="1511" instrument_node="">"Three or four couplets a day, if I am inspired......" answered the Emperor, then adding a boast, "........I can even compose four whole poems sitting in the bathroom!" </span><br data-dcnode-id="1510"><br data-dcnode-id="1509"><span data-dcnode-id="1508" instrument_node="">"They smell like it," replied Sauda.</span><br data-dcnode-id="1507"><br data-dcnode-id="1506"><br data-dcnode-id="1505"><br data-dcnode-id="1504"><br data-dcnode-id="1503"><span data-dcnode-id="1502" instrument_node="">Escerpt from Sauda's Satires---"How to Earn a Living in Hindustan"</span><br data-dcnode-id="1501"><br data-dcnode-id="1500"><br data-dcnode-id="1499"><span data-dcnode-id="1498" instrument_node="">"Better to keep silent than try to answer such a question, for even the tongues of angels cannot do justice to the answer. There are many professions which you could adopt, but let us see what difficulties will beset you in each of them these days. You could buy a horse and offer yourself in service in some noble's army. But never in this world will you see your pay, and you will rarely have both a sword and a shield by you, for you must pawn one or the other each day to buy fodder for your horse; and unless the moneylender is kind to you, you or your wife must go hungry, for you will not get enough to feed you both. You could minister to the needs of the faithful in a mosque, but you would find asses tethered there and men young and old sitting there idle and unwilling to be disturbed. Let the muezzin give the call to prayer and they will stop his mouth, for no one cares for Islam these days.....You could become a courtier of some great man, but your life would not be worth living. If he does not feel like sleeping at night, you too must wake with him, though you are ready to drop, and until he feels inclined to dine, you may not, though you are faint with hunger and your belly is rumbling. Or you could become his physician; but if you did, your life would be passed in constant apprehension, for should the Nabob sneeze, he will glare at you as though you ought to have given him a sword and buckler to keep off the cold wind. You will live through torture as you watch him feed. He will stuff himself with sweet melon and cream and then fish, and then cow's tongue, and with it all fancy breads of all kinds; and if at any stage he feels the slightest pain in his stomach, then you, ignorant fool are to blame, though you were Bu Ali Sina himself......Here there is nothing but the struggle to live; there, nothing but the tumult of the Judgment Day." </span><br data-dcnode-id="1497"><br data-dcnode-id="1496"><br data-dcnode-id="1495"><br data-dcnode-id="1494"><br data-dcnode-id="1493"><br data-dcnode-id="1492"><span data-dcnode-id="1491" instrument_node="">BANARASIDAS----JAIN MASTER OF AUTOBIOGRAPHY</span><br data-dcnode-id="1490"><br data-dcnode-id="1489"><br data-dcnode-id="1488"><span data-dcnode-id="1487" instrument_node="">Banarasidas was a merchant member of the Jain religious community in the mid-1600's who left behind in his "Half a Tale" one of the remarkable autobiographies of World Literature. It tells of his sorrow as a young man at the death of Emperor Akbar the Great in 1605, and the main occupations of his life, the quest for merchant success and the greater quest for spiritual fulfillment. It is not a mere succession of years, as the autobiography of Babur tends to be, but an inner dialogue of spiritual questioning and search. In Banarasidas, the writer conveys a more vivid sense of himself as self in his world than in the case of Jahangir. As a merchant, the archetypal "self made man," he explores the unique consciousness of such a process of "self-making." If the transition to Modernity turns on new forms of self-awareness, then Banarasidas begins this process in South Asia even as writers such as Montaigne began it in Europe. </span><br data-dcnode-id="1486"><br data-dcnode-id="1485"><br data-dcnode-id="1484"><span data-dcnode-id="1483" instrument_node="">MIR TAQI MIR &amp; GHALIB, MASTERS OF THE URDU GHAZAL AND LOVE POETRY</span><br data-dcnode-id="1482"><br data-dcnode-id="1481"><br data-dcnode-id="1480"><span data-dcnode-id="1479" instrument_node="">The Ghazal love poem, or "Conversation with the Beloved" is one of the great traditions in Urdu and Indian tradition, being sung at weddings and celebrations as a living tradition. Mir Muhammad Taqi Mir (1723-1810) along with Ghalib (1797-1869) were two of the grandmasters of the genre, living in the days of the final decline and dismemberment of the Mughal Empire and the rise of the British Raj. Mir's love poems became classics of the genre, enjoyed by both Hindus and Muslims for their supple grace and lyrical expressiveness. He also left behind an autobiography, written in Persian, which relates his obsessions, his private life with his father, an eccentric Sufi mystic, and the misery of public life in Dehli where the Emperor was reduced to an impotent figurehead hardly even in command of one city, his own capital. Ghalib was one of the greatest poets in two languages, Urdu and Persian, and was, like Byron, an aristocratic rebel, religious sceptic and outsider who was difficult for either his friends or enemies to understand or deal with. Also like Byron, Ghalib made himself a leading figure in his poems, assuming the stature of a kind of "Byronic Hero." Ghazals usually ended with some personal reference to the poet, but Ghalib built this tradition up to Byronic proportions, fashioning his persona into a witty, sophisticated and melancholy commentator on his own life and the crumbling and corrupt world of society and the Mughal court around him. Though he wrote for the Emperor and the court, Ghalib was never a sychophant, and like Sauda, did not hesitate to express his dislike for the Emperor's own poetry and the claims of Muslim orthodoxy. Interrogated by the British during the 1857 Mutiny, he was asked by the British commander: "Are you a Muslim?" He curtly replied: "Half a Muslim: I drink wine but I don't eat pork." Ghalib is now considered as the greatest poet of the Urdu ghazal of any period. </span><br data-dcnode-id="1478"><br data-dcnode-id="1477"><br data-dcnode-id="1476"><span data-dcnode-id="1475" instrument_node="">SPIRITUS MUNDI AND ISLAMIC LITERATURE</span><br data-dcnode-id="1474"><br data-dcnode-id="1473"><br data-dcnode-id="1472"><span data-dcnode-id="1471" instrument_node="">My own work, Spiritus Mundi the contemporary and futurist epic, is also influenced by Islamic and Sufi literary traditions. It features one major character, Mohammad ala Rushdie who is a Sufi novice in the Mevlevi order who is also a modern social activists in the Campaign for a United Nations Parliamentary Assembly for global democracy. He in the course of the novel is taken hostage by terrorists and meets the Supreme Leader of Iran, urging him to "Open the Gates of Ijtihad," or reinvigorate Islamic tradition with creative reasoning and openness rather than binding it to blind precedent and unthinking tradition--much in the tradition of Kabir and Akbar the Great. Another historical chapter, "Neptune's Fury" features the sojourn of Admiral Sir George Rose Sartorius in the Maldive Islands where he encounters the "Sultan of the Sea of Stories" and during which he must, like the Schehereqade of the One Thousand and One Nights, tell a story each day to avoid execution by the Sultan. </span><br data-dcnode-id="1470"><br data-dcnode-id="1469"><span data-dcnode-id="1468" instrument_node="">World Literature Forum invites you to check out the great writers of World Literature from the Mughal Age in India, and also the contemporary epic novel Spiritus Mundi, by Robert Sheppard. For a fuller discussion of the concept of World Literature you are invited to look into the extended discussion in the new book Spiritus Mundi, by Robert Sheppard, one of the principal themes of which is the emergence and evolution of World Literature:</span><br data-dcnode-id="1467"><br data-dcnode-id="1466"><br data-dcnode-id="1465"><span data-dcnode-id="1464" instrument_node="">For Discussions on World Literature and n Literary Criticism in Spiritus Mundi: </span><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//worldliteratureandliterarycrit/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1463" instrument_node="">http://worldliteratureandliterarycrit</span></a><span data-dcnode-id="1461" instrument_node="">...</span><br data-dcnode-id="1460"><br data-dcnode-id="1459"><br data-dcnode-id="1458"><span data-dcnode-id="1457" instrument_node="">Robert Sheppard</span><br data-dcnode-id="1456"><br data-dcnode-id="1455"><br data-dcnode-id="1454"><span data-dcnode-id="1453" instrument_node="">Editor-in-Chief</span><br data-dcnode-id="1452"><span data-dcnode-id="1451" instrument_node="">World Literature Forum</span><br data-dcnode-id="1450"><span data-dcnode-id="1449" instrument_node="">Author, Spiritus Mundi Novel</span><br data-dcnode-id="1448"><span data-dcnode-id="1447" instrument_node="">Author’s Blog: </span><a data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//robertalexandersheppard.wordpr/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1446" instrument_node="">http://robertalexandersheppard.wordpr</span></a><span data-dcnode-id="1444" instrument_node="">...</span><br data-dcnode-id="1443"><span data-dcnode-id="1442" instrument_node="">Spiritus Mundi on Goodreads: </span><br data-dcnode-id="1441"><a data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/17" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1440" instrument_node="">http://www.goodreads.com/book/show/17</span></a><span data-dcnode-id="1438" instrument_node="">...</span><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node="">Spiritus Mundi on Amazon, Book I: </span><a data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/dp/B00CIGJFGO" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1435" instrument_node="">http://www.amazon.com/dp/B00CIGJFGO</span></a><br data-dcnode-id="1433"><span data-dcnode-id="1432" instrument_node="">Spiritus Mundi, Book II: The Romance </span><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/dp/B00CGM8BZG" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1431" instrument_node="">http://www.amazon.com/dp/B00CGM8BZG</span></a><br data-dcnode-id="1429"><br data-dcnode-id="1428"><br data-dcnode-id="1427"><span data-dcnode-id="1426" instrument_node="">Copyright Robert Sheppard 2013 All Rights Reserved</span></span><span data-dcnode-id="1424" instrument_node="">

</span><span data-dcnode-id="1324" id="freeText11292234641083235919" style="display:none"><span data-dcnode-id="1343" instrument_node="">Boy this took a long time to finish, partly since I didn't have the motivation to finish this, being an abridged version and all. Well that's that I suppose. Without boring you further with my rambling, let’s get in to the actual review.</span><br data-dcnode-id="1342"><span data-dcnode-id="1341" instrument_node="">As mentioned in the synopsis, Baburnama is the autobiography of the emperor Babur, the founder of the Mughal Empire in India. The work is based on the journal that Babur diligently maintained throughout his life. One finds that the work to be concise, frank and to the point. It’s a miracle as to how he found the time to do this daily, considering the political conditions prevalent in Central Asia at that time. Central Asia was in flux at that time, with the land changing hands between the existing nobility almost every other day.( That modern India, due to our good neighbour and friend finds itself unable to access Central Asia via land routes, is rather sad, seeing as the cultural linkages both regions share stretch back to antiquity.) </span><br data-dcnode-id="1340"><span data-dcnode-id="1339" instrument_node="">But enough of that rant and back to the review. Not only does Babur highlight the prevalent political conditions of the region, but goes further beyond, describing the lay of the land, the climate and the people living there. Omitting his love for muskmelons would be criminal on my part, as he frequently reserves his highest praise for the aforementioned fruit. </span><br data-dcnode-id="1338"><span data-dcnode-id="1337" instrument_node="">He was a poet par excellence, fluent in several languages. The work only serves to cement his erudition in the reader's mind, with several wonderful poems showing his prowess. He was a loyal friend, a great master and a doting father. He was most certainly a party animal, proof of which is amply available and present throughout the autobiography. Having said that, it should not be forgotten that he was equally ruthless (being the descendant of Timur and Genghis Khan), frequently raising pyramids of human skulls to daunt and subjugate his enemies. He was orthodox in outlook, though realistic enough to keep it in check when realpolitik took precedence. To criticize him for these faults would be shortsighted, seeing as he was but a product of his times. </span><br data-dcnode-id="1336"><span data-dcnode-id="1335" instrument_node="">He was a capable strategist and tactician, employing artillery and Turkish tactics of using covered wagons, enabling him to establish an Empire in India. His description of battles is so marvelously written, that at times, the reader IS transported to the location being described. </span><br data-dcnode-id="1334"><span data-dcnode-id="1333" instrument_node="">Moving on to the parts which actually motivated me to pick up the work in the first place, ie his conquest of India. His curiosity for the land and its people is clearly visible. He talked and described the flora, fauna, geography and culture of the land. He did not hold a high opinion of the people at the start. Whether this changed with time is not known, as there is no mention of such a change in attitude, if it did happen. Yet, his entries towards the end of his life (or might be the translations) do highlight a softening of attitude towards the people, with increasing mention of Hindu nobles being involved in his campaigns. The introduction of artillery especially would also change the nature of warfare in India, allowing the Mughals to create one of the largest and arguably the richest Empire the world had seen.</span><br data-dcnode-id="1332"><span data-dcnode-id="1331" instrument_node="">While reading the works, my mind was frequently drawn to Machiavelli's Prince, a work that I read back in 2016. The qualities that Machiavelli's so highly regarded as important for a ruler can be clearly seen being manifested in Babur. It should therefore come as no surprise as to what Babur achieved in his life. A tyrant and benevolent; Ruthless yet cultured; A fox and a lion; Babur was able to balance these seemingly opposite dispositions sans difficulties.</span><br data-dcnode-id="1330"><span data-dcnode-id="1329" instrument_node="">Readers paying close attention to the work will also notice the minimal to almost non-existent presence of women in his life. Baring his mother and grandmother, women played almost no role in his life. He did however speak highly of his grandmother and mother who drilled in the cultural and poetic capabilities that he was so proud of.</span><br data-dcnode-id="1328"><span data-dcnode-id="1327" instrument_node="">Another peeve of mine would be the fact that I was bombarded with similar sounding names, which was another reason why I did take so much time to finish the damn work. But then again, the guy had to administer a large empire. It’s impressive that he did remember the name of his retainers. Definitely a better memory than mine. </span><br data-dcnode-id="1326"><span data-dcnode-id="1325" instrument_node="">Last but not least, kudos to Dilip Haro, who does a great job with this translation, succeeding in bringing out the personality and mindset of Babur. I would recommend the book for both casual readers as well as students of history who look to deepen their knowledge on various topics of that time period.</span></span><span data-dcnode-id="1323" instrument_node="">

</span><span data-dcnode-id="1243" id="freeTextContainer13078055558856071477"><span data-dcnode-id="1247" instrument_node="">Part autobiography, part diary, The Babur Nama is the remarkable record of a remarkable man. Zahirud-din Muhammad Babur was a central Asian warlord/ruler who after taking Kabul went on to conquer much of northern India and found the Mughal dynasty in Delhi. </span><br data-dcnode-id="1246"><br data-dcnode-id="1245"><span data-dcnode-id="1244" instrument_node="">I found rating the book difficult at best. On the negative side it is very difficult reading particularly in this translation made by Annette Beveridge 100 years ago. Babur at times is massively boring, listing hundreds of individuals with si</span></span><span data-dcnode-id="1242" instrument_node="">
</span><span data-dcnode-id="1234" id="freeText13078055558856071477" style="display:none"><span data-dcnode-id="1241" instrument_node="">Part autobiography, part diary, The Babur Nama is the remarkable record of a remarkable man. Zahirud-din Muhammad Babur was a central Asian warlord/ruler who after taking Kabul went on to conquer much of northern India and found the Mughal dynasty in Delhi. </span><br data-dcnode-id="1240"><br data-dcnode-id="1239"><span data-dcnode-id="1238" instrument_node="">I found rating the book difficult at best. On the negative side it is very difficult reading particularly in this translation made by Annette Beveridge 100 years ago. Babur at times is massively boring, listing hundreds of individuals with similar names being awarded various forms of acknowledgment or reasons for enmity. For Beveridge's part, half the book consists of literally thousands of footnotes the vast majority of which deal with arcane points regarding the translation of words and phrases. These can mostly be ignored but here and there are notes important for understanding Babur's story.</span><br data-dcnode-id="1237"><br data-dcnode-id="1236"><span data-dcnode-id="1235" instrument_node="">On the other hand, the book deserves reading as it is a very rare work of Islamic literature and the first ever example of Asian autobiography. Moreover Babur is very frank in telling his story and compellingly shows himself a man of incredible contrasts. He was a warrior at a violent time in history and with perfect aplomb describes his followers (on his orders) beheading, flaying alive, and chopping to bits his enemies. (Maybe he is so sanguine about this because he seemed to have spent much of his life stoned on alcohol, opium, and a'jun.) But he also was an accomplished poet who enjoyed chess, gardening, music and good food. He was also clearly a naturalist as he describes in detail the flora and fauna of the countries he lived in. All in all, as difficult as this book is to read, it is a real eye opener.</span></span><span data-dcnode-id="1233" instrument_node="">
