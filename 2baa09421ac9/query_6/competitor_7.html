</span><span class="uitext reviewText" data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">those interested in the history of Afghanistan and/or India around early 1500s</span></span></div><span data-dcnode-id="4236" instrument_node="">
</span></div><span data-dcnode-id="4234" instrument_node="">
</span><div class="reviewText stacked" data-dcnode-id="4191"><span data-dcnode-id="4233" instrument_node="">
</span><span class="readable" data-dcnode-id="4193" id="reviewTextContainer1344816382"><span data-dcnode-id="4232" instrument_node="">
</span><span data-dcnode-id="4227" id="freeTextContainer17003606713130036609"><span data-dcnode-id="4231" instrument_node="">This was a good read, although if you really hate having loads and loads of names that seem too similar, this might be tough-going, especially at first - but if you stick to it, it becomes really enjoyable around the middle.</span><br data-dcnode-id="4230"><br data-dcnode-id="4229"><span data-dcnode-id="4228" instrument_node="">This is the memoirs of Babur (late 15th and early 16th century), founder of the Mughal Empire in India, and one of the first Islamic autobiographies existing. It shows both the good and the bad sides of him honestly: he was both cultured and a warlord. The story (which is not</span></span><span data-dcnode-id="4226" instrument_node="">
</span><span data-dcnode-id="4198" id="freeText17003606713130036609" style="display:none"><span data-dcnode-id="4225" instrument_node="">This was a good read, although if you really hate having loads and loads of names that seem too similar, this might be tough-going, especially at first - but if you stick to it, it becomes really enjoyable around the middle.</span><br data-dcnode-id="4224"><br data-dcnode-id="4223"><span data-dcnode-id="4222" instrument_node="">This is the memoirs of Babur (late 15th and early 16th century), founder of the Mughal Empire in India, and one of the first Islamic autobiographies existing. It shows both the good and the bad sides of him honestly: he was both cultured and a warlord. The story (which is not properly finished) starts when he was about 12, from Transoxiana to Samarkand to Kabul and endsing in India; but I think his heart remained in Afghansitan, which was given for his oldest son to govern, as Babur had to stay in India.</span><br data-dcnode-id="4221"><br data-dcnode-id="4220"><span data-dcnode-id="4219" instrument_node="">The introduction is by Salman Rushdie, and there are notes, maps and pictures (art, objects) included, plus some background explanation. The story is in three parts: 1) Fergana and Transoxiana (his beginnings which show youth and inexperience), 2) Kabul and 3) Hindustan (first desire of visit recorded in 1505, real visit 1519 (with some culture shock), then finally going there for good from 1525 on).</span><br data-dcnode-id="4218"><br data-dcnode-id="4217"><span data-dcnode-id="4216" instrument_node="">The text is 2/3 edited (which shows in that some measurements are shown in Indian kind when the text still remains outside it), last part is rough draft. There are gaps in the story, some last a few years, and the ends is unfinished though he doesn't die until some years later. There are some biographies of certain people, of different length (including his father's), and descriptions of towns and places (incl. Samarkand, Herat, Kabul and Hindustan).</span><br data-dcnode-id="4215"><br data-dcnode-id="4214"><span data-dcnode-id="4213" instrument_node="">There are plenty of sieges, battles, conquests, forays, plottings, rebellions. Battles including matchlock guns among weapons, and in India elephants. Descriptions of nature, of food (like grapes and melons), parties, hunting (incl. with falcons) and fishing. Some poetry is included, which was much valued. Nature shows in surprising deep snows, floods and monsoon rains. Two earthquakes are mentioned.</span><br data-dcnode-id="4212"><br data-dcnode-id="4211"><span data-dcnode-id="4210" instrument_node="">It's a slight surprise to notice that Babur isn't quite completely straight: his first real sexual desire and a crush is on a boy with almost the same name (although this person is never mentioned again, nor does Babur give any sign for further same-sex desire later).</span><br data-dcnode-id="4209"><br data-dcnode-id="4208"><span data-dcnode-id="4207" instrument_node="">His bloody side shows in often-mentioned beheadings, which sometimes are piled together. There are sometimes also severe punishments and executions, though always for a reason. Babur refrains from drink until midpoint, when also some light drug-taking starts appearing. He does give up drinking in 1527 with a pledge of temperance, and later expresses the difficulty of sticking to it at first.</span><br data-dcnode-id="4206"><br data-dcnode-id="4205"><span data-dcnode-id="4204" instrument_node="">He builds things: the controversail Babri Masjid mosque's building is not mentioned in the text - it's in one of the missing gaps - so the true circumstances of it being built cannot be told. Anyway, he builds a lot of things (gardens, buildings etc.) and establishes a post system between Kabul and Agra.</span><br data-dcnode-id="4203"><br data-dcnode-id="4202"><span data-dcnode-id="4201" instrument_node="">In the end, after all the facts and names and actions, which grow clearer to read and enjoy, as I've said, it is a really great read and interesting. So if you have any interest in reading this, I do recommend it. :)</span><br data-dcnode-id="4200"><br data-dcnode-id="4199"></span><span data-dcnode-id="4197" instrument_node="">

</span><i data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">In this History I have held firmly to it that the truth should be reached in every matter, and that every act should be recorded precisely as it occurred.</span></i><span data-dcnode-id="4096" instrument_node="">
</span></blockquote><span data-dcnode-id="4094" instrument_node=""> </span><br data-dcnode-id="4093"><span data-dcnode-id="4092" instrument_node="">I do not think I ever would have read this book, had it not been gifted to me last Christmas. It is quite a beautiful volume—hefty but compact, the pages thin but not fragile, the font and layout quite attractive—and yet, I still felt daunted by the prospect of reading an autobiography from a time and place that I knew so little about. It </span></span><span data-dcnode-id="4090" instrument_node="">
</span><span data-dcnode-id="4048" id="freeText5530363668551920530" style="display:none"><blockquote data-dcnode-id="4085"><span data-dcnode-id="4089" instrument_node="">
</span><i data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">In this History I have held firmly to it that the truth should be reached in every matter, and that every act should be recorded precisely as it occurred.</span></i><span data-dcnode-id="4086" instrument_node="">
</span></blockquote><span data-dcnode-id="4084" instrument_node=""> </span><br data-dcnode-id="4083"><span data-dcnode-id="4082" instrument_node="">I do not think I ever would have read this book, had it not been gifted to me last Christmas. It is quite a beautiful volume—hefty but compact, the pages thin but not fragile, the font and layout quite attractive—and yet, I still felt daunted by the prospect of reading an autobiography from a time and place that I knew so little about. It was a kind of miniature adventure.</span><br data-dcnode-id="4081"><br data-dcnode-id="4080"><span data-dcnode-id="4079" instrument_node="">By any standard, the </span><i data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">Baburnama</span></i><span data-dcnode-id="4076" instrument_node=""> is an extraordinary book. The memoirs of Babur, founder of the mighty Mughal Empire, the book covers his life (with notable lacunae) from his early years to a short time before his death. It was written in Chaghatai, an extinct Turkic language that was Babur’s mother tongue. This edition, by the way, was translated by Annette Beveridge, who was something of an extraordinary figure herself, having completed this translation at her English home for linguistic amusement. It was no easy task, as the mountains of footnotes—almost all comments on a particular Chaghatai word or phrase—attest.</span><br data-dcnode-id="4075"><span data-dcnode-id="4074" instrument_node=""> </span><br data-dcnode-id="4073"><span data-dcnode-id="4072" instrument_node="">Babur’s life was nothing if not eventful. The story begins in Central Asia where, at the tender age of 11, Babur first becomes a ruler. From this moment he is thrown into the thick of politics and war, conquering and losing territories, fleeing for his life, gathering forces again, and repeating the process. Eventually his changing fortunes force him southward, to India (or Hindustan, as he calls it), where he conquers vast territories in a series of massive battles, thus setting the groundwork for the Mughal Empire that would dominate for centuries to come.</span><br data-dcnode-id="4071"><span data-dcnode-id="4070" instrument_node=""> </span><br data-dcnode-id="4069"><span data-dcnode-id="4068" instrument_node="">And yet this thumbnail sketch does not really capture the experience of reading this book. For one, it reads a lot more like a diary than a polished autobiography, full of short entries of quite quotidian details. One senses that Babur wrote this either for himself or for a small circle, as he does not take many pains to explain who people are. In any case, there must be well over 200 individuals mentioned in this book, which can make for a pretty frustrating reading experience—especially when you are also unfamiliar with the geography of the region. (I do wish Beveridge’s footnotes added historical context rather than expanding upon linguistic puzzles.)</span><br data-dcnode-id="4067"><span data-dcnode-id="4066" instrument_node=""> </span><br data-dcnode-id="4065"><span data-dcnode-id="4064" instrument_node="">In most professional reviews I have read of this book, the writer dwells upon Babur’s virtues. There is, indeed, much to admire in the man. His prose is plain and unadorned, cutting straight to the point with no unnecessary flourish. Even more important, Babur is frank to quite a surprising extent. He admits, for example, that his first feelings of love were for a boy (even if he did not go after men, women did not seem to excite him all that much). He can be disarmingly sensitive; at one point he cries after a melon reminds him of his lost homeland. And he is consistently honest and fair-minded, neither magnifying his victories nor minimizing his defeats. </span><br data-dcnode-id="4063"><span data-dcnode-id="4062" instrument_node=""> </span><br data-dcnode-id="4061"><span data-dcnode-id="4060" instrument_node="">Babur also boasts many intellectual virtues. He was quite cultured and literate. This book is scattered with poems, many his own. Clearly, he cared deeply for the written word; near the end, he even takes the time to chastise his adult son for sending him a badly-written letter. And in the section on the flora and fauna of Hindustan, Babur reveals a penetrating eye for nature. He divines, for example, that the closest living relative of the rhinoceros is the horse—a brilliant deduction, considering how superficially different the two animals appear. He consistently dwells on his love for beautiful natural spots and well-made gardens.</span><br data-dcnode-id="4059"><span data-dcnode-id="4058" instrument_node=""> </span><br data-dcnode-id="4057"><span data-dcnode-id="4056" instrument_node="">So much can be said for Babur. But not enough is said—either in those reviews, or the introduction to this edition—of the river of violence that courses through these pages. True, Babur does not dwell on this violence; he usually mentions it as a passing detail to a more interesting story. But it is never far off, and I always found it disturbing. Babur speaks quite casually about executing prisoners and, indeed, putting whole cities to the sword. Probably I should not be shocked by this. After all, Babur was one of history’s great conquerors; and it is obvious from his own narrative that he lived his entire life under threat of violence.</span><br data-dcnode-id="4055"><span data-dcnode-id="4054" instrument_node=""> </span><br data-dcnode-id="4053"><span data-dcnode-id="4052" instrument_node="">Even so, I could not bring myself to admire the amateur naturalist knowing that he had, some time before, been strolling through the streets of a conquered city, stepping over the bodies of hundreds of massacred civilians. And I think that this considerably diminished my enjoyment of the book, as I found it far more difficult to savor the quieter, more human moments of the text. This, along with the preponderance of names and the diary-like brevity, made the book a bit of a slog at times. However, if you have any historical interest at all in this time or place, then the </span><i data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">Baburnama</span></i><span data-dcnode-id="4049" instrument_node=""> is obligatory. It is full of so much valuable detail that a historian could easily spend a decade on this book alone, parsing out all of the references, piecing together the wider story. And even if you are a complete amateur, like myself, this book is still quite an educational experience.</span></span><span data-dcnode-id="4047" instrument_node="">

</span><span data-dcnode-id="3954" id="freeTextContainer13344523808911073867"><span data-dcnode-id="3955" instrument_node="">According to translator/grand old man of Persian and various other languages Wheeler Thackston, "Babur's memoirs were the first--and until relatively recent times, the only--true autobiography in Islamic literature." No one knows why this Timurid/Chingisid heir from Andijan (in what is now Uzbekistan's portion of the Ferghana Valley) decided to write a candid history of his life. Modern, especially western readers, used to centuries of self-examination in print might not grasp the magnitude of w</span></span><span data-dcnode-id="3953" instrument_node="">
</span><span data-dcnode-id="3938" id="freeText13344523808911073867" style="display:none"><span data-dcnode-id="3952" instrument_node="">According to translator/grand old man of Persian and various other languages Wheeler Thackston, "Babur's memoirs were the first--and until relatively recent times, the only--true autobiography in Islamic literature." No one knows why this Timurid/Chingisid heir from Andijan (in what is now Uzbekistan's portion of the Ferghana Valley) decided to write a candid history of his life. Modern, especially western readers, used to centuries of self-examination in print might not grasp the magnitude of what Babur did. But, it is amazing to read the recollections of a 15th/16th century conqueror and see a frank and nearly complete rendering of the many facets of his life.</span><br data-dcnode-id="3951"><br data-dcnode-id="3950"><span data-dcnode-id="3949" instrument_node="">Babur relates how he was driven out of Ferghana by the Uzbeks and his squabbling relatives, his conquest and loss of Samarqand, his flight to Afghanistan and conquest of Kabul and Kandahar—after which he assumed the title of Padishah—his forays into Hindustan, his conquest of the Sultanate of Delhi and other Hindustani territories, and his consolidation of these holdings. That story is known to the history books, and can actually be tedious reading as Babur constantly drops names—names of towns, villages, warriors, Begs, Rajas, Khans, relatives—until you're not certain if your still reading about the same place or individual as your were a few moments before. However, it is what he reveals about himself, his worldview, habits, attitudes toward religion, bravery, marriage, penmanship, war, etc. that makes the Baburnama worth reading.</span><br data-dcnode-id="3948"><br data-dcnode-id="3947"><span data-dcnode-id="3946" instrument_node="">Babur emerges from his memoirs as a real person, not a two-dimensional fictional character. He's a collection of contradictions. He's a pious Muslim, but loves wine. In fact he spends a lot of time describing wine parties—the beautiful garden or river raft they took place on—and the antics of those who attended. Yet he also recounts how he forswore alcohol in later years—only to regret it. In one interesting anecdote on poetry, another of his favorite topics, Babur notes that he and some drinking buddies had made some vulgar/risque verse while inflamed with wine. He then notes that he truly regrets the incident and declares that poetry should be above such crude behavior. Of course, even after swearing off demon-alcohol, Babur still regularly enjoyed the narcotic ma'jun (whatever that is) discoursing on how stoned it made him and how beautiful it made the pomegranate/other trees in one of his many gardens look. He also tells the tale of how he had to take opium to relieve the pain from an abcess...that, and that the beauty of the moonlight induced him to (in another apparent contradiction, Babur regularly lambasts the widespread pederasty of Central Asia, but then cryptically notes his affection for a certain young man). </span><br data-dcnode-id="3945"><br data-dcnode-id="3944"><span data-dcnode-id="3943" instrument_node="">Babur comes off as a cultured Timurid, constantly laying out gardens, composing verse, chastising his grown son and heir for his poor penmanship and letter writing skills, decribing animals, fruits and flowers. Yet, he also tells gory tales of violence, where rebel villages are decimated and conquered cities are marked with skull pyramids (something more typical of his forefather Amir Timur). In telling the fate of those who plotted to assassinate him, the Padishah seems to relish in the gruesomeness of their demise—I believe someone was flayed alive, while another was trod on by an elephant. Of course, this killing was done under his authority as an heir to the Timurid dynasty, and given his rigid attention to proper decorum regarding the ruling hierarchy—the clothes each rank should wear, how they should genuflect/otherwise show respect to betters, what sort of gifts the lesser should bring to the greater—it should not seem a surprise that he never considers his bloodshed excessive or criminal. To expect him to do so would be to anachronistically impose 21st century values on a 15th/16th century man.</span><br data-dcnode-id="3942"><span data-dcnode-id="3941" instrument_node=""> </span><br data-dcnode-id="3940"><br data-dcnode-id="3939"></span><span data-dcnode-id="3937" instrument_node="">

</span><span data-dcnode-id="3771" id="freeText17619948918788688532" style="display:none"><span data-dcnode-id="3772" instrument_node="">The Baburnama isn't something you read from beginning to end. Rather, it's a book you dip into at random, slowly building up a patchwork view of life in what is today Afghanistan, Pakistan and India, as seen through the eyes of the first Mughal emperor, Babur (1483-1530). Now you read about Babur's impressions of India (he hates it, apart from the gold, and mangoes); now about his private life (his mother has to force him to visit his wife, but he has no hesitation in declaring his love for a dashing Afghan boy). Most of all you read about war, and the battles between various clans, tribes and empires in central and southern Asia. A situation that hasn't changed much in 500 years.</span></span><span data-dcnode-id="3770" instrument_node="">

</span><span data-dcnode-id="3675" id="freeTextContainer10738965898950098692"><b data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node=""> In the month of Ramadan in the year 899 [June 1494], in the province of Fergana, in my 12th year, I became king </span></b><span data-dcnode-id="3679" instrument_node="">.</span><br data-dcnode-id="3678"><br data-dcnode-id="3677"><span data-dcnode-id="3676" instrument_node="">Zaheer-ud-Din Muhammad Babur, the first Mughal Emperor, who built this great dynasty to rule for 300 years in Hindustan. Baburnama, essentially known as Tuzk-i-Baburi, is most probably considered the first ever Autobiography to be written by a Muslim Emperor. His diaries explores what it was like to live life in 16th century central Asia; it captures who Babur was in real life, what </span></span><span data-dcnode-id="3674" instrument_node="">
</span><span data-dcnode-id="3659" id="freeText10738965898950098692" style="display:none"><b data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node=""> In the month of Ramadan in the year 899 [June 1494], in the province of Fergana, in my 12th year, I became king </span></b><span data-dcnode-id="3671" instrument_node="">.</span><br data-dcnode-id="3670"><br data-dcnode-id="3669"><span data-dcnode-id="3668" instrument_node="">Zaheer-ud-Din Muhammad Babur, the first Mughal Emperor, who built this great dynasty to rule for 300 years in Hindustan. Baburnama, essentially known as Tuzk-i-Baburi, is most probably considered the first ever Autobiography to be written by a Muslim Emperor. His diaries explores what it was like to live life in 16th century central Asia; it captures who Babur was in real life, what were his aims and objectives, where did he come from, how much further he wanted to go, how his senses were sharpened by his amazing ancestry and background (His father came from Amir Timur's son Miran Shah's line, and his mother from Genghis Khan), and his ability to fluently speak Turk and Persian. This book captures how horribly violent life was in Babur's era, how he fought wars with armies much in number from his mere thousands. His narrative is introspective, a look at his own life, his shortcomings, his downfalls, his triumphs and tragedies. He wasn't just ferocious as a warrior, Babur's humbleness is touching, his sensitivity towards some of the most simplest of things, his love and care for the women of his family, and his sense of awe and appreciation of beauty in the world. </span><br data-dcnode-id="3667"><span data-dcnode-id="3666" instrument_node="">The last part of Baburnama gets more melancholic. Babur is a sole ruler of Hindustan now, a great Sultanat; but it's cities are unpleasant for Babur. A melon sent from Kabul made him weep at the thought of all that he had lost: the cities of Kabul and Samarkand, and his youth. His love for Kabul is reminiscent throughout the book, where he firstly established his rule, all his children were born there. </span><br data-dcnode-id="3665"><span data-dcnode-id="3664" instrument_node="">This book is a treasure and a source of immense nostalgia for anyone who's interested in knowing more about the original Mughal – Babur. This translation was amazing because it had a lot of explanations, pictures and marginal notes to help understand better, as it gets tricky at some places, with all the names and new people Babur keeps mentioning.</span><br data-dcnode-id="3663"><span data-dcnode-id="3662" instrument_node="">To encounter the private thoughts of a great Emperor like Babur is a unique experience, and I am so delving into it, right now. My nostalgia for the original Mughals is unending for some unknown reason. </span><br data-dcnode-id="3661"><span data-dcnode-id="3660" instrument_node="">Ps: His description of the animals and fruits of Hindustan is just mouth-watering.</span></span><span data-dcnode-id="3658" instrument_node="">

</span><span data-dcnode-id="3465" id="freeTextContainer4756442372661461440"><span data-dcnode-id="3466" instrument_node="">Long before Shah Jahan built the Taj Mahal for his beloved, there was a Great Moghul who began it all: Babur, a descendant of both Genghis Khan and Tamerlane who first established Mughal rule over India. His claim to fame rests on three things: the story of his death, the controversy over the mosque that he built, and the Baburnama, the first and only autobiography in Islamic literature until the 19th century. It is a vast, complex narrative of an extraordinarily eventful life, full of battles a</span></span><span data-dcnode-id="3464" instrument_node="">
</span><span data-dcnode-id="3440" id="freeText4756442372661461440" style="display:none"><span data-dcnode-id="3463" instrument_node="">Long before Shah Jahan built the Taj Mahal for his beloved, there was a Great Moghul who began it all: Babur, a descendant of both Genghis Khan and Tamerlane who first established Mughal rule over India. His claim to fame rests on three things: the story of his death, the controversy over the mosque that he built, and the Baburnama, the first and only autobiography in Islamic literature until the 19th century. It is a vast, complex narrative of an extraordinarily eventful life, full of battles and conquests, as befit his status as a Timurid prince in search of a realm, but also of moonlit drinking parties filled with poetry and music. The first Mughal emperor is both a sensitive man of culture deeply versed in Persian classical literature and a ruthless Ghazi (‘Slayer of the Infidels’) who reveled in erecting towers of skulls from the severed heads of his enemies. He sees no contradiction whatsoever between these different aspects of his personality, and is disarmingly frank, even at times confessional, about his weaknesses, such as his fondness for wine and the narcotic ma’jun, which he often indulged in between bouts of hunting and military expeditions. </span><br data-dcnode-id="3462"><br data-dcnode-id="3461"><span data-dcnode-id="3460" instrument_node="">Born as a minor prince in what is now Uzbekistan, Babur is a scion of the Timurids, a dynasty established by Tamerlane, which had ruled over much of Central Asia since the 14th century. The Timurid princes were constantly engaged in territorial battles, and from his early teens, Babur had been embroiled in the complex, ever shifting intrigues between his blood relatives. More than once he had succeeded in holding and losing Samarkand, and on several occasions, desperately holding on to his life after being defeated by stronger rivals. Necessity turned him toward the north, to Afghanistan, which he conquered at the age of 23. Several years later, he made his first foray into Hindustan, a much larger and wealthier realm that he finally conquered more than two decades later. He famously loathed his new realm, complaining about its heat and dust, pining for his beloved Kabul, where he was eventually buried. A man of lively curiosity, he wrote about the flora and fauna of India, its landscapes and rivers, and of its native princes and their palaces and temples. He destroyed naked idols that offended his Muslim sensibility, and allegedly built a mosque in Ayodhya, which later became a bone of contention between Muslims and Hindu extremists (who believed that the mosque stood on the birthplace of Rama, an avatar of Vishnu).</span><br data-dcnode-id="3459"><br data-dcnode-id="3458"><span data-dcnode-id="3457" instrument_node="">He died at the age of 47, not long after conquering India. The following is Amitav Ghosh’s retelling of the legend of Babur’s death.</span><br data-dcnode-id="3456"><br data-dcnode-id="3455"><span data-dcnode-id="3454" instrument_node="">“Of the many stories told of Babur none is more wonderful than that of his death. In 1530 Humayun, Babur’s beloved eldest son and heir-apparent, was stricken by a fever. He was brought immediately to Babur’s court at Agra, but despite the best efforts of the royal physicians, his condition steadily worsened. Driven to despair, Babur consulted a man of religion who told him that the remedy "was to give in alms the most valuable thing one had and to seek cure from God."</span><br data-dcnode-id="3453"><br data-dcnode-id="3452"><span data-dcnode-id="3451" instrument_node="">Babur is said to have replied thus: "I am the most valuable thing that Humayun possesses; than me he has no better thing; I shall make myself a sacrifice for him. May God the Creator accept it." Greatly distressed, Babur’s courtiers and friends tried to explain that the sage had meant that he should give away money, or gold or a piece of property: Humayun possessed a priceless diamond, they said, which could be sold and the proceeds given to the poor...</span><br data-dcnode-id="3450"><br data-dcnode-id="3449"><span data-dcnode-id="3448" instrument_node="">Babur would not hear of it. "What value has worldly wealth?" Babur is quoted to have said. "And how can it be a redemption for Humayun? I myself shall be his sacrifice." He walked three times around Humayun’s bed, praying: "O God! If a life may be exchanged for a life, I who am Babur, I give my life and my being for a Humayun." A few minutes later, he cried: "We have borne it away, we have borne it away."</span><br data-dcnode-id="3447"><br data-dcnode-id="3446"><span data-dcnode-id="3445" instrument_node="">And sure enough, from that moment Babur began to sicken, while Humayun grew slowly well. Babur died near Agra on December 21, 1530. He left orders for his body to be buried in Kabul.”</span><br data-dcnode-id="3444"><br data-dcnode-id="3443"><span data-dcnode-id="3442" instrument_node="">Baburnama is a fascinating glimpse into the mind of a medieval warrior and emperor, especially for those with interest in Indian history, but parts of it is also a challenging read for the general reader. As E.M. Forster observed, the greatest difficulty in reading it is not caused by the language (which had been translated into modern, even colloquial English), but is caused by the seemingly relentless onslaught of unfamiliar names of people and places. </span><br data-dcnode-id="3441"></span><span data-dcnode-id="3439" instrument_node="">

</span><span data-dcnode-id="3321" id="freeText11585605393968153403" style="display:none"><span data-dcnode-id="3347" instrument_node="">Babur, founder of the Mughal Empire, is one of the most influential figures in medieval history. This journal reveals deep insights into his experiences, and his values. He could be brutal and forgiving. He could be poetic, and base. He could abstain from wine, and throw tremendous and wild celebrations. In short, his is an interesting life.</span><br data-dcnode-id="3346"><br data-dcnode-id="3345"><span data-dcnode-id="3344" instrument_node="">Within the journal itself, there are many revealing points. At various points, Babur can be quite poetic in his descriptions. Providing a quick biography of Abu Said Mirza, he writes, “He was very generous. He was affable, eloquent and sweet-spoken, and bold. Outdistancing all his warriors, he got to work with his own sword twice—at the Gate of Akhsi and at the Gate of Shahrukhiya. A mediocre archer, he was strong in the fist—not a man but fell to his blow. Due to his ambition, peace was exchanged often for war, friendliness for hostility.” (10) A lovelier description of an agitator I cannot conceive. </span><br data-dcnode-id="3343"><br data-dcnode-id="3342"><span data-dcnode-id="3341" instrument_node="">Babur also clearly valued poetry and language. He quotes extensively throughout his journal. A favorite quotation of mine comes when he describes the Samarkandis and their disposition after the transition from Sultan Ahmad Mirza to His Highness the Khwaja Ahrari:</span><br data-dcnode-id="3340"><span data-dcnode-id="3339" instrument_node="">“Beware the build-up of an inward wound,</span><br data-dcnode-id="3338"><span data-dcnode-id="3337" instrument_node="">For it will at last burst forth;</span><br data-dcnode-id="3336"><span data-dcnode-id="3335" instrument_node="">Avoid, while you can, distress to one heart,</span><br data-dcnode-id="3334"><span data-dcnode-id="3333" instrument_node="">For a single moan can quake the Earth.” (Gulistan, Part 1, Story 27)</span><br data-dcnode-id="3332"><span data-dcnode-id="3331" instrument_node="">The journal is littered with such quotations, as well as what I can only assume are his own inventions. Babur clearly valued wisdom and language.</span><br data-dcnode-id="3330"><span data-dcnode-id="3329" instrument_node="">After the surrender of Samarkand and his escape to Dizak, he writes,” I have been transported five times from toil to rest and from hardship to comfort. This was the first.” (81) Indeed, the interesting part, for me, regarding Babur’s establishment of the Mughal empire was the circuitous route that it took. I had always had the impression that he swept through territories in a mass of victories, but this could not be further from the truth. Multiple times Babur was reduced to almost nothing, and yet he kept returning.</span><br data-dcnode-id="3328"><br data-dcnode-id="3327"><span data-dcnode-id="3326" instrument_node="">Babur always comments on the fruits and other agricultural qualities of the area. Strange to us today, he praises the quality of the fruits in Kabul, and the wines that can be found there.</span><br data-dcnode-id="3325"><br data-dcnode-id="3324"><span data-dcnode-id="3323" instrument_node="">Ultimately, Babur’s philosophy over the territories that he conquered can be summed up by this verse he writes in his journal on the Domain of Kabul, “Where one submits like a subject, treat him well; But he who submits not, strike, strip, crush and force like hell.” (218) This is an incredibly interesting journal, and it tells a story that I think would surprise most readers.</span><br data-dcnode-id="3322"></span><span data-dcnode-id="3320" instrument_node="">

</span><span data-dcnode-id="3239" id="freeTextContainer11211174892864522185"><span data-dcnode-id="3240" instrument_node="">I read this book intermittently from 2016 (for my general exams), and between 2017-2019 when I spent some time traveling in Central Asia to some of the locales mentioned in the book, and finally finished in 2021. It is a chronicle and has the extensive details of names and battles that such histories tend to entail, but what is unique is that it was written by someone who knew many of the characters and is something of a historical figure himself, as Babur was a king and ultimately the founder o</span></span><span data-dcnode-id="3238" instrument_node="">
</span><span data-dcnode-id="3224" id="freeText11211174892864522185" style="display:none"><span data-dcnode-id="3237" instrument_node="">I read this book intermittently from 2016 (for my general exams), and between 2017-2019 when I spent some time traveling in Central Asia to some of the locales mentioned in the book, and finally finished in 2021. It is a chronicle and has the extensive details of names and battles that such histories tend to entail, but what is unique is that it was written by someone who knew many of the characters and is something of a historical figure himself, as Babur was a king and ultimately the founder of the Mughal Empire. This chronicle covers the time when he left his home base in Andijan in what is now Uzbekistan, and his journeys into Samarqand, and into exile to Kabul and towards India. </span><br data-dcnode-id="3236"><br data-dcnode-id="3235"><span data-dcnode-id="3234" instrument_node="">It is interesting to read this now as Afghanistan is once again in our news. It seems in modern times the country just cannot catch a break. We forget that once upon a time it was the seat of kings and was (and still is) a beautiful place of mountains and prosperous cities along the Silk Road. In Babur’s time, some 500 years ago, he waxes nostalgic for Kabul’s cool mountainous climes as he left and went towards India, which is a place he never quite got used to (though he loved mangos). The book is slow and carries with it abundant descriptions of landscapes and the minute variations between different zones and valleys that we don’t notice these days in our jet setting life. The plants, the mountains, the meadows (those with biting gnats and those without, which makes a big difference in your quality of life while visiting), lakes and rivers, and culture of different tribal confederations. </span><br data-dcnode-id="3233"><br data-dcnode-id="3232"><span data-dcnode-id="3231" instrument_node="">Babur himself is also what we would call today a cross between an enlightened warlord and a renaissance man. He is keenly interested in botany and learning randoms bits and bops of culture, and a sharp observer of people and their nature, and he mourned when a storm blew over his tent and drenched his papers and books. On the other hand, he is a descendant of Timur and Chinggis Khan, men who conquered the world through brutal means, and Babur himself engaged in numerous battles and ordered executions, sometimes using horrible methods, and sometimes massacring them. There was a scene after a battle where they piled up heads afterward, just as his infamous ancestor Timur had done. But he also writes poetry, sometimes has pangs of regret and piety and decides to quit drinking, but subsequently took up to getting high on ma’jun and opium while in old age. He’s also a father, and in his letter to his son Humayun he gently corrects some of his misspellings (students of Arabic could empathize with the confusion sown by having multiple letters for the sounds of s, t, z, d). In other words, he is human, just one who casts a larger-than-life shadow on the history of this region.</span><br data-dcnode-id="3230"><br data-dcnode-id="3229"><span data-dcnode-id="3228" instrument_node="">Babur also observes with an eye of wonder. There was a brief description of how he found fish in a river near their encampment, which were coming to the surface due to their light. So with a group of guys, Babur and company all got into the water for a late-night fishing session… The stories take me back to camping and riding trips in Tajikistan and Kyrgyzstan, into old fortresses, into the lush wilderness, and ascending the forbidding mountain passes. Wading in bone-cold springs formed from melted ice caps in summer. Camping by lonesome lakes that can be reached only after hours or days of journey.</span><br data-dcnode-id="3227"><br data-dcnode-id="3226"><span data-dcnode-id="3225" instrument_node="">Central Asia is beautiful. History is complicated. People are complex. One can explore for years with an open mind but still cannot figure it out.</span></span><span data-dcnode-id="3223" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2730" title="did not like it"><span class="staticStar p10" data-dcnode-id="2735" size="15x15"><span data-dcnode-id="2736" instrument_node="">did not like it</span></span><span class="staticStar p0" data-dcnode-id="2734" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2733" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2732" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2731" size="15x15"></span></span><span data-dcnode-id="2729" instrument_node="">

</span><span data-dcnode-id="2714" id="freeTextContainer16820542286572480019"><span data-dcnode-id="2718" instrument_node="">A review of the Beveridge translation, recently republished in hardcover by Everyman Library.</span><br data-dcnode-id="2717"><br data-dcnode-id="2716"><span data-dcnode-id="2715" instrument_node="">Avoid it, it's awful. If you pick it up pretty soon you'll have Indian "braves" and other "desperadoes" riding around in your head. That's because of the translator, who seems to think drawing an analogy between a Native American culture and 16th century central Asia is a good idea. It isn't, it's historically ignorant and distracting. It's also rather silly. E.M. Forster, in an essay published in the 19</span></span><span data-dcnode-id="2713" instrument_node="">
</span><span data-dcnode-id="2690" id="freeText16820542286572480019" style="display:none"><span data-dcnode-id="2712" instrument_node="">A review of the Beveridge translation, recently republished in hardcover by Everyman Library.</span><br data-dcnode-id="2711"><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">Avoid it, it's awful. If you pick it up pretty soon you'll have Indian "braves" and other "desperadoes" riding around in your head. That's because of the translator, who seems to think drawing an analogy between a Native American culture and 16th century central Asia is a good idea. It isn't, it's historically ignorant and distracting. It's also rather silly. E.M. Forster, in an essay published in the 1920s, likened Babur, and the world he lived in, to the world of the Renaissance Italy. Small principalities, avaricious strong men and Machiavellian politics. There's some merit to such a comparison, there's none for Beveridge's ignorant cultural leveling. "Pointiff" pops up, from time to time, as well...don't even ask. Lots of "corn" as well, even though the crop would not have been grown at the time anywhere other than the Americas. Such nonsense, and there's more, lots more, ruined the translation for me, as I lost confidence in the translator. </span><br data-dcnode-id="2708"><br data-dcnode-id="2707"><span data-dcnode-id="2706" instrument_node="">And then there's the footnotes! Which are bloated, meandering and usually of little to no use. If you're looking for guidance through the bewildering cultural mix of the place and time, don't look to Beveridge for any assistance. But, if you want to read about whether Babur hunted white tailed or white arsed deer, you're in luck. At times she actually refers to her husband [her words, not mine] as a source for her notes. </span><br data-dcnode-id="2705"><br data-dcnode-id="2704"><span data-dcnode-id="2703" instrument_node="">The formatting is visually awful, with several lines of text and lots of gaseous commentary. It's just plain ugly, in both look and content. Someone should have cleaned up the text, with, at the very least, a flame thrower taken to the moldy, suffocating footnotes. </span><br data-dcnode-id="2702"><br data-dcnode-id="2701"><span data-dcnode-id="2700" instrument_node="">Beveridge's creaky, stiff English, and it would have read as out of date when published, should be modernized, for instance, there's all sorts of weird hyphenated terms, which are nothing but an irritant and distraction. A detailed map, or maps, rather than the one provided, which is of little to no use, would be of great help as well. </span><br data-dcnode-id="2699"><br data-dcnode-id="2698"><span data-dcnode-id="2697" instrument_node="">All told this edition of Babur's memoirs is a cynical rip off. If you don't mind an ereader you can access it online for free anyhow [</span><a data-dcnode-id="2695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gutenberg.org/ebooks/44608" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2696" instrument_node="">http://www.gutenberg.org/ebooks/44608</span></a><span data-dcnode-id="2694" instrument_node="">]. There's a reason this translation disappeared, that's what it deserves. E.L. has simply taken a text in the public domain, it was first published in 1920 [reads like it was 1820], and spruced it up with a new introduction. </span><br data-dcnode-id="2693"><br data-dcnode-id="2692"><span data-dcnode-id="2691" instrument_node="">A massive colonial belch, to be used as a door stopper, or to throw at small rodents, rather than something to actually read.</span></span><span data-dcnode-id="2689" instrument_node="">

</span><span data-dcnode-id="2417" id="freeTextContainer16627239635586157537"><br data-dcnode-id="2424"><p data-dcnode-id="2418"><span data-dcnode-id="2423" instrument_node="">Well, I did it again1. When I consulted my reading list to pick a new book to read after finishing </span><em data-dcnode-id="2420"><a data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//igcpublishing.com/2021/05/20/meditations-with-cows-review/" rel="nofollow noopener"><span data-dcnode-id="2422" instrument_node="">Meditations With Cows</span></a></em><span data-dcnode-id="2419" instrument_node="">, instead of picking a new or well-known or at least commonly approachable book2 that people actually would search for3 and by extension perhaps find my site4, I picked another ancient text5 that only a few people have heard of and fewer decide to read. Let it never be said that I am a slave to the search engine algorithms6. That being said, it does continue my tour of historic</span></p></span><span data-dcnode-id="2416" instrument_node="">
</span><span data-dcnode-id="2172" id="freeText16627239635586157537" style="display:none"><br data-dcnode-id="2415"><p data-dcnode-id="2398"><span data-dcnode-id="2414" instrument_node="">Well, I did it again1. When I consulted my reading list to pick a new book to read after finishing </span><em data-dcnode-id="2411"><a data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//igcpublishing.com/2021/05/20/meditations-with-cows-review/" rel="nofollow noopener"><span data-dcnode-id="2413" instrument_node="">Meditations With Cows</span></a></em><span data-dcnode-id="2410" instrument_node="">, instead of picking a new or well-known or at least commonly approachable book2 that people actually would search for3 and by extension perhaps find my site4, I picked another ancient text5 that only a few people have heard of and fewer decide to read. Let it never be said that I am a slave to the search engine algorithms6. That being said, it does continue my tour of historic pieces of world literature (we recently reviewed </span><em data-dcnode-id="2407"><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//igcpublishing.com/2021/02/18/bhagavad-gita-review/" rel="nofollow noopener"><span data-dcnode-id="2409" instrument_node="">The Bhagavad Gita</span></a></em><span data-dcnode-id="2406" instrument_node="">, and </span><em data-dcnode-id="2403"><a data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//igcpublishing.com/2021/03/04/the-story-of-burnt-njal-review/" rel="nofollow noopener"><span data-dcnode-id="2405" instrument_node="">The Story of Burnt Njal</span></a></em><span data-dcnode-id="2402" instrument_node="">, checking off (roughly) India and Iceland, plus the Middle East7 with the </span><em data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Babur-Nama</span></em><span data-dcnode-id="2399" instrument_node="">), and I have legitimately been interested in reading this for awhile, it being one of the few historical autobiographies from that region of the world. In truth, doing a sort of world-tour of ancient literature is proving a very fascinating exercise, and one that I would wholly recommend (as long as you have some patience8).</span></p><br data-dcnode-id="2397"><br data-dcnode-id="2396"><br data-dcnode-id="2395"><p data-dcnode-id="2390"><span data-dcnode-id="2394" instrument_node="">The </span><em data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Babur-Nama</span></em><span data-dcnode-id="2391" instrument_node=""> is part memoir and part diary9 of Babur, who came from the region modernly known as the Middle East around the year 1500 CE10. It chronicles much of his life, and as such is a fascinating insight into the mindset of a ruler of that time and region11, as well as the peoples and cultures that populate the pages. If you have some knowledge of the modern Middle East, this text will give you a lot of insight into how some of those situations came to be, and from whom the modern peoples are descended from and what those ancestors were like. Some knowledge of the modern Middle East will also help you keep track of and contextualize the place names, many of which have lasted into the present in some form or another.</span></p><br data-dcnode-id="2389"><br data-dcnode-id="2388"><br data-dcnode-id="2387"><p data-dcnode-id="2379"><span data-dcnode-id="2386" instrument_node="">Although geographically much of the story's action centers around Kabul, the focus is mostly on Hindustan (which is a region that seems to compose most of the northwestern parts of modern Pakistan and India). Five times Babur made expeditions into Hindustan before finally conquering it12. He also has to take and retake Kabul several times, takes and loses Samarkand on various occasions, fights repeatedly over modern Kandahar province, defends a region called Farghana13, and wages various campaigns with and against a multitude of Afghan tribes. Yet for all that fighting, some of it detailed quite thoroughly (like in </span><em data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">The Story of Burnt Njal</span></em><span data-dcnode-id="2383" instrument_node="">, there are some very oddly minute moments, like once when someone's index finger is smote off), what keeps this book interesting (and it really was interesting, at least to me) is just how unique and different14 the view that is presented is from most anything with which I was previously familiar. I hate to call it world-building, or compare it to invented cultures in alternative world fantasy, because that seems rather derogatory towards these real-life cultures, but truly this real-world tale felt at times far more unique and alien than a science fiction novel with a non-human viewpoint, and in the most fascinating ways (it also had far, far less </span><a data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//igcpublishing.com/2021/03/09/naming-and-titles/" rel="nofollow noopener"><span data-dcnode-id="2382" instrument_node="">pronounceable names</span></a><span data-dcnode-id="2380" instrument_node="">).</span></p><br data-dcnode-id="2378"><br data-dcnode-id="2377"><br data-dcnode-id="2376"><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">It is a masterclass in immersive15 "world-building," because to Babur there was nothing alien or out of the ordinary about chopping someone to pieces16 if they did something wrong, mustering an army to go conquer some new lands, having multiple wives, or being completely assured of your divine right to suzerainty, and so he simply reports these things as matter-of-factually as he reports when he happens to "eat a confection17." Actually, he probably makes a bigger deal about deciding to eat a confection than he does about deciding to chop off someone's head. I think this is what really makes it so fascinating. Since part of it is written as a memoir (this part can be quite slow at times, but is still interesting), and part as a diary, we sometimes get detailed, day-by-day insight into Babur's thoughts and actions as he goes about his daily life. Like anyone today who keeps a diary, some days are shorter than others - there is one entry on which he simply says he dismounted in such and such a place and "had a violent discharge18." Before you judge a man for what he wrote five hundred years ago, think how you may be judged five hundred years from now for what you posted on social media19. The internet is forever...</span></p><br data-dcnode-id="2373"><br data-dcnode-id="2372"><br data-dcnode-id="2371"><p data-dcnode-id="2366"><span data-dcnode-id="2370" instrument_node="">For as fascinating as I did find it, it was not an easy piece to read. First of all, it has a lot of footnotes20. Almost three thousand of them, in fact. Some of the footnotes were referencing other notes, or the appendices (of which there are also many21), or completely different books. Some of the footnotes were in different languages, with no English translation. Even some of the footnotes had footnotes. I found that I was spending so much time flipping back and forth that I wasn't gleaning anything from the text - my progress got much smoother and more engaging when I started reading blocks of twenty footnotes at a time22, switching back to the text until I'd read through those twenty footnotes, and then reading the next twenty footnotes, going back to the text, and so on. However, I would not recommend skipping the footnotes, as a fair number of them offer useful information23 or insights into the context of the diary, or the choices of the translator. By the way, as usual, my standard translation disclaimer applies here: I did no special research into what translations of the </span><em data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Babur-Nama</span></em><span data-dcnode-id="2367" instrument_node=""> are best, but I did learn a great deal about the translation process and the differences that can arise between translations from...the footnotes24. There is in fact more supplemental material than there is actual text, by a ratio of almost 2:1.</span></p><br data-dcnode-id="2365"><br data-dcnode-id="2364"><br data-dcnode-id="2363"><p data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">The second challenge to reading this book is how disjointed it can be, because there is often little context for a modern reader25. Plus, there are apparently large gaps where text has been lost, destroyed, or was never written (Babur apparently died before he could finish the memoir, and did not always keep his diary26). Had the translator not provided bridges for these gaps, explaining what historians think may have been happening during those times and helping set up the next batch of translated text, I would have become completely lost. As it was, it could still be jarring, because in some cases historians simply don't know what Babur was doing for extended periods of time.</span></p><br data-dcnode-id="2360"><br data-dcnode-id="2359"><br data-dcnode-id="2358"><p data-dcnode-id="2353"><span data-dcnode-id="2357" instrument_node="">Keeping track of all of the names and places and relationships27 and cultural norms and historical contexts could also get confusing at times, but I read </span><em data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">The Wheel of Time</span></em><span data-dcnode-id="2354" instrument_node="">, which has over two thousand named characters, so I think I was well-prepared to handle that part. Aside from insight into history and culture, this also gave insight into the Muslim religion and its various denominations28, which to me has always seemed the most distinct of the Abrahamic faiths. Particularly notable are the ways in which Babur's faith influences his interactions with those not of the same faith, and the varying degrees and ways in which people who do share the faith follow its precepts and Laws29.</span></p><br data-dcnode-id="2352"><br data-dcnode-id="2351"><br data-dcnode-id="2350"><p data-dcnode-id="2345"><span data-dcnode-id="2349" instrument_node="">I took awhile to get through this book30, which is okay because I'm still well ahead in my book reviews31, but I genuinely am glad that I took the time to read it, because I really do think I learned a great deal and gained many new insights from making my way through it. So yes, while this is a difficult read, I do recommend that you consider reading the </span><em data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Babur-Nama</span></em><span data-dcnode-id="2346" instrument_node=""> soon32.</span></p><br data-dcnode-id="2344"><br data-dcnode-id="2343"><br data-dcnode-id="2342"><p data-dcnode-id="2338"><span data-dcnode-id="2341" instrument_node="">[1] This is a sample of a footnote. You will find them throughout this post, just like the nearly three thousand of them that populate the pages of the </span><em data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Babur Nama</span></em></p><br data-dcnode-id="2337"><br data-dcnode-id="2336"><br data-dcnode-id="2335"><p data-dcnode-id="2329"><span data-dcnode-id="2334" instrument_node="">[2] Like, for instance, </span><em data-dcnode-id="2331"><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//igcpublishing.com/2021/02/04/rhythm-of-war-review/" rel="nofollow noopener"><span data-dcnode-id="2333" instrument_node="">Rhythm of War</span></a></em><span data-dcnode-id="2330" instrument_node="">, although I suppose there's an argument to be made that a 1400 page epic fantasy that is the fourth book in a series is not entirely "approachable"</span></p><br data-dcnode-id="2328"><br data-dcnode-id="2327"><br data-dcnode-id="2326"><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">[3] By search, I here refer to the ability of people in the early 21st century to input text into a tool called a search engine and be then provided with results</span></p><br data-dcnode-id="2323"><br data-dcnode-id="2322"><br data-dcnode-id="2321"><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">[4] IGCPublishing.com</span></p><br data-dcnode-id="2318"><br data-dcnode-id="2317"><br data-dcnode-id="2316"><p data-dcnode-id="2311"><span data-dcnode-id="2315" instrument_node="">[5] Whether the </span><em data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">Babur Nama</span></em><span data-dcnode-id="2312" instrument_node=""> counts as ancient could also be a matter of debate, since it's only about five hundred years old</span></p><br data-dcnode-id="2310"><br data-dcnode-id="2309"><br data-dcnode-id="2308"><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">[6] This is, of course, a literary device to express a tendency to make choices based on what will be most likely to boost a site's ranking in the mysterious search engine results (see [3])</span></p><br data-dcnode-id="2305"><br data-dcnode-id="2304"><br data-dcnode-id="2303"><p data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">[7] I say the Middle East, but a significant amount of the book also takes place in India</span></p><br data-dcnode-id="2300"><br data-dcnode-id="2299"><br data-dcnode-id="2298"><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">[8] Like the patience to read nearly three thousand footnotes</span></p><br data-dcnode-id="2295"><br data-dcnode-id="2294"><br data-dcnode-id="2293"><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">[9] The earliest parts are what Babur completed as an intentional memoir before he died, while the parts describing the rest of his life are diary entries that it is supposed he intended to eventually convert into memoir form. The diary entries are actually much more interesting and less ponderous than the memoir portions</span></p><br data-dcnode-id="2290"><br data-dcnode-id="2289"><br data-dcnode-id="2288"><p data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">[10] The book gives dates in AD, which have in turn been translated from a system called AH, in which Babur originally wrote</span></p><br data-dcnode-id="2285"><br data-dcnode-id="2284"><br data-dcnode-id="2283"><p data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">[11] For instance, the idea, very foreign to a modern American audience, that some people are born with the right to rule, and others are not</span></p><br data-dcnode-id="2280"><br data-dcnode-id="2279"><br data-dcnode-id="2278"><p data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">[12] Well, sort of. He hadn't entirely brought it under control by the time he died, and his son apparently lost it, and so it had to be retaken later on by Emperor Akbar (no relation to the Admiral), who also has a memoir. I'm not sure I'll bother to read that one, too</span></p><br data-dcnode-id="2275"><br data-dcnode-id="2274"><br data-dcnode-id="2273"><p data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">[13] It is worth noting that all of the spellings I've included here are approximate, because I don't know how to include the variety of accent and modifying marks that the text itself uses through my site editor</span></p><br data-dcnode-id="2270"><br data-dcnode-id="2269"><br data-dcnode-id="2268"><p data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">[14] Phrases like "for the sake of this five-days fleeting world," and references to the "seven climes" are fantastic examples</span></p><br data-dcnode-id="2265"><br data-dcnode-id="2264"><br data-dcnode-id="2263"><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">[15] By this I mean the idea of not intentionally explaining the "alien" components of a world to the reader, but rather simply using the terms and ideas as if they were normal and letting the reader pick up on them by context</span></p><br data-dcnode-id="2260"><br data-dcnode-id="2259"><br data-dcnode-id="2258"><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">[16] Or flayed alive, or any number of other lovely punishments. It was not what you might call a rigorous criminal justice system. They also had a tendency to have approximately zero respect for the concept of private property</span></p><br data-dcnode-id="2255"><br data-dcnode-id="2254"><br data-dcnode-id="2253"><p data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">[17] Granted, there is some basis to suggest that these confections were laden with opium</span></p><br data-dcnode-id="2250"><br data-dcnode-id="2249"><br data-dcnode-id="2248"><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">[18] That's an actual diary entry in the book</span></p><br data-dcnode-id="2245"><br data-dcnode-id="2244"><br data-dcnode-id="2243"><p data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">[19] Posting every single day about what you had for dinner for all the world to see is probably even more egotistical than writing in your diary that you ate a confection. Just saying</span></p><br data-dcnode-id="2240"><br data-dcnode-id="2239"><br data-dcnode-id="2238"><p data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">[20] Kind of like this post</span></p><br data-dcnode-id="2235"><br data-dcnode-id="2234"><br data-dcnode-id="2233"><p data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">[21] A through V, I believe</span></p><br data-dcnode-id="2230"><br data-dcnode-id="2229"><br data-dcnode-id="2228"><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">[22] Sometimes more, depending on how densely packed they were</span></p><br data-dcnode-id="2225"><br data-dcnode-id="2224"><br data-dcnode-id="2223"><p data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">[23] Unlike this one</span></p><br data-dcnode-id="2220"><br data-dcnode-id="2219"><br data-dcnode-id="2218"><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">[24] Are you enjoying all of these footnotes yet?</span></p><br data-dcnode-id="2215"><br data-dcnode-id="2214"><br data-dcnode-id="2213"><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">[25] You know, I wonder about using the term "modern." If this is the modern age, when will we know we are in the age that comes next, and what will it be? It's like the question of what comes after the "Common Era." The Uncommon Era?</span></p><br data-dcnode-id="2210"><br data-dcnode-id="2209"><br data-dcnode-id="2208"><p data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">[26] Still, he kept it much more consistently than the handful of times that I've tried to start a diary, which has typically lasted for now more than four days</span></p><br data-dcnode-id="2205"><br data-dcnode-id="2204"><br data-dcnode-id="2203"><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">[27] In the memoir portions, Babur subjects his readers to extensive (and very judgmental) biographies of almost everyone who is ever mentioned. With how similar all of the names are, this can be very intimidating, but I found that, like in most books, if you just read along and remember the names that are repeated often you'll be able to follow the action well enough</span></p><br data-dcnode-id="2200"><br data-dcnode-id="2199"><br data-dcnode-id="2198"><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">[28] This book comes significantly after the major splits in the Islamic faith occurred, so does not go into those origins, but it does provide some insight into how those groups interacted, and continue to interact to this day - a grasp of these denomination differences is a key component of understanding the peoples, cultures, and situation of the modern Middle East</span></p><br data-dcnode-id="2195"><br data-dcnode-id="2194"><br data-dcnode-id="2193"><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">[29] For instance, it is against the Law to imbibe intoxicating beverages. Babur follows this law until he's almost thirty, then spends a decade going to wine parties and getting drunk seemingly every day (he mentions it often in his diary, alongside eating possibly opium-laden confections), and then has this big moment where he renounces alcohol and orders all of his wine glasses destroyed and the pieces given away</span></p><br data-dcnode-id="2190"><br data-dcnode-id="2189"><br data-dcnode-id="2188"><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">[30] About two and a half weeks</span></p><br data-dcnode-id="2185"><br data-dcnode-id="2184"><br data-dcnode-id="2183"><p data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">[31] I'm writing this one in early March, despite that it won't be posted until May</span></p><br data-dcnode-id="2180"><br data-dcnode-id="2179"><br data-dcnode-id="2178"><p data-dcnode-id="2173"><span data-dcnode-id="2177" instrument_node="">[32] Well, that's the last of the footnotes, and the end of the post. You may just find it confusing or annoying now, but once you have experienced the footnote extravaganza that is the </span><em data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Babur Nama</span></em><span data-dcnode-id="2174" instrument_node="">, I think you will understand why including all of these footnotes in the review is amusing</span></p></span><span data-dcnode-id="2171" instrument_node="">
