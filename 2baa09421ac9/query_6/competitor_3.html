            <template shadowrootmode="closed"><html data-dcnode-id="1"><head data-dcnode-id="4005"><meta name="robots" content="noindex, nofollow"><meta charset="utf-8"></head><body background="tribk2.jpg" bgcolor="#ffffff" data-dcnode-id="2"><span data-dcnode-id="4009" instrument_node="">
</span><title data-dcnode-id="4007">The Symbolism and Spiritual Significance of the Number Three</title><span data-dcnode-id="4006" instrument_node="">
</span><span data-dcnode-id="4004" instrument_node="">
</span><span data-dcnode-id="4003" instrument_node="">
</span><p data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">
</span></p><p align="Center" data-dcnode-id="3994"><span data-dcnode-id="4000" instrument_node="">
</span><font color="#ff0000" data-dcnode-id="3996"><big data-dcnode-id="3997"><big data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">"The Symbolism and Spiritual Significance
of the Number Three"</span></big></big></font><span data-dcnode-id="3995" instrument_node="">
</span></p><p align="Center" data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">
</span></p><center data-dcnode-id="3931"><span data-dcnode-id="3991" instrument_node="">
</span><span data-dcnode-id="3990" instrument_node="">
</span><span data-dcnode-id="3989" instrument_node="">
</span><span data-dcnode-id="3982" instrument_node="">
</span><span data-dcnode-id="3980" instrument_node="">
</span><span data-dcnode-id="3979" instrument_node="">
</span><span data-dcnode-id="3937" instrument_node="">
</span><span data-dcnode-id="3935" instrument_node="">
</span><table border="3" cellpadding="2" data-dcnode-id="3933"><tbody data-dcnode-id="3934"><tr data-dcnode-id="3981"><td data-dcnode-id="3983"><center data-dcnode-id="3985"><span data-dcnode-id="3988" instrument_node="">
</span><img align="Middle" data-dcnode-id="3987" height="318" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/arms.gif&amp;raw" width="328"><span data-dcnode-id="3986" instrument_node="">
</span></center><span data-dcnode-id="3984" instrument_node="">
</span></td></tr><tr data-dcnode-id="3936"><td data-dcnode-id="3938"><p align="Center" data-dcnode-id="3974"><span data-dcnode-id="3978" instrument_node="">
</span><b data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">
	An Example of the Triple Symbology</span></b><span data-dcnode-id="3975" instrument_node="">
</span></p><p data-dcnode-id="3963"><span data-dcnode-id="3973" instrument_node="">
</span><b data-dcnode-id="3965"><span data-dcnode-id="3972" instrument_node="">
	Grand and Small State Coat of Arms of the Republic of Estonia </span><br data-dcnode-id="3971"><span data-dcnode-id="3970" instrument_node="">
	were confirmed by the Rigikogu by a Law adopted on June 19, 1925, </span><br data-dcnode-id="3969"><span data-dcnode-id="3968" instrument_node="">
	which entered into force on the territory of the Republic of Estonia on </span><br data-dcnode-id="3967"><span data-dcnode-id="3966" instrument_node="">
	July 21, 1925.</span></b><span data-dcnode-id="3964" instrument_node="">
</span></p><p data-dcnode-id="3956"><span data-dcnode-id="3962" instrument_node="">
</span><b data-dcnode-id="3958"><span data-dcnode-id="3961" instrument_node="">
	The large national coat of arms has three blue lions (or according to </span><br data-dcnode-id="3960"><span data-dcnode-id="3959" instrument_node="">
	some interpretations, leopards) on a shield with a gold base.</span></b><span data-dcnode-id="3957" instrument_node="">
</span></p><p data-dcnode-id="3945"><span data-dcnode-id="3955" instrument_node="">
</span><b data-dcnode-id="3947"><span data-dcnode-id="3954" instrument_node="">
	One of the lions symbolizes the courage of the fight for freedom in </span><br data-dcnode-id="3953"><span data-dcnode-id="3952" instrument_node="">
	ancient times. The second stands for the courage in the uprisings in </span><br data-dcnode-id="3951"><span data-dcnode-id="3950" instrument_node="">
	Harjumaa in 1343. The third represents the courage of the Estonian </span><br data-dcnode-id="3949"><span data-dcnode-id="3948" instrument_node="">
	fight for freedom between 1918-1920.</span></b><span data-dcnode-id="3946" instrument_node="">
</span></p><p data-dcnode-id="3939"><span data-dcnode-id="3944" instrument_node="">
</span><b data-dcnode-id="3940"><span data-dcnode-id="3943" instrument_node="">
	The wreath of oak leaves stands for the perseverance and strength </span><br data-dcnode-id="3942"><span data-dcnode-id="3941" instrument_node="">
	of Estonia and the evergreen traditions of freedom.</span></b></p></td></tr></tbody></table><span data-dcnode-id="3932" instrument_node="">
</span></center><span data-dcnode-id="3930" instrument_node="">
</span><p align="Center" data-dcnode-id="3926"><span data-dcnode-id="3929" instrument_node="">
</span><img align="Middle" data-dcnode-id="3928" height="85" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/triple.gif&amp;raw" width="85"><span data-dcnode-id="3927" instrument_node="">
</span></p><p data-dcnode-id="3921"><span data-dcnode-id="3925" instrument_node="">
</span><b data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">
In the first three numbers, all of the others are synthesized. From the union
of oneness and duality (which is its reflection), that is, from triad, proceed
all of the other numbers, and from this primordial triangle all figures derive.</span></b><span data-dcnode-id="3922" instrument_node="">
</span></p><p data-dcnode-id="3916"><span data-dcnode-id="3920" instrument_node="">
</span><b data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">
There is also, for traditional civilizations, a direct relationship between
numbers and letters of the alphabet, to the point where, with many alphabets,
numbers were represented by letters, and had no special signs of their own.
This is not the case with the early American cultures, which knew no alphabet,
but we wish to call attention to this correspondence because not only the
alphabetical code, but the numerical one, as well, describe all reality:
that is, everything that is numerable or namable–in the sense of "ciphers,"
harmonious measures, "proportions"–in sum, the totality of the cosmos,
of the knowable.</span></b><span data-dcnode-id="3917" instrument_node="">
</span></p><p data-dcnode-id="3911"><span data-dcnode-id="3915" instrument_node="">
</span><b data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">
This threeness or triad, has always been considered sacred–like oneness,
duality, and all numbers–by virtue of its very properties and particular
attributes. These properties and attributes are manifested in its threefold
nature, which of itself is the inevitable expression of a principle, an
archetypal fact, that solidifies in a series, as a representation of ideas
and energies that materialize in magical, mysterious fashion while obeying
precise, universal laws, which the numerical codes and their geometrical
correspondences symbolize.</span></b><span data-dcnode-id="3912" instrument_node="">
</span></p><p align="Center" data-dcnode-id="3907"><span data-dcnode-id="3910" instrument_node="">
</span><img align="Middle" data-dcnode-id="3909" height="85" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/triple.gif&amp;raw" width="85"><span data-dcnode-id="3908" instrument_node="">
</span></p><p align="Center" data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">
</span></p><p align="Center" data-dcnode-id="3901"><span data-dcnode-id="3904" instrument_node="">
</span><img align="Left" data-dcnode-id="3903" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/triad.gif&amp;raw" width="100"><span data-dcnode-id="3902" instrument_node="">
</span></p><p data-dcnode-id="3893"><span data-dcnode-id="3900" instrument_node="">
</span><b data-dcnode-id="3895"><span data-dcnode-id="3899" instrument_node="">
This symbol a triad or trinity. It is a symbol of the unity of body, mind
and spirit. The symbol is of universal significance - it is found throughout
history and all over the world. It was popularized early in this century
by the Russian-born artist, philosopher and scientist Nicholas Roerich.
(</span><a data-dcnode-id="3897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.roerich.org/"><span data-dcnode-id="3898" instrument_node="">http://www.roerich.org</span></a><span data-dcnode-id="3896" instrument_node="">). It can be
interpreted in many different senses: spirit/mind/body in a circle of synthesis;
past/present/future enclosed in the ring of eternity; art/science/religion
bound in a circle of culture.</span></b><span data-dcnode-id="3894" instrument_node="">
</span></p><p data-dcnode-id="3888"><span data-dcnode-id="3892" instrument_node="">
</span><b data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">
The oldest of Indian symbols, Chintamani, the sign of happiness, is composed
of this symbol and it can be found in the Temple of Heaven in Beijing. It
appears in the Three Treasures of Tibet; on the breast of the Christ in
Memling’s famous painting; on the Madonna of Strasbourg; on the shields
of the Crusaders and coat of arms of the Templars. It can be seen on the
blades of the famous Caucasian swords called "Gurda" and on the swords of
Japanese nobility.</span></b><span data-dcnode-id="3889" instrument_node="">
</span></p><p data-dcnode-id="3883"><span data-dcnode-id="3887" instrument_node="">
</span><b data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">
It appears as a symbol in several philosophical systems. It can be discovered
on the images of Gessar Khan and Rigden Djapo; on the "Tamga" of Timurlane
and on the coat of arms of the Popes. It can be seen in the works of ancient
Spanish painters and of Titian, and on the ancient ikon of St. Nicholas in
Bari and that of St. Sergius and the Holy Trinity. It appears on the coat
of arms of the city of Samarkand, on Ethiopian and Coptic antiquities, on
the rocks of Mongolia, on Tibetan rings, on Buddhist banners, on the breast
ornaments of all the Himalayan countries, and on the pottery of the Neolithic
age.</span></b><span data-dcnode-id="3884" instrument_node="">
</span></p><p data-dcnode-id="3878"><span data-dcnode-id="3882" instrument_node="">
</span><b data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">
The symbol of the triad or trinity has existed over immeasurable time and
throughout the world. It can be understood as a key to the integrity and
interdependence of all existence.</span></b><span data-dcnode-id="3879" instrument_node="">
</span></p><p data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">
</span></p><p align="Center" data-dcnode-id="3872"><span data-dcnode-id="3875" instrument_node="">
</span><img align="Middle" data-dcnode-id="3874" height="85" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/triple.gif&amp;raw" width="85"><span data-dcnode-id="3873" instrument_node="">
</span></p><p align="Center" data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">
</span></p><p data-dcnode-id="3865"><span data-dcnode-id="3869" instrument_node="">
</span><b data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">
Mother Goddess</span></b><span data-dcnode-id="3866" instrument_node="">
</span></p><p data-dcnode-id="3860"><span data-dcnode-id="3864" instrument_node="">
</span><b data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">
According to some authors, the triune mother-goddess in pre-Christian Celtic
society, to was equal in stature to that of Mercury, which is what Caesar
called Lugos or &nbsp;Lugh, the most important of all the continental Celtic
deities. Often Continental representations in sculpture and bas-relief of
goddesses are in triads, which were for a time considered to be representations
of different figures than those that appeared individually. However, when
one looks at the objects associated with them, it is clear that "the two
groups espress the same religious idea; only the representation of the idea
varies." Some of the symbolic associations with the Celtic mother-goddess
are the cornucopia, fruit, animals seated on her knee, and a child in her
arms or next to her. Interestingly enough, in continental representations
of Celtic deities, the goddess Julius Caesar called Minerva (who is now known
to be Brighde) is often depicted in a triad with the male deities Mercury
and Apollo, or Mercury and Vulcan. This is possibly a symbol of her immense
importance in Celtic religious practices. In other representations, "Minerva"
is depicted in the company of "Mars" which is what Caesar called Camulus,
the same figure as Cumhail (father of Fionn Mac Cumhail, leader of the Fianna)
a sky and war god of the Celts, both Insular and Continental.</span></b><span data-dcnode-id="3861" instrument_node="">
</span></p><p data-dcnode-id="3855"><span data-dcnode-id="3859" instrument_node="">
</span><b data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">
The triad is a defining characteristic of Celtic religion and mythology,
and not all female triads in the Irish tradition, at least, are as clear
symbols of the Mother Goddess. These symbolic attributes include: cornucopia,
fruit, animals on the figure’s knee, or a child in her arms or at her
side.</span></b><span data-dcnode-id="3856" instrument_node="">
</span></p><p data-dcnode-id="3850"><span data-dcnode-id="3854" instrument_node="">
</span><b data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">
Celtic art and literature has long been preoccupied with the number three.
Looking at Celtic works or art one notices that often figures are grouped
in clusters of three, creatures have three heads, objects repeat three times,
or a single head might have three faces.</span></b><span data-dcnode-id="3851" instrument_node="">
</span></p><p data-dcnode-id="3845"><span data-dcnode-id="3849" instrument_node="">
</span><b data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">
Oak, ash, and thorn were called the faery triad of trees. Where they grow
together,it is still said that faeries live.</span></b><span data-dcnode-id="3846" instrument_node="">
</span></p><p data-dcnode-id="3840"><span data-dcnode-id="3844" instrument_node="">
</span><b data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">
From the Druid or Celtic Shamanistic viewpoint the number three represents
the different views one might develop following an initiation ceremony. Celtic
Shamans believed that they could see the present, past and future - their
vision of the world was complete and trustworthy. The Shaman often saw himself
as a man standing in three different worlds at the same time. In this way,
his judgments, decisions and advice became infallible and was closed to
interpretation.</span></b><span data-dcnode-id="3841" instrument_node="">
</span></p><p data-dcnode-id="3835"><span data-dcnode-id="3839" instrument_node="">
</span><b data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">
To the Celtic Shaman the worlds overlapped thus his consciousness is different
from anyone else. His world view is full and complete. He has many ongoing
relationships with otherworldly entities, such as fairies, the dead and the
yet to be born. He gains his knowledge of this world from these entities
and bestows it upon those who are not so blessed with such insight, such
as King Arthur.</span></b><span data-dcnode-id="3836" instrument_node="">
</span></p><p data-dcnode-id="3830"><span data-dcnode-id="3834" instrument_node="">
</span><b data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">
The Celtic preoccupation with the number three can be seen in the image of
many of the Celtic Gods and Goddesses such as the three Brigids, and in the
course of a story, often male heroes travel in groups of three in an attempt
to complete a task, each of the three completing a different leg of the journey.</span></b><span data-dcnode-id="3831" instrument_node="">
</span></p><p data-dcnode-id="3825"><span data-dcnode-id="3829" instrument_node="">
</span><b data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">
Just as night and day need twilight or dawn to go between it, the Celtic
Shaman is the necessary third being between what is seen and unseen. He is
neither this nor that. This widespread interest of the number three remains
in our thinking today. Many modern concepts in philosophy, mathematics, physics,
etc., are still very much based in the idea of "the three."</span></b><span data-dcnode-id="3826" instrument_node="">
</span></p><p data-dcnode-id="3820"><span data-dcnode-id="3824" instrument_node="">
</span><b data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">
The Greeks used the number three a lot. There were the three Fates, three
Graces, three Gorgons and the three Furies. Even Apollo's Pythia sat on a
three legged chair (tripod) and Cerberus was a three headed dog. Multiples
of three also seemed to be used such as the nine Muses and the twelve Olympian
gods. &gt;</span></b><span data-dcnode-id="3821" instrument_node="">
</span></p><p data-dcnode-id="3815"><span data-dcnode-id="3819" instrument_node="">
</span><b data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">
Add the Holy Trinity, the trimester and some others, and you have a world-wide
phenomenon.</span></b><span data-dcnode-id="3816" instrument_node="">
</span></p><p align="Center" data-dcnode-id="3811"><span data-dcnode-id="3814" instrument_node="">
</span><img align="Middle" data-dcnode-id="3813" height="85" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/triple.gif&amp;raw" width="85"><span data-dcnode-id="3812" instrument_node="">
</span></p><p align="center" data-dcnode-id="3798"><span data-dcnode-id="3810" instrument_node="">
</span><b data-dcnode-id="3800"><font data-dcnode-id="3804" size="+1"><span data-dcnode-id="3809" instrument_node="">Number in Scripture </span><br data-dcnode-id="3808"><span data-dcnode-id="3807" instrument_node="">
Its Supernatural Design and Spiritual Significance </span><br data-dcnode-id="3806"><span data-dcnode-id="3805" instrument_node="">
E. W. Bullinger</span></font><span data-dcnode-id="3803" instrument_node=""> </span><br data-dcnode-id="3802"><span data-dcnode-id="3801" instrument_node="">
(1837-1913)</span></b><span data-dcnode-id="3799" instrument_node="">
</span></p><p data-dcnode-id="3778"><span data-dcnode-id="3797" instrument_node="">
</span><b data-dcnode-id="3780"><span data-dcnode-id="3796" instrument_node="">
In this number we have quite a new set of phenomena. We come to the first
geometrical figure. Two straight lines cannot possibly enclose any space,
or form a plane figure; neither can two plan surfaces form a solid.
</span><i data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">Three</span></i><span data-dcnode-id="3793" instrument_node=""> lines are necessary to form a plan figure; and three dimensions
of length, breadth, and height, are necessary to form a solid. Hence
</span><i data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">three</span></i><span data-dcnode-id="3790" instrument_node=""> is the symbol of the </span><i data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">cube</span></i><span data-dcnode-id="3787" instrument_node="">--the simplest form of solid
figure. As two is the symbol of the square, or plane contents
(x</span><sup data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">2</span></sup><span data-dcnode-id="3784" instrument_node="">), so three is the symbol of the cube, or solid contents
(x</span><sup data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">3</span></sup><span data-dcnode-id="3781" instrument_node="">).</span></b><span data-dcnode-id="3779" instrument_node="">
</span></p><p data-dcnode-id="3764"><span data-dcnode-id="3777" instrument_node="">
</span><b data-dcnode-id="3766"><span data-dcnode-id="3776" instrument_node="">
</span><i data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">Three</span></i><span data-dcnode-id="3773" instrument_node="">, therefore, stands for that which is </span><i data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">solid, real, substantial,
complete</span></i><span data-dcnode-id="3770" instrument_node="">, and </span><i data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">entire</span></i><span data-dcnode-id="3767" instrument_node="">.</span></b><span data-dcnode-id="3765" instrument_node="">
</span></p><p data-dcnode-id="3756"><span data-dcnode-id="3763" instrument_node="">
</span><b data-dcnode-id="3758"><span data-dcnode-id="3762" instrument_node="">
All things that are specially </span><i data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">complete</span></i><span data-dcnode-id="3759" instrument_node=""> are stamped with this number
three.</span></b><span data-dcnode-id="3757" instrument_node="">
</span></p><p data-dcnode-id="3748"><span data-dcnode-id="3755" instrument_node="">
</span><b data-dcnode-id="3750"><span data-dcnode-id="3754" instrument_node="">
God's attributes are </span><i data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">three</span></i><span data-dcnode-id="3751" instrument_node="">: omniscience, omnipresence, and omnipotence.</span></b><span data-dcnode-id="3749" instrument_node="">
</span></p><p data-dcnode-id="3737"><span data-dcnode-id="3747" instrument_node="">
</span><b data-dcnode-id="3739"><span data-dcnode-id="3746" instrument_node="">
There are three great divisions completing time--</span><i data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">past, present</span></i><span data-dcnode-id="3743" instrument_node="">, and
</span><i data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">future</span></i><span data-dcnode-id="3740" instrument_node="">.</span></b><span data-dcnode-id="3738" instrument_node="">
</span></p><p data-dcnode-id="3732"><span data-dcnode-id="3736" instrument_node="">
</span><b data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">
Three persons, in grammar, express and include all the relationships of mankind.</span></b><span data-dcnode-id="3733" instrument_node="">
</span></p><p data-dcnode-id="3727"><span data-dcnode-id="3731" instrument_node="">
</span><b data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">
Thought, word, and deed, complete the sum of human capability.</span></b><span data-dcnode-id="3728" instrument_node="">
</span></p><p data-dcnode-id="3722"><span data-dcnode-id="3726" instrument_node="">
</span><b data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">
Three degrees of comparison complete our knowledge of qualities.</span></b><span data-dcnode-id="3723" instrument_node="">
</span></p><p data-dcnode-id="3708"><span data-dcnode-id="3721" instrument_node="">
</span><b data-dcnode-id="3710"><span data-dcnode-id="3720" instrument_node="">
The simplest proposition requires three things to complete it; viz., the
</span><i data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">subject</span></i><span data-dcnode-id="3717" instrument_node="">, the </span><i data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">predicate</span></i><span data-dcnode-id="3714" instrument_node="">, and the </span><i data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">copula</span></i><span data-dcnode-id="3711" instrument_node="">.</span></b><span data-dcnode-id="3709" instrument_node="">
</span></p><p data-dcnode-id="3694"><span data-dcnode-id="3707" instrument_node="">
</span><b data-dcnode-id="3696"><span data-dcnode-id="3706" instrument_node="">
Three propositions are necessary to complete the simplest form of argument--the
</span><i data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">major premiss</span></i><span data-dcnode-id="3703" instrument_node="">, the </span><i data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">minor</span></i><span data-dcnode-id="3700" instrument_node="">, and the </span><i data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">conclusion</span></i><span data-dcnode-id="3697" instrument_node="">.</span></b><span data-dcnode-id="3695" instrument_node="">
</span></p><p data-dcnode-id="3683"><span data-dcnode-id="3693" instrument_node="">
</span><b data-dcnode-id="3685"><span data-dcnode-id="3692" instrument_node="">
Three kingdoms embrace our ideas of matter--</span><i data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">mineral, vegetable</span></i><span data-dcnode-id="3689" instrument_node="">, and
</span><i data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">animal</span></i><span data-dcnode-id="3686" instrument_node="">.</span></b><span data-dcnode-id="3684" instrument_node="">
</span></p><p data-dcnode-id="3675"><span data-dcnode-id="3682" instrument_node="">
</span><b data-dcnode-id="3677"><span data-dcnode-id="3681" instrument_node="">
When we turn to the Scriptures, this completion becomes </span><i data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">Divine</span></i><span data-dcnode-id="3678" instrument_node="">, and
marks Divine completeness or perfection.</span></b><span data-dcnode-id="3676" instrument_node="">
</span></p><p data-dcnode-id="3667"><span data-dcnode-id="3674" instrument_node="">
</span><b data-dcnode-id="3669"><span data-dcnode-id="3673" instrument_node="">
</span><i data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">Three</span></i><span data-dcnode-id="3670" instrument_node=""> is the first of four perfect numbers.</span></b><span data-dcnode-id="3668" instrument_node="">
</span></p><ul data-dcnode-id="3629"><span data-dcnode-id="3666" instrument_node="">
</span><li data-dcnode-id="3658"><b data-dcnode-id="3659"><i data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">Three</span></i><span data-dcnode-id="3663" instrument_node=""> denotes
      </span><i data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">divine</span></i><span data-dcnode-id="3660" instrument_node=""> perfection;</span></b></li><span data-dcnode-id="3657" instrument_node="">
</span><li data-dcnode-id="3649"><b data-dcnode-id="3650"><i data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">Seven</span></i><span data-dcnode-id="3654" instrument_node=""> denotes
      </span><i data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">spiritual</span></i><span data-dcnode-id="3651" instrument_node=""> perfection;</span></b></li><span data-dcnode-id="3648" instrument_node="">
</span><li data-dcnode-id="3640"><b data-dcnode-id="3641"><i data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">Ten</span></i><span data-dcnode-id="3645" instrument_node=""> denotes
      </span><i data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">ordinal</span></i><span data-dcnode-id="3642" instrument_node=""> perfection; and</span></b></li><span data-dcnode-id="3639" instrument_node="">
</span><li data-dcnode-id="3631"><b data-dcnode-id="3632"><i data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">Twelve</span></i><span data-dcnode-id="3636" instrument_node=""> denotes
      </span><i data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">governmental</span></i><span data-dcnode-id="3633" instrument_node=""> perfection.</span></b></li><span data-dcnode-id="3630" instrument_node="">
</span></ul><span data-dcnode-id="3628" instrument_node="">
</span><p data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">
&nbsp;
</span></p><p data-dcnode-id="3618"><span data-dcnode-id="3625" instrument_node="">
</span><b data-dcnode-id="3620"><span data-dcnode-id="3624" instrument_node="">
Hence the number </span><i data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">three</span></i><span data-dcnode-id="3621" instrument_node=""> points us to what is real, essential, perfect,
substantial, complete, and Divine. There is nothing real in man or of man.
Everything "under the sun" and apart from God is "vanity." "Every man at
his best estate is altogether vanity" (Psa 139:5,11, 62:9, 144:4; Eccl 1:2,4,
2:11,17,26, 3:19, 4:4, 11:8, 12:8; Rom 8:20).</span></b><span data-dcnode-id="3619" instrument_node="">
</span></p><p data-dcnode-id="3610"><span data-dcnode-id="3617" instrument_node="">
</span><b data-dcnode-id="3612"><span data-dcnode-id="3616" instrument_node="">
</span><i data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Three</span></i><span data-dcnode-id="3613" instrument_node=""> is the number associated with the Godhead, for there are "three
persons in one God." Three times the Seraphim cry, "Holy, Holy, Holy"--one
for each of the three persons in the Trinity (Isa 6:3). The living creatures
also in Revelation 4:8.</span></b><span data-dcnode-id="3611" instrument_node="">
</span></p><p data-dcnode-id="3605"><span data-dcnode-id="3609" instrument_node="">
</span><b data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">
Three times is the blessing given in Numbers 6:23, 24:--</span></b><span data-dcnode-id="3606" instrument_node="">
</span></p><ul data-dcnode-id="3591"><span data-dcnode-id="3604" instrument_node="">
</span><li data-dcnode-id="3601"><b data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">"The LORD bless thee and
      keep thee (the Father);</span></b></li><span data-dcnode-id="3600" instrument_node="">
</span><li data-dcnode-id="3597"><b data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">The LORD make His face
      shine upon thee; and be gracious unto thee (the Son);</span></b></li><span data-dcnode-id="3596" instrument_node="">
</span><li data-dcnode-id="3593"><b data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">The LORD lift up His
      countenance upon thee, and give thee peace" (the Holy Spirit).</span></b></li><span data-dcnode-id="3592" instrument_node="">
</span></ul><span data-dcnode-id="3590" instrument_node="">
</span><p data-dcnode-id="3588"><span data-dcnode-id="3589" instrument_node="">
&nbsp;
</span></p><p data-dcnode-id="3580"><span data-dcnode-id="3587" instrument_node="">
</span><b data-dcnode-id="3582"><span data-dcnode-id="3586" instrument_node="">
Each of these three blessings is two-fold, so that there are two members
in each, while the name Jehovah occurs </span><i data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">three</span></i><span data-dcnode-id="3583" instrument_node=""> times. This marks the
blessing as Divine in its source. No merit drew it forth; grace was its origin
and peace was its result.</span></b><span data-dcnode-id="3581" instrument_node="">
</span></p><p data-dcnode-id="3575"><span data-dcnode-id="3579" instrument_node="">
</span><b data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">
In Genesis 18:2, the same three persons appear to Abraham. Abraham "looked,
and, lo, THREE men stood by him." But verse 1 declares that it was "Jehovah
appeared unto him." It is remarkable that Abraham addresses them both as
one and as three. We read first that "they said," then "he said," and finally,
in verses 13 and 17, 20, etc., "And the LORD said." The whole narrative,
which begins with the appearance of the LORD, ends (v 33), "And the LORD
went His way."</span></b><span data-dcnode-id="3576" instrument_node="">
</span></p><p data-dcnode-id="3564"><span data-dcnode-id="3574" instrument_node="">
</span><b data-dcnode-id="3566"><span data-dcnode-id="3573" instrument_node="">
As we have in the number </span><i data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">one</span></i><span data-dcnode-id="3570" instrument_node=""> the sovereignty of the one God; and in
</span><i data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">two</span></i><span data-dcnode-id="3567" instrument_node=""> the second person, the Son, the great Deliverer; so in "three"
we have the third person, the Holy Spirit, marking and completing "the fulness
of the Godhead." This word "fulness" is remarkable, occurring only three
times, and in connection with the Three Persons of the Trinity:</span></b><span data-dcnode-id="3565" instrument_node="">
</span></p><ul data-dcnode-id="3550"><span data-dcnode-id="3563" instrument_node="">
</span><li data-dcnode-id="3560"><b data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">Ephesians 3:19, "The fulness
      of God.</span></b></li><span data-dcnode-id="3559" instrument_node="">
</span><li data-dcnode-id="3556"><b data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Ephesians 4:13, "The fulness
      of Christ."</span></b></li><span data-dcnode-id="3555" instrument_node="">
</span><li data-dcnode-id="3552"><b data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">Colossians 2:9, "The fulness
      of the Godhead."</span></b></li><span data-dcnode-id="3551" instrument_node="">
</span></ul><span data-dcnode-id="3549" instrument_node="">
</span><p data-dcnode-id="3544"><span data-dcnode-id="3548" instrument_node="">
</span><b data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">
The "fulness" was manifested visibly in Christ, and is communicated by the
Holy Spirit, for it is a fulness of which we receive by His mighty power
(John 1:16).</span></b><span data-dcnode-id="3545" instrument_node="">
</span></p><p data-dcnode-id="3533"><span data-dcnode-id="3543" instrument_node="">
</span><b data-dcnode-id="3538"><span data-dcnode-id="3542" instrument_node="">
This is why Abraham brought "three measures of meal" for his heavenly guest.
This is why "three measures of meal" formed the great meal offering; because
it set forth the perfection of Christ's perfect and Divine nature. In Leviticus
no particular quantity of meal was prescribed, but in Numbers 15:9, we read,
"Then shall he bring with the bullock a meal offering of THREE tenth deals
of flour." This was the measure for the whole burnt offering, and also for
great special occasions such as the New Moon and the New Year, etc. It was
also the special measure for the cleansing of the leper (Lev 14:10). The
poor leper had several gracious blessings beyond others. He alone was favoured
with the anointing which was given only to the Prophet, Priest, and King!
He alone had the priestly consecration. It is sinners who are </span><i data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">now</span></i><span data-dcnode-id="3539" instrument_node="">
singled out from the mass of those who are</span></b><span data-dcnode-id="3537" instrument_node=""> </span><b data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node=""> lost, and dead in trespasses and
sins, to be anointed with the Spirit, and made, in Christ, kings and priests
unto God.</span></b><span data-dcnode-id="3534" instrument_node="">
</span></p><p data-dcnode-id="3525"><span data-dcnode-id="3532" instrument_node="">
</span><b data-dcnode-id="3527"><span data-dcnode-id="3531" instrument_node="">
But there is more in these "three measures of meal." We have them in the
parable (Matt 13:33), pointing to Christ in all the perfection of His person
and His work, when He said, "Lo, I come to do Thy will, O God." There are
different opinions about the "leaven," but what is the "meal." This is the
point on which the interpretation turns. According to the popular interpretation,
this pure "meal" is the corrupt mass of mankind, and the defiling "leaven"
is the pure Gospel of Christ! Was there ever such an exhibition of man's
perversity in calling sweet bitter, and bitter sweet? Was there ever such
a proof that man's thoughts are contrary to God's? No! the "three measures
of meal" point us to the perfections of Christ and the purity of His Gospel.
And the hidden "leaven" points us to man's corruption of the Truth. A corruption
for which we have to look, not after the third century, but in the
</span><i data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">first</span></i><span data-dcnode-id="3528" instrument_node="">!</span></b><span data-dcnode-id="3526" instrument_node="">
</span></p><p data-dcnode-id="3520"><span data-dcnode-id="3524" instrument_node="">
</span><b data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">
No leaven could be put into any sacrifice or offering made by fire to the
LORD, because in Christ was no sin; therefore, there was to be no leaven.
He was, in Himself, "a sweet savour to Jehovah."</span></b><span data-dcnode-id="3521" instrument_node="">
</span></p><p data-dcnode-id="3512"><span data-dcnode-id="3519" instrument_node="">
</span><b data-dcnode-id="3514"><span data-dcnode-id="3518" instrument_node="">
True, in </span><i data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">one</span></i><span data-dcnode-id="3515" instrument_node=""> offering there was leaven. But mark the difference and
the lesson. In Leviticus 23 we have a list of the Feasts:--</span></b><span data-dcnode-id="3513" instrument_node="">
</span></p><ul data-dcnode-id="3495"><span data-dcnode-id="3511" instrument_node="">
</span><li data-dcnode-id="3508"><b data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">1st. The Passover (v 5),
      on the 14th day.</span></b></li><span data-dcnode-id="3507" instrument_node="">
</span><li data-dcnode-id="3504"><b data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">2nd. The wave-sheaf of
      first-fruits on the morrow after the Sabbath (v 11), which might be burnt
      on the altar as a sweet savour (Lev 2:14-16), because unleavened.</span></b></li><span data-dcnode-id="3503" instrument_node="">
</span><li data-dcnode-id="3497"><b data-dcnode-id="3498"><span data-dcnode-id="3502" instrument_node="">3rd. Then (50 days after)
      the oblation of the first-fruits at Pentecost (vv 15-17). This might not
      be burnt on the altar (Lev 2:12), because it was mixed with </span><i data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">leaven</span></i><span data-dcnode-id="3499" instrument_node="">!</span></b></li><span data-dcnode-id="3496" instrument_node="">
</span></ul><span data-dcnode-id="3494" instrument_node="">
</span><p data-dcnode-id="3490"><span data-dcnode-id="3493" instrument_node="">
</span><font data-dcnode-id="3492" face="book antiqua, times new roman, times"></font><span data-dcnode-id="3491" instrument_node="">
</span></p><p data-dcnode-id="3485"><span data-dcnode-id="3489" instrument_node="">
</span><b data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">
In the antitype of this we see Christ:--</span></b><span data-dcnode-id="3486" instrument_node="">
</span></p><ul data-dcnode-id="3462"><span data-dcnode-id="3484" instrument_node="">
</span><li data-dcnode-id="3481"><b data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">1st. Christ our Passover
      sacrificed for us.</span></b></li><span data-dcnode-id="3480" instrument_node="">
</span><li data-dcnode-id="3477"><b data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">2nd. As the wave-sheaf
      of first-fruits, He was raised from the dead and became the first-fruits
      of them that slept (1 Cor 15:20), for in Him there was no sin (and hence
      no leaven).</span></b></li><span data-dcnode-id="3476" instrument_node="">
</span><li data-dcnode-id="3464"><b data-dcnode-id="3465"><span data-dcnode-id="3475" instrument_node="">3rd. Then, after fifty
      days, on the Feast of Pentecost came the oblation of the first-fruits in
      the descent of the Holy Ghost; for "we are a kind of first-fruits of His
      creatures" (James 1:18). But His people are not without sin, therefore
      </span><i data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">this</span></i><span data-dcnode-id="3472" instrument_node=""> oblation had </span><i data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">leaven</span></i><span data-dcnode-id="3469" instrument_node=""> mixed with it. It could not be offered
      to the LORD as a "sweet savour" (Lev 2:12). It was accepted only because
      a </span><i data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">sin-offering was offered with it</span></i><span data-dcnode-id="3466" instrument_node=""> (Lev 23:18,19), and the Priest
      waved all together for a wave-offering before the LORD.</span></b></li><span data-dcnode-id="3463" instrument_node="">
</span></ul><span data-dcnode-id="3461" instrument_node="">
</span><p data-dcnode-id="3457"><span data-dcnode-id="3460" instrument_node="">
</span><font data-dcnode-id="3459" face="book antiqua, times new roman, times"></font><span data-dcnode-id="3458" instrument_node="">
</span></p><p data-dcnode-id="3452"><span data-dcnode-id="3456" instrument_node="">
</span><b data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">
This proves that the "leaven" is a type of error, evil, and sin. While the
"three measures of meal" with which it was mixed and hidden typified the
truth and purity of Christ and His Truth, and not the corrupt mass of mankind
amongst whom it was introduced. The popular interpretation reverses the types
of the meal and the leaven, and makes the leaven that which is good, and
the meal that which is evil. But the great Teacher made no such mistake.
"Church doctrine" is not "Bible truth," but it is leavened meal.</span></b><span data-dcnode-id="3453" instrument_node="">
</span></p><p data-dcnode-id="3429"><span data-dcnode-id="3451" instrument_node="">
</span><b data-dcnode-id="3431"><span data-dcnode-id="3450" instrument_node="">
The number </span><i data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">three</span></i><span data-dcnode-id="3447" instrument_node="">, therefore, must be taken as the number of </span><i data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">Divine
fulness</span></i><span data-dcnode-id="3444" instrument_node="">. It signifies and represents the Holy Spirit as taking of the
things of Christ and making them </span><i data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">real</span></i><span data-dcnode-id="3441" instrument_node=""> and </span><i data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">solid</span></i><span data-dcnode-id="3438" instrument_node=""> in our experience.
It is only by the Spirit that we realise spiritual things. Without Him and
His gracious operation, all is surface work: all is what a </span><i data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">plane</span></i><span data-dcnode-id="3435" instrument_node=""> figure
is to a </span><i data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">solid</span></i><span data-dcnode-id="3432" instrument_node=""> (John 3:6). He it is who has wrought all our works in
us, and by whom alone we can serve or worship (John 4:24).</span></b><span data-dcnode-id="3430" instrument_node="">
</span></p><p data-dcnode-id="3421"><span data-dcnode-id="3428" instrument_node="">
</span><b data-dcnode-id="3423"><span data-dcnode-id="3427" instrument_node="">
Hence it is that the Holy of Holies, which was the central and highest place
of worship, was a </span><i data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">cube</span></i><span data-dcnode-id="3424" instrument_node="">.</span></b><span data-dcnode-id="3422" instrument_node="">
</span></p><p data-dcnode-id="3401"><span data-dcnode-id="3420" instrument_node="">
</span><b data-dcnode-id="3412"><span data-dcnode-id="3419" instrument_node="">
Hence it is that the </span><i data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">third</span></i><span data-dcnode-id="3416" instrument_node=""> Book in the Bible is Leviticus, the book
in which we learn what true worship is. Here we see Jehovah calling His people
near unto Himself, prescribing every detail of their worship, leaving nothing
to their imagination or their taste, crowning all with the "MUST" of the
great rubric of John 4:24. In true worship we see the FATHER seeking these
true worshippers (John 4:23); the SON, the one object of all worship; and
the Spirit qualifying and enduring the worshippers with the only power in
which they can worship. Thus in </span><i data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">Genesis</span></i><span data-dcnode-id="3413" instrument_node=""> we have</span></b><span data-dcnode-id="3411" instrument_node=""> </span><b data-dcnode-id="3403"><span data-dcnode-id="3410" instrument_node=""> sovereignty in giving
life--the Father, the beginning of all things; in </span><i data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">Exodus</span></i><span data-dcnode-id="3407" instrument_node=""> we have the
oppressor and the Deliverer--the Son redeeming His people; while in
</span><i data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">Leviticus</span></i><span data-dcnode-id="3404" instrument_node=""> we have the Spirit prescribing, and ordering, and empowering
them for Divine worship.</span></b><span data-dcnode-id="3402" instrument_node="">
</span></p><p align="center" data-dcnode-id="3396"><span data-dcnode-id="3400" instrument_node="">
</span><b data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">
THE FIRST OCCURRENCE</span></b><span data-dcnode-id="3397" instrument_node="">
</span></p><p data-dcnode-id="3388"><span data-dcnode-id="3395" instrument_node="">
</span><b data-dcnode-id="3390"><span data-dcnode-id="3394" instrument_node="">
of the number is in Genesis 1:13. "The </span><i data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">third</span></i><span data-dcnode-id="3391" instrument_node=""> day" was the day on which
the earth was caused to rise up out of the water, symbolical of that resurrection
life which we have in Christ, and in which alone we can worship, or serve,
or do any "good works."</span></b><span data-dcnode-id="3389" instrument_node="">
</span></p><p data-dcnode-id="3365"><span data-dcnode-id="3387" instrument_node="">
</span><b data-dcnode-id="3367"><span data-dcnode-id="3386" instrument_node="">
Hence </span><i data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">three</span></i><span data-dcnode-id="3383" instrument_node=""> is a number of RESURRECTION, for it was on the
</span><i data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">third</span></i><span data-dcnode-id="3380" instrument_node=""> day that Jesus rose again from the dead. This was Divine in
operation, and Divine in its prophetic foreshowing in the person of Jonah
(Matt 12:39,40; Luke 11:29; Jonah 1:17). It was the </span><i data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">third</span></i><span data-dcnode-id="3377" instrument_node=""> day on which
Jesus was "perfected" (Luke 13:32). It was at the </span><i data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">third</span></i><span data-dcnode-id="3374" instrument_node=""> hour He was
crucified; and it was for </span><i data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">three</span></i><span data-dcnode-id="3371" instrument_node=""> hours (from the 6th to the 9th) that
darkness shrouded the Divine Sufferer and Redeemer. The "loud voice" at the
end of those twice three hours, when, "about the ninth hour," He cried, "My
God, My God, why hast Thou forsaken Me" (Matt 27:46), shows completely that
nothing of nature, nothing of the light or intelligence of this world, could
give help in that hour of darkness. Does not this show us </span><i data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">our</span></i><span data-dcnode-id="3368" instrument_node=""> impotence
in the matter? Does it not prove our incapacity to aid in delivering ourselves
from our natural condition?</span></b><span data-dcnode-id="3366" instrument_node="">
</span></p><p data-dcnode-id="3360"><span data-dcnode-id="3364" instrument_node="">
</span><b data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">
With the light at the ninth hour came the Divine declaration, "It is finished."
So divinely finished, completed, and perfected, that now there is no such
darkness for those who have died with Christ. Light, uninterrupted light,
shines upon all who are risen with Him; uninterrupted sunshine--even "the
glory of God in the face of Jesus Christ." That three hours' darkness, therefore,
testifies to our complete ruin, and our complete salvation, and shows that
His people are "complete in Him."</span></b><span data-dcnode-id="3361" instrument_node="">
</span></p><p data-dcnode-id="3355"><span data-dcnode-id="3359" instrument_node="">
</span><b data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">
While we are speaking of the Divine perfections of Christ, let us note the
many marks and seals of this completeness.</span></b><span data-dcnode-id="3356" instrument_node="">
</span></p><p data-dcnode-id="3350"><span data-dcnode-id="3354" instrument_node="">
</span><b data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">
"The Spirit, the water, and the blood," are the divinely perfect witness
to the grace of God on earth (1 John 5:7).</span></b><span data-dcnode-id="3351" instrument_node="">
</span></p><p data-dcnode-id="3345"><span data-dcnode-id="3349" instrument_node="">
</span><b data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">
The three years of His seeking fruit testifies to the completeness of Israel's
failure (Luke 13:7).</span></b><span data-dcnode-id="3346" instrument_node="">
</span></p><p data-dcnode-id="3340"><span data-dcnode-id="3344" instrument_node="">
</span><b data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">
His three-fold "it is written" shows that the Word of God is the perfection
of all ministry (Matt 4).</span></b><span data-dcnode-id="3341" instrument_node="">
</span></p><p data-dcnode-id="3335"><span data-dcnode-id="3339" instrument_node="">
</span><b data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">
The Divine testimony concerning Him was complete in the threefold voice from
Heaven (Matt 3:17, 17:5; John 12:28).</span></b><span data-dcnode-id="3336" instrument_node="">
</span></p><p data-dcnode-id="3327"><span data-dcnode-id="3334" instrument_node="">
</span><b data-dcnode-id="3329"><span data-dcnode-id="3333" instrument_node="">
He raised </span><i data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">three</span></i><span data-dcnode-id="3330" instrument_node=""> persons from the dead.</span></b><span data-dcnode-id="3328" instrument_node="">
</span></p><p data-dcnode-id="3322"><span data-dcnode-id="3326" instrument_node="">
</span><b data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">
The inscriptions on the Cross in three languages show the completeness of
His rejection by Man.</span></b><span data-dcnode-id="3323" instrument_node="">
</span></p><p data-dcnode-id="3317"><span data-dcnode-id="3321" instrument_node="">
</span><b data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">
The perfection of His offices are shown in His being Prophet, Priest, and
King, raised up from among His brethren (Deut 177:15, 18:3-5, and 18:15).</span></b><span data-dcnode-id="3318" instrument_node="">
</span></p><p data-dcnode-id="3312"><span data-dcnode-id="3316" instrument_node="">
</span><b data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">
The Divine completeness of the Shepherd's care (John 6:39), is seen in His
revelations as--</span></b><span data-dcnode-id="3313" instrument_node="">
</span></p><ul data-dcnode-id="3289"><span data-dcnode-id="3311" instrument_node="">
</span><li data-dcnode-id="3305"><b data-dcnode-id="3306"><span data-dcnode-id="3310" instrument_node="">The "Good Shepherd" in
      </span><i data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">death</span></i><span data-dcnode-id="3307" instrument_node="">, John 10:14.</span></b></li><span data-dcnode-id="3304" instrument_node="">
</span><li data-dcnode-id="3298"><b data-dcnode-id="3299"><span data-dcnode-id="3303" instrument_node="">The "Great Shepherd" in
      </span><i data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">resurrection</span></i><span data-dcnode-id="3300" instrument_node="">, Hebrews 13:20.</span></b></li><span data-dcnode-id="3297" instrument_node="">
</span><li data-dcnode-id="3291"><b data-dcnode-id="3292"><span data-dcnode-id="3296" instrument_node="">The "Chief Shepherd" in
      </span><i data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">glory</span></i><span data-dcnode-id="3293" instrument_node="">, 1 Peter 4:5.</span></b></li><span data-dcnode-id="3290" instrument_node="">
</span></ul><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">
&nbsp;
</span></p><p data-dcnode-id="3281"><span data-dcnode-id="3285" instrument_node="">
</span><b data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">
His three appearances in Hebrews 9 show that His work will not be divinely
perfect and complete until He appears again.</span></b><span data-dcnode-id="3282" instrument_node="">
</span></p><ol data-dcnode-id="3264"><span data-dcnode-id="3280" instrument_node="">
</span><li data-dcnode-id="3275"><span data-dcnode-id="3279" instrument_node="">
</span><b data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">
    He "hath appeared" in the end of the age to "put away sin," and to "bear
    the sins of many" (Hebrews 9:26,28).</span></b><span data-dcnode-id="3276" instrument_node="">
</span></li><li data-dcnode-id="3270"><span data-dcnode-id="3274" instrument_node="">
</span><b data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">
    "Now to appear in the presence of God for us," He has ascended into Heaven
    (v 24).</span></b><span data-dcnode-id="3271" instrument_node="">
</span></li><li data-dcnode-id="3265"><span data-dcnode-id="3269" instrument_node="">
</span><b data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">
    He "shall appear" again part from all question of sin for those who look
    for Him (v 28).</span></b><span data-dcnode-id="3266" instrument_node="">
</span></li></ol><span data-dcnode-id="3263" instrument_node="">
</span><p align="center" data-dcnode-id="3258"><span data-dcnode-id="3262" instrument_node="">
</span><b data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">
ABRAHAM'S COVENANT</span></b><span data-dcnode-id="3259" instrument_node="">
</span></p><p data-dcnode-id="3238"><span data-dcnode-id="3257" instrument_node="">
</span><b data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">
To go back to the Old Testament history we have God's Covenant with Abraham
stamped with this number of Divine perfection (Gen 15). It was (like David's,
2 Samuel 7) Divinely "ordered in all things, and sure." God was ONE, i.e.,
the one party to it; for Abraham, who would willingly have been</span></b><span data-dcnode-id="3254" instrument_node=""> </span><b data-dcnode-id="3240"><span data-dcnode-id="3253" instrument_node=""> the other
party, was put to sleep, that the Covenant might be </span><i data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">unconditional</span></i><span data-dcnode-id="3250" instrument_node="">,
and "sure to all his seed." The Divine seal is seen in the choice of
</span><i data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">three</span></i><span data-dcnode-id="3247" instrument_node=""> animals, each of </span><i data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">three</span></i><span data-dcnode-id="3244" instrument_node=""> years old (the heifer, the she-goat,
and the ram). These, together with the two birds (the dove and the pigeon),
made </span><i data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">five</span></i><span data-dcnode-id="3241" instrument_node=""> in all, marking it all as a perfect act of free-grace on
the part of a sovereign God.</span></b><span data-dcnode-id="3239" instrument_node="">
</span></p><p align="center" data-dcnode-id="3233"><span data-dcnode-id="3237" instrument_node="">
</span><b data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">
THE COMPLETE SEPARATION OF ISRAEL</span></b><span data-dcnode-id="3234" instrument_node="">
</span></p><p data-dcnode-id="3225"><span data-dcnode-id="3232" instrument_node="">
</span><b data-dcnode-id="3227"><span data-dcnode-id="3231" instrument_node="">
is shown in "</span><i data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">the three days' journey</span></i><span data-dcnode-id="3228" instrument_node=""> into the wilderness" (Exo 5:3),
marking the complete separation with which God would separate His people
from Egypt then, and from the world now. We can understand Pharaoh's objection
in first wishing them to hold their feast "in the land" (Exo 8:25), and when
that could not be, at last consenting to their going, but adding, "only ye
shall not go very far away." So Satan now, is well content that we should
worship "in the land"; and if we must go into the wilderness, that we should
be within easy reach of the world and its influences. Not so Jehovah. He
will have no such borderland service; He will have a "scientific frontier,"
a divinely perfect "three days' journey into the wilderness," completely
separating them from all their old associations. The difficulty of "drawing
the line," which so many Christians experience, arises from the fact that
it is a crooked line, and that it is an attempt to include that which cannot
be included. Drawn at a proper distance it can be ruled straight, and be
divinely perfect and effectual.</span></b><span data-dcnode-id="3226" instrument_node="">
</span></p><p align="center" data-dcnode-id="3220"><span data-dcnode-id="3224" instrument_node="">
</span><b data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">
THE SPIES</span></b><span data-dcnode-id="3221" instrument_node="">
</span></p><p data-dcnode-id="3212"><span data-dcnode-id="3219" instrument_node="">
</span><b data-dcnode-id="3214"><span data-dcnode-id="3218" instrument_node="">
brought </span><i data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">three</span></i><span data-dcnode-id="3215" instrument_node=""> things which testified to the divinely perfect goodness
of the land; and the substantial realities proved the truth of Jehovah's
word: "Grapes, figs, and pomegranates" (Num 13:23).</span></b><span data-dcnode-id="3213" instrument_node="">
</span></p><p align="center" data-dcnode-id="3207"><span data-dcnode-id="3211" instrument_node="">
</span><b data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">
AT THE GIVING OF THE LAW</span></b><span data-dcnode-id="3208" instrument_node="">
</span></p><p data-dcnode-id="3199"><span data-dcnode-id="3206" instrument_node="">
</span><b data-dcnode-id="3201"><span data-dcnode-id="3205" instrument_node="">
</span><i data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">three</span></i><span data-dcnode-id="3202" instrument_node=""> times Israel said, "All that the LORD hath spoken we will do"
(Exo 19:8, 24:3,7), marking the completeness of the Covenant-making on the
part of Israel; but from that very reason foreshadowing its perfect breach,
for man has never yet kept any Covenant which he made with God.</span></b><span data-dcnode-id="3200" instrument_node="">
</span></p><p align="center" data-dcnode-id="3194"><span data-dcnode-id="3198" instrument_node="">
</span><b data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">
AHIMAN, SHESHAI, AND TALMAI,</span></b><span data-dcnode-id="3195" instrument_node="">
</span></p><p data-dcnode-id="3189"><span data-dcnode-id="3193" instrument_node="">
</span><b data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">
were the three children of Anak, marking the completeness of the giant power
of the enemy (Num 13:22).</span></b><span data-dcnode-id="3190" instrument_node="">
</span></p><p align="center" data-dcnode-id="3184"><span data-dcnode-id="3188" instrument_node="">
</span><b data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">
JORDAN</span></b><span data-dcnode-id="3185" instrument_node="">
</span></p><p data-dcnode-id="3179"><span data-dcnode-id="3183" instrument_node="">
</span><b data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">
was three times divided, the perfection of the Divine miracle (Josh 4; 2
Kings 2:8,14).</span></b><span data-dcnode-id="3180" instrument_node="">
</span></p><p align="center" data-dcnode-id="3174"><span data-dcnode-id="3178" instrument_node="">
</span><b data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">
THE THREE DAYS' SEARCH</span></b><span data-dcnode-id="3175" instrument_node="">
</span></p><p data-dcnode-id="3169"><span data-dcnode-id="3173" instrument_node="">
</span><b data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">
for Elijah was conclusive testimony that he could not be found (2 Kings 2:17).</span></b><span data-dcnode-id="3170" instrument_node="">
</span></p><p align="center" data-dcnode-id="3164"><span data-dcnode-id="3168" instrument_node="">
</span><b data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">
THE TEMPLE</span></b><span data-dcnode-id="3165" instrument_node="">
</span></p><p data-dcnode-id="3144"><span data-dcnode-id="3163" instrument_node="">
</span><b data-dcnode-id="3146"><span data-dcnode-id="3162" instrument_node="">
is marked by </span><i data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">three</span></i><span data-dcnode-id="3159" instrument_node="">, as the Tabernacle is by </span><i data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">five</span></i><span data-dcnode-id="3156" instrument_node="">. The Holy
of Holies in each was a cube; in the Tabernacle a cube of ten cubits; in
the Temple a cube of twenty cubits. Each consisted of </span><i data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">three</span></i><span data-dcnode-id="3153" instrument_node=""> parts:--The
Court, the Holy Place, and the Sanctuary. The Temple had </span><i data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">three</span></i><span data-dcnode-id="3150" instrument_node=""> chambers
round about. The Brazen Sea or Laver held </span><i data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">three</span></i><span data-dcnode-id="3147" instrument_node=""> thousand baths; and
was compassed by a line of thirty cubits on which were 300 knops (1 Kings
7:24). It was supported by twelve oxen (3x4); three looking north, three
looking west, three looking south, and three looking east. This order in
naming the points of the compass occurs nowhere else. It is the same in both
accounts of Kings and Chronicles (see 1 Kings 7:25; 2 Chron 4:4,5). Why is
this? Is it because this was the order in which the Gospel was to be afterwards
preached throughout the world? Whether this was the reason or not, the fact
remains that the Gospel was preached first in the north (Samaria, Damascus,
Antioch); then in the west (Caesarea, Joppa, Cyprus, Corinth, Rome); then
in the south (Alexandria and Egypt); then in the east (Mesopotamia, Babylon,
Persia, India).</span></b><span data-dcnode-id="3145" instrument_node="">
</span></p><p align="center" data-dcnode-id="3139"><span data-dcnode-id="3143" instrument_node="">
</span><b data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">
THE GREAT FEASTS</span></b><span data-dcnode-id="3140" instrument_node="">
</span></p><p data-dcnode-id="3134"><span data-dcnode-id="3138" instrument_node="">
</span><b data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">
were three; Unleavened Bread, Weeks, Tabernacles (Deut 16:16).</span></b><span data-dcnode-id="3135" instrument_node="">
</span></p><p align="center" data-dcnode-id="3129"><span data-dcnode-id="3133" instrument_node="">
</span><b data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">
THE SHEET</span></b><span data-dcnode-id="3130" instrument_node="">
</span></p><p data-dcnode-id="3121"><span data-dcnode-id="3128" instrument_node="">
</span><b data-dcnode-id="3123"><span data-dcnode-id="3127" instrument_node="">
let down </span><i data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">three</span></i><span data-dcnode-id="3124" instrument_node=""> times to Peter was the fulness of the testimony as
to the admission of the Gentiles into the Church (Acts 10:16).</span></b><span data-dcnode-id="3122" instrument_node="">
</span></p><p align="center" data-dcnode-id="3116"><span data-dcnode-id="3120" instrument_node="">
</span><b data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">
THE OLD TESTAMENT</span></b><span data-dcnode-id="3117" instrument_node="">
</span></p><p data-dcnode-id="3108"><span data-dcnode-id="3115" instrument_node="">
</span><b data-dcnode-id="3110"><span data-dcnode-id="3114" instrument_node="">
Testimony was complete and perfect in its </span><i data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">three</span></i><span data-dcnode-id="3111" instrument_node="">-fold division--Law,
Prophets, and Psalms (Luke 24:44). The same three divisions mark its character
to the present day.</span></b><span data-dcnode-id="3109" instrument_node="">
</span></p><p align="center" data-dcnode-id="3103"><span data-dcnode-id="3107" instrument_node="">
</span><b data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">
"TWO OR THREE"</span></b><span data-dcnode-id="3104" instrument_node="">
</span></p><p data-dcnode-id="3095"><span data-dcnode-id="3102" instrument_node="">
</span><b data-dcnode-id="3097"><span data-dcnode-id="3101" instrument_node="">
As </span><i data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">three</span></i><span data-dcnode-id="3098" instrument_node=""> marks completeness and perfection of testimony, so it marks
the number of spiritual worshippers; and intimates that true spiritual
worshippers would always be few.</span></b><span data-dcnode-id="3096" instrument_node="">
</span></p><p align="center" data-dcnode-id="3090"><span data-dcnode-id="3094" instrument_node="">
</span><b data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">
COMPLETENESS OF PEOPLE</span></b><span data-dcnode-id="3091" instrument_node="">
</span></p><ul data-dcnode-id="3060"><span data-dcnode-id="3089" instrument_node="">
</span><li data-dcnode-id="3086"><b data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">Shem, Ham, and Japheth.</span></b></li><span data-dcnode-id="3085" instrument_node="">
</span><li data-dcnode-id="3082"><b data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">Abraham, Isaac, and Jacob.</span></b></li><span data-dcnode-id="3081" instrument_node="">
</span><li data-dcnode-id="3078"><b data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">Gershom, Kohath, and Merari.</span></b></li><span data-dcnode-id="3077" instrument_node="">
</span><li data-dcnode-id="3074"><b data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Saul, David, and Solomon.</span></b></li><span data-dcnode-id="3073" instrument_node="">
</span><li data-dcnode-id="3070"><b data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">Noah, Daniel, and Job.</span></b></li><span data-dcnode-id="3069" instrument_node="">
</span><li data-dcnode-id="3066"><b data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Shadrach, Meshach, and
      Abednego.</span></b></li><span data-dcnode-id="3065" instrument_node="">
</span><li data-dcnode-id="3062"><b data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">Peter, James, and John,
      etc.</span></b></li><span data-dcnode-id="3061" instrument_node="">
