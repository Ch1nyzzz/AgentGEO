</span></p><p data-dcnode-id="967"><span data-dcnode-id="971" instrument_node="">
</span><b data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">
	    The "key" is the three triangles and the quarter section. The quarter section
	    represents the material or physical world. The triangles are&nbsp;the Spiritual
	    worlds and the personal/ impersonal relationships existing therein. Four
	    and three are seven: the perfection of man in Christ. &nbsp;The significant
	    directions are North and East.&nbsp;</span></b><span data-dcnode-id="968" instrument_node="">
</span></p><p data-dcnode-id="962"><span data-dcnode-id="966" instrument_node="">
</span><b data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">
	    The alphanumeric sum of NORTH, SOUTH, EAST, WEST is 270, a number which reduces
	    to 9 and is, of course, three 3's. But it so&nbsp;happens that the only combination
	    of two directions that sums to a 3-number is NORTH and EAST:</span></b><span data-dcnode-id="963" instrument_node="">
</span></p><p data-dcnode-id="957"><span data-dcnode-id="961" instrument_node="">
</span><b data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">
	    (NORTH)75 + (EAST)45 = 120 =1+2+0 = 3.</span></b><span data-dcnode-id="958" instrument_node="">
</span></p><p data-dcnode-id="950"><span data-dcnode-id="956" instrument_node="">
</span><b data-dcnode-id="952"><span data-dcnode-id="955" instrument_node="">
	    Then somewhere on your page, or maybe it was on one of the pages you linked,
	    there was a discussion about "the three children&nbsp;</span><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">
 of Anak". They were Ahiman,
	    Sheshai, and Talmai.</span></b><span data-dcnode-id="951" instrument_node="">
</span></p><p data-dcnode-id="945"><span data-dcnode-id="949" instrument_node="">
</span><b data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">
	    ANAK=27 (a base 10 harmonic of 270 as in NORTH+SOUTH+EAST+WEST), which reduces
	    to 9, or three 3's.</span></b><span data-dcnode-id="946" instrument_node="">
</span></p><p data-dcnode-id="940"><span data-dcnode-id="944" instrument_node="">
</span><b data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">
	    The alphanumeric sum of these three names (AHIMAN+SHESHAI+TALMAI) is 171,
	    which reduces to 9, which is three 3's.</span></b><span data-dcnode-id="941" instrument_node="">
</span></p><p data-dcnode-id="935"><span data-dcnode-id="939" instrument_node="">
</span><b data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">
	    And the phrase:</span></b><span data-dcnode-id="936" instrument_node="">
</span></p><p data-dcnode-id="930"><span data-dcnode-id="934" instrument_node="">
</span><b data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">
	    "THE THREE CHILDREN OF ANAK" = 210 = 2+1+0 = 3</span></b><span data-dcnode-id="931" instrument_node="">
</span></p><p data-dcnode-id="925"><span data-dcnode-id="929" instrument_node="">
</span><b data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">
	    Again, either on your page or on one of the linked pages, there was a discussion
	    on the three attributes of God: Love, Spirit, Light.</span></b><span data-dcnode-id="926" instrument_node="">
</span></p><p data-dcnode-id="920"><span data-dcnode-id="924" instrument_node="">
</span><b data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">

</span></p><p data-dcnode-id="915"><span data-dcnode-id="919" instrument_node="">
</span><b data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">
	    Also, the three phrases used on the page were:</span></b><span data-dcnode-id="916" instrument_node="">
</span></p><p data-dcnode-id="910"><span data-dcnode-id="914" instrument_node="">
</span><b data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">

</span></p><p data-dcnode-id="905"><span data-dcnode-id="909" instrument_node="">
</span><b data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">

</span></p><p data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">
</span><b data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">

</span></p><p data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">
</span><b data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">

</span><b data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">

</span><b data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">

</span></p><p data-dcnode-id="870"><span data-dcnode-id="874" instrument_node="">
</span><b data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">

</span><b data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">

</span><b data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">

</span><b data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">

</span></p><p data-dcnode-id="847"><span data-dcnode-id="854" instrument_node="">
</span><b data-dcnode-id="849"><span data-dcnode-id="853" instrument_node="">

</span><b data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">

</span><b data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">
