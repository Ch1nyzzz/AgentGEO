</span></p><p align="center" data-dcnode-id="3052"><span data-dcnode-id="3056" instrument_node="">
</span><b data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">
COMPLETENESS OF APOSTASY (Jude 11)</span></b><span data-dcnode-id="3053" instrument_node="">
</span></p><ul data-dcnode-id="3038"><span data-dcnode-id="3051" instrument_node="">
</span><li data-dcnode-id="3048"><b data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">"The way of Cain."</span></b></li><span data-dcnode-id="3047" instrument_node="">
</span><li data-dcnode-id="3044"><b data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">"The error of Balaam."</span></b></li><span data-dcnode-id="3043" instrument_node="">
</span><li data-dcnode-id="3040"><b data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">"The gainsaying of Korah."</span></b></li><span data-dcnode-id="3039" instrument_node="">
</span></ul><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">
&nbsp;
</span></p><p align="center" data-dcnode-id="3030"><span data-dcnode-id="3034" instrument_node="">
</span><b data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">
COMPLETENESS OF DIVINE JUDGMENT (Daniel 6:25-28).</span></b><span data-dcnode-id="3031" instrument_node="">
</span></p><ul data-dcnode-id="3016"><span data-dcnode-id="3029" instrument_node="">
</span><li data-dcnode-id="3026"><b data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">MENE. God hath NUMBERED
      thy kingdom and finished it.</span></b></li><span data-dcnode-id="3025" instrument_node="">
</span><li data-dcnode-id="3022"><b data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">TEKEL. Thou art WEIGHED
      in the balances and found wanting.</span></b></li><span data-dcnode-id="3021" instrument_node="">
</span><li data-dcnode-id="3018"><b data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">PERES. Thy kingdom is DIVIDED
      and given to the Medes and Persians.</span></b></li><span data-dcnode-id="3017" instrument_node="">
</span></ul><span data-dcnode-id="3015" instrument_node="">
</span><p data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">
&nbsp;
</span></p><p align="center" data-dcnode-id="3008"><span data-dcnode-id="3012" instrument_node="">
</span><b data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">
THE THREE GIFTS OF GRACE:</span></b><span data-dcnode-id="3009" instrument_node="">
</span></p><p data-dcnode-id="3003"><span data-dcnode-id="3007" instrument_node="">
</span><b data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">
Faith, Hope, and Love, five times repeated.</span></b><span data-dcnode-id="3004" instrument_node="">
</span></p><p align="center" data-dcnode-id="2998"><span data-dcnode-id="3002" instrument_node="">
</span><b data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">
THE THREE-FOLD NATURE OF MAN:</span></b><span data-dcnode-id="2999" instrument_node="">
</span></p><p data-dcnode-id="2993"><span data-dcnode-id="2997" instrument_node="">
</span><b data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">
Spirit, and Soul, and Body, the man consisting of neither separately, but
of the whole three together.</span></b><span data-dcnode-id="2994" instrument_node="">
</span></p><p align="center" data-dcnode-id="2988"><span data-dcnode-id="2992" instrument_node="">
</span><b data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">
THE THREE-FOLD NATURE OF TEMPTATION (1 John 2:16)</span></b><span data-dcnode-id="2989" instrument_node="">
</span></p><ul data-dcnode-id="2974"><span data-dcnode-id="2987" instrument_node="">
</span><li data-dcnode-id="2984"><b data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">"The lust of the flesh."</span></b></li><span data-dcnode-id="2983" instrument_node="">
</span><li data-dcnode-id="2980"><b data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">"The lust of the eyes."</span></b></li><span data-dcnode-id="2979" instrument_node="">
</span><li data-dcnode-id="2976"><b data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">"The pride of life."</span></b></li><span data-dcnode-id="2975" instrument_node="">
</span></ul><span data-dcnode-id="2973" instrument_node="">
</span><p data-dcnode-id="2969"><span data-dcnode-id="2972" instrument_node="">
</span><font data-dcnode-id="2971" face="book antiqua, times new roman, times"></font><span data-dcnode-id="2970" instrument_node="">
</span></p><p data-dcnode-id="2964"><span data-dcnode-id="2968" instrument_node="">
</span><b data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">
These seen in our first parents when Eve saw (Gen 3:6) that the Tree of Knowledge
of Good and Evil was--</span></b><span data-dcnode-id="2965" instrument_node="">
</span></p><ul data-dcnode-id="2950"><span data-dcnode-id="2963" instrument_node="">
</span><li data-dcnode-id="2960"><b data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">"Good for food,"</span></b></li><span data-dcnode-id="2959" instrument_node="">
</span><li data-dcnode-id="2956"><b data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">"Pleasant to the eyes,"</span></b></li><span data-dcnode-id="2955" instrument_node="">
</span><li data-dcnode-id="2952"><b data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">"To be desired to make
      one wise."</span></b></li><span data-dcnode-id="2951" instrument_node="">
</span></ul><span data-dcnode-id="2949" instrument_node="">
</span><p data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">
&nbsp;
</span></p><p align="center" data-dcnode-id="2942"><span data-dcnode-id="2946" instrument_node="">
</span><b data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">
THE THREE-FOLD CORRUPTION OF GOD'S WORD</span></b><span data-dcnode-id="2943" instrument_node="">
</span></p><p data-dcnode-id="2937"><span data-dcnode-id="2941" instrument_node="">
</span><b data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">
By taking from, adding to, and altering.</span></b><span data-dcnode-id="2938" instrument_node="">
</span></p><p data-dcnode-id="2929"><span data-dcnode-id="2936" instrument_node="">
</span><b data-dcnode-id="2931"><span data-dcnode-id="2935" instrument_node="">
This led up to the </span><i data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">first</span></i><span data-dcnode-id="2932" instrument_node=""> sin.</span></b><span data-dcnode-id="2930" instrument_node="">
</span></p><ol data-dcnode-id="2903"><span data-dcnode-id="2928" instrument_node="">
</span><li data-dcnode-id="2920"><span data-dcnode-id="2927" instrument_node="">
</span><b data-dcnode-id="2922"><span data-dcnode-id="2926" instrument_node="">
    God had said, "of every tree in the garden thou mayest FREELY eat" (Gen 2:16).
    In repeating this, Eve </span><i data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">omitted</span></i><span data-dcnode-id="2923" instrument_node=""> the word "freely" (3:2), making God
    less bountiful than He was.</span></b><span data-dcnode-id="2921" instrument_node="">
</span></li><li data-dcnode-id="2912"><span data-dcnode-id="2919" instrument_node="">
</span><b data-dcnode-id="2914"><span data-dcnode-id="2918" instrument_node="">
    God had said, "But of the Tree of the Knowledge of Good and Evil, thou shalt
    not eat of it" (Gen 2:17). In repeating this Eve </span><i data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">added</span></i><span data-dcnode-id="2915" instrument_node=""> the words,
    "NEITHER SHALL YE TOUCH IT" (3:3), making God more severe than He was.</span></b><span data-dcnode-id="2913" instrument_node="">
</span></li><li data-dcnode-id="2904"><span data-dcnode-id="2911" instrument_node="">
</span><b data-dcnode-id="2906"><span data-dcnode-id="2910" instrument_node="">
    God had said, "Thou shalt SURELY die" (Gen 3:17). In repeating this Eve
    </span><i data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">altered</span></i><span data-dcnode-id="2907" instrument_node=""> it to "LEST ye die" (3:3), thus weakening the certainty of
    the Divine threat into a contingency.</span></b><span data-dcnode-id="2905" instrument_node="">
</span></li></ol><span data-dcnode-id="2902" instrument_node="">
</span><p data-dcnode-id="2897"><span data-dcnode-id="2901" instrument_node="">
</span><b data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">
No wonder that dealing thus with the Word of God she listened to the words
of the Devil, and became an easy prey to his guile with which he deceived
her.</span></b><span data-dcnode-id="2898" instrument_node="">
</span></p><p data-dcnode-id="2880"><span data-dcnode-id="2896" instrument_node="">
</span><b data-dcnode-id="2882"><span data-dcnode-id="2895" instrument_node="">
No wonder also that "the second man," "the last Adam," when He was tempted
by the same tempter, </span><i data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">three</span></i><span data-dcnode-id="2892" instrument_node=""> times repeated the words "It is written"!
as though to call attention to the occasion of the Fall in the three-fold
perversions of God's words. "It is written," and I will not </span><i data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">omit</span></i><span data-dcnode-id="2889" instrument_node=""> anything
from it; "It is written," and I will not </span><i data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">add</span></i><span data-dcnode-id="2886" instrument_node=""> anything to it; "It is
written," and I will not </span><i data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">alter</span></i><span data-dcnode-id="2883" instrument_node=""> it. It is worthy of note that both
the temptations began in precisely the same way, by the Tempter questioning
the truth of Jehovah's Word. In the former saying, "Hath God said?" In the
latter saying "If Thou be the Son of God" (Matt 4:3), when the voice from
Heaven had only just declared, "This IS My beloved Son" (Matt 3:17).</span></b><span data-dcnode-id="2881" instrument_node="">
</span></p><p align="center" data-dcnode-id="2875"><span data-dcnode-id="2879" instrument_node="">
</span><b data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">
MAN'S THREE GREAT ENEMIES</span></b><span data-dcnode-id="2876" instrument_node="">
</span></p><p data-dcnode-id="2870"><span data-dcnode-id="2874" instrument_node="">
</span><b data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">
are "the World, the Flesh, and the Devil":</span></b><span data-dcnode-id="2871" instrument_node="">
</span></p><ol data-dcnode-id="2853"><span data-dcnode-id="2869" instrument_node="">
</span><li data-dcnode-id="2864"><span data-dcnode-id="2868" instrument_node="">
</span><b data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">
    The World is set over against the Father (1 John 2:15,16).</span></b><span data-dcnode-id="2865" instrument_node="">
</span></li><li data-dcnode-id="2859"><span data-dcnode-id="2863" instrument_node="">
</span><b data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">
    The Flesh is set over against the Spirit (Gal 5:17).</span></b><span data-dcnode-id="2860" instrument_node="">
</span></li><li data-dcnode-id="2854"><span data-dcnode-id="2858" instrument_node="">
</span><b data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">
    The Devil is set over against the son (the Living Word, Matthew 4:1, etc,
    and 1 John 3:8; and the Written Word, John 8:44).</span></b><span data-dcnode-id="2855" instrument_node="">
</span></li></ol><span data-dcnode-id="2852" instrument_node="">
</span><p align="center" data-dcnode-id="2847"><span data-dcnode-id="2851" instrument_node="">
</span><b data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">
"ASK OF ME"</span></b><span data-dcnode-id="2848" instrument_node="">
</span></p><p data-dcnode-id="2842"><span data-dcnode-id="2846" instrument_node="">
</span><b data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">
To three people did God give this command:</span></b><span data-dcnode-id="2843" instrument_node="">
</span></p><ul data-dcnode-id="2828"><span data-dcnode-id="2841" instrument_node="">
</span><li data-dcnode-id="2838"><b data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">To Solomon (1 Kings 3:5).</span></b></li><span data-dcnode-id="2837" instrument_node="">
</span><li data-dcnode-id="2834"><b data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">To Ahaz (Isa 7:11).</span></b></li><span data-dcnode-id="2833" instrument_node="">
</span><li data-dcnode-id="2830"><b data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">And to the Messiah (Psa
      2:9).</span></b></li><span data-dcnode-id="2829" instrument_node="">
</span></ul><span data-dcnode-id="2827" instrument_node="">
</span><p data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">
&nbsp;
</span></p><p align="center" data-dcnode-id="2820"><span data-dcnode-id="2824" instrument_node="">
</span><b data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">
THE THREE PRAYERS OF MARK V</span></b><span data-dcnode-id="2821" instrument_node="">
</span></p><p data-dcnode-id="2815"><span data-dcnode-id="2819" instrument_node="">
</span><b data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">
form a divinely perfect lesson as to prayer and its answer.</span></b><span data-dcnode-id="2816" instrument_node="">
</span></p><ol data-dcnode-id="2789"><span data-dcnode-id="2814" instrument_node="">
</span><li data-dcnode-id="2806"><span data-dcnode-id="2813" instrument_node="">
</span><b data-dcnode-id="2808"><span data-dcnode-id="2812" instrument_node="">
    Prayer was made by the Legion of </span><i data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Devils</span></i><span data-dcnode-id="2809" instrument_node="">, who "BESOUGHT Him, saying,
    Send us into the herd of swine...and forthwith Jesus gave them leave" (vv
    12,13).</span></b><span data-dcnode-id="2807" instrument_node="">
</span></li><li data-dcnode-id="2798"><span data-dcnode-id="2805" instrument_node="">
</span><b data-dcnode-id="2800"><span data-dcnode-id="2804" instrument_node="">
    Prayer was made by the </span><i data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Gadarenes</span></i><span data-dcnode-id="2801" instrument_node="">, who "began to PRAY Him to depart
    out of their coasts" (v 17). Jesus granted their request, and departed at
    once (v 18).</span></b><span data-dcnode-id="2799" instrument_node="">
</span></li><li data-dcnode-id="2790"><span data-dcnode-id="2797" instrument_node="">
</span><b data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">
    Prayer was made by the man who had just been the recipient of marvellous
    grace and healing, who "PRAYED Him that he might be with</span></b><span data-dcnode-id="2794" instrument_node=""> </span><b data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node=""> Him. Howbeit Jesus
    suffered him not" (vv 18,19).</span></b><span data-dcnode-id="2791" instrument_node="">
</span></li></ol><span data-dcnode-id="2788" instrument_node="">
</span><p data-dcnode-id="2774"><span data-dcnode-id="2787" instrument_node="">
</span><b data-dcnode-id="2776"><span data-dcnode-id="2786" instrument_node="">
From this we learn the perfect lesson with regard to prayer, that "</span><i data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">No</span></i><span data-dcnode-id="2783" instrument_node="">"
is an </span><i data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">answer</span></i><span data-dcnode-id="2780" instrument_node=""> as well as "</span><i data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Yes</span></i><span data-dcnode-id="2777" instrument_node="">"; and "No" is answered always
with the same omnipotent grace, infinite wisdom, and perfect love as "Yes."
We hear much about "definiteness in prayer." Surely the knowledge of one's
intense ignorance as to what is best and wise for us, will make us say more
definitely than ever, in the words of Him through whose merits alone prayer
is heard at all, "Thy will be done."</span></b><span data-dcnode-id="2775" instrument_node="">
</span></p><p align="center" data-dcnode-id="2767"><span data-dcnode-id="2773" instrument_node="">
</span><b data-dcnode-id="2769"><span data-dcnode-id="2772" instrument_node="">
THREE THINGS PREDICATED OF GOD </span><br data-dcnode-id="2771"><span data-dcnode-id="2770" instrument_node="">
(in John's Gospel and Epistles)</span></b><span data-dcnode-id="2768" instrument_node="">
</span></p><ul data-dcnode-id="2753"><span data-dcnode-id="2766" instrument_node="">
</span><li data-dcnode-id="2763"><b data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">"God is love" (1 John 4:8,16).
      We are therefore to "Walk in love" (Eph 5:2).</span></b></li><span data-dcnode-id="2762" instrument_node="">
</span><li data-dcnode-id="2759"><b data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">"God is spirit" (John 4:24,
      RV, margin). We are exhorted to "Walk in the spirit" (Gal 5:16).</span></b></li><span data-dcnode-id="2758" instrument_node="">
</span><li data-dcnode-id="2755"><b data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">"God is light" (1 John
      1:5). We are to "Walk in the light" (Eph 5:8).</span></b></li><span data-dcnode-id="2754" instrument_node="">
</span></ul><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">
&nbsp;
</span></p><p data-dcnode-id="2742"><span data-dcnode-id="2749" instrument_node="">
</span><b data-dcnode-id="2744"><span data-dcnode-id="2748" instrument_node="">
There are a multitude of </span><i data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Threes</span></i><span data-dcnode-id="2745" instrument_node=""> or Triads, and they all bespeak the
same Divine perfection and completeness wherever they are found.</span></b><span data-dcnode-id="2743" instrument_node="">
</span></p><p align="center" data-dcnode-id="2737"><span data-dcnode-id="2741" instrument_node="">
</span><b data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">
REVELATION 1</span></b><span data-dcnode-id="2738" instrument_node="">
</span></p><p data-dcnode-id="2732"><span data-dcnode-id="2736" instrument_node="">
</span><b data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">
The first or introductory section of the Apocalypse of Jesus Christ is specially
marked by this great Divine seal stamped upon it in chapter 1.</span></b><span data-dcnode-id="2733" instrument_node="">
</span></p><ul data-dcnode-id="2638"><span data-dcnode-id="2731" instrument_node="">
</span><li data-dcnode-id="2713"><b data-dcnode-id="2714"><span data-dcnode-id="2730" instrument_node="">v. 1. This Revelation is--
      </span><br data-dcnode-id="2729"><span data-dcnode-id="2728" instrument_node="">
      Divinely </span><i data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">given</span></i><span data-dcnode-id="2725" instrument_node="">, </span><br data-dcnode-id="2724"><span data-dcnode-id="2723" instrument_node="">
      Divinely </span><i data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">sent</span></i><span data-dcnode-id="2720" instrument_node="">, </span><br data-dcnode-id="2719"><span data-dcnode-id="2718" instrument_node="">
      Divinely </span><i data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">signified</span></i><span data-dcnode-id="2715" instrument_node="">.</span></b></li><span data-dcnode-id="2712" instrument_node="">
</span><li data-dcnode-id="2703"><b data-dcnode-id="2704"><span data-dcnode-id="2711" instrument_node="">v. 2. John bare record
      of-- </span><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">
      The Divine "Word of God." </span><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node="">
      The Divine witness ("the Testimony of Jesus Christ"). </span><br data-dcnode-id="2706"><span data-dcnode-id="2705" instrument_node="">
      The Divine vision ("all things that he saw").</span></b></li><span data-dcnode-id="2702" instrument_node="">
</span><li data-dcnode-id="2693"><b data-dcnode-id="2694"><span data-dcnode-id="2701" instrument_node="">v. 3. The Divine blessing
      on-- </span><br data-dcnode-id="2700"><span data-dcnode-id="2699" instrument_node="">
      The reader, </span><br data-dcnode-id="2698"><span data-dcnode-id="2697" instrument_node="">
      The hearer, and </span><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">
      The keeper of this record.</span></b></li><span data-dcnode-id="2692" instrument_node="">
</span><li data-dcnode-id="2683"><b data-dcnode-id="2684"><span data-dcnode-id="2691" instrument_node="">vv. 4 and 8. The Divine
      Being-- </span><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node="">
      Which was, </span><br data-dcnode-id="2688"><span data-dcnode-id="2687" instrument_node="">
      And which is, </span><br data-dcnode-id="2686"><span data-dcnode-id="2685" instrument_node="">
      And which is to come.</span></b></li><span data-dcnode-id="2682" instrument_node="">
</span><li data-dcnode-id="2670"><b data-dcnode-id="2676"><span data-dcnode-id="2681" instrument_node="">v. 5. The Coming Lord is
      presented as-- </span><br data-dcnode-id="2680"><span data-dcnode-id="2679" instrument_node="">
      The Divine Prophet ("the faithful witness"). </span><br data-dcnode-id="2678"><span data-dcnode-id="2677" instrument_node="">
      The Divine Priest ("the first-begotten from the dead")</span></b><span data-dcnode-id="2675" instrument_node="">. </span><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">
</span><b data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">
      The Divine King ("the Prince of the kings of the earth").</span></b></li><span data-dcnode-id="2669" instrument_node="">
</span><li data-dcnode-id="2660"><b data-dcnode-id="2661"><span data-dcnode-id="2668" instrument_node="">vv. 5, 6. His people are
      Divinely-- </span><br data-dcnode-id="2667"><span data-dcnode-id="2666" instrument_node="">
      Loved, </span><br data-dcnode-id="2665"><span data-dcnode-id="2664" instrument_node="">
      Cleansed, and </span><br data-dcnode-id="2663"><span data-dcnode-id="2662" instrument_node="">
      Crowned.</span></b></li><span data-dcnode-id="2659" instrument_node="">
</span><li data-dcnode-id="2650"><b data-dcnode-id="2651"><span data-dcnode-id="2658" instrument_node="">vv. 17, 18. Christ is presented
      as-- </span><br data-dcnode-id="2657"><span data-dcnode-id="2656" instrument_node="">
      "The first and the last" (Divinely eternal). </span><br data-dcnode-id="2655"><span data-dcnode-id="2654" instrument_node="">
      The dead and living One (Divinely living). </span><br data-dcnode-id="2653"><span data-dcnode-id="2652" instrument_node="">
      The omnipotent One (Divinely powerful).</span></b></li><span data-dcnode-id="2649" instrument_node="">
</span><li data-dcnode-id="2640"><b data-dcnode-id="2641"><span data-dcnode-id="2648" instrument_node="">v. 19. The Divine Revelation--
      </span><br data-dcnode-id="2647"><span data-dcnode-id="2646" instrument_node="">
      The things which thou hast seen, </span><br data-dcnode-id="2645"><span data-dcnode-id="2644" instrument_node="">
      Which are, and </span><br data-dcnode-id="2643"><span data-dcnode-id="2642" instrument_node="">
      Which shall be after these things.</span></b></li><span data-dcnode-id="2639" instrument_node="">
</span></ul><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">
&nbsp;
</span></p><p align="center" data-dcnode-id="2630"><span data-dcnode-id="2634" instrument_node="">
</span><b data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">
WORDS THAT OCCUR THREE TIMES</span></b><span data-dcnode-id="2631" instrument_node="">
</span></p><p data-dcnode-id="2625"><span data-dcnode-id="2629" instrument_node="">
</span><b data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">
refer also in various ways to some Divinely perfect matter. We append a few
examples, which may be studied in order to search out the lessons:--</span></b><span data-dcnode-id="2626" instrument_node="">
</span></p><ul data-dcnode-id="2567"><span data-dcnode-id="2624" instrument_node="">
</span><li data-dcnode-id="2621"><b data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">(ah-dar), glorious, Exodus
      15:6,11; Isaiah 42:21.</span></b></li><span data-dcnode-id="2620" instrument_node="">
</span><li data-dcnode-id="2617"><b data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">(aph-see), beside me, Isaiah
      47:8,10; Zephaniah 2:15.</span></b></li><span data-dcnode-id="2616" instrument_node="">
</span><li data-dcnode-id="2613"><b data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">(g'moo-lah), recompense,
      2 Samuel 19:36; Isaiah 59:18; Jeremiah 51:56.</span></b></li><span data-dcnode-id="2612" instrument_node="">
</span><li data-dcnode-id="2609"><b data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">(nah-cheh), lame, 2 Samuel
      4:4, 9:3; contrite, Isaiah 56:2.</span></b></li><span data-dcnode-id="2608" instrument_node="">
</span><li data-dcnode-id="2605"><b data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">(at-teek), ancient, Daniel
      7:9,13,22.</span></b></li><span data-dcnode-id="2604" instrument_node="">
</span><li data-dcnode-id="2601"><b data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">(r'phoo-oth), medicines,
      Jeremiah 30:13, 46:11; Ezekiel 30:21.</span></b></li><span data-dcnode-id="2600" instrument_node="">
</span><li data-dcnode-id="2597"><b data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">(abba), Father, Mark 14:36;
      Romans 8:15; Galatians 4:6.</span></b></li><span data-dcnode-id="2596" instrument_node="">
</span><li data-dcnode-id="2593"><b data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">(haireomai), to choose,
      Philippians 1:22; 2 Thessalonians 2:13; Hebrews 11:25.</span></b></li><span data-dcnode-id="2592" instrument_node="">
</span><li data-dcnode-id="2589"><b data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">(apokruphos), hid, Luke
      8:17; Colossians 2:3; kept secret, Mark 4:22.</span></b></li><span data-dcnode-id="2588" instrument_node="">
</span><li data-dcnode-id="2585"><b data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">(apophthengomai), speak

</span><li data-dcnode-id="2581"><b data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">(acheiropoieetos), made

</span><li data-dcnode-id="2569"><b data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">(morphee), form, Mark 16:12;
      Philippians 2:6,7.</span></b></li><span data-dcnode-id="2568" instrument_node="">
</span></ul><span data-dcnode-id="2566" instrument_node="">
</span><p data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">

</span></p><p align="center" data-dcnode-id="2559"><span data-dcnode-id="2563" instrument_node="">
</span><b data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">
PHRASES THAT OCCUR THREE TIMES</span></b><span data-dcnode-id="2560" instrument_node="">
</span></p><p data-dcnode-id="2554"><span data-dcnode-id="2558" instrument_node="">
</span><b data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">
are also similarly significant.</span></b><span data-dcnode-id="2555" instrument_node="">
</span></p><ul data-dcnode-id="2536"><span data-dcnode-id="2553" instrument_node="">
</span><li data-dcnode-id="2538"><b data-dcnode-id="2539"><span data-dcnode-id="2552" instrument_node="">"</span><i data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Before the foundation
      of the world</span></i><span data-dcnode-id="2549" instrument_node="">." </span><br data-dcnode-id="2548"><span data-dcnode-id="2547" instrument_node="">
      John 17:24. "Thou lovedst Me before," etc. </span><br data-dcnode-id="2546"><span data-dcnode-id="2545" instrument_node="">
      Ephesians 1:4. "Chosen us in Him before," etc. </span><br data-dcnode-id="2544"><span data-dcnode-id="2543" instrument_node="">
      1 Peter 1:20. "The blood of Christ foreordained before," etc. (when it speaks
      of this blood as "shed" it is </span><i data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">from</span></i><span data-dcnode-id="2540" instrument_node=""> the foundation, etc.).</span></b></li><span data-dcnode-id="2537" instrument_node="">
</span></ul><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">
&nbsp;
</span></p><p data-dcnode-id="2528"><span data-dcnode-id="2532" instrument_node="">
</span><b data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">
The phrase occurs three times, because it is the act of Deity, and flows
from uninfluenced grace.</span></b><span data-dcnode-id="2529" instrument_node="">
</span></p><p data-dcnode-id="2505"><span data-dcnode-id="2527" instrument_node="">
</span><b data-dcnode-id="2507"><span data-dcnode-id="2526" instrument_node="">
When, however, such acts relate to His work </span><i data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">in</span></i><span data-dcnode-id="2523" instrument_node=""> us rather than
</span><i data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">for</span></i><span data-dcnode-id="2520" instrument_node=""> us, the words, even in a similar connection, occur </span><i data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">seven</span></i><span data-dcnode-id="2517" instrument_node="">
times, because </span><i data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">seven</span></i><span data-dcnode-id="2514" instrument_node=""> is the number of </span><i data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">spiritual</span></i><span data-dcnode-id="2511" instrument_node=""> perfection.
Hence the phrase, "From the foundation of the world" occurs </span><i data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">seven</span></i><span data-dcnode-id="2508" instrument_node="">
times.</span></b><span data-dcnode-id="2506" instrument_node="">
</span></p><p align="center" data-dcnode-id="2499"><span data-dcnode-id="2504" instrument_node="">
</span><i data-dcnode-id="2501"><b data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">"Walk worthy"</span></b></i><span data-dcnode-id="2500" instrument_node="">
</span></p><p data-dcnode-id="2494"><span data-dcnode-id="2498" instrument_node="">
</span><b data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">
This occurs three times, as the Divine and perfect claim on our walk.</span></b><span data-dcnode-id="2495" instrument_node="">
</span></p><ul data-dcnode-id="2482"><span data-dcnode-id="2493" instrument_node="">
</span><li data-dcnode-id="2484"><b data-dcnode-id="2485"><span data-dcnode-id="2492" instrument_node="">"Walk worthily" </span><br data-dcnode-id="2491"><span data-dcnode-id="2490" instrument_node="">
      Of our vocation (Eph 4:1), </span><br data-dcnode-id="2489"><span data-dcnode-id="2488" instrument_node="">
      Of the Lord (Col 1:10), </span><br data-dcnode-id="2487"><span data-dcnode-id="2486" instrument_node="">
      Of God (1 Thess 2:12).</span></b></li><span data-dcnode-id="2483" instrument_node="">
</span></ul><span data-dcnode-id="2481" instrument_node="">
</span><p data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">
&nbsp;
</span></p><p align="center" data-dcnode-id="2474"><span data-dcnode-id="2478" instrument_node="">
</span><b data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">
THE THREE-FOLD COMBINATIONS OF A NUMBER</span></b><span data-dcnode-id="2475" instrument_node="">
</span></p><p data-dcnode-id="2469"><span data-dcnode-id="2473" instrument_node="">
</span><b data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">
denotes the essence of such number, the concentration of the significance
of the number thus expressed.</span></b><span data-dcnode-id="2470" instrument_node="">
</span></p><ul data-dcnode-id="2439"><span data-dcnode-id="2468" instrument_node="">
</span><li data-dcnode-id="2462"><b data-dcnode-id="2463"><span data-dcnode-id="2467" instrument_node="">444 is the gematria or
      number of the word "DAMASCUS," which is the oldest city in the world;
      </span><i data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">four</span></i><span data-dcnode-id="2464" instrument_node=""> being the world number.</span></b></li><span data-dcnode-id="2461" instrument_node="">
</span><li data-dcnode-id="2455"><b data-dcnode-id="2456"><span data-dcnode-id="2460" instrument_node="">666 is the number of
      </span><i data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">man</span></i><span data-dcnode-id="2457" instrument_node="">, and it symbolizes fitly, therefore, the essence of human wisdom,
      and also of imperfection.</span></b></li><span data-dcnode-id="2454" instrument_node="">
</span><li data-dcnode-id="2451"><b data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">888 is the number or gematria
      of the name "JESUS."</span></b></li><span data-dcnode-id="2450" instrument_node="">
</span><li data-dcnode-id="2441"><b data-dcnode-id="2442"><span data-dcnode-id="2449" instrument_node="">999 is the number connected
      with </span><i data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">judgment</span></i><span data-dcnode-id="2446" instrument_node="">, hence the numerical value of the phrase </span><i data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">my wrath</span></i><span data-dcnode-id="2443" instrument_node="">,
      is 999. The same number is very prominent in the judgment on Sodom.</span></b></li><span data-dcnode-id="2440" instrument_node="">
</span></ul><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">
&nbsp;
</span></p><p align="center" data-dcnode-id="2431"><span data-dcnode-id="2435" instrument_node="">
</span><b data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">
THE TALMUD</span></b><span data-dcnode-id="2432" instrument_node="">
</span></p><p data-dcnode-id="2423"><span data-dcnode-id="2430" instrument_node="">
</span><b data-dcnode-id="2425"><span data-dcnode-id="2429" instrument_node="">
has many references, among other numbers, to the number </span><i data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">three</span></i><span data-dcnode-id="2426" instrument_node="">. The
Rabbis say that there were</span></b><span data-dcnode-id="2424" instrument_node="">
</span></p><p align="center" data-dcnode-id="2417"><span data-dcnode-id="2422" instrument_node="">
</span><i data-dcnode-id="2419"><b data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Three things Moses asked of God</span></b></i><span data-dcnode-id="2418" instrument_node="">
</span></p><ol data-dcnode-id="2400"><span data-dcnode-id="2416" instrument_node="">
</span><li data-dcnode-id="2411"><span data-dcnode-id="2415" instrument_node="">
</span><b data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">
    That the Shekinah might rest on Israel.</span></b><span data-dcnode-id="2412" instrument_node="">
</span></li><li data-dcnode-id="2406"><span data-dcnode-id="2410" instrument_node="">
</span><b data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">
    That it might rest on none but Israel.</span></b><span data-dcnode-id="2407" instrument_node="">
</span></li><li data-dcnode-id="2401"><span data-dcnode-id="2405" instrument_node="">
</span><b data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">
    That God's ways might be known to him. (Beracheth, fol. 7, col. 1).</span></b><span data-dcnode-id="2402" instrument_node="">
</span></li></ol><span data-dcnode-id="2399" instrument_node="">
</span><p align="center" data-dcnode-id="2393"><span data-dcnode-id="2398" instrument_node="">
</span><i data-dcnode-id="2395"><b data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">Three precious gifts were given to Israel</span></b></i><span data-dcnode-id="2394" instrument_node="">
</span></p><ol data-dcnode-id="2376"><span data-dcnode-id="2392" instrument_node="">
</span><li data-dcnode-id="2387"><span data-dcnode-id="2391" instrument_node="">
</span><b data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">
    The Law.</span></b><span data-dcnode-id="2388" instrument_node="">
</span></li><li data-dcnode-id="2382"><span data-dcnode-id="2386" instrument_node="">
</span><b data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">
    The Land.</span></b><span data-dcnode-id="2383" instrument_node="">
</span></li><li data-dcnode-id="2377"><span data-dcnode-id="2381" instrument_node="">
</span><b data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">
    The World to come (i.e., the Heavenly Calling).</span></b><span data-dcnode-id="2378" instrument_node="">
</span></li></ol><span data-dcnode-id="2375" instrument_node="">
</span><p align="center" data-dcnode-id="2369"><span data-dcnode-id="2374" instrument_node="">
</span><i data-dcnode-id="2371"><b data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">Three men</span></b></i><span data-dcnode-id="2370" instrument_node="">
</span></p><ul data-dcnode-id="4"><span data-dcnode-id="2368" instrument_node="">
</span><b data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">
  handed down the ancient wisdom and Divine secrets, viz., Adam, Seth,
      and Enoch.</span></b><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2357"><span data-dcnode-id="2364" instrument_node="">
</span><b data-dcnode-id="2359"><span data-dcnode-id="2363" instrument_node="">
Whatever may be thought of these, there can be no doubt that in the invariable
employment of the number </span><i data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">three</span></i><span data-dcnode-id="2360" instrument_node=""> in the Word of God, we have that which
signifies Divine perfection.</span></b><span data-dcnode-id="2358" instrument_node="">
</span></p><hr data-dcnode-id="2356"><span data-dcnode-id="2355" instrument_node="">
</span><b data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">
God had not only good cause to delay the giving of the Torah until after
the departure of Jethro, but the time He chose for bestowing it was also
chosen for a good reason. Just as a female proselyte, or a woman freed from
captivity, or an emancipated slave, may not enter wedlock before she has
for three months lived as a free Jewess, so God also waited three months
after the deliverance of Israel from the bondage and the slavery of Egypt,
before His union with Israel on Mount Sinai. God furthermore treated His
bride as did that king who went to the marriage ceremony only after he had
overwhelmed his chosen bride with many gifts...</span></b><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2351" instrument_node="">
</span><b data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">
The third month was chosen for the revelation, because everything that is
closely connected with the Torah and with Israel is triple in number. The
Torah consists of three parts, the Pentateuch, the Prophets, and the Hagiographa;
similarly the oral law consists of Midrash, Halakah, and Haggadah. The
communications between God and Israel were carried on by three, Moses, Aaron,
and Miriam. Israel also is divided into three divisions, priests, Levites,
and laymen; and they are, furthermore, the descendants of the three Patriarchs,
Abraham, Isaac, and Jacob. For God has a preference for "the third": It was
the third of Adam's sons, Seth, who became the ancestor of humanity, and
so too it was the third among Noah's sons, Shem, who attained high station.
Among the Jewish kings, too, it was the third, Solomon, whom God distinguished
before all others. The number three plays a particularly important part in
the life of Moses. He belonged to the</span></b><span data-dcnode-id="2348" instrument_node=""> </span><b data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node=""> tribe of Levi, which is not only the
third of the tribes, but has a name consisting of three letters. He himself
was the third of the children of the family; his own name consists of three
letters; in his infancy he had been concealed by his mother throughout three
months; and in the third month of the year, after a preparation of three
days, did he receive the Torah on a mountain, the name of which consists
of three letters.</span></b><span data-dcnode-id="2345" instrument_node="">
</span></p><p data-dcnode-id="2336"><span data-dcnode-id="2343" instrument_node="">
</span><b data-dcnode-id="2338"><span data-dcnode-id="2342" instrument_node="">
(</span><i data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Legends of the Jews</span></i><span data-dcnode-id="2339" instrument_node="">, Louis Ginzberg, Book 3)</span></b><span data-dcnode-id="2337" instrument_node="">
</span></p><p align="Center" data-dcnode-id="2332"><span data-dcnode-id="2335" instrument_node="">
</span><img align="Middle" data-dcnode-id="2334" height="85" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/triple.gif&amp;raw" width="85"><span data-dcnode-id="2333" instrument_node="">
</span></p><p align="Center" data-dcnode-id="2327"><span data-dcnode-id="2331" instrument_node="">
</span><big data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">&nbsp;Symbols
Common to Theodish Belief and Asatru</span></big><span data-dcnode-id="2328" instrument_node="">
</span></p><p align="Center" data-dcnode-id="2319"><span data-dcnode-id="2326" instrument_node="">
</span><b data-dcnode-id="2321"><span data-dcnode-id="2325" instrument_node="">
See:
</span><a data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geocities.com/Athens/Atlantis/2575"><span data-dcnode-id="2324" instrument_node="">http://www.geocities.com/Athens/Atlantis/2575</span></a><span data-dcnode-id="2322" instrument_node="">

</span></p><p align="Left" data-dcnode-id="2312"><span data-dcnode-id="2318" instrument_node="">
</span><b data-dcnode-id="2314"><span data-dcnode-id="2317" instrument_node="">
</span><img align="Left" data-dcnode-id="2316" height="47" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/valknut3.gif&amp;raw" width="45"><span data-dcnode-id="2315" instrument_node="">The ValknutR:
As can be seen, the valknutR consists of three triangles linked together.
A variation has three horns interlinked. The valknutR symbolizes the power
of Wóden to bind and unbind the minds of men. According to the
Hávamál Wóden can place “fetters” upon his
enemies, so that in battle they became panicked or frozen with fear. On the
other hand, Wóden could also free a man’s mind, so that he may
be unencumbered by fear in battle, so that he might receive the inspiration
for writing poetry, or so that he might experience religious ecstasy. As
a symbol of Wóden, the valknutR appears frequently in Theodish and
Asatru circles alike. Because we are dedicated to Wóden, the valknutR
is an official symbol of Wednesbury Theod, though it used very frequently
elsewhere as well.</span></b><span data-dcnode-id="2313" instrument_node="">
</span></p><p align="Left" data-dcnode-id="2302"><span data-dcnode-id="2311" instrument_node="">
</span><b data-dcnode-id="2307"><span data-dcnode-id="2310" instrument_node="">
</span><img align="Left" data-dcnode-id="2309" height="45" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/trefot.gif&amp;raw" width="45"><span data-dcnode-id="2308" instrument_node="">Trefot: The trefot
is another symbol associated with Wóden, sometimes appearing beside
the valknutR on ancient runestones and</span></b><span data-dcnode-id="2306" instrument_node=""> </span><b data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node=""> gravestones. The number three and
its multiples (particularly nine) occur often in Norse myth--there were three
Norns, Wóden had two brothers, making a total of three siblings, and
so on. Today it is difficult to say why the number three was so important
to the elder heathen. Many today interpret the number as representing completion.
That is, the number three is symbolic of something which has gone through
its beginning, into a middle period, and then seen its end. Of course, it
must also be pointed out that three is the most basic number, the "building
block" if you will, for the family. A man and woman marry, making for a "couple"
or two people together. Eventually, if things go according to the usual plan,
a baby is born making for a family of three people. The number three could
then have been seen as the number of reproduction or the continuation of
things. Whatever the number three's symbolism, it seems reasonable to assume
that a three-footed symbol (hence the name trefot), the trefot would share
in that symbolism.</span></b><span data-dcnode-id="2303" instrument_node="">
</span></p><p align="Left" data-dcnode-id="2295"><span data-dcnode-id="2301" instrument_node="">
</span><b data-dcnode-id="2297"><span data-dcnode-id="2300" instrument_node="">
</span><img align="Left" data-dcnode-id="2299" height="108" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/awehelm.gif&amp;raw" width="108"><span data-dcnode-id="2298" instrument_node="">ÆgishjalmaR:
Literally, the "Helm or Awe (in its meaning as "terror")". The Helm of Awe
is sometimes found beside figures of warriors and is an important symbol
in Icelandic magic. Its name links it to Wóden, who could strike fear
in his enemies and who has as one of his many names YggR, "he who invokes
terror." It is believed that if it is worn or traced between the brows it
will strike fear into your opponents.</span></b><span data-dcnode-id="2296" instrument_node="">
</span></p><p align="Left" data-dcnode-id="2290"><span data-dcnode-id="2294" instrument_node="">
</span><b data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">
Note the tridents at the end of each arm.</span></b><span data-dcnode-id="2291" instrument_node="">

</span><img align="Left" data-dcnode-id="2288" height="104" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/pict4.jpg&amp;raw" width="100"><span data-dcnode-id="2287" instrument_node="">
</span></p><p align="Left" data-dcnode-id="2281"><span data-dcnode-id="2285" instrument_node="">
</span><b data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">
The Interlaced Triangles: Known in the Occident as King Solomon’s seal
or star, it was called in India the seal of Vishnu. The interlaced triangles
signify the bipolarity in nature - spirit and matter, or male and female.
The apex of the white triangle represents the divine monad; the apex of the
dark triangle, the manifested worlds. The upward triangle suggests spirit,
consciousness, and concealed wisdom, which are mirrored in the downward-pointing
triangle representing matter, receptive space, manifestation, or wisdom revealed.
The sides of the dark triangle may stand for form, color, and substance;
the three gunas or fundamental qualities; and the creative, preserving, and
destructive/regenerative forces of the Hindu triad, Brahma, Vishnu, and Siva.
Together the triangles represent the manifested universe evolved from the
central point within the serpent-circle of time and space. They also form
the hexagon of six principles, cosmic and human, emanating from and synthesized
by the central point, the seventh and highest self of any evolving being.
Thus they express the sevenfold structure of the universe. The central cross
is the inner person, touching all things from the six sides through the six
triangles. The six points of the star reach outward toward the serpent of
eternity, growing and evolving through time.</span></b><span data-dcnode-id="2282" instrument_node="">
</span></p><p align="Left" data-dcnode-id="2274"><span data-dcnode-id="2280" instrument_node="">
</span><b data-dcnode-id="2276"><span data-dcnode-id="2279" instrument_node="">
</span><img align="Left" data-dcnode-id="2278" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/icon4.jpg&amp;raw"><span data-dcnode-id="2277" instrument_node="">THE INTERLACED TRIANGLES, one (lighter)
pointing upwards and the other (darker) pointing downwards, symbolise the
descent of spirit into matter and its reemergence from the confining limits
of form. They also suggest the constant conflict between the light and dark
forces in nature as well as the inseparable unity of spirit and matter. When
depicted within the circle of the serpent, the figure represents the universe
and the manifestation of Deity in time and space. The three lines and three
angles of each of the two triangles may remind us of the triple aspects of
spirit: existence, consciousness and bliss, and the three aspects of matter:
mobility, resistance and rhythm. The glyph can also be seen as the
six­pointed star, embracing spiritual and physical consciousness and
viewed by the Pythagoreans as the symbol of creation.</span></b><span data-dcnode-id="2275" instrument_node="">
</span></p><p align="Left" data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">

</span><b data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">
      Three stages - the number of stages of a rocket necessary to best achieve

</span></p><p align="Left" data-dcnode-id="2020"><span data-dcnode-id="2027" instrument_node="">
</span><b data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">
      In 1293, on his way back</span></b><span data-dcnode-id="2024" instrument_node=""> </span><b data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node=""> from China, Marco Polo got a taste of South India
      when he stopped along the Malabar Coast. He records a meeting he had with
      a group of yogi alchemists who, by preparing a tincture of mercury and sulfur,
      were afforded a lifespan of 150-200 years. Mercury was viewed as the seminal
      seed of Shiva. It formed a part of the alchemical triad of mercury sulfur
      and air, corresponding to the trinity of moon sun, and wind. Breath controlled
      through the practices of Pranayama, transformed the body's winds into a spiritual
      mediator that could unify the solar and lunar currents within the body. Much
      like the alchemical process applied air to mercury and sulfur to form the
      amalgam that brought the work to completion.</span></b><span data-dcnode-id="2021" instrument_node="">
</span></p><p align="Left" data-dcnode-id="2015"><span data-dcnode-id="2019" instrument_node="">
</span><b data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">
      Consciousness was seen to ride the vehicle of breath into union with the
      absolute in the Sahasrara chakra at the top of the head. The Siddha could,
      through the intercession of the Goddess, placated by manipulation of the
      breath, expand consciousness to the point where it becomes what is called
      the Maha Chitta or "Great Awareness" which is the God Shiva himself. Here
      is one of the closing verses of Bhogar's discussion of Kundalini Yoga..</span></b><span data-dcnode-id="2016" instrument_node="">
</span></p><p align="Center" data-dcnode-id="2011"><span data-dcnode-id="2014" instrument_node="">
</span><img align="Middle" data-dcnode-id="2013" height="85" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/triple.gif&amp;raw" width="85"><span data-dcnode-id="2012" instrument_node="">
</span></p><p align="Left" data-dcnode-id="2006"><span data-dcnode-id="2010" instrument_node="">
</span><b data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">
      ANGELS</span></b><span data-dcnode-id="2007" instrument_node="">
</span></p><p align="Left" data-dcnode-id="2001"><span data-dcnode-id="2005" instrument_node="">
</span><b data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">
      The angelic beings, or celestial intelligences, are divided into three triads,
      containing the nine orders, and whose names, as we shall see, represent the
      divine attributes that they manifest to all below them. Continuing from the
      fine introduction to the work, Dionysius says these divine attributes also
      have an inner relation with every human soul, for through their ministrations
      the aspiring soul becomes liberated from the bondage of material things,
      receives knowledge of that soul's purpose, and is enabled to live its true
      life, ultimately attaining its divine likeness to the full.</span></b><span data-dcnode-id="2002" instrument_node="">
</span></p><p align="Left" data-dcnode-id="1996"><span data-dcnode-id="2000" instrument_node="">
</span><b data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">
      The first order of the first triad is seraphim. They are described in the
      passage already quoted from Isaiah as the "burning" or "fiery" ones, from
      whom the stream of superessential grace flows (God transcends all essence).
      Like fire, the seraphim consume all that separates the human from God. The
      second order is cherubim. The name "cherub" means "fullness of knowledge".
      Through cherubim, the energy of God streams forth as a transcendental light
      that perfectly illuminates the soul and unites it with the divine wisdom.
      It imparts a full and lucid understanding to the universal divine immanence.
      In the Bible, cherubs are depicted as great winged creatures - for instance,
      in the construction of the Ark in the wilderness (Exodus 25.18 passim), King
      Solomon's majestic temple (1 Kings 6.23 passim) and the visions of Ezekiel
      (Ezekiel 1.10 and 10.1 passim). In one passage, the cherub is portrayed as
      a flying creature on which God travelled in order to help King David (2 Samuel
      22.11). All this shows how hard it is for the human mind to avoid conceptualizing
      a formless energy The third order of the first triad are the thrones; these
      are divine seats through which the soul is lifted up to God and becomes
      established in the constancy of the divine service. This first triad is closest
      at all times to the divine presence.</span></b><span data-dcnode-id="1997" instrument_node="">
</span></p><p align="Left" data-dcnode-id="1991"><span data-dcnode-id="1995" instrument_node="">
</span><b data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">
      In the second triad come first the dominions, or dominations, that are free
      from all earthly passions, from all inward inclination to the bondage of
      discord, and from all that is low; they display a liberal superiority to
      harsh tyranny, and an exemptness from degrading servility. They are true
      lords, perpetually aspiring to true lordship, and to the Source of Lordship.
      The second order of the second triad are the virtues, that have a powerful
      and unshakable virility welling forth into all their God-like energies. There
      is no weakness in them: instead, they ascend unwaveringly to the superessential
      virtue which is the Source of Virtue, and flow forth providentially to those
      below. The third order are the powers, or authorities, that are invested
      with a capacity to regulate intellectual and supermundane power which never
      debases its authority by tyrannical force, but is irresistibly urged onward
      in due order to the Divine. This order beneficently leads those below it,
      as far as possible, to the supreme power which is the Source of Power. It
      re-directs the forces that fetter the human mind to earthly things. Through
      this second triad, the soul is liberated from all that is below, and assimilated
      to that which is above.</span></b><span data-dcnode-id="1992" instrument_node="">
</span></p><p align="Left" data-dcnode-id="1983"><span data-dcnode-id="1990" instrument_node="">
</span><b data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">
      The third, and lowest, triad is concerned with the final execution of the
      work of providence, which is God's beneficent care for his creatures. The
      principalities exhibit divine lordship and true service; through them, the
      soul may turn from attachment to earthly activities to the service of God,
      so as ultimately to become a co-worker with the divine ministers. The archangels
      imprint the divine seal on all things, whereby the universe is the written
      word of God. They impart to the soul the spiritual light through which it
      may learn to read the Bible, and also to know and use its own faculties
      correctly. The lowest order of this triad is the angels, who minister to
      all things</span></b><span data-dcnode-id="1987" instrument_node=""> </span><b data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node=""> of nature, including humans, by purifying and uplifting them.</span></b><span data-dcnode-id="1984" instrument_node="">
</span></p><p align="Left" data-dcnode-id="1978"><span data-dcnode-id="1982" instrument_node="">
</span><b data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">
      In this triadic scheme, the higher orders inspire those lower than they,
      but not vice versa. Thus it is clear that the third triad is nearest the
      world, and transmits the illumination received from above. The end of the
      process is the transfiguration of the whole of the universe in the glorious
      light that proceeds from on high. This whole hierarchy spreads the divine
      light through the cosmos, that vast realm that includes the universe, as
      far as human understanding can define it, and also the psychic plane where
      we may meet the spirits of the dead and also the communion of saints and
      the ministry of angels. The great work of the angelic hierarchy is to praise
      and glorify God. This praise is not a rational acclaim so much as a great
      paean of joy that the world is as it is and that the angels are privileged
      both to know it and to participate in it. This is how we should say the Gloria
      of the Eucharist: that we are privileged to partake of the body and blood
      of the Saviour If the whole cosmos could resound to that praise, and move
      beyond prejudice and emotional bonds, we would pour out peace and goodwill
      to all creatures. The angelic hierarchy, with its enlightened will turned
      resolutely to the divine presence, helps to bring forward the Kingdom of
      God on earth - and elsewhere in our unimaginably glorious cosmos.</span></b><span data-dcnode-id="1979" instrument_node="">
</span></p><p align="Left" data-dcnode-id="1973"><span data-dcnode-id="1977" instrument_node="">
</span><b data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">
      And so it is that all aspiring human souls move to the divine presence, aided
      by an immense angelic hierarchy, none more important than the other. If the
      humble angel leads the way, the destination is through the cherub and seraph
      to the source of all being whom we call God. It may well be that much
      illumination from the Holy Spirit comes to us through the angelic hierarchy,
      centering on our own guardian angel. One thing is certain, though: we must
      worship the Holy Trinity and no other power.</span></b><span data-dcnode-id="1974" instrument_node="">
</span></p><p align="Left" data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">

</span><img align="Left" data-dcnode-id="1926" height="75" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/neptune.gif&amp;raw" width="94"><b data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">THE TRIDENT</span></b><span data-dcnode-id="1923" instrument_node="">
</span></p><p align="Left" data-dcnode-id="1915"><span data-dcnode-id="1921" instrument_node="">
</span><big data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">Poseidon </span></big><b data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">(Greek) One of the twelve great Olympian deities, a son
      of Ouranos and Gaia, brother of Zeus and Hades; represented by the Latins
      as Neptunus. The brothers Zeus, Poseidon, and Hades are respectively the
      gods of heaven, the intermediate world or water, and of the underworld; and
      these represent the three great generalized powers or forces, each one ruling
      or vitalizing his respective third of the seven manifest cosmic planes. Poseidon
      presides over water, especially the ocean, and over horses, which he brought
      forth by a stroke of his trident on the earth. His symbols are the dolphin,
      one of his executive ministers; the trident; and the horse. It is Poseidon
      who shakes the earth and raises and quells storms at sea. He had numerous
      offspring by many wives, both mortal and immortal; mostly of a violent unruly
      character like himself -- titans and giants. He stands as a personation of
      the spirit and race of Atlantis; for he is lusty, sensual, and at war with
      heaven. To consummate his intrigues, he assumes the forms of various animals
      -- a way of alluding to bestial Atlantean black magic. The symbol is complex,
      for he is also a dragon. He is related to the northern constellations of
      Draco, Delphinus, and Pegasus (or Equus, the horse). Equivalent to Chozzar
      of the Peratae Gnostics and the good serpent of the Nazarenes (cf SD 2:578).
      As god of the waters he parallels Idaspati, Narayana, Vishnu, and Varuna.</span></b><span data-dcnode-id="1916" instrument_node="">
</span></p><p align="Left" data-dcnode-id="1910"><span data-dcnode-id="1914" instrument_node="">
</span><b data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">
      Jambala (Tibetan: Dzambhala) is the God of wealth and appropriately a member
      of the Jewel family. His fat belly shows his prosperity and has a mongoose
      on his left thigh that vomits jewels as he squeezes it. In his right hand
      he holds a flaming wish-fulfilling jewel which is symbolic for the riches
      one attains with the wealth of spirituality. He is primarily black in color
      and has the stunted, thick form of a dwarf with a potbelly. He is seated
      sideways on a dragon with his right foot down and his knee up. In his white
      form, he is holding a trident and a scepter.</span></b><span data-dcnode-id="1911" instrument_node="">
</span></p><p align="Left" data-dcnode-id="1902"><span data-dcnode-id="1909" instrument_node="">
</span><b data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Anyavathi</span></b><span data-dcnode-id="1906" instrument_node="">: </span><b data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node=""> Picturing the many faceted Divine and symbolizing, in
      perceivable ways, the attributes that are evidenced in each facet, the seeker
      endeavours to acquire the Presence of the Divine. One Form of the Divine,
      the Omnipresent (Vishnu) is pictured as having the Conch (symbol of the Primeval
      word or Sound), the Wheel (symbol of Time) and the Mace (symbol of Might
      and Majesty). With the facet to which is ascribed the power and willingness
      to overcome obstacles (Vighneswara), the single tusk symbolizing sharpness
      and concentration is associated, Iswara or Siva (the facet of disintegration
      and dissolution) has the Soola or Trident (symbolizing in its three prongs,
      the Past, the Present and the Future). Rama, the form of righteousness or
      Dharma is always pictured with the Kodanda, the bow which can send the arrow
      (will) straight to the target, Krishna, the manifestation of Universal love,
      has on His crown a peacock feather, symbolizing the thousand-eyed, glance
      of Grace. He bears a flute on which He plays enthralling tunes; the flute
      is the symbol of the ego-less desire-less seeker. The facet of wisdom pictured
      as the Goddess Saraswathi, has a Veena in Her hand; the Veena is a stringed
      musical instrument, symbolic of heart-strings responding, with harmony and
      melody, to the gentle touch of the true, the good and the beautiful. Seekers
      meditate on these pleasing personifications and the significance of the symbols
      of their attributes and adore the Divine in the delight that wells up in
      their hearts. This is named Anyavathi Path - the Path through symbolised
      Divinity, Anya meaning the other, the adjunctory, the appurtenance.</span></b><span data-dcnode-id="1903" instrument_node="">
</span></p><p align="Left" data-dcnode-id="1837"><span data-dcnode-id="1901" instrument_node="">

</span></p><p align="Left" data-dcnode-id="1594"><span data-dcnode-id="1598" instrument_node="">
</span><b data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">
      Zeus decided to punish humanity for its evil ways. Other Gods grieved at
      the destruction because there would be no beings to worship them. Zeus promised
      a new stock, a race of miraculous origin. He was going to use thunderbolts
      when he remembered one of Fate's decrees: that a time would come when sea
      and earth and dome of the sky would blaze up, and the massive structure of
      the universe would collapse in ruins. With Poseidon's help, he caused storm
      and earthquake to flood every part of the land except the summit of Mount
      Parnassus. When Zeus crushed the hanging clouds in his hand, there was a
      loud crash, and sheets of rain fell from heaven. The rivers began rushing
      to the sea. When Neptune struck the earth with his trident, the rivers raced
      across the plains. Sea and earth could no longer be distinguished; all was
      sea without any shores, covering every living being except for one fortunate
      couple, Deucalion and Pyrrha. Earlier, Deucalion and Pyrrha had consulted
      Themis at her oracular shrine. She warned of a future flood, and they prepared
      by acquiring a boat. In time, their boat ran aground on the summit of Mount
      Parnassus. (Note: This is the mountain at Delphi, "navel of the earth" and
      home of the great oracle.)</span></b><span data-dcnode-id="1595" instrument_node="">
</span></p><p align="Left" data-dcnode-id="1589"><span data-dcnode-id="1593" instrument_node="">
</span><b data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">
      Recognizing their piety, Zeus allowed them to live and withdrew the waters.
      It was then that Deucalion and Pyrrha remembered the other oracle given by
      Themis: to repopulate the world by throwing "behind you the bones of your
      great mother." Pyrrha didn't want to injure her mother's ghost by disturbing
      her bones. Prometheus soothed her fears. "Oracles are righteous and never
      advise guilty action..." They decided that the "bones" were stones in the
      body of the earth ("Great Mother"). They threw the stones, which became humans;
      men of the stones thrown by Deucalion; women, of those cast by Pyrrha. Animals
      were produced by earth of its own volition. According to Plato: "Many great
      deluges have taken place during the nine thousand years."</span></b><span data-dcnode-id="1590" instrument_node="">
</span></p><p align="Left" data-dcnode-id="1583"><span data-dcnode-id="1588" instrument_node="">
</span><img align="Left" data-dcnode-id="1587" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//greatdreams.com/three/trinity5.gif&amp;raw" width="100"><b data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">The triquetra
      (from a latin word meaning "three cornered"), is an ancient symbol for the
      Trinity. It comprises three interwoven arcs, distinct yet equal and inseparable,
      symbolizing that the Father, Son, and Holy Spirit who are three distinct
      yet equal Persons and indivisibly One God.</span></b><span data-dcnode-id="1584" instrument_node="">

</span></b></p><span data-dcnode-id="1569" instrument_node="">
</span></td></tr><tr data-dcnode-id="1521"><td data-dcnode-id="1523"><b data-dcnode-id="1560"><span data-dcnode-id="1563" instrument_node="">Please remember that this figure is a diagram. The elements, the principles,
	      of the kosmos are not really one above another, like a series&nbsp;of steps, or
	      like the rungs of a ladder. This figure is a diagram only, that is, it is
	      a symbol. The elements of the kosmos, the principles of
          &nbsp;the kosmos, the spheres
	      of the kosmos, are within each other, the most spiritual being the inmost.
	      But this being impossible in&nbsp;representation on a plane surface, we have to
	      figurate the idea schematically, diagrammatically, paradigmatically. Therefore
	      this figure
          &nbsp;merely shows first, that there are seven planes in kosmos. Let
	      us next represent the evolving and originating life forces, the gods and&nbsp;the intelligences of the three higher planes, by a triangle, using the old
	      Platonic and Pythagorean symbol -- a beautiful symbol -- because&nbsp;</span><br data-dcnode-id="1562"><span data-dcnode-id="1561" instrument_node="">
 it shows
	      and suggests the originating point, the kosmic point, the seed, from which
	      all divine things spring; and which shows the apex of&nbsp;the triangle also
	      vanishing, as it were, through the highest plane, through a laya-center,
	      a neutral center, a nirvana of all things less or lower&nbsp;than it, vanishing
	      more inward into something higher. Exactly as a seed, an acorn, for instance,
	      will bring forth an oak, in its turn shedding&nbsp;its harvest of acorns, so the
	      kosmic seed sends forth from itself these hosts of hierarchies of beings,
	      themselves producing other lower&nbsp;hosts on the downward scale. Let us then
	      represent this process by a triangle.</span></b><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1558" instrument_node="">
</span><b data-dcnode-id="1554"><span data-dcnode-id="1557" instrument_node="">
	      The four lower planes of the figure, which are the four lower kosmic planes,
	      represent all the states that man can reach to in his present&nbsp;period of
	      development. Our own atmic essence springs forth from the fourth kosmic plane,
	      counting downwards. Further, let us next&nbsp;represent our planetary chain in
	      the following manner, that is to say, by inscribing circles, seven of them,
	      on these planes, two on each&nbsp;plane, with the exception of the lowest plane
	      where we inscribe only one circle, representing our own globe Terra. Then,
	      we number&nbsp;these circles respectively, beginning with the left and going
	      downwards, A, B, C, D; and then going upwards, E, F, and G. Please note&nbsp;that
	      there are two circles or globes on each plane, with the exception of globe
	      D, our own. These seven "planes" are really the seven&nbsp;</span><br data-dcnode-id="1556"><span data-dcnode-id="1555" instrument_node="">
 kosmic elements
	      respectively.</span></b><span data-dcnode-id="1553" instrument_node="">

</span></p><p data-dcnode-id="1277"><span data-dcnode-id="1305" instrument_node="">
</span><b data-dcnode-id="1279"><span data-dcnode-id="1304" instrument_node="">It is also a symbol for </span><font color="#800040" data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">power</span></font><span data-dcnode-id="1301" instrument_node=""> and, as such,

</span><li data-dcnode-id="1065"><b data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">In three days the egg of the queen is hatched.</span></b><span data-dcnode-id="1066" instrument_node="">
</span></li><li data-dcnode-id="1061"><b data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">It is fed for nine days (3x3).</span></b><span data-dcnode-id="1062" instrument_node="">
</span></li><li data-dcnode-id="1057"><b data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">It reaches maturity in 15 days (5x3).</span></b><span data-dcnode-id="1058" instrument_node="">
</span></li><li data-dcnode-id="1053"><b data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">The worker grub reaches maturity in 21 days (7x3).</span></b><span data-dcnode-id="1054" instrument_node="">
</span></li><li data-dcnode-id="1049"><b data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">And is at work three days after leaving its cell.</span></b><span data-dcnode-id="1050" instrument_node="">
</span></li><li data-dcnode-id="1045"><b data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">The drone matures in 24 days (8x3).</span></b><span data-dcnode-id="1046" instrument_node="">
</span></li><li data-dcnode-id="1041"><b data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">The bee is composed of three sections,— head and two stomachs.</span></b><span data-dcnode-id="1042" instrument_node="">
</span></li><li data-dcnode-id="1037"><b data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">The two eyes are made up of about 3,000 small eyes, each (like the
            cells of the comb) having six sides (2x3).</span></b><span data-dcnode-id="1038" instrument_node="">
</span></li><li data-dcnode-id="1033"><b data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Underneath the body are six (2x3) wax scales with which the comb
            is made.</span></b><span data-dcnode-id="1034" instrument_node="">
</span></li><li data-dcnode-id="1029"><b data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">It has six (2x3) legs. Each leg is composed of three sections.</span></b><span data-dcnode-id="1030" instrument_node="">
</span></li><li data-dcnode-id="1025"><b data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">The foot is formed of three triangular sections.</span></b><span data-dcnode-id="1026" instrument_node="">
</span></li><li data-dcnode-id="1021"><b data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">The antennae consist of nine (3x3) sections.</span></b><span data-dcnode-id="1022" instrument_node="">
</span></li><li data-dcnode-id="1018"><b data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">The sting has nine (3x3) barbs on each side.</span></b></li><span data-dcnode-id="1017" instrument_node="">
</span></ul><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1009"><b data-dcnode-id="1010"><span data-dcnode-id="1014" instrument_node="">Is this design? or is it chance? Why should it be the number </span><i data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">three</span></i><span data-dcnode-id="1011" instrument_node="">
        instead of any other number? No one can tell. We can only observe

</span><p data-dcnode-id="1005"><b data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">&nbsp;</span></b></p></td></tr><tr data-dcnode-id="758"><td data-dcnode-id="760"><b data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">A follow up e-mail from Gary Val Tenuta - 11-26-99</span></b><span data-dcnode-id="997" instrument_node="">
