</span><div class="yasr-auto-insert-overall" data-dcnode-id="1508" style="text-align:left"><div class="yasr-container-custom-text-and-overall" data-dcnode-id="1514"><span data-dcnode-id="1517" instrument_node="">

</span><div class="yasr-star-value" data-dcnode-id="1512" style="background-size: 32px; width: 100%;"></div></div></div></div><h2 data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">“Persian Women” &amp; Their Glorious Past</span></h2><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1504" instrument_node="">Royal women owned land and estates in </span><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1503" instrument_node="">Persia</span></a><span data-dcnode-id="1501" instrument_node=""> as well as outside the Persian heartland such as Babylonia, Syria, Egypt, and Media. They employed their own workforce and it also appears that certain administrative officials were assigned to them.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1496"><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Many ancient Persian cities and states were ruled by women and had their army totally under control of female commanders.</span></strong></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1494" instrument_node="">Ad&nbsp;</span><strong data-dcnode-id="1490"><span data-dcnode-id="1493" instrument_node="">| </span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jigarapp.com/" rel="noopener" target="_blank" title="Jigar"><span data-dcnode-id="1492" instrument_node="">Jigar</span></a></strong><span data-dcnode-id="1489" instrument_node="">App (Web)</span><strong data-dcnode-id="1485"><span data-dcnode-id="1488" instrument_node=""> | </span><a data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.apple.com/us/app/jigar-persian-dating-app/id1553811857" rel="noopener" target="_blank" title="Persian Dating"><span data-dcnode-id="1487" instrument_node="">Persian Dating</span></a></strong><span data-dcnode-id="1484" instrument_node="">&nbsp;(iOS)</span><strong data-dcnode-id="1479"><span data-dcnode-id="1483" instrument_node="">&nbsp;| </span><a data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/persian-dating/" target="_blank" title="Persian Dating"><span data-dcnode-id="1482" instrument_node="">Persian Dating</span></a><span data-dcnode-id="1480" instrument_node=""> </span></strong><span data-dcnode-id="1478" instrument_node="">(Android) </span><strong data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">|</span></strong></p><span data-dcnode-id="1474" instrument_node="">
</span><div data-dcnode-id="1102"><span data-dcnode-id="1473" instrument_node="">
</span><h2 data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">(PERSIAN WOMEN)</span></h2><span data-dcnode-id="1470" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1465" id="attachment_606" style="width: 280px"><img alt="Persian Woman" aria-describedby="caption-attachment-606" class="wp-image-606 size-full" data-dcnode-id="1469" height="270" loading="lazy" sizes="(max-width: 270px) 100vw, 270px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/wp-content/uploads/2019/04/culture-persian-culture-3.jpg&amp;raw" srcset="https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/culture-persian-culture-3.jpg 270w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/culture-persian-culture-3-150x150.jpg 150w" title="Persian Woman" width="270"><p class="wp-caption-text" data-dcnode-id="1466" id="caption-attachment-606"><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jigarapp.com/" rel="noopener" target="_blank"><span data-dcnode-id="1468" instrument_node="">Persian Women</span></a></p></div><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1463" instrument_node="">Women in </span><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1462" instrument_node="">Persia</span></a><span data-dcnode-id="1460" instrument_node=""> were very honored and revered; they often had important positions in the Courthouse, Ministries, Military, State and Treasury Department, and other official administrations. Women were treated like Goddesses esteemed as mothers of creation before the barbaric invasion upon </span><a data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1459" instrument_node="">Persia</span></a><span data-dcnode-id="1457" instrument_node="">.</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1454" instrument_node="">Recent works on the role of women in ancient </span><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1453" instrument_node="">Persia</span></a><span data-dcnode-id="1451" instrument_node=""> show great participation by women in all facets of life, indicating not only their autonomy and independence, but the existence of an equal social system which accepted the authority and independence of women.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node="">Not all women enjoyed the same status or power in Ancient </span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1447" instrument_node="">Persia</span></a><span data-dcnode-id="1445" instrument_node="">. Royal women certainly enjoyed more influence than non-royal women. In art, we can see royal women depicted almost identically to men with similar clothes, hairstyles and poses, so we can conclude that they enjoyed many of the same rights and privileges as men.</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">The Persepolis tablets reveal three different terms of reference for women, Mutu, Irti and Duksis. The first one is always applied to ordinary women while the other two were used for royal women.</span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">In one document Artazostre, a daughter of King Darius is referred to as Mardunuya Iriti Sunki Parki meaning “the wife of Mardonius, daughter of the king”.</span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Such use of terminology shows the significance of the women’s marital status and her relationship to the king.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="1429" id="attachment_1268" style="width: 280px"><img alt="Persian Woman" aria-describedby="caption-attachment-1268" class="wp-image-1268 size-full" data-dcnode-id="1433" height="270" loading="lazy" sizes="(max-width: 270px) 100vw, 270px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-1.jpg&amp;raw" srcset="https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-1.jpg 270w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-1-150x150.jpg 150w" title="Persian Woman" width="270"><p class="wp-caption-text" data-dcnode-id="1430" id="caption-attachment-1268"><a data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jigarapp.com/" rel="noopener" target="_blank"><span data-dcnode-id="1432" instrument_node="">Persian Woman</span></a></p></div><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1427" instrument_node="">Although noble </span><em data-dcnode-id="1424"><a data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/persian-women/" target="_blank" title="Persian women"><span data-dcnode-id="1426" instrument_node="">Persian women</span></a></em><span data-dcnode-id="1423" instrument_node=""> had to act within a defined framework set by the king, they also enjoyed economic independence and had control over their wealth. One of the most interesting finds was the discovery of a large number of seals in the graves of women. Seals in antiquity were often symbols of power and authority.</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1420" instrument_node="">Royal women owned land and estates in </span><a data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1419" instrument_node="">Persia</span></a><span data-dcnode-id="1417" instrument_node=""> as well as outside the Persian heartland such as Babylonia, Syria, Egypt, and Media. They employed their own workforce and it also appears that certain administrative officials were assigned to them.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">The fortification tablets at the Ruins of Persepolis also reveals that men and women were represented in identical professions and that they received equal payments as skilled laborers and that gender was not a criterion at all (unlike our modern world).</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1411" instrument_node="">One of the reasons that Ancient </span><a data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/" target="_blank" title="Persians"><span data-dcnode-id="1410" instrument_node="">Persians</span></a><span data-dcnode-id="1408" instrument_node=""> held women in high regard might have been their religion. Zoroastrianism was the dominant religion, and its ideology that stressed men and women were equals. Naturally, this would shape the worldview of Ancient </span><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/" target="_blank" title="Persians"><span data-dcnode-id="1407" instrument_node="">Persians</span></a><span data-dcnode-id="1405" instrument_node="">, and we can say that overall women were seen as important figures in society. New mothers and pregnant women even received wages far above those of their male co-workers as gratitude.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1383"><strong data-dcnode-id="1398"><span data-dcnode-id="1402" instrument_node="">[ See:&nbsp;</span><a data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jigarapp.com/" rel="noopener" target="_blank" title="Jigar"><span data-dcnode-id="1401" instrument_node="">Jigar</span></a><span data-dcnode-id="1399" instrument_node="">App </span></strong><span data-dcnode-id="1397" instrument_node="">(Web)</span><strong data-dcnode-id="1393"><span data-dcnode-id="1396" instrument_node=""> | </span><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.apple.com/us/app/jigar-persian-dating-app/id1553811857" rel="noopener" target="_blank" title="Persian Dating"><span data-dcnode-id="1395" instrument_node="">Persian Dating</span></a></strong><span data-dcnode-id="1392" instrument_node="">&nbsp;(iOS)</span><strong data-dcnode-id="1387"><span data-dcnode-id="1391" instrument_node="">&nbsp;| </span><a data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/persian-dating/" target="_blank" title="Persian Dating"><span data-dcnode-id="1390" instrument_node="">Persian Dating</span></a><span data-dcnode-id="1388" instrument_node=""> </span></strong><span data-dcnode-id="1386" instrument_node="">(Android)&nbsp;</span><strong data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">]</span></strong></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1381" instrument_node="">There is much evidence that the principles of Zoroastrianism lay the core foundation to the first Declaration of Human Rights in the </span><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/persian-empire/" target="_blank" title="Persian Empire"><span data-dcnode-id="1380" instrument_node="">Persian Empire</span></a><span data-dcnode-id="1378" instrument_node=""> set by Cyrus the Great since the rulers of </span><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1377" instrument_node="">Persia</span></a><span data-dcnode-id="1375" instrument_node=""> were Zoroastrians and relatively liberal and progressive.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1366"><strong data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Mandana</span></strong><span data-dcnode-id="1370" instrument_node=""> was a Median princess and mother of Cyrus the Great, (ruler of </span><a data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1369" instrument_node="">Persia</span></a><span data-dcnode-id="1367" instrument_node="">’s Achaemenid Dynasty and the writer of the first declaration of human rights in the globe, named: Cyrus Cylinder).</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1361"><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Amitis Shahbanu</span></strong><span data-dcnode-id="1362" instrument_node=""> was a Median princess, who became the wife of Cyrus the Great.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1356"><strong data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Pantea Arteshbod</span></strong><span data-dcnode-id="1357" instrument_node=""> (Commander of the Persian “Immortal” Army), was one of the all-time greatest Persian commanders during the reign of Cyrus the Great. Commander Pantea truly was an important and sensitive military commander whose presence on the ancient battlefield made a difference to the outcome of the battle and played a part in building up the tapestry of ancient military Achievement. The name “Pantea” means: “Strong and immortal.” in Persian and “all the gods” or “all the flowers” in Greek.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1351"><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Cassandane Shahbanu</span></strong><span data-dcnode-id="1352" instrument_node=""> was an Achaemenid Persian noblewoman, she became the wife of Cyrus the Great several years after his first beloved wife Queen Amitis passed away.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1346"><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Mahruyeh Shahbanu</span></strong><span data-dcnode-id="1347" instrument_node=""> was the Queen of the Persian Achaemenid Empire. The name “Mahruyeh” means: “Pretty face.”</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1341"><strong data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Lieutenant Artunis</span></strong><span data-dcnode-id="1342" instrument_node=""> was the Commander of the Achaemenid Persian Army. She was a mighty brave woman.The name “Artunis” means: “True and faithful.”</span></p><span data-dcnode-id="1340" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1334" id="attachment_1280" style="width: 835px"><img alt="Persian Women" aria-describedby="caption-attachment-1280" class="wp-image-1280 size-full" data-dcnode-id="1339" height="544" loading="lazy" sizes="(max-width: 825px) 100vw, 825px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-6-2.jpg&amp;raw" srcset="https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-6-2.jpg 825w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-6-2-300x198.jpg 300w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-6-2-768x506.jpg 768w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-6-2-773x510.jpg 773w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-6-2-350x231.jpg 350w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-6-2-729x481.jpg 729w" title="Persian Women" width="825" wpfc-lazyload-disable="true"><p class="wp-caption-text" data-dcnode-id="1335" id="caption-attachment-1280"><strong data-dcnode-id="1336"><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/persian-women/" target="_blank" title="Persian Women"><span data-dcnode-id="1338" instrument_node="">Persian Women</span></a></strong></p></div><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1329"><strong data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Atusa Shahbanu</span></strong><span data-dcnode-id="1330" instrument_node=""> was the Queen of the Persian Achaemenid Empire, wife of King Darius the Great. She was very wealthy with her own administration and massive personal army. The name “Atusa” means: “Beautiful body.” (Alternative spellings are: Atoosa, Atousa, or Atossa.)</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1324"><strong data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Phaidyme Shahbanu</span></strong><span data-dcnode-id="1325" instrument_node=""> was an Achaemenid Queen, one of the seven conspirators who helped Darius the Great to assume the throne. The name “Phaidyme” is a Hellenized form of an unidentified Old Persian name.</span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1319"><strong data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Irdabama</span></strong><span data-dcnode-id="1320" instrument_node=""> was a highly Successful Historical Business Woman. She was a major formidable landowner and controlled a huge workforce. She proved that possession of enormous property, wealth and good social standing was not limited to Royal women and that everything was possible with hard work and determination. Irdabama was just one of the many successful and powerful business women in the ancient Persian World. The name “Irdabama” is a Hellenized form of an unidentified Old Persian name.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1314"><strong data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Amestris Shahbanu</span></strong><span data-dcnode-id="1315" instrument_node=""> was the beautiful daughter of Otanes. She was also an Achaemenid military Commander and her mother was a Arteshbod General of the Imperial Army. She had the reputation to be more bloodthirsty than any Persian king had ever been against those who broke the law in order to set a precedent for the importance of the rule of law in the empire. The name “Amestris” means: “Friend, companion.” (Comes from Old Persian “Amastri” with the meaning “Strong woman”)</span></p><span data-dcnode-id="1313" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1308" id="attachment_1271" style="width: 280px"><img alt="Persian Woman" aria-describedby="caption-attachment-1271" class="wp-image-1271 size-full" data-dcnode-id="1312" height="270" loading="lazy" sizes="(max-width: 270px) 100vw, 270px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-2.jpg&amp;raw" srcset="https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-2.jpg 270w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-2-150x150.jpg 150w" title="Persian Woman" width="270"><p class="wp-caption-text" data-dcnode-id="1309" id="caption-attachment-1271"><a data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/persian-women" target="_blank" title="Persian Woman"><span data-dcnode-id="1311" instrument_node="">Persian Woman</span></a></p></div><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1300"><strong data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Grand Admiral Artemisia</span></strong><span data-dcnode-id="1304" instrument_node=""> became the ruler of Halicarnassius (A Greek City-State and a colony of </span><a data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/persian-empire/" target="_blank" title="Persian Empire"><span data-dcnode-id="1303" instrument_node="">Persian Empire</span></a><span data-dcnode-id="1301" instrument_node="">). She ruled under the overlordship of the Persian Emperor Xerxes I (Kheshayar Shah). The name “Artemisia” means: “The great speaker of truth.”</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1295"><strong data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Esther</span></strong><span data-dcnode-id="1296" instrument_node=""> (born “Hadassah”) was the wife of King Xerxes the Great. The name “Esther” comes from the Persian word: “star”.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1290"><strong data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Pari Satis (Parysatis</span></strong><span data-dcnode-id="1291" instrument_node="">) was the half-sister of Xerxes II. She was also a General (Arteshbod) and took full command of the Imperial Army when her husband died in battle. The name “Pari” means: “Angel-like.”</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1282"><strong data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Sissy Cambis</span></strong><span data-dcnode-id="1286" instrument_node=""> was the Empress of </span><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1285" instrument_node="">Persia</span></a><span data-dcnode-id="1283" instrument_node=""> and the Mother of Darius the Third, she was a remarkable Achaemenid woman who fought, resisted and did not surrender to Alexander the Macedonian Tyrant. The name “Sissy” means: “Fortunate.”</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1277"><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Princess Estatira (Stateira)</span></strong><span data-dcnode-id="1278" instrument_node=""> was the daughter of Darius the Third and Sissy Cambis. Estatira had the rank of: Achaemenid Sepahbod (Lieutenant General). The name “Estatira (Stateira)” means: “Creation of the stars.”</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1272"><strong data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Youtab Aryobarzan</span></strong><span data-dcnode-id="1273" instrument_node=""> was the Commander of Achaemenid Army, sister of the legendary Persian Hero, General Aryobarzan, she stood side by side to her brother and fought the Greeks and Macedonians to death during the invasion of Alexander. The name “Youtab” means: “Unique.”</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1264"><strong data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Princess Roxana</span></strong><span data-dcnode-id="1268" instrument_node=""> was daughter of King Darius III, Shahanshah of The </span><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/persian-empire/" target="_blank" title="Persian Empire"><span data-dcnode-id="1267" instrument_node="">Persian Empire</span></a><span data-dcnode-id="1265" instrument_node="">! The name “Roxana” means: “The dawn and luminous beauty.” (in both Persian and Bactrian).</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1256"><strong data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Sura</span></strong><span data-dcnode-id="1260" instrument_node=""> was one of the Greatest Heroines of </span><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/persian-history/" target="_blank" title="Persian History"><span data-dcnode-id="1259" instrument_node="">Persian History</span></a><span data-dcnode-id="1257" instrument_node="">, A strategical and Military Genius during the Parthian dynasty. Sura had the rank of: Ashkanid’s General, Sepahbod (Lieutenant General). The name “Sura” means: “Flower face.”</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1251"><strong data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Azadokht Shahbanu</span></strong><span data-dcnode-id="1252" instrument_node=""> was the Queen of the Persian Sassanid Empire. Azadokht was not a military woman but she was very skilled with her sword. The name “Azadokht” means: “Free girl.”</span></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1246"><strong data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Princess Aspas</span></strong><span data-dcnode-id="1247" instrument_node=""> was a Commander of the Persian Sassanid police force and a daughter of Emperor Ardeshir the Second. The name “Aspas” means: “Guard of strength.”</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1241"><strong data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Princess Parin</span></strong><span data-dcnode-id="1242" instrument_node=""> was a Persian Sassanid politician, daughter of Qobad, Counselor of the Persian Courthouse, extremely intelligent and confident female politician. The name “Parin” means: “Same as an angel.”</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1233"><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Zand Shahbanu</span></strong><span data-dcnode-id="1237" instrument_node=""> was the Queen of </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1236" instrument_node="">Persia</span></a><span data-dcnode-id="1234" instrument_node=""> and the mighty Wife of King Khosrow Anushirvan: ruled 531–579 C.E. (The most illustrious of the Sassanid Rulers) and the niece of General Bahram Chubin). The name “Zand” means: “Precious.”</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1228"><strong data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Shirin Shahbanu</span></strong><span data-dcnode-id="1229" instrument_node=""> was the Queen of the Persian Sassanid Empire and the wife of King Khosrow Parviz 590-628 C.E. The name “Shirin” means: “Sense of sweetness.”</span></p><span data-dcnode-id="1227" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1222" id="attachment_1277" style="width: 280px"><img alt="Persian Woman" aria-describedby="caption-attachment-1277" class="wp-image-1277 size-full" data-dcnode-id="1226" height="270" loading="lazy" sizes="(max-width: 270px) 100vw, 270px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-5.jpg&amp;raw" srcset="https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-5.jpg 270w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-5-150x150.jpg 150w" title="Persian Woman" width="270"><p class="wp-caption-text" data-dcnode-id="1223" id="caption-attachment-1277"><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/persian-women" target="_blank" title="Persian Woman"><span data-dcnode-id="1225" instrument_node="">Persian Woman</span></a></p></div><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1214"><strong data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Empress Purandokht</span></strong><span data-dcnode-id="1218" instrument_node=""> was the twenty-sixth Sassanid monarch of </span><a data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1217" instrument_node="">Persia</span></a><span data-dcnode-id="1215" instrument_node="">, reigning from 629 to 631. The name “Puran-dokht” means: “Beautiful-girl.”</span></p><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1206"><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Empress Azarmidokht</span></strong><span data-dcnode-id="1210" instrument_node=""> was the daughter of King Khosrow Parviz. She was the twenty-seventh Sassanid Monarch of </span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1209" instrument_node="">Persia</span></a><span data-dcnode-id="1207" instrument_node=""> and she ruled the empire after her sister Purandokht during the Sassanid Dynasty era. The name “Azarmidokht” means: “Youthful girl.”</span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1195"><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Banu</span></strong><span data-dcnode-id="1202" instrument_node=""> was the Wife of Babak Khoramdin (Persian Legendary Freedom Fighter). She fought side by side to her husband Babak. Banu and Babak Khoramdin are considered as one of the most heroic freedom fighters of </span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1201" instrument_node="">Persia</span></a><span data-dcnode-id="1199" instrument_node=""> who initiated the Khoramdinan movement. They lived and they died as Proud </span><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/" target="_blank" title="Persians"><span data-dcnode-id="1198" instrument_node="">Persians</span></a><span data-dcnode-id="1196" instrument_node=""> until the last drop of blood was shed. The name “Banu” means: “Lady.” (Alternative spellings: “Bānu Xorramdin”)</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1187"><strong data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Turandokht</span></strong><span data-dcnode-id="1191" instrument_node=""> was the beautiful Princess of </span><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1190" instrument_node="">Persia</span></a><span data-dcnode-id="1188" instrument_node=""> during the Sassanid dynasty era. In The Book of One Thousand and One Nights (Hezar o-yek shab), she became an icon of nobility and stature. The name “Turandokht” means: “Turanian girl.” (Turan’s Daughter) with “dokht” being a contraction for “Dokhtar” in Persian (meaning “Daughter”)</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1182"><strong data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Apranik </span></strong><span data-dcnode-id="1183" instrument_node="">was a Persian Sassanid High Ranking Commander of Army and fought gracefully, as a resistance commander. Apranik was a tireless inspiration for her troops in defense of their nation against outside aggressors. The name “Apranik” means: “Daughter of elder.”</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1171"><strong data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Negan</span></strong><span data-dcnode-id="1178" instrument_node=""> was a freedom Fighter Leader, A Guerrilla Commander during Sassanid dynasty era and after the Arabo-Occupation, one of the major resistance fighters of </span><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1177" instrument_node="">Persia</span></a><span data-dcnode-id="1175" instrument_node=""> against the Arab Invasion. Negan was not a military woman, nor a woman of nobility, yet she had a heart full of love for </span><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/renaming-persia" target="_blank" title="Persia"><span data-dcnode-id="1174" instrument_node="">Persia</span></a><span data-dcnode-id="1172" instrument_node="">. Her heart was pounding for the Mother Land. The name “Negan” means: “Good destiny.”</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1163"><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Azad Deylami</span></strong><span data-dcnode-id="1167" instrument_node=""> was a Guerrilla Commander and a partisan leader from Caspian Sea shores in north of </span><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/iran/" target="_blank" title="Iran"><span data-dcnode-id="1166" instrument_node="">Iran</span></a><span data-dcnode-id="1164" instrument_node=""> who fought bravely for many years with her band of freedom fighters against the Arab Oppressors, during the Occupation era.The name “Azad” means: “Free.”</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1155"><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Chista </span></strong><span data-dcnode-id="1159" instrument_node="">was a daughter of Asho Zarathushtra, who was a significant figure in the Zoroastrianism religion, once the dominant religion of the ancient </span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/persian-empire/" target="_blank" title="Persian Empire"><span data-dcnode-id="1158" instrument_node="">Persian Empire</span></a><span data-dcnode-id="1156" instrument_node="">. The name Chista means intelligent and she was a major figure in the religious teachings of the ancient world.</span></p><span data-dcnode-id="1154" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1148" id="attachment_1281" style="width: 835px"><img alt="Persian Woman" aria-describedby="caption-attachment-1281" class="wp-image-1281 size-full" data-dcnode-id="1153" height="544" loading="lazy" sizes="(max-width: 825px) 100vw, 825px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-7.jpg&amp;raw" srcset="https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-7.jpg 825w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-7-300x198.jpg 300w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-7-768x506.jpg 768w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-7-773x510.jpg 773w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-7-350x231.jpg 350w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/women-persian-women-7-729x481.jpg 729w" title="Persian Woman" width="825" wpfc-lazyload-disable="true"><p class="wp-caption-text" data-dcnode-id="1149" id="caption-attachment-1281"><strong data-dcnode-id="1150"><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//persiansarenotarabs.com/persian-women" target="_blank" title="Persian Woman"><span data-dcnode-id="1152" instrument_node="">Persian Woman</span></a></strong></p></div><span data-dcnode-id="1147" instrument_node="">
</span><h2 data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Persian Women – in Modern Iran</span></h2><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1143" instrument_node="">Throughout the history of </span><a data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/iran/" target="_blank" title="Iran"><span data-dcnode-id="1142" instrument_node="">Iran</span></a><span data-dcnode-id="1140" instrument_node="">, women have been a vital force and have always taken a fundamental and representative role in the development of </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/iran/" target="_blank" title="Iran"><span data-dcnode-id="1139" instrument_node="">Iran</span></a><span data-dcnode-id="1137" instrument_node="">. Not only are Iranian women in the spotlight for their fighting spirit but also their natural, physical attributes. Their rich endowment and low toned voice are some of the features that make them appealing.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">There are many Iranian women who have had a great influence on not just their fellow Iranians but women all around the world in modern era.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><h3 data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Anousheh Ansari</span></h3><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1128" instrument_node="">Anousheh Ansari is an Iranian engineer and co-founder and chairwoman of Prodea Systems. Anousheh Ansari is considered the first female private space explorer and first space ambassador, earning a place in history as the fourth private explorer to visit space and the first astronaut from </span><a data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/iran/" target="_blank" title="Iran"><span data-dcnode-id="1127" instrument_node="">Iran</span></a><span data-dcnode-id="1125" instrument_node="">. She immigrated to the United States as a teenager and made her way to the top universities, helping to found a number of successful IT companies before setting her sights on the stars.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><h3 data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Maryam Mirzakhani</span></h3><span data-dcnode-id="1120" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1116" id="attachment_775" style="width: 280px"><img alt="Maryam Mirzakhani" aria-describedby="caption-attachment-775" class="wp-image-775 size-full" data-dcnode-id="1119" height="270" loading="lazy" sizes="(max-width: 270px) 100vw, 270px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/wp-content/uploads/2019/04/peopl-persian-people-5.jpg&amp;raw" srcset="https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/peopl-persian-people-5.jpg 270w, https://www.persiansarenotarabs.com/wp-content/uploads/2019/04/peopl-persian-people-5-150x150.jpg 150w" title="Maryam Mirzakhani" width="270"><p class="wp-caption-text" data-dcnode-id="1117" id="caption-attachment-775"><span data-dcnode-id="1118" instrument_node="">Maryam Mirzakhani</span></p></div><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Maryam Mirzakhani was an Iranian mathematician working in the United States. Since 2008, she has served as a professor of mathematics at Stanford University. In 2014, Mirzakhani became both the first woman and the first Iranian honored with the Fields Medal, the most prestigious award in mathematics. The award committee cited her work in understanding the symmetry of curved surfaces. Her research topics include Teichmüller theory, hyperbolic geometry, ergodic theory, and symplectic geometry.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><h3 data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Shirin Ebadi</span></h3><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1108" instrument_node="">Shirin Ebadi is an Iranian lawyer, writer, and teacher, who received the Nobel Prize for Peace in 2003 for her efforts to promote democracy and human rights, especially those of women and children in </span><a data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persiansarenotarabs.com/iran/" target="_blank" title="Iran"><span data-dcnode-id="1107" instrument_node="">Iran</span></a><span data-dcnode-id="1105" instrument_node="">. She was the first Muslim woman and the first Iranian to receive the Nobel Prize.</span></p><span data-dcnode-id="1103" instrument_node="">
