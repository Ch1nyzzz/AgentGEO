</span><h2 data-dcnode-id="2214" id="section---Persia"><span data-dcnode-id="2215" instrument_node="">Persia</span></h2><p data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Persia was the cradle of beautiful and elaborate artistic creations. Its important position on ancient trade routes allowed for foreign influences to arrive but also for Persian items to delight other regions of the world. Even today, we often think of Persia as exotic, mysterious, and captivating. </span></p><p data-dcnode-id="2208"><b data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Persia</span></b><span data-dcnode-id="2209" instrument_node=""> is a historical region that covers modern-day Iran and parts of the neighboring countries. In antiquity, the mighty Persian Empire expanded from the borders of India all the way to the Mediterranean coasts. </span></p><p data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">During the 7th century CE, Persia was among the first regions to convert to Islam. Religion has had a strong influence on art and design ever since. Indian and Chinese influences were also adopted throughout the centuries, especially during the Mongol invasion in the 13th century. For centuries, Persia flourished as an independent nation, and in the early 20th century, Iran was established. </span></p><p data-dcnode-id="2201"><span data-dcnode-id="2205" instrument_node="">In art history and design, </span><b data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Persian furniture</span></b><span data-dcnode-id="2202" instrument_node=""> usually includes the different pieces created in the area since the Middle Ages. These objects developed with similar characteristics and thus are often studied together. </span></p><p data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Modern Iranian furniture still incorporates many traditional elements. However, the traditional craftsmanship has been gradually replaced by foreign mass-produced items. </span></p><span data-dcnode-id="2198" instrument_node="">
</span></article><span data-dcnode-id="2196" instrument_node="">

</span><h2 data-dcnode-id="2161" id="section---TheStyleOfPersianFurniture"><span data-dcnode-id="2162" instrument_node="">The Style of Persian Furniture</span></h2><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Persian furniture stood out for its rich ornamentation, although rooms usually had few pieces of furniture. It was common to have low sofas or even just cushions directly on the floor for sitting. Therefore, tables were often low as well. Furniture was expensive, so chairs were mostly reserved for wealthy families and royalty, and they were usually used for receiving important visitors. </span></p><p data-dcnode-id="2158"></p><span data-dcnode-id="2157" instrument_node="">
</span><span data-dcnode-id="2154" instrument_node="">
</span><span data-dcnode-id="2153" instrument_node="">
</span><span data-dcnode-id="2152" instrument_node="">
</span><span data-dcnode-id="2149" instrument_node="">
</span><span data-dcnode-id="2147" instrument_node="">
</span><span data-dcnode-id="2145" instrument_node="">
</span><table border="0" class="imageplugin" data-dcnode-id="2144"><caption align="bottom" data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">
   Ebony chair with ivory inlays, early 19th century 
 </span></caption><tbody data-dcnode-id="2146"><tr data-dcnode-id="2148"><td data-dcnode-id="2150"><img alt="Ebony chair with ivory inlays" data-dcnode-id="2151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/cimages/multimages/16/chair_from_iran.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="2143"></p><p data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Furniture and interior design were closely related, and some architectonic elements had specific functions that we commonly associate with furniture pieces. For example, in the dining area, the floor of the central part was sometimes lower, making the cushions be at a higher level and increasing comfort. Window lattices had a similar use to that of modern window shades. </span></p><h3 data-dcnode-id="2139" id="section---DecorativeMotifs"><span data-dcnode-id="2140" instrument_node="">Decorative Motifs</span></h3><p data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">The decoration was heavily influenced by Islam, and most pieces featured non-figurative motifs, common in Islamic arts. These include complex geometric patterns, stylized flowers and leaves known as arabesques, and stylized calligraphic texts - usually with fragments from the Quran. </span></p><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Unlike other Islamic cultures, Persia was more open towards figurative representations. In Persian arts and furniture, we sometimes find pieces decorated with animal and even human forms, usually representing historical events. In religious art, however, human representations remain completely absent. </span></p><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Despite the elaborate ornamentation, Persian furniture was balanced, with carefully studied proportions and symmetric designs. </span></p><h3 data-dcnode-id="2131" id="section---WoodenFurniture"><span data-dcnode-id="2132" instrument_node="">Wooden Furniture</span></h3><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Wooden boxes for storing jewelry and manuscripts were valuable items among wealthy families. The boxes were usually lacquered and had a dense decoration of non-figurative motifs and, sometimes, representations of historical events. </span></p><p data-dcnode-id="2128"></p><span data-dcnode-id="2127" instrument_node="">
</span><span data-dcnode-id="2124" instrument_node="">
</span><span data-dcnode-id="2123" instrument_node="">
</span><span data-dcnode-id="2122" instrument_node="">
</span><span data-dcnode-id="2119" instrument_node="">
</span><span data-dcnode-id="2117" instrument_node="">
</span><span data-dcnode-id="2115" instrument_node="">
</span><table border="0" class="imageplugin" data-dcnode-id="2114"><caption align="bottom" data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">
   Wooden box decorated with gold and watercolors of battle scenes, late 18th century 
 </span></caption><tbody data-dcnode-id="2116"><tr data-dcnode-id="2118"><td data-dcnode-id="2120"><img alt="Wooden box" data-dcnode-id="2121" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/cimages/multimages/16/33928e2e-3717-40f9-98e9-40b19e6744bb_persian_box.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="2113"></p><p data-dcnode-id="2108"><span data-dcnode-id="2112" instrument_node="">Local woods were limited due to the arid climate and scarce vegetation, so most of it was imported. Brown woods were commonly used, especially </span><b data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">teak</span></b><span data-dcnode-id="2109" instrument_node="">. Sometimes, ebony was used for very special pieces. </span></p><p data-dcnode-id="2103"><span data-dcnode-id="2107" instrument_node="">The use of </span><b data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">inlays</span></b><span data-dcnode-id="2104" instrument_node=""> was a common technique for decoration. It consisted of carving decorative motifs on wood and then filling the space by inserting small pieces of different materials, usually ivory or pearl. This technique was probably learned from India. </span></p><h3 data-dcnode-id="2101" id="section---Lamps"><span data-dcnode-id="2102" instrument_node="">Lamps</span></h3><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Lamps were another important object. These pieces were usually made out of glass and bronze or brass and the exterior was finished with enamel or golden elements. The decorative motifs were mostly non-figurative and the entire surface was often covered with arabesques with a calligraphic text on the middle. Other important metalwork items were incense lamps, boxes, and vases. </span></p><p data-dcnode-id="2098"></p><span data-dcnode-id="2097" instrument_node="">
</span><span data-dcnode-id="2094" instrument_node="">
</span><span data-dcnode-id="2093" instrument_node="">
</span><span data-dcnode-id="2092" instrument_node="">
</span><span data-dcnode-id="2089" instrument_node="">
</span><span data-dcnode-id="2087" instrument_node="">
</span><span data-dcnode-id="2085" instrument_node="">
</span><table border="0" class="imageplugin" data-dcnode-id="2084"><caption align="bottom" data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">
   Lamp decorated with enamel and gold, 14th century 
 </span></caption><tbody data-dcnode-id="2086"><tr data-dcnode-id="2088"><td data-dcnode-id="2090"><img alt="Persian lamp" data-dcnode-id="2091" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/cimages/multimages/16/irans_heritages_persian_lamp.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="2083"></p><h3 data-dcnode-id="2081" id="section---PersianCarpets"><span data-dcnode-id="2082" instrument_node="">Persian Carpets</span></h3><p data-dcnode-id="2077"><b data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Persian carpets</span></b><span data-dcnode-id="2078" instrument_node=""> or rugs are among the most distinctive type of Persian furniture. Even today, they are cherished objects and are mentioned in the Quran as a furniture element of Paradise. Carpets vary in size and function: some are created for decoration while others are used for praying. </span></p><p data-dcnode-id="2076"></p><span data-dcnode-id="2075" instrument_node="">
</span><span data-dcnode-id="2072" instrument_node="">
</span><span data-dcnode-id="2071" instrument_node="">
</span><span data-dcnode-id="2070" instrument_node="">
</span><span data-dcnode-id="2067" instrument_node="">
</span><span data-dcnode-id="2065" instrument_node="">
</span><span data-dcnode-id="2063" instrument_node="">

   Persian carpet from Kashan, 17th century 
 </span></caption><tbody data-dcnode-id="2064"><tr data-dcnode-id="2066"><td data-dcnode-id="2068"><img alt="Persian carpet" data-dcnode-id="2069" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/cimages/multimages/16/9f3ac90d-109c-4b7c-abf5-38954003432e_polonaise_carpet_kashan_iran_17th_century.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="2061"></p><span data-dcnode-id="2060" instrument_node="">
</span><div class="hidden" data-dcnode-id="2008" ng-non-bindable=""><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">The usual construction features a hard base, often made out of cotton, and a softer part that faces up, made out of wool or silk. The common layout consists of a main element on the center (the medallion) and two major areas differentiated by decoration: the outline and the central space enclosed by it. Craftsmen decorated rugs with exquisite and complex patterns of traditional non-figurative motifs. Although rare, there are also carpets depicting animals and hunting scenes. </span></p><h2 data-dcnode-id="2056" id="section---WoodenWindows"><span data-dcnode-id="2057" instrument_node="">Wooden Windows</span></h2><p data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Despite the limited access to wood, local craftsmen developed very elaborate and delicate woodwork techniques. Window lattices were very popular decorative elements and were also very functional. Lattices filtered the strong sunlight and provided privacy, valued in Islam and especially in rooms used by women. </span></p><p data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Persian carpenters created window lattices for residential and religious use. The entire window area was decorated with small wood pieces repeated in complex geometric patterns. The result was beautiful honeycomb-like structures with a stunning contrast of light and shadow. </span></p><p data-dcnode-id="2051"></p><span data-dcnode-id="2050" instrument_node="">
</span><span data-dcnode-id="2047" instrument_node="">
</span><span data-dcnode-id="2046" instrument_node="">
</span><span data-dcnode-id="2045" instrument_node="">
</span><span data-dcnode-id="2042" instrument_node="">
</span><span data-dcnode-id="2040" instrument_node="">
</span><span data-dcnode-id="2038" instrument_node="">
</span><table border="0" class="imageplugin" data-dcnode-id="2037"><caption align="bottom" data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">
  Window lattice in the Jameh Mosque of Nishapur, late 16th century
 </span></caption><tbody data-dcnode-id="2039"><tr data-dcnode-id="2041"><td data-dcnode-id="2043"><img alt="Window lattice" data-dcnode-id="2044" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/cimages/multimages/16/jameh_mosque_of_nishapur_window.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="2036"></p><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">The voids were usually filled with glass and sometimes, colored glass. The different colors created an even more elaborate decoration and dramatic contrasts. </span></p><p data-dcnode-id="2029"><span data-dcnode-id="2033" instrument_node="">Elaborate woodworks were also created on doors, ceiling, </span><i data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">minbars</span></i><span data-dcnode-id="2030" instrument_node=""> (Islamic pulpits found in the mosque's prayer hall), and tombs. </span></p><h2 data-dcnode-id="2027" id="section---LessonSummary"><span data-dcnode-id="2028" instrument_node="">Lesson Summary</span></h2><p data-dcnode-id="2020"><b data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Persia</span></b><span data-dcnode-id="2024" instrument_node=""> is a historical region roughly corresponding with modern-day Iran. A rich culture developed, strongly influenced by Islam and combining Chinese and Indian elements and techniques. </span><b data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Persian furniture</span></b><span data-dcnode-id="2021" instrument_node=""> refers to the different pieces historically created in the region. </span></p><p data-dcnode-id="2009"><span data-dcnode-id="2019" instrument_node="">The furniture pieces usually had an elaborate ornamentation with Islamic non-figurative motifs, which are geometric patterns, arabesques, and calligraphic texts. Some pieces had figurative decoration as well. Rooms usually didn't have much furniture, and cushions and low tables were popular. Chairs were reserved for the nobility and wealthy families. Woods were mostly imported, and </span><b data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">teak</span></b><span data-dcnode-id="2016" instrument_node=""> was commonly used. The wooden pieces were often decorated with </span><b data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">inlays</span></b><span data-dcnode-id="2013" instrument_node=""> of pearl or ivory. Other types of furniture included wooden boxes, lamps, incense burners, window lattices, and </span><b data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Persian carpets</span></b><span data-dcnode-id="2010" instrument_node="">.</span></p></div><span data-dcnode-id="2007" instrument_node="">
