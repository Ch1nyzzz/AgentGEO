96"><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/symbols-knowledge"><span data-dcnode-id="486" instrument_node="">Symbols Knowledge</span></a></li><span data-dcnode-id="483" instrument_node=""> </span><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-1278" data-dcnode-id="480" id="menu-item-1278"><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/tags-cloud"><span data-dcnode-id="482" instrument_node="">All Tags</span></a></li><span data-dcnode-id="479" instrument_node=""> </span><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-199" data-dcnode-id="476" id="menu-item-199"><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/languages.html"><span data-dcnode-id="478" instrument_node="">Site Languages</span></a></li><span data-dcnode-id="475" instrument_node=""> </span></ul><span data-dcnode-id="473" instrument_node=""> </span></div><span data-dcnode-id="471" instrument_node=""> </span><div class="clr" data-dcnode-id="459" id="mobile-menu-search"><span data-dcnode-id="470" instrument_node=""> </span><form action="https://www.ancient-symbols.com/" aria-label="Search this website" class="mobile-searchform" data-dcnode-id="461" method="get" role="search"><span data-dcnode-id="469" instrument_node=""> </span><input aria-label="Insert search query" autocomplete="off" class="field" data-dcnode-id="468" id="ocean-mobile-search-1" name="s" placeholder="Search" type="search" value=""><span data-dcnode-id="467" instrument_node=""> </span><button aria-label="Submit search" class="searchform-submit" data-dcnode-id="463" type="submit"><span data-dcnode-id="466" instrument_node=""> </span><i aria-hidden="true" class="icon-magnifier" data-dcnode-id="465" role="img"></i><span data-dcnode-id="464" instrument_node=""> </span></button><span data-dcnode-id="462" instrument_node=""> </span></form><span data-dcnode-id="460" instrument_node=""> </span></div><span data-dcnode-id="458" instrument_node=""> </span></nav><span data-dcnode-id="456" instrument_node=""> </span></div><span data-dcnode-id="454" instrument_node=""> </span></header><span data-dcnode-id="452" instrument_node=""> </span><main class="site-main clr" data-dcnode-id="130" id="main" role="main"><span data-dcnode-id="451" instrument_node=""> </span><header class="page-header" data-dcnode-id="443"><span data-dcnode-id="450" instrument_node=""> </span><div class="container clr page-header-inner" data-dcnode-id="445"><span data-dcnode-id="449" instrument_node=""> </span><h1 class="page-header-title clr" data-dcnode-id="447" itemprop="headline"><span data-dcnode-id="448" instrument_node="">Ancient Persian Symbols</span></h1><span data-dcnode-id="446" instrument_node=""> </span></div><span data-dcnode-id="444" instrument_node=""> </span></header><span data-dcnode-id="442" instrument_node=""> </span><div class="container clr" data-dcnode-id="132" id="content-wrap"><span data-dcnode-id="441" instrument_node=""> </span><div class="content-area clr" data-dcnode-id="260" id="primary"><span data-dcnode-id="440" instrument_node=""> </span><div class="site-content clr" data-dcnode-id="262" id="content"><span data-dcnode-id="439" instrument_node=""> </span><article class="single-page-article clr" data-dcnode-id="264"><span data-dcnode-id="438" instrument_node=""> </span><div class="entry clr" data-dcnode-id="266" itemprop="text"><span data-dcnode-id="437" instrument_node=""> </span><div align="left" data-dcnode-id="312"><span data-dcnode-id="436" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">The ancient Persian symbols have always been magnificent and mystic. These symbols are not only visible dominantly in the ancient lithographic scriptures but have carried on their legacy in the present times as well. The fact that these symbols are used all over the country signifies the importance of these over time.</span></p><span data-dcnode-id="433" instrument_node=""> </span><h3 data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">The Ancient Persian Culture</span></h3><span data-dcnode-id="430" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">The land of ancient Persia, as we know today, was located in the region now identified as Iran and Afghanistan. The human civilization is known to have existed as early as 1200 BC. The first Persian state was established in 700 BC. This ancient land is imprinted with successful invasions of a number of ambitious conquerors; the most significant dynasties being the Greeks, the Arabs, the Turks and the notorious Mongols. The empire was constantly expanded through regular military conquests.</span></p><span data-dcnode-id="427" instrument_node=""> </span><div class="centerCollage" data-dcnode-id="424"><a class="oceanwp-lightbox" data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/collages/1300-1000/persian-symbols.jpg" rel="noopener" target="_blank"><img alt="Persian Symbols and their meanings" data-dcnode-id="426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/collages/600-460/persian-symbols.jpg&amp;raw" title="Persian Symbols and their meanings"></a></div><span data-dcnode-id="423" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">The Persians were highly advanced. This can be clearly concluded from the fragmented remains of the ancient Persian capital Persepolis which shows the use of complex geometrical mathematics and astronomy in its creation. Along with geometrical shapes, the art of the time focused on stylised representation of both real and imaginary creatures including lions, peacocks, griffins, and phoenixes. With time, these mythical elements along with the ancient deities came to be regarded as highly significant pillars of the history of the region.</span></p><span data-dcnode-id="420" instrument_node=""> </span><h3 data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">The Religions Practised By Ancient Persians</span></h3><span data-dcnode-id="417" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="413"><span data-dcnode-id="416" instrument_node="">The ancient Persians followed Zoroastrianism started by the prophet and the teacher Zoroaster. Founded in 600 BC, Zoroaster helped unite the empire through this religion. He preached worship of a single God named Ahura Mazda rather than multiple idols worship. The religion emphasized the battle between the good and the evil and the triumph of the former over latter. Highly dominant in the previous eras, there are only a few Zoroastrians now.</span><br data-dcnode-id="415"><span data-dcnode-id="414" instrument_node=""> The ancient Persians were fascinated by mythical creatures and gave them the utmost importance as can be seen below.</span></p><span data-dcnode-id="412" instrument_node=""> </span><h3 data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">The Persian Water Goddess Anahita</span></h3><span data-dcnode-id="409" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Anahita is the Persian goddess of water. She is also known as the Fertility Goddess, the Lady of the Beasts and the Goddess of the Sacred Dance. Anahita dominated the waters and ruled the stars and the fate. She depicts the creative principle of females. Perceived with wings and accompanied by mighty lions, Anahita is often pictured with a bejeweled diadem of stars. She is also associated with lakes, rivers, and waters of birth. She is the patroness of women and war goddess.</span></p><span data-dcnode-id="406" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="403"><a class="oceanwp-lightbox" data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/symbols-of-persia/anahita.jpg"><img alt="Anahita" class="symbolImage" data-dcnode-id="405" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/symbols-of-persia/250/anahita.jpg&amp;raw" title="Anahita"></a></p><span data-dcnode-id="402" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Anahita means “the immaculate one”. She is pictured as a virgin, donning a golden cloak and ornate in a diamond tiara. Her sacred animals are the dove and the peacock. In the ancient Persia, Anahita was very popular and is considered amongst The Great Goddess appearing in many eastern religions.</span></p><span data-dcnode-id="399" instrument_node=""> </span><h3 data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">The Sun And The Lion</span></h3><span data-dcnode-id="396" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">This ancient Persian symbol comprises two images- a lion and the sun. The lion represents divinity, royalty and the mighty lineage of the kings, much like the astrological constellation Leo. The image of the sun symbolizes the ruler of heaven. This is a very famous symbol and has been used by rules all over the history as banners since ancient times.</span></p><span data-dcnode-id="393" instrument_node=""> </span><div data-dcnode-id="384"><span data-dcnode-id="392" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="389"><a class="oceanwp-lightbox" data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/symbols-of-persia/lion-and-sun.jpg"><img alt="Sun and Lion" class="symbolImage" data-dcnode-id="391" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/symbols-of-persia/250/lion-and-sun.jpg&amp;raw" title="Sun and Lion"></a></p><span data-dcnode-id="388" instrument_node=""> </span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">&nbsp;</span></p><span data-dcnode-id="385" instrument_node=""> </span></div><span data-dcnode-id="383" instrument_node=""> </span><h3 data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">The Bird Of The Paradise: Huma</span></h3><span data-dcnode-id="380" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">The Huma bird is a legendary mythical creature from the Sufi fables. It is said to never land and live its entire life during flight. It flies invisibly high above the earth, impossible to spot through the human eyes. Also referred to as the bird of fortune, the Huma bird is a compassionate creature and symbolizes happiness. According to the Sufi lore, once you catch a glimpse of Huma or its shadow even, happiness will ensue for the rest of your life. The prominent Sufi preacher Inayat Khan portrays the spiritual dimension of this bird. According to him, it represents the evolution of a thought to the zenith where it breaks all limitations. “Huma” in the Persian language stands for the fabulous bird. It was believed in the olden times that if this legendary creature sat on the head of an individual, then it was an omen to the person becoming a king. In the word Huma, “hu” represents the spirit and the word “mah” is Arabic which represents “water”. In the older traditions, it was believed that the Zoroaster was born of the Huma tree which speaks for the bible verse “Except a man be born of Water and the Spirit, he cannot enter the Kingdom of God.”</span></p><span data-dcnode-id="377" instrument_node=""> </span><div data-dcnode-id="371"><span data-dcnode-id="376" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="373"><a class="oceanwp-lightbox" data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/symbols-of-persia/homa.jpg"><img alt="homa" class="symbolImage" data-dcnode-id="375" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/symbols-of-persia/250/homa.jpg&amp;raw" title="homa"></a></p><span data-dcnode-id="372" instrument_node=""> </span></div><span data-dcnode-id="370" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">In some altered versions, Huma bird is depicted similar to the Phoenix. It consumes itself in the fire after a few hundred years and rises anew from its own ashes. This bird is also referred to as the Bird of Paradise. It consists of the physical features of both male and female in one body. Each nature consists of one wing and one leg. Catching an Huma bird is impossible as the legends explain. According to the Sufi religion, the Huma bird cannot be caught alive and a person who kills it dies in forty days.</span></p><span data-dcnode-id="367" instrument_node=""> </span><h3 data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">The Legendary Griffins</span></h3><span data-dcnode-id="364" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">The Griffins are popular mythical creatures used extensively in the movies and fiction novels. The Griffin is a chimera or hybrid mythical creature. These legendary creatures have the body of a lion and the wings and head of eagle; thus representing the kings of both animals and the birds. They may also bear ears of a horse. Traditionally known for guarding treasures and possessions, griffins are protectors from evil, slander, and witchcraft as well. Sculpted in some churches, the Griffin is known in Christian symbolism and depicts both the divine and the human.</span></p><span data-dcnode-id="361" instrument_node=""> </span><div data-dcnode-id="355"><span data-dcnode-id="360" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="357"><a class="oceanwp-lightbox" data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/symbols-of-persia/griffin.jpg"><img alt="griffin" class="symbolImage" data-dcnode-id="359" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/symbols-of-persia/griffin.jpg&amp;raw" title="griffin"></a></p><span data-dcnode-id="356" instrument_node=""> </span></div><span data-dcnode-id="354" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">In heraldry, Griffin stands for courage, leadership, and strength.&nbsp; Pictured as fierce, they have gained respect for overages too. They appear regularly on the coats, arms, flags of the noble and highly respected important families in Europe. The roots of this fascinating mythological creature reach from Western Europe to the Eastern edges of the Indian subcontinent and beyond.</span></p><span data-dcnode-id="351" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Powerful and majestic, the griffins guarded gold and treasure. In the medieval era, they came to be regarded as symbols of monogamous marriage. They discouraged fidelity. Known to be strictly loyal to its partner, in the event of the death of one partner, the other griffin never mated again. They started representing Jesus As they were able to traverse in both air and earth with equal ease which symbolized the human and divine nature of the Christ.</span></p><span data-dcnode-id="348" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">The Griffins represent both power and wisdom. They are commonly associated with strength during the war. The Genoa republic used griffins as symbols to all its seafaring ships in the middle ages.</span></p><span data-dcnode-id="345" instrument_node=""> </span><h3 data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Mount Damavand</span></h3><span data-dcnode-id="342" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">This mountain is the highest peak in Iran and all over the Middle East. It is an active volcano and is represented heavily in the Persian mythology and folktales. It stands as a symbol of the Persian resistance from the foreign rule. It is said to possess magical healing powers due to its hot thermal water springs which treat skin ailments and chronic wounds. The mountain is printed on the back side of the Iranian 10, 000 Rials banknote.</span></p><span data-dcnode-id="339" instrument_node=""> </span><div data-dcnode-id="333"><span data-dcnode-id="338" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="335"><a class="oceanwp-lightbox" data-dcnode-id="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/symbols-of-persia/mount-damavand.jpg"><img alt="mount damavand" class="symbolImage" data-dcnode-id="337" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/symbols-of-persia/mount-damavand.jpg&amp;raw" title="mount damavand"></a></p><span data-dcnode-id="334" instrument_node=""> </span></div><span data-dcnode-id="332" instrument_node=""> </span><h3 data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Simurg</span></h3><span data-dcnode-id="329" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Simurg (alternatively spelled as Simurgh, Simorgh, Simoorgh, Simour, and Senvurv) is an ancient Persian mythological bird. This immortal, gigantic, female winged creature is usually described as having a scale-covered body, with a dog’s head and foreparts, lion’s claws and peacock’s wings and tails. It is also depicted sometimes with a human face.</span></p><span data-dcnode-id="326" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">The Simurg was considered a benevolent guardian figure with protective and healing powers. It was believed to purify the waters and the land and bestow fertility. It was also seen as a messenger or mediator between the Sky and the Earth, and symbolic of their union. The Simurg is mentioned quite frequently in classical as well as modern Persian literature, used specifically in Sufi mysticism as a metaphor for God.</span></p><span data-dcnode-id="323" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">The mystical bird appears in several old tales of creation. According to Persian legends, the Simurg was very old, so much so that it had witnessed the world’s destruction thrice.</span></p><span data-dcnode-id="320" instrument_node=""> </span><div data-dcnode-id="314"><span data-dcnode-id="319" instrument_node=""> </span><p class="arialfont1" data-dcnode-id="316"><a class="oceanwp-lightbox" data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/symbols-of-persia/simurg.jpg"><img alt="Simurg" class="symbolImage" data-dcnode-id="318" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient-symbols.com/images/symbols-of-persia/simurg.jpg&amp;raw" title="Simurg"></a></p><span data-dcnode-id="315" instrument_node=""> </span></div><span data-dcnode-id="313" instrument_node=""> </span></
