</span><h2 data-dcnode-id="4066"><span class="mw-headline" data-dcnode-id="4074" id="Carpets"><span data-dcnode-id="4075" instrument_node="">Carpets</span></span><span class="mw-editsection" data-dcnode-id="4067"><span class="mw-editsection-bracket" data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">[</span></span><a data-dcnode-id="4070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D14" title="Edit section: Carpets"><span data-dcnode-id="4071" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4065" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4056"><div class="thumbinner" data-dcnode-id="4057" style="width:402px;"><a class="image" data-dcnode-id="4063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHamburg_MKG_Safavid_animal_carpet.jpg"><img alt="" class="thumbimage" data-dcnode-id="4064" data-file-height="960" data-file-width="1280" decoding="async" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Hamburg_MKG_Safavid_animal_carpet.jpg/400px-Hamburg_MKG_Safavid_animal_carpet.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Hamburg_MKG_Safavid_animal_carpet.jpg/600px-Hamburg_MKG_Safavid_animal_carpet.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Hamburg_MKG_Safavid_animal_carpet.jpg/800px-Hamburg_MKG_Safavid_animal_carpet.jpg 2x" width="400"></a><span data-dcnode-id="4062" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4058"><div class="magnify" data-dcnode-id="4060"><a class="internal" data-dcnode-id="4061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHamburg_MKG_Safavid_animal_carpet.jpg" title="Enlarge"></a></div><span data-dcnode-id="4059" instrument_node="">Detail of a Persian Animal carpet, Safavid period, 16th century</span></div></div></div><span data-dcnode-id="4055" instrument_node="">
</span><link data-dcnode-id="4054" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4050" role="note"><span data-dcnode-id="4053" instrument_node="">Main article: </span><a data-dcnode-id="4051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_carpet" title="Persian carpet"><span data-dcnode-id="4052" instrument_node="">Persian carpet</span></a></div><span data-dcnode-id="4049" instrument_node="">
</span><p data-dcnode-id="4034"><span data-dcnode-id="4048" instrument_node="">Carpet weaving is an essential part of </span><a class="mw-redirect" data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_culture" title="Persian culture"><span data-dcnode-id="4047" instrument_node="">Persian culture</span></a><span data-dcnode-id="4045" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_art" title="Iranian art"><span data-dcnode-id="4044" instrument_node="">art</span></a><span data-dcnode-id="4042" instrument_node="">. Within the group of </span><a data-dcnode-id="4040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oriental_rug" title="Oriental rug"><span data-dcnode-id="4041" instrument_node="">Oriental rugs</span></a><span data-dcnode-id="4039" instrument_node=""> produced by the countries of the so-called "rug belt", the Persian carpet stands out by the variety and elaborateness of its designs.</span><sup class="reference" data-dcnode-id="4036" id="cite_ref-Savory_68-0"><a data-dcnode-id="4037" href="#cite_note-Savory-68"><span data-dcnode-id="4038" instrument_node="">[68]</span></a></sup><span data-dcnode-id="4035" instrument_node="">
</span></p><p data-dcnode-id="4004"><span data-dcnode-id="4033" instrument_node="">Persian carpets and rugs of various types were woven in parallel by nomadic tribes, in village and town workshops, and by royal court manufactories alike. As such, they represent different, simultaneous lines of tradition, and reflect the </span><a data-dcnode-id="4031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_Iran" title="History of Iran"><span data-dcnode-id="4032" instrument_node="">history of Iran</span></a><span data-dcnode-id="4030" instrument_node=""> and its various peoples. The carpets woven in the Safavid court manufactories of </span><a data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isfahan" title="Isfahan"><span data-dcnode-id="4029" instrument_node="">Isfahan</span></a><span data-dcnode-id="4027" instrument_node=""> during the sixteenth century are famous for their elaborate colours and artistical design, and are treasured in museums and private collections all over the world today. Their patterns and designs have set an artistic tradition for court manufactories which was kept alive during the entire duration of the Persian Empire up to the last royal dynasty of Iran. Exceptional individual Safavid carpets include the </span><a data-dcnode-id="4025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ardabil_Carpet" title="Ardabil Carpet"><span data-dcnode-id="4026" instrument_node="">Ardabil Carpet</span></a><span data-dcnode-id="4024" instrument_node=""> (now in London and Los Angeles) and the </span><a data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coronation_Carpet" title="Coronation Carpet"><span data-dcnode-id="4023" instrument_node="">Coronation Carpet</span></a><span data-dcnode-id="4021" instrument_node=""> (now in </span><a data-dcnode-id="4019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copenhagen" title="Copenhagen"><span data-dcnode-id="4020" instrument_node="">Copenhagen</span></a><span data-dcnode-id="4018" instrument_node="">). Much earlier, the </span><a data-dcnode-id="4016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baharestan_Carpet" title="Baharestan Carpet"><span data-dcnode-id="4017" instrument_node="">Baharestan Carpet</span></a><span data-dcnode-id="4015" instrument_node=""> is a lost Sasanian carpet for the royal palace at </span><a data-dcnode-id="4013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ctesiphon" title="Ctesiphon"><span data-dcnode-id="4014" instrument_node="">Ctesiphon</span></a><span data-dcnode-id="4012" instrument_node="">, and the oldest significant carpet, the </span><a data-dcnode-id="4010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pazyryk_burials%23Pazyryk_carpet" title="Pazyryk burials"><span data-dcnode-id="4011" instrument_node="">Pazyryk Carpet</span></a><span data-dcnode-id="4009" instrument_node=""> was possibly made in Persia.</span><sup class="reference" data-dcnode-id="4006" id="cite_ref-Savory_68-1"><a data-dcnode-id="4007" href="#cite_note-Savory-68"><span data-dcnode-id="4008" instrument_node="">[68]</span></a></sup><span data-dcnode-id="4005" instrument_node="">
</span></p><p data-dcnode-id="3971"><span data-dcnode-id="4003" instrument_node="">Carpets woven in towns and regional centres like </span><a data-dcnode-id="4001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tabriz_rug" title="Tabriz rug"><span data-dcnode-id="4002" instrument_node="">Tabriz</span></a><span data-dcnode-id="4000" instrument_node="">, </span><a data-dcnode-id="3998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerman_carpet" title="Kerman carpet"><span data-dcnode-id="3999" instrument_node="">Kerman</span></a><span data-dcnode-id="3997" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mashhad_rug" title="Mashhad rug"><span data-dcnode-id="3996" instrument_node="">Mashhad</span></a><span data-dcnode-id="3994" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kashan_rug" title="Kashan rug"><span data-dcnode-id="3993" instrument_node="">Kashan</span></a><span data-dcnode-id="3991" instrument_node="">, </span><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isfahan_rug" title="Isfahan rug"><span data-dcnode-id="3990" instrument_node="">Isfahan</span></a><span data-dcnode-id="3988" instrument_node="">, </span><a data-dcnode-id="3986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nain_rug" title="Nain rug"><span data-dcnode-id="3987" instrument_node="">Nain</span></a><span data-dcnode-id="3985" instrument_node=""> and </span><a data-dcnode-id="3983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qom_rug" title="Qom rug"><span data-dcnode-id="3984" instrument_node="">Qom</span></a><span data-dcnode-id="3982" instrument_node=""> are characterized by their specific weaving techniques and use of high-quality materials, colours and patterns. Town manufactories like those of </span><a data-dcnode-id="3980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tabriz" title="Tabriz"><span data-dcnode-id="3981" instrument_node="">Tabriz</span></a><span data-dcnode-id="3979" instrument_node=""> have played an important historical role in reviving the tradition of carpet weaving after periods of decline. Rugs woven by the villages and various tribes of Iran are distinguished by their fine wool, bright and elaborate colours, and specific, traditional patterns. Nomadic and small village weavers often produce rugs with bolder and sometimes more coarse designs, which are considered as the most authentic and traditional rugs of Persia, as opposed to the artistic, pre-planned designs of the larger workplaces. </span><a data-dcnode-id="3977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gabbeh" title="Gabbeh"><span data-dcnode-id="3978" instrument_node="">Gabbeh</span></a><span data-dcnode-id="3976" instrument_node=""> rugs are the best-known type of carpet from this line of tradition.</span><sup class="reference" data-dcnode-id="3973" id="cite_ref-Savory_68-2"><a data-dcnode-id="3974" href="#cite_note-Savory-68"><span data-dcnode-id="3975" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3972" instrument_node="">
</span></p><span data-dcnode-id="3970" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3961"><div class="thumbinner" data-dcnode-id="3962" style="width:222px;"><a class="image" data-dcnode-id="3968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGhyas_el_Din_Jami_-_Tabriz_%28%253F%29_-_Google_Art_Project.jpg"><img alt="" class="thumbimage" data-dcnode-id="3969" data-file-height="5001" data-file-width="9398" decoding="async" height="117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/88/Ghyas_el_Din_Jami_-_Tabriz_%2528%253F%2529_-_Google_Art_Project.jpg/220px-Ghyas_el_Din_Jami_-_Tabriz_%2528%253F%2529_-_Google_Art_Project.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/88/Ghyas_el_Din_Jami_-_Tabriz_%28%3F%29_-_Google_Art_Project.jpg/330px-Ghyas_el_Din_Jami_-_Tabriz_%28%3F%29_-_Google_Art_Project.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/88/Ghyas_el_Din_Jami_-_Tabriz_%28%3F%29_-_Google_Art_Project.jpg/440px-Ghyas_el_Din_Jami_-_Tabriz_%28%3F%29_-_Google_Art_Project.jpg 2x" width="220"></a><span data-dcnode-id="3967" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3963"><div class="magnify" data-dcnode-id="3965"><a class="internal" data-dcnode-id="3966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGhyas_el_Din_Jami_-_Tabriz_%28%253F%29_-_Google_Art_Project.jpg" title="Enlarge"></a></div><span data-dcnode-id="3964" instrument_node="">The Hunting carpet made by Ghyath ud-Din Jami. Wool, cotton and silk, 1542-3</span></div></div></div><span data-dcnode-id="3960" instrument_node="">
</span><p data-dcnode-id="3951"><span data-dcnode-id="3959" instrument_node="">The art and craft of carpet weaving has gone through periods of decline during times of political unrest, or under the influence of commercial demands. It particularly suffered from the introduction of synthetic dyes during the second half of the nineteenth century. Carpet weaving still plays a major part in the economy of modern Iran.</span><sup class="reference" data-dcnode-id="3956" id="cite_ref-Savory_68-3"><a data-dcnode-id="3957" href="#cite_note-Savory-68"><span data-dcnode-id="3958" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3955" instrument_node=""> Modern production is characterized by the revival of traditional dyeing with </span><a data-dcnode-id="3953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_dye" title="Natural dye"><span data-dcnode-id="3954" instrument_node="">natural dyes</span></a><span data-dcnode-id="3952" instrument_node="">, the reintroduction of traditional tribal patterns, but also by the invention of modern and innovative designs, woven in the centuries-old technique. Hand-woven Persian carpets and rugs were regarded as objects of high artistic and utilitarian value and prestige from the first time they were mentioned by ancient Greek writers, until today.
</span></p><p data-dcnode-id="3936"><span data-dcnode-id="3950" instrument_node="">Although the term "Persian carpet" most often refers to pile-woven textiles, flat-woven carpets and rugs like </span><a data-dcnode-id="3948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kilim" title="Kilim"><span data-dcnode-id="3949" instrument_node="">Kilim</span></a><span data-dcnode-id="3947" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soumak_rug" title="Soumak rug"><span data-dcnode-id="3946" instrument_node="">Soumak</span></a><span data-dcnode-id="3944" instrument_node="">, and embroidered fabrics like </span><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suzani_%28textile%29" title="Suzani (textile)"><span data-dcnode-id="3943" instrument_node="">Suzani</span></a><span data-dcnode-id="3941" instrument_node=""> are part of the rich and manifold tradition of Persian weaving. Persia was famous for its textiles at least as early as for its carpets.</span><sup class="reference" data-dcnode-id="3938" id="cite_ref-Savory_68-4"><a data-dcnode-id="3939" href="#cite_note-Savory-68"><span data-dcnode-id="3940" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3937" instrument_node="">
</span></p><p data-dcnode-id="3918"><span data-dcnode-id="3935" instrument_node="">In 2010, the "traditional skills of carpet weaving" in </span><a class="mw-redirect" data-dcnode-id="3933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/F%25C4%2581rs" title="Fārs"><span data-dcnode-id="3934" instrument_node="">Fārs</span></a><span data-dcnode-id="3932" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kashan_rug" title="Kashan rug"><span data-dcnode-id="3931" instrument_node="">Kashan</span></a><span data-dcnode-id="3929" instrument_node=""> were inscribed to the </span><a data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO_Intangible_Cultural_Heritage_Lists" title="UNESCO Intangible Cultural Heritage Lists"><span data-dcnode-id="3928" instrument_node="">UNESCO Intangible Cultural Heritage Lists</span></a><span data-dcnode-id="3926" instrument_node="">.</span><sup class="reference" data-dcnode-id="3923" id="cite_ref-69"><a data-dcnode-id="3924" href="#cite_note-69"><span data-dcnode-id="3925" instrument_node="">[69]</span></a></sup><sup class="reference" data-dcnode-id="3920" id="cite_ref-70"><a data-dcnode-id="3921" href="#cite_note-70"><span data-dcnode-id="3922" instrument_node="">[70]</span></a></sup><span data-dcnode-id="3919" instrument_node="">
</span></p><span data-dcnode-id="3917" instrument_node="">
</span><h2 data-dcnode-id="3907"><span class="mw-headline" data-dcnode-id="3915" id="Persian_miniature"><span data-dcnode-id="3916" instrument_node="">Persian miniature</span></span><span class="mw-editsection" data-dcnode-id="3908"><span class="mw-editsection-bracket" data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">[</span></span><a data-dcnode-id="3911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D15" title="Edit section: Persian miniature"><span data-dcnode-id="3912" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3906" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3889"><div class="thumbinner" data-dcnode-id="3890" style="width:302px;"><a class="image" data-dcnode-id="3904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABehzad_advice_ascetic.jpg"><img alt="" class="thumbimage" data-dcnode-id="3905" data-file-height="900" data-file-width="558" decoding="async" height="484" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Behzad_advice_ascetic.jpg/300px-Behzad_advice_ascetic.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Behzad_advice_ascetic.jpg/450px-Behzad_advice_ascetic.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/c/c7/Behzad_advice_ascetic.jpg 2x" width="300"></a><span data-dcnode-id="3903" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3891"><div class="magnify" data-dcnode-id="3901"><a class="internal" data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABehzad_advice_ascetic.jpg" title="Enlarge"></a></div><a data-dcnode-id="3899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kam%25C4%2581l_ud-D%25C4%25ABn_Behz%25C4%2581d" title="Kamāl ud-Dīn Behzād"><span data-dcnode-id="3900" instrument_node="">Behzad</span></a><span data-dcnode-id="3898" instrument_node="">'s </span><i data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">Advice of the Ascetic</span></i><span data-dcnode-id="3895" instrument_node=""> (c. 1500–1550). As in Western </span><a data-dcnode-id="3893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illuminated_manuscript" title="Illuminated manuscript"><span data-dcnode-id="3894" instrument_node="">illuminated manuscripts</span></a><span data-dcnode-id="3892" instrument_node="">, exquisitely decorated borders were an integral part of the work of art.</span></div></div></div><span data-dcnode-id="3888" instrument_node="">
</span><link data-dcnode-id="3887" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3883" role="note"><span data-dcnode-id="3886" instrument_node="">Main article: </span><a data-dcnode-id="3884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_miniature" title="Persian miniature"><span data-dcnode-id="3885" instrument_node="">Persian miniature</span></a></div><span data-dcnode-id="3882" instrument_node="">
</span><p data-dcnode-id="3846"><span data-dcnode-id="3881" instrument_node="">A Persian miniature is a small painting on paper, whether a book illustration or a separate work of art intended to be kept in an album of such works called a </span><i data-dcnode-id="3878"><a data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muraqqa" title="Muraqqa"><span data-dcnode-id="3880" instrument_node="">muraqqa</span></a></i><span data-dcnode-id="3877" instrument_node="">. The techniques are broadly comparable to the Western and Byzantine traditions of </span><a data-dcnode-id="3875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miniature_%28illuminated_manuscript%29" title="Miniature (illuminated manuscript)"><span data-dcnode-id="3876" instrument_node="">miniatures</span></a><span data-dcnode-id="3874" instrument_node=""> in </span><a data-dcnode-id="3872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illuminated_manuscript" title="Illuminated manuscript"><span data-dcnode-id="3873" instrument_node="">illuminated manuscripts</span></a><span data-dcnode-id="3871" instrument_node="">. Although there is an older Persian tradition of wall-painting, the survival rate and state of preservation of miniatures is better, and miniatures are much the best-known form of Persian painting in the West, and many of the most important examples are in Western, or Turkish, museums. Miniature painting became a significant Persian </span><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genre" title="Genre"><span data-dcnode-id="3870" instrument_node="">genre</span></a><span data-dcnode-id="3868" instrument_node=""> in the 13th century, receiving Chinese influence after the </span><a class="mw-redirect" data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mongol_conquests" title="Mongol conquests"><span data-dcnode-id="3867" instrument_node="">Mongol conquests</span></a><span data-dcnode-id="3865" instrument_node="">,</span><sup class="reference" data-dcnode-id="3862" id="cite_ref-71"><a data-dcnode-id="3863" href="#cite_note-71"><span data-dcnode-id="3864" instrument_node="">[71]</span></a></sup><span data-dcnode-id="3861" instrument_node=""> and the highest point in the tradition was reached in the 15th and 16th centuries.</span><sup class="reference" data-dcnode-id="3858" id="cite_ref-72"><a data-dcnode-id="3859" href="#cite_note-72"><span data-dcnode-id="3860" instrument_node="">[72]</span></a></sup><span data-dcnode-id="3857" instrument_node=""> The tradition continued, under some Western influence, after this,</span><sup class="reference" data-dcnode-id="3854" id="cite_ref-73"><a data-dcnode-id="3855" href="#cite_note-73"><span data-dcnode-id="3856" instrument_node="">[73]</span></a></sup><span data-dcnode-id="3853" instrument_node=""> and has many modern exponents. The Persian miniature was the dominant influence on other Islamic miniature traditions, principally the </span><a data-dcnode-id="3851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_miniature" title="Ottoman miniature"><span data-dcnode-id="3852" instrument_node="">Ottoman miniature</span></a><span data-dcnode-id="3850" instrument_node=""> in Turkey, and the </span><a data-dcnode-id="3848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mughal_painting" title="Mughal painting"><span data-dcnode-id="3849" instrument_node="">Mughal miniature</span></a><span data-dcnode-id="3847" instrument_node=""> in the Indian sub-continent.
</span></p><p data-dcnode-id="3837"><span data-dcnode-id="3845" instrument_node="">The tradition grew from book illustration, illustrating many narrative scenes, often with many figures. The representational conventions that developed are effective but different from Western </span><a class="mw-redirect" data-dcnode-id="3843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Graphical_perspective" title="Graphical perspective"><span data-dcnode-id="3844" instrument_node="">graphical perspective</span></a><span data-dcnode-id="3842" instrument_node="">. More important figures may be somewhat larger than those around them, and battle scenes can be very crowded indeed. Recession (depth in the picture space) is indicated by placing more distant figures higher up in the space. Great attention is paid to the background, whether of a landscape or buildings, and the detail and freshness with which plants and animals, the fabrics of tents, hangings or carpets, or tile patterns are shown is one of the great attractions of the form. The dress of figures is equally shown with great care, although artists understandably often avoid depicting the patterned cloth that many would have worn. Animals, especially the horses that very often appear, are mostly shown sideways on; even the love-stories that constitute much of the classic material illustrated are conducted largely in the saddle, as far as the prince-protagonist is concerned. Landscapes are very often mountainous (the plains that make up much of Persia are rarely attempted), this being indicated by a high undulating horizon, and outcrops of bare rock which, like the clouds in the normally small area of sky left above the landscape, are depicted in conventions derived from Chinese art. Even when a scene in a palace is shown, the viewpoint often appears to be from a point some metres in the air.</span><sup class="reference" data-dcnode-id="3839" id="cite_ref-74"><a data-dcnode-id="3840" href="#cite_note-74"><span data-dcnode-id="3841" instrument_node="">[74]</span></a></sup><span data-dcnode-id="3838" instrument_node="">
</span></p><p data-dcnode-id="3825"><span data-dcnode-id="3836" instrument_node="">Persian art under Islam had never completely forbidden the human figure, and in the miniature tradition the depiction of figures, often in large numbers, is central. This was partly because the miniature is a private form, kept in a book or album and only shown to those the owner chooses. It was therefore possible to be more free than in wall paintings or other works seen by a wider audience. The </span><a class="mw-redirect" data-dcnode-id="3834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qur%2527an" title="Qur'an"><span data-dcnode-id="3835" instrument_node="">Qur'an</span></a><span data-dcnode-id="3833" instrument_node=""> and other purely religious works are not known to have been illustrated in this way, though histories and other works of literature may include religiously related scenes, including those </span><a data-dcnode-id="3831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Depictions_of_Muhammad" title="Depictions of Muhammad"><span data-dcnode-id="3832" instrument_node="">depicting the Prophet Muhammed</span></a><span data-dcnode-id="3830" instrument_node="">, after 1500 usually without showing his face.</span><sup class="reference" data-dcnode-id="3827" id="cite_ref-75"><a data-dcnode-id="3828" href="#cite_note-75"><span data-dcnode-id="3829" instrument_node="">[75]</span></a></sup><span data-dcnode-id="3826" instrument_node="">
</span></p><p data-dcnode-id="3815"><span data-dcnode-id="3824" instrument_node="">As well as the figurative scenes in miniatures and borders, there was a parallel style of non-figurative ornamental decoration which was found in borders and panels in miniature pages, and spaces at the start or end of a work or section, and often in whole pages acting as frontispieces. In Islamic art this is referred to as "illumination", and manuscripts of the Qur'an and other religious books often included considerable number of illuminated pages.</span><sup class="reference" data-dcnode-id="3821" id="cite_ref-76"><a data-dcnode-id="3822" href="#cite_note-76"><span data-dcnode-id="3823" instrument_node="">[76]</span></a></sup><span data-dcnode-id="3820" instrument_node=""> The designs reflected contemporary work in other media, in later periods being especially close to book-covers and Persian carpets, and it is thought that many carpet designs were created by court artists and sent to the workshops in the provinces.</span><sup class="reference" data-dcnode-id="3817" id="cite_ref-77"><a data-dcnode-id="3818" href="#cite_note-77"><span data-dcnode-id="3819" instrument_node="">[77]</span></a></sup><span data-dcnode-id="3816" instrument_node="">
</span></p><span data-dcnode-id="3814" instrument_node="">
</span><h2 data-dcnode-id="3804"><span class="mw-headline" data-dcnode-id="3812" id="Safavids"><span data-dcnode-id="3813" instrument_node="">Safavids</span></span><span class="mw-editsection" data-dcnode-id="3805"><span class="mw-editsection-bracket" data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">[</span></span><a data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D16" title="Edit section: Safavids"><span data-dcnode-id="3809" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3803" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3789"><div class="thumbinner" data-dcnode-id="3790" style="width:222px;"><a class="image" data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APlate_pomegranates_Louvre_MAO868.jpg"><img alt="" class="thumbimage" data-dcnode-id="3802" data-file-height="1930" data-file-width="2040" decoding="async" height="208" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/40/Plate_pomegranates_Louvre_MAO868.jpg/220px-Plate_pomegranates_Louvre_MAO868.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/40/Plate_pomegranates_Louvre_MAO868.jpg/330px-Plate_pomegranates_Louvre_MAO868.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/40/Plate_pomegranates_Louvre_MAO868.jpg/440px-Plate_pomegranates_Louvre_MAO868.jpg 2x" width="220"></a><span data-dcnode-id="3800" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3791"><div class="magnify" data-dcnode-id="3798"><a class="internal" data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APlate_pomegranates_Louvre_MAO868.jpg" title="Enlarge"></a></div><span data-dcnode-id="3797" instrument_node="">Chinese-influenced </span><i data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">Plate decorated with two pomegranates</span></i><span data-dcnode-id="3794" instrument_node="">, v.&nbsp;1500, </span><a class="mw-redirect" data-dcnode-id="3792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Louvre" title="The Louvre"><span data-dcnode-id="3793" instrument_node="">the Louvre</span></a></div></div></div><span data-dcnode-id="3788" instrument_node="">
</span><link data-dcnode-id="3787" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3783" role="note"><span data-dcnode-id="3786" instrument_node="">Main article: </span><a data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safavid_art" title="Safavid art"><span data-dcnode-id="3785" instrument_node="">Safavid art</span></a></div><span data-dcnode-id="3782" instrument_node="">
</span><p data-dcnode-id="3769"><span data-dcnode-id="3781" instrument_node="">Safavid art is the art of the Persian </span><a data-dcnode-id="3779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safavid_dynasty" title="Safavid dynasty"><span data-dcnode-id="3780" instrument_node="">Safavid dynasty</span></a><span data-dcnode-id="3778" instrument_node=""> from 1501 to 1722. It was a high point for the art of the book and architecture; and also including ceramics, metal, glass, and gardens. The arts of the Safavid period show a far more unitary development than in any other period of Persian art,</span><sup class="reference" data-dcnode-id="3775" id="cite_ref-78"><a data-dcnode-id="3776" href="#cite_note-78"><span data-dcnode-id="3777" instrument_node="">[78]</span></a></sup><span data-dcnode-id="3774" instrument_node=""> with the same style, diffused from the court, appearing in carpets, architectural tiles, ceramics, and manuscript illumination.</span><sup class="reference" data-dcnode-id="3771" id="cite_ref-Blair_&amp;_Bloom,_171_79-0"><a data-dcnode-id="3772" href="#cite_note-Blair_&amp;_Bloom,_171-79"><span data-dcnode-id="3773" instrument_node="">[79]</span></a></sup><span data-dcnode-id="3770" instrument_node="">
</span></p><p data-dcnode-id="3754"><span data-dcnode-id="3768" instrument_node="">When the Safavids seized the throne Persian art had become divided into two styles: in the east a continuation of Timurid styles, and in the west a </span><a data-dcnode-id="3766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkmens" title="Turkmens"><span data-dcnode-id="3767" instrument_node="">Turkman</span></a><span data-dcnode-id="3765" instrument_node=""> style. Two rulers of the new dynasty succeeded in encouraging new styles that spread all over their territories: Shah </span><a data-dcnode-id="3763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tahmasp_I" title="Tahmasp I"><span data-dcnode-id="3764" instrument_node="">Tahmasp I</span></a><span data-dcnode-id="3762" instrument_node="">, who reigned 1524–1576 but lost interest in art after about 1555, and </span><a class="mw-redirect" data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abbas_I_of_Persia" title="Abbas I of Persia"><span data-dcnode-id="3761" instrument_node="">Shah Abbas I</span></a><span data-dcnode-id="3759" instrument_node=""> (r. 1588–1629).</span><sup class="reference" data-dcnode-id="3756" id="cite_ref-80"><a data-dcnode-id="3757" href="#cite_note-80"><span data-dcnode-id="3758" instrument_node="">[80]</span></a></sup><span data-dcnode-id="3755" instrument_node="">
</span></p><p data-dcnode-id="3736"><span data-dcnode-id="3753" instrument_node="">Chinese imitation drawings emerged in 15th century Persian art. Scholars have noted that extant works from the post-Mongol period contain an abundance of motifs common to Chinese art like dragons, </span><a data-dcnode-id="3751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simurgh" title="Simurgh"><span data-dcnode-id="3752" instrument_node="">simurgh</span></a><span data-dcnode-id="3750" instrument_node="">, cloud-bands, gnarled tree trunks, and </span><a class="mw-redirect" data-dcnode-id="3748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lotus_%28plant%29" title="Lotus (plant)"><span data-dcnode-id="3749" instrument_node="">lotus</span></a><span data-dcnode-id="3747" instrument_node=""> and </span><a data-dcnode-id="3745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peony" title="Peony"><span data-dcnode-id="3746" instrument_node="">peony</span></a><span data-dcnode-id="3744" instrument_node=""> flowers. </span><a data-dcnode-id="3742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinoiserie" title="Chinoiserie"><span data-dcnode-id="3743" instrument_node="">Chinoiserie</span></a><span data-dcnode-id="3741" instrument_node=""> was popular during this period. Themes that had become standard in Persian art by the 16th and 17th centuries included hunting scenes, landscapes featuring animals and horsemen battling lions. Literary scenes depicting animal fables and dragons also featured in the artwork of this period. Scholars have not found evidence of Persian drawing before the Mongol invasions but hunting, combat between men and animals and animal fables are believed to be Persian or Central Asian themes.</span><sup class="reference" data-dcnode-id="3738" id="cite_ref-met_81-0"><a data-dcnode-id="3739" href="#cite_note-met-81"><span data-dcnode-id="3740" instrument_node="">[81]</span></a></sup><span data-dcnode-id="3737" instrument_node="">
</span></p><span data-dcnode-id="3735" instrument_node="">
</span><h3 data-dcnode-id="3725"><span class="mw-headline" data-dcnode-id="3733" id="Arts_of_the_book"><span data-dcnode-id="3734" instrument_node="">Arts of the book</span></span><span class="mw-editsection" data-dcnode-id="3726"><span class="mw-editsection-bracket" data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">[</span></span><a data-dcnode-id="3729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D17" title="Edit section: Arts of the book"><span data-dcnode-id="3730" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3724" instrument_node="">
</span><p data-dcnode-id="3686"><span data-dcnode-id="3723" instrument_node="">Under the Safavids, the art of the book, especially </span><a data-dcnode-id="3721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_miniature" title="Persian miniature"><span data-dcnode-id="3722" instrument_node="">Persian miniature</span></a><span data-dcnode-id="3720" instrument_node=""> painting, constituted the essential driving force of the arts. The </span><i data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">ketab khaneh</span></i><span data-dcnode-id="3717" instrument_node="">, the royal library-workshop, provided most of the sources of motifs for objects such as carpets, ceramics or metal. Various types of books were copied, illuminated, bound and sometimes illustrated: religious books – </span><a class="mw-redirect" data-dcnode-id="3715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Koran" title="Koran"><span data-dcnode-id="3716" instrument_node="">Korans</span></a><span data-dcnode-id="3714" instrument_node="">, but also commentaries on the sacred text and theological works—and books of </span><a data-dcnode-id="3712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_literature" title="Persian literature"><span data-dcnode-id="3713" instrument_node="">Persian literature</span></a><span data-dcnode-id="3711" instrument_node=""> – the </span><i data-dcnode-id="3708"><a data-dcnode-id="3709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shahnameh" title="Shahnameh"><span data-dcnode-id="3710" instrument_node="">Shahnameh</span></a></i><span data-dcnode-id="3707" instrument_node="">, </span><a data-dcnode-id="3705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nizami_Ganjavi" title="Nizami Ganjavi"><span data-dcnode-id="3706" instrument_node="">Nizami</span></a><span data-dcnode-id="3704" instrument_node="">'s </span><i data-dcnode-id="3701"><a data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nizami_Ganjavi%23Quinary_.28.22Panj_Ganj.22_or_.22Khamsa.22.29" title="Nizami Ganjavi"><span data-dcnode-id="3703" instrument_node="">Khamsa</span></a></i><span data-dcnode-id="3700" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jami_al-Tawarikh" title="Jami al-Tawarikh"><span data-dcnode-id="3699" instrument_node="">Jami al-Tawarikh</span></a><span data-dcnode-id="3697" instrument_node=""> by </span><a class="mw-redirect" data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rashid-al-Din_Hamadani" title="Rashid-al-Din Hamadani"><span data-dcnode-id="3696" instrument_node="">Rashid-al-Din Hamadani</span></a><span data-dcnode-id="3694" instrument_node="">, and shorter accounts of the </span><a data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isra_and_Mi%2527raj" title="Isra and Mi'raj"><span data-dcnode-id="3693" instrument_node="">Mi'raj</span></a><span data-dcnode-id="3691" instrument_node="">, or "Night Journey" of the Prophet.</span><sup class="reference" data-dcnode-id="3688" id="cite_ref-82"><a data-dcnode-id="3689" href="#cite_note-82"><span data-dcnode-id="3690" instrument_node="">[82]</span></a></sup><span data-dcnode-id="3687" instrument_node="">
</span></p><span data-dcnode-id="3685" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3667"><div class="thumbinner" data-dcnode-id="3668" style="width:402px;"><a class="image" data-dcnode-id="3683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_Young_Lady_Reclining_After_a_Bath%2C_Leaf_from_the_Read_Persian_Album_Herat_%28Afghanistan%29%2C_1590s._By_Muhammad_Mu%25E2%2580%2599min_MS_M.386.5r._Purchased_by_Pierpont_Morgan.jpg"><img alt="" class="thumbimage" data-dcnode-id="3684" data-file-height="587" data-file-width="956" decoding="async" height="246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/75/A_Young_Lady_Reclining_After_a_Bath%252C_Leaf_from_the_Read_Persian_Album_Herat_%28Afghanistan%29%252C_1590s._By_Muhammad_Mu%25E2%2580%2599min_MS_M.386.5r._Purchased_by_Pierpont_Morgan.jpg/400px-thumbnail.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/75/A_Young_Lady_Reclining_After_a_Bath%2C_Leaf_from_the_Read_Persian_Album_Herat_%28Afghanistan%29%2C_1590s._By_Muhammad_Mu%E2%80%99min_MS_M.386.5r._Purchased_by_Pierpont_Morgan.jpg/600px-thumbnail.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/75/A_Young_Lady_Reclining_After_a_Bath%2C_Leaf_from_the_Read_Persian_Album_Herat_%28Afghanistan%29%2C_1590s._By_Muhammad_Mu%E2%80%99min_MS_M.386.5r._Purchased_by_Pierpont_Morgan.jpg/800px-thumbnail.jpg 2x" width="400"></a><span data-dcnode-id="3682" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3669"><div class="magnify" data-dcnode-id="3680"><a class="internal" data-dcnode-id="3681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_Young_Lady_Reclining_After_a_Bath%2C_Leaf_from_the_Read_Persian_Album_Herat_%28Afghanistan%29%2C_1590s._By_Muhammad_Mu%25E2%2580%2599min_MS_M.386.5r._Purchased_by_Pierpont_Morgan.jpg" title="Enlarge"></a></div><i data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">A Young Lady Reclining After a Bath</span></i><span data-dcnode-id="3677" instrument_node="">, </span><a data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herat" title="Herat"><span data-dcnode-id="3676" instrument_node="">Herat</span></a><span data-dcnode-id="3674" instrument_node=""> 1590s, a single miniature for the </span><i data-dcnode-id="3671"><a data-dcnode-id="3672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muraqqa" title="Muraqqa"><span data-dcnode-id="3673" instrument_node="">muraqqa</span></a></i><span data-dcnode-id="3670" instrument_node=""> market</span></div></div></div><span data-dcnode-id="3666" instrument_node="">
</span><p data-dcnode-id="3651"><span data-dcnode-id="3665" instrument_node="">Muslim Spanish </span><a data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paper" title="Paper"><span data-dcnode-id="3664" instrument_node="">Paper</span></a><span data-dcnode-id="3662" instrument_node=""> arriving early in Iran (13th century), was always used. There is frequent use of coloured papers. Towards 1540, a marbled paper also appeared, which however rapidly disappeared again. The bindings were mostly in tinted </span><a data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morocco_leather" title="Morocco leather"><span data-dcnode-id="3661" instrument_node="">Morocco leather</span></a><span data-dcnode-id="3659" instrument_node=""> of very fine quality. They could be gilded and stamped with geometric, floral or figurative motifs, or embossed in blue. In the second half of the 16th century, they pierced the leather covers to allow the coloured paper or silk pages to be seen. In the same period, at </span><a data-dcnode-id="3657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shiraz" title="Shiraz"><span data-dcnode-id="3658" instrument_node="">Shiraz</span></a><span data-dcnode-id="3656" instrument_node="">, appeared lacquered bindings, which remain however very rare and highly valued in Iran. The decoration of page margins was realised in various ways: sometimes they were inserted in a different paper, (a tradition that appeared in the 15th century); sprinkled with gold, following a Chinese custom; or painted with colours or gold. The style of illustrations varied greatly from one manuscript to another, according to the period and centre of production.</span><sup class="reference" data-dcnode-id="3653" id="cite_ref-83"><a data-dcnode-id="3654" href="#cite_note-83"><span data-dcnode-id="3655" instrument_node="">[83]</span></a></sup><span data-dcnode-id="3652" instrument_node="">
</span></p><p data-dcnode-id="3629"><span data-dcnode-id="3650" instrument_node="">Tahmasp I was for the early years of his reign a generous funder of the royal workshop, who were responsible for several of the most magnificent Persian manuscripts, but from the 1540s he was increasingly troubled by religious scruples, until in 1556 he finally issued an "Edict of Sincere Repentance" attempting to outlaw miniature painting, music and other arts.</span><sup class="reference" data-dcnode-id="3647" id="cite_ref-84"><a data-dcnode-id="3648" href="#cite_note-84"><span data-dcnode-id="3649" instrument_node="">[84]</span></a></sup><span data-dcnode-id="3646" instrument_node=""> This greatly disrupted the arts, with many painters such as </span><a data-dcnode-id="3644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abd_al-Samad" title="Abd al-Samad"><span data-dcnode-id="3645" instrument_node="">Abd al-Samad</span></a><span data-dcnode-id="3643" instrument_node=""> and </span><a data-dcnode-id="3641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mir_Sayyid_Ali" title="Mir Sayyid Ali"><span data-dcnode-id="3642" instrument_node="">Mir Sayyid Ali</span></a><span data-dcnode-id="3640" instrument_node=""> moving to India to develop the </span><a class="mw-redirect" data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mughal_miniature" title="Mughal miniature"><span data-dcnode-id="3639" instrument_node="">Mughal miniature</span></a><span data-dcnode-id="3637" instrument_node=""> instead; these two were the trail-blazers, headhunted by the Mughal Emperor </span><a data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Humayun" title="Humayun"><span data-dcnode-id="3636" instrument_node="">Humayun</span></a><span data-dcnode-id="3634" instrument_node=""> when he was in exile in 1546. Others found work at the provincial courts of Tahmasp's relations.</span><sup class="reference" data-dcnode-id="3631" id="cite_ref-85"><a data-dcnode-id="3632" href="#cite_note-85"><span data-dcnode-id="3633" instrument_node="">[85]</span></a></sup><span data-dcnode-id="3630" instrument_node="">
</span></p><p data-dcnode-id="3617"><span data-dcnode-id="3628" instrument_node="">From this dispersal of the royal workshop there was a shift in emphasis from large illustrated books for the court to the production of single sheets designed to be put into a </span><a data-dcnode-id="3626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muraqqa" title="Muraqqa"><span data-dcnode-id="3627" instrument_node="">muraqqa</span></a><span data-dcnode-id="3625" instrument_node="">, or album. These allowed collectors with more modest budgets to acquire works by leading painters. By the end of the century complicated narrative scenes with many figures were less popular, replaced by sheets with single figures, often only partially painted and with a garden background drawn rather than painted. The master of this style was </span><a data-dcnode-id="3623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reza_Abbasi" title="Reza Abbasi"><span data-dcnode-id="3624" instrument_node="">Reza Abbasi</span></a><span data-dcnode-id="3622" instrument_node=""> whose career largely coincided with the reign of Abbas I, his main employer. Although he painted figures of old men, his most common subjects were beautiful young men and (less often) women or pairs of lovers.</span><sup class="reference" data-dcnode-id="3619" id="cite_ref-86"><a data-dcnode-id="3620" href="#cite_note-86"><span data-dcnode-id="3621" instrument_node="">[86]</span></a></sup><span data-dcnode-id="3618" instrument_node="">
</span></p><span data-dcnode-id="3616" instrument_node="">

</span><h3 data-dcnode-id="3522"><span class="mw-headline" data-dcnode-id="3530" id="Ceramics"><span data-dcnode-id="3531" instrument_node="">Ceramics</span></span><span class="mw-editsection" data-dcnode-id="3523"><span class="mw-editsection-bracket" data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">[</span></span><a data-dcnode-id="3526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D18" title="Edit section: Ceramics"><span data-dcnode-id="3527" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3521" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3512"><div class="thumbinner" data-dcnode-id="3513" style="width:222px;"><a class="image" data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIran_Flasche_makffm_HSt13_image02.jpg"><img alt="" class="thumbimage" data-dcnode-id="3520" data-file-height="2425" data-file-width="1718" decoding="async" height="311" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Iran_Flasche_makffm_HSt13_image02.jpg/220px-Iran_Flasche_makffm_HSt13_image02.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Iran_Flasche_makffm_HSt13_image02.jpg/330px-Iran_Flasche_makffm_HSt13_image02.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Iran_Flasche_makffm_HSt13_image02.jpg/440px-Iran_Flasche_makffm_HSt13_image02.jpg 2x" width="220"></a><span data-dcnode-id="3518" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3514"><div class="magnify" data-dcnode-id="3516"><a class="internal" data-dcnode-id="3517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIran_Flasche_makffm_HSt13_image02.jpg" title="Enlarge"></a></div><span data-dcnode-id="3515" instrument_node="">Flask, 2nd half of 17th century</span></div></div></div><span data-dcnode-id="3511" instrument_node="">
</span><p data-dcnode-id="3474"><span data-dcnode-id="3510" instrument_node="">The study and dating of ceramics under Shah Ismail and Shah Tahmasp is difficult because there are few pieces which are dated or which mention the place of production. </span><a class="mw-redirect" data-dcnode-id="3508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_porcelain" title="Chinese porcelain"><span data-dcnode-id="3509" instrument_node="">Chinese porcelain</span></a><span data-dcnode-id="3507" instrument_node=""> was collected by the elite and more highly valued than the local productions; Shah Abbas I donated much of the royal collection to the shrines at </span><a data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ardabil" title="Ardabil"><span data-dcnode-id="3506" instrument_node="">Ardabil</span></a><span data-dcnode-id="3504" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mashad" title="Mashad"><span data-dcnode-id="3503" instrument_node="">Mashad</span></a><span data-dcnode-id="3501" instrument_node="">, renovating a room at Ardabil to display pieces in niches.</span><sup class="reference" data-dcnode-id="3498" id="cite_ref-88"><a data-dcnode-id="3499" href="#cite_note-88"><span data-dcnode-id="3500" instrument_node="">[88]</span></a></sup><span data-dcnode-id="3497" instrument_node=""> Many locations of workshops have been identified, although not with certainty, in particular: </span><a data-dcnode-id="3495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nishapur" title="Nishapur"><span data-dcnode-id="3496" instrument_node="">Nishapur</span></a><span data-dcnode-id="3494" instrument_node="">, </span><a data-dcnode-id="3492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kubachi_ware" title="Kubachi ware"><span data-dcnode-id="3493" instrument_node="">Kubachi ware</span></a><span data-dcnode-id="3491" instrument_node="">, </span><a data-dcnode-id="3489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerman" title="Kerman"><span data-dcnode-id="3490" instrument_node="">Kerman</span></a><span data-dcnode-id="3488" instrument_node=""> (moulded monochromatic pieces) and </span><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mashhad" title="Mashhad"><span data-dcnode-id="3487" instrument_node="">Mashhad</span></a><span data-dcnode-id="3485" instrument_node="">. </span><a class="mw-redirect" data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lusterware" title="Lusterware"><span data-dcnode-id="3484" instrument_node="">Lusterware</span></a><span data-dcnode-id="3482" instrument_node=""> was revived, using a different technique from the earlier production, and typically producing small pieces with a design in a dark copper colour over a dark blue background. Unlike other wares, these use traditional Middle Eastern shapes and decoration rather than </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_influences_on_Islamic_pottery" title="Chinese influences on Islamic pottery"><span data-dcnode-id="3481" instrument_node="">Chinese-inspired ones</span></a><span data-dcnode-id="3479" instrument_node="">.</span><sup class="reference" data-dcnode-id="3476" id="cite_ref-Blair_&amp;_Bloom,_171_79-1"><a data-dcnode-id="3477" href="#cite_note-Blair_&amp;_Bloom,_171-79"><span data-dcnode-id="3478" instrument_node="">[79]</span></a></sup><span data-dcnode-id="3475" instrument_node="">
</span></p><p data-dcnode-id="3465"><span data-dcnode-id="3473" instrument_node="">In general, the designs tend to imitate those of Chinese porcelain, with the production of blue and white pieces with Chinese form and motifs, with motifs such as chi clouds, and dragons.</span><sup class="reference" data-dcnode-id="3470" id="cite_ref-Blair_&amp;_Bloom,_171_79-2"><a data-dcnode-id="3471" href="#cite_note-Blair_&amp;_Bloom,_171-79"><span data-dcnode-id="3472" instrument_node="">[79]</span></a></sup><span data-dcnode-id="3469" instrument_node=""> The Persian blue is distinguished from the Chinese blue by its more numerous and subtle nuances. Often, quatrains by Persian poets, sometimes related to the destination of the piece (allusion to wine for a goblet, for example) occur in the scroll patterns. A completely different type of design, much more rare, carries iconography very specific to Islam (Islamic zodiac, bud scales, arabesques) and seems influenced by the Ottoman world, as is evidenced by feather-edged anthemions (honeysuckle ornaments) widely used in Turkey. New styles of figures appeared, influenced by the art of the book: young, elegant cupbearers, young women with curved silhouettes, or yet cypress trees entangling their branches, reminiscent of the paintings of </span><a data-dcnode-id="3467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reza_Abbasi" title="Reza Abbasi"><span data-dcnode-id="3468" instrument_node="">Reza Abbasi</span></a><span data-dcnode-id="3466" instrument_node="">.
</span></p><p data-dcnode-id="3456"><span data-dcnode-id="3464" instrument_node="">Numerous types of pieces were produced: goblets, plates, long-necked bottles, spitoons, etc. A common shape is flasks with very small necks and bodies flattened on one side and very rounded on the other. Shapes borrowed from Islamic metalwork with decoration largely inspired by Chinese porcelain are characteristic.</span><sup class="reference" data-dcnode-id="3461" id="cite_ref-89"><a data-dcnode-id="3462" href="#cite_note-89"><span data-dcnode-id="3463" instrument_node="">[89]</span></a></sup><span data-dcnode-id="3460" instrument_node=""> With the closing of the Chinese market in 1659, Persian ceramic soared to new heights, to fulfill European needs. The appearance of false marks of Chinese workshops on the backs of some ceramics marked the taste that developed in Europe for far-eastern porcelain, satisfied in large part by Safavid production. This new destination led to wider use of Chinese and exotic iconography (elephants) and the introduction of new forms, sometimes astonishing (</span><a data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hookah" title="Hookah"><span data-dcnode-id="3459" instrument_node="">hookahs</span></a><span data-dcnode-id="3457" instrument_node="">, octagonal plates, animal-shaped objects).
</span></p><span data-dcnode-id="3455" instrument_node="">
</span><ul class="gallery mw-gallery-traditional" data-dcnode-id="3382" style="max-width: 972px;"><span data-dcnode-id="3454" instrument_node="">
