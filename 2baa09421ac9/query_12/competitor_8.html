</span><h3 data-dcnode-id="3361"><span class="mw-headline" data-dcnode-id="3369" id="Metalwork"><span data-dcnode-id="3370" instrument_node="">Metalwork</span></span><span class="mw-editsection" data-dcnode-id="3362"><span class="mw-editsection-bracket" data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">[</span></span><a data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D19" title="Edit section: Metalwork"><span data-dcnode-id="3366" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3360" instrument_node="">
</span><p data-dcnode-id="3345"><span data-dcnode-id="3359" instrument_node="">Metalwork saw a gradual decline during the Safavid dynasty, and remains difficult to study, particularly because of the small number of dated pieces. Under Shah Ismail, there is a perpetuation of the shapes and decorations of Timurid inlays: motifs of almond-shaped glories, of </span><i data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">shamsa</span></i><span data-dcnode-id="3356" instrument_node=""> (suns) and of </span><i data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">chi</span></i><span data-dcnode-id="3353" instrument_node=""> clouds are found on the inkwells in the form of mausoleums or the globular pitchers reminiscent of </span><a data-dcnode-id="3351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ulugh_Beg" title="Ulugh Beg"><span data-dcnode-id="3352" instrument_node="">Ulugh Beg</span></a><span data-dcnode-id="3350" instrument_node="">'s jade one. Under Shah Tahmasp, inlays disappeared rapidly, as witnessed by a group of candlesticks in the form of pillars.</span><sup class="reference" data-dcnode-id="3347" id="cite_ref-90"><a data-dcnode-id="3348" href="#cite_note-90"><span data-dcnode-id="3349" instrument_node="">[90]</span></a></sup><span data-dcnode-id="3346" instrument_node="">
</span></p><p data-dcnode-id="3329"><span data-dcnode-id="3344" instrument_node="">Coloured paste (red, black, green) inlays begin to replace the previous inlays of silver and gold. </span><a data-dcnode-id="3342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Openwork" title="Openwork"><span data-dcnode-id="3343" instrument_node="">Openwork</span></a><span data-dcnode-id="3341" instrument_node=""> panels in steel appear, for uses such as elements of doors, plaques with inscriptions, and the heads of 'alams, the standards carried in Shi'ite religious processions.</span><sup class="reference" data-dcnode-id="3338" id="cite_ref-91"><a data-dcnode-id="3339" href="#cite_note-91"><span data-dcnode-id="3340" instrument_node="">[91]</span></a></sup><span data-dcnode-id="3337" instrument_node=""> Important shrines were given doors and </span><a data-dcnode-id="3335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jali" title="Jali"><span data-dcnode-id="3336" instrument_node="">jali</span></a><span data-dcnode-id="3334" instrument_node=""> grilles in silver and even gold.</span><sup class="reference" data-dcnode-id="3331" id="cite_ref-92"><a data-dcnode-id="3332" href="#cite_note-92"><span data-dcnode-id="3333" instrument_node="">[92]</span></a></sup><span data-dcnode-id="3330" instrument_node="">
</span></p><span data-dcnode-id="3328" instrument_node="">
</span><h3 data-dcnode-id="3318"><span class="mw-headline" data-dcnode-id="3326" id="Hardstone_carvings"><span data-dcnode-id="3327" instrument_node="">Hardstone carvings</span></span><span class="mw-editsection" data-dcnode-id="3319"><span class="mw-editsection-bracket" data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">[</span></span><a data-dcnode-id="3322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D20" title="Edit section: Hardstone carvings"><span data-dcnode-id="3323" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3317" instrument_node="">
</span><p data-dcnode-id="3302"><span data-dcnode-id="3316" instrument_node="">Persian </span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hardstone_carving" title="Hardstone carving"><span data-dcnode-id="3315" instrument_node="">hardstone carvings</span></a><span data-dcnode-id="3313" instrument_node="">, once thought to mostly date to the 15th and 16th centuries, are now thought to stretch over a wider period. Jade was increasingly appreciated from the Ilkhanid period. As well as wine-cups,</span><sup class="reference" data-dcnode-id="3310" id="cite_ref-93"><a data-dcnode-id="3311" href="#cite_note-93"><span data-dcnode-id="3312" instrument_node="">[93]</span></a></sup><span data-dcnode-id="3309" instrument_node=""> there are a series of pitchers with globular bellies, mounted on a little ring-shaped base and having wide, short necks. Two of these (one in black jade inlaid with gold, the other in white jade) are inscribed with the name of Ismail I. The handle is in the shape of a dragon, which betrays a Chinese influence, but this type of pitcher comes in fact directly from the preceding period: its prototype is the pitcher of Ulugh Beg. We also know of blades and handles of knives in jade, often inlaid with gold wire and engraved. Hardstone serves also to make jewels to inlay in metal objects, such as the great zinc bottle inlaid with gold, rubies and turquoise dated to the reign of Ismail and conserved at the museum of </span><a data-dcnode-id="3307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Topkap%25C4%25B1_Palace" title="Topkapı Palace"><span data-dcnode-id="3308" instrument_node="">Topkapi</span></a><span data-dcnode-id="3306" instrument_node=""> in </span><a data-dcnode-id="3304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Istanbul" title="Istanbul"><span data-dcnode-id="3305" instrument_node="">Istanbul</span></a><span data-dcnode-id="3303" instrument_node="">.
</span></p><span data-dcnode-id="3301" instrument_node="">
</span><h2 data-dcnode-id="3291"><span class="mw-headline" data-dcnode-id="3299" id="Qajars"><span data-dcnode-id="3300" instrument_node="">Qajars</span></span><span class="mw-editsection" data-dcnode-id="3292"><span class="mw-editsection-bracket" data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">[</span></span><a data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D21" title="Edit section: Qajars"><span data-dcnode-id="3296" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3290" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3276"><div class="thumbinner" data-dcnode-id="3277" style="width:202px;"><a class="image" data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAn_Early_Painting_of_Fath_Ali_Shah.jpg"><img alt="" class="thumbimage" data-dcnode-id="3289" data-file-height="858" data-file-width="471" decoding="async" height="364" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e8/An_Early_Painting_of_Fath_Ali_Shah.jpg/200px-An_Early_Painting_of_Fath_Ali_Shah.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e8/An_Early_Painting_of_Fath_Ali_Shah.jpg/300px-An_Early_Painting_of_Fath_Ali_Shah.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e8/An_Early_Painting_of_Fath_Ali_Shah.jpg/400px-An_Early_Painting_of_Fath_Ali_Shah.jpg 2x" width="200"></a><span data-dcnode-id="3287" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3278"><div class="magnify" data-dcnode-id="3285"><a class="internal" data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAn_Early_Painting_of_Fath_Ali_Shah.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fath_Ali_Shah" title="Fath Ali Shah"><span data-dcnode-id="3284" instrument_node="">Fath Ali Shah</span></a><span data-dcnode-id="3282" instrument_node=""> in 1798, painted by </span><a data-dcnode-id="3280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mihr_%2527Ali" title="Mihr 'Ali"><span data-dcnode-id="3281" instrument_node="">Mihr 'Ali</span></a><span data-dcnode-id="3279" instrument_node="">.</span></div></div></div><span data-dcnode-id="3275" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3261"><div class="thumbinner" data-dcnode-id="3262" style="width:222px;"><a class="image" data-dcnode-id="3273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADushanTappe.jpg"><img alt="" class="thumbimage" data-dcnode-id="3274" data-file-height="2301" data-file-width="2133" decoding="async" height="237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/16/DushanTappe.jpg/220px-DushanTappe.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/16/DushanTappe.jpg/330px-DushanTappe.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/16/DushanTappe.jpg/440px-DushanTappe.jpg 2x" width="220"></a><span data-dcnode-id="3272" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3263"><div class="magnify" data-dcnode-id="3270"><a class="internal" data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADushanTappe.jpg" title="Enlarge"></a></div><a data-dcnode-id="3268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Doshan_Tappeh_Street" title="The Doshan Tappeh Street"><span data-dcnode-id="3269" instrument_node="">The Doshan Tappeh Street</span></a><span data-dcnode-id="3267" instrument_node="">, </span><a data-dcnode-id="3265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kamal-ol-molk" title="Kamal-ol-molk"><span data-dcnode-id="3266" instrument_node="">Kamal-ol-molk</span></a><span data-dcnode-id="3264" instrument_node="">, 1899</span></div></div></div><span data-dcnode-id="3260" instrument_node="">
</span><link data-dcnode-id="3259" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3255" role="note"><span data-dcnode-id="3258" instrument_node="">Main article: </span><a data-dcnode-id="3256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qajar_art" title="Qajar art"><span data-dcnode-id="3257" instrument_node="">Qajar art</span></a></div><span data-dcnode-id="3254" instrument_node="">
</span><p data-dcnode-id="3236"><span data-dcnode-id="3253" instrument_node="">Qajar art refers to the art, architecture, and art-forms of the </span><a data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qajar_dynasty" title="Qajar dynasty"><span data-dcnode-id="3252" instrument_node="">Qajar dynasty</span></a><span data-dcnode-id="3250" instrument_node=""> of the late </span><a data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greater_Iran" title="Greater Iran"><span data-dcnode-id="3249" instrument_node="">Persian Empire</span></a><span data-dcnode-id="3247" instrument_node="">, which lasted from 1781 to 1925. The boom in artistic expression that occurred during the Qajar era was the fortunate side effect of the period of relative peace that accompanied the rule of </span><a class="mw-redirect" data-dcnode-id="3245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agha_Muhammad_Khan" title="Agha Muhammad Khan"><span data-dcnode-id="3246" instrument_node="">Agha Muhammad Khan</span></a><span data-dcnode-id="3244" instrument_node=""> and his descendants. With his ascension, the bloody turmoil that had been the eighteenth century in Persia came to a close, and made it possible for the peacetime arts to again flourish. European influence was strong, and produced new genres like painted enamel decoration on metal, typically with flowers that clearly draw on French and other European styles. </span><a data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lacquer" title="Lacquer"><span data-dcnode-id="3243" instrument_node="">Lacquer</span></a><span data-dcnode-id="3241" instrument_node=""> on wood is used in a similar way.</span><sup class="reference" data-dcnode-id="3238" id="cite_ref-94"><a data-dcnode-id="3239" href="#cite_note-94"><span data-dcnode-id="3240" instrument_node="">[94]</span></a></sup><span data-dcnode-id="3237" instrument_node="">
</span></p><span data-dcnode-id="3235" instrument_node="">
</span><h3 data-dcnode-id="3225"><span class="mw-headline" data-dcnode-id="3233" id="Qajar_painting"><span data-dcnode-id="3234" instrument_node="">Qajar painting</span></span><span class="mw-editsection" data-dcnode-id="3226"><span class="mw-editsection-bracket" data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">[</span></span><a data-dcnode-id="3229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D22" title="Edit section: Qajar painting"><span data-dcnode-id="3230" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3224" instrument_node="">
</span><p data-dcnode-id="3206"><span data-dcnode-id="3223" instrument_node="">Painting now adopted the European technique of </span><a data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oil_painting" title="Oil painting"><span data-dcnode-id="3222" instrument_node="">oil painting</span></a><span data-dcnode-id="3220" instrument_node="">. Large murals of scenes of revelry, and historical scenes, were produced as murals for palaces and coffee houses, and many portraits have an arched top showing they were intended to be inset into walls. Qajar art has a distinctive style of portraiture. The roots of traditional Qajar painting can be found in the style of painting that arose during the preceding </span><a class="mw-redirect" data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safavid" title="Safavid"><span data-dcnode-id="3219" instrument_node="">Safavid</span></a><span data-dcnode-id="3217" instrument_node=""> empire. During this time, there was a great deal of European influence on </span><a class="mw-redirect" data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_culture" title="Persian culture"><span data-dcnode-id="3216" instrument_node="">Persian culture</span></a><span data-dcnode-id="3214" instrument_node="">, especially in the arts of the royalty and noble classes. Though some modelling is used, heavy application of paint and large areas of flat, dark, rich, </span><a class="mw-redirect" data-dcnode-id="3212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Color_saturation" title="Color saturation"><span data-dcnode-id="3213" instrument_node="">saturated</span></a><span data-dcnode-id="3211" instrument_node=""> colours predominate.</span><sup class="reference" data-dcnode-id="3208" id="cite_ref-95"><a data-dcnode-id="3209" href="#cite_note-95"><span data-dcnode-id="3210" instrument_node="">[95]</span></a></sup><span data-dcnode-id="3207" instrument_node="">
</span></p><p data-dcnode-id="3194"><span data-dcnode-id="3205" instrument_node="">While the depiction of inanimate objects and </span><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Still_life" title="Still life"><span data-dcnode-id="3204" instrument_node="">still lifes</span></a><span data-dcnode-id="3202" instrument_node=""> is seen to be very realistic in Qajar painting, the depiction of human beings is decidedly </span><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Idealism" title="Idealism"><span data-dcnode-id="3201" instrument_node="">idealised</span></a><span data-dcnode-id="3199" instrument_node="">. This is especially evident in the portrayal of Qajar royalty, where the subjects of the paintings are very formulaically placed with standardised features. However, the impact of photography greatly increased the individuality of portraits in the later 19th century.</span><sup class="reference" data-dcnode-id="3196" id="cite_ref-96"><a data-dcnode-id="3197" href="#cite_note-96"><span data-dcnode-id="3198" instrument_node="">[96]</span></a></sup><span data-dcnode-id="3195" instrument_node="">
</span></p><p data-dcnode-id="3186"><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kamal-ol-molk" title="Kamal-ol-molk"><span data-dcnode-id="3193" instrument_node="">Kamal-ol-molk</span></a><span data-dcnode-id="3191" instrument_node=""> (1845–1940) came from a family of court painters, but also trained with a painter who had studied in Europe. After a career at court, he visited Europe in 1898, at the age of 47, staying for some four years. He was one of the artists who introduced a more European style to Persian painting.</span><sup class="reference" data-dcnode-id="3188" id="cite_ref-97"><a data-dcnode-id="3189" href="#cite_note-97"><span data-dcnode-id="3190" instrument_node="">[97]</span></a></sup><span data-dcnode-id="3187" instrument_node="">
</span></p><span data-dcnode-id="3185" instrument_node="">
</span><h4 data-dcnode-id="3175"><span class="mw-headline" data-dcnode-id="3183" id="Royal_portraiture"><span data-dcnode-id="3184" instrument_node="">Royal portraiture</span></span><span class="mw-editsection" data-dcnode-id="3176"><span class="mw-editsection-bracket" data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">[</span></span><a data-dcnode-id="3179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D23" title="Edit section: Royal portraiture"><span data-dcnode-id="3180" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3174" instrument_node="">
</span><p data-dcnode-id="3150"><span data-dcnode-id="3173" instrument_node="">Most famous of the Qajar artworks are the portraits that were made of the various Persian </span><a class="mw-redirect" data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shahs" title="Shahs"><span data-dcnode-id="3172" instrument_node="">Shahs</span></a><span data-dcnode-id="3170" instrument_node="">. Each ruler, and many of their sons and other relatives, commissioned official portraits of themselves either for private use or public display. The most famous of these are the myriad portraits which were painted of </span><a class="mw-redirect" data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fath_Ali_Shah_Qajar" title="Fath Ali Shah Qajar"><span data-dcnode-id="3169" instrument_node="">Fath Ali Shah Qajar</span></a><span data-dcnode-id="3167" instrument_node="">, who, with his narrow waist, long black bifurcated beard and deepest eyes, has come to exemplify the </span><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanticism" title="Romanticism"><span data-dcnode-id="3166" instrument_node="">Romantic</span></a><span data-dcnode-id="3164" instrument_node=""> image of the great Oriental Ruler. Many of these paintings were by the artist </span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mihr_%2527Ali" title="Mihr 'Ali"><span data-dcnode-id="3163" instrument_node="">Mihr 'Ali</span></a><span data-dcnode-id="3161" instrument_node="">. While the portraits were executed at various points throughout the life of the </span><a class="mw-redirect" data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fath_Ali_Shah" title="Fath Ali Shah"><span data-dcnode-id="3160" instrument_node="">Shah</span></a><span data-dcnode-id="3158" instrument_node="">, they adhere to a </span><a class="extiw" data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/canon" title="wiktionary:canon"><span data-dcnode-id="3157" instrument_node="">canon</span></a><span data-dcnode-id="3155" instrument_node=""> in which the distinctive features of the ruler are emphasized.</span><sup class="reference" data-dcnode-id="3152" id="cite_ref-98"><a data-dcnode-id="3153" href="#cite_note-98"><span data-dcnode-id="3154" instrument_node="">[98]</span></a></sup><span data-dcnode-id="3151" instrument_node="">
</span></p><p data-dcnode-id="3141"><span data-dcnode-id="3149" instrument_node="">There are portraits of Fath Ali Shah in a very wide assortment of settings, from the armour-clad warrior king to the flower-smelling gentleman, but all are similar in their depiction of the Shah, differing only slightly, usually due to the specific artist of the portrait. It is only appropriate that this particular Shah be so immortalized in this style, as it was under his rule as the second Qajar shah that the style truly flourished. One reason for this were the stronger and stronger </span><a data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diplomacy" title="Diplomacy"><span data-dcnode-id="3148" instrument_node="">diplomatic ties</span></a><span data-dcnode-id="3146" instrument_node=""> that the Qajar rulers were nurturing with European powers.</span><sup class="reference" data-dcnode-id="3143" id="cite_ref-99"><a data-dcnode-id="3144" href="#cite_note-99"><span data-dcnode-id="3145" instrument_node="">[99]</span></a></sup><span data-dcnode-id="3142" instrument_node="">
</span></p><span data-dcnode-id="3140" instrument_node="">
</span><h2 data-dcnode-id="3130"><span class="mw-headline" data-dcnode-id="3138" id="See_also"><span data-dcnode-id="3139" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="3131"><span class="mw-editsection-bracket" data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">[</span></span><a data-dcnode-id="3134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D24" title="Edit section: See also"><span data-dcnode-id="3135" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3129" instrument_node="">
