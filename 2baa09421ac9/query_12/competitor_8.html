mic art)"><span data-dcnode-id="4467" instrument_node="">arabesque</span></a><span data-dcnode-id="4465" instrument_node=""> background to an inscription</span></div></div></div><span data-dcnode-id="4461" instrument_node="">
</span><h3 data-dcnode-id="4451"><span class="mw-headline" data-dcnode-id="4459" id="Before_the_Mongol_conquest"><span data-dcnode-id="4460" instrument_node="">Before the Mongol conquest</span></span><span class="mw-editsection" data-dcnode-id="4452"><span class="mw-editsection-bracket" data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">[</span></span><a data-dcnode-id="4455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D11" title="Edit section: Before the Mongol conquest"><span data-dcnode-id="4456" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4450" instrument_node="">
</span><p data-dcnode-id="4435"><span data-dcnode-id="4449" instrument_node="">Persia managed to retain its cultural identity after the </span><a data-dcnode-id="4447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_conquest_of_Persia" title="Muslim conquest of Persia"><span data-dcnode-id="4448" instrument_node="">Muslim conquest of Persia</span></a><span data-dcnode-id="4446" instrument_node="">, which was complete by 654, and the Arab conquerors soon gave up attempts to impose the </span><a class="mw-redirect" data-dcnode-id="4444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arabic_language" title="Arabic language"><span data-dcnode-id="4445" instrument_node="">Arabic language</span></a><span data-dcnode-id="4443" instrument_node=""> on the population, although it became the language used by scholars. Turkic peoples became increasingly important in Greater Iran, especially the eastern parts, leading to a cultural </span><a class="mw-redirect" data-dcnode-id="4441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turko-Persian_tradition" title="Turko-Persian tradition"><span data-dcnode-id="4442" instrument_node="">Turko-Persian tradition</span></a><span data-dcnode-id="4440" instrument_node="">. The political structure was complex, with effective power often exercised by local rulers.</span><sup class="reference" data-dcnode-id="4437" id="cite_ref-48"><a data-dcnode-id="4438" href="#cite_note-48"><span data-dcnode-id="4439" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4436" instrument_node="">
</span></p><p data-dcnode-id="4402"><a data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nishapur" title="Nishapur"><span data-dcnode-id="4434" instrument_node="">Nishapur</span></a><span data-dcnode-id="4432" instrument_node=""> during the </span><a data-dcnode-id="4430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_Golden_Age" title="Islamic Golden Age"><span data-dcnode-id="4431" instrument_node="">Islamic Golden Age</span></a><span data-dcnode-id="4429" instrument_node="">, especially the 9th and 10th centuries, was one of the great centres of </span><a data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pottery" title="Pottery"><span data-dcnode-id="4428" instrument_node="">pottery</span></a><span data-dcnode-id="4426" instrument_node=""> and related arts.</span><sup class="reference" data-dcnode-id="4423" id="cite_ref-49"><a data-dcnode-id="4424" href="#cite_note-49"><span data-dcnode-id="4425" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4422" instrument_node=""> Most of the ceramic artefacts discovered in Nishapur are preserved in the </span><a data-dcnode-id="4420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metropolitan_Museum_of_Art" title="Metropolitan Museum of Art"><span data-dcnode-id="4421" instrument_node="">Metropolitan Museum of Art</span></a><span data-dcnode-id="4419" instrument_node=""> in New York City, and museums in </span><a data-dcnode-id="4417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tehran" title="Tehran"><span data-dcnode-id="4418" instrument_node="">Tehran</span></a><span data-dcnode-id="4416" instrument_node=""> and </span><a data-dcnode-id="4414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mashhad" title="Mashhad"><span data-dcnode-id="4415" instrument_node="">Mashhad</span></a><span data-dcnode-id="4413" instrument_node="">. Ceramics produced at Nishapur showed links with </span><a data-dcnode-id="4411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sasanian_art" title="Sasanian art"><span data-dcnode-id="4412" instrument_node="">Sasanian art</span></a><span data-dcnode-id="4410" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Asian" title="Central Asian"><span data-dcnode-id="4409" instrument_node="">Central Asian</span></a><span data-dcnode-id="4407" instrument_node=""> art.</span><sup class="reference" data-dcnode-id="4404" id="cite_ref-50"><a data-dcnode-id="4405" href="#cite_note-50"><span data-dcnode-id="4406" instrument_node="">[50]</span></a></sup><span data-dcnode-id="4403" instrument_node="">
</span></p><p data-dcnode-id="4370"><span data-dcnode-id="4401" instrument_node="">Geometric Islamic architectural decoration in stucco, tiling, brick and carved wood and stone became elaborate and refined, and along with textiles worn by the rich was probably the main type of art that could be seen by the whole population, with other types essentially restricted to the private spheres of the rich.</span><sup class="reference" data-dcnode-id="4398" id="cite_ref-51"><a data-dcnode-id="4399" href="#cite_note-51"><span data-dcnode-id="4400" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4397" instrument_node=""> Carpets are recorded in several accounts of life at the time, but none remain; they were perhaps mainly a rural </span><a data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Folk_art" title="Folk art"><span data-dcnode-id="4396" instrument_node="">folk art</span></a><span data-dcnode-id="4394" instrument_node=""> at this period. Very highly decorated metalwork in copper alloys (</span><a data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brass" title="Brass"><span data-dcnode-id="4393" instrument_node="">brass</span></a><span data-dcnode-id="4391" instrument_node=""> or </span><a data-dcnode-id="4389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bronze" title="Bronze"><span data-dcnode-id="4390" instrument_node="">bronze</span></a><span data-dcnode-id="4388" instrument_node="">) was produced, apparently for a sophisticated urban market. Gold and silver equivalents apparently existed but have been mostly recycled for their precious materials; the few survivals were mostly traded north for furs and then buried as </span><a data-dcnode-id="4386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grave_goods" title="Grave goods"><span data-dcnode-id="4387" instrument_node="">grave goods</span></a><span data-dcnode-id="4385" instrument_node=""> in </span><a data-dcnode-id="4383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Siberia" title="Siberia"><span data-dcnode-id="4384" instrument_node="">Siberia</span></a><span data-dcnode-id="4382" instrument_node="">. Sasanid </span><a data-dcnode-id="4380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iconography" title="Iconography"><span data-dcnode-id="4381" instrument_node="">iconography</span></a><span data-dcnode-id="4379" instrument_node=""> of mounted heroes, hunting scenes, and seated rulers with attendants remained popular in pottery and metalwork, now often surrounded by elaborate geometrical and calligraphic decoration.</span><sup class="reference" data-dcnode-id="4376" id="cite_ref-52"><a data-dcnode-id="4377" href="#cite_note-52"><span data-dcnode-id="4378" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4375" instrument_node=""> The rich silk textiles that were an important export from Persia also continued to use the animal, and sometimes human, figures of their Sasanid predecessors.</span><sup class="reference" data-dcnode-id="4372" id="cite_ref-53"><a data-dcnode-id="4373" href="#cite_note-53"><span data-dcnode-id="4374" instrument_node="">[53]</span></a></sup><span data-dcnode-id="4371" instrument_node="">
</span></p><p data-dcnode-id="4345"><span data-dcnode-id="4369" instrument_node="">The </span><a data-dcnode-id="4367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samanid_Empire" title="Samanid Empire"><span data-dcnode-id="4368" instrument_node="">Samanid period</span></a><span data-dcnode-id="4366" instrument_node=""> saw the creation of epigraphic pottery. These pieces were typically </span><a data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earthenware" title="Earthenware"><span data-dcnode-id="4365" instrument_node="">earthenware</span></a><span data-dcnode-id="4363" instrument_node=""> vessels with black </span><a data-dcnode-id="4361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slip_%28ceramics%29" title="Slip (ceramics)"><span data-dcnode-id="4362" instrument_node="">slip</span></a><span data-dcnode-id="4360" instrument_node=""> lettering in </span><a data-dcnode-id="4358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kufic" title="Kufic"><span data-dcnode-id="4359" instrument_node="">Kufi</span></a><span data-dcnode-id="4357" instrument_node=""> script painted on a base of white slip. These vessels would typically be inscribed with blessings or proverbs, and used to serve food.</span><sup class="reference" data-dcnode-id="4354" id="cite_ref-54"><a data-dcnode-id="4355" href="#cite_note-54"><span data-dcnode-id="4356" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4353" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samarqand" title="Samarqand"><span data-dcnode-id="4352" instrument_node="">Samarqand</span></a><span data-dcnode-id="4350" instrument_node=""> and Nishapur were both centres of production for this kind of pottery.</span><sup class="reference" data-dcnode-id="4347" id="cite_ref-Volov_1966_55-0"><a data-dcnode-id="4348" href="#cite_note-Volov_1966-55"><span data-dcnode-id="4349" instrument_node="">[55]</span></a></sup><span data-dcnode-id="4346" instrument_node="">
</span></p><p data-dcnode-id="4315"><span data-dcnode-id="4344" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seljuq_dynasty" title="Seljuq dynasty"><span data-dcnode-id="4343" instrument_node="">Seljuqs</span></a><span data-dcnode-id="4341" instrument_node="">, nomads of Turkic origin from present-day Mongolia, appeared on the stage of Islamic history toward the end of the 10th century. They seized Baghdad in 1048, before dying out in 1194 in Iran, although the production of "Seljuq" works continued through the end of the 12th and beginning of the 13th century under the auspices of smaller, independent sovereigns and patrons. During their time, the center of culture, politics and art production shifted from </span><a data-dcnode-id="4339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Damascus" title="Damascus"><span data-dcnode-id="4340" instrument_node="">Damascus</span></a><span data-dcnode-id="4338" instrument_node=""> and </span><a data-dcnode-id="4336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baghdad" title="Baghdad"><span data-dcnode-id="4337" instrument_node="">Baghdad</span></a><span data-dcnode-id="4335" instrument_node=""> to </span><a data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merv" title="Merv"><span data-dcnode-id="4334" instrument_node="">Merv</span></a><span data-dcnode-id="4332" instrument_node="">, </span><a data-dcnode-id="4330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nishapur" title="Nishapur"><span data-dcnode-id="4331" instrument_node="">Nishapur</span></a><span data-dcnode-id="4329" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rey%2C_Iran" title="Rey, Iran"><span data-dcnode-id="4328" instrument_node="">Rayy</span></a><span data-dcnode-id="4326" instrument_node="">, and </span><a data-dcnode-id="4324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isfahan" title="Isfahan"><span data-dcnode-id="4325" instrument_node="">Isfahan</span></a><span data-dcnode-id="4323" instrument_node="">, all in Iran.</span><sup class="reference" data-dcnode-id="4320" id="cite_ref-56"><a data-dcnode-id="4321" href="#cite_note-56"><span data-dcnode-id="4322" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4319" instrument_node=""> Seljuq palace centres often featured </span><a data-dcnode-id="4317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seljuk_stucco_figures" title="Seljuk stucco figures"><span data-dcnode-id="4318" instrument_node="">Seljuk stucco figures</span></a><span data-dcnode-id="4316" instrument_node="">.
</span></p><p data-dcnode-id="4305"><span data-dcnode-id="4314" instrument_node="">Popular patronage expanded because of a growing economy and new urban wealth. Inscriptions in architecture tended to focus more on the patrons of the piece. For example, sultans, viziers or lower ranking officials would receive often mention in inscriptions on mosques. Meanwhile, growth in mass market production and sale of art made it more commonplace and accessible to merchants and professionals.</span><sup class="reference" data-dcnode-id="4311" id="cite_ref-57"><a data-dcnode-id="4312" href="#cite_note-57"><span data-dcnode-id="4313" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4310" instrument_node=""> Because of increased production, many relics have survived from the Seljuk era and can be easily dated. In contrast, the dating of earlier works is more ambiguous. It is, therefore, easy to mistake Seljuk art as new developments rather than inheritance from classical Iranian and Turkic sources.</span><sup class="reference" data-dcnode-id="4307" id="cite_ref-58"><a data-dcnode-id="4308" href="#cite_note-58"><span data-dcnode-id="4309" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4306" instrument_node="">
</span></p><p data-dcnode-id="4279"><span data-dcnode-id="4304" instrument_node="">Innovations in ceramics from this period include the production of </span><a data-dcnode-id="4302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mina%2527i_ware" title="Mina'i ware"><span data-dcnode-id="4303" instrument_node="">mina'i ware</span></a><span data-dcnode-id="4301" instrument_node="">, painted in enamels with figures on a white background. This is the earliest pottery anywhere to use </span><a class="mw-redirect" data-dcnode-id="4299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Overglaze_enamel" title="Overglaze enamel"><span data-dcnode-id="4300" instrument_node="">overglaze enamel</span></a><span data-dcnode-id="4298" instrument_node=""> painting, which only began in China slightly later, and in Europe in the 18th century. This and other types of fine pottery use </span><a data-dcnode-id="4296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fritware" title="Fritware"><span data-dcnode-id="4297" instrument_node="">fritware</span></a><span data-dcnode-id="4295" instrument_node="">, a </span><a data-dcnode-id="4293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silicon" title="Silicon"><span data-dcnode-id="4294" instrument_node="">silicon</span></a><span data-dcnode-id="4292" instrument_node="">-based paste, rather than clay.</span><sup class="reference" data-dcnode-id="4289" id="cite_ref-59"><a data-dcnode-id="4290" href="#cite_note-59"><span data-dcnode-id="4291" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4288" instrument_node=""> Metalworkers highlighted their intricate hammered designs with precious metal inlays.</span><sup class="reference" data-dcnode-id="4285" id="cite_ref-60"><a data-dcnode-id="4286" href="#cite_note-60"><span data-dcnode-id="4287" instrument_node="">[60]</span></a></sup><span data-dcnode-id="4284" instrument_node=""> Across the Seljuk era, from Iran to Iraq, a unification of book painting can be seen. These paintings have animalistic figures that convey strong symbolic meaning of fidelity, treachery, and courage.</span><sup class="reference" data-dcnode-id="4281" id="cite_ref-61"><a data-dcnode-id="4282" href="#cite_note-61"><span data-dcnode-id="4283" instrument_node="">[61]</span></a></sup><span data-dcnode-id="4280" instrument_node="">
</span></p><p data-dcnode-id="4267"><span data-dcnode-id="4278" instrument_node="">The Persians gradually adopted </span><a data-dcnode-id="4276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arabic_script" title="Arabic script"><span data-dcnode-id="4277" instrument_node="">Arabic scripts</span></a><span data-dcnode-id="4275" instrument_node=""> after the conquest, and </span><a data-dcnode-id="4273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_calligraphy" title="Persian calligraphy"><span data-dcnode-id="4274" instrument_node="">Persian calligraphy</span></a><span data-dcnode-id="4272" instrument_node=""> became an important artistic medium, often used as part of the decoration of other works in most media.</span><sup class="reference" data-dcnode-id="4269" id="cite_ref-62"><a data-dcnode-id="4270" href="#cite_note-62"><span data-dcnode-id="4271" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4268" instrument_node="">
</span></p><span data-dcnode-id="4266" instrument_node="">
</span><h3 data-dcnode-id="4256"><span class="mw-headline" data-dcnode-id="4264" id="Ilkhanids"><span data-dcnode-id="4265" instrument_node="">Ilkhanids</span></span><span class="mw-editsection" data-dcnode-id="4257"><span class="mw-editsection-bracket" data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">[</span></span><a data-dcnode-id="4260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D12" title="Edit section: Ilkhanids"><span data-dcnode-id="4261" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4255" instrument_node="">
</span><p data-dcnode-id="4234"><span data-dcnode-id="4254" instrument_node="">During the 13th century, the </span><a data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mongols" title="Mongols"><span data-dcnode-id="4253" instrument_node="">Mongols</span></a><span data-dcnode-id="4251" instrument_node=""> under the leadership of </span><a data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genghis_Khan" title="Genghis Khan"><span data-dcnode-id="4250" instrument_node="">Genghis Khan</span></a><span data-dcnode-id="4248" instrument_node=""> swept through the Islamic world. After his death, his empire was divided among his sons, forming many dynasties: the </span><a data-dcnode-id="4246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yuan_dynasty" title="Yuan dynasty"><span data-dcnode-id="4247" instrument_node="">Yuan</span></a><span data-dcnode-id="4245" instrument_node=""> in China, the </span><a data-dcnode-id="4243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ilkhanate" title="Ilkhanate"><span data-dcnode-id="4244" instrument_node="">Ilkhanids</span></a><span data-dcnode-id="4242" instrument_node=""> in Iran and the </span><a data-dcnode-id="4240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_Horde" title="Golden Horde"><span data-dcnode-id="4241" instrument_node="">Golden Horde</span></a><span data-dcnode-id="4239" instrument_node=""> in northern Iran and southern Russia, the latter two converting to Islam within a few decades.</span><sup class="reference" data-dcnode-id="4236" id="cite_ref-63"><a data-dcnode-id="4237" href="#cite_note-63"><span data-dcnode-id="4238" instrument_node="">[63]</span></a></sup><span data-dcnode-id="4235" instrument_node="">
</span></p><p data-dcnode-id="4209"><span data-dcnode-id="4233" instrument_node="">A rich civilization developed under these "little khans," who were originally subservient to the Yuan emperor, but rapidly became independent. Architectural activity intensified as the Mongols became sedentary, and retained traces of their nomadic origins, such as the north-south orientation of the buildings. At the same time a process of "iranisation" took place, and construction according to previously established types, such as the "Iranian plan" mosques, was resumed. The art of the Persian book was also born under this dynasty, and was encouraged by aristocratic patronage of large manuscripts such as the </span><i data-dcnode-id="4230"><a data-dcnode-id="4231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jami%2527_al-tawarikh" title="Jami' al-tawarikh"><span data-dcnode-id="4232" instrument_node="">Jami' al-tawarikh</span></a></i><span data-dcnode-id="4229" instrument_node=""> compiled by </span><a class="mw-redirect" data-dcnode-id="4227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rashid-al-Din_Hamadani" title="Rashid-al-Din Hamadani"><span data-dcnode-id="4228" instrument_node="">Rashid-al-Din Hamadani</span></a><span data-dcnode-id="4226" instrument_node="">, and the Demotte or </span><a data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Mongol_Shahnameh" title="Great Mongol Shahnameh"><span data-dcnode-id="4225" instrument_node="">Great Mongol Shahnameh</span></a><span data-dcnode-id="4223" instrument_node="">, probably commissioned by his son. New techniques in ceramics appeared, such as the </span><i data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">lajvardina</span></i><span data-dcnode-id="4220" instrument_node=""> (a variation on </span><a class="mw-redirect" data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lusterware" title="Lusterware"><span data-dcnode-id="4219" instrument_node="">lusterware</span></a><span data-dcnode-id="4217" instrument_node="">), and Chinese influence is perceptible in all arts.</span><sup class="reference" data-dcnode-id="4214" id="cite_ref-64"><a data-dcnode-id="4215" href="#cite_note-64"><span data-dcnode-id="4216" instrument_node="">[64]</span></a></sup><sup class="reference" data-dcnode-id="4211" id="cite_ref-Rossabi2014_65-0"><a data-dcnode-id="4212" href="#cite_note-Rossabi2014-65"><span data-dcnode-id="4213" instrument_node="">[65]</span></a></sup><span data-dcnode-id="4210" instrument_node="">
</span></p><span data-dcnode-id="4208" instrument_node="">
</span><h3 data-dcnode-id="4198"><span class="mw-headline" data-dcnode-id="4206" id="Timurids"><span data-dcnode-id="4207" instrument_node="">Timurids</span></span><span class="mw-editsection" data-dcnode-id="4199"><span class="mw-editsection-bracket" data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">[</span></span><a data-dcnode-id="4202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D13" title="Edit section: Timurids"><span data-dcnode-id="4203" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4197" instrument_node="">
</span><link data-dcnode-id="4196" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4192" role="note"><span data-dcnode-id="4195" instrument_node="">See also: </span><a data-dcnode-id="4193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timurid_art" title="Timurid art"><span data-dcnode-id="4194" instrument_node="">Timurid art</span></a></div><span data-dcnode-id="4191" instrument_node="">
</span><p data-dcnode-id="4154"><span data-dcnode-id="4190" instrument_node="">During the reign of the </span><a class="mw-redirect" data-dcnode-id="4188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timurids" title="Timurids"><span data-dcnode-id="4189" instrument_node="">Timurids</span></a><span data-dcnode-id="4187" instrument_node="">, the golden age of Persian painting began, and Chinese influence continued, as Timurid artists refined the Persian art of the book, which combines paper, calligraphy, illumination, illustration and binding in a brilliant and colourful whole.</span><sup class="reference" data-dcnode-id="4184" id="cite_ref-66"><a data-dcnode-id="4185" href="#cite_note-66"><span data-dcnode-id="4186" instrument_node="">[66]</span></a></sup><span data-dcnode-id="4183" instrument_node=""> From the start paper was used, rather than </span><a data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parchment" title="Parchment"><span data-dcnode-id="4182" instrument_node="">parchment</span></a><span data-dcnode-id="4180" instrument_node=""> as in Europe. It was the Mongol ethnicity of the </span><a data-dcnode-id="4178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chagatai_Khanate" title="Chagatai Khanate"><span data-dcnode-id="4179" instrument_node="">Chaghatayid</span></a><span data-dcnode-id="4177" instrument_node=""> and Timurid </span><a data-dcnode-id="4175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Khan_%28title%29" title="Khan (title)"><span data-dcnode-id="4176" instrument_node="">Khans</span></a><span data-dcnode-id="4174" instrument_node=""> that is the source of the stylistic depiction of the human figure in Persian art during the Middle Ages. These same Mongols intermarried with the </span><a class="mw-redirect" data-dcnode-id="4172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_people" title="Persian people"><span data-dcnode-id="4173" instrument_node="">Persians</span></a><span data-dcnode-id="4171" instrument_node=""> and </span><a data-dcnode-id="4169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkic_peoples" title="Turkic peoples"><span data-dcnode-id="4170" instrument_node="">Turks</span></a><span data-dcnode-id="4168" instrument_node=""> of Central Asia, even adopting their religion and languages. Yet their simple control of the world at that time, particularly in the 13–15th centuries, reflected itself in the idealised appearance of Persians as Mongols. Though the ethnic make-up gradually blended into the </span><a data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_peoples" title="Iranian peoples"><span data-dcnode-id="4167" instrument_node="">Iranian</span></a><span data-dcnode-id="4165" instrument_node=""> and </span><a data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mesopotamia" title="Mesopotamia"><span data-dcnode-id="4164" instrument_node="">Mesopotamian</span></a><span data-dcnode-id="4162" instrument_node=""> local populations, the Mongol stylism continued well after, and crossed into </span><a class="mw-redirect" data-dcnode-id="4160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asia_Minor" title="Asia Minor"><span data-dcnode-id="4161" instrument_node="">Asia Minor</span></a><span data-dcnode-id="4159" instrument_node=""> and even North Africa.</span><sup class="reference" data-dcnode-id="4156" id="cite_ref-67"><a data-dcnode-id="4157" href="#cite_note-67"><span data-dcnode-id="4158" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4155" instrument_node="">
</span></p><span data-dcnode-id="4153" instrument_node="">
