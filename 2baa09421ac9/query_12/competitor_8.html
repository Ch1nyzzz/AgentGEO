</span><h2 data-dcnode-id="5420"><span class="mw-headline" data-dcnode-id="5428" id="Rock_reliefs"><span data-dcnode-id="5429" instrument_node="">Rock reliefs</span></span><span class="mw-editsection" data-dcnode-id="5421"><span class="mw-editsection-bracket" data-dcnode-id="5426"><span data-dcnode-id="5427" instrument_node="">[</span></span><a data-dcnode-id="5424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D6" title="Edit section: Rock reliefs"><span data-dcnode-id="5425" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5422"><span data-dcnode-id="5423" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5419" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5398"><div class="thumbinner" data-dcnode-id="5399" style="width:222px;"><a class="image" data-dcnode-id="5417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANaghsh-e_rostam%2C_Ir%25C3%25A1n%2C_2016-09-24%2C_DD_12.jpg"><img alt="" class="thumbimage" data-dcnode-id="5418" data-file-height="4421" data-file-width="7727" decoding="async" height="126" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/81/Naghsh-e_rostam%252C_Ir%25C3%25A1n%252C_2016-09-24%252C_DD_12.jpg/220px-Naghsh-e_rostam%252C_Ir%25C3%25A1n%252C_2016-09-24%252C_DD_12.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/81/Naghsh-e_rostam%2C_Ir%C3%A1n%2C_2016-09-24%2C_DD_12.jpg/330px-Naghsh-e_rostam%2C_Ir%C3%A1n%2C_2016-09-24%2C_DD_12.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/81/Naghsh-e_rostam%2C_Ir%C3%A1n%2C_2016-09-24%2C_DD_12.jpg/440px-Naghsh-e_rostam%2C_Ir%C3%A1n%2C_2016-09-24%2C_DD_12.jpg 2x" width="220"></a><span data-dcnode-id="5416" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5400"><div class="magnify" data-dcnode-id="5414"><a class="internal" data-dcnode-id="5415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANaghsh-e_rostam%2C_Ir%25C3%25A1n%2C_2016-09-24%2C_DD_12.jpg" title="Enlarge"></a></div><span data-dcnode-id="5413" instrument_node="">The triumph of </span><a data-dcnode-id="5411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shapur_I" title="Shapur I"><span data-dcnode-id="5412" instrument_node="">Shapur I</span></a><span data-dcnode-id="5410" instrument_node=""> over the Roman Emperor </span><a data-dcnode-id="5408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valerian_%28emperor%29" title="Valerian (emperor)"><span data-dcnode-id="5409" instrument_node="">Valerian</span></a><span data-dcnode-id="5407" instrument_node="">, and </span><a data-dcnode-id="5405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philip_the_Arab" title="Philip the Arab"><span data-dcnode-id="5406" instrument_node="">Philip the Arab</span></a><span data-dcnode-id="5404" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naqsh-e_Rustam" title="Naqsh-e Rustam"><span data-dcnode-id="5403" instrument_node="">Naqsh-e Rustam</span></a><span data-dcnode-id="5401" instrument_node="">.</span></div></div></div><span data-dcnode-id="5397" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5381"><div class="thumbinner" data-dcnode-id="5382" style="width:222px;"><a class="image" data-dcnode-id="5395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIR04-08-23a.jpg"><img alt="" class="thumbimage" data-dcnode-id="5396" data-file-height="1024" data-file-width="682" decoding="async" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7c/IR04-08-23a.jpg/220px-IR04-08-23a.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7c/IR04-08-23a.jpg/330px-IR04-08-23a.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7c/IR04-08-23a.jpg/440px-IR04-08-23a.jpg 2x" width="220"></a><span data-dcnode-id="5394" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5383"><div class="magnify" data-dcnode-id="5392"><a class="internal" data-dcnode-id="5393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIR04-08-23a.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="5390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taq_Bostan" title="Taq Bostan"><span data-dcnode-id="5391" instrument_node="">Taq Bostan</span></a><span data-dcnode-id="5389" instrument_node="">; the "knight" is probably </span><a class="mw-redirect" data-dcnode-id="5387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Khosrau_II_of_Persia" title="Khosrau II of Persia"><span data-dcnode-id="5388" instrument_node="">Khosrow Parviz</span></a><span data-dcnode-id="5386" instrument_node=""> mounted on </span><a data-dcnode-id="5384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shabdiz" title="Shabdiz"><span data-dcnode-id="5385" instrument_node="">Shabdiz</span></a></div></div></div><span data-dcnode-id="5380" instrument_node="">
</span><p data-dcnode-id="5336"><span data-dcnode-id="5379" instrument_node="">The large carved </span><a data-dcnode-id="5377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rock_relief" title="Rock relief"><span data-dcnode-id="5378" instrument_node="">rock relief</span></a><span data-dcnode-id="5376" instrument_node="">, typically placed high beside a road, and near a source of water, is a common medium in Persian art, mostly used to glorify the king and proclaim Persian control over territory.</span><sup class="reference" data-dcnode-id="5373" id="cite_ref-19"><a data-dcnode-id="5374" href="#cite_note-19"><span data-dcnode-id="5375" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5372" instrument_node=""> It begins with </span><a data-dcnode-id="5370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lullubi" title="Lullubi"><span data-dcnode-id="5371" instrument_node="">Lullubi</span></a><span data-dcnode-id="5369" instrument_node=""> and </span><a data-dcnode-id="5367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elam" title="Elam"><span data-dcnode-id="5368" instrument_node="">Elamite</span></a><span data-dcnode-id="5366" instrument_node=""> rock reliefs, such as those at </span><a data-dcnode-id="5364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarpol-e_Zahab" title="Sarpol-e Zahab"><span data-dcnode-id="5365" instrument_node="">Sarpol-e Zahab</span></a><span data-dcnode-id="5363" instrument_node=""> (circa 2000 BC), </span><a data-dcnode-id="5361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kul-e_Farah" title="Kul-e Farah"><span data-dcnode-id="5362" instrument_node="">Kul-e Farah</span></a><span data-dcnode-id="5360" instrument_node=""> and </span><a data-dcnode-id="5358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eshkaft-e_Salman" title="Eshkaft-e Salman"><span data-dcnode-id="5359" instrument_node="">Eshkaft-e Salman</span></a><span data-dcnode-id="5357" instrument_node=""> in southwest Iran, and continues under the Assyrians. The </span><a data-dcnode-id="5355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Behistun_Inscription" title="Behistun Inscription"><span data-dcnode-id="5356" instrument_node="">Behistun relief and inscription</span></a><span data-dcnode-id="5354" instrument_node="">, made around 500 BC for </span><a data-dcnode-id="5352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Darius_the_Great" title="Darius the Great"><span data-dcnode-id="5353" instrument_node="">Darius the Great</span></a><span data-dcnode-id="5351" instrument_node="">, is on a far grander scale, reflecting and proclaiming the power of the </span><a class="mw-redirect" data-dcnode-id="5349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achaemenid_empire" title="Achaemenid empire"><span data-dcnode-id="5350" instrument_node="">Achaemenid empire</span></a><span data-dcnode-id="5348" instrument_node="">.</span><sup class="reference" data-dcnode-id="5345" id="cite_ref-20"><a data-dcnode-id="5346" href="#cite_note-20"><span data-dcnode-id="5347" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5344" instrument_node=""> Persian rulers commonly boasted of their power and achievements, until the Muslim conquest removed imagery from such monuments; much later there was a small revival under the </span><a data-dcnode-id="5342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qajar_dynasty" title="Qajar dynasty"><span data-dcnode-id="5343" instrument_node="">Qajar dynasty</span></a><span data-dcnode-id="5341" instrument_node="">.</span><sup class="reference" data-dcnode-id="5338" id="cite_ref-Herrmann_and_Curtis_21-0"><a data-dcnode-id="5339" href="#cite_note-Herrmann_and_Curtis-21"><span data-dcnode-id="5340" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5337" instrument_node="">
</span></p><p data-dcnode-id="5311"><span data-dcnode-id="5335" instrument_node="">Behistun is unusual in having a large and important inscription, which like the Egyptian </span><a data-dcnode-id="5333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rosetta_Stone" title="Rosetta Stone"><span data-dcnode-id="5334" instrument_node="">Rosetta Stone</span></a><span data-dcnode-id="5332" instrument_node=""> repeats its text in three different languages, here all using </span><a class="mw-redirect" data-dcnode-id="5330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuneiform_script" title="Cuneiform script"><span data-dcnode-id="5331" instrument_node="">cuneiform script</span></a><span data-dcnode-id="5329" instrument_node="">: Old Persian, </span><a data-dcnode-id="5327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elamite_language" title="Elamite language"><span data-dcnode-id="5328" instrument_node="">Elamite</span></a><span data-dcnode-id="5326" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="5324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Babylonian_language" title="Babylonian language"><span data-dcnode-id="5325" instrument_node="">Babylonian</span></a><span data-dcnode-id="5323" instrument_node=""> (a later form of </span><a data-dcnode-id="5321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Akkadian_language" title="Akkadian language"><span data-dcnode-id="5322" instrument_node="">Akkadian</span></a><span data-dcnode-id="5320" instrument_node="">).</span><sup class="reference" data-dcnode-id="5317" id="cite_ref-22"><a data-dcnode-id="5318" href="#cite_note-22"><span data-dcnode-id="5319" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5316" instrument_node=""> This was important in the modern understanding of these languages. Other Persian reliefs generally lack inscriptions, and the kings involved often can only be tentatively identified. The problem is helped in the case of the Sasanians by their custom of showing a different style of crown for each king, which can be identified from their coins.</span><sup class="reference" data-dcnode-id="5313" id="cite_ref-Herrmann_and_Curtis_21-1"><a data-dcnode-id="5314" href="#cite_note-Herrmann_and_Curtis-21"><span data-dcnode-id="5315" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5312" instrument_node="">
</span></p><p data-dcnode-id="5291"><a class="mw-redirect" data-dcnode-id="5309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naqsh-e_Rustam" title="Naqsh-e Rustam"><span data-dcnode-id="5310" instrument_node="">Naqsh-e Rustam</span></a><span data-dcnode-id="5308" instrument_node=""> is the </span><a data-dcnode-id="5306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Necropolis" title="Necropolis"><span data-dcnode-id="5307" instrument_node="">necropolis</span></a><span data-dcnode-id="5305" instrument_node=""> of the </span><a data-dcnode-id="5303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achaemenid_dynasty" title="Achaemenid dynasty"><span data-dcnode-id="5304" instrument_node="">Achaemenid dynasty</span></a><span data-dcnode-id="5302" instrument_node=""> (500–330 BC), with four large tombs cut high into the cliff face. These have mainly architectural decoration, but the facades include large panels over the doorways, each very similar in content, with figures of the king being invested by a god, above a zone with rows of smaller figures bearing tribute, with soldiers and officials. The three classes of figures are sharply differentiated in size. The entrance to each tomb is at the centre of each cross, which opens onto a small chamber, where the king lay in a </span><a data-dcnode-id="5300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarcophagus" title="Sarcophagus"><span data-dcnode-id="5301" instrument_node="">sarcophagus</span></a><span data-dcnode-id="5299" instrument_node="">.</span><sup class="reference" data-dcnode-id="5296" id="cite_ref-ReferenceA_23-0"><a data-dcnode-id="5297" href="#cite_note-ReferenceA-23"><span data-dcnode-id="5298" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5295" instrument_node=""> The horizontal beam of each of the tomb's facades is believed to be a replica of the entrance of the palace at </span><a data-dcnode-id="5293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persepolis" title="Persepolis"><span data-dcnode-id="5294" instrument_node="">Persepolis</span></a><span data-dcnode-id="5292" instrument_node="">.
</span></p><p data-dcnode-id="5252"><span data-dcnode-id="5290" instrument_node="">Only one has inscriptions and the matching of the other kings to tombs is somewhat speculative; the relief figures are not intended as individualized portraits. The third from the left, identified by an inscription, is the tomb of </span><a class="mw-redirect" data-dcnode-id="5288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Darius_I" title="Darius I"><span data-dcnode-id="5289" instrument_node="">Darius I the Great</span></a><span data-dcnode-id="5287" instrument_node=""> (</span><i data-dcnode-id="5285"><span data-dcnode-id="5286" instrument_node="">c.</span></i><span data-dcnode-id="5284" instrument_node=""> 522–486&nbsp;BC). The other three are believed to be those of </span><a data-dcnode-id="5282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xerxes_I" title="Xerxes I"><span data-dcnode-id="5283" instrument_node="">Xerxes I</span></a><span data-dcnode-id="5281" instrument_node=""> (</span><i data-dcnode-id="5279"><span data-dcnode-id="5280" instrument_node="">c.</span></i><span data-dcnode-id="5278" instrument_node=""> 486–465&nbsp;BC), </span><a data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artaxerxes_I" title="Artaxerxes I"><span data-dcnode-id="5277" instrument_node="">Artaxerxes I</span></a><span data-dcnode-id="5275" instrument_node=""> (</span><i data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">c.</span></i><span data-dcnode-id="5272" instrument_node=""> 465–424&nbsp;BC), and </span><a data-dcnode-id="5270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Darius_II" title="Darius II"><span data-dcnode-id="5271" instrument_node="">Darius II</span></a><span data-dcnode-id="5269" instrument_node=""> (</span><i data-dcnode-id="5267"><span data-dcnode-id="5268" instrument_node="">c.</span></i><span data-dcnode-id="5266" instrument_node=""> 423–404&nbsp;BC) respectively. A fifth unfinished one might be that of Artaxerxes III, who reigned at the longest two years, but is more likely that of </span><a data-dcnode-id="5264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Darius_III" title="Darius III"><span data-dcnode-id="5265" instrument_node="">Darius III</span></a><span data-dcnode-id="5263" instrument_node=""> (</span><i data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">c.</span></i><span data-dcnode-id="5260" instrument_node=""> 336–330&nbsp;BC), last of the Achaemenid dynasts. The tombs were looted following the conquest of the Achaemenid Empire by </span><a data-dcnode-id="5258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_the_Great" title="Alexander the Great"><span data-dcnode-id="5259" instrument_node="">Alexander the Great</span></a><span data-dcnode-id="5257" instrument_node="">.
</span><sup class="reference" data-dcnode-id="5254" id="cite_ref-ReferenceA_23-1"><a data-dcnode-id="5255" href="#cite_note-ReferenceA-23"><span data-dcnode-id="5256" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5253" instrument_node="">
</span></p><p data-dcnode-id="5218"><span data-dcnode-id="5251" instrument_node="">Well below the Achaemenid tombs, near ground level, are rock reliefs with large figures of </span><a class="mw-redirect" data-dcnode-id="5249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sassanian" title="Sassanian"><span data-dcnode-id="5250" instrument_node="">Sassanian</span></a><span data-dcnode-id="5248" instrument_node=""> kings, some meeting gods, others in combat. The most famous shows the Sassanian king </span><a data-dcnode-id="5246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shapur_I" title="Shapur I"><span data-dcnode-id="5247" instrument_node="">Shapur I</span></a><span data-dcnode-id="5245" instrument_node=""> on horseback, with the Roman Emperor </span><a data-dcnode-id="5243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valerian_%28emperor%29" title="Valerian (emperor)"><span data-dcnode-id="5244" instrument_node="">Valerian</span></a><span data-dcnode-id="5242" instrument_node=""> bowing to him in submission, and </span><a data-dcnode-id="5240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philip_the_Arab" title="Philip the Arab"><span data-dcnode-id="5241" instrument_node="">Philip the Arab</span></a><span data-dcnode-id="5239" instrument_node=""> (an earlier emperor who paid Shapur tribute) holding Shapur's horse, while the dead Emperor </span><a data-dcnode-id="5237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gordian_III" title="Gordian III"><span data-dcnode-id="5238" instrument_node="">Gordian III</span></a><span data-dcnode-id="5236" instrument_node="">, killed in battle, lies beneath it (other identifications have been suggested). This commemorates the </span><a data-dcnode-id="5234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Edessa" title="Battle of Edessa"><span data-dcnode-id="5235" instrument_node="">Battle of Edessa</span></a><span data-dcnode-id="5233" instrument_node=""> in 260 AD, when Valerian became the only Roman Emperor who was captured as a prisoner of war, a lasting humiliation for the Romans. The placing of these reliefs clearly suggests the Sasanian intention to link themselves with the glories of the earlier </span><a data-dcnode-id="5231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achaemenid_Empire" title="Achaemenid Empire"><span data-dcnode-id="5232" instrument_node="">Achaemenid Empire</span></a><span data-dcnode-id="5230" instrument_node="">.</span><sup class="reference" data-dcnode-id="5227" id="cite_ref-24"><a data-dcnode-id="5228" href="#cite_note-24"><span data-dcnode-id="5229" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5226" instrument_node=""> There are three further Achaemenid royal tombs with similar reliefs at </span><a data-dcnode-id="5224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persepolis" title="Persepolis"><span data-dcnode-id="5225" instrument_node="">Persepolis</span></a><span data-dcnode-id="5223" instrument_node="">, one unfinished.</span><sup class="reference" data-dcnode-id="5220" id="cite_ref-25"><a data-dcnode-id="5221" href="#cite_note-25"><span data-dcnode-id="5222" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5219" instrument_node="">
</span></p><p data-dcnode-id="5181"><span data-dcnode-id="5217" instrument_node="">The seven Sassanian reliefs, whose approximate dates range from 225 to 310 AD, show subjects including investiture scenes and battles. The earliest relief at the site is </span><a data-dcnode-id="5215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elam" title="Elam"><span data-dcnode-id="5216" instrument_node="">Elamite</span></a><span data-dcnode-id="5214" instrument_node="">, from about 1000 BC. About a kilometre away is </span><a data-dcnode-id="5212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naqsh-e_Rajab" title="Naqsh-e Rajab"><span data-dcnode-id="5213" instrument_node="">Naqsh-e Rajab</span></a><span data-dcnode-id="5211" instrument_node="">, with a further four Sasanian rock reliefs, three celebrating kings and one a high priest. Another important Sasanian site is </span><a class="mw-redirect" data-dcnode-id="5209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taq_Bostan" title="Taq Bostan"><span data-dcnode-id="5210" instrument_node="">Taq Bostan</span></a><span data-dcnode-id="5208" instrument_node=""> with several reliefs including two royal investitures and a famous figure of a </span><a data-dcnode-id="5206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cataphract" title="Cataphract"><span data-dcnode-id="5207" instrument_node="">cataphract</span></a><span data-dcnode-id="5205" instrument_node=""> or Persian heavy cavalryman, about twice life size, probably representing the king </span><a class="mw-redirect" data-dcnode-id="5203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Khosrau_II_of_Persia" title="Khosrau II of Persia"><span data-dcnode-id="5204" instrument_node="">Khosrow Parviz</span></a><span data-dcnode-id="5202" instrument_node=""> mounted on his favourite horse </span><a data-dcnode-id="5200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shabdiz" title="Shabdiz"><span data-dcnode-id="5201" instrument_node="">Shabdiz</span></a><span data-dcnode-id="5199" instrument_node="">; the pair continued to be celebrated in later Persian literature.</span><sup class="reference" data-dcnode-id="5196" id="cite_ref-26"><a data-dcnode-id="5197" href="#cite_note-26"><span data-dcnode-id="5198" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5195" instrument_node=""> </span><a data-dcnode-id="5193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Firuzabad%2C_Fars" title="Firuzabad, Fars"><span data-dcnode-id="5194" instrument_node="">Firuzabad, Fars</span></a><span data-dcnode-id="5192" instrument_node=""> and </span><a data-dcnode-id="5190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bishapur" title="Bishapur"><span data-dcnode-id="5191" instrument_node="">Bishapur</span></a><span data-dcnode-id="5189" instrument_node=""> have groups of Sassanian reliefs, the former including the oldest, a large battle scene, now badly worn.</span><sup class="reference" data-dcnode-id="5186" id="cite_ref-27"><a data-dcnode-id="5187" href="#cite_note-27"><span data-dcnode-id="5188" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5185" instrument_node=""> At </span><a data-dcnode-id="5183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barm-e_Delak" title="Barm-e Delak"><span data-dcnode-id="5184" instrument_node="">Barm-e Delak</span></a><span data-dcnode-id="5182" instrument_node=""> a king offers a flower to his queen.
</span></p><p data-dcnode-id="5172"><span data-dcnode-id="5180" instrument_node="">Sassanian reliefs are concentrated in the first 80 years of the dynasty, though one important set are 6th-century, and at relatively few sites, mostly in the Sasanian heartland. The later ones in particular suggest that they draw on a now-lost tradition of similar reliefs in palaces in </span><a data-dcnode-id="5178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stucco" title="Stucco"><span data-dcnode-id="5179" instrument_node="">stucco</span></a><span data-dcnode-id="5177" instrument_node="">. The rock reliefs were probably coated in plaster and painted.</span><sup class="reference" data-dcnode-id="5174" id="cite_ref-Herrmann_and_Curtis_21-2"><a data-dcnode-id="5175" href="#cite_note-Herrmann_and_Curtis-21"><span data-dcnode-id="5176" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5173" instrument_node="">
</span></p><p data-dcnode-id="5137"><span data-dcnode-id="5171" instrument_node="">The rock reliefs of the preceding Persian </span><a class="mw-redirect" data-dcnode-id="5169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Selucid" title="Selucid"><span data-dcnode-id="5170" instrument_node="">Selucids</span></a><span data-dcnode-id="5168" instrument_node=""> and </span><a data-dcnode-id="5166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parthian_Empire" title="Parthian Empire"><span data-dcnode-id="5167" instrument_node="">Parthians</span></a><span data-dcnode-id="5165" instrument_node=""> are generally smaller and more crude, and not all direct royal commissions as the Sasanian ones clearly were.</span><sup class="reference" data-dcnode-id="5162" id="cite_ref-28"><a data-dcnode-id="5163" href="#cite_note-28"><span data-dcnode-id="5164" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5161" instrument_node=""> At Behistun an earlier relief including a lion was adapted into a reclining </span><a class="mw-redirect" data-dcnode-id="5159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herakles" title="Herakles"><span data-dcnode-id="5160" instrument_node="">Herakles</span></a><span data-dcnode-id="5158" instrument_node=""> in a fully </span><a data-dcnode-id="5156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hellenistic_art" title="Hellenistic art"><span data-dcnode-id="5157" instrument_node="">Hellenistic</span></a><span data-dcnode-id="5155" instrument_node=""> style; he reclines on a lion skin. This was only uncovered below rubble relatively recently; an inscription dates it to 148 BC.</span><sup class="reference" data-dcnode-id="5152" id="cite_ref-29"><a data-dcnode-id="5153" href="#cite_note-29"><span data-dcnode-id="5154" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5151" instrument_node=""> Other reliefs in Iran include the </span><a class="mw-redirect" data-dcnode-id="5149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assyrian_Empire" title="Assyrian Empire"><span data-dcnode-id="5150" instrument_node="">Assyrian</span></a><span data-dcnode-id="5148" instrument_node=""> king in shallow relief at </span><a data-dcnode-id="5146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shikaft-e_Gulgul" title="Shikaft-e Gulgul"><span data-dcnode-id="5147" instrument_node="">Shikaft-e Gulgul</span></a><span data-dcnode-id="5145" instrument_node="">; not all sites with Persian reliefs are in modern Iran.</span><sup class="reference" data-dcnode-id="5142" id="cite_ref-Herrmann_and_Curtis_21-3"><a data-dcnode-id="5143" href="#cite_note-Herrmann_and_Curtis-21"><span data-dcnode-id="5144" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5141" instrument_node=""> Like other Sassanian styles, the form enjoyed a small revival under the Qajar, whose reliefs include a large and lively panel showing hunting at the royal hunting-ground of </span><a data-dcnode-id="5139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tangeh_Savashi" title="Tangeh Savashi"><span data-dcnode-id="5140" instrument_node="">Tangeh Savashi</span></a><span data-dcnode-id="5138" instrument_node="">, and a panel, still largely with its colouring intact, at Taq Bostan showing the shah seated with attendants.
</span></p><p data-dcnode-id="5125"><span data-dcnode-id="5136" instrument_node="">The standard catalogue of pre-Islamic Persian reliefs lists the known examples (as at 1984) as follows: </span><a data-dcnode-id="5134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lullubi" title="Lullubi"><span data-dcnode-id="5135" instrument_node="">Lullubi</span></a><span data-dcnode-id="5133" instrument_node=""> #1–4; </span><a data-dcnode-id="5131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elam" title="Elam"><span data-dcnode-id="5132" instrument_node="">Elam</span></a><span data-dcnode-id="5130" instrument_node=""> #5–19; Assyrian #20–21; Achaemenid #22–30; Late/Post-Achaemenid and Seleucid #31–35; Parthian #36–49; Sasanian #50–84; others #85–88.</span><sup class="reference" data-dcnode-id="5127" id="cite_ref-30"><a data-dcnode-id="5128" href="#cite_note-30"><span data-dcnode-id="5129" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5126" instrument_node="">
</span></p><span data-dcnode-id="5124" instrument_node="">
</span><div class="thumb tnone" data-dcnode-id="5100" style="margin-left:auto;margin-right:auto;overflow:hidden;width:auto;max-width:708px"><div class="thumbinner" data-dcnode-id="5101"><div class="noresize" data-dcnode-id="5121" style="overflow:auto"><a class="image" data-dcnode-id="5122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANaghsh-e_rostam%2C_Ir%25C3%25A1n%2C_2016-09-24%2C_DD_20-24_PAN.jpg" title="Panorama of Naqsh-e Rustam. Achaemenid tombs above, Sassanian reliefs below. The tombs, from left to right, probably belong to: Darius II, Artaxerxes I, Darius I, Xerxes I"><img alt="" data-dcnode-id="5123" data-file-height="4844" data-file-width="18256" decoding="async" height="186" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Naghsh-e_rostam%252C_Ir%25C3%25A1n%252C_2016-09-24%252C_DD_20-24_PAN.jpg/700px-Naghsh-e_rostam%252C_Ir%25C3%25A1n%252C_2016-09-24%252C_DD_20-24_PAN.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Naghsh-e_rostam%2C_Ir%C3%A1n%2C_2016-09-24%2C_DD_20-24_PAN.jpg/1050px-Naghsh-e_rostam%2C_Ir%C3%A1n%2C_2016-09-24%2C_DD_20-24_PAN.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Naghsh-e_rostam%2C_Ir%C3%A1n%2C_2016-09-24%2C_DD_20-24_PAN.jpg/1400px-Naghsh-e_rostam%2C_Ir%C3%A1n%2C_2016-09-24%2C_DD_20-24_PAN.jpg 2x" width="700"></a></div><div class="thumbcaption" data-dcnode-id="5102"><div class="magnify" data-dcnode-id="5118"><a data-dcnode-id="5119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANaghsh-e_rostam%2C_Ir%25C3%25A1n%2C_2016-09-24%2C_DD_20-24_PAN.jpg" title="File:Naghsh-e rostam, Irán, 2016-09-24, DD 20-24 PAN.jpg"><span data-dcnode-id="5120" instrument_node=""> </span></a></div><span data-dcnode-id="5117" instrument_node="">Panorama of </span><a class="mw-redirect" data-dcnode-id="5115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naqsh-e_Rustam" title="Naqsh-e Rustam"><span data-dcnode-id="5116" instrument_node="">Naqsh-e Rustam</span></a><span data-dcnode-id="5114" instrument_node="">. Achaemenid tombs above, Sassanian reliefs below. The tombs, from left to right, probably belong to: </span><a data-dcnode-id="5112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Darius_II" title="Darius II"><span data-dcnode-id="5113" instrument_node="">Darius II</span></a><span data-dcnode-id="5111" instrument_node="">, </span><a data-dcnode-id="5109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artaxerxes_I" title="Artaxerxes I"><span data-dcnode-id="5110" instrument_node="">Artaxerxes I</span></a><span data-dcnode-id="5108" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Darius_I" title="Darius I"><span data-dcnode-id="5107" instrument_node="">Darius I</span></a><span data-dcnode-id="5105" instrument_node="">, </span><a data-dcnode-id="5103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xerxes_I" title="Xerxes I"><span data-dcnode-id="5104" instrument_node="">Xerxes I</span></a></div></div></div><span data-dcnode-id="5099" instrument_node="">
</span><h2 data-dcnode-id="5089"><span class="mw-headline" data-dcnode-id="5097" id="Parthians"><span data-dcnode-id="5098" instrument_node="">Parthians</span></span><span class="mw-editsection" data-dcnode-id="5090"><span class="mw-editsection-bracket" data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">[</span></span><a data-dcnode-id="5093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D7" title="Edit section: Parthians"><span data-dcnode-id="5094" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5091"><span data-dcnode-id="5092" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5088" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5075"><div class="thumbinner" data-dcnode-id="5076" style="width:222px;"><a class="image" data-dcnode-id="5086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AArm_less_man_edit_3_%28cropped%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="5087" data-file-height="1028" data-file-width="782" decoding="async" height="289" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/81/Arm_less_man_edit_3_%2528cropped%2529.jpg/220px-Arm_less_man_edit_3_%2528cropped%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/81/Arm_less_man_edit_3_%28cropped%29.jpg/330px-Arm_less_man_edit_3_%28cropped%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/81/Arm_less_man_edit_3_%28cropped%29.jpg/440px-Arm_less_man_edit_3_%28cropped%29.jpg 2x" width="220"></a><span data-dcnode-id="5085" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5077"><div class="magnify" data-dcnode-id="5083"><a class="internal" data-dcnode-id="5084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AArm_less_man_edit_3_%28cropped%29.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="5081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statue%2C_National_Museum_of_Iran_2401" title="Statue, National Museum of Iran 2401"><span data-dcnode-id="5082" instrument_node="">Bronze statue of a Parthian nobleman</span></a><span data-dcnode-id="5080" instrument_node=""> from the sanctuary at Shami in </span><a data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elymais" title="Elymais"><span data-dcnode-id="5079" instrument_node="">Elymais</span></a></div></div></div><span data-dcnode-id="5074" instrument_node="">
</span><link data-dcnode-id="5073" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5069" role="note"><span data-dcnode-id="5072" instrument_node="">Main article: </span><a data-dcnode-id="5070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parthian_art" title="Parthian art"><span data-dcnode-id="5071" instrument_node="">Parthian art</span></a></div><span data-dcnode-id="5068" instrument_node="">
</span><p data-dcnode-id="5033"><span data-dcnode-id="5067" instrument_node="">The art of the Parthians was a mix of Iranian and </span><a data-dcnode-id="5065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hellenistic_art" title="Hellenistic art"><span data-dcnode-id="5066" instrument_node="">Hellenistic</span></a><span data-dcnode-id="5064" instrument_node=""> styles. The </span><a data-dcnode-id="5062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parthian_Empire" title="Parthian Empire"><span data-dcnode-id="5063" instrument_node="">Parthian Empire</span></a><span data-dcnode-id="5061" instrument_node=""> existed from 247 BC to 224 AD in what is now Greater Iran and several territories outside it. Parthian places are often overlooked in excavations, and Parthian layers difficult to distinguish from those around them.</span><sup class="reference" data-dcnode-id="5058" id="cite_ref-31"><a data-dcnode-id="5059" href="#cite_note-31"><span data-dcnode-id="5060" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5057" instrument_node=""> The research situation and the state of knowledge on Parthian art is therefore still very patchy; dating is difficult and the most important remains come from the fringes of the empire, as at </span><a data-dcnode-id="5055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hatra" title="Hatra"><span data-dcnode-id="5056" instrument_node="">Hatra</span></a><span data-dcnode-id="5054" instrument_node=""> in modern </span><a data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraq" title="Iraq"><span data-dcnode-id="5053" instrument_node="">Iraq</span></a><span data-dcnode-id="5051" instrument_node="">, which has produced the largest quantity of Parthian sculpture yet excavated.</span><sup class="reference" data-dcnode-id="5048" id="cite_ref-32"><a data-dcnode-id="5049" href="#cite_note-32"><span data-dcnode-id="5050" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5047" instrument_node=""> Even after the period of the Parthian dynasty, art in its style continued in surrounding areas for some time. Even in narrative representations, figures look frontally out to the viewer rather than at each other, a feature that anticipates the art of </span><a class="mw-redirect" data-dcnode-id="5045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Late_Antiquity" title="Late Antiquity"><span data-dcnode-id="5046" instrument_node="">Late Antiquity</span></a><span data-dcnode-id="5044" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medieval_Europe" title="Medieval Europe"><span data-dcnode-id="5043" instrument_node="">medieval Europe</span></a><span data-dcnode-id="5041" instrument_node=""> and </span><a data-dcnode-id="5039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byzantine_Empire" title="Byzantine Empire"><span data-dcnode-id="5040" instrument_node="">Byzantium</span></a><span data-dcnode-id="5038" instrument_node="">. Great attention is paid to the details of clothing, which in full-length figures is shown decorated with elaborate designs, probably embroidered, including large figures.</span><sup class="reference" data-dcnode-id="5035" id="cite_ref-33"><a data-dcnode-id="5036" href="#cite_note-33"><span data-dcnode-id="5037" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5034" instrument_node="">
</span></p><p data-dcnode-id="5012"><span data-dcnode-id="5032" instrument_node="">The excavations at </span><a data-dcnode-id="5030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dura-Europos" title="Dura-Europos"><span data-dcnode-id="5031" instrument_node="">Dura-Europos</span></a><span data-dcnode-id="5029" instrument_node=""> in the 20th century provided many new discoveries. The classical archaeologist and director of the excavations, </span><a data-dcnode-id="5027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Rostovtzeff" title="Michael Rostovtzeff"><span data-dcnode-id="5028" instrument_node="">Michael Rostovtzeff</span></a><span data-dcnode-id="5026" instrument_node="">, realized that the art of the first centuries AD, </span><a data-dcnode-id="5024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palmyra" title="Palmyra"><span data-dcnode-id="5025" instrument_node="">Palmyra</span></a><span data-dcnode-id="5023" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dura_Europos" title="Dura Europos"><span data-dcnode-id="5022" instrument_node="">Dura Europos</span></a><span data-dcnode-id="5020" instrument_node="">, but also in Iran up to the Buddhist India followed the same principles. He called this artwork </span><i data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">Parthian art</span></i><span data-dcnode-id="5017" instrument_node="">.</span><sup class="reference" data-dcnode-id="5014" id="cite_ref-34"><a data-dcnode-id="5015" href="#cite_note-34"><span data-dcnode-id="5016" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5013" instrument_node="">
</span></p><p data-dcnode-id="4995"><span data-dcnode-id="5011" instrument_node="">The most characteristic feature of the "Parthian" art is frontality which is not a special feature of Iranic or Parthian art and first appeared in the art of </span><a data-dcnode-id="5009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palmyra" title="Palmyra"><span data-dcnode-id="5010" instrument_node="">Palmyra</span></a><span data-dcnode-id="5008" instrument_node="">.</span><sup class="reference" data-dcnode-id="5005" id="cite_ref-35"><a data-dcnode-id="5006" href="#cite_note-35"><span data-dcnode-id="5007" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5004" instrument_node=""> There are doubts whether this art can be called a "Parthian" art or that it should be associated with any particular regional area; there is no evidence that this art was created outside the middle-Euphrates region then brought to Palmyra for example.</span><sup class="reference" data-dcnode-id="5001" id="cite_ref-labo_36-0"><a data-dcnode-id="5002" href="#cite_note-labo-36"><span data-dcnode-id="5003" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5000" instrument_node=""> This art is better thought of as a local development common to the middle Euphrates region.</span><sup class="reference" data-dcnode-id="4997" id="cite_ref-labo_36-1"><a data-dcnode-id="4998" href="#cite_note-labo-36"><span data-dcnode-id="4999" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4996" instrument_node=""> Parthian rock reliefs are covered above.
</span></p><p data-dcnode-id="4983"><span data-dcnode-id="4994" instrument_node="">In architecture, patterns in plaster were very popular, almost all now lost. Once the technique was developed these covered large surfaces and perhaps shared elements of their design with carpets and other textiles, also now almost entirely lost.</span><sup class="reference" data-dcnode-id="4991" id="cite_ref-37"><a data-dcnode-id="4992" href="#cite_note-37"><span data-dcnode-id="4993" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4990" instrument_node=""> Parthian </span><a data-dcnode-id="4988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhyton" title="Rhyton"><span data-dcnode-id="4989" instrument_node="">rhyta</span></a><span data-dcnode-id="4987" instrument_node=""> continued the Achaemenid style, but in the best the animals at the terminal (or </span><a data-dcnode-id="4985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protome" title="Protome"><span data-dcnode-id="4986" instrument_node="">protome</span></a><span data-dcnode-id="4984" instrument_node="">) are more naturalistic, probably under Greek influence.
</span></p><span data-dcnode-id="4982" instrument_node="">
</span><h2 data-dcnode-id="4972"><span class="mw-headline" data-dcnode-id="4980" id="Sasanians"><span data-dcnode-id="4981" instrument_node="">Sasanians</span></span><span class="mw-editsection" data-dcnode-id="4973"><span class="mw-editsection-bracket" data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">[</span></span><a data-dcnode-id="4976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D8" title="Edit section: Sasanians"><span data-dcnode-id="4977" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4974"><span data-dcnode-id="4975" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4971" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4959"><div class="thumbinner" data-dcnode-id="4960" style="width:322px;"><a class="image" data-dcnode-id="4969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Colossal_Statue_of_Shapur_I.jpg"><img alt="" class="thumbimage" data-dcnode-id="4970" data-file-height="759" data-file-width="1012" decoding="async" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d7/The_Colossal_Statue_of_Shapur_I.jpg/320px-The_Colossal_Statue_of_Shapur_I.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d7/The_Colossal_Statue_of_Shapur_I.jpg/480px-The_Colossal_Statue_of_Shapur_I.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d7/The_Colossal_Statue_of_Shapur_I.jpg/640px-The_Colossal_Statue_of_Shapur_I.jpg 2x" width="320"></a><span data-dcnode-id="4968" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4961"><div class="magnify" data-dcnode-id="4966"><a class="internal" data-dcnode-id="4967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Colossal_Statue_of_Shapur_I.jpg" title="Enlarge"></a></div><span data-dcnode-id="4965" instrument_node="">The </span><a data-dcnode-id="4963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colossal_Statue_of_Shapur_I" title="Colossal Statue of Shapur I"><span data-dcnode-id="4964" instrument_node="">Colossal Statue of Shapur I</span></a><span data-dcnode-id="4962" instrument_node="">, r. AD 240–272</span></div></div></div><span data-dcnode-id="4958" instrument_node="">
</span><p data-dcnode-id="4932"><a data-dcnode-id="4956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sasanian_art" title="Sasanian art"><span data-dcnode-id="4957" instrument_node="">Sasanian art</span></a><span data-dcnode-id="4955" instrument_node="">, or Sasanian art, was produced under the </span><a data-dcnode-id="4953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sasanian_Empire" title="Sasanian Empire"><span data-dcnode-id="4954" instrument_node="">Sasanian Empire</span></a><span data-dcnode-id="4952" instrument_node=""> which ruled from the 3rd to 7th centuries AD, before the </span><a data-dcnode-id="4950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_conquest_of_Persia" title="Muslim conquest of Persia"><span data-dcnode-id="4951" instrument_node="">Muslim conquest of Persia</span></a><span data-dcnode-id="4949" instrument_node=""> was completed around 651. In 224 AD, the last </span><a data-dcnode-id="4947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parthia" title="Parthia"><span data-dcnode-id="4948" instrument_node="">Parthian</span></a><span data-dcnode-id="4946" instrument_node=""> king was defeated by </span><a data-dcnode-id="4944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ardashir_I" title="Ardashir I"><span data-dcnode-id="4945" instrument_node="">Ardashir I</span></a><span data-dcnode-id="4943" instrument_node="">. The resulting Sasanian dynasty would last for four hundred years, ruling modern Iran, Iraq, and much territory to the east and north of modern Iran. At times the Levant, much of Anatolia and parts of Egypt and Arabia were under its control. It began a new era in Iran and </span><a data-dcnode-id="4941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mesopotamia" title="Mesopotamia"><span data-dcnode-id="4942" instrument_node="">Mesopotamia</span></a><span data-dcnode-id="4940" instrument_node="">, which in many ways was built on </span><a class="mw-redirect" data-dcnode-id="4938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achaemenid" title="Achaemenid"><span data-dcnode-id="4939" instrument_node="">Achaemenid</span></a><span data-dcnode-id="4937" instrument_node=""> traditions, including the art of the period. Nevertheless, there were also other influences on art of the period that came from as far as China and the Mediterranean.</span><sup class="reference" data-dcnode-id="4934" id="cite_ref-38"><a data-dcnode-id="4935" href="#cite_note-38"><span data-dcnode-id="4936" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4933" instrument_node="">
</span></p><p data-dcnode-id="4912"><span data-dcnode-id="4931" instrument_node="">The surviving art of the Sasanians is best seen in its architecture, reliefs and metalwork, and there are some surviving paintings from what was evidently a widespread production. Stone reliefs were probably greatly outnumbered by interior ones in plaster, of which only fragments have survived. Free standing sculptures faded out of popularity in this time as compared to the period under the Parthians, but the </span><a data-dcnode-id="4929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colossal_Statue_of_Shapur_I" title="Colossal Statue of Shapur I"><span data-dcnode-id="4930" instrument_node="">Colossal Statue of Shapur I</span></a><span data-dcnode-id="4928" instrument_node=""> (r. AD 240–272) is a major exception, carved from a </span><a data-dcnode-id="4926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stalagmite" title="Stalagmite"><span data-dcnode-id="4927" instrument_node="">stalagmite</span></a><span data-dcnode-id="4925" instrument_node=""> grown in a cave;</span><sup class="reference" data-dcnode-id="4922" id="cite_ref-Harper_39-0"><a data-dcnode-id="4923" href="#cite_note-Harper-39"><span data-dcnode-id="4924" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4921" instrument_node=""> there are literary mentions of other colossal statues of kings, now lost.</span><sup class="reference" data-dcnode-id="4918" id="cite_ref-40"><a data-dcnode-id="4919" href="#cite_note-40"><span data-dcnode-id="4920" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4917" instrument_node=""> The important Sasanian rock reliefs are covered above, and the Parthian tradition of moulded stucco decoration to buildings continued, also including large figurative scenes.</span><sup class="reference" data-dcnode-id="4914" id="cite_ref-Harper_39-1"><a data-dcnode-id="4915" href="#cite_note-Harper-39"><span data-dcnode-id="4916" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4913" instrument_node="">
</span></p><span data-dcnode-id="4911" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4902"><div class="thumbinner" data-dcnode-id="4903" style="width:222px;"><a class="image" data-dcnode-id="4909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIranian_-_Plate_-_Walters_57709.jpg"><img alt="" class="thumbimage" data-dcnode-id="4910" data-file-height="1762" data-file-width="1800" decoding="async" height="215" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Iranian_-_Plate_-_Walters_57709.jpg/220px-Iranian_-_Plate_-_Walters_57709.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Iranian_-_Plate_-_Walters_57709.jpg/330px-Iranian_-_Plate_-_Walters_57709.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Iranian_-_Plate_-_Walters_57709.jpg/440px-Iranian_-_Plate_-_Walters_57709.jpg 2x" width="220"></a><span data-dcnode-id="4908" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4904"><div class="magnify" data-dcnode-id="4906"><a class="internal" data-dcnode-id="4907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIranian_-_Plate_-_Walters_57709.jpg" title="Enlarge"></a></div><span data-dcnode-id="4905" instrument_node="">Silver plate, 6th century</span></div></div></div><span data-dcnode-id="4901" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4892"><div class="thumbinner" data-dcnode-id="4893" style="width:222px;"><a class="image" data-dcnode-id="4899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIran_sasanide%2C_coppa_ovale_in_argento_con_sogg._vegetali_e_geometrici%2C_VII_sec.JPG"><img alt="" class="thumbimage" data-dcnode-id="4900" data-file-height="1820" data-file-width="2732" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/db/Iran_sasanide%252C_coppa_ovale_in_argento_con_sogg._vegetali_e_geometrici%252C_VII_sec.JPG/220px-Iran_sasanide%252C_coppa_ovale_in_argento_con_sogg._vegetali_e_geometrici%252C_VII_sec.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/db/Iran_sasanide%2C_coppa_ovale_in_argento_con_sogg._vegetali_e_geometrici%2C_VII_sec.JPG/330px-Iran_sasanide%2C_coppa_ovale_in_argento_con_sogg._vegetali_e_geometrici%2C_VII_sec.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/db/Iran_sasanide%2C_coppa_ovale_in_argento_con_sogg._vegetali_e_geometrici%2C_VII_sec.JPG/440px-Iran_sasanide%2C_coppa_ovale_in_argento_con_sogg._vegetali_e_geometrici%2C_VII_sec.JPG 2x" width="220"></a><span data-dcnode-id="4898" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4894"><div class="magnify" data-dcnode-id="4896"><a class="internal" data-dcnode-id="4897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIran_sasanide%2C_coppa_ovale_in_argento_con_sogg._vegetali_e_geometrici%2C_VII_sec.JPG" title="Enlarge"></a></div><span data-dcnode-id="4895" instrument_node="">Sasanian decoration on the underside of a silver vessel, 7th century</span></div></div></div><span data-dcnode-id="4891" instrument_node="">
</span><p data-dcnode-id="4882"><span data-dcnode-id="4890" instrument_node="">Surviving Sasanian art depicts courtly and chivalric scenes, with considerable grandeur of style, reflecting the lavish life and display of the Sasanian court as recorded by Byzantine ambassadors. Images of rulers dominate many of the surviving works, though none are as large as the </span><a data-dcnode-id="4888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colossal_Statue_of_Shapur_I" title="Colossal Statue of Shapur I"><span data-dcnode-id="4889" instrument_node="">Colossal Statue of Shapur I</span></a><span data-dcnode-id="4887" instrument_node="">. Hunting and battle scenes enjoyed a special popularity, and lightly-clothed dancing girls and entertainers. Representations are often arranged like a coat of arms, which in turn may have had a strong influence on the production of art in Europe and East Asia. Although Parthian art preferred the front view, the narrative representations of the Sassanian art often features figures shown in the profile or a three-quarter view. Frontal views occur less frequently.</span><sup class="reference" data-dcnode-id="4884" id="cite_ref-Harper_39-2"><a data-dcnode-id="4885" href="#cite_note-Harper-39"><span data-dcnode-id="4886" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4883" instrument_node="">
</span></p><p data-dcnode-id="4851"><span data-dcnode-id="4881" instrument_node="">One of the few sites where wall-paintings survived in quantity is </span><a data-dcnode-id="4879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panjakent" title="Panjakent"><span data-dcnode-id="4880" instrument_node="">Panjakent</span></a><span data-dcnode-id="4878" instrument_node=""> in modern </span><a data-dcnode-id="4876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tajikistan" title="Tajikistan"><span data-dcnode-id="4877" instrument_node="">Tajikistan</span></a><span data-dcnode-id="4875" instrument_node="">, and ancient </span><a data-dcnode-id="4873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sogdia" title="Sogdia"><span data-dcnode-id="4874" instrument_node="">Sogdia</span></a><span data-dcnode-id="4872" instrument_node="">, which was barely, if at all, under the control of the central Sasanian power. The old city was abandoned in the decades after the Muslims eventually took the city in 722 and has been extensively excavated in modern times. Large areas of wall paintings survived from the palace and private houses, which are mostly now in the </span><a data-dcnode-id="4870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hermitage_Museum" title="Hermitage Museum"><span data-dcnode-id="4871" instrument_node="">Hermitage Museum</span></a><span data-dcnode-id="4869" instrument_node=""> or </span><a data-dcnode-id="4867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tashkent" title="Tashkent"><span data-dcnode-id="4868" instrument_node="">Tashkent</span></a><span data-dcnode-id="4866" instrument_node="">. They covered whole rooms and were accompanied by large quantities of reliefs in wood. The subjects are similar to other Sasanian art, with enthroned kings, feasts, battles, and beautiful women, and there are illustrations of both Persian and Indian epics, as well as a complex mixture of deities. They mostly date from the 7th and 8th centuries.</span><sup class="reference" data-dcnode-id="4863" id="cite_ref-41"><a data-dcnode-id="4864" href="#cite_note-41"><span data-dcnode-id="4865" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4862" instrument_node=""> At </span><a data-dcnode-id="4860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bishapur" title="Bishapur"><span data-dcnode-id="4861" instrument_node="">Bishapur</span></a><span data-dcnode-id="4859" instrument_node=""> floor </span><a data-dcnode-id="4857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mosaic" title="Mosaic"><span data-dcnode-id="4858" instrument_node="">mosaics</span></a><span data-dcnode-id="4856" instrument_node=""> in a broadly Greco-Roman style have survived, and these were probably widespread in other elite settings, perhaps made by craftsmen from the Greek world.</span><sup class="reference" data-dcnode-id="4853" id="cite_ref-42"><a data-dcnode-id="4854" href="#cite_note-42"><span data-dcnode-id="4855" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4852" instrument_node="">
</span></p><p data-dcnode-id="4842"><span data-dcnode-id="4850" instrument_node="">A number of Sasanid silver vessels have survived, especially rather large plates or bowls used to serve food. These have high-quality engraved or embossed decoration from a courtly repertoire of mounted kings or heroes, and scenes of hunting, combat and feasting, often partially </span><a data-dcnode-id="4848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gilding" title="Gilding"><span data-dcnode-id="4849" instrument_node="">gilded</span></a><span data-dcnode-id="4847" instrument_node="">. Ewers, presumably for wine, may feature dancing girls in relief. These were exported to China, and also westwards.</span><sup class="reference" data-dcnode-id="4844" id="cite_ref-43"><a data-dcnode-id="4845" href="#cite_note-43"><span data-dcnode-id="4846" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4843" instrument_node="">
</span></p><p data-dcnode-id="4831"><a data-dcnode-id="4840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sasanian_glass" title="Sasanian glass"><span data-dcnode-id="4841" instrument_node="">Sasanian glass</span></a><span data-dcnode-id="4839" instrument_node=""> continued and developed Roman glass technology. In simpler forms it seems to have been available to a wide range of the population, and was a popular luxury export to </span><a data-dcnode-id="4837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byzantium" title="Byzantium"><span data-dcnode-id="4838" instrument_node="">Byzantium</span></a><span data-dcnode-id="4836" instrument_node=""> and China, even appearing in elite burials from the period in Japan. Technically, it is a silica-soda-lime glass production characterized by thick glass-blown vessels relatively sober in decoration, avoiding plain colours in favour of transparency and with vessels worked in one piece without over- elaborate amendments. Thus the decoration usually consists of solid and visual motifs from the mould (reliefs), with ribbed and deeply cut facets, although other techniques like trailing and applied motifs were practised.</span><sup class="reference" data-dcnode-id="4833" id="cite_ref-Harper_39-3"><a data-dcnode-id="4834" href="#cite_note-Harper-39"><span data-dcnode-id="4835" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4832" instrument_node=""> Sasanian pottery does not seem to have been used by the elites, and is mostly utilitarian.
</span></p><p data-dcnode-id="4822"><span data-dcnode-id="4830" instrument_node="">Carpets evidently could reach a high level of sophistication, as the praise lavished on the lost royal </span><a data-dcnode-id="4828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baharestan_Carpet" title="Baharestan Carpet"><span data-dcnode-id="4829" instrument_node="">Baharestan Carpet</span></a><span data-dcnode-id="4827" instrument_node=""> by the Muslim conquerors shows. But the only surviving fragments that might originate from Sasanid Persia are humbler productions, probably made by nomad tribes. Sasanid textiles were famous, and fragments have survived, mostly with designs based on animals in compartments, in a long-lasting style.</span><sup class="reference" data-dcnode-id="4824" id="cite_ref-Harper_39-4"><a data-dcnode-id="4825" href="#cite_note-Harper-39"><span data-dcnode-id="4826" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4823" instrument_node="">
</span></p><span data-dcnode-id="4821" instrument_node="">

</span><h2 data-dcnode-id="4662"><span class="mw-headline" data-dcnode-id="4670" id="Sogdians"><span data-dcnode-id="4671" instrument_node="">Sogdians</span></span><span class="mw-editsection" data-dcnode-id="4663"><span class="mw-editsection-bracket" data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">[</span></span><a data-dcnode-id="4666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D9" title="Edit section: Sogdians"><span data-dcnode-id="4667" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4661" instrument_node="">
</span><link data-dcnode-id="4660" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4656" role="note"><span data-dcnode-id="4659" instrument_node="">Main article: </span><a data-dcnode-id="4657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sogdian_art" title="Sogdian art"><span data-dcnode-id="4658" instrument_node="">Sogdian art</span></a></div><span data-dcnode-id="4655" instrument_node="">
</span><p data-dcnode-id="4637"><span data-dcnode-id="4654" instrument_node="">Sogdian art refers to the art, architecture, and art-forms produced by the Sogdians, an Iranian people who lived mostly in </span><a data-dcnode-id="4652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sogdia" title="Sogdia"><span data-dcnode-id="4653" instrument_node="">Sogdia</span></a><span data-dcnode-id="4651" instrument_node="">, but also had a large diaspora spread throughout Asia, especially in China, where their art was much appreciated, and influenced the Chinese. This influence on the Chinese ranged from metallurgy to music. Today, the Sogdians are best known for their paintings, but they had a distinctive sculpture and architecture as well. The Sogdians were especialy talented in metalworking, and their work in this field inspired the Chinese, who were among their patrons together with the Turks. The </span><a data-dcnode-id="4649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sogdian_art%23Metalworking" title="Sogdian art"><span data-dcnode-id="4650" instrument_node="">Sogdian metalwork</span></a><span data-dcnode-id="4648" instrument_node=""> may be confused with Sasanian metalwork, and the two are still confused by some scholars today. However, they differentiate in technique and shape, as well as iconography. Thanks to the work of archaeologist </span><a data-dcnode-id="4646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Marshak" title="Boris Marshak"><span data-dcnode-id="4647" instrument_node="">Boris Marshak</span></a><span data-dcnode-id="4645" instrument_node="">, several characteristic of Sogdian metalwork have been established: with respect to Sasanian vessels, Sogdian productions are less massive, their shape differs from the Sasanian, as do the techniques employed in their production. Further, the designs of Sogdian productions are more dynamic.</span><sup class="reference" data-dcnode-id="4642" id="cite_ref-lerner_44-0"><a data-dcnode-id="4643" href="#cite_note-lerner-44"><span data-dcnode-id="4644" instrument_node="">[44]</span></a></sup><sup class="reference" data-dcnode-id="4639" id="cite_ref-brit_45-0"><a data-dcnode-id="4640" href="#cite_note-brit-45"><span data-dcnode-id="4641" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4638" instrument_node="">
</span></p><p data-dcnode-id="4624"><span data-dcnode-id="4636" instrument_node="">The Sogdians lived in architecturally complex abodes that resembled their temples. These places were decorated with remarkable paintings, an art in which the Sogdians excelled. Indeed, they preferred to produce paintings and wood carvings to decorate their own houses. Sogdian wall paintings are bright, vigorous, and of remarkable beauty, but also tell about Sogdian life. They reproduce, for example, the costumes of the day, the gaming equipment, and the harness. They also depict stories and epics drawing on Iranian, Near Eastern (Manichaean, Nestorian) and Indian themes. Sogdian religious art reflects the religious affiliations of the Sogdians, and this knowledge is derived mostly from paintings and </span><a data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sogdian_art%23Ossuaries" title="Sogdian art"><span data-dcnode-id="4635" instrument_node="">ossuaries</span></a><span data-dcnode-id="4633" instrument_node="">.</span><sup class="reference" data-dcnode-id="4630" id="cite_ref-lerner2_46-0"><a data-dcnode-id="4631" href="#cite_note-lerner2-46"><span data-dcnode-id="4632" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4629" instrument_node=""> Through these artifacts, it is possible to "experience the vibrancy of Sogdian life and imagination."</span><sup class="reference" data-dcnode-id="4626" id="cite_ref-lerner2_46-1"><a data-dcnode-id="4627" href="#cite_note-lerner2-46"><span data-dcnode-id="4628" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4625" instrument_node="">
</span></p><p data-dcnode-id="4618"><span data-dcnode-id="4623" instrument_node="">Because Sogdian artists, and patrons, were much attentive to social life, displaying it in their works, banqueting, hunting, and entertainment are recurrent in their representations. The Sogdians were storytellers: they loved to recount stories. Thus, their paintings are narrative in nature.</span><sup class="reference" data-dcnode-id="4620" id="cite_ref-beller_47-0"><a data-dcnode-id="4621" href="#cite_note-beller-47"><span data-dcnode-id="4622" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4619" instrument_node="">
</span></p><p data-dcnode-id="4612"><span data-dcnode-id="4617" instrument_node="">The Sogdians sought to portray both the supernatural and natural worlds. This desire "extended into portraying their own world." However, they did not "represent their mercantile activities, a major source of their wealth, but instead chose to show their enjoyment of it, such as the scenes of banqueting at Panjikent. In these paintings we see how the Sogdians saw themselves."</span><sup class="reference" data-dcnode-id="4614" id="cite_ref-beller_47-1"><a data-dcnode-id="4615" href="#cite_note-beller-47"><span data-dcnode-id="4616" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4613" instrument_node="">
</span></p><p data-dcnode-id="4604"><span data-dcnode-id="4611" instrument_node="">Many Sogdian paintings were destroyed during the several invasions they suffered in their land. Of the works which survived, some of the best known are the </span><a data-dcnode-id="4609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afrasiab_murals" title="Afrasiab murals"><span data-dcnode-id="4610" instrument_node="">Afrasiab murals</span></a><span data-dcnode-id="4608" instrument_node=""> and the </span><a data-dcnode-id="4606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Penjikent_murals" title="Penjikent murals"><span data-dcnode-id="4607" instrument_node="">Penjikent murals</span></a><span data-dcnode-id="4605" instrument_node="">.
</span></p><span data-dcnode-id="4603" instrument_node="">
</span><ul class="gallery mw-gallery-traditional" data-dcnode-id="4514" style="max-width: 972px;"><span data-dcnode-id="4602" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="4582" style="width: 235px"><div data-dcnode-id="4583" style="width: 235px"><span data-dcnode-id="4601" instrument_node="">
</span><div class="thumb" data-dcnode-id="4597" style="width: 230px;"><div data-dcnode-id="4598" style="margin:15.5px auto;"><a class="image" data-dcnode-id="4599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWall_Paintings_in_the_Palace_at_Varakhshadetail2.jpg"><img alt="" data-dcnode-id="4600" data-file-height="707" data-file-width="711" decoding="async" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Wall_Paintings_in_the_Palace_at_Varakhshadetail2.jpg/200px-Wall_Paintings_in_the_Palace_at_Varakhshadetail2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Wall_Paintings_in_the_Palace_at_Varakhshadetail2.jpg/300px-Wall_Paintings_in_the_Palace_at_Varakhshadetail2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Wall_Paintings_in_the_Palace_at_Varakhshadetail2.jpg/400px-Wall_Paintings_in_the_Palace_at_Varakhshadetail2.jpg 2x" width="200"></a></div></div><span data-dcnode-id="4596" instrument_node="">

edia.org/wiki/Fars_Province" title="Fars Province"><span data-dcnode-id="4482" instrument_node="">Fars</span></a></div></div></div><span data-dcnode-id="4477" instrument_node="">
