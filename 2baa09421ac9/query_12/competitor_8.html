iv></div></div><span data-dcnode-id="6235" instrument_node="">
</span><p data-dcnode-id="6172"><b data-dcnode-id="6233"><span data-dcnode-id="6234" instrument_node="">Persian art</span></b><span data-dcnode-id="6232" instrument_node=""> or </span><b data-dcnode-id="6230"><span data-dcnode-id="6231" instrument_node="">Iranian art</span></b><span data-dcnode-id="6229" instrument_node=""> (</span><a data-dcnode-id="6227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_language" title="Persian language"><span data-dcnode-id="6228" instrument_node="">Persian</span></a><span data-dcnode-id="6226" instrument_node="">: </span><span data-dcnode-id="6224" dir="rtl" lang="fa"><span data-dcnode-id="6225" instrument_node="">هنر ایرانی</span></span><span data-dcnode-id="6223" instrument_node="">, </span><small data-dcnode-id="6219"><a data-dcnode-id="6221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanization_of_Persian" title="Romanization of Persian"><span data-dcnode-id="6222" instrument_node="">romanized</span></a><span data-dcnode-id="6220" instrument_node="">:&nbsp;</span></small><span data-dcnode-id="6216" title="Persian-language romanization"><i data-dcnode-id="6217" lang="fa-Latn"><span data-dcnode-id="6218" instrument_node="">Honar-è Irâni</span></i></span><span data-dcnode-id="6215" instrument_node="">) has one of the richest </span><a data-dcnode-id="6213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art" title="Art"><span data-dcnode-id="6214" instrument_node="">art</span></a><span data-dcnode-id="6212" instrument_node=""> heritages in world history and has been strong in many media including </span><a data-dcnode-id="6210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Architecture" title="Architecture"><span data-dcnode-id="6211" instrument_node="">architecture</span></a><span data-dcnode-id="6209" instrument_node="">, </span><a data-dcnode-id="6207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Painting" title="Painting"><span data-dcnode-id="6208" instrument_node="">painting</span></a><span data-dcnode-id="6206" instrument_node="">, </span><a data-dcnode-id="6204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weaving" title="Weaving"><span data-dcnode-id="6205" instrument_node="">weaving</span></a><span data-dcnode-id="6203" instrument_node="">, </span><a data-dcnode-id="6201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pottery" title="Pottery"><span data-dcnode-id="6202" instrument_node="">pottery</span></a><span data-dcnode-id="6200" instrument_node="">, </span><a data-dcnode-id="6198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calligraphy" title="Calligraphy"><span data-dcnode-id="6199" instrument_node="">calligraphy</span></a><span data-dcnode-id="6197" instrument_node="">, </span><a data-dcnode-id="6195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metalworking" title="Metalworking"><span data-dcnode-id="6196" instrument_node="">metalworking</span></a><span data-dcnode-id="6194" instrument_node=""> and </span><a data-dcnode-id="6192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sculpture" title="Sculpture"><span data-dcnode-id="6193" instrument_node="">sculpture</span></a><span data-dcnode-id="6191" instrument_node="">. At different times, influences from the art of neighbouring civilizations have been very important, and latterly Persian art gave and received major influences as part of the wider styles of </span><a data-dcnode-id="6189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_art" title="Islamic art"><span data-dcnode-id="6190" instrument_node="">Islamic art</span></a><span data-dcnode-id="6188" instrument_node="">. This article covers the art of Persia up to 1925, and the end of the </span><a data-dcnode-id="6186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qajar_dynasty" title="Qajar dynasty"><span data-dcnode-id="6187" instrument_node="">Qajar dynasty</span></a><span data-dcnode-id="6185" instrument_node="">; for later art see </span><a data-dcnode-id="6183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_modern_and_contemporary_art" title="Iranian modern and contemporary art"><span data-dcnode-id="6184" instrument_node="">Iranian modern and contemporary art</span></a><span data-dcnode-id="6182" instrument_node="">, and for traditional crafts see </span><a data-dcnode-id="6180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arts_of_Iran" title="Arts of Iran"><span data-dcnode-id="6181" instrument_node="">arts of Iran</span></a><span data-dcnode-id="6179" instrument_node="">. </span><a data-dcnode-id="6177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rock_art_in_Iran" title="Rock art in Iran"><span data-dcnode-id="6178" instrument_node="">Rock art in Iran</span></a><span data-dcnode-id="6176" instrument_node=""> is its most ancient surviving art. </span><a data-dcnode-id="6174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_architecture" title="Iranian architecture"><span data-dcnode-id="6175" instrument_node="">Iranian architecture</span></a><span data-dcnode-id="6173" instrument_node=""> is covered at that article.
</span></p><p data-dcnode-id="6158"><span data-dcnode-id="6171" instrument_node="">From the </span><a data-dcnode-id="6169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achaemenid_Empire" title="Achaemenid Empire"><span data-dcnode-id="6170" instrument_node="">Achaemenid Empire</span></a><span data-dcnode-id="6168" instrument_node=""> of 550 BC–330 BC for most of the time a large Iranian-speaking state has ruled over areas similar to the modern boundaries of </span><a data-dcnode-id="6166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="6167" instrument_node="">Iran</span></a><span data-dcnode-id="6165" instrument_node="">, and often much wider areas, sometimes called </span><a data-dcnode-id="6163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greater_Iran" title="Greater Iran"><span data-dcnode-id="6164" instrument_node="">Greater Iran</span></a><span data-dcnode-id="6162" instrument_node="">, where a process of cultural </span><a data-dcnode-id="6160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persianization" title="Persianization"><span data-dcnode-id="6161" instrument_node="">Persianization</span></a><span data-dcnode-id="6159" instrument_node=""> left enduring results even when rulership separated. The courts of successive dynasties have generally led the style of Persian art, and court-sponsored art has left many of the most impressive survivals.
</span></p><p data-dcnode-id="6153"><span data-dcnode-id="6157" instrument_node="">In ancient times the surviving monuments of Persian art are notable for a tradition concentrating on the human figure (mostly male, and often royal) and animals. Persian art continued to place larger emphasis on figures than Islamic art from other areas, though for religious reasons now generally avoiding large examples, especially in sculpture. The general Islamic style of dense decoration, geometrically laid out, developed in Persia into a supremely elegant and harmonious style combining motifs derived from plants with Chinese motifs such as the cloud-band, and often animals that are represented at a much smaller scale than the plant elements surrounding them. Under the </span><a data-dcnode-id="6155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safavid_dynasty" title="Safavid dynasty"><span data-dcnode-id="6156" instrument_node="">Safavid dynasty</span></a><span data-dcnode-id="6154" instrument_node=""> in the 16th century this style was used across a wide variety of media, and diffused from the court artists of the shah, most being mainly painters.
</span></p><span data-dcnode-id="6152" instrument_node="">

</span><h2 data-dcnode-id="5886"><span class="mw-headline" data-dcnode-id="5894" id="Early_arts"><span data-dcnode-id="5895" instrument_node="">Early arts</span></span><span class="mw-editsection" data-dcnode-id="5887"><span class="mw-editsection-bracket" data-dcnode-id="5892"><span data-dcnode-id="5893" instrument_node="">[</span></span><a data-dcnode-id="5890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D1" title="Edit section: Early arts"><span data-dcnode-id="5891" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5888"><span data-dcnode-id="5889" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5885" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5876"><div class="thumbinner" data-dcnode-id="5877" style="width:222px;"><a class="image" data-dcnode-id="5883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASialk_pot_%28cropped%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="5884" data-file-height="553" data-file-width="746" decoding="async" height="163" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Sialk_pot_%2528cropped%2529.jpg/220px-Sialk_pot_%2528cropped%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Sialk_pot_%28cropped%29.jpg/330px-Sialk_pot_%28cropped%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Sialk_pot_%28cropped%29.jpg/440px-Sialk_pot_%28cropped%29.jpg 2x" width="220"></a><span data-dcnode-id="5882" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5878"><div class="magnify" data-dcnode-id="5880"><a class="internal" data-dcnode-id="5881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASialk_pot_%28cropped%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="5879" instrument_node="">Pottery Vessel, 4th millennium BC</span></div></div></div><span data-dcnode-id="5875" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="5869" role="note"><span data-dcnode-id="5872" instrument_node="">Main article: </span><a data-dcnode-id="5870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Susa" title="Susa"><span data-dcnode-id="5871" instrument_node="">Susa</span></a></div><span data-dcnode-id="5868" instrument_node="">
</span><p data-dcnode-id="5841"><span data-dcnode-id="5867" instrument_node="">Evidence of a painted-pottery civilization around </span><a data-dcnode-id="5865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Susa" title="Susa"><span data-dcnode-id="5866" instrument_node="">Susa</span></a><span data-dcnode-id="5864" instrument_node=""> has been dated to c&nbsp;5000&nbsp;BCE.</span><sup class="reference" data-dcnode-id="5861" id="cite_ref-Langer_1-0"><a data-dcnode-id="5862" href="#cite_note-Langer-1"><span data-dcnode-id="5863" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5860" instrument_node=""> Susa was firmly within the </span><a data-dcnode-id="5858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sumer" title="Sumer"><span data-dcnode-id="5859" instrument_node="">Sumerian</span></a><span data-dcnode-id="5857" instrument_node=""> </span><a data-dcnode-id="5855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uruk" title="Uruk"><span data-dcnode-id="5856" instrument_node="">Uruk</span></a><span data-dcnode-id="5854" instrument_node=""> cultural sphere during the </span><a data-dcnode-id="5852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uruk_period" title="Uruk period"><span data-dcnode-id="5853" instrument_node="">Uruk period</span></a><span data-dcnode-id="5851" instrument_node="">. An imitation of the entire state apparatus of Uruk, </span><a data-dcnode-id="5849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proto-writing" title="Proto-writing"><span data-dcnode-id="5850" instrument_node="">proto-writing</span></a><span data-dcnode-id="5848" instrument_node="">, </span><a data-dcnode-id="5846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cylinder_seal" title="Cylinder seal"><span data-dcnode-id="5847" instrument_node="">cylinder seals</span></a><span data-dcnode-id="5845" instrument_node=""> with Sumerian motifs, and monumental architecture, is found at Susa. Susa may have been a colony of Uruk. As such, the </span><a data-dcnode-id="5843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Periodization" title="Periodization"><span data-dcnode-id="5844" instrument_node="">periodization</span></a><span data-dcnode-id="5842" instrument_node=""> of Susa corresponds to Uruk; Early, Middle and Late Susa II periods (3800–3100&nbsp;BCE) correspond to Early, Middle, and Late Uruk periods.
</span></p><p data-dcnode-id="5825"><span data-dcnode-id="5840" instrument_node="">Shortly after Susa was first settled 6000&nbsp;years ago, its inhabitants erected a temple on a monumental platform that rose over the flat surrounding landscape. The exceptional nature of the site is still recognizable today in the artistry of the ceramic vessels that were placed as offerings in a thousand or more graves near the base of the temple platform. Nearly two thousand pots were recovered from the cemetery most of them now in the </span><a data-dcnode-id="5838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louvre" title="Louvre"><span data-dcnode-id="5839" instrument_node="">Louvre</span></a><span data-dcnode-id="5837" instrument_node="">. The vessels found are eloquent testimony to the artistic and technical achievements of their makers, and they hold clues about the organization of the society that commissioned them.</span><sup class="reference" data-dcnode-id="5834" id="cite_ref-Aruz_1992_26_2-0"><a data-dcnode-id="5835" href="#cite_note-Aruz_1992_26-2"><span data-dcnode-id="5836" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5833" instrument_node=""> Painted ceramic vessels from Susa in the earliest first style are a late, regional version of the Mesopotamian </span><a data-dcnode-id="5831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubaid_period" title="Ubaid period"><span data-dcnode-id="5832" instrument_node="">Ubaid</span></a><span data-dcnode-id="5830" instrument_node=""> ceramic tradition that spread across the Near East during the fifth millennium B.C.</span><sup class="reference" data-dcnode-id="5827" id="cite_ref-Aruz_1992_26_2-1"><a data-dcnode-id="5828" href="#cite_note-Aruz_1992_26-2"><span data-dcnode-id="5829" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5826" instrument_node="">
</span></p><span data-dcnode-id="5824" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5812"><div class="thumbinner" data-dcnode-id="5813" style="width:222px;"><a class="image" data-dcnode-id="5822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAnubanini_Rock_Relief_1.jpg"><img alt="" class="thumbimage" data-dcnode-id="5823" data-file-height="3264" data-file-width="4928" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Anubanini_Rock_Relief_1.jpg/220px-Anubanini_Rock_Relief_1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Anubanini_Rock_Relief_1.jpg/330px-Anubanini_Rock_Relief_1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Anubanini_Rock_Relief_1.jpg/440px-Anubanini_Rock_Relief_1.jpg 2x" width="220"></a><span data-dcnode-id="5821" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5814"><div class="magnify" data-dcnode-id="5819"><a class="internal" data-dcnode-id="5820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAnubanini_Rock_Relief_1.jpg" title="Enlarge"></a></div><span data-dcnode-id="5818" instrument_node="">The </span><a data-dcnode-id="5816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anubanini_rock_relief" title="Anubanini rock relief"><span data-dcnode-id="5817" instrument_node="">Anubanini rock relief</span></a><span data-dcnode-id="5815" instrument_node="">, circa 2300 BC.</span></div></div></div><span data-dcnode-id="5811" instrument_node="">
</span><p data-dcnode-id="5805"><span data-dcnode-id="5810" instrument_node="">Susa I style was very much a product of the past and of influences from contemporary ceramic industries in the mountains of western Iran. The recurrence in close association of vessels of three types—a drinking goblet or beaker, a serving dish, and a small jar—implies the consumption of three types of food, apparently thought to be as necessary for life in the afterworld as it is in this one. Ceramics of these shapes, which were painted, constitute a large proportion of the vessels from the cemetery. Others are course cooking-type jars and bowls with simple bands painted on them and were probably the grave goods of the sites of humbler citizens as well as adolescents and, perhaps, children.</span><sup class="reference" data-dcnode-id="5807" id="cite_ref-3"><a data-dcnode-id="5808" href="#cite_note-3"><span data-dcnode-id="5809" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5806" instrument_node=""> The pottery is carefully made by hand. Although a slow wheel may have been employed, the asymmetry of the vessels and the irregularity of the drawing of encircling lines and bands indicate that most of the work was done freehand.
</span></p><span data-dcnode-id="5804" instrument_node="">
</span><h3 data-dcnode-id="5794"><span class="mw-headline" data-dcnode-id="5802" id="Lullubi_rock_reliefs"><span data-dcnode-id="5803" instrument_node="">Lullubi rock reliefs</span></span><span class="mw-editsection" data-dcnode-id="5795"><span class="mw-editsection-bracket" data-dcnode-id="5800"><span data-dcnode-id="5801" instrument_node="">[</span></span><a data-dcnode-id="5798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D2" title="Edit section: Lullubi rock reliefs"><span data-dcnode-id="5799" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5796"><span data-dcnode-id="5797" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5793" instrument_node="">
</span><p data-dcnode-id="5762"><span data-dcnode-id="5792" instrument_node="">The rock reliefs of the mountain kingdom of </span><a data-dcnode-id="5790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lullubi" title="Lullubi"><span data-dcnode-id="5791" instrument_node="">Lullubi</span></a><span data-dcnode-id="5789" instrument_node="">, especially the </span><a data-dcnode-id="5787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anubanini_rock_relief" title="Anubanini rock relief"><span data-dcnode-id="5788" instrument_node="">Anubanini rock relief</span></a><span data-dcnode-id="5786" instrument_node="">, are </span><a data-dcnode-id="5784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rock_relief" title="Rock relief"><span data-dcnode-id="5785" instrument_node="">rock reliefs</span></a><span data-dcnode-id="5783" instrument_node=""> from circa 2300 BC or the early 2nd millennium BC, the earliest rock reliefs of Iran. They are located in </span><a class="mw-redirect" data-dcnode-id="5781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kermanshah_Province" title="Kermanshah Province"><span data-dcnode-id="5782" instrument_node="">Kermanshah Province</span></a><span data-dcnode-id="5780" instrument_node="">.</span><sup class="reference" data-dcnode-id="5777" id="cite_ref-DTP_4-0"><a data-dcnode-id="5778" href="#cite_note-DTP-4"><span data-dcnode-id="5779" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="5774" id="cite_ref-JFO_5-0"><a data-dcnode-id="5775" href="#cite_note-JFO-5"><span data-dcnode-id="5776" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5773" instrument_node=""> These reliefs are thought to have influenced the later Achaemenid </span><a class="mw-redirect" data-dcnode-id="5771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Behistun_reliefs" title="Behistun reliefs"><span data-dcnode-id="5772" instrument_node="">Behistun reliefs</span></a><span data-dcnode-id="5770" instrument_node="">, about a millennium and a half later.</span><sup class="reference" data-dcnode-id="5767" id="cite_ref-DTP_4-1"><a data-dcnode-id="5768" href="#cite_note-DTP-4"><span data-dcnode-id="5769" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="5764" id="cite_ref-6"><a data-dcnode-id="5765" href="#cite_note-6"><span data-dcnode-id="5766" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5763" instrument_node="">
</span></p><span data-dcnode-id="5761" instrument_node="">
</span><h2 data-dcnode-id="5751"><span class="mw-headline" data-dcnode-id="5759" id="Elam"><span data-dcnode-id="5760" instrument_node="">Elam</span></span><span class="mw-editsection" data-dcnode-id="5752"><span class="mw-editsection-bracket" data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node="">[</span></span><a data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D3" title="Edit section: Elam"><span data-dcnode-id="5756" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5753"><span data-dcnode-id="5754" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5750" instrument_node="">
</span><p data-dcnode-id="5736"><a data-dcnode-id="5748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elam" title="Elam"><span data-dcnode-id="5749" instrument_node="">Elamite</span></a><span data-dcnode-id="5747" instrument_node=""> art, from the south and west of modern Iran shared many characteristics with the neighbouring </span><a data-dcnode-id="5745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_of_Mesopotamia" title="Art of Mesopotamia"><span data-dcnode-id="5746" instrument_node="">art of Mesopotamia</span></a><span data-dcnode-id="5744" instrument_node="">, though it was often less sophisticated. </span><a data-dcnode-id="5742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cylinder_seal" title="Cylinder seal"><span data-dcnode-id="5743" instrument_node="">Cylinder seals</span></a><span data-dcnode-id="5741" instrument_node="">, small figures of worshippers, gods and animals, shallow reliefs, and some large statues of rulers are all found. There are a small number of very fine gold vessels with relief figures.</span><sup class="reference" data-dcnode-id="5738" id="cite_ref-Porada_7-0"><a data-dcnode-id="5739" href="#cite_note-Porada-7"><span data-dcnode-id="5740" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5737" instrument_node="">
</span></p><span data-dcnode-id="5735" instrument_node="">
</span><h2 data-dcnode-id="5725"><span class="mw-headline" data-dcnode-id="5733" id="Luristan_bronzes"><span data-dcnode-id="5734" instrument_node="">Luristan bronzes</span></span><span class="mw-editsection" data-dcnode-id="5726"><span class="mw-editsection-bracket" data-dcnode-id="5731"><span data-dcnode-id="5732" instrument_node="">[</span></span><a data-dcnode-id="5729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D4" title="Edit section: Luristan bronzes"><span data-dcnode-id="5730" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5724" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5712"><div class="thumbinner" data-dcnode-id="5713" style="width:222px;"><a class="image" data-dcnode-id="5722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHorse_Bit_Cheekpiece%2C_about_700_BC%2C_Luristan%2C_Iran%2C_bronze_-_Cleveland_Museum_of_Art_-_DSC08162.JPG"><img alt="" class="thumbimage" data-dcnode-id="5723" data-file-height="3240" data-file-width="4320" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/03/Horse_Bit_Cheekpiece%252C_about_700_BC%252C_Luristan%252C_Iran%252C_bronze_-_Cleveland_Museum_of_Art_-_DSC08162.JPG/220px-Horse_Bit_Cheekpiece%252C_about_700_BC%252C_Luristan%252C_Iran%252C_bronze_-_Cleveland_Museum_of_Art_-_DSC08162.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/03/Horse_Bit_Cheekpiece%2C_about_700_BC%2C_Luristan%2C_Iran%2C_bronze_-_Cleveland_Museum_of_Art_-_DSC08162.JPG/330px-Horse_Bit_Cheekpiece%2C_about_700_BC%2C_Luristan%2C_Iran%2C_bronze_-_Cleveland_Museum_of_Art_-_DSC08162.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/03/Horse_Bit_Cheekpiece%2C_about_700_BC%2C_Luristan%2C_Iran%2C_bronze_-_Cleveland_Museum_of_Art_-_DSC08162.JPG/440px-Horse_Bit_Cheekpiece%2C_about_700_BC%2C_Luristan%2C_Iran%2C_bronze_-_Cleveland_Museum_of_Art_-_DSC08162.JPG 2x" width="220"></a><span data-dcnode-id="5721" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5714"><div class="magnify" data-dcnode-id="5719"><a class="internal" data-dcnode-id="5720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHorse_Bit_Cheekpiece%2C_about_700_BC%2C_Luristan%2C_Iran%2C_bronze_-_Cleveland_Museum_of_Art_-_DSC08162.JPG" title="Enlarge"></a></div><span data-dcnode-id="5718" instrument_node="">Horse bit cheekpiece with "</span><a data-dcnode-id="5716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Master_of_Animals" title="Master of Animals"><span data-dcnode-id="5717" instrument_node="">Master of Animals</span></a><span data-dcnode-id="5715" instrument_node="">" motif, about 700 BC</span></div></div></div><span data-dcnode-id="5711" instrument_node="">
</span><link data-dcnode-id="5710" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5706" role="note"><span data-dcnode-id="5709" instrument_node="">Main article: </span><a data-dcnode-id="5707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Luristan_bronze" title="Luristan bronze"><span data-dcnode-id="5708" instrument_node="">Luristan bronze</span></a></div><span data-dcnode-id="5705" instrument_node="">
</span><p data-dcnode-id="5656"><span data-dcnode-id="5704" instrument_node="">Luristan bronzes (rarely "Lorestān", "Lorestāni" etc. in sources in English) are small </span><a data-dcnode-id="5702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Casting" title="Casting"><span data-dcnode-id="5703" instrument_node="">cast</span></a><span data-dcnode-id="5701" instrument_node=""> objects decorated with </span><a data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bronze_sculpture" title="Bronze sculpture"><span data-dcnode-id="5700" instrument_node="">bronze sculptures</span></a><span data-dcnode-id="5698" instrument_node=""> from the </span><a class="mw-redirect" data-dcnode-id="5696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_Iron_Age" title="Early Iron Age"><span data-dcnode-id="5697" instrument_node="">Early Iron Age</span></a><span data-dcnode-id="5695" instrument_node=""> which have been found in large numbers in </span><a class="mw-redirect" data-dcnode-id="5693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lorest%25C4%2581n_Province" title="Lorestān Province"><span data-dcnode-id="5694" instrument_node="">Lorestān Province</span></a><span data-dcnode-id="5692" instrument_node=""> and </span><a data-dcnode-id="5690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kermanshah" title="Kermanshah"><span data-dcnode-id="5691" instrument_node="">Kermanshah</span></a><span data-dcnode-id="5689" instrument_node=""> in west-central </span><a data-dcnode-id="5687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="5688" instrument_node="">Iran</span></a><span data-dcnode-id="5686" instrument_node="">.</span><sup class="reference" data-dcnode-id="5683" id="cite_ref-8"><a data-dcnode-id="5684" href="#cite_note-8"><span data-dcnode-id="5685" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5682" instrument_node=""> They include a great number of ornaments, tools, weapons, horse-fittings and a smaller number of vessels including </span><a class="mw-redirect" data-dcnode-id="5680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Situla_%28vessel%29" title="Situla (vessel)"><span data-dcnode-id="5681" instrument_node="">situlae</span></a><span data-dcnode-id="5679" instrument_node="">,</span><sup class="reference" data-dcnode-id="5676" id="cite_ref-9"><a data-dcnode-id="5677" href="#cite_note-9"><span data-dcnode-id="5678" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5675" instrument_node=""> and those found in recorded excavations are generally found in burials.</span><sup class="reference" data-dcnode-id="5672" id="cite_ref-10"><a data-dcnode-id="5673" href="#cite_note-10"><span data-dcnode-id="5674" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5671" instrument_node=""> The ethnicity of the people who created them remains unclear,</span><sup class="reference" data-dcnode-id="5668" id="cite_ref-11"><a data-dcnode-id="5669" href="#cite_note-11"><span data-dcnode-id="5670" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5667" instrument_node=""> though they may well have been </span><a class="mw-redirect" data-dcnode-id="5665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_people" title="Persian people"><span data-dcnode-id="5666" instrument_node="">Persian</span></a><span data-dcnode-id="5664" instrument_node="">, possibly related to the modern </span><a class="mw-redirect" data-dcnode-id="5662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lur_people" title="Lur people"><span data-dcnode-id="5663" instrument_node="">Lur people</span></a><span data-dcnode-id="5661" instrument_node=""> who have given their name to the area. They probably date to between about 1000 and 650 BC.</span><sup class="reference" data-dcnode-id="5658" id="cite_ref-12"><a data-dcnode-id="5659" href="#cite_note-12"><span data-dcnode-id="5660" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5657" instrument_node="">
</span></p><p data-dcnode-id="5623"><span data-dcnode-id="5655" instrument_node="">The bronzes tend to be flat and use </span><a data-dcnode-id="5653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Openwork" title="Openwork"><span data-dcnode-id="5654" instrument_node="">openwork</span></a><span data-dcnode-id="5652" instrument_node="">, like the related metalwork of </span><a data-dcnode-id="5650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scythian_art" title="Scythian art"><span data-dcnode-id="5651" instrument_node="">Scythian art</span></a><span data-dcnode-id="5649" instrument_node="">. They represent the art of a nomadic or </span><a class="mw-redirect" data-dcnode-id="5647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transhumant" title="Transhumant"><span data-dcnode-id="5648" instrument_node="">transhumant</span></a><span data-dcnode-id="5646" instrument_node=""> people, for whom all possessions needed to be light and portable, and necessary objects such as weapons, finials (perhaps for tent-poles), horse-harness fittings, pins, cups and small fittings are highly decorated over their small surface area.</span><sup class="reference" data-dcnode-id="5643" id="cite_ref-13"><a data-dcnode-id="5644" href="#cite_note-13"><span data-dcnode-id="5645" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5642" instrument_node=""> Representations of animals are common, especially goats or sheep with large horns, and the forms and styles are distinctive and inventive. The "</span><a data-dcnode-id="5640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Master_of_Animals" title="Master of Animals"><span data-dcnode-id="5641" instrument_node="">Master of Animals</span></a><span data-dcnode-id="5639" instrument_node="">" motif, showing a human positioned between and grasping two </span><a data-dcnode-id="5637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confronted_animals" title="Confronted animals"><span data-dcnode-id="5638" instrument_node="">confronted animals</span></a><span data-dcnode-id="5636" instrument_node=""> is common</span><sup class="reference" data-dcnode-id="5633" id="cite_ref-14"><a data-dcnode-id="5634" href="#cite_note-14"><span data-dcnode-id="5635" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5632" instrument_node=""> but typically highly stylized.</span><sup class="reference" data-dcnode-id="5629" id="cite_ref-15"><a data-dcnode-id="5630" href="#cite_note-15"><span data-dcnode-id="5631" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5628" instrument_node=""> Some female "mistress of animals" are seen.</span><sup class="reference" data-dcnode-id="5625" id="cite_ref-16"><a data-dcnode-id="5626" href="#cite_note-16"><span data-dcnode-id="5627" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5624" instrument_node="">
</span></p><p data-dcnode-id="5605"><span data-dcnode-id="5622" instrument_node="">The </span><a data-dcnode-id="5620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ziwiye_hoard" title="Ziwiye hoard"><span data-dcnode-id="5621" instrument_node="">Ziwiye hoard</span></a><span data-dcnode-id="5619" instrument_node=""> of about 700 BC is a collection of objects, mostly in metal, perhaps not all in fact found together, of about the same date, probably showing the art of the Persian cities of the period. Delicate metalwork from </span><a data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron_Age" title="Iron Age"><span data-dcnode-id="5618" instrument_node="">Iron Age</span></a><span data-dcnode-id="5616" instrument_node=""> II times has been found at </span><a class="mw-redirect" data-dcnode-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hasanlu" title="Hasanlu"><span data-dcnode-id="5615" instrument_node="">Hasanlu</span></a><span data-dcnode-id="5613" instrument_node=""> and still earlier at </span><a data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marlik" title="Marlik"><span data-dcnode-id="5612" instrument_node="">Marlik</span></a><span data-dcnode-id="5610" instrument_node="">.</span><sup class="reference" data-dcnode-id="5607" id="cite_ref-Porada_7-1"><a data-dcnode-id="5608" href="#cite_note-Porada-7"><span data-dcnode-id="5609" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5606" instrument_node="">
</span></p><span data-dcnode-id="5604" instrument_node="">
</span><h2 data-dcnode-id="5594"><span class="mw-headline" data-dcnode-id="5602" id="Achaemenids"><span data-dcnode-id="5603" instrument_node="">Achaemenids</span></span><span class="mw-editsection" data-dcnode-id="5595"><span class="mw-editsection-bracket" data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node="">[</span></span><a data-dcnode-id="5598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_art%26action%3Dedit%26section%3D5" title="Edit section: Achaemenids"><span data-dcnode-id="5599" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5596"><span data-dcnode-id="5597" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5593" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5569"><div class="thumbinner" data-dcnode-id="5570" style="width:222px;"><a class="image" data-dcnode-id="5591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AColossal_Bull_Head%2C_Iran%2C_Persepolis%2C_Hundred-Column_Hall%2C_Achaemenid_Period%2C_reigns_of_Xerxes_and_Artaxerxes_I%2C_486-425_BC%2C_restored_limestone_-_Oriental_Institute_Museum%2C_University_of_Chicago_-_DSC07935.JPG"><img alt="" class="thumbimage" data-dcnode-id="5592" data-file-height="4581" data-file-width="3648" decoding="async" height="276" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Colossal_Bull_Head%252C_Iran%252C_Persepolis%252C_Hundred-Column_Hall%252C_Achaemenid_Period%252C_reigns_of_Xerxes_and_Artaxerxes_I%252C_486-425_BC%252C_restored_limestone_-_Oriental_Institute_Museum%252C_University_of_Chicago_-_DSC07935.JPG/220px-thumbnail.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Colossal_Bull_Head%2C_Iran%2C_Persepolis%2C_Hundred-Column_Hall%2C_Achaemenid_Period%2C_reigns_of_Xerxes_and_Artaxerxes_I%2C_486-425_BC%2C_restored_limestone_-_Oriental_Institute_Museum%2C_University_of_Chicago_-_DSC07935.JPG/330px-thumbnail.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Colossal_Bull_Head%2C_Iran%2C_Persepolis%2C_Hundred-Column_Hall%2C_Achaemenid_Period%2C_reigns_of_Xerxes_and_Artaxerxes_I%2C_486-425_BC%2C_restored_limestone_-_Oriental_Institute_Museum%2C_University_of_Chicago_-_DSC07935.JPG/440px-thumbnail.jpg 2x" width="220"></a><span data-dcnode-id="5590" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5571"><div class="magnify" data-dcnode-id="5588"><a class="internal" data-dcnode-id="5589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AColossal_Bull_Head%2C_Iran%2C_Persepolis%2C_Hundred-Column_Hall%2C_Achaemenid_Period%2C_reigns_of_Xerxes_and_Artaxerxes_I%2C_486-425_BC%2C_restored_limestone_-_Oriental_Institute_Museum%2C_University_of_Chicago_-_DSC07935.JPG" title="Enlarge"></a></div><span data-dcnode-id="5587" instrument_node="">Restored colossal </span><a class="mw-redirect" data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Limestone_%28mineral%29" title="Limestone (mineral)"><span data-dcnode-id="5586" instrument_node="">limestone</span></a><span data-dcnode-id="5584" instrument_node=""> bull head </span><a data-dcnode-id="5582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_column" title="Persian column"><span data-dcnode-id="5583" instrument_node="">Persian column</span></a><span data-dcnode-id="5581" instrument_node=""> </span><a data-dcnode-id="5579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_%28architecture%29" title="Capital (architecture)"><span data-dcnode-id="5580" instrument_node="">capital</span></a><span data-dcnode-id="5578" instrument_node=""> from </span><a data-dcnode-id="5576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persepolis" title="Persepolis"><span data-dcnode-id="5577" instrument_node="">Persepolis</span></a><span data-dcnode-id="5575" instrument_node="">, </span><a data-dcnode-id="5573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achaemenid_architecture" title="Achaemenid architecture"><span data-dcnode-id="5574" instrument_node="">Achaemenid</span></a><span data-dcnode-id="5572" instrument_node="">, 486-425 BC</span></div></div></div><span data-dcnode-id="5568" instrument_node="">
</span><p data-dcnode-id="5550"><span data-dcnode-id="5567" instrument_node="">Achaemenid art includes </span><a data-dcnode-id="5565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frieze" title="Frieze"><span data-dcnode-id="5566" instrument_node="">frieze</span></a><span data-dcnode-id="5564" instrument_node=""> reliefs, metalwork, decoration of palaces, glazed brick masonry, fine craftsmanship (masonry, carpentry, etc.), and gardening. Most survivals of court art are monumental sculpture, above all the </span><a data-dcnode-id="5562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Relief" title="Relief"><span data-dcnode-id="5563" instrument_node="">reliefs</span></a><span data-dcnode-id="5561" instrument_node="">, double animal-headed </span><a data-dcnode-id="5559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_column" title="Persian column"><span data-dcnode-id="5560" instrument_node="">Persian column</span></a><span data-dcnode-id="5558" instrument_node=""> capitals and other sculptures of </span><a data-dcnode-id="5556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persepolis" title="Persepolis"><span data-dcnode-id="5557" instrument_node="">Persepolis</span></a><span data-dcnode-id="5555" instrument_node=""> (see below for the few but impressive Achaemenid rock reliefs).</span><sup class="reference" data-dcnode-id="5552" id="cite_ref-Cotterell,_161–162_17-0"><a data-dcnode-id="5553" href="#cite_note-Cotterell,_161%E2%80%93162-17"><span data-dcnode-id="5554" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5551" instrument_node="">
</span></p><p data-dcnode-id="5544"><span data-dcnode-id="5549" instrument_node="">Although the Persians took artists, with their styles and techniques, from all corners of their empire, they produced not simply a combination of styles, but a synthesis of a new unique Persian style.</span><sup class="reference" data-dcnode-id="5546" id="cite_ref-18"><a data-dcnode-id="5547" href="#cite_note-18"><span data-dcnode-id="5548" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5545" instrument_node=""> Cyrus the Great in fact had an extensive ancient Iranian heritage behind him; the rich Achaemenid gold work, which inscriptions suggest may have been a specialty of the Medes, was for instance in the tradition of earlier sites.
</span></p><p data-dcnode-id="5526"><span data-dcnode-id="5543" instrument_node="">The </span><a data-dcnode-id="5541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhyton" title="Rhyton"><span data-dcnode-id="5542" instrument_node="">rhyton</span></a><span data-dcnode-id="5540" instrument_node=""> drinking vessel, horn-shaped and usually ending in an animal shape, is the most common type of large metalwork to survive, as in a </span><a data-dcnode-id="5538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achaemenid_Persian_Lion_Rhyton" title="Achaemenid Persian Lion Rhyton"><span data-dcnode-id="5539" instrument_node="">fine example in New York</span></a><span data-dcnode-id="5537" instrument_node="">. There are a number of very fine smaller pieces of jewellery or inlay in precious metal, also mostly featuring animals, and the </span><a data-dcnode-id="5535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxus_Treasure" title="Oxus Treasure"><span data-dcnode-id="5536" instrument_node="">Oxus Treasure</span></a><span data-dcnode-id="5534" instrument_node=""> has a wide selection of types. Small pieces, typically in gold, were sewn to clothing by the elite, and a number of gold </span><a data-dcnode-id="5532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torc" title="Torc"><span data-dcnode-id="5533" instrument_node="">torcs</span></a><span data-dcnode-id="5531" instrument_node=""> have survived.</span><sup class="reference" data-dcnode-id="5528" id="cite_ref-Cotterell,_161–162_17-1"><a data-dcnode-id="5529" href="#cite_note-Cotterell,_161%E2%80%93162-17"><span data-dcnode-id="5530" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5527" instrument_node="">
</span></p><span data-dcnode-id="5525" instrument_node="">

</span><p data-dcnode-id="5510"><a class="mw-redirect" data-dcnode-id="5515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achaemenid" title="Achaemenid"><span data-dcnode-id="5516" instrument_node="">Achaemenid</span></a><span data-dcnode-id="5514" instrument_node=""> griffin capital at </span><a data-dcnode-id="5512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persepolis" title="Persepolis"><span data-dcnode-id="5513" instrument_node="">Persepolis</span></a><span data-dcnode-id="5511" instrument_node="">
