</span><div class="content-inner" data-dcnode-id="909"><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1651"><strong data-dcnode-id="1652"><span class="dropcap" data-dcnode-id="1654" style="background-color: #ffffff; color: #db9957; border-color: #ffffff; font-size: 36pt;"><span data-dcnode-id="1655" instrument_node="">P</span></span><span data-dcnode-id="1653" instrument_node="">ersian art, also referred to as Iranian art, is an art form made up of many mediums that include painting, pottery, sculpture, metalworking, calligraphy, weaving, and architecture. As the historic region of Persia developed, the art movement received multiple influences from neighboring countries, which dictated the style seen in the artworks created. With the earliest influence dating back to approximately 550 BCE, Persian art exists as one of the richest art heritages in the world.</span></strong></p><span data-dcnode-id="1650" instrument_node="">
</span><div class="no_bullets contracted" data-dcnode-id="1557" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1642"><span data-dcnode-id="1649" instrument_node="">Table of Contents</span><span data-dcnode-id="1648" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1643"><span data-dcnode-id="1647" instrument_node="">[</span><a data-dcnode-id="1645" href="#"><span data-dcnode-id="1646" instrument_node="">Show</span></a><span data-dcnode-id="1644" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1558" style="display: none;"><li data-dcnode-id="1637"><a data-dcnode-id="1638" href="#A_History_of_Persian_Art"><span class="toc_number toc_depth_1" data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">1</span></span><span data-dcnode-id="1639" instrument_node=""> A History of Persian Art</span></a></li><li data-dcnode-id="1616"><a data-dcnode-id="1633" href="#Early_Persian_Art"><span class="toc_number toc_depth_1" data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">2</span></span><span data-dcnode-id="1634" instrument_node=""> Early Persian Art</span></a><ul data-dcnode-id="1617"><li data-dcnode-id="1628"><a data-dcnode-id="1629" href="#Achaemenid_Era_c_550_330_BCE"><span class="toc_number toc_depth_2" data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">2.1</span></span><span data-dcnode-id="1630" instrument_node=""> Achaemenid Era (c. 550 – 330 BCE)</span></a></li><li data-dcnode-id="1623"><a data-dcnode-id="1624" href="#Parthian_Era_c_247_BCE_8211_224_CE"><span class="toc_number toc_depth_2" data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">2.2</span></span><span data-dcnode-id="1625" instrument_node=""> Parthian Era (c. 247 BCE – 224 CE)</span></a></li><li data-dcnode-id="1618"><a data-dcnode-id="1619" href="#Sassanid_Era_c_226_650_CE"><span class="toc_number toc_depth_2" data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">2.3</span></span><span data-dcnode-id="1620" instrument_node=""> Sassanid Era (c. 226 – 650 CE)</span></a></li></ul></li><li data-dcnode-id="1611"><a data-dcnode-id="1612" href="#Persian_Architecture"><span class="toc_number toc_depth_1" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">3</span></span><span data-dcnode-id="1613" instrument_node=""> Persian Architecture</span></a></li><li data-dcnode-id="1606"><a data-dcnode-id="1607" href="#Persian_Sculpture"><span class="toc_number toc_depth_1" data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">4</span></span><span data-dcnode-id="1608" instrument_node=""> Persian Sculpture</span></a></li><li data-dcnode-id="1590"><a data-dcnode-id="1602" href="#Persia_Under_Islam"><span class="toc_number toc_depth_1" data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">5</span></span><span data-dcnode-id="1603" instrument_node=""> Persia Under Islam</span></a><ul data-dcnode-id="1591"><li data-dcnode-id="1597"><a data-dcnode-id="1598" href="#The_Rise_of_Illumination_and_Calligraphy"><span class="toc_number toc_depth_2" data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">5.1</span></span><span data-dcnode-id="1599" instrument_node=""> The Rise of Illumination and Calligraphy</span></a></li><li data-dcnode-id="1592"><a data-dcnode-id="1593" href="#The_Development_of_Painting"><span class="toc_number toc_depth_2" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">5.2</span></span><span data-dcnode-id="1594" instrument_node=""> The Development of Painting</span></a></li></ul></li><li data-dcnode-id="1569"><a data-dcnode-id="1586" href="#Famous_Persian_Artists_and_Their_Artworks"><span class="toc_number toc_depth_1" data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">6</span></span><span data-dcnode-id="1587" instrument_node=""> Famous Persian Artists and Their Artworks</span></a><ul data-dcnode-id="1570"><li data-dcnode-id="1581"><a data-dcnode-id="1582" href="#The_Oxus_Treasure_c_1877_CE"><span class="toc_number toc_depth_2" data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">6.1</span></span><span data-dcnode-id="1583" instrument_node=""> The Oxus Treasure (c. 1877 CE)</span></a></li><li data-dcnode-id="1576"><a data-dcnode-id="1577" href="#Kamal_ud-Din_Behzad_1455_1535"><span class="toc_number toc_depth_2" data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">6.2</span></span><span data-dcnode-id="1578" instrument_node=""> Kamāl ud-Dīn Behzād (1455 – 1535)</span></a></li><li data-dcnode-id="1571"><a data-dcnode-id="1572" href="#Reza_Abbasi_c_1565_1635"><span class="toc_number toc_depth_2" data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">6.3</span></span><span data-dcnode-id="1573" instrument_node=""> Reza Abbasi (c. 1565 – 1635)</span></a></li></ul></li><li data-dcnode-id="1564"><a data-dcnode-id="1565" href="#The_Emergence_of_Persian_Carpets"><span class="toc_number toc_depth_1" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">7</span></span><span data-dcnode-id="1566" instrument_node=""> The Emergence of Persian Carpets</span></a></li><li data-dcnode-id="1559"><a data-dcnode-id="1560" href="#The_Legacy_of_Ancient_Persian_Arts"><span class="toc_number toc_depth_1" data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">8</span></span><span data-dcnode-id="1561" instrument_node=""> The Legacy of Ancient Persian Arts</span></a></li></ul></div><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1550" instrument_node="">
</span><h2 data-dcnode-id="1547"><span data-dcnode-id="1548" id="A_History_of_Persian_Art"><span data-dcnode-id="1549" instrument_node="">A History of Persian Art</span></span></h2><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1545" instrument_node="">In what is now known as Iran, the region of Persia created an immense empire in the second half of the 6</span><sup data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">th</span></sup><span data-dcnode-id="1542" instrument_node=""> century BCE that spanned the Indus Valley to Northern Greece, as well as Central Asia to Egypt. Thought to begin with the First Persian Empire, known as the Achaemenid Empire that occurred between 550 and 330 BCE, the Persian art era is said to have one of the longest histories of origin in the art world.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1539" instrument_node="">During its inception, Persian art took inspiration from older civilizations such as </span><a data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/mesopotamian-art/"><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Mesopotamia</span></strong></a><span data-dcnode-id="1535" instrument_node="">, with which it continued to mingle for much of Antiquity. The impact that this had on Persian art was that a rich cultural history began to develop, which could be seen in the artworks that were created. First established by Emperor Cyrus the Great, Persia existed as a vast empire over three general phases, which saw the region extending its rule into Central Asia and throughout Asia Minor.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1520"><noscript data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">&lt;img class="alignnone size-full wp-image-9583" src="https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art.jpg" alt="Persian Map Iranian Art" width="848" height="660" srcset="https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-300x233.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-768x598.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-30x23.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-75x58.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-110x86.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-160x125.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-500x389.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-50x39.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-100x78.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-200x156.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-610x475.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-750x584.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Persian Map Iranian Art" class="lazyload alignnone size-full wp-image-9583" data-dcnode-id="1530" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-300x233.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-768x598.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-30x23.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-75x58.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-110x86.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-160x125.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-500x389.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-50x39.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-100x78.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-200x156.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-610x475.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Map-Iranian-Art-750x584.jpg 750w" height="660" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20660%22%3E%3C/svg%3E" width="848"><span data-dcnode-id="1521" style="font-size: 10pt;"><span data-dcnode-id="1529" instrument_node="">A map of Persia by Jansson, Amsterdam c. 1640;&nbsp;</span><em data-dcnode-id="1522"><a data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AJansson%2527s_map_of_Persia..jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1528" instrument_node="">Koa-public</span></a><span data-dcnode-id="1526" instrument_node="">, </span><a data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/4.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1525" instrument_node="">CC BY-SA 4.0</span></a><span data-dcnode-id="1523" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Known to be one of the oldest countries in the world, Persia was home to one of the earliest cultures and societies that were believed to experiment with artmaking. Early Persian artworks included intricate ceramics and small bronze objects, which displayed a variety of artistic styles and influences that were taken from bordering countries.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1515" instrument_node="">Throughout its domination, Persian art was influenced by Sumerian Art, </span><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/greek-art/" rel="noopener"><strong data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Greek Art</span></strong></a><span data-dcnode-id="1511" instrument_node="">, and especially Chinese Art. The impact of traditional Chinese characteristics became visible in the creation of Persian miniatures, which existed as small paintings that were done on paper as either a book illustration or an individual work of art. These miniatures were made to be kept in an album of miniature works known as a </span><em data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">muraqqa.&nbsp;</span></em><span data-dcnode-id="1508" instrument_node="">Today, Persian art miniatures encompass some of the most significant Persia paintings from that period of art history.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">The term “Persia” was derived from an area of southern Iran that was formerly known as “Persis” or “Parsa”. This region was named after the Indo-European nomadic group of individuals who had migrated to that region in 1000 BCE. However, in 1935, the Iranian government requested that all countries with which it had diplomatic ties refer to the country by its Persian name, which is Iran.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><blockquote data-dcnode-id="1498"><p data-dcnode-id="1499"><span data-dcnode-id="1500" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Due to this, Persian art and Iranian art have been used interchangeably, as the term essentially denotes the same thing.</span></strong></span></p></blockquote><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1496" instrument_node="">When considering the development of Persian art, the artworks created can stylistically be represented as a blend of Native Persian traditions with Mesopotamian, Egyptian, and classic Greek and </span><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/roman-art/" rel="noopener"><strong data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Roman art</span></strong></a><span data-dcnode-id="1492" instrument_node="">. This was because as each new culture appeared in Persia, the art that emerged borrowed heavily from the culture of older civilizations. Despite this borrowing, each external influence that appeared in Persian art was understood and translated in a uniquely Persian way to create the extraordinary art that existed.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Due to this, the surviving Persian art to come from ancient times placed a strong focus on the human figure, as most monuments from this era depicted males who were mostly royalty. Additionally, animals were also considered to be of great importance, as the emphasis was placed on them in these sculptures as well.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1474"><noscript data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">&lt;img class="alignnone size-full wp-image-9585" src="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art.jpg" alt="Ancient Persian Art" width="848" height="905" srcset="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-281x300.jpg 281w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-768x820.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-28x30.jpg 28w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-70x75.jpg 70w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-103x110.jpg 103w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-150x160.jpg 150w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-469x500.jpg 469w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-47x50.jpg 47w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-94x100.jpg 94w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-187x200.jpg 187w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-610x651.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-750x800.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Ancient Persian Art" class="lazyload alignnone size-full wp-image-9585" data-dcnode-id="1484" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-281x300.jpg 281w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-768x820.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-28x30.jpg 28w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-70x75.jpg 70w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-103x110.jpg 103w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-150x160.jpg 150w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-469x500.jpg 469w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-47x50.jpg 47w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-94x100.jpg 94w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-187x200.jpg 187w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-610x651.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Art-750x800.jpg 750w" height="905" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20905%22%3E%3C/svg%3E" width="848"><span data-dcnode-id="1475" style="font-size: 10pt;"><span data-dcnode-id="1483" instrument_node="">A gilded silver Sassanid bowl showing a king hunting (c. 7th century AD), displayed at the Museum of Islamic Art in Berlin;&nbsp;</span><em data-dcnode-id="1476"><a data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMIK_-_Sassaniden_Jagdschale.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1482" instrument_node="">Wolfgang Sauber</span></a><span data-dcnode-id="1480" instrument_node="">, </span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/3.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1479" instrument_node="">CC BY-SA 3.0</span></a><span data-dcnode-id="1477" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">However, with the fall of the First Persian Empire, Islam began to form as the dominant religion in Persia. As time progressed, an Islamic style of art began to develop, which further influenced the type of sculptures and artworks that were created. Animals began to be represented on a much smaller scale in comparison to the plants that surrounded them and were also combined with elegant Chinese motifs, as the focus of Persian art turned towards an extremely graceful and harmonious style.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Unfortunately, relatively little Persian art that was created has managed to survive the millennia. The architecture that has been preserved is mostly made up of broken palaces and rock-cut tombs today, while some of the iconic Persian sculpture has been maintained in column capitals, wall reliefs, and metalworks. Possibly the greatest misfortune from this rich period of art history is that no remnants of the countless ancient Persian paintings exist today.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1461" instrument_node="">
</span><h2 data-dcnode-id="1458"><span data-dcnode-id="1459" id="Early_Persian_Art"><span data-dcnode-id="1460" instrument_node="">Early Persian Art</span></span></h2><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">The history of Persia and its art appeared over three great phases in the region’s development. Within those phases, two great ages of Persian civilization developed, which were subsequently recognized as the First Persian Empire, which was known as the Achaemenid Empire, and the Second Persian Empire, which was the Sassanid Empire. The third phase existed as more of a transitory stage between the two empires and was labeled the Parthian Era.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><blockquote data-dcnode-id="1449"><p data-dcnode-id="1450"><span data-dcnode-id="1451" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Prior to the appearance of the Achaemenid Era, Persian culture was in its more formative stages of development. Therefore, with the rise of each empire, Persian art was slowly influenced by the influx of different cultures and ideas.</span></strong></span></p></blockquote><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">At the fall of the Sassanid Era, Persia became part of the Islamic world, where it has been ever since. Thus, the art that emerged&nbsp;from this last stage is described to have a decidedly Islamic influence due to the changes and advancements that occurred within the civilization in Persia at that time.</span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1442" instrument_node="">
</span><h3 data-dcnode-id="1439"><span data-dcnode-id="1440" id="Achaemenid_Era_c_550_330_BCE"><span data-dcnode-id="1441" instrument_node="">Achaemenid Era (c. 550 – 330 BCE)</span></span></h3><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1437" instrument_node="">Founded by Cyrus the Great, the Achaemenid Era was known as the First Persian Empire to exist. It spanned between approximately 550 and 330 BCE and was primarily influenced by both Greek and </span><a data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/egyptian-art/" rel="noopener"><strong data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Egyptian art</span></strong></a><span data-dcnode-id="1433" instrument_node="">. Artworks to come out of the Achaemenid Empire drew on models of the past in an effort to improve them, with architecture existing as the main form of art that was created and regenerated during this time.</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1430" instrument_node="">Persian art within the First Empire was best illustrated by a series of monumental palace complexes that were built in Persepolis, the capital city, and Susa. These palaces were typically adorned in sculpture and elaborate stone bas-reliefs, as the Achaemenids worked mainly in stone. An important enameled brick decoration, the </span><em data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Archers</span></em><span data-dcnode-id="1427" instrument_node=""> frieze of Susa, which adorned the royal palace of Darius I (r. 522-486 BCE) in Susa is still in existence today, demonstrating the style of stonework that was popular. It is on display at the Louvre Museum in France.</span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1413"><noscript data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">&lt;img class="alignnone size-full wp-image-9577" src="https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art.jpg" alt="Early Iranian Art" width="848" height="595" srcset="https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-300x210.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-768x539.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-30x21.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-75x53.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-110x77.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-160x112.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-500x351.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-50x35.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-100x70.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-200x140.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-610x428.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-750x526.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Early Iranian Art" class="lazyload alignnone size-full wp-image-9577" data-dcnode-id="1422" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-300x210.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-768x539.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-30x21.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-75x53.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-110x77.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-160x112.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-500x351.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-50x35.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-100x70.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-200x140.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-610x428.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Early-Iranian-Art-750x526.jpg 750w" height="595" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20595%22%3E%3C/svg%3E" width="848"><span data-dcnode-id="1414" style="font-size: 10pt;"><em data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Archers </span></em><span data-dcnode-id="1419" instrument_node="">frieze from Darius’ palace at Susa,&nbsp;ca. 510 BC;&nbsp;</span><em data-dcnode-id="1415"><a data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AArchers_frieze_Louvre_AOD488.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1418" instrument_node="">Louvre Museum</span></a><span data-dcnode-id="1416" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Other sculptures present within the city of Persepolis were a pair of large bulls with human heads, which flanked the gates leading into the city. Darius I, the ruler at that time, was also said to have commissioned an enormous relief sculpture carved out of rock complete with an inscription. Within the sculpture, he is portrayed to be conquering his enemies while being watched over by the Gods.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><blockquote data-dcnode-id="1404"><p data-dcnode-id="1405"><span data-dcnode-id="1406" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">This sculpture thus demonstrated the great influence that Greek art had on the type of sculptures created within the Achaemenid Era.</span></strong></span></p></blockquote><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Other important artworks from the First Persian Empire included intricate jewelry which was typically made out of precious metals like gold and gemstones. This complex jewelry went on to illustrate the outstanding level of artistry that existed during this time, which was further emphasized by the swords and drinking horns that were made out of silver and gold.</span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1397" instrument_node="">
</span><h3 data-dcnode-id="1394"><span data-dcnode-id="1395" id="Parthian_Era_c_247_BCE_8211_224_CE"><span data-dcnode-id="1396" instrument_node="">Parthian Era (c. 247 BCE – 224 CE)</span></span></h3><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">After the fall of the Achaemenid Empire in 330 BCE to Alexander the Great, Persian art was soon replaced by the Parthian Era. This existed as a temporary stage between the First and Second Persian Empire and ended up spanning from about 247 BCE until 224 CE. This led to an uncomplimentary mix of Greek and Iranian motifs in the art that was created, with Greek culture dominating momentarily.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">However, after the death of Alexander the Great, Persian art fell fully under the influence of the Parthians, which helped resume the development of Persian art and architecture. The Parthians initially existed as semi-nomadic people, with the style of the artwork indicating the many different regions that had come into contact with them. Despite this diversity present in the sculptures and monuments, art from the Parthian Era retained some basics that were established in previous Achaemenid artworks.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1374"><noscript data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">&lt;img class="alignnone size-full wp-image-9589" src="https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art.jpg" alt="Architecture in Persian Art" width="848" height="565" srcset="https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-300x200.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-768x512.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-30x20.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-75x50.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-110x73.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-160x107.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-500x333.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-50x33.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-100x67.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-200x133.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-610x406.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-750x500.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Architecture in Persian Art" class="lazyload alignnone size-full wp-image-9589" data-dcnode-id="1384" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-300x200.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-768x512.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-30x20.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-75x50.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-110x73.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-160x107.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-500x333.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-50x33.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-100x67.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-200x133.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-610x406.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Architecture-in-Persian-Art-750x500.jpg 750w" height="565" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20565%22%3E%3C/svg%3E" width="848"><span data-dcnode-id="1375" style="font-size: 10pt;"><span data-dcnode-id="1383" instrument_node="">Parthian Temple of the Gareus, one of the most important temples in the ancient city of Warka, dating back to the Seleucid period;&nbsp;</span><em data-dcnode-id="1376"><a data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3A%25D9%2585%25D8%25B9%25D8%25A8%25D8%25AF_%25D9%2583%25D8%25A7%25D8%25B1%25D9%258A%25D9%2588%25D8%25B3_...%25D8%25A7%25D9%2588%25D8%25B1%25D9%2588%25D9%2583_...._%25D9%2585%25D8%25AF%25D9%258A%25D9%2586%25D8%25A9_%25D8%25A7%25D9%2584%25D9%2588%25D8%25B1%25D9%2583%25D8%25A7%25D8%25A1_..._%25D8%25A7%25D9%2584%25D9%2585%25D8%25AB%25D9%2586%25D9%2589.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1382" instrument_node="">Osama alqasab</span></a><span data-dcnode-id="1380" instrument_node="">, </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/4.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1379" instrument_node="">CC BY-SA 4.0</span></a><span data-dcnode-id="1377" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">The main characteristic found in art from the Parthian Era was an inevitable return to architecture and a frontality in art. Ancient Persian paintings and sculptures no longer featured images of people from their side profile only, as they were replaced with statuary images that confronted viewers head-on.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Parthian art and architecture were said to be greatly influenced by Hellenistic and Mesopotamian forms, which were drawn upon by these nomads to make art that was entirely their own. For example, the domes that were built took inspiration from stable Roman art but were expanded on by the Parthians. Roman domes were placed on top of structures, whereas Parthian domes were made to rise from the earth directly.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><blockquote data-dcnode-id="1362"><p data-dcnode-id="1363"><span data-dcnode-id="1364" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">The era of Parthian art eventually reached its peak as the Second Persian Empire, known as the Sassanid Empire, began. Despite existing as a momentary interlude between the two empires, the Parthian Era was incredibly influential to the development of Persian art, as it was continuously referred back to in order to create some of the most important monuments and works of art of the ancient world.</span></strong></span></p></blockquote><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1358" instrument_node="">
</span><h3 data-dcnode-id="1355"><span data-dcnode-id="1356" id="Sassanid_Era_c_226_650_CE"><span data-dcnode-id="1357" instrument_node="">Sassanid Era (c. 226 – 650 CE)</span></span></h3><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">The Second Persian Empire, known as the Sassanid Era, came into existence after the Parthian Era, roughly lasting between 226 CE until about 650 CE. This period of art was thought to be remarkable, as it managed to rebuild much of Persia’s power and culture that was lost before. The Sasanian Empire was established by Ardashir I (c. 224- 240 CE), a general for the Parthians, who managed to overthrow the last Parthian king and form his own dynasty.</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Once the Sassanid Era emerged, Ardashir I launched various building projects which have survived the length of time and exist as some of the best examples of Sasanian art today. Two important designs became architectural staples during this period, which were the dome and the minaret. However, what made these designs stand out was that Sasanians abandoned the frontality of sculptures embraced within the Parthian Era and returned to the profile and three-quarter view treatment commonly used in the Achaemenid Era.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1334"><noscript data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">&lt;img class="alignnone size-full wp-image-9580" src="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts.jpg" alt="Ancient Persian Arts" width="848" height="636" srcset="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-300x225.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-768x576.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-30x23.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-75x56.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-110x83.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-160x120.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-500x375.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-50x38.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-100x75.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-200x150.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-610x458.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-750x563.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Ancient Persian Arts" class="lazyload alignnone size-full wp-image-9580" data-dcnode-id="1345" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-300x225.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-768x576.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-30x23.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-75x56.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-110x83.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-160x120.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-500x375.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-50x38.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-100x75.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-200x150.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-610x458.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-750x563.jpg 750w" height="636" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20636%22%3E%3C/svg%3E" width="848"><b data-dcnode-id="1344"></b><span data-dcnode-id="1335" style="font-size: 10pt;"><span data-dcnode-id="1343" instrument_node="">Rock relief of the investiture scene of Sasanian king Bahram Ist at Bishapur (said Bishapur V), Iran, province of Fars;&nbsp;</span><em data-dcnode-id="1336"><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ABishapur_V_relief_Bahram_Ist.JPG" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1342" instrument_node="">Pentocelo</span></a><span data-dcnode-id="1340" instrument_node="">, </span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/3.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1339" instrument_node="">CC BY-SA 3.0</span></a><span data-dcnode-id="1337" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Sasanian art focused on decorative stone mosaics and created dishes typically made out of gold and silver that depicted animals and various hunting scenes. However, possibly the most striking Sasanian art to develop from this era were rock sculptures that were carved out of sharp limestone cliffs. These sculptures were etched out to illustrate the many victories of the various Sassanid leaders at that time.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">An important artistic craft that came out of the Second Persian Empire, which is still in use today, was carpet-making and silk-weaving. This skill led to the development of the iconic Persian carpets, which were exported to the West in what is now known as Istanbul and to the East to Turkey.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">The Sasanian Empire continued to draw on the knowledge and influences of previous artistic eras, as this period fully integrated techniques that worked in the past into their present style to be used and improved upon.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><blockquote data-dcnode-id="1319"><p data-dcnode-id="1320"><span data-dcnode-id="1321" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Thus, Sasanian art is easily considered to be the peak of Persian artistic effort, as it illustrated and emphasized the best aspects of the ancient Persian culture into the sculptures and artworks that were created.</span></strong></span></p></blockquote><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1312" instrument_node="">
</span><h2 data-dcnode-id="1309"><span data-dcnode-id="1310" id="Persian_Architecture"><span data-dcnode-id="1311" instrument_node="">Persian Architecture</span></span></h2><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">The architecture that developed during the era of Persian art was incredibly important, as it led the way to great developments which can still be seen today. Out of the various empires that ruled over Persia, the richest collection of architecture is said to be found in the ruins of the Persepolis, which was built during the Achaemenid Era. Persepolis was considered to be the capital of Iran during the First Persian Empire, with the subsequent empires attempting to emulate the type of architecture that was built.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1293"><noscript data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">&lt;img class="alignnone size-full wp-image-9582" src="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis.jpg" alt="Ancient Persian Arts Persepolis" width="848" height="440" srcset="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-300x156.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-768x398.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-30x16.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-75x39.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-110x57.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-160x83.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-500x259.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-50x26.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-100x52.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-200x104.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-610x317.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-750x389.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Ancient Persian Arts Persepolis" class="lazyload alignnone size-full wp-image-9582" data-dcnode-id="1302" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-300x156.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-768x398.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-30x16.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-75x39.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-110x57.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-160x83.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-500x259.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-50x26.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-100x52.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-200x104.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-610x317.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Arts-Persepolis-750x389.jpg 750w" height="440" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20440%22%3E%3C/svg%3E" width="848"><span data-dcnode-id="1294" style="font-size: 10pt;"><em data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Drawing of Persepolis</span></em><span data-dcnode-id="1299" instrument_node=""> (1713) by Gérard Jean-Baptiste;&nbsp;</span><em data-dcnode-id="1295"><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ADrawing_of_perspolis_1713_by_G%25C3%25A9rard_Jean-Baptiste_%281671-1716%29.JPG" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1298" instrument_node="">Bibliothèque nationale de France</span></a><span data-dcnode-id="1296" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">When considering the distinctive characteristics that came out of Persian architecture, the column exists as an important feature. Although formed after the Greek columns, Persian artists and sculptors added a unique twist to their columns, which made them distinctly their own. Persian columns were thinner, which elongated their sense of verticality, and had an unusual topmost section design, Termed the Persian animal capital, it greatly differed from Greek columns as it featured the front of an animal emerging from both sides of the column.</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Additionally, the column differed between the First and Second Persian Empire. Within the Achaemenid Empire, columns featured a post-and-beam support structure, while the Sassanid Empire made use of an arched support construction, inspired by the Romans.</span></p><span data-dcnode-id="1286" instrument_node="">
</span><blockquote data-dcnode-id="1281"><p data-dcnode-id="1282"><span data-dcnode-id="1283" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Despite the influences taken from both Greek and Roman sculpture, the architecture of Persia remains one of the most remarkable artistic advances due to its own cultural impact throughout the different eras.</span></strong></span></p></blockquote><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1274" instrument_node="">
</span><h2 data-dcnode-id="1271"><span data-dcnode-id="1272" id="Persian_Sculpture"><span data-dcnode-id="1273" instrument_node="">Persian Sculpture</span></span></h2><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">One of the most important artistic developments within Persian art was sculpture. Luckily, numerous Persian sculptures have managed to survive as time has gone on, mostly in the form of the stone reliefs that were carved onto the walls of palaces and on the faces of cliffs. The influences for sculptures varied greatly, with some remaining Persian sculpture pieces demonstrating a strong Mesopotamian influence, while others display strikingly classic European features.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1253"><noscript data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">&lt;img class="alignnone size-full wp-image-9576" src="https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture.jpg" alt="Persian Sculpture" width="848" height="621" srcset="https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-300x220.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-768x562.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-30x22.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-75x55.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-110x81.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-160x117.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-500x366.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-50x37.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-100x73.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-200x146.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-610x447.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-750x549.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Persian Sculpture" class="lazyload alignnone size-full wp-image-9576" data-dcnode-id="1264" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-300x220.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-768x562.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-30x22.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-75x55.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-110x81.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-160x117.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-500x366.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-50x37.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-100x73.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-200x146.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-610x447.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Sculpture-750x549.jpg 750w" height="621" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20621%22%3E%3C/svg%3E" width="848"><span data-dcnode-id="1254" style="font-size: 10pt;"><span data-dcnode-id="1263" instrument_node="">Alabaster statuette of a reclining nude woman from Iraq, Parthian period, 2nd century BCE to 2nd century CE. Pergamon Museum, Berlin, Germany;</span><em data-dcnode-id="1255"><span data-dcnode-id="1262" instrument_node="">&nbsp;</span><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AStatuette_of_a_reclining_nude_woman%2C_from_Iraq._Purchase._2nd_century_BCE_to_2nd_century_CE._Pergamon_Museum%2C_Berlin.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1261" instrument_node="">Osama Shukir Muhammed Amin FRCP(Glasg)</span></a><span data-dcnode-id="1259" instrument_node="">, </span><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/4.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1258" instrument_node="">CC BY-SA 4.0</span></a><span data-dcnode-id="1256" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Persian sculpture alternated between quite stylized and very realistic, with the features of a sculpture depending heavily on the culture of influence. Thus, two contrasting aesthetics made up the sculptures found within Persia, yet they were all universally considered to be uniquely Persian sculptures.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">In addition to stone sculptures, Persia was also responsible for the vast amount of metalwork sculptures that emerged from this era, despite very few of these sculptures surviving the passage of time. Common forms that were sculpted out of metal included statuettes, jewelry, and rhytons, which were goblets and pitchers that featured an animal type of design.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1240" instrument_node="">
</span><h2 data-dcnode-id="1237"><span data-dcnode-id="1238" id="Persia_Under_Islam"><span data-dcnode-id="1239" instrument_node="">Persia Under Islam</span></span></h2><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">After the fall of the Sassanid Era, Persia was invaded by Arabs and became part of Islam as a result. Due to this, Persian visual arts developed according to the newer Islamic rules, which meant a shift in the artmaking process. One of these rules banned the depiction of three-dimensional living things, which led to an instantaneous decline in the creation of Persian sculpture.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><blockquote data-dcnode-id="1228"><p data-dcnode-id="1229"><span data-dcnode-id="1230" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">This forced artists to adopt fine painting as their main artistic medium, with artworks becoming more decorative and flatter due to the influence of the Byzantine period.</span></strong></span></p></blockquote><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Despite the production of sculpture diminishing, decorative arts which included metalwork, weaving, and ceramics continued to thrive. This led to artists focusing on ornamentation pieces that were eventually used to adorn Islamic temples such as the Mosque of Baghdad (764 CE), the Great Mosque at Samarra (847 CE), and the Imam Reza shrine in Mashhad (1418).</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1223" instrument_node="">In addition to these decorations, mosaics were also widely used in mosques and in other buildings. Another popular style of Persian architecture, which continued in spite of Islamic rule, was creating colored roofs out of </span><a data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/shades-of-blue/" rel="noopener"><strong data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">blue</span></strong></a><span data-dcnode-id="1219" instrument_node="">, red, and green-hued ceramic tiles.</span></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1204"><noscript data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">&lt;img class="alignnone size-full wp-image-9588" src="https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture.jpg" alt="Persian Art in Architecture" width="848" height="565" srcset="https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-300x200.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-768x512.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-30x20.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-75x50.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-110x73.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-160x107.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-500x333.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-50x33.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-100x67.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-200x133.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-610x406.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-750x500.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Persian Art in Architecture" class="lazyload alignnone size-full wp-image-9588" data-dcnode-id="1214" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-300x200.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-768x512.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-30x20.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-75x50.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-110x73.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-160x107.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-500x333.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-50x33.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-100x67.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-200x133.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-610x406.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-in-Architecture-750x500.jpg 750w" height="565" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20565%22%3E%3C/svg%3E" width="848"><span data-dcnode-id="1205" style="font-size: 10pt;"><span data-dcnode-id="1213" instrument_node="">Great Mosque at Samarra with spiral minaret;&nbsp;</span><em data-dcnode-id="1206"><a data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3A%25D8%25B3%25D8%25A7%25D9%2585%25D8%25B1%25D8%25A7%25D8%25A1_Samarra-Wielki_Meczet_ze_spiralnym_minaretem_-_panoramio.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1212" instrument_node="">J.Merena</span></a><span data-dcnode-id="1210" instrument_node="">, </span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/3.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1209" instrument_node="">CC BY 3.0</span></a><span data-dcnode-id="1207" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1200" instrument_node="">
</span><h3 data-dcnode-id="1197"><span data-dcnode-id="1198" id="The_Rise_of_Illumination_and_Calligraphy"><span data-dcnode-id="1199" instrument_node="">The Rise of Illumination and Calligraphy</span></span></h3><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1195" instrument_node="">Due to the restriction placed on portraying three-dimensional living things, the creation of figure drawing and painting began to diminish. However, a popular </span><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/islamic-art/" rel="noopener"><strong data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Islamic art</span></strong></a><span data-dcnode-id="1191" instrument_node=""> form that soon replaced drawing was Illumination. Developed in Persia, Illumination referred to the decoration of manuscripts and religious texts, in particular the Koran.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Iranian illuminators remained active during the late Middle Ages and reached their peak during the Safavid Dynasty that occurred between 1501 and 1722. Alongside Illumination, the rise in the reproduction of religious works inspired and accelerated the development of ornamental writing, which went on to be known as calligraphy.</span></p><span data-dcnode-id="1186" instrument_node="">
</span><blockquote data-dcnode-id="1181"><p data-dcnode-id="1182"><span data-dcnode-id="1183" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Calligraphy existed alongside Illumination, with both forms of art eventually becoming known as Iranian art specialties.</span></strong></span></p></blockquote><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1177" instrument_node="">
</span><h3 data-dcnode-id="1174"><span data-dcnode-id="1175" id="The_Development_of_Painting"><span data-dcnode-id="1176" instrument_node="">The Development of Painting</span></span></h3><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Painting was considered to be an important form of art within Islamic Persia. The most important type of painting to emerge from this period of time was the Persian miniature paintings, which developed into a very significant art tradition in Iran.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1169" instrument_node="">The most important Persian miniature painter to emerge from this era was&nbsp;Kamāl ud-Dīn Behzād, whose artworks began to flourish towards the end of the 15</span><sup data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">th</span></sup><span data-dcnode-id="1166" instrument_node=""> century. Well-known for his </span><strong data-dcnode-id="1162"><a data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/famous-landscape-paintings/" rel="noopener"><span data-dcnode-id="1165" instrument_node="">landscape paintings</span></a><span data-dcnode-id="1163" instrument_node=""> </span></strong><span data-dcnode-id="1161" instrument_node="">which he executed in an incredibly realistic style with the use of a vibrant color palette, Behzād went on to become the head of the Herat Academy of Painting and Calligraphy.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1158" instrument_node="">Behzād was said to take inspiration from depictions such as mountain-scapes and hunting scenes, which became increasingly popular during the 13</span><sup data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">th</span></sup><span data-dcnode-id="1155" instrument_node=""> and 14</span><sup data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">th</span></sup><span data-dcnode-id="1152" instrument_node=""> centuries. After Behzād’s extremely realistic paintings were created, portrait art started to develop and become fashionable in multiple artistic cultures. However, from the late 1600s onwards, Iranian art traditions began to weaken slightly due to artists attempting to mimic European painting styles.</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1137"><noscript data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">&lt;img class="alignnone size-full wp-image-9581" src="https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings.jpg" alt="Persian Paintings" width="848" height="1370" srcset="https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-186x300.jpg 186w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-634x1024.jpg 634w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-768x1241.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-19x30.jpg 19w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-46x75.jpg 46w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-68x110.jpg 68w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-99x160.jpg 99w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-309x500.jpg 309w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-31x50.jpg 31w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-62x100.jpg 62w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-124x200.jpg 124w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-610x985.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-750x1212.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Persian Paintings" class="lazyload alignnone size-full wp-image-9581" data-dcnode-id="1147" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-186x300.jpg 186w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-634x1024.jpg 634w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-768x1241.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-19x30.jpg 19w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-46x75.jpg 46w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-68x110.jpg 68w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-99x160.jpg 99w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-309x500.jpg 309w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-31x50.jpg 31w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-62x100.jpg 62w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-124x200.jpg 124w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-610x985.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Paintings-750x1212.jpg 750w" height="1370" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201370%22%3E%3C/svg%3E" width="848"><span data-dcnode-id="1138" style="font-size: 10pt;"><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Destroying the Survivors of Kipchak Corps</span></em><span data-dcnode-id="1144" instrument_node=""> (before the 1480s) by Kamāl ud-Dīn Behzād;</span><em data-dcnode-id="1139"><span data-dcnode-id="1143" instrument_node="">&nbsp;</span><a data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ADestruction_of_the_remnant_of_the_Kipchak_Army_%28right%29.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1142" instrument_node="">فارسی: کمال‌الدین بهزاد English: Bihzād</span></a><span data-dcnode-id="1140" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1130" instrument_node="">
</span><h2 data-dcnode-id="1127"><span data-dcnode-id="1128" id="Famous_Persian_Artists_and_Their_Artworks"><span data-dcnode-id="1129" instrument_node="">Famous Persian Artists and Their Artworks</span></span></h2><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">As Persian art existed as one of the oldest art forms to date, not many of the original artworks, sculptures, and textiles are still in existence today. Despite this, some iconic pieces are still spoken about and have managed to be preserved. Below, we discuss three important artworks to come from Iranian art.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1120" instrument_node="">
</span><h3 data-dcnode-id="1117"><span data-dcnode-id="1118" id="The_Oxus_Treasure_c_1877_CE"><span data-dcnode-id="1119" instrument_node="">The Oxus Treasure (c. 1877 CE)</span></span></h3><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">The Achaemenid Empire was thought to have created one of the most iconic Persian sculpture collections to come from that time period, known as the Oxus Treasure. Within this hoard, which was discovered around 1877 CE and buried along the north bank of the Oxus River, contained magnificently crafted works including bowls, figurines, coins, statuettes, jewelry, jugs, and plaques of gold.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">An important Persian sculpture found within the Oxus Treasure was the Gold Chariot, thought to be made between 600 and 400 BCE. The sculpture, which was entirely constructed from gold, featured a chariot that is open at the back and being drawn by four horses. Thought to come from the region of Takhi-Kuwad, Tajikistan, the Gold Chariot was influenced by the monumental style of gold and silver artworks made famous during the Achaemenid period.</span></p><span data-dcnode-id="1110" instrument_node="">
