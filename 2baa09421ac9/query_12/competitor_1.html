</span><p data-dcnode-id="1106"><noscript data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">&lt;img class="alignnone size-full wp-image-9578" src="https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture.jpg" alt="Famous Persian Sculpture" width="848" height="706" srcset="https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-300x250.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-768x639.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-30x25.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-75x62.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-110x92.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-160x133.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-500x416.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-50x42.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-100x83.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-200x167.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-610x508.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-750x624.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Famous Persian Sculpture" class="lazyload alignnone size-full wp-image-9578" data-dcnode-id="1107" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-300x250.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-768x639.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-30x25.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-75x62.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-110x92.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-160x133.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-500x416.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-50x42.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-100x83.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-200x167.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-610x508.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Famous-Persian-Sculpture-750x624.jpg 750w" height="706" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20706%22%3E%3C/svg%3E" width="848"></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" style="font-size: 10pt;"><span data-dcnode-id="1104" instrument_node="">Model chariot made of gold from the Oxus Treasure in the British Museum, 5th-4th century BC;&nbsp;</span><em data-dcnode-id="1097"><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ABritishmuseumoxustreasuregoldchariotmodel.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1103" instrument_node="">British Museum</span></a><span data-dcnode-id="1101" instrument_node="">, </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/3.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1100" instrument_node="">CC BY-SA 3.0</span></a><span data-dcnode-id="1098" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">The small horses appear to be pony-sized and have the appearance of ram-headed Nesaens, while the two figures driving the chariot are thought to be depictions of humans. Unfortunately, due to the vast period of time that passed since its burial, only nine of the horses’ legs have survived and the spokes in one of the wheels remain damaged.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Although the authenticity of this treasure has been contested many times throughout history, the general scholarly consensus remains that the artworks within the Oxus Treasure are genuine artifacts from the Achaemenid period.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><blockquote data-dcnode-id="1083"><p data-dcnode-id="1084"><span data-dcnode-id="1085" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">It has also been theorized that the pieces were probably taken from a nearby temple and buried during one of the many tumultuous intervals of the region to keep safe.</span></strong></span></p></blockquote><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1079" instrument_node="">
</span><h3 class="LC20lb DKV0Md" data-dcnode-id="1076"><span data-dcnode-id="1077" id="Kamal_ud-Din_Behzad_1455_1535"><span data-dcnode-id="1078" instrument_node="">Kamāl ud-Dīn Behzād (1455 – 1535)</span></span></h3><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">An artist who created one of the most prominent Persia paintings throughout the region’s history was Kamāl ud-Dīn Behzād, who was alive between 1455 and 1535. Behzād was in charge of the royal workshops in Herat and Tabriz throughout the late Timurid and early Safavid Persian eras.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1071" instrument_node="">Behzād was regarding as an important influence within the development of Islamic miniature painting, which went on to be considered a great Persian tradition. One of his well-known miniature portraits, which he painted in 1500, was his </span><em data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Portrait of a Dervish</span></em><span data-dcnode-id="1068" instrument_node="">, which displays the intricate detail that he included within his paintings.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Behzād went on to become a prominent director at the Herat Academy and was very revered for his position in the Royal Library in Herat. What made Behzād’s miniature paintings so unique were the common geometric aspects that he included, which he balanced with the inclusion of his own style. Behzād was renowned in his lifetime for his role as a painter, with his artworks receiving much acclaim.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1050"><noscript data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">&lt;img class="alignnone size-full wp-image-9579" src="https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings.jpg" alt="Persia Paintings" width="848" height="1293" srcset="https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-197x300.jpg 197w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-672x1024.jpg 672w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-768x1171.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-49x75.jpg 49w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-72x110.jpg 72w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-105x160.jpg 105w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-328x500.jpg 328w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-33x50.jpg 33w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-66x100.jpg 66w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-131x200.jpg 131w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-610x930.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-750x1144.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Persia Paintings" class="lazyload alignnone size-full wp-image-9579" data-dcnode-id="1060" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-197x300.jpg 197w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-672x1024.jpg 672w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-768x1171.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-49x75.jpg 49w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-72x110.jpg 72w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-105x160.jpg 105w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-328x500.jpg 328w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-33x50.jpg 33w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-66x100.jpg 66w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-131x200.jpg 131w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-610x930.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Persia-Paintings-750x1144.jpg 750w" height="1293" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201293%22%3E%3C/svg%3E" width="848"><span data-dcnode-id="1051" style="font-size: 10pt;"><em data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Portrait of a Dervish&nbsp;</span></em><span data-dcnode-id="1057" instrument_node="">(c. 1500) by Kamāl ud-Dīn Behzād;</span><em data-dcnode-id="1052"><span data-dcnode-id="1056" instrument_node="">&nbsp;</span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ABehzad_portrait_of_a_dervish.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1055" instrument_node="">Behzād</span></a><span data-dcnode-id="1053" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1046" instrument_node="">
</span><h3 data-dcnode-id="1043"><span data-dcnode-id="1044" id="Reza_Abbasi_c_1565_1635"><span data-dcnode-id="1045" instrument_node="">Reza Abbasi (c. 1565 – 1635)</span></span></h3><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Another important Persian miniaturist was Reza Abbasi, who was considered the leading miniaturist of the Isfahan School during the later years of the Safavid period. Abbasi, who was alive between approximately 1565 and 1635, was considered to be one of the last impressive masters of Persian miniatures.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1038" instrument_node="">Abbasi was best known for his depiction of beautiful youths, as demonstrated in his painting titled </span><em data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Youth Reading</span></em><span data-dcnode-id="1035" instrument_node="">, which was painted between 1625 and 1626. Within this painting, Abbasi demonstrated his infamous brushwork technique that can be seen in all his other Ancient Persia paintings. This delicate technique subsequently aided in the portrayal of a gentle beauty that was present in all his portraits.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1021"><noscript data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">&lt;img class="alignnone size-full wp-image-9587" src="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings.jpg" alt="Ancient Persian Paintings" width="848" height="1340" srcset="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-190x300.jpg 190w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-648x1024.jpg 648w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-768x1214.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-19x30.jpg 19w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-47x75.jpg 47w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-70x110.jpg 70w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-101x160.jpg 101w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-316x500.jpg 316w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-32x50.jpg 32w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-63x100.jpg 63w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-127x200.jpg 127w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-610x964.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-750x1185.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Ancient Persian Paintings" class="lazyload alignnone size-full wp-image-9587" data-dcnode-id="1030" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-190x300.jpg 190w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-648x1024.jpg 648w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-768x1214.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-19x30.jpg 19w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-47x75.jpg 47w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-70x110.jpg 70w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-101x160.jpg 101w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-316x500.jpg 316w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-32x50.jpg 32w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-63x100.jpg 63w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-127x200.jpg 127w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-610x964.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Ancient-Persian-Paintings-750x1185.jpg 750w" height="1340" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201340%22%3E%3C/svg%3E" width="848"><span data-dcnode-id="1022" style="font-size: 10pt;"><em data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Youth Reading</span></em><span data-dcnode-id="1027" instrument_node=""> (1625-1626) by Reza Abbasi;&nbsp;</span><em data-dcnode-id="1023"><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARiza-yi-Abbasi_008.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1026" instrument_node="">Reza Abbasi</span></a><span data-dcnode-id="1024" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1014" instrument_node="">
</span><h2 data-dcnode-id="1011"><span data-dcnode-id="1012" id="The_Emergence_of_Persian_Carpets"><span data-dcnode-id="1013" instrument_node="">The Emergence of Persian Carpets</span></span></h2><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Carpet weaving is considered to be an essential part of Persian culture, in addition to being a significant Persian art form that still exists today. Due to their elaborateness, Persian carpets easily stand out due to their variety and the intricacy of the designs used. Although the term “Persian carpet” is most often used to refer to pile-woven textiles, carpets that are flat-woven like a Kilim and Soumak, as well as embroidered fabrics like Suzani, are also considered to fall part of the rich history of Persian weaving.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Persian carpets and rugs were traditionally woven by nomadic tribes in either village or town workshops as well as royal court manufacturers. Due to this, the carpets created represented different yet concurrent lines of tradition and typically reflected the history of Iran and its people within the patterns and designs chosen.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><blockquote data-dcnode-id="999"><p data-dcnode-id="1000"><span data-dcnode-id="1001" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Within the 16th century, carpets woven by the Safavid court manufacturers of Isfahan were renowned for the elaborate colors and artistic designs used, making them treasured pieces in museum collections all over the world today.</span></strong></span></p></blockquote><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">These notable elements set out an aesthetic custom for court manufactories to follow when weaving carpets. These traditions were kept alive throughout the entire period of the Persian Empire and lasted as far as the existence of the very last royal dynasty of Iran. An example of one of these exceptional Safavid carpets, now housed in Copenhagen, Denmark, is the Coronation Carpet that was woven during the 17</span><sup data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">th</span></sup><span data-dcnode-id="994" instrument_node=""> century.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="982"><noscript data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">&lt;img class="alignnone size-full wp-image-9584" src="https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art.jpg" alt="Iranian Art" width="848" height="626" srcset="https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-300x221.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-768x567.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-30x22.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-75x55.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-110x81.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-160x118.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-500x369.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-50x37.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-100x74.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-200x148.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-610x450.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-750x554.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Iranian Art" class="lazyload alignnone size-full wp-image-9584" data-dcnode-id="989" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-300x221.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-768x567.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-30x22.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-75x55.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-110x81.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-160x118.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-500x369.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-50x37.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-100x74.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-200x148.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-610x450.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Iranian-Art-750x554.jpg 750w" height="626" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20626%22%3E%3C/svg%3E" width="848"><span data-dcnode-id="983" style="font-size: 10pt;"><span data-dcnode-id="988" instrument_node="">Persian family in Tehran (c. 1890-1910);&nbsp;</span><em data-dcnode-id="984"><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3A41197u.tif" rel="nofollow noopener" target="_blank"><span data-dcnode-id="987" instrument_node="">Photoglob Co.</span></a><span data-dcnode-id="985" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Carpets that were woven in important Iranian towns, such as Kashan, Mashhad, Kerman, and Isfahan, were all characterized by precise weaving techniques and the use of distinct colors, patterns, and superior materials. Some conventional characteristics of Persian carpets included the use of fine wool, vivid and elaborate colors, and specified, traditional patterns, with carpets woven today still capturing the importance of these elements.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="977" instrument_node="">The art and craft of carpet weaving suffered during times of political unrest and under the control of commercial demands. In particular, Persian carpet weaving suffered greatly from the introduction of synthetic dyes during the second half of the 19</span><sup data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">th</span></sup><span data-dcnode-id="974" instrument_node=""> century.</span></p><span data-dcnode-id="972" instrument_node="">
</span><blockquote data-dcnode-id="967"><p data-dcnode-id="968"><span data-dcnode-id="969" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">However, carpet weaving has slowly been brought back into modern Iran, with towns such as Tabriz playing a significant historical role in restoring this tradition of carpet weaving after many years of decline.</span></strong></span></p></blockquote><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">This form of ancient Persian arts has been reinvented in the modern era, with the revival of traditional and natural dyes, in addition to the reintroduction of tribal patterns and contemporary, inventive designs. Today, Persian carpets are considered to be objects of great artistic and functional value, just as they were in the past.</span></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Throughout its history, Persia remained famous for the textiles that were produced, with traditional Persian carpets going on to become one of the most well-known art forms still in existence today. In 2010, the traditional skills of carpet weaving originating from the Fars and Kashan regions in Iran were registered into the UNESCO Intangible Cultural Heritage Lists.</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="950"><noscript data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">&lt;img class="alignnone size-full wp-image-9586" src="https://artincontext.org/wp-content/uploads/2021/05/Persian-Art.jpg" alt="Persian Art" width="848" height="565" srcset="https://artincontext.org/wp-content/uploads/2021/05/Persian-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-300x200.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-768x512.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-30x20.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-75x50.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-110x73.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-160x107.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-500x333.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-50x33.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-100x67.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-200x133.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-610x406.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-750x500.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Persian Art" class="lazyload alignnone size-full wp-image-9586" data-dcnode-id="957" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/05/Persian-Art.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/05/Persian-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-300x200.jpg 300w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-768x512.jpg 768w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-30x20.jpg 30w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-75x50.jpg 75w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-110x73.jpg 110w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-160x107.jpg 160w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-500x333.jpg 500w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-50x33.jpg 50w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-100x67.jpg 100w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-200x133.jpg 200w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-610x406.jpg 610w, https://artincontext.org/wp-content/uploads/2021/05/Persian-Art-750x500.jpg 750w" height="565" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20565%22%3E%3C/svg%3E" width="848"><span data-dcnode-id="951" style="font-size: 10pt;"><span data-dcnode-id="956" instrument_node="">Northwest Persian 18th-century carpet with Harshang or crab design;&nbsp;</span><em data-dcnode-id="952"><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ANorthwest_Persian_Harshang_Carpet.JPG" rel="nofollow noopener" target="_blank"><span data-dcnode-id="955" instrument_node="">Hali magazine</span></a><span data-dcnode-id="953" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">&nbsp;</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">&nbsp;</span></p><span data-dcnode-id="943" instrument_node="">
</span><h2 data-dcnode-id="940"><span data-dcnode-id="941" id="The_Legacy_of_Ancient_Persian_Arts"><span data-dcnode-id="942" instrument_node="">The Legacy of Ancient Persian Arts</span></span></h2><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="938" instrument_node="">The fall of the Sasanian Empire in 651 CE led to the rise of Islam within Iran during the 7</span><sup data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">th</span></sup><span data-dcnode-id="935" instrument_node=""> century CE, with this remaining the dominant religion today. Due to this, some ancient Persian religions have sadly been suppressed as time has gone on, such as the religion of Zoroastrianism. Additionally, certain Persian traditions and cultures were forced out of the way in an effort to securely establish an Islamic-Arabian worldview in the developing Iran.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Despite this, aspects of Persian art and architecture managed to withstand this period of great upheaval in the country, as some of these elements went on to later influence and direct the development of Islamic-Arabian artworks. Today, Iranian art still borrows heavily from past traditions that were popular during the Persian Empires, with certain aspects surfacing in various artworks that are made. An example of artistic creation that has withstood the test of time is the weaving of traditional Persian carpets.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">&nbsp;</span></p><span data-dcnode-id="927" instrument_node="">
</span><div class="jeg_video_container jeg_video_content" data-dcnode-id="925"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="926" frameborder="0" height="281" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yN4F25Of3E4%3Ffeature%3Doembed&amp;raw" title="The Persian Empire Explained in 9 Minutes" width="500"></iframe></div><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">&nbsp;</span></p><span data-dcnode-id="921" instrument_node="">
</span><blockquote data-dcnode-id="916"><p data-dcnode-id="917"><span data-dcnode-id="918" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Ancient Persian arts have a rich history, as the era has been through many periods of growth and change. Persian art and architecture have continued to maintain a powerful influence on the present-day art world. Most of the traditional artworks made typically celebrate customs of the past through using elements that worked well and improving upon them. Certain artists have even continued to work with the same materials as their ancestors did, with rugs, statues, ceramics, and textiles continuing to be among the most popular art mediums today.</span></strong></span></p></blockquote><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">&nbsp;</span></p><span data-dcnode-id="912" instrument_node="">
