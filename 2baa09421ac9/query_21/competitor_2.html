</span><h1 class="entry-title" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Beautiful Examples of Communion Scriptures in the Bible</span></h1></header><span data-dcnode-id="1592" instrument_node="">
</span><div class="entry-content single-content" data-dcnode-id="1203"><span data-dcnode-id="1591" instrument_node="">
</span><p class="has-small-font-size" data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">What’s inside: Beautiful Examples of Communion Scriptures in the Bible.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1582"><figure class="alignleft size-large is-resized" data-dcnode-id="1583"><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible.jpg"><img alt="Beautiful Examples of Communion Scriptures in the Bible" class="wp-image-24264 lazyloaded" data-dcnode-id="1587" data-ll-status="loaded" height="538" sizes="(max-width: 359px) 100vw, 359px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible.jpg&amp;raw" srcset="https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible.jpg 400w, https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible-200x300.jpg 200w, https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible-600x900.jpg 600w, https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible-50x75.jpg 50w, https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible-33x50.jpg 33w, https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible-100x150.jpg 100w, https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible-67x100.jpg 67w" width="359"><noscript data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">&lt;img src="https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible.jpg" alt="Beautiful Examples of Communion Scriptures in the Bible" class="wp-image-24264" width="359" height="538" srcset="https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible.jpg 400w, https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible-200x300.jpg 200w, https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible-600x900.jpg 600w, https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible-50x75.jpg 50w, https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible-33x50.jpg 33w, https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible-100x150.jpg 100w, https://heycreativesister.com/wp-content/uploads/2021/04/Communion-Scriptures-in-the-Bible-67x100.jpg 67w" sizes="(max-width: 359px) 100vw, 359px" /&gt;</span></noscript></a></figure></div><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1575"><strong data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Hebrews 9:26</span></strong><span data-dcnode-id="1578" instrument_node=""> </span><em data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">He has appeared once for all at the culmination of the ages to do away with sin by the sacrifice of himself. </span></em></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Communion is the remembrance that Jesus Christ poured his blood and sacrificed his body for us to be forgiven. The word of God teaches us about the importance of fellowship with God through Holy Communion. </span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Our participation in the Lord’s Supper allows us to be fulfilled spiritually. Upon Calvary. </span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1567" instrument_node="">The new covenant began and the old covenant was fulfilled.</span><strong data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node=""> </span></strong><span data-dcnode-id="1564" instrument_node="">He emptied himself so that we may become full. He gave his life so that we could have life.  He did this so we may be forgiven.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Jesus Christ’s crucifixion was the hinge upon which everything in the world changed. Nothing, not even the World Wars, can supersede the weight of its impact.  No liberty in the name of human governments exceeds the victory that was brought by Jesus and his sacrifice.  </span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">In the Old Testament, the followers of the law would have to follow meticulous rules to be clean according to the law.  Now, we have a Savior who fulfilled all of those rules.  Because Jesus was the fulfillment of the final sacrifice, we no longer have to continue to offer sacrifices.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p class="has-text-align-center has-theme-palette-1-background-color has-background" data-dcnode-id="1553"><strong data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">God desires for you and me is to understand the real meaning behind communion, so you may have it written in your heart and not take it flippantly as a traditional practice.</span></strong></p><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Here’s the back story…</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">The Israelites practiced different kinds of blood sacrifices to be forgiven.  The gravity in disobeying the law includes death as a penalty of one’s sins. An example of this was Uzzah, who was struck dead by for disobeying the command of God to not touch the Ark of the Covenant. (2 Samuel 6). Another example was the account of Sodom and Gomorrah where many people were destroyed after living in blatant sin.  (Genesis 18-19). </span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1545" instrument_node="">It also wasn’t easy to directly talk to God, in Leviticus&nbsp; 8:1-4, it expounds the need of a priest as a mediator. Under the new covenant, Jesus Christ himself became our only mediator. 1 Timothy 2:5 says, </span><em data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">“For there is one God, and one mediator between God and men, the man Christ Jesus.”&nbsp;</span></em></p><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">These occurrences were not written in the bible for people to merely fear the consequences of sin.   These events were to help us understand that Jesus Christ ushered in a new blood covenant of grace.  Only the blood of Jesus can give us salvation – there is no other sacrifice will be necessary. It is meant to remind us of His unconditional love. The least thing that God wants is for us to be afraid and hesitant to enter to His presence. He never desires His people to feel a worldly sorrow. It is important to understand that the remembrance of the cross does not condemn us.  Communion helps us foster gratitude and to have awe for Him who poured out his love for us.   </span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">As Christians, communion helps us be resolute in our conviction to follow Jesus.  It also strengthens our faith as we ponder that Christ died for sins once for all. </span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1534" instrument_node="">Communion reminds us of God’s love, how he has given his one and only Son, and how Christ died for us (Romans 5:8). When life gets hard, </span><strong data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">we can always look back to the cross and refocus on the depth of His love</span></strong><span data-dcnode-id="1531" instrument_node="">. </span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">God desires for you and me is to understand the real meaning behind communion, so you may have it written in your heart and not take it flippantly as a traditional practice.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1525"></p><span data-dcnode-id="1524" instrument_node="">
</span><p class="has-text-align-center has-small-font-size" data-dcnode-id="1517"><em data-dcnode-id="1518"><span data-dcnode-id="1523" instrument_node="">Related:  Learn more about </span><strong data-dcnode-id="1520"><a data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//heycreativesister.com/%3Fs%3Dcommunion"><span data-dcnode-id="1522" instrument_node="">Communion</span></a></strong><span data-dcnode-id="1519" instrument_node=""> here</span></em></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1515"></p><span data-dcnode-id="1514" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1508"><figure class="aligncenter size-full" data-dcnode-id="1509"><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onethingcommunity.com/"><img alt="Join the One Thing Community" class="wp-image-24786 error" data-dcnode-id="1513" data-lazy-sizes="(max-width: 728px) 100vw, 728px" data-lazy-src="https://heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp.png" data-lazy-srcset="https://heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp.png 728w, https://heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp-300x37.png 300w, https://heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp-50x6.png 50w, https://heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp-404x50.png 404w, https://heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp-100x12.png 100w, https://heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp-640x79.png 640w" data-ll-status="error" height="90" sizes="(max-width: 728px) 100vw, 728px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp.png&amp;raw" srcset="https://heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp.png 728w, https://heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp-300x37.png 300w, https://heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp-50x6.png 50w, https://heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp-404x50.png 404w, https://heycreativesister.com/wp-content/uploads/2021/07/Blank-Dark-728x90-layout246-1gfaivp-100x12.png 100w, https://heycreativesister.com/wp-content </span><h2 data-dcnode-id="1488" id="communion-verses"><span data-dcnode-id="1489" instrument_node="">Communion Verses </span></h2><span data-dcnode-id="1487" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1482"><figure class="alignleft size-large is-resized" data-dcnode-id="1483"><img alt="Beautiful Examples of Communion Scriptures in the Bible" class="wp-image-24265 lazyloaded" data-dcnode-id="1486" data-ll-status="loaded" height="414" sizes="(max-width: 414px) 100vw, 414px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion.jpg&amp;raw" srcset="https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion.jpg 350w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-300x300.jpg 300w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-150x150.jpg 150w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-600x600.jpg 600w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-50x50.jpg 50w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-100x100.jpg 100w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-640x640.jpg 640w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-960x960.jpg 960w" width="414"><noscript data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">&lt;img src="https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion.jpg" alt="Beautiful Examples of Communion Scriptures in the Bible" class="wp-image-24265" width="414" height="414" srcset="https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion.jpg 350w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-300x300.jpg 300w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-150x150.jpg 150w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-600x600.jpg 600w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-50x50.jpg 50w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-100x100.jpg 100w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-640x640.jpg 640w, https://heycreativesister.com/wp-content/uploads/2021/04/Scriptures-about-Communion-960x960.jpg 960w" sizes="(max-width: 414px) 100vw, 414px" /&gt;</span></noscript></figure></div><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">How can we, as the Christian church, partake of the Lord’s supper biblically?  </span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Paul, writing by inspiration of the Holy Ghost, shared with the body of Christ how Communion should be taken. </span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Here are some helpful communion verses and scriptures on communion to contemplate on.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1465"><p data-dcnode-id="1466"><strong data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">1 Corinthians 11:23-30</span></strong><span data-dcnode-id="1469" instrument_node=""> </span><em data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">For I have received of the Lord that which also I delivered unto you, that the Lord Jesus the same night in which he was betrayed took bread: And when he had given thanks, he brake it, and said, Take, eat: this is my body, which is broken for you: this do in remembrance of me. After the same manner also he took the cup, when he had supped, saying, this cup is the new testament in my blood: this do ye, as oft as ye drink it, in remembrance of me. For as often as ye eat this bread, and drink this cup, ye do shew the Lord’s death till he come. Wherefore whosoever shall eat this bread, and drink this cup of the Lord, unworthily, shall be guilty of the body and blood of the Lord. 28 But let a man examine himself, and so let him eat of that bread, and drink of that cup. For he that eateth and drinketh unworthily, eateth and drinketh damnation to himself, not discerning the Lord’s body. For this cause many are weak and sickly among you, and many sleep.</span></em></p></blockquote><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">This specific communion verse reminds us to receive the Lord, remember the new covenant and give thanks. Paul the Apostle called the disciples to eat together and celebrate the recognition of Israelite’s deliverance from Egypt. The bread and the wine serves as a physical remembrance of Jesus Christ’s body and blood that confirmed a new relationship with God.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1455"><p data-dcnode-id="1456"><strong data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">1 Corinthians 10:16-18 </span></strong><em data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">The cup of blessing which we bless, is it not the communion of the blood of Christ? The bread which we break, is it not the communion of the body of Christ? For we being many are one bread, and one body: for we are all partakers of that one bread. Behold Israel after the flesh: are not they which eat of the sacrifices partakers of the altar?</span></em></p></blockquote><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Communion is a symbol for the unity and solidarity of the people of God. This specific verse emphasized the significance of the Church to partake communion together as a body, making only Jesus Christ as our head and source of connectedness.</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Here are some additional verses that can serve as a reminder from God to all of us about the Lord’s supper.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1442"><p data-dcnode-id="1443"><strong data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">1 John 1:7</span></strong><em data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node=""> But if we walk in the light, as he is in the light, we have fellowship one with another, and the blood of Jesus Christ his Son cleanseth us from all sin.</span></em></p></blockquote><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">John recalls that the church is&nbsp; a real community with genuine relationships with one another. Thus, it is essential for someone to not take communion alone.&nbsp; Upon reflection on the cross, it is important to recognize that Jesus is the only one who can purify us from all of our sins, and this is the main reason why we are eligible to receive light, for he is the only authentic light.&nbsp;</span></p><span data-dcnode-id="1438" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1431"><p data-dcnode-id="1432"><strong data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Hebrews 10:25</span></strong><span data-dcnode-id="1435" instrument_node=""> </span><em data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Not forsaking the assembling of ourselves together, as the manner of some is; but exhorting one another: and so much the more, as ye see the day approaching.</span></em></p></blockquote><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">God requires us to have fellowship with one another and encourage one another. This is often forgotten in the world wherein “alone time” is a norm. But in the church, no man is an island and everyone is supposed to lift each other up using the scriptures. By this, Christians can grow in faith together.&nbsp;</span></p><span data-dcnode-id="1427" instrument_node="">

</span><p data-dcnode-id="1258"></p><span data-dcnode-id="1257" instrument_node="">
</span><h2 data-dcnode-id="1255" id="scriptures-about-communion-in-historical-context"><span data-dcnode-id="1256" instrument_node="">Scriptures about Communion in Historical Context&nbsp;</span></h2><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Here are the Scriptures about Communion in contextual history found in the gospel and the accounts of Jesus.&nbsp;</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">The following Scripture compilations give different Gospel perspectives of Mark, Matthew and John during the Passover Meal. Prior to Jesus’ crucifixion, the Messiah introduced a new celebration of breaking of bread and drinking of wine. </span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">The Passover was important because Jesus revealed his final sacrifice to the apostles fulfilling him becoming the Lamb of God. The purpose of the communion ceremony, also known as the eucharist, is to help us see the need of a savior. </span></p><span data-dcnode-id="1245" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1238"><p data-dcnode-id="1239"><strong data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Matthew 26:26-30</span></strong><span data-dcnode-id="1242" instrument_node=""> </span><em data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">And as they were eating, Jesus took bread, and blessed it, and brake it, and gave it to the disciples, and said, Take, eat; this is my body. And he took the cup, and gave thanks, and gave it to them, saying, Drink ye all of it; For this is my blood of the new testament, which is shed for many for the remission of sins. But I say unto you, I will not drink henceforth of this fruit of the vine, until that day when I drink it new with you in my Father’s kingdom. And when they had sung an hymn, they went out into the mount of Olives.</span></em></p></blockquote><span data-dcnode-id="1237" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1231"><p data-dcnode-id="1232"><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Mark 14:22-26 </span></strong><em data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">And as they did eat, Jesus took bread, and blessed, and brake it, and gave to them, and said, Take, eat: this is my body. And he took the cup, and when he had given thanks, he gave it to them: and they all drank of it. And he said unto them, This is my blood of the new testament, which is shed for many. Verily I say unto you, I will drink no more of the fruit of the vine, until that day that I drink it new in the kingdom of God. And when they had sung an hymn, they went out into the mount of Olives.</span></em></p></blockquote><span data-dcnode-id="1230" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1223"><p data-dcnode-id="1224"><strong data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Luke 22:14-20</span></strong><span data-dcnode-id="1227" instrument_node=""> </span><em data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">And when the hour was come, he sat down, and the twelve apostles with him. And he said unto them, With desire I have desired to eat this passover with you before I suffer: For I say unto you, I will not any more eat thereof, until it be fulfilled in the kingdom of God. And he took the cup, and gave thanks, and said, Take this, and divide it among yourselves: For I say unto you, I will not drink of the fruit of the vine, until the kingdom of God shall come. 19 And he took bread, and gave thanks, and brake it, and gave unto them, saying, This is my body which is given for you: this do in remembrance of me. Likewise also the cup after supper, saying, This cup is the new testament in my blood, which is shed for you.</span></em></p></blockquote><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1221" instrument_node="">The </span><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newtimes.co.rw/section/read/210413%23%3A~%3Atext%3DAccording%2520to%2520the%2520bible%252C%2520Christians%2Cand%2520poured%2520at%2520the%2520cross.%26text%3DThe%2520Holy%2520Communion%2520also%2520reminds%2Call%2520humankind%2520into%2520his%2520embrace." rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Lord’s supper</span></strong></a><span data-dcnode-id="1217" instrument_node=""> is a wonderful celebration of our Lord’s life, death, burial and resurrection. May these communion Scriptures renew your heart to celebrate communion in a profoundly deep way.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Have a fruitful and amazing communion with God, sweet sisters!</span></p><span data-dcnode-id="1212" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1205"><figure class="aligncenter size-large is-resized" data-dcnode-id="1206"><img alt="Let's create something beautiful together!" class="wp-image-18635" data-dcnode-id="1211" data-lazy-sizes="(max-width: 355px) 100vw, 355px" data-lazy-src="https://heycreativesister.com/wp-content/uploads/2017/06/92571893_566271310914224_21420264625537024_n.jpg" data-lazy-srcset="https://heycreativesister.com/wp-content/uploads/2017/06/92571893_566271310914224_21420264625537024_n.jpg 960w, https://heycreativesister.com/wp-content/uploads/2017/06/92571893_566271310914224_21420264625537024_n-300x300.jpg 300w, https://heycreativesister.com/wp-content/uploads/2017/06/92571893_566271310914224_21420264625537024_n-150x150.jpg 150w, https://heycreativesister.com/wp-content/uploads/2017/06/92571893_566271310914224_21420264625537024_n-768x768.jpg 768w, https://heycreativesister.com/wp-content/uploads/2017/06/92571893_566271310914224_21420264625537024_n-400x400.jpg 400w, https://heycreativesister.com/wp-content/uploads/2017/06/92571893_566271310914224_21420264625537024_n-125x125.jpg 125w, https://heycreativesister.com/wp-content/uploads/2017/06/92571893_566271310914224_21420264625537024_n-200x200.jpg 200w, https://heycreativesister.com/wp-content/uploads/2017/06/92571893_566271310914224_21420264625537024_n-320x320.jpg 320w, https://heycreativesister.com/wp-content/uploads/2017/06/92571893_566271310914224_21420264625537024_n-480x480.jpg 480w, https://heycreativesister.com/wp-content/uploads/2017/06/92571893_566271310914224_21420264625537024_n-720x720.jpg 720w, https://heycreativesister.com/wp-content/uploads/2017/06/92571893_566271310914224_21420264625537024_n-735x735.jpg 735w" height="355" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20355%20355'%3E%3C/svg%3E" width="355"><noscript data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">&lt;img src="https://heycreativesister.com/wp-content/
