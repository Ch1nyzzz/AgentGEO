</span><span data-dcnode-id="881" instrument_node="">
</span></div><span data-dcnode-id="878" instrument_node="">
</span><header class="entry-header" data-dcnode-id="877"></header><span data-dcnode-id="876" instrument_node="">
</span><div class="entry-content" data-dcnode-id="613"><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">“Now these Jews were more noble than those in Thessalonica; they received the word with all eagerness, examining the Scriptures daily to see if these things were so.” – Acts 17:11</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Paul and Silas escaped Thessalonica at night and went to Berea. When they got there, Paul and Silas went to the synagogue. The two spoke the word to the Berean Jews. And, the Berean Jews were examining the scriptures daily to see if the word Paul and Silas spoke was true.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Christians make much of these Bereans.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">“We need to be like the Bereans, examining the scriptures every day.”</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">“We should be like the Bereans and read our Bibles every day.”</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">However, based on how I see many Christians studying the Bible and the beliefs they espouse as a result, I deduce that these Christians are not really examining why the Bereans were examining the scriptures and what they were looking for.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">So, why were the Bereans examining the scriptures daily?</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Let’s break it down.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">The Greek word translated scriptures is graphe, which means a writing, a scripture, a drawing, a letter. Graphe generally means a document. It can mean a picture or a painting. It can even mean an indictment in a public prosecution.</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">When we see the word scriptures, our minds immediately go to the Bible. However, it is unlikely that any of the New Testament would have been available to the Berean Jews for examining. At best, the Bereans would have been examining the Old Testament.</span></p><div class="code-block code-block-4" data-dcnode-id="840" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="845" instrument_node="">
</span><span data-dcnode-id="842" instrument_node="">
</span></div><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">In Acts 17:11, graphe is plural. Therefore, the Berean Jews were examining the writings, the documents, the scriptures. It is possible that the documents they were examining included documents outside of what we consider scripture today. For example, the Bereans may have been examining documents such as the apocrypha (1 and 2 Esdras, 1 and 2 Maccabees, Tobit, Wisdom, etc.), the books of Enoch, the midrash, and mishnah.</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">I point this out to demonstrate that if we are going to examine the scriptures like the Bereans then we cannot bring our presuppositions to the text. We have to dig into the text and look at all the possibilities of what it means.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Now that we know something about the writings, let’s look at how the Bereans were examining them. The Greek word for examining is anakrino. The Greek word krino means to judge, pass judgment on, consider, separate, decide, distinguish, or evaluate. The prefix ana means up or severally, but in compound words it typically implies repetition, intensity, reversal.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="829" instrument_node="">The Bereans were </span><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">repetitively</span></strong><span data-dcnode-id="826" instrument_node=""> judging, considering, separating, deciding, distinguishing, and evaluating the scriptures.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">The Bereans were </span><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">intensely</span></strong><span data-dcnode-id="820" instrument_node=""> judging, considering, separating, deciding, distinguishing, and evaluating the scriptures.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="817" instrument_node="">The&nbsp;Bereans were&nbsp;judging, considering, separating, deciding, distinguishing, and evaluating the scriptures with a mind towards&nbsp;</span><strong data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">reversing</span></strong><span data-dcnode-id="814" instrument_node=""> what they previously believed the scriptures to say.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">So, the word anakrino means to scrutinize, investigate, interrogate, examine, judge, criticize. To really understand what anakrino means, perhaps we should look at what these English words mean.</span></p><span data-dcnode-id="809" instrument_node="">
</span><ul data-dcnode-id="789"><span data-dcnode-id="808" instrument_node="">
</span><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">scrutinize – to examine closely and minutely</span></li><span data-dcnode-id="805" instrument_node="">
</span><li data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">investigate – to observe or study by close examination and systematic inquiry</span></li><span data-dcnode-id="802" instrument_node="">
</span><li data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">interrogate – to question formally and systematically</span></li><span data-dcnode-id="799" instrument_node="">
</span><li data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">examine – to inspect closely, to test the condition of, to inquire carefully into, to interrogate closely, to test by questioning in order to determine progress, fitness, or knowledge</span></li><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">judge – to form an opinion about through careful weighing of evidence and testing of premises</span></li><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">criticize – to consider the merits and demerits of and judge accordingly</span></li><span data-dcnode-id="790" instrument_node="">
</span></ul><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">The Bereans were examining the scriptures the way I’m doing right now. They looking into the meanings of the words. They were digging deep into the text. They were picking the text apart. They were looking at all the possible meanings, developing premises and hypotheses and testing them to see if they were true. They were questioning the text. They were mulling these things over in their minds.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="784" instrument_node="">The Bereans were doing all of this with the intention of&nbsp;</span><strong data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">reversing</span></strong><span data-dcnode-id="781" instrument_node=""> what they previously believed about the text.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="778" instrument_node="">What were the Bereans </span><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">not</span></strong><span data-dcnode-id="775" instrument_node=""> doing in examining the scriptures?</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">They were not beholden to the literal meaning of the words only.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">They were not sticking with the plain meaning only.</span></p><div class="code-block code-block-7" data-dcnode-id="762" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="767" instrument_node="">
</span><span data-dcnode-id="764" instrument_node="">
</span></div><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">They were not going by what someone else told them, what someone else taught them, or the traditions they had grown up with.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">They were not hearing the scriptures once a week when they showed up for church.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">When they were examining the scriptures, what were the Bereans looking for?</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">What was their purpose in&nbsp;scrutinizing, investigating, interrogating, examining, judging, and criticizing the scriptures?</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">The Bereans were seeking to know if the scriptures spoke the word.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">What word?</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">The same word that Paul and Silas taught in the synagogue in Thessalonica.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">What word was that?</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="736" instrument_node="">“And Paul went in, as was his custom, and on three Sabbath days reasoned with them from the Scriptures, explaining and proving that it was necessary&nbsp;</span><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">for the Christ to suffer and to rise from the dead</span></strong><span data-dcnode-id="733" instrument_node="">, and saying, ‘This Jesus, whom I proclaim to you, is the Christ.’” – Acts 17:2-3</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Paul had a custom, a pattern that he followed. He reasoned, argued, discussed, conversed, made a speech from the Scriptures to explain and prove that Jesus Christ had to suffer and rise from the dead.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">The Bereans were examining the scriptures to see if what Paul was saying – that the Christ had to suffer and rise from the dead – was true. The Bereans were&nbsp;scrutinizing, investigating, interrogating, examining, judging, and criticizing the scriptures to see where, when,&nbsp; and how they said the Christ had to suffer and rise from the dead.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">And, the Bereans were doing this with the intention of reversing what they had previously believed the scriptures said.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">The Bereans were not examining the scriptures to prove that the Bible was literally true, that the Bible was inerrant, that the Bible was infallible.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">The Bereans were not examining the scriptures to prove that creation was literally created in six days in attempt to fit their scientific understanding with Genesis 1.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">The Bereans were not examining the scriptures to know what laws Moses said they should keep and what sacrifices they needed to make.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">The Bereans were not examining the scriptures to prove why people should tithe.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">The Bereans were not examining the scriptures to prove that everything historical event recorded in the Bible was literally true, word for word.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">The Bereans were examining the scriptures for one thing and one thing only.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Did Jesus Christ have to suffer and rise from the dead?</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Was Paul correct?</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Was this word true?</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">It is no coincidence that this word, the word that Paul made a custom of teaching in the synagogues, was the same word that Jesus taught the two disciples on the road to Emmaus.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">“And he said to them, ‘O foolish ones, and slow of heart to believe all that the prophets have spoken! Was it not necessary that the Christ should suffer these things and enter into his glory?’ And beginning with Moses and all the Prophets, he interpreted to them in all the Scriptures the things concerning himself.” – Luke 24:25-27</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Jesus showed these two disciples in all the scriptures – from Moses to all the prophets – how he had to suffer and rise from the dead, the same word that Paul made a custom of teaching in the synagogues.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Notice that Jesus had to interpret the scriptures for them. That the Christ had to suffer and rise from the dead wasn’t the plain and obvious meaning of the scriptures. It wasn’t the literal meaning of the scriptures.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Jesus did the same thing with all the disciples a short while later.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">“Then he said to them, ‘These are my words that i spoke to you while I was still with you, that everything written about me in the Law of Moses and the Prophets and the Psalms must be fulfilled.’ Then he opened their minds to understand the Scriptures, and said to them, ‘Thus it is written, that the Christ should suffer and on the third day rise from the dead.’” – Luke 24:44-46</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Jesus opened their minds.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">The word opened is the same word used in Acts 17:3 to say that Paul was “explaining” from the scriptures to the Thessalonican Jews that it was necessary for the Christ to suffer and rise from the dead.&nbsp;Paul was giving the same word that Jesus gave.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Because they were examining the scriptures daily for the word – that the Christ had to suffer and rise from the dead – we are told that the Bereans were more noble than those in Thessalonica.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">We tend to think of nobility as your social standing due to birth. And, the Greek word used here can mean that. But, the Greek word also means noble in mind, sentiment, character, and morals. It also can have the connotation of being open minded.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Why the Berean Jews were more noble, dare I say more open minded, than the Thessalonican Jews?</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Because “they received the word with all eagerness.”</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">The Greek word eagerness is prothumia. Thymos means passion, as if breathing hard. It is the word for anger, wrath, indignation, fierceness. The prefix pro means before, in front of, prior to.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Think about the implications of prothumia then.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">The Bereans’ eagerness for the word implies that they were breathed into before, prior to, hearing the word – that Christ had to suffer and rise from the dead – from the Paul. This eagerness for the word was a wrath, an indignation, a fierceness that came upon them. (Think about what this says about God’s wrath.)</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Therefore, prothumia means a predisposition, alacrity (promptness in response, cheerful readiness), a forwardness of mind, a readiness of mind, a ready and willing mind.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">The Berean Jews were more noble than the Thessalonican Jews because they received the word – that Christ had to suffer and rise from the dead – the word that was not literally stated in the scriptures but had to be interpreted, explained, and proved with a predisposition to believing the word.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="643" instrument_node="">Therefore, when the Bereans were examining the scriptures they were looking to&nbsp;</span><strong data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">reverse</span></strong><span data-dcnode-id="640" instrument_node=""> what they had previously believed about them. The Bereans were eager to change their minds, to repent.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">When we get right down to it, the Bereans were examining the scriptures to change their minds about God. They were ready and willing to believe that God suffered for them, that God made himself a sacrifice for them, that God died.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">They had to change their minds, reverse the way they understood the scriptures. Because the literal reading of the scriptures said that God killed, murdered, raped, plundered, and utterly destroyed people. The literal reading of the scriptures said that God practiced genocide against those nations in the land of Canaan.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">So, yes, let’s be like the Bereans, examining the scriptures daily.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">But, let’s not fool ourselves.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">We cannot be like the Bereans and come to the scriptures to prove our traditions, to prove what we have been taught, to prove the literal meaning of the scriptures. We cannot be like the Bereans and immediately and continually disagree with our traditions and something that we do not understand. We cannot be like the Bereans and rely on the Old Testament alone, always quoting from it.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Instead,&nbsp; if we want to be like the Bereans and not the Thessalonican Jews, who by the way persecuted Paul and Silas and drove them from the city, then we must come to the scriptures with an eagerness to have our minds changed, reversed. We must come to the scriptures carefully looking for how we repent – change what believe about God. We have to listen to Jesus.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">To be look like the Bereans, examining the scriptures daily, we need to study them for one thing and one thing only.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Christ suffered and rose from the dead.</span></p><span data-dcnode-id="614" instrument_node="">
</span></div><span data-dcnode-id="612" instrument_node="">
</span><div class="code-block code-block-10" data-dcnode-id="599" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="611" instrument_node="">
</span><span data-dcnode-id="608" instrument_node="">
</span><span data-dcnode-id="606" instrument_node="">
