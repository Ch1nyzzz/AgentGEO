</span><ul data-dcnode-id="1025" id="breadcrumb" itemprop="breadcrumb"><li data-dcnode-id="1031"><a data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="1033" instrument_node="">Home: Christian apologetics including Genesis, Bible and Communicating with God</span></a></li><li data-dcnode-id="1028"><a data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/bible-101/"><span data-dcnode-id="1030" instrument_node="">Bible 101</span></a></li><li data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">How to Interpret the Bible</span></li></ul><span data-dcnode-id="1024" instrument_node="">

</span><h1 data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">
How to Interpret the Bible
</span></h1><span data-dcnode-id="1019" instrument_node="">
</span><p align="left" data-dcnode-id="1008"><br data-dcnode-id="1018"><span data-dcnode-id="1017" instrument_node="">
</span><strong data-dcnode-id="1009"><span data-dcnode-id="1016" instrument_node="">I.&nbsp;Introduction</span><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">
II.&nbsp;Principles of Biblical Interpretation</span><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">
III.&nbsp;Examples for Study</span><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">
IV.&nbsp;Summary</span></strong></p><span data-dcnode-id="1007" instrument_node="">
</span><h2 data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">I. Introduction&nbsp;</span></h2><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1003" instrument_node="">In 1993 Hank Hanegraaff (“The Bible Answer Man”) wrote a book entitled </span><em data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Christianity in Crisis</span></em><span data-dcnode-id="1000" instrument_node="">. In the book he exposed problems within evangelicalism. Many think that in actuality Hanegraaff understated the problems of both doctrine and practice within Christianity, and time has made the issues even more acute.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Forgive us for saying so, but perhaps it is time to be honest with ourselves. American Christianity, at least much of it, is a mess. It is separated into divisive sects, giving the world the impression that we don’t know what we are doing. Or even more alarming, that the true God is somehow irrelevant and confused. This is not to say that individual American churches are not proclaiming the Gospel in its truth and purity. But some serious introspection is in order.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p class="quoted" data-dcnode-id="992"><img align="left" alt="Warning from Wikimedia Commons" data-dcnode-id="994" height="29" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/assets/images/Warning%2520Wikimedia%2520Commons.bmp&amp;raw" title="Warning sign" width="29"><span data-dcnode-id="993" instrument_node="">&nbsp; Let us warn you. This article will make many Christians uncomfortable. But perhaps we need to feel uncomfortable. We as Protestants should acknowledge that Sola Scriptura was supposed to solve doctrinal problems, but it does not always work that way when humans are involved.</span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Each sect places itself apart, even above the others, thinking that they uniquely possess biblical truth. But they can’t all be correct as there is too much contradictory opinion. We all seek comfort and constancy in our theology. We’ve got enough uncomfortable situations to deal with in our daily lives. But we make here a serious challenge: We think that Christians are too complacent, and indeed members of every group seem to fear the thought of seriously examining their own doctrine.</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Peer pressure too often outweighs good scholarship. But there is a related issue. People tend to seek an identity. We are comfortable with a label. We see ourselves fitting in with a particular group: I am Catholic, or I am Methodist, or I am Reformed, etc.</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="984" instrument_node="">We deal with all kinds of Christians and pseudo-Christians on our website. So we have some basis to make our claim. Yes, we mean what we said—Christians are </span><em data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">afraid</span></em><span data-dcnode-id="981" instrument_node=""> to deal with passages of the Bible that are challenging to them. Each group assumes that their leaders must have theology right, and fail, as Paul instructs us in </span><a class="rtBibleRef" data-dcnode-id="979" data-purpose="bible-reference" data-reference="1 Thess 5.21" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Thess%25205.21" rel="noopener" target="_blank"><span data-dcnode-id="980" instrument_node="">1 Thessalonians 5:21</span></a><span data-dcnode-id="978" instrument_node="">, to test everything.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">We often simply choose to ignore challenges to our pre-conceived notions about what the Bible actually teaches. We have built doctrine by picking and choosing the passages that fit our ideas and ignored those that challenge us. This has led to a shallow, lazy, distorted, and divisive Christianity. It is high time to open our minds to reasonable challenges to our thinking. Fortunately, with the internet, the days of Christians being able to duck doctrinal challenges are over.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">We should not fear challenges, but rather welcome them.&nbsp;Consider this: One can learn more about their own position by studying the challenges to it. For example, in our own work we have learned better how to defend the Trinity by studying what Muslims and Jehovah’s Witnesses think about it. Truth is more important than fear.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Let’s survey the Christian&nbsp;landscape. The cults are gaining ground. Liberal Christians have arbitrarily thrown out anything in Scripture they don’t like. Even conservatives, in spite of giving lip service to inerrancy—that all Scripture is God-breathed—often dismiss many passages that appear too tough to handle.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">But that’s just the beginning. We have Catholics and legalistic Protestants who have invented non-biblical doctrines. There are the ultra-fundamentalists who think that every word in the Bible is to be taken literally—making a mockery of language itself including the language of Scripture.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="963" instrument_node="">And we note that high profile Pentecostal preachers are teaching a false </span><em data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">gospel of prosperity</span></em><span data-dcnode-id="960" instrument_node=""> while giving false hope of healing to the afflicted through the practice of “slaying in the spirit”—which is nothing more than psycho-social manipulation. And we have the prophecy wonks that see the end of the world behind every world event.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="955"><img align="right" alt="Pope Paul VI Wikimedia Commons" data-dcnode-id="957" height="66" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/assets/images/Pope%2520Paul%2520VI%2520Wikimedia%2520Commons.jpg&amp;raw" title="Pope Paul VI" width="52"><span data-dcnode-id="956" instrument_node="">Yet we find “mainstream” orthodox Evangelical Protestants and Catholics with issues as well. Statistics clearly show that a majority of their members are ignorant of basic Christian doctrines and on average live lives that are indistinguishable from others in the culture. Even among Protestants, we have at least two distinct groups— the Calvinists versus the Arminians—each thinking the other group is seriously deceived. This debate—which is largely over the exact nature of man’s free will—has been raging for 2000 years and is not likely to be resolved this side of heaven.&nbsp; In all of these we see shallow, superficial Christianity as a result of a shallow, superficial understanding of the Bible. Cheap grace and easy-believism is rampant throughout the church.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="953" instrument_node="">Non-Christians can see right through our bickering and through the fakers, pseudo-intellectuals, hypocrites, and false prophets. The modern church is often an embarrassment to biblical Christianity; it is many times a stumbling block to seekers. (For more see this 4-part video Christianity and Crisis by Hank Hanegraaf: </span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/watch%3Fv%3DE7jHvm-MKfE"><span data-dcnode-id="952" instrument_node="">http://www.youtube.com/watch?v=E7jHvm-MKfE</span></a><span data-dcnode-id="950" instrument_node="">.)</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Gut check time. As you read this, does your attitude confirm what we are saying? Chances are that you are thinking that all this is true about the other groups out there, but not about yours. We submit that every group has blind spots. We need to humble ourselves before God and ask God to reveal truth.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="941"><strong data-dcnode-id="942"><em data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Who has a heart hardened by biases and preconceptions, Lord? Is it I? Is it I? Show me the blind spot in my own eye, Lord! Give me the fortitude to deal with error that I might hold. Give me a passion for biblical truth. And give me the courage to speak up against error, even among my peers. </span></em></strong></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="939" instrument_node="">Our thesis is that these problems result from an often shallow and distorted view of Scripture! We are not trying to solve every problem with this short article. But we want to challenge our Christian brothers and sisters into re-examination. </span><br data-dcnode-id="938"><span data-dcnode-id="937" instrument_node="">
Let us say here that we affirm the inerrancy of Scripture. And we think that the toughest challenges to the Bible can be met. With that in mind, let’s consider some basic concepts on how to interpret the Bible.</span></p><span data-dcnode-id="935" instrument_node="">
</span><h2 data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">II. Principles of Biblical Interpretation</span></h2><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="928"><img align="right" alt="Jewish scroll Stockxpert.jpg" data-dcnode-id="931" height="121" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/assets/images/Scroll%2520Stockxpert.jpg&amp;raw" title="Jewish scroll" width="136"><span data-dcnode-id="929" style="text-decoration: underline"><span data-dcnode-id="930" instrument_node="">Overarching prerequisites and principles:</span></span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="926" instrument_node="">A.&nbsp; Prior acceptance of the Bible as the inspired Word of God (</span><a class="rtBibleRef" data-dcnode-id="924" data-purpose="bible-reference" data-reference="2 Tim 3.14-17" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/2%2520Tim%25203.14-17" rel="noopener" target="_blank"><span data-dcnode-id="925" instrument_node="">2 Timothy 3:14-17</span></a><span data-dcnode-id="923" instrument_node="">)</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="920" instrument_node="">B.&nbsp; A predisposition of faith and obedience (</span><a class="rtBibleRef" data-dcnode-id="918" data-purpose="bible-reference" data-reference="John 7.17-18" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%25207.17-18" rel="noopener" target="_blank"><span data-dcnode-id="919" instrument_node="">John 7:17-18</span></a><span data-dcnode-id="917" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="915" data-purpose="bible-reference" data-reference="John 8.43" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%25208.43" rel="noopener" target="_blank"><span data-dcnode-id="916" instrument_node="">8:43</span></a><span data-dcnode-id="914" instrument_node="">)</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">C.&nbsp; Seeing the parts in relation to the whole through proper interpretive methods, including these:</span></p><span data-dcnode-id="909" instrument_node="">
</span><ol data-dcnode-id="880"><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="898"><em data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Grammatico-historical method</span></em><span data-dcnode-id="905" instrument_node="">:&nbsp; gathering from the Scriptures themselves the precise meaning which the writers intended to convey, taking into account the grammar and culture of their times and their primary audiences. We should remember that the Bible was spoken </span><span data-dcnode-id="903" style="text-decoration: underline"><span data-dcnode-id="904" instrument_node="">for</span></span><span data-dcnode-id="902" instrument_node=""> us today but not </span><span data-dcnode-id="900" style="text-decoration: underline"><span data-dcnode-id="901" instrument_node="">to</span></span><span data-dcnode-id="899" instrument_node=""> us. Audience relevance is often key to grasping what the writers intended.&nbsp; This applies to the sacred writings the same principles, as well as the same grammatical processes and exercises of sense and reason which apply to other books. In other words, we should use principles of language as well as standard reason to determine what the author intended and how the original readers would have understood it.</span></li><span data-dcnode-id="897" instrument_node="">
</span><li data-dcnode-id="893"><em data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Covenant-historical method</span></em><span data-dcnode-id="894" instrument_node="">:&nbsp; paying careful attention to the rise and development of the Kingdom of God in all its aspects through the course of biblical history, which is the central core and directing rudder of world history. Covenant-historical interpretation is the antidote both to the unbiblical legalism that flourishes in American Christianity, and to the prophetic speculation and fantasies that have diverted Christians from real-world concerns and the real hope of the Gospel.</span></li><span data-dcnode-id="892" instrument_node="">
</span><li data-dcnode-id="882"><em data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Redemptive-historical method</span></em><span data-dcnode-id="889" instrument_node="">: interpretation of the Bible based on the principles that</span><br data-dcnode-id="888"><span data-dcnode-id="887" instrument_node="">
    a.&nbsp; Scripture is progressive revelation.</span><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node="">
    b.&nbsp; Scripture can only really be understood Christologically throughout.</span><br data-dcnode-id="884"><span data-dcnode-id="883" instrument_node="">
    c.&nbsp;Old Testament people of God belonged to the same organic covenant body as we the New Testament people of God.</span></li><span data-dcnode-id="881" instrument_node="">
</span></ol><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" style="text-decoration: underline"><span data-dcnode-id="878" instrument_node="">Practical guidance for earnest students of God’s Word:</span></span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">According to the Roman Church, it is neither the right nor the responsibility of any individual Christian to interpret the Bible and declare its meaning. That authority ultimately rests with the church’s teaching office (the Magisterium). This position, however, reflects several misconceptions concerning the Protestant principle of private interpretation:</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">1. Private interpretation does not mean that we should rely solely on our own judgments, ignoring the insights and research of others.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">2.&nbsp;Private interpretation does not mean that we have the right to "distort" the Bible in accordance with our own conceptions.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">3.&nbsp;Private interpretation does not mean that we can ignore the history of interpretation in the church.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">4.&nbsp;At the same time as we exercise our God-given responsibility to interpret the Scriptures, we must be aware of the element of subjectivity that influences all interpretation:</span></p><span data-dcnode-id="860" instrument_node="">
</span><ul data-dcnode-id="825"><span data-dcnode-id="859" instrument_node="">
</span><li data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">pride</span></li><span data-dcnode-id="856" instrument_node="">
</span><li data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">prejudice</span></li><span data-dcnode-id="853" instrument_node="">
</span><li data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">hidden agendas (personal and theological)</span></li><span data-dcnode-id="850" instrument_node="">
</span><li data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">cultural conditioning</span></li><span data-dcnode-id="847" instrument_node="">
</span><li data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">historical circumstances</span></li><span data-dcnode-id="844" instrument_node="">
</span><li data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">socio-economic factors</span></li><span data-dcnode-id="841" instrument_node="">
</span><li data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">unconscious expectations</span></li><span data-dcnode-id="838" instrument_node="">
</span><li data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">educational background</span></li><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">personality distinctives</span></li><span data-dcnode-id="832" instrument_node="">
</span><li data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">occupational pressures</span></li><span data-dcnode-id="829" instrument_node="">
</span><li data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">interpersonal relational background</span></li><span data-dcnode-id="826" instrument_node="">
</span></ul><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">As we seek to interpret the Scriptures, we must also keep in mind the contributions of the past. Fee and Stuart in their book </span><em data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">How to Read the Bible for All It’s Worth</span></em><span data-dcnode-id="820" instrument_node=""> remind us that, "Interpretation that aims at, or thrives on, uniqueness, can usually be attributed to pride (an attempt to 'out clever' the rest of the world), a false understanding of spirituality (wherein the Bible is full of deep truths waiting to be mined by the spiritually sensitive person with special insight), or vested interests (the need to support a theological bias, especially in dealing with texts that seem to go against that bias). Unique interpretations are usually wrong. This is not to say that the correct understanding of a text may not often seem unique to someone who hears it for the first time. But it is to say that uniqueness is not the aim of our task."</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" style="text-decoration: underline"><span data-dcnode-id="817" instrument_node="">Ten guidelines for rightly dividing the unified Word of Truth:</span></span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">1.&nbsp; Doctrine must be squarely built upon Scripture. Our doctrines must be erected from a proper interpretation of Scripture or a legitimate inference from Scripture, and not from cherished traditions, human creeds or confessions. While there is a place for creeds (and some are clearly more biblically-based than others), the Christian’s conscience is ultimately bound to Scripture alone.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">2.&nbsp; Scripture is Self-interpreting. The “analogy of faith” is a reformed hermeneutical principle which states that, since all scriptures are harmoniously united with no essential contradictions, therefore, every proposed interpretation of any passage must be compared with what the other parts of the Bible teach. In other words, the body of doctrine, which the scriptures as a whole proclaim will not be contradicted in any way by any passage. Therefore, if two or three different interpretations of a verse are equally possible, any interpretation that contradicts the clear teaching of any other scriptures must be ruled out from the beginning.</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">3.&nbsp; Context is Critical. &nbsp;Every word, clause, sentence, paragraph of Scripture comes to us in contexts – from the immediate passage to the part of a book, to the whole book, to the historical context of the book, the author’s identity, setting and purpose, and ultimately to the entire Bible.&nbsp;Working outwardly to determine context in this manner is a helpful discipline for understanding anything we read or hear in Scripture.&nbsp;Tunnel vision is perilous.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">4.&nbsp; The Clear Must Interpret the Unclear. A related principle that is very helpful in interpreting the Bible, prophecy and apocalyptic literature in particular, is that murky passages can often be clarified by other scriptures which address the particular topic in a more straightforward way. For example, a very specific interpretation of the highly symbolic visions of John's apocalypse, may never “trump” the clear teachings of Paul's epistles, which are more didactic and less symbolic, and hence clearer.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">5.&nbsp; Distinguish between what the Bible records and what it commands, commends, or approves. We must recognize the difference between passages which are didactic and those which are reportorial.&nbsp;Emulation is not always synonymous with obedience.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">6.&nbsp; Incidental or rare events within Scripture should not necessarily be taken as normative for Christians today. For example, </span><a class="rtBibleRef" data-dcnode-id="796" data-purpose="bible-reference" data-reference="Acts 1.26" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Acts%25201.26" rel="noopener" target="_blank"><span data-dcnode-id="797" instrument_node="">Acts 1:26</span></a><span data-dcnode-id="795" instrument_node=""> says that the early apostles drew lots in order to find the Lord’s will on who would replace Judas (whether Joseph or Matthias). But it is less than likely that this should be our approach when confronted with important decisions—especially since the drawing of lots occurred at the beginning stage of early church history and was, apparently, discontinued soon after (the New Testament records no other instances of drawing lots).</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">7.&nbsp; Recognize Distinctive Apostolic Practices. Distinctive apostolic practices that are rooted in theology, not in the culture of the day, may be taken as normative for the church, unless clearly temporary in nature.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">8.&nbsp; Don’t build a doctrine upon a single verse or an uncertain textual reading. In other words, we should not erect an entire teaching or system of doctrine upon a verse in isolation from its context, or which has dubious textual support. Christian doctrine should be built upon passages which exist in the original manuscripts and can be confirmed through the science of textual criticism.</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">9.&nbsp; Be alert to figurative language. The Bible uses multiple literary genres, and is filled with figurative language. This fact should cause the interpreter to take great care in his treatment of the Bible, making certain to not interpret literally that which was intended to be understood metaphorically or figuratively.&nbsp;All Scripture has a literal sense, but that sense is not always expressed in literal terms.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">10.&nbsp; Pray for the Holy Spirit’s Illumination. The Holy Spirit's work is not only to show what the Bible means, but also to persuade Christians of its truth. Illumination is the Spirit's work, enabling Christians to discern the meaning of the message and to welcome and receive it as from God. Theologian Charles Hodge states that obedience in the believer's life is the inevitable result of the illuminating work of the Spirit.</span></p><span data-dcnode-id="781" instrument_node="">
</span><h2 data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">III. Examples for Study</span></h2><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Below are some selected passages for discussion. With these questions, we are not necessarily trying to prove a point. We are not even offering answers for all of these, though we have some answers to many of these questions in the articles on our website. Our primary goal is that our readers will begin to dig deeper into the Bible—to consider questions that you may not have considered seriously in the past. Some of these issues are probably familiar to you; others may not be familiar to you. Perhaps some of these passages you have passed right over in your studies because you did not know quite how to deal with them. You may disagree with answers implied, but as long as these questions get you to think more deeply about the Bible, we have achieved our goal. These questions would make a great Bible study with friends. So here we go.</span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" style="text-decoration: underline"><span data-dcnode-id="774" instrument_node="">Is the Bible always to be interpreted literally?</span></span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="770" instrument_node="">1. When Jesus said that he is the vine (</span><a class="rtBibleRef" data-dcnode-id="768" data-purpose="bible-reference" data-reference="John 15.5" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%252015.5" rel="noopener" target="_blank"><span data-dcnode-id="769" instrument_node="">John 15:5</span></a><span data-dcnode-id="767" instrument_node="">), did he mean that he is a woody plant? Is God literally a rock (</span><a class="rtBibleRef" data-dcnode-id="765" data-purpose="bible-reference" data-reference="2 Sam 2.3" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/2%2520Sam%25202.3" rel="noopener" target="_blank"><span data-dcnode-id="766" instrument_node="">2 Samuel 2:3</span></a><span data-dcnode-id="764" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="762" data-purpose="bible-reference" data-reference="Ps 18.2" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Ps%252018.2" rel="noopener" target="_blank"><span data-dcnode-id="763" instrument_node="">Psalm 18:2</span></a><span data-dcnode-id="761" instrument_node="">, etc.)?</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="758" instrument_node="">2. Should we literally hate our mother and father to be Jesus’ disciple (</span><a class="rtBibleRef" data-dcnode-id="756" data-purpose="bible-reference" data-reference="Luke 14.26" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Luke%252014.26" rel="noopener" target="_blank"><span data-dcnode-id="757" instrument_node="">Luke 14:26</span></a><span data-dcnode-id="755" instrument_node="">)?&nbsp;</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">3. If your eye causes you to sin, should you pluck it out (</span><a class="rtBibleRef" data-dcnode-id="750" data-purpose="bible-reference" data-reference="Mark 9.47" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Mark%25209.47" rel="noopener" target="_blank"><span data-dcnode-id="751" instrument_node="">Mark 9:47</span></a><span data-dcnode-id="749" instrument_node="">)?</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="746" instrument_node="">4. Must we sell everything we have and give it to the poor in order to inherit eternal life (</span><a class="rtBibleRef" data-dcnode-id="744" data-purpose="bible-reference" data-reference="Luke 18.18-22" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Luke%252018.18-22" rel="noopener" target="_blank"><span data-dcnode-id="745" instrument_node="">Luke 18:18-22</span></a><span data-dcnode-id="743" instrument_node="">)?</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="740" instrument_node="">5. Did the mountains and the hills really break into song and the trees clap their hands (</span><a class="rtBibleRef" data-dcnode-id="738" data-purpose="bible-reference" data-reference="Isa 55.12" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Isa%252055.12" rel="noopener" target="_blank"><span data-dcnode-id="739" instrument_node="">Isaiah 55:12</span></a><span data-dcnode-id="737" instrument_node="">)?</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="734" instrument_node="">6. Did God hold out his hands literally to an obstinate people (</span><a class="scripturized" data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="733" instrument_node="">Isaiah 65</span></a><span data-dcnode-id="731" instrument_node=""></span><span data-dcnode-id="730" instrument_node="">)? Does God have hands?</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="727" instrument_node="">7. Would the moon literally turn to blood before the Day of the Lord (</span><a class="rtBibleRef" data-dcnode-id="725" data-purpose="bible-reference" data-reference="Joel 2.31" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Joel%25202.31" rel="noopener" target="_blank"><span data-dcnode-id="726" instrument_node="">Joel 2:31</span></a><span data-dcnode-id="724" instrument_node="">)? Aren’t such statements about actual worldly judgments by God that are expressed in poetic or astronomical language rather than literal language?</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="721" instrument_node="">8. When God judged Babylon, an event in actual history, did the stars and sun stop giving their light (</span><a class="rtBibleRef" data-dcnode-id="719" data-purpose="bible-reference" data-reference="Isa 13.10" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Isa%252013.10" rel="noopener" target="_blank"><span data-dcnode-id="720" instrument_node="">Isaiah 13:10</span></a><span data-dcnode-id="718" instrument_node="">) and the heavens literally tremble (</span><a class="rtBibleRef" data-dcnode-id="716" data-purpose="bible-reference" data-reference="Isa 13.13" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Isa%252013.13" rel="noopener" target="_blank"><span data-dcnode-id="717" instrument_node="">Isaiah 13:13</span></a><span data-dcnode-id="715" instrument_node="">)? Given this passage and numerous others like it in the Bible (for example, </span><a class="rtBibleRef" data-dcnode-id="713" data-purpose="bible-reference" data-reference="Isa 24.23" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Isa%252024.23" rel="noopener" target="_blank"><span data-dcnode-id="714" instrument_node="">Isaiah 24:23</span></a><span data-dcnode-id="712" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="710" data-purpose="bible-reference" data-reference="Ezek 32.7" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Ezek%252032.7" rel="noopener" target="_blank"><span data-dcnode-id="711" instrument_node="">Ezekiel 32:7</span></a><span data-dcnode-id="709" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="707" data-purpose="bible-reference" data-reference="Amos 5.20" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Amos%25205.20" rel="noopener" target="_blank"><span data-dcnode-id="708" instrument_node="">Amos 5:20</span></a><span data-dcnode-id="706" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="704" data-purpose="bible-reference" data-reference="Amos 8.9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Amos%25208.9" rel="noopener" target="_blank"><span data-dcnode-id="705" instrument_node="">8:9</span></a><span data-dcnode-id="703" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="701" data-purpose="bible-reference" data-reference="Zeph 1.15" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Zeph%25201.15" rel="noopener" target="_blank"><span data-dcnode-id="702" instrument_node="">Zephaniah 1:15</span></a><span data-dcnode-id="700" instrument_node="">) what do you think of </span><a class="rtBibleRef" data-dcnode-id="698" data-purpose="bible-reference" data-reference="Matt 24.29" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252024.29" rel="noopener" target="_blank"><span data-dcnode-id="699" instrument_node="">Matthew 24:29</span></a><span data-dcnode-id="697" instrument_node="">?</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="694" instrument_node="">9. Do we have a literal talking snake—scales and all—in </span><a class="scripturized" data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="693" instrument_node="">Genesis 3</span></a><span data-dcnode-id="691" instrument_node=""></span><span data-dcnode-id="690" instrument_node="">? (See </span><a class="rtBibleRef" data-dcnode-id="688" data-purpose="bible-reference" data-reference="Rev 20.2" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rev%252020.2" rel="noopener" target="_blank"><span data-dcnode-id="689" instrument_node="">Revelation 20:2</span></a><span data-dcnode-id="687" instrument_node=""> for some help on this one.) Is the Tree of the Knowledge of Good and Evil (</span><a class="rtBibleRef" data-dcnode-id="685" data-purpose="bible-reference" data-reference="Gen 2.9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Gen%25202.9" rel="noopener" target="_blank"><span data-dcnode-id="686" instrument_node="">Genesis 2:9</span></a><span data-dcnode-id="684" instrument_node="">) a literal tree? (There may differences of opinion here.) Are the Tigris and Euphrates rivers mentioned in Genesis literal rivers? Is it reasonable for literal and non-literal language to appear in the same context?</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="681" instrument_node="">10. Did Jesus in </span><a class="scripturized" data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="680" instrument_node="">Revelation 1</span></a><span data-dcnode-id="678" instrument_node=""></span><span data-dcnode-id="677" instrument_node=""> literally have eyes like a flame of fire (v. 14) and did he literally hold seven stars (v. 16)? Did the beasts in </span><a class="scripturized" data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="676" instrument_node="">Revelation 13</span></a><span data-dcnode-id="674" instrument_node=""></span><span data-dcnode-id="673" instrument_node=""> literally have ten horns and seven heads (v. 1) or speak like a dragon (v. 11)? Did the birds in </span><a class="scripturized" data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="672" instrument_node="">Revelation 19</span></a><span data-dcnode-id="670" instrument_node=""></span><span data-dcnode-id="669" instrument_node=""> literally eat the flesh of kings and all men (v. 18)? Did the angel in </span><a class="rtBibleRef" data-dcnode-id="667" data-purpose="bible-reference" data-reference="Rev 20.1" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rev%252020.1" rel="noopener" target="_blank"><span data-dcnode-id="668" instrument_node="">Revelation 20:1</span></a><span data-dcnode-id="666" instrument_node=""> have a literal key to the bottomless pit? Is the Book of Life in </span><a class="rtBibleRef" data-dcnode-id="664" data-purpose="bible-reference" data-reference="Rev 20.12" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rev%252020.12" rel="noopener" target="_blank"><span data-dcnode-id="665" instrument_node="">Revelation 20:12</span></a><span data-dcnode-id="663" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="661" data-purpose="bible-reference" data-reference="Revelation 20.15" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Revelation%252020.15" rel="noopener" target="_blank"><span data-dcnode-id="662" instrument_node="">15</span></a><span data-dcnode-id="660" instrument_node=""> literal—with paper or parchment pages?</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">11. Rather than insisting that you interpret the Bible literally, would it be more faithful to Scripture to say that you interpret it the way it was intended to be interpreted?</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="649"><br data-dcnode-id="654"><span data-dcnode-id="653" instrument_node="">
</span><span data-dcnode-id="651" style="text-decoration: underline"><span data-dcnode-id="652" instrument_node="">The divinity of Jesus.</span></span><span data-dcnode-id="650" instrument_node="">&nbsp; This section is in part to help Christians defend the Bible against skeptics. Muslims, in particular, and others say that Jesus never even claimed divinity. But such claims are based on a failure to understand Jesus’ claims in context. So these questions also show how Scripture can help interpret Scripture.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="647" instrument_node="">1. What did Jesus mean in </span><a class="rtBibleRef" data-dcnode-id="645" data-purpose="bible-reference" data-reference="John 8.58" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%25208.58" rel="noopener" target="_blank"><span data-dcnode-id="646" instrument_node="">John 8:58</span></a><span data-dcnode-id="644" instrument_node="">: “Truly, truly, I say to you, before Abraham was, I am.”? (See </span><a class="rtBibleRef" data-dcnode-id="642" data-purpose="bible-reference" data-reference="Exod 3.14" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Exod%25203.14" rel="noopener" target="_blank"><span data-dcnode-id="643" instrument_node="">Exodus 3:14</span></a><span data-dcnode-id="641" instrument_node="">.)</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="638" instrument_node="">2. What did Jesus mean by calling himself the “Son of Man,”? (See </span><a class="rtBibleRef" data-dcnode-id="636" data-purpose="bible-reference" data-reference="Dan 7.13-14" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Dan%25207.13-14" rel="noopener" target="_blank"><span data-dcnode-id="637" instrument_node="">Daniel 7:13-14</span></a><span data-dcnode-id="635" instrument_node="">.)</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="632" instrument_node="">3. See </span><a class="rtBibleRef" data-dcnode-id="630" data-purpose="bible-reference" data-reference="Rev 22.12-13" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rev%252022.12-13" rel="noopener" target="_blank"><span data-dcnode-id="631" instrument_node="">Revelation 22:12-13</span></a><span data-dcnode-id="629" instrument_node=""> and compare to </span><a class="rtBibleRef" data-dcnode-id="627" data-purpose="bible-reference" data-reference="Rev 1.8" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rev%25201.8" rel="noopener" target="_blank"><span data-dcnode-id="628" instrument_node="">Revelation 1:8</span></a><span data-dcnode-id="626" instrument_node=""> and </span><a class="rtBibleRef" data-dcnode-id="624" data-purpose="bible-reference" data-reference="Isa 44.6" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Isa%252044.6" rel="noopener" target="_blank"><span data-dcnode-id="625" instrument_node="">Isaiah 44:6</span></a><span data-dcnode-id="623" instrument_node="">. (Jesus and YHWH are both the “alpha and omega” and the “first and the last.” These passages are helpful when discussing the Jesus’ divinity with Jehovah’s Witnesses.)</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="620" instrument_node="">4. What did Jesus mean when he told Caiaphas the high priest that he (Caiaphas) would see him (Jesus) “coming on the clouds of heaven” (</span><a class="rtBibleRef" data-dcnode-id="618" data-purpose="bible-reference" data-reference="Matt 26.64" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252026.64" rel="noopener" target="_blank"><span data-dcnode-id="619" instrument_node="">Matthew 26:64</span></a><span data-dcnode-id="617" instrument_node="">)? Caiaphas immediately declared Jesus to be speaking blasphemy. Why? Not only did Jesus affirm that he is the Son of God (verse 63), but his claim was reinforced by the prophecy of “coming on clouds.” Caiaphas understood that only God is described in Scripture as having showed himself in clouds, or came in clouds in judgment—though no one ever literally saw God. See such passages as </span><a class="rtBibleRef" data-dcnode-id="615" data-purpose="bible-reference" data-reference="Exod 13.21" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Exod%252013.21" rel="noopener" target="_blank"><span data-dcnode-id="616" instrument_node="">Exodus 13:21</span></a><span data-dcnode-id="614" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="612" data-purpose="bible-reference" data-reference="Exodus 14.24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Exodus%252014.24" rel="noopener" target="_blank"><span data-dcnode-id="613" instrument_node="">14:24</span></a><span data-dcnode-id="611" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="609" data-purpose="bible-reference" data-reference="Exodus 16.10" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Exodus%252016.10" rel="noopener" target="_blank"><span data-dcnode-id="610" instrument_node="">16:10</span></a><span data-dcnode-id="608" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="606" data-purpose="bible-reference" data-reference="Exodus 19.9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Exodus%252019.9" rel="noopener" target="_blank"><span data-dcnode-id="607" instrument_node="">19:9</span></a><span data-dcnode-id="605" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="603" data-purpose="bible-reference" data-reference="Exodus 24.15" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Exodus%252024.15" rel="noopener" target="_blank"><span data-dcnode-id="604" instrument_node="">24:15</span></a><span data-dcnode-id="602" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="600" data-purpose="bible-reference" data-reference="Exodus 33.9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Exodus%252033.9" rel="noopener" target="_blank"><span data-dcnode-id="601" instrument_node="">33:9</span></a><span data-dcnode-id="599" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="597" data-purpose="bible-reference" data-reference="Exodus 34.5" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Exodus%252034.5" rel="noopener" target="_blank"><span data-dcnode-id="598" instrument_node="">34:5</span></a><span data-dcnode-id="596" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="594" data-purpose="bible-reference" data-reference="Lev 16.2" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Lev%252016.2" rel="noopener" target="_blank"><span data-dcnode-id="595" instrument_node="">Leviticus 16:2</span></a><span data-dcnode-id="593" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="591" data-purpose="bible-reference" data-reference="Num 11.25" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Num%252011.25" rel="noopener" target="_blank"><span data-dcnode-id="592" instrument_node="">Numbers 11:25</span></a><span data-dcnode-id="590" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="588" data-purpose="bible-reference" data-reference="Ps 18.9-12" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Ps%252018.9-12" rel="noopener" target="_blank"><span data-dcnode-id="589" instrument_node="">Psalm 18:9-12</span></a><span data-dcnode-id="587" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="585" data-purpose="bible-reference" data-reference="Psalm 97.2-5" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Psalm%252097.2-5" rel="noopener" target="_blank"><span data-dcnode-id="586" instrument_node="">97:2-5</span></a><span data-dcnode-id="584" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="582" data-purpose="bible-reference" data-reference="Psalm 104.3" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Psalm%2520104.3" rel="noopener" target="_blank"><span data-dcnode-id="583" instrument_node="">104:3</span></a><span data-dcnode-id="581" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="579" data-purpose="bible-reference" data-reference="Isa 19.1" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Isa%252019.1" rel="noopener" target="_blank"><span data-dcnode-id="580" instrument_node="">Isaiah 19:1</span></a><span data-dcnode-id="578" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="576" data-purpose="bible-reference" data-reference="Ezek 30.3" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Ezek%252030.3" rel="noopener" target="_blank"><span data-dcnode-id="577" instrument_node="">Ezekiel 30:3</span></a><span data-dcnode-id="575" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="573" data-purpose="bible-reference" data-reference="Dan 7.13-14" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Dan%25207.13-14" rel="noopener" target="_blank"><span data-dcnode-id="574" instrument_node="">Daniel 7:13-14</span></a><span data-dcnode-id="572" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="570" data-purpose="bible-reference" data-reference="Joel 2.1-2" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Joel%25202.1-2" rel="noopener" target="_blank"><span data-dcnode-id="571" instrument_node="">Joel 2:1-2</span></a><span data-dcnode-id="569" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="567" data-purpose="bible-reference" data-reference="Nah 1.3" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Nah%25201.3" rel="noopener" target="_blank"><span data-dcnode-id="568" instrument_node="">Nahum 1:3</span></a><span data-dcnode-id="566" instrument_node="">.</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="563" instrument_node="">5. Are Jesus’ miracles to be taken literally? Why? See </span><a class="rtBibleRef" data-dcnode-id="561" data-purpose="bible-reference" data-reference="Matt 11.4-6" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252011.4-6" rel="noopener" target="_blank"><span data-dcnode-id="562" instrument_node="">Matthew 11:4-6</span></a><span data-dcnode-id="560" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="558" data-purpose="bible-reference" data-reference="Luke 7.22-23" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Luke%25207.22-23" rel="noopener" target="_blank"><span data-dcnode-id="559" instrument_node="">Luke 7:22-23</span></a><span data-dcnode-id="557" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="555" data-purpose="bible-reference" data-reference="John 10.25" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%252010.25" rel="noopener" target="_blank"><span data-dcnode-id="556" instrument_node="">John 10:25</span></a><span data-dcnode-id="554" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="552" data-purpose="bible-reference" data-reference="John 10.38" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%252010.38" rel="noopener" target="_blank"><span data-dcnode-id="553" instrument_node="">38</span></a><span data-dcnode-id="551" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="549" data-purpose="bible-reference" data-reference="John 14.11" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%252014.11" rel="noopener" target="_blank"><span data-dcnode-id="550" instrument_node="">John 14:11</span></a><span data-dcnode-id="548" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="546" data-purpose="bible-reference" data-reference="John 15.24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%252015.24" rel="noopener" target="_blank"><span data-dcnode-id="547" instrument_node="">John 15:24</span></a><span data-dcnode-id="545" instrument_node="">. And see </span><a class="rtBibleRef" data-dcnode-id="543" data-purpose="bible-reference" data-reference="2 Pet 1.16" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/2%2520Pet%25201.16" rel="noopener" target="_blank"><span data-dcnode-id="544" instrument_node="">2 Peter 1:16</span></a><span data-dcnode-id="542" instrument_node="">. Isn’t it clear from these passages that Jesus staked his ministry in part on his miracles, affirming that we are to take these literally?</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="539" instrument_node="">6. Did Jesus literally—really and truly—rise from the dead? See </span><a class="scripturized" data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="538" instrument_node="">1 Corinthians 15</span></a><span data-dcnode-id="536" instrument_node=""></span><span data-dcnode-id="535" instrument_node="">, in which Paul makes an impassioned plea that the resurrection was a fact of history attested to by many witnesses, and moreover he stakes all of Christianity on the resurrection.</span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="532" instrument_node="">(For more on Jesus’ divinity, see </span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/search-for-truth/questions-of-christians/how-can-you-say-that-jesus-is-god"><span data-dcnode-id="531" instrument_node="">Jesus is God</span></a><span data-dcnode-id="529" instrument_node=""> and </span><a data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/search-for-truth/contemporary-scholarship"><span data-dcnode-id="528" instrument_node="">Resurrection</span></a><span data-dcnode-id="526" instrument_node="">.)</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="518"><br data-dcnode-id="523"><span data-dcnode-id="522" instrument_node="">
</span><span data-dcnode-id="520" style="text-decoration: underline"><span data-dcnode-id="521" instrument_node="">Varying uses of the same word.</span></span><span data-dcnode-id="519" instrument_node="">&nbsp;In every language even very basic words can have&nbsp;quite different&nbsp;meanings. Let's consider, for example, the words “all” and “whole.” Does “all” always mean “all”? Can such words imply a limited universe as well as an unlimited universe? This is an interesting word study that we could apply to many biblical words.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="516" instrument_node="">1. Is “all” inclusive—that is without exception—in </span><a class="rtBibleRef" data-dcnode-id="514" data-purpose="bible-reference" data-reference="Rom 3.23" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rom%25203.23" rel="noopener" target="_blank"><span data-dcnode-id="515" instrument_node="">Romans 3:23</span></a><span data-dcnode-id="513" instrument_node=""> (“all have sinned and fall short of the glory of God”)? (See section just preceding this verse: vs. 9-19.)</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="510" instrument_node="">2. Did “all”—every last person in Judea—go out to see John the Baptist (</span><a class="rtBibleRef" data-dcnode-id="508" data-purpose="bible-reference" data-reference="Matt 3.5" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%25203.5" rel="noopener" target="_blank"><span data-dcnode-id="509" instrument_node="">Matthew 3:5</span></a><span data-dcnode-id="507" instrument_node="">)?</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="504" instrument_node="">3. Is “all” in </span><a class="rtBibleRef" data-dcnode-id="502" data-purpose="bible-reference" data-reference="1 Tim 2.3-4" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Tim%25202.3-4" rel="noopener" target="_blank"><span data-dcnode-id="503" instrument_node="">1 Timothy 2:3-4</span></a><span data-dcnode-id="501" instrument_node=""> (God desires “all people to be saved”) inclusive? This is an interesting passage because even conservative Christians have differing opinions on it. Most Christians—Arminians and Lutherans—think yes, but given the numerous passages on election/predestination such as </span><a class="scripturized" data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="500" instrument_node="">Ephesians 1</span></a><span data-dcnode-id="498" instrument_node=""></span><span data-dcnode-id="497" instrument_node=""> and </span><a class="scripturized" data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="496" instrument_node="">Romans 8</span></a><span data-dcnode-id="494" instrument_node=""></span><span data-dcnode-id="493" instrument_node="">,9—perhaps it is not inclusive. In context, Paul may have in mind that all groups of people should be included. (See vs. 1, 8). Expressing a Calvinist view, according to footnotes to </span><a class="rtBibleRef" data-dcnode-id="491" data-purpose="bible-reference" data-reference="1 Tim 2.3-4" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Tim%25202.3-4" rel="noopener" target="_blank"><span data-dcnode-id="492" instrument_node="">1 Timothy 2:3-4</span></a><span data-dcnode-id="490" instrument_node=""> in The Reformation Study Bible, “This does not mean that God sovereignly wills every human being to be saved (i.e. that God saves everyone). It may refer to God’s general benevolence in taking no delight in the death of the wicked, or to God’s desire that all types of people be saved (i.e. God does not choose his elect from any single group).”</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="479"><img align="right" alt="sentence diagram Wikimedia Commons" data-dcnode-id="487" height="154" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/assets/images/Sentence%2520diagram%2520Wikimedia%2520Commons.jpg&amp;raw" title="sentence diagram" width="231"><span data-dcnode-id="486" instrument_node="">4. Similarly, see </span><a class="rtBibleRef" data-dcnode-id="484" data-purpose="bible-reference" data-reference="2 Pet 3.9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/2%2520Pet%25203.9" rel="noopener" target="_blank"><span data-dcnode-id="485" instrument_node="">2 Peter 3:9</span></a><span data-dcnode-id="483" instrument_node=""> (God is patient toward you…wishing all to reach repentance”). Here Calvinist theologians argue that “all” refers to the “you” just preceding—which would be referencing the elect Christians to whom Peter is speaking. So, by this understanding, God wants all the elect to be saved. The Reformation Study Bible: “The repentance in view, for the sake of which God delays judgment, is that of God’s people rather than the world at large. God is not willing that any of his elect should perish (</span><a class="rtBibleRef" data-dcnode-id="481" data-purpose="bible-reference" data-reference="John 6.39" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%25206.39" rel="noopener" target="_blank"><span data-dcnode-id="482" instrument_node="">John 6:39</span></a><span data-dcnode-id="480" instrument_node="">).” Hmm. Have you ever thought about this passage in this light?</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="477" instrument_node="">5. Is it inconsistent for the Bible to declare that Christ gave himself a ransom for “all” in </span><a class="rtBibleRef" data-dcnode-id="475" data-purpose="bible-reference" data-reference="1 Tim 2.6" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Tim%25202.6" rel="noopener" target="_blank"><span data-dcnode-id="476" instrument_node="">1 Timothy 2:6</span></a><span data-dcnode-id="474" instrument_node="">, but for “many” in </span><a class="rtBibleRef" data-dcnode-id="472" data-purpose="bible-reference" data-reference="Matt 20.28" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252020.28" rel="noopener" target="_blank"><span data-dcnode-id="473" instrument_node="">Matthew 20:28</span></a><span data-dcnode-id="471" instrument_node="">.</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="468" instrument_node="">6. What does Paul mean in </span><a class="rtBibleRef" data-dcnode-id="466" data-purpose="bible-reference" data-reference="Rom 8.22" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rom%25208.22" rel="noopener" target="_blank"><span data-dcnode-id="467" instrument_node="">Romans 8:22</span></a><span data-dcnode-id="465" instrument_node=""> by the “whole creation” groaning? Many people think that </span><a class="rtBibleRef" data-dcnode-id="463" data-purpose="bible-reference" data-reference="Rom 8.22" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rom%25208.22" rel="noopener" target="_blank"><span data-dcnode-id="464" instrument_node="">Romans 8:22</span></a><span data-dcnode-id="462" instrument_node=""> is about the physical universe which God will restore. But consider </span><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3Dcol%25201%3A6%2C%252023%26version%3DESV"><span data-dcnode-id="461" instrument_node="">Colossians 1:6, 23</span></a><span data-dcnode-id="459" instrument_node=""> where Paul states that the gospel had already been proclaimed by his time to “the whole world/all creation under heaven.” Since the “whole creation” in Colossians is about people and not the physical universe, and is limited to people in the Roman world, could Paul be referring in </span><a class="rtBibleRef" data-dcnode-id="457" data-purpose="bible-reference" data-reference="Rom 8.22" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rom%25208.22" rel="noopener" target="_blank"><span data-dcnode-id="458" instrument_node="">Romans 8:22</span></a><span data-dcnode-id="456" instrument_node=""> to a group of regional people in a covenant context rather than literally all of physical creation? Note also that in </span><a class="rtBibleRef" data-dcnode-id="454" data-purpose="bible-reference" data-reference="Luke 2.1" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Luke%25202.1" rel="noopener" target="_blank"><span data-dcnode-id="455" instrument_node="">Luke 2:1</span></a><span data-dcnode-id="453" instrument_node="">, “all the world” does not mean literally all the world, but rather the Roman world, which in fact is how it is translated in some Bibles.</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="445"><br data-dcnode-id="450"><span data-dcnode-id="449" instrument_node="">
</span><span data-dcnode-id="447" style="text-decoration: underline"><span data-dcnode-id="448" instrument_node="">Biblical prophecy</span></span><span data-dcnode-id="446" instrument_node="">: a closer look at Scripture. Warning—these questions may be particularly challenging. This is only a very brief look at a complicated subject. But it is time that the church took a fresh look at eschatology, in particular the imminency passages in Scripture. Again, our purpose is not to flesh out strong doctrinal positions in this brief article, but to make our readers think about how they have heretofore interpreted the Bible. With prophecy, we need to realize that the Bible must be consistent througout.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="443" instrument_node="">1. Are we living today in the “last days,” as many are telling us? What does Peter (</span><a class="rtBibleRef" data-dcnode-id="441" data-purpose="bible-reference" data-reference="1 Pet 4.7" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Pet%25204.7" rel="noopener" target="_blank"><span data-dcnode-id="442" instrument_node="">1 Peter 4:7</span></a><span data-dcnode-id="440" instrument_node="">) mean by “</span><strong data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">the end of all things is near/at hand</span></strong><span data-dcnode-id="437" instrument_node="">”? (See </span><a class="rtBibleRef" data-dcnode-id="435" data-purpose="bible-reference" data-reference="Acts 2.14-20" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Acts%25202.14-20" rel="noopener" target="_blank"><span data-dcnode-id="436" instrument_node="">Acts 2:14-20</span></a><span data-dcnode-id="434" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="432" data-purpose="bible-reference" data-reference="Heb 1.2" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Heb%25201.2" rel="noopener" target="_blank"><span data-dcnode-id="433" instrument_node="">Hebrews 1:2</span></a><span data-dcnode-id="431" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="429" data-purpose="bible-reference" data-reference="James 5.3" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/James%25205.3" rel="noopener" target="_blank"><span data-dcnode-id="430" instrument_node="">James 5:3</span></a><span data-dcnode-id="428" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="426" data-purpose="bible-reference" data-reference="James 5.9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/James%25205.9" rel="noopener" target="_blank"><span data-dcnode-id="427" instrument_node="">9</span></a><span data-dcnode-id="425" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="423" data-purpose="bible-reference" data-reference="1 Pet 1.20" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Pet%25201.20" rel="noopener" target="_blank"><span data-dcnode-id="424" instrument_node="">1 Peter 1:20</span></a><span data-dcnode-id="422" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="420" data-purpose="bible-reference" data-reference="1 John 2.18" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520John%25202.18" rel="noopener" target="_blank"><span data-dcnode-id="421" instrument_node="">1 John 2:18</span></a><span data-dcnode-id="419" instrument_node="">). Given that Peter, James, John, and the writer of Hebrews all declared that the last days/last hour were in their own generation, and given the study above that shows that </span><em data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">all</span></em><span data-dcnode-id="416" instrument_node=""> can have specific application rather than inclusive application, and given that whatever Peter was speaking about was to happen soon, wouldn’t it be reasonable and consistent that Peter is speaking about something other than the end of the physical universe? Obviously, the physical universe did not come to an end in the imminent time frame that Peter declared. Now notice that Jesus speaks about the close of the age (Greek </span><em data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">aion</span></em><span data-dcnode-id="413" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="411" data-purpose="bible-reference" data-reference="Matt 24.3" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252024.3" rel="noopener" target="_blank"><span data-dcnode-id="412" instrument_node="">Matthew 24:3</span></a><span data-dcnode-id="410" instrument_node="">, et.al.) which would happen in his generation (</span><a class="rtBibleRef" data-dcnode-id="408" data-purpose="bible-reference" data-reference="Matt 24.34" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252024.34" rel="noopener" target="_blank"><span data-dcnode-id="409" instrument_node="">Matthew 24:34</span></a><span data-dcnode-id="407" instrument_node="">)—what age is in question? Wouldn’t this be the close of the Old Covenant age, which is clearly confirmed by </span><a class="rtBibleRef" data-dcnode-id="405" data-purpose="bible-reference" data-reference="Heb 8.13" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Heb%25208.13" rel="noopener" target="_blank"><span data-dcnode-id="406" instrument_node="">Hebrews 8:13</span></a><span data-dcnode-id="404" instrument_node="">? Doesn’t Paul also confirm the time line in </span><a class="rtBibleRef" data-dcnode-id="402" data-purpose="bible-reference" data-reference="1 Cor 10.11" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Cor%252010.11" rel="noopener" target="_blank"><span data-dcnode-id="403" instrument_node="">1 Corinthians 10:11</span></a><span data-dcnode-id="401" instrument_node="">, as well as the writer of Hebrews in </span><a class="rtBibleRef" data-dcnode-id="399" data-purpose="bible-reference" data-reference="Heb 9.26" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Heb%25209.26" rel="noopener" target="_blank"><span data-dcnode-id="400" instrument_node="">Hebrews&nbsp;9:26</span></a><span data-dcnode-id="398" instrument_node="">,&nbsp;that the end of the ages had come upon them? Now see </span><a class="rtBibleRef" data-dcnode-id="396" data-purpose="bible-reference" data-reference="Dan 12.11" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Dan%252012.11" rel="noopener" target="_blank"><span data-dcnode-id="397" instrument_node="">Daniel 12:11</span></a><span data-dcnode-id="395" instrument_node=""> which declared the time of the end would be when burnt offerings ceased—which occurred with the destruction of the temple in 70 AD—once for all ending the Old Covenant age. Doesn’t this all fit together that the last days of which the Bible speaks can reasonably be understood to be the close of the Old Covenant age in 70 AD—rather than the end of the world? (Surprised? This one should generate some fun and healthy discussion!)</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">2. If you think that the “last days” began in the first century and continue to today, where is your biblical support for that view? How could the end of something be longer than the period of which it is the end?</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="389" instrument_node="">3. While this is controversial, consider more closely </span><a class="rtBibleRef" data-dcnode-id="387" data-purpose="bible-reference" data-reference="Matt 24.34" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252024.34" rel="noopener" target="_blank"><span data-dcnode-id="388" instrument_node="">Matthew 24:34</span></a><span data-dcnode-id="386" instrument_node=""> when Jesus says, “Truly, I say to you, this generation will not pass away until all these things take place.” Did he mean in their literal generation? Well, </span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.searchgodsword.org/desk/%3Flanguage%3Den%26query%3Dthis%2Bgeneration%26section%3D2%26translation%3Dnas%26oq%3Dgeneration%26new%3D1%26sr%3D1"><span data-dcnode-id="385" instrument_node="">here</span></a><span data-dcnode-id="383" instrument_node=""> are all the times in the New Testament where we see “this generation.” We see that the term generation/this generation is used in 23 passages in the New Testament outside of the Olivet Discourse (</span><a class="scripturized" data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="382" instrument_node="">Matthew 24</span></a><span data-dcnode-id="380" instrument_node=""></span><span data-dcnode-id="379" instrument_node="">, </span><a class="scripturized" data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="378" instrument_node="">Mark 13</span></a><span data-dcnode-id="376" instrument_node=""></span><span data-dcnode-id="375" instrument_node="">, </span><a class="scripturized" data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www
