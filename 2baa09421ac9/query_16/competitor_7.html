.faithfacts.org/"><span data-dcnode-id="374" instrument_node="">Luke 21</span></a><span data-dcnode-id="372" instrument_node=""></span><span data-dcnode-id="371" instrument_node="">), and every time it clearly means—without debate—or without exception the generation of people alive when Jesus spoke. Isn’t it reasonable to interpret </span><em data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">this generation</span></em><span data-dcnode-id="368" instrument_node=""> the same way in the Olivet Discourse? How can “this generation” in </span><a class="rtBibleRef" data-dcnode-id="366" data-purpose="bible-reference" data-reference="Matt 24.34" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252024.34" rel="noopener" target="_blank"><span data-dcnode-id="367" instrument_node="">Matthew 24:34</span></a><span data-dcnode-id="365" instrument_node=""> be about people thousands of years later? Wouldn’t Jesus have said “some future generation” if that is what he meant?</span></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="362" instrument_node="">4. Has the gospel been proclaimed to the whole world yet per </span><a class="rtBibleRef" data-dcnode-id="360" data-purpose="bible-reference" data-reference="Matt 24.14" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252024.14" rel="noopener" target="_blank"><span data-dcnode-id="361" instrument_node="">Matthew 24:14</span></a><span data-dcnode-id="359" instrument_node="">? See </span><a class="rtBibleRef" data-dcnode-id="357" data-purpose="bible-reference" data-reference="Col 1.6" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Col%25201.6" rel="noopener" target="_blank"><span data-dcnode-id="358" instrument_node="">Colossians 1:6</span></a><span data-dcnode-id="356" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="354" data-purpose="bible-reference" data-reference="Colossians 1.23" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Colossians%25201.23" rel="noopener" target="_blank"><span data-dcnode-id="355" instrument_node="">23</span></a><span data-dcnode-id="353" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="351" data-purpose="bible-reference" data-reference="Rom 1.8" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rom%25201.8" rel="noopener" target="_blank"><span data-dcnode-id="352" instrument_node="">Romans 1:8</span></a><span data-dcnode-id="350" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="348" data-purpose="bible-reference" data-reference="Romans 16.26" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Romans%252016.26" rel="noopener" target="_blank"><span data-dcnode-id="349" instrument_node="">16:26</span></a><span data-dcnode-id="347" instrument_node="">. Chances are that you have been taught that we are still waiting for this to happen, but doesn’t Paul over and over proclaim that this prophecy had already been fulfilled by the time of his writings?</span></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="344" instrument_node="">5. What does John mean in </span><a class="rtBibleRef" data-dcnode-id="342" data-purpose="bible-reference" data-reference="Rev 22.10" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rev%252022.10" rel="noopener" target="_blank"><span data-dcnode-id="343" instrument_node="">Revelation 22:10</span></a><span data-dcnode-id="341" instrument_node=""> when he says, “Do not seal up the words of the prophecy of this book.” See </span><a class="rtBibleRef" data-dcnode-id="339" data-purpose="bible-reference" data-reference="Dan 12.4" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Dan%252012.4" rel="noopener" target="_blank"><span data-dcnode-id="340" instrument_node="">Daniel 12:4</span></a><span data-dcnode-id="338" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="336" data-purpose="bible-reference" data-reference="Daniel 12.9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Daniel%252012.9" rel="noopener" target="_blank"><span data-dcnode-id="337" instrument_node="">9</span></a><span data-dcnode-id="335" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="333" data-purpose="bible-reference" data-reference="Daniel 12.11" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Daniel%252012.11" rel="noopener" target="_blank"><span data-dcnode-id="334" instrument_node="">11</span></a><span data-dcnode-id="332" instrument_node="">. Wouldn’t John likely have Daniel’s prophecies in mind, so that in juxtaposition to Daniel who said to seal up the words of his prophecy for its fulfillment would be a long time off, John says </span><span data-dcnode-id="330" style="text-decoration: underline"><span data-dcnode-id="331" instrument_node="">not</span></span><span data-dcnode-id="329" instrument_node=""> to seal up his prophecy—could it be because the fulfillment was imminent? You are going to resist the obvious implications, but for confirmation of the time line, see </span><a class="rtBibleRef" data-dcnode-id="327" data-purpose="bible-reference" data-reference="Rev 1.1" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rev%25201.1" rel="noopener" target="_blank"><span data-dcnode-id="328" instrument_node="">Revelation 1:1</span></a><span data-dcnode-id="326" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="324" data-purpose="bible-reference" data-reference="Revelation 1.3" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Revelation%25201.3" rel="noopener" target="_blank"><span data-dcnode-id="325" instrument_node="">3</span></a><span data-dcnode-id="323" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="321" data-purpose="bible-reference" data-reference="Revelation 1.7" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Revelation%25201.7" rel="noopener" target="_blank"><span data-dcnode-id="322" instrument_node="">7</span></a><span data-dcnode-id="320" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="318" data-purpose="bible-reference" data-reference="Rev 3.11" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rev%25203.11" rel="noopener" target="_blank"><span data-dcnode-id="319" instrument_node="">Revelation 3:11</span></a><span data-dcnode-id="317" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="315" data-purpose="bible-reference" data-reference="Rev 6.17" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rev%25206.17" rel="noopener" target="_blank"><span data-dcnode-id="316" instrument_node="">Revelation 6:17</span></a><span data-dcnode-id="314" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="312" data-purpose="bible-reference" data-reference="Rev 22.10" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rev%252022.10" rel="noopener" target="_blank"><span data-dcnode-id="313" instrument_node="">Revelation 22:10</span></a><span data-dcnode-id="311" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="309" data-purpose="bible-reference" data-reference="Revelation 22.20" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Revelation%252022.20" rel="noopener" target="_blank"><span data-dcnode-id="310" instrument_node="">20</span></a><span data-dcnode-id="308" instrument_node="">. Can we safely continue to ignore or explain away the imminency of these and numerous other eschatological passages and be faithful to Scripture?</span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="305" instrument_node="">6. See </span><a class="rtBibleRef" data-dcnode-id="303" data-purpose="bible-reference" data-reference="Matt 5.18" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%25205.18" rel="noopener" target="_blank"><span data-dcnode-id="304" instrument_node="">Matthew 5:18</span></a><span data-dcnode-id="302" instrument_node="">. Has heaven and earth passed away? If not, aren’t you still under the law?</span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="299" instrument_node="">7. For those who believe that speaking in tongues today is legitimate, consider </span><a class="rtBibleRef" data-dcnode-id="297" data-purpose="bible-reference" data-reference="1 Cor 13.8-10" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Cor%252013.8-10" rel="noopener" target="_blank"><span data-dcnode-id="298" instrument_node="">1 Corinthians 13:8-10</span></a><span data-dcnode-id="296" instrument_node="">. Speaking in tongues is an issue that divides Christians, and is thus certainly important. Note that it indicates that tongues would cease when </span><em data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">completeness comes</span></em><span data-dcnode-id="293" instrument_node="">. Given the above line of thought about the last days and the end of the ages, hasn’t completeness—at least in an important sense—already come? On the other hand, for those who do </span><span data-dcnode-id="291" style="text-decoration: underline"><span data-dcnode-id="292" instrument_node="">not</span></span><span data-dcnode-id="290" instrument_node=""> believe in speaking in tongues, why don’t you? Has knowledge, which is mentioned along with tongues in this passage, passed away too? (OK. We didn’t say this study would be easy!)</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="276"><br data-dcnode-id="287"><span data-dcnode-id="286" instrument_node="">
</span><span data-dcnode-id="284" style="text-decoration: underline"><span data-dcnode-id="285" instrument_node="">Justification.</span></span><span data-dcnode-id="283" instrument_node=""> Now that we have you stirred up, let’s take a very quick look at another controversial topic—justification, that is how we are saved. New Christians may not be familiar with the debate. The debate is primarily between so-called&nbsp;</span><em data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Calvinists</span></em><span data-dcnode-id="280" instrument_node=""> and </span><em data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Arminians</span></em><span data-dcnode-id="277" instrument_node="">, both camps being named after theologians of hundreds of years ago. Calvinists emphasize that salvation is by God’s election of chosen people, that is—they are predestined to heaven. They also emphasize man’s “radical depravity,” that is man’s complete inability to save himself. Arminians, on the other hand, emphasize man’s free will to choose Christ and thus salvation. Both groups ultimately agree on God’s sovereignty and salvation by grace. A check on the internet will reveal how virulent this debate can sometimes be.</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="274" instrument_node="">There is another group called </span><em data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Semi-Pelagians</span></em><span data-dcnode-id="271" instrument_node="">. (Pelagius was another ancient theologian.) This group believes that we are saved by a combination of God's grace plus man's good&nbsp;works. Catholics and some legalistic Protestants hold to this view. This group would seem to be on the edges of orthodoxy as defined by most Protestants. (</span><em data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Full-Pelagians</span></em><span data-dcnode-id="268" instrument_node=""> believe that we are saved by works alone and not by grace. This view is clearly heretical.) The debate between Calvinists, Arminians, and Semi-Pelagians is potentially resolvable (see </span><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/bible-101/christian-cram-course%23salvation"><span data-dcnode-id="267" instrument_node="">http://www.faithfacts.org/bible-101/christian-cram-course#salvation</span></a><span data-dcnode-id="265" instrument_node="">), but it may not be as easy as each side assumes. It turns out that there are&nbsp;dozens of&nbsp;passages that tend to support each camp. Here are some questions for each camp:</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="262" instrument_node="">1. If you think that man is completely free through his own will to choose things of God, how do you deal with the numerous passages on election, for example </span><a class="rtBibleRef" data-dcnode-id="260" data-purpose="bible-reference" data-reference="John 1.12" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%25201.12" rel="noopener" target="_blank"><span data-dcnode-id="261" instrument_node="">John 1:12</span></a><span data-dcnode-id="259" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="257" data-purpose="bible-reference" data-reference="Rom 8.28-30" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rom%25208.28-30" rel="noopener" target="_blank"><span data-dcnode-id="258" instrument_node="">Romans 8:28-30</span></a><span data-dcnode-id="256" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="254" data-purpose="bible-reference" data-reference="Rom 9.6-24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rom%25209.6-24" rel="noopener" target="_blank"><span data-dcnode-id="255" instrument_node="">Romans 9:6-24</span></a><span data-dcnode-id="253" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="251" data-purpose="bible-reference" data-reference="1 Cor 1.26-28" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Cor%25201.26-28" rel="noopener" target="_blank"><span data-dcnode-id="252" instrument_node="">1 Corinthians 1:26-28</span></a><span data-dcnode-id="250" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="248" data-purpose="bible-reference" data-reference="Eph 1.1-22" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25201.1-22" rel="noopener" target="_blank"><span data-dcnode-id="249" instrument_node="">Ephesians 1:1-22</span></a><span data-dcnode-id="247" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="245" data-purpose="bible-reference" data-reference="Titus 1.1-2" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Titus%25201.1-2" rel="noopener" target="_blank"><span data-dcnode-id="246" instrument_node="">Titus 1:1-2</span></a><span data-dcnode-id="244" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="242" data-purpose="bible-reference" data-reference="1 Pet 1.1-9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Pet%25201.1-9" rel="noopener" target="_blank"><span data-dcnode-id="243" instrument_node="">1 Peter 1:1-9</span></a><span data-dcnode-id="241" instrument_node="">? Come on now, you can’t just ignore these passages.</span></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="225"><span data-dcnode-id="238" instrument_node="">2. If you think that man is only righteous through the righteousness of Christ (“imputed righteousness”), how do you deal with the 241 times that the Bible describes certain people as being </span><em data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">righteous</span></em><span data-dcnode-id="235" instrument_node="">, </span><em data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">blameless</span></em><span data-dcnode-id="232" instrument_node="">, or </span><em data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">upright</span></em><span data-dcnode-id="229" instrument_node=""> (without any mention of imputed righteousness)? You can check these out via a word search at such sites as </span><a data-dcnode-id="227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.searchgodsword.org/"><span data-dcnode-id="228" instrument_node="">http://www.searchgodsword.org/</span></a><span data-dcnode-id="226" instrument_node="">.</span></p><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="207"><span data-dcnode-id="223" instrument_node="">3. If you think that we are saved through faith alone per </span><a class="rtBibleRef" data-dcnode-id="221" data-purpose="bible-reference" data-reference="Eph 2.8-10" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25202.8-10" rel="noopener" target="_blank"><span data-dcnode-id="222" instrument_node="">Ephesians 2:8-10</span></a><span data-dcnode-id="220" instrument_node="">, how do you deal with </span><a class="rtBibleRef" data-dcnode-id="218" data-purpose="bible-reference" data-reference="James 2.14-26" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/James%25202.14-26" rel="noopener" target="_blank"><span data-dcnode-id="219" instrument_node="">James 2:14-26</span></a><span data-dcnode-id="217" instrument_node=""> which states that we are </span><span data-dcnode-id="215" style="text-decoration: underline"><span data-dcnode-id="216" instrument_node="">not</span></span><span data-dcnode-id="214" instrument_node=""> saved by faith alone? (We offer some help in other places on our site: </span><a data-dcnode-id="212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/bible-101/christian-cram-course%23salvation"><span data-dcnode-id="213" instrument_node="">http://www.faithfacts.org/bible-101/christian-cram-course#salvation</span></a><span data-dcnode-id="211" instrument_node=""> and </span><a data-dcnode-id="209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/bible-101/what-is-the-gospel"><span data-dcnode-id="210" instrument_node="">http://www.faithfacts.org/bible-101/what-is-the-gospel</span></a><span data-dcnode-id="208" instrument_node="">.)</span></p><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="162"><span data-dcnode-id="205" instrument_node="">4. If you think that all we have to do to be saved is confess Christ—end of story—how do you deal with the numerous "if" passages and perseverance passages in the Bible, for example </span><a class="rtBibleRef" data-dcnode-id="203" data-purpose="bible-reference" data-reference="Matt 6.15" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%25206.15" rel="noopener" target="_blank"><span data-dcnode-id="204" instrument_node="">Matthew 6:15</span></a><span data-dcnode-id="202" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="200" data-purpose="bible-reference" data-reference="Matt 10.22" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252010.22" rel="noopener" target="_blank"><span data-dcnode-id="201" instrument_node="">Matthew 10:22</span></a><span data-dcnode-id="199" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="197" data-purpose="bible-reference" data-reference="Matt 24.10-13" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252024.10-13" rel="noopener" target="_blank"><span data-dcnode-id="198" instrument_node="">Matthew 24:10-13</span></a><span data-dcnode-id="196" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="194" data-purpose="bible-reference" data-reference="John 15.10" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%252015.10" rel="noopener" target="_blank"><span data-dcnode-id="195" instrument_node="">John 15:10</span></a><span data-dcnode-id="193" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="191" data-purpose="bible-reference" data-reference="John 15.14" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%252015.14" rel="noopener" target="_blank"><span data-dcnode-id="192" instrument_node="">14</span></a><span data-dcnode-id="190" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="188" data-purpose="bible-reference" data-reference="Rom 2.7" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rom%25202.7" rel="noopener" target="_blank"><span data-dcnode-id="189" instrument_node="">Romans 2:7</span></a><span data-dcnode-id="187" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="185" data-purpose="bible-reference" data-reference="Rom 8.13" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rom%25208.13" rel="noopener" target="_blank"><span data-dcnode-id="186" instrument_node="">Romans 8:13</span></a><span data-dcnode-id="184" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="182" data-purpose="bible-reference" data-reference="1 Cor 15.2" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Cor%252015.2" rel="noopener" target="_blank"><span data-dcnode-id="183" instrument_node="">1 Corinthians 15:2</span></a><span data-dcnode-id="181" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="179" data-purpose="bible-reference" data-reference="Col 1.21-23" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Col%25201.21-23" rel="noopener" target="_blank"><span data-dcnode-id="180" instrument_node="">Colossians 1:21-23</span></a><span data-dcnode-id="178" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="176" data-purpose="bible-reference" data-reference="Heb 3.6-14" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Heb%25203.6-14" rel="noopener" target="_blank"><span data-dcnode-id="177" instrument_node="">Hebrews 3:6-14</span></a><span data-dcnode-id="175" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="173" data-purpose="bible-reference" data-reference="Heb 10.26-39" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Heb%252010.26-39" rel="noopener" target="_blank"><span data-dcnode-id="174" instrument_node="">Hebrews 10:26-39</span></a><span data-dcnode-id="172" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="170" data-purpose="bible-reference" data-reference="1 John 1.6-7" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520John%25201.6-7" rel="noopener" target="_blank"><span data-dcnode-id="171" instrument_node="">1 John 1:6-7</span></a><span data-dcnode-id="169" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="167" data-purpose="bible-reference" data-reference="1 John 3.23-24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520John%25203.23-24" rel="noopener" target="_blank"><span data-dcnode-id="168" instrument_node="">1 John 3:23-24</span></a><span data-dcnode-id="166" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="164" data-purpose="bible-reference" data-reference="1 John 4.12-21" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520John%25204.12-21" rel="noopener" target="_blank"><span data-dcnode-id="165" instrument_node="">1 John 4:12-21</span></a><span data-dcnode-id="163" instrument_node="">?</span></p><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="135"><span data-dcnode-id="160" instrument_node="">5. Finally, how should be deal with the passages in the Bible that command us to </span><strong data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">unity</span></strong><span data-dcnode-id="157" instrument_node="">: </span><a class="rtBibleRef" data-dcnode-id="155" data-purpose="bible-reference" data-reference="John 17.20-23" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/John%252017.20-23" rel="noopener" target="_blank"><span data-dcnode-id="156" instrument_node="">John 17:20-23</span></a><span data-dcnode-id="154" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="152" data-purpose="bible-reference" data-reference="Rom 15.5-7" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Rom%252015.5-7" rel="noopener" target="_blank"><span data-dcnode-id="153" instrument_node="">Romans 15:5-7</span></a><span data-dcnode-id="151" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="149" data-purpose="bible-reference" data-reference="1 Cor 1.10" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Cor%25201.10" rel="noopener" target="_blank"><span data-dcnode-id="150" instrument_node="">1 Corinthians 1:10</span></a><span data-dcnode-id="148" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="146" data-purpose="bible-reference" data-reference="Eph 4.1-16" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25204.1-16" rel="noopener" target="_blank"><span data-dcnode-id="147" instrument_node="">Ephesians 4:1-16</span></a><span data-dcnode-id="145" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="143" data-purpose="bible-reference" data-reference="Phil 1.27" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Phil%25201.27" rel="noopener" target="_blank"><span data-dcnode-id="144" instrument_node="">Philippians 1:27</span></a><span data-dcnode-id="142" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="140" data-purpose="bible-reference" data-reference="Col 3.12-16" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Col%25203.12-16" rel="noopener" target="_blank"><span data-dcnode-id="141" instrument_node="">Colossians 3:12-16</span></a><span data-dcnode-id="139" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="137" data-purpose="bible-reference" data-reference="Titus 3.10" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Titus%25203.10" rel="noopener" target="_blank"><span data-dcnode-id="138" instrument_node="">Titus 3:10</span></a><span data-dcnode-id="136" instrument_node="">?</span></p><span data-dcnode-id="134" instrument_node="">
</span><h2 data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">IV. Summary</span></h2><span data-dcnode-id="131" instrument_node="">
</span><p data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">We have introduced some difficult, even controversial topics. And we have not attempted to completely resolve these issues. Our point, to repeat, is to help us Christians open up our thinking enough to challenge our pre-existing assumptions and begin deeper investigations of Holy Scripture. Let’s be a bit more humble. Our goal should be truth over complacency.</span></p><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="125"><br data-dcnode-id="127"><span data-dcnode-id="126" instrument_node="">
We will probably receive some criticism. But our commitment to God’s word is worth it. Christians can debate certain issues vigorously without dividing over them. Iron sharpens iron, and we look forward to hearing from our readers. We are happy to have your feedback. None of us has all the answers. But we are also hopeful that we will hear from a few—especially pastors—who are sympathetic to what we are saying.</span></p><span data-dcnode-id="124" instrument_node="">
</span><p data-dcnode-id="110"><br data-dcnode-id="123"><span data-dcnode-id="122" instrument_node="">
</span><em data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">Oh, Lord. The Sum of your word is truth. It is a lamp to my feet, a light to my path. Grant me understanding. Send out your light and truth; let them lead me.</span></em><span data-dcnode-id="119" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;—from </span><a class="scripturized" data-dcnode-id="117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="118" instrument_node="">Psalm 43</span></a><span data-dcnode-id="116" instrument_node=""></span><span data-dcnode-id="115" instrument_node="">&nbsp;and </span><a class="scripturized" data-dcnode-id="113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfacts.org/"><span data-dcnode-id="114" instrument_node="">Psalm 119</span></a><span data-dcnode-id="112" instrument_node=""></span><span data-dcnode-id="111" instrument_node="">.</span></p><span data-dcnode-id="109" instrument_node="">
