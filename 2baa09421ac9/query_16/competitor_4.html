</span><h2 class="blog-title" data-dcnode-id="1203"><span data-dcnode-id="1207" instrument_node="">
</span><a class="blog-title-link blog-link" data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//heavenlysteps.weebly.com/notes/how-to-interpret-dreams-and-visions"><span data-dcnode-id="1206" instrument_node="">HOW TO INTERPRET DREAMS AND VISIONS</span></a><span data-dcnode-id="1204" instrument_node="">
</span></h2><span data-dcnode-id="1202" instrument_node="">
</span><p class="blog-date" data-dcnode-id="1197"><span data-dcnode-id="1201" instrument_node="">
</span><span class="date-text" data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">
		4/27/2016
	</span></span><span data-dcnode-id="1198" instrument_node="">
</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p class="blog-comments" data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node="">
</span><a class="blog-link" data-dcnode-id="1193" href="#comments"><span data-dcnode-id="1194" instrument_node="">
		3 Comments
	</span></a><span data-dcnode-id="1192" instrument_node="">
</span></p><span data-dcnode-id="1190" instrument_node="">
</span></div><span data-dcnode-id="1188" instrument_node="">
</span><div class="blog-separator" data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">&nbsp;</span></div><span data-dcnode-id="1185" instrument_node="">
</span><div class="blog-content" data-dcnode-id="548"><span data-dcnode-id="1184" instrument_node="">
</span><div class="paragraph" data-dcnode-id="550" style="text-align:justify;"><font color="#060606" data-dcnode-id="945"><span data-dcnode-id="1183" instrument_node="">by Perry Stone</span><br data-dcnode-id="1182"><span data-dcnode-id="1181" instrument_node="">Published by: Charisma House</span><br data-dcnode-id="1180"><br data-dcnode-id="1179"><strong data-dcnode-id="1176"><span data-dcnode-id="1178" instrument_node="">CHAPTER 1: THE LAST DAYS – TIME TO PIERCE THE VEIL</span><br data-dcnode-id="1177"></strong><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node="">With all of the clutter and clamour and mixed voices speaking into our lives, our minds can become cloudy and our understanding fogged with numerous possibilities from which we must choose. This is why at times God will permit a believer to pierce the world of the natural and enter the realm of a dream or a vision so that secret strategies of the enemy can be exposed and the hidden plans of God can be revealed.</span><br data-dcnode-id="1173"><br data-dcnode-id="1172"><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">CHAPTER 2: THE DREAM FACTOR</span></strong><br data-dcnode-id="1169"><span data-dcnode-id="1168" instrument_node="">In the Bible, dreaming dreams is referred to 115 times, and the word vision is used 79 times in the English translation of the Bible. Some suggest that since we have the Bible, there is no longer any need for God to speak through a dream or a vision. However, the Bible itself is clear that as God pours out His Spirit in the last days, the visitations from heaven will be accompanied by both visions and dreams.</span><br data-dcnode-id="1167"><br data-dcnode-id="1166"><span data-dcnode-id="1165" instrument_node="">When believers begin experiencing dreams that hold a cryptic or hidden warning and message, the act of dreaming can be applied to three different categories. First is the occasional dream that has an important message. The second category relates to dreamers who have a natural gift for seeing future events, which is quite unexplainable. The third category of dreamers are those who have received a special gift of revelation and illumination.</span><br data-dcnode-id="1164"><br data-dcnode-id="1163"><strong data-dcnode-id="1160"><span data-dcnode-id="1162" instrument_node="">CHAPTER 3: WHY ARE SOME DREAMS DELAYED IN COMING TO PASS?</span><br data-dcnode-id="1161"></strong><br data-dcnode-id="1159"><span data-dcnode-id="1158" instrument_node="">Then I said, “I will not make mention of Him,</span><br data-dcnode-id="1157"><span data-dcnode-id="1156" instrument_node="">Nor speak anymore in His name.”</span><br data-dcnode-id="1155"><span data-dcnode-id="1154" instrument_node="">But&nbsp;</span><em data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">His word</span></em><span data-dcnode-id="1151" instrument_node="">&nbsp;was in my heart like a burning fire</span><br data-dcnode-id="1150"><span data-dcnode-id="1149" instrument_node="">Shut up in my bones;</span><br data-dcnode-id="1148"><span data-dcnode-id="1147" instrument_node="">I was weary of holding&nbsp;</span><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">it</span></em><span data-dcnode-id="1144" instrument_node="">&nbsp;back,</span><br data-dcnode-id="1143"><span data-dcnode-id="1142" instrument_node="">And I could not.- Jeremiah 20:9</span><br data-dcnode-id="1141"><br data-dcnode-id="1140"><span data-dcnode-id="1139" instrument_node="">Jeremiah was so certain his predictions were true that he purchased the field of his uncle’s son for seventeen shekels of silver and took both a sealed and opened title deed, burying them in the ground in a clay (earthen) jar as a sign that the Jews would one day return to the land and rebuild on the property that would lay dormant during the captivity.</span><br data-dcnode-id="1138"><br data-dcnode-id="1137"><span data-dcnode-id="1136" instrument_node="">We also may experience a unique or encouraging dream, and we may anticipate that it should come to pass immediately. However, the Lord revealed to Abraham at age seventy-five that he would be a father of a nation (Gen. 12:1-4), but the promised son was not born until Abraham was one hundred (Gen. 17:1; 17:21)</span><br data-dcnode-id="1135"><br data-dcnode-id="1134"><span data-dcnode-id="1133" instrument_node="">I have learned by experience that an encouraging dream that reveals God’s will or purpose for you may take years to come to pass, but it is given to you in advance to undergird your faith, helping you to continue holding on to God’s promise for you.</span><br data-dcnode-id="1132"><span data-dcnode-id="1131" instrument_node="">Then the&nbsp;Lord&nbsp;answered me and said:</span><br data-dcnode-id="1130"><span data-dcnode-id="1129" instrument_node="">“Write the vision</span><br data-dcnode-id="1128"><span data-dcnode-id="1127" instrument_node="">And make&nbsp;</span><em data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">it</span></em><span data-dcnode-id="1124" instrument_node="">&nbsp;plain on tablets,</span><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node="">That he may run who reads it.</span><br data-dcnode-id="1121"><span data-dcnode-id="1120" instrument_node="">For the vision&nbsp;</span><em data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">is</span></em><span data-dcnode-id="1117" instrument_node="">&nbsp;yet for an appointed time;</span><br data-dcnode-id="1116"><span data-dcnode-id="1115" instrument_node="">But at the end it will speak, and it will not lie.</span><br data-dcnode-id="1114"><span data-dcnode-id="1113" instrument_node="">Though it tarries, wait for it;</span><br data-dcnode-id="1112"><span data-dcnode-id="1111" instrument_node="">Because it will surely come,</span><br data-dcnode-id="1110"><span data-dcnode-id="1109" instrument_node="">It will not tarry.- Habakkuk 2:2-3</span><br data-dcnode-id="1108"><span data-dcnode-id="1107" instrument_node="">&nbsp;</span><br data-dcnode-id="1106"><span data-dcnode-id="1105" instrument_node="">A tarrying dream is one that you do not see come to pass for an extended, rather long period of time. However, at times you can delay what God is ready to perform in your life because you are fearful of failure, short of the needed provisions to fulfil it, or uncertain of the timing.</span><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">&nbsp;</span><br data-dcnode-id="1102"><span data-dcnode-id="1101" instrument_node="">A positive dream or vision can actually motivate and stir up the desire to see the thing come to pass. It may, however, require a season of patience and careful guarding of our hearts to prevent the dream from dying within us.</span><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node="">&nbsp;</span><br data-dcnode-id="1098"><span data-dcnode-id="1097" instrument_node="">Some delays are actually seasons of preparation to get the junk out of us so the Lord can get His direction in us! We are not always ready to enact God’s will when we think we are.</span><br data-dcnode-id="1096"><span data-dcnode-id="1095" instrument_node="">&nbsp;</span><br data-dcnode-id="1094"><span data-dcnode-id="1093" instrument_node="">If we maintain a teachable spirit in the process of moving toward the favour of God, we will always learn and step up to the next level of revelation for God’s kingdom. Once we think that we have arrived, we can stagnate.</span><br data-dcnode-id="1092"><span data-dcnode-id="1091" instrument_node="">&nbsp;</span><br data-dcnode-id="1090"><span data-dcnode-id="1089" instrument_node="">Therefore do not cast away your confidence, which has great reward.</span><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">36&nbsp;</span></strong><span data-dcnode-id="1086" instrument_node="">For you have need of endurance, so that after you have done the will of God, you may receive the promise:- Hebrews 10:35-36</span><br data-dcnode-id="1085"><span data-dcnode-id="1084" instrument_node="">&nbsp;</span><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">Remember, a delay is not a defeat. Being patient (having long endurance) is a part of the faith walk. In the end, what God has revealed will come to pass, and usually it happens very quickly.</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">&nbsp;</span><br data-dcnode-id="1079"><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">CHAPTER 4: NIGHTMARES AND DIRTY DREAMING</span></strong><br data-dcnode-id="1076"><span data-dcnode-id="1075" instrument_node="">&nbsp;</span><br data-dcnode-id="1074"><span data-dcnode-id="1073" instrument_node="">It appears that often the atmosphere in major cities can be traced to the types of sins, iniquities, and carnal pleasures that dominate or control those living in those particular areas. Sin is more than a three-letter word. It involves carnal thoughts that lead to actions that impact the person and alter the person’s personality, which in return alters the spiritual atmosphere.</span><br data-dcnode-id="1072"><span data-dcnode-id="1071" instrument_node="">&nbsp;</span><br data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node="">Worship brings heaven down to the earth, and evil spirits are unable to remain in the same room where the worshippers are exalting Christ.</span><br data-dcnode-id="1068"><span data-dcnode-id="1067" instrument_node="">&nbsp;</span><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">The renewing of the mind is a daily process. Throughout a common day, there is much clutter and excessive baggage that distracts and fills our thoughts. To remove this means to clear the channels through the “washing of water by the Word” (Eph. 5:26).</span><br data-dcnode-id="1064"><span data-dcnode-id="1063" instrument_node="">Let your children see and hear you pray at home, and not just in church.</span><br data-dcnode-id="1062"><span data-dcnode-id="1061" instrument_node="">&nbsp;</span><br data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node="">God believes in rest. He set a pattern for us all when He rested on the seventh day of Creation (Gen. 2:2) and established a day of rest each week for us to enjoy (Exod. 16:26-29). He also desires that you sleep well and that your dreams be peaceful, not troubling, and that you be instructed by the Word and the Holy Spirit to discern between a carnal nightmare and a true spiritual warning from the Lord.</span><br data-dcnode-id="1058"><span data-dcnode-id="1057" instrument_node="">&nbsp;</span><br data-dcnode-id="1056"><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">CHAPTER 5: FALSE PROPHETS AND FALSE DREAMS</span></strong><br data-dcnode-id="1053"><span data-dcnode-id="1052" instrument_node="">&nbsp;</span><br data-dcnode-id="1051"><span data-dcnode-id="1050" instrument_node="">A true dream or vision will always be in agreement with the written Scriptures and will complement the will of God in a person’s life.</span><br data-dcnode-id="1049"><span data-dcnode-id="1048" instrument_node="">&nbsp;</span><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node="">Any individual who has an inner craving for knowledge, understanding, and wisdom must begin feeding himself or herself with what is called the “milk of the word” (1 Pet. 2:2).</span><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">&nbsp;</span><br data-dcnode-id="1043"><span data-dcnode-id="1042" instrument_node="">We must understand that the word prophesy does not hold just one meaning – to reveal the future. A prophetic word in the church comes from a person who speaks under the divine inspiration to edify, exhort, and comfort believers through the revelation of the Word and the Spirit (v.3). A prophetic word may contain a warning of coming danger.</span><br data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">&nbsp;</span><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">of the sons of Issachar who had understanding of the times, to know what Israel ought to do- 1 Chronicles 12:32</span><br data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node="">&nbsp;</span><br data-dcnode-id="1035"><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">JUDGING THE DREAM</span></strong><br data-dcnode-id="1032"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Judge it by the Word of God</span></strong><br data-dcnode-id="1029"><span data-dcnode-id="1028" instrument_node="">If the dream instructs or implies that you are to act, speak, or live in a way contrary to God’s Word, then it is not from the Lord.</span><br data-dcnode-id="1027"><span data-dcnode-id="1026" instrument_node="">&nbsp;</span><br data-dcnode-id="1025"><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Judge it by the reputation of the dreamer</span></strong><br data-dcnode-id="1022"><span data-dcnode-id="1021" instrument_node="">We need to begin to see people as heaven sees them, not as people perceive them.</span><br data-dcnode-id="1020"><span data-dcnode-id="1019" instrument_node="">The reputation of the minister and the credibility of what he has spoken in the “name of the Lord” must always be considered before accepting any alleged word that God is sending you through a person.</span><br data-dcnode-id="1018"><span data-dcnode-id="1017" instrument_node="">&nbsp;</span><br data-dcnode-id="1016"><span data-dcnode-id="1015" instrument_node="">The closer the body of Christ moves toward the time of the end, the more important the ability to discern will be, for there will not only be false prophets with false words, but also there will arise a higher level of spiritual wickedness that causes a spiritual clash like that between Elijah and the false prophets of Baal!</span><br data-dcnode-id="1014"><span data-dcnode-id="1013" instrument_node="">&nbsp;</span><br data-dcnode-id="1012"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">CHAPTER 6: THE PSYCHIC VOICES VERSUS THE PROPHETIC VISIONS</span></strong><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">&nbsp;</span><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">Alleged contact with the dead is called necromancy.</span><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">&nbsp;</span><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">Witchcraft is nothing to play with and is a very dangerous spiritual bridge over dark waters that a believer should never cross. A believer must rely upon biblical methods to receive spiritual insight, direction, and the path for the future.</span><br data-dcnode-id="1001"><span data-dcnode-id="1000" instrument_node="">&nbsp;</span><br data-dcnode-id="999"><span data-dcnode-id="998" instrument_node="">Believers should never seek the counterfeit methods of men working through familiar spirits but must look to the Word of God and the operation of the Holy Spirit for insight into God’s will and purpose.</span><br data-dcnode-id="997"><span data-dcnode-id="996" instrument_node="">Never doubt God’s ability to speak today and to bring the insight needed for your protection, direction, and inspiration, and never follow counterfeit men and methods that offer deception.</span><br data-dcnode-id="995"><span data-dcnode-id="994" instrument_node="">&nbsp;</span><br data-dcnode-id="993"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">CHAPTER 7: CAN A WARNING DREAM BE ALTERED THROUGH PRAYER?</span></strong><br data-dcnode-id="990"><span data-dcnode-id="989" instrument_node="">&nbsp;</span><br data-dcnode-id="988"><span data-dcnode-id="987" instrument_node="">Many warning dreams deal with future spiritual, emotional, physical, or economic difficulties. In these cases intense prayer can possibly prevent the attack or alter the circumstances.</span><br data-dcnode-id="986"><span data-dcnode-id="985" instrument_node="">&nbsp;</span><br data-dcnode-id="984"><span data-dcnode-id="983" instrument_node="">The act of interceding is when one person stands in place for another to prevent the other person from experiencing judgment, danger, or destruction. An intercessor is one who makes a petition on behalf of another.</span><br data-dcnode-id="982"><span data-dcnode-id="981" instrument_node="">&nbsp;</span><br data-dcnode-id="980"><strong data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">CHAPTER 8: LEARNING TO LISTEN TO YOUR WIFE’S WARNING DREAMS</span></strong><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node="">&nbsp;</span><br data-dcnode-id="975"><span data-dcnode-id="974" instrument_node="">Religion may come across as formal and dry in its approach, but an experience with God brings an encounter with righteousness, peace, and joy in the Holy Spirit (Rom. 14:17).</span><br data-dcnode-id="973"><span data-dcnode-id="972" instrument_node="">&nbsp;</span><br data-dcnode-id="971"><span data-dcnode-id="970" instrument_node="">If an individual has been gifted to hear from the Lord, then he or she must guard against using this gift in the wrong manner or even participating in merchandising of the gift for personal gain, which is forbidden in the Scripture:</span><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">And many will follow their destructive ways, because of whom the way of truth will be blasphemed.&nbsp;</span><span data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">By covetousness they will exploit you with deceptive words; for a long time their judgment has not been idle, and their destruction does</span></span><span data-dcnode-id="965" instrument_node=""> not slumber.- 2 Peter 2:2-3</span><br data-dcnode-id="964"><span data-dcnode-id="963" instrument_node="">&nbsp;</span><br data-dcnode-id="962"><span data-dcnode-id="961" instrument_node="">Whatever form of gift God has imparted to you, follow the Lord with all meekness and humility, seeking to be a blessing to others, and always give God glory for all He performs through you.</span><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">&nbsp;</span><br data-dcnode-id="958"><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">CHAPTER 9: WHAT IT MEANS WHEN DREAMING OF A DEPARTED LOVED ONE</span></strong><br data-dcnode-id="955"><span data-dcnode-id="954" instrument_node="">&nbsp;</span><br data-dcnode-id="953"><span data-dcnode-id="952" instrument_node="">What God allows you to see and hear can be based upon your personal level of spiritual commitment to Him.</span><br data-dcnode-id="951"><span data-dcnode-id="950" instrument_node="">&nbsp;</span><br data-dcnode-id="949"><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">WHY GOD LETS YOU SEE A DEPARTED LOVED ONE</span></strong><br data-dcnode-id="946"></font><ol data-dcnode-id="928"><li data-dcnode-id="941"><strong data-dcnode-id="942"><font color="#060606" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">At times to bring you comfort</span></font></strong></li><li data-dcnode-id="937"><strong data-dcnode-id="938"><font color="#060606" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">To bring back positive memories</span></font></strong></li><li data-dcnode-id="933"><strong data-dcnode-id="934"><font color="#060606" data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">To give you hope for the resurrection</span></font></strong></li><li data-dcnode-id="929"><strong data-dcnode-id="930"><font color="#060606" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">To give you a premonition of death</span></font></strong></li></ol><font color="#060606" data-dcnode-id="861"><span data-dcnode-id="927" instrument_node="">&nbsp;</span><br data-dcnode-id="926"><span data-dcnode-id="925" instrument_node="">When you either dream of a death, including your own, or have a premonition that something is rising over the horizon, the single most significant act for you to engage in is intercessory prayer. As you pray, you may have a strong impression of a certain person, and your spiritual focus becomes that individual. This can be an indication of death for the one you are praying for, and your prayers could prevent a premature departure (Eccles. 7:17).</span><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">&nbsp;</span><br data-dcnode-id="922"><span data-dcnode-id="921" instrument_node="">Whether you experience a vision, a dream, or a premonition, prayer is the key to understanding what is planned and, at times, to prevent a tragedy! The only way to know if a warning is changeable is by seeking the face of the Lord and asking Him to alter and change a dangerous situation of to protect those you have seen in the dream or vision from harm and danger.</span><br data-dcnode-id="920"><span data-dcnode-id="919" instrument_node="">&nbsp;</span><br data-dcnode-id="918"><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">CHAPTER 10: THE LAW OF THE DOUBLE DREAM</span></strong><br data-dcnode-id="915"><span data-dcnode-id="914" instrument_node="">&nbsp;</span><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">Just as the double name caught the attention of the person addressed, so a double dream on the same night is an indicator that the dream is established from the Lord and will come to pass in a short time.</span><br data-dcnode-id="911"><span data-dcnode-id="910" instrument_node="">&nbsp;</span><br data-dcnode-id="909"><span data-dcnode-id="908" instrument_node="">Two&nbsp;</span><em data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">are</span></em><span data-dcnode-id="905" instrument_node="">&nbsp;better than one,</span><br data-dcnode-id="904"><span data-dcnode-id="903" instrument_node="">Because they have a good reward for their labor.</span><br data-dcnode-id="902"><span data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">For if they fall, one will lift up his companion.</span></span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">But woe to him&nbsp;</span><em data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">who is</span></em><span data-dcnode-id="895" instrument_node="">&nbsp;alone when he falls,</span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">For&nbsp;</span><em data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">he has</span></em><span data-dcnode-id="890" instrument_node="">&nbsp;no one to help him up.</span><br data-dcnode-id="889"><span data-dcnode-id="888" instrument_node="">&nbsp;Again, if two lie down together, they will keep warm;</span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">But how can one be warm&nbsp;</span><em data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">alone?</span></em><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">&nbsp;Though one may be overpowered by another, two can withstand him.</span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">And a threefold cord is not quickly broken.- Ecclesiastes 4:9-12</span><br data-dcnode-id="879"><span data-dcnode-id="878" instrument_node="">&nbsp;</span><br data-dcnode-id="877"><span data-dcnode-id="876" instrument_node="">There is a certain level of strength that multiplies when one person joins with another. Spiritual authority is increased together in agreement.</span><br data-dcnode-id="875"><span data-dcnode-id="874" instrument_node="">&nbsp;</span><br data-dcnode-id="873"><strong data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">CHAPTER 11: ANGEL APPEARANCES IN DREAMS</span></strong><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node="">&nbsp;</span><br data-dcnode-id="868"><span data-dcnode-id="867" instrument_node="">I truly believe that one of the reasons that the Lord allows an angel to appear in the form of a normal-looking man in a dream is because the mental, physical, and spiritual responses we would encounter if the Lord showed us the full glory of the cherubim, seraphim, or the living creatures would be too overwhelming for us to handle.</span><br data-dcnode-id="866"><span data-dcnode-id="865" instrument_node="">&nbsp;</span><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node="">The fact is, angels have appeared and do appear in dreams, as indicated in both Testaments! In summary:</span><br data-dcnode-id="862"></font><ul data-dcnode-id="845"><li data-dcnode-id="858"><font color="#060606" data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">God can allow an angelic messenger to appear in a dream or a vision.</span></font></li><li data-dcnode-id="855"><font color="#060606" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">The angel will more often appear in the form of a man and rarely, but occasionally, a woman.</span></font></li><li data-dcnode-id="852"><font color="#060606" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">The angel will often address you as a son or daughter when speaking.</span></font></li><li data-dcnode-id="849"><font color="#060606" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">The angel will inform you that the message has come for you from the Lord.</span></font></li><li data-dcnode-id="846"><font color="#060606" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">The message will also agree with the Word of God.</span></font></li></ul><font color="#060606" data-dcnode-id="729"><span data-dcnode-id="844" instrument_node="">&nbsp;</span><br data-dcnode-id="843"><span data-dcnode-id="842" instrument_node="">God’s angelic messengers are commissioned into ministry activity by the voice of God Himself, and they respond only to the Word of God (Ps. 103:20). Any appearance of an angelic-type visitor in a dream, vision, or possible appearance in human form is completely controlled by the sovereignty of the Almighty and based upon the covenant of His Word.</span><br data-dcnode-id="841"><span data-dcnode-id="840" instrument_node="">&nbsp;</span><br data-dcnode-id="839"><strong data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">CHAPTER 12: WHY THE SYMBOLISM – CAN’T GOD MAKE IT PLAIN?</span></strong><br data-dcnode-id="836"><span data-dcnode-id="835" instrument_node="">&nbsp;</span><br data-dcnode-id="834"><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Emblem</span></strong><br data-dcnode-id="831"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Empire</span></strong><br data-dcnode-id="828"><strong data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Heavenly Symbol</span></strong><br data-dcnode-id="825"><strong data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Parallel Emblem</span></strong><br data-dcnode-id="822"><br data-dcnode-id="821"><span data-dcnode-id="820" instrument_node="">Lion</span><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node="">Babylon</span><br data-dcnode-id="817"><span data-dcnode-id="816" instrument_node="">Lion emblem in heaven</span><br data-dcnode-id="815"><span data-dcnode-id="814" instrument_node="">Leo</span><br data-dcnode-id="813"><br data-dcnode-id="812"><span data-dcnode-id="811" instrument_node="">Ram</span><br data-dcnode-id="810"><span data-dcnode-id="809" instrument_node="">Media-Persia</span><br data-dcnode-id="808"><span data-dcnode-id="807" instrument_node="">Ram emblem in heaven</span><br data-dcnode-id="806"><span data-dcnode-id="805" instrument_node="">Aries</span><br data-dcnode-id="804"><br data-dcnode-id="803"><span data-dcnode-id="802" instrument_node="">Goat</span><br data-dcnode-id="801"><span data-dcnode-id="800" instrument_node="">Greece</span><br data-dcnode-id="799"><span data-dcnode-id="798" instrument_node="">Goat emblem in heaven</span><br data-dcnode-id="797"><span data-dcnode-id="796" instrument_node="">Capricorn</span><br data-dcnode-id="795"><br data-dcnode-id="794"><span data-dcnode-id="793" instrument_node="">Eagle</span><br data-dcnode-id="792"><span data-dcnode-id="791" instrument_node="">Rome/America/Russia</span><br data-dcnode-id="790"><span data-dcnode-id="789" instrument_node="">Eagle emblem in heaven</span><br data-dcnode-id="788"><span data-dcnode-id="787" instrument_node="">Aquila</span><br data-dcnode-id="786"><br data-dcnode-id="785"><span data-dcnode-id="784" instrument_node="">Dragon</span><br data-dcnode-id="783"><span data-dcnode-id="782" instrument_node="">China</span><br data-dcnode-id="781"><span data-dcnode-id="780" instrument_node="">Dragon emblem in heaven</span><br data-dcnode-id="779"><span data-dcnode-id="778" instrument_node="">Draco</span><br data-dcnode-id="777"><br data-dcnode-id="776"><span data-dcnode-id="775" instrument_node="">Bear</span><br data-dcnode-id="774"><span data-dcnode-id="773" instrument_node="">Modern Russia</span><br data-dcnode-id="772"><span data-dcnode-id="771" instrument_node="">Bear emblem in heaven</span><br data-dcnode-id="770"><span data-dcnode-id="769" instrument_node="">Ursa major</span><br data-dcnode-id="768"><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">&nbsp;</span><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">The word seven or seventh is used 583 times in Scripture and is always linked to the things of God, the kingdom of God, or the prophetic future as it relates to God.</span><br data-dcnode-id="763"><span data-dcnode-id="762" instrument_node="">&nbsp;</span><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">Clearly, the number forty is a number of testing and chastisement; Israel wandered through the wilderness for forty years – one year for every day that they doubted God!</span><br data-dcnode-id="759"><span data-dcnode-id="758" instrument_node="">&nbsp;</span><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node="">If you are spiritually sensitive, you should keep a notebook and pen close to you at all times, even when travelling. You may be in the presence of someone who will speak a word during a spiritual or biblical conversation that will be exactly what you need to hear. The best avenue of recall is to write the insight on paper or in a journal.</span><br data-dcnode-id="755"><span data-dcnode-id="754" instrument_node="">&nbsp;</span><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node="">Wisdom later taught that it is not wise to publicly tell all the secret things God reveals to you.</span><br data-dcnode-id="751"><span data-dcnode-id="750" instrument_node="">&nbsp;</span><br data-dcnode-id="749"><span data-dcnode-id="748" instrument_node="">There are times to make information known and times to hide and ponder things in your heart (Luke 2:19).</span><br data-dcnode-id="747"><span data-dcnode-id="746" instrument_node="">&nbsp;</span><br data-dcnode-id="745"><span data-dcnode-id="744" instrument_node="">If you have a believing spouse, it is always good and in order not to hide personal secrets from one another, but to have such a trusting relationship that you can share with each other your personal feelings, desires, dreams, and visions – both visions and dreams of your plans and destiny, and visions or dreams that are messages from heaven.</span><br data-dcnode-id="743"><span data-dcnode-id="742" instrument_node="">&nbsp;</span><br data-dcnode-id="741"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">CHAPTER 13: FOUR TYPES OF SPIRITUAL VISIONS</span></strong><br data-dcnode-id="738"><span data-dcnode-id="737" instrument_node="">&nbsp;</span><br data-dcnode-id="736"><span data-dcnode-id="735" instrument_node="">Among the prophets, a vision was divinely inspired visual scene that a prophet saw during prayer, during sleep, or at times when they were wide-awake. The wide-awake vision is perhaps the most rare and unusual.</span><br data-dcnode-id="734"><span data-dcnode-id="733" instrument_node="">&nbsp;</span><br data-dcnode-id="732"><span data-dcnode-id="731" instrument_node="">There are four different types of words found in Daniel to describe the different methods by which a vision can be received.</span><br data-dcnode-id="730"></font><ol data-dcnode-id="712"><li data-dcnode-id="725"><strong data-dcnode-id="726"><font color="#060606" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">The word chazown- refers to a mental sight, dream, revelation, or oracle.</span></font></strong></li><li data-dcnode-id="721"><strong data-dcnode-id="722"><font color="#060606" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">The word chezev- means sight or vision.</span></font></strong></li><li data-dcnode-id="717"><strong data-dcnode-id="718"><font color="#060606" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">The word mar’ah- translated as “vision”, and is used to describe seeing a reflection in a mirror.</span></font></strong></li><li data-dcnode-id="713"><strong data-dcnode-id="714"><font color="#060606" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">The word mar’eh- means sight or appearance and is used in Daniel 10:1 where Daniel had received a vision but did not have the understanding.</span></font></strong></li></ol><font color="#060606" data-dcnode-id="703"><span data-dcnode-id="711" instrument_node="">&nbsp;</span><br data-dcnode-id="710"><span data-dcnode-id="709" instrument_node="">The prophets were living on a higher dimension of holiness and sanctity, which enabled them to move from speaking to their fellow men to immediately being carried away in the Spirit into the mystical realm of the cosmic heavens and the throne of God.</span><br data-dcnode-id="708"><span data-dcnode-id="707" instrument_node="">&nbsp;</span><br data-dcnode-id="706"><span data-dcnode-id="705" instrument_node="">In our lives a vision is required to bring about all possibilities and desires in our heart. To build anything, including a home, an office, a business, or a marriage, demands that the participants have some form of vision.</span><br data-dcnode-id="704"></font><ul data-dcnode-id="690"><li data-dcnode-id="700"><font color="#060606" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">A visionary has the ability to see something finished before it ever begins.</span></font></li><li data-dcnode-id="697"><font color="#060606" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">A visionary has the strength to call those things that are not as though they already were.</span></font></li><li data-dcnode-id="694"><font color="#060606" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">A visionary continues to believe in the vision despite all opposition and hindrances.</span></font></li><li data-dcnode-id="691"><font color="#060606" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">A visionary never lives in the past, but from past mistakes learn to never repeat them in the future.</span></font></li></ul><font color="#060606" data-dcnode-id="661"><span data-dcnode-id="689" instrument_node="">Where&nbsp;</span><em data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">there is</span></em><span data-dcnode-id="686" instrument_node="">&nbsp;no revelation,&nbsp;the people cast off restraint;</span><br data-dcnode-id="685"><span data-dcnode-id="684" instrument_node="">But happy&nbsp;</span><em data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">is</span></em><span data-dcnode-id="681" instrument_node="">&nbsp;he who keeps the law.- Proverbs 29:18</span><br data-dcnode-id="680"><span data-dcnode-id="679" instrument_node="">&nbsp;</span><br data-dcnode-id="678"><span data-dcnode-id="677" instrument_node="">The purpose of a practical vision is to cause you to pursue your future. A spiritual vision often announces a warning to prepare you for what is coming. Always remember, a warning is never to scare you but to prepare you.</span><br data-dcnode-id="676"><span data-dcnode-id="675" instrument_node="">&nbsp;</span><br data-dcnode-id="674"><strong data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">CHAPTER 14: DREAMS – AMAZING PURPOSE FOR THESE REVELATIONS</span></strong><br data-dcnode-id="671"><span data-dcnode-id="670" instrument_node="">&nbsp;</span><br data-dcnode-id="669"><span data-dcnode-id="668" instrument_node="">Conviction is more than mentally agreeing with a sermon from a pulpit. It is a deep feeling of remorse that leads to repentance.</span><br data-dcnode-id="667"><span data-dcnode-id="666" instrument_node="">&nbsp;</span><br data-dcnode-id="665"><strong data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">FIVE WAYS GOD STILL SPEAKS TO HIS PEOPLE</span></strong><br data-dcnode-id="662"></font><ol data-dcnode-id="652"><li data-dcnode-id="657"><strong data-dcnode-id="658"><font color="#060606" data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">He speaks to the conscience of a person</span></font></strong></li><li data-dcnode-id="653"><strong data-dcnode-id="654"><font color="#060606" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">He speaks to the inner spirit of a person</span></font></strong></li></ol><font color="#060606" data-dcnode-id="649"><span data-dcnode-id="651" instrument_node="">The human spirit is the seat of spiritual influence in the same manner that the physical heart is the center of the human body. In realty, the human spirit is the seat of all emotions and a filter for all thoughts. When the Holy Spirit begins to speak to a believer within the spirit, the believer will experience strong feelings, which some call intuition, that bring a sense of warning, danger, or excitement concerning an individual or a situation.</span><br data-dcnode-id="650"></font><ol data-dcnode-id="644"><li data-dcnode-id="645"><strong data-dcnode-id="646"><font color="#060606" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">He speaks by using others’ wise counsel</span></font></strong></li></ol><font color="#060606" data-dcnode-id="620"><span data-dcnode-id="643" instrument_node="">At times the Holy Spirit can and will bring a person to speak into our situation, one who is speaking not only the will of God but also giving us possible warnings to avoid a pitfall or a trap that could be set by someone close to us.</span><br data-dcnode-id="642"><span data-dcnode-id="641" instrument_node="">&nbsp;</span><br data-dcnode-id="640"><span data-dcnode-id="639" instrument_node="">“The Lord&nbsp;God&nbsp;has given Me</span><br data-dcnode-id="638"><span data-dcnode-id="637" instrument_node="">The tongue of the learned,</span><br data-dcnode-id="636"><span data-dcnode-id="635" instrument_node="">That I should know how to speak</span><br data-dcnode-id="634"><span data-dcnode-id="633" instrument_node="">A word in season to&nbsp;</span><em data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">him who is</span></em><span data-dcnode-id="630" instrument_node="">&nbsp;weary.</span><br data-dcnode-id="629"><span data-dcnode-id="628" instrument_node="">He awakens Me morning by morning,</span><br data-dcnode-id="627"><span data-dcnode-id="626" instrument_node="">He awakens My ear</span><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">To hear as the learned.- Isaiah 50:4</span><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">&nbsp;</span><br data-dcnode-id="621"></font><ol data-dcnode-id="615"><li data-dcnode-id="616"><strong data-dcnode-id="617"><font color="#060606" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">God speaks today using the vocal gifts of the Spirit.</span></font></strong></li></ol><font color="#060606" data-dcnode-id="612"><span data-dcnode-id="614" instrument_node="">The three main vocal gifts mentioned in 1 Corinthians 12 are different kinds of tongues, interpretation of tongues, and prophecy.</span><br data-dcnode-id="613"></font><ol data-dcnode-id="607"><li data-dcnode-id="608"><strong data-dcnode-id="609"><font color="#060606" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">God speaks through dreams and visions</span></font></strong></li></ol><font color="#060606" data-dcnode-id="587"><span data-dcnode-id="606" instrument_node="">&nbsp;</span><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">Your physical man has the capability to hear and dissect information, but we must have a spiritual inner ear to correctly hear the revelation of the Word of God and the voice of the Holy Spirit!</span><br data-dcnode-id="603"><span data-dcnode-id="602" instrument_node="">&nbsp;</span><br data-dcnode-id="601"><span data-dcnode-id="600" instrument_node="">The second purpose of a dream or vision is to turn us from our own direction [“deed”] to the direction of God. A dream or vision can reveal God’s will or plan for your life.</span><br data-dcnode-id="599"><span data-dcnode-id="598" instrument_node="">&nbsp;</span><br data-dcnode-id="597"><span data-dcnode-id="596" instrument_node="">Obedience brings a positive outcome in all instances.</span><br data-dcnode-id="595"><span data-dcnode-id="594" instrument_node="">&nbsp;</span><br data-dcnode-id="593"><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">CONCLUSION- DREAMS AND VISIONS – GOD’S VOICE OF INTIMACY</span></strong><br data-dcnode-id="590"><span data-dcnode-id="589" instrument_node="">These four aspects are found in Genesis 22, where Abraham offered Isaac to God on Mount Moriah.</span><br data-dcnode-id="588"></font><ol data-dcnode-id="574"><li data-dcnode-id="584"><font color="#060606" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">There is the plan of God</span></font></li><li data-dcnode-id="581"><font color="#060606" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">There is the place of God</span></font></li><li data-dcnode-id="578"><font color="#060606" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">There is the provision of God</span></font></li><li data-dcnode-id="575"><font color="#060606" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">There is the purpose of God</span></font></li></ol><font color="#060606" data-dcnode-id="552"><span data-dcnode-id="573" instrument_node="">&nbsp;</span><br data-dcnode-id="572"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">THE PLAN OF GOD</span></strong><br data-dcnode-id="569"><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">THE PLACE OF GOD</span></strong><br data-dcnode-id="566"><span data-dcnode-id="565" instrument_node="">God’s blessing for you will be discovered when you find your place in His purpose.</span><br data-dcnode-id="564"><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">GOD HAS THE PROVISION</span></strong><br data-dcnode-id="561"><span data-dcnode-id="560" instrument_node="">When you have discovered the plan and found the place, there will always be provision at the place, and God will take the battle out of the blessing. The provision is at the place, and the place where you should be is revealed from the Scriptures and through the inward leading of the Holy Spirit and at times through visions and dreams.</span><br data-dcnode-id="559"><strong data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">GOD HAS A PURPOSE</span></strong><br data-dcnode-id="556"><span data-dcnode-id="555" instrument_node="">We are motivated to obey if we know the purpose. However, if we knew why, we would not be walking by faith – we would be walking by sight (2 Cor. 5:7). If the Holy Spirit revealed the details of what was coming to you, both the good and the bad, you would try to speed up the good and would intervene to prevent the bad.</span><br data-dcnode-id="554"><span data-dcnode-id="553" instrument_node="">Our personal lives must be rooted and grounded in the Word of God. Dreams or visions or even prophetic words and spiritual gifts are not intended to replace the inspired Word of God. They serve as complements to the teaching and preaching of the Scriptures and act as tools for the Holy Spirit to assist in directing us during special seasons of our lives.</span></font><br data-dcnode-id="551"></div><span data-dcnode-id="549" instrument_node="">
</span></div><span data-dcnode-id="547" instrument_node="">

</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">
							I recently lost my husband in  a REHAB Center as he had a stroke in late February and had been in the hospital for days.  My attorney who is a christian said he has a witness from the hospital (a ER Doctor) stating he was left severely dehydrated and no food.  I have prayed seeking the Lord to show me what happened and without going into great detail he was neglected by employees causing pneumonia and death.  Our son, Michael, 33 yrs old today has missed his father so much that he plays from his phone telephone recordings just to hear his phone for hours.  I dream of my husband almost every night and soon it will be 4 months since his death 3/20/21.  I'm staying with my sister and brother in law as I lost my home, furnishings , etc.  I have nothing.  But its ok as I have the LORD.  Please pray for my son and I strength to tarry for the LORD is returning soon and we will be reunited with my husband.  God Bless You. 
					</span></p><span data-dcnode-id="401" instrument_node="">
