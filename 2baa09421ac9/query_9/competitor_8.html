 true about Byzantine culture?</span></a></li><li data-dcnode-id="3481"><a data-dcnode-id="3482" href="#How_did_Byzantine_and_Western_Europe_interact_with_each_other_and_with_the_larger_world_from_1800_1500"><span class="toc_number toc_depth_1" data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">32</span></span><span data-dcnode-id="3483" instrument_node=""> How did Byzantine and Western Europe interact with each other and with the larger world from 1800 1500?</span></a></li><li data-dcnode-id="3476"><a data-dcnode-id="3477" href="#How_did_geography_influence_the_capital_of_Byzantine_Empire_Constantinople"><span class="toc_number toc_depth_1" data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">33</span></span><span data-dcnode-id="3478" instrument_node=""> How did geography influence the capital of Byzantine Empire Constantinople?</span></a></li><li data-dcnode-id="3471"><a data-dcnode-id="3472" href="#What_event_helped_bring_learning_innovation_and_trade_back_to_Western_Europe"><span class="toc_number toc_depth_1" data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">34</span></span><span data-dcnode-id="3473" instrument_node=""> What event helped bring learning innovation and trade back to Western Europe?</span></a></li><li data-dcnode-id="3466"><a data-dcnode-id="3467" href="#The_rise_and_fall_of_the_Byzantine_Empire_8211_Leonora_Neville"><span class="toc_number toc_depth_1" data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">35</span></span><span data-dcnode-id="3468" instrument_node=""> The rise and fall of the Byzantine Empire – Leonora Neville</span></a></li><li data-dcnode-id="3461"><a data-dcnode-id="3462" href="#The_Byzantine_Empire_Explained_in_13_Minutes"><span class="toc_number toc_depth_1" data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">36</span></span><span data-dcnode-id="3463" instrument_node=""> The Byzantine Empire Explained in 13 Minutes</span></a></li><li data-dcnode-id="3456"><a data-dcnode-id="3457" href="#Why_did_the_Byzantine_Empire_Collapse"><span class="toc_number toc_depth_1" data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">37</span></span><span data-dcnode-id="3458" instrument_node=""> Why did the Byzantine Empire Collapse?</span></a></li><li data-dcnode-id="3451"><a data-dcnode-id="3452" href="#History_Summarized_Byzantine_Empire_Beginnings"><span class="toc_number toc_depth_1" data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">38</span></span><span data-dcnode-id="3453" instrument_node=""> History Summarized: Byzantine Empire — Beginnings</span></a></li></ul></div><span data-dcnode-id="3448" instrument_node="">
</span><h2 data-dcnode-id="3444"><span data-dcnode-id="3445" id="How_Did_Byzantine_Culture_Influence_Europe"><span data-dcnode-id="3446" id="How Did Byzantine Culture Influence Europe?"><span data-dcnode-id="3447" instrument_node="">How Did Byzantine Culture Influence Europe?</span></span></span></h2><span data-dcnode-id="3443" instrument_node="">
</span><p data-dcnode-id="3436"><span class="ILfuVd" data-dcnode-id="3437"><span class="hgKElc" data-dcnode-id="3438"><span data-dcnode-id="3442" instrument_node="">How did Byzantine culture influence Europe? The </span><b data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">Byzantine Empire incorporated many Greek ideas and culture</span></b><span data-dcnode-id="3439" instrument_node="">. The Byzantine Empire contributed the Hagia Sophia to European culture. … The Hagia Sophia was the great Christian church constructed by Justinian, and it inspired church construction across Europe.</span></span></span></p><span data-dcnode-id="3435" instrument_node="">
</span><h2 data-dcnode-id="3431"><span data-dcnode-id="3432" id="How_did_the_Byzantines_impact_the_culture_of_Europe"><span data-dcnode-id="3433" id="How did the Byzantines impact the culture of Europe?"><span data-dcnode-id="3434" instrument_node="">How did the Byzantines impact the culture of Europe?</span></span></span></h2><span data-dcnode-id="3430" instrument_node="">
</span><div class="wDYxhc" data-dcnode-id="795" data-md="61" style="clear:none"><span data-dcnode-id="3429" instrument_node="">
</span><div aria-level="3" class="LGOjhe" data-attrid="wa:/description" data-dcnode-id="796" data-hveid="CA4QAA" role="heading"><span class="ILfuVd" data-dcnode-id="3423"><span class="hgKElc" data-dcnode-id="3424"><span data-dcnode-id="3428" instrument_node="">The Byzantine Empire influenced many cultures, primarily </span><b data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">due to its role in shaping Christian Orthodoxy</span></b><span data-dcnode-id="3425" instrument_node="">. The modern-day Eastern Orthodox Church is the second largest Christian church in the world. Orthodoxy is central to the history and societies of Greece, Bulgaria, Russia, Serbia, and other countries.</span></span></span><p data-dcnode-id="3422"></p><span data-dcnode-id="3421" instrument_node="">
</span><h2 data-dcnode-id="3417"><span data-dcnode-id="3418" id="How_did_the_Byzantines_influence_Eastern_Europe"><span data-dcnode-id="3419" id="How did the Byzantines influence Eastern Europe?"><span data-dcnode-id="3420" instrument_node="">How did the Byzantines influence Eastern Europe?</span></span></span></h2><span data-dcnode-id="3416" instrument_node="">
</span><p data-dcnode-id="3410"><span class="hgKElc" data-dcnode-id="3411"><span data-dcnode-id="3415" instrument_node="">Eastern Europe, the region of Europe that is east of Germany, was heavily influenced by the Byzantine Empire. … The Church also </span><b data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">introduced literacy to</span></b><span data-dcnode-id="3412" instrument_node=""> the region and even created a new alphabet, the Cyrillic Script, in order to translate works into the Slavic languages.</span></span></p><span data-dcnode-id="3409" instrument_node="">
</span><h2 data-dcnode-id="3405"><span data-dcnode-id="3406" id="In_what_ways_did_Byzantine_culture_influence_other_people8217s"><span data-dcnode-id="3407" id="In what ways did Byzantine culture influence other people's?"><span data-dcnode-id="3408" instrument_node="">In what ways did Byzantine culture influence other people’s?</span></span></span></h2><span data-dcnode-id="3404" instrument_node="">
</span><p data-dcnode-id="3398"><span class="hgKElc" data-dcnode-id="3399"><span data-dcnode-id="3403" instrument_node="">They also extended Roman achievements in engineering and law. These aspects of civilization were reawakened in Western Europe at the end of the Middle Ages and helped bring about the Renaissance. Another important contribution of the Byzantines is their </span><b data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">influence on the development of religion and culture in Russia</span></b><span data-dcnode-id="3400" instrument_node="">.</span></span></p><span data-dcnode-id="3397" instrument_node="">
</span><h2 data-dcnode-id="3393"><span data-dcnode-id="3394" id="What_contributions_did_the_Byzantines_make_to_the_development_of_Europe"><span data-dcnode-id="3395" id="What contributions did the Byzantines make to the development of Europe?"><span data-dcnode-id="3396" instrument_node="">What contributions did the Byzantines make to the development of Europe?</span></span></span></h2><span data-dcnode-id="3392" instrument_node="">
</span><p data-dcnode-id="3386"><span class="hgKElc" data-dcnode-id="3387"><span data-dcnode-id="3391" instrument_node="">How did Christianity influence society in Byzantium and eastern Europe? The Byzantium culture made many important aesthetic contributions to the art of Europe. Byzantium also </span><b data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">spread their faith and the Cyrillic alphabet into eastern Europe</span></b><span data-dcnode-id="3388" instrument_node="">.</span></span></p><span data-dcnode-id="3385" instrument_node="">
</span><h2 data-dcnode-id="3381"><span data-dcnode-id="3382" id="Why_was_the_Byzantine_Empire_so_important_to_Western_Europe"><span data-dcnode-id="3383" id="Why was the Byzantine Empire so important to Western Europe?"><span data-dcnode-id="3384" instrument_node="">Why was the Byzantine Empire so important to Western Europe?</span></span></span></h2><span data-dcnode-id="3380" instrument_node="">
</span><p data-dcnode-id="3374"><span class="hgKElc" data-dcnode-id="3375"><span data-dcnode-id="3379" instrument_node="">To the Medieval world, the Byzantines were </span><b data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">the buffer of Christianity</span></b><span data-dcnode-id="3376" instrument_node=""> that separated them from the Muslim World, Mongols, and other invaders. … Specifically to trade, Europeans relied on the Christian Byzantine emperors to trade with the East and provide Europe with goods from the Silk Roads.</span></span></p><span data-dcnode-id="3373" instrument_node="">
</span><h2 data-dcnode-id="3369"><span data-dcnode-id="3370" id="How_did_Byzantine_influence_Russia_and_Eastern_Europe"><span data-dcnode-id="3371" id="How did Byzantine influence Russia and Eastern Europe?"><span data-dcnode-id="3372" instrument_node="">How did Byzantine influence Russia and Eastern Europe?</span></span></span></h2><span data-dcnode-id="3368" instrument_node="">
</span><p data-dcnode-id="3362"><span class="hgKElc" data-dcnode-id="3363"><span data-dcnode-id="3367" instrument_node="">The Byzantines traded greatly with Russia. </span><b data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">Trade encouraged cultural diffusion</span></b><span data-dcnode-id="3364" instrument_node="">. The Russians built their churches to look like Byzantine churches. In addition, the absolute power held by Byzantine emperors became a model for future Russian rulers.</span></span></p><span data-dcnode-id="3361" instrument_node="">
</span><h2 data-dcnode-id="3357"><span data-dcnode-id="3358" id="How_did_Byzantine_culture_influence_Russian_culture"><span data-dcnode-id="3359" id="How did Byzantine culture influence Russian culture?"><span data-dcnode-id="3360" instrument_node="">How did Byzantine culture influence Russian culture?</span></span></span></h2><span data-dcnode-id="3356" instrument_node="">
</span><p data-dcnode-id="3350"><span class="hgKElc" data-dcnode-id="3351"><span data-dcnode-id="3355" instrument_node="">The Byzantine Empire influenced </span><b data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">Russia through its religion — Eastern Orthodox Christianity</span></b><span data-dcnode-id="3352" instrument_node=""> — which Russia adopted. It also influenced Russia’s art and architecture, as many Byzantine artists moved to Moscow following the fall of Constantinople.</span></span></p><span data-dcnode-id="3349" instrument_node="">

</span><p data-dcnode-id="3338"><span class="hgKElc" data-dcnode-id="3339"><span data-dcnode-id="3343" instrument_node="">Byzantine culture spread to eastern Europe mainly </span><b data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">through trade</span></b><span data-dcnode-id="3340" instrument_node="">.</span></span></p><span data-dcnode-id="3337" instrument_node="">

</span><p data-dcnode-id="3314"><span class="hgKElc" data-dcnode-id="3315"><span data-dcnode-id="3319" instrument_node="">Byzantine art influenced Western culture, </span><b data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">Byzantine scholars preserved many Greek historical work and took it to the west</span></b><span data-dcnode-id="3316" instrument_node="">, and for centuries Justinian’s code has influenced European law. … Newly threatened by Islamic power, Muslims capture basically the whole Byzantine Empire with the exception of Constantinople.</span></span></p><span data-dcnode-id="3313" instrument_node="">

</span><p data-dcnode-id="3302"><span class="hgKElc" data-dcnode-id="3303"><span data-dcnode-id="3307" instrument_node="">The Byzantine Empire with its Eastern Orthodox religion and Cyrillic alphabet had the greatest influence on </span><b data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">Russia’s</span></b><span data-dcnode-id="3304" instrument_node=""> development.</span></span></p><span data-dcnode-id="3301" instrument_node="">

</span><p data-dcnode-id="3290"><span class="hgKElc" data-dcnode-id="3291"><span data-dcnode-id="3295" instrument_node="">The Byzantine Empire made great contributions to civilization: </span><b data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">Greek language and learning were preserved for posterity</span></b><span data-dcnode-id="3292" instrument_node="">; the Roman imperial system was continued and Roman law codified; the Greek Orthodox church converted some Slavic peoples and fostered the development of a splendid new art dedicated to the …</span></span></p><span data-dcnode-id="3289" instrument_node="">

</span><p data-dcnode-id="3278"><span class="hgKElc" data-dcnode-id="3279"><span data-dcnode-id="3283" instrument_node="">Some of the cultural contributions of the Byzantine Empire include </span><b data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">its architecture, its legal code, its religious iconography</span></b><span data-dcnode-id="3280" instrument_node="">, and its use of the Greek language in its writings.</span></span></p><span data-dcnode-id="3277" instrument_node="">

</span><p data-dcnode-id="3217"><span class="hgKElc" data-dcnode-id="3218"><span data-dcnode-id="3222" instrument_node="">Although the people of the Byzantine Empire considered themselves Roman, the East was influenced by </span><b data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">Greek culture</span></b><span data-dcnode-id="3219" instrument_node="">, rather than the Latin of the West. People spoke Greek and wore Greek-styled clothing. The emperors and empresses wore beautiful silk and purple-dyed clothing, with expensive slippers.</span></span></p><span data-dcnode-id="3216" instrument_node="">
</span><h2 data-dcnode-id="3212"><span data-dcnode-id="3213" id="How_did_Byzantine_influence_the_West"><span data-dcnode-id="3214" id="How did Byzantine influence the West?"><span data-dcnode-id="3215" instrument_node="">How did Byzantine influence the West?</span></span></span></h2><span data-dcnode-id="3211" instrument_node="">
</span><p data-dcnode-id="3205"><span class="hgKElc" data-dcnode-id="3206"><span data-dcnode-id="3210" instrument_node="">The Byzantine Empire had </span><b data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">kept Greek and Roman culture alive</span></b><span data-dcnode-id="3207" instrument_node=""> for nearly a thousand years after the fall of the Roman Empire in the west. … The Byzantine Empire had also acted as a buffer between western Europe and the conquering armies of Islam.</span></span></p><span data-dcnode-id="3204" instrument_node="">
</span><h2 data-dcnode-id="3200"><span data-dcnode-id="3201" id="What_cultural_factors_separated_the_Byzantine_Empire_from_Western_Europe"><span data-dcnode-id="3202" id="What cultural factors separated the Byzantine Empire from Western Europe?"><span data-dcnode-id="3203" instrument_node="">What cultural factors separated the Byzantine Empire from Western Europe?</span></span></span></h2><span data-dcnode-id="3199" instrument_node="">
</span><p data-dcnode-id="3193"><span class="hgKElc" data-dcnode-id="3194"><span data-dcnode-id="3198" instrument_node="">What cultural factors separated the Byzantine empire from Western Europe? </span><b data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">Terrible illness caused many deaths which weekend the empire, many enemies attacked the empire</span></b><span data-dcnode-id="3195" instrument_node="">, started to shrink, only included capital city and lands in the Balkans.</span></span></p><span data-dcnode-id="3192" instrument_node="">
</span><h2 data-dcnode-id="3188"><span data-dcnode-id="3189" id="How_was_the_Byzantine_Empire_different_from_Western_Europe"><span data-dcnode-id="3190" id="How was the Byzantine Empire different from Western Europe?"><span data-dcnode-id="3191" instrument_node="">How was the Byzantine Empire different from Western Europe?</span></span></span></h2><span data-dcnode-id="3187" instrument_node="">
</span><p data-dcnode-id="3181"><span class="hgKElc" data-dcnode-id="3182"><span data-dcnode-id="3186" instrument_node="">How did the histories of the Byzantine Empire and Western Europe differ during the era of third-wave civilizations? </span><b data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">Western Europe collapsed politically in the fifth century</span></b><span data-dcnode-id="3183" instrument_node="">, never to come together again as a single political entity, whereas Byzantium survived as a single political entity throughout the period.</span></span></p><span data-dcnode-id="3180" instrument_node="">
</span><h2 data-dcnode-id="3176"><span data-dcnode-id="3177" id="How_important_was_Byzantine_influence_on_Russia"><span data-dcnode-id="3178" id="How important was Byzantine influence on Russia?"><span data-dcnode-id="3179" instrument_node="">How important was Byzantine influence on Russia?</span></span></span></h2><span data-dcnode-id="3175" instrument_node="">
</span><p data-dcnode-id="3169"><span class="hgKElc" data-dcnode-id="3170"><span data-dcnode-id="3174" instrument_node="">From a Russian perspective, the most important legacy of the Byzantine Empire was </span><b data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">its impact on the development of Russian society and culture</span></b><span data-dcnode-id="3171" instrument_node="">, which followed the acceptance in the lOth century of the Orthodox religion by the ancestors of modern-day Russians.</span></span></p><span data-dcnode-id="3168" instrument_node="">
</span><h2 data-dcnode-id="3164"><span data-dcnode-id="3165" id="What_was_the_biggest_influence_of_Byzantine_Greek_culture_on_Russia"><span data-dcnode-id="3166" id="What was the biggest influence of Byzantine Greek culture on Russia?"><span data-dcnode-id="3167" instrument_node="">What was the biggest influence of Byzantine Greek culture on Russia?</span></span></span></h2><span data-dcnode-id="3163" instrument_node="">
</span><p data-dcnode-id="3157"><span class="hgKElc" data-dcnode-id="3158"><span data-dcnode-id="3162" instrument_node="">The Byzantine Empire’s biggest influence was on Russia. </span><b data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">Byzantine missionaries spread the Orthodox Christian religion to Russia</span></b><span data-dcnode-id="3159" instrument_node="">, and also adapted the Greek alphabet to provided the Slavic speaking peoples a written language called Cyrillic, after the monk Cyril who helped create it.</span></span></p><span data-dcnode-id="3156" instrument_node="">
</span><h2 data-dcnode-id="3152"><span data-dcnode-id="3153" id="What_cultural_ideas_and_traditions_did_Rus_borrow_from_the_Byzantine_Empire_What_impact_did_these_borrowings_have_on_the_development_of_Russia"><span data-dcnode-id="3154" id="What cultural ideas and traditions did Rus borrow from the Byzantine Empire What impact did these borrowings have on the development of Russia?"><span data-dcnode-id="3155" instrument_node="">What cultural ideas and traditions did Rus borrow from the Byzantine Empire What impact did these borrowings have on the development of Russia?</span></span></span></h2><span data-dcnode-id="3151" instrument_node="">
</span><p data-dcnode-id="3145"><span class="hgKElc" data-dcnode-id="3146"><span data-dcnode-id="3150" instrument_node="">Like many new civilizations, Rus borrowed from its older, sophisticated neighbor. Among the borrowings were Byzantine architectural styles, </span><b data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">the Cyrillic alphabet, use of icons, monastic tradition stressing prayer and service, and political ideals of imperial control of the Church</span></b><span data-dcnode-id="3147" instrument_node="">, all of which became part of Rus.</span></span></p><span data-dcnode-id="3144" instrument_node="">
</span><h2 data-dcnode-id="3140"><span data-dcnode-id="3141" id="What_was_the_most_dramatic_example_of_the_influence_of_the_Byzantine_Empire"><span data-dcnode-id="3142" id="What was the most dramatic example of the influence of the Byzantine Empire?"><span data-dcnode-id="3143" instrument_node="">What was the most dramatic example of the influence of the Byzantine Empire?</span></span></span></h2><span data-dcnode-id="3139" instrument_node="">
</span><p data-dcnode-id="3133"><span class="hgKElc" data-dcnode-id="3134"><span data-dcnode-id="3138" instrument_node="">Because the Byzantine Empire was largely Greek in language and culture, what was the biggest influence of Byzantine/Greek culture on Russia? </span><b data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">Kiev became the center of cultural exchange</span></b><span data-dcnode-id="3135" instrument_node="">.</span></span></p><span data-dcnode-id="3132" instrument_node="">
</span><h2 data-dcnode-id="3128"><span data-dcnode-id="3129" id="In_what_ways_did_Byzantine_culture_and_society_influence_Kievan_society"><span data-dcnode-id="3130" id="In what ways did Byzantine culture and society influence Kievan society?"><span data-dcnode-id="3131" instrument_node="">In what ways did Byzantine culture and society influence Kievan society?</span></span></span></h2><span data-dcnode-id="3127" instrument_node="">
</span><p data-dcnode-id="3121"><span class="hgKElc" data-dcnode-id="3122"><span data-dcnode-id="3126" instrument_node="">As trade was the foundational basis for the Kievan Rus’, it also allowed the Kievan Rus’ to thrive. </span><b data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">Contact and trade between Kiev and Constantinople increased</span></b><span data-dcnode-id="3123" instrument_node="">. Kiev became a major trading hub in eastern Europe, and other than tangible goods, religion from the Byzantine Empire found its way into Kiev.</span></span></p><span data-dcnode-id="3120" instrument_node="">
</span><h2 data-dcnode-id="3116"><span data-dcnode-id="3117" id="How_did_the_Byzantine_Empire_affect_Slavic_society"><span data-dcnode-id="3118" id="How did the Byzantine Empire affect Slavic society?"><span data-dcnode-id="3119" instrument_node="">How did the Byzantine Empire affect Slavic society?</span></span></span></h2><span data-dcnode-id="3115" instrument_node="">
</span><p data-dcnode-id="3109"><span class="hgKElc" data-dcnode-id="3110"><span data-dcnode-id="3114" instrument_node="">Byzantine missionaries from </span><b data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">the Orthodox Church spread their religion north to the Slavs</span></b><span data-dcnode-id="3111" instrument_node="">. … To help themselves spread their religion they developed an alphabet for the Slavic languages called the Cyrillic alphabet. The Cyrillic alphabet allowed Slavic peoples to read the Bible in their own language.</span></span></p><span data-dcnode-id="3108" instrument_node="">
</span><h2 data-dcnode-id="3104"><span data-dcnode-id="3105" id="How_was_Byzantine_culture_spread"><span data-dcnode-id="3106" id="How was Byzantine culture spread?"><span data-dcnode-id="3107" instrument_node="">How was Byzantine culture spread?</span></span></span></h2><span data-dcnode-id="3103" instrument_node="">
</span><p data-dcnode-id="3097"><span class="hgKElc" data-dcnode-id="3098"><span data-dcnode-id="3102" instrument_node="">Byzantine forms were spread </span><b data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">by trade and conquest to Italy and Sicily</span></b><span data-dcnode-id="3099" instrument_node="">, where they persisted in modified form through the 12th century, and became formative influences on Italian Renaissance art.</span></span></p><span data-dcnode-id="3096" instrument_node="">
</span><h2 data-dcnode-id="3092"><span data-dcnode-id="3093" id="What_helped_the_Byzantines_create_a_cultural_identity_separate_from_that_of_the_Roman_Empire"><span data-dcnode-id="3094" id="What helped the Byzantines create a cultural identity separate from that of the Roman Empire?"><span data-dcnode-id="3095" instrument_node="">What helped the Byzantines create a cultural identity separate from that of the Roman Empire?</span></span></span></h2><span data-dcnode-id="3091" instrument_node="">
</span><p data-dcnode-id="3085"><span class="hgKElc" data-dcnode-id="3086"><span data-dcnode-id="3090" instrument_node="">Two of these changes were </span><b data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">the new capital at Byzantium and the new Christian character of the empire (Constantine legalized Christianity and eventually converted himself)</span></b><span data-dcnode-id="3087" instrument_node="">. These changes eventually created a distinct culture which would characterize the Byzantine Empire after the fall of the Western Roman Empire in 476.</span></span></p><span data-dcnode-id="3084" instrument_node="">
