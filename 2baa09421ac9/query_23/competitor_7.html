</span><div class="article-content retro-folders" data-dcnode-id="951" id="main-article"><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1342"></p><div class="quoteright" data-dcnode-id="1339" style="width:350px;"><div class="lazy_load_img_box" data-dcnode-id="1340" style="padding-top:75.14%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/prince_of_persia_2.jpg" border="0" class="embeddedimage" data-dcnode-id="1341" height="263" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/prince_of_persia_2.jpg&amp;raw" width="350"></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1333"><span class="ad-caption" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1334" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="1301"><em data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Prince of Persia 2: The Shadow and the Flame</span></em><span data-dcnode-id="1330" instrument_node=""> is the second installment in the </span><em data-dcnode-id="1327"><a class="twikilink" data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/PrinceOfPersia" title="/pmwiki/pmwiki.php/Franchise/PrinceOfPersia"><span data-dcnode-id="1329" instrument_node="">Prince of Persia</span></a></em><span data-dcnode-id="1326" instrument_node=""> series. Originally released by </span><a class="twikilink" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/BroderbundSoftware" title="/pmwiki/pmwiki.php/Creator/BroderbundSoftware"><span data-dcnode-id="1325" instrument_node="">Brøderbund Software</span></a><span data-dcnode-id="1323" instrument_node=""> in 1993 for the </span><a class="twikilink" data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/IBMPersonalComputer" title="/pmwiki/pmwiki.php/UsefulNotes/IBMPersonalComputer"><span data-dcnode-id="1322" instrument_node="">IBM Personal Computer</span></a><span data-dcnode-id="1320" instrument_node="">, it was ported over the next few years to the </span><a class="twikilink" data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/AppleMacintosh" title="/pmwiki/pmwiki.php/UsefulNotes/AppleMacintosh"><span data-dcnode-id="1319" instrument_node="">Apple Macintosh</span></a><span data-dcnode-id="1317" instrument_node=""> and in Japan to the </span><a class="twikilink" data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/PC98" title="/pmwiki/pmwiki.php/UsefulNotes/PC98"><span data-dcnode-id="1316" instrument_node="">PC-98</span></a><span data-dcnode-id="1314" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/FMTowns" title="/pmwiki/pmwiki.php/UsefulNotes/FMTowns"><span data-dcnode-id="1313" instrument_node="">FM Towns</span></a><span data-dcnode-id="1311" instrument_node="">. A </span><a class="twikilink" data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/SuperNintendoEntertainmentSystem" title="/pmwiki/pmwiki.php/UsefulNotes/SuperNintendoEntertainmentSystem"><span data-dcnode-id="1310" instrument_node="">Super Nintendo Entertainment System</span></a><span data-dcnode-id="1308" instrument_node=""> version was released by </span><a class="twikilink" data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TitusSoftware" title="/pmwiki/pmwiki.php/Creator/TitusSoftware"><span data-dcnode-id="1307" instrument_node="">Titus Software</span></a><span data-dcnode-id="1305" instrument_node=""> in 1995; a </span><a class="twikilink" data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/SegaGenesis" title="/pmwiki/pmwiki.php/UsefulNotes/SegaGenesis"><span data-dcnode-id="1304" instrument_node="">Sega Genesis</span></a><span data-dcnode-id="1302" instrument_node=""> version never got past the prototype stage.</span></p><p data-dcnode-id="1289"><span data-dcnode-id="1300" instrument_node="">The story picks up from where </span><em data-dcnode-id="1297"><a class="twikilink" data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/PrinceOfPersia1" title="/pmwiki/pmwiki.php/VideoGame/PrinceOfPersia1"><span data-dcnode-id="1299" instrument_node="">Prince of Persia</span></a></em><span data-dcnode-id="1296" instrument_node=""> left off (actually, it clarified the first installment's story in its </span><a class="twikilink" data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OpeningNarration" title="/pmwiki/pmwiki.php/Main/OpeningNarration"><span data-dcnode-id="1295" instrument_node="">Opening Narration</span></a><span data-dcnode-id="1293" instrument_node="">). The gameplay follows the format established by its 2D predecessor, with mostly new enemies, all new </span><a class="twikilink" data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BoobyTrap" title="/pmwiki/pmwiki.php/Main/BoobyTrap"><span data-dcnode-id="1292" instrument_node="">Booby Traps</span></a><span data-dcnode-id="1290" instrument_node=""> and greater variety in puzzles.</span></p><p data-dcnode-id="1279"><span data-dcnode-id="1288" instrument_node="">Not to be confused with </span><em data-dcnode-id="1285"><a class="twikilink" data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/PrinceOfPersiaWarriorWithin" title="/pmwiki/pmwiki.php/VideoGame/PrinceOfPersiaWarriorWithin"><span data-dcnode-id="1287" instrument_node="">Prince of Persia: Warrior Within</span></a></em><span data-dcnode-id="1284" instrument_node="">, the unnumbered sequel to </span><em data-dcnode-id="1281"><a class="twikilink" data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/PrinceOfPersiaTheSandsOfTime" title="/pmwiki/pmwiki.php/VideoGame/PrinceOfPersiaTheSandsOfTime"><span data-dcnode-id="1283" instrument_node="">The Sands of Time</span></a></em><span data-dcnode-id="1280" instrument_node="">.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1273"><span class="ad-caption" data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1274" id="proper-ad-tvtropes_mobile_ad_2"></div></div><hr data-dcnode-id="1272"><h2 data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Tropes appearing in this game:</span></h2><ul data-dcnode-id="954"><li data-dcnode-id="1265"><span data-dcnode-id="1269" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActionizedSequel" title="/pmwiki/pmwiki.php/Main/ActionizedSequel"><span data-dcnode-id="1268" instrument_node="">Actionized Sequel</span></a><span data-dcnode-id="1266" instrument_node="">: This game is far more combat-driven than the first one, often involving fighting several guards at once, which never happened in the previous game.</span></li><li data-dcnode-id="1257"><span data-dcnode-id="1264" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AncestralWeapon" title="/pmwiki/pmwiki.php/Main/AncestralWeapon"><span data-dcnode-id="1263" instrument_node="">Ancestral Weapon</span></a><span data-dcnode-id="1261" instrument_node="">: The Prince is informed in a </span><a class="twikilink" data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CutScene" title="/pmwiki/pmwiki.php/Main/CutScene"><span data-dcnode-id="1260" instrument_node="">Cut Scene</span></a><span data-dcnode-id="1258" instrument_node=""> that the sword he found near the end of the ruins is his father's sword.</span></li><li data-dcnode-id="1252"><span data-dcnode-id="1256" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures" title="/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures"><span data-dcnode-id="1255" instrument_node="">Anti-Frustration Features</span></a><span data-dcnode-id="1253" instrument_node="">: Just in case you're in a blank thinking how to get the Flame in the final Temple level, if you die in the same screen the Flame is present, the Shadow will automatically rise up after a few seconds and steals the Flame. You can manually turn into the Shadow and steal the Flame manually, but letting the Prince get killed does not cost any maximum hit points.</span></li><li data-dcnode-id="1247"><span data-dcnode-id="1251" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialStupidity" title="/pmwiki/pmwiki.php/Main/ArtificialStupidity"><span data-dcnode-id="1250" instrument_node="">Artificial Stupidity</span></a><span data-dcnode-id="1248" instrument_node="">: The enemies in this game often behave suicidally or instantly forget about the player in certain conditions.</span></li><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1241"><span class="ad-caption" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1242" id="proper-ad-tvtropes_mobile_ad_3"></div></div><li data-dcnode-id="1236"><span data-dcnode-id="1240" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossInMooksClothing" title="/pmwiki/pmwiki.php/Main/BossInMooksClothing"><span data-dcnode-id="1239" instrument_node="">Boss in Mook's Clothing</span></a><span data-dcnode-id="1237" instrument_node="">: Courtesy of glitches in the SNES version, some enemies are much faster than other identical-looking mooks.</span></li><li data-dcnode-id="1231"><span data-dcnode-id="1235" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CastFromHitPoints" title="/pmwiki/pmwiki.php/Main/CastFromHitPoints"><span data-dcnode-id="1234" instrument_node="">Cast from Hit Points</span></a><span data-dcnode-id="1232" instrument_node="">: Using the Shadow reduces the Prince's maximum life.</span></li><li data-dcnode-id="1208"><span data-dcnode-id="1230" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CliffHanger" title="/pmwiki/pmwiki.php/Main/CliffHanger"><span data-dcnode-id="1229" instrument_node="">Cliffhanger</span></a><span data-dcnode-id="1227" instrument_node="">: The game ends with an image of </span><span class="spoiler" data-dcnode-id="1225" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1226" instrument_node="">a mysterious witch watching the hero in a crystal ball</span></span><span data-dcnode-id="1224" instrument_node="">. </span><img class="trivia1 rounded" data-dcnode-id="1223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-trivia.png&amp;raw" title="This example contains a TRIVIA entry. It should be moved to the TRIVIA tab."><a class="twikilink" data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordOfGod" title="/pmwiki/pmwiki.php/Main/WordOfGod"><span data-dcnode-id="1222" instrument_node="">Word of God</span></a><span data-dcnode-id="1220" instrument_node=""> has that she was the one responsible for </span><span class="spoiler" data-dcnode-id="1218" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1219" instrument_node="">giving Jaffar his powers, killing the Prince's family, and sacking the Prince's kingdom</span></span><span data-dcnode-id="1217" instrument_node="">. (</span><a class="urllink" data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jordanmechner.com/blog/2013/04/pop-shadow-and-flame"><span data-dcnode-id="1216" instrument_node="">Seen here.</span><img data-dcnode-id="1215" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1213" instrument_node="">) However, the sequel it foreshadowed never came to pass. </span><em data-dcnode-id="1210"><a class="twikilink" data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/PrinceOfPersia3D" title="/pmwiki/pmwiki.php/VideoGame/PrinceOfPersia3D"><span data-dcnode-id="1212" instrument_node="">Prince of Persia 3D</span></a></em><span data-dcnode-id="1209" instrument_node=""> had a standalone story, and ever since then the series has stuck to new continuities.</span></li><li data-dcnode-id="1200"><span data-dcnode-id="1207" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ConvectionSchmonvection" title="/pmwiki/pmwiki.php/Main/ConvectionSchmonvection"><span data-dcnode-id="1206" instrument_node="">Convection Schmonvection</span></a><span data-dcnode-id="1204" instrument_node="">: The lava pools in the cave levels will only kill the Prince if he falls on them. Standing close to one or jumping over it? Fair game. Interestingly, it is partially </span><a class="twikilink" data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AvertedTrope" title="/pmwiki/pmwiki.php/Main/AvertedTrope"><span data-dcnode-id="1203" instrument_node="">averted</span></a><span data-dcnode-id="1201" instrument_node=""> in the SNES version, where standing close to a lava pool kills the Prince (you can still jump over them though).</span></li><li data-dcnode-id="1195"><span data-dcnode-id="1199" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityNod" title="/pmwiki/pmwiki.php/Main/ContinuityNod"><span data-dcnode-id="1198" instrument_node="">Continuity Nod</span></a><span data-dcnode-id="1196" instrument_node="">: The Shadow, who had merged with the Prince near the end of the first game, is one of the Prince's skills in this game.</span></li><li data-dcnode-id="1181"><span data-dcnode-id="1194" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathAsGameMechanic" title="/pmwiki/pmwiki.php/Main/DeathAsGameMechanic"><span data-dcnode-id="1193" instrument_node="">Death as Game Mechanic</span></a><span data-dcnode-id="1191" instrument_node="">: In order to obtain the title Flame (which will allow the Prince to kill the </span><a class="twikilink" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1190" instrument_node="">Big Bad</span></a><span data-dcnode-id="1188" instrument_node="">), the player must willfully kill the Prince in a certain room halfway ,through and </span><em data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">not</span></em><span data-dcnode-id="1185" instrument_node=""> do anything when the camera lingers on the Prince's corpse like it happens every time the Prince is killed elsewhere, because after a few se therwise will just be </span><a class="twikilink" data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YetAnotherStupidDeath" title="/pmwiki/pmwiki.php/Main/YetAnotherStupidDeath"><span data-dcnode-id="1184" instrument_node="">Yet Another Stupid Death</span></a><span data-dcnode-id="1182" instrument_node="">).</span></li><li data-dcnode-id="1173"><span data-dcnode-id="1180" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DemBones" title="/pmwiki/pmwiki.php/Main/DemBones"><span data-dcnode-id="1179" instrument_node="">Dem Bones</span></a><span data-dcnode-id="1177" instrument_node="">: The cave levels feature skeletons as regular guards, but unlike </span><a class="twikilink" data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PuzzleBoss" title="/pmwiki/pmwiki.php/Main/PuzzleBoss"><span data-dcnode-id="1176" instrument_node="">the skeleton in the first game</span></a><span data-dcnode-id="1174" instrument_node="">, all but one have a life bar and can be temporarily defeated.</span></li><li data-dcnode-id="1163"><span data-dcnode-id="1172" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FamilyUnfriendlyDeath" title="/pmwiki/pmwiki.php/Main/FamilyUnfriendlyDeath"><span data-dcnode-id="1171" instrument_node="">Family-Unfriendly Death</span></a><span data-dcnode-id="1169" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1164" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1168" instrument_node="">The Prince </span><em data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">burns Jaffar alive</span></em><span data-dcnode-id="1165" instrument_node=""> with the Flame.</span></span></li><li data-dcnode-id="1152"><span data-dcnode-id="1162" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FissionMailed" title="/pmwiki/pmwiki.php/Main/FissionMailed"><span data-dcnode-id="1161" instrument_node="">Fission Mailed</span></a><span data-dcnode-id="1159" instrument_node="">: When the guard in front of the flame kills the Prince, the player gets the normal instructions to press a key to retry. The correct action is to </span><em data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">stay dead</span></em><span data-dcnode-id="1156" instrument_node=""> until the Prince's spirit rises (seen in </span><a class="twikilink" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProphecyTwist" title="/pmwiki/pmwiki.php/Main/ProphecyTwist"><span data-dcnode-id="1155" instrument_node="">Prophecy Twist</span></a><span data-dcnode-id="1153" instrument_node="">, below.)</span></li><li data-dcnode-id="1147"><span data-dcnode-id="1151" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiantSpider" title="/pmwiki/pmwiki.php/Main/GiantSpider"><span data-dcnode-id="1150" instrument_node="">Giant Spider</span></a><span data-dcnode-id="1148" instrument_node="">: One of the rooms in the final level looks somewhat like one (though with legs sticking out at weird angles).</span></li><li data-dcnode-id="1140"><span data-dcnode-id="1146" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreaterScopeVillain" title="/pmwiki/pmwiki.php/Main/GreaterScopeVillain"><span data-dcnode-id="1145" instrument_node="">Greater-Scope Villain</span></a><span data-dcnode-id="1143" instrument_node="">: The Armies of Darkness who destroyed the Prince's city of birth and all it's inhabitants including his parents. They are mentioned once in the game </span><span class="spoiler" data-dcnode-id="1141" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1142" instrument_node="">and are hinted to be associated with the witch shown in the end, who has a snake sign on her forehead that matches the one left in the ruined city.</span></span></li><li data-dcnode-id="1115"><span data-dcnode-id="1139" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGuardsMustBeCrazy" title="/pmwiki/pmwiki.php/Main/TheGuardsMustBeCrazy"><span data-dcnode-id="1138" instrument_node="">The Guards Must Be Crazy</span></a><span data-dcnode-id="1136" instrument_node="">: </span><a class="urllink" data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D8g21L5P7iEo"><span data-dcnode-id="1135" instrument_node="">They</span><img data-dcnode-id="1134" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1132" instrument_node=""> </span><a class="urllink" data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dl0xOnOnRAiQ"><span data-dcnode-id="1131" instrument_node="">all</span><img data-dcnode-id="1130" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1128" instrument_node=""> </span><a class="urllink" data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DDVpqLaWwJWk"><span data-dcnode-id="1127" instrument_node="">most</span><img data-dcnode-id="1126" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1124" instrument_node=""> </span><a class="urllink" data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DiL6mJHYlJy8"><span data-dcnode-id="1123" instrument_node="">definitely</span><img data-dcnode-id="1122" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1120" instrument_node=""> </span><a class="urllink" data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D9CWG2Ve2pP4"><span data-dcnode-id="1119" instrument_node="">are</span><img data-dcnode-id="1118" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1116" instrument_node="">.</span></li><li data-dcnode-id="1105"><span data-dcnode-id="1114" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="1113" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="1111" instrument_node="">:</span><ul data-dcnode-id="1106"><li data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node=""> In order to become the Shadow Prince, the player must repeatedly turn around and over again.</span></li><li data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node=""> In order to become the Shadow Prince coated by the Flame, the Prince needs 12 health points. The game generously spawns guards that leave large potions when killed endlessly, however, so the player can keep trying until the Flame appears.</span></li></ul></li><li data-dcnode-id="1095"><span data-dcnode-id="1104" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HappilyEverAfter" title="/pmwiki/pmwiki.php/Main/HappilyEverAfter"><span data-dcnode-id="1103" instrument_node="">Happily Ever After</span></a><span data-dcnode-id="1101" instrument_node="">: Subverted in the intro.</span><div class="indent" data-dcnode-id="1096"><span data-dcnode-id="1100" instrument_node=""> </span><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Narrator:</span></strong><span data-dcnode-id="1097" instrument_node=""> And so the young lovers were wed and lived happily... well, for eleven days.</span></div></li><li data-dcnode-id="1085"><span data-dcnode-id="1094" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceTurn" title="/pmwiki/pmwiki.php/Main/HeelFaceTurn"><span data-dcnode-id="1093" instrument_node="">Heel–Face Turn</span></a><span data-dcnode-id="1091" instrument_node="">:</span><ul data-dcnode-id="1086"><li data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node=""> The Shadow turns from an antagonist in the first game to a helpful skill of the Prince in the second game.</span></li><li data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node=""> The guards in the temple of the Flame all stop fighting and bow to the Prince instead once he manages to take the Flame.</span></li></ul></li><li data-dcnode-id="1069"><span data-dcnode-id="1084" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HypnotizeTheCaptive" title="/pmwiki/pmwiki.php/Main/HypnotizeTheCaptive"><span data-dcnode-id="1083" instrument_node="">Hypnotize the Captive</span></a><span data-dcnode-id="1081" instrument_node="">: The game begins with the princess brainwashed into thinking the Prince a poor mad beggar, with the </span><a class="twikilink" data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotQuiteDead" title="/pmwiki/pmwiki.php/Main/NotQuiteDead"><span data-dcnode-id="1080" instrument_node="">Not Quite Dead</span></a><span data-dcnode-id="1078" instrument_node=""> Jaffar masquerading as the Prince instead. Naturally, fleeing the royal guards quickly ensues. </span><span class="spoiler" data-dcnode-id="1070" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1077" instrument_node="">When the Princess </span><em data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">does</span></em><span data-dcnode-id="1074" instrument_node=""> break out of this, Jaffar "silences her" via using magic to make her fall in a </span><a class="twikilink" data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ConvenientComa" title="/pmwiki/pmwiki.php/Main/ConvenientComa"><span data-dcnode-id="1073" instrument_node="">Convenient Coma</span></a><span data-dcnode-id="1071" instrument_node="">. She doesn't wake up until the Prince kills Jaffar.</span></span></li><li data-dcnode-id="1057"><span data-dcnode-id="1068" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MissionPackSequel" title="/pmwiki/pmwiki.php/Main/MissionPackSequel"><span data-dcnode-id="1067" instrument_node="">Mission-Pack Sequel</span></a><span data-dcnode-id="1065" instrument_node="">: </span><img class="trivia1 rounded" data-dcnode-id="1064" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-trivia.png&amp;raw" title="This example contains a TRIVIA entry. It should be moved to the TRIVIA tab."><a class="twikilink" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordOfGod" title="/pmwiki/pmwiki.php/Main/WordOfGod"><span data-dcnode-id="1063" instrument_node="">Explicitly confirmed</span></a><span data-dcnode-id="1061" instrument_node=""> by Mechner in his blog, but it's </span><em data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">quite</span></em><span data-dcnode-id="1058" instrument_node=""> a mission pack. The original game's engine was used, but the graphics, sound and everything else were polished and jazzed-up.</span></li><li data-dcnode-id="1050"><span data-dcnode-id="1056" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonActionBigBad" title="/pmwiki/pmwiki.php/Main/NonActionBigBad"><span data-dcnode-id="1055" instrument_node="">Non-Action Big Bad</span></a><span data-dcnode-id="1053" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1051" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1052" instrument_node="">Compared to the previous game, Jaffar never tries to fight the Prince head-on (he probably learned the hard way it wasn't a great idea). He tries to make him flee and then drown with his magic, but when the Prince returns, all he does is send him to another dimension and run from him. He only attacks the Prince if he leaves himself open and vulnerable, or if he's unable to wield the Flame.</span></span></li><li data-dcnode-id="1036"><span data-dcnode-id="1049" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotQuiteDead" title="/pmwiki/pmwiki.php/Main/NotQuiteDead"><span data-dcnode-id="1048" instrument_node="">Not Quite Dead</span></a><span data-dcnode-id="1046" instrument_node="">: Jaffar is the </span><a class="twikilink" data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1045" instrument_node="">Big Bad</span></a><span data-dcnode-id="1043" instrument_node=""> again, even though he was supposedly dead after the Prince defeated him in the previous game. </span><span class="spoiler" data-dcnode-id="1038" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1042" instrument_node="">This subsequently leads to </span><a class="twikilink" data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MakeSureHesDead" title="/pmwiki/pmwiki.php/Main/MakeSureHesDead"><span data-dcnode-id="1041" instrument_node="">the Prince scattering his ashes to the winds after frying him</span></a><span data-dcnode-id="1039" instrument_node="">, at the end of the game</span></span><span data-dcnode-id="1037" instrument_node="">.</span></li><li data-dcnode-id="1029"><span data-dcnode-id="1035" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ParentalAbandonment" title="/pmwiki/pmwiki.php/Main/ParentalAbandonment"><span data-dcnode-id="1034" instrument_node="">Parental Abandonment</span></a><span data-dcnode-id="1032" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1030" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1031" instrument_node="">The Prince's parents were killed in a massacre that sacked their home city.</span></span></li><li data-dcnode-id="1022"><span data-dcnode-id="1028" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProphecyTwist" title="/pmwiki/pmwiki.php/Main/ProphecyTwist"><span data-dcnode-id="1027" instrument_node="">Prophecy Twist</span></a><span data-dcnode-id="1025" instrument_node="">: "He Who Would Steal The Flame Must Die!". It's a fitting threat, as if you try to approach the Flame, the Prince is burned to ashes. </span><span class="spoiler" data-dcnode-id="1023" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1024" instrument_node="">What you must do is turn the prophecy backwards - that is, the Prince must die so that the Shadow can steal the Flame.</span></span></li><li data-dcnode-id="1012"><span data-dcnode-id="1021" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PuzzleBoss" title="/pmwiki/pmwiki.php/Main/PuzzleBoss"><span data-dcnode-id="1020" instrument_node="">Puzzle Boss</span></a><span data-dcnode-id="1018" instrument_node="">: Like the skeleton in the </span><a class="twikilink" data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/PrinceOfPersia1" title="/pmwiki/pmwiki.php/VideoGame/PrinceOfPersia1"><span data-dcnode-id="1017" instrument_node="">previous game</span></a><span data-dcnode-id="1015" instrument_node="">, the skeleton encountered on the bridge in the final cave level has no life bar and can't be killed. </span><span class="spoiler" data-dcnode-id="1013" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1014" instrument_node="">The Prince must get close enough to switch sides with him and then wait for the bridge to collapse.</span></span></li><li data-dcnode-id="1007"><span data-dcnode-id="1011" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SequenceBreaking" title="/pmwiki/pmwiki.php/Main/SequenceBreaking"><span data-dcnode-id="1010" instrument_node="">Sequence Breaking</span></a><span data-dcnode-id="1008" instrument_node="">: It is possible to beat the final temple level without stealing the Flame. To do so, you have to rise the Shadow in any screen besides the one the Flame is in. Proceed normally until you jump into the platform with the Flame - upon doing so, you can turn around and go back to return the Shadow to the Prince's body. While all the guards will be hostile to the Prince, all level ending doors are also open, letting you go to the final level. The game assumes you did steal the Flame, so you can end the game normally.</span></li><li data-dcnode-id="1000"><span data-dcnode-id="1006" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoleSurvivor" title="/pmwiki/pmwiki.php/Main/SoleSurvivor"><span data-dcnode-id="1005" instrument_node="">Sole Survivor</span></a><span data-dcnode-id="1003" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1001" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1002" instrument_node="">When he was a young child, the Prince was the only one who survived his home city being destroyed by the armies of darkness.</span></span></li><li data-dcnode-id="990"><span data-dcnode-id="999" instrument_node=""> </span><a class="twikilink" data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SomeDexterityRequired" title="/pmwiki/pmwiki.php/Main/SomeDexterityRequired"><span data-dcnode-id="998" instrument_node="">Some Dexterity Required</span></a><span data-dcnode-id="996" instrument_node="">:</span><ul data-dcnode-id="991"><li data-dcnode-id="994"><span data-dcnode-id="995" instrument_node=""> The controls are less forgiving than the original. There are several places where you need to make a running jump exactly off an edge which turns out to be nearly impossible to time right; it feels like the previous game assumes the player want to jump from the edge and gives some tolerance, whereas the sequel prefers to either jump too early or miss it completely.</span></li><li data-dcnode-id="992"><span data-dcnode-id="993" instrument_node=""> The disembodied goblin heads in the ruins levels require precise timing in order to damage.</span></li></ul></li><li data-dcnode-id="983"><span data-dcnode-id="989" instrument_node=""> </span><a class="twikilink" data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimedMission" title="/pmwiki/pmwiki.php/Main/TimedMission"><span data-dcnode-id="988" instrument_node="">Timed Mission</span></a><span data-dcnode-id="986" instrument_node="">: You are given a time limit of 75 minutes to finish the game. Unlike the previous game, however, this does not begin until after the first cave level. </span><span class="spoiler" data-dcnode-id="984" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="985" instrument_node="">That's when the Princess breaks free of Jaffar's spell and sees him for who he is, and he silences her with a sickness spell which will kill her if the Prince does not defeat him.</span></span></li><li data-dcnode-id="975"><span data-dcnode-id="982" instrument_node=""> </span><a class="twikilink" data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TookALevelInBadass" title="/pmwiki/pmwiki.php/Main/TookALevelInBadass"><span data-dcnode-id="981" instrument_node="">Took a Level in Badass</span></a><span data-dcnode-id="979" instrument_node="">: Except for at the very end at a point where you should be running instead, the guards of the first stage are all taken down in a single strike each, signifying that the Prince is an </span><a class="twikilink" data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExperiencedProtagonist" title="/pmwiki/pmwiki.php/Main/ExperiencedProtagonist"><span data-dcnode-id="978" instrument_node="">Experienced Protagonist</span></a><span data-dcnode-id="976" instrument_node=""> after what he went through in the first game. He also has power over his inner Shadow, allowing him to use its power to roam levels without being seen at the cost of some health. And to match this more potent hero, the foes are more numerous and deadly as well.</span></li><li data-dcnode-id="970"><span data-dcnode-id="974" instrument_node=""> </span><a class="twikilink" data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrippyFinaleSyndrome" title="/pmwiki/pmwiki.php/Main/TrippyFinaleSyndrome"><span data-dcnode-id="973" instrument_node="">Trippy Finale Syndrome</span></a><span data-dcnode-id="971" instrument_node="">: In the final level, Jaffar warps the Prince into a weird otherworld with giant chess pieces, Kryptonite crystals, and an MC Escher-esque battleground.</span></li><li data-dcnode-id="963"><span data-dcnode-id="969" instrument_node=""> </span><a class="twikilink" data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ViolationOfCommonSense" title="/pmwiki/pmwiki.php/Main/ViolationOfCommonSense"><span data-dcnode-id="968" instrument_node="">Violation of Common Sense</span></a><span data-dcnode-id="966" instrument_node="">: </span><span class="spoiler" data-dcnode-id="964" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="965" instrument_node="">In the temple, allow yourself to be killed by a monk so your shadow can leave your body and take the sacred flame.</span></span></li><li data-dcnode-id="955"><span data-dcnode-id="962" instrument_node=""> </span><a class="twikilink" data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheWallsAreClosingIn" title="/pmwiki/pmwiki.php/Main/TheWallsAreClosingIn"><span data-dcnode-id="961" instrument_node="">The Walls Are Closing In</span></a><span data-dcnode-id="959" instrument_node="">: Some later levels have crushing walls, most of which are situated in inescapable pits under </span><a class="twikilink" data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FakePlatform" title="/pmwiki/pmwiki.php/Main/FakePlatform"><span data-dcnode-id="958" instrument_node="">Fake Platforms</span></a><span data-dcnode-id="956" instrument_node="">.</span></li></ul><hr data-dcnode-id="953"><span data-dcnode-id="952" instrument_node="">
