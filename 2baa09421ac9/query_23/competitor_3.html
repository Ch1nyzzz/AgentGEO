all her hope on you; unaware that you're held a prisoner right below her in the Sultan's dungeons!! You must escape this hell-hole of a place; which is heavily guarded and full of extreme traps. To finally reach above to the palace to defeat the Grand Vizier Jaffar to save your lovely princess alive while restoring some stability to the people of Persia! And maybe claiming the title Prince of Persia in the process?? (Note: The above is reference to the original game; some later versions of the game {i.e. the SNES} may have a two hour time limit and more levels)</span><span data-dcnode-id="773" data-reactroot="" style="display:inline-block"><span data-dcnode-id="778" instrument_node=""> </span><span data-dcnode-id="776" instrument_node="">—</span><a class="ipc-link ipc-link--base sc-25c73b5f-0 cwgUMk" data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/search/title/%3Fplot_author%3DC%2520Parmar%26view%3Dsimple%26sort%3Dalpha%26ref_%3Dtt_stry_pl"><span data-dcnode-id="775" instrument_node="">C Parmar</span></a></span></div></div><div class="ipc-overflowText-overlay" data-dcnode-id="767"><svg class="ipc-icon ipc-icon--more-horiz ipc-overflowText-overlay__affordance" data-dcnode-id="768" fill="currentColor" height="24" id="iconContext-more-horiz" role="presentation" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h24v24H0V0z" data-dcnode-id="770" fill="none"></path><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" data-dcnode-id="769"></path></svg></div></div><div class="ipc-chip-list sc-55203d61-0 ciGQlL" data-dcnode-id="747" data-testid="storyline-plot-keywords"><a class="ipc-chip ipc-chip--on-base" data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/search/keyword/%3Fkeywords%3Dsingle-player%26ref_%3Dtt_stry_kw"><spa
