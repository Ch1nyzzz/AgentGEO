de-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="3486" instrument_node="">EU</span></a><span data-dcnode-id="3484" instrument_node="">:</span></span><span data-dcnode-id="3482" instrument_node=""> December 12, 2008</span><sup class="reference" data-dcnode-id="3479" id="cite_ref-Release_2-3"><a data-dcnode-id="3480" href="#cite_note-Release-2"><span data-dcnode-id="3481" instrument_node="">[2]</span></a></sup></li></ul></div><b data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">Mac OS X</span></b><div class="plainlist" data-dcnode-id="3463"><ul data-dcnode-id="3464"><li data-dcnode-id="3465"><span data-dcnode-id="3470" style="font-size:95%;"><abbr data-dcnode-id="3472" title="Worldwide"><span data-dcnode-id="3473" instrument_node="">WW</span></abbr><span data-dcnode-id="3471" instrument_node="">:</span></span><span data-dcnode-id="3469" instrument_node=""> March 24, 2009</span><sup class="reference" data-dcnode-id="3466" id="cite_ref-Mac_Release_4-0"><a data-dcnode-id="3467" href="#cite_note-Mac_Release-4"><span data-dcnode-id="3468" instrument_node="">[4]</span></a></sup></li></ul></div></li></ul><span data-dcnode-id="3460" instrument_node="">
</span></div></td></tr><tr data-dcnode-id="3444"><th class="infobox-label" data-dcnode-id="3454" scope="row" style="white-space:nowrap;padding-right:0.65em;"><a data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_game_genre" title="Video game genre"><span data-dcnode-id="3456" instrument_node="">Genre(s)</span></a></th><td class="infobox-data" data-dcnode-id="3445"><a data-dcnode-id="3452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Action-adventure_game" title="Action-adventure game"><span data-dcnode-id="3453" instrument_node="">Action-adventure</span></a><span data-dcnode-id="3451" instrument_node="">, </span><a data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hack_and_slash" title="Hack and slash"><span data-dcnode-id="3450" instrument_node="">hack and slash</span></a><span data-dcnode-id="3448" instrument_node="">, </span><a data-dcnode-id="3446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Platform_game" title="Platform game"><span data-dcnode-id="3447" instrument_node="">platform</span></a></td></tr><tr data-dcnode-id="3438"><th class="infobox-label" data-dcnode-id="3442" scope="row" style="white-space:nowrap;padding-right:0.65em;"><span data-dcnode-id="3443" instrument_node="">Mode(s)</span></th><td class="infobox-data" data-dcnode-id="3439"><a data-dcnode-id="3440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Single-player_video_game" title="Single-player video game"><span data-dcnode-id="3441" instrument_node="">Single-player</span></a></td></tr></tbody></table><span data-dcnode-id="3435" instrument_node="">
</span><p data-dcnode-id="3386"><i data-dcnode-id="3432"><b data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">Prince of Persia</span></b></i><span data-dcnode-id="3431" instrument_node=""> is an </span><a data-dcnode-id="3429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Action-adventure_game" title="Action-adventure game"><span data-dcnode-id="3430" instrument_node="">action-adventure</span></a><span data-dcnode-id="3428" instrument_node=""> and </span><a data-dcnode-id="3426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Platform_game" title="Platform game"><span data-dcnode-id="3427" instrument_node="">platforming</span></a><span data-dcnode-id="3425" instrument_node=""> video game developed by </span><a data-dcnode-id="3423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft_Montreal" title="Ubisoft Montreal"><span data-dcnode-id="3424" instrument_node="">Ubisoft Montreal</span></a><span data-dcnode-id="3422" instrument_node=""> and published by </span><a data-dcnode-id="3420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft" title="Ubisoft"><span data-dcnode-id="3421" instrument_node="">Ubisoft</span></a><span data-dcnode-id="3419" instrument_node="">. It is the seventh main installment in the </span><i data-dcnode-id="3416"><a data-dcnode-id="3417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia" title="Prince of Persia"><span data-dcnode-id="3418" instrument_node="">Prince of Persia</span></a></i><span data-dcnode-id="3415" instrument_node=""> franchise, and the second </span><a data-dcnode-id="3413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reboot_%28fiction%29" title="Reboot (fiction)"><span data-dcnode-id="3414" instrument_node="">reboot</span></a><span data-dcnode-id="3412" instrument_node="">, establishing a new continuity that is separate from other games in the series. It was released in the United States on December 2, 2008 for </span><a data-dcnode-id="3410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PlayStation_3" title="PlayStation 3"><span data-dcnode-id="3411" instrument_node="">PlayStation 3</span></a><span data-dcnode-id="3409" instrument_node=""> and </span><a data-dcnode-id="3407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xbox_360" title="Xbox 360"><span data-dcnode-id="3408" instrument_node="">Xbox 360</span></a><span data-dcnode-id="3406" instrument_node=""> (the fifth anniversary of the  </span><a data-dcnode-id="3404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsoft_Windows" title="Microsoft Windows"><span data-dcnode-id="3405" instrument_node="">Microsoft Windows</span></a><span data-dcnode-id="3403" instrument_node=""> release for </span><i data-dcnode-id="3400"><a data-dcnode-id="3401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Sands_of_Time" title="Prince of Persia: The Sands of Time"><span data-dcnode-id="3402" instrument_node="">The Sands of Time</span></a></i><span data-dcnode-id="3399" instrument_node="">) and on December 9, 2008 for Windows. It was released on March 24, 2009 for </span><a class="mw-redirect" data-dcnode-id="3397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mac_OS_X" title="Mac OS X"><span data-dcnode-id="3398" instrument_node="">Mac OS X</span></a><span data-dcnode-id="3396" instrument_node=""> via the </span><a class="mw-redirect" data-dcnode-id="3394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/TransGaming_Technologies%23Cider" title="TransGaming Technologies"><span data-dcnode-id="3395" instrument_node="">Cider</span></a><span data-dcnode-id="3393" instrument_node=""> engine. The game was also released on November 11, 2008 by </span><a data-dcnode-id="3391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gameloft" title="Gameloft"><span data-dcnode-id="3392" instrument_node="">Gameloft</span></a><span data-dcnode-id="3390" instrument_node=""> for mobile phones that runs on the </span><a data-dcnode-id="3388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Java_%28programming_language%29" title="Java (programming language)"><span data-dcnode-id="3389" instrument_node="">Java</span></a><span data-dcnode-id="3387" instrument_node=""> platform taking place in a 2D environment, and has a feature of enabling the players to control a second character at certain points of levels.
</span></p><p data-dcnode-id="3378"><span data-dcnode-id="3385" instrument_node="">The game is set in ancient Persia, and follows an </span><a data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_%28Prince_of_Persia%29" title="Prince (Prince of Persia)"><span data-dcnode-id="3384" instrument_node="">unnamed player-character</span></a><span data-dcnode-id="3382" instrument_node="">, who finds himself in a mysterious land after a large sandstorm diverted him from his course. Here, he meets a princess named Elika, and must work with her to re-imprison the evil entity Ahriman, who has corrupted the land after being released by Elika's father. Throughout the journey, players traverse many different environments using his acrobatic abilities to scale walls and even crawl on the ceilings, and combat various enemies. The game's storyline and setting borrowed some aspects from </span><a data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zoroastrianism" title="Zoroastrianism"><span data-dcnode-id="3381" instrument_node="">Zoroastrianism</span></a><span data-dcnode-id="3379" instrument_node="">.
</span></p><p data-dcnode-id="3364"><i data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3375" instrument_node=""> received generally positive from critics, and has sold over 2.2 million copies as of January 2009. An </span><a data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Expansion_pack" title="Expansion pack"><span data-dcnode-id="3374" instrument_node="">expansion pack</span></a><span data-dcnode-id="3372" instrument_node=""> that serves as an epilogue to the story was released in March 2009. The only other game in the series set in this continuity is </span><i data-dcnode-id="3369"><a data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Fallen_King" title="Prince of Persia: The Fallen King"><span data-dcnode-id="3371" instrument_node="">Prince of Persia: The Fallen King</span></a></i><span data-dcnode-id="3368" instrument_node="">, also released in December 2008 for the </span><a data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nintendo_DS" title="Nintendo DS"><span data-dcnode-id="3367" instrument_node="">Nintendo DS</span></a><span data-dcnode-id="3365" instrument_node="">.
</span></p><span data-dcnode-id="3363" instrument_node="">

</span><h2 data-dcnode-id="3224"><span class="mw-headline" data-dcnode-id="3232" id="Gameplay"><span data-dcnode-id="3233" instrument_node="">Gameplay</span></span><span class="mw-editsection" data-dcnode-id="3225"><span class="mw-editsection-bracket" data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">[</span></span><a data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia_%282008_video_game%29%26action%3Dedit%26section%3D1" title="Edit section: Gameplay"><span data-dcnode-id="3229" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3223" instrument_node="">
</span><p data-dcnode-id="3201"><i data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3220" instrument_node=""> revolves around gameplay mechanics that producer Ben Mattes identifies as "pillars" of the </span><a data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia" title="Prince of Persia"><i data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3217" instrument_node=""> series</span></a><span data-dcnode-id="3215" instrument_node="">; an acrobatic hero exploring a Persian environment with a balanced mixture of acrobatics, combat, and puzzle-solving.</span><sup class="reference" data-dcnode-id="3212" id="cite_ref-ubidaysinterview_5-0"><a data-dcnode-id="3213" href="#cite_note-ubidaysinterview-5"><span data-dcnode-id="3214" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3211" instrument_node=""> The premise of </span><i data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3208" instrument_node=""> is that the player travels around the game world to heal specially designated spots of land. The player assumes the role of the acrobatic character, and is accompanied by the </span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="3207" instrument_node="">AI</span></a><span data-dcnode-id="3205" instrument_node="">-controlled companion named </span><a class="mw-redirect" data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_characters_in_the_Prince_of_Persia_series%23Elika" title="List of characters in the Prince of Persia series"><span data-dcnode-id="3204" instrument_node="">Elika</span></a><span data-dcnode-id="3202" instrument_node="">. The player can use the Prince character's acrobatic prowess, sword, and gauntlet, as well as magic from Elika to perform combat and acrobatic feats variously throughout the game.
</span></p><p data-dcnode-id="3186"><i data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3198" instrument_node=""> features </span><a data-dcnode-id="3196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_world" title="Open world"><span data-dcnode-id="3197" instrument_node="">open world</span></a><span data-dcnode-id="3195" instrument_node=""> exploration that allows the player to travel to any spot in the game world at any given point, and allows the player to witness the plot in any way they want. Depending on how the player progresses, previously visited areas will become more challenging to traverse when the player re-visits them.</span><sup class="reference" data-dcnode-id="3192" id="cite_ref-gameinformer_6-0"><a data-dcnode-id="3193" href="#cite_note-gameinformer-6"><span data-dcnode-id="3194" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3191" instrument_node=""> However, when the player heals a spot of land, it becomes devoid of traps. The traps are manifested in various forms of the antagonist Ahriman's Corruption; black-colored blobs that coat the land and swallow the player if touched.</span><sup class="reference" data-dcnode-id="3188" id="cite_ref-gameinformer_6-1"><a data-dcnode-id="3189" href="#cite_note-gameinformer-6"><span data-dcnode-id="3190" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3187" instrument_node=""> The player can use acrobatic maneuvers to avoid these traps.
</span></p><p data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">The player has many acrobatic maneuvers at their disposal. Acrobatics are also used in combat to vault over enemies, or hit them into the air. Sometimes when performing these acrobatics, the player is aided by Elika. There are magical plates that allow the player to perform even more complicated acrobatic feats via Elika. If the player fails to signal Elika's magic, they fall off of the plate, sometimes to their death.
</span></p><p data-dcnode-id="3165"><span data-dcnode-id="3183" instrument_node="">The player can not conventionally "die" in </span><i data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3180" instrument_node="">. Rather, when an enemy is about to strike the finishing blow, or The Prince presumably falls to his death, Elika saves him. There is no limit on the number of times Elika can save a player, although an achievement is awarded for being saved fewer than 100 times during a playthrough.</span><sup class="reference" data-dcnode-id="3177" id="cite_ref-7"><a data-dcnode-id="3178" href="#cite_note-7"><span data-dcnode-id="3179" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3176" instrument_node=""> Along with saving the player, Elika can perform many acrobatic feats or combat feats in tandem with the player. The downloadable content </span><i data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">Epilogue</span></i><span data-dcnode-id="3173" instrument_node=""> added a new magic plate that allows Elika to recreate destroyed objects. A new combat maneuver for the player was also added.</span><sup class="reference" data-dcnode-id="3170" id="cite_ref-8"><a data-dcnode-id="3171" href="#cite_note-8"><span data-dcnode-id="3172" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="3167" id="cite_ref-9"><a data-dcnode-id="3168" href="#cite_note-9"><span data-dcnode-id="3169" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3166" instrument_node="">
</span></p><span data-dcnode-id="3164" instrument_node="">
</span><h2 data-dcnode-id="3154"><span class="mw-headline" data-dcnode-id="3162" id="Synopsis"><span data-dcnode-id="3163" instrument_node="">Synopsis</span></span><span class="mw-editsection" data-dcnode-id="3155"><span class="mw-editsection-bracket" data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">[</span></span><a data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia_%282008_video_game%29%26action%3Dedit%26section%3D2" title="Edit section: Synopsis"><span data-dcnode-id="3159" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3153" instrument_node="">
</span><h3 data-dcnode-id="3143"><span class="mw-headline" data-dcnode-id="3151" id="Setting"><span data-dcnode-id="3152" instrument_node="">Setting</span></span><span class="mw-editsection" data-dcnode-id="3144"><span class="mw-editsection-bracket" data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">[</span></span><a data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia_%282008_video_game%29%26action%3Dedit%26section%3D3" title="Edit section: Setting"><span data-dcnode-id="3148" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3142" instrument_node="">
</span><p data-dcnode-id="3113"><i data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3139" instrument_node=""> takes place in an undefined ancient Persian city-state</span><sup class="reference" data-dcnode-id="3136" id="cite_ref-setting1booklet_10-0"><a data-dcnode-id="3137" href="#cite_note-setting1booklet-10"><span data-dcnode-id="3138" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3135" instrument_node=""> based heavily around the religion of </span><a data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zoroastrianism" title="Zoroastrianism"><span data-dcnode-id="3134" instrument_node="">Zoroastrianism</span></a><span data-dcnode-id="3132" instrument_node="">.</span><sup class="reference" data-dcnode-id="3129" id="cite_ref-kotakupress_11-0"><a data-dcnode-id="3130" href="#cite_note-kotakupress-11"><span data-dcnode-id="3131" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3128" instrument_node=""> A thousand years before the events of the game take place, there was a struggle for power between the gods </span><a class="mw-redirect" data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angra_Mainyu" title="Angra Mainyu"><span data-dcnode-id="3127" instrument_node="">Ahriman</span></a><span data-dcnode-id="3125" instrument_node=""> and </span><a data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahura_Mazda" title="Ahura Mazda"><span data-dcnode-id="3124" instrument_node="">Ormazd</span></a><span data-dcnode-id="3122" instrument_node="">. The outcome of the struggle was that Ormazd and his people, the Ahura, managed to imprison Ahriman and his minions, the Corrupted, in a tree.</span><sup class="reference" data-dcnode-id="3119" id="cite_ref-12"><a data-dcnode-id="3120" href="#cite_note-12"><span data-dcnode-id="3121" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3118" instrument_node=""> Ormazd then left the world, leaving the Ahura to make sure Ahriman remains secure. They are successful for a thousand years, at which point the Ahura started to lose their powers, so they leave. Shortly before the events of the game, Ahriman is about to be freed again.</span><sup class="reference" data-dcnode-id="3115" id="cite_ref-setting1booklet_10-1"><a data-dcnode-id="3116" href="#cite_note-setting1booklet-10"><span data-dcnode-id="3117" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3114" instrument_node="">
</span></p><span data-dcnode-id="3112" instrument_node="">
</span><h3 data-dcnode-id="3102"><span class="mw-headline" data-dcnode-id="3110" id="Characters"><span data-dcnode-id="3111" instrument_node="">Characters</span></span><span class="mw-editsection" data-dcnode-id="3103"><span class="mw-editsection-bracket" data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">[</span></span><a data-dcnode-id="3106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia_%282008_video_game%29%26action%3Dedit%26section%3D4" title="Edit section: Characters"><span data-dcnode-id="3107" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3101" instrument_node="">
</span><p data-dcnode-id="3087"><i data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Prince of Persia</span></i><span class="nowrap" data-dcnode-id="3097" style="padding-left:0.1em;"><span data-dcnode-id="3098" instrument_node="">'</span></span><span data-dcnode-id="3096" instrument_node="">s protagonist is a nameless adventurer in search of fortune. The adventurer is accompanied by an Ahura named Elika, whose race has forsaken the duty given to them by the god of light, Ormazd, and intend to set free the main antagonist, Ahriman,</span><sup class="reference" data-dcnode-id="3093" id="cite_ref-characters1prima_13-0"><a data-dcnode-id="3094" href="#cite_note-characters1prima-13"><span data-dcnode-id="3095" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3092" instrument_node=""> the god of darkness who was imprisoned by Ormazd. He is intent on conquering the entire universe upon his liberation.</span><sup class="reference" data-dcnode-id="3089" id="cite_ref-characters1booklet_14-0"><a data-dcnode-id="3090" href="#cite_note-characters1booklet-14"><span data-dcnode-id="3091" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3088" instrument_node=""> The Mourning King appears as an antagonist, intent on fulfilling his deal with Ahriman in return for the resurrection of his daughter, Elika. The Corrupted, four rulers Ahriman chose to aid him in conquering Ormazd, also appear as antagonists. They were imprisoned with him for a thousand years.
</span></p><p data-dcnode-id="3073"><span data-dcnode-id="3086" instrument_node="">The Hunter is one of the Corrupted. He was a prince who enjoyed hunting, but soon became too good at hunting. Ahriman successfully made a deal with the Hunter that, in exchange for his soul, Ahriman would allow him to hunt a creature more satisfying than any he has hunted before.</span><sup class="reference" data-dcnode-id="3083" id="cite_ref-characters2prima_15-0"><a data-dcnode-id="3084" href="#cite_note-characters2prima-15"><span data-dcnode-id="3085" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3082" instrument_node=""> Another of the Corrupted is the Alchemist. He was an Ahura scientist who felt he was close to achieving immortality when his health started to fail. The Alchemist asked Ormazd for a longer lifespan to complete his research, but when he was refused, Ahriman offered him immortality in exchange for his soul. The third Corrupted is called the Concubine. She was a woman skilled in politics who revered men of power. She was involved with a man, but was ultimately beaten by another woman, scarred and stripped of her beauty and influence. The Concubine then exchanged her soul for the power of illusion with Ahriman.</span><sup class="reference" data-dcnode-id="3079" id="cite_ref-characters2booklet_16-0"><a data-dcnode-id="3080" href="#cite_note-characters2booklet-16"><span data-dcnode-id="3081" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3078" instrument_node=""> The fourth and strongest of the Corrupted is the Warrior. He was a king whose country was under siege. Struggling for peace, the king accepted power from Ahriman that allowed him to vanquish his enemies and secure peace for his people. However, when the war was over, the peace-loving citizens rejected the Warrior, who had turned into a tool of war.</span><sup class="reference" data-dcnode-id="3075" id="cite_ref-characters4prima_17-0"><a data-dcnode-id="3076" href="#cite_note-characters4prima-17"><span data-dcnode-id="3077" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3074" instrument_node="">
</span></p><span data-dcnode-id="3072" instrument_node="">
</span><h3 data-dcnode-id="3062"><span class="mw-headline" data-dcnode-id="3070" id="Plot"><span data-dcnode-id="3071" instrument_node="">Plot</span></span><span class="mw-editsection" data-dcnode-id="3063"><span class="mw-editsection-bracket" data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">[</span></span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia_%282008_video_game%29%26action%3Dedit%26section%3D5" title="Edit section: Plot"><span data-dcnode-id="3067" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3061" instrument_node="">
</span><p data-dcnode-id="3056"><span data-dcnode-id="3060" instrument_node="">The game begins with the Prince (which is only a nickname, the game does not actually mention whether he is from a royal family or not) in search of his donkey, Farah, in the middle of a desert sandstorm. He then runs into Elika, a princess of the Ahura who is fleeing from soldiers. The two fend off the soldiers, with Elika discovering her magical powers of light. The Prince follows her into a temple which houses Ahriman, a force of evil who is trapped within a tree known as the </span><a class="mw-redirect" data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tree_of_Life" title="Tree of Life"><span data-dcnode-id="3059" instrument_node="">Tree of Life</span></a><span data-dcnode-id="3057" instrument_node="">. Once inside the temple, the Prince and Elika are confronted by Elika's father, the Mourning King, who faces them in battle. After the fight, he uses his sword to cut the Tree of Life, setting Ahriman free. The Prince and Elika escape the temple, only to find a corrupted world outside.
</span></p><p data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">Elika tells the Prince that in order to restore the world and rid the corruption inhabiting it, they must heal all the Fertile Grounds in the kingdom. They then begin restoring the Fertile Grounds, encountering the Warrior, the Hunter, the Concubine and the Alchemist, four corrupted leaders Ahriman chose to set free.
</span></p><p data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">In the journey, it is revealed that Elika had died prior to the beginning of the game. Her father took her to Ahriman and asked him to revive her selling his soul in the process to Ahriman, thus making him one of the corrupted. Once Elika is revived she discovers she has new-found powers. After gaining even more powers, the two encounter Elika's father once again. After healing all the Fertile Grounds, as well as defeating all bosses, Elika and the Prince return to the temple to imprison Ahriman. Once inside, however, they are confronted by the king who is now a fully corrupted being. They defeat him, he calls his daughter's name, turns away from them and throws himself off the platform they are on. Ahriman rises from the corruption below. They battle him, but Elika must give up her very life to finish the spell which seals Ahriman away. She finishes the spell and dies.
</span></p><p data-dcnode-id="3047"><span data-dcnode-id="3051" instrument_node="">The Prince then takes Elika's body outside. There are four Fertile Grounds there, each with a tree, that according to what Elika had told him, channel the power of all the Fertile Grounds to the Tree of Life. He is given a vision which is the same one both he and Elika shared much earlier that shows her father's deal with Ahriman to revive her. When they shared the vision at that time she told the Prince that visions come from Ormazd, not Ahriman. The vision (just like the main debate throughout the game between Elika and the Prince was all about Destiny vs Free Will) is all about choice. The Prince re-creates the deal made by Elika's father. He destroys the four Fertile Grounds around the Temple and returns inside. He cuts down the Tree of Life and takes the light power Elika used to heal the Tree. The Prince returns the Light to Elika's body, and she returns to life. The game ends with the Prince carrying Elika across the desert while Ahriman's darkness envelops the world and the </span><a data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temple" title="Temple"><span data-dcnode-id="3050" instrument_node="">Temple</span></a><span data-dcnode-id="3048" instrument_node=""> is destroyed.
</span></p><span data-dcnode-id="3046" instrument_node="">
</span><h3 data-dcnode-id="3035"><span class="mw-headline" data-dcnode-id="3043" id="Epilogue"><i data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Epilogue</span></i></span><span class="mw-editsection" data-dcnode-id="3036"><span class="mw-editsection-bracket" data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">[</span></span><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia_%282008_video_game%29%26action%3Dedit%26section%3D6" title="Edit section: Epilogue"><span data-dcnode-id="3040" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3034" instrument_node="">
</span><p data-dcnode-id="3026"><span data-dcnode-id="3033" instrument_node="">In </span><i data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">Epilogue</span></i><span data-dcnode-id="3030" instrument_node="">, an optional </span><a data-dcnode-id="3028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Expansion_pack" title="Expansion pack"><span data-dcnode-id="3029" instrument_node="">expansion pack</span></a><span data-dcnode-id="3027" instrument_node=""> set after the main story, it is shown that the Prince and Elika survive, and retreat to an underground palace. Elika, furious with the Prince for dooming the world to save her, abandons him. However, they both end up battling Elika's father once again. They escape, and attempt to leave the palace alive. While on their way, Elika shows her frustration with the Prince multiple times, believing bringing her back was not worth the price of the evil it unleashed. The Prince counters that by freeing her, they "stand a chance" against Ahriman. In a final battle against Elika's father, the Prince defeats him by impaling him on spikes, a visual reference to the original Prince of Persia game. In the end, Elika leaves the Prince to search for her people and the Prince is left alone with a bloodthirsty Ahriman seeking revenge.
</span></p><span data-dcnode-id="3025" instrument_node="">
</span><h2 data-dcnode-id="3015"><span class="mw-headline" data-dcnode-id="3023" id="Development"><span data-dcnode-id="3024" instrument_node="">Development</span></span><span class="mw-editsection" data-dcnode-id="3016"><span class="mw-editsection-bracket" data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">[</span></span><a data-dcnode-id="3019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia_%282008_video_game%29%26action%3Dedit%26section%3D7" title="Edit section: Development"><span data-dcnode-id="3020" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3014" instrument_node="">
</span><p data-dcnode-id="2956"><span data-dcnode-id="3013" instrument_node="">Proof of conception for </span><i data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3010" instrument_node=""> was found in September 2006, when a file that was leaked to the internet was found to contain concept art for the game,</span><sup class="reference" data-dcnode-id="3007" id="cite_ref-18"><a data-dcnode-id="3008" href="#cite_note-18"><span data-dcnode-id="3009" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3006" instrument_node=""> although Ubisoft didn't announce the game until May 2008. They stated that they expected to release the game towards the fourth quarter of 2008, and gave details about the plot and game play. In one such preview of the game, they revealed that the general staples of the game play remained intact, although altered drastically. These staples are platforming, combat, and puzzle-solving. It was also revealed that the game's combat would be one-on-one fights, similar to the original </span><i data-dcnode-id="3003"><a data-dcnode-id="3004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%23Original_trilogy" title="Prince of Persia"><span data-dcnode-id="3005" instrument_node="">Prince of Persia</span></a></i><span data-dcnode-id="3002" instrument_node=""> trilogy, rather than fighting hordes of enemies at any time, as in the </span><i data-dcnode-id="2999"><a data-dcnode-id="3000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%23The_Sands_of_Time_series" title="Prince of Persia"><span data-dcnode-id="3001" instrument_node="">Sands of Time</span></a></i><span data-dcnode-id="2998" instrument_node=""> series. Producer Ben Mattes stated that the intent in changing the combat so drastically was to give players the impression that each enemy was a unique and dramatic experience in itself.</span><sup class="reference" data-dcnode-id="2995" id="cite_ref-ubidaysinterview_5-1"><a data-dcnode-id="2996" href="#cite_note-ubidaysinterview-5"><span data-dcnode-id="2997" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2994" instrument_node=""> </span><i data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="2991" instrument_node=""> utilizes a heavily modified version of the Scimitar engine, which was also used in </span><i data-dcnode-id="2988"><a data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassin%2527s_Creed" title="Assassin's Creed"><span data-dcnode-id="2990" instrument_node="">Assassin's Creed</span></a></i><span data-dcnode-id="2987" instrument_node="">.
Developers chose to use this engine because it would allow them to enhance the game by adding more expansive worlds, and less linearity.</span><sup class="reference" data-dcnode-id="2984" id="cite_ref-ubidaysinterview_5-2"><a data-dcnode-id="2985" href="#cite_note-ubidaysinterview-5"><span data-dcnode-id="2986" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2983" instrument_node=""> In May 2008, Ubisoft released two official videos of a concept artist designing the Prince character and Elika.</span><sup class="reference" data-dcnode-id="2980" id="cite_ref-19"><a data-dcnode-id="2981" href="#cite_note-19"><span data-dcnode-id="2982" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2979" instrument_node=""> One video shows the Prince character being drawn, while the other details Elika.</span><sup class="reference" data-dcnode-id="2976" id="cite_ref-20"><a data-dcnode-id="2977" href="#cite_note-20"><span data-dcnode-id="2978" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2975" instrument_node=""> Yet another fast-forward concept art emerged in July 2008, this time depicting an antagonist: the Hunter.</span><sup class="reference" data-dcnode-id="2972" id="cite_ref-21"><a data-dcnode-id="2973" href="#cite_note-21"><span data-dcnode-id="2974" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2971" instrument_node=""> Unlike previous Ubisoft games such as </span><i data-dcnode-id="2968"><a data-dcnode-id="2969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassin%2527s_Creed" title="Assassin's Creed"><span data-dcnode-id="2970" instrument_node="">Assassin's Creed</span></a></i><span data-dcnode-id="2967" instrument_node="">, the PC version of </span><i data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="2964" instrument_node=""> contains no </span><a data-dcnode-id="2962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_rights_management" title="Digital rights management"><span data-dcnode-id="2963" instrument_node="">digital rights protection</span></a><span data-dcnode-id="2961" instrument_node="">.</span><sup class="reference" data-dcnode-id="2958" id="cite_ref-22"><a data-dcnode-id="2959" href="#cite_note-22"><span data-dcnode-id="2960" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2957" instrument_node="">
</span></p><p data-dcnode-id="2927"><span data-dcnode-id="2955" instrument_node="">Mattes said that when Ubisoft was initially developing the game, cooperative gameplay with an AI-controlled partner was the main idea they wanted to build on. Mattes explained, "We knew from day one basically </span><a data-dcnode-id="2953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cooperative_video_game" title="Cooperative video game"><span data-dcnode-id="2954" instrument_node="">cooperative gameplay</span></a><span data-dcnode-id="2952" instrument_node=""> was the hook that was going to replace </span><i data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">Sands of Time</span></i><span data-dcnode-id="2949" instrument_node="">... We didn't always know that it was going to be Elika from day one... We sort of explored the idea of maybe a child or father figure or brother, or something like that."</span><sup class="reference" data-dcnode-id="2946" id="cite_ref-mattesprima_23-0"><a data-dcnode-id="2947" href="#cite_note-mattesprima-23"><span data-dcnode-id="2948" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2945" instrument_node=""> The idea to base the game around AI-controlled functions came from </span><i data-dcnode-id="2942"><a data-dcnode-id="2943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Sands_of_Time" title="Prince of Persia: The Sands of Time"><span data-dcnode-id="2944" instrument_node="">Prince of Persia: The Sands of Time</span></a></i><span data-dcnode-id="2941" instrument_node="">. Mattes explained that the team felt the relationship between </span><a class="mw-redirect" data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Prince_of_Persia_characters%23Farah" title="List of Prince of Persia characters"><span data-dcnode-id="2940" instrument_node="">Farah</span></a><span data-dcnode-id="2938" instrument_node=""> and </span><a data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_%28Prince_of_Persia%29" title="Prince (Prince of Persia)"><span data-dcnode-id="2937" instrument_node="">the Prince character</span></a><span data-dcnode-id="2935" instrument_node=""> worked well from a story-telling point-of-view in </span><i data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Prince of Persia: The Sands of Time</span></i><span data-dcnode-id="2932" instrument_node="">, so they decided to expand on the concept.</span><sup class="reference" data-dcnode-id="2929" id="cite_ref-mattesprima_23-1"><a data-dcnode-id="2930" href="#cite_note-mattesprima-23"><span data-dcnode-id="2931" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2928" instrument_node="">
</span></p><span data-dcnode-id="2926" instrument_node="">
</span><h3 data-dcnode-id="2916"><span class="mw-headline" data-dcnode-id="2924" id="Downloadable_content"><span data-dcnode-id="2925" instrument_node="">Downloadable content</span></span><span class="mw-editsection" data-dcnode-id="2917"><span class="mw-editsection-bracket" data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">[</span></span><a data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia_%282008_video_game%29%26action%3Dedit%26section%3D8" title="Edit section: Downloadable content"><span data-dcnode-id="2921" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2915" instrument_node="">
</span><p data-dcnode-id="2885"><span data-dcnode-id="2914" instrument_node="">Downloadable content for </span><i data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="2911" instrument_node="">, titled </span><i data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Epilogue</span></i><span data-dcnode-id="2908" instrument_node="">, was confirmed by Ben Mattes in an interview with IGN. Mattes said that the new content would include new areas to explore, new enemies, new combat maneuvers, and a new power for Elika to use.</span><sup class="reference" data-dcnode-id="2905" id="cite_ref-24"><a data-dcnode-id="2906" href="#cite_note-24"><span data-dcnode-id="2907" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2904" instrument_node=""> The content was planned for release on February 26, 2009, on the Xbox 360 and </span><a data-dcnode-id="2902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PlayStation_3" title="PlayStation 3"><span data-dcnode-id="2903" instrument_node="">PlayStation 3</span></a><span data-dcnode-id="2901" instrument_node=""> consoles,</span><sup class="reference" data-dcnode-id="2898" id="cite_ref-epiloguereleasedate_25-0"><a data-dcnode-id="2899" href="#cite_note-epiloguereleasedate-25"><span data-dcnode-id="2900" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2897" instrument_node=""> but was delayed one week, releasing on March 5, 2009.</span><sup class="reference" data-dcnode-id="2894" id="cite_ref-26"><a data-dcnode-id="2895" href="#cite_note-26"><span data-dcnode-id="2896" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2893" instrument_node=""> Citing business reasons, Ubisoft did not release </span><i data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Epilogue</span></i><span data-dcnode-id="2890" instrument_node=""> for PC version of the game.</span><sup class="reference" data-dcnode-id="2887" id="cite_ref-shacknewsepiloguepc_27-0"><a data-dcnode-id="2888" href="#cite_note-shacknewsepiloguepc-27"><span data-dcnode-id="2889" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2886" instrument_node="">
</span></p><span data-dcnode-id="2884" instrument_node="">
</span><h2 data-dcnode-id="2874"><span class="mw-headline" data-dcnode-id="2882" id="Reception"><span data-dcnode-id="2883" instrument_node="">Reception</span></span><span class="mw-editsection" data-dcnode-id="2875"><span class="mw-editsection-bracket" data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">[</span></span><a data-dcnode-id="2878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia_%282008_video_game%29%26action%3Dedit%26section%3D9" title="Edit section: Reception"><span data-dcnode-id="2879" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2873" instrument_node="">

</span></p><p data-dcnode-id="2595"><a data-dcnode-id="2605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IGN" title="IGN"><span data-dcnode-id="2606" instrument_node="">IGN</span></a><span data-dcnode-id="2604" instrument_node=""> writer Hilary Goldstein praised the game for its simple but visually spectacular acrobatics and combat, but noted that one must "embrace the change [to the series]" in order to "fall in love [with it]".</span><sup class="reference" data-dcnode-id="2601" id="cite_ref-ignreview_48-1"><a data-dcnode-id="2602" href="#cite_note-ignreview-48"><span data-dcnode-id="2603" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2600" instrument_node=""> Goldstein also praised Elika, the secondary character of the game, as a useful sidekick during gameplay and also as a likeable character with a great relationship with the Prince.</span><sup class="reference" data-dcnode-id="2597" id="cite_ref-ignreview_48-2"><a data-dcnode-id="2598" href="#cite_note-ignreview-48"><span data-dcnode-id="2599" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2596" instrument_node="">
</span></p><p data-dcnode-id="2587"><a data-dcnode-id="2593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GameSpot" title="GameSpot"><span data-dcnode-id="2594" instrument_node="">GameSpot</span></a><span data-dcnode-id="2592" instrument_node="">'s Kevin VanOrd shared a similar opinion and in addition praised its excellent artistic design.</span><sup class="reference" data-dcnode-id="2589" id="cite_ref-gamespotreview_41-1"><a data-dcnode-id="2590" href="#cite_note-gamespotreview-41"><span data-dcnode-id="2591" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2588" instrument_node="">
</span></p><p data-dcnode-id="2561"><span data-dcnode-id="2586" instrument_node="">However, many criticized the game for being too easy or "consumer-friendly", regarding the simple platforming and combat segments.</span><sup class="reference" data-dcnode-id="2583" id="cite_ref-eurogamerreview_37-1"><a data-dcnode-id="2584" href="#cite_note-eurogamerreview-37"><span data-dcnode-id="2585" instrument_node="">[37]</span></a></sup><sup class="reference" data-dcnode-id="2580" id="cite_ref-gamespotreview_41-2"><a data-dcnode-id="2581" href="#cite_note-gamespotreview-41"><span data-dcnode-id="2582" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="2577" id="cite_ref-ignreview_48-3"><a data-dcnode-id="2578" href="#cite_note-ignreview-48"><span data-dcnode-id="2579" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2576" instrument_node=""> </span><a data-dcnode-id="2574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eurogamer" title="Eurogamer"><span data-dcnode-id="2575" instrument_node="">Eurogamer</span></a><span data-dcnode-id="2573" instrument_node=""> described it as a "poor game" with "excessive repetition" but nonetheless with "fantastic technology and interesting mechanics".</span><sup class="reference" data-dcnode-id="2570" id="cite_ref-eurogamerreview_37-2"><a data-dcnode-id="2571" href="#cite_note-eurogamerreview-37"><span data-dcnode-id="2572" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2569" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="2567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1UP.com" title="1UP.com"><span data-dcnode-id="2568" instrument_node="">1UP.com</span></a><span data-dcnode-id="2566" instrument_node=""> criticized the trial-and-error nature of the platforming gameplay.</span><sup class="reference" data-dcnode-id="2563" id="cite_ref-1UP_review_54-0"><a data-dcnode-id="2564" href="#cite_note-1UP_review-54"><span data-dcnode-id="2565" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2562" instrument_node="">
</span></p><p data-dcnode-id="2518"><span data-dcnode-id="2560" instrument_node="">Many comparisons have been drawn to other video games in terms of artistic design and gameplay. Examples include </span><i data-dcnode-id="2557"><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mirror%2527s_Edge" title="Mirror's Edge"><span data-dcnode-id="2559" instrument_node="">Mirror's Edge</span></a></i><sup class="reference" data-dcnode-id="2554" id="cite_ref-1UP_review_54-1"><a data-dcnode-id="2555" href="#cite_note-1UP_review-54"><span data-dcnode-id="2556" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2553" instrument_node=""> and Ubisoft's own </span><i data-dcnode-id="2550"><a data-dcnode-id="2551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassin%2527s_Creed" title="Assassin's Creed"><span data-dcnode-id="2552" instrument_node="">Assassin's Creed</span></a></i><span data-dcnode-id="2549" instrument_node=""> with unique platforming and timing-based combat.</span><sup class="reference" data-dcnode-id="2546" id="cite_ref-eurogamerreview_37-3"><a data-dcnode-id="2547" href="#cite_note-eurogamerreview-37"><span data-dcnode-id="2548" instrument_node="">[37]</span></a></sup><sup class="reference" data-dcnode-id="2543" id="cite_ref-gamespotreview_41-3"><a data-dcnode-id="2544" href="#cite_note-gamespotreview-41"><span data-dcnode-id="2545" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2542" instrument_node=""> The vast open-world environment with intense boss fights have been compared to </span><i data-dcnode-id="2539"><a data-dcnode-id="2540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ico" title="Ico"><span data-dcnode-id="2541" instrument_node="">Ico</span></a></i><span data-dcnode-id="2538" instrument_node=""> and </span><i data-dcnode-id="2535"><a data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shadow_of_the_Colossus" title="Shadow of the Colossus"><span data-dcnode-id="2537" instrument_node="">Shadow of the Colossus</span></a></i><span data-dcnode-id="2534" instrument_node="">,</span><sup class="reference" data-dcnode-id="2531" id="cite_ref-1UP_review_54-2"><a data-dcnode-id="2532" href="#cite_note-1UP_review-54"><span data-dcnode-id="2533" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2530" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="2528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Watercolor" title="Watercolor"><span data-dcnode-id="2529" instrument_node="">watercolor</span></a><span data-dcnode-id="2527" instrument_node=""> looks to </span><i data-dcnode-id="2524"><a data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C5%258Ckami" title="Ōkami"><span data-dcnode-id="2526" instrument_node="">Ōkami</span></a></i><span data-dcnode-id="2523" instrument_node="">.</span><sup class="reference" data-dcnode-id="2520" id="cite_ref-GameRev_review_40-1"><a data-dcnode-id="2521" href="#cite_note-GameRev_review-40"><span data-dcnode-id="2522" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2519" instrument_node="">
</span></p><span data-dcnode-id="2517" instrument_node="">
