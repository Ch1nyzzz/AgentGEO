</span><p data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">This is where Eve, the mother of all living, comes into the story. Eve is called woman, because she comes out of man (or mind). There is a hint of separation here in the mind. At first it is untainted. This separation is good. It represents the faintest beginnings of the mind that can begin to explore its greater potential in the act of self-awareness. This dual nature of the mind now has more of an experience to operate in, a potential to draw conclusions about itself in a self-experiential manner which is different then its more undifferentiated aspect.&nbsp;</span></p><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">The phrase “mother of all living” has a very important esoteric significance, and gives us the understanding of the symbolic nature of Eve, or that which she will become after the fall is complete.</span></p><span data-dcnode-id="2596" instrument_node="">
</span><p data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">Eve symbolizes the emotion nature united to the mental nature of the lower mind. I will explain the “lower mind” soon, because it is not considered the lower mind until after its fall. But when God states that man (mind) had no help-meet in life (Eve), it means that man (mind) had no depth and breath of life and self consciousness. The mind’s “eyes” were not opened yet. It had no e – “motion.” Emotion is the beginning of the life principle, because it drives experience from desire. It is the attraction and repulsion of opposites. It is, in a metaphysical sense, experience and motion, or life itself in the human body. In its lower (tempted) nature, it draws the mind of mental thought into the Maya of separation and continued unconsciousness, or decision based on desire instead of will. Notice how the serpent tempted Eve, not Adam. Once the serpent tempted Eve, only then could Adam be tempted, because it is only through desire the mental principle is tempted. However, in its higher nature, the higher emotions are positive for the mind, and adds to it true self-consciousness, wisdom, and understanding.</span></p><span data-dcnode-id="2593" instrument_node="">
</span><p data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">For spirit to create and unfold into man as the first Adam, it must involve into mind and emotion. It must contain the ability to think, but also to feel. It must produce thought, initially with desire, which gives motion to the thought. It gives a deeper sense of self-consciousness and “I” to the thought. It brings more awareness of separateness to thought. The emotional nature united with the mind principle becomes “the mother of all living.”&nbsp;</span></p><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">But there is a problem. This separateness, this “I,” becomes trapped in the lower aspect of it’s dual nature because of the more separateness it is experiencing. At least at first. How is this shown metaphysically in the first few chapters of Genesis?</span></p><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">It is shown through the allegory of the serpent.&nbsp;</span></p><span data-dcnode-id="2584" instrument_node="">
</span><p data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">The serpent causes spiritual death because it symbolically represents the force of desire in the mind. This force of desire is expressed as temptation to the fruit pleasing to the eye. By fruit we mean everything that engages and tempts (attracts) all the lower aspects of mind and emotion. Spiritual death occurs because the mind experiences a separateness of existence from the rest of the universe (i.e. God). It is still one with God, but this separate “I” doesn’t KNOW it through the direct experience it once had when God walked in the cool of the Garden with Adam. And thus we find most of mankind in this spiritual death. However, through the fall of mind by the serpent, mankind achieved a physical body and the temple of the lower nature is now complete.</span></p><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2578"><em data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">“And unto Adam also and unto his wife did the LORD God make coats of skins, and clothed them” (Gen. 3:21).</span></em></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">This skin is not the skin of animals (that god killed) to give to man as we have been taught. It is symbolic of the flesh itself, all of your physical temple-body. It is a metaphor for the completion of the human-body-temple, in which the indwelling spirit comes to inhabit, evolved by itself as it further differentiated itself. And please understand. This allegory isn’t about an anthropomorphic being clothing Adam, it is the history of how the mind fell into the lowest plane of matter. The story of Prometheus, we will see later, is exactly the same!</span></p><span data-dcnode-id="2574" instrument_node="">
</span><h3 data-dcnode-id="2571"><strong data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">More on the Serpent</span></strong></h3><span data-dcnode-id="2570" instrument_node="">
</span><p data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">While the serpent symbolically represents the desire-mind on one level, it also depicts the truth of karma, for the mind must reap what it sows. Spirit’s slow descent into matter reaps a body-temple for this new aspect of self-consciousness to begin exploring in the arena of life (a complicated web of maya, or duality). For spirit to evolve into a more self-conscious being, the mind had to fall (create) a proper vessel for this new kind of expression. The human-body-temple, with its nerve centers, it’s highly advanced brain, and its complex array of endocrine glands allow emotion and thought to express itself in ways that can lead to a greater sense of self-consciousness when thrust in the maya of experiences it is confronted with.&nbsp;</span></p><span data-dcnode-id="2567" instrument_node="">
</span><p data-dcnode-id="2563"><em data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">“…the man is now become as one of us, to KNOW good from evil…”</span></em><span data-dcnode-id="2564" instrument_node=""> (Gen 3:22).</span></p><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">More accurately expressed, “The mind is now become as one of the Elohim, to KNOW opposites, and the potential for true self-consciousness.”</span></p><span data-dcnode-id="2559" instrument_node="">
</span><p data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">In other words, the mind, through it’s new temple, now has the ability to choose the path towards Godhood. Yes, mankind will now experience pain and suffering along the way, but he has the ability to choose, for:</span></p><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2553"><em data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">“…the eyes of them both were opened…” (Gen 3:7).</span></em></p><span data-dcnode-id="2552" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Jesus alludes to this in Luke 24:31. The disciples did not know the risen Christ, but after they ate (metaphorically) what Jesus provided their eyes were opened and they recognized him. After Adam and Eve ate what the serpent tempted them with their eyes were also opened. However, Adam and Eve’s eyes were only opened physically, the lower mental and emotional nature, while the disciples eyes were opened spiritually, to the second Adam, or Christ within themselves.</span></p><span data-dcnode-id="2549" instrument_node="">
</span><p data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Another way to put it would be that the Mind has now been imbued with the potential for choice, or self-conscious development. To do so, the mind will have to claw its way back to the Tree of Life through tilling the ground (disciplining the body temple of thought, emotion, and sensation) amongst the thorns (the trials of life) of the ground (the body temple) to yield its fruit (it’s potential of newfound self-consciousness).&nbsp;</span></p><span data-dcnode-id="2546" instrument_node="">
</span><p data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">The allegory of mankind being kicked out of Eden means through physical suffering he will have to learn how to discipline his lower nature as not to be the servant of it, but rather it’s ruler. </span></p><span data-dcnode-id="2543" instrument_node="">
</span><p data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">And how does one do this?</span></p><span data-dcnode-id="2540" instrument_node="">
</span><p data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Jesus made it clear as day. Please pay very close to attention, as it relates to all that we have discussed:</span></p><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2534"><em data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">“And as Moses lifted up the serpent in the wilderness, even so must the son of man be lifted up…” (John 3:14).</span></em></p><span data-dcnode-id="2533" instrument_node="">
</span><p data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Meaning, Moses, as the law-giver and symbol of the moral nature in man, which had to come first, begins through correct thought, action, and speech, the process of raising the serpent from the curse of the dust of the ground upwards for healing. In other words, following the universal law of karma (of reaping and sowing), the free will choices that man now has can either lead to a continued sense of separateness and pain, or it can begin to choose the path of liberation from Maya (the illusion of separateness created by the dual mind) through self-conscious liberation.</span></p><span data-dcnode-id="2530" instrument_node="">
</span><p data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">But that’s not all! The verse spoken by Jesus right before him mentioning the serpent brings the entire meaning of what happened originally in the garden into crystal clarity:</span></p><span data-dcnode-id="2527" instrument_node="">
</span><p data-dcnode-id="2524"><em data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">“And no man ascended up to heaven, but he that came down from heaven, even the son of man which is IN heaven” (John 3:13).</span></em></p><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">In other words, no man can ascend up to heaven (blissful state of peace and unity of mind) until one has first descended down into earth, just as his example shows us!</span></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">By son of man, Jesus means son of MIND, the universal divine mind, which “came down from heaven” (the fall of mind into matter), in order to work it’s way back up again. Here we have the allegory of Adam and Eve repeated in these two verses by Jesus.&nbsp;</span></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Also, remember where Jesus tells the disciples that in the beginning, God made them (separate mankind and minds) both male and female (a unity). This means the state of the mind before Adam and Eve. This unity was just Adam. </span></p><span data-dcnode-id="2514" instrument_node="">
</span><p data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">When Moses raised the serpent, all the people who were bitten by the fiery serpent (self-consciousness, the spark of the inner immortal thinking principle), became healed. In other words, even though the Israelites had this fiery spark of the immortal thinking principle within them, because of selfishness and being controlled by the lower nature, they were sick! They were utterly lost and separated (sin) from their own indwelling divine nature.&nbsp;</span></p><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Jesus also teaches us the same path by alluding to the lawgiver, Moses, who, again, the law of God teaches us that we reap what we sow. Remember, the Torah of God is not very far from you Moses tells the people, it is near to you, it is IN YOU! (Duet. 30:14).</span></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">So the path to liberation, to uplifting the mind from the world of Maya, is threefold:</span></p><span data-dcnode-id="2505" instrument_node="">
</span><ol data-dcnode-id="2498"><li data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Service to humanity…developing the higher emotional qualities that lead to unity, not more separation.</span></li><li data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Discipline, by developing the unlimited power of will given to the steady mind which has the ability to portray thoughts that are uplifting, noble, loving, peaceful, and intelligent. Meditation is a part of this path to tame the mind and thoughts which run wild by the lower nature.&nbsp;</span></li><li data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Study and the further development of the mind, especially upon metaphysical subjects that show the nature of God and reality is Echad (ONE). Studying subjects such as history, math, the sciences, philosophy, etc. is also highly beneficial towards improving one’s mental focus and the intellect.&nbsp;</span></li></ol><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">In the vast ocean of the reincarnating ego, or the immortal thinking principle within, any individual can be working on all of the above in combination, or focusing on one more in particular. It depends on that soul alone, and at different stages in life a soul will probably oscillate between them. The point is balance. A towering intellect can become prideful and more separate. But a towering intellect that incorporates the first and second principles stated above will use that intellect for good and not evil. There must be a balance brought back to the mind, to achieve an equilibrium. Intellect devoid of the heart remains dead. The heart without the guiding principle of the intellect remains undeveloped. The mind needs to incorporate the heart, and the heart needs to be guided by the higher intellect (combined with intuition), which can only become perfect intuition alongside the heart.&nbsp;</span></p><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Remember, the scripture tells us that as a man “thinketh” in his heart, so is he. As he “thinketh,” so IS HE. Let that sink in.</span></p><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">The word man comes from the term manas, which means the thinker. In esoteric doctrine the thinker (not the thoughts themselves, but that which is able to think), is the immortal reincarnating principle. The great will power to do, speak, and think that which is right and pleasing before the Lord comes forth as the Christ (Logos) within when the mind is transformed and renewed. If one does not develop this will power inherent in the Logos, then the mind is carried off by the tempting serpent which is cursed to crawl on the ground, in the dust (remain mired in the mud of the lower nature body temple, swayed only by it’s untrained passional nature). This mind is always barred from the tree of life by the flaming sword which is double-edged, and it crucifies the Christ nature anew. </span></p><span data-dcnode-id="2488" instrument_node="">
</span><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Scripture also strongly correlates man with trees (Psalms 1:3). Why would man be compared to a tree? The esoteric meaning of the tree is man on all the planes of being. It has its roots in the ground (the lower nature body-temple), it’s trunk above the ground in the air, and its branches higher in the air (towards heaven) that soak up sunlight and convert this light into life-given energy. We can take this idea further and relate the idea of trees to the mind of man, or his very soul, which is a mind, that exists in the same duality that the tree metaphysical does. This is true for the Garden of Eden as well. The two trees in the Garden (although they are really one tree as they both are in the midst of the garden) symbolize which direction the mind of man gravitates towards. The tree of KNOWLEDGE of good and evil, is a tree symbolizing knowledge, or the ability to know, through experience. Why does the spirit incarnate in matter? It is to build and evolve the soul, or the mind, through experience, to which the mind then comes to KNOW. The Tree of Life, which is also in the midst of the Garden, is the mind which KNOWS no longer through good and evil, or the comparison and contrasting of opposites, but comes to KNOW, after its long journey and pilgrimage, the source of life (the Logos) itself.&nbsp;</span></p><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">The serpent is more cunning than any “beast” of the field. Desire is just that. It is not more cunning because it is smarter, it is more cunning because it is the grand trickster, the grand illusionists, that convinces the mind to participate with it. It tricks the mind into separation from its parent source, so that it melds (and identifies) with desire instead of being the ruler (WILL POWER) of desire. Thus the great truth. God tells Adam to rule over his wife. Esoterically, this means that the intellectual principle must guide the lower passionate nature of man, and when done properly, the emotional aspect returns an emotional maturity to the intellect. It is the mother life principle in action upon the intellect. The intellect can only sacrifice itself by being the guiding principle by loving the emotional nature which came out of it, and then the emotional nature provides true life back to the intellectual nature.&nbsp;</span></p><span data-dcnode-id="2482" instrument_node="">
</span><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">It is obvious that Genesis is telling us an allegory of how the mind received an addition to its potential, i.e., the ability to reason by comparing and contrasting opposites, or the ability to choose this or that. Before the fall, the soul wasn’t in a physical temple or body with a physical brain organ containing the prefrontal cortex that can reason. The soul had a different kind of intelligence, an intelligence that wasn’t choosing this or that, but worked with an intelligence that wasn’t so differentiated. The soul didn’t have to make choices because it walked with the spirit of God in the Garden, meaning, the soul, or mind, had not yet evolved it’s most outer garment.&nbsp;</span></p><span data-dcnode-id="2479" instrument_node="">
</span><h3 data-dcnode-id="2476"><strong data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Lucifer</span></strong></h3><span data-dcnode-id="2475" instrument_node="">
</span><p data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Lucifer is a bit of a tricky subject because of the emotions the name alone itself can invoke in religiously-steeped doctrine and dogmatism. To a certain extent we have all been socially conditioned in this way. So it is understandable. I do not have the time to write about how the concept of Lucifer has been wrongly interpreted, so I will give only some brief revelations.&nbsp;</span></p><span data-dcnode-id="2472" instrument_node="">
</span><p data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Jesus tells us that he saw Lucifer, the great dragon, kicked out from heaven…as lightning! He is alluding to the same story which the allegory of the Garden of Eden teaches us, again!</span></p><span data-dcnode-id="2469" instrument_node="">
</span><p data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Heaven is a state of bliss and unity of mind. Lucifer, which means the “light bearer,” which is the immortal thinker aspect, was kicked out of union or bliss, and cast to the earth. In a sense, Lucifer is the first Adam as expressed through his son Cain, our lower nature as opposed to Abel. Cain and Abel are allegories of the two natures within man, or the offspring of mind and emotion expressed through the desire principle with a hint of aspiration for higher thoughts and love (Abel) which can be pleasing still to god. God tells Cain, you have the choice to do right, but sin is at thy door. In other words, separation from me, through the mind, is before you. What will you choose?&nbsp;</span></p><span data-dcnode-id="2466" instrument_node="">
</span><p data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">Lightning, when hitting wood, sparks fire. This fire or flame symbolizes the thinking principle of man, which is a potential in unity, but burns bright when cast into a body temple. This is what the serpent metaphysically understood also gave to man. “Their eyes were opened, and they became as the Elohim.” But at first it is still in a fallen state. But it now has the ability to gain true self-consciousness and awareness. Lucifer is also called the bright and morning star, curiously, just as Jesus is alluded to in Revelation.&nbsp;</span></p><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Lucifer becomes the Satan (adversary) principle when the mind is not disciplined and expressed through will, but subject to desire. It is then an enmity with God, and subject to the serpent cursed to crawl on the ground. It can then and does manifest itself as an adversary to God and our higher God-given nature. Religion has chosen to cast these allegories as two anthropomorphic beings outside of us instead of realizing the inherent meanings within us.&nbsp;</span></p><span data-dcnode-id="2460" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2459" instrument_node="">Even Jesus, after he was filled with the spirit, was driven into the wilderness to be tempted by this adversary, or principle that is at enmity with God. Notice something important here. Jesus had no choice. Even after being filled with the very spirit of life, he was DRIVEN, as if by force, to face the temptations of the adversarial mind. He overcomes the adversarial nature within him through strict discipline of the mind, which all of his temptations symbolize when studied carefully. Remember, the moment of the crucifixion happens at Golgotha, which means place of the skull. The battle ultimately culminates in the area of grey matter underneath your skull </span><img alt="🙂" class="emoji" data-dcnode-id="2458" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">This is all I will say for Lucifer, Satan, and the Serpent now. While I originally intended to get to Prometheus in this second post of the series, I realize it would be better to end part two here and continue with Prometheus in part three. Please feel free to share any thoughts you have in the comment section below for further engagement of what was discussed above. Oftentimes you at the SOS community bring so much more clarity through your comments.&nbsp;</span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">Blessings.&nbsp;</span></p><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2444"><a data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4532-prometheus-hercules-christ-lucifer-and-the-serpent-a-comparative-analysis-part-one.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2449" instrument_node="">Post 1</span></a><span data-dcnode-id="2447" instrument_node=""> / Post 2 / </span><a data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4564-prometheus-the-throne-of-the-higher-mind.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2446" instrument_node="">Post 3</span></a></p><span data-dcnode-id="2443" instrument_node="">

instrument_node="">God</span></a><span data-dcnode-id="2422" instrument_node="">, </span><a data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/jesus-and-mythical-characters-compared" rel="category tag"><span data-dcnode-id="2421" instrument_node="">Jesus and Mythical Characters Compared</span></a><span data-dcnode-id="2419" instrument_node="">, </span><a data-dcnode-id="2417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/lucifer-and-satan" rel="category tag"><span data-dcnode-id="2418" instrument_node="">Lucifer and Satan</span></a><span data-dcnode-id="2416" instrument_node="">, </span><a data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/reincarnation" rel="category tag"><span data-dcnode-id="2415" instrument_node="">Reincarnation</span></a><span data-dcnode-id="2413" instrument_node="">, </span><a data-dcnode-id="2411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/spirit-and-soul" rel="category tag"><span data-dcnode-id="2412" instrument_node="">Spirit and Soul</span></a></span><span data-dcnode-id="2409" instrument_node=""> </span></p></footer></article><article class="post-4532 post type-post status-publish format-standard has-post-thumbnail category-creation-and-the-bible category-eastern-scriptures category-esoteric category-exoteric category-good-and-evil category-paul-and-mysticism category-the-gospels entry" data-dcnode-id="2121" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="2388"><h1 class="entry-title" data-dcnode-id="2403" itemprop="headline"><a data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4532-prometheus-hercules-christ-lucifer-and-the-serpent-a-comparative-analysis-part-one.html" rel="bookmark"><span data-dcnode-id="2405" instrument_node="">Prometheus, Hercules, Christ, Lucifer, and the Serpent: A Comparative Analysis Part One</span></a></h1><span data-dcnode-id="2402" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="2389"><time class="entry-time" data-dcnode-id="2400" datetime="2020-10-11T21:27:21-05:00" itemprop="datePublished"><span data-dcnode-id="2401" instrument_node="">October 11, 2020</span></time><span data-dcnode-id="2399" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="2395" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/admin" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="2397" itemprop="name"><span data-dcnode-id="2398" instrument_node="">Joshua Tilghman</span></span></a></span><span data-dcnode-id="2394" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="2391"><a data-dcnode-id="2392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4532-prometheus-hercules-christ-lucifer-and-the-serpent-a-comparative-analysis-part-one.html%23comments"><span data-dcnode-id="2393" instrument_node="">12 Comments</span></a></span><span data-dcnode-id="2390" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="2147" itemprop="text"><span data-dcnode-id="2387" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2385"><img alt="" class="wp-image-4540" data-dcnode-id="2386" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2020/10/sunset-3276263_640-1-1.jpg&amp;raw" srcset="http://www.spiritofthescripture.com/wp-content/uploads/2020/10/sunset-3276263_640-1-1.jpg 640w, http://www.spiritofthescripture.com/wp-content/uploads/2020/10/sunset-3276263_640-1-1-300x200.jpg 300w"></figure><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">In today’s post I am going to begin discussing the symbolic meaning between the mythological story of Prometheus and some of our Biblical characters and events. While they seem quite different, I hope to show you this is only because they have been misunderstood in their exoteric, or outward interpretations. However, esoterically they reveal the same divine truth about the nature of the human experience. Of course religious doctrine refuses such an interpretation, but this reveals the very limited thought of religious doctrine itself. I’ll let you be the judge after the article, and I hope to hear your opinions in the comment section when this series is finished.</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p data-dcnode-id="2373"><span data-dcnode-id="2380" instrument_node="">This series will be long and quite in depth in esoteric concepts. I will have to do this in order to lay the proper foundation. So we will begin by discussing many Biblical concepts before we get to our story of Prometheus later on in the series, but if you are patient with me I believe the work of reading and carefully dissecting will be worth it for you. This post will focus specifically on the idea of the </span><em data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">logos</span></em><span data-dcnode-id="2377" instrument_node="">, with the following post more focused on the story of Prometheus alongside some of the Biblical characters. Ultimately, we are going to end up unveiling the correlation between Christ and Prometheus as the </span><em data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">logos</span></em><span data-dcnode-id="2374" instrument_node="">, or the personification of God’s wisdom through emenation (creation) as divine thought. We will explore many other themes, such as reincarnation in both the Prometheus story (where it is clearly indicated) and the Bible (where it is hinted).&nbsp;</span></p><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">As a side note, I want to propose a little riddle for you before I begin this post. The answer will be revealed at the end of this series, where I hope you will experience an “aha” moment that will connect with all of the information below. Here’s the riddle:</span></p><span data-dcnode-id="2369" instrument_node="">
</span><p data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Can an omnipotent being (God) create a rock that would be too heavy for even him to lift?&nbsp;</span></p><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2363"><span data-dcnode-id="2365" instrument_node="">Have fun with the riddle. That’s what it’s meant for. It’s an old riddle, but don’t look it up if you aren’t familiar with it. Just let your mind contemplate it. Feel free to comment below before I reveal the answer that is connected to the information presented below and throughout the series </span><img alt="🙂" class="emoji" data-dcnode-id="2364" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="2362" instrument_node="">
</span><h3 data-dcnode-id="2356"><strong data-dcnode-id="2357"><span data-dcnode-id="2361" instrument_node="">What is the </span><em data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Logos</span></em><span data-dcnode-id="2358" instrument_node="">?</span></strong></h3><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2350"><span data-dcnode-id="2354" instrument_node="">In Greek, the word </span><em data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">logos</span></em><span data-dcnode-id="2351" instrument_node=""> carries the idea of reason and speech, and while this is true, it is only its lower meaning. It’s higher meaning is the divine outpouring of life (spirit) in form (matter) through man’s (and the universe’s) spiritual evolutionary journey. In its lower sense, it manifests in man as desire, intellect, and action upon impulse. In it’s higher sense, it expresses true free will, wisdom, and action through love.&nbsp;</span></p><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">The first chapter of the John’s Gospel poetically states:</span></p><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2343"><em data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">“In him was life; and the life was the light of men” (John 1:4).</span></em></p><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2337"><span data-dcnode-id="2341" instrument_node="">The </span><em data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">logos</span></em><span data-dcnode-id="2338" instrument_node="">, or this “life / light,” is the creative energy and expression of motion and life throughout all the cosmos. The writer of Acts, in quoting a poem written by an Athenian to Zeus, has Paul state about this about Christ:</span></p><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2333"><em data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">“For in him we live, and move, and have our being; as certain of your own poets have said, for we are also his offspring” (Acts 17:28).&nbsp;</span></em></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2324"><span data-dcnode-id="2331" instrument_node="">This reflects Paul’s assertion that the </span><em data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">logos</span></em><span data-dcnode-id="2328" instrument_node=""> is not limited to one being, but that all humans have their life, their movement, and their very being itself because we are all the offspring of the </span><em data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">logos</span></em><span data-dcnode-id="2325" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2318"><span data-dcnode-id="2322" instrument_node="">Although the history of the word </span><em data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">logos </span></em><span data-dcnode-id="2319" instrument_node="">from its first use by Heraclitus around 500 B.C. is confused by much scholarly opinion, it can be simplified by quoting Blavatsky:</span></p><span data-dcnode-id="2317" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2316" instrument_node="">[The </span><em data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">logos</span></em><span data-dcnode-id="2313" instrument_node=""> is] “</span><em data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">The manifested deity with every nation and people; the outward expression, or the cause of the effect which is ever concealed.”</span></em><span data-dcnode-id="2310" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2300"><span data-dcnode-id="2307" instrument_node="">Now we can understand why the Apostle Paul chose to quote a pagan Greek poet who dedicated an idea of the </span><em data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">logos</span></em><span data-dcnode-id="2304" instrument_node=""> to Zues to explain his concept of Jesus Christ to the Athenians; he was giving them a philosophical concept they would already be familiar with. We can imagine this scene where Paul speaks from Mars Hill to the Athenians to introduce them to his idea of Christ Jesus, the personification of the </span><em data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">logos</span></em><span data-dcnode-id="2301" instrument_node=""> in man in its fullness of potential, as something they themselves could express, not just build statues to as an ideal to worship. They, too, had the ability to express a higher principle within them. Paul further reflects this in Colossians 1:26-27:</span></p><span data-dcnode-id="2299" instrument_node="">
</span><p data-dcnode-id="2296"><em data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">“Even the mystery which has been hidden from ages and from generations, but now is made manifest to his saints: To whom God would make known what is the riches of this mystery among the gentiles; which is CHRIST IN YOU, you’re hope of glory.”</span></em></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">I purposely capitalize the important part of that sentence. The Athenians sought God outwardly, but Paul sends them inwardly, where Jesus stated the Kingdom of God is (Luke 17:21).&nbsp;</span></p><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2287"><span data-dcnode-id="2291" instrument_node="">And what is this mystery, this hidden knowledge? It is that Christ Jesus, the potential expression of the </span><em data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">logos</span></em><span data-dcnode-id="2288" instrument_node="">, can be made manifest through man from the inside out, rather than worship God from the outside in. It has been hidden from the intellect, but has been the very source (unknown to most) that it is the very source of the intellect and mind itself, as well as the body, soul, and every part and parcel of the cosmos, whether the physical and visible plane of materiality, or the invisible aspects of reality.</span></p><span data-dcnode-id="2286" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2285" instrument_node="">Returning to Blavatsky’s statement, when she states that the </span><em data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">logos</span></em><span data-dcnode-id="2282" instrument_node=""> is the manifested deity with every nation and people, she is hinting at the fact that this is true in it’s exoteric expression, as when she states, “the outward expression” through mythology and religious culture. But like Paul, she tells us its true meaning, and even expands upon it as in her concept of the three logoi (as in the trinity) as being:</span></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2277"><em data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">“…the personified symbols of three stages of spiritual evolution.”</span></em></p><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2275" instrument_node="">Now let’s expound upon this idea of the </span><em data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">logos</span></em><span data-dcnode-id="2272" instrument_node=""> a little more. Let’s get to the real heart and soul of it, it’s all encompassing ONE feature. Although the writer of the Gospel of John, and many other Greek philosophers chose to write about the </span><em data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">logos </span></em><span data-dcnode-id="2269" instrument_node="">in its positive aspects as identified through deity such as the philosophical concept of Christ, we have to understand that it is the life animating principle which can also reveal itself to what we as humans might consider as negative, or evil. Consider Isaiah’s statement:&nbsp;</span></p><span data-dcnode-id="2267" instrument_node="">
</span><p data-dcnode-id="2264"><em data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">“I form the light, and create darkness: I make peace, and create evil: I the LORD do all these things” (Isaiah 45:7).&nbsp;</span></em></p><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2255"><span data-dcnode-id="2262" instrument_node="">The hebrew word for “evil” might better be interpreted as calamity, or adversity. What the author is telling us is that the one animating principle unfolds in manifestation through polar opposites of spirit and matter. This doesn’t mean that a conscious being created evil. It means that the animating principle of all life, depending on the vessel of its expression, can be the cause of adversity, calamity, or even that which we humans consider to be “evil.” In the greater picture, the </span><em data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">logos</span></em><span data-dcnode-id="2259" instrument_node=""> expresses itself in different stages of spiritual evolution as shown in the Hebrew scriptures. Does not even the child, being raised by parents, go through stages after birth from selfishness and expressing desire where everything is only about them before they can expand their world view of themselves vs. others? Of course. The development of humanity as a whole does this as well on a much grander scale. And the different characters of the Bible symbolize this spiritual evolution of conscious expression, which will also be shown in the story of Prometheus. For a man or woman who lives by his or her impulses and desires only, such as presented to us by Cain in the Bible, this expression is selfish, separated from God, and is completely personal, egoic, and all about “me.” But it is still the </span><em data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">logos</span></em><span data-dcnode-id="2256" instrument_node=""> which gives the power of expression even to this, although we intellectualize this idea as “evil.” But even Job, who knew God only by the hearing of him, did not come into a personal relationship of KNOWING until he had gone through the calamity and adversity presented to him in the form of an adversary. In the grander scale, pain and suffering is part of this process. This is also why the Apostle James is stated as saying:</span></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2251"><em data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">“…count it all joy when you fall into divers temptations; knowing this, that the trying of your faith worketh patience. But let patience have her perfect work…” (James 1:1-3).&nbsp;</span></em></p><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2249" instrument_node="">Evil and peace can be expressed through man, as man has two natures. Perhaps we can simplify it in this way: In the first Adam, the one that is earthy, or of the flesh, it (</span><em data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">logos</span></em><span data-dcnode-id="2246" instrument_node="">) is expressed through desire, intelligence (reason and intellect), and reactive impulse. But through Jesus Christ, the second Adam, it is expressed through will as opposed to desire, wisdom as opposed to lower intellect, and action as opposed to action from reaction. Thus the expression of the </span><em data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">logos</span></em><span data-dcnode-id="2243" instrument_node=""> can be shown as thus:</span></p><span data-dcnode-id="2241" instrument_node="">
</span><h4 data-dcnode-id="2237"><strong data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Higher nature</span></strong><span data-dcnode-id="2238" instrument_node="">: will, wisdom, action (the second Adam or Jesus Christ, the higher self manifested ).&nbsp;</span></h4><span data-dcnode-id="2236" instrument_node="">
</span><h4 data-dcnode-id="2232"><strong data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Lower nature</span></strong><span data-dcnode-id="2233" instrument_node="">: desire, intellect, reaction (the first Adam or humankind in the lower nature).</span></h4><span data-dcnode-id="2231" instrument_node="">
</span><p data-dcnode-id="2226"><span data-dcnode-id="2230" instrument_node="">Thus the </span><em data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">logos</span></em><span data-dcnode-id="2227" instrument_node=""> is the source of all life. It is a philosophical concept or principle, not a person or personality in and of itself. As such, when it is expressed through the lower desire nature, this expression is limited, and we can echo this in Paul’s statement as the “natural man.” When it is expressed through the higher nature, such as the man presented to us in the Gospels as Jesus Christ, (the purified man in body and soul), it begins and finishes as the expression of absolute wisdom / love.</span></p><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">This is taught in the Gospel of John when the writer states:</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2215"><em data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">“And the Word (logos) was made flesh, and dwelt among us…” (John 1:14). </span></em><span data-dcnode-id="2219" instrument_node="">The Jesus of the Gospels becomes the one who personifies the </span><em data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">logos</span></em><span data-dcnode-id="2216" instrument_node=""> as manifested through the higher self in the body of flesh.&nbsp;</span></p><span data-dcnode-id="2214" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2213" instrument_node="">For those who are having trouble with the fact that the </span><em data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">logos</span></em><span data-dcnode-id="2210" instrument_node=""> itself is a power, and not a person, we can easily rectify it with a few other scriptural ideas.&nbsp;</span></p><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2207" instrument_node="">Before the </span><em data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">logos </span></em><span data-dcnode-id="2204" instrument_node="">became flesh, it was God and was with God. What does this mean? Traditional Christian doctrine teaches that this was the second person of the trinity, who came down spiritually in the body of a man born from a virgin. This idea evolved over time in the early church through many councils of debate and intellectual discourse, and has been explained in a myriad of ways. But besides the very obvious fact that any person or being would be limited in nature by being that “person” or that “being” in the first place (a human attribute that is limited simply because it is a definition of something, and the act of defining something is a limitation in itself), and excludes the idea that the </span><em data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">logos </span></em><span data-dcnode-id="2201" instrument_node="">is a personal being. The </span><em data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">logos </span></em><span data-dcnode-id="2198" instrument_node="">is beyond both Being and non-Being, and is neither, something the human intellect cannot truly cognize. Remember, the scripture tells us that no-</span><em data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">thing</span></em><span data-dcnode-id="2195" instrument_node=""> was made that was not made through the </span><em data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">logos</span></em><span data-dcnode-id="2192" instrument_node="">. That means every “thing” that was made, or created, was done so through the power and emanation of the </span><em data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">logos</span></em><span data-dcnode-id="2189" instrument_node="">, even man’s lower nature which commits sin, or the act of living in separation from God.&nbsp;</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2179"><span data-dcnode-id="2186" instrument_node="">Now we also have to consider the very important scripture that Christ was crucified since the foundation of the world. Again, exoteric religion has taught us that God the Father had the idea in his mind since he created the world that he would send his son at the appointed time in history to die for our sins. But is this idea based on a wrong interpretation of scripture? If everything that was made is only possible through the expression of the </span><em data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">logos</span></em><span data-dcnode-id="2183" instrument_node="">, then wouldn’t this indicate, quite literally, that the </span><em data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">logos</span></em><span data-dcnode-id="2180" instrument_node=""> was crucified on the physical plane of matter since the first unfoldment of that which is beyond being and non-being came into manifested existence? Even the tiniest fundamental particle of anything that we could call some “thing,” whether at atom or a quark or a vibrating vortex of energy? As it states in the book of Revelation, “…the lamb that was slain from the foundation of the world.”&nbsp;</span></p><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">What does slain from the world’s foundation really mean?&nbsp;</span></p><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2170"><span data-dcnode-id="2174" instrument_node="">It more accurately means that the </span><em data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">logos, </span></em><span data-dcnode-id="2171" instrument_node="">pure spirit, inhabited a limited body at the commencement of creation (not just 2,000 years ago), but from spirit’s first emenation into the realm of being. This is the mystery that Paul spoke hidden for ages from everyone but the saints. The true meaning of the saint is one who is in accordance with the divine law of nature, and works in knowledge accordance with it.&nbsp;</span></p><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2161"><span data-dcnode-id="2168" instrument_node="">I will end this first part here. In the next post we will get into the good stuff, which will show you the uncanny relationships between Prometheus’ story and that of many of the Biblical characters, which is a little mind-blowing if it’s something you haven’t been exposed to, or never thought about before. But in conclusion I would like to mention that the scholar’s translation into English of the Greek term </span><em data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">logos</span></em><span data-dcnode-id="2165" instrument_node=""> is quite a poor translation. It came about from Greek to the Latin translation with the term, “Verbum,” and then from Verbum in the Latin to “Word” in English. This translation process has caused much confusion. The latin word “Verbum” indicates something entirely removed from the original Greek meaning. When the Greeks used the term </span><em data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">logos</span></em><span data-dcnode-id="2162" instrument_node=""> thousands of years ago, they were referring to a principle intelligence (not human intellect) that was the underlying structure and order to the entire cosmos, both unspoken and spoken. Unspoken in the sense that it transcends even human thought, and by spoken that it became manifested, much like a thought in the human mind becomes the word when it is manifested through spoken language from potential to actual. We will discuss more in the next post.&nbsp;</span></p><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Blessings.&nbsp;</span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2156" instrument_node="">Part 1 / </span><a data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4547-comparing-prometheus-and-biblical-characters-continued.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2155" instrument_node="">Part 2</span></a><span data-dcnode-id="2153" instrument_node=""> / </span><a data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4564-prometheus-the-throne-of-the-higher-mind.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2152" instrument_node="">Part 3</span></a></p><span data-dcnode-id="2149" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="2148"></div></div><footer class="entry-footer" data-dcnode-id="2122"><p class="entry-meta" data-dcnode-id="2123"><span class="entry-categories" data-dcnode-id="2125"><span data-dcnode-id="2146" instrument_node="">Filed Under: </span><a data-dcnode-id="2144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/creation-and-the-bible" rel="category tag"><span data-dcnode-id="2145" instrument_node="">Creation and the Bible</span></a><span data-dcnode-id="2143" instrument_node="">, </span><a data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/eastern-scriptures" rel="category tag"><span data-dcnode-id="2142" instrument_node="">Eastern Scriptures</span></a><span data-dcnode-id="2140" instrument_node="">, </span><a data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/esoteric" rel="category tag"><span data-dcnode-id="2139" instrument_node="">Esoteric</span></a><span data-dcnode-id="2137" instrument_node="">, </span><a data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/exoteric" rel="category tag"><span data-dcnode-id="2136" instrument_node="">Exoteric</span></a><span data-dcnode-id="2134" instrument_node="">, </span><a data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/good-and-evil" rel="category tag"><span data-dcnode-id="2133" instrument_node="">Good and Evil</span></a><span data-dcnode-id="2131" instrument_node="">, </span><a data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/paul-and-mysticism" rel="category tag"><span data-dcnode-id="2130" instrument_node="">Paul and Mysticism</span></a><span data-dcnode-id="2128" instrument_node="">, </span><a data-dcnode-id="2126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/the-gospels" rel="category tag"><span data-dcnode-id="2127" instrument_node="">The Gospels</span></a></span><span data-dcnode-id="2124" instrument_node=""> </span></p></footer></article><article class="post-4506 post type-post status-publish format-standard has-post-thumbnail category-about-the-scriptures category-awakening category-consciousness category-esoteric category-literal-vs-spiritual category-spirit-and-soul category-the-biblical-mind category-the-gospels entry" data-dcnode-id="1872" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="2103"><h1 class="entry-title" data-dcnode-id="2118" itemprop="headline"><a data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4506-jesus-peter-and-the-fish-esoteric-biblical-psychology-101.html" rel="bookmark"><span data-dcnode-id="2120" instrument_node="">Jesus, Peter, and the Fish: Esoteric Biblical Psychology 101</span></a></h1><span data-dcnode-id="2117" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="2104"><time class="entry-time" data-dcnode-id="2115" datetime="2020-08-05T16:26:31-05:00" itemprop="datePublished"><span data-dcnode-id="2116" instrument_node="">August 5, 2020</span></time><span data-dcnode-id="2114" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="2110" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/admin" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="2112" itemprop="name"><span data-dcnode-id="2113" instrument_node="">Joshua Tilghman</span></span></a></span><span data-dcnode-id="2109" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="2106"><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4506-jesus-peter-and-the-fish-esoteric-biblical-psychology-101.html%23comments"><span data-dcnode-id="2108" instrument_node="">21 Comments</span></a></span><span data-dcnode-id="2105" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="1901" itemprop="text"><span data-dcnode-id="2102" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2098"><img alt="" class="wp-image-4508" data-dcnode-id="2101" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2020/08/IMG_8409-768x1024.jpg&amp;raw" srcset="http://www.spiritofthescripture.com/wp-content/uploads/2020/08/IMG_8409-768x1024.jpg 768w, http://www.spiritofthescripture.com/wp-content/uploads/2020/08/IMG_8409-225x300.jpg 225w, http://www.spiritofthescripture.com/wp-content/uploads/2020/08/IMG_8409-1152x1536.jpg 1152w, http://www.spiritofthescripture.com/wp-content/uploads/2020/08/IMG_8409-1536x2048.jpg 1536w, http://www.spiritofthescripture.com/wp-content/uploads/2020/08/IMG_8409-scaled.jpg 1920w"><figcaption data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Me near the Appalachian Trail: August 2, 2020.</span></figcaption></figure><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">The fish has been an important Christian symbol for almost two thousand years. Much like the lion, the serpent, the dove, cattle, the bull, and the lamb, the fish is emphasized in several places in both the Old and New Testaments. It is easy to gloss over it’s symbolic meaning, but when studied, I believe it provides a master key to unlock a large portion of scriptural symbolism.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">In order to properly understand the symbol of the fish, we will have to juxtapose it with other important symbols and see how they all fit together. But first I want to introduce Gaskell’s definition of fish:</span></p><span data-dcnode-id="2091" instrument_node="">
</span><h2 data-dcnode-id="2088"><strong data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Fish of the Sea and Lakes</span></strong></h2><span data-dcnode-id="2087" instrument_node="">
</span><p data-dcnode-id="2084"><em data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">“A symbol of facts of the lower experience, namely, concepts, percepts, ideas, feelings, emotions.”</span></em></p><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">We can extend the definition above to any external knowledge and belief systems. It is the knowledge that we assimilate through the senses, including what our parents taught us, what we learn in school, from our peers, books, and our political and religious systems. These are the fish that swim in the lakes and seas of our subconscious mind.&nbsp;</span></p><span data-dcnode-id="2080" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">It is not that knowledge is bad. Quite the contrary. Knowledge is assimilated and analyzed through the mind and is necessary to develop the intellect. The problem comes when we identify ourselves with that knowledge, and take pride in it. Jesus rebuked the Pharisee for this reason. The Pharisee is like the rich man (lots of Torah intellectual knowledge), but was actually destitute and poor in spirit, or lacking in wisdom and understanding (the spirit and essence of the Torah).</span></p><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">How do we, as spiritual aspirants, avoid this trap?&nbsp;</span></p><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">Genesis chapter one tells us that the soul (higher mind, or heart) is to have dominion over knowledge. Remember, fish are the accumulated ideas, emotions, and belief systems the lower mind has acquired.</span></p><span data-dcnode-id="2071" instrument_node="">
</span><p data-dcnode-id="2068"><em data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">“But of the tree of the knowledge of good and evil, thou shalt not eat of it: for in the day thou eatest of it, thou shalt surely die” (Gen. 2:17).&nbsp;</span></em></p><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">The death described is an allegory for how consciousness becomes identified with the thought and the emotion itself instead of remaining aware of it as just a temporary experience.</span></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Mind has the ability to consciously express itself as a complete soul unit, which is the allegorical Tree of Life.</span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Let’s move on to those scriptures which teach us how this process happens allegorically. As we’ll see, Jesus aims to transform Peter (the lower mind) to a fisher of men (the mind as a complete soul unit).&nbsp;</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Without Christ, Peter (the lower mind) cast his net but cannot catch fish, meaning he does not yet have dominion over his own thoughts. But with the help of Christ, the spiritual energizing factor of the higher mind, Peter catches an abundance of fish! This signifies the higher mind having complete dominion and control over the mind’s lower vehicle of thought and emotion. Christ in this function is the divine life that is seeking to become ever more active in the soul (higher mind) of man. Peter, the natural man, must evolve. At a certain stage of spiritual evolution, we are all Peter in need of the spiritual influx of Christ, that anointing which can only operate in it’s full function through the power of the Holy Spirit, which IS the fullness of Christ’s unlimited power poured out from heaven into the mind. We’re also going to learn that at a certain stage of spiritual evolution, one of the twelves faculties of all mankind is a Jonah (limited lower mind), that becomes Simon Barjona (Peter), where Christ is recognized and the lower mind realizes, through a self aware process of cognition, its own limitation and the very great need for Christ to become more activated.&nbsp;</span></p><span data-dcnode-id="2055" instrument_node="">
</span><h2 data-dcnode-id="2052"><strong data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">Peter and the Fish</span></strong></h2><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Let’s look at Luke chapter five. Jesus is at the lake of Gennesaret preaching truth to the masses. He even climbs in Simon Peter’s ship and asks him to cast off from shore so he can teach from there. But when he is finished teaching to the masses (symbolic of the outer court), he turns his attention to the inner court, those nearest to him (specifically the faculty of mind that Peter signifies). The esoteric scene is now set to bring a plethora of spiritual concepts together!&nbsp;</span></p><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">From former blog posts you may remember that Peter signifies the lower mind; the mind that must be transformed, or renewed. How can we be sure that Peter signifies the lower mind? Jesus makes it clear when he rebukes Peter for trying to save him from Roman soldiers in Matthew 16:23:</span></p><span data-dcnode-id="2045" instrument_node="">
</span><p data-dcnode-id="2042"><em data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">“…for thou MINDEST not the things of God, but the things of men.”</span></em></p><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Not only did Jesus also refer to him as Satan earlier (the momentary adversary of the higher mind), but the Apostle Paul rebuked him in Galatians as well for following the letter of the law. As we’ll see shortly, the natural man (lower mind) is imprisoned through its own knowledge. This imprisonment is separation / sin from the natural state of consciousness: identification with awareness, not thoughts themselves.&nbsp;</span></p><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">How so?</span></p><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">The lower mind, in its early stages of spiritual evolution, is veiled from the indwelling spirit. The lower mind is full of error because it identifies with beliefs, opinions, and ideas (it’s accumulated knowledge). This is Peter’s condition as he meets Jesus. As we begin the spiritual journey, we are ALL a Peter. But there is something special about Peter. While he symbolizes the lower mind, it is the lower mind which has evolved the capacity to recognize the indwelling Christ, and that it is this Lord that infuses the lower mind with its spiritual power. Let’s return to Luke chapter five to see this Biblical truth unveiled.</span></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">In this chapter of Luke, Jesus is the higher self. He climbs into the “ship” of Peter on the “lake.” The lake, or waters, represent the lower mind which is easily stirred up by the external influences of our life and the knowledge it has accumulated. The lake is the astral waters within the mind, where thoughts, emotions, ideas, and concepts are constantly moving within the lower mind’s illusory nature. Just as wind causes waves and currents and changing lake and sea beds, so do emotions, ideas, and concepts churn around in the lower mind of our subconscious affecting the sea and lake beds of our personalities.&nbsp;</span></p><span data-dcnode-id="2029" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">The “ship” represents the lower mind floating on the lake of our subconscious. We all have a ship in our minds too. It is the aspect of your mind where Christ expands it’s spiritual influence. Jesus, the higher self, is within Peter’s ship. The esoteric scene that is about to unfold reveals how the higher self makes itself known to the lower mind that recognizes and accepts it’s authority.&nbsp;&nbsp;</span></p><span data-dcnode-id="2026" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Notice what happens:</span></p><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2020"><em data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">“Now when he had left speaking, he said unto Simon, launch out into the deep, and let down your nets for a draught” (Luke 5:4).</span></em></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">The higher self leads Peter, or the lower mind, to cast its “net” into the “deep.” The mental qualities of the lower self have to be gathered together and “caught” at the command of the higher self. There’s a lot of accumulated stuff swimming around in our subconscious minds. This reveals the idea that all of our thoughts, emotions, ideas, opinions, and belief systems have to be captured and directed by the influence of indwelling Christ. We know that this happens through the power of conscious thought in the lower mind, because Jesus gave Peter the “keys” to unlock the kingdom within. In other words, it all begins with the conscious input of correct thought into the subconscious. The lower mind must condition itself to the influence of the higher mind. Let’s continue with Luke chapter 5:</span></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2013"><em data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">“And Simon answered unto him, Master, we have toiled all night, and have taken nothing. Nevertheless at thy word I will let down the net.” (Luke 5:5).</span></em></p><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">The lower mind admits its confusion. It fishes for the truth in the knowledge accumulated in the subconscious, but to no avail. The lower mind cannot find the truth within its own thoughts, opinions, and belief systems. That is because the truth cannot be found through our external experience of reality and the knowledge acquired there. It cannot be found through the tree of knowledge of good and evil, or through the world of duality, which is a constant changing illusory environment. Yes, we can learn lots of facts and ideas, but they are just that. What good do facts and ideas and opinions of the external world do for the inner man? Sure, they can bring more knowledge (riches), but they cannot impart life that is beyond that knowledge.</span></p><span data-dcnode-id="2009" instrument_node="">
</span><p data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Let’s continue and reread the last statement of verse five again:</span></p><span data-dcnode-id="2006" instrument_node="">
</span><p data-dcnode-id="2003"><em data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">“…Nevertheless at thy word I will let down the net.”</span></em></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Peter is willing to test the power of the higher mind through faith, and put his trust in something other than his own facts, opinions, ideas, and beliefs. This shows the willingness of that natural mind that is able to take a leap of faith and trust in the higher over the lower.&nbsp;</span></p><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1996"><em data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">“And when they had this done, they enclosed a great multitude of fishes, and their net brake” (Luke 5:6).&nbsp;</span></em></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">The casting of the net is symbolic of man’s lower mind that toils within itself to find answers. It represents the dark period of our lives, when we aren’t satisfied with the knowledge that the world can give us, even as we try over and over to figure out life based on external circumstances. It is the mind’s absence of light (intuition) in all it’s thoughts, opinions, emotions, etc. Knowledge remains dark until it is illuminated by the higher mind.&nbsp;</span></p><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Jesus said when the eye becomes single the entire body is filled with light! A great secret to understanding this process is that knowledge is not bad, but that knowledge must be transformed also into understanding. The rich man is destitute and poor until his riches (knowledge) is illuminated by the indwelling Christ. It is not the knowledge itself that is important, it is understanding the cause and effect behind all facts, opinions, and ideas of this world that true understanding is achieved. Then knowledge is transformed into understanding (silver) and wisdom (gold). The union of this process is what’s known as love. The love aspect is known as higher emotions, because higher emotion is the vehicle of unity (non-judgment) between different ideas, opinions, and concepts. And it can work with the intellect. One who perceives with the single eye (pineal gland) unites love and wisdom, which is wisdom and love united in the higher mind.&nbsp;</span></p><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">That power of control over our thoughts is the beginning of the birthing of Christ in the mind. Let’s see how this works in the rest of Luke chapter five:</span></p><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1983"><em data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">“When Simon peter saw it [the multitude of fish that Jesus’ command caught], he fell down at Jesus’ knees, saying, depart from me, for I am a sinful man, O Lord.”</span></em></p><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">I cannot emphasize how important this scripture is in encompassing the entire spiritualization process that begins in the lower mind. Why did Peter recognize Christ as Lord here? What was the catalyst? It was the catching of the fish! Nothing more and nothing less. That which the lower mind toils for, but cannot succeed in finding truth through, until the lower mind recognizes it is the Christ mind which has the ability to turn knowledge into understanding.</span></p><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">This signifies that the natural mind realizes it’s sin (that it is separated from the higher self, Christ), and that it is only the Christ through the higher mind that can make sin, or separateness recognizable, and heal the mind itself. It is the power of the indwelling Christ that illuminates this knowledge to us, not from an external process, but through an inner one. And how is this accomplished?</span></p><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Let’s look at another Gospel. We have a similar version of this story in John chapter 21, with a few key differences. Here, Jesus commanded them to cast the net on the “right” side of the ship. This means that the mind ceases to analyze external thoughts, opinions, and ideas from the left brain. It goes within, to the right side, which is towards the east, the rising sun. Remember, Jesus sits at the right hand of the father and is the illuminating light of consciousness.&nbsp;</span></p><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">John chapter 21 also states that Peter caught 153 in the net, and this time the net does not break.</span></p><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">153…</span></p><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">1 + 5 + 3 =9</span></p><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Nine, according to Gaskell:</span></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1958"><em data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">“The number three is the number of perfection and completeness. Nine, which is three squared, refers to the attainment of perfection on the three lower planes.”</span></em></p><span data-dcnode-id="1957" instrument_node="">
