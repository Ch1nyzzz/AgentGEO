</span></div><article class="post-4699 post type-post status-publish format-standard has-post-thumbnail category-about-the-scriptures category-awakening category-consciousness category-eastern-scriptures category-esoteric category-exoteric category-god category-literal-vs-spiritual category-reincarnation category-the-biblical-mind entry" data-dcnode-id="3971" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="4260"><h1 class="entry-title" data-dcnode-id="4275" itemprop="headline"><a data-dcnode-id="4276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4699-the-developing-intellect-in-biblical-symbolism-part-2.html" rel="bookmark"><span data-dcnode-id="4277" instrument_node="">The Developing Intellect in Biblical Symbolism: Part 2</span></a></h1><span data-dcnode-id="4274" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="4261"><time class="entry-time" data-dcnode-id="4272" datetime="2022-04-17T13:50:10-05:00" itemprop="datePublished"><span data-dcnode-id="4273" instrument_node="">April 17, 2022</span></time><span data-dcnode-id="4271" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="4267" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="4268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/admin" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="4269" itemprop="name"><span data-dcnode-id="4270" instrument_node="">Joshua Tilghman</span></span></a></span><span data-dcnode-id="4266" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="4263"><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4699-the-developing-intellect-in-biblical-symbolism-part-2.html%23comments"><span data-dcnode-id="4265" instrument_node="">23 Comments</span></a></span><span data-dcnode-id="4262" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="4006" itemprop="text"><span data-dcnode-id="4259" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4257"><img alt="" class="wp-image-4701" data-dcnode-id="4258" sizes="(max-width: 931px) 100vw, 931px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2022/04/brain-mind.jpg&amp;raw" srcset="http://www.spiritofthescripture.com/wp-content/uploads/2022/04/brain-mind.jpg 931w, http://www.spiritofthescripture.com/wp-content/uploads/2022/04/brain-mind-273x300.jpg 273w, http://www.spiritofthescripture.com/wp-content/uploads/2022/04/brain-mind-768x845.jpg 768w"></figure><span data-dcnode-id="4256" instrument_node="">
</span><p data-dcnode-id="4248"><span data-dcnode-id="4255" instrument_node="">In my personal opinion, the quote I will mention below was stated by one of the most knowledgeable and greatest mystics of the modern world. Her formal name is Helena Patrova Blavatsky, or sometimes known as HPB. Many who decide to study her life and Magnus Opum, </span><em data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">The Secret Doctrine</span></em><span data-dcnode-id="4252" instrument_node="">, have come to understand the great contribution she left to society at large. She was personal friends with Ghandi, known by Thomas Edison, many of the greatest writers and poets of modern times, and some believe read by Einstein. Her life’s work was dedicated to bringing the original ancient wisdom that lay beneath and connects all great scriptures and religions of the world – in their esoteric origin and intent. She was a fierce intellect stating some of the principles Einstein would lay out in the future as early as 1887 through her famous dialogues with her inner circle, decades before Einstein would compose </span><em data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">General Relativity. </span></em><span data-dcnode-id="4249" instrument_node="">But most of all, I am impressed by her love of truth, which she stated first and foremost as the dedication to the upliftment of all humanity and nature as the ONE LIFE in which we are all involved. To that aim she seemed to have genuinely dedicated her entire soul to.&nbsp;</span></p><span data-dcnode-id="4247" instrument_node="">
</span><p data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">Here is just one in a myriad of her knowledgeable quotes helping us to understand the ONE LIFE:</span></p><span data-dcnode-id="4244" instrument_node="">
</span><p data-dcnode-id="4240"><em data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">“Spirit is universal…It cannot know itself except as soul. Spirit is the “power to become;” Soul is “the becoming.” Spirit is the power to see and know; Soul is the seeing and knowing. Soul is the accumulation of perceptions and experiences by means of which Spiritual Identity is realized.”</span></em><span data-dcnode-id="4241" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4239" instrument_node="">
</span><p data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">Anyone who pays close attention to her statement will perhaps better understand why I drove the comment section in part one of this series in the direction that I did. When I stated that “I AM THAT I AM” is the power to “become,” perhaps some misunderstood my intent. The Unknown, eternal nature of the divine is the eternal ONE Essence which cannot be defined by human intellect, but as the ancient doctrine teaches us, it can be felt as an experience. While we are yet “individual souls,” our essence is as the Bhagavad Gita makes clear, “Thou art Parabrahm,” or, “Thou art THAT. In other words, there is a divine relationship between the individual and the Absolute, and as the Apostle Paul states, it is a mystery.&nbsp;</span></p><span data-dcnode-id="4236" instrument_node="">
</span><p data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">Shortly, we will get to Blavatsky’s comment and dissect it in detail using the Scriptures of the Bible as a perfect correlate for those looking to explore this type of metaphysics. But for now, we have to start with a proper introduction to a concept that is, in my opinion, foundational to grasp.</span></p><span data-dcnode-id="4233" instrument_node="">
</span><p data-dcnode-id="4229"><em data-dcnode-id="4231"><span data-dcnode-id="4232" instrument_node="">Karma</span></em><span data-dcnode-id="4230" instrument_node="">…</span></p><span data-dcnode-id="4228" instrument_node="">
</span><p data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">What is it? The Eastern meaning translates best in English as “action.” And what is the basis of all action? This post will show that any action’s fundamental essence in the human soul is in fact an accumulation of prior thought, whether self-conscious or unconscious, purposeful and with knowledge, or blind and ignorant.&nbsp;</span></p><span data-dcnode-id="4225" instrument_node="">
</span><p data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">In the West we probably have an idea of Karma as cause and effect. This is also a good definition to start with, but I would like to broaden this concept a little more as something all pervasive and omnipresent. The Bible seems to state this in its esoteric meaning, but I will let you be the judge. Since this is predominantly a Bible site, let’s go there and review some of the scriptures that I hope will give you some pause to consider as they relate to, what I believe, is karma.&nbsp;&nbsp;</span></p><span data-dcnode-id="4222" instrument_node="">
</span><p data-dcnode-id="4219"><em data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">“Be not deceived: God is not mocked: for whatsoever a man soweth, that shall he reap” (Gal. 6:7).</span></em></p><span data-dcnode-id="4218" instrument_node="">
</span><p data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">Whether we define Karma as cause and effect or action, we can see that the Apostle Paul is expressing the same idea.This idea that “God cannot be mocked” by the human intellect has something to do with a universal law of reaping and sowing, which cannot be defied, because it is in operation everywhere at all times. The pretext of this scripture is also interesting. A few verses above, it states: “Let every man PROVE his own work…” and “For every man shall bear his own burden.”&nbsp;</span></p><span data-dcnode-id="4215" instrument_node="">
</span><p data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">Burden of what?&nbsp;</span></p><span data-dcnode-id="4212" instrument_node="">
</span><p data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">As we shall see, his  or her thoughts and actions!</span></p><span data-dcnode-id="4209" instrument_node="">
</span><p data-dcnode-id="4207"><span data-dcnode-id="4208" instrument_node="">But here are some more scriptures to consider from the master Jesus that perhaps may broaden our view of the ONE LAW, as karma, being an integral concept throughout the Bible even though Western religious ideology has not typically seen it this way:</span></p><span data-dcnode-id="4206" instrument_node="">
</span><p data-dcnode-id="4202"><span data-dcnode-id="4205" instrument_node="">“</span><em data-dcnode-id="4203"><span data-dcnode-id="4204" instrument_node="">Think not that I am come to destroy the law, or the prophets: I am not come to destroy, but to fulfill (Matt 5:17).</span></em></p><span data-dcnode-id="4201" instrument_node="">
</span><p data-dcnode-id="4196"><span data-dcnode-id="4200" instrument_node="">It might be a strange concept for some to think Jesus is using the Old Testament law and the prophets in the context of Karma. Understandable. An exoteric view (the literal rendition of the carnal mind) of the Old Testament would suggest the law given to Moses was a set of specific rules to live by. And oh, but they are! But esoterically, and in a holistically and spiritual viewpoint, these rules govern the evolution of the soul, its growth and development, as it relates to the mind. Jesus is acknowledging a certain phase of evolution, that even he, as the ONE UNIVERSAL LIFE PRINCIPLE in manifestation, as the Word, needs fulfillment. There is no denial, nor could there ever be, for the very essence and spirit of Jesus Christ is the EMBODIMENT of that law. This is clearly stated at the end of the verse, acknowledging, I am come to </span><strong data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">FULFILL</span></strong><span data-dcnode-id="4197" instrument_node=""> it.&nbsp;In the broader sense Jesus is stating that the Word made flesh is the fullness of the entire law, from beginning to end, in each stage of its evolutionary stages, through every character as symbolically represented as the soul’s developing nature. And none of these stages can be denied. </span></p><span data-dcnode-id="4195" instrument_node="">
</span><p data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">Jesus also reiterates his mission in another way: to fulfill the will of his father. And what is the Father’s will? Esoterically, it is universal and cosmic law which governs both the visible and invisible worlds, known to us in name as karma, to which the man can choose, if he or she so wishes, to become a co-worker with it. The Apostle Paul came to accept this sentiment when he stated that he had learned to be content in all situations, as a form of mental surrender to it.&nbsp;</span></p><span data-dcnode-id="4192" instrument_node="">
</span><p data-dcnode-id="4190"><span data-dcnode-id="4191" instrument_node="">The first generation of Isrealites (the beginning of qualities and faculties “called out” in the soul to be disciplined) reveals the struggle the mind affords man. They were always wanting to return to Egypt where they had “flesh” to eat. Remember in my first article eating pertains to what the mind gravitates to as mental ideas. The real problem of interpreting the Bible literally, is that it places all the stories into a historical narrative, wherein the religious institutions of the world say one must believe in that historical framework in order to become saved. But this historical narrative is contrived by cultural and political ideology which is man’s laws in partial ignorance, not God’s law, the universal law of nature.</span></p><span data-dcnode-id="4189" instrument_node="">
</span><p data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">One way to become a co-worker with this universal law is to first know that this law is omnipresent, eternally working, in every facet of our lives. For as Jesus also stated, nothing shall pass away until every jot and tittle of that law be fulfilled. God also states that my people perish for a lack of knowledge. And what is this lack of knowledge? It is failing to understand this cosmic law as an ever pervasive principle in the soul of man, ever guiding and evolving it, inwardly and outwardly. Man has the ability then to conform his thoughts in such a way that he becomes a co-worker with this ever pervasive, omnipresent law, or to be ignorant of it, and therefore be subject to the effect of going against it as the Isrealites did in the wilderness and forever incurred its just cause and effect. Every man reaps what he sows, either towards life, or towards spiritual death. That first generation continually denied it until they perished, and the next phase in the evolution of the soul under Joshua and Caleb began.&nbsp;</span></p><span data-dcnode-id="4186" instrument_node="">
</span><p data-dcnode-id="4184"><span data-dcnode-id="4185" instrument_node="">Everything comes down to a man’s thoughts in a certain stage of evolution, and that stage, where most of humanity is today, has much to do with the intellect and one’s own inner conscience, that still small voice that can speak to us if the intellect trains itself, and disciplines itself, to hear it. Man’s intellect can either gravitate towards the spirit, or be mired by the desire-nature. Man must surrender his desire mind, or personal self interests, to the ONENESS of all life. He or she must surrender ambition, pride, vanity, lusts and greed in all thought. For only in so doing can his mind become freed by the spirit. And as I will show, scripture teaches this principle as a self-conscious act of responsibility, through the act of thinking. As the Apostle Paul stated, all things that are lovely and true, “think” on these things. And in the Old Testament the law demanded that every first born son, whether human or animal, was to be dedicated to God. And sons and daughters symbolically represent our thoughts and emotions, which are to be dedicated to the spirit rather than the flesh or carnal mind, the desire mind.&nbsp;</span></p><span data-dcnode-id="4183" instrument_node="">
</span><p data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">Consider how Jesus stated how important thought really is when he tells us that if a man lusts after a woman in his heart, he has ALREADY committed adultery. Can anyone deny here the foundational aspect of thought, and its basis for all action? The revolutionary concept being conveyed here is that even before any action is committed, it is ROOTED in thought! Perhaps this is why that great mystic Blavatsky stated that all “Action” is a prior accumulation of thoughts. Do we see a correlation here between Blavatsky and Christ’s words? Absolutely!</span></p><span data-dcnode-id="4180" instrument_node="">
</span><p data-dcnode-id="4172"><span data-dcnode-id="4179" instrument_node="">Retributive justice then is always fair and equitable as karma, and we are rewarded for our thought, for it is us, </span><em data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">as we are!</span></em><span data-dcnode-id="4176" instrument_node=""> Again, that Bible scripture cannot ring true enough: “</span><em data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node="">As a man thinketh in his heart, so is he</span></em><span data-dcnode-id="4173" instrument_node="">.” Can we deny then the basic power and nature of thought itself!? And what it means for the human condition!? We all reap what we sow, in thought. And this goes part and parcel with the intellectual man in our current stage of evolution of which we are all a part.</span></p><span data-dcnode-id="4171" instrument_node="">
</span><p data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">William Q Judge, one of the best friends of Blavatsky, also stated:</span></p><span data-dcnode-id="4168" instrument_node="">
</span><p data-dcnode-id="4158"><em data-dcnode-id="4160"><span data-dcnode-id="4167" instrument_node="">“When the period of rest after death is ended Manas (mind) is bound by innumerable electrical magnetic threads to earth by reason of the thoughts of the last life, and therefore by desire, for it was desire that caused so many thoughts and ignorance of the true nature of things. And understanding of this doctrine of </span><strong data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">man being really a thinker and made of thought</span></strong><span data-dcnode-id="4164" instrument_node=""> will make clear all the rest in relation to incarnation and reincarnation. </span><strong data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node="">The body of the inner man is made of thought,</span></strong><span data-dcnode-id="4161" instrument_node="">&nbsp; and this being so it must follow that if the thoughts have more affinity for earth-life than for life elsewhere a return to life here is inevitable.”</span></em><span data-dcnode-id="4159" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4157" instrument_node="">
</span><p data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">Consider this in relation to Paul’s words, that as a man soweth, so shall he reap. The immortal thinker is a sower and a reaper. For those who can accept it, Mr. William Judge has just given the essence and subsequent meaning, in the esoteric sense, to the allegorical fall of Adam in the Garden.</span></p><span data-dcnode-id="4154" instrument_node="">
</span><p data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">He further states:</span></p><span data-dcnode-id="4151" instrument_node="">
</span><p data-dcnode-id="4148"><em data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">“The fifth principle is Manas…and is usually translated as Mind. Other names have been given to it, but it is the knower, the perceiver, the thinker…Manas, or the Thinker is the reincarnating being, the immortal who carries the results and values of all the different lives lived on earth or elsewhere. Its nature becomes dual as soon as it is attached to a body…In Manas the thoughts of all lives are stored…the total quantity of life thoughts makes up the stream or thread of a life’s meditation – “that upon which the heart was set” – and is stored in Manas, to be brought out again at any time in whatever life the brain and bodily environments are similar to those used in engendering that class of thoughts. It is Manas which sees the objects presented to it by the bodily organs and the actual organs within. When the open eye receives a picture on the retina, the whole scene is turned into vibrations in the optic nerves which disappear into the brain, where Manas is enabled to perceive them as idea.”&nbsp;</span></em></p><span data-dcnode-id="4147" instrument_node="">
</span><p data-dcnode-id="4143"><span data-dcnode-id="4146" instrument_node="">I want us to focus on one important statement of Judge above: “…the total quantity of life-thoughts makes up the stream or thread of a life’s meditation – </span><strong data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">that upon which the heart was set”.</span></strong></p><span data-dcnode-id="4142" instrument_node="">
</span><p data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">And so we can see that whatsoever a man soweth is related first and foremost to his thoughts and ideas, and that which HE BECOMES IN MANIFESTATION.</span></p><span data-dcnode-id="4139" instrument_node="">
</span><p data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">It is interesting that the Sanskrit word for mind stems from manas. And this correlates to “mana” from “heaven,” which the Israelites that left Egypt were supposed to eat symbolically (in post one eating relates to perception of ideas), but rejected God’s food (or spiritual ideas, which the lower self and selfish personality is often apt to do!). And this is why esoterically they, the people (the potential faculties of becoming the disciplined mind), have to wander around in the desert so long until Joshua and Caleb rise up under the law. They represent two aspects of the mind. Joshua, being from the tribe of Ephriam, is one that sets his analytical mind correctly, and Caleb, being from the tribe of Judah, is the aspect of the higher mind. The union of the two, which can only be accomplished by Joshua’s proper thoughts, is thus the leader that leads the people (the faculties and qualities) to the Promised Land. This is why Joshua didn’t live by sight, or external reality, but by the inner man, and set his thought correctly towards the higher life and spirit in that Promised Land, which refused to believe or see the external report. It is Moses, the intellectual and moral nature developing in man (through the law), that is the foundation for both the coming of Joshua and Caleb. Every detail in scripture is important, and little thought is ever given to why Joshua is associated with the tribe of Ephriam (NOT JUDAH!). And Ephriam camped on the left side of the tabernacle. Jesus is from Judah, and this is why both Joshua and Caleb are needed, the two aspects of the mind. We must think, and discern!</span></p><span data-dcnode-id="4136" instrument_node="">
</span><p data-dcnode-id="4134"><span data-dcnode-id="4135" instrument_node="">William Judge also once said on his translation of the Bhagavad Gita:</span></p><span data-dcnode-id="4133" instrument_node="">
</span><p data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">“Man, made of thought, occupant only of many bodies from time to time, is eternally thinking. His chains are through thought, his release due to nothing else.”</span></p><span data-dcnode-id="4130" instrument_node="">
</span><p data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">So we see that according to Mr. Judge, our release is contingent upon our thought. Thought is what traps us, but it is also what releases us, in the sense that it requires a certain stage in evolution to begin the true free will of the spiritual mind to manifest itself in US, and THROUGH us.</span></p><span data-dcnode-id="4127" instrument_node="">
</span><p data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">Blavatsky gives us more information to ponder on the working of this process:</span></p><span data-dcnode-id="4124" instrument_node="">
</span><p data-dcnode-id="4122"><span data-dcnode-id="4123" instrument_node="">“Manas, the Mind Principle, is the connecting link between our pure nature, eternal, spiritual nature and our mortal, physical, material, personal nature…it is continually presented with the choice between spirituality and sensuality and has to choose one or the other, since the spiritual nature and the sensual nature can never and will never mix or meet. Manas cannot go in both directions at once. It can only either go up or down…up towards spirituality or down towards sensuality…Whichever one it chooses will shape and determine its destiny and its future evolutionary progress.”</span></p><span data-dcnode-id="4121" instrument_node="">
</span><p data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">Perhaps we can now see why Jesus states that man cannot serve two masters. He meant either the desire mind or the spiritual mind. For Blavatsky states, “The Self of Matter and the SELF of Spirit can never meet. One of the twain must disappear; there is no place for both.”&nbsp;</span></p><span data-dcnode-id="4118" instrument_node="">
</span><p data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">And what is perhaps the most important concept she gives to these points further elucidated:</span></p><span data-dcnode-id="4115" instrument_node="">
</span><p data-dcnode-id="4111"><span data-dcnode-id="4114" instrument_node="">She states: </span><em data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">“The Mind, which we have agreed to call the Human Soul…is a compound in its highest form, of spiritual aspirations, volitions and divine love [Abel]; and in its lower aspect, of animal desires and terrestrial passions imprated to it by its associations with its vehicle, the seat of all these [Cain]. It thus stands as a link and a medium between the animal nature of man which its higher reason seeks to subdue, and his divine spiritual nature to which it gravitates, whenever it has the upper hand in its struggle with the inner animal…”</span></em></p><span data-dcnode-id="4110" instrument_node="">
</span><p data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">And…</span></p><span data-dcnode-id="4107" instrument_node="">
</span><p data-dcnode-id="4103"><span data-dcnode-id="4106" instrument_node="">“</span><em data-dcnode-id="4104"><span data-dcnode-id="4105" instrument_node="">Whenever [the mind] disconnects itself, for the time being, with [from] kama, becomes the guide of the highest mental faculties, and is the organ of the free will in physical man.”</span></em></p><span data-dcnode-id="4102" instrument_node="">
</span><p data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">I leave you with one more thought from the Book of Hebrews that is perhaps the best statement of karma and reincarnation in the Bible, in my humble opinion:&nbsp;</span></p><span data-dcnode-id="4099" instrument_node="">
</span><p data-dcnode-id="4095"><em data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">“All these people were still living by faith when they died. They did not receive the things promised; they only saw them and welcomed them from a distance, admitting that they were foreigners and strangers on earth” </span></em><span data-dcnode-id="4096" instrument_node="">(Hebrews 11:13).&nbsp;</span></p><span data-dcnode-id="4094" instrument_node="">
</span><p data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">Some of God’s most faithful servants didn’t receive the promise. They welcomed them though from a distance. Meaning, the Hebrews’s author understands that the omnipresent eternal law is evolving the soul, and we can become a coworker with its divine attributes. These people which knew they were strangers in a land correlates to the aspects, attributes, and faculties of the evolving soul in its stages of growth and development and discipline under the spirit.</span></p><span data-dcnode-id="4091" instrument_node="">
</span><p data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">To not see that this scripture is probably one of the most profound statements backing up reincarnation of the soul and the law of karma is a travesty!&nbsp;</span></p><span data-dcnode-id="4088" instrument_node="">
</span><p data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">Man was never meant to transcend the LAW. He was meant to become a co-operator with it! For he is that law itself, unfolding in many ways and on many planes of its manifested presence.&nbsp;This is also clearly stated in Jeremiah, where the eternal law is written on the heart, not in transcending it as the religious mindset today sometimes so insidiously advocated, but becoming at ONE WITH IT. </span></p><span data-dcnode-id="4085" instrument_node="">
</span><p data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">Now let us finally return to HPB’s statement I made at the outset of this entire post. HPB’s quote above gets us close to the nature of who we are, and what we are to become, within the human condition. Let’s break it down.&nbsp;</span></p><span data-dcnode-id="4082" instrument_node="">
</span><p data-dcnode-id="4078"><em data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">“Spirit cannot know itself except as Soul,”</span></em><span data-dcnode-id="4079" instrument_node=""> she states.&nbsp;</span></p><span data-dcnode-id="4077" instrument_node="">
</span><p data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">The logic seems sound if we ponder it deeply. How could any substance universally diffused be self-consciously aware, which requires an individualized perception? And this is our mind manifested through a personality. The fall of the universal mind into matter allowed man to “KNOW” good and evil, or the duality of nature. This was the opportunity for the spirit to get it know itself, once self consciousness had been achieved. Before it was truly innocent because it knew not how to self-reflect on its current condition, but rather followed the law in its lowest workings. In order to become conscious of itself, it would need some further evolutionary development.&nbsp;</span></p><span data-dcnode-id="4074" instrument_node="">
</span><p data-dcnode-id="4069"><span data-dcnode-id="4073" instrument_node="">Now let’s look more at Blavatsky’s quote and dig even deeper!</span><br data-dcnode-id="4072"><em data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">“Spirit is the “power to become;” Soul is “the becoming.”</span></em></p><span data-dcnode-id="4068" instrument_node="">
</span><p data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">According to her words, spirit then, is the “power” to “become.” If one has a power, but never uses it, it lays dormant or latent, and manifests as nothing. All this talk in the New Age movement of today endlessly speaks of our power, and what we truly are as “divine” entities. And while this is true, it means nothing. Absolutely NOTHING, except what could be. In other words, it remains as an abstraction unless realized. To realize anything, the soul in the human kingdom must use the mental, emotional, and physical form to move in the direction of “becoming” something more, or expanded, than what it was prior. This can only be accomplished through “experience,” and the knowledge that can be gained through this experience. If one perceives the entire book of Job from beginning to end, one might realize that in the beginning of the Book, he only KNEW God by the hearing of the ear. But at the end of this journey, through his encounter with the adversary, he came to know God personally.</span></p><span data-dcnode-id="4065" instrument_node="">
</span><p data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">Blavatsky further quotes:</span></p><span data-dcnode-id="4062" instrument_node="">
</span><p data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">“Soul is the accumulation of perceptions and experiences by means of which Spiritual Identity is realized.”</span></p><span data-dcnode-id="4059" instrument_node="">
</span><p data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">Spiritual identity? What is she really getting at? Spirit, as a universally diffused principle, cannot be said to have any identity unless an aspect of its potential has become “realized” into a form, and that is our soul, and more specifically, the mind. It is ultimately an illusion, Maya. Yes! But not because it isn’t a real experience, but only because the experience is temporary, and continually changing.&nbsp;</span></p><span data-dcnode-id="4056" instrument_node="">
</span><p data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">The same concept is taught in that great esoteric book of Malachi, where Yaweh states, bring all the “tithes” into the storehouse. Tithes here simply symbolize an effort, mentally, emotionally, and physically, to dedicate all to God, which becomes “stored” as a permanent spiritual volition and cements itself to the immortal aspect of the higher ego. This “storehouse” is known more esoterically as the “causal body” or soul, which is the composite I spoke of earlier of spiritual volition cemented to unconditioned immortality. Such soul essence is what incarnates partially in each incarnation. Partially, as it informs and becomes the lower personality, which has the right and potential to add more to the “storehouse.”&nbsp;</span></p><span data-dcnode-id="4053" instrument_node="">
</span><p data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">Many Christians interpret the blessings that God will pour out back to them in Malachi as wealth, or physical prosperity, but it has little to do with personal life, and rather more to do with the permanent acquired attributes of the individuality, which remains as such only because those are spiritual volitions which have married itself to universality.&nbsp;</span></p><span data-dcnode-id="4050" instrument_node="">
</span><p data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">Now let’s expand upon those confusing above words and go into some esoteric thought that will run contrary to much New Age thought, but what I think is absolutely vital! How does the spiritual soul “realize” itself? And what is the true purpose of the aspects of the lower souls?&nbsp;</span></p><span data-dcnode-id="4047" instrument_node="">
</span><p data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">Blavatsky gives the esoteric key here in these statements:</span></p><span data-dcnode-id="4044" instrument_node="">
</span><p data-dcnode-id="4042"><span data-dcnode-id="4043" instrument_node="">“…the higher Mind in Man, or his Ego (Manas) is, when linked indivisibly with Buddhi, a spirit…”</span></p><span data-dcnode-id="4041" instrument_node="">
</span><p data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">In other words, the middle soul, or human mind, is the cementing link between the marriage of the lower personality and the Holy Spirit.&nbsp;</span></p><span data-dcnode-id="4038" instrument_node="">
</span><p data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">She further explains:</span></p><span data-dcnode-id="4035" instrument_node="">
</span><p data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">“”Buddhi becomes conscious by the accretions it gets from Manas after every new incarnation…”</span></p><span data-dcnode-id="4032" instrument_node="">
</span><p data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">Before explaining further, I will now link another scripture, which people can either accept or deny in its esoteric significance.&nbsp;</span></p><span data-dcnode-id="4029" instrument_node="">
</span><p data-dcnode-id="4026"><em data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">Who knoweth the spirit of man that goeth upward, and the spirit of the beast that goeth downward to the earth? (Ecc: 3:21).</span></em></p><span data-dcnode-id="4025" instrument_node="">
</span><p data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">And this also brings us back to the middle part of Blavatsky’s brilliant quote which we haven’t dissected yet:</span></p><span data-dcnode-id="4022" instrument_node="">
</span><p data-dcnode-id="4019"><em data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">“Spirit is the power to see and know..”</span></em></p><span data-dcnode-id="4018" instrument_node="">
</span><p data-dcnode-id="4013"><span data-dcnode-id="4017" instrument_node="">I will end here even though I feel like there is so much more to say on the subject. But the post is becoming quite long already </span><img alt="🙂" class="emoji" data-dcnode-id="4016" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"><span data-dcnode-id="4015" instrument_node=""> Perhaps I will conclude with this sentiment: the intellect of man in this world of manifestation is not the pinnacle of man, but rather an evolutionary stage that has to be set right. There will come a time in humanity’s future, that some already KNOW, where even the intellect is simply a tool of the spirit. Who knows how many have already accomplished this point in the great stages of humanity’s evolution? I certainly don’t. And who can say where we each out in those stages of evolution except of the spirit within us all? We each have to decide how much we have surrendered the intellect to the will of the father. But hopefully this post provides some thoughts that we can all self reflect on, and how much we are being coworkers with that great law, which is both God and man in manifestation </span><img alt="🙂" class="emoji" data-dcnode-id="4014" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="4012" instrument_node="">
</span><p data-dcnode-id="4009"><span data-dcnode-id="4011" instrument_node="">Blessings </span><img alt="🙂" class="emoji" data-dcnode-id="4010" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="4008" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="4007"></div></div><footer class="entry-footer" data-dcnode-id="3972"><p class="entry-meta" data-dcnode-id="3973"><span class="entry-categories" data-dcnode-id="3975"><span data-dcnode-id="4005" instrument_node="">Filed Under: </span><a data-dcnode-id="4003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/about-the-scriptures" rel="category tag"><span data-dcnode-id="4004" instrument_node="">About the Scriptures</span></a><span data-dcnode-id="4002" instrument_node="">, </span><a data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/awakening" rel="category tag"><span data-dcnode-id="4001" instrument_node="">Awakening</span></a><span data-dcnode-id="3999" instrument_node="">, </span><a data-dcnode-id="3997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/consciousness" rel="category tag"><span data-dcnode-id="3998" instrument_node="">Consciousness</span></a><span data-dcnode-id="3996" instrument_node="">, </span><a data-dcnode-id="3994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/eastern-scriptures" rel="category tag"><span data-dcnode-id="3995" instrument_node="">Eastern Scriptures</span></a><span data-dcnode-id="3993" instrument_node="">, </span><a data-dcnode-id="3991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/esoteric" rel="category tag"><span data-dcnode-id="3992" instrument_node="">Esoteric</span></a><span data-dcnode-id="3990" instrument_node="">, </span><a data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/exoteric" rel="category tag"><span data-dcnode-id="3989" instrument_node="">Exoteric</span></a><span data-dcnode-id="3987" instrument_node="">, </span><a data-dcnode-id="3985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/god" rel="category tag"><span data-dcnode-id="3986" instrument_node="">God</span></a><span data-dcnode-id="3984" instrument_node="">, </span><a data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/literal-vs-spiritual" rel="category tag"><span data-dcnode-id="3983" instrument_node="">Literal vs Spiritual</span></a><span data-dcnode-id="3981" instrument_node="">, </span><a data-dcnode-id="3979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/reincarnation" rel="category tag"><span data-dcnode-id="3980" instrument_node="">Reincarnation</span></a><span data-dcnode-id="3978" instrument_node="">, </span><a data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/the-biblical-mind" rel="category tag"><span data-dcnode-id="3977" instrument_node="">The Biblical Mind</span></a></span><span data-dcnode-id="3974" instrument_node=""> </span></p></footer></article><article class="post-4688 post type-post status-publish format-standard has-post-thumbnail category-about-the-scriptures category-meditation category-spirit-and-soul entry" data-dcnode-id="3765" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="3953"><h1 class="entry-title" data-dcnode-id="3968" itemprop="headline"><a data-dcnode-id="3969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4688-scriptural-way-of-creating-permanent-peace-and-stability-within-consciousness.html" rel="bookmark"><span data-dcnode-id="3970" instrument_node="">Scriptural Way of Creating Permanent Peace and Stability Within Consciousness</span></a></h1><span data-dcnode-id="3967" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="3954"><time class="entry-time" data-dcnode-id="3965" datetime="2022-03-29T16:08:53-05:00" itemprop="datePublished"><span data-dcnode-id="3966" instrument_node="">March 29, 2022</span></time><span data-dcnode-id="3964" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="3960" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="3961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/raymondphelan" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="3962" itemprop="name"><span data-dcnode-id="3963" instrument_node="">Raymond Phelan</span></span></a></span><span data-dcnode-id="3959" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="3956"><a data-dcnode-id="3957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4688-scriptural-way-of-creating-permanent-peace-and-stability-within-consciousness.html%23comments"><span data-dcnode-id="3958" instrument_node="">29 Comments</span></a></span><span data-dcnode-id="3955" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="3779" itemprop="text"><span data-dcnode-id="3952" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3950"><img alt="Prayer" class="wp-image-4692" data-dcnode-id="3951" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2022/03/sunset.jpeg&amp;raw"></figure><span data-dcnode-id="3949" instrument_node="">
</span><p data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">Have we ever reflected on how everything in nature is constantly in process of praying, and without ever needing reminding? From trees, plants, rivers and oceans — in growth, flow and overcoming — these guys are expert at praying, in maintaining their natural environment.</span></p><span data-dcnode-id="3946" instrument_node="">
</span><p data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Likewise, for instance, have we ever dwelt upon how birds pray, or even how fish pray?</span></p><span data-dcnode-id="3943" instrument_node="">
</span><p data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">Birds are in prayer while swooping and diving in group unison, no one bird is leading the other; their synchronized flock-diving ability puts them in direct communication with Nature. Similarly, when fish shoals dart and spin rapidly in the deep silent ocean, they too are praying blissfully. By praying is meant, they are in communication with their god, the energy of Nature. Such is when they receive the latest up-dates on their evolution, such as some new-forming habits and likely migratory routes to new feeding grounds for their survival. But more vitally, their prayer activity is carried on through intuitive group silence from where they each receive instinctive insight simultaneously.</span></p><span data-dcnode-id="3940" instrument_node="">
</span><p data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">So, bringing this nature scenario into the biblical / human context: how are humans designed to pray? This, ‘how to pray’ forms the basis of the Lord’s Prayer, when the 12 disciples (aspects of soul) went to Jesus (higher life principle) and asked this very question – ‘Master [of discipline – the Resolute intellect] teach us how to pray’, teach us how to know AUM.</span></p><span data-dcnode-id="3937" instrument_node="">
</span><p data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">Being heavily coded, the Lord’s Prayer, for practical implementation needs simplified understanding rather than just reciting from memory.</span></p><span data-dcnode-id="3934" instrument_node="">
</span><p data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">More on this further on.</span></p><span data-dcnode-id="3931" instrument_node="">
</span><p data-dcnode-id="3927"><span data-dcnode-id="3930" instrument_node="">We’re all familiar, I’m sure, with the Biblical term, Alpha and Omega as representing the first and last letters in the Greek alphabet.</span><br data-dcnode-id="3929"><span data-dcnode-id="3928" instrument_node="">But, beyond their alphabetical connotation, what else majorly is significant regards Alpha, for us. Like, similar to bird flock-diving synchronization, what value do these letters offer in soul evolution terms to humans?</span></p><span data-dcnode-id="3926" instrument_node="">
</span><p data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">To answer this vital question, we must first pose the following question, like, what is the significance of the word Aum?</span></p><span data-dcnode-id="3923" instrument_node="">
</span><p data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">Here let’s reflect briefly how Jesus instructed the apostles to pray. The Lord’s Prayer primarily is an instruction on how to inner pray – it states in present tense: “Our Father, which art in heaven, Hallowed be thy Name, thy king come” meaning: Holy, Hallowed or Healing is thy Nature, is thy ever-present AUM vibration. Hence the significance of the term Alpha and Omega and the Word Aum — they’re both referring to the same inner dynamic of diving in prayer thereby accessing the kingdom of God. In other words, we’re in full prayer while inner hearing AUM. Such is when our soul becomes vibrationally attuned with the Word, with God, which Word is Aum, thus stirring Alpha and Omega into vibratory action as opposed to merely adoring these alphabetical letters visually and intellectually.</span></p><span data-dcnode-id="3920" instrument_node="">
</span><p data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">Thus Alpha and Omega are one and the same vibratory activity as, AUM – they represent the same outcome or means of inner dynamic prayer. The Bible refers to Aum as Amen.</span></p><span data-dcnode-id="3917" instrument_node="">
</span><p data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">John 1—3 puts it:</span></p><span data-dcnode-id="3914" instrument_node="">
</span><p data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">“In the beginning was the Word, and the Word was with God, and the Word was God. Through him God made all things”.</span></p><span data-dcnode-id="3911" instrument_node="">
</span><p data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">So, what does ‘Him’ and ‘God’ in John’s verse mean in relation to AUM?</span></p><span data-dcnode-id="3908" instrument_node="">
</span><p data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">AUM thus is the transmuting vibration which alone contains the transformative dynamic necessary for advancement out of, and beyond, basic human animal consciousness into Christ /cosmic consciousness and ultimately on to God-consciousness. Aum, being the Primordial Sound of the universe, is the starting point through which human consciousness commences the transformative journey into Higher Consciousness thus higher Awareness; the gateway unto God the Supreme Liberation, the eternal peace and joy we’re each encoded to seeking and finding and becoming in consciousness.</span></p><span data-dcnode-id="3905" instrument_node="">
</span><p data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">The Vedas (meaning knowledge) confirm this: “In the beginning, God first manifested as sound.” The Mandukya Upanishad states that, “The sound of Aum is the eternal Godhead, manifesting the whole universe.</span></p><span data-dcnode-id="3902" instrument_node="">
</span><p data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">So, similar to the universe, we’re each vibrational sound at our core. And while contact with our core is through AUM, the sound vibration first commences in the mind which travels to the base of the spine, thereby awaken the unconscious aspect of our spiritual inheritance, thus leading to expanded cosmic awareness, to the latent cosmic faculties within each soul. This subtle vibration, when picked up by the inner hearing, stimulates and aligns the soul into directly knowing divine bliss – divine consciousness revealing Itself unto Itself AS our Transcendent Self.</span></p><span data-dcnode-id="3899" instrument_node="">
</span><p data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">John 14:6 puts it:</span></p><span data-dcnode-id="3896" instrument_node="">
</span><p data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">“I Am the Truth, the Way and the Light. No one comes to the Father except through Me”.</span></p><span data-dcnode-id="3893" instrument_node="">
</span><p data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">Esoterically understood, John is stating: no one can experience the higher Self or Christ without undergoing the inner diving, the inner awakening process — awakening out of self ignorance, out of the repetitive sin-seed cycle thus unto expanded transcendental consciousness. That, the human soul must first enter into, Aum, (Me), go through Alpha unto Omega.</span></p><span data-dcnode-id="3890" instrument_node="">
</span><p data-dcnode-id="3888"><span data-dcnode-id="3889" instrument_node="">John 14:6 is stating: ‘I Am’ is the eternal Now, Life, or, Truth – Truth, meaning Absolute Existence which state never changes. Truth is which sets the soul free from the bondage of suffering and its causes.</span></p><span data-dcnode-id="3887" instrument_node="">
</span><p data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">‘The Way’ in John, is referring not only as means of soul coming unto eternal Truth, but, that, this Way becomes our daily living standard, of living Aum nature outwardly through the inner faculties (the potential apostles) consequent of knowing Aum, or Him, or Jesus the higher life principle.</span></p><span data-dcnode-id="3884" instrument_node="">
</span><p data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">Direct knowing of ‘I Am’ leads to the Transcendent within consciousness but minus the AUM, for, the Absolute or Transcendent, being Pure Consciousness, does not Itself vibrate, evolve, it remains ever-full and changeless.</span></p><span data-dcnode-id="3881" instrument_node="">
</span><p data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">In meditation the mind eventually transcends Aum to become the very nature of the Transcendent, when Divine peace and bliss is naturally lived through the mind, senses, nervous system and cellular physiology. This experiencing and outward living of divine standard is what roots the physiology in spiritual synchronization awareness, into living Divine Will, meaning, perfect evolution is being brought into the world through our spiritual consciousness. Thus, our soul, like the butterfly, transforms to become the Angelic channel in generating perfect evolution on Earth and in the cosmos – and the Word was made flesh, or, manifest creation sourced through AUM.</span></p><span data-dcnode-id="3878" instrument_node="">
</span><p data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">But soul transformation ultimately incorporates transcending the three gunas in meditation. This divine practice was described by the Buddha as “the Middle Way”, that of centring our consciousness for peace, balance and spiritual harmony in daily life. Vibrational Aum in meditation facilitates transcending these three gunas, the inherited forces of nature active in the mind and body known as Rajas, Tamas and Sattva. These three elements combined are responsible for our every action good or otherwise, both within and without. They form the binding-root of attachment to the material world. Thus, to escape their cyclical influence unto eternal soul liberation, we must transcend the three gunas. We do this by aligning our subtle inner hearing to Aum or OM in seated meditation, referred to as Raja or Royal Yoga — Yoga of mind, body, soul simultaneously — the ultimate Yoga or prayer for humans.</span></p><span data-dcnode-id="3875" instrument_node="">
</span><p data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">Let us develop John 14:6 further, by breaking down Mark 4:10-11.</span></p><span data-dcnode-id="3872" instrument_node="">
</span><p data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">10 – “when Jesus was alone, (in meditation) some of those who heard him (developing understanding) along with twelve disciples (inner creative faculties) asked him to explain the parables”.</span></p><span data-dcnode-id="3869" instrument_node="">
</span><p data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">Mark 4:11 –Jesus said: “You have been given the secret (capacity of knowing pure silence) of the kingdom of God. But the others, who are on the outside, (souls in ignorance of their divine nature within) hear all things by means of parables, (others’ surface explanation as opposed to inner revelation – including daily media conditioning) so that they look yet not understand, for if they did, they would turn to God, (Aum vibration) and he (AUM) would forgive them (integration of generational ignorance)” the means of establishing cosmic unity, peace and coherence within consciousness.</span></p><span data-dcnode-id="3866" instrument_node="">
</span><p data-dcnode-id="3862"><span data-dcnode-id="3865" instrument_node="">Similarly, with Psalm 46:10: “Be still and know that I am God”</span><br data-dcnode-id="3864"><span data-dcnode-id="3863" instrument_node="">“Be still” (meditate) and “Know” (direct experience) [of] “I Am” (eternity Awareness) “God” (as vibrational Aum) or, Truth realized within consciousness.</span></p><span data-dcnode-id="3861" instrument_node="">
</span><p data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">The ‘I’ as in, ‘I Am’ is not referring to the conditioned or lower individual personality of ‘I’ am.</span></p><span data-dcnode-id="3858" instrument_node="">
</span><p data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">‘I Am’, as mentioned in John, is referring to the eternal Now’ and not to time, or the ‘me’ ‘mine’ ‘I’ embedded in the lower intellect condition, but which ‘me’ ‘mine’ ‘I’ eventually dissolves into ‘I Am’ through AUM vibration.</span></p><span data-dcnode-id="3855" instrument_node="">
</span><p data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">‘I Am’ consciousness must first be stirred into awareness by direct experience of deep vibratory sound, such as AUM, and then, by transcending AUM, our soul returns to the creator of AUM, the Transcendent Self or, the unified field of Pure Consciousness, the state which never undergoes change. Thus, the unified field of pure consciousness is the Source of the innumerable laws of nature (often referred to as the gods) therefore, is not subject to the laws of nature, to evolution. These laws of nature came into existence out of the Transcendent, the Absolute. Hence the Bhagavad-Gita – regards reaching pure consciousness — states in ch2 v45 to Arjuna, “Be without the three gunas” meaning, transcend the laws of nature thereby is how the lower intellect becomes Resolute, one-pointed, out of the influence of the binding influence of compulsory sin — the subconscious negative mind-sets.</span></p><span data-dcnode-id="3852" instrument_node="">
</span><p data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">Vibrational AUM thus exposes subconscious addictions and their reactive patterns causal of endless, needless suffering.</span></p><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">In bringing light to rid darkness, thus generational suppressed addiction-based consciousness becomes integrated, made conscious, raised spiritually, thus commences our way back Home. Like the river becoming unblocked, it realizes the Ocean, the eternal unbounded Ocean of Self, the state of Pure Consciousness.</span></p><span data-dcnode-id="3846" instrument_node="">
</span><p data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">So, let us look more closely at the make-up of Aum particularly the letter A.</span></p><span data-dcnode-id="3843" instrument_node="">
</span><p data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">The letter ‘A’ has three lines or aspects which symbolize Sattva, Rajas and Tamas, the character values contained in A—U—M, the three gunas: one guna supporting life, another opposing, and the third complimentary to both.</span></p><span data-dcnode-id="3840" instrument_node="">
</span><p data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">The point atop of ‘A’ signifies where the three gunas meet, (point of intellect convergence) denoting the need of transcending the three elements of nature responsible for its innumerable laws. By not transcending the gunas, we remain under their influence subconsciously.</span></p><span data-dcnode-id="3837" instrument_node="">
</span><p data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Thus the Word ‘God’ – which is best seen as a verb and not a noun – is relating to a particular vibratory sound quality: the sound of God is a vibratory Vowel of divine standard as in, G AAHH D.</span></p><span data-dcnode-id="3834" instrument_node="">
</span><p data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">Again we have the words, God and Good. The center section of both these words are indicative of Alpha and Omega, or, A &amp; O, as in, the Vowel ‘Ah’ within God, and ‘Uh’ sounding Vowel within Good, which together make up the universal sound, AUM. So, the words ‘Good News’ appearing on many Bibles are referring thus to revelations from within a vibrational soul in awakening. And although sourced through previous enlightened souls, the same ‘Good News’ of unfolding inner wisdom applies equally to you /me today.</span></p><span data-dcnode-id="3831" instrument_node="">
</span><p data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">In summary:</span></p><span data-dcnode-id="3828" instrument_node="">
</span><p data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">Alpha represents creation or, beginning of time, and Omega signifies end of time within for that individual mind in meditation. In other words, when the limited time-bound self realizes the unbounded nature of higher Self, as Oneself, as Truth – you as soul become Truth, become Aware in eternal Life – termed Moksha, meaning the transcendent state or, soul liberation from the cycle of rebirth, a rebirth which is maintained by the laws of subconscious reactive patterns operating in the mind and body. Thus its these laws which one transcends in silence meditation leading to transcendence. But that the addictive karmic patterns such as alcohol, gambling, smoking, paid for sex, pornography, overeating, anger, and so on, still require conscious integration which may in fact require professional counseling and supervision.</span></p><span data-dcnode-id="3825" instrument_node="">
</span><p data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">And yes, this journey unto Truth indeed can take many reincarnations (which it has until now). BUT, realization of Truth can also be achieved in a single lifetime, this lifetime, the incarnation in which we’ve had the aha moment leading to inner inquiry as opposed to outer. When, for the first time. we payed conscious attention to within and decided to explore this domain. Or, one day, we listened esoterically to a particular scripture and its undeniable calling to inner silence meditation, such : “be still”.</span></p><span data-dcnode-id="3822" instrument_node="">
</span><p data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">For in truth, this outer journey of time and relativity must eventually lead to an inner journey of Self-discovery and eternal Truth.</span></p><span data-dcnode-id="3819" instrument_node="">
</span><p data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">When intuitively understood, that, each transcendence meditation represents an inner ‘end of time’ cycle or, Omega or, one lifetime, and, that, on coming out of meditation and transcendence this coming out represents commencement of a new incarnation. In other words, we return from Omega to Alpha once more, now, to live our newly gained level of transformed consciousness through the entire physiology and nervous system, to vitally include cellular and molecular systems. This cyclical process of returning from transcendental pure silence, represents a new biblical Day, a period of spiritual growth, until our next meditation and transcendence, when the soul once again journeys beyond time (Omega) and reincarnates once more to Alpha thereby create and develop even higher evolution and spiritual awareness to live through our physiology. Development of our consciousness is the eternal soul’s means of furthering God’s Will, or Idea for humanity, on this planet Earth.</span></p><span data-dcnode-id="3816" instrument_node="">
</span><p data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">From all that has been expressed here, we can see that, Genesis primarily is about the unfolding from within dynamic: Genesis is revelations of the ancient seers regards the inner processes mentioned, that of stirring the deeper silence into active bliss consciousness through vibrational AUM, thus furthering divine evolution both within and without.</span></p><span data-dcnode-id="3813" instrument_node="">
</span><p data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">Thus the significance of the scripture: “what ye do unto the least of my breather, ye do unto me”.</span></p><span data-dcnode-id="3810" instrument_node="">
</span><p data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">So, now, the age-old question: when is one fully Enlightened?</span></p><span data-dcnode-id="3807" instrument_node="">
</span><p data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">From the AUM and Genesis perspective, enlightenment is regards inner revelations of our own spiritual progress through the long corridor of time, to this point. The road of enlightenment is regards overcoming and integration of generational conditioning and our ignorance conditioned reaction to such. In its practical application, mature enlightenment is regards the wisdom to know the difference, or, the capacity of right action every time. Enlightenment thus is revelation which initially takes place transcendentally: our soul’s means unto the state of full mind functionality, of total brain coherence. In other words, when man’s lower intellect – our born into basic animal standard — has ascended unto resolute status, unto cosmically discerning ability, then one can claim conscious enlightened standard. By this enlightenment — regards our life on planet Earth — all the scriptures have been fulfilled, when personal enlightenment equates to our being a natural channel of divine wisdom.</span></p><span data-dcnode-id="3804" instrument_node="">
</span><p data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">Post meditational consciousness thus requires practical expression, which expression roots to form cosmic consciousness thus to form the criteria or bases of Right action or, enlightenment in action. Which right action is really the reverberations of direct AUM influencing. Ultimately, we will ‘know’ enlightenment to be Mature love and blissful peace sourced through our AUM-quickened thymus gland — the AUM-infused Higher Heart Love chakra.</span></p><span data-dcnode-id="3801" instrument_node="">
</span><p data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">Pure Consciousness – the Previous Cause</span></p><span data-dcnode-id="3798" instrument_node="">
</span><p data-dcnode-id="3794"><span data-dcnode-id="3797" instrument_node="">Finally, guna is a Sanskrit word meaning quality or tendency. Thus the combined tendency and quality of the three gunas make up the innumerable laws of nature. But, that, these laws in turn are resultant of a previous cause, which previous cause is the Almighty, the Absolute, the Transcendent or, Pure consciousness. In other words, before the manifest universe, before AUM, there was the Un-manifest, or, Pure Consciousness, but without knowing Itself AS pure consciousness or eternal Bliss. Thus, the laws of nature came into being, are birthed – through Pure Consciousness and Its own creative intention or, Idea — to facilitate Pure Consciousness in knowing Itself through Itself.</span><br data-dcnode-id="3796"><span data-dcnode-id="3795" instrument_node="">Put another way, Pure Consciousness cannot be known through a sin-riddled consciousness directly, thus, “No one comes to the Father except by Me” – lower consciousness must first be quickened, purified unto Pure Consciousness in silence meditation.</span></p><span data-dcnode-id="3793" instrument_node="">
</span><p data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">Thus, out of the eternal silence of Pure Consciousness came the laws of Creation, Maintenance and Renewal, which ‘Creation’ is often referred to as the big bang. But as we can now understand, creation – Creator — and renewal emerged out of the eternal Big Silence, out of Pure Consciousness as vibrational AUM, and, as such, we’re each innately equipped of all the attributes and potential of Pure Consciousness, thus the term, ‘made in the image and likeness of God’, which glorious state is fulfilled on realizing the Self as separate from the world of chaos.</span></p><span data-dcnode-id="3790" instrument_node="">
</span><p data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">In this context, through our chosen meditative practice, we each have the God-given ability of realizing Self, of creating perfect cosmos, stability of mind, stability of peace, bliss and coherence in the global consciousness.</span></p><span data-dcnode-id="3787" instrument_node="">
</span><p data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">As all peace-infused vibration registers in the collective consciousness, each meditator, through their meditational peace practice, contributes enormously in reaching many thousands who are not yet meditators: to upgrade their consciousness unto eternal cosmic status, unto soul-serving values which serve all of humanity spiritually. As co-creators with God, evolution needs you, me and the global brotherhood to create invincible peace and coherence in our minds, thus in the world, at this vital juncture in time.</span></p><span data-dcnode-id="3784" instrument_node="">
</span><p data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">Permanent world peace is the global imperative for each of us and for every generation. And yes, while it’s doable, peace must first be Self-realized thus stabilized within individual consciousness. Hence, “first seek ye the kingdom of God and all else shall be added” — peace becomes established or ‘added’ unto consciousness while in vibrational AUM meditation — humans highest form of prayer.</span></p><span data-dcnode-id="3781" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="3780"></div></div><footer class="entry-footer" data-dcnode-id="3766"><p class="entry-meta" data-dcnode-id="3767"><span class="entry-categories" data-dcnode-id="3769"><span data-dcnode-id="3778" instrument_node="">Filed Under: </span><a data-dcnode-id="3776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/about-the-scriptures" rel="category tag"><span data-dcnode-id="3777" instrument_node="">About the Scriptures</span></a><span data-dcnode-id="3775" instrument_node="">, </span><a data-dcnode-id="3773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/meditation" rel="category tag"><span data-dcnode-id="3774" instrument_node="">Meditation</span></a><span data-dcnode-id="3772" instrument_node="">, </span><a data-dcnode-id="3770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/spirit-and-soul" rel="category tag"><span data-dcnode-id="3771" instrument_node="">Spirit and Soul</span></a></span><span data-dcnode-id="3768" instrument_node=""> </span></p></footer></article><article class="post-4676 post type-post status-publish format-standard has-post-thumbnail category-about-the-scriptures category-consciousness category-esoteric category-literal-vs-spiritual category-meditation category-spirit-and-soul category-the-biblical-mind entry" data-dcnode-id="3472" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="3747"><h1 class="entry-title" data-dcnode-id="3762" itemprop="headline"><a data-dcnode-id="3763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4676-the-developing-intellect-in-biblical-symbolism-part-one.html" rel="bookmark"><span data-dcnode-id="3764" instrument_node="">The Developing Intellect in Biblical Symbolism: Part One</span></a></h1><span data-dcnode-id="3761" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="3748"><time class="entry-time" data-dcnode-id="3759" datetime="2022-02-12T12:01:09-05:00" itemprop="datePublished"><span data-dcnode-id="3760" instrument_node="">February 12, 2022</span></time><span data-dcnode-id="3758" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="3754" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="3755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/admin" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="3756" itemprop="name"><span data-dcnode-id="3757" instrument_node="">Joshua Tilghman</span></span></a></span><span data-dcnode-id="3753" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="3750"><a data-dcnode-id="3751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4676-the-developing-intellect-in-biblical-symbolism-part-one.html%23comments"><span data-dcnode-id="3752" instrument_node="">99 Comments</span></a></span><span data-dcnode-id="3749" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="3498" itemprop="text"><span data-dcnode-id="3746" instrument_node="">
</span><figure class="wp-block-gallery columns-1 is-cropped" data-dcnode-id="3741"><ul class="blocks-gallery-grid" data-dcnode-id="3742"><li class="blocks-gallery-item" data-dcnode-id="3743"><figure data-dcnode-id="3744"><img alt="" class="wp-image-4679" data-dcnode-id="3745" data-full-url="http://www.spiritofthescripture.com/wp-content/uploads/2022/02/intellect-and-bible-1.jpg" data-id="4679" data-link="http://www.spiritofthescripture.com/?attachment_id=4679" sizes="(max-width: 997px) 100vw, 997px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2022/02/intellect-and-bible-1.jpg&amp;raw" srcset="http://www.spiritofthescripture.com/wp-content/uploads/2022/02/intellect-and-bible-1.jpg 997w, http://www.spiritofthescripture.com/wp-content/uploads/2022/02/intellect-and-bible-1-292x300.jpg 292w, http://www.spiritofthescripture.com/wp-content/uploads/2022/02/intellect-and-bible-1-768x789.jpg 768w"></figure></li></ul></figure><span data-dcnode-id="3740" instrument_node="">
</span><p data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">Let’s approach the story of Adam and Eve from the angle of the developing intellectual mind. What is the Bible inferring about the purpose the mind provides to the human soul’s evolutionary experience? We will look at some angles not covered in mainstream Christian thought. I will provide an alternative, albeit a logical framework for you as we extrapolate a contextual meaning based on symbolism. Hopefully we will spark some much needed thoughtful conversations on the importance of the intellect in relation to man’s spiritual and moral development, and why it is so vital in the soul’s progress of what we term the developing spiritual qualities or faculties latent in man. </span></p><span data-dcnode-id="3737" instrument_node="">
</span><p data-dcnode-id="3732"><span data-dcnode-id="3736" instrument_node="">There are some subsets of the spiritual New Age movement today which seem to demonize rational thinking. They proclaim it as antithetical to the spiritualization of man’s soul. “Stop thinking, and just be,” I have read, or, “thinking is the problem.” At the very least, popular modern gurus making such statements popular like Eckhart Tolle in the </span><em data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">Power of Now</span></em><span data-dcnode-id="3733" instrument_node=""> are often taken out of context and the real essence of what he is saying has been totally subverted to the point of being ludicrous. Eckart Tolle is not saying humans need to stop thinking rationally, but rather, that most human beings DON’T think rationally, which IS the problem. Many of us are caught up in a systematic way of uncontrolled and undisciplined thought patterns which are negative, leading to much suffering. Tolle provides solutions for finding the space between this delusional systematic and automatic thinking process that can lead to a better and more intelligent, self-aware realization of the true power of thought, even if his writing doesn’t always seem to make this point clear enough.&nbsp;</span></p><span data-dcnode-id="3731" instrument_node="">
</span><p data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">And make no mistake. In the scripture, the horse often symbolizes the intellect. Paul was thrown off it by the blinding light of Christ in a spiritual vision on the road to Damascus. In other words, Paul’s own intellectual pride was revealed for what it was, and he was blinded, metaphorically, because his intellectual pride (which always comes before a fall, even off a horse!) symbolically revealed in the story as man’s carnal thinking process. So yes, and again, down get me wrong. Thinking is a problem for many of us. But this is because the thoughts are corrupt, not because thought and thinking in and of itself is bad!&nbsp;</span></p><span data-dcnode-id="3728" instrument_node="">
</span><p data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">The great mystic and spiritual writer Blavatsky once stated:</span></p><span data-dcnode-id="3725" instrument_node="">
</span><p data-dcnode-id="3720"><span data-dcnode-id="3724" instrument_node="">“Destroy your thoughts…go beyond mind…give up thinking…live in the realm of no-mind, not-thought and not-thinking,” they urge us, apparently unaware that we </span><em data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">are</span></em><span data-dcnode-id="3721" instrument_node=""> minds and thinkers in evolution, for “mind is a term perfectly synonymous with Soul.” (H.P. Blavatsky, “Transactions of the Blavatsky Lodge” p. 29)</span></p><span data-dcnode-id="3719" instrument_node="">
</span><p data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">It is important to reiterate what Blavatsky states: “mind is a term perfectly synonymous with soul.”</span></p><span data-dcnode-id="3716" instrument_node="">
</span><p data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">It has been stated before that a true spiritual seeker should not be a cold-hearted intellectual, nor a warm-hearted anti-intellectual. There is always a balance between mind and heart. Always. And both should be developed equally alongside one another!</span></p><span data-dcnode-id="3713" instrument_node="">
</span><p data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">And what is it that corrupts thought, then, and the soul? We will now explore some possibilities. So let’s return to the Bible and try to shed some deep metaphysical knowledge on this entire subject!</span></p><span data-dcnode-id="3710" instrument_node="">
</span><p data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">In order to see Adam and Eve in their true symbolic significance, we have to set a proper foundation which challenges the mainstream Christian view. Metaphysical interpretations have existed throughout history that show Adam and Eve were not physical beings existing in a physical place, both before and after the allegorical expulsion.&nbsp;Rather, the emphasis is placed on what they represent as the developing mind or soul after the fall.</span></p><span data-dcnode-id="3707" instrument_node="">
