</span><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">In Luke, it was early in Jesus’ ministry and the disciples were undisciplined and still being gathered. In John we have a spiritual evolution of MIND in the text. It is after Jesus’ ministry on earth (the lower nature and mind). Peter is the one that brings the net of fish up, but there is something different about the natural mind now. It has walked with the indwelling Christ for some time, and it is ready to become the “evolved personality.” This is why Jesus asks Peter if he loves him three times (three signifying the discipline of all three qualities of the lower nature). The natural mind has finally gathered together it’s mental qualities and is ready for the next stage of spiritual growth on the mental plane. It now has the ability to bring the lower mind under disciplined control. Nine then refers to the three perfected of the lower plane. The three are the lower mental, emotional, and physical aspects of man. The mind has gained discipline over all three: sensations, emotions, and thoughts. The mind now has dominion over the fish of the lake and the sea!</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Of course this does not mean that the lower mind is perfect. Peter will continue to make mistakes, which is why Paul rebukes him later on. The Apostle Paul symbolizes a further evolution of the mind, which is the actual birthing of Christ in the mind. This process follows the lower mind which has taken control over its course of thought, speech, and action through conscious will power. And this process is what is meant through concentration of the mind, which is a discipline of the thoughts that precedes true meditation.&nbsp;</span></p><span data-dcnode-id="1951" instrument_node="">
</span><h2 data-dcnode-id="1948"><strong data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">Fish as a symbol of the Old Testament</span></strong></h2><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">The Old Testament version of this healing in the lower mind takes place in Ezekiel. Before we proceed there are some things we should discuss about the Book of Ezekiel. Similar to the Gospel of John, which goes deeper in the esoteric sense than the rest of the Gospels, Ezekiel does the same. In fact, the Book of Ezekiel almost didn’t make it into the Biblical canon, and many Jewish boys were hindered from studying it until they reached a certain mature age. In certain Jewish mystical traditions it was forbidden completely to the uninitiated. Why? Because it is a highly esoteric book containing concepts that require a certain spiritual maturity to understand.&nbsp;</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">First a scripture about the healing waters which flow from underneath the altar within the Holy of Holies.&nbsp;</span></p><span data-dcnode-id="1941" instrument_node="">
</span><p data-dcnode-id="1938"><em data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">“And it shall come to pass, that everything that liveth, which moveth, whithersoever the rivers shall come, shall live: and there shall be a very great multitude of FISH, because these waters shall come thither: for they shall be healed; and everything shall live wither the river cometh” (Ezekiel 47:9).&nbsp;</span></em></p><span data-dcnode-id="1937" instrument_node="">
</span><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">This river of living water coming from man’s innermost being, the higher self, is the same idea taught through Jesus in the New Testament. Remember the woman at the deep well who wanted water? Jesus told her the water from that well would make her thirst again. Jesus tells her that he could provide the water of truth that would keep her from thirsting again. But in Ezekiel, notice that this river of water heals the very great multitude of fish. Another example of the subconscious and conscious mind healed through the unity of wisdom and love?&nbsp;</span></p><span data-dcnode-id="1934" instrument_node="">
</span><p data-dcnode-id="1930"><span data-dcnode-id="1933" instrument_node="">Ezekiel’s temple by the way, with all it’s passages and structures, is a map of the human brain </span><img alt="🙂" class="emoji" data-dcnode-id="1932" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"><span data-dcnode-id="1931" instrument_node=""> The altar in the Holy of Holies, at the very center of the temple (brain), is the pineal gland again.&nbsp;</span></p><span data-dcnode-id="1929" instrument_node="">
</span><h2 data-dcnode-id="1926"><strong data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Simon son of Bar Jonah</span></strong></h2><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">I wanted to conclude by showing how awesome the entire Bible fits together and the continuity between the Old and New Testaments. Notice how after Peter recognizes the Christ as the Son of the Father, Christ states:</span></p><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1919"><em data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">“…blessed art thou, Simon Barjona: for flesh and blood (the natural mind) hath not revealed it unto thee, but my Father (spirit) which is in heaven (the realm of the higher mind)” Matthew 16:17.</span></em></p><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Jesus is referring to Peter as Simon Barjona because he is associating him with the son of Jonah of the Old Testament. Not a literal son, but the son of the soul in evolutionary progression, in much the same way that John the Baptist was an evolved Elijah who had to come.&nbsp;</span></p><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Jonah of the Old Testament was cast in the sea and swallowed by a great fish. Do you see the similarities here? Jonah is the natural mind in a period of evolution as well. Peter is the more advanced natural mind who finally is ready to recognize the Christ, while Jonah is symbolic of the mind that is meant to eventually be consummated by the Christ, which is accomplished through Peter’s actions finally. It is interesting that at the end of the Book of Jonah, Jonah is still quite angry with the Ninevites. God gives him a slight rebuke at the end, and then it is over. The Book of Jonah is only four short chapters, and it ends on a very sad note. God questions Jonah at the end and points out the fact that the Ninevites are spared because they can’t tell their left hand from their right. This refers to the mixed up state of the mind that is still quite divided. I don’t have time here to delve into all the symbols of Jonah here, but if you think hard enough, I bet you can find many more similarities in the story.&nbsp;</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">One more side note to tie in an extra knot: Jesus said no sign would be given except that Jonah was three days and nights in the belly of the whale/fish. This is the evolution of mind, and the stories of Jonah and Peter unveil the spiritual evolution process of just one of the faculties of mind in conjunction with the other eleven (disciples). The Bible is so perfectly connected and reveals a deep psychological process of the mind. If only modern psychologists began to see the validity of the Biblical stories in this light, the Bible would become more authoritative than anything Freud and others have accomplished.&nbsp;&nbsp;</span></p><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">I hope this article has given you some food for thought.&nbsp;</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Blessings.</span></p><span data-dcnode-id="1903" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="1902"></div></div><footer class="entry-footer" data-dcnode-id="1873"><p class="entry-meta" data-dcnode-id="1874"><span class="entry-categories" data-dcnode-id="1876"><span data-dcnode-id="1900" instrument_node="">Filed Under: </span><a data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/about-the-scriptures" rel="category tag"><span data-dcnode-id="1899" instrument_node="">About the Scriptures</span></a><span data-dcnode-id="1897" instrument_node="">, </span><a data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/awakening" rel="category tag"><span data-dcnode-id="1896" instrument_node="">Awakening</span></a><span data-dcnode-id="1894" instrument_node="">, </span><a data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/consciousness" rel="category tag"><span data-dcnode-id="1893" instrument_node="">Consciousness</span></a><span data-dcnode-id="1891" instrument_node="">, </span><a data-dcnode-id="1889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/esoteric" rel="category tag"><span data-dcnode-id="1890" instrument_node="">Esoteric</span></a><span data-dcnode-id="1888" instrument_node="">, </span><a data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/literal-vs-spiritual" rel="category tag"><span data-dcnode-id="1887" instrument_node="">Literal vs Spiritual</span></a><span data-dcnode-id="1885" instrument_node="">, </span><a data-dcnode-id="1883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/spirit-and-soul" rel="category tag"><span data-dcnode-id="1884" instrument_node="">Spirit and Soul</span></a><span data-dcnode-id="1882" instrument_node="">, </span><a data-dcnode-id="1880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/the-biblical-mind" rel="category tag"><span data-dcnode-id="1881" instrument_node="">The Biblical Mind</span></a><span data-dcnode-id="1879" instrument_node="">, </span><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/the-gospels" rel="category tag"><span data-dcnode-id="1878" instrument_node="">The Gospels</span></a></span><span data-dcnode-id="1875" instrument_node=""> </span></p></footer></article><article class="post-4491 post type-post status-publish format-standard has-post-thumbnail category-consciousness category-meditation entry" data-dcnode-id="1663" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="1854"><h1 class="entry-title" data-dcnode-id="1869" itemprop="headline"><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4491-miracle-consciousness-and-how-to-develop-it.html" rel="bookmark"><span data-dcnode-id="1871" instrument_node="">Miracle Consciousness and How to Develop It</span></a></h1><span data-dcnode-id="1868" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="1855"><time class="entry-time" data-dcnode-id="1866" datetime="2020-07-14T19:58:45-05:00" itemprop="datePublished"><span data-dcnode-id="1867" instrument_node="">July 14, 2020</span></time><span data-dcnode-id="1865" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="1861" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/raymondphelan" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="1863" itemprop="name"><span data-dcnode-id="1864" instrument_node="">Raymond Phelan</span></span></a></span><span data-dcnode-id="1860" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="1857"><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4491-miracle-consciousness-and-how-to-develop-it.html%23comments"><span data-dcnode-id="1859" instrument_node="">12 Comments</span></a></span><span data-dcnode-id="1856" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="1674" itemprop="text"><span data-dcnode-id="1853" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1851"><img alt="" class="wp-image-4494" data-dcnode-id="1852" sizes="(max-width: 910px) 100vw, 910px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2020/07/autumn-lake-water-mist-nature-scenery-autumn-leaves.jpg&amp;raw" srcset="http://www.spiritofthescripture.com/wp-content/uploads/2020/07/autumn-lake-water-mist-nature-scenery-autumn-leaves.jpg 910w, http://www.spiritofthescripture.com/wp-content/uploads/2020/07/autumn-lake-water-mist-nature-scenery-autumn-leaves-300x200.jpg 300w, http://www.spiritofthescripture.com/wp-content/uploads/2020/07/autumn-lake-water-mist-nature-scenery-autumn-leaves-768x512.jpg 768w"></figure><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">By means of the following amazing scripture, this article sets out how we may each come upon Divine Potential, that of miracle consciousness.</span></p><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Matthew 7: 13-14 puts it: “enter ye through the narrow gate, for wide is the gate that leads to hell”. A most telling verse indeed. But, where exactly is this instructional verse guiding us?</span></p><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">So, let us put some meat onto this skeleton sentence and see what esoteric nourishment can be gleaned from it. Let us discover how this particular scripture can change our life dramatically for the good.</span></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">We’re each inner equipped for spiritual awakening. But, until we connect consciously with the faculty or dynamic of awakening, then scriptures as these remain at their intellectual value only. Literal reading of this scripture is not sufficient, such does not touch upon the faculty means of soul awakening and ability of directly knowing miracle consciousness.</span></p><span data-dcnode-id="1838" instrument_node="">
</span><p data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">More than ever now, it’s time for moving into personal empowerment, into direct experience of the Divine within each of us. In this context, no outer means — including spoken or written words which are guiding and inspirational only — can give us God, simply because you already have God. Evolution-wise, it’s way past time for evolving beyond limiting religious dogmas and fear-driven belief systems into authentic reality and spiritual maturity, into direct God-Presence or miracle consciousness.</span></p><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">It’s important here to remember that, biblical ‘church’ is not referring to a physical building, but to one’s consciousness. Similarly, the biblical term ‘Jew’ refers to being ‘inwardly’ — one seeking God within. The term is not referring to the Jewish nation or its people. Thus the words on top of the crucifixion read: ‘hail king of the Jews’ meaning, praise (awakening) be the inwardly directed soul seeking their own Christ within.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">At our core, we’re each wired for ‘inwardly’: each encoded for divine seeking. Thus the Matthew scripture above is referring to spiritual awakening through our own inward means of mind only.</span></p><span data-dcnode-id="1829" instrument_node="">
</span><h2 data-dcnode-id="1826"><strong data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Questions</span></strong></h2><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">In the context of ‘inwardly’ and spiritual awakening, what exactly does narrow and wide gate mean, to what and where within are they referring?</span></p><span data-dcnode-id="1822" instrument_node="">
</span><h2 data-dcnode-id="1819"><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Answers</span></strong></h2><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Narrow gate is referring to becoming ‘least’ or smallest in lower ego, and wide gate referring to the outer world, to the carnal mind’s addictive attraction and association with the conditioned five senses and their animalistic standard.</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">So, there are two gates. One leading to heaven the other to hell. The gate to heaven is the strait, or narrow gate – being inwardly seeking – and the gate leading to hell is the outer wide gate of ‘world’ sense consciousness.</span></p><span data-dcnode-id="1812" instrument_node="">
</span><h2 data-dcnode-id="1809"><strong data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Three more questions</span></strong></h2><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">What practicalities are involved for entering into this narrow gate: how does one enter through it? Do we enter with our belief systems, our creeds, our social status, our religious faith flags? And, where specifically within is this narrow gate located?</span></p><span data-dcnode-id="1805" instrument_node="">
</span><h2 data-dcnode-id="1802"><strong data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">In other words, what’s the password to heaven, to miracle consciousness?</span></strong></h2><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">The password to heaven is CONVERGENCE.</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Narrow gate — meaning mental convergence — is triggered in the brain, while the wide gate functions under law of spiritual ignorance: lower-self or animalistic standard, here referred to as hell.</span></p><span data-dcnode-id="1795" instrument_node="">
</span><h2 data-dcnode-id="1792"><strong data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Becoming Inwardly</span></strong></h2><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">At the functioning level, both gates represent polar opposite states of mind. The reason being, is that, we must learn from our wide gate experiences and, through such learnings, choose one gate standard over the other. Thus, having chosen to be inwardly or, narrow gate, we take practical steps in that direction, of realizing direct narrow gate awareness.</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Making this choice of becoming inwardly and taking the initial inward steps in that regard, takes individual courage. But the process — which will be explained here — is really not difficult but does require commitment and dedication. In other words, we make our choice and follow through no matter what our wide gate experiences throw at us. In this context, we member the biblical verse: “and it came to pass…”, meaning every personal situation, struggle or challenge, changes or, comes to pass. So that’s our biblical encouragement throughout this process of becoming ‘inwardly’.</span></p><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Wide gate consciousness represents and satisfies the lower-self only — the conditioned mind-senses personality – here termed suffering or hell — while narrow gate satisfies or raises the soul/heart into conscious Eternal standard.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><h2 data-dcnode-id="1779"><strong data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Narrowing the focus</span></strong></h2><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">By creating a false persona, wide gate identification results in loss of spiritual identity — hence the expression ‘what good in conquering the world, if in doing so, we lose our soul’.</span></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">So, ‘narrow gate’ initially is about NARROWING the wide gate persona: narrowing the scattered irresolute intellect: narrowing the activities of the incessant surface thinking mind and its attraction with wide gate or ‘the world’ level of sense consciousness.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Similar to the tortoise withdrawing its limbs into its shell, narrowing the mental focus is how the senses become withdrawn or detached from their objects of attraction — both mental and physical. This is the ‘inwardly’ process of transforming wide gate addiction experiencing into spiritually fulfilling narrow gate awareness.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><h2 data-dcnode-id="1766"><strong data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Miracle of Convergence</span></strong></h2><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Part of the crucifixion’s symbolic or esoteric message is revealed in the image where Jesus’ eyes – on the cross — are converged. Narrowing the mental wide gate through convergence thus replicates personal crucifixion of the created false persona, carnal mind or lower ego.</span></p><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Daily practice in ‘convergence’ allows the brain adapt to handling two states of awareness simultaneously: world consciousness and eternal consciousness (wide gate and narrow gate). Prior to this functional ability, the brain-nervous system functioned only in mono or single state attention. We’re now entering the realm of miracle consciousness of where narrow gate discernment becomes as spiritual Conqueror over false persona-driven wide gate intellect.</span></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">As convergence becomes established, we’re no longer under the compulsion and dominance of the false persona, of wide gate attractions: we now make conscious decisions formulated through the Resolute intellect as opposed to the irresolute. The brain / intellect re-calibrate from animalistic mono into facilitating time and timelessness — relative and absolute – simultaneously within the nervous system. Remembering that we come in to this world uploaded in mono only. Now, a New capacity of consciousness has been triggered, revealed, awakened, that of knowing ‘heaven on earth’ at individual level. Biblically phrased: “heaven and earth (within) are full of thy glory” – full spiritual potential is always available through being ‘inwardly’ converged.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Tolerance to convergence needs time to mature. I say mature, because, there is so much bliss on contact with converged point — mature narrow gate — that the nervous system needs time to acclimatize, become cultured into withstanding waves of pure bliss (biblical rapture). It takes repeated ‘dating’ for this mind/body physiology relationship to eventually ‘marry’, adapt to the surge of pure energy without the dilutor influence of the artificial wide gate persona. At this level, one experiences Divine Presence within as separate from outer world gate activity.</span></p><span data-dcnode-id="1753" instrument_node="">
</span><h2 data-dcnode-id="1750"><strong data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Diving within and the relevance of the mantra</span></strong></h2><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">The word ‘least’ biblically can also translate ‘point’ as in, point awareness. Once mature point, or least, becomes established in consciousness, the human soul – in its combined aspect — becomes liberated into conscious infinity – transcendence or, the non-permeated state of Being — without risk of re-capture by the glare of wide gate experiencing. In other words, new desire seeds no longer take deep root for future re-enacting, or future karmic debt.</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">The secret of deep-sea diving is entering the water at the correct angle. To aid in diving deep within the mind, let us introduce ‘the correct angle’ vehicle, the mantra, Aum. Mantra takes the mind naturally and effortlessly from its familiar conscious terms of reference to the non-familiar unconscious spiritual level.</span></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Mantra is the mind’s natural means of convergence which convergence introduces the mind to the unified field of awareness. It achieves this by way of converged eyes and focussed inner hearing. Focussed eyes and inner hearing take the mind to the mid-brain point, which point triggers the pineal gland into service.</span></p><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Bearing in mind that the conscious and unconscious are not two separate minds, rather, two aspects of a divided mind. Thus the mantra – meaning mind vehicle – integrates or unifies this thought-created separation by taking the mind through all the levels of the unconscious aspect thereby making it conscious or full. In this context, mantra functions like a deep-sea vibratory torch bringing conscious awareness to unconsciousness, to the non-awakened aspect of mind.</span></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Aum replicates the subtle sound of the universe to which inner hearing attunes. This sacred sound as mentioned with practice recalibrates the brain to oscillate at between 1-3 cycles per second — the Delta or Divine state.</span></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">During Aum, the eyes and inner hearing converge naturally between the eyebrows, which ‘point centring’ activates the pineal and pituitary glands. This is how left / right brain harmonization or full spectrum brain awareness, comes about, or, expansion of consciousness.</span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">In this new mind dynamic, awareness functions through unconscious attention – free-flowing thought — as opposed to selective ego-driven conscious mind content or compulsive surface mind thinking. In other words, as the conscious capacity of mind expands, awareness is no longer filtered THROUGH something, through mind-set conditioning, as previously.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">As reality begins revealing itself through the eternal Present Moment, the Now, life is no longer experienced through the rear-view mirror of conditioned mind-sets and blinkered societal vision.</span></p><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Our life no longer reflects fear-driven agendas, that of automatic response activity to previous conditioning. We’re now free to LIVE and not merely exist prisoner-like THROUGH the looped content of one or many controlling mind-sets. Remember, mind-set dictates your life.</span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Because life is now perceived and experienced through higher awareness, it’s like touching base with our spiritual landscape for the very first time. Convergence has freed us from the illusion of the thought-created world.</span></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">There is a bust statue of a Pine cone in the garden section of the Vatican. This symbol – referring to the pineal gland — is rarely spoken about in religion, yet its esoteric message is paramount to the spiritual awakening process.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><h2 data-dcnode-id="1713"><strong data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Entering mind at the right angle</span></strong></h2><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Many are familiar with verbal chanting, particularly that of Aum or Omm.</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">We’re now going to show just how this mantra can be experienced more purely, subtler other than surface decibel hearing.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><h2 data-dcnode-id="1703"><strong data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">To start</span></strong></h2><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Chant at normal surface level for about 20/30 seconds. Now, reduce and cease outer verbal recitation and continue inner hearing of mantra non-verbally or silently within from this deeper angle. In other words, go into ‘minus’ decibel hearing and continue deepening the minus level of the inner hearing.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">We’re now bringing surface mantra hearing from 14-21 cycles per second of Beta brain speed to 4-7 cps inner hearing of the Theta unifying state. This level represents true biblical silence and stillness, as in “be still and know that I am God” psalm 46-10</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">With sustained practice, we can lower the brain’s oscillations even deeper to 1-3 cps, which is the Delta state. This level equates to Transcendence or God-Vibratory state.</span></p><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">If the mind drifts into wide gate, and it will — this is why we practice — pause for about 3 seconds, then recommence ‘inner hearing’. Each recommenced ‘inner hearing’ is from a deeper level, thus, every mantra restart represents progress in expansion of consciousness, nothing is lost, only gain.</span></p><span data-dcnode-id="1690" instrument_node="">
</span><h2 data-dcnode-id="1687"><strong data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Point and Infinity</span></strong></h2><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">As miracle consciousness develops, we come to understand, that, converged point and infinity are equal: neither are permeated by time, space and causation. Point, on inner contact, equates to concentrated bliss or natural happiness which explodes into Infinity, unboundedness, which infinity collapses back into point to explode again and again every time ‘point contact’ is achieved in meditation. Point and Infinity both contain the eternal memory of each other.</span></p><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">The need now as a species, I feel, is toning back on literal religiosity and instead view scriptures as intended – instructional in consciousness development. It’s worth noting that, many of the early scriptures were composed by advanced Yogis and Rishis — dealing with how the mind functions, and how, through misuse, mind can work either for us or against us – our best friend or worse enemy. Individual convergence indeed is the way of developing and establishing a miracle-functioning consciousness beyond doctrinal dogma and belief systems.</span></p><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1677"><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/s%3Fk%3Dthe%2Babsolute%2Bsecret%2Bby%2Braymond%2Bphelan%26ref%3Dnb_sb_noss"><span data-dcnode-id="1679" instrument_node="">https://www.amazon.com/s?k=the+absolute+secret+by+raymond+phelan&amp;ref=nb_sb_noss</span></a></p><span data-dcnode-id="1676" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="1675"></div></div><footer class="entry-footer" data-dcnode-id="1664"><p class="entry-meta" data-dcnode-id="1665"><span class="entry-categories" data-dcnode-id="1667"><span data-dcnode-id="1673" instrument_node="">Filed Under: </span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/consciousness" rel="category tag"><span data-dcnode-id="1672" instrument_node="">Consciousness</span></a><span data-dcnode-id="1670" instrument_node="">, </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/meditation" rel="category tag"><span data-dcnode-id="1669" instrument_node="">Meditation</span></a></span><span data-dcnode-id="1666" instrument_node=""> </span></p></footer></article><article class="post-4470 post type-post status-publish format-standard has-post-thumbnail category-awakening category-god category-literal-vs-spiritual category-paul-and-mysticism category-spirit-and-soul category-uncategorized entry" data-dcnode-id="1471" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="1645"><h1 class="entry-title" data-dcnode-id="1660" itemprop="headline"><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4470-why-jesus-said-he-came-to-bring-division.html" rel="bookmark"><span data-dcnode-id="1662" instrument_node="">Why Jesus said He Came to Bring Division</span></a></h1><span data-dcnode-id="1659" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="1646"><time class="entry-time" data-dcnode-id="1657" datetime="2020-07-02T18:51:03-05:00" itemprop="datePublished"><span data-dcnode-id="1658" instrument_node="">July 2, 2020</span></time><span data-dcnode-id="1656" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="1652" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/admin" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="1654" itemprop="name"><span data-dcnode-id="1655" instrument_node="">Joshua Tilghman</span></span></a></span><span data-dcnode-id="1651" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="1648"><a data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4470-why-jesus-said-he-came-to-bring-division.html%23comments"><span data-dcnode-id="1650" instrument_node="">21 Comments</span></a></span><span data-dcnode-id="1647" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="1494" itemprop="text"><span data-dcnode-id="1644" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1642"><img alt="" class="wp-image-4479" data-dcnode-id="1643" sizes="(max-width: 880px) 100vw, 880px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2020/07/diya-light-flame-ignite-fire-burning-diya-celebration-diwali-deepavali-1.jpg&amp;raw" srcset="http://www.spiritofthescripture.com/wp-content/uploads/2020/07/diya-light-flame-ignite-fire-burning-diya-celebration-diwali-deepavali-1.jpg 880w, http://www.spiritofthescripture.com/wp-content/uploads/2020/07/diya-light-flame-ignite-fire-burning-diya-celebration-diwali-deepavali-1-300x200.jpg 300w, http://www.spiritofthescripture.com/wp-content/uploads/2020/07/diya-light-flame-ignite-fire-burning-diya-celebration-diwali-deepavali-1-768x511.jpg 768w"></figure><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">In Luke chapter twelve, it is recorded that Jesus said he came, not to bring peace on earth, but division; even in one’s own household, two against three and three against two. In this post we will unveil the esoteric meaning. We will also dismantle the misconceptions of its exoteric interpretation that has promulgated in religious circles from this portion of Luke, which, ironically, has led to actual division of families and humanity at large.&nbsp;I have actually dealt with this subject before many years ago on the blog, but this post will offer some more depth and some other corroborating scriptures as well. </span></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Let’s look at the specific verse in detail. Jesus states:</span></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1632"><em data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">“Suppose ye that I have come to give peace on earth? I tell you, Nay; but rather division. For from henceforth there shall be five in one house divided, three against two, and two against three” (Luke 12:51-52).</span></em></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Some religious leaders and commentators of the past have believed this verse means that Jesus is foretelling the split that will come from individual families over believers (Christians) and non-believers (non-Christians). While this sometimes is the natural outcome of individuals who delve into the spiritual journey, it has nothing to do with what Jesus is referring to. The danger in this kind of thinking is that when this happens, certain individuals believe they are justified in the divisive outcome because “Jesus said it,” so everything is happening as it should. It can reinforce the “me” vs “other” mentality. This is sad, because anyone embarking on the inward spiritual journey to Christ should never use Jesus’ words as a justification for any kind of division or strife between human beings. Rather, we should love others as ourselves.</span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">So what did Jesus really mean? To answer that, we must unveil the symbols, for the truth of all scripture is veiled beneath the literal / outward interpretation.&nbsp;</span></p><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">The “one house” of Jesus’ statement is not a building. House refers to one of your vehicles (bodies) of consciousness. In this specific instance, Jesus was referring to the house which is the vehicle of thought itself. I will explain this in more in detail shortly. But first I want to direct you to another scripture by the Apostle Paul which will set the correct foundation for a proper, enriched understanding.&nbsp;&nbsp;</span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Hebrews 4:12 states:</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1616"><em data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">“For the WORD of God is quick, and powerful, and sharper than any twoedged sword, piercing even to the DIVIDING asunder of SOUL and SPIRIT, and of the joints and marrow, and is the discerner of THOUGHTS and INTENTS of the HEART.”</span></em></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Paul speaks of the word, or LOGOS, that divides the soul and spirit of man. The Greek word used for “dividing asunder” portrays the idea of a partition. This partition illustrates the dual nature of the man’s mind. Try to think of the mind as the center, or partition between two natures. These two natures are your soul and spirit. The thoughts of man can gravitate toward desire, through the soul, or, by will, our thoughts can be carefully guarded and chosen to reflect the spirit. </span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">In our scripture from Hebrews 4:12, it must be emphasized that the “word” is not the Bible itself, but simply the LOGOS. The Logos is the creative energy of spirit, or Christ, which manifests will (as opposed to desire), Wisdom (as opposed to error), and action (as opposed to unconscious action). These positive influences on the mind is what exposes the division, or partition, of the spirit from the soul. The soul of man, or carnal mind, is at enmity with God, until it is perfected. The coming of the man Jesus symbolizes the awakening&nbsp;of the soul to these positive influences, and therefore, there is for a time a great division and strife that is stirred up between soul and spirit. Paul explains this sort of war that is not against flesh and blood, but it is a war of the rulers within in our mind. </span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Now back to Jesus’ statement in Luke. The “house” he is referring to contains the mind, which includes the potential of the LOGOS personified through you. Notice how the author of Hebrews states that this division between soul (the lower mind containing your intellect, emotions, and senses) and spirit (or higher mind combined with the Holy Spirit) is caused by discerning of “thoughts” and “intents” of the heart. “Heart” here is another word for the greater mind, both its intellectual and spiritual or intuitional-wisdom-love nature. It is not until the spiritual ego, or “the thinker” that you are, turns its focus inwards to the still small voice that the division between soul and spirit begins its maturity towards unity in the divine marriage of soul and spirit.&nbsp;But at first there is always division, just as Jesus had to clean house in the temple when he had to flog away all the money changers that defiled the temple (or mind) itself. </span></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Another scripture which brings clarity here is Jesus’ statement on the original condition of the mind, BEFORE it’s division between soul and spirit:</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1600"><em data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">“But from the beginning of creation God made them male and female. For this cause a man (mind) shall leave his father and mother (the parents of the desire mind which seeks external world knowledge) and cleave to his wife (the emotion-nature of intuition/Holy Spirit), and shall become one flesh” (Mark 10:6).</span></em></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Now we must go back a few verses before Jesus talks about division in Luke chapter 12. Let’s read 12:49, which states:</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1593"><em data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">“I am come to send fire on the earth; and what will I, if it be already kindled?”</span></em></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">This fire is symbolic of spirit and love and truth. It is the fire (Holy Spirit) that “divides” because its essential wisdom dispels the ignorance of the lower mind which derives its truth from external sense reality instead of the higher spiritual realities. The process of destroying ignorance can seem very divisive within ourselves as we have to let go of certain false narratives and reclaim the truth. The arrival of Jesus signifies this beginning in the mind, and at first it is divisive, because the individual thinker, the spiritual ego, or mind, begins to identify not with the soul, but with spirit, and thereby realizes the soul needs to be disciplined with the love and wisdom nature, so that it can be raised into the higher mind.&nbsp;</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Remember, the first man (Adam after the fall) is earthy. Earth being a symbol for the soul (intellect, emotion, and physical sensation). The second Adam is a spiritual being, the potential Christ now fully manifested in the higher mind, who has united his lower nature with his spiritual nature. &nbsp;</span></p><span data-dcnode-id="1586" instrument_node="">
</span><h2 data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">What is Christ? What is Man?</span></h2><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1582" instrument_node="">When one reads the New Testament, one has to understand </span><em data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">what</span></em><span data-dcnode-id="1579" instrument_node=""> he or she is reading. If he or she believes they are reading history, then he or she will only learn </span><em data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">about</span></em><span data-dcnode-id="1576" instrument_node=""> Christ. If he or she understands they are reading about themselves, as the </span><em data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">expression </span></em><span data-dcnode-id="1573" instrument_node="">of the living WORD, then he or she is on the path to KNOW Christ. The Apostle Paul makes it clear: “…Christ in you, your hope of glory.” All scripture points us to the inner Christ we all have the potential to express. Within that journey is the “mystery” that Paul is instructing us to partake of.&nbsp;</span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">One who wishes to understand the mystery should not ask what is Christ without first asking, what is man.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1567" instrument_node="">And what </span><em data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">is</span></em><span data-dcnode-id="1564" instrument_node=""> man?</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Man is MIND. Man is mind, and mind is man. In other words, man is “a thinker.” The Psalmist gives us this revelation when he states:</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1553"><em data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">“Whatsoever a man thinketh in his heart, so is he” </span></em><span data-dcnode-id="1556" instrument_node="">(Proverbs 23:7). That which a man thinks, he is, and </span><em data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">becomes.</span></em></p><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">The man of higher thought is of a spiritual nature, and the man who thinks lower thought is of a soul nature. But everything that a man is stems from the “thinker” and is expressed through the QUALITY of his or her thought. This quality of thought is not produced just by the intellect, but rather the combination or union of intellect with intuition (the Holy Spirit).</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Paul provides further clarification: </span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1543"><em data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">And be ye renewed in the spirit of your MIND; and that ye put on the new man, which after God is created in righteousness and true holiness” (Ephesians 4:23-24). </span></em></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Renew the mind how? Renew it from that of the lower nature (soul) to your higher nature (spiritual mind), all within the realm of thought and the QUALITY of it’s expression. The quality an accuracy of our thoughts become especially acute when the intellect is in union with the intuition of love and wisdom provided by the Holy Spirit.&nbsp;Then the ignorance of the external world will be revealed, and the truth of the higher realities revealed. </span></p><span data-dcnode-id="1539" instrument_node="">
</span><h2 data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Some further scriptural thought on man, mind, and the true individuality, the THINKER</span></h2><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">For what reason does Genesis state that God sent the flood on the earth? And for what reason did God spare Noah and his family? You guessed it! It had to do with wrong thought!</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1530"><em data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">“And God saw that the wickedness of man was great in the earth, and that every imagination of the THOUGHTS OF HIS HEART was only evil continually” (Genesis 6:5).</span></em></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1528" instrument_node="">Esoterically, this means that God allegorically baptized the earth (lower nature / soul). It is an allegory of God baptizing the lower mind, to cleanse it. This is what the ritual of baptism symbolizes: the washing of the mind in the WORD, even Christ (the perfected ideal mind), within man. The concept infers the cleansing of the flesh, flesh being the carnal mind (soul) of man which thinks such thoughts which stem from envy, lust, greed, pride, selfishness, arrogance, etc. These are all products of one culprit: the desire mind, the serpent which caused the so called “fall of man.” A better expression would be, “fall of mind!” The larger symbolism in the story of Noah is spirit cleansing the earth (soul) of evil </span><em data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">thought</span></em><span data-dcnode-id="1525" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Noah escaped the flood because he didn’t “think” like his fellow evil doers. Noah is the true individuality, the thinker, that raised his thoughts above the highest mountain top into heaven, the upper firmament the mind, which contains the waters above (Gen. 1:7), which are of truth (Christ addressed himself as this water of truth which enables one to never thirst again to the woman at the well). </span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Noah, the individuality, or I AM nature (the spiritual mind), then planted a vineyard (remember Christ is the vine, and we are the branches). From Noah and his family, mankind came forth upon the earth. In other words, the branches of the earth (soul) came forth. The branches are of the lower nature, but if they abide in Christ, they will produce fruit. Those do not abide in Christ, will be burned up (extinguished).&nbsp;</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">This is why Ezekiel 14:14 states that Noah was righteous enough to save himself, along with Job and Daniel who also could do so Why? If we think of them as literal people, it would make now sense. But because they are symbolic of the true individuality, the thinker, we understand we have the choice through will (the opposite of desire) to raise the soul by the spirit.</span></p><span data-dcnode-id="1514" instrument_node="">
</span><h2 data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Conclusion</span></h2><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">We started with Jesus’ statement about bringing division between the soul and spirit within the “house.” We discussed the importance of where our “thoughts” are directed, or drawn to within the house. Do they cater to the whims of desire, through the soul and external world, or earth? Or do we use will to go within and let the Holy Spirit do its work?</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">I want to explain this concept one more way in case any confusion still resides. I used the term “individuality” throughout the article. This can be confusing. The individuality I am speaking of is the same “I AM” aspect of being that God says will deliver Israel from Egypt (the lower mind). </span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">The difference between the individuality and the soul is this: the soul is the “I AM me” feeling you have. Noticed how I (originally explained by Blavatsky) attached the “me” to the I AM. This “me” is your lower nature, or soul, that is attached to the individuality which consciousness has produced through it’s dual manifestation. The soul is… (insert your name and social conditioning and heredity, etc). Remember from earlier articles that when consciousness manifests, through any body or vehicle, its expression is dual. That is why we have a higher mind and a lower mind. This “me” aspect, the lower, is all the sensations, emotions, and thoughts one can have expressed through the lower mind (which encompasses expression in your physical brain and body). When the individuality, or the thinker, uses will to uplift his or her thoughts, such as compassion, joy, contentment, selflessness, etc., the individuality begins to associate itself with the higher mind, and the strong feeling of “me” that you have begins to drop away. This is why John the Baptist (the purified moral nature) stated, “I must decrease so that He can increase.” Instead of “me” vs “other” you develop an attitude of unity with others, and express that thought and emotion through acts of virtue. This doesn’t mean the “me” vanishes, but it becomes less important, and your attitude begins to shift towards a sort of unity with everything. Judgments and strong egoic opinions or dogmatic beliefs begin to become less and less important as intuition unites with your intellect and you truly begin to understand the cause and effect behind the external world with all it’s ills. It doesn’t mean you forget or ignore it, but you becomes less identified with it, personally, and more identified with the part of you that is truly immortal and is the real, greater aspect of the self. This allows you see the true problems behind the insanity of the world and can give you true solutions and insight into how to deal with problems or ills that plague our world or even your own life.</span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Why must we go within? Because the total mind (not just the intellect) is there, and the more inward we go, the more we can explore the true mind. Many today think the mind is created in the physical brain. This is a great problem. Consciousness only expresses a very limited portion of itself through the organ we call the physical brain and body. It does not originate there, and therefore what the physical senses interpret for us through the brain, we cannot trust. It is but a tiny fraction of mind, or man. In order to gain wisdom, we must allow access to portions of the mind that draw spiritual knowledge into the soul. Through this process the Christ is also raised in the soul. </span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">I will discuss this more in future articles with more scripture. For now, blessings!</span></p><span data-dcnode-id="1496" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="1495"></div></div><footer class="entry-footer" data-dcnode-id="1472"><p class="entry-meta" data-dcnode-id="1473"><span class="entry-categories" data-dcnode-id="1475"><span data-dcnode-id="1493" instrument_node="">Filed Under: </span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/awakening" rel="category tag"><span data-dcnode-id="1492" instrument_node="">Awakening</span></a><span data-dcnode-id="1490" instrument_node="">, </span><a data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/god" rel="category tag"><span data-dcnode-id="1489" instrument_node="">God</span></a><span data-dcnode-id="1487" instrument_node="">, </span><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/literal-vs-spiritual" rel="category tag"><span data-dcnode-id="1486" instrument_node="">Literal vs Spiritual</span></a><span data-dcnode-id="1484" instrument_node="">, </span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/paul-and-mysticism" rel="category tag"><span data-dcnode-id="1483" instrument_node="">Paul and Mysticism</span></a><span data-dcnode-id="1481" instrument_node="">, </span><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/spirit-and-soul" rel="category tag"><span data-dcnode-id="1480" instrument_node="">Spirit and Soul</span></a><span data-dcnode-id="1478" instrument_node="">, </span><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/uncategorized" rel="category tag"><span data-dcnode-id="1477" instrument_node="">Uncategorized</span></a></span><span data-dcnode-id="1474" instrument_node=""> </span></p></footer></article><article class="post-4455 post type-post status-publish format-standard has-post-thumbnail category-esoteric category-the-bible-and-astrology entry" data-dcnode-id="1346" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="1453"><h1 class="entry-title" data-dcnode-id="1468" itemprop="headline"><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4455-numbers-and-the-book-of-revelation-and-zodiac.html" rel="bookmark"><span data-dcnode-id="1470" instrument_node="">Numbers and the Book of Revelation and Zodiac</span></a></h1><span data-dcnode-id="1467" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="1454"><time class="entry-time" data-dcnode-id="1465" datetime="2020-06-25T12:42:09-05:00" itemprop="datePublished"><span data-dcnode-id="1466" instrument_node="">June 25, 2020</span></time><span data-dcnode-id="1464" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="1460" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/stevecable" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="1462" itemprop="name"><span data-dcnode-id="1463" instrument_node="">Steve Cable</span></span></a></span><span data-dcnode-id="1459" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="1456"><a data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4455-numbers-and-the-book-of-revelation-and-zodiac.html%23comments"><span data-dcnode-id="1458" instrument_node="">35 Comments</span></a></span><span data-dcnode-id="1455" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="1357" itemprop="text"><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><img data-dcnode-id="1451" height="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh5.googleusercontent.com/nrsFOvHhtmbP16ctFC1km4YC1Hhs4kHdNenjKOJarccdq7Pz_2cgLt4yBKwrLZnIp0kgLXtESyYC-kv4w8xmlIrC0H25MmzuLJ_sGZ2_6nP94Xn4Ajc7xMom-28LpSFUdgRhm7m8WSfIFulrRw&amp;raw" width="572"></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Numerology is one part of the bible which flows through the whole narrative. The Book of Revelation is no exception; the number 7 appears many times in this book, along with 3.5, 9, 10,12 and 24.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">The clock-face above shows the numbers 1 to 12, each divided into 30º to make 360º. The horizontal and vertical bars have been drawn to show them aligning with 10 and 2, subtended by 11 and 1 for the horizontal bar; and 12 and 6, aligning with 8 and 4, plus 11 and 1 for the top of the vertical bar. This looks like the physical size of the cross on which Jesus was crucified. The vertical line encompasses the numbers 12 and 6, which added = 18; 1+8 = 9</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">There is a tenuous link between the lengths of the horizontal and vertical bars, namely that their lengths add up to 6, 7, 9 or 10, measuring in millimeters, when varying the diameter of the circle. This can probably be discounted as having any esoteric meaning in this instance.</span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">The number 12 in the Bible relates to the 12-signs of the Zodiac, 12-Disciples, 12-tribes of Israel and, indirectly, to the 12 pairs of cranial nerves in the brain. The 12 pairs of cranial nerves in the brain represent the 12-tribes of Israel, the 24-elders who bow down in front of the throne and the 12-Disciples. The 24-elders are numbered 4 and 20; the 4 refers to the 4 aspects of the mind and the 20 relates to the connection to the cosmos.</span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Each disciple represents a facet of human personality; James represents the higher mind and Peter displays tendencies associated with the lower or carnal mind – hence Jesus says to him in the New Testament, “Get from me, Satan,” around the time of the Last Supper.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">There are also 12 gates to the city as mentioned in the Book of Revelation; again, referring to the cranial nerves above and the tribes, 3 on each cardinal point of the compass – north, south, east and west. These also represent the 4-aspects of the mind.</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">The compass points refer to the 4- horses of the Apocalypse, which is a direct inference to the aspects of mind. The horse points out understanding of the lower or upper consciousness.</span></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">West – tribe of Ephraim – black horse – signifying the intellectual and carnal/lower mind, represented by the man (Aquarius);</span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">North – tribe of Dan – red horse – signifying the emotions, represented by the eagle (Scorpio);</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">South – tribe of Reuben – pale horse – signifying the physical/body, represented by the bull (Taurus);</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">East – tribe of Judah – white horse – signifying purity and spirit, represented by the lion (Leo)</span></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">The number 12 also refers to 12-months in the year; 12 days to Christmas, etc., also 24-hours in a day (1440-minutes, adding together = 9!)</span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">The Zodiac moves through 30º for each month of the year. Jesus was 30-years old when he began his ministry.</span></p><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">The clock-face shows that all the opposite numbers (e.g. 9 and 3) add up to 12. The vertical bar adds 12 and 6 to make 18; 1 + 8 = 9, the number of higher consciousness.</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">The number of degrees in the circle add up to 360; again, 3 + 6 + 0 = 9.</span></p><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Adding the digits of the cardinal points of the compass always adds up to 9, e.g. 292.5º (WNW), or 180º (S).</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">The number 7 relates to the 7-chakras or seals along the spine which are opened during meditation by kundalini/serpent or Holy Spirit stored in 3.5-coils at the base of the spine. The Book of Revelation states 3.5 years, 1260-days or 42-months in relation to the opening of this. This is also the basis of Pentecost when the apostles receive the Holy Spirit.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">7 also appears in the building of King Solomon’s Temple (built without hands in 7-years – a direct reference to the 7-chakras or seals), Jericho’s walls, Joseph’s multi-coloured coat and in many other narratives within the Bible.</span></p><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">This kundalini or Holy Spirit is stored in 3.5-coils at the base of the spine, as mentioned above; using the circle as a formula, 3.5 x 360º = 1260 (basically, 3.5 years). This, again, adds up to 9, the number of higher consciousness.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">The lower, carnal mind is depicted by the number 666 in the Book of Revelation; again, this adds up to 9 (6+6+6 = 18; 1+8=9).</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Interestingly, if 1260 is doubled, the result is always 9; e.g. 2,520, 5,040, 10,080, 20,160, 40,320, 80,640, 161,280, 322,560, 645,120 and 1,290,240. The number continues ad-infinitum into the billions and always adds up to 9 via 18 or 36!</span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">The number 10 appears in the Book of Revelation when the writer states that a tenth of the city was destroyed. This refers to the left-hemisphere of the brain being purged (the carnal, lower mind/intellectual side) during meditation when the kundalini hits the pineal gland and transfers over via the Red Sea of emotions, to the right-hemisphere also known as the Promised Land, or the land of milk and honey.</span></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">The milk and honey refer to the galactose which is secreted during meditation by the pineal and pituitary gland. It is a milky, sugary liquid – now we know where galaxies and milky ways come from. As above, so below, which has been mentioned in the Blog before!</span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">The milk and honey are also referred to in Exodus as the Manna from Heaven, which fell from Heaven during the Israelites’ wanderings through the desert. Wandering in the desert means being in a state of confusion, which is helped by using meditation, when the Manna flows. The Egyptian name for Manna is Manus.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">The right hemisphere of the brain is where the tribe of Judah camped (in the east), represented by Leo, the lion, as the tribe of light. there were 186,400 people in this tribe – a familiar number for the speed of light! In Greek mythology, the white horse represents Zeus; in Revelation, this is shown as Jesus Christ.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Numerology is everywhere in the Bible, and names in the Bible represent numbers, which again, have mystical meanings.</span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">For more information on the Zodiac and its relationship to Jesus, please refer to Joshua’s blogs:</span></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">“The Bible, Jesus and Zodiac” from 08.29.2012 and “Jesus as the Sun” from 09.03.2012.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">As light relief from the above, for the pilots out there, there is a correlation between runway designators. My local airport, Bournemouth in the south of England has a runway designation, west and east of 262º/082º. Again, 2+6+2 = 10; 0+8+2 = 10. This is a simple method of finding out if you have correctly identified the opposite runway (obviously 180º difference). Not many pilots realise this. The power of numbers!</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">We have the Phoenicians and Babylonians to thank for the number of 60 seconds, 60-minutes and 24-hours, which correlate and are divisible by 12!</span></p><span data-dcnode-id="1359" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="1358"></div></div><footer class="entry-footer" data-dcnode-id="1347"><p class="entry-meta" data-dcnode-id="1348"><span class="entry-categories" data-dcnode-id="1350"><span data-dcnode-id="1356" instrument_node="">Filed Under: </span><a data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/esoteric" rel="category tag"><span data-dcnode-id="1355" instrument_node="">Esoteric</span></a><span data-dcnode-id="1353" instrument_node="">, </span><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/the-bible-and-astrology" rel="category tag"><span data-dcnode-id="1352" instrument_node="">The Bible and Astrology</span></a></span><span data-dcnode-id="1349" instrument_node=""> </span></p></footer></article><article class="post-4441 post type-post status-publish format-standard has-post-thumbnail category-consciousness category-health entry" data-dcnode-id="1150" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="1328"><h1 class="entry-title" data-dcnode-id="1343" itemprop="headline"><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4441-coronavirus-ancient-secrets-of-immunity-and-health-preservation.html" rel="bookmark"><span data-dcnode-id="1345" instrument_node="">Coronavirus — Ancient Secrets of Immunity and Health Preservation</span></a></h1><span data-dcnode-id="1342" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="1329"><time class="entry-time" data-dcnode-id="1340" datetime="2020-06-20T23:58:23-05:00" itemprop="datePublished"><span data-dcnode-id="1341" instrument_node="">June 20, 2020</span></time><span data-dcnode-id="1339" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="1335" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/raymondphelan" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="1337" itemprop="name"><span data-dcnode-id="1338" instrument_node="">Raymond Phelan</span></span></a></span><span data-dcnode-id="1334" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="1331"><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4441-coronavirus-ancient-secrets-of-immunity-and-health-preservation.html%23comments"><span data-dcnode-id="1333" instrument_node="">9 Comments</span></a></span><span data-dcnode-id="1330" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="1161" itemprop="text"><span data-dcnode-id="1327" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1325"><img alt="" class="wp-image-4446" data-dcnode-id="1326" sizes="(max-width: 728px) 100vw, 728px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2020/06/sunrise-field-nature-fog-preview-1.jpg&amp;raw" srcset="http://www.spiritofthescripture.com/wp-content/uploads/2020/06/sunrise-field-nature-fog-preview-1.jpg 728w, http://www.spiritofthescripture.com/wp-content/uploads/2020/06/sunrise-field-nature-fog-preview-1-300x178.jpg 300w"></figure><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Prior to spiritual awakening, the mind is propelled by inherent subconscious thought programs. Due to the way Nature or evolution functions, we each come into this world already uploaded in natural adherence to the permanent laws of nature. No person escapes this activity which operates in the mind and body. These inherited energy patterns are what the permanent laws of nature work on in providing our individual relative life experiences.</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1320"></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">The content nature of these subconscious patterns, exists consequent of the seed standard produced in previous lives.</span></p><span data-dcnode-id="1316" instrument_node="">
