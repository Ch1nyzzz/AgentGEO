</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Based on these previously created journey-seeds, the laws of nature – laws of mind – manifest corresponding worlds to fit the paradigms of these seed patterns. Every previous seed thought which was accepted in deeper mind as true, reproduces to form our reality after birth. The laws of nature continue material manifestation of the seeds, into full bloom, until the cycle is interrupted by conscious awareness.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Because of these ignorance-based mind-sets or thought seeds, the corresponding lower intellect – as opposed to resolute intellect — has no choice but adhere faithfully and develop lifestyles and relationships around which our lives can reflect these lower-nature seed patterns, thereby repeating this level of consciousness indefinitely.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Sadly, this unwitting higher-nature ignorance is the root cause of almost every known disease or infection on the planet. Logic suggests that, at some level, this known fact must extend into the realm of the unknown or potential diseases such as the present Coronavirus pandemic. In other words, prevention is possible which is better than cure.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">In the sleeping soul state, we’re without stability, equipoise: our mental-physical equilibrium falls prey to all the laws of opposites – good-bad, love-hate, like-dislike, disease-harmony. In other words, the laws of nature fulfill ignorance-based consciousness to perfection. It does so in order to keep us bound to its authority. Because of this unwitting ‘fall from grace’ our life is lived under the spell of illusory existence — identifying solely with the uploaded birth standard of disease-consciousness and all the ramifications of addictive lifestyles. Thus perpetuating a vicious circle of finding cures for situations which could have been prevented. In other words, spiritual blindness continues in perpetuity until we raise the lower human standard to a higher standard: one established in spiritual awareness. this process is the way of gaining Pure Consciousness, the sickles state.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><h2 data-dcnode-id="1301"><strong data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Soul’s desire for evolution</span></strong></h2><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">At some point in our life, the soul’s desire for growth and evolution begins surfacing from within. When ‘suffering’ becomes too much, an inner dialogue along the lines ‘enough is enough’, ‘what can I do to escape this’. Much like biblical Paul’s flash on the road to Damascus. This flash moment of course was a flash of intuitive awareness which becomes clearly cognizable. For some this may be soon after adolescence, for others during some personal crises or an unguarded ego moment, or an unsuspecting seed of inspiration is picked up from another soul.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">In times of crises, when there’s not many options available, we become keenly sensitive and alert to life-saving guidance. These prompts equate to divine wisdom: our soul screaming for what we must do next. For further life development, this soul-listening or soul-attuning is critical.&nbsp;</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">The soul’s desire for spiritual evolution is one of those symphonic points, when that certain Que, flash or inner prompt becomes the catalyst to some outer practical action: maybe a detoxification program leading to inner freedom from addictive life patterns or some soul-destroying habits.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">But always remembering, that, freedom from the compelling laws of nature is a conscious decision.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">This is when practices like meditation and yoga start making impression-seeds in the mind, start stirring the asleep consciousness into self-inquiry awareness. In the beginning, we won’t know much about these practices, but deep down they resonate a spiritual vibration in us. This resonance is divine prompting.</span></p><span data-dcnode-id="1285" instrument_node="">
</span><h2 data-dcnode-id="1282"><strong data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Catch 22</span></strong></h2><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Now, in this context, of spiritual awakening, we’re presented with the classic conundrum or catch-22 situation. On the one hand, due to this inherited subconscious conditioning — habitual stress, fear and ignorance — while on the other, interrupting this automatic activity requires a conscious decision to breaking this soul-sleeping cycle and eventual escape from it into the awakening level.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Making this decision is akin to self-force awakening from a bad dream. Even though we’re sleeping, we just know we must escape this griping nightmare. Even in the dream, awakening calls for real effort. Herein lies the clue. We’re presented with the nightmare in order to awaken from it. Similarly, with ignorance-based life, we make the decision to awaken from its nightmare existence.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">This is the biggest effort-requiring decision we’ll ever make in our entire life. Like the dream, it calls for strength and courage. But once we commence we’ll always awaken. The difference being, the dream is a fabrication, an illusion, whereas You are real.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">And while we’re born in to this lower world of law dominance, at another level of soul, humans are encoded with immortality DNA. But, again, we must consciously choose immortality.</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Similarly, like dream awakening, once this inner journey commences, the target of immortality and Self-awareness becomes unmissable. At a certain point we’ll have developed a level of consciousness from which we will ‘know’ immortality. But, between knowing and non-knowing much shedding and inner awakening will have taken place.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Moving on.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><h2 data-dcnode-id="1260"><strong data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Re-aligning mind-body for additional immunity</span></strong></h2><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Innumerable are the laws of nature, thus we cannot align with each law separately. This is impossible. But what is possible, what is doable, is re-align the mind in such a way that there is automatic mind-body-health-harmony co-ordination with all the laws of nature simultaneously. This is how the immune system is weaponized in defending against viral attack such as Covid-19. This process of cosmic mind alignment stimulates the Thymus gland into releasing the required quota of mature antibodies or white blood cells –antigens or pathogens — into the immune system, which then travel through a now strengthened circulatory system bringing further health-infused oxygen to every part of the body.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">This approach to disease-free health presents a whole new dynamic for the ordinary person to initiate into our lives cost-free and natural.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><h2 data-dcnode-id="1250"><strong data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">The Three Gunas of Nature</span></strong></h2><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Let us now address these innumerable laws of nature by their umbrella titles. They come under what the immortal Bhagavad-Gita calls the three gunas. These three gunas are the qualities or dynamics working within each of us from birth, the laws of nature, as mentioned earlier. Gaining knowledge of guna interaction is where real spiritual schooling begins. It’s from here — from this practiced understanding — that real physical health, well-being and soul liberation establishes tangibly in consciousness.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">The three Gunas are:</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1239"><strong data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Sattva</span></strong><span data-dcnode-id="1240" instrument_node="">&nbsp;– harmony, goodness, spirituality</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1234"><strong data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Rajas</span></strong><span data-dcnode-id="1235" instrument_node="">&nbsp;– passion, activity, ambition</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1229"><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Tamas&nbsp;</span></strong><span data-dcnode-id="1230" instrument_node="">– inertia, dullness, sloth</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Collectively these three elements of nature are responsible for all creation, maintenance and dissolution. Such is how physical creation and evolution continue in perpetuity eternally.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">As we can observe, each guna has a particular quality or nature. And at certain stages in our life, one of these qualities may be the dominant guna, or any pair of gunas interacting with each other. In other words, we can be feeling blissfully happy one day and next day the reverse – the gunas compete for dominance over our free will. Bhagavad-Gita refers to this alternating activity as the gunas acting upon gunas. This is why we don’t get attached even to Sattva standard because it too is binding. But, what is constant and non-binding is Pure Sattva. This state represents soul liberation which is gained through regular meditation.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">And while all three gunas are present simultaneously in mind-body, the Higher Self or Soul, being transcendental lies beyond the gunas, beyond aging and decaying. Therein lies THE secret of perfect health. The transcendental state of unruffled calm is truly the dormant miracle awaiting a consciousness through which to reflect. We can each be that Prism of consciousness.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">The human soul sets out in life from the tamas-rajas level. Later, raja guna spurs us warrior-like to explore the treasure troves of the material world, possessions and artificial happiness. Later again, through maturity — or burnout — we discover that the material possessions and artificial happiness are not providing that innately sought-after ‘something’. That sub-terrain quality of inner space, peace and happiness, or, Pure Sattva. This Pure Sattva state can exist alongside the chaotic world activity. We don’t have to self-isolate in a cave or monastery. No, we live normal lives in whichever societal culture we’re born into.</span></p><span data-dcnode-id="1216" instrument_node="">
</span><h2 data-dcnode-id="1213"><strong data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Guiding Scriptures to Bliss-consciousness&nbsp;</span></strong></h2><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Here are some wonderful scriptures, each expressing exactly the same message of health, peace and liberation:</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">The Bible states: Jesus said, “First seek ye the kingdom of heaven (Perfection) and all else shall be added” (added unto consciousness.)</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Then, in the immortal five thousand years old Bhagavad-Gita, chapter two verse 45, Lord Krishna states: “Be without the three gunas, O Arjuna, freed from duality” meaning, freed from rule of opposites, the laws of nature.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">These two pivotal scriptures are both presenting the same means of gaining contact with the Transcendent Divine Principle latent within all humans, regardless of our culture.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Again, Jesus said: “My kingdom is not of this world” meaning, that, Pure Coconsciousness is not of time space and causation, or, this world.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">And, “the kingdom of God is within” — referring to divine potential within consciousness, which Potential, when realized, is Pure Consciousness, Pure Sattva. Also termed Bliss-Consciousness or Cosmic-Consciousness.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><h2 data-dcnode-id="1191"><strong data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Transcending the Gunas and uploading disease-free health</span></strong></h2><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Negative thought entanglement is what keeps the mind and body trapped in perpetual suffering. Transcendence, on the other hand, is what frees the mind-body from thought entanglement interaction.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Thus the art of disentanglement from subconscious mind-sets, particularly regards health, is through transcendence. Transcendence is already Perfect, already Pure Awareness. No worldly ailment can exist here. Nothing of this world can gain access into Pure Consciousness, thus the need of inner transformation. This is where inner silence and utter mental surrender comes in.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">The purpose of the three gunas of Nature therefore is to keep each human soul bound to thought entanglement, bound to its authority in the area of ‘world’ existence. Thus THE goal of life for each soul is to transcend the laws of nature, transcend beyond ‘the world’ of the three gunas. There is no higher spiritual achievement than this act of personal transcendence.</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">And because we have risen above time, space and causation, in transcendence there is no aging or decaying of the cellular body for the duration of the meditation session –we’re establishing conscious immortality awareness.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">After gaining pure transcendental consciousness, the mind, post meditation, retains a certain level of transcendental bliss nature until our next meditation. Twice daily meditation is imperative in making transcendental consciousness a permanent state. At this level,&nbsp;we don’t take sides with the gunas nor do we react to their inter-functioning. Self-Bliss Awareness is now experienced as separate from the activity of the world.</span></p><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Bhagavad-Gita, chapter six, verses 10-15, sets out the simple method of meditation, leading to transcendence, and how to practice it.</span></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">This meditation practice is surely the secret to having a strong nervous system and, more vitally, optimizing the activities of the immune system for our total health benefit, particularly release of white blood cells, or T-cells, from the Thymus gland. These are the warriors which defend the mind-body against any foreign invaders entering into it.&nbsp;This is how the whole mind-body-cellular-molecular structure is made permanently harmonious and blissfully healthy.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1166"><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/s%3Fk%3Dthe%2Babsolute%2Bsecret%2Bby%2Braymond%2Bphelan%26ref%3Dnb_sb_noss"><span data-dcnode-id="1168" instrument_node="">https://www.amazon.com/s?k=the+absolute+secret+by+raymond+phelan&amp;ref=nb_sb_noss</span></a></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1164"></p><span data-dcnode-id="1163" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="1162"></div></div><footer class="entry-footer" data-dcnode-id="1151"><p class="entry-meta" data-dcnode-id="1152"><span class="entry-categories" data-dcnode-id="1154"><span data-dcnode-id="1160" instrument_node="">Filed Under: </span><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/consciousness" rel="category tag"><span data-dcnode-id="1159" instrument_node="">Consciousness</span></a><span data-dcnode-id="1157" instrument_node="">, </span><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/health" rel="category tag"><span data-dcnode-id="1156" instrument_node="">Health</span></a></span><span data-dcnode-id="1153" instrument_node=""> </span></p></footer></article><article class="post-4430 post type-post status-publish format-standard has-post-thumbnail category-awakening category-consciousness category-creation-and-the-bible category-ego category-god entry" data-dcnode-id="639" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="1132"><h1 class="entry-title" data-dcnode-id="1147" itemprop="headline"><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4430-the-nature-of-god-2.html" rel="bookmark"><span data-dcnode-id="1149" instrument_node="">The Nature of God</span></a></h1><span data-dcnode-id="1146" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="1133"><time class="entry-time" data-dcnode-id="1144" datetime="2020-06-18T20:52:03-05:00" itemprop="datePublished"><span data-dcnode-id="1145" instrument_node="">June 18, 2020</span></time><span data-dcnode-id="1143" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="1139" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/annyvos" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="1141" itemprop="name"><span data-dcnode-id="1142" instrument_node="">Anny Vos</span></span></a></span><span data-dcnode-id="1138" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="1135"><a data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4430-the-nature-of-god-2.html%23comments"><span data-dcnode-id="1137" instrument_node="">40 Comments</span></a></span><span data-dcnode-id="1134" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="659" itemprop="text"><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1130"></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1128" instrument_node="">During the last seven years or so I already wrote two articles about God, each coming from a different viewpoint. I also gave a comment about this subject to Joshua’s article What is God to you? of May 6</span><sup data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">th</span></sup><span data-dcnode-id="1125" instrument_node="">, 2018, which approached the subject from another viewpoint again, but not all comments are read, let alone remembered, by everyone. That is why I decided to quote it in this article, with a few small additions.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">“I believe that there is no one definition to define God. If I had to choose a word it would be Everything. There just is not anything that is not God manifesting on one of the multitudinous vibrationary frequencies. In the lowest frequencies that would be without much, if any, conscious awareness, but still a manifestation of God. We cannot get away from God however we might try as we are a part of God. In our case with a very much diminished awareness as we put on a blindfold so to speak before we entered into this physical body in order to have certain experiences. </span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">What fun is playing a game if you know all the best possibilities and the answers to all the questions already? The fun is in finding out and inventing new possibilities for ourselves. We do have all the potentials of God in us, even though they have not all been activated yet. </span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">I think you can see us (humans, animals, plants, minerals, cells, atoms, quanta, planets, stars, galaxies, universes a.s.o.) as points of focus of attention for God. Each of us is a cell or an atom in a greater universe and is a universe to smaller entities. God as the highest entity of all is encompassing all of us and perceiving and experiencing through us. As we are experiencing through our organs and cells and atoms and maybe are ‘god’ to them. </span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">There is no God that is separate from us but when you consider us to be the focal points in the feet of God (using the metaphor of a human body), as we live in the lowest and densest frequency vibrations, and the focal point that encompasses all is the brain, you can also imagine communication between the feet and the brain in order to make them function. </span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">So while there is no God outside us because we are in God and God is in us, we still may want to experience communication and therefore pretend that God is outside of us. </span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">The fact is that we cannot possibly understand how things are in Reality with a capital R as long as we are still wearing this blindfold. We are waking up though because we are now at least aware of the fact that we are wearing a blindfold and that this world is nothing but an illusion.</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">So maybe we should stop arguing about what really happened in whatever time and whatever place, because none of that is real anyway, except the Love and Conscious Awareness we gained from whatever happened in the world we created.”</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">………………………………………………</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Today I want to focus first and foremost on the unconditional love and unity of God, which I also already mentioned many times in my articles and comments but which was explained so much more beautifully and completely by rabbi Zvi Ish-Shalom in the video of which you find the link here, and which I advise you to watch first, before reading the rest of this article:</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1093"><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DEudhz0ylnW4"><span data-dcnode-id="1095" instrument_node="">https://www.youtube.com/watch?v=Eudhz0ylnW4</span></a></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1091" instrument_node="">Personally I enjoyed this video very much, not only because it addressed so many things that I knew already, and had actually written about often as well because Hebrew numerology is at the basis of almost all my articles, but because there were so many new aspects as well. </span><br data-dcnode-id="1090"></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1087" instrument_node="">I did not discover this meaning of the Name </span><em data-dcnode-id="1084"><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">YHWH</span></strong></em><span data-dcnode-id="1083" instrument_node=""> because of any Bible texts in the way Zvi described but very prosaically by just doing the math. The fact that the numerical value of </span><strong data-dcnode-id="1080"><em data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">YHWH</span></em></strong><span data-dcnode-id="1079" instrument_node="">, 26, equals 13 + 13 (</span><strong data-dcnode-id="1076"><em data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">echad</span></em></strong><span data-dcnode-id="1075" instrument_node=""> + </span><strong data-dcnode-id="1072"><em data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">ahava</span></em></strong><span data-dcnode-id="1071" instrument_node="">) was immediately obvious to me, maybe because thirteen has always been my favorite number since I had a Near Death experience at the age of thirteen, in which I experienced this unconditional love myself. A love of a frequency that is far too high to be experienced as long as we still reside in our physical bodies. That is why I made this theme to the centre of attention of many of my articles.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1068" instrument_node="">Slowly it started to occur to me though that this principle is not only the Name of God, and the nature of </span><em data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">His /Her/ It’s</span></em><span data-dcnode-id="1065" instrument_node=""> being but also of </span><em data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">ours</span></em><span data-dcnode-id="1062" instrument_node=""> as we (everything from quarks to universes and beyond), is an expression of God’s being. God is experiencing Himself (to keep it short) through all of us, as we are all sparks of the Fire that is God, another Name, who temporarily descended into the so-called world of matter (which is described as a dream or deep sleep, </span><strong data-dcnode-id="1059"><em data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">tardema</span></em></strong><span data-dcnode-id="1058" instrument_node="">, in Genesis) in order to gain conscious awareness there by also experiencing the opposite of light, of love etc. in order to learn in this way what these and all other concepts really mean. All this has taken us a very long ‘time’ (within the concept of space and time), and many lives (within the concept of reincarnation) in order to come to the point where we finally recognize this process for what it is, and the fact that the essence of God is in effect our essence also.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">………………………………………</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">So our task in this life on earth and in duality is to learn to express this essence of our being, this unconditional love and also this unity (in diversity) in our own daily lives. </span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">It means also to recognize and acknowledge that all major world religions in their essence are all about the same thing: unconditional love and unity in diversity, and that there is no one religion that solely is in possession of the truth whereas all others somehow got it wrong. And it means that we will have to cooperate with each other to reach this goal together. In a practical sense of course by practicing this unconditional love wherever we can. And by discarding automatic distrust of everyone who looks differently, or is of another race, country or religion, in order to reach this unity in diversity together. </span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">…………………………………………..</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">I am not going to explain every detail of Zvi’s video – he did that better than I ever could – but I do want to focus on one or two of the details. </span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1026"><strong data-dcnode-id="1038"><em data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Elohim</span></em></strong><span data-dcnode-id="1037" instrument_node="">, numerical value </span><strong data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">86</span></strong><span data-dcnode-id="1034" instrument_node="">, equals </span><strong data-dcnode-id="1031"><em data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">ha teva</span></em></strong><span data-dcnode-id="1030" instrument_node="">, (the) nature, with also a numerical value of </span><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">86</span></strong><span data-dcnode-id="1027" instrument_node="">. The formless is the form. Spirit, the formless, has another, higher, vibrational frequency than matter, the form. So by entering the ‘mater’ial world in order to have experiences there in the form of all (life) forms in it God is lowering His vibration. </span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1020"><strong data-dcnode-id="1022"><em data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Mater</span></em></strong><span data-dcnode-id="1021" instrument_node=""> is the Latin word for mother, so matter is mother stuff. Our material world is the feminine / mother side of God, and therefore Goddess or Divine Mother, of which we in our incarnated self are a part. So if you want to see God: look in the mirror, and remember with what purpose you came to this world: to bring unconditional love and unity in diversity back to her, as that is the phase we now have reached in our cycle of development.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1018" instrument_node="">The title of this article is the Nature of God, and of course I meant something like the essence of God with this term. But nature as </span><strong data-dcnode-id="1015"><em data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">ha teva</span></em></strong><span data-dcnode-id="1014" instrument_node="">, in the literal sense now proves to be also an aspect, a side, of God. And what a beautiful aspect it is. &nbsp;</span><br data-dcnode-id="1013"></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="1010" instrument_node="">With the term </span><strong data-dcnode-id="1007"><em data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">ha teva</span></em></strong><span data-dcnode-id="1006" instrument_node=""> I was immediately reminded of </span><strong data-dcnode-id="1003"><em data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Haganat ha teva</span></em></strong><span data-dcnode-id="1002" instrument_node="">, the society for the protection of nature in Israel, which used to organize all sorts of beautiful trips into nature during the time that I lived there during the last century. Maybe they still do. I was also reminded again of the beautiful flowers in spring, and the beauty of the deserts – the Negev, where my husband used to live for a few years before we met, and the Sinai – among other things. There nature shows itself in a most majestic way and can really be experienced as divine. Of course the Sinai belongs to Egypt again these days but when I lived in Israel it still belonged to Israel and it was not yet spoilt with asphalt roads and tourist accommodations, as so many areas of nature are these days. I went there for an eight-day trip with a group of people from our village, under the guidance of </span><strong data-dcnode-id="999"><em data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Haganat ha teva</span></em></strong><span data-dcnode-id="998" instrument_node="">, in May 1973 and never forgot the experience. I did get some understanding for the grumbling of the people of Israel who had to track through it for forty years though. I would probably have started to grumble much sooner than they did for beautiful though the desert may be, it is also barren and not for the life of me would I have wanted to wander through there for such a  long time.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Mother Nature (God) shows both a beautiful and majestic side and a grim one in regions like deserts and mountains and (stormy) seas but also a soft and loving one in flowers, budding and flowering trees and young living beings and the like. The nature of the Mother really is awe-inspiring and inviting unconditional love. &nbsp;</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">………………………………………..</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">My desert experience in 1973 was awe-inspiring but so was the experience of the Yom Kippur war half a year later. As our Christian village had been started in order for Christians to be solidary with the Jewish people after almost 2000 years of discrimination, persecution and murder of Jews by Christians, this village was intentioned to be non-missionary and the purpose originally was just to assist the – in the beginning still young – state of Israel by getting to know the people – all the peoples – and by starting and assisting enterprises that would support the economy. We would have to learn to listen to the Jews for a change instead of foisting our religious views upon them. It also meant to be solidary with the Jewish people in the case of an attack by other countries. So running away was not an option when this war suddenly came upon us. This placed us in a very special position in which we had to adjust to the situation as it was – we were very near the northern front – and somehow that put us in some sort of bubble in which we lost all fear and experienced the Presence of God very clearly in a way I cannot really describe. It was definitely Love. </span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">There were miracles too, one of which I already mentioned in my article about miracles, but here is another one. Of course we were very much focused on the news and I remember one occasion where I was listening very intently to the radio in order to find out where the attacking forces were exactly, and taking it all in, until I suddenly realized that I was listening to a Hebrew broadcast, and I did not know any Hebrew to speak of yet. Up till then there had been no time to attend any Hebrew classes as there was too much work to be done. As soon as I realized that the broadcast was all in Hebrew, it became unintelligible to me. Sort of like Peter sinking into the water of the Lake of Tiberias as soon as he realized what he was doing by stepping out of the boat in order to walk to Jesus over the water.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Another aspect of that war was the fact that it had meant so much to the people around us that all of us had stayed with them during that war, as one of the survivors of the concentration camps of the Second World War told us when we visited them later after the war. We had not been able to do anything at all to help anybody during that time but purely the fact that we were there had been of some comfort to them. It gave them a feeling of not being deserted by everyone in their hour of greatest danger again.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Something comparable happened many years later in Vietnam, in 2008, when we were there to celebrate the wedding of our second son to a Vietnamese girl. One of the uncles of my daughter in law had been with the Vietcong during the Vietnam war and had been terribly wounded; he had lost an arm and an eye during that time and had many internal wounds as well. Of course this had a great impact on his attitude towards people coming from western countries. Since the end of that war in 1975, when my son was not even born yet, he had refused to meet any person from the west but now he was more or less forced to meet with us. He took a seat at the table right across from our seats and immediately wanted to know what we thought about the fact that our son had just married a Vietnamese girl. He obviously expected that we would not really welcome a Vietnamese daughter in law but was pleasantly surprised that we did not show any objections to the marriage. And then he pointed at our youngest son, who sat beside us, and asked what we would think of it when he too would want to marry a Vietnamese girl (and indeed, in the few days we had been in Vietnam he had already managed to fall in love with one and he is married to her now!). We told him that that would be perfectly fine with us and with that statement a huge weight of distrust and maybe even hatred seemed to fall off him and he became a changed person, totally accepting us. We did not do anything, we only were there in a positive state of being and that made all the difference.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Being is the essence of what it is all about, being unconditional love and being willing to be part of a unity in diversity. </span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">………………………………………….</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="971" instrument_node="">This interlude about the second meaning of the nature of God and what followed sort of interrupted my explanation about the term </span><strong data-dcnode-id="968"><em data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Elohim</span></em></strong><span data-dcnode-id="967" instrument_node=""> but there is a second form of </span><strong data-dcnode-id="964"><em data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Elohim</span></em></strong><span data-dcnode-id="963" instrument_node="">, which Zvi did not mention within the context of his presentation. </span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="960" instrument_node="">The first form of </span><strong data-dcnode-id="957"><em data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Elohim</span></em></strong><span data-dcnode-id="956" instrument_node=""> means God – or really Gods because it is a plural form – but these Gods are a unity and act as one, which becomes clear in the form of the verbs which are used, that is, the singular form. We find that to begin with in the creation story where already in the first sentence it is written </span><strong data-dcnode-id="953"><em data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Bereshit bara Elohim et ha shamayim we et ha arets</span></em></strong><span data-dcnode-id="952" instrument_node="">: In the beginning created </span><strong data-dcnode-id="949"><em data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Elohim</span></em></strong><span data-dcnode-id="948" instrument_node=""> the heavens and the earth. The verb created,</span><strong data-dcnode-id="945"><em data-dcnode-id="946"><span data-dcnode-id="947" instrument_node=""> bara</span></em></strong><span data-dcnode-id="944" instrument_node="">, is singular. And so are the verbs used in the following verses.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="941" instrument_node="">However, there are also other </span><strong data-dcnode-id="938"><em data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Elohim</span></em></strong><span data-dcnode-id="937" instrument_node="">; gods which are idols. They each point in a different way and they create chaos instead of order, hatred instead of love. In their case an accompanying verb is in plural, which I have however never seen explained anywhere by anyone. </span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="934" instrument_node="">An example of these idols can be found in the time that the people of Israel are asking Aaron to make gods for them in order to lead them to the Promised Land because Moses took a long time to return to the people from the top of the mountain where he received the Ten Words from God. In Exodus 32:1 it is written: </span><strong data-dcnode-id="931"><em data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Ase lanu </span></em></strong><strong data-dcnode-id="928"><em data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Elohim asher </span></em></strong><strong data-dcnode-id="925"><em data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">yeelchu</span></em></strong><strong data-dcnode-id="922"><em data-dcnode-id="923"><span data-dcnode-id="924" instrument_node=""> lefanenu</span></em></strong><span data-dcnode-id="921" instrument_node="">, Make gods for us that will go before us. </span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="918" instrument_node="">In that sentence the plural form </span><strong data-dcnode-id="915"><em data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">yeelchu</span></em></strong><span data-dcnode-id="914" instrument_node=""> – they will go – was used, so they really asked for gods who would lead them back to slavery because that is the only destination such gods can lead us to. </span><br data-dcnode-id="913"><br data-dcnode-id="912"></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="909" instrument_node="">That is also a lesson for us because the reason why the people asked for such gods must have been that they did not have enough trust in the God who had delivered them from </span><strong data-dcnode-id="906"><em data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Mitsrayim</span></em></strong><span data-dcnode-id="905" instrument_node="">, the world of duality, the world of slavery. They had not expected that the journey to a Promised Land would be a journey through a desert, through challenges and uncertainties, a journey during which they would have to learn to take decisions themselves again, and to face an uncertain future for the time being. They had not expected that the journey would take a long time, ‘forty’ years. Forty is the character </span><strong data-dcnode-id="902"><em data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Mem</span></em></strong><span data-dcnode-id="901" instrument_node="">, which as a word means </span><strong data-dcnode-id="898"><em data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">mayim</span></em></strong><span data-dcnode-id="897" instrument_node="">, water, and as such also is a symbol for ego and emotions. They would have to learn to deal with all that in the desert during those ‘forty’ years.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">……………………………………..</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Doesn’t that sound familiar to us in the circumstances we are in now? It has been more than clear that the actions of humanity have taken the earth to the cutting edge of where she can go and now we face a very uncertain future if we do not turn around immediately and start behaving in a very different fashion, towards the earth, towards all creatures that inhabit the earth and also towards ourselves so that we finally will be able to face a future again in which unconditional love reigns over all and where we all will have become a unity in diversity which lives together as one and which expresses all the qualities of the God we could never find when we were looking in all the wrong places and going into all the wrong directions. </span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="888" instrument_node="">This journey may lead us over difficult roads, which at times seem unsurmountable. But we have to go this road if we want to reach the Promised Land, </span><strong data-dcnode-id="885"><em data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Kana’an</span></em></strong><span data-dcnode-id="884" instrument_node="">, which has the numerical value of </span><strong data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">190</span></strong><span data-dcnode-id="881" instrument_node="">, whereas the numerical value of Egypt, </span><strong data-dcnode-id="878"><em data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Mitsrayim</span></em></strong><span data-dcnode-id="877" instrument_node="">, the land of slavery, is </span><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">380</span></strong><span data-dcnode-id="874" instrument_node="">. Symbolically this translates as the Promised Land being the world of oneness, of unity in diversity, as opposed to the slavery of Egypt in the world of duality.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="871" instrument_node="">The way out of this world of slavery and through the desert of uncertainty is shown to us by Jesus. No, not the person who was born some 2000 years ago, who came to deliver us from our sins, who was </span><em data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">The</span></em><span data-dcnode-id="868" instrument_node=""> Son of God. That has become the doctrine of Christianity, a faulty doctrine in my view. I believe that Jesus was and is </span><em data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">A</span></em><span data-dcnode-id="865" instrument_node=""> Son of God and at that time came to show us that we are as well. He came to show us the way how to accomplish what he accomplished.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Jesus in the Bible is a symbol and a process; a way back to unconditional love and unity in diversity and a road which we will have to go ourselves. Nobody else can do it for us. Jesus the person may have been the one who came to show all of us this way. A way which has nothing to do with Christianity or any other religion as such, although of course the followers of each of those religions are invited to walk this road as well.</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="859" instrument_node="">The Hebrew name of Jesus is </span><strong data-dcnode-id="856"><em data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Yeshua</span></em></strong><span data-dcnode-id="855" instrument_node="">, and </span><strong data-dcnode-id="852"><em data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">yeshua</span></em></strong><span data-dcnode-id="851" instrument_node=""> is a word as well. It means help, rescue, salvation. Our way to salvation is the way of the cross, the crucifixion of the ego and the birth of the Christ Consciousness after that, which I described extensively in the articles in the links below:</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">http://www.spiritofthescripture.com/id3124-an-esoteric-interpretation-of-the-crucifixion-of-jesus.html</span><br data-dcnode-id="847"><br data-dcnode-id="846"><span data-dcnode-id="845" instrument_node="">http://www.spiritofthescripture.com/id3450-the-birth-of-the-christ.html</span></p><span data-dcnode-id="843" instrument_node="">

</span><p data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">There remains one other image of God to explain and that image is that of God as the Father. My view on that can be found in my article </span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id3859-3859.html" is="qowt-hyperlink" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="704" instrument_node="">The Other Son</span></a><span data-dcnode-id="702" instrument_node=""> , which shows God as an unconditionally loving Father who accepts all His children in all of their diversity.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">……………………………</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">For those of you who want to get a complete overview of how I have come to view the concept of God I provide you here with the links to the two previous articles I wrote about this concept.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="691"><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id2231-does-god-exist-is-there-consciousness-outside-of-the-body-or-life-after-death.html" is="qowt-hyperlink" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="693" instrument_node="">Does God exist? Is there consciousness outside of the body, or life after death?</span></a></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="686"><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id3977-what-if-the-purpose-of-creation-is-the-evolution-of-god.html" is="qowt-hyperlink" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="689" instrument_node="">What if the purpose of Creation is the Evolution of God?</span></a><br data-dcnode-id="687"></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">……………………………….</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="681" instrument_node="">I invite each of you to seriously consider what I presented you with in all this material and to comment on it if you feel like that. I hope to be able to reply to your comments but the fact of the matter – and the reason why I have not been writing any articles at all during the last eighteen (18! The number of </span><strong data-dcnode-id="678"><em data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">chai</span></em></strong><span data-dcnode-id="677" instrument_node="">, life) months is that I have been and still am ill, and that writing anything at all takes a lot of energy, of which I still have preciously little these days. Besides that my eldest son has been diagnosed with incurable cancer in 2018 and our youngest suddenly became ill a few days ago with symptoms that may point to the corona virus. Today he was finally tested but the result of the test he will not get for another two days. His wife is having a very difficult pregnancy and is not able to do anything herself most of the time. Our grandson has immediately been put into quarantine again and spends a lot of the time at our house, while my husband is helping out at theirs as well. So when my son will prove to be infected, my husband and I will probably be as well. And what that means to me in my condition is anyone’s guess. But it certainly made me go much deeper in writing this article.</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">The need of the present circumstances of the world during this hectic period  and our own condition suddenly urged me to write this article and gave me the inspiration and the strength for it as it obviously is something we have to become aware of right now. </span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">I hope to be able to reply to your comments but I cannot guarantee that I will be physically up to it so if you do not hear from me, you now know the reason.</span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="668" instrument_node="">Unconditional love and unity in diversity really is the centre that everything revolves around. It is the nature of God. It is the task for all of us. And it is the essence of our being. Jesus already told us so when he told us that we are gods.</span><br data-dcnode-id="667"><br data-dcnode-id="666"><br data-dcnode-id="665"></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="662"></p><span data-dcnode-id="661" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="660"></div></div><footer class="entry-footer" data-dcnode-id="640"><p class="entry-meta" data-dcnode-id="641"><span class="entry-categories" data-dcnode-id="643"><span data-dcnode-id="658" instrument_node="">Filed Under: </span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/awakening" rel="category tag"><span data-dcnode-id="657" instrument_node="">Awakening</span></a><span data-dcnode-id="655" instrument_node="">, </span><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/consciousness" rel="category tag"><span data-dcnode-id="654" instrument_node="">Consciousness</span></a><span data-dcnode-id="652" instrument_node="">, </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/creation-and-the-bible" rel="category tag"><span data-dcnode-id="651" instrument_node="">Creation and the Bible</span></a><span data-dcnode-id="649" instrument_node="">, </span><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/ego" rel="category tag"><span data-dcnode-id="648" instrument_node="">Ego</span></a><span data-dcnode-id="646" instrument_node="">, </span><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/god" rel="category tag"><span data-dcnode-id="645" instrument_node="">God</span></a></span><span data-dcnode-id="642" instrument_node=""> </span></p></footer></article><div class="archive-pagination pagination" data-dcnode-id="606"><ul data-dcnode-id="607"><li aria-label="Current page" class="active" data-dcnode-id="634"><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?i
