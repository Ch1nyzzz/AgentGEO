r.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4595-reincarnation.html" rel="bookmark"><span data-dcnode-id="3213" instrument_node="">Reincarnation</span></a></h1><span data-dcnode-id="3210" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="3197"><time class="entry-time" data-dcnode-id="3208" datetime="2020-11-21T20:31:24-05:00" itemprop="datePublished"><span data-dcnode-id="3209" instrument_node="">November 21, 2020</span></time><span data-dcnode-id="3207" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="3203" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/stephen-campana" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="3205" itemprop="name"><span data-dcnode-id="3206" instrument_node="">Stephen Campana</span></span></a></span><span data-dcnode-id="3202" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="3199"><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4595-reincarnation.html%23comments"><span data-dcnode-id="3201" instrument_node="">12 Comments</span></a></span><span data-dcnode-id="3198" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="3036" itemprop="text"><span data-dcnode-id="3195" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3193"><img alt="" class="wp-image-4604" data-dcnode-id="3194" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2020/11/pexels-photo-5135104-1-1024x682.jpeg&amp;raw" srcset="http://www.spiritofthescripture.com/wp-content/uploads/2020/11/pexels-photo-5135104-1-1024x682.jpeg 1024w, http://www.spiritofthescripture.com/wp-content/uploads/2020/11/pexels-photo-5135104-1-300x200.jpeg 300w, http://www.spiritofthescripture.com/wp-content/uploads/2020/11/pexels-photo-5135104-1-768x512.jpeg 768w, http://www.spiritofthescripture.com/wp-content/uploads/2020/11/pexels-photo-5135104-1-1536x1024.jpeg 1536w, http://www.spiritofthescripture.com/wp-content/uploads/2020/11/pexels-photo-5135104-1.jpeg 1880w"></figure><span data-dcnode-id="3192" instrument_node="">
</span><p data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Below is a guest post from Stephen Campana. I thought it was very well written and the SOS community would benefit from some of the ideas proposed below. Thanks Stephen. </span></p><span data-dcnode-id="3189" instrument_node="">
</span><p data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">———————————————————————————————————–</span></p><span data-dcnode-id="3186" instrument_node="">
</span><p data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">“The problem of life [for many] is that Man, with his limited wisdom, cannot discern any overall purpose running consistently through life’s experiences . . . he is overwhelmed with the meaninglessness of human existence as he sees it.” He further believes that “the tragedy of life is heightened by the intense realization that the problem of existence must be answered within the brief span between birth and death . . . [and] “the problem of death . . . hangs like a dark shadow . . .”</span></p><span data-dcnode-id="3183" instrument_node="">
</span><p data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">Bernhard W. Anderson</span></p><span data-dcnode-id="3180" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">In this article I will be discussing the possibility that reincarnation figures heavily into God’s plan of salvation. I know this is controversial. I know it poses some scriptural and philosophical problems. The question is: Does it create more problems than it solves or solve more problems than it creates? I am going to try to make the case that the latter is true.</span></p><span data-dcnode-id="3177" instrument_node="">
</span><h3 data-dcnode-id="3174"><strong data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">What About Those Who Never Heard?</span></strong></h3><span data-dcnode-id="3173" instrument_node="">
</span><p data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">One of the biggest problems of the orthodox system is the question of what becomes of those who die without ever hearing the gospel.</span></p><span data-dcnode-id="3170" instrument_node="">
</span><p data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">The answer usually given to this problem is something like this: God is a fair judge; He knows all people are given the same opportunity in their lives, and He will factor this into their judgment. In other words, He will judge each of us by the amount of light we are given.</span></p><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">This sounds reasonable enough as far as it goes. The problem is that it doesn’t go very far. Truth is, there are some far reaching implications to the idea that not all men receive the truth in their life, or that they can be saved without receiving – and responding – to it.</span></p><span data-dcnode-id="3164" instrument_node="">
</span><p data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">Let’s start with a very simple question: What is the purpose of a human life? Well, the orthodox Christian presumably would agree that the purpose of life is to be conformed into the image of Christ. It would also presumably agree that this requires certain conditions: A person should hear the gospel, confess Christ as Savior, live out his principles, and be refined by trials into a being more closely resembling Jesus. But surely the very first of these conditions cannot be met in the case of one who never hears the gospel. And yet orthodoxy proclaims that such a person can still be saved. They are saved by responding adequately to the light they are given. So, why, I must ask, does God devise a plan whereby the vast majority of men are saved without any reference to purpose for which we are supposedly created? Isn’t that a bit strange?</span></p><span data-dcnode-id="3161" instrument_node="">
</span><p data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">Moreover, is it not a tacit admission that Light, perhaps even saving light, can be given to man apart from adherence to the Christian religious system; so that the Muslim who responds to the light given him can be saved, and likewise the Hindu, the Buddhist, the Jew, and so on? What does this line of reasoning say about the importance of the gospel? It makes it superfluous.</span></p><span data-dcnode-id="3158" instrument_node="">
</span><h3 data-dcnode-id="3155"><strong data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">Postmortem Conversion by an Encounter With Christ</span></strong></h3><span data-dcnode-id="3154" instrument_node="">
</span><p data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">Some Christians agree with the points I have just made but propose a different solution to the problem. They contend that at some point after the resurrection, all men, either on earth or in the spiritual realm, will hear the gospel and have a chance to respond. I will admit that this is a better solution than the first, but those who propose it are always short on the details.</span></p><span data-dcnode-id="3151" instrument_node="">
</span><p data-dcnode-id="3146"><span data-dcnode-id="3150" instrument_node="">What about the refinement process? The trials and tribulations? Being conformed to Christ’s image? The need for faith? How might those things work for someone who has already been resurrected and knows for a fact that Christ is the Savior of the world? What’s left at that point but a confession of faith? Nothing, one might respond, and nothing else is needed, for we are saved by faith alone. Once again, that’s a good answer as far as it goes, but once again, it doesn’t go far enough. What does it say about the importance of being conformed to the image of Christ, of growing through trials and tribulations, of being shaped into a greater spiritual being by the Master Potter? Presumably, none of that really matters much at all, for most people are saved without any of it. Indeed, in the case of one who dies as an infant and is resurrected to stand before Christ and confess Him unto salvation, he has never learned a thing about Christ; his first experience of Him—perhaps his first experience of anything—is that of salvation from a condition he never knew about in the first place! He was, for all practical purposes, </span><em data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">born</span></em><span data-dcnode-id="3147" instrument_node=""> in heaven. So, what was the point of his brief life? Did it have any? And if not—if he must live long ages into eternity knowing he never had an opportunity to grow, to learn, to triumph, to overcome, as did many of his brothers and sisters in heaven—would he not resent it? Why would God arrange for this soul, who is His precious creation, whose worth is inestimable, to be denied the experiences that characterize a child of God? The idea is made even more troublesome when we consider the fact that even Christ learned and grew by the things He suffered (Heb. 5:8).</span></p><span data-dcnode-id="3145" instrument_node="">
</span><h3 data-dcnode-id="3142"><strong data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">Whose Getting Saved Here Anyway?</span></strong></h3><span data-dcnode-id="3141" instrument_node="">
</span><p data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">But there’s still a deeper problem for the infant resurrected to immediate salvation. Presumably, he must be resurrected in such a form as to be able to understand God and salvation. In other words, he must be resurrected as an adult, which is to say, for all practical purposes, he is no longer the same person who died. At this point, the difference between resurrection and reincarnation is at best negligible, and at worst a matter of word play. Why not rather see the deceased infant reincarnated and saved in another life, where he is not denied all the essential elements of salvation save the act of confession?</span></p><span data-dcnode-id="3138" instrument_node="">
</span><h3 data-dcnode-id="3135"><strong data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">Postmortem Conversion by Refinement</span></strong></h3><span data-dcnode-id="3134" instrument_node="">
</span><p data-dcnode-id="3129"><span data-dcnode-id="3133" instrument_node="">But I digress. Back to the issue of refinement. Many who believe in postmortem salvation would propose that no-one, children or otherwise, is saved except </span><em data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">through fire</span></em><span data-dcnode-id="3130" instrument_node="">. In other words, they do not confess simply because their postmortem encounter with Christ is so profound and so undeniable that confession is virtually assured. Instead, they encounter in the next world a set of conditions that allow for growth, refinement, and maturing in faith in much the same manner as one encounters in this world. Those who propose this scenario usually offer one of three possibilities: another society, perhaps on earth during the millennial kingdom, or perhaps in the spiritual realm; a one-on-one encounter; or hell. I will take them in order and show why I believe each of them to be improbable as means of postmortem conversion.</span></p><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3124"><strong data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">Another Society:</span></strong><span data-dcnode-id="3125" instrument_node=""> The Bible Students (also known as Christadelphians) believe that all people will be resurrected to live out another life on this earth where they will have a chance to be saved. It will occur, if memory serves me, during a millennial kingdom, when the knowledge of God covers the land, and the conditions for salvation are much more favorable than they are in our current state- of-affairs.</span></p><span data-dcnode-id="3123" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">I suppose this is possible, but it just doesn’t seem very plausible to me. Once again, the problem of the babies rears its ugly head. How exactly are babies resurrected into an earthly existence? Do they have the same parents—also resurrected—or new ones? Or are they reared in millennial orphanages? Where do they first appear upon being resurrected? Do they sprout up from the soil like plants, where they are scooped up by diligent kingdom dwellers? Do they fall from the sky? Perhaps they are not resurrected as babies, but as adults? But then how are they still themselves? (I know I mentioned this already, but the problem is still there.) And if we do allow for such a break in the continuity of a person’s identity, then wherein lies the objection to reincarnation? Under this model, one also wonders: what, exactly, was the purpose of the person’s first life? Is there any karmic carryover, as with reincarnation, from one life to the next, or is the person’s first life rendered almost entirely superfluous—a pointless prelude to the resurrection life? So, a man spends eighty years worshipping the wrong God, dies, then is resurrected into a better world where he’s directed to the right God and given a chance at salvation? I suppose it is possible, but to me it seems much less likely than reincarnation.</span></p><span data-dcnode-id="3120" instrument_node="">
</span><p data-dcnode-id="3116"><strong data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">A One on One Encounter: </span></strong><span data-dcnode-id="3117" instrument_node="">Okay, so how might this work? There’s a cosmic interrogation room in another dimension where God is waiting for us with a heat lamp? So, Joe Smith dies at six months old, unsaved, and appears before God in the interrogation room for some working over until he’s saved, then gets ushered through the pearly gates? Really? Why didn’t God just save him the first time around? Again, I suppose it is possible, but it just doesn’t seem plausible. Which brings me to the next possibility.</span></p><span data-dcnode-id="3115" instrument_node="">
</span><p data-dcnode-id="3111"><strong data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">Hell: </span></strong><span data-dcnode-id="3112" instrument_node="">Okay, this is just the previous thing by another name (hell instead of interrogation room). Doesn’t add anything to the discussion, so let’s not even go there.</span></p><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">It is obvious that that orthodoxy offers no plausible means of post-mortem conversion that involves refinement of the soul. And since instant post-mortem salvation through an overpowering encounter with Christ is equally implausible, this leaves us with a need for a third, more satisfying alternative. I believe reincarnation fits the bill.</span></p><span data-dcnode-id="3107" instrument_node="">
</span><h3 data-dcnode-id="3104"><strong data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">A Better Way</span></strong></h3><span data-dcnode-id="3103" instrument_node="">
</span><p data-dcnode-id="3098"><span data-dcnode-id="3102" instrument_node="">Reincarnation has another added benefit: If we are all on different paths to the same destination, then the Christian need not reject all other faiths as false or demonic. This allows for a much more rational perspective regarding the merits of other belief systems, and of those who belong to them. Think about it. Under the orthodox model, any non-Christian, no matter how devout, how charitable, how loving, is to be regarded as someone who is on the wrong path. Although he may manifest the fruits of the spirit more generously than most Christians, he is still lost and deceived. All of the wisdom he gains through his own sacred texts, all of the strength he acquires through his own trials and tribulations, all of the spiritual assets he attains through prayer or meditation, is, in the final analysis, for naught. It was all a waste of time. Does this really comport with reality? Isn’t it obvious that many people of other faiths are just as far along the path of enlightenment and salvation as any Christian? Or is it the case that Mahatma Gandhi was a spiritual midget compared to Fred Phelps—that “Christian” soldier who showed his faith by heckling mourners at funerals with signs reading ‘God hates fags’? Okay, maybe you don’t go that far down that road, but—and this is crucial—you are on that </span><em data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">same</span></em><span data-dcnode-id="3099" instrument_node=""> road if you side with the orthodox view.</span></p><span data-dcnode-id="3097" instrument_node="">
</span><h3 data-dcnode-id="3094"><strong data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">Suffering is Pointless</span></strong></h3><span data-dcnode-id="3093" instrument_node="">
</span><p data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">And what about the implications of the orthodox view for theodicy and the problem of suffering? Man does not learn just by adherence to a particular set of scriptures; he also learns through trials. What about the enormous suffering endured by people of non-Christian faiths? Is it all for nothing? Does it please God to lay the heaviest, most excruciating burdens on the backs of these people for no discernable reason whatsoever? On the orthodox model, most of the suffering that most people have endured throughout history is utterly pointless. In sharp contradistinction to this, on the reincarnation model, not one shred of suffering is wasted. Every ounce of it has meaning. All of it plays a part in the soul’s ultimate destiny. And the same with wisdom gained by any means: it all has meaning.</span></p><span data-dcnode-id="3090" instrument_node="">
</span><h3 data-dcnode-id="3087"><strong data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Reincarnation is Not What You Think Because You Are Not What You Think</span></strong></h3><span data-dcnode-id="3086" instrument_node="">
</span><p data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">Ultimately, I believe that much of the resistance to reincarnation is based on a misunderstanding of the nature of personal identity. We imagine that what reincarnation entails is a person dying, then coming back in another life as a different person and yet still, in some sense, still the same person. But in what sense is he the same person, and in what sense is he a different one? This ties into the nature of identity itself.</span></p><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3075"><span data-dcnode-id="3082" instrument_node="">What makes me </span><em data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">me</span></em><span data-dcnode-id="3079" instrument_node="">? What makes you </span><em data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">you</span></em><span data-dcnode-id="3076" instrument_node="">? The usual answers—my body, my memories, my thoughts—are simply not adequate. You are not your body; if you died and went to heaven minus your body, you would still be you, right? In like manner, if you suffer amnesia and lose your memories, you are still yourself, right? And what about someone in a coma who is not thinking?</span></p><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">He’s still himself, right? So, if none of those things make us who we are, then what does?</span></p><span data-dcnode-id="3071" instrument_node="">
</span><p data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">To answer this question, let us consider the phenomenon of consciousness. Science has no idea how it’s even possible that consciousness could arise from our physical bodies. I don’t believe it does. I believe consciousness comes through us, not from us. We are receptors, or vessels. Each vessel is different in size, shape, and capacity, allowing for consciousness to take different forms, like water taking on the shape of its glass.</span></p><span data-dcnode-id="3068" instrument_node="">
</span><p data-dcnode-id="3057"><span data-dcnode-id="3067" instrument_node="">This has great implications for reincarnation. We must make some distinctions here. There are two issues: what you are, and what makes you </span><em data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">you</span></em><span data-dcnode-id="3064" instrument_node=""> as opposed to being someone else—what individuates you. The things that individuate you from other people, and other things, are not what makes you </span><em data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">you</span></em><span data-dcnode-id="3061" instrument_node="">. Consciousness flows through many vessels. It is the same consciousness. In this respect the vessels are ONE. But the consciousness takes a different form in each vessel, for vessels are different. In this sense, they are MANY. So, now it becomes easier to see in what sense a reincarnated person is a new person and in what sense he is still the same person who lived a prior life. His vessel is different, so now consciousness takes a different </span><em data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">form</span></em><span data-dcnode-id="3058" instrument_node="">, but it is the same consciousness. One could even liken reincarnation to the process described in Jeremiah 18:3-4: “And the vessel that he made of clay was marred in the hands of the potter, so he made it again into another vessel, as it seemed good to the potter to make.”</span></p><span data-dcnode-id="3056" instrument_node="">
</span><h3 data-dcnode-id="3053"><strong data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">Resurrection and Reincarnation are Friends, not Enemies</span></strong></h3><span data-dcnode-id="3052" instrument_node="">
</span><p data-dcnode-id="3041"><span data-dcnode-id="3051" instrument_node="">I believe there’s yet another reason for the resistance to reincarnation. It seems like something vastly different than resurrection—almost an opposite. This is an objection that dissolves upon closer inspection. Consider: It was into a culture where reincarnation was a </span><em data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">given</span></em><span data-dcnode-id="3048" instrument_node=""> that Christ was born. The people of that day believed we were all part of a cycle of life, death, and rebirth. Rebirth, however, was only necessary for those who failed to achieve enlightenment in their lifetime. If they attained enlightenment, no further incarnations were necessary, and the soul merged with its source—God. But this could only happen when, A: the person realized His true nature and his true source, and B: he took the steps necessary to reunite with it during his lifetime, i.e., the crucifying of his lower self so that the higher self might prevail, thus effecting a transformation in his being. And this is what is known as … </span><em data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">resurrection</span></em><span data-dcnode-id="3045" instrument_node="">. Yes, resurrection is not an enemy of reincarnation; it’s the </span><em data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">goal</span></em><span data-dcnode-id="3042" instrument_node=""> of reincarnation.</span></p><span data-dcnode-id="3040" instrument_node="">
</span><p data-dcnode-id="3039"></p><span data-dcnode-id="3038" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="3037"></div></div><footer class="entry-footer" data-dcnode-id="3026"><p class="entry-meta" data-dcnode-id="3027"><span class="entry-categories" data-dcnode-id="3029"><span data-dcnode-id="3035" instrument_node="">Filed Under: </span><a data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/reincarnation" rel="category tag"><span data-dcnode-id="3034" instrument_node="">Reincarnation</span></a><span data-dcnode-id="3032" instrument_node="">, </span><a data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/salvation" rel="category tag"><span data-dcnode-id="3031" instrument_node="">Salvation</span></a></span><span data-dcnode-id="3028" instrument_node=""> </span></p></footer></article><article class="post-4564 post type-post status-publish format-standard has-post-thumbnail category-atonement-and-blood category-consciousness category-creation-and-the-bible category-esoteric category-jesus-and-mythical-characters-compared category-temples category-the-biblical-mind entry" data-dcnode-id="2674" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="3007"><h1 class="entry-title" data-dcnode-id="3022" itemprop="headline"><a data-dcnode-id="3023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4564-prometheus-the-throne-of-the-higher-mind.html" rel="bookmark"><span data-dcnode-id="3024" instrument_node="">Prometheus: The Throne of the Higher Mind</span></a></h1><span data-dcnode-id="3021" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="3008"><time class="entry-time" data-dcnode-id="3019" datetime="2020-11-14T18:07:51-05:00" itemprop="datePublished"><span data-dcnode-id="3020" instrument_node="">November 14, 2020</span></time><span data-dcnode-id="3018" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="3014" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="3015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/admin" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="3016" itemprop="name"><span data-dcnode-id="3017" instrument_node="">Joshua Tilghman</span></span></a></span><span data-dcnode-id="3013" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="3010"><a data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4564-prometheus-the-throne-of-the-higher-mind.html%23comments"><span data-dcnode-id="3012" instrument_node="">7 Comments</span></a></span><span data-dcnode-id="3009" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="2700" itemprop="text"><span data-dcnode-id="3006" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3004"><img alt="" class="wp-image-4568" data-dcnode-id="3005" sizes="(max-width: 770px) 100vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2020/11/Griepenkerl_Prometheus_Bound.jpg&amp;raw" srcset="http://www.spiritofthescripture.com/wp-content/uploads/2020/11/Griepenkerl_Prometheus_Bound.jpg 770w, http://www.spiritofthescripture.com/wp-content/uploads/2020/11/Griepenkerl_Prometheus_Bound-300x151.jpg 300w, http://www.spiritofthescripture.com/wp-content/uploads/2020/11/Griepenkerl_Prometheus_Bound-768x387.jpg 768w"></figure><span data-dcnode-id="3003" instrument_node="">
</span><p data-dcnode-id="2998"><span data-dcnode-id="3002" instrument_node="">Now that we have built up a broader understanding of the </span><em data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Logos</span></em><span data-dcnode-id="2999" instrument_node="">, Adam and Eve, the serpent, Lucifer, and Satan in part one and two of this series, we can begin diving into the mythology of Prometheus. I want to begin by discussing some correlations of Prometheus with Genesis chapter one. In my opinion, the reason why many scholars dismiss the universal dimension in most myths and spiritual allegories is because they lack an understanding of metaphysics.</span></p><span data-dcnode-id="2997" instrument_node="">
</span><p data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">I want to preface the information below with an idea for you to ruminate upon:</span></p><span data-dcnode-id="2994" instrument_node="">
</span><p data-dcnode-id="2991"><span data-dcnode-id="2993" instrument_node="">Could it be that the entire purpose for individual existence is to make that which is potential into the actual? To make that which is abstract on the higher planes, concrete through the lower planes? What if our earthly existence, with its complex aggregation of sensation, emotion, and mentality, is for the soul purpose of building a spiritual temple, which at first is an abstract reality (on the higher planes of consciousness), but made concrete (on the higher planes) through the fruits of lower experience?  The Apostle Paul did say, “First in the natural, and then in the spiritual.” In this way Jacob’s ladder is descended and then ascended, and the ultimate mystery of Christ and the Church demystified. Let us now jump into the details of our study on Prometheus. I apologize in advance for the repetition of scripture and statements from earlier parts of the series, but repetition can be the best teacher </span><img alt="🙂" class="emoji" data-dcnode-id="2992" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="2990" instrument_node="">
</span><h2 data-dcnode-id="2987"><strong data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Parental Origin of Prometheus</span></strong></h2><span data-dcnode-id="2986" instrument_node="">
</span><p data-dcnode-id="2983"><em data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">“In the beginning Elohim created the heavens and the earth” (Genesis 1:1).</span></em></p><span data-dcnode-id="2982" instrument_node="">
</span><p data-dcnode-id="2968"><span data-dcnode-id="2981" instrument_node="">Esoterically, </span><em data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">heaven</span></em><span data-dcnode-id="2978" instrument_node=""> and </span><em data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">earth</span></em><span data-dcnode-id="2975" instrument_node=""> are universal symbols for </span><em data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">spirit</span></em><span data-dcnode-id="2972" instrument_node=""> and </span><em data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">matter</span></em><span data-dcnode-id="2969" instrument_node="">, or positive energy and lifeless (motionless) form. In the beginning, this earth (matter / form), was void and empty, but as the spirit hovers over it (symbolizing impregnation), the union symbolically births motion, or the Son.&nbsp;</span></p><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2964"><em data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">“And Elohim said, let there be light” (Genesis 1:3).&nbsp;</span></em></p><span data-dcnode-id="2963" instrument_node="">
</span><p data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">This metaphysical Son, the primordial light, becomes time and motion. </span></p><span data-dcnode-id="2960" instrument_node="">
</span><p data-dcnode-id="2957"><em data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">“In Him we move, live, and have our being” (Acts 17:28).&nbsp;</span></em></p><span data-dcnode-id="2956" instrument_node="">
</span><p data-dcnode-id="2953"><em data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">“In Him was life; and that life was the light of men” (John 1:4).&nbsp;</span></em></p><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2951" instrument_node="">This light is the Son of </span><em data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Heaven </span></em><span data-dcnode-id="2948" instrument_node="">and </span><em data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Earth</span></em><span data-dcnode-id="2945" instrument_node="">, or the interplay of spirit and matter, thought and form. It is not natural light, although natural light is simply a physical reflection of it. This “light” is primordial consciousness, which spiritually evolves, eventually (and especially after the fall when man’s eyes “are opened”), as intelligence and the faint beginnings of freewill through mankind. This will be important to understand as it relates to Prometheus later, the bringer of divine fire from Heaven, just as Satan was kicked out of Heaven as </span><em data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">lightning</span></em><span data-dcnode-id="2942" instrument_node="">!</span></p><span data-dcnode-id="2940" instrument_node="">
</span><p data-dcnode-id="2935"><span data-dcnode-id="2939" instrument_node="">The important thing to note here is that the symbolic parents of this primordial light (heaven and earth / manifestation of the </span><em data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">Logos)</span></em><span data-dcnode-id="2936" instrument_node="">, is the interplay between spirit and matter, and is stated in most ancient cosmogonies such as Genesis and the Prometheus myth.</span></p><span data-dcnode-id="2934" instrument_node="">
</span><p data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">Does Prometheus have the same progenitors? Yes! The very same “heaven” and “earth.” Prometheus was a Titan. The Titans were born from Uranus (Heaven), and Gaea (Earth). I don’t think the name Gaea needs any explanation. However, Uranus, sometimes Ouranus, was the primal Greek God of the sky, or Heaven. It can be argued etymologically that we can trace Uranus to mean, “the one standing on high,” and points to spirit, or divine thought. </span></p><span data-dcnode-id="2931" instrument_node="">
</span><p data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">(Side note: for serious students, yes, I understand that Prometheus, in Hesiod’s account, is the son of the Titan Lapetus, and is therefore really a grandson of Uranus, but we don’t have time to discuss how this is really just a variation of the Christian equivalent of Archangels, or the different emanations of divine thought as the Logos further differentiated itself into matter).</span></p><span data-dcnode-id="2928" instrument_node="">
</span><p data-dcnode-id="2920"><span data-dcnode-id="2927" instrument_node="">So Prometheus, the son of a Titan, is the symbolic son of </span><em data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">Heaven</span></em><span data-dcnode-id="2924" instrument_node=""> and </span><em data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">Earth</span></em><span data-dcnode-id="2921" instrument_node="">, just as the primordial light is the symbolic Son of heaven and earth in Genesis.</span></p><span data-dcnode-id="2919" instrument_node="">
</span><p data-dcnode-id="2914"><span data-dcnode-id="2918" instrument_node="">The gospel of John restates this exact same principle in the Greek language, as the </span><em data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">Logos</span></em><span data-dcnode-id="2915" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="2913" instrument_node="">
</span><p data-dcnode-id="2910"><em data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">“…this light was the life (movement, thought, intelligence) of men.”</span></em></p><span data-dcnode-id="2909" instrument_node="">
</span><p data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">So the philosophical parent of light then is the union of spirit and matter. What does this have to do with Prometheus and the Biblical correlate?</span></p><span data-dcnode-id="2906" instrument_node="">
</span><p data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">In the most popularized versions of the Prometheus myth, Prometheus is actually the creator of man. But this must be understood correctly. It is not that Prometheus is the creator of mankind in the traditional sense, but rather that he comes down from above to give the divine fire, the immortal thinking principle to the animal body, therefore birthing the individualized principle, or the immortal thinker, in man. The divine fire he brings down is the spark of that life of the soul, which, although is divine wisdom itself, is expressed through the lower nature as intellect and reason.&nbsp;</span></p><span data-dcnode-id="2903" instrument_node="">
</span><p data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">How can we further correlate parallels to Genesis?&nbsp;</span></p><span data-dcnode-id="2900" instrument_node="">
</span><p data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">In the Prometheus myth Zeus punished Prometheus the same way God punishes Adam and Eve for listening to the serpent, which opened their eyes by way of reason and intelligence through the lower nature of the flesh. Prometheus is punished by being chained to a rock. This rock symbolizes the body of flesh, which Prometheus becomes chained to by an iron (dual mental nature) chain. The same concept is in Genesis when Adam and Eve are kicked out of the garden with their newly made “coats of skin.” They are not chained to a rock, but the idea is the same, for:</span></p><span data-dcnode-id="2897" instrument_node="">
</span><p data-dcnode-id="2894"><em data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">“…cursed is the ground for thy sake; in sorrow shalt thou eat of it all the days of thy life” (Gen 3: 17).&nbsp;</span></em></p><span data-dcnode-id="2893" instrument_node="">
</span><p data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">The idea is the man now has to eek his way through life in suffering and sorrow. The ground symbolizes the lower nature here, or the body, the coat of skin, with its physical nature, its passions, desires, and appetites for things of the flesh, which brings on that suffering.&nbsp;</span></p><span data-dcnode-id="2890" instrument_node="">
</span><p data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">These allegories are explaining, in spiritual terms, that the primordial light becomes encased / trapped in the body or in matter for a time, until the primordial light rises within the soul.&nbsp;</span></p><span data-dcnode-id="2887" instrument_node="">
</span><p data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">The Zohar states: “The soul and form when descending on Earth put on an earthly garment.” Prometheus’ being chained to a rock (matter, the body) represents this, as well as Adam and Eve being given a physical body and kicked out of Eden.&nbsp;</span></p><span data-dcnode-id="2884" instrument_node="">
</span><p data-dcnode-id="2879"><span data-dcnode-id="2883" instrument_node="">This primordial light then is truly the spark of self consciousness, which becomes more self conscious as it has a body to become cognitized through. Jesus stated the Father (the passive first </span><em data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">Logos</span></em><span data-dcnode-id="2880" instrument_node="">) is greater than I. In other words, Jesus is telling us that the “I,” that we feel as separate, is subservient to the impersonal Self, which is a unity. However, the great secret that the church has utterly failed to understand, is this: you don’t save the personal “I,” by a belief system, you transform the personal “I” into a unity, the true “church,” or the body that is being built up. Jesus shows us the way by his unwavering commitment of selflessness. He who loves his brethren Loves God.&nbsp;</span></p><span data-dcnode-id="2878" instrument_node="">
</span><p data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Spirit manifests as consciousness IN matter. We can say then, metaphysically, that consciousness is that universal symbol of light made manifest by the interplay of what we call spirit and matter, heaven and earth, the father emanating as the son (the son being the face of God, or the expression of the unmanifested). It is the potential to become actual, the darkness (where God dwells) becomes the light, for the sole purpose of illuminating itself. Darkness (the fullness) illuminates itself, gradually, through cosmic and self conscious evolution. The all becomes limited, and the limited rejoins the all, but with the addition of the experience of limitation and self consciousness.&nbsp;</span></p><span data-dcnode-id="2875" instrument_node="">
</span><p data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">The other great mystery that I believe religion has properly failed to convey is that one only finds his true Self by taking his focus away from his transient personality, and by aspiring upwards to that which is responsible for the transient (or journeying) personality. The I Am conscious spark RETAINS its individuality, not as the limited personal self, but now as a unity, the greater SELF.&nbsp;</span></p><span data-dcnode-id="2872" instrument_node="">
</span><p data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">Through the first Adam, the primordial light expresses itself as earthy, or in it’s lower nature through the flesh, but becomes the second Adam, or the risen Christ, as the flesh is symbolically crucified. It is the same idea as this: the original serpent brings knowledge (tree of knowledge of good and evil), and therefore the process of birth and death, or the logos in its lower form in the tomb of a body, but Moses must raise the serpent on a pole (the cross), and then intelligence is lifted up and within the higher mind manifests as wisdom, which brings healing to the entire individual.</span></p><span data-dcnode-id="2869" instrument_node="">
</span><h2 data-dcnode-id="2866"><strong data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">Prometheus: the Development of Mankind</span></strong></h2><span data-dcnode-id="2865" instrument_node="">
</span><p data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">Prometheus also brought man culture, art, and the making of metals with that divine fire. Metals in scripture symbolize different aspects of the logos manifesting different aspects of the mind. Iron for example represents mental thought. We have the same idea repeated in Genesis with Tubal Cain, which as the offspring of Cain’s line, who was the first man to be a worker of metals! This symbolizes the awakenment of the mental nature through thought and reason in its lower aspect. Iron signifies the mental nature expressed through the lower aspect of the dual soul, as Cain, the lower nature within us all, killed the spiritual Abel. </span></p><span data-dcnode-id="2862" instrument_node="">
</span><h2 data-dcnode-id="2859"><strong data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">Prometheus and Reincarnation</span></strong></h2><span data-dcnode-id="2858" instrument_node="">
</span><p data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">Now let us see how some of the finer details of the Prometheus story reveal this process.&nbsp;</span></p><span data-dcnode-id="2855" instrument_node="">
</span><p data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">As part of his punishment for helping mankind, and while he is chained to a rock (the same punishment Adam and Eve received by becoming beings of flesh outside of Eden / Heaven / the higher mental plane), an eagle comes down everyday which eats Prometheus’ liver. The liver then regenerates every night and the eagle comes to eat it again, over and over, as long as Prometheus remains chained to the rock, or the body of matter. Isn’t it interesting that in esoteric philosophy the liver represents the lower nature, and that it is the only organ which can regenerate itself when it is taken care of and cleansed?!</span></p><span data-dcnode-id="2852" instrument_node="">
</span><p data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">And what does this all signify? Reincarnation over and over in a body until Christ rises within.&nbsp;</span></p><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">In Revelations we have Jesus Christ whose vesture (outer garment) is dipped in blood. This simply means that he took on life in the flesh and overcame. The fruits of his labor through obedience to the Father allowed his spiritual temple to be built on the higher planes, through the efforts of the personality which was involved in the body of flesh, symbolized by the vesture (his outer garment) dipped into blood. Remember, the Torah tells us that the “life is in the blood.” In other words, the fruits of our labor through the trials and tribulations on earth, as sojourners in the wilderness, yield up life on the higher planes when that life is well lived.&nbsp;&nbsp;</span></p><span data-dcnode-id="2846" instrument_node="">
</span><h2 data-dcnode-id="2843"><strong data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">More Detail on the Eagle and Prometheus’ Liver</span></strong></h2><span data-dcnode-id="2842" instrument_node="">
</span><p data-dcnode-id="2837"><span data-dcnode-id="2841" instrument_node="">What is the real meaning of an </span><em data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Eagle</span></em><span data-dcnode-id="2838" instrument_node=""> eating Prometheus’ liver?&nbsp;</span></p><span data-dcnode-id="2836" instrument_node="">
</span><p data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Gaskell states this about the Eagle:</span></p><span data-dcnode-id="2833" instrument_node="">
</span><p data-dcnode-id="2830"><em data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">“A symbol of the Holy Spirit, which flies, as it were, through the mind (air) from the higher nature (heaven) to the lower nature (earth) and soars aloft to the Self (sun).”</span></em></p><span data-dcnode-id="2829" instrument_node="">
</span><p data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">Why would the Holy Spirit eat the liver of Prometheus? To answer this, let’s look at our definition for Liver, also from Gaskell:</span></p><span data-dcnode-id="2826" instrument_node="">
</span><p data-dcnode-id="2823"><em data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">“A symbol of the lower nature (flesh), or the lower qualities of the personality.”&nbsp;</span></em></p><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">In these two definitions we can easily derive our answer. The Holy Spirit is the higher mind, which operates above the mental plane, above the powers of reasoning and intellect. The eagle then, or higher mind, comes down to devour (digest, eat of, take in) of the experiences of life (symbolized by the liver) over and over (reincarnation). The lower mind which disciplines the body, sensations, and emotions, intellectual activities, etc., to higher and noble causes, during its early sojourn or pilgrimage in each incarnation, “gives up” to the higher mind it’s experience, which is in turn transmitted, or transmuted, by the higher mind into concrete self consciousness on the higher planes of conscious expression. When life’s experiences on this physical plane are more concerned with the transient personality, and are a slave to the body, passions, emotions, and even lower intellect, the eagle, or higher mind receives nothing. The eagle then comes back everyday after every night (death and rebirth) to take back unto itself what it can. A wasted physical life caught up in the seven deadly sins does nothing for the higher mind, or eagle, which flies back to the sun (higher self). But a positive life, filled with love, the seeking of wisdom, and things which are good always has something to “yield up” to the higher mind after each life. In such a case, the spiritual temple is being built through each life on the higher planes, until, one day, the resurrection of the Christ (which was dead) happens within the body of flesh, and the higher mind can manifest its potential on the higher planes of consciousness.&nbsp;</span></p><span data-dcnode-id="2819" instrument_node="">
</span><p data-dcnode-id="2816"><span data-dcnode-id="2818" instrument_node="">And hopefully now you understand my paragraph way back at the beginning of this post </span><img alt="🙂" class="emoji" data-dcnode-id="2817" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="2815" instrument_node="">
</span><h2 data-dcnode-id="2812"><strong data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Prometheus gets Delivered</span></strong></h2><span data-dcnode-id="2811" instrument_node="">
</span><p data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">Now who is Prometheus? Prometheus symbolizes our true individuality, which is seated in the higher mind as a potential at first. Prometheus cannot be delivered from his chain to the rock or body until something happens allowing him to be free in Heaven again. The true individuality, the thinker, cannot be raised to Heaven, until it gains the proper fruits of experience. Although it furthers its self conscious expression from these fruits of experience, it needs to gain a certain level of awareness. This is the true reason why Plato attributed the meaning to the name of Prometheus as “forethought.” Pro (before) + manthano (intelligence) + eus (suffix) = forethought.&nbsp;The forethought, or divine mind (Logos), manifested itself on the lower planes to be raised to the higher. And herein lies the meaning again to this scripture:</span></p><span data-dcnode-id="2808" instrument_node="">
</span><p data-dcnode-id="2805"><em data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">“And no man hath ascended up to heaven, but he that came down from heaven, even the son of man which is in heaven” (John 3:13).&nbsp;</span></em></p><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Jesus likened it to Moses who had to raise the serpent. Jesus stated that he must be raised in the same way. In other words, the serpent (desire mind) must be raised from its attachment to the personality through it’s desire towards gratifying the flesh, where it first recognized itself as a self-conscious entity. But it must be transformed, renewed, regenerated. In the Prometheus story, Prometheus is delivered by Hercules. Hercules symbolizes the pain and troubles of life which eventually uplift Prometheus back to his proper place. Interestingly, Zeus gives his blessing to Hercules to deliver Prometheus, even though he originally punishes him for it! Sometimes a picture represents a thousand words. Below is a picture of a bust of Heracles, that symbol of man’s strength who overcomes, taking hold of the serpent…</span></p><span data-dcnode-id="2801" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2799"><img alt="" class="wp-image-4579" data-dcnode-id="2800" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2020/11/dc12.jpg&amp;raw" srcset="http://www.spiritofthescripture.com/wp-content/uploads/2020/11/dc12.jpg 500w, http://www.spiritofthescripture.com/wp-content/uploads/2020/11/dc12-300x225.jpg 300w"></figure><span data-dcnode-id="2798" instrument_node="">
</span><p data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">We don’t have time in this post to explore Hercules, the son of the Father (Zues) and his earthly mother (like Mary), but perhaps you can connect the dots here at least to the serpent of Genesis with more of the information presented so below.</span></p><span data-dcnode-id="2795" instrument_node="">
</span><p data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">Hesiod, the Greek poet who first speaks of Prometheus in the Theogony, stated that the outer man was the bond by which Zeus bound Prometheus.</span></p><span data-dcnode-id="2792" instrument_node="">
</span><p data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Now we have to link this thought with the serpent of Genesis. The serpent gave man the gift of self consciousness. We know this because man’s eyes were opened, and he recognized himself as an identity.&nbsp;</span></p><span data-dcnode-id="2789" instrument_node="">
</span><p data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">This is scriptural proof that the LOGOS is the divine spark, or originator, of consciousness in men. In fact, as the scripture makes clear, not anything that was made (manifested) doesn’t contain this light. Everything was made by the LOGOS. We can conclude then that consciousness manifests in different grades through the complexity of which spirit unfolds as it impregnates matter.&nbsp;</span></p><span data-dcnode-id="2786" instrument_node="">
</span><p data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">We should also make an important note that the Church Father Augustine stated that God is the “Father of lights.”&nbsp;</span></p><span data-dcnode-id="2783" instrument_node="">
</span><p data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">So what does this have to do with the mythological story of Prometheus?&nbsp;</span></p><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Prometheus was known as a trickster with high intelligence. He feels sorry for mankind and decides to steal fire from the Gods and bring it to Earth and give it to humanity to aid them in their evolutionary journey. But this fire is the fire of the Gods, stolen from their workshop. Men can now use this fire to produce metals. It must be remembered that this is a divine fire belonging only to the Gods, where apparently they had their own workshop to produce their own metals.&nbsp;</span></p><span data-dcnode-id="2777" instrument_node="">
</span><p data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">This should bring remembrance to the scripture, “Man has now become like one of us…”</span></p><span data-dcnode-id="2774" instrument_node="">
</span><p data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">What do Gods have for the use of a workshop to produce metals in? Are we talking about literal fire and metals?&nbsp;</span></p><span data-dcnode-id="2771" instrument_node="">
</span><p data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">No.&nbsp;</span></p><span data-dcnode-id="2768" instrument_node="">
</span><p data-dcnode-id="2765"><span data-dcnode-id="2767" instrument_node="">Metals are symbols for thought and the vehicle of thought. I apologize for repeating many concepts, statements, and scriptures in this series, but sometimes repetition is the best teacher </span><img alt="🙂" class="emoji" data-dcnode-id="2766" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">So why does Prometheus give this divine fire to mankind? What’s it really mean? It simply means that Prometheus is an allegory of the bringer of light, or intelligence and reason to mankind. He symbolically represents the LOGOS, just as Christ. Mankind can then produce the metals that they need with this divine fire, or conscious development from intelligence, to understanding, to wisdom (expressed in its highest form as universal love or ONENESS).&nbsp;</span></p><span data-dcnode-id="2761" instrument_node="">
</span><h2 data-dcnode-id="2758"><strong data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">The Serpent, the Bringer of Knowledge to Adam and Eve</span></strong></h2><span data-dcnode-id="2757" instrument_node="">
</span><p data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Consider the fact that the serpent, like Prometheus, is considered a trickster because of its cunning and wit. Another translation for the serpent being “more subtle” than any beast of the field is that it is more cunning than any beast of the field. But the fact is that the serpent brings knowledge to mankind. The Bible clearly states that the “eyes” (the lower nature in all its aspects) of Adam and Eve were “opened.” This means that mankind now developed a new faculty of the mind; mankind now knew the difference between good and evil, or he and she had the choice to choose between two opposing forces within his and her experience. For the first time in scripture, mankind has now become “as one of us,” or as an Elohim, meaning, mankind now had the ability of conscious choice, or the additional faculty of reasoning through the intellect.&nbsp;</span></p><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">The reason this new faculty brings spiritual death is because the mind no longer dwells on a plane of unity beyond the physical world, but now in the physical world (God clothed them with coats of skin, i.e., “flesh”), the mind is divided between thought and emotion, which is the war continually played out in the flesh which leads to corruption, or death. In other words, man, as a physical being, now has an intellect which provides for his or her survival in a world of opposites, or duality. The body dies because it is subject to reaping and sowing, karma.&nbsp;Thus the Eagle continually eats the liver of Prometheus, looking for the fruits of experience which it can take unto itself to further its spiritual temple on the higher planes as it metaphorically flies back to the sun (higher self). </span></p><span data-dcnode-id="2751" instrument_node="">
</span><p data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">The intelligence principle itself then leads to death, even though it is an additional faculty necessary to mankind’s development. So yes, the Serpent brings death, but also an illumination within the physical form. This illumination is thus: that mankind has developed the intellect to realize that there is a higher spiritual counterpart to his lower nature, which is the divine fire inside that needs to be set free from the physical body. This realization is first produced through the law (Moses and moral nature), but not complete, until the Christ, which not only fulfills the law completely, but supercedes it!</span></p><span data-dcnode-id="2748" instrument_node="">
</span><h2 data-dcnode-id="2745"><strong data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Back to our Riddle in Part One of this Series</span></strong></h2><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">I didn’t forget the riddle I posed to you back in the first post. </span></p><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">Can God create a rock that is even too heavy for he, himself, to lift?</span></p><span data-dcnode-id="2738" instrument_node="">
</span><p data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">The question itself is illogical, and the nature of the universe is always logical. There is a hint of this in the original meaning of the Logos. The question assumes that there is a personal God who creates things which exists in the limited world of duality. This is not the reality of things, just as sure as you can’t have a scientific theory that unifies all that we have thus learned about science from a material origin. </span></p><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2730"><span data-dcnode-id="2734" instrument_node="">The unfolding power of the </span><em data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Logos </span></em><span data-dcnode-id="2731" instrument_node="">develops through evolution in the world of duality or being. In theory, God emanates the idea of a rock that he cannot lift, then emanates the idea of something else that can. The real answer to this question then deals with the concept of unfolding potential into actuality through time (kronos). To pose the question at the beginning of this series as I did presents a fallacy in the concept of instantaneous manifestation. To come into being, something must go from infinite potentiality to limited manifestation, and back up again. When man first came about it could be said that it would be impossible for him to fly. But man then created a way through something other than himself to fly in, and therefore it can be said that he flies.&nbsp;</span></p><span data-dcnode-id="2729" instrument_node="">
</span><p data-dcnode-id="2726"><span data-dcnode-id="2728" instrument_node="">I know, I know. Such thinking presents many problems and possible scenarios. And that’s my point. The self-conscious higher mind must be built up as a spiritual temple </span><img alt="🙂" class="emoji" data-dcnode-id="2727" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">So what is the meaning then of Prometheus as the throne of the higher mind? Prometheus ultimately symbolizes the causal body, which is the seat of the higher mind on the upper mental plane. It is an abstract potential. It must be built up through the fruits of experience, some of that through suffering, on the lower planes of existence (think of the experiences of Job). The higher mind has to have a way of cognitizing or realizing itself through the lower vehicles. But it only takes in that which is true, noble, and that which we call godly. Those experiences, which we have the choice to consciously engage in, is what builds the spiritual temple above (Ezekiel’s Temple, the future temple). Those experiences engaged in the opposite (the seven deadly sins), are essentially a wasted life, which cannot add to the higher mind because they remain energetically connected to the lower self, which is only but a transitory expression of consciousness itself. It must die, as all physical life does. The physical body at death does not disappear, but is recycled into other elements which then use that energy again for life. This is scientific! Why not then metaphysical? Reincarnation, for example? But any aspirations of the physical life that retain an energetic signature in higher form, must remain. This is the secret to what the ancients considered, “immortality.” It is not the idea that one’s physical body attains immortality, but that one’s mind and self consciousness does, while IN the body. And this is the meaning of that Gnostic scripture of the Gospel of Thomas which states:</span></p><span data-dcnode-id="2722" instrument_node="">
</span><p data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">“If they do not receive the resurrection while they yet live, when they die they will receive nothing.”</span></p><span data-dcnode-id="2719" instrument_node="">
</span><p data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">The modern Christian teachings actually teach the opposite, which states that if you believe the right thing, when you die, you will receive the resurrection. Wow. How backwards has this understanding become! </span></p><span data-dcnode-id="2716" instrument_node="">
</span><p data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">And the epistle of John corroborates this when it states that he who believes Jesus did not come in the FLESH is Antichrist. Meaning, that the Christ nature must be developed in the flesh! The life and story of Jesus is a metaphor for our life. “Greater is He that is IN you that is in the world.” The world signifying, the serpent nature of desire, that is cursed to the ground. </span></p><span data-dcnode-id="2713" instrument_node="">
</span><p data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">Blessings!</span></p><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2703"><a data-dcnode-id="2708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4532-prometheus-hercules-christ-lucifer-and-the-serpent-a-comparative-analysis-part-one.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2709" instrument_node="">Part One</span></a><span data-dcnode-id="2707" instrument_node=""> / </span><a data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4547-comparing-prometheus-and-biblical-characters-continued.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2706" instrument_node="">Part Two</span></a><span data-dcnode-id="2704" instrument_node=""> / Part Three</span></p><span data-dcnode-id="2702" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="2701"></div></div><footer class="entry-footer" data-dcnode-id="2675"><p class="entry-meta" data-dcnode-id="2676"><span class="entry-categories" data-dcnode-id="2678"><span data-dcnode-id="2699" instrument_node="">Filed Under: </span><a data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/atonement-and-blood" rel="category tag"><span data-dcnode-id="2698" instrument_node="">Atonement and Blood</span></a><span data-dcnode-id="2696" instrument_node="">, </span><a data-dcnode-id="2694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/consciousness" rel="category tag"><span data-dcnode-id="2695" instrument_node="">Consciousness</span></a><span data-dcnode-id="2693" instrument_node="">, </span><a data-dcnode-id="2691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/creation-and-the-bible" rel="category tag"><span data-dcnode-id="2692" instrument_node="">Creation and the Bible</span></a><span data-dcnode-id="2690" instrument_node="">, </span><a data-dcnode-id="2688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/esoteric" rel="category tag"><span data-dcnode-id="2689" instrument_node="">Esoteric</span></a><span data-dcnode-id="2687" instrument_node="">, </span><a data-dcnode-id="2685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/jesus-and-mythical-characters-compared" rel="category tag"><span data-dcnode-id="2686" instrument_node="">Jesus and Mythical Characters Compared</span></a><span data-dcnode-id="2684" instrument_node="">, </span><a data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/temples" rel="category tag"><span data-dcnode-id="2683" instrument_node="">Temples and Artifacts</span></a><span data-dcnode-id="2681" instrument_node="">, </span><a data-dcnode-id="2679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/the-biblical-mind" rel="category tag"><span data-dcnode-id="2680" instrument_node="">The Biblical Mind</span></a></span><span data-dcnode-id="2677" instrument_node=""> </span></p></footer></article><article class="post-4547 post type-post status-publish format-standard has-post-thumbnail category-about-the-scriptures category-awakening category-consciousness category-creation-and-the-bible category-esoteric category-god category-jesus-and-mythical-characters-compared category-lucifer-and-satan category-reincarnation category-spirit-and-soul entry" data-dcnode-id="2406" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="2656"><h1 class="entry-title" data-dcnode-id="2671" itemprop="headline"><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4547-comparing-prometheus-and-biblical-characters-continued.html" rel="bookmark"><span data-dcnode-id="2673" instrument_node="">Comparing Prometheus and Biblical Characters Continued…</span></a></h1><span data-dcnode-id="2670" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="2657"><time class="entry-time" data-dcnode-id="2668" datetime="2020-11-03T15:20:21-05:00" itemprop="datePublished"><span data-dcnode-id="2669" instrument_node="">November 3, 2020</span></time><span data-dcnode-id="2667" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="2663" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/admin" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="2665" itemprop="name"><span data-dcnode-id="2666" instrument_node="">Joshua Tilghman</span></span></a></span><span data-dcnode-id="2662" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="2659"><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4547-comparing-prometheus-and-biblical-characters-continued.html%23comments"><span data-dcnode-id="2661" instrument_node="">15 Comments</span></a></span><span data-dcnode-id="2658" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="2441" itemprop="text"><span data-dcnode-id="2655" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2653"><img alt="" class="wp-image-4548" data-dcnode-id="2654" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2020/11/pexels-photo-1652220-1024x682.jpeg&amp;raw" srcset="http://www.spiritofthescripture.com/wp-content/uploads/2020/11/pexels-photo-1652220-1024x682.jpeg 1024w, http://www.spiritofthescripture.com/wp-content/uploads/2020/11/pexels-photo-1652220-300x200.jpeg 300w, http://www.spiritofthescripture.com/wp-content/uploads/2020/11/pexels-photo-1652220-768x512.jpeg 768w, http://www.spiritofthescripture.com/wp-content/uploads/2020/11/pexels-photo-1652220-1536x1024.jpeg 1536w, http://www.spiritofthescripture.com/wp-content/uploads/2020/11/pexels-photo-1652220.jpeg 1880w"></figure><span data-dcnode-id="2652" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2651" instrument_node="">We now begin our second post in the series of Prometheus and Biblical characters. In the first post, we provided some foundational thought on the concept of the </span><em data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Logos. </span></em><span data-dcnode-id="2648" instrument_node="">Metaphysically, we concluded it is the life-principle of spirit manifested physically as God’s garments. Mr. W. R. Inge, a professor of Divinity at Cambridge, once summed up this ancient philosophical concept of the </span><em data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Logos</span></em><span data-dcnode-id="2645" instrument_node=""> as used by Philo of Alexandria:</span></p><span data-dcnode-id="2643" instrument_node="">
</span><p data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">“It seems to have been a name for the rational self-evolution of the universe, to be apprehended by the human mind which is capable of identifying itself with it….Philo’s Logos is a God who reveals himself, in contrast with a God that hides himself.”</span></p><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2639" instrument_node="">I am providing Mr. Inge’s quote above so that we understand that I am not limiting the idea of the </span><em data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">Logos</span></em><span data-dcnode-id="2636" instrument_node=""> to spirit manifesting in the physical universe only. I mean that the physical universe is it’s outermost expression. Physical matter is the expression of spirit in its most outer form. Put another way, it is God’s most outer garment. But to reflect again on Mr. Inge’s thoughts, it is the self-evolution of the universe from it’s highest to lowest octave in the mind. Remember, the New Testament writer, who identifies Christ with the </span><em data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Logos</span></em><span data-dcnode-id="2633" instrument_node="">, also states that all things were made by Him, and the author of Colossians also states that all things both visible (God’s most outer garments) and invisible (God’s inner garments) were created through Christ. Thus, the unfolding </span><em data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Logos</span></em><span data-dcnode-id="2630" instrument_node=""> is the entire metaphysical and physical universe being expressed through that which we might dub, the self evolution of the divine mind, i.e., the God that reveals himself by himself through us.&nbsp;</span></p><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2625"><span data-dcnode-id="2627" instrument_node="">We are now going to switch gears and explore Satan, Lucifer, and the Serpent. We are also going to talk some about Adam and Eve. We have to set a proper foundation here too in order to understand that the Prometheus story allegorically symbolizes the same, culminating in the Christ principle through the suffering even Prometheus endured in the Greek mythologies. So bear with me </span><img alt="🙂" class="emoji" data-dcnode-id="2626" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="2624" instrument_node="">
</span><h3 data-dcnode-id="2621"><strong data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">The Serpent</span></strong></h3><span data-dcnode-id="2620" instrument_node="">
</span><p data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">The serpent of scripture is an ancient universal symbol. The allegorical part it plays in the Eden drama reveals the nature of the divine mind involving and evolving from the mind of man. It also brilliantly unveils the psychological state in which most of mankind finds itself today. But we can’t fully understand the symbol of the serpent until we also understand the symbol of Adam and Eve.&nbsp;</span></p><span data-dcnode-id="2617" instrument_node="">
</span><p data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">Philo, the ancient Jewish philosopher mentioned above, once stated:</span></p><span data-dcnode-id="2614" instrument_node="">
</span><p data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">“God, when first of all he made the intellect called it Adam.”</span></p><span data-dcnode-id="2611" instrument_node="">
</span><p data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">In order to get a true grip on this as it relates to Adam in the Garden of Eden BEFORE Eve was created out of him, let’s imagine what a pure intellect would be like. Along these lines, imagine pure intellect, unimpeded by any kind of emotion or desire (before Eve). What would it be like?</span></p><span data-dcnode-id="2608" instrument_node="">
</span><p data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Most importantly, it would experience no internal conflict. Man’s mind today is bombarded in the decision making process by a myriad of sensory input, his or her accumulated emotion, and divergence of thought. But a purely intellectual nature itself would be free, and in direct accordance with divine law. It’s every expression would be less of an individual decision, but more of just an expression of itself unimpeded by anything. In fact, it wouldn’t be very conscious. We could call it something close to perfection, because every action would be in the perfect alignment with God’s law. But it would have no depth or breadth, so in another way, although we might call it perfect, we could also call it very limited in self-experience and true self-consciousness. Although it might act perfectly in accordance with God’s laws, it certainly wouldn’t have much of a personality. In fact, it wouldn’t have anything we could call a personality at all because it would be so purely logical that every expression would be based on what is true to its nature. Almost like a computer program that flawlessly executes it’s programming. Sure, it’s flawless, but it lacks self-awareness and true knowledge of itself, and the wisdom gained through experience in a world of duality.&nbsp;</span></p><span data-dcnode-id="2605" instrument_node="">
</span><p data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">So what is it that adds an extra layer of depth and breath of this pure intellect (or logic machine)? It is the emotional nature moved by desire (e – “motion”).&nbsp;</span></p><span data-dcnode-id="2602" instrument_node="">
