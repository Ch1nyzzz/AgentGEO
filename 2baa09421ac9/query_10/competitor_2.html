</span><p data-dcnode-id="3702"><span data-dcnode-id="3706" instrument_node="">These metaphysical interpretations make more logical sense, even when outside sources are not consulted and we just use the Genesis text itself! Consider: it was not until </span><em data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">after</span></em><span data-dcnode-id="3703" instrument_node=""> the fall from Eden that God clothed Adam and Eve with “coats of skin.”&nbsp;</span></p><span data-dcnode-id="3701" instrument_node="">
</span><p data-dcnode-id="3698"><em data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">“And unto Adam and Eve did the LORD God make coats of skin, and clothed them (Genesis 3:21).&nbsp;</span></em></p><span data-dcnode-id="3697" instrument_node="">
</span><p data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">What does it mean that they were clothed with “coats of skin.” Are these coats of skin, as mainstream Christian thought has taught us, actual animal skins, used to cover their already developed physical bodies? As we read on, we see that such an interpretation is based on illogical dogmatism.&nbsp;</span></p><span data-dcnode-id="3694" instrument_node="">
</span><p data-dcnode-id="3689"><span data-dcnode-id="3693" instrument_node="">The metaphysical scholar, G.A. Gaskell, defines the Biblical word for </span><strong data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">Coat</span></strong><span data-dcnode-id="3690" instrument_node=""> in English as: “Symbols of mental coverings or forms of truth or error.</span></p><span data-dcnode-id="3688" instrument_node="">
</span><p data-dcnode-id="3683"><span data-dcnode-id="3687" instrument_node="">Gaskell also further defines the concept for </span><strong data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">Skin as Clothing </span></strong><span data-dcnode-id="3684" instrument_node="">as: “Symbolic of the mental, astral, or physical sheaths of the soul.”</span></p><span data-dcnode-id="3682" instrument_node="">
</span><p data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">The term“Coat “is strictly reserved for a type of “mental” covering of the spiritual soul, whereas “clothed” could be related to mental, astral (emotional), or a physical covering. Based on the context of everything we will consider in this story, when God clothed Adam and Eve, we are speaking of a mental-emotional covering for the pure spirit. With a little bit of patience, it will be shown, through scriptural evidence, that this is the case. We aren’t really talking about two individuals here, but the human soul (mind) in its rudimentary stages of development. We will find support for such reasoning, that their “coats” of “skin” had to do more with developing mind and emotion than physicality. Physicality will come in much later offspring, which we will explore in another post when I have time.&nbsp;</span></p><span data-dcnode-id="3679" instrument_node="">
</span><p data-dcnode-id="3674"><span data-dcnode-id="3678" instrument_node="">Before we show other scriptures which provide logical evidence for that stated above, let’s consider the mainstream and traditional Christian view: God killed an animal and used those skins to cover the naked physical body of Adam and Eve, as a foreshadowing of the blood sacrifice of Christ, the </span><em data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">first</span></em><span data-dcnode-id="3675" instrument_node=""> blood sacrifice!&nbsp;</span></p><span data-dcnode-id="3673" instrument_node="">
</span><p data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">There are several problems with this interpretation. It supposes that God, as a spirit, physically slaughtered some type of animal, skinned it, and gave these skins to them as coverings. A bloody spirit indeed! One which murders the spirit of logic. Such an interpretation baffles the mind as it diminishes the idea of God as a spirit, and creates God into man’s image, something which a man does!</span></p><span data-dcnode-id="3670" instrument_node="">
</span><p data-dcnode-id="3665"><span data-dcnode-id="3669" instrument_node="">If the metaphysical scholar Gaskell truly understood the metaphysical mind of the early Jewish sages and his symbols are correct, then the better interpretation would be that Adam and Eve’s nakedness had nothing to do with being physically naked, but rather that they had no mental perception of “knowing” good from evil, and this IS their innocence! In order to experience “knowledge” of anything, spirit, an abstraction, needs a form, or a soul to express through. In other words, Adam and Eve were mentally and emotionally naked. Nakedness, viewed through the concept of a mental phenomenon, explains Adam and Eve’s </span><em data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">innocence</span></em><span data-dcnode-id="3666" instrument_node=""> by the absence of such a condition as their eyes were not yet opened to “know.” Genesis seems to make this clear, and it is often ignored by the more literal view. For after eating of the “fruit” of the tree of knowledge of good and evil, something quite significant happened!</span></p><span data-dcnode-id="3664" instrument_node="">
</span><p data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">“And the eyes of both of them were opened, and they knew that they were naked…” (Genesis 3:7).</span></p><span data-dcnode-id="3661" instrument_node="">
</span><p data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">In the literal interpretation of dogmatism, we are conditioned to think this was an “disobedient” act or decision that caused a fall from grace. This is silly. How can Adam and Eve make a decision to act in disobedience when they had no knowledge yet of what good and evil even were? Can a baby be held responsible for disobeying a rule from a parent when they don’t understand what a rule is? Of course not! And any sane parent wouldn’t place a rule upon a baby unless he or she knew that the child was old enough to cognize, or at least have the capacity to cognize, why such a rule is put in place if they break it. Any sane parent wouldn’t demand a one-month old not touch a stove. They would wait until the child had developed certain mental faculties to understand a parent’s demand should such laws of the household be broken. </span></p><span data-dcnode-id="3658" instrument_node="">
</span><p data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">But returning to the allegory of Adam and Eve, what caused them to “know?” Could this be a new acquired mental phenomenon? </span></p><span data-dcnode-id="3655" instrument_node="">
</span><p data-dcnode-id="3650"><span data-dcnode-id="3654" instrument_node="">Let’s explore further? What caused their “eyes” to be “opened?” No doubt the Genesis author attributes it to eating this fruit of the tree. But I am going to propose, as Gaskell does, that this fruit, or type of food, is a symbol of something mental, not physical. Just as physical food is sustenance for the physical body, food in the Bible is a symbol for mental phenomenon, i.e., facts and opinions and ideas, which become sustenance for the evolvong and growing </span><em data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">mind</span></em><span data-dcnode-id="3651" instrument_node="">. As we will see, the command to be “fruitful and multiply” has to do with children, sons and daughters, which are ideas (sons) and emotions (daughters) through the intercourse of man’s subjective mind with his or her objective external reality.&nbsp;</span></p><span data-dcnode-id="3649" instrument_node="">
</span><p data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">And how do we get from this innocence, this nakedness of not “knowing,” to “knowing something?” Was the spiritual condition of Adam and Eve a type of perfection in the realm of spirit simply because they were innocent of any content of duality?&nbsp;</span></p><span data-dcnode-id="3646" instrument_node="">
</span><p data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">Now let’s consider the possibility that Gaskell is correct. Eating and drinking in scripture metaphysically refers to mental phenomena. In other words, scripturally, the eating of food is a symbol for the acquisition and interplay of mental and emotional experience. In some instances, this would symbolize the human soul (mind) operating through the animal soul, and in others, operating through the spiritual soul, depending on context.&nbsp;</span></p><span data-dcnode-id="3643" instrument_node="">
</span><p data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Perhaps in this light one can better understand Jesus’ commandment to eat his body and drink his blood. We are talking about assimilating Jesus’ spiritual teachings by the mind, which is why Paul says to renew one’s mind in Christ, or its regeneration according to spiritual principles. In the context of Adam and Eve, eating from the Tree of Knowledge of Good and Evil means assimilating ideas and opinions and facts which can only be birthed in a world of duality, where the divergence and confluence of thought and emotion based on one’s sense perception of reality as a conscious phenomenon, allows for the building up of the mental principle, or mind in man. A child must develop his or her mind in the same way from being a newborn to an independent thinker that is consciously aware of themselves as a subjective mentality vs the objective environment.&nbsp;</span></p><span data-dcnode-id="3640" instrument_node="">
</span><p data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">Even Isaiah 55:2-3 states:</span></p><span data-dcnode-id="3637" instrument_node="">
</span><p data-dcnode-id="3632"><span data-dcnode-id="3636" instrument_node="">“Hearken diligently unto me, and </span><strong data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">eat </span></strong><span data-dcnode-id="3633" instrument_node="">ye that which is good, and let your soul delight itself in fatness.”</span></p><span data-dcnode-id="3631" instrument_node="">
</span><p data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">Here, eating that which is good refers to mental ideas and concepts derived from truth, which sustains the soul (mind). In this context, eating to the “soul’s delight” would seem to imply that the “soul” is in fact referring to a type of fruitful mental perception and accumulation of good, or spiritual ideas.&nbsp;</span></p><span data-dcnode-id="3628" instrument_node="">
</span><p data-dcnode-id="3623"><span data-dcnode-id="3627" instrument_node="">To nail down the concept that eating refers to mental phenomena, one only has to look closely at the symbolism in the story of the risen Christ and the disciples on their way to Emmaus. The disciples </span><strong data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">reasoned </span></strong><span data-dcnode-id="3624" instrument_node="">together about what Chrit’s resurrection meant in great sadness. Jesus joined them on their walk, but their eyes were not yet opened to who he was. Jesus then reasons with them, expounding upon all the Old Testament scriptures.&nbsp;</span></p><span data-dcnode-id="3622" instrument_node="">
</span><p data-dcnode-id="3619"><em data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">“And beginning at Moses and all the prophets, he expounded unto them in all the scriptures the things concerning himself” (Luke 24: 27).&nbsp;</span></em></p><span data-dcnode-id="3618" instrument_node="">
</span><p data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">A few verses later, we have our connection with food and mental phenomenon, which has an eerily similarity with how the eyes of Adam and Eve were opened after eating from the fruit of the tree of knowledge.&nbsp;</span></p><span data-dcnode-id="3615" instrument_node="">
</span><p data-dcnode-id="3597"><em data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">“And it came to pass, as he sat at </span></em><strong data-dcnode-id="3610"><em data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">meat </span></em></strong><em data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">with them, he took break, and blessed it, and brake, and gave it to them. </span></em><strong data-dcnode-id="3605"><em data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">And their eyes were opened</span></em></strong><em data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">, and they </span></em><strong data-dcnode-id="3600"><em data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">knew</span></em></strong><em data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node=""> him…” (Luke 24: 30-31).</span></em></p><span data-dcnode-id="3596" instrument_node="">
</span><p data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">Did you catch the connection there? In both instances eating something resulted in “eyes” being “opened” and “knowledge” conferred! There is no awareness or major shift in mentality until the food is somehow involved. This should clue anyone in to the fact that the food is just symbolic of an inner psychological process. </span></p><span data-dcnode-id="3593" instrument_node="">
</span><p data-dcnode-id="3579"><span data-dcnode-id="3592" instrument_node="">In this story of Luke, it wasn’t until after the disciples ate bread with Jesus that their eyes were opened, and they came to mentally perceive who Jesus was as the risen Christ. Adam and Eve ate the fruit of the tree of knowledge, and their eyes were also opened. But there’s a difference. In both cases the opening of the eyes means that they mentally perceived, or “came to know something. However, and here’s the kicker: the first incident relates to </span><strong data-dcnode-id="3588"><em data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">external</span></em><span data-dcnode-id="3589" instrument_node=""> </span></strong><span data-dcnode-id="3587" instrument_node="">knowledge; the second incident relates to </span><strong data-dcnode-id="3584"><em data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">internal</span></em></strong><span data-dcnode-id="3583" instrument_node=""> knowledge. And now think about the statement of Christ, that the Kingdom of God is </span><em data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">within </span></em><span data-dcnode-id="3580" instrument_node="">you!</span></p><span data-dcnode-id="3578" instrument_node="">
</span><p data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">So why do I say internal knowledge? It is because the disciples, symbolizing “disciplined” attributes of the human soul or mind, unlike the earlier Adam and Eve, were able to perceive the truth of who Jesus was as the Christ simply because they were soul qualities that had been called out, chosen, and disciplined to such a degree by the spirit’s influence that were able to see clearly that true bread (or truth) from heaven (higher, spiritual mind). This doesn’t mean that they received enlightenment. It simply means that they could perceive something of the truth that they didn’t cognize before. &nbsp;</span></p><span data-dcnode-id="3575" instrument_node="">
</span><p data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">Another similar incident is told in John chapter twenty-one, where they dined together and “knew” it was the Lord.&nbsp;</span></p><span data-dcnode-id="3572" instrument_node="">
</span><p data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">Let’s look at a few symbols again with a little more detail and the authority of Gaskell.&nbsp;</span></p><span data-dcnode-id="3569" instrument_node="">
</span><p data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Now as soon as Adam and Eve ate of the Tree of the Knowledge of Good and Evil, “…the eyes of both of them were opened…” (Genesis 3:7).&nbsp;</span></p><span data-dcnode-id="3566" instrument_node="">
</span><p data-dcnode-id="3558"><span data-dcnode-id="3565" instrument_node="">Gaskell defines the term for </span><strong data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">Eye, </span></strong><span data-dcnode-id="3562" instrument_node="">or </span><strong data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">Eyesight</span></strong><span data-dcnode-id="3559" instrument_node=""> as: “A symbol of mental perception. Discernment of ideas and feelings as externalities of consciousness.”&nbsp;</span></p><span data-dcnode-id="3557" instrument_node="">
</span><p data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">So as the “eye” in scripture signifies mental perception, the ability of mind, eating food after seeing it means to sustain the mind and inform it with the nutrition of ideas, whether those ideas relate to truths or errors. Remember, Jesus stated that if the “eye” (not eyes) was single, then the whole body is full of light. So many metaphysical correlations here!</span></p><span data-dcnode-id="3554" instrument_node="">
</span><p data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">We can also infer from Genesis 3:7 that before man’s eyes were opened, there was no mental sustenance or discernment of ideas and feelings. In other words, there was no self awareness, or personal consciousness, or an individualized mind to contain them and produce personal choice. And this is the reason for their nakedness, or mental innocence. Without “self-consciousness” and personal choice, there is an innocence of mentality. Therefore Adam and Eve did not KNOW the DIFFERENCE between good and evil. This is another way of saying that there was not a self-aware mental nature to distinguish between concepts, facts, opinions, ideas, etc.&nbsp;</span></p><span data-dcnode-id="3551" instrument_node="">
</span><p data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">Let’s break this down a little further as it also makes sense in relation to another scripture:</span></p><span data-dcnode-id="3548" instrument_node="">
</span><p data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">“And when the woman saw that tree was good for food, and that it was pleasant to the eyes, and a tree to be desired to make one wise…” (Genesis 3:6)</span></p><span data-dcnode-id="3545" instrument_node="">
</span><p data-dcnode-id="3540"><span data-dcnode-id="3544" instrument_node="">Now according to Gaskell, if the eye symbolizes a discernment of ideas and feelings as externalities of consciousness, we can understand why the scripture directly above emphasizes the concept of </span><strong data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">desire</span></strong><span data-dcnode-id="3541" instrument_node=""> through Eve’s direction of her “eye” (or mental desire) on the fruit.&nbsp;</span></p><span data-dcnode-id="3539" instrument_node="">
</span><p data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">Now one could say, wait a minute, if Adam and Eve were still innocent of mental sustenance, how could Eve have desire before she ate? Does the six-month old baby have any desire before he or she develops responsible, self-aware thought? Of course not! But the undeveloped mind is still active in this desire, for a six-month old baby still has a desire to be fed and held, even though it might not be a self-conscious choice, but rather a blind instinct, but quite active in the instinct of bodily feeling. In Genesis, we also have a similar desire-mind instinct crawling around the Garden:</span></p><span data-dcnode-id="3536" instrument_node="">
</span><p data-dcnode-id="3531"><span data-dcnode-id="3535" instrument_node="">Gaskell defines the </span><strong data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">serpent</span></strong><span data-dcnode-id="3532" instrument_node=""> as: “A symbol of the desire-mind, which is more penetrative and captivating to the ego than any of the lower desires (beasts of the field).&nbsp;</span></p><span data-dcnode-id="3530" instrument_node="">
</span><p data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">Eve was captivated by the fruit of the tree of knowledge of good and evil by instinct, not personal, self-conscious choice.  And I propose that this “instinct” is the intelligence of the spirit’s unfoldment beyond self-conscious choice. We can therefore plainly see that Eve was deceived, not because she “knew” better, as a choice between something right or wrong, but because she was blind to an instinctive element which she herself represents as a motive to experience life. </span></p><span data-dcnode-id="3527" instrument_node="">
</span><p data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">As we study the nature of the intellect, we are going to see why this process, as it is explained allegorically, was necessary. The great mystic Blavatsky once stated that the intellect is developed at the expense of the spirit. This is a very important concept to understand. At first it sounds negative, but it is an important part of spiritual evolution, as the universal mind must first experience an allegorical “fall” into the lower aspect of matter to develop a self-conscious awareness so that THAT universal mind, as an individuated experience of spirit (man!), can rise again as a self-consciously aware spiritual entity! It is simply one of the aspects inherent in consciousness that unfolds in degrees and stages according to universal law. </span></p><span data-dcnode-id="3524" instrument_node="">
</span><p data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">This is a process whereas to “self-realize,” the infinite potential of spirit as an abstraction, or conscious fiction, has to walk out and realizes its potential becoming actual, by manifesting it through FORM as a self-aware, conscious soul, i.e., the human soul, or mind. The allegory of the fall explains then, metaphysically, that the first great sacrifice of spirit in a world of form was in order to express, or actualize its qualities. These qualities start out as divine ideation, or divine potential, but they are manifested through forms (matter), i.e., psychically, mentally, and spiritually as truly actualized souls. Adam and Eve then, with their fall, symbolize the development of that self-conscious individuated entity. The story of the risen Christ and the disciples on the way to Emmaus symbolize a further step of this process, as the mental faculty rising to understand, and perceive, life in the spiritual soul, which is above the thinking mind, and with which the the thinking mind has to link itself to.&nbsp;But just because it is beyond the thinking mind in degree, doesn’t mean that the thinking mind is dissolved or done away with. It still functions, but is now imbued with a more spiritual overview and understanding of the bigger picture. </span></p><span data-dcnode-id="3521" instrument_node="">
</span><p data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">This also explains the necessity of the lower mind experiencing its false personal self in the lower realms of matter. It has to TRANSCEND these limitations, or illusions, in order to KNOW itself. </span></p><span data-dcnode-id="3518" instrument_node="">
</span><p data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">Do we now understand that God is a God of becoming? I AM THAT I AM means, when more correctly translated, I become that which I BECOME. As a man thinketh in his heart (Ne’Fesh – the vitality of life principle, Eve), he or she BECOMES. </span></p><span data-dcnode-id="3515" instrument_node="">
</span><p data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">Let me repeat this important concept that is taught by Blavatsky and Gaskell and many other great metaphysicians of the world over: the thinking principle, i.e., our bundle of moral, ethical, and mental attributes, must cement itself to true spiritual intelligence, which then immortalizes its essence. The lower personal and thinking mind dies at physical death if it does not accomplish this process. In other words, and as Jesus said, in order to save one’s soul, one must lose it. What he means is that one’s personal thoughts and desires predicated upon carnal thinking rooted in selfishness must be given up for the sake of the spiritual soul within. In other words, the personal, egoic lower mind of personal selfish desire must be paralyzed, so that the spiritual influx of the higher mind can influence it, thereby resurrecting it to its true stature. Practices like meditation, concentration, and contemplation aid in paralyzing the lower thinking principle which is filled with carnality and thoughts that seek personal gratification. And now we may understand truly why even Eckart Tolle states that the personal thinking mind is an affliction which is hard to stop. His words for finding the free space in between personal thinking predicated upon the personal self is uncontrolled and undisciplined runaway thought that forms systematic destructive behavioral patterns of grasping the lower or carnal mind’s continued existence. True intellect, true intelligence, takes an influx of spiritual understanding, which is really nothing else than that which is predicated upon the universal truths and the laws of nature, the TRUE TORAH, or LAW, which involves all life and evolution of mental and spiritual faculties becoming established in the individual life of experience. When I state true law and Torah, I am speaking of all the ancient scriptures which ALL teach the same thing when understand in their esoteric significance beyond the dead letter of the law, or literal interpretations.&nbsp;</span></p><span data-dcnode-id="3512" instrument_node="">
</span><p data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">Now the bigger picture of the entire story of Adam and Eve begins to make more logical sense. The element of desire, as symbolized by the serpent, in conjunction with Eve, is already inherent in the innocence of Adam and Eve, and this paradise called Eden. Desire in and of itself is not evil. It is only when it combines with the rudimentary aspects of the mind (the serpent, or desire-mind) that desire, in conjunction with a personally aware ego, takes a spiritual negative turn. Desire manifests itself in the animal kingdom as pure instinct, but with man, through “thinking, self-reflection, and proper reasoning,” it can begin to rise again in conjunction with its spiritual origin and begin to function as the internal organ of the developing spiritual man. And this is why Moses and the prophets must come first, before Elijah (the higher emotions) and culminating in Jesus Christ.</span></p><span data-dcnode-id="3509" instrument_node="">
</span><p data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">Now, the practice of meditation is important as the process of paralyzing the lower egoic mind so that the soul can liberate itself from Egypt, or sensual pleasure and the attachments of such conditioning. However, and just as important, is balancing this with the heart where we view Jesus’ statements as the law being summed up on loving thy neighbor as thyself. There is then a balance between the “emotional” and “intellectual” aspect of the mind. Or, in other words, by loving others and the world at large, we are also in the process of paralyzing the personal desires which give us what we want only. But can we think that none of this takes “personal effort on our part? Our personal efforts ARE the process of denying the personal self to live for other. And understanding this spiritual process is where the intellect truly begins to shine once it realizes its need for cementing itself to our true spiritual natures, the eternal part of us. True intelligence is never prideful. It is that which understands the need to incorporate all of nature as part of the divine ideation for the evolution of all individuals in experience in relation to one another.&nbsp;</span></p><span data-dcnode-id="3506" instrument_node="">
</span><p data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">Adam and Eve falling from grace produces Cain and Abel. The two opposing lines of development, although both have their place. One centered in spiritual aspiration, the other in personal desire. </span></p><span data-dcnode-id="3503" instrument_node="">
</span><p data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">We will end here and take up part two going into some deeper aspects of Adam and Eve and what they represent as humanity. </span></p><span data-dcnode-id="3500" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="3499"></div></div><footer class="entry-footer" data-dcnode-id="3473"><p class="entry-meta" data-dcnode-id="3474"><span class="entry-categories" data-dcnode-id="3476"><span data-dcnode-id="3497" instrument_node="">Filed Under: </span><a data-dcnode-id="3495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/about-the-scriptures" rel="category tag"><span data-dcnode-id="3496" instrument_node="">About the Scriptures</span></a><span data-dcnode-id="3494" instrument_node="">, </span><a data-dcnode-id="3492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/consciousness" rel="category tag"><span data-dcnode-id="3493" instrument_node="">Consciousness</span></a><span data-dcnode-id="3491" instrument_node="">, </span><a data-dcnode-id="3489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/esoteric" rel="category tag"><span data-dcnode-id="3490" instrument_node="">Esoteric</span></a><span data-dcnode-id="3488" instrument_node="">, </span><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/literal-vs-spiritual" rel="category tag"><span data-dcnode-id="3487" instrument_node="">Literal vs Spiritual</span></a><span data-dcnode-id="3485" instrument_node="">, </span><a data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/meditation" rel="category tag"><span data-dcnode-id="3484" instrument_node="">Meditation</span></a><span data-dcnode-id="3482" instrument_node="">, </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/spirit-and-soul" rel="category tag"><span data-dcnode-id="3481" instrument_node="">Spirit and Soul</span></a><span data-dcnode-id="3479" instrument_node="">, </span><a data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/the-biblical-mind" rel="category tag"><span data-dcnode-id="3478" instrument_node="">The Biblical Mind</span></a></span><span data-dcnode-id="3475" instrument_node=""> </span></p></footer></article><article class="post-4667 post type-post status-publish format-standard has-post-thumbnail category-awakening category-consciousness category-esoteric category-exoteric category-meditation category-paul-and-mysticism entry" data-dcnode-id="3382" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="3454"><h1 class="entry-title" data-dcnode-id="3469" itemprop="headline"><a data-dcnode-id="3470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4667-the-mystery-of-gethsemane-grasping-the-importance-of-meditation.html" rel="bookmark"><span data-dcnode-id="3471" instrument_node="">The Mystery of Gethsemane: Grasping the Importance of Meditation</span></a></h1><span data-dcnode-id="3468" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="3455"><time class="entry-time" data-dcnode-id="3466" datetime="2022-02-08T22:47:18-05:00" itemprop="datePublished"><span data-dcnode-id="3467" instrument_node="">February 8, 2022</span></time><span data-dcnode-id="3465" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="3461" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="3462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/elizabeth" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="3463" itemprop="name"><span data-dcnode-id="3464" instrument_node="">Elizabeth Scott</span></span></a></span><span data-dcnode-id="3460" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="3457"><a data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4667-the-mystery-of-gethsemane-grasping-the-importance-of-meditation.html%23comments"><span data-dcnode-id="3459" instrument_node="">52 Comments</span></a></span><span data-dcnode-id="3456" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="3405" itemprop="text"><span data-dcnode-id="3453" instrument_node="">
</span><p data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">In 1 Thessalonians 5:17 St. Paul teaches, “Pray constantly; and for all things give thanks to God, because this is what God expects you to do in Christ Jesus” (Jerusalem Bible). A simpler translation renders this verse as “Pray without ceasing.” Tertullian of Carthage instructs, “Of prayer, nothing at all has been prescribed, except clearly ‘to pray at every time and every place…’ why should we not understand that, with absolutely perfect indifference, we must pray?” This admonition — that we must work to achieve an omnipresent state of “perfectly indifferent” prayer,&nbsp; or in simpler words meditation — might come as a shock to contemporary Christians who, unfortunately, are increasingly distant from the original meditation tradition. Many Christians now associate meditation with non-Christian eastern traditions, but really,&nbsp; the prolonged&nbsp; “indifferent” Christian prayer that we ought to pray is not much different than oriental meditation. For the sake of ease, I will now be referring to this specific style of prayer as “meditation.”&nbsp;</span></p><span data-dcnode-id="3450" instrument_node="">
</span><p data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">When we are taught to “Pray without ceasing” St. Paul doesn’t mean you should spend all of your waking hours prostrated in prayer! Rather, he is talking about being in a constant state of thanksgiving, echoing the Psalmist in Psalm 105: “Give thanks to Yahweh, call his name aloud/proclaim his deeds to the peoples!/Sing to him, play to him/tell over all his marvels!/Glory in his holy name/let the hearts that seek Yahweh rejoice!” (Psalm 105:1-3). The easiest way to maintain this state of mind is to train the mind to be able to reach prolonged states of intense contemplation. Sitting down to devote an hour or even 30 minutes to God can help you to feel the Holy Spirit at that moment, but more importantly, you are cultivating your mind and attaining insights that you continue to carry with you. Spontaneous prayer arises out of having insight into the all-encompassing significance of prayer, an insight that is best taught experientially through cultivating various states of contemplation.&nbsp;</span></p><span data-dcnode-id="3447" instrument_node="">
</span><p data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">The key to meditation practice is found in an esoteric reading of the Bible and careful study of ancient wisdom traditions which, east or west, all testify to the power of deep contemplation. People sometimes oversimplify meditation to be just about “clearing your mind” or sitting down for a long time focusing on your breath. That is fine, but decontextualizing your meditation practice from religious teaching is unlikely to have as lasting an impression. Jesus said, “I tell you solemnly, till heaven and earth disappear, not one dot, not one little stroke, shall disappear from the Law until its purpose is achieved” (Matthew 5:18). Esoterically, this verse means that awakening the Christ nature within requires the mastery of not just the higher mind, but also the lower mind. To awaken Christ mystically, you must first awaken Christ intellectually. In the spirit of “precept upon precept, line upon line, here a little and there a little” (Isaiah 28:13) let us proceed to look at the Bible in an esoteric way to uncover the teachings of attaining the Christ nature within.&nbsp;</span></p><span data-dcnode-id="3444" instrument_node="">
</span><p data-dcnode-id="3438"><span data-dcnode-id="3443" instrument_node="">Phillippians 2:6-8 reads “His state was divine, yet he did not cling to his equality with God but emptied himself to assume the condition of a slave, and become as men are; and being as all men are, he was humbler yet, even to accepting death, death on a cross.” Here we can see that death does not just mean </span><em data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">physical </span></em><span data-dcnode-id="3440" instrument_node="">death, but a deeper rift between Jesus’s godly nature and His descended condition, which is echoed in His cry of abandonment on the cross (“My God, my God, why hast Thou forsaken Me?”). This is not unique in the Bible; death usually signifies something deeper than just the end of mortal life. This is shown when Yahweh God tells Adam and Eve not to eat of the tree. Genesis 2:17 says, “The day you eat of it you shall most surely die.” Obviously, this didn’t refer to physical death, because when Adam and Eve ate the fruit of the tree they did not physically die. Like with Jesus’s Passion, death here signifies being abandoned by God. Jesus, being fully man as well as fully God, echoes our anguish in being separated from God, but through the mystery of His Incarnation, the hope of reconciliation manifests. Jesus’s prayer to His Father in the Garden of Gethsemane is a divine mystery through which Jesus’s Ascension back to His Father is foreshadowed even as He experiences the bitter pain of abandonment. And as we too have the hope of reconciliation with God, we too must follow His example and pray. Jesus told St. Margaret Mary Alacoque “I will make you partake of that sorrow unto death which it was My will to suffer in the Garden of Olives. United with Me in the humble prayer which I then offered to My Father.” Understanding the profound significance of this event, not only as part of Jesus’s redemptive passion which would provide for the remission of sins but also as a mystery in which we are called to partake in, let us examine the account of the garden of Gethsemane esoterically.&nbsp;</span><img data-dcnode-id="3439" height="276" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh4.googleusercontent.com/phQeUd07K7cuIDjJi-vSerfQMFf_OfejOTNAfX8opZmeyPHObta_hdo2wqXNz5uyYpZ1Vlc4unYmitGcdy__U9Q03Echob0cBS9nmm2dZ8O5c3sPa9TQ8C_-Ck0o_isLx4mpp4lV&amp;raw" width="415"></p><span data-dcnode-id="3437" instrument_node="">
</span><p data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">“After psalms had been sung they left for the Mount of Olives.” (Matthew 26:30) First, we must establish what the Mount of Olives signifies. The Mount of Olives, or the Garden of Gethsemane, like other gardens in the Bible, signifies purity and fruition. In Genesis we read, “Yahweh God took the man and settled him in the garden of Eden to cultivate and take care of it” (Genesis 2:15). The garden represents the plane of the mind that is fertile (“From the soil, Yahweh God fashioned all the wild beasts and all the birds of Heaven” — Genesis 2:19) where virtues of the soul are brought forth. Singing psalms implicates the elevation of the self; through psalms, one acquires the spirit of thanksgiving proper to ascend to the Garden of Gethsemane.&nbsp;</span></p><span data-dcnode-id="3434" instrument_node="">
</span><p data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">“Jesus said to his disciples, ‘Stay here while I pray.’ Then he took Peter and James and John with him” (Mark 14:32-33). Peter, James, and John are generally considered Jesus’s most favored of the disciples; this exact trio shows up several times throughout the Bible. They signify faith (Peter), the intellect (James), and love (John). Notably, these are the only disciples, and therefore the only qualities of the self, that are permitted to ascend to the Garden.&nbsp;</span></p><span data-dcnode-id="3431" instrument_node="">
</span><p data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">“When they reached the place he said to them, ‘Pray not to be put to the test’” (Luke 22:40). As Peter, James, and John represent faith, the intellect, and love, here Jesus is saying to treasure the virtues of faith, the intellect, and love, and to pray that they do not waver. As we will read, even these virtues are not infallible; however, preemptively rejecting them prevents us from transcending them. To the contrary of rejecting the virtues, Jesus tells the disciples, “My soul is sorrowful to the point of death. Wait here and keep awake with me” (Matthew 26:38).</span></p><span data-dcnode-id="3428" instrument_node="">
</span><p data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">“Then he withdrew from them, about a stone’s throw away, and knelt” (Luke 22:41). Here, the soul is still very near to the three virtues, only a stone’s throw away, but it has “withdrawn” from them, prepared to transcend.&nbsp;</span></p><span data-dcnode-id="3425" instrument_node="">
</span><p data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">“He threw himself on the ground and prayed that, if it were possible, this hour might pass him by. ‘Abba (Father)!’ he said. ‘Everything is possible for you. Take this cup away from me. But let it be as you, not I, would have it’” (Mark 14:35-36). The “cup” in esoteric literature is traditionally understood to be a receptacle of wisdom; so the Pistis Sophia says “A higher power bringeth a Cup full of intuition and wisdom.” This verse is demonstrating the disconcerting quality of wisdom; our primal instinct flees wisdom, but the Christ nature turns over the instinctive self to God. The human aversion towards wisdom is well documented throughout theology, psychology, and history. The primordial human problem can be seen to be the human preference of illusions over reality; indeed, the comical lengths that each one of us will go to in order to maintain the illusion is inexplicable. The triumph over the instinct of delusion is fulfilled only in the elusive Garden.&nbsp;</span></p><span data-dcnode-id="3422" instrument_node="">
</span><p data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">“Then an angel appeared to him, coming from heaven to give him strength” (Luke 22:43). This verse demonstrates that despite the utter isolation experienced by Christ in the Garden, it is impossible for Him (or for us) to ever be completely severed from the Heavens above, and always the Father is with us sending His heavenly messengers to embolden us for the coming battle.&nbsp;</span></p><span data-dcnode-id="3419" instrument_node="">
</span><p data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">“He came back and found them sleeping, and he said to Peter, ‘Simon, are you asleep? Had you not the strength to keep awake one hour? You should be awake, and praying not to be put to the test. The spirit is willing, but the flesh is weak’” (Mark 14:37-38). Here we see the failure of the three virtues. Sleep signifies oblivion; this passage shows that the three virtues do not together contain all wisdom, but that the Christ nature transcends them. “Flesh” represents the lower nature of the self; spirit, as Gaskell put it, is the “formative aspect of the Divine outpouring.” In other words, the spirit is the receptacle in which God resides in us. When we are “put to the test,” for the Christ nature to rise within us the spirit must ultimately transcend the weaker virtues of the flesh.&nbsp;</span></p><span data-dcnode-id="3416" instrument_node="">
</span><p data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">“Again he went away and prayed, saying the same words…He came back a third time and said to them, ‘You can sleep on now and take your rest. It is all over. The hour has come’” (Mark 14:39;41). The number “three” represents completeness, as in the Holy Trinity and the Resurrection (Jesus arose from the dead on the third day). The number denotes that something transformative has transpired here. By saying “It is all over,” Jesus is foreshadowing His final victory on the Cross — “It is consummated” (John 19:30). The spirit has finally triumphed over the weaker aspects of the self, and the weaker self can “rest.” This calls back to Genesis 2:3; “God blessed the seventh day and made it holy because on that day he had rested after all his work of creating.” Of course, the word “day” does not refer to a 24 hour period but to the final stage that follows the creative period. In the Garden of Gethsemane, Jesus has finished His anguished mystery, and His disciples, not destroyed but in a state of repose, are justly restored to the rest that has no end.&nbsp;</span></p><span data-dcnode-id="3413" instrument_node="">
</span><p data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">An esoteric reading of the Garden of Gethsemane provides us with a template wherein the Christ nature in us triumphs over the weaker flesh. Through understanding the significance of the Garden, may you feel driven to start a practice of contemplation so that you may experience this elusive mystery yourself.&nbsp;</span></p><span data-dcnode-id="3410" instrument_node="">
</span><p data-dcnode-id="3408"><img data-dcnode-id="3409" height="562" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh4.googleusercontent.com/Cr349Sa8yJV_9Q7Vq49YrF4fj6i76qR8qhSDGRwkCqV219wJ8fRS0fw83qvlwIadnk0pK4WzuOfTYvIfTnO3pQvG-bjitjAnyAE0_VoLdI6xlJRYM0hDLplEhR4_el8pZltmhzw1&amp;raw" width="499"></p><span data-dcnode-id="3407" instrument_node="">
</span><div class="swp-content-locator" data-dcnode-id="3406"></div></div><footer class="entry-footer" data-dcnode-id="3383"><p class="entry-meta" data-dcnode-id="3384"><span class="entry-categories" data-dcnode-id="3386"><span data-dcnode-id="3404" instrument_node="">Filed Under: </span><a data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/awakening" rel="category tag"><span data-dcnode-id="3403" instrument_node="">Awakening</span></a><span data-dcnode-id="3401" instrument_node="">, </span><a data-dcnode-id="3399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/consciousness" rel="category tag"><span data-dcnode-id="3400" instrument_node="">Consciousness</span></a><span data-dcnode-id="3398" instrument_node="">, </span><a data-dcnode-id="3396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/esoteric" rel="category tag"><span data-dcnode-id="3397" instrument_node="">Esoteric</span></a><span data-dcnode-id="3395" instrument_node="">, </span><a data-dcnode-id="3393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/exoteric" rel="category tag"><span data-dcnode-id="3394" instrument_node="">Exoteric</span></a><span data-dcnode-id="3392" instrument_node="">, </span><a data-dcnode-id="3390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/meditation" rel="category tag"><span data-dcnode-id="3391" instrument_node="">Meditation</span></a><span data-dcnode-id="3389" instrument_node="">, </span><a data-dcnode-id="3387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idcategory/paul-and-mysticism" rel="category tag"><span data-dcnode-id="3388" instrument_node="">Paul and Mysticism</span></a></span><span data-dcnode-id="3385" instrument_node=""> </span></p></footer></article><article class="post-4627 post type-post status-publish format-standard has-post-thumbnail category-about-the-scriptures category-awakening category-consciousness category-esoteric category-good-and-evil category-law-vs-grace category-literal-vs-spiritual category-salvation category-science-and-spirituality category-the-biblical-mind tag-bible tag-body tag-christ tag-emotion tag-intellect tag-mind tag-paul tag-risen entry" data-dcnode-id="3214" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="3364"><h1 class="entry-title" data-dcnode-id="3379" itemprop="headline"><a data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4627-resurrecting-biblical-terms.html" rel="bookmark"><span data-dcnode-id="3381" instrument_node="">Resurrecting Biblical Terms</span></a></h1><span data-dcnode-id="3378" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="3365"><time class="entry-time" data-dcnode-id="3376" datetime="2021-04-28T21:48:46-05:00" itemprop="datePublished"><span data-dcnode-id="3377" instrument_node="">April 28, 2021</span></time><span data-dcnode-id="3375" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="3371" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="entry-author-link" data-dcnode-id="3372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idauthor/admin" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="3373" itemprop="name"><span data-dcnode-id="3374" instrument_node="">Joshua Tilghman</span></span></a></span><span data-dcnode-id="3370" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="3367"><a data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/id4627-resurrecting-biblical-terms.html%23comments"><span data-dcnode-id="3369" instrument_node="">71 Comments</span></a></span><span data-dcnode-id="3366" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="3274" itemprop="text"><span data-dcnode-id="3363" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3361"><img alt="" class="wp-image-4636" data-dcnode-id="3362" sizes="(max-width: 931px) 100vw, 931px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/wp-content/uploads/2021/04/mind-3.jpg&amp;raw" srcset="http://www.spiritofthescripture.com/wp-content/uploads/2021/04/mind-3.jpg 931w, http://www.spiritofthescripture.com/wp-content/uploads/2021/04/mind-3-273x300.jpg 273w, http://www.spiritofthescripture.com/wp-content/uploads/2021/04/mind-3-768x845.jpg 768w"></figure><span data-dcnode-id="3360" instrument_node="">
</span><p data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">In its esoteric sense, the risen Christ is an emblem – built upon many symbols in Biblical literature – of the supreme intelligence dwelling in the holy temple of man, or, more accurately, of the mind. It is the end goal of human consciousness so aptly expressed by the Apostle Paul who stated, “I travail in birth until Christ be formed IN you.” The same sentiment is expressed in John 4:2, which further states, “Christ must come in the flesh,” or the expression of Jesus in the Gospel of John 14:20 which states, “In that day you will realize [consciously perceive] that I am in my father, and you are in me, and I in you.” In the context of all these scriptural expressions, one can begin to grasp Luke 17:21: “The kingdom of God is [truly] within you.” As above, so below.&nbsp;</span></p><span data-dcnode-id="3357" instrument_node="">
</span><p data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">But what is this supreme intelligence, the risen Christ, in the MIND of man? I like to think of it as the supra-rational order of the Logos, which is an alchemical combination of two concepts: love, or unity, achieved through the wisdom of experience, wherein the spiritual law, or karma, is ever striving to bring to equilibrium between the knowledge of good and evil within man. Jesus is THE MASTER emblem of the mind which achieved this great feat in human form. For he fulfilled the law, and IN Christ Jesus, the schoolmaster, or law, achieved its end result. True liberty from that law is the mind’s destiny. Again, in its esoteric sense, this liberty is expressed through the mind that is no longer identified with, or trammeled by, the passions expressed in the lower mind through the bodies of man. As Paul states, and I paraphrase many of his thoughts…these members must be mortified if the mind is ever to be regenerated and escape the prison shackles of what he termed the “flesh.” For he also states, the mind of the flesh is death…” (Romans 8:6).&nbsp;</span></p><span data-dcnode-id="3354" instrument_node="">
</span><p data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">The journey is long and arduous. There are many mental giants to slay. In our greatest trials and adversities, the Kingdom of Heaven is taken by force. Not physical force, but mental force. This mental force is the control of thought and emotion, that contrary to our true nature, is usually governed by personal desire in the flesh…until the resurrection, or that which is the conqueror, the Self over the Not-Self. Christ over the flesh. </span></p><span data-dcnode-id="3351" instrument_node="">
</span><p data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">But this is a paradox. How can using our mental faculties help us achieve spiritual growth if it is Christ, the true redeemer, and not the efforts of man him or herself?&nbsp;</span></p><span data-dcnode-id="3348" instrument_node="">
</span><p data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">The paradox is easily resolved, and one finds that it is really no paradox at all when one understands how the MIND grows spiritually. The rest of this post will deal with that subject in detail using some of the Apostle Paul’s greatest teachings.&nbsp;</span></p><span data-dcnode-id="3345" instrument_node="">
</span><p data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">Let’s consider the supposed paradox further: no man can redeem him or herself as traditional church doctrine teaches, because it is only through the saving grace of Christ. But the esoteric doctrine of past ages taught that man must save himself through his or her own unrelenting effort. Who is right? I believe both are right, because the concept of Christ coming in the flesh is an inherent part of both paths – faith and works – expressed through mental energy. My scripture to support this idea is written:&nbsp;</span></p><span data-dcnode-id="3342" instrument_node="">
</span><p data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">“As a man THINKETH in his heart, so is he…” (Proverbs 23:7).&nbsp;</span></p><span data-dcnode-id="3339" instrument_node="">
</span><p data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">Let’s break this down a little further. Paul uses symbolism to express this process. When the symbols are understood correctly, I believe the paradox is resolved. The author of Peter states that Paul’s writings are hard to understand. The reason for this is that Paul is using language that is esoteric / symbolic, and his symbolism expresses a process of MIND and THOUGHT. The popular teaching of Paul which states that a woman must be silent in church and submit to her husband is not speaking in literal terms. Failure to understand the esoteric teachings of Paul has led to misogynism in traditional religious doctrine. But Paul had no such ideas in mind. Paul uses terms like husband and wife, or man and woman, to show a process of regeneration of THOUGHT, which is why so many Greek words are used to express the concepts of correct thought in his writings. Let’s break down the symbols.&nbsp;</span></p><span data-dcnode-id="3336" instrument_node="">
</span><p data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">Man means the intellectual side of the mind. A woman is the emotional side of the mind. Man (mind) and woman (emotion) come together to produce sons and daughters, or more thoughts and emotions. The firstborn sons which God demands that the Israelites (little developed mental qualities) dedicate to God simply means that our first thoughts in all life should be dedicated to spiritual pursuit. When this happens, then the daughters of men (mind) become the righteous woman, meaning a healthy balance between the intellect and emotion-nature within us. Isn’t this the true meaning of Paul’s words when he states that we are the bride to be prepared for the bridegroom which is Christ? When our thoughts are captivated by personal desire (the serpent seducing Eve), the daughter or emotion within man becomes the harlot. The harlot symbolically cheats the intellect within each individual through adultery. Did not Eve do the same? Did she not symbolically drag the intellect (Adam) into the depths of sin, or separation from spiritual life of the spirit of God. This is the true meaning of the story of Adam and Eve. Adam, or the intellect, was not deceived (1 Tim. 2:14), for by its very nature, pure intellect of a spiritual nature cannot be deceived. But when it becomes entangled with lower emotion, or personal desire, it is always deceived, because personal ambition is the very root and cause of God’s saying: Man’s heart (mind) is deceitful. Why? Because personal desire, when mired with thought, creates a separateness from God, which is missing the mark, or sin, the veil. This veil is what Paul means when he states now we see, or perceive mentally, through a glass darkly (1 Cor. 13:12). Consider that when the fallen angels (higher minds from heaven) came unto the daughters (or emotions) of men before Noah’s flood. What was the result? That the imagination, or THOUGHTS of man, was evil, or veiled from the truth!</span></p><span data-dcnode-id="3333" instrument_node="">
</span><p data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">The garden of Eden is about the separation of mind and emotion through Adam and Eve, which come into conflict with one another after the desire mind (the serpent) tempts the emotional side of the mind to eat (perceive) the knowledge of good and evil. Paul understood very well that the concept of Good and Evil meant in genesis relates to karma, for he states, let God not be mocked, for a man shall reap what he sows. But this law of karma, represented in the Torah, has a redeeming quality, which is why Paul calls all of the law, or Torah, spiritual. This is also the reason why he saw Christ, or the Logos, within the Old Testament working alongside the Israelite delivery. For Paul, the Isrealite delivery is the mind liberated from captivity in Egypt, which represents mental bondage. So how does this law of karma have a redeeming quality? Because as a man reaps what he sows, he slowly becomes self-aware, through experience, of that which causes life or death. It is truly a schoolmaster to show us that the mind, when captivated by desire, brings death (or separation / sin) from the unity of God. The Israelites, once in the wilderness, desired to go back to that mental prison in Egypt because they had “flesh” to eat. The mind likes to stay where it is comfortable, even if it is a prison, because ignorance can be temporarily quite comforting. But even in that temporary comfort, death is the end result, for all the wages of sin (separation from God) are death.&nbsp;</span></p><span data-dcnode-id="3330" instrument_node="">
</span><p data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">God states, my people perish for a lack of knowledge. Ignorance, in all aspects of life, leads to destruction. The constant cycle of life and death, or, more accurately, birth and rebirth, is the destiny of the mind that has not conqueurored its desire nature, which is more subtle than any beast (passion of the body) in the field (the mental arena of life). The risen Christ at the end of the long mental journey signifies the release of the mind in physical birth and rebirth, and being able to explore higher conscious realms with a new type of spiritual body that hasn’t lost its true identity in the flesh.&nbsp;</span></p><span data-dcnode-id="3327" instrument_node="">
</span><p data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">So when Paul uses terms like man and woman, he is expressing the process whereby the mind of man once again unites Adam and Eve, and the conflict between intelligence and emotion can be finally resolved.&nbsp;</span></p><span data-dcnode-id="3324" instrument_node="">
</span><p data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">Let’s use an easy analogy. All married couples go through mental and emotional turmoil after the honeymoon stage is over, and the different currents of thought and personal desires of each spouse begin to clash. Why do they clash? Because each is an individual with different personal desires, interests, passions, beliefs, etc. What originally brought them together, personal desire, eventually becomes the very thing that tears them apart. The married couple that grows to maturity and remains a happy healthy unit can only do so by each one sacrificing his or her own personal desires for the other. Such a sacrificial love of action from the mental efforts of both parties brings a certain intellectual and emotional balance to the divided unit. Paul uses the natural concept of marriage to show how the same process happens within the individual. The risen Christ can only arise in the flesh when personal desires have been checked. Not only checked, but conquered. This is the long and arduous battle within the mind (the crucifixion of Golgotha, the skull / mind)&nbsp; or church, of the human being. For the church is not the body itself, but an aspect of the mind which is free from personal desires and pulls of our limiting and transient personalities. Personalities are formed through a complex web of thoughts and emotions in response to the environment and one’s own innate essence built up from former lives. It is very real to our current limited reality, but also transient and corrupt in the grander scheme in the unfoldment of consciousness. The mind, the immortal thinker, is a sojourner (the prodigal Son) in this land we call the body, and the personality which is formed in each life from the mind’s interaction of being in the body, must be transcended if the mind is to be released from its prison.&nbsp;Hebrews 11:8-10 esoterically illustrates this process which is also the allegory of the prodigal son:</span></p><span data-dcnode-id="3321" instrument_node="">
</span><p data-dcnode-id="3313"><span data-dcnode-id="3320" instrument_node="">“By faith Abraham, when called to go to a place he would later receive as his inheritance,&nbsp;obeyed and went,&nbsp;even though he did not know where he was going.&nbsp;</span><sup data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">9&nbsp;</span></sup><span data-dcnode-id="3317" instrument_node="">By faith he made his home in the promised land&nbsp;like a stranger in a foreign country; he lived in tents,&nbsp;as did Isaac and Jacob, who were heirs with him of the same promise.&nbsp;</span><sup data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">10&nbsp;</span></sup><span data-dcnode-id="3314" instrument_node="">For he was looking forward to the city&nbsp;with foundations,&nbsp;whose architect and builder is God.”</span></p><span data-dcnode-id="3312" instrument_node="">
</span><p data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">The “tents” which are spoken of are the limited bodies which the immortal mind must endure its long process of adversity through, to learn and grow, and become self-consciously aware.  This is why the original tabernacle of Moses in the wilderness was all called the “tent” of meeting for God and the people. The “city with foundations, whose architect and builder is God,” is all the mental faculties gathered together under the Christ, who sends the Holy Spirit, or wisdom, which transcends the limited nature of the bodies of man. When this is achieved, as Revelation states, “In him that overcometh I will make a pillar in the temple of my God (permanent mental foundation), and he shall go no more out…” (the cycle of birth and death, birth and rebirth). </span></p><span data-dcnode-id="3309" instrument_node="">
</span><p data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">Now let’s get into the nitty gritty of why Paul really tells us that a woman must be silent in the church. First off realize that the church is your higher mind, the immortal aspect of your soul. It has to be constructed of Christ, and little by little, our conscious essence is added to it in each life that you live whenever a thought reaches heaven because it is void of personal desire. It is the body (faculties of the mind) that the Christ is responsible for constructing as it permeates every aspect of our being, both body and soul. The disciples being centered around Jesus is representative of the 12 mental faculties being “gathered” together by Christ to be turned into apostles (mature mental faculties) at the next stage of spiritual and mental growth. Thus, spiritually speaking, we progress from Israelites, to disciples, to apostles. The Apostle Paul, that outside apostle who received direct revelation from the risen Christ on the road to Damascus, is symbolic of the bridge that births Christ within the mind of man.&nbsp;</span></p><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Now Paul tells us that a woman must be silent in the church because it is our emotions of personal desire (the woman – think Eve that succumbed to desire) that distorts the intellectual and rational nature of man’s thinking process. The heart of man is deceitful above all else, because the emotional woman (within man, as the unready bride of Christ) is always speaking loudly and drowning out the ability for true intellectual discernment, or truth of the spirit. This is also the great harlot of scripture, and it must be silenced because it always distorts the truth through its own personal desires. So when one does as Jesus states, and goes into the prayer closet and shuts the door for spiritual guidance, all emotional thought governing the intellect must be silenced! But in this act of the focused mind, the seeming paradox arises. Even though it takes mental effort to silence the emotions, the intellect, in this act, is itself laying down it’s life (silencing desire) for the woman, which in turn allows the harlot to be transformed into the higher emotions of love and unity, or the righteous woman! In such a sacrificial act of the intellect, through faith AND works, the intellect stops being in conflict with its emotional side. It leads in love, which brings unity between the two.&nbsp;</span></p><span data-dcnode-id="3303" instrument_node="">
</span><p data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">This is why Adam states a man shall leave his mother and father (the parents of karma and the law) and cleave unto his wife to make them one flesh. This is also why Jesus stated that in the beginning (before the fall in the garden), God meant for man to be ONE FLESH.&nbsp;</span></p><span data-dcnode-id="3300" instrument_node="">
</span><p data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">Please don’t misunderstand. I am not dividing genders like the dead letter of the law would have us believe. Each man and woman has an intellect and emotional nature within them.&nbsp;</span></p><span data-dcnode-id="3297" instrument_node="">
</span><p data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">Those who think of a very mature married couple can see how this plays out on our physical plane of life, which REFLECTS a higher spiritual truth about the MIND. When a man leads in a LOVING way, not sacrificing his own intellectual convictions, the woman’s desire naturally is to her husband (Genesis 3:16). Most women respect an intelligent man that leads and governs his own life with self control, inwardly being a rock, but expressing this firmness outwardly in a gentle, kind, and loving manner. Again, in the esoteric aspect, we are speaking spiritually about the MIND. But even in it’s exoteric expression, one can see the truth in this concept in some instances.&nbsp;</span></p><span data-dcnode-id="3294" instrument_node="">
</span><p data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">The process of marriage counseling is another good analogy to grasp the esoteric concept of Paul’s thinking process. When the mind becomes focused inward, it becomes meditative, and then through this inward self reflection process self awareness can trace its emotional-thought patterns which cause reaction to situations based on desire or raw passion, leading to conflict. The marriage counselor of couples therapy serves as a mediator to get the other spouse to perceive mentally where their own fault lies so that they can change and allow the relationship to heal. But man, as an individual, must have his or her own mediator, the Christ within, which is a process of rationalization at first, that grows into an intuition of truth as the higher emotion of love and unity, or reconciliation, happens within the mind. Slowly but surely, when meditation is done correctly in the church, the mind can begin a healing process, whereby its own internal conflict can be exposed, and the limited personality comes out of the dark and into the light of Christ. In this mental process, of defeating mental giants in the land (the mind or soul), that the process of losing one’s own life (the limited personality) for the sake of Christ’s life, that Christ as the head of the church rises within the mind. Jesus stated, a man must lose his own life in order to gain life (Matthew 10:39). Man’s personality is simply a cut-off entity from the supreme wisdom of God. It is a false entity that is at enmity with God. It is the Cain within, as Cain represents the personality, but the process of going within enables the Abel within to offer correct sacrifice that is pleasing to God – and these are the aspirations towards a higher truth.&nbsp;</span></p><span data-dcnode-id="3291" instrument_node="">
</span><p data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">A few more thoughts. It has been said that the intellect without intuition is blind, but intuition without the intellect is empty. This is a crucial concept which the philosopher Immauel Kant reintroduced into an intellectual stream of society born of reason. I say “reintroduced,” because nothing is new under the sun, and it was a foundational tenant, though expressed in complicated esoteric terms, from ages past. But the point is this: both intellect and intuition must be brought together in union, each part of the whole united to function properly which brings the light of wisdom into the soul or mind. This is the function of Christ as head of the church. Christ is in the entire process, and becomes the resurrected Christ when that inner power and united faculties of the mind is risen back to paradise, or a state of heavenly union.&nbsp;</span></p><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">Just as Christ is an emblem of Divine Wisdom (a feminine function relating to intuition reaped from the womb / matrix / body / Christ IN flesh), the serpent in the Garden of Eden is also a divine emblem. And it can be properly understood esoterically only in its relation to the Logos in the grand unfoldment of its function. Jesus stated, “As Moses raised the serpent in the wilderness (the battleground of defeating mental giants), so must the son of man (mind) be lifted up” (John 3:14). The serpent caused the fall of mind, but allegorically it is really no fall. It illustrates the truth that the mind was no longer united with God because the desire of the flesh (the serpent mind which crawls on the ground, earth, lower soul) put the intellect and emotional nature in conflict with one another, resulting in the “lower mind” which is that which is operating through the body and its animal passions and desire nature. The higher mind, or the church, must be built. When one’s personal desires are sacrificed, the serpent mind can be “lifted,”&nbsp; or transformed / regenerated back up to its proper place. The esoteric interpretation of Mark 16:18 is the key: one of the signs that shall follow a believer is that he or she will “lift” up serpents. The original Greek word there implies a raising of the desire-mind to its original condition of purity before the fall. It is the serpent mind (or personal desires based on conflicting thought and emotion / personal desire) which is “cursed” to crawl on the ground. This means a mind operating in the body, or lower soul of man, where it is cursed to die because it is imprisoned by its captivating carnality. And now we can also truly understand the depth and meaning of Buddha’s second noble truth, which is the same as the Bible’s New Testament: “All suffering comes from personal selfish desire.”</span></p><span data-dcnode-id="3285" instrument_node="">
</span><p data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">The LOGOS of John chapter one I believe reveals this to us: the sacrificial Lamb that came down from heaven to oversee the rational order of creation by becoming involved in it, even in it’s separated and sinful condition. This is the real meaning of Jesus being sacrificed since the foundation of creation, and visiting the depths of hell, the body, or the grave, sheol. This is also the esoteric interpretation of that scripture in Acts which states that the body of Jesus did not endure corruption because he fulfilled the spiritual law which frees all bodies from corruption. Remember, that through the LOGOS everything was made in heaven and earth. What we see as evil or good, God sees differently. God made both evil and good it states in Isaiah. Evil is not some entity called the devil, but it is the tool God uses through karmic results to bring man to the knowledge of the Christ when he or she CHOOSES life. It is the same schoolmaster which God used to reveal to Job the truth of God’s nature. Before Job was tempted, he only knew God through the hearing of the ear, or lower mind knowledge. But after Satan is used, Job goes through the process of evil to come to a more full and complete knowledge of God by the end of the book. The three friends who accused him esoterically symbolize the three bodies of the lower mental, astral, and physical nature. When one understands this deep esoteric teaching, many of the seemingly contradictions of the dead letter of scripture will be cleared up for you. For the immortal thinker that you truly are is not the body, astral / emotional mind of desire, incubated in a physical body – Job’s three friends. But it is Job, the individuality itself! As is Noah and Daniel of scripture, which explains this one great spiritual revelation:</span></p><span data-dcnode-id="3282" instrument_node="">
</span><p data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">“Though these three men, Noah, Daniel, and Job, were in it [physical life], they should deliver their own souls BY THEIR RIGHTEOUSNESS, saith the LORD GOD” (Ezekiel 14:14). By understanding the esoteric nature of this scripture of Ezekiel, one may understand the entire Bible from beginning to end in the bigger picture, and the risen Christ within, which must be birthed within you through travail (the karma of spiritual law / TORAH). For you are the immortal thinker, the I AM THAT I AM, trapped in a physical, emotional, and lower analytical mind.&nbsp;</span></p><span data-dcnode-id="3279" instrument_node="">
</span><p data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">Blessings!</span></p><span data-dcnode-id="3276" instrument_node="">

node-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idtag/christ" rel="tag"><span data-dcnode-id="3234" instrument_node="">christ</span></a><span data-dcnode-id="3232" instrument_node="">, </span><a data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idtag/emotion" rel="tag"><span data-dcnode-id="3231" instrument_node="">emotion</span></a><span data-dcnode-id="3229" instrument_node="">, </span><a data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idtag/intellect" rel="tag"><span data-dcnode-id="3228" instrument_node="">intellect</span></a><span data-dcnode-id="3226" instrument_node="">, </span><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idtag/mind" rel="tag"><span data-dcnode-id="3225" instrument_node="">mind</span></a><span data-dcnode-id="3223" instrument_node="">, </span><a data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idtag/paul" rel="tag"><span data-dcnode-id="3222" instrument_node="">paul</span></a><span data-dcnode-id="3220" instrument_node="">, </span><a data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiritofthescripture.com/idtag/risen" rel="tag"><span data-dcnode-id="3219" instrument_node="">risen</span></a></span></p></footer></article><article class="post-4595 post type-post status-publish format-standard has-post-thumbnail category-reincarnation category-salvation entry" data-dcnode-id="3025" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="3196"><h1 class="entry-title" data-dcnode-id="3211" itemprop="headline"><a data-dcnode-id="3212" href="https://chatnoir-webcontent.chatnoi
