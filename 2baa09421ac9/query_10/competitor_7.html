</span><div class="entry-content" data-dcnode-id="1913"><span data-dcnode-id="3582" instrument_node="">
</span><span data-dcnode-id="3579" instrument_node="">
</span><h4 data-dcnode-id="3575" style="text-align:center;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0;font-weight:bold"><span data-dcnode-id="3578" instrument_node="">
  “How to Procure the Peace-giving Presence of God”</span><br data-dcnode-id="3577"><span data-dcnode-id="3576" instrument_node="">
</span></h4><span data-dcnode-id="3574" instrument_node="">
</span><p data-dcnode-id="3572" style="text-align:center;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3573" instrument_node="">
  Philippians 4:8-9
</span></p><span data-dcnode-id="3571" instrument_node="">
</span><p data-dcnode-id="3567" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">INTRODUCTION What is the Meaning of Philippians 4.8-9 </span></strong><span data-dcnode-id="3568" instrument_node="">
</span></p><span data-dcnode-id="3566" instrument_node="">
</span><p data-dcnode-id="3564" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3565" instrument_node="">
  Philippians 4. There is a Chinese idiom that literally means “practice gives birth to great skill.” It is used to describe how skill comes from repeated practice and is similar to the English expression “practice makes perfect!”
</span></p><span data-dcnode-id="3563" instrument_node="">
</span><p data-dcnode-id="3557" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3562" instrument_node="">
</span><span data-dcnode-id="3559" style="display:inline-block;height:1em"><span data-dcnode-id="3560" style="display:none"><span data-dcnode-id="3561" instrument_node="">.</span></span></span><span data-dcnode-id="3558" instrument_node="">
</span></p><span data-dcnode-id="3556" instrument_node="">
</span><p data-dcnode-id="3554" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3555" instrument_node="">
  According to the story, during the Northern Song Dynasty (which lasted from 960–1127 A.D.), there was a very skilled archer named Chen. He never missed a bullseye and his students gave him the nickname “magic archer.” Chen was very proud of his skill and believed he was the best archer in the world.
</span></p><span data-dcnode-id="3553" instrument_node="">
</span><p data-dcnode-id="3547" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3552" instrument_node="">
</span><span data-dcnode-id="3549" style="display:inline-block;height:1em"><span data-dcnode-id="3550" style="display:none"><span data-dcnode-id="3551" instrument_node="">.</span></span></span><span data-dcnode-id="3548" instrument_node="">
</span></p><span data-dcnode-id="3546" instrument_node="">
</span><p data-dcnode-id="3544" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3545" instrument_node="">
  One day, while shooting arrows, Chen attracted a large crowd of onlookers that began to cheer him on. Among the crowd, there was an old, oil peddler who just shook his head and did not seem at all impressed.
</span></p><span data-dcnode-id="3543" instrument_node="">
</span><p data-dcnode-id="3537" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3542" instrument_node="">
</span><span data-dcnode-id="3539" style="display:inline-block;height:1em"><span data-dcnode-id="3540" style="display:none"><span data-dcnode-id="3541" instrument_node="">.</span></span></span><span data-dcnode-id="3538" instrument_node="">
</span></p><span data-dcnode-id="3536" instrument_node="">
</span><p data-dcnode-id="3534" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3535" instrument_node="">
  Surprised, Chen asked the oil peddler: “Can you do this?”  The peddler replied: “No, I can’t.” Chen then asked: “What do you think of my archery?”
</span></p><span data-dcnode-id="3533" instrument_node="">
</span><p data-dcnode-id="3527" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3532" instrument_node="">
</span><span data-dcnode-id="3529" style="display:inline-block;height:1em"><span data-dcnode-id="3530" style="display:none"><span data-dcnode-id="3531" instrument_node="">.</span></span></span><span data-dcnode-id="3528" instrument_node="">
</span></p><span data-dcnode-id="3526" instrument_node="">
</span><p data-dcnode-id="3521" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3525" instrument_node="">
  The oil peddler answered: “It is okay, but nothing special; </span><span data-dcnode-id="3523" style="text-decoration:underline"><span data-dcnode-id="3524" instrument_node="">all it takes is practice</span></span><span data-dcnode-id="3522" instrument_node="">.”
</span></p><span data-dcnode-id="3520" instrument_node="">
</span><p data-dcnode-id="3514" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3519" instrument_node="">
</span><span data-dcnode-id="3516" style="display:inline-block;height:1em"><span data-dcnode-id="3517" style="display:none"><span data-dcnode-id="3518" instrument_node="">.</span></span></span><span data-dcnode-id="3515" instrument_node="">
</span></p><span data-dcnode-id="3513" instrument_node="">
</span><p data-dcnode-id="3511" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3512" instrument_node="">
  This made Chen quite unhappy. One of his students said to the peddler: “No one can compare with my master’s skill in archery. How dare you underestimate my master’s skill?”
</span></p><span data-dcnode-id="3510" instrument_node="">
</span><p data-dcnode-id="3504" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3509" instrument_node="">
</span><span data-dcnode-id="3506" style="display:inline-block;height:1em"><span data-dcnode-id="3507" style="display:none"><span data-dcnode-id="3508" instrument_node="">.</span></span></span><span data-dcnode-id="3505" instrument_node="">
</span></p><span data-dcnode-id="3503" instrument_node="">
</span><p data-dcnode-id="3501" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3502" instrument_node="">
  Without saying a word, the oil peddler took a bottle, placed it on the ground, and put a copper coin with a square hole in the center over the top of the bottle. He then poured oil from a wooden ladle into the bottle, without spilling a single drop on the coin.
</span></p><span data-dcnode-id="3500" instrument_node="">
</span><p data-dcnode-id="3494" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3499" instrument_node="">
</span><span data-dcnode-id="3496" style="display:inline-block;height:1em"><span data-dcnode-id="3497" style="display:none"><span data-dcnode-id="3498" instrument_node="">.</span></span></span><span data-dcnode-id="3495" instrument_node="">
</span></p><span data-dcnode-id="3493" instrument_node="">
</span><p data-dcnode-id="3488" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3492" instrument_node="">
  The onlookers watched in amazement. The old oil peddler turned to Chen and said: “That was also nothing. I can do this </span><span data-dcnode-id="3490" style="text-decoration:underline"><span data-dcnode-id="3491" instrument_node="">because I have practiced it a lot</span></span><span data-dcnode-id="3489" instrument_node="">. Skill comes from practice.”
</span></p><span data-dcnode-id="3487" instrument_node="">
</span><p data-dcnode-id="3481" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3486" instrument_node="">
</span><span data-dcnode-id="3483" style="display:inline-block;height:1em"><span data-dcnode-id="3484" style="display:none"><span data-dcnode-id="3485" instrument_node="">.</span></span></span><span data-dcnode-id="3482" instrument_node="">
</span></p><span data-dcnode-id="3480" instrument_node="">
</span><p data-dcnode-id="3474" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3479" instrument_node="">
  With these words, the oil peddler left and the crowd became quiet.</span><sup data-dcnode-id="3476"><a data-dcnode-id="3477" href="#footnote-1" id="footnote-ref-1"><span data-dcnode-id="3478" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3475" instrument_node="">
</span></p><span data-dcnode-id="3473" instrument_node="">
</span><p data-dcnode-id="3467" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3472" instrument_node="">
</span><span data-dcnode-id="3469" style="display:inline-block;height:1em"><span data-dcnode-id="3470" style="display:none"><span data-dcnode-id="3471" instrument_node="">.</span></span></span><span data-dcnode-id="3468" instrument_node="">
</span></p><span data-dcnode-id="3466" instrument_node="">
</span><p data-dcnode-id="3460" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3465" instrument_node="">
  Both those men acquired great skill from practice. But it took </span><span data-dcnode-id="3462" style="text-decoration:underline"><em data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">much</span></em></span><span data-dcnode-id="3461" instrument_node=""> practice. But we live in a microwave generation. We want everything right now and few people are willing to work hard for great reward.
</span></p><span data-dcnode-id="3459" instrument_node="">
</span><p data-dcnode-id="3453" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3458" instrument_node="">
</span><span data-dcnode-id="3455" style="display:inline-block;height:1em"><span data-dcnode-id="3456" style="display:none"><span data-dcnode-id="3457" instrument_node="">.</span></span></span><span data-dcnode-id="3454" instrument_node="">
</span></p><span data-dcnode-id="3452" instrument_node="">
</span><p data-dcnode-id="3450" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3451" instrument_node="">
  That expectation carries over into our spiritual lives. Somebody said it’s like we expect a “spiritual hotpocket” of growth from God…that He should just zap us and we’re instantly mature! If I have those expectations and my life is filled with problems, I can’t understand how I got here. How many of us struggle every day or every week over the same sin issues over and over again all because we haven’t been willing to put in the hard work to overcome them and therefore procure and enjoy the peace of God.
</span></p><span data-dcnode-id="3449" instrument_node="">
</span><p data-dcnode-id="3443" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3448" instrument_node="">
</span><span data-dcnode-id="3445" style="display:inline-block;height:1em"><span data-dcnode-id="3446" style="display:none"><span data-dcnode-id="3447" instrument_node="">.</span></span></span><span data-dcnode-id="3444" instrument_node="">
</span></p><span data-dcnode-id="3442" instrument_node="">
</span><p data-dcnode-id="3440" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3441" instrument_node="">
  But this is what Christians do who stand firm in the Lord. These are the strong Christians! Strong Christians put in the hard work to get the peace of God.
</span></p><span data-dcnode-id="3439" instrument_node="">
</span><p data-dcnode-id="3433" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3438" instrument_node="">
</span><span data-dcnode-id="3435" style="display:inline-block;height:1em"><span data-dcnode-id="3436" style="display:none"><span data-dcnode-id="3437" instrument_node="">.</span></span></span><span data-dcnode-id="3434" instrument_node="">
</span></p><span data-dcnode-id="3432" instrument_node="">
</span><p data-dcnode-id="3427" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3431" instrument_node="">
  We’re in a section that’s emphasizing the theme of the whole letter of Philippians: Joyful Christian maturity. </span><strong data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">Philippians 4:1-9</span></strong><span data-dcnode-id="3428" instrument_node=""> emphasizes that Christian maturity is joyful and thus should be attractive to all of us.
</span></p><span data-dcnode-id="3426" instrument_node="">
</span><p data-dcnode-id="3420" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3425" instrument_node="">
</span><span data-dcnode-id="3422" style="display:inline-block;height:1em"><span data-dcnode-id="3423" style="display:none"><span data-dcnode-id="3424" instrument_node="">.</span></span></span><span data-dcnode-id="3421" instrument_node="">
</span></p><span data-dcnode-id="3419" instrument_node="">
</span><p data-dcnode-id="3411" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3418" instrument_node="">
  Verse 1, in this way stand firm in the Lord! In what way? </span><strong data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">Unity</span></strong><span data-dcnode-id="3415" instrument_node=""> verses 2-3; Strong Christians, those who stand firm, work on unity in the church; they also v. 4 </span><strong data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">rejoice</span></strong><span data-dcnode-id="3412" instrument_node=""> in the Lord always despite the circumstances.  Verse 5, they have learned through the practice of proper praying not to be anxious about anything, but instead they have God’s peace.
</span></p><span data-dcnode-id="3410" instrument_node="">
</span><p data-dcnode-id="3404" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3409" instrument_node="">
</span><span data-dcnode-id="3406" style="display:inline-block;height:1em"><span data-dcnode-id="3407" style="display:none"><span data-dcnode-id="3408" instrument_node="">.</span></span></span><span data-dcnode-id="3405" instrument_node="">
</span></p><span data-dcnode-id="3403" instrument_node="">
</span><p data-dcnode-id="3401" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3402" instrument_node="">
  And now to conclude this section of what Christians maturity looks like, Paul focuses on our thoughts and behaviours. If we follow Paul’s counsel here, we’re promised the peace of God.
</span></p><span data-dcnode-id="3400" instrument_node="">
</span><p data-dcnode-id="3394" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3399" instrument_node="">
</span><span data-dcnode-id="3396" style="display:inline-block;height:1em"><span data-dcnode-id="3397" style="display:none"><span data-dcnode-id="3398" instrument_node="">.</span></span></span><span data-dcnode-id="3395" instrument_node="">
</span></p><span data-dcnode-id="3393" instrument_node="">
</span><p data-dcnode-id="3389" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">Philippians 4:8–9</span></strong><span data-dcnode-id="3390" instrument_node=""> 8 Finally, brethren, whatever is true, whatever is honorable, whatever is right, whatever is pure, whatever is lovely, whatever is of good repute, if there is any excellence and if anything worthy of praise, dwell on these things. 9 The things you have learned and received and heard and seen in me, practice these things, and the God of peace will be with you.
</span></p><span data-dcnode-id="3388" instrument_node="">
</span><p data-dcnode-id="3382" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3387" instrument_node="">
</span><span data-dcnode-id="3384" style="display:inline-block;height:1em"><span data-dcnode-id="3385" style="display:none"><span data-dcnode-id="3386" instrument_node="">.</span></span></span><span data-dcnode-id="3383" instrument_node="">
</span></p><span data-dcnode-id="3381" instrument_node="">
</span><p data-dcnode-id="3375" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3380" instrument_node="">
</span><span data-dcnode-id="3377" style="display:inline-block;height:1em"><span data-dcnode-id="3378" style="display:none"><span data-dcnode-id="3379" instrument_node="">.</span></span></span><span data-dcnode-id="3376" instrument_node="">
</span></p><span data-dcnode-id="3374" instrument_node="">
</span><p data-dcnode-id="3368" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3373" instrument_node="">
</span><span data-dcnode-id="3370" style="display:inline-block;height:1em"><span data-dcnode-id="3371" style="display:none"><span data-dcnode-id="3372" instrument_node="">.</span></span></span><span data-dcnode-id="3369" instrument_node="">
</span></p><span data-dcnode-id="3367" instrument_node="">
</span><p data-dcnode-id="3365" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3366" instrument_node="">
  Since this is a passage about strong Christians, those who stand firm in the Lord, we can deduce that the weak don’t control their hearts and thereby choose to dwell on displeasing-to-God thoughts. However, the strong guard their hearts, survey their thoughts and seek to determine whether this thought is worth dwelling on. If it’s not, they reject it and replace it with a thought worthy to dwell on.
</span></p><span data-dcnode-id="3364" instrument_node="">
</span><p data-dcnode-id="3358" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3363" instrument_node="">
</span><span data-dcnode-id="3360" style="display:inline-block;height:1em"><span data-dcnode-id="3361" style="display:none"><span data-dcnode-id="3362" instrument_node="">.</span></span></span><span data-dcnode-id="3359" instrument_node="">
</span></p><span data-dcnode-id="3357" instrument_node="">
</span><p data-dcnode-id="3350" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">Motivation</span></strong><span data-dcnode-id="3354" instrument_node="">: So don’t you want to have God’s peace even when life is difficult? When your spouse is doing or saying this when you’re kids this or that or when this or that at work happens?  When everything in your life doesn’t seem to be going your way, you can still have peace! </span><strong data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">Proverbs 4:23</span></strong><span data-dcnode-id="3351" instrument_node=""> 23 Watch over your heart with all diligence, for from it flow the springs of life.
</span></p><span data-dcnode-id="3349" instrument_node="">
</span><p data-dcnode-id="3343" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3348" instrument_node="">
</span><span data-dcnode-id="3345" style="display:inline-block;height:1em"><span data-dcnode-id="3346" style="display:none"><span data-dcnode-id="3347" instrument_node="">.</span></span></span><span data-dcnode-id="3344" instrument_node="">
</span></p><span data-dcnode-id="3342" instrument_node="">
</span><p data-dcnode-id="3340" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3341" instrument_node="">
  That’s what it’s going to take to have God’s peace!
</span></p><span data-dcnode-id="3339" instrument_node="">
</span><p data-dcnode-id="3333" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3338" instrument_node="">
</span><span data-dcnode-id="3335" style="display:inline-block;height:1em"><span data-dcnode-id="3336" style="display:none"><span data-dcnode-id="3337" instrument_node="">.</span></span></span><span data-dcnode-id="3334" instrument_node="">
</span></p><span data-dcnode-id="3332" instrument_node="">
</span><p data-dcnode-id="3322" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3330" style="text-decoration:underline"><span data-dcnode-id="3331" instrument_node="">You must practice godly thinking to get God’s peace.</span></span><span data-dcnode-id="3329" instrument_node=""> I’m preaching on </span><strong data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">how to procure the peace-giving presence of God … or simply How to get God’s peace! </span></strong><span data-dcnode-id="3326" instrument_node="">This is part 2 in a sense, on how to get God’s peace. Last time, from verses 6-7, we discovered how to get the peace of God in our hearts by practising proper praying: Worship, be a beggar/know your neediness, be </span><a data-dcnode-id="3324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bibletrove.com/bible-verses-on-being-thankful/"><span data-dcnode-id="3325" instrument_node="">thankful</span></a><span data-dcnode-id="3323" instrument_node="">, make your request from God. This morning we continue the theme of experiencing God’s peace in our hearts by proper thinking and behaviors.
</span></p><span data-dcnode-id="3321" instrument_node="">
</span><p data-dcnode-id="3315" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3320" instrument_node="">
</span><span data-dcnode-id="3317" style="display:inline-block;height:1em"><span data-dcnode-id="3318" style="display:none"><span data-dcnode-id="3319" instrument_node="">.</span></span></span><span data-dcnode-id="3316" instrument_node="">
</span></p><span data-dcnode-id="3314" instrument_node="">
</span><ol data-dcnode-id="2876" style="list-style-type:upper-roman;margin-top:0;margin-bottom:0"><span data-dcnode-id="3313" instrument_node="">
</span><li data-dcnode-id="3187" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="3312" instrument_node="">
</span><div data-dcnode-id="3310" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3311" instrument_node="">The Appeal: To Dwell
  </span></div><span data-dcnode-id="3309" instrument_node="">
</span><p data-dcnode-id="3307" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3308" instrument_node="">
    Notice first the command at the end of verse 8, “dwell on these things.” What does it mean to dwell?
  </span></p><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3300" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3305" instrument_node="">
</span><span data-dcnode-id="3302" style="display:inline-block;height:1em"><span data-dcnode-id="3303" style="display:none"><span data-dcnode-id="3304" instrument_node="">.</span></span></span><span data-dcnode-id="3301" instrument_node="">
</span></p><span data-dcnode-id="3299" instrument_node="">
</span><p data-dcnode-id="3293" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3298" instrument_node="">
    The word “to dwell” means “to think about something in a detailed and logical manner.”</span><sup data-dcnode-id="3295"><a data-dcnode-id="3296" href="#footnote-2" id="footnote-ref-2"><span data-dcnode-id="3297" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3294" instrument_node=""> It means to think through something, to turn it over in your mind, to meditate on it, to think at length about something.
  </span></p><span data-dcnode-id="3292" instrument_node="">
</span><p data-dcnode-id="3286" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3291" instrument_node="">
</span><span data-dcnode-id="3288" style="display:inline-block;height:1em"><span data-dcnode-id="3289" style="display:none"><span data-dcnode-id="3290" instrument_node="">.</span></span></span><span data-dcnode-id="3287" instrument_node="">
</span></p><span data-dcnode-id="3285" instrument_node="">
</span><p data-dcnode-id="3283" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3284" instrument_node="">
    But we live in a busy world filled with a-musements,… activities without thinking…a-muse (muse means to think, the “a” negates that…) amusements… activities without thinking…in our busy world filled with amusements we’re not trained to think godly by our culture. You didn’t wake up one morning with this ability.
  </span></p><span data-dcnode-id="3282" instrument_node="">
</span><p data-dcnode-id="3280" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3281" instrument_node="">
    So let me ask you …
  </span></p><span data-dcnode-id="3279" instrument_node="">
</span><p data-dcnode-id="3274" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3278" instrument_node="">
    “What efforts are you making to hide God’s word in your heart that you might not sin against Him, as </span><strong data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">Ps. 119:11 </span></strong><span data-dcnode-id="3275" instrument_node="">says? That’s what we’re doing together on Wednesday nights; we’re memorizing Scripture together. I trust those who attend are working on that on your own time.
  </span></p><span data-dcnode-id="3273" instrument_node="">
</span><p data-dcnode-id="3267" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3272" instrument_node="">
</span><span data-dcnode-id="3269" style="display:inline-block;height:1em"><span data-dcnode-id="3270" style="display:none"><span data-dcnode-id="3271" instrument_node="">.</span></span></span><span data-dcnode-id="3268" instrument_node="">
</span></p><span data-dcnode-id="3266" instrument_node="">
</span><p data-dcnode-id="3261" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3265" instrument_node="">
    But no matter where you are or what you’re doing, you know how to do this word </span><em data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">dwell</span></em><span data-dcnode-id="3262" instrument_node="">. For example, if you are a worrier, you know how to meditate. When you worry, you think at length about the thing that you are worried about, so much so it causes those horrible worry feelings. Also those who are angry or bitter. If you are angry or bitter you turn those things over in your mind that cause you to be angry or bitter. And you’re heart responds with those feelings of anger.
  </span></p><span data-dcnode-id="3260" instrument_node="">
</span><p data-dcnode-id="3254" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3259" instrument_node="">
</span><span data-dcnode-id="3256" style="display:inline-block;height:1em"><span data-dcnode-id="3257" style="display:none"><span data-dcnode-id="3258" instrument_node="">.</span></span></span><span data-dcnode-id="3255" instrument_node="">
</span></p><span data-dcnode-id="3253" instrument_node="">
</span><p data-dcnode-id="3251" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3252" instrument_node="">
    So I know you know how to dwell on thoughts in your mind; you just need to reject dwelling on bad thoughts and begin dwelling on good thoughts.
  </span></p><span data-dcnode-id="3250" instrument_node="">
</span><p data-dcnode-id="3244" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3249" instrument_node="">
</span><span data-dcnode-id="3246" style="display:inline-block;height:1em"><span data-dcnode-id="3247" style="display:none"><span data-dcnode-id="3248" instrument_node="">.</span></span></span><span data-dcnode-id="3245" instrument_node="">
</span></p><span data-dcnode-id="3243" instrument_node="">
</span><p data-dcnode-id="3239" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">2 Corinthians 10:5</span></strong><span data-dcnode-id="3240" instrument_node=""> 5 We are destroying speculations and every lofty thing raised up against the knowledge of God, and we are taking every thought captive to the obedience of Christ,
  </span></p><span data-dcnode-id="3238" instrument_node="">
</span><p data-dcnode-id="3232" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3237" instrument_node="">
</span><span data-dcnode-id="3234" style="display:inline-block;height:1em"><span data-dcnode-id="3235" style="display:none"><span data-dcnode-id="3236" instrument_node="">.</span></span></span><span data-dcnode-id="3233" instrument_node="">
</span></p><span data-dcnode-id="3231" instrument_node="">
</span><p data-dcnode-id="3229" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3230" instrument_node="">
    Every thought that goes through your mind needs to be either imprisoned and executed because of its crime against God or every thought in your mind needs to be praised and promoted for it’s obedience to Christ!
  </span></p><span data-dcnode-id="3228" instrument_node="">
</span><p data-dcnode-id="3222" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3227" instrument_node="">
</span><span data-dcnode-id="3224" style="display:inline-block;height:1em"><span data-dcnode-id="3225" style="display:none"><span data-dcnode-id="3226" instrument_node="">.</span></span></span><span data-dcnode-id="3223" instrument_node="">
</span></p><span data-dcnode-id="3221" instrument_node="">
</span><p data-dcnode-id="3219" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3220" instrument_node="">
    And so you are aware then that your thoughts are behind each of your sins! That’s why Jesus says, as we read this morning, in Matthew 5 that anger is as bad as murder…why? Because it is the heart,  the thoughts that are angry lead to murder. God is the judge of the heart.
  </span></p><span data-dcnode-id="3218" instrument_node="">
</span><p data-dcnode-id="3212" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3217" instrument_node="">
</span><span data-dcnode-id="3214" style="display:inline-block;height:1em"><span data-dcnode-id="3215" style="display:none"><span data-dcnode-id="3216" instrument_node="">.</span></span></span><span data-dcnode-id="3213" instrument_node="">
</span></p><span data-dcnode-id="3211" instrument_node="">
</span><p data-dcnode-id="3206" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3210" instrument_node="">
    As God’s judgment all the way back in</span><strong data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node=""> Ge. 6:5</span></strong><span data-dcnode-id="3207" instrument_node=""> says, that every intent of the thoughts of your heart are only evil all the time. In your natural state, that is your experience, even apart from your experiencing it to be so.
  </span></p><span data-dcnode-id="3205" instrument_node="">
</span><p data-dcnode-id="3199" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3204" instrument_node="">
</span><span data-dcnode-id="3201" style="display:inline-block;height:1em"><span data-dcnode-id="3202" style="display:none"><span data-dcnode-id="3203" instrument_node="">.</span></span></span><span data-dcnode-id="3200" instrument_node="">
</span></p><span data-dcnode-id="3198" instrument_node="">
</span><p data-dcnode-id="3196" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3197" instrument_node="">
    Are you aware of which thoughts lead you to your sin? Have you deeply considered by reflecting on your own thoughts and how you act on them…have you considered how that leads to you sinning? Thoughts are powerful things…you dwell on something long enough, it’ll cause you either to sin or grow in Christ.
  </span></p><span data-dcnode-id="3195" instrument_node="">
</span><p data-dcnode-id="3189" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3194" instrument_node="">
</span><span data-dcnode-id="3191" style="display:inline-block;height:1em"><span data-dcnode-id="3192" style="display:none"><span data-dcnode-id="3193" instrument_node="">.</span></span></span><span data-dcnode-id="3190" instrument_node="">
</span></p><span data-dcnode-id="3188" instrument_node="">
</span></li><span data-dcnode-id="3186" instrument_node="">
</span><li data-dcnode-id="2878" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="3185" instrument_node="">
</span><div data-dcnode-id="3183" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3184" instrument_node="">What to dwell on (v. 8)
  </span></div><span data-dcnode-id="3182" instrument_node="">
</span><p data-dcnode-id="3180" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3181" instrument_node="">
    So, what am I to dwell on?
  </span></p><span data-dcnode-id="3179" instrument_node="">
</span><p data-dcnode-id="3173" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3178" instrument_node="">
</span><span data-dcnode-id="3175" style="display:inline-block;height:1em"><span data-dcnode-id="3176" style="display:none"><span data-dcnode-id="3177" instrument_node="">.</span></span></span><span data-dcnode-id="3174" instrument_node="">
</span></p><span data-dcnode-id="3172" instrument_node="">
</span><p data-dcnode-id="3167" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3171" instrument_node="">
    In verse 8, we have a list of words that describe the things that we must dwell on. To dwell on each one of these is going to take wisdom with the Scripture and wisdom with your own heart, that is </span><em data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node="">skill</span></em><span data-dcnode-id="3168" instrument_node=""> like an archer or like the oil seller who could pour oil through a very small whole without spilling anything. You must work at this or be subject to the attacks of the world, your flesh and the devil your whole life. Your enjoyment of God will be diminished and thus will be your overall joy in life.
  </span></p><span data-dcnode-id="3166" instrument_node="">
</span><p data-dcnode-id="3160" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3165" instrument_node="">
</span><span data-dcnode-id="3162" style="display:inline-block;height:1em"><span data-dcnode-id="3163" style="display:none"><span data-dcnode-id="3164" instrument_node="">.</span></span></span><span data-dcnode-id="3161" instrument_node="">
</span></p><span data-dcnode-id="3159" instrument_node="">
</span><p data-dcnode-id="3152" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">ILL</span></strong><span data-dcnode-id="3156" instrument_node="">: One of the greatest things you can do for your </span><a data-dcnode-id="3154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bibletrove.com/bible-verses-about-love/"><span data-dcnode-id="3155" instrument_node="">loved</span></a><span data-dcnode-id="3153" instrument_node=""> ones is to teach them how to think in a godly way.
  </span></p><span data-dcnode-id="3151" instrument_node="">
</span><p data-dcnode-id="3145" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3150" instrument_node="">
</span><span data-dcnode-id="3147" style="display:inline-block;height:1em"><span data-dcnode-id="3148" style="display:none"><span data-dcnode-id="3149" instrument_node="">.</span></span></span><span data-dcnode-id="3146" instrument_node="">
</span></p><span data-dcnode-id="3144" instrument_node="">
</span><ol data-dcnode-id="2880" style="list-style-type:upper-alpha;margin-top:0;margin-bottom:0"><span data-dcnode-id="3143" instrument_node="">
</span><li data-dcnode-id="3072" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="3142" instrument_node="">
</span><div data-dcnode-id="3140" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3141" instrument_node="">
      True
    </span></div><span data-dcnode-id="3139" instrument_node="">
</span><p data-dcnode-id="3133" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3138" instrument_node="">
</span><span data-dcnode-id="3135" style="display:inline-block;height:1em"><span data-dcnode-id="3136" style="display:none"><span data-dcnode-id="3137" instrument_node="">.</span></span></span><span data-dcnode-id="3134" instrument_node="">
</span></p><span data-dcnode-id="3132" instrument_node="">
</span><p data-dcnode-id="3125" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">EXP</span></strong><span data-dcnode-id="3129" instrument_node="">: For example, learn to think on what is </span><strong data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">true</span></strong><span data-dcnode-id="3126" instrument_node="">, not what is false or a lie. Because of your sin nature, you are an expert at dwelling on lies.
    </span></p><span data-dcnode-id="3124" instrument_node="">
</span><p data-dcnode-id="3118" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3123" instrument_node="">
</span><span data-dcnode-id="3120" style="display:inline-block;height:1em"><span data-dcnode-id="3121" style="display:none"><span data-dcnode-id="3122" instrument_node="">.</span></span></span><span data-dcnode-id="3119" instrument_node="">
</span></p><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3115" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3116" instrument_node="">
      Think of Adam and Eve. Satan comes to the garden… “Has God really said that you shall not eat of that tree? Isn’t God holding out good from you…I mean, He knows that you’ll be like Him, knowing good and evil.” “You won’t surely die!” What does Eve do? She dwells on that lie! She turns it over in her mind, looks at it, considers that lie, until she is so enticed to sin that she gives in.
    </span></p><span data-dcnode-id="3114" instrument_node="">
</span><p data-dcnode-id="3108" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3113" instrument_node="">
</span><span data-dcnode-id="3110" style="display:inline-block;height:1em"><span data-dcnode-id="3111" style="display:none"><span data-dcnode-id="3112" instrument_node="">.</span></span></span><span data-dcnode-id="3109" instrument_node="">
</span></p><span data-dcnode-id="3107" instrument_node="">
</span><p data-dcnode-id="3103" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">APP</span></strong><span data-dcnode-id="3104" instrument_node="">: You too often dwell on lies, also! “I’ll be happy if only… [spouse, job, kids, money, some event happened, I get married, whatever.]” “I wouldn’t be so angry if you didn’t… or if that didn’t happen.” Those are lies! You’ll be happy when you know God, when you obey His commands, as we’re discussing this morning. Your enjoyment of this life is not a mater of improving your circumstances, but of growing in your walk with God.
    </span></p><span data-dcnode-id="3102" instrument_node="">
</span><p data-dcnode-id="3096" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3101" instrument_node="">
</span><span data-dcnode-id="3098" style="display:inline-block;height:1em"><span data-dcnode-id="3099" style="display:none"><span data-dcnode-id="3100" instrument_node="">.</span></span></span><span data-dcnode-id="3097" instrument_node="">
</span></p><span data-dcnode-id="3095" instrument_node="">
</span><p data-dcnode-id="3091" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">APP</span></strong><span data-dcnode-id="3092" instrument_node="">: Reject those thoughts and think on true things: God is good, He knows what’s best, He’s proven it before, I trust Him now! He’s my everything!
    </span></p><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3084" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3089" instrument_node="">
</span><span data-dcnode-id="3086" style="display:inline-block;height:1em"><span data-dcnode-id="3087" style="display:none"><span data-dcnode-id="3088" instrument_node="">.</span></span></span><span data-dcnode-id="3085" instrument_node="">
</span></p><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3081" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3082" instrument_node="">
      If you do this, you’ll get God’s peace…end of verse 9 … and the God of peace will be with you. If not, no peace.
    </span></p><span data-dcnode-id="3080" instrument_node="">
</span><p data-dcnode-id="3074" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3079" instrument_node="">
</span><span data-dcnode-id="3076" style="display:inline-block;height:1em"><span data-dcnode-id="3077" style="display:none"><span data-dcnode-id="3078" instrument_node="">.</span></span></span><span data-dcnode-id="3075" instrument_node="">
</span></p><span data-dcnode-id="3073" instrument_node="">
</span></li><span data-dcnode-id="3071" instrument_node="">
</span><li data-dcnode-id="3013" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="3070" instrument_node="">
</span><div data-dcnode-id="3068" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3069" instrument_node="">
      Honourable
    </span></div><span data-dcnode-id="3067" instrument_node="">
</span><p data-dcnode-id="3061" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3066" instrument_node="">
</span><span data-dcnode-id="3063" style="display:inline-block;height:1em"><span data-dcnode-id="3064" style="display:none"><span data-dcnode-id="3065" instrument_node="">.</span></span></span><span data-dcnode-id="3062" instrument_node="">
</span></p><span data-dcnode-id="3060" instrument_node="">
</span><p data-dcnode-id="3056" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">EXP</span></strong><span data-dcnode-id="3057" instrument_node="">: Second, honourable. This word refers to things of dignity, nobility. Think on things that are worthy of respect and reverence. Something worthy of a righteous king to bother himself with.
    </span></p><span data-dcnode-id="3055" instrument_node="">
</span><p data-dcnode-id="3049" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3054" instrument_node="">
</span><span data-dcnode-id="3051" style="display:inline-block;height:1em"><span data-dcnode-id="3052" style="display:none"><span data-dcnode-id="3053" instrument_node="">.</span></span></span><span data-dcnode-id="3050" instrument_node="">
</span></p><span data-dcnode-id="3048" instrument_node="">
</span><p data-dcnode-id="3046" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3047" instrument_node="">
      And so don’t think things that are ignoble, base, vulgar, flippant, or cheap. You know, not everything is a joke and you don’t need to constantly fill your mind with cheap things!
    </span></p><span data-dcnode-id="3045" instrument_node="">
</span><p data-dcnode-id="3039" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3044" instrument_node="">
</span><span data-dcnode-id="3041" style="display:inline-block;height:1em"><span data-dcnode-id="3042" style="display:none"><span data-dcnode-id="3043" instrument_node="">.</span></span></span><span data-dcnode-id="3040" instrument_node="">
</span></p><span data-dcnode-id="3038" instrument_node="">
</span><p data-dcnode-id="3034" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">ILL</span></strong><span data-dcnode-id="3035" instrument_node="">: I know of a former pastor and everything was a joke to this guy! You couldn’t go 2 sentences without some sort of attempt at cracking a joke. It seemed he didn’t have reverent bone in his body. Well, some unfortunate things happened and he’s out of the ministry today. And he couldn’t keep his thoughts on honourable things!
    </span></p><span data-dcnode-id="3033" instrument_node="">
</span><p data-dcnode-id="3027" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3032" instrument_node="">
</span><span data-dcnode-id="3029" style="display:inline-block;height:1em"><span data-dcnode-id="3030" style="display:none"><span data-dcnode-id="3031" instrument_node="">.</span></span></span><span data-dcnode-id="3028" instrument_node="">
</span></p><span data-dcnode-id="3026" instrument_node="">
</span><p data-dcnode-id="3022" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">APP</span></strong><span data-dcnode-id="3023" instrument_node="">: Are you filling your mind with cheap and frivolous things? Things that don’t matter? Do you constantly need some base or vulgar things to keep you entertained? Then the God of peace will not be with you! You’ll live a life displeasing to God as well as to those around you.
    </span></p><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3015" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3020" instrument_node="">
</span><span data-dcnode-id="3017" style="display:inline-block;height:1em"><span data-dcnode-id="3018" style="display:none"><span data-dcnode-id="3019" instrument_node="">.</span></span></span><span data-dcnode-id="3016" instrument_node="">
</span></p><span data-dcnode-id="3014" instrument_node="">
</span></li><span data-dcnode-id="3012" instrument_node="">
</span><li data-dcnode-id="2928" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="3011" instrument_node="">
</span><div data-dcnode-id="3009" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3010" instrument_node="">
      Right
    </span></div><span data-dcnode-id="3008" instrument_node="">
</span><p data-dcnode-id="3003" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3007" instrument_node="">
      Whatever is true, whatever is honourable, third </span><strong data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">whatever is right.</span></strong><span data-dcnode-id="3004" instrument_node="">
</span></p><span data-dcnode-id="3002" instrument_node="">
</span><p data-dcnode-id="2996" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="3001" instrument_node="">
</span><span data-dcnode-id="2998" style="display:inline-block;height:1em"><span data-dcnode-id="2999" style="display:none"><span data-dcnode-id="3000" instrument_node="">.</span></span></span><span data-dcnode-id="2997" instrument_node="">
</span></p><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2991" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">EXP</span></strong><span data-dcnode-id="2992" instrument_node="">: You need to ponder the things that are morally right. What makes for righteous living…that’s what you need to be thinking about.
    </span></p><span data-dcnode-id="2990" instrument_node="">
</span><p data-dcnode-id="2984" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2989" instrument_node="">
</span><span data-dcnode-id="2986" style="display:inline-block;height:1em"><span data-dcnode-id="2987" style="display:none"><span data-dcnode-id="2988" instrument_node="">.</span></span></span><span data-dcnode-id="2985" instrument_node="">
</span></p><span data-dcnode-id="2983" instrument_node="">
</span><p data-dcnode-id="2981" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2982" instrument_node="">
      That would mean reject thoughts that are immoral, that aren’t right before God.
    </span></p><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2974" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2979" instrument_node="">
</span><span data-dcnode-id="2976" style="display:inline-block;height:1em"><span data-dcnode-id="2977" style="display:none"><span data-dcnode-id="2978" instrument_node="">.</span></span></span><span data-dcnode-id="2975" instrument_node="">
</span></p><span data-dcnode-id="2973" instrument_node="">
</span><p data-dcnode-id="2969" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">APP</span></strong><span data-dcnode-id="2970" instrument_node="">: You must dwell on morally right behavior. Let’s get specific: if you have a problem with lust, anger, or pride, you need to spend a lot of time dwelling on the opposite of those sins.
    </span></p><span data-dcnode-id="2968" instrument_node="">
</span><p data-dcnode-id="2962" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2967" instrument_node="">
</span><span data-dcnode-id="2964" style="display:inline-block;height:1em"><span data-dcnode-id="2965" style="display:none"><span data-dcnode-id="2966" instrument_node="">.</span></span></span><span data-dcnode-id="2963" instrument_node="">
</span></p><span data-dcnode-id="2961" instrument_node="">
</span><p data-dcnode-id="2957" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">ILL</span></strong><span data-dcnode-id="2958" instrument_node="">: For example, I can choose to scare myself at night when I go outside when it’s dark … or not. What if I run into a skunk, maybe a coyote is out there, some gnarly beast… yah! And I can scare myself, I’ve done it before, but I learned to reject those thoughts. Or I can worry about my family when they go to Edmonton, that they’ll get into a car accident and they’ll all be killed and then I can plan the funeral in my head and whatever …I mean I can go down those paths but when my little heart does go down that path, instead of planning their funeral, I rebuke myself and purposefully turn to greater, morally righteous thoughts.
    </span></p><span data-dcnode-id="2956" instrument_node="">
</span><p data-dcnode-id="2950" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2955" instrument_node="">
</span><span data-dcnode-id="2952" style="display:inline-block;height:1em"><span data-dcnode-id="2953" style="display:none"><span data-dcnode-id="2954" instrument_node="">.</span></span></span><span data-dcnode-id="2951" instrument_node="">
</span></p><span data-dcnode-id="2949" instrument_node="">
</span><p data-dcnode-id="2947" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2948" instrument_node="">
      Are you given to anger, dwell on patience from the Scripture. Is it some lust? Dwell on the facts of Scripture that tell you that God is sufficient to satisfy you.
    </span></p><span data-dcnode-id="2946" instrument_node="">
</span><p data-dcnode-id="2940" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2945" instrument_node="">
</span><span data-dcnode-id="2942" style="display:inline-block;height:1em"><span data-dcnode-id="2943" style="display:none"><span data-dcnode-id="2944" instrument_node="">.</span></span></span><span data-dcnode-id="2941" instrument_node="">
</span></p><span data-dcnode-id="2939" instrument_node="">
</span><p data-dcnode-id="2937" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2938" instrument_node="">
      The battle for the Christian life is a battle of the mind.
    </span></p><span data-dcnode-id="2936" instrument_node="">
</span><p data-dcnode-id="2930" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2935" instrument_node="">
</span><span data-dcnode-id="2932" style="display:inline-block;height:1em"><span data-dcnode-id="2933" style="display:none"><span data-dcnode-id="2934" instrument_node="">.</span></span></span><span data-dcnode-id="2931" instrument_node="">
</span></p><span data-dcnode-id="2929" instrument_node="">
</span></li><span data-dcnode-id="2927" instrument_node="">
</span><li data-dcnode-id="2882" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2926" instrument_node="">
</span><div data-dcnode-id="2924" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2925" instrument_node="">
      Pure
    </span></div><span data-dcnode-id="2923" instrument_node="">
</span><p data-dcnode-id="2915" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2922" instrument_node="">
      Whatever is true, whatever is honourable, whatever is right, 4</span><sup data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">th</span></sup><span data-dcnode-id="2919" instrument_node="">, </span><strong data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">whatever is pure.</span></strong><span data-dcnode-id="2916" instrument_node="">
</span></p><span data-dcnode-id="2914" instrument_node="">
</span><p data-dcnode-id="2908" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2913" instrument_node="">
</span><span data-dcnode-id="2910" style="display:inline-block;height:1em"><span data-dcnode-id="2911" style="display:none"><span data-dcnode-id="2912" instrument_node="">.</span></span></span><span data-dcnode-id="2909" instrument_node="">
</span></p><span data-dcnode-id="2907" instrument_node="">
</span><p data-dcnode-id="2903" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">EXP</span></strong><span data-dcnode-id="2904" instrument_node="">: “Pure” refers to all areas of moral purity. Make sure you’re focusing on things that are morally praiseworthy and reject the impure.
    </span></p><span data-dcnode-id="2902" instrument_node="">
</span><p data-dcnode-id="2896" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2901" instrument_node="">
</span><span data-dcnode-id="2898" style="display:inline-block;height:1em"><span data-dcnode-id="2899" style="display:none"><span data-dcnode-id="2900" instrument_node="">.</span></span></span><span data-dcnode-id="2897" instrument_node="">
</span></p><span data-dcnode-id="2895" instrument_node="">
</span><p data-dcnode-id="2891" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">APP</span></strong><span data-dcnode-id="2892" instrument_node="">: I don’t know how you can watch certain things on the TV or the computer and still obey the command to dwell on things that are pure. You don’t hear me harking on TV watching, video games, or movies very much, but this is a passage that applies directly.
    </span></p><span data-dcnode-id="2890" instrument_node="">
</span><p data-dcnode-id="2884" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2889" instrument_node="">
</span><span data-dcnode-id="2886" style="display:inline-block;height:1em"><span data-dcnode-id="2887" style="display:none"><span data-dcnode-id="2888" instrument_node="">.</span></span></span><span data-dcnode-id="2885" instrument_node="">
</span></p><span data-dcnode-id="2883" instrument_node="">
</span></li><span data-dcnode-id="2881" instrument_node="">
</span></ol><span data-dcnode-id="2879" instrument_node="">
</span></li><span data-dcnode-id="2877" instrument_node="">
</span></ol><span data-dcnode-id="2875" instrument_node="">
</span><p data-dcnode-id="2871" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Psalm 101:2–3</span></strong><span data-dcnode-id="2872" instrument_node=""> 2 … I will walk within my house in the integrity of my heart. 3 I will set no worthless thing before my eyes….” Let alone something not pure.
</span></p><span data-dcnode-id="2870" instrument_node="">
</span><p data-dcnode-id="2864" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2869" instrument_node="">
</span><span data-dcnode-id="2866" style="display:inline-block;height:1em"><span data-dcnode-id="2867" style="display:none"><span data-dcnode-id="2868" instrument_node="">.</span></span></span><span data-dcnode-id="2865" instrument_node="">
</span></p><span data-dcnode-id="2863" instrument_node="">
</span><p data-dcnode-id="2861" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2862" instrument_node="">
  There are unfortunately even Christian leaders glorying in the filth that they watch! But you can’t expect to be feasting your soul on filth and have the peace-giving presence of God with you.
</span></p><span data-dcnode-id="2860" instrument_node="">
</span><p data-dcnode-id="2854" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2859" instrument_node="">
</span><span data-dcnode-id="2856" style="display:inline-block;height:1em"><span data-dcnode-id="2857" style="display:none"><span data-dcnode-id="2858" instrument_node="">.</span></span></span><span data-dcnode-id="2855" instrument_node="">
</span></p><span data-dcnode-id="2853" instrument_node="">
</span><ol data-dcnode-id="2745" start="5" style="list-style-type:upper-alpha;margin-top:0;margin-bottom:0"><span data-dcnode-id="2852" instrument_node="">
</span><li data-dcnode-id="2795" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2851" instrument_node="">
</span><div data-dcnode-id="2849" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2850" instrument_node="">
    [5th] Lovely
  </span></div><span data-dcnode-id="2848" instrument_node="">
</span><p data-dcnode-id="2842" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2847" instrument_node="">
</span><span data-dcnode-id="2844" style="display:inline-block;height:1em"><span data-dcnode-id="2845" style="display:none"><span data-dcnode-id="2846" instrument_node="">.</span></span></span><span data-dcnode-id="2843" instrument_node="">
</span></p><span data-dcnode-id="2841" instrument_node="">
</span><p data-dcnode-id="2837" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">EXP</span></strong><span data-dcnode-id="2838" instrument_node="">: These are things that agreeable and pleasing, like a wonderful fragrance from a rose that makes you want to stop and smell the roses!
  </span></p><span data-dcnode-id="2836" instrument_node="">
</span><p data-dcnode-id="2830" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2835" instrument_node="">
</span><span data-dcnode-id="2832" style="display:inline-block;height:1em"><span data-dcnode-id="2833" style="display:none"><span data-dcnode-id="2834" instrument_node="">.</span></span></span><span data-dcnode-id="2831" instrument_node="">
</span></p><span data-dcnode-id="2829" instrument_node="">
</span><p data-dcnode-id="2827" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2828" instrument_node="">
    You should dwell on lovely things …but if it’s “stinkin’ thinkin” you must avoid it like a skunk…get those stinkin’ thoughts out of there!
  </span></p><span data-dcnode-id="2826" instrument_node="">
</span><p data-dcnode-id="2820" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2825" instrument_node="">
</span><span data-dcnode-id="2822" style="display:inline-block;height:1em"><span data-dcnode-id="2823" style="display:none"><span data-dcnode-id="2824" instrument_node="">.</span></span></span><span data-dcnode-id="2821" instrument_node="">
</span></p><span data-dcnode-id="2819" instrument_node="">
</span><p data-dcnode-id="2817" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2818" instrument_node="">
    Sometimes you’re taken in by disgusting or distasteful thoughts and you can’t stop thinking about them. It could be your failures from the past, sins you’ve committed or actions that are under the blood.
  </span></p><span data-dcnode-id="2816" instrument_node="">
</span><p data-dcnode-id="2810" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2815" instrument_node="">
</span><span data-dcnode-id="2812" style="display:inline-block;height:1em"><span data-dcnode-id="2813" style="display:none"><span data-dcnode-id="2814" instrument_node="">.</span></span></span><span data-dcnode-id="2811" instrument_node="">
</span></p><span data-dcnode-id="2809" instrument_node="">
</span><p data-dcnode-id="2804" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2808" instrument_node="">
    Don’t go there! You need to have a battle plan on how to think correctly about those things. You need to realize that it’s impossible to expect that you never think about your past. But when you do, think about your past correctly. For example, if you sinned and you’ve trusted Christ, think how lovely Christ is to have forgiven you of all your sins! Purposefully reject bad thoughts and dwell on the loveliness of your Saviour and the wonder of His </span><a data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bibletrove.com/bible-verses-about-love/"><span data-dcnode-id="2807" instrument_node="">love</span></a><span data-dcnode-id="2805" instrument_node=""> for you! Have thoughts prepared in advance even, ready to go when the time comes. Continuously meditate on the loveliness of your Saviour!
  </span></p><span data-dcnode-id="2803" instrument_node="">
</span><p data-dcnode-id="2797" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2802" instrument_node="">
</span><span data-dcnode-id="2799" style="display:inline-block;height:1em"><span data-dcnode-id="2800" style="display:none"><span data-dcnode-id="2801" instrument_node="">.</span></span></span><span data-dcnode-id="2798" instrument_node="">
</span></p><span data-dcnode-id="2796" instrument_node="">
</span></li><span data-dcnode-id="2794" instrument_node="">
</span><li data-dcnode-id="2770" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2793" instrument_node="">
</span><div data-dcnode-id="2791" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2792" instrument_node="">
    [6] Good repute
  </span></div><span data-dcnode-id="2790" instrument_node="">
</span><p data-dcnode-id="2786" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">EXP</span></strong><span data-dcnode-id="2787" instrument_node="">: Whatever things are of good repute. That is, whatever things have a good reputation. These are those things that are spoken highly of by godly people. Of course, those things of good reputation would have to line up with the Scripture.
  </span></p><span data-dcnode-id="2785" instrument_node="">
</span><p data-dcnode-id="2779" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2784" instrument_node="">
</span><span data-dcnode-id="2781" style="display:inline-block;height:1em"><span data-dcnode-id="2782" style="display:none"><span data-dcnode-id="2783" instrument_node="">.</span></span></span><span data-dcnode-id="2780" instrument_node="">
</span></p><span data-dcnode-id="2778" instrument_node="">
</span><p data-dcnode-id="2772" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2777" instrument_node="">
</span><span data-dcnode-id="2774" style="display:inline-block;height:1em"><span data-dcnode-id="2775" style="display:none"><span data-dcnode-id="2776" instrument_node="">.</span></span></span><span data-dcnode-id="2773" instrument_node="">
</span></p><span data-dcnode-id="2771" instrument_node="">
</span></li><span data-dcnode-id="2769" instrument_node="">
</span><li data-dcnode-id="2747" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2768" instrument_node="">
</span><div data-dcnode-id="2766" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2767" instrument_node="">
    Excellence/Worthy of praise
  </span></div><span data-dcnode-id="2765" instrument_node="">
</span><p data-dcnode-id="2759" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2764" instrument_node="">
</span><span data-dcnode-id="2761" style="display:inline-block;height:1em"><span data-dcnode-id="2762" style="display:none"><span data-dcnode-id="2763" instrument_node="">.</span></span></span><span data-dcnode-id="2760" instrument_node="">
</span></p><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2756" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2757" instrument_node="">
    Paul closes verse 8 with a couple of catch-all phrases…
  </span></p><span data-dcnode-id="2755" instrument_node="">
</span><p data-dcnode-id="2749" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2754" instrument_node="">
</span><span data-dcnode-id="2751" style="display:inline-block;height:1em"><span data-dcnode-id="2752" style="display:none"><span data-dcnode-id="2753" instrument_node="">.</span></span></span><span data-dcnode-id="2750" instrument_node="">
</span></p><span data-dcnode-id="2748" instrument_node="">
</span></li><span data-dcnode-id="2746" instrument_node="">
</span></ol><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2740" style="margin-top:0pt;padding-top:0;margin-bottom:0;padding-bottom:0"><strong data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">Philippians 4:8</span></strong><span data-dcnode-id="2741" instrument_node=""> 8 …if there is any excellence and if anything worthy of praise, dwell on these things.
</span></p><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2733" style="margin-bottom:0;padding-bottom:0"><span data-dcnode-id="2738" instrument_node="">
</span><span data-dcnode-id="2735" style="display:inline-block;height:1em"><span data-dcnode-id="2736" style="display:none"><span data-dcnode-id="2737" instrument_node="">.</span></span></span><span data-dcnode-id="2734" instrument_node="">
</span></p><span data-dcnode-id="2732" instrument_node="">
</span><p data-dcnode-id="2730" style="margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2731" instrument_node="">
  In case he missed something, I suppose. But he’s piling on these words and phrases… by all means, give your attention to these things…if there is something in the world that qualifies and it’s excellent or praiseworthy, give yourself to it! Dwell on those things!
</span></p><span data-dcnode-id="2729" instrument_node="">
</span><p data-dcnode-id="2723" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2728" instrument_node="">
</span><span data-dcnode-id="2725" style="display:inline-block;height:1em"><span data-dcnode-id="2726" style="display:none"><span data-dcnode-id="2727" instrument_node="">.</span></span></span><span data-dcnode-id="2724" instrument_node="">
</span></p><span data-dcnode-id="2722" instrument_node="">
</span><p data-dcnode-id="2718" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">EXP</span></strong><span data-dcnode-id="2719" instrument_node="">: But keep in mind that some things can be true, but it might not be lovely.
</span></p><span data-dcnode-id="2717" instrument_node="">
</span><p data-dcnode-id="2711" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2716" instrument_node="">
</span><span data-dcnode-id="2713" style="display:inline-block;height:1em"><span data-dcnode-id="2714" style="display:none"><span data-dcnode-id="2715" instrument_node="">.</span></span></span><span data-dcnode-id="2712" instrument_node="">
</span></p><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2703" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">APP</span></strong><span data-dcnode-id="2707" instrument_node="">: You shouldn’t always be thinking about evil … sometimes you have to think about some sin to deal with it properly or because you’re reading about it in the Bible…we need to be warned about sin…, but think about sin in the context of </span><strong data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">Phil. 4:8</span></strong><span data-dcnode-id="2704" instrument_node="">.
</span></p><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2696" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2701" instrument_node="">
</span><span data-dcnode-id="2698" style="display:inline-block;height:1em"><span data-dcnode-id="2699" style="display:none"><span data-dcnode-id="2700" instrument_node="">.</span></span></span><span data-dcnode-id="2697" instrument_node="">
</span></p><span data-dcnode-id="2695" instrument_node="">
</span><p data-dcnode-id="2693" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2694" instrument_node="">
  Don’t always muse about how bad everything is, how bad the evangelical church is, or constantly dwelling on how our country is going downhill, this injustice in the world or that thing that person did…This is not good thinking if you’re constantly dwelling on those things…and it won’t give you the peace that you long for!
</span></p><span data-dcnode-id="2692" instrument_node="">
</span><p data-dcnode-id="2686" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2691" instrument_node="">
</span><span data-dcnode-id="2688" style="display:inline-block;height:1em"><span data-dcnode-id="2689" style="display:none"><span data-dcnode-id="2690" instrument_node="">.</span></span></span><span data-dcnode-id="2687" instrument_node="">
</span></p><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2681" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">TRANS</span></strong><span data-dcnode-id="2682" instrument_node="">: To get God’s peace in your heart, you need to think right … but also do right!
</span></p><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2674" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2679" instrument_node="">
</span><span data-dcnode-id="2676" style="display:inline-block;height:1em"><span data-dcnode-id="2677" style="display:none"><span data-dcnode-id="2678" instrument_node="">.</span></span></span><span data-dcnode-id="2675" instrument_node="">
</span></p><span data-dcnode-id="2673" instrument_node="">
</span><ol data-dcnode-id="2658" start="3" style="list-style-type:upper-roman;margin-top:0;margin-bottom:0"><span data-dcnode-id="2672" instrument_node="">
</span><li data-dcnode-id="2660" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2671" instrument_node="">
</span><div data-dcnode-id="2669" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2670" instrument_node="">An Appeal to Mature Living (v. 9)
  </span></div><span data-dcnode-id="2668" instrument_node="">
</span><p data-dcnode-id="2662" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2667" instrument_node="">
</span><span data-dcnode-id="2664" style="display:inline-block;height:1em"><span data-dcnode-id="2665" style="display:none"><span data-dcnode-id="2666" instrument_node="">.</span></span></span><span data-dcnode-id="2663" instrument_node="">
</span></p><span data-dcnode-id="2661" instrument_node="">
</span></li><span data-dcnode-id="2659" instrument_node="">
</span></ol><span data-dcnode-id="2657" instrument_node="">
</span><p data-dcnode-id="2653" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">Philippians 4:9</span></strong><span data-dcnode-id="2654" instrument_node=""> 9 The things you have learned and received and heard and seen in me, practice these things, and the God of peace will be with you.
</span></p><span data-dcnode-id="2652" instrument_node="">
</span><p data-dcnode-id="2646" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2651" instrument_node="">
</span><span data-dcnode-id="2648" style="display:inline-block;height:1em"><span data-dcnode-id="2649" style="display:none"><span data-dcnode-id="2650" instrument_node="">.</span></span></span><span data-dcnode-id="2647" instrument_node="">
</span></p><span data-dcnode-id="2645" instrument_node="">
</span><p data-dcnode-id="2643" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2644" instrument_node="">
  And there is our promise. The God of peace will be with you…the peace-giving presence of God in your heart. Wonderful!
</span></p><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2636" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2641" instrument_node="">
</span><span data-dcnode-id="2638" style="display:inline-block;height:1em"><span data-dcnode-id="2639" style="display:none"><span data-dcnode-id="2640" instrument_node="">.</span></span></span><span data-dcnode-id="2637" instrument_node="">
</span></p><span data-dcnode-id="2635" instrument_node="">
</span><p data-dcnode-id="2633" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2634" instrument_node="">
  In verse 9, those things learned and received…that’s what Paul teaches!
</span></p><span data-dcnode-id="2632" instrument_node="">
</span><p data-dcnode-id="2630" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2631" instrument_node="">
  The things heard and seen in him…that’s how Paul lives!
</span></p><span data-dcnode-id="2629" instrument_node="">
</span><p data-dcnode-id="2623" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2628" instrument_node="">
</span><span data-dcnode-id="2625" style="display:inline-block;height:1em"><span data-dcnode-id="2626" style="display:none"><span data-dcnode-id="2627" instrument_node="">.</span></span></span><span data-dcnode-id="2624" instrument_node="">
</span></p><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2620" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2621" instrument_node="">
  What he teaches and how Paul lives, that’s what we’re striving for! To receive his teaching and to live it out as he does.
</span></p><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2613" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2618" instrument_node="">
