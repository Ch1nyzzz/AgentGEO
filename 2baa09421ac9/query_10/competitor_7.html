</span><span data-dcnode-id="2615" style="display:inline-block;height:1em"><span data-dcnode-id="2616" style="display:none"><span data-dcnode-id="2617" instrument_node="">.</span></span></span><span data-dcnode-id="2614" instrument_node="">
</span></p><span data-dcnode-id="2612" instrument_node="">
</span><ol data-dcnode-id="2484" start="8" style="list-style-type:upper-alpha;margin-top:0;margin-bottom:0"><span data-dcnode-id="2611" instrument_node="">
</span><li data-dcnode-id="2535" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2610" instrument_node="">
</span><div data-dcnode-id="2608" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2609" instrument_node="">Mature thinking is the foundation of mature living
  </span></div><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2601" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2606" instrument_node="">
</span><span data-dcnode-id="2603" style="display:inline-block;height:1em"><span data-dcnode-id="2604" style="display:none"><span data-dcnode-id="2605" instrument_node="">.</span></span></span><span data-dcnode-id="2602" instrument_node="">
</span></p><span data-dcnode-id="2600" instrument_node="">
</span><p data-dcnode-id="2598" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2599" instrument_node="">
    Paul no doubt practised verse 8, righteous thinking. He did and his life showed it, verse 9.
  </span></p><span data-dcnode-id="2597" instrument_node="">
</span><p data-dcnode-id="2591" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2596" instrument_node="">
</span><span data-dcnode-id="2593" style="display:inline-block;height:1em"><span data-dcnode-id="2594" style="display:none"><span data-dcnode-id="2595" instrument_node="">.</span></span></span><span data-dcnode-id="2592" instrument_node="">
</span></p><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2588" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2589" instrument_node="">
    So notice that mature thinking is the root for mature living. Mature thinking is the root for mature living.
  </span></p><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2581" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2586" instrument_node="">
</span><span data-dcnode-id="2583" style="display:inline-block;height:1em"><span data-dcnode-id="2584" style="display:none"><span data-dcnode-id="2585" instrument_node="">.</span></span></span><span data-dcnode-id="2582" instrument_node="">
</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2576" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">ILL</span></strong><span data-dcnode-id="2577" instrument_node="">: As someone said … sow a thought, reap an action; sow an action, reap a habit; sow a habit, reap a character; sow a character, reap a destiny.
  </span></p><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2569" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2574" instrument_node="">
</span><span data-dcnode-id="2571" style="display:inline-block;height:1em"><span data-dcnode-id="2572" style="display:none"><span data-dcnode-id="2573" instrument_node="">.</span></span></span><span data-dcnode-id="2570" instrument_node="">
</span></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2566" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2567" instrument_node="">
    The reason you live the way you live is because you have been thinking the way that you have been thinking.
  </span></p><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2559" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2564" instrument_node="">
</span><span data-dcnode-id="2561" style="display:inline-block;height:1em"><span data-dcnode-id="2562" style="display:none"><span data-dcnode-id="2563" instrument_node="">.</span></span></span><span data-dcnode-id="2560" instrument_node="">
</span></p><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2556" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2557" instrument_node="">
    When you’re character is given over to whatever sin, it’s difficult to root that out. It takes effort! You need to come to the end of yourself and cry out to God, and put in the effort; until you do the hard work, you’re not going to get anywhere.
  </span></p><span data-dcnode-id="2555" instrument_node="">
</span><p data-dcnode-id="2549" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2554" instrument_node="">
</span><span data-dcnode-id="2551" style="display:inline-block;height:1em"><span data-dcnode-id="2552" style="display:none"><span data-dcnode-id="2553" instrument_node="">.</span></span></span><span data-dcnode-id="2550" instrument_node="">
</span></p><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2544" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2546" style="text-decoration:underline"><span data-dcnode-id="2547" instrument_node="">You have to be diligent to think rightly.</span></span><span data-dcnode-id="2545" instrument_node=""> It all begins in your mind and what thoughts you entertain in your mind.
  </span></p><span data-dcnode-id="2543" instrument_node="">
</span><p data-dcnode-id="2537" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2542" instrument_node="">
</span><span data-dcnode-id="2539" style="display:inline-block;height:1em"><span data-dcnode-id="2540" style="display:none"><span data-dcnode-id="2541" instrument_node="">.</span></span></span><span data-dcnode-id="2538" instrument_node="">
</span></p><span data-dcnode-id="2536" instrument_node="">
</span></li><span data-dcnode-id="2534" instrument_node="">
</span><li data-dcnode-id="2486" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2533" instrument_node="">
</span><div data-dcnode-id="2531" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2532" instrument_node="">
    Mature thinking is the only structure
  </span></div><span data-dcnode-id="2530" instrument_node="">
</span><p data-dcnode-id="2524" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2529" instrument_node="">
</span><span data-dcnode-id="2526" style="display:inline-block;height:1em"><span data-dcnode-id="2527" style="display:none"><span data-dcnode-id="2528" instrument_node="">.</span></span></span><span data-dcnode-id="2525" instrument_node="">
</span></p><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2518" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2522" instrument_node="">
    But of course it doesn’t stop with just right thinking. </span><span data-dcnode-id="2520" style="text-decoration:underline"><span data-dcnode-id="2521" instrument_node="">You have to be diligent to act rightly, too.</span></span><span data-dcnode-id="2519" instrument_node=""> You can’t just think about it all day; do something! We have to put those right thoughts into actions. Theology and righteous thoughts are designed to produce righteous actions. But you have to act on them.
  </span></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2511" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2516" instrument_node="">
</span><span data-dcnode-id="2513" style="display:inline-block;height:1em"><span data-dcnode-id="2514" style="display:none"><span data-dcnode-id="2515" instrument_node="">.</span></span></span><span data-dcnode-id="2512" instrument_node="">
</span></p><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2505" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2509" instrument_node="">
    As </span><strong data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">James 1:22 </span></strong><span data-dcnode-id="2506" instrument_node="">says 22 But prove yourselves doers of the word, and not merely hearers who delude themselves.
  </span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2498" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2503" instrument_node="">
</span><span data-dcnode-id="2500" style="display:inline-block;height:1em"><span data-dcnode-id="2501" style="display:none"><span data-dcnode-id="2502" instrument_node="">.</span></span></span><span data-dcnode-id="2499" instrument_node="">
</span></p><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2495" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2496" instrument_node="">
    In other words, you could have a mastery of the Scripture and never put it into practice. But the true Christian will put something at least into practice.
  </span></p><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2488" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2493" instrument_node="">
</span><span data-dcnode-id="2490" style="display:inline-block;height:1em"><span data-dcnode-id="2491" style="display:none"><span data-dcnode-id="2492" instrument_node="">.</span></span></span><span data-dcnode-id="2489" instrument_node="">
</span></p><span data-dcnode-id="2487" instrument_node="">
</span></li><span data-dcnode-id="2485" instrument_node="">
</span></ol><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2478" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2482" instrument_node="">
  As Jesus said … </span><strong data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">John 13:17</span></strong><span data-dcnode-id="2479" instrument_node=""> 17 “If you know these things, you are blessed if you do them. “ You have to know and do.”
</span></p><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2471" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2476" instrument_node="">
</span><span data-dcnode-id="2473" style="display:inline-block;height:1em"><span data-dcnode-id="2474" style="display:none"><span data-dcnode-id="2475" instrument_node="">.</span></span></span><span data-dcnode-id="2472" instrument_node="">
</span></p><span data-dcnode-id="2470" instrument_node="">
</span><ol data-dcnode-id="2342" start="10" style="list-style-type:upper-alpha;margin-top:0;margin-bottom:0"><span data-dcnode-id="2469" instrument_node="">
</span><li data-dcnode-id="2344" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2468" instrument_node="">
</span><div data-dcnode-id="2466" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2467" instrument_node="">
    The means of mature living
  </span></div><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2459" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2464" instrument_node="">
</span><span data-dcnode-id="2461" style="display:inline-block;height:1em"><span data-dcnode-id="2462" style="display:none"><span data-dcnode-id="2463" instrument_node="">.</span></span></span><span data-dcnode-id="2460" instrument_node="">
</span></p><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2457" instrument_node="">
    So if you want to live a mature Christian life, you’ll need to put the hard work into thinking correctly and into living out the instruction you receive and turn godly thoughts into godly actions.  As you practice that and live that out, you’ll have less anxiety, worry, and fear, anger and more of the peace of God…. “The God of peace will be with you.”
  </span></p><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2449" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2454" instrument_node="">
</span><span data-dcnode-id="2451" style="display:inline-block;height:1em"><span data-dcnode-id="2452" style="display:none"><span data-dcnode-id="2453" instrument_node="">.</span></span></span><span data-dcnode-id="2450" instrument_node="">
</span></p><span data-dcnode-id="2448" instrument_node="">
</span><ol data-dcnode-id="2419" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2447" instrument_node="">
</span><li data-dcnode-id="2421" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2446" instrument_node="">
</span><div data-dcnode-id="2444" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2445" instrument_node="">
      Mature thinking
    </span></div><span data-dcnode-id="2443" instrument_node="">
</span><ol data-dcnode-id="2423" style="list-style-type:lower-alpha;margin-top:0;margin-bottom:0"><span data-dcnode-id="2442" instrument_node="">
</span><li data-dcnode-id="2437" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2441" instrument_node="">
</span><div data-dcnode-id="2439" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2440" instrument_node="">
        Reject bad thoughts
      </span></div><span data-dcnode-id="2438" instrument_node="">
</span></li><span data-dcnode-id="2436" instrument_node="">
</span><li data-dcnode-id="2431" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2435" instrument_node="">
</span><div data-dcnode-id="2433" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2434" instrument_node="">
        Accept good thoughts
      </span></div><span data-dcnode-id="2432" instrument_node="">
</span></li><span data-dcnode-id="2430" instrument_node="">
</span><li data-dcnode-id="2425" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2429" instrument_node="">
</span><div data-dcnode-id="2427" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2428" instrument_node="">
        Receive mature instruction
      </span></div><span data-dcnode-id="2426" instrument_node="">
</span></li><span data-dcnode-id="2424" instrument_node="">
</span></ol><span data-dcnode-id="2422" instrument_node="">
</span></li><span data-dcnode-id="2420" instrument_node="">
</span></ol><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2412" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2417" instrument_node="">
</span><span data-dcnode-id="2414" style="display:inline-block;height:1em"><span data-dcnode-id="2415" style="display:none"><span data-dcnode-id="2416" instrument_node="">.</span></span></span><span data-dcnode-id="2413" instrument_node="">
</span></p><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2405" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2410" instrument_node="">
</span><span data-dcnode-id="2407" style="display:inline-block;height:1em"><span data-dcnode-id="2408" style="display:none"><span data-dcnode-id="2409" instrument_node="">.</span></span></span><span data-dcnode-id="2406" instrument_node="">
</span></p><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2399" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2403" instrument_node="">
    To summarize … to get the peace-giving presence of God in your heart, you need to repent of sinful and bad thoughts that don’t line up with </span><strong data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Philippians 4:8</span></strong><span data-dcnode-id="2400" instrument_node="">. You need to dwell on good thoughts that line up with Philippians 4:8.
  </span></p><span data-dcnode-id="2398" instrument_node="">
</span><p data-dcnode-id="2392" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2397" instrument_node="">
</span><span data-dcnode-id="2394" style="display:inline-block;height:1em"><span data-dcnode-id="2395" style="display:none"><span data-dcnode-id="2396" instrument_node="">.</span></span></span><span data-dcnode-id="2393" instrument_node="">
</span></p><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2389" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2390" instrument_node="">
    Next, from verse 9, receive godly instruction and live that out.
  </span></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2382" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2387" instrument_node="">
</span><span data-dcnode-id="2384" style="display:inline-block;height:1em"><span data-dcnode-id="2385" style="display:none"><span data-dcnode-id="2386" instrument_node="">.</span></span></span><span data-dcnode-id="2383" instrument_node="">
</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p data-dcnode-id="2379" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2380" instrument_node="">
    Paul says whatever you have “learned and received” from him… Those are the things that you are to dwell on. That’s godly instruction from the Scripture. Receive mature instruction.
  </span></p><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2372" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2377" instrument_node="">
</span><span data-dcnode-id="2374" style="display:inline-block;height:1em"><span data-dcnode-id="2375" style="display:none"><span data-dcnode-id="2376" instrument_node="">.</span></span></span><span data-dcnode-id="2373" instrument_node="">
</span></p><span data-dcnode-id="2371" instrument_node="">
</span><p data-dcnode-id="2369" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2370" instrument_node="">
    And finally imitate mature believers.
  </span></p><span data-dcnode-id="2368" instrument_node="">
</span><p data-dcnode-id="2362" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2367" instrument_node="">
</span><span data-dcnode-id="2364" style="display:inline-block;height:1em"><span data-dcnode-id="2365" style="display:none"><span data-dcnode-id="2366" instrument_node="">.</span></span></span><span data-dcnode-id="2363" instrument_node="">
</span></p><span data-dcnode-id="2361" instrument_node="">
</span><ol data-dcnode-id="2353" start="2" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2360" instrument_node="">
</span><li data-dcnode-id="2355" style="margin-top:0;margin-bottom:0"><span data-dcnode-id="2359" instrument_node="">
</span><div data-dcnode-id="2357" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2358" instrument_node="">
      Imitate mature believers
    </span></div><span data-dcnode-id="2356" instrument_node="">
</span></li><span data-dcnode-id="2354" instrument_node="">
</span></ol><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2346" style="text-align:left;margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2351" instrument_node="">
</span><span data-dcnode-id="2348" style="display:inline-block;height:1em"><span data-dcnode-id="2349" style="display:none"><span data-dcnode-id="2350" instrument_node="">.</span></span></span><span data-dcnode-id="2347" instrument_node="">
</span></p><span data-dcnode-id="2345" instrument_node="">
</span></li><span data-dcnode-id="2343" instrument_node="">
</span></ol><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2337" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Philippians 4:9</span></strong><span data-dcnode-id="2338" instrument_node=""> 9 The things you have learned and received and heard and seen in me, practice these things, and the God of peace will be with you.
</span></p><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2330" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2335" instrument_node="">
</span><span data-dcnode-id="2332" style="display:inline-block;height:1em"><span data-dcnode-id="2333" style="display:none"><span data-dcnode-id="2334" instrument_node="">.</span></span></span><span data-dcnode-id="2331" instrument_node="">
</span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2327" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2328" instrument_node="">
  We can imitate Paul in the Scripture and we have godly examples in this church; do what they do, practice what they do. Get to know them and seek them out for help.
</span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2320" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2325" instrument_node="">
</span><span data-dcnode-id="2322" style="display:inline-block;height:1em"><span data-dcnode-id="2323" style="display:none"><span data-dcnode-id="2324" instrument_node="">.</span></span></span><span data-dcnode-id="2321" instrument_node="">
</span></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2317" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2318" instrument_node="">
  What issue are you having? How do they live to counteract that?
</span></p><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2310" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2315" instrument_node="">
</span><span data-dcnode-id="2312" style="display:inline-block;height:1em"><span data-dcnode-id="2313" style="display:none"><span data-dcnode-id="2314" instrument_node="">.</span></span></span><span data-dcnode-id="2311" instrument_node="">
</span></p><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2305" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">CONCLUSION What is the Meaning of Philippians 4.8-9</span></strong><span data-dcnode-id="2306" instrument_node="">
</span></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2302" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2303" instrument_node="">
  But this takes work and I fear that we may be too lazy or otherwise fail to respond to this message. The way I illustrate the difficulty of this with my family is with pathways in the forest. Behind our house, we have a wooded area and on the south side of our property there is a path with no trees. That path is very easy to go down.
</span></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2295" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2300" instrument_node="">
</span><span data-dcnode-id="2297" style="display:inline-block;height:1em"><span data-dcnode-id="2298" style="display:none"><span data-dcnode-id="2299" instrument_node="">.</span></span></span><span data-dcnode-id="2296" instrument_node="">
</span></p><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2292" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2293" instrument_node="">
  Just like that, our hearts have paths. And those paths are your thought pathways, the path you travel down when you think about something.
</span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2285" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2290" instrument_node="">
</span><span data-dcnode-id="2287" style="display:inline-block;height:1em"><span data-dcnode-id="2288" style="display:none"><span data-dcnode-id="2289" instrument_node="">.</span></span></span><span data-dcnode-id="2286" instrument_node="">
</span></p><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2282" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2283" instrument_node="">
  If the path in your heart is well-worn because you always go down that path and think that way about that situation, and it is also a bad path that displeases God, it’s kind of like that path on my property that has no trees. It’s very easy to go down that path! You’ve formed a sin habit!
</span></p><span data-dcnode-id="2281" instrument_node="">
</span><p data-dcnode-id="2275" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2280" instrument_node="">
</span><span data-dcnode-id="2277" style="display:inline-block;height:1em"><span data-dcnode-id="2278" style="display:none"><span data-dcnode-id="2279" instrument_node="">.</span></span></span><span data-dcnode-id="2276" instrument_node="">
</span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2273" instrument_node="">
  What you need to do is let that path grow up and build a new path! You need to repent and deliberately think new thoughts. Don’t ever just let your thoughts wander aimlessly; purposefully control your mind.
</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2265" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2270" instrument_node="">
</span><span data-dcnode-id="2267" style="display:inline-block;height:1em"><span data-dcnode-id="2268" style="display:none"><span data-dcnode-id="2269" instrument_node="">.</span></span></span><span data-dcnode-id="2266" instrument_node="">
</span></p><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2262" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2263" instrument_node="">
  But it takes effort! Like if we were to cut down trees to build a path on the other side of our property. That’s hard work!
</span></p><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2255" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2260" instrument_node="">
</span><span data-dcnode-id="2257" style="display:inline-block;height:1em"><span data-dcnode-id="2258" style="display:none"><span data-dcnode-id="2259" instrument_node="">.</span></span></span><span data-dcnode-id="2256" instrument_node="">
</span></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2252" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2253" instrument_node="">
  You’re not going to grow if you don’t learn to repent of those bad thoughts in the very moment you have them and learn to cling to good thoughts that please God. You have to resist thinking so wrongly and constantly push your thoughts down the righteous path. And if you don’t, you’ll ruin your life and live a life displeasing to God!
</span></p><span data-dcnode-id="2251" instrument_node="">
</span><p data-dcnode-id="2245" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2250" instrument_node="">
</span><span data-dcnode-id="2247" style="display:inline-block;height:1em"><span data-dcnode-id="2248" style="display:none"><span data-dcnode-id="2249" instrument_node="">.</span></span></span><span data-dcnode-id="2246" instrument_node="">
</span></p><span data-dcnode-id="2244" instrument_node="">
</span><p data-dcnode-id="2242" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2243" instrument_node="">
  That’s not what you want! You want peace! This is the way of receiving the peace of God. Will you put the effort in to change?
</span></p><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2235" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2240" instrument_node="">
</span><span data-dcnode-id="2237" style="display:inline-block;height:1em"><span data-dcnode-id="2238" style="display:none"><span data-dcnode-id="2239" instrument_node="">.</span></span></span><span data-dcnode-id="2236" instrument_node="">
</span></p><span data-dcnode-id="2234" instrument_node="">
</span><p data-dcnode-id="2232" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2233" instrument_node="">
  Tell the Lord you repent, tell Him you hate your sin, tell Him you want to change and to grow! And make a plan to conquer your thoughts that cause you to have a lack of peace.
</span></p><span data-dcnode-id="2231" instrument_node="">
</span><p data-dcnode-id="2225" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><span data-dcnode-id="2230" instrument_node="">
</span><span data-dcnode-id="2227" style="display:inline-block;height:1em"><span data-dcnode-id="2228" style="display:none"><span data-dcnode-id="2229" instrument_node="">.</span></span></span><span data-dcnode-id="2226" instrument_node="">
</span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2220" style="margin-top:0pt;padding-top:0;margin-bottom:0pt;padding-bottom:0"><strong data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Isaiah 26:3</span></strong><span data-dcnode-id="2221" instrument_node=""> Thou wilt keep him in perfect peace, whose mind is stayed on thee: because he trusteth in thee.
