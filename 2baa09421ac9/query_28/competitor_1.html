</span><span data-dcnode-id="2948" id="freeText10464609709664441472" style="display:none"><span data-dcnode-id="2949" instrument_node="">When you're serious about following Christ, you long to become more like Him. You also know that the Bible contains the life-changing truths that will help you reach that goal. Face to Face: Praying the Scriptures for Spiritual Growth helps you turn your devotional times into a daily experience of transformation. Adapting and personalizing select Bible passages, Dr. Kenneth Boa offers you a refreshing and encouraging way to 'renew your mind' as you meditate on and pray about: the attributes of God, the works of God, my relationship with God, the character I want to cultivate, my relationship with others. This inspiring approach will change both your life and the way you view the Scriptures. Prepare to discover the Bible afresh as a marvelous source of prayer and reflection that enables you to love God completely, love yourself correctly, and love others compassionately. Face to Face prayer books help you bring new richness to your devotional times. By connecting Bible reading with personal prayer, they help you approach both in a new way. Get ready to rediscover the Bible as your most treasured prayer book-guiding you into prayers that are alive, faith-filled, and powerful because they're grounded in God's word.</span></span><span data-dcnode-id="2947" instrument_node="">

</span><span data-dcnode-id="2328" id="freeText11695209710798436121" style="display:none"><span data-dcnode-id="2329" instrument_node="">This was a bit of a different take on a devotional for me. There were no teaching points. Instead, verses from the Bible were split into thematic groups (Attributes of God, Character to Cultivate, etc.) and written as affirmations, in the first person. You read several verses under the theme, then stop to reflect on their meaning and pray. At some points it was very dull; I like getting new information. At other times it was deeply affecting and inspiring. I would recommend this to anyone who wants to strengthen their relationship with God and with others, someone who wants a way to focus their prayer life.</span></span><span data-dcnode-id="2327" instrument_node="">
