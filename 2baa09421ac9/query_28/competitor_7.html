Spiritual health means that we are alive and vibrant in Christ. For that, we need some disciplines to help us stay on the right track, focused on God and not on our own problems or distractions. Jesus sets an example for us of how to boost our spiritual health. He engaged in spiritual disciplines such as discipleship, worship and fasting.  Both my personal and spiritual health were good but have improved.</span><br data-dcnode-id="511"><span data-dcnode-id="510" instrument_node="">
At the beginning of the term my personal and ministry growth were limited to the perspective of the leaders I studied under.   Since I have started this class my personal and ministry spiritual growth has been enriched.  I have been enlightened in the areas of fasting, living a crucified life, discipleship, worship, and revival.  </span><br data-dcnode-id="509"><span data-dcnode-id="508" instrument_node="">
Though fasting has been a key factor in my personal and ministry growth, I had never been introduced to the concept of keeping a fasting journal.  I have participated in personal fast for healing as well as a ministry fast for God to increase membership.    During both fasts  I would mediate on God’s word and pray.  This concept that Towns reveals in his book, Fasting for Spiritual Break Through, has been a tool that has contribute to my personal and ministry growth.  As I began to follow the guidelines that Towns provided for a fasting journal I gained insights about my current tribulation that I am going through.    I was able to take my eyes off of my circumstances and focus on the lessons that God is teaching me during this tribulation.  Towns points out one of the benefits of a fasting journal, “It provides a means of recording important lessons God is daily teaching” (218). </span><br data-dcnode-id="507"><span data-dcnode-id="506" instrument_node="">

            “This Little Light of Mine” is a traditional Negro spiritual about the importance of unity in the face of adversity. The first spirituals were inspired by African music even if the tunes were not far from those of Christian hymns. Some of them, called “shouts,” were accompanied by dancing, hand clapping and foot tapping. Drawing on the Bible for inspiration and imagery, most spirituals instruct listeners in how to live with the Spirit of God.   These songs often had multiple meanings. The literal interpretation reflected the personal relationship between the slave singer and God. However, the spirituals also translated to code for slaves looking to escape to the North to freedom. For example, as part of the spiritual’s lyrics, “home” can mean Heaven, but it covertly means a free country and haven for slaves.  The refrain of “This Little Light of Mine” refers to the light inside each individual and how, whether standing up alone or joining together, each little bit of light can break the darkness. The song has since been applied to many struggles. It was especially......</span></p><span data-dcnode-id="457" instrument_node="">

            The Four Spiritual Laws is an intellectual method of evangelism, which, as it’s title suggests, identifies four spiritual laws that direct an individual’s relationship with God.  It was created by Dr. Bill Bright, founder of Campus Crusade for Christ, in 1952.  The four laws, as sited on CampusCrusade.com, are: (1) God loves you and offers a wonderful plan for your life. (2) Man is sinful and separated from God.  Therefore, he cannot know and experience God’s love and plan for his life. (3) Jesus Christ is God’s only provision for man’s sin.  Through Him you can know and experience God’s love and plan for your life. (4) We must individually receive Jesus Christ as Savior and Lord; then we can know and experience God’s love and plan for our lives.
