/gewatkins.net/author/tom-moore/" rel="author" title="Posts by Tom Moore"><span data-dcnode-id="486" instrument_node="">Tom Moore</span></a></div><span data-dcnode-id="483" instrument_node=""> </span><span class="cat-links" data-dcnode-id="476"><span data-dcnode-id="482" instrument_node="">Categories: </span><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gewatkins.net/sermon-outlines/" rel="category tag"><span data-dcnode-id="481" instrument_node="">Sermon Outlines</span></a><span data-dcnode-id="479" instrument_node="">, </span><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gewatkins.net/topical-sermon-outlines/" rel="category tag"><span data-dcnode-id="478" instrument_node="">Topical Sermon Outlines</span></a></span><span data-dcnode-id="475" instrument_node=""> </span><span class="tag-links" data-dcnode-id="471"><span data-dcnode-id="474" instrument_node="">Tags: </span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gewatkins.net/tag/sermons-on-spiritual-growth/" rel="tag"><span data-dcnode-id="473" instrument_node="">Sermons on Spiritual Growth</span></a></span><div data-dcnode-id="467" id="printLesson"><form data-dcnode-id="468"><span data-dcnode-id="470" instrument_node=""> </span><input class="print" data-dcnode-id="469" onclick="window.print()" type="button" value="Print"></form></div><h2 class="ser" data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Sermon on Spiritual Growth</span></h2><p class="ser" data-dcnode-id="462"><strong data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">INTRODUCTION</span></strong></p><p class="i1" data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">A. As far as I can recall, I’ve never heard of anyone going in to the boss and asking, “I really need a pay cut. Can you decrease my wages?”</span></p><p class="i2" data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">1. Instead, most people recognize that their personal prosperity is a good thing, when used properly.</span></p><p class="i2" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">2. 3 John 2</span></p><p class="i1" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">B. But how does your soul prosper?</span></p><p class="i2" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">1. Is it the same as physical prosperity?</span></p><p class="i3" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">a. Are there spiritual coins to be placed in a spiritual pocket?</span></p><p class="i3" data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">b. Do we trade in a spiritual marketplace and stockpile righteousness like money in the bank?</span></p><p class="i2" data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">2. Not exactly. You can’t count spiritual assets like so many nickels and dimes in the palm of your hand.</span></p><p class="i3" data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">a. And they aren’t transferable … I can’t beg, borrow, or steal your spiritual assets and put them in my heavenly bank account.</span></p><p class="i3" data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">b. Note what Jesus said, Matthew 6:19-20</span></p><p class="i3" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">c. “Lay up for yourselves…” — Yes, spiritual prosperity requires personal spiritual accounting, and when realized it is 100% secure.</span></p><p class="i1" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">C. But there are some similarities between physical prosperity and spiritual prosperity.</span></p><p class="i2" data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">1. In the physical world, good and moral prosperity is the result of certain disciplines practiced consistently and according to economic laws established by God.</span></p><p class="i2" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">2. Likewise, spiritual prosperity is also the result of consistently molding your life to match divinely ordained laws.</span></p><p class="i1" data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">D. So if you were making a list, what would you say would be the most important ideas that promote spiritual prosperity?</span></p><p class="i2" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">1. Many might come up with different ideas about that.</span></p><p class="i2" data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">2. Let me suggest to you 8 key concepts — 8 stepping stones — that will help lead you to spiritual prosperity.</span></p><p class="ser" data-dcnode-id="425"><strong data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">DISCUSSION</span></strong></p><p class="i1" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">A. ACCURATE THINKING</span></p><p class="i2" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">1. The first step toward spiritual maturity is accurate thinking.</span></p><p class="i3" data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">a. And the most important kind of accurate thinking involves a realistic analysis of SELF.</span></p><p class="i3" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">b. This means we have to look in the mirror and be completely honest. No more blame games, no more self-congratulation for mediocrity or self-delusion about where we are on the spiritual totem pole.</span></p><p class="i3" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">c. James 1:22-25</span></p><p class="i2" data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">2. If a person wants to be truly spiritual, they must first recognize the utter impossibility of becoming a spiritually mature person by pulling himself or herself up by their own bootstraps. In other words, you/we need help.</span></p><p class="i3" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">a. Let me emphasize this point. When you really begin thinking accurately about your spiritual state, you will realize there is nothing you can do of your own design and plan to fix what is spiritually broken.</span></p><p class="i3" data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">b. None of us has that within ourselves — we can’t do it by ourselves</span></p><p class="i3" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">c. The world tells you that all the answers are inside you. As long as a person believes that lie, they will continue to tread water and it’s only a matter of time before they sink into an abyss of human misery and destruction.</span></p><p class="i3" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">d. But the good news is this, God loves you so much that He has given you everything you need to get the problem fixed — He has given you a road map to help you get past the impossible.</span></p><p class="i3" data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">e. 2 Peter 1:3</span></p><p class="i2" data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">3. Accurate thinking begins with SELF-analysis, but it also extends to every other discipline.</span></p><p class="i3" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">a. You MUST adopt the mental disposition that good enough isn’t good enough. Perfect is good enough, but we can’t be perfected without the Almighty</span></p><p class="i3" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">b. You MUST be fascinated with truth — not just casually interested as long as some version of “truth” confirms what you’re already comfortable with… John 8:31-32</span></p><p class="i3" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">c. Without accurate thinking — precision thinking — especially about SELF, and every other spiritual topic, you can’t even begin to take the first step toward spiritual prosperity.</span></p><p class="i1" data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">B. GET E-MOTIVATED</span></p><p class="i2" data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">1. Even if we are willing to engage in accurate thinking about SELF and come away from that exercise realizing just how bad off we are — nothing, I repeat, NOTHING will change unless we let that realization sink in and motivate us to CHANGE the direction of our life.</span></p><p class="i2" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">2. But what is motivation? The root of that word forms the basis of another familiar word emotion.</span></p><p class="i3" data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">a. And what are emotions? They are intense feelings that compel us to do something.</span></p><p class="i3" data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">b. Are emotions good? Yes, absolutely. God created them to help us get up off the couch and into the game of life.</span></p><p class="i3" data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">c. However, they must be educated with spiritual perspective.</span></p><p class="i3" data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">d. Proverbs 14:12</span></p><p class="i2" data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">3. The first part of that perspective has already occurred in step one (accurate thinking), or as I like to call it, living in “Realsville”</span></p><p class="i3" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">a. Accurate thinking should stimulate intense emotional feelings — sometimes painful feelings — that energize us to do something about the sorry state in which we find ourselves.</span></p><p class="i3" data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">b. That real, emotional state should provide the energy needed to help us get to the next step.</span></p><p class="i1" data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">C. SAY “NO” TO SELF</span></p><p class="i2" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">1. While emotions are great for motivating us to take action, especially when they are the product of us seeing our true spiritual state, feelings must give way to discipline.</span></p><p class="i2" data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">2. If you can’t say “no” to self, putting the brakes on when needed … or if you can’t kick yourself in the back side to get going when necessary, then your emotional energy will be wasted and bound to cause more damage than good — emotion without action can lead anger, foul moods, depression, etc.</span></p><p class="i3" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">a. Galatians 2:20</span></p><p class="i3" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">b. Say no to self and yes to Christ</span></p><p class="i2" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">3. Here’s a tip. Saying “no” to self is probably the most difficult part … especially when we live in a world that makes it easy to avoid immediate negative consequences for the bad decisions we make.</span></p><p class="i2" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">4. But if you can harness your emotions and use them to get you headed in the right direction spiritually, then it’s time to feed an addiction.</span></p><p class="i1" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">D. GET SPIRITUALLY ADDICTED</span></p><p class="i2" data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">1. Addiction for many people is a bad word, it brings to mind those who are enslaved often to a chemical dependency of some sort.</span></p><p class="i3" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">a. However, there is an addiction that is perfectly acceptable, and here it is.</span></p><p class="i3" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">b. Getting addicted to reading, studying, applying, and teaching God’s word.</span></p><p class="i3" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">c. 2 Timothy 2:15</span></p><p class="i3" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">d. 1 Timothy 4:13</span></p><p class="i3" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">e. Psalm 119:97</span></p><p class="i2" data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">2. I know a fellow who once told me, “I really don’t like reading the Bible.”</span></p><p class="i3" data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">a. That makes me sad.</span></p><p class="i3" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">b. Because that person is not addicted to the one thing that provides the ONLY source of true spiritual development.</span></p><p class="i3" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">c. Matthew 5:6</span></p><p class="i2" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">3. When you analyze self and realize you are spiritually broke…</span></p><p class="i3" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">a. When you get motivated to do something about it — to make real and meaningful changes…</span></p><p class="i3" data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">b. When you say no to the thoughts of your own head and look for real answers in God’s word, and then begin searching the scriptures relentlessly for wisdom and direction in your life,</span></p><p class="i3" data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">c. When you become physically and psychologically dependent on God’s word, and when there is no plausible substitute</span></p><p class="i2" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">4. Then and only then will your spiritual progress greatly improve</span></p><p class="i2" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">5. But be careful there is a pitfall to avoid. And it’s the basis of the next step.</span></p><p class="i2" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">6. But before we move on, let’s quickly recap the first four steps.</span></p><p class="i3" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">a. Accurate Thinking — We must MUST demand of ourselves accurate thinking in all spiritual matters … especially when it comes to self-evaluation.</span></p><p class="i3" data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">b. E-motivated — We must be emotionally affected by the truth. Rocks are unemotional; so are tree stumps. We are humans, not stumps. We must fuel the emotional fires that will help us move in the direction of spiritual maturity.</span></p><p class="i3" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">c. Say “No” to self — Emotional energy must not run amok. Our emotions must be directed with self-discipline. We channel emotional energy to work for us rather than against us.</span></p><p class="i3" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">d. Get Spiritually Addicted — With so many diversions and distractions, we will never grow as we should until we pursue righteousness as if it were the most important thing in our lives.</span></p><p class="i2" data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">7. This next step is critical because it addresses a big problem that has the potential to destroy even the godliest person. In order to continue to progress along a path toward spiritual maturity, we must develop…</span></p><p class="i1" data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">E. COMPASSION FOR OTHERS</span></p><p class="i2" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">1. Have you ever known someone who seems to be spiritually knowledgeable? I mean, they can quote verse after verse from the Bible (or at least cite lots of references), but then they demonstrate very little tolerance or compassion for others especially those who are just starting on the path toward spiritual maturity.</span></p><p class="i2" data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">2. Compassion for others is the next step. Don’t skip it.</span></p><p class="i3" data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">a. Mercy and heartfelt compassion for others is essential to getting beyond the basics.</span></p><p class="i3" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">b. Because love demonstrated constantly reminds us of where we were and where we are spiritually.</span></p><p class="i2" data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">3. Fostering compassion for others helps us to not think of ourselves more highly than we ought.</span></p><p class="i3" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">a. Romans 12:3</span></p><p class="i3" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">b. 1 John 3:17</span></p><p class="i3" data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">c. A sense of compassion for others helps us to go back and relive step 1 (accurate thinking), but on a more active level.</span></p><p class="i3" data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">d. Why do some folks hold grudges? Why do some constantly jockey for position seeking the chief seats?</span></p><p class="i3" data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">e. Such behaviors only demonstrate that a person is bogged down and stuck in a spiritual ditch rather than truly maturing in Christian virtue.</span></p><p class="i2" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">4. Here’s a self-check quiz: Do you actively think to yourself, “How can I demonstrate compassion to ______,” and think those thoughts about every person you meet?</span></p><p class="i3" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">a. It’s not easy, quite frankly, for some people are not so lovable.</span></p><p class="i3" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">b. But if we put our personal agendas aside and learn to really show compassion, not just with lip service but in action, then we are well on our way to getting the next step in focus.</span></p><p class="i1" data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">F. ELIMINATE THE DROSS</span></p><p class="i2" data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">1. So how do we become a more compassionate people?</span></p><p class="i3" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">a. Like a refiner of gold, we must get rid of the dross — the worthless impurities that devalue the treasure.</span></p><p class="i3" data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">b. Eliminating ALL other motives other than serving God and helping others is the key to this step.</span></p><p class="i2" data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">2. But words are cheap. It’s much easier to say, “I love God,” than it is to PROVE it by demonstration.</span></p><p class="i3" data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">a. In fact, the person who truly masters this step has little need to TELL anyone how much they love God — for it is easily seen</span></p><p class="i3" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">b. So here’s a tip. Behavior proves your motives. In other words as the old saying goes actions speak louder than words.</span></p><p class="i3" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">c. Matthew 7:21</span></p><p class="i3" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">d. Luke 6:46</span></p><p class="i2" data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">3. In other words, the fruit that you bear is evidence of what kind of tree you are…</span></p><p class="i1" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">G. HELP TRANSFORM OTHER PEOPLE … EVEN YOUR ENEMIES.</span></p><p class="i2" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">1. If you have followed all these steps thus far accurate thinking with self-analysis, emotional focus, self-discipline, getting addicted to God’s word, compassion for others, purifying your motives…</span></p><p class="i3" data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">a. When you understand and put these steps into action, then you will be prepared to be transformed into something different.</span></p><p class="i3" data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">b. And most importantly, you will be ready to deal with the most difficult people in your life on a whole new level.</span></p><p class="i3" data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">c. Romans 12:1-2</span></p><p class="i2" data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">2. Imagine turning the biggest pain in your neck, the person in your life who causes you the greatest amount of grief, into a personal friend and spiritual partner.</span></p><p class="i2" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">3. You may be thinking: “Tom, have you been talking to fairies in the woods?”</span></p><p class="i3" data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">a. “If you knew Mr. _______, you would know my pain.</span></p><p class="i3" data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">b. What you are talking about is mission impossible.”</span></p><p class="i2" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">4. The fact is that you will never know if your enemy could become a friend unless you TRY with your best effort to become what Christ called a “peace-MAKER.”</span></p><p class="i3" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">a. Matthew 5:9</span></p><p class="i3" data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">b. When you have the righteous confidence that only comes with spiritual maturity and compassion for others,</span></p><p class="i3" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">c. When you realize that you cannot lose by making peace rather than engaging in mortal combat with others — peace is possible</span></p><p class="i2" data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">5. We are not talking about compromising truth for peace.</span></p><p class="i3" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">a. Proverbs 23:23</span></p><p class="i3" data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">b. We are talking about working for peace and harmony with your enemies — those who would do you harm — using God’s word as our guide</span></p><p class="i2" data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">6. And now you are ready to move to the final step…</span></p><p class="i1" data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">H. TOTAL, ABSOLUTE, UNCONDITIONAL COMMITMENT</span></p><p class="i2" data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">1. This last step is so simple and so obvious to explain but not so easy to do. That part will be up to you.</span></p><p class="i2" data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">2. When President Truman was negotiating the terms of surrender in World War II, these were his conditions: There were NO conditions. The only thing he would accept is complete and total unconditional surrender.</span></p><p class="i2" data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">3. In the spiritual journey we’ve been discussing, we are the enemy. Christ is the victor. He is inviting us to join Him as friend and brother.</span></p><p class="i3" data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">a. But here are His terms: Total and unconditional surrender. Total commitment to Him no matter what the cost… Mark 12:30</span></p><p class="i3" data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">b. And there is a cost. You may be abused by enemies who will never soften despite your best efforts at peacemaking — it may cost you relationships with family — it may cost you a job</span></p><p class="i3" data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">c. Matthew 10:34-39</span></p><p class="i3" data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">d. Spiritual maturity WILL cost you something so here is the key…</span></p><p class="i2" data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">4. Are you willing to sacrifice something NOW for something better LATER?</span></p><p class="i3" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">a. Jesus put it like this… Luke 9:62</span></p><p class="i3" data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">b. To really develop spiritually, you’ve got to be 100% committed to making spiritual progress — NO MATTER WHAT.</span></p><p class="i2" data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">5. Those are the 8 Steps that lead to spiritual prosperity.</span></p><p class="i3" data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">a. Embrace Accurate Thinking</span></p><p class="i3" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">b. Be Emotionally Motivated</span></p><p class="i3" data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">c. Exercise Self-control</span></p><p class="i3" data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">d. Get Addicted to Righteousness</span></p><p class="i3" data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">e. Practice and Demonstrate Compassion</span></p><p class="i3" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">f. Eliminate Impure Motives</span></p><p class="i3" data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">g. Seek peace</span></p><p class="i3" data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">h. Be Totally Committed</span></p><p class="ser" data-dcnode-id="190"><strong data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">CONCLUSION</span></strong></p><p class="i1" data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">A. These 8 steps that lead toward spiritual prosperity are not merely steps they ARE spiritual prosperity.</span></p><p class="i1" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">B. In this case the journey really is the reward.</span></p><p class="i2" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">1. When you successfully incorporate these principles, ALL of them in your life, you will be a spiritually prosperous person — something to think about.</span></p><p class="i2" data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">2. And ultimately these attitudes will lead you to the ultimate spiritual reward in heaven with your God.</span></p><p class="i1" data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">C. Finally, I didn’t make up these steps. They are not my own creation. So I don’t take credit for some kind of super spiritual insight. I have merely brought these ideas to you as something that can really help you like they have helped me.</span></p><p class="i1" data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">D. Where did I get these ideas? Read Matthew 5:3-13</span></p><p class="ser" data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">*This sermon was developed from an article written by Jason Jackson</span></p><div class="yarpp-related" data-dcnode-id="154"><h3 data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">Related posts:</span></h3><ul data-dcnode-id="155"><li data-dcnode-id="171"><a data-dcnode-id="172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gewatkins.net/measuring-spiritual-growth/" rel="bookmark" title="Measuring Spiritual Growth"><span data-dcnode-id="173" instrument_node="">Measuring Spiritual Growth </span></a></li><li data-dcnode-id="168"><a data-dcnode-id="169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gewatkins.net/the-spirit-filled-christian/" rel="bookmark" title="The “Spirit-Filled” Christian"><span data-dcnode-id="170" instrument_node="">The “Spirit-Filled” Christian </span></a></li><li data-dcnode-id="165"><a data-dcnode-id="166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gewatkins.net/pro-anorexia/" rel="bookmark" title="Pro-Anorexia?"><span data-dcnode-id="167" instrument_node="">Pro-Anorexia? </span></a></li><li data-dcnode-id="162"><a data-dcnode-id="163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gewatkins.net/the-dramatic-growth-of-the-first-century-church/" rel="bookmark" title="The Dramatic Growth Of The First Century Church"><span data-dcnode-id="164" instrument_node="">The Dramatic Growth Of The First Century Church </span></a></li><li data-dcnode-id="159"><a data-dcnode-id="160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gewatkins.net/are-you-spiritual-relig
