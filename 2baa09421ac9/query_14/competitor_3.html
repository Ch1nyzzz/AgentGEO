</span></p><p data-dcnode-id="3075"><span data-dcnode-id="3094" instrument_node="">In </span><i data-dcnode-id="3091"><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Orc%2527s_Rage" title="Red Orc's Rage"><span data-dcnode-id="3093" instrument_node="">Red Orc's Rage</span></a></i><span data-dcnode-id="3090" instrument_node=""> by </span><a class="mw-redirect" data-dcnode-id="3088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philip_J._Farmer" title="Philip J. Farmer"><span data-dcnode-id="3089" instrument_node="">Philip J. Farmer</span></a><span data-dcnode-id="3087" instrument_node=""> a doubly </span><a class="mw-redirect" data-dcnode-id="3085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recursive_method" title="Recursive method"><span data-dcnode-id="3086" instrument_node="">recursive method</span></a><span data-dcnode-id="3084" instrument_node=""> is used to intertwine its fictional layers. This novel is part of a science-fiction series, the </span><i data-dcnode-id="3081"><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_of_Tiers" title="World of Tiers"><span data-dcnode-id="3083" instrument_node="">World of Tiers</span></a></i><span data-dcnode-id="3080" instrument_node="">. Farmer collaborated in the writing of this novel with an American psychiatrist, Dr. A. James Giannini. Dr. Giannini had previously used the World of Tiers series in treating patients in group therapy. During these therapeutic sessions, the content and process of the text and novelist was discussed rather than the lives of the patients. In this way subconscious defenses could be circumvented. Farmer took the real life case-studies and melded these with adventures of his characters in the series.</span><sup class="reference" data-dcnode-id="3077" id="cite_ref-6"><a data-dcnode-id="3078" href="#cite_note-6"><span data-dcnode-id="3079" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3076" instrument_node="">
</span></p><p data-dcnode-id="3053"><span data-dcnode-id="3074" instrument_node="">The </span><i data-dcnode-id="3071"><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quantum_Leap" title="Quantum Leap"><span data-dcnode-id="3073" instrument_node="">Quantum Leap</span></a></i><span data-dcnode-id="3070" instrument_node=""> novel </span><i data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">Knights of the Morningstar</span></i><span data-dcnode-id="3067" instrument_node=""> also features a character who writes a book by that name. In </span><a data-dcnode-id="3065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matthew_Stover" title="Matthew Stover"><span data-dcnode-id="3066" instrument_node="">Matthew Stover</span></a><span data-dcnode-id="3064" instrument_node="">'s novel </span><i data-dcnode-id="3061"><a class="mw-redirect" data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shatterpoint" title="Shatterpoint"><span data-dcnode-id="3063" instrument_node="">Shatterpoint</span></a></i><span data-dcnode-id="3060" instrument_node="">, the protagonist </span><a data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mace_Windu" title="Mace Windu"><span data-dcnode-id="3059" instrument_node="">Mace Windu</span></a><span data-dcnode-id="3057" instrument_node=""> narrates the story within his journal, while the main story is being told from the </span><a class="mw-redirect" data-dcnode-id="3055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third-person_limited" title="Third-person limited"><span data-dcnode-id="3056" instrument_node="">third-person limited</span></a><span data-dcnode-id="3054" instrument_node=""> point of view.
</span></p><p data-dcnode-id="2996"><span data-dcnode-id="3052" instrument_node="">Several </span><i data-dcnode-id="3049"><a data-dcnode-id="3050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_Trek" title="Star Trek"><span data-dcnode-id="3051" instrument_node="">Star Trek</span></a></i><span data-dcnode-id="3048" instrument_node=""> tales are stories or events within stories, such as </span><a data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gene_Roddenberry" title="Gene Roddenberry"><span data-dcnode-id="3047" instrument_node="">Gene Roddenberry</span></a><span data-dcnode-id="3045" instrument_node="">'s </span><a data-dcnode-id="3043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novelization" title="Novelization"><span data-dcnode-id="3044" instrument_node="">novelization</span></a><span data-dcnode-id="3042" instrument_node=""> of </span><i data-dcnode-id="3039"><a data-dcnode-id="3040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_Trek%3A_The_Motion_Picture" title="Star Trek: The Motion Picture"><span data-dcnode-id="3041" instrument_node="">Star Trek: The Motion Picture</span></a></i><span data-dcnode-id="3038" instrument_node="">, </span><a data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._A._Lawrence" title="J. A. Lawrence"><span data-dcnode-id="3037" instrument_node="">J. A. Lawrence</span></a><span data-dcnode-id="3035" instrument_node="">'s </span><i data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">Mudd's Angels</span></i><span data-dcnode-id="3032" instrument_node="">, </span><a data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_M._Ford" title="John M. Ford"><span data-dcnode-id="3031" instrument_node="">John M. Ford</span></a><span data-dcnode-id="3029" instrument_node="">'s </span><i data-dcnode-id="3026"><a data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Final_Reflection" title="The Final Reflection"><span data-dcnode-id="3028" instrument_node="">The Final Reflection</span></a></i><span data-dcnode-id="3025" instrument_node="">, </span><a data-dcnode-id="3023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Wander_Bonanno" title="Margaret Wander Bonanno"><span data-dcnode-id="3024" instrument_node="">Margaret Wander Bonanno</span></a><span data-dcnode-id="3022" instrument_node="">'s </span><i data-dcnode-id="3019"><a data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strangers_from_the_Sky" title="Strangers from the Sky"><span data-dcnode-id="3021" instrument_node="">Strangers from the Sky</span></a></i><span data-dcnode-id="3018" instrument_node=""> (which adopts the conceit that it is book from the future by an author called Gen Jaramet-Sauner), and J. R. Rasmussen's "Research" in the anthology </span><i data-dcnode-id="3014"><a data-dcnode-id="3016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_Trek%3A_Strange_New_Worlds_%28short_story_collection%29" title="Star Trek: Strange New Worlds (short story collection)"><span data-dcnode-id="3017" instrument_node="">Star Trek: Strange New Worlds</span></a><span data-dcnode-id="3015" instrument_node=""> II</span></i><span data-dcnode-id="3013" instrument_node="">. </span><a data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steven_Barnes" title="Steven Barnes"><span data-dcnode-id="3012" instrument_node="">Steven Barnes</span></a><span data-dcnode-id="3010" instrument_node="">'s novelization of "</span><a data-dcnode-id="3008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Far_Beyond_the_Stars" title="Far Beyond the Stars"><span data-dcnode-id="3009" instrument_node="">Far Beyond the Stars</span></a><span data-dcnode-id="3007" instrument_node="">" partners with </span><a data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greg_Cox_%28writer%29" title="Greg Cox (writer)"><span data-dcnode-id="3006" instrument_node="">Greg Cox</span></a><span data-dcnode-id="3004" instrument_node="">'s </span><i data-dcnode-id="3001"><a data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Eugenics_Wars%3A_The_Rise_and_Fall_of_Khan_Noonien_Singh" title="The Eugenics Wars: The Rise and Fall of Khan Noonien Singh"><span data-dcnode-id="3003" instrument_node="">The Eugenics Wars: The Rise and Fall of Khan Noonien Singh</span></a></i><span data-dcnode-id="3000" instrument_node=""> (Volume Two) to tell us that the story "Far Beyond the Stars"—and, by extension, all of </span><i data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">Star Trek</span></i><span data-dcnode-id="2997" instrument_node=""> itself—is the creation of 1950s writer Benny Russell.
</span></p><p data-dcnode-id="2984"><span data-dcnode-id="2995" instrument_node="">The book </span><i data-dcnode-id="2992"><a data-dcnode-id="2993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cloud_Atlas_%28novel%29" title="Cloud Atlas (novel)"><span data-dcnode-id="2994" instrument_node="">Cloud Atlas</span></a></i><span data-dcnode-id="2991" instrument_node=""> (later adapted into a film by </span><a data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Wachowskis" title="The Wachowskis"><span data-dcnode-id="2990" instrument_node="">The Wachowskis</span></a><span data-dcnode-id="2988" instrument_node=""> and </span><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tom_Tykwer" title="Tom Tykwer"><span data-dcnode-id="2987" instrument_node="">Tom Tykwer</span></a><span data-dcnode-id="2985" instrument_node="">) consisted of six interlinked stories nested inside each other in a Russian doll fashion. The first story (that of Adam Ewing in the 1850s befriending an escaped slave) is interrupted halfway through and revealed to be part of a journal being read by composer Robert Frobisher in 1930s Belgium. His own story of working for a more famous composer is told in a series of letters to his lover Rufus Sixsmith, which are interrupted halfway through and revealed to be in the possession of an investigative journalist named Luisa Rey and so on. Each of the first five tales are interrupted in the middle, with the sixth tale being told in full, before the preceding five tales are finished in reverse order. Each layer of the story either challenges the veracity of the previous layer, or is challenged by the succeeding layer. Presuming each layer to be a true telling within the overall story, a chain of events is created linking Adam Ewing's embrace of the abolitionist movement in the 1850s to the religious redemption of a post-apocalyptic tribal man over a century after the fall of modern civilization. The characters in each nested layer take inspiration or lessons from the stories of their predecessors in a manner that validates a belief stated in the sixth tale that "Our lives are not our own. We are bound to others, past and present and by each crime, and every kindness, we birth our future."
</span></p><span data-dcnode-id="2983" instrument_node="">
</span><h4 data-dcnode-id="2973"><span class="mw-headline" data-dcnode-id="2981" id="Play_or_film_within_a_book"><span data-dcnode-id="2982" instrument_node="">Play or film within a book</span></span><span class="mw-editsection" data-dcnode-id="2974"><span class="mw-editsection-bracket" data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">[</span></span><a data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D7" title="Edit section: Play or film within a book"><span data-dcnode-id="2978" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2972" instrument_node="">
</span><p data-dcnode-id="2951"><i data-dcnode-id="2969"><a data-dcnode-id="2970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Crying_of_Lot_49" title="The Crying of Lot 49"><span data-dcnode-id="2971" instrument_node="">The Crying of Lot 49</span></a></i><span data-dcnode-id="2968" instrument_node=""> by </span><a data-dcnode-id="2966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Pynchon" title="Thomas Pynchon"><span data-dcnode-id="2967" instrument_node="">Thomas Pynchon</span></a><span data-dcnode-id="2965" instrument_node=""> has several characters seeing a play called </span><i data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">The Courier's Tragedy</span></i><span data-dcnode-id="2962" instrument_node=""> by the fictitious </span><a data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_Renaissance_theatre" title="English Renaissance theatre"><span data-dcnode-id="2961" instrument_node="">Jacobean</span></a><span data-dcnode-id="2959" instrument_node=""> </span><a data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Playwright" title="Playwright"><span data-dcnode-id="2958" instrument_node="">playwright</span></a><span data-dcnode-id="2956" instrument_node=""> Richard Wharfinger. The events of the play broadly mirror those of the novel and give the main character, Oedipa Maas, a greater context with which to consider her predicament; the play concerns a feud between two rival mail distribution companies, which appears to be ongoing to the present day, and in which, if this is the case, Oedipa has found herself involved. As in </span><i data-dcnode-id="2953"><a data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hamlet" title="Hamlet"><span data-dcnode-id="2955" instrument_node="">Hamlet</span></a></i><span data-dcnode-id="2952" instrument_node="">, the director makes changes to the original script; in this instance, a couplet that was added, possibly by religious zealots intent on giving the play extra moral gravity, are said only on the night that Oedipa sees the play.
</span></p><p data-dcnode-id="2922"><span data-dcnode-id="2950" instrument_node="">From what Pynchon relates, this is the only mention in the play of Thurn and Taxis' rivals' name—Trystero—and it is the seed for the conspiracy that unfurls. A significant portion of </span><a data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_Moers" title="Walter Moers"><span data-dcnode-id="2949" instrument_node="">Walter Moers</span></a><span data-dcnode-id="2947" instrument_node="">' </span><i data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Labyrinth of Dreaming Books</span></i><span data-dcnode-id="2944" instrument_node=""> is an </span><a data-dcnode-id="2942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ekphrasis" title="Ekphrasis"><span data-dcnode-id="2943" instrument_node="">ekphrasis</span></a><span data-dcnode-id="2941" instrument_node=""> on the subject of an epic puppet theater presentation. Another example is found in </span><a class="mw-redirect" data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_Delany" title="Samuel Delany"><span data-dcnode-id="2940" instrument_node="">Samuel Delany</span></a><span data-dcnode-id="2938" instrument_node="">'s </span><i data-dcnode-id="2935"><a class="mw-redirect" data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trouble_on_Triton" title="Trouble on Triton"><span data-dcnode-id="2937" instrument_node="">Trouble on Triton</span></a></i><span data-dcnode-id="2934" instrument_node="">, which features a theater company that produces elaborate staged spectacles for randomly selected single-person audiences. Plays produced by the "Caws of Art" theater company also feature in Russell Hoban's modern fable, </span><i data-dcnode-id="2931"><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Mouse_and_His_Child" title="The Mouse and His Child"><span data-dcnode-id="2933" instrument_node="">The Mouse and His Child</span></a></i><span data-dcnode-id="2930" instrument_node="">. </span><a data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raina_Telgemeier" title="Raina Telgemeier"><span data-dcnode-id="2929" instrument_node="">Raina Telgemeier</span></a><span data-dcnode-id="2927" instrument_node="">'s best-selling </span><i data-dcnode-id="2924"><a data-dcnode-id="2925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drama_%28graphic_novel%29" title="Drama (graphic novel)"><span data-dcnode-id="2926" instrument_node="">Drama</span></a></i><span data-dcnode-id="2923" instrument_node=""> is a graphic novel about a middle-school musical production, and the tentative romantic fumblings of its cast members.
</span></p><p data-dcnode-id="2904"><span data-dcnode-id="2921" instrument_node="">In </span><a data-dcnode-id="2919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manuel_Puig" title="Manuel Puig"><span data-dcnode-id="2920" instrument_node="">Manuel Puig</span></a><span data-dcnode-id="2918" instrument_node="">'s </span><i data-dcnode-id="2915"><a data-dcnode-id="2916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kiss_of_the_Spider_Woman_%28novel%29" title="Kiss of the Spider Woman (novel)"><span data-dcnode-id="2917" instrument_node="">Kiss of the Spider Woman</span></a></i><span data-dcnode-id="2914" instrument_node="">, ekphrases on various old movies, some real, and some fictional, make up a substantial portion of the narrative. In </span><a data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Russell_%28novelist%29" title="Paul Russell (novelist)"><span data-dcnode-id="2913" instrument_node="">Paul Russell</span></a><span data-dcnode-id="2911" instrument_node="">'s </span><i data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Boys of Life</span></i><span data-dcnode-id="2908" instrument_node="">, descriptions of movies by director/antihero Carlos (loosely inspired by controversial director </span><a data-dcnode-id="2906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pier_Paolo_Pasolini" title="Pier Paolo Pasolini"><span data-dcnode-id="2907" instrument_node="">Pier Paolo Pasolini</span></a><span data-dcnode-id="2905" instrument_node="">) provide a narrative counterpoint and add a touch of surrealism to the main narrative. They additionally raise the question of whether works of artistic genius justify or atone for the sins and crimes of their creators.
</span></p><span data-dcnode-id="2903" instrument_node="">
</span><h3 data-dcnode-id="2893"><span class="mw-headline" data-dcnode-id="2901" id="Nested_plays"><span data-dcnode-id="2902" instrument_node="">Nested plays</span></span><span class="mw-editsection" data-dcnode-id="2894"><span class="mw-editsection-bracket" data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">[</span></span><a data-dcnode-id="2897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D8" title="Edit section: Nested plays"><span data-dcnode-id="2898" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2892" instrument_node="">
</span><p data-dcnode-id="2829"><span data-dcnode-id="2891" instrument_node="">This dramatic device was probably first used by </span><a data-dcnode-id="2889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Kyd" title="Thomas Kyd"><span data-dcnode-id="2890" instrument_node="">Thomas Kyd</span></a><span data-dcnode-id="2888" instrument_node=""> in </span><i data-dcnode-id="2885"><a data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Spanish_Tragedy" title="The Spanish Tragedy"><span data-dcnode-id="2887" instrument_node="">The Spanish Tragedy</span></a></i><span data-dcnode-id="2884" instrument_node=""> around 1587, where the play is presented before an audience of two of the characters, who comment upon the action.</span><sup class="reference" data-dcnode-id="2881" id="cite_ref-7"><a data-dcnode-id="2882" href="#cite_note-7"><span data-dcnode-id="2883" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="2878" id="cite_ref-8"><a data-dcnode-id="2879" href="#cite_note-8"><span data-dcnode-id="2880" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2877" instrument_node=""> From references in other contemporary works, Kyd is also assumed to have been the writer of an early, lost version of </span><i data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">Hamlet</span></i><span data-dcnode-id="2874" instrument_node=""> (the so-called </span><i data-dcnode-id="2871"><a data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ur-Hamlet" title="Ur-Hamlet"><span data-dcnode-id="2873" instrument_node="">Ur-Hamlet</span></a></i><span data-dcnode-id="2870" instrument_node="">), with a play-within-a-play interlude.</span><sup class="reference" data-dcnode-id="2867" id="cite_ref-9"><a data-dcnode-id="2868" href="#cite_note-9"><span data-dcnode-id="2869" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2866" instrument_node=""> </span><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Shakespeare" title="William Shakespeare"><span data-dcnode-id="2865" instrument_node="">William Shakespeare</span></a><span data-dcnode-id="2863" instrument_node="">'s </span><i data-dcnode-id="2860"><a data-dcnode-id="2861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hamlet" title="Hamlet"><span data-dcnode-id="2862" instrument_node="">Hamlet</span></a></i><span data-dcnode-id="2859" instrument_node=""> retains this device by having Hamlet ask some strolling players to perform the </span><i data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">Murder of Gonzago</span></i><span data-dcnode-id="2856" instrument_node="">. The action and characters in </span><i data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">The Murder</span></i><span data-dcnode-id="2853" instrument_node=""> mirror the murder of Hamlet's father in the main action, and Prince Hamlet writes additional material to emphasize this. Hamlet wishes to provoke the murderer, his uncle, and sums this up by saying "the play's the thing wherein I'll catch the conscience of the king." Hamlet calls this new play </span><i data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">The Mouse-trap</span></i><span data-dcnode-id="2850" instrument_node=""> (a title that </span><a data-dcnode-id="2848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agatha_Christie" title="Agatha Christie"><span data-dcnode-id="2849" instrument_node="">Agatha Christie</span></a><span data-dcnode-id="2847" instrument_node=""> later took for the long-running play </span><i data-dcnode-id="2844"><a data-dcnode-id="2845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Mousetrap" title="The Mousetrap"><span data-dcnode-id="2846" instrument_node="">The Mousetrap</span></a></i><span data-dcnode-id="2843" instrument_node="">). Christie's work was parodied in Tom Stoppard's </span><i data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">The Real Inspector Hound</span></i><span data-dcnode-id="2840" instrument_node="">, in which two theater critics are drawn into the murder mystery they are watching. The audience is similarly absorbed into the action in Woody Allen's play </span><i data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">God</span></i><span data-dcnode-id="2837" instrument_node="">, which is about two failed playwrights in Ancient Greece.  The phrase </span><i data-dcnode-id="2834"><a data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Conscience_of_the_King" title="The Conscience of the King"><span data-dcnode-id="2836" instrument_node="">The Conscience of the King</span></a></i><span data-dcnode-id="2833" instrument_node=""> also became the title of a </span><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_Trek" title="Star Trek"><span data-dcnode-id="2832" instrument_node="">Star Trek</span></a><span data-dcnode-id="2830" instrument_node=""> episode featuring a production of Hamlet which leads to the exposure of a murderer (although not a king).
</span></p><p data-dcnode-id="2793"><span data-dcnode-id="2828" instrument_node="">The play </span><i data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">I Hate Hamlet</span></i><span data-dcnode-id="2825" instrument_node=""> and the movie </span><i data-dcnode-id="2822"><a class="mw-redirect" data-dcnode-id="2823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_Midwinter%2527s_Tale" title="A Midwinter's Tale"><span data-dcnode-id="2824" instrument_node="">A Midwinter's Tale</span></a></i><span data-dcnode-id="2821" instrument_node=""> are about a production of </span><i data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">Hamlet</span></i><span data-dcnode-id="2818" instrument_node="">, which in turn includes a production of </span><i data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">The Murder of Gonzago</span></i><span data-dcnode-id="2815" instrument_node="">, as does the </span><i data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Hamlet</span></i><span data-dcnode-id="2812" instrument_node="">-based film </span><i data-dcnode-id="2809"><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rosencrantz_%2526_Guildenstern_Are_Dead_%28film%29" title="Rosencrantz &amp; Guildenstern Are Dead (film)"><span data-dcnode-id="2811" instrument_node="">Rosencrantz &amp; Guildenstern Are Dead</span></a></i><span data-dcnode-id="2808" instrument_node="">, which even features a third-level puppet theatre version within their play. Similarly, in </span><a data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anton_Chekhov" title="Anton Chekhov"><span data-dcnode-id="2807" instrument_node="">Anton Chekhov</span></a><span data-dcnode-id="2805" instrument_node="">'s </span><i data-dcnode-id="2802"><a data-dcnode-id="2803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Seagull" title="The Seagull"><span data-dcnode-id="2804" instrument_node="">The Seagull</span></a></i><span data-dcnode-id="2801" instrument_node=""> there are specific allusions to </span><i data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">Hamlet</span></i><span data-dcnode-id="2798" instrument_node="">: in the first act a son stages a play to impress his mother, a professional actress, and her new lover; the mother responds by comparing her son to Hamlet. Later he tries to come between them, as Hamlet had done with his mother and her new husband. The tragic developments in the plot follow in part from the scorn the mother shows for her son's play.</span><sup class="reference" data-dcnode-id="2795" id="cite_ref-10"><a data-dcnode-id="2796" href="#cite_note-10"><span data-dcnode-id="2797" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2794" instrument_node="">
</span></p><p data-dcnode-id="2747"><span data-dcnode-id="2792" instrument_node="">Shakespeare adopted the play-within-a-play device for many of his other plays as well, including </span><i data-dcnode-id="2789"><a data-dcnode-id="2790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_Midsummer_Night%2527s_Dream" title="A Midsummer Night's Dream"><span data-dcnode-id="2791" instrument_node="">A Midsummer Night's Dream</span></a></i><span data-dcnode-id="2788" instrument_node=""> and </span><i data-dcnode-id="2785"><a class="mw-redirect" data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Love%2527s_Labours_Lost" title="Love's Labours Lost"><span data-dcnode-id="2787" instrument_node="">Love's Labours Lost</span></a></i><span data-dcnode-id="2784" instrument_node="">. Almost the whole of </span><i data-dcnode-id="2781"><a data-dcnode-id="2782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Taming_of_the_Shrew" title="The Taming of the Shrew"><span data-dcnode-id="2783" instrument_node="">The Taming of the Shrew</span></a></i><span data-dcnode-id="2780" instrument_node=""> is a play-within-a-play, presented to convince </span><a data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christopher_Sly" title="Christopher Sly"><span data-dcnode-id="2779" instrument_node="">Christopher Sly</span></a><span data-dcnode-id="2777" instrument_node="">, a drunken tinker, that he is a nobleman watching a private performance, but the device has no relevance to the plot (unless Katharina's subservience to her "lord" in the last scene is intended to strengthen the deception against the tinker</span><sup class="reference" data-dcnode-id="2774" id="cite_ref-11"><a data-dcnode-id="2775" href="#cite_note-11"><span data-dcnode-id="2776" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2773" instrument_node="">) and is often dropped in modern productions. The musical </span><i data-dcnode-id="2770"><a data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kiss_Me%2C_Kate" title="Kiss Me, Kate"><span data-dcnode-id="2772" instrument_node="">Kiss Me, Kate</span></a></i><span data-dcnode-id="2769" instrument_node=""> is about the production of a fictitious musical, </span><i data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">The Taming of the Shrew,</span></i><span data-dcnode-id="2766" instrument_node=""> based on the </span><a data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Taming_of_the_Shrew" title="The Taming of the Shrew"><span data-dcnode-id="2765" instrument_node="">Shakespeare play of the same name</span></a><span data-dcnode-id="2763" instrument_node="">, and features several scenes from it. </span><i data-dcnode-id="2760"><a class="mw-redirect" data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pericles_Prince_of_Tyre" title="Pericles Prince of Tyre"><span data-dcnode-id="2762" instrument_node="">Pericles</span></a></i><span data-dcnode-id="2759" instrument_node=""> draws in part on the 14th century </span><i data-dcnode-id="2756"><a data-dcnode-id="2757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confessio_Amantis" title="Confessio Amantis"><span data-dcnode-id="2758" instrument_node="">Confessio Amantis</span></a></i><span data-dcnode-id="2755" instrument_node=""> (itself a frame story) by </span><a data-dcnode-id="2753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Gower" title="John Gower"><span data-dcnode-id="2754" instrument_node="">John Gower</span></a><span data-dcnode-id="2752" instrument_node=""> and Shakespeare has the ghost of Gower "assume man's infirmities" to introduce his work to the contemporary audience and comment on the action of the play.</span><sup class="reference" data-dcnode-id="2749" id="cite_ref-12"><a data-dcnode-id="2750" href="#cite_note-12"><span data-dcnode-id="2751" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2748" instrument_node="">
</span></p><p data-dcnode-id="2734"><span data-dcnode-id="2746" instrument_node="">In </span><a data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francis_Beaumont" title="Francis Beaumont"><span data-dcnode-id="2745" instrument_node="">Francis Beaumont</span></a><span data-dcnode-id="2743" instrument_node="">'s </span><i data-dcnode-id="2740"><a class="mw-redirect" data-dcnode-id="2741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Knight_of_the_Burning_Pestle" title="Knight of the Burning Pestle"><span data-dcnode-id="2742" instrument_node="">Knight of the Burning Pestle</span></a></i><span data-dcnode-id="2739" instrument_node=""> (ca. 1608) a supposed common citizen from the audience, actually a "planted" actor, condemns the play that has just started and "persuades" the players to present something about a shopkeeper. The citizen's "apprentice" then acts, pretending to extemporise, in the rest of the play. This is a satirical tilt at Beaumont's playwright contemporaries and their current fashion for offering plays about London life.</span><sup class="reference" data-dcnode-id="2736" id="cite_ref-13"><a data-dcnode-id="2737" href="#cite_note-13"><span data-dcnode-id="2738" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2735" instrument_node="">
</span></p><p data-dcnode-id="2690"><span data-dcnode-id="2733" instrument_node="">The opera </span><i data-dcnode-id="2730"><a data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pagliacci" title="Pagliacci"><span data-dcnode-id="2732" instrument_node="">Pagliacci</span></a></i><span data-dcnode-id="2729" instrument_node=""> is about a troupe of actors who perform a play about marital infidelity that mirrors their own lives, and composer </span><a data-dcnode-id="2727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Rodney_Bennett" title="Richard Rodney Bennett"><span data-dcnode-id="2728" instrument_node="">Richard Rodney Bennett</span></a><span data-dcnode-id="2726" instrument_node=""> and </span><a data-dcnode-id="2724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Playwright" title="Playwright"><span data-dcnode-id="2725" instrument_node="">playwright</span></a><span data-dcnode-id="2723" instrument_node="">-</span><a class="mw-redirect" data-dcnode-id="2721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Librettist" title="Librettist"><span data-dcnode-id="2722" instrument_node="">librettist</span></a><span data-dcnode-id="2720" instrument_node=""> </span><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beverley_Cross" title="Beverley Cross"><span data-dcnode-id="2719" instrument_node="">Beverley Cross</span></a><span data-dcnode-id="2717" instrument_node="">'s </span><i data-dcnode-id="2714"><a data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Mines_of_Sulphur" title="The Mines of Sulphur"><span data-dcnode-id="2716" instrument_node="">The Mines of Sulphur</span></a></i><span data-dcnode-id="2713" instrument_node=""> features a ghostly troupe of actors who perform a play about murder that similarly mirrors the lives of their hosts, from whom they depart, leaving them with the plague as nemesis. </span><a data-dcnode-id="2711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Adams_%28composer%29" title="John Adams (composer)"><span data-dcnode-id="2712" instrument_node="">John Adams</span></a><span data-dcnode-id="2710" instrument_node="">' </span><i data-dcnode-id="2707"><a data-dcnode-id="2708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nixon_in_China" title="Nixon in China"><span data-dcnode-id="2709" instrument_node="">Nixon in China</span></a></i><span data-dcnode-id="2706" instrument_node=""> (1985-7) features a surreal version of </span><a data-dcnode-id="2704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jiang_Qing" title="Jiang Qing"><span data-dcnode-id="2705" instrument_node="">Madam Mao</span></a><span data-dcnode-id="2703" instrument_node="">'s </span><i data-dcnode-id="2700"><a data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Detachment_of_Women_%28ballet%29" title="Red Detachment of Women (ballet)"><span data-dcnode-id="2702" instrument_node="">Red Detachment of Women</span></a></i><span data-dcnode-id="2699" instrument_node="">, illuminating the ascendance of human values over the disillusionment of high politics in the meeting.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2692" style="white-space:nowrap;"><span data-dcnode-id="2698" instrument_node="">[</span><i data-dcnode-id="2694"><a data-dcnode-id="2695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2696" title="This claim needs references to reliable sources. (March 2019)"><span data-dcnode-id="2697" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2693" instrument_node="">]</span></sup><span data-dcnode-id="2691" instrument_node="">
</span></p><p data-dcnode-id="2662"><span data-dcnode-id="2689" instrument_node="">In </span><a data-dcnode-id="2687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bertolt_Brecht" title="Bertolt Brecht"><span data-dcnode-id="2688" instrument_node="">Bertolt Brecht</span></a><span data-dcnode-id="2686" instrument_node="">'s </span><i data-dcnode-id="2682"><a data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Caucasian_Chalk_Circle" title="The Caucasian Chalk Circle"><span data-dcnode-id="2685" instrument_node="">The Caucasian Chalk Circle</span></a><span data-dcnode-id="2683" instrument_node="">,</span></i><span data-dcnode-id="2681" instrument_node=""> a play is staged as a </span><a data-dcnode-id="2679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parable" title="Parable"><span data-dcnode-id="2680" instrument_node="">parable</span></a><span data-dcnode-id="2678" instrument_node=""> to villagers in the </span><a data-dcnode-id="2676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="2677" instrument_node="">Soviet Union</span></a><span data-dcnode-id="2675" instrument_node=""> to justify the re-allocation of their farmland: the tale describes how a child is awarded to a servant-girl rather than its natural mother, an aristocrat, as the woman most likely to care for it well. This kind of play-within-a-play, which appears at the beginning of the main play and acts as a 'frame' for it, is called an </span><i data-dcnode-id="2672"><a data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Induction_%28play%29" title="Induction (play)"><span data-dcnode-id="2674" instrument_node="">'induction'</span></a></i><span data-dcnode-id="2671" instrument_node="">. Brecht's one-act play </span><i data-dcnode-id="2668"><a data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Elephant_Calf" title="The Elephant Calf"><span data-dcnode-id="2670" instrument_node="">The Elephant Calf</span></a></i><span data-dcnode-id="2667" instrument_node=""> (1926) is a play-within-a-play performed in the foyer of the theatre during his </span><i data-dcnode-id="2664"><a data-dcnode-id="2665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Man_Equals_Man" title="Man Equals Man"><span data-dcnode-id="2666" instrument_node="">Man Equals Man</span></a></i><span data-dcnode-id="2663" instrument_node="">.
</span></p><p data-dcnode-id="2644"><span data-dcnode-id="2661" instrument_node="">In </span><a data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean_Giraudoux" title="Jean Giraudoux"><span data-dcnode-id="2660" instrument_node="">Jean Giraudoux</span></a><span data-dcnode-id="2658" instrument_node="">'s play </span><a data-dcnode-id="2655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ondine_%28play%29" title="Ondine (play)"><i data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Ondine</span></i></a><span data-dcnode-id="2654" instrument_node="">, all of act two is a series of scenes within scenes, sometimes two levels deep. This increases the </span><a class="mw-redirect" data-dcnode-id="2652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dramatic_tension" title="Dramatic tension"><span data-dcnode-id="2653" instrument_node="">dramatic tension</span></a><span data-dcnode-id="2651" instrument_node=""> and also makes more poignant the inevitable failure of the relationship between the </span><a data-dcnode-id="2649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human" title="Human"><span data-dcnode-id="2650" instrument_node="">mortal</span></a><span data-dcnode-id="2648" instrument_node=""> Hans and </span><a class="mw-redirect" data-dcnode-id="2646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_sprite" title="Water sprite"><span data-dcnode-id="2647" instrument_node="">water sprite</span></a><span data-dcnode-id="2645" instrument_node=""> Ondine.
</span></p><p data-dcnode-id="2636"><i data-dcnode-id="2641"><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Two-Character_Play" title="The Two-Character Play"><span data-dcnode-id="2643" instrument_node="">The Two-Character Play</span></a></i><span data-dcnode-id="2640" instrument_node=""> by </span><a data-dcnode-id="2638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tennessee_Williams" title="Tennessee Williams"><span data-dcnode-id="2639" instrument_node="">Tennessee Williams</span></a><span data-dcnode-id="2637" instrument_node=""> has a concurrent double plot with the convention of a play within a play. Felice and Clare are siblings and are both actor/producers touring ‘The Two-Character Play.’ They have supposedly been abandoned by their crew and have been left to put on the play by themselves. The characters in the play are also brother and sister and are also named Clare and Felice.
</span></p><p data-dcnode-id="2624"><i data-dcnode-id="2633"><a class="mw-redirect" data-dcnode-id="2634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Mysteries_%28play%29" title="The Mysteries (play)"><span data-dcnode-id="2635" instrument_node="">The Mysteries</span></a></i><span data-dcnode-id="2632" instrument_node="">, a modern reworking of the medieval </span><a data-dcnode-id="2630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mystery_play" title="Mystery play"><span data-dcnode-id="2631" instrument_node="">mystery plays</span></a><span data-dcnode-id="2629" instrument_node="">, remains faithful to its roots by having the modern actors play the sincere, naïve tradesmen and women as they take part in the original performances.</span><sup class="reference" data-dcnode-id="2626" id="cite_ref-14"><a data-dcnode-id="2627" href="#cite_note-14"><span data-dcnode-id="2628" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2625" instrument_node="">
</span></p><p data-dcnode-id="2598"><span data-dcnode-id="2623" instrument_node="">Alternatively, a play might be about the production of a play, and include the performance of all or part of the play, as in </span><i data-dcnode-id="2620"><a data-dcnode-id="2621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noises_Off" title="Noises Off"><span data-dcnode-id="2622" instrument_node="">Noises Off</span></a></i><span data-dcnode-id="2619" instrument_node="">, </span><i data-dcnode-id="2616"><a data-dcnode-id="2617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_Chorus_of_Disapproval_%28play%29" title="A Chorus of Disapproval (play)"><span data-dcnode-id="2618" instrument_node="">A Chorus of Disapproval</span></a></i><span data-dcnode-id="2615" instrument_node=""> or </span><i data-dcnode-id="2612"><a data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lilies_%28play%29" title="Lilies (play)"><span data-dcnode-id="2614" instrument_node="">Lilies</span></a></i><span data-dcnode-id="2611" instrument_node="">. Similarly, the musical </span><i data-dcnode-id="2608"><a data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Man_of_La_Mancha" title="Man of La Mancha"><span data-dcnode-id="2610" instrument_node="">Man of La Mancha</span></a></i><span data-dcnode-id="2607" instrument_node=""> presents the story of Don Quixote as an impromptu play staged in prison by </span><i data-dcnode-id="2603"><a data-dcnode-id="2605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Don_Quixote" title="Don Quixote"><span data-dcnode-id="2606" instrument_node="">Quixote</span></a><span data-dcnode-id="2604" instrument_node="">'</span></i><span data-dcnode-id="2602" instrument_node="">s author, </span><a data-dcnode-id="2600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miguel_de_Cervantes" title="Miguel de Cervantes"><span data-dcnode-id="2601" instrument_node="">Miguel de Cervantes</span></a><span data-dcnode-id="2599" instrument_node="">.
</span></p><p data-dcnode-id="2585"><span data-dcnode-id="2597" instrument_node="">In most stagings of the musical </span><i data-dcnode-id="2594"><a data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cats_%28musical%29" title="Cats (musical)"><span data-dcnode-id="2596" instrument_node="">Cats</span></a></i><span data-dcnode-id="2593" instrument_node="">, which include the song "Growltiger's Last Stand" — a recollection of an old play by Gus the Theatre Cat — the character of Lady </span><a class="mw-redirect" data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Griddlebone" title="Griddlebone"><span data-dcnode-id="2592" instrument_node="">Griddlebone</span></a><span data-dcnode-id="2590" instrument_node=""> sings "The Ballad of Billy McCaw". (However, many productions of the show omit "Growltiger's Last Stand", and "The Ballad of Billy McCaw" has at times been replaced with a mock aria, so this metastory isn't always seen.) Depending on the production, there is another musical scene called The Awful Battle of the Pekes and the Pollices where the Jellicles put on a show for their leader. In </span><i data-dcnode-id="2587"><a class="mw-redirect" data-dcnode-id="2588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lestat%3A_The_Musical" title="Lestat: The Musical"><span data-dcnode-id="2589" instrument_node="">Lestat: The Musical</span></a></i><span data-dcnode-id="2586" instrument_node="">, there are three play within a plays. First, when Lestat visits his childhood friend, Nicolas, who works in a theater, where he discovers his love for theater; and two more when the Theater of the Vampires perform. One is used as a plot mechanism to explain the vampire god, Marius, which sparks an interest in Lestat to find him.
</span></p><p data-dcnode-id="2572"><span data-dcnode-id="2584" instrument_node="">A play within a play also occurs in the musical </span><i data-dcnode-id="2581"><a data-dcnode-id="2582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_King_and_I" title="The King and I"><span data-dcnode-id="2583" instrument_node="">The King and I</span></a></i><span data-dcnode-id="2580" instrument_node="">, where Princess Tuptim and the royal dancers give a performance of </span><i data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Small House of Uncle Thomas</span></i><span data-dcnode-id="2577" instrument_node=""> (or </span><i data-dcnode-id="2574"><a data-dcnode-id="2575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uncle_Tom%2527s_Cabin" title="Uncle Tom's Cabin"><span data-dcnode-id="2576" instrument_node="">Uncle Tom's Cabin</span></a></i><span data-dcnode-id="2573" instrument_node="">) to their English guests. The play mirrors Tuptim's situation, as she wishes to run away from slavery to be with her lover, Lun Tha.
</span></p><p data-dcnode-id="2561"><span data-dcnode-id="2571" instrument_node="">In stagings of </span><a data-dcnode-id="2569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dina_Rubina" title="Dina Rubina"><span data-dcnode-id="2570" instrument_node="">Dina Rubina</span></a><span data-dcnode-id="2568" instrument_node="">'s play </span><i data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Always the Same Dream</span></i><span data-dcnode-id="2565" instrument_node="">, the story is about staging a school play based on a poem by </span><a class="mw-redirect" data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pushkin" title="Pushkin"><span data-dcnode-id="2564" instrument_node="">Pushkin</span></a><span data-dcnode-id="2562" instrument_node="">.
</span></p><p data-dcnode-id="2555"><span data-dcnode-id="2560" instrument_node="">Joseph Heller's 1967 play </span><i data-dcnode-id="2557"><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/We_Bombed_in_New_Haven" title="We Bombed in New Haven"><span data-dcnode-id="2559" instrument_node="">We Bombed in New Haven</span></a></i><span data-dcnode-id="2556" instrument_node=""> is about actors engaged in a play about military airmen; the actors themselves become at times unsure whether they are actors or actual airmen.
</span></p><p data-dcnode-id="2535"><span data-dcnode-id="2554" instrument_node="">The 1937 musical </span><i data-dcnode-id="2551"><a data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Babes_in_Arms" title="Babes in Arms"><span data-dcnode-id="2553" instrument_node="">Babes in Arms</span></a></i><span data-dcnode-id="2550" instrument_node=""> is about a group of kids putting on a musical to raise money. The central plot device was retained for the popular 1939 film version with </span><a data-dcnode-id="2548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judy_Garland" title="Judy Garland"><span data-dcnode-id="2549" instrument_node="">Judy Garland</span></a><span data-dcnode-id="2547" instrument_node=""> and </span><a data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mickey_Rooney" title="Mickey Rooney"><span data-dcnode-id="2546" instrument_node="">Mickey Rooney</span></a><span data-dcnode-id="2544" instrument_node="">. A similar plot was recycled for the films </span><i data-dcnode-id="2541"><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_Christmas_%28film%29" title="White Christmas (film)"><span data-dcnode-id="2543" instrument_node="">White Christmas</span></a></i><span data-dcnode-id="2540" instrument_node=""> and </span><i data-dcnode-id="2537"><a data-dcnode-id="2538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Blues_Brothers_%28film%29" title="The Blues Brothers (film)"><span data-dcnode-id="2539" instrument_node="">The Blues Brothers</span></a></i><span data-dcnode-id="2536" instrument_node="">.
</span></p><span data-dcnode-id="2534" instrument_node="">
</span><h3 data-dcnode-id="2524"><span class="mw-headline" data-dcnode-id="2532" id="Nested_films"><span data-dcnode-id="2533" instrument_node="">Nested films</span></span><span class="mw-editsection" data-dcnode-id="2525"><span class="mw-editsection-bracket" data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">[</span></span><a data-dcnode-id="2528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D9" title="Edit section: Nested films"><span data-dcnode-id="2529" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2523" instrument_node="">

sp;</span><b data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">·</span></b><span data-dcnode-id="2487" instrument_node=""> </span><a class="external text" data-dcnode-id="2485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/search%3F%26q%3D%2522Story%2Bwithin%2Ba%2Bstory%2522%26tbs%3Dbkt%3As%26tbm%3Dbks" rel="nofollow"><span data-dcnode-id="2486" instrument_node="">newspapers</span></a><span data-dcnode-id="2484" instrument_node="">&nbsp;</span><b data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">·</span></b><span data-dcnode-id="2481" instrument_node=""> </span><a class="external text" data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/search%3Ftbs%3Dbks%3A1%26q%3D%2522Story%2Bwithin%2Ba%2Bstory%2522%2B-wikipedia" rel="nofollow"><span data-dcnode-id="2480" instrument_node="">books</span></a><span data-dcnode-id="2478" instrument_node="">&nbsp;</span><b data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">·</span></b><span data-dcnode-id="2475" instrument_node=""> </span><a class="external text" data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3D%2522Story%2Bwithin%2Ba%2Bstory%2522" rel="nofollow"><span data-dcnode-id="2474" instrument_node="">scholar</span></a><span data-dcnode-id="2472" instrument_node="">&nbsp;</span><b data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">·</span></b><span data-dcnode-id="2469" instrument_node=""> </span><a class="external text" data-dcnode-id="2467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/action/doBasicSearch%3FQuery%3D%2522Story%2Bwithin%2Ba%2Bstory%2522%26acc%3Don%26wc%3Don" rel="nofollow"><span data-dcnode-id="2468" instrument_node="">JSTOR</span></a></span></small></span><span data-dcnode-id="2463" instrument_node=""> </span><span class="date-container" data-dcnode-id="2457"><i data-dcnode-id="2458"><span data-dcnode-id="2462" instrument_node="">(</span><span class="date" data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">March 2022</span></span><span data-dcnode-id="2459" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="2450"><i data-dcnode-id="2451"><span data-dcnode-id="2456" instrument_node=""> (</span><small data-dcnode-id="2453"><a data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="2455" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="2452" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="2444" instrument_node="">
</span><p data-dcnode-id="2415"><span data-dcnode-id="2443" instrument_node="">The </span><a data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fran%25C3%25A7ois_Truffaut" title="François Truffaut"><span data-dcnode-id="2442" instrument_node="">François Truffaut</span></a><span data-dcnode-id="2440" instrument_node=""> film </span><i data-dcnode-id="2437"><a data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Day_for_Night_%28film%29" title="Day for Night (film)"><span data-dcnode-id="2439" instrument_node="">Day for Night</span></a></i><span data-dcnode-id="2436" instrument_node=""> is about the making of a fictitious movie called </span><i data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Meet Pamela</span></i><span data-dcnode-id="2433" instrument_node=""> (</span><i data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Je vous présente Pamela</span></i><span data-dcnode-id="2430" instrument_node="">) and shows the interactions of the actors as they are making this movie about a woman who falls for her husband's father. The story of </span><i data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Pamela</span></i><span data-dcnode-id="2427" instrument_node=""> involves lust, betrayal, death, sorrow, and change, events that are mirrored in the experiences of the actors portrayed in </span><i data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Day for Night</span></i><span data-dcnode-id="2424" instrument_node="">. There are a wealth of other movies that revolve around the film industry itself, even if not centering exclusively on one nested film. These include the darkly satirical classic </span><i data-dcnode-id="2421"><a data-dcnode-id="2422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sunset_Boulevard" title="Sunset Boulevard"><span data-dcnode-id="2423" instrument_node="">Sunset Boulevard</span></a></i><span data-dcnode-id="2420" instrument_node=""> about an aging star and her parasitic victim, and the Coen Brothers' farce </span><i data-dcnode-id="2417"><a data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hail%2C_Caesar%21" title="Hail, Caesar!"><span data-dcnode-id="2419" instrument_node="">Hail, Caesar!</span></a></i><span data-dcnode-id="2416" instrument_node="">
</span></p><p data-dcnode-id="2400"><span data-dcnode-id="2414" instrument_node="">The script to </span><a data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karel_Reisz" title="Karel Reisz"><span data-dcnode-id="2413" instrument_node="">Karel Reisz</span></a><span data-dcnode-id="2411" instrument_node="">'s movie </span><i data-dcnode-id="2408"><a data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_French_Lieutenant%2527s_Woman_%28film%29" title="The French Lieutenant's Woman (film)"><span data-dcnode-id="2410" instrument_node="">The French Lieutenant's Woman</span></a></i><span data-dcnode-id="2407" instrument_node=""> (1981), written by </span><a data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harold_Pinter" title="Harold Pinter"><span data-dcnode-id="2406" instrument_node="">Harold Pinter</span></a><span data-dcnode-id="2404" instrument_node="">, is a film-within-a-film adaptation of </span><a data-dcnode-id="2402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Fowles" title="John Fowles"><span data-dcnode-id="2403" instrument_node="">John Fowles</span></a><span data-dcnode-id="2401" instrument_node="">'s book. In addition to the Victorian love story of the book, Pinter creates a present-day background story that shows a love affair between the main actors.
</span></p><p data-dcnode-id="2389"><i data-dcnode-id="2397"><a data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Muppet_Movie" title="The Muppet Movie"><span data-dcnode-id="2399" instrument_node="">The Muppet Movie</span></a></i><span data-dcnode-id="2396" instrument_node=""> begins with </span><a data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Muppets" title="The Muppets"><span data-dcnode-id="2395" instrument_node="">the Muppets</span></a><span data-dcnode-id="2393" instrument_node=""> sitting down in a theater to watch the eponymous movie, said by </span><a data-dcnode-id="2391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kermit_the_Frog" title="Kermit the Frog"><span data-dcnode-id="2392" instrument_node="">Kermit the Frog</span></a><span data-dcnode-id="2390" instrument_node=""> to be a semi-biographical account of how they all met.
</span></p><p data-dcnode-id="2351"><span data-dcnode-id="2388" instrument_node="">In </span><a data-dcnode-id="2386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buster_Keaton" title="Buster Keaton"><span data-dcnode-id="2387" instrument_node="">Buster Keaton</span></a><span data-dcnode-id="2385" instrument_node="">'s </span><i data-dcnode-id="2382"><a data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sherlock_Jr." title="Sherlock Jr."><span data-dcnode-id="2384" instrument_node="">Sherlock Jr.</span></a></i><span data-dcnode-id="2381" instrument_node="">, Keaton's protagonist actually enters into a film while it is playing in a cinema, as does the main character in the </span><a data-dcnode-id="2379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arnold_Schwarzenegger" title="Arnold Schwarzenegger"><span data-dcnode-id="2380" instrument_node="">Arnold Schwarzenegger</span></a><span data-dcnode-id="2378" instrument_node=""> children's film </span><i data-dcnode-id="2375"><a class="mw-redirect" data-dcnode-id="2376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Last_Action_Hero" title="The Last Action Hero"><span data-dcnode-id="2377" instrument_node="">The Last Action Hero</span></a></i><span data-dcnode-id="2374" instrument_node="">. A similar device is used in the seminal music video </span><i data-dcnode-id="2371"><a class="mw-redirect" data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Take_on_me" title="Take on me"><span data-dcnode-id="2373" instrument_node="">Take on me</span></a></i><span data-dcnode-id="2370" instrument_node=""> by </span><a data-dcnode-id="2368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A-ha" title="A-ha"><span data-dcnode-id="2369" instrument_node="">A-ha</span></a><span data-dcnode-id="2367" instrument_node="">, which features a young woman entering a cartoon universe. Conversely, </span><a data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woody_Allen" title="Woody Allen"><span data-dcnode-id="2366" instrument_node="">Woody Allen</span></a><span data-dcnode-id="2364" instrument_node="">'s </span><i data-dcnode-id="2361"><a class="mw-redirect" data-dcnode-id="2362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Purple_Rose_of_Cairo" title="Purple Rose of Cairo"><span data-dcnode-id="2363" instrument_node="">Purple Rose of Cairo</span></a></i><span data-dcnode-id="2360" instrument_node=""> is about a movie character exiting the movie to interact with the real world. Allen's earlier film </span><i data-dcnode-id="2357"><a data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Play_It_Again%2C_Sam_%28film%29" title="Play It Again, Sam (film)"><span data-dcnode-id="2359" instrument_node="">Play it Again, Sam</span></a></i><span data-dcnode-id="2356" instrument_node=""> featured liberal use of characters, dialogue and clips from the film classic </span><i data-dcnode-id="2353"><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Casablanca_%28film%29" title="Casablanca (film)"><span data-dcnode-id="2355" instrument_node="">Casablanca</span></a></i><span data-dcnode-id="2352" instrument_node=""> as a central device.
</span></p><p data-dcnode-id="2312"><span data-dcnode-id="2350" instrument_node="">The 2002 </span><a data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedro_Almod%25C3%25B3var" title="Pedro Almodóvar"><span data-dcnode-id="2349" instrument_node="">Pedro Almodóvar</span></a><span data-dcnode-id="2347" instrument_node=""> film </span><i data-dcnode-id="2344"><a data-dcnode-id="2345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk_to_Her" title="Talk to Her"><span data-dcnode-id="2346" instrument_node="">Talk to Her</span></a></i><span data-dcnode-id="2343" instrument_node=""> (</span><i data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">Hable con ella</span></i><span data-dcnode-id="2340" instrument_node="">) has the chief character Benigno tell a story called </span><i data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">The Shrinking Lover</span></i><span data-dcnode-id="2337" instrument_node=""> to Alicia, a long-term comatose patient whom Benigno, a male nurse, is assigned to care for. The film presents </span><i data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">The Shrinking Lover</span></i><span data-dcnode-id="2334" instrument_node=""> in the form of a black-and-white silent melodrama. To prove his love to a scientist girlfriend, </span><i data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">The Shrinking Lover</span></i><span data-dcnode-id="2331" instrument_node=""> protagonist drinks a potion that makes him progressively smaller. The resulting seven-minute scene, which is readily intelligible and enjoyable as a stand-alone short subject, is considerably more overtly comic than the rest of </span><i data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Talk to Her</span></i><span data-dcnode-id="2328" instrument_node="">—the protagonist climbs giant breasts as if they were rock formations and even ventures his way inside a (compared to him) gigantic vagina. Critics have noted that </span><i data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">The Shrinking Lover</span></i><span data-dcnode-id="2325" instrument_node=""> essentially is a sex metaphor. Later in </span><i data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Talk to Her,</span></i><span data-dcnode-id="2322" instrument_node=""> the comatose Alicia is discovered to be pregnant and Benigno is sentenced to jail for rape. </span><i data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">The Shrinking Lover</span></i><span data-dcnode-id="2319" instrument_node=""> was named </span><a class="external text" data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20110728025551/http%3A//skandies.org/skandies02.html" rel="nofollow"><span data-dcnode-id="2318" instrument_node="">Best Scene of 2002</span></a><span data-dcnode-id="2316" instrument_node=""> in the </span><i data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Skandies</span></i><span data-dcnode-id="2313" instrument_node="">, an annual survey of online cinephiles and critics invited each year by critic Mike D'Angelo.
</span></p><p data-dcnode-id="2288"><i data-dcnode-id="2309"><a data-dcnode-id="2310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tropic_Thunder" title="Tropic Thunder"><span data-dcnode-id="2311" instrument_node="">Tropic Thunder</span></a></i><span data-dcnode-id="2308" instrument_node=""> (2008) is a </span><a data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comedy_film" title="Comedy film"><span data-dcnode-id="2307" instrument_node="">comedy film</span></a><span data-dcnode-id="2305" instrument_node=""> revolving around a group of </span><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prima_donna" title="Prima donna"><span data-dcnode-id="2304" instrument_node="">prima donna</span></a><span data-dcnode-id="2302" instrument_node=""> actors making a </span><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="2301" instrument_node="">Vietnam War</span></a><span data-dcnode-id="2299" instrument_node=""> film (itself also named "Tropic Thunder") when their fed-up writer and director decide to abandon them in the middle of the jungle, forcing them to fight their way out. The concept was perhaps inspired by the 1986 comedy </span><a data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Three_Amigos" title="Three Amigos"><span data-dcnode-id="2298" instrument_node="">Three Amigos</span></a><span data-dcnode-id="2296" instrument_node="">, where three washed-up silent film stars are expected to live out a real-life version of their old hit movies. The same idea of life being forced to imitate art was also reprised in the </span><a data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_Trek" title="Star Trek"><span data-dcnode-id="2295" instrument_node="">Star Trek</span></a><span data-dcnode-id="2293" instrument_node=""> parody </span><i data-dcnode-id="2290"><a data-dcnode-id="2291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galaxy_Quest" title="Galaxy Quest"><span data-dcnode-id="2292" instrument_node="">Galaxy Quest</span></a></i><span data-dcnode-id="2289" instrument_node="">.
</span></p><p data-dcnode-id="2276"><span data-dcnode-id="2287" instrument_node="">The first episode of the </span><a data-dcnode-id="2285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anime" title="Anime"><span data-dcnode-id="2286" instrument_node="">anime</span></a><span data-dcnode-id="2284" instrument_node=""> series </span><i data-dcnode-id="2281"><a class="mw-redirect" data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Melancholy_of_Haruhi_Suzumiya_%28anime%29" title="The Melancholy of Haruhi Suzumiya (anime)"><span data-dcnode-id="2283" instrument_node="">The Melancholy Of Haruhi Suzumiya</span></a></i><span data-dcnode-id="2280" instrument_node=""> consists almost entirely of a poorly made film that the protagonists created, complete with </span><a class="mw-redirect" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyon" title="Kyon"><span data-dcnode-id="2279" instrument_node="">Kyon</span></a><span data-dcnode-id="2277" instrument_node="">'s typical, sarcastic commentary.
</span></p><p data-dcnode-id="2238"><a data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chuck_Jones" title="Chuck Jones"><span data-dcnode-id="2275" instrument_node="">Chuck Jones</span></a><span data-dcnode-id="2273" instrument_node="">'s 1953 </span><a data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cartoon" title="Cartoon"><span data-dcnode-id="2272" instrument_node="">cartoon</span></a><span data-dcnode-id="2270" instrument_node=""> </span><i data-dcnode-id="2267"><a data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Duck_Amuck" title="Duck Amuck"><span data-dcnode-id="2269" instrument_node="">Duck Amuck</span></a></i><span data-dcnode-id="2266" instrument_node=""> shows </span><a data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daffy_Duck" title="Daffy Duck"><span data-dcnode-id="2265" instrument_node="">Daffy Duck</span></a><span data-dcnode-id="2263" instrument_node=""> trapped in a cartoon that an unseen animator repeatedly manipulates. At the end, it is revealed that the whole cartoon was being controlled by </span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bugs_Bunny" title="Bugs Bunny"><span data-dcnode-id="2262" instrument_node="">Bugs Bunny</span></a><span data-dcnode-id="2260" instrument_node="">. The </span><i data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Duck Amuck</span></i><span data-dcnode-id="2257" instrument_node=""> plot was essentially replicated in one of Jones' later cartoons, </span><i data-dcnode-id="2254"><a data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabbit_Rampage" title="Rabbit Rampage"><span data-dcnode-id="2256" instrument_node="">Rabbit Rampage</span></a></i><span data-dcnode-id="2253" instrument_node=""> (1955), in which Bugs Bunny turns out to be the victim of the sadistic animator (</span><a data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elmer_Fudd" title="Elmer Fudd"><span data-dcnode-id="2252" instrument_node="">Elmer Fudd</span></a><span data-dcnode-id="2250" instrument_node="">). A similar plot was also included in an episode of </span><i data-dcnode-id="2247"><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baby_Looney_Tunes" title="Baby Looney Tunes"><span data-dcnode-id="2249" instrument_node="">Baby Looney Tunes</span></a></i><span data-dcnode-id="2246" instrument_node="">, in which Bugs was the victim, Daffy was the animator, and it was made on a computer instead of a pencil and paper. In 2007, the </span><i data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Duck Amuck</span></i><span data-dcnode-id="2243" instrument_node=""> sequence was parodied on </span><i data-dcnode-id="2240"><a data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drawn_Together" title="Drawn Together"><span data-dcnode-id="2242" instrument_node="">Drawn Together</span></a></i><span data-dcnode-id="2239" instrument_node=""> ("Nipple Ring-Ring Goes to Foster Care").
