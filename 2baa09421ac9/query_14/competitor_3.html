</span></p><p data-dcnode-id="2201"><span data-dcnode-id="2237" instrument_node="">All feature-length films by </span><a data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J%25C3%25B6rg_Buttgereit" title="Jörg Buttgereit"><span data-dcnode-id="2236" instrument_node="">Jörg Buttgereit</span></a><span data-dcnode-id="2234" instrument_node=""> except </span><i data-dcnode-id="2231"><a data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schramm_%28film%29" title="Schramm (film)"><span data-dcnode-id="2233" instrument_node="">Schramm</span></a></i><span data-dcnode-id="2230" instrument_node=""> feature a film within the film. In </span><i data-dcnode-id="2227"><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nekromantik" title="Nekromantik"><span data-dcnode-id="2229" instrument_node="">Nekromantik</span></a></i><span data-dcnode-id="2226" instrument_node="">, the protagonist goes to the cinema to see the fictional slasher film </span><i data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Vera</span></i><span data-dcnode-id="2223" instrument_node="">. In </span><i data-dcnode-id="2220"><a data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Der_Todesking" title="Der Todesking"><span data-dcnode-id="2222" instrument_node="">Der Todesking</span></a></i><span data-dcnode-id="2219" instrument_node=""> one of the character watches a video of the fictional Nazi exploitation film </span><i data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Vera - Todesengel der Gestapo</span></i><span data-dcnode-id="2216" instrument_node=""> and in </span><i data-dcnode-id="2213"><a data-dcnode-id="2214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nekromantik_2" title="Nekromantik 2"><span data-dcnode-id="2215" instrument_node="">Nekromantik 2</span></a></i><span data-dcnode-id="2212" instrument_node="">, the characters go to see a movie called </span><i data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Mon dejeuner avec Vera</span></i><span data-dcnode-id="2209" instrument_node="">, which is a parody of </span><a data-dcnode-id="2207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Malle" title="Louis Malle"><span data-dcnode-id="2208" instrument_node="">Louis Malle</span></a><span data-dcnode-id="2206" instrument_node="">'s </span><i data-dcnode-id="2203"><a class="mw-redirect" data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/My_Dinner_with_Andr%25C3%25A9" title="My Dinner with André"><span data-dcnode-id="2205" instrument_node="">My Dinner with André</span></a></i><span data-dcnode-id="2202" instrument_node="">.
</span></p><p data-dcnode-id="2180"><a data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quentin_Tarantino" title="Quentin Tarantino"><span data-dcnode-id="2200" instrument_node="">Quentin Tarantino</span></a><span data-dcnode-id="2198" instrument_node="">'s </span><i data-dcnode-id="2195"><a data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inglourious_Basterds" title="Inglourious Basterds"><span data-dcnode-id="2197" instrument_node="">Inglourious Basterds</span></a></i><span data-dcnode-id="2194" instrument_node=""> depicts a </span><a class="mw-redirect" data-dcnode-id="2192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_propaganda" title="Nazi propaganda"><span data-dcnode-id="2193" instrument_node="">Nazi propaganda</span></a><span data-dcnode-id="2191" instrument_node=""> film called </span><i data-dcnode-id="2188"><a class="mw-redirect" data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nation%2527s_Pride" title="Nation's Pride"><span data-dcnode-id="2190" instrument_node="">Nation's Pride</span></a></i><span data-dcnode-id="2187" instrument_node="">, which glorifies a soldier in the German army. </span><i data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Nation's Pride</span></i><span data-dcnode-id="2184" instrument_node=""> is directed by </span><a data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eli_Roth" title="Eli Roth"><span data-dcnode-id="2183" instrument_node="">Eli Roth</span></a><span data-dcnode-id="2181" instrument_node="">.
</span></p><p data-dcnode-id="2160"><a data-dcnode-id="2178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joe_Dante" title="Joe Dante"><span data-dcnode-id="2179" instrument_node="">Joe Dante</span></a><span data-dcnode-id="2177" instrument_node="">'s </span><i data-dcnode-id="2174"><a data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matinee_%281993_film%29" title="Matinee (1993 film)"><span data-dcnode-id="2176" instrument_node="">Matinee</span></a></i><span data-dcnode-id="2173" instrument_node=""> depicts </span><i data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Mant</span></i><span data-dcnode-id="2170" instrument_node="">, an early-'60s sci-fi/horror movie about a man who turns into an </span><a data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ant" title="Ant"><span data-dcnode-id="2169" instrument_node="">ant</span></a><span data-dcnode-id="2167" instrument_node="">. In one scene, the protagonists see a </span><a class="mw-redirect" data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disney" title="Disney"><span data-dcnode-id="2166" instrument_node="">Disney</span></a><span data-dcnode-id="2164" instrument_node="">-style family movie called </span><i data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">The Shook-Up Shopping Cart</span></i><span data-dcnode-id="2161" instrument_node="">.
</span></p><span data-dcnode-id="2159" instrument_node="">
</span><h4 data-dcnode-id="2149"><span class="mw-headline" data-dcnode-id="2157" id="Story_within_a_film"><span data-dcnode-id="2158" instrument_node="">Story within a film</span></span><span class="mw-editsection" data-dcnode-id="2150"><span class="mw-editsection-bracket" data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">[</span></span><a data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D10" title="Edit section: Story within a film"><span data-dcnode-id="2154" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2147" instrument_node="">The 2002 martial arts epic </span><i data-dcnode-id="2144"><a data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hero_%282002_film%29" title="Hero (2002 film)"><span data-dcnode-id="2146" instrument_node="">Hero</span></a></i><span data-dcnode-id="2143" instrument_node=""> presented the same narrative several different times, as recounted by different storytellers, but with both factual and aesthetic differences. Similarly, in the whimsical 1988 </span><a data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terry_Gilliam" title="Terry Gilliam"><span data-dcnode-id="2142" instrument_node="">Terry Gilliam</span></a><span data-dcnode-id="2140" instrument_node=""> film </span><i data-dcnode-id="2137"><a data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Adventures_of_Baron_Munchausen" title="The Adventures of Baron Munchausen"><span data-dcnode-id="2139" instrument_node="">The Adventures of Baron Munchausen</span></a></i><span data-dcnode-id="2136" instrument_node="">, and the 2003 </span><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tim_Burton" title="Tim Burton"><span data-dcnode-id="2135" instrument_node="">Tim Burton</span></a><span data-dcnode-id="2133" instrument_node=""> film </span><i data-dcnode-id="2130"><a data-dcnode-id="2131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Fish" title="Big Fish"><span data-dcnode-id="2132" instrument_node="">Big Fish</span></a></i><span data-dcnode-id="2129" instrument_node="">, the bulk of the film is a series of stories told by an (extremely) unreliable narrator. In the 2006 Tarsem film </span><i data-dcnode-id="2126"><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Fall_%282006_film%29" title="The Fall (2006 film)"><span data-dcnode-id="2128" instrument_node="">The Fall</span></a></i><span data-dcnode-id="2125" instrument_node="">, an injured silent-movie stuntman tells </span><a data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heroic_fantasy" title="Heroic fantasy"><span data-dcnode-id="2124" instrument_node="">heroic fantasy</span></a><span data-dcnode-id="2122" instrument_node=""> stories to a little girl with a broken arm to pass time in the hospital, which the film visualizes and presents with the stuntman's voice becoming voiceover narration. The fantasy tale bleeds back into and comments on the film's "present-tense" story. There are often incongruities based on the fact that the stuntman is an American and the girl Persian—the stuntman's voiceover refers to "Indians," “a squaw” and “a teepee,” but the visuals show a Bollywood-style devi and a Taj Mahal-like castle. The same conceit of an unreliable narrator was used to very different effect in the 1995 crime drama </span><i data-dcnode-id="2119"><a data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Usual_Suspects" title="The Usual Suspects"><span data-dcnode-id="2121" instrument_node="">The Usual Suspects</span></a></i><span data-dcnode-id="2118" instrument_node=""> (which garnered an Oscar for </span><a data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kevin_Spacey" title="Kevin Spacey"><span data-dcnode-id="2117" instrument_node="">Kevin Spacey</span></a><span data-dcnode-id="2115" instrument_node="">'s performance).
</span></p><p data-dcnode-id="2099"><span data-dcnode-id="2113" instrument_node="">The seminal 1950 Japanese film </span><i data-dcnode-id="2110"><a class="mw-redirect" data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rashomon_%28film%29" title="Rashomon (film)"><span data-dcnode-id="2112" instrument_node="">Rashomon</span></a></i><span data-dcnode-id="2109" instrument_node="">, based on the Japanese short story "</span><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/In_a_Grove" title="In a Grove"><span data-dcnode-id="2108" instrument_node="">In a Grove</span></a><span data-dcnode-id="2106" instrument_node="">" (1921), utilizes the </span><a data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flashback_%28narrative%29" title="Flashback (narrative)"><span data-dcnode-id="2105" instrument_node="">flashback</span></a><span data-dcnode-id="2103" instrument_node="">-within-a-flashback technique. The story unfolds in flashback as the four witnesses in the story—the bandit, the murdered </span><a data-dcnode-id="2101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samurai" title="Samurai"><span data-dcnode-id="2102" instrument_node="">samurai</span></a><span data-dcnode-id="2100" instrument_node="">, his wife, and the nameless woodcutter—recount the events of one afternoon in a grove. But it is also a flashback within a flashback, because the accounts of the witnesses are being retold by a woodcutter and a priest to a ribald commoner as they wait out a rainstorm in a ruined gatehouse.
</span></p><p data-dcnode-id="2083"><span data-dcnode-id="2098" instrument_node="">The movie </span><i data-dcnode-id="2095"><a data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inception" title="Inception"><span data-dcnode-id="2097" instrument_node="">Inception</span></a></i><span data-dcnode-id="2094" instrument_node=""> has a deeply nested structure that is itself part of the setting, as the characters travel deeper and deeper into layers of dreams within dreams. Similarly, in the beginning of the music video for the </span><a data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Jackson" title="Michael Jackson"><span data-dcnode-id="2093" instrument_node="">Michael Jackson</span></a><span data-dcnode-id="2091" instrument_node=""> song "</span><a data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Jackson%2527s_Thriller_%28music_video%29" title="Michael Jackson's Thriller (music video)"><span data-dcnode-id="2090" instrument_node="">Thriller</span></a><span data-dcnode-id="2088" instrument_node="">", the heroine is terrorized by her monster boyfriend in what turns out to be a movie within a dream. The film </span><i data-dcnode-id="2085"><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Grand_Budapest_Hotel" title="The Grand Budapest Hotel"><span data-dcnode-id="2087" instrument_node="">The Grand Budapest Hotel</span></a></i><span data-dcnode-id="2084" instrument_node=""> has four layers of narration; starting with a young girl at the author's memorial reading his book, it cuts to the old author in 1985 telling of an incident in 1968 when he, as a young author, stayed at the hotel and met the owner, old Zero. He was then told the story of young Zero and M Gustave, from 1932, which makes up most of the narrative.
</span></p><span data-dcnode-id="2082" instrument_node="">
</span><h4 data-dcnode-id="2072"><span class="mw-headline" data-dcnode-id="2080" id="Play_within_a_film"><span data-dcnode-id="2081" instrument_node="">Play within a film</span></span><span class="mw-editsection" data-dcnode-id="2073"><span class="mw-editsection-bracket" data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">[</span></span><a data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D11" title="Edit section: Play within a film"><span data-dcnode-id="2077" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2071" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2070" instrument_node="">The 2001 film </span><i data-dcnode-id="2067"><a data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moulin_Rouge%21" title="Moulin Rouge!"><span data-dcnode-id="2069" instrument_node="">Moulin Rouge!</span></a></i><span data-dcnode-id="2066" instrument_node=""> features a fictitious musical within a film, called "Spectacular Spectacular". The 1942 </span><a data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ernst_Lubitsch" title="Ernst Lubitsch"><span data-dcnode-id="2065" instrument_node="">Ernst Lubitsch</span></a><span data-dcnode-id="2063" instrument_node=""> comedy </span><i data-dcnode-id="2060"><a data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/To_Be_or_Not_to_Be_%281942_film%29" title="To Be or Not to Be (1942 film)"><span data-dcnode-id="2062" instrument_node="">To Be or Not to Be</span></a></i><span data-dcnode-id="2059" instrument_node=""> confuses the audience in the opening scenes with a play, "The Naughty Nazis", about Adolf Hitler which appears to be taking place within the actual plot of the film. Thereafter, the acting company players serve as the protagonists of the film and frequently use acting/costumes to deceive various characters in the film. </span><i data-dcnode-id="2056"><a data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hamlet" title="Hamlet"><span data-dcnode-id="2058" instrument_node="">Hamlet</span></a></i><span data-dcnode-id="2055" instrument_node=""> also serves as an important throughline in the film, as suggested by the title. </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laurence_Olivier" title="Laurence Olivier"><span data-dcnode-id="2054" instrument_node="">Laurence Olivier</span></a><span data-dcnode-id="2052" instrument_node=""> sets the opening scene of his 1944 film of </span><i data-dcnode-id="2049"><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_V_%281944_film%29" title="Henry V (1944 film)"><span data-dcnode-id="2051" instrument_node="">Henry V</span></a></i><span data-dcnode-id="2048" instrument_node=""> in the </span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_room" title="Green room"><span data-dcnode-id="2047" instrument_node="">tiring room</span></a><span data-dcnode-id="2045" instrument_node=""> of the old </span><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globe_Theatre" title="Globe Theatre"><span data-dcnode-id="2044" instrument_node="">Globe Theatre</span></a><span data-dcnode-id="2042" instrument_node=""> as the actors prepare for their roles on stage. The early part of the film follows the actors in these "stage" performances and only later does the action almost imperceptibly expand to the full realism of the </span><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Agincourt" title="Battle of Agincourt"><span data-dcnode-id="2041" instrument_node="">Battle of Agincourt</span></a><span data-dcnode-id="2039" instrument_node="">. By way of increasingly more artificial sets (based on mediaeval paintings) the film finally returns to The Globe.
</span></p><p data-dcnode-id="2008"><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mel_Brooks" title="Mel Brooks"><span data-dcnode-id="2037" instrument_node="">Mel Brooks</span></a><span data-dcnode-id="2035" instrument_node="">' film, </span><i data-dcnode-id="2032"><a class="mw-redirect" data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Producers_%281968_film%29" title="The Producers (1968 film)"><span data-dcnode-id="2034" instrument_node="">The Producers</span></a></i><span data-dcnode-id="2031" instrument_node="">, revolves around a scheme to make money by producing a disastrously bad Broadway musical, </span><i data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Springtime for Hitler.</span></i><span data-dcnode-id="2028" instrument_node="">  Ironically the film itself was later made into its own Broadway musical (although a more intentionally successful one). The </span><a data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Outkast" title="Outkast"><span data-dcnode-id="2027" instrument_node="">Outkast</span></a><span data-dcnode-id="2025" instrument_node=""> music video for the song "Roses" is a short film about a high school musical. In </span><i data-dcnode-id="2022"><a data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diary_of_a_Wimpy_Kid_%282010_film%29" title="Diary of a Wimpy Kid (2010 film)"><span data-dcnode-id="2024" instrument_node="">Diary of a Wimpy Kid</span></a></i><span data-dcnode-id="2021" instrument_node="">, the middle-schoolers put on a play of </span><i data-dcnode-id="2018"><a data-dcnode-id="2019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Wizard_of_Oz_%281939_film%29" title="The Wizard of Oz (1939 film)"><span data-dcnode-id="2020" instrument_node="">The Wizard of Oz</span></a></i><span data-dcnode-id="2017" instrument_node="">, while </span><i data-dcnode-id="2014"><a data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High_School_Musical" title="High School Musical"><span data-dcnode-id="2016" instrument_node="">High School Musical</span></a></i><span data-dcnode-id="2013" instrument_node=""> is a romantic comedy about the eponymous musical itself. A high school production is also featured in the gay teen romantic comedy </span><i data-dcnode-id="2010"><a data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Love%2C_Simon" title="Love, Simon"><span data-dcnode-id="2012" instrument_node="">Love, Simon</span></a></i><span data-dcnode-id="2009" instrument_node="">.
</span></p><p data-dcnode-id="1985"><span data-dcnode-id="2007" instrument_node="">A 2012 Italian film </span><i data-dcnode-id="2004"><a data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caesar_Must_Die" title="Caesar Must Die"><span data-dcnode-id="2006" instrument_node="">Caesar Must Die</span></a></i><span data-dcnode-id="2003" instrument_node=""> stars real-life Italian prisoners who rehearse Shakespeare's </span><i data-dcnode-id="2000"><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julius_Caesar_%28play%29" title="Julius Caesar (play)"><span data-dcnode-id="2002" instrument_node="">Julius Caesar</span></a></i><span data-dcnode-id="1999" instrument_node=""> in </span><a data-dcnode-id="1997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rebibbia" title="Rebibbia"><span data-dcnode-id="1998" instrument_node="">Rebibbia</span></a><span data-dcnode-id="1996" instrument_node=""> prison playing </span><i data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">fictional</span></i><span data-dcnode-id="1993" instrument_node=""> Italian prisoners rehearsing the same play in the same prison. In addition, the film itself becomes an </span><i data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Julius Caesar</span></i><span data-dcnode-id="1990" instrument_node=""> adaption of sorts as the scenes are frequently acted all around the prison, outside of rehearsals, and the prison life becomes indistinguishable from the play.</span><sup class="reference" data-dcnode-id="1987" id="cite_ref-15"><a data-dcnode-id="1988" href="#cite_note-15"><span data-dcnode-id="1989" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1986" instrument_node="">
</span></p><p data-dcnode-id="1966"><span data-dcnode-id="1984" instrument_node="">The main plot device in </span><i data-dcnode-id="1981"><a data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Repo%21_The_Genetic_Opera" title="Repo! The Genetic Opera"><span data-dcnode-id="1983" instrument_node="">Repo! The Genetic Opera</span></a></i><span data-dcnode-id="1980" instrument_node=""> is an opera which is going to be held the night of the events of the movie. All of the principal characters of the film play a role in the opera, though the audience watching the opera is unaware that some of the events portrayed are more than drama. The 1990 biopic </span><i data-dcnode-id="1977"><a data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korczak_%28film%29" title="Korczak (film)"><span data-dcnode-id="1979" instrument_node="">Korczak</span></a></i><span data-dcnode-id="1976" instrument_node="">, about the last days of a Jewish children's orphanage in Nazi occupied Poland, features an amateur production of </span><a data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabindranath_Tagore" title="Rabindranath Tagore"><span data-dcnode-id="1975" instrument_node="">Rabindranath Tagore</span></a><span data-dcnode-id="1973" instrument_node="">'s </span><i data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">The Post Office</span></i><span data-dcnode-id="1970" instrument_node="">, which was selected by the orphanage's visionary leader as a way of preparing his charges for their own impending death. That same production is also featured in the stage play </span><i data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Korczak's Children,</span></i><span data-dcnode-id="1967" instrument_node=""> also inspired by the same historical events.
</span></p><span data-dcnode-id="1965" instrument_node="">
</span><h4 data-dcnode-id="1955"><span class="mw-headline" data-dcnode-id="1963" id="TV_show_within_a_film"><span data-dcnode-id="1964" instrument_node="">TV show within a film</span></span><span class="mw-editsection" data-dcnode-id="1956"><span class="mw-editsection-bracket" data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">[</span></span><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D12" title="Edit section: TV show within a film"><span data-dcnode-id="1960" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1953" instrument_node="">The 1973 film adaptation (</span><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_National_Health_%28film%29" title="The National Health (film)"><span data-dcnode-id="1952" instrument_node="">The National Health</span></a><span data-dcnode-id="1950" instrument_node="">) of </span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Nichols_%28playwright%29" title="Peter Nichols (playwright)"><span data-dcnode-id="1949" instrument_node="">Peter Nichols</span></a><span data-dcnode-id="1947" instrument_node="">'s </span><a data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_National_Health_%28play%29" title="The National Health (play)"><span data-dcnode-id="1946" instrument_node="">1969 play of the same name</span></a><span data-dcnode-id="1944" instrument_node=""> features a send-up of a typical American hospital </span><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soap_opera" title="Soap opera"><span data-dcnode-id="1943" instrument_node="">soap opera</span></a><span data-dcnode-id="1941" instrument_node=""> being shown on a television situated in an underfunded, unmistakably </span><a data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="1940" instrument_node="">British</span></a><span data-dcnode-id="1938" instrument_node=""> </span><a data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Health_Service" title="National Health Service"><span data-dcnode-id="1937" instrument_node="">NHS</span></a><span data-dcnode-id="1935" instrument_node=""> hospital.
</span></p><p data-dcnode-id="1925"><span data-dcnode-id="1933" instrument_node="">The </span><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Carrey" title="Jim Carrey"><span data-dcnode-id="1932" instrument_node="">Jim Carrey</span></a><span data-dcnode-id="1930" instrument_node=""> film </span><i data-dcnode-id="1927"><a data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Truman_Show" title="The Truman Show"><span data-dcnode-id="1929" instrument_node="">The Truman Show</span></a></i><span data-dcnode-id="1926" instrument_node=""> is about a person who grows to adulthood without ever realizing that he is the unwitting hero of the immersive eponymous television show.
</span></p><p data-dcnode-id="1904"><span data-dcnode-id="1924" instrument_node="">In </span><i data-dcnode-id="1921"><a data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toy_Story_2" title="Toy Story 2"><span data-dcnode-id="1923" instrument_node="">Toy Story 2</span></a></i><span data-dcnode-id="1920" instrument_node="">, the lead character </span><a class="mw-redirect" data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheriff_Woody" title="Sheriff Woody"><span data-dcnode-id="1919" instrument_node="">Woody</span></a><span data-dcnode-id="1917" instrument_node=""> learns that he was based on the lead character of the same name of a </span><a data-dcnode-id="1915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1950s" title="1950s"><span data-dcnode-id="1916" instrument_node="">1950s</span></a><span data-dcnode-id="1914" instrument_node=""> </span><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_%28genre%29" title="Western (genre)"><span data-dcnode-id="1913" instrument_node="">Western</span></a><span data-dcnode-id="1911" instrument_node=""> show known as Woody's Roundup, which was seemingly cancelled due to the rise of </span><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sputnik_1" title="Sputnik 1"><span data-dcnode-id="1910" instrument_node="">Sputnik</span></a><span data-dcnode-id="1908" instrument_node=""> and children wanting to play with space toys like </span><a data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buzz_Lightyear" title="Buzz Lightyear"><span data-dcnode-id="1907" instrument_node="">Buzz Lightyear</span></a><span data-dcnode-id="1905" instrument_node="">.
</span></p><span data-dcnode-id="1903" instrument_node="">
</span><h3 data-dcnode-id="1893"><span class="mw-headline" data-dcnode-id="1901" id="Nested_video_games"><span data-dcnode-id="1902" instrument_node="">Nested video games</span></span><span class="mw-editsection" data-dcnode-id="1894"><span class="mw-editsection-bracket" data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">[</span></span><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D13" title="Edit section: Nested video games"><span data-dcnode-id="1898" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1892" instrument_node="">
</span><link data-dcnode-id="1891" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1887" role="note"><span data-dcnode-id="1890" instrument_node="">Main article: </span><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minigame" title="Minigame"><span data-dcnode-id="1889" instrument_node="">Minigame</span></a></div><span data-dcnode-id="1886" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1885" instrument_node="">The first example of a video game within a video game is almost certainly </span><a data-dcnode-id="1883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tim_Stryker" title="Tim Stryker"><span data-dcnode-id="1884" instrument_node="">Tim Stryker</span></a><span data-dcnode-id="1882" instrument_node="">'s 80s era text-only game Fazuul (also the world's first online multiplayer game), in which one of the objects that the player can create is a minigame. Another early use of this trope was in </span><a data-dcnode-id="1880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cliff_Johnson_%28game_designer%29" title="Cliff Johnson (game designer)"><span data-dcnode-id="1881" instrument_node="">Cliff Johnson</span></a><span data-dcnode-id="1879" instrument_node="">'s 1987 hit </span><i data-dcnode-id="1876"><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Fool%2527s_Errand" title="The Fool's Errand"><span data-dcnode-id="1878" instrument_node="">The Fool's Errand</span></a></i><span data-dcnode-id="1875" instrument_node="">, a thematically linked narrative puzzle game, in which several of the puzzles were semi-independent games played against NPCs.
</span></p><p data-dcnode-id="1858"><i data-dcnode-id="1871"><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Power_Factor_%28video_game%29" title="Power Factor (video game)"><span data-dcnode-id="1873" instrument_node="">Power Factor</span></a></i><span data-dcnode-id="1870" instrument_node=""> has been cited as a rare example of a video game in which the entire concept is a video game within a video game: The player takes on the role of a character who is playing a "Virtual Reality Simulator", in which he in turn takes on the role of the hero Redd Ace.</span><sup class="reference" data-dcnode-id="1867" id="cite_ref-16"><a data-dcnode-id="1868" href="#cite_note-16"><span data-dcnode-id="1869" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1866" instrument_node=""> The </span><i data-dcnode-id="1863"><a data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/.hack" title=".hack"><span data-dcnode-id="1865" instrument_node="">.hack</span></a></i><span data-dcnode-id="1862" instrument_node=""> franchise also gives the concept a central role. It features a narrative in which internet advancements have created an MMORPG franchise called The World. Protagonists Kite and </span><a data-dcnode-id="1860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haseo" title="Haseo"><span data-dcnode-id="1861" instrument_node="">Haseo</span></a><span data-dcnode-id="1859" instrument_node=""> try to uncover the mysteries of the events surrounding The World. Characters in .hack are self-aware that they are video game characters.
</span></p><p data-dcnode-id="1848"><span data-dcnode-id="1857" instrument_node="">More commonly, however, the video game within a video game device takes the form of mini-games that are non-plot oriented, and optional to the completion of the game. For example, in the </span><i data-dcnode-id="1854"><a class="mw-redirect" data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yakuza_%28series%29" title="Yakuza (series)"><span data-dcnode-id="1856" instrument_node="">Yakuza</span></a></i><span data-dcnode-id="1853" instrument_node=""> and </span><i data-dcnode-id="1850"><a class="mw-redirect" data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shenmue_%28series%29" title="Shenmue (series)"><span data-dcnode-id="1852" instrument_node="">Shenmue</span></a></i><span data-dcnode-id="1849" instrument_node=""> franchises, there are playable arcade machines featuring other Sega games that are scattered throughout the game world.
</span></p><p data-dcnode-id="1826"><span data-dcnode-id="1847" instrument_node="">In </span><i data-dcnode-id="1844"><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Final_Fantasy_VII" title="Final Fantasy VII"><span data-dcnode-id="1846" instrument_node="">Final Fantasy VII</span></a></i><span data-dcnode-id="1843" instrument_node=""> there are several video games that can be played in an arcade in the Gold Saucer theme park. In </span><i data-dcnode-id="1840"><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Animal_Crossing" title="Animal Crossing"><span data-dcnode-id="1842" instrument_node="">Animal Crossing</span></a></i><span data-dcnode-id="1839" instrument_node="">, the player can acquire individual NES emulations through various means and place them within their house, where they are playable in their entirety. When placed in the house, the games take the form of a </span><a data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nintendo_Entertainment_System" title="Nintendo Entertainment System"><span data-dcnode-id="1838" instrument_node="">Nintendo Entertainment System</span></a><span data-dcnode-id="1836" instrument_node="">. In </span><i data-dcnode-id="1833"><a data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fallout_4" title="Fallout 4"><span data-dcnode-id="1835" instrument_node="">Fallout 4</span></a></i><span data-dcnode-id="1832" instrument_node=""> and </span><i data-dcnode-id="1828"><a data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fallout_76" title="Fallout 76"><span data-dcnode-id="1831" instrument_node="">Fallout 76</span></a><span data-dcnode-id="1829" instrument_node="">,</span></i><span data-dcnode-id="1827" instrument_node=""> the protagonist can find several cartridges throughout the wasteland that can be played on his pip-boy (an electronic device that exists only in the world of the game) or any terminal computer.
</span></p><span data-dcnode-id="1825" instrument_node="">
</span><h4 data-dcnode-id="1815"><span class="mw-headline" data-dcnode-id="1823" id="TV_show_within_a_video_game"><span data-dcnode-id="1824" instrument_node="">TV show within a video game</span></span><span class="mw-editsection" data-dcnode-id="1816"><span class="mw-editsection-bracket" data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">[</span></span><a data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D14" title="Edit section: TV show within a video game"><span data-dcnode-id="1820" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1813" instrument_node="">In the </span><a data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Remedy_Entertainment" title="Remedy Entertainment"><span data-dcnode-id="1812" instrument_node="">Remedy</span></a><span data-dcnode-id="1810" instrument_node=""> video game title </span><i data-dcnode-id="1806"><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Max_Payne_%28video_game%29" title="Max Payne (video game)"><span data-dcnode-id="1809" instrument_node="">Max Payne</span></a><span data-dcnode-id="1807" instrument_node="">,</span></i><span data-dcnode-id="1805" instrument_node=""> players can chance upon a number of ongoing television shows when activating or happening upon various television sets within the game environs, depending on where they are within the unfolding game narrative. Among them are </span><i data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">Lords &amp; Ladies</span></i><span data-dcnode-id="1802" instrument_node="">, </span><i data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Captain Baseball Bat Boy</span></i><span data-dcnode-id="1799" instrument_node="">, </span><i data-dcnode-id="1796"><a data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Max_Payne_2%3A_The_Fall_of_Max_Payne" title="Max Payne 2: The Fall of Max Payne"><span data-dcnode-id="1798" instrument_node="">Dick Justice</span></a></i><span data-dcnode-id="1795" instrument_node=""> and the pinnacle television serial </span><i data-dcnode-id="1792"><a data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Max_Payne_%28video_game%29" title="Max Payne (video game)"><span data-dcnode-id="1794" instrument_node="">Address Unknown</span></a></i><span data-dcnode-id="1791" instrument_node=""> – heavily inspired by </span><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Lynch" title="David Lynch"><span data-dcnode-id="1790" instrument_node="">David Lynch</span></a><span data-dcnode-id="1788" instrument_node="">-style film narrative, particularly </span><i data-dcnode-id="1785"><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twin_Peaks" title="Twin Peaks"><span data-dcnode-id="1787" instrument_node="">Twin Peaks</span></a></i><span data-dcnode-id="1784" instrument_node="">, </span><i data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Address Unknown</span></i><span data-dcnode-id="1781" instrument_node=""> sometimes prophesies events or character motives yet to occur in the Max Payne narrative.
</span></p><p data-dcnode-id="1770"><span data-dcnode-id="1779" instrument_node="">In </span><i data-dcnode-id="1776"><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Theft_Auto_IV" title="Grand Theft Auto IV"><span data-dcnode-id="1778" instrument_node="">Grand Theft Auto IV</span></a></i><span data-dcnode-id="1775" instrument_node="">, the player can watch several TV channels which include many programs: reality shows, cartoons, and even game shows.</span><sup class="reference" data-dcnode-id="1772" id="cite_ref-17"><a data-dcnode-id="1773" href="#cite_note-17"><span data-dcnode-id="1774" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1771" instrument_node="">
</span></p><span data-dcnode-id="1769" instrument_node="">
</span><h3 data-dcnode-id="1759"><span class="mw-headline" data-dcnode-id="1767" id="Nested_TV_shows"><span data-dcnode-id="1768" instrument_node="">Nested TV shows</span></span><span class="mw-editsection" data-dcnode-id="1760"><span class="mw-editsection-bracket" data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">[</span></span><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D15" title="Edit section: Nested TV shows"><span data-dcnode-id="1764" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1731"><i data-dcnode-id="1755"><a class="mw-redirect" data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrance_%2526_Phillip" title="Terrance &amp; Phillip"><span data-dcnode-id="1757" instrument_node="">Terrance &amp; Phillip</span></a></i><span data-dcnode-id="1754" instrument_node=""> from </span><i data-dcnode-id="1751"><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Park" title="South Park"><span data-dcnode-id="1753" instrument_node="">South Park</span></a></i><span data-dcnode-id="1750" instrument_node=""> comments on the levels of violence and acceptable behaviour in the media and allow criticism of the outer cartoon to be addressed in the cartoon itself. Similarly, on the long running animated sitcom </span><i data-dcnode-id="1747"><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Simpsons" title="The Simpsons"><span data-dcnode-id="1749" instrument_node="">The Simpsons</span></a></i><span data-dcnode-id="1746" instrument_node="">, Bart's favorite cartoon, </span><i data-dcnode-id="1743"><a class="mw-redirect" data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Itchy_and_Scratchy" title="Itchy and Scratchy"><span data-dcnode-id="1745" instrument_node="">Itchy and Scratchy</span></a></i><span data-dcnode-id="1742" instrument_node=""> (a parody of </span><i data-dcnode-id="1739"><a class="mw-redirect" data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tom_%2526_Jerry" title="Tom &amp; Jerry"><span data-dcnode-id="1741" instrument_node="">Tom &amp; Jerry</span></a></i><span data-dcnode-id="1738" instrument_node="">), often echoes the plotlines of the main show. </span><i data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">The Simpsons</span></i><span data-dcnode-id="1735" instrument_node=""> also parodied this structure with numerous 'layers' of sub-stories in the Season 17 episode "</span><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Seemingly_Never-Ending_Story" title="The Seemingly Never-Ending Story"><span data-dcnode-id="1734" instrument_node="">The Seemingly Never-Ending Story</span></a><span data-dcnode-id="1732" instrument_node="">".
</span></p><p data-dcnode-id="1705"><span data-dcnode-id="1730" instrument_node="">On the show </span><i data-dcnode-id="1727"><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dear_White_People_%28TV_series%29" title="Dear White People (TV series)"><span data-dcnode-id="1729" instrument_node="">Dear White People</span></a></i><span data-dcnode-id="1726" instrument_node="">, the </span><i data-dcnode-id="1723"><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scandal_%28TV_series%29" title="Scandal (TV series)"><span data-dcnode-id="1725" instrument_node="">Scandal</span></a></i><span data-dcnode-id="1722" instrument_node=""> parody </span><i data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Defamation</span></i><span data-dcnode-id="1719" instrument_node=""> offers an ironic commentary on the main show's theme of interracial relationships. Similarly, each season of the HBO show </span><i data-dcnode-id="1716"><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insecure_%28TV_series%29" title="Insecure (TV series)"><span data-dcnode-id="1718" instrument_node="">Insecure</span></a></i><span data-dcnode-id="1715" instrument_node=""> has featured a different fictional show, including the slavery-era soap opera </span><i data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Due North</span></i><span data-dcnode-id="1712" instrument_node="">, the rebooted black 90s sitcom </span><i data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Kev'yn,</span></i><span data-dcnode-id="1709" instrument_node=""> and the investigative documentary series </span><i data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Looking for LaToya</span></i><span data-dcnode-id="1706" instrument_node="">.
</span></p><p data-dcnode-id="1690"><span data-dcnode-id="1704" instrument_node="">The </span><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ireland" title="Ireland"><span data-dcnode-id="1703" instrument_node="">Irish</span></a><span data-dcnode-id="1701" instrument_node=""> television series </span><i data-dcnode-id="1698"><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Father_Ted" title="Father Ted"><span data-dcnode-id="1700" instrument_node="">Father Ted</span></a></i><span data-dcnode-id="1697" instrument_node=""> features a television show, </span><i data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Father Ben</span></i><span data-dcnode-id="1694" instrument_node="">, which has characters and storylines almost identical to that of </span><i data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Father Ted</span></i><span data-dcnode-id="1691" instrument_node="">.
</span></p><p data-dcnode-id="1672"><span data-dcnode-id="1689" instrument_node="">The television shows </span><i data-dcnode-id="1686"><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/30_Rock" title="30 Rock"><span data-dcnode-id="1688" instrument_node="">30 Rock</span></a></i><span data-dcnode-id="1685" instrument_node="">, </span><i data-dcnode-id="1682"><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Studio_60_on_the_Sunset_Strip" title="Studio 60 on the Sunset Strip"><span data-dcnode-id="1684" instrument_node="">Studio 60 on the Sunset Strip</span></a></i><span data-dcnode-id="1681" instrument_node="">, </span><i data-dcnode-id="1678"><a data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sonny_with_a_Chance" title="Sonny with a Chance"><span data-dcnode-id="1680" instrument_node="">Sonny with a Chance</span></a></i><span data-dcnode-id="1677" instrument_node="">, and </span><i data-dcnode-id="1674"><a data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kappa_Mikey" title="Kappa Mikey"><span data-dcnode-id="1676" instrument_node="">Kappa Mikey</span></a></i><span data-dcnode-id="1673" instrument_node=""> feature a sketch show within the TV show.
</span></p><p data-dcnode-id="1656"><span data-dcnode-id="1671" instrument_node="">An extended plotline on the semi-autobiographical sitcom </span><i data-dcnode-id="1668"><a data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seinfeld" title="Seinfeld"><span data-dcnode-id="1670" instrument_node="">Seinfeld</span></a></i><span data-dcnode-id="1667" instrument_node=""> dealt with the main characters developing a sitcom about their lives. The gag was reprised on </span><i data-dcnode-id="1664"><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Curb_Your_Enthusiasm" title="Curb Your Enthusiasm"><span data-dcnode-id="1666" instrument_node="">Curb Your Enthusiasm</span></a></i><span data-dcnode-id="1663" instrument_node="">, another semi-autobiographical show by and about </span><i data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Seinfeld</span></i><span data-dcnode-id="1660" instrument_node=""> co-creator Larry David, when the long-anticipated </span><i data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Seinfeld</span></i><span data-dcnode-id="1657" instrument_node=""> reunion was staged entirely inside the new show.
</span></p><p data-dcnode-id="1643"><span data-dcnode-id="1655" instrument_node="">The </span><i data-dcnode-id="1652"><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USS_Callister" title="USS Callister"><span data-dcnode-id="1654" instrument_node="">USS Callister</span></a></i><span data-dcnode-id="1651" instrument_node=""> episode of the </span><i data-dcnode-id="1648"><a data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Mirror" title="Black Mirror"><span data-dcnode-id="1650" instrument_node="">Black Mirror</span></a></i><span data-dcnode-id="1647" instrument_node=""> anthology television series is about a man obsessed with a </span><i data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Star Trek</span></i><span data-dcnode-id="1644" instrument_node="">-like show, who recreates it as part of a virtual reality game.
</span></p><p data-dcnode-id="1620"><span data-dcnode-id="1642" instrument_node="">The concept of a film within a television series is employed in the </span><a data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Macross" title="Macross"><span data-dcnode-id="1641" instrument_node="">Macross</span></a><span data-dcnode-id="1639" instrument_node=""> universe. </span><i data-dcnode-id="1636"><a class="mw-redirect" data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Super_Dimension_Fortress_Macross%3A_Do_You_Remember_Love%253F" title="The Super Dimension Fortress Macross: Do You Remember Love?"><span data-dcnode-id="1638" instrument_node="">The Super Dimension Fortress Macross: Do You Remember Love?</span></a></i><span data-dcnode-id="1635" instrument_node=""> (1984) was originally intended as an alternative theatrical re-telling of the television series </span><i data-dcnode-id="1632"><a class="mw-redirect" data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Super_Dimension_Fortress_Macross" title="The Super Dimension Fortress Macross"><span data-dcnode-id="1634" instrument_node="">The Super Dimension Fortress Macross</span></a></i><span data-dcnode-id="1631" instrument_node=""> (1982), but was later "</span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Retroactive_continuity" title="Retroactive continuity"><span data-dcnode-id="1630" instrument_node="">retconned</span></a><span data-dcnode-id="1628" instrument_node="">" into the Macross </span><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canon_%28fiction%29" title="Canon (fiction)"><span data-dcnode-id="1627" instrument_node="">canon</span></a><span data-dcnode-id="1625" instrument_node=""> as a popular movie within the television series </span><i data-dcnode-id="1622"><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Macross_7" title="Macross 7"><span data-dcnode-id="1624" instrument_node="">Macross 7</span></a></i><span data-dcnode-id="1621" instrument_node=""> (1994).
</span></p><p data-dcnode-id="1597"><span data-dcnode-id="1619" instrument_node="">The </span><i data-dcnode-id="1616"><a data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stargate_SG-1" title="Stargate SG-1"><span data-dcnode-id="1618" instrument_node="">Stargate SG-1</span></a></i><span data-dcnode-id="1615" instrument_node=""> episode </span><i data-dcnode-id="1612"><a data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wormhole_X-Treme%21" title="Wormhole X-Treme!"><span data-dcnode-id="1614" instrument_node="">Wormhole X-Treme!</span></a></i><span data-dcnode-id="1611" instrument_node=""> features a fictional TV show with an almost identical premise to </span><i data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Stargate SG-1</span></i><span data-dcnode-id="1608" instrument_node="">. A later episode, </span><i data-dcnode-id="1605"><a data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/200_%28Stargate_SG-1%29" title="200 (Stargate SG-1)"><span data-dcnode-id="1607" instrument_node="">200</span></a></i><span data-dcnode-id="1604" instrument_node="">, depicts ideas for a possible reboot of </span><i data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Wormhole X-Treme!</span></i><span data-dcnode-id="1601" instrument_node="">, including using a "younger and edgier" cast, or even </span><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supermarionation" title="Supermarionation"><span data-dcnode-id="1600" instrument_node="">Thunderbirds-style puppets</span></a><span data-dcnode-id="1598" instrument_node="">. 
</span></p><span data-dcnode-id="1596" instrument_node="">
</span><h4 data-dcnode-id="1586"><span class="mw-headline" data-dcnode-id="1594" id="Film_within_a_TV_show"><span data-dcnode-id="1595" instrument_node="">Film within a TV show</span></span><span class="mw-editsection" data-dcnode-id="1587"><span class="mw-editsection-bracket" data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">[</span></span><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D16" title="Edit section: Film within a TV show"><span data-dcnode-id="1591" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1568"><i data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Seinfeld</span></i><span data-dcnode-id="1582" instrument_node=""> had a number of reoccurring fictional films, most notably </span><i data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Rochelle, Rochelle</span></i><span data-dcnode-id="1579" instrument_node="">, a parody of artsy but exploitative foreign films, while the trippy, metaphysically loopy thriller </span><i data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Death Castle</span></i><span data-dcnode-id="1576" instrument_node=""> is a central element of the </span><i data-dcnode-id="1573"><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Master_of_None" title="Master of None"><span data-dcnode-id="1575" instrument_node="">Master of None</span></a></i><span data-dcnode-id="1572" instrument_node=""> episode </span><i data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">New York, I Love You.</span></i><span data-dcnode-id="1569" instrument_node="">
</span></p><span data-dcnode-id="1567" instrument_node="">
</span><h2 data-dcnode-id="1557"><span class="mw-headline" data-dcnode-id="1565" id="Fantasy_within_realism"><span data-dcnode-id="1566" instrument_node="">Fantasy within realism</span></span><span class="mw-editsection" data-dcnode-id="1558"><span class="mw-editsection-bracket" data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">[</span></span><a data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D17" title="Edit section: Fantasy within realism"><span data-dcnode-id="1562" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1555" instrument_node="">Stories inside stories can allow for genre changes. </span><a data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_Ransome" title="Arthur Ransome"><span data-dcnode-id="1554" instrument_node="">Arthur Ransome</span></a><span data-dcnode-id="1552" instrument_node=""> uses the device to let his young characters in the </span><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Swallows_and_Amazons_series" title="Swallows and Amazons series"><i data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Swallows and Amazons</span></i><span data-dcnode-id="1549" instrument_node=""> series</span></a><span data-dcnode-id="1547" instrument_node=""> of children's books, set in the recognisable everyday world, take part in fantastic adventures of piracy in distant lands: two of the twelve books, </span><i data-dcnode-id="1544"><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Duck" title="Peter Duck"><span data-dcnode-id="1546" instrument_node="">Peter Duck</span></a></i><span data-dcnode-id="1543" instrument_node=""> and </span><i data-dcnode-id="1540"><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Missee_Lee" title="Missee Lee"><span data-dcnode-id="1542" instrument_node="">Missee Lee</span></a></i><span data-dcnode-id="1539" instrument_node=""> (and some would include </span><i data-dcnode-id="1536"><a data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Northern%253F" title="Great Northern?"><span data-dcnode-id="1538" instrument_node="">Great Northern?</span></a></i><span data-dcnode-id="1535" instrument_node=""> as a third), are adventures supposedly made up by the characters.</span><sup class="reference" data-dcnode-id="1532" id="cite_ref-18"><a data-dcnode-id="1533" href="#cite_note-18"><span data-dcnode-id="1534" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1531" instrument_node="">  Similarly, the film version of </span><i data-dcnode-id="1528"><a data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chitty_Chitty_Bang_Bang" title="Chitty Chitty Bang Bang"><span data-dcnode-id="1530" instrument_node="">Chitty Chitty Bang Bang</span></a></i><span data-dcnode-id="1527" instrument_node=""> uses a story within a story format to tell a purely fantastic fairy tale within a relatively more realistic frame-story. The film version of </span><i data-dcnode-id="1524"><a class="mw-redirect" data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Wizard_of_Oz_%28film%29" title="The Wizard of Oz (film)"><span data-dcnode-id="1526" instrument_node="">The Wizard of Oz</span></a></i><span data-dcnode-id="1523" instrument_node=""> does the same thing by making its inner story into a dream. Lewis Carroll's celebrated </span><i data-dcnode-id="1520"><a data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alice_%28Alice%2527s_Adventures_in_Wonderland%29" title="Alice (Alice's Adventures in Wonderland)"><span data-dcnode-id="1522" instrument_node="">Alice</span></a></i><span data-dcnode-id="1519" instrument_node=""> books use the same device of a dream as an excuse for fantasy, while Carroll's less well-known </span><i data-dcnode-id="1516"><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sylvie_and_Bruno" title="Sylvie and Bruno"><span data-dcnode-id="1518" instrument_node="">Sylvie and Bruno</span></a></i><span data-dcnode-id="1515" instrument_node=""> subverts the trope by allowing the dream figures to enter and interact with the "real" world.  In each episode of </span><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mister_Rogers%2527_Neighborhood" title="Mister Rogers' Neighborhood"><span data-dcnode-id="1514" instrument_node="">Mister Rogers' Neighborhood</span></a><span data-dcnode-id="1512" instrument_node="">, the main story was realistic fiction, with live action human characters, while an inner story took place in the </span><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neighborhood_of_Make-Believe" title="Neighborhood of Make-Believe"><span data-dcnode-id="1511" instrument_node="">Neighborhood of Make-Believe</span></a><span data-dcnode-id="1509" instrument_node="">, in which most characters were puppets, except Lady Aberlin and occasionally Mr. McFeely, played by </span><a data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Betty_Aberlin" title="Betty Aberlin"><span data-dcnode-id="1508" instrument_node="">Betty Aberlin</span></a><span data-dcnode-id="1506" instrument_node=""> and </span><a data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Newell" title="David Newell"><span data-dcnode-id="1505" instrument_node="">David Newell</span></a><span data-dcnode-id="1503" instrument_node=""> in both realms.
</span></p><span data-dcnode-id="1501" instrument_node="">
</span><h2 data-dcnode-id="1491"><span class="mw-headline" data-dcnode-id="1499" id="Fractal_fiction"><span data-dcnode-id="1500" instrument_node="">Fractal fiction</span></span><span class="mw-editsection" data-dcnode-id="1492"><span class="mw-editsection-bracket" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">[</span></span><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D18" title="Edit section: Fractal fiction"><span data-dcnode-id="1496" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1489" instrument_node="">Some stories feature what might be called a literary version of the </span><a data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Droste_effect" title="Droste effect"><span data-dcnode-id="1488" instrument_node="">Droste effect</span></a><span data-dcnode-id="1486" instrument_node="">, where an image contains a smaller version of itself (also a common feature in many </span><a class="mw-redirect" data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fractals" title="Fractals"><span data-dcnode-id="1485" instrument_node="">fractals</span></a><span data-dcnode-id="1483" instrument_node="">). An early version is found in an ancient Chinese proverb, in which an old monk situated in a temple found on a high mountain recursively tells the same story to a younger monk about an old monk who tells a younger monk a story regarding an old monk sitting in a temple located on a high mountain, and so on.</span><sup class="reference" data-dcnode-id="1480" id="cite_ref-19"><a data-dcnode-id="1481" href="#cite_note-19"><span data-dcnode-id="1482" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1479" instrument_node=""> The same concept is at the heart of </span><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Ende" title="Michael Ende"><span data-dcnode-id="1478" instrument_node="">Michael Ende</span></a><span data-dcnode-id="1476" instrument_node="">'s classic children's novel </span><i data-dcnode-id="1473"><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Neverending_Story" title="The Neverending Story"><span data-dcnode-id="1475" instrument_node="">The Neverending Story</span></a></i><span data-dcnode-id="1472" instrument_node="">, which prominently features a book of the same title. This is later revealed to be the same book the audience is reading, when it begins to be retold again from the beginning, thus creating an infinite regression that features as a plot element. Another story that includes versions of itself is </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neil_Gaiman" title="Neil Gaiman"><span data-dcnode-id="1471" instrument_node="">Neil Gaiman</span></a><span data-dcnode-id="1469" instrument_node="">'s </span><i data-dcnode-id="1466"><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Sandman%3A_Worlds%2527_End" title="The Sandman: Worlds' End"><span data-dcnode-id="1468" instrument_node="">The Sandman: Worlds' End</span></a></i><span data-dcnode-id="1465" instrument_node=""> which contains several instances of multiple storytelling levels, including </span><i data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Cerements</span></i><span data-dcnode-id="1462" instrument_node=""> (issue #55) where one of the inmost levels corresponds to one of the outer levels, turning the story-within-a-story structure into an infinite regression. Jesse Ball's </span><i data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">The Way Through Doors</span></i><span data-dcnode-id="1459" instrument_node=""> features an deeply nested set of stories within stories, most of which explore alternate versions of the main characters. The frame device is that the main character is telling stories to a woman in a coma (similar to Almodóvar's </span><i data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Talk to Her</span></i><span data-dcnode-id="1456" instrument_node="">, mentioned above).
</span></p><p data-dcnode-id="1406"><a class="mw-redirect" data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_Delany" title="Samuel Delany"><span data-dcnode-id="1454" instrument_node="">Samuel Delany</span></a><span data-dcnode-id="1452" instrument_node="">'s great surrealist sci-fi classic, </span><i data-dcnode-id="1448"><a data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dhalgren" title="Dhalgren"><span data-dcnode-id="1451" instrument_node="">Dhalgren</span></a><span data-dcnode-id="1449" instrument_node="">,</span></i><span data-dcnode-id="1447" instrument_node=""> features the main character discovering a diary that appears to be written by a version of himself, with incidents that usually reflect, but sometimes contrast with the main narrative. The last section of the book is taken up entirely by journal entries, about which readers must choose whether to take as completing the narrator's own story. Similarly, in </span><a data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kiese_Laymon" title="Kiese Laymon"><span data-dcnode-id="1446" instrument_node="">Kiese Laymon</span></a><span data-dcnode-id="1444" instrument_node="">'s </span><i data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Long Division</span></i><span data-dcnode-id="1441" instrument_node="">, the main character discovers a book, also called </span><i data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Long Division</span></i><span data-dcnode-id="1438" instrument_node="">, featuring what appears to be himself, except as living twenty years earlier. The title book in Charles Yu's </span><i data-dcnode-id="1435"><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/How_to_Live_Safely_in_a_Science_Fictional_Universe" title="How to Live Safely in a Science Fictional Universe"><span data-dcnode-id="1437" instrument_node="">How to Live Safely in a Science Fictional Universe</span></a></i><span data-dcnode-id="1434" instrument_node=""> exists within itself as a stable creation of a closed loop in time. Likewise, in the Will Ferrell comedy </span><i data-dcnode-id="1431"><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stranger_than_Fiction_%282006_film%29" title="Stranger than Fiction (2006 film)"><span data-dcnode-id="1433" instrument_node="">Stranger than Fiction</span></a></i><span data-dcnode-id="1430" instrument_node=""> the main character discovers he is a character in a book that (along with its author) also exists in the same universe. In </span><a data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Douglas_Hofstadter" title="Douglas Hofstadter"><span data-dcnode-id="1429" instrument_node="">Douglas Hofstadter</span></a><span data-dcnode-id="1427" instrument_node="">'s </span><i data-dcnode-id="1424"><a data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G%25C3%25B6del%2C_Escher%2C_Bach" title="Gödel, Escher, Bach"><span data-dcnode-id="1426" instrument_node="">Gödel, Escher, Bach</span></a></i><span data-dcnode-id="1423" instrument_node="">, there is a narrative between </span><a class="mw-redirect" data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achilles_and_the_Tortoise" title="Achilles and the Tortoise"><span data-dcnode-id="1422" instrument_node="">Achilles and the Tortoise</span></a><span data-dcnode-id="1420" instrument_node=""> (characters borrowed from </span><a data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lewis_Carroll" title="Lewis Carroll"><span data-dcnode-id="1419" instrument_node="">Lewis Carroll</span></a><span data-dcnode-id="1417" instrument_node="">, who in turn borrowed them from </span><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zeno_of_Elea" title="Zeno of Elea"><span data-dcnode-id="1416" instrument_node="">Zeno</span></a><span data-dcnode-id="1414" instrument_node="">), and within this story they find a book entitled "Provocative Adventures of Achilles and the Tortoise Taking Place in Sundry Spots of the Globe", which they begin to read, the Tortoise taking the part of the Tortoise, and Achilles taking the part of Achilles. Within this narrative, which itself is somewhat self-referential, the two characters find a book entitled "Provocative Adventures of Achilles and the Tortoise Taking Place in Sundry Spots of the Globe", which they begin to read, the Tortoise taking the part of Achilles, and Achilles taking the part of the Tortoise. </span><a data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Italo_Calvino" title="Italo Calvino"><span data-dcnode-id="1413" instrument_node="">Italo Calvino</span></a><span data-dcnode-id="1411" instrument_node="">'s experimental book, </span><i data-dcnode-id="1408"><a data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/If_on_a_winter%2527s_night_a_traveler" title="If on a winter's night a traveler"><span data-dcnode-id="1410" instrument_node="">If on a winter's night a traveler</span></a></i><span data-dcnode-id="1407" instrument_node="">, is about a reader, addressed in the second person, trying to read the very same book, but being interrupted by ten other recursively nested incomplete stories.
