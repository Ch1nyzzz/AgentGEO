</span><div class="thumb tright" data-dcnode-id="4084"><div class="thumbinner" data-dcnode-id="4085" style="width:172px;"><a class="image" data-dcnode-id="4097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABlake_jacobsladder.jpg"><img alt="" class="thumbimage" data-dcnode-id="4098" data-file-height="4536" data-file-width="3564" decoding="async" height="216" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Blake_jacobsladder.jpg/170px-Blake_jacobsladder.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Blake_jacobsladder.jpg/255px-Blake_jacobsladder.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Blake_jacobsladder.jpg/340px-Blake_jacobsladder.jpg 2x" width="170"></a><span data-dcnode-id="4096" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4086"><div class="magnify" data-dcnode-id="4094"><a class="internal" data-dcnode-id="4095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABlake_jacobsladder.jpg" title="Enlarge"></a></div><span data-dcnode-id="4093" instrument_node="">In the Bible, </span><a class="mw-redirect" data-dcnode-id="4091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacob%2527s_ladder" title="Jacob's ladder"><span data-dcnode-id="4092" instrument_node="">Jacob has a dream about a ladder to heaven</span></a><span data-dcnode-id="4090" instrument_node="">. Having a character have a dream is a common way to add an inner story within a larger story. (Painting by </span><a data-dcnode-id="4088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Blake" title="William Blake"><span data-dcnode-id="4089" instrument_node="">William Blake</span></a><span data-dcnode-id="4087" instrument_node="">, 1805)</span></div></div></div><span data-dcnode-id="4083" instrument_node="">
</span><p data-dcnode-id="4031"><span data-dcnode-id="4082" instrument_node="">A </span><b data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">story within a story</span></b><span data-dcnode-id="4079" instrument_node="">, also referred to as an </span><b data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">embedded narrative</span></b><span data-dcnode-id="4076" instrument_node="">, is a </span><a class="mw-redirect" data-dcnode-id="4074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literary_device" title="Literary device"><span data-dcnode-id="4075" instrument_node="">literary device</span></a><span data-dcnode-id="4073" instrument_node=""> in which a character within a </span><a data-dcnode-id="4071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narrative" title="Narrative"><span data-dcnode-id="4072" instrument_node="">story</span></a><span data-dcnode-id="4070" instrument_node=""> becomes the narrator of a second story (within the first one).</span><sup class="reference" data-dcnode-id="4067" id="cite_ref-1"><a data-dcnode-id="4068" href="#cite_note-1"><span data-dcnode-id="4069" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4066" instrument_node=""> Multiple layers of stories within stories are sometimes called </span><b data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">nested stories</span></b><span data-dcnode-id="4063" instrument_node="">. A play may have a brief play within it, such as Shakespeare's play </span><i data-dcnode-id="4060"><a data-dcnode-id="4061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hamlet" title="Hamlet"><span data-dcnode-id="4062" instrument_node="">Hamlet</span></a></i><span data-dcnode-id="4059" instrument_node="">; a film may show the characters watching a short film; or a novel may contain a short story within the novel.  A story within a story can be used in all types of narration: </span><a data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novel" title="Novel"><span data-dcnode-id="4058" instrument_node="">novels</span></a><span data-dcnode-id="4056" instrument_node="">, </span><a data-dcnode-id="4054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Short_story" title="Short story"><span data-dcnode-id="4055" instrument_node="">short stories</span></a><span data-dcnode-id="4053" instrument_node="">, </span><a data-dcnode-id="4051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Play_%28theatre%29" title="Play (theatre)"><span data-dcnode-id="4052" instrument_node="">plays</span></a><span data-dcnode-id="4050" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Television_program" title="Television program"><span data-dcnode-id="4049" instrument_node="">television programs</span></a><span data-dcnode-id="4047" instrument_node="">, </span><a data-dcnode-id="4045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Film" title="Film"><span data-dcnode-id="4046" instrument_node="">films</span></a><span data-dcnode-id="4044" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poem" title="Poem"><span data-dcnode-id="4043" instrument_node="">poems</span></a><span data-dcnode-id="4041" instrument_node="">, </span><a data-dcnode-id="4039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Song" title="Song"><span data-dcnode-id="4040" instrument_node="">songs</span></a><span data-dcnode-id="4038" instrument_node="">, </span><a data-dcnode-id="4036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_game" title="Video game"><span data-dcnode-id="4037" instrument_node="">video games</span></a><span data-dcnode-id="4035" instrument_node="">, and philosophical </span><a data-dcnode-id="4033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Essay" title="Essay"><span data-dcnode-id="4034" instrument_node="">essays</span></a><span data-dcnode-id="4032" instrument_node="">.
</span></p><p data-dcnode-id="4026"><span data-dcnode-id="4030" instrument_node="">The inner stories are told either simply to add entertainment or more usually to act as an example to the other characters. In either case, the inner story often has a symbolic and psychological significance for the characters in the outer story. There is often some parallel between the two stories, and the fiction of the inner story is used to reveal the truth in the outer story. Often the stories within a story are used to satirize views, not only in the outer story, but also in the real world. When a story is told within another instead of being told as part of the plot, it allows the author to play on the reader's perceptions of the characters—the motives and the </span><a data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unreliable_narrator" title="Unreliable narrator"><span data-dcnode-id="4029" instrument_node="">reliability of the storyteller</span></a><span data-dcnode-id="4027" instrument_node=""> are automatically in question.
</span></p><p data-dcnode-id="4008"><span data-dcnode-id="4025" instrument_node="">Stories within a story may disclose the background of characters or events, tell of myths and legends that influence the plot, or even seem to be extraneous diversions from the plot. In some cases, the story within a story is involved in the action of the plot of the outer story. In others, the inner story is independent, so that it can either be skipped over or be read separately, although many subtle connections may be lost. Sometimes, the inner story serves as an outlet for discarded ideas that the author deemed to be of too much merit to leave out completely, somewhat analogous to the inclusion of </span><a data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deleted_scene" title="Deleted scene"><span data-dcnode-id="4024" instrument_node="">deleted scenes</span></a><span data-dcnode-id="4022" instrument_node=""> with </span><a data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Home_video" title="Home video"><span data-dcnode-id="4021" instrument_node="">home video</span></a><span data-dcnode-id="4019" instrument_node=""> releases of films. Often there is more than one level of internal stories, leading to deeply-nested fiction. </span><i data-dcnode-id="4016"><a data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mise_en_abyme" title="Mise en abyme"><span data-dcnode-id="4018" instrument_node="">Mise en abyme</span></a></i><span data-dcnode-id="4015" instrument_node=""> is the </span><a data-dcnode-id="4013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_language" title="French language"><span data-dcnode-id="4014" instrument_node="">French</span></a><span data-dcnode-id="4012" instrument_node=""> term for a similar literary device (also referring to the practice in </span><a data-dcnode-id="4010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heraldry" title="Heraldry"><span data-dcnode-id="4011" instrument_node="">heraldry</span></a><span data-dcnode-id="4009" instrument_node=""> of placing the image of a small shield on a larger shield).
</span></p><span data-dcnode-id="4007" instrument_node="">

</span><h2 data-dcnode-id="3793"><span class="mw-headline" data-dcnode-id="3801" id="Frame_stories_and_anthology_works"><span data-dcnode-id="3802" instrument_node="">Frame stories and anthology works</span></span><span class="mw-editsection" data-dcnode-id="3794"><span class="mw-editsection-bracket" data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">[</span></span><a data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D1" title="Edit section: Frame stories and anthology works"><span data-dcnode-id="3798" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3792" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3786" role="note"><span data-dcnode-id="3789" instrument_node="">Main article: </span><a data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frame_story" title="Frame story"><span data-dcnode-id="3788" instrument_node="">Frame story</span></a></div><span data-dcnode-id="3785" instrument_node="">
</span><p data-dcnode-id="3780"><span data-dcnode-id="3784" instrument_node="">The literary device of stories within a story dates back to a device known as a "</span><a data-dcnode-id="3782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frame_story" title="Frame story"><span data-dcnode-id="3783" instrument_node="">frame story</span></a><span data-dcnode-id="3781" instrument_node="">", where a supplemental story is used to help tell the main story. Typically, the outer story or "frame" does not have much matter, and most of the work consists of one or more complete stories told by one or more storytellers.
</span></p><p data-dcnode-id="3720"><span data-dcnode-id="3779" instrument_node="">The earliest examples of "frame stories" and "stories within stories" were in ancient Egyptian and </span><a data-dcnode-id="3777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_literature" title="Indian literature"><span data-dcnode-id="3778" instrument_node="">Indian literature</span></a><span data-dcnode-id="3776" instrument_node="">, such as the Egyptian "</span><a data-dcnode-id="3774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tale_of_the_Shipwrecked_Sailor" title="Tale of the Shipwrecked Sailor"><span data-dcnode-id="3775" instrument_node="">Tale of the Shipwrecked Sailor</span></a><span data-dcnode-id="3773" instrument_node="">"</span><sup class="reference" data-dcnode-id="3770" id="cite_ref-2"><a data-dcnode-id="3771" href="#cite_note-2"><span data-dcnode-id="3772" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3769" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_epics" title="Indian epics"><span data-dcnode-id="3768" instrument_node="">Indian epics</span></a><span data-dcnode-id="3766" instrument_node=""> like the </span><i data-dcnode-id="3763"><a data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramayana" title="Ramayana"><span data-dcnode-id="3765" instrument_node="">Ramayana</span></a></i><span data-dcnode-id="3762" instrument_node="">, </span><i data-dcnode-id="3759"><a data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seven_Wise_Masters" title="Seven Wise Masters"><span data-dcnode-id="3761" instrument_node="">Seven Wise Masters</span></a></i><span data-dcnode-id="3758" instrument_node="">, </span><i data-dcnode-id="3755"><a data-dcnode-id="3756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hitopadesha" title="Hitopadesha"><span data-dcnode-id="3757" instrument_node="">Hitopadesha</span></a></i><span data-dcnode-id="3754" instrument_node=""> and </span><i data-dcnode-id="3751"><a data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baital_Pachisi" title="Baital Pachisi"><span data-dcnode-id="3753" instrument_node="">Vikram and the Vampire</span></a></i><span data-dcnode-id="3750" instrument_node="">. In </span><a class="mw-redirect" data-dcnode-id="3748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vishnu_Sarma" title="Vishnu Sarma"><span data-dcnode-id="3749" instrument_node="">Vishnu Sarma</span></a><span data-dcnode-id="3747" instrument_node="">'s </span><i data-dcnode-id="3744"><a data-dcnode-id="3745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panchatantra" title="Panchatantra"><span data-dcnode-id="3746" instrument_node="">Panchatantra</span></a></i><span data-dcnode-id="3743" instrument_node="">, an inter-woven series of colorful animal tales are told with one narrative opening within another, sometimes three or four layers deep, and then unexpectedly snapping shut in irregular rhythms to sustain attention. In the epic </span><i data-dcnode-id="3740"><a data-dcnode-id="3741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mahabharata" title="Mahabharata"><span data-dcnode-id="3742" instrument_node="">Mahabharata</span></a></i><span data-dcnode-id="3739" instrument_node="">, the </span><a data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurukshetra_War" title="Kurukshetra War"><span data-dcnode-id="3738" instrument_node="">Kurukshetra War</span></a><span data-dcnode-id="3736" instrument_node=""> is narrated by a character in </span><a data-dcnode-id="3734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vyasa" title="Vyasa"><span data-dcnode-id="3735" instrument_node="">Vyasa</span></a><span data-dcnode-id="3733" instrument_node="">'s </span><i data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">Jaya</span></i><span data-dcnode-id="3730" instrument_node="">, which itself is narrated by a character in </span><a data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vaisampayana" title="Vaisampayana"><span data-dcnode-id="3729" instrument_node="">Vaisampayana</span></a><span data-dcnode-id="3727" instrument_node="">'s </span><i data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">Bharata</span></i><span data-dcnode-id="3724" instrument_node="">, which itself is narrated by a character in Ugrasrava's </span><i data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">Mahabharata</span></i><span data-dcnode-id="3721" instrument_node="">.
</span></p><p data-dcnode-id="3662"><span data-dcnode-id="3719" instrument_node="">Both </span><i data-dcnode-id="3716"><a data-dcnode-id="3717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Golden_Ass" title="The Golden Ass"><span data-dcnode-id="3718" instrument_node="">The Golden Ass</span></a></i><span data-dcnode-id="3715" instrument_node=""> by </span><a data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apuleius" title="Apuleius"><span data-dcnode-id="3714" instrument_node="">Apuleius</span></a><span data-dcnode-id="3712" instrument_node=""> and </span><i data-dcnode-id="3709"><a class="mw-redirect" data-dcnode-id="3710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metamorphoses_%28poem%29" title="Metamorphoses (poem)"><span data-dcnode-id="3711" instrument_node="">Metamorphoses</span></a></i><span data-dcnode-id="3708" instrument_node=""> by </span><a data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ovid" title="Ovid"><span data-dcnode-id="3707" instrument_node="">Ovid</span></a><span data-dcnode-id="3705" instrument_node=""> extend the depths of framing to several degrees. Another early example is the </span><i data-dcnode-id="3702"><a data-dcnode-id="3703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/One_Thousand_and_One_Nights" title="One Thousand and One Nights"><span data-dcnode-id="3704" instrument_node="">One Thousand and One Nights</span></a></i><span data-dcnode-id="3701" instrument_node=""> (</span><i data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">Arabian Nights</span></i><span data-dcnode-id="3698" instrument_node="">), where the general story is narrated by an unknown narrator, and in this narration the stories are told by </span><a data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scheherazade" title="Scheherazade"><span data-dcnode-id="3697" instrument_node="">Scheherazade</span></a><span data-dcnode-id="3695" instrument_node="">. In many of Scheherazade's narrations, there are also </span><a data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_stories_within_One_Thousand_and_One_Nights" title="List of stories within One Thousand and One Nights"><span data-dcnode-id="3694" instrument_node="">stories narrated</span></a><span data-dcnode-id="3692" instrument_node="">, and even in some of these, there are some other stories.</span><sup class="reference" data-dcnode-id="3689" id="cite_ref-3"><a data-dcnode-id="3690" href="#cite_note-3"><span data-dcnode-id="3691" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3688" instrument_node=""> An example of this is "</span><a data-dcnode-id="3686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Three_Apples" title="The Three Apples"><span data-dcnode-id="3687" instrument_node="">The Three Apples</span></a><span data-dcnode-id="3685" instrument_node="">", a </span><a class="mw-redirect" data-dcnode-id="3683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Murder_mystery" title="Murder mystery"><span data-dcnode-id="3684" instrument_node="">murder mystery</span></a><span data-dcnode-id="3682" instrument_node=""> narrated by Scheherazade. Within the story, after the murderer reveals himself, he narrates a </span><a data-dcnode-id="3680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flashback_%28narrative%29" title="Flashback (narrative)"><span data-dcnode-id="3681" instrument_node="">flashback</span></a><span data-dcnode-id="3679" instrument_node=""> of events leading up to the murder. Within this flashback, an </span><a data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unreliable_narrator" title="Unreliable narrator"><span data-dcnode-id="3678" instrument_node="">unreliable narrator</span></a><span data-dcnode-id="3676" instrument_node=""> tells a story to mislead the would-be murderer, who later discovers that he was misled after another character narrates the truth to him.</span><sup class="reference" data-dcnode-id="3673" id="cite_ref-4"><a data-dcnode-id="3674" href="#cite_note-4"><span data-dcnode-id="3675" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3672" instrument_node=""> As the story concludes, the "</span><a class="extiw" data-dcnode-id="3670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikisource.org/wiki/Tale_of_N%25C3%25BAr_al-D%25C3%25ADn_Al%25C3%25AD_and_his_Son" title="s:Tale of Núr al-Dín Alí and his Son"><span data-dcnode-id="3671" instrument_node="">Tale of Núr al-Dín Alí and his Son</span></a><span data-dcnode-id="3669" instrument_node="">" is narrated within it. This perennially popular work can be traced back to </span><a data-dcnode-id="3667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arabic_literature" title="Arabic literature"><span data-dcnode-id="3668" instrument_node="">Arabic</span></a><span data-dcnode-id="3666" instrument_node="">, </span><a data-dcnode-id="3664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_literature" title="Persian literature"><span data-dcnode-id="3665" instrument_node="">Persian</span></a><span data-dcnode-id="3663" instrument_node="">, and Indian storytelling traditions.
</span></p><p data-dcnode-id="3643"><a data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary_Shelley" title="Mary Shelley"><span data-dcnode-id="3661" instrument_node="">Mary Shelley</span></a><span data-dcnode-id="3659" instrument_node="">'s </span><i data-dcnode-id="3656"><a data-dcnode-id="3657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frankenstein" title="Frankenstein"><span data-dcnode-id="3658" instrument_node="">Frankenstein</span></a></i><span data-dcnode-id="3655" instrument_node=""> has a deeply nested frame story structure, that features the narration of Walton, who records the narration of Victor Frankenstein, who recounts the narration of his creation, who narrates the story of a cabin dwelling family he secretly observes. Another classic novel with a frame story is </span><i data-dcnode-id="3652"><a data-dcnode-id="3653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wuthering_Heights" title="Wuthering Heights"><span data-dcnode-id="3654" instrument_node="">Wuthering Heights</span></a></i><span data-dcnode-id="3651" instrument_node="">, the majority of which is recounted by the central family's housekeeper to a boarder. Similarly, </span><a data-dcnode-id="3649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roald_Dahl" title="Roald Dahl"><span data-dcnode-id="3650" instrument_node="">Roald Dahl</span></a><span data-dcnode-id="3648" instrument_node="">'s story </span><i data-dcnode-id="3645"><a class="mw-redirect" data-dcnode-id="3646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Wonderful_Story_of_Henry_Sugar" title="The Wonderful Story of Henry Sugar"><span data-dcnode-id="3647" instrument_node="">The Wonderful Story of Henry Sugar</span></a></i><span data-dcnode-id="3644" instrument_node=""> is about a rich bachelor who finds an essay written by someone who learned to "see" playing cards from the reverse side. The full text of this essay is included in the story, and itself includes a lengthy sub-story told as a true experience by one of the essay's protagonists, Imhrat Khan.
</span></p><p data-dcnode-id="3588"><a data-dcnode-id="3641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geoffrey_Chaucer" title="Geoffrey Chaucer"><span data-dcnode-id="3642" instrument_node="">Chaucer</span></a><span data-dcnode-id="3640" instrument_node="">'s </span><i data-dcnode-id="3637"><a data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Canterbury_Tales" title="The Canterbury Tales"><span data-dcnode-id="3639" instrument_node="">The Canterbury Tales</span></a></i><span data-dcnode-id="3636" instrument_node=""> and </span><a data-dcnode-id="3634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giovanni_Boccaccio" title="Giovanni Boccaccio"><span data-dcnode-id="3635" instrument_node="">Boccaccio</span></a><span data-dcnode-id="3633" instrument_node="">'s </span><i data-dcnode-id="3630"><a class="mw-redirect" data-dcnode-id="3631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decameron" title="Decameron"><span data-dcnode-id="3632" instrument_node="">Decameron</span></a></i><span data-dcnode-id="3629" instrument_node=""> are also classic frame stories. In Chaucer's </span><i data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">Canterbury Tales</span></i><span data-dcnode-id="3626" instrument_node="">, the characters tell tales suited to their personalities and tell them in ways that highlight their personalities. The noble knight tells a noble story, the boring character tells a very dull tale, and the rude miller tells a smutty tale. </span><a data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homer" title="Homer"><span data-dcnode-id="3625" instrument_node="">Homer</span></a><span data-dcnode-id="3623" instrument_node="">'s </span><i data-dcnode-id="3620"><a data-dcnode-id="3621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Odyssey" title="Odyssey"><span data-dcnode-id="3622" instrument_node="">Odyssey</span></a></i><span data-dcnode-id="3619" instrument_node=""> too makes use of this device; </span><a data-dcnode-id="3617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Odysseus" title="Odysseus"><span data-dcnode-id="3618" instrument_node="">Odysseus</span></a><span data-dcnode-id="3616" instrument_node="">' adventures at sea are all narrated by Odysseus to the court of king </span><a data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alcinous" title="Alcinous"><span data-dcnode-id="3615" instrument_node="">Alcinous</span></a><span data-dcnode-id="3613" instrument_node=""> in </span><a data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scheria" title="Scheria"><span data-dcnode-id="3612" instrument_node="">Scheria</span></a><span data-dcnode-id="3610" instrument_node="">. Other shorter tales, many of them false, account for much of the </span><i data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">Odyssey</span></i><span data-dcnode-id="3607" instrument_node="">. Many modern children's story collections are essentially </span><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthology" title="Anthology"><span data-dcnode-id="3606" instrument_node="">anthology</span></a><span data-dcnode-id="3604" instrument_node=""> works connected by this device, such as </span><a data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arnold_Lobel" title="Arnold Lobel"><span data-dcnode-id="3603" instrument_node="">Arnold Lobel</span></a><span data-dcnode-id="3601" instrument_node="">'s </span><i data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Mouse Tales</span></i><span data-dcnode-id="3598" instrument_node="">, </span><a data-dcnode-id="3596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paula_Fox" title="Paula Fox"><span data-dcnode-id="3597" instrument_node="">Paula Fox</span></a><span data-dcnode-id="3595" instrument_node="">'s </span><i data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">The Little Swineherd</span></i><span data-dcnode-id="3592" instrument_node="">, and Phillip and Hillary Sherlock's </span><i data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Ears and Tails and Common Sense</span></i><span data-dcnode-id="3589" instrument_node="">.
</span></p><p data-dcnode-id="3574"><span data-dcnode-id="3587" instrument_node="">A well-known modern example of framing is the fantasy genre work </span><i data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">The Princess Bride</span></i><span data-dcnode-id="3584" instrument_node=""> (both </span><a data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Princess_Bride_%28novel%29" title="The Princess Bride (novel)"><span data-dcnode-id="3583" instrument_node="">the book</span></a><span data-dcnode-id="3581" instrument_node=""> and </span><a data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Princess_Bride_%28film%29" title="The Princess Bride (film)"><span data-dcnode-id="3580" instrument_node="">the movie</span></a><span data-dcnode-id="3578" instrument_node="">). In the movie, a grandfather is reading the story of "The Princess Bride" to his grandson. In the book, a more detailed frame story has a father editing a much longer (but fictive) work for his son, creating his own "Good Parts Version" (as the book called it) by leaving out all the parts that would bore or displease a young boy. Both the book and the movie assert that the central story is from a book called "The Princess Bride" by a nonexistent author named </span><a data-dcnode-id="3576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Goldman%23Autobiographical_fiction" title="William Goldman"><span data-dcnode-id="3577" instrument_node="">S. Morgenstern</span></a><span data-dcnode-id="3575" instrument_node="">.
</span></p><p data-dcnode-id="3562"><span data-dcnode-id="3573" instrument_node="">In the Welsh novel, </span><i data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">Aelwyd F'Ewythr Robert</span></i><span data-dcnode-id="3570" instrument_node=""> (1852) by </span><a class="mw-redirect" data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gwilym_Hiraethog" title="Gwilym Hiraethog"><span data-dcnode-id="3569" instrument_node="">Gwilym Hiraethog</span></a><span data-dcnode-id="3567" instrument_node="">, a visitor to a farm in north Wales tells the story of </span><i data-dcnode-id="3564"><a data-dcnode-id="3565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uncle_Tom%2527s_Cabin" title="Uncle Tom's Cabin"><span data-dcnode-id="3566" instrument_node="">Uncle Tom's Cabin</span></a></i><span data-dcnode-id="3563" instrument_node=""> to those gathered around the hearth.
</span></p><p data-dcnode-id="3531"><span data-dcnode-id="3561" instrument_node="">Sometimes a frame story exists in the same setting as the main story. On the television series </span><i data-dcnode-id="3558"><a data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Young_Indiana_Jones_Chronicles" title="The Young Indiana Jones Chronicles"><span data-dcnode-id="3560" instrument_node="">The Young Indiana Jones Chronicles</span></a></i><span data-dcnode-id="3557" instrument_node="">, each episode was framed as though it were being told by </span><a data-dcnode-id="3555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indiana_Jones_%28character%29" title="Indiana Jones (character)"><span data-dcnode-id="3556" instrument_node="">Indy</span></a><span data-dcnode-id="3554" instrument_node=""> when he was older (usually acted by </span><a data-dcnode-id="3552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Hall_%28actor%29" title="George Hall (actor)"><span data-dcnode-id="3553" instrument_node="">George Hall</span></a><span data-dcnode-id="3551" instrument_node="">, but once by </span><a data-dcnode-id="3549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harrison_Ford" title="Harrison Ford"><span data-dcnode-id="3550" instrument_node="">Harrison Ford</span></a><span data-dcnode-id="3548" instrument_node="">). The same device of an adult narrator representing the older version of a young protagonist is used in the films </span><i data-dcnode-id="3545"><a class="mw-redirect" data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stand_By_Me_%28film%29" title="Stand By Me (film)"><span data-dcnode-id="3547" instrument_node="">Stand By Me</span></a></i><span data-dcnode-id="3544" instrument_node=""> and </span><i data-dcnode-id="3541"><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_Christmas_Story" title="A Christmas Story"><span data-dcnode-id="3543" instrument_node="">A Christmas Story</span></a></i><span data-dcnode-id="3540" instrument_node="">, and the television show </span><i data-dcnode-id="3537"><a data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Wonder_Years" title="The Wonder Years"><span data-dcnode-id="3539" instrument_node="">The Wonder Years</span></a></i><span data-dcnode-id="3536" instrument_node=""> and </span><i data-dcnode-id="3533"><a data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/How_I_Met_Your_Mother" title="How I Met Your Mother"><span data-dcnode-id="3535" instrument_node="">How I Met Your Mother</span></a></i><span data-dcnode-id="3532" instrument_node="">.
</span></p><span data-dcnode-id="3530" instrument_node="">
</span><h3 data-dcnode-id="3520"><span class="mw-headline" data-dcnode-id="3528" id="Frame_stories_in_music"><span data-dcnode-id="3529" instrument_node="">Frame stories in music</span></span><span class="mw-editsection" data-dcnode-id="3521"><span class="mw-editsection-bracket" data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">[</span></span><a data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D2" title="Edit section: Frame stories in music"><span data-dcnode-id="3525" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3519" instrument_node="">
</span><p data-dcnode-id="3510"><span data-dcnode-id="3518" instrument_node="">In </span><i data-dcnode-id="3515"><a data-dcnode-id="3516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Amory_Wars" title="The Amory Wars"><span data-dcnode-id="3517" instrument_node="">The Amory Wars</span></a></i><span data-dcnode-id="3514" instrument_node="">, a tale told through the music of </span><a data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coheed_and_Cambria" title="Coheed and Cambria"><span data-dcnode-id="3513" instrument_node="">Coheed and Cambria</span></a><span data-dcnode-id="3511" instrument_node="">, tells a story for the first two albums but reveals that the story is being actively written by a character called the Writer in the third. During the album, the Writer delves into his own story and kills one of the characters, much to the dismay of the main character.
</span></p><p data-dcnode-id="3478"><span data-dcnode-id="3509" instrument_node="">The critically acclaimed </span><a class="mw-redirect" data-dcnode-id="3507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beatles" title="Beatles"><span data-dcnode-id="3508" instrument_node="">Beatles</span></a><span data-dcnode-id="3506" instrument_node=""> album </span><i data-dcnode-id="3503"><a data-dcnode-id="3504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sgt._Pepper%2527s_Lonely_Hearts_Club_Band" title="Sgt. Pepper's Lonely Hearts Club Band"><span data-dcnode-id="3505" instrument_node="">Sgt. Pepper's Lonely Hearts Club Band</span></a></i><span data-dcnode-id="3502" instrument_node=""> is presented as a stage show by the fictional eponymous band, and one of its songs, "A Day in the Life" is in the form of a story within a dream. Similarly, the </span><a data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fugees" title="Fugees"><span data-dcnode-id="3501" instrument_node="">Fugees</span></a><span data-dcnode-id="3499" instrument_node=""> album </span><i data-dcnode-id="3496"><a data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Score_%28Fugees_album%29" title="The Score (Fugees album)"><span data-dcnode-id="3498" instrument_node="">The Score</span></a></i><span data-dcnode-id="3495" instrument_node=""> is presented as the soundtrack to a fictional movie, as are several other notable </span><a class="mw-redirect" data-dcnode-id="3493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Concept_albums" title="Concept albums"><span data-dcnode-id="3494" instrument_node="">concept albums</span></a><span data-dcnode-id="3492" instrument_node="">, while </span><a data-dcnode-id="3490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wyclef_Jean" title="Wyclef Jean"><span data-dcnode-id="3491" instrument_node="">Wyclef Jean</span></a><span data-dcnode-id="3489" instrument_node="">'s </span><i data-dcnode-id="3486"><a data-dcnode-id="3487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wyclef_Jean_Presents_The_Carnival" title="Wyclef Jean Presents The Carnival"><span data-dcnode-id="3488" instrument_node="">The Carnival</span></a></i><span data-dcnode-id="3485" instrument_node=""> is presented as testimony at a trial. The majority of </span><a data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ayreon" title="Ayreon"><span data-dcnode-id="3484" instrument_node="">Ayreon</span></a><span data-dcnode-id="3482" instrument_node="">'s albums outline a sprawling, loosely interconnected science fiction narrative, as do the albums of </span><a class="mw-redirect" data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Janelle_Monae" title="Janelle Monae"><span data-dcnode-id="3481" instrument_node="">Janelle Monae</span></a><span data-dcnode-id="3479" instrument_node="">.
</span></p><p data-dcnode-id="3456"><span data-dcnode-id="3477" instrument_node="">On </span><a data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tom_Waits" title="Tom Waits"><span data-dcnode-id="3476" instrument_node="">Tom Waits</span></a><span data-dcnode-id="3474" instrument_node="">'s concept album, </span><i data-dcnode-id="3471"><a data-dcnode-id="3472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alice_%28Tom_Waits_album%29" title="Alice (Tom Waits album)"><span data-dcnode-id="3473" instrument_node="">Alice</span></a></i><span data-dcnode-id="3470" instrument_node=""> (consisting of music he wrote for the musical of the same name) most of the songs are (very) loosely inspired by both </span><i data-dcnode-id="3467"><a class="mw-redirect" data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alice_in_Wonderland" title="Alice in Wonderland"><span data-dcnode-id="3469" instrument_node="">Alice in Wonderland</span></a></i><span data-dcnode-id="3466" instrument_node=""> and the book's real life author, </span><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lewis_Carroll" title="Lewis Carroll"><span data-dcnode-id="3465" instrument_node="">Lewis Carroll</span></a><span data-dcnode-id="3463" instrument_node="">, and inspiration </span><a data-dcnode-id="3461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alice_Liddell" title="Alice Liddell"><span data-dcnode-id="3462" instrument_node="">Alice Liddell</span></a><span data-dcnode-id="3460" instrument_node="">. The song "Poor Edward," however, is presented as a story told by a narrator about </span><a class="mw-redirect" data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Mordrake" title="Edward Mordrake"><span data-dcnode-id="3459" instrument_node="">Edward Mordrake</span></a><span data-dcnode-id="3457" instrument_node="">, and the song "Fish and Bird" is presented as a retold story that the narrator heard from a sailor.
</span></p><span data-dcnode-id="3455" instrument_node="">
</span><h2 data-dcnode-id="3445"><span class="mw-headline" data-dcnode-id="3453" id="Examples_of_nested_stories_by_type"><span data-dcnode-id="3454" instrument_node="">Examples of nested stories by type</span></span><span class="mw-editsection" data-dcnode-id="3446"><span class="mw-editsection-bracket" data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">[</span></span><a data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D3" title="Edit section: Examples of nested stories by type"><span data-dcnode-id="3450" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3444" instrument_node="">
</span><h3 data-dcnode-id="3434"><span class="mw-headline" data-dcnode-id="3442" id="Nested_books"><span data-dcnode-id="3443" instrument_node="">Nested books</span></span><span class="mw-editsection" data-dcnode-id="3435"><span class="mw-editsection-bracket" data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">[</span></span><a data-dcnode-id="3438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D4" title="Edit section: Nested books"><span data-dcnode-id="3439" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3433" instrument_node="">
</span><p data-dcnode-id="3405"><span data-dcnode-id="3432" instrument_node="">In his 1895 </span><a class="mw-redirect" data-dcnode-id="3430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Historical_novel" title="Historical novel"><span data-dcnode-id="3431" instrument_node="">historical novel</span></a><span data-dcnode-id="3429" instrument_node=""> </span><i data-dcnode-id="3426"><a data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pharaoh_%28Prus_novel%29" title="Pharaoh (Prus novel)"><span data-dcnode-id="3428" instrument_node="">Pharaoh</span></a></i><span data-dcnode-id="3425" instrument_node="">, </span><a data-dcnode-id="3423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boles%25C5%2582aw_Prus" title="Bolesław Prus"><span data-dcnode-id="3424" instrument_node="">Bolesław Prus</span></a><span data-dcnode-id="3422" instrument_node=""> introduces a number of stories within the story, ranging in length from </span><a data-dcnode-id="3420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vignette_%28literature%29" title="Vignette (literature)"><span data-dcnode-id="3421" instrument_node="">vignettes</span></a><span data-dcnode-id="3419" instrument_node=""> to full-blown stories, many of them drawn from </span><a data-dcnode-id="3417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Egypt" title="Ancient Egypt"><span data-dcnode-id="3418" instrument_node="">ancient Egyptian</span></a><span data-dcnode-id="3416" instrument_node=""> texts, that further the plot, illuminate </span><a data-dcnode-id="3414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Character_%28arts%29" title="Character (arts)"><span data-dcnode-id="3415" instrument_node="">characters</span></a><span data-dcnode-id="3413" instrument_node="">, and even inspire the fashioning of individual characters. </span><a data-dcnode-id="3411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jan_Potocki" title="Jan Potocki"><span data-dcnode-id="3412" instrument_node="">Jan Potocki</span></a><span data-dcnode-id="3410" instrument_node="">'s </span><i data-dcnode-id="3407"><a data-dcnode-id="3408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Manuscript_Found_in_Saragossa" title="The Manuscript Found in Saragossa"><span data-dcnode-id="3409" instrument_node="">The Manuscript Found in Saragossa</span></a></i><span data-dcnode-id="3406" instrument_node=""> (1797–1805) has an interlocking structure with stories-within-stories reaching several levels of depth.
</span></p><p data-dcnode-id="3376"><span data-dcnode-id="3404" instrument_node="">The </span><a data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Provenance" title="Provenance"><span data-dcnode-id="3403" instrument_node="">provenance</span></a><span data-dcnode-id="3401" instrument_node=""> of the story is sometimes explained internally, as in </span><i data-dcnode-id="3398"><a data-dcnode-id="3399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Lord_of_the_Rings" title="The Lord of the Rings"><span data-dcnode-id="3400" instrument_node="">The Lord of the Rings</span></a></i><span data-dcnode-id="3397" instrument_node=""> by </span><a data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._R._R._Tolkien" title="J. R. R. Tolkien"><span data-dcnode-id="3396" instrument_node="">J. R. R. Tolkien</span></a><span data-dcnode-id="3394" instrument_node="">, which depicts the </span><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Book_of_Westmarch" title="Red Book of Westmarch"><span data-dcnode-id="3393" instrument_node="">Red Book of Westmarch</span></a><span data-dcnode-id="3391" instrument_node=""> (a story-internal version of the book itself) as a history compiled by several of the characters. The </span><a data-dcnode-id="3389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subtitle_%28titling%29" title="Subtitle (titling)"><span data-dcnode-id="3390" instrument_node="">subtitle</span></a><span data-dcnode-id="3388" instrument_node=""> of </span><i data-dcnode-id="3385"><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Hobbit" title="The Hobbit"><span data-dcnode-id="3387" instrument_node="">The Hobbit</span></a></i><span data-dcnode-id="3384" instrument_node=""> ("There and Back Again") is depicted as part of a rejected title of this book within a book, and </span><i data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">The Lord of the Rings</span></i><span data-dcnode-id="3381" instrument_node=""> is a part of the final title.</span><sup class="reference" data-dcnode-id="3378" id="cite_ref-havens_5-0"><a data-dcnode-id="3379" href="#cite_note-havens-5"><span data-dcnode-id="3380" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3377" instrument_node="">
</span></p><p data-dcnode-id="3360"><span data-dcnode-id="3375" instrument_node="">An example of an interconnected inner story is "The Mad Trist" in </span><a data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edgar_Allan_Poe" title="Edgar Allan Poe"><span data-dcnode-id="3374" instrument_node="">Edgar Allan Poe</span></a><span data-dcnode-id="3372" instrument_node="">'s </span><i data-dcnode-id="3369"><a data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Fall_of_the_House_of_Usher" title="The Fall of the House of Usher"><span data-dcnode-id="3371" instrument_node="">Fall of the House of Usher</span></a></i><span data-dcnode-id="3368" instrument_node="">, where through somewhat mystical means the narrator's reading of the story within a story influences the reality of the story he has been telling, so that what happens in "The Mad Trist" begins happening in "The Fall of the House of Usher". Also, in </span><i data-dcnode-id="3365"><a data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Don_Quixote" title="Don Quixote"><span data-dcnode-id="3367" instrument_node="">Don Quixote</span></a></i><span data-dcnode-id="3364" instrument_node=""> by </span><a data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miguel_de_Cervantes" title="Miguel de Cervantes"><span data-dcnode-id="3363" instrument_node="">Miguel de Cervantes</span></a><span data-dcnode-id="3361" instrument_node="">, there are many stories within the story that influence the hero's actions (there are others that even the author himself admits are purely digressive).
</span></p><p data-dcnode-id="3342"><span data-dcnode-id="3359" instrument_node="">A commonly independently </span><a data-dcnode-id="3357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthology" title="Anthology"><span data-dcnode-id="3358" instrument_node="">anthologised</span></a><span data-dcnode-id="3356" instrument_node=""> story is "</span><a data-dcnode-id="3354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Grand_Inquisitor" title="The Grand Inquisitor"><span data-dcnode-id="3355" instrument_node="">The Grand Inquisitor</span></a><span data-dcnode-id="3353" instrument_node="">" by </span><a class="mw-redirect" data-dcnode-id="3351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dostoevsky" title="Dostoevsky"><span data-dcnode-id="3352" instrument_node="">Dostoevsky</span></a><span data-dcnode-id="3350" instrument_node=""> from his long </span><a class="mw-redirect" data-dcnode-id="3348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychological_novel" title="Psychological novel"><span data-dcnode-id="3349" instrument_node="">psychological novel</span></a><span data-dcnode-id="3347" instrument_node=""> </span><i data-dcnode-id="3344"><a data-dcnode-id="3345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Brothers_Karamazov" title="The Brothers Karamazov"><span data-dcnode-id="3346" instrument_node="">The Brothers Karamazov</span></a></i><span data-dcnode-id="3343" instrument_node="">, which is told by one brother to another to explain, in part, his view on religion and morality. It also, in a succinct way, dramatizes many of Dostoevsky's interior conflicts. 
</span></p><p data-dcnode-id="3321"><span data-dcnode-id="3341" instrument_node="">An example of a "bonus material" style inner story is the chapter "The Town Ho's Story" in </span><a data-dcnode-id="3339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herman_Melville" title="Herman Melville"><span data-dcnode-id="3340" instrument_node="">Herman Melville</span></a><span data-dcnode-id="3338" instrument_node="">'s novel </span><i data-dcnode-id="3335"><a data-dcnode-id="3336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moby-Dick" title="Moby-Dick"><span data-dcnode-id="3337" instrument_node="">Moby-Dick</span></a></i><span data-dcnode-id="3334" instrument_node="">; that chapter tells a fully formed story of an exciting </span><a data-dcnode-id="3332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mutiny" title="Mutiny"><span data-dcnode-id="3333" instrument_node="">mutiny</span></a><span data-dcnode-id="3331" instrument_node=""> and contains many plot ideas that Melville had conceived during the early stages of writing </span><i data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">Moby-Dick</span></i><span data-dcnode-id="3328" instrument_node="">—ideas originally intended to be used later in the novel—but as the writing progressed, these plot ideas eventually proved impossible to fit around the characters that Melville went on to </span><a data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Characterization" title="Characterization"><span data-dcnode-id="3327" instrument_node="">create and develop</span></a><span data-dcnode-id="3325" instrument_node="">. Instead of discarding the ideas altogether, Melville wove them into a coherent short story and had the character Ishmael demonstrate his eloquence and intelligence by </span><a class="mw-redirect" data-dcnode-id="3323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Story_telling" title="Story telling"><span data-dcnode-id="3324" instrument_node="">telling the story</span></a><span data-dcnode-id="3322" instrument_node=""> to his impressed friends.
</span></p><p data-dcnode-id="3309"><span data-dcnode-id="3320" instrument_node="">One of the most complicated structures of a story within a story was used by </span><a data-dcnode-id="3318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Nabokov" title="Vladimir Nabokov"><span data-dcnode-id="3319" instrument_node="">Vladimir Nabokov</span></a><span data-dcnode-id="3317" instrument_node=""> in his novel </span><i data-dcnode-id="3314"><a data-dcnode-id="3315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Gift_%28Nabokov_novel%29" title="The Gift (Nabokov novel)"><span data-dcnode-id="3316" instrument_node="">The Gift</span></a></i><span data-dcnode-id="3313" instrument_node="">. There, as inner stories, function both poems and short stories by the main character Fyodor Cherdyntsev as well as the whole Chapter IV, a critical biography of Nikolay </span><a data-dcnode-id="3311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolay_Chernyshevsky" title="Nikolay Chernyshevsky"><span data-dcnode-id="3312" instrument_node="">Chernyshevsky</span></a><span data-dcnode-id="3310" instrument_node=""> (also written by Fyodor). This novel is considered one of the first metanovels in literature.
</span></p><p data-dcnode-id="3295"><span data-dcnode-id="3308" instrument_node="">With the rise of </span><a class="mw-redirect" data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modernist_literature" title="Modernist literature"><span data-dcnode-id="3307" instrument_node="">literary modernism</span></a><span data-dcnode-id="3305" instrument_node="">, writers experimented with ways in which multiple narratives might nest imperfectly within each other. A particularly ingenious example of nested narratives is </span><a data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Merrill" title="James Merrill"><span data-dcnode-id="3304" instrument_node="">James Merrill</span></a><span data-dcnode-id="3302" instrument_node="">'s 1974 </span><a data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modernist_poetry_in_English" title="Modernist poetry in English"><span data-dcnode-id="3301" instrument_node="">modernist poem</span></a><span data-dcnode-id="3299" instrument_node=""> "</span><a data-dcnode-id="3297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lost_in_Translation_%28poem%29" title="Lost in Translation (poem)"><span data-dcnode-id="3298" instrument_node="">Lost in Translation</span></a><span data-dcnode-id="3296" instrument_node="">".
</span></p><p data-dcnode-id="3284"><span data-dcnode-id="3294" instrument_node="">In </span><a data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabih_Alameddine" title="Rabih Alameddine"><span data-dcnode-id="3293" instrument_node="">Rabih Alameddine</span></a><span data-dcnode-id="3291" instrument_node="">'s novel </span><i data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">The Hakawati</span></i><span data-dcnode-id="3288" instrument_node="">, or </span><i data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">The Storyteller</span></i><span data-dcnode-id="3285" instrument_node="">, the protagonist describes coming home to the funeral of his father, one of a long line of traditional Arabic storytellers. Throughout the narrative, the author becomes hakawati (an Arabic word for a teller of traditional tales) himself, weaving the tale of the story of his own life and that of his family with folkloric versions of tales from Qur'an, the Old Testament, Ovid, and One Thousand and One Nights. Both the tales he tells of his family (going back to his grandfather) and the embedded folk tales, themselves embed other tales, often 2 or more layers deep.
</span></p><p data-dcnode-id="3266"><span data-dcnode-id="3283" instrument_node="">In </span><a data-dcnode-id="3281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sue_Townsend" title="Sue Townsend"><span data-dcnode-id="3282" instrument_node="">Sue Townsend</span></a><span data-dcnode-id="3280" instrument_node="">'s </span><i data-dcnode-id="3277"><a data-dcnode-id="3278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adrian_Mole%3A_The_Wilderness_Years" title="Adrian Mole: The Wilderness Years"><span data-dcnode-id="3279" instrument_node="">Adrian Mole: The Wilderness Years</span></a></i><span data-dcnode-id="3276" instrument_node="">, </span><a data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adrian_Mole" title="Adrian Mole"><span data-dcnode-id="3275" instrument_node="">Adrian</span></a><span data-dcnode-id="3273" instrument_node=""> writes a book entitled </span><i data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Lo! The Flat Hills of My Homeland</span></i><span data-dcnode-id="3270" instrument_node="">, in which the main character, Jake Westmorland, writes a book called </span><i data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Sparg of Kronk</span></i><span data-dcnode-id="3267" instrument_node="">, whose eponymous character, Sparg, writes a book with no language.
</span></p><p data-dcnode-id="3257"><span data-dcnode-id="3265" instrument_node="">In </span><a data-dcnode-id="3263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthony_Horowitz" title="Anthony Horowitz"><span data-dcnode-id="3264" instrument_node="">Anthony Horowitz</span></a><span data-dcnode-id="3262" instrument_node="">'s </span><i data-dcnode-id="3259"><a data-dcnode-id="3260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magpie_Murders" title="Magpie Murders"><span data-dcnode-id="3261" instrument_node="">Magpie Murders</span></a></i><span data-dcnode-id="3258" instrument_node="">, a significant proportion of the book features a fictional but authentically formatted mystery novel by Alan Conway, titled 'Magpie Murders'. The secondary novel ends before its conclusion returning the narrative to the original, and primary, story where the protagonist and reviewer of the book attempts to find the final chapter. As this progresses characters and messages within the fictional 'Magpie Murders' manifest themselves within the primary narrative and the final chapter's content reveals the reason for its original absence.
</span></p><p data-dcnode-id="3238"><span data-dcnode-id="3256" instrument_node="">Dreams are a common way of including stories inside stories, and can sometimes go several levels deep. Both the book </span><i data-dcnode-id="3253"><a data-dcnode-id="3254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Arabian_Nightmare" title="The Arabian Nightmare"><span data-dcnode-id="3255" instrument_node="">The Arabian Nightmare</span></a></i><span data-dcnode-id="3252" instrument_node=""> and the curse of "eternal waking" from the </span><a data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neil_Gaiman" title="Neil Gaiman"><span data-dcnode-id="3251" instrument_node="">Neil Gaiman</span></a><span data-dcnode-id="3249" instrument_node=""> series </span><i data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">The Sandman</span></i><span data-dcnode-id="3246" instrument_node=""> feature an endless series of waking from one dream into another dream. In </span><a data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Maturin" title="Charles Maturin"><span data-dcnode-id="3245" instrument_node="">Charles Maturin</span></a><span data-dcnode-id="3243" instrument_node="">'s novel </span><i data-dcnode-id="3240"><a data-dcnode-id="3241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Melmoth_the_Wanderer" title="Melmoth the Wanderer"><span data-dcnode-id="3242" instrument_node="">Melmoth the Wanderer</span></a></i><span data-dcnode-id="3239" instrument_node="">, the use of vast stories-within-stories creates a sense of dream-like quality in the reader.
</span></p><span data-dcnode-id="3237" instrument_node="">
</span><h4 data-dcnode-id="3227"><span class="mw-headline" data-dcnode-id="3235" id="Religion_and_philosophy"><span data-dcnode-id="3236" instrument_node="">Religion and philosophy</span></span><span class="mw-editsection" data-dcnode-id="3228"><span class="mw-editsection-bracket" data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">[</span></span><a data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D5" title="Edit section: Religion and philosophy"><span data-dcnode-id="3232" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3226" instrument_node="">
</span><p data-dcnode-id="3191"><span data-dcnode-id="3225" instrument_node="">This structure is also found in classic religious and philosophical texts. The structure of </span><i data-dcnode-id="3222"><a class="mw-redirect" data-dcnode-id="3223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Symposium" title="The Symposium"><span data-dcnode-id="3224" instrument_node="">The Symposium</span></a></i><span data-dcnode-id="3221" instrument_node=""> and </span><i data-dcnode-id="3218"><a data-dcnode-id="3219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phaedo" title="Phaedo"><span data-dcnode-id="3220" instrument_node="">Phaedo</span></a></i><span data-dcnode-id="3217" instrument_node="">, attributed to </span><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plato" title="Plato"><span data-dcnode-id="3216" instrument_node="">Plato</span></a><span data-dcnode-id="3214" instrument_node="">, is of a story within a story within a story. In the Christian </span><a data-dcnode-id="3212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bible" title="Bible"><span data-dcnode-id="3213" instrument_node="">Bible</span></a><span data-dcnode-id="3211" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="3209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gospels" title="Gospels"><span data-dcnode-id="3210" instrument_node="">gospels</span></a><span data-dcnode-id="3208" instrument_node=""> are accounts of the life and ministry of </span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus" title="Jesus"><span data-dcnode-id="3207" instrument_node="">Jesus</span></a><span data-dcnode-id="3205" instrument_node="">. However, they also include within them the </span><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parable" title="Parable"><span data-dcnode-id="3204" instrument_node="">parables</span></a><span data-dcnode-id="3202" instrument_node=""> that Jesus told. In more modern philosophical work, </span><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jostein_Gaarder" title="Jostein Gaarder"><span data-dcnode-id="3201" instrument_node="">Jostein Gaarder</span></a><span data-dcnode-id="3199" instrument_node="">'s books often feature this device. Examples are </span><i data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">The Solitaire Mystery</span></i><span data-dcnode-id="3196" instrument_node="">, where the protagonist receives a small book from a baker, in which the baker tells the story of a sailor who tells the story of another sailor, and </span><i data-dcnode-id="3193"><a data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sophie%2527s_World" title="Sophie's World"><span data-dcnode-id="3195" instrument_node="">Sophie's World</span></a></i><span data-dcnode-id="3192" instrument_node=""> about a girl who is actually a character in a book that is being read by Hilde, a girl in another dimension. Later on in the book Sophie questions this idea, and realizes that Hilde too could be a character in a story that in turn is being read by another.
</span></p><span data-dcnode-id="3190" instrument_node="">
</span><h4 data-dcnode-id="3180"><span class="mw-headline" data-dcnode-id="3188" id="Nested_science_fiction"><span data-dcnode-id="3189" instrument_node="">Nested science fiction</span></span><span class="mw-editsection" data-dcnode-id="3181"><span class="mw-editsection-bracket" data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">[</span></span><a data-dcnode-id="3184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D6" title="Edit section: Nested science fiction"><span data-dcnode-id="3185" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3179" instrument_node="">
</span><p data-dcnode-id="3150"><span data-dcnode-id="3178" instrument_node="">The experimental modernist works that incorporate multiple narratives into one story are quite often science-fiction or science fiction influenced. These include most of the various novels written by the American author </span><a data-dcnode-id="3176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurt_Vonnegut" title="Kurt Vonnegut"><span data-dcnode-id="3177" instrument_node="">Kurt Vonnegut</span></a><span data-dcnode-id="3175" instrument_node="">. Vonnegut includes the recurring character </span><a data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kilgore_Trout" title="Kilgore Trout"><span data-dcnode-id="3174" instrument_node="">Kilgore Trout</span></a><span data-dcnode-id="3172" instrument_node=""> in many of his novels. Trout acts as the mysterious </span><a data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Science_fiction" title="Science fiction"><span data-dcnode-id="3171" instrument_node="">science fiction</span></a><span data-dcnode-id="3169" instrument_node=""> writer who enhances the morals of the novels through plot descriptions of his stories. Books such as </span><i data-dcnode-id="3166"><a data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Breakfast_of_Champions" title="Breakfast of Champions"><span data-dcnode-id="3168" instrument_node="">Breakfast of Champions</span></a></i><span data-dcnode-id="3165" instrument_node=""> and </span><i data-dcnode-id="3162"><a data-dcnode-id="3163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/God_Bless_You%2C_Mr._Rosewater" title="God Bless You, Mr. Rosewater"><span data-dcnode-id="3164" instrument_node="">God Bless You, Mr. Rosewater</span></a></i><span data-dcnode-id="3161" instrument_node=""> are sprinkled with these plot descriptions. </span><a data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stanis%25C5%2582aw_Lem" title="Stanisław Lem"><span data-dcnode-id="3160" instrument_node="">Stanisław Lem</span></a><span data-dcnode-id="3158" instrument_node="">'s </span><i data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">Tale of the Three Storytelling Machines of King Genius</span></i><span data-dcnode-id="3155" instrument_node=""> from </span><i data-dcnode-id="3152"><a data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Cyberiad" title="The Cyberiad"><span data-dcnode-id="3154" instrument_node="">The Cyberiad</span></a></i><span data-dcnode-id="3151" instrument_node=""> has several levels of storytelling. All levels tell stories of the same person, Trurl.
</span></p><p data-dcnode-id="3145"><i data-dcnode-id="3147"><a data-dcnode-id="3148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Leaves" title="House of Leaves"><span data-dcnode-id="3149" instrument_node="">House of Leaves</span></a></i><span data-dcnode-id="3146" instrument_node=""> is the tale of a man who finds a manuscript telling the story of a documentary that may or may not have ever existed, contains multiple layers of plot. The book includes footnotes and letters that tell their own stories only vaguely related to the events in the main narrative of the book, and footnotes for fake books.
</span></p><p data-dcnode-id="3113"><a data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_A._Heinlein" title="Robert A. Heinlein"><span data-dcnode-id="3144" instrument_node="">Robert A. Heinlein</span></a><span data-dcnode-id="3142" instrument_node="">'s later books (</span><i data-dcnode-id="3139"><a data-dcnode-id="3140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Number_of_the_Beast_%28novel%29" title="The Number of the Beast (novel)"><span data-dcnode-id="3141" instrument_node="">The Number of the Beast</span></a></i><span data-dcnode-id="3138" instrument_node="">, </span><i data-dcnode-id="3135"><a data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Cat_Who_Walks_Through_Walls" title="The Cat Who Walks Through Walls"><span data-dcnode-id="3137" instrument_node="">The Cat Who Walks Through Walls</span></a></i><span data-dcnode-id="3134" instrument_node=""> and </span><i data-dcnode-id="3131"><a data-dcnode-id="3132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/To_Sail_Beyond_the_Sunset" title="To Sail Beyond the Sunset"><span data-dcnode-id="3133" instrument_node="">To Sail Beyond the Sunset</span></a></i><span data-dcnode-id="3130" instrument_node="">) propose the idea that every real universe is a fiction in another universe. This </span><a class="mw-redirect" data-dcnode-id="3128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_as_Myth" title="World as Myth"><span data-dcnode-id="3129" instrument_node="">hypothesis</span></a><span data-dcnode-id="3127" instrument_node=""> enables many writers who are characters in the books to interact with their own creations. </span><a data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Atwood" title="Margaret Atwood"><span data-dcnode-id="3126" instrument_node="">Margaret Atwood</span></a><span data-dcnode-id="3124" instrument_node="">'s novel </span><i data-dcnode-id="3121"><a data-dcnode-id="3122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Blind_Assassin" title="The Blind Assassin"><span data-dcnode-id="3123" instrument_node="">The Blind Assassin</span></a></i><span data-dcnode-id="3120" instrument_node=""> is interspersed with excerpts from a novel written by one of the main characters; the novel-within-a-novel itself contains a </span><a data-dcnode-id="3118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Science_fiction" title="Science fiction"><span data-dcnode-id="3119" instrument_node="">science fiction</span></a><span data-dcnode-id="3117" instrument_node=""> story written by one of </span><i data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">that</span></i><span data-dcnode-id="3114" instrument_node=""> novel's characters.
</span></p><p data-dcnode-id="3095"><span data-dcnode-id="3112" instrument_node="">In </span><a data-dcnode-id="3110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philip_K._Dick" title="Philip K. Dick"><span data-dcnode-id="3111" instrument_node="">Philip K. Dick</span></a><span data-dcnode-id="3109" instrument_node="">'s novel </span><i data-dcnode-id="3106"><a data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Man_in_the_High_Castle" title="The Man in the High Castle"><span data-dcnode-id="3108" instrument_node="">The Man in the High Castle</span></a></i><span data-dcnode-id="3105" instrument_node="">, each character comes into interaction with a book called </span><i data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">The Grasshopper Lies Heavy</span></i><span data-dcnode-id="3102" instrument_node="">, which was written by the Man in the High Castle. As Dick's novel details a world in which the </span><a class="mw-redirect" data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Axis_Powers_of_World_War_II" title="Axis Powers of World War II"><span data-dcnode-id="3101" instrument_node="">Axis Powers of World War II</span></a><span data-dcnode-id="3099" instrument_node=""> had </span><a class="mw-redirect" data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Axis_victory_in_World_War_II" title="Axis victory in World War II"><span data-dcnode-id="3098" instrument_node="">succeeded in dominating the known world</span></a><span data-dcnode-id="3096" instrument_node="">, the novel within the novel details an alternative to this history in which the Allies overcome the Axis and bring stability to the world – a victory which itself is quite different from real history.
