</span></p><p data-dcnode-id="1329"><span data-dcnode-id="1405" instrument_node="">Robert Altman's satirical noir </span><i data-dcnode-id="1402"><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Player_%281992_film%29" title="The Player (1992 film)"><span data-dcnode-id="1404" instrument_node="">The Player</span></a></i><span data-dcnode-id="1401" instrument_node=""> about Hollywood ends with the antihero being pitched a movie version of his own story, complete with an unlikely happy ending. The long-running musical </span><i data-dcnode-id="1398"><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_Chorus_Line" title="A Chorus Line"><span data-dcnode-id="1400" instrument_node="">A Chorus Line</span></a></i><span data-dcnode-id="1397" instrument_node=""> dramatizes its own creation, and the life stories of its own original cast members. The famous final number does double duty as the showstopper for both the musical the audience is watching and the one the characters are appearing in. </span><i data-dcnode-id="1394"><a data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austin_Powers_in_Goldmember" title="Austin Powers in Goldmember"><span data-dcnode-id="1396" instrument_node="">Austin Powers in Goldmember</span></a></i><span data-dcnode-id="1393" instrument_node=""> begins with an action film opening, which turns out to be a sequence being filmed by </span><a data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steven_Spielberg" title="Steven Spielberg"><span data-dcnode-id="1392" instrument_node="">Steven Spielberg</span></a><span data-dcnode-id="1390" instrument_node="">. Near the ending, the events of the film itself are revealed to be a movie being enjoyed by the characters. Jim Henson's </span><i data-dcnode-id="1387"><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Muppet_Movie" title="The Muppet Movie"><span data-dcnode-id="1389" instrument_node="">The Muppet Movie</span></a></i><span data-dcnode-id="1386" instrument_node=""> is framed as a screening of the movie itself, and the screenplay for the movie is present inside the movie, which ends with an abstracted, abbreviated re-staging of its own events. The 1985 Tim Burton film </span><i data-dcnode-id="1383"><a class="mw-redirect" data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pee-Wee%2527s_Big_Adventure" title="Pee-Wee's Big Adventure"><span data-dcnode-id="1385" instrument_node="">Pee-Wee's Big Adventure</span></a></i><span data-dcnode-id="1382" instrument_node=""> ends with the main characters watching a film version of their own adventures, but as reimagined as a Hollywood blockbuster action film, with </span><a data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Brolin" title="James Brolin"><span data-dcnode-id="1381" instrument_node="">James Brolin</span></a><span data-dcnode-id="1379" instrument_node=""> as a more stereotypically manly version of the </span><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Reubens" title="Paul Reubens"><span data-dcnode-id="1378" instrument_node="">Paul Reubens</span></a><span data-dcnode-id="1376" instrument_node=""> title character. Episode 14 of the </span><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anime" title="Anime"><span data-dcnode-id="1375" instrument_node="">anime</span></a><span data-dcnode-id="1373" instrument_node=""> series </span><i data-dcnode-id="1370"><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martian_Successor_Nadesico" title="Martian Successor Nadesico"><span data-dcnode-id="1372" instrument_node="">Martian Successor Nadesico</span></a></i><span data-dcnode-id="1369" instrument_node=""> is essentially a clip show, but has several newly animated segments based on </span><i data-dcnode-id="1366"><a class="mw-redirect" data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gekigangar_III" title="Gekigangar III"><span data-dcnode-id="1368" instrument_node="">Gekigangar III</span></a></i><span data-dcnode-id="1365" instrument_node="">, an anime that exists within its universe and that many characters are fans of, that involves the characters of that show watching Nadesico. The episode ends with the crew of the Nadesico watching the very same episode of Gekigangar, causing a </span><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paradox" title="Paradox"><span data-dcnode-id="1364" instrument_node="">paradox</span></a><span data-dcnode-id="1362" instrument_node="">. </span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mel_Brooks" title="Mel Brooks"><span data-dcnode-id="1361" instrument_node="">Mel Brooks</span></a><span data-dcnode-id="1359" instrument_node="">'s 1974 comedy </span><i data-dcnode-id="1356"><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blazing_Saddles" title="Blazing Saddles"><span data-dcnode-id="1358" instrument_node="">Blazing Saddles</span></a></i><span data-dcnode-id="1355" instrument_node=""> leaves its Western setting when the climactic fight scene breaks out, revealing the setting to have been a set in the </span><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warner_Bros." title="Warner Bros."><span data-dcnode-id="1354" instrument_node="">Warner Bros.</span></a><span data-dcnode-id="1352" instrument_node=""> studio lot; the fight spills out onto an adjacent musical set, then into the studio canteen, and finally onto the streets. The two protagonists arrive at </span><a data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grauman%2527s_Chinese_Theatre" title="Grauman's Chinese Theatre"><span data-dcnode-id="1351" instrument_node="">Grauman's Chinese Theatre</span></a><span data-dcnode-id="1349" instrument_node="">, which is showing the "premiere" of </span><i data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Blazing Saddles</span></i><span data-dcnode-id="1346" instrument_node="">; they enter the cinema to watch the conclusion of their own film. Brooks recycled the gag in his 1987 </span><i data-dcnode-id="1343"><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_Wars" title="Star Wars"><span data-dcnode-id="1345" instrument_node="">Star Wars</span></a></i><span data-dcnode-id="1342" instrument_node=""> parody, </span><i data-dcnode-id="1339"><a data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spaceballs" title="Spaceballs"><span data-dcnode-id="1341" instrument_node="">Spaceballs</span></a></i><span data-dcnode-id="1338" instrument_node="">, where the villains are able to locate the heroes by watching a copy of the movie they are in on VHS video tape (a comic exaggeration of the phenomenon of films being available on video before their theatrical release). Brooks also made the 1976 parody </span><i data-dcnode-id="1335"><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silent_Movie" title="Silent Movie"><span data-dcnode-id="1337" instrument_node="">Silent Movie</span></a></i><span data-dcnode-id="1334" instrument_node=""> about a buffoonish team of filmmakers trying to make the first Hollywood silent film in forty years—which is essentially that film itself (another forty years later, life imitated art imitating art, when an actual modern silent movie became a hit, the Oscar winner</span><i data-dcnode-id="1331"><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Artist_%28film%29" title="The Artist (film)"><span data-dcnode-id="1333" instrument_node="">The Artist</span></a></i><span data-dcnode-id="1330" instrument_node="">). 
</span></p><p data-dcnode-id="1274"><span data-dcnode-id="1328" instrument_node="">The film-within-a-film format is used in the </span><i data-dcnode-id="1325"><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scream_%28franchise%29" title="Scream (franchise)"><span data-dcnode-id="1327" instrument_node="">Scream</span></a></i><span data-dcnode-id="1324" instrument_node=""> horror series. In </span><i data-dcnode-id="1321"><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scream_2" title="Scream 2"><span data-dcnode-id="1323" instrument_node="">Scream 2</span></a></i><span data-dcnode-id="1320" instrument_node="">, the opening scene takes place in a movie theater where a screening of </span><i data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Stab</span></i><span data-dcnode-id="1317" instrument_node=""> is played which depicts the events from the </span><a data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scream_%281996_film%29" title="Scream (1996 film)"><span data-dcnode-id="1316" instrument_node="">first film</span></a><span data-dcnode-id="1314" instrument_node="">. In between the events of </span><i data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Scream 2</span></i><span data-dcnode-id="1311" instrument_node=""> and </span><i data-dcnode-id="1308"><a data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scream_3" title="Scream 3"><span data-dcnode-id="1310" instrument_node="">Scream 3</span></a></i><span data-dcnode-id="1307" instrument_node="">, a second film was released called </span><i data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Stab 2</span></i><span data-dcnode-id="1304" instrument_node="">. </span><i data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Scream 3</span></i><span data-dcnode-id="1301" instrument_node=""> is about the actors filming a fictional 3rd installment in the Stab series. The actors playing the trilogy's characters end up getting killed, much in the same way as the characters they are playing on screen and in the same order. In between the events of </span><i data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Scream 3</span></i><span data-dcnode-id="1298" instrument_node=""> and </span><i data-dcnode-id="1295"><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scream_4" title="Scream 4"><span data-dcnode-id="1297" instrument_node="">Scream 4</span></a></i><span data-dcnode-id="1294" instrument_node="">, four other Stab films are released. In the opening sequence of </span><i data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Scream 4</span></i><span data-dcnode-id="1291" instrument_node=""> two characters are watching </span><i data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Stab 7</span></i><span data-dcnode-id="1288" instrument_node=""> before they get killed. There's also a party in which all seven Stab movies were going to be shown. References are also made to </span><i data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Stab 5</span></i><span data-dcnode-id="1285" instrument_node=""> involving </span><a data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Time_travel" title="Time travel"><span data-dcnode-id="1284" instrument_node="">time travel</span></a><span data-dcnode-id="1282" instrument_node=""> as a plot device. In the fifth installment of the series, also named </span><i data-dcnode-id="1279"><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scream_%282022_film%29" title="Scream (2022 film)"><span data-dcnode-id="1281" instrument_node="">Scream</span></a></i><span data-dcnode-id="1278" instrument_node="">, an eighth Stab film is mentioned having been released before the film takes place. The characters in the film, several of which are fans of the series, heavily criticize the film, similar to how </span><i data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Scream 4</span></i><span data-dcnode-id="1275" instrument_node=""> was criticized. Additionally, late in the film, Mindy watches the first Stab by herself. During the depiction of Ghostface sneaking up behind Randy on the couch from the first film in Stab, Ghostface sneaks up on Mindy and attacks and stabs her.
</span></p><p data-dcnode-id="1241"><span data-dcnode-id="1273" instrument_node="">Director </span><a data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spike_Jonze" title="Spike Jonze"><span data-dcnode-id="1272" instrument_node="">Spike Jonze</span></a><span data-dcnode-id="1270" instrument_node="">'s </span><i data-dcnode-id="1267"><a data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptation_%28film%29" title="Adaptation (film)"><span data-dcnode-id="1269" instrument_node="">Adaptation</span></a></i><span data-dcnode-id="1266" instrument_node=""> is a fictionalized version of screenwriter </span><a data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charlie_Kaufman" title="Charlie Kaufman"><span data-dcnode-id="1265" instrument_node="">Charlie Kaufman</span></a><span data-dcnode-id="1263" instrument_node="">'s struggles to adapt the non-cinematic book </span><i data-dcnode-id="1260"><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Orchid_Thief" title="The Orchid Thief"><span data-dcnode-id="1262" instrument_node="">The Orchid Thief</span></a></i><span data-dcnode-id="1259" instrument_node=""> into a Hollywood blockbuster. As his onscreen self succumbs to the temptation to commercialize the narrative, Kaufman incorporates those techniques into the script, including tropes such as an invented romance, a car chase, a drug-running sequence, and an imaginary identical twin for the protagonist. (The movie also features scenes about the making of </span><i data-dcnode-id="1256"><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Being_John_Malkovich" title="Being John Malkovich"><span data-dcnode-id="1258" instrument_node="">Being John Malkovich</span></a></i><span data-dcnode-id="1255" instrument_node="">, previously written by Kaufman and directed by Jonze.)   Similarly, in Kaufman's self-directed 2008 film </span><i data-dcnode-id="1252"><a data-dcnode-id="1253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Synecdoche%2C_New_York" title="Synecdoche, New York"><span data-dcnode-id="1254" instrument_node="">Synecdoche, New York</span></a></i><span data-dcnode-id="1251" instrument_node="">, the main character Caden Cotard is a skilled director of plays who receives a grant, and ends up creating a remarkable theater piece intended as a carbon copy of the outside world. The layers of copies of the world ends up several layers deep. The same conceit was previously used by frequent Kaufman collaborator </span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michel_Gondry" title="Michel Gondry"><span data-dcnode-id="1250" instrument_node="">Michel Gondry</span></a><span data-dcnode-id="1248" instrument_node=""> in his music video for the </span><a data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bj%25C3%25B6rk" title="Björk"><span data-dcnode-id="1247" instrument_node="">Björk</span></a><span data-dcnode-id="1245" instrument_node=""> song "</span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bachelorette_%28song%29" title="Bachelorette (song)"><span data-dcnode-id="1244" instrument_node="">Bachelorette</span></a><span data-dcnode-id="1242" instrument_node="">," which features a musical that is about, in part, the creation of that musical. A mini-theater and small audience appear on stage to watch the musical-within-a-musical, and at some point, within that second musical a yet-smaller theater and audience appear. 
</span></p><p data-dcnode-id="1225"><span data-dcnode-id="1240" instrument_node="">Fractal fiction is sometimes utilized in </span><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_game" title="Video game"><span data-dcnode-id="1239" instrument_node="">video games</span></a><span data-dcnode-id="1237" instrument_node=""> to play with the concept of player choice: In the first chapter of </span><i data-dcnode-id="1234"><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stories_Untold_%28video_game%29" title="Stories Untold (video game)"><span data-dcnode-id="1236" instrument_node="">Stories Untold</span></a></i><span data-dcnode-id="1233" instrument_node="">, the player is required to play a </span><a class="mw-redirect" data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Text_adventure" title="Text adventure"><span data-dcnode-id="1232" instrument_node="">text adventure</span></a><span data-dcnode-id="1230" instrument_node="">, which eventually becomes apparent to be happening in the same environment the player is in; in </span><i data-dcnode-id="1227"><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Superhot" title="Superhot"><span data-dcnode-id="1229" instrument_node="">Superhot</span></a></i><span data-dcnode-id="1226" instrument_node=""> the narrative itself is constructed around the player playing a game called Superhot.
</span></p><span data-dcnode-id="1224" instrument_node="">
</span><h2 data-dcnode-id="1214"><span class="mw-headline" data-dcnode-id="1222" id="From_story_within_a_story_to_separate_story"><span data-dcnode-id="1223" instrument_node="">From story within a story to separate story</span></span><span class="mw-editsection" data-dcnode-id="1215"><span class="mw-editsection-bracket" data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">[</span></span><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStory_within_a_story%26action%3Dedit%26section%3D19" title="Edit section: From story within a story to separate story"><span data-dcnode-id="1219" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1212" instrument_node="">Occasionally a story within a story becomes such a popular element that the producer(s) decide to develop it autonomously as a separate and distinct work. This is an example of a </span><a data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spin-off_%28media%29" title="Spin-off (media)"><span data-dcnode-id="1211" instrument_node="">spin-off</span></a><span data-dcnode-id="1209" instrument_node="">.
</span></p><p data-dcnode-id="1189"><span data-dcnode-id="1207" instrument_node="">In the fictional world of the </span><i data-dcnode-id="1204"><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toy_Story" title="Toy Story"><span data-dcnode-id="1206" instrument_node="">Toy Story</span></a></i><span data-dcnode-id="1203" instrument_node=""> movies, </span><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buzz_Lightyear" title="Buzz Lightyear"><span data-dcnode-id="1202" instrument_node="">Buzz Lightyear</span></a><span data-dcnode-id="1200" instrument_node=""> is an animated toy action figure, which was based on a fictitious cartoon series, </span><i data-dcnode-id="1197"><a data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buzz_Lightyear_of_Star_Command" title="Buzz Lightyear of Star Command"><span data-dcnode-id="1199" instrument_node="">Buzz Lightyear of Star Command</span></a></i><span data-dcnode-id="1196" instrument_node="">, which did not exist in the real world except for snippets seen within </span><i data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Toy Story</span></i><span data-dcnode-id="1193" instrument_node="">. Later, </span><i data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Buzz Lightyear of Star Command</span></i><span data-dcnode-id="1190" instrument_node=""> was produced in the real world.
</span></p><p data-dcnode-id="1180"><i data-dcnode-id="1186"><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kujibiki_Unbalance" title="Kujibiki Unbalance"><span data-dcnode-id="1188" instrument_node="">Kujibiki Unbalance</span></a></i><span data-dcnode-id="1185" instrument_node="">, a series in the </span><i data-dcnode-id="1182"><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genshiken" title="Genshiken"><span data-dcnode-id="1184" instrument_node="">Genshiken</span></a></i><span data-dcnode-id="1181" instrument_node=""> universe, has spawned merchandise of its own, and been remade into a series on its own.
</span></p><p data-dcnode-id="1162"><span data-dcnode-id="1179" instrument_node="">Such spin-offs may be produced as a way of providing additional information on the fictional world for fans. In the </span><i data-dcnode-id="1176"><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_Potter" title="Harry Potter"><span data-dcnode-id="1178" instrument_node="">Harry Potter</span></a></i><span data-dcnode-id="1175" instrument_node=""> series, three such supplemental books have been produced. </span><i data-dcnode-id="1172"><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fantastic_Beasts_and_Where_to_Find_Them" title="Fantastic Beasts and Where to Find Them"><span data-dcnode-id="1174" instrument_node="">Fantastic Beasts and Where to Find Them</span></a></i><span data-dcnode-id="1171" instrument_node=""> is a textbook used by the main character, and </span><i data-dcnode-id="1168"><a data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quidditch_Through_the_Ages" title="Quidditch Through the Ages"><span data-dcnode-id="1170" instrument_node="">Quidditch Through the Ages</span></a></i><span data-dcnode-id="1167" instrument_node=""> is a book from the library at his school. </span><i data-dcnode-id="1164"><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Tales_of_Beedle_the_Bard" title="The Tales of Beedle the Bard"><span data-dcnode-id="1166" instrument_node="">The Tales of Beedle the Bard</span></a></i><span data-dcnode-id="1163" instrument_node=""> provides an additional layer of fiction, the 'tales' being instructional stories told to children in the characters' world.
</span></p><p data-dcnode-id="1144"><span data-dcnode-id="1161" instrument_node="">In the works of </span><a data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurt_Vonnegut" title="Kurt Vonnegut"><span data-dcnode-id="1160" instrument_node="">Kurt Vonnegut</span></a><span data-dcnode-id="1158" instrument_node="">, </span><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kilgore_Trout" title="Kilgore Trout"><span data-dcnode-id="1157" instrument_node="">Kilgore Trout</span></a><span data-dcnode-id="1155" instrument_node=""> has written a novel called </span><i data-dcnode-id="1152"><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venus_on_the_Half-Shell" title="Venus on the Half-Shell"><span data-dcnode-id="1154" instrument_node="">Venus on the Half-Shell</span></a></i><span data-dcnode-id="1151" instrument_node="">. In 1975 real-world author </span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philip_Jos%25C3%25A9_Farmer" title="Philip José Farmer"><span data-dcnode-id="1150" instrument_node="">Philip José Farmer</span></a><span data-dcnode-id="1148" instrument_node=""> wrote a science-fiction novel called </span><i data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Venus on the Half-Shell</span></i><span data-dcnode-id="1145" instrument_node="">, published under the name Kilgore Trout.
</span></p><p data-dcnode-id="1121"><span data-dcnode-id="1143" instrument_node="">In </span><i data-dcnode-id="1140"><a data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homestuck" title="Homestuck"><span data-dcnode-id="1142" instrument_node="">Homestuck</span></a></i><span data-dcnode-id="1139" instrument_node=""> by </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Hussie" title="Andrew Hussie"><span data-dcnode-id="1138" instrument_node="">Andrew Hussie</span></a><span data-dcnode-id="1136" instrument_node="">, there is a comic called </span><a class="mw-redirect" data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sweet_Bro_and_Hella_Jeff" title="Sweet Bro and Hella Jeff"><span data-dcnode-id="1135" instrument_node="">Sweet Bro and Hella Jeff</span></a><span data-dcnode-id="1133" instrument_node="">, created by one of the characters, Dave Strider. It was later adapted to its own ongoing series. Similarly, the popular </span><i data-dcnode-id="1130"><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dog_Man" title="Dog Man"><span data-dcnode-id="1132" instrument_node="">Dog Man</span></a></i><span data-dcnode-id="1129" instrument_node=""> series of children's graphic novels is presented as a creation of the main characters of author </span><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dav_Pilkey" title="Dav Pilkey"><span data-dcnode-id="1128" instrument_node="">Dav Pilkey</span></a><span data-dcnode-id="1126" instrument_node="">'s earlier series, </span><i data-dcnode-id="1123"><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Captain_Underpants" title="Captain Underpants"><span data-dcnode-id="1125" instrument_node="">Captain Underpants</span></a></i><span data-dcnode-id="1122" instrument_node="">.
</span></p><p data-dcnode-id="1107"><i data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Captain Proton: Defender of the Earth</span></i><span data-dcnode-id="1118" instrument_node="">, a story by </span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dean_Wesley_Smith" title="Dean Wesley Smith"><span data-dcnode-id="1117" instrument_node="">Dean Wesley Smith</span></a><span data-dcnode-id="1115" instrument_node="">, was adapted from the holonovel </span><i data-dcnode-id="1112"><a class="mw-redirect" data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Captain_Proton" title="Captain Proton"><span data-dcnode-id="1114" instrument_node="">Captain Proton</span></a></i><span data-dcnode-id="1111" instrument_node=""> in the </span><a data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_Trek" title="Star Trek"><span data-dcnode-id="1110" instrument_node="">Star Trek</span></a><span data-dcnode-id="1108" instrument_node=""> universe.
</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1106" instrument_node="">In the animated online franchise </span><i data-dcnode-id="1103"><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homestar_Runner" title="Homestar Runner"><span data-dcnode-id="1105" instrument_node="">Homestar Runner</span></a></i><span data-dcnode-id="1102" instrument_node=""> many of the best-known features were spun off from each other. The best known was "Strong Bad Emails," which depicted the villain of the original story giving snarky answers to fan emails, but that in turn spawned several other long-running features which started out as figments of Strong Bad's imagination, including the teen-oriented cartoon parody "Teen Girl Squad" and the anime parody "20X6."
</span></p><p data-dcnode-id="1085"><span data-dcnode-id="1100" instrument_node="">One unique example is the </span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tyler_Perry" title="Tyler Perry"><span data-dcnode-id="1099" instrument_node="">Tyler Perry</span></a><span data-dcnode-id="1097" instrument_node=""> comedy/horror hit </span><i data-dcnode-id="1094"><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boo%21_A_Madea_Halloween" title="Boo! A Madea Halloween"><span data-dcnode-id="1096" instrument_node="">Boo! A Madea Halloween</span></a></i><span data-dcnode-id="1093" instrument_node=""> which originated as a parody of Tyler Perry films in the </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chris_Rock" title="Chris Rock"><span data-dcnode-id="1092" instrument_node="">Chris Rock</span></a><span data-dcnode-id="1090" instrument_node=""> film </span><i data-dcnode-id="1087"><a class="mw-redirect" data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Top_5" title="Top 5"><span data-dcnode-id="1089" instrument_node="">Top 5</span></a></i><span data-dcnode-id="1086" instrument_node="">.
</span></p><span data-dcnode-id="1084" instrument_node="">
