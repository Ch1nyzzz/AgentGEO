            </span></h2><span data-dcnode-id="3052" instrument_node="">
</span></div><span data-dcnode-id="3050" instrument_node="">
</span></div><span data-dcnode-id="3048" instrument_node="">
</span><div class="article__body__section" data-dcnode-id="2503"><span data-dcnode-id="3047" instrument_node="">
</span><p data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">An indie film can be considered “independent” for many reasons. Generally speaking, there is no major film studio attached and no executive producers telling you what you can or cannot shoot. That means budgets typically range from modest ($100,000 to $20 million) to shoestring ($10)—but the story also has space to challenge the systematic Hollywood movie formula.</span></p><span data-dcnode-id="3044" instrument_node="">
</span><p data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">As a filmmaker, working outside the studio system can allow you to focus solely on the story you’d like to tell. An indie film can be a great way to showcase your talent; you can use it as a calling card as your career advances.</span></p><div data-dcnode-id="3034" id="article__cta__text"><div class="article__cta" data-dcnode-id="3035"><h4 class="article__cta__header" data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">Get Cast Today</span></h4><div class="article__cta__text" data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Gain access to the best platform for performers and build your career on Backstage.</span></div><a class="btn-blue-lg" data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.backstage.com/subscribe/" type="button"><span data-dcnode-id="3037" instrument_node="">Join Now</span></a></div></div><span data-dcnode-id="3033" instrument_node="">

</span><a data-dcnode-id="2488" name="section1"></a><span data-dcnode-id="2487" instrument_node="">
</span><h2 data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">
                
                How do I secure funding?
                
            </span></h2><span data-dcnode-id="2484" instrument_node="">
</span></div><span data-dcnode-id="2482" instrument_node="">
</span></div><span data-dcnode-id="2480" instrument_node="">
</span><div class="article__body__section" data-dcnode-id="2391"><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2473"><span data-dcnode-id="2478" instrument_node="">Grants are a good place to begin looking for funding. No Film School compiles a</span><span data-dcnode-id="2475" style="text-decoration: underline;"><a data-dcnode-id="2476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nofilmschool.com/massive-list-spring-2020-grants-all-filmmakers-should-know-about" rel="noopener" target="_blank"><span data-dcnode-id="2477" instrument_node="">&nbsp;seasonal list of grants</span></a></span><span data-dcnode-id="2474" instrument_node=""> available to filmmakers; check back to see what’s new. You’ll also want to consider the following:</span></p><span data-dcnode-id="2472" instrument_node="">
</span><p data-dcnode-id="2463"><strong data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">1. Find a financial producer.</span></strong><br data-dcnode-id="2469"><span data-dcnode-id="2468" instrument_node="">“I remember coming up to [producer Celine Rattray] at a cocktail party long before I’d even had an idea,” </span><span data-dcnode-id="2465" style="text-decoration: underline;"><a data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.backstage.com/interview/3-writing-tips-make-producers-want-fund-your-film/" rel="noopener" target="_blank"><span data-dcnode-id="2467" instrument_node="">“Novitiate” director Maggie Betts tells Backstage</span></a></span><span data-dcnode-id="2464" instrument_node="">. “She gave me three pieces of advice, which ended up being the foundation of [‘Novitiate’]. One was to make it about a completely novel world that people had not seen before. Two was to try and keep the locations super-contained because a lot of directors get overwhelmed with company moves. The tighter your location situation, the better. And then the last was to write an insanely good part for an actress over 45, preferably over 50, because sadly, that group of women does not get the level of material that other women get.”</span></p><span data-dcnode-id="2462" instrument_node="">
</span><p data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">Rattray’s advice is great for anyone looking to tick an indie producer’s boxes: an original idea that doesn’t feel like a sprawling (read: expensive) epic.</span></p><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Do your homework. Find out who produces the types of films you’d like to make, as well as who their competitors are. Even if the production company is unlikely to take on a first-time filmmaker, it’ll give you a goal to work toward.</span></p><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Regardless of who you find to finance your film, if you’re going to ask a professional for support, you need an investment package to present to them: A PDF document outlining your film idea, consisting of a two-sentence pitch, a short synopsis, and detailed treatment of your story. You need a budget, too, outlining where every dollar will go. This doesn’t need to be 100 percent accurate, but as ballpark as possible. You should also break down your characters, locations, and crew. All this gives the investor the look and feel of the project. Keep it short and sweet.</span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2447"><strong data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">2. Save some personal money.</span></strong><span data-dcnode-id="2450" instrument_node=""> </span><br data-dcnode-id="2449"><span data-dcnode-id="2448" instrument_node="">If you really want this then you’ll stay home a few weekends in order to raise some funds for your first indie film. Recognize this for the commitment it is, because chances are you will be working on this film for the next year, at least.</span></p><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2441"><strong data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">3. Call on friends and family.</span></strong><br data-dcnode-id="2443"><span data-dcnode-id="2442" instrument_node="">Ask your family for some cash to start your project instead of gifts for special occasions (no more birthday presents for now). Assuming this is your first legitimate film project, you probably won’t have past work to show how talented you are—so finding cold investors might be hard.</span></p><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2435"><strong data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">4. Crowdfund.</span></strong><br data-dcnode-id="2437"><span data-dcnode-id="2436" instrument_node="">Beware that this route might end up creating more work for you in the end. Consider this option once you finish your film and need to raise money to submit to festivals, which will cost you a pretty penny if you’re trying to hit first-tier internationals, not to mention national or regional festivals.</span></p><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2430"><span data-dcnode-id="2433" instrument_node="">If you do decide to crowdfund, make sure to keep your incentives for</span><br data-dcnode-id="2432"><span data-dcnode-id="2431" instrument_node="">donating exciting. Examples include access to a personal production journal or Skype meetings where you let funders pick your brain about filmmaking. Make a cool poster that you can send and autograph once the film is completed.</span></p><span data-dcnode-id="2429" instrument_node="">
</span><p data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Remember to give regular updates on your project; no one likes an unresponsive artist. Think of it this way: Technically, these people are paying you (and so we walk the line of what it means to be truly “independent”).</span></p><span data-dcnode-id="2426" instrument_node="">
</span><p data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">Once all’s said and done, don’t forget to shout out your backers and thank them for supporting you on all your social media channels.</span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">As an indie filmmaker, I’ve used Kickstarter and Indiegogo. Personally, I prefer Kickstarter. It provides a bigger network and more deeply engaged community. Seed&amp;Spark is great, too: The platform is more specific to the film and indie film community, meaning you can trade goods and services, like equipment and line producer work, instead of just fronting cash.</span></p><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">RELATED:</span></p><span data-dcnode-id="2417" instrument_node="">

</span><div class="section_ad__container" data-dcnode-id="2386" id="1"></div><span data-dcnode-id="2385" instrument_node="">

</span><div class="article__body__header" data-dcnode-id="2371"><span data-dcnode-id="2377" instrument_node="">
</span><a data-dcnode-id="2376" name="section2"></a><span data-dcnode-id="2375" instrument_node="">
</span><h2 data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">
                
                Where do I start?
                
            </span></h2><span data-dcnode-id="2372" instrument_node="">
</span></div><span data-dcnode-id="2370" instrument_node="">
</span></div><span data-dcnode-id="2368" instrument_node="">
</span><div class="article__body__section" data-dcnode-id="2231"><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2364"><strong data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">You’ll want to start work on your indie film with a script, budget, and classes.</span></strong></p><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2357"><span data-dcnode-id="2360" style="text-decoration: underline;"><strong data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">SCRIPT</span></strong></span><br data-dcnode-id="2359"><span data-dcnode-id="2358" instrument_node="">There is no film without a great script. To get your hands on one, you have two options: You’ll either have to write your own script and get it in front of close friends and industry people (if you know any) for opinions, or you’ll have to find one.</span></p><span data-dcnode-id="2356" instrument_node="">
</span><p data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">If you write it, don’t be worried about letting too many people see it for fear of them stealing your idea. You want as many opinions about your work as you can get to put it all in perspective. When you’re near completion and feel confident about where the script is, be sure to organize a reading to hear it out loud. You’d be surprised by what works on paper and what doesn’t when put on its feet.</span></p><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2339"><span data-dcnode-id="2352" instrument_node="">To figure out what makes a great script, try reading screenplays of your favorite movies and studying them. </span><span data-dcnode-id="2349" style="text-decoration: underline;"><a data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imsdb.com/" rel="noopener" target="_blank"><span data-dcnode-id="2351" instrument_node="">IMSDb</span></a></span><span data-dcnode-id="2348" instrument_node=""> is a great resource and includes screenplays ranging from Oscar winners (</span><span data-dcnode-id="2345" style="text-decoration: underline;"><a data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imsdb.com/Movie%2520Scripts/Revenant%2C%2520The%2520Script.html" rel="noopener" target="_blank"><span data-dcnode-id="2347" instrument_node="">“The Revenant”</span></a></span><span data-dcnode-id="2344" instrument_node="">) to the classics (</span><span data-dcnode-id="2341" style="text-decoration: underline;"><a data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imsdb.com/Movie%2520Scripts/Sunset%2520Blvd.%2520Script.html" rel="noopener" target="_blank"><span data-dcnode-id="2343" instrument_node="">“Sunset Boulevard”</span></a></span><span data-dcnode-id="2340" instrument_node="">).</span></p><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2335" style="text-decoration: underline;"><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scriptmag.com/" rel="noopener" target="_blank"><span data-dcnode-id="2337" instrument_node="">Script Magazine</span></a></span><span data-dcnode-id="2334" instrument_node=""> is a good resource for learning the basics of scriptwriting. Once you feel confident enough to put the figurative pen to paper, sign up to </span><span data-dcnode-id="2331" style="text-decoration: underline;"><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.celtx.com/index.html" rel="noopener" target="_blank"><span data-dcnode-id="2333" instrument_node="">Celtx</span></a></span><span data-dcnode-id="2330" instrument_node="">, a great tool for writing in proper screenplay format, for a free subscription.</span></p><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2318"><span data-dcnode-id="2327" instrument_node="">If you’re looking for a good script instead, try sourcing writers from websites like </span><span data-dcnode-id="2324" style="text-decoration: underline;"><a data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blcklst.com/" rel="noopener" target="_blank"><span data-dcnode-id="2326" instrument_node="">The Black List</span></a></span><span data-dcnode-id="2323" instrument_node=""> or </span><span data-dcnode-id="2320" style="text-decoration: underline;"><a data-dcnode-id="2321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inktip.com/" rel="noopener" target="_blank"><span data-dcnode-id="2322" instrument_node="">InkTip</span></a></span><span data-dcnode-id="2319" instrument_node="">. Keep in mind, though, that as a filmmaker, you may need to buy the script or at least be able to provide proof of a decent budget to make that story come to life.</span></p><span data-dcnode-id="2317" instrument_node="">
</span><p data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Source from your close networks, too. We all have a friend with an amazing story or know someone with the writing chops to help you tell a screen-worthy tale. Finally, don’t forget to tap into college students and creative writing MFA programs for hidden gems.</span></p><span data-dcnode-id="2314" instrument_node="">
</span><p data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">When looking for the sort of film that would suit a first-time indie filmmaker, remember to keep locations, characters, and effects to a minimum. Special locations require money (or, at the very least, a knowledge of guerrilla filmmaking techniques). More actors means more expenses, and fancy camera movements that require a jib or a Steadicam could take a decent chunk out of your budget. Keep things simple. You can’t imagine how many indie films with fancy camera work but dull stories that exist.</span></p><span data-dcnode-id="2311" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">When analyzing the scenes you want to shoot, think of the camera as a conductor for emotion. What view of your subject evokes the feeling you want? Does that feeling grow when you move the camera, or is it more powerful to be still? You have to ask yourself all these questions for every second of your story.</span></p><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Above all else, the story needs to be captivating and interesting. Ask yourself, what makes this story different, why does this need to be made now? Can you live with this story for one to two years?</span></p><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2304" instrument_node="">Checking out some great films that take place in one location could spark your imagination. </span><span data-dcnode-id="2301" style="text-decoration: underline;"><a data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0050083/%3Fref_%3Dnv_sr_1" rel="noopener" target="_blank"><span data-dcnode-id="2303" instrument_node="">“12 Angry Men,”</span></a></span><span data-dcnode-id="2300" instrument_node=""> </span><span data-dcnode-id="2297" style="text-decoration: underline;"><a data-dcnode-id="2298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0068278/" rel="noopener" target="_blank"><span data-dcnode-id="2299" instrument_node="">“The Bitter Tears of Petra von Kant,”</span></a></span><span data-dcnode-id="2296" instrument_node=""> and </span><span data-dcnode-id="2293" style="text-decoration: underline;"><a data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt4062536/%3Fref_%3Dfn_al_tt_1" rel="noopener" target="_blank"><span data-dcnode-id="2295" instrument_node="">“Green Room”</span></a></span><span data-dcnode-id="2292" instrument_node=""> are good examples of what one can do with four walls, a bit of creativity, and a desire to show rather than tell.</span></p><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2279"><span data-dcnode-id="2285" style="text-decoration: underline;"><strong data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">BUDGET</span></strong><span data-dcnode-id="2287" instrument_node=""> </span><br data-dcnode-id="2286"></span><span data-dcnode-id="2284" instrument_node="">Once you’ve got the story you want to tell, it’s time to figure out what it’s going to take to do it well. Be prepared to map out where every dollar will go. This will help you figure out what camera equipment and lenses you can and can’t afford, what you’ll need to make necessary camera movements, and which lights you’ll need to add depth to your shots. You’ll also need to consider how much money to put aside for actors’ contracts, like </span><span data-dcnode-id="2281" style="text-decoration: underline;"><a data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sagaftra.org/production-center/contract/813/getting-started" rel="noopener" target="_blank"><span data-dcnode-id="2283" instrument_node="">SAG-AFTRA’s Low Budget Agreement</span></a></span><span data-dcnode-id="2280" instrument_node="">, how much you need for insurance for your production, plus postproduction. Don’t forget you’ll have to edit, color, and sound mix the final cut.</span></p><span data-dcnode-id="2278" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">Unless this is your own camera, your actors are close (nonunion) friends, and you’re stealing all your shots, be prepared to get insurance. Not only will it help you should anything go wrong, it also has the potential to give you access to locations; people feel better when they’re sure they won’t he held liable for any mistake.</span></p><span data-dcnode-id="2275" instrument_node="">
</span><p data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Murphy’s law states that something will go wrong at some point in time, so be prepared. Have an emergency stash of contingency money for unforeseen expenses. I’ve had producers throw someone $40 to let us shoot on their property. (I’ve also had producers look the other way when we had to steal a shot.)</span></p><span data-dcnode-id="2272" instrument_node="">
</span><p data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Be sure to save money for festival costs, too. What’s the point of making a film no one’s going to see?</span></p><div class="section section--ad" data-dcnode-id="2269" id="ads__container_article_0"></div><span data-dcnode-id="2268" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">When it comes to treating your cast and crew right, be sure to have decent food on set—that’s not pizza. Also, consider paying for their transportation. Keep in mind that some people have regular jobs and other priorities, so always ask for availability before locking anyone in. Especially since you’re probably pulling a lot of favors right now, treat everyone with extra respect. Directing is about being a good leader and maintaining good energy on production, and that’s never more true than on an indie film set.</span></p><span data-dcnode-id="2265" instrument_node="">
</span><p data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">If you don’t have a good producer helping you with all this, keeping organized is that much more important.</span></p><span data-dcnode-id="2262" instrument_node="">
</span><p data-dcnode-id="2253"><span data-dcnode-id="2261" instrument_node="">Once you’ve tallied up the costs, provide a breakdown both for yourself and any investors you’ve picked up along the way to get a clear picture of the financial commitment that needs to be made for this to work.</span><br data-dcnode-id="2260"><br data-dcnode-id="2259"><span data-dcnode-id="2256" style="text-decoration: underline;"><strong data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">CLASSES</span></strong></span><br data-dcnode-id="2255"><span data-dcnode-id="2254" instrument_node="">Most of the inspiration you need is already on film, so start watching how the masters tell their stories and begin to formulate your own voice.</span></p><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">RELATED:</span></p><span data-dcnode-id="2249" instrument_node="">
</span><ul data-dcnode-id="2239"><span data-dcnode-id="2248" instrument_node="">
</span><li data-dcnode-id="2245"><a data-dcnode-id="2246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.backstage.com/magazine/article/need-know-making-indie-film-756/" rel="noopener" target="_blank"><span data-dcnode-id="2247" instrument_node="">What You Need to Know About Making an Indie Film</span></a></li><span data-dcnode-id="2244" instrument_node="">
</span><li data-dcnode-id="2241"><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.backstage.com/advice-for-actors/backstage-experts/8-tips-becoming-part-indie-film-community/" rel="noopener" target="_blank"><span data-dcnode-id="2243" instrument_node="">8 Tips for Becoming Part of the Indie Film Community</span></a></li><span data-dcnode-id="2240" instrument_node="">
</span></ul><span data-dcnode-id="2238" instrument_node="">

</span><div class="col-12" data-dcnode-id="2224"><span data-dcnode-id="2227" instrument_node="">
</span><div class="section_ad__container" data-dcnode-id="2226" id="2"></div><span data-dcnode-id="2225" instrument_node="">

</span><div class="article__list__header__wrap" data-dcnode-id="2209"><span data-dcnode-id="2218" instrument_node="">
</span><div class="article__body__header" data-dcnode-id="2211"><span data-dcnode-id="2217" instrument_node="">
</span><a data-dcnode-id="2216" name="section3"></a><span data-dcnode-id="2215" instrument_node="">
</span><h2 data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">
                
                What do I need to consider financially?
                
            </span></h2><span data-dcnode-id="2212" instrument_node="">
</span></div><span data-dcnode-id="2210" instrument_node="">
</span></div><span data-dcnode-id="2208" instrument_node="">
</span><div class="article__body__section" data-dcnode-id="2139"><span data-dcnode-id="2207" instrument_node="">
</span><p data-dcnode-id="2204"><strong data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">For an indie film, financially you need to consider equipment, crew, locations, and postproduction.</span></strong></p><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2200" style="text-decoration: underline;"><strong data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">EQUIPMENT</span></strong></span><br data-dcnode-id="2199"><span data-dcnode-id="2198" instrument_node="">Since technology has pretty much democratized filmmaking, there’s no reason why your films shouldn’t look good. Many prosumer cameras and DSLRs can produce images of a high enough caliber to look cinematic. With the right planning and a good cinematographer, you could easily shoot a feature film on an iPhone. As long as your indie film looks and feels like a “real movie,” you’ll be taken seriously. It’s also the minimum criteria for the project to be commercially viable.</span></p><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">If you can afford a Red or an Alexa camera, then do it! But don’t be discouraged by taking the Sony FS7 or Blackmagic URSA Mini Pro as second choices; even the Sony A7S II is a magical DSLR that’s very cheap but creates cinematic images—and it shoots in low light! Depending on how low-budget your indie is, you might not have lights and may want to consider shooting outside. If you need night scenes, a camera like the A7S II shoots in extremely low light.</span></p><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2187"><span data-dcnode-id="2190" style="text-decoration: underline;"><strong data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">CREW</span></strong></span><br data-dcnode-id="2189"><span data-dcnode-id="2188" instrument_node="">If you’re looking to build a skeleton crew of essentials, you need a director, a DP (director of photography), first AC (assistant camera), a producer, and sound recordist. These are the behind-the-scenes people who may wear multiple hats on an indie film production. If you have a larger budget—or you’re just that charismatic—you can bump your crew up by two production assistants, a first AD (assistant director), a grip, a makeup artist, an art director, and a script supervisor. Assigning one experienced person to each of these roles will only enhance the value of your production. Filmmaking is a collaborative process that cannot be done alone. Keep in mind that you will need references for your crew, so start getting mood boards together.</span></p><span data-dcnode-id="2186" instrument_node="">
</span><p data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">If you can’t hire these crew members, analyze the scenes in your film and think about what the compositions will look like, what the texture of the room will be, and where the light is coming from. These little details will go a long way to figuring out who is absolutely necessary for your crew.</span></p><span data-dcnode-id="2183" instrument_node="">
</span><p data-dcnode-id="2177"><span data-dcnode-id="2180" style="text-decoration: underline;"><strong data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">LOCATIONS</span></strong></span><br data-dcnode-id="2179"><span data-dcnode-id="2178" instrument_node="">When you were graduating high school and looking at colleges, you went to visit the campus, right? Then you know the importance of seeing a place before investing yourself. The same goes for location scouting. If you can afford a fancy locations manager, or you’re lucky and your friend does it for a living, then use them! They’ve probably seen hundreds of different locations for various types of scenes, and can give you tips on where to get something special. If not, hop on public transportation—or get into your car—and go for an adventure. Look around for where your scenes could take place. Take pictures so you can reference them later and make a more informed choice. The worst thing is getting to set on a location you’ve never seen and being on the clock to learn on the fly. Suc</span></p><span data-dcnode-id="2176" instrument_node="">
</span><p data-dcnode-id="2172"><span data-dcnode-id="2175" instrument_node="">cess in directing comes from complex preplanning, then simple execution. </span><br data-dcnode-id="2174"><span data-dcnode-id="2173" instrument_node="">If you find a suitable location, such as a deli or a shoe store, try going in and talking to the business owner. If he or she is not available, it’ll likely be harder to get permission to film on the premises, but do the right thing and ask first. People can be accommodating. If they’re not willing to do it for free, see what you can offer out of your contingency budget. If you’re renting a place, talk to the coordinator in charge and plan in advance. Always do your research beforehand. Not only will it settle your mind, it’ll make everything on the day go much smoother and show your cast and crew they’re in good hands.</span></p><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2168" style="text-decoration: underline;"><strong data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">POSTPRODUCTION</span></strong></span><br data-dcnode-id="2167"><span data-dcnode-id="2166" instrument_node="">After all that lead-up, you shoot film and get great shots for an awesome story—but it will still cost money to complete. Do everything in your power to pay for a picture editor and a sound editor/mixer. Don’t do it yourself, especially if you don’t have experience. The picture will suffer. Even if you can’t pay much, some editors are willing to negotiate for a good project and a passionate director.</span></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Once the final product is locked, you will have to consider your festival route. Maybe your leftover budget allows you to hire a publicist (with programmer connections) to carve a path for your film. Since they do this for a living, they might know the tastes of programmers and have access to their ear.</span></p><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2160" instrument_node="">If you do land your film at a festival, and your budget allows, you might be able to fly out your actors to that festival. Best-case scenario, you land a distributor and need to create assets like trailers, posters, still images from set, closed captions, subtitles, various formats of your film, a 5.1 sound mix, audio stems, and music licenses. </span><br data-dcnode-id="2159"><span data-dcnode-id="2158" instrument_node="">Throughout this whole process, never discount the power of social media. Pull sound bites from your film to promote it. The work may never end if you land a deal, but that’s a good problem to have!</span></p><span data-dcnode-id="2156" instrument_node="">
</span><p data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">RELATED:</span></p><span data-dcnode-id="2153" instrument_node="">
</span><ul data-dcnode-id="2147"><span data-dcnode-id="2152" instrument_node="">
</span><li data-dcnode-id="2149"><a data-dcnode-id="2150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.backstage.com/backstage-guides/everyone-you-should-know-set/" rel="noopener" target="_blank"><span data-dcnode-id="2151" instrument_node="">Everyone You Should Know on Set</span></a></li><span data-dcnode-id="2148" instrument_node="">

</span><div class="col-12" data-dcnode-id="2132"><span data-dcnode-id="2135" instrument_node="">
</span><div class="section_ad__container" data-dcnode-id="2134" id="3"></div><span data-dcnode-id="2133" instrument_node="">
</span></div><span data-dcnode-id="2131" instrument_node="">
</span></div><span data-dcnode-id="2129" instrument_node="">

</span><div class="article__list__header__wrap" data-dcnode-id="2117"><span data-dcnode-id="2126" instrument_node="">
</span><div class="article__body__header" data-dcnode-id="2119"><span data-dcnode-id="2125" instrument_node="">
</span><a data-dcnode-id="2124" name="section4"></a><span data-dcnode-id="2123" instrument_node="">
</span><h2 data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">
                
                How do I find my cast?
                
            </span></h2><span data-dcnode-id="2120" instrument_node="">
</span></div><span data-dcnode-id="2118" instrument_node="">
</span></div><span data-dcnode-id="2116" instrument_node="">
</span><div class="article__body__section" data-dcnode-id="1531"><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2112"><strong data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">To find your cast for your indie film, you can hire a casting director or use a resource like Backstage to cast it yourself.</span></strong></p><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">While in preproduction, your characters should always be on your mind. If the budget allows for a casting director, it’s worth hiring one. They do this for a living and are in constant contact with talent you may not have been able to find yourself or even have considered for a role.</span></p><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2103"><span data-dcnode-id="2107" instrument_node="">If you’re looking to cast your own project, </span><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.backstage.com/member-benefits/creators/" rel="noopener" target="_blank"><span data-dcnode-id="2106" instrument_node="">Backstage is a great resource for finding actors</span></a><span data-dcnode-id="2104" instrument_node="">. You can set parameters around age, gender, ethnicity, and location for each character and watch the submissions roll in. You can also peruse the talent database, and sort through headshots and demo reels to see if someone stands out.</span></p><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Speaking of someone standing out, you can also try the Andrea Arnold approach, director of “American Honey,” and ask a person who has caught your eye if they’re an actor. Arnold found her lead, Sasha Lane, on a beach in Florida. You could be as lucky!</span></p><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">You might also have a cousin or a friend who is the character you’re writing. If you do hire them, convey that you want them to be themselves, not a fictional character. Try talking to them normally but in the context of the scene. They may find themselves feeling more comfortable if they’re not trying to capital-A “Act.”</span></p><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2090"><span data-dcnode-id="2095" instrument_node="">If you find yourself working with SAG-AFTRA talent then you will need to make an account with the union and sign its </span><span data-dcnode-id="2092" style="text-decoration: underline;"><a data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sagaftra.org/production-center/contract/819/all-forms/document" rel="noopener" target="_blank"><span data-dcnode-id="2094" instrument_node="">Ultra Low Budget Agreement</span></a></span><span data-dcnode-id="2091" instrument_node="">. This grants you the ability to hire professional actors for $100 a day, a bargain that will elevate your production. Even if you plan to do an ultra low-budget or microbudget film, if you use union actors, your production company will need to become a SAG-AFTRA signatory. Be sure to leave at least three weeks to work on union paperwork and processing. Don’t expect them to work for you last minute!</span></p><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2088" instrument_node="">Ultimately, finding the right actors for your project can be a matter of thinking outside the box when it comes to potential resources. You want actors who are curious and able to ask smart questions about your inspiration and vision, release plans, budget, crew size, accommodations, and pay. “This may sound intrusive, but these are all pretty simple questions,” </span><span data-dcnode-id="2085" style="text-decoration: underline;"><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.backstage.com/advice-for-actors/backstage-experts/7-ways-make-most-your-indie-film-shoot/" rel="noopener" target="_blank"><span data-dcnode-id="2087" instrument_node="">as Backstage Expert David Patrick Green points out</span></a></span><span data-dcnode-id="2084" instrument_node="">. “And if someone can’t answer them, [actors may] find [themselves] in many versions of limbo—either one at a time or all at once.”</span></p><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">So reach out to drama programs and acting schools, use social media to message actors—use it all—and be prepared to answer questions up front.</span></p><span data-dcnode-id="2079" instrument_node="">

</span><h2 data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">
                
                How do I find my crew?
                
            </span></h2><span data-dcnode-id="1512" instrument_node="">
</span></div><span data-dcnode-id="1510" instrument_node="">
</span></div><span data-dcnode-id="1508" instrument_node="">
</span><div class="article__body__section" data-dcnode-id="1460"><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1504"><strong data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Word of mouth is a powerful thing in the film world. Know whom you definitely need in your crew, who would be nice to have (budget permitting), and whom you can do without.</span></strong></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1502" instrument_node="">If you’re plugged into a film network, just start asking your friends. Have a description of the rate (if any), the hours, location, and a synopsis of the project all ready to show when asked. If you’ve tapped out your network, or are still working on building one, Mandy, </span><span data-dcnode-id="1499" style="text-decoration: underline;"><a data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//crewscontrol.com/" rel="noopener" target="_blank"><span data-dcnode-id="1501" instrument_node="">Crews Control</span></a></span><span data-dcnode-id="1498" instrument_node="">, and </span><span data-dcnode-id="1495" style="text-decoration: underline;"><a data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.productionhub.com/directory" rel="noopener" target="_blank"><span data-dcnode-id="1497" instrument_node="">ProductionHUB</span></a></span><span data-dcnode-id="1494" instrument_node=""> are all places to look for crew members.</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1491" instrument_node="">“Great directors hire great crew,” </span><span data-dcnode-id="1488" style="text-decoration: underline;"><a data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.backstage.com/advice-for-actors/first-person/6-tips-getting-your-indie-film-made/" rel="noopener" target="_blank"><span data-dcnode-id="1490" instrument_node="">says filmmaker Liz W. Garcia</span></a></span><span data-dcnode-id="1487" instrument_node="">. “Great directors know that it isn’t their job to know everyone else’s job better than they do. Ask the experts. Ask your AD about the schedule. Ask your script supervisor what angle you haven’t gotten. Ask your producer if this scene is working the way it should. You are not an island.”</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">RELATED:&nbsp;</span></p><span data-dcnode-id="1482" instrument_node="">
</span><ul data-dcnode-id="1468"><span data-dcnode-id="1481" instrument_node="">
</span><li data-dcnode-id="1478"><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.backstage.com/magazine/article/production-crew-hiring-advice-resumes-70470/" rel="noopener" target="_blank"><span data-dcnode-id="1480" instrument_node="">What to Look for When Hiring a Production Crew</span></a></li><span data-dcnode-id="1477" instrument_node="">
</span><li data-dcnode-id="1474"><a data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.backstage.com/magazine/article/low-budget-production-crew-call-hiring-70468/" rel="noopener" target="_blank"><span data-dcnode-id="1476" instrument_node="">How to Attract + Hire the Best Crew for Your Low-Budget Production</span></a></li><span data-dcnode-id="1473" instrument_node="">
</span><li data-dcnode-id="1470"><a data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.backstage.com/magazine/article/low-budget-production-crew-members-70478/" rel="noopener" target="_blank"><span data-dcnode-id="1472" instrument_node="">The 10 People You Need on a Low-Budget Skeleton Crew</span></a></li><span data-dcnode-id="1469" instrument_node="">
</span></ul><span data-dcnode-id="1467" instrument_node="">
</span><div class="d-flex justify-content-end" data-dcnode-id="1462"><span data-dcnode-id="1466" instrument_node="">
</span><a class="article__body__section__top-link" data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/Njo5bdz3zEw"><span data-dcnode-id="1465" instrument_node="">
              ↑ Back to top
            </span></a><span data-dcnode-id="1463" instrument_node="">
</span></div><span data-dcnode-id="1461" instrument_node="">
</span></div><span data-dcnode-id="1459" instrument_node="">
</span><div class="section section--ad" data-dcnode-id="1449"><span data-dcnode-id="1458" instrument_node="">
</span><div class="row inner" data-dcnode-id="1451"><span data-dcnode-id="1457" instrument_node="">
</span><div class="col-12" data-dcnode-id="1453"><span data-dcnode-id="1456" instrument_node="">
</span><div class="section_ad__container" data-dcnode-id="1455" id="5"></div><span data-dcnode-id="1454" instrument_node="">
</span></div><span data-dcnode-id="1452" instrument_node="">
</span></div><span data-dcnode-id="1450" instrument_node="">
</span></div><span data-dcnode-id="1448" instrument_node="">
</span><div class="article__list__header__wrap" data-dcnode-id="1438"><span data-dcnode-id="1447" instrument_node="">
</span><div class="article__body__header" data-dcnode-id="1440"><span data-dcnode-id="1446" instrument_node="">
</span><a data-dcnode-id="1445" name="section6"></a><span data-dcnode-id="1444" instrument_node="">
</span><h2 data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">
                
                How do I prepare for shoot days?
                
            </span></h2><span data-dcnode-id="1441" instrument_node="">
</span></div><span data-dcnode-id="1439" instrument_node="">
</span></div><span data-dcnode-id="1437" instrument_node="">
</span><div class="article__body__section" data-dcnode-id="1392"><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1433"><strong data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Make a production bible. This should have the script marked with notes, all locations with relevant information, contact information for cast and crew, scene breakdowns, character notes with wardrobe references, camera notes, shot references, the shot list, and your storyboard.</span></strong></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1431" instrument_node="">Lay out your production in an organized manner. This </span><span data-dcnode-id="1428" style="text-decoration: underline;"><a data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nofilmschool.com/2018/02/shot-lists-and-script-lining-how-prepare-your-screenplay-shoot" rel="noopener" target="_blank"><span data-dcnode-id="1430" instrument_node="">article</span></a></span><span data-dcnode-id="1427" instrument_node=""> from No Film School is a great resource for preshoot prep.</span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Storyboarding is essential, as it helps you visualize the movie and articulate camera movement to the cinematographer and to yourself. It will also help you do the blocking, or movement layout, of the scene, and help you plan your camera location, the lights you’ll need, and how your actors will move within the space. Going through a shot list is the next important step, as it will also help you discern what kind of equipment you will need to get each shot, and explore creative options around any expensive rigs or other rented equipment you may only have a limited time with.</span></p><div class="section section--ad" data-dcnode-id="1422" id="ads__container_article_1"></div><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Next up is a shooting schedule that will help you time your scene executions. You must go over this schedule with your DP. They’ll be able tell you how much time they will need to set up lights and rigs, as well as how long it will take to break down the equipment after; be sure to include this in your timing for the day. If time permits, set up a walk-through with your DP on set. When it comes to filming, a safe time allotment for an indie film is about two and a half hours per scene. That time will fly, so if schedules allow, take time beforehand to rehearse with your cast and work on the lines. You really get to sculpt the characters here.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">If you’re smart, you will also have the sun’s schedule and weather predictions on hand for your shoot day. You don’t want to make the mistake of getting caught in a storm, especially if you’re working outdoors or are relying heavily on natural light.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Touch base with all your cast members, and make sure they know what wardrobe to bring if they are providing their own. Give everyone detailed instructions on how to get to set if you can’t provide shuttle cars. If you can, book a friend to do all the driving when needed. If you’re ordering food, make sure to place the order at least a day or two in advance. Not every restaurant can accommodate a large last-minute order, and the last thing you want to be focused on during shoot day is where to order from when you’ve got a cast member who’s gluten-free, another who has a severe nut allergy, and another who’s vegetarian. Be sure to ask for any food restrictions you should be aware of before placing the order.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Touch base with your sound recorder as well, and go over the scenes with them so they can figure out what sound gear is needed. Also be sure you’re able to explain what the sound is like at the location. The more information your sound person knows, the better they will be prepared to cover your back!</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1408" instrument_node="">If you’re lucky enough to snag permits to shoot on a city street and have “No Parking” signs to post, place them on the street poles the night before. You can use </span><span data-dcnode-id="1405" style="text-decoration: underline;"><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www1.nyc.gov/site/mome/permits/permits.page" rel="noopener" target="_blank"><span data-dcnode-id="1407" instrument_node="">this guide</span></a></span><span data-dcnode-id="1404" instrument_node=""> for getting permits.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">This brings us to a holding area for your cast. Assuming you won’t be able to provide them with trailers, figure out where they can stay when they’re not needed on set. You’ll need a designated space, probably where the food or craft services is stationed, for your cast and crew to rest.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><div class="d-flex justify-content-end" data-dcnode-id="1394"><span data-dcnode-id="1398" instrument_node="">
</span><a class="article__body__section__top-link" data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/Njo5bdz3zEw"><span data-dcnode-id="1397" instrument_node="">
              ↑ Back to top
            </span></a><span data-dcnode-id="1395" instrument_node="">
</span></div><span data-dcnode-id="1393" instrument_node="">
</span></div><span data-dcnode-id="1391" instrument_node="">
</span><div class="section section--ad" data-dcnode-id="1381"><span data-dcnode-id="1390" instrument_node="">
</span><div class="row inner" data-dcnode-id="1383"><span data-dcnode-id="1389" instrument_node="">
</span><div class="col-12" data-dcnode-id="1385"><span data-dcnode-id="1388" instrument_node="">
</span><div class="section_ad__container" data-dcnode-id="1387" id="6"></div><span data-dcnode-id="1386" instrument_node="">
</span></div><span data-dcnode-id="1384" instrument_node="">
</span></div><span data-dcnode-id="1382" instrument_node="">
</span></div><span data-dcnode-id="1380" instrument_node="">
</span><div class="article__list__header__wrap" data-dcnode-id="1370"><span data-dcnode-id="1379" instrument_node="">
</span><div class="article__body__header" data-dcnode-id="1372"><span data-dcnode-id="1378" instrument_node="">
</span><a data-dcnode-id="1377" name="section7"></a><span data-dcnode-id="1376" instrument_node="">
</span><h2 data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">
                
                What should I expect on shoot days?
                
            </span></h2><span data-dcnode-id="1373" instrument_node="">
</span></div><span data-dcnode-id="1371" instrument_node="">
</span></div><span data-dcnode-id="1369" instrument_node="">
</span><div class="article__body__section" data-dcnode-id="1349"><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">You’re leading this expedition! Get a good night’s rest, wake up nice and early, accept the butterflies in your stomach, and eat a good breakfast. Get to set early for any walk-throughs and last-minute changes and generally to make sure things are running smoothly. It’s always a good idea to be the first one on set to greet your crew and cast.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Start the shoot on time. If you don’t have an assistant director to help you keep time, then set several alarms on your phone. This will help you keep track of how long you’ve been shooting a scene. Remember that you’re on the clock!</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Don’t be surprised when things don’t go as planned. You need to be able to think fast and to adapt; never panic. Keep the lunch hour to just that, and keep food and water at the ready. Sometimes you will run over time, but if you keep a good vibe on set, you might be able to get one or two hours of overtime. But don’t push it—read the room and get a gauge for everyone’s energy levels.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Ultimately, don’t take advantage of people who are working for you, especially if you have multiple shoot days with the same cast and crew. If you did the right amount of preproduction prep, all that’s left to do is execute the plan.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><div class="d-flex justify-content-end" data-dcnode-id="1351"><span data-dcnode-id="1355" instrument_node="">
</span><a class="article__body__section__top-link" data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/Njo5bdz3zEw"><span data-dcnode-id="1354" instrument_node="">
              ↑ Back to top
            </span></a><span data-dcnode-id="1352" instrument_node="">
</span></div><span data-dcnode-id="1350" instrument_node="">
</span></div><span data-dcnode-id="1348" instrument_node="">
</span><div class="section section--ad" data-dcnode-id="1338"><span data-dcnode-id="1347" instrument_node="">
</span><div class="row inner" data-dcnode-id="1340"><span data-dcnode-id="1346" instrument_node="">
</span><div class="col-12" data-dcnode-id="1342"><span data-dcnode-id="1345" instrument_node="">
</span><div class="section_ad__container" data-dcnode-id="1344" id="7"></div><span data-dcnode-id="1343" instrument_node="">
</span></div><span data-dcnode-id="1341" instrument_node="">
</span></div><span data-dcnode-id="1339" instrument_node="">
</span></div><span data-dcnode-id="1337" instrument_node="">
</span><div class="article__list__header__wrap" data-dcnode-id="1327"><span data-dcnode-id="1336" instrument_node="">
</span><div class="article__body__header" data-dcnode-id="1329"><span data-dcnode-id="1335" instrument_node="">
</span><a data-dcnode-id="1334" name="section8"></a><span data-dcnode-id="1333" instrument_node="">
</span><h2 data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">
                
                What should the final product look like?
                
            </span></h2><span data-dcnode-id="1330" instrument_node="">
</span></div><span data-dcnode-id="1328" instrument_node="">
</span></div><span data-dcnode-id="1326" instrument_node="">
</span><div class="article__body__section" data-dcnode-id="1311"><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1322"><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">The film needs to look as professional as possible.</span></strong></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">That’s why you budgeted and planned for postproduction. A dead giveaway for an amateur production is bad sound. Viewers can often forgive mediocre picture if the storyline is there, but sound that’s anything but crisp and clear will knock even the most cinematic footage down several pegs.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><div class="d-flex justify-content-end" data-dcnode-id="1313"><span data-dcnode-id="1317" instrument_node="">
</span><a class="article__body__section__top-link" data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/Njo5bdz3zEw"><span data-dcnode-id="1316" instrument_node="">
              ↑ Back to top
            </span></a><span data-dcnode-id="1314" instrument_node="">
</span></div><span data-dcnode-id="1312" instrument_node="">
</span></div><span data-dcnode-id="1310" instrument_node="">
</span><div class="section section--ad" data-dcnode-id="1300"><span data-dcnode-id="1309" instrument_node="">
</span><div class="row inner" data-dcnode-id="1302"><span data-dcnode-id="1308" instrument_node="">
</span><div class="col-12" data-dcnode-id="1304"><span data-dcnode-id="1307" instrument_node="">
</span><div class="section_ad__container" data-dcnode-id="1306" id="8"></div><span data-dcnode-id="1305" instrument_node="">
</span></div><span data-dcnode-id="1303" instrument_node="">
</span></div><span data-dcnode-id="1301" instrument_node="">
</span></div><span data-dcnode-id="1299" instrument_node="">
</span><div class="article__list__header__wrap" data-dcnode-id="1289"><span data-dcnode-id="1298" instrument_node="">
</span><div class="article__body__header" data-dcnode-id="1291"><span data-dcnode-id="1297" instrument_node="">
</span><a data-dcnode-id="1296" name="section9"></a><span data-dcnode-id="1295" instrument_node="">
</span><h2 data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">
                
                How do I approach postproduction?
                
            </span></h2><span data-dcnode-id="1292" instrument_node="">
</span></div><span data-dcnode-id="1290" instrument_node="">
</span></div><span data-dcnode-id="1288" instrument_node="">
</span><div class="article__body__section" data-dcnode-id="854"><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1284"><strong data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">If you are not an editor, and you still have money in your budget, don’t skimp on an editor, sound mixer, or colorist.</span></strong></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">A good editor is able to identify all the pieces of the puzzle. Either the editor or the assistant editor will organize all the footage and sync the raw video to the audio channels. They will outline each scene on a sequence, laid out by take. Then they will go through each take and make selects of the best ones.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">One option for organizing footage is to ask your editor to make a “to script” edit where they piece together the film according to the script.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Once you hit a certain number of hours in the editing room, you will start to get a feel for the beat of your film, notice any recurring motifs, or develop a transitional style that you like. You’ll be able to more clearly see the chemistry onscreen and start to swap out different takes in sequences. If you trust your editor, you don’t need to sit and rewatch all the footage with them. I personally like to sit with my editor through the take selections—it’s like watching dailies!</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">If you are an editor, then you’ll have done all this yourself and will be intimately familiar with each take and know what works best. This route isn’t an uncommon one, but as a filmmaker, you have to understand the benefits of getting a seasoned editor to look at your first draft. It’s a fresh pair of eyes on a story that you’ve likely been sitting with for months, if not years. Remember that film is meant to be collaborative, so consider bringing another creative mind to the table to fine-tune your sequence.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1270" instrument_node="">A sound mixer and designer will ensure your film sounds like a film should. They will level out volume on all the cuts and make sure there is consistency in the edit. Working with them is also your chance to start designing any sound effects you may need. Perhaps you want to emphasize a certain sound, or create a motif with a sound. A good sound mixer will help you discover this. When you lay your picture over music, your sound person will also make sure it’s properly mixed and leveled. Pro tip: Get a 5.1 sound mix of your film to take to film festivals with theater screenings.</span><br data-dcnode-id="1269"><br data-dcnode-id="1268"><span data-dcnode-id="1267" instrument_node="">Finally, a colorist will color your film. It may sound easy, but if you shoot on a nice prosumer camera, and everything is well-lit, there is a lot of information your colorist can manipulate to bring out colors, match others, and create moods with certain styles. Check out the video below to see just how much value a colorist can add to your images.</span></p><span data-dcnode-id="1265" instrument_node="">

</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Consider providing your colorist with a list of reference shots from other movies that you like. Make sure they are consistent and add to your story. The worst is when a film is styled for no reason; it looks like you’re trying to cover up other inadequacies.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872" style="text-align: left;"><span data-dcnode-id="873" instrument_node="">Don’t forget to reach out to animators and visual effects artists if your film calls for either of these things. Their expertise can save you in the 11th hour. For example, I used a camera rig attached to a car for a recent shoot, and had to get a visual effects artist to paint out the straps that were tied inside the car. Don’t expect anyone to do this for free; make sure you’ve set aside at least $500 for this.</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">RELATED:</span></p><span data-dcnode-id="868" instrument_node="">

</span><h2 data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">
                
                How do I find distribution?
                
            </span></h2><span data-dcnode-id="835" instrument_node="">
</span></div><span data-dcnode-id="833" instrument_node="">
</span></div><span data-dcnode-id="831" instrument_node="">
</span><div class="article__body__section" data-dcnode-id="782"><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="827"><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">To find distribution for your indie film, think about two other films that your film is like. This should be part of your pitch because it quickly provides reference points for someone who’s unfamiliar with your synopsis or your work. Then you want to construct a one- to two-sentence log line that describes your story in more detail.</span></strong></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="825" instrument_node="">Check out </span><span data-dcnode-id="822" style="text-decoration: underline;"><a data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.filmdaily.tv/logline/top-box-office-logline-examples" rel="noopener" target="_blank"><span data-dcnode-id="824" instrument_node="">FilmDaily.tv’s collection of log lines</span></a></span><span data-dcnode-id="821" instrument_node=""> from some classics for ideas on how to write yours.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Film festivals are good places to find distribution because other distributors and programmers attend festivals. I’ve found all my distribution at festival networking parties. For this reason, you need to have a short 60- to 90-second trailer of your film and a one-sheet with your log line, synopsis, and any other relevant information, including visual aids. It’s wise to create a “lookbook” that represents what your film is about. Have this handy on your smartphone or tablet, and show people when you talk about your film! Everyone does this at all the major festivals. It’s not easy to get distribution or convince someone your film is marketable. But don’t be afraid of the search. Everyone needs content, and you might get lucky!</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Making movies is not an easy endeavor, so build a solid, trustworthy team and lead them to victory. Best friends are made in the trenches on set as you spend your days creating art together.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Making films is fun—that’s why we all fell in love with cinema in the first place, so never lose touch with that initial drive for wanting to contribute to this medium.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Take your preproduction seriously and be organized. It’ll only help you on the day. Lastly, be grateful to all your cast and crew for trusting you with their time, resources, and careers.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">RELATED:</span></p><span data-dcnode-id="804" instrument_node="">
