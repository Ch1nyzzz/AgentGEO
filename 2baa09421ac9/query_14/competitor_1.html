</span><article class="row row-eq-height noxs normagin" data-dcnode-id="1072"><span data-dcnode-id="1101" instrument_node="">
</span><div class="content-col col-sm-offset-2 col-sm-5 col-xs-12" data-dcnode-id="1079"><span data-dcnode-id="1100" instrument_node="">
</span><hgroup class="barred red" data-dcnode-id="1081"><span data-dcnode-id="1099" instrument_node="">
</span><h3 class="fade-left" data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">What is the Next Step?</span></h3><span data-dcnode-id="1096" instrument_node="">
</span><p class="fade-right" data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">We get it. This isn’t your normal four-year college requiring coursework not associated with your area of interest. We are a post-secondary institution or trade school that's different in its approach. Here's how you can get more info:</span></p><span data-dcnode-id="1093" instrument_node="">
</span><br data-dcnode-id="1092"><span data-dcnode-id="1091" instrument_node="">
</span><a class="fade-right fade-2 btn btn-primary center-block" data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/apply/"><span data-dcnode-id="1090" instrument_node="">Request Information</span></a><span data-dcnode-id="1088" instrument_node="">
</span><a class="fade-up fade-2 btn btn-primary center-block" data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/school-locations/"><span data-dcnode-id="1087" instrument_node="">Externship Location</span></a><span data-dcnode-id="1085" instrument_node="">
</span><a class="fade-down fade-2 btn btn-primary center-block" data-dcnode-id="1083" href="tel:+18006006956"><span data-dcnode-id="1084" instrument_node="">Call Admissions</span></a><span data-dcnode-id="1082" instrument_node="">

</span><div class="container" data-dcnode-id="695"><span data-dcnode-id="1067" instrument_node="">
</span><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">
</span><h2 data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">How Film Connection Works for the Aspiring Filmmaker</span></h2><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">At Film Connection, we’ll put you with an industry professional where you’ll learn first hand what it takes to build a career in the film business. Our programs and workshops run the gamut of filmmaking, from writing screenplays that capture the imagination while maintaining the structure, to getting a film sold and made, to making final edits before it hits the big screen.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">And you don’t have to move to Los Angeles or New York to do it. With mentors located throughout the country, with us, you can stay close to home while learning the ropes. We even offer one-on-one online film education, enabling you to receive direct instruction from a working filmmaking professional right from your home. Whether getting trained in-person or learning filmmaking through direct online instruction, you won’t have to uproot your life in order to start building your dream career.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Film Connection doesn’t offer “normal” classroom education in which you spend a few hours in class with other students, listening to lectures, taking notes, and learning about filmmaking in an abstract and removed manner. With us, you will be receiving a one-on-one education as you work on real-world projects. If you’ve decided to train in-person, you’ll be working with a professional and training on their industry-standard equipment. But be forewarned, this isn’t time for daydreams, it’s time to work!</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1052" instrument_node="">You probably won’t be working on the next summer blockbuster, or blocking shots for an Oscar winner (though our student externs have worked on some very big projects like </span><em data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Black Panther</span></em><span data-dcnode-id="1049" instrument_node=""> and </span><em data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Ant Man 2</span></em><span data-dcnode-id="1046" instrument_node="">). You will, however, be working with a professional who’s downright passionate about filmmaking. With us, you could be re-writing a 45-second scene that takes place in a grocery store for a small independent film or assistant directing on a commercial or music video. </span><em data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">The Avengers</span></em><span data-dcnode-id="1043" instrument_node=""> it isn’t, but you’re learning hands-on and you have the chance to make connections with the working filmmaking professionals you meet along the way.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><h2 data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">The Film Connection Directing Approach</span></h2><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Once the script is locked down and financing is in place, it’s time for the director to go to work. As an extern working directly with a film director, the Film Connection directing training approach will give you the opportunity to learn from a working filmmaker in a film production company.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">While some directors also produce their films and even do some of the writing, their main responsibility is to blend together all of the creative aspects of the production into a single cohesive unit.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Being a director is probably the most demanding position in the industry. Because they have a hand in almost every aspect of the film, most directors actually come from other filmmaking jobs, such as Director of Photography (DP), film editor, screenwriter, producer&nbsp;and line producer. When it comes to film, having a broad understanding of the process can only help.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">In addition to mechanical aspects of filmmaking, the director also has to play mediator at times. There are a lot of creative minds and strong opinions (egos) involved during the process. The ability to work with many different personalities – and get those personalities to work with each other – is one of the most important roles of a director.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">At Film Connection, the education you’ll get is completely real-world because your education in film is on real projects, training with an experienced filmmaker.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Of course, there’s more to making a film than writing a script or directing people on the set. Editing, line producing, storyboarding, lighting, and of course the generous talent of the actors, all come together to create a finished project.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1019" instrument_node="">At Film Connection, you’ll learn what goes into making a film and what needs to happen during pre-production, production, and post-production. Choose the in-person option for your film directing education, and you’ll learn in an immersive environment, working directly with people who do this for a living. They work hard to make </span><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/film-careers/"><span data-dcnode-id="1018" instrument_node="">careers in the film industry</span></a><span data-dcnode-id="1016" instrument_node="">, and you’ll work hard to earn actual hands-on experience, make industry connections (if you’re taking advantage of the opportunities in front of you), and earn your certificate of completion.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Learning what it takes to become a professional director is a career choice which requires heaps of dedication, a seriously fierce work ethic, and the ability to really go the distance. If that sounds like something you’re up to, then maybe being a director is the career for you.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><h2 data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Film Connection’s Screenwriting Film School Alternative</span></h2><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">Are you interested in learning what it takes to write an effective script? Our approach to screenwriting pairs one screenwriting student extern (you) with one experienced filmmaker who knows the ins-and-outs of writing the kinds of scripts that get made. Via remote online sessions, your mentor works with </span><em data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">you</span></em><span data-dcnode-id="1004" instrument_node=""> and guides you step-by-step through the process of developing your idea for a movie into a fully-developed, completed script or screenplay, along with your logline, pitch, and insight into the process of getting that film sold and made.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Joe Eszterhas reportedly once sold a script written on a cocktail napkin for millions of dollars. We can’t guarantee that kind of payoff when you finish learning screenwriting with us but the Film Connection screenwriting mentor who educates and coaches you will show you what has got to happen in order to produce a “Killer Script.”</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Without a script, there is no movie. It’s as simple as that. Sure, there are times when a rough idea has been sketched out, actors get attached and directors tabbed to make the film. Nevertheless, the cameras don’t start filming until everyone’s got a script in hand.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">So what makes a Killer Script? It’s how you elevate yourself above the other 99% of screenplays floating around. It’s the script readers can’t put down. It gets read in one sitting and when it’s read by the right person, the wheels are set in motion. The actor gets on the phone with the agent, the studio gives the green light, and producers quickly get the money together to make sure it’s done right.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Film Connection’s screenwriting film school alternative will lay the groundwork to empower you to write your own Killer Script. By starting with the classics, you’ll receive lessons on important elements nearly&nbsp;all great scripts have in common. As they say, to become a great writer, it’s important to read great writing.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Learning the three-act structure, character motivation and development and how to really make the most of the visual nature of film are just a few of the aspects of screenplay writing covered in our industry-oriented curriculums. If you have an idea of what you want to write, you’ll now experience firsthand instruction on how to expand upon that idea, develop it into a fleshed out story concept. If you don’t have an idea that’s just waiting to be brought to life, your mentor will guide you through the process of ideation and coming up with a concept and story you will be eager to write.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Working with your Film Connection screenwriting mentor, you can start connecting the dots between the script and filming, the opening and closing credits, previews, reviews, and even the audience that will be discussing your work on social media.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">But know this: becoming a professional screenwriter takes a lot of work, determination, and it pays to have thick skin. That being said, if you have a story to tell, you’re probably the only person who can tell it the way you think it should be told; the way you see it in your imagination. By externing with a professional screenwriter, you can learn to harness your creative vision and generate scenes, dialogue, and plot points through guided instruction.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">With the Film Connection’s screenwriting film school alternative which utilizes the mentored-externship approach, you can be on your way in just a matter of 6 to 9 months.</span></p><span data-dcnode-id="978" instrument_node="">
</span><ul class="slides" data-dcnode-id="699"><span data-dcnode-id="977" instrument_node="">
</span><li data-dcnode-id="937"><span data-dcnode-id="976" instrument_node="">
</span><div class="bluebox" data-dcnode-id="939"><span data-dcnode-id="975" instrument_node="">
</span><h2 data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">1. WE KNOW WHAT CONVENTIONAL FILM SCHOOL MISSES</span></h2><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="971" instrument_node="">Let’s be honest. The one reason you’re looking into </span><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/courses/"><span data-dcnode-id="970" instrument_node="">film school</span></a><span data-dcnode-id="968" instrument_node=""> is because you want to be a film director. Someone like Tarantino, David Fincher, Ridley Scott, Ava DuVernay, Taika Waititi or someone totally different, who breaks all the molds.</span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Have that one film idea and you want to get it made? It’s your film, your idea, your masterpiece that you want to make and show to the world. This passion consumes your dreams and fills your every waking moment.</span></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="962" instrument_node="">Contrary to what some think, we believe the quickest way to kill your passion is to sit in a classroom, digest tons of assigned reading, and work on someone else’s student film only to end up $50,000 or more in debt. In other words, if you’re serious about making your film, traditional film school might not be the best route. Why incur heaps of debt when what you should be doing is working for cheap while you build your credits and experience. Film Connection’s approach to film education work in alignment with the way the industry actually operates. We pick up where ordinary schools leave off, and we’re all about helping </span><em data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">you</span></em><span data-dcnode-id="959" instrument_node=""> make </span><em data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">your</span></em><span data-dcnode-id="956" instrument_node=""> movie.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">From day one at the Film Connection, you’re learning how to make your movie.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="948"><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Other film schools leave out all the good stuff. </span></strong></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="944"><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Advantage Film Connection.</span></strong></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Keep reading if you want to learn more about how to become a working film director.</span></p><span data-dcnode-id="940" instrument_node="">
</span></div><span data-dcnode-id="938" instrument_node="">
</span></li><span data-dcnode-id="936" instrument_node="">
</span><li data-dcnode-id="903"><span data-dcnode-id="935" instrument_node="">
</span><div class="bluebox scrollblocks" data-dcnode-id="905"><span data-dcnode-id="934" instrument_node="">
</span><h2 data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">2. ALL ROADS LEAD TO HOLLYWOOD, L.A., THE WEST COAST…</span></h2><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">It’s ALL about making your film. Not your friends, not your fellow classmates, YOUR FILM. But in order to make your film, you are going to have to know how to get your film off the ground, from concept to screenplay, to pitching it to Hollywood and all the technical craft in-between. And when it comes to getting your film made all roads do lead to Hollywood because L.A. is still where the money is, where the deals are made, and where projects get the green light.</span></p><span data-dcnode-id="928" instrument_node="">
</span><h4 data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Here’s how the Film Connection for Film Production &amp; Editing works:</span></h4><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="924" instrument_node="">You will start your course by </span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/what-is-an-apprentice"><span data-dcnode-id="923" instrument_node="">externing</span></a><span data-dcnode-id="921" instrument_node="">&nbsp;inside a film production company in a city or town near where you live. That’s right, a location near you. They will teach you the basics of film through a hands-on, practical approach. You’ll touch the gear and see how working pros manage all these basics.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Alternatively, you can get your filmmaking education via online remote lessons which are one-on-one and get educated from the comfort of your own home or wherever you happen to be.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Simultaneously, while you learn film production and editing, you will also be working with a professional Hollywood screenwriter on the screenplay for your film. From your third lesson on you will be working on your film. You’ll be writing your screenplay, designing the look, the feel, the locale, the crew, the cast of your masterpiece all with the idea of getting your pitch ready for Hollywood.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Then, for your graduation final, you will fly to Hollywood and sit in a room with a credible Hollywood Film Producer, and pitch your movie to him or her. Your goal? To get him or her to be a producer on your film and get it made, of course!</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="907"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Yes you read that right, we are the only film school alternative that helps you PITCH your hot movie idea to the people that can get moves made in the real world. Advantage: Film Connection</span></strong></p><span data-dcnode-id="906" instrument_node="">
</span></div><span data-dcnode-id="904" instrument_node="">
</span></li><span data-dcnode-id="902" instrument_node="">
</span><li data-dcnode-id="884"><span data-dcnode-id="901" instrument_node="">
</span><div class="bluebox scrollblocks" data-dcnode-id="886"><span data-dcnode-id="900" instrument_node="">
</span><h2 data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">3. FINALLY, A FILMMAKING COURSE FOR THE 21st CENTURY</span></h2><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="896" instrument_node="">We think knowledge of the history and principals of filmmaking is important, and we certainly include a healthy dose of it in our </span><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/courses/"><span data-dcnode-id="895" instrument_node="">curriculum</span></a><span data-dcnode-id="893" instrument_node="">. But the reality is filmmaking in the 21st century is a whole new ballgame. Digital technology has changed how films are made. Current filmmaking often breaks the rules and historical principals and films are better for it. So, we concentrate instead on putting the gear in your hands so you can put your ideas in film right from the start. Instead of immersing yourself in conversations about why such and such director did a scene a certain way, you’re doing it, learning hands-on and getting to see the principles behind all of the theory stuff.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="888"><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">We teach you what you need to know to make films. If you want to become a film critic, you might want to attend traditional film school. Advantage: Film Connection.</span></strong></p><span data-dcnode-id="887" instrument_node="">
</span></div><span data-dcnode-id="885" instrument_node="">
</span></li><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="852"><span data-dcnode-id="882" instrument_node="">
</span><div class="bluebox scrollblocks" data-dcnode-id="854"><span data-dcnode-id="881" instrument_node="">
</span><h2 data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">4. LOW TUITION SO YOU DON’T START YOUR CAREER IN DEBT</span></h2><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="877" instrument_node="">Have you seen what ordinary film schools charge? You could buy a small house or a new Bentley for their </span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/film-school-tuition/"><span data-dcnode-id="876" instrument_node="">tuition</span></a><span data-dcnode-id="874" instrument_node="">. Frankly, we have no idea why they charge so much. On the other hand, the tuition at The Film Connection is modestly priced and is generally far less expensive than conventional and private film schools. And do well and, with us, you can even pitch your film to professionals in Hollywood, and still be out of debt.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Make no mistake, debt is a dream killer. Take our advice: don’t spend 50k or more to go to film school.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">This is the 21st Century, the film business is more accessible than ever but only if you are connected and if you are not in debt.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Graduates from typical film schools are going to be in for a very rude awakening when they start knocking on doors with no connections.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="860"><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">We save you as much as $100,000. Advantage: Film Connection. </span></strong></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="856"><strong data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">We are the film school alternative that arranges for you to pitch your movie to major agents, managers and film producers who are ready to hear your movie idea.</span></strong></p><span data-dcnode-id="855" instrument_node="">
</span></div><span data-dcnode-id="853" instrument_node="">
</span></li><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="817"><span data-dcnode-id="850" instrument_node="">
</span><div class="bluebox scrollblocks" data-dcnode-id="819"><span data-dcnode-id="849" instrument_node="">
</span><h2 data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">5. PRIVATE, ONE ON ONE MENTORING IN YOUR CRAFT, the TECHNICAL CRAFT OF FILMMAKING</span></h2><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">You’re going to be learning a lot of stuff in the Film Connection. This could include working, hands-on, on a variety of shoots, working with cameras, sound, design, actors, editing and more. Who would you rather learn these essentials from—a working film professional or a school professor, or instructor? The constant complaint we hear from film industry professionals about film school graduates is that it takes a long time for them to unlearn the stuff they learned in regular old film school—because what they learned was not the way things are done in the real world.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Look it’s simple, learning how a real film set works by working on student film sets at some expensive school probably isn’t the best use of your time and money.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="839" instrument_node="">Our </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/meet-your-mentor/"><span data-dcnode-id="838" instrument_node="">mentors</span></a><span data-dcnode-id="836" instrument_node=""> </span><em data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">mentor</span></em><span data-dcnode-id="833" instrument_node=""> our students, meaning, they converse with them, instruct them one-on-one and help them learn how things are done in the real world, on real shoots.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="828"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Mentors make better teachers because they’ve been there, done that.</span></strong></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="824"><strong data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Advantage: Film Connection.</span></strong></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Keep reading if you know you have what it takes to be the next great horror filmmaker, or if you have a great thriller, drama, or comedy that’s screaming to get out of your brain…</span></p><span data-dcnode-id="820" instrument_node="">
</span></div><span data-dcnode-id="818" instrument_node="">
</span></li><span data-dcnode-id="816" instrument_node="">
</span><li data-dcnode-id="789"><span data-dcnode-id="815" instrument_node="">
</span><div class="bluebox scrollblocks" data-dcnode-id="791"><span data-dcnode-id="814" instrument_node="">
</span><h2 data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">6. JOB ASSISTANCE PROGRAM (Our film school has real job assistance)</span></h2><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">We hear you—you want to make your film. You want to be the next Wes Anderson, the next Sundance Award Winner, the next Academy Award Nominee,….The Film Connection is the only film school alternative that will give you the opportunity to pitch your film to a group of film industry pros who have the power to green light your project (if you are in ‘good standing’ and earn the necessary GPA). But there are no guarantees in life and so we want to be absolutely honest with you.</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">If you don’t get your film green lit, what are you going to do? Go home and take that job at Taco Bell? No, of course not, you’re going to continue sculpting your film idea and you’re going to want to get a good job in the film business, working behind the scenes….</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="804" instrument_node="">That’s where we come in. As a Film Connection graduate you will have real world experience, you will have made industry connections and you will have us. We will reach out to our large network to help you, as you help yourself, to find a good job in the industry. With the Film Connection Stay Connected </span><a data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/stay-connected/"><span data-dcnode-id="803" instrument_node="">Job Assistance program</span></a><span data-dcnode-id="801" instrument_node=""> you get up to a year’s worth of help at securing a job in the film business after you graduate.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">With ordinary film schools you’re pushed out the door with usually nothing more than a stale cold-call list.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="793"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Regular film schools do not provide as extensive of a job placement program. Advantage: Film Connection.</span></strong></p><span data-dcnode-id="792" instrument_node="">
</span></div><span data-dcnode-id="790" instrument_node="">
</span></li><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="767"><span data-dcnode-id="787" instrument_node="">
</span><div class="bluebox scrollblocks" data-dcnode-id="769"><span data-dcnode-id="786" instrument_node="">
</span><h2 data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">7. WHY FILM PROS ENDORSE US</span></h2><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">We’ve alluded to this before, but it’s worth repeating: film schools don’t carry a good reputation in the film business. The Film Connection does. Why? Because real film professionals, the ones that work on movies, documentaries, short films, industrials, etc. for a living, oftentimes see film school graduates as being pretentious and having bad attitudes and a sense of entitlement, who are schooled in all the wrong things, and generally, not worth the bother.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="779" instrument_node="">On the other hand, true </span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/learn-from-famous-filmmakers/"><span data-dcnode-id="778" instrument_node="">film professionals endorse the Film Connection</span></a><span data-dcnode-id="776" instrument_node=""> because it resonates with them. They too had a mentor help them get started. They too had a dream they wanted to pursue. They too paid their dues. They know how the film business really works.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="771"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">The reason film professionals endorse us is because we get it. Do you? Advantage: Film Connection.</span></strong></p><span data-dcnode-id="770" instrument_node="">
</span></div><span data-dcnode-id="768" instrument_node="">
</span></li><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="748"><span data-dcnode-id="765" instrument_node="">
</span><div class="bluebox scrollblocks" data-dcnode-id="750"><span data-dcnode-id="764" instrument_node="">
</span><h2 data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">8. SOLVING THE CATCH 22s</span></h2><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="760" instrument_node="">There are two fundamental obstacles to becoming a successful filmmaker. One is a lack of experience and the other is not knowing the right people. What have you done and who do you know? The Film Connection helps you with both of these Catch 22s. Since you are training with your mentor inside of a professional film production company (which serves as your classroom), you will be gaining real-world insight into actual commercial film projects (as opposed to student film assignments) so that when you are asked, “What did you work on?” you will have an answer. Secondly, by the time you finish the Film Connection </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/information/"><span data-dcnode-id="759" instrument_node="">film course</span></a><span data-dcnode-id="757" instrument_node=""> you will have connected with film industry professionals: your local mentor, clients of your local mentor, your screenwriting mentor, your pitch mentor, etc.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="752"><strong data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">We give you experience on client-funded projects. At ordinary film schools you work on student projects. Which means more in the real world? Advantage: Film Connection. </span></strong></p><span data-dcnode-id="751" instrument_node="">
</span></div><span data-dcnode-id="749" instrument_node="">
</span></li><span data-dcnode-id="747" instrument_node="">
</span><li data-dcnode-id="723"><span data-dcnode-id="746" instrument_node="">
</span><div class="bluebox scrollblocks" data-dcnode-id="725"><span data-dcnode-id="745" instrument_node="">
</span><h2 data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">9. CONNECTIONS</span></h2><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="741" instrument_node="">There’s a reason we call our alternative to traditional school the Film Connection. That’s because we realized early on that the </span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/too-good-to-be-true"><span data-dcnode-id="740" instrument_node="">film business</span></a><span data-dcnode-id="738" instrument_node=""> is all about who you know. We also know that if you want to know people in the film business, you need to hang out with people in the film business. Hint: You won’t be hanging out with people in the film business at your college or trade school campus, no matter how prestigious that school may be.</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">The way to hang out with people in the film business is by being part of the production process. We place you inside a film production company, where you will extern for six months, working on commercial film, television, and commercial projects. If you decide to train directly with a pro via our online option, that’s you communicating and building your relationship with a working filmmaking professional for six full months. Just imagine the networking possibilities that are there for the taking.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Ordinary schools don’t train their students on the inside. On the inside is where you can make these essential industry connections.</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="727"><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">We put you on the inside so you can connect with people in the film industry. Advantage: Film Connection.</span></strong></p><span data-dcnode-id="726" instrument_node="">
</span></div><span data-dcnode-id="724" instrument_node="">
</span></li><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="701"><span data-dcnode-id="721" instrument_node="">
</span><div class="bluebox scrollblocks" data-dcnode-id="703"><span data-dcnode-id="720" instrument_node="">
</span><h2 data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">10. YOU GET TO PITCH YOUR FILM</span></h2><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">You might have an idea for the greatest film of all time, but if you don’t know how or who to pitch it to, you’d better have a lot of rich relatives if you want it to ever get made. With typical film schools, your final project gets graded by a professor. Even if you get an A+, your film is probably no closer to reality than when you started the course.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="713" instrument_node="">With the Film Connection, meet the necessary requirements and your final project is to pitch your idea to a Hollywood film producer – a credible, real life, working producer who can get your project funded and made if he or she likes it. In doing so you will gain valuable experience, knowledge, and insight into how the pitch process works, some great feedback and critiques of your project, and get advice on where to go next. You’ll also have a polished, completed </span><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmconnection.com/courses/screenwriting/"><span data-dcnode-id="712" instrument_node="">screenplay</span></a><span data-dcnode-id="710" instrument_node=""> of your film. Know of any ordinary film school that does that?</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="705"><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">We open the doors that students from conventional schools can’t even find. Advantage: Film Connection.</span></strong></p><span data-dcnode-id="704" instrument_node="">
</span></div><span data-dcnode-id="702" instrument_node="">
</span></li><span data-dcnode-id="700" instrument_node="">
</span></ul><span data-dcnode-id="698" instrument_node="">
</span><br data-dcnode-id="697"><span data-dcnode-id="696" instrument_node="">
</span></div></section><span data-dcnode-id="693" instrument_node="">
