</span><h1 class="c-main-headline" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Prince of Persia in the Bible: who was he?</span></h1><span data-dcnode-id="1209" instrument_node="">
</span><div class="c-article-info post__info" data-dcnode-id="1198"><span data-dcnode-id="1208" instrument_node="">
</span><time class="c-article-info__time c-article-info__time--clock" data-dcnode-id="1206" datetime="2021-02-15T07:15:05+01:00" title="2021-02-15T07:15:05+01:00"><span data-dcnode-id="1207" instrument_node="">Monday, February 15, 2021 at 7:15 AM</span></time><span data-dcnode-id="1205" instrument_node="">
</span><span data-dcnode-id="1200"><span data-dcnode-id="1204" instrument_node="">by&nbsp;
                            </span><a class="c-article-info__author" data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legit.ng/author/deborah-eze/" rel="nofollow" title="Author page"><span data-dcnode-id="1203" instrument_node="">Deborah Eze</span></a><span data-dcnode-id="1201" instrument_node="">
</span></span><span data-dcnode-id="1199" instrument_node="">

</span></header><span data-dcnode-id="1195" instrument_node="">
</span><div class="post__content" data-dcnode-id="1106" data-io-article-url="https://www.legit.ng/1215095-prince-persia-bible.html"><span data-dcnode-id="1194" instrument_node="">
</span><p class="align-left" data-dcnode-id="1191"><strong data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">There have been video games and adventure films of the famous character Prince of Persia. But did you know that he originally came from the Bible? Let’s find out who he was and what his role was in the Book of Books.</span></strong></p><figure class="article-image" data-dcnode-id="1185"><img alt="Prince of Persia" class="article-image__picture" data-dcnode-id="1190" height="594" sizes="(max-width: 1021px) calc(100vw - 2 * 13px), (max-width: 1400px) calc((100vw - 2 * 20px - 2 * 20px) / 2), 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//netstorage-legit.akamaized.net/images/62f0f380cdaa7a9f.jpg%3Fimwidth%3D900&amp;raw" srcset="https://netstorage-legit.akamaized.net/images/62f0f380cdaa7a9f.jpg?imwidth=250 250w, https://netstorage-legit.akamaized.net/images/62f0f380cdaa7a9f.jpg?imwidth=360 360w, https://netstorage-legit.akamaized.net/images/62f0f380cdaa7a9f.jpg?imwidth=430 430w, https://netstorage-legit.akamaized.net/images/62f0f380cdaa7a9f.jpg?imwidth=720 720w" title="Prince of Persia" width="900"><figcaption class="article-image__caption" data-dcnode-id="1186"><span data-dcnode-id="1189" instrument_node="">Photo: hallelujah.co.ke</span><br data-dcnode-id="1188"><span data-dcnode-id="1187" instrument_node="">Source: UGC</span></figcaption></figure><p class="align-left" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">The entertainment industry tells us a story of a young boy, who was saved from the streets and adopted by the Persian king. Due to his upbringing he becomes a decent, honest and brave man, who saves the kingdom and the world from evil.</span></p><p class="align-left" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">However, this is only a movie and videogame story that is widely popular. In the Bible, the Prince of Persia has a completely different story and here is how it goes.</span></p><div class="c-adv c-adv--video-placeholder" data-dcnode-id="1180" id="video-player-placeholder"></div><h2 data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Who is the Prince of Persia?</span></h2><figure class="article-image" data-dcnode-id="1172"><img alt="Prince of Persia" class="article-image__picture" data-dcnode-id="1177" height="670" sizes="(max-width: 1021px) calc(100vw - 2 * 13px), (max-width: 1400px) calc((100vw - 2 * 20px - 2 * 20px) / 2), 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//netstorage-legit.akamaized.net/images/c64720e12a873174.jpg%3Fimwidth%3D900&amp;raw" srcset="https://netstorage-legit.akamaized.net/images/c64720e12a873174.jpg?imwidth=250 250w, https://netstorage-legit.akamaized.net/images/c64720e12a873174.jpg?imwidth=360 360w, https://netstorage-legit.akamaized.net/images/c64720e12a873174.jpg?imwidth=430 430w, https://netstorage-legit.akamaized.net/images/c64720e12a873174.jpg?imwidth=720 720w" title="Prince of Persia" width="900"><figcaption class="article-image__caption" data-dcnode-id="1173"><span data-dcnode-id="1176" instrument_node="">Photo: ancient-origins.net</span><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node="">Source: UGC</span></figcaption></figure><p class="align-left" data-dcnode-id="1168"><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">READ ALSO</span></strong><span data-dcnode-id="1169" instrument_node="">: Bible quotes on humility</span></p><p class="align-left" data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">The Prince of Persia in the Bible is introduced in Chapter 10, verse 13 of the Old Testament book of Daniel. There, however, he is a not a character of high morals, but rather a villain. In fact, he is a fallen angel, who hindered angel Gabriel on his way to give Daniel the answer to his prayer. Daniel, in turn, is asking about the future of the Jewish people, his compatriots.</span></p><div class="c-adv c-adv--size-rectangle-row l-adv l-adv--full-width" data-dcnode-id="1165" data-lazy-ad="1" data-slot="/76590364/legit_intext" id="div-gpt-ad-1489746201402-0-1"></div><div class="post__read-also c-article-read-also" data-dcnode-id="1156"><a class="c-article-read-also__image" data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legit.ng/1407144-confusion-kano-councilor-appoints-18-aides-reasons.html"><img data-dcnode-id="1164" sizes="256px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//netstorage-legit.akamaized.net/images/f1eb3e95d43af81a.jpg%3Fimpolicy%3Dcropped-image%26imwidth%3D256&amp;raw" srcset="https://netstorage-legit.akamaized.net/images/f1eb3e95d43af81a.jpg?impolicy=cropped-image&amp;imwidth=256, https://netstorage-legit.akamaized.net/images/f1eb3e95d43af81a.jpg?impolicy=cropped-image&amp;imwidth=512"></a><a class="c-article-read-also__headline" data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legit.ng/1407144-confusion-kano-councilor-appoints-18-aides-reasons.html"><p class="c-article-read-also__caption" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Read also</span></p><p class="c-article-read-also__headline-wrapper" data-dcnode-id="1158"><span class="c-article-read-also__headline-hover-inner" data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Confusion as Kano councilor appoints 18 aides, gives reasons</span></span></p></a></div><p class="align-left" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">The goal that the Prince of Persia was trying to achieve is to prevent the kingdom to release Jewish people from the land. Due to his actions, Daniel couldn’t receive an answer for 3 weeks, but, fortunately, the archangel Michael defeated the Prince and his evil intentions.</span></p><h2 data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">What did Daniel pray about?</span></h2><figure class="article-image" data-dcnode-id="1146"><img alt="Daniel praying" class="article-image__picture" data-dcnode-id="1151" height="675" sizes="(max-width: 1021px) calc(100vw - 2 * 13px), (max-width: 1400px) calc((100vw - 2 * 20px - 2 * 20px) / 2), 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//netstorage-legit.akamaized.net/images/93aec91d719d0a62.jpg%3Fimwidth%3D900&amp;raw" srcset="https://netstorage-legit.akamaized.net/images/93aec91d719d0a62.jpg?imwidth=250 250w, https://netstorage-legit.akamaized.net/images/93aec91d719d0a62.jpg?imwidth=360 360w, https://netstorage-legit.akamaized.net/images/93aec91d719d0a62.jpg?imwidth=430 430w, https://netstorage-legit.akamaized.net/images/93aec91d719d0a62.jpg?imwidth=720 720w" title="Daniel praying" width="900"><figcaption class="article-image__caption" data-dcnode-id="1147"><span data-dcnode-id="1150" instrument_node="">Photo: freebibleimages.org</span><br data-dcnode-id="1149"><span data-dcnode-id="1148" instrument_node="">Source: UGC</span></figcaption></figure><p class="align-left" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Daniel had a worrying vision about the war and was deeply concerned about his countrymen. Therefore, he went on fasting and praying for weeks. That is when God sent him an angel to explain the vision.</span></p><div class="c-adv c-adv--size-rectangle-row l-adv l-adv--full-width" data-dcnode-id="1143" data-lazy-ad="1" data-slot="/76590364/legit_intext_02" id="div-gpt-ad-1489747094101-0-1"></div><p class="align-left" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">The archangel Michael helped Gabriel and he managed to deliver the message to Daniel. The reason why Prince of Persia got in the way of a messenger is that of the message itself. Gabriel eventually told Daniel that he will have to fight the Prince of Persia and then the Prince of Greece, as Greece would be the next power after Persia, which would dominate Israel.</span></p><div class="post__read-also c-article-read-also" data-dcnode-id="1132"><a class="c-article-read-also__image" data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legit.ng/1406436-dwayne-the-rock-johnsons-adorable-daughter-declares-powerful-cute-clip.html"><img data-dcnode-id="1140" sizes="256px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//netstorage-legit.akamaized.net/images/09176ac7d0071267.jpg%3Fimpolicy%3Dcropped-image%26imwidth%3D256&amp;raw" srcset="https://netstorage-legit.akamaized.net/images/09176ac7d0071267.jpg?impolicy=cropped-image&amp;imwidth=256, https://netstorage-legit.akamaized.net/images/09176ac7d0071267.jpg?impolicy=cropped-image&amp;imwidth=512"></a><a class="c-article-read-also__headline" data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legit.ng/1406436-dwayne-the-rock-johnsons-adorable-daughter-declares-powerful-cute-clip.html"><p class="c-article-read-also__caption" data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Read also</span></p><p class="c-article-read-also__headline-wrapper" data-dcnode-id="1134"><span class="c-article-read-also__headline-hover-inner" data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Dwayne The Rock Johnson's adorable daughter declares she is powerful in cute clip</span></span></p></a></div><figure class="article-image" data-dcnode-id="1126"><img alt="Prince of Persia" class="article-image__picture" data-dcnode-id="1131" height="1346" sizes="(max-width: 1021px) calc(100vw - 2 * 13px), (max-width: 1400px) calc((100vw - 2 * 20px - 2 * 20px) / 2), 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//netstorage-legit.akamaized.net/images/6ece11a43fc01114.jpg%3Fimwidth%3D900&amp;raw" srcset="https://netstorage-legit.akamaized.net/images/6ece11a43fc01114.jpg?imwidth=250 250w, https://netstorage-legit.akamaized.net/images/6ece11a43fc01114.jpg?imwidth=360 360w, https://netstorage-legit.akamaized.net/images/6ece11a43fc01114.jpg?imwidth=430 430w, https://netstorage-legit.akamaized.net/images/6ece11a43fc01114.jpg?imwidth=720 720w" title="Prince of Persia" width="900"><figcaption class="article-image__caption" data-dcnode-id="1127"><span data-dcnode-id="1130" instrument_node="">Photo: experimentaltheology.blogspot.com</span><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node="">Source: UGC</span></figcaption></figure><p class="align-left" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">However, it is still unknown whether the fate of Prince of Persia was to keep the kingdom dominant over Israel. If it was so, then it’s quite logical, why he confronted Gabriel and tried to prevent him from delivering the message.</span></p><div class="c-adv c-adv--size-rectangle-row l-adv l-adv--full-width" data-dcnode-id="1123" data-lazy-ad="1" data-slot="/76590364/legit_intext_03" id="div-gpt-ad-1489747139638-0-1"></div><p class="align-left" data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">This is what the Bible tells us. Interestingly enough, the villain from the Bible was transformed into the hero of films and video games. Nevertheless, now you know the two stories, both of which are fascinating.</span></p><p class="align-left" data-dcnode-id="1117"><strong data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">READ ALSO</span></strong><span data-dcnode-id="1118" instrument_node="">: Power of prayer quotes</span></p><div class="embed-container" data-dcnode-id="1115"><iframe allowfullscreen="" class="embed-youtube" data-dcnode-id="1116" frameborder="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/5esIhWkdAKo&amp;raw"></iframe></div><p class="align-left" data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node=""> </span></p><span data-dcnode-id="1112" instrument_node=""> </span><p data-dcnode-id="1108"><span data-dcnode-id="1111" instrument_node="">Source: </span><a data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legit.ng/"><span data-dcnode-id="1110" instrument_node="">Legit.ng</span></a></p><span data-dcnode-id="1107" instrument_node=""> </span></div><span data-dcnode-id="1105" instrument_node="">

o__author" data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legit.ng/author/wale-akinola/" rel="nofollow" title="Author page"><span data-dcnode-id="620" instrument_node="">Wale Akinola</span></a><span data-dcnode-id="618" instrument_node=""> </span></span><span data-dcnode-id="616" instrument_node=""> </span></div></header><span data-dcnode-id="613" instrument_node=""> </span><div class="post__content" data-dcnode-id="497" data-io-article-url="https://www.legit.ng/1407144-confusion-kano-councilor-appoints-18-aides-reasons.html"><span data-dcnode-id="612" instrument_node=""> </span><p class="align-left" data-dcnode-id="606"><strong data-dcnode-id="607"><span data-dcnode-id="611" instrument_node="">- A councilor in </span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legit.ng/tag/kano-news-today/"><span data-dcnode-id="610" instrument_node="">Kano state</span></a><span data-dcnode-id="608" instrument_node="">, Muslihu Yusuf Ali, has appointed 18 personal aides</span></strong></p><p class="align-left" data-dcnode-id="603"><strong data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">- Ali inaugurated the aide on Thursday, March 11, at Kumbotso local government area</span></strong></p><p class="align-left" data-dcnode-id="600"><strong data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">- According to him, he said he would appoint more aides if he has opportunities</span></strong></p><p class="align-left" data-dcnode-id="595"><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">PAY ATTENTION: </span></strong><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.me/legitng" rel="nofollow" target="_blank"><span data-dcnode-id="597" instrument_node="">Join Legit.ng Telegram channel! Never miss important updates!</span></a></p><p class="align-left" data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">There was a mild drama in Kano when a councillor in the state, Muslihu Yusuf Ali, did the unusual by appointing 18 persons who would work with him in carrying out his responsibilities.</span></p><div class="c-adv c-adv--size-rectangle-row l-adv l-adv--full-width" data-dcnode-id="592" data-lazy-ad="1" data-slot="/76590364/legit_intext" id="div-gpt-ad-1489746201402-0-2"></div><p class="align-left" data-dcnode-id="588"><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailytrust.com/how-kano-councilor-inaugurates-18-aides" rel="nofollow" target="_blank"><span data-dcnode-id="591" instrument_node="">Daily Trust </span></a><span data-dcnode-id="589" instrument_node="">reports that the councillor, representing Guringawa Ward of Kumbotso local government area, inaugurated the 18 aides at the local government secretariat on Thursday, March 11, with the help of the vice-chairman of the council, Shamsu Abdullahi.</span></p><p class="align-left" data-dcnode-id="584"><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Legit.ng </span></strong><span data-dcnode-id="585" instrument_node="">gathered that while speaking after the inauguration, Ali said it had always been his dream to bring changes if he had the opportunity, to carry everyone along and work for the development of his people.</span></p><div class="post__read-also c-article-read-also" data-dcnode-id="575"><a class="c-article-read-also__image" data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legit.ng/1406833-fg-reveals-2-reasons-hire-mercenaries-fight-insurgents.html"><img data-dcnode-id="583" sizes="256px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//netstorage-legit.akamaized.net/images/a00613c563473635.jpg%3Fimpolicy%3Dcropped-image%26imwidth%3D256&amp;raw" srcset="https://netstorage-legit.akamaized.net/images/a00613c563473635.jpg?impolicy=cropped-image&amp;imwidth=256, https://netstorage-legit.akamaized.net/images/a00613c563473635.jpg?impolicy=cropped-image&amp;imwidth=512"></a><a class="c-article-read-also__headline" data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legit.ng/1406833-fg-reveals-2-reasons-hire-mercenaries-fight-insurgents.html"><p class="c-article-read-also__caption" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Read also</span></p><p class="c-article-read-also__headline-wrapper" data-dcnode-id="577"><span class="c-article-read-also__headline-hover-inner" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">FG reveals the 2 reasons why it cannot hire mercenaries to fight insurgents</span></span></p></a></div><div class="c-adv c-adv--size-rectangle-row l-adv l-adv--full-width" data-dcnode-id="574" data-lazy-ad="1" data-slot="/76590364/legit_intext_02" id="div-gpt-ad-1489747094101-0-2"></div><figure class="article-image" data-dcnode-id="568"><img alt="Confusion as Kano councilor appoints 18 aides, gives reasons" class="article-image__picture" data-dcnode-id="573" height="494" sizes="(max-width: 1021px) calc(100vw - 2 * 13px), (max-width: 1400px) calc((100vw - 2 * 20px - 2 * 20px) / 2), 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//netstorage-legit.akamaized.net/images/f1eb3e95d43af81a.jpg&amp;raw" srcset="https://netstorage-legit.akamaized.net/images/f1eb3e95d43af81a.jpg?imwidth=250 250w, https://netstorage-legit.akamaized.net/images/f1eb3e95d43af81a.jpg?imwidth=360 360w, https://netstorage-legit.akamaized.net/images/f1eb3e95d43af81a.jpg?imwidth=430 430w, https://netstorage-legit.akamaized.net/images/f1eb3e95d43af81a.jpg?imwidth=720 720w" title="Confusion as Kano councilor appoints 18 aides, gives reasons" width="879"><figcaption class="article-image__caption" data-dcnode-id="569"><span data-dcnode-id="572" instrument_node="">A Kano state councilor has appointed 18 aides to help carry out his responsibilities. Credit: Daily Trust.</span><br data-dcnode-id="571"><span data-dcnode-id="570" instrument_node="">Source: UGC</span></figcaption></figure><p class="align-left" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Ali said, as a leader, there was a need for him to appoint even more than 18 aides so that they would assist him and report what the people needed at the grassroots.</span></p><p class="align-left" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">He added that the nature of the responsibilities they had as leaders that were close to the masses called for the appointments, hoping that it would bring positive change in his ward from which others across the country would emulate.</span></p><p class="align-left" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">He explained that:</span></p><blockquote data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">“This is one of my plans and I have been praying for it. If you look carefully, the system of representation from the National Assembly down to the state assemblies, lawmakers are not given the opportunity to appoint enough aides that will support them in their work – and they are those that are closer to the masses."</span></blockquote><div class="c-adv c-adv--size-rectangle-row l-adv l-adv--full-width" data-dcnode-id="559" data-lazy-ad="1" data-slot="/76590364/legit_intext_03" id="div-gpt-ad-1489747139638-0-2"></div><p class="align-left" data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Ali who is the chief whip of the council, said the encouragement he got from the chairman of the council motivated him to go ahead with the appointments, adding that the work he was willing to do called for more aides that would assist him.</span></p><div class="post__read-also c-article-read-also" data-dcnode-id="548"><a class="c-article-read-also__image" data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legit.ng/1406823-gumi-finally-reveals-method-engaging-bandits-forests.html"><img data-dcnode-id="556" sizes="256px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//netstorage-legit.akamaized.net/images/cdcab43547558ce2.jpg%3Fimpolicy%3Dcropped-image%26imwidth%3D256&amp;raw" srcset="https://netstorage-legit.akamaized.net/images/cdcab43547558ce2.jpg?impolicy=cropped-image&amp;imwidth=256, https://netstorage-legit.akamaized.net/images/cdcab43547558ce2.jpg?impolicy=cropped-image&amp;imwidth=512"></a><a class="c-article-read-also__headline" data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legit.ng/1406823-gumi-finally-reveals-method-engaging-bandits-forests.html"><p class="c-article-read-also__caption" data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Read also</span></p><p class="c-article-read-also__headline-wrapper" data-dcnode-id="550"><span class="c-article-read-also__headline-hover-inner" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Gumi finally reveals his method of engaging bandits in forests</span></span></p></a></div><p class="align-left" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">On the ways he will source money to pay the aides, the councilor said politics was not always about money, but the development of people and their community.</span></p><p class="align-left" data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">He added that a councilor is a servant of the people and he is in politics not because of money, but to bring positive development.</span></p><div class="c-adv c-adv--size-rectangle-row l-adv l-adv--full-width" data-dcnode-id="543" data-lazy-ad="1" data-slot="/76590364/legit_web_article_intext_4" id="div-gpt-ad-1621949315965-0"></div><p class="align-left" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">
