</span><div class="article-content retro-folders" data-dcnode-id="1538" id="main-article"><span data-dcnode-id="5320" instrument_node="">
</span><p data-dcnode-id="5319"></p><h1 data-dcnode-id="5308"><span data-dcnode-id="5318" instrument_node="">Though this is a remake of a game from 1997, there are enough differences in the plot that spoilers from that game may not necessarily apply here. Whether you know the events of the original </span><em data-dcnode-id="5316"><span data-dcnode-id="5317" instrument_node="">Final Fantasy VII</span></em><span data-dcnode-id="5315" instrument_node=""> or not, tropes below </span><em data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">will</span></em><span data-dcnode-id="5312" instrument_node=""> spoil some of </span><em data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">Remake</span></em><span data-dcnode-id="5309" instrument_node="">'s new twists and turns. Read on at your own risk!</span></h1><div class="quoteright" data-dcnode-id="5300" style="width:350px;"><div class="lazy_load_img_box" data-dcnode-id="5301" style="padding-top:110.57%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/ffviir_boxart.png" border="0" class="embeddedimage" data-dcnode-id="5302" height="387" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/ffviir_boxart.png&amp;raw" width="350"></div></div><div class="acaptionright" data-dcnode-id="5298" style="width:350px;"><span data-dcnode-id="5299" instrument_node="">The Legendary Becomes Real</span></div><div class="indent" data-dcnode-id="5288"><span data-dcnode-id="5296" instrument_node=""> </span><em data-dcnode-id="5294"><span data-dcnode-id="5295" instrument_node="">Long ago, we looked upon a foreboding sky. The memory of the star that threatened all burns eternal in our hearts. In its wake came an age of silence. Yet with each fond remembrance, we knew those encountered were not forgotten. That someday, we would see them again. Perhaps it was no more than wishful thinking. But after the long calm, there are now the beginnings of a stir... The reunion at hand may bring joy. It may bring fear. But let us embrace whatever it brings. For they are coming back. At last... The promise has been made.</span></em><div class="indent" data-dcnode-id="5289"><span data-dcnode-id="5293" instrument_node="">— </span><strong data-dcnode-id="5291"><span data-dcnode-id="5292" instrument_node="">Announcement trailer,</span></strong><span data-dcnode-id="5290" instrument_node=""> E3 2015</span></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="5282"><span class="ad-caption" data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">Advertisement:</span></span><div data-dcnode-id="5283" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="5242"><em data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">Final Fantasy VII Remake</span></em><span data-dcnode-id="5279" instrument_node=""> is a multi-part </span><a class="twikilink" data-dcnode-id="5277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGameRemake" title="/pmwiki/pmwiki.php/Main/VideoGameRemake"><span data-dcnode-id="5278" instrument_node="">Video Game Remake</span></a><span data-dcnode-id="5276" instrument_node=""> of the </span><a class="twikilink" data-dcnode-id="5274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RunningGag" title="/pmwiki/pmwiki.php/Main/RunningGag"><span data-dcnode-id="5275" instrument_node="">teeth-shatteringly popular</span></a><span data-dcnode-id="5273" instrument_node=""> 1997 </span><a class="twikilink" data-dcnode-id="5271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/PlayStation" title="/pmwiki/pmwiki.php/UsefulNotes/PlayStation"><span data-dcnode-id="5272" instrument_node="">PlayStation</span></a><span data-dcnode-id="5270" instrument_node=""> RPG, </span><em data-dcnode-id="5267"><a class="twikilink" data-dcnode-id="5268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyVII" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyVII"><span data-dcnode-id="5269" instrument_node="">Final Fantasy VII</span></a></em><span data-dcnode-id="5266" instrument_node="">, developed by </span><a class="twikilink" data-dcnode-id="5264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/SquareEnix" title="/pmwiki/pmwiki.php/Creator/SquareEnix"><span data-dcnode-id="5265" instrument_node="">Square Enix</span></a><span data-dcnode-id="5263" instrument_node=""> for the </span><a class="twikilink" data-dcnode-id="5261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/PlayStation4" title="/pmwiki/pmwiki.php/UsefulNotes/PlayStation4"><span data-dcnode-id="5262" instrument_node="">PlayStation 4</span></a><span data-dcnode-id="5260" instrument_node="">. It is the fifth entry in the </span><em data-dcnode-id="5257"><a class="twikilink" data-dcnode-id="5258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/CompilationOfFinalFantasyVII" title="/pmwiki/pmwiki.php/Franchise/CompilationOfFinalFantasyVII"><span data-dcnode-id="5259" instrument_node="">Compilation of Final Fantasy VII</span></a></em><span data-dcnode-id="5256" instrument_node=""> and the first one in nearly 11 years, with the last entry being </span><em data-dcnode-id="5253"><a class="twikilink" data-dcnode-id="5254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/FinalFantasyVIIAdventChildren" title="/pmwiki/pmwiki.php/Anime/FinalFantasyVIIAdventChildren"><span data-dcnode-id="5255" instrument_node="">Final Fantasy VII Advent Children Complete</span></a></em><span data-dcnode-id="5252" instrument_node=""> released in 2009. Multiple members of the original </span><em data-dcnode-id="5250"><span data-dcnode-id="5251" instrument_node="">FFVII</span></em><span data-dcnode-id="5249" instrument_node=""> team are involved in the remake, including Yoshinori Kitase, </span><a class="twikilink" data-dcnode-id="5247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TetsuyaNomura" title="/pmwiki/pmwiki.php/Creator/TetsuyaNomura"><span data-dcnode-id="5248" instrument_node="">Tetsuya Nomura</span></a><span data-dcnode-id="5246" instrument_node="">, and Kazushige Nojima. External developer </span><a class="twikilink" data-dcnode-id="5244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/CyberConnect2" title="/pmwiki/pmwiki.php/Creator/CyberConnect2"><span data-dcnode-id="5245" instrument_node="">CyberConnect2</span></a><span data-dcnode-id="5243" instrument_node=""> originally worked on the game, until Square Enix moved the game's development in-house.</span></p><p data-dcnode-id="5208"><em data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">Remake</span></em><span data-dcnode-id="5239" instrument_node=""> takes yet another step closer towards Square's dreams of making </span><em data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">Advent Children</span></em><span data-dcnode-id="5236" instrument_node="">'s cinematic combat a player-controlled experience. Abandoning its turn-based roots, the game goes full </span><a class="twikilink" data-dcnode-id="5234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealTimeWithPause" title="/pmwiki/pmwiki.php/Main/RealTimeWithPause"><span data-dcnode-id="5235" instrument_node="">Real-Time with Pause</span></a><span data-dcnode-id="5233" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActionRPG" title="/pmwiki/pmwiki.php/Main/ActionRPG"><span data-dcnode-id="5232" instrument_node="">Action RPG</span></a><span data-dcnode-id="5230" instrument_node="">. There's a </span><a class="twikilink" data-dcnode-id="5228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManualLeaderAIParty" title="/pmwiki/pmwiki.php/Main/ManualLeaderAIParty"><span data-dcnode-id="5229" instrument_node="">Manual Leader, A.I. Party</span></a><span data-dcnode-id="5227" instrument_node="">, and players are limited to attacking, dodging, parrying, using each character's </span><a class="twikilink" data-dcnode-id="5225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SignatureMove" title="/pmwiki/pmwiki.php/Main/SignatureMove"><span data-dcnode-id="5226" instrument_node="">Signature Move</span></a><span data-dcnode-id="5224" instrument_node=""> (Cloud's </span><a class="twikilink" data-dcnode-id="5222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StanceSystem" title="/pmwiki/pmwiki.php/Main/StanceSystem"><span data-dcnode-id="5223" instrument_node="">Stance System</span></a><span data-dcnode-id="5221" instrument_node="">, Tifa's </span><a class="twikilink" data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChargedAttack" title="/pmwiki/pmwiki.php/Main/ChargedAttack"><span data-dcnode-id="5220" instrument_node="">Charged Attack</span></a><span data-dcnode-id="5218" instrument_node="">, etc), and switching to control of another character. To use Materia, Items, </span><a class="twikilink" data-dcnode-id="5216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SummonMagic" title="/pmwiki/pmwiki.php/Main/SummonMagic"><span data-dcnode-id="5217" instrument_node="">Summon Magic</span></a><span data-dcnode-id="5215" instrument_node=""> and other abilities, characters must expend a charge from their segmented ATB bar, which fills with attacks, parries and time. The game enters </span><a class="twikilink" data-dcnode-id="5213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BulletTime" title="/pmwiki/pmwiki.php/Main/BulletTime"><span data-dcnode-id="5214" instrument_node="">Bullet Time</span></a><span data-dcnode-id="5212" instrument_node=""> while the player is issuing orders. The ATB bar forms the heart of the combat engine's tension: you can take the safe, slow way and dodge a lot, or you can rush in... and expose yourself to counterattack. Each foe also has a </span><a class="twikilink" data-dcnode-id="5210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakMeter" title="/pmwiki/pmwiki.php/Main/BreakMeter"><span data-dcnode-id="5211" instrument_node="">Break Meter</span></a><span data-dcnode-id="5209" instrument_node=""> to exploit.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="5202"><span class="ad-caption" data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">Advertisement:</span></span><div data-dcnode-id="5203" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="5177"><em data-dcnode-id="5200"><span data-dcnode-id="5201" instrument_node="">Remake</span></em><span data-dcnode-id="5199" instrument_node=""> features new exploration systems, completely new graphics in Unreal Engine 4, new assets, redesigned areas, additional characters, </span><a class="twikilink" data-dcnode-id="5197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvolvingWeapon" title="/pmwiki/pmwiki.php/Main/EvolvingWeapon"><span data-dcnode-id="5198" instrument_node="">Evolving Weapons</span></a><span data-dcnode-id="5196" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="5194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EquipmentBasedProgression" title="/pmwiki/pmwiki.php/Main/EquipmentBasedProgression"><span data-dcnode-id="5195" instrument_node="">Equipment-Based Progression</span></a><span data-dcnode-id="5193" instrument_node="">, and new story content. It is also an </span><a class="twikilink" data-dcnode-id="5191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EpisodicGame" title="/pmwiki/pmwiki.php/Main/EpisodicGame"><span data-dcnode-id="5192" instrument_node="">Episodic Game</span></a><span data-dcnode-id="5190" instrument_node="">: the first installment, released worldwide on April 10, 2020, encompasses only the original game's first five or so hours. While familiar characters are swept up in a familiar story, it becomes clear that someone is trying to push the plot </span><a class="twikilink" data-dcnode-id="5188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OffTheRails" title="/pmwiki/pmwiki.php/Main/OffTheRails"><span data-dcnode-id="5189" instrument_node="">Off the Rails</span></a><span data-dcnode-id="5187" instrument_node="">, and someone else is </span><a class="twikilink" data-dcnode-id="5185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Railroading" title="/pmwiki/pmwiki.php/Main/Railroading"><span data-dcnode-id="5186" instrument_node="">Railroading</span></a><span data-dcnode-id="5184" instrument_node=""> them back into it — ending with a </span><a class="twikilink" data-dcnode-id="5182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CliffHanger" title="/pmwiki/pmwiki.php/Main/CliffHanger"><span data-dcnode-id="5183" instrument_node="">Cliffhanger</span></a><span data-dcnode-id="5181" instrument_node=""> that suggests </span><a class="twikilink" data-dcnode-id="5179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NothingIsTheSameAnymore" title="/pmwiki/pmwiki.php/Main/NothingIsTheSameAnymore"><span data-dcnode-id="5180" instrument_node="">Nothing Is the Same Anymore</span></a><span data-dcnode-id="5178" instrument_node="">... and that the plot of this re-telling may turn out to be substantially different than the original.</span></p><p data-dcnode-id="5166"><span data-dcnode-id="5176" instrument_node="">An </span><a class="twikilink" data-dcnode-id="5174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpdatedRerelease" title="/pmwiki/pmwiki.php/Main/UpdatedRerelease"><span data-dcnode-id="5175" instrument_node="">Updated Re-release</span></a><span data-dcnode-id="5173" instrument_node=""> titled </span><em data-dcnode-id="5171"><span data-dcnode-id="5172" instrument_node="">Final Fantasy VII Remake Intergrade</span></em><span data-dcnode-id="5170" instrument_node=""> for the </span><a class="twikilink" data-dcnode-id="5168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/PlayStation5" title="/pmwiki/pmwiki.php/UsefulNotes/PlayStation5"><span data-dcnode-id="5169" instrument_node="">PlayStation 5</span></a><span data-dcnode-id="5167" instrument_node=""> was announced during the State of Play broadcast on February 25, 2021. It was released on June 10 and features the new "Episode INTERmission" chapter. The PS5 version is given to PS4 players for free, though they still need the newer system to play. For those buying the PS5 version, "Episode INTERmission" is included. "Episode INTERmission" is a short sidestory centered around Yuffie as she infiltrates Midgar during the reactor bombings, carrying out a mission for her homeland of Wutai to steal a rare Materia from Shinra's possession.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="5160"><span class="ad-caption" data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">Advertisement:</span></span><div data-dcnode-id="5161" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="5150"><em data-dcnode-id="5158"><span data-dcnode-id="5159" instrument_node="">Intergrade</span></em><span data-dcnode-id="5157" instrument_node=""> was announced at the 2021 Game Awards on December 9, 2021 to be coming to </span><a class="twikilink" data-dcnode-id="5155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/WindowsGames" title="/pmwiki/pmwiki.php/UsefulNotes/WindowsGames"><span data-dcnode-id="5156" instrument_node="">Windows</span></a><span data-dcnode-id="5154" instrument_node=""> PC via the </span><a class="twikilink" data-dcnode-id="5152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/EpicGamesStore" title="/pmwiki/pmwiki.php/UsefulNotes/EpicGamesStore"><span data-dcnode-id="5153" instrument_node="">Epic Games Store</span></a><span data-dcnode-id="5151" instrument_node="">, and was released one week later on December 16.</span></p><p data-dcnode-id="5144"><span data-dcnode-id="5149" instrument_node="">A tie-in novel titled </span><em data-dcnode-id="5146"><a class="twikilink" data-dcnode-id="5147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/FinalFantasyVIIRemakeTraceOfTwoPasts" title="/pmwiki/pmwiki.php/Literature/FinalFantasyVIIRemakeTraceOfTwoPasts"><span data-dcnode-id="5148" instrument_node="">Final Fantasy VII Remake Trace Of Two Pasts</span></a></em><span data-dcnode-id="5145" instrument_node=""> was released on July 15, 2021 and is available in Japanese only. It explores Tifa and Aerith's pasts.</span></p><p data-dcnode-id="5102"><span data-dcnode-id="5143" instrument_node="">Previews: </span><a class="urllink" data-dcnode-id="5140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DKznek1uNVsg"><span data-dcnode-id="5142" instrument_node="">Teaser</span><img data-dcnode-id="5141" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5139" instrument_node="">, </span><a class="urllink" data-dcnode-id="5136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DA3sBZ5Nr4hc"><span data-dcnode-id="5138" instrument_node="">PSX 2015 Gameplay trailer</span><img data-dcnode-id="5137" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5135" instrument_node="">, </span><a class="urllink" data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DqOn2bWuA_0w"><span data-dcnode-id="5134" instrument_node="">2019 State of Play trailer</span><img data-dcnode-id="5133" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5131" instrument_node="">, </span><a class="urllink" data-dcnode-id="5128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DaTCmN8TtkgQ"><span data-dcnode-id="5130" instrument_node="">2019 Orchestra Trailer</span><img data-dcnode-id="5129" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5127" instrument_node="">, </span><a class="urllink" data-dcnode-id="5124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DpCJZg7pVtiI"><span data-dcnode-id="5126" instrument_node="">E3 trailer</span><img data-dcnode-id="5125" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5123" instrument_node="">, </span><a class="urllink" data-dcnode-id="5120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/GBpq_Jq7yn0"><span data-dcnode-id="5122" instrument_node="">Tokyo Game Show 2019 Trailer</span><img data-dcnode-id="5121" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5119" instrument_node="">, </span><a class="urllink" data-dcnode-id="5116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DeHdaWMP7D2s"><span data-dcnode-id="5118" instrument_node="">The Game Awards 2019 Trailer</span><img data-dcnode-id="5117" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5115" instrument_node="">, </span><a class="urllink" data-dcnode-id="5112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D3alSpW18SnE"><span data-dcnode-id="5114" instrument_node="">Theme Song Trailer</span><img data-dcnode-id="5113" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5111" instrument_node="">, </span><a class="urllink" data-dcnode-id="5108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D8IrheLf0Ki0"><span data-dcnode-id="5110" instrument_node="">Opening Movie</span><img data-dcnode-id="5109" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5107" instrument_node="">, </span><a class="urllink" data-dcnode-id="5104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D72Y7DplcyR8"><span data-dcnode-id="5106" instrument_node="">Final Trailer</span><img data-dcnode-id="5105" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5103" instrument_node="">.</span></p><p data-dcnode-id="5101"></p><hr data-dcnode-id="5100"><h2 data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">The game contains examples of:</span></h2><div class="folderlabel toggle-all-folders-button" data-dcnode-id="5096" onclick="toggleAllFolders();"><span data-dcnode-id="5097" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><div class="folderlabel" data-dcnode-id="5094" onclick="togglefolder('folder0');"><span data-dcnode-id="5095" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;A-F&nbsp;</span></div><div class="folder" data-dcnode-id="3706" id="folder0" isfolder="true" style="display:block;"><ul data-dcnode-id="3874"><li data-dcnode-id="5080"><span data-dcnode-id="5093" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsurdlyHighLevelCap" title="/pmwiki/pmwiki.php/Main/AbsurdlyHighLevelCap"><span data-dcnode-id="5092" instrument_node="">Absurdly High Level Cap</span></a><span data-dcnode-id="5090" instrument_node="">: The maximum level is 50, in a game where the player will be around level 35 when facing the </span><a class="twikilink" data-dcnode-id="5088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="5089" instrument_node="">Final Boss</span></a><span data-dcnode-id="5087" instrument_node="">, even if they did all of the sidequests and optional content. </span><a class="twikilink" data-dcnode-id="5085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="5086" instrument_node="">New Game+</span></a><span data-dcnode-id="5084" instrument_node=""> even includes a flat </span><a class="twikilink" data-dcnode-id="5082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExperienceBooster" title="/pmwiki/pmwiki.php/Main/ExperienceBooster"><span data-dcnode-id="5083" instrument_node="">Experience Booster</span></a><span data-dcnode-id="5081" instrument_node=""> to make reaching this cap a little easier.</span></li><li data-dcnode-id="5075"><span data-dcnode-id="5079" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsurdlyLongStairway" title="/pmwiki/pmwiki.php/Main/AbsurdlyLongStairway"><span data-dcnode-id="5078" instrument_node="">Absurdly Long Stairway</span></a><span data-dcnode-id="5076" instrument_node="">: The choice between either taking the elevator or climbing a ridiculously long staircase at the Shinra Headquarters returns. However, a new version of the scenario and dialogue is presented, providing new entertainment for those who make the choice to venture up all those stairs.</span></li><li data-dcnode-id="5062"><span data-dcnode-id="5074" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsurdlySharpBlade" title="/pmwiki/pmwiki.php/Main/AbsurdlySharpBlade"><span data-dcnode-id="5073" instrument_node="">Absurdly Sharp Blade</span></a><span data-dcnode-id="5071" instrument_node="">:</span><ul data-dcnode-id="5063"><li data-dcnode-id="5066"><span data-dcnode-id="5070" instrument_node=""> Sephiroth effortlessly cuts through a metal catwalk with his Masamune — a </span><em data-dcnode-id="5068"><span data-dcnode-id="5069" instrument_node="">nodachi</span></em><span data-dcnode-id="5067" instrument_node=""> longer than he is tall.</span></li><li data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node=""> Cloud's swords are capable of effortlessly slicing through steel and concrete without losing their edge.</span></li></ul></li><li data-dcnode-id="5057"><span data-dcnode-id="5061" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsurdlySpaciousSewer" title="/pmwiki/pmwiki.php/Main/AbsurdlySpaciousSewer"><span data-dcnode-id="5060" instrument_node="">Absurdly Spacious Sewer</span></a><span data-dcnode-id="5058" instrument_node="">: Chapter 10, Rough Waters, takes place in the run-down monster-infested labyrinth of tunnels and cisterns beneath Midgar.</span></li><li data-dcnode-id="5049"><span data-dcnode-id="5056" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AcceptableBreaksFromReality" title="/pmwiki/pmwiki.php/Main/AcceptableBreaksFromReality"><span data-dcnode-id="5055" instrument_node="">Acceptable Breaks from Reality</span></a><span data-dcnode-id="5053" instrument_node="">: The game allows you to change the equipment and Materia of characters not in the party, or remove them entirely. As the alternative would be </span><a class="twikilink" data-dcnode-id="5051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoLongAndThanksForAllTheGear" title="/pmwiki/pmwiki.php/Main/SoLongAndThanksForAllTheGear"><span data-dcnode-id="5052" instrument_node="">characters taking their stuff with them</span></a><span data-dcnode-id="5050" instrument_node="">, this allowance prevents players from losing valuable gear for prolonged periods of gameplay.</span></li><li data-dcnode-id="5030"><span data-dcnode-id="5048" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActionRPG" title="/pmwiki/pmwiki.php/Main/ActionRPG"><span data-dcnode-id="5047" instrument_node="">Action RPG</span></a><span data-dcnode-id="5045" instrument_node="">: Plays this way </span><em data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">à la</span></em><span data-dcnode-id="5042" instrument_node=""> </span><em data-dcnode-id="5039"><a class="twikilink" data-dcnode-id="5040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyXV" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyXV"><span data-dcnode-id="5041" instrument_node="">Final Fantasy XV</span></a></em><span data-dcnode-id="5038" instrument_node=""> and </span><em data-dcnode-id="5035"><a class="twikilink" data-dcnode-id="5036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/KingdomHearts" title="/pmwiki/pmwiki.php/Franchise/KingdomHearts"><span data-dcnode-id="5037" instrument_node="">Kingdom Hearts</span></a></em><span data-dcnode-id="5034" instrument_node="">. Normal gameplay flows seamlessly into battle with enemies, players can freely move their character around the battlefield attacking, blocking, and dodging in real-time. Opening the menu to issue special commands like Abilities, Magic, and Items triggers </span><a class="twikilink" data-dcnode-id="5032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BulletTime" title="/pmwiki/pmwiki.php/Main/BulletTime"><span data-dcnode-id="5033" instrument_node="">Bullet Time</span></a><span data-dcnode-id="5031" instrument_node=""> while the player inputs their selection.</span></li><li data-dcnode-id="5020"><span data-dcnode-id="5029" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationalBadass" title="/pmwiki/pmwiki.php/Main/AdaptationalBadass"><span data-dcnode-id="5028" instrument_node="">Adaptational Badass</span></a><span data-dcnode-id="5026" instrument_node="">: The country of Wutai becomes this via their new lore. It was established in the original game that it lost the war with Midgar, fell under Shinra imperialism, then steadily robbed of its resources until reduced to a mere shadow of its former self; a struggling vassal state forced to rely on tourism to keep its economy afloat, far too weak to be of anymore concern to its oppressive conquerors. The remake takes a radically different approach by portraying the Midgar/Wutai war as only recently "resolved" between the two countries, and Wutai still poses a threat to Shinra's present day activities through terrorism. How much of this is propaganda and how much is truth is unknown, but </span><span class="spoiler" data-dcnode-id="5021" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5025" instrument_node="">Avalanche (the main group, not Barret's splinter faction) </span><em data-dcnode-id="5023"><span data-dcnode-id="5024" instrument_node="">are</span></em><span data-dcnode-id="5022" instrument_node=""> tied to and supplied by Wutai.</span></span></li><li data-dcnode-id="4997"><span data-dcnode-id="5019" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationalUgliness" title="/pmwiki/pmwiki.php/Main/AdaptationalUgliness"><span data-dcnode-id="5018" instrument_node="">Adaptational Ugliness</span></a><span data-dcnode-id="5016" instrument_node="">: Various characters are a bit less attractive than their extremely pretty </span><em data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">Compilation of Final Fantasy VII</span></em><span data-dcnode-id="5013" instrument_node=""> designs, bringing them more in line with </span><a class="twikilink" data-dcnode-id="5011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TruerToTheText" title="/pmwiki/pmwiki.php/Main/TruerToTheText"><span data-dcnode-id="5012" instrument_node="">what the characters were originally conceived to be like</span></a><span data-dcnode-id="5010" instrument_node="">:</span><ul data-dcnode-id="4998"><li data-dcnode-id="5005"><span data-dcnode-id="5009" instrument_node=""> Cloud, who is described in the original game as attractive but intimidating, is still pretty, but his often-described </span><a class="twikilink" data-dcnode-id="5007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreepyBlueEyes" title="/pmwiki/pmwiki.php/Main/CreepyBlueEyes"><span data-dcnode-id="5008" instrument_node="">Creepy Blue Eyes</span></a><span data-dcnode-id="5006" instrument_node=""> do have a subtle glow here. He's overall a stern, imposing presence. He still looks somewhat soft, but there's no doubt that he's threatening when he wants to be.</span></li><li data-dcnode-id="4999"><span data-dcnode-id="5004" instrument_node=""> Barret, compared to his hunky </span><em data-dcnode-id="5001"><a class="twikilink" data-dcnode-id="5002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/FinalFantasyVIIAdventChildren" title="/pmwiki/pmwiki.php/Anime/FinalFantasyVIIAdventChildren"><span data-dcnode-id="5003" instrument_node="">Advent Children</span></a></em><span data-dcnode-id="5000" instrument_node=""> look, has more prominent and disfiguring facial scars, harder facial features, and musculature with more veins. His gun arm also looks more like a rough amputation and a hack job.</span></li></ul></li><li data-dcnode-id="4989"><span data-dcnode-id="4996" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationDeviation" title="/pmwiki/pmwiki.php/Main/AdaptationDeviation"><span data-dcnode-id="4995" instrument_node="">Adaptation Deviation</span></a><span data-dcnode-id="4993" instrument_node="">: The party do not </span><span class="spoiler" data-dcnode-id="4991" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4992" instrument_node="">get captured and arrested in the Shinra tower after rescuing Aerith; in fact, they instead take shelter in Aerith's old room after Cloud has an episode</span></span><span data-dcnode-id="4990" instrument_node="">.</span></li><li data-dcnode-id="4950"><span data-dcnode-id="4988" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationExpansion" title="/pmwiki/pmwiki.php/Main/AdaptationExpansion"><span data-dcnode-id="4987" instrument_node="">Adaptation Expansion</span></a><span data-dcnode-id="4985" instrument_node="">: The game as a whole expands on the original scenario with new areas, new character interactions, new scenarios, etc.</span><ul data-dcnode-id="4951"><li data-dcnode-id="4980"><span data-dcnode-id="4984" instrument_node=""> Jessie, Biggs, and Wedge, get much more screen time than in the original game to show off more personality and dynamics, and Jessie gets a healthy amount of </span><a class="twikilink" data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShipTease" title="/pmwiki/pmwiki.php/Main/ShipTease"><span data-dcnode-id="4983" instrument_node="">Ship Tease</span></a><span data-dcnode-id="4981" instrument_node=""> with Cloud. An early chapter has a new motorcycle section, with Jessie riding behind Cloud as they flee from Shinra soldiers down a set of train tracks.</span></li><li data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node=""> Sephiroth shows up much earlier, as Cloud is escaping Sector 8, and Cloud experiences hallucinations and flashbacks much earlier as well, the first occurring while setting the bomb in the reactor.</span></li><li data-dcnode-id="4973"><span data-dcnode-id="4977" instrument_node=""> There is an entire subplot added regarding the Arbiters of Fate, shadowy figures who are </span><a class="twikilink" data-dcnode-id="4975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InvisibleToNormals" title="/pmwiki/pmwiki.php/Main/InvisibleToNormals"><span data-dcnode-id="4976" instrument_node="">Invisible to Normals</span></a><span data-dcnode-id="4974" instrument_node="">, and control destiny itself.</span></li><li data-dcnode-id="4968"><span data-dcnode-id="4972" instrument_node=""> Tifa has new dialogue in which she expresses discomfort with the lengths that the other members of Avalanche are willing to go to, telling Cloud she feels </span><a class="twikilink" data-dcnode-id="4970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SadisticChoice" title="/pmwiki/pmwiki.php/Main/SadisticChoice"><span data-dcnode-id="4971" instrument_node="">trapped between two impossible choices</span></a><span data-dcnode-id="4969" instrument_node=""> — letting the planet die by doing nothing, or helping to hurt and kill people by doing something.</span></li><li data-dcnode-id="4963"><span data-dcnode-id="4967" instrument_node=""> Cloud, Barret, and Tifa having to jump from the train to make their way to the Sector 5 reactor is just a short series of screens in the original. Here, it gets its own chapter, where they are hunted by Heidegger who is remotely directing efforts to have them found. The period below the plate is also significantly longer, and </span><a class="twikilink" data-dcnode-id="4965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustForPun" title="/pmwiki/pmwiki.php/Main/JustForPun"><span data-dcnode-id="4966" instrument_node="">sheds light</span></a><span data-dcnode-id="4964" instrument_node=""> on how the slums operate with a plate blocking the sun constantly.</span></li><li data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node=""> The idea that Mako is the life of the planet, and that people's souls return to the planet upon dying, was all sorta just accepted in the original game. In the remake, all of these ideas are treated more like a religion, specifically being called "Planetology", and some characters seem to consider it BS. Likewise, the writings of the Cetra are explicitly referred to as scripture, with Tseng talking about how writings of the "Promised Land" are alternately considered either just fairy tales or allegorical instead of a physical place.</span></li><li data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node=""> In the original game, the Train Graveyard is just a short area Cloud, Aerith, and Tifa cross on their return to Sector 7, notable for having a bunch of undead enemies. Here it's expanded into its own chapter with backstory about children having gone missing in the graveyard, the ghosts of those children playing pranks on them, and the trio confronting the monster that's been killing the children.</span></li><li data-dcnode-id="4954"><span data-dcnode-id="4958" instrument_node=""> In the original game, Tifa told Aerith to go to Seventh Heaven and save Marlene before the Sector 7 plate fell, and Aerith got Marlene out off-screen. In </span><em data-dcnode-id="4956"><span data-dcnode-id="4957" instrument_node="">Remake</span></em><span data-dcnode-id="4955" instrument_node="">, this section is playable, and it shows how Marlene was able to get out so fast: a deal with Tseng to come along quietly with Shinra in exchange for Marlene's safety.</span></li><li data-dcnode-id="4952"><span data-dcnode-id="4953" instrument_node=""> Tifa gets an entire chapter where she helps Cloud get settled into Sector 7 and set up his reputation as a mercenary. Aerith similarly gets a section where Cloud accompanies her in Sector 5 as she helps the locals.</span></li></ul></li><li data-dcnode-id="4932"><span data-dcnode-id="4949" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationNameChange" title="/pmwiki/pmwiki.php/Main/AdaptationNameChange"><span data-dcnode-id="4948" instrument_node="">Adaptation Name Change</span></a><span data-dcnode-id="4946" instrument_node="">: Many spells and commands were renamed from the original game's localization. This is in part with modern naming conventions for the </span><em data-dcnode-id="4944"><span data-dcnode-id="4945" instrument_node="">FF</span></em><span data-dcnode-id="4943" instrument_node=""> franchise as a whole, which steadily began with the localization of </span><em data-dcnode-id="4940"><a class="twikilink" data-dcnode-id="4941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyVIII" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyVIII"><span data-dcnode-id="4942" instrument_node="">FFVIII</span></a></em><span data-dcnode-id="4939" instrument_node="">, released in 1999. In turn, </span><em data-dcnode-id="4937"><span data-dcnode-id="4938" instrument_node="">Remake</span></em><span data-dcnode-id="4936" instrument_node=""> keeps up these consistencies, one of which being the </span><em data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">FF</span></em><span data-dcnode-id="4933" instrument_node=""> naming system of spell tiers. As an example, the 2 last tiers of standard fire spells are no longer called "Fire2" and "Fire3" like in the original game. They're now called "Fira" and "Firaga" respectively.</span></li><li data-dcnode-id="4887"><span data-dcnode-id="4931" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationalEarlyAppearance" title="/pmwiki/pmwiki.php/Main/AdaptationalEarlyAppearance"><span data-dcnode-id="4930" instrument_node="">Adaptational Early Appearance</span></a><span data-dcnode-id="4928" instrument_node="">:</span><ul data-dcnode-id="4888"><li data-dcnode-id="4923"><span data-dcnode-id="4927" instrument_node=""> In the original game, you don't receive your first summoning materia until after leaving Midgar. In the remake, you get your first one before you even go to bomb the second reactor. And on top of that, your first summoning materia is Ifrit instead of Choco Mog. (The Summons provided by the Deluxe Edition and pre-order bonuses are a variant — you can unlock them at the very beginning of the game, but </span><a class="twikilink" data-dcnode-id="4925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation" title="/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation"><span data-dcnode-id="4926" instrument_node="">for the purposes of the plot</span></a><span data-dcnode-id="4924" instrument_node="">, characters will not acknowledge that Cloud is using the Carbuncle, Chocobo Chick or Cactuar, and will instead speak to him as if he'd never used one before.</span></li><li data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node=""> The Nail Bat, previously found in the Temple of the Ancients, appears here as a reward from the kids of Aerith's hometown after you defeat the "Toad King".</span></li><li data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node=""> The cloak-wearing Sephiroth Clones didn't appear as such in the original game until your party reached Nibelheim, though an uncloaked one appeared with ambigious foreshadowing (he's the "This guy are sick" guy, he's uncloaked but has a number tattoo.) Here, two are shown inhabiting the slums beneath Midgar.</span></li><li data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node=""> Sephiroth himself. It's easy to forget considering how famous he is now as one of video gaming's most iconic villains and his many, many appearances in spinoff media, but in the original game he wasn't so much as mentioned until the plot had gotten quite underway, and an actual appearance from him came even later. Here, he's already appeared and spoken in Chapter 2 in Cloud's hallucinations, and continues to make regular appearances until the end.</span></li><li data-dcnode-id="4910"><span data-dcnode-id="4916" instrument_node=""> Jenova. While its physical body first appears as it did in the original game in the Shinra HQ, </span><span class="spoiler" data-dcnode-id="4911" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4915" instrument_node="">the </span><em data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">Remake</span></em><span data-dcnode-id="4912" instrument_node=""> adds an original boss battle against "Jenova Dreamweaver" in President Shinra's office; the first incarnation of Jenova fought against in the 1997 game didn't happen until crossing the ocean much later.</span></span></li><li data-dcnode-id="4902"><span data-dcnode-id="4909" instrument_node=""> In the </span><em data-dcnode-id="4907"><span data-dcnode-id="4908" instrument_node="">Intergrade</span></em><span data-dcnode-id="4906" instrument_node=""> DLC, Yuffie Kisaragi appears in Midgar around the same time as the opening hours of the original game and </span><a class="twikilink" data-dcnode-id="4904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroOfAnotherStory" title="/pmwiki/pmwiki.php/Main/HeroOfAnotherStory"><span data-dcnode-id="4905" instrument_node="">goes on her own adventures with some new characters</span></a><span data-dcnode-id="4903" instrument_node="">.</span></li><li data-dcnode-id="4889"><span data-dcnode-id="4901" instrument_node=""> Also in </span><em data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">Intergrade,</span></em><span data-dcnode-id="4898" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4894" title="you can set spoilers visible by default on your profile"><em data-dcnode-id="4896"><span data-dcnode-id="4897" instrument_node="">Deepground</span></em><span data-dcnode-id="4895" instrument_node=""> of all people, including Weiss</span></span><span data-dcnode-id="4893" instrument_node=""> appear even though they wouldn't show up until </span><a class="twikilink" data-dcnode-id="4891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DirgeOfCerberus" title="/pmwiki/pmwiki.php/VideoGame/DirgeOfCerberus"><span data-dcnode-id="4892" instrument_node="">a certain spinoff</span></a><span data-dcnode-id="4890" instrument_node="">.</span></li></ul></li><li data-dcnode-id="4873"><span data-dcnode-id="4886" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationalModesty" title="/pmwiki/pmwiki.php/Main/AdaptationalModesty"><span data-dcnode-id="4885" instrument_node="">Adaptational Modesty</span></a><span data-dcnode-id="4883" instrument_node="">: Tifa's updated appearance plays with this. She has a visible black sports bra on under her white tank top, black </span><a class="twikilink" data-dcnode-id="4881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ModestyShorts" title="/pmwiki/pmwiki.php/Main/ModestyShorts"><span data-dcnode-id="4882" instrument_node="">bike shorts</span></a><span data-dcnode-id="4880" instrument_node=""> under her skirt, and her original short socks have been replaced with black thigh-highs that send her into Grade A </span><a class="twikilink" data-dcnode-id="4878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZettaiRyouiki" title="/pmwiki/pmwiki.php/Main/ZettaiRyouiki"><span data-dcnode-id="4879" instrument_node="">Zettai Ryouiki</span></a><span data-dcnode-id="4877" instrument_node=""> territory. That being said, her new tops still cover as much as her original did in regards to her cleavage, cover </span><em data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">less</span></em><span data-dcnode-id="4874" instrument_node=""> in regards to her midriff, and her new thigh-highs still show off her shapely legs.</span></li><li data-dcnode-id="4862"><span data-dcnode-id="4872" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationalNiceGuy" title="/pmwiki/pmwiki.php/Main/AdaptationalNiceGuy"><span data-dcnode-id="4871" instrument_node="">Adaptational Nice Guy</span></a><span data-dcnode-id="4869" instrument_node="">: Barret. While the original version genuinely cared for his fellow AVALANCHE members, he tended to be harsh with them, calling them "screw-ups" after their </span><em data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">successful</span></em><span data-dcnode-id="4866" instrument_node=""> reactor bombing mission, reacting with anger when Wedge asked about his pay and sending Biggs flying during an impromptu sparring session back at their hideout. Here, Barret is far more pleasant and openly affectionate with his crew. He also intended for them to simply sabotage Reactor 1's Mako pump, rather than blow up the whole reactor like in the original; it got blown up anyway because </span><a class="twikilink" data-dcnode-id="4864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseFlagOperation" title="/pmwiki/pmwiki.php/Main/FalseFlagOperation"><span data-dcnode-id="4865" instrument_node="">Shinra was setting them up</span></a><span data-dcnode-id="4863" instrument_node="">.</span></li><li data-dcnode-id="4854"><span data-dcnode-id="4861" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AerithAndBob" title="/pmwiki/pmwiki.php/Main/AerithAndBob"><span data-dcnode-id="4860" instrument_node="">Aerith and Bob</span></a><span data-dcnode-id="4858" instrument_node="">: With the release of Intergrade, we now have both the </span><a class="twikilink" data-dcnode-id="4856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TropeNamer" title="/pmwiki/pmwiki.php/Main/TropeNamer"><span data-dcnode-id="4857" instrument_node="">Trope Namer</span></a><span data-dcnode-id="4855" instrument_node=""> herself and the Avalanche HQ member Billy Bob.</span></li><li data-dcnode-id="4849"><span data-dcnode-id="4853" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AgentPeacock" title="/pmwiki/pmwiki.php/Main/AgentPeacock"><span data-dcnode-id="4852" instrument_node="">Agent Peacock</span></a><span data-dcnode-id="4850" instrument_node="">: Roche is incredibly flamboyant, hammy and spends his screentime basically flirting with Cloud as they duel. He's still a SOLDIER at the same time, and as such, dangerously skilled in combat.</span></li><li data-dcnode-id="4839"><span data-dcnode-id="4848" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllForNothing" title="/pmwiki/pmwiki.php/Main/AllForNothing"><span data-dcnode-id="4847" instrument_node="">All for Nothing</span></a><span data-dcnode-id="4845" instrument_node="">:</span><ul data-dcnode-id="4840"><li data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node=""> In the first half of Chapter 9, Cloud and Aerith detour through the destroyed Sector 6 Expressway to avoid going through Wall Market. Then Don Corneo gets his hands on Tifa, and they end up heading to Wall Market anyway.</span></li><li data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node=""> The entire Corneo subplot ends up being a waste of time. Tifa, Could, and Aerith spend an entire day trying to get intel on what Corneo knows, but by the time they get back to Sector 7, the entire Avalanche organization already knows the villains' plot and is actively fighting Shinra's attack. The heroes are too late to save most of their group and fail. If they had been there at the beginning, things might have been different.</span></li></ul></li><li data-dcnode-id="4831"><span data-dcnode-id="4838" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndNowForSomeoneCompletelyDifferent" title="/pmwiki/pmwiki.php/Main/AndNowForSomeoneCompletelyDifferent"><span data-dcnode-id="4837" instrument_node="">And Now for Someone Completely Different</span></a><span data-dcnode-id="4835" instrument_node="">: Out of combat, the player primarily controls Cloud, even if he's not made the designated leader in the menus. As with the original </span><em data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">FFVII</span></em><span data-dcnode-id="4832" instrument_node="">, control temporarily switches over Aerith, Barret and Tifa at specific set pieces.</span></li><li data-dcnode-id="4823"><span data-dcnode-id="4830" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Antepiece" title="/pmwiki/pmwiki.php/Main/Antepiece"><span data-dcnode-id="4829" instrument_node="">Antepiece</span></a><span data-dcnode-id="4827" instrument_node="">: The bike chase contains several of them. The first few enemies are easy to beat, allowing you to get the hang of the controls for the sequence while taking them out. Then, an armored truck pulls up which targets you with a machine gun, letting you know both that there will be enemies that take several hits to defeat as well as showing you that there will be things you need to dodge. Finally, just before reaching the tunnel, a helicopter fires warning shots to let you see </span><a class="twikilink" data-dcnode-id="4825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrosshairAware" title="/pmwiki/pmwiki.php/Main/CrosshairAware"><span data-dcnode-id="4826" instrument_node="">how its shots work and how they're going to land</span></a><span data-dcnode-id="4824" instrument_node="">. Red XIII fully heals you when you get to the tunnel, which is where the training wheels come off and multiple elements you just learned about get thrown at you all at once.</span></li><li data-dcnode-id="4778"><span data-dcnode-id="4822" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures" title="/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures"><span data-dcnode-id="4821" instrument_node="">Anti-Frustration Features</span></a><span data-dcnode-id="4819" instrument_node="">:</span><ul data-dcnode-id="4779"><li data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node=""> The game tracks progress for battle intel records even if you haven't unlocked the battle intel quest yet. Thus, it's potentially possible to complete a battle intel quest as soon as you get it if you've already incidentally fulfilled all of the requirements.</span></li><li data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node=""> During cutscenes that precede a boss battle, a button prompt will appear asking if you wish to access the menu. If you do, you're given access to the menu just as the fight begins, giving you a chance to change your equipment or upgrade your weapons, since you won't be able to do that once the fight starts. This is particularly handy during consecutive battles that are fought with different parties that don't give you a chance otherwise to change your equipment. Reloading the checkpoint also loads from this moment, in case you forgot to swap or changed your mind.</span></li><li data-dcnode-id="4813"><span data-dcnode-id="4814" instrument_node=""> Every time a new weapon is acquired, it automatically has the current max amount of SP gained, allowing you to use them right away with no issues. Also, the materia you have equipped is automatically transferred to the new weapon if you want, provided it has enough slots to fit everything.</span></li><li data-dcnode-id="4808"><span data-dcnode-id="4812" instrument_node=""> During periods where you can't use your full party, they still gain levels and SP, allowing them to stay up to date in power and avoid a situation where they </span><a class="twikilink" data-dcnode-id="4810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CantCatchUp" title="/pmwiki/pmwiki.php/Main/CantCatchUp"><span data-dcnode-id="4811" instrument_node="">Can't Catch Up</span></a><span data-dcnode-id="4809" instrument_node="">.</span></li><li data-dcnode-id="4803"><span data-dcnode-id="4807" instrument_node=""> The game hands you the Assess Materia (the equivalent of Libra/Scan) early on, letting you view an enemy's weaknesses, affinities, stats, and advising on how to approach fighting them. Assess will also specifically point out, with different-colored text to catch your attention, if an opponent has an attack you can learn with the Enemy Skill Materia as well as the one time a boss has a unique weapon to Steal (</span><span class="spoiler" data-dcnode-id="4805" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4806" instrument_node="">Eligor has the Bladed Staff for Aerith, and it's the only place you can get it</span></span><span data-dcnode-id="4804" instrument_node="">).</span></li><li data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node=""> Unlike other close-quarter fighters, a melee-equipped Barret can't leap up in the air to deal with flying enemies. So the game allows him to use his ranged abilities with his melee-type arms to shoot enemies anyway.</span></li><li data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node=""> A sidequest in Chapter 14 requires you to find three specific items from other locations for a doctor. You can find these items even if you haven't acquired the sidequest yet, saving the need to backtrack to an area you've already done everything else in.</span></li><li data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node=""> If you take a long time on a puzzle, like the robot arm puzzle with Aerith, the game will give you a hint on how to solve it so you don't remain stuck.</span></li><li data-dcnode-id="4795"><span data-dcnode-id="4796" instrument_node=""> If you fail the stealth mini-game of sneaking out of Aerith's house too many times, the game will remove some of the obstacles you have to avoid so that it's easier to complete.</span></li><li data-dcnode-id="4787"><span data-dcnode-id="4794" instrument_node=""> Whenever you die, you're given several options on where to retry. Retrying the current fight usually puts you at the position right before it so you can change your equipment. You can also retry from the last checkpoint or load your last save file. Died at the end of a </span><a class="twikilink" data-dcnode-id="4792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SequentialBoss" title="/pmwiki/pmwiki.php/Main/SequentialBoss"><span data-dcnode-id="4793" instrument_node="">sequence of bosses</span></a><span data-dcnode-id="4791" instrument_node="">? You can retry the current fight or start at the very first one. The penultimate battle is one major exception as there are no checkpoints; lose at any point and you'll find yourself at the game's final </span><a class="twikilink" data-dcnode-id="4789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PointOfNoReturn" title="/pmwiki/pmwiki.php/Main/PointOfNoReturn"><span data-dcnode-id="4790" instrument_node="">Point of No Return</span></a><span data-dcnode-id="4788" instrument_node=""> to do the entire thing all over again.</span></li><li data-dcnode-id="4782"><span data-dcnode-id="4786" instrument_node=""> The Chapter Select function after beating the game allows you to go back and pick up items and quests you missed, avoiding </span><a class="twikilink" data-dcnode-id="4784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PermanentlyMissableContent" title="/pmwiki/pmwiki.php/Main/PermanentlyMissableContent"><span data-dcnode-id="4785" instrument_node="">Permanently Missable Content</span></a><span data-dcnode-id="4783" instrument_node="">. It also allows you to redo choices in the game, instead of needing to load an earlier save, or start a new game entirely.</span></li><li data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node=""> For those who disliked the motorcycle minigame, the game allows you skip the segment in subsequent playthroughs even on Hard Mode without missing any rewards from beating it.</span></li></ul></li><li data-dcnode-id="4773"><span data-dcnode-id="4777" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArbitraryHeadcountLimit" title="/pmwiki/pmwiki.php/Main/ArbitraryHeadcountLimit"><span data-dcnode-id="4776" instrument_node="">Arbitrary Headcount Limit</span></a><span data-dcnode-id="4774" instrument_node="">: As in the original game, you're limited to three party members in battle at a time, even on occasions when all four of them (and Red XIII during the late-game) are present.</span></li><li data-dcnode-id="4740"><span data-dcnode-id="4772" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicensePhysics" title="/pmwiki/pmwiki.php/Main/ArtisticLicensePhysics"><span data-dcnode-id="4771" instrument_node="">Artistic License – Physics</span></a><span data-dcnode-id="4769" instrument_node="">: As per usual, Cloud's iconic </span><a class="twikilink" data-dcnode-id="4767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BFS" title="/pmwiki/pmwiki.php/Main/BFS"><span data-dcnode-id="4768" instrument_node="">BFS</span></a><span data-dcnode-id="4766" instrument_node="">, the Buster Sword, is not portrayed realistically. A </span><a class="twikilink" data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealLife" title="/pmwiki/pmwiki.php/Main/RealLife"><span data-dcnode-id="4765" instrument_node="">Real Life</span></a><span data-dcnode-id="4763" instrument_node=""> version made primarily out of aluminum, with the heavier steel only used for the cutting edge, still weighed </span><a class="urllink" data-dcnode-id="4760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DxogheZdAO18"><span data-dcnode-id="4762" instrument_node="">80 lb (36 kg)</span><img data-dcnode-id="4761" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="4759" instrument_node="">, but Cloud is seen swinging it as though it's a traditional BFS of about 7 lb (3 kg). </span><a class="twikilink" data-dcnode-id="4757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Downplayed" title="/pmwiki/pmwiki.php/Main/Downplayed"><span data-dcnode-id="4758" instrument_node="">Downplayed</span></a><span data-dcnode-id="4756" instrument_node=""> in that Cloud is explicitly a </span><a class="twikilink" data-dcnode-id="4754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperSoldier" title="/pmwiki/pmwiki.php/Main/SuperSoldier"><span data-dcnode-id="4755" instrument_node="">Super Soldier</span></a><span data-dcnode-id="4753" instrument_node=""> with Mako infusion, so </span><a class="twikilink" data-dcnode-id="4751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperStrength" title="/pmwiki/pmwiki.php/Main/SuperStrength"><span data-dcnode-id="4752" instrument_node="">Super Strength</span></a><span data-dcnode-id="4750" instrument_node=""> is not out of the question; nonetheless, it sticks out because </span><em data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">FF7</span></em><span data-dcnode-id="4747" instrument_node=""> is actually a rather hard science fiction, with </span><a class="twikilink" data-dcnode-id="4745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheLifestream" title="/pmwiki/pmwiki.php/Main/TheLifestream"><span data-dcnode-id="4746" instrument_node="">The Lifestream</span></a><span data-dcnode-id="4744" instrument_node=""> being its </span><a class="twikilink" data-dcnode-id="4742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneBigLie" title="/pmwiki/pmwiki.php/Main/OneBigLie"><span data-dcnode-id="4743" instrument_node="">One Big Lie</span></a><span data-dcnode-id="4741" instrument_node="">.</span></li><li data-dcnode-id="4729"><span data-dcnode-id="4739" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AttackOfThe50FootWhatever" title="/pmwiki/pmwiki.php/Main/AttackOfThe50FootWhatever"><span data-dcnode-id="4738" instrument_node="">Attack of the 50-Foot Whatever</span></a><span data-dcnode-id="4736" instrument_node="">: The penultimate boss, </span><span class="spoiler" data-dcnode-id="4734" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4735" instrument_node="">Whisper Harbinger</span></span><span data-dcnode-id="4733" instrument_node="">, is a colossal amalgamation of </span><span class="spoiler" data-dcnode-id="4731" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4732" instrument_node="">whispers</span></span><span data-dcnode-id="4730" instrument_node="">, formed by them in a last ditch attempt to stop Cloud and the others. It's so huge that you don't actually fight it personally, instead having to defeat the creations it summons to get you on the ground.</span></li><li data-dcnode-id="4721"><span data-dcnode-id="4728" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AttractiveBentGender" title="/pmwiki/pmwiki.php/Main/AttractiveBentGender"><span data-dcnode-id="4727" instrument_node="">Attractive Bent-Gender</span></a><span data-dcnode-id="4725" instrument_node="">: When Cloud is forced to crossdress in order to get into Don Corneo's mansion, not only is </span><a class="twikilink" data-dcnode-id="4723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CovertPervert" title="/pmwiki/pmwiki.php/Main/CovertPervert"><span data-dcnode-id="4724" instrument_node="">Aerith apparently very into it</span></a><span data-dcnode-id="4722" instrument_node="">, but several men in Wall Market make passes at him. Even Chadley is flustered if you talk to him.</span></li><li data-dcnode-id="4706"><span data-dcnode-id="4720" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AscendedExtra" title="/pmwiki/pmwiki.php/Main/AscendedExtra"><span data-dcnode-id="4719" instrument_node="">Ascended Extra</span></a><span data-dcnode-id="4717" instrument_node="">:</span><ul data-dcnode-id="4707"><li data-dcnode-id="4715"><span data-dcnode-id="4716" instrument_node=""> Biggs, Wedge, and Jessie were relatively minor characters in the original game, but throughout the first several chapters get a significant amount of development. Jessie, in particular, gets a section where her parents are shown, and her dreams of being an actress are introduced.</span></li><li data-dcnode-id="4713"><span data-dcnode-id="4714" instrument_node=""> The Hell House, Eligor, Brain Pod, and Sword Dance were basic random encounter mooks in the original game. Here, all four are boss battles.</span></li><li data-dcnode-id="4708"><span data-dcnode-id="4712" instrument_node=""> Side characters Kyrie and Leslie are the protagonists from the novel </span><em data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">The Kids are Alright: A Turks Story</span></em><span data-dcnode-id="4709" instrument_node="">. They never appeared in the original game.</span></li></ul></li><li data-dcnode-id="4701"><span data-dcnode-id="4705" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AuthorityEqualsAsskicking" title="/pmwiki/pmwiki.php/Main/AuthorityEqualsAsskicking"><span data-dcnode-id="4704" instrument_node="">Authority Equals Asskicking</span></a><span data-dcnode-id="4702" instrument_node="">: Rufus Shinra, the vice president (and eventual president) of Shinra as a whole, is brought up to a whole new level of fighting prowess. He is exceptionally skilled with a gun, being able to use it in various creative ways to knock Cloud around if you're not careful and proves to be on the same level as him despite not even being a SOLDIER.</span></li><li data-dcnode-id="4694"><span data-dcnode-id="4700" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AuthorityInNameOnly" title="/pmwiki/pmwiki.php/Main/AuthorityInNameOnly"><span data-dcnode-id="4699" instrument_node="">Authority in Name Only</span></a><span data-dcnode-id="4697" instrument_node="">: The Mayor of Midgar's responsibilities are to serve as the Shinra archivist, and to allow Shinra to pretend that the city isn't entirely corporate-owned. </span><span class="spoiler" data-dcnode-id="4695" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4696" instrument_node="">The Mayor actually helps Avalanche out of disgust at this state of affairs.</span></span></li><li data-dcnode-id="4689"><span data-dcnode-id="4693" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AwesomeButImpractical" title="/pmwiki/pmwiki.php/Main/AwesomeButImpractical"><span data-dcnode-id="4692" instrument_node="">Awesome, but Impractical</span></a><span data-dcnode-id="4690" instrument_node="">: Cloud's Nail Bat weapon gives fantastic increases to landing a critical hit. Unfortunately it has poor stats and in Punisher Mode, it will uniquely not have a combo. Instead Cloud will only do a single strike (though this can send an enemy flying back).</span></li><li data-dcnode-id="4670"><span data-dcnode-id="4688" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BackportedDevelopment" title="/pmwiki/pmwiki.php/Main/BackportedDevelopment"><span data-dcnode-id="4687" instrument_node="">Backported Development</span></a><span data-dcnode-id="4685" instrument_node="">:</span><ul data-dcnode-id="4671"><li data-dcnode-id="4680"><span data-dcnode-id="4684" instrument_node=""> Sephiroth can manifest his single black wing that he had in </span><em data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">Advent Children</span></em><span data-dcnode-id="4681" instrument_node=""> and several spin-off appearances, although he never did this in the original game.</span></li><li data-dcnode-id="4672"><span data-dcnode-id="4679" instrument_node=""> The skull tattoo on Barret's left arm is the redesign from </span><em data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">Advent Children</span></em><span data-dcnode-id="4676" instrument_node=""> and </span><em data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">Dirge of Cerberus</span></em><span data-dcnode-id="4673" instrument_node="">, rather than the original.</span></li></ul></li><li data-dcnode-id="4650"><span data-dcnode-id="4669" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassBiker" title="/pmwiki/pmwiki.php/Main/BadassBiker"><span data-dcnode-id="4668" instrument_node="">Badass Biker</span></a><span data-dcnode-id="4666" instrument_node="">:</span><ul data-dcnode-id="4651"><li data-dcnode-id="4657"><span data-dcnode-id="4665" instrument_node=""> One of the new characters is Roche, a renegade </span><a class="twikilink" data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperSoldier" title="/pmwiki/pmwiki.php/Main/SuperSoldier"><span data-dcnode-id="4664" instrument_node="">SOLDIER 3rd Class</span></a><span data-dcnode-id="4662" instrument_node=""> obsessed with motorcycles, high speeds, and battling strong opponents — earning him the nickname "Speed Demon". In the Theme Song Trailer, he is shown picking a fight with both Shinra's security officers and Avalanche and is particularly interested in dueling Cloud.</span><div class="indent" data-dcnode-id="4658"><strong data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">Roche:</span></strong><span data-dcnode-id="4659" instrument_node=""> Hahahahaha! Aren't we havin' a wonderful time kickin' the hornet's nest! You know what I want... a second dance. Just the two of us...</span></div></li><li data-dcnode-id="4652"><span data-dcnode-id="4656" instrument_node=""> Cloud is no slouch on a bike, as in Chapters 17 and 18 he pulls some insane stunts with his motorcycle that go far beyond he did in the original game or even in </span><em data-dcnode-id="4654"><span data-dcnode-id="4655" instrument_node="">Advent Children</span></em><span data-dcnode-id="4653" instrument_node="">.</span></li></ul></li><li data-dcnode-id="4640"><span data-dcnode-id="4649" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassLongcoat" title="/pmwiki/pmwiki.php/Main/BadassLongcoat"><span data-dcnode-id="4648" instrument_node="">Badass Longcoat</span></a><span data-dcnode-id="4646" instrument_node="">:</span><ul data-dcnode-id="4641"><li data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node=""> Sephiroth's style is once again complete thanks to his domineering black coat.</span></li><li data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node=""> Rufus Shinra's fabulous white trenchcoat returns and is
