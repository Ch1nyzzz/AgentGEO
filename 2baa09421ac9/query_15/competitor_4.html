ng conversations among townspeople, who also call out to Cloud regarding what missions he has accomplished as his reputation as a mercenary builds.</span></li><li data-dcnode-id="3955"><span data-dcnode-id="3968" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoesThisRemindYouOfAnything" title="/pmwiki/pmwiki.php/Main/DoesThisRemindYouOfAnything"><span data-dcnode-id="3967" instrument_node="">Does This Remind You of Anything?</span></a><span data-dcnode-id="3965" instrument_node="">: Madam M's "massages." We see enough to know she </span><em data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">is</span></em><span data-dcnode-id="3962" instrument_node=""> massaging Cloud's hands, but the atmosphere, the way she talks, Cloud's reactions to what she's doing, and the camera angles which conceal exactly where her hands are, all scream "this is a stand-in for </span><a class="twikilink" data-dcnode-id="3960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HappyEndingMassage" title="/pmwiki/pmwiki.php/Main/HappyEndingMassage"><span data-dcnode-id="3961" instrument_node="">another kind of massage</span></a><span data-dcnode-id="3959" instrument_node=""> that we can't depict." After the massage is over, Aerith serves as the temporary playable character because </span><a class="twikilink" data-dcnode-id="3957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PostCoitalCollapse" title="/pmwiki/pmwiki.php/Main/PostCoitalCollapse"><span data-dcnode-id="3958" instrument_node="">Cloud is exhausted from the massage</span></a><span data-dcnode-id="3956" instrument_node="">.</span></li><li data-dcnode-id="3950"><span data-dcnode-id="3954" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDon" title="/pmwiki/pmwiki.php/Main/TheDon"><span data-dcnode-id="3953" instrument_node="">The Don</span></a><span data-dcnode-id="3951" instrument_node="">: Don Corneo, a lecherous crime-lord in Sector 6's slums who takes a new woman as his "bride" each night before feeding them to his pet monster Abzu when he's done having his way with them.</span></li><li data-dcnode-id="3937"><span data-dcnode-id="3949" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoubleMeaningTitle" title="/pmwiki/pmwiki.php/Main/DoubleMeaningTitle"><span data-dcnode-id="3948" instrument_node="">Double-Meaning Title</span></a><span data-dcnode-id="3946" instrument_node="">: </span><em data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Remake</span></em><span data-dcnode-id="3943" instrument_node=""> refers both to the fact that it's a new edition of a game that came out in 1997, and </span><span class="spoiler" data-dcnode-id="3939" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3942" instrument_node="">to the fact that Sephiroth is trying to </span><a class="twikilink" data-dcnode-id="3940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MakeWrongWhatOnceWentRight" title="/pmwiki/pmwiki.php/Main/MakeWrongWhatOnceWentRight"><span data-dcnode-id="3941" instrument_node="">remake history so he'll win</span></a></span><span data-dcnode-id="3938" instrument_node="">.</span></li><li data-dcnode-id="3930"><span data-dcnode-id="3936" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDragon" title="/pmwiki/pmwiki.php/Main/TheDragon"><span data-dcnode-id="3935" instrument_node="">The Dragon</span></a><span data-dcnode-id="3933" instrument_node="">: Heidegger, being the man in charge of Public Security (i.e. Shinra's military), serves as this for President Shinra himself. In contrast, Tseng is this for the president's son, Rufus Shinra. By the end of the game, </span><span class="spoiler" data-dcnode-id="3931" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3932" instrument_node="">once Rufus assumes control of the company, Heidegger shows hints of jealousy towards Tseng for being favored.</span></span></li><li data-dcnode-id="3925"><span data-dcnode-id="3929" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DualBoss" title="/pmwiki/pmwiki.php/Main/DualBoss"><span data-dcnode-id="3928" instrument_node="">Dual Boss</span></a><span data-dcnode-id="3926" instrument_node="">: In a slight deviation from the original game, Reno and Rude both fight Cloud and the gang on top of the Sector Seven pillar instead of Reno on his own.</span></li><li data-dcnode-id="3920"><span data-dcnode-id="3924" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DubNameChange" title="/pmwiki/pmwiki.php/Main/DubNameChange"><span data-dcnode-id="3923" instrument_node="">Dub Name Change</span></a><span data-dcnode-id="3921" instrument_node="">: Several bosses have their names changed, such as Guard Scorpion to Scorpion Sentinel, Hundred Gunner to The Arsenal, Heli Gunner to The Valkyrie, and certain enemies also had their names changed such as Chuse Tank to Terpsicolt, or Rufus' dog who had his name changed from Dark Nation to Darkstar. However, the Japanese version of the game retains virtually all of the original enemy names.</span></li><li data-dcnode-id="3888"><span data-dcnode-id="3919" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarlyBirdCameo" title="/pmwiki/pmwiki.php/Main/EarlyBirdCameo"><span data-dcnode-id="3918" instrument_node="">Early-Bird Cameo</span></a><span data-dcnode-id="3916" instrument_node="">:</span><ul data-dcnode-id="3889"><li data-dcnode-id="3908"><span data-dcnode-id="3915" instrument_node=""> At the beginning of Chapter 3, as the Avalanche members step off the train, Kyrie Canaan (the main female protagonist of </span><em data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">The Kids Are Alright</span></em><span data-dcnode-id="3912" instrument_node="">, a novella that was published before the release of </span><em data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">Advent Children</span></em><span data-dcnode-id="3909" instrument_node=""> and acts as its prequel) walks out of the train, and her presence is left unspoiled (with the subtitles referring to her as "???", reserved for important characters). She appears again in Chapter 14, with greater prominence and her own sidequest.</span></li><li data-dcnode-id="3900"><span data-dcnode-id="3907" instrument_node=""> Leslie Kyle, another character from </span><em data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">The Kids Are Alright</span></em><span data-dcnode-id="3904" instrument_node=""> novella, appears as one of Don Corneo's enforcers </span><span class="spoiler" data-dcnode-id="3902" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3903" instrument_node="">before turning on him and setting out to search for his missing fiancée</span></span><span data-dcnode-id="3901" instrument_node="">.</span></li><li data-dcnode-id="3895"><span data-dcnode-id="3899" instrument_node=""> At the end of Chapter 12, </span><span class="spoiler" data-dcnode-id="3897" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3898" instrument_node="">Cait Sith makes a brief unvoiced appearance racing to stop the Turks from dropping the Sector Seven plate, only to see he's too late and collapse in grief</span></span><span data-dcnode-id="3896" instrument_node="">.</span></li><li data-dcnode-id="3890"><span data-dcnode-id="3894" instrument_node=""> Palmer can be found in the Honey Bee Inn, entertaining himself, after looking through a keyhole </span><em data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">long</span></em><span data-dcnode-id="3891" instrument_node=""> before we meet him at Shinra HQ.</span></li></ul></li><li data-dcnode-id="3875"><span data-dcnode-id="3887" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ElevatorEscape" title="/pmwiki/pmwiki.php/Main/ElevatorEscape"><span data-dcnode-id="3886" instrument_node="">Elevator Escape</span></a><span data-dcnode-id="3884" instrument_node="">:</span><ul data-dcnode-id="3876"><li data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node=""> When the party first makes Hojo their hostage at his lab, he manages to distract them by releasing Specimen H0512 and then making a quick exit via the elevator.</span></li><li data-dcnode-id="3877"><span data-dcnode-id="3881" instrument_node=""> When they encounter him again after freeing Aerith and Red XIII, Red charges towards Hojo with the intent to kill, but Hojo manages to get into the nearby elevator, and the door slams shut in Red's face </span><a class="twikilink" data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustInTime" title="/pmwiki/pmwiki.php/Main/JustInTime"><span data-dcnode-id="3880" instrument_node="">Just in Time</span></a><span data-dcnode-id="3878" instrument_node="">.</span></li></ul></li></ul><ul data-dcnode-id="3707"><li data-dcnode-id="3856"><span data-dcnode-id="3871" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvenEvilHasStandards" title="/pmwiki/pmwiki.php/Main/EvenEvilHasStandards"><span data-dcnode-id="3870" instrument_node="">Even Evil Has Standards</span></a><span data-dcnode-id="3868" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3863" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3867" instrument_node="">When Hojo suggests torturing Aerith to get the location of the Promised Land out of her, President Shinra and the department heads (minus Reeve) are so enthusiastic that they almost sound like children planning a surprise party. However, the moment he suggests </span><a class="twikilink" data-dcnode-id="3865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RapeIsASpecialKindOfEvil" title="/pmwiki/pmwiki.php/Main/RapeIsASpecialKindOfEvil"><span data-dcnode-id="3866" instrument_node="">forcibly impregnating her to produce "backup" Ancients</span></a><span data-dcnode-id="3864" instrument_node="">, their reactions range from merely uncomfortable to outright disgusted.</span></span><ul data-dcnode-id="3857"><li data-dcnode-id="3858"><span data-dcnode-id="3862" instrument_node=""> A cutscene featuring Reno, Rude and Tseng reveals that the former two are expressing regrets about their role in the </span><span class="spoiler" data-dcnode-id="3860" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3861" instrument_node="">Sector Seven plate collapse</span></span><span data-dcnode-id="3859" instrument_node="">. Tseng attempts to ease their minds to no avail.</span></li></ul></li><li data-dcnode-id="3851"><span data-dcnode-id="3855" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvolvingWeapon" title="/pmwiki/pmwiki.php/Main/EvolvingWeapon"><span data-dcnode-id="3854" instrument_node="">Evolving Weapon</span></a><span data-dcnode-id="3852" instrument_node="">: Unlike the original game, each individual weapon is now upgradeable and grows alongside the characters themselves, allowing even the starting ones (like Cloud's Buster Sword) to remain viable throughout the game.</span></li><li data-dcnode-id="3843"><span data-dcnode-id="3850" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EverythingFades" title="/pmwiki/pmwiki.php/Main/EverythingFades"><span data-dcnode-id="3849" instrument_node="">Everything Fades</span></a><span data-dcnode-id="3847" instrument_node="">: Compared to the rather game-y red fade of defeated foes in the original, the remake has the enemies you genuinely slay fade away into the Lifestream on the spot, falling in line with how death has worked in the </span><em data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">Compilation</span></em><span data-dcnode-id="3844" instrument_node=""> before and serving as an optimization method for performance at the same time.</span></li><li data-dcnode-id="3832"><span data-dcnode-id="3842" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EverythingIsAnIPodInTheFuture" title="/pmwiki/pmwiki.php/Main/EverythingIsAnIPodInTheFuture"><span data-dcnode-id="3841" instrument_node="">Everything Is An I Pod In The Future</span></a><span data-dcnode-id="3839" instrument_node="">: Shinra's simulation of Neo Midgar depicts it as a sleek white-and-black high-tech metropolis, as opposed to the dystopian </span><a class="twikilink" data-dcnode-id="3837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DieselPunk" title="/pmwiki/pmwiki.php/Main/DieselPunk"><span data-dcnode-id="3838" instrument_node="">Diesel Punk</span></a><span data-dcnode-id="3836" instrument_node="">/</span><a class="twikilink" data-dcnode-id="3834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CyberPunk" title="/pmwiki/pmwiki.php/Main/CyberPunk"><span data-dcnode-id="3835" instrument_node="">Cyberpunk</span></a><span data-dcnode-id="3833" instrument_node=""> aesthetic of the current iteration of Midgar.</span></li><li data-dcnode-id="3827"><span data-dcnode-id="3831" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExtremelyShortTimespan" title="/pmwiki/pmwiki.php/Main/ExtremelyShortTimespan"><span data-dcnode-id="3830" instrument_node="">Extremely Short Timespan</span></a><span data-dcnode-id="3828" instrument_node="">: In total, the game takes place over a period of 3-4 days, only adding an additional day to the original game's Midgar sequence. Despite the short timeframe, the characters can come off as lifelong friends.</span></li><li data-dcnode-id="3816"><span data-dcnode-id="3826" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FakeLongevity" title="/pmwiki/pmwiki.php/Main/FakeLongevity"><span data-dcnode-id="3825" instrument_node="">Fake Longevity</span></a><span data-dcnode-id="3823" instrument_node="">: Both mitigated and played straight with Chapter Select. While it's possible to jump to any chapter in the game after viewing the ending, the player can only start at the </span><em data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">beginning</span></em><span data-dcnode-id="3820" instrument_node=""> of each chapter, when most of the diverging content for side quests and other </span><a class="twikilink" data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHundredPercentCompletion" title="/pmwiki/pmwiki.php/Main/OneHundredPercentCompletion"><span data-dcnode-id="3819" instrument_node="">100% Completion</span></a><span data-dcnode-id="3817" instrument_node=""> factors don't begin until about halfway through most of them, requiring having to replay many of the same scenes/dungeons over multiple times without anything changing.</span></li><li data-dcnode-id="3806"><span data-dcnode-id="3815" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseFlagOperation" title="/pmwiki/pmwiki.php/Main/FalseFlagOperation"><span data-dcnode-id="3814" instrument_node="">False Flag Operation</span></a><span data-dcnode-id="3812" instrument_node="">: Made more explicit here compared to the original, but Avalanche's bomb merely made Mako Reactor 1 inoperable; it was </span><em data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">Shinra themselves</span></em><span data-dcnode-id="3809" instrument_node=""> (more specifically Heidegger, under President Shinra's orders) who went the extra mile and obliterated it, causing untold death and destruction, and all just to frame Avalanche and ruin their reputation. </span><span class="spoiler" data-dcnode-id="3807" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3808" instrument_node="">After Heidegger sets off the bomb on Mako Reactor 5 himself, Shinra claims that Avalanche is being bankrolled by Wutai so that they have an excuse to declare war.</span></span></li><li data-dcnode-id="3801"><span data-dcnode-id="3805" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyCounterpartReligion" title="/pmwiki/pmwiki.php/Main/FantasyCounterpartReligion"><span data-dcnode-id="3804" instrument_node="">Fantasy Counterpart Religion</span></a><span data-dcnode-id="3802" instrument_node="">: Planetology, a religion based on the faith and teachings of the Cetra, is alluded to throughout the game. While many believe it to just be stories of a time long-past, Shinra is attempting to pervert its message to hunt for the "promised land" mentioned in its scriptures. Barret is a true believer, Jessie studied it for a bit, and Aerith is indicated to be a practitioner as well, as her skill point upgrade items consist of Planetology tomes.</span></li><li data-dcnode-id="3796"><span data-dcnode-id="3800" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FedToTheBeast" title="/pmwiki/pmwiki.php/Main/FedToTheBeast"><span data-dcnode-id="3799" instrument_node="">Fed to the Beast</span></a><span data-dcnode-id="3797" instrument_node="">: After he's finished using his brides, Don Corneo will drop them into the sewers where he allows his pet, Abzu, to feast on them. He does the same to Cloud, Tifa and Aerith after he reveals to them Shinra's plans for taking care of Avalanche.</span></li><li data-dcnode-id="3738"><span data-dcnode-id="3795" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Foreshadowing" title="/pmwiki/pmwiki.php/Main/Foreshadowing"><span data-dcnode-id="3794" instrument_node="">Foreshadowing</span></a><span data-dcnode-id="3792" instrument_node="">:</span><ul data-dcnode-id="3739"><li data-dcnode-id="3788"><span data-dcnode-id="3791" instrument_node=""> In the opening cinematic, after some of Aerith's flowers are knocked on the ground, one of them is trampled by a careless passerby. Later, when she meets Cloud and shows him her materia, he has visions of her kneeling in prayer and the materia bouncing away. </span><span class="spoiler" data-dcnode-id="3789" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3790" instrument_node="">Both foreshadow her eventual fate from the original game.</span></span></li><li data-dcnode-id="3783"><span data-dcnode-id="3787" instrument_node=""> In Chapter 2, one of the Security Officers recognizes Cloud's sword and tries to get the others to hold their fire. This is an early clue that </span><span class="spoiler" data-dcnode-id="3785" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3786" instrument_node="">Cloud wasn't a member of SOLDIER, but a rank-and-file grunt. The Buster Sword is deeply tied to Zack Fair and Angeal Hewley, both SOLDIER First Class, who many Shinra grunts would recognize. For Cloud to have it is the strange part</span></span><span data-dcnode-id="3784" instrument_node="">.</span></li><li data-dcnode-id="3776"><span data-dcnode-id="3782" instrument_node=""> In Chapter 3, when Cloud offers Tifa the flower he received from Aerith, he mentions how people can change in 5 years, to which a confused Tifa gives a very quick "Huh?" before the subject changes. </span><span class="spoiler" data-dcnode-id="3777" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3781" instrument_node="">In the original game, Tifa and Cloud have a similar exchange that isn't shown until later in the game, to which Tifa reveals that it's actually been 7 years since she last saw Cloud. This helps hint at Cloud's status as an </span><a class="twikilink" data-dcnode-id="3779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnreliableNarrator" title="/pmwiki/pmwiki.php/Main/UnreliableNarrator"><span data-dcnode-id="3780" instrument_node="">Unreliable Narrator</span></a><span data-dcnode-id="3778" instrument_node="">.</span></span></li><li data-dcnode-id="3771"><span data-dcnode-id="3775" instrument_node=""> Early in the game Cloud has a hallucination of a chunk of Sector 7's plate crashing down onto him, </span><span class="spoiler" data-dcnode-id="3773" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3774" instrument_node="">foreshadowing Shinra's eventual plan to collapse the plate and crush Avalanche</span></span><span data-dcnode-id="3772" instrument_node="">.</span></li><li data-dcnode-id="3764"><span data-dcnode-id="3770" instrument_node=""> Near the end of Chapter 2 after Jessie has explained the workings of the train system, Cloud has an internal monologue about how everyone is just like the train - following the tracks with no deviation. </span><span class="spoiler" data-dcnode-id="3766" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3769" instrument_node="">This metaphor ends up being proven entirely untrue when Sephiroth manipulates the cast into defeating the Whispers, sending the entire timeline </span><a class="twikilink" data-dcnode-id="3767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OffTheRails" title="/pmwiki/pmwiki.php/Main/OffTheRails"><span data-dcnode-id="3768" instrument_node="">Off the Rails</span></a></span><span data-dcnode-id="3765" instrument_node="">.</span></li><li data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node=""> In Chapter 16, the holographic recording of Reeve in the Shinra exhibit hall explains that an expressway to connect all the sectors together is under construction. This is the very expressway the party uses to escape Midgar in Chapter 18. And since it's under construction, there's no civilian traffic on it.</span></li><li data-dcnode-id="3740"><span data-dcnode-id="3761" instrument_node=""> The nature of the </span><span class="spoiler" data-dcnode-id="3759" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3760" instrument_node="">Whispers, the Arbiters of Fate</span></span><span data-dcnode-id="3758" instrument_node="">, is obvious only in retrospect, but very clear on a rewatch: </span><span class="spoiler" data-dcnode-id="3741" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3757" instrument_node="">any time the game </span><em data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">seems</span></em><span data-dcnode-id="3754" instrument_node=""> to be about to go off the rails from the original game (Cloud is about to miss Aerith, Jessie is going to go on the Sector 5 Reactor mission instead of Cloud, etc.), the Whispers show up and do something to get things back on track. This first feels like things getting fleshed out in the first few chapters, giving more nuance to scenes that were quick in the original game, but it gets more explicit after falling into the Sector 5 Church: Cloud is </span><em data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">clearly</span></em><span data-dcnode-id="3751" instrument_node=""> getting the best of Reno, but he's literally </span><em data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">dragged</span></em><span data-dcnode-id="3748" instrument_node=""> away by the Whispers, and they keep him from going back to finish the fight. When they start showing up in the Sector 7 Tower, and looming menacingly over characters destined to die who are </span><em data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">actually winning</span></em><span data-dcnode-id="3745" instrument_node=""> (the camera cuts away), it's clear that they are doing </span><em data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">something</span></em><span data-dcnode-id="3742" instrument_node=""> to make sure that things go the way we "know".</span></span></li></ul></li><li data-dcnode-id="3728"><span data-dcnode-id="3737" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForgottenFallenFriend" title="/pmwiki/pmwiki.php/Main/ForgottenFallenFriend"><span data-dcnode-id="3736" instrument_node="">Forgotten Fallen Friend</span></a><span data-dcnode-id="3734" instrument_node="">: Cloud doesn't outwardly display any recollection of </span><span class="spoiler" data-dcnode-id="3732" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3733" instrument_node="">Zack</span></span><span data-dcnode-id="3731" instrument_node=""> despite the two knowing each other from the war. </span><span class="spoiler" data-dcnode-id="3729" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3730" instrument_node="">This is due to intense trauma and memory suppression relating to Zack's death in the unaltered timeline.</span></span></li><li data-dcnode-id="3720"><span data-dcnode-id="3727" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FourEyesZeroSoul" title="/pmwiki/pmwiki.php/Main/FourEyesZeroSoul"><span data-dcnode-id="3726" instrument_node="">Four Eyes, Zero Soul</span></a><span data-dcnode-id="3724" instrument_node="">: Hojo wears a pair of </span><a class="twikilink" data-dcnode-id="3722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LennonSpecs" title="/pmwiki/pmwiki.php/Main/LennonSpecs"><span data-dcnode-id="3723" instrument_node="">Lennon Specs</span></a><span data-dcnode-id="3721" instrument_node=""> and is one of the most vile and heartless characters in the entire game.</span></li><li data-dcnode-id="3713"><span data-dcnode-id="3719" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FreezeFrameBonus" title="/pmwiki/pmwiki.php/Main/FreezeFrameBonus"><span data-dcnode-id="3718" instrument_node="">Freeze-Frame Bonus</span></a><span data-dcnode-id="3716" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3714" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3715" instrument_node="">In the scene that Zack survives the Shinra ambush, there's a brief shot of a chip bag depicting Stamp blowing by in the wind. However, this Stamp is a terrier instead of the beagle depicted in the rest of the game, another indicator that the timeline has been altered.</span></span></li><li data-dcnode-id="3708"><span data-dcnode-id="3712" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FriendsRentControl" title="/pmwiki/pmwiki.php/Main/FriendsRentControl"><span data-dcnode-id="3711" instrument_node="">"Friends" Rent Control</span></a><span data-dcnode-id="3709" instrument_node="">: In a crowded slum where most buildings are cobbled together out of scrap metal, Aerith lives in a relatively small, three-story wooden house with a large landscaped lawn. Elmyra lived there with her husband before she met Aerith, but it's implied that the girl's presence is what lets the flowers and plants near her house grow with such vigor, especially in the middle of the mako-draining ecological dead zone that is Midgar. That's no explanation for the house itself, its well-kept condition, and its location along one of the only natural creeks in the slums.</span></li></ul></div><p data-dcnode-id="3705"></p><div class="folderlabel" data-dcnode-id="3703" onclick="togglefolder('folder1');"><span data-dcnode-id="3704" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;G-O&nbsp;</span></div><div class="folder" data-dcnode-id="2719" id="folder1" isfolder="true" style="display:block;"><ul data-dcnode-id="2720"><li data-dcnode-id="3698"><span data-dcnode-id="3702" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStoryIntegration" title="/pmwiki/pmwiki.php/Main/GameplayAndStoryIntegration"><span data-dcnode-id="3701" instrument_node="">Gameplay and Story Integration</span></a><span data-dcnode-id="3699" instrument_node="">: The Turks are supposed to keep tabs on Aerith and keep her safe until she agrees to come to Shinra. So when fighting Rude with Cloud and Aerith, he'll very rarely uses his abilities against her, preferring to stun and/or sleep her, forcing you to switch to Cloud.</span></li><li data-dcnode-id="3693"><span data-dcnode-id="3697" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation" title="/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation"><span data-dcnode-id="3696" instrument_node="">Gameplay and Story Segregation</span></a><span data-dcnode-id="3694" instrument_node="">: Getting any of the pre-order bonus Summons (Carbuncle / Cactuar / Chocobo Chick), which can be unlocked and used at the very beginning of the game, can play havoc with later cutscenes, as other characters (like Jessie, Barret and Tifa) introduce the concept to Cloud like he's never found or utilized a Summoning Materia before.</span></li><li data-dcnode-id="3688"><span data-dcnode-id="3692" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GangUpOnTheHuman" title="/pmwiki/pmwiki.php/Main/GangUpOnTheHuman"><span data-dcnode-id="3691" instrument_node="">Gang Up on the Human</span></a><span data-dcnode-id="3689" instrument_node="">: Very visible when switching characters, the enemies will stop attacking their targets to focus on the one you're controlling now. It's still possible for them to finish their combos or deal a few attacks to other characters, but they'll almost always focus on you.</span></li><li data-dcnode-id="3680"><span data-dcnode-id="3687" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GatlingGood" title="/pmwiki/pmwiki.php/Main/GatlingGood"><span data-dcnode-id="3686" instrument_node="">Gatling Good</span></a><span data-dcnode-id="3684" instrument_node="">: Besides Barret, another example was during the rescue where an Avalanche strike team saves Cloud, Biggs and Wedge from the rush of Sweeper mechs. The first Sweepers are gunned down and an Avalanche trooper emerges from an alley with a massive minigun mowing down more Sweepers. Then more Avalanche forces come out with assault rifles and </span><a class="twikilink" data-dcnode-id="3682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="3683" instrument_node="">annihilate the rest</span></a><span data-dcnode-id="3681" instrument_node="">. This shows much military might the mainline Avalanche can field, unlike Barret's group who're funding themselves by selling water filters and helping the neighborhood watch.</span></li><li data-dcnode-id="3675"><span data-dcnode-id="3679" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GeneralRipper" title="/pmwiki/pmwiki.php/Main/GeneralRipper"><span data-dcnode-id="3678" instrument_node="">General Ripper</span></a><span data-dcnode-id="3676" instrument_node="">: Heidegger's animosity towards Avalanche is now extra pronounced. He was once a high-ranking soldier in Shinra's army and now presides over Public Security with an iron fist, determined to wipe Avalanche out until there's nothing left with narry a care for what happens to his own men.</span></li><li data-dcnode-id="3662"><span data-dcnode-id="3674" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GetARoom" title="/pmwiki/pmwiki.php/Main/GetARoom"><span data-dcnode-id="3673" instrument_node="">Get a Room!</span></a><span data-dcnode-id="3671" instrument_node="">: In Chapter 9, as Aerith is fishing for Cloud's opinion on her outfit, Madam M quickly loses patience with their antics.</span><div class="indent" data-dcnode-id="3663"><strong data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">Madam M:</span></strong><span data-dcnode-id="3668" instrument_node=""> Look, just... take it outside the parlor, would you? </span><br data-dcnode-id="3667"><strong data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">Aerith:</span></strong><span data-dcnode-id="3664" instrument_node=""> Sorry, we'll stop.</span></div></li><li data-dcnode-id="3654"><span data-dcnode-id="3661" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="3660" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="3658" instrument_node="">: The Proficiency unlocks for some weapon abilities are somewhat unspecific. They tell you that you need to do a specific thing — the Hardedge, for instance, requires you to "Strike a staggered enemy" — but never clarify that you are supposed to do that specific thing </span><em data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">with that specific attack</span></em><span data-dcnode-id="3655" instrument_node=""> (in this case, Infinity's End). In some cases, it's implied (Cloud's Triple Slash requires you to "Strike three or more enemies"), but in other cases, it's not (Cloud is good at hitting multiple enemies even if you're just pressing Square).</span></li><li data-dcnode-id="3646"><span data-dcnode-id="3653" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GunsAkimbo" title="/pmwiki/pmwiki.php/Main/GunsAkimbo"><span data-dcnode-id="3652" instrument_node="">Guns Akimbo</span></a><span data-dcnode-id="3650" instrument_node="">: In the second phase of his boss fight, Rufus splits his shotgun into a pair of </span><a class="twikilink" data-dcnode-id="3648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HandCannon" title="/pmwiki/pmwiki.php/Main/HandCannon"><span data-dcnode-id="3649" instrument_node="">Hand Cannons</span></a><span data-dcnode-id="3647" instrument_node=""> to unload bullets onto Cloud. It's even the skill name.</span></li><li data-dcnode-id="3637"><span data-dcnode-id="3645" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GunsAreWorthless" title="/pmwiki/pmwiki.php/Main/GunsAreWorthless"><span data-dcnode-id="3644" instrument_node="">Guns Are Worthless</span></a><span data-dcnode-id="3642" instrument_node="">: Played with. Cloud, using a giant sword, has no problem fighting guards with machine guns. However, there are some long-ranged enemies he can't reach with the Buster Sword, prompting players to switch to Barret and use him to get them with his gun-arm. This is lampshaded by Jessie the first time the player encounters such a problem.</span><div class="indent" data-dcnode-id="3638"><strong data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">Jessie:</span></strong><span data-dcnode-id="3639" instrument_node=""> There are some places a sword just can't reach.</span></div></li><li data-dcnode-id="3632"><span data-dcnode-id="3636" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HannibalLecture" title="/pmwiki/pmwiki.php/Main/HannibalLecture"><span data-dcnode-id="3635" instrument_node="">Hannibal Lecture</span></a><span data-dcnode-id="3633" instrument_node="">: President Shinra gives a stinging one to Barret when he tries to take him hostage, pointing out even though Avalanche is opposed to the use of mako reactors, they still haven't given any thought to what would happen if Midgar were to be suddenly deprived of its sole source of energy. The people would immediately turn on them the moment the power shuts off.</span></li><li data-dcnode-id="3615"><span data-dcnode-id="3631" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HappyEndingMassage" title="/pmwiki/pmwiki.php/Main/HappyEndingMassage"><span data-dcnode-id="3630" instrument_node="">Happy Ending Massage</span></a><span data-dcnode-id="3628" instrument_node="">: Madam M's "Luxury" hand massage is treated as one, as she uses </span><a class="twikilink" data-dcnode-id="3626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PressurePoint" title="/pmwiki/pmwiki.php/Main/PressurePoint"><span data-dcnode-id="3627" instrument_node="">Pressure Points</span></a><span data-dcnode-id="3625" instrument_node=""> to stimulate the nerve ending on Cloud's hands, and the way Cloud </span><a class="twikilink" data-dcnode-id="3623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGruntingOrgasm" title="/pmwiki/pmwiki.php/Main/TheGruntingOrgasm"><span data-dcnode-id="3624" instrument_node="">grunts and moans</span></a><span data-dcnode-id="3622" instrument_node=""> heavily imply he's experiencing an </span><a class="twikilink" data-dcnode-id="3620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForcedOrgasm" title="/pmwiki/pmwiki.php/Main/ForcedOrgasm"><span data-dcnode-id="3621" instrument_node="">unexpected orgasm</span></a><span data-dcnode-id="3619" instrument_node="">. After the massage is over, he walks out of the room in a trance-like, almost euphoric state and a confused Aerith serves as </span><a class="twikilink" data-dcnode-id="3617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroOnHiatus" title="/pmwiki/pmwiki.php/Main/HeroOnHiatus"><span data-dcnode-id="3618" instrument_node="">the temporary playable character</span></a><span data-dcnode-id="3616" instrument_node=""> until he "recovers".</span></li><li data-dcnode-id="3610"><span data-dcnode-id="3614" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HaveANiceDeath" title="/pmwiki/pmwiki.php/Main/HaveANiceDeath"><span data-dcnode-id="3613" instrument_node="">Have a Nice Death</span></a><span data-dcnode-id="3611" instrument_node="">: Dying to the Hell House has Scotch and Kotch narrate the player's defeat with an appropriately dramatic line during the Game Over screen.</span></li><li data-dcnode-id="3605"><span data-dcnode-id="3609" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HighFiveLeftHanging" title="/pmwiki/pmwiki.php/Main/HighFiveLeftHanging"><span data-dcnode-id="3608" instrument_node="">High-Five Left Hanging</span></a><span data-dcnode-id="3606" instrument_node="">: On the way through the tunnels to get to Sector 7, Aerith attempts several times to high five Cloud, who doesn't register what she's trying to do. He finally gives her one after they make it out of the area, and again later on after they defeat the Hell House.</span></li><li data-dcnode-id="3598"><span data-dcnode-id="3604" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HPToOne" title="/pmwiki/pmwiki.php/Main/HPToOne"><span data-dcnode-id="3603" instrument_node="">HP to 1</span></a><span data-dcnode-id="3601" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3599" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3600" instrument_node="">Sephiroth performs Heartless Angel by throwing his sword into the ground, which emits a large field. Anyone who isn't able to escape in time will instantly have their HP reduced to one and temporarily stunned, which Sephiroth won't hesitate to take advantage of.</span></span></li><li data-dcnode-id="3583"><span data-dcnode-id="3597" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HopelessSuitor" title="/pmwiki/pmwiki.php/Main/HopelessSuitor"><span data-dcnode-id="3596" instrument_node="">Hopeless Suitor</span></a><span data-dcnode-id="3594" instrument_node="">:</span><ul data-dcnode-id="3584"><li data-dcnode-id="3587"><span data-dcnode-id="3593" instrument_node=""> Jessie quickly establishes that she finds Cloud </span><em data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">very</span></em><span data-dcnode-id="3590" instrument_node=""> attractive and flirts with him throughout the bombing mission, but he either ignores her comments or responds with annoyance. It then gradually downplays during Jessie's moment in the spotlight, but Cloud never fully opens up to her </span><span class="spoiler" data-dcnode-id="3588" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3589" instrument_node="">before her death.</span></span></li><li data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node=""> Like in the original, Johnny is this to Tifa, albeit played more for comedy than Jessie to Cloud.</span></li></ul></li><li data-dcnode-id="3569"><span data-dcnode-id="3582" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HotterAndSexier" title="/pmwiki/pmwiki.php/Main/HotterAndSexier"><span data-dcnode-id="3581" instrument_node="">Hotter and Sexier</span></a><span data-dcnode-id="3579" instrument_node="">: Despite fears of </span><a class="twikilink" data-dcnode-id="3577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TamerAndChaster" title="/pmwiki/pmwiki.php/Main/TamerAndChaster"><span data-dcnode-id="3578" instrument_node="">Tamer and Chaster</span></a><span data-dcnode-id="3576" instrument_node=""> due to changes in the social landscape of </span><a class="twikilink" data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheNewTens" title="/pmwiki/pmwiki.php/Main/TheNewTens"><span data-dcnode-id="3575" instrument_node="">The New '10s</span></a><span data-dcnode-id="3573" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheNewTwenties" title="/pmwiki/pmwiki.php/Main/TheNewTwenties"><span data-dcnode-id="3572" instrument_node="">The New '20s</span></a><span data-dcnode-id="3570" instrument_node="">, the Wall Market Section of the Remake is definitely this to the original, with the caveat that the homoeroticism is changed from being rather homophobic in the original to something that's more about embracing one's own sexuality. The overall atmosphere of the area is also devoid of the nowadays unsexy blocky characters of the original in favor of much more conventionally attractive characters using modern graphics.</span></li><li data-dcnode-id="3561"><span data-dcnode-id="3568" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanoidAbomination" title="/pmwiki/pmwiki.php/Main/HumanoidAbomination"><span data-dcnode-id="3567" instrument_node="">Humanoid Abomination</span></a><span data-dcnode-id="3565" instrument_node="">: Jenova, a planet-eating alien entity that manifests as a female-looking humanoid. One of her </span><a class="twikilink" data-dcnode-id="3563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="3564" instrument_node="">more monstrous boss forms</span></a><span data-dcnode-id="3562" instrument_node=""> is fought against in Shinra's headquarters.</span></li><li data-dcnode-id="3546"><span data-dcnode-id="3560" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hypocrite" title="/pmwiki/pmwiki.php/Main/Hypocrite"><span data-dcnode-id="3559" instrument_node="">Hypocrite</span></a><span data-dcnode-id="3557" instrument_node="">: The main branch of Avalanche has cut ties with Barret's cell before the events of the game, ostensibly because </span><a class="twikilink" data-dcnode-id="3555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EveryoneHasStandards" title="/pmwiki/pmwiki.php/Main/EveryoneHasStandards"><span data-dcnode-id="3556" instrument_node="">their actions are too extremist</span></a><span data-dcnode-id="3554" instrument_node="">. This is despite the fact that, as Biggs bitterly points out, they're the ones who run around in full mil-spec gear. And if players know about </span><em data-dcnode-id="3551"><a class="twikilink" data-dcnode-id="3552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BeforeCrisis" title="/pmwiki/pmwiki.php/VideoGame/BeforeCrisis"><span data-dcnode-id="3553" instrument_node="">Before Crisis</span></a></em><span data-dcnode-id="3550" instrument_node="">, that game revealed that the original Avalanche was actually </span><em data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">more extremist</span></em><span data-dcnode-id="3547" instrument_node=""> then Barret's cell.</span></li><li data-dcnode-id="3541"><span data-dcnode-id="3545" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IShallTauntYou" title="/pmwiki/pmwiki.php/Main/IShallTauntYou"><span data-dcnode-id="3544" instrument_node="">I Shall Taunt You</span></a><span data-dcnode-id="3542" instrument_node="">: During the Airbuster boss fight, Heidegger's hologram floats overhead and taunts Avalanche about their supposed inevitable defeat.</span></li><li data-dcnode-id="3529"><span data-dcnode-id="3540" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImpaledWithExtremePrejudice" title="/pmwiki/pmwiki.php/Main/ImpaledWithExtremePrejudice"><span data-dcnode-id="3539" instrument_node="">Impaled with Extreme Prejudice</span></a><span data-dcnode-id="3537" instrument_node="">: Much like the original game, President Shinra is killed by Sephiroth this way. </span><span class="spoiler" data-dcnode-id="3530" title="you can set spoilers visible by default on your profile"><em data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">Unlike</span></em><span data-dcnode-id="3534" instrument_node=""> the original game, Sephiroth also does this to </span><em data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">Barret</span></em><span data-dcnode-id="3531" instrument_node=""> immediately after, although due to a strong deviation from the original story the Whispers quickly intervene and heal his wound.</span></span></li><li data-dcnode-id="3524"><span data-dcnode-id="3528" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InfinityMinusOneSword" title="/pmwiki/pmwiki.php/Main/InfinityMinusOneSword"><span data-dcnode-id="3527" instrument_node="">Infinity -1 Sword</span></a><span data-dcnode-id="3525" instrument_node="">: The Twin Stinger is initially the best balanced stat sword that Cloud has. It starts with 4 materia and pretty decent stats, and it's the final weapon Cloud unlocks normally. When you get it, it's a pretty good weapon. But by the time you've gotten all of the skill tomes and maxed out your weapons, the Twin Stinger is inferior to the Buster Sword, Cloud's starting weapon, in every category except extra MP, and not by much.</span></li><li data-dcnode-id="3513"><span data-dcnode-id="3523" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InformedEquipment" title="/pmwiki/pmwiki.php/Main/InformedEquipment"><span data-dcnode-id="3522" instrument_node="">Informed Equipment</span></a><span data-dcnode-id="3520" instrument_node="">: </span><a class="twikilink" data-dcnode-id="3518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZigZagged" title="/pmwiki/pmwiki.php/Main/ZigZagged"><span data-dcnode-id="3519" instrument_node="">Zig-Zagged</span></a><span data-dcnode-id="3517" instrument_node="">. Each playable character is shown wielding their equipped weapon in real-time. Adding onto </span><em data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">that</span></em><span data-dcnode-id="3514" instrument_node="">, some materia is also shown being visibly slotted in the weapons and armor. That said, if weapons are modded to have extra materia slots, those are not visible, and armors and accessories remain invisible.</span></li><li data-dcnode-id="3508"><span data-dcnode-id="3512" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InsurmountableWaistHighFence" title="/pmwiki/pmwiki.php/Main/InsurmountableWaistHighFence"><span data-dcnode-id="3511" instrument_node="">Insurmountable Waist-High Fence</span></a><span data-dcnode-id="3509" instrument_node="">: The party members are able to perform all sorts of acrobatic jumps in battle and in cutscenes, but out of battle are helpless to hop over railings or across small gaps, and there's no jump button at all. Cloud can slice apart crates of wood and steel without effort, but small stacks of items of the same materials completely block his path and are indestructible, and locked wooden doors might as well be adamantium.</span></li><li data-dcnode-id="3500"><span data-dcnode-id="3507" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterfaceScrew" title="/pmwiki/pmwiki.php/Main/InterfaceScrew"><span data-dcnode-id="3506" instrument_node="">Interface Screw</span></a><span data-dcnode-id="3504" instrument_node="">: The screen itself glitches, is covered with a pale green, and the sound is overlaid with static when Cloud </span><span class="spoiler" data-dcnode-id="3502" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3503" instrument_node="">realizes a contradiction between his true memories and Zack's</span></span><span data-dcnode-id="3501" instrument_node="">.</span></li><li data-dcnode-id="3495"><span data-dcnode-id="3499" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JigglePhysics" title="/pmwiki/pmwiki.php/Main/JigglePhysics"><span data-dcnode-id="3498" instrument_node="">Jiggle Physics</span></a><span data-dcnode-id="3496" instrument_node="">: Don Corneo of all people is given jiggle physics for his belly.</span></li><li data-dcnode-id="3476"><span data-dcnode-id="3494" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustBeforeTheEnd" title="/pmwiki/pmwiki.php/Main/JustBeforeTheEnd"><span data-dcnode-id="3493" instrument_node="">Just Before the End</span></a><span data-dcnode-id="3491" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3478" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3490" instrument_node=""> The aptly named '</span><a class="twikilink" data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="3489" instrument_node="">End of the World</span></a><span data-dcnode-id="3487" instrument_node="">' where Cloud and Sephiroth face off. The area itself is a place where </span><a class="twikilink" data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimeStandsStill" title="/pmwiki/pmwiki.php/Main/TimeStandsStill"><span data-dcnode-id="3486" instrument_node="">time has stopped</span></a><span data-dcnode-id="3484" instrument_node=""> and should time resume, </span><a class="twikilink" data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ApocalypseHow" title="/pmwiki/pmwiki.php/Main/ApocalypseHow"><span data-dcnode-id="3483" instrument_node="">the world would immediately meet it's end</span></a><span data-dcnode-id="3481" instrument_node=""> in </span><a class="twikilink" data-dcnode-id="3479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcNumber" title="/pmwiki/pmwiki.php/Main/ArcNumber"><span data-dcnode-id="3480" instrument_node="">seven seconds</span></a></span><span data-dcnode-id="3477" instrument_node="">.</span></li><li data-dcnode-id="3471"><span data-dcnode-id="3475" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KickingAssInAllHerFinery" title="/pmwiki/pmwiki.php/Main/KickingAssInAllHerFinery"><span data-dcnode-id="3474" instrument_node="">Kicking Ass in All Her Finery</span></a><span data-dcnode-id="3472" instrument_node="">: Tifa and Aerith beat up a room of Don Corneo's men while wearing fancy dresses.</span></li><li data-dcnode-id="3463"><span data-dcnode-id="3470" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaserBlade" title="/pmwiki/pmwiki.php/Main/LaserBlade"><span data-dcnode-id="3469" instrument_node="">Laser Blade</span></a><span data-dcnode-id="3467" instrument_node="">: In Chapter 16 and 17, Shinra's Armored Shock Troopers use </span><a class="twikilink" data-dcnode-id="3465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WritingAroundTrademarks" title="/pmwiki/pmwiki.php/Main/WritingAroundTrademarks"><span data-dcnode-id="3466" instrument_node="">"beam swords"</span></a><span data-dcnode-id="3464" instrument_node=""> that look suspiciously similar to lightsabers.</span></li><li data-dcnode-id="3443"><span data-dcnode-id="3462" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LateArrivalSpoiler" title="/pmwiki/pmwiki.php/Main/LateArrivalSpoiler"><span data-dcnode-id="3461" instrument_node="">Late-Arrival Spoiler</span></a><span data-dcnode-id="3459" instrument_node="">: The game is resplendent with </span><a class="twikilink" data-dcnode-id="3457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityNod" title="/pmwiki/pmwiki.php/Main/ContinuityNod"><span data-dcnode-id="3458" instrument_node="">Continuity Nods</span></a><span data-dcnode-id="3456" instrument_node="">, </span><a class="twikilink" data-dcnode-id="3454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="3455" instrument_node="">Mythology Gags</span></a><span data-dcnode-id="3453" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="3451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallForward" title="/pmwiki/pmwiki.php/Main/CallForward"><span data-dcnode-id="3452" instrument_node="">Call Forwards</span></a><span data-dcnode-id="3450" instrument_node=""> to the </span><em data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">Compilation of Final Fantasy VII</span></em><span data-dcnode-id="3447" instrument_node=""> — including many that were plot twists in the original game, such as </span><span class="spoiler" data-dcnode-id="3445" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3446" instrument_node="">Cloud having a vision of Aerith's death, or Cait Sith being affiliated with Shinra</span></span><span data-dcnode-id="3444" instrument_node="">.</span></li><li data-dcnode-id="3434"><span data-dcnode-id="3442" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaterInstallmentWeirdness" title="/pmwiki/pmwiki.php/Main/LaterInstallmentWeirdness"><span data-dcnode-id="3441" instrument_node="">Later Installment Weirdness</span></a><span data-dcnode-id="3439" instrument_node="">: The change of format from a three-disc game to a full-on trilogy of separate games caused this game to be the first released after </span><em data-dcnode-id="3436"><a class="twikilink" data-dcnode-id="3437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyII" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyII"><span data-dcnode-id="3438" instrument_node="">Final Fantasy II</span></a></em><span data-dcnode-id="3435" instrument_node=""> that doesn't feature any mention whatsoever of a character named Cid.</span></li><li data-dcnode-id="3419"><span data-dcnode-id="3433" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall" title="/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall"><span data-dcnode-id="3432" instrument_node="">Leaning on the Fourth Wall</span></a><span data-dcnode-id="3430" instrument_node="">:</span><ul data-dcnode-id="3420"><li data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node=""> The narrator of the reveal trailer, who is heavily implied to be Sephiroth. In context, his monologue is presumably referring to the time that has passed between the destruction of the Cetra and summoning Meteor. On a meta level, it's a clever allusion to the impact the original game has made and fan frustration and speculation over the intervening years over whether or not a remake would happen, even acknowledging that it may not work out.</span></li><li data-dcnode-id="3421"><span data-dcnode-id="3427" instrument_node=""> In the </span><em data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Intergrade</span></em><span data-dcnode-id="3424" instrument_node=""> trailer, the section with Yuffie's reveal starts with her saying, "Well guys, your girl finally made it to Midgar," almost like she's addressing the fans who have been waiting for her debut in the </span><em data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">Remake.</span></em></li></ul></li><li data-dcnode-id="3405"><span data-dcnode-id="3418" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeftTheBackgroundMusicOn" title="/pmwiki/pmwiki.php/Main/LeftTheBackgroundMusicOn"><span data-dcnode-id="3417" instrument_node="">Left the Background Music On</span></a><span data-dcnode-id="3415" instrument_node="">: In the opening cutscene of the playable demo, while Aerith is crouched in an alley examining a broken mako pipe, an eerie female voice interjects into the background music singing "Estuans Interius",</span><span class="notelabel" data-dcnode-id="3412" onclick="togglenote('note1iz2g');" style="cursor: pointer;"><sup data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3407" id="note1iz2g" isnote="true" onclick="togglenote('note1iz2g');" style="display: none; cursor: pointer;"><span data-dcnode-id="3411" instrument_node="">The first lyrics of Sephiroth's boss theme, </span><em data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">One-Winged Angel</span></em><span data-dcnode-id="3408" instrument_node="">.</span></span><span data-dcnode-id="3406" instrument_node=""> and she is visibly alarmed and looks around before hurriedly exiting the alley.</span></li><li data-dcnode-id="3400"><span data-dcnode-id="3404" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LimitBreak" title="/pmwiki/pmwiki.php/Main/LimitBreak"><span data-dcnode-id="3403" instrument_node="">Limit Break</span></a><span data-dcnode-id="3401" instrument_node="">: The Limit Break system makes a return, albeit reworked a bit. Fighting in battle fills up the ATB Gauge, which can be expended to perform special attacks (among other actions), some of which are the character's original Limit Breaks, like Cloud's Braver. But characters still have actual Limit commands and a Limit gauge that fills up as you fight and can then be expended to use a Limit Skill, but this takes much longer than the ATB Gauge.</span></li><li data-dcnode-id="3389"><span data-dcnode-id="3399" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LockedOutOfTheLoop" title="/pmwiki/pmwiki.php/Main/LockedOutOfTheLoop"><span data-dcnode-id="3398" instrument_node="">Locked Out of the Loop</span></a><span data-dcnode-id="3396" instrument_node="">: While President Shinra was the one who masterminded the </span><a class="twikilink" data-dcnode-id="3394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseFlagOperation" title="/pmwiki/pmwiki.php/Main/FalseFlagOperation"><span data-dcnode-id="3395" instrument_node="">False Flag Operation</span></a><span data-dcnode-id="3393" instrument_node=""> to destroy Sector 7 by targeting its support structure, it's clear that only a very small number of those who actually work for Shinra (mostly the board of directors and the Turks, and maybe a select number of </span><a class="twikilink" data-dcnode-id="3391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mooks" title="/pmwiki/pmwiki.php/Main/Mooks"><span data-dcnode-id="3392" instrument_node="">mooks</span></a><span data-dcnode-id="3390" instrument_node=""> who were there at the time as well as those close to the Shinra top brass) are aware of the truth, and the rest are fed the same public lie that Avalanche was responsible.</span></li><li data-dcnode-id="3277"><span data-dcnode-id="3388" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LostInTranslation" title="/pmwiki/pmwiki.php/Main/LostInTranslation"><span data-dcnode-id="3387" instrument_node="">Lost in Translation</span></a><span data-dcnode-id="3385" instrument_node="">:</span><ul data-dcnode-id="3278"><li data-dcnode-id="3377"><span data-dcnode-id="3384" instrument_node=""> In the original, </span><a class="twikilink" data-dcnode-id="3382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LostInTranslation/FinalFantasy" title="/pmwiki/pmwiki.php/LostInTranslation/FinalFantasy"><span data-dcnode-id="3383" instrument_node="">one notable case was translating a Japanese word that is more like "acquaintance" into English "friend"</span></a><span data-dcnode-id="3381" instrument_node="">, causing players to think Cloud and Tifa were closer than originally implied in childhood. In the remake, in chapter 1, when Jessie asks Cloud about them, this time English dodges this by only saying Cloud "knows" Tifa, but Chinese still used "friend". On the other hand, during the childhood flashback, both Japanese and Chinese specifically have Tifa saying Cloud is ignoring her </span><em data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">again</span></em><span data-dcnode-id="3378" instrument_node="">, which is lost in English.</span></li><li data-dcnode-id="3343"><span data-dcnode-id="3376" instrument_node=""> At the end of Chapter 2, as Cloud is surrounded by Shinra grunts, one of the troopers pauses and remarks "Wait, I know that-" right before Cloud experiences a headache which blocks out the rest of his words. Much later in the game, in the Shinra HQ, a trooper outright recognizes Cloud and talks to him like an old friend. Most gamers made the assumption that this was the same trooper. However, the English and Italian versions of this Chapter 2 scene </span><strong data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">failed to include</span></strong><span data-dcnode-id="3373" instrument_node=""> the word </span><em data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">sword</span></em><span data-dcnode-id="3370" instrument_node=""> in the trooper's words (for example, "Hey, that sword is-" in Japanese</span><span class="notelabel" data-dcnode-id="3367" onclick="togglenote('note26s15');" style="cursor: pointer;"><sup data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3364" id="note26s15" isnote="true" onclick="togglenote('note26s15');" style="display: none; cursor: pointer;"><em data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">"Oi, sono ken wa-"</span></em></span><span data-dcnode-id="3363" instrument_node="">, "Hey, but... that sword..." in French</span><span class="notelabel" data-dcnode-id="3360" onclick="togglenote('note37730');" style="cursor: pointer;"><sup data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3357" id="note37730" isnote="true" onclick="togglenote('note37730');" style="display: none; cursor: pointer;"><em data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">"Hé mais... Cette épée..."</span></em></span><span data-dcnode-id="3356" instrument_node="">, and similar among other languages). The </span><em data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">very</span></em><span data-dcnode-id="3353" instrument_node=""> plot-heavy implication is that </span><span class="spoiler" data-dcnode-id="3348" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3352" instrument_node="">the actual reason for Cloud's headache is that the trooper didn't recognize Cloud, but rather recognized the Buster Sword as belonging to </span><em data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">Zack</span></em><span data-dcnode-id="3349" instrument_node=""> and said his name out loud, which triggered Cloud's memory problems.</span></span><span data-dcnode-id="3347" instrument_node=""> This means the two troopers are </span><em data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">not</span></em><span data-dcnode-id="3344" instrument_node=""> the same person... which is something that got lost on English and Italian players.</span></li><li data-dcnode-id="3338"><span data-dcnode-id="3342" instrument_node=""> At the beginning of Chapter 10 after defeating Abzu, Aerith makes a weird-sounding laugh that sounds something like a cross between "Mmm-hmm-hmm-hmm-hmm!" and a horse whinnying. However, in Japanese, the sound </span><a class="twikilink" data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/MaayaSakamoto" title="/pmwiki/pmwiki.php/Creator/MaayaSakamoto"><span data-dcnode-id="3341" instrument_node="">Maaya Sakamoto</span></a><span data-dcnode-id="3339" instrument_node=""> makes is more akin to a high-pitched "Ho-heeee!" This is the sound Don Corneo frequently makes in Japanese and also supposed to be a Japanese onomatopoeia for the sound a pig makes, thus likening Don Corneo to being a disgusting pig. This change was so confusing that Aerith's English voice actress, Briana White, had to spend almost five minutes explaining the laugh is supposed to be a mocking parody of Corneo's laugh when she was streaming the game on Twitch.tv.</span></li><li data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node=""> The slightly infamous "Mine!" scene, where some find Aerith to be a bit catty and possessive over Cloud, is an invention of the English dub. Even the sound Tifa makes is more disgruntled than scared in the English dub, which overall plays up the love triangle more.</span></li><li data-dcnode-id="3324"><span data-dcnode-id="3335" instrument_node=""> In Chapter 14, during the </span><span class="spoiler" data-dcnode-id="3333" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3334" instrument_node="">dream sequence with Aerith, her response to Cloud's promise to come save her</span></span><span data-dcnode-id="3332" instrument_node=""> in English is "If that's what you want... thank you" which can give off the impression of being dismissive and/or resigned. The original line in Japanese is much more appreciative and reciprocal toward the other party's feelings, as it is along the lines of "This is so frustrating... but I'm so glad"</span><span class="notelabel" data-dcnode-id="3329" onclick="togglenote('note46c2m');" style="cursor: pointer;"><sup data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3326" id="note46c2m" isnote="true" onclick="togglenote('note46c2m');" style="display: none; cursor: pointer;"><em data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">"Kuyashii kedo... ureshii"</span></em></span><span data-dcnode-id="3325" instrument_node="">.</span></li><li data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node=""> During the elevator escape scene in Chapter 17 while the group is separated, just before the boss fight against the Arsenal, the English dub depicts Barret and Aerith having a brief exchange where Barret quips that they gotta believe the others made it out okay, Aerith responding "I hope so" in a rather neutral voice while clasping her hands in prayer. The original Japanese line, however, has Aerith simply say Cloud's name and in a much more worried tone, making it clear that she's primarily concerned for his wellbeing.</span></li><li data-dcnode-id="3297"><span data-dcnode-id="3321" instrument_node=""> The scene in the final chapter immediately after the final boss battle is over has a subtle vocabulary change in Japanese that is impossible to translate into any other language: </span><span class="spoiler" data-dcnode-id="3310" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3320" instrument_node="">during Cloud and Sephiroth's confrontation at the End of the World, also known as the "edge of creation" (in Japanese, the "leading edge of the world"), Sephiroth addresses himself as </span><em data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">ore</span></em><span data-dcnode-id="3317" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/JapanesePronouns" title="/pmwiki/pmwiki.php/UsefulNotes/JapanesePronouns"><span data-dcnode-id="3316" instrument_node="">instead of</span></a><span data-dcnode-id="3314" instrument_node=""> </span><em data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">watashi</span></em><span data-dcnode-id="3311" instrument_node=""> which is the personal pronoun he'd been using for the entirety of the game up to that point.</span></span><span data-dcnode-id="3309" instrument_node=""> What this means for the story is pretty significant: </span><span class="spoiler" data-dcnode-id="3302" title="you can set spoilers visible by default on your profile"><em data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">ore</span></em><span data-dcnode-id="3306" instrument_node=""> was how he spoke of himself before </span><a class="twikilink" data-dcnode-id="3304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/CrisisCore" title="/pmwiki/pmwiki.php/VideoGame/CrisisCore"><span data-dcnode-id="3305" instrument_node="">he went insane</span></a><span data-dcnode-id="3303" instrument_node=""> and is a strong indicator this isn't the same Sephiroth who has been haunting Cloud's visions.</span></span><span data-dcnode-id="3301" instrument_node=""> In fact, this slight change is so big that it easily qualifies as a </span><a class="twikilink" data-dcnode-id="3299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamLine" title="/pmwiki/pmwiki.php/Main/WhamLine"><span data-dcnode-id="3300" instrument_node="">Wham Line</span></a><span data-dcnode-id="3298" instrument_node=""> for Japanese players.</span></li><li data-dcnode-id="3279"><span data-dcnode-id="3296" instrument_node=""> The final line of the game in English is Aerith saying "I miss it. The steel sky." The meaning being that she is now outside of Midgar in a big, wide world that is overwhelming her, which calls back to her conversation with Cloud in Chapter 8 on the rooftops. However, her line in Japanese evokes a very different emotional response: she says "The sky... I hate it."</span><span class="notelabel" data-dcnode-id="3293" onclick="togglenote('note5ch7j');" style="cursor: pointer;"><sup data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3290" id="note5ch7j" isnote="true" onclick="togglenote('note5ch7j');" style="display: none; cursor: pointer;"><em data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">"Sora... kirai da na"</span></em></span><span data-dcnode-id="3289" instrument_node=""> An interview with </span><a class="twikilink" data-dcnode-id="3287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TetsuyaNomura" title="/pmwiki/pmwiki.php/Creator/TetsuyaNomura"><span data-dcnode-id="3288" instrument_node="">Tetsuya Nomura</span></a><span data-dcnode-id="3286" instrument_node=""> in the </span><em data-dcnode-id="3284"><spa
