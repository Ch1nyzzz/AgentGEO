decked out to the brim with belts. It helps make him all the more imposing as he shows off his skills during his boss fight.</span></li></ul></li><li data-dcnode-id="4627"><span data-dcnode-id="4639" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBadGuyWins" title="/pmwiki/pmwiki.php/Main/TheBadGuyWins"><span data-dcnode-id="4638" instrument_node="">The Bad Guy Wins</span></a><span data-dcnode-id="4636" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4628" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4635" instrument_node="">Sephiroth convinces the party that the Arbiters of Fate must be stopped via context-less visions of the future that will happen if they "fail to stop them", thus freeing destiny up to be changed - </span><a class="twikilink" data-dcnode-id="4633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero" title="/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero"><span data-dcnode-id="4634" instrument_node="">just as Sephiroth intended</span></a><span data-dcnode-id="4632" instrument_node="">. Not only that, in the resulting fight with Sephiroth, just when it seems that they were winning the fight, Sephiroth draws Cloud into a one-on-one battle and easily beats him, meaning that Sephiroth walks away at the game's end with the win, having gotten everything he wanted. The only thing that keeps this from being a full </span><a class="twikilink" data-dcnode-id="4630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerEnding" title="/pmwiki/pmwiki.php/Main/DownerEnding"><span data-dcnode-id="4631" instrument_node="">Downer Ending</span></a><span data-dcnode-id="4629" instrument_node=""> is that this is only the beginning of the party's quest to stop Sephiroth.</span></span></li><li data-dcnode-id="4592"><span data-dcnode-id="4626" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BalancePowerSkillGimmick" title="/pmwiki/pmwiki.php/Main/BalancePowerSkillGimmick"><span data-dcnode-id="4625" instrument_node="">Balance, Power, Skill, Gimmick</span></a><span data-dcnode-id="4623" instrument_node="">:</span><ul data-dcnode-id="4593"><li data-dcnode-id="4618"><span data-dcnode-id="4622" instrument_node=""> </span><strong data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">Balance</span></strong><span data-dcnode-id="4619" instrument_node="">: Cloud has solid attributes all around, and his giant swords and agile combat style make him suitable against large crowds despite fighting at close range.</span></li><li data-dcnode-id="4604"><span data-dcnode-id="4617" instrument_node=""> </span><strong data-dcnode-id="4615"><span data-dcnode-id="4616" instrument_node="">Power</span></strong><span data-dcnode-id="4614" instrument_node="">: Barret sports naturally high defense and HP, as well as abilities that make him </span><a class="twikilink" data-dcnode-id="4612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImmuneToFlinching" title="/pmwiki/pmwiki.php/Main/ImmuneToFlinching"><span data-dcnode-id="4613" instrument_node="">Immune to Flinching</span></a><span data-dcnode-id="4611" instrument_node="">, but he moves and dodges very slowly. Ranged weapons make him a </span><a class="twikilink" data-dcnode-id="4609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoneWall" title="/pmwiki/pmwiki.php/Main/StoneWall"><span data-dcnode-id="4610" instrument_node="">Stone Wall</span></a><span data-dcnode-id="4608" instrument_node=""> with poor damage output in exchange for long reach, while melee weapons turn him into a </span><a class="twikilink" data-dcnode-id="4606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MightyGlacier" title="/pmwiki/pmwiki.php/Main/MightyGlacier"><span data-dcnode-id="4607" instrument_node="">Mighty Glacier</span></a><span data-dcnode-id="4605" instrument_node=""> with extremely slow but powerful attacks.</span></li><li data-dcnode-id="4599"><span data-dcnode-id="4603" instrument_node=""> </span><strong data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">Skill</span></strong><span data-dcnode-id="4600" instrument_node="">: Tifa can zip around the field and quickly damage and/or stagger single targets, but has low HP and defense and struggles with fighting multiple enemies at once.</span></li><li data-dcnode-id="4594"><span data-dcnode-id="4598" instrument_node=""> </span><strong data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">Gimmick</span></strong><span data-dcnode-id="4595" instrument_node="">: Aerith is more proficient than the others at spellcasting in terms of both stats and support abilities, but prefers to fight at a distance and cannot deal physical damage outside of very niche circumstances.</span></li></ul></li><li data-dcnode-id="4584"><span data-dcnode-id="4591" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBaroness" title="/pmwiki/pmwiki.php/Main/TheBaroness"><span data-dcnode-id="4590" instrument_node="">The Baroness</span></a><span data-dcnode-id="4588" instrument_node="">: Scarlet fits this to a T. A glamourous </span><a class="twikilink" data-dcnode-id="4586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LadyInRed" title="/pmwiki/pmwiki.php/Main/LadyInRed"><span data-dcnode-id="4587" instrument_node="">Lady in Red</span></a><span data-dcnode-id="4585" instrument_node=""> with strong dominatrix vibes such as using a soldier as a footstool and delights in war and violence.</span></li><li data-dcnode-id="4576"><span data-dcnode-id="4583" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BatterUp" title="/pmwiki/pmwiki.php/Main/BatterUp"><span data-dcnode-id="4582" instrument_node="">Batter Up!</span></a><span data-dcnode-id="4580" instrument_node="">: The Nail Bat, </span><a class="twikilink" data-dcnode-id="4578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="4579" instrument_node="">which is a baseball bat with nails in it</span></a><span data-dcnode-id="4577" instrument_node="">, returns as one of Cloud's weapons. Fittingly, it alters the animations of his Punishment mode attacks, winding up before delivering a powerful swing as though he was a baseball player.</span></li><li data-dcnode-id="4571"><span data-dcnode-id="4575" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBeforetimes" title="/pmwiki/pmwiki.php/Main/TheBeforetimes"><span data-dcnode-id="4574" instrument_node="">The Beforetimes</span></a><span data-dcnode-id="4572" instrument_node="">: The Planet was once home to the Cetra, a group of people capable of communing with the Planet and manipulating the Lifestream, but who were all-but wiped out when the Calamity from the Skies arrived two-thousand years ago. Shinra's HQ has a virtual reality simulator that depicts the Cetra's civilization at its height as looking like something out of medieval fantasy.</span></li><li data-dcnode-id="4563"><span data-dcnode-id="4570" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeautyIsNeverTarnished" title="/pmwiki/pmwiki.php/Main/BeautyIsNeverTarnished"><span data-dcnode-id="4569" instrument_node="">Beauty Is Never Tarnished</span></a><span data-dcnode-id="4567" instrument_node="">: Aerith can go through Corneo's rape mansion, an </span><a class="twikilink" data-dcnode-id="4565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsurdlySpaciousSewer" title="/pmwiki/pmwiki.php/Main/AbsurdlySpaciousSewer"><span data-dcnode-id="4566" instrument_node="">Absurdly Spacious Sewer</span></a><span data-dcnode-id="4564" instrument_node="">, a Train Graveyard, and have helicopters explode in her face, and by the time she gets to Marlene, she still smells nice, like a flower. Contrast Biggs and Tifa, who both frequently proclaim their need for a shower. Clearly a Cetra power now.</span></li><li data-dcnode-id="4555"><span data-dcnode-id="4562" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeginWithAFinisher" title="/pmwiki/pmwiki.php/Main/BeginWithAFinisher"><span data-dcnode-id="4561" instrument_node="">Begin with a Finisher</span></a><span data-dcnode-id="4559" instrument_node="">: The Götterdämmerung grants you a </span><a class="twikilink" data-dcnode-id="4557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LimitBreak" title="/pmwiki/pmwiki.php/Main/LimitBreak"><span data-dcnode-id="4558" instrument_node="">Limit Break</span></a><span data-dcnode-id="4556" instrument_node=""> at the start of combat, allowing you to open up with your ultimate move.</span></li><li data-dcnode-id="4550"><span data-dcnode-id="4554" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BFS" title="/pmwiki/pmwiki.php/Main/BFS"><span data-dcnode-id="4553" instrument_node="">BFS</span></a><span data-dcnode-id="4551" instrument_node="">: Cloud's iconic Buster Sword returns, and he has no problem spinning it around and hefting it over his head.</span></li><li data-dcnode-id="4539"><span data-dcnode-id="4549" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBadEnsemble" title="/pmwiki/pmwiki.php/Main/BigBadEnsemble"><span data-dcnode-id="4548" instrument_node="">Big Bad Ensemble</span></a><span data-dcnode-id="4546" instrument_node="">: Sephiroth and Rufus Shinra share the </span><a class="twikilink" data-dcnode-id="4544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="4545" instrument_node="">Big Bad</span></a><span data-dcnode-id="4543" instrument_node=""> position at the end of part 1. Sephiroth wants to </span><span class="spoiler" data-dcnode-id="4541" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4542" instrument_node="">change fate so that he succeeds in his plans to become a god and destroy the planet</span></span><span data-dcnode-id="4540" instrument_node=""> while Rufus attempts to expand Shinra's grip on the world and rule it.</span></li><li data-dcnode-id="4531"><span data-dcnode-id="4538" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBadWannabe" title="/pmwiki/pmwiki.php/Main/BigBadWannabe"><span data-dcnode-id="4537" instrument_node="">Big Bad Wannabe</span></a><span data-dcnode-id="4535" instrument_node="">: The Sahagin Prince. According to the description provided by the Assess Materia, he believes the only way his species can thrive is to conquer the surface world. Those are some pretty bold plans for what's ultimately a </span><a class="twikilink" data-dcnode-id="4533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KingMook" title="/pmwiki/pmwiki.php/Main/KingMook"><span data-dcnode-id="4534" instrument_node="">King Mook</span></a><span data-dcnode-id="4532" instrument_node=""> to some sewer-dwelling turtle-men that the protagonists slaughter without a second thought.</span></li><li data-dcnode-id="4524"><span data-dcnode-id="4530" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigDamnHeroes" title="/pmwiki/pmwiki.php/Main/BigDamnHeroes"><span data-dcnode-id="4529" instrument_node="">Big Damn Heroes</span></a><span data-dcnode-id="4527" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4525" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4526" instrument_node="">While the Whispers are an ambiguously neutral force that only serves to protect the Planet, they do come to the heroes' aid multiple times during the end of the Shinra HQ segment, including saving Barret's life and protecting the heroes from meeting a messy end several times during the motorcycle chase sequence.</span></span></li><li data-dcnode-id="4509"><span data-dcnode-id="4523" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="4522" instrument_node="">Bittersweet Ending</span></a><span data-dcnode-id="4520" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4510" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="4518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBadGuyWins" title="/pmwiki/pmwiki.php/Main/TheBadGuyWins"><span data-dcnode-id="4519" instrument_node="">The Bad Guy Wins</span></a><span data-dcnode-id="4517" instrument_node="">, as Sephiroth has successfully manipulated things so that the protagonists destroy the Arbiters of Fate, freeing him from an inevitable defeat </span><a class="twikilink" data-dcnode-id="4515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="4516" instrument_node="">Because Destiny Says So</span></a><span data-dcnode-id="4514" instrument_node="">. That said, this is only the beginning of the story, so there's still hope that they'll stop Sephiroth from becoming a god. And while Sephiroth is no longer destined to lose, this goes both ways, freeing characters from inevitable deaths, since Biggs and Zack are shown to be </span><a class="twikilink" data-dcnode-id="4512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SparedByTheAdaptation" title="/pmwiki/pmwiki.php/Main/SparedByTheAdaptation"><span data-dcnode-id="4513" instrument_node="">Spared by the Adaptation</span></a><span data-dcnode-id="4511" instrument_node="">.</span></span></li><li data-dcnode-id="4499"><span data-dcnode-id="4508" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackDudeDiesFirst" title="/pmwiki/pmwiki.php/Main/BlackDudeDiesFirst"><span data-dcnode-id="4507" instrument_node="">Black Dude Dies First</span></a><span data-dcnode-id="4505" instrument_node="">: Turned into a meta-joke. </span><span class="spoiler" data-dcnode-id="4500" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4504" instrument_node="">Sephiroth kills Barret near the end of the game, but the Whispers resurrect him on the spot because he was never </span><em data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">supposed</span></em><span data-dcnode-id="4501" instrument_node=""> to die. In an interview dating back to the original's release, Barret was a candidate for getting killed off by Sephiroth, but the developers choose Aerith instead because they believed Barret would have been "too obvious".</span></span></li><li data-dcnode-id="4485"><span data-dcnode-id="4498" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BladeLock" title="/pmwiki/pmwiki.php/Main/BladeLock"><span data-dcnode-id="4497" instrument_node="">Blade Lock</span></a><span data-dcnode-id="4495" instrument_node="">: Cloud leaps at Sephiroth with his Buster Sword in an attempt to cut him in half, only for Sephiroth to nonchalantly block his attack with the Masamune as a </span><a class="twikilink" data-dcnode-id="4493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="4494" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="4492" instrument_node=""> to the beginning of their duel in </span><em data-dcnode-id="4489"><a class="twikilink" data-dcnode-id="4490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/FinalFantasyVIIAdventChildren" title="/pmwiki/pmwiki.php/Anime/FinalFantasyVIIAdventChildren"><span data-dcnode-id="4491" instrument_node="">Final Fantasy VII: Advent Children</span></a></em><span data-dcnode-id="4488" instrument_node="">. They lock blades once again as </span><span class="spoiler" data-dcnode-id="4486" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4487" instrument_node="">a lead in to the final boss battle, and once more during their confrontation at the "edge of creation".</span></span></li><li data-dcnode-id="4476"><span data-dcnode-id="4484" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlandNameProduct" title="/pmwiki/pmwiki.php/Main/BlandNameProduct"><span data-dcnode-id="4483" instrument_node="">Bland-Name Product</span></a><span data-dcnode-id="4481" instrument_node="">: In the final chapter, the motorcyle Cloud is riding is named as a "Hardy-Daytona," an obvious spoof of the real-life </span><a class="urllink" data-dcnode-id="4478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harley-Davidson"><span data-dcnode-id="4480" instrument_node="">Harley-Davidson</span><img data-dcnode-id="4479" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="4477" instrument_node=""> motorcycle company.</span></li><li data-dcnode-id="4471"><span data-dcnode-id="4475" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BloodlessCarnage" title="/pmwiki/pmwiki.php/Main/BloodlessCarnage"><span data-dcnode-id="4474" instrument_node="">Bloodless Carnage</span></a><span data-dcnode-id="4472" instrument_node="">: Through all the fighting done with a variety of weapons, not a single drop of blood is seen. Not even when Cloud slashes Shinra troopers across the torso with the Buster Sword in a few cutscenes.</span></li><li data-dcnode-id="4449"><span data-dcnode-id="4470" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="4469" instrument_node="">Bonus Boss</span></a><span data-dcnode-id="4467" instrument_node="">:</span><ul data-dcnode-id="4450"><li data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node=""> Bahamut, the ultimate summon, who is unlocked by completing all of the other Battle Intel missions and is the strongest opponent you can fight on your first playthrough.</span></li><li data-dcnode-id="4460"><span data-dcnode-id="4464" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4462" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4463" instrument_node="">Pride and Joy Prototype</span></span><span data-dcnode-id="4461" instrument_node="">, who is unlocked by completing all Corneo Colosseum matches, all Shinra Virtual Combat Simulator matches, and all Battle Intel missions, and is the ultimate final opponent in the game.</span></li><li data-dcnode-id="4451"><span data-dcnode-id="4459" instrument_node=""> In </span><em data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">Intergrade</span></em><span data-dcnode-id="4456" instrument_node="">, </span><span class="spoiler" data-dcnode-id="4453" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="4454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DirgeOfCerberus" title="/pmwiki/pmwiki.php/VideoGame/DirgeOfCerberus"><span data-dcnode-id="4455" instrument_node="">Weiss the Immaculate</span></a></span><span data-dcnode-id="4452" instrument_node=""> is an extra boss in the Battle Intel missions.</span></li></ul></li><li data-dcnode-id="4439"><span data-dcnode-id="4448" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BoringButPractical" title="/pmwiki/pmwiki.php/Main/BoringButPractical"><span data-dcnode-id="4447" instrument_node="">Boring, but Practical</span></a><span data-dcnode-id="4445" instrument_node="">:</span><ul data-dcnode-id="4440"><li data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node=""> The playable cast's starting weapons (Buster Sword, Gatling Gun, Leather Gloves, and Guard Staff) are all fairly straightforward to use, don't have super high stats, and lack the visual appeal of some of the other weapons. At the same time, they have a balanced attack and magic stat, a decent amount of Materia slots and learn mostly straightforward upgrades, while also avoiding changing the characters' moveset too dramatically. As a result, they remain reliable and useful the entire game, and only really need to be replaced by weapons with more specialized stats for when needed.</span></li><li data-dcnode-id="4441"><span data-dcnode-id="4442" instrument_node=""> On Hard mode, Chakra. An easy-to-acquire materia that allows you to restore a percentage of your HP and cures poison. While not as useful as items and not as potent as healing spells, items are restricted on Hard, meaning both your HP and MP cannot be restored on the fly. Chakra, which uses no MP and only one ATB bar, becomes a quick and easy way to heal yourself. The removing poison effect is a major strength as well at late game fights.</span></li></ul></li><li data-dcnode-id="4420"><span data-dcnode-id="4438" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossBonanza" title="/pmwiki/pmwiki.php/Main/BossBonanza"><span data-dcnode-id="4437" instrument_node="">Boss Bonanza</span></a><span data-dcnode-id="4435" instrument_node="">:</span><ul data-dcnode-id="4421"><li data-dcnode-id="4430"><span data-dcnode-id="4434" instrument_node=""> At the end of Chapter 17, you fight four straight boss fights against Swordipede, </span><span class="spoiler" data-dcnode-id="4432" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4433" instrument_node="">Jenova Dreamweaver</span></span><span data-dcnode-id="4431" instrument_node="">, Rufus, and the Arsenal without any regular combat in between. You can save and heal between the first three, but Rufus and the Arsenal are fought consecutively.</span></li><li data-dcnode-id="4422"><span data-dcnode-id="4429" instrument_node=""> In the final chapter, after completing the main portion of the bike segment, you are thrown into three back-to-back fights in a row against M.O.T.O.R., </span><span class="spoiler" data-dcnode-id="4427" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4428" instrument_node="">Whisper Harbinger</span></span><span data-dcnode-id="4426" instrument_node="">, and </span><span class="spoiler" data-dcnode-id="4424" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4425" instrument_node="">Sephiroth</span></span><span data-dcnode-id="4423" instrument_node="">, and may only save between the first two.</span></li></ul></li><li data-dcnode-id="4415"><span data-dcnode-id="4419" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossRemix" title="/pmwiki/pmwiki.php/Main/BossRemix"><span data-dcnode-id="4418" instrument_node="">Boss Remix</span></a><span data-dcnode-id="4416" instrument_node="">: Some of the boss battles use a remix of the main battle theme instead of the theme regularly used for boss battles in the original. The boss fights against the Turks and Rufus Shinra even incorporate elements from the regular Shinra theme.</span></li><li data-dcnode-id="4404"><span data-dcnode-id="4414" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossRush" title="/pmwiki/pmwiki.php/Main/BossRush"><span data-dcnode-id="4413" instrument_node="">Boss Rush</span></a><span data-dcnode-id="4411" instrument_node="">: The final Shinra Virtual Combat Simulator mission has you fight your way through every previous summon battle (</span><span class="spoiler" data-dcnode-id="4409" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4410" instrument_node="">plus Ifrit</span></span><span data-dcnode-id="4408" instrument_node="">) before fighting the game's ultimate </span><a class="twikilink" data-dcnode-id="4406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="4407" instrument_node="">Bonus Boss</span></a><span data-dcnode-id="4405" instrument_node="">.</span></li><li data-dcnode-id="4383"><span data-dcnode-id="4403" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BothSidesHaveAPoint" title="/pmwiki/pmwiki.php/Main/BothSidesHaveAPoint"><span data-dcnode-id="4402" instrument_node="">Both Sides Have a Point</span></a><span data-dcnode-id="4400" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4392" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4399" instrument_node="">Both Aerith and Sephiroth are attempting to save the Planet from </span><em data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">something</span></em><span data-dcnode-id="4396" instrument_node="">. Sephiroth believes the best way to preserve the planet is to </span><a class="twikilink" data-dcnode-id="4394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillEmAll" title="/pmwiki/pmwiki.php/Main/KillEmAll"><span data-dcnode-id="4395" instrument_node="">sacrifice those living</span></a><span data-dcnode-id="4393" instrument_node=""> and return them to the Lifestream while Aerith firmly believes that's not what the planet wants.</span></span><div class="indent" data-dcnode-id="4384"><span data-dcnode-id="4391" instrument_node=""> </span><strong data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">Aerith</span></strong><span data-dcnode-id="4388" instrument_node="">: He'd tell you that he only cares about the planet. </span><a class="twikilink" data-dcnode-id="4386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WellIntentionedExtremist" title="/pmwiki/pmwiki.php/Main/WellIntentionedExtremist"><span data-dcnode-id="4387" instrument_node="">That he'd do everything in his power to protect and preserve it</span></a><span data-dcnode-id="4385" instrument_node="">. But this isn't the way it's supposed to be.</span></div></li><li data-dcnode-id="4372"><span data-dcnode-id="4382" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BraggingRightsReward" title="/pmwiki/pmwiki.php/Main/BraggingRightsReward"><span data-dcnode-id="4381" instrument_node="">Bragging Rights Reward</span></a><span data-dcnode-id="4379" instrument_node="">: Averted with the Gotterdammerung, the ultimate accessory acquired by completing all Colosseum, Battle Simulator, and Battle Intel missions, then beating the </span><a class="twikilink" data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="4378" instrument_node="">Bonus Boss</span></a><span data-dcnode-id="4376" instrument_node=""> that's unlocked in the Battle Simulator. It grants the equipped character a full Limit gauge at the start of every battle and regenerates said gauge at a rapid pace. While getting it requires beating the game's toughest individual battle, it doesn't require beating any of the game in Hard Mode except the </span><a class="twikilink" data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="4375" instrument_node="">Bonus Boss</span></a><span data-dcnode-id="4373" instrument_node=""> itself, making it extremely useful for completing the rest of the game.</span></li><li data-dcnode-id="4357"><span data-dcnode-id="4371" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakingOldTrends" title="/pmwiki/pmwiki.php/Main/BreakingOldTrends"><span data-dcnode-id="4370" instrument_node="">Breaking Old Trends</span></a><span data-dcnode-id="4368" instrument_node="">: Due to Cid Highwind not appearing until past the part of the story that </span><em data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">VII Remake</span></em><span data-dcnode-id="4365" instrument_node=""> covers, this is the first </span><em data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">Final Fantasy</span></em><span data-dcnode-id="4362" instrument_node=""> game since the original NES </span><em data-dcnode-id="4359"><a class="twikilink" data-dcnode-id="4360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyI" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyI"><span data-dcnode-id="4361" instrument_node="">Final Fantasy</span></a></em><span data-dcnode-id="4358" instrument_node=""> where no character named Cid appears or is even mentioned.</span></li><li data-dcnode-id="4352"><span data-dcnode-id="4356" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakMeter" title="/pmwiki/pmwiki.php/Main/BreakMeter"><span data-dcnode-id="4355" instrument_node="">Break Meter</span></a><span data-dcnode-id="4353" instrument_node="">: The Stagger Gauge is below the Health bar, when this is filled your enemy is knocked down and helpless, taking at least 160% more damage (this can be raised well beyond 400% with certain abilities). If they take too much damage, get hit by an attack they're weak to, or have a body part broken, a conscious enemy will get the "Pressured" status applied to their Stagger Gauge, "pressured" increases the rate that the Stagger Gauge fills.</span></li><li data-dcnode-id="4345"><span data-dcnode-id="4351" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokenHeel" title="/pmwiki/pmwiki.php/Main/BrokenHeel"><span data-dcnode-id="4350" instrument_node="">Broken Heel</span></a><span data-dcnode-id="4348" instrument_node="">: Jessie of Avalanche in trips and gets her foot stuck while trying to escape from the exploding reactor. Cloud stops to help her and they make it out </span><a class="twikilink" data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysClose" title="/pmwiki/pmwiki.php/Main/AlwaysClose"><span data-dcnode-id="4347" instrument_node="">right as the reactor explodes, even if the timer has not run out yet.</span></a></li><li data-dcnode-id="4340"><span data-dcnode-id="4344" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BunnyEarsLawyer" title="/pmwiki/pmwiki.php/Main/BunnyEarsLawyer"><span data-dcnode-id="4343" instrument_node="">Bunny-Ears Lawyer</span></a><span data-dcnode-id="4341" instrument_node="">: According to Reno, SOLDIER is an entire group of them. While at first he doesn't believe Cloud's claim of being ex-SOLDIER, he admits Cloud is certainly weird enough to fit in.</span></li><li data-dcnode-id="4335"><span data-dcnode-id="4339" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BusbyBerkeleyNumber" title="/pmwiki/pmwiki.php/Main/BusbyBerkeleyNumber"><span data-dcnode-id="4338" instrument_node="">Busby Berkeley Number</span></a><span data-dcnode-id="4336" instrument_node="">: The Honeybee Inn hosts lavish nightclub-style productions featuring the famous bumblebee-costumed ladies paired with men in top hats and tails, fittingly named Honeyboys, within a honeycomb-decorated lounge. While Cloud's routine to impress Andrea is just the two of them, it's bookended by a grand theatrical spectacle.</span></li><li data-dcnode-id="4325"><span data-dcnode-id="4334" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButHeSoundsHandsome" title="/pmwiki/pmwiki.php/Main/ButHeSoundsHandsome"><span data-dcnode-id="4333" instrument_node="">…But He Sounds Handsome</span></a><span data-dcnode-id="4331" instrument_node="">:</span><ul data-dcnode-id="4326"><li data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node=""> When you do the Angel of the Slums quest, you encounter a village gossip in Sector 5 named Mireille who provides you information to help you on the quest, though she wouldn't give a Shinra reporter the time of day before. After you complete the quest, if you talk with her again, she comments that "You know, there's a rumor that the Angel of the Slums is as radiant and beautiful as she is daring. I think that one is true." The game drops several hints that Mireille is the Angel of the Slums and outright confirms it if you complete another quest much later in the game.</span></li><li data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node=""> During the "Tomboy Bandit" sidequest, when you confront Kyrie, she denies being Kyrie before claiming that Kyrie is a cool name.</span></li></ul></li><li data-dcnode-id="4309"><span data-dcnode-id="4324" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButThouMust" title="/pmwiki/pmwiki.php/Main/ButThouMust"><span data-dcnode-id="4323" instrument_node="">But Thou Must!</span></a><span data-dcnode-id="4321" instrument_node="">: Played with in the gameplay and the narrative. There is a surprising amount of choices available (Cloud, Tifa, and Aerith have three different dresses each based on choices you make, and there's a "date" scene with Tifa, Aerith, or Barret towards the end of the game that also is affected by your choices), but the narrative itself is linear. However </span><span class="spoiler" data-dcnode-id="4319" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4320" instrument_node="">Sephiroth's plan is to destroy the status quo and create a future where he wins, which involves manipulating the main characters to destroy the Arbiter of Fate.</span></span><span data-dcnode-id="4318" instrument_node=""> There are strong implications that </span><span class="spoiler" data-dcnode-id="4310" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4317" instrument_node="">Aerith and Red XIII understand that they are potentially making things worse by destroying the Arbiter, as while Tifa, Barret, and Cloud are all confused by the flashes of the future, the other two seem to understand the implications much better. However, it </span><em data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">appears</span></em><span data-dcnode-id="4314" instrument_node=""> that they also think that there's a possibility to make things </span><em data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">better</span></em><span data-dcnode-id="4311" instrument_node="">, even if they don't know what will happen.</span></span></li><li data-dcnode-id="4297"><span data-dcnode-id="4308" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CastingGag" title="/pmwiki/pmwiki.php/Main/CastingGag"><span data-dcnode-id="4307" instrument_node="">Casting Gag</span></a><span data-dcnode-id="4305" instrument_node="">: One of the weapons Cloud can wield is a baseball bat with nails. His Japanese voice actor, </span><a class="twikilink" data-dcnode-id="4303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TakahiroSakurai" title="/pmwiki/pmwiki.php/Creator/TakahiroSakurai"><span data-dcnode-id="4304" instrument_node="">Takahiro Sakurai</span></a><span data-dcnode-id="4302" instrument_node="">, voices one of the two main characters in </span><em data-dcnode-id="4299"><a class="twikilink" data-dcnode-id="4300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/AceOfTheDiamond" title="/pmwiki/pmwiki.php/Manga/AceOfTheDiamond"><span data-dcnode-id="4301" instrument_node="">Ace of the Diamond</span></a></em><span data-dcnode-id="4298" instrument_node="">, a popular baseball series.</span></li><li data-dcnode-id="4281"><span data-dcnode-id="4296" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CentralTheme" title="/pmwiki/pmwiki.php/Main/CentralTheme"><span data-dcnode-id="4295" instrument_node="">Central Theme</span></a><span data-dcnode-id="4293" instrument_node="">: </span><a class="twikilink" data-dcnode-id="4291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlidingScaleOfFreeWillVsFate" title="/pmwiki/pmwiki.php/Main/SlidingScaleOfFreeWillVsFate"><span data-dcnode-id="4292" instrument_node="">Predestination</span></a><span data-dcnode-id="4290" instrument_node="">. Throughout the game, characters discuss the uncertainty of the future, feelings of being trapped doing something they don't want to do, following a path they cannot or will not deviate from, and if things are fated to happen or if they can be changed. Sephiroth's goal is directly stated to be "to </span><a class="twikilink" data-dcnode-id="4288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewDestiny" title="/pmwiki/pmwiki.php/Main/ScrewDestiny"><span data-dcnode-id="4289" instrument_node="">defy destiny</span></a><span data-dcnode-id="4287" instrument_node="">". The main party has sliding stances on fate. Cloud hates it because he believes he has no control over anything as it is and that fate only exists to make his life miserable, Barett is initially frustrated with it due to the seeming hopelessness of the situation in Midgar but becomes more hesitant of going against it </span><span class="spoiler" data-dcnode-id="4285" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4286" instrument_node="">after he's brought back from the dead by the Whispers on the order of the planet</span></span><span data-dcnode-id="4284" instrument_node="">, Tifa is scared but somewhat accepting of it, and Aerith takes much comfort in it but also is more and more guilty defying it </span><span class="spoiler" data-dcnode-id="4282" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4283" instrument_node="">because she's afraid of her constant visions of being impaled to death by Sephiroth that she knows will happen if she doesn't do anything to stop it.</span></span></li><li data-dcnode-id="4273"><span data-dcnode-id="4280" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChekhovsGunman" title="/pmwiki/pmwiki.php/Main/ChekhovsGunman"><span data-dcnode-id="4279" instrument_node="">Chekhov's Gunman</span></a><span data-dcnode-id="4277" instrument_node="">: Don Corneo shows up a second time in a later chapter when Avalanche is looking for information to </span><span class="spoiler" data-dcnode-id="4275" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4276" instrument_node="">get to the top of the plate</span></span><span data-dcnode-id="4274" instrument_node="">.</span></li><li data-dcnode-id="4265"><span data-dcnode-id="4272" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClimbingClimax" title="/pmwiki/pmwiki.php/Main/ClimbingClimax"><span data-dcnode-id="4271" instrument_node="">Climbing Climax</span></a><span data-dcnode-id="4269" instrument_node="">: Three of the final four chapters involve the heroes ascending </span><span class="spoiler" data-dcnode-id="4267" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4268" instrument_node="">the ruins of Sector 7</span></span><span data-dcnode-id="4266" instrument_node=""> and the Shinra HQ building, and Cloud's final battle of the segment takes place on the HQ building's roof.</span></li><li data-dcnode-id="4257"><span data-dcnode-id="4264" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CloseKnitCommunity" title="/pmwiki/pmwiki.php/Main/CloseKnitCommunity"><span data-dcnode-id="4263" instrument_node="">Close-Knit Community</span></a><span data-dcnode-id="4261" instrument_node="">: One of the things that separate the slums of Sector 5 and 7 from the </span><a class="twikilink" data-dcnode-id="4259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DenOfIniquity" title="/pmwiki/pmwiki.php/Main/DenOfIniquity"><span data-dcnode-id="4260" instrument_node="">Den of Iniquity</span></a><span data-dcnode-id="4258" instrument_node=""> that's Wall Market. Sector 7 may be impoverished with many people making a living from scavenging but they're tight with each other and the local watch. Sector 5 is basically a retirement home with an orphanage, it's the small town of slums and both sectors have one of your main female characters as the local sweetie. In contrast, Wall Market has Don Corneo and his lackeys though the Trio do provide some stability.</span></li><li data-dcnode-id="4243"><span data-dcnode-id="4256" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityReboot" title="/pmwiki/pmwiki.php/Main/ContinuityReboot"><span data-dcnode-id="4255" instrument_node="">Continuity Reboot</span></a><span data-dcnode-id="4253" instrument_node="">: The remake has been stated to not be connected to the original </span><em data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">Compilation</span></em><span data-dcnode-id="4250" instrument_node="">, and while it mostly follows the original game's plot with some </span><a class="twikilink" data-dcnode-id="4248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationExpansion" title="/pmwiki/pmwiki.php/Main/AdaptationExpansion"><span data-dcnode-id="4249" instrument_node="">Adaptation Expansion</span></a><span data-dcnode-id="4247" instrument_node=""> that doesn't contradict any established canon, </span><a class="twikilink" data-dcnode-id="4245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamShot" title="/pmwiki/pmwiki.php/Main/WhamShot"><span data-dcnode-id="4246" instrument_node="">the ending</span></a><span data-dcnode-id="4244" instrument_node=""> implies that will not be the case with future parts.</span></li><li data-dcnode-id="4235"><span data-dcnode-id="4242" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContractualBossImmunity" title="/pmwiki/pmwiki.php/Main/ContractualBossImmunity"><span data-dcnode-id="4241" instrument_node="">Contractual Boss Immunity</span></a><span data-dcnode-id="4239" instrument_node="">: Since the boss fights are much bigger, more drawn out spectacles, any undead boss you fight is immune to </span><a class="twikilink" data-dcnode-id="4237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReviveKillsZombie" title="/pmwiki/pmwiki.php/Main/ReviveKillsZombie"><span data-dcnode-id="4238" instrument_node="">Revive Kills Zombie</span></a><span data-dcnode-id="4236" instrument_node=""> - you can still damage them with cure spells, but phoenix downs and Raise won't instantly kill them. The game simultaneously downplays this trope, many players of other Final Fantasy games are pleasantly surprised when they find out that major bosses have a far more restricted range of immunities and resistances, such as Rude and Reno can be easily poisoned with the Bio spell series. This makes the Assessment ability a great help in fighting bosses.</span></li><li data-dcnode-id="4222"><span data-dcnode-id="4234" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoolShades" title="/pmwiki/pmwiki.php/Main/CoolShades"><span data-dcnode-id="4233" instrument_node="">Cool Shades</span></a><span data-dcnode-id="4231" instrument_node="">:</span><ul data-dcnode-id="4223"><li data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node=""> Barret sports a pair of fancy sunglasses while blasting through enemies and bosses with his guns and brazenly narrating that he would "take the load off your shoulders!".</span></li><li data-dcnode-id="4224"><span data-dcnode-id="4228" instrument_node=""> Rude has his iconic shades back that serve to make him look stoic and coolheaded. Just like in </span><em data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">Advent Children</span></em><span data-dcnode-id="4225" instrument_node="">, he keeps extra pairs in his suit just in case one gets damaged.</span></li></ul></li><li data-dcnode-id="4217"><span data-dcnode-id="4221" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive" title="/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive"><span data-dcnode-id="4220" instrument_node="">Corrupt Corporate Executive</span></a><span data-dcnode-id="4218" instrument_node="">: President Shinra, CEO of the Shinra Electric Power Company, is a greedy and ruthless tyrant who rules over Midgar through fear, crushing those who oppose him with his corporation's private army and the Turks. During the opening bombing run when Avalanche cripples Mako Reactor 8, Shinra orders the robots to destroy the reactor itself, causing massive property damage and chaos and panic across Sectors 1 and 8, to make Avalanche seem responsible and paint them as terrorists.</span></li><li data-dcnode-id="4207"><span data-dcnode-id="4216" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicRetcon" title="/pmwiki/pmwiki.php/Main/CosmicRetcon"><span data-dcnode-id="4215" instrument_node="">Cosmic Retcon</span></a><span data-dcnode-id="4213" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4208" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4212" instrument_node="">Apparently in connection to the defeat of the Arbiters of Fate in Episode 1, Zack somehow survives the Shinra ambush that killed him in the original </span><em data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">FF7</span></em><span data-dcnode-id="4209" instrument_node=""> timeline.</span></span></li><li data-dcnode-id="4202"><span data-dcnode-id="4206" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmeticAward" title="/pmwiki/pmwiki.php/Main/CosmeticAward"><span data-dcnode-id="4205" instrument_node="">Cosmetic Award</span></a><span data-dcnode-id="4203" instrument_node="">: Doing great in the dance sequence gets you Andrea's Earrings... which do nothing.</span></li><li data-dcnode-id="4197"><span data-dcnode-id="4201" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CounterAttack" title="/pmwiki/pmwiki.php/Main/CounterAttack"><span data-dcnode-id="4200" instrument_node="">Counter-Attack</span></a><span data-dcnode-id="4198" instrument_node="">: Cloud can do one automatically by guarding in Punisher Mode, and a fair number of opponents are most easily defeated by simply turtling up and letting them beat themselves up.</span></li><li data-dcnode-id="4182"><span data-dcnode-id="4196" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoverDrop" title="/pmwiki/pmwiki.php/Main/CoverDrop"><span data-dcnode-id="4195" instrument_node="">Cover Drop</span></a><span data-dcnode-id="4193" instrument_node="">:</span><ul data-dcnode-id="4183"><li data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node=""> At the start of Chapter 16, Cloud gives Shinra Headquarters a steady gaze as he readjusts the sword on his back.</span></li><li data-dcnode-id="4184"><span data-dcnode-id="4190" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4185" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4189" instrument_node="">When Sephiroth disarms Cloud during their duel, Cloud's sword </span><a class="twikilink" data-dcnode-id="4187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBladeAlwaysLandsPointyEndIn" title="/pmwiki/pmwiki.php/Main/TheBladeAlwaysLandsPointyEndIn"><span data-dcnode-id="4188" instrument_node="">sticks into the ground</span></a><span data-dcnode-id="4186" instrument_node=""> in an identical fashion to the title screen.</span></span></li></ul></li><li data-dcnode-id="4177"><span data-dcnode-id="4181" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreativeClosingCredits" title="/pmwiki/pmwiki.php/Main/CreativeClosingCredits"><span data-dcnode-id="4180" instrument_node="">Creative Closing Credits</span></a><span data-dcnode-id="4178" instrument_node="">: After the song "Hollow" ends and shortly after an orchestrated version of "Aerith's Theme" begins, the closing credits show cutscenes from the beginning of the game to the very end.</span></li><li data-dcnode-id="4154"><span data-dcnode-id="4176" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrossdressingVoices" title="/pmwiki/pmwiki.php/Main/CrossdressingVoices"><span data-dcnode-id="4175" instrument_node="">Crossdressing Voices</span></a><span data-dcnode-id="4173" instrument_node="">: </span><a class="twikilink" data-dcnode-id="4171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Exaggerated" title="/pmwiki/pmwiki.php/Main/Exaggerated"><span data-dcnode-id="4172" instrument_node="">Exaggerated</span></a><span data-dcnode-id="4170" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InUniverse" title="/pmwiki/pmwiki.php/Main/InUniverse"><span data-dcnode-id="4169" instrument_node="">In-Universe</span></a><span data-dcnode-id="4167" instrument_node="">. If Don Corneo picks Cloud for his date, </span><a class="twikilink" data-dcnode-id="4165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DudeLooksLikeALady" title="/pmwiki/pmwiki.php/Main/DudeLooksLikeALady"><span data-dcnode-id="4166" instrument_node="">Dude Looks Like a Lady</span></a><span data-dcnode-id="4164" instrument_node=""> but doesn't change his voice from his </span><a class="twikilink" data-dcnode-id="4162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassBaritone" title="/pmwiki/pmwiki.php/Main/BadassBaritone"><span data-dcnode-id="4163" instrument_node="">Badass Baritone</span></a><span data-dcnode-id="4161" instrument_node="">. Corneo does not comment on this whatsoever, which could be explained either by </span><a class="twikilink" data-dcnode-id="4159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Doylist" title="/pmwiki/pmwiki.php/Main/Doylist"><span data-dcnode-id="4160" instrument_node="">the devs not wanting to commission custom voice lines for that outcome</span></a><span data-dcnode-id="4158" instrument_node=""> or </span><a class="twikilink" data-dcnode-id="4156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Watsonian" title="/pmwiki/pmwiki.php/Main/Watsonian"><span data-dcnode-id="4157" instrument_node="">Corneo being into that</span></a><span data-dcnode-id="4155" instrument_node="">.</span></li><li data-dcnode-id="4124"><span data-dcnode-id="4153" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CryIntoChest" title="/pmwiki/pmwiki.php/Main/CryIntoChest"><span data-dcnode-id="4152" instrument_node="">Cry into Chest</span></a><span data-dcnode-id="4150" instrument_node="">: Happens between Cloud and Tifa in Chapter 14 </span><a class="twikilink" data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RelationshipValues" title="/pmwiki/pmwiki.php/Main/RelationshipValues"><span data-dcnode-id="4149" instrument_node="">if their affinity rating is high enough</span></a><span data-dcnode-id="4147" instrument_node="">. Tifa, whom had until this point maintained a relatively </span><img class="ymmv1 rounded" data-dcnode-id="4146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="4144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoicWoobie" title="/pmwiki/pmwiki.php/Main/StoicWoobie"><span data-dcnode-id="4145" instrument_node="">stoic</span></a><span data-dcnode-id="4143" instrument_node=""> and forward-thinking attitude following </span><span class="spoiler" data-dcnode-id="4141" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4142" instrument_node="">the destruction of Sector 7</span></span><span data-dcnode-id="4140" instrument_node="">, </span><a class="twikilink" data-dcnode-id="4138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakTheCutie" title="/pmwiki/pmwiki.php/Main/BreakTheCutie"><span data-dcnode-id="4139" instrument_node="">finally breaks down and cries</span></a><span data-dcnode-id="4137" instrument_node=""> into Cloud's chest after reflecting upon all that she has lost in her life (note that the aforementioned loss marks the </span><em data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">second</span></em><span data-dcnode-id="4134" instrument_node=""> time that </span><span class="spoiler" data-dcnode-id="4132" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4133" instrument_node="">her home and livelihood</span></span><span data-dcnode-id="4131" instrument_node=""> have been taken from her). Cloud—himself also being a </span><a class="twikilink" data-dcnode-id="4129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoicWoobie" title="/pmwiki/pmwiki.php/Main/StoicWoobie"><span data-dcnode-id="4130" instrument_node="">Stoic Woobie</span></a><span data-dcnode-id="4128" instrument_node=""> who has difficulty connecting with others—finally opens up and </span><a class="twikilink" data-dcnode-id="4126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TearJerker" title="/pmwiki/pmwiki.php/Main/TearJerker"><span data-dcnode-id="4127" instrument_node="">hugs her in response</span></a><span data-dcnode-id="4125" instrument_node="">; enough that Tifa soon has to interrupt him for holding her so tightly to the point of nearly hurting her.</span></li><li data-dcnode-id="4116"><span data-dcnode-id="4123" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CutsceneIncompetence" title="/pmwiki/pmwiki.php/Main/CutsceneIncompetence"><span data-dcnode-id="4122" instrument_node="">Cutscene Incompetence</span></a><span data-dcnode-id="4120" instrument_node="">: The characters are often pinned down by gunfire from Shinra's forces but, in actual gameplay, most firearm-wielding enemies just deal </span><a class="twikilink" data-dcnode-id="4118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScratchDamage" title="/pmwiki/pmwiki.php/Main/ScratchDamage"><span data-dcnode-id="4119" instrument_node="">Scratch Damage</span></a><span data-dcnode-id="4117" instrument_node=""> you can ignore.</span></li><li data-dcnode-id="4111"><span data-dcnode-id="4115" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CutscenePowerToTheMax" title="/pmwiki/pmwiki.php/Main/CutscenePowerToTheMax"><span data-dcnode-id="4114" instrument_node="">Cutscene Power to the Max</span></a><span data-dcnode-id="4112" instrument_node="">: In cutscenes, characters can perform all sorts of fancy acrobatics and attacks. The gameplay is much more restrained — characters can't even jump unless performing a special attack, but they can leap unrealistic distances when a cutscene requires it.</span></li><li data-dcnode-id="4106"><span data-dcnode-id="4110" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Cyberpunk" title="/pmwiki/pmwiki.php/Main/Cyberpunk"><span data-dcnode-id="4109" instrument_node="">Cyberpunk</span></a><span data-dcnode-id="4107" instrument_node="">: Like the original game, it has super-soldiers, bio augmentations, metropolis, and corrupt enterprises. However, it's less noticeable since the technology of today and the one from the world is similar. It's still a sci-fi game though.</span></li><li data-dcnode-id="4087"><span data-dcnode-id="4105" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkerAndEdgier" title="/pmwiki/pmwiki.php/Main/DarkerAndEdgier"><span data-dcnode-id="4104" instrument_node="">Darker and Edgier</span></a><span data-dcnode-id="4102" instrument_node="">: While the original </span><em data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">Final Fantasy VII</span></em><span data-dcnode-id="4099" instrument_node=""> was pretty dark, </span><em data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">Remake</span></em><span data-dcnode-id="4096" instrument_node=""> goes into slightly darker territory. A few characters die on-screen instead of by implication, the more graphic aftermath of Shinra's atrocities are shown, political propaganda plays a big part in making Avalanche out to be terrorists, and the main characters are much more vulgar in their speech patterns (including swearing more often). </span><span class="spoiler" data-dcnode-id="4088" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4095" instrument_node="">Then there are the Arbiters of Fate trying to keep characters that were </span><a class="twikilink" data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SparedByTheAdaptation" title="/pmwiki/pmwiki.php/Main/SparedByTheAdaptation"><span data-dcnode-id="4094" instrument_node="">Spared by the Adaptation</span></a><span data-dcnode-id="4092" instrument_node=""> from coming back, along with </span><a class="twikilink" data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBadGuyWins" title="/pmwiki/pmwiki.php/Main/TheBadGuyWins"><span data-dcnode-id="4091" instrument_node="">Sephiroth getting a complete victory by the game's ending</span></a><span data-dcnode-id="4089" instrument_node="">.</span></span></li><li data-dcnode-id="4076"><span data-dcnode-id="4086" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DashAttack" title="/pmwiki/pmwiki.php/Main/DashAttack"><span data-dcnode-id="4085" instrument_node="">Dash Attack</span></a><span data-dcnode-id="4083" instrument_node="">: One of Cloud's new combat abilities is the "Focused Thrust", which allows him to lunge forward several yards in a single stab attack. Also </span><a class="twikilink" data-dcnode-id="4081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DashAttack" title="/pmwiki/pmwiki.php/Main/DashAttack"><span data-dcnode-id="4082" instrument_node="">Dash Attack</span></a><span data-dcnode-id="4080" instrument_node=""> is really what the Parry Materia is, Cloud does a cartwheel rush, Tifa does a </span><a class="twikilink" data-dcnode-id="4078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlideAttack" title="/pmwiki/pmwiki.php/Main/SlideAttack"><span data-dcnode-id="4079" instrument_node="">Slide Attack</span></a><span data-dcnode-id="4077" instrument_node=""> while Barret and Aerith will shoulder charge the enemy.</span></li><li data-dcnode-id="4065"><span data-dcnode-id="4075" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ADayInTheLimelight" title="/pmwiki/pmwiki.php/Main/ADayInTheLimelight"><span data-dcnode-id="4074" instrument_node="">A Day in the Limelight</span></a><span data-dcnode-id="4072" instrument_node="">: After being absent for four chapters in a row </span><span class="notelabel" data-dcnode-id="4069" onclick="togglenote('note0rvyw');" style="cursor: pointer;"><sup data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4067" id="note0rvyw" isnote="true" onclick="togglenote('note0rvyw');" style="display: none; cursor: pointer;"><span data-dcnode-id="4068" instrument_node="">After Cloud gets seperated from Avalanche in Chapter 7, Barrett doesn't physically reappear again until Chapter 12.</span></span><span data-dcnode-id="4066" instrument_node=""> Barrett suddenly becomes the primary focus and even the main playable character of Chapter 13.</span></li><li data-dcnode-id="4060"><span data-dcnode-id="4064" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadlyUpgrade" title="/pmwiki/pmwiki.php/Main/DeadlyUpgrade"><span data-dcnode-id="4063" instrument_node="">Deadly Upgrade</span></a><span data-dcnode-id="4061" instrument_node="">: The mako infusion process that turns people into SOLDIERs has serious long-term health implications, something the public as a whole isn't told about, though recruits are - when they've reached a point that they're no longer willing to back down.</span></li><li data-dcnode-id="4045"><span data-dcnode-id="4059" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathGlare" title="/pmwiki/pmwiki.php/Main/DeathGlare"><span data-dcnode-id="4058" instrument_node="">Death Glare</span></a><span data-dcnode-id="4056" instrument_node="">: Cloud (</span><span class="spoiler" data-dcnode-id="4050" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="4054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DisguisedInDrag" title="/pmwiki/pmwiki.php/Main/DisguisedInDrag"><span data-dcnode-id="4055" instrument_node="">Disguised</span></a><span data-dcnode-id="4053" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DraggedIntoDrag" title="/pmwiki/pmwiki.php/Main/DraggedIntoDrag"><span data-dcnode-id="4052" instrument_node="">and Dragged Into Drag</span></a></span><span data-dcnode-id="4049" instrument_node="">) gives one to Don Corneo right before </span><span class="spoiler" data-dcnode-id="4047" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4048" instrument_node="">being dragged off to his private room as his newest chosen bride</span></span><span data-dcnode-id="4046" instrument_node="">; not that this terrifying glare does anything to stop the Don. Knowing how quickly Cloud resorts to violence, it's no surprise when he makes good on his silent threat a few minutes later.</span></li><li data-dcnode-id="4023"><span data-dcnode-id="4044" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeconstructionGame" title="/pmwiki/pmwiki.php/Main/DeconstructionGame"><span data-dcnode-id="4043" instrument_node="">Deconstruction Game</span></a><span data-dcnode-id="4041" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4024" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4040" instrument_node="">The first episode is a deconstruction on what a "remake" is. The idea is primarily represented by the Whispers, who are practically the embodiment of the concept of </span><a class="twikilink" data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Railroading" title="/pmwiki/pmwiki.php/Main/Railroading"><span data-dcnode-id="4039" instrument_node="">Railroading</span></a><span data-dcnode-id="4037" instrument_node=""> — several points in </span><em data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">Remake</span></em><span data-dcnode-id="4034" instrument_node=""> differ from the original game, but any time a </span><em data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">significant</span></em><span data-dcnode-id="4031" instrument_node=""> divergence would occur, the Whispers intervene and force characters to do things as they did in the original game. This includes stopping characters from going places they shouldn't, forcing characters to go places they weren't intending to, killing characters who otherwise might have been </span><a class="twikilink" data-dcnode-id="4029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SparedByTheAdaptation" title="/pmwiki/pmwiki.php/Main/SparedByTheAdaptation"><span data-dcnode-id="4030" instrument_node="">Spared by the Adaptation</span></a><span data-dcnode-id="4028" instrument_node="">, and saving characters who otherwise would have died before their time. The intent is to demonstrate that </span><a class="twikilink" data-dcnode-id="4026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationExpansion" title="/pmwiki/pmwiki.php/Main/AdaptationExpansion"><span data-dcnode-id="4027" instrument_node="">Adaptation Expansion</span></a><span data-dcnode-id="4025" instrument_node=""> means that certain plot events would likely unfold in different ways than the original game, and such minor changes can ripple out and cause larger shifts to the tone and direction of the narrative.</span></span></li><li data-dcnode-id="4013"><span data-dcnode-id="4022" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DefrostingIceKing" title="/pmwiki/pmwiki.php/Main/DefrostingIceKing"><span data-dcnode-id="4021" instrument_node="">Defrosting Ice King</span></a><span data-dcnode-id="4019" instrument_node="">:</span><ul data-dcnode-id="4014"><li data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node=""> Cloud starts off the game being very cold and distant towards the other members of Avalanche, clearly only being interested in the money. His only soft spot is Tifa and eventually Aerith, who encourage him to break out of his shell and interact with more people as well as to have some fun. By the end of the game, Cloud is a lot more open and caring of those close to him and eventually of the planet itself.</span></li><li data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node=""> The unnamed Gatekeeper in the Corneo Colosseum starts off as dismissive and indifferent towards Cloud and Aerith, but after their second victory in the Corneo Cup, he begins openly rooting for them.</span></li></ul></li><li data-dcnode-id="4008"><span data-dcnode-id="4012" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DemotedToExtra" title="/pmwiki/pmwiki.php/Main/DemotedToExtra"><span data-dcnode-id="4011" instrument_node="">Demoted to Extra</span></a><span data-dcnode-id="4009" instrument_node="">: Red XIII is not playable in the first part of the game, even when he joins the party. It is justified, in that the Shin-Ra HQ is the final dungeon of the part. Even in the original, you only really got to use Red for at least 2 mandatory fights (a third, if you used him for Motor Ball) before the overworld.</span></li><li data-dcnode-id="3993"><span data-dcnode-id="4007" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DevelopersForesight" title="/pmwiki/pmwiki.php/Main/DevelopersForesight"><span data-dcnode-id="4006" instrument_node="">Developers' Foresight</span></a><span data-dcnode-id="4004" instrument_node="">:</span><ul data-dcnode-id="3994"><li data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node=""> During the fight with Rude, he only actively attacks Cloud because he is under orders to take Aerith in unharmed. If the player switches to Aerith, Rude will throw an item at her that puts her to sleep, ensuring she cannot fight but also won't get hurt. Furthermore, Rude will only hurt Aerith if his attacks end up hitting her by accident.</span></li><li data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node=""> A few quests will adjust their dialogue if the player already has a missing component before you're required to get it. For example, one side quest involves going to the Sector 5 cemetery and killing the monsters there, but you need to buy the key from an NPC using Moogle Coins. If you bought it beforehand, Aerith will comment that you already have it.</span></li><li data-dcnode-id="3995"><span data-dcnode-id="3999" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CombatCommentator" title="/pmwiki/pmwiki.php/Main/CombatCommentator"><span data-dcnode-id="3998" instrument_node="">Combat commentators</span></a><span data-dcnode-id="3996" instrument_node=""> Scotch and Kotch have multiple lines of unique dialogue during Cloud and Aerith's fight with the Hell House. If you manage to get a summon out while fighting it, they will acknowledge it and have a unique dialogue about which summon was called out, including summons that would normally be impossible to have at that point of the game on the first playthrough, although all DLC summons have the same quote.</span></li></ul></li><li data-dcnode-id="3974"><span data-dcnode-id="3992" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiabolusExMachina" title="/pmwiki/pmwiki.php/Main/DiabolusExMachina"><span data-dcnode-id="3991" instrument_node="">Diabolus ex Machina</span></a><span data-dcnode-id="3989" instrument_node="">: Possibly. The ending reveals that </span><span class="spoiler" data-dcnode-id="3976" title="you can set spoilers visible by default on your profile"><em data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">the</span></em><span data-dcnode-id="3986" instrument_node=""> Sephiroth whom Cloud and the party have been encountering at specific points throughout the game may or may not be the same Sephiroth from </span><strong data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">after</span></strong><span data-dcnode-id="3983" instrument_node=""> the events of </span><em data-dcnode-id="3980"><a class="twikilink" data-dcnode-id="3981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/FinalFantasyVIIAdventChildren" title="/pmwiki/pmwiki.php/Anime/FinalFantasyVIIAdventChildren"><span data-dcnode-id="3982" instrument_node="">Advent Children</span></a></em><span data-dcnode-id="3979" instrument_node="">, having somehow gained the ability to time travel in an attempt to </span><a class="twikilink" data-dcnode-id="3977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MakeWrongWhatOnceWentRight" title="/pmwiki/pmwiki.php/Main/MakeWrongWhatOnceWentRight"><span data-dcnode-id="3978" instrument_node="">avert his defeat at the climax of the original game's plot</span></a></span><span data-dcnode-id="3975" instrument_node="">.</span></li><li data-dcnode-id="3969"><span data-dcnode-id="3973" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DialogDuringGameplay" title="/pmwiki/pmwiki.php/Main/DialogDuringGameplay"><span data-dcnode-id="3972" instrument_node="">Dialog During Gameplay</span></a><span data-dcnode-id="3970" instrument_node="">: The party banters both in battle and while navigating the maps. You'll also hear passi
