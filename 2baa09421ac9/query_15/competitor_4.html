strument_node=""> the </span><a class="twikilink" data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BikerBabe" title="/pmwiki/pmwiki.php/Main/BikerBabe"><span data-dcnode-id="1899" instrument_node="">Biker Babe</span></a><span data-dcnode-id="1897" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BareFistedMonk" title="/pmwiki/pmwiki.php/Main/BareFistedMonk"><span data-dcnode-id="1896" instrument_node="">Bare-Fisted Monk</span></a><span data-dcnode-id="1894" instrument_node=""> was the Tomboy and the pink-wearing </span><a class="twikilink" data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicalGirl" title="/pmwiki/pmwiki.php/Main/MagicalGirl"><span data-dcnode-id="1893" instrument_node="">Magical Girl</span></a><span data-dcnode-id="1891" instrument_node=""> as the Girly Girl.</span></li><li data-dcnode-id="1885"><span data-dcnode-id="1889" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UltimateJobSecurity" title="/pmwiki/pmwiki.php/Main/UltimateJobSecurity"><span data-dcnode-id="1888" instrument_node="">Ultimate Job Security</span></a><span data-dcnode-id="1886" instrument_node="">: Palmer is still employed as head of the Shinra Space Division despite the fact that Shinra hasn't had a space program for years. All he does is show up to board meetings and ask for a restoration of his budget - which never happens.</span></li><li data-dcnode-id="1874"><span data-dcnode-id="1884" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnintentionallyUnwinnable" title="/pmwiki/pmwiki.php/Main/UnintentionallyUnwinnable"><span data-dcnode-id="1883" instrument_node="">Unintentionally Unwinnable</span></a><span data-dcnode-id="1881" instrument_node="">: The presence of the flying "Helitrooper" enemies in Chapter 12 can leave the player in a problematic place. These enemies attack you as you climb the Sector 7 pillar, and because they're flying and try to dodge your attacks mid-air, they can get </span><em data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">clipped through the ceiling</span></em><span data-dcnode-id="1878" instrument_node=""> onto the next floor up, where they cannot be struck by the majority of attacks. Despite this, the game remains in its "combat" state, which means that the Triangle button is used for its combat function (Punisher Mode / Tifa's special attacks), rather than to ease your way through debris. If you happen to be on a floor where the only way to reach the stairs is via that Triangle button, you're stuck. Additionally, Thunder spells will still hit the Helitrooper... if you have that Materia equipped. If you don't, you're not going anywhere. </span><a class="twikilink" data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Downplayed" title="/pmwiki/pmwiki.php/Main/Downplayed"><span data-dcnode-id="1877" instrument_node="">Downplayed</span></a><span data-dcnode-id="1875" instrument_node=""> by the game's auto-save function: even if you do have to restart, you probably won't be set back very far.</span></li><li data-dcnode-id="1864"><span data-dcnode-id="1873" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnusuallyUninterestingSight" title="/pmwiki/pmwiki.php/Main/UnusuallyUninterestingSight"><span data-dcnode-id="1872" instrument_node="">Unusually Uninteresting Sight</span></a><span data-dcnode-id="1870" instrument_node="">: Nobody seems to be concerned about the fact there's a guy walking around with a minigun attached to his arm, only his aggressive demeanor. Same with Cloud to a lesser extent; though people do comment on his sword, they don't seem perturbed by him wearing it all the time, just that it makes him more recognizable. This was somewhat justified in the Shinra headquarters, as personnel in the upper lounge assumed the team were hired as mercenaries to combat the terrorist activities.</span><ul data-dcnode-id="1865"><li data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node=""> Jessie's mom doesn't seem too concerned that Jessie and her friends are wearing body armor when they visit her, with Biggs having 2 loaded magazines strapped to his shoulders. She still assumes that they are stagehands at the Golden Saucer, since that's what Jessie has been telling her.</span></li><li data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node=""> In a universe where magic has pretty clearly defined rules, being limited by mana and materia, the fact that Aerith can clearly break those rules by using magic missiles as her main attack with no limit, without needing materia for her abilities, and summoning her staff at will should be incredibly interesting to everyone. However, it goes without comment by the heroes or villains.</span></li></ul></li><li data-dcnode-id="1859"><span data-dcnode-id="1863" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UptownGirl" title="/pmwiki/pmwiki.php/Main/UptownGirl"><span data-dcnode-id="1862" instrument_node="">Uptown Girl</span></a><span data-dcnode-id="1860" instrument_node="">: Jessie originally came from the plate above Sector 7 and while her former home looks like an eyesore from the '70s, it's better than anything in the slums. Aerith may also count, she comes from the more pastoral Sector 5 slum instead of the hard-knocks Sector 7 and she lives in a nice big house that a lot of middle-class people in our world would envy (not to mention her huge garden area).</span></li><li data-dcnode-id="1854"><span data-dcnode-id="1858" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UrbanFantasy" title="/pmwiki/pmwiki.php/Main/UrbanFantasy"><span data-dcnode-id="1857" instrument_node="">Urban Fantasy</span></a><span data-dcnode-id="1855" instrument_node="">: Midgar now features even more real-world city touches like speed limit signs, brick and mortar apartment buildings, and so on. But the characters still fight with swords, staves, and magic spells.</span></li><li data-dcnode-id="1849"><span data-dcnode-id="1853" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VariableMix" title="/pmwiki/pmwiki.php/Main/VariableMix"><span data-dcnode-id="1852" instrument_node="">Variable Mix</span></a><span data-dcnode-id="1850" instrument_node="">: In areas where exploration and combat can coincide, such as Mako Reactor 1, the music changes depending on the situation the player is in, adding more suspense if the party is exploring and getting bombastic during combat.</span></li><li data-dcnode-id="1844"><span data-dcnode-id="1848" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ViceCity" title="/pmwiki/pmwiki.php/Main/ViceCity"><span data-dcnode-id="1847" instrument_node="">Vice City</span></a><span data-dcnode-id="1845" instrument_node="">: The Midgar slums are an unpleasant place to live. Most people live in squalor literally under the plates and metaphorically under immense corporate overreach. It has a sleazy red-light district run by a wealthy pervert crime boss, and muggers roam the under-streets looking for easy marks. Most people are tough, clever, and anti-social, and they have to be to survive.</span></li><li data-dcnode-id="1837"><span data-dcnode-id="1843" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGameRemake" title="/pmwiki/pmwiki.php/Main/VideoGameRemake"><span data-dcnode-id="1842" instrument_node="">Video Game Remake</span></a><span data-dcnode-id="1840" instrument_node="">: The game follows the same basic story and characters as the original game, with a completely new graphics engine, gameplay systems, set pieces, and so forth. </span><span class="spoiler" data-dcnode-id="1838" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1839" instrument_node="">Though there are changes to the story, some more impactful than others.</span></span></li><li data-dcnode-id="1829"><span data-dcnode-id="1836" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainHasAPoint" title="/pmwiki/pmwiki.php/Main/VillainHasAPoint"><span data-dcnode-id="1835" instrument_node="">Villain Has a Point</span></a><span data-dcnode-id="1833" instrument_node="">: President Shinra says that the ecological effects of Mako as a power source are known to the public and that they don't care so long as they have cheap power and their lives are made convenient. This is </span><a class="twikilink" data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TruthInTelevision" title="/pmwiki/pmwiki.php/Main/TruthInTelevision"><span data-dcnode-id="1832" instrument_node="">Truth in Television</span></a><span data-dcnode-id="1830" instrument_node=""> to a degree: the push to transition to sustainable energy in real life didn't get much traction until the cost became at least somewhat comparable to the less environmentally friendly alternatives.</span></li><li data-dcnode-id="1824"><span data-dcnode-id="1828" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainWithGoodPublicity" title="/pmwiki/pmwiki.php/Main/VillainWithGoodPublicity"><span data-dcnode-id="1827" instrument_node="">Villain with Good Publicity</span></a><span data-dcnode-id="1825" instrument_node="">: Shinra. It helps that they own the only news station in Midgar.</span></li><li data-dcnode-id="1814"><span data-dcnode-id="1823" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamEpisode" title="/pmwiki/pmwiki.php/Main/WhamEpisode"><span data-dcnode-id="1822" instrument_node="">Wham Episode</span></a><span data-dcnode-id="1820" instrument_node="">: Chapter 12, "Fight for Survival", features some of the most intense moments made even more painstakingly detailed for the remake. Not only are the stakes the highest they've been so far with Shinra attempting to bring down the Sector Seven plate which would kill millions, but </span><span class="spoiler" data-dcnode-id="1818" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1819" instrument_node="">Biggs is put out of commission and Jessie is killed.</span></span><span data-dcnode-id="1817" instrument_node=""> Aerith is finally taken by Shinra and to top it all off, </span><span class="spoiler" data-dcnode-id="1815" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1816" instrument_node="">Shinra succeeds in dropping the plate, wiping out the entire sector and causing widespread devastation.</span></span></li><li data-dcnode-id="1803"><span data-dcnode-id="1813" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamLine" title="/pmwiki/pmwiki.php/Main/WhamLine"><span data-dcnode-id="1812" instrument_node="">Wham Line</span></a><span data-dcnode-id="1810" instrument_node="">: "Wait... Was that all of 'em?" as </span><span class="spoiler" data-dcnode-id="1804" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1809" instrument_node="">Zack stands in the middle of the wastes outside Midgar surrounded by fallen Shinra troopers, exhausted but </span><em data-dcnode-id="1806"><a class="twikilink" data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SparedByTheAdaptation" title="/pmwiki/pmwiki.php/Main/SparedByTheAdaptation"><span data-dcnode-id="1808" instrument_node="">alive</span></a></em><span data-dcnode-id="1805" instrument_node="">.</span></span></li><li data-dcnode-id="1758"><span data-dcnode-id="1802" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamShot" title="/pmwiki/pmwiki.php/Main/WhamShot"><span data-dcnode-id="1801" instrument_node="">Wham Shot</span></a><span data-dcnode-id="1799" instrument_node="">:</span><ul data-dcnode-id="1759"><li data-dcnode-id="1788"><span data-dcnode-id="1798" instrument_node=""> It was heavily downplayed in the original, but here, you get to see the aftermath of Mako Reactor 1's destruction. Seeing the ruined city streets, burning skyline, and the panicked people, hearing their confused, scared, and angry dialogue, as well as the explicit knowledge that the explosion killed scores of people, really makes it hit home. The fact that it's casually revealed Shinra was responsible as part of the </span><a class="twikilink" data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseFlagOperation" title="/pmwiki/pmwiki.php/Main/FalseFlagOperation"><span data-dcnode-id="1797" instrument_node="">False Flag Operation</span></a><span data-dcnode-id="1795" instrument_node=""> really highlights how reprehensible they are, but for the characters (who don't share the player's awareness of that fact), it comes off as shock and horror that </span><em data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">they</span></em><span data-dcnode-id="1792" instrument_node=""> are responsible for this - especially Jessie, who created the bomb </span><span class="spoiler" data-dcnode-id="1790" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1791" instrument_node="">and sadly carries that false guilt to the grave</span></span><span data-dcnode-id="1789" instrument_node="">.</span></li><li data-dcnode-id="1768"><span data-dcnode-id="1787" instrument_node=""> As the party fights </span><span class="spoiler" data-dcnode-id="1785" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1786" instrument_node="">the Whisper Harbinger</span></span><span data-dcnode-id="1784" instrument_node="">, they're suddenly given a vision of </span><span class="spoiler" data-dcnode-id="1776" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1783" instrument_node="">Red XIII and his cubs using </span><a class="twikilink" data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StockFootage" title="/pmwiki/pmwiki.php/Main/StockFootage"><span data-dcnode-id="1782" instrument_node="">Stock Footage</span></a><span data-dcnode-id="1780" instrument_node=""> from </span><em data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Advent Children</span></em><span data-dcnode-id="1777" instrument_node="">.</span></span><span data-dcnode-id="1775" instrument_node=""> This, and subsequent visions in the game fight, carry very heavy implications for </span><a class="twikilink" data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicRetcon" title="/pmwiki/pmwiki.php/Main/CosmicRetcon"><span data-dcnode-id="1774" instrument_node="">what the party may be doing by accident</span></a><span data-dcnode-id="1772" instrument_node="">, and what the future of the </span><em data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">VII</span></em><span data-dcnode-id="1769" instrument_node=""> franchise could hold.</span></li><li data-dcnode-id="1760"><span data-dcnode-id="1767" instrument_node=""> One of the very last scenes before the credits is </span><span class="spoiler" data-dcnode-id="1762" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1766" instrument_node="">Zack </span><em data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">surviving</span></em><span data-dcnode-id="1763" instrument_node=""> his last stand against Shinra's troopers and heading back to Midgar with Cloud in tow. Where the following parts will go with this pretty major change in the story is yet unknown</span></span><span data-dcnode-id="1761" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1753"><span data-dcnode-id="1757" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatIsThisFeeling" title="/pmwiki/pmwiki.php/Main/WhatIsThisFeeling"><span data-dcnode-id="1756" instrument_node="">What Is This Feeling?</span></a><span data-dcnode-id="1754" instrument_node="">: If you talk to Chadley, the Shinra materia researcher and secret helper to your party when Cloud is in his dress, he will comment, "Forgive me, miss, but the way you're staring at me is rather... O-oh goodness. I'm experiencing an emotional response." If you speak to him again, he'll ask "What is this emotional response...?"</span></li><li data-dcnode-id="1748"><span data-dcnode-id="1752" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatTheHellHero" title="/pmwiki/pmwiki.php/Main/WhatTheHellHero"><span data-dcnode-id="1751" instrument_node="">What the Hell, Hero?</span></a><span data-dcnode-id="1749" instrument_node="">: After the bombing of Mako Reactor 1, Cloud is forced to navigate through Midgar's streets to link up with the rest of Avalanche. He (and the player) are forced to witness firsthand the massive collateral damage the bombing caused and its far-reaching effects on the people of Midgar. The people themselves are pretty evenly split between supporting Avalanche's environmental activism and denouncing them as terrorists who do nothing but make life harder for everyone else. Sure, Shinra deliberately exacerbated the damage to use as propaganda against Avalanche, but it was Avalanche's idea to bomb the reactor in the first place.</span></li><li data-dcnode-id="1723"><span data-dcnode-id="1747" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatTheHellPlayer" title="/pmwiki/pmwiki.php/Main/WhatTheHellPlayer"><span data-dcnode-id="1746" instrument_node="">What the Hell, Player?</span></a><span data-dcnode-id="1744" instrument_node="">: Aerith's quality of dress during the infiltration of Don Corneo's hideout is determined entirely based on how many side missions (if any) the player completed for Sector 5 in Chapter 8. If you failed to complete any, then Aerith is given a completely unremarkable dress, little different than the blouse she typically wears and the scene with her walking up to Don Corneo's mansion is highlighted with a bunch of stray animals pestering her. Aerith will later imply that the quality of the dress is directly the result of the player's laziness.</span><dl data-dcnode-id="1724"><dd data-dcnode-id="1725"><div class="indent" data-dcnode-id="1726"><strong data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Cloud</span></strong><span data-dcnode-id="1741" instrument_node="">: Doesn't really matter if you get picked or not anyway. </span><br data-dcnode-id="1740"><strong data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Aerith</span></strong><span data-dcnode-id="1737" instrument_node="">: Yeah, but still... You put a lot of work into this... </span><em data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">[</span><a class="twikilink" data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Beat" title="/pmwiki/pmwiki.php/Main/Beat"><span data-dcnode-id="1735" instrument_node="">Beat</span></a><span data-dcnode-id="1733" instrument_node="">]</span></em><span data-dcnode-id="1731" instrument_node=""> </span><em data-dcnode-id="1728"><a class="twikilink" data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatTheHellPlayer" title="/pmwiki/pmwiki.php/Main/WhatTheHellPlayer"><span data-dcnode-id="1730" instrument_node="">Did you</span></a></em><span data-dcnode-id="1727" instrument_node=""> put a lot of work into this?</span></div></dd></dl></li><li data-dcnode-id="1715"><span data-dcnode-id="1722" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WithAFriendAndAStranger" title="/pmwiki/pmwiki.php/Main/WithAFriendAndAStranger"><span data-dcnode-id="1721" instrument_node="">With a Friend and a Stranger</span></a><span data-dcnode-id="1719" instrument_node="">: The classic </span><em data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Final Fantasy</span></em><span data-dcnode-id="1716" instrument_node=""> example. A tough mercenary, his childhood friend, and a flower girl he just met.</span></li><li data-dcnode-id="1710"><span data-dcnode-id="1714" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YourSizeMayVary" title="/pmwiki/pmwiki.php/Main/YourSizeMayVary"><span data-dcnode-id="1713" instrument_node="">Your Size May Vary</span></a><span data-dcnode-id="1711" instrument_node="">: When characters handle Materia orbs in cutscenes, they're about the size of a softball. When equipped, they become more like marbles so that they're small enough to slot into the characters' weapons.</span></li></ul></div><p data-dcnode-id="1707"></p><div class="folderlabel" data-dcnode-id="1702" onclick="togglefolder('folder3');"><span data-dcnode-id="1706" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;</span><em data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Intergrade</span></em><span data-dcnode-id="1703" instrument_node="">&nbsp;</span></div><div class="folder" data-dcnode-id="1547" id="folder3" isfolder="true" style="display:block;"><ul data-dcnode-id="1548"><li data-dcnode-id="1683"><span data-dcnode-id="1701" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationalEarlyAppearance" title="/pmwiki/pmwiki.php/Main/AdaptationalEarlyAppearance"><span data-dcnode-id="1700" instrument_node="">Adaptational Early Appearance</span></a><span data-dcnode-id="1698" instrument_node="">: In the original game, Yuffie first appears as a </span><a class="twikilink" data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RandomEncounter" title="/pmwiki/pmwiki.php/Main/RandomEncounter"><span data-dcnode-id="1697" instrument_node="">Random Encounter</span></a><span data-dcnode-id="1695" instrument_node=""> </span><em data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">after</span></em><span data-dcnode-id="1692" instrument_node=""> the party leaves Midgar. Here, her DLC episode has her enter the story sometime after the events at Mako Reactor 5. </span><span class="spoiler" data-dcnode-id="1684" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1691" instrument_node="">Nero and Weiss, who were created for the sequel </span><em data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Dirge of Cerberus</span></em><span data-dcnode-id="1688" instrument_node=""> show up as bosses. Chocobo Bill makes a brief appearance in the DLC's ending to give Cloud's party a lift to Kalm. In the original game, Bill never leaves his ranch, which Cloud's party has yet to visit in </span><em data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Remake</span></em><span data-dcnode-id="1685" instrument_node="">.</span></span></li><li data-dcnode-id="1676"><span data-dcnode-id="1682" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllForNothing" title="/pmwiki/pmwiki.php/Main/AllForNothing"><span data-dcnode-id="1681" instrument_node="">All for Nothing</span></a><span data-dcnode-id="1679" instrument_node="">: In INTERmission, </span><span class="spoiler" data-dcnode-id="1677" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1678" instrument_node="">Yuffie and Sonon's infiltration of the Shinra Building turns out to be pointless, as the powerful materia they planned on stealing is still in development and useless in its current state. While they do get Scarlet to reveal that Shinra intends to drop the Sector 7 plate, by the time Yuffie manages to escape it's too late to stop that.</span></span></li><li data-dcnode-id="1671"><span data-dcnode-id="1675" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcVillain" title="/pmwiki/pmwiki.php/Main/ArcVillain"><span data-dcnode-id="1674" instrument_node="">Arc Villain</span></a><span data-dcnode-id="1672" instrument_node="">: Scarlet serves as the primary antagonist of the DLC, being indirectly involved in Sonon's life and more directly when she attempts to kill him and Yuffie after they enter the Shinra building.</span></li><li data-dcnode-id="1666"><span data-dcnode-id="1670" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AxCrazy" title="/pmwiki/pmwiki.php/Main/AxCrazy"><span data-dcnode-id="1669" instrument_node="">Ax-Crazy</span></a><span data-dcnode-id="1667" instrument_node="">: Nero. A sadistic nihilist who not only derives pleasure from murder, but in his own pain as well and even begs for more during his boss fight.</span></li><li data-dcnode-id="1661"><span data-dcnode-id="1665" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="1664" instrument_node="">Because Destiny Says So</span></a><span data-dcnode-id="1662" instrument_node="">: The only time you'll see a Whisper in Yuffie's mission is if she tries to enter 7th Heaven. That is strictly a nono. The Whispers care nothing about anything else Yuffie and Sonon do.</span></li><li data-dcnode-id="1650"><span data-dcnode-id="1660" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="1659" instrument_node="">Bittersweet Ending</span></a><span data-dcnode-id="1657" instrument_node="">: </span><em data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Very</span></em><span data-dcnode-id="1654" instrument_node=""> heavy on the bitter. Yuffie's mission </span><span class="spoiler" data-dcnode-id="1652" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1653" instrument_node="">turns out to be pointless since they can't steal the unrefined materia and Sonon dies protecting her from Nero after it seems like they had beaten him. What's more, once Yuffie escapes, the Sector 7 plan goes into motion and, unknown to her, Nero claims Sonon's body for an unknown purpose. There was nothing more Yuffie could've done except flee and get back to Wutai, though she regains her optimism and vows to make Shinra pay</span></span><span data-dcnode-id="1651" instrument_node="">.</span></li><li data-dcnode-id="1642"><span data-dcnode-id="1649" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BookEnds" title="/pmwiki/pmwiki.php/Main/BookEnds"><span data-dcnode-id="1648" instrument_node="">Bookends</span></a><span data-dcnode-id="1646" instrument_node="">: Yuffie's story in INTERmission begins and ends with </span><span class="spoiler" data-dcnode-id="1644" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1645" instrument_node="">her practicing a speech to introduce herself to her new allies</span></span><span data-dcnode-id="1643" instrument_node="">.</span></li><li data-dcnode-id="1624"><span data-dcnode-id="1641" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Cliffhanger" title="/pmwiki/pmwiki.php/Main/Cliffhanger"><span data-dcnode-id="1640" instrument_node="">Cliffhanger</span></a><span data-dcnode-id="1638" instrument_node="">: Ends on three separate notes.</span><ul data-dcnode-id="1625"><li data-dcnode-id="1634"><span data-dcnode-id="1637" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1635" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1636" instrument_node="">Yuffie escapes, her mission a failure and Sonon having died to protect her. Still, she plans to find Avalanche and join in their mission. Meanwhile Nero claims Sonon's body for... something.</span></span></li><li data-dcnode-id="1630"><span data-dcnode-id="1633" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1631" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1632" instrument_node="">Meanwhile our main heroes have left Midgar completely and hitched a ride to the next town. Once again, not knowing where their journey will lead them.</span></span></li><li data-dcnode-id="1626"><span data-dcnode-id="1629" instrument_node=""> And finally, </span><span class="spoiler" data-dcnode-id="1627" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1628" instrument_node="">Zack shows up at the church in Midgar, preparing himself to talk with Aerith. But when he goes in, he finds a few of the citizens inside mourning someone, much to his, and likely the player's, confusion. This brings up the question of whether this is still the revised timeline we're following or the original? </span></span></li></ul></li><li data-dcnode-id="1619"><span data-dcnode-id="1623" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownloadableContent" title="/pmwiki/pmwiki.php/Main/DownloadableContent"><span data-dcnode-id="1622" instrument_node="">Downloadable Content</span></a><span data-dcnode-id="1620" instrument_node="">: The Intergrade has Yuffie's story called "INTERmission" which can be played if you purchased it.</span></li><li data-dcnode-id="1612"><span data-dcnode-id="1618" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="1617" instrument_node="">Heroic Sacrifice</span></a><span data-dcnode-id="1615" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1613" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1614" instrument_node="">Sonon sacrifices himself to keep Nero from skewering Yuffie, staying alive long enough to get her out of the Shinra lab.</span></span></li><li data-dcnode-id="1607"><span data-dcnode-id="1611" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HugeGuyTinyGirl" title="/pmwiki/pmwiki.php/Main/HugeGuyTinyGirl"><span data-dcnode-id="1610" instrument_node="">Huge Guy, Tiny Girl</span></a><span data-dcnode-id="1608" instrument_node="">: Sonon is quite built and a whole head taller than Yuffie, a skinnier, younger girl. It turns out to work very well for them in combat as they utilise each other's body types to their advantage.</span></li><li data-dcnode-id="1599"><span data-dcnode-id="1606" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall" title="/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall"><span data-dcnode-id="1605" instrument_node="">Leaning on the Fourth Wall</span></a><span data-dcnode-id="1603" instrument_node="">: Yuffie comments "</span><em data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">I'm</span></em><span data-dcnode-id="1600" instrument_node=""> the leading lady."</span></li><li data-dcnode-id="1586"><span data-dcnode-id="1598" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MiniGame" title="/pmwiki/pmwiki.php/Main/MiniGame"><span data-dcnode-id="1597" instrument_node="">Mini-Game</span></a><span data-dcnode-id="1595" instrument_node="">: INTERmission features new and updated mini-games:</span><ul data-dcnode-id="1587"><li data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node=""> Fort Condor: A board game where you summon various combat units (Which have a straightforward rock-paper-scissors dynamic) and watch them go to battle, using both the units themselves and materia. The objective is to win by either taking out the opponent's towers (Which in a further nod to the original game are crowned with large condors), or by dealing more damage by the time the timer reaches zero.</span></li><li data-dcnode-id="1588"><span data-dcnode-id="1592" instrument_node=""> Shinra Box Buster: This game is just like Whack-a-Box. The difference is the game took place in Shinra's training room instead of the Sector 5 Slums and Whack-a-Box is to get 30,000 points while Shinra Box Buster is to get </span><em data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">50,000</span></em><span data-dcnode-id="1589" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1576"><span data-dcnode-id="1585" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="1584" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="1582" instrument_node="">:</span><ul data-dcnode-id="1577"><li data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node=""> The Happy Turtle Ad Campaign sidequest has you locating six posters around the Sector 7 Slums. This is a direct reference to the Turtle Paradise sidequest from the original game where you needed to locate six posters across the world to win a prize at a bar in Wutai.</span></li><li data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node=""> The Fort Condor minigame from the original game returns here as an actual board game that's played by several people across the slums, which Yuffie can partake in.</span></li></ul></li><li data-dcnode-id="1571"><span data-dcnode-id="1575" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PhotoMode" title="/pmwiki/pmwiki.php/Main/PhotoMode"><span data-dcnode-id="1574" instrument_node="">Photo Mode</span></a><span data-dcnode-id="1572" instrument_node="">: Added to the main game with a variety of filters.</span></li><li data-dcnode-id="1549"><span data-dcnode-id="1570" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SynchronousEpisodes" title="/pmwiki/pmwiki.php/Main/SynchronousEpisodes"><span data-dcnode-id="1569" instrument_node="">Synchronous Episodes</span></a><span data-dcnode-id="1567" instrument_node="">: The INTERmission story involves Yuffie as </span><a class="twikilink" data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheProtagonist" title="/pmwiki/pmwiki.php/Main/TheProtagonist"><span data-dcnode-id="1566" instrument_node="">The Protagonist</span></a><span data-dcnode-id="1564" instrument_node=""> along with a new character named </span><a class="twikilink" data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CanonForeigner" title="/pmwiki/pmwiki.php/Main/CanonForeigner"><span data-dcnode-id="1563" instrument_node="">Sonon</span></a><span data-dcnode-id="1561" instrument_node=""> that takes place during Avalanche's attack on Reactor 5, with the main game's playable characters </span><a class="twikilink" data-dcnode-id="1559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DemotedToExtra" title="/pmwiki/pmwiki.php/Main/DemotedToExtra"><span data-dcnode-id="1560" instrument_node="">Cloud, Barret, Tifa, and Aerith</span></a><span data-dcnode-id="1558" instrument_node=""> being reduced to </span><a class="twikilink" data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCameo" title="/pmwiki/pmwiki.php/Main/TheCameo"><span data-dcnode-id="1557" instrument_node="">The Cameo</span></a><span data-dcnode-id="1555" instrument_node="">. </span><span class="notelabel" data-dcnode-id="1552" onclick="togglenote('note8x4u3');" style="cursor: pointer;"><sup data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1550" id="note8x4u3" isnote="true" onclick="togglenote('note8x4u3');" style="display: none; cursor: pointer;"><span data-dcnode-id="1551" instrument_node="">Multiple plot points from the base game, like the Avalanche splinter cell blowing up the reactors, is relevant to the plot of INTERmission. A scene in the middle of INTERmission takes places around chapter 8 of the original game, where Yuffie sees Barret and Tifa returning to Seventh Heaven after losing Cloud, and Tifa learning about Don Corneo looking for her to join his audition and her running off to take the chance (which later leads to Corneo's lackeys giving up on harassing Nayo). The main cast (plus Zack) reappear near the end of INTERmission but that is simply an extra ending scene taking place after the base game's events.</span></span></li></ul></div><hr data-dcnode-id="1546"><div class="indent" data-dcnode-id="1540"><em data-dcnode-id="1541"><span data-dcnode-id="1545" instrument_node="">"</span><a class="twikilink" data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NothingIsTheSameAnymore" title="/pmwiki/pmwiki.php/Main/NothingIsTheSameAnymore"><span data-dcnode-id="1544" instrument_node="">I miss it. The steel sky.</span></a><span data-dcnode-id="1542" instrument_node="">"</span></em></div><span data-dcnode-id="1539" instrument_node="">
