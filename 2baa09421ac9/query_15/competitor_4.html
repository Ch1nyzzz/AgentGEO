as a golden opportunity to make themselves look good.</span></li><li data-dcnode-id="2593"><span data-dcnode-id="2597" instrument_node=""> Reno explicitly orders his soldiers not to shoot at Aerith, since he has orders to bring her in unhurt. When one of his </span><a class="twikilink" data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mook" title="/pmwiki/pmwiki.php/Main/Mook"><span data-dcnode-id="2596" instrument_node="">mooks</span></a><span data-dcnode-id="2594" instrument_node=""> shoots at Aerith anyways, Reno orders him to stop and threatens that he'll be reprimanded for it.</span></li><li data-dcnode-id="2588"><span data-dcnode-id="2592" instrument_node=""> After capturing Aerith and planning to torture the location of the Promised Land out of her, Shinra employees are ordered to not physically harm her, as Aerith is too valuable. Psychological torture by </span><a class="twikilink" data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakThemByTalking" title="/pmwiki/pmwiki.php/Main/BreakThemByTalking"><span data-dcnode-id="2591" instrument_node="">breaking speeches</span></a><span data-dcnode-id="2589" instrument_node=""> or showing off her friends' corpses is fine, as long as she's not permanently harmed.</span></li></ul></li><li data-dcnode-id="2563"><span data-dcnode-id="2585" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PrecisionFStrike" title="/pmwiki/pmwiki.php/Main/PrecisionFStrike"><span data-dcnode-id="2584" instrument_node="">Precision F-Strike</span></a><span data-dcnode-id="2582" instrument_node="">: </span><em data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Aerith</span></em><span data-dcnode-id="2579" instrument_node="">, of all people, drops a single curse after a ladder in the Sector 5 slums breaks off and starts to collapse while she's still climbing it.</span><div class="indent" data-dcnode-id="2564"><strong data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">Aerith</span></strong><span data-dcnode-id="2576" instrument_node="">: </span><em data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">(to Cloud)</span></em><span data-dcnode-id="2573" instrument_node=""> You worry too much. </span><a class="twikilink" data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TemptingFate" title="/pmwiki/pmwiki.php/Main/TemptingFate"><span data-dcnode-id="2572" instrument_node="">I'm not some princess who needs to be coddled.</span></a><span data-dcnode-id="2570" instrument_node=""> </span><em data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">(the ladder breaks)</span></em><span data-dcnode-id="2567" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OhCrap" title="/pmwiki/pmwiki.php/Main/OhCrap"><span data-dcnode-id="2566" instrument_node="">Shit.</span></a></div></li><li data-dcnode-id="2558"><span data-dcnode-id="2562" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Precursors" title="/pmwiki/pmwiki.php/Main/Precursors"><span data-dcnode-id="2561" instrument_node="">Precursors</span></a><span data-dcnode-id="2559" instrument_node="">: The Planet was once home to the Cetra — colloquially known as the Ancients, a group of people capable of communing with the will of the Planet and manipulating the Lifestream.</span></li><li data-dcnode-id="2542"><span data-dcnode-id="2557" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PreRenderedGraphics" title="/pmwiki/pmwiki.php/Main/PreRenderedGraphics"><span data-dcnode-id="2556" instrument_node="">Pre-Rendered Graphics</span></a><span data-dcnode-id="2554" instrument_node="">: It wouldn't be </span><a class="twikilink" data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/FinalFantasy" title="/pmwiki/pmwiki.php/Franchise/FinalFantasy"><span data-dcnode-id="2553" instrument_node="">Final Fantasy</span></a><span data-dcnode-id="2551" instrument_node=""> without 'em! Just like how the </span><a class="twikilink" data-dcnode-id="2549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyVII" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyVII"><span data-dcnode-id="2550" instrument_node="">original game</span></a><span data-dcnode-id="2548" instrument_node=""> pioneered the practice of FMV sequences, this game keeps the trend going strong. In addition to that, clips from </span><span class="spoiler" data-dcnode-id="2543" title="you can set spoilers visible by default on your profile"><em data-dcnode-id="2545"><a class="twikilink" data-dcnode-id="2546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/AdventChildren" title="/pmwiki/pmwiki.php/Anime/AdventChildren"><span data-dcnode-id="2547" instrument_node="">Advent Children</span></a></em><span data-dcnode-id="2544" instrument_node=""> are used during the fight against the Whisper Harbinger.</span></span></li><li data-dcnode-id="2534"><span data-dcnode-id="2541" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProlongedPrologue" title="/pmwiki/pmwiki.php/Main/ProlongedPrologue"><span data-dcnode-id="2540" instrument_node="">Prolonged Prologue</span></a><span data-dcnode-id="2538" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TitleTheAdaptation" title="/pmwiki/pmwiki.php/Main/TitleTheAdaptation"><span data-dcnode-id="2537" instrument_node="">The Game</span></a><span data-dcnode-id="2535" instrument_node="">. The Remake only covers the Midgar chapter of the original game, which was itself a Prolonged Prologue that typically lasted for about five hours, and stretches it out into a massive 40+ hour campaign, ending right when the protagonists leave the city and officially begin their epic globe-hopping adventure.</span></li><li data-dcnode-id="2513"><span data-dcnode-id="2533" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PunchClockVillain" title="/pmwiki/pmwiki.php/Main/PunchClockVillain"><span data-dcnode-id="2532" instrument_node="">Punch-Clock Villain</span></a><span data-dcnode-id="2530" instrument_node="">:</span><ul data-dcnode-id="2514"><li data-dcnode-id="2522"><span data-dcnode-id="2529" instrument_node=""> The game makes a point of showing that Shinra's soldiers aren't just </span><a class="twikilink" data-dcnode-id="2527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FacelessMooks" title="/pmwiki/pmwiki.php/Main/FacelessMooks"><span data-dcnode-id="2528" instrument_node="">Faceless Mooks</span></a><span data-dcnode-id="2526" instrument_node=""> to be mowed down by the player, but average joes that are simply trying to earn a paycheck. They frequently work under less-than-savory conditions, from having to interact with uncooperative civilians who hate their guts to being abused by their superiors like </span><a class="twikilink" data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadBoss" title="/pmwiki/pmwiki.php/Main/BadBoss"><span data-dcnode-id="2525" instrument_node="">Heidegger</span></a><span data-dcnode-id="2523" instrument_node="">, and even Cloud, who has no love for Shinra, considers them to be guys just doing their jobs.</span></li><li data-dcnode-id="2515"><span data-dcnode-id="2521" instrument_node=""> The Turks are also out to do their jobs as Rude and Reno testify. Despite being direct underlings for Shinra, it's clear they have reservations about their more immoral tasks.</span><div class="indent" data-dcnode-id="2516"><span data-dcnode-id="2520" instrument_node=""> </span><strong data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Rude</span></strong><span data-dcnode-id="2517" instrument_node="">: No, I'm not bad. But like it or not, I sometimes have to do bad things.</span></div></li></ul></li><li data-dcnode-id="2508"><span data-dcnode-id="2512" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/QuirkyMinibossSquad" title="/pmwiki/pmwiki.php/Main/QuirkyMinibossSquad"><span data-dcnode-id="2511" instrument_node="">Quirky Miniboss Squad</span></a><span data-dcnode-id="2509" instrument_node="">: Beck's Badasses, a group of thugs that reside in the Sector 6 tunnels and come into conflict with Cloud and the gang several times. They're really not as badass or as clever as they think and end up getting humiliated each time they're encountered.</span></li><li data-dcnode-id="2492"><span data-dcnode-id="2507" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RapeIsASpecialKindOfEvil" title="/pmwiki/pmwiki.php/Main/RapeIsASpecialKindOfEvil"><span data-dcnode-id="2506" instrument_node="">Rape Is a Special Kind of Evil</span></a><span data-dcnode-id="2504" instrument_node="">:</span><ul data-dcnode-id="2493"><li data-dcnode-id="2499"><span data-dcnode-id="2503" instrument_node=""> Don Corneo is known all throughout the slums to take "wives" that he hides away in his mansion to have his way with until he grows bored of them, whereupon he feeds them to his pet Abzu and goes about looking for a new wife. He also allows his men to have their way with the failed candidates. </span><a class="twikilink" data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HatedByAll" title="/pmwiki/pmwiki.php/Main/HatedByAll"><span data-dcnode-id="2502" instrument_node="">Nobody likes him</span></a><span data-dcnode-id="2500" instrument_node="">, but his money, power, and being a henchman for Shinra make him immune to reprisal.</span></li><li data-dcnode-id="2494"><span data-dcnode-id="2498" instrument_node=""> Even the </span><a class="twikilink" data-dcnode-id="2496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive" title="/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive"><span data-dcnode-id="2497" instrument_node="">Shinra execs</span></a><span data-dcnode-id="2495" instrument_node=""> don't take kindly to what Hojo suggests to keep Aerith's Ancient bloodline going.</span></li></ul></li><li data-dcnode-id="2482"><span data-dcnode-id="2491" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheRemnant" title="/pmwiki/pmwiki.php/Main/TheRemnant"><span data-dcnode-id="2490" instrument_node="">The Remnant</span></a><span data-dcnode-id="2488" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2483" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2487" instrument_node="">Members of the first incarnation of Avalanche from </span><em data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Before Crisis</span></em><span data-dcnode-id="2484" instrument_node=""> are still active, and come to the rescue of Cloud, Jessie, Biggs, and Wedge, in Chapter 4.</span></span></li><li data-dcnode-id="2471"><span data-dcnode-id="2481" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RelationshipValues" title="/pmwiki/pmwiki.php/Main/RelationshipValues"><span data-dcnode-id="2480" instrument_node="">Relationship Values</span></a><span data-dcnode-id="2478" instrument_node="">: Similar to the original game, </span><em data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">Remake</span></em><span data-dcnode-id="2475" instrument_node=""> keeps track of your relationships with the rest of Cloud's party. In Part 1, this </span><span class="spoiler" data-dcnode-id="2473" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2474" instrument_node="">determines which version of a scene you get in Chapter 14. Namely, a dream sequence where Aerith warns Cloud not to fall in love with her, Cloud comforting Tifa, or Barret fondly reminiscing about some friends he'd like Cloud to meet</span></span><span data-dcnode-id="2472" instrument_node="">.</span></li><li data-dcnode-id="2451"><span data-dcnode-id="2470" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ResourcesManagementGameplay" title="/pmwiki/pmwiki.php/Main/ResourcesManagementGameplay"><span data-dcnode-id="2469" instrument_node="">Resources Management Gameplay</span></a><span data-dcnode-id="2467" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicPoints" title="/pmwiki/pmwiki.php/Main/MagicPoints"><span data-dcnode-id="2466" instrument_node="">Magic Points</span></a><span data-dcnode-id="2464" instrument_node=""> are much more strictly rationed in this game than in other franchise titles. In the original game, Cloud had about 1 MP for every 6 HP; here, he has 1 for every 20. It takes </span><em data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">Remake</span></em><span data-dcnode-id="2461" instrument_node=""> Cloud until about Lv.30 to have as many MP as Original Cloud did </span><em data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">when he started the game</span></em><span data-dcnode-id="2458" instrument_node=""> at Lv.6. There's also no efficient way to restore MP; Ethers are expensive, Turbo Ethers are rare, innate regeneration is slow, and benches often require backtracking. The end result is that use of Magic is something you have to be </span><em data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">very</span></em><span data-dcnode-id="2455" instrument_node=""> cautious about.</span><ul data-dcnode-id="2452"><li data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node=""> Even more so in Hard Mode, which disables benches from restoring your MP and blocks item use entirely. Consequently, health also becomes a valuable resource - besides in-battle healing abilities like Pray and Chakra, the only way to heal between benches is to spend MP. Those "Battle MP Regeneration +10%" weapon skills go from being nearly worthless to absolutely essential.</span></li></ul></li><li data-dcnode-id="2437"><span data-dcnode-id="2450" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReviveKillsZombie" title="/pmwiki/pmwiki.php/Main/ReviveKillsZombie"><span data-dcnode-id="2449" instrument_node="">Revive Kills Zombie</span></a><span data-dcnode-id="2447" instrument_node="">: Using healing spells or items damages the ghosts in the Train Graveyard. That said, </span><a class="twikilink" data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ObviousRulePatch" title="/pmwiki/pmwiki.php/Main/ObviousRulePatch"><span data-dcnode-id="2446" instrument_node="">Obvious Rule Patch</span></a><span data-dcnode-id="2444" instrument_node=""> is in place; the bosses you encounter </span><a class="twikilink" data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoSell" title="/pmwiki/pmwiki.php/Main/NoSell"><span data-dcnode-id="2443" instrument_node="">No-Sell</span></a><span data-dcnode-id="2441" instrument_node=""> Phoenix Downs to avoid turning the fight into a </span><a class="twikilink" data-dcnode-id="2439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZeroEffortBoss" title="/pmwiki/pmwiki.php/Main/ZeroEffortBoss"><span data-dcnode-id="2440" instrument_node="">Zero-Effort Boss</span></a><span data-dcnode-id="2438" instrument_node="">.</span></li><li data-dcnode-id="2430"><span data-dcnode-id="2436" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RewatchBonus" title="/pmwiki/pmwiki.php/Main/RewatchBonus"><span data-dcnode-id="2435" instrument_node="">Rewatch Bonus</span></a><span data-dcnode-id="2433" instrument_node="">: For fans of the original, they may notice something rather peculiar when the spirits show up at certain parts. </span><span class="spoiler" data-dcnode-id="2431" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2432" instrument_node="">This is because the spirits that everyone keeps encountering are literally trying to keep the original plot on track. Notice how any time the plot diverges, the spirits intervene and force things as was originally intended such as Aerith's first meeting with Cloud or when Tifa nearly backs out on an Avalanche mission she had no reservations for in the original game and where Jessie almost takes her place. The game tricks first timers into thinking they're part of the remake aesthetic. But it's not till the end at Shinra's HQ their purpose starts really having more prominence.</span></span></li><li data-dcnode-id="2425"><span data-dcnode-id="2429" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RightHandAttackDog" title="/pmwiki/pmwiki.php/Main/RightHandAttackDog"><span data-dcnode-id="2428" instrument_node="">Right-Hand Attack Dog</span></a><span data-dcnode-id="2426" instrument_node="">: Rufus' hound, Darkstar, whom you have to fight alongside him. Taking Darkstar out first is essential as not only will Rufus sic it on you endlessly, but it will heal him as well.</span></li><li data-dcnode-id="2415"><span data-dcnode-id="2424" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RippleEffectIndicator" title="/pmwiki/pmwiki.php/Main/RippleEffectIndicator"><span data-dcnode-id="2423" instrument_node="">Ripple Effect Indicator</span></a><span data-dcnode-id="2421" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2416" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2420" instrument_node="">In the closing cutscene, after Zack has been shown surviving his "last stand" from </span><em data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">Crisis Core</span></em><span data-dcnode-id="2417" instrument_node="">, a bag of Stamp-branded potato chips blows by the screen — except now Stamp appears to be a terrier, whereas throughout the game he'd been a beagle, suggesting that history has been altered on an even grander scale than previously implied.</span></span></li><li data-dcnode-id="2410"><span data-dcnode-id="2414" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RollOutTheRedCarpet" title="/pmwiki/pmwiki.php/Main/RollOutTheRedCarpet"><span data-dcnode-id="2413" instrument_node="">Roll Out the Red Carpet</span></a><span data-dcnode-id="2411" instrument_node="">: Done lovingly straight as Johnny reveals Aerith in her best dress to Cloud by rolling out a carpet for her to walk up.</span></li><li data-dcnode-id="2402"><span data-dcnode-id="2409" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RollingAttack" title="/pmwiki/pmwiki.php/Main/RollingAttack"><span data-dcnode-id="2408" instrument_node="">Rolling Attack</span></a><span data-dcnode-id="2406" instrument_node="">: Mostly what the Deadly Dodge materia does. The characters except Aerith (who instead does a hop) will roll and launch a </span><a class="twikilink" data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HerdHittingAttack" title="/pmwiki/pmwiki.php/Main/HerdHittingAttack"><span data-dcnode-id="2405" instrument_node="">Herd-Hitting Attack</span></a><span data-dcnode-id="2403" instrument_node="">. Barret (with Melee or Gun weapons) and Cloud are the best with this because of their greater attack range, though Tifa is pretty decent here too. Fighting Fat Chocobo means you'll be in danger of getting rolled on by him.</span></li><li data-dcnode-id="2397"><span data-dcnode-id="2401" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RotatingProtagonist" title="/pmwiki/pmwiki.php/Main/RotatingProtagonist"><span data-dcnode-id="2400" instrument_node="">Rotating Protagonist</span></a><span data-dcnode-id="2398" instrument_node="">: Much more than the original game. While Cloud is still the main player character outside of combat, multiple sections of the game involve controlling other party members with Cloud as either an NPC or off elsewhere.</span></li><li data-dcnode-id="2377"><span data-dcnode-id="2396" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RuderAndCruder" title="/pmwiki/pmwiki.php/Main/RuderAndCruder"><span data-dcnode-id="2395" instrument_node="">Ruder and Cruder</span></a><span data-dcnode-id="2393" instrument_node="">: As far as the English localization goes, there is much more swearing and vulgar language than there was in the original game, where the majority of the swearing was mostly done by Barret and Cid. Barret still has his share of harsh language (and Cid hasn't appeared yet), but what's notable is that Cloud spews out more profanity than he does throughout the course of the game (one particular eyebrow-raising moment is him saying "Bring it on, bitch" in Chapter 18), and even Aerith has a major memetic moment when she yelps "Shit!"</span><span class="notelabel" data-dcnode-id="2390" onclick="togglenote('note62yox');" style="cursor: pointer;"><sup data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2382" id="note62yox" isnote="true" onclick="togglenote('note62yox');" style="display: none; cursor: pointer;"><span data-dcnode-id="2389" instrument_node="">She says this </span><em data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">only</span></em><span data-dcnode-id="2386" instrument_node=""> in English. In Japanese she says </span><em data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">"Uso!"</span></em><span data-dcnode-id="2383" instrument_node=""> ("No way!" or "Come on!") and the European translations of the game go for either "Oh no!" or "Hey!"</span></span><span data-dcnode-id="2381" instrument_node="">, while Reno is probably </span><em data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">the</span></em><span data-dcnode-id="2378" instrument_node=""> foulest-mouthed member of the cast as far as Part I is concerned and much more vulgar than his original 1997 self.</span></li><li data-dcnode-id="2372"><span data-dcnode-id="2376" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewTheRulesImDoingWhatsRight" title="/pmwiki/pmwiki.php/Main/ScrewTheRulesImDoingWhatsRight"><span data-dcnode-id="2375" instrument_node="">Screw the Rules, I'm Doing What's Right!</span></a><span data-dcnode-id="2373" instrument_node="">: As the Sector 7 plate threatens to fall, two Shinra security guards block a gated exit that would allow some civilians to evacuate to safety. Thanks to some prompting by Aerith and Wedge, one of the Shinra guards defies his superior's orders and opens the gate.</span></li><li data-dcnode-id="2367"><span data-dcnode-id="2371" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecurityCling" title="/pmwiki/pmwiki.php/Main/SecurityCling"><span data-dcnode-id="2370" instrument_node="">Security Cling</span></a><span data-dcnode-id="2368" instrument_node="">: Both Aerith and Tifa cling to Cloud's arms during the Train Graveyard sequence. The latter at least partly out of jealousy over the former.</span></li><li data-dcnode-id="2334"><span data-dcnode-id="2366" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Seers" title="/pmwiki/pmwiki.php/Main/Seers"><span data-dcnode-id="2365" instrument_node="">Seers</span></a><span data-dcnode-id="2363" instrument_node="">:</span><ul data-dcnode-id="2335"><li data-dcnode-id="2347"><span data-dcnode-id="2362" instrument_node=""> Multiple characters have this ability, with Cloud having early hallucinations of events that take place later on in the plot (such as </span><span class="spoiler" data-dcnode-id="2360" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2361" instrument_node="">a vision of Aerith kneeling on the ground before her materia falls off in Chapter 2 or seeing the Sector 7 Plate fall in Chapter 3</span></span><span data-dcnode-id="2359" instrument_node="">) and Aerith having an as-yet unexplained ability to know future events before they happen (exemplified in an early conversation, where she </span><a class="twikilink" data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuspiciouslySpecificDenial" title="/pmwiki/pmwiki.php/Main/SuspiciouslySpecificDenial"><span data-dcnode-id="2358" instrument_node="">identifies Cloud as a mercenary</span></a><span data-dcnode-id="2356" instrument_node=""> without him ever saying as much, or occasionally predicting a line of dialogue someone used in the original game). Cloud's power is heavily implied to come from </span><span class="spoiler" data-dcnode-id="2348" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2355" instrument_node="">Sephiroth using his Jenova cells to torment Cloud with visions of the future without context that make the originally </span><a class="twikilink" data-dcnode-id="2353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="2354" instrument_node="">Bittersweet Ending</span></a><span data-dcnode-id="2352" instrument_node=""> of the original game look like a </span><a class="twikilink" data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillEmAll" title="/pmwiki/pmwiki.php/Main/KillEmAll"><span data-dcnode-id="2351" instrument_node="">Kill 'Em All</span></a><span data-dcnode-id="2349" instrument_node=""> ending to trick Cloud into doing what he wants, meaning Sephiroth somehow knows the future/original events too</span></span></li><li data-dcnode-id="2336"><span data-dcnode-id="2346" instrument_node=""> The Arbiters of Fate have this ability, showing a series of visions to the party in the final chapter (which include </span><span class="spoiler" data-dcnode-id="2341" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2345" instrument_node="">Red XIII's cubs (from the opening of </span><em data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Advent Children</span></em><span data-dcnode-id="2342" instrument_node="">), Meteor nearing the planet, and Cloud using Omnislash on Sephiroth during their climactic fight</span></span><span data-dcnode-id="2340" instrument_node="">), which they perceive as being visions of a </span><a class="twikilink" data-dcnode-id="2338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadFuture" title="/pmwiki/pmwiki.php/Main/BadFuture"><span data-dcnode-id="2339" instrument_node="">Bad Future</span></a><span data-dcnode-id="2337" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2326"><span data-dcnode-id="2333" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShaggyDogStory" title="/pmwiki/pmwiki.php/Main/ShaggyDogStory"><span data-dcnode-id="2332" instrument_node="">"Shaggy Dog" Story</span></a><span data-dcnode-id="2330" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2328" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2329" instrument_node="">Yuffie's DLC story mode is rendered this when it turns out the super-powerful Materia she was tasked with stealing doesn't even exist, Sonon is killed protecting her, and she can only watch in despair and horror as Shinra drops the Sector 7 plate onto the slums — seemingly killing the Avalanche members she'd befriended as well</span></span><span data-dcnode-id="2327" instrument_node="">.</span></li><li data-dcnode-id="2321"><span data-dcnode-id="2325" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SheCleansUpNicely" title="/pmwiki/pmwiki.php/Main/SheCleansUpNicely"><span data-dcnode-id="2324" instrument_node="">She Cleans Up Nicely</span></a><span data-dcnode-id="2322" instrument_node="">: While Aerith was never unattractive to begin with, her makeover in Wall Market, courtesy of Madam M, makes her look extra stunning.</span></li><li data-dcnode-id="2316"><span data-dcnode-id="2320" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShmuckBait" title="/pmwiki/pmwiki.php/Main/ShmuckBait"><span data-dcnode-id="2319" instrument_node="">Shmuck Bait</span></a><span data-dcnode-id="2317" instrument_node="">: When making your way up Shinra Tower, you're given the option to ride the elevator to the 59th floor, or take the stairs. If you opt for the stairs, you will have to walk Cloud up ALL THE STAIRS. The sequence takes about 10 minutes. By the end he will be reduced to a snail's pace from fatigue, and you'll gain no advantage for it other than the hilarious dialogue as all the characters' mental states gradually deteriorate.</span></li><li data-dcnode-id="2212"><span data-dcnode-id="2315" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="2314" instrument_node="">Shout-Out</span></a><span data-dcnode-id="2312" instrument_node="">:</span><ul data-dcnode-id="2213"><li data-dcnode-id="2299"><span data-dcnode-id="2311" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ParasiteEve" title="/pmwiki/pmwiki.php/VideoGame/ParasiteEve"><span data-dcnode-id="2310" instrument_node="">Aya Brea</span></a><span data-dcnode-id="2308" instrument_node=""> as she appeared in </span><em data-dcnode-id="2305"><a class="twikilink" data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/The3rdBirthday" title="/pmwiki/pmwiki.php/VideoGame/The3rdBirthday"><span data-dcnode-id="2307" instrument_node="">The 3rd Birthday</span></a></em><span data-dcnode-id="2304" instrument_node=""> can be seen </span><a class="urllink" data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//vignette3.wikia.nocookie.net/finalfantasy/images/5/59/FFVII-Remake-Billboard.png/revision/latest%3Fcb%3D20150617101404"><span data-dcnode-id="2303" instrument_node="">on a billboard in Midgar</span><img data-dcnode-id="2302" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2300" instrument_node="">.</span></li><li data-dcnode-id="2295"><span data-dcnode-id="2298" instrument_node=""> A picture of the older members of the Shinra company can be found in-game. One of the members is wearing </span><a class="twikilink" data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyX2" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyX2"><span data-dcnode-id="2297" instrument_node="">Shinra's Mask.</span></a></li><li data-dcnode-id="2290"><span data-dcnode-id="2294" instrument_node=""> The ghosts in the Train Graveyard have </span><a class="twikilink" data-dcnode-id="2292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyX" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyX"><span data-dcnode-id="2293" instrument_node="">pyreflies</span></a><span data-dcnode-id="2291" instrument_node=""> when they manifest.</span></li><li data-dcnode-id="2285"><span data-dcnode-id="2289" instrument_node=""> Marle, Cloud and Tifa’s landlady, looks like an elderly version of </span><a class="twikilink" data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ChronoTrigger" title="/pmwiki/pmwiki.php/VideoGame/ChronoTrigger"><span data-dcnode-id="2288" instrument_node="">a certain other Marle</span></a><span data-dcnode-id="2286" instrument_node="">.</span></li><li data-dcnode-id="2281"><span data-dcnode-id="2284" instrument_node=""> Neo-Midgar resembles </span><a class="twikilink" data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyVIII" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyVIII"><span data-dcnode-id="2283" instrument_node="">Balamb Garden.</span></a></li><li data-dcnode-id="2276"><span data-dcnode-id="2280" instrument_node=""> In the Shinra video about the Ancients, at one point you can see </span><a class="twikilink" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyXIV" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyXIV"><span data-dcnode-id="2279" instrument_node="">the Enterprise, Cid's ship from Final Fantasy XIV</span></a><span data-dcnode-id="2277" instrument_node=""> flying in the background.</span></li><li data-dcnode-id="2271"><span data-dcnode-id="2275" instrument_node=""> Chapter 15's English title is called </span><a class="twikilink" data-dcnode-id="2273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheDayTheEarthStoodStill" title="/pmwiki/pmwiki.php/Film/TheDayTheEarthStoodStill"><span data-dcnode-id="2274" instrument_node="">"The Day Midgar Stood Still"</span></a><span data-dcnode-id="2272" instrument_node="">, despite having no relation to the film itself (the Japanese title of the chapter is "The Setting Sun").</span></li><li data-dcnode-id="2267"><span data-dcnode-id="2270" instrument_node=""> When The Valkyrie appears in Chapter 15, the name of the mission objective to run away from it is called </span><a class="twikilink" data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/RideOfTheValkyries" title="/pmwiki/pmwiki.php/Music/RideOfTheValkyries"><span data-dcnode-id="2269" instrument_node="">"Flight of the Valkyrie."</span></a></li><li data-dcnode-id="2262"><span data-dcnode-id="2266" instrument_node=""> One of the quests in Wall Market is titled "</span><a class="twikilink" data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/MobileSuitGundamCharsCounterattack" title="/pmwiki/pmwiki.php/Anime/MobileSuitGundamCharsCounterattack"><span data-dcnode-id="2265" instrument_node="">Shears' Counterattack</span></a><span data-dcnode-id="2263" instrument_node="">".</span></li><li data-dcnode-id="2257"><span data-dcnode-id="2261" instrument_node=""> Two of Rude's attacks, Shockwave and Spirit Geyser, are clear homages to </span><a class="twikilink" data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FatalFury" title="/pmwiki/pmwiki.php/VideoGame/FatalFury"><span data-dcnode-id="2260" instrument_node="">Terry Bogard's</span></a><span data-dcnode-id="2258" instrument_node=""> Power Wave and Triple Geyser, respectively.</span></li><li data-dcnode-id="2251"><span data-dcnode-id="2256" instrument_node=""> During Cloud's duel with Rufus, there's a brief shot of him holding up coins that looks almost like a shot of Vergil unsheathing the Yamato in </span><em data-dcnode-id="2253"><a class="twikilink" data-dcnode-id="2254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DevilMayCry5" title="/pmwiki/pmwiki.php/VideoGame/DevilMayCry5"><span data-dcnode-id="2255" instrument_node="">Devil May Cry 5</span></a></em><span data-dcnode-id="2252" instrument_node="">.</span></li><li data-dcnode-id="2244"><span data-dcnode-id="2250" instrument_node=""> Another </span><em data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Devil May Cry 5</span></em><span data-dcnode-id="2247" instrument_node=""> reference is in Chapter 18 </span><span class="spoiler" data-dcnode-id="2245" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2246" instrument_node="">when Sephiroth uses his sword to slice through the wall of Whispers and creates a dimensional rift, just like Yamato's dimension-hopping powers.</span></span></li><li data-dcnode-id="2236"><span data-dcnode-id="2243" instrument_node=""> In chapter 9, one of Sam's sidequests, "The Party that Never Stops", has Cloud </span><a class="twikilink" data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/Mononoke" title="/pmwiki/pmwiki.php/Anime/Mononoke"><span data-dcnode-id="2242" instrument_node="">delivering medicine</span></a><span data-dcnode-id="2240" instrument_node=""> as part of the </span><a class="twikilink" data-dcnode-id="2238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FetchQuest" title="/pmwiki/pmwiki.php/Main/FetchQuest"><span data-dcnode-id="2239" instrument_node="">Fetch Quest</span></a><span data-dcnode-id="2237" instrument_node=""> in order to get back the tailor's "inspiration."</span></li><li data-dcnode-id="2227"><span data-dcnode-id="2235" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoWellButNotPerfect" title="/pmwiki/pmwiki.php/Main/DoWellButNotPerfect"><span data-dcnode-id="2234" instrument_node="">Completing half of the sidequests in Chapter 8</span></a><span data-dcnode-id="2232" instrument_node=""> leads Aerith to wear a cute pink number with hair extensions for the Don Corneo mansion rescue, making her look almost exactly like how she appeared in </span><em data-dcnode-id="2229"><a class="twikilink" data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/KingdomHearts" title="/pmwiki/pmwiki.php/Franchise/KingdomHearts"><span data-dcnode-id="2231" instrument_node="">Kingdom Hearts</span></a></em><span data-dcnode-id="2228" instrument_node="">.</span></li><li data-dcnode-id="2222"><span data-dcnode-id="2226" instrument_node=""> At the entrance of Wall Market, one NPC will say "</span><a class="twikilink" data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Futurama" title="/pmwiki/pmwiki.php/WesternAnimation/Futurama"><span data-dcnode-id="2225" instrument_node="">Welcome to the world of tomorrow!</span></a><span data-dcnode-id="2223" instrument_node="">".</span></li><li data-dcnode-id="2214"><span data-dcnode-id="2221" instrument_node=""> In the </span><em data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Intergrade</span></em><span data-dcnode-id="2218" instrument_node=""> DLC, Yuffie will sometimes mutter to herself while referring to the super-powerful Materia she was tasked with stealing for Wutai as "My Precious..." in reference to Gollum from </span><a class="twikilink" data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TolkiensLegendarium" title="/pmwiki/pmwiki.php/Franchise/TolkiensLegendarium"><span data-dcnode-id="2217" instrument_node="">Tolkien's Legendarium</span></a><span data-dcnode-id="2215" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2207"><span data-dcnode-id="2211" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SkullForAHead" title="/pmwiki/pmwiki.php/Main/SkullForAHead"><span data-dcnode-id="2210" instrument_node="">Skull for a Head</span></a><span data-dcnode-id="2208" instrument_node="">: Jenova's boss form has a fanged skull with sunken eyes for a face.</span></li><li data-dcnode-id="2169"><span data-dcnode-id="2206" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SnarkToSnarkCombat" title="/pmwiki/pmwiki.php/Main/SnarkToSnarkCombat"><span data-dcnode-id="2205" instrument_node="">Snark-to-Snark Combat</span></a><span data-dcnode-id="2203" instrument_node="">: Cloud and Barret spend most of the opening mission trading barbed comments, with Barret growing increasingly frustrated and angry at Cloud's apathetic and disdainful attitude towards the Planet's suffering and Avalanche's mission.</span><div class="indent" data-dcnode-id="2170"><strong data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">Barret:</span></strong><span data-dcnode-id="2200" instrument_node=""> </span><em data-dcnode-id="2195"><span data-dcnode-id="2199" instrument_node="">[in the middle of a </span><a class="twikilink" data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MotiveRant" title="/pmwiki/pmwiki.php/Main/MotiveRant"><span data-dcnode-id="2198" instrument_node="">Motive Rant</span></a><span data-dcnode-id="2196" instrument_node="">]</span></em><span data-dcnode-id="2194" instrument_node=""> You gonna stand there and pretend you can't hear the planet crying out in pain? I know you can! </span><br data-dcnode-id="2193"><strong data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Cloud:</span></strong><span data-dcnode-id="2190" instrument_node=""> </span><em data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">[unimpressed]</span></em><span data-dcnode-id="2187" instrument_node=""> You really hear that? </span><br data-dcnode-id="2186"><strong data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Barret:</span></strong><span data-dcnode-id="2183" instrument_node=""> Damn straight I do! </span><br data-dcnode-id="2182"><strong data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Cloud:</span></strong><span data-dcnode-id="2179" instrument_node=""> Get help. </span><br data-dcnode-id="2178"><strong data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Barret:</span></strong><span data-dcnode-id="2175" instrument_node=""> Say that again! </span><br data-dcnode-id="2174"><strong data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Cloud:</span></strong><span data-dcnode-id="2171" instrument_node=""> I'd worry less about the planet and more about the next five seconds. Save the screaming for later.</span></div></li><li data-dcnode-id="2164"><span data-dcnode-id="2168" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoapboxSadie" title="/pmwiki/pmwiki.php/Main/SoapboxSadie"><span data-dcnode-id="2167" instrument_node="">Soapbox Sadie</span></a><span data-dcnode-id="2165" instrument_node="">: Kyrie's first major appearance is her spreading lies to an audience of people in Sector 5 about Avalanche for money.</span></li><li data-dcnode-id="2150"><span data-dcnode-id="2163" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SortingAlgorithmOfWeaponEffectiveness" title="/pmwiki/pmwiki.php/Main/SortingAlgorithmOfWeaponEffectiveness"><span data-dcnode-id="2162" instrument_node="">Sorting Algorithm of Weapon Effectiveness</span></a><span data-dcnode-id="2160" instrument_node="">: Unlike the original game, where weapons you can get later are almost strictly better than the weapons you can get earlier, this game twists it heavily with the introduction of </span><a class="twikilink" data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SkillTree" title="/pmwiki/pmwiki.php/Main/SkillTree"><span data-dcnode-id="2159" instrument_node="">Skill Trees</span></a><span data-dcnode-id="2157" instrument_node=""> for weapons. Each weapon has an individualized grid in which you can spend Skill Points to unlock enhancements for those weapons, such as stat boosts, percent damage modifiers, and extra Materia slots. The trick is that while weapons you get later </span><em data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">start out</span></em><span data-dcnode-id="2154" instrument_node=""> better than the ones you get earlier, the later weapons also have far fewer upgrades to purchase and have more expensive costs to begin with than the earlier ones. The end result is that with enough upgrades you can get some pretty strong early-game weapons; for example, the Buster Sword starts out as the weakest sword and ends at one of the </span><em data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">strongest</span></em><span data-dcnode-id="2151" instrument_node=""> swords in the game.</span></li><li data-dcnode-id="2107"><span data-dcnode-id="2149" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SparedByTheAdaptation" title="/pmwiki/pmwiki.php/Main/SparedByTheAdaptation"><span data-dcnode-id="2148" instrument_node="">Spared by the Adaptation</span></a><span data-dcnode-id="2146" instrument_node="">:</span><ul data-dcnode-id="2108"><li data-dcnode-id="2130"><span data-dcnode-id="2145" instrument_node=""> After the Sector 7 plate collapses, </span><span class="spoiler" data-dcnode-id="2132" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2144" instrument_node="">Biggs explicitly survives this time around, being shown in bed in the Sector 5 Leaf House with severe injuries but alive. Wedge also survives the plate collapse, but the Whispers </span><a class="twikilink" data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UncertainDoom" title="/pmwiki/pmwiki.php/Main/UncertainDoom"><span data-dcnode-id="2143" instrument_node="">may or may not have killed him</span></a><span data-dcnode-id="2141" instrument_node="">. And while we </span><em data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">see</span></em><span data-dcnode-id="2138" instrument_node=""> her death, it's also implied in the ending that Jessie </span><em data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">might</span></em><span data-dcnode-id="2135" instrument_node=""> have survived thanks to a </span><a class="twikilink" data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicRetcon" title="/pmwiki/pmwiki.php/Main/CosmicRetcon"><span data-dcnode-id="2134" instrument_node="">Cosmic Retcon</span></a></span><span data-dcnode-id="2131" instrument_node="">.</span></li><li data-dcnode-id="2126"><span data-dcnode-id="2129" instrument_node=""> Also during the destruction of Sector 7; </span><span class="spoiler" data-dcnode-id="2127" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2128" instrument_node="">while in the original, we see the inhabitants of the Sector 7 slums uselessly gather around the pillar before its collapse, each giving some flimsy excuse as to why they aren't fleeing, the remake includes cutscenes of the slum inhabitants, led by Wedge and Marle, organizing an evacuation, many of them escaping and a playable section where the player, as Aerith, helps more of them escape while saving Marlene.</span></span></li><li data-dcnode-id="2109"><span data-dcnode-id="2125" instrument_node=""> In a </span><a class="twikilink" data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamShot" title="/pmwiki/pmwiki.php/Main/WhamShot"><span data-dcnode-id="2124" instrument_node="">Wham Shot</span></a><span data-dcnode-id="2122" instrument_node=""> close to the game's ending, </span><span class="spoiler" data-dcnode-id="2111" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2121" instrument_node="">Zack also survives, thanks to a </span><a class="twikilink" data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicRetcon" title="/pmwiki/pmwiki.php/Main/CosmicRetcon"><span data-dcnode-id="2120" instrument_node="">Cosmic Retcon</span></a><span data-dcnode-id="2118" instrument_node=""> orchestrated by Sephiroth and carried out unknowingly by Avalanche. Instead of making a </span><a class="twikilink" data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LastStand" title="/pmwiki/pmwiki.php/Main/LastStand"><span data-dcnode-id="2117" instrument_node="">Last Stand</span></a><span data-dcnode-id="2115" instrument_node=""> against a Shinra platoon, Zack </span><a class="twikilink" data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneManArmy" title="/pmwiki/pmwiki.php/Main/OneManArmy"><span data-dcnode-id="2114" instrument_node="">takes out all of the soldiers by himself</span></a><span data-dcnode-id="2112" instrument_node="">, albeit looking pretty beaten up after it's over</span></span><span data-dcnode-id="2110" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2102"><span data-dcnode-id="2106" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StealthPun" title="/pmwiki/pmwiki.php/Main/StealthPun"><span data-dcnode-id="2105" instrument_node="">Stealth Pun</span></a><span data-dcnode-id="2103" instrument_node="">: At the start of the game, when Tifa is helping Cloud build his rep in the area, Wedge proclaims that he'll let everyone in Sector 7 know about Cloud and his talents. Shortly after, you can hear chatter from people nearby asking if Cloud is the merchant they had heard about, with one asking if he's the guy who is selling swords. They misunderstood Wedge when he said Cloud was a sellsword.</span></li><li data-dcnode-id="2086"><span data-dcnode-id="2101" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StealthSequel" title="/pmwiki/pmwiki.php/Main/StealthSequel"><span data-dcnode-id="2100" instrument_node="">Stealth Sequel</span></a><span data-dcnode-id="2098" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2087" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2097" instrument_node="">As the game goes on, the various characters gain an increasing number of visions of their future "destiny" in the original 1997 game, which in turn causes </span><a class="twikilink" data-dcnode-id="2095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlternateTimeline" title="/pmwiki/pmwiki.php/Main/AlternateTimeline"><span data-dcnode-id="2096" instrument_node="">their actions to keep diverging from said destiny</span></a><span data-dcnode-id="2094" instrument_node="">, despite various attempts by ghostly defense mechanisms of the planet known as the Whispers / Arbiters of Fate to keep the story on its original track. This comes to a head in the finale, where the heroes destroy the Arbiters to take on a now far earlier appearing Sephiroth - and in the process leaving the entire story free to go </span><a class="twikilink" data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OffTheRails" title="/pmwiki/pmwiki.php/Main/OffTheRails"><span data-dcnode-id="2093" instrument_node="">Off the Rails</span></a><span data-dcnode-id="2091" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBadGuyWins" title="/pmwiki/pmwiki.php/Main/TheBadGuyWins"><span data-dcnode-id="2090" instrument_node="">inadvertently undoing Sephiroth's original fated defeat</span></a><span data-dcnode-id="2088" instrument_node="">.</span></span></li><li data-dcnode-id="2073"><span data-dcnode-id="2085" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StylisticSuck" title="/pmwiki/pmwiki.php/Main/StylisticSuck"><span data-dcnode-id="2084" instrument_node="">Stylistic Suck</span></a><span data-dcnode-id="2082" instrument_node="">:</span><ul data-dcnode-id="2074"><li data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node=""> Should the player choose to take the stairs up the Shinra building, the music gradually gets less and less musically coherent as the party continues to climb. It's done to show how tired the group is getting and how bored they are of just climbing stairs.</span></li><li data-dcnode-id="2075"><span data-dcnode-id="2079" instrument_node=""> The museum in the Shinra Tower leaves a lot to be desired for something made by the biggest </span><a class="twikilink" data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MegaCorp" title="/pmwiki/pmwiki.php/Main/MegaCorp"><span data-dcnode-id="2078" instrument_node="">Mega-Corp</span></a><span data-dcnode-id="2076" instrument_node=""> in the world. The hologram presentations for Scarlet and Heidegger's exhibits don't work at all, Palmer is obviously and awkwardly reading a pre-written speech and can only mumble at how little his division has actually accomplished, and Hojo doesn't even bother giving a presentation for his department, choosing instead to just contemptuously insult the would-be tourists.</span></li></ul></li><li data-dcnode-id="2065"><span data-dcnode-id="2072" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SunglassesAtNight" title="/pmwiki/pmwiki.php/Main/SunglassesAtNight"><span data-dcnode-id="2071" instrument_node="">Sunglasses at Night</span></a><span data-dcnode-id="2069" instrument_node="">: Barret wears his sunglasses even in the middle of the night, in a section of the city under an iron plate that never sees the sun in the first place, despite his weapon of choice being a </span><em data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">gun</span></em><span data-dcnode-id="2066" instrument_node="">. Why? Cause it looks cool.</span></li><li data-dcnode-id="2054"><span data-dcnode-id="2064" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SurpriseCreepy" title="/pmwiki/pmwiki.php/Main/SurpriseCreepy"><span data-dcnode-id="2063" instrument_node="">Surprise Creepy</span></a><span data-dcnode-id="2061" instrument_node="">: In-universe, this is Barret's impression of the Cosmos Theater's presentation. </span><span class="spoiler" data-dcnode-id="2059" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2060" instrument_node="">After the propaganda video ends, he, Cloud, and Tifa are then treated to a nightmarish vision of Meteor destroying Midgar</span></span><span data-dcnode-id="2058" instrument_node="">. Barret, thinking it was </span><a class="twikilink" data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllPartOfTheShow" title="/pmwiki/pmwiki.php/Main/AllPartOfTheShow"><span data-dcnode-id="2057" instrument_node="">All Part of the Show</span></a><span data-dcnode-id="2055" instrument_node="">, says the exhibit really should have come with a warning for that.</span></li><li data-dcnode-id="1986"><span data-dcnode-id="2053" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SurprisinglyRealisticOutcome" title="/pmwiki/pmwiki.php/Main/SurprisinglyRealisticOutcome"><span data-dcnode-id="2052" instrument_node="">Surprisingly Realistic Outcome</span></a><span data-dcnode-id="2050" instrument_node="">:</span><ul data-dcnode-id="1987"><li data-dcnode-id="2039"><span data-dcnode-id="2049" instrument_node=""> It's more clearly shown here that the bombing of the first reactor was a </span><a class="twikilink" data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseFlagOperation" title="/pmwiki/pmwiki.php/Main/FalseFlagOperation"><span data-dcnode-id="2048" instrument_node="">False Flag Operation</span></a><span data-dcnode-id="2046" instrument_node=""> by Shinra; after Avalanche disables the reactor, President Shinra has the entire reactor destroyed just to frame Avalanche for it. Even so, Avalanche never finds out that it wasn't them. Jessie </span><a class="twikilink" data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyGodWhatHaveIDone" title="/pmwiki/pmwiki.php/Main/MyGodWhatHaveIDone"><span data-dcnode-id="2045" instrument_node="">believes that she's responsible for the reactor's destruction</span></a><span data-dcnode-id="2043" instrument_node="">, Avalanche become wanted terrorists in the public's eye, and </span><span class="spoiler" data-dcnode-id="2041" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2042" instrument_node="">Jessie carries this guilt to her grave, as she dies before she can find out that she wasn't responsible</span></span><span data-dcnode-id="2040" instrument_node="">.</span></li><li data-dcnode-id="2034"><span data-dcnode-id="2038" instrument_node=""> The size of Cloud's </span><a class="twikilink" data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BFS" title="/pmwiki/pmwiki.php/Main/BFS"><span data-dcnode-id="2037" instrument_node="">BFS</span></a><span data-dcnode-id="2035" instrument_node=""> becomes a problem at a few points. When Cloud first investigates the apartment next to him, he tries to draw his Buster Sword against an apparition of Sephiroth. Given that Cloud's standing in the doorway, his sword hits the door frame. Also, when Cloud rests, he has to either remove his sword entirely or tilt it out of the way so he can sit down.</span></li><li data-dcnode-id="2026"><span data-dcnode-id="2033" instrument_node=""> In Shinra HQ, the mission to </span><span class="spoiler" data-dcnode-id="2031" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2032" instrument_node="">rescue Aerith from Hojo's experiments on her, as well as finally come face-to-face with President Shinra</span></span><span data-dcnode-id="2030" instrument_node=""> involves climbing 59 flight of stairs. Even with the party's physical prowess — an ex-SOLDIER, a martial artist, and a walking tank of a man — fatigue gradually sets in as they climb the stairs. Everyone starts going slower the further they go up, they speak to each other between heavy breaths, and they're exhausted by the time they get to the 59th floor, needing a few moments to get their wind back. </span><a class="twikilink" data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StylisticSuck" title="/pmwiki/pmwiki.php/Main/StylisticSuck"><span data-dcnode-id="2029" instrument_node="">Even the background music sounds tired</span></a><span data-dcnode-id="2027" instrument_node="">.</span></li><li data-dcnode-id="2021"><span data-dcnode-id="2025" instrument_node=""> Falling down even a short set of stairs can hurt you pretty badly as </span><span class="spoiler" data-dcnode-id="2023" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2024" instrument_node="">Jessie finds out: the Whispers knock her down the front steps of 7th Heaven, taking her out of commission to force Cloud to take the next reactor job</span></span><span data-dcnode-id="2022" instrument_node="">.</span></li><li data-dcnode-id="2016"><span data-dcnode-id="2020" instrument_node=""> Someone like President Shinra, who is targeted for assassination by Avalanche, will most emphatically </span><em data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">not</span></em><span data-dcnode-id="2017" instrument_node=""> turn up in person to mock them, especially when their members include someone who has a BFG for an arm and a super-soldier.</span></li><li data-dcnode-id="2008"><span data-dcnode-id="2015" instrument_node=""> Even when you remove the </span><a class="twikilink" data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperSoldier" title="/pmwiki/pmwiki.php/Main/SuperSoldier"><span data-dcnode-id="2014" instrument_node="">Super Soldier</span></a><span data-dcnode-id="2012" instrument_node=""> aspect of his character, Cloud beating Jules and his bodybuilder friends in a battle of squats should not come as a surprise. Those who practice bodybuilding are actually short on endurance compared to other athletic disciplines, let alone soldier training, which is known for its </span><a class="twikilink" data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrainingFromHell" title="/pmwiki/pmwiki.php/Main/TrainingFromHell"><span data-dcnode-id="2011" instrument_node="">unforgiving</span></a><span data-dcnode-id="2009" instrument_node=""> focus on building up stamina and endurance. Jules, Ronnie and Jay are but simple gym hobbyists, whereas Cloud is a frontline military veteran in peak condition. It's not even close.</span></li><li data-dcnode-id="2001"><span data-dcnode-id="2007" instrument_node=""> Don Corneo might be cowardly when outnumbered and beaten, but as a crime lord, he is not someone to be underestimated, pulling off an impressive disarm when threatened at gunpoint. Aerith even points this out to get Cloud to rescue Tifa; when Cloud claims that Tifa can look after herself, Aerith says that it doesn't matter how strong or smart you think you are, Corneo will find a way to turn it against you. Leslie even warns Cloud that the Don has a very effective way to prevent anyone from just busting in and trying to take him on: if Cloud tries to do so, the person who will suffer most will be Tifa... or, it could be a random person he doesn't even know.</span><span class="notelabel" data-dcnode-id="2004" onclick="togglenote('note7x6fz');" style="cursor: pointer;"><sup data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2002" id="note7x6fz" isnote="true" onclick="togglenote('note7x6fz');" style="display: none; cursor: pointer;"><span data-dcnode-id="2003" instrument_node="">This is similar to how big organized crime groups in real life keep entire communities under their control, such as cartels in Mexico, which will murder a dozen innocent civilians chosen at random if some vigilante tries to take action against them.</span></span></li><li data-dcnode-id="1996"><span data-dcnode-id="2000" instrument_node=""> Dropping an object as massive as the Sector 7 plate from such an enormous height does a </span><em data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">lot</span></em><span data-dcnode-id="1997" instrument_node=""> more than just demolish the slums directly beneath. The damage from the plate drop extends all the way to Sector 5, with aftershocks and sinkholes continuing to form hours after the drop itself.</span></li><li data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node=""> If you take the elevator to the 59th floor of Shinra HQ, you spend the first couple of stops fighting off Shinra security, just like in the original. When you hit the 30th floor, the chime sounds and the trio prepares for battle. The doors open and Cloud draws his sword... on a completely harmless civilian employee, who immediately freaks out. Tifa is shaken by this, and reminds the others that Shinra has innocent people working for it.</span></li><li data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node=""> Being the only good person on a board of the most morally bankrupt people in the world results in Reeve's department being perpetually neglected and ignored. As such, Midgar is falling apart in places and the slums are half-buried in literal mountains of junk and scrap. Since he doesn't agree with Shinra's decisions, Reeve himself has about as much power as Midgar's figurehead mayor despite being in an executive position, and he and his entire division are kept as a showpiece to convince the populace that Shinra cares about the city when they obviously don't.</span></li><li data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node=""> Avalanche leaves a bomb at the heart of Mako Reactor Five and head for the exit. When they reach the outside after a fair amount of time, Heidegger shows them that Shinra forces have already gotten to the bomb and overridden the remote detonator frequency. They obviously weren't going to just ignore something like that and let Avalanche detonate whenever they wanted.</span></li><li data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node=""> The slums underneath Midgar do get sunlight, especially during the morning and evening, rather than experiencing the perpetual night they had in the original. This makes sense, since the platform above would only obscure the sun during part of the day, and even then there'd be indirect sunlight from the surrounding area.</span></li></ul></li><li data-dcnode-id="1981"><span data-dcnode-id="1985" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SwordDrag" title="/pmwiki/pmwiki.php/Main/SwordDrag"><span data-dcnode-id="1984" instrument_node="">Sword Drag</span></a><span data-dcnode-id="1982" instrument_node="">: When Roche challenges Cloud to a duel, he's shown dragging his longsword along the ground.</span></li><li data-dcnode-id="1976"><span data-dcnode-id="1980" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Tagline" title="/pmwiki/pmwiki.php/Main/Tagline"><span data-dcnode-id="1979" instrument_node="">Tagline</span></a><span data-dcnode-id="1977" instrument_node="">: "The legend returns for all generations."</span></li><li data-dcnode-id="1971"><span data-dcnode-id="1975" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThemeNaming" title="/pmwiki/pmwiki.php/Main/ThemeNaming"><span data-dcnode-id="1974" instrument_node="">Theme Naming</span></a><span data-dcnode-id="1972" instrument_node="">: Wedge introduces Cloud to three cats he names Biggums, Reggie, and Smalls. Big, regular, and small.</span></li><li data-dcnode-id="1949"><span data-dcnode-id="1970" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThemeMusicPowerUp" title="/pmwiki/pmwiki.php/Main/ThemeMusicPowerUp"><span data-dcnode-id="1969" instrument_node="">Theme Music Power-Up</span></a><span data-dcnode-id="1967" instrument_node="">: Rare villainous example. The second-to-last chapter adds a </span><a class="twikilink" data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossFight" title="/pmwiki/pmwiki.php/Main/BossFight"><span data-dcnode-id="1966" instrument_node="">Boss Fight</span></a><span data-dcnode-id="1964" instrument_node=""> against someone from the original game, (</span><span class="spoiler" data-dcnode-id="1962" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1963" instrument_node="">Jenova</span></span><span data-dcnode-id="1961" instrument_node="">), which takes place in three phases. The first phase uses this character's standard motif, but in downplayed orchestral arrangement, at slower tempo, and with the actual melody at half speed. The second phase amps it up a bit with the addition of some snare and normal-speed melody, but still holds back. It's only at the third and final phase when the tempo kicks back up to full, the four-to-the-floor percussion comes in, and the </span><a class="twikilink" data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EpicRocking" title="/pmwiki/pmwiki.php/Main/EpicRocking"><span data-dcnode-id="1960" instrument_node="">Epic Rocking</span></a><span data-dcnode-id="1958" instrument_node=""> commences. And, despite being the power-up of a </span><em data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">bad guy</span></em><span data-dcnode-id="1955" instrument_node="">, it still has the same exhilarating effect because of the nostalgia hit.</span><ul data-dcnode-id="1950"><li data-dcnode-id="1951"><span data-dcnode-id="1954" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1952" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1953" instrument_node=""> The final battle against Sephiroth does the same, with One Winged Angel beginning as just the instrumentals and the vocals picking up more with each stage of the fight.</span></span></li></ul></li><li data-dcnode-id="1924"><span data-dcnode-id="1948" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThisIsForEmphasisBitch" title="/pmwiki/pmwiki.php/Main/ThisIsForEmphasisBitch"><span data-dcnode-id="1947" instrument_node="">This Is for Emphasis, Bitch!</span></a><span data-dcnode-id="1945" instrument_node="">:</span><ul data-dcnode-id="1929"><li data-dcnode-id="1935"><span data-dcnode-id="1944" instrument_node=""> Used by Reno when </span><a class="twikilink" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlatantLies" title="/pmwiki/pmwiki.php/Main/BlatantLies"><span data-dcnode-id="1943" instrument_node="">assuring</span></a><span data-dcnode-id="1941" instrument_node=""> Cloud that "it's </span><a class="twikilink" data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NothingPersonal" title="/pmwiki/pmwiki.php/Main/NothingPersonal"><span data-dcnode-id="1940" instrument_node="">nothing personal</span></a><span data-dcnode-id="1938" instrument_node="">" to emphasize that, </span><a class="twikilink" data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItsPersonal" title="/pmwiki/pmwiki.php/Main/ItsPersonal"><span data-dcnode-id="1937" instrument_node="">yes, it fucking is.</span></a></li><li data-dcnode-id="1930"><span data-dcnode-id="1934" instrument_node=""> Cloud makes a quip in this fashion during a </span><a class="twikilink" data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BladeLock" title="/pmwiki/pmwiki.php/Main/BladeLock"><span data-dcnode-id="1933" instrument_node="">Blade Lock</span></a><span data-dcnode-id="1931" instrument_node=""> in the penultimate boss fight.</span></li></ul><div class="indent" data-dcnode-id="1925"><strong data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Cloud:</span></strong><span data-dcnode-id="1926" instrument_node=""> Bring it on, bitch!</span></div></li><li data-dcnode-id="1917"><span data-dcnode-id="1923" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimePolice" title="/pmwiki/pmwiki.php/Main/TimePolice"><span data-dcnode-id="1922" instrument_node="">Time Police</span></a><span data-dcnode-id="1920" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1918" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1919" instrument_node="">What the Arbiters of Fate essentially are. They attempt to ensure events play out exactly like they did in the original 1997 game. Sephiroth has the party take care of the Arbiters of Fate so that the future is now unwritten.</span></span></li><li data-dcnode-id="1907"><span data-dcnode-id="1916" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ToBeContinued" title="/pmwiki/pmwiki.php/Main/ToBeContinued"><span data-dcnode-id="1915" instrument_node="">To Be Continued</span></a><span data-dcnode-id="1913" instrument_node="">: Unsurprisingly episode one ends on this note, given that the story has only progressed a fraction of the way through the original game. </span><span class="spoiler" data-dcnode-id="1908" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1912" instrument_node="">The fact that the "</span><em data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">unknown</span></em><span data-dcnode-id="1909" instrument_node="">" adventure will continue on the other hand...</span></span></li><li data-dcnode-id="1890"><span data-dcnode-id="1906" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TomboyAndGirlyGirl" title="/pmwiki/pmwiki.php/Main/TomboyAndGirlyGirl"><span data-dcnode-id="1905" instrument_node="">Tomboy and Girly Girl</span></a><span data-dcnode-id="1903" instrument_node="">: As in the original game, Aerith and Tifa, </span><a class="twikilink" data-dcnode-id="1901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SubvertedTrope" title="/pmwiki/pmwiki.php/Main/SubvertedTrope"><span data-dcnode-id="1902" instrument_node="">and you would be forgiven for thinking at first glance that</span></a><span data-dcnode-id="1900" in
