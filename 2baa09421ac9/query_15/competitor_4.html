n data-dcnode-id="3285" instrument_node="">Final Fantasy VII Remake Ultimania</span></em><span data-dcnode-id="3283" instrument_node=""> artbook explains that for Aerith, the (natural) sky is a symbol of sadness to her, as it is blocked out by the plate (ironically, the "steel sky"), </span><span class="spoiler" data-dcnode-id="3281" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3282" instrument_node="">both her mother and Zack died underneath the sky, and the Calamity From The Sky destroyed the Cetra.</span></span><span data-dcnode-id="3280" instrument_node=""> All this adds up to almost sounding like the complete opposite of her line in English.</span></li></ul></li><li data-dcnode-id="3267"><span data-dcnode-id="3276" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LovableRogue" title="/pmwiki/pmwiki.php/Main/LovableRogue"><span data-dcnode-id="3275" instrument_node="">Lovable Rogue</span></a><span data-dcnode-id="3273" instrument_node="">:</span><ul data-dcnode-id="3268"><li data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node=""> Yuffie in the DLC is still the shifty materia hunter she always has been, with an adventurous and daring personality to suit her line of work.</span></li><li data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node=""> The remake introduces Kyrie, a local thief whose sidequest involves tracking her down to get back a wallet she stole from Johnny, and who is as plucky as Yuffie is.</span></li></ul></li><li data-dcnode-id="3262"><span data-dcnode-id="3266" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LuckBasedMission" title="/pmwiki/pmwiki.php/Main/LuckBasedMission"><span data-dcnode-id="3265" instrument_node="">Luck-Based Mission</span></a><span data-dcnode-id="3263" instrument_node="">: The difficulty of the workout minigames (especially on the highest level) can fluctuate depending on when in the round the computer controlled opponent fumbles. Too early and they'll build up momentum again and overtake the player. Too late and they may have too great a lead to surpass.</span></li><li data-dcnode-id="3254"><span data-dcnode-id="3261" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MadScientist" title="/pmwiki/pmwiki.php/Main/MadScientist"><span data-dcnode-id="3260" instrument_node="">Mad Scientist</span></a><span data-dcnode-id="3258" instrument_node="">: Professor Hojo, the head of the Shinra Corporation's Science Research Division and mastermind behind the </span><a class="twikilink" data-dcnode-id="3256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperSoldier" title="/pmwiki/pmwiki.php/Main/SuperSoldier"><span data-dcnode-id="3257" instrument_node="">SOLDIER Program</span></a><span data-dcnode-id="3255" instrument_node="">. He's shown observing Cloud's interactions with Sephiroth and gleefully stating that his Reunion Theory hypothesis has been proven correct.</span></li><li data-dcnode-id="3235"><span data-dcnode-id="3253" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagikarpPower" title="/pmwiki/pmwiki.php/Main/MagikarpPower"><span data-dcnode-id="3252" instrument_node="">Magikarp Power</span></a><span data-dcnode-id="3250" instrument_node="">:</span><ul data-dcnode-id="3236"><li data-dcnode-id="3245"><span data-dcnode-id="3249" instrument_node=""> The Pedometer materia does nothing at first. Should a player walk five thousand steps with it equipped, it becomes the AP Up materia, which </span><a class="twikilink" data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExperienceBooster" title="/pmwiki/pmwiki.php/Main/ExperienceBooster"><span data-dcnode-id="3248" instrument_node="">doubles the AP gain of any materia that it's linked to</span></a><span data-dcnode-id="3246" instrument_node="">.</span></li><li data-dcnode-id="3237"><span data-dcnode-id="3244" instrument_node=""> The Buster Sword is forced to wait a long time for decent upgrades, with the bulk of its good stat boosts crammed into the last three Weapon Levels and the final two Linked Materia Slots coming in at Weapon Level 6, which you usually won't unlock until </span><a class="twikilink" data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="3243" instrument_node="">New Game+</span></a><span data-dcnode-id="3241" instrument_node="">. Fully upgrade it, however, and it becomes a powerful </span><a class="twikilink" data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JackOfAllStats" title="/pmwiki/pmwiki.php/Main/JackOfAllStats"><span data-dcnode-id="3240" instrument_node="">Jack-of-All-Stats</span></a><span data-dcnode-id="3238" instrument_node=""> weapon that is viable pretty much anywhere.</span></li></ul></li><li data-dcnode-id="3230"><span data-dcnode-id="3234" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManualLeaderAIParty" title="/pmwiki/pmwiki.php/Main/ManualLeaderAIParty"><span data-dcnode-id="3233" instrument_node="">Manual Leader, A.I. Party</span></a><span data-dcnode-id="3231" instrument_node="">: This is how the party works, to a point. While your party members are controlled by the AI, you can still issue them direct commands in Tactical Mode if they have enough ATB to do so, and you can swap the character you're actively controlling on the fly with the D-pad.</span></li><li data-dcnode-id="3204"><span data-dcnode-id="3229" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarathonBoss" title="/pmwiki/pmwiki.php/Main/MarathonBoss"><span data-dcnode-id="3228" instrument_node="">Marathon Boss</span></a><span data-dcnode-id="3226" instrument_node="">: The penultimate boss fight against </span><span class="spoiler" data-dcnode-id="3224" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3225" instrument_node="">Whisper Harbinger</span></span><span data-dcnode-id="3223" instrument_node=""> is a </span><em data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">massive</span></em><span data-dcnode-id="3220" instrument_node=""> doozy. </span><span class="spoiler" data-dcnode-id="3212" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3219" instrument_node="">Cloud, Barret, and Tifa start by fighting Whisper Rubrum, Whisper Viridi, and Whisper Croceo, then once you deplete their health to a certain point, the fight moves onto another platform where the trio fight Whisper Rubrum alone. Upon defeating it and depleting Harbinger's health, Aerith and Red XIII rejoin the party, only for Tifa and Aerith to get separated from Cloud, Barret, and Red XIII, leaving them to fight Viridi and Croceo. After defeating </span><em data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">them</span></em><span data-dcnode-id="3216" instrument_node=""> and depleting Harbinger's health further, the party regroups and Barret and Red XIII leave while Cloud, Tifa, and Aerith fight Whisper Bahamut. After defeating </span><strong data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">him</span></strong><span data-dcnode-id="3213" instrument_node="">, you then have to defeat Rubrum, Viridi, and Croceo once more each to allow Barret and Red XIII to chew through Harbinger's HP, then go for the kill once Harbinger collapses.</span></span><span data-dcnode-id="3211" instrument_node=""> The kicker is </span><a class="twikilink" data-dcnode-id="3209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CheckpointStarvation" title="/pmwiki/pmwiki.php/Main/CheckpointStarvation"><span data-dcnode-id="3210" instrument_node="">the fight is a one and done deal</span></a><span data-dcnode-id="3208" instrument_node="">; die at any point and you have to restart the </span><strong data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">entire</span></strong><span data-dcnode-id="3205" instrument_node=""> sequence.</span></li><li data-dcnode-id="3189"><span data-dcnode-id="3203" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="3202" instrument_node="">Meaningful Name</span></a><span data-dcnode-id="3200" instrument_node="">:</span><ul data-dcnode-id="3190"><li data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node=""> Wall Market is so named because the government decided to just wall it in rather than try to deal with the lawlessness there - out of sight, out of mind.</span></li><li data-dcnode-id="3191"><span data-dcnode-id="3197" instrument_node=""> The title does indeed indicate it's a remake </span><span class="spoiler" data-dcnode-id="3192" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3196" instrument_node="">in more for the fact that the plot is </span><em data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">literally</span></em><span data-dcnode-id="3193" instrument_node=""> being remade as the story diverges heavily from what happened in the original and now seems to be the focus of Sephiroth's new plan.</span></span></li></ul></li><li data-dcnode-id="3184"><span data-dcnode-id="3188" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mecha" title="/pmwiki/pmwiki.php/Main/Mecha"><span data-dcnode-id="3187" instrument_node="">Mecha</span></a><span data-dcnode-id="3185" instrument_node="">: Shinra's army is comprised of not only soldiers, but large mechas as well. They were used in the previous war against Wutai, and now serve as security for their bases. A good percentage of boss fights in the game are against these machines.</span></li><li data-dcnode-id="3164"><span data-dcnode-id="3183" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MetaTwist" title="/pmwiki/pmwiki.php/Main/MetaTwist"><span data-dcnode-id="3182" instrument_node="">Meta Twist</span></a><span data-dcnode-id="3180" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3165" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3179" instrument_node="">The fact that this is a remake hides the fact that </span><a class="twikilink" data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NothingIsTheSameAnymore" title="/pmwiki/pmwiki.php/Main/NothingIsTheSameAnymore"><span data-dcnode-id="3178" instrument_node="">Nothing Is the Same Anymore</span></a><span data-dcnode-id="3176" instrument_node=""> after the ending, completely changing how the next chapter of this saga is going to go. Characters who were supposed to die end up spared, characters who appeared at certain points in the original story either appear much earlier or not at all, new characters are introduced, and what's going to happen to any of them is entirely up in the air. The ending even starts with the words "The unknown journey will continue". In some aspects, the game has been compared to </span><em data-dcnode-id="3173"><a class="twikilink" data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MetalGearSolid2" title="/pmwiki/pmwiki.php/VideoGame/MetalGearSolid2"><span data-dcnode-id="3175" instrument_node="">Metal Gear Solid 2</span></a></em><span data-dcnode-id="3172" instrument_node=""> due to both having meta-narratives that start off with what people expect (the Tanker Mission in </span><em data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">MGS2</span></em><span data-dcnode-id="3169" instrument_node=""> and the Bombing Run in </span><em data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node="">FF7Remake</span></em><span data-dcnode-id="3166" instrument_node="">) but by the end turn out to be deconstructions to what people expect out of a game sequel or remake.</span></span></li><li data-dcnode-id="3131"><span data-dcnode-id="3163" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MiddleManagementMook" title="/pmwiki/pmwiki.php/Main/MiddleManagementMook"><span data-dcnode-id="3162" instrument_node="">Middle-Management Mook</span></a><span data-dcnode-id="3160" instrument_node="">: Shinra's department heads, most of whom are ruthlessly ambitious and cruel:</span><ul data-dcnode-id="3132"><li data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node=""> Heidegger — the Shinra Company's Head of Public Safety (read: the military) — is shown advocating for the use of extreme force against Avalanche and disparaging his more benevolent colleague Reeve Tuesti for protesting the civilian casualties that would ensue.</span></li><li data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node=""> Scarlet — the Shinra Company's sadistic Head of Weapons Development — is shown forcing a Shinra security officer to serve as a footstool while she reclines in an opulent chair.</span></li><li data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node=""> Palmer — the gluttonous head of the Shinra Company's space program — is shown gushing about how much he loves to put butter in his tea.</span></li><li data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node=""> Professor Hojo — the head of the Shinra Corporation's Science Research Division — is stated on the game's Twitter page to have no regard for human life in his highly unethical experiments, and is shown spying on Cloud following his brief clash with Sephiroth and gleefully remarking that his hypothesis has been proven correct.</span></li><li data-dcnode-id="3144"><span data-dcnode-id="3151" instrument_node=""> Reeve Tuesti — the head of Shinra Company's Urban Planning Division — is shown to be the </span><a class="twikilink" data-dcnode-id="3149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TokenGoodTeammate" title="/pmwiki/pmwiki.php/Main/TokenGoodTeammate"><span data-dcnode-id="3150" instrument_node="">Token Good Teammate</span></a><span data-dcnode-id="3148" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="3146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnlySaneMan" title="/pmwiki/pmwiki.php/Main/OnlySaneMan"><span data-dcnode-id="3147" instrument_node="">Only Sane Man</span></a><span data-dcnode-id="3145" instrument_node=""> among the department heads since he has genuinely good intentions and abhors his colleagues' disregard for human life.</span></li><li data-dcnode-id="3133"><span data-dcnode-id="3143" instrument_node=""> There's a recurring minor NPC encountered in the early parts of the game explicitly called </span><a class="twikilink" data-dcnode-id="3141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoNameGiven" title="/pmwiki/pmwiki.php/Main/NoNameGiven"><span data-dcnode-id="3142" instrument_node="">"Shinra Middle Manager"</span></a><span data-dcnode-id="3140" instrument_node=""> who repeatedly gets into arguments with Barret about Avalanche's methods, and while clearly intimidated by the </span><a class="twikilink" data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScaryBlackMan" title="/pmwiki/pmwiki.php/Main/ScaryBlackMan"><span data-dcnode-id="3139" instrument_node="">Scary Black Man</span></a><span data-dcnode-id="3137" instrument_node=""> still stands his ground defending </span><a class="twikilink" data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainWithGoodPublicity" title="/pmwiki/pmwiki.php/Main/VillainWithGoodPublicity"><span data-dcnode-id="3136" instrument_node="">who he thinks are the good guys</span></a><span data-dcnode-id="3134" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3124"><span data-dcnode-id="3130" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MirrorBoss" title="/pmwiki/pmwiki.php/Main/MirrorBoss"><span data-dcnode-id="3129" instrument_node="">Mirror Boss</span></a><span data-dcnode-id="3127" instrument_node="">: The penultimate fight involves </span><span class="spoiler" data-dcnode-id="3125" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3126" instrument_node="">a battle against future entities who wield a sword, a gun, and their fists, mirroring Cloud, Barret, and Tifa. You even have that exact party for the first phase of the fight.</span></span></li><li data-dcnode-id="3116"><span data-dcnode-id="3123" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MiserableMassage" title="/pmwiki/pmwiki.php/Main/MiserableMassage"><span data-dcnode-id="3122" instrument_node="">Miserable Massage</span></a><span data-dcnode-id="3120" instrument_node="">: To convince Madam M to help Aerith get into Don Corneo's manor, Cloud must pay for a hand massage. If Cloud opts for the cheapest option, the "Poor Man's Course" he ends up visibly in pain and his health bar </span><a class="twikilink" data-dcnode-id="3118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStoryIntegration" title="/pmwiki/pmwiki.php/Main/GameplayAndStoryIntegration"><span data-dcnode-id="3119" instrument_node="">actually shows that he took damage.</span></a><span data-dcnode-id="3117" instrument_node=""> This is taken up to 11 when mixed with the subtext of that particular option, making it seem more like a prostate massage than a hand massage. The fact that the camera never shows where Madam M's hands are in any of her "massages" help to bolster the imagination.</span></li><li data-dcnode-id="3104"><span data-dcnode-id="3115" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMole" title="/pmwiki/pmwiki.php/Main/TheMole"><span data-dcnode-id="3114" instrument_node="">The Mole</span></a><span data-dcnode-id="3112" instrument_node="">:</span><ul data-dcnode-id="3105"><li data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node=""> Chadley is an assistant scientist at Shinra, but is secretly trying to bring them down. Once you meet him, he starts making new materia for Cloud so he can gain the extra skill to topple the corporation.</span></li><li data-dcnode-id="3106"><span data-dcnode-id="3109" instrument_node=""> There are some hints throughout the game that someone is helping Avalanche with their operations from behind the scenes. It turns out to be </span><span class="spoiler" data-dcnode-id="3107" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3108" instrument_node="">The Mayor of Midgar himself, the self proclaimed "man on the inside". He assists Avalanche out of anger for Shinra using him as little more than a figurehead.</span></span></li></ul></li><li data-dcnode-id="3099"><span data-dcnode-id="3103" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoneyForNothing" title="/pmwiki/pmwiki.php/Main/MoneyForNothing"><span data-dcnode-id="3102" instrument_node="">Money for Nothing</span></a><span data-dcnode-id="3100" instrument_node="">: Averted for a while due to Chadley's Materia increasing in price with each copy purchased, but eventually played straight. As Chadley only has a limited number of copies of each unique Materia, and all other Materia can be found on the ground, the only other thing to use money on late in the game is consumable items, which are disabled on Hard Mode. Once Chadley's stock is exhausted, the player's gil count is liable to quickly spiral out of control. The moogle medal alternative currency doesn't fare much better, as nearly everything that can be purchased with medals is a one-time purchase, and a certain late-game sidequest makes it trivial to acquire dozens of medals.</span></li><li data-dcnode-id="3094"><span data-dcnode-id="3098" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoodWhiplash" title="/pmwiki/pmwiki.php/Main/MoodWhiplash"><span data-dcnode-id="3097" instrument_node="">Mood Whiplash</span></a><span data-dcnode-id="3095" instrument_node="">: The State of Play trailer cuts from Barret being told to give orders while a fire rages in the background to Aerith offering Cloud a flower. And then cuts back to a combat system showcase.</span></li><li data-dcnode-id="3086"><span data-dcnode-id="3093" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MovingTheGoalposts" title="/pmwiki/pmwiki.php/Main/MovingTheGoalposts"><span data-dcnode-id="3092" instrument_node="">Moving the Goalposts</span></a><span data-dcnode-id="3090" instrument_node="">: Cloud and Aerith enter the Corneo Colosseum with the intention of winning the tournament so that Madam M will get Aerith a fancy dress. After Cloud and Aerith win despite </span><a class="twikilink" data-dcnode-id="3088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewTheRulesIMakeThem" title="/pmwiki/pmwiki.php/Main/ScrewTheRulesIMakeThem"><span data-dcnode-id="3089" instrument_node="">all of their opponents clearly cheating</span></a><span data-dcnode-id="3087" instrument_node="">, Don Corneo says that Cloud and Aerith need to win one more match against the Hell House before he'll actually pay up.</span></li><li data-dcnode-id="3073"><span data-dcnode-id="3085" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MusclesAreMeaningless" title="/pmwiki/pmwiki.php/Main/MusclesAreMeaningless"><span data-dcnode-id="3084" instrument_node="">Muscles Are Meaningless</span></a><span data-dcnode-id="3082" instrument_node="">:</span><ul data-dcnode-id="3074"><li data-dcnode-id="3077"><span data-dcnode-id="3081" instrument_node=""> Cloud has the musculature of a fit young adult, while "too small" to swing around the Buster Sword the way he does, let alone heft it. Justified by the fact he was in SOLDIER and has </span><a class="twikilink" data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperStrength" title="/pmwiki/pmwiki.php/Main/SuperStrength"><span data-dcnode-id="3080" instrument_node="">Super Strength</span></a><span data-dcnode-id="3078" instrument_node="">.</span></li><li data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node=""> Tifa has no real explanation for how she got strong enough to smash through armored robots with her bare fists while looking like an ordinary fit woman.</span></li></ul></li><li data-dcnode-id="2887"><span data-dcnode-id="3072" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="3071" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="3069" instrument_node="">:</span><ul data-dcnode-id="2888"><li data-dcnode-id="3060"><span data-dcnode-id="3068" instrument_node=""> During the opening bombing run, Heidegger remarks that Avalanche may be the same group that once tried to assassinate President Shinra, a reference to the first iteration of Avalanche attempting to do so in </span><em data-dcnode-id="3064"><a class="twikilink" data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BeforeCrisis" title="/pmwiki/pmwiki.php/VideoGame/BeforeCrisis"><span data-dcnode-id="3067" instrument_node="">Before Crisis</span></a><span data-dcnode-id="3065" instrument_node="">: Final Fantasy VII</span></em><span data-dcnode-id="3063" instrument_node="">. </span><span class="spoiler" data-dcnode-id="3061" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3062" instrument_node="">The group actually appears later in the game, where Biggs explains they're a precursor group to the Avalanche Barret leads.</span></span></li><li data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node=""> In the Corneo Colosseum and VR missions, the characters will use their victory poses from the 1997 original every time they win a battle.</span></li><li data-dcnode-id="3053"><span data-dcnode-id="3057" instrument_node=""> Following victory in battle party members make comments that depend on how well / badly the player performed. If Barret is present one possible response is to hum the victory tune from the original </span><em data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">Final Fantasy VII</span></em><span data-dcnode-id="3054" instrument_node="">.</span></li><li data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node=""> Moggie the Moogle Medal collector's theme music is a near-perfect replica of the Golden Saucer background music from the original game.</span></li><li data-dcnode-id="3046"><span data-dcnode-id="3050" instrument_node=""> When President Shinra is informed that Cloud is a former member of SOLDIER, he mockingly states that SOLDIERs have greatly decreased life-expectancy due to the experiments performed on them and that Cloud probably doesn't have long to live — a reference to the cellular degeneration that Genesis and Angeal underwent in </span><em data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Crisis Core</span></em><span data-dcnode-id="3047" instrument_node="">.</span></li><li data-dcnode-id="3041"><span data-dcnode-id="3045" instrument_node=""> Not only does Rude carry spare sunglasses in his jacket pocket, he also uses the same German Suplex move he used on Loz in </span><em data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Advent Children</span></em><span data-dcnode-id="3042" instrument_node=""> during his boss battles.</span></li><li data-dcnode-id="3036"><span data-dcnode-id="3040" instrument_node=""> After Wedge gets his butt chomped on by a Shinra guard dog, Wedge quips that at least his ass wasn't set on fire — a reference to Wedge's pants being ignited after the Sector 1 Reactor bombing mission in the original </span><em data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Final Fantasy VII</span></em><span data-dcnode-id="3037" instrument_node="">.</span></li><li data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node=""> During the first battle with Reno, if you step on the flowers too many times, Aerith tells you that you are going to catch holy hell. In the original, when Reno tells his soldiers not to step on the flowers (while doing it himself), his soldiers start ribbing him, one of them saying that exact line.</span></li><li data-dcnode-id="3029"><span data-dcnode-id="3033" instrument_node=""> The Wall Market quest to help Johnny is actually made up of several smaller sidequests from the original game strung together via a </span><a class="twikilink" data-dcnode-id="3031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChainOfDeals" title="/pmwiki/pmwiki.php/Main/ChainOfDeals"><span data-dcnode-id="3032" instrument_node="">Chain of Deals</span></a><span data-dcnode-id="3030" instrument_node=""> plot (revolving around retrieving the dressmaker's Honey Bee Inn VIP card, which was also an important item in the original). In both games, Cloud's effectiveness in these quests determines the quality of the dress he wears to infiltrate Don Corneo's bride selection.</span></li><li data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node=""> In the Shinra building, at one point the player has to command two separate parties, switching between them at terminals. In reference to the original game's system for changing party members, the terminals are called "PHS Terminals".</span></li><li data-dcnode-id="3020"><span data-dcnode-id="3026" instrument_node=""> While in the Shinra building, </span><span class="spoiler" data-dcnode-id="3021" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3025" instrument_node="">Cloud runs into a Shinra guard who recognizes him from when Cloud worked there and says he's going to go get Kunsel. Kunsel was a friend of Zack's in </span><em data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Crisis Core</span></em><span data-dcnode-id="3022" instrument_node="">, another SOLDIER.</span></span></li><li data-dcnode-id="3012"><span data-dcnode-id="3019" instrument_node=""> During a Shinra executive board meeting, Professor Hojo mentions the S and G SOLDIER variants from </span><em data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">Crisis Core</span></em><span data-dcnode-id="3016" instrument_node=""> while </span><span class="spoiler" data-dcnode-id="3014" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3015" instrument_node="">suggesting they force Aerith to reproduce. Later, he contemplates Aerith and Sephiroth being bred as well, a subtle reference to Aerith and Sephiroth being conceptualized as lovers at one point during the development of the original game</span></span><span data-dcnode-id="3013" instrument_node="">.</span></li><li data-dcnode-id="2998"><span data-dcnode-id="3011" instrument_node=""> In the original </span><em data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">VII's</span></em><span data-dcnode-id="3008" instrument_node=""> development, Barret was originally going to be murdered by Sephiroth, but this was changed because the developers thought his death wouldn't sting enough. Near the game's closing </span><span class="spoiler" data-dcnode-id="3000" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3007" instrument_node="">as things go off the rails, Sephiroth </span><em data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">does</span></em><span data-dcnode-id="3004" instrument_node=""> kill Barret this time. Thankfully the Arbiters of Fate don't let it stick as part of their attempt to right the rapidly spiraling out of control series of </span><a class="twikilink" data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewDestiny" title="/pmwiki/pmwiki.php/Main/ScrewDestiny"><span data-dcnode-id="3003" instrument_node="">Screw Destiny</span></a><span data-dcnode-id="3001" instrument_node=""> the crew is unknowingly undergoing</span></span><span data-dcnode-id="2999" instrument_node="">.</span></li><li data-dcnode-id="2991"><span data-dcnode-id="2997" instrument_node=""> The boss on the top floor of the Shinra building </span><span class="spoiler" data-dcnode-id="2992" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2996" instrument_node="">is a piece of Jenova, and during its third phase it begins dripping black sludge very reminiscent of Geostigma from </span><em data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Advent Children</span></em><span data-dcnode-id="2993" instrument_node="">.</span></span></li><li data-dcnode-id="2985"><span data-dcnode-id="2990" instrument_node=""> During a confrontation with Sephiroth at the Drum, he blocks Cloud's attack in the same manner as the beginning of their duel in </span><em data-dcnode-id="2987"><a class="twikilink" data-dcnode-id="2988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/FinalFantasyVIIAdventChildren" title="/pmwiki/pmwiki.php/Anime/FinalFantasyVIIAdventChildren"><span data-dcnode-id="2989" instrument_node="">Final Fantasy VII: Advent Children</span></a></em><span data-dcnode-id="2986" instrument_node="">.</span></li><li data-dcnode-id="2980"><span data-dcnode-id="2984" instrument_node=""> During a confrontation with Sephiroth, Cloud's left arm begins to ache — the same arm that was afflicted with Geostigma in </span><em data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Advent Children</span></em><span data-dcnode-id="2981" instrument_node="">.</span></li><li data-dcnode-id="2965"><span data-dcnode-id="2979" instrument_node=""> In Shinra HQ it is possible to find a picture of the company's founders. The character in the middle of the picture, presumably the first president Shinra, is wearing a suit and a gas mask. The gas mask is identical to one worn by a character named Shinra in </span><em data-dcnode-id="2976"><a class="twikilink" data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyX2" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyX2"><span data-dcnode-id="2978" instrument_node="">Final Fantasy X-2</span></a></em><span data-dcnode-id="2975" instrument_node=""> who develops an interest in studying the Farplanes as he believes it has limitless lifestream energy flowing through the planet which can be extracted and used, even if it would take generations to develop the technology. Since </span><em data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">FFX-2's</span></em><span data-dcnode-id="2972" instrument_node=""> release, it has long been a fan theory that </span><em data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">FFVII</span></em><span data-dcnode-id="2969" instrument_node=""> and </span><em data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">FFX</span></em><span data-dcnode-id="2966" instrument_node=""> take place in the same universe, just not on the same planet.</span></li><li data-dcnode-id="2961"><span data-dcnode-id="2964" instrument_node=""> In Shinra Tower, </span><span class="spoiler" data-dcnode-id="2962" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2963" instrument_node="">Mayor Domino (an Avalanche plant) tells the group that another Avalanche sympathizer in the building will respond to the code phrase "The Mayor" by saying "...is the best!" enthusiastically. In the original game, to get the Mayor's keycard one had to solve a puzzle whose answer was a four-letter word (determined randomly for each playthrough). One of the possible answers was BEST, which would cause Domino to enthusiastically crow about how awesome he is.</span></span></li><li data-dcnode-id="2956"><span data-dcnode-id="2960" instrument_node=""> In Chapter 18 during the escape from Shinra when Barret asks Red XIII to smile, it's reminiscent of </span><a class="twikilink" data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyX" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyX"><span data-dcnode-id="2959" instrument_node="">Tidus</span></a><span data-dcnode-id="2957" instrument_node=""> asking Kimahri to smile and getting the same result.</span></li><li data-dcnode-id="2942"><span data-dcnode-id="2955" instrument_node=""> The semifinal boss of the game is </span><span class="spoiler" data-dcnode-id="2943" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2954" instrument_node="">against three Whispers who fight with a single sword, twin guns, and a large fist. The </span><em data-dcnode-id="2951"><a class="twikilink" data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllThereInTheManual" title="/pmwiki/pmwiki.php/Main/AllThereInTheManual"><span data-dcnode-id="2953" instrument_node="">Ultimania</span></a></em><span data-dcnode-id="2950" instrument_node=""> confirms that they're a reference to Kadaj, Yazoo, and Loz from </span><em data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Advent Children</span></em><span data-dcnode-id="2947" instrument_node="">, who had the same fighting styles. These bosses also fuse into a copy of Bahamut, and in </span><em data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Advent Children</span></em><span data-dcnode-id="2944" instrument_node=""> Kadaj summoned Bahamut SIN.</span></span></li><li data-dcnode-id="2935"><span data-dcnode-id="2941" instrument_node=""> In the final chapter, </span><span class="spoiler" data-dcnode-id="2936" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2940" instrument_node="">the cutscene showing Zack preparing to make his last stand is almost a shot-for-shot remake of the same scene as it appeared in </span><em data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">Crisis Core</span></em><span data-dcnode-id="2937" instrument_node="">, complete with Zack having the exact same dialog. With the exception of Arbiters of Fate swarming the battlefield and surrounding Midgar in the distance being different.</span></span></li><li data-dcnode-id="2930"><span data-dcnode-id="2934" instrument_node=""> Whenever you complete Chadley's requests, he will exclaim "</span><a class="twikilink" data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyXV" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyXV"><span data-dcnode-id="2933" instrument_node="">I've come up with a new materia!</span></a><span data-dcnode-id="2931" instrument_node="">"</span></li><li data-dcnode-id="2924"><span data-dcnode-id="2929" instrument_node=""> Since summons work like temporary party members instead of a single big hit, they've been given new moves to work as their Summon Abilities. Almost every single one of their abilities have the same names as attacks used by the Primal boss fight versions of said summons in </span><em data-dcnode-id="2926"><a class="twikilink" data-dcnode-id="2927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyXIV" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyXIV"><span data-dcnode-id="2928" instrument_node="">Final Fantasy XIV</span></a></em><span data-dcnode-id="2925" instrument_node="">, with a few also perfectly translating the effect and animations of the attacks.</span></li><li data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node=""> A few locations have stills from the original game hanging on the walls as paintings; most prominently, Seventh Heaven and the Gainsborough household both have pictures of their 1997 incarnations.</span></li><li data-dcnode-id="2907"><span data-dcnode-id="2921" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2908" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2920" instrument_node="">Sephiroth's attacks in the </span><a class="twikilink" data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="2919" instrument_node="">Final Boss</span></a><span data-dcnode-id="2917" instrument_node=""> fight are based on his appearances in </span><em data-dcnode-id="2914"><a class="twikilink" data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DissidiaFinalFantasy" title="/pmwiki/pmwiki.php/VideoGame/DissidiaFinalFantasy"><span data-dcnode-id="2916" instrument_node="">Dissidia Final Fantasy</span></a></em><span data-dcnode-id="2913" instrument_node=""> and </span><em data-dcnode-id="2910"><a class="twikilink" data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DissidiaFinalFantasy2015" title="/pmwiki/pmwiki.php/VideoGame/DissidiaFinalFantasy2015"><span data-dcnode-id="2912" instrument_node="">Dissidia Final Fantasy (2015)</span></a></em><span data-dcnode-id="2909" instrument_node="">, including Telluric Fury, Aeolian Onslaught, Scintilla, Octaslash, and Hell's Gate.</span></span></li><li data-dcnode-id="2898"><span data-dcnode-id="2906" instrument_node=""> </span><em data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">Intergrade</span></em><span data-dcnode-id="2903" instrument_node=""> features combo attacks where Yuffie can use Sonon's staff as a springboard to launch attacks from, very similar to the kind of combo moves Gladiolus and his sister Iris could pull in </span><em data-dcnode-id="2900"><a class="twikilink" data-dcnode-id="2901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyXV" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyXV"><span data-dcnode-id="2902" instrument_node="">Final Fantasy XV</span></a></em><span data-dcnode-id="2899" instrument_node="">.</span></li><li data-dcnode-id="2889"><span data-dcnode-id="2897" instrument_node=""> The new ending scene from </span><em data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">Intergrade</span></em><span data-dcnode-id="2894" instrument_node=""> features the party walking from Midgar to Kalm, as they did in the original game. However, the background of the landscape looks extremely similar to Leide, the desert/badlands region that serves as the very first area of </span><em data-dcnode-id="2891"><a class="twikilink" data-dcnode-id="2892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyXV" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyXV"><span data-dcnode-id="2893" instrument_node="">Final Fantasy XV</span></a></em><span data-dcnode-id="2890" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2879"><span data-dcnode-id="2886" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="2885" instrument_node="">New Game+</span></a><span data-dcnode-id="2883" instrument_node="">: After beating the game, the player can use Chapter Selection to go to any point in the story that they wish while retaining levels, items, equipment, and materia. The game also gives a flat </span><a class="twikilink" data-dcnode-id="2881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExperienceBooster" title="/pmwiki/pmwiki.php/Main/ExperienceBooster"><span data-dcnode-id="2882" instrument_node="">Experience Booster</span></a><span data-dcnode-id="2880" instrument_node=""> of double EXP and triple AP across a chapter-selected game.</span></li><li data-dcnode-id="2867"><span data-dcnode-id="2878" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero" title="/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero"><span data-dcnode-id="2877" instrument_node="">Nice Job Breaking It, Hero</span></a><span data-dcnode-id="2875" instrument_node="">:</span><ul data-dcnode-id="2868"><li data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node=""> While Avalanche is primarily concerned with saving the planet, they also fight to protect and better the lives of the people living in the Sector 7 slum. However, their bombing of mako reactors tends to cause a lot of problems. Disruptions in the rail network caused by the bombings means residents who commute from the slums to the upper plates can't go to work, and the slums suffer severe supply shortages when they can't ship goods in from the upper plates. As a result, even the undercity residents are heavily divided over whether Avalanche are saviors of the planet or a terrorist menace.</span></li><li data-dcnode-id="2869"><span data-dcnode-id="2872" instrument_node=""> Cloud and his friends completely play into Sephiroth's plans and </span><span class="spoiler" data-dcnode-id="2870" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2871" instrument_node="">destroy the Arbiters of Fate. In doing so, they've destroyed the timeline where Sephiroth is already established to have lost, and gave him another opportunity to destroy the planet.</span></span></li></ul></li><li data-dcnode-id="2857"><span data-dcnode-id="2866" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJobFixingItVillain" title="/pmwiki/pmwiki.php/Main/NiceJobFixingItVillain"><span data-dcnode-id="2865" instrument_node="">Nice Job Fixing It, Villain</span></a><span data-dcnode-id="2863" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2858" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2862" instrument_node="">Sephiroth's plan isn't completely without unintended side effects, even if it keeps the timeline where he was defeated from happening and allows him another chance at his plans. This likewise clues in Aerith very early that something isn't right to begin with (as early as the opening cut scene, notice that she runs from something in fear rather than just walk out of the alley as in the original) as well as somehow created a timeline where Zack </span><em data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">survived</span></em><span data-dcnode-id="2859" instrument_node=""> his initial death and made it to Midgar with Cloud. Indeed the future isn't set in stone, but that likewise goes for his plans as well and he made have made some more changes that he wasn't intending.</span></span></li><li data-dcnode-id="2836"><span data-dcnode-id="2856" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceMeanAndInBetween" title="/pmwiki/pmwiki.php/Main/NiceMeanAndInBetween"><span data-dcnode-id="2855" instrument_node="">Nice, Mean, and In-Between</span></a><span data-dcnode-id="2853" instrument_node="">: In the </span><em data-dcnode-id="2850"><a class="twikilink" data-dcnode-id="2851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyVII" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyVII"><span data-dcnode-id="2852" instrument_node="">original</span></a></em><span data-dcnode-id="2849" instrument_node="">, Tifa is the nice one, Barret is the mean one, and Cloud is in between. In the </span><em data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">Remake</span></em><span data-dcnode-id="2846" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationPersonalityChange" title="/pmwiki/pmwiki.php/Main/AdaptationPersonalityChange"><span data-dcnode-id="2845" instrument_node="">it alters this trope</span></a><span data-dcnode-id="2843" instrument_node=""> so that Cloud is now the mean one, continually getting into pointless arguments with people, pushing people away for trying to help him, having to be restrained from killing unnecessarily, and being flat out told by Tifa that he's scaring her, while Barret is still loud and confrontational but in a much friendlier, more community-spirited way. The thread about him punching his men is dropped in favor of him being </span><a class="twikilink" data-dcnode-id="2841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AFatherToHisMen" title="/pmwiki/pmwiki.php/Main/AFatherToHisMen"><span data-dcnode-id="2842" instrument_node="">A Father to His Men</span></a><span data-dcnode-id="2840" instrument_node="">, and his initial conflict with Cloud is played more like he's trying to make friends with Cloud but keeps rebounding off Cloud's awful personality. Notably, Tifa, in the original, takes Cloud's side and defends him in front of Barret, but in </span><em data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Remake</span></em><span data-dcnode-id="2837" instrument_node=""> she's most likely to take Barret's side and appeal to Cloud's better nature to control him.</span></li><li data-dcnode-id="2828"><span data-dcnode-id="2835" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoEndorHolocaust" title="/pmwiki/pmwiki.php/Main/NoEndorHolocaust"><span data-dcnode-id="2834" instrument_node="">No Endor Holocaust</span></a><span data-dcnode-id="2832" instrument_node="">: The game does this for </span><span class="spoiler" data-dcnode-id="2830" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2831" instrument_node="">the Sector 7 plate falling</span></span><span data-dcnode-id="2829" instrument_node=""> — while it was devastating, many citizens were able to evacuate in time, some people actually survived in the rubble, and the ending gives hope that the refugees are starting to rebuild. This is a sharp contrast to the original game, where the incident was presumed as having obliterated the area and everyone living in it.</span></li><li data-dcnode-id="2805"><span data-dcnode-id="2827" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonIndicativeName" title="/pmwiki/pmwiki.php/Main/NonIndicativeName"><span data-dcnode-id="2826" instrument_node="">Non-Indicative Name</span></a><span data-dcnode-id="2824" instrument_node="">:</span><ul data-dcnode-id="2806"><li data-dcnode-id="2819"><span data-dcnode-id="2823" instrument_node=""> The reason why many players had some difficulty understanding what the Deadly Dodge and Parry materia were for. Deadly Dodge just allowed a character to tack on a fairly potent area attack at the end of their dodge sequence, however characters can attack almost instantly after dodging without the materia. Parry materia can be used even when you're not under attack, and what it actually does is allow the character to do a </span><a class="twikilink" data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DashAttack" title="/pmwiki/pmwiki.php/Main/DashAttack"><span data-dcnode-id="2822" instrument_node="">Dash Attack</span></a><span data-dcnode-id="2820" instrument_node=""> that's difficult to interrupt - so you can "parry" someone who's back is facing you.</span></li><li data-dcnode-id="2814"><span data-dcnode-id="2818" instrument_node=""> An odd, minor example in the form of the shop menu: the "sell weapons/armor" subsection, specifically. Despite what it says, you </span><em data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">cannot</span></em><span data-dcnode-id="2815" instrument_node=""> actually sell any of the weapons in your inventory, only the non-unique armors. Each character's weapons are one-of-a-kind items that can only be found or bought once, and can never be discarded upon acquisition.</span></li><li data-dcnode-id="2807"><span data-dcnode-id="2813" instrument_node=""> The game's very title could be considered this as </span><span class="spoiler" data-dcnode-id="2809" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2812" instrument_node="">it's not entirely a remake of the first game, so much as it is a continuation of the story by way of </span><a class="twikilink" data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButterflyOfDoom" title="/pmwiki/pmwiki.php/Main/ButterflyOfDoom"><span data-dcnode-id="2811" instrument_node="">going over the original events in a world changed by time travel</span></a></span><span data-dcnode-id="2808" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2795"><span data-dcnode-id="2804" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotHisSled" title="/pmwiki/pmwiki.php/Main/NotHisSled"><span data-dcnode-id="2803" instrument_node="">Not His Sled</span></a><span data-dcnode-id="2801" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2796" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2800" instrument_node="">The game was billed as an expanded retelling of the Midgar portion of the original game with modern graphics and gameplay. While </span><a class="twikilink" data-dcnode-id="2798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheStationsOfTheCanon" title="/pmwiki/pmwiki.php/Main/TheStationsOfTheCanon"><span data-dcnode-id="2799" instrument_node="">The Stations of the Canon</span></a><span data-dcnode-id="2797" instrument_node=""> have been encountered, the ending serves to set up how the follow-up will not guarantee that the post-Midgar plot will play out the same way.</span></span></li><li data-dcnode-id="2790"><span data-dcnode-id="2794" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoOshaCompliance" title="/pmwiki/pmwiki.php/Main/NoOshaCompliance"><span data-dcnode-id="2793" instrument_node="">No OSHA Compliance</span></a><span data-dcnode-id="2791" instrument_node="">: Jessie's father is in a long-term comatose state because of poor safety procedures causing him to collapse in a radiation hazard zone, and then go for hours without anyone noticing and getting him out. An even more blatant example is that Shinra allows Hojo to develop his bio-weapon crimes against nature inside corporate HQ instead of outside city limits where the damage they could do if they escape could be limited. Justified by the fact that Shinra pretty much owns the city, and Reeve is the only member of senior management who cares about the population as anything other than tools and sources of revenue, so nobody can force them to take any precautions regarding worker safety.</span></li><li data-dcnode-id="2771"><span data-dcnode-id="2789" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OffTheRails" title="/pmwiki/pmwiki.php/Main/OffTheRails"><span data-dcnode-id="2788" instrument_node="">Off the Rails</span></a><span data-dcnode-id="2786" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2772" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2785" instrument_node="">The major twist at the end of Part 1. The heroes are going the extra mile to save people, including many that died in the original game, such as the Sector 7 casualties, Avalanche, Aerith and even </span><em data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Zack</span></em><span data-dcnode-id="2782" instrument_node="">, culminating in them </span><a class="twikilink" data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewDestiny" title="/pmwiki/pmwiki.php/Main/ScrewDestiny"><span data-dcnode-id="2781" instrument_node="">punching out what is essentially fate itself to make it stick</span></a><span data-dcnode-id="2779" instrument_node="">. Unfortunately, the positive twist comes with a big negative: the one who influenced Cloud and co. into defying and defeating the Arbiters of Fate was </span><em data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Sephiroth himself</span></em><span data-dcnode-id="2776" instrument_node="">, averting his own death at Cloud's hands at the end of the original game, and </span><a class="twikilink" data-dcnode-id="2774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBadGuyWins" title="/pmwiki/pmwiki.php/Main/TheBadGuyWins"><span data-dcnode-id="2775" instrument_node="">everything short of recruiting Cloud to his "cause" went off without a hitch</span></a><span data-dcnode-id="2773" instrument_node="">. Just as Cloud now has a better chance to save everything, Sephiroth now has a better chance to destroy everything.</span></span></li><li data-dcnode-id="2766"><span data-dcnode-id="2770" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OlympusMons" title="/pmwiki/pmwiki.php/Main/OlympusMons"><span data-dcnode-id="2769" instrument_node="">Olympus Mons</span></a><span data-dcnode-id="2767" instrument_node="">: Several of the entities conjured by the Summon Materia — namely Ifrit, Shiva, Leviathan, and Bahamut — were worshiped as deities in the time of the Cetra, and some are still worshiped at the time the game is set.</span></li><li data-dcnode-id="2758"><span data-dcnode-id="2765" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OminousLatinChanting" title="/pmwiki/pmwiki.php/Main/OminousLatinChanting"><span data-dcnode-id="2764" instrument_node="">Ominous Latin Chanting</span></a><span data-dcnode-id="2762" instrument_node="">: In the Opening Movie Trailer, an eerie chorus chants the lyrics to Sephiroth's theme song, "One-Winged Angel", throughout the opening sequence. Amusingly, Aerith appears to </span><a class="twikilink" data-dcnode-id="2760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeftTheBackgroundMusicOn" title="/pmwiki/pmwiki.php/Main/LeftTheBackgroundMusicOn"><span data-dcnode-id="2761" instrument_node="">react to it and is visibly unnerved</span></a><span data-dcnode-id="2759" instrument_node="">.</span></li><li data-dcnode-id="2729"><span data-dcnode-id="2757" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitKill" title="/pmwiki/pmwiki.php/Main/OneHitKill"><span data-dcnode-id="2756" instrument_node="">One-Hit Kill</span></a><span data-dcnode-id="2754" instrument_node="">:</span><ul data-dcnode-id="2730"><li data-dcnode-id="2749"><span data-dcnode-id="2753" instrument_node=""> The Arsenal's </span><a class="twikilink" data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DesperationAttack" title="/pmwiki/pmwiki.php/Main/DesperationAttack"><span data-dcnode-id="2752" instrument_node="">Desperation Attack</span></a><span data-dcnode-id="2750" instrument_node="">, Cry Havoc, deals 9999 damage if it hits.</span></li><li data-dcnode-id="2744"><span data-dcnode-id="2748" instrument_node=""> One of the game's secret enemies, </span><span class="spoiler" data-dcnode-id="2746" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2747" instrument_node="">a Tonberry, will one-shot anyone it tags with its Chef's Knife</span></span><span data-dcnode-id="2745" instrument_node="">.</span></li><li data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node=""> Using Raise on most undead enemies, outside of bosses, will defeat them instantly to the point the damage counter instead of stating the amount of HP done, will just say "Dead"</span></li><li data-dcnode-id="2731"><span data-dcnode-id="2741" instrument_node=""> One of the </span><a class="twikilink" data-dcnode-id="2739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="2740" instrument_node="">superbosses</span></a><span data-dcnode-id="2738" instrument_node=""> (</span><span class="spoiler" data-dcnode-id="2736" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2737" instrument_node="">Weiss The Immaculate</span></span><span data-dcnode-id="2735" instrument_node="">) will hit your entire team with an </span><a class="twikilink" data-dcnode-id="2733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysAccurateAttack" title="/pmwiki/pmwiki.php/Main/AlwaysAccurateAttack"><span data-dcnode-id="2734" instrument_node="">undodgeable</span></a><span data-dcnode-id="2732" instrument_node=""> 9999 damage attack if the player takes too long to defeat them.</span></li></ul></li><li data-dcnode-id="2721"><span data-dcnode-id="2728" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OpenSecret" title="/pmwiki/pmwiki.php/Main/OpenSecret"><span data-dcnode-id="2727" instrument_node="">Open Secret</span></a><span data-dcnode-id="2725" instrument_node="">: The kids of the Leaf House in Sector 5 have a secret hideout that they don't allow adults to come in to. The way that adults around town talk about the kids makes it clear that they know all about the "secret" hideout, but say nothing to let the kids have their own space. Aerith is more-or-less the only adult the kids let into the hideout, but that's because she's </span><a class="twikilink" data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneOfTheKids" title="/pmwiki/pmwiki.php/Main/OneOfTheKids"><span data-dcnode-id="2724" instrument_node="">One of the Kids</span></a><span data-dcnode-id="2722" instrument_node="">.</span></li></ul></div><p data-dcnode-id="2718"></p><div class="folderlabel" data-dcnode-id="2716" onclick="togglefolder('folder2');"><span data-dcnode-id="2717" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;P-Z&nbsp;</span></div><div class="folder" data-dcnode-id="1708" id="folder2" isfolder="true" style="display:block;"><ul data-dcnode-id="1709"><li data-dcnode-id="2711"><span data-dcnode-id="2715" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PermanentlyMissableContent" title="/pmwiki/pmwiki.php/Main/PermanentlyMissableContent"><span data-dcnode-id="2714" instrument_node="">Permanently Missable Content</span></a><span data-dcnode-id="2712" instrument_node="">: Zig-zagged. Within a single playthrough it's possible to miss items and quests, but the Chapter Select function after beating the game allows you to replay a chapter so you can go back and obtain what you missed.</span></li><li data-dcnode-id="2703"><span data-dcnode-id="2710" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PetTheDog" title="/pmwiki/pmwiki.php/Main/PetTheDog"><span data-dcnode-id="2709" instrument_node="">Pet the Dog</span></a><span data-dcnode-id="2707" instrument_node="">: It's no secret that Cloud isn't accustomed to animals or children. During the Sector 8 sidequests, he assists a band of kids with various missions around town, but is still unable to talk to them properly. When they ask Cloud if he can help get rid of the </span><a class="twikilink" data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KingMook" title="/pmwiki/pmwiki.php/Main/KingMook"><span data-dcnode-id="2706" instrument_node="">Toad King</span></a><span data-dcnode-id="2704" instrument_node=""> that's harassing them, he at first demands a sum of money they obviously cannot pay, before changing his mind and only asking for a measly three gil when he sees how distraught they are.</span></li><li data-dcnode-id="2695"><span data-dcnode-id="2702" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PhantomThief" title="/pmwiki/pmwiki.php/Main/PhantomThief"><span data-dcnode-id="2701" instrument_node="">Phantom Thief</span></a><span data-dcnode-id="2699" instrument_node="">: The Angel of the Slums, who robs the wealthy of Shinra and gives to the people in the slums. There's a few sidequests involving the Angel, including Cloud trying to throw off a nosy reporter from finding out the Angel's identity. Doing all of the Angel's sidequests earns Cloud an Elemental materia before crossing the </span><a class="twikilink" data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PointOfNoReturn" title="/pmwiki/pmwiki.php/Main/PointOfNoReturn"><span data-dcnode-id="2698" instrument_node="">Point of No Return</span></a><span data-dcnode-id="2696" instrument_node="">.</span></li><li data-dcnode-id="2687"><span data-dcnode-id="2694" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PintSizedPowerhouse" title="/pmwiki/pmwiki.php/Main/PintSizedPowerhouse"><span data-dcnode-id="2693" instrument_node="">Pint-Sized Powerhouse</span></a><span data-dcnode-id="2691" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2689" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2690" instrument_node="">The infamous Tonberry makes an appearance as a secret boss fight.</span></span><span data-dcnode-id="2688" instrument_node=""> Though small and slow in its pace, it delivers an incredibly powerful punch, capable of taking you out in an instant.</span></li><li data-dcnode-id="2674"><span data-dcnode-id="2686" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlotTwist" title="/pmwiki/pmwiki.php/Main/PlotTwist"><span data-dcnode-id="2685" instrument_node="">Plot Twist</span></a><span data-dcnode-id="2683" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2675" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2682" instrument_node="">The game </span><em data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">banks</span></em><span data-dcnode-id="2679" instrument_node=""> on the fact that many of those playing it are familiar with the original story and think they know how things will pan out however little differences there are. For the most part it is beat for beat of the original Midgar chapter with some new and fleshed out encounters... until the raid on Shinra base, then it pulls the rug out from under those players by showing that, no, this story isn't going to follow things to the letter and beyond this game, this version of </span><em data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">Final Fantasy VII</span></em><span data-dcnode-id="2676" instrument_node=""> is going to be much more different.</span></span></li><li data-dcnode-id="2664"><span data-dcnode-id="2673" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PointOfNoReturn" title="/pmwiki/pmwiki.php/Main/PointOfNoReturn"><span data-dcnode-id="2672" instrument_node="">Point of No Return</span></a><span data-dcnode-id="2670" instrument_node="">: There are several prominent ones across the game, but they count as the Polite version, since the game always gives you a prompt for whether or not you want to continue.</span><ul data-dcnode-id="2665"><li data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node=""> Right at the end of Chapter 14, once you begin climbing up to Shinra HQ, there's no going back and you're locked out of any remaining side missions. However, you still get the opportunity to save and buy items from vending machines after this point.</span></li><li data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node=""> The last Point of No Return is just before the final boss. You get one last chance to save and buy items, and the game asks you if you're ready to go forward. Once you say you're ready, it's a straight shot to the end of the game with a series of boss battles. If you die at any point during this sequence, you have to do the whole thing all over again.</span></li></ul></li><li data-dcnode-id="2636"><span data-dcnode-id="2663" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PostEndGameContent" title="/pmwiki/pmwiki.php/Main/PostEndGameContent"><span data-dcnode-id="2662" instrument_node="">Post-End Game Content</span></a><span data-dcnode-id="2660" instrument_node="">: Several encounters and items only become available once the player has beaten the game and started a </span><a class="twikilink" data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="2659" instrument_node="">New Game+</span></a><span data-dcnode-id="2657" instrument_node="">:</span><ul data-dcnode-id="2637"><li data-dcnode-id="2652"><span data-dcnode-id="2656" instrument_node=""> </span><em data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">Most</span></em><span data-dcnode-id="2653" instrument_node=""> of the characters' Manuscripts (items that add weapon upgrade points or unlock Limit Breaks) are only unlocked in Hard Mode.</span></li><li data-dcnode-id="2638"><span data-dcnode-id="2651" instrument_node=""> Additionally, playing the Hard Mode campaign is the only way to unlock the </span><a class="twikilink" data-dcnode-id="2649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="2650" instrument_node="">Bonus Boss</span></a><span data-dcnode-id="2648" instrument_node="">, the </span><span class="spoiler" data-dcnode-id="2646" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2647" instrument_node="">Pride and Joy Prototype in the Shinra Combat Simulator</span></span><span data-dcnode-id="2645" instrument_node="">, as well as see the conclusion of a certain story — </span><span class="spoiler" data-dcnode-id="2640" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2644" instrument_node="">Chadley, who reveals that he is a </span><strong data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">Shinra-created android</span></strong><span data-dcnode-id="2641" instrument_node=""> that has broken free of his programming</span></span><span data-dcnode-id="2639" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2629"><span data-dcnode-id="2635" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerEchoes" title="/pmwiki/pmwiki.php/Main/PowerEchoes"><span data-dcnode-id="2634" instrument_node="">Power Echoes</span></a><span data-dcnode-id="2632" instrument_node="">: SOLDIER 3rd Class enemies have a distinct, deep echo to their voices that the rest of Shinra's troops lack. Same deal with the Helitroopers and Elite Helitroopers, who are a cut above the regular Shinra Security Officers. Roche, despite being a SOLDIER 3C, doesn't, but that's because </span><a class="twikilink" data-dcnode-id="2630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HelmetsAreHardlyHeroic" title="/pmwiki/pmwiki.php/Main/HelmetsAreHardlyHeroic"><span data-dcnode-id="2631" instrument_node="">he doesn't wear a helmet.</span></a></li><li data-dcnode-id="2624"><span data-dcnode-id="2628" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerGlows" title="/pmwiki/pmwiki.php/Main/PowerGlows"><span data-dcnode-id="2627" instrument_node="">Power Glows</span></a><span data-dcnode-id="2625" instrument_node="">: Some special attacks create glowing particle effects when they make contact with an enemy.</span></li><li data-dcnode-id="2619"><span data-dcnode-id="2623" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerupLetdown" title="/pmwiki/pmwiki.php/Main/PowerupLetdown"><span data-dcnode-id="2622" instrument_node="">Power-Up Letdown</span></a><span data-dcnode-id="2620" instrument_node="">: Since every weapon and Materia are already available in Normal mode (and in fact, you CANNOT obtain duplicates of non-shop Materia), the only benefit a player gets from playing Hard Mode (other than the normal EXP and AP), is a single Manuscript for a pre-determined character dropped by each major boss or for quest completion - which doesn't even provide enough points for a single weapon grid unlock on its own.</span></li><li data-dcnode-id="2586"><span data-dcnode-id="2618" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PragmaticVillainy" title="/pmwiki/pmwiki.php/Main/PragmaticVillainy"><span data-dcnode-id="2617" instrument_node="">Pragmatic Villainy</span></a><span data-dcnode-id="2615" instrument_node="">: Shinra uses this as their general methodology. They will do plenty of evil stuff but completely avoid </span><a class="twikilink" data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CardCarryingVillain" title="/pmwiki/pmwiki.php/Main/CardCarryingVillain"><span data-dcnode-id="2614" instrument_node="">Card-Carrying Villain</span></a><span data-dcnode-id="2612" instrument_node=""> to avoid the population trying to rise up against them. Do what you need to do to advance Shinra's goals, but don't get caught and make sure there's someone else to blame, or </span><a class="twikilink" data-dcnode-id="2610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlausibleDeniability" title="/pmwiki/pmwiki.php/Main/PlausibleDeniability"><span data-dcnode-id="2611" instrument_node="">Plausible Deniability</span></a><span data-dcnode-id="2609" instrument_node="">.</span><ul data-dcnode-id="2587"><li data-dcnode-id="2598"><span data-dcnode-id="2608" instrument_node=""> Shinra exploits the fact that Avalanche is going to bomb their reactor to set up a </span><a class="twikilink" data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseFlagOperation" title="/pmwiki/pmwiki.php/Main/FalseFlagOperation"><span data-dcnode-id="2607" instrument_node="">False Flag Operation</span></a><span data-dcnode-id="2605" instrument_node="">. Rather than stop them, the company uses the opportunity to exploit </span><a class="twikilink" data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PatrioticFervor" title="/pmwiki/pmwiki.php/Main/PatrioticFervor"><span data-dcnode-id="2604" instrument_node="">Patriotic Fervor</span></a><span data-dcnode-id="2602" instrument_node=""> among Midgar's citizens to support Shinra. Since they're planning to </span><span class="spoiler" data-dcnode-id="2600" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2601" instrument_node="">abandon Midgar entirely and create Neo-Midgar in the Promised Land once they find it</span></span><span data-dcnode-id="2599" instrument_node="">, Shinra uses Avalanche's bombing
