r profile"><span data-dcnode-id="4632" instrument_node="">though it's revealed the Erdtree itself is outright preventing any Tarnished from becoming the Third Elden Lord</span></span><span data-dcnode-id="4630" instrument_node="">. Meanwhile, Rykard, Lord of Blasphemy, rules Mt. Gelmir from his Volcano Manor. </span><span class="spoiler" data-dcnode-id="4628" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4629" instrument_node="">He's revealed to have been mutated into a ginormous monstrosity known as the "God Devouring Serpent", forcing the Tarnished to put him down.</span></span></li><li data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node=""> The Lord of Blood, Mohg is this for the hidden Mohgwyn Palace area, but his minions and projections also harry you throughout other areas in pursuit of their missions.</span></li><li data-dcnode-id="4609"><span data-dcnode-id="4624" instrument_node=""> The northern area of the landmass, </span><span class="spoiler" data-dcnode-id="4622" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4623" instrument_node="">the Mountaintops of the Giants</span></span><span data-dcnode-id="4621" instrument_node="">, throws a curveball into the equation: </span><span class="spoiler" data-dcnode-id="4610" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4620" instrument_node="">there </span><em data-dcnode-id="4618"><span data-dcnode-id="4619" instrument_node="">is</span></em><span data-dcnode-id="4617" instrument_node=""> no Arc Villain here. Instead, the Tarnished and Melina come here so she can perform a </span><a class="twikilink" data-dcnode-id="4615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="4616" instrument_node="">Heroic Sacrifice</span></a><span data-dcnode-id="4614" instrument_node=""> to set the Erdtree ablaze and destroy the holy vines protecting Queen Marika's body. The closest thing to a villain is the Fire Giant, and he's more of a </span><a class="twikilink" data-dcnode-id="4612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NecessaryEvil" title="/pmwiki/pmwiki.php/Main/NecessaryEvil"><span data-dcnode-id="4613" instrument_node="">Necessary Evil</span></a><span data-dcnode-id="4611" instrument_node=""> for being in the way of Melina's sacrificial rite.</span></span></li><li data-dcnode-id="4605"><span data-dcnode-id="4608" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4606" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4607" instrument_node="">Crumbling Farum Azula, much like the Mountaintops, has Maliketh and Dragonlord Placusidax, and neither are truly villainous. Placusidax is content to reside in its arena and will only attack when you approach it, while Maliketh is only doing his duty to protect Destined Death.</span></span></li></ul></li><li data-dcnode-id="4595"><span data-dcnode-id="4602" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcWords" title="/pmwiki/pmwiki.php/Main/ArcWords"><span data-dcnode-id="4601" instrument_node="">Arc Words</span></a><span data-dcnode-id="4599" instrument_node="">: "Let chaos take the world" serves as the </span><a class="twikilink" data-dcnode-id="4597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CatchPhrase" title="/pmwiki/pmwiki.php/Main/CatchPhrase"><span data-dcnode-id="4598" instrument_node="">Catchphrase</span></a><span data-dcnode-id="4596" instrument_node=""> of those who follow the Frenzied Flame.</span></li><li data-dcnode-id="4590"><span data-dcnode-id="4594" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArmorOfInvincibility" title="/pmwiki/pmwiki.php/Main/ArmorOfInvincibility"><span data-dcnode-id="4593" instrument_node="">Armor of Invincibility</span></a><span data-dcnode-id="4591" instrument_node="">: The Fingerprint Stone Shield stands out as the greatshield with the highest Guard Boost and highest all-around damage reduction, meaning while you're using it for guarding, you can tank a lot of hits with very little stamina reduction. When maxed out and supplanted with a Greatshield Talisman you can block at no penalty! The drawback to it is its enormous Strength requirement and massive weight, which is understandable seeing you're hauling a giant stone slab.</span></li><li data-dcnode-id="4569"><span data-dcnode-id="4589" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AuthorAppeal" title="/pmwiki/pmwiki.php/Main/AuthorAppeal"><span data-dcnode-id="4588" instrument_node="">Author Appeal</span></a><span data-dcnode-id="4586" instrument_node="">: According to an interview, Miyazaki greatly enjoys making poisonous swamp areas </span><span class="notelabel" data-dcnode-id="4583" onclick="togglenote('note1rd9l');" style="cursor: pointer;"><sup data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4577" id="note1rd9l" isnote="true" onclick="togglenote('note1rd9l');" style="display: none; cursor: pointer;"><span data-dcnode-id="4582" instrument_node=""> Which given his reputation as a </span><img class="trivia1 rounded" data-dcnode-id="4581" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-trivia.png&amp;raw" title="This example contains a TRIVIA entry. It should be moved to the TRIVIA tab."><a class="twikilink" data-dcnode-id="4579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrollingCreator" title="/pmwiki/pmwiki.php/Main/TrollingCreator"><span data-dcnode-id="4580" instrument_node="">Trolling Creator</span></a><span data-dcnode-id="4578" instrument_node="">, make of that what you will. </span></span><span data-dcnode-id="4576" instrument_node="">, which has been a staple of previous titles he's directed. Elden Ring has </span><em data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">multiple</span></em><span data-dcnode-id="4573" instrument_node=""> poisonous swamps for this exact reason. In an interview after the release, Miyazaki went so far as to say he "can't help himself".</span><ul data-dcnode-id="4570"><li data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node=""> The turtles. Turtles were the only pets G.R.R.M was allowed to have a child, and the stories he would put them in were the start of his writing career.</span></li></ul></li><li data-dcnode-id="4564"><span data-dcnode-id="4568" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AwesomeButImpractical" title="/pmwiki/pmwiki.php/Main/AwesomeButImpractical"><span data-dcnode-id="4567" instrument_node="">Awesome, but Impractical</span></a><span data-dcnode-id="4565" instrument_node="">: A lot of the more advanced incantation attacks look great, but suffer from a long wind-up and poor range which exposes you to interruption, and underwhelming damage which doesn't justify their steep cost. This was addressed in the 1.04 patch, which gave a lot of these incantations a faster casting speed, faster recovery, lower cost and temporary poise boost so that you are less likely to get interrupted.</span></li><li data-dcnode-id="4554"><span data-dcnode-id="4563" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BaitAndSwitch" title="/pmwiki/pmwiki.php/Main/BaitAndSwitch"><span data-dcnode-id="4562" instrument_node="">Bait-and-Switch</span></a><span data-dcnode-id="4560" instrument_node="">: In Murkwater Cave, </span><span class="spoiler" data-dcnode-id="4555" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4559" instrument_node="">a small dungeon with a few random bandits holed up in it, you'll notice a wall of light off a branching path. Instead of a boss fight, there's an empty room with a single chest in it... and when the chest is looted of its rather mediocre clothes from it, </span><a class="twikilink" data-dcnode-id="4557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnceAnEpisode" title="/pmwiki/pmwiki.php/Main/OnceAnEpisode"><span data-dcnode-id="4558" instrument_node="">Patches calls out the Tarnished on robbing him and then becomes said boss fight</span></a><span data-dcnode-id="4556" instrument_node="">. When his health bar gets about halfway down, he starts groveling and begging for his life. In upholding tradition, sparing Patches' life and forgiving him turns him into a merchant who shows up in a few locales.</span></span></li><li data-dcnode-id="4544"><span data-dcnode-id="4553" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BarredFromTheAfterlife" title="/pmwiki/pmwiki.php/Main/BarredFromTheAfterlife"><span data-dcnode-id="4552" instrument_node="">Barred from the Afterlife</span></a><span data-dcnode-id="4550" instrument_node="">: One of the most abominable acts the Dung Eater inflicts upon the world is inflicting a curse upon his victims which blocks their souls from returning to the Erdtree when they die. </span><span class="spoiler" data-dcnode-id="4545" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4549" instrument_node="">And if you follow his questline, during the ending, you can inflict this curse upon </span><em data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">the entire land</span></em><span data-dcnode-id="4546" instrument_node="">, cursing all souls for the rest of time.</span></span></li><li data-dcnode-id="4530"><span data-dcnode-id="4543" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BatOutOfHell" title="/pmwiki/pmwiki.php/Main/BatOutOfHell"><span data-dcnode-id="4542" instrument_node="">Bat Out of Hell</span></a><span data-dcnode-id="4540" instrument_node="">: Giant Bats the size of humans are of the enemy types found in the overworld, using </span><a class="twikilink" data-dcnode-id="4538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MakeMeWannaShout" title="/pmwiki/pmwiki.php/Main/MakeMeWannaShout"><span data-dcnode-id="4539" instrument_node="">sonic screams</span></a><span data-dcnode-id="4537" instrument_node=""> and grab attacks which can inflict Bleed. Due to the </span><a class="twikilink" data-dcnode-id="4535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InUniverseGameClock" title="/pmwiki/pmwiki.php/Main/InUniverseGameClock"><span data-dcnode-id="4536" instrument_node="">day/night cycle</span></a><span data-dcnode-id="4534" instrument_node="">, their </span><a class="twikilink" data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NPCScheduling" title="/pmwiki/pmwiki.php/Main/NPCScheduling"><span data-dcnode-id="4533" instrument_node="">behaviour also changes depending on the time of day</span></a><span data-dcnode-id="4531" instrument_node="">, with the Bats found sleeping at various places during the day, but being found actively roaming the areas at night, hunting down the Tarnished if spotted.</span></li><li data-dcnode-id="4507"><span data-dcnode-id="4529" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BearsAreBadNews" title="/pmwiki/pmwiki.php/Main/BearsAreBadNews"><span data-dcnode-id="4528" instrument_node="">Bears Are Bad News</span></a><span data-dcnode-id="4526" instrument_node="">: Regular bears in the Lands Between hit hard, but are otherwise a </span><a class="twikilink" data-dcnode-id="4524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Downplayed" title="/pmwiki/pmwiki.php/Main/Downplayed"><span data-dcnode-id="4525" instrument_node="">Downplayed</span></a><span data-dcnode-id="4523" instrument_node=""> example compared to the rest of the world. The actual one would be the Runebears, which are not only </span><em data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">massive</span></em><span data-dcnode-id="4520" instrument_node=""> (they are roughly the size of </span><em data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">elephants</span></em><span data-dcnode-id="4517" instrument_node="">), but they're </span><a class="twikilink" data-dcnode-id="4515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LightningBruiser" title="/pmwiki/pmwiki.php/Main/LightningBruiser"><span data-dcnode-id="4516" instrument_node="">Lightning Bruisers</span></a><span data-dcnode-id="4514" instrument_node=""> as well, being large, fast, and having staggering health pools and damage potential with their fangs and claw. They can also roar out a </span><em data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">projectile</span></em><span data-dcnode-id="4511" instrument_node=""> if the Tarnished is far enough. The frozen mountains are also filled with </span><em data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">polar</span></em><span data-dcnode-id="4508" instrument_node=""> species of the Runebears, who are even more deadly then their forest cousins.</span></li><li data-dcnode-id="4493"><span data-dcnode-id="4506" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeefGate" title="/pmwiki/pmwiki.php/Main/BeefGate"><span data-dcnode-id="4505" instrument_node="">Beef Gate</span></a><span data-dcnode-id="4503" instrument_node="">: </span><a class="twikilink" data-dcnode-id="4501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayedWith" title="/pmwiki/pmwiki.php/Main/PlayedWith"><span data-dcnode-id="4502" instrument_node="">Played With</span></a><span data-dcnode-id="4500" instrument_node="">; A good indicator you have wandered into an area you're not supposed to be in yet is when you go to hit a </span><a class="twikilink" data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mook" title="/pmwiki/pmwiki.php/Main/Mook"><span data-dcnode-id="4499" instrument_node="">Mook</span></a><span data-dcnode-id="4497" instrument_node=""> and do no damage while they take you out in a single hit. That said, bosses very rarely block you from progressing forward, Stormveil Castle for instance might seem like it's blocking the way into Liurnia of the Lakes but you can actually just go around, and Caelid is even easier to wander into. There are also traps and fast travel gates which can teleport you to very high level areas. So in the end it's the toughness of the mobs which is your best indicator for whether you should stay and fight or get out of Dodge.</span><ul data-dcnode-id="4494"><li data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node=""> The Bestial Sanctum is heavily guarded to encourage either finding the portal in Limgrave or having D mark the portal in Limgrave on your map. To go there by foot means heading through Dragonbarrow, navigating around numerous dragons dotting the area, then crossing one of two paths — one guarded by Flying Dragon Greyll and another littered with poison traps and guarded by heavy-hitting Vulgar Militia. Then you have to face the Black Blade Kindred guarding the gate.</span></li></ul></li><li data-dcnode-id="4488"><span data-dcnode-id="4492" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeneathTheEarth" title="/pmwiki/pmwiki.php/Main/BeneathTheEarth"><span data-dcnode-id="4491" instrument_node="">Beneath the Earth</span></a><span data-dcnode-id="4489" instrument_node="">: The Lands Between is full of hidden catacombs, caves and crystal mines the Tarnished can stumble upon, most of them even having a Boss at the bottom of it. Furthermore, some places are their own little world beneath the earth, such as Nokron, the Eternal City which has a sky full of stars (actually glowing glinstone ores) despite being underground.</span></li><li data-dcnode-id="4483"><span data-dcnode-id="4487" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BFG" title="/pmwiki/pmwiki.php/Main/BFG"><span data-dcnode-id="4486" instrument_node="">BFG</span></a><span data-dcnode-id="4484" instrument_node="">: Ballistas can fire massive bolts and can pack an even bigger punch than greatbows. The Hand Ballista is an oversized crossbow, and the Jar Cannon is quite literally a handheld cannon.</span></li><li data-dcnode-id="4458"><span data-dcnode-id="4482" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BFS" title="/pmwiki/pmwiki.php/Main/BFS"><span data-dcnode-id="4481" instrument_node="">BFS</span></a><span data-dcnode-id="4479" instrument_node="">: In FromSoftware tradition, with some tweaks.</span><ul data-dcnode-id="4459"><li data-dcnode-id="4474"><span data-dcnode-id="4478" instrument_node=""> Great Hammers, the weapon type notorious for its incredibly large clubs and hammers, have been renamed Colossal Weapons. This is to include a few bladed humongous weapons which couldn't fit in the other weapon types. Yes, the </span><a class="twikilink" data-dcnode-id="4476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CarryABigStick" title="/pmwiki/pmwiki.php/Main/CarryABigStick"><span data-dcnode-id="4477" instrument_node="">Great Club</span></a><span data-dcnode-id="4475" instrument_node=""> is still here.</span></li><li data-dcnode-id="4466"><span data-dcnode-id="4473" instrument_node=""> Ultra Greatswords are called Colossal Swords now to fit with the rename. Besides the somewhat misleadingly named "Greatsword", which has been notably remodeled to better resemble a certain </span><a class="twikilink" data-dcnode-id="4471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Berserk" title="/pmwiki/pmwiki.php/Manga/Berserk"><span data-dcnode-id="4472" instrument_node="">Black Swordsman's heap of raw iron</span></a><span data-dcnode-id="4470" instrument_node="">, one notable Colossal Sword is the Grafted Greatsword, which is basically a colossal sword made up of smaller swords, as if the </span><a class="twikilink" data-dcnode-id="4468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ASongOfIceAndFire" title="/pmwiki/pmwiki.php/Literature/ASongOfIceAndFire"><span data-dcnode-id="4469" instrument_node="">Iron Throne</span></a><span data-dcnode-id="4467" instrument_node=""> was wieldable. Considering George R.R. Martin himself was the writer for the game's lore, that might not be a coincidence.</span></li><li data-dcnode-id="4464"><span data-dcnode-id="4465" instrument_node=""> Even the "regular" Greatswords aren't slouches in that department. For example, the Blasphemous Blade is not only very large, it's coated in living blood.</span></li><li data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node=""> Starscourge Radahn's Greatswords are larger than the Tarnished, and while wielded by Radahn, they're absolutely massive, and the mad general is gigantic.</span></li><li data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node=""> The Nagakiba, from Yura's questline, translates to "long fang", and it shows — this katana is about as long as the Tarnished is tall!</span></li></ul></li><li data-dcnode-id="4453"><span data-dcnode-id="4457" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBadassBattleSequence" title="/pmwiki/pmwiki.php/Main/BigBadassBattleSequence"><span data-dcnode-id="4456" instrument_node="">Big Badass Battle Sequence</span></a><span data-dcnode-id="4454" instrument_node="">: In the story trailer, a massive host of humans and trolls are seen laying siege to a fortress surrounding the Erdtree underneath a red sky. In-game this is revealed as the Siege of Leyndell, where Godrick the Grafted attempted to seize the royal capital and was promptly crushed by the forces of Morgott the Omen King. The defeat was so catastrophic for Godrick's side, even hundreds of years later he's still holed up in Stormveil Castle ruling over an army of sellswords and criminals.</span></li><li data-dcnode-id="4442"><span data-dcnode-id="4452" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigCreepyCrawlies" title="/pmwiki/pmwiki.php/Main/BigCreepyCrawlies"><span data-dcnode-id="4451" instrument_node="">Big Creepy-Crawlies</span></a><span data-dcnode-id="4449" instrument_node="">: The underground has massive caverns filled with human-sized ants, usually feasting in their colonies. They come in soldier and worker variants. There are also the </span><em data-dcnode-id="4447"><span data-dcnode-id="4448" instrument_node="">Souls</span></em><span data-dcnode-id="4446" instrument_node="">-standard giant crabs, huge poisonous slugs (which also come in a </span><em data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">flaming</span></em><span data-dcnode-id="4443" instrument_node=""> variant), giant dragonflies (which actually look more like dobsonflies), huge land-dwelling lobsters, and large non-aggressive dung beetles which drop valuables if killed.</span></li><li data-dcnode-id="4437"><span data-dcnode-id="4441" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigFancyCastle" title="/pmwiki/pmwiki.php/Main/BigFancyCastle"><span data-dcnode-id="4440" instrument_node="">Big Fancy Castle</span></a><span data-dcnode-id="4438" instrument_node="">: Some of the most notable strongholds in the world were once elegant sprawling castles with breathtaking sceneries and where life was visibly luxurious before the Shattering. Examples include Stormveil Castle, Godrick the Golden's hold, or the Raya Lucaria Academy which is used as a place for learning sorcery.</span></li><li data-dcnode-id="4426"><span data-dcnode-id="4436" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigFancyHouse" title="/pmwiki/pmwiki.php/Main/BigFancyHouse"><span data-dcnode-id="4435" instrument_node="">Big Fancy House</span></a><span data-dcnode-id="4433" instrument_node="">: Caria Manor and Volcano Manor, which both split the difference between "mansion" and "castle". The former is so utterly enormous its backyard is big enough to hold </span><em data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">three</span></em><span data-dcnode-id="4430" instrument_node=""> wizard towers (and </span><span class="spoiler" data-dcnode-id="4428" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4429" instrument_node=""> a guard dragon</span></span><span data-dcnode-id="4427" instrument_node="">). It should surprise no one the owners of the house are royalty.</span></li><li data-dcnode-id="4416"><span data-dcnode-id="4425" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BilingualBonus" title="/pmwiki/pmwiki.php/Main/BilingualBonus"><span data-dcnode-id="4424" instrument_node="">Bilingual Bonus</span></a><span data-dcnode-id="4422" instrument_node="">:</span><ul data-dcnode-id="4417"><li data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node=""> The song certain harpies can be heard singing is in Latin, and it's a lamentation on the ruined state of the Lands Between, asking the gods why they would allow this to happen.</span></li><li data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node=""> Mohg counts down in Latin during his boss fight as he applies his ring curse to the player, and when he later activates it, he chants "Nihil, nihil, nihil!", which means "Nothing, nothing, nothing!"</span></li></ul></li><li data-dcnode-id="4393"><span data-dcnode-id="4415" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackAndGreyMorality" title="/pmwiki/pmwiki.php/Main/BlackAndGreyMorality"><span data-dcnode-id="4414" instrument_node="">Black-and-Grey Morality</span></a><span data-dcnode-id="4412" instrument_node="">: Shouldn't come as a surprise considering the </span><a class="twikilink" data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/FromSoftware" title="/pmwiki/pmwiki.php/Creator/FromSoftware"><span data-dcnode-id="4411" instrument_node="">creators</span></a><span data-dcnode-id="4409" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/GeorgeRRMartin" title="/pmwiki/pmwiki.php/Creator/GeorgeRRMartin"><span data-dcnode-id="4408" instrument_node="">responsible</span></a><span data-dcnode-id="4406" instrument_node="">, but it's even more pronounced in this game than in previous </span><em data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">Souls</span></em><span data-dcnode-id="4403" instrument_node=""> titles. Most of the principal players in the main conflict are, at worst, </span><a class="twikilink" data-dcnode-id="4401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WellIntentionedExtremist" title="/pmwiki/pmwiki.php/Main/WellIntentionedExtremist"><span data-dcnode-id="4402" instrument_node="">well intentioned extremists</span></a><span data-dcnode-id="4400" instrument_node=""> who feel they're doing the right thing, or </span><a class="twikilink" data-dcnode-id="4398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FallenHero" title="/pmwiki/pmwiki.php/Main/FallenHero"><span data-dcnode-id="4399" instrument_node="">fallen heroes</span></a><span data-dcnode-id="4397" instrument_node=""> who no longer have the capacity for reason, and the central storyline lacks a true singular </span><a class="twikilink" data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="4396" instrument_node="">Big Bad</span></a><span data-dcnode-id="4394" instrument_node=""> figure. However, the game also features a number of characters, most notably Godrick, Mohg, Rykard, and Seluvis, who are genuinely just wretchedly evil figures with no redeeming qualities who need to be stopped at all costs.</span></li><li data-dcnode-id="4385"><span data-dcnode-id="4392" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlindSeer" title="/pmwiki/pmwiki.php/Main/BlindSeer"><span data-dcnode-id="4391" instrument_node="">Blind Seer</span></a><span data-dcnode-id="4389" instrument_node="">: The Prophet's Blindfold item. Its description states it belonged to a group of prophets who were exiled for their prophecies, and who believed eyesight was useless to those "who know the true path".</span><ul data-dcnode-id="4386"><li data-dcnode-id="4387"><span data-dcnode-id="4388" instrument_node=""> Lightseeker Hyetta is a blind pilgrim/seer. She can see lost grace that directs her to her believed destiny but only after consuming Shabriri "Grapes"; unbeknownst to her (but known to everybody else) theyre actually human eyeballs.</span></li></ul></li><li data-dcnode-id="4380"><span data-dcnode-id="4384" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BloodMagic" title="/pmwiki/pmwiki.php/Main/BloodMagic"><span data-dcnode-id="4383" instrument_node="">Blood Magic</span></a><span data-dcnode-id="4381" instrument_node="">: Several examples. The "Briars of Sin" sorcery damages the user, but creates a large field of bloody thorn bushes around them. The "Bloodflame Blade" incantation derives itself from the Lord of Blood, as does the Reduvia dagger's Blood Blade skill and the additional Bloody Slash skill.</span></li><li data-dcnode-id="4342"><span data-dcnode-id="4379" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BodyHorror" title="/pmwiki/pmwiki.php/Main/BodyHorror"><span data-dcnode-id="4378" instrument_node="">Body Horror</span></a><span data-dcnode-id="4376" instrument_node="">: Even more so than past From games...</span><ul data-dcnode-id="4343"><li data-dcnode-id="4357"><span data-dcnode-id="4375" instrument_node=""> Godrick the Grafted has </span><em data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">dozens</span></em><span data-dcnode-id="4372" instrument_node=""> of human arms attached to his back, some of which have more than five fingers on them. Besides that, he has pale, rotting skin, disgusting teeth, and many of the fingers on his body are misshapen. In his second phase, he attaches a </span><em data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">severed dragon's head</span></em><span data-dcnode-id="4369" instrument_node=""> to his left arm (before that, he lopped said arm off to make room, basically jammed it in place, and the head </span><em data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">reanimates</span></em><span data-dcnode-id="4366" instrument_node=""> with a scream). </span><span class="spoiler" data-dcnode-id="4358" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4365" instrument_node="">Godrick himself was a </span><em data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">tiny</span></em><span data-dcnode-id="4362" instrument_node=""> old man, most of his mass are the grafted limbs from people he tortured, making him practically a living, self-inflicted </span><a class="twikilink" data-dcnode-id="4360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FleshGolem" title="/pmwiki/pmwiki.php/Main/FleshGolem"><span data-dcnode-id="4361" instrument_node="">Flesh Golem</span></a><span data-dcnode-id="4359" instrument_node="">.</span></span></li><li data-dcnode-id="4348"><span data-dcnode-id="4356" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4350" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4355" instrument_node="">The Godskin Noble, who seems to be grotesquely fattened much like the Adjudicator of </span><em data-dcnode-id="4352"><a class="twikilink" data-dcnode-id="4353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DemonsSouls" title="/pmwiki/pmwiki.php/VideoGame/DemonsSouls"><span data-dcnode-id="4354" instrument_node="">Demon's Souls</span></a></em><span data-dcnode-id="4351" instrument_node=""> but also draped in the skin of characters</span></span><span data-dcnode-id="4349" instrument_node="">.</span></li><li data-dcnode-id="4344"><span data-dcnode-id="4347" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4345" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4346" instrument_node="">The God-Devouring Serpent, and the second phase version Rykard, Lord of Blasphemy. The first phase is a giant snake coiled up in a tangle with arms and legs jutting out at different sections of its body. The second face however is more grotesque, having the Lord's face on its underside and covered in smaller arms and legs made of blood. Item descriptions of the greatsword made from its soul imply those are the remnants of the victims it consumed.</span></span></li></ul></li><li data-dcnode-id="4314"><span data-dcnode-id="4341" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BodyMotifs" title="/pmwiki/pmwiki.php/Main/BodyMotifs"><span data-dcnode-id="4340" instrument_node="">Body Motifs</span></a><span data-dcnode-id="4338" instrument_node="">:</span><ul data-dcnode-id="4315"><li data-dcnode-id="4324"><span data-dcnode-id="4337" instrument_node=""> The game has a </span><em data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">huge</span></em><span data-dcnode-id="4334" instrument_node=""> focus on arms, hands, and fingers. Multiple bosses are shown to have numerous arms or </span><a class="twikilink" data-dcnode-id="4332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialLimbs" title="/pmwiki/pmwiki.php/Main/ArtificialLimbs"><span data-dcnode-id="4333" instrument_node="">Artificial Limbs</span></a><span data-dcnode-id="4331" instrument_node="">, most notably the tutorial </span><a class="twikilink" data-dcnode-id="4329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HopelessBossFight" title="/pmwiki/pmwiki.php/Main/HopelessBossFight"><span data-dcnode-id="4330" instrument_node="">Hopeless Boss Fight</span></a><span data-dcnode-id="4328" instrument_node=""> Grafted Scion and Godrick the Grafted, one of the demigods. The former is a spider-like creature with multiple arms as limbs, while the latter has several arms of different shapes and sizes all over his torso. Godrick even cuts off his left arm partway through his boss fight to attach a </span><em data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">dragon's head</span></em><span data-dcnode-id="4325" instrument_node=""> to it. The point of attachment looks fleshy, covered in tumor-esque spots, and looks very unnatural overall.</span></li><li data-dcnode-id="4316"><span data-dcnode-id="4323" instrument_node=""> Molten fingerprints appear on everything related to </span><span class="spoiler" data-dcnode-id="4321" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4322" instrument_node="">the Frenzied Flame</span></span><span data-dcnode-id="4320" instrument_node="">, from weapons and armor to </span><span class="spoiler" data-dcnode-id="4318" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4319" instrument_node="">seared ruins in the Frenzied Flame ending</span></span><span data-dcnode-id="4317" instrument_node="">.</span></li></ul></li><li data-dcnode-id="4304"><span data-dcnode-id="4313" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BodyOfBodies" title="/pmwiki/pmwiki.php/Main/BodyOfBodies"><span data-dcnode-id="4312" instrument_node="">Body of Bodies</span></a><span data-dcnode-id="4310" instrument_node="">: Any boss with the epithet "Grafted" is likely to be this:</span><ul data-dcnode-id="4305"><li data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node=""> The Grafted Scion faced immediately after the introductory cinematic looks like a spider made up of arms.</span></li><li data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node=""> Godrick the Grafted technically has his original body as the main one, but he has so many limbs grafted to him, the new additions make up the vast majority of his mass.</span></li></ul></li><li data-dcnode-id="4296"><span data-dcnode-id="4303" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BookEnds" title="/pmwiki/pmwiki.php/Main/BookEnds"><span data-dcnode-id="4302" instrument_node="">Bookends</span></a><span data-dcnode-id="4300" instrument_node="">: The beginning of the game is narrated by a man saying "The fallen leaves tell a story...", proceeding to give background information and what has happened by the time the Tarnished arrives in the Lands Between. In the Elden Lord ending and its variants, </span><span class="spoiler" data-dcnode-id="4298" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4299" instrument_node="">the narrator repeats his opening line, this time stating how "our seed" will look back and recall the age ushered by the new Elden Lord</span></span><span data-dcnode-id="4297" instrument_node="">.</span></li><li data-dcnode-id="4242"><span data-dcnode-id="4295" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BoringButPractical" title="/pmwiki/pmwiki.php/Main/BoringButPractical"><span data-dcnode-id="4294" instrument_node="">Boring, but Practical</span></a><span data-dcnode-id="4292" instrument_node="">:</span><ul data-dcnode-id="4243"><li data-dcnode-id="4287"><span data-dcnode-id="4291" instrument_node=""> Most basic weaponry you start the game with have a decent enough moveset you can use all the way to the end of the game, and you can upgrade or customize them to your liking. Special weapons have fancier effects and skills but are usually locked behind bosses and dungeons and/or have stat requirements which need a few levels to unlock. The longsword is the epitome of this trope among starter equipment as it has </span><a class="twikilink" data-dcnode-id="4289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JackOfAllStats" title="/pmwiki/pmwiki.php/Main/JackOfAllStats"><span data-dcnode-id="4290" instrument_node="">a good balance of attack speed, range, and damage, on top of a useful guard-breaking default skill</span></a><span data-dcnode-id="4288" instrument_node="">.</span></li><li data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node=""> The Beast Crest Heater Shield can be obtained off a chest in a camp in east Limgrave, and its 100% physical damage prevention, low weight and low Strength requirements makes for a solid choice for defense for players who don't already start with a medium shield in tow. The Brass Shield has a similar distinction as it can be obtained off any of the numerous soldiers found in the game and has the best Guard Boost (meaning less stamina consumed for blocking) among medium shields, but its higher Strength requirement and high weight make it awkward to use until the player's had sufficient Strength and Endurance investment.</span></li><li data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node=""> The Spirit Jellyfish summon, which can be obtained before facing Margit. It's incredibly slow, can be easily interrupted, and its only attack is a weak projectile that builds up poison. But it has an obscenely large health pool and is dirt cheap to summon at 31 FP, making it a common go-to for many players as a meat shield in boss encounters to take aggro and soak up hits. Also in the event it successfully poisons a boss, you now have the option to just run and dodge letting the poison do all the work and not have to worry about dying for that infamous "One more hit" which has killed so many a player.</span></li><li data-dcnode-id="4281"><span data-dcnode-id="4282" instrument_node=""> The "No Skill" Ash of War omits any skill to an off-hand shield or torch. This means that your skill button will use your main hand's weapon skill while you still can defend yourself with your shield or maintain the light radius of your torch.</span></li><li data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node=""> The Green Turtle Talisman imparts increased stamina regeneration. It's not as fancy as increased damage or increased defense, but when you're wielding heavy weaponry that drain high stamina per swing, or are chasing down elusive bosses in giant arenas, it gives you the breathing room to get more attacks in when it counts.</span></li><li data-dcnode-id="4271"><span data-dcnode-id="4278" instrument_node=""> Glintstone Pebble, and its quicker, cheaper variant, Swift Glintstone Shard. While there are </span><em data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">heaps</span></em><span data-dcnode-id="4275" instrument_node=""> of sorcery spells in this game which are flashy and incredibly powerful, these spells, which simply toss a small magic projectile with each use, are very useful even towards the endgame and can make jokes out of many of the early game bosses and enemies. Better still, the Astrologer class </span><em data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">starts</span></em><span data-dcnode-id="4272" instrument_node=""> with the Glintstone Pebble sorcery, giving them a lofty advantage from the get-go.</span></li><li data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node=""> Another spell the Astrologer begins with, the Glintstone Arc, is even more practical than the Glintstone Pebble. The latter can be replaced with multiple other spells later on when you have more FP to spend such as the Greater Glintstone Pebble, Glintstone Icecrag, Rock Sling, etc, but the Glintstone Arc remains worth having on your spell list even in the late game as it shoots out a wide slash of magic which penetrates through enemies and travels a rather large distance, growing wider as it travels. Thus, it can be used on crowds of enemies to put out a lot of damage to a crowd of enemies for a rather cheap cost compared to other AoE spells.</span></li><li data-dcnode-id="4264"><span data-dcnode-id="4268" instrument_node=""> Lightning Spear can be acquired early without too much trouble if you know where to go, has a modest faith cost, cheap enough on FP to use regularly, quick to cast even when charged, functional range, and reasonable damage which will only get better as a faith build comes together. It will </span><em data-dcnode-id="4266"><span data-dcnode-id="4267" instrument_node="">also</span></em><span data-dcnode-id="4265" instrument_node=""> be the bread and butter of characters favoring lightning incantations, because even if there are fancier lighting incantations Lightning Spear's reliability means it is rarely a bad incantation to use.</span></li><li data-dcnode-id="4256"><span data-dcnode-id="4263" instrument_node=""> Rock Sling is </span><a class="twikilink" data-dcnode-id="4261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="4262" instrument_node="">Exactly What It Says on the Tin</span></a><span data-dcnode-id="4260" instrument_node="">. You throw rocks at your opponents with magic. However, it is a very valuable spell for the entire game. For starters, it's rather strong, especially considering how cheap it is to cast. Due to being blunt damage, it has high stagger, allowing you to stun bosses with relative ease for ripostes. It's delayed launch after casting means it confuses enemy AI (as enemies who can dodge when you cast spells do so during the initial cast. For most spells, this means the actual spell will go sailing to their side, but due to Rock Sling's delay, it'll fly straight at them and they won't do a thing). It has heavy tracking </span><em data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">and</span></em><span data-dcnode-id="4257" instrument_node=""> range compared to most spells. And due to how it casts, it can be used to attack at angles which would otherwise be hard to impossible to do (such as an enemy on a platform directly below you). About the only real flaws it has are it can be awkward to use in tight areas (rocks hitting walls and breaking as such), and it locks you in place for a moment during casting, but neither issue is a deal breaker, especially considering all the pros the spell has. On top of this, one of the best early-game staffs, the Meteorite Staff, boosts the power of gravity sorceries which Rock Sling is.</span></li><li data-dcnode-id="4254"><span data-dcnode-id="4255" instrument_node=""> Barricade Shield, which is dropped by a Night's Cavalry enemy in the Weeping Peninsula south of the starting area (or the default skill of the Great Turtle Shell in the same area). When used it buffs the Guard Boost of your shield substantially, making it so enemy attacks deplete far less stamina when they connect with your shield, and makes it more likely the boss attacks will bounce off the shield. Not only does this make you far safer from dangerous boss combos, it also opens up the window to do Guard Counters more frequently and break enemies' posture for critical hits. It also has a very low FP cost meaning it doesn't require any Mind investment to get multiple casts out of it, and it has a very quick animation which itself counts as a block, meaning unlike many other weapon arts and spells, casting it is very safe.</span></li><li data-dcnode-id="4249"><span data-dcnode-id="4253" instrument_node=""> The Miséricorde is a dagger that can be found in the first legacy dungeon. While it's a dagger, it also has an </span><em data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">enormous</span></em><span data-dcnode-id="4250" instrument_node=""> crit multiplier of 140—enough to outdamage practically any other weapon upgraded to the same level. Its potential becomes greater once it's equipped with Flame of the Redmanes, which deals high posture damage. With both, you have a weapon that can break posture quick and deal high critical hits all on its own.</span></li><li data-dcnode-id="4244"><span data-dcnode-id="4248" instrument_node=""> Godrick's Great Rune has the most basic effect of all the Great Runes: +5 to all attributes. Getting that kind of bonus compared to the other Great Runes isn't flashy, but the player basically gets the equivalent of 40 free levels as long as they don't die, which when combined with how easy getting it is compared to the others, makes it overall one of the best Great Rune effects, especially when you consider how you can combine Talismans to boost things like your stats or HP. Its only downside is at very high levels (which will take a long time to achieve) the benefits drop off due to </span><a class="twikilink" data-dcnode-id="4246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiminishingReturnsForBalance" title="/pmwiki/pmwiki.php/Main/DiminishingReturnsForBalance"><span data-dcnode-id="4247" instrument_node="">Diminishing Returns for Balance</span></a><span data-dcnode-id="4245" instrument_node=""> on stats, but by that point you'd have found other Great Runes to give better bonuses.</span></li></ul></li><li data-dcnode-id="4237"><span data-dcnode-id="4241" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossInMookClothing" title="/pmwiki/pmwiki.php/Main/BossInMookClothing"><span data-dcnode-id="4240" instrument_node="">Boss in Mook Clothing</span></a><span data-dcnode-id="4238" instrument_node="">: Almost literally as, while very rare, there are certain low level Mobs who, when killed, turn into a much much harder foe, such as Runebears, Wormface, or in one case Margit. A good indicator to watch out for is if they are a low level mob usually seen in groups who is just standing around all by itself.</span></li><li data-dcnode-id="4230"><span data-dcnode-id="4236" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossOnlyLevel" title="/pmwiki/pmwiki.php/Main/BossOnlyLevel"><span data-dcnode-id="4235" instrument_node="">Boss-Only Level</span></a><span data-dcnode-id="4233" instrument_node="">: If you just follow the obvious path forward at least, </span><span class="spoiler" data-dcnode-id="4231" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4232" instrument_node="">the Ashen Capital of Leyndell is just a series of bosses. First Gideon in the area you fought Godfrey's phantom, then Godfrey in the flesh where you fought Morgott, and then finally the sequential fights of Radagon followed by the Elden Beast.</span></span></li><li data-dcnode-id="4198"><span data-dcnode-id="4229" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakingOldTrends" title="/pmwiki/pmwiki.php/Main/BreakingOldTrends"><span data-dcnode-id="4228" instrument_node="">Breaking Old Trends</span></a><span data-dcnode-id="4226" instrument_node="">:</span><ul data-dcnode-id="4199"><li data-dcnode-id="4202"><span data-dcnode-id="4225" instrument_node=""> Some of </span><em data-dcnode-id="4222"><a class="twikilink" data-dcnode-id="4223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/FromSoftware" title="/pmwiki/pmwiki.php/Creator/FromSoftware"><span data-dcnode-id="4224" instrument_node="">FromSoftware</span></a></em><span data-dcnode-id="4221" instrument_node="">'s games like the </span><em data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Dark Souls</span></em><span data-dcnode-id="4218" instrument_node=""> trilogy usually end on a </span><a class="twikilink" data-dcnode-id="4216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="4217" instrument_node="">pyrrhic cost</span></a><span data-dcnode-id="4215" instrument_node="">, </span><a class="twikilink" data-dcnode-id="4213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbiguousSituation" title="/pmwiki/pmwiki.php/Main/AmbiguousSituation"><span data-dcnode-id="4214" instrument_node="">a situation too ambiguous to properly judge</span></a><span data-dcnode-id="4212" instrument_node="">, or </span><a class="twikilink" data-dcnode-id="4210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerEnding" title="/pmwiki/pmwiki.php/Main/DownerEnding"><span data-dcnode-id="4211" instrument_node="">straight up terrible note</span></a><span data-dcnode-id="4209" instrument_node="">. </span><em data-dcnode-id="4207"><span data-dcnode-id="4208" instrument_node="">Elden Ring</span></em><span data-dcnode-id="4206" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4204" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4205" instrument_node="">features a number of endings where the Tarnished brought catastrophic damage to the Lands Between, but the other endings appear to conclude things on a bright note to greater or lesser degrees</span></span><span data-dcnode-id="4203" instrument_node="">.</span></li><li data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node=""> Gameplay-wise, it's instinctive to some players to roll through the trademarked Fromsoftware's poison swamps to go faster, but doing it here will cover you with poison, creating a lingering buildup of its effects (which can be removed by literally cleaning yourself with soap). This is more of a concern for situations where you cannot use Torrent to ride over them.</span></li></ul></li><li data-dcnode-id="4184"><span data-dcnode-id="4197" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrutalBonusLevel" title="/pmwiki/pmwiki.php/Main/BrutalBonusLevel"><span data-dcnode-id="4196" instrument_node="">Brutal Bonus Level</span></a><span data-dcnode-id="4194" instrument_node="">: Some of the levels in </span><em data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">Elden Ring</span></em><span data-dcnode-id="4191" instrument_node=""> are completely optional and often hidden, requiring the player to complete some sort of quest or acquire a special item in order to reach them. For instance, there is the </span><span class="spoiler" data-dcnode-id="4189" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4190" instrument_node="">Lake of Rot, a very large lake of scarlet rot even more toxic than Caelid,</span></span><span data-dcnode-id="4188" instrument_node=""> or </span><span class="spoiler" data-dcnode-id="4186" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4187" instrument_node="">Elphael, Brace of the Haligtree, a hidden fortress at the base of the Haligtree full of lordsworn soldiers and powerful creatures at the service of Miquella</span></span><span data-dcnode-id="4185" instrument_node="">.</span></li><li data-dcnode-id="4179"><span data-dcnode-id="4183" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BubblegloopSwamp" title="/pmwiki/pmwiki.php/Main/BubblegloopSwamp"><span data-dcnode-id="4182" instrument_node="">Bubblegloop Swamp</span></a><span data-dcnode-id="4180" instrument_node="">: The swamp of Aeonia in the middle of Caelid is a large swampy area infected with the scarlet rot. Is it hard to traverse due to the tough enemies roaming there, the rotting water slowing you and inflicting you with the rot status effect, and there even are large bubbles of gas popping in the middle of the water.</span></li><li data-dcnode-id="4174"><span data-dcnode-id="4178" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BubbleGun" title="/pmwiki/pmwiki.php/Main/BubbleGun"><span data-dcnode-id="4177" instrument_node="">Bubble Gun</span></a><span data-dcnode-id="4175" instrument_node="">: The Envoy's Horn series of weapons can shoot bubbles which deal damage.</span></li><li data-dcnode-id="4157"><span data-dcnode-id="4173" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallAHitPointASmeerp" title="/pmwiki/pmwiki.php/Main/CallAHitPointASmeerp"><span data-dcnode-id="4172" instrument_node="">Call a Hit Point a "Smeerp"</span></a><span data-dcnode-id="4170" instrument_node=""> : In keeping with the </span><em data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">Souls</span></em><span data-dcnode-id="4167" instrument_node=""> games and </span><em data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">Bloodborne</span></em><span data-dcnode-id="4164" instrument_node="">, outside of health and stats, everything in this game has a different name than most other games; more than a few are even different than previous games by From Software. Instead of Magic/Mana Points you have Focus Points, the hybrid momentary experience are called Runes, Incantations replace Miracles and Pyromancy of the Souls games, encompassing both holy and dark variants of the same magic as well, even the check points with the </span><em data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node="">Stakes of Marika</span></em><span data-dcnode-id="4161" instrument_node=""> complimenting the </span><em data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">Sites of Grace</span></em><span data-dcnode-id="4158" instrument_node="">, and many more small or larger differences. All of which tie into the game's lore and narrative in various ways.</span></li><li data-dcnode-id="4152"><span data-dcnode-id="4156" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CastFromSanity" title="/pmwiki/pmwiki.php/Main/CastFromSanity"><span data-dcnode-id="4155" instrument_node="">Cast from Sanity</span></a><span data-dcnode-id="4153" instrument_node="">: Madness-inducing incantations carry a drawback of also causing a bit of Madness buildup on its user. If you overuse them, you too will be inflicted with Madness, and it can even interrupt your casting animation.</span></li><li data-dcnode-id="4046"><span data-dcnode-id="4151" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CentralTheme" title="/pmwiki/pmwiki.php/Main/CentralTheme"><span data-dcnode-id="4150" instrument_node="">Central Theme</span></a><span data-dcnode-id="4148" instrument_node="">:</span><ul data-dcnode-id="4047"><li data-dcnode-id="4089"><span data-dcnode-id="4147" instrument_node=""> </span><strong data-dcnode-id="4144"><a class="twikilink" data-dcnode-id="4145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TwoAliasesOneCharacter" title="/pmwiki/pmwiki.php/Main/TwoAliasesOneCharacter"><span data-dcnode-id="4146" instrument_node="">Falsehood.</span></a></strong><span data-dcnode-id="4143" instrument_node=""> </span><em data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">Everybody and their grandmothers</span></em><span data-dcnode-id="4140" instrument_node=""> seem to have multiple identities the Tarnished has to uncover, not to mention </span><a class="twikilink" data-dcnode-id="4138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GambitPileup" title="/pmwiki/pmwiki.php/Main/GambitPileup"><span data-dcnode-id="4139" instrument_node="">their hidden agendas behind hidden agendas.</span></a><span data-dcnode-id="4137" instrument_node=""> To name a few:</span><ul data-dcnode-id="4090"><li data-dcnode-id="4121"><span data-dcnode-id="4136" instrument_node=""> From the opening cinematic: Hoarah Loux, Chieftain of the Badlands </span><span class="spoiler" data-dcnode-id="4134" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4135" instrument_node="">a.k.a Godfrey, the First Elden Lord</span></span><span data-dcnode-id="4133" instrument_node="">; Sir Gideon Ofnir, the All-Knowing </span><span class="spoiler" data-dcnode-id="4131" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4132" instrument_node="">a.k.a. "The All-Hearing Brute", the one who massacres the Albinauric Village...</span></span><span data-dcnode-id="4130" instrument_node=""> and finally, </span><span class="spoiler" data-dcnode-id="4122" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4129" instrument_node="">the </span><a class="twikilink" data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamLine" title="/pmwiki/pmwiki.php/Main/WhamLine"><span data-dcnode-id="4128" instrument_node="">Wham Line</span></a><span data-dcnode-id="4126" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="4124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReveal" title="/pmwiki/pmwiki.php/Main/TheReveal"><span data-dcnode-id="4125" instrument_node="">ultimate reveal</span></a><span data-dcnode-id="4123" instrument_node="">: Queen Marika the Eternal a.k.a. Radagon of the Golden Order, her second husband.</span></span></li><li data-dcnode-id="4116"><span data-dcnode-id="4120" instrument_node=""> Renna, the Snow Witch a.k.a. Lunar Princess Ranni, </span><span class="spoiler" data-dcnode-id="4118" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4119" instrument_node="">her student</span></span><span data-dcnode-id="4117" instrument_node="">.</span></li><li data-dcnode-id="4109"><span data-dcnode-id="4115" instrument_node=""> Margit, the Fell Omen </span><span class="spoiler" data-dcnode-id="4113" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4114" instrument_node="">a.k.a. Morgott, the Omen King</span></span><span data-dcnode-id="4112" instrument_node="">. Similarly, Mohg, the Omen </span><span class="spoiler" data-dcnode-id="4110" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4111" instrument_node="">a.k.a. Mohg, Lord of Blood.</span></span></li><li data-dcnode-id="4105"><span data-dcnode-id="4108" instrument_node=""> Gurranq, the Beast Clergyman </span><span class="spoiler" data-dcnode-id="4106" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4107" instrument_node="">a.k.a. Maliketh, the Black Blade, Queen Marika's half-brother and guardian of the Rune of Death.</span></span></li><li data-dcnode-id="4099"><span data-dcnode-id="4104" instrument_node=""> Preceptor Seluvis </span><span class="spoiler" data-dcnode-id="4100" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4103" instrument_node="">a.k.a. Pidia the Carian Servant, as the one who truly controls </span><a class="twikilink" data-dcnode-id="4101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndIMustScream" title="/pmwiki/pmwiki.php/Main/AndIMustScream"><span data-dcnode-id="4102" instrument_node="">the already-dead Seluvis's body as a puppet.</span></a></span></li><li data-dcnode-id="4095"><span data-dcnode-id="4098" instrument_node=""> Sorceress Sellen </span><span class="spoiler" data-dcnode-id="4096" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4097" instrument_node="">a.k.a. Sellen the Graven Witch, Raya Lucaria's outcast.</span></span></li><li data-dcnode-id="4091"><span data-dcnode-id="4094" instrument_node=""> Rya the Scout </span><span class="spoiler" data-dcnode-id="4092" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4093" instrument_node="">a.k.a. Zorayas the Half-Serpent.</span></span></li></ul></li><li data-dcnode-id="4048"><span data-dcnode-id="4088" instrument_node=""> </span><strong data-dcnode-id="4085"><a class="twikilink" data-dcnode-id="4086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheChainsOfCommanding" title="/pmwiki/pmwiki.php/Main/TheChainsOfCommanding"><span data-dcnode-id="4087" instrument_node="">The Chains of Commanding</span></a></strong><span data-dcnode-id="4084" instrument_node="">, and how expectations and duty can make or break anyone, even a god.</span><ul data-dcnode-id="4049"><li data-dcnode-id="4077"><span data-dcnode-id="4083" instrument_node=""> All of Marika's children were great soldiers, sorcerers, or politicians in their own ways, and much was expected of most of them (</span><span class="spoiler" data-dcnode-id="4079" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4082" instrument_node="">barring those who got </span><a class="twikilink" data-dcnode-id="4080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Unperson" title="/pmwiki/pmwiki.php/Main/Unperson"><span data-dcnode-id="4081" instrument_node="">Unpersoned</span></a></span><span data-dcnode-id="4078" instrument_node="">). Once the Elden Ring was shattered each of them tried to to claim their throne through various methods and for different reasons, leading the Lands Between to suffer from the wars they all waged against each other over political or ideological differences they couldn't reconcile.</span></li><li data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node=""> Several of the demigods as well as their supporters also tried to completely shirk the duties they had been given and the roles in Marika's empire they were expected to play, and are treated as opportunistic schemers at best or outright monsters at worst for refusing to play the hand they were dealt and live up to their duties and expectations.</span></li><li data-dcnode-id="4065"><span data-dcnode-id="4074" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4072" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4073" instrument_node="">Morgott, the Omen King</span></span><span data-dcnode-id="4071" instrument_node=""> was the only of Marika's children who tried to hold her empire together as she had decreed it be ruled, and though Leyndell is easily the most put together of the major settlements in the Lands Between it is still stagnating due to its ruler's staunch refusal to even entertain another method of fixing things. </span><span class="spoiler" data-dcnode-id="4069" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4070" instrument_node="">Morgott</span></span><span data-dcnode-id="4068" instrument_node=""> is utterly bound by duty, even to the ends of the world, and refuses to compromise even to </span><span class="spoiler" data-dcnode-id="4066" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4067" instrument_node="">his death at the Tarnished's hands.</span></span></li><li data-dcnode-id="4061"><span data-dcnode-id="4064" instrument_node=""> Several of the Tarnished in the Roundtable Hold feel bound to a higher calling and duty, which typically doesn't go particularly well for them when resolving their quest lines. </span><span class="spoiler" data-dcnode-id="4062" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4063" instrument_node="">The only ones who get anything resembling a happy ending to their quests (Roderika and Nepheli Loux) do so by finding a new purpose to dedicate themselves to rather than the one expected of them, and just about every other Tarnished of the Hold goes mad, dies, or tries to kill you and has to be put down by trying to fulfill their chosen duty, even if it can't be fulfilled or if they know doing so would kill them. Even Gideon Ofnir, the most dedicated to becoming Elden Lord, goes mad and tries to kill you when he finds Marika might not have intended for there to be another Elden Lord.</span></span></li><li data-dcnode-id="4054"><span data-dcnode-id="4060" instrument_node=""> Queen Marika herself, </span><span class="spoiler" data-dcnode-id="4055" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4059" instrument_node="">is revealed to have chosen to subvert the duty and expectations which were given to her by the Two Fingers and the Greater Will by Shattering the Elden Ring. While her motivations are not explored deeply in the game itself, the mere act and the mess which came following show the worst consequences when the leader — the </span><a class="twikilink" data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodEmperor" title="/pmwiki/pmwiki.php/Main/GodEmperor"><span data-dcnode-id="4058" instrument_node="">God-Emperor</span></a><span data-dcnode-id="4056" instrument_node=""> of the land in this case — chose to abandon their duty in favor of their own goals.</span></span></li><li data-dcnode-id="4050"><span data-dcnode-id="4053" instrument_node=""> Ultimately, even if the player becomes Elden Lord, </span><span class="spoiler" data-dcnode-id="4051" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4052" instrument_node="">doing so requires going against the Greater Will by burning a path through the Erdtree. Even when you are doing what is expected of the Tarnished you are still refusing to succumb to expectation and the accepted way of things, which is what can ultimately save or destroy the world based solely on your dedication and perseverance.</span></span></li></ul></li></ul></li><li data-dcnode-id="4041"><span data-dcnode-id="4045" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChainsawGripBFG" title="/pmwiki/pmwiki.php/Main/ChainsawGripBFG"><span data-dcnode-id="4044" instrument_node="">Chainsaw Grip BFG</span></a><span data-dcnode-id="4042" instrument_node="">: The Jar Cannon is one of the rare medieval fantasy examples of this trope.</span></li><li data-dcnode-id="4034"><span data-dcnode-id="4040" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChekhovsGun" title="/pmwiki/pmwiki.php/Main/ChekhovsGun"><span data-dcnode-id="4039" instrument_node="">Chekhov's Gun</span></a><span data-dcnode-id="4037" instrument_node="">: If you stumble into a transporter trap in the Tower of Return, you'll get to a "Divine Bridge" Site of Grace in the Leyndell way before you're expected to be there, and with no other visible way out. If you slip by or defeat the giant golem up there you'll find a waygate which can transport you to an isolated divine tower you can't enter (but gives you the brief respite to quick-travel back to where you were). </span><span class="spoiler" data-dcnode-id="4035" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4036" instrument_node="">This divine tower becomes significant far later in the game, where it's the place to activate Malenia's Great Rune.</span></span></li><li data-dcnode-id="4029"><span data-dcnode-id="4033" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CombatPragmatist" title="/pmwiki/pmwiki.php/Main/CombatPragmatist"><span data-dcnode-id="4032" instrument_node="">Combat Pragmatist</span></a><span data-dcnode-id="4030" instrument_node="">: More encouraged than in previous FromSoftware titles. Stealth and sneak attacks are entirely viable, the Tarnished can summon allies directly to assist them, and they can use Torrent to hit and run with impunity. Numerous nasty methods exist to defeat foes, including using sleeping poisons to render them helpless, and more than a few bosses can be hit with surprise attacks or special items to stun them. Whatever the method to win is entirely valid.</span></li><li data-dcnode-id="4024"><span data-dcnode-id="4028" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ConvectionSchmonvection" title="/pmwiki/pmwiki.php/Main/ConvectionSchmonvection"><span data-dcnode-id="4027" instrument_node="">Convection Schmonvection</span></a><span data-dcnode-id="4025" instrument_node="">: The entire Gelmir Volcano lives this trope. Standing near lava does nothing to you, and walking or rolling directly on it does damage, but very slowly and less than normal fire. This could be explained by lava working differently in universe, considering an entire town was built on top of it.</span></li><li data-dcnode-id="4011"><span data-dcnode-id="4023" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoolButInefficient" title="/pmwiki/pmwiki.php/Main/CoolButInefficient"><span data-dcnode-id="4022" instrument_node="">Cool, but Inefficient</span></a><span data-dcnode-id="4020" instrument_node="">:</span><ul data-dcnode-id="4012"><li data-dcnode-id="4015"><span data-dcnode-id="4019" instrument_node=""> The benefits of a Light equip load as opposed to Medium (slightly longer roll distance and faster backsteps) are too small to notice during regular gameplay. Unless you're trying to optimize for a build based off </span><a class="twikilink" data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShedArmorGainSpeed" title="/pmwiki/pmwiki.php/Main/ShedArmorGainSpeed"><span data-dcnode-id="4018" instrument_node="">Shed Armor, Gain Speed</span></a><span data-dcnode-id="4016" instrument_node="">, it's better to maintain Medium load and enjoy the benefits of armor as opposed to trying to fit in the 30% weight limit threshold for Light load.</span></li><li data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node=""> A Quality enhancement makes a weapon scale equally between Strength and Dexterity at a large cost to its base damage. That means if you want to optimize it you have to push both Strength and Dexterity at once, which demands twice as many stat points compared to sticking to Heavy (for Strength) or Keen (for Dexterity). Heavy and Keen also have a smaller base damage penalty than Quality.</span></li></ul></li><li data-dcnode-id="4003"><span data-dcnode-id="4010" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoolHorse" title="/pmwiki/pmwiki.php/Main/CoolHorse"><span data-dcnode-id="4009" instrument_node="">Cool Horse</span></a><span data-dcnode-id="4007" instrument_node="">: Torrent, a horned "spirit-steed" who has chosen the Tarnished. It can teleport in and out when summoned and dismissed, can be used in combat, can </span><a class="twikilink" data-dcnode-id="4005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoubleJump" title="/pmwiki/pmwiki.php/Main/DoubleJump"><span data-dcnode-id="4006" instrument_node="">Double Jump</span></a><span data-dcnode-id="4004" instrument_node="">, and can jump extremely high with the apparent aid of upward wind currents.</span></li><li data-dcnode-id="3995"><span data-dcnode-id="4002" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColourMotif" title="/pmwiki/pmwiki.php/Main/ColourMotif"><span data-dcnode-id="4001" instrument_node="">Colour Motif</span></a><span data-dcnode-id="3999" instrument_node="">: </span><a class="twikilink" data-dcnode-id="3997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldColouredSuperiority" title="/pmwiki/pmwiki.php/Main/GoldColouredSuperiority"><span data-dcnode-id="3998" instrument_node="">Gold</span></a><span data-dcnode-id="3996" instrument_node="">. The Elden Ring and the Erdtree's magic is all colored golden, the family of demigods who once ruled over the lands between were known as the Golden Order. Even the Graces are notably fonts of golden light which give players visual hints of their presence in an area by drawing in golden light from around them.</span></li><li data-dcnode-id="3990"><span data-dcnode-id="3994" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorridorCubbyholeRun" title="/pmwiki/pmwiki.php/Main/CorridorCubbyholeRun"><span data-dcnode-id="3993" instrument_node="">Corridor Cubbyhole Run</span></a><span data-dcnode-id="3991" instrument_node="">: The Hero's Grave dungeons require the player to avoid giant stone chariots riding back and forth along a slope by ducking into safe spots. Some of these safe spots aren't very safe either with enemies in them.</span></li><li data-dcnode-id="3957"><span data-dcnode-id="3989" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCorruption" title="/pmwiki/pmwiki.php/Main/TheCorruption"><span data-dcnode-id="3988" instrument_node="">The Corruption</span></a><span data-dcnode-id="3986" instrument_node="">:</span><ul data-dcnode-id="3958"><li data-dcnode-id="3973"><span data-dcnode-id="3985" instrument_node=""> The Frenzied Flame is considered this, which should probably have been a given since its other name is "Flame of Chaos". Although the flame can be used by anyone with sufficient skill, it can potentially drive the user insane, and in more extreme cases, cause fire to burst from their very sockets. And it doesn't just have to be humans, ether; going to the Ailing Vil
