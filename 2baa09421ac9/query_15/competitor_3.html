</span><p data-dcnode-id="5298"></p><div class="quoteright" data-dcnode-id="5295" style="width:350px;"><div class="lazy_load_img_box" data-dcnode-id="5296" style="padding-top:125.43%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/fdadc3a24ebe6227423924e2c86ba174.jpg" border="0" class="embeddedimage" data-dcnode-id="5297" height="439" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/fdadc3a24ebe6227423924e2c86ba174.jpg&amp;raw" width="350"></div></div><div class="acaptionright" data-dcnode-id="5292" style="width:350px;"><a class="twikilink" data-dcnode-id="5293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TagLine" title="/pmwiki/pmwiki.php/Main/TagLine"><span data-dcnode-id="5294" instrument_node="">Rise, Tarnished.</span></a></div><p data-dcnode-id="5291"></p><div class="indent" data-dcnode-id="5288"><em data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">"The fallen leaves tell a story..."</span></em></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="5282"><span class="ad-caption" data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">Advertisement:</span></span><div data-dcnode-id="5283" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="5227"><em data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">Elden Ring</span></em><span data-dcnode-id="5279" instrument_node=""> is a </span><a class="twikilink" data-dcnode-id="5277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WideOpenSandbox" title="/pmwiki/pmwiki.php/Main/WideOpenSandbox"><span data-dcnode-id="5278" instrument_node="">Wide-Open Sandbox</span></a><span data-dcnode-id="5276" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActionRPG" title="/pmwiki/pmwiki.php/Main/ActionRPG"><span data-dcnode-id="5275" instrument_node="">Action RPG</span></a><span data-dcnode-id="5273" instrument_node=""> developed by </span><a class="twikilink" data-dcnode-id="5271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/FromSoftware" title="/pmwiki/pmwiki.php/Creator/FromSoftware"><span data-dcnode-id="5272" instrument_node="">FromSoftware</span></a><span data-dcnode-id="5270" instrument_node=""> and published by </span><a class="twikilink" data-dcnode-id="5268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/BandaiNamcoEntertainment" title="/pmwiki/pmwiki.php/Creator/BandaiNamcoEntertainment"><span data-dcnode-id="5269" instrument_node="">Bandai Namco Entertainment</span></a><span data-dcnode-id="5267" instrument_node="">. The game is directed by </span><a class="twikilink" data-dcnode-id="5265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/HidetakaMiyazaki" title="/pmwiki/pmwiki.php/Creator/HidetakaMiyazaki"><span data-dcnode-id="5266" instrument_node="">Hidetaka Miyazaki</span></a><span data-dcnode-id="5264" instrument_node="">, of </span><em data-dcnode-id="5261"><a class="twikilink" data-dcnode-id="5262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DemonsSouls" title="/pmwiki/pmwiki.php/VideoGame/DemonsSouls"><span data-dcnode-id="5263" instrument_node="">Demon's Souls</span></a></em><span data-dcnode-id="5260" instrument_node=""> and </span><em data-dcnode-id="5257"><a class="twikilink" data-dcnode-id="5258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSouls" title="/pmwiki/pmwiki.php/VideoGame/DarkSouls"><span data-dcnode-id="5259" instrument_node="">Dark Souls</span></a></em><span data-dcnode-id="5256" instrument_node=""> fame, who has described </span><em data-dcnode-id="5254"><span data-dcnode-id="5255" instrument_node="">Elden Ring</span></em><span data-dcnode-id="5253" instrument_node=""> as a </span><a class="twikilink" data-dcnode-id="5251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpiritualSuccessor" title="/pmwiki/pmwiki.php/Main/SpiritualSuccessor"><span data-dcnode-id="5252" instrument_node="">Spiritual Successor</span></a><span data-dcnode-id="5250" instrument_node=""> to the latter trilogy. Famous fantasy writer, </span><a class="twikilink" data-dcnode-id="5248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/GeorgeRRMartin" title="/pmwiki/pmwiki.php/Creator/GeorgeRRMartin"><span data-dcnode-id="5249" instrument_node="">George R. R. Martin</span></a><span data-dcnode-id="5247" instrument_node="">, of </span><em data-dcnode-id="5244"><a class="twikilink" data-dcnode-id="5245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ASongOfIceAndFire" title="/pmwiki/pmwiki.php/Literature/ASongOfIceAndFire"><span data-dcnode-id="5246" instrument_node="">A Song of Ice and Fire</span></a></em><span data-dcnode-id="5243" instrument_node=""> fame, has also contributed to the game's mythos and </span><a class="twikilink" data-dcnode-id="5241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Worldbuilding" title="/pmwiki/pmwiki.php/Main/Worldbuilding"><span data-dcnode-id="5242" instrument_node="">Worldbuilding</span></a><span data-dcnode-id="5240" instrument_node="">. It was released February 25th (It was originally announced for January of the same year, but was delayed by a month), 2022 on the </span><a class="twikilink" data-dcnode-id="5238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/PlayStation5" title="/pmwiki/pmwiki.php/UsefulNotes/PlayStation5"><span data-dcnode-id="5239" instrument_node="">PlayStation 5</span></a><span data-dcnode-id="5237" instrument_node="">, </span><a class="twikilink" data-dcnode-id="5235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/PlayStation4" title="/pmwiki/pmwiki.php/UsefulNotes/PlayStation4"><span data-dcnode-id="5236" instrument_node="">PlayStation 4</span></a><span data-dcnode-id="5234" instrument_node="">, </span><a class="twikilink" data-dcnode-id="5232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/XboxOne" title="/pmwiki/pmwiki.php/UsefulNotes/XboxOne"><span data-dcnode-id="5233" instrument_node="">Xbox One</span></a><span data-dcnode-id="5231" instrument_node="">, </span><a class="twikilink" data-dcnode-id="5229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/XboxSeriesXAndS" title="/pmwiki/pmwiki.php/UsefulNotes/XboxSeriesXAndS"><span data-dcnode-id="5230" instrument_node="">Xbox Series X|S</span></a><span data-dcnode-id="5228" instrument_node="">, and PC; and had a Closed Network Test taking place in November 2021.</span></p><p data-dcnode-id="5213"><span data-dcnode-id="5226" instrument_node="">In a realm known as the Lands Between, </span><a class="twikilink" data-dcnode-id="5224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodEmperor" title="/pmwiki/pmwiki.php/Main/GodEmperor"><span data-dcnode-id="5225" instrument_node="">Queen Marika the Eternal</span></a><span data-dcnode-id="5223" instrument_node=""> rules a massive Empire with the power of a mystical rune known as the </span><a class="twikilink" data-dcnode-id="5221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RingofPower" title="/pmwiki/pmwiki.php/Main/RingofPower"><span data-dcnode-id="5222" instrument_node="">Elden Ring</span></a><span data-dcnode-id="5220" instrument_node="">, source of the </span><a class="twikilink" data-dcnode-id="5218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldTree" title="/pmwiki/pmwiki.php/Main/WorldTree"><span data-dcnode-id="5219" instrument_node="">Erdtree</span></a><span data-dcnode-id="5217" instrument_node="">. Alongside her, her demigod descendants reign as Generals and Lords with an iron-fist. Or at least, they did, before Marika's favorite son Godwyn the Golden and many of his demigod kin were assassinated by a stolen fragment of the Rune of Death, the Elden Ring itself was </span><a class="twikilink" data-dcnode-id="5215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DismantledMacGuffin" title="/pmwiki/pmwiki.php/Main/DismantledMacGuffin"><span data-dcnode-id="5216" instrument_node="">shattered</span></a><span data-dcnode-id="5214" instrument_node="">, scattering its component Great Runes across the Lands Between, and Marika disappeared without a trace, leaving her throne vacant.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="5207"><span class="ad-caption" data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">Advertisement:</span></span><div data-dcnode-id="5208" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="5196"><span data-dcnode-id="5206" instrument_node="">To make matters worse, Marika's remaining demigod offspring and their minions eventually turned on each other, triggering a massive free-for-all </span><a class="twikilink" data-dcnode-id="5204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuccessionCrisis" title="/pmwiki/pmwiki.php/Main/SuccessionCrisis"><span data-dcnode-id="5205" instrument_node="">Succession Crisis</span></a><span data-dcnode-id="5203" instrument_node=""> for Marika's crown, where former brethren cut one another down and those who took the scattered Great Runes for themselves have slowly been corrupted mentally and spiritually by the Runes' uncontrolled powers. Now, all that remains of the once majestic Empire is a broken land beset by a bloody </span><a class="twikilink" data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForeverWar" title="/pmwiki/pmwiki.php/Main/ForeverWar"><span data-dcnode-id="5202" instrument_node="">Forever War</span></a><span data-dcnode-id="5200" instrument_node=""> that even </span><a class="twikilink" data-dcnode-id="5198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurGodsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurGodsAreDifferent"><span data-dcnode-id="5199" instrument_node="">the Greater Will</span></a><span data-dcnode-id="5197" instrument_node=""> has abandoned.</span></p><p data-dcnode-id="5176"><span data-dcnode-id="5195" instrument_node="">You are a Tarnished, one of </span><a class="twikilink" data-dcnode-id="5193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheUndead" title="/pmwiki/pmwiki.php/Main/TheUndead"><span data-dcnode-id="5194" instrument_node="">the dead who yet live</span></a><span data-dcnode-id="5192" instrument_node=""> from a line of </span><a class="twikilink" data-dcnode-id="5190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheExile" title="/pmwiki/pmwiki.php/Main/TheExile"><span data-dcnode-id="5191" instrument_node="">disgraced exiles</span></a><span data-dcnode-id="5189" instrument_node=""> banished from the Lands Between long ago, only to now be drawn back by </span><a class="twikilink" data-dcnode-id="5187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheChosenMany" title="/pmwiki/pmwiki.php/Main/TheChosenMany"><span data-dcnode-id="5188" instrument_node="">the call of long-lost grace</span></a><span data-dcnode-id="5186" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="5184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NominalHero" title="/pmwiki/pmwiki.php/Main/NominalHero"><span data-dcnode-id="5185" instrument_node="">the lure of the Runes' power</span></a><span data-dcnode-id="5183" instrument_node="">. With the guidance of grace behind you, it falls to you to confront the inhabitants of the Lands Between, </span><a class="twikilink" data-dcnode-id="5181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GottaCatchThemAll" title="/pmwiki/pmwiki.php/Main/GottaCatchThemAll"><span data-dcnode-id="5182" instrument_node="">acquire the Great Runes</span></a><span data-dcnode-id="5180" instrument_node="">, re-forge the Elden Ring... and with its power, </span><a class="twikilink" data-dcnode-id="5178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AwesomeMomentOfCrowning" title="/pmwiki/pmwiki.php/Main/AwesomeMomentOfCrowning"><span data-dcnode-id="5179" instrument_node="">become the new Elden Lord</span></a><span data-dcnode-id="5177" instrument_node="">.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="5170"><span class="ad-caption" data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">Advertisement:</span></span><div data-dcnode-id="5171" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="5142"><span data-dcnode-id="5169" instrument_node="">In terms of gameplay, </span><em data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">Elden Ring</span></em><span data-dcnode-id="5166" instrument_node=""> is a vast evolution of the Soulsborne formula, adding features such as mounted combat and transversal, </span><a class="twikilink" data-dcnode-id="5164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItemCrafting" title="/pmwiki/pmwiki.php/Main/ItemCrafting"><span data-dcnode-id="5165" instrument_node="">Item Crafting</span></a><span data-dcnode-id="5163" instrument_node="">, a dedicated summoning system, a vast open-world to explore and fight through (which now includes massive, dynamic "field bosses" to clash with in the open expanses), and a more overt, but still grounded and cryptic </span><a class="twikilink" data-dcnode-id="5161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkFantasy" title="/pmwiki/pmwiki.php/Main/DarkFantasy"><span data-dcnode-id="5162" instrument_node="">Dark Fantasy</span></a><span data-dcnode-id="5160" instrument_node=""> storyline penned with input by </span><a class="twikilink" data-dcnode-id="5158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/GeorgeRRMartin" title="/pmwiki/pmwiki.php/Creator/GeorgeRRMartin"><span data-dcnode-id="5159" instrument_node="">George R. R. Martin</span></a><span data-dcnode-id="5157" instrument_node="">. It also features many returning gameplay features from past FromSoftware games, though mostly with unique spins; some examples include a modified version of Weapon Arts (now called "Ashes of War") returning from </span><em data-dcnode-id="5154"><a class="twikilink" data-dcnode-id="5155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSoulsIII" title="/pmwiki/pmwiki.php/VideoGame/DarkSoulsIII"><span data-dcnode-id="5156" instrument_node="">Dark Souls III</span></a></em><span data-dcnode-id="5153" instrument_node=""> and the expansive vertical level design, platforming, and stealth mechanics of </span><em data-dcnode-id="5150"><a class="twikilink" data-dcnode-id="5151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SekiroShadowsDieTwice" title="/pmwiki/pmwiki.php/VideoGame/SekiroShadowsDieTwice"><span data-dcnode-id="5152" instrument_node="">Sekiro: Shadows Die Twice</span></a></em><span data-dcnode-id="5149" instrument_node="">, adapted to a more free-form open world. And as always, the brutal difficulty, dynamic bosses, and </span><a class="twikilink" data-dcnode-id="5147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PrepareToDie" title="/pmwiki/pmwiki.php/Main/PrepareToDie"><span data-dcnode-id="5148" instrument_node="">frequent deaths</span></a><span data-dcnode-id="5146" instrument_node=""> which defines the </span><a class="twikilink" data-dcnode-id="5144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoulsLikeRPG" title="/pmwiki/pmwiki.php/Main/SoulsLikeRPG"><span data-dcnode-id="5145" instrument_node="">Souls-like RPG</span></a><span data-dcnode-id="5143" instrument_node=""> continue to be in play here.</span></p><p data-dcnode-id="5121"><span data-dcnode-id="5141" instrument_node="">Trailers: </span><a class="urllink" data-dcnode-id="5138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3De5wwSxl0atc"><span data-dcnode-id="5140" instrument_node="">Announcement Trailer (June 2019),</span><img data-dcnode-id="5139" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5137" instrument_node=""> </span><a class="urllink" data-dcnode-id="5134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DQxyQvKHAgeo"><span data-dcnode-id="5136" instrument_node="">Gameplay Reveal Trailer (June 2021),</span><img data-dcnode-id="5135" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5133" instrument_node=""> </span><a class="urllink" data-dcnode-id="5130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DJldMvQMO_5U"><span data-dcnode-id="5132" instrument_node="">Gameplay Preview (November 2021),</span><img data-dcnode-id="5131" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5129" instrument_node=""> </span><a class="urllink" data-dcnode-id="5126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DD8YkCHkWRyk"><span data-dcnode-id="5128" instrument_node="">Story Trailer (December 2021),</span><img data-dcnode-id="5127" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5125" instrument_node=""> </span><a class="urllink" data-dcnode-id="5122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DOT8if6DXOFQ"><span data-dcnode-id="5124" instrument_node="">Overview Trailer (February 2022).</span><img data-dcnode-id="5123" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></p><hr data-dcnode-id="5120"><h2 data-dcnode-id="5118"><span data-dcnode-id="5119" instrument_node="">Rise, Troper.</span></h2><div class="folderlabel toggle-all-folders-button" data-dcnode-id="5116" onclick="toggleAllFolders();"><span data-dcnode-id="5117" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><div class="folderlabel" data-dcnode-id="5114" onclick="togglefolder('folder0');"><span data-dcnode-id="5115" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;A-E&nbsp;</span></div><div class="folder" data-dcnode-id="3495" id="folder0" isfolder="true" style="display:block;"><ul data-dcnode-id="3496"><li data-dcnode-id="5103"><span data-dcnode-id="5113" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsurdlyHighLevelCap" title="/pmwiki/pmwiki.php/Main/AbsurdlyHighLevelCap"><span data-dcnode-id="5112" instrument_node="">Absurdly High Level Cap</span></a><span data-dcnode-id="5110" instrument_node="">: The max possible level in this game is a whooping </span><strong data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">713</span></strong><span data-dcnode-id="5107" instrument_node=""> - upon reaching level 713, the player would have raised all attributes to 99, thus becoming unable to further level up. Trying to reach this level would be a torturous endeavour, because by the time the player hits level 320, each level-up would require </span><em data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">over 1,000,000 runes</span></em><span data-dcnode-id="5104" instrument_node="">. However, to beat the game, the average player only needs to reach around level 120 to 150.</span></li><li data-dcnode-id="5098"><span data-dcnode-id="5102" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsurdlySpaciousSewer" title="/pmwiki/pmwiki.php/Main/AbsurdlySpaciousSewer"><span data-dcnode-id="5101" instrument_node="">Absurdly Spacious Sewer</span></a><span data-dcnode-id="5099" instrument_node="">: The Subterranean Shunning Grounds are a vast sewer system under Leyndell, the Royal Capital, where the people used to toss all kinds of unwanted creatures, notably the Omens. It is a dark maze-like place inhabited by tough monsters, and the Tarnished will even find themselves walking on huge pipes over bottomless pits.</span></li><li data-dcnode-id="5091"><span data-dcnode-id="5097" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsurdlyLongWait" title="/pmwiki/pmwiki.php/Main/AbsurdlyLongWait"><span data-dcnode-id="5096" instrument_node="">Absurdly Long Wait</span></a><span data-dcnode-id="5094" instrument_node="">: After defeating </span><span class="spoiler" data-dcnode-id="5092" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5093" instrument_node="">Morgott and discovering the Erdtree is preventing anyone from becoming the elden lord, the Two Fingers begin to consult the Greater Will about this. Finger Reader Enia notes "thousands or tens of thousands of moons must pass" before they are finished, and while this might be a drop in a bucket for her, the player probably cannot wait for that long.</span></span></li><li data-dcnode-id="5083"><span data-dcnode-id="5090" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActionBomb" title="/pmwiki/pmwiki.php/Main/ActionBomb"><span data-dcnode-id="5089" instrument_node="">Action Bomb</span></a><span data-dcnode-id="5087" instrument_node="">: Certain enemies may explode on death, or blow themselves up as a suicide attack. Also, </span><em data-dcnode-id="5085"><span data-dcnode-id="5086" instrument_node="">you</span></em><span data-dcnode-id="5084" instrument_node=""> can be this by putting the Ruptured Crystal Tear into your Physick, making you explode shortly after drinking it. This does more damage to enemies than it does to you, letting you survive with enough HP.</span></li><li data-dcnode-id="5072"><span data-dcnode-id="5082" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AerithAndBob" title="/pmwiki/pmwiki.php/Main/AerithAndBob"><span data-dcnode-id="5081" instrument_node="">Aerith and Bob</span></a><span data-dcnode-id="5079" instrument_node="">: In classic </span><a class="twikilink" data-dcnode-id="5077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/FromSoftware" title="/pmwiki/pmwiki.php/Creator/FromSoftware"><span data-dcnode-id="5078" instrument_node="">FromSoftware</span></a><span data-dcnode-id="5076" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="5074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/GeorgeRRMartin" title="/pmwiki/pmwiki.php/Creator/GeorgeRRMartin"><span data-dcnode-id="5075" instrument_node="">George R. R. Martin</span></a><span data-dcnode-id="5073" instrument_node=""> fashion, you have pretty ordinary Western names sprinkled in among a cast of more fantastical names. Just among the humans, you have characters like Sir Gideon Ofnir, Nepheli Loux, Brother Corhyn, and Diallos coexisting with dudes named Kenneth and Edgar. This even extends to the demigods, where you have characters with names like Mohg, Morgott, Radahn, and Radagon in the same pantheon as characters with somewhat exotic but still real names like Godfrey and Godrick.</span></li><li data-dcnode-id="5064"><span data-dcnode-id="5071" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AIBreaker" title="/pmwiki/pmwiki.php/Main/AIBreaker"><span data-dcnode-id="5070" instrument_node="">A.I. Breaker</span></a><span data-dcnode-id="5068" instrument_node="">: Many enemies are programmed to automatically dodge ranged attacks and spells. However, they dodge upon your casting, </span><em data-dcnode-id="5066"><span data-dcnode-id="5067" instrument_node="">not</span></em><span data-dcnode-id="5065" instrument_node=""> when the incoming projectile is nearby them. At longer distances, an enemy may dodge once and then stand in place for several seconds as a homing missile closes in.</span></li><li data-dcnode-id="5059"><span data-dcnode-id="5063" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlienKudzu" title="/pmwiki/pmwiki.php/Main/AlienKudzu"><span data-dcnode-id="5062" instrument_node="">Alien Kudzu</span></a><span data-dcnode-id="5060" instrument_node="">: Glintstone, the crystalline mineral originating from fallen stars, converts things around itself into more glintstone.</span></li><li data-dcnode-id="5013"><span data-dcnode-id="5058" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlienSky" title="/pmwiki/pmwiki.php/Main/AlienSky"><span data-dcnode-id="5057" instrument_node="">Alien Sky</span></a><span data-dcnode-id="5055" instrument_node="">: Zigzagged. </span><span class="spoiler" data-dcnode-id="5044" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5054" instrument_node="">The sky of the Lands Between is seemingly ordinary, until the player defeats Starscourge Rhadan, who was blocking the stars and moon from being completely visible. Afterwards, the night sky is filled with millions of stars and a gargantuan moon, which from the player's perspective, would make the sky more </span><em data-dcnode-id="5052"><span data-dcnode-id="5053" instrument_node="">normal</span></em><span data-dcnode-id="5051" instrument_node="">. But that also allows </span><a class="twikilink" data-dcnode-id="5049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlienKudzu" title="/pmwiki/pmwiki.php/Main/AlienKudzu"><span data-dcnode-id="5050" instrument_node="">Alien Kudzu</span></a><span data-dcnode-id="5048" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="5046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="5047" instrument_node="">Eldritch Abominations</span></a><span data-dcnode-id="5045" instrument_node=""> to resume falling onto the Lands Between as they have before.</span></span><ul data-dcnode-id="5014"><li data-dcnode-id="5039"><span data-dcnode-id="5043" instrument_node=""> The sky in Caelid is constantly blood red, likely a side effect of the Scarlet Rot </span><span class="spoiler" data-dcnode-id="5041" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5042" instrument_node="">and the Outer God responsible for it</span></span><span data-dcnode-id="5040" instrument_node=""> throughly corrupting the area both physically and metaphysically.</span></li><li data-dcnode-id="5029"><span data-dcnode-id="5038" instrument_node=""> The sky in </span><span class="spoiler" data-dcnode-id="5036" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5037" instrument_node="">the Dream of the Death Prince, Lichdragon Fortissax's boss arena,</span></span><span data-dcnode-id="5035" instrument_node=""> is a weird, warbling pus-white color with holes of darkness and streaks of blood-red throughout it. </span><span class="spoiler" data-dcnode-id="5030" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5034" instrument_node="">What makes it weirder is this area is </span><em data-dcnode-id="5032"><span data-dcnode-id="5033" instrument_node="">underground</span></em><span data-dcnode-id="5031" instrument_node="">, or is a dream representation of an underground area.</span></span></li><li data-dcnode-id="5022"><span data-dcnode-id="5028" instrument_node=""> </span><span class="spoiler" data-dcnode-id="5023" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5027" instrument_node="">Each Elden Lord ending changes the sky slightly; the Age of Fracture ending </span><a class="twikilink" data-dcnode-id="5025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AvertedTrope" title="/pmwiki/pmwiki.php/Main/AvertedTrope"><span data-dcnode-id="5026" instrument_node="">averts</span></a><span data-dcnode-id="5024" instrument_node=""> it by keeping the sky its usual hue, the Age of the Duskborn ending turns it to a dark grey with ashen rain, the Age of Order ending turns it a bright gold, and the Blessing of Despair ending turns it a putrid brown with pustules like the Seedbed Curse throughout.</span></span></li><li data-dcnode-id="5015"><span data-dcnode-id="5021" instrument_node=""> </span><span class="spoiler" data-dcnode-id="5016" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5020" instrument_node="">The Lord of Frenzied Flame ending turns the sky a vivid and garish bright purple-yellow mix, much like the Frenzied Flame itself. However, the biggest change is the </span><em data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">gargantuan</span></em><span data-dcnode-id="5017" instrument_node=""> vortex of Frenzied Flame dominating the sky, rising from a massive column of the insanity-spewing fire issuing from the burnt-out stump of the Erdtree.</span></span></li></ul></li><li data-dcnode-id="4974"><span data-dcnode-id="5012" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllTrollsAreDifferent" title="/pmwiki/pmwiki.php/Main/AllTrollsAreDifferent"><span data-dcnode-id="5011" instrument_node="">All Trolls Are Different</span></a><span data-dcnode-id="5009" instrument_node="">: The trolls of </span><em data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">Elden Ring</span></em><span data-dcnode-id="5006" instrument_node=""> are another ancient, sentient species who make the hills and mountains in the Lands Between their home. Appearance wise, they </span><em data-dcnode-id="5004"><span data-dcnode-id="5005" instrument_node="">really</span></em><span data-dcnode-id="5003" instrument_node=""> go with the "different", having emaciated, stretched-out skin, vaguely </span><em data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">sunflower</span></em><span data-dcnode-id="5000" instrument_node=""> looking manes of hair, and, most notably, their </span><em data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">organs</span></em><span data-dcnode-id="4997" instrument_node=""> are exposed, but are giant and noted to be excellent blacksmiths. Trolls have a mixed reputation; they are horribly mistreated and enslaved in some parts Marika's Empire, they are used in the Demigods armies as living siege engines, </span><a class="twikilink" data-dcnode-id="4995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmashMook" title="/pmwiki/pmwiki.php/Main/SmashMook"><span data-dcnode-id="4996" instrument_node="">Smash Mook</span></a><span data-dcnode-id="4994" instrument_node="">, and beasts of burden, often being seen pulling guarded supply caravans (with giant chains </span><em data-dcnode-id="4992"><span data-dcnode-id="4993" instrument_node="">impaled</span></em><span data-dcnode-id="4991" instrument_node=""> into their torsos). In others, like the Fiefdom of Caria, trolls are shown to command high respect, and </span><em data-dcnode-id="4989"><span data-dcnode-id="4990" instrument_node="">knightly</span></em><span data-dcnode-id="4988" instrument_node=""> trolls are encountered. In terms of gameplay they come in many flavors, ranging from </span><em data-dcnode-id="4986"><span data-dcnode-id="4987" instrument_node="">Assassin</span></em><span data-dcnode-id="4985" instrument_node=""> Trolls (which wear giant hoods and cloaks and can ambush the player), and the aforementioned Troll Knights, elite warriors of the Carian Army knighted and clad in fully plate-armor, who are some of the deadliest foes in the game.</span><ul data-dcnode-id="4975"><li data-dcnode-id="4976"><span data-dcnode-id="4984" instrument_node=""> In terms of lore, Trolls are said to be the last descendants of the Fire Giants and were "spawned" by them ontop their mountains. It's not until you visit those very mountains you encounter </span><span class="spoiler" data-dcnode-id="4977" title="you can set spoilers visible by default on your profile"><em data-dcnode-id="4982"><span data-dcnode-id="4983" instrument_node="">primeval</span></em><span data-dcnode-id="4981" instrument_node=""> trolls, which are the unchanged ancestors of the modern lineage. Covered in thick, white fur, they look vaguely like Yetis, and still command the fell flame of their masters. There's also a hidden sword which details the trolls </span><em data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">betrayed</span></em><span data-dcnode-id="4978" instrument_node=""> the Giants during their war with the Empire.</span></span></li></ul></li><li data-dcnode-id="4957"><span data-dcnode-id="4973" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbiguousGender" title="/pmwiki/pmwiki.php/Main/AmbiguousGender"><span data-dcnode-id="4972" instrument_node="">Ambiguous Gender</span></a><span data-dcnode-id="4970" instrument_node="">: Aside from the big one of </span><span class="spoiler" data-dcnode-id="4968" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4969" instrument_node="">Radagon and Marika actually being the same person</span></span><span data-dcnode-id="4967" instrument_node="">, there's also St. Trina, a character associated with most of the sleep-inducing items in the game. The lore says some people thought they were a girl, others thought they were a boy, but they mysteriously disappeared before a conclusive answer could be found. Given both groups were 100% sure in their assertions, it's possible there were some </span><a class="twikilink" data-dcnode-id="4965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AppearanceIsInTheEyeOfTheBeholder" title="/pmwiki/pmwiki.php/Main/AppearanceIsInTheEyeOfTheBeholder"><span data-dcnode-id="4966" instrument_node="">Appearance Is in the Eye of the Beholder</span></a><span data-dcnode-id="4964" instrument_node=""> shenanigans going on. </span><span class="spoiler" data-dcnode-id="4958" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4963" instrument_node=""> The </span><img class="trivia1 rounded" data-dcnode-id="4962" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-trivia.png&amp;raw" title="This example contains a TRIVIA entry. It should be moved to the TRIVIA tab."><a class="twikilink" data-dcnode-id="4960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DummiedOut" title="/pmwiki/pmwiki.php/Main/DummiedOut"><span data-dcnode-id="4961" instrument_node="">cut NPC</span></a><span data-dcnode-id="4959" instrument_node=""> Rico confirms St. Trina was merely the assumed identity of Miqella, who was unambiguously male, but curse with eternal childhood, and thus could appear feminine if needed. "Finally, I have found it..... St. Trina's, no, Lord Miquella's cadaver... Such that I may aid you, O Lord... So please, I hope you welcome your humble servant Rico..."</span></span></li><li data-dcnode-id="4873"><span data-dcnode-id="4956" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnimalMotifs" title="/pmwiki/pmwiki.php/Main/AnimalMotifs"><span data-dcnode-id="4955" instrument_node="">Animal Motifs</span></a><span data-dcnode-id="4953" instrument_node="">: Most have strong associations with certain animals:</span><ul data-dcnode-id="4874"><li data-dcnode-id="4945"><span data-dcnode-id="4952" instrument_node=""> Godfrey, naturally, is a </span><a class="twikilink" data-dcnode-id="4950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KingOfBeasts" title="/pmwiki/pmwiki.php/Main/KingOfBeasts"><span data-dcnode-id="4951" instrument_node="">lion</span></a><span data-dcnode-id="4949" instrument_node=""> via his relationship with Serosh and his Hercules </span><a class="twikilink" data-dcnode-id="4947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Expy" title="/pmwiki/pmwiki.php/Main/Expy"><span data-dcnode-id="4948" instrument_node="">Expy</span></a><span data-dcnode-id="4946" instrument_node="">.</span></li><li data-dcnode-id="4940"><span data-dcnode-id="4944" instrument_node=""> Godwyn doesn't personally embody one, but he's strongly associated with </span><a class="twikilink" data-dcnode-id="4942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurDragonsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurDragonsAreDifferent"><span data-dcnode-id="4943" instrument_node="">dragons</span></a><span data-dcnode-id="4941" instrument_node=""> through his accomplishments in the previous war, earning their friendship and loyalty.</span></li><li data-dcnode-id="4936"><span data-dcnode-id="4939" instrument_node=""> Godefroy and Godrick — and their subsequent "creations" like the Grafted Scion — symbolizes </span><a class="twikilink" data-dcnode-id="4937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpidersAreScary" title="/pmwiki/pmwiki.php/Main/SpidersAreScary"><span data-dcnode-id="4938" instrument_node="">spiders.</span></a></li><li data-dcnode-id="4926"><span data-dcnode-id="4935" instrument_node=""> Radagon, Rennala, and Ranni have their wolves, either literally or through their association with the moon. Radagon's </span><a class="twikilink" data-dcnode-id="4933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NobleWolf" title="/pmwiki/pmwiki.php/Main/NobleWolf"><span data-dcnode-id="4934" instrument_node="">Red Wolf</span></a><span data-dcnode-id="4932" instrument_node=""> is one of the few living proofs remaining of Radagon's and Rennala's past marriage, while Ranni has </span><a class="twikilink" data-dcnode-id="4930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WolfMan" title="/pmwiki/pmwiki.php/Main/WolfMan"><span data-dcnode-id="4931" instrument_node="">Blaidd.</span></a><span data-dcnode-id="4929" instrument_node=""> Wolves also patrol areas of interest to Raya Lucaria. The Albinaurics ride their wolves to battle, </span><span class="spoiler" data-dcnode-id="4927" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4928" instrument_node="">and their last leader, Loretta, was a Carian knight before she left her post.</span></span></li><li data-dcnode-id="4915"><span data-dcnode-id="4925" instrument_node=""> Radahn, with his tusks and brutal fighting style, encapsulates what's so terrifying about </span><a class="twikilink" data-dcnode-id="4923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CruelElephant" title="/pmwiki/pmwiki.php/Main/CruelElephant"><span data-dcnode-id="4924" instrument_node="">war elephants</span></a><span data-dcnode-id="4922" instrument_node=""> in </span><a class="twikilink" data-dcnode-id="4920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealLife" title="/pmwiki/pmwiki.php/Main/RealLife"><span data-dcnode-id="4921" instrument_node="">Real Life</span></a><span data-dcnode-id="4919" instrument_node="">: </span><a class="twikilink" data-dcnode-id="4917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LightningBruiser" title="/pmwiki/pmwiki.php/Main/LightningBruiser"><span data-dcnode-id="4918" instrument_node="">big, strong, fast, and tanky.</span></a><span data-dcnode-id="4916" instrument_node=""> Radahn also purposefully modelled himself after Godfrey's lion motif.</span></li><li data-dcnode-id="4905"><span data-dcnode-id="4914" instrument_node=""> While it's easy to associate Rykard with his God-Devouring Serpent, </span><span class="spoiler" data-dcnode-id="4906" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4913" instrument_node="">his final form actually resembles </span><a class="twikilink" data-dcnode-id="4911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreepyCentipedes" title="/pmwiki/pmwiki.php/Main/CreepyCentipedes"><span data-dcnode-id="4912" instrument_node="">centipedes</span></a><span data-dcnode-id="4910" instrument_node=""> much more. This relation hits harder when one considers what centipedes symbolize in Japanese culture as </span><em data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">kegare</span></em><span data-dcnode-id="4907" instrument_node="">.</span></span></li><li data-dcnode-id="4894"><span data-dcnode-id="4904" instrument_node=""> Miquella and Malenia, the twin prodigies, are of pupae and butterflies, respectively. </span><span class="spoiler" data-dcnode-id="4895" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4903" instrument_node="">Mohg's machinations transformed Miquella from his eternal childhood form into </span><a class="urllink" data-dcnode-id="4900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Djor0Xty3iBI"><span data-dcnode-id="4902" instrument_node="">something else</span><img data-dcnode-id="4901" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="4899" instrument_node="">, while Malenia's wings are formed of Scarlet Rot butterflies. Fittingly, his Haligtree is filled with cocoons attaching themselves to various branches (while he's currently in the process of breaking out of his own), while she forces herself to "blossom" when using her </span><a class="twikilink" data-dcnode-id="4897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneWingedAngel" title="/pmwiki/pmwiki.php/Main/OneWingedAngel"><span data-dcnode-id="4898" instrument_node="">Goddess of Rot form</span></a><span data-dcnode-id="4896" instrument_node=""> in combat.</span></span></li><li data-dcnode-id="4890"><span data-dcnode-id="4893" instrument_node=""> Morgott and Mohg, the Omen twins, have horns greatly resembling goats and rams. The former doesn't really embody what those animals represent in popular culture, </span><a class="twikilink" data-dcnode-id="4891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GruesomeGoat" title="/pmwiki/pmwiki.php/Main/GruesomeGoat"><span data-dcnode-id="4892" instrument_node="">but Mogh certainly does.</span></a></li><li data-dcnode-id="4885"><span data-dcnode-id="4889" instrument_node=""> Melina and you, as potential Finger Maiden and Elden Lord, are represented by </span><a class="twikilink" data-dcnode-id="4887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoolHorse" title="/pmwiki/pmwiki.php/Main/CoolHorse"><span data-dcnode-id="4888" instrument_node="">Torrent</span></a><span data-dcnode-id="4886" instrument_node=""> — both relentless people who'll soldier on to achieve your goals regardless of the obstacles.</span></li><li data-dcnode-id="4880"><span data-dcnode-id="4884" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4882" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4883" instrument_node="">The Elden Beast</span></span><span data-dcnode-id="4881" instrument_node=""> is unique in this list as a representative of a cryptid: the Loch Ness monster.</span></li><li data-dcnode-id="4875"><span data-dcnode-id="4879" instrument_node=""> Most </span><a class="twikilink" data-dcnode-id="4877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="4878" instrument_node="">Naturalborns</span></a><span data-dcnode-id="4876" instrument_node=""> take on the local fauna wherever they crash-landed into the Lands Between. Astel mimics a dragonfly, while some others a bull, etc.</span></li></ul></li><li data-dcnode-id="4749"><span data-dcnode-id="4872" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures" title="/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures"><span data-dcnode-id="4871" instrument_node="">Anti-Frustration Features</span></a><span data-dcnode-id="4869" instrument_node="">:</span><ul data-dcnode-id="4750"><li data-dcnode-id="4857"><span data-dcnode-id="4868" instrument_node=""> For the first time since </span><em data-dcnode-id="4865"><a class="twikilink" data-dcnode-id="4866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSoulsI" title="/pmwiki/pmwiki.php/VideoGame/DarkSoulsI"><span data-dcnode-id="4867" instrument_node="">Dark Souls</span></a></em><span data-dcnode-id="4864" instrument_node="">, leveling can happen at any site of grace, the game's resting points, instead of having to warp back to the </span><a class="twikilink" data-dcnode-id="4862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HubLevel" title="/pmwiki/pmwiki.php/Main/HubLevel"><span data-dcnode-id="4863" instrument_node="">Hub Level</span></a><span data-dcnode-id="4861" instrument_node=""> to talk to your </span><a class="twikilink" data-dcnode-id="4859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreatorThumbprint" title="/pmwiki/pmwiki.php/Main/CreatorThumbprint"><span data-dcnode-id="4860" instrument_node="">FromSoft standard-issue mysterious female companion</span></a><span data-dcnode-id="4858" instrument_node="">.</span></li><li data-dcnode-id="4855"><span data-dcnode-id="4856" instrument_node=""> Stakes of Marika act as respawn points which lack the other functions of a site of grace, and are usually placed right before bosses, eliminating the need for the traditional "runback".</span></li><li data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node=""> Defeating certain enemy groups in the world replenishes flasks, reducing the need for backtracking to a previous site of grace to resupply. It's also a handy way of figuring out it's safe enough to focus on looting an area. There are also Teardrop Scarabs. Depending on whether they're red or blue ones, they can also refill the respective flasks.</span></li><li data-dcnode-id="4845"><span data-dcnode-id="4852" instrument_node=""> If you killed a boss but they also managed to </span><a class="twikilink" data-dcnode-id="4850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MutualKill" title="/pmwiki/pmwiki.php/Main/MutualKill"><span data-dcnode-id="4851" instrument_node="">kill you at the same time</span></a><span data-dcnode-id="4849" instrument_node="">, then as long as the "Enemy Felled" messages pop up </span><em data-dcnode-id="4847"><span data-dcnode-id="4848" instrument_node="">before</span></em><span data-dcnode-id="4846" instrument_node=""> you have to reload - which for all but a rare few bosses, happens mere seconds after death - it will still count as slain and will not require another fight.</span></li><li data-dcnode-id="4840"><span data-dcnode-id="4844" instrument_node=""> Certain sites of grace have a flare of light visible in the world and on the map pointing to the next Site on the critical path, providing an instant answer to </span><a class="twikilink" data-dcnode-id="4842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NowWhereWasIGoingAgain" title="/pmwiki/pmwiki.php/Main/NowWhereWasIGoingAgain"><span data-dcnode-id="4843" instrument_node="">Now, Where Was I Going Again?</span></a><span data-dcnode-id="4841" instrument_node=""> after going off the beaten path to explore.</span></li><li data-dcnode-id="4827"><span data-dcnode-id="4839" instrument_node=""> While in the Roundtable Hold, the game prevents the use of any offensive actions until leaving. This basically means all NPCs inside the hub cannot be aggroed or killed (either accidentally or intentionally), preventing a lock out of completing their side quests or purchasing items from them. The same can't be said for those who aren't in a safe area.</span><ul data-dcnode-id="4828"><li data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node=""> If you end up killing certain merchant NPCs, they will yield their Bell Bearing, which can be used to add their wares to the shop in the Hold. NPCs who automatically die as part of a sidequest will also leave their Bell Bearing, ensuring you don't miss out on their stock.</span></li><li data-dcnode-id="4829"><span data-dcnode-id="4836" instrument_node=""> NPCs killed via </span><a class="twikilink" data-dcnode-id="4834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RandomNumberGod" title="/pmwiki/pmwiki.php/Main/RandomNumberGod"><span data-dcnode-id="4835" instrument_node="">any other means</span></a><span data-dcnode-id="4833" instrument_node=""> are typically not flagged as dead, so reloading the area brings them back and prevents side quests from being </span><a class="twikilink" data-dcnode-id="4831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnwinnableByMistake" title="/pmwiki/pmwiki.php/Main/UnwinnableByMistake"><span data-dcnode-id="4832" instrument_node="">Unwinnable by Mistake</span></a><span data-dcnode-id="4830" instrument_node="">.</span></li></ul></li><li data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node=""> The starting stamina pool, regardless of the start picked, is very large. This is to help make using the new mobility options much easier, as jump attacks and guard counters use large amounts of stamina. Stamina also only drains if enemies are nearby and have been provoked, meaning running between large parts of the map without pause is entirely possible. Or more likely, riding Torrent through areas, since he also consumes stamina whenever he sprints.</span></li><li data-dcnode-id="4823"><span data-dcnode-id="4824" instrument_node=""> Weapons in this game don't have durability, meaning there's no need to worry about repairing them at all.</span></li><li data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node=""> The affinity of any non-unique weapon can be changed at any time through an equipped Ashes of War, negating the need to find a specific smithing item to change it.</span></li><li data-dcnode-id="4816"><span data-dcnode-id="4820" instrument_node=""> Before tough encounters with multiple foes, there will usually be at least </span><a class="twikilink" data-dcnode-id="4818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Antepiece" title="/pmwiki/pmwiki.php/Main/Antepiece"><span data-dcnode-id="4819" instrument_node="">one lone enemy wandering around by themselves</span></a><span data-dcnode-id="4817" instrument_node=""> some distance away, giving an opportunity to first practice against that opponent and learn their patterns.</span></li><li data-dcnode-id="4808"><span data-dcnode-id="4815" instrument_node=""> If the idea of getting invaded from the previous </span><em data-dcnode-id="4813"><span data-dcnode-id="4814" instrument_node="">Dark Souls</span></em><span data-dcnode-id="4812" instrument_node=""> entries has turned you off from playing online, fret not — as long as you're playing without co-op, you'll never get invaded unless you use a specific key item to opt in to PVP. (And if you </span><em data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node="">do</span></em><span data-dcnode-id="4809" instrument_node=""> get invaded while playing co-op, well, you'll always outnumber the invader.)</span></li><li data-dcnode-id="4803"><span data-dcnode-id="4807" instrument_node=""> Wandering Mausoleums can duplicate any legendary remembrances, meaning it's possible to get a certain boss's alternative weapon without going into </span><a class="twikilink" data-dcnode-id="4805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="4806" instrument_node="">New Game+</span></a><span data-dcnode-id="4804" instrument_node=""> yet.</span></li><li data-dcnode-id="4798"><span data-dcnode-id="4802" instrument_node=""> When you slay an enemy they will sometimes </span><a class="twikilink" data-dcnode-id="4800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoticeThis" title="/pmwiki/pmwiki.php/Main/NoticeThis"><span data-dcnode-id="4801" instrument_node="">flash with a white flare</span></a><span data-dcnode-id="4799" instrument_node="">. This tells you that enemy has an item drop, allowing you to know when to devote time to search the corpses or to move along.</span></li><li data-dcnode-id="4796"><span data-dcnode-id="4797" instrument_node=""> Mines are hard to miss on the map screen, as they're depicted with a red glare around them. This is crucial for progression since mines tend to contain either lots of upgrade materials, items to give vendors to expand their upgrade material stock, or both.</span></li><li data-dcnode-id="4791"><span data-dcnode-id="4795" instrument_node=""> The Tarnished can warp to the </span><a class="twikilink" data-dcnode-id="4793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HubLevel" title="/pmwiki/pmwiki.php/Main/HubLevel"><span data-dcnode-id="4794" instrument_node="">Hub Level</span></a><span data-dcnode-id="4792" instrument_node=""> instantly from the map by pressing Y/Triangle/F and then X/Square/E.</span></li><li data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node=""> Fall damage has been drastically reduced compared to previous titles. The player takes no damage from a generous distance, and beyond that will typically only lose about a quarter of their max HP. There is a talisman which will remove this fall damage entirely, but beyond the damaging fall distance, you'll simply die, talisman or not.</span></li><li data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node=""> If your attack animation causes the character to take a step forward, it will never move you off a ledge with a lethal fall.</span></li><li data-dcnode-id="4785"><span data-dcnode-id="4786" instrument_node=""> Stuck offline? No summon signs where you are? Just flat out hate other players? You can now summon NPCs to help you fight for just about every boss battle via the Spirit Calling Bell and Spirit Ashes. While not as smart as human players, most of them make up for it by being extremely durable at minimum.</span></li><li data-dcnode-id="4783"><span data-dcnode-id="4784" instrument_node=""> Any runes lost from dying in an Evergaol will be placed outside, allowing you to retrieve them without having to challenge the boss again.</span></li><li data-dcnode-id="4778"><span data-dcnode-id="4782" instrument_node=""> In the </span><em data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">Dark Souls</span></em><span data-dcnode-id="4779" instrument_node=""> games, you needed to have a certain amount of Intelligence before the Sorcery merchants would even acknowledge you, much less open their shop to you. Here, every NPC who sells Sorceries will open their inventory to you immediately, with no Intelligence prerequisite (though some will still take the chance call you a moron if your intelligence is too low).</span></li><li data-dcnode-id="4770"><span data-dcnode-id="4777" instrument_node=""> If you've exceeded the maximum number of a particular item you can carry, any additional items of that type you loot will automatically be placed in your item chest to be retrieved or used at your leisure. If you manage to meet the limit your chest can hold of that item, any additional pickups after </span><em data-dcnode-id="4775"><span data-dcnode-id="4776" instrument_node="">that</span></em><span data-dcnode-id="4774" instrument_node=""> get converted to runes.</span><ul data-dcnode-id="4771"><li data-dcnode-id="4772"><span data-dcnode-id="4773" instrument_node=""> Furthermore, stopping to rest at a site of grace will automatically top up your inventory from the items stored in your chest.</span></li></ul></li><li data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node=""> Smithing Stones and Somber Smithing Stones can be purchased from the Roundtable Hold once you've found the right Bell Bearing, and are relatively inexpensive for the points in the game you find said bearings. This means you no longer need to worry about spending a limited quantity of materials to fully upgrade weapons, and are free to experiment. In addition, while they aren't so common you're swimming in them, stones of almost all levels can be farmed from enemies as drops.</span></li><li data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node=""> There are more Golden Seeds to find than you are able to spend on additional flask charges (your charges max out at 14 total, regardless of which flask you allocate them to), so you don't have to overly concern yourself with not finding enough saplings or killing all of the Tree Spirits to fully upgrade your flasks. Similarly, you'll discover more Stonesword Keys than gates requiring them, so you don't have to too far out of the way to scrounge up every single one.</span></li><li data-dcnode-id="4756"><span data-dcnode-id="4765" instrument_node=""> With Patch 1.03, the current location of most NPCs you've met will appear on the world map. If you want to continue their quest line but forget where they were, a quick scan over the map should answer your question. </span><span class="notelabel" data-dcnode-id="4762" onclick="togglenote('note0kbji');" style="cursor: pointer;"><sup data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4757" id="note0kbji" isnote="true" onclick="togglenote('note0kbji');" style="display: none; cursor: pointer;"><span data-dcnode-id="4761" instrument_node=""> Unfortunately, this doesn't tell you where they have moved to if they change location, which fails to resolve the </span><a class="twikilink" data-dcnode-id="4759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="4760" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="4758" instrument_node=""> nature of many NPC side quests </span></span></li><li data-dcnode-id="4751"><span data-dcnode-id="4755" instrument_node=""> At a certain point of his quest </span><span class="spoiler" data-dcnode-id="4753" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4754" instrument_node="">Gurranq</span></span><span data-dcnode-id="4752" instrument_node=""> will become aggressive and stop teaching spells until you beat sense back into him. It's a brutal fight even for endgame characters, and in case you can't beat him, he'll calm down after killing you several times.</span></li></ul></li><li data-dcnode-id="4668"><span data-dcnode-id="4748" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcSymbol" title="/pmwiki/pmwiki.php/Main/ArcSymbol"><span data-dcnode-id="4747" instrument_node="">Arc Symbol</span></a><span data-dcnode-id="4745" instrument_node="">: There are many in this game.</span><ul data-dcnode-id="4669"><li data-dcnode-id="4743"><span data-dcnode-id="4744" instrument_node=""> Arms and fingers play a prominent part in the lore, with one of the most prominent examples being the Two Fingers.</span></li><li data-dcnode-id="4741"><span data-dcnode-id="4742" instrument_node=""> Rings and Arcs. All of the rune items (including the Great Runes dropped by the shardbearers) are circular in some regard, and the Rune Arc is a curved line which appears in many places such as Stakes of Marika, the various crucifixes dotting the Lands Between, and in a lot of the symbolism and architecture of the world. The six Divine Towers in the world are arranged in a ring-like pattern around the map. The Elden Ring itself is the cosmological force that binds the world together, and is represented by a quartet of interposed rings which make a three-way Venn Diagram with a single circle in their center, bracketed by a pair of Rune Arcs.</span></li><li data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node=""> Precious metals, notably gold and silver. Nearly everything associated with Grace and the Erdtree is tinged gold, with silver also being a common color and metal. The abstract but very real “logic” and laws of the world imposed by Queen Marika is known as the Golden Order. The Tarnished are explicitly called such because they are rejected by the Erdtree and the Golden Order.</span></li><li data-dcnode-id="4670"><span data-dcnode-id="4738" instrument_node=""> Each major area has unique iconography to differentiate it from the other continents. Usually, these act as a visual link between the resident lord and the land they control.</span><ul data-dcnode-id="4671"><li data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node=""> Limgrave: Desolation, nature, and ruin. There is no true lord of Limgrave, and as a result the region consists of open plains, verdant forests, and a few scattered ruins and small encampments with maddened soldiers, emaciated nobles, and peasants trying to salvage the ancient remains of fallen temples.</span></li><li data-dcnode-id="4725"><span data-dcnode-id="4735" instrument_node=""> Stormveil: Limbs, </span><a class="twikilink" data-dcnode-id="4733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FrankensteinsMonster" title="/pmwiki/pmwiki.php/Main/FrankensteinsMonster"><span data-dcnode-id="4734" instrument_node="">chimeras,</span></a><span data-dcnode-id="4732" instrument_node=""> and blowing stormwind. The former two relate to Godrick's practice of </span><a class="twikilink" data-dcnode-id="4730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BodyHorror" title="/pmwiki/pmwiki.php/Main/BodyHorror"><span data-dcnode-id="4731" instrument_node="">"grafting" (read: shoving body parts onto himself)</span></a><span data-dcnode-id="4729" instrument_node="">, while the last one is part of the Stormveil Knights method of combat, where they use </span><a class="twikilink" data-dcnode-id="4727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlowYouAway" title="/pmwiki/pmwiki.php/Main/BlowYouAway"><span data-dcnode-id="4728" instrument_node="">powerful wind magic</span></a><span data-dcnode-id="4726" instrument_node=""> to attack at range and rapidly move around.</span></li><li data-dcnode-id="4714"><span data-dcnode-id="4724" instrument_node=""> Liurnia: Glintstone, flowing water, and </span><a class="twikilink" data-dcnode-id="4722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreepyDoll" title="/pmwiki/pmwiki.php/Main/CreepyDoll"><span data-dcnode-id="4723" instrument_node="">puppetry.</span></a><span data-dcnode-id="4721" instrument_node=""> Raya Lucaria, the Legacy Dungeon of this zone, is the head of Glintstone Sorceries in the Lands Between and sits above a drained lakebed. As for puppets, Ranni is a </span><a class="twikilink" data-dcnode-id="4719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarionetteMaster" title="/pmwiki/pmwiki.php/Main/MarionetteMaster"><span data-dcnode-id="4720" instrument_node="">master of puppetry,</span></a><span data-dcnode-id="4718" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4716" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4717" instrument_node="">while Renalla's "imperfect" scholars behave with an unnerving simplicity akin to fleshy marionettes.</span></span><span data-dcnode-id="4715" instrument_node=""> The whole area is also patrolled by countless hostile contraptions.</span></li><li data-dcnode-id="4701"><span data-dcnode-id="4713" instrument_node=""> Underground: Stars, </span><a class="twikilink" data-dcnode-id="4711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OldMagic" title="/pmwiki/pmwiki.php/Main/OldMagic"><span data-dcnode-id="4712" instrument_node="">Old Magic</span></a><span data-dcnode-id="4710" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="4708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdvancedAncientAcropolis" title="/pmwiki/pmwiki.php/Main/AdvancedAncientAcropolis"><span data-dcnode-id="4709" instrument_node="">Advanced Ancient Acropolis</span></a><span data-dcnode-id="4707" instrument_node="">. Sofria and Mohgwyn Palace is lit by glowing lights akin to stars, </span><span class="spoiler" data-dcnode-id="4705" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4706" instrument_node="">while the deepest parts of the underground contain an honest-to-god alien in Astel</span></span><span data-dcnode-id="4704" instrument_node="">. Sofria's Ancient Men worship the forces of nature, in particular venerating a creature called the "Ancestor Spirit" as their god. Meanwhile, Ainsel is composed of the ancient city of Nokstella, which is a long-destroyed civilization mostly populated by cultists, </span><span class="spoiler" data-dcnode-id="4702" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4703" instrument_node="">and a third ancient city sits at the bottom of the Deeproot Depths.</span></span></li><li data-dcnode-id="4693"><span data-dcnode-id="4700" instrument_node=""> Caelid: </span><a class="twikilink" data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IAmAHumanitarian" title="/pmwiki/pmwiki.php/Main/IAmAHumanitarian"><span data-dcnode-id="4699" instrument_node="">Cannibalism,</span></a><span data-dcnode-id="4697" instrument_node=""> the Scarlet Rot, and the remnants of warfare. All three of these symbols are intimately tied to General Rahdahn, who was infected with the Scarlet Rot </span><span class="spoiler" data-dcnode-id="4695" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4696" instrument_node="">and driven to madness as a result. He now wanders his boss area, feasting on the corpses of his former comrades.</span></span><span data-dcnode-id="4694" instrument_node=""> The rest of Caelid is one of the most war-torn places in the game, befitting of the legendary battle between Rahdahn and Malenia.</span></li><li data-dcnode-id="4688"><span data-dcnode-id="4692" instrument_node=""> Mt. Gelmir: Lava, familial relations, and torture equipment. The Volcano Manor which sits upon the open crater of Mt. Gelmir is a place of torture and suffering due to Rykard's attempts at becoming the Lord of Blasphemy. At the same time, the Volcano Manor has a surprising camaraderie between its members, with Tanith, </span><span class="spoiler" data-dcnode-id="4690" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4691" instrument_node="">Bernahl, Patches,</span></span><span data-dcnode-id="4689" instrument_node=""> and Rya all having some measure of affection between each other.</span></li><li data-dcnode-id="4681"><span data-dcnode-id="4687" instrument_node=""> Mountaintop of the Giants: Emptiness, snow, and death. Barring a few well-spread out enemies, the mountain is a massive tomb for the entire Giant race, with their only survivor cursed to live forever when the rest of his people perished fighting Marika's Empire. The place is covered in a </span><a class="twikilink" data-dcnode-id="4685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SnowMeansDeath" title="/pmwiki/pmwiki.php/Main/SnowMeansDeath"><span data-dcnode-id="4686" instrument_node="">faint snowfall</span></a><span data-dcnode-id="4684" instrument_node="">, which is fitting for the tragedy of the giants </span><span class="spoiler" data-dcnode-id="4682" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4683" instrument_node="">and Melina's imminent sacrifice.</span></span></li><li data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node=""> Crumbling Farum Azula: Dragons, crumbling stone, and vicious tornadoes. Azula was a civilization which managed to survive from before the Age of the Erdtree which has been forced into obscurity and is slowly falling apart from years of desolation. It is primarily filled with ancient stone dragons, who ride the winds around the tornadoes holding the palace together.</span></li><li data-dcnode-id="4672"><span data-dcnode-id="4678" instrument_node=""> Leyndell, Royal Capital </span><span class="spoiler" data-dcnode-id="4676" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4677" instrument_node="">and Capital of Ash</span></span><span data-dcnode-id="4675" instrument_node="">: Golden light, regal architecture, and tree branches. Fitting as the place closest to the Erdtree, Leyndell is bathed in an eternal golden light and incorporates gold into much of the architecture. The upper parts of the royal palace are snaked with roots from the Erdtree, visually demonstrating how spiritually close Marika and her subjects are to the giant plant. </span><span class="spoiler" data-dcnode-id="4673" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4674" instrument_node="">When the Erdtree is set ablaze, the place becomes bathed in ash, showing how the player has destroyed the Golden Order and defied the will of Marika to become Elden Lord.</span></span></li></ul></li></ul></li><li data-dcnode-id="4663"><span data-dcnode-id="4667" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnyoneCanDie" title="/pmwiki/pmwiki.php/Main/AnyoneCanDie"><span data-dcnode-id="4666" instrument_node="">Anyone Can Die</span></a><span data-dcnode-id="4664" instrument_node="">: As is tradition, one cannot assume any given NPC will survive to the very end of the story if you follow their storyline. Many, if not most, will likely die by the end of their storyline, often off-screen.</span></li><li data-dcnode-id="4603"><span data-dcnode-id="4662" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcVillain" title="/pmwiki/pmwiki.php/Main/ArcVillain"><span data-dcnode-id="4661" instrument_node="">Arc Villain</span></a><span data-dcnode-id="4659" instrument_node="">: Each major area has their own associated antagonist who is the source of their ills, whether directly or indirectly:</span><ul data-dcnode-id="4604"><li data-dcnode-id="4657"><span data-dcnode-id="4658" instrument_node=""> Godrick the Grafted is this for Limgrave as he sends his men hunting the region for Tarnished to drag back to his keep at Stormveil Castle for grafting. The first boss fought shares his epithet of "Grafted", and the basic enemy of the area are soldiers of Godrick. Several NPCs also note outside of his mutilation tendencies, Godrick also tended to be something of a petty, oppressive tyrant.</span></li><li data-dcnode-id="4644"><span data-dcnode-id="4656" instrument_node=""> Queen Rennala is this for Liurnia, though curiously her great villainous sin is one born of </span><em data-dcnode-id="4654"><span data-dcnode-id="4655" instrument_node="">inaction</span></em><span data-dcnode-id="4653" instrument_node=""> — despite being </span><a class="twikilink" data-dcnode-id="4651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheArchmage" title="/pmwiki/pmwiki.php/Main/TheArchmage"><span data-dcnode-id="4652" instrument_node="">The Archmage</span></a><span data-dcnode-id="4650" instrument_node="">, she sealed herself and her disciples within her sorcerous academy of Raya Lucaria once the Shattering began to save herself, doing nothing to protect the region from the oncoming devastation. </span><span class="spoiler" data-dcnode-id="4645" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4649" instrument_node="">Ranni, her daughter, serves as the </span><a class="twikilink" data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManBehindTheMan" title="/pmwiki/pmwiki.php/Main/ManBehindTheMan"><span data-dcnode-id="4648" instrument_node="">Man Behind the Man</span></a><span data-dcnode-id="4646" instrument_node="">.</span></span></li><li data-dcnode-id="4637"><span data-dcnode-id="4643" instrument_node=""> General Radahn and his army rule over the rot-scarred wasteland of Caelid. His demesne, Redmane Castle, sits to the south and is preparing for a "festival" of some kind, while the eastern and northern parts of the continent are positively lousy with scarlet rot. </span><span class="spoiler" data-dcnode-id="4638" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4642" instrument_node="">And in an interesting twist, Radahn isn't responsible for any of these problems- the scarlet rot is Malenia's doing, while the Radahn Festival his troops are preparing for is an armed contingent to </span><em data-dcnode-id="4640"><span data-dcnode-id="4641" instrument_node="">kill him for good</span></em><span data-dcnode-id="4639" instrument_node=""> since he becomes a zombified monster.</span></span></li><li data-dcnode-id="4627"><span data-dcnode-id="4636" instrument_node=""> The Altus Plateau has a </span><a class="twikilink" data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBadEnsemble" title="/pmwiki/pmwiki.php/Main/BigBadEnsemble"><span data-dcnode-id="4635" instrument_node="">Big Bad Ensemble</span></a><span data-dcnode-id="4633" instrument_node="">. To the east in Leyendell, Morgott the Grace-Given rules the city and guards the Erdtree from would-be trespassers, </span><span class="spoiler" data-dcnode-id="4631" title="you can set spoilers visible by default on you
