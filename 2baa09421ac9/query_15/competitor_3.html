i data-dcnode-id="2035"><span data-dcnode-id="2039" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RageAgainstTheHeavens" title="/pmwiki/pmwiki.php/Main/RageAgainstTheHeavens"><span data-dcnode-id="2038" instrument_node="">Rage Against the Heavens</span></a><span data-dcnode-id="2036" instrument_node="">: The narration in the gameplay trailer sets instructs the Tarnished to slay the demigods who let the fractured power of the Elden Ring get to their heads and restore order to the war-torn sacred continent, with the enemies of the Tarnished mocking this idea as impossible.</span></li><li data-dcnode-id="1997"><span data-dcnode-id="2034" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Reconstruction" title="/pmwiki/pmwiki.php/Main/Reconstruction"><span data-dcnode-id="2033" instrument_node="">Reconstruction</span></a><span data-dcnode-id="2031" instrument_node="">: Of the </span><a class="twikilink" data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheTimeOfMyths" title="/pmwiki/pmwiki.php/Main/TheTimeOfMyths"><span data-dcnode-id="2030" instrument_node="">The Time of Myths</span></a><span data-dcnode-id="2028" instrument_node="">. Similar to what </span><em data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Bloodborne</span></em><span data-dcnode-id="2025" instrument_node=""> did for </span><a class="twikilink" data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GothicHorror" title="/pmwiki/pmwiki.php/Main/GothicHorror"><span data-dcnode-id="2024" instrument_node="">Gothic Horror</span></a><span data-dcnode-id="2022" instrument_node="">, </span><em data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Elden Ring</span></em><span data-dcnode-id="2019" instrument_node=""> harkens back to classical mythology of many different cultures, in particular Greek and Norse mythology, two of the most influential mythological settings. In this day and age, settings like </span><a class="twikilink" data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Myth/NorseMythology" title="/pmwiki/pmwiki.php/Myth/NorseMythology"><span data-dcnode-id="2018" instrument_node="">Norse Mythology</span></a><span data-dcnode-id="2016" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Myth/ClassicalMythology" title="/pmwiki/pmwiki.php/Myth/ClassicalMythology"><span data-dcnode-id="2015" instrument_node="">Classical Mythology</span></a><span data-dcnode-id="2013" instrument_node=""> have become watered down by media influence in attempt to paint them in a "fresh new light". </span><em data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Elden Ring</span></em><span data-dcnode-id="2010" instrument_node=""> brings back that splendor </span><em data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">and</span></em><span data-dcnode-id="2007" instrument_node=""> the horror full-scale. Mighty, human-like but also otherworldly </span><a class="twikilink" data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PhysicalGod" title="/pmwiki/pmwiki.php/Main/PhysicalGod"><span data-dcnode-id="2006" instrument_node="">Physical Gods</span></a><span data-dcnode-id="2004" instrument_node=""> clash with each other and rule over humanity as petty overlords, nightmarish monsters ripe with </span><a class="twikilink" data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BodyHorror" title="/pmwiki/pmwiki.php/Main/BodyHorror"><span data-dcnode-id="2003" instrument_node="">Body Horror</span></a><span data-dcnode-id="2001" instrument_node=""> and powerful magic tear across the realm preying on the innocent, legendary heroes rise to challenge them both, and epic adventures abound. The world also has some elements of </span><a class="twikilink" data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicHorrorStory" title="/pmwiki/pmwiki.php/Main/CosmicHorrorStory"><span data-dcnode-id="2000" instrument_node="">Cosmic Horror Story</span></a><span data-dcnode-id="1998" instrument_node=""> to it, hearkening back to a time where humanity was afraid of the world and its unknowns.</span></li><li data-dcnode-id="1932"><span data-dcnode-id="1996" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RecurringElement" title="/pmwiki/pmwiki.php/Main/RecurringElement"><span data-dcnode-id="1995" instrument_node="">Recurring Element</span></a><span data-dcnode-id="1993" instrument_node="">:</span><ul data-dcnode-id="1933"><li data-dcnode-id="1977"><span data-dcnode-id="1992" instrument_node=""> It wouldn't be a </span><a class="twikilink" data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/HidetakaMiyazaki" title="/pmwiki/pmwiki.php/Creator/HidetakaMiyazaki"><span data-dcnode-id="1991" instrument_node="">Hidetaka Miyazaki</span></a><span data-dcnode-id="1989" instrument_node=""> game without an </span><a class="twikilink" data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Expy" title="/pmwiki/pmwiki.php/Main/Expy"><span data-dcnode-id="1988" instrument_node="">expy</span></a><span data-dcnode-id="1986" instrument_node=""> of </span><a class="twikilink" data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Berserk" title="/pmwiki/pmwiki.php/Manga/Berserk"><span data-dcnode-id="1985" instrument_node="">Guts</span></a><span data-dcnode-id="1983" instrument_node="">. In this case, we have Blaidd, a huge werewolf clad in armor wielding a greatsword in one hand, effectively evoking Guts post-Eclipse, though Blaidd is much more affable in terms of personality. You can also find a greatsword in the world which has a description invoking lines from the manga, describing the sword like Guts' sword, the Dragon Slayer. </span><span class="spoiler" data-dcnode-id="1978" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1982" instrument_node="">Then it turns out all the 'shadows' of the royal family might </span><em data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">all</span></em><span data-dcnode-id="1979" instrument_node=""> be Guts expies, if Maliketh's resemblance to Guts in the Berserker Armor is any indication.</span></span></li><li data-dcnode-id="1966"><span data-dcnode-id="1976" instrument_node=""> Melina is the latest in a long line of </span><a class="twikilink" data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MysteriousWaif" title="/pmwiki/pmwiki.php/Main/MysteriousWaif"><span data-dcnode-id="1975" instrument_node="">Mysterious Waifs</span></a><span data-dcnode-id="1973" instrument_node=""> who aid your character via leveling and upgrades. Though, unlike past examples who were confined to your </span><a class="twikilink" data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerHeadquarters" title="/pmwiki/pmwiki.php/Main/PlayerHeadquarters"><span data-dcnode-id="1972" instrument_node="">Player Headquarters</span></a><span data-dcnode-id="1970" instrument_node="">, Melina appears intermittently throughout the world at various key plot points </span><span class="spoiler" data-dcnode-id="1968" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1969" instrument_node="">and can even be summoned for one boss fight</span></span><span data-dcnode-id="1967" instrument_node="">.</span></li><li data-dcnode-id="1956"><span data-dcnode-id="1965" instrument_node=""> To the surprise of absolutely nobody, Patches makes an appearance. </span><span class="spoiler" data-dcnode-id="1957" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1964" instrument_node="">Though in a bit of a twist, </span><em data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">you</span></em><span data-dcnode-id="1961" instrument_node=""> antagonize </span><em data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">him</span></em><span data-dcnode-id="1958" instrument_node=""> first (albeit accidentally) by opening up a seemingly random chest which turns out to belong to him and taking his stuff.</span></span></li><li data-dcnode-id="1945"><span data-dcnode-id="1955" instrument_node=""> Like </span><em data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Sekiro</span></em><span data-dcnode-id="1952" instrument_node=""> and </span><em data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Bloodborne,</span></em><span data-dcnode-id="1949" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreepyCentipedes" title="/pmwiki/pmwiki.php/Main/CreepyCentipedes"><span data-dcnode-id="1948" instrument_node="">Creepy Centipedes</span></a><span data-dcnode-id="1946" instrument_node=""> make an appearance, except they are golden. You may also notice it's a design motif for the Rune of Death. While in Japan, centipedes are symbols of evil and decay, the golden centipedes are fetishes for the Golden Order.</span></li><li data-dcnode-id="1940"><span data-dcnode-id="1944" instrument_node=""> The Moonlight Greatsword returns to wieldable status again after it was unobtainable in </span><em data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Sekiro</span></em><span data-dcnode-id="1941" instrument_node="">, though this time under the name of the Dark Moon Greatsword. However, its weapon art is called "Moonlight Greatsword".</span></li><li data-dcnode-id="1934"><span data-dcnode-id="1939" instrument_node=""> Much like </span><em data-dcnode-id="1936"><a class="twikilink" data-dcnode-id="1937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Bloodborne" title="/pmwiki/pmwiki.php/VideoGame/Bloodborne"><span data-dcnode-id="1938" instrument_node="">Bloodborne</span></a></em><span data-dcnode-id="1935" instrument_node="">, one area requires you to approach a tower while avoiding a malevolent flashing light which inflicts a highly damaging debuff on you if it builds up.</span></li></ul></li><li data-dcnode-id="1927"><span data-dcnode-id="1931" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RedSkyTakeWarning" title="/pmwiki/pmwiki.php/Main/RedSkyTakeWarning"><span data-dcnode-id="1930" instrument_node="">Red Sky, Take Warning</span></a><span data-dcnode-id="1928" instrument_node="">: The Caelid Wilds have a very prominent red sky.</span></li><li data-dcnode-id="1919"><span data-dcnode-id="1926" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReviveKillsZombie" title="/pmwiki/pmwiki.php/Main/ReviveKillsZombie"><span data-dcnode-id="1925" instrument_node="">Revive Kills Zombie</span></a><span data-dcnode-id="1923" instrument_node="">: Wraith Callers and Revenants take massive damage from any AoE healing spell, with the latter also becoming instantly staggered allowing for a </span><a class="twikilink" data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CriticalHit" title="/pmwiki/pmwiki.php/Main/CriticalHit"><span data-dcnode-id="1922" instrument_node="">Critical Hit</span></a><span data-dcnode-id="1920" instrument_node="">.</span></li><li data-dcnode-id="1908"><span data-dcnode-id="1918" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RewatchBonus" title="/pmwiki/pmwiki.php/Main/RewatchBonus"><span data-dcnode-id="1917" instrument_node="">Rewatch Bonus</span></a><span data-dcnode-id="1915" instrument_node="">: The opening cinematic audaciously spoils a massive plot twist, but none of the visuals make sense unless you know the context behind them. Specifically, </span><span class="spoiler" data-dcnode-id="1910" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1914" instrument_node="">the </span><em data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">very first shot</span></em><span data-dcnode-id="1911" instrument_node=""> shows it was Queen Marika herself who shattered the Elden Ring, while the second shot shows Radagon trying to repair it</span></span><span data-dcnode-id="1909" instrument_node="">.</span></li><li data-dcnode-id="1903"><span data-dcnode-id="1907" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RuinsForRuinsSake" title="/pmwiki/pmwiki.php/Main/RuinsForRuinsSake"><span data-dcnode-id="1906" instrument_node="">Ruins for Ruins' Sake</span></a><span data-dcnode-id="1904" instrument_node="">: Averted. Every ruin in the game has its story, and most of them can be explained by the Shattering having laid waste to the land. Although the player can sometimes encounter chunks of large buildings inexplicably laying in the middle of the countryside, it is eventually revealed these ruins are chunks of Farum Azula, a floating castle hidden above the clouds.</span></li><li data-dcnode-id="1884"><span data-dcnode-id="1902" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SceneryGorn" title="/pmwiki/pmwiki.php/Main/SceneryGorn"><span data-dcnode-id="1901" instrument_node="">Scenery Gorn</span></a><span data-dcnode-id="1899" instrument_node="">:</span><ul data-dcnode-id="1885"><li data-dcnode-id="1888"><span data-dcnode-id="1898" instrument_node=""> Caelid is maybe the most exquisite demonstration of this in </span><em data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Soulsborne</span></em><span data-dcnode-id="1895" instrument_node=""> history, looking like a cross between a </span><a class="twikilink" data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/HieronymusBosch" title="/pmwiki/pmwiki.php/Creator/HieronymusBosch"><span data-dcnode-id="1894" instrument_node="">Hieronymus Bosch</span></a><span data-dcnode-id="1892" instrument_node=""> painting and a World War I battlefield, with tons of horrific </span><a class="twikilink" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlienKudzu" title="/pmwiki/pmwiki.php/Main/AlienKudzu"><span data-dcnode-id="1891" instrument_node="">Alien Kudzu</span></a><span data-dcnode-id="1889" instrument_node=""> thrown in for good measure.</span></li><li data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node=""> Mount Gelmir is almost as bad, being a barren wasteland of jagged volcanic rock littered with ruined fortifications and dead bodies.</span></li></ul></li><li data-dcnode-id="1876"><span data-dcnode-id="1883" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SceneryPorn" title="/pmwiki/pmwiki.php/Main/SceneryPorn"><span data-dcnode-id="1882" instrument_node="">Scenery Porn</span></a><span data-dcnode-id="1880" instrument_node="">: Though ruined and desecrated by unending war between demigods, the Lands Between are very beautiful (with the exception of </span><a class="twikilink" data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mordor" title="/pmwiki/pmwiki.php/Main/Mordor"><span data-dcnode-id="1879" instrument_node="">Caelid</span></a><span data-dcnode-id="1877" instrument_node="">. Whether it's the rolling plains of Limgrave, the massive lakebed of Liurnia, the perpetually twilit Siofra River, or the unbelievable scale and opulence of Leyndell, Fromsoft really spared no expense in making the environmental design every bit as immaculate as they could.</span></li><li data-dcnode-id="1836"><span data-dcnode-id="1875" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SchmuckBait" title="/pmwiki/pmwiki.php/Main/SchmuckBait"><span data-dcnode-id="1874" instrument_node="">Schmuck Bait</span></a><span data-dcnode-id="1872" instrument_node="">:</span><ul data-dcnode-id="1837"><li data-dcnode-id="1865"><span data-dcnode-id="1871" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1866" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1870" instrument_node="">Some of the chests in the world are teleport traps. One particular example is the trap leading to Caelid, which would ideally be the </span><em data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">third</span></em><span data-dcnode-id="1867" instrument_node=""> area which should be encountered before anything else.</span></span></li><li data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node=""> It's not unusual to find a valuable-looking item in plain sight only to get ambushed as you run in to grab it.</span></li><li data-dcnode-id="1853"><span data-dcnode-id="1862" instrument_node=""> One possible starting gift is two Stonesword Keys which are the game's equivalent to Pharros Lockstones from </span><em data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Dark Souls II</span></em><span data-dcnode-id="1859" instrument_node="">. Immediately out of the tutorial, there is a fog wall which requires two Stonesword Keys to dispel. </span><span class="spoiler" data-dcnode-id="1854" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1858" instrument_node="">What lies beyond is a very difficult dungeon which </span><em data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">starts</span></em><span data-dcnode-id="1855" instrument_node=""> with a sprint across a large poison pool and only gets worse from there.</span></span></li><li data-dcnode-id="1848"><span data-dcnode-id="1852" instrument_node=""> After you emerge from the tutorial level and see sunlight for the first time, one of the first things you'll see is a large mounted enemy. It's the Tree Sentinel, and he'll serve as a rough lesson to </span><em data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">not</span></em><span data-dcnode-id="1849" instrument_node=""> blindly fight anyone who crosses your path.</span></li><li data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node=""> One of the Crystal Tears you can mix into the Flask of Wonderous Physick says it just causes your character to explode. And yes, that's exactly what it does, although the explosion at least hurts the enemies more than it hurts you.</span></li><li data-dcnode-id="1838"><span data-dcnode-id="1845" instrument_node=""> In several areas you will find a lone enemy just standing around, usually a weak enemy like a </span><a class="twikilink" data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGoomba" title="/pmwiki/pmwiki.php/Main/TheGoomba"><span data-dcnode-id="1844" instrument_node="">Noble</span></a><span data-dcnode-id="1842" instrument_node="">, only for it to transform into something much more powerful like a Runebear or Troll upon killing it. Liurnia has a Giant Lobster which transforms into a </span><em data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Grafted Scion</span></em><span data-dcnode-id="1839" instrument_node=""> upon its death.</span></li></ul></li><li data-dcnode-id="1829"><span data-dcnode-id="1835" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewYourself" title="/pmwiki/pmwiki.php/Main/ScrewYourself"><span data-dcnode-id="1834" instrument_node="">Screw Yourself</span></a><span data-dcnode-id="1832" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1830" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1831" instrument_node="">Radagon and Marika have children — the twin demigods Malenia and Miquella. This trope becomes a possibility when you discover that Radagon and Marika are one and the same.</span></span></li><li data-dcnode-id="1824"><span data-dcnode-id="1828" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SealedEvilInACan" title="/pmwiki/pmwiki.php/Main/SealedEvilInACan"><span data-dcnode-id="1827" instrument_node="">Sealed Evil in a Can</span></a><span data-dcnode-id="1825" instrument_node="">: Around the world the Tarnished can come across concave stone platforms whose centers are inscribed with a glowing seal and are surrounded by ominous stone worms. These 'Evergaols' each allow the Tarnished to initiate a boss-fight against their particular prisoner who will drop a unique piece of loot.</span></li><li data-dcnode-id="1819"><span data-dcnode-id="1823" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheSecretOfLongPorkPies" title="/pmwiki/pmwiki.php/Main/TheSecretOfLongPorkPies"><span data-dcnode-id="1822" instrument_node="">The Secret of Long Pork Pies</span></a><span data-dcnode-id="1820" instrument_node="">: The Raw Meat Dumpling is a consumable item which heals you but also poisons you at the same time. Its description advises you to not ask questions about where the meat came from, though it's not hard to figure out. The dumplings are dropped by Living Jars, which the game makes clear are brought to life by stuffing them full of human corpses.</span></li><li data-dcnode-id="1770"><span data-dcnode-id="1818" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SequenceBreaking" title="/pmwiki/pmwiki.php/Main/SequenceBreaking"><span data-dcnode-id="1817" instrument_node="">Sequence Breaking</span></a><span data-dcnode-id="1815" instrument_node="">: Despite the vast open-world nature of the game, there are a few explicit sequences which can't be bypassed under normal circumstances. There are a few major sequence breaks which when combined can allow speed runners to complete the game </span><em data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">in under 40 minutes</span></em><span data-dcnode-id="1812" instrument_node="">:</span><ul data-dcnode-id="1771"><li data-dcnode-id="1804"><span data-dcnode-id="1811" instrument_node=""> The Grand Lift of Dectus is the first hard roadblock to getting to Atlus Plateau, requiring the player to either collect two halves of a medallion in remote forts, or going through a long dungeon. There is a hidden </span><a class="twikilink" data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeAThirdOption" title="/pmwiki/pmwiki.php/Main/TakeAThirdOption"><span data-dcnode-id="1810" instrument_node="">third option</span></a><span data-dcnode-id="1808" instrument_node="">: in the Academy of Raya Lucaria, getting killed by the Abductor Virgin at the bottom of the lift </span><span class="spoiler" data-dcnode-id="1806" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1807" instrument_node="">transports you Volcano Manor, adjacent to Atlus Plateau and allowing early access to excellent loot</span></span><span data-dcnode-id="1805" instrument_node="">.</span></li><li data-dcnode-id="1799"><span data-dcnode-id="1803" instrument_node=""> One of the warps at The Four Belfries takes you to an isolated part of the late-game dungeon </span><span class="spoiler" data-dcnode-id="1801" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1802" instrument_node="">Crumbling Farum Azula</span></span><span data-dcnode-id="1800" instrument_node="">. However, it's possible to wrong warp from there so you appear at the intended start of the dungeon instead, allowing you to complete it normally and trigger the endgame.</span></li><li data-dcnode-id="1791"><span data-dcnode-id="1798" instrument_node=""> After that, it's possible in </span><span class="spoiler" data-dcnode-id="1796" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1797" instrument_node="">Leyndell, Ashen Capital</span></span><span data-dcnode-id="1795" instrument_node=""> to skip the </span><span class="spoiler" data-dcnode-id="1793" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1794" instrument_node="">Gideon and Godfrey boss fights</span></span><span data-dcnode-id="1792" instrument_node=""> through clever jumping abuse.</span></li><li data-dcnode-id="1780"><span data-dcnode-id="1790" instrument_node=""> Another odd sequence break allows you to access Leyndell without having two Great Runes. If you are able to access Deeproot Depths and defeat </span><span class="spoiler" data-dcnode-id="1788" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1789" instrument_node="">Fia's Champions</span></span><span data-dcnode-id="1787" instrument_node="">, you unlock a waygate which teleports you to Leyndell after the barrier which would have otherwise blocked you. However, accessing Deeproot Depths involves going out of the way to progress </span><span class="spoiler" data-dcnode-id="1785" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1786" instrument_node="">Ranni's sidequest</span></span><span data-dcnode-id="1784" instrument_node="">, involves defeating enemies and bosses more powerful than the dungeons containing the expected Great Runes, and results in you getting a Great Rune </span><em data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">anyways</span></em><span data-dcnode-id="1781" instrument_node="">, thus the break isn't attractive for either casual players or speedrunners.</span></li><li data-dcnode-id="1772"><span data-dcnode-id="1779" instrument_node=""> To access the Consecrated Snowfield, the game's </span><a class="twikilink" data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrutalBonusLevel" title="/pmwiki/pmwiki.php/Main/BrutalBonusLevel"><span data-dcnode-id="1778" instrument_node="">Brutal Bonus Level</span></a><span data-dcnode-id="1776" instrument_node="">, you need the two halves of the Haligtree Medallion - one half is obtained from a hidden NPC in a village in Liurnia, the other is locked behind a challenging boss in the Mountaintops of the Giants. You can skip </span><em data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">both</span></em><span data-dcnode-id="1773" instrument_node=""> with death-warp abuse; by jumping off of a cliff in the Mountaintops, you can die in range of a Stake of Marika, giving you the option to warp straight to the Snowfield, at which point it's just a matter of making a mad dash for a Grace before one of the endgame enemies takes you out.</span></li></ul></li><li data-dcnode-id="1761"><span data-dcnode-id="1769" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SerialEscalation" title="/pmwiki/pmwiki.php/Main/SerialEscalation"><span data-dcnode-id="1768" instrument_node="">Serial Escalation</span></a><span data-dcnode-id="1766" instrument_node="">: You begin the game fighting a single one of Godrick's soldiers as the first boss. Then, you fight mounted enemies in open combat, entire contingents of the Lordsworn, zombified giants, feral animals, monstrously powerful knights, and just keep scaling up and up until you're fighting </span><span class="spoiler" data-dcnode-id="1762" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1765" instrument_node="">mythological creatures, warrior-gods, avatars of the forces of nature, the setting's equivalent of Satan (two of them if you consider both Rykard and Mohg as contenders), the god of dragons, and finally the physical manifestation of the </span><em data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">natural order of the world.</span></em></span></li><li data-dcnode-id="1735"><span data-dcnode-id="1760" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SequentialBoss" title="/pmwiki/pmwiki.php/Main/SequentialBoss"><span data-dcnode-id="1759" instrument_node="">Sequential Boss</span></a><span data-dcnode-id="1757" instrument_node="">:</span><ul data-dcnode-id="1736"><li data-dcnode-id="1752"><span data-dcnode-id="1756" instrument_node=""> Several </span><a class="twikilink" data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DualBoss" title="/pmwiki/pmwiki.php/Main/DualBoss"><span data-dcnode-id="1755" instrument_node="">Dual Boss</span></a><span data-dcnode-id="1753" instrument_node=""> fights across the game have an element of this trope — rather than sic both bosses on you at the same time, you first only have to contend with one of them, and the second enemy appears after you've reduced the first to half health. If you can blitz down the first enemy quickly enough, you won't have to worry about managing both enemies at once.</span></li><li data-dcnode-id="1737"><span data-dcnode-id="1751" instrument_node=""> The final boss of the game, like </span><em data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Scholar of the First Sin</span></em><span data-dcnode-id="1748" instrument_node=""> before it, has two characters, one per phase. The first is </span><span class="spoiler" data-dcnode-id="1743" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1747" instrument_node="">Radagon of the Golden Order, </span><a class="twikilink" data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanoidAbomination" title="/pmwiki/pmwiki.php/Main/HumanoidAbomination"><span data-dcnode-id="1746" instrument_node="">or at least what's left of him</span></a><span data-dcnode-id="1744" instrument_node=""> after the Elden Ring was shattered.</span></span><span data-dcnode-id="1742" instrument_node=""> Once defeated, the </span><span class="spoiler" data-dcnode-id="1738" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="1741" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="1739" instrument_node=""> Elden Beast arrives for the grand finale.</span></span></li></ul></li><li data-dcnode-id="1699"><span data-dcnode-id="1734" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="1733" instrument_node="">Shout-Out</span></a><span data-dcnode-id="1731" instrument_node="">:</span><ul data-dcnode-id="1700"><li data-dcnode-id="1725"><span data-dcnode-id="1730" instrument_node=""> Continuing the trend of FromSoftware making </span><em data-dcnode-id="1727"><a class="twikilink" data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Berserk" title="/pmwiki/pmwiki.php/Manga/Berserk"><span data-dcnode-id="1729" instrument_node="">Berserk</span></a></em><span data-dcnode-id="1726" instrument_node=""> references in their games, the Greatsword is designed to closely resemble Guts' Dragonslayer and its description refers to it being a "coarse iron lump" which requires superhuman strength and skill to properly wield and states it is used to slaughter inhuman foes. What should be noted is the Greatsword was redesigned to be an even more blatant reference as a tribute to Miura's passing.</span></li><li data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node=""> An obscure historical reference can be found on the shore of the Weeping Peninsula. Exploring the beach players will eventually come across a corpse wearing regal clothing and sitting in a throne, a reference to the legend of King Canut commanding the tide to recede.</span></li><li data-dcnode-id="1718"><span data-dcnode-id="1722" instrument_node=""> The description for Blaidd's armor says "The pelt serves as a cape, protecting from cold. Blaidd was the blade of Ranni, </span><a class="twikilink" data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Frozen2013" title="/pmwiki/pmwiki.php/WesternAnimation/Frozen2013"><span data-dcnode-id="1721" instrument_node="">but the cold bothered him anyway</span></a><span data-dcnode-id="1719" instrument_node="">."</span></li><li data-dcnode-id="1707"><span data-dcnode-id="1717" instrument_node=""> The area in the Lake of Rot where you fight </span><span class="spoiler" data-dcnode-id="1715" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1716" instrument_node="">the Baleful Shadow of Blaidd</span></span><span data-dcnode-id="1714" instrument_node=""> looks a </span><em data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">lot</span></em><span data-dcnode-id="1711" instrument_node=""> like the painting </span><em data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Pandemonium</span></em><span data-dcnode-id="1708" instrument_node=""> by John Martin.</span></li><li data-dcnode-id="1701"><span data-dcnode-id="1706" instrument_node=""> The starting "Numen" race option is likely a reference to </span><em data-dcnode-id="1703"><a class="twikilink" data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheSilmarillion" title="/pmwiki/pmwiki.php/Literature/TheSilmarillion"><span data-dcnode-id="1705" instrument_node="">The Silmarillion</span></a></em><span data-dcnode-id="1702" instrument_node="">, where the first Men were from a land called Númenor. The reference is even stronger with the description of the Numen being said to be descended from people from another world.</span></li></ul></li><li data-dcnode-id="1694"><span data-dcnode-id="1698" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SimpleYetAwesome" title="/pmwiki/pmwiki.php/Main/SimpleYetAwesome"><span data-dcnode-id="1697" instrument_node="">Simple, yet Awesome</span></a><span data-dcnode-id="1695" instrument_node="">: The lantern is a waist-mounted light that offers a small radius of illumination but has the benefit of keeping both your hands free. The sooner you find it, the easier it is to explore the game's numerous caves or travel at night.</span></li><li data-dcnode-id="1683"><span data-dcnode-id="1693" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlaveRace" title="/pmwiki/pmwiki.php/Main/SlaveRace"><span data-dcnode-id="1692" instrument_node="">Slave Race</span></a><span data-dcnode-id="1690" instrument_node="">: Item descriptions describe the </span><a class="twikilink" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllTrollsAreDifferent" title="/pmwiki/pmwiki.php/Main/AllTrollsAreDifferent"><span data-dcnode-id="1689" instrument_node="">Trolls</span></a><span data-dcnode-id="1687" instrument_node=""> of the Lands Between are frequently enslaved by the lands' inhabitants, and are even used in </span><a class="twikilink" data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HorseOfADifferentColor" title="/pmwiki/pmwiki.php/Main/HorseOfADifferentColor"><span data-dcnode-id="1686" instrument_node="">lieu of beasts of burden</span></a><span data-dcnode-id="1684" instrument_node="">, pulling the carriages across the roads. Same can be said about the Misbegotten, winged creatures who managed to stage a bloody slave rebellion in Castle Morne, and who the blacksmith Master Hewg is of kin.</span></li><li data-dcnode-id="1675"><span data-dcnode-id="1682" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoiledCityOnAHill" title="/pmwiki/pmwiki.php/Main/SoiledCityOnAHill"><span data-dcnode-id="1681" instrument_node="">Soiled City on a Hill</span></a><span data-dcnode-id="1679" instrument_node="">: Leyndell is the impossibly huge and opulent capital of Marika's empire, and seemingly one of the only places left mostly intact by the Shattering, but it hides some seriously dark secrets. Not only are the sewers crawling with discarded Omen children whom the populace above had no desire to deal with, but buried deep beneath its surface </span><span class="spoiler" data-dcnode-id="1677" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1678" instrument_node="">are the Three Fingers, heralds of the Frenzied Flame</span></span><span data-dcnode-id="1676" instrument_node="">.</span></li><li data-dcnode-id="1670"><span data-dcnode-id="1674" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpaceCompression" title="/pmwiki/pmwiki.php/Main/SpaceCompression"><span data-dcnode-id="1673" instrument_node="">Space Compression</span></a><span data-dcnode-id="1671" instrument_node="">: The different regions the game are treated as almost distinct nations ruled by different demigods, but from the gameplay perspective they're just neighbourhoods a few minutes ride from one another. This is especially notable with Leyndell that appears enormous with its grandiose architecture and acted as the capital of Marika's world-spanning empire, but can actually crossed in mere minutes by foot.</span></li><li data-dcnode-id="1662"><span data-dcnode-id="1669" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpellBlade" title="/pmwiki/pmwiki.php/Main/SpellBlade"><span data-dcnode-id="1668" instrument_node="">Spell Blade</span></a><span data-dcnode-id="1666" instrument_node="">: One of the Ash of War skills is Carian Glintsword, which lets the Tarnished wreathe their sword in mystical energy, and charge it to create a glowing blue </span><a class="twikilink" data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BFS" title="/pmwiki/pmwiki.php/Main/BFS"><span data-dcnode-id="1665" instrument_node="">BFS</span></a><span data-dcnode-id="1663" instrument_node=""> far larger than they are tall.</span></li><li data-dcnode-id="1649"><span data-dcnode-id="1661" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpiritualSuccessor" title="/pmwiki/pmwiki.php/Main/SpiritualSuccessor"><span data-dcnode-id="1660" instrument_node="">Spiritual Successor</span></a><span data-dcnode-id="1658" instrument_node="">: As mentioned before, it is one of </span><em data-dcnode-id="1655"><a class="twikilink" data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSouls" title="/pmwiki/pmwiki.php/VideoGame/DarkSouls"><span data-dcnode-id="1657" instrument_node="">Dark Souls</span></a></em><span data-dcnode-id="1654" instrument_node="">, as it had done to </span><em data-dcnode-id="1651"><a class="twikilink" data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DemonsSouls" title="/pmwiki/pmwiki.php/VideoGame/DemonsSouls"><span data-dcnode-id="1653" instrument_node="">Demon's Souls</span></a></em><span data-dcnode-id="1650" instrument_node=""> before. It shares much of its gameplay, its classification of weaponry and spells, and even its stats. What makes it different is the new setting and being a true open-world, as well as further evolving said gameplay to accommodate.</span></li><li data-dcnode-id="1644"><span data-dcnode-id="1648" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StormOfBlades" title="/pmwiki/pmwiki.php/Main/StormOfBlades"><span data-dcnode-id="1647" instrument_node="">Storm of Blades</span></a><span data-dcnode-id="1645" instrument_node="">: One of the Ash of War skills is Glintsword Arch, which conjures a Homing-Soulmass-like sorcery in the shape of four small blades.</span></li><li data-dcnode-id="1639"><span data-dcnode-id="1643" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StormingTheCastle" title="/pmwiki/pmwiki.php/Main/StormingTheCastle"><span data-dcnode-id="1642" instrument_node="">Storming the Castle</span></a><span data-dcnode-id="1640" instrument_node="">: Stormveil Castle has two options: go head-on through the gates (which isn't advised by the gatekeeper, since it's heavily guarded), or go in through a side entrance. Outside of Stormveil, the number of castles, keeps, and forts you can find throughout The Lands Between gives you a great number of them to storm.</span></li><li data-dcnode-id="1634"><span data-dcnode-id="1638" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoryBreadcrumbs" title="/pmwiki/pmwiki.php/Main/StoryBreadcrumbs"><span data-dcnode-id="1637" instrument_node="">Story Breadcrumbs</span></a><span data-dcnode-id="1635" instrument_node="">: Very little is told upfront of the background of The Lands Between. You'll need to look over numerous item descriptions and listen in to a lot of potentially missable dialogue to be able to piece together everything surrounding the Shattering and beyond.</span></li><li data-dcnode-id="1618"><span data-dcnode-id="1633" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SufficientlyAnalyzedMagic" title="/pmwiki/pmwiki.php/Main/SufficientlyAnalyzedMagic"><span data-dcnode-id="1632" instrument_node="">Sufficiently Analyzed Magic</span></a><span data-dcnode-id="1630" instrument_node="">:</span><ul data-dcnode-id="1619"><li data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node=""> The Glintstone Academy is a direct example of this - an organization dedicated to scientific study of </span><a class="twikilink" data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicMeteor" title="/pmwiki/pmwiki.php/Main/MagicMeteor"><span data-dcnode-id="1628" instrument_node="">Magic Meteors</span></a><span data-dcnode-id="1626" instrument_node=""> and utilizing their power as magic.</span></li><li data-dcnode-id="1620"><span data-dcnode-id="1624" instrument_node=""> The Golden Order studies the Runes forming the natural order of the Lands Between, with applications from healing spells to </span><a class="twikilink" data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HardLight" title="/pmwiki/pmwiki.php/Main/HardLight"><span data-dcnode-id="1623" instrument_node="">Hard Light</span></a><span data-dcnode-id="1621" instrument_node=""> weapons.</span></li></ul></li><li data-dcnode-id="1610"><span data-dcnode-id="1617" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SupernaturalRepellent" title="/pmwiki/pmwiki.php/Main/SupernaturalRepellent"><span data-dcnode-id="1616" instrument_node="">Supernatural Repellent</span></a><span data-dcnode-id="1614" instrument_node="">: There is a torch in Caelid which is coated in a scented oil which repels beast-type enemies. Be warned, this doesn't work with every beast enemy (for example, it does </span><em data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">not</span></em><span data-dcnode-id="1611" instrument_node=""> affect the runebears).</span></li><li data-dcnode-id="1589"><span data-dcnode-id="1609" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SwordBeam" title="/pmwiki/pmwiki.php/Main/SwordBeam"><span data-dcnode-id="1608" instrument_node="">Sword Beam</span></a><span data-dcnode-id="1606" instrument_node="">:</span><ul data-dcnode-id="1590"><li data-dcnode-id="1601"><span data-dcnode-id="1605" instrument_node=""> "Storm Blade" and "Vacuum Slice" are skills which let the weapon they're equipped to fire projectiles of </span><a class="twikilink" data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RazorWind" title="/pmwiki/pmwiki.php/Main/RazorWind"><span data-dcnode-id="1604" instrument_node="">Razor Wind</span></a><span data-dcnode-id="1602" instrument_node="">.</span></li><li data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node=""> The "Sacred Blade" Ash of War allows the user to fire a golden wave of energy in a slashing motion of their blade.</span></li><li data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node=""> Both the Moonveil and the Dark Moon Greatsword can fire waves of light if their respective unique skills are used.</span></li><li data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node=""> "Reduvia Blood Blade" is a skill unique to the Reduvia Dagger, which fires crimson lacerating projectiles from the knife's edge which builds up the Hemorrhage status effect.</span></li><li data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node=""> "Blade of Gold", a skill unique to the Blade of Calling, charges the dagger with golden flames which are then shot as a single, blade-like projectile.</span></li><li data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node=""> "Wave of Destruction", the unique skill of the Ruins Greatsword, launches a massive, powerful blast of gravitational energy from the blade.</span></li></ul></li><li data-dcnode-id="1584"><span data-dcnode-id="1588" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SwordDrag" title="/pmwiki/pmwiki.php/Main/SwordDrag"><span data-dcnode-id="1587" instrument_node="">Sword Drag</span></a><span data-dcnode-id="1585" instrument_node="">: Mounted enemies can set their weapon to the side with the intent to hit, often resulting with the Tarnished launched up into the air, with the weapon potentially dragging across the ground as well. Naturally, the Tarnished can do the same in return.</span></li><li data-dcnode-id="1567"><span data-dcnode-id="1583" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeAThirdOption" title="/pmwiki/pmwiki.php/Main/TakeAThirdOption"><span data-dcnode-id="1582" instrument_node="">Take a Third Option</span></a><span data-dcnode-id="1580" instrument_node="">: During Preceptor Seluvis's sidequest, you are prompted to either </span><span class="spoiler" data-dcnode-id="1578" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1579" instrument_node="">give his potion to Nepheli as he requests, or give it to Gideon for disposal due to its suspicious nature</span></span><span data-dcnode-id="1577" instrument_node="">. There is however another option the </span><a class="twikilink" data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="1576" instrument_node="">game doesn't hint at</span></a><span data-dcnode-id="1574" instrument_node="">: you can </span><span class="spoiler" data-dcnode-id="1569" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1573" instrument_node="">give the potion to the </span><a class="twikilink" data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AssholeVictim" title="/pmwiki/pmwiki.php/Main/AssholeVictim"><span data-dcnode-id="1572" instrument_node="">Dung Eater</span></a><span data-dcnode-id="1570" instrument_node="">'s physical form, which also unlocks unique Ashes</span></span><span data-dcnode-id="1568" instrument_node="">!</span></li><li data-dcnode-id="1559"><span data-dcnode-id="1566" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TechnicolorFire" title="/pmwiki/pmwiki.php/Main/TechnicolorFire"><span data-dcnode-id="1565" instrument_node="">Technicolor Fire</span></a><span data-dcnode-id="1563" instrument_node="">: In addition to the regular kind of fire, the Lands Between have a few unusual kinds, including god-slaying black fire used by the Godskins, blood-red bloodflames which cause bleeding, </span><a class="twikilink" data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColdFlames" title="/pmwiki/pmwiki.php/Main/ColdFlames"><span data-dcnode-id="1562" instrument_node="">freezing white spiritflames</span></a><span data-dcnode-id="1560" instrument_node="">, and sleep-inducing purple fire from St. Trina's Torch.</span></li><li data-dcnode-id="1554"><span data-dcnode-id="1558" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheTimeOfMyths" title="/pmwiki/pmwiki.php/Main/TheTimeOfMyths"><span data-dcnode-id="1557" instrument_node="">The Time of Myths</span></a><span data-dcnode-id="1555" instrument_node="">: The primary setting this time around, taking lots of inspiration from Norse, Greek, and Christian mythologies as well as Arthurian legend.</span></li><li data-dcnode-id="1543"><span data-dcnode-id="1553" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TinyHeadedBehemoth" title="/pmwiki/pmwiki.php/Main/TinyHeadedBehemoth"><span data-dcnode-id="1552" instrument_node="">Tiny-Headed Behemoth</span></a><span data-dcnode-id="1550" instrument_node="">: Godrick the Grafted, a multi-armed demigod, is nearly three times the height of the Tarnished and is incredibly wide as well, although his head appears to be normal human-sized. As seen after he's defeated, he </span><em data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">used</span></em><span data-dcnode-id="1547" instrument_node=""> to be completely normal-sized but has just </span><a class="twikilink" data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BodyOfBodies" title="/pmwiki/pmwiki.php/Main/BodyOfBodies"><span data-dcnode-id="1546" instrument_node="">grafted so many body parts onto himself</span></a><span data-dcnode-id="1544" instrument_node=""> he became the giant he is now.</span></li><li data-dcnode-id="1523"><span data-dcnode-id="1542" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooAwesomeToUse" title="/pmwiki/pmwiki.php/Main/TooAwesomeToUse"><span data-dcnode-id="1541" instrument_node="">Too Awesome to Use</span></a><span data-dcnode-id="1539" instrument_node="">:</span><ul data-dcnode-id="1524"><li data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node=""> Black-Key Bolts are crossbow bolts which can inflict scarlet rot, but they're not craftable or purchaseable and you can only find a limited number of them in a single playthrough. You're better off using the craftable but slightly weaker Rotbone bolts.</span></li><li data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node=""> Your Greater Runes can empower you through use of a Rune Arc, and the boost lasts until your next death. While you can find a fair number of this item throughout your journey, it's often found in hidden corners of the map, purchased from merchants at a steep price, or earn it through multiplayer. You'd end up saving the Rune Arcs for a boss fight, but if the boss proves to be difficult despite the Rune Arc's power it can chew through your supply and you have no convenient way to replenish it. However, you can farm a decent amount rather quickly if you help others with boss fights and can consistently kill the boss.</span></li><li data-dcnode-id="1527"><span data-dcnode-id="1534" instrument_node=""> Larval Tears, which are required each time you want to respec your character, are finite and cannot be farmed as a repeatable drop. As a result, players are more hesitant to experiment with new character builds unless they're really, really sure they are good. Fortunately, the game gives over 15 of them per playthrough and any unused ones can be carried into </span><a class="twikilink" data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="1533" instrument_node="">New Game+</span></a><span data-dcnode-id="1531" instrument_node="">, which is far more generous than </span><a class="twikilink" data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSoulsIII" title="/pmwiki/pmwiki.php/VideoGame/DarkSoulsIII"><span data-dcnode-id="1530" instrument_node="">the previous game's</span></a><span data-dcnode-id="1528" instrument_node=""> hard cap of 5 rebirths per playthrough (which also included changing your character's appearance while in this game it does not).</span></li><li data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node=""> In each Journey, there are only 13 Ancient Dragon Smithing Stones, and eight of its Somber variant, the final material to max out a weapon's upgrades. Hence, there are only so many weapons that can get maxed out before one needs to start a new journey. The same goes to Great Grave Gloveworts and Great Ghost Gloveworts, where there are only eight and four of these per journey respectively.</span></li></ul></li><li data-dcnode-id="1515"><span data-dcnode-id="1522" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TopGod" title="/pmwiki/pmwiki.php/Main/TopGod"><span data-dcnode-id="1521" instrument_node="">Top God</span></a><span data-dcnode-id="1519" instrument_node="">: In a land full of demigods, Queen Marika serves as the ruler over all of them. Yet even she is second in power to the Greater Will, which seems to be more abstract than all the </span><a class="twikilink" data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PhysicalGods" title="/pmwiki/pmwiki.php/Main/PhysicalGods"><span data-dcnode-id="1518" instrument_node="">Physical Gods</span></a><span data-dcnode-id="1516" instrument_node=""> in the land.</span></li><li data-dcnode-id="1502"><span data-dcnode-id="1514" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheUndead" title="/pmwiki/pmwiki.php/Main/TheUndead"><span data-dcnode-id="1513" instrument_node="">The Undead</span></a><span data-dcnode-id="1511" instrument_node="">: As the Rune of Death was stolen from the Elden Ring, this breaks one of the central rules of the Golden Order, and it means mortals have a very hard time dying and staying dead in the Lands Between. This effectively makes every mortal who lives there a form of undead.</span><ul data-dcnode-id="1503"><li data-dcnode-id="1506"><span data-dcnode-id="1510" instrument_node=""> Many people in the Lands Between are </span><a class="twikilink" data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TechnicallyLivingZombie" title="/pmwiki/pmwiki.php/Main/TechnicallyLivingZombie"><span data-dcnode-id="1509" instrument_node="">Technically Living Zombies</span></a><span data-dcnode-id="1507" instrument_node="">. The extended succession war between the demigods has left a lot of the region devastated and impoverished, with little food or industry to be found. However, because people can't die, many are left as emaciated, weak, stumbling husks. Most have gone mad from starvation and the unending war, left wearing tattered clothes and aimlessly wandering the roads or digging in the dirt. Soldiers seem to be better off, relying on their past discipline to keep functional, but they are still mindlessly sticking to their guard posts or patrols. Very few people have any semblance of rational thought or intelligence anymore.</span></li><li data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node=""> On the other hand, there are Those Who Live In Death, which are people who have died before the Shattering and are rising from graves or catacombs as skeletons. They can be destroyed but will rise again unless their bodies are struck or they are slain with holy damage or with the Litany of Proper Death. Their existence is considered an affront to the Golden Order and so they are actively hunted down and destroyed by undead hunters.</span></li></ul></li><li data-dcnode-id="1494"><span data-dcnode-id="1501" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThunderboltIron" title="/pmwiki/pmwiki.php/Main/ThunderboltIron"><span data-dcnode-id="1500" instrument_node="">Thunderbolt Iron</span></a><span data-dcnode-id="1498" instrument_node="">: There are several weapons forged from </span><a class="twikilink" data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicMeteor" title="/pmwiki/pmwiki.php/Main/MagicMeteor"><span data-dcnode-id="1497" instrument_node="">MagicMeteors</span></a><span data-dcnode-id="1495" instrument_node=""> - the Meteoric Ore Blade katana, the Onyx and Alabaster Lords' swords, and the Meteorite Staff. The swords have innate magical damage and gravity ashes of war, and the staff buffs gravity sorceries.</span></li><li data-dcnode-id="1486"><span data-dcnode-id="1493" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TransformationIsAFreeAction" title="/pmwiki/pmwiki.php/Main/TransformationIsAFreeAction"><span data-dcnode-id="1492" instrument_node="">Transformation Is a Free Action</span></a><span data-dcnode-id="1490" instrument_node="">: When bosses transform, upgrade, or otherwise change when the fight goes into its second phase it often takes them a while, leaving them quite vulnerable. Unfortunately, your character is so well-mannered that they will politely wait for them to do so instead of just </span><a class="twikilink" data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillHimAlready" title="/pmwiki/pmwiki.php/Main/KillHimAlready"><span data-dcnode-id="1489" instrument_node="">attacking</span></a><span data-dcnode-id="1487" instrument_node="">.</span></li><li data-dcnode-id="1478"><span data-dcnode-id="1485" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TreeTopTown" title="/pmwiki/pmwiki.php/Main/TreeTopTown"><span data-dcnode-id="1484" instrument_node="">Tree Top Town</span></a><span data-dcnode-id="1482" instrument_node="">: Miquella's Haligtree is this in </span><em data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Elden Ring</span></em><span data-dcnode-id="1479" instrument_node="">. Upon arrival, the Tarnished finds themselves on the canopy of a great branching tree and must navigate down narrow branches and some platforms built into it, while fending off envoys, giant ants and scarlet rot zombies.</span></li><li data-dcnode-id="1470"><span data-dcnode-id="1477" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UndergroundLevel" title="/pmwiki/pmwiki.php/Main/UndergroundLevel"><span data-dcnode-id="1476" instrument_node="">Underground Level</span></a><span data-dcnode-id="1474" instrument_node="">: Several locations involve going into caves or mines which go deep into the earth, not to mention the </span><a class="twikilink" data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsurdlySpaciousSewer" title="/pmwiki/pmwiki.php/Main/AbsurdlySpaciousSewer"><span data-dcnode-id="1473" instrument_node="">Absurdly Spacious Sewer</span></a><span data-dcnode-id="1471" instrument_node=""> beneath Leyndell. There is also an entire underground area with its own environment, enemies, and characters which can be found from select above ground locations. Examples include the ancient cities of Nokron or Nokstella, two underground cities. There is also the Deeproot Depths, a large cavern which is basically situated around the roots of the Erdtree.</span></li><li data-dcnode-id="1465"><span data-dcnode-id="1469" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnequalRites" title="/pmwiki/pmwiki.php/Main/UnequalRites"><span data-dcnode-id="1468" instrument_node="">Unequal Rites</span></a><span data-dcnode-id="1466" instrument_node="">: There is a conflict between Fundamentalist followers of the Golden Order, practicing Faith-based incantations based off the world's natural order, and the Glintstone Academy which studies magic of the stars.</span></li><li data-dcnode-id="1445"><span data-dcnode-id="1464" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnholyNuke" title="/pmwiki/pmwiki.php/Main/UnholyNuke"><span data-dcnode-id="1463" instrument_node="">Unholy Nuke</span></a><span data-dcnode-id="1461" instrument_node="">: The </span><span class="spoiler" data-dcnode-id="1459" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1460" instrument_node="">Lord of Frenzied Flame</span></span><span data-dcnode-id="1458" instrument_node=""> ending concludes with an enormous </span><span class="spoiler" data-dcnode-id="1456" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1457" instrument_node="">Frenzy</span></span><span data-dcnode-id="1455" instrument_node=""> fireball splitting the Erdtree apart, reducing the Lands Between to half-melted ruins and ash.</span><ul data-dcnode-id="1446"><li data-dcnode-id="1447"><span data-dcnode-id="1454" instrument_node=""> Before the game's events, Malenia used a Scarlet Aeonia explosion as a </span><a class="twikilink" data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DesperationAttack" title="/pmwiki/pmwiki.php/Main/DesperationAttack"><span data-dcnode-id="1453" instrument_node="">Desperation Attack</span></a><span data-dcnode-id="1451" instrument_node=""> against Radahn. Countless years later the entire region of Caelid is still a </span><a class="twikilink" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathWorld" title="/pmwiki/pmwiki.php/Main/DeathWorld"><span data-dcnode-id="1450" instrument_node="">Death World</span></a><span data-dcnode-id="1448" instrument_node=""> infested with Scarlet Rot.</span></li></ul></li><li data-dcnode-id="1440"><span data-dcnode-id="1444" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UselessUsefulSpell" title="/pmwiki/pmwiki.php/Main/UselessUsefulSpell"><span data-dcnode-id="1443" instrument_node="">Useless Useful Spell</span></a><span data-dcnode-id="1441" instrument_node="">: There is an Ash of War for the skill "Through and Through", which is only usable on a greatbow and allows its projectiles to penetrate enemies. Only one type of greatbow which can be modified with Ashes exists and it already comes with this skill by default, and unlike melee weapons, ranged weapons cannot be given any non-Standard affinity, thus making this Ash of War completely redundant.</span></li><li data-dcnode-id="1435"><span data-dcnode-id="1439" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VancianMagic" title="/pmwiki/pmwiki.php/Main/VancianMagic"><span data-dcnode-id="1438" instrument_node="">Vancian Magic</span></a><span data-dcnode-id="1436" instrument_node="">: Sorcerors can learn dozens of spells, but they can only actively wield as many as they are able to memorize while resting at Sites of Grace. Each spell produces a distinct magical effect, such as Glintstone Pebble firing a mid-range projectile with moderate homing capability. Spells also draw from the caster's finite pool of FP, meaning a sorceror can only cast spells a limited number of times before needing to rest or drink from a Flask of Cerulean Tears.</span></li><li data-dcnode-id="1424"><span data-dcnode-id="1434" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGameCrueltyPotential" title="/pmwiki/pmwiki.php/Main/VideoGameCrueltyPotential"><span data-dcnode-id="1433" instrument_node="">Video Game Cruelty Potential</span></a><span data-dcnode-id="1431" instrument_node="">: If you're not in an area which forbids attacking, you can attack almost any NPC, even if you can't lock on to them at first. It usually takes a few swipes before they really turn hostile to prevent stray weapon swings from screwing over the player, so any NPC hostility will be of the player's own volition.</span><ul data-dcnode-id="1425"><li data-dcnode-id="1426"><span data-dcnode-id="1430" instrument_node=""> Each NPC merchant in the world drops their own Bell Bearing on death as a form of </span><a class="twikilink" data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures" title="/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures"><span data-dcnode-id="1429" instrument_node="">Anti-Frustration Features</span></a><span data-dcnode-id="1427" instrument_node=""> so the player cannot permanently lose access to their inventory. There's nothing stopping the player from murdering every merchant in the game so all the games' shops can be consolidated at the Twin Husks in the Roundtable Hold.</span></li></ul></li><li data-dcnode-id="1406"><span data-dcnode-id="1423" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGamePerversityPotential" title="/pmwiki/pmwiki.php/Main/VideoGamePerversityPotential"><span data-dcnode-id="1422" instrument_node="">Video Game Perversity Potential</span></a><span data-dcnode-id="1420" instrument_node="">: The messaging system is back, and there are some new words added to make more rude messages. Some new messages in this installment include "try fingers but hole", "offer seed", and "</span><a class="twikilink" data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Fortnite" title="/pmwiki/pmwiki.php/VideoGame/Fortnite"><span data-dcnode-id="1419" instrument_node="">fort, night</span></a><span data-dcnode-id="1417" instrument_node="">".</span><ul data-dcnode-id="1407"><li data-dcnode-id="1412"><span data-dcnode-id="1416" instrument_node=""> You can also attach gestures to messages. One naughty player got crafty and used the "Warm Welcome" gesture to stretch out his hands to </span><a class="twikilink" data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ADateWithRosiePalms" title="/pmwiki/pmwiki.php/Main/ADateWithRosiePalms"><span data-dcnode-id="1415" instrument_node="">"two-hand"</span></a><span data-dcnode-id="1413" instrument_node=""> some armor sets next to each other.</span></li><li data-dcnode-id="1408"><span data-dcnode-id="1411" instrument_node=""> Due to some third-person camera tricks, it's been proven that yes, </span><span class="spoiler" data-dcnode-id="1409" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1410" instrument_node="">the devs did render a set of underwear for Fia. And no, they aren't available for the player character to wear themselves.</span></span></li></ul></li><li data-dcnode-id="1398"><span data-dcnode-id="1405" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ViolationOfCommonSense" title="/pmwiki/pmwiki.php/Main/ViolationOfCommonSense"><span data-dcnode-id="1404" instrument_node="">Violation of Common Sense</span></a><span data-dcnode-id="1402" instrument_node="">: In Gelmir Hero’s Grave there is a chariot which kills you in one hit and a path filled with lava you can’t get past in time without being run over. How do you get past it? By going down a side path taking you to the rafters above, jumping on the chariot, and riding it to the end. </span><a class="twikilink" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="1401" instrument_node="">Good luck figuring that out without a guide</span></a><span data-dcnode-id="1399" instrument_node="">.</span></li><li data-dcnode-id="1367"><span data-dcnode-id="1397" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WakeUpCallBoss" title="/pmwiki/pmwiki.php/Main/WakeUpCallBoss"><span data-dcnode-id="1396" instrument_node="">Wake-Up Call Boss</span></a><span data-dcnode-id="1394" instrument_node="">:</span><ul data-dcnode-id="1368"><li data-dcnode-id="1390"><span data-dcnode-id="1393" instrument_node=""> One of the first trolls encountered has a high health pool, can't be snuck around, can't be guard countered, and is right in front of a band of enemies with crossbows. He serves to help get players to realize they need to level or fight dirty. </span><a class="twikilink" data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DungeonBypass" title="/pmwiki/pmwiki.php/Main/DungeonBypass"><span data-dcnode-id="1392" instrument_node="">Or you can just run past/around it.</span></a></li><li data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node=""> Margit, the Fell Omen is fast, hits hard, has many attacks at his disposal, and can take a lot of punishment. Of note is his attacks sometimes have a very long windup and strong tracking which punishes players who panic-roll at the sight of enemy movement. The difficulty of fighting him is a good measuring as stick as to what to actually expect when progressing the story, and it's an implicit message to the player to go out and explore, since they can get better equipment or even a key item which can make this fight easier.</span></li><li data-dcnode-id="1374"><span data-dcnode-id="1387" instrument_node=""> Godrick, at the end of the same dungeon Margit opens, is another test of skill. He isn't quite as aggressive as Margit, but he is </span><em data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">beefy,</span></em><span data-dcnode-id="1384" instrument_node=""> requiring a lot of attacks to bring down. With Margit, a sufficiently strong player who has been exploring the world could potentially damage race to victory, if they showed some skill; the same does </span><em data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">not</span></em><span data-dcnode-id="1381" instrument_node=""> hold true for the master of Stormveil Castle, who will punish greedy strikes and initiate attacks with odd dodging windows, forcing the player to learn how to dodge </span><em data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">properly</span></em><span data-dcnode-id="1378" instrument_node=""> and capitalize on certain attacks. His </span><span class="spoiler" data-dcnode-id="1376" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1377" instrument_node="">second phase</span></span><span data-dcnode-id="1375" instrument_node=""> is a final exam of sorts for the opening act of the game, as he becomes even more brutal, if predictable; a player who has learned their lesson and seeks out moments to strike will come out ahead, while any player still convinced they can attack mindlessly will be beaten into the ground.</span></li><li data-dcnode-id="1369"><span data-dcnode-id="1373" instrument_node=""> Carian Knight Moongrum is a miniboss situated right before the fight with Rennala. He is adept with shield, sword, and magic, and can roll out of attacks like the player. He can also parry your swings for a lethal </span><a class="twikilink" data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CriticalHit" title="/pmwiki/pmwiki.php/Main/CriticalHit"><span data-dcnode-id="1372" instrument_node="">Critical Hit</span></a><span data-dcnode-id="1370" instrument_node="">. All in all he serves to check overly aggressive players and remind them of patience in combat.</span></li></ul></li><li data-dcnode-id="1359"><span data-dcnode-id="1366" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WarIsHell" title="/pmwiki/pmwiki.php/Main/WarIsHell"><span data-dcnode-id="1365" instrument_node="">War Is Hell</span></a><span data-dcnode-id="1363" instrument_node="">: The Shattering has absolutely decimated the Lands Between, with almost every settlement in ruins and </span><strong data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">very</span></strong><span data-dcnode-id="1360" instrument_node=""> few sane civilians left in the countryside. The Tarnished's primary foes are the armies of the various demigods, who have o
