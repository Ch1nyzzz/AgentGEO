s" title="/pmwiki/pmwiki.php/Main/ExplodingBarrels"><span data-dcnode-id="3323" instrument_node="">Exploding Barrels</span></a><span data-dcnode-id="3321" instrument_node=""> stockpiled; said barrels are shown to be filled with black powder if broken), guns and cannons are almost entirely absent. The dominant projectile weapons of all armies are still bows and crossbows, and the primary artillery are still ballistae and catapults. Apparently someone did have the idea since there is a small (but </span><a class="twikilink" data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BFG" title="/pmwiki/pmwiki.php/Main/BFG"><span data-dcnode-id="3320" instrument_node="">man-portable</span></a><span data-dcnode-id="3318" instrument_node="">) </span><a class="urllink" data-dcnode-id="3315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eldenring.wiki.fextralife.com/Jar%2BCannon"><span data-dcnode-id="3317" instrument_node="">cannon</span><img data-dcnode-id="3316" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3314" instrument_node=""> in the game, but it's referred to as "experimental" and its description emphasizes how unusual it is (apparently, no one in the army carrying it knew how to use it). It seems to be based on a miniaturized version of the </span><a class="urllink" data-dcnode-id="3311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pot-de-fer"><span data-dcnode-id="3313" instrument_node="">pot-de-fer</span><img data-dcnode-id="3312" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3310" instrument_node="">, an early cannon first used in 1320s Western Europe, and uses bolts for ammunition instead of proper cannon balls. It's not that </span><a class="twikilink" data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GunsAreUseless" title="/pmwiki/pmwiki.php/Main/GunsAreUseless"><span data-dcnode-id="3309" instrument_node="">Guns Are Useless</span></a><span data-dcnode-id="3307" instrument_node=""> either; despite not having any attribute damage scaling and using subpar ammo, said small cannon deals enormous damage, something even noted by its description. The Tarnished knowing how to use it near-instinctively regardless of backstory could imply such weapons are more common outside of the Lands Between.</span></li><li data-dcnode-id="3292"><span data-dcnode-id="3305" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Fingore" title="/pmwiki/pmwiki.php/Main/Fingore"><span data-dcnode-id="3304" instrument_node="">Fingore</span></a><span data-dcnode-id="3302" instrument_node="">: The majority of multiplayer items in the game are severed fingers, including the items for leaving co-op and PVP summon signs, the consumable invasion item, and even the tool that lets you write </span><em data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">messages</span></em><span data-dcnode-id="3299" instrument_node="">. To get one of the two </span><em data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">reusable</span></em><span data-dcnode-id="3296" instrument_node=""> invasion items, </span><span class="spoiler" data-dcnode-id="3294" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3295" instrument_node="">Varré injects some of Mohg's cursed blood underneath your fingernail, turning your own finger into the "item". It's still attached to you, but the flesh has turned deathly pale and can no longer feel anything, save for constantly stinging with a sweet pain</span></span><span data-dcnode-id="3293" instrument_node="">.</span></li><li data-dcnode-id="3287"><span data-dcnode-id="3291" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FightingAShadow" title="/pmwiki/pmwiki.php/Main/FightingAShadow"><span data-dcnode-id="3290" instrument_node="">Fighting a Shadow</span></a><span data-dcnode-id="3288" instrument_node="">: Often an NPC or enemy are "just a projection" and their actual bodies are elsewhere. This is how an allied NPC can assist you with a boss fight and can get knocked out without impacting their continued presence in the story.</span></li><li data-dcnode-id="3282"><span data-dcnode-id="3286" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FireballEyeballs" title="/pmwiki/pmwiki.php/Main/FireballEyeballs"><span data-dcnode-id="3285" instrument_node="">Fireball Eyeballs</span></a><span data-dcnode-id="3283" instrument_node="">: A common trait of those gripped by the Flame of Frenzy, who can also weaponise it by shooting the flame from their eyes.</span></li><li data-dcnode-id="3268"><span data-dcnode-id="3281" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FisherKing" title="/pmwiki/pmwiki.php/Main/FisherKing"><span data-dcnode-id="3280" instrument_node="">Fisher King</span></a><span data-dcnode-id="3278" instrument_node="">: The state of the realms of the Lands Between mirror those of their lords.</span><ul data-dcnode-id="3269"><li data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node=""> Limgrave is generally calm, but dotted with a much higher than normal number of ruins, owing to it lacking a proper lord.</span></li><li data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node=""> Liurnia is covered in cool, blue water and populated mostly by the artificial Albinaurics, mimicking the colors and unnatural pursuits of the ruling House Caria.</span></li><li data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node=""> Caelid is infected to the core with Scarlet Rot, to the point that even the sky is a pallid red. Likewise, Lord Radahn has been reduced to a slavering beast by the very same disease.</span></li><li data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node=""> Altus looks like Limgrave, but all the foliage has turned golden. This reflects both the Golden motif of Marika and her disciples and the fact that the capital has fallen from the height of its power, as the leaves change in advance of winter. Its ruler is no different.</span></li></ul></li><li data-dcnode-id="3263"><span data-dcnode-id="3267" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FloatingContinent" title="/pmwiki/pmwiki.php/Main/FloatingContinent"><span data-dcnode-id="3266" instrument_node="">Floating Continent</span></a><span data-dcnode-id="3264" instrument_node="">: Farum Azula is a large castle/temple hidden above the clouds which can be accessed only after setting the Erdtree on fire. It is notably the home of the dragons and it is particularly dangerous to navigate as storms have laid ruins to it, forcing the Tarnished to sometimes jump on floating platforms and coming very close to the edge of of the buildings.</span></li><li data-dcnode-id="3136"><span data-dcnode-id="3262" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FormerlyFriendlyFamily" title="/pmwiki/pmwiki.php/Main/FormerlyFriendlyFamily"><span data-dcnode-id="3261" instrument_node="">Formerly Friendly Family</span></a><span data-dcnode-id="3259" instrument_node="">: If you expected some </span><a class="twikilink" data-dcnode-id="3257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThickerThanWater" title="/pmwiki/pmwiki.php/Main/ThickerThanWater"><span data-dcnode-id="3258" instrument_node="">Thicker Than Water</span></a><span data-dcnode-id="3256" instrument_node=""> tropes in this game, be prepared for disappointment. Most characters actively </span><em data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">hate</span></em><span data-dcnode-id="3253" instrument_node=""> their family members, and are far closer to their current group of followers and friends than their close siblings.</span><ul data-dcnode-id="3137"><li data-dcnode-id="3243"><span data-dcnode-id="3252" instrument_node=""> While Ranni </span><a class="twikilink" data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExtremelyProtectiveChild" title="/pmwiki/pmwiki.php/Main/ExtremelyProtectiveChild"><span data-dcnode-id="3251" instrument_node="">loves her birth mother</span></a><span data-dcnode-id="3249" instrument_node=""> Rennala to death </span><span class="spoiler" data-dcnode-id="3247" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3248" instrument_node="">(and seemingly gets along with Marika well enough)</span></span><span data-dcnode-id="3246" instrument_node="">, she considers Blaidd and Iji to be her real family, instead of her brothers Rykard whose territory is directly north of Liurnia, or Radahn who's off campaigning in Caelid in the southeast. </span><span class="spoiler" data-dcnode-id="3244" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3245" instrument_node="">You can be the newest addition to her 'family', too, if you complete her questline.</span></span></li><li data-dcnode-id="3226"><span data-dcnode-id="3242" instrument_node=""> Rykard's group, the Volcano Manor, is unique in the game in how </span><a class="twikilink" data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvenEvilHasLovedOnes" title="/pmwiki/pmwiki.php/Main/EvenEvilHasLovedOnes"><span data-dcnode-id="3241" instrument_node="">tight-knit and caring</span></a><span data-dcnode-id="3239" instrument_node=""> each member, all strangers from various occupations and backgrounds, towards each other is. He clearly loves Tanith (whose foreign blood and origin is looked down upon under Marika's reign) and Zorayas </span><span class="spoiler" data-dcnode-id="3237" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3238" instrument_node="">(whose mixed ancestry caused her to be ostracized)</span></span><span data-dcnode-id="3236" instrument_node="">, enough to set up several </span><a class="twikilink" data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChekhovsGun" title="/pmwiki/pmwiki.php/Main/ChekhovsGun"><span data-dcnode-id="3235" instrument_node="">Chekhov's Gun</span></a><span data-dcnode-id="3233" instrument_node=""> to make sure they're well-cared for after his 'union' with the God-Devouring Serpent. Similarly, Patches and Bernahl both are very loyal to the Volcano Manor (though Patches is only "loyal" insofar as he has an extremely blatant crush on Tanith, but that's probably the best anyone can hope for with him), and </span><a class="twikilink" data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AffablyEvil" title="/pmwiki/pmwiki.php/Main/AffablyEvil"><span data-dcnode-id="3232" instrument_node="">quite friendly</span></a><span data-dcnode-id="3230" instrument_node=""> to those who've proven themselves and are formally accepted, while also assuming </span><a class="twikilink" data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBrotherInstinct" title="/pmwiki/pmwiki.php/Main/BigBrotherInstinct"><span data-dcnode-id="3229" instrument_node="">pseudo-big brother figures</span></a><span data-dcnode-id="3227" instrument_node=""> to Zorayas.</span></li><li data-dcnode-id="3213"><span data-dcnode-id="3225" instrument_node=""> Malenia never hesitates to fight and duel her siblings to the death (apart from Miquella, obviously), but is extremely close to her army, the Cleanrot Knights, who in turn is </span><a class="twikilink" data-dcnode-id="3223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UndyingLoyalty" title="/pmwiki/pmwiki.php/Main/UndyingLoyalty"><span data-dcnode-id="3224" instrument_node="">fiercely loyal</span></a><span data-dcnode-id="3222" instrument_node=""> to her (especially </span><a class="twikilink" data-dcnode-id="3220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="3221" instrument_node="">Finlay</span></a><span data-dcnode-id="3219" instrument_node="">). </span><span class="spoiler" data-dcnode-id="3214" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3218" instrument_node="">More so than her 'daughters' who share her blood, even — she quickly </span><a class="twikilink" data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StopWorshippingMe" title="/pmwiki/pmwiki.php/Main/StopWorshippingMe"><span data-dcnode-id="3217" instrument_node="">washes her hands off them</span></a><span data-dcnode-id="3215" instrument_node=""> once she finds out they're being used as catalysts of worship by Gowry's ilk.</span></span></li><li data-dcnode-id="3185"><span data-dcnode-id="3212" instrument_node=""> Morgott and Mohg both pursues their own beliefs, </span><em data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">far</span></em><span data-dcnode-id="3209" instrument_node=""> from what's expected or demanded of them. The former is </span><a class="twikilink" data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyMasterRightOrWrong" title="/pmwiki/pmwiki.php/Main/MyMasterRightOrWrong"><span data-dcnode-id="3208" instrument_node="">unnervingly loyal</span></a><span data-dcnode-id="3206" instrument_node=""> to the Erdtree and Golden Order, </span><span class="spoiler" data-dcnode-id="3201" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3205" instrument_node="">whom even </span><em data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">his mother</span></em><span data-dcnode-id="3202" instrument_node=""> has betrayed,</span></span><span data-dcnode-id="3200" instrument_node=""> and outright denounces the rest of his still-living siblings instead of reaching out to them. </span><a class="twikilink" data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbitionIsEvil" title="/pmwiki/pmwiki.php/Main/AmbitionIsEvil"><span data-dcnode-id="3199" instrument_node="">Mohg,</span></a><span data-dcnode-id="3197" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkIsEvil" title="/pmwiki/pmwiki.php/Main/DarkIsEvil"><span data-dcnode-id="3196" instrument_node="">meanwhile...</span></a><span data-dcnode-id="3194" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DepravedHomosexual" title="/pmwiki/pmwiki.php/Main/DepravedHomosexual"><span data-dcnode-id="3193" instrument_node="">Well, the less said</span></a><span data-dcnode-id="3191" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HateSink" title="/pmwiki/pmwiki.php/Main/HateSink"><span data-dcnode-id="3190" instrument_node="">about him,</span></a><span data-dcnode-id="3188" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RapeIsASpecialKindOfEvil" title="/pmwiki/pmwiki.php/Main/RapeIsASpecialKindOfEvil"><span data-dcnode-id="3187" instrument_node="">the better.</span></a></li><li data-dcnode-id="3174"><span data-dcnode-id="3184" instrument_node=""> Similar to Malenia, Radahn is far closer to his army than anyone in the family. Heck, his idol is even his non-blood-related stepfather who's </span><a class="twikilink" data-dcnode-id="3182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheExile" title="/pmwiki/pmwiki.php/Main/TheExile"><span data-dcnode-id="3183" instrument_node="">long-banished</span></a><span data-dcnode-id="3181" instrument_node=""> from the Lands Between, and not his own father. He also </span><span class="spoiler" data-dcnode-id="3179" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3180" instrument_node="">immediately checkmates his own little sister, Ranni, the moment the Shattering ensues, even though it's long decided she, as an Empyrean, has more right to the throne than he does,</span></span><span data-dcnode-id="3178" instrument_node=""> and battles Malenia, the </span><em data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">other</span></em><span data-dcnode-id="3175" instrument_node=""> Empyrean, to very grave consequences. However, his men, Commanders, and Jerren all speak highly of him regardless of his shortcomings — ditto a lot of characters who admires his combat ability.</span></li><li data-dcnode-id="3151"><span data-dcnode-id="3173" instrument_node=""> Nepheli Loux, when you first met her, admits to a </span><a class="twikilink" data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HappilyAdopted" title="/pmwiki/pmwiki.php/Main/HappilyAdopted"><span data-dcnode-id="3172" instrument_node="">Happily Adopted</span></a><span data-dcnode-id="3170" instrument_node=""> situation where she admired her adoptive father, Sir Gideon Ofnir. However, as you continue on her quest, you both discover </span><span class="spoiler" data-dcnode-id="3156" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3169" instrument_node="">he's </span><a class="twikilink" data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbusiveParents" title="/pmwiki/pmwiki.php/Main/AbusiveParents"><span data-dcnode-id="3168" instrument_node="">not at all</span></a><span data-dcnode-id="3166" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AristocratsAreEvil" title="/pmwiki/pmwiki.php/Main/AristocratsAreEvil"><span data-dcnode-id="3165" instrument_node="">what he portrays</span></a><span data-dcnode-id="3163" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Jerkass" title="/pmwiki/pmwiki.php/Main/Jerkass"><span data-dcnode-id="3162" instrument_node="">on the surface</span></a><span data-dcnode-id="3160" instrument_node="">, resulting in them breaking their ties. However, in one of the (very) few happy NPC endings in the game, </span><a class="twikilink" data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AwLookTheyReallyDoLoveEachOther" title="/pmwiki/pmwiki.php/Main/AwLookTheyReallyDoLoveEachOther"><span data-dcnode-id="3159" instrument_node="">both parted rather amicably</span></a><span data-dcnode-id="3157" instrument_node=""> once Nepheli's crowned as Limgrave's ruler by Kenneth.</span></span><span data-dcnode-id="3155" instrument_node=""> True to this list, Gideon trusts the extremely-shady Ensha </span><span class="spoiler" data-dcnode-id="3153" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3154" instrument_node="">(and eventually you, once he fully recognizes your potential as Elden Lord late in the game)</span></span><span data-dcnode-id="3152" instrument_node=""> more than the then-loyal Nepheli.</span></li><li data-dcnode-id="3138"><span data-dcnode-id="3150" instrument_node=""> In a heartbreaking example, Diallos </span><a class="twikilink" data-dcnode-id="3148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DramaticallyMissingThePoint" title="/pmwiki/pmwiki.php/Main/DramaticallyMissingThePoint"><span data-dcnode-id="3149" instrument_node="">left the noble Hoslow family</span></a><span data-dcnode-id="3147" instrument_node=""> out of his </span><a class="twikilink" data-dcnode-id="3145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InferioritySuperiorityComplex" title="/pmwiki/pmwiki.php/Main/InferioritySuperiorityComplex"><span data-dcnode-id="3146" instrument_node="">inferiority complex</span></a><span data-dcnode-id="3144" instrument_node=""> towards his older brother, Juno, with the lore implying they parted in unfriendly terms. The former will eventually find comfort and better treatment in the Roundtable Hold, </span><span class="spoiler" data-dcnode-id="3142" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3143" instrument_node="">Volcano Manor, and finally Jarburg,</span></span><span data-dcnode-id="3141" instrument_node=""> surrounded by people whom he thinks are his new-and-improved family, not knowing his older brother loves him all along and was working hard to set up a situation where Diallos can live in comfort... </span><span class="spoiler" data-dcnode-id="3139" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3140" instrument_node="">at least, until you killed Juno as your Volcano Manor's final mission.</span></span></li></ul></li><li data-dcnode-id="3125"><span data-dcnode-id="3135" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFundamentalist" title="/pmwiki/pmwiki.php/Main/TheFundamentalist"><span data-dcnode-id="3134" instrument_node="">The Fundamentalist</span></a><span data-dcnode-id="3132" instrument_node="">: In an unusual play on the trope, because the laws of the world are artificial and bound to religious cornerstones, the so-called Fundamentalists of the Golden Order are the scientists of the Lands Between. Their equipment requires an investment in Intelligence to use, the Order has created a multitude of incantations and </span><a class="twikilink" data-dcnode-id="3130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HardLight" title="/pmwiki/pmwiki.php/Main/HardLight"><span data-dcnode-id="3131" instrument_node="">Hard Light</span></a><span data-dcnode-id="3129" instrument_node=""> weapons and tools through study of religious script, and ultimately </span><span class="spoiler" data-dcnode-id="3127" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3128" instrument_node="">they can try to fix the flaws of reality and properly mend the Elden Ring, possibly ushering in an utopia</span></span><span data-dcnode-id="3126" instrument_node="">.</span></li><li data-dcnode-id="3105"><span data-dcnode-id="3124" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStoryIntegration" title="/pmwiki/pmwiki.php/Main/GameplayAndStoryIntegration"><span data-dcnode-id="3123" instrument_node="">Gameplay and Story Integration</span></a><span data-dcnode-id="3121" instrument_node="">: In his boss fight, Radahn is </span><em data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">extremely</span></em><span data-dcnode-id="3118" instrument_node=""> susceptible to attacks which inflict </span><a class="twikilink" data-dcnode-id="3116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThePlague" title="/pmwiki/pmwiki.php/Main/ThePlague"><span data-dcnode-id="3117" instrument_node="">Scarlet Rot</span></a><span data-dcnode-id="3115" instrument_node="">, which makes sense given he has succumbed to it in the lore.</span><ul data-dcnode-id="3106"><li data-dcnode-id="3107"><span data-dcnode-id="3114" instrument_node=""> Likewise, </span><span class="spoiler" data-dcnode-id="3112" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3113" instrument_node=""> Gideon</span></span><span data-dcnode-id="3111" instrument_node=""> is very susceptible to Frenzy, as he's </span><a class="twikilink" data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoMadFromTheRevelation" title="/pmwiki/pmwiki.php/Main/GoMadFromTheRevelation"><span data-dcnode-id="3110" instrument_node="">on the brink of despair and insanity</span></a><span data-dcnode-id="3108" instrument_node=""> by the time you fight him.</span></li></ul></li><li data-dcnode-id="3065"><span data-dcnode-id="3104" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation" title="/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation"><span data-dcnode-id="3103" instrument_node="">Gameplay and Story Segregation</span></a><ul data-dcnode-id="3066"><li data-dcnode-id="3088"><span data-dcnode-id="3101" instrument_node=""> In the lore, the </span><a class="twikilink" data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThePlague" title="/pmwiki/pmwiki.php/Main/ThePlague"><span data-dcnode-id="3100" instrument_node="">Scarlet Rot</span></a><span data-dcnode-id="3098" instrument_node=""> is </span><em data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">very</span></em><span data-dcnode-id="3095" instrument_node=""> infectious and incurable even to the Demigods </span><span class="spoiler" data-dcnode-id="3093" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3094" instrument_node="">as Radahn and Malenia can certainly attest to</span></span><span data-dcnode-id="3092" instrument_node="">. In-game, its the </span><em data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Elden Ring</span></em><span data-dcnode-id="3089" instrument_node=""> equivalent of Toxic or Rapid Poison for the Tarnished, it can be cured and doesn't persist after death. You can even casually hang out near its victims or in environments tainted by it and not catch it.</span></li><li data-dcnode-id="3071"><span data-dcnode-id="3087" instrument_node=""> Related to the above, there are a significant number of things in the lore which can put down the Tarnished </span><em data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">permanently</span></em><span data-dcnode-id="3084" instrument_node=""> (and many Tarnished before you </span><em data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">have</span></em><span data-dcnode-id="3081" instrument_node=""> fallen to these things), most prominently being Godrick's method of grafting them into his </span><a class="twikilink" data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BodyOfBodies" title="/pmwiki/pmwiki.php/Main/BodyOfBodies"><span data-dcnode-id="3080" instrument_node="">Body of Bodies</span></a><span data-dcnode-id="3078" instrument_node=""> </span><em data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">alive</span></em><span data-dcnode-id="3075" instrument_node=""> (which prevents them from simply dying and coming back), the Scarlet Rot above (which can infect the mind and reduce it to nothing) or the Rune of Death (which can kill nearly </span><em data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">anything</span></em><span data-dcnode-id="3072" instrument_node=""> in the setting). However, even when you are killed by enemies who have these means in gameplay, you still revive just like when you are killed by anything else. This is handwaved in some cases, with Godrick in particular sneering at the Tarnished player character, "Thou art unworthy even to graft..." after slaying them.</span></li><li data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node=""> Under normal circumstances, the player's first Great Rune will come from defeating Godrick, something the Two Fingers will commend you on. Should you get your first Great Rune from Rennala, Radahn, or Rykard, the Two Fingers will still act as if you had killed Godrick.</span></li><li data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node=""> After defeating Starscourge Radahn, you can find Iron Fist Alexander on the battlefield, lamenting how he was defeated with "a single blow" and afterward "hid like a coward," except anyone who summons him for the boss battle can see this is not even remotely true: while Alexander doesn't last long against Radahn (then again, neither does anyone except Blaidd) he puts in a decent effort, takes more than a single hit to down and jumps right back into the fray when resummoned. He says the same thing if you just walk in over-leveled and curb-stomp Radahn on your own, even though you would have never summoned him.</span></li></ul></li><li data-dcnode-id="3060"><span data-dcnode-id="3064" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiantEnemyCrab" title="/pmwiki/pmwiki.php/Main/GiantEnemyCrab"><span data-dcnode-id="3063" instrument_node="">Giant Enemy Crab</span></a><span data-dcnode-id="3061" instrument_node="">: The Lands Between is populated by massive, highly-aggressive crabs and lobsters that litter bodies of water. Some will remain hidden under the sand until the player steps into their aggro range, causing them to pop out and start wailing on you.</span></li><li data-dcnode-id="3055"><span data-dcnode-id="3059" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiantSpaceFleaFromNowhere" title="/pmwiki/pmwiki.php/Main/GiantSpaceFleaFromNowhere"><span data-dcnode-id="3058" instrument_node="">Giant Space Flea from Nowhere</span></a><span data-dcnode-id="3056" instrument_node="">: In the outskirts of Leyndell, you can encounter a seemingly normal soldier encampment... then an a giant Ulcerated Tree Spirit appears above it in a flash of light and falls on it, completely crushing it. Then it decides to kill you for good measure.</span></li><li data-dcnode-id="3050"><span data-dcnode-id="3054" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreatOffscreenWar" title="/pmwiki/pmwiki.php/Main/GreatOffscreenWar"><span data-dcnode-id="3053" instrument_node="">Great Offscreen War</span></a><span data-dcnode-id="3051" instrument_node="">: The Shattering, while shown in the opening cutscene and in the Story Trailer, has long since occurred by the time the Tarnished arrives in the Lands Between. Details and events that transpired during the war can be found either by talking with NPCs or reading certain item descriptions. It still continues in a lower intensity in the present (e.g. Godrick's army constantly fighting the Misbegotten and Demi-Human raiders, the fights between Morgott and Rykard's men on the Altus-Gelmir border, the Carian royals' puppet soldiers fighting the Cuckoo company troops throughout Liurnia, fire cultists setting up outposts in Altus that occasionally skirmish with Morgott's patrols) but the greatest battles have long since passed.</span></li><li data-dcnode-id="3045"><span data-dcnode-id="3049" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreenHillZone" title="/pmwiki/pmwiki.php/Main/GreenHillZone"><span data-dcnode-id="3048" instrument_node="">Green Hill Zone</span></a><span data-dcnode-id="3046" instrument_node="">: Limgrave, the starter zone, is this in Elden Ring although a few tough enemies do roam around. It is a relatively beautiful land full of greenery and with few tough enemies where it is easy and safe to navigate, at least as long as the Tarnished sticks to the roads.</span></li><li data-dcnode-id="2975"><span data-dcnode-id="3044" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="3043" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="3041" instrument_node="">: It wouldn't be a FromSoft game without it.</span><ul data-dcnode-id="2976"><li data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node=""> Passive effects, temporary or otherwise, which appear under your character's health/mana/stamina bars remain unexplained and are hard to check. You can work out most of them by guesswork, especially since most of them come from your amulets, but a few others go largely unexplained unless you dig into description texts. There are stories of people playing the whole game with the -5% health debuff from hugging Fia active, simply because they had no idea they even had such a debuff, or even if they noticed the icon, didn't know what it meant.</span></li><li data-dcnode-id="3034"><span data-dcnode-id="3038" instrument_node=""> Want to actually make use of the Summoning Ashes you collect throughout the game? You'll have to </span><span class="spoiler" data-dcnode-id="3036" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3037" instrument_node="">backtrack to the Church of Elleh in Limgrave after getting Torrent, than talk to the new NPC who appears only at night</span></span><span data-dcnode-id="3035" instrument_node=""> (Though it's also purchasable later from the Roundtable Hold). Want to upgrade your spirit ashes so they don't fall behind as you enter tougher areas? You're required to precisely follow a certain character's questline, with the game giving few hints at who this character even is or how to convince them to take up the craft.</span></li><li data-dcnode-id="3019"><span data-dcnode-id="3033" instrument_node=""> In good </span><em data-dcnode-id="3030"><a class="twikilink" data-dcnode-id="3031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/FromSoftware" title="/pmwiki/pmwiki.php/Creator/FromSoftware"><span data-dcnode-id="3032" instrument_node="">FromSoftware</span></a></em><span data-dcnode-id="3029" instrument_node=""> tradition, quests are as frustratingly easy to miss or get stuck on as ever. As in previous games, </span><em data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">Elden Ring</span></em><span data-dcnode-id="3026" instrument_node=""> initially provided nothing for finding characters. Add to this the open-world nature of the game, it becomes even easier to miss key characters and events required to progress questlines. Finally, certain characters' questlines interconnect with, and in some cases, </span><a class="twikilink" data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PermanentlyMissableContent" title="/pmwiki/pmwiki.php/Main/PermanentlyMissableContent"><span data-dcnode-id="3025" instrument_node="">completely cut off</span></a><span data-dcnode-id="3023" instrument_node=""> the questlines of other characters. Fortunately, a band-aid solution to part of this was added with one patch, which started showing merchants and friendly characters on the world map, but </span><em data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">only</span></em><span data-dcnode-id="3020" instrument_node=""> if you have talked to them or passed very close to them, so it is still easy to still miss them entirely.</span></li><li data-dcnode-id="2996"><span data-dcnode-id="3018" instrument_node=""> The steps required to start up the </span><a class="twikilink" data-dcnode-id="3016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheConspiracy" title="/pmwiki/pmwiki.php/Main/TheConspiracy"><span data-dcnode-id="3017" instrument_node="">lore-heavy</span></a><span data-dcnode-id="3015" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3013" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3014" instrument_node="">Black Knife</span></span><span data-dcnode-id="3012" instrument_node=""> quest are incredibly obscure. To get on the trail of this questline, the Tarnished must enter a very well hidden section in </span><span class="spoiler" data-dcnode-id="3010" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3011" instrument_node="">Stormveil Castle</span></span><span data-dcnode-id="3009" instrument_node="">, where after defeating a miniboss they must then interact with a bloodstain. The bloodstain points to the next character they must talk to. After talking to several characters, the Tarnished must then travel to a certain catacombs and defeat a boss there for its drop. </span><span class="spoiler" data-dcnode-id="3004" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3008" instrument_node="">The catch is there's </span><em data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">two</span></em><span data-dcnode-id="3005" instrument_node=""> bosses in the area, and the one to look for is in a secret area.</span></span><span data-dcnode-id="3003" instrument_node=""> To put mildly, this is a </span><em data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">very</span></em><span data-dcnode-id="3000" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="2999" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="2997" instrument_node=""> heavy quest, though its relevance boils down to altered dialogue for another questline.</span></li><li data-dcnode-id="2985"><span data-dcnode-id="2995" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="2993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusBoss" title="/pmwiki/pmwiki.php/Main/BonusBoss"><span data-dcnode-id="2994" instrument_node="">Bonus Boss</span></a><span data-dcnode-id="2992" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2990" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2991" instrument_node="">Mohg, Lord of Blood</span></span><span data-dcnode-id="2989" instrument_node=""> will apply a curse to you in the first half of the fight they activate during their transition to the second phase of the fight. Upon activating, the curse will inflict heavy damage on you 3 times in pretty rapid succession, requiring you to heal yourself a few times if you do not wish to die. This is completely unavoidable and is rough considering the boss can be a pain as is. That is unless you complete a specific questline, specifically </span><span class="spoiler" data-dcnode-id="2987" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2988" instrument_node="">Bloody Finger Hunter Yura</span></span><span data-dcnode-id="2986" instrument_node="">'s questline. At the end, you'll receive a special tear for your Flask of Wonderous Physick whose sole use is to remove said curse. While there is a connection between Mohg and that questline, it's never outright stated and one could easily overlook it, especially if they never found the easy to miss second step of said questline.</span></li><li data-dcnode-id="2977"><span data-dcnode-id="2984" instrument_node=""> Some loot drops are rare but sensical for where they come from. One example where this isn't the case is the Haligtree Crest Greatshield. While it would seem it would drop from any Haligtree Knight as they all have shields, it only drops from </span><em data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">one</span></em><span data-dcnode-id="2981" instrument_node=""> non-bow, non-partisan wielding Knight who is tucked away around the church leading to </span><span class="spoiler" data-dcnode-id="2979" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2980" instrument_node="">Malenia's</span></span><span data-dcnode-id="2978" instrument_node=""> boss arena. And there is no indication as to why this is case.</span></li></ul></li><li data-dcnode-id="2959"><span data-dcnode-id="2974" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HardLevelsEasyBosses" title="/pmwiki/pmwiki.php/Main/HardLevelsEasyBosses"><span data-dcnode-id="2973" instrument_node="">Hard Levels, Easy Bosses</span></a><span data-dcnode-id="2971" instrument_node="">:</span><ul data-dcnode-id="2960"><li data-dcnode-id="2963"><span data-dcnode-id="2970" instrument_node=""> Certain dungeons in the Lands Between tend to possess much easier bosses than the path it takes to get to them in the first place. Since there's only </span><em data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">one</span></em><span data-dcnode-id="2967" instrument_node=""> site of grace that's located at the entrance of all of them, with maybe a Stake of Marika near the boss arena, dying will force you to </span><a class="twikilink" data-dcnode-id="2965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CheckpointStarvation" title="/pmwiki/pmwiki.php/Main/CheckpointStarvation"><span data-dcnode-id="2966" instrument_node="">start all the way back at the beginning</span></a><span data-dcnode-id="2964" instrument_node="">. Consequently, the dungeon bosses are, while not all of them are necessarily easy, tend to be much simpler to deal with when properly equipped.</span></li><li data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node=""> Raya Lucaria Academy has a lot of Sorcerers that will spam glintsone pebbles and other sorceries that will make it a massive pain to deal with. On the other hand, the last boss of this dungeon, Rennala, has a much simpler gimmick that doesn't involve spamming said pebbles.</span></li></ul></li><li data-dcnode-id="2954"><span data-dcnode-id="2958" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HealItWithFire" title="/pmwiki/pmwiki.php/Main/HealItWithFire"><span data-dcnode-id="2957" instrument_node="">Heal It with Fire</span></a><span data-dcnode-id="2955" instrument_node="">: The "Flame, Cleanse Me" incantation allows you to cure poison and scarlet rot by setting yourself on fire for a nanosecond. You lose a small amount of HP but it pales in comparison to waiting out poison or rot damage.</span></li><li data-dcnode-id="2936"><span data-dcnode-id="2953" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HighFantasy" title="/pmwiki/pmwiki.php/Main/HighFantasy"><span data-dcnode-id="2952" instrument_node="">High Fantasy</span></a><span data-dcnode-id="2950" instrument_node="">: While FromSoft has toyed with this aesthetic in the past (see </span><em data-dcnode-id="2947"><a class="twikilink" data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/DarkSoulsII" title="/pmwiki/pmwiki.php/Videogame/DarkSoulsII"><span data-dcnode-id="2949" instrument_node="">Dark Souls II</span></a></em><span data-dcnode-id="2946" instrument_node="">), </span><em data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Elden Ring</span></em><span data-dcnode-id="2943" instrument_node=""> sees them fully embrace it. The world is significantly larger and filled with all manner of creatures, and massive vistas of impossible size and scope are common to see. One of the first things the player sees is the gargantuan Erdtree stretching out into the skyline, bathing the entire world in a ray of golden light, and things only get grander from there. In an interesting twist, the Lands Between has just been through a particularly nasty war, thus scarring the once beautiful landscape in a heaping pile of </span><a class="twikilink" data-dcnode-id="2941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SceneryGorn" title="/pmwiki/pmwiki.php/Main/SceneryGorn"><span data-dcnode-id="2942" instrument_node="">Scenery Gorn</span></a><span data-dcnode-id="2940" instrument_node="">. This, combined with other dark elements, makes the Lands Between an interesting blend between High Fantasy and </span><a class="twikilink" data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkFantasy" title="/pmwiki/pmwiki.php/Main/DarkFantasy"><span data-dcnode-id="2939" instrument_node="">Dark Fantasy</span></a><span data-dcnode-id="2937" instrument_node="">. One could describe it as "the apocalypse of a High Fantasy setting".</span></li><li data-dcnode-id="2931"><span data-dcnode-id="2935" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HolyHandGrenade" title="/pmwiki/pmwiki.php/Main/HolyHandGrenade"><span data-dcnode-id="2934" instrument_node="">Holy Hand Grenade</span></a><span data-dcnode-id="2932" instrument_node="">: Among the various elemental damage types is 'Holy' damage, which is highly effective against undead enemies. It's also possible to craft Holy firebombs, meaning you can even throw literal holy hand grenades if you want.</span></li><li data-dcnode-id="2926"><span data-dcnode-id="2930" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HomeOfTheGods" title="/pmwiki/pmwiki.php/Main/HomeOfTheGods"><span data-dcnode-id="2929" instrument_node="">Home of the Gods</span></a><span data-dcnode-id="2927" instrument_node="">: The Lands Between is the mythological home of Queen Marika and her brood.</span></li><li data-dcnode-id="2918"><span data-dcnode-id="2925" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HorseOfADifferentColor" title="/pmwiki/pmwiki.php/Main/HorseOfADifferentColor"><span data-dcnode-id="2924" instrument_node="">Horse of a Different Color</span></a><span data-dcnode-id="2922" instrument_node="">: In a twisted usage of this trope, the various traveling caravans of the Lands Between use Trolls to drag their wagons like they're horses or oxen, and are connected with said wagon by being </span><em data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">impaled through the chest</span></em><span data-dcnode-id="2919" instrument_node=""> with a huge pike.</span></li><li data-dcnode-id="2907"><span data-dcnode-id="2917" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImprobablePowerDiscrepancy" title="/pmwiki/pmwiki.php/Main/ImprobablePowerDiscrepancy"><span data-dcnode-id="2916" instrument_node="">Improbable Power Discrepancy</span></a><span data-dcnode-id="2914" instrument_node="">: Not as bad as a lot of RPGs, but far more noticeable than in the </span><em data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Soulsborne</span></em><span data-dcnode-id="2911" instrument_node=""> games due to the game's length meaning damage scales higher and enemies get repeated more often. For example, the Lordsworn soldiers in the Haligtree have almost literally ten times the hit points as the ones in Limgrave, despite both groups being </span><a class="twikilink" data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Muggles" title="/pmwiki/pmwiki.php/Main/Muggles"><span data-dcnode-id="2910" instrument_node="">Muggles</span></a><span data-dcnode-id="2908" instrument_node=""> with identical animations, lore, and models (bar the surcoats designating them as Malenia and Miquella's troops instead of Godrick's), solely because the Haligtree is an end-game area and Limgrave is the starting one.</span></li><li data-dcnode-id="2896"><span data-dcnode-id="2906" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InUniverseGameClock" title="/pmwiki/pmwiki.php/Main/InUniverseGameClock"><span data-dcnode-id="2905" instrument_node="">In-Universe Game Clock</span></a><span data-dcnode-id="2903" instrument_node="">: The game features a </span><a class="twikilink" data-dcnode-id="2901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGameTime" title="/pmwiki/pmwiki.php/Main/VideoGameTime"><span data-dcnode-id="2902" instrument_node="">dynamic</span></a><span data-dcnode-id="2900" instrument_node=""> day/night cycle, with the Tarnished also being able to switch between these while resting at graces at their convenience. Some enemies, like </span><a class="twikilink" data-dcnode-id="2898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BatOutOfHell" title="/pmwiki/pmwiki.php/Main/BatOutOfHell"><span data-dcnode-id="2899" instrument_node="">the Giant Bats</span></a><span data-dcnode-id="2897" instrument_node="">, become more aggressive during the night, and a few night-exclusive field bosses start roaming around the map.</span></li><li data-dcnode-id="2891"><span data-dcnode-id="2895" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterchangeableAntimatterKeys" title="/pmwiki/pmwiki.php/Main/InterchangeableAntimatterKeys"><span data-dcnode-id="2894" instrument_node="">Interchangeable Antimatter Keys</span></a><span data-dcnode-id="2892" instrument_node="">: The stonesword keys are magical stone keys that can be placed in certain statues throughout the world. Placing a key will open the adjacent magical barrier, but will also use up the key.</span></li><li data-dcnode-id="2886"><span data-dcnode-id="2890" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterfaceScrew" title="/pmwiki/pmwiki.php/Main/InterfaceScrew"><span data-dcnode-id="2889" instrument_node="">Interface Screw</span></a><span data-dcnode-id="2887" instrument_node="">: The frozen lake in east Mountaintops of the Giants engulfs you in a heavy blizzard which impedes vision as a dragon makes its presence known. The southern half of the Consecrated Snowfields is also cloaked in a dense snowstorm, with the only clear way forward being marked by lights dotting the area.</span></li><li data-dcnode-id="2870"><span data-dcnode-id="2885" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Irony" title="/pmwiki/pmwiki.php/Main/Irony"><span data-dcnode-id="2884" instrument_node="">Irony</span></a><span data-dcnode-id="2882" instrument_node="">:</span><ul data-dcnode-id="2871"><li data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node=""> A meta example. For a game with a heavy finger motif (the being the Tarnished works for is called the Two Fingers, there are dismembered fingers which are means to the game's multiplayer, and all the multiplayer role titles all have "finger" in them), it's interesting rings were removed as an accessory (outside of two which are meant for anti-invader purposes, but they work differently than old rings). Instead, these are replaced with the functionally similar talismans.</span></li><li data-dcnode-id="2872"><span data-dcnode-id="2879" instrument_node=""> Another meta example is, in </span><em data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Dark Souls</span></em><span data-dcnode-id="2876" instrument_node="">, lightning served as Gwyn's greatest weapon against the dragon horde, being one of their few weaknesses. </span><em data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">Elden Ring</span></em><span data-dcnode-id="2873" instrument_node=""> has Lightning be the domain of dragons, with all of the lightning spells learned coming either from draconic scripture or from powerful dragon bosses.</span></li></ul></li><li data-dcnode-id="2865"><span data-dcnode-id="2869" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IronicName" title="/pmwiki/pmwiki.php/Main/IronicName"><span data-dcnode-id="2868" instrument_node="">Ironic Name</span></a><span data-dcnode-id="2866" instrument_node="">: The rotted hellscape East of Limgrave is called Caelid, which means "The Heavens" in Latin.</span></li><li data-dcnode-id="2857"><span data-dcnode-id="2864" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KamehameHadoken" title="/pmwiki/pmwiki.php/Main/KamehameHadoken"><span data-dcnode-id="2863" instrument_node="">Kamehame Hadoken</span></a><span data-dcnode-id="2861" instrument_node="">: One of the Sorceries charges and fires a massive beam of blue energy, reminiscent of the Soul Stream spell from </span><em data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">Dark Souls III</span></em><span data-dcnode-id="2858" instrument_node="">.</span></li><li data-dcnode-id="2852"><span data-dcnode-id="2856" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KickThemWhileTheyAreDown" title="/pmwiki/pmwiki.php/Main/KickThemWhileTheyAreDown"><span data-dcnode-id="2855" instrument_node="">Kick Them While They Are Down</span></a><span data-dcnode-id="2853" instrument_node="">: Gatekeeper Gostoc, who you meet near the entrance to Stormveil Castle, is seen stomping on Godrick's dead body after you defeat him, cursing at him and talking about how it feels good to be free.</span></li><li data-dcnode-id="2845"><span data-dcnode-id="2851" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillTheGod" title="/pmwiki/pmwiki.php/Main/KillTheGod"><span data-dcnode-id="2850" instrument_node="">Kill the God</span></a><span data-dcnode-id="2848" instrument_node="">: The main storyline follows the Tarnished as they make their way up Queen Marika's family tree, killing her demi-god descendants in order to reforge the Elden Ring. They start out with Godrick, one of her distant relatives, and eventually make their way all the way up to </span><span class="spoiler" data-dcnode-id="2846" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2847" instrument_node="">Radagon, her second husband, and then finally squaring off and besting the Elden Beast. The game's final victory message isn't the usual "Greater Enemy Felled", but "God Slain".</span></span></li><li data-dcnode-id="2834"><span data-dcnode-id="2844" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaserBlade" title="/pmwiki/pmwiki.php/Main/LaserBlade"><span data-dcnode-id="2843" instrument_node="">Laser Blade</span></a><span data-dcnode-id="2841" instrument_node="">: The Coded Sword is a sword with a blade purely made of holy runes, with the only physical part being the handle and guard. It fittingly only deals Holy damage and requires no physical stats to wield, just a </span><em data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">really</span></em><span data-dcnode-id="2838" instrument_node=""> high amount of Faith. For those who would like to be able to create a </span><a class="twikilink" data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaserBlade" title="/pmwiki/pmwiki.php/Main/LaserBlade"><span data-dcnode-id="2837" instrument_node="">Laser Blade</span></a><span data-dcnode-id="2835" instrument_node=""> as an extension around another weapon, there's also the Carian Grandeur Art of War, the default art of the Carian Knight's Sword, which creates a large magical aura around the weapon it's on, which gets very large if you charge it.</span></li><li data-dcnode-id="2824"><span data-dcnode-id="2833" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LastSecondEndingChoice" title="/pmwiki/pmwiki.php/Main/LastSecondEndingChoice"><span data-dcnode-id="2832" instrument_node="">Last-Second Ending Choice</span></a><span data-dcnode-id="2830" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayedWith" title="/pmwiki/pmwiki.php/Main/PlayedWith"><span data-dcnode-id="2829" instrument_node="">Played With</span></a><span data-dcnode-id="2827" instrument_node="">; </span><span class="spoiler" data-dcnode-id="2825" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2826" instrument_node="">After defeating Radagon and the Elden Beast you are sent back to the interior of the Erdtree where Marika's shattered body is waiting for you to decide her fate. If you've completed Ranni's questline you can summon her for the Age of the Stars ending, or you can interact with Marika's body to activate the Elden Lord ending or any of its variants based on what Mending Runes you have acquired up to this point. However, there is a Site of Grace within the Erdtree that you can activate, allowing you to leave, gather up a new Mending Rune or complete Ranni's questline, and then come back and get the ending you want. However, if the Frenzied Flame is inherited and wasn't neutralized with Miquella's Needle, this will bar the Elden Lord endings for a Lord of Frenzied Flame ending, with the Age of the Stars ending as the only other option.</span></span></li><li data-dcnode-id="2819"><span data-dcnode-id="2823" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LateToTheTragedy" title="/pmwiki/pmwiki.php/Main/LateToTheTragedy"><span data-dcnode-id="2822" instrument_node="">Late to the Tragedy</span></a><span data-dcnode-id="2820" instrument_node="">: By the time the Tarnished awakens and enters Limgrave, the Shattering has already happened. The land was ravaged by the war, the devastation evident everywhere, with the Caelid even subsumed in a horrid scarlet rot. The actual timeframe since the Shattering is ambiguous, but it could've been from a few decades to even a century or more.</span></li><li data-dcnode-id="2814"><span data-dcnode-id="2818" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LegendaryWeapon" title="/pmwiki/pmwiki.php/Main/LegendaryWeapon"><span data-dcnode-id="2817" instrument_node="">Legendary Weapon</span></a><span data-dcnode-id="2815" instrument_node="">: There are nine "Legendary Armaments" that count towards an achievement of the same name. For example, there is the Grafted Blade Greatsword found in Castle Morne; a legendary Colossal Sword once wielded by a champion seeking revenge.</span></li><li data-dcnode-id="2809"><span data-dcnode-id="2813" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LethalLavaLand" title="/pmwiki/pmwiki.php/Main/LethalLavaLand"><span data-dcnode-id="2812" instrument_node="">Lethal Lava Land</span></a><span data-dcnode-id="2810" instrument_node="">: The area around the aptly named Volcano Manor is covered in lava and is particularly tricky to navigate. The town behind Volcano Manor is a ruin seemingly destroyed by an eruption and the streets have become rivers of flowing lava, forcing the Tarnished to find a way to walk on the roofs or find the few patches of solid rock, which are invariably occupied by burning slugs.</span></li><li data-dcnode-id="2770"><span data-dcnode-id="2808" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LighterAndSofter" title="/pmwiki/pmwiki.php/Main/LighterAndSofter"><span data-dcnode-id="2807" instrument_node="">Lighter and Softer</span></a><span data-dcnode-id="2805" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayedWith" title="/pmwiki/pmwiki.php/Main/PlayedWith"><span data-dcnode-id="2804" instrument_node="">Played With</span></a><span data-dcnode-id="2802" instrument_node="">. Compared to </span><em data-dcnode-id="2799"><a class="twikilink" data-dcnode-id="2800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSouls" title="/pmwiki/pmwiki.php/VideoGame/DarkSouls"><span data-dcnode-id="2801" instrument_node="">Dark Souls</span></a></em><span data-dcnode-id="2798" instrument_node=""> or </span><em data-dcnode-id="2795"><a class="twikilink" data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Bloodborne" title="/pmwiki/pmwiki.php/VideoGame/Bloodborne"><span data-dcnode-id="2797" instrument_node="">Bloodborne</span></a></em><span data-dcnode-id="2794" instrument_node="">, while civilization in the Lands Between has mostly collapsed and monsters run rampant, several areas, especially Limgrave and Liurnia, are green and flourishing. </span><a class="twikilink" data-dcnode-id="2792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCorruption" title="/pmwiki/pmwiki.php/Main/TheCorruption"><span data-dcnode-id="2793" instrument_node="">The Corruption</span></a><span data-dcnode-id="2791" instrument_node=""> is safely confined to a single area, and even with the Elden Ring shattered, the world does not seem to be in any danger of ending </span><span class="spoiler" data-dcnode-id="2789" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2790" instrument_node="">unless the Tarnished does it themselves</span></span><span data-dcnode-id="2788" instrument_node="">, with references to other lands which seem to be doing perfectly fine. And some of the endings of </span><em data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Elden Ring</span></em><span data-dcnode-id="2785" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2781" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2784" instrument_node="">can be considered </span><a class="twikilink" data-dcnode-id="2782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarnYourHappyEnding" title="/pmwiki/pmwiki.php/Main/EarnYourHappyEnding"><span data-dcnode-id="2783" instrument_node="">decidedly happy and triumphant</span></a></span><span data-dcnode-id="2780" instrument_node="">. On the other hand, at an interpersonal level the game can be considered very much </span><a class="twikilink" data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkerAndEdgier" title="/pmwiki/pmwiki.php/Main/DarkerAndEdgier"><span data-dcnode-id="2779" instrument_node="">Darker and Edgier</span></a><span data-dcnode-id="2777" instrument_node="">, inspiring alarming levels of </span><a class="twikilink" data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdultFear" title="/pmwiki/pmwiki.php/Main/AdultFear"><span data-dcnode-id="2776" instrument_node="">Adult Fear</span></a><span data-dcnode-id="2774" instrument_node="">. Dark and </span><em data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">very</span></em><span data-dcnode-id="2771" instrument_node=""> real issues like incest, rape, and the cost of war are on full display, not just in lore and item descriptions, but in the world and quests itself, and the far more detailed backstories and personalities of NPCs lead to layers of tragedy that have never been broached.</span></li><li data-dcnode-id="2756"><span data-dcnode-id="2769" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LightningBruiser" title="/pmwiki/pmwiki.php/Main/LightningBruiser"><span data-dcnode-id="2768" instrument_node="">Lightning Bruiser</span></a><span data-dcnode-id="2766" instrument_node="">:</span><ul data-dcnode-id="2757"><li data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node=""> Godrick the Grafted is not only immensely large, he's also very agile, able to jump and spin his axe midair with ease.</span></li><li data-dcnode-id="2758"><span data-dcnode-id="2763" instrument_node=""> The Beastman of Farum Azula wields a rather large weapon reminiscent of </span><em data-dcnode-id="2760"><a class="twikilink" data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaBreathOfTheWild" title="/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaBreathOfTheWild"><span data-dcnode-id="2762" instrument_node="">Breath of the Wild</span></a></em><span data-dcnode-id="2759" instrument_node="">'s rock smashers, but is surprisingly quick and agile, making fast combos which can move him long distances.</span></li></ul></li><li data-dcnode-id="2748"><span data-dcnode-id="2755" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LinearWarriorsQuadraticWizards" title="/pmwiki/pmwiki.php/Main/LinearWarriorsQuadraticWizards"><span data-dcnode-id="2754" instrument_node="">Linear Warriors, Quadratic Wizards</span></a><span data-dcnode-id="2752" instrument_node="">: Basic melee is about of the same level of strength and usefulness from start to finish while magic, sorcery in particular, starts out as a bit weak, but then shoots up in power around mid to late game, particularly once more powerful sorceries and staffs are found and become useable. Gaining the Meteor Staff and Rock Sling spells in particular serve as a midgame boost in power (unless you know where they are already, in which case you can pick them up rather early for a </span><a class="twikilink" data-dcnode-id="2750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiscOneNuke" title="/pmwiki/pmwiki.php/Main/DiscOneNuke"><span data-dcnode-id="2751" instrument_node="">Disc-One Nuke</span></a><span data-dcnode-id="2749" instrument_node="">).</span></li><li data-dcnode-id="2730"><span data-dcnode-id="2747" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LiteralMetaphor" title="/pmwiki/pmwiki.php/Main/LiteralMetaphor"><span data-dcnode-id="2746" instrument_node="">Literal Metaphor</span></a><span data-dcnode-id="2744" instrument_node="">: A recurring theme.</span><ul data-dcnode-id="2731"><li data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node=""> The debut trailer described the Elden Ring as "that which commanded the stars". Turns out that wasn't just flowery language; the Elden Ring's power was so great it could literally dictate the position of the stars.</span></li><li data-dcnode-id="2732"><span data-dcnode-id="2741" instrument_node=""> By the way they're described, you'd assume the Two Fingers and the Three Fingers would just be a pair of </span><a class="twikilink" data-dcnode-id="2739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OmniscientCouncilOfVagueness" title="/pmwiki/pmwiki.php/Main/OmniscientCouncilOfVagueness"><span data-dcnode-id="2740" instrument_node="">Omniscient Councils of Vagueness</span></a><span data-dcnode-id="2738" instrument_node="">. </span><span class="spoiler" data-dcnode-id="2733" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2737" instrument_node="">The truth is far stranger; these are </span><em data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">literally giant fingers</span></em><span data-dcnode-id="2734" instrument_node="">, attached to giant disembodied hands.</span></span></li></ul></li><li data-dcnode-id="2719"><span data-dcnode-id="2729" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoopholeAbuse" title="/pmwiki/pmwiki.php/Main/LoopholeAbuse"><span data-dcnode-id="2728" instrument_node="">Loophole Abuse</span></a><span data-dcnode-id="2726" instrument_node="">: As a form of </span><a class="twikilink" data-dcnode-id="2724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiRageQuitting" title="/pmwiki/pmwiki.php/Main/AntiRageQuitting"><span data-dcnode-id="2725" instrument_node="">Anti-Rage Quitting</span></a><span data-dcnode-id="2723" instrument_node="">, in PvP you get rewards if your invaders leave, either of their own volition or from their deaths. Cue players finding hard-to-reach hiding spots, calling for both invaders and hunters, and then sitting back to </span><a class="twikilink" data-dcnode-id="2721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LetsYouAndHimFight" title="/pmwiki/pmwiki.php/Main/LetsYouAndHimFight"><span data-dcnode-id="2722" instrument_node="">farm invaders as the hunters they've summoned do the work</span></a><span data-dcnode-id="2720" instrument_node="">, or wait for the invaders to leave out of boredom. You'd also see stories of invaders who discover what their target is doing and devise their own tactics to punish these players, sometimes even collaborating with the hunters to punish the host.</span></li><li data-dcnode-id="2678"><span data-dcnode-id="2718" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LovecraftLite" title="/pmwiki/pmwiki.php/Main/LovecraftLite"><span data-dcnode-id="2717" instrument_node="">Lovecraft Lite</span></a><span data-dcnode-id="2715" instrument_node="">: Nowhere near the extent of </span><em data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Dark Souls</span></em><span data-dcnode-id="2712" instrument_node="">, or </span><em data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Bloodborne</span></em><span data-dcnode-id="2709" instrument_node="">, but </span><span class="spoiler" data-dcnode-id="2704" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2708" instrument_node="">in this world, falling stars tend to contain </span><a class="twikilink" data-dcnode-id="2706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="2707" instrument_node="">Eldritch Abominations</span></a><span data-dcnode-id="2705" instrument_node=""> like Alabaster and Onyx Lords, Fallingstar Beasts, Malformed Stars and Naturalborns, all connected to mysterious "outer gods"</span></span><span data-dcnode-id="2703" instrument_node="">. It falls under "lite" </span><span class="spoiler" data-dcnode-id="2698" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2702" instrument_node="">as it's made clear the stars and their influence are not considered inherently threatening by the locals, as Alabaster and Onyx Lords once had a place in Marika's society. The demigods also show they can handle most threats from space, as Radahn alone prevented shooting stars from falling to Lands Between while </span><em data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">feral and crazed by Scarlet Rot</span></em><span data-dcnode-id="2699" instrument_node="">, to say nothing of what an Elden Lord backed up by the Elden Ring would be able to do</span></span><span data-dcnode-id="2697" instrument_node="">. That being said, this trope becomes downplayed, if not outright subverted, </span><span class="spoiler" data-dcnode-id="2695" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2696" instrument_node="">when one learns the Greater Will who bestowed the Elden Ring itself is heavily implied to be an outer god who has shaped history ever since prior to Age of the Erdtree</span></span><span data-dcnode-id="2694" instrument_node="">. There are also </span><span class="spoiler" data-dcnode-id="2680" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2693" instrument_node="">other similar entities who are trying to influence this world to their whims, such as the dark moon guiding a number of sorcerers including Ranni and was once in alliance with the Greater Will; one who uses the Three Fingers as its mouthpiece and blessed it with </span><a class="twikilink" data-dcnode-id="2691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerBornOfMadness" title="/pmwiki/pmwiki.php/Main/PowerBornOfMadness"><span data-dcnode-id="2692" instrument_node="">the Frenzied Flame</span></a><span data-dcnode-id="2690" instrument_node="">; one who had part of its divine essence sealed in the Lake of Rot, who's seemingly also responsible for cursing Malenia since birth with the </span><a class="twikilink" data-dcnode-id="2688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCorruption" title="/pmwiki/pmwiki.php/Main/TheCorruption"><span data-dcnode-id="2689" instrument_node="">Scarlet Rot</span></a><span data-dcnode-id="2687" instrument_node="">; and the Formless Mother, which Mohg contacted in the hopes of fulfilling his own ambitions over the land. The Tarnished could even choose to champion at least one of them as they become the Elden Lord, and depending on which greater power they choose the impact on the world could range from </span><a class="twikilink" data-dcnode-id="2685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FisherKing" title="/pmwiki/pmwiki.php/Main/FisherKing"><span data-dcnode-id="2686" instrument_node="">a shift in the cosmic order governing the lands</span></a><span data-dcnode-id="2684" instrument_node=""> to downright </span><em data-dcnode-id="2681"><a class="twikilink" data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldWreckingWave" title="/pmwiki/pmwiki.php/Main/WorldWreckingWave"><span data-dcnode-id="2683" instrument_node="">cataclysmic</span></a></em></span><span data-dcnode-id="2679" instrument_node="">.</span></li><li data-dcnode-id="26
