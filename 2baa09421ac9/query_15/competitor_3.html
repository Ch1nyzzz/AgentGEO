ccupied and utterly despoiled the Lands Between, with bands of soldiers descending from their fortresses to commit unspeakable atrocities against the few souls who remain.</span></li><li data-dcnode-id="1351"><span data-dcnode-id="1358" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WarmUpBoss" title="/pmwiki/pmwiki.php/Main/WarmUpBoss"><span data-dcnode-id="1357" instrument_node="">Warm-Up Boss</span></a><span data-dcnode-id="1355" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayedForLaughs" title="/pmwiki/pmwiki.php/Main/PlayedForLaughs"><span data-dcnode-id="1354" instrument_node="">Played for Laughs</span></a><span data-dcnode-id="1352" instrument_node=""> with the Soldier of Godrick, a perfectly normal, basic enemy who inexplicably has a boss health bar and music to match. The game strongly encourages the player to guard counter him, which kills him in one hit.</span></li><li data-dcnode-id="1346"><span data-dcnode-id="1350" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeaponOfXSlaying" title="/pmwiki/pmwiki.php/Main/WeaponOfXSlaying"><span data-dcnode-id="1349" instrument_node="">Weapon of X-Slaying</span></a><span data-dcnode-id="1347" instrument_node="">: Near the entrance of the boss arena against the God-Devouring Serpent, there's a Great Spear called the Serpent-Hunter. Unsurprisingly, it's tremendously effective against this boss specifically, manifesting blades of energy which don't appear if the spear is used outside the arena.</span></li><li data-dcnode-id="1333"><span data-dcnode-id="1345" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamEpisode" title="/pmwiki/pmwiki.php/Main/WhamEpisode"><span data-dcnode-id="1344" instrument_node="">Wham Episode</span></a><span data-dcnode-id="1342" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1334" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1341" instrument_node="">After defeating Morgott, the Tarnished learns the main reason no one's taken the title of Elden Lord since the Shattering is because </span><em data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">the Erdtree itself is actively rejecting anyone who tries to take it</span></em><span data-dcnode-id="1338" instrument_node="">. Not only does this raise major questions regarding Marika's intentions, but the Two Fingers promptly abandon the Tarnished — which confirms they didn't know this either — which ends up driving Gideon mad as he comes to believe Marika </span><em data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">wants</span></em><span data-dcnode-id="1335" instrument_node=""> the people of the Lands Between to fight, kill and die for eternity.</span></span></li><li data-dcnode-id="1319"><span data-dcnode-id="1332" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamLine" title="/pmwiki/pmwiki.php/Main/WhamLine"><span data-dcnode-id="1331" instrument_node="">Wham Line</span></a><span data-dcnode-id="1329" instrument_node="">: The Golden Order questline follows Goldmask and his follower Corhyn trying to figure out the events leading up to the Shattering. The relationship between keepers of the Elden Ring at the time, perfect goddess Marika and human champion Radagon, is studied as well, culminating in a revelation:</span><div class="indent" data-dcnode-id="1320"><span data-dcnode-id="1328" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1321" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LiteralSplitPersonality" title="/pmwiki/pmwiki.php/Main/LiteralSplitPersonality"><span data-dcnode-id="1327" instrument_node="">Radagon</span></a><span data-dcnode-id="1325" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodIsFlawed" title="/pmwiki/pmwiki.php/Main/GodIsFlawed"><span data-dcnode-id="1324" instrument_node="">is Marika</span></a><span data-dcnode-id="1322" instrument_node=""> </span></span></div></li><li data-dcnode-id="1309"><span data-dcnode-id="1318" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamShot" title="/pmwiki/pmwiki.php/Main/WhamShot"><span data-dcnode-id="1317" instrument_node="">Wham Shot</span></a><span data-dcnode-id="1315" instrument_node="">: It's a bit out of the way, but not too far away from the Leyndell Royal Capital's West Castle Rampart site of grace is a set of stables which can be platformed on to jump onto a small balcony with an open door. Stepping inside of said door leads you to the upper floor of the Fortified Manor. </span><span class="spoiler" data-dcnode-id="1310" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1314" instrument_node="">It's the real Roundtable Hold in ruins, with corpses everywhere. Items like the Coded Sword can be looted from the corpses littering the area. The Roundtable Hold serving as the hub for your game may be filled with traveling Tarnished, but within </span><em data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">your</span></em><span data-dcnode-id="1311" instrument_node=""> world, everyone in there is dead.</span></span></li><li data-dcnode-id="1304"><span data-dcnode-id="1308" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldTree" title="/pmwiki/pmwiki.php/Main/WorldTree"><span data-dcnode-id="1307" instrument_node="">World Tree</span></a><span data-dcnode-id="1305" instrument_node="">: The Erdtree, an enormous glowing tree powered by the Elden Ring. Taller than anything else in the scenery by a country mile, to the point it looks like the top of the tree goes straight through the overcast cloud layer. All the while, the tree is glowing with an ethereal golden light. The Erdtree is also the primary object of worship for the people of The Lands Between, originally believed to be perfect and eternal, it came as shock when it stopped producing its healing sap, and it was discovered it actually has seeds like a normal tree. There are even smaller minor Erdtrees growing across the land.</span></li><li data-dcnode-id="1288"><span data-dcnode-id="1303" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorthyOpponent" title="/pmwiki/pmwiki.php/Main/WorthyOpponent"><span data-dcnode-id="1302" instrument_node="">Worthy Opponent</span></a><span data-dcnode-id="1300" instrument_node="">:</span><ul data-dcnode-id="1289"><li data-dcnode-id="1294"><span data-dcnode-id="1299" instrument_node=""> As he transitions to his second phase, Margit recognizes the protagonist as a worthy adversary.</span><div class="indent" data-dcnode-id="1295"><strong data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Margit:</span></strong><span data-dcnode-id="1296" instrument_node=""> Well, thou art of passing skill. Warrior blood must truly run in thy veins, Tarnished.</span></div></li><li data-dcnode-id="1290"><span data-dcnode-id="1293" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1291" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1292" instrument_node="">Godfrey also recognizes the Tarnished as this, and compliments them by saying they fought nobly if he kills them during his first phase. When entering his second phase as Hoaroah Loux, he decides he's given them "courtesy enough" and kills Serosh so he can give them the proper walloping his station demands.</span></span></li></ul></li><li data-dcnode-id="1277"><span data-dcnode-id="1287" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Wutai" title="/pmwiki/pmwiki.php/Main/Wutai"><span data-dcnode-id="1286" instrument_node="">Wutai</span></a><span data-dcnode-id="1284" instrument_node="">: The Land of Reeds, the world's equivalent of Japan, as shown and described in the items and gear you can find originating from there. There's even a bit more history compared to the "Far East" in the </span><em data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Dark Souls</span></em><span data-dcnode-id="1281" instrument_node=""> trilogy; the region is going through its own version of the </span><a class="twikilink" data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/SengokuPeriod" title="/pmwiki/pmwiki.php/UsefulNotes/SengokuPeriod"><span data-dcnode-id="1280" instrument_node="">Sengoku Period</span></a><span data-dcnode-id="1278" instrument_node="">.</span></li><li data-dcnode-id="1267"><span data-dcnode-id="1276" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YourPrincessIsInAnotherCastle" title="/pmwiki/pmwiki.php/Main/YourPrincessIsInAnotherCastle"><span data-dcnode-id="1275" instrument_node="">Your Princess Is in Another Castle!</span></a><span data-dcnode-id="1273" instrument_node="">: Congratulations, Tarnished! You made it to the base of the Erdtree just as Melina wanted </span><span class="spoiler" data-dcnode-id="1268" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1272" instrument_node="">and are literally a few steps away from becoming Elden Lord. Wait, why is the Erdtree blocking out all visitors? Fortunately, Melina proposes an </span><a class="twikilink" data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillItWithFire" title="/pmwiki/pmwiki.php/Main/KillItWithFire"><span data-dcnode-id="1271" instrument_node="">alternate plan</span></a><span data-dcnode-id="1269" instrument_node=""> to get in.</span></span></li><li data-dcnode-id="1262"><span data-dcnode-id="1266" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouWillNotEvadeMe" title="/pmwiki/pmwiki.php/Main/YouWillNotEvadeMe"><span data-dcnode-id="1265" instrument_node="">You Will Not Evade Me</span></a><span data-dcnode-id="1263" instrument_node="">: Gravity magic exists in this game. It is used to drag those in and basically prevent them from moving for a moment.</span></li></ul></div><hr data-dcnode-id="1259"><div class="indent" data-dcnode-id="1256"><em data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">"Brandish the Elden Ring... for all of us."</span></em></div><span data-dcnode-id="1255" instrument_node="">
</span></div><span data-dcnode-id="1253" instrument_node="">

</span><a class="video-launch-link video-overlay-link featured-widget-vid" data-dcnode-id="1094" data-do-not-loop="1" data-hls-url="https://d1w6li7s85ibls.cloudfront.net/hls/i62v4r.m3u8" data-mpd-url="https://d1w6li7s85ibls.cloudfront.net/dash/i62v4r.mpd" data-video-approval="APPROVED" data-video-average-rating="5.00" data-video-descrip="In a realm known as the Lands Between, Queen Marika the Eternal rules a massive Empire with the power of a mystical rune known as the Elden Ring, source of the Erdtree. Alongside her, her demi-god brood reign as Generals and Lords with an iron-fist. Or at least, they did, before the Elden Ring was shattered, her favorite son Godwyn the Golden and many of his demi-god kin were assassinated by the stolen Rune of Death, and the Elden Ring's component Great Runes were scattered across the Lands Between.<br><br><br><br>In their lust for power, Marika's remaining demigod offspring and their minions have collected these runes for themselves, inadvertently corrupting themselves physically and spiritually by the uncontrolled power of the Great Runes, triggering a massive, free-for-all Succession Crisis known as the Shattering, which has spilled-forth into bloody all-out warfare between the once-siblings, who all now desire Marika's crown, for the God-Empress has disappeared without a trace, leaving her throne vacant. All this has brought ruin to the Lands Between, transforming the once majestic Empire into a broken land beset by a Forever War. Now even the Greater Will has abandoned the land.<br><br><br><br>You are the Tarnished, a disgraced exile drawn to return to the Lands Between by the prospect of the power of the Runes. With the guidance of grace behind you, you must confront the inhabitants of the Lands Between, acquire the Great Runes, re-forge the Elden Ring... and with its power, become the new Elden Lord." data-video-id="i62v4r" data-video-media-sources="VideoGame/EldenRing" data-video-rating-count="6" data-video-thumbnail="https: </span><h2 class="bold font-l" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Elden Ring</span></h2><span data-dcnode-id="1088" instrument_node="">
</span><p class="_pmvv-vidbox-descTxt" data-dcnode-id="1076"><span data-dcnode-id="1087" instrument_node="">
      In a realm known as the Lands Between, Queen Marika the Eternal rules a massive Empire with the power of a mystical rune known as the Elden Ring, source of the Erdtree. Alongside her, her demi-god brood reign as Generals and Lords with an iron-fist. Or at least, they did, before the Elden Ring was shattered, her favorite son Godwyn the Golden and many of his demi-god kin were assassinated by the stolen Rune of Death, and the Elden Ring's component Great Runes were scattered across the Lands Between.</span><br data-dcnode-id="1086"><br data-dcnode-id="1085"><br data-dcnode-id="1084"><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">In their lust for power, Marika's remaining demigod offspring and their minions have collected these runes for themselves, inadvertently corrupting themselves physically and spiritually by the uncontrolled power of the Great Runes, triggering a massive, free-for-all Succession Crisis known as the Shattering, which has spilled-forth into bloody all-out warfare between the once-siblings, who all now desire Marika's crown, for the God-Empress has disappeared without a trace, leaving her throne vacant. All this has brought ruin to the Lands Between, transforming the once majestic Empire into a broken land beset by a Forever War. Now even the Greater Will has abandoned the land.</span><br data-dcnode-id="1081"><br data-dcnode-id="1080"><br data-dcnode-id="1079"><br data-dcnode-id="1078"><span data-dcnode-id="1077" instrument_node="">You are the Tarnished, a disgraced exile drawn to return to the Lands Between by the prospect of the power of the Runes. With the guidance of grace behind you, you must confront the inhabitants of the Lands Between, acquire the Great Runes, re-forge the Elden Ring... and with its power, become the new Elden Lord.    </span></p><span data-dcnode-id="1075" instrument_node="">

</span><h1 data-dcnode-id="132" id="overlay-title"><span data-dcnode-id="133" instrument_node="">Elden Ring</span></h1><span data-dcnode-id="131" instrument_node="">
</span><p class="_pmvv-vidbox-descTxt" data-dcnode-id="119" id="overlay-descrip"><span data-dcnode-id="130" instrument_node="">
	    In a realm known as the Lands Between, Queen Marika the Eternal rules a massive Empire with the power of a mystical rune known as the Elden Ring, source of the Erdtree. Alongside her, her demi-god brood reign as Generals and Lords with an iron-fist. Or at least, they did, before the Elden Ring was shattered, her favorite son Godwyn the Golden and many of his demi-god kin were assassinated by the stolen Rune of Death, and the Elden Ring's component Great Runes were scattered across the Lands Between.</span><br data-dcnode-id="129"><br data-dcnode-id="128"><br data-dcnode-id="127"><br data-dcnode-id="126"><span data-dcnode-id="125" instrument_node="">In their lust for power, Marika's remaining demigod offspring and their minions have collected these runes for themselves, inadvertently corrupting themselves physically and spiritually by the uncontrolled power of the Great Runes, triggering a massive, free-for-all Succession Crisis known as the Shattering, which has spilled-forth into bloody all-out warfare between the once-siblings, who all now desire Marika's crown, for the God-Empress has disappeared without a trace, leaving her throne vacant. All this has brought ruin to the Lands Between, transforming the once majestic Empire into a broken land beset by a Forever War. Now even the Greater Will has abandoned the land.</span><br data-dcnode-id="124"><br data-dcnode-id="123"><br data-dcnode-id="122"><br data-dcnode-id="121"><span data-dcnode-id="120" instrument_node="">You are the Tarnished, a disgraced exile drawn to return to the Lands Between by the prospect of the power of the Runes. With the guidance of grace behind you, you must confront the inhabitants of the Lands Between, acquire the Great Runes, re-forge the Elden Ring... and with its power, become the new Elden Lord.	</span></p><span data-dcnode-id="118" instrument_node="">
