60"><span data-dcnode-id="2677" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MacGuffin" title="/pmwiki/pmwiki.php/Main/MacGuffin"><span data-dcnode-id="2676" instrument_node="">MacGuffin</span></a><span data-dcnode-id="2674" instrument_node="">:</span><ul data-dcnode-id="2661"><li data-dcnode-id="2669"><span data-dcnode-id="2673" instrument_node=""> The Elden Ring itself. </span><span class="spoiler" data-dcnode-id="2671" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2672" instrument_node="">It is a creation of the Greater Will with powers that aren't explained in-depth, but the power it did gift still spurred the demigods to take the fragments for themselves.</span></span><span data-dcnode-id="2670" instrument_node=""> The reforging of the ring drives most of the game's plot.</span></li><li data-dcnode-id="2662"><span data-dcnode-id="2668" instrument_node=""> A major subplot of the story revolves around the Haligtree Medallion, a special token needed to open the way to Miquella's Manor </span><span class="spoiler" data-dcnode-id="2666" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2667" instrument_node="">where Malenia lairs</span></span><span data-dcnode-id="2665" instrument_node="">. Gideon in particular is obsessed with the thing, to the point </span><span class="spoiler" data-dcnode-id="2663" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2664" instrument_node="">he orders the destruction of an entire village in order to obtain the half of the Medallion hidden there.</span></span></li></ul></li><li data-dcnode-id="2655"><span data-dcnode-id="2659" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MageTower" title="/pmwiki/pmwiki.php/Main/MageTower"><span data-dcnode-id="2658" instrument_node="">Mage Tower</span></a><span data-dcnode-id="2656" instrument_node="">: A number of them can be found throughout the Lands Between, most commonly in secluded spots where they're protected by magical seals the player needs to unlock before getting the goodies inside. The Three Sisters area outside the Carian Manor has three of them, with Ranni and Seluvis based out of the main ones.</span></li><li data-dcnode-id="2636"><span data-dcnode-id="2654" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Masquerade" title="/pmwiki/pmwiki.php/Main/Masquerade"><span data-dcnode-id="2653" instrument_node="">Masquerade</span></a><span data-dcnode-id="2651" instrument_node="">: Subtle, but as the player Tarnished progresses, </span><span class="spoiler" data-dcnode-id="2649" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2650" instrument_node="">it becomes clear the Golden Order established by Marika on behalf of the Greater Will tries to paint the world as Greater Will's dominion: Erdtree is the source of "proper" life and it was bestowed alongside the Elden Ring, and everything branch out from and will return to both (Law of Causality and Regression)</span></span><span data-dcnode-id="2648" instrument_node="">. Yet, none of it is the truth: </span><span class="spoiler" data-dcnode-id="2637" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2647" instrument_node="">life in Lands Between originated from a native primordial crucible and the Erdtree was a </span><em data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">successful</span></em><span data-dcnode-id="2644" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlienInvasion" title="/pmwiki/pmwiki.php/Main/AlienInvasion"><span data-dcnode-id="2643" instrument_node="">Alien Invasion</span></a><span data-dcnode-id="2641" instrument_node=""> attempt so the Greater Will can manipulate the crucible's vital essence of life for its own rule; the Rune of Death supposedly plucked from the Golden Order actually predated the order itself and originally belonged to an ancient faction not of Greater Will; and most importantly, the Golden Order is far, </span><em data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">far</span></em><span data-dcnode-id="2638" instrument_node=""> from being a perfect set of laws which could govern Lands Between flawlessly.</span></span></li><li data-dcnode-id="2622"><span data-dcnode-id="2635" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeleeATrois" title="/pmwiki/pmwiki.php/Main/MeleeATrois"><span data-dcnode-id="2634" instrument_node="">Mêlée à Trois</span></a><span data-dcnode-id="2632" instrument_node="">: The game world has a </span><em data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">very</span></em><span data-dcnode-id="2629" instrument_node=""> large focus on this; enemies will freely and happily fight each other to the death, one of the best methods of thinning out large hordes is to lure enemies against the other. Generally speaking, mobs will be hostile to each other if they belong to a different faction, and some infighting can ensue if you get enemies caught in each others' line of fire. There's even a ton of scripted encounters where two large groups of enemies square off each other in open fields, or against fortifications. In particular, </span><a class="twikilink" data-dcnode-id="2627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathWorld" title="/pmwiki/pmwiki.php/Main/DeathWorld"><span data-dcnode-id="2628" instrument_node="">Caelid</span></a><span data-dcnode-id="2626" instrument_node=""> is currently just one </span><em data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">giant</span></em><span data-dcnode-id="2623" instrument_node=""> free for all between pockets of Radahn's army against the mutating wildlife.</span></li><li data-dcnode-id="2617"><span data-dcnode-id="2621" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MiniDungeon" title="/pmwiki/pmwiki.php/Main/MiniDungeon"><span data-dcnode-id="2620" instrument_node="">Mini-Dungeon</span></a><span data-dcnode-id="2618" instrument_node="">: The few castles sprinkling the world can be considered this. Sometimes tied to a quest, sometimes the lair of a particularly powerful enemy, they are nonetheless usually cleared in minutes.</span></li><li data-dcnode-id="2603"><span data-dcnode-id="2616" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MixAndMatchCritters" title="/pmwiki/pmwiki.php/Main/MixAndMatchCritters"><span data-dcnode-id="2615" instrument_node="">Mix-and-Match Critters</span></a><span data-dcnode-id="2613" instrument_node="">:</span><ul data-dcnode-id="2604"><li data-dcnode-id="2607"><span data-dcnode-id="2612" instrument_node=""> A non-aggressive animal which can be found roaming Limgrave and Stormhill is the Rabbitgaroo. Its front half is rabbit-like and the back half is kangaroo-like, which essentially makes it look like the real life </span><a class="urllink" data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedetes"><span data-dcnode-id="2611" instrument_node="">springhare</span><img data-dcnode-id="2610" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2608" instrument_node="">.</span></li><li data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node=""> Your Spirit Steed, Torrent, which mostly resembles a horse except for having an ox-like head and horns.</span></li></ul></li><li data-dcnode-id="2575"><span data-dcnode-id="2602" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mordor" title="/pmwiki/pmwiki.php/Main/Mordor"><span data-dcnode-id="2601" instrument_node="">Mordor</span></a><span data-dcnode-id="2599" instrument_node="">:</span><ul data-dcnode-id="2576"><li data-dcnode-id="2579"><span data-dcnode-id="2598" instrument_node=""> Caelid is one of the most wretched, hellish, godforsaken areas ever seen in a From game, and that's saying a whole lot. A poisoned wasteland under a malevolent red sky filled with giant mutated dogs which have the proportions of a Tyrannosaurus, similarly mutated giant crows </span><a class="twikilink" data-dcnode-id="2596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ToothyBird" title="/pmwiki/pmwiki.php/Main/ToothyBird"><span data-dcnode-id="2597" instrument_node="">with teeth</span></a><span data-dcnode-id="2595" instrument_node="">, and disgusting, poison spewing insect men, the entire region has been defiled by the Scarlet Rot, which spreads </span><a class="twikilink" data-dcnode-id="2593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlienKudzu" title="/pmwiki/pmwiki.php/Main/AlienKudzu"><span data-dcnode-id="2594" instrument_node="">Alien Kudzu</span></a><span data-dcnode-id="2592" instrument_node=""> all over the ruins of what was once a proud center of civilization. Attempts to fight this scourge consist mostly of trying to </span><a class="twikilink" data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillItWithFire" title="/pmwiki/pmwiki.php/Main/KillItWithFire"><span data-dcnode-id="2591" instrument_node="">Kill It with Fire</span></a><span data-dcnode-id="2589" instrument_node="">, leading to huge swaths of the landscape being nothing but charred cinders, and the lower regions are completely flooded with polluted water which inflicts Scarlet Rot (the game's equivalent to Toxic) on the Tarnished if they walk through it on foot. Even the ambient soundtrack is evil, consisting of atonal </span><a class="twikilink" data-dcnode-id="2587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PsychoStrings" title="/pmwiki/pmwiki.php/Main/PsychoStrings"><span data-dcnode-id="2588" instrument_node="">"Psycho" Strings</span></a><span data-dcnode-id="2586" instrument_node=""> which sounds like some monster screaming in the distance. It makes the </span><a class="twikilink" data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DemonsSouls" title="/pmwiki/pmwiki.php/VideoGame/DemonsSouls"><span data-dcnode-id="2585" instrument_node="">Valley of Defilement</span></a><span data-dcnode-id="2583" instrument_node=""> look like a </span><a class="twikilink" data-dcnode-id="2581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreenHillZone" title="/pmwiki/pmwiki.php/Main/GreenHillZone"><span data-dcnode-id="2582" instrument_node="">Green Hill Zone</span></a><span data-dcnode-id="2580" instrument_node="">.</span></li><li data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node=""> The Lake of Rot may be even worse, if only for the fact you don't have access to Torrent to help you avoid the Scarlet Rot this time around. The area is exactly what it sounds like, a huge underground lake of toxic sludge bathed in a perpetual dim red light. Parts of it actually do look like classical depictions of Hell.</span></li></ul></li><li data-dcnode-id="2512"><span data-dcnode-id="2574" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MultipleEndings" title="/pmwiki/pmwiki.php/Main/MultipleEndings"><span data-dcnode-id="2573" instrument_node="">Multiple Endings</span></a><span data-dcnode-id="2571" instrument_node="">: There are six endings, which can all be triggered after defeating the </span><a class="twikilink" data-dcnode-id="2569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="2570" instrument_node="">Final Boss</span></a><span data-dcnode-id="2568" instrument_node="">.</span><ul data-dcnode-id="2513"><li data-dcnode-id="2531"><span data-dcnode-id="2567" instrument_node=""> </span><strong data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Elden Lord</span></strong><span data-dcnode-id="2564" instrument_node="">: The Tarnished reforges the Elden Ring. But </span><em data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">how</span></em><span data-dcnode-id="2561" instrument_node=""> is where the endings diverge.</span><ul data-dcnode-id="2532"><li data-dcnode-id="2554"><span data-dcnode-id="2560" instrument_node=""> </span><strong data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">Age of Fracture</span></strong><span data-dcnode-id="2557" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2555" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2556" instrument_node="">The Tarnished succeeds in reforging the Elden Ring and becomes Queen Marika's newest consort, becoming the Elden Lord as Melina hoped. As the Tarnished has defied the Erdtree and Golden Order to achieve this, this marks the fracture of the old world order — that of Marika's — in favor of the Tarnished's own. The skyline still glows a golden hue, while the Erdtree glows silver.</span></span></li><li data-dcnode-id="2547"><span data-dcnode-id="2553" instrument_node=""> </span><strong data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">Age of Duskborn</span></strong><span data-dcnode-id="2550" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2548" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2549" instrument_node="">This ending plays out similarly to the original version, but the Elden Ring is reforged with the Mending Rune of the Death-Prince, obtained through Fia's associated quest line. The Tarnished becomes the new Elden Lord, while the Rune instills a new Order in which "Life within Death" becomes part of the natural order, so the prosecution of "Those Who Live in Death" will cease in the new age. The skyline still glows a golden hue, but is obscured by a "rain" of ash.</span></span></li><li data-dcnode-id="2540"><span data-dcnode-id="2546" instrument_node=""> </span><strong data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Age of Order</span></strong><span data-dcnode-id="2543" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2541" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2542" instrument_node="">The Elden Ring is reforged with the Mending Rune of Perfect Order, obtained by completing Brother Corhyn and Goldmask's associated quest line. With it, the Tarnished becomes Elden Lord, while the Rune will attempt to perfect the Golden Order; to create a new Order which can't be influenced by the whims of gods who manage it. The skyline still has its golden hue, but the Erdtree itself is also glowing gold.</span></span></li><li data-dcnode-id="2533"><span data-dcnode-id="2539" instrument_node=""> </span><strong data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">Blessing of Despair</span></strong><span data-dcnode-id="2536" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2534" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2535" instrument_node="">The Elden Ring is reforged with the Mending Rune of the Fell Curse, obtained by completing the Dung Eater's associated quest line. The Erdtree still glows silver, but skyline is obscured by vile, fallstreak hole riddled brown clouds and a brown fog falls across the land. The Rune of the Fell Curse ensures all born in this age will be forever afflicted by the Seedbed Curse, from their children to their grandchildren and so on for eternity.</span></span></li></ul></li><li data-dcnode-id="2521"><span data-dcnode-id="2530" instrument_node=""> </span><strong data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">Age of the Stars</span></strong><span data-dcnode-id="2527" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2522" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2526" instrument_node="">Ranni succeeds Queen Marika as </span><a class="twikilink" data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodEmperor" title="/pmwiki/pmwiki.php/Main/GodEmperor"><span data-dcnode-id="2525" instrument_node="">God-Emperor</span></a><span data-dcnode-id="2523" instrument_node=""> thanks to the Tarnished's assistance. She declares she will start a thousand-year journey into "fear, doubt, and loneliness", which entails getting rid of "all those which came before" or in other words, all legacy ever since the Age of the Erdtree. She then takes the Tarnished as her eternal consort.</span></span></li><li data-dcnode-id="2514"><span data-dcnode-id="2520" instrument_node=""> </span><strong data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Lord of Frenzied Flame</span></strong><span data-dcnode-id="2517" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2515" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2516" instrument_node="">After inheriting the Frenzied Flame and reaching Marika, the Tarnished becomes the "Lord of Chaos" and proceeds to set the Lands Between ablaze, destroying what remains of Queen Marika and scorching the Erdtree irreparably. Melina returns to the area after the Lord of Chaos has gone and picks up Torrent's summoning ring, vowing to find the Tarnished and deliver unto them a 'Destined Death'. There's also a minor variant where if Melina was already sacrificed, her scene won't occur.</span></span></li></ul></li><li data-dcnode-id="2429"><span data-dcnode-id="2511" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="2510" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="2508" instrument_node="">:</span><ul data-dcnode-id="2430"><li data-dcnode-id="2480"><span data-dcnode-id="2507" instrument_node=""> Several gameplay systems could be considered as full-on mythology gags of previous FromSoft games, making a "best of" the previous games' mechanics, such as the ability to level up in any checkpoint from </span><em data-dcnode-id="2504"><a class="twikilink" data-dcnode-id="2505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSoulsI" title="/pmwiki/pmwiki.php/VideoGame/DarkSoulsI"><span data-dcnode-id="2506" instrument_node="">Dark Souls</span></a></em><span data-dcnode-id="2503" instrument_node="">, Twinblades and Power Stances from </span><em data-dcnode-id="2500"><a class="twikilink" data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSoulsII" title="/pmwiki/pmwiki.php/VideoGame/DarkSoulsII"><span data-dcnode-id="2502" instrument_node="">Dark Souls II</span></a></em><span data-dcnode-id="2499" instrument_node="">, Weapon Arts from </span><em data-dcnode-id="2496"><a class="twikilink" data-dcnode-id="2497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSoulsIII" title="/pmwiki/pmwiki.php/VideoGame/DarkSoulsIII"><span data-dcnode-id="2498" instrument_node="">Dark Souls III</span></a></em><span data-dcnode-id="2495" instrument_node="">, and the </span><a class="twikilink" data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManaMeter" title="/pmwiki/pmwiki.php/Main/ManaMeter"><span data-dcnode-id="2494" instrument_node="">Mana Meter</span></a><span data-dcnode-id="2492" instrument_node=""> from both </span><em data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">III</span></em><span data-dcnode-id="2489" instrument_node=""> and </span><em data-dcnode-id="2486"><a class="twikilink" data-dcnode-id="2487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DemonsSouls" title="/pmwiki/pmwiki.php/VideoGame/DemonsSouls"><span data-dcnode-id="2488" instrument_node="">Demon's Souls</span></a></em><span data-dcnode-id="2485" instrument_node="">. From </span><em data-dcnode-id="2482"><a class="twikilink" data-dcnode-id="2483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SekiroShadowsDieTwice" title="/pmwiki/pmwiki.php/VideoGame/SekiroShadowsDieTwice"><span data-dcnode-id="2484" instrument_node="">Sekiro: Shadows Die Twice</span></a></em><span data-dcnode-id="2481" instrument_node=""> it takes the ability to vertically jump and to do mid-air attacks, stealth mechanics, and a simpler 'posture' system in which charged attacks, heavy jump attacks, and attacks done right after blocking can leave the enemy open to Critical Hits.</span></li><li data-dcnode-id="2474"><span data-dcnode-id="2479" instrument_node=""> Remember the Capra Demon from </span><em data-dcnode-id="2476"><a class="twikilink" data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSouls" title="/pmwiki/pmwiki.php/VideoGame/DarkSouls"><span data-dcnode-id="2478" instrument_node="">Dark Souls</span></a></em><span data-dcnode-id="2475" instrument_node="">? Well, a little aways from the Site of Grace located at the Village of the Albinaurics, across a bridge, you can find a boss named Omenkiller, who brandishes two cleavers (i.e. axe type weapons), and is accompanied by two dogs. Except this guy breathes fire. At least you're in an open space this time.</span></li><li data-dcnode-id="2468"><span data-dcnode-id="2473" instrument_node=""> One particular colossal weapon is the Ghiza's Wheel. With the design and Weapon Art, it's basically the Whirligig Saw from </span><em data-dcnode-id="2470"><a class="twikilink" data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Bloodborne" title="/pmwiki/pmwiki.php/VideoGame/Bloodborne"><span data-dcnode-id="2472" instrument_node="">Bloodborne</span></a></em><span data-dcnode-id="2469" instrument_node="">. On a related note, there's a weapon called the Jar Cannon which is a dead ringer to the Cannon from that game.</span></li><li data-dcnode-id="2454"><span data-dcnode-id="2467" instrument_node=""> Just like in </span><em data-dcnode-id="2464"><a class="twikilink" data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Bloodborne" title="/pmwiki/pmwiki.php/VideoGame/Bloodborne"><span data-dcnode-id="2466" instrument_node="">Bloodborne</span></a></em><span data-dcnode-id="2463" instrument_node="">, </span><span class="spoiler" data-dcnode-id="2456" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2462" instrument_node="">your </span><a class="twikilink" data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerHeadquarters" title="/pmwiki/pmwiki.php/Main/PlayerHeadquarters"><span data-dcnode-id="2461" instrument_node="">Player Headquarters</span></a><span data-dcnode-id="2459" instrument_node=""> catches on fire as you close in on the </span><a class="twikilink" data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="2458" instrument_node="">Final Boss</span></a></span><span data-dcnode-id="2455" instrument_node="">.</span></li><li data-dcnode-id="2448"><span data-dcnode-id="2453" instrument_node=""> Malenia's Great Rune essentially transforms the way you play into a style similar to that of </span><em data-dcnode-id="2450"><a class="twikilink" data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Bloodborne" title="/pmwiki/pmwiki.php/VideoGame/Bloodborne"><span data-dcnode-id="2452" instrument_node="">Bloodborne</span></a></em><span data-dcnode-id="2449" instrument_node="">, reducing the amount you heal from your Flask of Crimson Tears in exchange for allowing you to recover a portion of your lost health by damaging enemies, similar to that game's Rally mechanic.</span></li><li data-dcnode-id="2441"><span data-dcnode-id="2447" instrument_node=""> The Bloody Slash Art of War is nearly identical to </span><em data-dcnode-id="2443"><a class="twikilink" data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SekiroShadowsDieTwice" title="/pmwiki/pmwiki.php/VideoGame/SekiroShadowsDieTwice"><span data-dcnode-id="2446" instrument_node="">Sekiro</span></a><span data-dcnode-id="2444" instrument_node="">'</span></em><span data-dcnode-id="2442" instrument_node="">s Mortal Draw Combat Art.</span></li><li data-dcnode-id="2435"><span data-dcnode-id="2440" instrument_node=""> The Meteoric Ore Blade katana's heavy attack is identical to the Ichimonji: Double Combat Art from </span><em data-dcnode-id="2437"><a class="twikilink" data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SekiroShadowsDieTwice" title="/pmwiki/pmwiki.php/VideoGame/SekiroShadowsDieTwice"><span data-dcnode-id="2439" instrument_node="">Sekiro</span></a></em><span data-dcnode-id="2436" instrument_node="">.</span></li><li data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node=""> In Caelid, you may encounter a fort named Fort Gael. In another fort (from the same army), is castellan Jerren, whose hooded helmet greatly resemble the slave knight</span></li><li data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node=""> Sorcerer Rogier quotes the Souls trilogy's famous line from their openings, "Yes, indeed."</span></li></ul></li><li data-dcnode-id="2421"><span data-dcnode-id="2428" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NintendoHard" title="/pmwiki/pmwiki.php/Main/NintendoHard"><span data-dcnode-id="2427" instrument_node="">Nintendo Hard</span></a><span data-dcnode-id="2425" instrument_node="">: As expected from a </span><a class="twikilink" data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/FromSoftware" title="/pmwiki/pmwiki.php/Creator/FromSoftware"><span data-dcnode-id="2424" instrument_node="">FromSoftware</span></a><span data-dcnode-id="2422" instrument_node=""> game. Dynamic bosses and hard-hitting enemies are still a major element of the game, though the game's open world design and Torrent enables bypassing far, far more easily.</span></li><li data-dcnode-id="2416"><span data-dcnode-id="2420" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonIndicativeName" title="/pmwiki/pmwiki.php/Main/NonIndicativeName"><span data-dcnode-id="2419" instrument_node="">Non-Indicative Name</span></a><span data-dcnode-id="2417" instrument_node="">: The Comet Azur spell is one of the most powerful sorceries in the game. It also in no way summons a meteor of any kind as it is actually a giant laserbeam.</span></li><li data-dcnode-id="2411"><span data-dcnode-id="2415" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoobCave" title="/pmwiki/pmwiki.php/Main/NoobCave"><span data-dcnode-id="2414" instrument_node="">Noob Cave</span></a><span data-dcnode-id="2412" instrument_node="">: Shortly after the start of the game, the player is dropped at the entrance to the Cave of Knowledge, a dungeon with tutorial messages, few enemies, and a common mook as a boss.</span></li><li data-dcnode-id="2406"><span data-dcnode-id="2410" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotTheIntendedUse" title="/pmwiki/pmwiki.php/Main/NotTheIntendedUse"><span data-dcnode-id="2409" instrument_node="">Not the Intended Use</span></a><span data-dcnode-id="2407" instrument_node="">: NPCs who sell items, such as Nomadic Merchants, will drop a bell bearing if they die. The bell bearing can be turned in to the Twin Maiden Husks at the Roundtable Hold to give you access to their store, so you're never unable to purchase items because of a dead NPC. With that said though, the Nomadic Merchants are scattered across the map and can be difficult to locate at times. Apart from one merchant being tied to a side quest, it's typically easier and consequence-free to just kill any merchant you come across and turn their bells over at the Roundtable Hold, giving you a one-stop shop for all available merchant inventories.</span></li><li data-dcnode-id="2398"><span data-dcnode-id="2405" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotUsingTheZWord" title="/pmwiki/pmwiki.php/Main/NotUsingTheZWord"><span data-dcnode-id="2404" instrument_node="">Not Using the "Z" Word</span></a><span data-dcnode-id="2402" instrument_node="">: The game uses the rather verbose term Those Who Live in Death instead of the more conventional Undead, most likely to avoid the associations of the word from the developers </span><a class="twikilink" data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSouls" title="/pmwiki/pmwiki.php/VideoGame/DarkSouls"><span data-dcnode-id="2401" instrument_node="">previous franchise</span></a><span data-dcnode-id="2399" instrument_node="">.</span></li></ul></div><p data-dcnode-id="2395"></p><div class="folderlabel" data-dcnode-id="2393" onclick="togglefolder('folder2');"><span data-dcnode-id="2394" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;O-Z&nbsp;</span></div><div class="folder" data-dcnode-id="1260" id="folder2" isfolder="true" style="display:block;"><ul data-dcnode-id="1261"><li data-dcnode-id="2384"><span data-dcnode-id="2392" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OptionalStealth" title="/pmwiki/pmwiki.php/Main/OptionalStealth"><span data-dcnode-id="2391" instrument_node="">Optional Stealth</span></a><span data-dcnode-id="2389" instrument_node="">: The stealth system, first used by </span><em data-dcnode-id="2386"><a class="twikilink" data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SekiroShadowsDieTwice" title="/pmwiki/pmwiki.php/VideoGame/SekiroShadowsDieTwice"><span data-dcnode-id="2388" instrument_node="">Sekiro: Shadows Die Twice</span></a></em><span data-dcnode-id="2385" instrument_node="">, makes a return, giving the Tarnished ample ability to sneak around and perform critical hits from behind much more easily. Sleep arrows can also be used to knock enemies out for a time.</span></li><li data-dcnode-id="2354"><span data-dcnode-id="2383" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurDragonsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurDragonsAreDifferent"><span data-dcnode-id="2382" instrument_node="">Our Dragons Are Different</span></a><span data-dcnode-id="2380" instrument_node="">:</span><ul data-dcnode-id="2355"><li data-dcnode-id="2361"><span data-dcnode-id="2379" instrument_node=""> The Dragons of </span><em data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Elden Ring</span></em><span data-dcnode-id="2376" instrument_node=""> are said to have ruled in an Age of Stone, and were ancient when the God-kin (Marika and her brood) were young. Sometime after, the power of dragons faded, and during the very early age of the Erdtree, war erupted between the Dragons and the Empire, due to the latter’s fear of “foreign” fire. The war devastated both sides, until Godwyn the Golden faced Fortissax, the Legendary Dragon General. Though Godwyn had the upper hand and was prepared to strike down Fortissax, he instead spared his life. Befriending the mighty drake, Godywn convinced his mother the Dragons were better as allies, Marika forged a pact with the Dragons and the Dragons were elevated to a position similar to lesser God-kin. This eventually flourished to outright worship, and a Dragon Cult formed at the Imperial Capital, soon encompassing many might knights and warriors. It would eventually become the Empire's unofficial "secondary" religion, as the demigods decreed the worship of the Erdtree did not conflict with idolizing the Ancient Dragons. After the Shattering, dragonkind still lingers and split into two different groups.</span><ul data-dcnode-id="2362"><li data-dcnode-id="2368"><span data-dcnode-id="2375" instrument_node=""> The first are the common Wyvern-esque ones found in most regions of the world. Feathered, and having only two wings, they are still powerful and fiendishly intelligent beings. They come in many flavors, ranging from Flying Dragon Agheel, who spews fire and uses a lake as a hunting ground, to Borealis the Freezing Fog, who haunts the far north and uses </span><em data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">cold wind</span></em><span data-dcnode-id="2372" instrument_node=""> as his </span><a class="twikilink" data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreathWeapon" title="/pmwiki/pmwiki.php/Main/BreathWeapon"><span data-dcnode-id="2371" instrument_node="">Breath Weapon</span></a><span data-dcnode-id="2369" instrument_node="">. These dragons lack stone scales, having cast them off long ago. They are also not immortal and considered "lesser" beings; only containing "traces" of their ancestral power.</span></li><li data-dcnode-id="2363"><span data-dcnode-id="2367" instrument_node=""> Then there's the Stoneguards, more commonly known as "Ancient Dragons", the real dragons the Demigods warred with. Possessing four wings and covered in the telltale thick, stone scales, they are some of the most powerful and ancient beings encountered in the game. They are able to conjure bolts with their hands, and manifest </span><em data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">giant</span></em><span data-dcnode-id="2364" instrument_node=""> blades of pure, crimson lightning. Much rarer then their descendants, the Ancient Dragons are stated to be fully sentient people and seldom involve themselves with mortals, but are far more dangerous when encountered.</span></li></ul></li><li data-dcnode-id="2356"><span data-dcnode-id="2360" instrument_node=""> A curious desire possessing the people in </span><em data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Elden Ring</span></em><span data-dcnode-id="2357" instrument_node=""> is to consume Dragon Blood, and for the weak-willed, this can become a very dark obsession. It leads to downward spiral of violence known as "Dragonlust", where the person becomes obsessed with becoming a dragon by endlessly killing and consuming the organs of slain drakes. This is how wyrms come to be; the end result where the enraptured becomes a wyrm, cursed to crawl on their bellies and wander the earth for eternity. This actually harkens to the original Norse myths of dragon depictions. In that mythos, dragons were often fallen heroes transformed into wyrms by curses.</span></li></ul></li><li data-dcnode-id="2319"><span data-dcnode-id="2353" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurGiantsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurGiantsAreDifferent"><span data-dcnode-id="2352" instrument_node="">Our Giants Are Different</span></a><span data-dcnode-id="2350" instrument_node="">: Just like one of its major inspirations, </span><a class="twikilink" data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Myth/NorseMythology" title="/pmwiki/pmwiki.php/Myth/NorseMythology"><span data-dcnode-id="2349" instrument_node="">Norse Mythology</span></a><span data-dcnode-id="2347" instrument_node="">, there are several beings who constitute as "Giants".</span><ul data-dcnode-id="2320"><li data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node=""> General Radahn is absolutely huge, as evidenced by his normal sized horse being tiny in comparison to him. He is not slow, however. While not a literal giant, there's evidence his father, Radagon, may have been their descendant. As a result, Radahn likely has giant heritage.</span></li><li data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node=""> The Alabaster Lords are a ancient race of ghastly, nightmarish slender wraiths. With stone skin, they are said to have been born from a falling star which landed in the Lands Between eons ago, and wield the powers of the void, though they are thankfully rare. While smaller then the others, they are still a good twelve feet tall.</span></li><li data-dcnode-id="2321"><span data-dcnode-id="2342" instrument_node=""> Then there's the actual giants; the legendary Fire Giants. Integral to </span><em data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Elden Ring</span></em><span data-dcnode-id="2339" instrument_node=""> mythos, the Fire Giants were a primeval species of huge, towering humanoids who dwelled on top the towering mountain peaks far above the capital city of Leyndell. Thousands of years ago, an apocalyptic war raged between the Empire of Marika and the Fire Giants who tore the very mountains asunder and nearly destroyed the Empire. After untold sacrifices, the Fire Giants were eventually defeated and were slaughtered to the very last, starting the Age of the Erdtree. They are seldom spoken about, for they are considered nightmares long gone. Their lands, the Mountaintops of the Giants, are forbidden for most to enter. When the player actually visits the peaks, they're revealed to be a snowy hellscape, devoid of much life, and </span><em data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">covered</span></em><span data-dcnode-id="2336" instrument_node=""> in the decaying husks of millennium old dead giants. </span><span class="spoiler" data-dcnode-id="2322" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2335" instrument_node="">And then we learn the truth; a </span><em data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">single</span></em><span data-dcnode-id="2332" instrument_node=""> Fire Giant, the last one in existence, still lives on the tallest peak, revealing them to be </span><em data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">nightmarish</span></em><span data-dcnode-id="2329" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanoidAbomination" title="/pmwiki/pmwiki.php/Main/HumanoidAbomination"><span data-dcnode-id="2328" instrument_node="">Humanoid Abominations</span></a><span data-dcnode-id="2326" instrument_node="">. While they are extremely faithful to the Jotun of Norse Mythology (being very Norse-looking, having red hair, and about forty feet tall), they have </span><em data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">a second face</span></em><span data-dcnode-id="2323" instrument_node=""> on their stomach which can awaken the ability to cast powerful fire magic.</span></span></li></ul></li><li data-dcnode-id="2232"><span data-dcnode-id="2318" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurGodsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurGodsAreDifferent"><span data-dcnode-id="2317" instrument_node="">Our Gods Are Different</span></a><span data-dcnode-id="2315" instrument_node="">: Gods and divinity are a broad subject in Lands Between, not helped by the fact the divine hierarchy itself is not fully understood by most mortals.</span><ul data-dcnode-id="2233"><li data-dcnode-id="2288"><span data-dcnode-id="2314" instrument_node=""> It should be noted the term "Demigod" is multilayered and encompasses beings of vastly different power levels. It's used, most often, in context to Marika's direct brood; her children she had with Godfry and Radagon. Demigod in our real world history refers to an offspring born from a union between a God and a mortal. In Lands Between however; Marika is the </span><a class="twikilink" data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TopGod" title="/pmwiki/pmwiki.php/Main/TopGod"><span data-dcnode-id="2313" instrument_node="">Top God</span></a><span data-dcnode-id="2311" instrument_node="">, and her consorts are </span><em data-dcnode-id="2308"><a class="twikilink" data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeityOfHumanOrigin" title="/pmwiki/pmwiki.php/Main/DeityOfHumanOrigin"><span data-dcnode-id="2310" instrument_node="">Deity of Human Origin</span></a></em><span data-dcnode-id="2307" instrument_node="">, </span><em data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">once</span></em><span data-dcnode-id="2304" instrument_node=""> mortal champions turned into Lords through </span><a class="twikilink" data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperEmpowering" title="/pmwiki/pmwiki.php/Main/SuperEmpowering"><span data-dcnode-id="2303" instrument_node="">Super Empowering</span></a><span data-dcnode-id="2301" instrument_node="">, and referred as Demigods. Thus, Marika's Demigod children have a full Divine parent and a </span><a class="twikilink" data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SemiDivine" title="/pmwiki/pmwiki.php/Main/SemiDivine"><span data-dcnode-id="2300" instrument_node="">Semi-Divine</span></a><span data-dcnode-id="2298" instrument_node=""> parent; as such, they display </span><em data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">immense</span></em><span data-dcnode-id="2295" instrument_node=""> power, ranging from an utter mastery in arms and magic, to more Esoteric abilities, can be </span><a class="twikilink" data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PhysicalGod" title="/pmwiki/pmwiki.php/Main/PhysicalGod"><span data-dcnode-id="2294" instrument_node="">Physical Gods</span></a><span data-dcnode-id="2292" instrument_node=""> in their own right, and worshipped as such. The lesser offsprings of these Demigods (such as Godrick and </span><span class="spoiler" data-dcnode-id="2290" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2291" instrument_node=""> Millicent</span></span><span data-dcnode-id="2289" instrument_node="">) are in turn much more in-line with classical depictions in terms of power (being very gifted, but far lesser champions) even though they too are referred to as Demigods.</span></li><li data-dcnode-id="2284"><span data-dcnode-id="2287" instrument_node=""> Queen Marika, as the one chosen to bear the Elden Ring for Elden Lords to operate and use its power, is “a god in truth” and worshipped as such. Though Elden Lords rule the lands with her, Queen Marika’s authority supersedes them and she is the one responsible for the formation and imposition of the Golden Order, laws of causality which govern the Lands Between. Her divinity is such, even individuals who are even slightly or remotely connected to her are considered her kin, though only those Marika personally acknowledges can be called “demigods”. </span><span class="spoiler" data-dcnode-id="2285" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2286" instrument_node="">Given various revelations about Malenia’s status as the Goddess of Rot, the Elden Beast, as well the Tarnished’s potential to become Lord of Chaos, it appears what constitutes a “god” is to bear the power and essence of an outer god in body and in soul, and become an extension of its being; as all of the aforementioned do so for different outer gods.</span></span></li><li data-dcnode-id="2248"><span data-dcnode-id="2283" instrument_node=""> Above even Queen Marika and her Golden Order is the Greater Will, which is acknowledged as a divine being who bestowed the Lands Between with Elden Ring itself. As the name suggests, it is more of an </span><a class="twikilink" data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SentientCosmicForce" title="/pmwiki/pmwiki.php/Main/SentientCosmicForce"><span data-dcnode-id="2282" instrument_node="">abstract entity</span></a><span data-dcnode-id="2280" instrument_node=""> than a physical being, given it doesn’t directly interfere with events and allows Marika to run the world at large. However, they do interact with the world through their heralds the Two Fingers, who can be seen as </span><a class="twikilink" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurAngelsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurAngelsAreDifferent"><span data-dcnode-id="2279" instrument_node="">the angels</span></a><span data-dcnode-id="2277" instrument_node=""> to the Greater Will’s god, whereas Queen Marika is the Will’s extension of being. The Greater Will appears to be in opposition to several forces of nature, as Queen Marika had gone to war with both the Ancient Dragons and Giants on its behalf. </span><span class="spoiler" data-dcnode-id="2275" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2276" instrument_node="">Various pieces of lore reveal this is because the Greater Will is not the only “god” with their power and influence, there are a number of “outer gods” who appear to hold similar powers and influence</span></span><span data-dcnode-id="2274" instrument_node="">:</span><ul data-dcnode-id="2249"><li data-dcnode-id="2270"><span data-dcnode-id="2273" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2271" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2272" instrument_node="">An entity associated with the falling stars and the dark moon, whom the ancient Lucaria sorcerers contacted and seen as a guiding force by major sorcerers, including Ranni. Its motivations are completely unknown, as various sorcerers have been inspired with different sorceries and affected differently by its guidance, making it very personal in nature.</span></span></li><li data-dcnode-id="2266"><span data-dcnode-id="2269" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2267" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2268" instrument_node="">One who sent the Three Fingers as its envoy, who blessed Shabriri with the Frenzied Flame. Frenzied Flames spread madness and corrupt other life into carrying it, being considered a force of corruption by the Golden Order. It appears to desire nothing more or less than destruction of order and the lands, as it empowers and corrupts its champions in equal measure.</span></span></li><li data-dcnode-id="2262"><span data-dcnode-id="2265" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2263" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2264" instrument_node="">The “fell god” mentioned to dwell in the flames of Fire Giants, whose Forge remain undying even to Marika and the Elden Ring. It is heavily implied to be the reason why Marika’s Empire slaughtered them down to the very last, then she cursed the last giant to tend to their Forge for all eternity.</span></span></li><li data-dcnode-id="2258"><span data-dcnode-id="2261" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2259" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2260" instrument_node="">One who had part of its essence sealed underneath the Lake of Rot, which resulted in the unholy Scarlet Rot infested place it is now. Not only the Scarlet Rot is a corruption incurable to even the God-kin, the entity appears to have marked Malenia since birth to become an extension of it as “Goddess of Rot”.</span></span></li><li data-dcnode-id="2254"><span data-dcnode-id="2257" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2255" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2256" instrument_node="">One who sent a "twinbird" as its envoy, the mother of Deathbirds. It is also heavily implied to be the one who blessed the Gloam-Eyed Queen and her Godskin cult their Destined Death, because the Ghostflame Sorcery used by its Deathbirds and Fia's Mist derived from Godwyn's Cursemark of Death (itself a portion of Destined Death) are considered "Death" Sorceries and are empowered by the Prince of Death's Staff also derived from Godwyn.</span></span></li><li data-dcnode-id="2250"><span data-dcnode-id="2253" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2251" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2252" instrument_node="">One whom Mohg refers to as “Formless Mother” and “Mother of Truth”, associated with blood and birth. Mohg contacted it during the Shattering wars in the hopes of using its power to resurrect Miquella as a god and to become his consort, and for that purpose Mohg had formed a cult of blood to spread bloodshed across Lands Between.</span></span></li></ul></li><li data-dcnode-id="2234"><span data-dcnode-id="2247" instrument_node=""> As well, the exact mechanics behind how these gods work is fairly intricate. The current Golden Order is maintained through the Erdtree, powered by the Elden Ring and directed by Queen Marika, functioning as a sort of </span><a class="twikilink" data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicKeystone" title="/pmwiki/pmwiki.php/Main/CosmicKeystone"><span data-dcnode-id="2246" instrument_node="">Cosmic Keystone</span></a><span data-dcnode-id="2244" instrument_node=""> which dictates laws of causality in the land such as souls flowing into the Erdtree to reincarnate when one dies. It's later clarified specific beings have been chosen by the Two Fingers in ages past as "Empyreans" to fulfil the role of Elden Ring bearer, Marika just happens to be the latest and currently reigning one. These beings are strong enough to act as the lynchpin </span><a class="twikilink" data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BarrierMaiden" title="/pmwiki/pmwiki.php/Main/BarrierMaiden"><span data-dcnode-id="2243" instrument_node="">Barrier Maiden</span></a><span data-dcnode-id="2241" instrument_node=""> to hold the new order in place, and can "marry" a consort who acts as a bodyguard/enforcer. Prior to the Shattering, candidates of Empyrean to succeed Marika are </span><span class="spoiler" data-dcnode-id="2239" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2240" instrument_node="">Ranni, Miquella, and Malenia</span></span><span data-dcnode-id="2238" instrument_node="">. However, </span><span class="spoiler" data-dcnode-id="2236" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2237" instrument_node="">as the Greater Will appears to have abandoned Lands Between, another outer god can swap in an Empyrean of their own to run the show; though at least Frenzied Flame and Scarlet Rot don't appear terribly interested in making use of the Elden Ring, Ranni takes it upon herself to represent the Dark Moon in the "Age of the Stars" ending</span></span><span data-dcnode-id="2235" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2218"><span data-dcnode-id="2231" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurOgresAreHungrier" title="/pmwiki/pmwiki.php/Main/OurOgresAreHungrier"><span data-dcnode-id="2230" instrument_node="">Our Ogres Are Hungrier</span></a><span data-dcnode-id="2228" instrument_node="">: Omens are horned, deformed giants born to otherwise completely normal parents, and are victims of massive </span><a class="twikilink" data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticRacism" title="/pmwiki/pmwiki.php/Main/FantasticRacism"><span data-dcnode-id="2227" instrument_node="">Fantastic Racism</span></a><span data-dcnode-id="2225" instrument_node="">: commoner ones generally have their horns sawed off (which is generally fatal to the Omen), while nobles are instead hidden in the sewers to avoid familial shame. Apart from that, Omens are as capable of free will as anyone else - while Mohg, an Omen born to Marika and Godfrey, is an outright </span><a class="twikilink" data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SatanicArchetype" title="/pmwiki/pmwiki.php/Main/SatanicArchetype"><span data-dcnode-id="2224" instrument_node="">Satanic Archetype</span></a><span data-dcnode-id="2222" instrument_node="">, his twin brother Morgott is </span><a class="twikilink" data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDutifulSon" title="/pmwiki/pmwiki.php/Main/TheDutifulSon"><span data-dcnode-id="2221" instrument_node="">The Dutiful Son</span></a><span data-dcnode-id="2219" instrument_node="">.</span></li><li data-dcnode-id="2184"><span data-dcnode-id="2217" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurMonstersAreWeird" title="/pmwiki/pmwiki.php/Main/OurMonstersAreWeird"><span data-dcnode-id="2216" instrument_node="">Our Monsters Are Weird</span></a><span data-dcnode-id="2214" instrument_node="">: FromSoftware isn't exactly known for unimaginative creature design, but some of these monsters take it up a notch. They include...</span><ul data-dcnode-id="2185"><li data-dcnode-id="2209"><span data-dcnode-id="2213" instrument_node=""> Godrick, a hulking demigod whose back is covered in dozens of prosthetic arms and who has even more sprouting off of his actual arm. He later uses the severed head of a dragon as an </span><a class="twikilink" data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArmCannon" title="/pmwiki/pmwiki.php/Main/ArmCannon"><span data-dcnode-id="2212" instrument_node="">Arm Cannon</span></a><span data-dcnode-id="2210" instrument_node="">.</span></li><li data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node=""> Something which looks like a giant crawling hand with way too many fingers.</span></li><li data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node=""> A misshapen creature shrouded in a robe who crawls like a spider on dozens of human-looking arms.</span></li><li data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node=""> A huge quadrupedal stone construct with a bell hung from its underside and some sort of building on top.</span></li><li data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node=""> Land octopi, who are giant masses of ropy, intertwined tentacles with avian-looking beaks which can eat their own limbs to heal.</span></li><li data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node=""> Strange, crawling creatures who dwell in Agheel's lake and have bodies shaped like massive, slimy eggs.</span></li><li data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node=""> Centipede-esque golems with bodies made of connected, spherical stones.</span></li><li data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node=""> Huge, glowing jellyfish floating through the air.</span></li><li data-dcnode-id="2190"><span data-dcnode-id="2194" instrument_node=""> Canines resembling a cross between a hairless dog and a </span><em data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Tyrannosaurus</span></em><span data-dcnode-id="2191" instrument_node="">.</span></li><li data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node=""> Trolls in the setting are barrel-chested giants but are emaciated to the point their stomachs are caved in.</span></li><li data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node=""> And the Pot Warriors: sentient, animated pot jars which explode liquid when they die. Their shards are also coveted by poachers thanks to the magic within.</span></li></ul></li><li data-dcnode-id="2173"><span data-dcnode-id="2183" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurVampiresAreDifferent" title="/pmwiki/pmwiki.php/Main/OurVampiresAreDifferent"><span data-dcnode-id="2182" instrument_node="">Our Vampires Are Different</span></a><span data-dcnode-id="2180" instrument_node="">: Well, </span><em data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">implied</span></em><span data-dcnode-id="2177" instrument_node=""> to be vampires, but there's nothing concrete. Among the background stories of the Tarnished </span><a class="twikilink" data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerCharacter" title="/pmwiki/pmwiki.php/Main/PlayerCharacter"><span data-dcnode-id="2176" instrument_node="">Player Character</span></a><span data-dcnode-id="2174" instrument_node=""> is the "nightfolk" background; pale-skinned, white-haired, silver-eyed (wo)men who are supposedly rare in the Lands Between and live in seclusion whose blood is supposedly colored silver.</span></li><li data-dcnode-id="2156"><span data-dcnode-id="2172" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurWerewolvesAreDifferent" title="/pmwiki/pmwiki.php/Main/OurWerewolvesAreDifferent"><span data-dcnode-id="2171" instrument_node="">Our Werewolves Are Different</span></a><span data-dcnode-id="2169" instrument_node="">: One such werewolf is called Blaidd, a hulking, wolf-headed knight clad in black armor and wielding a </span><a class="twikilink" data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BFS" title="/pmwiki/pmwiki.php/Main/BFS"><span data-dcnode-id="2168" instrument_node="">BFS</span></a><span data-dcnode-id="2166" instrument_node="">.</span><ul data-dcnode-id="2157"><li data-dcnode-id="2158"><span data-dcnode-id="2165" instrument_node=""> Another is Beast Clergyman Gurranq </span><span class="spoiler" data-dcnode-id="2163" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2164" instrument_node=""> and his true identity, Maliketh the Black Blade</span></span><span data-dcnode-id="2162" instrument_node="">, who is an enormous </span><a class="twikilink" data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Bloodborne" title="/pmwiki/pmwiki.php/VideoGame/Bloodborne"><span data-dcnode-id="2161" instrument_node="">Bloodborne-style</span></a><span data-dcnode-id="2159" instrument_node=""> werewolf.</span></li></ul></li><li data-dcnode-id="2145"><span data-dcnode-id="2155" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OutsideContextProblem" title="/pmwiki/pmwiki.php/Main/OutsideContextProblem"><span data-dcnode-id="2154" instrument_node="">Outside-Context Problem</span></a><span data-dcnode-id="2152" instrument_node="">: The glintstone comets became this for the Lands Between. Study of their shards brought a new kind of magic to the world, but glintstone also </span><a class="twikilink" data-dcnode-id="2150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlienKudzu" title="/pmwiki/pmwiki.php/Main/AlienKudzu"><span data-dcnode-id="2151" instrument_node="">infects its surroundings</span></a><span data-dcnode-id="2149" instrument_node="">, turning landscape, animals and people into more glintstone... And sometimes the fallen star turns out an </span><a class="twikilink" data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="2148" instrument_node="">indescribable alien monster</span></a><span data-dcnode-id="2146" instrument_node="">.</span></li><li data-dcnode-id="2127"><span data-dcnode-id="2144" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PeninsulaOfPowerLeveling" title="/pmwiki/pmwiki.php/Main/PeninsulaOfPowerLeveling"><span data-dcnode-id="2143" instrument_node="">Peninsula of Power Leveling</span></a><span data-dcnode-id="2141" instrument_node="">:</span><ul data-dcnode-id="2128"><li data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node=""> The area outside the Bestial Sanctum at the northern tip of Caelid. While it's reachable by normal methods, there's also a teleporter northeast of the Third Church of Marika (at the east end of the river there) in northeastern Limgrave leading directly there. Though the area sports an extremely tough (but avoidable) boss. It has many small enemies which can be killed for almost 1,100 runes each. A nearby point of grace allows for easy respawning and healing as well.</span></li><li data-dcnode-id="2129"><span data-dcnode-id="2138" instrument_node=""> Another peninsula would be at </span><span class="spoiler" data-dcnode-id="2130" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2137" instrument_node="">Mohgwyn's Palace, and a much more compact one at that. At the Palace Approach Ledge-Road Site of Grace, there's a gathering of Albinaurics who drop around 2000 runes each. And there's around 17 of them from just across the grace, and almost all of them not reacting to the player until attacked. There's also a Giant Crow in the distance that can be sniped at, which earns 11000 runes. The way to get to the area in the first place is to either go through a portal at the Consecrated Snowfields near the Yelough Anix Ruins... or complete Varre's quest of invading three players, join their order, and get an item that teleports to the entrance of the boss arena, with a map and a site of grace just right inside. Granted, the bird farm quickly becomes irrelevant for higher levels, and the way to efficiently farm the much more lucrative Albinaurics is to use the Sacred Relic Sword, which is gained by exchanging the remembrance of the </span><a class="twikilink" data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="2136" instrument_node="">Final Boss</span></a><span data-dcnode-id="2134" instrument_node="">, along with the Gold Scarab, the Holy Scorpion Charm, the Shard of Alexander and Ritual Sword Talisman to not only get more runes from the Gold Scarab, but to help guarantee the overkill bonus for even more. Even then, this only shines in </span><a class="twikilink" data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="2133" instrument_node="">New Game+</span></a><span data-dcnode-id="2131" instrument_node=""> when the rune gain is doubled in the area.</span></span></li></ul></li><li data-dcnode-id="2113"><span data-dcnode-id="2126" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PermanentlyMissableContent" title="/pmwiki/pmwiki.php/Main/PermanentlyMissableContent"><span data-dcnode-id="2125" instrument_node="">Permanently Missable Content</span></a><span data-dcnode-id="2123" instrument_node="">:</span><ul data-dcnode-id="2114"><li data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node=""> Various NPC sidequests can intertwine with others. Should circumstances render you unable to progress one any further (such as an offscreen death triggered by advancing the main plot too far) you lose out on its rewards for your current playthrough.</span></li><li data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node=""> You may occasionally get attacked by NPC invaders while traversing the Lands Between. If you happen to miss them and you go on to beat the area's boss, the invaders will no longer pester you, locking you out of unique loot gained from defeating them this playthrough.</span></li><li data-dcnode-id="2115"><span data-dcnode-id="2118" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2116" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2117" instrument_node="">Defeating Maliketh in Crumbling Farum Azula causes Leyndell to be buried in a sea of ash as the Erdtree is fully set ablaze. New treasures and enemies are found in this new environment, but most of everything else there you've missed cannot be claimed.</span></span></li></ul></li><li data-dcnode-id="2108"><span data-dcnode-id="2112" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlatformHell" title="/pmwiki/pmwiki.php/Main/PlatformHell"><span data-dcnode-id="2111" instrument_node="">Platform Hell</span></a><span data-dcnode-id="2109" instrument_node="">: There are a few out-of-the-way areas that can only be reached by precarious jumps across tiny platforms, which doesn't play well with the game's sense of momentum and judgment of what constitutes a lethal drop. Expect the surroundings to be painted with bloodstains in online mode.</span></li><li data-dcnode-id="2103"><span data-dcnode-id="2107" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerHeadquarters" title="/pmwiki/pmwiki.php/Main/PlayerHeadquarters"><span data-dcnode-id="2106" instrument_node="">Player Headquarters</span></a><span data-dcnode-id="2104" instrument_node="">: The Roundtable Hold is this for the Tarnished. It is hidden headquarter for all Tarnished working under the Two Fingers' command to work toward one of them becoming the next Elden Lord. It acts as a safe haven for the Tarnished as well as several helpful characters and merchants, all of whom can't be attacked due to a pact. In there, one can notably gather helpful information on the whereabouts of the bosses, upgrade their equipment and visit merchants to notably buy boss weapons.</span></li><li data-dcnode-id="2095"><span data-dcnode-id="2102" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayingWithFire" title="/pmwiki/pmwiki.php/Main/PlayingWithFire"><span data-dcnode-id="2101" instrument_node="">Playing with Fire</span></a><span data-dcnode-id="2099" instrument_node="">: Many of the Faith-based Incantations are fire-based. Some are fairly straightforward, like Oh, Flame! being a short-range burst of fire or Flame Sling being a fireball; while others have definitely odder effects, such as The Flame of Frenzy shooting bolts of fire out of the player's </span><em data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">eyes</span></em><span data-dcnode-id="2096" instrument_node="">.</span></li><li data-dcnode-id="2090"><span data-dcnode-id="2094" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlotTriggeringDeath" title="/pmwiki/pmwiki.php/Main/PlotTriggeringDeath"><span data-dcnode-id="2093" instrument_node="">Plot-Triggering Death</span></a><span data-dcnode-id="2091" instrument_node="">: The story trailer reveals the Shattering and the ensuing wars were kicked off by the assassination of the demigod Godwyn by unknown assailants.</span></li><li data-dcnode-id="2076"><span data-dcnode-id="2089" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PointOfNoReturn" title="/pmwiki/pmwiki.php/Main/PointOfNoReturn"><span data-dcnode-id="2088" instrument_node="">Point of No Return</span></a><span data-dcnode-id="2086" instrument_node="">: After </span><span class="spoiler" data-dcnode-id="2084" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2085" instrument_node="">defeating Maliketh, The Black Blade and completing Crumbling Farum Azula</span></span><span data-dcnode-id="2083" instrument_node="">, you will no longer be able to go to </span><span class="spoiler" data-dcnode-id="2081" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2082" instrument_node="">Leyndell as it was above-ground, as now it becomes completely covered in ash and turns into another gameplay area entirely with new enemies and treasures</span></span><span data-dcnode-id="2080" instrument_node="">. Although there aren't any explicit warnings this is a case, you have a grace period </span><span class="spoiler" data-dcnode-id="2078" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2079" instrument_node="">after you start burning the Erdtree and it has an a noticeable impact on the world</span></span><span data-dcnode-id="2077" instrument_node="">. Subverted as this only affects the area in question: you are still free to explore the rest of the world which is left as it is, and follow other available questlines.</span></li><li data-dcnode-id="2068"><span data-dcnode-id="2075" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PollutedWasteland" title="/pmwiki/pmwiki.php/Main/PollutedWasteland"><span data-dcnode-id="2074" instrument_node="">Polluted Wasteland</span></a><span data-dcnode-id="2072" instrument_node="">: Caelid and </span><span class="spoiler" data-dcnode-id="2070" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2071" instrument_node="">the Lake of Rot</span></span><span data-dcnode-id="2069" instrument_node=""> are this, having been devastated by the scarlet rot because of Malenia releasing the rot during her fight against Radahn. As a result, these area have a number of hazards and enemies which can inflict rot on the player.</span></li><li data-dcnode-id="2052"><span data-dcnode-id="2067" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PotionBrewingMechanic" title="/pmwiki/pmwiki.php/Main/PotionBrewingMechanic"><span data-dcnode-id="2066" instrument_node="">Potion-Brewing Mechanic</span></a><span data-dcnode-id="2064" instrument_node="">: The player can apply two effects of their choice to the Flask of Wondrous Physick, with their options increasing as they gather more Crystal Tears. These effects vary, including things like </span><a class="twikilink" data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GradualRegeneration" title="/pmwiki/pmwiki.php/Main/GradualRegeneration"><span data-dcnode-id="2063" instrument_node="">Gradual Regeneration</span></a><span data-dcnode-id="2061" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReducedManaCost" title="/pmwiki/pmwiki.php/Main/ReducedManaCost"><span data-dcnode-id="2060" instrument_node="">free spellcasting for a short period</span></a><span data-dcnode-id="2058" instrument_node="">, creating a </span><a class="twikilink" data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SingleUseShield" title="/pmwiki/pmwiki.php/Main/SingleUseShield"><span data-dcnode-id="2057" instrument_node="">Single-Use Shield</span></a><span data-dcnode-id="2055" instrument_node="">, curing all status ailments, and... </span><a class="twikilink" data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActionBomb" title="/pmwiki/pmwiki.php/Main/ActionBomb"><span data-dcnode-id="2054" instrument_node="">blowing yourself up.</span></a></li><li data-dcnode-id="2040"><span data-dcnode-id="2051" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerAtAPrice" title="/pmwiki/pmwiki.php/Main/PowerAtAPrice"><span data-dcnode-id="2050" instrument_node="">Power at a Price</span></a><span data-dcnode-id="2048" instrument_node="">:</span><ul data-dcnode-id="2041"><li data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node=""> In exchange for the heart of a slain dragon, the player can perform dragon communion to gain dragon-based abilities. After slaying the dragon, an NPC tells the player where and how the heart can be used. However, he warns those who do so will one day shed their humanity and be driven mad by their hunger for the power of the dragons. What exactly this means for the player in the long-term, only time will tell. As for what it means for other people in the setting, the Magma Wyrms and the Dragonkin Soldiers bosses are what happens when people attempt communion or try using dragon scales to become immortal; the former are cursed to never fly and become pale imitations of themselves, and the latter failed in their immortality attempt and the vast majority died as decrepit knockoffs of the dragons.</span></li><li data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node=""> From a story perspective, we see this infatuation with the power of dragons in Godrick the Grafted's opening cutscene and his wish of the dragons to share their power with him, along with his merging with the head of a dragon. Given the joining of the two has a diseased, grotesque look, it's likely the merger of demigod and dragon is more likely to be fatal in the long run.</span></li><li data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node=""> The Scarseal/Soreseal talismans give a +3/+5 increase to four stats (Vigor/Endurance/Strength/Dexterity for Radagon's, Mind/Intelligence/Faith/Arcane for Marika's) in exchange for more damage taken (about 10% depending on which talisman). However, having the equivalent of 12/20 levels of stat increases far outweighs the downside, especially for Radagon's talismans which give defensive stats which counteract this penalty. There is also the Scarab head pieces, the Crimson and Cerulearn ones increase the effectiveness of their respective flasks, while the others reduce the FP cost to ether sorceries, incantations or weapon skills, all in exchange for increasing damage taken.</span></li></ul></li><l
