lage in the Weeping Peninsula will have you encounter not just the local villagers afflicted by the Flames of Frenzy, but even the </span><em data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">rats</span></em><span data-dcnode-id="3982" instrument_node="">. </span><span class="spoiler" data-dcnode-id="3974" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3981" instrument_node="">The Tarnished </span><a class="twikilink" data-dcnode-id="3979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerCharacter" title="/pmwiki/pmwiki.php/Main/PlayerCharacter"><span data-dcnode-id="3980" instrument_node="">Player Character</span></a><span data-dcnode-id="3978" instrument_node=""> is implied to be the only one capable of properly controlling the Frenzied Flame, but not even they are immune to its effects, as the Lord of Frenzied Flame ending shows them becoming a </span><a class="twikilink" data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanoidAbomination" title="/pmwiki/pmwiki.php/Main/HumanoidAbomination"><span data-dcnode-id="3977" instrument_node="">Humanoid Abomination</span></a><span data-dcnode-id="3975" instrument_node=""> whose mere existence is causing the Lands Between to be encroached in fire.</span></span></li><li data-dcnode-id="3959"><span data-dcnode-id="3972" instrument_node=""> The Scarlet Rot likely takes this trope </span><a class="twikilink" data-dcnode-id="3970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpToEleven" title="/pmwiki/pmwiki.php/Main/UpToEleven"><span data-dcnode-id="3971" instrument_node="">Up to Eleven</span></a><span data-dcnode-id="3969" instrument_node="">. Acting much like </span><a class="twikilink" data-dcnode-id="3967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheVirus" title="/pmwiki/pmwiki.php/Main/TheVirus"><span data-dcnode-id="3968" instrument_node="">The Virus</span></a><span data-dcnode-id="3966" instrument_node="">, the rot has infested the </span><em data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">entirety</span></em><span data-dcnode-id="3963" instrument_node=""> of Caelid fiefdom and corrupted everything from the land, the waters, the inhabitants (plants, animals, humans, Crystallians and even Dragons), covering the sky with blood red clouds from the sheer corruption. The disease it inflicts makes living organisms rot and slowly fuse into the land itself, causing excruiating pain to body and mind, while the rotten land gives rise to creatures made out of rot itself, designed to spread the rot. It took Redmane Knights using all </span><a class="twikilink" data-dcnode-id="3961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillItWithFire" title="/pmwiki/pmwiki.php/Main/KillItWithFire"><span data-dcnode-id="3962" instrument_node="">the firepower</span></a><span data-dcnode-id="3960" instrument_node=""> they had to keep it from spreading out of Caelid.</span></li></ul></li><li data-dcnode-id="3952"><span data-dcnode-id="3956" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CounterAttack" title="/pmwiki/pmwiki.php/Main/CounterAttack"><span data-dcnode-id="3955" instrument_node="">Counter-Attack</span></a><span data-dcnode-id="3953" instrument_node="">: The new Guard Counter mechanic, which after blocking an attack, pressing the charge attack button will initiate one. Besides the actual damage, it will also cause heavy posture damage, staggering most common enemies for a critical hit.</span></li><li data-dcnode-id="3945"><span data-dcnode-id="3951" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicChessGame" title="/pmwiki/pmwiki.php/Main/CosmicChessGame"><span data-dcnode-id="3950" instrument_node="">Cosmic Chess Game</span></a><span data-dcnode-id="3948" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3946" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3947" instrument_node="">Given various pieces of lore reveal the Greater Will and a number of abstract "outer gods" have been empowering different races and individuals since the ancient times until the present, it appears the Greater Will intends to have Lands Between under the dominion of its Elden Ring bearer, and wants to erase the influences of certain outer gods from the land, who themselves are attempting to influence the state of affairs more or less subtly. It's to be noted they can also form 'alliances' so to speak, such as the one formed by Rennala and Radagon, two champions of different outer gods, getting married at the church of vows, relatively short lived as it was.</span></span></li><li data-dcnode-id="3933"><span data-dcnode-id="3944" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicKeystone" title="/pmwiki/pmwiki.php/Main/CosmicKeystone"><span data-dcnode-id="3943" instrument_node="">Cosmic Keystone</span></a><span data-dcnode-id="3941" instrument_node="">: Two-fold;</span><ul data-dcnode-id="3934"><li data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node=""> The Elden Ring itself is the physical manifestation of the natural order of all things, and its fracturing drove most of the demigods to a greed-driven madness as they tried to salvage whatever power they could from it and ascend as the next Elden Lord. This mad dash for the fragments of the Elden Ring triggered a massive civil war and disrupted the natural cycle of life and death, as well as the knock-on effects the Shattering wars had, such as the release of the Scarlet Rot in Caelid and the creation of Those Who Live In Death.</span></li><li data-dcnode-id="3935"><span data-dcnode-id="3938" instrument_node=""> Queen Marika herself is the keystone for the Elden Ring itself, as without her as its proxy the Elden Ring wouldn't be able to set the rules of reality in the Lands Between. Her disappearance after the Elden Ring was fractured was just as much an inciting factor in the Shattering wars as the Elden Ring breaking was, since none of her demigod children could turn to her for guidance and, absent of her rule, tried to make a play for her throne, or otherwise tried to subvert the Golden Order she had been the incarnation of. </span><span class="spoiler" data-dcnode-id="3936" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3937" instrument_node="">In a rare twist on this trope, Marika is the one who broke the Elden Ring for reasons unknown, meaning one keystone was directly responsible for nearly destroying another keystone.</span></span></li></ul></li><li data-dcnode-id="3925"><span data-dcnode-id="3932" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicMotifs" title="/pmwiki/pmwiki.php/Main/CosmicMotifs"><span data-dcnode-id="3931" instrument_node="">Cosmic Motifs</span></a><span data-dcnode-id="3929" instrument_node="">: The game makes heavy use of stars as motifs; and notably with 2 different connotations of the word. Much like in real life ancient history, Lands Between’s inhabitants refer to all celestial objects in the heavens as “stars” - but meteors and comets are distinguished, being called “falling stars” and “shooting stars” to differentiate them with the distant stars which fill up the universe. The distinction doesn’t end there; the falling stars are the source of Glintstones which Carian Royal Family and Raya Lucaria Academy studied, as well as the origin of alien creatures like Alabaster or Onyx Lords, </span><span class="spoiler" data-dcnode-id="3927" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3928" instrument_node="">all of which are connected with the Dark Moon who guides Ranni</span></span><span data-dcnode-id="3926" instrument_node="">; meanwhile, the distant stars are often associated with the Greater Will, who bestowed Lands Between with the Elden Ring.</span></li><li data-dcnode-id="3895"><span data-dcnode-id="3924" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreatorThumbprint" title="/pmwiki/pmwiki.php/Main/CreatorThumbprint"><span data-dcnode-id="3923" instrument_node="">Creator Thumbprint</span></a><span data-dcnode-id="3921" instrument_node="">: George R.R. Martin's </span><em data-dcnode-id="3918"><a class="twikilink" data-dcnode-id="3919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ASongOfIceAndFire" title="/pmwiki/pmwiki.php/Literature/ASongOfIceAndFire"><span data-dcnode-id="3920" instrument_node="">A Song of Ice and Fire</span></a></em><span data-dcnode-id="3917" instrument_node=""> is known for the frequency of discussion and series terms involving hands and hand-related imagery. Sure enough, hands crop up as a major theme in this game as well, what with the Finger Maidens, multiple finger items, and numerous monsters with extra arms.</span><ul data-dcnode-id="3896"><li data-dcnode-id="3897"><span data-dcnode-id="3916" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustBeforeTheEnd" title="/pmwiki/pmwiki.php/Main/JustBeforeTheEnd"><span data-dcnode-id="3915" instrument_node="">Just Before the End</span></a><span data-dcnode-id="3913" instrument_node=""> dark fantasy settings, references to </span><a class="twikilink" data-dcnode-id="3911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Myth/NorseMythology" title="/pmwiki/pmwiki.php/Myth/NorseMythology"><span data-dcnode-id="3912" instrument_node="">Norse Mythology</span></a><span data-dcnode-id="3910" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="3908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlliterativeFamily" title="/pmwiki/pmwiki.php/Main/AlliterativeFamily"><span data-dcnode-id="3909" instrument_node="">Alliterative Families</span></a><span data-dcnode-id="3907" instrument_node=""> are features of both Hidetaka Miyazaki </span><em data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">and</span></em><span data-dcnode-id="3904" instrument_node=""> George R. R. Martin's </span><a class="twikilink" data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/DarkSouls" title="/pmwiki/pmwiki.php/Videogame/DarkSouls"><span data-dcnode-id="3903" instrument_node="">most famous</span></a><span data-dcnode-id="3901" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ASongOfIceAndFire" title="/pmwiki/pmwiki.php/Literature/ASongOfIceAndFire"><span data-dcnode-id="3900" instrument_node="">works</span></a><span data-dcnode-id="3898" instrument_node="">, so naturally they show up here as well.</span></li></ul></li><li data-dcnode-id="3878"><span data-dcnode-id="3894" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrapsackWorld" title="/pmwiki/pmwiki.php/Main/CrapsackWorld"><span data-dcnode-id="3893" instrument_node="">Crapsack World</span></a><span data-dcnode-id="3891" instrument_node="">: With FromSoftware and </span><a class="twikilink" data-dcnode-id="3889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/GeorgeRRMartin" title="/pmwiki/pmwiki.php/Creator/GeorgeRRMartin"><span data-dcnode-id="3890" instrument_node="">George R. R. Martin</span></a><span data-dcnode-id="3888" instrument_node=""> behind it, both creators who are notorious for it, it shouldn't come as a surprise. The Lands Between is one of the darkest and twisted fantasy worlds put in fiction. The cosmic force behind the world's very logic and principles has been destroyed, throwing the world into disarray. Most of the land is consumed by an endless </span><a class="twikilink" data-dcnode-id="3886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForeverWar" title="/pmwiki/pmwiki.php/Main/ForeverWar"><span data-dcnode-id="3887" instrument_node="">Forever War</span></a><span data-dcnode-id="3885" instrument_node=""> fought by a group of </span><a class="twikilink" data-dcnode-id="3883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PhysicalGod" title="/pmwiki/pmwiki.php/Main/PhysicalGod"><span data-dcnode-id="3884" instrument_node="">Physical Gods</span></a><span data-dcnode-id="3882" instrument_node=""> who have gone mad with power and corruption, which has resulted in total breakdown of society, most common folk have been driven mad or killed, the world is littered in </span><a class="twikilink" data-dcnode-id="3880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BodyHorror" title="/pmwiki/pmwiki.php/Main/BodyHorror"><span data-dcnode-id="3881" instrument_node="">Body Horror</span></a><span data-dcnode-id="3879" instrument_node=""> infused nightmares, and that's not even getting into the nameless horrors lurking beneath the world. The Lands Between are filled with decaying ruins, consumed cities, and an endless amount of monsters trying to kill you.</span></li><li data-dcnode-id="3860"><span data-dcnode-id="3877" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DamnYouMuscleMemory" title="/pmwiki/pmwiki.php/Main/DamnYouMuscleMemory"><span data-dcnode-id="3876" instrument_node="">Damn You, Muscle Memory!</span></a><span data-dcnode-id="3874" instrument_node="">:</span><ul data-dcnode-id="3861"><li data-dcnode-id="3869"><span data-dcnode-id="3873" instrument_node=""> Instead of just clicking Triangle or Y to two-hand a weapon like past </span><em data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">Souls</span></em><span data-dcnode-id="3870" instrument_node=""> games, here you must hold down Triangle/Y, then click the light attack button for your weapon. Triangle/Y is only used, by itself, for enabling the HUD overlay, and picking up items/interacting with stuff.</span></li><li data-dcnode-id="3864"><span data-dcnode-id="3868" instrument_node=""> Rather than being the interact button like previous </span><em data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">Souls</span></em><span data-dcnode-id="3865" instrument_node=""> games, the X/A button is now for jumping, like in other games.</span></li><li data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node=""> Instead of using a Site of Grace to fast travel like in previous games with bonfires and lanterns, fast travel is now done through the map screen, leading to some instances of players sitting down at a grace to fast travel when it isn't necessary.</span></li></ul></li><li data-dcnode-id="3851"><span data-dcnode-id="3859" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DareToBeBadass" title="/pmwiki/pmwiki.php/Main/DareToBeBadass"><span data-dcnode-id="3858" instrument_node="">Dare to Be Badass</span></a><span data-dcnode-id="3856" instrument_node="">: One of the very first messages you'll ever see upon starting the game at the Chapel of Anticipation is:</span><div class="indent" data-dcnode-id="3852"><span data-dcnode-id="3855" instrument_node=""> </span><em data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">Though the path be broken and uncertain, claim your place as Elden Lord!</span></em></div></li><li data-dcnode-id="3846"><span data-dcnode-id="3850" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadGuyOnDisplay" title="/pmwiki/pmwiki.php/Main/DeadGuyOnDisplay"><span data-dcnode-id="3849" instrument_node="">Dead Guy on Display</span></a><span data-dcnode-id="3847" instrument_node="">: A lot of factions fancy crucifying, hanging and stringing bodies near their domain. In the case of the crucified bodies they come back to life at night to scream in agony.</span></li><li data-dcnode-id="3841"><span data-dcnode-id="3845" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeaderThanDead" title="/pmwiki/pmwiki.php/Main/DeaderThanDead"><span data-dcnode-id="3844" instrument_node="">Deader Than Dead</span></a><span data-dcnode-id="3842" instrument_node="">: The Litany of Proper Death is meant to give proper death to those who keep resurrecting, now the Golden Order is screwed up. Its effectiveness varies, though it can prevent the skeletons from coming back.</span></li><li data-dcnode-id="3831"><span data-dcnode-id="3840" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathMountain" title="/pmwiki/pmwiki.php/Main/DeathMountain"><span data-dcnode-id="3839" instrument_node="">Death Mountain</span></a><span data-dcnode-id="3837" instrument_node="">:</span><ul data-dcnode-id="3832"><li data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node=""> Mount Gelmir is a mountainous, rather desolate area within the Altus Plateau which is full of hostile wildlife but also is the base of a few strong Demi-human foes.</span></li><li data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node=""> The Mountaintop of Giants is an icy mountainous area situated at the highest altitudes of the Lands Between. It is notable for being the territory of the now extinct Fire Giants and it is said few even dared to venture there.</span></li></ul></li><li data-dcnode-id="3817"><span data-dcnode-id="3830" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DegradedBoss" title="/pmwiki/pmwiki.php/Main/DegradedBoss"><span data-dcnode-id="3829" instrument_node="">Degraded Boss</span></a><span data-dcnode-id="3827" instrument_node="">: Tons. Most boss enemies you find in early dungeons will likely show up elsewhere later, some as a regular enemy, some as another boss fight with a gimmick added. Some notable examples of this are </span><span class="spoiler" data-dcnode-id="3825" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3826" instrument_node="">Margit, who shows up again in the overworld in the Capital Outskirts</span></span><span data-dcnode-id="3824" instrument_node="">, and </span><span class="spoiler" data-dcnode-id="3819" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3823" instrument_node="">Mohg, the Omen, who most players will likely find after his </span><em data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">stronger</span></em><span data-dcnode-id="3820" instrument_node=""> form, Mohg, Lord of Blood</span></span><span data-dcnode-id="3818" instrument_node="">.</span></li><li data-dcnode-id="3763"><span data-dcnode-id="3816" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DevelopersForesight" title="/pmwiki/pmwiki.php/Main/DevelopersForesight"><span data-dcnode-id="3815" instrument_node="">Developers' Foresight</span></a><span data-dcnode-id="3813" instrument_node="">:</span><ul data-dcnode-id="3764"><li data-dcnode-id="3808"><span data-dcnode-id="3812" instrument_node=""> Normally, Margit the Fell Omen blocks the way to Stormveil Castle, but it is possible to </span><span class="spoiler" data-dcnode-id="3810" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3811" instrument_node="">kill his "true" counterpart, Margott the Omen King</span></span><span data-dcnode-id="3809" instrument_node="">, before fighting him. Should you do this, Margit will not appear in his usual spot, and you still get the Talisman pouch he would have dropped.</span></li><li data-dcnode-id="3790"><span data-dcnode-id="3807" instrument_node=""> The "Age of the Stars" ending has a small, minor difference depending on whether you've triggered every dialogue option for a certain character and exhausted them. </span><span class="spoiler" data-dcnode-id="3805" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3806" instrument_node="">Whether you've exhausted her dialogue completely and finished her questline changes how Ranni refers to the Tarnished in her ending.</span></span><div class="indent" data-dcnode-id="3791"><em data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">(If Dialogue is not exhausted)</span></em><span data-dcnode-id="3802" instrument_node=""> "Well then. Shall we? </span><span class="spoiler" data-dcnode-id="3800" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3801" instrument_node="">My fair consort, eternal.</span></span><span data-dcnode-id="3799" instrument_node="">" </span><br data-dcnode-id="3798"><em data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">(If Dialogue is exhausted)</span></em><span data-dcnode-id="3795" instrument_node=""> "Let us go together. </span><span class="spoiler" data-dcnode-id="3793" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3794" instrument_node="">My dear consort, eternal.</span></span><span data-dcnode-id="3792" instrument_node="">"</span></div></li><li data-dcnode-id="3770"><span data-dcnode-id="3789" instrument_node=""> The "Lord of Frenzied Flame" ending plays out depending on where in the story you have </span><span class="spoiler" data-dcnode-id="3787" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3788" instrument_node="">met the Three Fingers</span></span><span data-dcnode-id="3786" instrument_node="">. If you </span><span class="spoiler" data-dcnode-id="3784" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3785" instrument_node="">meet the Three Fingers</span></span><span data-dcnode-id="3783" instrument_node=""> while Melina is still accompanying you </span><span class="spoiler" data-dcnode-id="3775" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3782" instrument_node="">and still alive, she will </span><a class="twikilink" data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButNowIMustGo" title="/pmwiki/pmwiki.php/Main/ButNowIMustGo"><span data-dcnode-id="3781" instrument_node="">leave the Tarnished</span></a><span data-dcnode-id="3779" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatTheHellHero" title="/pmwiki/pmwiki.php/Main/WhatTheHellHero"><span data-dcnode-id="3778" instrument_node="">in disgust</span></a><span data-dcnode-id="3776" instrument_node=""> and declare she will kill them the next time they meet; a promise she reaffirms after the Tarnished has set the Lands Between ablaze with the Frenzied Flame as she picks up Torrent's summoning ring from the ashes</span></span><span data-dcnode-id="3774" instrument_node="">. If you </span><span class="spoiler" data-dcnode-id="3772" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3773" instrument_node="">meet the Three Fingers after Melina has sacrificed herself to burn down the Erdtree, the scene will not play out</span></span><span data-dcnode-id="3771" instrument_node="">.</span></li><li data-dcnode-id="3765"><span data-dcnode-id="3769" instrument_node=""> Whenever Nepheli is summonable for a boss, she also tends to be found in-person somewhere nearby. However, gone are the days when you could summon </span><a class="twikilink" data-dcnode-id="3767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSoulsIII" title="/pmwiki/pmwiki.php/VideoGame/DarkSoulsIII"><span data-dcnode-id="3768" instrument_node="">Knight Slayer Tsorig</span></a><span data-dcnode-id="3766" instrument_node="">, drag him to his own physical body, and have the two duke it out. If you summon Nepheli, her physical body will simply disappear until her phantom is dismissed and the area is reloaded.</span></li></ul></li><li data-dcnode-id="3746"><span data-dcnode-id="3762" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DifficultButAwesome" title="/pmwiki/pmwiki.php/Main/DifficultButAwesome"><span data-dcnode-id="3761" instrument_node="">Difficult, but Awesome</span></a><span data-dcnode-id="3759" instrument_node="">:</span><ul data-dcnode-id="3747"><li data-dcnode-id="3754"><span data-dcnode-id="3758" instrument_node=""> Like its predecessors, Parrying has a narrow timing window and short range, even with lighter shields or bucklers that offer the best parry timings. Some attacks can't be parried at all, either. But when you nail it, you not only interrupt the enemy's attack, but potentially also stagger them, giving you an opening for a </span><a class="twikilink" data-dcnode-id="3756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CriticalHit" title="/pmwiki/pmwiki.php/Main/CriticalHit"><span data-dcnode-id="3757" instrument_node="">Critical Hit</span></a><span data-dcnode-id="3755" instrument_node=""> or a window of safety to recover.</span></li><li data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node=""> Dragon breath incantations have a very long casting time, taking a couple of seconds in which the player is stuck in place. However, once one compensates for the windup they can be extremely powerful, especially to deal lots of damage to swarms of enemies. A particularly effective tactic is to sneak up on a group of enemies and use the breath attack to deal heavy damage to the whole group before starting a fight in earnest.</span></li><li data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node=""> Horseback combat can trivialize some fights if you learn how to balance your movement with your limited attack angles and different swing speed. You'll need to do some weapon-switching footwork too to figure out how to cast spells from horseback.</span></li><li data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node=""> The Raptor of the Mists skill enables evasion upon getting hit. If timed right, it can even dodge the dreaded Hero's Grave chariots. The only thing it won't dodge, however, are any status inflictions.</span></li></ul></li><li data-dcnode-id="3738"><span data-dcnode-id="3745" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiminishingReturnsForBalance" title="/pmwiki/pmwiki.php/Main/DiminishingReturnsForBalance"><span data-dcnode-id="3744" instrument_node="">Diminishing Returns for Balance</span></a><span data-dcnode-id="3742" instrument_node="">: Much like its predecessors, </span><em data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">Elden Ring</span></em><span data-dcnode-id="3739" instrument_node=""> has thresholds for its stats where the bonuses per stat point decrease significantly. The soft caps of this game are notably higher than previous titles, plateauing after 60 for Vigor, Mind, and Endurance, and 80 for offensive stats. Lesser thresholds, where returns decrease but still maintain an appreciable bonus, are 40 for Vigor and Mind, 50 for Endurance and Arcane, and 60 for all other stats.</span></li><li data-dcnode-id="3731"><span data-dcnode-id="3737" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiscOneNuke" title="/pmwiki/pmwiki.php/Main/DiscOneNuke"><span data-dcnode-id="3736" instrument_node="">Disc-One Nuke</span></a><span data-dcnode-id="3734" instrument_node="">: </span><a class="twikilink" data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/DiscOneNuke/EldenRing" title="/pmwiki/pmwiki.php/DiscOneNuke/EldenRing"><span data-dcnode-id="3733" instrument_node="">Has its own page.</span></a></li><li data-dcnode-id="3726"><span data-dcnode-id="3730" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiscOneFinalBoss" title="/pmwiki/pmwiki.php/Main/DiscOneFinalBoss"><span data-dcnode-id="3729" instrument_node="">Disc-One Final Boss</span></a><span data-dcnode-id="3727" instrument_node="">: Morgott would have been the final challenge to access the Erdtree and become Elden Lord if the Two Fingers and Gideon's expectations were correct. However he is only the beginning of the second part of the game.</span></li><li data-dcnode-id="3721"><span data-dcnode-id="3725" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DisconnectedSideArea" title="/pmwiki/pmwiki.php/Main/DisconnectedSideArea"><span data-dcnode-id="3724" instrument_node="">Disconnected Side Area</span></a><span data-dcnode-id="3722" instrument_node="">: The Four Belfries at Liurnia contain portals to small areas disconnected from the rest of the world, two of which (in Siofra River and Farum Azula) offer a peek at the rest of the area they're in. The Moonlight Altar area of Liurnia is on a plateau too high to reach, and can only be accessed from an underground elevator.</span></li><li data-dcnode-id="3681"><span data-dcnode-id="3720" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DishingOutDirt" title="/pmwiki/pmwiki.php/Main/DishingOutDirt"><span data-dcnode-id="3719" instrument_node="">Dishing Out Dirt</span></a><span data-dcnode-id="3717" instrument_node="">:</span><ul data-dcnode-id="3682"><li data-dcnode-id="3688"><span data-dcnode-id="3716" instrument_node=""> While Sorceries include the </span><a class="twikilink" data-dcnode-id="3714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MakingASplash" title="/pmwiki/pmwiki.php/Main/MakingASplash"><span data-dcnode-id="3715" instrument_node="">water</span></a><span data-dcnode-id="3713" instrument_node="">, </span><a class="twikilink" data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnIcePerson" title="/pmwiki/pmwiki.php/Main/AnIcePerson"><span data-dcnode-id="3712" instrument_node="">ice</span></a><span data-dcnode-id="3710" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagmaMan" title="/pmwiki/pmwiki.php/Main/MagmaMan"><span data-dcnode-id="3709" instrument_node="">magma</span></a><span data-dcnode-id="3707" instrument_node=""> elements, the majority of Sorcery spells in </span><em data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">Elden Ring</span></em><span data-dcnode-id="3704" instrument_node=""> are variations of </span><a class="twikilink" data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GemstoneAssault" title="/pmwiki/pmwiki.php/Main/GemstoneAssault"><span data-dcnode-id="3703" instrument_node="">crystal conjuring</span></a><span data-dcnode-id="3701" instrument_node="">, </span><a class="twikilink" data-dcnode-id="3699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StarPower" title="/pmwiki/pmwiki.php/Main/StarPower"><span data-dcnode-id="3700" instrument_node="">cosmic rock formations</span></a><span data-dcnode-id="3698" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeteorSummoningAttack" title="/pmwiki/pmwiki.php/Main/MeteorSummoningAttack"><span data-dcnode-id="3697" instrument_node="">meteor summoning</span></a><span data-dcnode-id="3695" instrument_node="">, along with </span><a class="twikilink" data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GravityMaster" title="/pmwiki/pmwiki.php/Main/GravityMaster"><span data-dcnode-id="3694" instrument_node="">gravity powers</span></a><span data-dcnode-id="3692" instrument_node="">. Some of these spells are also associated with </span><span class="spoiler" data-dcnode-id="3690" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3691" instrument_node="">beings actually made of crystal, who came from the depths of space</span></span><span data-dcnode-id="3689" instrument_node="">.</span></li><li data-dcnode-id="3683"><span data-dcnode-id="3687" instrument_node=""> Two of the Beast Incantations, Bestial Sling and Stone of Gurranq, are this. The former is a quick </span><a class="twikilink" data-dcnode-id="3685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShortRangeShotgun" title="/pmwiki/pmwiki.php/Main/ShortRangeShotgun"><span data-dcnode-id="3686" instrument_node="">Short-Range Shotgun</span></a><span data-dcnode-id="3684" instrument_node=""> spray of sharp stone shards, while the latter is just a big rock hurled at the enemy.</span></li></ul></li><li data-dcnode-id="3676"><span data-dcnode-id="3680" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DivineConflict" title="/pmwiki/pmwiki.php/Main/DivineConflict"><span data-dcnode-id="3679" instrument_node="">Divine Conflict</span></a><span data-dcnode-id="3677" instrument_node="">: Queen Marika’s Empire has gone through at least 2 ancient wars with different primeval entities (the Dragons and then the Giants), and this is before the Shattering even kickstarted the civil war among Marika’s God-kin.</span></li><li data-dcnode-id="3671"><span data-dcnode-id="3675" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoubleJump" title="/pmwiki/pmwiki.php/Main/DoubleJump"><span data-dcnode-id="3674" instrument_node="">Double Jump</span></a><span data-dcnode-id="3672" instrument_node="">: Not the Tarnished, but Torrent is capable of double jumping, making traversal of terrain much easier than on foot.</span></li><li data-dcnode-id="3666"><span data-dcnode-id="3670" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoubleTap" title="/pmwiki/pmwiki.php/Main/DoubleTap"><span data-dcnode-id="3669" instrument_node="">Double Tap</span></a><span data-dcnode-id="3667" instrument_node="">: Skeletal enemies will fully revive in a few seconds after their health is depleted, unless you take a moment to smack their remains before they reform. Defeating them with Holy damage bypasses this step.</span></li><li data-dcnode-id="3658"><span data-dcnode-id="3665" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDreaded" title="/pmwiki/pmwiki.php/Main/TheDreaded"><span data-dcnode-id="3664" instrument_node="">The Dreaded</span></a><span data-dcnode-id="3662" instrument_node="">: The Three Fingers, whatever they are, are spoken of with the same vile and fear as the Frenzied Flame. It's not hard to see why if </span><span class="spoiler" data-dcnode-id="3660" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3661" instrument_node="">the Tarnished pursues the Lord of Frenzied Flame ending, as the Fingers embracing the Tarnished allows them to inherit the Frenzied Flame</span></span><span data-dcnode-id="3659" instrument_node="">.</span></li><li data-dcnode-id="3648"><span data-dcnode-id="3657" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrivingQuestion" title="/pmwiki/pmwiki.php/Main/DrivingQuestion"><span data-dcnode-id="3656" instrument_node="">Driving Question</span></a><span data-dcnode-id="3654" instrument_node="">: The biggest mystery of the game is finding who, or </span><em data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">what</span></em><span data-dcnode-id="3651" instrument_node="">, destroyed the Elden Ring and set both the Shattering and the events of the game into motion. </span><span class="spoiler" data-dcnode-id="3649" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3650" instrument_node="">You later learn the Rune of Death - or rather, a fragment of it - was stolen by Ranni, and then it was Queen Marika herself who destroyed the Elden Ring.</span></span></li><li data-dcnode-id="3640"><span data-dcnode-id="3647" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DroneOfDread" title="/pmwiki/pmwiki.php/Main/DroneOfDread"><span data-dcnode-id="3646" instrument_node="">Drone of Dread</span></a><span data-dcnode-id="3644" instrument_node="">: The ambient soundtrack in Caelid consists mostly of deep, droning tones with </span><a class="twikilink" data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PsychoStrings" title="/pmwiki/pmwiki.php/Main/PsychoStrings"><span data-dcnode-id="3643" instrument_node="">"Psycho" Strings</span></a><span data-dcnode-id="3641" instrument_node=""> gliding over them.</span></li><li data-dcnode-id="3635"><span data-dcnode-id="3639" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DualBoss" title="/pmwiki/pmwiki.php/Main/DualBoss"><span data-dcnode-id="3638" instrument_node="">Dual Boss</span></a><span data-dcnode-id="3636" instrument_node="">: Several of the side dungeons pit you against two strong enemies at once — sometimes it's two variants of the same enemy.</span></li><li data-dcnode-id="3614"><span data-dcnode-id="3634" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DualWielding" title="/pmwiki/pmwiki.php/Main/DualWielding"><span data-dcnode-id="3633" instrument_node="">Dual Wielding</span></a><span data-dcnode-id="3631" instrument_node="">: There are two gameplay mechanics that enable this, from the </span><em data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">Souls</span></em><span data-dcnode-id="3628" instrument_node=""> games.</span><ul data-dcnode-id="3615"><li data-dcnode-id="3622"><span data-dcnode-id="3627" instrument_node=""> Power stancing from </span><em data-dcnode-id="3624"><a class="twikilink" data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSoulsII" title="/pmwiki/pmwiki.php/VideoGame/DarkSoulsII"><span data-dcnode-id="3626" instrument_node="">Dark Souls II</span></a></em><span data-dcnode-id="3623" instrument_node=""> makes a comeback, where you can wield two weapons of the same type and strike with both of them in quick succession using your left-hand attack button.</span></li><li data-dcnode-id="3616"><span data-dcnode-id="3621" instrument_node=""> Paired weapons from </span><em data-dcnode-id="3618"><a class="twikilink" data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSoulsIII" title="/pmwiki/pmwiki.php/VideoGame/DarkSoulsIII"><span data-dcnode-id="3620" instrument_node="">Dark Souls III</span></a></em><span data-dcnode-id="3617" instrument_node=""> also makes a return, albeit to a lesser extent. Two-handing a paired will equip the other half of the set for a special variant of powerstancing. Though it's mostly for fists and claws, there are two unique paired weapons that can be obtained.</span></li></ul></li><li data-dcnode-id="3601"><span data-dcnode-id="3613" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DungeonBypass" title="/pmwiki/pmwiki.php/Main/DungeonBypass"><span data-dcnode-id="3612" instrument_node="">Dungeon Bypass</span></a><span data-dcnode-id="3610" instrument_node="">: There are multiple ways around the Lands Between, giving the player plenty of options to bypass tough enemies or obstacles. Spiritjumps, stealth, magical gateways, and alternate pathways are all available, along with the ability to use Torrent to scale up the sides of cliffs in some places.</span><ul data-dcnode-id="3602"><li data-dcnode-id="3605"><span data-dcnode-id="3609" instrument_node=""> Redmane Castle in Caelid is an exceptionally difficult dungeon with a punishing boss fight. However, if you're following Ranni's quest line to the point where it tells you to visit Redmane Castle </span><span class="spoiler" data-dcnode-id="3607" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3608" instrument_node="">before you fight Starscourge Radahn</span></span><span data-dcnode-id="3606" instrument_node="">, the dungeon will be devoid of most enemies, since Blaidd's cleared the path for you; in fact, a Waygate in front of the castle will take you directly to the end so you can progress the quest! After the event, the dungeon returns to normal if you want to clear it normally.</span></li><li data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node=""> Volcano Manor offers assassination side quests. Complete three of them and you'll be allowed to teleport directly to the boss, skipping the dungeon entirely.</span></li></ul></li><li data-dcnode-id="3593"><span data-dcnode-id="3600" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DwindlingParty" title="/pmwiki/pmwiki.php/Main/DwindlingParty"><span data-dcnode-id="3599" instrument_node="">Dwindling Party</span></a><span data-dcnode-id="3597" instrument_node="">: In the early game, the Roundtable Hold is practically teeming with Tarnished and other travelers, but as they leave to progress towards their various goals, the Hold slowly dwindles </span><span class="spoiler" data-dcnode-id="3595" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3596" instrument_node="">until it's just Enia, Hewg, and Roderika</span></span><span data-dcnode-id="3594" instrument_node="">.</span></li><li data-dcnode-id="3582"><span data-dcnode-id="3592" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarlyGameHell" title="/pmwiki/pmwiki.php/Main/EarlyGameHell"><span data-dcnode-id="3591" instrument_node="">Early Game Hell</span></a><span data-dcnode-id="3589" instrument_node="">: In a slightly different way than the </span><em data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Souls</span></em><span data-dcnode-id="3586" instrument_node=""> games. The more expansive landscape means the gear is far more spread through, and as such, venturing out is encouraged. The base gear will eventually get replaced, but finding specific gear will take a while without aid. The open-world also invites far more danger to stumble on; facing a world boss who can kill in a single hit is very possible. Not only that, but opening the wrong chest can trigger a teleportation trap which dumps you into an area </span><em data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">far</span></em><span data-dcnode-id="3583" instrument_node=""> beyond your level. To summarize: To prepare for bosses, is to explore the world first.</span></li><li data-dcnode-id="3574"><span data-dcnode-id="3581" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarnYourBadEnding" title="/pmwiki/pmwiki.php/Main/EarnYourBadEnding"><span data-dcnode-id="3580" instrument_node="">Earn Your Bad Ending</span></a><span data-dcnode-id="3578" instrument_node="">: The "default" ending is relatively upbeat. The two endings which can be considered bad endings, </span><span class="spoiler" data-dcnode-id="3576" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3577" instrument_node="">The Blessing of Despair and the Lord of Frenzied Flame</span></span><span data-dcnode-id="3575" instrument_node="">, requires one to actively go out of their way to achieve it.</span></li><li data-dcnode-id="3551"><span data-dcnode-id="3573" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EasyLevelTrick" title="/pmwiki/pmwiki.php/Main/EasyLevelTrick"><span data-dcnode-id="3572" instrument_node="">Easy Level Trick</span></a><span data-dcnode-id="3570" instrument_node="">:</span><ul data-dcnode-id="3552"><li data-dcnode-id="3563"><span data-dcnode-id="3569" instrument_node=""> Torrent's mobility allows the player to essentially pick their fights — a lot of supposed </span><a class="twikilink" data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeefGate" title="/pmwiki/pmwiki.php/Main/BeefGate"><span data-dcnode-id="3568" instrument_node="">Beef Gates</span></a><span data-dcnode-id="3566" instrument_node=""> can be maneuvered around with careful platforming or can simply be rushed through to get to whatever they're guarding. </span><span class="spoiler" data-dcnode-id="3564" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3565" instrument_node="">For example, you can get the key to access Raya Lucaria by riding up to the island it's on, grabbing the key, and having Torrent leg it rather than fighting the dragon.</span></span></li><li data-dcnode-id="3557"><span data-dcnode-id="3562" instrument_node=""> </span><img class="ymmv1 rounded" data-dcnode-id="3561" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThatOneBoss" title="/pmwiki/pmwiki.php/Main/ThatOneBoss"><span data-dcnode-id="3560" instrument_node="">Preceptor Miriam</span></a><span data-dcnode-id="3558" instrument_node=""> can be lured onto the starting elevator of her area and trapped on the bottom floor, where she seems to be unable to use her teleportation to get back up. This can even lead to her falling down the elevator shaft.</span></li><li data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node=""> The Auriza Hero's Grave forces you to navigate around three instakill chariots, then raise an innocuous-looking pillar to cause a chariot to spawn out-of-position and cause all three chariots to collide with each other. This involves dodging around these chariots and crossing very narrow beams situated over a deadly drop. However, you can avoid most of the chariot-dodging by using Mohg's or Margit's Shackle at a certain spot, which somehow triggers the pillar you're supposed to raise even when you're nowhere near it, leading to the premature destruction of all the chariots and giving you risk-free rein for the rest of the level.</span></li><li data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node=""> The Gelmir Hero's Grave also features instakill chariots, and the final stretch leading to the dungeon boss requires you to drop on top of a chariot and ride down the lava-filled ramp. Or you can spam Quickstep or Bloodhound Step to zip down this ramp, ducking into safe spots to avoid the chariot and healing off the lava damage.</span></li></ul></li><li data-dcnode-id="3543"><span data-dcnode-id="3550" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="3549" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="3547" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3545" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3546" instrument_node="">Naturalborns, creatures from the heavens who descend upon the earth and nest in the deep caverns below. They're born from "the Void" and can cast incredibly powerful gravity magic. Describing their appearance is hard, but imagine a centipede with a human skull for a face, human arms for legs, a chain of celestial bodies for the trunk and a barbed morning star-like tail. Oh, and a giant, ocean-blue eyeball sticking through the top part of its skull. You end up fighting the oldest one of these, Astel, if you continue to follow Ranni's questline into the deepest parts of Ainsel River</span></span><span data-dcnode-id="3544" instrument_node="">.</span></li><li data-dcnode-id="3523"><span data-dcnode-id="3542" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchLocation" title="/pmwiki/pmwiki.php/Main/EldritchLocation"><span data-dcnode-id="3541" instrument_node="">Eldritch Location</span></a><span data-dcnode-id="3539" instrument_node="">: Any area </span><span class="spoiler" data-dcnode-id="3535" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3538" instrument_node=""> influenced by one of the </span><a class="twikilink" data-dcnode-id="3536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicEntity" title="/pmwiki/pmwiki.php/Main/CosmicEntity"><span data-dcnode-id="3537" instrument_node="">Outer Gods</span></a></span><span data-dcnode-id="3534" instrument_node=""> usually turns into one.</span><ul data-dcnode-id="3525"><li data-dcnode-id="3526"><span data-dcnode-id="3533" instrument_node=""> Caelid has been severely warped by </span><a class="twikilink" data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MysticalPlague" title="/pmwiki/pmwiki.php/Main/MysticalPlague"><span data-dcnode-id="3532" instrument_node="">the Scarlet Rot</span></a><span data-dcnode-id="3530" instrument_node="">. Massive fungal growths resembling skulls dot the countryside, and it's the only region in the game where the Lands Between's normally realistic weather turns an eerie blood-red, implying the Rot somehow infected </span><em data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">the sky</span></em><span data-dcnode-id="3527" instrument_node="">.</span></li></ul><p data-dcnode-id="3524"></p></li><li data-dcnode-id="3513"><span data-dcnode-id="3522" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnemyCivilWar" title="/pmwiki/pmwiki.php/Main/EnemyCivilWar"><span data-dcnode-id="3521" instrument_node="">Enemy Civil War</span></a><span data-dcnode-id="3519" instrument_node="">:</span><ul data-dcnode-id="3514"><li data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node=""> The entirety of the Shattering counts as this, with the various Demigod Generals and Lords vying for their mother's crown and control over the Empire, with their Legion's warring against each other in massive battles. The Lands Between have been reduced to militarized territories patrolled by dwindling companies of soldiers who will still kill each other if given the oppurnity, soldiers who look and fight quite similar, barring their army colours, tactics, and helmets.</span></li><li data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node=""> The conflict striking Liurnia. At first it avoided the sheer nightmare war which is the Shattering by remaining neutral in the succession crisis, but enormous pressure had been building up for decades between the Carian Royals and the academics of Raya Lucaria. All this finally became open warfare after Raya Lucaria deposed the Queen. The Cuckoo Knights supported the royalty, and the sorcerers side with the academy. In contrast to the mostly fizzled out Shattering, there's many locations in Linurnia which has groups of sorcerers (bolstering their numbers with summoned soldiers) duking it out with the Knights of the Cuckoo.</span></li></ul></li><li data-dcnode-id="3505"><span data-dcnode-id="3512" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilPaysBetter" title="/pmwiki/pmwiki.php/Main/EvilPaysBetter"><span data-dcnode-id="3511" instrument_node="">Evil Pays Better</span></a><span data-dcnode-id="3509" instrument_node="">: Though their purpose, base of operations, and leader are certainly malevolent, the rewards for doing the </span><span class="spoiler" data-dcnode-id="3507" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3508" instrument_node="">Volcano Manor</span></span><span data-dcnode-id="3506" instrument_node=""> questlines include some of the best and sleekest armor sets in the game and a very useful talisman.</span></li><li data-dcnode-id="3497"><span data-dcnode-id="3504" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactWords" title="/pmwiki/pmwiki.php/Main/ExactWords"><span data-dcnode-id="3503" instrument_node="">Exact Words</span></a><span data-dcnode-id="3501" instrument_node="">: The Longtail Cat Talisman's description states it "renders the wearer immune to fall damage". This does </span><em data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">not</span></em><span data-dcnode-id="3498" instrument_node=""> mean it circumvents the game's "death by falling" calculation. If the fall is high enough to instantly kill you, it will still kill. Since the window between "no damage" and "instant death" has been drastically reduced from previous games, while the minimum height of a fall being instantly fatal remains unchanged, this makes the talisman quite useless — as foreshadowed by the fact you find it on a corpse at the bottom of a long fall.</span></li></ul></div><p data-dcnode-id="3494"></p><div class="folderlabel" data-dcnode-id="3492" onclick="togglefolder('folder1');"><span data-dcnode-id="3493" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;F-N&nbsp;</span></div><div class="folder" data-dcnode-id="2396" id="folder1" isfolder="true" style="display:block;"><ul data-dcnode-id="2397"><li data-dcnode-id="3481"><span data-dcnode-id="3491" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FallingDamage" title="/pmwiki/pmwiki.php/Main/FallingDamage"><span data-dcnode-id="3490" instrument_node="">Falling Damage</span></a><span data-dcnode-id="3488" instrument_node="">: As present as it has been in prior FromSoft games. Notably, Torrent's </span><a class="twikilink" data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoubleJump" title="/pmwiki/pmwiki.php/Main/DoubleJump"><span data-dcnode-id="3487" instrument_node="">Double Jump</span></a><span data-dcnode-id="3485" instrument_node=""> will </span><em data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">not</span></em><span data-dcnode-id="3482" instrument_node=""> protect you from it, meaning you can't use him to skip finding a proper way down a cliff unless there's a Spirit Spring where you're landing, which negates the damage. It has however been reduced compared to previous titles; while hurling yourself off a cliff will still kill you, you no longer lose half your health bar from falling down a short distance.</span></li><li data-dcnode-id="3473"><span data-dcnode-id="3480" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticDrug" title="/pmwiki/pmwiki.php/Main/FantasticDrug"><span data-dcnode-id="3479" instrument_node="">Fantastic Drug</span></a><span data-dcnode-id="3477" instrument_node="">: Amber Draught, created by Preceptor Seluvis with extremely nefarious intentions towards Ranni, </span><span class="spoiler" data-dcnode-id="3475" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3476" instrument_node="">the item’s description is runabout in shying away from basically stating it is a sexually arousing rape drug, so Seluvis and the Tarnished could be "in a position to claim the very finest puppet ever crafted". If you don’t trade that item away and give it to Ranni, however, she immediately knows what it is, bluntly asking the Tarnished if they want to have their way with her, proceeding to have Seluvis killed for such defiance and permanently cutting her ties with the Tarnished thereafter</span></span><span data-dcnode-id="3474" instrument_node="">.</span></li><li data-dcnode-id="3462"><span data-dcnode-id="3472" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticFallout" title="/pmwiki/pmwiki.php/Main/FantasticFallout"><span data-dcnode-id="3471" instrument_node="">Fantastic Fallout</span></a><span data-dcnode-id="3469" instrument_node="">: Caelid is covered in the Scarlet Rot, a </span><a class="twikilink" data-dcnode-id="3467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilIsVisceral" title="/pmwiki/pmwiki.php/Main/EvilIsVisceral"><span data-dcnode-id="3468" instrument_node="">twisted, deformed hellscape of rot and flesh</span></a><span data-dcnode-id="3466" instrument_node=""> unleashed when </span><span class="spoiler" data-dcnode-id="3464" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3465" instrument_node="">Malenia released the Scarlet Rot within her during her duel with Radahn</span></span><span data-dcnode-id="3463" instrument_node="">, making it essentially the fallout of chemical warfare.</span></li><li data-dcnode-id="3441"><span data-dcnode-id="3461" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticRacism" title="/pmwiki/pmwiki.php/Main/FantasticRacism"><span data-dcnode-id="3460" instrument_node="">Fantastic Racism</span></a><span data-dcnode-id="3458" instrument_node="">:</span><ul data-dcnode-id="3442"><li data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node=""> The Tarnished are looked down upon by many characters due to them having lost the grace blessed upon them by the Erdtree. Some were even cast out of the Lands Between to serve as soldiers sent to die. In present time, the Tarnished are still discriminated despite the Two Fingers backing them in the hopes they might reforge the Elden Ring and bring peace back to the Lands Between.</span></li><li data-dcnode-id="3449"><span data-dcnode-id="3455" instrument_node=""> Omens such as Margit are viewed as being "cursed children" due to their deformities and thrown into the sewers, literally called the "Subterranean Shunning-Grounds", so they would remain forever out of sight. </span><span class="spoiler" data-dcnode-id="3453" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3454" instrument_node="">Morgott, the Omen King,</span></span><span data-dcnode-id="3452" instrument_node=""> may or may not be an exception - </span><span class="spoiler" data-dcnode-id="3450" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3451" instrument_node="">though his Remembrance says he was never loved, his father, at least, seems to have some affection for him.</span></span></li><li data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node=""> The Misbegotten, such as Hewg, receive similar treatment - "treated as slaves, or worse," from birth.</span></li><li data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node=""> Living things who didn't originate from the Golden Order and the Erdtree are shunned and considered heretical.</span></li><li data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node=""> The vulgar militiamen were made outcasts purely on the grounds of their stunted size. They're forced to make a living as watchmen of some of The Land Between's most remote and inhospitable regions.</span></li></ul></li><li data-dcnode-id="3328"><span data-dcnode-id="3440" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture" title="/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture"><span data-dcnode-id="3439" instrument_node="">Fantasy Counterpart Culture</span></a><span data-dcnode-id="3437" instrument_node="">: The various races, nations, and cultures of </span><em data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">Elden Ring</span></em><span data-dcnode-id="3434" instrument_node=""> are inspired by real world history, though with a heavy layer of originality and </span><a class="twikilink" data-dcnode-id="3432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HighFantasy" title="/pmwiki/pmwiki.php/Main/HighFantasy"><span data-dcnode-id="3433" instrument_node="">High Fantasy</span></a><span data-dcnode-id="3431" instrument_node=""> trappings to make them stand out all the more. Considering </span><a class="twikilink" data-dcnode-id="3429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/GeorgeRRMartin" title="/pmwiki/pmwiki.php/Creator/GeorgeRRMartin"><span data-dcnode-id="3430" instrument_node="">who laid the foundation for the lore and world</span></a><span data-dcnode-id="3428" instrument_node=""> this shouldn't be too surprising.</span><ul data-dcnode-id="3329"><li data-dcnode-id="3369"><span data-dcnode-id="3427" instrument_node=""> The Empire of Marika is a </span><em data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">massive</span></em><span data-dcnode-id="3424" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CultureChopSuey" title="/pmwiki/pmwiki.php/Main/CultureChopSuey"><span data-dcnode-id="3423" instrument_node="">Culture Chop Suey</span></a><span data-dcnode-id="3421" instrument_node=""> of different cultures and peoples throughout history, but they take the most from </span><a class="twikilink" data-dcnode-id="3419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/TheRomanEmpire" title="/pmwiki/pmwiki.php/UsefulNotes/TheRomanEmpire"><span data-dcnode-id="3420" instrument_node="">The Roman Empire</span></a><span data-dcnode-id="3418" instrument_node="">, specifically its stint as the </span><a class="twikilink" data-dcnode-id="3416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/ByzantineEmpire" title="/pmwiki/pmwiki.php/UsefulNotes/ByzantineEmpire"><span data-dcnode-id="3417" instrument_node="">Byzantine Empire</span></a><span data-dcnode-id="3415" instrument_node="">, the specifics will be detailed below.</span><ul data-dcnode-id="3370"><li data-dcnode-id="3404"><span data-dcnode-id="3414" instrument_node=""> Marika's Empire's </span><em data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">greatly</span></em><span data-dcnode-id="3411" instrument_node=""> resembles the </span><a class="twikilink" data-dcnode-id="3409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/ByzantineEmpire" title="/pmwiki/pmwiki.php/UsefulNotes/ByzantineEmpire"><span data-dcnode-id="3410" instrument_node="">Byzantine Empire</span></a><span data-dcnode-id="3408" instrument_node=""> in many ways; many of their soldiers (most notably their Penal Legionaries) wear equipment styled after Byzantine equipment, they make heavy use of </span><a class="twikilink" data-dcnode-id="3406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FireBreathingWeapon" title="/pmwiki/pmwiki.php/Main/FireBreathingWeapon"><span data-dcnode-id="3407" instrument_node="">Fire-Breathing Weapon</span></a><span data-dcnode-id="3405" instrument_node=""> to conquer and crush their foes, fueled by a secret chemical ingredient whose recipe is a close guarded state-secret (aka Greek-Fire), and are famous for hiring Norse Mercenaries in abundance (The Varangian Guard in the Byzantines' case, and the Kaiden in the Empire's). The Geopolitical situation of the Shattering greatly resembles the Nicaean–Latin wars; in which the Byzantine Empire split into many smaller kingdoms and Empires due to unrest, and began to quarrel among themselves too, just like how the Shattering split Marika's Empire into many smaller kingdoms run by her demigod children, all fighting for her throne.</span></li><li data-dcnode-id="3387"><span data-dcnode-id="3403" instrument_node=""> They also have a few things in common with </span><a class="twikilink" data-dcnode-id="3401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AncientRome" title="/pmwiki/pmwiki.php/Main/AncientRome"><span data-dcnode-id="3402" instrument_node="">Ancient Rome</span></a><span data-dcnode-id="3400" instrument_node="">. They are a continent-spanning Empire which has conquered and subjected </span><a class="twikilink" data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BarbarianTribe" title="/pmwiki/pmwiki.php/Main/BarbarianTribe"><span data-dcnode-id="3399" instrument_node="">barbarian tribes</span></a><span data-dcnode-id="3397" instrument_node=""> (inhuman though in </span><em data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">Elden Ring</span></em><span data-dcnode-id="3394" instrument_node="">), use them as </span><a class="twikilink" data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlaveMooks" title="/pmwiki/pmwiki.php/Main/SlaveMooks"><span data-dcnode-id="3393" instrument_node="">Slave Mooks</span></a><span data-dcnode-id="3391" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="3389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BattleThralls" title="/pmwiki/pmwiki.php/Main/BattleThralls"><span data-dcnode-id="3390" instrument_node="">Battle Thralls</span></a><span data-dcnode-id="3388" instrument_node="">, and exert control through heavily fortified Forts scattered through their territory. The very center of the Empire, Leyndell the Royal Capital, has very Roman-Greco architecture and analogous for Rome itself.</span></li><li data-dcnode-id="3382"><span data-dcnode-id="3386" instrument_node=""> Ironically; the Empire takes many visual cues from the </span><a class="twikilink" data-dcnode-id="3384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/CelticKingdoms" title="/pmwiki/pmwiki.php/UsefulNotes/CelticKingdoms"><span data-dcnode-id="3385" instrument_node="">Celtic Kingdoms</span></a><span data-dcnode-id="3383" instrument_node="">, most notably the Gaelic. Their civilian clothing is very similar, their nobles dress in long flowing green cloaks, clasped by Celtic styled broaches, and wear simple crowns of bronze (most notably Godrick and his twisted scions), and the weapons and shields of the aforementioned Scions are direct copies of Celtic weaponry dug up. Their biggest similarity, however, is their jewelry, with countless Celtic symbols (like the famed knot) and designs being on display.</span></li><li data-dcnode-id="3371"><span data-dcnode-id="3381" instrument_node=""> Their use of chivalric Knightly Orders, thunderous heavy knightly cavalry bearing radiant, noble, banners and heraldry, arsenal of weapons, and Medieval styled Castles bring to mind the High Middle Ages, though it has a </span><em data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">heavy</span></em><span data-dcnode-id="3378" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Myth/ArthurianLegend" title="/pmwiki/pmwiki.php/Myth/ArthurianLegend"><span data-dcnode-id="3377" instrument_node="">Arthurian Legend</span></a><span data-dcnode-id="3375" instrument_node=""> vibe to go along with the </span><a class="twikilink" data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HighFantasy" title="/pmwiki/pmwiki.php/Main/HighFantasy"><span data-dcnode-id="3374" instrument_node="">High Fantasy</span></a><span data-dcnode-id="3372" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3361"><span data-dcnode-id="3368" instrument_node=""> The Kaiden are </span><em data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">very</span></em><span data-dcnode-id="3365" instrument_node=""> reminiscent of the peoples of Scandinavia, being a group of sea-faring raiders with an infamous reputation as savage mercenaries and berserkers, who live far up in the Northern mountain peaks, though with the added bonus of having giant's blood within them. In terms of equipment, they wear huskarl armor taken straight from the Anglo-Saxons instead of </span><a class="twikilink" data-dcnode-id="3363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HornyVikings" title="/pmwiki/pmwiki.php/Main/HornyVikings"><span data-dcnode-id="3364" instrument_node="">Horny Vikings</span></a><span data-dcnode-id="3362" instrument_node="">.</span></li><li data-dcnode-id="3344"><span data-dcnode-id="3360" instrument_node=""> The Lands of Reeds is a super clear cut for Japan, specifically Japan during the infamously bloody and brutal </span><a class="twikilink" data-dcnode-id="3358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/SengokuPeriod" title="/pmwiki/pmwiki.php/UsefulNotes/SengokuPeriod"><span data-dcnode-id="3359" instrument_node="">Sengoku Period</span></a><span data-dcnode-id="3357" instrument_node="">, in which perpetual civil war for a century caused the land to erupt in bloodshed. The Lands of Reeds is filled with </span><a class="twikilink" data-dcnode-id="3355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AxCrazy" title="/pmwiki/pmwiki.php/Main/AxCrazy"><span data-dcnode-id="3356" instrument_node="">Ax-Crazy</span></a><span data-dcnode-id="3354" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Samurai" title="/pmwiki/pmwiki.php/Main/Samurai"><span data-dcnode-id="3353" instrument_node="">Samurai</span></a><span data-dcnode-id="3351" instrument_node="">, armed with katana, naginata, and odachi, and wearing their armor with their decorative reeds. Though in </span><em data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">Elden Ring</span></em><span data-dcnode-id="3348" instrument_node="">'s case, this period has lasted </span><em data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">several</span></em><span data-dcnode-id="3345" instrument_node=""> centuries instead of one, and is said to be filled mostly with madmen and prowling demons.</span></li><li data-dcnode-id="3339"><span data-dcnode-id="3343" instrument_node=""> The many tribes of beastmen, such as the Demi-Humans, and Misbegotten, are all stock </span><a class="twikilink" data-dcnode-id="3341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BarbarianTribe" title="/pmwiki/pmwiki.php/Main/BarbarianTribe"><span data-dcnode-id="3342" instrument_node="">Barbarian Tribe</span></a><span data-dcnode-id="3340" instrument_node="">, but they resemble the many hordes pouring through the Western Roman Empire during its fall in the Late-Antiquity. As they are currently the ones most clearly running through the Lands Between, now the Shattering has essentially wrecked the Imperial Army, the Misbegotten resemble the Germanic tribes who sacked Rome itself.</span></li><li data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node=""> The Albinaurics are analogous to Jews, as a group disapproved of by the dominant religious authority and subjected to enslavement and pogroms, have vaguely Jewish features like their trademark beards and who are looking for a distant "Promised Land", and have gone to great lengths to reach it in large groups of caravans.</span></li><li data-dcnode-id="3332"><span data-dcnode-id="3336" instrument_node=""> The Ancestor Followers, with their </span><a class="twikilink" data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InHarmonyWithNature" title="/pmwiki/pmwiki.php/Main/InHarmonyWithNature"><span data-dcnode-id="3335" instrument_node="">In Harmony with Nature</span></a><span data-dcnode-id="3333" instrument_node=""> lifestyle complete with warpaint and head-dresses, primitive but deadly warrior-culture which emphasizes stealthy, deadly archers (whose warriors wield simple, but well-crafted bows and bone hatchets), and religion based on animalism, paganism, and shamanism, alongside the fact they are the peoples who dwelled in the Lands Between before all others are extremely invocative of the Indigenous Tribes of North America.</span></li><li data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node=""> The Nomadic peoples, which most of the merchants belong too, are quite similar to the Romani; a nomadic group travelling in trade caravan as merchants, have a unique culture of music and special clothing, and are despised and mistrusted by the locals, resulting in immense racial persecution.</span></li></ul></li><li data-dcnode-id="3306"><span data-dcnode-id="3327" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyGunControl" title="/pmwiki/pmwiki.php/Main/FantasyGunControl"><span data-dcnode-id="3326" instrument_node="">Fantasy Gun Control</span></a><span data-dcnode-id="3324" instrument_node="">: Even though gunpowder clearly exists in the Lands Between and has been weaponized (miners use blasting charges both for mining and as weapons and a lot of areas have </span><a class="twikilink" data-dcnode-id="3322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExplodingBarrel
