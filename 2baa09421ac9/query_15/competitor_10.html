 style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="5150" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="5151" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="5156" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="5157" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="5158" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="5152" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="5153"><svg data-dcnode-id="5154" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="5155" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="5123" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="5124" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="5125"><span class="q-box qu-userSelect--text" data-dcnode-id="5126" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5139" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5140" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5141" instrument_node="">If you are in reference to the spiritual: As long as you have a personal relationship with the Lord Jesus Christ and have accepted Him as your personal Savior and Lord of your life, you go to heaven. There is only one way to the Father and that is through Jesus Christ.</span></span></p><span data-dcnode-id="5138" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5135" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5136" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5137" instrument_node="">Unfortunately, war is war. God knows your heart. That is what He’s looking at. I don’t think that anyone really wants to kill anyone else. War is a different situation. You are in the fight for a reason. You are in a fight for your life, the life of each member in your unit, and the life of your country. If it is between your life and another person's life (the “other side”, respectively), and they are coming for you, in the confusion, it sometimes just happens. If someone is in your home, and you fear for your life, what are your options (as an example)? THERE IS NOTHING THAT GOD DOES NOT FORGIVE, except blasphemy of His Holy Spirit (the third person of the trinity). I don’t believe that premeditation is right but, if the death of someone occurs at the moment, you just say that you are sorry to God, and ask Him to forgive you. He is faithful and just to forgive us every time. Where we have problems, as human beings, we have trouble forgiving ourselves. People hold us accountable and in judgement too. God does not. We are living under the dispensation of grace due to Christ’s sacrifice on the cross. He “dispenses” His grace to us on a continuous basis. He covers us with His grace and mercy—and His forgiveness. One thing that I know that my fiancée does, before he goes to do anything, is that he prays. I, also, pray with him and for him. He leads his team in prayer before they face their missions. The battle DOES belong to the Lord.</span></span></p><span data-dcnode-id="5134" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5131" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5132" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5133" instrument_node="">As I said before, God looks upon the inward heart of man, people look upon the outward. God knows you; He loves you, and Jesus came to die for you. There is no greater love than one who is willing to lay his life down for a friend. Jesus calls us friends. He has given us a gift by His death on the cross. He gives us His grace, His mercy, His love, His joy, and His redemption. He gives it freely. All we have to do is accept Him as Lord of our life. Even in the midst of war, Jesus gives His peace that surpasses ALL understanding. Once you are out of that environment, His peace and grace follow you throughout life and the circumstances you must face.</span></span></p><span data-dcnode-id="5130" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5127" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5128" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5129" instrument_node="">Jesus is with you, and He sees you and what is happening no matter where you are. There is nowhere that you can go where His presence does not exist. He loves you and wants to interact with you. Give Him your trust. Ask Him into your life. Ask His forgiveness and accept His free gift. He is always waiting for you to come home—home to Him. God Bless!</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div class="q-box qu-pb--medium qu-borderBottom" data-dcnode-id="5025" style="box-sizing: border-box; margin-left: 0.1px; margin-right: 0.1px;"><div class="q-box qu-mt--small" data-dcnode-id="5026" style="box-sizing: border-box;"><div data-dcnode-id="5027"><div class="q-box qu-borderBottom qu-pb--small" data-dcnode-id="5100" style="box-sizing: border-box;"><div class="q-flex qu-alignItems--center" data-dcnode-id="5101" style="box-sizing: border-box; display: flex;"><div class="q-box" data-dcnode-id="5106" style="box-sizing: border-box; flex: 1 1 0%;"><div class="q-text qu-dynamicFontSize--regular qu-medium qu-color--gray_dark qu-passColorToLinks" data-dcnode-id="5107" style="box-sizing: border-box;"><span data-dcnode-id="5108" instrument_node="">Related questions</span></div></div><div class="q-box qu-ml--small" data-dcnod ; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4486" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4487" instrument_node="">So be kind to your next door veteran. He or she has seen the Hell already.</span></span></p></span></span></div><div data-dcnode-id="4481"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="4464" style="box-sizing: border-box;"><span data-dcnode-id="4465"><span class="q-box qu-display--none" data-dcnode-id="4477" style="box-sizing: border-box;"></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 bxBZxD" data-dcnode-id="4474"><span data-dcnode-id="4476" instrument_node="">2K</span><span data-dcnode-id="4475" instrument_node=""> views</span></span><span class="q-box qu-display--none" data-dcnode-id="4472" style="box-sizing: border-box;"><span data-dcnode-id="4473" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="4469"><div class="q-click-wrapper qu-display--inline-block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="4470" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><span data-dcnode-id="4471" instrument_node="">View upvotes</span></div></span><span class="q-box qu-display--none" data-dcnode-id="4467" style="box-sizing: border-box;"><span data-dcnode-id="4468" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="4466"></span></span></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="4342"><div class="q-box qu-pb--medium qu-borderBott </span></span></p><span data-dcnode-id="4089" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4086" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4087" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4088" instrument_node="">The word “hell” itself was derived from the Latin “inferna” which is defined as: “of or relating to a nether world or place of the dead, hell”. This word has nothing in common with the English “inferno”. The word “Hel/Hell” is n</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4074" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4075" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4076" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4077" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4078" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4083" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4084" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4085" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4079" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4080"><svg data-dcnode-id="4081" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4082" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3954" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3955" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3956"><span class="q-box qu-userSelect--text" data-dcnode-id="3957" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4066" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4067" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4068" instrument_node="">Yes they do, just as we all do when we die.</span></span></p><span data-dcnode-id="4065" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4062" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4063" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4064" instrument_node="">The word “hell” is an archaic rendition for the Hebrew word (sheol) and the Greek word (Hades) that appear in the bible writings we have today. These words rendered into modern languages would read, “the grave or under the ground” (sheol), “the place or location of the dead” (Hades). Nothing about a place of eternal punishment.</span></span></p><span data-dcnode-id="4061" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4058" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4059" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4060" instrument_node="">The word “hell” itself was derived from the Latin “inferna” which is defined as: “of or relating to a nether world or place of the dead, hell”. This word has nothing in common with the English “inferno”. The word “Hel/Hell” is not an Latin or English word. It originates from Germanic and Norse languages and beliefs.</span></span></p><span data-dcnode-id="4057" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4044" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4055" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4056" instrument_node="">Jesus and the apostles taught that death is like sleep to be followed by a resurrection (See John 11:11–15). The early church leaders – Clement, Ignatius, Hermas, Polycarp, and others who believed that death is like sleep followed by a resurrection, taught that the</span></span><span data-dcnode-id="4053" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4054" instrument_node=""> resurrected </span></span><span data-dcnode-id="4051" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4052" instrument_node="">deliberate and unrepentant wicked are destroyed forever </span></span><span data-dcnode-id="4049" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4050" instrument_node="">as if being totally consumed in a fire</span></span><span data-dcnode-id="4047" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4048" instrument_node=""> </span></span><span data-dcnode-id="4045" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4046" instrument_node="">– their punishment was to be annihilation. These leaders did not teach of an immortal soul to be tortured by fire for eternity.</span></span></p><span data-dcnode-id="4043" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4040" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4041" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4042" instrument_node="">By the middle of the 2nd Century some church leaders such as Athenagorus and Tertullian began to incorporate Greek philosophical concepts into bible teaching, diluting and twisting what was taught by Jesus. This was the beginning of the apostasy foretold in scripture (read 2 Thessalonians 2:3).</span></span></p><span data-dcnode-id="4039" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4028" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4037" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4038" instrument_node="">It was Athenagorus (133-190 AD), a professed Christian and a church leader but whose teachings, according to the Encyclopaedia Britannica, were heavily influenced by Plato's philosophies, who introduced </span></span><span data-dcnode-id="4035" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4036" instrument_node="">Plato's teaching </span></span><span data-dcnode-id="4033" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4034" instrument_node="">(circa 400 BC)</span></span><span data-dcnode-id="4031" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4032" instrument_node=""> </span></span><span data-dcnode-id="4029" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4030" instrument_node="">of an immortal soul into Christianity. In doing so he opened the way for the adoption of Plato’s argument of eternal punishment for immortal sinful souls. This was a hundred years after the apostle's and came straight from Plato's teachings not the scriptures.</span></span></p><span data-dcnode-id="4027" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4024" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4025" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4026" instrument_node="">Hell is the grave, nothing else. We all go to the grave when we die with a hope for a resurrection.</span></span></p><span data-dcnode-id="4023" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4020" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4021" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4022" instrument_node="">Ecclesiastes 9:5 NKJB</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="4009" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4011" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4018" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4019" instrument_node="">5 For the living know that they will die; </span></span><span data-dcnode-id="4016" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4017" instrument_node="">But the dead know nothing</span></span><span data-dcnode-id="4012" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4015" instrument_node="">,</span><br data-dcnode-id="4014"><span data-dcnode-id="4013" instrument_node="">And they have no more reward, For the memory of them is forgotten.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="4010" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-t :28–29 NKJB</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3985" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3987" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3992" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3993" instrument_node="">8 Do not marvel at this; for the hour is coming in which </span></span><span data-dcnode-id="3990" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3991" instrument_node="">all who are in the graves </span></span><span data-dcnode-id="3988" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3989" instrument_node="">will hear His voice 29 and come forth…</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3986" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3982" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3983" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3984" instrument_node="">Revelation 20:14-15 King James Version</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3973" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3979" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3980" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3981" instrument_node="">14 And death and hell were cast into the lake of fire. This is the second death.</span></span></p><span data-dcnode-id="3978" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3975" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3976" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3977" instrument_node="">15 And whosoever was not found written in the book of life was cast into the lake of fire.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3974" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3970" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3971" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3972" instrument_node="">These verses are problematic for hellfire teachers and believers. Here it states the “lake of fire” is death not torture, the second or irreversible death. Hell itself is thrown into the “lake of fire” so how can the lake of fire be a place of eternal torture as hell and death are inanimate things which cannot be tortured by fire?</span></span></p><span data-dcnode-id="3969" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3966" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3967" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3968" instrument_node="">Further if one is not found written in the Book of Life this can only mean they are dead. The dead cannot be tortured by anything. Then again if one has an immortal soul, the soul is still alive and their name should be found in the Book of Life and that one not thrown into the lake of fire.</span></span></p><span data-dcnode-id="3965" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3962" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3963" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3964" instrument_node="">There are those who may offer all forms of explanation of why these verses do not mean what they state. I will leave it to the readers to sort that out for themselves.</span></span></p><span data-dcnode-id="3961" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3958" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3959" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3960" instrument_node="">I have cited scripture as well as verifiable translation and historical documentation to support this comment objectively without personal opinion or “interpretation”. My comments provide information for open minded consideration and are not intended to debate or disparage anyone's personal opinions or beliefs. I offer information only and do not tell anyone what to believe.</span></span></p></span></span></div></div></div></div></div></div></div></div></di  100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3474"><span class="q-box qu-userSelect--text" data-dcnode-id="3475" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3496" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3497" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3498" instrument_node="">Well it depends upon whom you ask.</span></span></p><span data-dcnode-id="3495" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3492" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3493" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3494" instrument_node="">According to Buddha’s teachings the karma of killing a human being is of the most heavy negative type and being a soldier and acting upon the orders of another person does not excuse or mitigate this karma. So IF one creates the karma of killing a human being and does not purify it with the appropriate measures it is definite that this karma will ripen in the future and the ripened effect of this karma is a rebirth in hell.</span></span></p><span data-dcnode-id="3491" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3488" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3489" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3490" instrument_node="">According to Muhammad(pbuh)’s teachings, killing is permitted in the most dire need of defense of Religion. Otherwise to kill one human being is like killing every human being i.e. the karma fundamentally breaks something inside of the soul and is extremely bad. One cannot enter paradise with this written on his book, he must turn to Allah in repentance again and again until it is fully accepted.</span></span></p><span data-dcnode-id="3487" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3484" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3485" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3486" instrument_node="">According to Jesus, killing can never be permitted as one is instructed to turn the other cheek and forgive. Even under the most dire oppression from the Romans his virtuous disciples did exactly that. Killing any human being is anathema in the sight of Jesus(pbuh) and totally against the spirit and word of his holy teachings.</span></span></p><span data-dcnode-id="3483" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3480" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3481" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3482" instrument_node="">Contrary to the above teachings the Various Nation States which encourage such killing, killing in their name is a virtuous action and worthy of positive remembrance in various black magick ceremonies such as Remembrance Sunday. The aim of such ceremonies is partly to transfer positive energy to the souls of those who died for that nation state, but mostly to convince other mostly young people that killing for a nation state is something which is virtuous and acceptable to the Divine.</span></span></p><span data-dcnode-id="3479" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3476" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3477" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3478" instrument_node="">We also have the testimony of various soldiers who did kill. It haunted them all of their lives. IF you kill a human being, you must fully repent(that is transform the mind to the point where such action is impossible to commit again) and purify the karma. The ripened effect(rebirth in hell) is sure to follow if you do not. Have hope, for every human being there is a spiritual teacher for them somewhere on the earth who can help them reach to higher things.</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="3318"><div class="q-box qu-pb--medium qu-borderBottom" data-dcnode-id="3319" style="box-sizing: border-box; margin-left: 0.1px; margin-right: 0.1px;"><div data-dcnode-id="3320"><div data-dcnode-id="3321"><div data-dcnode-id="3322"><div data-dcnode-id="3323"><div class="q-box qu-pt--medium qu-pb--medium" data-dcnode-id="3324" style="box-sizing: border-box; position: relative;"><div class="q-box" data-dcnode-id="3325" style="box-sizing: border-box;"><div data-dcnode-id="3326"><div class="q-box" data-dcnode-id="3327" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="3399" style="box-sizing: border-box; display: flex;"><div class="q-box qu-mb--small" data-dcnode-id="3400" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-box spacing_log_answer_header" data-dcnode-id="3401" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="3402" style="box-sizing: border-box; display: flex; align-items: start; width: 100%;" width="100%"><div class="q-inlineFlex qu-flex--none qu-mr--small qu-alignItems--center" data-dcnode-  none of the New Testament saints--nor even Jesus--are ever seen informing a military convert that he needed to resign from his line of work (Matthew 8:5-13; Luke 3:14).</span></span></p><span data-dcnode-id="3344" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3341" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3342" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3343" instrument_node="">Prior to His crucifixion, Jesus revealed to His disciples the future hostility they would face and encouraged them to sell their outer garments in order to buy a sword (Luke 22:36-38; cf. 2 Corinthians 11:26-27). Here the "sword" (Greek: maxairan) is a dagger or short sword that belonged to the Jewish traveler's equipment as protection against robbers and wild animals. A plain reading of the passage indicates that Jesus approved of self-defense</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3340" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3336" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3337" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3338" instrument_node="">But this can all be argued in another forum. If you do believe that war can send you to hell, at least you know that through Jesus' sacrifice we can be forgiven.</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="3226"><div class="q-box qu-
