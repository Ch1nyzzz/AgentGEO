</span><div class="article-content retro-folders" data-dcnode-id="1327" id="main-article"><span data-dcnode-id="4961" instrument_node="">
</span><p data-dcnode-id="4960"></p><div class="quoteright" data-dcnode-id="4957" style="width:350px;"><div class="lazy_load_img_box" data-dcnode-id="4958" style="padding-top:100%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/animal_crossing_new_horizons_icon.png" border="0" class="embeddedimage" data-dcnode-id="4959" height="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/animal_crossing_new_horizons_icon.png&amp;raw" width="350"></div></div><div class="acaptionright" data-dcnode-id="4954" style="width:350px;"><a class="twikilink" data-dcnode-id="4955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Tagline" title="/pmwiki/pmwiki.php/Main/Tagline"><span data-dcnode-id="4956" instrument_node="">Your dream getaway begins now.</span></a></div><div class="indent" data-dcnode-id="4946"><em data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">"Thank you for choosing the Nook Inc. Deserted Island Getaway Package. This is one trip that we here at Nook Inc. can recommend with confidence. Your destination is a peaceful island, where it's the little things that count..."</span></em><div class="indent" data-dcnode-id="4947"><span data-dcnode-id="4950" instrument_node="">—</span><strong data-dcnode-id="4948"><span data-dcnode-id="4949" instrument_node="">Nook Inc.</span></strong></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="4940"><span class="ad-caption" data-dcnode-id="4944"><span data-dcnode-id="4945" instrument_node="">Advertisement:</span></span><div data-dcnode-id="4941" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="4903"><em data-dcnode-id="4938"><span data-dcnode-id="4939" instrument_node="">Animal Crossing: New Horizons</span></em><span data-dcnode-id="4937" instrument_node=""> (</span><em data-dcnode-id="4935"><span data-dcnode-id="4936" instrument_node="">Atsumare Dōbutsu no Mori</span></em><span data-dcnode-id="4934" instrument_node="">) is the fifth installment of </span><a class="twikilink" data-dcnode-id="4932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/Nintendo" title="/pmwiki/pmwiki.php/Creator/Nintendo"><span data-dcnode-id="4933" instrument_node="">Nintendo</span></a><span data-dcnode-id="4931" instrument_node="">'s </span><em data-dcnode-id="4928"><a class="twikilink" data-dcnode-id="4929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossing" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossing"><span data-dcnode-id="4930" instrument_node="">Animal Crossing</span></a></em><span data-dcnode-id="4927" instrument_node=""> series, released on March 20, 2020. After skipping over the </span><a class="twikilink" data-dcnode-id="4925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/WiiU" title="/pmwiki/pmwiki.php/UsefulNotes/WiiU"><span data-dcnode-id="4926" instrument_node="">Wii U</span></a><span class="notelabel" data-dcnode-id="4922" onclick="togglenote('note06bor');" style="cursor: pointer;"><sup data-dcnode-id="4923"><span data-dcnode-id="4924" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4911" id="note06bor" isnote="true" onclick="togglenote('note06bor');" style="display: none; cursor: pointer;"><span data-dcnode-id="4921" instrument_node="">owing to a combination of the system's commercial failure and the fact that the dev team had been busy working on </span><em data-dcnode-id="4918"><a class="twikilink" data-dcnode-id="4919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Splatoon" title="/pmwiki/pmwiki.php/VideoGame/Splatoon"><span data-dcnode-id="4920" instrument_node="">Splatoon</span></a></em><span data-dcnode-id="4917" instrument_node="">; the series's presence on the system was relegated to the short-lived </span><em data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">Animal Crossing Plaza</span></em><span data-dcnode-id="4914" instrument_node=""> app and the party game spin-off </span><em data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">amiibo Festival</span></em></span><span data-dcnode-id="4910" instrument_node="">, this installment for </span><a class="twikilink" data-dcnode-id="4908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/NintendoSwitch" title="/pmwiki/pmwiki.php/UsefulNotes/NintendoSwitch"><span data-dcnode-id="4909" instrument_node="">Nintendo Switch</span></a><span data-dcnode-id="4907" instrument_node=""> returns the mainline </span><em data-dcnode-id="4905"><span data-dcnode-id="4906" instrument_node="">Animal Crossing</span></em><span data-dcnode-id="4904" instrument_node=""> games to home consoles.</span></p><p data-dcnode-id="4887"><span data-dcnode-id="4902" instrument_node="">While containing all the rural life sim elements of its predecessors, this game shifts focus from the "moving into a new town" concept, and instead brings players to a newly-settled deserted island. As players explore and gather resources to build tools and furniture, they slowly develop the island into the small town setting the series is known for, eventually even gaining the ability to shape the land as they see fit. This is also the first </span><em data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">Animal Crossing</span></em><span data-dcnode-id="4899" instrument_node=""> game to receive continuous free content updates that add new features and events (The </span><em data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">Welcome amiibo</span></em><span data-dcnode-id="4896" instrument_node=""> expansion was the only update </span><em data-dcnode-id="4893"><a class="twikilink" data-dcnode-id="4894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossingNewLeaf" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossingNewLeaf"><span data-dcnode-id="4895" instrument_node="">New Leaf</span></a></em><span data-dcnode-id="4892" instrument_node=""> ever had in the west), akin to the post-launch support past Nintendo titles such as the </span><em data-dcnode-id="4889"><a class="twikilink" data-dcnode-id="4890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Splatoon" title="/pmwiki/pmwiki.php/VideoGame/Splatoon"><span data-dcnode-id="4891" instrument_node="">Splatoon</span></a></em><span data-dcnode-id="4888" instrument_node=""> series featured.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="4881"><span class="ad-caption" data-dcnode-id="4885"><span data-dcnode-id="4886" instrument_node="">Advertisement:</span></span><div data-dcnode-id="4882" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="4869"><span data-dcnode-id="4880" instrument_node="">The "Happy Home Paradise" add-on was released on November 5, 2021, introducing gameplay from </span><em data-dcnode-id="4877"><a class="twikilink" data-dcnode-id="4878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossingHappyHomeDesigner" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossingHappyHomeDesigner"><span data-dcnode-id="4879" instrument_node="">Happy Home Designer</span></a></em><span data-dcnode-id="4876" instrument_node="">. This set of paid DLC sees your character assisting the Paradise Planning resort in building and customizing the dream houses of their clients. It also introduces several new features such as the ability to add pillars to housing interiors, new types of counter-tops, creating buildings such as schools and restaurants, and inviting the villagers present on your island to the resort archipelago. It's also considered a key part of the Nintendo Switch Online Expansion Pack and its increased price point there, as this DLC is worth $24.99 on its own, but is considered "free" with the yearly expansion pack online subscription worth an extra $30 for one user to upgrade to it (with the extra $5 tacked on being used for playing </span><a class="twikilink" data-dcnode-id="4874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/SegaGenesis" title="/pmwiki/pmwiki.php/UsefulNotes/SegaGenesis"><span data-dcnode-id="4875" instrument_node="">Sega Genesis</span></a><span data-dcnode-id="4873" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="4871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Nintendo64" title="/pmwiki/pmwiki.php/UsefulNotes/Nintendo64"><span data-dcnode-id="4872" instrument_node="">Nintendo 64</span></a><span data-dcnode-id="4870" instrument_node=""> games on the Switch as well).</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="4863"><span class="ad-caption" data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">Advertisement:</span></span><div data-dcnode-id="4864" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="4862"></p><div class="folderlabel toggle-all-folders-button" data-dcnode-id="4860" onclick="toggleAllFolders();"><span data-dcnode-id="4861" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><hr data-dcnode-id="4859"><h2 data-dcnode-id="4855"><em data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">Animal Crossing: New Horizons</span></em><span data-dcnode-id="4856" instrument_node=""> provides examples of:</span></h2><div class="folderlabel" data-dcnode-id="4853" onclick="togglefolder('folder0');"><span data-dcnode-id="4854" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; # to D&nbsp;</span></div><div class="folder" data-dcnode-id="3742" id="folder0" isfolder="true" style="display:block;"><ul data-dcnode-id="3743"><li data-dcnode-id="4838"><span data-dcnode-id="4852" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TwentyBearAsses" title="/pmwiki/pmwiki.php/Main/TwentyBearAsses"><span data-dcnode-id="4851" instrument_node="">20 Bear Asses</span></a><span data-dcnode-id="4849" instrument_node="">:</span><ul data-dcnode-id="4839"><li data-dcnode-id="4847"><span data-dcnode-id="4848" instrument_node=""> Some of the Miles+ rewards require you to go collect a number of either wood, fruit, fish or bugs. Likewise, one of the tasks Tom Nook hands out to you on the first day requires you to go out and collect 10 tree branches.</span></li><li data-dcnode-id="4845"><span data-dcnode-id="4846" instrument_node=""> Opening Nook's Cranny requires the player to collect 30 of each type of wood and 30 iron nuggets, which will involve breaking multiple tools, and if you want to complete the quest in one day, visiting several Mystery Islands. It's considered one of the grind-iest parts of the game's required progression.</span></li><li data-dcnode-id="4840"><span data-dcnode-id="4844" instrument_node=""> In </span><em data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="4841" instrument_node="">, unlocking different types of counters and pillars requires delivering a number of DIY materials to Niko's material box.</span></li></ul></li><li data-dcnode-id="4833"><span data-dcnode-id="4837" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AccessoryWearingCartoonAnimal" title="/pmwiki/pmwiki.php/Main/AccessoryWearingCartoonAnimal"><span data-dcnode-id="4836" instrument_node="">Accessory-Wearing Cartoon Animal</span></a><span data-dcnode-id="4834" instrument_node="">: Some NPCs carry this on from previous games; once Nook's Cranny is open, the Nooklings discard their aloha shirts in favor of their traditional aprons, and Blathers is nude but for a bowtie as usual. However, there are fewer examples of this trope than in previous games, now that sheep villagers wear tops instead of only scarves, and the Nooklings change to a different uniform when Nook's Cranny is upgraded.</span></li><li data-dcnode-id="4828"><span data-dcnode-id="4832" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AchievementMockery" title="/pmwiki/pmwiki.php/Main/AchievementMockery"><span data-dcnode-id="4831" instrument_node="">Achievement Mockery</span></a><span data-dcnode-id="4829" instrument_node="">: You can earn Nook Miles for some dubious "accomplishments" like shooting a balloon over a water source and losing the present to the depths, trying to donate a piece of fake artwork (whenever it be from Redd or one of your villagers), or getting knocked out by a swarm of wasps or a scorpion/tarantula. Of course, most of them only reward you once. The in game text clarifies that Tom is awarding you these miles to make you feel less terrible about it.</span></li><li data-dcnode-id="4823"><span data-dcnode-id="4827" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AchievementSystem" title="/pmwiki/pmwiki.php/Main/AchievementSystem"><span data-dcnode-id="4826" instrument_node="">Achievement System</span></a><span data-dcnode-id="4824" instrument_node="">: Nook Miles serves as this game's achievement system. By completing various tasks you can earn miles and spend them to unlock new features or get special items. After paying off your first loan, you unlock Nook Miles+, which serves up an endless rotating list of smaller milestones.</span></li><li data-dcnode-id="4818"><span data-dcnode-id="4822" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdamSmithHatesYourGuts" title="/pmwiki/pmwiki.php/Main/AdamSmithHatesYourGuts"><span data-dcnode-id="4821" instrument_node="">Adam Smith Hates Your Guts</span></a><span data-dcnode-id="4819" instrument_node="">: Aside from the usual home upgrade costs piling up and rapidly increasing with each tier, you're allowed to pay off your initial travel and accommodation fees using Nook Miles. Every bill after that one has to be paid in Bells, because the first time was just a freebie.</span></li><li data-dcnode-id="4813"><span data-dcnode-id="4817" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AddedAlliterativeAppeal" title="/pmwiki/pmwiki.php/Main/AddedAlliterativeAppeal"><span data-dcnode-id="4816" instrument_node="">Added Alliterative Appeal</span></a><span data-dcnode-id="4814" instrument_node="">: When Blathers provides an explanation for the orchid mantis, he refers to it as a "fraudulent flower" capable of "masterful mimicry".</span></li><li data-dcnode-id="4808"><span data-dcnode-id="4812" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AIBreaker" title="/pmwiki/pmwiki.php/Main/AIBreaker"><span data-dcnode-id="4811" instrument_node="">A.I. Breaker</span></a><span data-dcnode-id="4809" instrument_node="">: Only one tarantula/scorpion can be actively chasing the player at a time, so if one lands on the "infinite tarantula/scorpion island", trapping a single active arachnid behind some holes makes catching the rest of the population a breeze.</span></li><li data-dcnode-id="4803"><span data-dcnode-id="4807" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlertnessBlink" title="/pmwiki/pmwiki.php/Main/AlertnessBlink"><span data-dcnode-id="4806" instrument_node="">Alertness Blink</span></a><span data-dcnode-id="4804" instrument_node="">: Tom and Isabelle do this when you sit at their counter in the upgraded Resident Services building.</span></li><li data-dcnode-id="4795"><span data-dcnode-id="4802" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllOrNothing" title="/pmwiki/pmwiki.php/Main/AllOrNothing"><span data-dcnode-id="4801" instrument_node="">All or Nothing</span></a><span data-dcnode-id="4799" instrument_node="">: During winter, once snowfall hits a player's town, Snowboys can be built. Aside from the first day, every Snowboy built will </span><em data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">only</span></em><span data-dcnode-id="4796" instrument_node=""> reward the player with a DIY from the Frozen series and large snowflakes over the course of four days if they are built perfectly. Any other result (even "So close!") and they will chew you out for their imperfect build and simply become dead weight until they eventually melt.</span></li><li data-dcnode-id="4790"><span data-dcnode-id="4794" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllThereInTheManual" title="/pmwiki/pmwiki.php/Main/AllThereInTheManual"><span data-dcnode-id="4793" instrument_node="">All There in the Manual</span></a><span data-dcnode-id="4791" instrument_node="">: The planner journal bundled with the game at US Target stores reveals birthdays for all the non-villager NPCs, which don't appear in the game itself.</span></li><li data-dcnode-id="4765"><span data-dcnode-id="4789" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AluminumChristmasTrees" title="/pmwiki/pmwiki.php/Main/AluminumChristmasTrees"><span data-dcnode-id="4788" instrument_node="">Aluminum Christmas Trees</span></a><span data-dcnode-id="4786" instrument_node="">: Those fruit-themed electronics may seem really stretched out, </span><a class="urllink" data-dcnode-id="4783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//animalcrossing.fandom.com/wiki/File%3AApple_Tv.jpg"><span data-dcnode-id="4785" instrument_node="">especially</span><img data-dcnode-id="4784" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">◊</span></small><span data-dcnode-id="4780" instrument_node=""> the (juicy-)apple TV, which looks like it's just a </span><a class="twikilink" data-dcnode-id="4778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Pun" title="/pmwiki/pmwiki.php/Main/Pun"><span data-dcnode-id="4779" instrument_node="">bad jab</span></a><span data-dcnode-id="4777" instrument_node=""> at the </span><a class="urllink" data-dcnode-id="4774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apple.com/my/shop/buy-tv/apple-tv-hd"><span data-dcnode-id="4776" instrument_node="">Apple TV</span><img data-dcnode-id="4775" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="4773" instrument_node="">. Except not only has that TV has been in the </span><em data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">Animal Crossing</span></em><span data-dcnode-id="4770" instrument_node=""> series since the first game, which came out over five years before Apple's product, those TVs </span><a class="urllink" data-dcnode-id="4767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hannspree.eu/download/hannsapple-55-tv-st55fmmr/"><span data-dcnode-id="4769" instrument_node="">are real</span><img data-dcnode-id="4768" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="4766" instrument_node=""> and are being made by a Chinese company called Hannspree for over a decade now, and they also predate Apple's media box by several years.</span></li><li data-dcnode-id="4760"><span data-dcnode-id="4764" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysFemale" title="/pmwiki/pmwiki.php/Main/AlwaysFemale"><span data-dcnode-id="4763" instrument_node="">Always Female</span></a><span data-dcnode-id="4761" instrument_node="">: Fashion type villagers are always female villagers, and of the four female villager types they're most likely to be Snooty or Peppy villagers. This was averted in the 2.0 update, where a male lazy villager named Sasha was introduced with this hobby.</span></li><li data-dcnode-id="4746"><span data-dcnode-id="4759" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysMale" title="/pmwiki/pmwiki.php/Main/AlwaysMale"><span data-dcnode-id="4758" instrument_node="">Always Male</span></a><span data-dcnode-id="4756" instrument_node="">: As it currently stands in the game, only male villagers will mail the player art, with the medium and authenticity depending on their personality type. Lazy and jock villagers can send any piece of artwork, real or fake, cranky villagers can specifically send any </span><em data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">statue</span></em><span data-dcnode-id="4753" instrument_node="">, real or fake</span><span class="notelabel" data-dcnode-id="4750" onclick="togglenote('note1wf82');" style="cursor: pointer;"><sup data-dcnode-id="4751"><span data-dcnode-id="4752" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4748" id="note1wf82" isnote="true" onclick="togglenote('note1wf82');" style="display: none; cursor: pointer;"><span data-dcnode-id="4749" instrument_node="">this includes both halves of the Wild Painting, which are treated as statues in the game's code despite their names</span></span><span data-dcnode-id="4747" instrument_node="">, and smug villagers can only send forged artwork.</span></li><li data-dcnode-id="4738"><span data-dcnode-id="4745" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnachronisticClue" title="/pmwiki/pmwiki.php/Main/AnachronisticClue"><span data-dcnode-id="4744" instrument_node="">Anachronistic Clue</span></a><span data-dcnode-id="4742" instrument_node="">: A rather obvious clue that a "Robust Statue" is a forgery is that it's wearing a </span><em data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">wristwatch</span></em><span data-dcnode-id="4739" instrument_node="">.</span></li><li data-dcnode-id="4733"><span data-dcnode-id="4737" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndYourRewardIsClothes" title="/pmwiki/pmwiki.php/Main/AndYourRewardIsClothes"><span data-dcnode-id="4736" instrument_node="">And Your Reward Is Clothes</span></a><span data-dcnode-id="4734" instrument_node="">: When you give your villagers gifts, complete tasks for them, or if they want to trade items, the most common reward from them will be clothing and other accessories.</span></li><li data-dcnode-id="4726"><span data-dcnode-id="4732" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures" title="/pmwiki/pmwiki.php/Main/AntiFrustrationFeatures"><span data-dcnode-id="4731" instrument_node="">Anti-Frustration Features</span></a><span data-dcnode-id="4729" instrument_node="">: </span><a class="twikilink" data-dcnode-id="4727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/AntiFrustrationFeatures/AnimalCrossingNewHorizons" title="/pmwiki/pmwiki.php/AntiFrustrationFeatures/AnimalCrossingNewHorizons"><span data-dcnode-id="4728" instrument_node="">Has its own page.</span></a></li><li data-dcnode-id="4712"><span data-dcnode-id="4725" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiPoopSocking" title="/pmwiki/pmwiki.php/Main/AntiPoopSocking"><span data-dcnode-id="4724" instrument_node="">Anti Poop-Socking</span></a><span data-dcnode-id="4722" instrument_node="">: Like in past games, at nighttime villagers go to sleep and stores close up, except for the museum and Resident Services, which are open 24/7 (sometimes a villager or two will also be up late). In this game in particular, this also means you can't use the Custom Design Portal, since it's inside the Able Sisters' shop which is only open from 9 AM to 9 PM, so any designs you want to upload or download</span><span class="notelabel" data-dcnode-id="4719" onclick="togglenote('note2m7mj');" style="cursor: pointer;"><sup data-dcnode-id="4720"><span data-dcnode-id="4721" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4717" id="note2m7mj" isnote="true" onclick="togglenote('note2m7mj');" style="display: none; cursor: pointer;"><span data-dcnode-id="4718" instrument_node="">However, a new feature was added to the Custom Designs app, which allows players to access the Custom Design Portal from their in-game phone at any time.</span></span><span data-dcnode-id="4716" instrument_node=""> will have to wait. Finally, arachnids (tarantulas or scorpions, depending on the season) will spawn on the island between 7 PM and 4 AM, further discouraging late-night play </span><a class="twikilink" data-dcnode-id="4714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DifficultButAwesome" title="/pmwiki/pmwiki.php/Main/DifficultButAwesome"><span data-dcnode-id="4715" instrument_node="">unless the player has the know-how to catch them and make bank</span></a><span data-dcnode-id="4713" instrument_node="">.</span></li><li data-dcnode-id="4704"><span data-dcnode-id="4711" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ApatheticCitizens" title="/pmwiki/pmwiki.php/Main/ApatheticCitizens"><span data-dcnode-id="4710" instrument_node="">Apathetic Citizens</span></a><span data-dcnode-id="4708" instrument_node="">: </span><a class="twikilink" data-dcnode-id="4706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownplayedTrope" title="/pmwiki/pmwiki.php/Main/DownplayedTrope"><span data-dcnode-id="4707" instrument_node="">Downplayed</span></a><span data-dcnode-id="4705" instrument_node=""> as they are less so than in the previous games. While villagers still do the bare minimum to contribute to the betterment of their homes, they donate more to public projects depending on how their friendship level is with the player and will thank the player for doing various things in order to make their home better such as building fences, cliffs and rivers. They will also comment on outdoor furniture and express their approval or disapproval of where it is placed. Villagers can also occasionally be seen sweeping various areas of the island such as the plaza or the area in front of their houses. They also seem to crowd around and watch the player when they are moving furniture or terraforming, though this can be quite annoying as it is likely they will get in the way.</span></li><li data-dcnode-id="4699"><span data-dcnode-id="4703" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtEvolution" title="/pmwiki/pmwiki.php/Main/ArtEvolution"><span data-dcnode-id="4702" instrument_node="">Art Evolution</span></a><span data-dcnode-id="4700" instrument_node="">: This game utilizes the expected potential of HD graphics for visual upgrades, but the aesthetic of the game's furniture, decor, and clothing also trends more plausible and refined, based more on the real world. For example, most of the classic pieces that do return are altered to look less simple and poppy, and the furniture in general looks more like pieces that could be found in a real furniture catalogue or on a fantasy film set due to more restrained or more detailed designs. The museum is also massively upgraded to feel more like a real museum's intricately designed spaces. The all-new cast of gyroids also takes advantage of the game's greater memory and graphical capabilities by featuring unique models that can break more from the fire-hydrant template and push their concepts further, rather than being based on minimal variations of the same model distinguished mostly by textures and animation.</span></li><li data-dcnode-id="4676"><span data-dcnode-id="4698" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheArtifact" title="/pmwiki/pmwiki.php/Main/TheArtifact"><span data-dcnode-id="4697" instrument_node="">The Artifact</span></a><span data-dcnode-id="4695" instrument_node="">:</span><ul data-dcnode-id="4677"><li data-dcnode-id="4690"><span data-dcnode-id="4694" instrument_node=""> </span><em data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">New Horizons</span></em><span data-dcnode-id="4691" instrument_node=""> adds frequent autosaving, making it easy to shut the game off from the Switch's home menu without losing progress. However, it maintains the option to save and quit manually, for players who are used to the save system of previous games.</span></li><li data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node=""> A humorous example with fridges and freezers. In the previous games, they were used in an already humorous manner to access your item storage, the same way you'd use dressers and drawers. Here, storage is reworked to be accessed anytime with a press of a button while you're in your home, while dressers and drawers are now used to change clothes. Freezers and fridges retain the shared functionality with the aforementioned items... so you can use them to change your clothes as well.</span></li><li data-dcnode-id="4683"><span data-dcnode-id="4687" instrument_node=""> During the week leading up to the Fishing Tourney and Bug Off and on the events proper, villagers of certain personalities will make boastful comments on how they're going to win or not lose the event. This would fit... had </span><em data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">New Horizons</span></em><span data-dcnode-id="4684" instrument_node=""> kept the format from previous games, where it was a direct competition. Here, you earn prizes based on how many individual specimens you've caught.</span></li><li data-dcnode-id="4678"><span data-dcnode-id="4682" instrument_node=""> An in-game version: Lottie and Harriet's posters and photos feature them in their outfits from </span><em data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">New Leaf</span></em><span data-dcnode-id="4679" instrument_node="">, due to not being in the game when these items were available. When they were added to the 2.0 update, their posters and photos weren't updated to their new 2.0 outfits.</span></li></ul></li><li data-dcnode-id="4671"><span data-dcnode-id="4675" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtifactTitle" title="/pmwiki/pmwiki.php/Main/ArtifactTitle"><span data-dcnode-id="4674" instrument_node="">Artifact Title</span></a><span data-dcnode-id="4672" instrument_node="">: The yearly holiday events still occur on their designated dates (including the appearance of their respective holiday guests), but will give players weeks or months worth of "prep" where most of the holiday's seasonal items can be obtained (either from crafting them or buying them from Nook's Cranny). For example, Bunny Day gives players a week to collect eggs and egg-themed DIYs, Halloween and Toy Day start offering collectible DIY recipes and purchasable holiday items long before the actual holiday, and Festivale items will go on sale weeks before the event is held.</span></li><li data-dcnode-id="4666"><span data-dcnode-id="4670" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialAtmosphericActions" title="/pmwiki/pmwiki.php/Main/ArtificialAtmosphericActions"><span data-dcnode-id="4669" instrument_node="">Artificial Atmospheric Actions</span></a><span data-dcnode-id="4667" instrument_node="">: Animals can do a lot of things while outside, like working out, singing, waving to each other, or just running around. On event days (Fishing Tourney, Bug-Off), many of them will also behave as if they are participating in the event.</span></li><li data-dcnode-id="4650"><span data-dcnode-id="4665" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialStupidity" title="/pmwiki/pmwiki.php/Main/ArtificialStupidity"><span data-dcnode-id="4664" instrument_node="">Artificial Stupidity</span></a><span data-dcnode-id="4662" instrument_node="">:</span><ul data-dcnode-id="4651"><li data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node=""> Another carry on from previous entries, the animals sometimes aren't the brightest bulbs. Animals will sometimes plop down in random places and obstruct the player's path. They may also get stuck walking repeatedly into a wall or a furniture item placed outside. They also appear to have short attention spans and get distracted while doing things. Furthermore, when placing gifts from the player in their house, they often make questionable decisions in item placement (such as placing a table mirror with its reflective side facing a wall).</span></li><li data-dcnode-id="4652"><span data-dcnode-id="4659" instrument_node=""> Bugs, most of which also need to navigate your customized island, often have similar struggles, frequently getting </span><a class="twikilink" data-dcnode-id="4657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Wallbonking" title="/pmwiki/pmwiki.php/Main/Wallbonking"><span data-dcnode-id="4658" instrument_node="">stuck against walls</span></a><span data-dcnode-id="4656" instrument_node=""> or between objects, or </span><a class="twikilink" data-dcnode-id="4654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooDumbToLive" title="/pmwiki/pmwiki.php/Main/TooDumbToLive"><span data-dcnode-id="4655" instrument_node="">falling into rivers and drowning</span></a><span data-dcnode-id="4653" instrument_node="">. Frustratingly, the rare and valuable tarantulas and scorpions are particularly good at offing themselves, mainly because they move so quickly and erratically.</span></li></ul></li><li data-dcnode-id="4640"><span data-dcnode-id="4649" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseBiology" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseBiology"><span data-dcnode-id="4648" instrument_node="">Artistic License – Biology</span></a><span data-dcnode-id="4646" instrument_node="">:</span><ul data-dcnode-id="4641"><li data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node=""> Some insects will appear even in the cold bitter snow during the winter months, including the exclusive damselfly and dung beetle, despite them not withstanding the cold in real life. This is most likely to give the player at least a few bugs to catch during these times.</span></li><li data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node=""> Sea slugs are classified as sea creatures while snails are classified as bugs. Blathers will react favorably to the slugs but react with revulsion to the snails, despite both being mollusks, not insects or even arthropods.</span></li></ul></li><li data-dcnode-id="4626"><span data-dcnode-id="4639" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseEconomics" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseEconomics"><span data-dcnode-id="4638" instrument_node="">Artistic License – Economics</span></a><span data-dcnode-id="4636" instrument_node="">: Lampshaded example. Timmy and Tommy will buy almost anything the player can present to them, even just weeds picked from outside, or literal garbage. Tom Nook will note how it's not a very good business practice, but it's justified because they need a way to get an economy rolling on a deserted island, and they're just little kids anyway.</span><span class="notelabel" data-dcnode-id="4633" onclick="togglenote('note39pmo');" style="cursor: pointer;"><sup data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4628" id="note39pmo" isnote="true" onclick="togglenote('note39pmo');" style="display: none; cursor: pointer;"><span data-dcnode-id="4632" instrument_node="">And it's not like Tom Nook is much better, since his loans </span><a class="twikilink" data-dcnode-id="4630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="4631" instrument_node="">self-admittedly</span></a><span data-dcnode-id="4629" instrument_node=""> come with no interest and lax repayment plans.</span></span><span data-dcnode-id="4627" instrument_node=""> Handwaved for weeds specifically, as the in-game explanation is that you're being compensated for clearing the island of unsightly weeds, not that they're overtly paying for the weeds themselves.</span></li><li data-dcnode-id="4511"><span data-dcnode-id="4625" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicensePaleontology" title="/pmwiki/pmwiki.php/Main/ArtisticLicensePaleontology"><span data-dcnode-id="4624" instrument_node="">Artistic License – Paleontology</span></a><span data-dcnode-id="4622" instrument_node="">: The game's </span><a class="twikilink" data-dcnode-id="4620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShownTheirWork" title="/pmwiki/pmwiki.php/Main/ShownTheirWork"><span data-dcnode-id="4621" instrument_node="">more accurate</span></a><span data-dcnode-id="4619" instrument_node=""> than previous installments, but it still has its flaws:</span><ul data-dcnode-id="4512"><li data-dcnode-id="4572"><span data-dcnode-id="4618" instrument_node=""> The evolutionary trail in the fossil wing of the museum is mostly correct, but does have a few mistakes, some more jarring than others:</span><ul data-dcnode-id="4573"><li data-dcnode-id="4604"><span data-dcnode-id="4617" instrument_node=""> The ancestral trail has pterosaurs as a sister branch from ornithoscelidan dinosaurs while the sauropods are even further from the ornithoscelidans, as if they suggesting either pterosaurs are dinosaurs or only the ornithoscelidians are true dinosaurs. It gets jarring in that Blathers correctly describes </span><em data-dcnode-id="4615"><span data-dcnode-id="4616" instrument_node="">Brachiosaurus</span></em><span data-dcnode-id="4614" instrument_node=""> and </span><em data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">Diplodocus</span></em><span data-dcnode-id="4611" instrument_node=""> as dinosaurs, unlike </span><em data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">Pteranodon</span></em><span data-dcnode-id="4608" instrument_node=""> and </span><em data-dcnode-id="4606"><span data-dcnode-id="4607" instrument_node="">Quetzalcoatlus</span></em><span data-dcnode-id="4605" instrument_node="">.</span></li><li data-dcnode-id="4591"><span data-dcnode-id="4603" instrument_node=""> The trail in the first room shows </span><em data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">Anomalocaris</span></em><span data-dcnode-id="4600" instrument_node=""> and trilobites diverging from modern arthropods at the same point as ammonites (which are mollusks). However, the former two are more closely related to arthropods.</span><span class="notelabel" data-dcnode-id="4597" onclick="togglenote('note4ddf1');" style="cursor: pointer;"><sup data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4592" id="note4ddf1" isnote="true" onclick="togglenote('note4ddf1');" style="display: none; cursor: pointer;"><span data-dcnode-id="4596" instrument_node="">While most studies place </span><em data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">Anomalocaris</span></em><span data-dcnode-id="4593" instrument_node=""> in the arthropod stem-group (meaning they do not descend from the last common ancestor of today's arthropods, but are still more closely related to them than to any other extant group of animals), the exact relation of trilobites with modern arthropods is unclear. Some studies place them in the stem-group, others in the crown-group (descended from the last common ancestor of arthropods, making them "true" arthropods by definition). Many studies that place trilobites in the crown-group conclude that chelicerates, the group that includes arachnids, are their closest living relatives.</span></span></li><li data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node=""> The trail shows sponges (Porifera) as having diverged from other animals after jellyfish (Cnidaria), when the reverse is true.</span></li><li data-dcnode-id="4581"><span data-dcnode-id="4588" instrument_node=""> </span><em data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">Megacerops</span></em><span data-dcnode-id="4585" instrument_node=""> is placed as the sister group to modern rhinos. However, despite looking like a rhino, it was actually more closely related to horses. This one is fairly understandable, as correctly placing it closer to horses would probably </span><a class="twikilink" data-dcnode-id="4583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealityIsUnrealistic" title="/pmwiki/pmwiki.php/Main/RealityIsUnrealistic"><span data-dcnode-id="4584" instrument_node="">just confuse players more than anything</span></a><span data-dcnode-id="4582" instrument_node="">, and rhinos and horses are fairly closely related in the first place, so the mistake is pretty minor.</span></li><li data-dcnode-id="4576"><span data-dcnode-id="4580" instrument_node=""> Placoderms, represented by </span><em data-dcnode-id="4578"><span data-dcnode-id="4579" instrument_node="">Dunkleosteus</span></em><span data-dcnode-id="4577" instrument_node="">, are shown as the sister group to sharks (and presumably the cartilaginous fish as a whole). While this was the consensus decades ago, modern research indicated that placoderms are more basal than cartilaginous fish, the latter being the sister group to the bony vertebrates instead.</span></li><li data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node=""> Fairly minor, but plants and fungi are shown as having diverged from animals at the same time, when in truth fungi are more closely related to animals than to plants.</span></li></ul></li><li data-dcnode-id="4561"><span data-dcnode-id="4571" instrument_node=""> The plesiosaur is identified as </span><em data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">Plesiosaurus</span></em><span data-dcnode-id="4568" instrument_node="">, but it's evidently an elasmosaurid due to its very long neck. Odd that they didn't replace it like how they replaced </span><em data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">Ichthyosaurus</span></em><span data-dcnode-id="4565" instrument_node=""> with </span><em data-dcnode-id="4563"><span data-dcnode-id="4564" instrument_node="">Ophthalmosaurus</span></em><span data-dcnode-id="4562" instrument_node="">.</span></li><li data-dcnode-id="4553"><span data-dcnode-id="4560" instrument_node=""> The </span><em data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">Ankylosaurus</span></em><span data-dcnode-id="4557" instrument_node=""> is depicted with osteoderms too spiky, particularly the two high scutes on the shoulders which is actually known in </span><em data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">Euoplocephalus</span></em><span data-dcnode-id="4554" instrument_node="">.</span></li><li data-dcnode-id="4545"><span data-dcnode-id="4552" instrument_node=""> While Blathers correctly states that </span><em data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">Dimetrodon</span></em><span data-dcnode-id="4549" instrument_node=""> is not a dinosaur, he still makes the mistake of calling it a reptile when it was actually a synapsid. This is despite it being accurately displayed alongside the mammal </span><em data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">Juramaia</span></em><span data-dcnode-id="4546" instrument_node=""> in the museum itself, with even the International Museum Day stamp stand calling them both synapsids.</span></li><li data-dcnode-id="4513"><span data-dcnode-id="4544" instrument_node=""> Blathers describes </span><em data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">Deinonychus</span></em><span data-dcnode-id="4541" instrument_node=""> as seven feet tall, when it was actually four feet tall. This is likely a conflation of </span><em data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">Utahraptor</span></em><span data-dcnode-id="4538" instrument_node=""> with </span><em data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">Deinonychus</span></em><span data-dcnode-id="4535" instrument_node="">, which was the same mistake made in </span><em data-dcnode-id="4532"><a class="twikilink" data-dcnode-id="4533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/JurassicPark" title="/pmwiki/pmwiki.php/Literature/JurassicPark"><span data-dcnode-id="4534" instrument_node="">Jurassic Park</span></a></em><span data-dcnode-id="4531" instrument_node="">. At least he made the distinction that </span><em data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">Velociraptor</span></em><span data-dcnode-id="4528" instrument_node=""> was a much smaller, 2 foot tall creature compared to its pop culture image, also due to </span><em data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">Jurassic Park</span></em><span data-dcnode-id="4525" instrument_node="">.</span><span class="notelabel" data-dcnode-id="4522" onclick="togglenote('note5zt3w');" style="cursor: pointer;"><sup data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4514" id="note5zt3w" isnote="true" onclick="togglenote('note5zt3w');" style="display: none; cursor: pointer;"><span data-dcnode-id="4521" instrument_node="">Michael Crichton stated that he incorrectly thought that </span><em data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">Velociraptor</span></em><span data-dcnode-id="4518" instrument_node=""> was synonymous with </span><em data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">Dromaeosaur</span></em><span data-dcnode-id="4515" instrument_node="">, rather than a specific turkey-sized genus.</span></span></li></ul></li><li data-dcnode-id="4506"><span data-dcnode-id="4510" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AscendedGlitch" title="/pmwiki/pmwiki.php/Main/AscendedGlitch"><span data-dcnode-id="4509" instrument_node="">Ascended Glitch</span></a><span data-dcnode-id="4507" instrument_node="">: In the base game, taking a screenshot right as the Camera app is booting up will result in the UI display not showing up, which players utilized to great effect to create their own skits and movies. This glitch was patched out in Patch 1.3.0, much to the dismay of players, only for it to be reintroduced in Patch 1.4.0 as an actual mechanic, allowing players to toggle the Camera's display on or off at will with the R stick.</span></li><li data-dcnode-id="4498"><span data-dcnode-id="4505" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AutomaticNewGame" title="/pmwiki/pmwiki.php/Main/AutomaticNewGame"><span data-dcnode-id="4504" instrument_node="">Automatic New Game</span></a><span data-dcnode-id="4502" instrument_node="">: Start up </span><em data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">New Horizons</span></em><span data-dcnode-id="4499" instrument_node=""> for the first time and you're instantly taken to an airport terminal, where Timmy and Tommy prepare you for your getaway. The game's logo doesn't come up until the plane arrives at the island you've chosen, and even then it appears at the bottom right corner of the screen, not front and center as in a traditional title screen.</span></li><li data-dcnode-id="4490"><span data-dcnode-id="4497" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AwesomeButImpractical" title="/pmwiki/pmwiki.php/Main/AwesomeButImpractical"><span data-dcnode-id="4496" instrument_node="">Awesome, but Impractical</span></a><span data-dcnode-id="4494" instrument_node="">: Most golden variants of tools have no additional effects in this game besides having 2 or 3 times the standard durability, and they cannot be repaired through customization. For most purposes, using a gold nugget to make one isn't really worth it, except to </span><a class="twikilink" data-dcnode-id="4492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BraggingRightsReward" title="/pmwiki/pmwiki.php/Main/BraggingRightsReward"><span data-dcnode-id="4493" instrument_node="">show it off</span></a><span data-dcnode-id="4491" instrument_node=""> as a trophy (especially for the fishing rod and net, which require you to catch every single fish and bug, respectively), or just to fulfill the milestone for obtaining them. The only tool whose functionality is affected by its "rank" is the watering can; just as the iron can waters a larger area than the flimsy can, the golden can waters a 3x3 area versus the iron's 3x2. It can also create golden roses, although these are children of black roses instead of transformed black roses like in previous games.</span></li><li data-dcnode-id="4485"><span data-dcnode-id="4489" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BangingPotsAndPans" title="/pmwiki/pmwiki.php/Main/BangingPotsAndPans"><span data-dcnode-id="4488" instrument_node="">Banging Pots and Pans</span></a><span data-dcnode-id="4486" instrument_node="">: Peppy villagers may talk about using their kitchenware as drums after watching a cooking show.</span></li><li data-dcnode-id="4480"><span data-dcnode-id="4484" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BareYourMidriff" title="/pmwiki/pmwiki.php/Main/BareYourMidriff"><span data-dcnode-id="4483" instrument_node="">Bare Your Midriff</span></a><span data-dcnode-id="4481" instrument_node="">: Wearing a workout top or a tube top (or gifting one to a villager) has the character's lower stomach showing.</span></li><li data-dcnode-id="4453"><span data-dcnode-id="4479" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BetterThanABareBulb" title="/pmwiki/pmwiki.php/Main/BetterThanABareBulb"><span data-dcnode-id="4478" instrument_node="">Better Than a Bare Bulb</span></a><span data-dcnode-id="4476" instrument_node="">: Compared to previous games, this one has much more dialogue poking fun at mechanics that have become series-standard by now, such as </span><a class="twikilink" data-dcnode-id="4474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeBuyAnything" title="/pmwiki/pmwiki.php/Main/WeBuyAnything"><span data-dcnode-id="4475" instrument_node="">We Buy Anything</span></a><span data-dcnode-id="4473" instrument_node=""> (Tom Nook notes it's not a sound practice, but it's necessary on a deserted island without an economy), Tom Nook's unorthodox moneylanding practices (he references his zero-interest loans and his "extremely lax" payment plan that gives you infinite time to pay your loans off), villager homes coming fully-furnished (this time, you have to provide the furnishing), and the </span><a class="twikilink" data-dcnode-id="4471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperDeformed" title="/pmwiki/pmwiki.php/Main/SuperDeformed"><span data-dcnode-id="4472" instrument_node="">Super-Deformed</span></a><span data-dcnode-id="4470" instrument_node=""> proportions (Gulliver thanks you by saying "your heart must be as big as your head!"). Lazy villagers even occasionally </span><a class="twikilink" data-dcnode-id="4468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall" title="/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall"><span data-dcnode-id="4469" instrument_node="">lean on the fourth wall</span></a><span data-dcnode-id="4467" instrument_node=""> by expressing their fear that the island is just a game, and point out the "pretty music" </span><a class="twikilink" data-dcnode-id="4465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeftTheBackgroundMusicOn" title="/pmwiki/pmwiki.php/Main/LeftTheBackgroundMusicOn"><span data-dcnode-id="4466" instrument_node="">playing everywhere</span></a><span data-dcnode-id="4464" instrument_node="">, in addition to the </span><a class="twikilink" data-dcnode-id="4462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FridgeLogic" title="/pmwiki/pmwiki.php/Main/FridgeLogic"><span data-dcnode-id="4463" instrument_node="">Fridge Logic</span></a><span data-dcnode-id="4461" instrument_node=""> invoked by Nook's business plan.</span><div class="indent" data-dcnode-id="4454"><strong data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">Lazy villager:</span></strong><span data-dcnode-id="4458" instrument_node=""> </span><em data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">(imitating Tom Nook)</span></em><span data-dcnode-id="4455" instrument_node=""> Yeah, I'll buy your seashells so you can give me back my own money to pay off a house I'm selling to you!</span></div></li><li data-dcnode-id="4443"><span data-dcnode-id="4452" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BewitchedAmphibians" title="/pmwiki/pmwiki.php/Main/BewitchedAmphibians"><span data-dcnode-id="4451" instrument_node="">Bewitched Amphibians</span></a><span data-dcnode-id="4449" instrument_node="">: When you have Blathers talk about frogs, he goes off on how they communicate with each other through their croaking, referencing the common story beat of them being transformed royalty.</span><div class="indent" data-dcnode-id="4444"><em data-dcnode-id="4445"><span data-dcnode-id="4448" instrument_node="">Ribbit! </span><span class="font-s" data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">My prince has arrived!</span></span></em></div></li><li data-dcnode-id="4428"><span data-dcnode-id="4442" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BiggerOnTheInside" title="/pmwiki/pmwiki.php/Main/BiggerOnTheInside"><span data-dcnode-id="4441" instrument_node="">Bigger on the Inside</span></a><span data-dcnode-id="4439" instrument_node="">:</span><ul data-dcnode-id="4429"><li data-dcnode-id="4437"><span data-dcnode-id="4438" instrument_node=""> Since your house plot is a fixed size, all the room extensions that gets added on makes your home comically more spacious than what the exterior implies.</span></li><li data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node=""> It's nothing new that the museum in the series tends to be bigger on the inside. However, the exterior usually has some slight girth to its appearance. Here, the museum looks like a single story building from the outside, but then the inside is very, very massive. To say that it's spacious is an understatement.</span></li><li data-dcnode-id="4430"><span data-dcnode-id="4434" instrument_node=""> Can be taken to the extreme with </span><em data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="4431" instrument_node="">. You can set the exterior of a house to be a standard 4x3 one-floor house... and then set its interior to be two 10x10 floors.</span></li></ul></li><li data-dcnode-id="4416"><span data-dcnode-id="4427" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigWhat" title="/pmwiki/pmwiki.php/Main/BigWhat"><span data-dcnode-id="4426" instrument_node="">Big "WHAT?!"</span></a><span data-dcnode-id="4424" instrument_node="">: If a villager hears something shocking or offensive, they may respond with one of these. If it's offensive, it will usually follow with a </span><a class="urllink" data-dcnode-id="4421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DwEb0wkRvw2g"><span data-dcnode-id="4423" instrument_node="">chewing out</span><img data-dcnode-id="4422" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="4420" instrument_node=""> of the offender.</span><div class="indent" data-dcnode-id="4417"><em data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">YOU WHAT?!</span></em></div></li><li data-dcnode-id="4398"><span data-dcnode-id="4415" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigWordShout" title="/pmwiki/pmwiki.php/Main/BigWordShout"><span data-dcnode-id="4414" instrument_node="">Big Word Shout</span></a><span data-dcnode-id="4412" instrument_node="">: Villagers tend to do this a lot especially when they’re shocked.</span><ul data-dcnode-id="4399"><li data-dcnode-id="4407"><span data-dcnode-id="4411" instrument_node=""> Peppy villagers don't take finding out they had fleas well.</span><div class="indent" data-dcnode-id="4408"><em data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">GRRRROOOOOOOOOOOOODYYYY!</span></em></div></li><li data-dcnode-id="4402"><span data-dcnode-id="4406" instrument_node=""> Cranky villagers after seeing your face after you’ve been stung by wasps.</span><div class="indent" data-dcnode-id="4403"><em data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">M-M-MONSTER!</span></em></div></li><li data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node=""> Jock villagers may also suddenly shout a word at the player, then claim it helps to work out their abs.</span></li></ul></li><li data-dcnode-id="4390"><span data-dcnode-id="4397" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackComedyBurst" title="/pmwiki/pmwiki.php/Main/BlackComedyBurst"><span data-dcnode-id="4396" instrument_node="">Black Comedy Burst</span></a><span data-dcnode-id="4394" instrument_node="">: Some possible villager dialogue leans into this. For example, peppy villagers will mention how no one can hear you screaming from a basement before correcting themselves and saying they meant "singing", and lazy villagers during a birthday party may mention how a birthday clown once entered their home and got trapped in the walls. Or when a new villager moves in, one possible reason a current one wants to move out is "all of the night clowns." Lazy villagers can also occasionally remark about their enjoyment of internal combustion engines before voice-acting reckless driving... right before they state that they're not allowed to drive cars anymore.</span><div class="indent" data-dcnode-id="4391"><em data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">"Mom says they still hear honking noises in the walls sometimes."</span></em></div></li><li data-dcnode-id="4382"><span data-dcnode-id="4389" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BluffWorkedTooWell" title="/pmwiki/pmwiki.php/Main/BluffWorkedTooWell"><span data-dcnode-id="4388" instrument_node="">Bluff Worked Too Well</span></a><span data-dcnode-id="4386" instrument_node="">: Tom Nook advertised your island as having "fully-furnished homes", which, being a totally deserted island, it obviously does </span><em data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">not</span></em><span data-dcnode-id="4383" instrument_node=""> have. You end up having to help him build and furnish the houses before the new residents arrive.</span></li><li data-dcnode-id="4365"><span data-dcnode-id="4381" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BluntNo" title="/pmwiki/pmwiki.php/Main/BluntNo"><span data-dcnode-id="4380" instrument_node="">Blunt "No"</span></a><span data-dcnode-id="4378" instrument_node="">: In one possible conversation between a Smug and Snooty villagers, The Smug villager wants to put on a play and was thinking to put the other in the role as the princess, then asks the player what role </span><em data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">he</span></em><span data-dcnode-id="4375" instrument_node=""> should play. If the player choses "The prince!", The Smug villager has a gender-inverted idea of </span><a class="twikilink" data-dcnode-id="4373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SleepingBeauty" title="/pmwiki/pmwiki.php/Literature/SleepingBeauty"><span data-dcnode-id="4374" instrument_node="">Sleeping Beauty</span></a><span data-dcnode-id="4372" instrument_node=""> where the princess (Snooty) has to wake up the prince (him; Smug) "with a kiss. *beat* </span><a class="twikilink" data-dcnode-id="4370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpperClassTwit" title="/pmwiki/pmwiki.php/Main/UpperClassTwit"><span data-dcnode-id="4371" instrument_node="">On the lips.</span></a><span data-dcnode-id="4369" instrument_node="">" The Snooty Villager's only reaction to that idea is simply a blunt no. The short statement in the otherwise very wordy dialogue boxes along with the series' </span><a class="twikilink" data-dcnode-id="4367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoHuggingNoKissing" title="/pmwiki/pmwiki.php/Main/NoHuggingNoKissing"><span data-dcnode-id="4368" instrument_node="">No Hugging, No Kissing</span></a><span data-dcnode-id="4366" instrument_node=""> rule just makes it all the more funny.</span></li><li data-dcnode-id="4348"><span data-dcnode-id="4364" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BoringButPractical" title="/pmwiki/pmwiki.php/Main/BoringButPractical"><span data-dcnode-id="4363" instrument_node="">Boring, but Practical</span></a><span data-dcnode-id="4361" instrument_node="">:</span><ul data-dcnode-id="4349"><li data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node=""> The Simple DIY Workbench isn't the prettiest-looking one, as it's just a tree stump with some tools on top, but it gives you full access to your crafting recipes and customization like all other workbench variants.</span></li><li data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node=""> Gifting pumpkins to your villager on a daily basis is an effective way of raising their friendship quickly without altering their home interiors as they're considered a non-native fruit which will always prompt villagers to give you something in return unlike native fruit which doesn't raise their friendship by much and won't get you a gift in return. Also, non-native fruits take three days to appear and are worth 500 bells whereas pumpkins take two days to appear and are worth 350 bells.</span></li><li data-dcnode-id="4352"><span data-dcnode-id="4356" instrument_node=""> A good use of customization kits is </span><a class="twikilink" data-dcnode-id="4354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotTheIntendedUse" title="/pmwiki/pmwiki.php/Main/NotTheIntendedUse"><span data-dcnode-id="4355" instrument_node="">for reinforcing your tools, as customizing a tool that supports it renews its durability</span></a><span data-dcnode-id="4353" instrument_node="">. This can cut down on having to gather the materials to make a new one if you don't buy them from Nook's Cranny.</span></li><li data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node=""> Selling fruits and other produce isn't as flashy as selling turnips at jackpot prices, but it's a reliable and consistent way to generate Bells, since non-turnip produce never expire and have fixed prices.</span></li></ul></li><li data-dcnode-id="4318"><span data-dcnode-id="4347" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Bowdlerization" title="/pmwiki/pmwiki.php/Main/Bowdlerization"><span data-dcnode-id="4346" instrument_node="">Bowdlerization</span></a><span data-dcnode-id="4344" instrument_node="">:</span><ul data-dcnode-id="4319"><li data-dcnode-id="4339"><span data-dcnode-id="4343" instrument_node=""> While the aviation lingo used by Orville and Wilbur is mostly accurate, the word for W replaces "Whiskey" with "Whisker" (which may also count as </span><a class="twikilink" data-dcnode-id="4341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HoldYourHippogriffs" title="/pmwiki/pmwiki.php/Main/HoldYourHippogriffs"><span data-dcnode-id="4342" instrument_node="">Hold Your Hippogriffs</span></a><span data-dcnode-id="4340" instrument_node=""> given the animal-themed world).</span></li><li data-dcnode-id="4331"><span data-dcnode-id="4338" instrument_node=""> The Raccoon Figurine is based on a traditional statuary depiction of the tanuki, but unlike the real world equivalent </span><a class="twikilink" data-dcnode-id="4336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnimalsLackAttributes" title="/pmwiki/pmwiki.php/Main/AnimalsLackAttributes"><span data-dcnode-id="4337" instrument_node="">has its genitals replaced</span></a><span data-dcnode-id="4335" instrument_node=""> with a smooth, round, featureless area. This is in sharp contrast to the in-game depictions of artwork which can be donated to the museum, which are not censored in any way. (The latter at least has an in-game reason for not censoring, as any censorship of artwork that could be donated to the museum might have been taken as </span><a class="twikilink" data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpottingTheThread" title="/pmwiki/pmwiki.php/Main/SpottingTheThread"><span data-dcnode-id="4334" instrument_node="">a sign that it was a Redd-made forgery</span></a><span data-dcnode-id="4332" instrument_node="">, and thus confused the players when it actually wasn't.)</span></li><li data-dcnode-id="4322"><span data-dcnode-id="4330" instrument_node=""> In Blathers' description, he translates the vampire squid's scientific name of </span><em data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">Vampyroteuthis infernalis</span></em><span data-dcnode-id="4327" instrument_node=""> as "vampire squid from </span><em data-dcnode-id="4324"><a class="twikilink" data-dcnode-id="4325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoshDangItToHeck" title="/pmwiki/pmwiki.php/Main/GoshDangItToHeck"><span data-dcnode-id="4326" instrument_node="">heck</span></a></em><span data-dcnode-id="4323" instrument_node="">".</span></li><li data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node=""> In the European English version of the game, the "sparkling cider" item is instead referred to as "fizzy apple juice", because cider is usually an alcoholic drink outside the United States.</span></li></ul></li><li data-dcnode-id="4300"><span data-dcnode-id="4317" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrandX" title="/pmwiki/pmwiki.php/Main/BrandX"><span data-dcnode-id="4316" instrument_node="">Brand X</span></a><span data-dcnode-id="4314" instrument_node="">:</span><ul data-dcnode-id="4301"><li data-dcnode-id="4308"><span data-dcnode-id="4313" instrument_node=""> One version of the "board game" item looks a lot like </span><em data-dcnode-id="4310"><a class="twikilink" data-dcnode-id="4311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/SettlersOfCatan" title="/pmwiki/pmwiki.php/TabletopGame/SettlersOfCatan"><span data-dcnode-id="4312" instrument_node="">Settlers of Catan</span></a></em><span data-dcnode-id="4309" instrument_node=""> with its hex-grid and picture-with-accompanying-text cards; it's referred to as the "territory game" variant in the Nook Shopping catalog.</span></li><li data-dcnode-id="4302"><span data-dcnode-id="4307" instrument_node=""> The title screen on the "arcade fighting machine" uses a yellow-red gradient and "swooshing" lines on the letters for "Fight Town", reminiscent of the word art for the </span><em data-dcnode-id="4304"><a class="twikilink" data-dcnode-id="4305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/StreetFighter" title="/pmwiki/pmwiki.php/Franchise/StreetFighter"><span data-dcnode-id="4306" instrument_node="">Street Fighter</span></a></em><span data-dcnode-id="4303" instrument_node=""> series titles but with the gradient reversed. Interacting with it produces either a "hit" noise or a squeaky sounding "e-doo-ken".</span></li></ul></li><li data-dcnode-id="4292"><span data-dcnode-id="4299" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreadEggsBreadedEggs" title="/pmwiki/pmwiki.php/Main/BreadEggsBreadedEggs"><span data-dcnode-id="4298" instrument_node="">Bread, Eggs, Breaded Eggs</span></a><span data-dcnode-id="4296" instrument_node="">: When talking about pizza, Lazy villagers might mention how hating pineapple on pizza is just a trend "like being afraid of clowns or grossed out by the word 'moist.'" They'll then list off a long list of toppings they like on pizza, including onions, peppers, pineapple, </span><a class="twikilink" data-dcnode-id="4294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreadEggsMilkSquick" title="/pmwiki/pmwiki.php/Main/BreadEggsMilkSquick"><span data-dcnode-id="4295" instrument_node="">moist clowns</span></a><span data-dcnode-id="4293" instrument_node="">, and hot, melty cheese.</span></li><li data-dcnode-id="4275"><span data-dcnode-id="4291" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakableWeapons" title="/pmwiki/pmwiki.php/Main/BreakableWeapons"><span data-dcnode-id="4290" instrument_node="">Breakable Weapons</span></a><span data-dcnode-id="4288" instrument_node="">: In previous installments, only the axe was breakable. Now, </span><em data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">most</span></em><span data-dcnode-id="4285" instrument_node=""> tools</span><span class="notelabel" data-dcnode-id="4282" onclick="togglenote('note6effd');" style="cursor: pointer;"><sup data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4280" id="note6effd" isnote="true" onclick="togglenote('note6effd');" style="display: none; cursor: pointer;"><span data-dcnode-id="4281" instrument_node="">excluding the vaulting pole, ladder, and wand</span></span><span data-dcnode-id="4279" instrument_node=""> have a certain number of uses before they break, with higher tiers being more durable, but never </span><em data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">unbreakable</span></em><span data-dcnode-id="4276" instrument_node="">. For most tools, the durability counter only changes when it successfully yields some item (shooting down a balloon present, digging something up, catching a bug or fish, etc.); the axe remains the exception, as every hit reduces its durability regardless of whether it produces any resources.</span></li><li data-dcnode-id="4218"><span data-dcnode-id="4274" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pm
