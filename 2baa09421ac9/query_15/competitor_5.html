https%3A//animalcrossingworld.com/wp-content/uploads/2021/02/animal-crossing-new-horizons-nook-shopping-seasonal-item-pi-day-790x444.jpg"><span data-dcnode-id="2307" instrument_node="">each pie is decorated with a "π" baked into the crust,</span><img data-dcnode-id="2306" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">◊</span></small><span data-dcnode-id="2302" instrument_node=""> and is even priced at 314 bells.</span></li><li data-dcnode-id="2296"><span data-dcnode-id="2300" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PunctuationChangesTheMeaning" title="/pmwiki/pmwiki.php/Main/PunctuationChangesTheMeaning"><span data-dcnode-id="2299" instrument_node="">Punctuation Changes the Meaning</span></a><span data-dcnode-id="2297" instrument_node="">: When a smug character gives you a gift to give to another villager, he tells you, "No rush", before he corrects himself, saying, "No, rush!"</span></li><li data-dcnode-id="2291"><span data-dcnode-id="2295" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PurelyAestheticGender" title="/pmwiki/pmwiki.php/Main/PurelyAestheticGender"><span data-dcnode-id="2294" instrument_node="">Purely Aesthetic Gender</span></a><span data-dcnode-id="2292" instrument_node="">: There are absolutely no more restrictions to the character customization regarding gender, with only a switch in the "Face Paint/Other" section of the customization screen determining whether the game treats you as a boy or a girl (referred to as "style", and with significantly less impact overall), and you can change it at any point so long as you are in front of a mirror. Both genders can wear any clothing item, and characters do not account for the player's gender or even refer to them with gendered terms at all.</span></li><li data-dcnode-id="2271"><span data-dcnode-id="2290" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RandomNumberGod" title="/pmwiki/pmwiki.php/Main/RandomNumberGod"><span data-dcnode-id="2289" instrument_node="">Random Number God</span></a><span data-dcnode-id="2287" instrument_node="">:</span><ul data-dcnode-id="2272"><li data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node=""> At the start of every day, two non-fruit trees in your village will have furniture, five will have wasp nests, ten will have a stack of 100 bells.</span></li><li data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node=""> At the start of every day, up to four fossils will appear in unoccupied spots of soil that aren't obscured by trees or buildings; if there are fossils that still haven't been dug up from the previous day/s the number caps at six before new fossils stop appearing.</span></li><li data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node=""> At the start of every day, one glowing spot per player containing a bag of 1000 bells will appear in spots of soil that can grow trees; a stack/bag of bells can be buried back in the glowing spot to grow a bell tree. If between 2000-99000 bells are buried there will 3:7 odds that the three bags of bells the tree bears will be of same amount buried or the minimum amount possible: 1000 bells for 2000-9000 buried or 10000 bells for 11000-99000 buried.</span></li><li data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node=""> At the start of every day, one rock will spawn bells when struck with a shovel or axe, the rest will spawn stones, clay, iron nuggets, or a gold nugget, up to eight bell/material drops per rock.</span></li><li data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node=""> At the start of every day, if there are less than six rocks on your island, a new rock will randomly spawn on an unobstructed tile.</span></li><li data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node=""> While you have total control over whether your villagers stay or leave, most of villager management, from move-out requests to who you'll find on mystery islands, is subject to RNG. The epitome of this randomness is random campers at the campsite - from start (whether a random camper will appear) to finish (the one villager that they will ask to replace), the whole process is full of randomness.</span></li><li data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node=""> At the start of every day, one message bottle per player containing a DIY recipe will appear on the shore.</span></li></ul></li><li data-dcnode-id="2266"><span data-dcnode-id="2270" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RareRandomDrop" title="/pmwiki/pmwiki.php/Main/RareRandomDrop"><span data-dcnode-id="2269" instrument_node="">Rare Random Drop</span></a><span data-dcnode-id="2267" instrument_node="">: Gold nuggets come from whacking rocks or popping blue balloons around 1% of the time, in place of the usual iron/stone/clay. They're needed for a number of popular recipes like the gold watering can and robot hero, so they're one of the most valuable items for trading.</span></li><li data-dcnode-id="2258"><span data-dcnode-id="2265" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RenovatingThePlayerHeadquarters" title="/pmwiki/pmwiki.php/Main/RenovatingThePlayerHeadquarters"><span data-dcnode-id="2264" instrument_node="">Renovating the Player Headquarters</span></a><span data-dcnode-id="2262" instrument_node="">: Brought </span><a class="twikilink" data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpToEleven" title="/pmwiki/pmwiki.php/Main/UpToEleven"><span data-dcnode-id="2261" instrument_node="">Up to Eleven</span></a><span data-dcnode-id="2259" instrument_node=""> compared to previous games, with the player able to build up and customize an entire island.</span></li><li data-dcnode-id="2248"><span data-dcnode-id="2257" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RepeatableQuest" title="/pmwiki/pmwiki.php/Main/RepeatableQuest"><span data-dcnode-id="2256" instrument_node="">Repeatable Quest</span></a><span data-dcnode-id="2254" instrument_node="">:</span><ul data-dcnode-id="2249"><li data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node=""> Whenever Gulliver, Gullivarrr or Wisp shows up, they need your help in the same way every time. Gulliver needs you to find the parts of his broken communicator, while Wisp gets scared when you talk to him and loses pieces of his spirit that you need to retrieve. Gullivarrr requires you to find his missing communicator.</span></li><li data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node=""> During the month of June, Cyrus and Reese are at Harv's Island taking pictures for their wedding anniversary. Players can pop in once per day to take a picture or set up a party.</span></li></ul></li><li data-dcnode-id="2243"><span data-dcnode-id="2247" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Retcon" title="/pmwiki/pmwiki.php/Main/Retcon"><span data-dcnode-id="2246" instrument_node="">Retcon</span></a><span data-dcnode-id="2244" instrument_node="">: The museum development sequence received one in the 2.0. update. Prior to 2.0, the museum would be built with only a first floor and basement, and meeting Redd and obtaining an art piece would cause Blathers to expand the museum to have a second-floor art gallery. 2.0 introduces the Harv's Island commune where Redd can be set up, meaning he could ostensibly be met before the scripted first encounter. Perhaps because of this, for new players post-2.0, the museum starts out constructed with the second floor and art gallery already included. The new sequence may also be a patch for the flaw in the prior unlock sequence where not donating the art piece from Redd's first visit would essentially screw the player out of the museum upgrade until they could acquire a real art piece from another player, as Redd would not begin visits in the regular rotation and allow the player to obtain any more art if his artwork from that visit was lost and not donated or not obtained.</span></li><li data-dcnode-id="2229"><span data-dcnode-id="2242" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RiddleForTheAges" title="/pmwiki/pmwiki.php/Main/RiddleForTheAges"><span data-dcnode-id="2241" instrument_node="">Riddle for the Ages</span></a><span data-dcnode-id="2239" instrument_node="">: The running mystery behind what gyroids exactly </span><em data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">are</span></em><span data-dcnode-id="2236" instrument_node=""> has been invoked further and possibly deepened in this game. The mechanic of being able to grow them in the earth out of fragments of gyroid pottery, with watering indicated by eerie vapors rising from the hole, raises several unsettling questions, especially since they were easier to regard as simple animate or haunted sculptures in previous games, but now seem decidedly more organic. The visual and material diversity of the new gyroids also brings up questions, since they no longer feel as unified in style or, perhaps, tradition, introducing questions of "what counts as/can become a gyroid"...at the same time as the game is suggesting that </span><em data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">no one makes them</span></em><span data-dcnode-id="2233" instrument_node=""> in-universe. Furthermore, two of them, the stelloid and laseroid, seem decidedly </span><em data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">extraterrestrial</span></em><span data-dcnode-id="2230" instrument_node="">, rather than merely space-themed.</span></li><li data-dcnode-id="2211"><span data-dcnode-id="2228" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SameCharacterButDifferent" title="/pmwiki/pmwiki.php/Main/SameCharacterButDifferent"><span data-dcnode-id="2227" instrument_node="">Same Character, but Different</span></a><span data-dcnode-id="2225" instrument_node="">: The wave 1 Summer free update implemented on July 3rd does this with Gullivarrr, who washes up on the player' shore dressed as a pirate. Despite his quest and dialogue being similar to sailor Gulliver's, with minor differences such as the way the player finds his communicator as well as his dialogue being written to sound more pirate-y, he is treated as an entirely different character than Gulliver, and introduces himself as Gullivarrr mid-conversation, replacing the blue "Gulliver" name bubble with a red one. The rewards he gives the player for finishing the quest are also different from Gulliver's standard rewards, but are mailed the same way. This is taken even further, as Gullivarrr doesn’t recognize the player as someone he knows even if the player has interacted with Gulliver before. Gulliver and Gullivarrr can appear on the players island during the same week, but not on consecutive days, adding more mystery to whether they’re the same person, </span><a class="twikilink" data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IdenticalStranger" title="/pmwiki/pmwiki.php/Main/IdenticalStranger"><span data-dcnode-id="2224" instrument_node="">or if Gullivarrr is just a bird that happens to look similar to Gulliver.</span></a><span data-dcnode-id="2222" instrument_node=""> When the Series 5 set of </span><em data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Animal Crossing</span></em><span data-dcnode-id="2219" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Toys/Amiibo" title="/pmwiki/pmwiki.php/Toys/Amiibo"><span data-dcnode-id="2218" instrument_node="">amiibo</span></a><span data-dcnode-id="2216" instrument_node=""> cards came out, Gulliver recieved a new card, but Gullivarrr was left out (Tom Nook and Isabelle, meanwhile, got two new cards each). </span><a class="twikilink" data-dcnode-id="2214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="2215" instrument_node="">The trailer pokes fun at this.</span></a><div class="indent" data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">New encounter! -player character interacts with "Gulliver"- New encounter...?</span></div></li><li data-dcnode-id="2194"><span data-dcnode-id="2210" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScareChord" title="/pmwiki/pmwiki.php/Main/ScareChord"><span data-dcnode-id="2209" instrument_node="">Scare Chord</span></a><span data-dcnode-id="2207" instrument_node="">: Plays along with the "Shocked" emote, which most prominently shows up when you talk to and abruptly awaken a sleeping Blathers. Since he's an owl and sleeps all day, this will </span><a class="twikilink" data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RunningGag" title="/pmwiki/pmwiki.php/Main/RunningGag"><span data-dcnode-id="2206" instrument_node="">probably happen more often than not</span></a><span data-dcnode-id="2204" instrument_node=""> when you need to submit something to the museum (unless you prefer to make donations at night). You also get this sound effect whenever you lose out on a present by dropping it into water or </span><a class="twikilink" data-dcnode-id="2202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OhCrap" title="/pmwiki/pmwiki.php/Main/OhCrap"><span data-dcnode-id="2203" instrument_node="">knock a wasp nest out of a tree</span></a><span data-dcnode-id="2201" instrument_node="">. Villagers also have this reaction if they're observing a bug and you scare the bug off by running past.</span><div class="indent" data-dcnode-id="2195"><strong data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Blathers:</span></strong><span data-dcnode-id="2198" instrument_node=""> Hoooooo... </span><strong data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">WHO?!</span></strong></div></li><li data-dcnode-id="2186"><span data-dcnode-id="2193" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SceneryPorn" title="/pmwiki/pmwiki.php/Main/SceneryPorn"><span data-dcnode-id="2192" instrument_node="">Scenery Porn</span></a><span data-dcnode-id="2190" instrument_node="">: </span><em data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Animal Crossing</span></em><span data-dcnode-id="2187" instrument_node=""> has never looked more gorgeous. The textures on the plant life look much more lifelike, and little details like the trees gently rustling in the wind or raindrops making the water ripple make the experience much more immersive. You can also treat yourself to some breathtaking views of the sunset over the ocean if you go to the northernmost part of the island at dusk.</span></li><li data-dcnode-id="2181"><span data-dcnode-id="2185" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SelfDeprecation" title="/pmwiki/pmwiki.php/Main/SelfDeprecation"><span data-dcnode-id="2184" instrument_node="">Self-Deprecation</span></a><span data-dcnode-id="2182" instrument_node="">: "_____ Trash" is one of the unlockable titles you can put on your passport. So you can call yourself "Accomplished Trash", "Carefree Trash", "Eco-Friendly Trash"...whatever you feel like.</span></li><li data-dcnode-id="2165"><span data-dcnode-id="2180" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SequenceBreaking" title="/pmwiki/pmwiki.php/Main/SequenceBreaking"><span data-dcnode-id="2179" instrument_node="">Sequence Breaking</span></a><span data-dcnode-id="2177" instrument_node="">:</span><ul data-dcnode-id="2166"><li data-dcnode-id="2169"><span data-dcnode-id="2176" instrument_node=""> You can get a shovel before you're intended to</span><span class="notelabel" data-dcnode-id="2173" onclick="togglenote('note28rbqy');" style="cursor: pointer;"><sup data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2171" id="note28rbqy" isnote="true" onclick="togglenote('note28rbqy');" style="display: none; cursor: pointer;"><span data-dcnode-id="2172" instrument_node="">talking to Blathers after he moves in with his tent</span></span><span data-dcnode-id="2170" instrument_node=""> by traveling to a mystery island and buying one from Wilbur.</span></li><li data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node=""> It's possible to get other tools prematurely by travelling to a friend's more developed island and buying them (or their DIY recipes, particularly the Ladder and Vaulting Pole) from the local shop.</span></li></ul></li><li data-dcnode-id="1942"><span data-dcnode-id="2164" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="2163" instrument_node="">Shout-Out</span></a><span data-dcnode-id="2161" instrument_node="">:</span><ul data-dcnode-id="1943"><li data-dcnode-id="2155"><span data-dcnode-id="2160" instrument_node=""> When you catch a red dragonfly, your character will comment "Didn't even have to roll for initiative!" referencing </span><em data-dcnode-id="2157"><a class="twikilink" data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons" title="/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons"><span data-dcnode-id="2159" instrument_node="">Dungeons &amp; Dragons</span></a></em><span data-dcnode-id="2156" instrument_node="">.</span></li><li data-dcnode-id="2147"><span data-dcnode-id="2154" instrument_node=""> One furniture piece that can be purchased with your Nook Miles is a giant </span><a class="twikilink" data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Kaiju" title="/pmwiki/pmwiki.php/Main/Kaiju"><span data-dcnode-id="2153" instrument_node="">Kaiju</span></a><span data-dcnode-id="2151" instrument_node=""> statue of a spike-backed reptilian monster that roars and breathes fire, essentially a knockoff </span><a class="twikilink" data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Godzilla" title="/pmwiki/pmwiki.php/Franchise/Godzilla"><span data-dcnode-id="2150" instrument_node="">Godzilla</span></a><span data-dcnode-id="2148" instrument_node="">. It even plays a tinny theme parody.</span></li><li data-dcnode-id="2130"><span data-dcnode-id="2146" instrument_node=""> The "</span><a class="twikilink" data-dcnode-id="2144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumongousMecha" title="/pmwiki/pmwiki.php/Main/HumongousMecha"><span data-dcnode-id="2145" instrument_node="">robot hero</span></a><span data-dcnode-id="2143" instrument_node="">", which looks like something out of </span><em data-dcnode-id="2140"><a class="twikilink" data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Transformers" title="/pmwiki/pmwiki.php/Franchise/Transformers"><span data-dcnode-id="2142" instrument_node="">Transformers</span></a></em><span data-dcnode-id="2139" instrument_node=""> or </span><em data-dcnode-id="2136"><a class="twikilink" data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Gundam" title="/pmwiki/pmwiki.php/Franchise/Gundam"><span data-dcnode-id="2138" instrument_node="">Gundam</span></a></em><span data-dcnode-id="2135" instrument_node="">. Its color scheme, especially the helmet, appear to specifically homage </span><em data-dcnode-id="2131"><a class="twikilink" data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/KamenRiderDrive" title="/pmwiki/pmwiki.php/Series/KamenRiderDrive"><span data-dcnode-id="2134" instrument_node="">Kamen Rider Drive</span></a><span data-dcnode-id="2132" instrument_node="">.</span></em></li><li data-dcnode-id="2124"><span data-dcnode-id="2129" instrument_node=""> One of the random island evaluations you might get for a one-star rating has a villager mention that they don't want it to be popular because, "It's a secret to everybody", referencing </span><em data-dcnode-id="2126"><a class="twikilink" data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaI" title="/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaI"><span data-dcnode-id="2128" instrument_node="">The Legend of Zelda</span></a></em><span data-dcnode-id="2125" instrument_node="">.</span></li><li data-dcnode-id="2112"><span data-dcnode-id="2123" instrument_node=""> Catching a </span><em data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">horse</span></em><span data-dcnode-id="2120" instrument_node=""> mackerel results in the quip "of </span><em data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">course</span></em><span data-dcnode-id="2117" instrument_node="">, Mack... er... el", referencing the TV show </span><em data-dcnode-id="2114"><a class="twikilink" data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/MisterEd" title="/pmwiki/pmwiki.php/Series/MisterEd"><span data-dcnode-id="2116" instrument_node="">Mister Ed</span></a></em><span data-dcnode-id="2113" instrument_node="">.</span></li><li data-dcnode-id="2103"><span data-dcnode-id="2111" instrument_node=""> The various television furniture in the game occasionally show a short scene from what appears to be a movie, where an evil-looking wizard and his henchman are standing on a balcony on top of a tower, adressing a large army beneath him in a menacing fashion, similar to the scene of Saruman addressing his uruk-hai army in the </span><a class="twikilink" data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/PeterJackson" title="/pmwiki/pmwiki.php/Creator/PeterJackson"><span data-dcnode-id="2110" instrument_node="">Peter Jackson</span></a><span data-dcnode-id="2108" instrument_node=""> version of </span><em data-dcnode-id="2105"><a class="twikilink" data-dcnode-id="2106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheTwoTowers" title="/pmwiki/pmwiki.php/Film/TheTwoTowers"><span data-dcnode-id="2107" instrument_node="">The Two Towers</span></a></em><span data-dcnode-id="2104" instrument_node="">.</span></li><li data-dcnode-id="2092"><span data-dcnode-id="2102" instrument_node=""> The text for catching a great purple emperor butterfly features a nod to 80's pop/rock sensation </span><a class="twikilink" data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Prince" title="/pmwiki/pmwiki.php/Music/Prince"><span data-dcnode-id="2101" instrument_node="">Prince</span></a><span data-dcnode-id="2099" instrument_node=""> with the flavor text, "Its </span><a class="twikilink" data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/PurpleRain" title="/pmwiki/pmwiki.php/Film/PurpleRain"><span data-dcnode-id="2098" instrument_node="">purple</span></a><span data-dcnode-id="2096" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/PurpleRainAlbum" title="/pmwiki/pmwiki.php/Music/PurpleRainAlbum"><span data-dcnode-id="2095" instrument_node="">reign</span></a><span data-dcnode-id="2093" instrument_node=""> is over now!"</span></li><li data-dcnode-id="2082"><span data-dcnode-id="2091" instrument_node=""> </span><a class="urllink" data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/MooseInBlue/status/1262867214639775745"><span data-dcnode-id="2090" instrument_node="">The official companion guide</span><img data-dcnode-id="2089" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2087" instrument_node=""> features a picture of a grey-haired Villager with a bowl-cut wearing glasses, who is shocked at a TV in a dark room, looking a lot like the main character and premise of </span><em data-dcnode-id="2084"><a class="twikilink" data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Persona4" title="/pmwiki/pmwiki.php/VideoGame/Persona4"><span data-dcnode-id="2086" instrument_node="">Persona 4</span></a></em><span data-dcnode-id="2083" instrument_node="">.</span></li><li data-dcnode-id="2070"><span data-dcnode-id="2081" instrument_node=""> The </span><a class="urllink" data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dodo.ac/np/images/3/3b/Adventure_Dress_NH_Icon.png"><span data-dcnode-id="2080" instrument_node="">"adventure dress"</span><img data-dcnode-id="2079" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">◊</span></small><span data-dcnode-id="2075" instrument_node=""> looks just like the one worn by titular character of </span><em data-dcnode-id="2072"><a class="twikilink" data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/AlicesAdventuresInWonderland" title="/pmwiki/pmwiki.php/Literature/AlicesAdventuresInWonderland"><span data-dcnode-id="2074" instrument_node="">Alice's Adventures in Wonderland</span></a></em><span data-dcnode-id="2071" instrument_node="">, and even has the four card suits on its front.</span></li><li data-dcnode-id="2058"><span data-dcnode-id="2069" instrument_node=""> The </span><a class="urllink" data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dodo.ac/np/images/0/07/Dragon_Suit_NH_Icon.png"><span data-dcnode-id="2068" instrument_node="">"dragon suit"</span><img data-dcnode-id="2067" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">◊</span></small><span data-dcnode-id="2063" instrument_node="">, aside from the large dragon insignia on the front, looks like it was lifted from Bruce Lee's iconic yellow tracksuit in </span><em data-dcnode-id="2060"><a class="twikilink" data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/GameOfDeath" title="/pmwiki/pmwiki.php/Film/GameOfDeath"><span data-dcnode-id="2062" instrument_node="">Game of Death</span></a></em><span data-dcnode-id="2059" instrument_node="">.</span></li><li data-dcnode-id="2038"><span data-dcnode-id="2057" instrument_node=""> The </span><a class="urllink" data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nookipedia.com/wiki/Item%3AZap_Suit_%28New_Horizons%29"><span data-dcnode-id="2056" instrument_node="">"zap suit"</span><img data-dcnode-id="2055" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2053" instrument_node=""> and </span><a class="urllink" data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nookipedia.com/wiki/Item%3ANoble_Zap_Suit_%28New_Horizons%29"><span data-dcnode-id="2052" instrument_node="">"noble zap suit"</span><img data-dcnode-id="2051" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2049" instrument_node=""> let you dress up as a </span><a class="twikilink" data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Sentai" title="/pmwiki/pmwiki.php/Main/Sentai"><span data-dcnode-id="2048" instrument_node="">Sentai</span></a><span data-dcnode-id="2046" instrument_node="">, with the color variations being the most common colors for teams in </span><em data-dcnode-id="2043"><a class="twikilink" data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/SuperSentai" title="/pmwiki/pmwiki.php/Franchise/SuperSentai"><span data-dcnode-id="2045" instrument_node="">Super Sentai</span></a></em><span data-dcnode-id="2042" instrument_node="">: pink, blue, green, red, yellow, and black. The last two are silver and white, which are the colors most commonly used for </span><a class="twikilink" data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SixthRanger" title="/pmwiki/pmwiki.php/Main/SixthRanger"><span data-dcnode-id="2041" instrument_node="">Sixth Rangers</span></a><span data-dcnode-id="2039" instrument_node="">.</span></li><li data-dcnode-id="2022"><span data-dcnode-id="2037" instrument_node=""> The </span><a class="urllink" data-dcnode-id="2034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nookipedia.com/wiki/Item%3AMagical_Dress_%28New_Horizons%29"><span data-dcnode-id="2036" instrument_node="">"magical dress"</span><img data-dcnode-id="2035" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2033" instrument_node=""> lets you dress up as a </span><a class="twikilink" data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicalGirl" title="/pmwiki/pmwiki.php/Main/MagicalGirl"><span data-dcnode-id="2032" instrument_node="">Magical Girl</span></a><span data-dcnode-id="2030" instrument_node="">, and the color variations are the exact line-up from </span><em data-dcnode-id="2027"><a class="twikilink" data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/YesPrettyCure5" title="/pmwiki/pmwiki.php/Anime/YesPrettyCure5"><span data-dcnode-id="2029" instrument_node="">Yes! Pretty Cure 5</span></a></em><span data-dcnode-id="2026" instrument_node="">: pink, yellow, green, blue, red, and purple. The last two variations are black and light blue, which resemble </span><a class="twikilink" data-dcnode-id="2024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/FutariWaPrettyCure" title="/pmwiki/pmwiki.php/Anime/FutariWaPrettyCure"><span data-dcnode-id="2025" instrument_node="">Cure Black and Cure White</span></a><span data-dcnode-id="2023" instrument_node="">.</span></li><li data-dcnode-id="2016"><span data-dcnode-id="2021" instrument_node=""> The "tulip surprise box" has a little princess figurine in it, likely a reference to </span><em data-dcnode-id="2018"><a class="twikilink" data-dcnode-id="2019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Thumbelina" title="/pmwiki/pmwiki.php/Literature/Thumbelina"><span data-dcnode-id="2020" instrument_node="">Thumbelina</span></a></em><span data-dcnode-id="2017" instrument_node="">, who was born from a tulip blossom.</span></li><li data-dcnode-id="2010"><span data-dcnode-id="2015" instrument_node=""> The "peach surprise box" has a baby boy figurine inside, referencing how the title character of </span><em data-dcnode-id="2012"><a class="twikilink" data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Momotaro" title="/pmwiki/pmwiki.php/Literature/Momotaro"><span data-dcnode-id="2014" instrument_node="">Momotarō</span></a></em><span data-dcnode-id="2011" instrument_node=""> is found.</span></li><li data-dcnode-id="2005"><span data-dcnode-id="2009" instrument_node=""> The "bamboo doll" is a glowing stalk of bamboo with a baby doll inside, referencing Princess Kaguya from </span><em data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">The Tale of the Bamboo Cutter</span></em><span data-dcnode-id="2006" instrument_node="">.</span></li><li data-dcnode-id="1997"><span data-dcnode-id="2004" instrument_node=""> The K.K. Slider song "K.K. Robot Synth", "K.K. Loid" in the Japanese version, is a shout-out to </span><a class="twikilink" data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Vocaloid" title="/pmwiki/pmwiki.php/Music/Vocaloid"><span data-dcnode-id="2003" instrument_node="">Vocaloid</span></a><span data-dcnode-id="2001" instrument_node="">. His appearance on the cover of the record evokes the looks of </span><a class="twikilink" data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/HatsuneMiku" title="/pmwiki/pmwiki.php/Music/HatsuneMiku"><span data-dcnode-id="2000" instrument_node="">Hatsune Miku</span></a><span data-dcnode-id="1998" instrument_node=""> and KAITO. As well, he holds a microphone that is commonly associated with the first Japanese Vocaloid, MEIKO.</span></li><li data-dcnode-id="1991"><span data-dcnode-id="1996" instrument_node=""> Catching a great white shark prompts the message, "Watch out for its jaws!" </span><em data-dcnode-id="1993"><a class="twikilink" data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Jaws" title="/pmwiki/pmwiki.php/Literature/Jaws"><span data-dcnode-id="1995" instrument_node="">Jaws</span></a></em><span data-dcnode-id="1992" instrument_node=""> is a story about a great white shark terrorizing a small town.</span></li><li data-dcnode-id="1985"><span data-dcnode-id="1990" instrument_node=""> The comment for the Angelfish quips, "The other fish told me to do it!" referencing </span><em data-dcnode-id="1987"><a class="twikilink" data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/AngelsInTheOutfield" title="/pmwiki/pmwiki.php/Film/AngelsInTheOutfield"><span data-dcnode-id="1989" instrument_node="">Angels in the Outfield</span></a></em><span data-dcnode-id="1986" instrument_node="">.</span></li><li data-dcnode-id="1980"><span data-dcnode-id="1984" instrument_node=""> It's probably not a coincidence that the clownfish and the surgeonfish (also known as a blue tang) are </span><a class="twikilink" data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/FindingNemo" title="/pmwiki/pmwiki.php/WesternAnimation/FindingNemo"><span data-dcnode-id="1983" instrument_node="">right next to each other in the Critterpedia</span></a><span data-dcnode-id="1981" instrument_node="">.</span></li><li data-dcnode-id="1974"><span data-dcnode-id="1979" instrument_node=""> When Gullivarrr sends the player pirate furniture in the mail, he signs his letters as "The Dread Pirate Gullivarrr". A key character from </span><em data-dcnode-id="1976"><a class="twikilink" data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ThePrincessBride" title="/pmwiki/pmwiki.php/Literature/ThePrincessBride"><span data-dcnode-id="1978" instrument_node="">The Princess Bride</span></a></em><span data-dcnode-id="1975" instrument_node=""> is "The Dread Pirate Roberts".</span></li><li data-dcnode-id="1963"><span data-dcnode-id="1973" instrument_node=""> During Bunny Day, peppy villagers may comment on finding colorful bottles washed up on the beach, saying that it inspired them to write some song lyrics. Said lyrics, appropriately, parody the chorus of </span><a class="twikilink" data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/ReggattaDeBlanc" title="/pmwiki/pmwiki.php/Music/ReggattaDeBlanc"><span data-dcnode-id="1972" instrument_node="">"Message in a Bottle"</span></a><span data-dcnode-id="1970" instrument_node=""> by </span><a class="twikilink" data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/ThePolice" title="/pmwiki/pmwiki.php/Music/ThePolice"><span data-dcnode-id="1969" instrument_node="">The Police</span></a><span data-dcnode-id="1967" instrument_node="">.</span><div class="indent" data-dcnode-id="1964"><em data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">"Message in a bottle, ooooohhhh; Makes me hungry for a waffle, ooooohhhh."</span></em></div></li><li data-dcnode-id="1957"><span data-dcnode-id="1962" instrument_node=""> Two of the Gaming Desktop item customization options ("Third-person game" and "First-person game") has an interface that resembles the chat program Discord as the left-most screen. In addition, the center monitor in the First-person game customization option displays a game that looks suspiciously similar to </span><em data-dcnode-id="1959"><a class="twikilink" data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Splatoon" title="/pmwiki/pmwiki.php/VideoGame/Splatoon"><span data-dcnode-id="1961" instrument_node="">Splatoon</span></a></em><span data-dcnode-id="1958" instrument_node="">.</span></li><li data-dcnode-id="1949"><span data-dcnode-id="1956" instrument_node=""> Gruff the Goat's requested house theme in </span><em data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="1953" instrument_node=""> is a "House of Horrors" horror-movie set. Included within the "Order" tab's suggested clothing for the theme is the </span><a class="twikilink" data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/FridayThe13th" title="/pmwiki/pmwiki.php/Franchise/FridayThe13th"><span data-dcnode-id="1952" instrument_node="">hockey mask accessory</span></a><span data-dcnode-id="1950" instrument_node="">.</span></li><li data-dcnode-id="1944"><span data-dcnode-id="1948" instrument_node=""> If a smug villager invites you to their house, at the beginning of the visit they can greet you with "</span><a class="twikilink" data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/Cabaret" title="/pmwiki/pmwiki.php/Theatre/Cabaret"><span data-dcnode-id="1947" instrument_node="">Wilkommen, bienvenue, welcome</span></a><span data-dcnode-id="1945" instrument_node="">".</span></li></ul></li><li data-dcnode-id="1876"><span data-dcnode-id="1941" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShownTheirWork" title="/pmwiki/pmwiki.php/Main/ShownTheirWork"><span data-dcnode-id="1940" instrument_node="">Shown Their Work</span></a><span data-dcnode-id="1938" instrument_node="">:</span><ul data-dcnode-id="1877"><li data-dcnode-id="1921"><span data-dcnode-id="1937" instrument_node=""> Many of the fossils have been designed or updated to reflect discoveries made since the last game. Particularly, the theropods have non-pronated hands, </span><em data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Tyrannosaurus rex</span></em><span data-dcnode-id="1934" instrument_node=""> has gastralium (belly ribs), </span><em data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Spinosaurus</span></em><span data-dcnode-id="1931" instrument_node=""> is based on the 2014 discovery (short hindlegs, a small pelvis, and a dip in the middle of the dorsal sail) and is actually one of the most scientifically accurate depictions of the dinosaur in popular media (even though the tail on it was rendered inaccurate a month after release), </span><em data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Stegosaurus</span></em><span data-dcnode-id="1928" instrument_node=""> has a longer neck and elevated tail, </span><em data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Ankylosaurus</span></em><span data-dcnode-id="1925" instrument_node=""> has half-rings on the neck, and </span><em data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Quetzalcoatlus</span></em><span data-dcnode-id="1922" instrument_node=""> is mounted as walking on the ground instead of flying.</span></li><li data-dcnode-id="1910"><span data-dcnode-id="1920" instrument_node=""> The ancestral trail in the fossil exhibit has theropods being close to ornithischians rather than sauropods, alluding to the revived dinosaur clade Ornithoscelida. It also has </span><em data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Dimetrodon</span></em><span data-dcnode-id="1917" instrument_node=""> close to mammals, and birds close to </span><em data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Archaeopteryx</span></em><span data-dcnode-id="1914" instrument_node=""> and </span><em data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Deinonychus</span></em><span data-dcnode-id="1911" instrument_node="">.</span></li><li data-dcnode-id="1889"><span data-dcnode-id="1909" instrument_node=""> In his description for </span><em data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Deinonychus</span></em><span data-dcnode-id="1906" instrument_node="">, Blathers points out the major difference between it and </span><em data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Velociraptor</span></em><span data-dcnode-id="1903" instrument_node=""> is that </span><em data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Velociraptor</span></em><span data-dcnode-id="1900" instrument_node=""> is only two feet high in real life (the large raptors from </span><em data-dcnode-id="1897"><a class="twikilink" data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/JurassicPark" title="/pmwiki/pmwiki.php/Film/JurassicPark"><span data-dcnode-id="1899" instrument_node="">Jurassic Park</span></a></em><span data-dcnode-id="1896" instrument_node=""> are actually based on </span><em data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Utahraptor</span></em><span data-dcnode-id="1893" instrument_node="">, which was mistaken for </span><em data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Deinonychus</span></em><span data-dcnode-id="1890" instrument_node=""> by both the film makers and the original author). He also states that both are believed to have had feathers.</span></li><li data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node=""> The paintings and statues in the museum's art wing are all based on real art pieces of note, and each has a label explaining its source and history. Most of the fakes can be identified by looking up the real-world counterpart and playing spot-the-difference.</span></li><li data-dcnode-id="1882"><span data-dcnode-id="1886" instrument_node=""> As much as flower hybrids are a </span><a class="twikilink" data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="1885" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="1883" instrument_node="">, the crossbreeding mechanics is equivalent to school-level Mendelian genetics. If you write down the phenotype code of two parent flowers onto a Punnett Square, you'll get a solid hypothesis on the parents' offspring. As a result, it's possible for offspring to be carriers of recessive traits, contrary to looking like the parent flowers. Additionally, pink and orange hybrids accurately express incomplete dominance found in real-life flowers instead of simply being tied to color theory.</span></li><li data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node=""> Many people who caught the horseshoe crab and donated it to the museum may be wondering where it is, as it isn't among the ocean tanks. It turns out that it's actually in the freshwater exhibit, in the tank reserved for species that live in brackish water (like the sturgeon, mitten crab and pond smelt). This reflects the real habitat of the animal, despite it being classed as a sea creature.</span></li><li data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node=""> One of the few artwork that are always authentic is the "Familiar Statue", which as noted in its museum description that it was casted over 20 times, meaning that authentic pieces can be found all over the world such as this one.</span></li></ul></li><li data-dcnode-id="1810"><span data-dcnode-id="1875" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SocializationBonus" title="/pmwiki/pmwiki.php/Main/SocializationBonus"><span data-dcnode-id="1874" instrument_node="">Socialization Bonus</span></a><span data-dcnode-id="1872" instrument_node="">: In addition to the series staples...</span><ul data-dcnode-id="1811"><li data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node=""> Certain stages of the tutorial phase can be breezed through if you have helpful friends to give you significant amounts of wood and iron nuggets, or even just more furniture and flowers to decorate your island (with which you can quickly reach the three-star rating needed to end the tutorial phase). In fact, with the help of a more seasoned player, a new player can even access certain key tools and DIY recipes long before they are intended to.</span></li><li data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node=""> Visiting players can also donate towards the construction of bridges and inclines. With a few friends, even the most expensive bridges and inclines will be ready the next day.</span></li><li data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node=""> You can get 800 Nook Miles once every day, simply by visiting another player's island. This is a substantial amount (2.5x what you get for accessing the Nook Stop, and worth even more than most x5 Nook Miles+ goals).</span></li><li data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node=""> Certain Nook Miles achievements, in particular the "K.K. Slider concerts attended" and "villager birthdays celebrated" achievements, can be progressed even faster by flying to someone's island and attending another event. There are also two simple ones which are progressed by visiting other players and hosting other players.</span></li><li data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node=""> Every island's Nook's Cranny will have a different selection of Hot Item(s) of the Day, which is a DIY item that can be sold back at twice the usual price. If you want to liquidate excess raw materials for the best price as quickly as possible, find a friend whose island has a Hot Item of the Day that you can craft and which uses the appropriate raw materials.</span></li><li data-dcnode-id="1851"><span data-dcnode-id="1861" instrument_node=""> Thanks to having North and South Hemisphere settings, travelling to an island on the other side of the equator allows you to experience the opposite seasons' happenings, such as catching out-of-season critters to fill your Critterpedia quicker. With this, a Southern Hemisphere islander who bought the game on launch day could theoretically have completed their Critterpedia in </span><em data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">mid-July</span></em><span data-dcnode-id="1858" instrument_node=""> without either player time-travelling</span><span class="notelabel" data-dcnode-id="1855" onclick="togglenote('note29rage');" style="cursor: pointer;"><sup data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1853" id="note29rage" isnote="true" onclick="togglenote('note29rage');" style="display: none; cursor: pointer;"><span data-dcnode-id="1854" instrument_node="">Northern Hemisphere players who do not time travel must wait for snow season, as the Dung Beetle, only available during said season, does not spawn during multiplayer sessions.</span></span><span data-dcnode-id="1852" instrument_node="">.</span></li><li data-dcnode-id="1843"><span data-dcnode-id="1850" instrument_node=""> A good amount of Nook Shopping furniture has variations (e.g. red and blue diner chairs). Before version 2.0 which introduced Reese and Cyrus on Harv's Island, there was no way to convert a variation of a catalogue item into any other variation. Any island will only ever have one particular variation of Nook Shopping furniture available for sale, and the chances to get the other variations in single player are highly limited (and for "expensive" items, pretty much non-existent). Thus, before version 2.0, the primary way to unlock other variations was to obtain or catalog</span><span class="notelabel" data-dcnode-id="1847" onclick="togglenote('note30ry64');" style="cursor: pointer;"><sup data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1845" id="note30ry64" isnote="true" onclick="togglenote('note30ry64');" style="display: none; cursor: pointer;"><span data-dcnode-id="1846" instrument_node="">Picking up a desired item, then dropping it again. Since it was momentarily in the player's inventory, it is added to the player's Nook Shopping catalogue, allowing them to order more of it. Used when one player wishes to make the item available to another player, but to keep the item at the end of the day</span></span><span data-dcnode-id="1844" instrument_node=""> other variations from other players. Even after Reese and Cyrus were introduced, "catalog-ing" remains useful as the fastest way to unlock Nook Shopping items and their variations.</span></li><li data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node=""> If you visit another person's island, you too can go find the villager who is crafting or cooking and obtain the DIY or cooking recipe that they are giving out. This also applies to Celeste appearances, which is the only way to speed up collecting the star fragment DIY recipes. Also, most chances to acquire DIY or cooking recipes have the possibility of giving the player a recipe that they already know, whose only use is to be sent to someone else who doesn't have it.</span></li><li data-dcnode-id="1830"><span data-dcnode-id="1840" instrument_node=""> Non-native fruit that are not coconuts sell for 500 bells, 5x the price of native fruit and twice the price of coconuts. If you sell your native fruit on an island with a different native fruit, you can get the full 500 bells for them. Even better, having a friend gift you a good amount of non-native fruit is a great way to start an orchard and generate a steady stream of Bells. More importantly, two out of the six types of fruits are </span><em data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">impossible</span></em><span data-dcnode-id="1837" instrument_node=""> to obtain solo</span><span class="notelabel" data-dcnode-id="1834" onclick="togglenote('note310rdt');" style="cursor: pointer;"><sup data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1832" id="note310rdt" isnote="true" onclick="togglenote('note310rdt');" style="display: none; cursor: pointer;"><span data-dcnode-id="1833" instrument_node="">Your island has one native fruit, "Mom" sends you a second type in a letter, Mystery Islands have coconut trees; one possible Mystery Island has trees bearing a fourth type of fruit, commonly known as the "sister fruit", which is also the only fruit that villagers will ever gift to you</span></span><span data-dcnode-id="1831" instrument_node="">, so you need someone to send them to you if you want them.</span></li><li data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node=""> Flowers must be watered to breed, but the base chance, whether the flower is watered by a resident player, rain or a helpful villager (or any combination of the above), is only 5%. However, if a non-resident player waters a flower, there is a 15% bonus chance that the flower will propagate. This bonus can stack up to 5 times with 5 different visiting players watering your plants, for a base chance of propagation of 80%!</span></li><li data-dcnode-id="1823"><span data-dcnode-id="1827" instrument_node=""> Played straight by the Fishing Tourney, but zig-zagged </span><em data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">hard</span></em><span data-dcnode-id="1824" instrument_node=""> by the Bug-Off. While participating in either event with other players, the entry fee is waived and further bonus points are added to each player's point gains based on the whole group's total catches. However, the key difference is that fish bait exists, but not bug bait. Hence, in a Fishing Tourney, multiple players can throw in copious amounts of fish bait and rack up multiples of what a single player would have been able to catch, while maintaining the profit per player when they sell their individual catches. However, in a Bug-Off, the party will always be limited by the game's spawn rate for bugs. To make things worse, bugs (especially rare bugs) seem to spawn less often in multiplayer, hampering the party's point gains and individual profits from selling the bugs.</span></li><li data-dcnode-id="1812"><span data-dcnode-id="1822" instrument_node=""> Zig-zagged with inviting villagers. A player with an empty plot can go to another player's island and invite a villager who is about to move out ("in boxes") to live on their island. However, playing online also exposes the player to the "void villager" system: playing online with another player can result in the first player silently and unavoidably picking up the data of a "void villager" who has moved out of the other player's island without being adopted. If the first player subsequently has an empty plot (either by placing one or having a villager leave) and fails to invite a new villager of their choice within </span><em data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">one day</span></em><span data-dcnode-id="1819" instrument_node="">, a "void villager" is guaranteed to </span><em data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">forcibly</span></em><span data-dcnode-id="1816" instrument_node=""> move in and become a resident, depriving the player of their chance to invite a villager of their choice - all in a game where evicting villagers on demand is </span><em data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">impossible</span></em><span data-dcnode-id="1813" instrument_node=""> unless you have an amiibo. Worst of all, considering the plethora of villager adoption groups and forums, said "void villager" is often a generally undesirable one who no one wanted to adopt, or a villager whose house is a complete mess because of indiscriminate gifting by the previous player.</span></li></ul></li><li data-dcnode-id="1794"><span data-dcnode-id="1809" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SomewhereAnEntomologistIsCrying" title="/pmwiki/pmwiki.php/Main/SomewhereAnEntomologistIsCrying"><span data-dcnode-id="1808" instrument_node="">Somewhere, an Entomologist Is Crying</span></a><span data-dcnode-id="1806" instrument_node="">: Just like previous iterations of </span><em data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Animal Crossing</span></em><span data-dcnode-id="1803" instrument_node="">, what is called the "Emperor Butterfly" in the English translations is actually the </span><a class="urllink" data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morpho_menelaus"><span data-dcnode-id="1802" instrument_node="">Blue Morpho</span><img data-dcnode-id="1801" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1799" instrument_node=""> and not the </span><a class="urllink" data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apatura_iris"><span data-dcnode-id="1798" instrument_node="">Purple Emperor</span><img data-dcnode-id="1797" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1795" instrument_node=""> (the latter of which actually has its own separate entry in this game). The long-standing translation error for the wasps (called "bees" in previous games) has been corrected, though.</span></li><li data-dcnode-id="1789"><span data-dcnode-id="1793" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoundCodedForYourConvenience" title="/pmwiki/pmwiki.php/Main/SoundCodedForYourConvenience"><span data-dcnode-id="1792" instrument_node="">Sound-Coded for Your Convenience</span></a><span data-dcnode-id="1790" instrument_node="">: Various items have a sound to indicate when they’re nearby. For example, the player will be able to hear balloons blowing in the wind when they’re nearby.</span></li><li data-dcnode-id="1784"><span data-dcnode-id="1788" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoundtrackDissonance" title="/pmwiki/pmwiki.php/Main/SoundtrackDissonance"><span data-dcnode-id="1787" instrument_node="">Soundtrack Dissonance</span></a><span data-dcnode-id="1785" instrument_node="">: The mystery tour islands have a very calming theme that plays even when you're on the dreaded "tarantulas only" and "scorpions only" islands.</span></li><li data-dcnode-id="1770"><span data-dcnode-id="1783" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpookyPainting" title="/pmwiki/pmwiki.php/Main/SpookyPainting"><span data-dcnode-id="1782" instrument_node="">Spooky Painting</span></a><span data-dcnode-id="1780" instrument_node="">: Some of the artwork that Redd sells you is not only fake, but also apparently </span><em data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">haunted</span></em><span data-dcnode-id="1777" instrument_node="">, and can change appearance depending on the time of day. For example, one version of the </span><em data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Girl with a Pearl Earring</span></em><span data-dcnode-id="1774" instrument_node=""> painting will actually </span><a class="twikilink" data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreepyChangingPainting" title="/pmwiki/pmwiki.php/Main/CreepyChangingPainting"><span data-dcnode-id="1773" instrument_node="">open and close her eyes</span></a><span data-dcnode-id="1771" instrument_node="">.</span></li><li data-dcnode-id="1765"><span data-dcnode-id="1769" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StopPokingMe" title="/pmwiki/pmwiki.php/Main/StopPokingMe"><span data-dcnode-id="1768" instrument_node="">Stop Poking Me!</span></a><span data-dcnode-id="1766" instrument_node="">: Villagers acknowledge when you’ve interacted with them multiple times, with some being more passive aggressive about the constant interactions than others. They also have unique dialogue for visiting them multiple times in their houses within a certain timespan. As well, talking to a villager 5 or more times in a row can cause them to become burnt out and not want to talk to you for a while until the scrambled thought bubble goes away.</span></li><li data-dcnode-id="1757"><span data-dcnode-id="1764" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StylisticSuck" title="/pmwiki/pmwiki.php/Main/StylisticSuck"><span data-dcnode-id="1763" instrument_node="">Stylistic Suck</span></a><span data-dcnode-id="1761" instrument_node="">: If you </span><a class="twikilink" data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FishingForSole" title="/pmwiki/pmwiki.php/Main/FishingForSole"><span data-dcnode-id="1760" instrument_node="">fish up enough garbage</span></a><span data-dcnode-id="1758" instrument_node="">, you'll unlock DIY recipes for filled garbage bags, and wallpaper and flooring for your house that resembles a landfill. The only reason you'd ever want to use these items— if not to sell them— is to intentionally make your house look like a dumpster. Similarly, there's a set of worn-out clothes (e.g. Torn pants, Shattered glasses) that make you look like you're a poor dumpster diver, and the Sloppy furniture set, which makes your house look unkempt.</span></li><li data-dcnode-id="1752"><span data-dcnode-id="1756" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuddenNameChange" title="/pmwiki/pmwiki.php/Main/SuddenNameChange"><span data-dcnode-id="1755" instrument_node="">Sudden Name Change</span></a><span data-dcnode-id="1753" instrument_node="">: The K.K. Slider song "Señor K.K." has been renamed to "K.K. Mariachi", a first for the series (discounting formatting changes, such as "K.K. Etude" versus "K.K. Étude").</span></li><li data-dcnode-id="1744"><span data-dcnode-id="1751" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperSwimmingSkills" title="/pmwiki/pmwiki.php/Main/SuperSwimmingSkills"><span data-dcnode-id="1750" instrument_node="">Super Swimming Skills</span></a><span data-dcnode-id="1748" instrument_node="">: Initially, players couldn't swim at all—with an </span><a class="twikilink" data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InvisibleWall" title="/pmwiki/pmwiki.php/Main/InvisibleWall"><span data-dcnode-id="1747" instrument_node="">Invisible Wall</span></a><span data-dcnode-id="1745" instrument_node=""> at the water's edge to enforce this—but the first summer update added wetsuits, which transform you into an unstoppable swimming machine. You can only stay underwater for a few seconds at a time, but can swim around at full speed forever without needing to rest.</span></li><li data-dcnode-id="1717"><span data-dcnode-id="1743" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SurpriseCreepy" title="/pmwiki/pmwiki.php/Main/SurpriseCreepy"><span data-dcnode-id="1742" instrument_node="">Surprise Creepy</span></a><span data-dcnode-id="1740" instrument_node="">:</span><ul data-dcnode-id="1718"><li data-dcnode-id="1732"><span data-dcnode-id="1739" instrument_node=""> The lazy villagers can have a line of dialogue like this.</span><div class="indent" data-dcnode-id="1733"><em data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Lazy Villager:</span></em><span data-dcnode-id="1736" instrument_node=""> The best tasting island is [insert player's island name]! Everything tastes good! [suddenly making a scary face] </span><em data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Everything.</span></em></div></li><li data-dcnode-id="1727"><span data-dcnode-id="1731" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpookyPainting" title="/pmwiki/pmwiki.php/Main/SpookyPainting"><span data-dcnode-id="1730" instrument_node="">haunted forged art</span></a><span data-dcnode-id="1728" instrument_node=""> can also be this if the player isn't expecting it.</span></li><li data-dcnode-id="1719"><span data-dcnode-id="1726" instrument_node=""> Sometimes, when a campsite visitor moves in, they'll talk to a random villager who the visitor will relay a message for:</span><div class="indent" data-dcnode-id="1720"><em data-dcnode-id="1721"><span data-dcnode-id="1725" instrument_node="">They said that were already considering moving out, on account of all the </span><a class="twikilink" data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MonsterClown" title="/pmwiki/pmwiki.php/Main/MonsterClown"><span data-dcnode-id="1724" instrument_node="">night clowns</span></a><span data-dcnode-id="1722" instrument_node="">.</span></em></div></li></ul></li><li data-dcnode-id="1706"><span data-dcnode-id="1716" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuspiciouslySimilarSubstitute" title="/pmwiki/pmwiki.php/Main/SuspiciouslySimilarSubstitute"><span data-dcnode-id="1715" instrument_node="">Suspiciously Similar Substitute</span></a><span data-dcnode-id="1713" instrument_node="">: Just like </span><a class="twikilink" data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossingNewLeaf" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossingNewLeaf"><span data-dcnode-id="1712" instrument_node="">Main Street</span></a><span data-dcnode-id="1710" instrument_node="">, Harv's plaza serves as a successor to the </span><a class="twikilink" data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossingCityFolk" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossingCityFolk"><span data-dcnode-id="1709" instrument_node="">City</span></a><span data-dcnode-id="1707" instrument_node="">, as a hub of various shops and characters.</span></li><li data-dcnode-id="1673"><span data-dcnode-id="1705" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuspiciouslySpecificDenial" title="/pmwiki/pmwiki.php/Main/SuspiciouslySpecificDenial"><span data-dcnode-id="1704" instrument_node="">Suspiciously Specific Denial</span></a><span data-dcnode-id="1702" instrument_node="">:</span><ul data-dcnode-id="1674"><li data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node=""> If a peppy villager sees you with a shovel, they get concerned about what you've dug up. Fortunately for you, they certainly haven't buried 73 pitfall traps around the island.</span></li><li data-dcnode-id="1675"><span data-dcnode-id="1699" instrument_node=""> When you first meet Zipper, the patron saint of Bunny Day, he makes sure to let you know he is </span><em data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">not</span></em><span data-dcnode-id="1696" instrument_node=""> a person wearing a rabbit costume. </span><a class="twikilink" data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="1695" instrument_node="">He has a zipper on his back,</span></a><span data-dcnode-id="1693" instrument_node=""> and will act noticeably irritated if you try talking to him from behind. When he finds out you've been making up your own DIY recipes for the eggs, he'll slip and grumble that maybe next year </span><em data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">you</span></em><span data-dcnode-id="1690" instrument_node=""> should be in the bunny costume.</span><span class="notelabel" data-dcnode-id="1687" onclick="togglenote('note32jvum');" style="cursor: pointer;"><sup data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1676" id="note32jvum" isnote="true" onclick="togglenote('note32jvum');" style="display: none; cursor: pointer;"><span data-dcnode-id="1686" instrument_node="">Could be a </span><a class="twikilink" data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityNod" title="/pmwiki/pmwiki.php/Main/ContinuityNod"><span data-dcnode-id="1685" instrument_node="">Continuity Nod</span></a><span data-dcnode-id="1683" instrument_node=""> to </span><em data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Pocket Camp</span></em><span data-dcnode-id="1680" instrument_node="">, where it </span><em data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">is</span></em><span data-dcnode-id="1677" instrument_node=""> possible to get a Zipper costume that the player can wear</span></span></li></ul></li></ul></div><div class="folderlabel" data-dcnode-id="1669" onclick="togglefolder('folder4');"><span data-dcnode-id="1670" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; T to Z&nbsp;</span></div><div class="folder" data-dcnode-id="1330" id="folder4" isfolder="true" style="display:block;"><ul data-dcnode-id="1331"><li data-dcnode-id="1660"><span data-dcnode-id="1668" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TemporaryOnlineContent" title="/pmwiki/pmwiki.php/Main/TemporaryOnlineContent"><span data-dcnode-id="1667" instrument_node="">Temporary Online Content</span></a><span data-dcnode-id="1665" instrument_node="">: Although this is more of an offline thing, the </span><a class="urllink" data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nookipedia.com/wiki/Nature_Day%23Animal_Crossing%3A_New_Horizons"><span data-dcnode-id="1664" instrument_node="">Nature Day</span><img data-dcnode-id="1663" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1661" instrument_node=""> event was previously an event that was added in version 1.2.0 that allowed the player to earn extra Nook Miles by participating in garden-related activities. As a similar Nook Shopping event has taken the spot of the Nature Day event, as of version 1.9.0, the standard Nature Day evnet is no longer accessible.</span></li><li data-dcnode-id="1655"><span data-dcnode-id="1659" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TerrainSculpting" title="/pmwiki/pmwiki.php/Main/TerrainSculpting"><span data-dcnode-id="1658" instrument_node="">Terrain Sculpting</span></a><span data-dcnode-id="1656" instrument_node="">: A new feature added to this installment is the ability to alter the landscape, such as covering up rivers or digging away cliffs, if you so choose. However, you are only allowed to do this after attracting K.K. Slider to the island and viewing the credits.</span></li><li data-dcnode-id="1650"><span data-dcnode-id="1654" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrademarkFavoriteFood" title="/pmwiki/pmwiki.php/Main/TrademarkFavoriteFood"><span data-dcnode-id="1653" instrument_node="">Trademark Favorite Food</span></a><span data-dcnode-id="1651" instrument_node="">: Every villager is coded to have a specific food and drink for their basic eating and drinking animations. For example, Biff will eat a lollipop and drink a can of soda. In addition, in the warmer seasons, villagers will occasionally drink the juices of your island's signature fruit and may bring it up in chats. When conversing with villagers on other islands, they will frequently ask if the player knows/has tried their island's native fruit.</span></li><li data-dcnode-id="1645"><span data-dcnode-id="1649" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Tradesnark" title="/pmwiki/pmwiki.php/Main/Tradesnark"><span data-dcnode-id="1648" instrument_node="">Tradesnark™</span></a><span data-dcnode-id="1646" instrument_node="">: The English version dubs the online password system Dodo Code™. (Most other languages omit the trademark symbol or simply call them passwords.)</span></li><li data-dcnode-id="1640"><span data-dcnode-id="1644" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TransformationNameAnnouncement" title="/pmwiki/pmwiki.php/Main/TransformationNameAnnouncement"><span data-dcnode-id="1643" instrument_node="">Transformation Name Announcement</span></a><span data-dcnode-id="1641" instrument_node="">: Using a wand to equip a saved outfit causes the player to say the name of the saved outfit.</span></li><li data-dcnode-id="1635"><span data-dcnode-id="1639" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TransformationTrinket" title="/pmwiki/pmwiki.php/Main/TransformationTrinket"><span data-dcnode-id="1638" instrument_node="">Transformation Trinket</span></a><span data-dcnode-id="1636" instrument_node="">: Wands allow you to save several different outfits and magically swap between them, without needing to rummage through a dresser.</span></li><li data-dcnode-id="1630"><span data-dcnode-id="1634" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrashOfTheTitans" title="/pmwiki/pmwiki.php/Main/TrashOfTheTitans"><span data-dcnode-id="1633" instrument_node="">Trash of the Titans</span></a><span data-dcnode-id="1631" instrument_node="">: Cranky villagers, when discussing the theory that objects have souls, will mention having stacks of paper plates nine feet tall in their garage, because their belief that objects have souls makes them feel bad about throwing things away.</span></li><li data-dcnode-id="1602"><span data-dcnode-id="1629" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnintentionallyUnwinnable" title="/pmwiki/pmwiki.php/Main/UnintentionallyUnwinnable"><span data-dcnode-id="1628"
