n></li><li data-dcnode-id="3559"><span data-dcnode-id="3576" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FurryConfusion" title="/pmwiki/pmwiki.php/Main/FurryConfusion"><span data-dcnode-id="3575" instrument_node="">Furry Confusion</span></a><span data-dcnode-id="3573" instrument_node="">:</span><ul data-dcnode-id="3560"><li data-dcnode-id="3566"><span data-dcnode-id="3572" instrument_node=""> Lampshaded when you fish up a frog (a possible "fish"); the dialogue box ponders if it's actually a frog villager.</span><div class="indent" data-dcnode-id="3567"><span data-dcnode-id="3571" instrument_node="">"</span><em data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">I caught a frog! Or it's a new neighbor... and I have some apologizing to do.</span></em><span data-dcnode-id="3568" instrument_node="">"</span></div></li><li data-dcnode-id="3561"><span data-dcnode-id="3565" instrument_node=""> Played straight with some other things, like the hamster cage and bird cage—both contain a live animal, and can be gifted to hamster or bird villagers. A section in the museum implies that there's some evolutionary source for these </span><a class="twikilink" data-dcnode-id="3563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HalfHumanHybrids" title="/pmwiki/pmwiki.php/Main/HalfHumanHybrids"><span data-dcnode-id="3564" instrument_node="">Half-Human Hybrids</span></a><span data-dcnode-id="3562" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3551"><span data-dcnode-id="3558" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FurryReminder" title="/pmwiki/pmwiki.php/Main/FurryReminder"><span data-dcnode-id="3557" instrument_node="">Furry Reminder</span></a><span data-dcnode-id="3555" instrument_node="">: In </span><em data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="3552" instrument_node="">, Sprinkle (a penguin) and Bianca (a tiger that looks like a snow leopard) both want cold-themed houses, while Savannah (a horse that looks like a zebra) wants an oasis-themed house.</span></li><li data-dcnode-id="3535"><span data-dcnode-id="3550" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameBreakingBug" title="/pmwiki/pmwiki.php/Main/GameBreakingBug"><span data-dcnode-id="3549" instrument_node="">Game-Breaking Bug</span></a><span data-dcnode-id="3547" instrument_node="">:</span><ul data-dcnode-id="3536"><li data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node=""> The Earth Day update reintroduced Redd and adds the Art Wing upgrade to the museum. However, you were required to donate the first art piece you get from Redd, which would always be genuine, in order to initiate the museum upgrade. Due to an oversight, the item was not inventory-locked and could be permanently lost by giving it away, selling it, or simply not buying it when Redd showed up, which would cause the game to be stuck in a strange state where the museum couldn't be renovated and Redd wouldn't visit the island ever again once he left. The workaround was to acquire a genuine work of art from someone else, to proceed with the museum renovation; this itself comes down to luck. As of the 2.0 update, the art wing of the museum is automatically unlocked, so it no longer relies on Redd's appearance.</span></li><li data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node=""> In local co-op (i.e. multiple players from the same town locally), if one player checks the ABD to claim their daily Nook Miles streak, other players' Nook Miles streaks will be reset if they haven't already been claimed. This bug has been in the game since launch, but has not yet been patched.</span></li><li data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node=""> Since the Earth Day update, attempting to use DIY cards and learn new recipes will, in rare cases, result in the game crashing.</span></li><li data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node=""> Prior to version 1.2.0, there were a pair of serious glitches that resulted in broken plots that were near-impossible to fix. The first concerned adopting villagers who were forced out from another island through inviting amiibo campers, where there was a risk that the plot would be permanently stuck in a "reserved for 's new home" state. That was fixed, but a second, more serious glitch emerged - adopting any villager from another player's island carried a risk that the player would be stuck with a plot whose house would be permanently stuck in the "villager has moved out" state. Version 1.2.0 fixed these glitches and automatically fixed any glitched plots.</span></li><li data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node=""> Version 2.0 had a glitch where redesigning villager homes while the airport gates were open could lead to save corruption. Nintendo released a patch within a few days to fix it.</span></li></ul></li><li data-dcnode-id="3530"><span data-dcnode-id="3534" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameGourmet" title="/pmwiki/pmwiki.php/Main/GameGourmet"><span data-dcnode-id="3533" instrument_node="">Game Gourmet</span></a><span data-dcnode-id="3531" instrument_node="">: From the Version 2 update onwards, you can cook a variety of food, using crops introduced in the update, fruit, fish, and more. Food can be consumed to gain stamina, or displayed like other furniture. You can also get snacks from Redd's raffle and to-go coffee from Brewster's.</span></li><li data-dcnode-id="3514"><span data-dcnode-id="3529" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation" title="/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation"><span data-dcnode-id="3528" instrument_node="">Gameplay and Story Segregation</span></a><span data-dcnode-id="3526" instrument_node="">:</span><ul data-dcnode-id="3515"><li data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node=""> Lazy villagers claim they have such an attachment to insects that they let them live on the floors of their homes. You won't see any if you take a look at their homes for yourself.</span></li><li data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node=""> Only one of each kind of insect, fish, and fossil can be donated to the museum, but some of the exhibits show multiples of the same species. Donating a single anchovy results in an entire school of anchovies appearing in the fish tank.</span></li><li data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node=""> After a Fishing Tournament or Bug Off concludes at 6 PM, villagers will comment afterwards that they managed to catch several different fish/bugs, despite the game never depicting them successfully doing so.</span></li><li data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node=""> Normal villagers may occasionally bring up that they saw a honeybee flying past, even during the seven months they're dormant and not accessible to the player (August to February in the Northern Hemisphere).</span></li><li data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node=""> On Halloween, wearing Jack's entire costume causes villagers to be spooked, believing you're the real Jack and causing them to give you candy only to see through the disguise immediately afterwards. Before and after the Halloween event begins and at any other time of the year, they will never be spooked and interacting with them results in normal interactions.</span></li></ul></li><li data-dcnode-id="3503"><span data-dcnode-id="3513" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenderNeutralWriting" title="/pmwiki/pmwiki.php/Main/GenderNeutralWriting"><span data-dcnode-id="3512" instrument_node="">Gender-Neutral Writing</span></a><span data-dcnode-id="3510" instrument_node="">: When not being referred to by name, player characters are always referred to in gender-neutral terms, including but not limited to the pronouns "they" and "them". The </span><a class="twikilink" data-dcnode-id="3508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterCustomization" title="/pmwiki/pmwiki.php/Main/CharacterCustomization"><span data-dcnode-id="3509" instrument_node="">Character Customization</span></a><span data-dcnode-id="3507" instrument_node=""> option that looks kinda like choosing a gender is a "style" or "aspect" outside of Japan, and can be changed at will just like the rest — though in some languages that require it, it does imply </span><em data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">grammatical</span></em><span data-dcnode-id="3504" instrument_node=""> gender. Villagers will also do this after you get a new neighbor to move in, likely because they've never met.</span></li><li data-dcnode-id="3484"><span data-dcnode-id="3502" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiveMeYourInventoryItem" title="/pmwiki/pmwiki.php/Main/GiveMeYourInventoryItem"><span data-dcnode-id="3501" instrument_node="">Give Me Your Inventory Item</span></a><span data-dcnode-id="3499" instrument_node="">:</span><ul data-dcnode-id="3485"><li data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node=""> At sufficiently high friendship levels, villagers may ask to buy or trade for a random furniture/clothing item from your inventory. You can always decline the offer, though.</span></li><li data-dcnode-id="3486"><span data-dcnode-id="3496" instrument_node=""> Once again, Pascal the otter appears and has a chance of asking for a scallop whenever you pull one from the ocean. In </span><em data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">New Horizons</span></em><span data-dcnode-id="3493" instrument_node="">, he trades them for mermaid-themed clothing/accessories and DIY recipes of furniture in the mermaid set, and can also give you pearls which are needed to craft those recipes and are rarely found in the ocean. Trading with him is almost always extremely worthwhile, since scallops have no other purpose besides a one-time museum donation and, afterward, as </span><a class="twikilink" data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VendorTrash" title="/pmwiki/pmwiki.php/Main/VendorTrash"><span data-dcnode-id="3492" instrument_node="">Vendor Trash</span></a><span data-dcnode-id="3490" instrument_node=""> and one of the ingredients needed for one of Franklin's recipes on Turkey Day, which only happens once a year. Unfortunately, Pascal only appears when you </span><em data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">catch</span></em><span data-dcnode-id="3487" instrument_node=""> a scallop, and won't take more than one per day, so there's no use in stockpiling them for trading purposes.</span></li></ul></li><li data-dcnode-id="3466"><span data-dcnode-id="3483" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GlobalCurrencyException" title="/pmwiki/pmwiki.php/Main/GlobalCurrencyException"><span data-dcnode-id="3482" instrument_node="">Global Currency Exception</span></a><span data-dcnode-id="3480" instrument_node="">:</span><ul data-dcnode-id="3467"><li data-dcnode-id="3475"><span data-dcnode-id="3479" instrument_node=""> Replacing MEOW Coupons from </span><em data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">New Leaf</span></em><span data-dcnode-id="3476" instrument_node=""> is Nook Miles, points earned from the achievement system and daily tasks. Nook Miles can be redeemed at the Resident Services terminal for general upgrades, DIY recipes, exclusive outdoor furniture, and Nook Inc.-brand items. They're also used as payment for Rescue Services and Dodo Airlines (for buying new tools on a mystery island).</span></li><li data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node=""> Cyrus sells items from the wedding set during the month of June, but he only accepts payment in Heart Crystals. Reese gives the player a bunch of Heart Crystals every time they complete a photoshoot for Cyrus and her during Wedding Season.</span></li><li data-dcnode-id="3468"><span data-dcnode-id="3472" instrument_node=""> </span><em data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="3469" instrument_node=""> introduces Poki, which is used to purchase items from the archipelago's gift shop and through Wardell's unlockable ordering service. Bells cannot be used to purchase items in the gift shop, nor can Poki be used to buy items on the main island that cost bells. That said, you can eventually unlock a special ABD that allows you to exchange Poki for Bells and vice versa, although the exchange rate fluctates daily.</span></li></ul></li><li data-dcnode-id="3457"><span data-dcnode-id="3465" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoshDangItToHeck" title="/pmwiki/pmwiki.php/Main/GoshDangItToHeck"><span data-dcnode-id="3464" instrument_node="">Gosh Dang It to Heck!</span></a><span data-dcnode-id="3462" instrument_node="">: Blathers describe the scientific name of the vampire squid succinctly.</span><div class="indent" data-dcnode-id="3458"><strong data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">Blathers:</span></strong><span data-dcnode-id="3459" instrument_node=""> That means "vampire squid from heck", you see.</span></div></li><li data-dcnode-id="3447"><span data-dcnode-id="3456" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GottaCatchThemAll" title="/pmwiki/pmwiki.php/Main/GottaCatchThemAll"><span data-dcnode-id="3455" instrument_node="">Gotta Catch Them All</span></a><span data-dcnode-id="3453" instrument_node="">:</span><ul data-dcnode-id="3448"><li data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node=""> The museum has whole wings for bugs, fish, fossils, and art pieces, waiting to be filled with your donations. You can also check the in-game "Critterpedia" to see your progress on the first two.</span></li><li data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node=""> DIY recipes can be learned from villagers or found on balloons or in bottles on the shore. Some recipes are seasonal, with their materials and the recipes themselves only appearing at certain times of the year.</span></li></ul></li><li data-dcnode-id="3439"><span data-dcnode-id="3446" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrandfatherClause" title="/pmwiki/pmwiki.php/Main/GrandfatherClause"><span data-dcnode-id="3445" instrument_node="">Grandfather Clause</span></a><span data-dcnode-id="3443" instrument_node="">: Though this game marks the introduction of live instrumentation to the </span><em data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">Animal Crossing</span></em><span data-dcnode-id="3440" instrument_node=""> series, the K.K. Slider songs and airchecks still use the same sequenced instruments as previous games to maintain consistency.</span></li><li data-dcnode-id="3423"><span data-dcnode-id="3438" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrowsOnTrees" title="/pmwiki/pmwiki.php/Main/GrowsOnTrees"><span data-dcnode-id="3437" instrument_node="">Grows on Trees</span></a><span data-dcnode-id="3435" instrument_node="">: Returning from the first game is the daily "golden spot", which can be dug up to receive a bag of 1,000 bells. Burying the bag in the same spot (or even more from your personal funds) results in a bell tree, which eventually bears three bell bags each worth the same amount you buried</span><span class="notelabel" data-dcnode-id="3432" onclick="togglenote('note15avwx');" style="cursor: pointer;"><sup data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3430" id="note15avwx" isnote="true" onclick="togglenote('note15avwx');" style="display: none; cursor: pointer;"><span data-dcnode-id="3431" instrument_node="">but if you bury more than 30,000, it has a chance to produce either the same amount you buried or only 30,000 (10,000 X 3 "fruits"); because of this, 30,000 is the most prudent option with no actual potential loss, but 99,000 is much more profitable if you're willing to gamble</span></span><span data-dcnode-id="3429" instrument_node="">. It only works once; harvesting the bells turns it into a regular hardwood tree again.</span><span class="notelabel" data-dcnode-id="3426" onclick="togglenote('note162rq6');" style="cursor: pointer;"><sup data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3424" id="note162rq6" isnote="true" onclick="togglenote('note162rq6');" style="display: none; cursor: pointer;"><span data-dcnode-id="3425" instrument_node="">Datamining revealed how the resulting money tree works; burying a 1,000 or 10,000 bell bag guarantees a tree with 3 1,000/10,000 bell bags. Burying bells in the range of 2,000-9,000 has a 30% chance of giving you 3 times your investment back, and a 70% chance of 3 1,000 bell "fruits". Similarly, burying 11,000-99,000 bells has a 70% chance of only returing 30000 bells, and a 30% chance of tripling your investment. Statisically, the most reliable method for consistent returns is to always bury 10,000 bells, as you will always make 20,000 profit.</span></span></li><li data-dcnode-id="3374"><span data-dcnode-id="3422" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="3421" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="3419" instrument_node="">: </span><ul data-dcnode-id="3375"><li data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node=""> One Nook Miles reward, "Netting Better!", has a description saying that you need to catch five wasps in a row to achieve it. It doesn't mention that this has to be done in one day; catching five wasps across a few days without getting stung doesn't activate it.</span></li><li data-dcnode-id="3399"><span data-dcnode-id="3415" instrument_node=""> Breeding flowers </span><a class="urllink" data-dcnode-id="3412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.imgur.com/HiKy3Mp.jpg"><span data-dcnode-id="3414" instrument_node="">isn't as easy as it sounds</span><img data-dcnode-id="3413" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">◊</span></small><span data-dcnode-id="3409" instrument_node="">, especially when compared to the older titles; this one has an impressively complex genetics system based on real-world </span><a class="urllink" data-dcnode-id="3406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mendelian_inheritance"><span data-dcnode-id="3408" instrument_node="">Mendelian inheritance</span><img data-dcnode-id="3407" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3405" instrument_node="">, and nothing in-game implies that two seemingly identical plants can have hidden variations that affect breeding results. Unless you're an expert at genetics, you'd better off looking for a guide than simply mixing colors, as now there's some other factors to propagate hybrids. The game also doesn't tell you that watering by visiting players increases the probability of flowers spawning.</span><span class="notelabel" data-dcnode-id="3402" onclick="togglenote('note17968n');" style="cursor: pointer;"><sup data-dcnode-id="3403"><span data-dcnode-id="3404" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3400" id="note17968n" isnote="true" onclick="togglenote('note17968n');" style="display: none; cursor: pointer;"><span data-dcnode-id="3401" instrument_node="">The base rate is 5%; every unique visiting player who waters the flower in the day increases this by 15% each, to a cap of 5 stacks per flower per day, at which point the flower will have gold sparkles.</span></span></li><li data-dcnode-id="3391"><span data-dcnode-id="3398" instrument_node=""> The Critterpedia gives detailed information about which months of the year and hours of the day every bug and fish is available... but only </span><em data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">after</span></em><span data-dcnode-id="3395" instrument_node=""> you catch each one. This can cause a </span><a class="twikilink" data-dcnode-id="3393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LastLousyPoint" title="/pmwiki/pmwiki.php/Main/LastLousyPoint"><span data-dcnode-id="3394" instrument_node="">Last Lousy Point</span></a><span data-dcnode-id="3392" instrument_node=""> scenario if you're looking for a critter that only spawns in certain situations, such as flies and ants only appearing on rotted turnips, or coelacanths only being found when it rains.</span></li><li data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node=""> The criteria for earning plaques and trophies from the Happy Home Academy are pretty opaque, since there's no NPC to explain them in this game; you just get a letter each week telling you your score.</span></li><li data-dcnode-id="3381"><span data-dcnode-id="3388" instrument_node=""> Villagers have thought bubbles for a variety of reasons, including a particularly important one - asking the player whether they should leave. However, unless you learn about the hidden move-out cooldown and the one unique characteristic of the moving-out thought bubble </span><span class="notelabel" data-dcnode-id="3385" onclick="togglenote('note18t98x');" style="cursor: pointer;"><sup data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3383" id="note18t98x" isnote="true" onclick="togglenote('note18t98x');" style="display: none; cursor: pointer;"><span data-dcnode-id="3384" instrument_node="">the moving out thought bubble doesn't disappear after you enter and exit a building</span></span><span data-dcnode-id="3382" instrument_node="">, you can't tell whether a villager's conversation will be about moving out or a completely unrelated subject until you talk to them.</span></li><li data-dcnode-id="3376"><span data-dcnode-id="3380" instrument_node=""> There's a Nook Miles achievement that involves planting all six types of fruits. The game never tells you that there is </span><em data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">no way</span></em><span data-dcnode-id="3377" instrument_node=""> to obtain two of the six fruits without another player giving them to you.</span></li></ul></li></ul></div><div class="folderlabel" data-dcnode-id="3370" onclick="togglefolder('folder2');"><span data-dcnode-id="3371" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; H to M&nbsp;</span></div><div class="folder" data-dcnode-id="2774" id="folder2" isfolder="true" style="display:block;"><ul data-dcnode-id="2775"><li data-dcnode-id="3365"><span data-dcnode-id="3369" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HalloweenEpisode" title="/pmwiki/pmwiki.php/Main/HalloweenEpisode"><span data-dcnode-id="3368" instrument_node="">Halloween Episode</span></a><span data-dcnode-id="3366" instrument_node="">: You can buy pumpkins and candy during the month of October to prepare for Halloween. Timmy and Tommy, Orville, Mabel, Isabelle, and Tom all wear costume accessories during the last few days of October. The special Halloween event occurs from 5 PM to midnight on October 31st. Your villagers dress up and approach you to trick-or-treat. Give them candy, they'll reward you; refuse to give them candy, they'll splatter decals on your face and make your skin white, green, blue, or purple.. You can also learn two special reactions ("Scare" and "Haunt") and help out a pumpkin-headed character named Jack.</span></li><li data-dcnode-id="3360"><span data-dcnode-id="3364" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hammerspace" title="/pmwiki/pmwiki.php/Main/Hammerspace"><span data-dcnode-id="3363" instrument_node="">Hammerspace</span></a><span data-dcnode-id="3361" instrument_node="">: The game brings back the standard applications pertaining to how characters stash items on their person, but the game also uses it for the drummoid's visual gag. It's a gyroid with a metal cap and skirt that look like cymbals, so for it to play them, it collapses its body into some unknown void so the cymbal on top and bottom meet and make a sound.</span></li><li data-dcnode-id="3355"><span data-dcnode-id="3359" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HawaiianShirtedTourist" title="/pmwiki/pmwiki.php/Main/HawaiianShirtedTourist"><span data-dcnode-id="3358" instrument_node="">Hawaiian-Shirted Tourist</span></a><span data-dcnode-id="3356" instrument_node="">: You can become one by buying Tom Nook's trademark "Aloha Shirt" from the Nook Stop (or two different colored variants). There are other shirts that fit the bill (that can be bought from the Able Sisters), such as the Bold Aloha Shirt and the Pineapple Aloha Shirt.</span></li><li data-dcnode-id="3350"><span data-dcnode-id="3354" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HealingHerb" title="/pmwiki/pmwiki.php/Main/HealingHerb"><span data-dcnode-id="3353" instrument_node="">Healing Herb</span></a><span data-dcnode-id="3351" instrument_node="">: You can now make medicine yourself using a wasp nest and 3 clumps of weeds.</span></li><li data-dcnode-id="3342"><span data-dcnode-id="3349" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeKnowsAboutTimedHits" title="/pmwiki/pmwiki.php/Main/HeKnowsAboutTimedHits"><span data-dcnode-id="3348" instrument_node="">He Knows About Timed Hits</span></a><span data-dcnode-id="3346" instrument_node="">: In a cross between this and </span><a class="twikilink" data-dcnode-id="3344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall" title="/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall"><span data-dcnode-id="3345" instrument_node="">Leaning on the Fourth Wall</span></a><span data-dcnode-id="3343" instrument_node="">, at the end of any island ceremony Tom Nook says "anyone wishing to take a commemorative photo should get ready to press [O]," the Switch screenshot/video button. Harvey's tutorial for his photo studio has him directly tell you which buttons to press.</span></li><li data-dcnode-id="3337"><span data-dcnode-id="3341" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HelloInsertNameHere" title="/pmwiki/pmwiki.php/Main/HelloInsertNameHere"><span data-dcnode-id="3340" instrument_node="">Hello, [Insert Name Here]</span></a><span data-dcnode-id="3338" instrument_node="">: The name and birthday you enter in the intro magically appears on Timmy and Tommy's roster of islanders. A bit later, they let you and the other starter villagers offer ideas for the island's name; they always vote unanimously for your suggestion.</span></li><li data-dcnode-id="3321"><span data-dcnode-id="3336" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HintDropping" title="/pmwiki/pmwiki.php/Main/HintDropping"><span data-dcnode-id="3335" instrument_node="">Hint Dropping</span></a><span data-dcnode-id="3333" instrument_node="">:</span><ul data-dcnode-id="3322"><li data-dcnode-id="3325"><span data-dcnode-id="3332" instrument_node=""> Every time you pay off the mortgage to your home, Tom Nook (sometimes complete with a devious sideways glance) will not-so subtly suggest that your home </span><em data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">could</span></em><span data-dcnode-id="3329" instrument_node=""> be better before (</span><a class="twikilink" data-dcnode-id="3327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadLiar" title="/pmwiki/pmwiki.php/Main/BadLiar"><span data-dcnode-id="3328" instrument_node="">badly</span></a><span data-dcnode-id="3326" instrument_node="">) trying to play it off as just him thinking out loud... and then again following up this by telling the player to talk to him if they're interested in what he's thinking.</span></li><li data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node=""> amiibo campers will often do this after the second time that you invite them and complete their crafting request, hinting that you should invite them to the campsite one more time. That next time, completing their crafting request will give you the opportunity to have them stay on your island.</span></li></ul></li><li data-dcnode-id="3309"><span data-dcnode-id="3320" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HoldTheUnsolicitedIngredient" title="/pmwiki/pmwiki.php/Main/HoldTheUnsolicitedIngredient"><span data-dcnode-id="3319" instrument_node="">Hold the Unsolicited Ingredient</span></a><span data-dcnode-id="3317" instrument_node="">:</span><ul data-dcnode-id="3310"><li data-dcnode-id="3313"><span data-dcnode-id="3316" instrument_node=""> Upon catching an anchovy, your player character will quip:</span><div class="indent" data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">"Stay away from my pizza!"</span></div></li><li data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node=""> Downplayed upon catching a sea pineapple. Your villager says "Your move, sea pizzas" in reference to the pineapple on pizza debate, but they don't take any side in it.</span></li></ul></li><li data-dcnode-id="3287"><span data-dcnode-id="3308" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HoldYourHippogriffs" title="/pmwiki/pmwiki.php/Main/HoldYourHippogriffs"><span data-dcnode-id="3307" instrument_node="">Hold Your Hippogriffs</span></a><span data-dcnode-id="3305" instrument_node="">:</span><ul data-dcnode-id="3288"><li data-dcnode-id="3297"><span data-dcnode-id="3304" instrument_node=""> A literal example; instead of "hold your horses," the hedgehogs at Able Sisters say "confine your spines," as in "Sis, confine your spines— we're not even open yet!" As you get Sable to open up to you more, Mable will mention they've been "working like hedgehogs"</span><span class="notelabel" data-dcnode-id="3301" onclick="togglenote('note19ij0s');" style="cursor: pointer;"><sup data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3299" id="note19ij0s" isnote="true" onclick="togglenote('note19ij0s');" style="display: none; cursor: pointer;"><span data-dcnode-id="3300" instrument_node="">working like dogs</span></span><span data-dcnode-id="3298" instrument_node=""> to be successful after Label went off to become a famous designer.</span></li><li data-dcnode-id="3289"><span data-dcnode-id="3296" instrument_node=""> Orville's use of "whisker" in place of "whiskey" in his use of the NATO </span><a class="twikilink" data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MilitaryAlphabet" title="/pmwiki/pmwiki.php/Main/MilitaryAlphabet"><span data-dcnode-id="3295" instrument_node="">Military Alphabet</span></a><span data-dcnode-id="3293" instrument_node=""> standard may be an instance of this, combined with possible </span><a class="twikilink" data-dcnode-id="3291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Bowdlerization" title="/pmwiki/pmwiki.php/Main/Bowdlerization"><span data-dcnode-id="3292" instrument_node="">Bowdlerization</span></a><span data-dcnode-id="3290" instrument_node=""> on account of whiskey not exactly being family-friendly.</span></li></ul></li><li data-dcnode-id="3279"><span data-dcnode-id="3286" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImpossibleTheft" title="/pmwiki/pmwiki.php/Main/ImpossibleTheft"><span data-dcnode-id="3285" instrument_node="">Impossible Theft</span></a><span data-dcnode-id="3283" instrument_node="">: An inversion. During his concerts, K.K. Slider somehow manages to slip a copy of his music into everyone's pockets </span><em data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">while he was playing it right in front of everyone</span></em><span data-dcnode-id="3280" instrument_node="">. The most likely explanation is that he passed it into the audience's pockets during the fade to black after a performance, but even then it'd have to happen at ludicrous speed.</span></li><li data-dcnode-id="3269"><span data-dcnode-id="3278" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InexplicableTreasureChests" title="/pmwiki/pmwiki.php/Main/InexplicableTreasureChests"><span data-dcnode-id="3277" instrument_node="">Inexplicable Treasure Chests</span></a><span data-dcnode-id="3275" instrument_node="">:</span><ul data-dcnode-id="3270"><li data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node=""> Any fish or bugs you catch come with a free tank or terrarium, seen when you place them outside or in your home storage. (The snapping turtle, perhaps because they couldn't decide whether it counts as aquatic, has no enclosure... don't walk too close to it.)</span></li><li data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node=""> As in previous games, presents dangling from balloons periodically drift over your island, delivering random items or recipes to anyone who shoots them down. The achievement for balloon-sniping even says that no one knows where they come from.</span></li></ul></li><li data-dcnode-id="3264"><span data-dcnode-id="3268" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InfinityMinusOneSword" title="/pmwiki/pmwiki.php/Main/InfinityMinusOneSword"><span data-dcnode-id="3267" instrument_node="">Infinity -1 Sword</span></a><span data-dcnode-id="3265" instrument_node="">: Iron tools aren't as fancy or durable as golden tools, but the iron recipes are much easier to come by (golden tool recipes are earned with significant milestones, like shooting down 300 balloons) and use common materials (you'll likely harvest multiple iron nuggets a day while gold nuggets are much more rare). On top of that, even the golden tools break—you can cheaply craft a new iron tool or reset its durability with customization, which doesn't apply to golden tools.</span></li><li data-dcnode-id="3259"><span data-dcnode-id="3263" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InstantCostumeChange" title="/pmwiki/pmwiki.php/Main/InstantCostumeChange"><span data-dcnode-id="3262" instrument_node="">Instant Costume Change</span></a><span data-dcnode-id="3260" instrument_node="">: Wands are a new addition to the game that allow the player to instantly magic up one of eight outfits they've set up over their current one. These clothes don't actually replace the ones you're currently wearing though, and the effects can be dispelled at any time. The price of this luxury is that every wand recipe requires Star Fragments, a rare resource that will only wash up on the beach the morning after you wish on a shooting star. Even then, the conversion rate isn't 1:1, as the chances of getting a Star Fragment (or the even rarer Large Star Fragments and Zodiac Fragments) are relatively low even with a successful wish. Each outfit also "uses up" the clothing that go into it, meaning anything that isn't a custom design will not be usable as clothing until it's removed from the outfit.</span></li><li data-dcnode-id="3251"><span data-dcnode-id="3258" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InsurmountableWaistHeightFence" title="/pmwiki/pmwiki.php/Main/InsurmountableWaistHeightFence"><span data-dcnode-id="3257" instrument_node="">Insurmountable Waist-Height Fence</span></a><span data-dcnode-id="3255" instrument_node="">: You cannot climb head-height ledges without the ladder, no matter what other climbable objects you may possess, and you cannot cross water without the vaulting pole, even if it appears shallow enough to wade through. Zig-zagged with water, though, as if a river or pond is </span><em data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">narrow</span></em><span data-dcnode-id="3252" instrument_node=""> enough (two spaces or less) you can get across without switching tools just by hopping from one bank to the other.</span></li><li data-dcnode-id="3234"><span data-dcnode-id="3250" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Irony" title="/pmwiki/pmwiki.php/Main/Irony"><span data-dcnode-id="3249" instrument_node="">Irony</span></a><span data-dcnode-id="3247" instrument_node="">:</span><ul data-dcnode-id="3235"><li data-dcnode-id="3242"><span data-dcnode-id="3246" instrument_node=""> The airport is run by and named after dodo birds, which cannot fly (without a plane). They </span><a class="twikilink" data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="3245" instrument_node="">point this out</span></a><span data-dcnode-id="3243" instrument_node=""> in their introduction, saying that just because they're flightless doesn't mean their customers should be.</span></li><li data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node=""> While patrolling your island at night, you may encounter Wisp, a ghost who is inexplicably afraid of ghosts, and mistakes you for one at first. In fact, he is one of the anonymous NPCs who can provide feedback on the island, with his review positively noting that the lack of other ghosts is ideal for him.</span></li><li data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node=""> Many Lazy villagers have the "Play" hobby which in part is a villager being more likely to run around the island pretending to be an airplane, something that involves being active. On top of that, three Lazy villagers have the "Fitness" hobby.</span></li><li data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node=""> Trash cans and other furniture that can be used to dispose of items will lower your Environment Score. But trash bags will raise them instead.</span></li></ul></li><li data-dcnode-id="3220"><span data-dcnode-id="3233" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IslandOfMystery" title="/pmwiki/pmwiki.php/Main/IslandOfMystery"><span data-dcnode-id="3232" instrument_node="">Island of Mystery</span></a><span data-dcnode-id="3230" instrument_node="">:</span><ul data-dcnode-id="3221"><li data-dcnode-id="3224"><span data-dcnode-id="3229" instrument_node=""> By showing off a Nook Miles Ticket, Orville will give the player a choice in participating in the aptly-named Mystery Tour. The player is taken to a randomly-generated island rich in resources for them to take. Some islands are specifically themed as well, like a bamboo island, an island filled with hybrid flowers (later removed)an island that only has dangerous bugs, or an island that has big fish shadows. </span><a class="urllink" data-dcnode-id="3226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//wuffs.org/acnh/mysterytour.html"><span data-dcnode-id="3228" instrument_node="">Here is a complete list</span><img data-dcnode-id="3227" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3225" instrument_node="">.</span></li><li data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node=""> Kapp’n will take you to mystery islands by boat after the 2.0 update. These are different than the Nook Miles Ticket ones and can have different seasons, various crops, acorns and maple leaves, shooting stars and shards from hitting rocks, and glowing moss and vines. Each trip costs 1,000 Nook Miles and you can only go once a day. Most islands have gyroid fragments and recipe bottles too.</span></li></ul></li><li data-dcnode-id="3212"><span data-dcnode-id="3219" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItemCrafting" title="/pmwiki/pmwiki.php/Main/ItemCrafting"><span data-dcnode-id="3218" instrument_node="">Item Crafting</span></a><span data-dcnode-id="3216" instrument_node="">: You can gather wood, stone, and other resources to craft new tools and furniture, much like in </span><em data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">Pocket Camp</span></em><span data-dcnode-id="3213" instrument_node="">.</span></li><li data-dcnode-id="3198"><span data-dcnode-id="3211" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItsUpToYou" title="/pmwiki/pmwiki.php/Main/ItsUpToYou"><span data-dcnode-id="3210" instrument_node="">It's Up to You</span></a><span data-dcnode-id="3208" instrument_node="">: Though you're officially only the "resident representative," you have to do the bulk of all resource-gathering and fund-raising. As in </span><em data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">New Leaf</span></em><span data-dcnode-id="3205" instrument_node="">, certain island improvements, once placed, require large sums of bells before construction begins. And just like in </span><em data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">New Leaf</span></em><span data-dcnode-id="3202" instrument_node="">, villagers may contribute, but this is rare and it will only ever be pocket change—in practice the player(s) will have to raise nearly all of the funds. Tom Nook </span><a class="twikilink" data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="3201" instrument_node="">lampshades</span></a><span data-dcnode-id="3199" instrument_node=""> this, muttering that if the player doesn't donate, the project will likely never finish.</span></li><li data-dcnode-id="3193"><span data-dcnode-id="3197" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustifiedTutorial" title="/pmwiki/pmwiki.php/Main/JustifiedTutorial"><span data-dcnode-id="3196" instrument_node="">Justified Tutorial</span></a><span data-dcnode-id="3194" instrument_node="">: Rather than putting the player to a relatively obscure yet functional village, they are instead dropped off on a deserted island. It is why certain services usually found at the start of older games in the series aren't immediately available, as it is up to the players to make the island livable.</span></li><li data-dcnode-id="3188"><span data-dcnode-id="3192" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarlMarxHatesYourGuts" title="/pmwiki/pmwiki.php/Main/KarlMarxHatesYourGuts"><span data-dcnode-id="3191" instrument_node="">Karl Marx Hates Your Guts</span></a><span data-dcnode-id="3189" instrument_node="">: Besides the standard problem of items being worth less when you sell them back, Nook's Cranny is only open from 8 AM to 10 PM; outside those hours, you can only sell items through their drop box. This imposes an additional 20% earnings cut due to "handling fees," and you don't get the money until the next day. On the other hand, the drop box doesn't make you go through a loading screen or excessive textboxes (until the Nooklings call you at the start of the next day).</span></li><li data-dcnode-id="3176"><span data-dcnode-id="3187" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LamePunReaction" title="/pmwiki/pmwiki.php/Main/LamePunReaction"><span data-dcnode-id="3186" instrument_node="">Lame Pun Reaction</span></a><span data-dcnode-id="3184" instrument_node="">: Your villager preempts this upon catching a walking stick.</span><div class="indent" data-dcnode-id="3177"><em data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">Check out its walking schtick!</span></em><span data-dcnode-id="3181" instrument_node=""> </span><br data-dcnode-id="3180"><em data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">Look, these are the jokes, OK?</span></em></div></li><li data-dcnode-id="3164"><span data-dcnode-id="3175" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LandSeaSky" title="/pmwiki/pmwiki.php/Main/LandSeaSky"><span data-dcnode-id="3174" instrument_node="">Land, Sea, Sky</span></a><span data-dcnode-id="3172" instrument_node="">:</span><ul data-dcnode-id="3165"><li data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node=""> On Bunny Day, eggs can be found in these three places. Leaf eggs are shaken from trees, wood eggs drop when cutting a tree, stone eggs can pop out of rocks, and earth eggs are dug from underground, all representing land; water eggs are fished from bodies of water, representing sea; and sky eggs regularly fly by on balloons, representing sky.</span></li><li data-dcnode-id="3166"><span data-dcnode-id="3169" instrument_node=""> The zebra turkeyfish invokes this description from your character:</span><div class="indent" data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node=""> "Land, air, water—make up your mind!"</span></div></li></ul></li><li data-dcnode-id="3159"><span data-dcnode-id="3163" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LargeHam" title="/pmwiki/pmwiki.php/Main/LargeHam"><span data-dcnode-id="3162" instrument_node="">Large Ham</span></a><span data-dcnode-id="3160" instrument_node="">: Smug and Peppy villagers, at times.</span></li><li data-dcnode-id="3154"><span data-dcnode-id="3158" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LastSecondWordSwap" title="/pmwiki/pmwiki.php/Main/LastSecondWordSwap"><span data-dcnode-id="3157" instrument_node="">Last-Second Word Swap</span></a><span data-dcnode-id="3155" instrument_node="">: During Bug Offs, when Flick asks if you want to sell the bugs in the bug cage, he proceeds to comment that "I'm happy to liberate-" before backing up with "-BUY them all from you" midway through "liberate".</span></li><li data-dcnode-id="3141"><span data-dcnode-id="3153" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheLastOfTheseIsNotLikeTheOthers" title="/pmwiki/pmwiki.php/Main/TheLastOfTheseIsNotLikeTheOthers"><span data-dcnode-id="3152" instrument_node="">The Last of These Is Not Like the Others</span></a><span data-dcnode-id="3150" instrument_node="">: Blathers' information when you ask him about a snapping turtle catch has two actual facts and one... personal anecdote.</span><div class="indent" data-dcnode-id="3142"><span data-dcnode-id="3149" instrument_node=""> "The snapping turtle is a large turtle known for its crocodile-like body and long claws. No, wait—it is better known for its ferocious bite, which it can deliver with shocking speed for a turtle. </span><em data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">NO, WAIT</span></em><span data-dcnode-id="3146" instrument_node="">—it is BEST known for </span><a class="twikilink" data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoodleIncident" title="/pmwiki/pmwiki.php/Main/NoodleIncident"><span data-dcnode-id="3145" instrument_node="">that time one chased me across a parking lot and I had to climb on top of a car</span></a><span data-dcnode-id="3143" instrument_node="">."</span></div></li><li data-dcnode-id="3073"><span data-dcnode-id="3140" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaterInstallmentWeirdness" title="/pmwiki/pmwiki.php/Main/LaterInstallmentWeirdness"><span data-dcnode-id="3139" instrument_node="">Later Installment Weirdness</span></a><span data-dcnode-id="3137" instrument_node="">:</span><ul data-dcnode-id="3074"><li data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node=""> Unlike previous titles, the game plops the player on an almost-barren island. Facilities that are already established in older games are missing or limited, requiring them to be established within the first few days. It will take a while (roughly a week) before it becomes a fully functional town on the scale of the starting towns of previous games; until then, players are slowly adjusted into the setting, like the brief tutorial phase from earlier games. This also means you won't get to hear hourly music until a week or so of gameplay.</span></li><li data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node=""> This game introduces crafting to the main series, and a lot of mechanics are altered to account for it; chopped trees release chopped wood, struck rocks release ore and clay, and even weeds can be used to craft certain objects. Tools that would normally be purchased or earned are now crafted instead, and can now break as as a result (in previous games, only the axe was breakable). Even the coveted golden tools aren't exempt from breaking though they have a much higher durability rate than normal craft-able tools.</span></li><li data-dcnode-id="3128"><span data-dcnode-id="3132" instrument_node=""> Name headers in dialogue boxes in earlier games were color-coded as so: blue for male villagers, pink for female villagers, and green for general NPCs like Tom Nook. </span><em data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">New Horizons</span></em><span data-dcnode-id="3129" instrument_node=""> changed this, so now name headers are now individually color-coded for each character.</span></li><li data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node=""> Also in regards to NPCs, Animalese is no longer tied exclusively to a character's gender or personality, but is instead uniquely tuned for each individual character based on their design (for instance, Maddie, a small dog villager, has a noticeably higher-pitched voice than Bianca, a larger tiger villager, despite both of them being peppy). In prior games, only Joan, Farley, Luna, and Lloid had unique voices for Animalese.</span></li><li data-dcnode-id="3121"><span data-dcnode-id="3125" instrument_node=""> Your first day on the island isn't tied down into the real world clock, unlike the first days in other </span><em data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Animal Crossing</span></em><span data-dcnode-id="3122" instrument_node=""> titles. Only after you get past the first day and go to bed will the game be synced to real world time.</span></li><li data-dcnode-id="3113"><span data-dcnode-id="3120" instrument_node=""> In prior games, K.K. Slider would regularly visit your town on Saturdays, and his musical performances are the only way to see the game's </span><a class="twikilink" data-dcnode-id="3118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClosingCredits" title="/pmwiki/pmwiki.php/Main/ClosingCredits"><span data-dcnode-id="3119" instrument_node="">Closing Credits</span></a><span data-dcnode-id="3117" instrument_node="">. In </span><em data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">New Horizons</span></em><span data-dcnode-id="3114" instrument_node="">, however, you need to develop your town to a point where K.K. becomes interested in visiting your island, so the credits only come after around two weeks of playtime.</span></li><li data-dcnode-id="3108"><span data-dcnode-id="3112" instrument_node=""> This game implements autosave, though it is still possible to manually save by quitting. As a result, Resetti's reset rants, which in </span><em data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">New Leaf</span></em><span data-dcnode-id="3109" instrument_node=""> were already downplayed and had to be opted into, are completely gone.</span></li><li data-dcnode-id="3103"><span data-dcnode-id="3107" instrument_node=""> At launch, many staple NPCs were completely absent from </span><em data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">New Horizons</span></em><span data-dcnode-id="3104" instrument_node="">, with their services being dropped or transferred to new characters (such as Wilbur and Orville fulfilling travel in place of Kapp'n and Porter, and Label replacing Gracie as a fashion analyst). Many of them were added to later updates.</span></li><li data-dcnode-id="3098"><span data-dcnode-id="3102" instrument_node=""> Emotions were gained through Dr. Shrunk in all other games, However in </span><em data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">New Horizons</span></em><span data-dcnode-id="3099" instrument_node="">, islanders will occasionally give them out instead, and they are now called "reactions".</span></li><li data-dcnode-id="3093"><span data-dcnode-id="3097" instrument_node=""> Wisp reverts back to his traits from the original </span><em data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">Animal Crossing</span></em><span data-dcnode-id="3094" instrument_node="">, where he wears a hitaikakushi instead of a turban (since his lamp isn't present), his sidequest is to catch five spirit pieces, and the reward can be an uncatalogued furniture, wallpaper, flooring or clothing.</span></li><li data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node=""> During the first year of release, the game's holiday events weren't in the game to start, but added via updates around the time of the holiday in the real world to dissuade people from setting the clock forward and obtaining unique holiday items out of time. Until the time matched in the real world, "time-traveling" players would find nothing different on days like October 31 (Halloween) or December 24 (Toy Day). Though they're permanently accessible once they're added, it still means you have to be up to the latest version to participate, so if you're for some reason unable to connect your Switch to the internet, you're out of luck.</span></li><li data-dcnode-id="3086"><span data-dcnode-id="3090" instrument_node=""> Mail has received a complete overhaul. Your mailbox can hold many more letters in it, but as a trade-off, your inventory no longer has a mail section, thus you can't carry any with you. Important letters can be marked as favorites for future reference, and catalog deliveries now don't come attached with letters but arrive directly as packages. There's no post office, so sending mail is handled through the Dodo Airlines office instead; since you can't carry them with you, they'll hold in-progress letters, so purchasing letter paper is gone as well. Finally, you can send letters over the internet to friends you've visited before (in </span><em data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">New Leaf</span></em><span data-dcnode-id="3087" instrument_node="">, you had to be at their town to do so, rather redundantly).</span></li><li data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node=""> Pitfall seeds are no longer found buried on the map each day and are instead obtained via crafting once the player learns the recipe.</span></li><li data-dcnode-id="3079"><span data-dcnode-id="3083" instrument_node=""> Due to the Nintendo Switch Online paid service, this marks the first </span><em data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">Animal Crossing</span></em><span data-dcnode-id="3080" instrument_node=""> game where you actually need to pay a subscription fee to be able to visit others online, and those living in regions without the service are only able to access local offline play.</span></li><li data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node=""> Furniture gyroids, introduced in the 2.0 update, have undergone several changes after consistent appearances in prior games. For one, they no longer just appear buried in the ground the day after precipitation in your town, but can also grow from gyroid fragments the player buries and waters in the ground. The gyroids are also all new varieties, including this game's Brewstoid, and have much more diverse appearances and body shapes since each can afford to have a unique character model now. They no longer come in different "families" with size variations, each adopting its own proportions within the height of "standard" gyroids in previous games, but they have color variations and they can be customized to them. This is the first game in which gyroids can be placed on top of furniture, and this game adds the wall display option, which places the gyroid on a small wall-mounted shelf. The game also lacks a cap for active gyroids within a room.</span></li><li data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node=""> Unlike earlier installments, your basement contributes to your home's Happy Home Academy score.</span></li></ul></li><li data-dcnode-id="3055"><span data-dcnode-id="3072" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall" title="/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall"><span data-dcnode-id="3071" instrument_node="">Leaning on the Fourth Wall</span></a><span data-dcnode-id="3069" instrument_node="">: A lazy villager can do this, which can come off as a little creepy considering </span><a class="twikilink" data-dcnode-id="3067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MediumAwareness" title="/pmwiki/pmwiki.php/Main/MediumAwareness"><span data-dcnode-id="3068" instrument_node="">he describes things that the players know but he as a character shouldn't notice</span></a><span data-dcnode-id="3066" instrument_node="">.</span><div class="indent" data-dcnode-id="3056"><strong data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">Lazy Villager:</span></strong><span data-dcnode-id="3063" instrument_node=""> There's a weird rumor goin' around... Some folks? They're saying none of this is real. None of it. They say the island is just a game. And everything we say? Or do? It's just to amuse somebody else! And...I dunno. I kinda maybe believe it? SO many things would make sense, ya know? Have ya ever thought fruit grows way too fast? And ain't it weird that trees all have three kinds of wood? And have ya ever noticed there's pretty music everywhere? It's great, but it's weird... And does Tom Nook make ANY kind of sense to you?! </span><a class="twikilink" data-dcnode-id="3061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SelfDeprecation" title="/pmwiki/pmwiki.php/Main/SelfDeprecation"><span data-dcnode-id="3062" instrument_node="">"Yeah, I'll buy your seashells so you can give me back my own money to pay off a house I'm selling to you!"</span></a><span data-dcnode-id="3060" instrument_node=""> I mean... WHAT? It's all so obvious! Our lives are fake! We all shoulda saw it a loooong time ago! A long old time ago... A huh huh huh! </span><a class="twikilink" data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IWasJustJoking" title="/pmwiki/pmwiki.php/Main/IWasJustJoking"><span data-dcnode-id="3059" instrument_node="">I'm joking! It's a joke! Nobody said that!</span></a><span data-dcnode-id="3057" instrument_node=""> You oughta see the look on your face!</span></div></li><li data-dcnode-id="3035"><span data-dcnode-id="3054" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LetUsNeverSpeakOfThisAgain" title="/pmwiki/pmwiki.php/Main/LetUsNeverSpeakOfThisAgain"><span data-dcnode-id="3053" instrument_node="">Let Us Never Speak of This Again</span></a><span data-dcnode-id="3051" instrument_node="">:</span><ul data-dcnode-id="3036"><li data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node=""> Occasionally a Normal villager will comment that she recognizes you from somewhere, and then claim she saw you were the subject of the cover story of a magazine once, asking you if this is true. Then she realizes she's wrong, and asks if you and her can just forget she asked about it.</span></li><li data-dcnode-id="3037"><span data-dcnode-id="3048" instrument_node=""> The protocol of Dodo Airlines for Mystery Tours (an activity where the player visits a randomly generated island to gather resources, collect specimens, and potentially meet a villager, but at the caveat of leaving anything not pocketed behind) is to never speak of any island visited by said tour ever again, to give an in-world reasoning for its randomness.</span><div class="indent" data-dcnode-id="3038"><strong data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Wilbur:</span></strong><span data-dcnode-id="3045" instrument_node=""> Also, there's one redline item you need to memorize like your latte order: Anything you leave behind stays here. We don't come back to these places. </span><em data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Ever.</span></em><span data-dcnode-id="3042" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DestroyTheEvidence" title="/pmwiki/pmwiki.php/Main/DestroyTheEvidence"><span data-dcnode-id="3041" instrument_node="">I actually burn the flight plans afterward</span></a><span data-dcnode-id="3039" instrument_node="">. Security reasons. Can't explain more than that.</span></div></li></ul></li><li data-dcnode-id="3030"><span data-dcnode-id="3034" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LightFlickerTeleportation" title="/pmwiki/pmwiki.php/Main/LightFlickerTeleportation"><span data-dcnode-id="3033" instrument_node="">Light-Flicker Teleportation</span></a><span data-dcnode-id="3031" instrument_node="">: The graveyard wall, a special wallpaper obtained from Saharah, shows a misty graveyard framed by tree arches in the foreground. Turning off the lights and hitting the switch the final time before the cycle goes back to "lights on" spawns a ghost in the background. Turning the lights back on gets rid of the ghost, and the next time the lights are off, the ghost gets closer, jumping around for a couple of cycles until it's standing in the foreground between one of the tree arches.</span></li><li data-dcnode-id="3025"><span data-dcnode-id="3029" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LimitedWardrobe" title="/pmwiki/pmwiki.php/Main/LimitedWardrobe"><span data-dcnode-id="3028" instrument_node="">Limited Wardrobe</span></a><span data-dcnode-id="3026" instrument_node="">: Can finally be subverted for the villagers! Though they only have their starting clothes at first, you can expand their wardrobe by giving them more items, and they can randomly rotate out what they'll wear for the day. They'll also change out of the usual depending on the occasion, such as workout clothes when they're doing exercises, or in their pajamas when they're about to sleep for the night. They also have dedicated outfits for rain (if they forego using an umbrella), snow, Fishing Tourneys, and Bug Offs, and on birthdays they'll be wearing formal suits or dresses and a cake hat for the occasion. They can also be given clothes by other villagers if you deliver them. On top of all that, they may even use your custom designs if you add them to the back wall.</span></li><li data-dcnode-id="3020"><span data-dcnode-id="3024" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LiteralGenie" title="/pmwiki/pmwiki.php/Main/LiteralGenie"><span data-dcnode-id="3023" instrument_node="">Literal Genie</span></a><span data-dcnode-id="3021" instrument_node="">: Asking Wisp for "something new" can give you something you already have, but in a new color. Surprisingly useful, as unlocking different-colored variations of purchasable items is not easy.</span></li><li data-dcnode-id="3015"><span data-dcnode-id="3019" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LiteralMinded" title="/pmwiki/pmwiki.php/Main/LiteralMinded"><span data-dcnode-id="3018" instrument_node="">Literal-Minded</span></a><span data-dcnode-id="3016" instrument_node="">: Once you're appointed as the representative of the residents, Tom Nook asks if you'd like to say a word or two towards the residents. Naturally, one of the options is to just say "a word or two".</span></li><li data-dcnode-id="3001"><span data-dcnode-id="3014" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoadsAndLoadsOfCharacters" title="/pmwiki/pmwiki.php/Main/LoadsAndLoadsOfCharacters"><span data-dcnode-id="3013" instrument_node="">Loads and Loads of Characters</span></a><span data-dcnode-id="3011" instrument_node="">: As of Version 2.0, there are 413 villagers present in the game — the 333 baseline villagers from </span><em data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">New Leaf</span></em><span data-dcnode-id="3008" instrument_node=""> plus the 50 added to its </span><em data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">Welcome amiibo</span></em><span data-dcnode-id="3005" instrument_node=""> update, the eight new villagers present at launch, the six </span><a class="twikilink" data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/Sanrio" title="/pmwiki/pmwiki.php/Creator/Sanrio"><span data-dcnode-id="3004" instrument_node="">Sanrio-inspired</span></a><span data-dcnode-id="3002" instrument_node=""> villagers added to Version 1.9, and the 16 villagers added to Version 2.0 itself. There's also 61 special characters present — 63 if you consider DJ KK and Gullivarr separate from K.K. Slider and Gulliver.</span></li><li data-dcnode-id="2990"><span data-dcnode-id="3000" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LostInTranslation" title="/pmwiki/pmwiki.php/Main/LostInTranslation"><span data-dcnode-id="2999" instrument_node="">Lost in Translation</span></a><span data-dcnode-id="2997" instrument_node="">: If you're wondering why the "Bamboo Hat" recipe doesn't actually use bamboo, the name isn't entirely accurate. While there is a bamboo-made variation, its real-life equivalent is the Asian conical hat, which is usually made of straw. The name itself is also one of several names it is known by, as it differs by region (e.g. the Japanese </span><em data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">jingasa</span></em><span data-dcnode-id="2994" instrument_node="">, the Vietnamese </span><em data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">nón lá</span></em><span data-dcnode-id="2991" instrument_node="">, etc.).</span></li><li data-dcnode-id="2958"><span data-dcnode-id="2989" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LuckBasedMission" title="/pmwiki/pmwiki.php/Main/LuckBasedMission"><span data-dcnode-id="2988" instrument_node="">Luck-Based Mission</span></a><span data-dcnode-id="2986" instrument_node="">:</span><ul data-dcnode-id="2959"><li data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node=""> The fishing tourney has elements of this. Unlike in past games, fish size plays no role; C.J. simply wants everyone to catch as many fish as possible in three minutes. However, how many fish you catch is mostly up to the fish themselves. While you can stand in an ideal spot along the southern beach and toss in bait and immediately cast your line, a fish may not appear immediately after the bait hits the water, and you have no control over how long it takes to hook the fish.</span></li><li data-dcnode-id="2979"><span data-dcnode-id="2983" instrument_node=""> Going on Mystery Island tours is essentially a crapshoot, with a very high chance you end up on an island with the same fruit trees and flower variety as those on your native island, and actually desirable islands like the coin rock island, shark island, and the tarantula island being extremely rare. This is doubly so if you're using the Mystery Tour to find desirable villagers, with some players spending dozens of tickets hoping a preferred villager appears. However, this is at least dampened by one furniture piece always spawning in a tree on Mystery Tours (unless it's a fruit tree or bamboo only island) and a high chance of a fossil appearing, so you can at least come back with </span><em data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">something</span></em><span data-dcnode-id="2980" instrument_node="">.</span></li><li data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node=""> Trying to get all the non-seasonal DIY recipes from villagers. Besides the message bottles that wash up on shore daily, three villagers can be found crafting or cooking in their homes and it is completely random who does the crafting. Furthermore, each villager personality has a preset pool of crafts they make, and the one they choose in their respective pools is also random.</span></li><li data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node=""> Hybrid flower breeding. Because the system uses simplified Mendelian genetics and all flowers have at least 3 sets of genes, putting the correct parent flowers together does not always guarantee that you will obtain the offspring flowers in the desired colour.</span></li><li data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node=""> Obtaining a villager's photo. While you can raise the friendship level to 255 (the maximum) and always give items with a high enough sellback value, you still only have a maximum 10% chance of the villager giving you their photo when they reciprocate.</span></li><li data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node=""> Getting a random campsite villager to move in is full of RNG, even more so if you want them to kick a specific villager out. It is random whether your dialogue with the villager will give you a chance to invite them. If you invite them to stay, it is random whether they will flat-out reject you, challenge you to a card game that decides whether they will move in (or rarely) agree immediately. If they challenge you to a card game, it can randomly be a 1-in-2 (card colour) or a 1-in-4 (card suit) game of pure chance. Fortunately, you have unlimited attempts until the 5am daily reset, so you can mash the A button until the villager agrees to move in. However, if they move into a full town, they will pick a random villager to replace (and that villager will not change under normal circumstances), so if they pick a villager you intend to keep, you have to soft reset at the right moment and start all over again!</span></li><li data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node=""> Getting "swag" from the Fishing Tourney or Bug-Off, or items from Redd's Raffle, is mostly luck; the game is nice enough to give you one of each item initially, but if you want multiples of anything (especially relevant for the Raffle, which gives some single-use consumable items like fireworks and bubble blowers), it could take a while to get the right items.</span></li><li data-dcnode-id="2964"><span data-dcnode-id="2968" instrument_node=""> Returning a lost item to its owner </span><em data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">without showing it to anyone else first</span></em><span data-dcnode-id="2965" instrument_node=""> (which gives the maximum friendship bonus) can be this. Investigating the lost item will either give a hint to the personality of the villager it belongs to, or hint that it belongs to a villager with low friendship with the player. If you have multiple villagers satisfying the criteria, it is down to luck whether you find the correct one on the first try.</span></li><li data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node=""> Getting maximum friendship points for the "sick villager" sidequest. To do so, you need to have another villager tell you that said villager is ill and have medicine ready the first time you visit the sick villager. Whether another villager will inform you of that villager's illness in a conversation is down to luck.</span></li><li data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node=""> The Halloween event introduced pumpkins. When you plant pumpkins using pumpkin sprouts, the plant, when fully grown, will eventually produce pumpkins in one in four colours, with orange being far more common than the other three. You won't know what colour the pumpkins are until the pumpkins are ready for harvesting, and once the pumpkin colour is revealed, that is the only colour of pumpkin that that plant will produce. Fortunately, planting a pumpkin of a specific colour guarantees a plant that produces that colour of pumpkin, so you can multiply rarer pumpkins quickly.</span></li></ul></li><li data-dcnode-id="2953"><span data-dcnode-id="2957" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MassOhCrap" title="/pmwiki/pmwiki.
