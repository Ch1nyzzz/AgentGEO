wiki/pmwiki.php/Main/BribingYourWayToVictory" title="/pmwiki/pmwiki.php/Main/BribingYourWayToVictory"><span data-dcnode-id="4273" instrument_node="">Bribing Your Way to Victory</span></a><span data-dcnode-id="4271" instrument_node="">:</span><ul data-dcnode-id="4219"><li data-dcnode-id="4248"><span data-dcnode-id="4270" instrument_node=""> Downplayed with regard to inviting villagers. You can use amiibo cards to invite specific villagers after the campsite is built. However, unlike </span><em data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">New Leaf</span></em><span data-dcnode-id="4267" instrument_node="">'s amiibo campers, it takes three days of summoning them to the campsite and completing their crafting request before you can invite them to stay, and they can turn down your offer to visit the campsite if your island's star rating is too low. Inviting an amiibo villager to your campsite also resets your random campsite villager cooldown. Furthermore, they may ask you to craft something that you may have no means of crafting within the day</span><span class="notelabel" data-dcnode-id="4264" onclick="togglenote('note7a3l8');" style="cursor: pointer;"><sup data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4259" id="note7a3l8" isnote="true" onclick="togglenote('note7a3l8');" style="display: none; cursor: pointer;"><span data-dcnode-id="4263" instrument_node="">recipe is not the issue as they'll give you the recipe, it's getting the necessary ingredients that will hurt plenty - for example, being asked to craft a flower wreath using </span><em data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">specific rare hybrid flowers</span></em><span data-dcnode-id="4260" instrument_node=""> when you don't even have that species of flower growing on your island</span></span><span data-dcnode-id="4258" instrument_node="">. On the other hand, using an amiibo is the </span><em data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">only</span></em><span data-dcnode-id="4255" instrument_node=""> way to oust a villager on demand, and correspondingly the only way to coordinate a transfer of a desired villager between islands</span><span class="notelabel" data-dcnode-id="4252" onclick="togglenote('note82aea');" style="cursor: pointer;"><sup data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4250" id="note82aea" isnote="true" onclick="togglenote('note82aea');" style="display: none; cursor: pointer;"><span data-dcnode-id="4251" instrument_node="">Assuming that the donor does not have a "ready" (invited twice) amiibo, the recipient accepts a move-out request from a villager and concurrently, the donor begins inviting an amiibo villager. The day after, the recipient will have an empty plot and the donor will have invited the amiibo villager thrice, allowing them to put the target villager into a "moving out" state. The recipient then goes to the donor's island and adopts the target villager.</span></span><span data-dcnode-id="4249" instrument_node="">.</span></li><li data-dcnode-id="4243"><span data-dcnode-id="4247" instrument_node=""> Played straight with posters since version 1.5.0. Nintendo patched out a glitch that allowed players to add posters to Nook Shopping by cataloguing them, thus removing from all player's catalogues any poster that had not been added to their catalogue through the intended manner (using an amiibo on Harv's Island, or having said villager live on your island and summoning that villager on Harv's Island). To complete the catalogue for the villager posters without amiibo, you need all </span><em data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">413</span></em><span data-dcnode-id="4244" instrument_node=""> villagers (as of 2.0) to have lived on your island at some point in time. And all this is before considering the special NPC posters, which can't be unlocked without amiibo. The only respite is that posters can still be ordered by those who have them properly unlocked and gifted to other players.</span></li><li data-dcnode-id="4238"><span data-dcnode-id="4242" instrument_node=""> Played straight with the Sanrio villagers and items, added to the game in 1.9.0. Just like in </span><em data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">New Leaf</span></em><span data-dcnode-id="4239" instrument_node="">, these villagers cannot be invited to other players islands' when in boxes, and their special items cannot be "touch traded". The only way to unlock them and their items is to obtain the Sanrio amiibo. Fortunately, shortly after their release, the Sanrio amiibo were reprinted.</span></li><li data-dcnode-id="4230"><span data-dcnode-id="4237" instrument_node=""> Version 2.0.0 coincides with the announcement that 8 of the highly sought after new villagers </span><span class="notelabel" data-dcnode-id="4234" onclick="togglenote('note9sryw');" style="cursor: pointer;"><sup data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4232" id="note9sryw" isnote="true" onclick="togglenote('note9sryw');" style="display: none; cursor: pointer;"><span data-dcnode-id="4233" instrument_node="">Cyd the elephant, Dom the sheep, Sherb the goat, Raymond the cat, Judy the bear cub, Audie the wolf, Megan the Bear, and Reneigh the horse</span></span><span data-dcnode-id="4231" instrument_node=""> will now have amiibo cards made, making getting these once highly sought after characters now as easy as paying a few bucks for their amiibo cards, assuming scalpers don’t get to them first. And to top it off, the 16 new villagers announced for version 2.0.0 will also see day one amiibo card releases.</span></li><li data-dcnode-id="4220"><span data-dcnode-id="4229" instrument_node=""> The paid </span><em data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="4226" instrument_node=""> DLC brings a plethora of benefits. It allows the player to unlock new techniques with which they can decorate their home, eases access to version 2.0.0 furniture through the Paradise Planning shop and provides players with the ability to house additional instances of their favourite villagers. However, topping them all is a hidden unlockable mechanic that effectively vastly expands the player's catalogue: </span><span class="spoiler" data-dcnode-id="4221" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4225" instrument_node="">By spending 150,000 Poki at the Paradise Planning shop, the player can unlock Wardell's ordering service. It allows the player to buy, with Poki, any purchaseable item, in any variation, that is in their </span><em data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="4222" instrument_node=""> catalogue. Yes, that very catalogue that grows by leaps and bounds with every villager home you complete. While Poki is much harder to earn than Bells, a steady supply of Poki can be generated by designing and remodeling villagers' holiday homes.</span></span></li></ul></li><li data-dcnode-id="4213"><span data-dcnode-id="4217" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokenBridge" title="/pmwiki/pmwiki.php/Main/BrokenBridge"><span data-dcnode-id="4216" instrument_node="">Broken Bridge</span></a><span data-dcnode-id="4214" instrument_node="">: At first not all of the island can be explored, as wide rivers and cliffs will inevitably isolate certain areas. The player soon acquires the tools to scale these obstacles themselves, and can later make more permanent passages. Later expansions alleviated this slightly (at least in terms of the rivers) because wetsuits are available on the first day, allowing the player to swim along the coast and past the river mouths.</span></li><li data-dcnode-id="4184"><span data-dcnode-id="4212" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBusCameBack" title="/pmwiki/pmwiki.php/Main/TheBusCameBack"><span data-dcnode-id="4211" instrument_node="">The Bus Came Back</span></a><span data-dcnode-id="4209" instrument_node="">:</span><ul data-dcnode-id="4185"><li data-dcnode-id="4201"><span data-dcnode-id="4208" instrument_node=""> Some of the missing characters from the previous entries in the franchises will return for limited time events such as Reese and Cyrus for "Wedding Season" and Rover for "May Day". Once the player has encountered them, they can be called to Photopia via amiibo at any time. By Version 2, all of the remaining special characters who appeared in </span><em data-dcnode-id="4206"><span data-dcnode-id="4207" instrument_node="">New Leaf</span></em><span data-dcnode-id="4205" instrument_node=""> have been added, with Brewster returning along with the Roost, Harriet co-managing Harvey's new collective, Katrina and Tortimer appearing as co-ops in said collective, Lottie running Paradise Planning in the </span><em data-dcnode-id="4203"><span data-dcnode-id="4204" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="4202" instrument_node=""> DLC, and the rest making occasional appearances at the Roost.</span></li><li data-dcnode-id="4186"><span data-dcnode-id="4200" instrument_node=""> The Version 2 update adds sixteen villagers to game, half of which are returning characters — Zoe, Ace, Rio, and Faith all make their first appearance since </span><a class="twikilink" data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossing2001" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossing2001"><span data-dcnode-id="4199" instrument_node="">the original game</span></a><span data-dcnode-id="4197" instrument_node="">, while Shanpan, Nobuo, Petunia</span><span class="notelabel" data-dcnode-id="4194" onclick="togglenote('note10hjs1');" style="cursor: pointer;"><sup data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4192" id="note10hjs1" isnote="true" onclick="togglenote('note10hjs1');" style="display: none; cursor: pointer;"><span data-dcnode-id="4193" instrument_node="">not to be confused with the cow of the same name, who is known as Shimofuri in Japan</span></span><span data-dcnode-id="4191" instrument_node="">, and Pironkon all make their international debuts since the </span><img class="trivia1 rounded" data-dcnode-id="4190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-trivia.png&amp;raw" title="This example contains a TRIVIA entry. It should be moved to the TRIVIA tab."><a class="twikilink" data-dcnode-id="4188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoExportForYou" title="/pmwiki/pmwiki.php/Main/NoExportForYou"><span data-dcnode-id="4189" instrument_node="">Japanese-exclusive</span></a><span data-dcnode-id="4187" instrument_node=""> e+ update, with their localized names being Frett, Chabwick, Azalea, and Roswell.</span></li></ul></li><li data-dcnode-id="4155"><span data-dcnode-id="4183" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButThouMust" title="/pmwiki/pmwiki.php/Main/ButThouMust"><span data-dcnode-id="4182" instrument_node="">But Thou Must!</span></a><span data-dcnode-id="4180" instrument_node="">:</span><ul data-dcnode-id="4156"><li data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node=""> The first villager you get at your campsite, who is always a smug villager, must be invited to move in before you can advance the story and gain access to things like additional plots and terraforming. It gives you the usual dialog for them thinking about moving in, except you get two options that both encourage them to go ahead.</span></li><li data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node=""> When you first meet Redd, he offers to sell you a piece of art for a ludicrous 498,000 Bells. Fortunately, an inversion of this trope takes over—both dialog options amount to "no way," so regardless of your response he gives you a 99% discounted price of 4,980 Bells, and this time you can actually choose whether to buy it or not.</span></li><li data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node=""> When you return the spirit pieces to Wisp, there is an option to refuse to give them back to him, which you can confirm several times in a row. However, you can't actually keep them; after a couple 'no's, you're trapped in the dialogue box with Wisp until you say yes.</span></li><li data-dcnode-id="4169"><span data-dcnode-id="4173" instrument_node=""> When you talk to a crafting or cooking villager and you already know the recipe, they'll mention something about you already knowing it. Both possible responses are affirmative and even though one is less polite and implies refusal, </span><em data-dcnode-id="4171"><span data-dcnode-id="4172" instrument_node="">both</span></em><span data-dcnode-id="4170" instrument_node=""> end up with the same dialogue and you getting the duplicate recipe. The only way the villager won’t give it to you is if your pockets are full when talking to them.</span></li><li data-dcnode-id="4164"><span data-dcnode-id="4168" instrument_node=""> One of the possible villager interactions is where one of them wants to give you a gift. One particular variant of the interaction gives you a chance to respond, often with both responses to the effect of "huh?", both of which eventually lead to you obtaining the gift. However, a particularly well-disguised one is the smug villagers' version of that interaction - the villager will ask you if you think that a certain item fits his style. One answer is that it does, the other is to "get rid of it". </span><em data-dcnode-id="4166"><span data-dcnode-id="4167" instrument_node="">Both</span></em><span data-dcnode-id="4165" instrument_node=""> result in you obtaining the item.</span></li><li data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node=""> You can decline to help Gulliver and Gullivarrr, but you get set on the task of finding the communicator (parts) anyway. Though they note the "cold shoulder". You have to find the communicator parts, or communicator, if you want the rusted parts needed for the Robot Hero. Any communicator parts in your possession turn into rusted parts the next day. If you keep the communicator, it turns into a stack of five rusted parts the next day.</span></li><li data-dcnode-id="4157"><span data-dcnode-id="4161" instrument_node=""> Near the end of the main story of </span><em data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="4158" instrument_node="">, Lottie falls ill and Niko has to run the show. During the cutscene, Niko asks the player whether they should keep the Paradise Planning office open or temporarily close the office. Regardless of the player's choice, seconds later, a random villager will walk in and ask for a holiday home, which the player must design according to their requested theme.</span></li></ul></li><li data-dcnode-id="4114"><span data-dcnode-id="4154" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallBack" title="/pmwiki/pmwiki.php/Main/CallBack"><span data-dcnode-id="4153" instrument_node="">Call-Back</span></a><span data-dcnode-id="4151" instrument_node="">:</span><ul data-dcnode-id="4115"><li data-dcnode-id="4146"><span data-dcnode-id="4150" instrument_node=""> Early in the game, after spending your first day helping the residents feel at home on the island and going to bed, you see K.K. Slider in the recurring barely-lit room talking about living on your own and the virtues of friendship, just like in the beginning of the N64/GameCube-era games. Even the music is nearly identical to the original, other than the </span><a class="twikilink" data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RecurringRiff" title="/pmwiki/pmwiki.php/Main/RecurringRiff"><span data-dcnode-id="4149" instrument_node="">Recurring Riff</span></a><span data-dcnode-id="4147" instrument_node="">.</span></li><li data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node=""> When announcing the expansion of the Resident Services building, Tom Nook states in the English version, "Our population certainly is growing, hm?", referencing the tagline of the GameCube installment ("Population: Growing!").</span></li><li data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node=""> Wisp's role and design are identical to the first game, where you had to catch five spirits with a net to receive his reward, though this time he doesn't offer to weed your town.</span></li><li data-dcnode-id="4130"><span data-dcnode-id="4141" instrument_node=""> Whenever Label shows up at the plaza, you can see </span><a class="urllink" data-dcnode-id="4138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//animalcrossing.fandom.com/wiki/Label%3Ffile%3DLabel_screenie.png"><span data-dcnode-id="4140" instrument_node="">the old GracieGrace scarf</span><img data-dcnode-id="4139" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">◊</span></small><span data-dcnode-id="4135" instrument_node=""> that she wore in </span><em data-dcnode-id="4132"><a class="twikilink" data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossingCityFolk" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossingCityFolk"><span data-dcnode-id="4134" instrument_node="">Animal Crossing: City Folk</span></a></em><span data-dcnode-id="4131" instrument_node=""> tied to her bag. She occasionally mentions the time she spent at GracieGrace offhandedly, as she's now become a fashion designer using the brand name "Labelle" (her previous alias).</span></li><li data-dcnode-id="4126"><span data-dcnode-id="4129" instrument_node=""> A peppy villager might wonder if their outfit is good enough to be on the cover of Ms. Nintendique, an unseen fashion magazine that hasn't been mentioned in the series since </span><a class="twikilink" data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossing2001" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossing2001"><span data-dcnode-id="4128" instrument_node="">the GameCube game.</span></a></li><li data-dcnode-id="4121"><span data-dcnode-id="4125" instrument_node=""> The city music from </span><em data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">City Folk</span></em><span data-dcnode-id="4122" instrument_node=""> returns as an individual, playable song titled "Animal City". The city square itself appears on the song's cover art.</span></li><li data-dcnode-id="4116"><span data-dcnode-id="4120" instrument_node=""> Sometimes if you poke Gulliver awake, he'll have a </span><a class="twikilink" data-dcnode-id="4118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WakingNonSequitur" title="/pmwiki/pmwiki.php/Main/WakingNonSequitur"><span data-dcnode-id="4119" instrument_node="">Waking Non Sequitur</span></a><span data-dcnode-id="4117" instrument_node=""> about not wanting to go back into space, a reference to his role in some of the previous games, where he flew a UFO that could be shot down by the player.</span></li></ul></li><li data-dcnode-id="4102"><span data-dcnode-id="4113" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CaptainObvious" title="/pmwiki/pmwiki.php/Main/CaptainObvious"><span data-dcnode-id="4112" instrument_node="">Captain Obvious</span></a><span data-dcnode-id="4110" instrument_node="">: The player can sometimes have descriptions like this.</span><div class="indent" data-dcnode-id="4103"><strong data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">Player:</span></strong><span data-dcnode-id="4107" instrument_node=""> </span><em data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">[investigating a lost item]</span></em><span data-dcnode-id="4104" instrument_node=""> Someone lost this...</span></div></li><li data-dcnode-id="4091"><span data-dcnode-id="4101" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CartoonlandTime" title="/pmwiki/pmwiki.php/Main/CartoonlandTime"><span data-dcnode-id="4100" instrument_node="">Cartoonland Time</span></a><span data-dcnode-id="4098" instrument_node="">: It </span><em data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">is</span></em><span data-dcnode-id="4095" instrument_node=""> possible to raise small buildings within a day, so most of the construction times are somewhat believable. On the other hand, a full multi-discipline museum, with its nine galleries full of fancy lighting, animal enclosures, and life support equipment going up in only two days...strains disbelief. (</span><a class="twikilink" data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AcceptableBreaksFromReality" title="/pmwiki/pmwiki.php/Main/AcceptableBreaksFromReality"><span data-dcnode-id="4094" instrument_node="">Realism is clearly sacrificed for convenience, anyway.</span></a><span data-dcnode-id="4092" instrument_node="">)</span></li><li data-dcnode-id="4078"><span data-dcnode-id="4090" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterCustomization" title="/pmwiki/pmwiki.php/Main/CharacterCustomization"><span data-dcnode-id="4089" instrument_node="">Character Customization</span></a><span data-dcnode-id="4087" instrument_node="">: Unlike prior games, this game has players now be presented with an orthodox character creation screen as opposed to having their hair and facial features determined by unrelated questions (although this functionality is clearly inspired by </span><em data-dcnode-id="4084"><a class="twikilink" data-dcnode-id="4085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossingHappyHomeDesigner" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossingHappyHomeDesigner"><span data-dcnode-id="4086" instrument_node="">Animal Crossing: Happy Home Designer</span></a></em><span data-dcnode-id="4083" instrument_node=""> and </span><em data-dcnode-id="4080"><a class="twikilink" data-dcnode-id="4081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossingPocketCamp" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossingPocketCamp"><span data-dcnode-id="4082" instrument_node="">Animal Crossing: Pocket Camp</span></a></em><span data-dcnode-id="4079" instrument_node="">). Villagers can also use a mirror or vanity to change their character's appearance or even gender at any time, with skin tone, hair color and style, and facial features being easily changed. Spending Nook Miles unlocks new hairstyles and colors as well.</span></li><li data-dcnode-id="4073"><span data-dcnode-id="4077" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChekhovsGun" title="/pmwiki/pmwiki.php/Main/ChekhovsGun"><span data-dcnode-id="4076" instrument_node="">Chekhov's Gun</span></a><span data-dcnode-id="4074" instrument_node="">: Due to the game's release coming before much of its content was added in updates, some of the features in earlier versions turned out to set up content in later ones, like the mini-beach and pier on the island sitting around for a while before turning out to be the docking points for Redd and Kapp'n in two later updates, or pumpkins serving as a preview for the other produce types to farm in 2.0.</span></li><li data-dcnode-id="4068"><span data-dcnode-id="4072" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChestMonster" title="/pmwiki/pmwiki.php/Main/ChestMonster"><span data-dcnode-id="4071" instrument_node="">Chest Monster</span></a><span data-dcnode-id="4069" instrument_node="">: Hermit crabs look exactly like inanimate seashells—other than an occasional subtle wiggle—until you walk over to pick up the shell and it jumps up and scurries away. Same goes for the walking leaf, which looks like a piece of furniture that fell out of a tree. They aren't aggressive, but you'll need to equip your net quickly to catch them.</span></li><li data-dcnode-id="4063"><span data-dcnode-id="4067" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColonyDrop" title="/pmwiki/pmwiki.php/Main/ColonyDrop"><span data-dcnode-id="4066" instrument_node="">Colony Drop</span></a><span data-dcnode-id="4064" instrument_node="">: Referenced. A suspended model of a meteorite is appropriately put up in the Museum's Fossil Exhibit's Dinosaur Wing, which can be seen if the player stands on the big blue spot on the floor, causing the camera to pan up to the model.</span></li><li data-dcnode-id="4043"><span data-dcnode-id="4062" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColorCodedForYourConvenience" title="/pmwiki/pmwiki.php/Main/ColorCodedForYourConvenience"><span data-dcnode-id="4061" instrument_node="">Color-Coded for Your Convenience</span></a><span data-dcnode-id="4059" instrument_node="">: While all balloons can carry furniture, clothing, or DIY recipes, some items can only drop from certain balloon colors:</span><ul data-dcnode-id="4044"><li data-dcnode-id="4051"><span data-dcnode-id="4058" instrument_node=""> Blue balloons are the only ones that can drop crafting materials that otherwise spawn from rocks</span><span class="notelabel" data-dcnode-id="4055" onclick="togglenote('note11swrj');" style="cursor: pointer;"><sup data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="4053" id="note11swrj" isnote="true" onclick="togglenote('note11swrj');" style="display: none; cursor: pointer;"><span data-dcnode-id="4054" instrument_node="">stones, clay, iron nuggets, gold nugget</span></span><span data-dcnode-id="4052" instrument_node="">.</span></li><li data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node=""> Yellow balloons are the only ones that can drop bells, ranging from 1,000 to 30,000.</span></li><li data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node=""> A special gold balloon can appear carrying the golden slingshot DIY recipe after you shoot down 300 balloons.</span></li><li data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node=""> Special Bunny day balloons that only appear during the Bunny Day event will be striped with the Bunny Day colors to differentiate them from normal balloons and will only drop bunny day DIY recipes and sky eggs. They also don’t override normal balloons of any color and always appear moments after the normal balloons do.</span></li></ul></li><li data-dcnode-id="3969"><span data-dcnode-id="4042" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CompanyCrossReferences" title="/pmwiki/pmwiki.php/Main/CompanyCrossReferences"><span data-dcnode-id="4041" instrument_node="">Company Cross References</span></a><span data-dcnode-id="4039" instrument_node="">:</span><ul data-dcnode-id="3970"><li data-dcnode-id="4029"><span data-dcnode-id="4038" instrument_node=""> Unlike most fish, catching a squid can prompt one of a few different quips from your character. For example, they may say they had an "inkling" they would catch one or say it's "off the hook", referencing the </span><em data-dcnode-id="4035"><a class="twikilink" data-dcnode-id="4036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Splatoon" title="/pmwiki/pmwiki.php/VideoGame/Splatoon"><span data-dcnode-id="4037" instrument_node="">Splatoon</span></a></em><span data-dcnode-id="4034" instrument_node=""> series, while another asks if squids don't actually "bloop", referring to </span><em data-dcnode-id="4031"><a class="twikilink" data-dcnode-id="4032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/SuperMarioBros" title="/pmwiki/pmwiki.php/Franchise/SuperMarioBros"><span data-dcnode-id="4033" instrument_node="">Super Mario Bros.</span></a></em><span data-dcnode-id="4030" instrument_node="">' Bloopers.</span></li><li data-dcnode-id="4020"><span data-dcnode-id="4028" instrument_node=""> If you have Blathers assess a </span><em data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">Eusthenopteron</span></em><span data-dcnode-id="4025" instrument_node=""> fossil, he'll ponder what culture would be like if life had never left the ocean, such as if differences might be resolved through "some sort of ink-squirting contest of champions", referencing </span><em data-dcnode-id="4022"><a class="twikilink" data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Splatoon" title="/pmwiki/pmwiki.php/VideoGame/Splatoon"><span data-dcnode-id="4024" instrument_node="">Splatoon</span></a></em><span data-dcnode-id="4021" instrument_node="">.</span></li><li data-dcnode-id="3999"><span data-dcnode-id="4019" instrument_node=""> Like in previous games Gulliver sometimes references other Nintendo franchises in his dialogue:</span><ul data-dcnode-id="4000"><li data-dcnode-id="4013"><span data-dcnode-id="4018" instrument_node=""> Upon waking he may say, "But, verily, it be the nature of dreams to end," quoting the Wind Fish in </span><em data-dcnode-id="4015"><a class="twikilink" data-dcnode-id="4016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaLinksAwakening" title="/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaLinksAwakening"><span data-dcnode-id="4017" instrument_node="">The Legend of Zelda: Link's Awakening</span></a></em><span data-dcnode-id="4014" instrument_node="">; your character asks him what that's all about, and he says he heard a fish say it once.</span></li><li data-dcnode-id="4007"><span data-dcnode-id="4012" instrument_node=""> If you agree to help him find his communicator parts, he may gush that he hasn't gotten such a sweet reception since he washed up on Coralcola, the starting island from </span><em data-dcnode-id="4009"><a class="twikilink" data-dcnode-id="4010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/StarTropics" title="/pmwiki/pmwiki.php/VideoGame/StarTropics"><span data-dcnode-id="4011" instrument_node="">StarTropics</span></a></em><span data-dcnode-id="4008" instrument_node="">.</span></li><li data-dcnode-id="4001"><span data-dcnode-id="4006" instrument_node=""> If you choose not to help him, Gulliver will say he hasn't gotten a cold shoulder as icy as this since he brushed with the Snomads, the villains from </span><em data-dcnode-id="4003"><a class="twikilink" data-dcnode-id="4004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DonkeyKongCountryTropicalFreeze" title="/pmwiki/pmwiki.php/VideoGame/DonkeyKongCountryTropicalFreeze"><span data-dcnode-id="4005" instrument_node="">Donkey Kong Country: Tropical Freeze</span></a></em><span data-dcnode-id="4002" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3971"><span data-dcnode-id="3998" instrument_node=""> Gullivarr makes a few nautical references to other Nintendo properties:</span><ul data-dcnode-id="3972"><li data-dcnode-id="3989"><span data-dcnode-id="3997" instrument_node=""> During his half-conscious mumbling he may imagine fighting with the </span><a class="twikilink" data-dcnode-id="3995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MultiArmedAndDangerous" title="/pmwiki/pmwiki.php/Main/MultiArmedAndDangerous"><span data-dcnode-id="3996" instrument_node="">Multi-Armed and Dangerous</span></a><span data-dcnode-id="3994" instrument_node=""> undead pirate Cortez from </span><em data-dcnode-id="3991"><a class="twikilink" data-dcnode-id="3992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/PaperMarioTheThousandYearDoor" title="/pmwiki/pmwiki.php/VideoGame/PaperMarioTheThousandYearDoor"><span data-dcnode-id="3993" instrument_node="">Paper Mario: The Thousand-Year Door</span></a></em><span data-dcnode-id="3990" instrument_node="">.</span></li><li data-dcnode-id="3979"><span data-dcnode-id="3988" instrument_node=""> While talking to you after waking he may bring up being feared from Crocodile Isle, the main setting of </span><em data-dcnode-id="3985"><a class="twikilink" data-dcnode-id="3986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DonkeyKongCountry2DiddysKongQuest" title="/pmwiki/pmwiki.php/VideoGame/DonkeyKongCountry2DiddysKongQuest"><span data-dcnode-id="3987" instrument_node="">Donkey Kong Country 2: Diddy's Kong Quest</span></a></em><span data-dcnode-id="3984" instrument_node="">, to Keelhaul Key, a location in </span><em data-dcnode-id="3981"><a class="twikilink" data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/PaperMarioTheThousandYearDoor" title="/pmwiki/pmwiki.php/VideoGame/PaperMarioTheThousandYearDoor"><span data-dcnode-id="3983" instrument_node="">Paper Mario: The Thousand-Year Door</span></a></em><span data-dcnode-id="3980" instrument_node="">.</span></li><li data-dcnode-id="3973"><span data-dcnode-id="3978" instrument_node=""> After agreeing to recover his communicator he may compare you to Captain Syrup, the pirate leader from the </span><em data-dcnode-id="3975"><a class="twikilink" data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/WarioLand" title="/pmwiki/pmwiki.php/VideoGame/WarioLand"><span data-dcnode-id="3977" instrument_node="">Wario Land</span></a></em><span data-dcnode-id="3974" instrument_node=""> games.</span></li></ul></li></ul></li><li data-dcnode-id="3958"><span data-dcnode-id="3968" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ConspicuousConsumption" title="/pmwiki/pmwiki.php/Main/ConspicuousConsumption"><span data-dcnode-id="3967" instrument_node="">Conspicuous Consumption</span></a><span data-dcnode-id="3965" instrument_node="">: You can buy a crown at the Able Sisters for a whopping </span><em data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">1,000,000 bells</span></em><span data-dcnode-id="3962" instrument_node=""> and a royal crown for an even steeper </span><strong data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">1,200,000 bells</span></strong><span data-dcnode-id="3959" instrument_node="">. Both of these headwears serve no other purpose than for item collecting and/or the player to state that they've spent a fortune on their sense of self-importance.</span></li><li data-dcnode-id="3941"><span data-dcnode-id="3957" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreepyChangingPainting" title="/pmwiki/pmwiki.php/Main/CreepyChangingPainting"><span data-dcnode-id="3956" instrument_node="">Creepy Changing Painting</span></a><span data-dcnode-id="3954" instrument_node="">: Some of the fake art pieces in the game have the little extra bonus of being </span><em data-dcnode-id="3952"><span data-dcnode-id="3953" instrument_node="">haunted</span></em><span data-dcnode-id="3951" instrument_node="">, and three of them are portraits that change periodically. The fake </span><em data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">Girl with a Pearl Earring</span></em><span data-dcnode-id="3948" instrument_node=""> closes her eyes, the fake </span><em data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">Beauty Looking Back</span></em><span data-dcnode-id="3945" instrument_node=""> will turn her head to face the other direction, and the fake </span><em data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">Otani Oniji</span></em><span data-dcnode-id="3942" instrument_node=""> portrait will change from a frown to a smile.</span></li><li data-dcnode-id="3936"><span data-dcnode-id="3940" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DancePartyEnding" title="/pmwiki/pmwiki.php/Main/DancePartyEnding"><span data-dcnode-id="3939" instrument_node="">Dance Party Ending</span></a><span data-dcnode-id="3937" instrument_node="">: For the Happy Home Paradise DLC. Completing 30 home renovations and all facilities in the Paradise Island will unlock a beach dance party celebration while your creations are showcased in a credits-like manner.</span></li><li data-dcnode-id="3925"><span data-dcnode-id="3935" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathIsASlapOnTheWrist" title="/pmwiki/pmwiki.php/Main/DeathIsASlapOnTheWrist"><span data-dcnode-id="3934" instrument_node="">Death Is a Slap on the Wrist</span></a><span data-dcnode-id="3932" instrument_node="">: As in previous games, getting bit by a tarantula or stung by a scorpion causes you to "faint", which will cause the game to </span><a class="twikilink" data-dcnode-id="3930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IrisOut" title="/pmwiki/pmwiki.php/Main/IrisOut"><span data-dcnode-id="3931" instrument_node="">Iris Out</span></a><span data-dcnode-id="3929" instrument_node=""> and teleport you back to your home (or to the dock if it happens on a Mystery Tour), with absolutely no penalty. </span><a class="twikilink" data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AchievementMockery" title="/pmwiki/pmwiki.php/Main/AchievementMockery"><span data-dcnode-id="3928" instrument_node="">You might even get Nook Mile awards for doing so</span></a><span data-dcnode-id="3926" instrument_node="">. New in this game, if you were already stung by wasps and get stung again, you'll faint as well.</span></li><li data-dcnode-id="3900"><span data-dcnode-id="3924" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathWorld" title="/pmwiki/pmwiki.php/Main/DeathWorld"><span data-dcnode-id="3923" instrument_node="">Death World</span></a><span data-dcnode-id="3921" instrument_node="">: For a given value of "death", considering what type of game this is, but a couple of Mystery Tour islands qualify as, essentially, "Knock-Out Worlds".</span><ul data-dcnode-id="3901"><li data-dcnode-id="3907"><span data-dcnode-id="3920" instrument_node=""> It's possible, although rare, to be brought to an island which the fandom calls </span><em data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">Tarantula Island</span></em><span data-dcnode-id="3917" instrument_node=""> or </span><em data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">Scorpion Island</span></em><span data-dcnode-id="3914" instrument_node=""> that, </span><a class="twikilink" data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="3913" instrument_node="">as the name says</span></a><span data-dcnode-id="3911" instrument_node="">, continuously, and only, spawns tarantulas or scorpions depending on the time of year, which are aggressive and will </span><a class="twikilink" data-dcnode-id="3909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitKill" title="/pmwiki/pmwiki.php/Main/OneHitKill"><span data-dcnode-id="3910" instrument_node="">One-Hit Kill</span></a><span data-dcnode-id="3908" instrument_node=""> the player. That said, if you get good at catching them, you can make major bank on these islands since you can sell tarantulas and scorpions for 8,000 Bells each.</span></li><li data-dcnode-id="3902"><span data-dcnode-id="3906" instrument_node=""> Then there is </span><em data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">Bamboo Island</span></em><span data-dcnode-id="3903" instrument_node="">, which is an island with a ton of weeds, bamboo shoots but no proper trees. Not so much death as it is pestilence, as the lack of standard trees usually necessitates the spending of Nook Miles for replacement tools.</span></li></ul></li><li data-dcnode-id="3892"><span data-dcnode-id="3899" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DemotedToExtra" title="/pmwiki/pmwiki.php/Main/DemotedToExtra"><span data-dcnode-id="3898" instrument_node="">Demoted to Extra</span></a><span data-dcnode-id="3896" instrument_node="">: Cyrus and Reese go from the owners of Re-Tail in </span><em data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">New Leaf</span></em><span data-dcnode-id="3893" instrument_node=""> to seasonal characters to represent June's Wedding Season due to their roles from that game being passed onto the Nooklings, the player, as well as the new characters Flick and C.J. As of the November 5, 2021 update, they, along with other previously missing recurring non-playable characters and ones that were already in the game but didn't have proper shops, will be setting up shop on Harv's Island plaza, allowing players to buy new furniture from them as well as customize furniture they can't customize on their own.</span></li><li data-dcnode-id="3876"><span data-dcnode-id="3891" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DepartmentOfRedundancyDepartment" title="/pmwiki/pmwiki.php/Main/DepartmentOfRedundancyDepartment"><span data-dcnode-id="3890" instrument_node="">Department of Redundancy Department</span></a><span data-dcnode-id="3888" instrument_node="">:</span><ul data-dcnode-id="3877"><li data-dcnode-id="3880"><span data-dcnode-id="3887" instrument_node=""> If Harvey calls you, he says he's </span><a class="twikilink" data-dcnode-id="3885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CaptainObvious" title="/pmwiki/pmwiki.php/Main/CaptainObvious"><span data-dcnode-id="3886" instrument_node="">"calling on the phone part of your phone"</span></a><span data-dcnode-id="3884" instrument_node="">. This is justified however because the player has been given a </span><em data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">smartphone</span></em><span data-dcnode-id="3881" instrument_node="">, which can get over 15 apps that have nothing to do with phone calls. Getting a call is very uncommon, and Harv is stuck in the 70s and thus would likely point this sort of thing out.</span></li><li data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node=""> It is possible for a Smug Villager shopping at Nook's Cranny to say "Doing a little shopping, eh?" immediately followed up by "Doing a little gift shopping, are you? Well, try to put yourself in the shoes of the giftee." if you ask to chat with them.</span></li></ul></li><li data-dcnode-id="3866"><span data-dcnode-id="3875" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DesertedIsland" title="/pmwiki/pmwiki.php/Main/DesertedIsland"><span data-dcnode-id="3874" instrument_node="">Deserted Island</span></a><span data-dcnode-id="3872" instrument_node="">:</span><ul data-dcnode-id="3867"><li data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node=""> The game is located on one and Tom Nook has convinced the player and some of the villagers to purchase some land there. It's a castaway island and can either stay that way or become more civilized if the player so chooses. Unlike many other deserted island stories, there is an easy way off with a sea plane provided by Dodo Airlines.</span></li><li data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node=""> Additionally the player can use Nook Mile tickets to travel to other smaller islands to gather resources, find new fruits, catch out of season fish and bugs and even find new potential residents.</span></li></ul></li><li data-dcnode-id="3859"><span data-dcnode-id="3865" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DevelopersForesight" title="/pmwiki/pmwiki.php/Main/DevelopersForesight"><span data-dcnode-id="3864" instrument_node="">Developers' Foresight</span></a><span data-dcnode-id="3862" instrument_node="">: Found on the general page </span><a class="twikilink" data-dcnode-id="3860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/DevelopersForesight/AnimalCrossing" title="/pmwiki/pmwiki.php/DevelopersForesight/AnimalCrossing"><span data-dcnode-id="3861" instrument_node="">here.</span></a></li><li data-dcnode-id="3846"><span data-dcnode-id="3858" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DidntThinkThisThrough" title="/pmwiki/pmwiki.php/Main/DidntThinkThisThrough"><span data-dcnode-id="3857" instrument_node="">Didn't Think This Through</span></a><span data-dcnode-id="3855" instrument_node="">:</span><ul data-dcnode-id="3847"><li data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node=""> When Tom Nook goes to claim the player's first loan (for flights, land claims, camping supplies, etc.) he suddenly remembers everyone's on a deserted island with nothing remotely resembling an economy. He then agrees to take the loan in Nook Miles to incentivize the player to set up some actual infrastructure.</span></li><li data-dcnode-id="3848"><span data-dcnode-id="3852" instrument_node=""> Tom Nook didn't consider that when he claims that your island will provide fully-furnished homes to new arrivals, customers will naturally </span><em data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">expect</span></em><span data-dcnode-id="3849" instrument_node=""> just that, and you must help him assemble the furniture for the residents moving in who are starting out with houses.</span></li></ul></li><li data-dcnode-id="3841"><span data-dcnode-id="3845" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DifficultButAwesome" title="/pmwiki/pmwiki.php/Main/DifficultButAwesome"><span data-dcnode-id="3844" instrument_node="">Difficult, but Awesome</span></a><span data-dcnode-id="3842" instrument_node="">: Catching tarantulas and scorpions is a dangerous endeavor because they can knock you out with a sting and then run away. But get the technique down and tarantula-infested mystery islands become the best way to farm money that doesn't involve turnips, especially if you sell them to Flick.</span></li><li data-dcnode-id="3836"><span data-dcnode-id="3840" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiscountCard" title="/pmwiki/pmwiki.php/Main/DiscountCard"><span data-dcnode-id="3839" instrument_node="">Discount Card</span></a><span data-dcnode-id="3837" instrument_node="">: Tailors tickets, earned by completing Label's requests, let you get a item valued at 3000 bells or fewer at the Able Sisters' shop for free.</span></li><li data-dcnode-id="3811"><span data-dcnode-id="3835" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DontTryThisAtHome" title="/pmwiki/pmwiki.php/Main/DontTryThisAtHome"><span data-dcnode-id="3834" instrument_node="">Don't Try This at Home</span></a><span data-dcnode-id="3832" instrument_node="">:</span><ul data-dcnode-id="3812"><li data-dcnode-id="3821"><span data-dcnode-id="3831" instrument_node=""> Bamboo shoots are the "fruit" of bamboo trees, in that they spawn next to them the day "tree" is fully grown. You can eat them </span><a class="twikilink" data-dcnode-id="3829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerUpFood" title="/pmwiki/pmwiki.php/Main/PowerUpFood"><span data-dcnode-id="3830" instrument_node="">to temporarily gain the ability to break rocks and lift trees</span></a><span data-dcnode-id="3828" instrument_node="">. One problem, though; you eat them </span><em data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">raw</span></em><span data-dcnode-id="3825" instrument_node="">, in which state they're </span><em data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">poisonous</span></em><span data-dcnode-id="3822" instrument_node=""> in real life.</span></li><li data-dcnode-id="3813"><span data-dcnode-id="3820" instrument_node=""> During the mushroom season in autumn</span><span class="notelabel" data-dcnode-id="3817" onclick="togglenote('note12fxls');" style="cursor: pointer;"><sup data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3815" id="note12fxls" isnote="true" onclick="togglenote('note12fxls');" style="display: none; cursor: pointer;"><span data-dcnode-id="3816" instrument_node="">November in the Northern Hemisphere, May in the Southern Hemisphere</span></span><span data-dcnode-id="3814" instrument_node="">, Isabelle will warn players that though all the island's mushrooms are safe to eat, you shouldn't eat foraged mushrooms in real life if you don't know for certain which they are.</span></li></ul></li><li data-dcnode-id="3800"><span data-dcnode-id="3810" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoofyDodo" title="/pmwiki/pmwiki.php/Main/DoofyDodo"><span data-dcnode-id="3809" instrument_node="">Doofy Dodo</span></a><span data-dcnode-id="3807" instrument_node="">: Two dodos named </span><a class="twikilink" data-dcnode-id="3805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="3806" instrument_node="">Orville and Wilbur</span></a><span data-dcnode-id="3804" instrument_node=""> run the airport, the joke being that flightless birds are the ones flying the plane. They're </span><a class="twikilink" data-dcnode-id="3802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BunnyEarsLawyer" title="/pmwiki/pmwiki.php/Main/BunnyEarsLawyer"><span data-dcnode-id="3803" instrument_node="">competent, but a little ditzy</span></a><span data-dcnode-id="3801" instrument_node=""> with one of them obsessed with military lingo and the other forgetting to lock or even close the door while they're still setting up.</span></li><li data-dcnode-id="3787"><span data-dcnode-id="3799" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoubleUnlock" title="/pmwiki/pmwiki.php/Main/DoubleUnlock"><span data-dcnode-id="3798" instrument_node="">Double Unlock</span></a><span data-dcnode-id="3796" instrument_node="">:</span><ul data-dcnode-id="3788"><li data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node=""> Terraforming. After getting K.K. Slider to come over, you unlock the Island Designer app... only to find that all you can do with it is place and erase dirt paths. The terraforming upgrades (waterscaping and cliff building), along with the ability to place other types of paths, must be subsequently purchased for Nook Miles.</span></li><li data-dcnode-id="3789"><span data-dcnode-id="3793" instrument_node=""> For the </span><em data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="3790" instrument_node=""> expansion, there's designing vacation homes for the game's 62 special characters. You unlock the amiibo scanner after completing seven jobs, but you need to complete twelve more before you're allowed to design homes for Tom Nook, Isabelle, and the rest.</span></li></ul></li><li data-dcnode-id="3774"><span data-dcnode-id="3786" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoWellButNotPerfect" title="/pmwiki/pmwiki.php/Main/DoWellButNotPerfect"><span data-dcnode-id="3785" instrument_node="">Do Well, But Not Perfect</span></a><span data-dcnode-id="3783" instrument_node="">:</span><ul data-dcnode-id="3775"><li data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node=""> Clumps of weeds are crafting materials for certain DIY recipes (e.g. leaf umbrella). While weeds can spawn more weeds, only two "fresh" weed tiles will spawn per day. Completely deweeding your island may hinder your ability to acquire the necessary amount of weeds to make the item without the use of Nook Miles Tickets.</span></li><li data-dcnode-id="3776"><span data-dcnode-id="3780" instrument_node=""> In </span><em data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="3777" instrument_node="">, it doesn't take much to count as having remodeled a client's house. Even if one does not plan to rework a client's house, saving the last elements of the design for a remodel is a quick way to get more Poki.</span></li></ul></li><li data-dcnode-id="3760"><span data-dcnode-id="3773" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownloadableContent" title="/pmwiki/pmwiki.php/Main/DownloadableContent"><span data-dcnode-id="3772" instrument_node="">Downloadable Content</span></a><span data-dcnode-id="3770" instrument_node="">: Rather than being released as a separate game like the previous installment, a </span><em data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">Happy Home Designer</span></em><span data-dcnode-id="3767" instrument_node="">-esque side-game called </span><em data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="3764" instrument_node=""> has been attached to </span><em data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">New Horizons</span></em><span data-dcnode-id="3761" instrument_node=""> as paid downloadable content, giving the base game new gameplay options such as being able to design vacation homes for their villagers by offering them Souvenir Chocolates before going to work, among other features.</span></li><li data-dcnode-id="3752"><span data-dcnode-id="3759" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DreamLand" title="/pmwiki/pmwiki.php/Main/DreamLand"><span data-dcnode-id="3758" instrument_node="">Dream Land</span></a><span data-dcnode-id="3756" instrument_node="">: The Dream Suite functionality from </span><em data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">New Leaf</span></em><span data-dcnode-id="3753" instrument_node=""> returns in Summer Update Wave 2, allowing you to visit instanced versions of other islands.</span></li><li data-dcnode-id="3744"><span data-dcnode-id="3751" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrivesLikeCrazy" title="/pmwiki/pmwiki.php/Main/DrivesLikeCrazy"><span data-dcnode-id="3750" instrument_node="">Drives Like Crazy</span></a><span data-dcnode-id="3748" instrument_node="">: One possible conversation with lazy villagers implies that they exhibit this... and that they're outright </span><em data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">banned</span></em><span data-dcnode-id="3745" instrument_node=""> from driving cars as a result.</span></li></ul></div><div class="folderlabel" data-dcnode-id="3740" onclick="togglefolder('folder1');"><span data-dcnode-id="3741" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; E to G&nbsp;</span></div><div class="folder" data-dcnode-id="3372" id="folder1" isfolder="true" style="display:block;"><ul data-dcnode-id="3373"><li data-dcnode-id="3732"><span data-dcnode-id="3739" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarnYourFun" title="/pmwiki/pmwiki.php/Main/EarnYourFun"><span data-dcnode-id="3738" instrument_node="">Earn Your Fun</span></a><span data-dcnode-id="3736" instrument_node="">: Path marking and terraforming are locked behind an extended tutorial phase. Want to design and build the island of your dreams? First, you'll have to make your way to a three-star island rating </span><em data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">while completely constrained by the terrain of the island and without the ability to mark paths</span></em><span data-dcnode-id="3733" instrument_node="">. Reaching a three-star island rating isn't that easy, as achieving it requires a substantial amount of fully grown flowers and building quite a few bridges and inclines.</span></li><li data-dcnode-id="3727"><span data-dcnode-id="3731" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarWorm" title="/pmwiki/pmwiki.php/Main/EarWorm"><span data-dcnode-id="3730" instrument_node="">Ear Worm</span></a><span data-dcnode-id="3728" instrument_node="">: If a Peppy villager sees you carrying a vaulting pole, they may recite the song for a brand of vaulting pole named "StickThing", then comment that they're going to be humming the tune for a few hours.</span></li><li data-dcnode-id="3701"><span data-dcnode-id="3726" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EasterEgg" title="/pmwiki/pmwiki.php/Main/EasterEgg"><span data-dcnode-id="3725" instrument_node="">Easter Egg</span></a><span data-dcnode-id="3723" instrument_node="">:</span><ul data-dcnode-id="3702"><li data-dcnode-id="3712"><span data-dcnode-id="3722" instrument_node=""> Late at night, TVs normally just play static. But on Saturdays at exactly 3:33 AM, the static is briefly interrupted by </span><a class="twikilink" data-dcnode-id="3720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGreys" title="/pmwiki/pmwiki.php/Main/TheGreys"><span data-dcnode-id="3721" instrument_node="">some sort of alien</span></a><span data-dcnode-id="3719" instrument_node=""> saying something unintelligible and showing off a flying saucer. This is also a </span><a class="twikilink" data-dcnode-id="3717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallBack" title="/pmwiki/pmwiki.php/Main/CallBack"><span data-dcnode-id="3718" instrument_node="">Call-Back</span></a><span data-dcnode-id="3716" instrument_node=""> to the same gag in </span><em data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">New Leaf</span></em><span data-dcnode-id="3713" instrument_node="">, and other alien-related hidden content.</span></li><li data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node=""> If you repeatedly call the Rescue Service in one session, eventually Don Resetti will take the player's call instead of Resetti himself due to Resetti going on break.</span></li><li data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node=""> One of the variations for the chalkboard item is called “Music”, and features a few lines of musical notes. If one were to play those notes in real life, they would discover it’s the title theme.</span></li><li data-dcnode-id="3703"><span data-dcnode-id="3707" instrument_node=""> With the Happy Home Paradise DLC, players can invite shop staff and Paradise Planning to the music festival. This also applies to Dodo Airline's </span><em data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">Wilbur,</span></em><span data-dcnode-id="3704" instrument_node=""> who when invited, takes the center stage and has a title unique to him.</span></li></ul></li><li data-dcnode-id="3696"><span data-dcnode-id="3700" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EncounterBait" title="/pmwiki/pmwiki.php/Main/EncounterBait"><span data-dcnode-id="3699" instrument_node="">Encounter Bait</span></a><span data-dcnode-id="3697" instrument_node="">: Manila clams can be dug up on the beach and crafted into fish bait, which causes a random fish to appear when thrown into a body of water.</span></li><li data-dcnode-id="3688"><span data-dcnode-id="3695" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EpicFail" title="/pmwiki/pmwiki.php/Main/EpicFail"><span data-dcnode-id="3694" instrument_node="">Epic Fail</span></a><span data-dcnode-id="3692" instrument_node="">: Your villagers are... not very good fishers or bug catchers, to say the least. Their fishing rods lack a bobber and lure when they "cast" it into the rivers of your island. Also, every time they swing their net at a bug, they will fail to catch it and the bug will fly off and/or despawn, even against </span><em data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">completely stationary</span></em><span data-dcnode-id="3689" instrument_node=""> targets.</span></li><li data-dcnode-id="3678"><span data-dcnode-id="3687" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EquipmentUpgrade" title="/pmwiki/pmwiki.php/Main/EquipmentUpgrade"><span data-dcnode-id="3686" instrument_node="">Equipment Upgrade</span></a><span data-dcnode-id="3684" instrument_node="">:</span><ul data-dcnode-id="3679"><li data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node=""> By spending accumulated Nook Miles after paying off the Deserted Island Experience Package, the player can unlock various upgrades to their "kit", like having a tool ring selection or extra pocket space.</span></li><li data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node=""> The initial set of tools the player will be able to craft are called flimsy tools, but recipes for regular tools can be learned. They require the flimsy tools and some other kind of material (usually an iron fragment), but they basically become upgraded to be sturdier, better versions of the tools.</span></li></ul></li><li data-dcnode-id="3662"><span data-dcnode-id="3677" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EveryoneHasStandards" title="/pmwiki/pmwiki.php/Main/EveryoneHasStandards"><span data-dcnode-id="3676" instrument_node="">Everyone Has Standards</span></a><span data-dcnode-id="3674" instrument_node="">: Timmy and Tommy will buy </span><em data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">a lot</span></em><span data-dcnode-id="3671" instrument_node=""> of stuff from the player, including random bugs, garbage fished out of the river, and weeds picked from the ground, but one of the few things they </span><em data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">won't</span></em><span data-dcnode-id="3668" instrument_node=""> buy is counterfeit art sold by Redd. </span><span class="notelabel" data-dcnode-id="3665" onclick="togglenote('note13ulys');" style="cursor: pointer;"><sup data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3663" id="note13ulys" isnote="true" onclick="togglenote('note13ulys');" style="display: none; cursor: pointer;"><span data-dcnode-id="3664" instrument_node=""> Nook's history with Redd and Timmy and Tommy's loyalty to Nook aside, it's implied that Timmy and Tommy are paying for your cleanup service to make the island nicer and not paying you for the actual garbage. Buying fake art helps no one in the island, so they won't pay you for it. </span></span></li><li data-dcnode-id="3654"><span data-dcnode-id="3661" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExtendedGameplay" title="/pmwiki/pmwiki.php/Main/ExtendedGameplay"><span data-dcnode-id="3660" instrument_node="">Extended Gameplay</span></a><span data-dcnode-id="3658" instrument_node="">: As with </span><em data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">New Leaf</span></em><span data-dcnode-id="3655" instrument_node="">, get K.K. Slider confirmed for a visit in Project K, he'll show up at the start of the next day and play "Welcome Horizons" for everyone while the credits roll. There's still many things to do after the credits, and you don't get the ability to modify the island's geography until the "post-game" starts. As well, you can view this ending scene again every time you request a song from K.K. Slider onwards.</span></li><li data-dcnode-id="3649"><span data-dcnode-id="3653" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FakeLongevity" title="/pmwiki/pmwiki.php/Main/FakeLongevity"><span data-dcnode-id="3652" instrument_node="">Fake Longevity</span></a><span data-dcnode-id="3650" instrument_node="">: Funding the shops on Harv’s Island in Update 2.0.0 will take a whole week without the use of time travel. This is because the game will not let you build every stall in one day, instead making you wait a whole day after you finish donating to one before you can finish another. Consequently, you can only unlock one stall per day. This prevents eager players from putting down 700,000 bells immediately to unlock everything overnight, forcing the player to check in each day until everything is fully funded and available.</span></li><li data-dcnode-id="3637"><span data-dcnode-id="3648" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FetchQuest" title="/pmwiki/pmwiki.php/Main/FetchQuest"><span data-dcnode-id="3647" instrument_node="">Fetch Quest</span></a><span data-dcnode-id="3645" instrument_node="">:</span><ul data-dcnode-id="3638"><li data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node=""> When building new infrastructure in town, Tom Nook will ask you to collect the materials to make it happen. For instance, to open Nook's Cranny, you need to acquire 30 of each kind of wood as well as 30 iron nuggets.</span></li><li data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node=""> Similarly, you have to give five different kinds of fish or bugs on the island to Tom Nook in the Resident Services tent for Blathers to come to the island. You then have to donate 15 more specimens to allow Blathers to get the authorization to actually build the museum. After the Nature Day update, you need a total of 60 specimens donated before Blathers expresses interest in adding an art exhibit, after which you must meet Redd the following day and buy the painting he offers for you so you can make a donation to initiate the museum expansion.</span></li><li data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node=""> Sometimes villagers will ask the player to catch certain bugs or fish for them. The villager will express their gratitude to the player by giving them a random gift after the delivery is made and there’s no consequences for not accepting the mission. One downside does exist in that if the player does accept the quest and changes their mind about it, they cannot back out of it or talk to the villager about anything else unless the delivery is made. Talking to the villager again only has the villager reiterate what they want and telling the player where to find it. The only way to back out of the mission from that point is to either wait until the next day or time-travel to it.</span></li></ul></li><li data-dcnode-id="3632"><span data-dcnode-id="3636" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Fiction500" title="/pmwiki/pmwiki.php/Main/Fiction500"><span data-dcnode-id="3635" instrument_node="">Fiction 500</span></a><span data-dcnode-id="3633" instrument_node="">: At this point Tom Nook is apparently wealthy enough that he owns several islands around the world, his own smartphone line, and construction and shipping companies, and merely brushes off the fact his apprentices are paying people thousands of Bells for literal trash. Apparently years of interest-free, no-deadline housing payments still managed to pay off!</span></li><li data-dcnode-id="3627"><span data-dcnode-id="3631" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FightClubbing" title="/pmwiki/pmwiki.php/Main/FightClubbing"><span data-dcnode-id="3630" instrument_node="">Fight Clubbing</span></a><span data-dcnode-id="3628" instrument_node="">: Donating enough of the summer night beetles to the museum will somehow have them set up one of these every night in the main bug exhibit room's giant tree. The opposing beetles will lock horns (or jaws) for several seconds while other beetles surround them as spectators. One beetle will eventually be knocked off and fly away, declared the loser. You can keep watching beetle fights if you exit and re-enter the room.</span></li><li data-dcnode-id="3622"><span data-dcnode-id="3626" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FirewoodResources" title="/pmwiki/pmwiki.php/Main/FirewoodResources"><span data-dcnode-id="3625" instrument_node="">Firewood Resources</span></a><span data-dcnode-id="3623" instrument_node="">: The wood, softwood and hardwood harvested from trees appear as small bundles of three log wedges, of the kind one might make to use as firewood, despite the fact that these are used to make items such as wooden furniture — including furniture visibly made from whole, un-split logs.</span></li><li data-dcnode-id="3617"><span data-dcnode-id="3621" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FishEyeLens" title="/pmwiki/pmwiki.php/Main/FishEyeLens"><span data-dcnode-id="3620" instrument_node="">Fish-Eye Lens</span></a><span data-dcnode-id="3618" instrument_node="">: One of the photo app filters added in the Version 2.0 update is a fisheye lens.</span></li><li data-dcnode-id="3606"><span data-dcnode-id="3616" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FishingForSole" title="/pmwiki/pmwiki.php/Main/FishingForSole"><span data-dcnode-id="3615" instrument_node="">Fishing for Sole</span></a><span data-dcnode-id="3613" instrument_node="">: Cans, tires, and even old boots can be reeled in by fishing (curiously, they all act exactly like normal fish until you pull them out of the water); one of the Mystery Tour islands even spawns </span><em data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">only</span></em><span data-dcnode-id="3610" instrument_node=""> garbage and no fish. Junk items can be recycled via DIY recipes into unique items, wallpaper/flooring or even a pair of boots to wear. You can occasionally pull up a stone, too, like the ones you get from hitting rocks. During the Bunny Day event, eggs often disguise themselves as medium-sized fish, with your character saying </span><a class="twikilink" data-dcnode-id="3608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CaptainObvious" title="/pmwiki/pmwiki.php/Main/CaptainObvious"><span data-dcnode-id="3609" instrument_node="">"That's an egg, not a fish!"</span></a><span data-dcnode-id="3607" instrument_node=""> each time you get one. Fortunately, using bait guarantees actual fish.</span></li><li data-dcnode-id="3601"><span data-dcnode-id="3605" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FrigidWaterIsHarmless" title="/pmwiki/pmwiki.php/Main/FrigidWaterIsHarmless"><span data-dcnode-id="3604" instrument_node="">Frigid Water Is Harmless</span></a><span data-dcnode-id="3602" instrument_node="">: You can swim in the ocean even when it's winter in your hemisphere and the snow on the ground indicates that the water must be cold. You wear a wet suit, but, generally, dry suits are needed for colder water, and one of the suit options has shorts on the bottom while others are sleeveless.</span></li><li data-dcnode-id="3577"><span data-dcnode-id="3600" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FunWithAcronyms" title="/pmwiki/pmwiki.php/Main/FunWithAcronyms"><span data-dcnode-id="3599" instrument_node="">Fun with Acronyms</span></a><span data-dcnode-id="3597" instrument_node="">: One of the possible descriptions when investigating a lost item is seeing it has the phrase "Bikers Are More Fun" embroidered on it. Think about what... </span><em data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">other</span></em><span data-dcnode-id="3594" instrument_node=""> phrase that has that acronym.</span><span class="notelabel" data-dcnode-id="3591" onclick="togglenote('note1460qw');" style="cursor: pointer;"><sup data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3578" id="note1460qw" isnote="true" onclick="togglenote('note1460qw');" style="display: none; cursor: pointer;"><strong data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">B</span></strong><span data-dcnode-id="3588" instrument_node="">ad </span><strong data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">A</span></strong><span data-dcnode-id="3585" instrument_node="">ss </span><strong data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">M</span></strong><span data-dcnode-id="3582" instrument_node="">other </span><strong data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">F</span></strong><span data-dcnode-id="3579" instrument_node="">ucker</span></spa
