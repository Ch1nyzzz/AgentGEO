 instrument_node="">Unintentionally Unwinnable</span></a><span data-dcnode-id="1626" instrument_node="">:</span><ul data-dcnode-id="1603"><li data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node=""> Subversion: the game may assign you Nook Miles+ missions that are impossible to complete—for example, asking you to sell items or have fossils assessed when the relevant facilities are closed for renovations. However, you can fulfill these goals by visiting another player's island, if you're able.</span></li><li data-dcnode-id="1612"><span data-dcnode-id="1623" instrument_node=""> The Nature Day update featured a rather severe bug involving Redd. Specifically, if you talk to Blathers after making 60 donations and he announces the intent to upgrade the museum, buy the first art piece from Redd (which will always be genuine) and then gift it away or sell it instead of donating it, your museum will never upgrade and once Redd leaves he will never visit your island ever again, leaving your museum stuck without an art wing.</span><span class="notelabel" data-dcnode-id="1620" onclick="togglenote('note33qyxw');" style="cursor: pointer;"><sup data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1618" id="note33qyxw" isnote="true" onclick="togglenote('note33qyxw');" style="display: none; cursor: pointer;"><span data-dcnode-id="1619" instrument_node="">There is a known workaround, but requires a friend who has completed the museum upgrade and has Redd visit to bring you a genuine art piece to deliver to Blathers, after which is done the museum will upgrade and Redd will once again visit as usual. No word if Redd will sell you art if you visit him on another island or if he will refuse because your quest chain is stuck in an unexpected state, but the current known workaround will cause inconvenience to another player since the player is also bound to the rule of only one art piece per Redd visit. Either way, if you cannot go online, your only resolve is to restart the whole game.</span></span><span data-dcnode-id="1617" instrument_node=""> The reason most people didn't encounter this bug was because of </span><img class="ymmv1 rounded" data-dcnode-id="1616" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ComplacentGamingSyndrome" title="/pmwiki/pmwiki.php/Main/ComplacentGamingSyndrome"><span data-dcnode-id="1615" instrument_node="">Complacent Gaming Syndrome</span></a><span data-dcnode-id="1613" instrument_node="">, it was discovered by a player whose young son gave the painting away when she left him with the Switch unsupervised. This was eventually addressed in version 2.0 by removing that initial Redd encounter and having the museum start with the art wing when built.</span></li><li data-dcnode-id="1604"><span data-dcnode-id="1611" instrument_node=""> The July 2020 update features a very major bug in regards to getting the Mermaid DIYs. Usually whenever you get a scallop, Pascal will offer to obtain your scallop in exchange for either a piece of Mermaid clothing, a Mermaid DIY, or a pearl. However, should one have any Mermaid furniture catalogued</span><span class="notelabel" data-dcnode-id="1608" onclick="togglenote('note1e3p3');" style="cursor: pointer;"><sup data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">*&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1606" id="note1e3p3" isnote="true" onclick="togglenote('note1e3p3');" style="display: none; cursor: pointer;"><span data-dcnode-id="1607" instrument_node="">That is having the items available on the Nook Shopping app after grabbing it</span></span><span data-dcnode-id="1605" instrument_node="">, Pascal will not give that particular furniture its respective recipe, making it impossible to complete the Mermaid set (unless you make another account to get the DIY recipes from) if by chance you already catalogued the entire set alone.</span></li></ul></li><li data-dcnode-id="1594"><span data-dcnode-id="1601" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnseenNoMore" title="/pmwiki/pmwiki.php/Main/UnseenNoMore"><span data-dcnode-id="1600" instrument_node="">Unseen No More</span></a><span data-dcnode-id="1598" instrument_node="">: Prior to the Version 2.0 update, Mr. Resetti and his brother Don were only present in the game as </span><a class="twikilink" data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheVoice" title="/pmwiki/pmwiki.php/Main/TheVoice"><span data-dcnode-id="1597" instrument_node="">voices</span></a><span data-dcnode-id="1595" instrument_node=""> when using the Rescue Service, and can't be contacted with amiibo. They can now be occasionally seen in person at the Roost, and have all the amiibo functionality of the other special characters.</span></li><li data-dcnode-id="1589"><span data-dcnode-id="1593" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VagueAge" title="/pmwiki/pmwiki.php/Main/VagueAge"><span data-dcnode-id="1592" instrument_node="">Vague Age</span></a><span data-dcnode-id="1590" instrument_node="">: Even more so than the previous games with most types of villager save for the Cranky types, who make it explicitly clear that they're older than everyone else, and the Snooty types, who seem adult-like for the most part.</span></li><li data-dcnode-id="1553"><span data-dcnode-id="1588" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGameCrueltyPotential" title="/pmwiki/pmwiki.php/Main/VideoGameCrueltyPotential"><span data-dcnode-id="1587" instrument_node="">Video Game Cruelty Potential</span></a><span data-dcnode-id="1585" instrument_node="">:</span><ul data-dcnode-id="1554"><li data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node=""> The cruel things you could always do to the villagers return: whacking them with a net, not curing their flea problem, leading them into pitfalls, etc. It’s also common to build fences around villagers’ homes to get them to leave.</span></li><li data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node=""> You can trigger Blathers's fear of bugs by showing off any bug in the main room of the museum while he is awake; he will become visibly uncomfortable.</span></li><li data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node=""> Pitfalls seeds are DIY items in this game, meaning that the player has to craft and place them to torment their villagers, rather than them just appearing where an unwitting villager has chosen to walk by chance.</span></li><li data-dcnode-id="1571"><span data-dcnode-id="1578" instrument_node=""> The easiest way to get lots of "rusted parts" for constructing a </span><a class="twikilink" data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiantRobot" title="/pmwiki/pmwiki.php/Main/GiantRobot"><span data-dcnode-id="1577" instrument_node="">Robot Hero</span></a><span data-dcnode-id="1575" instrument_node=""> is to wait for Gulliver to wash up on your beach, dig up his communicator parts, then </span><em data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">not</span></em><span data-dcnode-id="1572" instrument_node=""> return them. If you hold onto them until the next day, they become rusted parts. Giving them back to him rewards you with one part (found in the island recycle bin) and a random special item, but not doing so earns you 5 parts (and no special item). Without those components, Gulliver can't fix his phone to call his shipmates, but that's his problem, apparently. Not helping is the implication that his shipmates are ignoring him for being too frequent a repeat offender when he does get the communicator fixed and puts out the distress call. Same thing happens with Gullivarrr; if you don't return his water-logged communicator, it degrades into a stack of five rusted parts the next day.</span></li><li data-dcnode-id="1562"><span data-dcnode-id="1570" instrument_node=""> June's "Wedding Season" event sees the player setting up wedding anniversary photos for Reese and Cyrus on Harv's Island. Some players have gotten... a </span><em data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">bit</span></em><span data-dcnode-id="1567" instrument_node=""> </span><a class="urllink" data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.polygon.com/2020/6/1/21277328/animal-crossing-new-horizons-wedding-season-reactions"><span data-dcnode-id="1566" instrument_node="">off-track</span><img data-dcnode-id="1565" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1563" instrument_node=""> with that request. Humorously, it’s still possible for Reese to like the photos with wacky set designs.</span></li><li data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node=""> The dislike of Bunny Day has led to players putting Zipper in a cell made from the jail bars DIY simply for his association with the event.</span></li><li data-dcnode-id="1555"><span data-dcnode-id="1559" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AvertedTrope" title="/pmwiki/pmwiki.php/Main/AvertedTrope"><span data-dcnode-id="1558" instrument_node="">Averted</span></a><span data-dcnode-id="1556" instrument_node=""> starting in version 1.3.0: after said update running bugs no longer fall into water if chased to the edge, instead they fly, jump, or skitter away depending on their locomotive capabilities (hopping bugs can still go in, though). Released non-flying bugs will drop at the player's feet and flee in the same way.</span></li></ul></li><li data-dcnode-id="1482"><span data-dcnode-id="1552" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGamePerversityPotential" title="/pmwiki/pmwiki.php/Main/VideoGamePerversityPotential"><span data-dcnode-id="1551" instrument_node="">Video Game Perversity Potential</span></a><span data-dcnode-id="1549" instrument_node="">:</span><ul data-dcnode-id="1483"><li data-dcnode-id="1544"><span data-dcnode-id="1548" instrument_node=""> Despite the measures taken to maintain the E-rating, people have gotten... creative when it comes to getting around them. Shaving off one of the Ls on "Hell", for example, or naming their home </span><a class="twikilink" data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheProblemWithPenIsland" title="/pmwiki/pmwiki.php/Main/TheProblemWithPenIsland"><span data-dcnode-id="1547" instrument_node="">Pen Island</span></a><span data-dcnode-id="1545" instrument_node="">. More ambitious players have abused the custom outfit designer to create nude-suits, and players are full-on uploading pornographic images with the QR scanner. They will be reported if posted online, but if you don’t...</span></li><li data-dcnode-id="1533"><span data-dcnode-id="1543" instrument_node=""> Harv's Island, being a free-for-all photo studio, opens up the game to quite some abuse as shown on Taiwanese and Hong Kong social media accounts. Sure, it'll be tame since </span><a class="twikilink" data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SceneryCensor" title="/pmwiki/pmwiki.php/Main/SceneryCensor"><span data-dcnode-id="1542" instrument_node="">Scenery Censor</span></a><span data-dcnode-id="1540" instrument_node=""> has to be used to murky out the scene and invite the viewer to use their imagination, but with some carefully set emotions, strategically placed furniture and </span><a class="twikilink" data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManipulativeEditing" title="/pmwiki/pmwiki.php/Main/ManipulativeEditing"><span data-dcnode-id="1539" instrument_node="">careful camera angles</span></a><span data-dcnode-id="1537" instrument_node=""> (and maybe nude-suits), you can imply one villager is doing the deed with another... Not helping is the fact that the main room accidentally resembles a </span><a class="twikilink" data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CastingCouch" title="/pmwiki/pmwiki.php/Main/CastingCouch"><span data-dcnode-id="1536" instrument_node="">Casting Couch</span></a><span data-dcnode-id="1534" instrument_node=""> room.</span></li><li data-dcnode-id="1522"><span data-dcnode-id="1532" instrument_node=""> And, as always, the custom designs can be used for </span><em data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">any</span></em><span data-dcnode-id="1529" instrument_node=""> kind of artwork. New to </span><em data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">New Horizons</span></em><span data-dcnode-id="1526" instrument_node=""> is the ability to display canvases of your designs on your wall at multiple heights, which combined with the much more easily obtainable villager posters this time around has already lead to some...</span><em data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">weird</span></em><span data-dcnode-id="1523" instrument_node=""> images going around on the internet.</span></li><li data-dcnode-id="1495"><span data-dcnode-id="1521" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoodleImplements" title="/pmwiki/pmwiki.php/Main/NoodleImplements"><span data-dcnode-id="1520" instrument_node="">Statue of Michelangelo's</span></a><span data-dcnode-id="1518" instrument_node=""> </span><em data-dcnode-id="1515"><a class="twikilink" data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Art/David" title="/pmwiki/pmwiki.php/Art/David"><span data-dcnode-id="1517" instrument_node="">David</span></a></em><span data-dcnode-id="1514" instrument_node="">. </span><a class="twikilink" data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoodleImplements" title="/pmwiki/pmwiki.php/Main/NoodleImplements"><span data-dcnode-id="1513" instrument_node="">Punching bag</span></a><span data-dcnode-id="1511" instrument_node="">. </span><a class="twikilink" data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManipulativeEditing" title="/pmwiki/pmwiki.php/Main/ManipulativeEditing"><span data-dcnode-id="1510" instrument_node="">Wonky camera angle</span></a><span data-dcnode-id="1508" instrument_node="">. </span><a class="twikilink" data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ComedicSociopathy" title="/pmwiki/pmwiki.php/Main/ComedicSociopathy"><span data-dcnode-id="1507" instrument_node="">Comedic Sociopathy</span></a><span data-dcnode-id="1505" instrument_node=""> </span><a class="urllink" data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imgur.com/a/xEtRHkp"><span data-dcnode-id="1504" instrument_node="">ensues</span><img data-dcnode-id="1503" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1501" instrument_node="">.</span><span class="notelabel" data-dcnode-id="1498" onclick="togglenote('note34nmq5');" style="cursor: pointer;"><sup data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1496" id="note34nmq5" isnote="true" onclick="togglenote('note34nmq5');" style="display: none; cursor: pointer;"><span data-dcnode-id="1497" instrument_node="">Nevermind that the statue comes with complete anatomy, both in its genuine and forgery versions, in the first place.</span></span></li><li data-dcnode-id="1484"><span data-dcnode-id="1494" instrument_node=""> There is no apparent profanity filter for the characters nor the player; while there </span><em data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">is</span></em><span data-dcnode-id="1491" instrument_node=""> one for letters and bulletin board messages, in which typed-out offensive words are rendered as an asterisk, there isn't one for anything beyond that. Due to this, there have been some hilarious mishaps where islanders have picked up and reiterated inappropriate words used by players. You can also name your island pretty much anything due to the lack of a filter. And let's not get started on non-English cuss words, romanized from non-Latin alphabet or otherwise, which the game seemingly ignores</span><span class="notelabel" data-dcnode-id="1488" onclick="togglenote('note35k0jv');" style="cursor: pointer;"><sup data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1486" id="note35k0jv" isnote="true" onclick="togglenote('note35k0jv');" style="display: none; cursor: pointer;"><span data-dcnode-id="1487" instrument_node="">ironically, this is how people in Malaysia, Indonesia and Singapore are used to cussing online — by typing out the pronunciation of the cuss word with Latin characters instead of in their native scripture</span></span><span data-dcnode-id="1485" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1457"><span data-dcnode-id="1481" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ViolationOfCommonSense" title="/pmwiki/pmwiki.php/Main/ViolationOfCommonSense"><span data-dcnode-id="1480" instrument_node="">Violation of Common Sense</span></a><span data-dcnode-id="1478" instrument_node="">: </span><ul data-dcnode-id="1458"><li data-dcnode-id="1464"><span data-dcnode-id="1476" instrument_node=""> Hitting a villager repeatedly with a net, not surprisingly, upsets them, and costs you three friendship points. If you apologize, there's a 20% chance you'll gain those three points back; if this happens, and you talk to them a second time, you get </span><em data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">another</span></em><span data-dcnode-id="1473" instrument_node=""> three points. Combining this with </span><a class="twikilink" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SaveScumming" title="/pmwiki/pmwiki.php/Main/SaveScumming"><span data-dcnode-id="1472" instrument_node="">Save Scumming</span></a><span data-dcnode-id="1470" instrument_node=""> lets you grind to max friendship by whacking your "friend" with a net over and over.</span><span class="notelabel" data-dcnode-id="1467" onclick="togglenote('note36auku');" style="cursor: pointer;"><sup data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1465" id="note36auku" isnote="true" onclick="togglenote('note36auku');" style="display: none; cursor: pointer;"><span data-dcnode-id="1466" instrument_node="">This is more funny than practical, though, since you have to restart the game 80% of the time. If you really want to get to best friends quickly, it's easier and more consistent to "time travel" and talk to them and/or give them a gift every ingame day.</span></span></li><li data-dcnode-id="1459"><span data-dcnode-id="1463" instrument_node=""> One of the trash DIY recipes is for (filled and tied up) trash bags. If you place it outside, not only does it contribute </span><em data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">positively</span></em><span data-dcnode-id="1460" instrument_node=""> to your island rating, it even gives an additional bonus because it has the "outdoor" tag.</span></li></ul></li><li data-dcnode-id="1452"><span data-dcnode-id="1456" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ViralUnlockable" title="/pmwiki/pmwiki.php/Main/ViralUnlockable"><span data-dcnode-id="1455" instrument_node="">Viral Unlockable</span></a><span data-dcnode-id="1453" instrument_node="">: Zig-zagged with the Pitfall recipe. You can randomly obtain a DIY card with the recipe from a bottle, balloon or Jock villager, but you can also learn how to craft one by digging up a Pitfall that another player has set, which causes you to come up with the recipe on the spot.</span></li><li data-dcnode-id="1447"><span data-dcnode-id="1451" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VirtualPaperDoll" title="/pmwiki/pmwiki.php/Main/VirtualPaperDoll"><span data-dcnode-id="1450" instrument_node="">Virtual Paper Doll</span></a><span data-dcnode-id="1448" instrument_node="">: Per usual, the player character is this but the villagers themselves can become this when invited to Harv's Island, giving the player the option to choose what they wear for the photo shoots and scene set ups.</span></li><li data-dcnode-id="1439"><span data-dcnode-id="1446" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VirtuousBees" title="/pmwiki/pmwiki.php/Main/VirtuousBees"><span data-dcnode-id="1445" instrument_node="">Virtuous Bees</span></a><span data-dcnode-id="1443" instrument_node="">: This installment finally corrects the translation error by making the bees that attack you into wasps, so now only the completely peaceful honeybees are left. </span><a class="twikilink" data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhyDidItHaveToBeSnakes" title="/pmwiki/pmwiki.php/Main/WhyDidItHaveToBeSnakes"><span data-dcnode-id="1442" instrument_node="">Blathers</span></a><span data-dcnode-id="1440" instrument_node=""> even admits (if a bit reluctantly) that bees are a bug "a wee bit less ghastly than most, I admit."</span></li><li data-dcnode-id="1431"><span data-dcnode-id="1438" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeBuyAnything" title="/pmwiki/pmwiki.php/Main/WeBuyAnything"><span data-dcnode-id="1437" instrument_node="">We Buy Anything</span></a><span data-dcnode-id="1435" instrument_node="">: Timmy and Tommy will buy everything the player presents to them, including weeds this time. </span><a class="twikilink" data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Lampshaded" title="/pmwiki/pmwiki.php/Main/Lampshaded"><span data-dcnode-id="1434" instrument_node="">Lampshaded</span></a><span data-dcnode-id="1432" instrument_node=""> by Tom Nook, who comments that this isn't a particularly sound business plan.</span></li><li data-dcnode-id="1414"><span data-dcnode-id="1430" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WelcomeToCorneria" title="/pmwiki/pmwiki.php/Main/WelcomeToCorneria"><span data-dcnode-id="1429" instrument_node="">Welcome to Corneria</span></a><span data-dcnode-id="1427" instrument_node="">: The first time you chat with one of your villagers in a day while they're outside, they will say one of several preset lines based on their personality. Slightly alleviated with version 2.0 that slightly expanded said dialogue pool.</span><div class="indent" data-dcnode-id="1423"><strong data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Jock villager:</span></strong><span data-dcnode-id="1424" instrument_node=""> I like to name my muscles. Like, in my six pack, I've got Abigail, Abdul, Abe, Abby, Abel, and Abner. My abs!</span></div><div class="indent" data-dcnode-id="1419"><strong data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Lazy villager:</span></strong><span data-dcnode-id="1420" instrument_node=""> The weather is great today! I'm gonna lay down in the grass and talk to some bugs!</span></div><div class="indent" data-dcnode-id="1415"><strong data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Snooty villager:</span></strong><span data-dcnode-id="1416" instrument_node=""> Isn't this weather gorgeous, [catchphrase]? It makes [island name] look as if it could be the background for a fashion shoot!</span></div></li><li data-dcnode-id="1409"><span data-dcnode-id="1413" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WholesomeCrossdresser" title="/pmwiki/pmwiki.php/Main/WholesomeCrossdresser"><span data-dcnode-id="1412" instrument_node="">Wholesome Crossdresser</span></a><span data-dcnode-id="1410" instrument_node="">: The villagers, male or female, have no qualms against wearing dresses or suits regardless of their gender. The smug villagers outright say they don't mind wearing anything so long as it's cute.</span></li><li data-dcnode-id="1390"><span data-dcnode-id="1408" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WickedWasps" title="/pmwiki/pmwiki.php/Main/WickedWasps"><span data-dcnode-id="1407" instrument_node="">Wicked Wasps</span></a><span data-dcnode-id="1405" instrument_node="">: The creatures previously localized as "bees" have finally been correctly localized as wasps,</span><span class="notelabel" data-dcnode-id="1402" onclick="togglenote('note37u39v');" style="cursor: pointer;"><sup data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1392" id="note37u39v" isnote="true" onclick="togglenote('note37u39v');" style="display: none; cursor: pointer;"><span data-dcnode-id="1401" instrument_node="">they were specifically based on </span><a class="urllink" data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japanese_giant_hornet"><span data-dcnode-id="1400" instrument_node="">Japanese giant hornets</span><img data-dcnode-id="1399" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1397" instrument_node=""> in previous games and are designed after the more ubiquitous </span><a class="urllink" data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yellowjacket"><span data-dcnode-id="1396" instrument_node="">yellowjacket</span><img data-dcnode-id="1395" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1393" instrument_node=""> here, but since the Japanese word "hachi" refers to bees and wasps collectively, it's been a longstanding mistranslation in the series</span></span><span data-dcnode-id="1391" instrument_node=""> and as in previous games, they will sting you if you shake them out of a tree. New to this game is that if you get stung while you've still got a puffy eye, the sting will knock you out just like a tarantula or scorpion attack.</span></li><li data-dcnode-id="1385"><span data-dcnode-id="1389" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WishUponAShootingStar" title="/pmwiki/pmwiki.php/Main/WishUponAShootingStar"><span data-dcnode-id="1388" instrument_node="">Wish Upon a Shooting Star</span></a><span data-dcnode-id="1386" instrument_node="">: Whenever meteors appear, you can look up at the sky using the right stick and wish upon the meteor, represented by said meteor glowing brightly when wished upon. The next day, star fragments will wash up on shore. How many you get depends on how many wishes you made, and you may get fragments of specific stars or constellations as well. Unlike previous games, though, you won't always get the same number of items as the number of wishes you made. Celeste sometimes appears at night, giving out recipes for items which require these star fragments to create.</span></li><li data-dcnode-id="1370"><span data-dcnode-id="1384" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordSaladHumor" title="/pmwiki/pmwiki.php/Main/WordSaladHumor"><span data-dcnode-id="1383" instrument_node="">Word-Salad Humor</span></a><span data-dcnode-id="1381" instrument_node="">: Wilbur's codenames when you talk to him about returning from an island are complete nonsense, which just makes them sillier when combined with his stone-faced personality.</span><div class="indent" data-dcnode-id="1371"><em data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node="">Bellbottom </span><a class="twikilink" data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SurfRock" title="/pmwiki/pmwiki.php/Main/SurfRock"><span data-dcnode-id="1379" instrument_node="">Surf Rock</span></a><span data-dcnode-id="1377" instrument_node=""> this is Stovetop Pocket Watch, do you require assistance?</span></em><span data-dcnode-id="1375" instrument_node=""> </span><br data-dcnode-id="1374"><em data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Trainwreck banana bread is reporting tango step aerobics is go.</span></em></div></li><li data-dcnode-id="1354"><span data-dcnode-id="1369" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouHaveResearchedBreathing" title="/pmwiki/pmwiki.php/Main/YouHaveResearchedBreathing"><span data-dcnode-id="1368" instrument_node="">You Have Researched Breathing</span></a><span data-dcnode-id="1366" instrument_node="">:</span><ul data-dcnode-id="1355"><li data-dcnode-id="1361"><span data-dcnode-id="1365" instrument_node=""> You can't use </span><a class="twikilink" data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EmoteAnimation" title="/pmwiki/pmwiki.php/Main/EmoteAnimation"><span data-dcnode-id="1364" instrument_node="">Emote Animations</span></a><span data-dcnode-id="1362" instrument_node=""> until one of your villagers teaches you your first one, so you cannot smile, express surprise, etc. until someone shows you the ropes. Additional emotes beyond the handful of basic ones must also be learned individually. The "Shocked" emote is the worst example, as your character does it automatically upon knocking down a wasp nest or dropping a present into a body of water, but you can't do it manually until a villager teaches it to you.</span></li><li data-dcnode-id="1356"><span data-dcnode-id="1360" instrument_node=""> Some of the DIY "recipes" seem entirely too trivial to require instructions, such as the "cherry-blossom pile" or "green-leaf pile," both of which are </span><a class="twikilink" data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="1359" instrument_node="">literally just piles of plant matter</span></a><span data-dcnode-id="1357" instrument_node=""> but crafting either requires you to read a limited-edition recipe item. Some simple constructions like the "tire stack" avoid this by having your character learn the recipe automatically after getting the necessary items.</span></li></ul></li><li data-dcnode-id="1337"><span data-dcnode-id="1353" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YoungerAndHipper" title="/pmwiki/pmwiki.php/Main/YoungerAndHipper"><span data-dcnode-id="1352" instrument_node="">Younger and Hipper</span></a><span data-dcnode-id="1350" instrument_node="">: Several of the visiting characters of prior games have been replaced with </span><a class="twikilink" data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuspiciouslySimilarSubstitute" title="/pmwiki/pmwiki.php/Main/SuspiciouslySimilarSubstitute"><span data-dcnode-id="1349" instrument_node="">Suspiciously Similar Substitutes</span></a><span data-dcnode-id="1347" instrument_node=""> that are more youthful (if not just direct descendants), but more or less serve the same purpose. Nat is replaced by Flick (who is implied to be Nat's son), who, much unlike the British jungle explorer-equipped Nat, is a punk-dressed lizard who contemplates bugs heavily and does art commissions on the side; Chip is replaced by his son C.J., an energetic livestreamer who specializes in a fishing equivalent of e-sports that he dubs "seasports" as opposed to Chip's more classic fisherman theme; and Joan has retired and allowed her granddaughter Daisy Mae to sell turnips in her place. In a case not involving a new character, Label replaces her mentor Gracie in the role of visiting fashion judge since she's left her sisters again to start her own fashion brand</span><span class="notelabel" data-dcnode-id="1344" onclick="togglenote('note38254i');" style="cursor: pointer;"><sup data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1339" id="note38254i" isnote="true" onclick="togglenote('note38254i');" style="display: none; cursor: pointer;"><span data-dcnode-id="1343" instrument_node="">Albeit still keeping in touch unlike in </span><em data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">City Folk</span></em><span data-dcnode-id="1340" instrument_node="">. Following a visit from her, talking to Sable after she's warmed up to the player will have her thanking the player for assisting Label while also mentioning that she visits the shop during trips to the island</span></span><span data-dcnode-id="1338" instrument_node="">.</span></li><li data-dcnode-id="1332"><span data-dcnode-id="1336" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouNoTakeCandle" title="/pmwiki/pmwiki.php/Main/YouNoTakeCandle"><span data-dcnode-id="1335" instrument_node="">You No Take Candle</span></a><span data-dcnode-id="1333" instrument_node="">: As was the case in previous games, Saharah the rug-peddling camel talks in strange broken English, saying things like "Yes, a rug for your purchasing. What size shall be the rug of yours?"</span></li></ul></div><hr data-dcnode-id="1329"><span data-dcnode-id="1328" instrument_node="">
