php/Main/MassOhCrap"><span data-dcnode-id="2956" instrument_node="">Mass "Oh, Crap!"</span></a><span data-dcnode-id="2954" instrument_node="">: If other villagers are near you when a wasp nest falls out of a tree or when an attacking tarantula/scorpion is in the vicinity, they're just as panicked as you are.</span></li><li data-dcnode-id="2943"><span data-dcnode-id="2952" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMaze" title="/pmwiki/pmwiki.php/Main/TheMaze"><span data-dcnode-id="2951" instrument_node="">The Maze</span></a><span data-dcnode-id="2949" instrument_node="">: During the first week of May, Tom Nook grants the player as special Nook Miles ticket in honor of May Day, which transports them to a unique hedge maze island, filled with narrow passages and holes to jump across. Getting to the end requires finding tools and materials hidden throughout the maze. Reaching the end rewards you with several bell vouchers (more can be reached if you play perfectly) and lets you meet Rover, who gives away his briefcase as a furniture item.</span><span class="notelabel" data-dcnode-id="2946" onclick="togglenote('note20cbj2');" style="cursor: pointer;"><sup data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2944" id="note20cbj2" isnote="true" onclick="togglenote('note20cbj2');" style="display: none; cursor: pointer;"><span data-dcnode-id="2945" instrument_node="">In 2021, the second year the May Day tour was featured, the maze was changed, requiring the use of different tools versus the previous year. This time around, reaching Rover rewards the player with his photo.</span></span></li><li data-dcnode-id="2935"><span data-dcnode-id="2942" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="2941" instrument_node="">Meaningful Name</span></a><span data-dcnode-id="2939" instrument_node="">: The dodos who run the airport are named Orville and Wilbur, as in fellow flight enthusiasts </span><a class="twikilink" data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/TheWrightBrothers" title="/pmwiki/pmwiki.php/UsefulNotes/TheWrightBrothers"><span data-dcnode-id="2938" instrument_node="">The Wright Brothers</span></a><span data-dcnode-id="2936" instrument_node="">.</span></li><li data-dcnode-id="2921"><span data-dcnode-id="2934" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MechVsBeast" title="/pmwiki/pmwiki.php/Main/MechVsBeast"><span data-dcnode-id="2933" instrument_node="">Mech vs. Beast</span></a><span data-dcnode-id="2931" instrument_node="">: One of the possible programs that may appear on television furniture is what appears to be a </span><a class="twikilink" data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Toku" title="/pmwiki/pmwiki.php/Main/Toku"><span data-dcnode-id="2930" instrument_node="">toku</span></a><span data-dcnode-id="2928" instrument_node=""> movie of the </span><a class="twikilink" data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumongousMecha" title="/pmwiki/pmwiki.php/Main/HumongousMecha"><span data-dcnode-id="2927" instrument_node="">Robot Hero</span></a><span data-dcnode-id="2925" instrument_node=""> fighting the </span><a class="twikilink" data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Notzilla" title="/pmwiki/pmwiki.php/Main/Notzilla"><span data-dcnode-id="2924" instrument_node="">Monster</span></a><span data-dcnode-id="2922" instrument_node=""> (the same as the ones available at the Nook Stop terminal).</span></li><li data-dcnode-id="2910"><span data-dcnode-id="2920" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MilitaryAlphabet" title="/pmwiki/pmwiki.php/Main/MilitaryAlphabet"><span data-dcnode-id="2919" instrument_node="">Military Alphabet</span></a><span data-dcnode-id="2917" instrument_node="">: Wilbur uses the NATO variation frequently, tying in with his profession as a pilot. The only major liberty is that "Whiskey" (W) is replaced with "Whisker," acting both as </span><a class="twikilink" data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Bowdlerization" title="/pmwiki/pmwiki.php/Main/Bowdlerization"><span data-dcnode-id="2916" instrument_node="">Bowdlerization</span></a><span data-dcnode-id="2914" instrument_node=""> and a case of </span><a class="twikilink" data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HoldYourHippogriffs" title="/pmwiki/pmwiki.php/Main/HoldYourHippogriffs"><span data-dcnode-id="2913" instrument_node="">Hold Your Hippogriffs</span></a><span data-dcnode-id="2911" instrument_node=""> (given the game's cast of anthropomorphic animals).</span></li><li data-dcnode-id="2905"><span data-dcnode-id="2909" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MissingSecret" title="/pmwiki/pmwiki.php/Main/MissingSecret"><span data-dcnode-id="2908" instrument_node="">Missing Secret</span></a><span data-dcnode-id="2906" instrument_node="">: Manila clams have all the traits of a standard "Critter" item: there's an animation and text box when you dig one up, they have a unique pockets icon and the "Show it off!" option when selected, they don't stack, and they can't be thrown away with a trash can. However, the game counts them as part of the "Other" category with other crafting materials, so they can't be donated to the museum or placed on display. Even after deep-sea creatures were added into a later update, manila clams still don't directly qualify as a critter.</span></li><li data-dcnode-id="2900"><span data-dcnode-id="2904" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MobySchtick" title="/pmwiki/pmwiki.php/Main/MobySchtick"><span data-dcnode-id="2903" instrument_node="">Moby Schtick</span></a><span data-dcnode-id="2901" instrument_node="">: When you catch a whale shark—technically a fish, not a whale, but the biggest ocean fish in the game—your character shouts "THAR SHE BLOWS!"</span></li><li data-dcnode-id="2884"><span data-dcnode-id="2899" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoneySpider" title="/pmwiki/pmwiki.php/Main/MoneySpider"><span data-dcnode-id="2898" instrument_node="">Money Spider</span></a><span data-dcnode-id="2896" instrument_node="">:</span><ul data-dcnode-id="2885"><li data-dcnode-id="2891"><span data-dcnode-id="2895" instrument_node=""> Each day, one of the rocks on your island will dispense Bells (instead of stones, iron, and clay) when smacked with a shovel, ten non-fruit trees will randomly drop 100 Bells each and two trees will have a piece of furniture everyday. Best not to question who keeps stuffing them in there, or </span><em data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">how</span></em><span data-dcnode-id="2892" instrument_node="">. Sometimes the Dodo Airline will deliver you to an island with several boulder banks, and most of them have a piece of furniture hidden somewhere.</span></li><li data-dcnode-id="2886"><span data-dcnode-id="2890" instrument_node=""> More literally, some bugs and fish can be sold for massive amounts of money. Scorpions and tarantulas are worth 8000 Bells a piece, and Wasps for 2500 bells each. The Barreleye is worth a whopping 12000 at Nook's Cranny or </span><em data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">18000</span></em><span data-dcnode-id="2887" instrument_node=""> with CJ.</span></li></ul></li><li data-dcnode-id="2871"><span data-dcnode-id="2883" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MonsterClown" title="/pmwiki/pmwiki.php/Main/MonsterClown"><span data-dcnode-id="2882" instrument_node="">Monster Clown</span></a><span data-dcnode-id="2880" instrument_node="">:</span><ul data-dcnode-id="2872"><li data-dcnode-id="2875"><span data-dcnode-id="2879" instrument_node=""> Implied. Lazy villagers may recount the time a birthday clown showed up for a party and </span><a class="twikilink" data-dcnode-id="2877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheThingThatWouldNotLeave" title="/pmwiki/pmwiki.php/Main/TheThingThatWouldNotLeave"><span data-dcnode-id="2878" instrument_node="">never left</span></a><span data-dcnode-id="2876" instrument_node="">, sometimes hearing honking coming from inside the walls of their old house. Villagers who move out to let campsite visitors move in might mention "night clowns" as their reason for leaving the island.</span></li><li data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node=""> Also discussed. Sometimes Lazy villagers will talk about pizza, and how hating pineapple as a topping is trendy like being afraid of clowns or being grossed out by the word moist.</span></li></ul></li><li data-dcnode-id="2866"><span data-dcnode-id="2870" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MundaneMadeAwesome" title="/pmwiki/pmwiki.php/Main/MundaneMadeAwesome"><span data-dcnode-id="2869" instrument_node="">Mundane Made Awesome</span></a><span data-dcnode-id="2867" instrument_node="">: The crafting animation involves sawing, hammering, and dramatic clouds of dust, which creates a comical effect when, depending on the recipe, the process of crafting should really be something gentle. For instance, the succulent plant would be made by arranging plants in a can, and the recycled boots would be the product of merely putting two fished-up boots next to each other, but they get the dramatic woodshop tools and animations all the same, with the same amount of triumph. Plus, if any NPC is nearby, they'll applaud you when you finish.</span></li><li data-dcnode-id="2858"><span data-dcnode-id="2865" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MusclesAreMeaningless" title="/pmwiki/pmwiki.php/Main/MusclesAreMeaningless"><span data-dcnode-id="2864" instrument_node="">Muscles Are Meaningless</span></a><span data-dcnode-id="2862" instrument_node="">: The player characters look as skinny as ever, but a </span><a class="twikilink" data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerUpFood" title="/pmwiki/pmwiki.php/Main/PowerUpFood"><span data-dcnode-id="2861" instrument_node="">snack</span></a><span data-dcnode-id="2859" instrument_node=""> can let them shatter rocks with a single swing of a shovel or an axe or dig up entire trees to stuff into their pockets. And just as in previous games, they are able to fish up and hold giant fish like tuna and sharks with nothing but a plain old rod and their bare hands.</span></li><li data-dcnode-id="2822"><span data-dcnode-id="2857" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MusicalNod" title="/pmwiki/pmwiki.php/Main/MusicalNod"><span data-dcnode-id="2856" instrument_node="">Musical Nod</span></a><span data-dcnode-id="2854" instrument_node="">:</span><ul data-dcnode-id="2823"><li data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node=""> The latter half of the title screen theme sounds similar to the latter half of the original game's title screen theme.</span></li><li data-dcnode-id="2847"><span data-dcnode-id="2851" instrument_node=""> As mentioned above in </span><a class="twikilink" data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallBack" title="/pmwiki/pmwiki.php/Main/CallBack"><span data-dcnode-id="2850" instrument_node="">Call-Back</span></a><span data-dcnode-id="2848" instrument_node="">, the theme that plays in K.K. Slider's monologue is done in a very similar style to the opening theme from the GameCube game.</span></li><li data-dcnode-id="2842"><span data-dcnode-id="2846" instrument_node=""> When you move into your tent, you receive a radio, which occasionally plays hourly themes from </span><em data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">New Leaf</span></em><span data-dcnode-id="2843" instrument_node=""> alongside K.K. Slider tunes.</span></li><li data-dcnode-id="2837"><span data-dcnode-id="2841" instrument_node=""> The Bunny Day theme is a direct remake of the </span><em data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">New Leaf</span></em><span data-dcnode-id="2838" instrument_node=""> equivalent, with live instrumentation.</span></li><li data-dcnode-id="2829"><span data-dcnode-id="2836" instrument_node=""> Among K.K. Slider's new "fake" songs (the ones that play when you request an invalid title), one is the title theme from </span><em data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Wild World</span></em><span data-dcnode-id="2833" instrument_node=""> and </span><em data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">City Folk</span></em><span data-dcnode-id="2830" instrument_node="">.</span></li><li data-dcnode-id="2824"><span data-dcnode-id="2828" instrument_node=""> The Wedding Event theme is a slower remake of the Re-Tail theme from </span><em data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">New Leaf</span></em><span data-dcnode-id="2825" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2814"><span data-dcnode-id="2821" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyGodYouAreSerious" title="/pmwiki/pmwiki.php/Main/MyGodYouAreSerious"><span data-dcnode-id="2820" instrument_node="">My God, You Are Serious!</span></a><span data-dcnode-id="2818" instrument_node="">: When Nook shows you your first bill, two of your options for the reaction are confusion about Bells (the </span><em data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">AC</span></em><span data-dcnode-id="2815" instrument_node=""> world's currency). Nook thinks you're joking for a second before he realizes that you're not and apologizes.</span></li><li data-dcnode-id="2804"><span data-dcnode-id="2813" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyNameIsQuestionMarks" title="/pmwiki/pmwiki.php/Main/MyNameIsQuestionMarks"><span data-dcnode-id="2812" instrument_node="">My Name Is ???</span></a><span data-dcnode-id="2810" instrument_node="">:</span><ul data-dcnode-id="2805"><li data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node=""> When visiting Nook's Cranny some time after it's built, you may find Timmy and Tommy talking to Mabel from the Able Sisters store, but the text boxes display her name as "???" until Timmy addresses her by name.</span></li><li data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node=""> When accessing the Dream function for the first time, Luna's text box displays her name as "???" until she identifies herself.</span></li></ul></li><li data-dcnode-id="2776"><span data-dcnode-id="2803" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="2802" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="2800" instrument_node="">:</span><ul data-dcnode-id="2777"><li data-dcnode-id="2788"><span data-dcnode-id="2799" instrument_node=""> One of the three </span><a class="twikilink" data-dcnode-id="2797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FlavorText" title="/pmwiki/pmwiki.php/Main/FlavorText"><span data-dcnode-id="2798" instrument_node="">flavor texts</span></a><span data-dcnode-id="2796" instrument_node=""> for the squid is "I caught a squid! Do they...not actually 'bloop'?" This nods back to the flavor text for the same creature in </span><em data-dcnode-id="2793"><a class="twikilink" data-dcnode-id="2794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossing2001" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossing2001"><span data-dcnode-id="2795" instrument_node="">Doubutsu no Mori e+</span></a></em><span data-dcnode-id="2792" instrument_node=""> (in which it debuted), which translates to "I caught a squid! It's a </span><a class="twikilink" data-dcnode-id="2790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/SuperMarioBros" title="/pmwiki/pmwiki.php/Franchise/SuperMarioBros"><span data-dcnode-id="2791" instrument_node="">Blooper</span></a><span data-dcnode-id="2789" instrument_node="">!"</span></li><li data-dcnode-id="2778"><span data-dcnode-id="2787" instrument_node=""> The Roost contains framed photos of its history near the entrance. Of the three there, one is a screenshot of K.K. performing at the Roost in </span><em data-dcnode-id="2784"><a class="twikilink" data-dcnode-id="2785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossingWildWorld" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossingWildWorld"><span data-dcnode-id="2786" instrument_node="">Animal Crossing: Wild World</span></a></em><span data-dcnode-id="2783" instrument_node="">, the other is a drawing of the Roost's building in </span><em data-dcnode-id="2780"><a class="twikilink" data-dcnode-id="2781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossingNewLeaf" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossingNewLeaf"><span data-dcnode-id="2782" instrument_node="">Animal Crossing: New Leaf</span></a></em><span data-dcnode-id="2779" instrument_node="">; the third meanwhile is an entirely original image of Blathers &amp; Brewster.</span></li></ul></li></ul></div><p data-dcnode-id="2773"></p><div class="folderlabel" data-dcnode-id="2771" onclick="togglefolder('folder3');"><span data-dcnode-id="2772" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; N to S&nbsp;</span></div><div class="folder" data-dcnode-id="1671" id="folder3" isfolder="true" style="display:block;"><ul data-dcnode-id="1672"><li data-dcnode-id="2763"><span data-dcnode-id="2770" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ElNinoIsSpanishForTheNino" title="/pmwiki/pmwiki.php/Main/ElNinoIsSpanishForTheNino"><span data-dcnode-id="2769" instrument_node="">"El Niño" Is Spanish for "The Niño"</span></a><span data-dcnode-id="2767" instrument_node="">: Smug villagers may greet the player with "</span><a class="twikilink" data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GratuitousItalian" title="/pmwiki/pmwiki.php/Main/GratuitousItalian"><span data-dcnode-id="2766" instrument_node="">buongiorno</span></a><span data-dcnode-id="2764" instrument_node="">" and explain that it's Italian for "it's gonna be a great giorno".</span></li><li data-dcnode-id="2746"><span data-dcnode-id="2762" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NationalGeographicNudity" title="/pmwiki/pmwiki.php/Main/NationalGeographicNudity"><span data-dcnode-id="2761" instrument_node="">National Geographic Nudity</span></a><span data-dcnode-id="2759" instrument_node="">: Though player characters can never wear less than a pair of shorts and undershirt, several of Redd's statues—most notably the </span><a class="twikilink" data-dcnode-id="2757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Art/David" title="/pmwiki/pmwiki.php/Art/David"><span data-dcnode-id="2758" instrument_node="">Gallant Statue</span></a><span data-dcnode-id="2756" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Art/VenusDeMilo" title="/pmwiki/pmwiki.php/Art/VenusDeMilo"><span data-dcnode-id="2755" instrument_node="">Beautiful Statue</span></a><span data-dcnode-id="2753" instrument_node="">—are partly or entirely nude and, er, anatomically correct. The game maintains its </span><a class="twikilink" data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/EntertainmentSoftwareRatingBoard" title="/pmwiki/pmwiki.php/UsefulNotes/EntertainmentSoftwareRatingBoard"><span data-dcnode-id="2752" instrument_node="">E rating</span></a><span data-dcnode-id="2750" instrument_node=""> partly because these are replicas of famous real-life sculptures, and partly because they </span><a class="twikilink" data-dcnode-id="2748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownloadableContent" title="/pmwiki/pmwiki.php/Main/DownloadableContent"><span data-dcnode-id="2749" instrument_node="">were not in the game on release day</span></a><span data-dcnode-id="2747" instrument_node="">.</span></li><li data-dcnode-id="2731"><span data-dcnode-id="2745" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Nerf" title="/pmwiki/pmwiki.php/Main/Nerf"><span data-dcnode-id="2744" instrument_node="">Nerf</span></a><span data-dcnode-id="2742" instrument_node="">:</span><ul data-dcnode-id="2732"><li data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node=""> The 1.2.0 patch evens out the spawn rate of bugs, making less valuable species more likely to appear over more lucrative ones during months where the latter were previously unusually common. This, for instance, makes the "tarantula/scorpion island" exploit, where a player can make these bugs more likely to spawn by removing all plants on a mystery island, more of a grueling task. The same patch also lowered the ABD's interest rate, making it more difficult to build up Bells by time traveling forward.</span></li><li data-dcnode-id="2735"><span data-dcnode-id="2739" instrument_node=""> The chances of a villager showing up at the campsite, compared to </span><em data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">New Leaf</span></em><span data-dcnode-id="2736" instrument_node="">, is much less common.</span></li><li data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node=""> The Rainbow Stag, which previously sold for 10,000 bells, now sells for 6,000 bells instead.</span></li></ul></li><li data-dcnode-id="2723"><span data-dcnode-id="2730" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeverSayDie" title="/pmwiki/pmwiki.php/Main/NeverSayDie"><span data-dcnode-id="2729" instrument_node="">Never Say "Die"</span></a><span data-dcnode-id="2727" instrument_node="">: Two decorative items you can craft are the "western-style stone" and "zen-style stone," which are very obviously gravestones (the latter being the traditional-Japanese variety) with the word "grave" removed. Some Western players have </span><a class="twikilink" data-dcnode-id="2725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrossCulturalKerfluffle" title="/pmwiki/pmwiki.php/Main/CrossCulturalKerfluffle"><span data-dcnode-id="2726" instrument_node="">used the latter as an ordinary decoration, seemingly without realizing what it resembles</span></a><span data-dcnode-id="2724" instrument_node="">. Strangely, the "golden casket" goes uncensored, though it looks more like an ancient-Egyptian sarcophagus.</span></li><li data-dcnode-id="2698"><span data-dcnode-id="2722" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoFairCheating" title="/pmwiki/pmwiki.php/Main/NoFairCheating"><span data-dcnode-id="2721" instrument_node="">No Fair Cheating</span></a><span data-dcnode-id="2719" instrument_node="">:</span><ul data-dcnode-id="2699"><li data-dcnode-id="2709"><span data-dcnode-id="2718" instrument_node=""> As a deterrent to "time traveling", turning back your system's clock will cause any and all turnips, both in your possession and on the island, to instantly spoil.</span><span class="notelabel" data-dcnode-id="2715" onclick="togglenote('note21ghgd');" style="cursor: pointer;"><sup data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2710" id="note21ghgd" isnote="true" onclick="togglenote('note21ghgd');" style="display: none; cursor: pointer;"><span data-dcnode-id="2714" instrument_node="">The game seems to base this off of when you last logged off; if you turn the clock back to a point </span><em data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">after</span></em><span data-dcnode-id="2711" instrument_node=""> your last logoff, there is no penalty, though this does limit (though not eliminate) the usefulness of time-travelling if you're trying to avoid this particular consequence.</span></span></li><li data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node=""> Some players hack their island into what is called a "treasure island", where foreign players can travel to their island, sell a stack of turnips for an absurdly negative price, then return to their island and find 999,999,999 Bells in their own ABD savings. The side effect: the sales counter for "Conquering the Stalk Market" counts a nine-figure loss, putting that achievement effectively out of reach.</span></li><li data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node=""> There is no way for players to drop their bugs, fish and sea creatures to be picked up, which means players cannot give their creatures to other players. If you want to get every single creature in the game and complete your Critterpedia and Museum, you have to catch them all by yourself!</span></li><li data-dcnode-id="2700"><span data-dcnode-id="2704" instrument_node=""> Taking more than 20 minutes to design a villager's home in </span><em data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="2701" instrument_node=""> gives a further bonus to the player's "rank" (a hidden system that determines the player's grade and correspondingly, salary) and will cause the villager, when next visited, to give the player one piece of flooring, wallpaper or rug used in the design. Simply leaving the game open for 20 minutes will not work - the timer pauses after 1 minute of inactivity!</span></li></ul></li><li data-dcnode-id="2691"><span data-dcnode-id="2697" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NobodyPoops" title="/pmwiki/pmwiki.php/Main/NobodyPoops"><span data-dcnode-id="2696" instrument_node="">Nobody Poops</span></a><span data-dcnode-id="2694" instrument_node="">: If you're lucky enough to get a toilet and make yourself full eating fruit, you can avert this. While it's obviously not depicted, the player's stomach, represented by the number of fruits eaten, drains back to 0.</span><div class="indent" data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">And that takes care of that!</span></div></li><li data-dcnode-id="2677"><span data-dcnode-id="2690" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonIndicativeName" title="/pmwiki/pmwiki.php/Main/NonIndicativeName"><span data-dcnode-id="2689" instrument_node="">Non-Indicative Name</span></a><span data-dcnode-id="2687" instrument_node="">:</span><ul data-dcnode-id="2678"><li data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node=""> The "dresses" category of clothing included not just dresses, but anything that covers the whole body, such as robes, jumpsuits, and overalls. Many of these are also themed costumes, which prompted the 1.2.0 patch to give the category a more appropriate name, "dress-up".</span></li><li data-dcnode-id="2679"><span data-dcnode-id="2684" instrument_node=""> As in previous mainline installments, the "orange pansy" isn't truly orange, but red with a yellow center. While full-orange pansies exist in </span><em data-dcnode-id="2681"><a class="twikilink" data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossingPocketCamp" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossingPocketCamp"><span data-dcnode-id="2683" instrument_node="">Animal Crossing: Pocket Camp</span></a></em><span data-dcnode-id="2680" instrument_node="">, they are renamed "coral pansies" to avoid confusion.</span></li></ul></li><li data-dcnode-id="2672"><span data-dcnode-id="2676" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoodleImplements" title="/pmwiki/pmwiki.php/Main/NoodleImplements"><span data-dcnode-id="2675" instrument_node="">Noodle Implements</span></a><span data-dcnode-id="2673" instrument_node="">: When a villager is "thinking," indicating they need help with something, one of the random messages they can mutter is "Hmm... But where will I get lasers?"</span></li><li data-dcnode-id="2649"><span data-dcnode-id="2671" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoodleIncident" title="/pmwiki/pmwiki.php/Main/NoodleIncident"><span data-dcnode-id="2670" instrument_node="">Noodle Incident</span></a><span data-dcnode-id="2668" instrument_node="">:</span><ul data-dcnode-id="2650"><li data-dcnode-id="2662"><span data-dcnode-id="2667" instrument_node=""> A smug villager might have the following to say during Festivale:</span><div class="indent" data-dcnode-id="2663"><strong data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">Smug:</span></strong><span data-dcnode-id="2664" instrument_node=""> Festivale is a time where I can really challenge myself as a dancer and push society's boundaries. Don't worry—I won't push them too far. We all remember what happened last time.</span></div></li><li data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node=""> A smug villager may talk about how they're banned worldwide from aquariums, refusing to say why other than a nebulous "merman incident". That they can still visit your island's museum aquarium is completely unmentioned.</span></li><li data-dcnode-id="2651"><span data-dcnode-id="2659" instrument_node=""> If you talk to a lazy villager during your player's birthday party, they'll mention how it took four tries to get the piñata right. The first one broke on its own, the second one was empty, and the third one...</span><div class="indent" data-dcnode-id="2652"><strong data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Lazy:</span></strong><span data-dcnode-id="2656" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouDoNotWantToKnow" title="/pmwiki/pmwiki.php/Main/YouDoNotWantToKnow"><span data-dcnode-id="2655" instrument_node="">It's better not to talk about the THIRD one</span></a><span data-dcnode-id="2653" instrument_node="">.</span></div></li></ul></li><li data-dcnode-id="2644"><span data-dcnode-id="2648" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoPeekingRequest" title="/pmwiki/pmwiki.php/Main/NoPeekingRequest"><span data-dcnode-id="2647" instrument_node="">"No Peeking!" Request</span></a><span data-dcnode-id="2645" instrument_node="">: Some villagers will ask you to turn around when they change into the clothing item you just gave them.</span></li><li data-dcnode-id="2616"><span data-dcnode-id="2643" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotCompletelyUseless" title="/pmwiki/pmwiki.php/Main/NotCompletelyUseless"><span data-dcnode-id="2642" instrument_node="">Not Completely Useless</span></a><span data-dcnode-id="2640" instrument_node="">:</span><ul data-dcnode-id="2617"><li data-dcnode-id="2635"><span data-dcnode-id="2639" instrument_node=""> In past games, the trash items (old boots, tires, and cans) found by fishing were just inventory filler and a way to attract flies, and you would need to pay shopkeepers to get rid of them unless you had a trash can. In </span><em data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">New Horizons</span></em><span data-dcnode-id="2636" instrument_node="">, getting them can inspire your islander to make DIY recipes that require them, so the trash becomes a nice rare find. The actual worst item you can pull is a single stone, since you can get stones faster by bashing rocks.</span></li><li data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node=""> Weeds are now a crafting material for a large number of DIY recipes.</span></li><li data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node=""> If any of Gulliver's communicator parts haven't been given to him before he leaves, they turn into rusted parts; one also spawns in the resident services recycling bin if his sidequest is finished that day. These rusted parts are just trash... unless you're working to build the robot hero, which requires 30 rusted parts for its DIY recipe.</span></li><li data-dcnode-id="2618"><span data-dcnode-id="2630" instrument_node=""> One rare island has a river where you can only </span><a class="twikilink" data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FishingForSole" title="/pmwiki/pmwiki.php/Main/FishingForSole"><span data-dcnode-id="2629" instrument_node="">fish up trash</span></a><span data-dcnode-id="2627" instrument_node="">, and most insects don't appear. It doesn't have any hybrid flowers or rare fruit either, so it may seem worthless (unless you're specifically looking for trash, as mentioned above). However, if you're playing during a season where giant water bugs spawn, you can make a tidy profit off of it; these normally rare bugs will swarm the river and can then be sold for 2,000 Bells each</span><span class="notelabel" data-dcnode-id="2624" onclick="togglenote('note22s9sb');" style="cursor: pointer;"><sup data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2620" id="note22s9sb" isnote="true" onclick="togglenote('note22s9sb');" style="display: none; cursor: pointer;"><span data-dcnode-id="2623" instrument_node="">3,000 Bells if you sell them to </span><a class="twikilink" data-dcnode-id="2621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FriendToBugs" title="/pmwiki/pmwiki.php/Main/FriendToBugs"><span data-dcnode-id="2622" instrument_node="">Flick</span></a></span><span data-dcnode-id="2619" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2602"><span data-dcnode-id="2615" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotQuiteSavedEnough" title="/pmwiki/pmwiki.php/Main/NotQuiteSavedEnough"><span data-dcnode-id="2614" instrument_node="">Not Quite Saved Enough</span></a><span data-dcnode-id="2612" instrument_node="">: If Gulliver washes up on your island, he asks the player to collect the missing pieces of his broken communicator so he can call for help. If another player on the same island checks the beach, they will find Gulliver washed up on shore, still needing a rescue. </span><a class="twikilink" data-dcnode-id="2610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadLiar" title="/pmwiki/pmwiki.php/Main/BadLiar"><span data-dcnode-id="2611" instrument_node="">According to him</span></a><span data-dcnode-id="2609" instrument_node="">, he was taking a nap while waiting for rescue and mentions that the first player already helped him fix his communicator, only to look down and find it broken again. Supposedly, the waves knocked the parts loose while he was napping and now he's asking the second player for help fixing the communicator that the first player already helped fix. Gulliver is also just so accident prone that he'll end up </span><a class="twikilink" data-dcnode-id="2607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RepeatableQuest" title="/pmwiki/pmwiki.php/Main/RepeatableQuest"><span data-dcnode-id="2608" instrument_node="">falling off his boat again in 2-3 weeks time</span></a><span data-dcnode-id="2606" instrument_node="">. His pirate counterpart </span><a class="twikilink" data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TalkLikeAPirate" title="/pmwiki/pmwiki.php/Main/TalkLikeAPirate"><span data-dcnode-id="2605" instrument_node="">Gullivarr</span></a><span data-dcnode-id="2603" instrument_node=""> is similar in both of these manners.</span></li><li data-dcnode-id="2517"><span data-dcnode-id="2601" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotTheIntendedUse" title="/pmwiki/pmwiki.php/Main/NotTheIntendedUse"><span data-dcnode-id="2600" instrument_node="">Not the Intended Use</span></a><span data-dcnode-id="2598" instrument_node="">:</span><ul data-dcnode-id="2518"><li data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node=""> With the exception of the axe, iron tools can actually be customized. While it seems strange that this can be done to breakable equipment, the game doesn't tell the player that it resets the tool's durability by replacing the old tool with a new one of the chosen variation. If the player suspects that their fishing rod is on the verge of breaking, they can simply customize it.</span></li><li data-dcnode-id="2588"><span data-dcnode-id="2595" instrument_node=""> While each mystery tour island is meant to be unique with their own quirks, with one being specifically the "terror bug island" (i.e. the island that spawns only tarantulas or scorpions, depending on the season), the player can actually force most of the islands into limiting the spawn of bugs</span><span class="notelabel" data-dcnode-id="2592" onclick="togglenote('note0an00');" style="cursor: pointer;"><sup data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">Explanation&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2590" id="note0an00" isnote="true" onclick="togglenote('note0an00');" style="display: none; cursor: pointer;"><span data-dcnode-id="2591" instrument_node="">By destroying rocks, cutting down trees and uprooting its stumps, removing weeds, pulling off the flower heads, catching and releasing all existing bugs, and putting all resources on the beach, the player forces only the island to spawn wharf roaches, mole crickets, tiger beetles, and the tarantula/scorpion. In case of a multi-tiered island, the player can dig up holes on the upper tiers so that only the ground level can spawn insects.</span></span><span data-dcnode-id="2589" instrument_node=""> to the point where it becomes a makeshift terror bug island. The only excluded mystery tour island type is the one that doesn't spawn insects at all. However, mystery islands with rivers can spawn giant water bugs during certain months, hindering the tarantula spawn rate, so riverless islands are optimal.</span></li><li data-dcnode-id="2574"><span data-dcnode-id="2587" instrument_node=""> Nook Mile Tickets were meant to be taken straight to Dodo Airlines to visit mystery islands, but because each one represents a roll for a random villager (and thus value that Bells cannot buy)</span><span class="notelabel" data-dcnode-id="2584" onclick="togglenote('note23n1yu');" style="cursor: pointer;"><sup data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2582" id="note23n1yu" isnote="true" onclick="togglenote('note23n1yu');" style="display: none; cursor: pointer;"><span data-dcnode-id="2583" instrument_node="">If you expend a Nook Mile Ticket while you have an empty plot, a random villager will be on the mystery island, who you can easily invite to stay on your island.</span></span><span data-dcnode-id="2581" instrument_node="">, "NMTs" have become the de facto currency for online players. You can't buy tickets with Bells (except from other players), so there's no shortcut to generating them; and any that do get produced are quickly consumed by villager-hunters, so the number of them in circulation is relatively stable. Of note is that apart from villager trading, NMTs were the only way to get the first 8 new villagers in </span><em data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">New Horizons</span></em><span data-dcnode-id="2578" instrument_node=""> (including the extremely popular Raymond) until the release of fifth series of </span><em data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">Animal Crossing</span></em><span data-dcnode-id="2575" instrument_node=""> amiibo cards.</span></li><li data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node=""> Unlike earlier games, running through flowers won't kill them; it'll just have a chance at reverting them to the bud stage. However, flowers in this stage can still breed, and unlike blooming flowers, they can't be plucked (plucking flowers reverts them to stems, which can't breed). As such, if you have a field of breeder flowers you can't block off to visitors for whatever reason, you can intentionally trample them to keep them safe from thieves.</span></li><li data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node=""> Unlike in previous entries, the player can have up to 10 player type residents on their island with this feature being added with the intended purpose of having multiple people live on the same island and play together with Party Mode. The villagers even treat the second profile as a different person when they’re interacted with. Adding more profiles, can also be good for having extra storage if your main house storage is full which a lot of players instead use it for. Players have also opted to add more houses for other uses such as making themed buildings (e.g. bath houses, diners, hotels) for other players to visit. As of the Dream Island update, all player villagers will walk around the island as NPCs when another player visits the dream version of the island, so some players use multiple player houses to add more NPCs for dream visitors to interact with.</span></li><li data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node=""> Flowers will not propagate onto custom paths. Some players thus apply completely invisible custom paths over grass to control where flowers propagate, saving time on gardening.</span></li><li data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node=""> Shrubs count as trees for the purpose of Nook Miles+ quests and Island Evaluations, but unlike trees, you don't need to eat fruit to dig them up when they're fully grown. This makes them usable as makeshift fence gates for places you want to be able to access while others are visiting but still protect from those visitors, as only the host and anyone they trusted enough to mark as a "best friend" can use a shovel to dig them up.</span></li><li data-dcnode-id="2561"><span data-dcnode-id="2565" instrument_node=""> Following on from </span><em data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">New Leaf</span></em><span data-dcnode-id="2562" instrument_node="">, cushions can have custom designs placed on them - and like most furniture, can now be placed outside. Custom designs have been created to make them appear to be something else with a similar shape, such as sacks of fertilizer or a packet of potato chips. Similarly, custom designs on wide-brimmed hats are often used to simulate cakes and other types of food.</span></li><li data-dcnode-id="2550"><span data-dcnode-id="2560" instrument_node=""> Weeds have been significantly graphically overhauled since the earlier games, and even change their appearance with the seasons. The island rating is also no longer significantly affected by them</span><span class="notelabel" data-dcnode-id="2557" onclick="togglenote('note24hbtv');" style="cursor: pointer;"><sup data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2552" id="note24hbtv" isnote="true" onclick="togglenote('note24hbtv');" style="display: none; cursor: pointer;"><span data-dcnode-id="2556" instrument_node="">Having less than </span><em data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">100</span></em><span data-dcnode-id="2553" instrument_node=""> weeds gives you the maximum possible bonus for development</span></span><span data-dcnode-id="2551" instrument_node="">. Some players thus plant and breed significant quantities of weeds as decoration.</span></li><li data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node=""> Resident Services includes a function to move a villager's house, aiding the player in reconfiguring their island. However, the villager moving-out algorithm is programmed to make sure that villagers who are in the process of having their house moved cannot ask to leave the island. Some players use this to speed up the process of getting specific villagers to move out by finding out if a villager is about to ask to move out, inquiring at Resident Services to move said villager's house, then cancelling the move. This clears the "moving out" flag from the villager. Since the player did not tell the villager to stay in the "asking to move out" dialogue sequence (which triggers a 5-day cooldown during which no villager will ask to move), the game will re-roll for another villager to ask to move out the next day. Conversely, by holding on to the moving kit of a villager whom the player wants to keep, that villager can be excluded from the pool of villagers who can ask to move out.</span></li><li data-dcnode-id="2543"><span data-dcnode-id="2547" instrument_node=""> After collecting two DIY recipes, the "document stack" item can be converted into "scattered papers" and back </span><em data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">ad infinitum</span></em><span data-dcnode-id="2544" instrument_node="">. Some players thus keep a document stack in their inventory so that they can quickly clear the Nook Miles+ goal to "craft 3 DIY items" if it appears.</span></li><li data-dcnode-id="2538"><span data-dcnode-id="2542" instrument_node=""> Fake art is intended to be unsellable in-game and of little use... unless you go online, where </span><em data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">both</span></em><span data-dcnode-id="2539" instrument_node=""> real and fake art are in demand, and fake art can still be traded for significant amounts of Nook Miles Tickets!</span></li><li data-dcnode-id="2530"><span data-dcnode-id="2537" instrument_node=""> Before the arrival of partitions in </span><em data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Happy Home Paradise</span></em><span data-dcnode-id="2534" instrument_node="">, the "climbing wall" item, particularly the "natural" variation, was often turned around and used as a </span><em data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">de facto</span></em><span data-dcnode-id="2531" instrument_node=""> wooden panel.</span></li><li data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node=""> Saving and quitting has a couple of unorthodox uses, such as re-rolling villager states to get a villager out of an ungiftable state or resetting the global thought bubble cooldown to help ascertain if a villager's thought bubble is the persistent "moving-out thought bubble".</span></li><li data-dcnode-id="2523"><span data-dcnode-id="2527" instrument_node=""> Making a fruit garden is easy enough, but what about a vegetable garden? Since crops didn't exist before the Halloween update (and didn't include crops beyond the pumpkin until 2.0), and the only other </span><em data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">actual</span></em><span data-dcnode-id="2524" instrument_node=""> vegetable—the turnip—goes rotten if not sold a week after buying, other items have been used as vegetables, such as white mum cushions for cabbages and yellow hyacinths for corn. Red pansy buds are popularly used as strawberries.</span></li><li data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node=""> Patch 1.9.0 introduced custom design umbrellas. Some users swiftly figured out that their hexagonal shape made them great canvases for isometric illustrations. As a result, there are custom designs for umbrellas that make the umbrella look like a box-shaped item, such as a cat in a pethouse or a wooden box full of fruits. To complete the illusion, the umbrella is placed with its canopy directly facing the camera.</span></li><li data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node=""> Face-cutout standees also returned in patch 1.9.0. Within hours of the patch's release, players had figured out that they could be used to simulate walls or items with circular windows, such as the side of a bus or the front of a building.</span></li></ul></li><li data-dcnode-id="2512"><span data-dcnode-id="2516" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Notzilla" title="/pmwiki/pmwiki.php/Main/Notzilla"><span data-dcnode-id="2515" instrument_node="">Notzilla</span></a><span data-dcnode-id="2513" instrument_node="">: The "monster statue" available from the Nook Stop looks (and sounds) rather familiar.</span></li><li data-dcnode-id="2507"><span data-dcnode-id="2511" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OffscreenTeleportation" title="/pmwiki/pmwiki.php/Main/OffscreenTeleportation"><span data-dcnode-id="2510" instrument_node="">Offscreen Teleportation</span></a><span data-dcnode-id="2508" instrument_node="">: All NPCs that can walk can also teleport anywhere that doesn't require a vaulting pole or ladder to reach, much to the dismay of players who attempt to fence-in their unwanted villagers. Particularly obvious when a villager is assigned to be somewhere other than "outside" or "in their home" - you could walk out of a building and then re-enter, only to find that said villager has teleported inside.</span></li><li data-dcnode-id="2492"><span data-dcnode-id="2506" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OldSaveBonus" title="/pmwiki/pmwiki.php/Main/OldSaveBonus"><span data-dcnode-id="2505" instrument_node="">Old Save Bonus</span></a><span data-dcnode-id="2503" instrument_node="">: Having account data for </span><em data-dcnode-id="2500"><a class="twikilink" data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AnimalCrossingPocketCamp" title="/pmwiki/pmwiki.php/VideoGame/AnimalCrossingPocketCamp"><span data-dcnode-id="2502" instrument_node="">Animal Crossing: Pocket Camp</span></a></em><span data-dcnode-id="2499" instrument_node=""> linked to your Nintendo Account allows you to pick up a Special Order Ticket for use in </span><em data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">New Horizons</span></em><span data-dcnode-id="2496" instrument_node="">. Redeeming it in the Nintendo eShop via code ports several </span><em data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Pocket Camp</span></em><span data-dcnode-id="2493" instrument_node=""> goods as furnishings for use on your island, such as the Brake Tapper machine, Fortune Cookie Cart, and miniatures of the camper vans.</span></li><li data-dcnode-id="2484"><span data-dcnode-id="2491" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitPointWonder" title="/pmwiki/pmwiki.php/Main/OneHitPointWonder"><span data-dcnode-id="2490" instrument_node="">One-Hit-Point Wonder</span></a><span data-dcnode-id="2488" instrument_node="">: Effectively; few things can actually harm you, but two of those (tarantulas and scorpions) knock you out in one hit, and wasps take only two hits to do the same. Fortunately, </span><a class="twikilink" data-dcnode-id="2486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathIsASlapOnTheWrist" title="/pmwiki/pmwiki.php/Main/DeathIsASlapOnTheWrist"><span data-dcnode-id="2487" instrument_node="">Death Is a Slap on the Wrist</span></a><span data-dcnode-id="2485" instrument_node="">, so all you lose from "dying" is the opportunity to capture the critter that took you out.</span></li><li data-dcnode-id="2476"><span data-dcnode-id="2483" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OOCIsSeriousBusiness" title="/pmwiki/pmwiki.php/Main/OOCIsSeriousBusiness"><span data-dcnode-id="2482" instrument_node="">OOC Is Serious Business</span></a><span data-dcnode-id="2480" instrument_node="">: When someone with an upgraded Museum is ready to open Roost Café in Version 2.0, the player will find Blathers up </span><em data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">during the day</span></em><span data-dcnode-id="2477" instrument_node=""> pondering something.</span></li><li data-dcnode-id="2471"><span data-dcnode-id="2475" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OverheadInteractionIndicator" title="/pmwiki/pmwiki.php/Main/OverheadInteractionIndicator"><span data-dcnode-id="2474" instrument_node="">Overhead Interaction Indicator</span></a><span data-dcnode-id="2472" instrument_node="">: Villagers will sometimes have a thought bubble above their heads, indicating a concern that provides an opportunity for the player. These concerns include giving the player a nickname, developing a new catchphrase, wanting to sell or gift something, or moving away from the island. Other times, they'll just share a random thought with the player.</span></li><li data-dcnode-id="2463"><span data-dcnode-id="2470" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OxygenMeter" title="/pmwiki/pmwiki.php/Main/OxygenMeter"><span data-dcnode-id="2469" instrument_node="">Oxygen Meter</span></a><span data-dcnode-id="2467" instrument_node="">: It's not shown, and this being </span><em data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Animal Crossing</span></em><span data-dcnode-id="2464" instrument_node=""> you don't drown, but you can only dive underwater for a little under 10 seconds before your character will automatically surface for air.</span></li><li data-dcnode-id="2453"><span data-dcnode-id="2462" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PaletteSwap" title="/pmwiki/pmwiki.php/Main/PaletteSwap"><span data-dcnode-id="2461" instrument_node="">Palette Swap</span></a><span data-dcnode-id="2459" instrument_node="">:</span><ul data-dcnode-id="2454"><li data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node=""> Furniture and clothing items are presented in the catalog as one item with variations, instead of each having a separate entry like in previous games. These variations can be simple texture swaps, like the mug coming in several colors and patterns, or feature deeper changes to the model, such as the frying pan containing different dishes.</span></li><li data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node=""> Wallpapers and floors still come in palette-swapped forms, but unlike the above, they remain separate items.</span></li></ul></li><li data-dcnode-id="2448"><span data-dcnode-id="2452" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Panacea" title="/pmwiki/pmwiki.php/Main/Panacea"><span data-dcnode-id="2451" instrument_node="">Panacea</span></a><span data-dcnode-id="2449" instrument_node="">: Downplayed. Medicine is only seen treating two things, but those two things are wildly different (wasp stings and whatever sick villagers are sick with), yet it treats both equally well.</span></li><li data-dcnode-id="2431"><span data-dcnode-id="2447" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ParasolOfPrettiness" title="/pmwiki/pmwiki.php/Main/ParasolOfPrettiness"><span data-dcnode-id="2446" instrument_node="">Parasol of Prettiness</span></a><span data-dcnode-id="2444" instrument_node="">: The "shiny-bows parasol", complete with lace, bows, and ruffles. Comes in four color variations: </span><a class="twikilink" data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrueBlueFemininity" title="/pmwiki/pmwiki.php/Main/TrueBlueFemininity"><span data-dcnode-id="2443" instrument_node="">blue</span></a><span data-dcnode-id="2441" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PinkIsFeminine" title="/pmwiki/pmwiki.php/Main/PinkIsFeminine"><span data-dcnode-id="2440" instrument_node="">pink</span></a><span data-dcnode-id="2438" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WomanInWhite" title="/pmwiki/pmwiki.php/Main/WomanInWhite"><span data-dcnode-id="2437" instrument_node="">white</span></a><span data-dcnode-id="2435" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GracefulLadiesLikePurple" title="/pmwiki/pmwiki.php/Main/GracefulLadiesLikePurple"><span data-dcnode-id="2434" instrument_node="">purple</span></a><span data-dcnode-id="2432" instrument_node="">.</span></li><li data-dcnode-id="2426"><span data-dcnode-id="2430" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ParodyOfEvolution" title="/pmwiki/pmwiki.php/Main/ParodyOfEvolution"><span data-dcnode-id="2429" instrument_node="">Parody of Evolution</span></a><span data-dcnode-id="2427" instrument_node="">: The museum's hall of fossils has branching lines on the floor leading to different exhibits, depicting the evolutionary tree. The lines eventually lead to a window in the last room with silhouettes of different villager species, some connected to other fossils, lightly poking at the fact that evolution in this universe has culminated in humanoid animals. The line next to the monkey and connected to the australopithecus has no silhouette; if you stand in that spot behind the window, a light comes on as if you have been added to the evolutionary tree, representing humans.</span></li><li data-dcnode-id="2421"><span data-dcnode-id="2425" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PhotoMode" title="/pmwiki/pmwiki.php/Main/PhotoMode"><span data-dcnode-id="2424" instrument_node="">Photo Mode</span></a><span data-dcnode-id="2422" instrument_node="">: The Nookphone has a Camera app, which allows the player to take a picture of their character and pick from a few filters. The 2.0 update adds a handheld mode, allowing the player to see from their character's point of view, and a tripod mode.</span></li><li data-dcnode-id="2402"><span data-dcnode-id="2420" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PimpedOutDress" title="/pmwiki/pmwiki.php/Main/PimpedOutDress"><span data-dcnode-id="2419" instrument_node="">Pimped-Out Dress</span></a><span data-dcnode-id="2417" instrument_node="">:</span><ul data-dcnode-id="2403"><li data-dcnode-id="2409"><span data-dcnode-id="2416" instrument_node=""> The "magical dress" is a classic </span><a class="twikilink" data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicalGirl" title="/pmwiki/pmwiki.php/Main/MagicalGirl"><span data-dcnode-id="2415" instrument_node="">Magical Girl</span></a><span data-dcnode-id="2413" instrument_node="">-style dress, complete with lace, ruffles, </span><a class="twikilink" data-dcnode-id="2411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiantPoofySleeves" title="/pmwiki/pmwiki.php/Main/GiantPoofySleeves"><span data-dcnode-id="2412" instrument_node="">Giant Poofy Sleeves</span></a><span data-dcnode-id="2410" instrument_node="">, and a bow in the front adorned with a heart.</span></li><li data-dcnode-id="2404"><span data-dcnode-id="2408" instrument_node=""> A few fancy mermaid-themed dresses can be obtained from Pascal in exchange for a scallop, with </span><a class="twikilink" data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SeashellBra" title="/pmwiki/pmwiki.php/Main/SeashellBra"><span data-dcnode-id="2407" instrument_node="">Seashell Bras</span></a><span data-dcnode-id="2405" instrument_node="">, seashell-shaped ruffles, and belts made out of pearls.</span></li></ul></li><li data-dcnode-id="2384"><span data-dcnode-id="2401" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PinataEnemy" title="/pmwiki/pmwiki.php/Main/PinataEnemy"><span data-dcnode-id="2400" instrument_node="">Piñata Enemy</span></a><span data-dcnode-id="2398" instrument_node="">:</span><ul data-dcnode-id="2385"><li data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node=""> Tarantulas and scorpions, the two dangerous bugs which are seasonal counterparts of each other, occasionally appear at night; if you can catch them without getting bit, each one sells for 8,000 Bells. A popular strategy for making money is to either hunt for the fabled Tarantula/Scorpion Island, or create one by visiting any random island and clearing all the trees and other objects to increase the chance of arachnid spawns.</span></li><li data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node=""> Less arachnophobia-inducing techniques include fishing for koi at ponds at night, or catching lucrative butterflies like peacock or emperor butterflies or their beetle counterparts like the giraffe beetle.</span></li><li data-dcnode-id="2386"><span data-dcnode-id="2393" instrument_node=""> In this game, wasps are exceptionally easy to catch with the right technique. </span><span class="notelabel" data-dcnode-id="2390" onclick="togglenote('note258u2e');" style="cursor: pointer;"><sup data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2388" id="note258u2e" isnote="true" onclick="togglenote('note258u2e');" style="display: none; cursor: pointer;"><span data-dcnode-id="2389" instrument_node="">Shake non-fruit trees from any of the 3 squares in front of it, with net equipped; if a nest falls out, simply stand still and swing the net.</span></span><span data-dcnode-id="2387" instrument_node=""> Five wasp spawns are possible per day, and each sells for 2,500 bells each (that's a daily profit of 12,500 bells), in addition to providing a wasp nest that can be used in DIY recipes to make honeycomb flooring, wallpaper, and medicine.</span></li></ul></li><li data-dcnode-id="2352"><span data-dcnode-id="2383" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayEveryDay" title="/pmwiki/pmwiki.php/Main/PlayEveryDay"><span data-dcnode-id="2382" instrument_node="">Play Every Day</span></a><span data-dcnode-id="2380" instrument_node="">: In addition to the series staples...</span><ul data-dcnode-id="2353"><li data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node=""> Most sources of DIY materials (trees, rocks etc.) only give a certain amount of materials per day, resetting the next day.</span></li><li data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node=""> Once you pay off your moving-in fee, you gain access to Nook Miles+, daily tasks that give a small amount of Nook Miles when completed. The first five daily tasks give double the Nook Miles they usually award, and on rare occasions, one will give quintuple rewards.</span></li><li data-dcnode-id="2369"><span data-dcnode-id="2375" instrument_node=""> Accessing the Nook Stop every day gives you Miles for how many consecutive days you've done so, starting with 50 miles on day one and capping out at 300 miles on day seven; every following consecutive day in a streak will net you 300 miles. While the cap does come oddly early, it makes it easy to build back up to should you end up breaking the streak.</span><span class="notelabel" data-dcnode-id="2372" onclick="togglenote('note26oupi');" style="cursor: pointer;"><sup data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2370" id="note26oupi" isnote="true" onclick="togglenote('note26oupi');" style="display: none; cursor: pointer;"><span data-dcnode-id="2371" instrument_node="">The streak also automatically goes to 7+ the day after any day the Nook Stop is inaccessible, no matter where it was before, along with a 500 mile bonus to recompense for the enforced missed day.</span></span></li><li data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node=""> With the expanded gifting system, you have one chance every day to give a gift to each of your villagers. This is the primary means of raising friendship levels with them.</span></li><li data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node=""> Every morning, a message in a bottle arrives with a random DIY recipe. Similarly, each day provides three opportunities to find a villager who is busy crafting or cooking and thus obtain a random DIY or cooking recipe.</span></li><li data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node=""> Every day, two random non-fruit trees will release a random piece of furniture when shaken for the first time. These furniture can be in variations that are not (and will never be) sold in your island's Nook's Cranny. In addition, five random non-fruit trees will spawn wasp nests when first shaken. Wasps are extremely easy to catch and each sells for 2,500 bells.</span></li><li data-dcnode-id="2358"><span data-dcnode-id="2362" instrument_node=""> The Wedding Season event is this, as it’s the first month long event implemented into </span><em data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">New Horizons</span></em><span data-dcnode-id="2359" instrument_node=""> and requires the player to play the event for at least 6 days before they can obtain and trade for everything. Thankfully, they make good use of the time allotted by giving the player various reasons to want to travel to Harv’s Island and take pictures with Reese and Cyrus. For the first 6 days/photoshoots, taking photos of the couple awards the player free, customizable Wedding Themed items each day (One of which is the Wedding Organ which is 40 heart crystals otherwise. Quite expensive considering the max amount of heart crystals a player can get per day) as well as up to 11 heart crystals per day that can either be traded with Cyrus for more of his furniture or given to villagers who have unique reactions to receiving them as gifts. As well on day 6, the player will receive two free diys for the Wedding Wand and Wedding Fence. On day 7 onwards, Reese will no longer specifically request ceremony and reception type themes, allowing the player to use what furniture they want so long as it incorporates the color scheme she asks for. The max amount of heart crystals the player can receive per day is capped at 15, and all of the items for the wedding set are unlocked, allowing the player to spend the rest of their time trading for the other items.</span></li><li data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node=""> Pumpkin plants take two days to produce pumpkins after being harvested. The number of pumpkins the plant produces depends on the number of days that it was watered. Thus, to obtain three pumpkins per plant, you must water your pumpkin plants once every day (if the rain or snow hasn't already done the job). The same rules apply to all produce introduced in the Version 2.0 update.</span></li><li data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node=""> Kapp'n's boat tours are available only once per day, and they offer the big draw of allowing you to find a gyroid fragment on the island you visit, which you can bury on your own island and water in order to grow a full gyroid the following day. This is the only way to get gyroids besides when they appear after rainy days on your island, so taking a boat tour each day is necessary to complete your gyroid collection at a decent pace.</span></li></ul></li><li data-dcnode-id="2340"><span data-dcnode-id="2351" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PointOfNoReturn" title="/pmwiki/pmwiki.php/Main/PointOfNoReturn"><span data-dcnode-id="2350" instrument_node="">Point of No Return</span></a><span data-dcnode-id="2348" instrument_node="">: After leaving a mystery island, you can never return to that specific island, so anything you may have left behind is gone forever. Wilbur warns you about this on your first trip, and makes you do a double-confirmation every time you fly back to base. Of course, this is </span><a class="twikilink" data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation" title="/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation"><span data-dcnode-id="2347" instrument_node="">putting aside</span></a><span data-dcnode-id="2345" instrument_node=""> the fact that </span><a class="urllink" data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//wuffs.org/acnh/mysterytour.html"><span data-dcnode-id="2344" instrument_node="">there are only 25 different kinds of islands you can travel to</span><img data-dcnode-id="2343" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2341" instrument_node=""> and the only real differences between most of them are what can be found there. Played more straight with the May Day maze island; Tom Nook gives you only one ticket for it, so leaving early will lock you out of getting a special piece of furniture for a whole year.</span></li><li data-dcnode-id="2323"><span data-dcnode-id="2339" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerUpFood" title="/pmwiki/pmwiki.php/Main/PowerUpFood"><span data-dcnode-id="2338" instrument_node="">Power-Up Food</span></a><span data-dcnode-id="2336" instrument_node="">:</span><ul data-dcnode-id="2324"><li data-dcnode-id="2331"><span data-dcnode-id="2335" instrument_node=""> Edible items have always been, well, edible, but now there's a gameplay reason to do so, as it grants stamina to do things like break rocks with your shovel or axe or dig up full-grown trees. You can stock up to ten points of stamina, and the points can be cancelled by </span><a class="twikilink" data-dcnode-id="2333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NobodyPoops" title="/pmwiki/pmwiki.php/Main/NobodyPoops"><span data-dcnode-id="2334" instrument_node="">sitting on a toilet</span></a><span data-dcnode-id="2332" instrument_node="">.</span></li><li data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node=""> Most food items, like fruit, grant one feat of strength.</span></li><li data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node=""> Starting in 2021, you can win frozen treats, cotton candy, and boba drinks from Redd's August fireworks stall. They can be "used" up to three times each, with each use granting one point of stamina.</span></li><li data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node=""> Starting with Version 2.0, the cooking mechanic can make meals that provide all ten units of strength at once.</span></li></ul></li><li data-dcnode-id="2318"><span data-dcnode-id="2322" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PromotedToParent" title="/pmwiki/pmwiki.php/Main/PromotedToParent"><span data-dcnode-id="2321" instrument_node="">Promoted to Parent</span></a><span data-dcnode-id="2319" instrument_node="">: Turns out Sable was this with Mable since Mable was young with their parent died. The same is true with little Label as well.</span></li><li data-dcnode-id="2301"><span data-dcnode-id="2317" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PunWithPi" title="/pmwiki/pmwiki.php/Main/PunWithPi"><span data-dcnode-id="2316" instrument_node="">Pun With Pi</span></a><span data-dcnode-id="2314" instrument_node="">: Starting from the version 1.8.0 update, players can order "π pies" from the Seasonal section of the Nook Shopping service from March 1st to 14th in honour of "Pi Day"</span><span class="notelabel" data-dcnode-id="2311" onclick="togglenote('note27iy97');" style="cursor: pointer;"><sup data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2309" id="note27iy97" isnote="true" onclick="togglenote('note27iy97');" style="display: none; cursor: pointer;"><span data-dcnode-id="2310" instrument_node="">"March 14" can be rendered as "3/14", and pi rounded to two decimal places is 3.14</span></span><span data-dcnode-id="2308" instrument_node="">. To underscore the point, </span><a class="urllink" data-dcnode-id="2305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=
