</span><p data-dcnode-id="2222"><span data-dcnode-id="2230" instrument_node="">In the Middle Ages, the Church and the worldly authorities were closely related. </span><a data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/martin-luther/"><strong data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Martin Luther</span></strong></a><span data-dcnode-id="2226" instrument_node="">&nbsp;separated the religious and the worldly realms in principle (doctrine of the two kingdoms).&nbsp;The believers were obliged to use reason to govern the worldly sphere in an orderly and peaceful way. Luther’s doctrine of the&nbsp;priesthood of all believers&nbsp;upgraded the role of laymen in the church considerably. The members of a congregation had the right to elect a minister and, if necessary, to vote for his dismissal (Treatise&nbsp;</span><i data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">On the right and authority of a Christian assembly or congregation to judge all doctrines and to call, install and dismiss teachers, as testified in Scripture</span></i><span data-dcnode-id="2223" instrument_node="">; 1523).&nbsp;Calvin strengthened this basically democratic approach by including elected laymen (church elders,&nbsp;presbyters) in his representative church government. The Huguenots added regional synods and a national synod, whose members were elected by the congregations, to Calvin’s system of church self-government. This system was taken over by the other Reformed churches.</span></p><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Politically,&nbsp;John Calvin&nbsp;favoured a mixture of aristocracy and democracy. He appreciated the advantages of democracy: “It is an invaluable gift, if God allows a people to freely elect its own authorities and overlords.”&nbsp;Calvin also thought that earthly rulers lose their divine right and must be put down when they rise up against God. To further protect the rights of ordinary people, Calvin suggested separating political powers in a system of checks and balances (separation of powers). 16th-century Calvinists and Lutherans developed a theory of resistance called the&nbsp;doctrine of the lesser magistrate&nbsp;which was later employed in the U.S. Declaration of Independence. Thus early Protestants resisted political&nbsp;absolutism&nbsp;and paved the way for the rise of modern democracy.&nbsp;Besides England, the Netherlands were, under Calvinist leadership, the freest country in Europe in the seventeenth and eighteenth centuries. It granted asylum to philosophers like&nbsp;René Descartes,&nbsp;Baruch Spinoza&nbsp;and&nbsp;Pierre Bayle.&nbsp;Hugo Grotius&nbsp;was able to teach his natural-law theory and a relatively liberal interpretation of the Bible.</span></p><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Consistent with Calvin’s political ideas, Protestants created both the English and the American democracies. In 17th-century England, the most important persons and events in this process were the&nbsp;English Civil War,&nbsp;Oliver Cromwell,&nbsp;John Milton,&nbsp;John Locke, the&nbsp;Glorious Revolution, the&nbsp;English Bill of Rights, and the&nbsp;Act of Settlement.&nbsp;Later, the British took their democratic ideals also to their colonies, e.g. Australia, New Zealand, and India. In the 19th and 20th centuries, the British variety of modern-time democracy,&nbsp;constitutional monarchy, was taken over by Protestant-formed Sweden, Norway, Denmark, and the Netherlands as well as the Catholic countries Belgium and Spain. In North America,&nbsp;Plymouth Colony&nbsp;(Pilgrim Fathers; 1620) and&nbsp;Massachusetts Bay Colony&nbsp;(1628) practised democratic self-rule and&nbsp;separation of powers.&nbsp;These&nbsp;Congregationalists&nbsp;were convinced that the democratic form of government was the will of God. The Mayflower Compact was a social contract.</span></p><span data-dcnode-id="2215" instrument_node="">
</span><h2 class="fittexted_for_content_h2" data-dcnode-id="2210" style="font-size: 38.25px;"><span class="ez-toc-section" data-dcnode-id="2214" id="sexual_morals"></span><span class="mw-headline" data-dcnode-id="2212" id="Sexual_morals"><span data-dcnode-id="2213" instrument_node="">Sexual morals</span></span><span class="ez-toc-section-end" data-dcnode-id="2211"></span></h2><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2208" instrument_node="">Classics scholar&nbsp;</span><a class="broken_link" data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DKyle_Harper%26redlink%3D1" target="_blank"><span data-dcnode-id="2207" instrument_node="">Kyle Harper</span></a><span data-dcnode-id="2205" instrument_node="">&nbsp;says</span></p><span data-dcnode-id="2203" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="2200"><p class="font-effect-shadow-soft" data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">“…the triumph of Christianity not only drove profound cultural change, it created a new relationship between sexual morality and society… The legacy of Christianity lies in the dissolution of an ancient system where social and political status, power, and&nbsp;the transmission of social inequality to the next generation&nbsp;scripted the terms of sexual morality.”</span></p></blockquote><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Both the ancient Greeks and the Romans cared and wrote about sexual morality within categories of good and bad, pure and defiled, and ideal and transgression. But the sexual ethical structures of Roman society were built on status, and sexual modesty meant something different for men than it did for women, and for the well-born, than it did for the poor, and for the free citizen, than it did for the slave—for whom the concepts of honor, shame and sexual modesty could be said to have no meaning at all.&nbsp;Slaves were not thought to have an interior ethical life because they could go no lower socially and were commonly used sexually; the free and well born were thought to embody social honor and were therefore able to exhibit the fine sense of shame suited to their station. Roman literature indicates the Romans were aware of these dualities.</span></p><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2195" instrument_node="">Shame was a profoundly social concept that was, in ancient Rome, always mediated by gender and status. “It was not enough that a wife merely regulate her sexual behavior in the accepted ways; it was required that her virtue in this area be conspicuous.”&nbsp;Men, on the other hand, were allowed live-in mistresses called&nbsp;</span><i data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">pallake.</span></i><span data-dcnode-id="2192" instrument_node=""> This permitted Roman society to find both a husband’s control of a wife’s sexual behavior a matter of intense importance and at the same time see his own sex with young boys as of little concern.&nbsp;Christianity sought to establish equal sexual standards for men and women and to protect all the young whether slave or free. This was a transformation in the deep logic of sexual morality.</span></p><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2185"><span data-dcnode-id="2189" instrument_node="">Early Church Fathers advocated against adultery, polygamy, homosexuality, pederasty, bestiality, prostitution, and incest while advocating for the sanctity of the marriage bed.&nbsp;The central Christian prohibition against such&nbsp;</span><i data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">porneia</span></i><span data-dcnode-id="2186" instrument_node="">, which is a single name for that array of sexual behaviors, “collided with deeply entrenched patterns of Roman permissiveness where the legitimacy of sexual contact was determined primarily by status. St. Paul, whose views became dominant in early Christianity, made the body into a consecrated space, a point of mediation between the individual and the divine. Paul’s over-riding sense that gender—rather than status or power or wealth or position—was the prime determinant in the propriety of the sex act was momentous. By boiling the sex act down to the most basic constituents of male and female, Paul was able to describe the sexual culture surrounding him in transformative terms.”</span></p><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Christian sexual ideology is inextricable from its concept of freewill. “In its original form, Christian freewill was a cosmological claim—an argument about the relationship between God’s justice and the individual… as Christianity became intermeshed with society, the discussion shifted in revealing ways to the actual psychology of volition and the material constraints on sexual action… The church’s acute concern with volition places Christian philosophy in the liveliest currents of imperial Greco-Roman philosophy [where] orthodox Christians offered a radically distinctive version of it.” The Greeks and Romans said our deepest moralities depend on our social position which is given to us by fate. Christianity “preached a liberating message of freedom. It was a revolution in the rules of behavior, but also in the very image of the human being as a sexual being, free, frail and awesomely responsible for one’s own self to God alone. It was a revolution in the nature of society’s claims on the moral agent… There are risks in over-estimating the change in old patterns Christianity was able to begin bringing about; but there are risks, too, in underestimating Christianization as a watershed.”</span></p><span data-dcnode-id="2181" instrument_node="">
</span><h2 class="fittexted_for_content_h2" data-dcnode-id="2176" style="font-size: 38.25px;"><span class="ez-toc-section" data-dcnode-id="2180" id="marriage_and_family_life"></span><span class="mw-headline" data-dcnode-id="2178" id="Marriage_and_family_life"><span data-dcnode-id="2179" instrument_node="">Marriage and family life</span></span><span class="ez-toc-section-end" data-dcnode-id="2177"></span></h2><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2170"><span data-dcnode-id="2174" instrument_node="">See also: </span><strong data-dcnode-id="2171"><a aria-label="“Women In Christianity” (Edit)" class="row-title" data-dcnode-id="2172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D56549"><span data-dcnode-id="2173" instrument_node="">Women In Christianity</span></a></strong></p><div class="wp-caption alignright" data-dcnode-id="2166" id="attachment_93739" style="width: 228px"><img alt="&quot;Therefore what God has joined together, let not man separate.&quot; (Gospel of Matthew 19:6) Matrimony, The Seven Sacraments, Rogier van der Weyden, ca. 1445." aria-describedby="caption-attachment-93739" class="size-medium wp-image-93739" data-dcnode-id="2169" data-sizes="(max-width: 218px) 100vw, 218px" data-src="https://slife.org/wp-content/uploads/Weyden_Matrimony-218x300.jpg" data-srcset="https://slife.org/wp-content/uploads/Weyden_Matrimony-218x300.jpg 218w, https://slife.org/wp-content/uploads/Weyden_Matrimony-109x150.jpg 109w, https://slife.org/wp-content/uploads/Weyden_Matrimony.jpg 299w" height="300" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="218"><p class="wp-caption-text" data-dcnode-id="2167" id="caption-attachment-93739"><span data-dcnode-id="2168" instrument_node="">“Therefore what God has joined together, let not man separate.” (Gospel of Matthew 19:6) Matrimony, The Seven Sacraments, Rogier van der Weyden, ca. 1445.</span></p></div><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">The teachings of the Church have also been used to “establish[…] the status of women under the law”.&nbsp;There has been some debate as to whether the Church has improved the status of women or hindered their progress.</span></p><span data-dcnode-id="2163" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2162" instrument_node="">From the beginning of the thirteenth century, the Church formally recognized </span><a data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/marriage/"><strong data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">marriage</span></strong></a><span data-dcnode-id="2158" instrument_node=""> between a freely consenting, baptized man and woman as a sacrament—an outward sign communicating a special gift of God’s love. The Council of Florence in 1438 gave this definition, following earlier Church statements in 1208, and declared that sexual union was a special participation in the union of Christ in the Church. However, the Puritans, while highly valuing the institution, viewed marriage as a “civil”, rather than a “religious” matter, being “under the jurisdiction of the civil courts”. This is because they found no biblical precedent for clergy performing marriage ceremonies. Further, marriage was said to be for the “relief of concupiscence” as well as any spiritual purpose. During the Protestant Reformation, Martin Luther and John Calvin denied the sacramentality of marriage. This unanimity was broken at the 1930 Lambeth Conference, the quadrennial meeting of the worldwide </span><strong data-dcnode-id="2155"><a data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wp.me/paskYC-jeC" target="_blank"><span data-dcnode-id="2157" instrument_node="">Anglican Communion</span></a></strong><span data-dcnode-id="2154" instrument_node=""> —creating divisions in that denomination.</span></p><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Catholicism&nbsp;equates premarital sex with&nbsp;fornication&nbsp;and ties it with breaking the&nbsp;sixth commandment&nbsp;(“Thou shalt not commit adultery”) in its&nbsp;Catechism.&nbsp;While sex before marriage was not a taboo in the Anglican Church until the “Hardwicke Marriage Act of 1753, which for the first time stipulated that everyone in England and Wales had to be married in their parish church”&nbsp;Prior to that time, “marriage began at the time of betrothal, when couples would live and sleep together… The process begun at the time of the Hardwicke Act continued throughout the 1800s, with stigma beginning to attach to illegitimacy.”</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Scriptures in the&nbsp;New Testament&nbsp;dealing with sexuality are extensive. Subjects include: the&nbsp;Apostolic Decree&nbsp;(Acts 15), sexual immorality, divine love (1 Corinthians 13), mutual self-giving (1 Corinthians 7), bodily membership between Christ and between husband and wife (1 Corinthians 6:15–20) and honor versus dishonor of adultery (Hebrews 13:4).</span></p><span data-dcnode-id="2146" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="2141" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="2145" id="roman_empire"></span><span class="mw-headline" data-dcnode-id="2143" id="Roman_Empire"><span data-dcnode-id="2144" instrument_node="">Roman Empire</span></span><span class="ez-toc-section-end" data-dcnode-id="2142"></span></h3><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Social structures before and at the dawn of Christianity in the&nbsp;Roman Empire&nbsp;held that women were inferior to men intellectually and physically and were “naturally dependent”. Athenian&nbsp;women were legally classified as children regardless of age and were the “legal property of some man at all stages in her life.”&nbsp;Women in the Roman Empire had limited legal rights and could not enter professions. Female infanticide and abortion were practiced by all classes.&nbsp;In family life, men could have “lovers, prostitutes and concubines” but wives who engaged in extramarital affairs were considered guilty of adultery. It was not rare for pagan women to be married before the age of puberty and then forced to consummate the marriage with her often much older husband. Husbands could divorce their wives at any time simply by telling the wife to leave; wives did not have a similar ability to divorce their husbands.</span></p><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Early Church Fathers advocated against polygamy, abortion, infanticide, child abuse, homosexuality, transvestism, and incest.&nbsp;Although some Christian ideals were adopted by the Roman Empire, there is little evidence to link most of these laws to Church influence.&nbsp;After the Roman Empire adopted Christianity as the official religion, however, the link between Christian teachings and Roman family laws became more clear.</span></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">For example, Church teaching heavily influenced the legal concept of marriage.&nbsp;During the&nbsp;Gregorian Reform, the Church developed and codified a view of marriage as a sacrament. In a departure from societal norms, Church law required the consent of both parties before a marriage could be performed&nbsp;and established a minimum age for marriage. The elevation of marriage to a sacrament also made the union a binding contract, with dissolutions overseen by Church authorities. Although the Church abandoned tradition to allow women the same rights as men to dissolve a marriage,&nbsp;in practice, when an accusation of infidelity was made, men were granted dissolutions more frequently than women.</span></p><span data-dcnode-id="2131" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="2126" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="2130" id="medieval_period"></span><span class="mw-headline" data-dcnode-id="2128" id="Medieval_period"><span data-dcnode-id="2129" instrument_node="">Medieval period</span></span><span class="ez-toc-section-end" data-dcnode-id="2127"></span></h3><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">According to historian Shulamith Shahar, “[s]ome historians hold that the Church played a considerable part in fostering the inferior status of women in medieval society in general” by providing a “moral justification” for male superiority and by accepting practices such as wife-beating. “The ecclesiastical conception of the inferior status of women, deriving from Creation, her role in Original Sin and her subjugation to man, provided both direct and indirect justification for her inferior standing in the family and in society in medieval civilization. It was not the Church which induced husbands to beat their wives, but it not only accepted this custom after the event, if it was not carried to excess, but, by proclaiming the superiority of man, also supplied its moral justification.” Despite these laws, some women, particularly&nbsp;abbesses, gained powers that were never available to women in previous Roman or Germanic societies.</span></p><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Although these teachings emboldened secular authorities to give women fewer rights than men, they also helped form the concept of chivalry. Chivalry was influenced by a new Church attitude towards Mary, the mother of Jesus.&nbsp;This “ambivalence about women’s very nature” was shared by most major religions in the Western world.</span></p><span data-dcnode-id="2119" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="2114" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="2118" id="family_relations"></span><span class="mw-headline" data-dcnode-id="2116" id="Family_relations"><span data-dcnode-id="2117" instrument_node="">Family relations</span></span><span class="ez-toc-section-end" data-dcnode-id="2115"></span></h3><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2105"><a data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/christian-culture/"><strong data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Christian culture</span></strong></a><span data-dcnode-id="2109" instrument_node=""> puts notable emphasis on the family, and according to the work of scholars Max Weber, Alan Macfarlane, Steven Ozment, Jack Goody and Peter Laslett, the huge transformation that led to modern marriage in Western democracies was “fueled by the religio-cultural value system provided by elements of Judaism, early Christianity, Roman Catholic canon law and the Protestant Reformation”.&nbsp;Historically,&nbsp;</span><i data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">extended families</span></i><span data-dcnode-id="2106" instrument_node="">&nbsp;were the basic family unit in the&nbsp;Catholic culture&nbsp;and&nbsp;countries.&nbsp;According to a study by the scholar Joseph Henrich from&nbsp;Harvard University, the Catholic church “changed extended family ties, as well as values and psychology of individuals in the Western world”.</span></p><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2098"><span data-dcnode-id="2103" instrument_node="">Most </span><a data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D71826"><strong data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Christian denominations</span></strong></a><span data-dcnode-id="2099" instrument_node=""> practice infant baptism to enter children into the faith. Some form of confirmation ritual occurs when the child has reached the age of reason and voluntarily accepts the religion. Ritual circumcision is used to mark Coptic Christian and Ethiopian Orthodox Christian infant males as belonging to the faith. During the early period of capitalism, the rise of a large, commercial middle class, mainly in the Protestant countries of Holland and England, brought about a new family ideology centred around the upbringing of children. Puritanism stressed the importance of individual salvation and concern for the spiritual welfare of children. It became widely recognized that children possess rights on their own behalf. This included the rights of poor children to sustenance, membership in a community, education, and job training. The Poor Relief Acts in Elizabethan England put responsibility on each Parish to care for all the poor children in the area. And prior to the 20th century, three major branches of Christianity—Catholicism, Orthodoxy and Protestantism—as well as leading Protestant reformers Martin Luther and John Calvin generally held a critical perspective of birth control.</span></p><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2091"><span data-dcnode-id="2096" instrument_node="">The&nbsp;</span><a data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D53388"><strong data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Church of Jesus Christ of Latter-day Saints</span></strong></a><span data-dcnode-id="2092" instrument_node=""> puts notable emphasis on the family, and the distinctive concept of a united family which lives and progresses forever is at the core of Latter-day Saint doctrine. Church members are encouraged to marry and have children, and as a result, Latter-day Saint families tend to be larger than average. All sexual activity outside of marriage is considered a serious sin. All homosexual activity is considered sinful and same-sex marriages are not performed or supported by the LDS Church. Latter-day Saint fathers who hold the priesthood typically name and bless their children shortly after birth to formally give the child a name and generate a church record for them. Mormons tend to be very family-oriented and have strong connections across generations and with extended family, reflective of their belief that families can be sealed together beyond death. In the temple, husbands and wives are sealed to each other for eternity. The implication is that other institutional forms, including the church, might disappear, but the family will endure. A 2011 survey of Mormons in the United States showed that family life is very important to Mormons, with family concerns significantly higher than career concerns. Four out of five Mormons believe that being a good parent is one of the most important goals in life, and roughly three out of four Mormons put having a successful marriage in this category. Mormons also have a strict law of chastity, requiring abstention from sexual relations outside heterosexual marriage and fidelity within marriage.</span></p><span data-dcnode-id="2090" instrument_node="">
</span><p data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">A&nbsp;Pew Center&nbsp;study about Religion and Living arrangements around the world in 2019, found that Christians around the world live in somewhat smaller households, on average, than non-Christians (4.5 vs. 5.1 members). 34% of world’s Christian population live in two parent families with minor children, while 29% live in household with&nbsp;extended families, 11% live as couples without other family members, 9% live in household with least one child over the age of 18 with one or two parents, 7% live alone, and 6% live in&nbsp;single parent&nbsp;households.&nbsp;Christians in&nbsp;Asia&nbsp;and&nbsp;Pacific,&nbsp;Latin America&nbsp;and the&nbsp;Caribbean,&nbsp;Middle East&nbsp;and&nbsp;North Africa, and in&nbsp;Sub-Saharan Africa, overwhelmingly live in extended or two parent families with minor children.&nbsp;While more Christians in Europe and North America live alone or as couples without other family members.</span></p><span data-dcnode-id="2087" instrument_node="">
</span><h2 class="fittexted_for_content_h2" data-dcnode-id="2082" style="font-size: 38.25px;"><span class="ez-toc-section" data-dcnode-id="2086" id="slavery"></span><span class="mw-headline" data-dcnode-id="2084" id="Slavery"><span data-dcnode-id="2085" instrument_node="">Slavery</span></span><span class="ez-toc-section-end" data-dcnode-id="2083"></span></h2><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2080" instrument_node="">Main article:&nbsp;</span><a data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Church_and_slavery" target="_blank" title="Catholic Church and slavery"><span data-dcnode-id="2079" instrument_node="">Catholic Church and slavery</span></a></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">The Church initially accepted slavery as part of the Greco-Roman social fabric of society, campaigning primarily for humane treatment of slaves but also admonishing slaves to behave appropriately towards their masters.&nbsp;Historian Glenn Sunshine says, “Christians were the first people in history to oppose slavery systematically. Early Christians purchased slaves in the markets simply to set them free. Later, in the seventh century, the Franks…, under the influence of its Christian queen,&nbsp;Bathilde, became the first kingdom in history to begin the process of outlawing slavery. …In the 1200s, Thomas Aquinas declared slavery a sin. When the African slave trade began in the 1400s, it was condemned numerous times by the papacy.”</span></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2068"><span data-dcnode-id="2072" instrument_node="">During the early medieval period, Christians tolerated enslavement of non-Christians. By the end of the Medieval period, enslavement of Christians had been mitigated somewhat with the spread of&nbsp;serfdom&nbsp;within Europe, though outright slavery existed in European colonies in other parts of the world. Several popes issued papal bulls condemning mistreatment of enslaved Native Americans; these were largely ignored. In his 1839 bull&nbsp;</span><i data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">In supremo apostolatus</span></i><span data-dcnode-id="2069" instrument_node="">, Pope Gregory XVI condemned all forms of slavery; nevertheless some American bishops continued to support slavery for several decades. In this historic Bull, Pope Gregory outlined his summation of the impact of the Church on the ancient institution of slavery, beginning by acknowledging that early Apostles had tolerated slavery but had called on masters to “act well towards their slaves… knowing that the common Master both of themselves and of the slaves is in Heaven, and that with Him there is no distinction of persons”. Gregory continued to discuss the involvement of Christians for and against slavery through the ages:</span></p><span data-dcnode-id="2067" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="2064"><p class="font-effect-shadow-soft" data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">In the process of time, the fog of pagan superstition being more completely dissipated and the manners of barbarous people having been softened, thanks to Faith operating by Charity, it at last comes about that, since several centuries, there are no more slaves in the greater number of Christian nations. But&nbsp;– We say with profound sorrow&nbsp;– there were to be found afterwards among the Faithful men who, shamefully blinded by the desire of sordid gain, in lonely and distant countries, did not hesitate to reduce to slavery Indians, negroes and other wretched peoples, or else, by instituting or developing the trade in those who had been made slaves by others, to favour their unworthy practice. Certainly many Roman Pontiffs of glorious memory, Our Predecessors, did not fail, according to the duties of their charge, to blame severely this way of acting as dangerous for the spiritual welfare of those engaged in the traffic and a shame to the Christian name; they foresaw that as a result of this, the infidel peoples would be more and more strengthened in their hatred of the true Religion.</span></p></blockquote><span data-dcnode-id="2063" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="2058" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="2062" id="latin_america"></span><span class="mw-headline" data-dcnode-id="2060" id="Latin_America"><span data-dcnode-id="2061" instrument_node="">Latin America</span></span><span class="ez-toc-section-end" data-dcnode-id="2059"></span></h3><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2056" instrument_node="">It was women, primarily Amerindian Christian converts who became the primary supporters of the Latin American Church. While the Spanish military was known for its ill-treatment of Amerindian men and women, Catholic missionaries are credited with championing all efforts to initiate protective laws for the Indians and fought against their enslavement. This began within 20 years of the discovery of the New World by Europeans in 1492&nbsp;– in December 1511,&nbsp;Antonio de Montesinos, a Dominican friar, openly rebuked the Spanish rulers of&nbsp;Hispaniola&nbsp;for their “cruelty and tyranny” in dealing with the American natives.&nbsp;King Ferdinand&nbsp;enacted the&nbsp;</span><i data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Laws of Burgos</span></i><span data-dcnode-id="2053" instrument_node="">&nbsp;and&nbsp;</span><i data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Valladolid</span></i><span data-dcnode-id="2050" instrument_node=""> in response. The issue resulted in a crisis of conscience in 16th-century Spain.&nbsp;Further abuses against the Amerindians committed by Spanish authorities were denounced by Catholic missionaries such as&nbsp;Bartolomé de Las Casas&nbsp;and&nbsp;Francisco de Vitoria&nbsp;which led to debate on the nature of human rights&nbsp;and the birth of modern international law. Enforcement of these laws was lax, and some historians blame the Church for not doing enough to liberate the Indians; others point to the Church as the only voice raised on behalf of indigenous peoples.</span></p><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">Slavery and human sacrifice were both part of Latin American culture before the Europeans arrived. Indian slavery was first abolished by Pope Paul III in the 1537 bull Sublimis Deus which confirmed that “their souls were as immortal as those of Europeans”, that Indians were to be regarded as fully human, and they should neither be robbed nor turned into slaves.&nbsp;While these edicts may have had some beneficial effects, these were limited in scope. European colonies were mainly run by military and royally-appointed administrators, who&nbsp;seldom stopped to consider church teachings&nbsp;when forming policy or enforcing their rule. Even after&nbsp;independence, institutionalized prejudice and injustice toward indigenous people continued well into the twentieth century. This has led to the formation of&nbsp;a number of movements to reassert&nbsp;indigenous peoples’ civil rights and culture in modern nation-states.</span></p><span data-dcnode-id="2045" instrument_node="">
</span><p data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">A catastrophe was wrought upon the Amerindians by contact with Europeans. Old World diseases like smallpox, measles, malaria and many others spread through Indian populations. “In most of the New World 90 percent or more of the native population was destroyed by wave after wave of previously unknown afflictions. Explorers and colonists did not enter an empty land but rather an emptied one”.</span></p><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2041" instrument_node="">See also:&nbsp;</span><a class="mw-redirect" data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Population_history_of_American_indigenous_peoples" target="_blank" title="Population history of American indigenous peoples"><span data-dcnode-id="2040" instrument_node="">Population history of American indigenous peoples</span></a></p><span data-dcnode-id="2037" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="2032" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="2036" id="africa"></span><span class="mw-headline" data-dcnode-id="2034" id="Africa"><span data-dcnode-id="2035" instrument_node="">Africa</span></span><span class="ez-toc-section-end" data-dcnode-id="2033"></span></h3><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2026"><span data-dcnode-id="2030" instrument_node="">Slavery and the slave trade were part of African societies and states which supplied the Arab world with slaves before the arrival of the Europeans.&nbsp;Several decades prior to discovery of the&nbsp;New World, in response to serious military threat to Europe posed by Muslims of the&nbsp;Ottoman Empire,&nbsp;Pope Nicholas V&nbsp;had granted Portugal the right to subdue Muslims, pagans and other unbelievers in the papal bull&nbsp;Dum Diversas&nbsp;(1452).&nbsp;Six years after African slavery was first outlawed by the first major entity to do so, (Great Britain in 1833),&nbsp;Pope Gregory XVI&nbsp;followed in a challenge to Spanish and Portuguese policy, by condemning slavery and the slave trade in the 1839 papal bull&nbsp;</span><i data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">In supremo apostolatus</span></i><span data-dcnode-id="2027" instrument_node="">, and approved the ordination of native clergy in the face of government racism.&nbsp;The United States would eventually outlaw African slavery in 1865.</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">By the close of the 19th century, European powers had managed to gain control of most of the African interior. The new rulers introduced cash-based economies which created an enormous demand for literacy and a western education—a demand which for most Africans could only be satisfied by Christian missionaries. Catholic missionaries followed colonial governments into Africa, and built schools, hospitals, monasteries and churches.</span></p><span data-dcnode-id="2022" instrument_node="">
</span><h2 class="fittexted_for_content_h2" data-dcnode-id="2017" style="font-size: 38.25px;"><span class="ez-toc-section" data-dcnode-id="2021" id="letters_and_learning"></span><span class="mw-headline" data-dcnode-id="2019" id="Letters_and_learning"><span data-dcnode-id="2020" instrument_node="">Letters and learning</span></span><span class="ez-toc-section-end" data-dcnode-id="2018"></span></h2><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="1994"><span data-dcnode-id="2015" instrument_node="">Main articles: </span><strong data-dcnode-id="2012"><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D61383" title="Christianity and science"><span data-dcnode-id="2014" instrument_node="">Christianity and science</span></a></strong><span data-dcnode-id="2011" instrument_node="">&nbsp;and&nbsp;</span><strong data-dcnode-id="2008"><a class="mw-redirect" data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/science-and-the-catholic-church/" title="Catholic Church and science"><span data-dcnode-id="2010" instrument_node="">Catholic Church and science</span></a></strong><br data-dcnode-id="2007"><span data-dcnode-id="2006" instrument_node="">
See also:&nbsp;</span><a class="mw-redirect" data-dcnode-id="2004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Christian_thinkers_in_science" target="_blank" title="List of Christian thinkers in science"><span data-dcnode-id="2005" instrument_node="">List of Christian thinkers in science</span></a><span data-dcnode-id="2003" instrument_node="">,&nbsp;</span><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Christian_Nobel_laureates" target="_blank" title="List of Christian Nobel laureates"><span data-dcnode-id="2002" instrument_node="">List of Christian Nobel laureates</span></a><span data-dcnode-id="2000" instrument_node="">,&nbsp;</span><a class="mw-redirect" data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Roman_Catholic_scientist-clerics" target="_blank" title="List of Roman Catholic scientist-clerics"><span data-dcnode-id="1999" instrument_node="">List of Roman Catholic scientist-clerics</span></a><span data-dcnode-id="1997" instrument_node="">, and&nbsp;</span><a class="mw-redirect" data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Catholic_scientists" target="_blank" title="List of Catholic scientists"><span data-dcnode-id="1996" instrument_node="">List of Catholic scientists</span></a></p><div class="wp-caption alignright" data-dcnode-id="1990" id="attachment_61389" style="width: 230px"><img alt="Sir Francis Bacon, &quot;Knowledge is Power&quot;" aria-describedby="caption-attachment-61389" class="size-medium wp-image-61389" data-dcnode-id="1993" data-sizes="(max-width: 220px) 100vw, 220px" data-src="https://slife.org/wp-content/uploads/Active_Christians_in_Science-220x300.jpg" data-srcset="https://slife.org/wp-content/uploads/Active_Christians_in_Science-220x300.jpg 220w, https://slife.org/wp-content/uploads/Active_Christians_in_Science-110x150.jpg 110w, https://slife.org/wp-content/uploads/Active_Christians_in_Science.jpg 439w" height="300" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="220"><p class="wp-caption-text" data-dcnode-id="1991" id="caption-attachment-61389"><span data-dcnode-id="1992" instrument_node="">Set of pictures for a number of notable&nbsp;Scientists&nbsp;self-identified as&nbsp;Christians:&nbsp;Isaac Newton,&nbsp;Robert Boyle,&nbsp;Francis Bacon&nbsp;and&nbsp;Johannes Kepler.</span></p></div><p data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">The influence of the Church on Western letters and learning has been formidable. The ancient texts of the Bible have deeply influenced Western art, literature and culture. For centuries following the collapse of the Western Roman Empire, small monastic communities were practically the only outposts of literacy in Western Europe. In time, the Cathedral schools developed into Europe’s earliest universities and the church has established thousands of primary, secondary and tertiary institutions throughout the world in the centuries since. The Church and clergymen have also sought at different times to censor texts and scholars. Thus different schools of opinion exist as to the role and influence of the Church in relation to western letters and learning.</span></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">One view, first propounded by Enlightenment philosophers, asserts that the Church’s doctrines are entirely superstitious and have hindered the progress of civilization. Communist states have made similar arguments in their education in order to inculcate a negative view of Catholicism (and religion in general) in their citizens. The most famous incidents cited by such critics are the Church’s condemnations of the teachings of Copernicus, Galileo Galilei and Johannes Kepler.</span></p><span data-dcnode-id="1984" instrument_node="">
</span><p data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">In opposition to this view, some historians of science, including non-Catholics such as J.L. Heilbron, A.C. Crombie, David Lindberg, Edward Grant, historian of science Thomas Goldstein, and Ted Davis, have argued that the Church had a significant, positive influence on the development of Western civilization. They hold that, not only did monks save and cultivate the remnants of ancient civilization during the barbarian invasions, but that the Church promoted learning and science through its sponsorship of many universities which, under its leadership, grew rapidly in Europe in the 11th and 12th centuries. Copernicus, Galileo Galilei, and Johannes Kepler all considered themselves Christian. St.Thomas Aquinas, the Church’s “model theologian”, argued that reason is in harmony with faith, and that reason can contribute to a deeper understanding of revelation, and so encouraged intellectual development. The Church’s priest-scientists, many of whom were Jesuits, have been among the leading lights in astronomy, genetics, geomagnetism, meteorology, seismology, and solar physics, becoming some of the “fathers” of these sciences. Examples include important churchmen such as the Augustinian abbot Gregor Mendel (pioneer in the study of genetics), the monk William of Ockham who developed Ockham’s Razor, Roger Bacon (a Franciscan friar who was one of the early advocates of the scientific method), and Belgian priest Georges Lemaître (the first to propose the Big Bang theory). Other notable priest scientists have included Albertus Magnus, Robert Grosseteste, Nicholas Steno, Francesco Grimaldi, Giambattista Riccioli, Roger Boscovich, and Athanasius Kircher. Even more numerous are Catholic laity involved in science:Henri Becquerel who discovered radioactivity; Galvani, Volta, Ampere, Marconi, pioneers in electricity and telecommunications; Lavoisier, “father of modern chemistry”; Vesalius, founder of modern human anatomy; and Cauchy, one of the mathematicians who laid the rigorous foundations of calculus.</span></p><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Many well-known historical figures who influenced Western science considered themselves Christian such as Copernicus, Galileo, Kepler, Newton and Boyle. Some scholars and historians attributes Christianity to having contributed to the rise of the Scientific Revolution.</span></p><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1977" instrument_node="">According to&nbsp;</span><i data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">100 Years of Nobel Prize (2005)</span></i><span data-dcnode-id="1974" instrument_node="">, a review of Nobel prizes awarded between 1901 and 2000, 65.4% of&nbsp;Nobel Prize Laureates, have identified Christianity in its various forms as their religious preference (423 prizes).&nbsp;Overall, Christians have won a total of 78.3% of all the Nobel Prizes in&nbsp;Peace,&nbsp;72.5% in&nbsp;Chemistry, 65.3% in&nbsp;Physics,&nbsp;62% in&nbsp;Medicine,&nbsp;54% in&nbsp;Economics&nbsp;and 49.5% of all&nbsp;Literature&nbsp;awards.</span></p><span data-dcnode-id="1972" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1967" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1971" id="antiquity"></span><span class="mw-headline" data-dcnode-id="1969" id="Antiquity"><span data-dcnode-id="1970" instrument_node="">Antiquity</span></span><span class="ez-toc-section-end" data-dcnode-id="1968"></span></h3><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1954"><span data-dcnode-id="1965" instrument_node="">Christianity began as a Jewish sect in the 1st century AD, and from the teachings of </span><a data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/jesus-of-nazareth/"><strong data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Jesus of Nazareth</span></strong></a><span data-dcnode-id="1961" instrument_node="">&nbsp;and his early followers. Jesus learned the texts of the&nbsp;Hebrew Bible&nbsp;and became an influential wandering preacher. Accounts of his life and teachings appear in the&nbsp;New Testament&nbsp;of the Bible, one of the bedrock texts of Western Civilization.&nbsp;His orations, including the&nbsp;</span><i data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Sermon on the Mount</span></i><span data-dcnode-id="1958" instrument_node="">,&nbsp;</span><i data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">The Good Samaritan</span></i><span data-dcnode-id="1955" instrument_node="">&nbsp;and his declaration against hypocrisy “Let he who is without sin cast the first stone” have been deeply influential in&nbsp;Western literature. Many translations of the Bible exist, including the&nbsp;King James Bible, which is one of the most admired texts in&nbsp;English literature. The poetic&nbsp;Psalms&nbsp;and other passages of the Hebrew Bible have also been deeply influential in Western Literature and thought. Accounts of the actions of Jesus’ early followers are contained within the&nbsp;Acts of the Apostles&nbsp;and&nbsp;Epistles&nbsp;written between the early Christian communities&nbsp;– in particular the&nbsp;Pauline epistles&nbsp;which are among the earliest extant Christian documents and foundational texts of&nbsp;Christian theology.</span></p><span data-dcnode-id="1953" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">After the death of Jesus, the new sect grew to be the dominant religion of the Roman Empire and the long tradition of Christian scholarship began. When the&nbsp;Western Roman Empire&nbsp;was starting to disintegrate,&nbsp;St Augustine&nbsp;was Bishop of&nbsp;Hippo Regius.&nbsp;He was a&nbsp;Latin-speaking philosopher and theologian who lived in the Roman&nbsp;Africa Province. His writings were very influential in the development of&nbsp;Western Christianity&nbsp;and he developed the concept of the Church as a spiritual&nbsp;City of God&nbsp;(in&nbsp;a book of the same name), distinct from the material Earthly City.&nbsp;His book&nbsp;Confessions, which outlines his sinful youth and conversion to Christianity, is widely considered to be the first autobiography of ever written in the canon of&nbsp;Western Literature. Augustine profoundly influenced the coming medieval worldview.</span></p><span data-dcnode-id="1950" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1945" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1949" id="byzantine_empire"></span><span class="mw-headline" data-dcnode-id="1947" id="Byzantine_Empire"><span data-dcnode-id="1948" instrument_node="">Byzantine Empire</span></span><span class="ez-toc-section-end" data-dcnode-id="1946"></span></h3><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1943" instrument_node="">See also:&nbsp;</span><a data-dcnode-id="1941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byzantine_science" target="_blank" title="Byzantine science"><span data-dcnode-id="1942" instrument_node="">Byzantine science</span></a><span data-dcnode-id="1940" instrument_node="">,&nbsp;</span><a data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byzantine_medicine" target="_blank" title="Byzantine medicine"><span data-dcnode-id="1939" instrument_node="">Byzantine medicine</span></a><span data-dcnode-id="1937" instrument_node="">, and&nbsp;</span><a data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byzantine_law" target="_blank" title="Byzantine law"><span data-dcnode-id="1936" instrument_node="">Byzantine law</span></a></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">The writings of&nbsp;Classical antiquity&nbsp;never ceased to be cultivated in Byzantium. Therefore, Byzantine science was in every period closely connected with&nbsp;ancient philosophy, and&nbsp;metaphysics.&nbsp;In the field of engineering&nbsp;Isidore of Miletus, the Greek mathematician and architect of the&nbsp;Hagia Sophia, produced the first compilation of&nbsp;Archimedes&nbsp;works c. 530, and it is through this tradition, kept alive by the school of mathematics and engineering founded c. 850 during the “Byzantine Renaissance” by&nbsp;Leo the Geometer&nbsp;that such works are known today (see&nbsp;Archimedes Palimpsest). Indeed, geometry and its applications (architecture and engineering instruments of war) remained a specialty of the Byzantines.</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1929" instrument_node="">Though scholarship lagged during the dark years following the Arab conquests, during the so-called&nbsp;</span><i data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Byzantine Renaissance</span></i><span data-dcnode-id="1926" instrument_node="">&nbsp;at the end of the first millennium Byzantine scholars re-asserted themselves becoming experts in the scientific developments of the Arabs and Persians, particularly in&nbsp;astronomy&nbsp;and&nbsp;mathematics.&nbsp;The Byzantines are also credited with&nbsp;several technological advancements, particularly in architecture (e.g. the pendentive dome) and warfare technology (e.g.&nbsp;Greek fire).</span></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Although at various times the Byzantines made magnificent achievements in the application of the&nbsp;sciences&nbsp;(notably in the construction of the&nbsp;Hagia Sophia), and although they preserved much of the ancient knowledge of science and geometry, after the 6th century Byzantine scholars made few novel contributions to science in terms of developing new theories or extending the ideas of classical authors.</span></p><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">In the final century of the Empire, Byzantine grammarians were those principally responsible for carrying, in person and in writing, ancient Greek grammatical and literary studies to early&nbsp;Renaissance Italy.&nbsp;During this period,&nbsp;astronomy&nbsp;and other&nbsp;mathematical sciences&nbsp;were taught in Trebizond; medicine attracted the interest of almost all scholars.</span></p><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1917" instrument_node="">In the field of law,&nbsp;Justinian I’s reforms had a clear effect on the evolution of&nbsp;jurisprudence, and Leo III’s&nbsp;</span><i data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Ecloga</span></i><span data-dcnode-id="1914" instrument_node="">&nbsp;influenced the formation of legal institutions in the Slavic world.</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">In the 10th century,&nbsp;Leo VI the Wise&nbsp;achieved the complete codification of the whole of Byzantine law in Greek, which became the foundation of all subsequent Byzantine law, generating interest to the present day.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1904" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1908" id="preservation_of_classical_learning"></span><span class="mw-headline" data-dcnode-id="1906" id="Preservation_of_Classical_learning"><span data-dcnode-id="1907" instrument_node="">Preservation of Classical learning</span></span><span class="ez-toc-section-end" data-dcnode-id="1905"></span></h3><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1902" instrument_node="">During the period of European history often called the&nbsp;</span><i data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Dark Ages</span></i><span data-dcnode-id="1899" instrument_node="">&nbsp;which followed the collapse of the&nbsp;Western Roman Empire, Church scholars and missionaries played a vital role in preserving knowledge of Classical Learning. While the Roman Empire and Christian religion survived in an increasingly Hellenised form in the&nbsp;Byzantine Empire&nbsp;centred at Constantinople in the East, Western civilisation suffered a collapse of literacy and organisation following the fall of Rome in 476AD. Monks sought refuge at the far fringes of the known world: like Cornwall, Ireland, or the Hebrides. Disciplined Christian scholarship carried on in isolated outposts like&nbsp;Skellig Michael&nbsp;in Ireland, where literate monks became some of the last preservers in Western Europe of the poetic and philosophical works of Western antiquity.&nbsp;By around 800AD they were producing illuminated manuscripts such as the&nbsp;Book of Kells, by which old learning was re-communicated to Western Europe. The&nbsp;Hiberno-Scottish mission&nbsp;led by Irish and Scottish monks like St&nbsp;Columba&nbsp;spread Christianity back into Western Europe during the Middle Ages, establishing monasteries through Anglo-Saxon England and the Frankish Empire during the Middle Ages.</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1896" instrument_node="">Thomas Cahill, in his 1995 book&nbsp;</span><i data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">How the Irish Saved Civilization</span></i><span data-dcnode-id="1893" instrument_node="">, credited Irish Monks with having “saved” Western Civilization:</span></p><span data-dcnode-id="1891" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="1888"><p class="font-effect-shadow-soft" data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">[A]s the Roman Empire fell, as all through Europe matted, unwashed barbarians descended on the Roman cities, looting artifacts and burning books, the Irish, who were just learning to read and write, took up the great labor of copying all western literature&nbsp;– everything they could lay their hands on. These scribes then served as conduits through which the Greco-Roman and Judeo-Christian cultures were transmitted to the tribes of Europe, newly settled amid the rubble and ruined vineyards of the civilization they had overwhelmed. Without this Service of the Scribes, everything that happened subsequently would be unthinkable. Without the&nbsp;Mission of the Irish Monks, who single-handedly re-founded European civilization throughout the continent in the bays and valleys of their exile, the world that came after them would have been an entirely different one-a world without books. And our own world would never have come to be.</span></p></blockquote><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">According to art historian&nbsp;Kenneth Clark, for some five centuries after the fall of Rome, virtually all men of intellect joined the Church and practically nobody in western Europe outside of monastic settlements had the ability to read or write. While church scholars at different times also destroyed classical texts they felt were contrary to the Christian message, it was they, virtually alone in Western Europe, who preserved texts from the old society.</span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">As Western Europe became more orderly again, the Church remained a driving force in education, setting up&nbsp;Cathedral schools&nbsp;beginning in the Early Middle Ages as centers of education, which became&nbsp;medieval universities, the springboard of many of Western Europe’s later achievements.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1876"><span data-dcnode-id="1880" instrument_node="">The Catholic&nbsp;Cistercian&nbsp;order used its own&nbsp;numbering system, which could express numbers from 0 to 9999 in a single sign. According to one modern Cistercian, “enterprise and entrepreneurial spirit” have always been a part of the order’s identity, and the Cistercians “were catalysts for development of a market economy” in 12th-century Europe.&nbsp;Until the&nbsp;Industrial Revolution, most of the technological advances in Europe were made in the monasteries.&nbsp;According to the medievalist Jean Gimpel, their high level of industrial technology facilitated the diffusion of new techniques: “Every monastery had a model factory, often as large as the church and only several feet away, and waterpower drove the machinery of the various industries located on its floor.”&nbsp;Waterpower was used for crushing wheat, sieving flour, fulling cloth and tanning – a “level of technological achievement [that] could have been observed in practically all” of the Cistercian monasteries. The English science historian James Burke examines the impact of Cistercian waterpower, derived from Roman watermill technology such as that of Barbegal aqueduct and mill near Arles in the fourth of his ten-part&nbsp;</span><i data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Connections</span></i><span data-dcnode-id="1877" instrument_node="">&nbsp;TV series, called “Faith in Numbers.” The&nbsp;Cistercians&nbsp;made major contributions to culture and technology in medieval Europe:&nbsp;Cistercian architecture&nbsp;is considered one of the most beautiful styles of&nbsp;medieval architecture;&nbsp;and the Cistercians were the main force of technological diffusion in fields such as agriculture and&nbsp;hydraulic engineering.</span></p><span data-dcnode-id="1875" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1870" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1874" id="index_librorum_prohibitorum"></span><span class="mw-headline" data-dcnode-id="1872" id="Index_Librorum_Prohibitorum"><span data-dcnode-id="1873" instrument_node="">Index Librorum Prohibitorum</span></span><span class="ez-toc-section-end" data-dcnode-id="1871"></span></h3><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1868" instrument_node="">The&nbsp;</span><a data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Index_Librorum_Prohibitorum" target="_blank" title="Index Librorum Prohibitorum"><span data-dcnode-id="1867" instrument_node="">Index Librorum Prohibitorum</span></a><span data-dcnode-id="1865" instrument_node="">&nbsp;(“List of Prohibited Books”) was a list of publications&nbsp;prohibited&nbsp;by the&nbsp;</span><strong data-dcnode-id="1862"><a data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D76471"><span data-dcnode-id="1864" instrument_node="">Catholic Church</span></a></strong><span data-dcnode-id="1861" instrument_node="">. While the promulgation of the&nbsp;</span><i data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Index</span></i><span data-dcnode-id="1858" instrument_node="">&nbsp;has been described by some as the “turning-point in the freedom of enquiry” in the Catholic world,&nbsp;the actual effects of the Index were minimal and it was largely ignored. John Hedley Brooke explains:</span></p><span data-dcnode-id="1856" instrument_node="">
</span><blockquote data-dcnode-id="1853"><p class="font-effect-shadow-soft" data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">It is important not to exaggerate the oppressive effects of Index and Inquisition. The Counter-Reformation did not prevent Italian scholars from making original contributions in classical scholarship, history, law, literary criticism, logic, mathematics, medicine, philology, and rhetoric. Nor were they isolated by the Index from European scholarship. Prohibited books entered private libraries where they would be consulted by those prepared to break the rules in the interests of learning. One such collection was in the hands of Galileo’s Paduan friend, G. V. Pinelli. One can lose a sense of perspective if the condemnation of Galileo is taken to epitomize the attitude of Catholic authorities toward the natural sciences. Relatively few scientific works were placed on the Index. The attempt to put a stop to the moving earth stands out because it proved so tragic an aberration – a personal tragedy for Galileo and, in the long run, a tragedy for the Church, which overreached itself in securing a territory that would prove impossible to hold.</span></p></blockquote><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">The first Index was published in 1559 by the Sacred Congregation of the Roman Inquisition. The last edition of the Index appeared in 1948 and publication of the list ceased 1966.</span></p><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1848" instrument_node="">The avowed aim of the list was to protect the faith and morals of the faithful by preventing the reading of&nbsp;immoral&nbsp;books or works containing&nbsp;theological&nbsp;errors. Books thought to contain such errors included some scientific works by leading astronomers such as&nbsp;Johannes Kepler’s&nbsp;</span><i data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Epitome astronomiae Copernicianae</span></i><span data-dcnode-id="1845" instrument_node="">, which was on the Index from 1621 to 1835. The various editions of the Index also contained the rules of the Church relating to the reading, selling and pre-emptive censorship of books.</span></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Canon law still recommends that works concerning sacred Scripture, theology, canon law, church history, and any writings which specially concern religion or good morals, be submitted to the judgement of the local&nbsp;Ordinary.</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Some of the scientific works that were on early editions of the Index (e.g. on&nbsp;heliocentrism) have long been routinely taught at Catholic universities worldwide.&nbsp;Giordano Bruno, whose works were on the Index, now has a monument in Rome,&nbsp;erected over the Church’s objections&nbsp;at the place where he was&nbsp;burned alive at the stake&nbsp;for&nbsp;heresy.</span></p><span data-dcnode-id="1837" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1832" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1836" id="protestant_role_in_science"></span><span class="mw-headline" data-dcnode-id="1834" id="Protestant_role_in_science"><span data-dcnode-id="1835" instrument_node="">Protestant role in science</span></span><span class="ez-toc-section-end" data-dcnode-id="1833"></span></h3><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">According to the Merton Thesis there was a positive correlation between the rise of puritanism and protestant pietism on the one hand and early experimental science on the other. The Merton Thesis has two separate parts: Firstly, it presents a theory that science changes due to an accumulation of observations and improvement in experimental techniques and methodology; secondly, it puts forward the argument that the popularity of science in 17th-century England and the religious demography of the Royal Society (English scientists of that time were predominantly Puritans or other Protestants) can be explained by a correlation between Protestantism and the scientific values. In his theory, Robert K. Merton focused on English Puritanism and German Pietism as having been responsible for the development of the scientific revolution of the 17th and 18th centuries. Merton explained that the connection between religious affiliation and interest in science was the result of a significant synergy between the ascetic Protestant values and those of modern science. Protestant values encouraged scientific research by allowing science to study God’s influence on the world and thus providing a religious justification for scientific research.</span></p><span data-dcnode-id="1828" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1823" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1827" id="astronomy"></span><span class="mw-headline" data-dcnode-id="1825" id="Astronomy"><span data-dcnode-id="1826" instrument_node="">Astronomy</span></span><span class="ez-toc-section-end" data-dcnode-id="1824"></span></h3><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1821" instrument_node="">Historically, the </span><strong data-dcnode-id="1818"><a data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D76471"><span data-dcnode-id="1820" instrument_node="">Catholic Church</span></a></strong><span data-dcnode-id="1817" instrument_node=""> has been a major a sponsor of astronomy, not least due to the astronomical basis of the calendar by which holy days and Easter are determined. Nevertheless, the most famous case of a scientist being tried for heresy arose in this field of science: the trial of Galileo.</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">The Church’s interest in astronomy began with purely practical concerns, when in the 16th century Pope Gregory XIII required astronomers to correct for the fact that the Julian calendar had fallen out of sync with the sky. Since the Spring equinox was tied to the celebration of Easter, the Church considered that this steady movement in the date of the equinox was undesirable. The resulting Gregorian calendar is the internationally accepted civil calendar used throughout the world today and is an important contribution of the Catholic Church to Western Civilisation. It was introduced by Pope Gregory XIII, after whom the calendar was named, by a decree signed on 24 February 1582. In 1789, the Vatican Observatory opened. It was moved to Castel Gandolfo in the 1930s and the Vatican Advanced Technology Telescope began making observation in Arizona, US, in 1995.</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">The famous astronomers&nbsp;Nicholas Copernicus, who put the sun at the centre of the heavens in 1543, and&nbsp;Galileo Galilei, who experimented with the new technology of the&nbsp;telescope&nbsp;and, with its aid declared his belief that Copernicus was correct, were both practising Catholics&nbsp;– indeed Copernicus was a Catholic clergyman. Yet the church establishment at that time held to theories devised in pre-Christian Greece by&nbsp;Ptolemy&nbsp;and&nbsp;Aristotle, which said that the sky revolved around the earth. When Galileo began to assert that the earth in fact revolved around the sun, he therefore found himself challenging the Church establishment at a time where the Church hierarchy also held temporal power and was engaged in the ongoing political challenge of the rise of Protestantism. After discussions with&nbsp;Pope Urban VIII&nbsp;(a man who had written admiringly of Galileo before taking papal office), Galileo believed he could avoid censure by presenting his arguments in dialogue form, but the Pope took offence when he discovered that some of his own words were being spoken by a character in the book who was a simpleton and Galileo was called for a trial before the Inquisition.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">In this most famous example cited by critics of the Catholic Church’s “posture towards science”,&nbsp;Galileo Galilei&nbsp;was denounced&nbsp;in 1633 for his work on the&nbsp;heliocentric&nbsp;model of the solar system, previously proposed by the Polish clergyman and intellectual Nicolaus Copernicus. Copernicus’s work had been&nbsp;suppressed de facto&nbsp;by the Church, but Catholic authorities were generally tolerant of discussion of the hypothesis as long as it was portrayed only as a useful mathematical fiction, and not descriptive of reality. Galileo, by contrast, argued from his unprecedented observations of the solar system that the heliocentric system was not merely an abstract model for calculating planetary motions, but actually corresponded to physical reality&nbsp;– that is, he insisted the planets really do orbit the Sun. After years of telescopic observation, consultations with the Popes, and verbal and written discussions with astronomers and clerics, a trial was convened by the&nbsp;Tribunal of the Roman and Universal Inquisition. Galileo was found “vehemently suspect of heresy” (not “guilty of heresy”, as is frequently misreported), placed under&nbsp;house arrest, and all of his works, including any future writings, were banned.&nbsp;Galileo had been threatened with torture and other Catholic scientists fell silent on the issue. Galileo’s great contemporary&nbsp;René Descartes&nbsp;stopped publishing in France and went to Sweden. According to Polish-British&nbsp;historian of science&nbsp;Jacob Bronowski:</span></p><span data-dcnode-id="1806" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="1803"><p class="font-effect-shadow-soft" data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">The effect of the trial and imprisonment was to put a total stop to the scientific tradition in the Mediterranean. From now on the Scientific Revolution moved to Northern Europe.</span></p></blockquote><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Pope John Paul II, on 31 October 1992, publicly expressed regret for the actions of those Catholics who badly treated Galileo in that trial.&nbsp;Cardinal&nbsp;John Henry Newman, in the nineteenth century, claimed that those who attack the Church can only point to the Galileo case, which to many historians does not prove the Church’s opposition to science since many of the churchmen at that time were encouraged by the Church to continue their research.</span></p><span data-dcnode-id="1799" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1794" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1798" id="evolution"></span><span class="mw-headline" data-dcnode-id="1796" id="Evolution"><span data-dcnode-id="1797" instrument_node="">Evolution</span></span><span class="ez-toc-section-end" data-dcnode-id="1795"></span></h3><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1788"><span data-dcnode-id="1792" instrument_node="">Main article:&nbsp;</span><strong data-dcnode-id="1789"><a data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/evolution-and-the-catholic-church/" title="Evolution and the Catholic Church"><span data-dcnode-id="1791" instrument_node="">Evolution and the Catholic Church</span></a></strong></p><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1786" instrument_node="">Since the publication of&nbsp;Charles Darwin’s&nbsp;</span><i data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">On the Origin of Species</span></i><span data-dcnode-id="1783" instrument_node="">&nbsp;in 1859, the position of the&nbsp;</span><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D76471"><strong data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">Catholic Church</span></strong></a><span data-dcnode-id="1779" instrument_node="">&nbsp;on the theory of&nbsp;evolution&nbsp;has slowly been refined. For about 100 years, there was no authoritative pronouncement on the subject, though many hostile comments were made by local church figures. In contrast with many Protestant objections, Catholic issues with evolutionary theory have had little to do with maintaining the literalism of the account in the&nbsp;Book of Genesis, and have always been concerned with the question of how man came to have a soul. Modern&nbsp;Creationism&nbsp;has had little Catholic support. In the 1950s, the Church’s position was one of neutrality; by the late 20th century its position evolved to one of general acceptance in recent years. However, the church insists that the human soul was immediately infused by God, and the reality of a single ancestor (commonly called&nbsp;monogenism) for the human race.</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1776" instrument_node="">Today, the Church’s official position is a fairly non-specific example of&nbsp;</span><i data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">theistic evolution</span></i><span data-dcnode-id="1773" instrument_node="">,&nbsp;stating that&nbsp;faith&nbsp;and&nbsp;scientific findings&nbsp;regarding&nbsp;human evolution&nbsp;are not in conflict, though humans are regarded as a&nbsp;</span><i data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">special creation</span></i><span data-dcnode-id="1770" instrument_node="">, and that the existence of God is required to explain both&nbsp;monogenism&nbsp;and the&nbsp;spiritual&nbsp;component of human origins. No infallible declarations by the Pope or an&nbsp;Ecumenical Council&nbsp;have been made. The Catholic Church’s official position is fairly non-specific, stating only that faith and the origin of man’s material body “from pre-existing living matter” are not in conflict, and that the existence of God is required to explain the spiritual component of man’s origin.</span></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Many&nbsp;fundamentalist Christians, however, retain the belief that the Biblical account of the creation of the world (as opposed to evolution) is literal.</span></p><span data-dcnode-id="1765" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1760" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1764" id="embryonic_stem_cell_research"></span><span class="mw-headline" data-dcnode-id="1762" id="Embryonic_stem_cell_research"><span data-dcnode-id="1763" instrument_node="">Embryonic stem cell research</span></span><span class="ez-toc-section-end" data-dcnode-id="1761"></span></h3><span data-dcnode-id="1759" instrument_node="">
