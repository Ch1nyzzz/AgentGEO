d="2745" href="#architecture" title="Architecture"><span data-dcnode-id="2746" instrument_node="">Architecture</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2741"><a class="ez-toc-link ez-toc-heading-43" data-dcnode-id="2742" href="#painting_and_sculpture" title="Painting and sculpture"><span data-dcnode-id="2743" instrument_node="">Painting and sculpture</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2738"><a class="ez-toc-link ez-toc-heading-44" data-dcnode-id="2739" href="#music" title="Music"><span data-dcnode-id="2740" instrument_node="">Music</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2735"><a class="ez-toc-link ez-toc-heading-45" data-dcnode-id="2736" href="#literature" title="Literature"><span data-dcnode-id="2737" instrument_node="">Literature</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2732"><a class="ez-toc-link ez-toc-heading-46" data-dcnode-id="2733" href="#protestant" title="Protestant"><span data-dcnode-id="2734" instrument_node="">Protestant</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2723"><a class="ez-toc-link ez-toc-heading-47" data-dcnode-id="2728" href="#economic_development" title="Economic development"><span data-dcnode-id="2729" instrument_node="">Economic development</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="2724"><li class="ez-toc-heading-level-3" data-dcnode-id="2725"><a class="ez-toc-link ez-toc-heading-48" data-dcnode-id="2726" href="#protestant_work_ethic" title="Protestant work ethic"><span data-dcnode-id="2727" instrument_node="">Protestant work ethic</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2710"><a class="ez-toc-link ez-toc-heading-49" data-dcnode-id="2721" href="#social_justice_care-giving_and_the_hospital_system" title="Social justice, care-giving, and the hospital system"><span data-dcnode-id="2722" instrument_node="">Social justice, care-giving, and the hospital system</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="2711"><li class="ez-toc-heading-level-3" data-dcnode-id="2718"><a class="ez-toc-link ez-toc-heading-50" data-dcnode-id="2719" href="#fourth_century" title="Fourth century"><span data-dcnode-id="2720" instrument_node="">Fourth century</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2715"><a class="ez-toc-link ez-toc-heading-51" data-dcnode-id="2716" href="#medieval_period-2" title="Medieval period"><span data-dcnode-id="2717" instrument_node="">Medieval period</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2712"><a class="ez-toc-link ez-toc-heading-52" data-dcnode-id="2713" href="#industrial_revolution" title="Industrial Revolution"><span data-dcnode-id="2714" instrument_node="">Industrial Revolution</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2685"><a class="ez-toc-link ez-toc-heading-53" data-dcnode-id="2708" href="#education" title="Education"><span data-dcnode-id="2709" instrument_node="">Education</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="2686"><li class="ez-toc-heading-level-3" data-dcnode-id="2705"><a class="ez-toc-link ez-toc-heading-54" data-dcnode-id="2706" href="#europe" title="Europe"><span data-dcnode-id="2707" instrument_node="">Europe</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2702"><a class="ez-toc-link ez-toc-heading-55" data-dcnode-id="2703" href="#latin_america-2" title="Latin America"><span data-dcnode-id="2704" instrument_node="">Latin America</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2699"><a class="ez-toc-link ez-toc-heading-56" data-dcnode-id="2700" href="#north_america" title="North America"><span data-dcnode-id="2701" instrument_node="">North America</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2696"><a class="ez-toc-link ez-toc-heading-57" data-dcnode-id="2697" href="#australasia" title="Australasia"><span data-dcnode-id="2698" instrument_node="">Australasia</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2693"><a class="ez-toc-link ez-toc-heading-58" data-dcnode-id="2694" href="#africa-2" title="Africa"><span data-dcnode-id="2695" instrument_node="">Africa</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2690"><a class="ez-toc-link ez-toc-heading-59" data-dcnode-id="2691" href="#asia" title="Asia"><span data-dcnode-id="2692" instrument_node="">Asia</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2687"><a class="ez-toc-link ez-toc-heading-60" data-dcnode-id="2688" href="#protestant_role_in_education" title="Protestant role in education"><span data-dcnode-id="2689" instrument_node="">Protestant role in education</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2682"><a class="ez-toc-link ez-toc-heading-61" data-dcnode-id="2683" href="#cleanliness" title="Cleanliness"><span data-dcnode-id="2684" instrument_node="">Cleanliness</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2679"><a class="ez-toc-link ez-toc-heading-62" data-dcnode-id="2680" href="#see_also" title="See also"><span data-dcnode-id="2681" instrument_node="">See also</span></a></li></ul></li></ul></nav></div><p data-dcnode-id="2650"><span data-dcnode-id="2673" instrument_node="">The&nbsp;</span><strong data-dcnode-id="2668"><span data-dcnode-id="2672" instrument_node="">role of </span><a data-dcnode-id="2670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/christianity/"><span data-dcnode-id="2671" instrument_node="">Christianity</span></a><span data-dcnode-id="2669" instrument_node=""> in civilization</span></strong><span data-dcnode-id="2667" instrument_node=""> has been intricately intertwined with the&nbsp;history and formation of Western society. Throughout&nbsp;its long history, the&nbsp;Church&nbsp;has been a major source of social services like schooling and medical care; inspiration for&nbsp;art,&nbsp;culture&nbsp;and&nbsp;</span><a data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D15947"><strong data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">philosophy</span></strong></a><span data-dcnode-id="2663" instrument_node="">; and influential player in politics and religion. In various ways it has sought to affect Western attitudes to&nbsp;vice&nbsp;and&nbsp;virtue&nbsp;in diverse fields. Festivals like&nbsp;</span><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D39459"><strong data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Easter</span></strong></a><span data-dcnode-id="2659" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="2656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/christmas/"><strong data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Christmas</span></strong></a><span data-dcnode-id="2655" instrument_node="">&nbsp;are marked as public holidays; the&nbsp;Gregorian Calendar&nbsp;has been adopted internationally as the&nbsp;civil calendar; and the calendar itself is measured from the date of&nbsp;</span><a data-dcnode-id="2652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D973"><strong data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">Jesus’s birth</span></strong></a><span data-dcnode-id="2651" instrument_node="">.</span></p><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">The cultural influence of the Church has been vast. Church scholars preserved&nbsp;literacy&nbsp;in&nbsp;Western Europe&nbsp;following the&nbsp;Fall of the Western Roman Empire. During the&nbsp;Middle Ages, the Church rose to replace the&nbsp;Roman Empire&nbsp;as the unifying force in Europe. The medieval&nbsp;cathedrals&nbsp;remain among the most iconic architectural feats produced by&nbsp;Western civilization. Many of&nbsp;Europe’s universities&nbsp;were also founded by the church at that time. Many historians state that universities and&nbsp;cathedral schools&nbsp;were a continuation of the interest in learning promoted by monasteries. The university is generally regarded as an institution that has its origin in the&nbsp;Medieval Christian&nbsp;setting, born from&nbsp;Cathedral schools. The Reformation brought an end to religious unity in the West, but the Renaissance masterpieces produced by Catholic artists like Michelangelo, Leonardo da Vinci and Raphael remain among the most celebrated works of art ever produced. Similarly, Christian sacred music by composers like Pachelbel, Vivaldi, Bach, Handel, Mozart, Haydn, Beethoven, Mendelssohn, Liszt, and Verdi is among the most admired classical music in the Western canon.</span></p><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">The Bible and Christian theology have also strongly influenced Western philosophers and political activists. The teachings of Jesus, such as the Parable of the Good Samaritan, are among the most important sources of modern notions of human rights and the welfare commonly provided by governments in the West. Long-held Christian teachings on sexuality, marriage, and family life have also been influential and controversial in recent times. Christianity played a role in ending practices such as human sacrifice, infanticide and polygamy. Christianity in general affected the status of women by condemning marital infidelity, divorce, incest, polygamy, birth control, infanticide (female infants were more likely to be killed), and abortion. While official Church teaching considers women and men to be complementary (equal and different), some modern “advocates of ordination of women and other feminists” argue that teachings attributed to St. Paul and those of the Fathers of the Church and Scholastic theologians advanced the notion of a divinely ordained female inferiority. Nevertheless, women have played prominent roles in Western history through and as part of the church, particularly in education and healthcare, but also as influential theologians and mystics.</span></p><span data-dcnode-id="2643" instrument_node="">
</span><p data-dcnode-id="2635"><a data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/christians/"><strong data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">Christians</span></strong></a><span data-dcnode-id="2639" instrument_node=""> have made a myriad contributions to human progress in a broad and diverse range of fields, both historically and in modern times, including the science and technology, medicine, fine arts and architecture, politics, literatures, Music, philanthropy, philosophy,&nbsp;ethics,&nbsp;theatre&nbsp;and business.&nbsp;According to&nbsp;</span><i data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">100 Years of Nobel Prizes</span></i><span data-dcnode-id="2636" instrument_node=""> a review of Nobel prizes award between 1901 and 2000 reveals that (65.4%) of Nobel Prizes Laureates, have identified Christianity in its various forms as their religious preference. Eastern Christians (particularly Nestorian Christians) have also contributed to the Arab Islamic Civilization during the Ummayad and the Abbasid periods by translating works of Greek philosophers to Syriac and afterwards to Arabic. They also excelled in philosophy, science, theology and medicine.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2628"><span data-dcnode-id="2633" instrument_node="">Common </span><strong data-dcnode-id="2630"><a data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/criticism-of-christianity/"><span data-dcnode-id="2632" instrument_node="">criticisms of Christianity</span></a></strong><span data-dcnode-id="2629" instrument_node=""> include oppression of women, condemnation of homosexuality, colonialism, and various other cases of violence. Christian ideas have been used both to support and end slavery as an institution. Criticism of Christianity has come from the different religious and non-religious groups around the world, some of whom were themselves Christians.</span></p><div class="wp-caption aligncenter" data-dcnode-id="2624" id="attachment_93735" style="width: 310px"><img alt="Disputation of the Holy Sacrament by Italian Renaissance artist Raphael, 1509–10" aria-describedby="caption-attachment-93735" class="size-medium wp-image-93735" data-dcnode-id="2627" height="216" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/wp-content/uploads/Disputa_del_Sacramento_Rafael-300x216.jpg&amp;raw" srcset="https://slife.org/wp-content/uploads/Disputa_del_Sacramento_Rafael-300x216.jpg 300w, https://slife.org/wp-content/uploads/Disputa_del_Sacramento_Rafael-800x577.jpg 800w, https://slife.org/wp-content/uploads/Disputa_del_Sacramento_Rafael-150x108.jpg 150w, https://slife.org/wp-content/uploads/Disputa_del_Sacramento_Rafael-768x554.jpg 768w, https://slife.org/wp-content/uploads/Disputa_del_Sacramento_Rafael-1536x1107.jpg 1536w, https://slife.org/wp-content/uploads/Disputa_del_Sacramento_Rafael-2048x1477.jpg 2048w, https://slife.org/wp-content/uploads/Disputa_del_Sacramento_Rafael-720x519.jpg 720w, https://slife.org/wp-content/uploads/Disputa_del_Sacramento_Rafael-520x375.jpg 520w, https://slife.org/wp-content/uploads/Disputa_del_Sacramento_Rafael-320x231.jpg 320w" width="300"><p class="wp-caption-text" data-dcnode-id="2625" id="caption-attachment-93735"><span data-dcnode-id="2626" instrument_node="">Disputation of the Holy Sacrament by Italian Renaissance artist Raphael, 1509–10</span></p></div><h2 class="fittexted_for_content_h2" data-dcnode-id="2619" style="font-size: 38.25px;"><span class="ez-toc-section" data-dcnode-id="2623" id="politics_and_law"></span><span class="mw-headline" data-dcnode-id="2621" id="Politics_and_law"><span data-dcnode-id="2622" instrument_node="">Politics and law</span></span><span class="ez-toc-section-end" data-dcnode-id="2620"></span></h2><span data-dcnode-id="2618" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="2613" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="2617" id="from_early_persecution_to_state_religion"></span><span class="mw-headline" data-dcnode-id="2615" id="From_early_persecution_to_state_religion"><span data-dcnode-id="2616" instrument_node="">From early persecution to state religion</span></span><span class="ez-toc-section-end" data-dcnode-id="2614"></span></h3><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2598"><span data-dcnode-id="2611" instrument_node="">The foundation of canon law is found in its earliest texts and their interpretation in the church fathers’ writings. </span><a data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/christianity/"><strong data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Christianity</span></strong></a><span data-dcnode-id="2607" instrument_node=""> began as a Jewish sect&nbsp;in the mid-1st century arising out of the life and teachings of&nbsp;Jesus of Nazareth. The life of Jesus is recounted in the&nbsp;</span><a data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/new-testament/"><strong data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">New Testament</span></strong></a><span data-dcnode-id="2603" instrument_node="">&nbsp;of the </span><a data-dcnode-id="2600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/the-bible/"><strong data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Bible</span></strong></a><span data-dcnode-id="2599" instrument_node="">, one of the bedrock texts of Western Civilization and inspiration for countless works of&nbsp;Western art.&nbsp;&nbsp;Jesus’ birth is commemorated in the festival of Christmas, his death during the&nbsp;Paschal Triduum, and his resurrection during Easter. Christmas and Easter remain holidays in many Western nations.</span></p><div class="wp-caption alignright" data-dcnode-id="2594" id="attachment_28805" style="width: 229px"><img alt="A monument of the Ten Commandments at the&nbsp;Texas State Capitol" aria-describedby="caption-attachment-28805" class="size-medium wp-image-28805" data-dcnode-id="2597" height="300" loading="lazy" sizes="(max-width: 219px) 100vw, 219px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/wp-content/uploads/2013/01/Ten_Commandments_Monument-219x300.jpg&amp;raw" srcset="https://slife.org/wp-content/uploads/2013/01/Ten_Commandments_Monument-219x300.jpg 219w, https://slife.org/wp-content/uploads/2013/01/Ten_Commandments_Monument-438x600.jpg 438w, https://slife.org/wp-content/uploads/2013/01/Ten_Commandments_Monument-520x713.jpg 520w, https://slife.org/wp-content/uploads/2013/01/Ten_Commandments_Monument.jpg 596w" width="219"><p class="wp-caption-text" data-dcnode-id="2595" id="caption-attachment-28805"><span data-dcnode-id="2596" instrument_node="">A monument of the Ten Commandments at the&nbsp;Texas State Capitol</span></p></div><p data-dcnode-id="2588"><span data-dcnode-id="2593" instrument_node="">Jesus learned the texts of the Hebrew Bible, with its&nbsp;</span><strong data-dcnode-id="2590"><a data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/ten-commandments/"><span data-dcnode-id="2592" instrument_node="">Ten Commandments</span></a></strong><span data-dcnode-id="2589" instrument_node="">&nbsp;(which later became influential in Western law) and became an influential wandering preacher. He was a persuasive teller of&nbsp;parables&nbsp;and moral philosopher who urged followers to worship God, act without violence or prejudice, and care for the sick, hungry, and poor. These teachings deeply influenced Western culture. Jesus criticized the hypocrisy of the religious establishment, which drew the ire of the authorities, who persuaded the Roman Governor of the&nbsp;province of Judaea,&nbsp;Pontius Pilate, to have him executed. The Talmud says Jesus was executed for sorcery and for leading the people into apostacy.&nbsp;In Jerusalem, around 30AD, Jesus was&nbsp;crucified.</span></p><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">The early followers of Jesus, including&nbsp;Saints&nbsp;Paul&nbsp;and&nbsp;Peter&nbsp;carried this new theology concerning Jesus and its ethic throughout the Roman Empire and beyond, sowing the seeds for the development of the&nbsp;Catholic Church, of which Saint Peter is considered the first Pope. Christians sometimes&nbsp;faced persecution&nbsp;during these early centuries, particularly for their refusal to join in&nbsp;worshiping the emperors. Nevertheless, carried through the synagogues, merchants and missionaries across the known world, Christianity quickly grew in size and influence.&nbsp;Its unique appeal was partly the result of its values and ethics.</span></p><span data-dcnode-id="2584" instrument_node="">
</span><h4 class="fittexted_for_content_h4" data-dcnode-id="2579" style="font-size: 27px;"><span class="ez-toc-section" data-dcnode-id="2583" id="human_value_as_a_foundation_to_law"></span><span class="mw-headline" data-dcnode-id="2581" id="Human_value_as_a_foundation_to_law"><span data-dcnode-id="2582" instrument_node="">Human value as a foundation to law</span></span><span class="ez-toc-section-end" data-dcnode-id="2580"></span></h4><span data-dcnode-id="2578" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2577" instrument_node="">The world’s first civilizations were Mesopotamian&nbsp;</span><i data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">sacred states</span></i><span data-dcnode-id="2574" instrument_node="">&nbsp;ruled in the name of a divinity or by rulers who were seen as divine. Rulers, and the priests, soldiers and bureaucrats who carried out their will, were a small minority who kept power by exploiting the many.</span></p><span data-dcnode-id="2572" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="2569"><p class="font-effect-shadow-soft" data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">If we turn to the roots of our western tradition, we find that in Greek and Roman times not all human life was regarded as inviolable and worthy of protection. Slaves and ‘barbarians’ did not have a full right to life and human sacrifices and gladiatorial combat were acceptable… Spartan Law required that deformed infants be put to death; for Plato, infanticide is one of the regular institutions of the ideal State; Aristotle regards abortion as a desirable option; and the Stoic philosopher Seneca writes unapologetically: “Unnatural progeny we destroy; we drown even children who at birth are weakly and abnormal… And whilst there were deviations from these views…, it is probably correct to say that such practices…were less proscribed in ancient times. Most historians of western morals agree that the rise of …Christianity contributed greatly to the general feeling that human life is valuable and worthy of respect.</span></p></blockquote><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">W.E.H.Lecky gives the now classical account of the sanctity of human life in his history of European morals saying Christianity “formed a new standard, higher than any which then existed in the world…” Christian ethicist David P. Gushee says “The justice teachings of Jesus are closely related to a commitment to life’s sanctity…” John Keown, a professor of Christian ethics distinguishes this ‘sanctity of life’ doctrine from “a quality of life approach, which recognizes only instrumental value in human life, and a vitalistic approach, which regards life as an absolute moral value… [Kewon says it is the] sanctity of life approach … which embeds a presumption in favor of preserving life, but concedes that there are circumstances in which life should not be preserved at all costs”, and it is this which provides the solid foundation for law concerning end of life issues.</span></p><span data-dcnode-id="2565" instrument_node="">
</span><h4 class="fittexted_for_content_h4" data-dcnode-id="2560" style="font-size: 27px;"><span class="ez-toc-section" data-dcnode-id="2564" id="early_legal_views_of_women"></span><span class="mw-headline" data-dcnode-id="2562" id="Early_legal_views_of_women"><span data-dcnode-id="2563" instrument_node="">Early legal views of women</span></span><span class="ez-toc-section-end" data-dcnode-id="2561"></span></h4><span data-dcnode-id="2559" instrument_node="">
</span><p data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Rome had a social caste system, with women having “no legal independence and no independent property.”&nbsp;Early Christianity, as&nbsp;Pliny the Younger&nbsp;explains in his letters to Emperor Trajan, had people from “every age and rank, and both sexes.”&nbsp;Pliny reports arresting two slave women who claimed to be ‘deaconesses’ in the first decade of the second century.&nbsp;There was a rite for the ordination of women deacons in the Roman Pontifical, (a liturgical book), up through the 12th century. For women deacons, the oldest rite in the West comes from an eighth-century book, whereas Eastern rites go back to the third century and there are more of them.</span></p><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">The New Testament refers to a number of women in Jesus’ inner circle. There are several Gospel accounts of Jesus imparting important teachings to and about women: his meeting with the Samaritan woman at the well, his anointing by Mary of Bethany, his public admiration for a poor widow who donated two copper coins to the Temple in Jerusalem, his stepping to the aid of the woman accused of adultery, his friendship with Mary and Martha the sisters of Lazarus, and the presence of Mary Magdalene, his mother, and the other women as he was crucified. Historian Geoffrey Blainey concludes that “as the standing of women was not high in Palestine, Jesus’ kindnesses towards them were not always approved by those who strictly upheld tradition.”</span></p><span data-dcnode-id="2553" instrument_node="">
</span><p data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">According to Christian apologist Tim Keller, it was common in the Greco-Roman world to expose female infants because of the low status of women in society. The church forbade its members to do so. Greco-Roman society saw no value in an unmarried woman, and therefore it was illegal for a widow to go more than two years without remarrying. Christianity did not force widows to marry and supported them financially. Pagan widows lost all control of their husband’s estate when they remarried, but the church allowed widows to maintain their husband’s estate. Christians did not believe in cohabitation. If a Christian man wanted to live with a woman, the church required marriage, and this gave women legal rights and far greater security. Finally, the pagan double standard of allowing married men to have extramarital sex and mistresses was forbidden. Jesus’ teachings on divorce and Paul’s advocacy of monogamy began the process of elevating the status of women so that Christian women tended to enjoy greater security and equality than women in surrounding cultures.</span></p><span data-dcnode-id="2550" instrument_node="">
</span><h4 class="fittexted_for_content_h4" data-dcnode-id="2545" style="font-size: 27px;"><span class="ez-toc-section" data-dcnode-id="2549" id="laws_affecting_children"></span><span class="mw-headline" data-dcnode-id="2547" id="Laws_affecting_children"><span data-dcnode-id="2548" instrument_node="">Laws affecting children</span></span><span class="ez-toc-section-end" data-dcnode-id="2546"></span></h4><span data-dcnode-id="2544" instrument_node="">
</span><p data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">In the ancient world, infanticide was not legal but was rarely prosecuted. A broad distinction was popularly made between infanticide and infant exposure, which was widely practiced. Many exposed children died, but many were taken by speculators who raised them to be slaves or prostitutes. It is not possible to ascertain, with any degree of accuracy, what diminution of infanticide resulted from legal efforts against it in the Roman empire. “It may, however, be safely asserted that the publicity of the trade in exposed children became impossible under the influence of Christianity, and that the sense of the seriousness of the crime was very considerably increased.”</span></p><span data-dcnode-id="2541" instrument_node="">
</span><h4 class="fittexted_for_content_h4" data-dcnode-id="2536" style="font-size: 27px;"><span class="ez-toc-section" data-dcnode-id="2540" id="legal_status_under_constantine"></span><span class="mw-headline" data-dcnode-id="2538" id="Legal_status_under_Constantine"><span data-dcnode-id="2539" instrument_node="">Legal status under Constantine</span></span><span class="ez-toc-section-end" data-dcnode-id="2537"></span></h4><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">Emperor Constantine’s&nbsp;Edict of Milan&nbsp;in 313 AD ended the state-sponsored persecution of Christians in the East, and his own conversion to Christianity was a significant turning point in history.&nbsp;In 312, Constantine offered civic toleration to Christians, and through his reign instigated laws and policies in keeping with Christian principles&nbsp;– making Sunday the Sabbath “day of rest” for Roman society (though initially this was only for urban dwellers) and embarking on a church building program. In AD 325, Constantine conferred the&nbsp;First Council of Nicaea&nbsp;to gain consensus and unity within Christianity, with a view to establishing it as the religion of the Empire. The population and wealth of the Roman Empire had been shifting east, and around the year 330, Constantine established the city of&nbsp;Constantinople&nbsp;as a new imperial city which would be the capital of the&nbsp;Eastern Roman Empire. The Eastern Patriarch in Constantinople now came to rival the Pope in Rome. Although cultural continuity and interchange would continue between these Eastern and Western Roman Empires, the&nbsp;history of Christianity&nbsp;and Western culture took divergent routes, with a final&nbsp;Great Schism&nbsp;separating&nbsp;Roman&nbsp;and&nbsp;Eastern&nbsp;Christianity in 1054 AD.</span></p><span data-dcnode-id="2532" instrument_node="">
</span><h4 class="fittexted_for_content_h4" data-dcnode-id="2527" style="font-size: 27px;"><span class="ez-toc-section" data-dcnode-id="2531" id="fourth_century_political_influence_and_laws_against_pagans"></span><span class="mw-headline" data-dcnode-id="2529" id="Fourth_century_political_influence_and_laws_against_pagans"><span data-dcnode-id="2530" instrument_node="">Fourth century political influence and laws against pagans</span></span><span class="ez-toc-section-end" data-dcnode-id="2528"></span></h4><span data-dcnode-id="2526" instrument_node="">
</span><p data-dcnode-id="2522"><span data-dcnode-id="2525" instrument_node="">See also:&nbsp;</span><a data-dcnode-id="2523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persecution_of_pagans_in_the_late_Roman_Empire" target="_blank" title="Persecution of pagans in the late Roman Empire"><span data-dcnode-id="2524" instrument_node="">Persecution of pagans in the late Roman Empire</span></a></p><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">During the fourth century, Christian writing and theology blossomed into a “Golden Age” of literary and scholarly activity unmatched since the days of Virgil and Horace. Many of these works remain influential in politics, law, ethics and other fields. A new genre of literature was also born in the fourth century: church history.</span></p><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">The remarkable transformation of Christianity from peripheral sect to major force within the Empire is often held to be a result of the influence held by St. Ambrose, the Bishop of Milan, but this is unlikely.&nbsp;In April of 390, the Emperor Theodosius I ordered the&nbsp;punitive massacre of thousands of the citizens&nbsp;of&nbsp;Thessaloniki. In a private letter from Ambrose to Theodosius, sometime in August after this event, Ambrose told Theodosius he cannot be given communion while Theodosius is unrepentant of this terrible act.&nbsp;Wolf Liebeschuetz&nbsp;says records show “Theodosius duly complied and came to church humbly, without his imperial robes, until Christmas, when Ambrose openly readmitted him to communion.”</span></p><span data-dcnode-id="2515" instrument_node="">
</span><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">McLynn states that “the encounter at the church door has long been known as a pious fiction.” Daniel Washburn&nbsp;explains that the image of the mitered prelate braced in the door of the cathedral in Milan blocking Theodosius from entering, is a product of the imagination of&nbsp;Theodoret, a historian of the fifth century who wrote of the events of 390 “using his own ideology to fill the gaps in the historical record.”&nbsp;According to&nbsp;Peter Brown, these events concern personal piety; they do not represent a turning point in history with the State submitting to the Church.</span></p><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">According to Christian literature of the fourth century, paganism ended by the early to mid—fifth century with everyone either converted or cowed. Contemporary archaeology, on the other hand, indicates this is not so; paganism continued across the empire, and the end of paganism varied from place to place.&nbsp;Violence such as temple destructions are attested in some locations, generally in small numbers, and are not spread equally throughout the empire. In most regions away from the imperial court, the end of paganism was, more often, gradual and untraumatic.</span></p><span data-dcnode-id="2509" instrument_node="">
</span><p data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Theodosius reigned (albeit for a brief interim) as the last Emperor of a united Eastern and Western Roman Empire. Between 389 and 391, Theodosius promulgated the Theodosian Decrees, a collection of laws from the time of Constantine including laws against heretics and pagans. In 391 Theodosius blocked the restoration of the pagan Altar of Victory to the Roman Senate and then fought against Eugenius, who courted pagan support for his own bid for the imperial throne. Brown says the language of the Theodosian Decrees is “uniformly vehement and the penalties are harsh and frequently horrifying.” They may have provided a foundation for similar laws in the High Middle Ages. However, in antiquity, these laws were not much enforced, and Brown adds that, “In most areas, polytheists were not molested, and, apart from a few ugly incidents of local violence, Jewish communities also enjoyed a century of stable, even privileged, existence.” Contemporary scholars indicate pagans were not wiped out or fully converted by the fifth century as Christian sources claim. Pagans remained throughout the fourth and fifth centuries in sufficient numbers to preserve a broad spectrum of pagan practices into the 6th century and even beyond in some places.</span></p><span data-dcnode-id="2506" instrument_node="">
</span><h4 class="fittexted_for_content_h4" data-dcnode-id="2501" style="font-size: 27px;"><span class="ez-toc-section" data-dcnode-id="2505" id="the_political_and_legal_impact_of_the_fall_of_rome"></span><span class="mw-headline" data-dcnode-id="2503" id="The_political_and_legal_impact_of_the_fall_of_Rome"><span data-dcnode-id="2504" instrument_node="">The political and legal impact of the fall of Rome</span></span><span class="ez-toc-section-end" data-dcnode-id="2502"></span></h4><span data-dcnode-id="2500" instrument_node="">
</span><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">The central bureaucracy of imperial Rome remained in Rome in the sixth century but was replaced in the rest of the empire by German tribal organization and the church.&nbsp;After the&nbsp;fall of Rome&nbsp;(476) most of the west returned to a subsistence agrarian form of life. What little security there was in this world was largely provided by the Christian church.&nbsp;The&nbsp;papacy&nbsp;served as a source of authority and continuity at this critical time. In the absence of a&nbsp;magister militum&nbsp;living in Rome, even the control of military matters fell to the pope.</span></p><span data-dcnode-id="2497" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="2492" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="2496" id="the_role_of_christianity_in_politics_and_law_in_the_medieval_period"></span><span class="mw-headline" data-dcnode-id="2494" id="The_role_of_Christianity_in_politics_and_law_in_the_Medieval_period"><span data-dcnode-id="2495" instrument_node="">The role of Christianity in politics and law in the Medieval period</span></span><span class="ez-toc-section-end" data-dcnode-id="2493"></span></h3><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">The historian&nbsp;Geoffrey Blainey&nbsp;likened the Catholic Church in its activities during the Middle Ages to an early version of a welfare state: “It conducted hospitals for the old and orphanages for the young; hospices for the sick of all ages; places for the lepers; and hostels or inns where pilgrims could buy a cheap bed and meal”. It supplied food to the population during famine and distributed food to the poor. This welfare system the church funded through collecting taxes on a large scale and by owning large farmlands and estates.</span></p><span data-dcnode-id="2488" instrument_node="">
</span><h4 class="fittexted_for_content_h4" data-dcnode-id="2483" style="font-size: 27px;"><span class="ez-toc-section" data-dcnode-id="2487" id="the_rule_of_benedict_as_a_legal_base_in_the_dark_ages"></span><span class="mw-headline" data-dcnode-id="2485" id="The_Rule_of_Benedict_as_a_legal_base_in_the_Dark_Ages"><span data-dcnode-id="2486" instrument_node="">The Rule of Benedict as a legal base in the Dark Ages</span></span><span class="ez-toc-section-end" data-dcnode-id="2484"></span></h4><span data-dcnode-id="2482" instrument_node="">
</span><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">The period between the Fall of Rome (476 C.E.) and the rise of the Carolingian Franks (750 C.E.) is often referred to as the “Dark Ages”, however, it could also be designated the “Age of the Monk”. This era had a lasting impact on politics and law through Christian aesthetes like St. Benedict (480–543), who vowed a life of chastity, obedience and poverty; after rigorous intellectual training and self-denial, Benedictines lived by the “Rule of Benedict:” work and pray. This “Rule” became the foundation of the majority of the thousands of monasteries that spread across what is modern day Europe; “…certainly there will be no demur in recognizing that St. Benedict’s Rule has been one of the great facts in the history of western Europe, and that its influence and effects are with us to this day.”</span></p><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Monasteries were models of productivity and economic resourcefulness teaching their local communities animal husbandry, cheese making, wine making, and various other skills.&nbsp;They were havens for the poor, hospitals, hospices for the dying, and schools. Medical practice was highly important in medieval monasteries, and they are best known for their contributions to medical tradition. They also made advances in sciences such as astronomy.&nbsp;For centuries, nearly all secular leaders were trained by monks because, excepting private tutors who were still, often, monks, it was the only education available.</span></p><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">The formation of these organized bodies of believers distinct from political and familial authority, especially for women, gradually carved out a series of social spaces with some amount of independence thereby revolutionizing social history.</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2472" instrument_node="">Gregory the Great&nbsp;(</span><i data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">c</span></i><span data-dcnode-id="2469" instrument_node="">&nbsp;540–604) administered the church with strict reform. A trained Roman lawyer, administrator, and monk, he represents the shift from the classical to the medieval outlook and was a father of many of the structures of the later Catholic Church. According to the Catholic Encyclopedia, he looked upon Church and State as co-operating to form a united whole, which acted in two distinct spheres, ecclesiastical and secular, but by the time of his death, the papacy was the great power in Italy:&nbsp;Gregory was one of the few sovereigns called Great by universal consent. He is known for sending out the first recorded large-scale mission from Rome to convert the then-pagan&nbsp;Anglo-Saxons in England, for his many writings, his administrative skills, and his focus on the welfare of the people.&nbsp;He also fought the&nbsp;Arian heresy&nbsp;and the&nbsp;Donatists, pacified the Goths, left a famous example of penitence for a crime, revised the liturgy, and influenced music through the development of antiphonal chants.</span></p><span data-dcnode-id="2467" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="2464"><p class="font-effect-shadow-soft" data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Pope Gregory the Great made himself in Italy a power stronger than emperor or exarch, and established a political influence which dominated the peninsula for centuries. From this time forth the varied populations of Italy looked to the pope for guidance, and Rome as the papal capital continued to be the centre of the Christian world.</span></p></blockquote><span data-dcnode-id="2463" instrument_node="">
</span><h4 class="fittexted_for_content_h4" data-dcnode-id="2458" style="font-size: 27px;"><span class="ez-toc-section" data-dcnode-id="2462" id="charlemagne_transformed_law_and_founded_feudalism_in_the_early_middle_ages"></span><span class="mw-headline" data-dcnode-id="2460" id="Charlemagne_transformed_law_and_founded_feudalism_in_the_Early_Middle_Ages"><span data-dcnode-id="2461" instrument_node="">Charlemagne transformed law and founded feudalism in the Early Middle Ages</span></span><span class="ez-toc-section-end" data-dcnode-id="2459"></span></h4><span data-dcnode-id="2457" instrument_node="">
</span><p data-dcnode-id="2453"><a data-dcnode-id="2455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charlemagne" target="_blank" title="Charlemagne"><span data-dcnode-id="2456" instrument_node="">Charlemagne</span></a><span data-dcnode-id="2454" instrument_node=""> (“Charles the Great” in English) became king of the Franks in 768. He conquered the&nbsp;Low Countries, Saxony, and northern and central Italy, and in 800,&nbsp;Pope Leo III&nbsp;crowned Charlemagne&nbsp;Holy Roman Emperor. Sometimes called the “Father of Europe” and the founder of feudalism, Charlemagne instituted political and judicial reform and led what is sometimes referred to as the Early Renaissance or the&nbsp;Christian Renaissance.&nbsp;Johannes Fried&nbsp;writes that Charlemagne left such a profound impression on his age that traces of it still remain. He promoted education and literacy and subsidized schools, he worked at protecting the poor enacting economic and currency reform; these, along with legal and judicial reforms, created a more lawful and prosperous kingdom. This helped form a group of independent minded warlords into a well-administered empire, with a tradition of working with the Pope, which became the precursor to the nation of France.&nbsp;Fried says, “he was the first king and emperor to seriously enact the legal principle according to which the Pope was beyond the reach of all human justice—a decision that would have major ramifications in the future.”</span></p><span data-dcnode-id="2452" instrument_node="">
</span><h4 class="fittexted_for_content_h4" data-dcnode-id="2446" style="font-size: 27px;"><span class="ez-toc-section" data-dcnode-id="2451" id="modern_common_law_persecution_and_secularization_began_in_the_high_middle_ages"></span><span data-dcnode-id="2450" id="Modern_common_law.2C_persecution.2C_and_secularization_began_in_the_High_Middle_Ages"></span><span class="mw-headline" data-dcnode-id="2448" id="Modern_common_law,_persecution,_and_secularization_began_in_the_High_Middle_Ages"><span data-dcnode-id="2449" instrument_node="">Modern common law, persecution, and secularization began in the High Middle Ages</span></span><span class="ez-toc-section-end" data-dcnode-id="2447"></span></h4><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2439"><span data-dcnode-id="2444" instrument_node="">By the late 11th century, beginning with the efforts of Pope Gregory VII, the Church successfully established itself as “an autonomous legal and political … [entity] within Western </span><strong data-dcnode-id="2441"><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/christendom/"><span data-dcnode-id="2443" instrument_node="">Christendom</span></a></strong><span data-dcnode-id="2440" instrument_node="">“. For the next three hundred years, the Church held great influence over Western society; church laws were the single “universal law … common to jurisdictions and peoples throughout Europe.”&nbsp;With its own court system, the Church retained jurisdiction over many aspects of ordinary life, including education, inheritance, oral promises, oaths, moral crimes, and marriage. As one of the more powerful institutions of the Middle Ages, Church attitudes were reflected in many secular laws of the time.&nbsp;The Catholic Church was very powerful, essentially internationalist and democratic in it structures, with its many branches run by the different monastic organizations, each with its own distinct theology and often in disagreement with the others.</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">Men of a scholarly bent usually took&nbsp;Holy Orders&nbsp;and frequently joined&nbsp;religious institutes. Those with intellectual, administrative, or diplomatic skill could advance beyond the usual restraints of society. Leading churchmen from faraway lands were accepted in local bishoprics, linking European thought across wide distances. Complexes like the&nbsp;Abbey of Cluny&nbsp;became vibrant centres with dependencies spread throughout Europe. Ordinary people also trekked vast distances on&nbsp;pilgrimages&nbsp;to express their piety and pray at the site of&nbsp;holy relics.</span></p><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">In the pivotal twelfth century (1100s), Europe began laying the foundation for its gradual transformation from the medieval to the modern. Feudal lords slowly lost power to the feudal kings as kings began centralizing power into themselves and their nation-state. Kings built their own armies instead of relying on their vassals, thereby taking power from the nobility. The ‘state’ took over legal practices that had traditionally belonged to local nobles and local church officials; and they began to target minorities. According to R.I. Moore and other contemporary scholars, “the growth of secular power and the pursuit of secular interests, constituted the essential context of the developments that led to a persecuting society.” This has had a permanent impact on politics and law in multiple ways: through a new rhetoric of exclusion that legitimized persecution based on new attitudes of stereotyping, stigmatization and even demonization of the accused; by the creation of new civil laws which included allowing the state to be the defendant and bring charges on its own behalf; the invention of police forces as the arm of state enforcement; the invention of a general taxation, gold coins, and modern banking to pay for it all; and the inquisitions, which were a new legal procedure that allowed the judge to investigate on his own initiative without requiring a victim (other than the state) to press charges.</span></p><span data-dcnode-id="2432" instrument_node="">
</span><blockquote data-dcnode-id="2429"><p class="font-effect-shadow-soft" data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">“The exceptional character of persecution in the Latin west since the twelfth century has lain not in the scale or savagery of particular persecutions, … but in its capacity for sustained long-term growth. The patterns, procedures and rhetoric of persecution, which were established in the twelfth century, have given it the power of infinite and indefinite self-generation and self-renewal.”</span></p></blockquote><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Eventually, this would lead to the development among the early Protestants of the conviction that concepts of religious toleration and separation of church and state were essential.</span></p><span data-dcnode-id="2425" instrument_node="">
</span><h5 class="fittexted_for_content_h5" data-dcnode-id="2419" style="font-size: 22.5px;"><span class="ez-toc-section" data-dcnode-id="2424" id="canon_law_the_value_of_debate_and_natural_law_from_medieval_universities"></span><span data-dcnode-id="2423" id="Canon_law.2C_the_value_of_debate.2C_and_natural_law_from_medieval_universities"></span><span class="mw-headline" data-dcnode-id="2421" id="Canon_law,_the_value_of_debate,_and_natural_law_from_medieval_universities"><span data-dcnode-id="2422" instrument_node="">Canon law, the value of debate, and natural law from medieval universities</span></span><span class="ez-toc-section-end" data-dcnode-id="2420"></span></h5><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Christianity in the High Middle Ages had a lasting impact on politics and law through the newly established universities. Canon law emerged from theology and developed independently there.&nbsp;By the 1200s, both civil and canon law had become a major aspect of ecclesiastical culture, dominating Christian thought.&nbsp;Most bishops and Popes of this period were trained lawyers rather than theologians, and much Christian thought of this time became little more than an extension of law. In the High Middle Ages, the religion that had begun by decrying the power of law (Romans 7:1) developed the most complex religious law the world has ever seen. Canon law became a fertile field for those who advocated strong papal power,&nbsp;and&nbsp;Brian Downing&nbsp;says that a church-centered empire almost became a reality in this era.&nbsp;However, Downing says the rule of law, established in the Middle Ages, is one of the reasons why Europe eventually developed democracy instead.</span></p><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2407"><span data-dcnode-id="2414" instrument_node="">Medieval universities were not secular institutions, but they, and some religious orders, were founded with a respect for dialogue and debate, believing good understanding came from viewing something from multiple sides. Because of this, they incorporated reasoned disputation into their system of studies.&nbsp;Accordingly, the universities would hold what was called a&nbsp;quadlibettal&nbsp;where a ‘master’ would raise a question, students would provide arguments, and those arguments would be assessed and argued. Brian Law says, “Literally anyone could attend, masters and scholars from other schools, all kinds of ecclesiastics and prelates and even civil authorities, all the ‘intellectuals’ of the time, who were always attracted to skirmishes of this kind, and all of whom had the right to ask questions and oppose arguments.”&nbsp;In a kind of ‘Town Hall Meeting’ atmosphere, questions could be raised orally by anyone (</span><i data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">a quolibet</span></i><span data-dcnode-id="2411" instrument_node="">) about literally anything (</span><i data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">de quolibet</span></i><span data-dcnode-id="2408" instrument_node="">).</span></p><span data-dcnode-id="2406" instrument_node="">
</span><p data-dcnode-id="2401"><a data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/thomas-aquinas/"><strong data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Thomas Aquinas</span></strong></a><span data-dcnode-id="2402" instrument_node=""> was a master at the University of Paris, twice, and held quodlibetals. Aquinas interpreted Aristotle on natural law.&nbsp;Alexander Passerin d’Entreves&nbsp;writes that natural law has been assailed for a century and a half, yet it remains an aspect of legal philosophy since much human rights theory is based on it.&nbsp;Aquinas taught that just leadership must work for the “common good”. He defines a law as “an ordinance of reason” and that it can’t simply be the will of the legislator and be good law. Aquinas says the primary goal of law is that “good is to be done and pursued and evil avoided.”</span></p><span data-dcnode-id="2400" instrument_node="">
</span><h6 class="fittexted_for_content_h6" data-dcnode-id="2395" style="font-size: 20.25px;"><span class="ez-toc-section" data-dcnode-id="2399" id="natural_law_and_human_rights"></span><span class="mw-headline" data-dcnode-id="2397" id="Natural_law_and_human_rights"><span data-dcnode-id="2398" instrument_node="">Natural law and human rights</span></span><span class="ez-toc-section-end" data-dcnode-id="2396"></span></h6><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">“The philosophical foundation of the liberal concept of human rights can be found in natural law theories”,&nbsp;and much thinking on natural law is traced to the thought of the Dominican friar, Thomas Aquinas.&nbsp;Aquinas continues to influence the works of leading political and legal philosophers.</span></p><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">According to Aquinas, every law is ultimately derived from what he calls the ‘eternal law’: God’s ordering of all created things. For Aquinas, a human action is good or bad depending on whether it conforms to reason, and it is this participation in the ‘eternal law’ by the ‘rational creature’ that is called ‘natural law’. Aquinas said natural law is a fundamental principle that is woven into the fabric of human nature. Secularists, such as Hugo Grotius, later expanded the idea of human rights and built on it.</span></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2386" style="padding-left: 40px;"><span data-dcnode-id="2387" instrument_node="">“…one cannot and need not deny that Human Rights are of Western Origin. It cannot be denied, because they are morally based on the Judeo-Christian tradition and Graeco-Roman philosophy; they were codified in the West over many centuries, they have secured an established position in the national declarations of western democracies, and they have been enshrined in the constitutions of those democracies.”</span></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Howard Tumber says, “human rights is not a universal doctrine, but is the descendent of one particular religion (Christianity).” This does not suggest Christianity has been superior in its practice or has not had “its share of human rights abuses”.</span></p><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2376"><span data-dcnode-id="2381" instrument_node="">David Gushee says Christianity has a “tragically mixed legacy” when it comes to the application of its own ethics. He examines three cases of “</span><a data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/christendom/"><strong data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">Christendom</span></strong></a><span data-dcnode-id="2377" instrument_node=""> divided against itself”: the crusades and St. Francis’ attempt at peacemaking with Muslims; Spanish conquerors and the killing of indigenous peoples and the protests against it; and the on-again off-again persecution and protection of Jews.</span></p><span data-dcnode-id="2375" instrument_node="">
</span><p data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Charles Malik, a Lebanese academic, diplomat, philosopher and theologian was responsible for the drafting and adoption of the 1948&nbsp;Universal Declaration of Human Rights.</span></p><span data-dcnode-id="2372" instrument_node="">
</span><h5 class="fittexted_for_content_h5" data-dcnode-id="2367" style="font-size: 22.5px;"><span class="ez-toc-section" data-dcnode-id="2371" id="revival_of_roman_law_in_the_medieval_inquisition"></span><span class="mw-headline" data-dcnode-id="2369" id="Revival_of_Roman_law_in_the_Medieval_Inquisition"><span data-dcnode-id="2370" instrument_node="">Revival of Roman law in the Medieval Inquisition</span></span><span class="ez-toc-section-end" data-dcnode-id="2368"></span></h5><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2365" instrument_node="">Main article:&nbsp;</span><a data-dcnode-id="2362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/inquisition/"><strong data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Inquisition</span></strong></a></p><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2359" instrument_node="">According to&nbsp;Jennifer Deane, the label&nbsp;</span><i data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">Inquisition</span></i><span data-dcnode-id="2356" instrument_node=""> implies “an institutional coherence and an official unity that never existed in the Middle Ages.”&nbsp;The&nbsp;Medieval Inquisitions&nbsp;were actually a series of separate inquisitions beginning from around 1184 lasting to the 1230s that were in response to dissidents accused of heresy, while the Papal Inquisition (1230s–1302) was created to restore order disrupted by mob violence against heretics. Heresy was a religious, political, and social issue.&nbsp;As such, “the first stirrings of violence against dissidents were usually the result of popular resentment.”&nbsp;This led to a breakdown of social order.&nbsp;In the Late Roman Empire, an inquisitorial system of justice had developed, and that is the system that was revived in the Middle Ages. It used a combined panel of both civil and ecclesiastical representatives with a Bishop, his representative, or a local judge, as inquisitor. Essentially, the church reintroduced Roman law in Europe (in the form of the Inquisition) when it seemed that Germanic law had failed.&nbsp;“The [Medieval] Inquisition was not an organization arbitrarily devised and imposed upon the judicial system by the ambition or fanaticism of the church. It was rather a natural—one may almost say an inevitable—evolution of the forces at work in the thirteenth century.”</span></p><span data-dcnode-id="2354" instrument_node="">
</span><h5 class="fittexted_for_content_h5" data-dcnode-id="2348" style="font-size: 22.5px;"><span class="ez-toc-section" data-dcnode-id="2353" id="the_invention_of_holy_war_chivalry_and_the_roots_of_modern_tolerance"></span><span data-dcnode-id="2352" id="The_invention_of_Holy_War.2C_chivalry.2C_and_the_roots_of_modern_tolerance"></span><span class="mw-headline" data-dcnode-id="2350" id="The_invention_of_Holy_War,_chivalry,_and_the_roots_of_modern_tolerance"><span data-dcnode-id="2351" instrument_node="">The invention of Holy War, chivalry, and the roots of modern tolerance</span></span><span class="ez-toc-section-end" data-dcnode-id="2349"></span></h5><span data-dcnode-id="2347" instrument_node="">
</span><p data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">In 1095, Pope Urban II called for a Crusade to re-take the Holy Land from Muslim rule. Hugh S. Pyper says “the city [of Jerusalem’s] importance is reflected in the fact that early medieval maps place [Jerusalem] at the center of the world.”</span></p><span data-dcnode-id="2344" instrument_node="">
</span><blockquote data-dcnode-id="2341"><p class="font-effect-shadow-soft" data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">“By the eleventh century, the Seljuk Turks had conquered [three—quarters of the Christian world]. The holdings of the old Eastern Roman Empire, known to modern historians as the Byzantine Empire, were reduced to little more than Greece. In desperation, the emperor in Constantinople sent word to the Christians of western Europe asking them to aid their brothers and sisters in the East.”</span></p></blockquote><span data-dcnode-id="2340" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2339" instrument_node="">This was the impetus of the first crusade, however, the “Colossus of the Medieval world was </span><strong data-dcnode-id="2336"><a data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/islam/"><span data-dcnode-id="2338" instrument_node="">Islam</span></a></strong><span data-dcnode-id="2335" instrument_node="">, not </span><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/christendom/"><strong data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Christendom</span></strong></a><span data-dcnode-id="2331" instrument_node="">” and despite initial success, these conflicts, which lasted four centuries, ultimately ended in failure for western Christendom.</span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2320"><span data-dcnode-id="2328" instrument_node="">At the time of the First crusade, there was no clear concept of what a crusade was beyond that of a pilgrimage.&nbsp;Riley-Smith&nbsp;says the crusades were products of the renewed spirituality of the central Middle Ages as much as they were of political circumstances.&nbsp;Senior churchmen of this time presented the concept of Christian love to the faithful as the reason to take up arms.&nbsp;The people had a concern for living the&nbsp;</span><i data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">vita apostolica</span></i><span data-dcnode-id="2325" instrument_node=""> and expressing Christian ideals in active works of charity, exemplified by the new hospitals, the pastoral work of the Augustinians and Premonstratensians, and the service of the friars. Riley-Smith concludes, “The charity of St. Francis may now appeal to us more than that of the crusaders, but both sprang from the same roots.”&nbsp;Constable&nbsp;adds that those “scholars who see the crusades as the beginning of European colonialism and expansionism would have surprised people at the time. [</span><a data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/the-crusades/"><strong data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Crusaders</span></strong></a><span data-dcnode-id="2321" instrument_node="">] would not have denied some selfish aspects… but the predominant emphasis was on the defense and recovery of lands that had once been Christian and on the self-sacrifice, rather than the self-seeking, of the participants.”&nbsp;Riley-Smith also says scholars are turning away from the idea the crusades were materially motivated.</span></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Ideas such as holy war and Christian chivalry, in both thought and culture, continued to evolve gradually from the eleventh to the thirteenth centuries.&nbsp;This can be traced in expressions of law, traditions, tales, prophecy, and historical narratives, in letters, bulls and poems written during the crusading period.</span></p><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">According to political science professor Andrew R. Murphy, concepts of tolerance and intolerance were not starting points for thoughts about relations for any of the various groups involved in or affected by the crusades. Instead, concepts of tolerance began to grow during the crusades from efforts to define legal limits and the nature of co-existence.&nbsp;Eventually, this would help provide the foundation to the conviction among the early&nbsp;Protestants&nbsp;that pioneering the concept of&nbsp;religious toleration&nbsp;was necessary.</span></p><span data-dcnode-id="2313" instrument_node="">
</span><h4 class="fittexted_for_content_h4" data-dcnode-id="2308" style="font-size: 27px;"><span class="ez-toc-section" data-dcnode-id="2312" id="moral_decline_and_rising_political_power_of_the_church_in_the_late_middle_ages"></span><span class="mw-headline" data-dcnode-id="2310" id="Moral_decline_and_rising_political_power_of_the_church_in_the_Late_Middle_Ages"><span data-dcnode-id="2311" instrument_node="">Moral decline and rising political power of the church in the Late Middle Ages</span></span><span class="ez-toc-section-end" data-dcnode-id="2309"></span></h4><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">During the “calamitous” fourteenth century with its plague, famine and wars, people were thrown into confusion and despair. From its pinnacle of power in the 1200s, the church entered a period of decline, internal conflict, and corruption.&nbsp;According to&nbsp;Walter Ullmann, the church lost “the moral, spiritual and authoritative leadership it had built up in Europe over the centuries of minute, consistent, detailed, dynamic forward-looking work. …The papacy was now forced to pursue policies which, in substance, aimed at appeasement and were no longer directive, orientating and determinative.”</span></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2299"><span data-dcnode-id="2303" instrument_node="">According to Matthews and DeWitt, “The Popes in the fourteenth to the mid-fifteenth century turned their interest to the arts and humanities rather than to pressing moral and spiritual issues. Moreover, they were vitally concerned with the trappings of political power. They plunged into Italian politics…ruling as secular princes in their papal lands. Their worldly interests and blatant political maneuverings only intensified the mounting disapproval of the papacy and provided the church’s critics with more examples of the institution’s corruption and decline.”&nbsp;As the Church grew more powerful, wealthy, and corrupt, many sought reform. The&nbsp;Dominican&nbsp;and&nbsp;Franciscan&nbsp;Orders were founded, which emphasized poverty and spirituality, and the concept of lay piety developed—the&nbsp;</span><i data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">devotio moderna</span></i><span data-dcnode-id="2300" instrument_node=""> or the new devotion—which worked toward the ideal of a pious society of ordinary non-ordained people and, ultimately, to the Reformation and the development of modern concepts of tolerance and religious freedom.</span></p><span data-dcnode-id="2298" instrument_node="">
</span><h5 class="fittexted_for_content_h5" data-dcnode-id="2293" style="font-size: 22.5px;"><span class="ez-toc-section" data-dcnode-id="2297" id="political_power_of_women_rose_and_fell"></span><span class="mw-headline" data-dcnode-id="2295" id="Political_power_of_Women_rose_and_fell"><span data-dcnode-id="2296" instrument_node="">Political power of Women rose and fell</span></span><span class="ez-toc-section-end" data-dcnode-id="2294"></span></h5><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">In the 13th-century Roman Pontifical, the prayer for ordaining women as deacons was removed, and ordination was re-defined and applied only to male Priests.</span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">Woman-as-witch became a stereotype in the 1400s until it was codified in 1487 by Pope Innocent VIII who declared “most witches are female”. “The European witch stereotype embodies two apparent paradoxes: first, it was not produced by the ‘barbaric Dark Ages,’ but during the progressive Renaissance and the early modern period; secondly, Western Christianity did not recognize the reality of witches for centuries, or criminalize them until around 1400.”&nbsp;Sociologist Don Swenson says the explanation for this may lay in the nature of Medieval society as heirocratic which led to violence and the use of coercion to force conformity. “There has been much debate …as to how many women were executed…[and estimates vary wildly, but numbers] small and large do little to portray the horror and dishonor inflicted upon these women. This treatment provides [dramatic] contrast to the respect given to women during the early era of Christianity and in early Europe&nbsp;…”</span></p><span data-dcnode-id="2286" instrument_node="">
</span><p data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">Women were in many respects excluded from political and mercantile life; however, some leading churchwomen were exceptions. Medieval abbesses and female superiors of monastic houses were powerful figures whose influence could rival that of male bishops and abbots: “They treated with kings, bishops, and the greatest lords on terms of perfect equality;&nbsp;… they were present at all great religious and national solemnities, at the dedication of churches, and even, like the queens, took part in the deliberation of the national assemblies&nbsp;…”.&nbsp;The increasing popularity of&nbsp;devotion to the Virgin Mary&nbsp;(the mother of Jesus) secured maternal virtue as a central cultural theme of Catholic Europe. Kenneth Clarke wrote that the ‘Cult of the Virgin’ in the early 12th century “had taught a race of tough and ruthless barbarians the virtues of tenderness and compassion”.</span></p><span data-dcnode-id="2283" instrument_node="">
</span><h5 class="fittexted_for_content_h5" data-dcnode-id="2278" style="font-size: 22.5px;"><span class="ez-toc-section" data-dcnode-id="2282" id="the_political_popes"></span><span class="mw-headline" data-dcnode-id="2280" id="The_political_Popes"><span data-dcnode-id="2281" instrument_node="">The political Popes</span></span><span class="ez-toc-section-end" data-dcnode-id="2279"></span></h5><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">In 1054, after centuries of strained relations, the&nbsp;Great Schism&nbsp;occurred over differences in doctrine, splitting the Christian world between the&nbsp;Catholic Church, centered in Rome and dominant in the West, and the&nbsp;Orthodox Church, centered in&nbsp;Constantinople, capital of the Byzantine Empire.</span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Relations between the major powers in Western society: the nobility, monarchy and clergy, also sometimes produced conflict. For example, the&nbsp;Investiture Controversy&nbsp;was one of the most significant conflicts between&nbsp;Church and state in medieval Europe. A series of Popes challenged the authority of monarchies over control of appointments, or&nbsp;investitures, of church officials. The Court of&nbsp;Holy Roman Emperor&nbsp;Frederick II, based in Sicily, experienced tension and rivalry with the Papacy over control of Northern Italy.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2270" instrument_node="">In 1302,&nbsp;Pope Boniface VIII&nbsp;(1294–1303) issued&nbsp;</span><i data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Unam sanctam</span></i><span data-dcnode-id="2267" instrument_node="">, a papal bull proclaiming the superiority of the Pope over all secular rulers. Philip IV of France responded by sending an army to arrest the Pope. Boniface fled for his life and died shortly thereafter.&nbsp;“This episode revealed that the popes were no longer a match for the feudal kings” and showed there had been a marked decline in papal prestige.&nbsp;George Garnett&nbsp;says the implementation of the papal monarchial idea had led to the loss of prestige, as, the more efficient the papal bureaucratic machine became, the further it alienated the people, and the further it declined.</span></p><span data-dcnode-id="2265" instrument_node="">
</span><p data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">The&nbsp;Papacy had its court at Avignon&nbsp;from 1305 to 1378 This arose from the conflict between the Italian Papacy and the French crown. Theologian&nbsp;Roger Olson&nbsp;says the church reached its nadir at this time when there were three different men claiming to be the rightful Pope.</span></p><span data-dcnode-id="2262" instrument_node="">
</span><blockquote data-dcnode-id="2259"><p class="font-effect-shadow-soft" data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">“What the observer of the papacy witnessed in the second half of the thirteenth century was a gradual, though clearly perceptible, decomposition of Europe as a single ecclesiastical unit, and the fragmentation of Europe into independent, autonomous entities which were soon to be called national monarchies or states. This fragmentation heralded the withering away of the papacy as a governing institution operating on a universal scale.”</span></p></blockquote><span data-dcnode-id="2258" instrument_node="">
</span><h5 class="fittexted_for_content_h5" data-dcnode-id="2253" style="font-size: 22.5px;"><span class="ez-toc-section" data-dcnode-id="2257" id="the_political_and_legal_power_of_the_state_through_modern_inquisitions"></span><span class="mw-headline" data-dcnode-id="2255" id="The_political_and_legal_power_of_the_state_through_Modern_Inquisitions"><span data-dcnode-id="2256" instrument_node="">The political and legal power of the state through Modern Inquisitions</span></span><span class="ez-toc-section-end" data-dcnode-id="2254"></span></h5><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">The history of the Inquisition divides into two major parts: “its creation by the medieval papacy in the early thirteenth century, and its transformation between 1478 and 1542 into permanent secular governmental bureaucracies: the Spanish, Portuguese, and Roman Inquisitions…all of which endured into the nineteenth century.” The old medieval inquisitions had limited power and influence, whereas the powers of the modern “Holy Tribunal” were extended and enlarged by the power of the state into “one of the most formidable engines of destruction which ever existed.”</span></p><span data-dcnode-id="2249" instrument_node="">
</span><p data-dcnode-id="2244"><span data-dcnode-id="2248" instrument_node="">Historian Helen Rawlings says, “the Spanish Inquisition was different [from earlier inquisitions] in one fundamental respect: it was responsible to the crown rather than the Pope and was used to consolidate state interest.” It was authorized by the Pope, yet the initial Inquisitors proved so severe that the Pope almost immediately opposed it to no avail.&nbsp;Early in 1483, the king and queen established a council, the&nbsp;</span><i data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Consejo de la Suprema y General Inquisición</span></i><span data-dcnode-id="2245" instrument_node="">, to govern the inquisition and chose Torquemada to head it as inquisitor general. In October 1483, a papal bull conceded control to the crown. According to José Cassanova, the Spanish inquisition became the first truly national, unified and centralized state institution.&nbsp;After the 1400s, few Spanish inquisitors were from the religious orders.</span></p><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">The Portuguese inquisition was also fully controlled by the crown which established a government board, known as the General Council, to oversee it. The Grand Inquisitor, who was chosen by the king, was always a member of the royal family. The first statute of Limpieza de sangre (purity of blood) appeared in Toledo in 1449 and was later adopted in Portugal as well. Initially, these statutes were condemned by the Church, but in 1555, the highly corrupt Pope Alexander VI approved a ‘blood purity’ statute for one of the religious orders.&nbsp;In his history of the Portuguese inquisition, Giuseppe Marcocci says there is a deep connection between the rise of the Felipes in Portugal, the growth of the inquisition, and the adoption of the statutes of purity of blood which spread and increased and were more concerned with ethnic ancestry than religion.</span></p><span data-dcnode-id="2240" instrument_node="">
</span><p data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Historian T. F. Mayer writes that “the Roman Inquisition operated to serve the papacy’s long standing political aims in Naples, Venice and Florence.”&nbsp;Under Paul III and his successor Julius III, and under most of the popes thereafter, the Roman Inquisition’s activity was relatively restrained and its command structure was considerably more bureaucratic than those of other inquisitions were. Where the medieval Inquisition had focused on popular misconceptions which resulted in the disturbance of public order, the Roman Inquisition was concerned with orthodoxy of a more intellectual, academic nature. The Roman Inquisition is probably best known for its condemnation of the difficult and cantankerous Galileo which was more about “bringing Florence to heel” than about heresy.</span></p><span data-dcnode-id="2237" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="2232" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="2236" id="the_role_of_christianity_in_politics_and_law_from_the_reformation_until_the_modern_era"></span><span class="mw-headline" data-dcnode-id="2234" id="The_role_of_Christianity_in_politics_and_law_from_the_Reformation_until_the_Modern_era"><span data-dcnode-id="2235" instrument_node="">The role of Christianity in politics and law from the Reformation until the Modern era</span></span><span class="ez-toc-section-end" data-dcnode-id="2233"></span></h3><span data-dcnode-id="2231" instrument_node="">
