</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Recently, the Church has been criticized for its teaching that&nbsp;embryonic stem cell research&nbsp;is a form of&nbsp;experimentation on human beings, and results in the killing of a human person. Much criticism of this position has been on the grounds that the doctrine hinders scientific research; even some conservatives, taking a&nbsp;utilitarian&nbsp;position,&nbsp;have pointed out&nbsp;that most embryos from which stem cells are harvested are “leftover” from&nbsp;in vitro fertilization, and would soon be discarded whether used for such research or not. The Church, by contrast, has consistently upheld its ideal of the dignity of each individual human life, and argues that it is as wrong to destroy an embryo as it would be to kill an adult human being; and that therefore advances in medicine can and must come without the destruction of human embryos, for example by using adult or umbilical stem cells in place of embryonic stem cells.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><h2 class="fittexted_for_content_h2" data-dcnode-id="1751" style="font-size: 38.25px;"><span class="ez-toc-section" data-dcnode-id="1755" id="the_arts"></span><span class="mw-headline" data-dcnode-id="1753" id="The_Arts"><span data-dcnode-id="1754" instrument_node="">The Arts</span></span><span class="ez-toc-section-end" data-dcnode-id="1752"></span></h2><span data-dcnode-id="1750" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1745" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1749" id="byzantium"></span><span class="mw-headline" data-dcnode-id="1747" id="Byzantium"><span data-dcnode-id="1748" instrument_node="">Byzantium</span></span><span class="ez-toc-section-end" data-dcnode-id="1746"></span></h3><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1743" instrument_node="">Main articles:&nbsp;</span><a class="mw-redirect" data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_in_Roman_Catholicism" target="_blank" title="Art in Roman Catholicism"><span data-dcnode-id="1742" instrument_node="">Art in Roman Catholicism</span></a><span data-dcnode-id="1740" instrument_node="">&nbsp;and&nbsp;</span><a class="mw-redirect" data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Roman_Catholic_Church_musicians" target="_blank" title="List of Roman Catholic Church musicians"><span data-dcnode-id="1739" instrument_node="">List of Roman Catholic Church musicians</span></a></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Many&nbsp;Eastern Orthodox&nbsp;states in Eastern Europe, as well as to some degree the&nbsp;Muslim states of the eastern Mediterranean, preserved many aspects of the empire’s culture and art for centuries afterward. A number of states contemporary with the Byzantine Empire&nbsp;were culturally influenced by it, without actually being part of it (the “Byzantine commonwealth”). These included&nbsp;Bulgaria,&nbsp;Serbia, and the&nbsp;Rus, as well as some non-Orthodox states like the&nbsp;Republic of Venice&nbsp;and the&nbsp;Kingdom of Sicily, which had close ties to the Byzantine Empire despite being in other respects part of western European culture. Art produced by Eastern Orthodox Christians living in the&nbsp;Ottoman Empire&nbsp;is often called “post-Byzantine”. Certain artistic traditions that originated in the Byzantine Empire, particularly in regard to icon painting and church architecture, are maintained in Greece, Serbia, Bulgaria, Macedonia, Russia and other Eastern Orthodox countries to the present day.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1728" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1732" id="architecture"></span><span class="mw-headline" data-dcnode-id="1730" id="Architecture"><span data-dcnode-id="1731" instrument_node="">Architecture</span></span><span class="ez-toc-section-end" data-dcnode-id="1729"></span></h3><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">Several historians credit the Catholic Church for what they consider to be the brilliance and magnificence of Western art. “Even though the church dominated art and architecture, it did not prevent architects and artists from experimenting…” Historians such as Thomas Woods refer to the western Church’s consistent opposition to Byzantine iconoclasm, an eastern movement against visual representations of the divine, and the western church’s insistence on building structures befitting worship. Important contributions include its cultivation and patronage of individual artists, as well as development of the Romanesque, Gothic and Renaissance styles of art and architecture. Augustine’s repeated reference to Wisdom 11:20 (God “ordered all things by measure and number and weight”) influenced the geometric constructions of Gothic architecture.</span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1723" instrument_node="">British art historian Kenneth Clark wrote that Western Europe’s first “great age of civilization” was ready to begin around the year 1000. From 1100, he wrote, monumental abbeys and cathedrals were constructed and decorated with sculptures, hangings, mosaics and works belonging to one of the greatest epochs of art, providing stark contrast to the monotonous and cramped conditions of ordinary living during the period. The Late Middle Ages produced ever more extravagant art and architecture, but also the virtuous simplicity of those such as St Francis of Assisi (expressed in the Canticle of the Sun) and the epic poetry of Dante’s </span><i data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Divine Comedy</span></i><span data-dcnode-id="1720" instrument_node="">.&nbsp;Abbot Suger&nbsp;of the&nbsp;Abbey of St. Denis&nbsp;is considered an influential early patron of Gothic architecture. He believed that love of beauty brought people closer to God: “The dull mind rises to truth through that which is material”. Clarke calls this “the intellectual background of all the sublime works of art of the next century and in fact has remained the basis of our belief of the value of art until today”.</span></p><span data-dcnode-id="1718" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1713" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1717" id="painting_and_sculpture"></span><span class="mw-headline" data-dcnode-id="1715" id="Painting_and_sculpture"><span data-dcnode-id="1716" instrument_node="">Painting and sculpture</span></span><span class="ez-toc-section-end" data-dcnode-id="1714"></span></h3><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1695"><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D76075"><strong data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Renaissance</span></strong></a><span data-dcnode-id="1708" instrument_node=""> artists such as Raphael, Michelangelo, Leonardo da Vinci, Bernini, Botticelli, Fra Angelico, Tintoretto, Caravaggio, and Titian, were among a multitude of innovative virtuosos sponsored by the Church.&nbsp;During both&nbsp;The Renaissance&nbsp;and the&nbsp;Counter-Reformation, Catholic artists produced many of the unsurpassed masterpieces of&nbsp;Western art&nbsp;– often inspired by Biblical themes: from Michelangelo’s&nbsp;</span><i data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">David</span></i><span data-dcnode-id="1705" instrument_node="">&nbsp;and&nbsp;</span><i data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Pietà</span></i><span data-dcnode-id="1702" instrument_node="">&nbsp;sculptures, to Da Vinci’s&nbsp;</span><i data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Last Supper</span></i><span data-dcnode-id="1699" instrument_node="">&nbsp;and Raphael’s various&nbsp;</span><i data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Madonna</span></i><span data-dcnode-id="1696" instrument_node="">&nbsp;paintings. Referring to a “great outburst of creative energy such as took place in Rome between 1620 and 1660”, Kenneth Clarke wrote:</span></p><span data-dcnode-id="1694" instrument_node="">
</span><blockquote data-dcnode-id="1691"><p class="font-effect-shadow-soft" data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">[W]ith a single exception, the great artists of the time were all sincere, conforming Christians. Guercino spent much of his mornings in prayer; Bernini frequently went into retreats and practised the Spiritual Exercises of Saint Ignatius; Rubens attended Mass every morning before beginning work. The exception was Caravaggio, who was like the hero of a modern play, except that he happened to paint very well. This conformism was not based on fear of the Inquisition, but on the perfectly simple belief that the faith which had inspired the great saints of the preceding generation was something by which a man should regulate his life.</span></p></blockquote><span data-dcnode-id="1690" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1685" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1689" id="music"></span><span class="mw-headline" data-dcnode-id="1687" id="Music"><span data-dcnode-id="1688" instrument_node="">Music</span></span><span class="ez-toc-section-end" data-dcnode-id="1686"></span></h3><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">In music, Catholic monks developed the first forms of modern Western musical notation in order to standardize liturgy throughout the worldwide Church, and an enormous body of religious music has been composed for it through the ages. This led directly to the emergence and development of European classical music, and its many derivatives. The Baroque style, which encompassed music, art, and architecture, was particularly encouraged by the post-Reformation Catholic Church as such forms offered a means of religious expression that was stirring and emotional, intended to stimulate religious fervor.</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1680" instrument_node="">The list of Catholic composers and Catholic sacred music which have a prominent place in Western culture is extensive, but includes&nbsp;Ludwig van Beethoven’s&nbsp;</span><i data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Ode to Joy</span></i><span data-dcnode-id="1677" instrument_node="">;&nbsp;Wolfgang Amadeus Mozart’s&nbsp;</span><i data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Ave Verum Corpus</span></i><span data-dcnode-id="1674" instrument_node="">;&nbsp;Franz Schubert’s&nbsp;</span><i data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Ave Maria</span></i><span data-dcnode-id="1671" instrument_node="">,&nbsp;César Franck’s&nbsp;</span><i data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Panis angelicus</span></i><span data-dcnode-id="1668" instrument_node="">, and&nbsp;Antonio Vivaldi’s&nbsp;</span><i data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Gloria</span></i><span data-dcnode-id="1665" instrument_node="">.</span></p><span data-dcnode-id="1663" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1658" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1662" id="literature"></span><span class="mw-headline" data-dcnode-id="1660" id="Literature"><span data-dcnode-id="1661" instrument_node="">Literature</span></span><span class="ez-toc-section-end" data-dcnode-id="1659"></span></h3><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1656" instrument_node="">Similarly, the list of Catholic authors and literary works is vast. With a literary tradition spanning two millennia, the Bible and Papal Encyclicals have been constants of the Catholic canon but countless other historical works may be listed as noteworthy in terms of their influence on Western society. From late Antiquity, St Augustine’s book Confessions, which outlines his sinful youth and conversion to Christianity, is widely considered to be the first autobiography ever written in the canon of Western Literature. Augustine profoundly influenced the coming medieval worldview. The </span><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/summa-theologica/"><strong data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Summa Theologica</span></strong></a><span data-dcnode-id="1652" instrument_node="">, written 1265–1274, is the best-known work of Thomas Aquinas (c.1225–1274), and although unfinished, “one of the classics of the history of philosophy and one of the most influential works of Western literature.” It is intended as a manual for beginners in theology and a compendium of all of the main theological teachings of the Church. It presents the reasoning for almost all points of Christian theology in the West. The epic poetry of the Italian Dante and his </span><i data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Divine Comedy</span></i><span data-dcnode-id="1649" instrument_node=""> of the late Middle Ages is also considered immensely influential. The English statesman and philosopher, Thomas More, wrote the seminal work Utopia in 1516. St Ignatius Loyola, a key figure in the Catholic counter-reformation, is the author of an influential book of meditations known as the Spiritual Exercises.</span></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1646" instrument_node="">The&nbsp;scholastics’ intellectual systems by Aquinas, called the&nbsp;</span><i data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Summa Theologiae</span></i><span data-dcnode-id="1643" instrument_node="">, influenced the writings of&nbsp;Dante, and in turn, Dante’s creation and sacramental theology has contributed to a&nbsp;Catholic imagination&nbsp;influencing writers such as&nbsp;J. R. R. Tolkien&nbsp;and&nbsp;William Shakespeare.</span></p><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">In&nbsp;Catholicism, “Doctor of the Church” is a name is given to a saint from whose writings the whole Church is held to have derived great advantage and to whom “eminent learning” and “great sanctity” have been attributed by a proclamation of a pope or of an&nbsp;ecumenical council. This honour is given rarely, and only after&nbsp;canonization.</span></p><span data-dcnode-id="1638" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1633" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1637" id="protestant"></span><span class="mw-headline" data-dcnode-id="1635" id="Protestant"><span data-dcnode-id="1636" instrument_node="">Protestant</span></span><span class="ez-toc-section-end" data-dcnode-id="1634"></span></h3><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">The arts have been strongly inspired by Protestant beliefs. Martin Luther, Paul Gerhardt, George Wither, Isaac Watts, Charles Wesley, William Cowper, and many other authors and composers created well-known church hymns. Musicians like Heinrich Schütz, Johann Sebastian Bach, George Frederick Handel, Henry Purcell, Johannes Brahms, and Felix Mendelssohn-Bartholdy composed great works of music. Prominent painters with Protestant background were, for example, Albrecht Dürer, Hans Holbein the Younger, Lucas Cranach, Rembrandt, and Vincent van Gogh. World literature was enriched by the works of Edmund Spenser, John Milton, John Bunyan, John Donne, John Dryden, Daniel Defoe, William Wordsworth, Jonathan Swift, Johann Wolfgang Goethe, Friedrich Schiller, Samuel Taylor Coleridge, Edgar Allan Poe, Matthew Arnold, Conrad Ferdinand Meyer, Theodor Fontane, Washington Irving, Robert Browning, Emily Dickinson, Emily Brontë, Charles Dickens, Nathaniel Hawthorne, Thomas Stearns Eliot, John Galsworthy, Thomas Mann, William Faulkner, John Updike, and many others.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><h2 class="fittexted_for_content_h2" data-dcnode-id="1624" style="font-size: 38.25px;"><span class="ez-toc-section" data-dcnode-id="1628" id="economic_development"></span><span class="mw-headline" data-dcnode-id="1626" id="Economic_development"><span data-dcnode-id="1627" instrument_node="">Economic development</span></span><span class="ez-toc-section-end" data-dcnode-id="1625"></span></h2><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1615"><a data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francisco_de_Vitoria" target="_blank" title="Francisco de Vitoria"><span data-dcnode-id="1622" instrument_node="">Francisco de Vitoria</span></a><span data-dcnode-id="1620" instrument_node="">, a disciple of&nbsp;</span><a data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/thomas-aquinas/"><strong data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Thomas Aquinas</span></strong></a><span data-dcnode-id="1616" instrument_node="">&nbsp;and a Catholic thinker who studied the issue regarding the human rights of colonized natives, is recognized by the United Nations as a father of international law, and now also by historians of economics and democracy as a leading light for the West’s democracy and rapid economic development.</span></p><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Joseph Schumpeter, an economist of the twentieth century, referring to the&nbsp;Scholastics, wrote, “it is they who come nearer than does any other group to having been the ‘founders’ of scientific economics.”&nbsp;Other economists and historians, such as Raymond de Roover, Marjorie Grice-Hutchinson, and Alejandro Chafuen, have also made similar statements. Historian Paul Legutko of Stanford University said the Catholic Church is “at the center of the development of the values, ideas, science, laws, and institutions which constitute what we call Western civilization.”</span></p><span data-dcnode-id="1611" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1606" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1610" id="protestant_work_ethic"></span><span class="mw-headline" data-dcnode-id="1608" id="Protestant_work_ethic"><span data-dcnode-id="1609" instrument_node="">Protestant work ethic</span></span><span class="ez-toc-section-end" data-dcnode-id="1607"></span></h3><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1604" instrument_node="">Main articles: </span><a aria-label="“Protestant Culture” (Edit)" class="row-title" data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D76358"><span data-dcnode-id="1603" instrument_node="">P</span><strong data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">rotestant Culture</span></strong></a><span data-dcnode-id="1599" instrument_node=""> and </span><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protestant_work_ethic" target="_blank"><span data-dcnode-id="1598" instrument_node="">Protestant work ethic</span></a><br data-dcnode-id="1596"><span data-dcnode-id="1595" instrument_node="">
See also: </span><strong data-dcnode-id="1592"><a aria-label="“Christian Ethics” (Edit)" class="row-title" data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D58433"><span data-dcnode-id="1594" instrument_node="">Christian Ethics</span></a></strong></p><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1589" instrument_node="">The&nbsp;Protestant work ethic, the&nbsp;</span><i data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Calvinist work ethic</span></i><span data-dcnode-id="1586" instrument_node="">,&nbsp;or the&nbsp;</span><i data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Puritan work ethic</span></i><span data-dcnode-id="1583" instrument_node=""> is a work ethic concept in theology, sociology, economics and history which emphasizes that hard work, discipline, and frugality are a result of a person’s subscription to the values espoused by the Protestant faith, particularly Calvinism. The phrase was initially coined in 1904–1905 by Max Weber in his book </span><i data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">The Protestant Ethic and the Spirit of Capitalism</span></i><span data-dcnode-id="1580" instrument_node="">.&nbsp;Weber asserted that Protestant ethics and values along with the Calvinist doctrine of&nbsp;asceticism&nbsp;and&nbsp;predestination&nbsp;gave birth to capitalism.&nbsp;It is one of the most influential and cited books in sociology although the thesis presented has been controversial since its release. In opposition to Weber, historians such as&nbsp;Fernand Braudel&nbsp;and&nbsp;Hugh Trevor-Roper&nbsp;assert that the Protestant work ethic did not create&nbsp;capitalism&nbsp;and that capitalism developed in pre-Reformation Catholic communities. Just as priests and caring professionals are deemed to have a&nbsp;vocation&nbsp;(or “calling” from God) for their work, according to the Protestant work ethic the lowly workman also has a noble vocation which he can fulfil through dedication to his work.</span></p><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">The Protestant concept of God and man allows believers to use all their God-given faculties, including the power of reason. That means that they are allowed to explore God’s creation and, according to Genesis 2:15, make use of it in a responsible and sustainable way. Thus a cultural climate was created that greatly enhanced the development of the&nbsp;humanities&nbsp;and the&nbsp;sciences.&nbsp;Another consequence of the Protestant understanding of man is that the believers, in gratitude for their election and redemption in Christ, are to follow God’s commandments. Industry, frugality, calling, discipline, and a strong sense of responsibility are at the heart of their moral code.&nbsp;In particular, Calvin rejected luxury. Therefore, craftsmen, industrialists, and other businessmen were able to reinvest the greater part of their profits in the most efficient machinery and the most modern production methods that were based on progress in the sciences and technology. As a result, productivity grew, which led to increased profits and enabled employers to pay higher wages. In this way, the economy, the sciences, and technology reinforced each other. The chance to participate in the economic success of technological inventions was a strong incentive to both inventors and investors.&nbsp;The&nbsp;Protestant work ethic&nbsp;was an important force behind the unplanned and uncoordinated&nbsp;mass action&nbsp;that influenced the development of capitalism and the&nbsp;industrial revolution. This idea is also known as the&nbsp;“Protestant ethic thesis”.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Episcopalians and Presbyterians tend to be considerably wealthier and better educated (having more graduate and post-graduate degrees per capita) than most other religious groups in America, and are disproportionately represented in the upper reaches of American business, law and politics, especially the Republican Party. Large numbers of the most wealthy and affluent American families as the Vanderbilts and Astors, Rockefeller, Du Pont, Roosevelt, Forbes, Whitneys, the Morgans and Harrimans are Mainline Protestant families.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><h2 class="fittexted_for_content_h2" data-dcnode-id="1566" style="font-size: 38.25px;"><span class="ez-toc-section" data-dcnode-id="1571" id="social_justice_care-giving_and_the_hospital_system"></span><span data-dcnode-id="1570" id="Social_justice.2C_care-giving.2C_and_the_hospital_system"></span><span class="mw-headline" data-dcnode-id="1568" id="Social_justice,_care-giving,_and_the_hospital_system"><span data-dcnode-id="1569" instrument_node="">Social justice, care-giving, and the hospital system</span></span><span class="ez-toc-section-end" data-dcnode-id="1567"></span></h2><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1564" instrument_node="">Main article:&nbsp;</span><a data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_social_teaching" target="_blank" title="Catholic social teaching"><span data-dcnode-id="1563" instrument_node="">Catholic social teaching</span></a></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1559" instrument_node="">The </span><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D76471"><strong data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Catholic Church</span></strong></a><span data-dcnode-id="1555" instrument_node=""> has contributed to society through its social doctrine which has guided leaders to promote social justice and providing care to the sick and poor. In orations such as his&nbsp;</span><i data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Sermon on the Mount</span></i><span data-dcnode-id="1552" instrument_node="">&nbsp;and stories such as&nbsp;</span><i data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">The Good Samaritan</span></i><span data-dcnode-id="1549" instrument_node="">, Jesus called on followers to worship God, act without violence or prejudice and care for the sick, hungry and poor. Such teachings are the foundation of Catholic Church involvement in&nbsp;social justice, hospitals and health care.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1542" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1546" id="fourth_century"></span><span class="mw-headline" data-dcnode-id="1544" id="Fourth_century"><span data-dcnode-id="1545" instrument_node="">Fourth century</span></span><span class="ez-toc-section-end" data-dcnode-id="1543"></span></h3><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Historians record that, prior to Christianity, the ancient world left little trace of any organized charitable effort.&nbsp;Christian charity and the practice of feeding and clothing the poor, visiting prisoners, supporting widows and orphan children has had sweeping impact.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Albert Jonsen, University of Washington historian of medicine, says “the second great sweep of medical history begins at the end of the fourth century, with the founding of the first Christian hospital at Caesarea in Cappadocia, and concludes at the end of the fourteenth century, with medicine well ensconced in the universities and in the public life of the emerging nations of Europe.”&nbsp;After the death of Eusebios in 370 and the election of Basil as bishop of Caesarea, Basil established the first formal soup kitchen, hospital, homeless shelter, hospice, poorhouse, orphanage, reform center for thieves, women’s center for those leaving prostitution and many other ministries. Basil was personally involved and invested in the projects and process giving all of his personal wealth to fund the ministries. Basil himself would put on an apron and work in the soup kitchen. These ministries were given freely regardless of religious affiliation. Basil refused to make any discrimination when it came to people who needed help saying that “the digestive systems of the Jew and the Christian are indistinguishable.”&nbsp;“…there is a striking resemblance between [Basil’s] ideals and those of modern times. …certainly he was the most modern among the pioneers of monasticism, and for this reason, if for none other, his work has a permanent interest…”</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Charity has now become a universal practice.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1527" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1531" id="medieval_period-2"></span><span class="mw-headline" data-dcnode-id="1529" id="Medieval_period_2"><span data-dcnode-id="1530" instrument_node="">Medieval period</span></span><span class="ez-toc-section-end" data-dcnode-id="1528"></span></h3><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1525" instrument_node="">The </span><strong data-dcnode-id="1522"><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D76471"><span data-dcnode-id="1524" instrument_node="">Catholic Church</span></a></strong><span data-dcnode-id="1521" instrument_node=""> established a hospital system in Medieval Europe that was different from the merely reciprocal hospitality of the Greeks and family-based obligations of the Romans. These hospitals were established to cater to “particular social groups marginalized by poverty, sickness, and age”, according to historian of hospitals, Guenter Risse.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">The&nbsp;Fugger&nbsp;Family from Augsburg, Germany who were bankers, 500 years ago founded one of the first social housing projects in the world, which exists till today.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1511" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1515" id="industrial_revolution"></span><span class="mw-headline" data-dcnode-id="1513" id="Industrial_Revolution"><span data-dcnode-id="1514" instrument_node="">Industrial Revolution</span></span><span class="ez-toc-section-end" data-dcnode-id="1512"></span></h3><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1509" instrument_node="">Further information:&nbsp;</span><strong data-dcnode-id="1506"><a data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D78552" title="Liberation theology"><span data-dcnode-id="1508" instrument_node="">Liberation theology</span></a></strong></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1503" instrument_node="">The&nbsp;</span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_Revolution" target="_blank" title="Industrial Revolution"><span data-dcnode-id="1502" instrument_node="">Industrial Revolution</span></a><span data-dcnode-id="1500" instrument_node="">&nbsp;brought many concerns about the deteriorating working and living conditions of urban workers. Influenced by the German Bishop&nbsp;Wilhelm Emmanuel Freiherr von Ketteler, in 1891&nbsp;Pope Leo XIII&nbsp;published the encyclical&nbsp;</span><i data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Rerum novarum</span></i><span data-dcnode-id="1497" instrument_node="">, which set in context&nbsp;Catholic social teaching&nbsp;in terms that rejected socialism but advocated the regulation of working conditions.&nbsp;</span><i data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Rerum Novarum</span></i><span data-dcnode-id="1494" instrument_node="">&nbsp;argued for the establishment of a living wage and the right of workers to form trade unions.</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1485"><i data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Quadragesimo anno</span></i><span data-dcnode-id="1489" instrument_node="">&nbsp;was issued by&nbsp;Pope Pius XI, on 15 May 1931, 40 years after&nbsp;</span><i data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Rerum novarum</span></i><span data-dcnode-id="1486" instrument_node="">. Unlike Leo, who addressed mainly the condition of workers, Pius XI concentrated on the ethical implications of the social and economic order. He called for the reconstruction of the social order based on the principle of&nbsp;solidarity&nbsp;and&nbsp;subsidiarity.&nbsp;He noted major dangers for human freedom and dignity, arising from unrestrained capitalism and totalitarian communism.</span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">The social teachings of Pope Pius XII repeat these teachings, and apply them in greater detail not only to workers and owners of capital, but also to other professions such as politicians, educators, house-wives, farmers bookkeepers, international organizations, and all aspects of life including the military. Going beyond Pius XI, he also defined social teachings in the areas of medicine, psychology, sport, TV, science, law and education. Pius XII was called “the Pope of Technology” for his willingness and ability to examine the social implications of technological advances. The dominant concern was the continued rights and dignity of the individual. With the beginning of the space age at the end of his pontificate, Pius XII explored the social implications of space exploration and satellites on the social fabric of humanity asking for a new sense of community and solidarity in light of existing papal teachings on subsidiarity.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">The Methodist Church, among other Christian denominations, was responsible for the establishment of hospitals, universities, orphanages, soup kitchens, and schools to follow Jesus’s command to spread the Good News and serve all people. In Western nations, governments have increasingly taken up funding and organisation of health services for the poor but the Church still maintains a massive network of health care providers across the world. In the West, these institutions are increasingly run by lay-people after centuries of being run by priests, nuns and brothers, In 2009, Catholic hospitals in the US received approximately one of every six patients, according to the Catholic Health Association. Catholic Health Australia is the largest non-government provider grouping of health, community and aged care services, representing about 10% of the health sector. In 1968, nuns or priests were the chief executives of 770 of America’s 796 Catholic hospitals. By 2011, they presided over 8 of 636 hospitals.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">As with schooling, women have played a vital role in running and staffing Christian care institutions&nbsp;– in Methodist hospitals,&nbsp;deaconesses&nbsp;who trained as nurses staffed the hospitals,&nbsp;and in Catholic hospitals, through religious institutes like the&nbsp;Sisters of Mercy,&nbsp;Little Sisters of the Poor&nbsp;and&nbsp;Sisters of St. Mary&nbsp;– and teaching and nursing have been seen as “women’s vocations”. Seeking to define the role played by&nbsp;religious&nbsp;in hospitals through American history, the New York Times noted that nuns were trained to “see Jesus in the face of every patient” and that:</span></p><span data-dcnode-id="1475" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="1472"><p class="font-effect-shadow-soft" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Although their influence is often described as intangible, the nuns kept their hospitals focused on serving the needy and brought a spiritual reassurance that healing would prevail over profit, authorities on Catholic health care say.</span></p></blockquote><span data-dcnode-id="1471" instrument_node="">

</span><p data-dcnode-id="1356"><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/missionary/"><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Missionary</span></strong></a><span data-dcnode-id="1357" instrument_node=""> activity for the Catholic Church has always incorporated education of evangelized peoples as part of its social ministry. History shows that in evangelized lands, the first people to operate schools were Roman Catholics. In some countries, the Church is the main provider of education or significantly supplements government forms of education. Presently, the Church operates the world’s largest non-governmental school system.&nbsp;Many of Western Civilization’s most influential universities were founded by the Catholic Church.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">A Pew Center study about religion and education around the world in 2016, found that Christians ranked as the second most educated religious group around in the world after Jews with an average of 9.3 years of schooling, and the highest of years of schooling among Christians found in Germany (13.6), New Zealand (13.5) and Estonia (13.1). Christians were also found to have the second highest number of graduate and post-graduate degrees per capita while in absolute numbers ranked in the first place (220 million). Between the various Christian communities, Singapore outranks other nations in terms of Christians who obtain a university degree in institutions of higher education (67%), followed by the Christians of Israel (63%), and the Christians of Georgia (57%). According to the study, Christians in North America, Europe, Middle East, North Africa and Asia-Pacific regions are highly educated since many of the world universities were built by the historic Christian Churches, in addition to the historical evidence that “Christian monks built libraries and, in the days before printing presses, preserved important earlier writings produced in Latin, Greek and Arabic”. According to the same study, Christians have a significant amount of gender equality in educational attainment, and the study suggests that one of the reasons is the encouragement of the Protestant Reformers in promoting the education of women, which led to the eradication of illiteracy among females in Protestant communities. According to the same study “there is a large and pervasive gap in educational attainment between Muslims and Christians in sub-Saharan Africa” as Muslim adults in this region are far less educated than their Christian counterparts, with scholars suggesting that this gap is due to the educational facilities that were created by Christian missionaries during the colonial era for fellow believers.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1347" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1351" id="europe"></span><span class="mw-headline" data-dcnode-id="1349" id="Europe"><span data-dcnode-id="1350" instrument_node="">Europe</span></span><span class="ez-toc-section-end" data-dcnode-id="1348"></span></h3><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">The Catholic Church founded the West’s first universities, which were preceded by the schools attached to monasteries and cathedrals, and generally staffed by monks and friars.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1342" instrument_node="">In 530,&nbsp;Saint Benedict&nbsp;wrote his&nbsp;</span><i data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">monastic Rule</span></i><span data-dcnode-id="1339" instrument_node="">, which became a blueprint for the organization of&nbsp;monasteries&nbsp;throughout Europe.&nbsp;The new monasteries preserved classical craft and artistic skills while maintaining intellectual culture within their schools,&nbsp;scriptoria&nbsp;and libraries. As well as providing a focus for spiritual life, they functioned as agricultural, economic and production centers, particularly in remote regions, becoming major conduits of civilization.</span></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">The&nbsp;Cluniac reform&nbsp;of monasteries that had begun in 910 sparked widespread monastic growth and renewal.&nbsp;Monasteries introduced new technologies and crops, fostered the creation and preservation of literature and promoted economic growth. Monasteries, convents and cathedrals still operated virtually all schools and libraries.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Cathedral schools&nbsp;began in the Early Middle Ages as centers of advanced education, some of them ultimately evolving into&nbsp;medieval universities. During the High Middle Ages,&nbsp;Chartres Cathedral&nbsp;operated the famous and influential&nbsp;Chartres Cathedral School.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Universities began springing up in Italian towns like&nbsp;Salerno, which became a leading medical school, translating the work of Greek and Arabic physicians into Latin.&nbsp;Bologna University&nbsp;became the most influential of the early universities, which first specialised in&nbsp;canon law&nbsp;and&nbsp;civil law.&nbsp;Paris University, specialising in such topics as theology, came to rival Bologna under the supervision of&nbsp;Notre Dame Cathedral.&nbsp;Oxford University&nbsp;in England later came to rival Paris in Theology and&nbsp;Salamanca University&nbsp;was founded in Spain in 1243. According to the historian&nbsp;Geoffrey Blainey, the universities benefited from the use of Latin, the common language of the Church, and its internationalist reach, and their role was to “teach, argue and reason within a Christian framework”.&nbsp;The medieval universities of Western Christendom were well-integrated across all of Western Europe, encouraged freedom of enquiry and produced a great variety of fine scholars and natural philosophers, including&nbsp;Robert Grosseteste&nbsp;of the&nbsp;University of Oxford, an early expositor of a systematic method of scientific experimentation;&nbsp;and Saint&nbsp;Albert the Great, a pioneer of biological field research</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1327" instrument_node="">In the 13th century, mendicant orders were founded by Francis of Assisi and Dominic de Guzmán which brought consecrated religious life into urban settings. These orders also played a large role in the development of cathedral schools into universities, the direct ancestors of the modern Western institutions. Notable scholastic theologians such as the Dominican Thomas Aquinas worked at these universities, his </span><i data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Summa Theologica</span></i><span data-dcnode-id="1324" instrument_node="">&nbsp;was a key intellectual achievement in its synthesis of&nbsp;Aristotelian&nbsp;thought and Christianity.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">The university reached central Europe by the 14th century, with the foundation of institutions like Prague University and Cracow University.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">The Spaniard&nbsp;St Ignatius Loyola&nbsp;founded the&nbsp;Society of Jesus&nbsp;(Jesuits) in 1540. Initially a missionary order, the Jesuits took Western learning and the Catholic faith to India, Japan, China, Canada, Central and South America and Australia.&nbsp;The order became increasingly involved in education, founding schools, colleges and universities across the globe and&nbsp;educating such notable Western scholars, intellectuals, artists and statesmen&nbsp;as&nbsp;René Descartes,&nbsp;Matteo Ricci,&nbsp;Voltaire,&nbsp;Pierre de Coubertin,&nbsp;Sir Arthur Conan Doyle,&nbsp;James Joyce,&nbsp;Alfred Hitchcock,&nbsp;Bing Crosby,&nbsp;Robert Hughes&nbsp;and&nbsp;Bill Clinton.</span></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">According to the historian&nbsp;Geoffrey Blainey, the university became a hallmark of Christian Civilisation, though, he writes, “in the most recent century perhaps no institution has done more to promote an alternative or secular view of the world”.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1308" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1312" id="latin_america-2"></span><span class="mw-headline" data-dcnode-id="1310" id="Latin_America_2"><span data-dcnode-id="1311" instrument_node="">Latin America</span></span><span class="ez-toc-section-end" data-dcnode-id="1309"></span></h3><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Education in Latin American began under the direction of missionaries who were sponsored by the Spanish crown. Royal policy stipulated that the Amerindians had to accept missionaries but they did not have to convert. Indians who agreed to listen to the missionaries were not subjected to work for&nbsp;encomenderos&nbsp;some of whom were notorious for brutal conditions.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1299" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1303" id="north_america"></span><span class="mw-headline" data-dcnode-id="1301" id="North_America"><span data-dcnode-id="1302" instrument_node="">North America</span></span><span class="ez-toc-section-end" data-dcnode-id="1300"></span></h3><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">A number of Catholic universities, schools and colleges have been formed in the United States. The religious tolerance established by the American Revolution enabled the Catholic clergy of Maryland to found Georgetown University, America’s oldest Catholic university, in 1789 and it became a Jesuit institution in 1805. Saint Katharine Drexel inherited a fortune and established the Sisters of the Blessed Sacrament for Indians and Colored People (now known as the Sisters of the Blessed Sacrament), founded schools across America and started Xavier University of Louisiana in New Orleans in 1925 for the education of African Americans.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1290" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1294" id="australasia"></span><span class="mw-headline" data-dcnode-id="1292" id="Australasia"><span data-dcnode-id="1293" instrument_node="">Australasia</span></span><span class="ez-toc-section-end" data-dcnode-id="1291"></span></h3><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">From 19th-century foundations, the Catholic education system in Australia&nbsp;has grown to be the second biggest sector after government schools with around 21 per cent of all secondary school enrolments.&nbsp;The Church has established primary, secondary and tertiary educational institutions. St&nbsp;Mary MacKillop&nbsp;was a 19th-century Australian nun who founded an educational religious institute, the&nbsp;Sisters of St Joseph of the Sacred Heart, and in 2010 became the first Australian to be canonised as a saint.&nbsp;Catholic education is also significant in neighbouring South Pacific nations: 11% of New Zealand students attend Catholic schools.</span></p><span data-dcnode-id="1286" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1281" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1285" id="africa-2"></span><span class="mw-headline" data-dcnode-id="1283" id="Africa_2"><span data-dcnode-id="1284" instrument_node="">Africa</span></span><span class="ez-toc-section-end" data-dcnode-id="1282"></span></h3><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">By the close of the 19th century, European powers had managed to gain control of most of the African interior. The new rulers introduced cash-based economies which created an enormous demand for literacy and a western education—a demand which for most Africans could only be satisfied by Christian missionaries. Catholic missionaries followed colonial governments into Africa, and built schools, hospitals, monasteries and churches.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">With a high number of adult baptisms, the Church is growing faster in Africa than anywhere else. It also operates a greater number of Catholic schools per parish here (3:1) than in other areas of the world.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">According to&nbsp;Heather Sharkey, the real impact of the activities of the missionaries is still a topic open to debate in academia today.&nbsp;Sharkey asserted that “the missionaries played manifold roles in colonial Africa and stimulated forms of cultural, political and religious change.” “Historians still debate the nature of their impact and question their relation to the system of European colonialism in the continent.” She noted that the missionaries did great good in Africa, providing crucial social services such as modern education and health care that would have otherwise not been available. Sharkey said that, in societies that were traditionally male-dominated, female missionaries provided women in Africa with health care knowledge and basic education.&nbsp;A&nbsp;Pew Center&nbsp;study about&nbsp;religion and education&nbsp;around the world in 2016, found that “there is a large and pervasive gap in educational attainment between Muslims and Christians in sub-Saharan Africa” as&nbsp;Muslim&nbsp;adults in this region are far less educated than their&nbsp;Christian&nbsp;counterparts,&nbsp;with scholars suggesting that this gap is due to the educational facilities that were created by&nbsp;Christian missionaries&nbsp;during the colonial era for fellow believers.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1266" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1270" id="asia"></span><span class="mw-headline" data-dcnode-id="1268" id="Asia"><span data-dcnode-id="1269" instrument_node="">Asia</span></span><span class="ez-toc-section-end" data-dcnode-id="1267"></span></h3><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">In India, over 25,000 schools and colleges are operated by the Church.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><h3 class="fittexted_for_content_h3" data-dcnode-id="1257" style="font-size: 31.5px;"><span class="ez-toc-section" data-dcnode-id="1261" id="protestant_role_in_education"></span><span class="mw-headline" data-dcnode-id="1259" id="Protestant_role_in_education"><span data-dcnode-id="1260" instrument_node="">Protestant role in education</span></span><span class="ez-toc-section-end" data-dcnode-id="1258"></span></h3><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">As the Reformers wanted all members of the church to be able to read the Bible, education on all levels got a strong boost. Compulsory education for both boys and girls was introduced. For example, the Puritans who established Massachusetts Bay Colony in 1628 founded Harvard College only eight years later. Seven of the first nine of what are called colonial colleges were founded by Christians, including Columbia University, Brown University, Rutgers University and Yale University (1701); a nineteenth-century book on “Colleges in America” says, “Eighty three percent of the colleges in [the U.S.] were founded by Christian philanthropy.”&nbsp;Pennsylvania&nbsp;also became a centre of learning as one of the colleges not specifically Christian.&nbsp;Princeton University&nbsp;was a&nbsp;Presbyterian&nbsp;foundation.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">A large number of&nbsp;mainline Protestants&nbsp;have played leadership roles in many aspects of American life, including politics, business, science, the arts, and education. They founded most of the country’s leading institutes of higher education.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><dl data-dcnode-id="1245"><span data-dcnode-id="1249" instrument_node="">
</span><dd data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">The private schools and colleges established by the mainline Protestant denominations, as a rule, still want to be known as places that foster values, but few will go so far as to identify those values as Christian…. Overall, the distinctiveness of mainline Protestant identity has largely dissolved since the 1960s.</span></dd><span data-dcnode-id="1246" instrument_node="">
</span></dl><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Protestantism also initiated translations of the Bible into national languages and thereby supported the development of national literatures.&nbsp;Episcopalians&nbsp;and&nbsp;Presbyterians&nbsp;tend to be considerably wealthier and better educated than most other religious groups.</span></p><span data-dcnode-id="1241" instrument_node="">
</span><h2 class="fittexted_for_content_h2" data-dcnode-id="1236" style="font-size: 38.25px;"><span class="ez-toc-section" data-dcnode-id="1240" id="cleanliness"></span><span class="mw-headline" data-dcnode-id="1238" id="Cleanliness"><span data-dcnode-id="1239" instrument_node="">Cleanliness</span></span><span class="ez-toc-section-end" data-dcnode-id="1237"></span></h2><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1234" instrument_node="">Main articles:&nbsp;</span><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ablution_in_Christianity" target="_blank" title="Ablution in Christianity"><span data-dcnode-id="1233" instrument_node="">Ablution in Christianity</span></a><span data-dcnode-id="1231" instrument_node="">,&nbsp;</span><a data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hygiene_in_Christianity" target="_blank" title="Hygiene in Christianity"><span data-dcnode-id="1230" instrument_node="">Hygiene in Christianity</span></a><span data-dcnode-id="1228" instrument_node="">, and&nbsp;</span><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cantharus_%28Christianity%29" target="_blank" title="Cantharus (Christianity)"><span data-dcnode-id="1227" instrument_node="">Cantharus (Christianity)</span></a><br data-dcnode-id="1225"><span data-dcnode-id="1224" instrument_node="">
See also: </span><strong data-dcnode-id="1221"><a aria-label="“Ritual Purification” (Edit)" class="row-title" data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/%3Fp%3D82076"><span data-dcnode-id="1223" instrument_node="">Ritual Purification</span></a></strong></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1218" instrument_node="">The </span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slife.org/the-bible/"><strong data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Bible</span></strong></a><span data-dcnode-id="1214" instrument_node=""> has many rituals of purification relating to menstruation, childbirth, sexual relations, nocturnal emission, unusual bodily fluids, skin disease, death, and animal sacrifices. The Ethiopian Orthodox Tewahedo Church prescribes several kinds of hand washing for example after leaving the latrine, lavatory or bathhouse, or before prayer, or after eating a meal. The women in the Ethiopian Orthodox Tewahedo Church are prohibited from entering the church temple during menses; and the men do not enter a church the day after they have had intercourse with their wives.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Christianity has always placed a strong&nbsp;emphasis on hygiene,&nbsp;Despite the denunciation of the&nbsp;mixed bathing&nbsp;style of Roman pools by&nbsp;early Christian&nbsp;clergy, as well as the pagan custom of women naked bathing in front of men, this did not stop the Church from urging its followers to go to public baths for bathing,&nbsp;which contributed to hygiene and good health according to the&nbsp;Church Father,&nbsp;Clement of Alexandria. The Church also built&nbsp;public bathing&nbsp;facilities that were separate for both sexes near&nbsp;monasteries&nbsp;and pilgrimage sites; also, the&nbsp;popes&nbsp;situated baths within church&nbsp;basilicas&nbsp;and monasteries since the early Middle Ages.&nbsp;Pope&nbsp;Gregory the Great&nbsp;urged his followers on value of&nbsp;bathing&nbsp;as a bodily need.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1208" instrument_node="">Great&nbsp;bathhouses&nbsp;were built in&nbsp;Byzantine centers&nbsp;such as&nbsp;Constantinople&nbsp;and&nbsp;Antioch,&nbsp;and the&nbsp;popes&nbsp;allocated to the Romans bathing through&nbsp;</span><i data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">diaconia</span></i><span data-dcnode-id="1205" instrument_node="">, or private&nbsp;Lateran&nbsp;baths, or even a myriad of monastic&nbsp;bath houses&nbsp;functioning in eighth and ninth centuries.&nbsp;The&nbsp;Popes&nbsp;maintained their baths in their residences, and&nbsp;bath houses&nbsp;including hot baths incorporated into Christian Church buildings or those of monasteries, which known as “charity baths” because they served both the clerics and needy poor people.&nbsp;Public bathing&nbsp;were common in medivail&nbsp;Christendom&nbsp;larger towns and cities such as&nbsp;Paris,&nbsp;Regensburg&nbsp;and&nbsp;Naples.&nbsp;Catholic religious orders of the&nbsp;Augustinians’ and&nbsp;Benedictines’ rules contained&nbsp;ritual purification,&nbsp;and inspired by&nbsp;Benedict of Nursia&nbsp;encouragement for the practice of therapeutic bathing;&nbsp;Benedictine&nbsp;monks played a role in the development and promotion of&nbsp;spas.&nbsp;Protestant Christianity&nbsp;also played a prominent role in the development of the British&nbsp;spas.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Contrary to popular belief&nbsp;bathing&nbsp;and&nbsp;sanitation&nbsp;were not lost in Europe with the collapse of the&nbsp;Roman Empire. Soapmaking first became an established trade during the so-called “Dark Ages”. The Romans used scented oils (mostly from Egypt), among other alternatives. By the 15th century, the manufacture of soap in the Christendom had become virtually industrialized, with sources in Antwerp, Castile, Marseille, Naples and Venice.&nbsp;By the mid-19th century, the English urbanised middle classes had formed an ideology of cleanliness that ranked alongside typical&nbsp;Victorian&nbsp;concepts, such as Christianity, respectability and&nbsp;social progress.&nbsp;The Salvation Army&nbsp;has adopted the deployment of&nbsp;personal hygiene,&nbsp;and by providing&nbsp;personal hygiene&nbsp;products, such as a&nbsp;toothbrush,&nbsp;toothpaste, and&nbsp;soap.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">The&nbsp;use of water&nbsp;in many&nbsp;Christian countries&nbsp;is due in part to the Biblical toilet etiquette which encourages washing after all instances of defecation.&nbsp;The&nbsp;bidet&nbsp;is common in predominantly&nbsp;Catholic countries&nbsp;where water is considered essential for&nbsp;anal cleansing,&nbsp;and in some traditionally&nbsp;Orthodox&nbsp;and&nbsp;Protestant countries&nbsp;such as&nbsp;Greece&nbsp;and&nbsp;Finland&nbsp;respectively, where&nbsp;bidet showers&nbsp;are common.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><h2 class="fittexted_for_content_h2" data-dcnode-id="1192" style="font-size: 38.25px;"><span class="ez-toc-section" data-dcnode-id="1196" id="see_also"></span><span class="mw-headline" data-dcnode-id="1194" id="See_also"><span data-dcnode-id="1195" instrument_node="">See also</span></span><span class="ez-toc-section-end" data-dcnode-id="1193"></span></h2><span data-dcnode-id="1191" instrument_node="">
