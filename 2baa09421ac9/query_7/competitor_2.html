</span><p align="justify" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">

</span><p align="justify" data-dcnode-id="671"><span data-dcnode-id="676" instrument_node="">However, as we see in Isaiah 14:12-14, Lucifer rebelled against

</span><p align="justify" data-dcnode-id="485"><font color="#000000" data-dcnode-id="486"><span data-dcnode-id="492" instrument_node="">Jesus is seen taking back the Title Deed

</span><p align="justify" data-dcnode-id="475"><span data-dcnode-id="483" instrument_node="">Up until this moment in world history [Revelation 11:15], Jesus

</span></p><span data-dcnode-id="474" instrument_node="">
</span><p align="justify" data-dcnode-id="467"><span data-dcnode-id="473" instrument_node=""> </span><font color="#000000" data-dcnode-id="468"><span data-dcnode-id="472" instrument_node="">To reiterate, this passage in Job 1:6-7

</span><p align="justify" data-dcnode-id="459"><font color="#000000" data-dcnode-id="460"><span data-dcnode-id="465" instrument_node="">Since Satan is the ruler of this world, God allows him a

Since the unbeliever -- the unsaved -- is in rebellion against God, and is 
</span><strong data-dcnode-id="462"><em data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">outside </span></em></strong><span data-dcnode-id="461" instrument_node="">               
              
            
            
         God's protection, he is susceptible

</span><strong data-dcnode-id="450"><font color="#ff0000" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">taken captive by him at his will</span></font></strong><span data-dcnode-id="449" instrument_node=""> ." [2 Timothy 2:

</span><p align="center" data-dcnode-id="442"><font color="#ff0000" data-dcnode-id="443"><strong data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">CONFLICT IN THE HEAVENLIES FOR THE

</span><p align="justify" data-dcnode-id="438"><font color="#000000" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node=""> In Daniel 10, God gives us a

</span><p align="justify" data-dcnode-id="434"><font color="#000000" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Let us summarize the events of this chapter.&nbsp; 
  In the third year of the Persian dictator, King Cyrus, Daniel began to fast

</span><p align="justify" data-dcnode-id="430"><font color="#000000" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">We see in verse 2 that Daniel continued 
this fast for three weeks, patiently waiting for God's answer.&nbsp; Suddenly,

back on his feet.&nbsp; Then, the angel revealed an incredible story.&nbsp; Let 
us pick up the Biblical account here.</span></font></p><span data-dcnode-id="429" instrument_node="">
</span><blockquote data-dcnode-id="423"><span data-dcnode-id="428" instrument_node="">
</span><p align="justify" data-dcnode-id="425"><font color="#000000" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">"Then he [angel] said to me [Daniel]:&nbsp; 
    'Fear not, Daniel, for from the first day that you set your mind and heart 
    to understand and to humble yourself before your God, your words were heard, 
    and I have come as a consequence ... of your words.&nbsp;"</span></font></p><span data-dcnode-id="424" instrument_node="">
</span></blockquote><span data-dcnode-id="422" instrument_node="">
</span><p align="justify" data-dcnode-id="417"><font color="#000000" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node=""> Daniel must have been amazed at 
this story.&nbsp; If God given His answer on the very first day of Daniel's 
prayer, and </span></font><font color="#000000" data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">had informed this angel to deliver His answer 
to Daniel, why had it taken three weeks for the angel to get to earth?&nbsp; 
Daniel was undoubtedly aware that&nbsp;an angel can go from Heaven to 
earth&nbsp;instantaneously; therefore, why did Daniel have to wait for three whole 
weeks?&nbsp; The angel answered this question, and its impact on our lives will 
continue until the day we see Jesus Christ!&nbsp; The implications of the

</span><blockquote data-dcnode-id="407"><span data-dcnode-id="415" instrument_node="">
</span><p align="justify" data-dcnode-id="409"><font color="#000000" data-dcnode-id="410"><span data-dcnode-id="414" instrument_node="">"Do you know why I have come to you?&nbsp; 
    And now I will return to fight with the hostile prince of Persia; and when

    Bible, KJV/Amplified Bible Commentary</span></a><span data-dcnode-id="411" instrument_node="">]</span></font></p><span data-dcnode-id="408" instrument_node="">
</span></blockquote><span data-dcnode-id="406" instrument_node="">
</span><p align="justify" data-dcnode-id="403"><font color="#000000" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">This Scripture reveals that a battle between God's holy 
angels and Satan's demonic host is constantly occurring for the hearts and minds 
of the human rulers of the nations of the world.&nbsp; In this instance, Godly 
angels and Satan's demons were battling for control of the mind and heart of the 
King of Persia, who at the time of Daniel was Cyrus [Verse 1].&nbsp; However, 
every King of Persia would have such a battle over his heart and mind, and every 
King of Greece would have such a battle.&nbsp; In other words, the demonic host 
was battling holy angels in order to control the mind and heart of the human 
king so that he would take actions that would benefit Satan and thwart God's 
Plan.&nbsp; While God has the power at all times and in every instance to defeat 
the plans of the demonic host, He does not act in every instance to do so.&nbsp; 
In God's Omnipotence, He sometimes allows the demonic host to influence the 
earthly king to take actions that seem to further Satan's agenda.&nbsp; Of 
course, God's Plan will ultimately prevail; but in countless instances 
throughout history, God has allowed the demonic host to seemingly 
prevail.</span></font></p><span data-dcnode-id="402" instrument_node="">
</span><p align="justify" data-dcnode-id="399"><font color="#000000" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">We 
must understand from this passage that such a battle over the heart and mind of

taught that Satan has assigned specific demons to stand at the side of every

of human history, including the United States of America.</span></font></p><span data-dcnode-id="398" instrument_node="">
</span><p align="left" data-dcnode-id="395"><font color="#000000" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node=""> Please keep this fact in mind.</span></font></p><span data-dcnode-id="394" instrument_node="">
</span><p align="center" data-dcnode-id="385"><font color="#000000" data-dcnode-id="389"><br data-dcnode-id="393"><span data-dcnode-id="392" instrument_node="">
</span><br data-dcnode-id="391"><span data-dcnode-id="390" instrument_node="">
</span></font><font color="#ff0000" data-dcnode-id="386"><strong data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">DEMONIC BEINGS MANIFESTING THEMSELVES IN

</span><p align="justify" data-dcnode-id="381"><font color="#000000" data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">We

</span><p align="justify" data-dcnode-id="377"><font color="#000000" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">However, can ungodly demons manifest themselves

</span><p align="center" data-dcnode-id="372"><font color="#ff0000" data-dcnode-id="373"><strong data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">KING SAUL AND THE WITCH AT ENDOR --&nbsp;1

</span><p align="justify" data-dcnode-id="368"><font color="#000000" data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">The 
beginning of this sad tale starts at verse 3:&nbsp; "Now Samuel was dead ... and 
buried in Ramah ..."</span></font></p><span data-dcnode-id="367" instrument_node="">
</span><p align="justify" data-dcnode-id="364"><font color="#000000" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">When King Saul needed spiritual advice, or 
  a specific answer from God, he was supposed to go to the prophet, Samuel.&nbsp; 
  However, the Bible records that Saul never sought&nbsp;Samuel's advice and counsel.&nbsp; 
  Now that Samuel was dead, and now that King Saul knew David was going to be 
  the new King, Saul paniced when faced with an imminent attack from the Philistines.&nbsp; 
  On the day before the battle, King Saul asked his servants where he can find 
  supernatural help.&nbsp; Let us pick up this story in verse 7:</span></font></p><span data-dcnode-id="363" instrument_node="">
</span><blockquote data-dcnode-id="353"><span data-dcnode-id="362" instrument_node="">
</span><p align="justify" data-dcnode-id="355"><font color="#000000" data-dcnode-id="356"><span data-dcnode-id="361" instrument_node="">"Then Saul said to his servants, 'Find 
    me a woman who is a medium between the living and the dead, that I may go 
    and inquire of her'." [</span><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cuttingedge.org/results.cfm%3Fkeywords%3Damplified" target="_blank"><strong data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Parallel 
    Bible, KJV/Amplified Bible Commentary</span></strong></a><span data-dcnode-id="357" instrument_node="">]</span></font></p><span data-dcnode-id="354" instrument_node="">
</span></blockquote><span data-dcnode-id="352" instrument_node="">
</span><p align="justify" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">That King Saul would even think of enlisting the aid of 
a witch -- a medium -- for spiritual advice is shocking because he had vigorously 
rooted out witches from Israel, as the witch's response in verse 9 so 
indicates.&nbsp; God had ordered that&nbsp;no one in Israel&nbsp;consult 
mediums, witches, and sorcerers long before King Saul appeared on the scene 
[Deuteronomy 18:9-14].&nbsp; In fact, God commanded that all witches and those 
who practice sorcery be put to death, all the way back in Exodus fully 400 years 
before King Saul [New Analytical Bible, KJV, 1964, p. 1451].</span></p><span data-dcnode-id="349" instrument_node="">
</span><p align="justify" data-dcnode-id="343"><span data-dcnode-id="348" instrument_node="">To reiterate, the response of this Witch at Endor&nbsp; (2 Samuel 
  28:9),&nbsp;shows that King Saul had carried out God's commands regarding witches; 
  however, I find it very interesting that, even after a </span><strong data-dcnode-id="345"><em data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">vigorous 
  </span></em></strong><span data-dcnode-id="344" instrument_node=""> campaign against witches, King Saul's men knew exactly where 
  one was located!&nbsp; When Saul asked for a witch, they knew exactly where 
  she was living, and were able to take Saul to her.&nbsp; She must have been 
  a very powerful shaman to escape the scourge of King Saul, even though his advisors 
  knew exactly where she was located.&nbsp; The immediate response of his servants 
  tells the truth of the story:</span></p><span data-dcnode-id="342" instrument_node="">
</span><blockquote data-dcnode-id="337"><span data-dcnode-id="341" instrument_node="">
</span><p align="justify" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">"His servants said, 'Behold, there is a woman who is a medium 
    at Endor'." [Verse 7b]</span></p><span data-dcnode-id="338" instrument_node="">
</span></blockquote><span data-dcnode-id="336" instrument_node="">
</span><p align="justify" data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Once King Saul knew that a witch lived at 
Endor, he wasted no time going to her.</span></p><span data-dcnode-id="333" instrument_node="">
</span><blockquote data-dcnode-id="327"><span data-dcnode-id="332" instrument_node="">
