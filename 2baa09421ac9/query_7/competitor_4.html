</span><h2 data-dcnode-id="4087"><span class="mw-headline" data-dcnode-id="4095" id="Commercial_aspects"><span data-dcnode-id="4096" instrument_node="">Commercial aspects</span></span><span class="mw-editsection" data-dcnode-id="4088"><span class="mw-editsection-bracket" data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">[</span></span><a data-dcnode-id="4091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D58" title="Edit section: Commercial aspects"><span data-dcnode-id="4092" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4086" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4074"><div class="thumbinner" data-dcnode-id="4075" style="width:222px;"><a class="image" data-dcnode-id="4084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAn_Iranian_Persian_carpet_exhibition.jpg"><img alt="" class="thumbimage" data-dcnode-id="4085" data-file-height="533" data-file-width="746" decoding="async" height="157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/30/An_Iranian_Persian_carpet_exhibition.jpg/220px-An_Iranian_Persian_carpet_exhibition.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/30/An_Iranian_Persian_carpet_exhibition.jpg/330px-An_Iranian_Persian_carpet_exhibition.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/30/An_Iranian_Persian_carpet_exhibition.jpg/440px-An_Iranian_Persian_carpet_exhibition.jpg 2x" width="220"></a><span data-dcnode-id="4083" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4076"><div class="magnify" data-dcnode-id="4081"><a class="internal" data-dcnode-id="4082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAn_Iranian_Persian_carpet_exhibition.jpg" title="Enlarge"></a></div><span data-dcnode-id="4080" instrument_node="">An Iranian/Persian carpet exhibition in city of </span><a data-dcnode-id="4078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hamadan" title="Hamadan"><span data-dcnode-id="4079" instrument_node="">Hamadan</span></a><span data-dcnode-id="4077" instrument_node=""> in 2015.</span></div></div></div><span data-dcnode-id="4073" instrument_node="">
</span><p data-dcnode-id="4055"><span data-dcnode-id="4072" instrument_node="">Iran exported $517 million worth of hand-woven carpets in 2002. Iran's carpet exports amounted to US$635 million in 2004</span><sup class="noprint Inline-Template" data-dcnode-id="4065" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="4071" instrument_node="">[</span><i data-dcnode-id="4067"><a data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="4069" title="The text near this tag is dated. (August 2012)"><span data-dcnode-id="4070" instrument_node="">needs update</span></span></a></i><span data-dcnode-id="4066" instrument_node="">]</span></sup><span data-dcnode-id="4064" instrument_node="">, according to the figures from the state-owned Iran Carpet Company. In October 2006, National Iranian Carpet Center revealed that hand-woven carpets have ranked first in country's non-oil exports and hold the third position among overall exports. Nearly five million workers are engaged in the Iranian carpet industry, making it one of the biggest enterprises in the country</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4057" style="white-space:nowrap;"><span data-dcnode-id="4063" instrument_node="">[</span><i data-dcnode-id="4059"><a data-dcnode-id="4060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4061" title="This claim needs references to reliable sources. (March 2019)"><span data-dcnode-id="4062" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4058" instrument_node="">]</span></sup><span data-dcnode-id="4056" instrument_node="">.
</span></p><p data-dcnode-id="4046"><span data-dcnode-id="4054" instrument_node="">The absence of modern </span><a class="mw-redirect" data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/R%2526D" title="R&amp;D"><span data-dcnode-id="4053" instrument_node="">R&amp;D</span></a><span data-dcnode-id="4051" instrument_node=""> is causing rapid decline in the size as well as market value of this art.</span><sup class="reference" data-dcnode-id="4048" id="cite_ref-59"><a data-dcnode-id="4049" href="#cite_note-59"><span data-dcnode-id="4050" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4047" instrument_node="">
</span></p><p data-dcnode-id="4023"><span data-dcnode-id="4045" instrument_node="">In 2008, </span><a data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="4044" instrument_node="">Iran</span></a><span data-dcnode-id="4042" instrument_node="">’s exports of hand-woven carpets was $420 million or 30% of the world's market.</span><sup class="reference" data-dcnode-id="4039" id="cite_ref-60"><a data-dcnode-id="4040" href="#cite_note-60"><span data-dcnode-id="4041" instrument_node="">[60]</span></a></sup><sup class="reference" data-dcnode-id="4036" id="cite_ref-61"><a data-dcnode-id="4037" href="#cite_note-61"><span data-dcnode-id="4038" instrument_node="">[61]</span></a></sup><span data-dcnode-id="4035" instrument_node=""> Iran exports carpets to more than 100 countries, as hand-woven rugs are one of its main non-oil export items. The United States is the single largest importer of Persian hand woven carpets. In 2011, President Obama signed into law an act that greatly enhanced restrictions on Iranian-origin imports, causing the imports of Iranian carpets to be halted. After certain sanctions were lifted on </span><a data-dcnode-id="4033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joint_Comprehensive_Plan_of_Action%23Implementation_Day" title="Joint Comprehensive Plan of Action"><span data-dcnode-id="4034" instrument_node="">implementation day</span></a><span data-dcnode-id="4032" instrument_node=""> on January 16, 2016,  Iran's exports of carpets in the first quarter amounted to $60 million.</span><sup class="reference" data-dcnode-id="4029" id="cite_ref-62"><a data-dcnode-id="4030" href="#cite_note-62"><span data-dcnode-id="4031" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4028" instrument_node=""> In 2017, Iran exported $24.3 million worth of hand-woven carpets but was far from the top producer Turkey, which exported $1.77 billion worth of hand-woven carpets in the same year.</span><sup class="reference" data-dcnode-id="4025" id="cite_ref-63"><a data-dcnode-id="4026" href="#cite_note-63"><span data-dcnode-id="4027" instrument_node="">[63]</span></a></sup><span data-dcnode-id="4024" instrument_node="">
</span></p><span data-dcnode-id="4022" instrument_node="">
</span><h2 data-dcnode-id="4012"><span class="mw-headline" data-dcnode-id="4020" id="Trivia"><span data-dcnode-id="4021" instrument_node="">Trivia</span></span><span class="mw-editsection" data-dcnode-id="4013"><span class="mw-editsection-bracket" data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node="">[</span></span><a data-dcnode-id="4016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D59" title="Edit section: Trivia"><span data-dcnode-id="4017" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4011" instrument_node="">
</span><ul data-dcnode-id="3938"><li data-dcnode-id="4006"><span data-dcnode-id="4010" instrument_node="">The idiom "Persian flaw", meaning a deliberate mistake, is said to originate from the notion that Persian weavers would intentionally leave imperfections in each rug in the belief that only God's creations are perfect, and to weave a perfect rug would be an insult to God.</span><sup class="reference" data-dcnode-id="4007" id="cite_ref-64"><a data-dcnode-id="4008" href="#cite_note-64"><span data-dcnode-id="4009" instrument_node="">[64]</span></a></sup></li><span data-dcnode-id="4005" instrument_node="">
</span><li data-dcnode-id="3975"><span data-dcnode-id="4004" instrument_node="">The most famous Persian carpet is the </span><a data-dcnode-id="4002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ardabil_Carpet" title="Ardabil Carpet"><span data-dcnode-id="4003" instrument_node="">Ardabil Carpet</span></a><span data-dcnode-id="4001" instrument_node="">, in the </span><a data-dcnode-id="3999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victoria_and_Albert_Museum" title="Victoria and Albert Museum"><span data-dcnode-id="4000" instrument_node="">Victoria and Albert Museum</span></a><span data-dcnode-id="3998" instrument_node=""> in London, which in fact is now a combination of two original carpets, with another piece from the second in </span><a data-dcnode-id="3996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Los_Angeles" title="Los Angeles"><span data-dcnode-id="3997" instrument_node="">Los Angeles</span></a><span data-dcnode-id="3995" instrument_node="">.</span><sup class="reference" data-dcnode-id="3992" id="cite_ref-V&amp;A_Museum_65-0"><a data-dcnode-id="3993" href="#cite_note-V&amp;A_Museum-65"><span data-dcnode-id="3994" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3991" instrument_node=""> This has been the subject of endless copies ranging in size from small to full scale. There is an 'Ardabil' at </span><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/10_Downing_Street" title="10 Downing Street"><span data-dcnode-id="3990" instrument_node="">10 Downing Street</span></a><span data-dcnode-id="3988" instrument_node="">, and even </span><a class="mw-redirect" data-dcnode-id="3986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hitler" title="Hitler"><span data-dcnode-id="3987" instrument_node="">Hitler</span></a><span data-dcnode-id="3985" instrument_node=""> had an 'Ardabil' in his office in </span><a data-dcnode-id="3983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlin" title="Berlin"><span data-dcnode-id="3984" instrument_node="">Berlin</span></a><span data-dcnode-id="3982" instrument_node="">.</span><sup class="reference" data-dcnode-id="3979" id="cite_ref-V&amp;A_Museum_65-1"><a data-dcnode-id="3980" href="#cite_note-V&amp;A_Museum-65"><span data-dcnode-id="3981" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="3976" id="cite_ref-66"><a data-dcnode-id="3977" href="#cite_note-66"><span data-dcnode-id="3978" instrument_node="">[66]</span></a></sup></li><span data-dcnode-id="3974" instrument_node="">
</span><li data-dcnode-id="3969"><span data-dcnode-id="3973" instrument_node="">The most expensive carpet in the world is a 17th-century Persian vase style carpet, afshar collection which was sold in June 2013 in an London auction for $33.8m.</span><sup class="reference" data-dcnode-id="3970" id="cite_ref-67"><a data-dcnode-id="3971" href="#cite_note-67"><span data-dcnode-id="3972" instrument_node="">[67]</span></a></sup></li><span data-dcnode-id="3968" instrument_node="">
</span><li data-dcnode-id="3951"><span data-dcnode-id="3967" instrument_node="">The "Carpet of Wonder" in the </span><a data-dcnode-id="3965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sultan_Qaboos_Grand_Mosque" title="Sultan Qaboos Grand Mosque"><span data-dcnode-id="3966" instrument_node="">Sultan Qaboos Grand Mosque</span></a><span data-dcnode-id="3964" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="3962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muscat%2C_Oman" title="Muscat, Oman"><span data-dcnode-id="3963" instrument_node="">Muscat</span></a><span data-dcnode-id="3961" instrument_node="">, in the </span><a class="mw-redirect" data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sultanate_of_Oman" title="Sultanate of Oman"><span data-dcnode-id="3960" instrument_node="">Sultanate of Oman</span></a><span data-dcnode-id="3958" instrument_node="">, measures 4,343 square metres (46,750 </span><a data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Square_foot" title="Square foot"><span data-dcnode-id="3957" instrument_node="">square feet</span></a><span data-dcnode-id="3955" instrument_node="">). Its construction required four years of labour by 600 workers, resulting in 12 million man hours of work.</span><sup class="reference" data-dcnode-id="3952" id="cite_ref-68"><a data-dcnode-id="3953" href="#cite_note-68"><span data-dcnode-id="3954" instrument_node="">[68]</span></a></sup></li><span data-dcnode-id="3950" instrument_node="">
</span><li data-dcnode-id="3939"><span data-dcnode-id="3949" instrument_node="">Iran is also the maker of the largest handmade carpet in history, measuring 5,624.9 square metres (60,545.9 square feet).</span><sup class="reference" data-dcnode-id="3946" id="cite_ref-69"><a data-dcnode-id="3947" href="#cite_note-69"><span data-dcnode-id="3948" instrument_node="">[69]</span></a></sup><sup class="reference" data-dcnode-id="3943" id="cite_ref-70"><a data-dcnode-id="3944" href="#cite_note-70"><span data-dcnode-id="3945" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="3940" id="cite_ref-71"><a data-dcnode-id="3941" href="#cite_note-71"><span data-dcnode-id="3942" instrument_node="">[71]</span></a></sup></li></ul><span data-dcnode-id="3937" instrument_node="">
</span><h2 data-dcnode-id="3927"><span class="mw-headline" data-dcnode-id="3935" id="See_also"><span data-dcnode-id="3936" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="3928"><span class="mw-editsection-bracket" data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">[</span></span><a data-dcnode-id="3931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D60" title="Edit section: See also"><span data-dcnode-id="3932" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3926" instrument_node="">
