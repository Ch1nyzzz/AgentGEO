</span><h4 data-dcnode-id="4908"><span class="mw-headline" data-dcnode-id="4916" id="Kurds"><span data-dcnode-id="4917" instrument_node="">Kurds</span></span><span class="mw-editsection" data-dcnode-id="4909"><span class="mw-editsection-bracket" data-dcnode-id="4914"><span data-dcnode-id="4915" instrument_node="">[</span></span><a data-dcnode-id="4912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D42" title="Edit section: Kurds"><span data-dcnode-id="4913" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4907" instrument_node="">
</span><p data-dcnode-id="4876"><span data-dcnode-id="4906" instrument_node="">The </span><a data-dcnode-id="4904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurds" title="Kurds"><span data-dcnode-id="4905" instrument_node="">Kurds</span></a><span data-dcnode-id="4903" instrument_node=""> are an </span><a data-dcnode-id="4901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnic_group" title="Ethnic group"><span data-dcnode-id="4902" instrument_node="">ethnic group</span></a><span data-dcnode-id="4900" instrument_node="">, mostly inhabiting the area spanning adjacent parts of southeastern (</span><a data-dcnode-id="4898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkish_Kurdistan" title="Turkish Kurdistan"><span data-dcnode-id="4899" instrument_node="">Turkey</span></a><span data-dcnode-id="4897" instrument_node="">), western (</span><a data-dcnode-id="4895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_Kurdistan" title="Iranian Kurdistan"><span data-dcnode-id="4896" instrument_node="">Iran</span></a><span data-dcnode-id="4894" instrument_node="">), northern (</span><a data-dcnode-id="4892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraqi_Kurdistan" title="Iraqi Kurdistan"><span data-dcnode-id="4893" instrument_node="">Iraq</span></a><span data-dcnode-id="4891" instrument_node="">), and northern (</span><a class="mw-redirect" data-dcnode-id="4889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rojava" title="Rojava"><span data-dcnode-id="4890" instrument_node="">Syria</span></a><span data-dcnode-id="4888" instrument_node="">).</span><sup class="reference" data-dcnode-id="4885" id="cite_ref-55"><a data-dcnode-id="4886" href="#cite_note-55"><span data-dcnode-id="4887" instrument_node="">[55]</span></a></sup><span data-dcnode-id="4884" instrument_node=""> The large population and the wide geographical distribution of the Kurds account for a varied production spanning a spectre from coarse and naïve nomadic weavings to the most elaborate town manufacture carpets, finely woven like Senneh, or heavy fabrics like </span><a class="mw-redirect" data-dcnode-id="4882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bidjar_rug" title="Bidjar rug"><span data-dcnode-id="4883" instrument_node="">Bijar</span></a><span data-dcnode-id="4881" instrument_node=""> carpets.</span><sup class="reference" data-dcnode-id="4878" id="cite_ref-56"><a data-dcnode-id="4879" href="#cite_note-56"><span data-dcnode-id="4880" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4877" instrument_node=""> Although Kurdish rugs represent a traditional part of Persian rug production, they merit separate consideration.
</span></p><span data-dcnode-id="4875" instrument_node="">
</span><h5 data-dcnode-id="4865"><span class="mw-headline" data-dcnode-id="4873" id="Senneh_carpets"><span data-dcnode-id="4874" instrument_node="">Senneh carpets</span></span><span class="mw-editsection" data-dcnode-id="4866"><span class="mw-editsection-bracket" data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">[</span></span><a data-dcnode-id="4869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D43" title="Edit section: Senneh carpets"><span data-dcnode-id="4870" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">]</span></span></span></h5><span data-dcnode-id="4864" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4855"><div class="thumbinner" data-dcnode-id="4856" style="width:222px;"><a class="image" data-dcnode-id="4862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASenneh.jpg"><img alt="" class="thumbimage" data-dcnode-id="4863" data-file-height="946" data-file-width="1347" decoding="async" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Senneh.jpg/220px-Senneh.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Senneh.jpg/330px-Senneh.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Senneh.jpg/440px-Senneh.jpg 2x" width="220"></a><span data-dcnode-id="4861" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4857"><div class="magnify" data-dcnode-id="4859"><a class="internal" data-dcnode-id="4860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASenneh.jpg" title="Enlarge"></a></div><span data-dcnode-id="4858" instrument_node="">Senneh rug</span></div></div></div><span data-dcnode-id="4854" instrument_node="">
</span><p data-dcnode-id="4839"><span data-dcnode-id="4853" instrument_node="">The city of </span><a class="mw-redirect" data-dcnode-id="4851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanandij" title="Sanandij"><span data-dcnode-id="4852" instrument_node="">Sanandij</span></a><span data-dcnode-id="4850" instrument_node="">, formerly known as Senneh, is the capital of </span><a class="mw-redirect" data-dcnode-id="4848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurdistan_Province" title="Kurdistan Province"><span data-dcnode-id="4849" instrument_node="">Iran's Kurdistan province</span></a><span data-dcnode-id="4847" instrument_node="">. The rugs produced here are still known, also in the Iran of today, under their trade name "Senneh". They belong to the most finely woven Persian rugs, with knot counts up to 400 per square inch (6200/&nbsp;dm</span><sup data-dcnode-id="4845"><span data-dcnode-id="4846" instrument_node="">2</span></sup><span data-dcnode-id="4844" instrument_node="">). The pile is closely clipped, and the foundation is cotton, also silk was used in antique carpets. Some fine carpets have silk warps dyed in different colours which create fringes in different colours known as "rainbow warps" in the rug trade. Mostly blue colours are used in the field, or a pale red. The predominant pattern used to be the Herati pattern, with a lozenge-shaped central medallion also filled with repeating Herati patterns on a different background colour. More realistic floral patterns are also seen, probably in rugs woven for export to Europe.</span><sup class="reference" data-dcnode-id="4841" id="cite_ref-Eilland_&amp;_Eilland_Complete_Guide_1998_44-6"><a data-dcnode-id="4842" href="#cite_note-Eilland_&amp;_Eilland_Complete_Guide_1998-44"><span data-dcnode-id="4843" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4840" instrument_node="">
</span></p><span data-dcnode-id="4838" instrument_node="">
</span><h5 data-dcnode-id="4828"><span class="mw-headline" data-dcnode-id="4836" id="Bijar_carpets"><span data-dcnode-id="4837" instrument_node="">Bijar carpets</span></span><span class="mw-editsection" data-dcnode-id="4829"><span class="mw-editsection-bracket" data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">[</span></span><a data-dcnode-id="4832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D44" title="Edit section: Bijar carpets"><span data-dcnode-id="4833" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">]</span></span></span></h5><span data-dcnode-id="4827" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4818"><div class="thumbinner" data-dcnode-id="4819" style="width:222px;"><a class="image" data-dcnode-id="4825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFine_Bidjar_rug.jpg"><img alt="" class="thumbimage" data-dcnode-id="4826" data-file-height="2082" data-file-width="1208" decoding="async" height="379" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/83/Fine_Bidjar_rug.jpg/220px-Fine_Bidjar_rug.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/83/Fine_Bidjar_rug.jpg/330px-Fine_Bidjar_rug.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/83/Fine_Bidjar_rug.jpg/440px-Fine_Bidjar_rug.jpg 2x" width="220"></a><span data-dcnode-id="4824" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4820"><div class="magnify" data-dcnode-id="4822"><a class="internal" data-dcnode-id="4823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFine_Bidjar_rug.jpg" title="Enlarge"></a></div><span data-dcnode-id="4821" instrument_node="">Bidjar rug</span></div></div></div><span data-dcnode-id="4817" instrument_node="">
</span><p data-dcnode-id="4806"><span data-dcnode-id="4816" instrument_node="">The town of </span><a data-dcnode-id="4814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bijar_%28city%29" title="Bijar (city)"><span data-dcnode-id="4815" instrument_node="">Bijar</span></a><span data-dcnode-id="4813" instrument_node=""> lies around 80 kilometres (50 miles) northeast of Sanadij. Together, these two towns and their surrounding areas have been major centers of rug production since the eighteenth century. Carpets woven in Bijar and the surrounding villages show more varied designs than Senneh rugs, which has led to the distinction between "city" and "village" Bijar rugs. Often referred to as "The Iron Rug of Persia", the Bijar rug is distinguished by its highly packed pile, which is produced by a special technique known as "wet weaving", with the help of a special tool. Warps, weft and pile are constantly kept wet during the weaving process. When the finished carpet is allowed to dry, the wool expands, and the fabric becomes more compact. The fabric is further compacted by vigorous hammering on nail-like metal devices which are inserted between the warps during the weaving. Alternate warps are moderately to deeply depressed. The fabric is further compacted by using wefts of different thickness. Usually one of three wefts is consideravly thicker than the others. The knots are symmetrical, at a density of 60 to over 200 per square inch (930–2100/&nbsp;dm</span><sup data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">2</span></sup><span data-dcnode-id="4810" instrument_node="">), rarely even over 400 (6200/&nbsp;dm</span><sup data-dcnode-id="4808"><span data-dcnode-id="4809" instrument_node="">2</span></sup><span data-dcnode-id="4807" instrument_node="">).
</span></p><p data-dcnode-id="4800"><span data-dcnode-id="4805" instrument_node="">The colours of Bijar rugs are exquisite, with light and dark blues, and saturated to light, pale madder red. The designs are traditionally Persian, with predominant Herati, but also Mina Khani, Harshang, and simple medallion forms. Frequently the design is more rectilinear, but Bijar rugs are more easily identified by their peculiar, stiff and heavy weaving than by any design. Bijar rugs cannot be folded without risking to damage the foundation. A specific feature is also the lack of outlining, particularly of the smaller patterns. Full-size "sampler" carpets showing only examples of field and border designs rather than a fully developed carpet design are called "vagireh" by rug traders, and are frequently seen in the Bijar area. New Bijar carpets are still exported from the area, mostly with less elaborate Herati designs and dyed with good synthetic dyes.</span><sup class="reference" data-dcnode-id="4802" id="cite_ref-Eilland_&amp;_Eilland_Complete_Guide_1998_44-7"><a data-dcnode-id="4803" href="#cite_note-Eilland_&amp;_Eilland_Complete_Guide_1998-44"><span data-dcnode-id="4804" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4801" instrument_node="">
</span></p><span data-dcnode-id="4799" instrument_node="">
</span><h5 data-dcnode-id="4789"><span class="mw-headline" data-dcnode-id="4797" id="Kurdish_village_rugs"><span data-dcnode-id="4798" instrument_node="">Kurdish village rugs</span></span><span class="mw-editsection" data-dcnode-id="4790"><span class="mw-editsection-bracket" data-dcnode-id="4795"><span data-dcnode-id="4796" instrument_node="">[</span></span><a data-dcnode-id="4793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D45" title="Edit section: Kurdish village rugs"><span data-dcnode-id="4794" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">]</span></span></span></h5><span data-dcnode-id="4788" instrument_node="">
</span><p data-dcnode-id="4778"><span data-dcnode-id="4787" instrument_node="">From a Western perspective, there is not much detailed information about Kurdish village rugs, probably because there is insufficient information to identify them, as they have never been specifically collected in the West. Usually, rugs can only be identified as "northwest Persian, probably Kurdish".</span><sup class="reference" data-dcnode-id="4784" id="cite_ref-Eilland_&amp;_Eilland_Complete_Guide_1998_44-8"><a data-dcnode-id="4785" href="#cite_note-Eilland_&amp;_Eilland_Complete_Guide_1998-44"><span data-dcnode-id="4786" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4783" instrument_node=""> As is generally the case with village and nomadic rugs, the foundation of village rugs is more predominantly of wool. Kurdish sheep wool is of high quality, and takes dyes well. Thus, a rug with the distinct features of "village production", made of high-quality wool with particularly fine colours may be attributed to Kurdish production, but mostly these attributions remain educated guesswork. Extensive use of common rug patterns and designs poses further difficulty in assigning a specific regional or tribal provenience. A tendency of integrating regional traditions of the surrounding areas, like Anatolian or northwestern Persian designs was observed, which sometimes show distinct, unusual design variations leading to suggest a Kurdish production from within the adjacent areas. Also, northwestern Persian towns like Hamadan, Zenjan or Sauj Bulagh may have used "Kurdish" design features in the past, but modern production on display at the Grand Persian Exhibitions seems to focus on different designs.</span><sup class="reference" data-dcnode-id="4780" id="cite_ref-Eilland_&amp;_Eilland_Complete_Guide_1998_44-9"><a data-dcnode-id="4781" href="#cite_note-Eilland_&amp;_Eilland_Complete_Guide_1998-44"><span data-dcnode-id="4782" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4779" instrument_node="">
</span></p><span data-dcnode-id="4777" instrument_node="">
</span><h4 data-dcnode-id="4767"><span class="mw-headline" data-dcnode-id="4775" id="Qashqai"><span data-dcnode-id="4776" instrument_node="">Qashqai</span></span><span class="mw-editsection" data-dcnode-id="4768"><span class="mw-editsection-bracket" data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">[</span></span><a data-dcnode-id="4771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D46" title="Edit section: Qashqai"><span data-dcnode-id="4772" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4769"><span data-dcnode-id="4770" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4766" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4757"><div class="thumbinner" data-dcnode-id="4758" style="width:222px;"><a class="image" data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGhashghai_rug.jpg"><img alt="" class="thumbimage" data-dcnode-id="4765" data-file-height="1319" data-file-width="800" decoding="async" height="363" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/67/Ghashghai_rug.jpg/220px-Ghashghai_rug.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/67/Ghashghai_rug.jpg/330px-Ghashghai_rug.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/67/Ghashghai_rug.jpg/440px-Ghashghai_rug.jpg 2x" width="220"></a><span data-dcnode-id="4763" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4759"><div class="magnify" data-dcnode-id="4761"><a class="internal" data-dcnode-id="4762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGhashghai_rug.jpg" title="Enlarge"></a></div><span data-dcnode-id="4760" instrument_node="">Qashqai rug</span></div></div></div><span data-dcnode-id="4756" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4747"><div class="thumbinner" data-dcnode-id="4748" style="width:222px;"><a class="image" data-dcnode-id="4754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQashqai_tas_front.jpg"><img alt="" class="thumbimage" data-dcnode-id="4755" data-file-height="2424" data-file-width="1846" decoding="async" height="289" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Qashqai_tas_front.jpg/220px-Qashqai_tas_front.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Qashqai_tas_front.jpg/330px-Qashqai_tas_front.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Qashqai_tas_front.jpg/440px-Qashqai_tas_front.jpg 2x" width="220"></a><span data-dcnode-id="4753" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4749"><div class="magnify" data-dcnode-id="4751"><a class="internal" data-dcnode-id="4752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQashqai_tas_front.jpg" title="Enlarge"></a></div><span data-dcnode-id="4750" instrument_node="">Qashqai bag front</span></div></div></div><span data-dcnode-id="4746" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4737"><div class="thumbinner" data-dcnode-id="4738" style="width:222px;"><a class="image" data-dcnode-id="4744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAbrash.JPG"><img alt="" class="thumbimage" data-dcnode-id="4745" data-file-height="3264" data-file-width="2448" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/06/Abrash.JPG/220px-Abrash.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/06/Abrash.JPG/330px-Abrash.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/06/Abrash.JPG/440px-Abrash.JPG 2x" width="220"></a><span data-dcnode-id="4743" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4739"><div class="magnify" data-dcnode-id="4741"><a class="internal" data-dcnode-id="4742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAbrash.JPG" title="Enlarge"></a></div><span data-dcnode-id="4740" instrument_node="">Central medallion of a Qashqai rug, 19th century, with fragmented Herati pattern</span></div></div></div><span data-dcnode-id="4736" instrument_node="">
</span><link data-dcnode-id="4735" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4731" role="note"><span data-dcnode-id="4734" instrument_node="">See also: </span><a data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shiraz_rug" title="Shiraz rug"><span data-dcnode-id="4733" instrument_node="">Shiraz rug</span></a></div><span data-dcnode-id="4730" instrument_node="">
</span><p data-dcnode-id="4705"><span data-dcnode-id="4729" instrument_node="">The early history of the </span><a data-dcnode-id="4727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qashqai_people" title="Qashqai people"><span data-dcnode-id="4728" instrument_node="">Qashqai people</span></a><span data-dcnode-id="4726" instrument_node=""> remains obscure. They speak a Turkic dialect similar to that of Azerbaijan, and may have migrated to the Fars province from the north during the thirteenth century, possibly driven by the Mongol invasion. </span><a class="mw-redirect" data-dcnode-id="4724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karim_Khan" title="Karim Khan"><span data-dcnode-id="4725" instrument_node="">Karim Khan</span></a><span data-dcnode-id="4723" instrument_node=""> Zand appointed the chief of the Chahilu clan as the first Il-Khan of the Qashqai.</span><sup class="reference" data-dcnode-id="4720" id="cite_ref-Edwards,_1952_25-17"><a data-dcnode-id="4721" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="4722" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4719" instrument_node=""> The most important subtribes are the Qashguli, Shishbuluki, Darashuri, Farsimadan, and Amaleh. The Gallanzan, Rahimi, and Ikdir produce rugs of intermediate quality. The rugs woven by the Safi Khani and Bulli subtribes are considered among the highest quality rugs.</span><sup class="reference" data-dcnode-id="4716" id="cite_ref-Opie,_Tribal_Rugs_of_Southern_Persia_54-1"><a data-dcnode-id="4717" href="#cite_note-Opie,_Tribal_Rugs_of_Southern_Persia-54"><span data-dcnode-id="4718" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4715" instrument_node=""> The rugs are all wool, usually with ivory warps, which distinguishes Qashqai from Khamseh rugs. Qashqai rugs use asymmetric knots, while Gabbeh rugs woven by Qashqai more often use symmetric knots. Alternate warps are deeply depressed. Wefts are in natural colours or dyed red. The selvedges are overcast in wool of different colours, creating a "barber pole" pattern, and are sometimes adorned with woolen tassels. Both ends of the rug have narrow, striped flat-woven kilims. Workshops were established in the nineteenth century already around the town of </span><a data-dcnode-id="4713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Firuzabad%2C_Fars" title="Firuzabad, Fars"><span data-dcnode-id="4714" instrument_node="">Firuzabad</span></a><span data-dcnode-id="4712" instrument_node="">. Rugs with repeating boteh and the Herati pattern, medallion, as well as prayer rug designs resembling the millefleurs patterns of Indian rugs were woven in these manufactures. The Herati design may sometimes appear to be disjointed and fragmented. The Qashqai are also known for their flatweaves, and for their production of smaller, pile-woven saddle bags, flat-woven larger bags (</span><i data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">mafrash</span></i><span data-dcnode-id="4709" instrument_node="">), and their </span><a data-dcnode-id="4707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gabbeh" title="Gabbeh"><span data-dcnode-id="4708" instrument_node="">Gabbeh</span></a><span data-dcnode-id="4706" instrument_node=""> rugs.
</span></p><p data-dcnode-id="4690"><span data-dcnode-id="4704" instrument_node="">The </span><b data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">Shishbuluki</span></b><span data-dcnode-id="4701" instrument_node=""> (</span><i data-dcnode-id="4699"><span data-dcnode-id="4700" instrument_node="">lit.</span></i><span data-dcnode-id="4698" instrument_node="">: "six districts") rugs are distinguished by small, central, lozenge-shaped medallions surrounded by small figures aligned in concentric lozenges radiating from the center. The field is most often red, details are often woven in yellow or ivory. </span><b data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">Darashuri</span></b><span data-dcnode-id="4695" instrument_node=""> rugs are similar to those of the Shishbuluki, but not so finely woven.</span><sup class="reference" data-dcnode-id="4692" id="cite_ref-Parham_1996_57-0"><a data-dcnode-id="4693" href="#cite_note-Parham_1996-57"><span data-dcnode-id="4694" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4691" instrument_node="">
</span></p><p data-dcnode-id="4684"><span data-dcnode-id="4689" instrument_node="">As the truly nomadic way of life has virtually come to an end during the twentieth century, most Qashqai rugs are now woven in villages, using vertical looms, cotton warps, or even an all-cotton foundation. They use a variety of designs associated with the Qashqai tradition, but it is rarely possible to attribute a specific rug to a specific tribal tradition. Many patterns, including the "Qashqai medallion" previously thought to represent genuine nomadic design traditions, have been shown to be of town manufacture origin, and were integrated into the rural village traditions by a process of stylization.</span><sup class="reference" data-dcnode-id="4686" id="cite_ref-Ford,_Oriental_Carpet_Design_34-3"><a data-dcnode-id="4687" href="#cite_note-Ford,_Oriental_Carpet_Design-34"><span data-dcnode-id="4688" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4685" instrument_node="">
</span></p><p data-dcnode-id="4665"><span data-dcnode-id="4683" instrument_node="">The revival of natural dyeing has had a major impact on Qashqai rug production. Initiated in </span><a data-dcnode-id="4681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shiraz" title="Shiraz"><span data-dcnode-id="4682" instrument_node="">Shiraz</span></a><span data-dcnode-id="4680" instrument_node=""> during the 1990s by master dyers as Abbas Sayahi,</span><sup class="reference" data-dcnode-id="4677" id="cite_ref-Opie,_Vegetal_dyes,_Iran_43-3"><a data-dcnode-id="4678" href="#cite_note-Opie,_Vegetal_dyes,_Iran-43"><span data-dcnode-id="4679" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4676" instrument_node=""> particularly </span><a data-dcnode-id="4674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gabbeh" title="Gabbeh"><span data-dcnode-id="4675" instrument_node="">Gabbeh</span></a><span data-dcnode-id="4673" instrument_node=""> rugs raised much interest when they were first presented at the Great Persian Exhibition in 1992. Initially woven for home use and local trade, coarsely knotted with symmetric knots, the colours initially seen were mostly natural shades of wool. With the revival of natural colours, Gabbeh from </span><a data-dcnode-id="4671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fars_province" title="Fars province"><span data-dcnode-id="4672" instrument_node="">Fars province</span></a><span data-dcnode-id="4670" instrument_node=""> soon were produced in a full range of colours. They met the Western demand for primitive, naïve folk art as opposed to elaborate commercialized designs, and gained high popularity. In the commercial production of today, the Gabbeh rug patterns remain simple, but tend to show more modern types of design.</span><sup class="reference" data-dcnode-id="4667" id="cite_ref-Eilland_&amp;_Eilland_Complete_Guide_1998_44-10"><a data-dcnode-id="4668" href="#cite_note-Eilland_&amp;_Eilland_Complete_Guide_1998-44"><span data-dcnode-id="4669" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4666" instrument_node="">
</span></p><span data-dcnode-id="4664" instrument_node="">
</span><h4 data-dcnode-id="4654"><span class="mw-headline" data-dcnode-id="4662" id="Khamseh_federation"><span data-dcnode-id="4663" instrument_node="">Khamseh federation</span></span><span class="mw-editsection" data-dcnode-id="4655"><span class="mw-editsection-bracket" data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">[</span></span><a data-dcnode-id="4658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D47" title="Edit section: Khamseh federation"><span data-dcnode-id="4659" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4653" instrument_node="">
</span><link data-dcnode-id="4652" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4648" role="note"><span data-dcnode-id="4651" instrument_node="">See also: </span><a data-dcnode-id="4649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shiraz_rug" title="Shiraz rug"><span data-dcnode-id="4650" instrument_node="">Shiraz rug</span></a></div><span data-dcnode-id="4647" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4636"><div class="thumbinner" data-dcnode-id="4637" style="width:222px;"><a class="image" data-dcnode-id="4645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APersian_rug.jpg"><img alt="" class="thumbimage" data-dcnode-id="4646" data-file-height="2395" data-file-width="1902" decoding="async" height="277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Persian_rug.jpg/220px-Persian_rug.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Persian_rug.jpg/330px-Persian_rug.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Persian_rug.jpg/440px-Persian_rug.jpg 2x" width="220"></a><span data-dcnode-id="4644" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4638"><div class="magnify" data-dcnode-id="4642"><a class="internal" data-dcnode-id="4643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APersian_rug.jpg" title="Enlarge"></a></div><span data-dcnode-id="4641" instrument_node="">A rug by </span><a data-dcnode-id="4639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basseri" title="Basseri"><span data-dcnode-id="4640" instrument_node="">Basseri tribe</span></a></div></div></div><span data-dcnode-id="4635" instrument_node="">
</span><p data-dcnode-id="4597"><span data-dcnode-id="4634" instrument_node="">The </span><a data-dcnode-id="4632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Khamseh" title="Khamseh"><span data-dcnode-id="4633" instrument_node="">Khamseh</span></a><span data-dcnode-id="4631" instrument_node=""> (</span><i data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">lit.</span></i><span data-dcnode-id="4628" instrument_node="">: "five tribes") federation was established by the Persian </span><a data-dcnode-id="4626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qajar_dynasty" title="Qajar dynasty"><span data-dcnode-id="4627" instrument_node="">Qajar</span></a><span data-dcnode-id="4625" instrument_node=""> government in the nineteenth century, to rival the dominant Qashqai power. Five tribal groups of Arab, Persian and Turkic origin were combined, including the Arab tribe, the </span><a data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basseri" title="Basseri"><span data-dcnode-id="4624" instrument_node="">Basseri</span></a><span data-dcnode-id="4622" instrument_node="">, Baharlu, Ainalu, and Nafar tribes.</span><sup class="reference" data-dcnode-id="4619" id="cite_ref-Opie,_Tribal_Rugs_of_Southern_Persia_54-2"><a data-dcnode-id="4620" href="#cite_note-Opie,_Tribal_Rugs_of_Southern_Persia-54"><span data-dcnode-id="4621" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4618" instrument_node=""> It is difficult to attribute a specific rug to the Khamseh production, and the label "Khamseh" is often used as a term of convenience. Dark woolen warps and borders are associated with </span><b data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">Arab</span></b><span data-dcnode-id="4615" instrument_node=""> Khamseh rugs, warps are rarely depressed, the colour scheme is more subdued. Specifically, a stylized bird (</span><i data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">"murgh"</span></i><span data-dcnode-id="4612" instrument_node="">) pattern is often seen on rugs attributed to the confederation, arranged around a succession of small, lozenge shaped medallions. </span><b data-dcnode-id="4609"><a data-dcnode-id="4610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basseri" title="Basseri"><span data-dcnode-id="4611" instrument_node="">Basseri</span></a></b><span data-dcnode-id="4608" instrument_node=""> rugs are asymmetrically knotted, brighter in colours, with more open space and smaller ornaments and figure with Orange as the specific color.</span><sup class="reference" data-dcnode-id="4605" id="cite_ref-Eilland_&amp;_Eilland_Complete_Guide_1998_44-11"><a data-dcnode-id="4606" href="#cite_note-Eilland_&amp;_Eilland_Complete_Guide_1998-44"><span data-dcnode-id="4607" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4604" instrument_node=""> The </span><b data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">Baharlu</span></b><span data-dcnode-id="4601" instrument_node=""> are a Turkic-speaking tribe settled around </span><a data-dcnode-id="4599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Darab" title="Darab"><span data-dcnode-id="4600" instrument_node="">Darab</span></a><span data-dcnode-id="4598" instrument_node="">, and few carpets are known from this more agricultural region.
</span></p><span data-dcnode-id="4596" instrument_node="">
</span><h4 data-dcnode-id="4586"><span class="mw-headline" data-dcnode-id="4594" id="Luri"><span data-dcnode-id="4595" instrument_node="">Luri</span></span><span class="mw-editsection" data-dcnode-id="4587"><span class="mw-editsection-bracket" data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">[</span></span><a data-dcnode-id="4590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D48" title="Edit section: Luri"><span data-dcnode-id="4591" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4585" instrument_node="">
</span><p data-dcnode-id="4564"><span data-dcnode-id="4584" instrument_node="">The </span><a data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lurs" title="Lurs"><span data-dcnode-id="4583" instrument_node="">Lurs</span></a><span data-dcnode-id="4581" instrument_node=""> live mainly in western and south-western Iran. They are of Indo-European origin. Their </span><a data-dcnode-id="4579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Luri_language" title="Luri language"><span data-dcnode-id="4580" instrument_node="">dialect</span></a><span data-dcnode-id="4578" instrument_node=""> is closely related to the </span><a data-dcnode-id="4576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bakhtiari_dialect" title="Bakhtiari dialect"><span data-dcnode-id="4577" instrument_node="">Bakhtiari dialect</span></a><span data-dcnode-id="4575" instrument_node=""> and to the dialect of the southern </span><a data-dcnode-id="4573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurds" title="Kurds"><span data-dcnode-id="4574" instrument_node="">Kurds</span></a><span data-dcnode-id="4572" instrument_node="">. Their rugs have been marketed in </span><a data-dcnode-id="4570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shiraz" title="Shiraz"><span data-dcnode-id="4571" instrument_node="">Shiraz</span></a><span data-dcnode-id="4569" instrument_node="">. The rugs have a dark wool foundation, with two wefts after each row of knots. Knots are symmetrical or asymmetrical. Small compartment designs of repeating stars are often seen, or lozenge-shaped medallions with anchor-like hooks on both ends.</span><sup class="reference" data-dcnode-id="4566" id="cite_ref-Opie,_Tribal_Rugs_of_Southern_Persia_54-3"><a data-dcnode-id="4567" href="#cite_note-Opie,_Tribal_Rugs_of_Southern_Persia-54"><span data-dcnode-id="4568" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4565" instrument_node="">
</span></p><span data-dcnode-id="4563" instrument_node="">
</span><h4 data-dcnode-id="4553"><span class="mw-headline" data-dcnode-id="4561" id="Afshari"><span data-dcnode-id="4562" instrument_node="">Afshari</span></span><span class="mw-editsection" data-dcnode-id="4554"><span class="mw-editsection-bracket" data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node="">[</span></span><a data-dcnode-id="4557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D49" title="Edit section: Afshari"><span data-dcnode-id="4558" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4552" instrument_node="">
</span><link data-dcnode-id="4551" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4547" role="note"><span data-dcnode-id="4550" instrument_node="">See also: </span><a data-dcnode-id="4548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afshar_rugs" title="Afshar rugs"><span data-dcnode-id="4549" instrument_node="">Afshar rugs</span></a></div><span data-dcnode-id="4546" instrument_node="">
</span><p data-dcnode-id="4534"><span data-dcnode-id="4545" instrument_node="">The </span><a data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afshar_people" title="Afshar people"><span data-dcnode-id="4544" instrument_node="">Afshar people</span></a><span data-dcnode-id="4542" instrument_node=""> are a semi-nomadic group of Turkic origin, principally located in the mountainous areas surrounding the modern city of </span><a class="mw-redirect" data-dcnode-id="4540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kirman" title="Kirman"><span data-dcnode-id="4541" instrument_node="">Kirman</span></a><span data-dcnode-id="4539" instrument_node=""> in southeastern Iran. They produce mainly rugs in runner formats, and bags and other household items with rectilinear or curvilinear designs, showing both central medallions and allover patterns. Colours are bright and pale red. The flat-woven ends often show multiple narrow stripes.</span><sup class="reference" data-dcnode-id="4536" id="cite_ref-O'Bannon_1995_49-1"><a data-dcnode-id="4537" href="#cite_note-O'Bannon_1995-49"><span data-dcnode-id="4538" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4535" instrument_node="">
</span></p><span data-dcnode-id="4533" instrument_node="">
</span><h4 data-dcnode-id="4523"><span class="mw-headline" data-dcnode-id="4531" id="Beluch"><span data-dcnode-id="4532" instrument_node="">Beluch</span></span><span class="mw-editsection" data-dcnode-id="4524"><span class="mw-editsection-bracket" data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">[</span></span><a data-dcnode-id="4527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D50" title="Edit section: Beluch"><span data-dcnode-id="4528" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4522" instrument_node="">
</span><p data-dcnode-id="4513"><span data-dcnode-id="4521" instrument_node="">The </span><a data-dcnode-id="4519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baloch_people" title="Baloch people"><span data-dcnode-id="4520" instrument_node="">Baloch people</span></a><span data-dcnode-id="4518" instrument_node=""> live in eastern Iran. They weave small-format rugs and a variety of bags with dark red and blue colours, often combined with dark brown and white. Camel hair is also used.</span><sup class="reference" data-dcnode-id="4515" id="cite_ref-O'Bannon_1995_49-2"><a data-dcnode-id="4516" href="#cite_note-O'Bannon_1995-49"><span data-dcnode-id="4517" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4514" instrument_node="">
</span></p><span data-dcnode-id="4512" instrument_node="">
</span><h3 data-dcnode-id="4502"><span class="mw-headline" data-dcnode-id="4510" id="Village_carpets"><span data-dcnode-id="4511" instrument_node="">Village carpets</span></span><span class="mw-editsection" data-dcnode-id="4503"><span class="mw-editsection-bracket" data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">[</span></span><a data-dcnode-id="4506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D51" title="Edit section: Village carpets"><span data-dcnode-id="4507" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4501" instrument_node="">
</span><p data-dcnode-id="4495"><span data-dcnode-id="4500" instrument_node="">Carpets produced in villages are usually brought to a regional market center, and carry the name of the market center as a label. Sometimes, as in the case of the "Serapi" rug, the name of the village serves as a label for a special quality. Village carpets can be identified by their less elaborate, more highly stylized designs.</span><sup class="reference" data-dcnode-id="4497" id="cite_ref-O'Bannon_1995_49-3"><a data-dcnode-id="4498" href="#cite_note-O'Bannon_1995-49"><span data-dcnode-id="4499" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4496" instrument_node="">
</span></p><p data-dcnode-id="4489"><span data-dcnode-id="4494" instrument_node="">Criteria suggesting village production include:</span><sup class="reference" data-dcnode-id="4491" id="cite_ref-Wilber,_1989_58-0"><a data-dcnode-id="4492" href="#cite_note-Wilber,_1989-58"><span data-dcnode-id="4493" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4490" instrument_node="">
</span></p><span data-dcnode-id="4488" instrument_node="">
</span><ol data-dcnode-id="4473"><li data-dcnode-id="4483"><span data-dcnode-id="4487" instrument_node="">A rug of so-called scatter-size (</span><i data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">dozar</span></i><span data-dcnode-id="4484" instrument_node="">) that has been woven in a settled environment;</span></li><span data-dcnode-id="4482" instrument_node="">
</span><li data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">woven without a cartoon;</span></li><span data-dcnode-id="4479" instrument_node="">
</span><li data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">woven without reconciled corners;</span></li><span data-dcnode-id="4476" instrument_node="">
</span><li data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">woven with possible idiosyncrasies of construction and pattern elements.</span></li></ol><span data-dcnode-id="4472" instrument_node="">
</span><p data-dcnode-id="4466"><span data-dcnode-id="4471" instrument_node="">Village rugs are more apt to have warps of wool rather than of cotton. Their designs are not as elaborate and ornate than the curvilinear patterns of city rugs. They are more likely to display abrash and conspicuous mistakes in detail. On simple vertical looms, the correct tension of the warps is difficult to maintain during the entire weaving process. So, village rugs tend to vary in width from end to end, have irregular sides, and may not lay entirely flat. In contrast to manufactory rugs, there is considerable variety in treating the selvedges and fringes. Village rugs are less likely to present depressed warps, as compared to manufactory rugs. They tend to make less use of flat woven kilim ends to finish off the ends of the rug, as compared to tribal rugs. The variation in treatment of fringes and ends, and the way the selvedges are treated, provide clues as to place of origin.</span><sup class="reference" data-dcnode-id="4468" id="cite_ref-Wilber,_1989_58-1"><a data-dcnode-id="4469" href="#cite_note-Wilber,_1989-58"><span data-dcnode-id="4470" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4467" instrument_node="">
</span></p><span data-dcnode-id="4465" instrument_node="">
</span><h4 data-dcnode-id="4455"><span class="mw-headline" data-dcnode-id="4463" id="Northwestern_Iran"><span data-dcnode-id="4464" instrument_node="">Northwestern Iran</span></span><span class="mw-editsection" data-dcnode-id="4456"><span class="mw-editsection-bracket" data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">[</span></span><a data-dcnode-id="4459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D52" title="Edit section: Northwestern Iran"><span data-dcnode-id="4460" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4454" instrument_node="">
</span><link data-dcnode-id="4453" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4443" role="note"><span data-dcnode-id="4452" instrument_node="">Main articles: </span><a class="mw-redirect" data-dcnode-id="4450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azerbaijani_carpet" title="Azerbaijani carpet"><span data-dcnode-id="4451" instrument_node="">Azerbaijani carpet</span></a><span data-dcnode-id="4449" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ardabil_rugs" title="Ardabil rugs"><span data-dcnode-id="4448" instrument_node="">Ardabil rugs</span></a><span data-dcnode-id="4446" instrument_node="">, and </span><a data-dcnode-id="4444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caucasian_carpets_and_rugs" title="Caucasian carpets and rugs"><span data-dcnode-id="4445" instrument_node="">Caucasian carpets and rugs</span></a></div><span data-dcnode-id="4442" instrument_node="">
</span><p data-dcnode-id="4422"><a data-dcnode-id="4440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tabriz" title="Tabriz"><span data-dcnode-id="4441" instrument_node="">Tabriz</span></a><span data-dcnode-id="4439" instrument_node=""> is the market center for the Iranian Northwest. Carpets woven in this region mainly use the symmetric knot. </span><a class="mw-redirect" data-dcnode-id="4437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heriz" title="Heriz"><span data-dcnode-id="4438" instrument_node="">Heriz</span></a><span data-dcnode-id="4436" instrument_node=""> is a local center of production for mainly room-size carpets. Warps and weft are of cotton, the weaving is rather coarse, with high-quality wool. Prominent central medaillons are frequently seen with rectilinear outlines highlighted in white. The ornaments of the field are in bold, rectilinear style, sometimes in an allover design. Higher quality Heriz carpets are known as Serapi. The village of </span><a data-dcnode-id="4434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarab%2C_East_Azerbaijan" title="Sarab, East Azerbaijan"><span data-dcnode-id="4435" instrument_node="">Sarab</span></a><span data-dcnode-id="4433" instrument_node=""> produces runners and galleries with broad main borders either of camel hair or wool dyed in the colour of camel hair. Large, interconnected medaillons fill the field. Mostly rectilinear, geometric and floral patterns are dyed in pink red and blue. </span><a class="mw-redirect" data-dcnode-id="4431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bakshaish_rugs_and_carpets" title="Bakshaish rugs and carpets"><span data-dcnode-id="4432" instrument_node="">Bakshaish carpets</span></a><span data-dcnode-id="4430" instrument_node=""> with a shield-shaped large medaillon, less elaborate rectilinear patterns in salmon red and blue are labeled after the village of </span><a data-dcnode-id="4428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bakhshayesh" title="Bakhshayesh"><span data-dcnode-id="4429" instrument_node="">Bakhshayesh</span></a><span data-dcnode-id="4427" instrument_node="">. Karadja produces runners with specific square and octagonal medaillons in succession.</span><sup class="reference" data-dcnode-id="4424" id="cite_ref-O'Bannon_1995_49-4"><a data-dcnode-id="4425" href="#cite_note-O'Bannon_1995-49"><span data-dcnode-id="4426" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4423" instrument_node="">
</span></p><span data-dcnode-id="4421" instrument_node="">
</span><h4 data-dcnode-id="4411"><span class="mw-headline" data-dcnode-id="4419" id="Western_Iran"><span data-dcnode-id="4420" instrument_node="">Western Iran</span></span><span class="mw-editsection" data-dcnode-id="4412"><span class="mw-editsection-bracket" data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">[</span></span><a data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D53" title="Edit section: Western Iran"><span data-dcnode-id="4416" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4410" instrument_node="">
</span><p data-dcnode-id="4390"><span data-dcnode-id="4409" instrument_node="">Major production centers in the West are </span><a data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hamadan" title="Hamadan"><span data-dcnode-id="4408" instrument_node="">Hamadan</span></a><span data-dcnode-id="4406" instrument_node="">, </span><a data-dcnode-id="4404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarrak%2C_Iran" title="Sarrak, Iran"><span data-dcnode-id="4405" instrument_node="">Saruk</span></a><span data-dcnode-id="4403" instrument_node=""> with its neighbouring town of </span><a data-dcnode-id="4401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arak%2C_Iran" title="Arak, Iran"><span data-dcnode-id="4402" instrument_node="">Arak</span></a><span data-dcnode-id="4400" instrument_node="">, </span><a data-dcnode-id="4398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minudasht%2C_Markazi" title="Minudasht, Markazi"><span data-dcnode-id="4399" instrument_node="">Minudasht</span></a><span data-dcnode-id="4397" instrument_node=""> also known under the trade name </span><a data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lilihan_carpets_and_rugs" title="Lilihan carpets and rugs"><span data-dcnode-id="4396" instrument_node="">Lilihan</span></a><span data-dcnode-id="4394" instrument_node=""> and Serabend, Maslaghan, </span><a data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malayer" title="Malayer"><span data-dcnode-id="4393" instrument_node="">Malayer</span></a><span data-dcnode-id="4391" instrument_node=""> and Feraghan.
</span></p><span data-dcnode-id="4389" instrument_node="">
</span><ul data-dcnode-id="4353"><li data-dcnode-id="4378"><span data-dcnode-id="4388" instrument_node="">Carpets from </span><b data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">Maslaghan</span></b><span data-dcnode-id="4385" instrument_node=""> are usually small (120 × 180&nbsp;cm), the warps are made of cotton, the wefts of wool or cotton. The large medaillon shows a so-called "lobed </span><a data-dcnode-id="4383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gul_%28design%29" title="Gul (design)"><span data-dcnode-id="4384" instrument_node="">Göl</span></a><span data-dcnode-id="4382" instrument_node="">", the colours of which are in sharp contrast to the field, with small borders. Malayer, Sarouk and Feraghan are located closely to each other. They use cotton for the foundation.</span><sup class="reference" data-dcnode-id="4379" id="cite_ref-O'Bannon_1995_49-5"><a data-dcnode-id="4380" href="#cite_note-O'Bannon_1995-49"><span data-dcnode-id="4381" instrument_node="">[49]</span></a></sup></li><span data-dcnode-id="4377" instrument_node="">
</span><li data-dcnode-id="4370"><b data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">Malayer</span></b><span data-dcnode-id="4374" instrument_node=""> carpets sre distinguished by their single-weft and the use of the symmetrical knot. Allover and medaillon patterns are common, the boteh motif is frequently used.</span><sup class="reference" data-dcnode-id="4371" id="cite_ref-O'Bannon_1995_49-6"><a data-dcnode-id="4372" href="#cite_note-O'Bannon_1995-49"><span data-dcnode-id="4373" instrument_node="">[49]</span></a></sup></li><span data-dcnode-id="4369" instrument_node="">
</span><li data-dcnode-id="4354"><span data-dcnode-id="4368" instrument_node="">The original </span><b data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">Sarouk</span></b><span data-dcnode-id="4365" instrument_node=""> design was distinguished by a round-star medaillon with surrounding pendants. The traditional design of the Sarouk rug was modified by the weavers towards an allover design of detached floral motives, the carpets were then chemically washed to remove the unwanted colours, and the pile was painted over again with more desirable colours.</span><sup class="reference" data-dcnode-id="4362" id="cite_ref-Edwards,_1952_25-18"><a data-dcnode-id="4363" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="4364" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4361" instrument_node=""> </span><b data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">Feraghan</span></b><span data-dcnode-id="4358" instrument_node=""> carpets are less finely woven than Sarouk. Often the Herati pattern is seen all over. Medaillons, if they occur, show more geometrical designs. A corroding green dye is typical for Feraghan carpets.</span><sup class="reference" data-dcnode-id="4355" id="cite_ref-O'Bannon_1995_49-7"><a data-dcnode-id="4356" href="#cite_note-O'Bannon_1995-49"><span data-dcnode-id="4357" instrument_node="">[49]</span></a></sup></li></ul><span data-dcnode-id="4352" instrument_node="">
</span><h4 data-dcnode-id="4342"><span class="mw-headline" data-dcnode-id="4350" id="Southern_Iran"><span data-dcnode-id="4351" instrument_node="">Southern Iran</span></span><span class="mw-editsection" data-dcnode-id="4343"><span class="mw-editsection-bracket" data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">[</span></span><a data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D54" title="Edit section: Southern Iran"><span data-dcnode-id="4347" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4341" instrument_node="">
</span><p data-dcnode-id="4320"><span data-dcnode-id="4340" instrument_node="">Since the mid-twentieth century, commercial production started in the villages of </span><a class="mw-redirect" data-dcnode-id="4338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abade" title="Abade"><span data-dcnode-id="4339" instrument_node="">Abadeh</span></a><span data-dcnode-id="4337" instrument_node=""> and Yalameh. </span><a data-dcnode-id="4335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abadeh_rug" title="Abadeh rug"><span data-dcnode-id="4336" instrument_node="">Abadeh rugs</span></a><span data-dcnode-id="4334" instrument_node=""> adopted traditional </span><a data-dcnode-id="4332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qashqai_people" title="Qashqai people"><span data-dcnode-id="4333" instrument_node="">Qashqai</span></a><span data-dcnode-id="4331" instrument_node=""> designs, but used cotton for warps and wefts, the latter often dyed in blue. </span><a class="new" data-dcnode-id="4329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYalameh_rug%26action%3Dedit%26redlink%3D1" title="Yalameh rug (page does not exist)"><span data-dcnode-id="4330" instrument_node="">Yalameh</span></a><span data-dcnode-id="4328" instrument_node=""> carpets more resemble </span><a data-dcnode-id="4326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Khamseh" title="Khamseh"><span data-dcnode-id="4327" instrument_node="">Khamseh</span></a><span data-dcnode-id="4325" instrument_node=""> designs with hooked medaillons arranged in the field. Warps and wefts were often in white.</span><sup class="reference" data-dcnode-id="4322" id="cite_ref-O'Bannon_1995_49-8"><a data-dcnode-id="4323" href="#cite_note-O'Bannon_1995-49"><span data-dcnode-id="4324" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4321" instrument_node="">
</span></p><span data-dcnode-id="4319" instrument_node="">
</span><h4 data-dcnode-id="4309"><span class="mw-headline" data-dcnode-id="4317" id="Eastern_Iran"><span data-dcnode-id="4318" instrument_node="">Eastern Iran</span></span><span class="mw-editsection" data-dcnode-id="4310"><span class="mw-editsection-bracket" data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">[</span></span><a data-dcnode-id="4313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D55" title="Edit section: Eastern Iran"><span data-dcnode-id="4314" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4308" instrument_node="">
</span><p data-dcnode-id="4302"><span data-dcnode-id="4307" instrument_node="">The village of Doroksh is known for its carpet production in Eastern Persia. They are characterized by their use of orange dyes, the boteh motif is often seen. Usually, there is only one border. The knots are asymmetric.</span><sup class="reference" data-dcnode-id="4304" id="cite_ref-O'Bannon_1995_49-9"><a data-dcnode-id="4305" href="#cite_note-O'Bannon_1995-49"><span data-dcnode-id="4306" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4303" instrument_node="">
</span></p><span data-dcnode-id="4301" instrument_node="">
</span><h3 data-dcnode-id="4291"><span class="mw-headline" data-dcnode-id="4299" id="Town_carpets"><span data-dcnode-id="4300" instrument_node="">Town carpets</span></span><span class="mw-editsection" data-dcnode-id="4292"><span class="mw-editsection-bracket" data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">[</span></span><a data-dcnode-id="4295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D56" title="Edit section: Town carpets"><span data-dcnode-id="4296" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4290" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4281"><div class="thumbinner" data-dcnode-id="4282" style="width:222px;"><a class="image" data-dcnode-id="4288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFollowing_the_Pattern%2C_Weaver%2C_Esfahan%2C_Iran_%2814451927066%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="4289" data-file-height="3136" data-file-width="2091" decoding="async" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Following_the_Pattern%252C_Weaver%252C_Esfahan%252C_Iran_%252814451927066%2529.jpg/220px-Following_the_Pattern%252C_Weaver%252C_Esfahan%252C_Iran_%252814451927066%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Following_the_Pattern%2C_Weaver%2C_Esfahan%2C_Iran_%2814451927066%29.jpg/330px-Following_the_Pattern%2C_Weaver%2C_Esfahan%2C_Iran_%2814451927066%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Following_the_Pattern%2C_Weaver%2C_Esfahan%2C_Iran_%2814451927066%29.jpg/440px-Following_the_Pattern%2C_Weaver%2C_Esfahan%2C_Iran_%2814451927066%29.jpg 2x" width="220"></a><span data-dcnode-id="4287" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4283"><div class="magnify" data-dcnode-id="4285"><a class="internal" data-dcnode-id="4286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFollowing_the_Pattern%2C_Weaver%2C_Esfahan%2C_Iran_%2814451927066%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="4284" instrument_node="">Weaving a carpet from a cartoon, Esfahan, Iran</span></div></div></div><span data-dcnode-id="4280" instrument_node="">
</span><p data-dcnode-id="4254"><a data-dcnode-id="4278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tabriz" title="Tabriz"><span data-dcnode-id="4279" instrument_node="">Tabriz</span></a><span data-dcnode-id="4277" instrument_node=""> in the West, </span><a data-dcnode-id="4275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerman" title="Kerman"><span data-dcnode-id="4276" instrument_node="">Kerman</span></a><span data-dcnode-id="4274" instrument_node=""> in the South, and </span><a data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mashhad" title="Mashhad"><span data-dcnode-id="4273" instrument_node="">Mashhad</span></a><span data-dcnode-id="4271" instrument_node=""> in the Northeast of Iran, together with the central Iranian towns of </span><a data-dcnode-id="4269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kashan" title="Kashan"><span data-dcnode-id="4270" instrument_node="">Kashan</span></a><span data-dcnode-id="4268" instrument_node="">, </span><a data-dcnode-id="4266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isfahan" title="Isfahan"><span data-dcnode-id="4267" instrument_node="">Isfahan</span></a><span data-dcnode-id="4265" instrument_node="">, </span><a data-dcnode-id="4263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nain%2C_Iran" title="Nain, Iran"><span data-dcnode-id="4264" instrument_node="">Nain</span></a><span data-dcnode-id="4262" instrument_node=""> and </span><a data-dcnode-id="4260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qom" title="Qom"><span data-dcnode-id="4261" instrument_node="">Qom</span></a><span data-dcnode-id="4259" instrument_node=""> are the main centers of town manufacture.</span><sup class="reference" data-dcnode-id="4256" id="cite_ref-O'Bannon_1995_49-10"><a data-dcnode-id="4257" href="#cite_note-O'Bannon_1995-49"><span data-dcnode-id="4258" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4255" instrument_node="">
</span></p><span data-dcnode-id="4253" instrument_node="">
</span><ul data-dcnode-id="4212"><li data-dcnode-id="4248"><b data-dcnode-id="4250"><a data-dcnode-id="4251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tabriz_rug" title="Tabriz rug"><span data-dcnode-id="4252" instrument_node="">Tabriz</span></a></b><span data-dcnode-id="4249" instrument_node=""> has been a center of carpet production for centuries. Many designs are reproduced by Tabrizi weavers, with wool or silk in the pile, and wool, cotton or silk in the foundation.</span></li><span data-dcnode-id="4247" instrument_node="">
</span><li data-dcnode-id="4242"><b data-dcnode-id="4244"><a data-dcnode-id="4245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerman_carpet" title="Kerman carpet"><span data-dcnode-id="4246" instrument_node="">Kerman</span></a></b><span data-dcnode-id="4243" instrument_node=""> is known for finely knotted, elegant carpets with prominent cochineal red, ivory and golden yellow colours. Their medaillons are elegantly designed, and elaborate versions of the boteh design are often seen in the field.</span></li><span data-dcnode-id="4241" instrument_node="">
</span><li data-dcnode-id="4236"><b data-dcnode-id="4238"><a class="mw-redirect" data-dcnode-id="4239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mashhad_rug" title="Mashhad rug"><span data-dcnode-id="4240" instrument_node="">Mashhad</span></a></b><span data-dcnode-id="4237" instrument_node=""> carpets are of average quality. Cochineal red is often used. Emogli (Amoghli) carpets are made of silk, and represent the finest carpets manufactured in Mashhad. They show dense arabesque patterns on red ground.</span></li><span data-dcnode-id="4235" instrument_node="">
</span><li data-dcnode-id="4230"><b data-dcnode-id="4232"><a class="mw-redirect" data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kashan_rug" title="Kashan rug"><span data-dcnode-id="4234" instrument_node="">Kashan</span></a></b><span data-dcnode-id="4231" instrument_node=""> is the oldest carpet-producing city in Central Iran. Famous for its production of silk carpets, carpet weaving was revived in the late 19th century. The earliest carpets woven in Kashan at the turn of the nineteenth century show some imbalances in their designs, which was overcome, and carpets were produced mainly with a red or ivory field and elaborate ogival central medallions.</span></li><span data-dcnode-id="4229" instrument_node="">
</span><li data-dcnode-id="4213"><b data-dcnode-id="4226"><a data-dcnode-id="4227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isfahan_rug" title="Isfahan rug"><span data-dcnode-id="4228" instrument_node="">Isfahan</span></a></b><span data-dcnode-id="4225" instrument_node="">, </span><b data-dcnode-id="4222"><a data-dcnode-id="4223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nain_rug" title="Nain rug"><span data-dcnode-id="4224" instrument_node="">Nain</span></a></b><span data-dcnode-id="4221" instrument_node="">, and </span><b data-dcnode-id="4218"><a data-dcnode-id="4219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qom_rug" title="Qom rug"><span data-dcnode-id="4220" instrument_node="">Qom</span></a></b><span data-dcnode-id="4217" instrument_node=""> revived or started carpet manufacture by the mid-twentieth century. All-silk, or silk pile on cotton foundation carpets are produced with asymmetrical knots. Their design is often inspired by </span><a data-dcnode-id="4215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safavid_art" title="Safavid art"><span data-dcnode-id="4216" instrument_node="">Safavid</span></a><span data-dcnode-id="4214" instrument_node=""> designs. Carpets from Qom and Nain often have richly decorated medaillons, and tender light blue and ivory colours. Isfahan carpets use more dark red and blue colours.</span></li></ul><span data-dcnode-id="4211" instrument_node="">
</span><h3 data-dcnode-id="4201"><span class="mw-headline" data-dcnode-id="4209" id="Proveniences"><span data-dcnode-id="4210" instrument_node="">Proveniences</span></span><span class="mw-editsection" data-dcnode-id="4202"><span class="mw-editsection-bracket" data-dcnode-id="4207"><span data-dcnode-id="4208" instrument_node="">[</span></span><a data-dcnode-id="4205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D57" title="Edit section: Proveniences"><span data-dcnode-id="4206" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4203"><span data-dcnode-id="4204" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4200" instrument_node="">
</span><div class="div-col" data-dcnode-id="4098" style="column-width: 15em;"><span data-dcnode-id="4197" instrument_node="">
</span><ul data-dcnode-id="4100"><li data-dcnode-id="4194"><a data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abadeh_rug" title="Abadeh rug"><span data-dcnode-id="4196" instrument_node="">Abadeh</span></a></li><span data-dcnode-id="4193" instrument_node="">
</span><li data-dcnode-id="4190"><a class="mw-redirect" data-dcnode-id="4191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghan_carpet" title="Afghan carpet"><span data-dcnode-id="4192" instrument_node="">Afghan</span></a></li><span data-dcnode-id="4189" instrument_node="">
</span><li data-dcnode-id="4186"><a data-dcnode-id="4187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahar_rug" title="Ahar rug"><span data-dcnode-id="4188" instrument_node="">Ahar</span></a></li><span data-dcnode-id="4185" instrument_node="">
</span><li data-dcnode-id="4182"><a data-dcnode-id="4183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afshar_rugs" title="Afshar rugs"><span data-dcnode-id="4184" instrument_node="">Afshar</span></a></li><span data-dcnode-id="4181" instrument_node="">
</span><li data-dcnode-id="4178"><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arak_rug" title="Arak rug"><span data-dcnode-id="4180" instrument_node="">Arak</span></a></li><span data-dcnode-id="4177" instrument_node="">
