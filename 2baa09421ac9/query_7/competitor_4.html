</span><h2 data-dcnode-id="5665"><span class="mw-headline" data-dcnode-id="5673" id="Design"><span data-dcnode-id="5674" instrument_node="">Design</span></span><span class="mw-editsection" data-dcnode-id="5666"><span class="mw-editsection-bracket" data-dcnode-id="5671"><span data-dcnode-id="5672" instrument_node="">[</span></span><a data-dcnode-id="5669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D36" title="Edit section: Design"><span data-dcnode-id="5670" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5667"><span data-dcnode-id="5668" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5664" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5653"><div class="thumbinner" data-dcnode-id="5654" style="width:222px;"><a class="image" data-dcnode-id="5662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APersian_Kermanshah_%2527Tree_of_Life%2527_%284-6_x_7-8%2C_ca_3rd_quarter_19th_century%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="5663" data-file-height="640" data-file-width="383" decoding="async" height="368" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Persian_Kermanshah_%2527Tree_of_Life%2527_%25284-6_x_7-8%252C_ca_3rd_quarter_19th_century%2529.jpg/220px-Persian_Kermanshah_%2527Tree_of_Life%2527_%25284-6_x_7-8%252C_ca_3rd_quarter_19th_century%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Persian_Kermanshah_%27Tree_of_Life%27_%284-6_x_7-8%2C_ca_3rd_quarter_19th_century%29.jpg/330px-Persian_Kermanshah_%27Tree_of_Life%27_%284-6_x_7-8%2C_ca_3rd_quarter_19th_century%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/c/c1/Persian_Kermanshah_%27Tree_of_Life%27_%284-6_x_7-8%2C_ca_3rd_quarter_19th_century%29.jpg 2x" width="220"></a><span data-dcnode-id="5661" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5655"><div class="magnify" data-dcnode-id="5659"><a class="internal" data-dcnode-id="5660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APersian_Kermanshah_%2527Tree_of_Life%2527_%284-6_x_7-8%2C_ca_3rd_quarter_19th_century%29.jpg" title="Enlarge"></a></div><a data-dcnode-id="5657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kermanshah" title="Kermanshah"><span data-dcnode-id="5658" instrument_node="">Kermanshah</span></a><span data-dcnode-id="5656" instrument_node=""> 'Tree of Life' carpet, 3rd quarter 19th century</span></div></div></div><span data-dcnode-id="5652" instrument_node="">
</span><h3 data-dcnode-id="5642"><span class="mw-headline" data-dcnode-id="5650" id="Formats_and_special_types"><span data-dcnode-id="5651" instrument_node="">Formats and special types</span></span><span class="mw-editsection" data-dcnode-id="5643"><span class="mw-editsection-bracket" data-dcnode-id="5648"><span data-dcnode-id="5649" instrument_node="">[</span></span><a data-dcnode-id="5646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D37" title="Edit section: Formats and special types"><span data-dcnode-id="5647" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5644"><span data-dcnode-id="5645" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5641" instrument_node="">
</span><ul data-dcnode-id="5568"><li data-dcnode-id="5632"><i data-dcnode-id="5638"><b data-dcnode-id="5639"><span data-dcnode-id="5640" instrument_node="">Ghali</span></b></i><span data-dcnode-id="5637" instrument_node=""> (Persian: </span><span data-dcnode-id="5634" title="Persian-language text"><span data-dcnode-id="5635" dir="rtl" lang="fa"><span data-dcnode-id="5636" instrument_node="">قالی</span></span></span><span data-dcnode-id="5633" instrument_node="">, lit. "carpet"): large format carpets (190 × 280&nbsp;cm).</span></li><span data-dcnode-id="5631" instrument_node="">
</span><li data-dcnode-id="5613"><i data-dcnode-id="5628"><b data-dcnode-id="5629"><span data-dcnode-id="5630" instrument_node="">Dozar</span></b></i><span data-dcnode-id="5627" instrument_node=""> or </span><i data-dcnode-id="5624"><b data-dcnode-id="5625"><span data-dcnode-id="5626" instrument_node="">Sedjadeh</span></b></i><span data-dcnode-id="5623" instrument_node="">: The term comes from Persian </span><i data-dcnode-id="5621"><span data-dcnode-id="5622" instrument_node="">do</span></i><span data-dcnode-id="5620" instrument_node="">, "two" and </span><i data-dcnode-id="5618"><span data-dcnode-id="5619" instrument_node="">zar</span></i><span data-dcnode-id="5617" instrument_node="">, a Persian measure corresponding to about 105 centimetres (41 </span><a data-dcnode-id="5615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inch" title="Inch"><span data-dcnode-id="5616" instrument_node="">inches</span></a><span data-dcnode-id="5614" instrument_node="">). Carpets of Dozar size are approximately 130–140&nbsp;cm (51–55&nbsp;in) x 200–210&nbsp;cm (79–83&nbsp;in).</span></li><span data-dcnode-id="5612" instrument_node="">
</span><li data-dcnode-id="5603"><i data-dcnode-id="5609"><b data-dcnode-id="5610"><span data-dcnode-id="5611" instrument_node="">Ghalitcheh</span></b></i><span data-dcnode-id="5608" instrument_node=""> (Persian: </span><span data-dcnode-id="5605" title="Persian-language text"><span data-dcnode-id="5606" dir="rtl" lang="fa"><span data-dcnode-id="5607" instrument_node="">قالیچه</span></span></span><span data-dcnode-id="5604" instrument_node="">): Carpet of Dozar format, but woven in very fine quality.</span></li><span data-dcnode-id="5602" instrument_node="">
</span><li data-dcnode-id="5587"><i data-dcnode-id="5599"><b data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node="">Kelleghi</span></b></i><span data-dcnode-id="5598" instrument_node=""> or </span><i data-dcnode-id="5595"><b data-dcnode-id="5596"><span data-dcnode-id="5597" instrument_node="">Kelley</span></b></i><span data-dcnode-id="5594" instrument_node="">&nbsp;: A long format, ca. 150–200&nbsp;cm (59–79&nbsp;in) x 300–600&nbsp;cm (120–240&nbsp;in). This format is traditionally placed at the head of a </span><i data-dcnode-id="5592"><span data-dcnode-id="5593" instrument_node="">ghali</span></i><span data-dcnode-id="5591" instrument_node=""> carpet (</span><i data-dcnode-id="5589"><span data-dcnode-id="5590" instrument_node="">kalleh</span></i><span data-dcnode-id="5588" instrument_node=""> means "head" in Persian).</span></li><span data-dcnode-id="5586" instrument_node="">
</span><li data-dcnode-id="5578"><i data-dcnode-id="5583"><b data-dcnode-id="5584"><span data-dcnode-id="5585" instrument_node="">Kenareh</span></b></i><span data-dcnode-id="5582" instrument_node="">&nbsp;: Smaller long format: 80–120&nbsp;cm (31–47&nbsp;in) × 250–600&nbsp;cm (98–236&nbsp;in). Traditionally laid out along the longer sides of a larger carpet (</span><i data-dcnode-id="5580"><span data-dcnode-id="5581" instrument_node="">kenār</span></i><span data-dcnode-id="5579" instrument_node=""> means "side" in Persian language).</span></li><span data-dcnode-id="5577" instrument_node="">
</span><li data-dcnode-id="5569"><i data-dcnode-id="5574"><b data-dcnode-id="5575"><span data-dcnode-id="5576" instrument_node="">Zaronim</span></b></i><span data-dcnode-id="5573" instrument_node="">&nbsp;: corresponds to 1 ½ </span><i data-dcnode-id="5571"><span data-dcnode-id="5572" instrument_node="">zar</span></i><span data-dcnode-id="5570" instrument_node="">. These smaller rugs are about 150&nbsp;cm (59&nbsp;in) long.</span></li></ul><span data-dcnode-id="5567" instrument_node="">
</span><p data-dcnode-id="5536"><a data-dcnode-id="5565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nomad" title="Nomad"><span data-dcnode-id="5566" instrument_node="">Nomadic</span></a><span data-dcnode-id="5564" instrument_node=""> carpets are also known as </span><i data-dcnode-id="5561"><b data-dcnode-id="5562"><span data-dcnode-id="5563" instrument_node="">Gelim</span></b></i><span data-dcnode-id="5560" instrument_node=""> (</span><span data-dcnode-id="5557" title="Persian-language text"><span data-dcnode-id="5558" dir="rtl" lang="fa"><span data-dcnode-id="5559" instrument_node="">گلیم</span></span></span><span data-dcnode-id="5556" instrument_node="">; including </span><span data-dcnode-id="5552" title="Persian-language text"><span data-dcnode-id="5553" dir="rtl" lang="fa"><a class="new" data-dcnode-id="5554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D%25D8%25B2%25DB%258C%25D9%2584%25D9%2588%26action%3Dedit%26redlink%3D1" title="زیلو (page does not exist)"><span data-dcnode-id="5555" instrument_node="">زیلو</span></a></span></span><span data-dcnode-id="5551" instrument_node=""> </span><i data-dcnode-id="5548"><a class="new" data-dcnode-id="5549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DZilou%26action%3Dedit%26redlink%3D1" title="Zilou (page does not exist)"><span data-dcnode-id="5550" instrument_node="">Zilou</span></a></i><span data-dcnode-id="5547" instrument_node="">, meaning "rough carpet".</span><sup class="reference" data-dcnode-id="5544" id="cite_ref-Savory,_R._1-1"><a data-dcnode-id="5545" href="#cite_note-Savory,_R.-1"><span data-dcnode-id="5546" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5543" instrument_node=""> In this use, Gelim includes both pile rugs and flat weaves (such as </span><a data-dcnode-id="5541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kilim" title="Kilim"><span data-dcnode-id="5542" instrument_node="">kilim</span></a><span data-dcnode-id="5540" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soumak_rug" title="Soumak rug"><span data-dcnode-id="5539" instrument_node="">soumak</span></a><span data-dcnode-id="5537" instrument_node="">).
</span></p><span data-dcnode-id="5535" instrument_node="">
</span><h3 data-dcnode-id="5524"><span data-dcnode-id="5534" id="Field_design.2C_medallions_and_borders"></span><span class="mw-headline" data-dcnode-id="5532" id="Field_design,_medallions_and_borders"><span data-dcnode-id="5533" instrument_node="">Field design, medallions and borders</span></span><span class="mw-editsection" data-dcnode-id="5525"><span class="mw-editsection-bracket" data-dcnode-id="5530"><span data-dcnode-id="5531" instrument_node="">[</span></span><a data-dcnode-id="5528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D38" title="Edit section: Field design, medallions and borders"><span data-dcnode-id="5529" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5526"><span data-dcnode-id="5527" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5523" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5514"><div class="thumbinner" data-dcnode-id="5515" style="width:222px;"><a class="image" data-dcnode-id="5521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AToranj_-_special_circular_design_of_Iranian_carpets.JPG"><img alt="" class="thumbimage" data-dcnode-id="5522" data-file-height="3456" data-file-width="4422" decoding="async" height="172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/93/Toranj_-_special_circular_design_of_Iranian_carpets.JPG/220px-Toranj_-_special_circular_design_of_Iranian_carpets.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/93/Toranj_-_special_circular_design_of_Iranian_carpets.JPG/330px-Toranj_-_special_circular_design_of_Iranian_carpets.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/93/Toranj_-_special_circular_design_of_Iranian_carpets.JPG/440px-Toranj_-_special_circular_design_of_Iranian_carpets.JPG 2x" width="220"></a><span data-dcnode-id="5520" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5516"><div class="magnify" data-dcnode-id="5518"><a class="internal" data-dcnode-id="5519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AToranj_-_special_circular_design_of_Iranian_carpets.JPG" title="Enlarge"></a></div><span data-dcnode-id="5517" instrument_node="">Toranj (medallion) - special circular design of Iranian carpets</span></div></div></div><span data-dcnode-id="5513" instrument_node="">
</span><p data-dcnode-id="5511"><span data-dcnode-id="5512" instrument_node="">Rug design can be described by the way the ornaments are arranged within the pile. One basic design may dominate the entire field, or the surface may be covered by a pattern of repeating figures.
</span></p><p data-dcnode-id="5505"><span data-dcnode-id="5510" instrument_node="">In areas with traditional, time-honoured local designs, such as the Persian nomad tribes, the weaver is able to work from memory, as the specific patterns are part of the family or tribal tradition. This is usually sufficient for less elaborate, mostly rectilinear designs. For more elaborate, especially curvilinear designs, the patterns are carefully drawn to scale in the proper colours on graph paper. The resulting design plan is termed a "cartoon". The weaver weaves a knot for each square on the scale paper, which allows for an accurate rendition of even the most complex designs. Designs have changed little through centuries of weaving. Today computers are used in the production of scale drawings for the weavers.</span><sup class="reference" data-dcnode-id="5507" id="cite_ref-50"><a data-dcnode-id="5508" href="#cite_note-50"><span data-dcnode-id="5509" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5506" instrument_node="">
</span></p><p data-dcnode-id="5475"><span data-dcnode-id="5504" instrument_node="">The surface of the rug is arranged and organized in typical ways, which in all their variety are nevertheless recognizable as Persian: One single, basic design may cover the entire field (</span><b data-dcnode-id="5502"><span data-dcnode-id="5503" instrument_node="">"all-over design"</span></b><span data-dcnode-id="5501" instrument_node="">). When the end of the field is reached, patterns may be cut off intentionally, thus creating the impression that they continue beyond the borders of the rug. This feature is characteristic for Islamic design: In the Islamic tradition, depicting animals or humans is </span><a data-dcnode-id="5499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aniconism_in_Islam" title="Aniconism in Islam"><span data-dcnode-id="5500" instrument_node="">prohibited</span></a><span data-dcnode-id="5498" instrument_node=""> even in a profane context, as Islam does not distinguish between religious and profane life. Since the codification of the </span><a data-dcnode-id="5496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quran" title="Quran"><span data-dcnode-id="5497" instrument_node="">Quran</span></a><span data-dcnode-id="5495" instrument_node=""> by </span><a data-dcnode-id="5493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uthman" title="Uthman"><span data-dcnode-id="5494" instrument_node="">Uthman Ibn Affan</span></a><span data-dcnode-id="5492" instrument_node=""> in 651 AD/19 AH and the </span><a data-dcnode-id="5490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Umayyad_Caliphate" title="Umayyad Caliphate"><span data-dcnode-id="5491" instrument_node="">Umayyad</span></a><span data-dcnode-id="5489" instrument_node=""> </span><a data-dcnode-id="5487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abd_al-Malik_ibn_Marwan" title="Abd al-Malik ibn Marwan"><span data-dcnode-id="5488" instrument_node="">Abd al-Malik ibn Marwan</span></a><span data-dcnode-id="5486" instrument_node=""> reforms, </span><a data-dcnode-id="5484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_art" title="Islamic art"><span data-dcnode-id="5485" instrument_node="">Islamic art</span></a><span data-dcnode-id="5483" instrument_node=""> has focused on writing and ornament. The main fields of Persian rugs are frequently filled with redundant, interwoven ornaments, often in form of elaborate spirals and tendrils in a manner called </span><b data-dcnode-id="5481"><span data-dcnode-id="5482" instrument_node="">infinite repeat</span></b><span data-dcnode-id="5480" instrument_node="">.</span><sup class="reference" data-dcnode-id="5477" id="cite_ref-Erdmann,_1943_51-0"><a data-dcnode-id="5478" href="#cite_note-Erdmann,_1943-51"><span data-dcnode-id="5479" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5476" instrument_node="">
</span></p><p data-dcnode-id="5460"><span data-dcnode-id="5474" instrument_node="">Design elements may also be arranged more elaborately. One typical oriental rug design uses a </span><b data-dcnode-id="5472"><span data-dcnode-id="5473" instrument_node="">medallion</span></b><span data-dcnode-id="5471" instrument_node="">, a symmetrical pattern occupying the center of the field. Parts of the medallion, or similar, corresponding designs, are repeated at the four </span><b data-dcnode-id="5469"><span data-dcnode-id="5470" instrument_node="">corners</span></b><span data-dcnode-id="5468" instrument_node=""> of the field. The common Persian "Lechek Torūnj" (medaillon and corner) design was developed in Persia for book covers and ornamental </span><a data-dcnode-id="5466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_miniature" title="Persian miniature"><span data-dcnode-id="5467" instrument_node="">book illuminations</span></a><span data-dcnode-id="5465" instrument_node=""> in the fifteenth century. In the sixteenth century, it was integrated into carpet designs. More than one medallion may be used, and these may be arranged at intervals over the field in different sizes and shapes. The field of a rug may also be broken up into different rectangular, square, diamond or lozenge shaped compartments, which in turn can be arranged in rows, or diagonally.</span><sup class="reference" data-dcnode-id="5462" id="cite_ref-Ford,_Oriental_Carpet_Design_34-1"><a data-dcnode-id="5463" href="#cite_note-Ford,_Oriental_Carpet_Design-34"><span data-dcnode-id="5464" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5461" instrument_node="">
</span></p><p data-dcnode-id="5454"><span data-dcnode-id="5459" instrument_node="">In contrast to Anatolian rugs, the Persian carpet medaillon represents the primary pattern, and the infinite repeat of the field appears subordinate, creating an impression of the medaillon "floating" on the field.</span><sup class="reference" data-dcnode-id="5456" id="cite_ref-52"><a data-dcnode-id="5457" href="#cite_note-52"><span data-dcnode-id="5458" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5455" instrument_node="">
</span></p><p data-dcnode-id="5440"><span data-dcnode-id="5453" instrument_node="">In most Persian rugs, the field of the rug is surrounded by stripes, or borders. These may number from one up to over ten, but usually there is one wider </span><b data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">main border</span></b><span data-dcnode-id="5450" instrument_node=""> surrounded by minor, or </span><b data-dcnode-id="5448"><span data-dcnode-id="5449" instrument_node="">guardian borders</span></b><span data-dcnode-id="5447" instrument_node="">. The main border is often filled with complex and elaborate rectilinear or curvilinear designs. The minor border stripes show simpler designs like meandering vines. The traditional Persian border arrangement was highly conserved through time, but can also be modified to the effect that the field encroaches on the main border. This feature is often seen in Kerman rugs from the late nineteenth century, and was likely taken over from French </span><a data-dcnode-id="5445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aubusson_tapestry" title="Aubusson tapestry"><span data-dcnode-id="5446" instrument_node="">Aubusson</span></a><span data-dcnode-id="5444" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="5442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Savonnerie" title="Savonnerie"><span data-dcnode-id="5443" instrument_node="">Savonnerie</span></a><span data-dcnode-id="5441" instrument_node=""> weaving designs.
</span></p><p data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">The corner articulations are a particularly challenging part of rug design. The ornaments have to be woven in a way that the pattern continues without interruption around the corners between horizontal and vertical borders. This requires advance planning either by a skilled weaver who is able to plan the design from start, or by a designer who composes a cartoon before the weaving begins. If the ornaments articulate correctly around the corners, the corners are termed to be "resolved", or "reconciled". In village or nomadic rugs, which are usually woven without a detailed advance plan, the corners of the borders are often not resolved. The weaver then discontinues the pattern at a certain stage, e.g., when the lower horizontal border is finished, and starts anew with the vertical borders. The analysis of the corner resolution helps distinguishing rural village, or nomadic, from workshop rugs.
</span></p><span data-dcnode-id="5437" instrument_node="">

</span><h3 data-dcnode-id="5364"><span class="mw-headline" data-dcnode-id="5372" id="Smaller_and_composite_design_elements"><span data-dcnode-id="5373" instrument_node="">Smaller and composite design elements</span></span><span class="mw-editsection" data-dcnode-id="5365"><span class="mw-editsection-bracket" data-dcnode-id="5370"><span data-dcnode-id="5371" instrument_node="">[</span></span><a data-dcnode-id="5368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D39" title="Edit section: Smaller and composite design elements"><span data-dcnode-id="5369" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5366"><span data-dcnode-id="5367" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5363" instrument_node="">
</span><p data-dcnode-id="5348"><span data-dcnode-id="5362" instrument_node="">The field, or sections of it, can also be covered with smaller design elements. The overall impression may be homogeneous, although the design of the elements themselves can be highly complicated. Amongst the repeating figures, the </span><a data-dcnode-id="5359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paisley_%28design%29" title="Paisley (design)"><b data-dcnode-id="5360"><span data-dcnode-id="5361" instrument_node="">boteh</span></b></a><span data-dcnode-id="5358" instrument_node=""> is used throughout the "carpet belt". Boteh can be depicted in curvilinear or rectilinear style. The most elaborate boteh are found in rugs woven around </span><a data-dcnode-id="5356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerman_carpet" title="Kerman carpet"><span data-dcnode-id="5357" instrument_node="">Kerman</span></a><span data-dcnode-id="5355" instrument_node="">. Rugs from </span><a data-dcnode-id="5353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seraband_rug" title="Seraband rug"><span data-dcnode-id="5354" instrument_node="">Seraband</span></a><span data-dcnode-id="5352" instrument_node="">, Hamadan, and Fars sometimes show the boteh in an all-over pattern. Other design elements include ancient motifs like the </span><a data-dcnode-id="5350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tree_of_life" title="Tree of life"><span data-dcnode-id="5351" instrument_node="">Tree of life</span></a><span data-dcnode-id="5349" instrument_node="">, or floral and geometric elements like, e.g., stars or palmettes.
</span></p><p data-dcnode-id="5339"><span data-dcnode-id="5347" instrument_node="">Single design elements can also be arranged in groups, forming a more complex pattern:</span><sup class="reference" data-dcnode-id="5344" id="cite_ref-Edwards,_1952_25-16"><a data-dcnode-id="5345" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="5346" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="5341" id="cite_ref-Ford,_Oriental_Carpet_Design_34-2"><a data-dcnode-id="5342" href="#cite_note-Ford,_Oriental_Carpet_Design-34"><span data-dcnode-id="5343" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5340" instrument_node="">
</span></p><span data-dcnode-id="5338" instrument_node="">
</span><ul data-dcnode-id="5275"><li data-dcnode-id="5330"><span data-dcnode-id="5337" instrument_node="">The </span><b data-dcnode-id="5335"><span data-dcnode-id="5336" instrument_node="">Herati</span></b><span data-dcnode-id="5334" instrument_node=""> pattern consists of a lozenge with floral figure at the corners surrounded by lancet-shaped leaves sometimes called "fish".  Herati patterns are used throughout the "carpet belt"; typically, they are found in the fields of </span><a class="mw-redirect" data-dcnode-id="5332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bidjar_rug" title="Bidjar rug"><span data-dcnode-id="5333" instrument_node="">Bidjar rugs</span></a><span data-dcnode-id="5331" instrument_node="">.</span></li><span data-dcnode-id="5329" instrument_node="">
</span><li data-dcnode-id="5321"><span data-dcnode-id="5328" instrument_node="">The </span><b data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">Mina Khani</span></b><span data-dcnode-id="5325" instrument_node=""> pattern is made up of flowers arranged in a rows, interlinked by diamond (often curved) or circular lines. frequently all over the field. The Mina Khani design is often seen on </span><a class="mw-redirect" data-dcnode-id="5323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Varamin_Carpet" title="Varamin Carpet"><span data-dcnode-id="5324" instrument_node="">Varamin rugs</span></a><span data-dcnode-id="5322" instrument_node="">.</span></li><span data-dcnode-id="5320" instrument_node="">
</span><li data-dcnode-id="5303"><span data-dcnode-id="5319" instrument_node="">The </span><b data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">Shah Abbasi</span></b><span data-dcnode-id="5316" instrument_node=""> design is composed of a group of palmettes. Shah Abbasi motifs are frequently seen in </span><a class="mw-redirect" data-dcnode-id="5314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kashan_rug" title="Kashan rug"><span data-dcnode-id="5315" instrument_node="">Kashan</span></a><span data-dcnode-id="5313" instrument_node="">, </span><a data-dcnode-id="5311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isfahan_rug" title="Isfahan rug"><span data-dcnode-id="5312" instrument_node="">Isfahan</span></a><span data-dcnode-id="5310" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mashhad_rug" title="Mashhad rug"><span data-dcnode-id="5309" instrument_node="">Mashhad</span></a><span data-dcnode-id="5307" instrument_node=""> and </span><a data-dcnode-id="5305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nain_rug" title="Nain rug"><span data-dcnode-id="5306" instrument_node="">Nain</span></a><span data-dcnode-id="5304" instrument_node=""> rugs.</span></li><span data-dcnode-id="5302" instrument_node="">
</span><li data-dcnode-id="5297"><span data-dcnode-id="5301" instrument_node="">The </span><b data-dcnode-id="5299"><span data-dcnode-id="5300" instrument_node="">Bid Majnūn</span></b><span data-dcnode-id="5298" instrument_node="">, or Weeping Willow design is in fact a combination of weeping willow, cypress, poplar and fruit trees in rectilinear form. Its origin was attributed to Kurdish tribes, as the earliest known examples are from the Bidjar area.</span></li><span data-dcnode-id="5296" instrument_node="">
</span><li data-dcnode-id="5282"><span data-dcnode-id="5295" instrument_node="">The </span><b data-dcnode-id="5293"><span data-dcnode-id="5294" instrument_node="">Harshang</span></b><span data-dcnode-id="5292" instrument_node=""> or Crab design takes its name from its principal motive, which is a large oval motive suggesting a crab. The pattern is found all over the rug belt, but bear some resemblance to palmettes from the Safavid period, and the "claws" of the crab may be conventionalized arabesques in rectilinear style. This design was first used in the </span><a data-dcnode-id="5290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greater_Khorasan" title="Greater Khorasan"><span data-dcnode-id="5291" instrument_node="">Khorasan</span></a><span data-dcnode-id="5289" instrument_node=""> district in Persia, and in origin ultimately derives from the </span><a data-dcnode-id="5287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isfahan" title="Isfahan"><span data-dcnode-id="5288" instrument_node="">Isfahan</span></a><span data-dcnode-id="5286" instrument_node=""> ‘in and out’ palmette design.</span><sup class="reference" data-dcnode-id="5283" id="cite_ref-53"><a data-dcnode-id="5284" href="#cite_note-53"><span data-dcnode-id="5285" instrument_node="">[53]</span></a></sup></li><span data-dcnode-id="5281" instrument_node="">
</span><li data-dcnode-id="5276"><span data-dcnode-id="5280" instrument_node="">The </span><b data-dcnode-id="5278"><span data-dcnode-id="5279" instrument_node="">Gol Henai</span></b><span data-dcnode-id="5277" instrument_node=""> small repeating pattern is named after the Henna plant, which it does not much resemble. The plant looks more like the Garden balsam, and in the Western literature is sometimes compared to the blossom of the Horse chestnut.</span></li></ul><span data-dcnode-id="5274" instrument_node="">

</span><h2 data-dcnode-id="5099"><span class="mw-headline" data-dcnode-id="5107" id="Classification"><span data-dcnode-id="5108" instrument_node="">Classification</span></span><span class="mw-editsection" data-dcnode-id="5100"><span class="mw-editsection-bracket" data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">[</span></span><a data-dcnode-id="5103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D40" title="Edit section: Classification"><span data-dcnode-id="5104" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5098" instrument_node="">
</span><p data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">Persian carpets are best classified by the social context of their weavers. Carpets were produced simultaneously by nomadic tribes, in villages, town and court manufactures, for home use, local sale, or export.
</span></p><span data-dcnode-id="5095" instrument_node="">
</span><div data-dcnode-id="5094" style="clear:both;"></div><span data-dcnode-id="5093" instrument_node="">

</span><p data-dcnode-id="5065"><span data-dcnode-id="5080" instrument_node="">Nomadic, or tribal carpets are produced by different ethnic groups with distinct histories and traditions. As the nomadic tribes originally wove carpets mainly for their own use, their designs have maintained much of the tribal traditions. However, during the twentieth century, the nomadic lifestyle was changed to a more sedentary way either voluntarily, or by the forced settlement policy of the last Persian emperors of the </span><a data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pahlavi_dynasty" title="Pahlavi dynasty"><span data-dcnode-id="5079" instrument_node="">Pahlavi dynasty</span></a><span data-dcnode-id="5077" instrument_node="">. By 1970, it was observed that traditional weaving had almost ceased among major nomadic tribes,</span><sup class="reference" data-dcnode-id="5074" id="cite_ref-Opie,_Tribal_Rugs_41-1"><a data-dcnode-id="5075" href="#cite_note-Opie,_Tribal_Rugs-41"><span data-dcnode-id="5076" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="5071" id="cite_ref-Opie,_Tribal_Rugs_of_Southern_Persia_54-0"><a data-dcnode-id="5072" href="#cite_note-Opie,_Tribal_Rugs_of_Southern_Persia-54"><span data-dcnode-id="5073" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5070" instrument_node=""> but in recent years, the tradition has been revived.</span><sup class="reference" data-dcnode-id="5067" id="cite_ref-Opie,_Vegetal_dyes,_Iran_43-2"><a data-dcnode-id="5068" href="#cite_note-Opie,_Vegetal_dyes,_Iran-43"><span data-dcnode-id="5069" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5066" instrument_node="">
