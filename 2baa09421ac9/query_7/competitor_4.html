ment_node="">

</span><div class="thumb tright" data-dcnode-id="8762"><div class="thumbinner" data-dcnode-id="8763" style="width:222px;"><a class="image" data-dcnode-id="8772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKerman_%25E2%2580%2598vase%25E2%2580%2599_carpet_fragment%2C_southeast_Persia%2C_early_17th_century.jpg"><img alt="" class="thumbimage" data-dcnode-id="8773" data-file-height="680" data-file-width="967" decoding="async" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Kerman_%25E2%2580%2598vase%25E2%2580%2599_carpet_fragment%252C_southeast_Persia%252C_early_17th_century.jpg/220px-Kerman_%25E2%2580%2598vase%25E2%2580%2599_carpet_fragment%252C_southeast_Persia%252C_early_17th_century.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Kerman_%E2%80%98vase%E2%80%99_carpet_fragment%2C_southeast_Persia%2C_early_17th_century.jpg/330px-Kerman_%E2%80%98vase%E2%80%99_carpet_fragment%2C_southeast_Persia%2C_early_17th_century.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Kerman_%E2%80%98vase%E2%80%99_carpet_fragment%2C_southeast_Persia%2C_early_17th_century.jpg/440px-Kerman_%E2%80%98vase%E2%80%99_carpet_fragment%2C_southeast_Persia%2C_early_17th_century.jpg 2x" width="220"></a><span data-dcnode-id="8771" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8764"><div class="magnify" data-dcnode-id="8769"><a class="internal" data-dcnode-id="8770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKerman_%25E2%2580%2598vase%25E2%2580%2599_carpet_fragment%2C_southeast_Persia%2C_early_17th_century.jpg" title="Enlarge"></a></div><span data-dcnode-id="8768" instrument_node="">Safavid </span><a data-dcnode-id="8766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerman" title="Kerman"><span data-dcnode-id="8767" instrument_node="">Kerman</span></a><span data-dcnode-id="8765" instrument_node=""> ‘vase’ carpet fragment, southeast Persia, early 17th century</span></div></div></div><span data-dcnode-id="8761" instrument_node="">
</span><p data-dcnode-id="8690"><span data-dcnode-id="8760" instrument_node="">A </span><b data-dcnode-id="8758"><span data-dcnode-id="8759" instrument_node="">Persian carpet</span></b><span data-dcnode-id="8757" instrument_node=""> (</span><a data-dcnode-id="8755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_language" title="Persian language"><span data-dcnode-id="8756" instrument_node="">Persian</span></a><span data-dcnode-id="8754" instrument_node="">: </span><span data-dcnode-id="8752" dir="rtl" lang="fa"><span data-dcnode-id="8753" instrument_node="">فرش ايرانى</span></span><span data-dcnode-id="8751" instrument_node="">, </span><small data-dcnode-id="8747"><a data-dcnode-id="8749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanization_of_Persian" title="Romanization of Persian"><span data-dcnode-id="8750" instrument_node="">romanized</span></a><span data-dcnode-id="8748" instrument_node="">:&nbsp;</span></small><span data-dcnode-id="8744" title="Persian-language romanization"><i data-dcnode-id="8745" lang="fa-Latn"><span data-dcnode-id="8746" instrument_node="">farš-e irâni</span></i></span><span data-dcnode-id="8743" instrument_node=""> </span><small data-dcnode-id="8742"></small><span class="IPA" data-dcnode-id="8739" title="Representation in the International Phonetic Alphabet (IPA)"><a data-dcnode-id="8740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AIPA/Persian" title="Help:IPA/Persian"><span data-dcnode-id="8741" instrument_node="">[ˈfærʃe ʔiːɾɒːˈniː]</span></a></span><span data-dcnode-id="8738" instrument_node="">) or </span><b data-dcnode-id="8736"><span data-dcnode-id="8737" instrument_node="">Persian rug</span></b><span data-dcnode-id="8735" instrument_node=""> (</span><a data-dcnode-id="8733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_language" title="Persian language"><span data-dcnode-id="8734" instrument_node="">Persian</span></a><span data-dcnode-id="8732" instrument_node="">: </span><span data-dcnode-id="8730" dir="rtl" lang="fa"><span data-dcnode-id="8731" instrument_node="">قالی ايرانى</span></span><span data-dcnode-id="8729" instrument_node="">, </span><small data-dcnode-id="8725"><a data-dcnode-id="8727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanization_of_Persian" title="Romanization of Persian"><span data-dcnode-id="8728" instrument_node="">romanized</span></a><span data-dcnode-id="8726" instrument_node="">:&nbsp;</span></small><span data-dcnode-id="8722" title="Persian-language romanization"><i data-dcnode-id="8723" lang="fa-Latn"><span data-dcnode-id="8724" instrument_node="">qâli-ye irâni</span></i></span><span data-dcnode-id="8721" instrument_node=""> </span><small data-dcnode-id="8720"></small><span class="IPA" data-dcnode-id="8717" title="Representation in the International Phonetic Alphabet (IPA)"><a data-dcnode-id="8718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AIPA/Persian" title="Help:IPA/Persian"><span data-dcnode-id="8719" instrument_node="">[ɢɒːˈliːje ʔiːɾɒːˈniː]</span></a></span><span data-dcnode-id="8716" instrument_node="">),</span><sup class="reference" data-dcnode-id="8713" id="cite_ref-Savory,_R._1-0"><a data-dcnode-id="8714" href="#cite_note-Savory,_R.-1"><span data-dcnode-id="8715" instrument_node="">[1]</span></a></sup><span data-dcnode-id="8712" instrument_node=""> also known as </span><b data-dcnode-id="8710"><span data-dcnode-id="8711" instrument_node="">Iranian carpet</span></b><span data-dcnode-id="8709" instrument_node="">, is a heavy textile made for a wide variety of utilitarian and symbolic purposes and produced in </span><a data-dcnode-id="8707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="8708" instrument_node="">Iran</span></a><span data-dcnode-id="8706" instrument_node=""> (historically known as </span><a data-dcnode-id="8704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Name_of_Iran" title="Name of Iran"><span data-dcnode-id="8705" instrument_node="">Persia</span></a><span data-dcnode-id="8703" instrument_node="">), for home use, local sale, and export. Carpet weaving is an essential part of </span><a class="mw-redirect" data-dcnode-id="8701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_culture" title="Persian culture"><span data-dcnode-id="8702" instrument_node="">Persian culture</span></a><span data-dcnode-id="8700" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_art" title="Iranian art"><span data-dcnode-id="8699" instrument_node="">Iranian art</span></a><span data-dcnode-id="8697" instrument_node="">. Within the group of </span><a data-dcnode-id="8695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oriental_rug" title="Oriental rug"><span data-dcnode-id="8696" instrument_node="">Oriental rugs</span></a><span data-dcnode-id="8694" instrument_node=""> produced by the countries of the </span><b data-dcnode-id="8692"><span data-dcnode-id="8693" instrument_node="">"rug belt"</span></b><span data-dcnode-id="8691" instrument_node="">, the Persian carpet stands out by the variety and elaborateness of its manifold designs.
</span></p><p data-dcnode-id="8670"><span data-dcnode-id="8689" instrument_node="">Persian rugs and carpets of various types were woven in parallel by nomadic tribes in village and town workshops, and by </span><a data-dcnode-id="8687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_court" title="Royal court"><span data-dcnode-id="8688" instrument_node="">royal court</span></a><span data-dcnode-id="8686" instrument_node=""> manufactories alike. As such, they represent miscellaneous, simultaneous lines of tradition, and reflect the </span><a data-dcnode-id="8684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_Iran" title="History of Iran"><span data-dcnode-id="8685" instrument_node="">history of Iran</span></a><span data-dcnode-id="8683" instrument_node="">, </span><a data-dcnode-id="8681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Culture_of_Iran" title="Culture of Iran"><span data-dcnode-id="8682" instrument_node="">Persian culture</span></a><span data-dcnode-id="8680" instrument_node="">, and its various peoples. The carpets woven in the </span><a class="mw-redirect" data-dcnode-id="8678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safavid_Empire" title="Safavid Empire"><span data-dcnode-id="8679" instrument_node="">Safavid</span></a><span data-dcnode-id="8677" instrument_node=""> court manufactories of </span><a data-dcnode-id="8675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isfahan" title="Isfahan"><span data-dcnode-id="8676" instrument_node="">Isfahan</span></a><span data-dcnode-id="8674" instrument_node=""> during the </span><a data-dcnode-id="8672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/16th_century" title="16th century"><span data-dcnode-id="8673" instrument_node="">sixteenth century</span></a><span data-dcnode-id="8671" instrument_node=""> are famous for their elaborate colors and artistical design, and are treasured in museums and private collections all over the world today. Their patterns and designs have set an artistic tradition for court manufactories which was kept alive during the entire duration of the Persian Empire up to the last royal dynasty of Iran.
</span></p><p data-dcnode-id="8635"><span data-dcnode-id="8669" instrument_node="">Carpets woven in towns and regional centers like </span><a data-dcnode-id="8667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tabriz_rug" title="Tabriz rug"><span data-dcnode-id="8668" instrument_node="">Tabriz</span></a><span data-dcnode-id="8666" instrument_node="">, </span><a data-dcnode-id="8664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerman_carpet" title="Kerman carpet"><span data-dcnode-id="8665" instrument_node="">Kerman</span></a><span data-dcnode-id="8663" instrument_node="">, </span><a data-dcnode-id="8661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ravar" title="Ravar"><span data-dcnode-id="8662" instrument_node="">Ravar</span></a><span data-dcnode-id="8660" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neyshabour" title="Neyshabour"><span data-dcnode-id="8659" instrument_node="">Neyshabour</span></a><span data-dcnode-id="8657" instrument_node="">, </span><a data-dcnode-id="8655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mashhad" title="Mashhad"><span data-dcnode-id="8656" instrument_node="">Mashhad</span></a><span data-dcnode-id="8654" instrument_node="">, </span><a data-dcnode-id="8652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kashan" title="Kashan"><span data-dcnode-id="8653" instrument_node="">Kashan</span></a><span data-dcnode-id="8651" instrument_node="">, </span><a data-dcnode-id="8649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isfahan_rug" title="Isfahan rug"><span data-dcnode-id="8650" instrument_node="">Isfahan</span></a><span data-dcnode-id="8648" instrument_node="">, </span><a data-dcnode-id="8646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nain_rug" title="Nain rug"><span data-dcnode-id="8647" instrument_node="">Nain</span></a><span data-dcnode-id="8645" instrument_node=""> and </span><a data-dcnode-id="8643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qom_rug" title="Qom rug"><span data-dcnode-id="8644" instrument_node="">Qom</span></a><span data-dcnode-id="8642" instrument_node=""> are characterized by their specific weaving techniques and use of high-quality materials, colours and patterns. Town manufactories like those of </span><a data-dcnode-id="8640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tabriz" title="Tabriz"><span data-dcnode-id="8641" instrument_node="">Tabriz</span></a><span data-dcnode-id="8639" instrument_node=""> have played an important historical role in reviving the tradition of carpet weaving after periods of decline. Rugs woven by the villages and various tribes of Iran are distinguished by their fine wool, bright and elaborate colours, and specific, traditional patterns. Nomadic and small village weavers often produce rugs with bolder and sometimes more coarse designs, which are considered as the most authentic and traditional rugs of Persia, as opposed to the artistic, pre-planned designs of the larger workplaces. </span><a data-dcnode-id="8637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gabbeh" title="Gabbeh"><span data-dcnode-id="8638" instrument_node="">Gabbeh</span></a><span data-dcnode-id="8636" instrument_node=""> rugs are the best-known type of carpet from this line of tradition.
</span></p><p data-dcnode-id="8624"><span data-dcnode-id="8634" instrument_node="">As a result of political unrest or commercial pressure, carpet weaving has gone through periods of decline throughout the decades. It particularly suffered from the introduction of synthetic dyes during the second half of the </span><a data-dcnode-id="8632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/19th_century" title="19th century"><span data-dcnode-id="8633" instrument_node="">nineteenth century</span></a><span data-dcnode-id="8631" instrument_node="">. Carpet weaving still plays a critical role in the economy of modern Iran. Modern production is characterized by the revival of traditional dyeing with </span><a data-dcnode-id="8629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_dye" title="Natural dye"><span data-dcnode-id="8630" instrument_node="">natural dyes</span></a><span data-dcnode-id="8628" instrument_node="">, the reintroduction of traditional tribal patterns, but also by the invention of modern and innovative designs, woven in the centuries-old technique. Hand-woven Persian rugs and carpets have been regarded as objects of high artistic and utilitarian value and prestige since the first time they were mentioned by </span><a data-dcnode-id="8626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Greek" title="Ancient Greek"><span data-dcnode-id="8627" instrument_node="">ancient Greek</span></a><span data-dcnode-id="8625" instrument_node=""> writers.
</span></p><p data-dcnode-id="8613"><span data-dcnode-id="8623" instrument_node="">Although the term "Persian carpet" most often refers to pile-woven textiles, flat-woven carpets and rugs like </span><a data-dcnode-id="8621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kilim" title="Kilim"><span data-dcnode-id="8622" instrument_node="">Kilim</span></a><span data-dcnode-id="8620" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soumak_rug" title="Soumak rug"><span data-dcnode-id="8619" instrument_node="">Soumak</span></a><span data-dcnode-id="8617" instrument_node="">, and embroidered tissues like </span><a data-dcnode-id="8615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suzani_%28textile%29" title="Suzani (textile)"><span data-dcnode-id="8616" instrument_node="">Suzani</span></a><span data-dcnode-id="8614" instrument_node=""> are part of the rich and manifold tradition of Persian carpet weaving.
</span></p><p data-dcnode-id="8595"><span data-dcnode-id="8612" instrument_node="">In 2010, the "traditional skills of carpet weaving" in </span><a class="mw-redirect" data-dcnode-id="8610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fars_Province" title="Fars Province"><span data-dcnode-id="8611" instrument_node="">Fars Province</span></a><span data-dcnode-id="8609" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kashan_rug" title="Kashan rug"><span data-dcnode-id="8608" instrument_node="">Kashan</span></a><span data-dcnode-id="8606" instrument_node=""> were inscribed to the </span><a data-dcnode-id="8604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO_Intangible_Cultural_Heritage_Lists" title="UNESCO Intangible Cultural Heritage Lists"><span data-dcnode-id="8605" instrument_node="">UNESCO Intangible Cultural Heritage Lists</span></a><span data-dcnode-id="8603" instrument_node="">.</span><sup class="reference" data-dcnode-id="8600" id="cite_ref-2"><a data-dcnode-id="8601" href="#cite_note-2"><span data-dcnode-id="8602" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="8597" id="cite_ref-3"><a data-dcnode-id="8598" href="#cite_note-3"><span data-dcnode-id="8599" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8596" instrument_node="">

</span><h2 data-dcnode-id="8000"><span class="mw-headline" data-dcnode-id="8008" id="History"><span data-dcnode-id="8009" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="8001"><span class="mw-editsection-bracket" data-dcnode-id="8006"><span data-dcnode-id="8007" instrument_node="">[</span></span><a data-dcnode-id="8004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="8005" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8002"><span data-dcnode-id="8003" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7999" instrument_node="">
</span><p data-dcnode-id="7974"><span data-dcnode-id="7998" instrument_node="">The beginning of carpet weaving remains unknown, as carpets are subject to use, deterioration, and destruction by insects and rodents. Woven rugs probably developed from earlier floor coverings, made of </span><b data-dcnode-id="7995"><a data-dcnode-id="7996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Felt" title="Felt"><span data-dcnode-id="7997" instrument_node="">felt</span></a></b><span data-dcnode-id="7994" instrument_node="">, or a technique known as "</span><b data-dcnode-id="7992"><span data-dcnode-id="7993" instrument_node="">flat weaving</span></b><span data-dcnode-id="7991" instrument_node="">".</span><sup class="reference" data-dcnode-id="7988" id="cite_ref-4"><a data-dcnode-id="7989" href="#cite_note-4"><span data-dcnode-id="7990" instrument_node="">[4]</span></a></sup><span data-dcnode-id="7987" instrument_node=""> Flat-woven rugs are made by tightly interweaving the </span><a data-dcnode-id="7985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warp_and_weft" title="Warp and weft"><span data-dcnode-id="7986" instrument_node="">warp and weft</span></a><span data-dcnode-id="7984" instrument_node=""> strands of the weave to produce a flat surface with no pile. The technique of weaving carpets further developed into a technique known as </span><b data-dcnode-id="7982"><span data-dcnode-id="7983" instrument_node="">loop weaving</span></b><span data-dcnode-id="7981" instrument_node="">. Loop weaving is done by pulling the weft strings over a gauge rod, creating loops of thread facing the weaver. The rod is then either removed, leaving the loops closed, or the loops are cut over the protecting rod, resulting in a rug very similar to a genuine </span><a class="mw-redirect" data-dcnode-id="7979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pile_rug" title="Pile rug"><span data-dcnode-id="7980" instrument_node="">pile rug</span></a><span data-dcnode-id="7978" instrument_node="">. Hand-woven pile rugs are produced by knotting strings of thread individually into the warps, cutting the </span><a data-dcnode-id="7976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pile_%28textile%29" title="Pile (textile)"><span data-dcnode-id="7977" instrument_node="">thread</span></a><span data-dcnode-id="7975" instrument_node=""> after each single knot.
</span></p><span data-dcnode-id="7973" instrument_node="">
</span><h3 data-dcnode-id="7963"><span class="mw-headline" data-dcnode-id="7971" id="The_Pazyryk_carpet:_Earliest_pile-woven_carpet"><span data-dcnode-id="7972" instrument_node="">The Pazyryk carpet: Earliest pile-woven carpet</span></span><span class="mw-editsection" data-dcnode-id="7964"><span class="mw-editsection-bracket" data-dcnode-id="7969"><span data-dcnode-id="7970" instrument_node="">[</span></span><a data-dcnode-id="7967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D2" title="Edit section: The Pazyryk carpet: Earliest pile-woven carpet"><span data-dcnode-id="7968" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7965"><span data-dcnode-id="7966" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7962" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7948"><div class="thumbinner" data-dcnode-id="7949" style="width:222px;"><a class="image" data-dcnode-id="7960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APazyryk_carpet.jpg"><img alt="" class="thumbimage" data-dcnode-id="7961" data-file-height="564" data-file-width="600" decoding="async" height="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Pazyryk_carpet.jpg/220px-Pazyryk_carpet.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Pazyryk_carpet.jpg/330px-Pazyryk_carpet.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Pazyryk_carpet.jpg/440px-Pazyryk_carpet.jpg 2x" width="220"></a><span data-dcnode-id="7959" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7950"><div class="magnify" data-dcnode-id="7957"><a class="internal" data-dcnode-id="7958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APazyryk_carpet.jpg" title="Enlarge"></a></div><span data-dcnode-id="7956" instrument_node="">The </span><a data-dcnode-id="7954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pazyryk_burials%23Pazyryk_carpet" title="Pazyryk burials"><span data-dcnode-id="7955" instrument_node="">Pazyryk Carpet</span></a><span data-dcnode-id="7953" instrument_node="">. Circa 400 BC. </span><a data-dcnode-id="7951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hermitage_Museum" title="Hermitage Museum"><span data-dcnode-id="7952" instrument_node="">Hermitage Museum</span></a></div></div></div><span data-dcnode-id="7947" instrument_node="">
</span><p data-dcnode-id="7904"><span data-dcnode-id="7946" instrument_node="">The </span><a data-dcnode-id="7944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pazyryk_culture" title="Pazyryk culture"><span data-dcnode-id="7945" instrument_node="">Pazyryk</span></a><span data-dcnode-id="7943" instrument_node=""> carpet was excavated in 1949 from the grave of a </span><a data-dcnode-id="7941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scythia" title="Scythia"><span data-dcnode-id="7942" instrument_node="">Scythian</span></a><span data-dcnode-id="7940" instrument_node=""> nobleman in the Pazyryk Valley of the </span><a data-dcnode-id="7938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Altai_Mountains" title="Altai Mountains"><span data-dcnode-id="7939" instrument_node="">Altai Mountains</span></a><span data-dcnode-id="7937" instrument_node=""> in </span><a data-dcnode-id="7935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Siberia" title="Siberia"><span data-dcnode-id="7936" instrument_node="">Siberia</span></a><span data-dcnode-id="7934" instrument_node="">. Radiocarbon testing indicated that the Pazyryk carpet was woven in the 5th century BC.</span><sup class="reference" data-dcnode-id="7931" id="cite_ref-Haider,_R._5-0"><a data-dcnode-id="7932" href="#cite_note-Haider,_R.-5"><span data-dcnode-id="7933" instrument_node="">[5]</span></a></sup><span data-dcnode-id="7930" instrument_node=""> This carpet is 183 by 200 centimetres (72 by 79 inches) and has 36 symmetrical </span><a data-dcnode-id="7928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Knot_density" title="Knot density"><span data-dcnode-id="7929" instrument_node="">knots per</span></a><span data-dcnode-id="7927" instrument_node=""> cm</span><sup data-dcnode-id="7925"><span data-dcnode-id="7926" instrument_node="">2</span></sup><span data-dcnode-id="7924" instrument_node=""> (232 per inch</span><sup data-dcnode-id="7922"><span data-dcnode-id="7923" instrument_node="">2</span></sup><span data-dcnode-id="7921" instrument_node="">).</span><sup class="reference" data-dcnode-id="7918" id="cite_ref-6"><a data-dcnode-id="7919" href="#cite_note-6"><span data-dcnode-id="7920" instrument_node="">[6]</span></a></sup><span data-dcnode-id="7917" instrument_node=""> The advanced technique used in the Pazyryk carpet indicates a long history of evolution and experience in weaving. It is considered the oldest known carpet in the world.</span><sup class="reference" data-dcnode-id="7914" id="cite_ref-7"><a data-dcnode-id="7915" href="#cite_note-7"><span data-dcnode-id="7916" instrument_node="">[7]</span></a></sup><span data-dcnode-id="7913" instrument_node=""> Its central field is a deep red color and it has two animal frieze borders proceeding in opposite directions accompanied by guard stripes. The inner main border depicts a procession of deer, the outer men on horses, and men leading horses. The horse saddlecloths are woven in different designs. The inner field contains 4 × 6 identical square frames arranged in rows on a red ground, each filled by identical, star-shaped ornaments made up by centrally overlapping x- and cross-shaped patterns. The design of the carpet already shows the basic arrangement of what was to become the standard oriental carpet design: A field with repeating patterns, framed by a main border in elaborate design, and several secondary borders.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7906" style="white-space:nowrap;"><span data-dcnode-id="7912" instrument_node="">[</span><i data-dcnode-id="7908"><a data-dcnode-id="7909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7910" title="This claim needs references to reliable sources. (September 2021)"><span data-dcnode-id="7911" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7907" instrument_node="">]</span></sup><span data-dcnode-id="7905" instrument_node="">
</span></p><p data-dcnode-id="7882"><span data-dcnode-id="7903" instrument_node="">The discoverer of the Pazyryk carpet, </span><a data-dcnode-id="7901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergei_Rudenko" title="Sergei Rudenko"><span data-dcnode-id="7902" instrument_node="">Sergei Rudenko</span></a><span data-dcnode-id="7900" instrument_node="">, assumed it to be a product of the contemporary </span><a data-dcnode-id="7898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achaemenid_Empire" title="Achaemenid Empire"><span data-dcnode-id="7899" instrument_node="">Achaemenids</span></a><span data-dcnode-id="7897" instrument_node="">.</span><sup class="reference" data-dcnode-id="7894" id="cite_ref-8"><a data-dcnode-id="7895" href="#cite_note-8"><span data-dcnode-id="7896" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="7891" id="cite_ref-9"><a data-dcnode-id="7892" href="#cite_note-9"><span data-dcnode-id="7893" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7890" instrument_node="">  Whether it was produced in the region where it was found, or is a product of Achaemenid manufacture, remains subject to debate.</span><sup class="reference" data-dcnode-id="7887" id="cite_ref-10"><a data-dcnode-id="7888" href="#cite_note-10"><span data-dcnode-id="7889" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="7884" id="cite_ref-11"><a data-dcnode-id="7885" href="#cite_note-11"><span data-dcnode-id="7886" instrument_node="">[11]</span></a></sup><span data-dcnode-id="7883" instrument_node=""> Its fine weaving and elaborate pictorial design hint at an advanced state of the art of carpet weaving at the time of its production.
</span></p><span data-dcnode-id="7881" instrument_node="">
</span><h3 data-dcnode-id="7871"><span class="mw-headline" data-dcnode-id="7879" id="Early_fragments"><span data-dcnode-id="7880" instrument_node="">Early fragments</span></span><span class="mw-editsection" data-dcnode-id="7872"><span class="mw-editsection-bracket" data-dcnode-id="7877"><span data-dcnode-id="7878" instrument_node="">[</span></span><a data-dcnode-id="7875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D3" title="Edit section: Early fragments"><span data-dcnode-id="7876" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7873"><span data-dcnode-id="7874" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7870" instrument_node="">
</span><p data-dcnode-id="7853"><span data-dcnode-id="7869" instrument_node="">There are documentary records of carpets being used by the ancient Greeks. </span><a data-dcnode-id="7867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homer" title="Homer"><span data-dcnode-id="7868" instrument_node="">Homer</span></a><span data-dcnode-id="7866" instrument_node="">, assumed to have lived around 850 BC, writes in </span><a data-dcnode-id="7864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iliad" title="Iliad"><span data-dcnode-id="7865" instrument_node="">Ilias</span></a><span data-dcnode-id="7863" instrument_node=""> XVII,350 that the body of Patroklos is covered with a "splendid carpet". In </span><a data-dcnode-id="7861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Odyssey" title="Odyssey"><span data-dcnode-id="7862" instrument_node="">Odyssey</span></a><span data-dcnode-id="7860" instrument_node=""> Book VII and X "carpets" are mentioned. </span><a data-dcnode-id="7858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pliny_the_Elder" title="Pliny the Elder"><span data-dcnode-id="7859" instrument_node="">Pliny the Elder</span></a><span data-dcnode-id="7857" instrument_node=""> wrote (</span><a data-dcnode-id="7855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_History_%28Pliny%29" title="Natural History (Pliny)"><span data-dcnode-id="7856" instrument_node="">nat. VIII, 48</span></a><span data-dcnode-id="7854" instrument_node="">) that carpets ("polymita") were invented in Alexandria. It is unknown whether these were flatweaves or pile weaves, as no detailed technical information is provided in the Greek and Latin texts.
</span></p><p data-dcnode-id="7818"><span data-dcnode-id="7852" instrument_node="">Flat-woven </span><a data-dcnode-id="7850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kilim" title="Kilim"><span data-dcnode-id="7851" instrument_node="">kilims</span></a><span data-dcnode-id="7849" instrument_node=""> dating to at least the fourth or fifth century AD were found in </span><a class="mw-redirect" data-dcnode-id="7847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turfan" title="Turfan"><span data-dcnode-id="7848" instrument_node="">Turfan</span></a><span data-dcnode-id="7846" instrument_node="">, </span><a data-dcnode-id="7844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hotan" title="Hotan"><span data-dcnode-id="7845" instrument_node="">Hotan prefecture</span></a><span data-dcnode-id="7843" instrument_node="">, East Turkestan, China, an area which still produces carpets today. Rug fragments were also found in the </span><a data-dcnode-id="7841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lop_Nur" title="Lop Nur"><span data-dcnode-id="7842" instrument_node="">Lop Nur</span></a><span data-dcnode-id="7840" instrument_node=""> area, and are woven in symmetrical knots, with 5-7 interwoven wefts after each row of knots, with a striped design, and various colours. They are now in the Victoria and Albert Museum, London.</span><sup class="reference" data-dcnode-id="7837" id="cite_ref-Spuhler_Carpets_Islamic_Museum_Berlin_12-0"><a data-dcnode-id="7838" href="#cite_note-Spuhler_Carpets_Islamic_Museum_Berlin-12"><span data-dcnode-id="7839" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7836" instrument_node=""> Other fragments woven in symmetrical as well as asymmetrical knots have been found in </span><a data-dcnode-id="7834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dura-Europos" title="Dura-Europos"><span data-dcnode-id="7835" instrument_node="">Dura-Europos</span></a><span data-dcnode-id="7833" instrument_node=""> in </span><a data-dcnode-id="7831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syria" title="Syria"><span data-dcnode-id="7832" instrument_node="">Syria</span></a><span data-dcnode-id="7830" instrument_node="">,</span><sup class="reference" data-dcnode-id="7827" id="cite_ref-Dura-Europos_13-0"><a data-dcnode-id="7828" href="#cite_note-Dura-Europos-13"><span data-dcnode-id="7829" instrument_node="">[13]</span></a></sup><span data-dcnode-id="7826" instrument_node=""> and from the At-Tar caves in </span><a data-dcnode-id="7824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraq" title="Iraq"><span data-dcnode-id="7825" instrument_node="">Iraq</span></a><span data-dcnode-id="7823" instrument_node="">,</span><sup class="reference" data-dcnode-id="7820" id="cite_ref-At-Tar_14-0"><a data-dcnode-id="7821" href="#cite_note-At-Tar-14"><span data-dcnode-id="7822" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7819" instrument_node=""> dated to the first centuries AD.
</span></p><p data-dcnode-id="7816"><span data-dcnode-id="7817" instrument_node="">These rare findings demonstrate that all the skills and techniques of dyeing and carpet weaving were already known in western Asia before the first century AD.
</span></p><span data-dcnode-id="7815" instrument_node="">
</span><h3 data-dcnode-id="7804"><span data-dcnode-id="7814" id="Early_history:_circa_500_BC_.E2.80.93_200_AD"></span><span class="mw-headline" data-dcnode-id="7812" id="Early_history:_circa_500_BC_–_200_AD"><span data-dcnode-id="7813" instrument_node="">Early history: circa 500 BC – 200 AD</span></span><span class="mw-editsection" data-dcnode-id="7805"><span class="mw-editsection-bracket" data-dcnode-id="7810"><span data-dcnode-id="7811" instrument_node="">[</span></span><a data-dcnode-id="7808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D4" title="Edit section: Early history: circa 500 BC – 200 AD"><span data-dcnode-id="7809" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7806"><span data-dcnode-id="7807" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7803" instrument_node="">
</span><p data-dcnode-id="7795"><span data-dcnode-id="7802" instrument_node="">Persian carpets were first mentioned around 400 BC, by the Greek author </span><a data-dcnode-id="7800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xenophon" title="Xenophon"><span data-dcnode-id="7801" instrument_node="">Xenophon</span></a><span data-dcnode-id="7799" instrument_node=""> in his book "</span><a data-dcnode-id="7797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anabasis_%28Xenophon%29" title="Anabasis (Xenophon)"><span data-dcnode-id="7798" instrument_node="">Anabasis</span></a><span data-dcnode-id="7796" instrument_node="">":
</span></p><span data-dcnode-id="7794" instrument_node="">
</span><blockquote data-dcnode-id="7776"><p data-dcnode-id="7792"><span data-dcnode-id="7793" instrument_node="">"αὖθις δὲ Τιμασίωνι τῷ Δαρδανεῖ προσελθών, ἐπεὶ ἤκουσεν αὐτῷ εἶναι καὶ ἐκπώματα καὶ τάπιδας βαρβαρικάς", (Xen. anab. VII.3.18)
</span></p><dl data-dcnode-id="7788"><dd data-dcnode-id="7789"><i data-dcnode-id="7790"><span data-dcnode-id="7791" instrument_node="">Next he went to Timasion the Dardanian, for he heard that he had some Persian drinking cups and carpets.</span></i></dd></dl><span data-dcnode-id="7787" instrument_node="">
</span><p data-dcnode-id="7785"><span data-dcnode-id="7786" instrument_node="">"καὶ Τιμασίων προπίνων ἐδωρήσατο φιάλην τε ἀργυρᾶν καὶ τάπιδα ἀξίαν δέκα μνῶν." [Xen. anab. VII.3.27]
</span></p><span data-dcnode-id="7784" instrument_node="">
</span><dl data-dcnode-id="7777"><dd data-dcnode-id="7778"><i data-dcnode-id="7782"><span data-dcnode-id="7783" instrument_node="">Timasion also drank his health and presented him with a silver bowl and a carpet worth ten mines.</span></i><sup class="reference" data-dcnode-id="7779" id="cite_ref-15"><a data-dcnode-id="7780" href="#cite_note-15"><span data-dcnode-id="7781" instrument_node="">[15]</span></a></sup></dd></dl></blockquote><span data-dcnode-id="7775" instrument_node="">
</span><p data-dcnode-id="7767"><span data-dcnode-id="7774" instrument_node="">Xenophon describes Persian carpets as precious, and worthy to be used as diplomatic gifts. It is unknown if these carpets were pile-woven, or produced by another technique, e.g., </span><a data-dcnode-id="7772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kilim" title="Kilim"><span data-dcnode-id="7773" instrument_node="">flat-weaving</span></a><span data-dcnode-id="7771" instrument_node="">, or </span><a data-dcnode-id="7769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embroidery" title="Embroidery"><span data-dcnode-id="7770" instrument_node="">embroidery</span></a><span data-dcnode-id="7768" instrument_node="">, but it is interesting that the very first reference to Persian carpets in the world literature already puts them into a context of luxury, prestige, and diplomacy.
</span></p><p data-dcnode-id="7756"><span data-dcnode-id="7766" instrument_node="">There are no surviving Persian carpets from the reigns of the </span><a data-dcnode-id="7764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achaemenid_Empire" title="Achaemenid Empire"><span data-dcnode-id="7765" instrument_node="">Achaemenian</span></a><span data-dcnode-id="7763" instrument_node=""> (553–330 BC), </span><a data-dcnode-id="7761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seleucid_Empire" title="Seleucid Empire"><span data-dcnode-id="7762" instrument_node="">Seleucid</span></a><span data-dcnode-id="7760" instrument_node=""> (312–129 BC), and </span><a data-dcnode-id="7758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parthian_Empire" title="Parthian Empire"><span data-dcnode-id="7759" instrument_node="">Parthian</span></a><span data-dcnode-id="7757" instrument_node=""> (ca. 170 BC – 226 AD) kings.
</span></p><span data-dcnode-id="7755" instrument_node="">
</span><h3 data-dcnode-id="7744"><span data-dcnode-id="7754" id="The_Sasanian_Empire:_224.E2.80.93651"></span><span class="mw-headline" data-dcnode-id="7752" id="The_Sasanian_Empire:_224–651"><span data-dcnode-id="7753" instrument_node="">The Sasanian Empire: 224–651</span></span><span class="mw-editsection" data-dcnode-id="7745"><span class="mw-editsection-bracket" data-dcnode-id="7750"><span data-dcnode-id="7751" instrument_node="">[</span></span><a data-dcnode-id="7748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D5" title="Edit section: The Sasanian Empire: 224–651"><span data-dcnode-id="7749" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7746"><span data-dcnode-id="7747" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7743" instrument_node="">
</span><p data-dcnode-id="7719"><span data-dcnode-id="7742" instrument_node="">The </span><a data-dcnode-id="7740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sasanian_Empire" title="Sasanian Empire"><span data-dcnode-id="7741" instrument_node="">Sasanian Empire</span></a><span data-dcnode-id="7739" instrument_node="">, which succeeded the </span><a data-dcnode-id="7737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parthian_Empire" title="Parthian Empire"><span data-dcnode-id="7738" instrument_node="">Parthian Empire</span></a><span data-dcnode-id="7736" instrument_node="">, was recognized as one of the leading powers of its time, alongside its neighbouring </span><a data-dcnode-id="7734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byzantine_Empire" title="Byzantine Empire"><span data-dcnode-id="7735" instrument_node="">Byzantine Empire</span></a><span data-dcnode-id="7733" instrument_node="">, for a period of more than 400 years.</span><sup class="reference" data-dcnode-id="7730" id="cite_ref-16"><a data-dcnode-id="7731" href="#cite_note-16"><span data-dcnode-id="7732" instrument_node="">[16]</span></a></sup><span data-dcnode-id="7729" instrument_node=""> The Sasanids established their empire roughly within the borders set by the Achaemenids, with the capital at </span><a data-dcnode-id="7727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ctesiphon" title="Ctesiphon"><span data-dcnode-id="7728" instrument_node="">Ctesiphon</span></a><span data-dcnode-id="7726" instrument_node="">. This last Persian dynasty before the arrival of </span><a data-dcnode-id="7724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam" title="Islam"><span data-dcnode-id="7725" instrument_node="">Islam</span></a><span data-dcnode-id="7723" instrument_node=""> adopted </span><a data-dcnode-id="7721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zoroastrianism" title="Zoroastrianism"><span data-dcnode-id="7722" instrument_node="">Zoroastrianism</span></a><span data-dcnode-id="7720" instrument_node=""> as the state religion.
</span></p><p data-dcnode-id="7694"><span data-dcnode-id="7718" instrument_node="">When and how exactly the Persians started weaving pile carpets is currently unknown, but the knowledge of carpet weaving, and of suitable designs for floor coverings, was certainly available in the area covering Byzance, Anatolia, and Persia: </span><a data-dcnode-id="7716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_Anatolia" title="History of Anatolia"><span data-dcnode-id="7717" instrument_node="">Anatolia</span></a><span data-dcnode-id="7715" instrument_node="">, located between Byzance and Persia, was ruled by the Roman Empire since 133 BCE. Geographically and politically, by changing alliances and warfare as well as by trade, Anatolia connected the East Roman with the Persian Empire. Artistically, both empires have developed similar styles and decorative vocabulary, as exemplified by mosaics and architecture of Roman </span><a data-dcnode-id="7713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antioch" title="Antioch"><span data-dcnode-id="7714" instrument_node="">Antioch</span></a><span data-dcnode-id="7712" instrument_node="">.</span><sup class="reference" data-dcnode-id="7709" id="cite_ref-Masterpieces_Islamic_Art,_2012_17-0"><a data-dcnode-id="7710" href="#cite_note-Masterpieces_Islamic_Art,_2012-17"><span data-dcnode-id="7711" instrument_node="">[17]</span></a></sup><span data-dcnode-id="7708" instrument_node=""> A Turkish carpet pattern depicted on </span><a data-dcnode-id="7706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jan_van_Eyck" title="Jan van Eyck"><span data-dcnode-id="7707" instrument_node="">Jan van Eyck</span></a><span data-dcnode-id="7705" instrument_node="">'s </span><a data-dcnode-id="7703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virgin_and_Child_with_Canon_van_der_Paele" title="Virgin and Child with Canon van der Paele"><span data-dcnode-id="7704" instrument_node="">"Paele Madonna"</span></a><span data-dcnode-id="7702" instrument_node=""> painting was traced back to late Roman origins and related to early Islamic floor mosaics found in the Umayyad palace of </span><a data-dcnode-id="7700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hisham%2527s_Palace" title="Hisham's Palace"><span data-dcnode-id="7701" instrument_node="">Khirbat al-Mafjar</span></a><span data-dcnode-id="7699" instrument_node="">.</span><sup class="reference" data-dcnode-id="7696" id="cite_ref-Brüggemann,_Orientteppich_2007_18-0"><a data-dcnode-id="7697" href="#cite_note-Br%C3%BCggemann,_Orientteppich_2007-18"><span data-dcnode-id="7698" instrument_node="">[18]</span></a></sup><span data-dcnode-id="7695" instrument_node="">
</span></p><p data-dcnode-id="7666"><span data-dcnode-id="7693" instrument_node="">Flat weaving and embroidery were known during the Sasanian period. Elaborate Sasanian silk textiles were well preserved in European churches, where they were used as coverings for relics, and survived in church treasuries.</span><sup class="reference" data-dcnode-id="7690" id="cite_ref-19"><a data-dcnode-id="7691" href="#cite_note-19"><span data-dcnode-id="7692" instrument_node="">[19]</span></a></sup><span data-dcnode-id="7689" instrument_node=""> More of these textiles were preserved in Tibetan monasteries, and were removed by monks fleeing to Nepal during the </span><a class="mw-redirect" data-dcnode-id="7687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_cultural_revolution" title="Chinese cultural revolution"><span data-dcnode-id="7688" instrument_node="">Chinese cultural revolution</span></a><span data-dcnode-id="7686" instrument_node="">, or excavated from burial sites like Astana, on the </span><a data-dcnode-id="7684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silk_Road" title="Silk Road"><span data-dcnode-id="7685" instrument_node="">Silk Road</span></a><span data-dcnode-id="7683" instrument_node=""> near </span><a data-dcnode-id="7681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turpan" title="Turpan"><span data-dcnode-id="7682" instrument_node="">Turfan</span></a><span data-dcnode-id="7680" instrument_node="">. The high artistic level reached by Persian weavers is further exemplified by the report of the historian </span><a data-dcnode-id="7678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al-Tabari" title="Al-Tabari"><span data-dcnode-id="7679" instrument_node="">Al-Tabari</span></a><span data-dcnode-id="7677" instrument_node=""> about the </span><a data-dcnode-id="7675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baharestan_Carpet" title="Baharestan Carpet"><span data-dcnode-id="7676" instrument_node="">Spring of Khosrow</span></a><span data-dcnode-id="7674" instrument_node=""> carpet, taken as booty by the Arabian conquerors of Ctesiphon in 637 AD. The description of the rug's design by al-Tabari makes it seem unlikely that the carpet was pile woven.</span><sup class="reference" data-dcnode-id="7671" id="cite_ref-Antique_Rugs_from_the_Near_East_20-0"><a data-dcnode-id="7672" href="#cite_note-Antique_Rugs_from_the_Near_East-20"><span data-dcnode-id="7673" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="7668" id="cite_ref-21"><a data-dcnode-id="7669" href="#cite_note-21"><span data-dcnode-id="7670" instrument_node="">[21]</span></a></sup><span data-dcnode-id="7667" instrument_node="">
</span></p><p data-dcnode-id="7641"><span data-dcnode-id="7665" instrument_node="">Fragments of pile rugs from findspots in north-eastern </span><a data-dcnode-id="7663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghanistan" title="Afghanistan"><span data-dcnode-id="7664" instrument_node="">Afghanistan</span></a><span data-dcnode-id="7662" instrument_node="">, reportedly originating from the province of </span><a data-dcnode-id="7660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samangan_Province" title="Samangan Province"><span data-dcnode-id="7661" instrument_node="">Samangan</span></a><span data-dcnode-id="7659" instrument_node="">, have been carbon-14 dated to a time span from the turn of the second century to the early Sasanian period. Among these fragments, some show depictions of animals, like various stags (sometimes arranged in a procession, recalling the design of the Pazyryk carpet) or a winged mythical creature. Wool is used for warp, weft, and pile, the yarn is crudely spun, and the fragments are woven with the asymmetric knot associated with Persian and far-eastern carpets. Every three to five rows, pieces of unspun wool, strips of cloth and leather are woven in.</span><sup class="reference" data-dcnode-id="7656" id="cite_ref-Carpets_from_Islamic_Lands_22-0"><a data-dcnode-id="7657" href="#cite_note-Carpets_from_Islamic_Lands-22"><span data-dcnode-id="7658" instrument_node="">[22]</span></a></sup><span data-dcnode-id="7655" instrument_node=""> These fragments are now in the </span><a data-dcnode-id="7653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Sabah" title="House of Sabah"><span data-dcnode-id="7654" instrument_node="">Al-Sabah</span></a><span data-dcnode-id="7652" instrument_node=""> Collection in the </span><a class="mw-redirect" data-dcnode-id="7650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dar_al-Athar_al-Islamiyyah" title="Dar al-Athar al-Islamiyyah"><span data-dcnode-id="7651" instrument_node="">Dar al-Athar al-Islamiyyah</span></a><span data-dcnode-id="7649" instrument_node="">, </span><a data-dcnode-id="7647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuwait" title="Kuwait"><span data-dcnode-id="7648" instrument_node="">Kuwait</span></a><span data-dcnode-id="7646" instrument_node="">.</span><sup class="reference" data-dcnode-id="7643" id="cite_ref-darmuseum.org.kw_23-0"><a data-dcnode-id="7644" href="#cite_note-darmuseum.org.kw-23"><span data-dcnode-id="7645" instrument_node="">[23]</span></a></sup><span data-dcnode-id="7642" instrument_node="">
</span></p><p data-dcnode-id="7632"><span data-dcnode-id="7640" instrument_node="">The carpet fragments, although reliably dated to the early Sasanian time, do not seem to be related to the splendid court carpets described by the Arab conquerors. Their crude knots incorporating </span><a data-dcnode-id="7638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shag_%28fabric%29" title="Shag (fabric)"><span data-dcnode-id="7639" instrument_node="">shag</span></a><span data-dcnode-id="7637" instrument_node=""> on the reverse hints at the need for increased insulation. With their coarsely finished animal and hunting depictions, these carpets were likely woven by nomadic people.</span><sup class="reference" data-dcnode-id="7634" id="cite_ref-Spuhler,_Pre-Islamic_carpets_2013_24-0"><a data-dcnode-id="7635" href="#cite_note-Spuhler,_Pre-Islamic_carpets_2013-24"><span data-dcnode-id="7636" instrument_node="">[24]</span></a></sup><span data-dcnode-id="7633" instrument_node="">
</span></p><span data-dcnode-id="7631" instrument_node="">
</span><h3 data-dcnode-id="7620"><span data-dcnode-id="7630" id="The_advent_of_Islam_and_the_Caliphates:_651.E2.80.931258"></span><span class="mw-headline" data-dcnode-id="7628" id="The_advent_of_Islam_and_the_Caliphates:_651–1258"><span data-dcnode-id="7629" instrument_node="">The advent of Islam and the Caliphates: 651–1258</span></span><span class="mw-editsection" data-dcnode-id="7621"><span class="mw-editsection-bracket" data-dcnode-id="7626"><span data-dcnode-id="7627" instrument_node="">[</span></span><a data-dcnode-id="7624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D6" title="Edit section: The advent of Islam and the Caliphates: 651–1258"><span data-dcnode-id="7625" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7622"><span data-dcnode-id="7623" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7619" instrument_node="">
</span><p data-dcnode-id="7611"><span data-dcnode-id="7618" instrument_node="">The </span><a data-dcnode-id="7616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_conquest_of_Persia" title="Muslim conquest of Persia"><span data-dcnode-id="7617" instrument_node="">Muslim conquest of Persia</span></a><span data-dcnode-id="7615" instrument_node=""> led to the end of the Sasanian Empire in 651 and the eventual decline of the Zoroastrian religion in Persia. Persia became a part of the Islamic world, ruled by Muslim </span><a data-dcnode-id="7613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caliphate" title="Caliphate"><span data-dcnode-id="7614" instrument_node="">Caliphates</span></a><span data-dcnode-id="7612" instrument_node="">.
</span></p><p data-dcnode-id="7584"><span data-dcnode-id="7610" instrument_node="">Arabian geographers and historians visiting Persia provide, for the first time, references to the use of carpets on the floor. The unknown author of the </span><a data-dcnode-id="7608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hudud_al-%2527Alam" title="Hudud al-'Alam"><span data-dcnode-id="7609" instrument_node="">Hudud al-'Alam</span></a><span data-dcnode-id="7607" instrument_node=""> states that rugs were woven in Fārs. 100 years later, </span><a class="mw-redirect" data-dcnode-id="7605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al-Muqaddasi" title="Al-Muqaddasi"><span data-dcnode-id="7606" instrument_node="">Al-Muqaddasi</span></a><span data-dcnode-id="7604" instrument_node=""> refers to carpets in the Qaināt. </span><a data-dcnode-id="7602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yaqut_al-Hamawi" title="Yaqut al-Hamawi"><span data-dcnode-id="7603" instrument_node="">Yaqut al-Hamawi</span></a><span data-dcnode-id="7601" instrument_node=""> tells us that carpets were woven in </span><a data-dcnode-id="7599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azerbaijan_%28Iran%29" title="Azerbaijan (Iran)"><span data-dcnode-id="7600" instrument_node="">Azerbaijān</span></a><span data-dcnode-id="7598" instrument_node=""> in the thirteenth century. The great Arabian traveller </span><a data-dcnode-id="7596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ibn_Battuta" title="Ibn Battuta"><span data-dcnode-id="7597" instrument_node="">Ibn Battuta</span></a><span data-dcnode-id="7595" instrument_node=""> mentions that a green rug was spread before him when he visited the winter quarter of the Bakhthiari </span><a data-dcnode-id="7593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atabeg" title="Atabeg"><span data-dcnode-id="7594" instrument_node="">atabeg</span></a><span data-dcnode-id="7592" instrument_node=""> in </span><a data-dcnode-id="7590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Izeh" title="Izeh"><span data-dcnode-id="7591" instrument_node="">Idhej</span></a><span data-dcnode-id="7589" instrument_node="">. These references indicate that carpet weaving in Persia under the Caliphate was a tribal or rural industry.</span><sup class="reference" data-dcnode-id="7586" id="cite_ref-Edwards,_1952_25-0"><a data-dcnode-id="7587" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="7588" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7585" instrument_node="">
</span></p><p data-dcnode-id="7554"><span data-dcnode-id="7583" instrument_node="">The rule of the Caliphs over Persia ended when the </span><a data-dcnode-id="7581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abbasid_Caliphate" title="Abbasid Caliphate"><span data-dcnode-id="7582" instrument_node="">Abbasid Caliphate</span></a><span data-dcnode-id="7580" instrument_node=""> was overthrown in the </span><a data-dcnode-id="7578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Siege_of_Baghdad_%281258%29" title="Siege of Baghdad (1258)"><span data-dcnode-id="7579" instrument_node="">Siege of Baghdad (1258)</span></a><span data-dcnode-id="7577" instrument_node=""> by the </span><a data-dcnode-id="7575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mongol_Empire" title="Mongol Empire"><span data-dcnode-id="7576" instrument_node="">Mongol Empire</span></a><span data-dcnode-id="7574" instrument_node=""> under </span><a data-dcnode-id="7572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hulagu_Khan" title="Hulagu Khan"><span data-dcnode-id="7573" instrument_node="">Hulagu Khan</span></a><span data-dcnode-id="7571" instrument_node="">. The Abbasid line of rulers recentered themselves in the </span><a class="mw-redirect" data-dcnode-id="7569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mamluk_Sultanate_%28Cairo%29" title="Mamluk Sultanate (Cairo)"><span data-dcnode-id="7570" instrument_node="">Mamluk</span></a><span data-dcnode-id="7568" instrument_node=""> capital of </span><a data-dcnode-id="7566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cairo" title="Cairo"><span data-dcnode-id="7567" instrument_node="">Cairo</span></a><span data-dcnode-id="7565" instrument_node=""> in 1261. Though lacking in political power, the dynasty continued to claim authority in religious matters until after the </span><a data-dcnode-id="7563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_dynasty" title="Ottoman dynasty"><span data-dcnode-id="7564" instrument_node="">Ottoman</span></a><span data-dcnode-id="7562" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="7560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman%25E2%2580%2593Mamluk_War_%281516%25E2%2580%259317%29" title="Ottoman–Mamluk War (1516–17)"><span data-dcnode-id="7561" instrument_node="">conquest of Egypt</span></a><span data-dcnode-id="7559" instrument_node=""> (1517). Under the Mamluk dynasty in Cairo, large carpets known as "Mamluk carpets" were produced.</span><sup class="reference" data-dcnode-id="7556" id="cite_ref-Erdmann,_Mamluks_26-0"><a data-dcnode-id="7557" href="#cite_note-Erdmann,_Mamluks-26"><span data-dcnode-id="7558" instrument_node="">[26]</span></a></sup><span data-dcnode-id="7555" instrument_node="">
</span></p><span data-dcnode-id="7553" instrument_node="">
</span><h3 data-dcnode-id="7542"><span data-dcnode-id="7552" id="Seljuq_invasion_and_Turko-Persian_tradition:_1040.E2.80.931118"></span><span class="mw-headline" data-dcnode-id="7550" id="Seljuq_invasion_and_Turko-Persian_tradition:_1040–1118"><span data-dcnode-id="7551" instrument_node="">Seljuq invasion and Turko-Persian tradition: 1040–1118</span></span><span class="mw-editsection" data-dcnode-id="7543"><span class="mw-editsection-bracket" data-dcnode-id="7548"><span data-dcnode-id="7549" instrument_node="">[</span></span><a data-dcnode-id="7546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D7" title="Edit section: Seljuq invasion and Turko-Persian tradition: 1040–1118"><span data-dcnode-id="7547" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7544"><span data-dcnode-id="7545" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7541" instrument_node="">
</span><link data-dcnode-id="7540" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7536" role="note"><span data-dcnode-id="7539" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="7537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkish_carpet" title="Turkish carpet"><span data-dcnode-id="7538" instrument_node="">Turkish carpet</span></a></div><span data-dcnode-id="7535" instrument_node="">
</span><p data-dcnode-id="7497"><span data-dcnode-id="7534" instrument_node="">Beginning at latest with the </span><a data-dcnode-id="7532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seljuk_Empire" title="Seljuk Empire"><span data-dcnode-id="7533" instrument_node="">Seljuq</span></a><span data-dcnode-id="7531" instrument_node=""> invasions of Anatolia and northwestern Persia, a distinct </span><a class="mw-redirect" data-dcnode-id="7529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turko-Persian_tradition" title="Turko-Persian tradition"><span data-dcnode-id="7530" instrument_node="">Turko-Persian tradition</span></a><span data-dcnode-id="7528" instrument_node=""> emerged. Fragments of woven carpets were found in the </span><a data-dcnode-id="7526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al%25C3%25A2eddin_Mosque" title="Alâeddin Mosque"><span data-dcnode-id="7527" instrument_node="">Alâeddin Mosque</span></a><span data-dcnode-id="7525" instrument_node=""> in the Turkish town of </span><a data-dcnode-id="7523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Konya" title="Konya"><span data-dcnode-id="7524" instrument_node="">Konya</span></a><span data-dcnode-id="7522" instrument_node=""> and the </span><a data-dcnode-id="7520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/E%25C5%259Frefo%25C4%259Flu_Mosque" title="Eşrefoğlu Mosque"><span data-dcnode-id="7521" instrument_node="">Eşrefoğlu Mosque</span></a><span data-dcnode-id="7519" instrument_node=""> in </span><a data-dcnode-id="7517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bey%25C5%259Fehir" title="Beyşehir"><span data-dcnode-id="7518" instrument_node="">Beyşehir</span></a><span data-dcnode-id="7516" instrument_node="">, and were dated to the Anatolian Seljuq Period (1243–1302).</span><sup class="reference" data-dcnode-id="7513" id="cite_ref-27"><a data-dcnode-id="7514" href="#cite_note-27"><span data-dcnode-id="7515" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="7510" id="cite_ref-Beyshehir_fragments_28-0"><a data-dcnode-id="7511" href="#cite_note-Beyshehir_fragments-28"><span data-dcnode-id="7512" instrument_node="">[28]</span></a></sup><span data-dcnode-id="7509" instrument_node=""> More fragments were found in </span><a data-dcnode-id="7507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fustat" title="Fustat"><span data-dcnode-id="7508" instrument_node="">Fostat</span></a><span data-dcnode-id="7506" instrument_node="">, today a suburb of the city of Cairo.</span><sup class="reference" data-dcnode-id="7503" id="cite_ref-Lamm,_1937_29-0"><a data-dcnode-id="7504" href="#cite_note-Lamm,_1937-29"><span data-dcnode-id="7505" instrument_node="">[29]</span></a></sup><span data-dcnode-id="7502" instrument_node=""> These fragments at least give us an idea how Seluq carpets may have looked. The Egyptian findings also provide evidence for export trade. If, and how, these carpets influenced Persian carpet weaving, remains unknown, as no distinct Persian carpets are known to exist from this period, or we are unable to identify them. It was assumed by Western scholars that the Sejuqs may have introduced at least new design traditions, if not the craft of pile weaving itself, to Persia, where skilled artisans and craftsmen might have integrated new ideas into their old traditions.</span><sup class="reference" data-dcnode-id="7499" id="cite_ref-Antique_Rugs_from_the_Near_East_20-1"><a data-dcnode-id="7500" href="#cite_note-Antique_Rugs_from_the_Near_East-20"><span data-dcnode-id="7501" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7498" instrument_node="">
</span></p><span data-dcnode-id="7496" instrument_node="">
