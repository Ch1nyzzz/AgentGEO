</span><h3 data-dcnode-id="6565"><span class="mw-headline" data-dcnode-id="6573" id="Modern_times"><span data-dcnode-id="6574" instrument_node="">Modern times</span></span><span class="mw-editsection" data-dcnode-id="6566"><span class="mw-editsection-bracket" data-dcnode-id="6571"><span data-dcnode-id="6572" instrument_node="">[</span></span><a data-dcnode-id="6569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D17" title="Edit section: Modern times"><span data-dcnode-id="6570" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6567"><span data-dcnode-id="6568" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6564" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6555"><div class="thumbinner" data-dcnode-id="6556" style="width:222px;"><a class="image" data-dcnode-id="6562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATabriz_Lilac.jpg"><img alt="" class="thumbimage" data-dcnode-id="6563" data-file-height="520" data-file-width="940" decoding="async" height="122" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Tabriz_Lilac.jpg/220px-Tabriz_Lilac.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Tabriz_Lilac.jpg/330px-Tabriz_Lilac.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Tabriz_Lilac.jpg/440px-Tabriz_Lilac.jpg 2x" width="220"></a><span data-dcnode-id="6561" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6557"><div class="magnify" data-dcnode-id="6559"><a class="internal" data-dcnode-id="6560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATabriz_Lilac.jpg" title="Enlarge"></a></div><span data-dcnode-id="6558" instrument_node="">Modern Iranian Carpet "Tabriz Lilac", 2010, by Hossein Rezvani</span></div></div></div><span data-dcnode-id="6554" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6545"><div class="thumbinner" data-dcnode-id="6546" style="width:222px;"><a class="image" data-dcnode-id="6552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATapisGabbeh.png"><img alt="" class="thumbimage" data-dcnode-id="6553" data-file-height="358" data-file-width="284" decoding="async" height="277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/52/TapisGabbeh.png/220px-TapisGabbeh.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/5/52/TapisGabbeh.png 1.5x" width="220"></a><span data-dcnode-id="6551" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6547"><div class="magnify" data-dcnode-id="6549"><a class="internal" data-dcnode-id="6550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATapisGabbeh.png" title="Enlarge"></a></div><span data-dcnode-id="6548" instrument_node="">A modern gabbeh carpet</span></div></div></div><span data-dcnode-id="6544" instrument_node="">
</span><p data-dcnode-id="6536"><span data-dcnode-id="6543" instrument_node="">After the </span><a data-dcnode-id="6541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_Revolution" title="Iranian Revolution"><span data-dcnode-id="6542" instrument_node="">Iranian Revolution</span></a><span data-dcnode-id="6540" instrument_node="">, little information could at first be obtained about carpet weaving in Iran. In the 1970s and 1980s, a new interest arose in Europe in </span><a data-dcnode-id="6538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gabbeh" title="Gabbeh"><span data-dcnode-id="6539" instrument_node="">Gabbeh</span></a><span data-dcnode-id="6537" instrument_node=""> rugs, which were initially woven by nomadic tribes for their own use. Their coarse weaving and simple, abstract designs appealed to Western customers.
</span></p><p data-dcnode-id="6523"><span data-dcnode-id="6535" instrument_node="">In 1992, the first Grand Persian Conference and Exhibition in Tehran presented for the first time modern Persian carpet designs. Persian master weavers like Razam Arabzadeh displayed carpets woven in the traditional technique, but with unusual, modern designs.</span><sup class="reference" data-dcnode-id="6532" id="cite_ref-42"><a data-dcnode-id="6533" href="#cite_note-42"><span data-dcnode-id="6534" instrument_node="">[42]</span></a></sup><span data-dcnode-id="6531" instrument_node=""> As the Grand Conferences continue to take place at regular intervals, two trends can be observed in Iranian carpet weaving today. On the one hand, modern and innovative artistic designs are invented and developed by Iranian manufacturers, who thus take the ancient design tradition forward towards the twenty-first century. On the other hand, the renewed interest in natural dyes</span><sup class="reference" data-dcnode-id="6528" id="cite_ref-Opie,_Vegetal_dyes,_Iran_43-0"><a data-dcnode-id="6529" href="#cite_note-Opie,_Vegetal_dyes,_Iran-43"><span data-dcnode-id="6530" instrument_node="">[43]</span></a></sup><span data-dcnode-id="6527" instrument_node=""> was taken up by commercial enterprises, which commission carpets to tribal village weavers. This provides a regular source of income for the carpet weavers. The companies usually provide the material and specify the designs, but the weavers are allowed some degree of creative freedom. With the end of the U.S. </span><a data-dcnode-id="6525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanctions_against_Iran" title="Sanctions against Iran"><span data-dcnode-id="6526" instrument_node="">embargo</span></a><span data-dcnode-id="6524" instrument_node=""> on Iranian goods, also Persian carpets (including antique Persian carpets acquired at auctions) may become more easily available to U.S. customers again.
</span></p><p data-dcnode-id="6518"><span data-dcnode-id="6522" instrument_node="">As commercial household goods, Persian carpets today are encountering competition from other countries with lower wages and cheaper methods of production: Machine-woven, </span><a data-dcnode-id="6520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tufting" title="Tufting"><span data-dcnode-id="6521" instrument_node="">tufted</span></a><span data-dcnode-id="6519" instrument_node=""> rugs, or rugs woven by hand, but with the faster and less costly loop weaving method, provide rugs in "oriental" designs of utilitarian, but no artistic value. Traditional hand woven carpets, made of sheep wool dyed with natural colours are increasingly sought after. They are usually sold at higher prices due to the large amount of manual work associated with their production, which has, essentially, not changed since ancient times, and due to the artistic value of their design. Thus, the Persian carpet retains its ancient status as an object of luxury, beauty, and art.
</span></p><span data-dcnode-id="6517" instrument_node="">
</span><h2 data-dcnode-id="6507"><span class="mw-headline" data-dcnode-id="6515" id="Materials"><span data-dcnode-id="6516" instrument_node="">Materials</span></span><span class="mw-editsection" data-dcnode-id="6508"><span class="mw-editsection-bracket" data-dcnode-id="6513"><span data-dcnode-id="6514" instrument_node="">[</span></span><a data-dcnode-id="6511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D18" title="Edit section: Materials"><span data-dcnode-id="6512" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6509"><span data-dcnode-id="6510" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6506" instrument_node="">
</span><h3 data-dcnode-id="6496"><span class="mw-headline" data-dcnode-id="6504" id="Wool"><span data-dcnode-id="6505" instrument_node="">Wool</span></span><span class="mw-editsection" data-dcnode-id="6497"><span class="mw-editsection-bracket" data-dcnode-id="6502"><span data-dcnode-id="6503" instrument_node="">[</span></span><a data-dcnode-id="6500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D19" title="Edit section: Wool"><span data-dcnode-id="6501" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6498"><span data-dcnode-id="6499" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6495" instrument_node="">
</span><p data-dcnode-id="6450"><span data-dcnode-id="6494" instrument_node="">In most Persian rugs, the pile is of </span><a data-dcnode-id="6492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheep" title="Sheep"><span data-dcnode-id="6493" instrument_node="">sheep's</span></a><span data-dcnode-id="6491" instrument_node=""> wool. Its characteristics and quality vary from each area to the next, depending on the breed of sheep, climatic conditions, pasturage, and the particular customs relating to when and how the wool is shorn and processed.</span><sup class="reference" data-dcnode-id="6488" id="cite_ref-Eilland_&amp;_Eilland_Complete_Guide_1998_44-0"><a data-dcnode-id="6489" href="#cite_note-Eilland_&amp;_Eilland_Complete_Guide_1998-44"><span data-dcnode-id="6490" instrument_node="">[44]</span></a></sup><span data-dcnode-id="6487" instrument_node=""> Different areas of a sheep's fleece yield different qualities of wool, depending on the ratio between the thicker and stiffer sheep hair and the finer fibers of the wool. Usually, sheep are </span><a data-dcnode-id="6485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheep_shearing" title="Sheep shearing"><span data-dcnode-id="6486" instrument_node="">shorn</span></a><span data-dcnode-id="6484" instrument_node=""> in spring and fall. The spring shear produces wool of finer quality. The lowest grade of wool used in carpet weaving is "skin" wool, which is removed chemically from dead animal skin.</span><sup class="reference" data-dcnode-id="6481" id="cite_ref-Edwards,_1952_25-6"><a data-dcnode-id="6482" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="6483" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6480" instrument_node=""> Higher grades of Persian wool are often referred to as </span><b data-dcnode-id="6478"><span data-dcnode-id="6479" instrument_node="">kurk</span></b><span data-dcnode-id="6477" instrument_node="">, or </span><b data-dcnode-id="6475"><span data-dcnode-id="6476" instrument_node="">kork</span></b><span data-dcnode-id="6474" instrument_node=""> wool, which is gained from the wool growing on the sheep's neck.</span><sup class="reference" data-dcnode-id="6471" id="cite_ref-Eilland_&amp;_Eilland_Complete_Guide_1998_44-1"><a data-dcnode-id="6472" href="#cite_note-Eilland_&amp;_Eilland_Complete_Guide_1998-44"><span data-dcnode-id="6473" instrument_node="">[44]</span></a></sup><span data-dcnode-id="6470" instrument_node=""> Modern production also makes use of imported wool, e.g. </span><a data-dcnode-id="6468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merino" title="Merino"><span data-dcnode-id="6469" instrument_node="">Merino</span></a><span data-dcnode-id="6467" instrument_node=""> wool from </span><a data-dcnode-id="6465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand" title="New Zealand"><span data-dcnode-id="6466" instrument_node="">New Zealand</span></a><span data-dcnode-id="6464" instrument_node="">, because the high demand on carpet wool cannot be entirely met by the local production. Fibers from </span><a data-dcnode-id="6462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camel" title="Camel"><span data-dcnode-id="6463" instrument_node="">camels</span></a><span data-dcnode-id="6461" instrument_node=""> and </span><a data-dcnode-id="6459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Goat" title="Goat"><span data-dcnode-id="6460" instrument_node="">goats</span></a><span data-dcnode-id="6458" instrument_node=""> are also used. Goat hair is mainly used for fastening the borders, or selvedges, of nomadic rugs like </span><a data-dcnode-id="6456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baloch_people" title="Baloch people"><span data-dcnode-id="6457" instrument_node="">Baluch</span></a><span data-dcnode-id="6455" instrument_node=""> rugs, since it is more resistant to abrasion. Camel wool is occasionally used in Persian nomadic rugs. It is often dyed in black, or used in its natural colour. More often, wool said to be camel's wool turns out to be dyed sheep wool.</span><sup class="reference" data-dcnode-id="6452" id="cite_ref-Edwards,_1952_25-7"><a data-dcnode-id="6453" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="6454" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6451" instrument_node="">
</span></p><span data-dcnode-id="6449" instrument_node="">
</span><h3 data-dcnode-id="6439"><span class="mw-headline" data-dcnode-id="6447" id="Cotton"><span data-dcnode-id="6448" instrument_node="">Cotton</span></span><span class="mw-editsection" data-dcnode-id="6440"><span class="mw-editsection-bracket" data-dcnode-id="6445"><span data-dcnode-id="6446" instrument_node="">[</span></span><a data-dcnode-id="6443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D20" title="Edit section: Cotton"><span data-dcnode-id="6444" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6441"><span data-dcnode-id="6442" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6438" instrument_node="">
</span><p data-dcnode-id="6423"><a data-dcnode-id="6436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cotton" title="Cotton"><span data-dcnode-id="6437" instrument_node="">Cotton</span></a><span data-dcnode-id="6435" instrument_node=""> forms the foundation of warps and wefts of the majority of modern rugs. Nomads who cannot afford to buy cotton on the market use wool for warps and wefts, which are also traditionally made of wool in areas where cotton was not a local product. Cotton can be spun more tightly than wool, and tolerates more tension, which makes cotton a superior material for the foundation of a rug. Especially larger carpets are more likely to lie flat on the floor, whereas wool tends to shrink unevenly, and carpets with a woolen foundation may buckle when wet.</span><sup class="reference" data-dcnode-id="6432" id="cite_ref-Eilland_&amp;_Eilland_Complete_Guide_1998_44-2"><a data-dcnode-id="6433" href="#cite_note-Eilland_&amp;_Eilland_Complete_Guide_1998-44"><span data-dcnode-id="6434" instrument_node="">[44]</span></a></sup><span data-dcnode-id="6431" instrument_node=""> Chemically treated (</span><a data-dcnode-id="6429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mercerised_cotton" title="Mercerised cotton"><span data-dcnode-id="6430" instrument_node="">mercerised</span></a><span data-dcnode-id="6428" instrument_node="">) cotton has been used in rugs as a silk substitute since the late nineteenth century.</span><sup class="reference" data-dcnode-id="6425" id="cite_ref-Eilland_&amp;_Eilland_Complete_Guide_1998_44-3"><a data-dcnode-id="6426" href="#cite_note-Eilland_&amp;_Eilland_Complete_Guide_1998-44"><span data-dcnode-id="6427" instrument_node="">[44]</span></a></sup><span data-dcnode-id="6424" instrument_node="">
</span></p><span data-dcnode-id="6422" instrument_node="">
</span><h3 data-dcnode-id="6412"><span class="mw-headline" data-dcnode-id="6420" id="Silk"><span data-dcnode-id="6421" instrument_node="">Silk</span></span><span class="mw-editsection" data-dcnode-id="6413"><span class="mw-editsection-bracket" data-dcnode-id="6418"><span data-dcnode-id="6419" instrument_node="">[</span></span><a data-dcnode-id="6416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D21" title="Edit section: Silk"><span data-dcnode-id="6417" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6414"><span data-dcnode-id="6415" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6411" instrument_node="">
</span><p data-dcnode-id="6404"><a data-dcnode-id="6409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silk" title="Silk"><span data-dcnode-id="6410" instrument_node="">Silk</span></a><span data-dcnode-id="6408" instrument_node=""> is an expensive material, and has been used for representative carpets. Its tensile strength has been used in silk warps, but silk also appears in the carpet pile. Silk pile can be used to highlight special elements of the design. High-quality carpets from Kashan, Qum, Nain, and Isfahan have all-silk piles. Silk pile carpets are often exceptionally fine, with a short pile and an elaborate design. Silk pile is less resistant to mechanical stress, thus, all-silk piles are often used as </span><a class="mw-redirect" data-dcnode-id="6406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tapestries" title="Tapestries"><span data-dcnode-id="6407" instrument_node="">wall hangings</span></a><span data-dcnode-id="6405" instrument_node="">, or pillows.
</span></p><span data-dcnode-id="6403" instrument_node="">
</span><h3 data-dcnode-id="6393"><span class="mw-headline" data-dcnode-id="6401" id="Spinning"><span data-dcnode-id="6402" instrument_node="">Spinning</span></span><span class="mw-editsection" data-dcnode-id="6394"><span class="mw-editsection-bracket" data-dcnode-id="6399"><span data-dcnode-id="6400" instrument_node="">[</span></span><a data-dcnode-id="6397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D22" title="Edit section: Spinning"><span data-dcnode-id="6398" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6395"><span data-dcnode-id="6396" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6392" instrument_node="">
</span><link data-dcnode-id="6391" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6384" role="note"><span data-dcnode-id="6390" instrument_node="">See also: </span><a data-dcnode-id="6388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hand_spinning" title="Hand spinning"><span data-dcnode-id="6389" instrument_node="">Hand spinning</span></a><span data-dcnode-id="6387" instrument_node=""> and </span><a data-dcnode-id="6385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spinning_%28textiles%29" title="Spinning (textiles)"><span data-dcnode-id="6386" instrument_node="">Spinning (textiles)</span></a></div><span data-dcnode-id="6383" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6374"><div class="thumbinner" data-dcnode-id="6375" style="width:52px;"><a class="image" data-dcnode-id="6381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYarn_twist_S-Left_Z-Right.svg"><img alt="" class="thumbimage" data-dcnode-id="6382" data-file-height="500" data-file-width="400" decoding="async" height="63" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Yarn_twist_S-Left_Z-Right.svg/50px-Yarn_twist_S-Left_Z-Right.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Yarn_twist_S-Left_Z-Right.svg/75px-Yarn_twist_S-Left_Z-Right.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Yarn_twist_S-Left_Z-Right.svg/100px-Yarn_twist_S-Left_Z-Right.svg.png 2x" width="50"></a><span data-dcnode-id="6380" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6376"><div class="magnify" data-dcnode-id="6378"><a class="internal" data-dcnode-id="6379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYarn_twist_S-Left_Z-Right.svg" title="Enlarge"></a></div><span data-dcnode-id="6377" instrument_node="">S-twist and Z-twist yarns</span></div></div></div><span data-dcnode-id="6373" instrument_node="">
</span><p data-dcnode-id="6354"><span data-dcnode-id="6372" instrument_node="">The fibers of wool, cotton, and silk are spun either by hand or mechanically by using </span><a data-dcnode-id="6370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spinning_wheel" title="Spinning wheel"><span data-dcnode-id="6371" instrument_node="">spinning wheels</span></a><span data-dcnode-id="6369" instrument_node=""> or industrial </span><a data-dcnode-id="6367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spinning_frame" title="Spinning frame"><span data-dcnode-id="6368" instrument_node="">spinning machines</span></a><span data-dcnode-id="6366" instrument_node=""> to produce the yarn. The direction in which the yarn is spun is called </span><i data-dcnode-id="6364"><span data-dcnode-id="6365" instrument_node="">twist</span></i><span data-dcnode-id="6363" instrument_node="">. Yarns are characterized as S-twist or Z-twist according to the direction of spinning (see diagram).</span><sup class="reference" data-dcnode-id="6360" id="cite_ref-45"><a data-dcnode-id="6361" href="#cite_note-45"><span data-dcnode-id="6362" instrument_node="">[45]</span></a></sup><span data-dcnode-id="6359" instrument_node=""> Two or more spun yarns may be twisted together or </span><i data-dcnode-id="6356"><a data-dcnode-id="6357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plying" title="Plying"><span data-dcnode-id="6358" instrument_node="">plied</span></a></i><span data-dcnode-id="6355" instrument_node=""> to form a thicker yarn. Generally, handspun single plies are spun with a Z-twist, and plying is done with an S-twist. Like nearly all Islamic rugs with the exception of Mamluk carpets, nearly all Persian rugs use "Z" (anti-clockwise) spun and "S" (clockwise)-plied wool.
</span></p><span data-dcnode-id="6353" instrument_node="">
</span><h3 data-dcnode-id="6343"><span class="mw-headline" data-dcnode-id="6351" id="Dyeing"><span data-dcnode-id="6352" instrument_node="">Dyeing</span></span><span class="mw-editsection" data-dcnode-id="6344"><span class="mw-editsection-bracket" data-dcnode-id="6349"><span data-dcnode-id="6350" instrument_node="">[</span></span><a data-dcnode-id="6347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D23" title="Edit section: Dyeing"><span data-dcnode-id="6348" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6345"><span data-dcnode-id="6346" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6342" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6333"><div class="thumbinner" data-dcnode-id="6334" style="width:222px;"><a class="image" data-dcnode-id="6340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACarpet_factory.jpg"><img alt="" class="thumbimage" data-dcnode-id="6341" data-file-height="2816" data-file-width="2112" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Carpet_factory.jpg/220px-Carpet_factory.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Carpet_factory.jpg/330px-Carpet_factory.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Carpet_factory.jpg/440px-Carpet_factory.jpg 2x" width="220"></a><span data-dcnode-id="6339" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6335"><div class="magnify" data-dcnode-id="6337"><a class="internal" data-dcnode-id="6338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACarpet_factory.jpg" title="Enlarge"></a></div><span data-dcnode-id="6336" instrument_node="">Naturally dyed wool in a Turkish carpet manufacture</span></div></div></div><span data-dcnode-id="6332" instrument_node="">
</span><p data-dcnode-id="6327"><span data-dcnode-id="6331" instrument_node="">The dyeing process involves the preparation of the yarn in order to make it susceptible for the proper dyes by immersion in a </span><a data-dcnode-id="6329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mordant" title="Mordant"><span data-dcnode-id="6330" instrument_node="">mordant</span></a><span data-dcnode-id="6328" instrument_node="">. Dyestuffs are then added to the yarn which remains in the dyeing solution for a defined time. The dyed yarn is then left to dry, exposed to air and sunlight. Some colours, especially dark brown, require iron mordants, which can damage or fade the fabric. This often results in faster pile wear in areas dyed in dark brown colours, and may create a relief effect in antique oriental carpets.
</span></p><span data-dcnode-id="6326" instrument_node="">
</span><h4 data-dcnode-id="6316"><span class="mw-headline" data-dcnode-id="6324" id="Plants"><span data-dcnode-id="6325" instrument_node="">Plants</span></span><span class="mw-editsection" data-dcnode-id="6317"><span class="mw-editsection-bracket" data-dcnode-id="6322"><span data-dcnode-id="6323" instrument_node="">[</span></span><a data-dcnode-id="6320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D24" title="Edit section: Plants"><span data-dcnode-id="6321" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6318"><span data-dcnode-id="6319" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6315" instrument_node="">
</span><p data-dcnode-id="6292"><a data-dcnode-id="6313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_dye" title="Natural dye"><span data-dcnode-id="6314" instrument_node="">Traditional dyes</span></a><span data-dcnode-id="6312" instrument_node=""> used in Persian rugs are obtained from plants and insects. In 1856, the English chemist </span><a data-dcnode-id="6310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Henry_Perkin" title="William Henry Perkin"><span data-dcnode-id="6311" instrument_node="">William Henry Perkin</span></a><span data-dcnode-id="6309" instrument_node=""> invented the first </span><a data-dcnode-id="6307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aniline" title="Aniline"><span data-dcnode-id="6308" instrument_node="">aniline</span></a><span data-dcnode-id="6306" instrument_node=""> dye, </span><a data-dcnode-id="6304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mauveine" title="Mauveine"><span data-dcnode-id="6305" instrument_node="">mauveine</span></a><span data-dcnode-id="6303" instrument_node="">. A variety of other synthetic </span><a class="mw-redirect" data-dcnode-id="6301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dyes" title="Dyes"><span data-dcnode-id="6302" instrument_node="">dyes</span></a><span data-dcnode-id="6300" instrument_node=""> were invented thereafter. Cheap, readily prepared and easy to use as they were compared to natural dyes, their use is documented since the mid 1860s. The tradition of natural dyeing was revived in Turkey in the early 1980s. Chemical analyses led to the identification of natural dyes from antique wool samples, and dyeing recipes and processes were experimentally re-created.</span><sup class="reference" data-dcnode-id="6297" id="cite_ref-46"><a data-dcnode-id="6298" href="#cite_note-46"><span data-dcnode-id="6299" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="6294" id="cite_ref-47"><a data-dcnode-id="6295" href="#cite_note-47"><span data-dcnode-id="6296" instrument_node="">[47]</span></a></sup><span data-dcnode-id="6293" instrument_node="">
</span></p><p data-dcnode-id="6290"><span data-dcnode-id="6291" instrument_node="">According to these analyses, natural dyes used for carpet wool include:
</span></p><span data-dcnode-id="6289" instrument_node="">
</span><ul data-dcnode-id="6226"><li data-dcnode-id="6282"><i data-dcnode-id="6287"><span data-dcnode-id="6288" instrument_node="">Red</span></i><span data-dcnode-id="6286" instrument_node=""> from </span><a data-dcnode-id="6284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rubia_tinctorum" title="Rubia tinctorum"><span data-dcnode-id="6285" instrument_node="">Madder (Rubia tinctorum)</span></a><span data-dcnode-id="6283" instrument_node=""> roots,</span></li><span data-dcnode-id="6281" instrument_node="">
</span><li data-dcnode-id="6265"><i data-dcnode-id="6279"><span data-dcnode-id="6280" instrument_node="">Yellow</span></i><span data-dcnode-id="6278" instrument_node=""> from plants, including </span><a data-dcnode-id="6276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Onion" title="Onion"><span data-dcnode-id="6277" instrument_node="">onion (Allium cepa)</span></a><span data-dcnode-id="6275" instrument_node="">, several chamomile species (</span><a data-dcnode-id="6273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthemis" title="Anthemis"><span data-dcnode-id="6274" instrument_node="">Anthemis</span></a><span data-dcnode-id="6272" instrument_node="">, </span><a data-dcnode-id="6270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matricaria_chamomilla" title="Matricaria chamomilla"><span data-dcnode-id="6271" instrument_node="">Matricaria chamomilla</span></a><span data-dcnode-id="6269" instrument_node="">), and </span><a data-dcnode-id="6267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euphorbia" title="Euphorbia"><span data-dcnode-id="6268" instrument_node="">Euphorbia</span></a><span data-dcnode-id="6266" instrument_node="">,</span></li><span data-dcnode-id="6264" instrument_node="">
</span><li data-dcnode-id="6251"><i data-dcnode-id="6262"><span data-dcnode-id="6263" instrument_node="">Black</span></i><span data-dcnode-id="6261" instrument_node="">: </span><a data-dcnode-id="6259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oak_apple" title="Oak apple"><span data-dcnode-id="6260" instrument_node="">Oak apples</span></a><span data-dcnode-id="6258" instrument_node="">, </span><a data-dcnode-id="6256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oak" title="Oak"><span data-dcnode-id="6257" instrument_node="">Oak acorns</span></a><span data-dcnode-id="6255" instrument_node="">, </span><a data-dcnode-id="6253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhus_coriaria" title="Rhus coriaria"><span data-dcnode-id="6254" instrument_node="">Tanner's sumach</span></a><span data-dcnode-id="6252" instrument_node="">,</span></li><span data-dcnode-id="6250" instrument_node="">
</span><li data-dcnode-id="6243"><i data-dcnode-id="6248"><span data-dcnode-id="6249" instrument_node="">Green</span></i><span data-dcnode-id="6247" instrument_node=""> by double dyeing with </span><a data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indigo" title="Indigo"><span data-dcnode-id="6246" instrument_node="">Indigo</span></a><span data-dcnode-id="6244" instrument_node=""> and yellow dye,</span></li><span data-dcnode-id="6242" instrument_node="">
</span><li data-dcnode-id="6238"><i data-dcnode-id="6240"><span data-dcnode-id="6241" instrument_node="">Orange</span></i><span data-dcnode-id="6239" instrument_node=""> by double dyeing with madder red and yellow dye,</span></li><span data-dcnode-id="6237" instrument_node="">
</span><li data-dcnode-id="6227"><i data-dcnode-id="6235"><span data-dcnode-id="6236" instrument_node="">Blue</span></i><span data-dcnode-id="6234" instrument_node="">: </span><a data-dcnode-id="6232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indigo" title="Indigo"><span data-dcnode-id="6233" instrument_node="">Indigo</span></a><span data-dcnode-id="6231" instrument_node=""> gained from </span><a data-dcnode-id="6229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indigofera_tinctoria" title="Indigofera tinctoria"><span data-dcnode-id="6230" instrument_node="">Indigofera tinctoria</span></a><span data-dcnode-id="6228" instrument_node="">.</span></li></ul><span data-dcnode-id="6225" instrument_node="">
</span><p data-dcnode-id="6210"><span data-dcnode-id="6224" instrument_node="">Some of the dyestuffs like indigo or madder were goods of trade, and thus commonly available. Yellow or brown dyestuffs more substantially vary from region to region. Many plants provide yellow dyes, like Vine weld, or Dyer's weed </span><i data-dcnode-id="6219"><span data-dcnode-id="6223" instrument_node="">(</span><a data-dcnode-id="6221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reseda_luteola" title="Reseda luteola"><span data-dcnode-id="6222" instrument_node="">Reseda luteola</span></a><span data-dcnode-id="6220" instrument_node="">)</span></i><span data-dcnode-id="6218" instrument_node="">, Yellow larkspur, or Dyer's sumach </span><a data-dcnode-id="6216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cotinus_coggygria" title="Cotinus coggygria"><span data-dcnode-id="6217" instrument_node="">Cotinus coggygria</span></a><span data-dcnode-id="6215" instrument_node="">. Grape leaves and pomegranate rinds, as well as other plants, provide different shades of yellow.</span><sup class="reference" data-dcnode-id="6212" id="cite_ref-Eilland_&amp;_Eilland_Complete_Guide_1998_44-4"><a data-dcnode-id="6213" href="#cite_note-Eilland_&amp;_Eilland_Complete_Guide_1998-44"><span data-dcnode-id="6214" instrument_node="">[44]</span></a></sup><span data-dcnode-id="6211" instrument_node="">
</span></p><p data-dcnode-id="6204"><span data-dcnode-id="6209" instrument_node="">In Iran, traditional dyeing with natural dyes was revived in the 1990s, inspired by the renewed general interest in traditionally produced rugs, but master dyers like Abbas Sayahi had kept alive the knowledge about the traditional recipes.</span><sup class="reference" data-dcnode-id="6206" id="cite_ref-Opie,_Vegetal_dyes,_Iran_43-1"><a data-dcnode-id="6207" href="#cite_note-Opie,_Vegetal_dyes,_Iran-43"><span data-dcnode-id="6208" instrument_node="">[43]</span></a></sup><span data-dcnode-id="6205" instrument_node="">
</span></p><span data-dcnode-id="6203" instrument_node="">
</span><h4 data-dcnode-id="6193"><span class="mw-headline" data-dcnode-id="6201" id="Insect_reds"><span data-dcnode-id="6202" instrument_node="">Insect reds</span></span><span class="mw-editsection" data-dcnode-id="6194"><span class="mw-editsection-bracket" data-dcnode-id="6199"><span data-dcnode-id="6200" instrument_node="">[</span></span><a data-dcnode-id="6197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D25" title="Edit section: Insect reds"><span data-dcnode-id="6198" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6192" instrument_node="">
</span><p data-dcnode-id="6169"><a data-dcnode-id="6190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carmine" title="Carmine"><span data-dcnode-id="6191" instrument_node="">Carmine</span></a><span data-dcnode-id="6189" instrument_node=""> dyes are obtained from resinous secretions of scale insects such as the </span><a data-dcnode-id="6187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cochineal" title="Cochineal"><span data-dcnode-id="6188" instrument_node="">Cochineal</span></a><span data-dcnode-id="6186" instrument_node=""> scale </span><a class="mw-redirect" data-dcnode-id="6184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coccus_cacti" title="Coccus cacti"><span data-dcnode-id="6185" instrument_node="">Coccus cacti</span></a><span data-dcnode-id="6183" instrument_node="">, and certain Porphyrophora species (</span><a data-dcnode-id="6181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armenian_cochineal" title="Armenian cochineal"><span data-dcnode-id="6182" instrument_node="">Armenian</span></a><span data-dcnode-id="6180" instrument_node=""> and </span><a data-dcnode-id="6178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polish_cochineal" title="Polish cochineal"><span data-dcnode-id="6179" instrument_node="">Polish cochineal</span></a><span data-dcnode-id="6177" instrument_node="">). Cochineal dye, the so-called "laq" was formerly exported from India, and later on from Mexico and the Canary Islands. Insect dyes were more frequently used in areas where </span><a data-dcnode-id="6175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rubia_tinctorum" title="Rubia tinctorum"><span data-dcnode-id="6176" instrument_node="">Madder (Rubia tinctorum)</span></a><span data-dcnode-id="6174" instrument_node=""> was not grown, like west and north-west Persia.</span><sup class="reference" data-dcnode-id="6171" id="cite_ref-Edwards,_1952_25-8"><a data-dcnode-id="6172" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="6173" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6170" instrument_node="">
</span></p><span data-dcnode-id="6168" instrument_node="">
</span><h4 data-dcnode-id="6158"><span class="mw-headline" data-dcnode-id="6166" id="Synthetic_dyes"><span data-dcnode-id="6167" instrument_node="">Synthetic dyes</span></span><span class="mw-editsection" data-dcnode-id="6159"><span class="mw-editsection-bracket" data-dcnode-id="6164"><span data-dcnode-id="6165" instrument_node="">[</span></span><a data-dcnode-id="6162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D26" title="Edit section: Synthetic dyes"><span data-dcnode-id="6163" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6160"><span data-dcnode-id="6161" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6157" instrument_node="">
</span><p data-dcnode-id="6148"><span data-dcnode-id="6156" instrument_node="">With modern synthetic </span><a class="mw-redirect" data-dcnode-id="6154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dyes" title="Dyes"><span data-dcnode-id="6155" instrument_node="">dyes</span></a><span data-dcnode-id="6153" instrument_node="">, nearly every colour and shade can be obtained so that without chemical analysis it is nearly impossible to identify, in a finished carpet, whether natural or artificial dyes were used. Modern carpets can be woven with carefully selected synthetic colours, and provide artistic and utilitarian value.</span><sup class="reference" data-dcnode-id="6150" id="cite_ref-Eilland,_2003_48-0"><a data-dcnode-id="6151" href="#cite_note-Eilland,_2003-48"><span data-dcnode-id="6152" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6149" instrument_node="">
</span></p><span data-dcnode-id="6147" instrument_node="">
</span><h4 data-dcnode-id="6137"><span class="mw-headline" data-dcnode-id="6145" id="Abrash"><span data-dcnode-id="6146" instrument_node="">Abrash</span></span><span class="mw-editsection" data-dcnode-id="6138"><span class="mw-editsection-bracket" data-dcnode-id="6143"><span data-dcnode-id="6144" instrument_node="">[</span></span><a data-dcnode-id="6141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D27" title="Edit section: Abrash"><span data-dcnode-id="6142" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6139"><span data-dcnode-id="6140" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6136" instrument_node="">
</span><p data-dcnode-id="6127"><span data-dcnode-id="6135" instrument_node="">The appearance of slight deviations within the same colour is called abrash (from Turkish </span><i data-dcnode-id="6133"><span data-dcnode-id="6134" instrument_node="">abraş</span></i><span data-dcnode-id="6132" instrument_node="">, literally, “speckled, piebald”). Abrash is seen in traditionally dyed oriental rugs. Its occurrence suggests that a single weaver has likely woven the carpet, who did not have enough time or resources to prepare a sufficient quantity of dyed yarn to complete the rug. Only small batches of wool were dyed from time to time. When one string of wool was used up, the weaver continued with the newly dyed batch. Because the exact hue of colour is rarely met again when a new batch is dyed, the colour of the pile changes when a new row of knots is woven in. As such, the colour variation suggests a village or tribal woven rug, and is appreciated as a sign of quality and authenticity. Abrash can also be introduced on purpose into a newly planned carpet design.</span><sup class="reference" data-dcnode-id="6129" id="cite_ref-O'Bannon_1995_49-0"><a data-dcnode-id="6130" href="#cite_note-O'Bannon_1995-49"><span data-dcnode-id="6131" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6128" instrument_node="">
</span></p><span data-dcnode-id="6126" instrument_node="">

</span><h2 data-dcnode-id="6045"><span class="mw-headline" data-dcnode-id="6053" id="Techniques_and_structures"><span data-dcnode-id="6054" instrument_node="">Techniques and structures</span></span><span class="mw-editsection" data-dcnode-id="6046"><span class="mw-editsection-bracket" data-dcnode-id="6051"><span data-dcnode-id="6052" instrument_node="">[</span></span><a data-dcnode-id="6049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D28" title="Edit section: Techniques and structures"><span data-dcnode-id="6050" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6047"><span data-dcnode-id="6048" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6044" instrument_node="">
</span><link data-dcnode-id="6043" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6039" role="note"><span data-dcnode-id="6042" instrument_node="">See also: </span><a data-dcnode-id="6040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oriental_rug%23_manufacture" title="Oriental rug"><span data-dcnode-id="6041" instrument_node="">Oriental rug  §&nbsp; manufacture</span></a></div><span data-dcnode-id="6038" instrument_node="">
</span><h3 data-dcnode-id="6028"><span class="mw-headline" data-dcnode-id="6036" id="The_process_of_weaving_a_rug"><span data-dcnode-id="6037" instrument_node="">The process of weaving a rug</span></span><span class="mw-editsection" data-dcnode-id="6029"><span class="mw-editsection-bracket" data-dcnode-id="6034"><span data-dcnode-id="6035" instrument_node="">[</span></span><a data-dcnode-id="6032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D29" title="Edit section: The process of weaving a rug"><span data-dcnode-id="6033" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6030"><span data-dcnode-id="6031" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6027" instrument_node="">
</span><p data-dcnode-id="6025"><span data-dcnode-id="6026" instrument_node="">The weaving of pile rugs is a time-consuming process which, depending on the quality and size of the rug, may take anywhere from a few months to several years to complete.
</span></p><p data-dcnode-id="6017"><span data-dcnode-id="6024" instrument_node="">To begin making a rug, one needs a foundation consisting of warps and wefts: </span><a class="mw-redirect" data-dcnode-id="6022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warp_%28weaving%29" title="Warp (weaving)"><span data-dcnode-id="6023" instrument_node="">Warps</span></a><span data-dcnode-id="6021" instrument_node=""> are strong, thick threads of cotton, wool or silk which run through the length of the rug. Similar threads which pass under and over the warps from one side to the other are called </span><a class="mw-redirect" data-dcnode-id="6019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warp_and_woof" title="Warp and woof"><span data-dcnode-id="6020" instrument_node="">wefts</span></a><span data-dcnode-id="6018" instrument_node="">. The warps on either side of the rug are normally plied into one or more strings of varying thickness that are overcast to form the selvedge.
</span></p><p data-dcnode-id="6012"><span data-dcnode-id="6016" instrument_node="">Weaving normally begins from the bottom of the loom, by passing a number of wefts through the warps to form a base to start from. Knots of dyed wool, cotton or silk threads are then tied in rows around consecutive sets of adjacent warps. As more rows are tied to the foundation, these knots become the pile of the rug. Between each row of knots, one or more shots of weft are passed to keep the knots fixed. The wefts are then beaten down by a comb-like instrument, the comb beater, to further compact and secure the newly woven row. Depending on the fineness of the weave, the quality of the materials and the expertise of the weavers, the </span><a class="mw-redirect" data-dcnode-id="6014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Knot_count" title="Knot count"><span data-dcnode-id="6015" instrument_node="">knot count</span></a><span data-dcnode-id="6013" instrument_node=""> of a handmade rug can vary anywhere from 16 to 800 knots per square inch.
</span></p><p data-dcnode-id="6010"><span data-dcnode-id="6011" instrument_node="">When the rug is completed, the warp ends form the fringes that may be weft-faced, braided, tasseled, or secured in other ways.
</span></p><span data-dcnode-id="6009" instrument_node="">
</span><h3 data-dcnode-id="5999"><span class="mw-headline" data-dcnode-id="6007" id="Looms"><span data-dcnode-id="6008" instrument_node="">Looms</span></span><span class="mw-editsection" data-dcnode-id="6000"><span class="mw-editsection-bracket" data-dcnode-id="6005"><span data-dcnode-id="6006" instrument_node="">[</span></span><a data-dcnode-id="6003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D30" title="Edit section: Looms"><span data-dcnode-id="6004" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6001"><span data-dcnode-id="6002" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5998" instrument_node="">
</span><p data-dcnode-id="5996"><span data-dcnode-id="5997" instrument_node="">Looms do not vary greatly in essential details, but they do vary in size and sophistication. The main technical requirement of the loom is to provide the correct tension and the means of dividing the warps into alternate sets of leaves. A shedding device allows the weaver to pass wefts through crossed and uncrossed warps, instead of laboriously threading the weft in and out of the warps.
</span></p><span data-dcnode-id="5995" instrument_node="">
</span><h3 data-dcnode-id="5985"><span class="mw-headline" data-dcnode-id="5993" id="Horizontal_looms"><span data-dcnode-id="5994" instrument_node="">Horizontal looms</span></span><span class="mw-editsection" data-dcnode-id="5986"><span class="mw-editsection-bracket" data-dcnode-id="5991"><span data-dcnode-id="5992" instrument_node="">[</span></span><a data-dcnode-id="5989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D31" title="Edit section: Horizontal looms"><span data-dcnode-id="5990" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5987"><span data-dcnode-id="5988" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5984" instrument_node="">
</span><p data-dcnode-id="5978"><span data-dcnode-id="5983" instrument_node="">The simplest form of loom is a horizontal; one that can be staked to the ground or supported by sidepieces on the ground. The necessary tension can be obtained through the use of wedges. This style of loom is ideal for nomadic people as it can be assembled or dismantled and is easily transportable. Rugs produced on horizontal looms are generally fairly small and the weave quality is inferior to those rugs made on a professional standing loom.</span><sup class="reference" data-dcnode-id="5980" id="cite_ref-Edwards,_1952_25-9"><a data-dcnode-id="5981" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="5982" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5979" instrument_node="">
</span></p><span data-dcnode-id="5977" instrument_node="">
</span><h3 data-dcnode-id="5967"><span class="mw-headline" data-dcnode-id="5975" id="Vertical_looms"><span data-dcnode-id="5976" instrument_node="">Vertical looms</span></span><span class="mw-editsection" data-dcnode-id="5968"><span class="mw-editsection-bracket" data-dcnode-id="5973"><span data-dcnode-id="5974" instrument_node="">[</span></span><a data-dcnode-id="5971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D32" title="Edit section: Vertical looms"><span data-dcnode-id="5972" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5969"><span data-dcnode-id="5970" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5966" instrument_node="">
</span><p data-dcnode-id="5960"><span data-dcnode-id="5965" instrument_node="">The technically more advanced, stationary vertical looms are used in villages and town manufactures. The more advanced types of vertical looms are more comfortable, as they allow for the weavers to retain their position throughout the entire weaving process. The Tabriz type of vertical loom allows for weaving of carpets up to double the length of the loom, while there is no limit to the length of the carpet that can be woven on a vertical roller beam loom. In essence, the width of the carpet is limited by the length of the loom beams.</span><sup class="reference" data-dcnode-id="5962" id="cite_ref-Edwards,_1952_25-10"><a data-dcnode-id="5963" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="5964" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5961" instrument_node="">
</span></p><p data-dcnode-id="5955"><span data-dcnode-id="5959" instrument_node="">There are three general types of vertical looms, all of which can be modified in a number of ways: the fixed village loom, the </span><a data-dcnode-id="5957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tabriz" title="Tabriz"><span data-dcnode-id="5958" instrument_node="">Tabriz</span></a><span data-dcnode-id="5956" instrument_node=""> or Bunyan loom, and the roller beam loom.
</span></p><span data-dcnode-id="5954" instrument_node="">
</span><ol data-dcnode-id="5939"><li data-dcnode-id="5949"><span data-dcnode-id="5953" instrument_node="">The fixed village loom is used mainly in </span><a data-dcnode-id="5951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="5952" instrument_node="">Iran</span></a><span data-dcnode-id="5950" instrument_node=""> and consists of a fixed upper beam and a moveable lower or cloth beam which slots into two sidepieces. The correct tension of the warps is obtained by driving wedges into the slots. The weavers work on an adjustable plank which is raised as the work progresses.</span></li><span data-dcnode-id="5948" instrument_node="">
</span><li data-dcnode-id="5943"><span data-dcnode-id="5947" instrument_node="">The Tabriz loom, named after the city of </span><a data-dcnode-id="5945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tabriz" title="Tabriz"><span data-dcnode-id="5946" instrument_node="">Tabriz</span></a><span data-dcnode-id="5944" instrument_node="">, is used in Northwestern Iran. The warps are continuous and pass around behind the loom. Warp tension is obtained with wedges. The weavers sit on a fixed seat and when a portion of the carpet has been completed, the tension is released and the carpet is pulled down and rolled around the back of the loom. This process continues until the rug is completed, when the warps are severed and the carpet is taken off the loom.</span></li><span data-dcnode-id="5942" instrument_node="">
</span><li data-dcnode-id="5940"><span data-dcnode-id="5941" instrument_node="">The roller beam loom is used in larger Turkish manufactures, but is also found in Persia and India. It consists of two movable beams to which the warps are attached. Both beams are fitted with ratchets or similar locking devices. Once a section of the carpet is completed, is rolled on to the lower beam. On a roller beam loom, any length of carpet can be produced. In some areas of Turkey several rugs are woven in series on the same warps, and separated from each other by cutting the warps after the weaving is finished.</span></li></ol><span data-dcnode-id="5938" instrument_node="">
</span><h3 data-dcnode-id="5928"><span class="mw-headline" data-dcnode-id="5936" id="Tools"><span data-dcnode-id="5937" instrument_node="">Tools</span></span><span class="mw-editsection" data-dcnode-id="5929"><span class="mw-editsection-bracket" data-dcnode-id="5934"><span data-dcnode-id="5935" instrument_node="">[</span></span><a data-dcnode-id="5932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D33" title="Edit section: Tools"><span data-dcnode-id="5933" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5930"><span data-dcnode-id="5931" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5927" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5918"><div class="thumbinner" data-dcnode-id="5919" style="width:222px;"><a class="image" data-dcnode-id="5925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACarpet_tools.jpg"><img alt="" class="thumbimage" data-dcnode-id="5926" data-file-height="2170" data-file-width="1464" decoding="async" height="326" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/21/Carpet_tools.jpg/220px-Carpet_tools.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/21/Carpet_tools.jpg/330px-Carpet_tools.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/21/Carpet_tools.jpg/440px-Carpet_tools.jpg 2x" width="220"></a><span data-dcnode-id="5924" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5920"><div class="magnify" data-dcnode-id="5922"><a class="internal" data-dcnode-id="5923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACarpet_tools.jpg" title="Enlarge"></a></div><span data-dcnode-id="5921" instrument_node="">Some traditional tools of the craft.</span></div></div></div><span data-dcnode-id="5917" instrument_node="">
</span><p data-dcnode-id="5915"><span data-dcnode-id="5916" instrument_node="">The weaver needs a number of essential tools: a knife for cutting the yarn as the knots are tied; a heavy comb-like instrument with a handle for packing down the wefts; and a pair of shears for trimming the pile after a row of knots, or a small number of rows, have been woven. In Tabriz the knife is combined with a hook to tie the knots, which speeds up work. A small steel comb is sometimes used to comb out the yarn after each row of knots is completed.
</span></p><p data-dcnode-id="5907"><span data-dcnode-id="5914" instrument_node="">A variety of additional instruments are used for packing the weft. Some weaving areas in Iran known for producing very fine pieces use additional tools. In </span><a data-dcnode-id="5912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerman" title="Kerman"><span data-dcnode-id="5913" instrument_node="">Kerman</span></a><span data-dcnode-id="5911" instrument_node="">, a saber like instrument is used horizontally inside the shed. In </span><a data-dcnode-id="5909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bijar_%28city%29" title="Bijar (city)"><span data-dcnode-id="5910" instrument_node="">Bijar</span></a><span data-dcnode-id="5908" instrument_node="">, a nail-like tool is inserted between the warps, and beaten on in order to compact the fabric even more. Bijar is also famous for their wet loom technique, which consists of wetting the warp, weft, and yarn with water throughout the weaving process to compact the wool and allow for a particularly heavy compression of the pile, warps, and wefts. When the rug is complete and dried, the wool and cotton expand, which results in a very heavy and stiff texture. Bijar rugs are not easily pliable without damaging the fabric.
</span></p><p data-dcnode-id="5905"><span data-dcnode-id="5906" instrument_node="">A number of different tools may be used to shear the wool depending on how the rug is trimmed as the weaving progresses or when the rug is complete. Often in Chinese rugs the yarn is trimmed after completion and the trimming is slanted where the color changes, giving an embossed three-dimensional effect.
</span></p><span data-dcnode-id="5904" instrument_node="">
</span><div data-dcnode-id="5903" style="clear:both;"></div><span data-dcnode-id="5902" instrument_node="">
</span><h3 data-dcnode-id="5892"><span class="mw-headline" data-dcnode-id="5900" id="Knots"><span data-dcnode-id="5901" instrument_node="">Knots</span></span><span class="mw-editsection" data-dcnode-id="5893"><span class="mw-editsection-bracket" data-dcnode-id="5898"><span data-dcnode-id="5899" instrument_node="">[</span></span><a data-dcnode-id="5896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D34" title="Edit section: Knots"><span data-dcnode-id="5897" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5894"><span data-dcnode-id="5895" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5891" instrument_node="">
</span><link data-dcnode-id="5890" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5886" role="note"><span data-dcnode-id="5889" instrument_node="">Main article: </span><a data-dcnode-id="5887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Knotted-pile_carpet" title="Knotted-pile carpet"><span data-dcnode-id="5888" instrument_node="">Knotted-pile carpet</span></a></div><span data-dcnode-id="5885" instrument_node="">
</span><div class="thumb tmulti tright" data-dcnode-id="5867"><div class="thumbinner" data-dcnode-id="5868" style="width:248px;max-width:248px"><div class="trow" data-dcnode-id="5869"><div class="tsingle" data-dcnode-id="5877" style="width:122px;max-width:122px"><div class="thumbimage" data-dcnode-id="5880"><a class="image" data-dcnode-id="5881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANoeud_turc.jpg"><img alt="" data-dcnode-id="5882" data-file-height="881" data-file-width="700" decoding="async" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Noeud_turc.jpg/120px-Noeud_turc.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Noeud_turc.jpg/180px-Noeud_turc.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Noeud_turc.jpg/240px-Noeud_turc.jpg 2x" width="120"></a></div><div class="thumbcaption" data-dcnode-id="5878"><span data-dcnode-id="5879" instrument_node="">Ghiordes knot</span></div></div><div class="tsingle" data-dcnode-id="5870" style="width:122px;max-width:122px"><div class="thumbimage" data-dcnode-id="5874"><a class="image" data-dcnode-id="5875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANoeud_senneh.jpg"><img alt="" data-dcnode-id="5876" data-file-height="883" data-file-width="700" decoding="async" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Noeud_senneh.jpg/120px-Noeud_senneh.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Noeud_senneh.jpg/180px-Noeud_senneh.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Noeud_senneh.jpg/240px-Noeud_senneh.jpg 2x" width="120"></a></div><div class="thumbcaption" data-dcnode-id="5871"><b data-dcnode-id="5872"><span data-dcnode-id="5873" instrument_node="">Senneh knot</span></b></div></div></div></div></div><span data-dcnode-id="5866" instrument_node="">
</span><p data-dcnode-id="5851"><span data-dcnode-id="5865" instrument_node="">Persian carpets are mainly woven with two different knots: The symmetrical </span><a class="mw-redirect" data-dcnode-id="5863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ghiordes_knot" title="Ghiordes knot"><span data-dcnode-id="5864" instrument_node="">Turkish</span></a><span data-dcnode-id="5862" instrument_node=""> or "Giordes" knot, also used in Turkey, the Caucasus, East Turkmenistan, and some Turkish and Kurdish areas of Iran, and the asymmetrical </span><b data-dcnode-id="5860"><span data-dcnode-id="5861" instrument_node="">Persian</span></b><span data-dcnode-id="5859" instrument_node="">, or </span><b data-dcnode-id="5857"><span data-dcnode-id="5858" instrument_node="">Senneh knot</span></b><span data-dcnode-id="5856" instrument_node="">, also used in India, Turkey, Pakistan, China, and Egypt. The term "Senneh knot" is somewhat misleading, as rugs are woven with symmetric knots in the town of Senneh.</span><sup class="reference" data-dcnode-id="5853" id="cite_ref-Edwards,_1952_25-11"><a data-dcnode-id="5854" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="5855" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5852" instrument_node="">
</span></p><p data-dcnode-id="5845"><span data-dcnode-id="5850" instrument_node="">To tie a symmetric knot, the yarn is passed between two adjacent warps, brought back under one, wrapped around both forming a collar, then pulled through the center so that both ends emerge between the warps.</span><sup class="reference" data-dcnode-id="5847" id="cite_ref-Edwards,_1952_25-12"><a data-dcnode-id="5848" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="5849" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5846" instrument_node="">
</span></p><p data-dcnode-id="5839"><span data-dcnode-id="5844" instrument_node="">The asymmetric knot is tied by wrapping the yarn around only one warp, then the thread is passed behind the adjacent warp so that it divides the two ends of the yarn. The Persian knot may open on the left or the right.</span><sup class="reference" data-dcnode-id="5841" id="cite_ref-Edwards,_1952_25-13"><a data-dcnode-id="5842" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="5843" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5840" instrument_node="">
</span></p><p data-dcnode-id="5833"><span data-dcnode-id="5838" instrument_node="">The asymmetric knot allows to produce more fluent, often curvilinear designs, while more bold, rectilinear designs may use the symmetric knot. As exemplified by Senneh rugs with their elaborate designs woven with symmetric knots, the quality of the design depends more on the weaver's skills, than on the type of knot which is used.</span><sup class="reference" data-dcnode-id="5835" id="cite_ref-Edwards,_1952_25-14"><a data-dcnode-id="5836" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="5837" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5834" instrument_node="">
</span></p><p data-dcnode-id="5823"><span data-dcnode-id="5832" instrument_node="">Another knot frequently used in Persian carpets is the Jufti knot, which is tied around four warps instead of two.</span><sup class="reference" data-dcnode-id="5829" id="cite_ref-Eilland_&amp;_Eilland_Complete_Guide_1998_44-5"><a data-dcnode-id="5830" href="#cite_note-Eilland_&amp;_Eilland_Complete_Guide_1998-44"><span data-dcnode-id="5831" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5828" instrument_node=""> A serviceable carpet can be made with jufti knots, and jufti knots are sometimes used in large single-colour areas of a rug, for example in the field, to save on material. However, as carpets woven wholly or partly with the jufti knot need only half the amount of pile yarn compared to traditionally woven carpets, their pile is less resistant to wear, and these rugs do not last as long.</span><sup class="reference" data-dcnode-id="5825" id="cite_ref-Edwards,_1952_25-15"><a data-dcnode-id="5826" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="5827" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5824" instrument_node="">
</span></p><span data-dcnode-id="5822" instrument_node="">
</span><ul class="gallery mw-gallery-traditional" data-dcnode-id="5728"><span data-dcnode-id="5821" instrument_node="">

</span><h3 data-dcnode-id="5717"><span class="mw-headline" data-dcnode-id="5725" id="Flat-woven_carpets"><span data-dcnode-id="5726" instrument_node="">Flat-woven carpets</span></span><span class="mw-editsection" data-dcnode-id="5718"><span class="mw-editsection-bracket" data-dcnode-id="5723"><span data-dcnode-id="5724" instrument_node="">[</span></span><a data-dcnode-id="5721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D35" title="Edit section: Flat-woven carpets"><span data-dcnode-id="5722" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5719"><span data-dcnode-id="5720" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5716" instrument_node="">
</span><p data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">Flat woven carpets are given their colour and pattern from the weft which is tightly intertwined with the warp. Rather than an actual pile, the foundation of these rugs gives them their design. The weft is woven between the warp until a new colour is needed, it is then looped back and knotted before a new colour is implemented.
</span></p><p data-dcnode-id="5712"><span data-dcnode-id="5713" instrument_node="">The most popular of flat-weaves is called the Kilim. Kilim rugs (along with jewellery, clothing and animals) are important for the identity and wealth of nomadic tribes-people. In their traditional setting Kilims are used as floor and wall coverings, horse-saddles, storage bags, bedding and cushion covers.
</span></p><p data-dcnode-id="5710"><span data-dcnode-id="5711" instrument_node="">Various forms of flat-weaves exist including:
</span></p><span data-dcnode-id="5709" instrument_node="">
</span><ul data-dcnode-id="5676"><li data-dcnode-id="5706"><a class="new" data-dcnode-id="5707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHerati_rug%26action%3Dedit%26redlink%3D1" title="Herati rug (page does not exist)"><span data-dcnode-id="5708" instrument_node="">Herati</span></a></li><span data-dcnode-id="5705" instrument_node="">

</span><li data-dcnode-id="5694"><a class="mw-redirect" data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gelim" title="Gelim"><span data-dcnode-id="5700" instrument_node="">Gelim</span></a><span data-dcnode-id="5698" instrument_node=""> (</span><a data-dcnode-id="5696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kilim" title="Kilim"><span data-dcnode-id="5697" instrument_node="">Kilim</span></a><span data-dcnode-id="5695" instrument_node="">)</span></li><span data-dcnode-id="5693" instrument_node="">

</span><li data-dcnode-id="5681"><a class="mw-redirect" data-dcnode-id="5683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soumak_rug" title="Soumak rug"><span data-dcnode-id="5684" instrument_node="">Soumak</span></a><span data-dcnode-id="5682" instrument_node=""> (Soumakh)</span></li><span data-dcnode-id="5680" instrument_node="">
