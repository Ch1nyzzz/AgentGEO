</span><h3 data-dcnode-id="7440"><span data-dcnode-id="7450" id="The_Mongol_Ilkhanate_.281256.E2.80.931335.29_and_Timurid_Empire_.281370.E2.80.931507.29"></span><span class="mw-headline" data-dcnode-id="7448" id="The_Mongol_Ilkhanate_(1256–1335)_and_Timurid_Empire_(1370–1507)"><span data-dcnode-id="7449" instrument_node="">The Mongol Ilkhanate (1256–1335) and Timurid Empire (1370–1507)</span></span><span class="mw-editsection" data-dcnode-id="7441"><span class="mw-editsection-bracket" data-dcnode-id="7446"><span data-dcnode-id="7447" instrument_node="">[</span></span><a data-dcnode-id="7444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D8" title="Edit section: The Mongol Ilkhanate (1256–1335) and Timurid Empire (1370–1507)"><span data-dcnode-id="7445" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7442"><span data-dcnode-id="7443" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7439" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7430"><div class="thumbinner" data-dcnode-id="7431" style="width:222px;"><a class="image" data-dcnode-id="7437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADiezAlbumsStudyingTheKoran.jpg"><img alt="" class="thumbimage" data-dcnode-id="7438" data-file-height="4001" data-file-width="3538" decoding="async" height="249" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/84/DiezAlbumsStudyingTheKoran.jpg/220px-DiezAlbumsStudyingTheKoran.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/84/DiezAlbumsStudyingTheKoran.jpg/330px-DiezAlbumsStudyingTheKoran.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/84/DiezAlbumsStudyingTheKoran.jpg/440px-DiezAlbumsStudyingTheKoran.jpg 2x" width="220"></a><span data-dcnode-id="7436" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7432"><div class="magnify" data-dcnode-id="7434"><a class="internal" data-dcnode-id="7435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADiezAlbumsStudyingTheKoran.jpg" title="Enlarge"></a></div><span data-dcnode-id="7433" instrument_node="">A Mongol prince studying the Koran. Illustration of Rashid-ad-Din's Gami' at-tawarih. Tabriz (?), 1st quarter of 14th century</span></div></div></div><span data-dcnode-id="7429" instrument_node="">
</span><p data-dcnode-id="7411"><span data-dcnode-id="7428" instrument_node="">Between 1219 and 1221, Persia was raided by the </span><a data-dcnode-id="7426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mongol_Empire" title="Mongol Empire"><span data-dcnode-id="7427" instrument_node="">Mongols</span></a><span data-dcnode-id="7425" instrument_node="">. After 1260, the title </span><a data-dcnode-id="7423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ilkhanate" title="Ilkhanate"><span data-dcnode-id="7424" instrument_node="">"Ilkhan"</span></a><span data-dcnode-id="7422" instrument_node=""> was borne by the descendants of </span><a data-dcnode-id="7420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hulagu_Khan" title="Hulagu Khan"><span data-dcnode-id="7421" instrument_node="">Hulagu Khan</span></a><span data-dcnode-id="7419" instrument_node=""> and later other Borjigin princes in Persia. At the end of the thirteenth century, </span><a data-dcnode-id="7417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ghazan" title="Ghazan"><span data-dcnode-id="7418" instrument_node="">Ghazan</span></a><span data-dcnode-id="7416" instrument_node=""> Khan built a new capital at Shãm, near Tabriz. He ordered the floors of his residence to be covered with carpets from Fārs.</span><sup class="reference" data-dcnode-id="7413" id="cite_ref-Edwards,_1952_25-1"><a data-dcnode-id="7414" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="7415" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7412" instrument_node="">
</span></p><p data-dcnode-id="7397"><span data-dcnode-id="7410" instrument_node="">With the death of Ilkhan Abu Said Bahatur in 1335, Mongol rule faltered and Persia fell into political anarchy. In 1381, </span><a data-dcnode-id="7408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timur" title="Timur"><span data-dcnode-id="7409" instrument_node="">Timur</span></a><span data-dcnode-id="7407" instrument_node=""> invaded Iran and became the founder of the </span><a data-dcnode-id="7405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timurid_Empire" title="Timurid Empire"><span data-dcnode-id="7406" instrument_node="">Timurid Empire</span></a><span data-dcnode-id="7404" instrument_node="">. His successors, the Timurids, maintained a hold on most of Iran until they had to submit to the </span><a class="mw-redirect" data-dcnode-id="7402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ag_Qoyunlu" title="Ag Qoyunlu"><span data-dcnode-id="7403" instrument_node="">"White Sheep" Turkmen</span></a><span data-dcnode-id="7401" instrument_node=""> confederation under </span><a class="mw-redirect" data-dcnode-id="7399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uzun_Hassan" title="Uzun Hassan"><span data-dcnode-id="7400" instrument_node="">Uzun Hassan</span></a><span data-dcnode-id="7398" instrument_node=""> in 1468; Uzun Hasan and his successors were the masters of Iran until the rise of the Safavids.
</span></p><p data-dcnode-id="7385"><span data-dcnode-id="7396" instrument_node="">In 1463, the Venetian Senate, seeking allies in the </span><a data-dcnode-id="7394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman%25E2%2580%2593Venetian_War_%281463%25E2%2580%25931479%29" title="Ottoman–Venetian War (1463–1479)"><span data-dcnode-id="7395" instrument_node="">Ottoman–Venetian War (1463–1479)</span></a><span data-dcnode-id="7393" instrument_node=""> established diplomatic relations with Uzun Hassans court at Tabriz. In 1473, </span><a data-dcnode-id="7391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giosafat_Barbaro" title="Giosafat Barbaro"><span data-dcnode-id="7392" instrument_node="">Giosafat Barbaro</span></a><span data-dcnode-id="7390" instrument_node=""> was sent to Tabriz. In his reports to the Senate of Venetia he mentions more than once the splendid carpets which he saw at the palace. Some of them, he wrote, were of silk.</span><sup class="reference" data-dcnode-id="7387" id="cite_ref-30"><a data-dcnode-id="7388" href="#cite_note-30"><span data-dcnode-id="7389" instrument_node="">[30]</span></a></sup><span data-dcnode-id="7386" instrument_node="">
</span></p><p data-dcnode-id="7357"><span data-dcnode-id="7384" instrument_node="">In 1403-05 </span><a data-dcnode-id="7382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruy_Gonz%25C3%25A1lez_de_Clavijo" title="Ruy González de Clavijo"><span data-dcnode-id="7383" instrument_node="">Ruy González de Clavijo</span></a><span data-dcnode-id="7381" instrument_node=""> was the ambassador of </span><a data-dcnode-id="7379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_III_of_Castile" title="Henry III of Castile"><span data-dcnode-id="7380" instrument_node="">Henry III of Castile</span></a><span data-dcnode-id="7378" instrument_node=""> to the court of </span><a data-dcnode-id="7376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timur" title="Timur"><span data-dcnode-id="7377" instrument_node="">Timur</span></a><span data-dcnode-id="7375" instrument_node="">, founder and ruler of the </span><a data-dcnode-id="7373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timurid_Empire" title="Timurid Empire"><span data-dcnode-id="7374" instrument_node="">Timurid Empire</span></a><span data-dcnode-id="7372" instrument_node="">. He described that in Timur's palace at </span><a data-dcnode-id="7370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samarkand" title="Samarkand"><span data-dcnode-id="7371" instrument_node="">Samarkand</span></a><span data-dcnode-id="7369" instrument_node="">, "everywhere the floor was covered with carpets and reed mattings".</span><sup class="reference" data-dcnode-id="7366" id="cite_ref-31"><a data-dcnode-id="7367" href="#cite_note-31"><span data-dcnode-id="7368" instrument_node="">[31]</span></a></sup><span data-dcnode-id="7365" instrument_node=""> Timurid period miniatures show carpets with geometrical designs, rows of octagons and stars, knot forms, and borders sometimes derived from </span><a data-dcnode-id="7363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kufic" title="Kufic"><span data-dcnode-id="7364" instrument_node="">kufic</span></a><span data-dcnode-id="7362" instrument_node=""> script. None of the carpets woven before 1500 AD have survived.</span><sup class="reference" data-dcnode-id="7359" id="cite_ref-Edwards,_1952_25-2"><a data-dcnode-id="7360" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="7361" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7358" instrument_node="">
</span></p><span data-dcnode-id="7356" instrument_node="">
</span><h3 data-dcnode-id="7345"><span data-dcnode-id="7355" id="The_Safavid_Period_.281501.E2.80.931732.29"></span><span class="mw-headline" data-dcnode-id="7353" id="The_Safavid_Period_(1501–1732)"><span data-dcnode-id="7354" instrument_node="">The Safavid Period (1501–1732)</span></span><span class="mw-editsection" data-dcnode-id="7346"><span class="mw-editsection-bracket" data-dcnode-id="7351"><span data-dcnode-id="7352" instrument_node="">[</span></span><a data-dcnode-id="7349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D9" title="Edit section: The Safavid Period (1501–1732)"><span data-dcnode-id="7350" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7347"><span data-dcnode-id="7348" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7344" instrument_node="">

26" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Museum_of_Islamic_Art%2C_Doha" title="Museum of Islamic Art, Doha"><span data-dcnode-id="7327" instrument_node="">Museum of Islamic Art, Doha</span></a></div></div></div><span data-dcnode-id="7322" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="7298"><div class="thumbinner" data-dcnode-id="7299" style="width:222px;"><a class="image" data-dcnode-id="7305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Clark_%2527Sickle-Leaf%2527%2C_vine_scroll_and_palmette_carpet%2C_probably_Kirman%2C_17th_century.jpg"><img alt="" class="thumbimage" data-dcnode-id="7306" data-file-height="634" data-file-width="464" decoding="async" height="301" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/37/The_Clark_%2527Sickle-Leaf%2527%252C_vine_scroll_and_palmette_carpet%252C_probably_Kirman%252C_17th_century.jpg/220px-The_Clark_%2527Sickle-Leaf%2527%252C_vine_scroll_and_palmette_carpet%252C_probably_Kirman%252C_17th_century.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/37/The_Clark_%27Sickle-Leaf%27%2C_vine_scroll_and_palmette_carpet%2C_probably_Kirman%2C_17th_century.jpg/330px-The_Clark_%27Sickle-Leaf%27%2C_vine_scroll_and_palmette_carpet%2C_probably_Kirman%2C_17th_century.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/37/The_Clark_%27Sickle-Leaf%27%2C_vine_scroll_and_palmette_carpet%2C_probably_Kirman%2C_17th_century.jpg/440px-The_Clark_%27Sickle-Leaf%27%2C_vine_scroll_and_palmette_carpet%2C_probably_Kirman%2C_17th_century.jpg 2x" width="220"></a><span data-dcnode-id="7304" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7300"><div class="magnify" data-dcnode-id="7302"><a class="internal" data-dcnode-id="7303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Clark_%2527Sickle-Leaf%2527%2C_vine_scroll_and_palmette_carpet%2C_probably_Kirman%2C_17th_century.jpg" title="Enlarge"></a></div><span data-dcnode-id="7301" instrument_node="">The Clark 'Sickle-Leaf', vine scroll and palmette carpet, probably Kirman, 17th century</span></div></div></div><span data-dcnode-id="7297" instrument_node="">
</span><p data-dcnode-id="7263"><span data-dcnode-id="7296" instrument_node="">In 1499, a new dynasty arose in Persia. Shah </span><a data-dcnode-id="7294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ismail_I" title="Ismail I"><span data-dcnode-id="7295" instrument_node="">Ismail I</span></a><span data-dcnode-id="7293" instrument_node="">, its founder, was related to Uzun Hassan. He is regarded as the first national sovereign of Persia since the Arab conquest, and established </span><a data-dcnode-id="7291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shia_Islam" title="Shia Islam"><span data-dcnode-id="7292" instrument_node="">Shi'a Islam</span></a><span data-dcnode-id="7290" instrument_node=""> as the state religion of Persia.</span><sup class="reference" data-dcnode-id="7287" id="cite_ref-32"><a data-dcnode-id="7288" href="#cite_note-32"><span data-dcnode-id="7289" instrument_node="">[32]</span></a></sup><span data-dcnode-id="7286" instrument_node=""> He and his successors, Shah </span><a data-dcnode-id="7284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tahmasp_I" title="Tahmasp I"><span data-dcnode-id="7285" instrument_node="">Tahmasp I</span></a><span data-dcnode-id="7283" instrument_node=""> and Shah </span><a class="mw-redirect" data-dcnode-id="7281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abbas_I_of_Persia" title="Abbas I of Persia"><span data-dcnode-id="7282" instrument_node="">Abbas I</span></a><span data-dcnode-id="7280" instrument_node=""> became patrons of the Persian </span><a data-dcnode-id="7278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safavid_art" title="Safavid art"><span data-dcnode-id="7279" instrument_node="">Safavid art</span></a><span data-dcnode-id="7277" instrument_node="">. Court manufactories were probably established by Shah Tahmasp in Tabriz, but definitely by Shah Abbas when he moved his capital from Tabriz in northwestern to </span><a data-dcnode-id="7275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isfahan" title="Isfahan"><span data-dcnode-id="7276" instrument_node="">Isfahan</span></a><span data-dcnode-id="7274" instrument_node=""> in central Persia, in the wake of the </span><a class="mw-redirect" data-dcnode-id="7272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman%25E2%2580%2593Safavid_War_%281603%25E2%2580%259318%29" title="Ottoman–Safavid War (1603–18)"><span data-dcnode-id="7273" instrument_node="">Ottoman–Safavid War (1603–18)</span></a><span data-dcnode-id="7271" instrument_node="">. For the art of carpet weaving in Persia, this meant, as Edwards wrote: "that in a short time it rose from a cottage </span><i data-dcnode-id="7269"><span data-dcnode-id="7270" instrument_node="">métier</span></i><span data-dcnode-id="7268" instrument_node=""> to the dignity of a fine art."</span><sup class="reference" data-dcnode-id="7265" id="cite_ref-Edwards,_1952_25-3"><a data-dcnode-id="7266" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="7267" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7264" instrument_node="">
</span></p><p data-dcnode-id="7242"><span data-dcnode-id="7262" instrument_node="">The time of the </span><a data-dcnode-id="7260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safavid_dynasty" title="Safavid dynasty"><span data-dcnode-id="7261" instrument_node="">Safavid dynasty</span></a><span data-dcnode-id="7259" instrument_node=""> marks one of the greatest periods in </span><a class="mw-redirect" data-dcnode-id="7257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_art" title="Iranian art"><span data-dcnode-id="7258" instrument_node="">Persian art</span></a><span data-dcnode-id="7256" instrument_node="">, which includes carpet weaving. Later Safavid period carpets still exist, which belong to the finest and most elaborate weavings known today. The phenomenon that the first carpets physically known to us show such accomplished designs leads to the assumption that the art and craft of carpet weaving must already have existed for some time before the magnificent Safavid court carpets could have been woven. As no early Safavid period carpets survived, research has focused on Timurid period book illuminations and </span><a data-dcnode-id="7254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_miniature" title="Persian miniature"><span data-dcnode-id="7255" instrument_node="">miniature</span></a><span data-dcnode-id="7253" instrument_node=""> paintings. These paintings depict colourful carpets with repeating designs of equal-scale geometric patterns, arranged in checkerboard-like designs, with "kufic" border ornaments derived from </span><a data-dcnode-id="7251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_calligraphy" title="Islamic calligraphy"><span data-dcnode-id="7252" instrument_node="">Islamic calligraphy</span></a><span data-dcnode-id="7250" instrument_node="">. The designs are so similar to period Anatolian carpets, especially to "</span><a data-dcnode-id="7248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holbein_carpet" title="Holbein carpet"><span data-dcnode-id="7249" instrument_node="">Holbein carpets</span></a><span data-dcnode-id="7247" instrument_node="">" that a common source of the design cannot be excluded: Timurid designs may have survived in both the Persian and Anatolian carpets from the early Safavid, and Ottoman period.</span><sup class="reference" data-dcnode-id="7244" id="cite_ref-Briggs,_Timurid_carpets_33-0"><a data-dcnode-id="7245" href="#cite_note-Briggs,_Timurid_carpets-33"><span data-dcnode-id="7246" instrument_node="">[33]</span></a></sup><span data-dcnode-id="7243" instrument_node="">
</span></p><span data-dcnode-id="7241" instrument_node="">
</span><h4 data-dcnode-id="7230"><span data-dcnode-id="7240" id="The_.22design_revolution.22"></span><span class="mw-headline" data-dcnode-id="7238" id="The_&quot;design_revolution&quot;"><span data-dcnode-id="7239" instrument_node="">The "design revolution"</span></span><span class="mw-editsection" data-dcnode-id="7231"><span class="mw-editsection-bracket" data-dcnode-id="7236"><span data-dcnode-id="7237" instrument_node="">[</span></span><a data-dcnode-id="7234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D10" title="Edit section: The &quot;design revolution&quot;"><span data-dcnode-id="7235" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7232"><span data-dcnode-id="7233" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7229" instrument_node="">
</span><p data-dcnode-id="7210"><span data-dcnode-id="7228" instrument_node="">By the late fifteenth century, the design of the carpets depicted in miniatures changed considerably. Large-format medaillons appeared, ornaments began to show elaborate curvilinear designs. Large spirals and tendrils, floral ornaments, depictions of flowers and animals, were often mirrored along the long or short axis of the carpet to obtain harmony and rhythm. The earlier "kufic" border design was replaced by tendrils and </span><a class="mw-redirect" data-dcnode-id="7226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arabesque_%28Islamic_art%29" title="Arabesque (Islamic art)"><span data-dcnode-id="7227" instrument_node="">arabesques</span></a><span data-dcnode-id="7225" instrument_node="">. All these patterns required a more elaborate system of weaving, as compared to weaving straight, rectilinear lines. Likewise, they require artists to create the design, weavers to execute them on the loom, and an efficient way to communicate the artist's ideas to the weaver. Today this is achieved by a template, termed cartoon (Ford, 1981, p.&nbsp;170</span><sup class="reference" data-dcnode-id="7222" id="cite_ref-Ford,_Oriental_Carpet_Design_34-0"><a data-dcnode-id="7223" href="#cite_note-Ford,_Oriental_Carpet_Design-34"><span data-dcnode-id="7224" instrument_node="">[34]</span></a></sup><span data-dcnode-id="7221" instrument_node="">). How Safavid manufacturers achieved this, technically, is currently unknown. The result of their work, however, was what </span><a data-dcnode-id="7219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurt_Erdmann" title="Kurt Erdmann"><span data-dcnode-id="7220" instrument_node="">Kurt Erdmann</span></a><span data-dcnode-id="7218" instrument_node=""> termed the </span><b data-dcnode-id="7216"><span data-dcnode-id="7217" instrument_node="">"carpet design revolution"</span></b><span data-dcnode-id="7215" instrument_node="">.</span><sup class="reference" data-dcnode-id="7212" id="cite_ref-Erdmann_35-0"><a data-dcnode-id="7213" href="#cite_note-Erdmann-35"><span data-dcnode-id="7214" instrument_node="">[35]</span></a></sup><span data-dcnode-id="7211" instrument_node="">
</span></p><p data-dcnode-id="7198"><span data-dcnode-id="7209" instrument_node="">Apparently, the new designs were developed first by miniature painters, as they started to appear in book illuminations and on book covers as early as in the fifteenth century. This marks the first time when the "classical" design of Islamic rugs was established: The medaillon and corner design (pers.: "Lechek Torūnj") was first seen on book covers. In 1522, Ismail I employed the miniature painter </span><a data-dcnode-id="7207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kam%25C4%2581l_ud-D%25C4%25ABn_Behz%25C4%2581d" title="Kamāl ud-Dīn Behzād"><span data-dcnode-id="7208" instrument_node="">Kamāl ud-Dīn Behzād</span></a><span data-dcnode-id="7206" instrument_node="">, a famous painter of the Herat school, as director of the royal atelier. Behzad had a decisive impact on the development of later Safavid art. The Safavid carpets known to us differ from the carpets as depicted in the miniature paintings, so the paintings cannot support any efforts to differentiate, classify and date period carpets. The same holds true for European paintings: Unlike Anatolian carpets, Persian carpets were not depicted in European paintings before the seventeenth century.</span><sup class="reference" data-dcnode-id="7203" id="cite_ref-Erdmann_1966_36-0"><a data-dcnode-id="7204" href="#cite_note-Erdmann_1966-36"><span data-dcnode-id="7205" instrument_node="">[36]</span></a></sup><span data-dcnode-id="7202" instrument_node=""> As some carpets like the </span><a class="mw-redirect" data-dcnode-id="7200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ardabil_carpet" title="Ardabil carpet"><span data-dcnode-id="7201" instrument_node="">Ardabil carpets</span></a><span data-dcnode-id="7199" instrument_node=""> have inwoven inscriptions including dates, scientific efforts to categorize and date Safavid rugs start from them:
</span></p><span data-dcnode-id="7197" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="7180"><blockquote data-dcnode-id="7187"><p data-dcnode-id="7188"><span data-dcnode-id="7194" instrument_node="">I have no refuge in the world other than thy threshold.</span><br data-dcnode-id="7193"><span data-dcnode-id="7192" instrument_node="">There is no protection for my head other than this door.</span><i data-dcnode-id="7190"><br data-dcnode-id="7191"></i><span data-dcnode-id="7189" instrument_node="">The work of the slave of the threshold Maqsud of Kashan in the year 946.</span></p></blockquote><span data-dcnode-id="7186" instrument_node=""> </span><div class="templatequotecite" data-dcnode-id="7181"><span data-dcnode-id="7185" instrument_node="">— </span><cite data-dcnode-id="7182"><i data-dcnode-id="7183"><span data-dcnode-id="7184" instrument_node="">Inwoven inscription of the Ardabil carpet</span></i></cite></div></blockquote><span data-dcnode-id="7179" instrument_node="">
</span><p data-dcnode-id="7171"><span data-dcnode-id="7178" instrument_node="">The AH year of 946 corresponds to AD 1539–1540, which dates the Ardabil carpet to the reign of Shah Tahmasp, who donated the carpet to the shrine of Shaykh </span><a data-dcnode-id="7176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safi-ad-din_Ardabili" title="Safi-ad-din Ardabili"><span data-dcnode-id="7177" instrument_node="">Safi-ad-din Ardabili</span></a><span data-dcnode-id="7175" instrument_node=""> in </span><a data-dcnode-id="7173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ardabil" title="Ardabil"><span data-dcnode-id="7174" instrument_node="">Ardabil</span></a><span data-dcnode-id="7172" instrument_node="">, who is regarded as the spiritual father of the Safavid dynasty.
</span></p><p data-dcnode-id="7166"><span data-dcnode-id="7170" instrument_node="">Another inscription can be seen on the "Hunting Carpet", now at the </span><a data-dcnode-id="7168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Museo_Poldi_Pezzoli" title="Museo Poldi Pezzoli"><span data-dcnode-id="7169" instrument_node="">Museo Poldi Pezzoli</span></a><span data-dcnode-id="7167" instrument_node="">, Milan, which dates the carpet to 949 AH/AD 1542–3:
</span></p><span data-dcnode-id="7165" instrument_node="">
</span><link data-dcnode-id="7164" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="7150"><blockquote data-dcnode-id="7157"><p data-dcnode-id="7158"><span data-dcnode-id="7163" instrument_node="">By the diligence of Ghyath ud-Din Jami was completed</span><br data-dcnode-id="7162"><span data-dcnode-id="7161" instrument_node="">This renowned work, that appeals to us by its beauty</span><br data-dcnode-id="7160"><span data-dcnode-id="7159" instrument_node="">In the year 949</span></p></blockquote><span data-dcnode-id="7156" instrument_node=""> </span><div class="templatequotecite" data-dcnode-id="7151"><span data-dcnode-id="7155" instrument_node="">— </span><cite data-dcnode-id="7152"><i data-dcnode-id="7153"><span data-dcnode-id="7154" instrument_node="">Inwoven inscription of the Milan Hunting carpet</span></i></cite></div></blockquote><span data-dcnode-id="7149" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7137"><div class="thumbinner" data-dcnode-id="7138" style="width:222px;"><a class="image" data-dcnode-id="7147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEmbassy_to_Europe.jpg"><img alt="" class="thumbimage" data-dcnode-id="7148" data-file-height="1496" data-file-width="2130" decoding="async" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Embassy_to_Europe.jpg/220px-Embassy_to_Europe.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Embassy_to_Europe.jpg/330px-Embassy_to_Europe.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Embassy_to_Europe.jpg/440px-Embassy_to_Europe.jpg 2x" width="220"></a><span data-dcnode-id="7146" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7139"><div class="magnify" data-dcnode-id="7144"><a class="internal" data-dcnode-id="7145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEmbassy_to_Europe.jpg" title="Enlarge"></a></div><span data-dcnode-id="7143" instrument_node="">Shah 'Abbas I. embassy to Venice, by </span><a data-dcnode-id="7141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carlo_Caliari" title="Carlo Caliari"><span data-dcnode-id="7142" instrument_node="">Carlo Caliari</span></a><span data-dcnode-id="7140" instrument_node="">, 1595. Doge's palace, Venice</span></div></div></div><span data-dcnode-id="7136" instrument_node="">
</span><p data-dcnode-id="7114"><span data-dcnode-id="7135" instrument_node="">The number of sources for more precise dating and the attribution of provenience increase during the 17th century. Safavid carpets were presented as diplomatic gifts to European cities and states, as diplomatic relations intensified. In 1603, Shah Abbas presented a carpet with inwoven gold and silver threads to the Venetian doge </span><a data-dcnode-id="7133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marino_Grimani_%28doge%29" title="Marino Grimani (doge)"><span data-dcnode-id="7134" instrument_node="">Marino Grimani</span></a><span data-dcnode-id="7132" instrument_node="">. European noblemen began ordering carpets directly from the manufactures of Isfahan and Kashan, whose weavers were willing to weave specific designs, like European coats of arms, into the commissioned peces. Their acquisition was sometimes meticulously documented: In 1601, the </span><a data-dcnode-id="7130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armenia" title="Armenia"><span data-dcnode-id="7131" instrument_node="">Armenian</span></a><span data-dcnode-id="7129" instrument_node=""> Sefer Muratowicz was sent to Kashan by the Polish king </span><a data-dcnode-id="7127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sigismund_III_Vasa" title="Sigismund III Vasa"><span data-dcnode-id="7128" instrument_node="">Sigismund III Vasa</span></a><span data-dcnode-id="7126" instrument_node=""> in order to commission 8 carpets with the Polish royal court of arms to be inwoven. The Kashan weavers did so, and on 12 September 1602 Muratowicz presented the carpets to the Polish king, and the bill to the treasurer of the crown.</span><sup class="reference" data-dcnode-id="7123" id="cite_ref-Erdmann_1966_36-1"><a data-dcnode-id="7124" href="#cite_note-Erdmann_1966-36"><span data-dcnode-id="7125" instrument_node="">[36]</span></a></sup><span data-dcnode-id="7122" instrument_node=""> Representative Safavid carpets made of silk with inwoven gold and silver threads were erroneously believed by Western art historians to be of Polish manufacture. Although the error was corrected, carpets of this type retained the name of "Polish" or "Polonaise" carpets. The more appropriate type name of "Shah Abbas" carpets was suggested by </span><a data-dcnode-id="7120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurt_Erdmann" title="Kurt Erdmann"><span data-dcnode-id="7121" instrument_node="">Kurt Erdmann</span></a><span data-dcnode-id="7119" instrument_node="">.</span><sup class="reference" data-dcnode-id="7116" id="cite_ref-Erdmann_1966_36-2"><a data-dcnode-id="7117" href="#cite_note-Erdmann_1966-36"><span data-dcnode-id="7118" instrument_node="">[36]</span></a></sup><span data-dcnode-id="7115" instrument_node="">
</span></p><span data-dcnode-id="7113" instrument_node="">

</span><h4 data-dcnode-id="7039"><span data-dcnode-id="7049" id="Safavid_.22Vase_technique.22_carpets_from_Kirm.C4.81n"></span><span class="mw-headline" data-dcnode-id="7047" id="Safavid_&quot;Vase_technique&quot;_carpets_from_Kirmān"><span data-dcnode-id="7048" instrument_node="">Safavid "Vase technique" carpets from Kirmān</span></span><span class="mw-editsection" data-dcnode-id="7040"><span class="mw-editsection-bracket" data-dcnode-id="7045"><span data-dcnode-id="7046" instrument_node="">[</span></span><a data-dcnode-id="7043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D12" title="Edit section: Safavid &quot;Vase technique&quot; carpets from Kirmān"><span data-dcnode-id="7044" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7041"><span data-dcnode-id="7042" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7038" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7027"><div class="thumbinner" data-dcnode-id="7028" style="width:222px;"><a class="image" data-dcnode-id="7036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASanguszko_carpet_01.jpg"><img alt="" class="thumbimage" data-dcnode-id="7037" data-file-height="600" data-file-width="312" decoding="async" height="423" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Sanguszko_carpet_01.jpg/220px-Sanguszko_carpet_01.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/c/cb/Sanguszko_carpet_01.jpg 1.5x" width="220"></a><span data-dcnode-id="7035" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7029"><div class="magnify" data-dcnode-id="7033"><a class="internal" data-dcnode-id="7034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASanguszko_carpet_01.jpg" title="Enlarge"></a></div><span data-dcnode-id="7032" instrument_node="">"Sanguszko carpet", Kirmān, 16/17th century. </span><a data-dcnode-id="7030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miho_Museum" title="Miho Museum"><span data-dcnode-id="7031" instrument_node="">Miho Museum</span></a></div></div></div><span data-dcnode-id="7026" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7014"><div class="thumbinner" data-dcnode-id="7015" style="width:222px;"><a class="image" data-dcnode-id="7024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASafavid_tilework_MKG_Hamburg.jpg"><img alt="" class="thumbimage" data-dcnode-id="7025" data-file-height="959" data-file-width="1120" decoding="async" height="188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Safavid_tilework_MKG_Hamburg.jpg/220px-Safavid_tilework_MKG_Hamburg.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Safavid_tilework_MKG_Hamburg.jpg/330px-Safavid_tilework_MKG_Hamburg.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Safavid_tilework_MKG_Hamburg.jpg/440px-Safavid_tilework_MKG_Hamburg.jpg 2x" width="220"></a><span data-dcnode-id="7023" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7016"><div class="magnify" data-dcnode-id="7021"><a class="internal" data-dcnode-id="7022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASafavid_tilework_MKG_Hamburg.jpg" title="Enlarge"></a></div><span data-dcnode-id="7020" instrument_node="">Tiled arch with hunting scenes. Late 17th century, Isfahan/Iran. </span><a class="mw-redirect" data-dcnode-id="7018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Museum_f%25C3%25BCr_Kunst_und_Gewerbe" title="Museum für Kunst und Gewerbe"><span data-dcnode-id="7019" instrument_node="">Museum für Kunst und Gewerbe</span></a><span data-dcnode-id="7017" instrument_node="">, Hamburg</span></div></div></div><span data-dcnode-id="7013" instrument_node="">
</span><p data-dcnode-id="7007"><span data-dcnode-id="7012" instrument_node="">A distinct group of Safavid carpets can be attributed to the region of Kirmān in southern Persia. May H. Beattie identified these carpets by their common structure:</span><sup class="reference" data-dcnode-id="7009" id="cite_ref-Beattie,_1976_37-0"><a data-dcnode-id="7010" href="#cite_note-Beattie,_1976-37"><span data-dcnode-id="7011" instrument_node="">[37]</span></a></sup><span data-dcnode-id="7008" instrument_node=""> Seven different types of carpets were identified: Garden carpets (depicting formal gardens and water channels); carpets with centralized designs, characterized by a large medallion; multiple-medaillon designs with offset medaillons and compartment repeats; directional designs with the arrangements of little scenes used as individual motifs; sickle-leaf designs where long, curved, serrated and sometimes compound leaves dominate the field; arabesque; and lattice designs. Their distinctive structure consists of asymmetric knots; the cotton warps are depressed, and there are three wefts. Woolen wefts lie hidden in the center of the carpet, making up the first and third weft. Silk or cotton makes up the middle weft, which crosses from back to front. A characteristic "tram line" effect is evoked by the third weft when the carpet is worn  .
</span></p><p data-dcnode-id="6988"><span data-dcnode-id="7006" instrument_node="">The best known "vase technique" carpets from Kirmān are those of the so-called "Sanguszko group", named after the </span><a class="mw-redirect" data-dcnode-id="7004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Sanguszko" title="House of Sanguszko"><span data-dcnode-id="7005" instrument_node="">House of Sanguszko</span></a><span data-dcnode-id="7003" instrument_node="">, whose collection has the most outstanding example. The medallion-and-corner design is similar to other 16th century Safavid carpets, but the colours and style of drawing are distinct. In the central medallion, pairs of human figures in smaller medallions surround a central animal combat scene. Other animal combats are depicted in the field, while horsemen are shown in the corner medallions. The main border also contains lobed medallions with </span><a data-dcnode-id="7001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Houri" title="Houri"><span data-dcnode-id="7002" instrument_node="">Houris</span></a><span data-dcnode-id="7000" instrument_node="">, animal combats, or confronting peacocks. In-between the border medallions, phoenixes and dragons are fighting. By similarity to mosaic tile spandrels in the </span><a data-dcnode-id="6998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ganjali_Khan_Complex" title="Ganjali Khan Complex"><span data-dcnode-id="6999" instrument_node="">Ganjali Khan Complex</span></a><span data-dcnode-id="6997" instrument_node=""> at the Kirmān bazaar with an inscription recording its date of completion as 1006 AH/AD 1596, they are dated to the end of the 16th or the beginning of the 17th century.</span><sup class="reference" data-dcnode-id="6994" id="cite_ref-Ferrier,_1989_38-0"><a data-dcnode-id="6995" href="#cite_note-Ferrier,_1989-38"><span data-dcnode-id="6996" instrument_node="">[38]</span></a></sup><span data-dcnode-id="6993" instrument_node=""> Two other "vase technique" carpets have inscriptions with a date: One of them bears the date 1172 AH/AD 1758 and the name of the weaver: the Master Craftsman Muhammad Sharīf Kirmānī, the other has three inscriptions indicating that it was woven by the Master Craftsman Mu'min, son of Qutb al-Dīn Māhānī, between 1066-7 AH/AD 1655–1656. Carpets in the Safavid tradition were still woven in Kirmān after the fall of the Safavid dynasty in 1732 (Ferrier, 1989, p.&nbsp;127</span><sup class="reference" data-dcnode-id="6990" id="cite_ref-Ferrier,_1989_38-1"><a data-dcnode-id="6991" href="#cite_note-Ferrier,_1989-38"><span data-dcnode-id="6992" instrument_node="">[38]</span></a></sup><span data-dcnode-id="6989" instrument_node="">).
</span></p><p data-dcnode-id="6934"><span data-dcnode-id="6987" instrument_node="">The end of </span><a class="mw-redirect" data-dcnode-id="6985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shah_Abbas_II" title="Shah Abbas II"><span data-dcnode-id="6986" instrument_node="">Shah Abbas II</span></a><span data-dcnode-id="6984" instrument_node="">'s reign in 1666 marked the beginning of the end of the Safavid dynasty. The declining country was repeatedly raided on its frontiers. Finally, a </span><a class="mw-redirect" data-dcnode-id="6982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ghilzai" title="Ghilzai"><span data-dcnode-id="6983" instrument_node="">Ghilzai</span></a><span data-dcnode-id="6981" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="6979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pashtun_people" title="Pashtun people"><span data-dcnode-id="6980" instrument_node="">Pashtun</span></a><span data-dcnode-id="6978" instrument_node=""> chieftain named </span><a class="mw-redirect" data-dcnode-id="6976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mirwais_Khan_Hotak" title="Mirwais Khan Hotak"><span data-dcnode-id="6977" instrument_node="">Mir Wais Khan</span></a><span data-dcnode-id="6975" instrument_node=""> began a rebellion in </span><a data-dcnode-id="6973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kandahar" title="Kandahar"><span data-dcnode-id="6974" instrument_node="">Kandahar</span></a><span data-dcnode-id="6972" instrument_node=""> and defeated the Safavid army under the Iranian Georgian governor over the region, </span><a class="mw-redirect" data-dcnode-id="6970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gurgin_Khan" title="Gurgin Khan"><span data-dcnode-id="6971" instrument_node="">Gurgin Khan</span></a><span data-dcnode-id="6969" instrument_node="">. In 1722, </span><a data-dcnode-id="6967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_the_Great" title="Peter the Great"><span data-dcnode-id="6968" instrument_node="">Peter the Great</span></a><span data-dcnode-id="6966" instrument_node=""> launched the </span><a class="mw-redirect" data-dcnode-id="6964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russo-Persian_War_%281722-1723%29" title="Russo-Persian War (1722-1723)"><span data-dcnode-id="6965" instrument_node="">Russo-Persian War (1722-1723)</span></a><span data-dcnode-id="6963" instrument_node="">, capturing many of Iran's Caucasian territories, including </span><a data-dcnode-id="6961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Derbent" title="Derbent"><span data-dcnode-id="6962" instrument_node="">Derbent</span></a><span data-dcnode-id="6960" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheki%2C_Azerbaijan" title="Sheki, Azerbaijan"><span data-dcnode-id="6959" instrument_node="">Shaki</span></a><span data-dcnode-id="6957" instrument_node="">, </span><a data-dcnode-id="6955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baku" title="Baku"><span data-dcnode-id="6956" instrument_node="">Baku</span></a><span data-dcnode-id="6954" instrument_node="">, but also </span><a class="mw-redirect" data-dcnode-id="6952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gilan" title="Gilan"><span data-dcnode-id="6953" instrument_node="">Gilan</span></a><span data-dcnode-id="6951" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mazandaran" title="Mazandaran"><span data-dcnode-id="6950" instrument_node="">Mazandaran</span></a><span data-dcnode-id="6948" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrabad" title="Astrabad"><span data-dcnode-id="6947" instrument_node="">Astrabad</span></a><span data-dcnode-id="6945" instrument_node="">. In 1722, an Afghan army led by </span><a class="mw-redirect" data-dcnode-id="6943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mir_Mahmud_Hotaki" title="Mir Mahmud Hotaki"><span data-dcnode-id="6944" instrument_node="">Mir Mahmud Hotaki</span></a><span data-dcnode-id="6942" instrument_node=""> marched across eastern Iran, and </span><a data-dcnode-id="6940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Siege_of_Isfahan" title="Siege of Isfahan"><span data-dcnode-id="6941" instrument_node="">besieged and took Isfahan</span></a><span data-dcnode-id="6939" instrument_node="">. Mahmud proclaimed himself 'Shah' of Persia. Meanwhile, Persia's imperial rivals, the Ottomans and the Russians, took advantage of the chaos in the country to seize more territory for themselves.</span><sup class="reference" data-dcnode-id="6936" id="cite_ref-39"><a data-dcnode-id="6937" href="#cite_note-39"><span data-dcnode-id="6938" instrument_node="">[39]</span></a></sup><span data-dcnode-id="6935" instrument_node=""> With these events, the Safavid dynasty had come to an end.
</span></p><span data-dcnode-id="6933" instrument_node="">

</span><h3 data-dcnode-id="6756"><span data-dcnode-id="6766" id="The_Afsharid_.281736.E2.80.931796.29_and_Zand_.281750.E2.80.931796.29_dynasties"></span><span class="mw-headline" data-dcnode-id="6764" id="The_Afsharid_(1736–1796)_and_Zand_(1750–1796)_dynasties"><span data-dcnode-id="6765" instrument_node="">The Afsharid (1736–1796) and Zand (1750–1796) dynasties</span></span><span class="mw-editsection" data-dcnode-id="6757"><span class="mw-editsection-bracket" data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">[</span></span><a data-dcnode-id="6760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D14" title="Edit section: The Afsharid (1736–1796) and Zand (1750–1796) dynasties"><span data-dcnode-id="6761" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6758"><span data-dcnode-id="6759" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6755" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6746"><div class="thumbinner" data-dcnode-id="6747" style="width:172px;"><a class="image" data-dcnode-id="6753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANorth_West_Persian_Runner_detail.jpg"><img alt="" class="thumbimage" data-dcnode-id="6754" data-file-height="1060" data-file-width="1000" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1d/North_West_Persian_Runner_detail.jpg/170px-North_West_Persian_Runner_detail.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/1d/North_West_Persian_Runner_detail.jpg/255px-North_West_Persian_Runner_detail.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/1d/North_West_Persian_Runner_detail.jpg/340px-North_West_Persian_Runner_detail.jpg 2x" width="170"></a><span data-dcnode-id="6752" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6748"><div class="magnify" data-dcnode-id="6750"><a class="internal" data-dcnode-id="6751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANorth_West_Persian_Runner_detail.jpg" title="Enlarge"></a></div><span data-dcnode-id="6749" instrument_node="">North West Persian Runner (detail), late 18th century</span></div></div></div><span data-dcnode-id="6745" instrument_node="">
</span><p data-dcnode-id="6712"><span data-dcnode-id="6744" instrument_node="">Iran's territorial integrity was restored by a native Iranian </span><a class="mw-redirect" data-dcnode-id="6742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkic_people" title="Turkic people"><span data-dcnode-id="6743" instrument_node="">Turkic</span></a><span data-dcnode-id="6741" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="6739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afsharid" title="Afsharid"><span data-dcnode-id="6740" instrument_node="">Afshar</span></a><span data-dcnode-id="6738" instrument_node=""> warlord from Khorasan, </span><a data-dcnode-id="6736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nader_Shah" title="Nader Shah"><span data-dcnode-id="6737" instrument_node="">Nader Shah</span></a><span data-dcnode-id="6735" instrument_node="">. He defeated the Afghans, and </span><a class="mw-redirect" data-dcnode-id="6733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman%25E2%2580%2593Persian_War_%281730%25E2%2580%259335%29" title="Ottoman–Persian War (1730–35)"><span data-dcnode-id="6734" instrument_node="">Ottomans</span></a><span data-dcnode-id="6732" instrument_node="">, </span><a data-dcnode-id="6730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Restoration_of_Tahmasp_II_to_the_Safavid_throne" title="Restoration of Tahmasp II to the Safavid throne"><span data-dcnode-id="6731" instrument_node="">reinstalled</span></a><span data-dcnode-id="6729" instrument_node=""> the Safavids on the throne, and negotiated Russian withdrawal from Irans Caucasian territories, by the </span><a data-dcnode-id="6727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Resht" title="Treaty of Resht"><span data-dcnode-id="6728" instrument_node="">Treaty of Resht</span></a><span data-dcnode-id="6726" instrument_node=""> and </span><a data-dcnode-id="6724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Ganja" title="Treaty of Ganja"><span data-dcnode-id="6725" instrument_node="">Treaty of Ganja</span></a><span data-dcnode-id="6723" instrument_node="">. By 1736, Nader himself was crowned shah. There are no records of carpet weaving, which had sunk to an insignificant handicraft, during the </span><a data-dcnode-id="6721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afsharid_dynasty" title="Afsharid dynasty"><span data-dcnode-id="6722" instrument_node="">Afsharid</span></a><span data-dcnode-id="6720" instrument_node=""> and </span><a data-dcnode-id="6718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zand_dynasty" title="Zand dynasty"><span data-dcnode-id="6719" instrument_node="">Zand</span></a><span data-dcnode-id="6717" instrument_node=""> dynasties.</span><sup class="reference" data-dcnode-id="6714" id="cite_ref-Edwards,_1952_25-4"><a data-dcnode-id="6715" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="6716" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6713" instrument_node="">
</span></p><span data-dcnode-id="6711" instrument_node="">
</span><h3 data-dcnode-id="6700"><span data-dcnode-id="6710" id="The_Qaj.C3.A3r_dynasty_.281789.E2.80.931925.29"></span><span class="mw-headline" data-dcnode-id="6708" id="The_Qajãr_dynasty_(1789–1925)"><span data-dcnode-id="6709" instrument_node="">The Qajãr dynasty (1789–1925)</span></span><span class="mw-editsection" data-dcnode-id="6701"><span class="mw-editsection-bracket" data-dcnode-id="6706"><span data-dcnode-id="6707" instrument_node="">[</span></span><a data-dcnode-id="6704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D15" title="Edit section: The Qajãr dynasty (1789–1925)"><span data-dcnode-id="6705" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6702"><span data-dcnode-id="6703" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6699" instrument_node="">
</span><p data-dcnode-id="6678"><span data-dcnode-id="6698" instrument_node="">In 1789, </span><a class="mw-redirect" data-dcnode-id="6696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mohammad_Khan_Qajar" title="Mohammad Khan Qajar"><span data-dcnode-id="6697" instrument_node="">Mohammad Khan Qajar</span></a><span data-dcnode-id="6695" instrument_node=""> was crowned king of Persia, the founder of the </span><a data-dcnode-id="6693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qajar_dynasty" title="Qajar dynasty"><span data-dcnode-id="6694" instrument_node="">Qajar dynasty</span></a><span data-dcnode-id="6692" instrument_node="">, which provided Persia with a long period of order and comparative peace, and the industry had an opportunity of revival. The three important Qajãr monarchs </span><a data-dcnode-id="6690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fath-Ali_Shah_Qajar" title="Fath-Ali Shah Qajar"><span data-dcnode-id="6691" instrument_node="">Fath-Ali Shah Qajar</span></a><span data-dcnode-id="6689" instrument_node="">, </span><a data-dcnode-id="6687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naser_al-Din_Shah_Qajar" title="Naser al-Din Shah Qajar"><span data-dcnode-id="6688" instrument_node="">Naser al-Din Shah Qajar</span></a><span data-dcnode-id="6686" instrument_node="">, and </span><a data-dcnode-id="6684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mozaffar_ad-Din_Shah_Qajar" title="Mozaffar ad-Din Shah Qajar"><span data-dcnode-id="6685" instrument_node="">Mozaffar ad-Din Shah Qajar</span></a><span data-dcnode-id="6683" instrument_node=""> revived the ancient traditions of the Persian monarchy. The weavers of Tabriz took the opportunity, and around 1885 became the founders of the modern industry of carpet weaving in Persia.</span><sup class="reference" data-dcnode-id="6680" id="cite_ref-Edwards,_1952_25-5"><a data-dcnode-id="6681" href="#cite_note-Edwards,_1952-25"><span data-dcnode-id="6682" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6679" instrument_node="">
</span></p><span data-dcnode-id="6677" instrument_node="">
</span><h3 data-dcnode-id="6666"><span data-dcnode-id="6676" id="The_Pahlavi_dynasty_.281925.E2.80.931979.29"></span><span class="mw-headline" data-dcnode-id="6674" id="The_Pahlavi_dynasty_(1925–1979)"><span data-dcnode-id="6675" instrument_node="">The Pahlavi dynasty (1925–1979)</span></span><span class="mw-editsection" data-dcnode-id="6667"><span class="mw-editsection-bracket" data-dcnode-id="6672"><span data-dcnode-id="6673" instrument_node="">[</span></span><a data-dcnode-id="6670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPersian_carpet%26action%3Dedit%26section%3D16" title="Edit section: The Pahlavi dynasty (1925–1979)"><span data-dcnode-id="6671" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6668"><span data-dcnode-id="6669" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6665" instrument_node="">
</span><p data-dcnode-id="6651"><span data-dcnode-id="6664" instrument_node="">In the aftermath of the </span><a data-dcnode-id="6662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Revolution" title="Russian Revolution"><span data-dcnode-id="6663" instrument_node="">Russian Revolution</span></a><span data-dcnode-id="6661" instrument_node="">, Persia had become a battleground. In 1917, Britain used Iran as the springboard for an attack into Russia in an </span><a data-dcnode-id="6659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_intervention_in_the_Russian_Civil_War" title="Allied intervention in the Russian Civil War"><span data-dcnode-id="6660" instrument_node="">unsuccessful attempt</span></a><span data-dcnode-id="6658" instrument_node=""> to reverse the Revolution. The </span><a data-dcnode-id="6656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="6657" instrument_node="">Soviet Union</span></a><span data-dcnode-id="6655" instrument_node=""> responded by annexing portions of northern Persia, creating the </span><a class="mw-redirect" data-dcnode-id="6653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_Soviet_Socialist_Republic" title="Persian Soviet Socialist Republic"><span data-dcnode-id="6654" instrument_node="">Persian Soviet Socialist Republic</span></a><span data-dcnode-id="6652" instrument_node="">. By 1920, the Iranian government had lost virtually all power outside its capital: British and Soviet forces exercised control over most of the Iranian mainland.
</span></p><p data-dcnode-id="6627"><span data-dcnode-id="6650" instrument_node="">In 1925 Rezā Shāh, supported by the British government, deposed </span><a data-dcnode-id="6648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahmad_Shah_Qajar" title="Ahmad Shah Qajar"><span data-dcnode-id="6649" instrument_node="">Ahmad Shah Qajar</span></a><span data-dcnode-id="6647" instrument_node="">, the last </span><a data-dcnode-id="6645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shah" title="Shah"><span data-dcnode-id="6646" instrument_node="">Shah</span></a><span data-dcnode-id="6644" instrument_node=""> of the </span><a data-dcnode-id="6642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qajar_dynasty" title="Qajar dynasty"><span data-dcnode-id="6643" instrument_node="">Qajar dynasty</span></a><span data-dcnode-id="6641" instrument_node="">, and founded the </span><a data-dcnode-id="6639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pahlavi_dynasty" title="Pahlavi dynasty"><span data-dcnode-id="6640" instrument_node="">Pahlavi dynasty</span></a><span data-dcnode-id="6638" instrument_node="">. He established a constitutional monarchy that lasted until the </span><a data-dcnode-id="6636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_Revolution" title="Iranian Revolution"><span data-dcnode-id="6637" instrument_node="">Iranian Revolution</span></a><span data-dcnode-id="6635" instrument_node=""> in 1979. Reza Shah introduced social, economic, and political reforms, ultimately laying the foundation of the modern Iranian state. In order to stabilize and legitimate their reign, Rezā Shāh and his son </span><a data-dcnode-id="6633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mohammad_Reza_Pahlavi" title="Mohammad Reza Pahlavi"><span data-dcnode-id="6634" instrument_node="">Mohammad Reza Pahlavi</span></a><span data-dcnode-id="6632" instrument_node=""> aimed at reviving ancient Persian traditions. The revival of carpet weaving, often referring to traditional designs, was an important part of these efforts. In 1935, Rezā Shāh founded the Iran Carpet Company, and brought carpet weaving under government control. Elaborate carpets were woven for export, and as diplomatic gifts to other states.</span><sup class="reference" data-dcnode-id="6629" id="cite_ref-40"><a data-dcnode-id="6630" href="#cite_note-40"><span data-dcnode-id="6631" instrument_node="">[40]</span></a></sup><span data-dcnode-id="6628" instrument_node="">
</span></p><p data-dcnode-id="6615"><span data-dcnode-id="6626" instrument_node="">The Pahlavi dynasty modernized and centralized the Iranian government, and sought effective control and authority over all their subjects. Reza Shah was the first Persian monarch to confront this challenge with modern weapons. Enforced by the army, nomadism was outlawed during the 1930s, traditional tribal dresses were banned, the use of tents and yurts was forbidden in Iran. Unable to migrate, having lost their herds, many nomadic families starved to death. A brief era of relative peace followed for the nomadic tribes in the 1940s and 1950s, when Persia was involved in the Second World War, and Rezā Shāh was forced to abdicate in 1941. His successor, Mohammed Reza Shah consolidated his power during the 1950s. His land reform program of 1962, part of the so-called </span><a data-dcnode-id="6624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_Revolution" title="White Revolution"><span data-dcnode-id="6625" instrument_node="">White Revolution</span></a><span data-dcnode-id="6623" instrument_node="">, despite obvious advantages for landless peasants, destroyed the traditional political organization of nomadic tribes like the </span><a data-dcnode-id="6621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qashqai_people" title="Qashqai people"><span data-dcnode-id="6622" instrument_node="">Qashqai people</span></a><span data-dcnode-id="6620" instrument_node="">, and the traditional way of nomadic life. The centuries-old traditions of nomadic carpet weaving, which had entered a process of decline with the introduction of synthetic dyes and commercial designs in the late nineteenth century, were almost annihilated by the politics of the last Iranian imperial dynasty.</span><sup class="reference" data-dcnode-id="6617" id="cite_ref-Opie,_Tribal_Rugs_41-0"><a data-dcnode-id="6618" href="#cite_note-Opie,_Tribal_Rugs-41"><span data-dcnode-id="6619" instrument_node="">[41]</span></a></sup><span data-dcnode-id="6616" instrument_node="">
</span></p><span data-dcnode-id="6614" instrument_node="">
