						Ranks of Angels</span></span></b><i data-dcnode-id="936"><span data-dcnode-id="939" style="font-size:10.0pt;font-family:
   Arial"><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">
						Archangel</span></span><span data-dcnode-id="937" style="font-size:10.0pt;font-family:Arial"><span data-dcnode-id="938" instrument_node="">&nbsp;</span></span></i></p><span data-dcnode-id="934" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="927"><span data-dcnode-id="933" instrument_node="">
</span><span data-dcnode-id="928" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="932" instrument_node="">
						&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Scripture lists several specific types of angels, 
						with different ranks.&nbsp; Scripture does not give us a 
						breakdown of each specific rank, but does let us know 
						their exists a hierarchy within the angelic realms.&nbsp; The 
						first rank as the title implies is Archangel.&nbsp; The word 
						mentioned twice, is specifically applied to Michael, who 
						is called an Archangel (Jude 1:9). Therefore, the 
						highest-ranking angel would be Archangel. Paul in 
						Thessalonians implies the existence of additional 
						Archangels (I Thess. 4:16).
  </span><st2:bcv_smarttag data-dcnode-id="930" w:st="on"><span data-dcnode-id="931" instrument_node="">Daniel 10:21</span></st2:bcv_smarttag><span data-dcnode-id="929" instrument_node=""> implies another 
						angel of equal ranking to that of Michael. Michael will 
						one day lead the angels who will expel Satan and his 
						angels.&nbsp; Michael is also listed as the guardian prince 
						of Israel (Daniel 12;1).</span></span></p><span data-dcnode-id="926" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="922"><span data-dcnode-id="925" instrument_node="">
</span><span data-dcnode-id="923" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="924" instrument_node="">
						&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Some have also classified Gabriel as an archangel, 
						though he is not specifically called one in scripture.&nbsp; 
						Gabriel stands before the throne of God and is 
						dispatched, with revelations central to the salvation of 
						humanity. He silenced John, when John questioned his 
						identity (Luke 1:19).&nbsp;</span></span></p><span data-dcnode-id="921" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="916"><i data-dcnode-id="917"><span data-dcnode-id="920" instrument_node="">
</span><span data-dcnode-id="918" style="font-size:10.0pt;font-family:Arial"><span data-dcnode-id="919" instrument_node="">
						Cherubim</span></span></i></p><span data-dcnode-id="915" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="911"><span data-dcnode-id="914" instrument_node="">
</span><span data-dcnode-id="912" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="913" instrument_node="">
						&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Another group of angels, which play a prominent 
						role, are the Cherubs.&nbsp; The most famous is Lucifer, who 
						was listed as the “covering” Cherub (Ezekiel 28:14), 
						before he turned against God and lead 1/3 of the angels 
						in rebellion.&nbsp; The Tabernacle and the arch of the 
						Covenant are pictures or shadows of God’s throne. On the 
						Arc of the Covenant, Cherubim are carved over the mercy 
						seat, which is picture of the heavenly reality.&nbsp; &nbsp;</span></span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="881"><sup data-dcnode-id="906"><span data-dcnode-id="909" instrument_node="">

						20</span></sup><span data-dcnode-id="893" instrument_node="">And the cherubim shall stretch out&nbsp;</span><i data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">their</span></i><span data-dcnode-id="890" instrument_node="">

</span><span data-dcnode-id="792" style="font-size:10.0pt;font-family:Arial;color:black"><span data-dcnode-id="793" instrument_node="">

</span><span data-dcnode-id="463" style="font-size: 8.0pt; font-family: Arial"><span data-dcnode-id="464" instrument_node="">The 
						Reverend John G. Paton, a missionary in the New Hebrides 
						Islands, tells a thrilling story involving the 
						protective care of angels. Hostile natives surrounded 
						his mission headquarters one night, intent on burning 
						the Patons out and killing them. John Paton and his wife 
						prayed all during that terror-filled night that God 
						would deliver them. When daylight came they were amazed 
						to see the attackers unaccountably leave. They thanked 
						God for delivering them.&nbsp;</span></span></p><span data-dcnode-id="461" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="457"><span data-dcnode-id="460" instrument_node="">
</span><span data-dcnode-id="458" style="font-size: 8.0pt; font-family: Arial"><span data-dcnode-id="459" instrument_node="">A 
						year later, the chief of the tribe was converted to 
						Jesus Christ, and Mr. Paton, remembering what had 
						happened, asked the chief what had kept him and his men 
						from burning down the house and killing them. The chief 
						replied in surprise, ‘Who were all those men you had 
						with you there?’ The missionary answered, ‘There were no 
						men there; just my wife and I.’ The chief argued that 
						they had seen many men standing guard—hundreds of big 
						men in shining garments with drawn swords in their 
						hands. They seemed to circle the mission station so that 
						the natives were afraid to attack. Only then did Mr. 
						Paton realize that God had sent His angels to protect 
						them. The chief agreed that there was no other 
						explanation. Could it be that God had sent a legion of 
						angels to protect His servants, whose lives were being 
						endangered?” (Angels: God’s Special Agents, p. 3)</span></span></p><span data-dcnode-id="456" instrument_node="">

</span><span data-dcnode-id="367" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="368" instrument_node="">&nbsp;</span></span><i data-dcnode-id="364"><span data-dcnode-id="365" style="font-size:10.0pt;font-family:Arial"><span data-dcnode-id="366" instrument_node="">Prayer

</span><p class="MsoNormal" data-dcnode-id="352"><span data-dcnode-id="361" instrument_node="">
</span><span data-dcnode-id="359" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="360" instrument_node="">In 
				scripture, God hears the prayers of his people; our prayers 
				empower God’s angels to interact on our behalf to advance the 
				kingdom of God.&nbsp; One of the great examples of prayer and warfare 
				is in Daniel chapter 10.&nbsp; Before we go there, lets look at a 
				recent story as reported in the book </span></span><i data-dcnode-id="355"><span data-dcnode-id="358" instrument_node="">
</span><span data-dcnode-id="356" style="font-size:10.0pt;font-family:
Arial"><span data-dcnode-id="357" instrument_node="">The Invisible War</span></span></i><span data-dcnode-id="353" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="354" instrument_node="">, 
				by Chip Ingram. &nbsp;</span></span></p><span data-dcnode-id="351" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="347"><span data-dcnode-id="350" instrument_node="">
</span><span data-dcnode-id="348" style="font-size: 8.0pt; font-family: Arial"><span data-dcnode-id="349" instrument_node="">The 
				missionary was serving as a medic in Africa. Periodically he had 
				to travel by bicycle through the jungle to a nearby city for 
				supplies.&nbsp; It was a two-day trip, so he would camp in the jungle 
				overnight. He had always made the trip without incident, but one 
				day when he arrived in the city, he saw two men fighting.&nbsp; One 
				was seriously hurt, so he treated the man, shared Christ with 
				him, and went on his way.&nbsp; </span></span></p><span data-dcnode-id="346" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="342"><span data-dcnode-id="345" instrument_node="">
</span><span data-dcnode-id="343" style="font-size: 8.0pt; font-family: Arial"><span data-dcnode-id="344" instrument_node="">The next time 
				the missionary traveled to the city, the man he had treated 
				approached him. “I know you carry money and medicine, the man 
				said to the missionary. “Some friends and I followed you into 
				the jungle that night after you treated me, knowing you had to 
				sleep in the jungle alone. We waited for you to go to sleep, 
				planning to kill you and take your money and drugs. As we 
				started to move into the campsite, we saw twenty-six armed 
				guards surrounding you. There were only six of us, so we knew we 
				couldn’t possibly get near, and we left.”</span></span></p><span data-dcnode-id="341" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="332"><span data-dcnode-id="340" instrument_node="">
</span><span data-dcnode-id="335" style="font-size: 8.0pt; font-family: Arial"><span data-dcnode-id="339" instrument_node="">When he heard 
				this, the missionary laughed.&nbsp; “That’s impossible. I assure you, 
				I was alone in the campsite.”&nbsp; But the young man pressed the 
				point. “No, sir. I wasn’t the only one who saw the guards. My 
				friends saw them too, and we all counted them.”</span><a data-dcnode-id="336" href="#_ftn1" name="_ftnref1" title=""><span class="MsoFootnoteReference" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">[1]</span></span></a></span><span data-dcnode-id="333" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="334" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="331" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="327"><span data-dcnode-id="330" instrument_node="">
</span><span data-dcnode-id="328" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="329" instrument_node="">Later as the 
				missionary went home to his home church in Michigan and told his 
				story, someone in the church stopped him and told the following. 
				He said the following to the meeting.&nbsp;</span></span></p><span data-dcnode-id="326" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="317"><span data-dcnode-id="325" instrument_node="">
</span><span data-dcnode-id="320" style="font-size: 8.0pt; font-family: Arial"><span data-dcnode-id="324" instrument_node="">“On that 
				night in Africa it was morning here. I stopped by the church to 
				get some materials for a ministry trip.&nbsp; But as I was putting my 
				bags in my trunk, I felt the Lord leading me to pray for you.&nbsp; I 
				was an extremely strong urge, so I got on the phone and gathered 
				some other men to come to church and pray for you”&nbsp; Then the man 
				turned to the rest of the congregation. “Will all of those men 
				who prayed with me that day stand up right now?&nbsp; And one by one 
				they stood up—all twenty-six of them.</span><a data-dcnode-id="321" href="#_ftn2" name="_ftnref2" title=""><span class="MsoFootnoteReference" data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">[2]</span></span></a></span><span data-dcnode-id="318" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="319" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="316" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="309"><span data-dcnode-id="315" instrument_node="">
</span><span data-dcnode-id="310" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="314" instrument_node="">The 
				missionary could relate to Daniel, who sheds light on just such 
				an incident.&nbsp; In </span><st2:bcv_smarttag data-dcnode-id="312" w:st="on"><span data-dcnode-id="313" instrument_node="">Daniel 10</span></st2:bcv_smarttag><span data-dcnode-id="311" instrument_node="">, 
				Daniel is praying and fasting for 21-days.&nbsp; The Persians had 
				just defeated Babylon, and Cyrus the Persian King had allowed 
				the Jews to return and the Temple to be rebuilt.&nbsp; However there 
				enemies of the Jews in the Persian court, who wanted to prevent 
				this, Daniel understood the battle was spiritual not physical.</span></span></p><span data-dcnode-id="308" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="304"><span data-dcnode-id="307" instrument_node="">
</span><span data-dcnode-id="305" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="306" instrument_node="">Daniel was 
				in his eighties, at this point in his life.&nbsp; He prayed and 
				fasted for 21-days with no answer. Finally, an answer came from 
				an angelic being who explained the events to Daniel, why there 
				was a delay.&nbsp;</span></span></p><span data-dcnode-id="303" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="283"><span data-dcnode-id="302" instrument_node="">
</span><span data-dcnode-id="284" style="font-size: 8.0pt; font-family: Arial"><span data-dcnode-id="301" instrument_node="">2 In those 
				days I, Daniel, was mourning </span><u data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">three full weeks</span></u><span data-dcnode-id="298" instrument_node="">. 3 I ate no 
				pleasant food, no meat or wine came into my mouth, nor did I 
				anoint myself at all, till three whole weeks were fulfilled. 4 
				Now on the twenty-fourth day of the first month, as I was by the 
				side of the great river, that is, the Tigris, 5 I lifted my eyes 
				and looked, and behold, a certain man clothed in linen, whose 
				waist was girded with gold of Uphaz! 6 His body was like beryl, 
				his face like the appearance of lightning, his eyes like torches 
				of fire, his arms and feet like burnished bronze in color, and 
				the sound of his words like the voice of a multitude. 7 And I, 
				Daniel, alone saw the vision, for the men who were with me did 
				not see the vision; but a great terror fell upon them, so that 
				they fled to hide themselves. 8 Therefore I was left alone when 
				I saw this great vision, and no strength remained in me; for my 
				vigor was turned to frailty in me, and I retained no strength. 9 
				Yet I heard the sound of his words; and while I heard the sound 
				of his words I was in a deep sleep on my face, with my face to 
				the ground. 10 Suddenly, a hand touched me, which made me 
				tremble on my knees and on the palms of my hands. 11 And he said 
				to me, "O Daniel, man greatly beloved, understand the words that 
				I speak to you, and stand upright, for I have now been sent to 
				you." While he was speaking this word to me, I stood trembling. 
				12 Then he said to me, "Do not fear, Daniel, for from the first 
				day that you set your heart to understand, and to humble 
				yourself before your God, your words were heard; and I have come 
				because of your words. 13 "</span><u data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">But the prince of the kingdom of 
				Persia</span></u><span data-dcnode-id="295" instrument_node=""> withstood me </span><u data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">twenty-one days</span></u><span data-dcnode-id="292" instrument_node="">; and behold, 
				Michael, one of the chief princes, came to help me, for </span><u data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">I had 
				been left alone there with the kings of Persia</span></u><span data-dcnode-id="289" instrument_node="">. 14 "Now I 
				have come to make you understand what will happen to your people 
				in the latter days, for the vision refers to many days yet to 
				come." </span><st2:bcv_smarttag data-dcnode-id="286" w:st="on"><b data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Daniel 10:2-14</span></b></st2:bcv_smarttag><span data-dcnode-id="285" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="282" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="272"><span data-dcnode-id="281" instrument_node="">
</span><span data-dcnode-id="279" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="280" instrument_node="">The glorious 
				looking angel explains to Daniel, the </span></span><i data-dcnode-id="275"><span data-dcnode-id="278" instrument_node="">
</span><span data-dcnode-id="276" style="font-size:10.0pt;font-family:Arial"><span data-dcnode-id="277" instrument_node="">Prince of 
				Persia</span></span></i><span data-dcnode-id="273" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="274" instrument_node=""> 
				withstood him for 21-days.&nbsp; The Prince of Persia was not a 
				physical being but a spiritual being that was in control over 
				the principality of Persia. Michael, who was the angel over 
				Israel, was called into action to aid the other angel, because 
				of the power of the spiritual being, which opposed Daniel’s 
				prayer.</span></span></p><span data-dcnode-id="271" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="267"><span data-dcnode-id="270" instrument_node="">
</span><span data-dcnode-id="268" style="font-size: 10.0pt; font-family: Arial"><span data-dcnode-id="269" instrument_node="">Notice 
				Daniel was the warrior on earth, involved in this spiritual war 
				taking place in heavenly realms.</span></span></p><span data-dcnode-id="266" instrument_node="">
