dcnode-id="1344" instrument_node="">&nbsp;Comm&nbsp;</span></a><span data-dcnode-id="1342" instrument_node=""> </span><a class="clickchap2" data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/ad1.htm%23lexicon" title="Lexicon"><span data-dcnode-id="1341" instrument_node="">&nbsp;Hebrew&nbsp;</span></a><span data-dcnode-id="1339" instrument_node=""> </span></div><div data-dcnode-id="1111" id="leftbox"><div class="padleft" data-dcnode-id="1112"><div class="vheadingv" data-dcnode-id="1333"><b data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Verse</span></b><a class="clickchap" data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/bsb/daniel/10.htm" style="color:#001320" title="Click any translation name for full chapter"><span data-dcnode-id="1335" instrument_node="">&nbsp; (Click for Chapter)</span></a></div><div data-dcnode-id="1113" id="par"><span class="versiontext" data-dcnode-id="1330"><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/niv/daniel/10.htm"><span data-dcnode-id="1332" instrument_node="">New International Version</span></a></span><br data-dcnode-id="1329"><span data-dcnode-id="1328" instrument_node="">But the prince of the Persian kingdom resisted me twenty-one days. Then Michael, one of the chief princes, came to help me, because I was detained there with the king of Persia.</span><span class="p" data-dcnode-id="1325"><br data-dcnode-id="1327"><br data-dcnode-id="1326"></span><span class="versiontext" data-dcnode-id="1322"><a data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nlt/daniel/10.htm"><span data-dcnode-id="1324" instrument_node="">New Living Translation</span></a></span><br data-dcnode-id="1321"><span data-dcnode-id="1320" instrument_node="">But for twenty-one days the spirit prince of the kingdom of Persia blocked my way. Then Michael, one of the archangels, came to help me, and I left him there with the spirit prince of the kingdom of Persia.</span><span class="p" data-dcnode-id="1317"><br data-dcnode-id="1319"><br data-dcnode-id="1318"></span><span class="versiontext" data-dcnode-id="1314"><a data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/esv/daniel/10.htm"><span data-dcnode-id="1316" instrument_node="">English Standard Version</span></a></span><br data-dcnode-id="1313"><span data-dcnode-id="1312" instrument_node="">The prince of the kingdom of Persia withstood me twenty-one days, but Michael, one of the chief princes, came to help me, for I was left there with the kings of Persia,</span><span class="p" data-dcnode-id="1309"><br data-dcnode-id="1311"><br data-dcnode-id="1310"></span><span class="versiontext" data-dcnode-id="1306"><a data-dcnode-id="1307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/bsb/daniel/10.htm"><span data-dcnode-id="1308" instrument_node="">Berean Study Bible</span></a></span><br data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">However, the prince of the kingdom of Persia opposed me for twenty-one days. Then Michael, one of the chief princes, came to help me, for I had been left there with the kings of Persia.</span><span class="p" data-dcnode-id="1301"><br data-dcnode-id="1303"><br data-dcnode-id="1302"></span><span class="versiontext" data-dcnode-id="1298"><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/kjv/daniel/10.htm"><span data-dcnode-id="1300" instrument_node="">King James Bible</span></a></span><br data-dcnode-id="1297"><span data-dcnode-id="1296" instrument_node="">But the prince of the kingdom of Persia withstood me one and twenty days: but, lo, Michael, one of the chief princes, came to help me; and I remained there with the kings of Persia.</span><span class="p" data-dcnode-id="1293"><br data-dcnode-id="1295"><br data-dcnode-id="1294"></span><span class="versiontext" data-dcnode-id="1290"><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nkjv/daniel/10.htm"><span data-dcnode-id="1292" instrument_node="">New King James Version</span></a></span><br data-dcnode-id="1289"><span data-dcnode-id="1288" instrument_node="">But the prince of the kingdom of Persia withstood me twenty-one days; and behold, Michael, one of the chief princes, came to help me, for I had been left alone there with the kings of Persia.</span><span class="p" data-dcnode-id="1285"><br data-dcnode-id="1287"><br data-dcnode-id="1286"></span><span class="versiontext" data-dcnode-id="1282"><a data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nasb_/daniel/10.htm"><span data-dcnode-id="1284" instrument_node="">New American Standard Bible</span></a></span><br data-dcnode-id="1281"><span data-dcnode-id="1280" instrument_node="">But the prince of the kingdom of Persia was standing in my way for twenty-one days; then behold, Michael, one of the chief princes, came to help me, for I had been left there with the kings of Persia.</span><span class="p" data-dcnode-id="1277"><br data-dcnode-id="1279"><br data-dcnode-id="1278"></span><span class="versiontext" data-dcnode-id="1274"><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nasb/daniel/10.htm"><span data-dcnode-id="1276" instrument_node="">NASB 1995</span></a></span><br data-dcnode-id="1273"><span data-dcnode-id="1272" instrument_node="">“But the prince of the kingdom of Persia was withstanding me for twenty-one days; then behold, Michael, one of the chief princes, came to help me, for I had been left there with the kings of Persia.</span><span class="p" data-dcnode-id="1269"><br data-dcnode-id="1271"><br data-dcnode-id="1270"></span><span class="versiontext" data-dcnode-id="1266"><a data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nasb77/daniel/10.htm"><span data-dcnode-id="1268" instrument_node="">NASB 1977 </span></a></span><br data-dcnode-id="1265"><span data-dcnode-id="1264" instrument_node="">“But the prince of the kingdom of Persia was withstanding me for twenty-one days; then behold, Michael, one of the chief princes, came to help me, for I had been left there with the kings of Persia.</span><span class="p" data-dcnode-id="1261"><br data-dcnode-id="1263"><br data-dcnode-id="1262"></span><span class="versiontext" data-dcnode-id="1258"><a data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/amp/daniel/10.htm"><span data-dcnode-id="1260" instrument_node="">Amplified Bible</span></a></span><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">But the prince of the kingdom of Persia was standing in opposition to me for twenty-one days. Then, behold, Michael, one of the chief [of the celestial] princes, came to help me, for I had been left there with the kings of Persia.</span><span class="p" data-dcnode-id="1253"><br data-dcnode-id="1255"><br data-dcnode-id="1254"></span><span class="versiontext" data-dcnode-id="1250"><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/csb/daniel/10.htm"><span data-dcnode-id="1252" instrument_node="">Christian Standard Bible</span></a></span><br data-dcnode-id="1249"><span data-dcnode-id="1248" instrument_node="">But the prince of the kingdom of Persia opposed me for twenty-one days. Then Michael, one of the chief princes, came to help me after I had been left there with the kings of Persia.</span><span class="p" data-dcnode-id="1245"><br data-dcnode-id="1247"><br data-dcnode-id="1246"></span><span class="versiontext" data-dcnode-id="1242"><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hcsb/daniel/10.htm"><span data-dcnode-id="1244" instrument_node="">Holman Christian Standard Bible</span></a></span><br data-dcnode-id="1241"><span data-dcnode-id="1240" instrument_node="">But the prince of the kingdom of Persia opposed me for 21 days. Then Michael, one of the chief princes, came to help me after I had been left there with the kings of Persia.</span><span class="p" data-dcnode-id="1237"><br data-dcnode-id="1239"><br data-dcnode-id="1238"></span><span class="versiontext" data-dcnode-id="1234"><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/asv/daniel/10.htm"><span data-dcnode-id="1236" instrument_node="">American Standard Version</span></a></span><br data-dcnode-id="1233"><span data-dcnode-id="1232" instrument_node="">But the prince of the kingdom of Persia withstood me one and twenty days; but, lo, Michael, one of the chief princes, came to help me: and I remained there with the kings of Persia.</span><span class="p" data-dcnode-id="1229"><br data-dcnode-id="1231"><br data-dcnode-id="1230"></span><span class="versiontext" data-dcnode-id="1226"><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hpbt/daniel/10.htm"><span data-dcnode-id="1228" instrument_node="">Aramaic Bible in Plain English</span></a></span><br data-dcnode-id="1225"><span data-dcnode-id="1224" instrument_node="">And the Ruler of the Kingdom of Persia arose against me twenty and one days, and behold, Mikaeil, one of the Princes, first came to help me, and I remained there against the Ruler of Persia</span><span class="p" data-dcnode-id="1221"><br data-dcnode-id="1223"><br data-dcnode-id="1222"></span><span class="versiontext" data-dcnode-id="1218"><a data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/sep/daniel/10.htm"><span data-dcnode-id="1220" instrument_node="">Brenton Septuagint Translation</span></a></span><br data-dcnode-id="1217"><span data-dcnode-id="1216" instrument_node="">But the prince of the kingdom of the Persians withstood me twenty-one days: and behold, Michael, one of the princes, came to help me; and I left him there with the chief of the kingdom of the Persians:</span><span class="p" data-dcnode-id="1213"><br data-dcnode-id="1215"><br data-dcnode-id="1214"></span><span class="versiontext" data-dcnode-id="1210"><a data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/cev/daniel/10.htm"><span data-dcnode-id="1212" instrument_node="">Contemporary English Version</span></a></span><br data-dcnode-id="1209"><span data-dcnode-id="1208" instrument_node="">But the guardian angel of Persia opposed me for 21 days. Then Michael, who is one of the strongest guardian angels, came to rescue me from the kings of Persia. </span><span class="p" data-dcnode-id="1205"><br data-dcnode-id="1207"><br data-dcnode-id="1206"></span><span class="versiontext" data-dcnode-id="1202"><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/drbc/daniel/10.htm"><span data-dcnode-id="1204" instrument_node="">Douay-Rheims Bible</span></a></span><br data-dcnode-id="1201"><span data-dcnode-id="1200" instrument_node="">But the prince of the kingdom of the Persians resisted me one and twenty days: and behold Michael, one of the chief princes, came to help me, and I remained there by the king of the Persians. </span><span class="p" data-dcnode-id="1197"><br data-dcnode-id="1199"><br data-dcnode-id="1198"></span><span class="versiontext" data-dcnode-id="1194"><a data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/gnt/daniel/10.htm"><span data-dcnode-id="1196" instrument_node="">Good News Translation</span></a></span><br data-dcnode-id="1193"><span data-dcnode-id="1192" instrument_node="">The angel prince of the kingdom of Persia opposed me for twenty-one days. Then Michael, one of the chief angels, came to help me, because I had been left there alone in Persia. </span><span class="p" data-dcnode-id="1189"><br data-dcnode-id="1191"><br data-dcnode-id="1190"></span><span class="versiontext" data-dcnode-id="1186"><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/isv/daniel/10.htm"><span data-dcnode-id="1188" instrument_node="">International Standard Version</span></a></span><br data-dcnode-id="1185"><span data-dcnode-id="1184" instrument_node="">However, the prince of the kingdom of Persia opposed me for 21 days. Then all of a sudden, Michael, one of the chief angels, came to assist me! I had been detained there near the kings of Persia. </span><span class="p" data-dcnode-id="1181"><br data-dcnode-id="1183"><br data-dcnode-id="1182"></span><span class="versiontext" data-dcnode-id="1178"><a data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/jps/daniel/10.htm"><span data-dcnode-id="1180" instrument_node="">JPS Tanakh 1917</span></a></span><br data-dcnode-id="1177"><span data-dcnode-id="1176" instrument_node="">But the prince of the kingdom of Persia withstood me one and twenty days; but, lo, Michael, one of the chief princes, came to help me; and I was left over there beside the kings of Persia.</span><span class="p" data-dcnode-id="1173"><br data-dcnode-id="1175"><br data-dcnode-id="1174"></span><span class="versiontext" data-dcnode-id="1170"><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/lsv/daniel/10.htm"><span data-dcnode-id="1172" instrument_node="">Literal Standard Version</span></a></span><br data-dcnode-id="1169"><span data-dcnode-id="1168" instrument_node="">And the head of the kingdom of Persia is standing in opposition in front of me [for] twenty-one days, and behold, Michael, first of the chief heads, has come to help me, and I have remained there near the kings of Persia;</span><span class="p" data-dcnode-id="1165"><br data-dcnode-id="1167"><br data-dcnode-id="1166"></span><span class="versiontext" data-dcnode-id="1162"><a data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nabre/daniel/10.htm"><span data-dcnode-id="1164" instrument_node="">New American Bible</span></a></span><br data-dcnode-id="1161"><span data-dcnode-id="1160" instrument_node="">but the prince of the kingdom of Persia stood in my way for twenty-one days, until finally Michael, one of the chief princes, came to help me. I left him there with the prince of the kingdom of Persia,</span><span class="p" data-dcnode-id="1157"><br data-dcnode-id="1159"><br data-dcnode-id="1158"></span><span class="versiontext" data-dcnode-id="1154"><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/net/daniel/10.htm"><span data-dcnode-id="1156" instrument_node="">NET Bible</span></a></span><br data-dcnode-id="1153"><span data-dcnode-id="1152" instrument_node="">However, the prince of the kingdom of Persia was opposing me for twenty-one days. But Michael, one of the leading princes, came to help me, because I was left there with the kings of Persia.</span><span class="p" data-dcnode-id="1149"><br data-dcnode-id="1151"><br data-dcnode-id="1150"></span><span class="versiontext" data-dcnode-id="1146"><a data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nrsvce/daniel/10.htm"><span data-dcnode-id="1148" instrument_node="">New Revised Standard Version</span></a></span><br data-dcnode-id="1145"><span data-dcnode-id="1144" instrument_node="">But the prince of the kingdom of Persia opposed me twenty-one days. So Michael, one of the chief princes, came to help me, and I left him there with the prince of the kingdom of Persia,</span><span class="p" data-dcnode-id="1141"><br data-dcnode-id="1143"><br data-dcnode-id="1142"></span><span class="versiontext" data-dcnode-id="1138"><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nheb/daniel/10.htm"><span data-dcnode-id="1140" instrument_node="">New Heart English Bible</span></a></span><br data-dcnode-id="1137"><span data-dcnode-id="1136" instrument_node="">But the prince of the kingdom of Persia withstood me twenty-one days; but, look, Michael, one of the chief princes, came to help me, because I was left there with the kings of Persia.</span><span class="p" data-dcnode-id="1133"><br data-dcnode-id="1135"><br data-dcnode-id="1134"></span><span class="versiontext" data-dcnode-id="1130"><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/web/daniel/10.htm"><span data-dcnode-id="1132" instrument_node="">World English Bible</span></a></span><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node="">But the prince of the kingdom of Persia withstood me twenty-one days; but, behold, Michael, one of the chief princes, came to help me: and I remained there with the kings of Persia.</span><span class="p" data-dcnode-id="1125"><br data-dcnode-id="1127"><br data-dcnode-id="1126"></span><span class="versiontext" data-dcnode-id="1122"><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/ylt/daniel/10.htm"><span data-dcnode-id="1124" instrument_node="">Young's Literal Translation</span></a></span><br data-dcnode-id="1121"><span data-dcnode-id="1120" instrument_node=""> 'And the head of the kingdom of Persia is standing over-against me twenty and one days, and lo, Michael, first of the chief heads, hath come in to help me, and I have remained there near the kings of Persia;</span><span class="p" data-dcnode-id="1117"><br data-dcnode-id="1119"><br data-dcnode-id="1118"></span><span class="versiontext" data-dcnode-id="1114"><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/parallel/daniel/10-13.htm"><span data-dcnode-id="1116" instrument_node="">Additional Translations ...</span></a></span></div></div></div><div data-dcnode-id="918" id="centbox"><div class="padcent" data-dcnode-id="919"><a data-dcnode-id="1110" id="study" name="study"></a><div class="vheadingv" data-dcnode-id="1107"><b data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Context</span></b></div><span class="hdg" data-dcnode-id="1104"><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/bsb/daniel/10.htm"><span data-dcnode-id="1106" instrument_node="">Daniel's Vision by the Tigris</span></a></span><br data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node="">…</span><span class="reftext" data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">12</span></span><span data-dcnode-id="1099" instrument_node="">“Do not be afraid, Daniel,” he said, “for from the first day that you purposed to understand and to humble yourself before your God, your words were heard, and I have come in response to them. </span><span class="reftext" data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">13</span></span><span class="highl" data-dcnode-id="1035"><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/8269.htm" title="8269: wə·śar (Conj-w:: N-msc) -- Chieftain, chief, ruler, official, captain, prince. From sarar; a head person."><span data-dcnode-id="1096" instrument_node="">However, the prince</span></a><span data-dcnode-id="1094" instrument_node=""> </span><a data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/4438.htm" title="4438: mal·ḵūṯ (N-fsc) -- Royalty, royal power, reign, kingdom. Or malkuth; or malkuyah; from malak; a rule; concretely, a dominion."><span data-dcnode-id="1093" instrument_node="">of the kingdom</span></a><span data-dcnode-id="1091" instrument_node=""> </span><a data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/6539.htm" title="6539: pā·ras (N-proper-fs) -- A country in W. Asia which conquered Bab. Of foreign origin; Paras, an Eastern country, including its inhabitants."><span data-dcnode-id="1090" instrument_node="">of Persia</span></a><span data-dcnode-id="1088" instrument_node=""> </span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/5975.htm" title="5975: ‘ō·mêḏ (V-Qal-Prtcpl-ms) -- To take one's stand, stand. A primitive root; to stand, in various relations."><span data-dcnode-id="1087" instrument_node="">opposed</span></a><span data-dcnode-id="1085" instrument_node=""> </span><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/5048.htm" title="5048: lə·neḡ·dî (Prep-l:: 1cs) -- From nagad; a front, i.e. Part opposite; specifically a counterpart, or mate; usually over against or before."><span data-dcnode-id="1084" instrument_node="">me</span></a><span data-dcnode-id="1082" instrument_node=""> </span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/6242.htm" title="6242: ‘eś·rîm (Number-cp) -- Twenty. From eser; twenty; also twentieth."><span data-dcnode-id="1081" instrument_node="">for twenty-one</span></a><span data-dcnode-id="1079" instrument_node=""> </span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/259.htm" title="259: wə·’e·ḥāḏ (Conj-w:: Number-ms) -- One. A numeral from 'achad; properly, united, i.e. One; or first."></a><span data-dcnode-id="1077" instrument_node=""> </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/3117.htm" title="3117: yō·wm (N-ms) -- Day. From an unused root meaning to be hot; a day, whether literal, or figurative."><span data-dcnode-id="1076" instrument_node="">days.</span></a><span data-dcnode-id="1074" instrument_node=""> </span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/2009.htm" title="2009: wə·hin·nêh (Conj-w:: Interjection) -- Lo! behold! Prolongation for hen; lo!"></a><span data-dcnode-id="1072" instrument_node=""> </span><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/4317.htm" title="4317: mî·ḵā·’êl (N-proper-ms) -- From miy and kiy and 'el; who like God?; Mikael, the name of an archangel and of nine Israelites."><span data-dcnode-id="1071" instrument_node="">Then Michael,</span></a><span data-dcnode-id="1069" instrument_node=""> </span><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/259.htm" title="259: ’a·ḥaḏ (Number-msc) -- One. A numeral from 'achad; properly, united, i.e. One; or first."><span data-dcnode-id="1068" instrument_node="">one</span></a><span data-dcnode-id="1066" instrument_node=""> </span><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/7223.htm" title="7223: hā·ri·šō·nîm (Art:: Adj-mp) -- Former, first, chief. Or riishon; from ri'shah; first, in place, time or rank."><span data-dcnode-id="1065" instrument_node="">of the chief</span></a><span data-dcnode-id="1063" instrument_node=""> </span><a data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/8269.htm" title="8269: haś·śā·rîm (Art:: N-mp) -- Chieftain, chief, ruler, official, captain, prince. From sarar; a head person."><span data-dcnode-id="1062" instrument_node="">princes,</span></a><span data-dcnode-id="1060" instrument_node=""> </span><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/935.htm" title="935: bā (V-Qal-Perf-3ms) -- To come in, come, go in, go. A primitive root; to go or come."><span data-dcnode-id="1059" instrument_node="">came</span></a><span data-dcnode-id="1057" instrument_node=""> </span><a data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/5826.htm" title="5826: lə·‘ā·zə·rê·nî (Prep-l:: V-Qal-Inf:: 1cs) -- To help, succor. A primitive root; to surround, i.e. Protect or aid."><span data-dcnode-id="1056" instrument_node="">to help me,</span></a><span data-dcnode-id="1054" instrument_node=""> </span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/589.htm" title="589: wa·’ă·nî (Conj-w:: Pro-1cs) -- I. Contracted from 'anokiy; I."><span data-dcnode-id="1053" instrument_node="">for I</span></a><span data-dcnode-id="1051" instrument_node=""> </span><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/3498.htm" title="3498: nō·w·ṯar·tî (V-Nifal-Perf-1cs) -- A primitive root; to jut over or exceed; by implication, to excel; to remain or be left; causatively, to leave, cause to abound, preserve."><span data-dcnode-id="1050" instrument_node="">had been left</span></a><span data-dcnode-id="1048" instrument_node=""> </span><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/8033.htm" title="8033: šām (Adv) -- There, thither. A primitive particle; there then; often thither, or thence."><span data-dcnode-id="1047" instrument_node="">there</span></a><span data-dcnode-id="1045" instrument_node=""> </span><a data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/681.htm" title="681: ’ê·ṣel (Prep) -- A joining together, proximity. From 'atsal; a side; near."><span data-dcnode-id="1044" instrument_node="">with</span></a><span data-dcnode-id="1042" instrument_node=""> </span><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/4428.htm" title="4428: mal·ḵê (N-mpc) -- King. From malak; a king."><span data-dcnode-id="1041" instrument_node="">the kings</span></a><span data-dcnode-id="1039" instrument_node=""> </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/6539.htm" title="6539: p̄ā·rās (N-proper-fs) -- A country in W. Asia which conquered Bab. Of foreign origin; Paras, an Eastern country, including its inhabitants."><span data-dcnode-id="1038" instrument_node="">of Persia.</span></a><span data-dcnode-id="1036" instrument_node=""> </span></span><span class="reftext" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">14</span></span><span data-dcnode-id="1032" instrument_node="">Now I have come to explain to you what will happen to your people in the latter days, for the vision concerns those days.”…</span><div class="cred" data-dcnode-id="1026"><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//berean.bible/"><span data-dcnode-id="1031" instrument_node="">Berean Study Bible</span></a><span data-dcnode-id="1029" instrument_node=""> · </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//berean.bible/downloads.htm"><span data-dcnode-id="1028" instrument_node="">Download</span></a></div><span class="p" data-dcnode-id="1023"><br data-dcnode-id="1025"><br data-dcnode-id="1024"></span><a data-dcnode-id="1022" id="crossref" name="crossref"></a><div class="vheading" data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Cross References</span></div><div data-dcnode-id="990" id="crf"><span class="crossverse" data-dcnode-id="1017"><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/jude/1-9.htm"><span data-dcnode-id="1019" instrument_node="">Jude 1:9</span></a></span><br data-dcnode-id="1016"><span data-dcnode-id="1015" instrument_node="">But even the archangel Michael, when he disputed with the devil over the body of Moses, did not presume to bring a slanderous charge against him, but said, "The Lord rebuke you!"</span><span class="p" data-dcnode-id="1012"><br data-dcnode-id="1014"><br data-dcnode-id="1013"></span><span class="crossverse" data-dcnode-id="1009"><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/12-7.htm"><span data-dcnode-id="1011" instrument_node="">Revelation 12:7</span></a></span><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node="">Then a war broke out in heaven: Michael and his angels fought against the dragon, and the dragon and his angels fought back.</span><span class="p" data-dcnode-id="1004"><br data-dcnode-id="1006"><br data-dcnode-id="1005"></span><span class="crossverse" data-dcnode-id="1001"><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-21.htm"><span data-dcnode-id="1003" instrument_node="">Daniel 10:21</span></a></span><br data-dcnode-id="1000"><span data-dcnode-id="999" instrument_node="">But first I will tell you what is inscribed in the Book of Truth. Yet no one has the courage to support me against these, except Michael your prince.</span><span class="p" data-dcnode-id="996"><br data-dcnode-id="998"><br data-dcnode-id="997"></span><span class="crossverse" data-dcnode-id="993"><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/12-1.htm"><span data-dcnode-id="995" instrument_node="">Daniel 12:1</span></a></span><br data-dcnode-id="992"><span data-dcnode-id="991" instrument_node="">"At that time Michael, the great prince who stands watch over your people, will rise up. There will be a time of distress, the likes of which will not have occurred from the beginning of nations until that time. But at that time your people--everyone whose name is found written in the book--will be delivered.</span></div><span class="p" data-dcnode-id="987"><br data-dcnode-id="989"><br data-dcnode-id="988"></span><a data-dcnode-id="980" id="tsk" name="tsk"><div class="vheading" data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Treasury of Scripture</span></div><p class="tsk2" data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">But the prince of the kingdom of Persia withstood me one and twenty days: but, see, Michael, one of the chief princes, came to help me; and I remained there with the kings of Persia.</span></p><p class="hdg" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">the prince.</span></p></a><p class="tskverse" data-dcnode-id="972"><a data-dcnode-id="978" id="tsk" name="tsk"><b data-dcnode-id="979"></b></a><b data-dcnode-id="975"><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-20.htm"><span data-dcnode-id="977" instrument_node="">Daniel 10:20</span></a></b><br data-dcnode-id="974"><span data-dcnode-id="973" instrument_node=""> Then said he, Knowest thou wherefore I come unto thee? and now will I return to fight with the prince of Persia: and when I am gone forth, lo, the prince of Grecia shall come.</span></p><p class="tskverse" data-dcnode-id="966"><b data-dcnode-id="969"><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/ezra/4-4.htm"><span data-dcnode-id="971" instrument_node="">Ezra 4:4-6,24</span></a></b><br data-dcnode-id="968"><span data-dcnode-id="967" instrument_node=""> Then the people of the land weakened the hands of the people of Judah, and troubled them in building, … </span></p><p class="tskverse" data-dcnode-id="960"><b data-dcnode-id="963"><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/zechariah/3-1.htm"><span data-dcnode-id="965" instrument_node="">Zechariah 3:1,2</span></a></b><br data-dcnode-id="962"><span data-dcnode-id="961" instrument_node=""> And he shewed me Joshua the high priest standing before the angel of the LORD, and Satan standing at his right hand to resist him… </span></p><p class="hdg" data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Michael.</span></p><p class="tskverse" data-dcnode-id="949"><b data-dcnode-id="955"><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-21.htm"><span data-dcnode-id="957" instrument_node="">Daniel 10:21</span></a></b><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node=""> But I will shew thee that which is noted in the scripture of truth: and </span><i data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">there is</span></i><span data-dcnode-id="950" instrument_node=""> none that holdeth with me in these things, but Michael your prince.</span></p><p class="tskverse" data-dcnode-id="940"><b data-dcnode-id="946"><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/12-1.htm"><span data-dcnode-id="948" instrument_node="">Daniel 12:1</span></a></b><br data-dcnode-id="945"><span data-dcnode-id="944" instrument_node=""> And at that time shall Michael stand up, the great prince which standeth for the children of thy people: and there shall be a time of trouble, such as never was since there was a nation </span><i data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">even</span></i><span data-dcnode-id="941" instrument_node=""> to that same time: and at that time thy people shall be delivered, every one that shall be found written in the book.</span></p><p class="tskverse" data-dcnode-id="934"><b data-dcnode-id="937"><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/jude/1-9.htm"><span data-dcnode-id="939" instrument_node="">Jude 1:9</span></a></b><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node=""> Yet Michael the archangel, when contending with the devil he disputed about the body of Moses, durst not bring against him a railing accusation, but said, The Lord rebuke thee.</span></p><p class="hdg" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">one.</span></p><p class="tskverse" data-dcnode-id="926"><b data-dcnode-id="929"><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/colossians/2-10.htm"><span data-dcnode-id="931" instrument_node="">Colossians 2:10</span></a></b><br data-dcnode-id="928"><span data-dcnode-id="927" instrument_node=""> And ye are complete in him, which is the head of all principality and power:</span></p><p class="tskverse" data-dcnode-id="920"><b data-dcnode-id="923"><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_peter/3-22.htm"><span data-dcnode-id="925" instrument_node="">1 Peter 3:22</span></a></b><br data-dcnode-id="922"><span data-dcnode-id="921" instrument_node=""> Who is gone into heaven, and is on the right hand of God; angels and authorities and powers being made subject unto him.</span></p></div></div><p data-dcnode-id="917"></p><br data-dcnode-id="916" </span><div data-dcnode-id="126" id="combox"><div class="padcom" data-dcnode-id="127"><a data-dcnode-id="856" id="commentary" name="commentary"></a><div class="vheading" data-dcnode-id="853"><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/ellicott/daniel/10.htm"><span data-dcnode-id="855" instrument_node="">Ellicott's Commentary for English Readers</span></a></div><span data-dcnode-id="852" instrument_node="">(13) </span><span class="bld" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">The prince of the kingdom.</span></span><span data-dcnode-id="849" instrument_node="">--Perhaps no single verse in the whole of the Scriptures speaks more clearly than this upon the invisible powers which rule and influence nations. If we were without a revelation, we should have thought it congruent that God Himself should direct all events in the world without using any intervening means. But revelation points out that as spiritual beings carry out God's purpose in the natural world (</span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/12-23.htm" title="For the LORD will pass through to smite the Egyptians; and when he sees the blood on the lintel, and on the two side posts, the LORD will pass over the door, and will not suffer the destroyer to come in to your houses to smite you."><span data-dcnode-id="848" instrument_node="">Exodus 12:23</span></a><span data-dcnode-id="846" instrument_node="">; </span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/2_samuel/24-16.htm" title="And when the angel stretched out his hand on Jerusalem to destroy it, the LORD repented him of the evil, and said to the angel that destroyed the people, It is enough: stay now your hand. And the angel of the LORD was by the threshing place of Araunah the Jebusite."><span data-dcnode-id="845" instrument_node="">2Samuel 24:16</span></a><span data-dcnode-id="843" instrument_node="">) and in the moral world (</span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/luke/15-10.htm" title="Likewise, I say to you, there is joy in the presence of the angels of God over one sinner that repents."><span data-dcnode-id="842" instrument_node="">Luke 15:10</span></a><span data-dcnode-id="840" instrument_node="">), so also they do in the political world. From this chapter we not only learn that Israel had a spiritual champion (</span><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-21.htm" title="But I will show you that which is noted in the scripture of truth: and there is none that holds with me in these things, but Michael your prince."><span data-dcnode-id="839" instrument_node="">Daniel 10:21</span></a><span data-dcnode-id="837" instrument_node="">) to protect her in her national life, and to watch over her interests, but also that the powers opposed to Israel had their princes, or saviours, which were antagonists of those which watched over Israel. The "princes" of the heathen powers are devils, according to </span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_corinthians/10-20.htm" title="But I say, that the things which the Gentiles sacrifice, they sacrifice to devils, and not to God: and I would not that you should have fellowship with devils."><span data-dcnode-id="836" instrument_node="">1Corinthians 10:20</span></a><span data-dcnode-id="834" instrument_node="">. The doctrine of the ministry of angels is taught in </span><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/psalms/34-7.htm" title="The angel of the LORD encamps round about them that fear him, and delivers them."><span data-dcnode-id="833" instrument_node="">Psalm 34:7</span></a><span data-dcnode-id="831" instrument_node="">; </span><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/psalms/91-11.htm" title="For he shall give his angels charge over you, to keep you in all your ways."><span data-dcnode-id="830" instrument_node="">Psalm 91:11</span></a><span data-dcnode-id="828" instrument_node="">; </span><a data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/psalms/96-5.htm" title="For all the gods of the nations are idols: but the LORD made the heavens."><span data-dcnode-id="827" instrument_node="">Psalm 96:5</span></a><span data-dcnode-id="825" instrument_node=""> (LXX.); </span><a data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/isaiah/24-21.htm" title="And it shall come to pass in that day, that the LORD shall punish the host of the high ones that are on high, and the kings of the earth on the earth."><span data-dcnode-id="824" instrument_node="">Isaiah 24:21</span></a><span data-dcnode-id="822" instrument_node="">; </span><a data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/isaiah/46-2.htm" title="They stoop, they bow down together; they could not deliver the burden, but themselves are gone into captivity."><span data-dcnode-id="821" instrument_node="">Isaiah 46:2</span></a><span data-dcnode-id="819" instrument_node="">; </span><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/jeremiah/46-25.htm" title="The LORD of hosts, the God of Israel, said; Behold, I will punish the multitude of No, and Pharaoh, and Egypt, with their gods, and their kings; even Pharaoh, and all them that trust in him:"><span data-dcnode-id="818" instrument_node="">Jeremiah 46:25</span></a><span data-dcnode-id="816" instrument_node="">; </span><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/jeremiah/49-3.htm" title="Howl, O Heshbon, for Ai is spoiled: cry, you daughters of Rabbah, gird you with sackcloth; lament, and run to and fro by the hedges; for their king shall go into captivity, and his priests and his princes together."><span data-dcnode-id="815" instrument_node="">Jeremiah 49:3</span></a><span data-dcnode-id="813" instrument_node="">. Further passages in the New Testament bearing upon the question are </span><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_corinthians/8-5.htm" title="For though there be that are called gods, whether in heaven or in earth, (as there be gods many, and lords many,)"><span data-dcnode-id="812" instrument_node="">1Corinthians 8:5</span></a><span data-dcnode-id="810" instrument_node="">; </span><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/colossians/1-16.htm" title=" For by him were all things created, that are in heaven, and that are in earth, visible and invisible, whether they be thrones, or dominions, or principalities, or powers: all things were created by him, and for him:"><span data-dcnode-id="809" instrument_node="">Colossians 1:16</span></a><span data-dcnode-id="807" instrument_node="">. . . . </span><div class="vheading2" data-dcnode-id="804"><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/pulpit/daniel/10.htm"><span data-dcnode-id="806" instrument_node="">Pulpit Commentary</span></a></div><span class="cmt_sub_title" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Verse 13.</span></span><span data-dcnode-id="801" instrument_node=""> - </span><span class="cmt_word" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">But the prince of the kingdom of Persia withstood me one and twenty days; but, lo, Michael, one of the ohief princes, came to help me; and I remained there with the kings of Persia</span></span><span data-dcnode-id="798" instrument_node="">. The rendering of the LXX. is, "And the general (</span><span class="greek" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">στρατηγὸς</span></span><span data-dcnode-id="795" instrument_node="">) of the King of the Persians withstood me one and twenty days, and behold Michael, one of the first princes, came to help me, and I left him there with the general of the King of the Persians." The sense of Theedotion is nearly the same as the LXX., only he has </span><span class="greek" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">βασιλείας Περσῶν</span></span><span data-dcnode-id="792" instrument_node=""> instead of </span><span class="greek" data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">βασιλέως</span></span><span data-dcnode-id="789" instrument_node="">. Like the LXX., Thee-dotion declares that Michael was left with the Prince of Persia. The Peshitta agrees more with the Massoretic, but, like the LXX. and Theedotion, it is with the "Prince" of Persia that there is some one remaining. The Peshitta here, in opposition to the Greek versions, has the statement that Gabriel remained, not Michael. The Vulgate agrees still further with the Massoretic, only instead of the plural "kings," it has "king." The most important differences are in the last clause, where the LXX. and Theodotion must have had the hiphil of </span><span class="hebrew" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">יָתִר</span></span><span data-dcnode-id="786" instrument_node=""> where the Massoretic has the niphal. Gratz adopts this reading, which certainly has the advantage of making sense of an otherwise unintelligible passage. Professor Bevan, in his easy way, suggests this to be probably a mere guess, the insertion of </span><span class="greek" data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">αὐτὸν</span></span><span data-dcnode-id="783" instrument_node="">, and the substitution of a transitive for an intransitive verb are quite in the manner of the LXX. translators. He forgets that Theodotion also has this variation, and also that, without any justification from the versions, he himself has suggested various readings. He does not observe that this interpretation affords a reason for Gabriel's presence with Daniel. Michael relieved him in his opposition to the Prince of Persia. The other variant, "prince" instead of "king," has the support of all the versions. </span><span class="accented" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">But the prince of the kingdom of Persia withstood me one and twenty days.</span></span><span data-dcnode-id="780" instrument_node=""> That is to say, during the whole of Daniel's fast. The angelology of later Judaism is a very complicated, not to say confused, subject. The angelology of one age is not that of another; and the angelology of the Jews in one country is not that of the Jews in another. The Jews themselves understood that the Babylonian captivity did a great deal to develop the doctrine of the angels; the Jewish tradition was that they brought back from Babylon the names of the angels. Not only had their residence in Babylon defined the Jewish ideas as to the names f the angels, they began to have clearer ideas of their functions. They reached the idea that every race had its guardian angel. This view is expressed in </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/deuteronomy/32-8.htm"><span data-dcnode-id="779" instrument_node="">Deuteronomy 32:8</span></a><span data-dcnode-id="777" instrument_node="">, according to the Septuagint, "He set bounds for the nations according to the number of the angels of God." To a similar purport is Ecclus. 17:17, "To each of the nations he appointed a leader, and Israel is the portion of the Lord." There seems, however, a preparation for this in </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/isaiah/24-21.htm"><span data-dcnode-id="776" instrument_node="">Isaiah 24:21</span></a><span data-dcnode-id="774" instrument_node=""> (comp. also </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/psalms/29-1.htm"><span data-dcnode-id="773" instrument_node="">Psalm 29:1</span></a><span data-dcnode-id="771" instrument_node="">; </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/psalms/106-9.htm"><span data-dcnode-id="770" instrument_node="">Psalm 106:9</span></a><span data-dcnode-id="768" instrument_node="">). As independent of revelation there is a strong inherent probability that there are races of beings of intelligence and might vastly superior to man, there is nothing inherently improbable in these intelligences being employed by the Almighty in furthering his providential scheme. Men are instruments of God; is it not at least not improbable that, if there are angels, they, too, co-operate with God in the working out of his great purpose? That every nation should have an angelic prince over it is not more extraordinary than that every Church should have a special angel over it (</span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/1-20.htm"><span data-dcnode-id="767" instrument_node="">Revelation 1:20</span></a><span data-dcnode-id="765" instrument_node="">; </span><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/2-2.htm"><span data-dcnode-id="764" instrument_node="">Revelation 2:2</span></a><span data-dcnode-id="762" instrument_node="">, etc.). That there should be conflicts between these angelic princes is simply to say they are finite. Hitzig's reference to </span><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/12-7.htm"><span data-dcnode-id="761" instrument_node="">Revelation 12:7</span></a><span data-dcnode-id="759" instrument_node=""> is not to the point, for there is no indication of warlike opposition here. By the indications here, we might judge that the opposition of the Prince of Persia was to the coming of Gabriel to reveal to Daniel the purpose of God. We know nothing of the means employed in the opposition, or of the reason of it. Keil and Kliefoth have the idea that Gabriel was striving to influence the King of Persia, but was hindered in his efforts by the "Prince of Persia;" this is scarcely berne out by the context. </span><span class="accented" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">But</span></span><span data-dcnode-id="756" instrument_node="">, </span><span class="accented" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">lo</span></span><span data-dcnode-id="753" instrument_node="">, </span><span class="accented" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Michael</span></span><span data-dcnode-id="750" instrument_node="">, </span><span class="accented" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">one of the chief princes</span></span><span data-dcnode-id="747" instrument_node="">, </span><span class="accented" data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">came to help</span></span><span data-dcnode-id="744" instrument_node=""> me. Michael ("Who is like God?") is, in the twenty-first verse, declared to be the "prince" of the Jewish people, therefore equivalent to "the captain of the host of the Lord" (</span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/joshua/5-14.htm"><span data-dcnode-id="743" instrument_node="">Joshua 5:14</span></a><span data-dcnode-id="741" instrument_node="">). He is referred to in </span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/12-7.htm"><span data-dcnode-id="740" instrument_node="">Revelation 12:7</span></a><span data-dcnode-id="738" instrument_node=""> and </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/jude/1-9.htm"><span data-dcnode-id="737" instrument_node="">Jude 1:9</span></a><span data-dcnode-id="735" instrument_node="">. Where he is called one of "the chief princes," there is reference to an angelic hierarchy, whether the same as that we find developed in the Book of Enoch or not cannot be decided certainly. In the Book of Tobit 12:15 Raphael declares himself "one of the seven holy angels who present the prayers of the saints, and who go in and out before the glory of the Holy One." The Book of Tobit seems to have been written about </span><span class="date" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">B.C. 400</span></span><span data-dcnode-id="732" instrument_node="">; hence this is an indication of opinion before the Books of Enoch. In the Enoch books not only are the great angels mentioned, but their names arc given, and functions are assigned to them; but they are numbered as four, not seven. Enoch is posterior to Tobit, and finds a place for Michael, Raphael, and Gabriel. We have no means of testing whether the number of the chief angelic princes, of whom Michael was one, was four or seven, according to the opinion of Daniel. From the fact that Enoch is, so to speak, in the direct line of apocalyptic descent from Daniel, and Tobit is not, and, moreover, as the angelology of Tobit is in close connection with the Persian hierarchy of </span><span class="accented" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">am-haspentas</span></span><span data-dcnode-id="729" instrument_node="">, of which there were seven, - we may regard four as the more genuinely Jewish number. The later Jewish angel-elegy has many Persian elements, as shown by Dr. Kohut, in his 'Angelologie und Demonologie.' Whether the number of the archangels be made four or seven, both Gabriel and Michael are of the number, whereas Gabriel's words would rather indicate that, though Michael belonged to the rank of chief prince, he did not. As we cannot tell the nature of the opposition, we cannot tell the nature of the help afforded. </span><span class="accented" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">And I remained there with the kings of Persia.</span></span><span data-dcnode-id="726" instrument_node=""> It is very difficult to interpret this if we retain the Massoretic reading. In the first place, the sense given to </span><span class="accented" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">nothartee</span></span><span data-dcnode-id="723" instrument_node=""> in the Authorized and Revised is unsuitable. The angel is explaining how, after having delayed three whole weeks, he has now come. The sentence, as interpreted above,would have explained why he could not come at all to Daniel. It is attempted to get over this by explaining that Gabriel had beaten off the "Prince" of Persia, and that Michael remained with the King of Persia instead of him. This view, however, contradicts the function assigned to angels of nations, and implies a quasi-omnipresence on the part of Gabriel, and would render his explanation no explanation. The explanation of Gesenius, Havernick, and yon Lengerke, that </span><span class="accented" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">nothartee</span></span><span data-dcnode-id="720" instrument_node=""> is to be taken as meaning "I received the pre-eminence," as Wirier, "superior discessi apud reges Persarum," has no justification in usage. Gescnius would bring in the Syriac use of the hithpael of this verb, but though both Castell and Brockehuann assign meanings suitable, none of their quotations represents a sense precisely similar to that assigned to the verb here Hitzig's interpretation, "I was delayed," fails to explain his coming. Ewald's explanation, "I was superfluous," is logical, but has no grammatical justification. Professor Bevan's explanation, which would take this last clause as parenthetical, is untenable, as it supplies no redden for the presence of Gabriel with Daniel. We must follow the LXX. and Theodotion in reading, either as Meinhold and Behrmann, </span><span class="hebrew" data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">וְהותַרְתִּין</span></span><span data-dcnode-id="717" instrument_node=""> or better, as Gratz, </span><span class="hebrew" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">אִתּו הֹותַרְתִּי</span></span><span data-dcnode-id="714" instrument_node="">, as the </span><span class="accented" data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">vav </span></span><span data-dcnode-id="711" instrument_node="">in the former ease would naturally be read conversively. Besides, Gratz's reading explains the needlessly emphatic </span><span class="hebrew" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">אֲנִי</span></span><span data-dcnode-id="708" instrument_node="">. Further, it seems needful to accept the reading of the two Greek versions and the Peshitta, and instead of </span><span class="hebrew" data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">מַלְכֵי</span></span><span data-dcnode-id="705" instrument_node=""> read </span><span class="hebrew" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">שד</span></span><span data-dcnode-id="702" instrument_node="">. None of the old versions support the Massoretic; the Vulgate is the nearest; and all of them have either read </span><span class="hebrew" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">מֶלֶך</span></span><span data-dcnode-id="699" instrument_node=""> or regarded </span><span class="hebrew" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">מלכי</span></span><span data-dcnode-id="696" instrument_node=""> as a form of the construct state, and so vocalized differently. Further, the later context here implies the contiuance of the conflict or controversy (vers. 20, 21). We must understand, then, that Gabriel left Michael to maintain the conflict against the angelic "Prince" of Persia, while he came in obedience to Daniel's prayer. We can have but little idea of what is meant by this conflict in the heavenlies between angelic beings. </span><span class="p" data-dcnode-id="693"><br data-dcnode-id="695"><br data-dcnode-id="694"></span><span class="versiontext" data-dcnode-id="690"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/daniel/10-13.htm"><span data-dcnode-id="692" instrument_node="">Parallel Commentaries ...</span></a></span><span class="p" data-dcnode-id="686"><br data-dcnode-id="689"><br data-dcnode-id="688"><br data-dcnode-id="687"></span><a data-dcnode-id="685" id="lexicon" name="lexicon"></a><div class="vheading" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Hebrew</span></div><span class="word" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">However, the prince</span></span><br data-dcnode-id="680"><span class="heb" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">וְשַׂ֣ר ׀</span></span><span data-dcnode-id="677" instrument_node=""> </span><span class="translit" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">(wə·śar)</span></span><br data-dcnode-id="674"><span class="parse" data-dcnode-id="671"><span data-dcnode-id="673" instrument_node="">Conjunctive waw | Noun - masculine singular construct</span><br data-dcnode-id="672"></span><span class="str" data-dcnode-id="667"><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/strongs_8269.htm"><span data-dcnode-id="670" instrument_node="">Strong's 8269: </span></a><span data-dcnode-id="668" instrument_node=""> </span></span><span class="str2" data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Chieftain, chief, ruler, official, captain, prince</span></span><br data-dcnode-id="664"><br data-dcnode-id="663"><span class="word" data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">of the kingdom</span></span><br data-dcnode-id="660"><span class="heb" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">מַלְכ֣וּת</span></span><span data-dcnode-id="657" instrument_node=""> </span><span class="translit" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">(mal·ḵūṯ)</span></span><br data-dcnode-id="654"><span class="parse" data-dcnode-id="651"><span data-dcnode-id="653" instrument_node="">Noun - feminine singular construct</span><br data-dcnode-id="652"></span><span class="str" data-dcnode-id="647"><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/strongs_4438.htm"><span data-dcnode-id="650" instrument_node="">Strong's 4438: </span></a><span data-dcnode-id="648" instrument_node=""> </span></span><span class="str2" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Royalty, royal power, reign, kingdom</span></span><br data-dcnode-id="644"><br data-dcnode-id="643"><span class="word" data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">of Persia</span></span><br data-dcnode-id="640"><span class="heb" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">פָּרַ֗ס</span></span><span data-dcnode-id="637" instrument_node=""> </span><span class="translit" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">(pā·ras)</span></span><br data-dcnode-id="634"><span class="parse" data-dcnode-id="631"><span data-dcnode-id="633" instrument_node="">Noun - proper - feminine singular</span><br data-dcnode-id="632"></span><span class="str" data-dcnode-id="627"><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/strongs_6539.htm"><span data-dcnode-id="630" instrument_node="">Strong's 6539: </span></a><span data-dcnode-id="628" instrument_node=""> </span></span><span class="str2" data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Persia -- a country in west Asia which conquered Babylon</span></span><br data-dcnode-id="624"><br data-dcnode-id="623"><span class="word" data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">opposed</span></span><br data-dcnode-id="620"><span class="heb" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">עֹמֵ֤ד</span></span><span data-dcnode-id="617" instrument_node=""> </span><span class="translit" data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">(‘ō·mêḏ)</span></span><br data-dcnode-id="614"><span class="parse" data-dcnode-id="611"><span data-dcnode-id="613" instrument_node="">Verb - Qal - Participle - masculine singular</span><br data-dcnode-id="612"></span><span class="str" data-dcnode-id="607"><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/strongs_5975.htm"><span data-dcnode-id="610" instrument_node="">Strong's 5975: </span></a><span data-dcnode-id="608" instrument_node=""> </span></span><span class="str2" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">To stand, in various relations</span></span><br data-dcnode-id="604"><br data-dcnode-id="603"><span class="word" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">me</span></span><br data-dcnode-id="600"><span class="heb" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">לְנֶגְדִּי֙</span></span><span data-dcnode-id="597" instrument_node=""> </span><span class="translit" data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">(lə·neḡ·dî)</span></span><br data-dcnode-id="594"><span class="parse" data-dcnode-id="591"><span data-dcnode-id="593" instrument_node="">Preposition-l | first person common singular</span><br data-dcnode-id="592"></span><span class="str" data-dcnode-id="587"><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/strongs_5048.htm"><span data-dcnode-id="590" instrument_node="">Strong's 5048: </span></a><span data-dcnode-id="588" instrument_node=""> </span></span><span class="str2" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">A front, part opposite, a counterpart, mate, over against, before</span></span><br data-dcnode-id="584"><br data-dcnode-id="583"><span class="word" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">for twenty-one</span></span><br data-dcnode-id="580"><span class="heb" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">עֶשְׂרִ֣ים</span></span><span data-dcnode-id="577" instrument_node=""> </span><span class="translit" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">(‘eś·rîm)</span></span><br data-dcnode-id="574"><span class="parse" data-dcnode-id="571"><span data-dcnode-id="573" instrument_node="">Number - common plural</span><br data-dcnode-id="572"></span><span class="str" data-dcnode-id="567"><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/strongs_6242.htm"><span data-dcnode-id="570" instrument_node="">Strong's 6242: </span></a><span data-dcnode-id="568" instrument_node=""> <
