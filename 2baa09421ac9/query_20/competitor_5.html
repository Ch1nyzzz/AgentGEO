    exact reason he was in the lions den.&nbsp; </span></span></p><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" style="font-size:12.0pt"><b data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Daniels Tomb</span></b></span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1717" style="font-size:12.0pt"><b data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></b></span><span data-dcnode-id="1710" style="font-size:12.0pt"><span data-dcnode-id="1716" instrument_node="">“</span><i data-dcnode-id="1711"><span data-dcnode-id="1715" instrument_node="">His tomb has been shown, since the 6</span><sup data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">th</span></sup><span data-dcnode-id="1712" instrument_node=""> century, at Susa, a little west of the acropolis</span></i></span><span data-dcnode-id="1708" style="font-size:12.0pt"><span data-dcnode-id="1709" instrument_node="">” (Montgomery, p11).&nbsp; This agrees with Josephus who says Darius took Daniel with
    him to Media (Josephus Antiquities of the Jews 10,11,4)</span></span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1702" style="font-size:12.0pt"><span data-dcnode-id="1705" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; For
    any of this to be true, Daniel must have lived when the book itself claims. </span><b data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Ezekiel’s
    References to Daniel</span></b></span></p><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" style="font-size:12.0pt"><span data-dcnode-id="1699" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Ezekiel
    mentions a person named Daniel in two places, Ezekiel 14:14-20 and 28:3.&nbsp; There is no reason to believe that the
    Daniel in Ezekiel is not the Daniel of the biblical book after his name.&nbsp; In Ezekiel 14 Daniel is called
    righteous along with Noah and Job.&nbsp; Surely this fits only the Daniel of the Bible.&nbsp; We read in Daniel chapter 6 of his unwillingness to
    compromise his devotion to YHWH even at the threat of the lions Den.&nbsp; He was willing to suffer a painful death
    rather than be unfaithful to the God of Israel. </span></span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1692" style="font-size:12.0pt"><span data-dcnode-id="1695" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; In
    Ezekiel 28:3-4&nbsp; we read: “</span><i data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Behold
    you are wiser than Daniel!&nbsp; There
    is no secret hidden from you!&nbsp; With
    your wisdom and understanding you have gained riches for yourself…</span></i></span><span data-dcnode-id="1688" style="font-size:12.0pt"><span data-dcnode-id="1691" instrument_node="">”, now notice what is said of Daniel in Daniel 5:11-12
    “</span><i data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">There is a man in your kingdom in whom is the Spirit of the Holy God.&nbsp; And in the days of your father, light
    and understanding and wisdom, like the wisdom of the gods, were found in
    him…Inasmuch as an excellent spirit, knowledge, understanding, interpreting
    dreams, solving riddles, and explaining enigmas were found in this Daniel…”</span></i></span><span data-dcnode-id="1684" style="font-size:12.0pt"><span data-dcnode-id="1687" instrument_node="">. (see also 1:20)&nbsp; The Daniel of the Bible is the only one we know of as being
    this wise and able to understand all secrets.&nbsp; Nebuchadnezzar even appointed him over all the wise men of
    Babylon (Daniel 2:48).&nbsp; Daniel was
    even able to reveal the great mystery of Nebuchadnezzar’s dream (2:47).&nbsp; In Daniel chapter 4 we have a copy of
    king Nebuchadnezzar’s letter which was published “</span><i data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">to all peoples, nations
    and languages that dwell in all the earth</span></i></span><span data-dcnode-id="1680" style="font-size:
12.0pt"><span data-dcnode-id="1683" instrument_node="">” (4:1) In his letter we read of how Daniel was superior to all the “</span><i data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">magicians,
    the astrologers, the Chaldeans, and the soothsayers</span></i></span><span data-dcnode-id="1678" style="font-size:12.0pt"><span data-dcnode-id="1679" instrument_node="">” (4:7) in interpreting Nebuchadnezzar’s dream.&nbsp; Thereby everyone knew of Daniel’s
    wisdom, which was superior to all the wise men in the kingdom. </span></span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1668" style="font-size:12.0pt"><span data-dcnode-id="1675" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Apparently
    Ezekiel’s prophecy in chapter 14 was in the 6</span><sup data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">th</span></sup><span data-dcnode-id="1672" instrument_node=""> year of Jehoiachin’s
    exile (Ezekiel 8:1) and before the capture of Jerusalem 5 years later in 586 BC
    (Ezekiel 14:21ff).&nbsp; This would mean
    that Ezekiel mentions Daniel after Daniel had been in Babylon for 14 years.&nbsp; Since Daniel was exiled in the 3</span><sup data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">rd</span></sup><span data-dcnode-id="1669" instrument_node=""> year of Jehoiakim’s 11-year reign which was followed three months later by the
    beginning of Jehoiachin’s&nbsp; exile.
    (II Kings 23:34ff).&nbsp; This 14 years
    was plenty of time for the events in the first part of the book of Daniel to
    occur and for Daniel to gain much fame and especially among Ezekiel’s audience
    in the land of Babylon.&nbsp; Remember
    Ezekiel himself was an exile dwelling in the land of Babylon</span></span></p><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1662" style="font-size:12.0pt"><span data-dcnode-id="1665" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; In
    the early 1930s the Ras Shamra (Ugaritic) texts were published which included, </span><i data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">inter
    alia</span></i></span><span data-dcnode-id="1658" style="font-size:12.0pt"><span data-dcnode-id="1661" instrument_node="">, a description of a certain
    Dnil.&nbsp; Some have attempted to show
    that this is the Daniel of Ezekiel.&nbsp; However, this simply does not hold up to the description found in
    Ezekiel 28.&nbsp; Collins, who supports
    a late date, confesses concerning Ugaritic Dnil that&nbsp; “</span><i data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">He is not portrayed as exceptionally wise, and even his
    righteousness is incidental to the story” </span></i></span><span data-dcnode-id="1656" style="font-size:
12.0pt"><span data-dcnode-id="1657" instrument_node="">(Collins p1) </span></span></p><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1651"><span data-dcnode-id="1652" style="font-size:12.0pt"><span data-dcnode-id="1653" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Some
    argue that Ezekiel’s Daniel is someone else due to the spelling
    difference.&nbsp; Daniel’s Daniel has a
    yood in the name represented by the English “I”, while Ezekiel‘s Daniel does
    not. In fact the difference of the yood in the spelling does not prove
    anything.&nbsp; (John J. Collins says
    the same, see Collins, p1 footnote 4) We see king David’s name being spelt
    without a yood in 1 Samuel (and all pre exilic writings) and with a yood in
    post exilic writings such as Zechariah 12:10 for example.&nbsp; The Hebrew in Ezekiel’s book is seen to
    be a transitory form between the style found in the first temple period and the
    style in the second temple period.&nbsp; The spelling of Daniel without the yood&nbsp; reflects a first temple period spelling style while the
    spelling with the yood in the book of Daniel reflects second temple style like
    that found in Zechariah.&nbsp; Daniel’s
    Hebrew is similar to that of Chronicles and I Chron. 3:1 mentions a Daniel with
    the yood, in the list of king David’s son’s.&nbsp; David’s name is likewise spelt here with a yood whereas in
    first temple period Hebrew it is spelt without a yood.&nbsp; The reason for the addition of the yood
    after the exilic period is primarily to maintain proper pronunciation, though
    may also be a reminder of the tetragrammaton.&nbsp; </span></span></p><span data-dcnode-id="1650" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" style="font-size:12.0pt"><span data-dcnode-id="1649" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Also
    to be noted is that Noah Daniel and Job were all historical characters that
    lived in the Mesopotamian area in general and would have been know to the
    peoples in whose environs Ezekiel was living.&nbsp; Whereas other great righteous men such as Lot or Abraham
    would not have been well known to the Babylonians.</span></span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1644" style="font-size:12.0pt"><span data-dcnode-id="1645" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; For
    a good brief essay on the possibility of Ezekiel’s Daniel being the Ugaritic
    Dnil see www.bible.org/docs/ot/books/eze/ezek-dan.htm&nbsp; by Daniel B. Wallace, Ph.D.&nbsp;&nbsp; where he shows that the evidence leans in favor of
    Daniel of Ezekiel being Daniel of the bible and leans against his being Dnil of
    the Ugaritic text.&nbsp; </span></span></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639" style="font-size:12.0pt"><b data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Book of Esther</span></b></span></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1635" style="font-size:12.0pt"><span data-dcnode-id="1636" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    book of Esther always lists Persia first then Media with the exception of 10:2.
    I Maccabees 1:1 and 6:56 also lists Persia first. However 1 Esdras 3:1 has
    Media first and then in 3:14 has the Persians listed first in the same context.
    Whereas Daniel always lists Media first then Persia.&nbsp; This being due to Media originally being the dominant power
    in the early days of Daniel’s service and later Persia rising to be the
    dominant power in the Medo-Persian kingdom.&nbsp;&nbsp; This weighs against a writer in the Maccabean era or
    even the late Persian period and points distinctly to the Babylonian or early
    Persian period.</span></span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1630" style="font-size:12.0pt"><b data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Ezra 7:1 - Azariah grandfather of Ezra?</span></b></span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1624" style="font-size:12.0pt"><span data-dcnode-id="1627" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “…</span><i data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Ezra
    the son of Seraiah, the son of Azariah, the son of Hilkiah…</span></i></span><span data-dcnode-id="1616" style="font-size:12.0pt"><span data-dcnode-id="1623" instrument_node="">” (Ezra 7:1 NKJV)&nbsp; It is possible that this could be the Azariah of
    Daniel.&nbsp; 2 Kings 23:24 has Hilkiah
    alive in Josiah’s 18</span><sup data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">th</span></sup><span data-dcnode-id="1620" instrument_node=""> year (for the identical spelling&nbsp; of Hilkiah see 2 Chron 35:8).&nbsp; About 17 years later is when Azariah
    was deported to Babylon in Jehoiakim’s 4</span><sup data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">th</span></sup><span data-dcnode-id="1617" instrument_node=""> year (by Israelite
    reckoning).&nbsp; It is highly likely
    that Azariah was younger than Daniel who served as the spokesman for the 4 and
    since Azariah is also listed last.&nbsp; Based on age Azariah could easily be the son of this Hilkiah and Ezra
    could very easily be the grandson of Azariah.&nbsp; Josephus however says all 4 were of the family of Zedekiah
    (Ant. 10.10.1.188)</span></span></p><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" style="font-size:12.0pt"><b data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">I Maccabees</span></b></span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1605" style="font-size:12.0pt"><span data-dcnode-id="1608" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span><i data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">“Ananias,
    Azarias, and Misael, by believing were saved out of the flame.&nbsp; Daniel for his innocency was delivered
    from the mouth of lions.</span></i></span><span data-dcnode-id="1603" style="font-size:12.0pt"><span data-dcnode-id="1604" instrument_node="">” (I
    Maccabees 2:59-60 KJV) This gives some weight to a pre-Maccabean era date for
    the original, for if someone from the very period considers it to be from a
    period over 350 years earlier, it is not likely it is from that period.&nbsp; Late daters say Daniel and 1 Maccabees
    were written only 40 or 50 years apart in the second century BC.&nbsp; Surely the writer of Maccabees could
    have distinguish between a fraudulent book that was 50 years old and one that
    was 400 years old and considered to be history.&nbsp; </span></span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" style="font-size:12.0pt"><span data-dcnode-id="1600" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    writer of Maccabees was also writing his account to be widely read by
    Israelites everywhere.&nbsp; In
    referring to the book of Daniel, he must have considered the stories of Daniel
    and his friends to already be very widely circulated and accepted as fact.&nbsp; </span></span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1594" style="font-size:12.0pt"><b data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">The Second Book of Esdras </span></b></span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" style="font-size:12.0pt"><span data-dcnode-id="1591" instrument_node="">12:11-12&nbsp; </span><i data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">The
    eagle, whom thou sawest come up from the sea, is the kingdom which was seen in
    the vision of thy brother Daniel. But it was not expounded unto him, therefore
    now I declare it unto thee.</span></i></span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" style="font-size:12.0pt"><span data-dcnode-id="1585" instrument_node="">This book which apparently was edited as late as the
    first century AD considers Daniel to be a real historical figure as do all
    ancient documents that mention him.</span></span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" style="font-size:12.0pt"><b data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Hebrew names of the heroes</span></b></span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575" style="font-size:12.0pt"><span data-dcnode-id="1576" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Another
    Azariah is also mentioned as a more distant ancestor of Ezra in 7:3.&nbsp; Yet another Azariah is mentioned in
    Neh. 8:7 and 10:2 and was a priest.&nbsp; This was apparently a popular name in the Cohen family.&nbsp; </span></span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" style="font-size:12.0pt"><span data-dcnode-id="1572" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; A
    Daniel is mentioned in Ezra 8:2. It has the postexilic spelling consistent with
    the book of Daniel and Chronicles.&nbsp; (see under “Ezekiel’s Danel” above)</span></span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" style="font-size:12.0pt"><span data-dcnode-id="1568" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; A
    Mishael is mentioned in Neh. 8:4, also apparently among the priests.</span></span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" style="font-size:12.0pt"><span data-dcnode-id="1564" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; A
    Hananiah is mentioned in Neh. 10:23 among the leaders of the people.&nbsp; The above references show that all of
    the 4 heroes of the book of Daniel had names that were in use in the 5</span><sup data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">th</span></sup><span data-dcnode-id="1561" instrument_node=""> century and before.&nbsp; It is very
    possible that these names gained some popularity with the Jews of Ezra’s day
    since they were the heroes of the Babylonian exile.</span></span></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" style="font-size:12.0pt"><b data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">New Testament Evidence</span></b></span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1550" style="font-size:12.0pt"><i data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></i></span><span data-dcnode-id="1546" style="font-size:12.0pt"><span data-dcnode-id="1549" instrument_node="">Three different writers of the New Testament reference
    the book of Daniel.&nbsp; They are
    Matthew, Mark, and the author of Hebrews.&nbsp; In Hebrews Daniel and his companion’s deeds are considered actual
    historical events and they are referred to as prophets “</span><i data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">the prophets
    who…stopped the mouths of lions, quenched the violence of fire…” </span></i></span><span data-dcnode-id="1542" style="font-size:12.0pt"><span data-dcnode-id="1545" instrument_node="">(Hebrews 11:32-34).&nbsp; In Matthew 24:15 and Mark 13:14 Jesus mentions Daniel by
    name and treats him as a prophet and as a actual historical figure.&nbsp; Jesus also treats as unfulfilled some
    of Daniel’s prophecies that modern scholars say refer to the Maccabean era. “</span><i data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Therefore
    when you see the ‘abomination of desolation,’ spoken of by Daniel the prophet,
    standing in the holy place…</span></i></span><span data-dcnode-id="1540" style="font-size:12.0pt"><span data-dcnode-id="1541" instrument_node="">” (Matthew
    24:15 NKJV) This being from a vision Daniel had in the first year of Darius the
    Mede (see Daniel 9:1-27) and also from Daniel 11:31 which is a vision Daniel has
    during the third year of Cyrus the king of Persia.&nbsp; </span></span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" style="font-size:12.0pt"><span data-dcnode-id="1537" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; These
    3 references to the book of Daniel in the N.T. are interesting for the
    following reasons: Firstly both the Hebrew and Aramaic sections of the book are
    referred to.&nbsp; Secondly very early
    and very late parts of Daniel’s life are referred to. Thus helping to establish
    that the whole book was considered to be scripture already and that the Hebrew
    and Aramaic sections were thought of as one continuous book.&nbsp; Also what is interesting is that these
    references occur in the 2 earliest gospels and in the book to the Hebrews.&nbsp; It is certain that Matthew was
    originally composed in Hebrew (per Jerome and others), and there is indication
    that Hebrews was perhaps written in or early translated to Hebrew.&nbsp;&nbsp; My point being this, these 3 N.T.
    books were primarily intended for reading by Jews at first and apparently in
    Hebrew.&nbsp; It is obvious therefore
    that the Jews must have been of the same or similar opinion concerning Daniel
    and his book that the New Testament writers had.&nbsp; </span></span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1531" style="font-size:12.0pt"><i data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></i></span><span data-dcnode-id="1527" style="font-size:12.0pt"><span data-dcnode-id="1530" instrument_node="">In Matthew 24:15</span><i data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node=""> “Jesus uses the Greek dia, along
    with the genitive case, which always implies personal human agency (Archer, pg
    284) That should strongly lead one to believe that Jesus was under the
    impression that the Daniel he referred to was an actual person named Daniel,
    not just the title of a book.&nbsp; Jesus also calls that Daniel a profhtou, or "one who proclaims
    inspired utterances on behalf of God”&nbsp; </span></i></span><span data-dcnode-id="1525" style="font-size:12.0pt"><span data-dcnode-id="1526" instrument_node="">(Louw-in Townsley, fifth
    paragraph).</span></span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" style="font-size:12.0pt"><span data-dcnode-id="1522" instrument_node="">Here is a partial list of New Testament references to
    the book of Daniel:</span></span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517" style="font-size:12.0pt"><span data-dcnode-id="1518" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; In
    Matthew 26:64 Jesus directly refers to Daniel 7:13.</span></span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" style="font-size:12.0pt"><span data-dcnode-id="1514" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Luke
    1:19-26 mentions Gabriel whose name only occurs in Daniel 8:16, and 9:21</span></span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" style="font-size:12.0pt"><span data-dcnode-id="1510" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Revelation
    has many references to Daniel including Daniel 7:14,25</span></span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" style="font-size:12.0pt"><span data-dcnode-id="1506" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; II
    Thessalonians 2:3ff refer to Daniel chp 7 and possibly 11:36ff</span></span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" style="font-size:12.0pt"><span data-dcnode-id="1502" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Matthew
    21:44 apparently refers to Daniel 2:34ff&nbsp; </span></span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1496" style="font-size:12.0pt"><b data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></b></span><span data-dcnode-id="1494" style="font-size:12.0pt"><span data-dcnode-id="1495" instrument_node="">It must also be noted, as concerning the book of
    Daniel, that Jesus would not use a reference to a non-canonical book of a
    “false prophet” as this would discredit him in the eyes of the other Jews.&nbsp; This further indicates that the Jews
    accepted Daniel as a true prophet and his book as canonical and prophetic. </span></span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" style="font-size:12.0pt"><span data-dcnode-id="1491" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    summary of New Testament evidence shows that in the first century, Jewish
    scholars considered Daniel a real historical character who lived in Babylon,
    that he was a prophet and that his book was one complete work from the time
    period claimed therein. </span></span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1485" style="font-size:12.0pt"><b data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Early Church Writings</span></b></span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1481" style="font-size:12.0pt;color:red"><span data-dcnode-id="1482" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span><span data-dcnode-id="1479" style="font-size:12.0pt"><span data-dcnode-id="1480" instrument_node="">Milito and Eusebius placed Daniel in the major
    prophets and before Ezekiel.&nbsp; Could
    this be because they arranged the books in chronological order since the events
    of Daniel‘s book start before the first events of Ezekiel‘s book?</span></span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" style="font-size:12.0pt"><span data-dcnode-id="1476" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    canon of the Christian bible places Daniel in the Prophets after Ezekiel.&nbsp; Early Church writings consistently consider
    Daniel a historical figure living in Babylon.&nbsp; </span></span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" style="font-size:14.0pt"><b data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Josephus</span></b></span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" style="font-size:12.0pt"><span data-dcnode-id="1467" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; He
    informs us that the canon was closed at the reign of Artaxerxes (Josephus,
    Against Apion 1, 8). </span></span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" style="font-size:12.0pt"><b data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Story of Alexander the Great </span></b></span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" style="font-size:12.0pt"><span data-dcnode-id="1458" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Josephus
    records a story of Alexander the great when he was in the land of Israel c.
    330. </span><span data-dcnode-id="1456" style="color:red"><span data-dcnode-id="1457" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1455" instrument_node="">He,
    as the story goes, was met by the High Priest coming out of Jerusalem who
    showed him the copy of the book of Daniel wherein his reign and victory is
    foretold and for this reason didn’t sack Jerusalem, but instead provided
    special privileges to the city and priesthood.&nbsp; In Russia today there is a tradition in Jewish families of
    naming there 3</span><sup data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">rd</span></sup><span data-dcnode-id="1452" instrument_node=""> son after Alexander after the kindness Alexander
    showed to Jerusalem. The story is placed after Alexander swept down the
    Mediteraenean coast, sacking cities as he went culminating in an attack on
    Egypt.&nbsp; From Egypt he went up
    through Israel to Jerusalem, where this story picks up.&nbsp; Next, according to Josephus he marched
    to Samaria.&nbsp; Then according to
    history, he went off to attack the Persians, whom he utterly defeated against
    great odds.&nbsp; Clearly if this story
    is true, the book of Daniel must be dated earlier than 330 BC.&nbsp; As of the present, the story is not
    independently verifiable.&nbsp; At very
    least it shows Josephus’s view of the date for the writing of the book as being
    early.&nbsp; It is not likely that
    Josephus completely fabricated the story.&nbsp; He must have had at least some sort of oral legend upon which it was
    based.&nbsp; The very existence of the
    story provides some weight on side of an early date.&nbsp; </span></span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" style="font-size:12.0pt"><b data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Daniel‘s Tower </span></b></span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1441" style="font-size:12.0pt"><i data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “Now
    when Daniel was become so illustrious and famous, on account of the opinion men
    had that he bas beloved of God, he built a tower at Ecbatana, in Media: it
    was&nbsp; a most excellent
    builiding…preserved to this day…Now they bury the kings of Media, of Persia,
    and Parthia, in this tower to this day; and he who was intrusted with the care
    of it was a Jewish priest;&nbsp; which
    thing is also observed to this day.”&nbsp; </span></i></span><span data-dcnode-id="1439" style="font-size:12.0pt"><span data-dcnode-id="1440" instrument_node="">(Josephus Ant. 10.11.7.264ff)</span></span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" style="font-size:12.0pt"><b data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Other References</span></b></span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" style="font-size:12.0pt"><b data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Tareekh
    Muntekheb </span></b></span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1424" style="font-size:12.0pt"><i data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “Daniel
    is famous among the orientalists. The author of the Tareekh Muntekheb says that
    Daniel flourished in the time of Lohorasp, king of Persia; and consequently in
    that of Ceresh, of Cyrus, who gave him the government of Syria; that he taught
    these two princes the knowledge of the true God; that he preached the true
    faith through the whole of the Babylonian Irak; and was, on the death of
    Nebuchadnezzar, sent by Bahman, (Artaxerxes Longimanus,) son of Asfendiar, who
    then reigned in Persia, into Judea; and that, having returned, he died at
    Shouster, or Susa, the capital of Persia, where he lies interred.” </span></i></span><span data-dcnode-id="1422" style="font-size:12.0pt"><span data-dcnode-id="1423" instrument_node="">(Clarke p1048)</span></span></p><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" style="font-size:14.0pt"><b data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Examination of Evidence for a Late Date</span></b></span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" style="font-size:12.0pt"><span data-dcnode-id="1414" instrument_node="">Those who propose a late date for the writing of the
    book of Daniel wish to do so </span></span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1406" style="font-size:12.0pt"><span data-dcnode-id="1410" instrument_node="">in order to account for the prophesies within the book
    by showing that the book was written after the events already occurred.&nbsp; This has already been shown to be
    impossible above.&nbsp; What follows is
    an examination of the common arguments late daters use to show that the book was
    both written around 165 BC and the complete fabrication of the author.&nbsp; Many late daters say the whole book was
    written symbolically about Antiochus 4</span><sup data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">th</span></sup><span data-dcnode-id="1407" instrument_node=""> and the events that
    occurred in that era.&nbsp; This in
    spite of the fact that the book never mentions his name and specifically gives
    history relating to Babylon/Medo-Persia.&nbsp; Other late daters say that the first part of the book is indeed written
    about Babylon, but is not accurate.</span></span></p><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1401" style="font-size:12.0pt"><b data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></b></span><span data-dcnode-id="1399" style="font-size:12.0pt"><span data-dcnode-id="1400" instrument_node="">What follows is an examination of the evidence put
    forward by late daters:</span></span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1394" style="font-size:12.0pt"><b data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Placement in the Bible (Ketuvim instead of Neviim)</span></b></span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" style="font-size:12.0pt"><span data-dcnode-id="1391" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Around
    100 AD Daniel was placed by the canonizers of the Hebrew Bible into the 3</span><sup data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">rd</span></sup><span data-dcnode-id="1388" instrument_node=""> section called Ketuvim (writings) and not in the Neviim (prophets). Late daters
    say this shows that it was written very late and had a low level of
    inspiration.&nbsp; This is easily
    disproved by simply stating that Lamentations, written by Jeremiah the prophet,
    is also in this section.&nbsp; Lamentations
    is a book that is dated to the late 7</span><sup data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">th</span></sup><span data-dcnode-id="1385" instrument_node=""> century and was written by
    one of the greatest prophets in Israel.&nbsp; On the other hand Zechariah is included in the Neviim even though he is
    considered to be one of the last prophets.&nbsp; Ezra, on the other hand, was contemporary with Zechariah and
    was placed in the Ketuvim.&nbsp; Consider also the book of Psalms or Job, which are placed in the Ketuvim
    yet no one considers them to have a low level of inspiration.&nbsp; The fact is the difference between the
    Ketuvim or the Neviim is not one of dating or inspiration, but rather of
    content.&nbsp; Daniel the book is one of
    history in the first six chapters.&nbsp; In the last six chapters Daniel differs from the other prophets in both
    his mission and the content of his prophecies.&nbsp; He was not specifically sent to the children of Israel with
    a “Thus says the LORD” nor do his prophecies contain rebukes to bring about
    repentance.&nbsp; He did however speak
    very plainly of the Messiah, which was a major point of contention between the
    rabbis and the followers of Jesus at the time of canonization.&nbsp; He also spoke plainly of the resurrection,
    which doctrine the Sadducees did not accept.&nbsp;&nbsp; Thus not only content but also politics may have
    resulted in the Jews placing Daniel in the Ketuvim.&nbsp; Its placement there in no way affects the dating of the
    book.</span></span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1380" style="font-size:12.0pt"><span data-dcnode-id="1381" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; It
    is also important to note that Daniel is placed between Esther and
    Ezra-Nehemiah.&nbsp; Both of which are
    books from the early Persian Period.&nbsp; It is very natural for Daniel to be placed before Ezra as Ezra picks up
    exactly where Daniel ends, that is at the beginning of Cyrus’ reign.&nbsp; </span></span></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" style="font-size:12.0pt"><b data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Ben Sira - Ecclesiasticus 44:1ff (Also called
    Sirach)</span></b></span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" style="font-size:12.0pt"><span data-dcnode-id="1372" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Ecclesiasitcus
    44:1ff contains a list of great men of the faith.&nbsp; Some say that since Daniel isn’t mentioned in this book
    which dates to c.180 BC, he must not have existed.&nbsp; It is also important to note that Ben Sira not only fails to
    mention Daniel, but also&nbsp; all the
    judges except Samuel, king Asa and Jehoshaphat, Mordecai, and Ezra.&nbsp; Ecclesiasticus clearly can only be used
    for establishing the historicity of characters it mentions and cannot be used
    as evidence against the historicity of anyone else.</span></span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1366" style="font-size:12.0pt"><i data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “Perhaps,
    since he held the views which later characterized the Sadducees, he may have
    passed Daniel by because of his views on the resurrection and on angels.” </span></i></span><span data-dcnode-id="1362" style="font-size:12.0pt"><span data-dcnode-id="1365" instrument_node="">(Wilson p33)&nbsp; </span><i data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">“While it is impossible for us to determine why Ben Sira does not
    mention Daniel and his three companions among his worthies, if their deeds were
    known to him, it is even more impossible to understand how these stories
    concerning them cannot merely have arisen but have been accepted as true, between
    180 BC, when Ecclesiasticus is thought to have been written, and 169 BC, when,
    according to 1 Maccabees, Matthias, the first of the Asmoneans, exhorted his
    brethren to follow the example of the fortitude of Ananias and his friends.” </span></i></span><span data-dcnode-id="1360" style="font-size:12.0pt"><span data-dcnode-id="1361" instrument_node="">(Wilson p.34) </span></span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1356" style="font-size:12.0pt"><span data-dcnode-id="1357" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Evidence
    from Ecclesiasticus does not weigh heavily on either side of the argument.</span></span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" style="font-size:12.0pt"><b data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Daniel’s Age</span></b></span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" style="font-size:12.0pt"><span data-dcnode-id="1348" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Some
    claim the Daniel’s lifespan according to the book is too long.&nbsp; This is easily disproved.&nbsp; Daniel and his friends are referred to
    as children in chapter 1 when they are taken as captives in Jehoiakim’s 3</span><sup data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">rd</span></sup><span data-dcnode-id="1345" instrument_node=""> year, which marked the beginning of the 70 year Babylonian exile.&nbsp; The Hebrew word translated in 1:4 by
    the NKJV as “young men” is ילדים.&nbsp; At the very oldest this might refer to
    someone in his late teenage years.&nbsp; Due to Daniel’s rise to power in chapter 2 only about 3 years later, it
    is likely that he was not a very young child.&nbsp; Supposing that he was age 17 at the deportation, he would be
    87 in Cyrus’s first year which is apparently when he retired (1:21).&nbsp; Cyrus’s first year marked the end of
    the 70-year Babylonian exile.&nbsp; Thus
    in Cyrus’s 3</span><sup data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">rd</span></sup><span data-dcnode-id="1342" instrument_node=""> year, at the end of the book, Daniel might have been
    89 years old.&nbsp; This is a completely
    reasonable age for any healthy government official in his retirement.</span></span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" style="font-size:12.0pt"><span data-dcnode-id="1338" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Thus
    since Daniel’s age is completely reasonable, it actually gives proof that the
    book is an accurate historical account and not the careless invention of
    someone living much later. </span></span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" style="font-size:12.0pt"><b data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">1:1</span></b></span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" style="font-size:12.0pt"><span data-dcnode-id="1329" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Many
    late daters claim there are contradictions in the following verses:</span></span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1323" style="font-size:12.0pt"><i data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">“In the third year of the reign of Jehoiakim king
    of Judah, Nebuchadnezzar king of Babylon came to Jerusalem and besieged
    it.&nbsp; And the Lord gave Jehoiakim
    king of Judah into his hand, with some of the articles of the house of God,
    which he carried into the land of Shinar to the house of his god; and he
    brought the articles into the treasure house of his god.” </span></i></span><span data-dcnode-id="1321" style="font-size:12.0pt"><span data-dcnode-id="1322" instrument_node="">(Daniel 1:1-2 NKJV).&nbsp; </span></span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" style="font-size:12.0pt"><span data-dcnode-id="1318" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    text does not say that he brought Jehoiakim to Babylon, simply that the Lord
    gave him into his hand.&nbsp; In other
    words, Jehoiakim was not able to resist Nebuchadnezzar’s force and was
    compelled to comply.&nbsp; “some of the
    articles” is literally “a small amount of the articles”.&nbsp; This was not the major exportation that
    would happen about 8 years later in Jeconiah’s short reign.&nbsp; The early Greek and Latin translations
    use a neuter form in order to show that only the vessels and not Jehoiakim were
    taken to Babylon.&nbsp; </span></span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1311" style="font-size:12.0pt"><span data-dcnode-id="1314" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;</span><i data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">“The word that came to Jeremiah
    concerning all the people of Judah, in the </span></i></span><span data-dcnode-id="1305" style="font-size:
12.0pt"><u data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">fourth</span></u><span data-dcnode-id="1308" instrument_node=""> year of Jehoiakim the son of Josiah, king of Judah (which
    was the first year of</span><i data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node=""> Nebuchadnezzar king of Babylon)” </span></i></span><span data-dcnode-id="1303" style="font-size:12.0pt"><span data-dcnode-id="1304" instrument_node="">(Jeremiah 25:1) </span></span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" style="font-size:12.0pt"><span data-dcnode-id="1300" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;This apparent discrepancy with Daniel’s
    account above is actually a cultural difference of dating systems. Jeremiah,
    living in the land of Israel, naturally uses the Israeli dating system, which
    would place Jehoiakim's fourth year in 604 BC.&nbsp; Daniel, using the Babylonian system, places Jehoiakim's
    third year in 604 BC (Harrison, pg. 1112).&nbsp; The Babylonians considered a king’s first year to start on
    the first New Years day in his reign.&nbsp; Thus a Babylonian king could be crowned on the 15</span><sup data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">th</span></sup><span data-dcnode-id="1297" instrument_node=""> of Nisan
    and reign 11 and a half months until the 1</span><sup data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">st</span></sup><span data-dcnode-id="1294" instrument_node=""> of Nisan in the next
    spring, and none of that time would count as his first year.&nbsp; The Israelites on the other hand
    counted any part of a year that happened before the first of Nisan as the first
    year.&nbsp; Thus in Israel the first New
    Years day in a king’s reign marked the beginning of his second year.&nbsp; (See II kings 18:9-10 for an example of
    the Israeli system of counting. See also Jeremiah 34:14).</span></span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1289" style="font-size:12.0pt;color:maroon"><span data-dcnode-id="1290" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span><span data-dcnode-id="1283" style="font-size:12.0pt"><span data-dcnode-id="1288" instrument_node="">Thus what seemed to be an error can easily be
    used&nbsp; in support of an early date
    for the book in two ways. The first, if the author of Daniel lived in the
    second century during the Greek&nbsp; period and in the land of Israel, then why would he use the dating
    system of a kingdom that was defeated over 370 years earlier and had its center
    far to the east. The second part of this argument says that if Daniel were an
    unknown, but scholarly Jew (as he would have had to have been to know
    Babylonian names and language as well as he does) he would have certainly
    followed in the footsteps of the well-respected prophet he makes use of in his
    book. He clearly refers to the book of&nbsp; Jeremiah (Daniel 9:2), which uses the Israelite dating system. Why would
    he have strayed from such an important and well-known prophet to use another,
    obscure dating system, which would appear to contradict Jeremiah, for his
    readers would have known Jeremiah’s works well.&nbsp; Had the author been writing in the 2</span><sup data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">nd</span></sup><span data-dcnode-id="1285" instrument_node=""> century
    and had been trying to make an excellent forgery, surely he would not have the
    opening line of his book present a seemingly glaring mistake.</span><i data-dcnode-id="1284"></i></span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1277" style="font-size:12.0pt"><span data-dcnode-id="1280" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Concerning
    Nebuchadnezzar being called king at this point, Clarke states “</span><i data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">There are
    some difficulties in the chronology of this place. Calmet takes rather a
    different view of these transactions. He connects the history thus:
    Nabopolassar, king of Babylon, finding that one of his lords whom he had made
    governor of Coelesyria and Phoenicia had revolted from him, and formed an
    alliance with the king of Egypt, sent Neubuchadnezzar his son, whom he invested
    with the authority of king, to reduce those provinces, as was customary among
    the easterners when the heir presumptive was sent on any important expedition
    or embassy. This young prince, having quelled the insurrection in those parts,
    marched against Jerusalem about the end of the third or beginning of the fourth
    year of the reign of Jehoiakim, king of Judah. He soon took the city, and put
    Jehoiakim in chains with the design of carrying him to Babylon; but, changing
    his mind, he permitted him to resume the reins of government under certain
    oppressive conditions. At this year, which was A.M. 3398, the seventy years of
    the Babylonish captivity commence. Nabopolassar dying in the interim,
    Nebuchadnezzar was obliged to return speedily to Babylon, leaving his generals
    to conduct the Jewish captives to Babylon, among whom were Daniel and his
    companions.” </span></i></span><span data-dcnode-id="1275" style="font-size:12.0pt"><span data-dcnode-id="1276" instrument_node="">(Clarke, p1056)</span></span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" style="font-size:12.0pt"><span data-dcnode-id="1272" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Josephus
    quoting Berosus gives virtually the identical explanation of the historical
    events.&nbsp; Berosus explains how
    Nebuchadnezzar raced back to Babylon across the desert to receive the crown
    upon hearing of his father’s death.&nbsp; And that he sent the Jewish captives around the long way, thus beating
    them there.&nbsp; (Josephus Ant.
    10.11.1) When the&nbsp; Jews arrived in
    Babylon as captives, Nebuchadnezzar was already crowned as king.</span></span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" style="font-size:12.0pt"><span data-dcnode-id="1268" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    most likely explanation is that Nebuchadnezzar was not yet&nbsp; king in 1:1 when he carries off some of
    the articles of the house of God, but is called king in retrospect, just as one
    might say “President Kennedy served in the US Navy” even though he wasn’t
    president at that time.&nbsp; This would
    especially be the case if Daniel wrote this during his reign, thus paying
    respect by calling him after his present title.&nbsp; It might not go well for Daniel to have referred to him in
    any other way.&nbsp; In addition when
    Daniel actually arrived in Babylon Nebuchadnezzar was already crowned king.</span></span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" style="font-size:12.0pt"><b data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">1:21</span></b></span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1253" style="font-size:12.0pt"><span data-dcnode-id="1259" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; This
    verse does not say, as some claim, that Daniel died in the first year of
    Cyrus.&nbsp; Thus there is no
    contradiction with 10:1 which mentions the 3</span><sup data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">rd</span></sup><span data-dcnode-id="1256" instrument_node=""> year of Cyrus.&nbsp; What we do know is that Daniel was
    moved by Cyrus or Darius to Susa the Persian capital (notice his placement in
    10:4).&nbsp; The JPS which is one of my
    least favorite versions of the bible actually does an excellent job of
    translation here “</span><i data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Daniel was there until the first year of King Cyrus</span></i></span><span data-dcnode-id="1251" style="font-size:12.0pt"><span data-dcnode-id="1252" instrument_node="">” (Daniel 1:21 JPS).&nbsp; This captures well the intent of the Hebrew.&nbsp; Nowhere does it say Daniel died,
    neither in the first year of Cyrus nor anywhere else in the book.</span></span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1246" style="font-size:12.0pt"><b data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">2:1</span></b></span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" style="font-size:12.0pt"><span data-dcnode-id="1243" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Observe
    Daniel 1:5 “</span><i data-dcnode-id="1238"><span data-dcnode-id="1242" instrument_node="">And the king appointed for them a daily provision of the king’s
    delicacies and of the wine which he drank, and</span><u data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node=""> three years</span></u><span data-dcnode-id="1239" instrument_node=""> of training
    for them, so that at the end of that time they might serve before the
    king”.&nbsp; </span></i></span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1231" style="font-size:12.0pt"><span data-dcnode-id="1234" instrument_node="">&nbsp;Now
    compare this to 2:1ff “</span><i data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Now in the second year of Nebuchadnezzar’s reign…</span></i></span><span data-dcnode-id="1229" style="font-size:12.0pt"><span data-dcnode-id="1230" instrument_node="">”.&nbsp; </span></span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" style="font-size:12.0pt"><span data-dcnode-id="1226" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; It
    is obvious from 1:46ff that this is after Daniel’s three year’s of training.&nbsp; Yet Daniel’s training began when
    Nebuchadnezzar was already king (1:1).&nbsp; </span></span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" style="font-size:12.0pt"><span data-dcnode-id="1222" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; At
    least one manuscript says 12</span><sup data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">th</span></sup><span data-dcnode-id="1219" instrument_node=""> year instead of 2</span><sup data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">nd</span></sup><span data-dcnode-id="1216" instrument_node=""> year.&nbsp; But this was apparently a
    scribal attempt at correction.&nbsp; The
    change from 2</span><sup data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">nd</span></sup><span data-dcnode-id="1213" instrument_node=""> to 12</span><sup data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">th</span></sup><span data-dcnode-id="1210" instrument_node=""> in Hebrew is merely the addition
    of the word for ten after the word for two.</span></span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" style="font-size:12.0pt"><span data-dcnode-id="1206" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    idea that chapter one and two were at one time separate records doesn’t work
    either, for two reasons.&nbsp; The first
    is that the compiler would have surely attempted some kind of correction or
    explanation.&nbsp; The second is that
    chapter one acts as an introduction to chapter two and is clearly linked to it.</span></span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" style="font-size:12.0pt"><span data-dcnode-id="1202" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; A
    better explanation is that&nbsp; Daniel’s training started in Nebuchadnezzar’s coronation year, which was
    almost a full 12 months.&nbsp; The
    second year of training was in Nebuchadnezzar’s 1</span><sup data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">st</span></sup><span data-dcnode-id="1199" instrument_node=""> official year
    which started at the first New Years day that occurred in his reign.&nbsp; Daniel’s third year of training was
    during Nebu’s 2</span><sup data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">nd</span></sup><span data-dcnode-id="1196" instrument_node=""> official year.&nbsp; Towards the end of that year he has his dream and tries to
    find its interpretation.&nbsp; In the
    mean time the New Year happens starting Nebuchadnezzar’s 3</span><sup data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">rd</span></sup><span data-dcnode-id="1193" instrument_node=""> year.
    Next Daniel and his companions are tested concerning their training, next
    Nebuchadnezzar gets mad at his wise men to whom Daniel and his friends had just
    been joined for failure to tell and interpret the dream.&nbsp; Finally Daniel, in Nebuchadnezzar’s 3</span><sup data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">rd</span></sup><span data-dcnode-id="1190" instrument_node=""> year explains the interpretation of the dream, thus saving himself and all the
    wise men.</span></span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" style="font-size:12.0pt"><span data-dcnode-id="1186" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    above explanation cannot be proved but is satisfactory according to the
    text.&nbsp; This verse cannot be used to
    indicate a late date for writing or compiling.</span></span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" style="font-size:12.0pt"><b data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Chapter 11 Antiochus Ephiphanes?</span></b></span></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" style="font-size:12.0pt"><span data-dcnode-id="1177" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Consider
    the logical outcome had Daniel been written in 165 BC about Antiochus 4</span><sup data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">th</span></sup><span data-dcnode-id="1174" instrument_node="">.&nbsp; Even if it could have been passed off
    as true prophecy it would have quickly, within a few years, turned out to be
    false.&nbsp; For it is claimed that from
    11:40 and onward the details no longer match up to the events of Antiochus
    reign, nor did the kingdom of God arrive at that time.&nbsp; Yet we are to believe that it readily
    was accepted and that on par with the Holy Scriptures?</span></span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" style="font-size:12.0pt"><span data-dcnode-id="1170" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Daniel
    must have really existed or the Jews would not have accepted the book as being
    from a true prophet or historian.&nbsp; They would have simply said “we never heard of such things happening in
    the days of the exile, and besides that chapter 11 doesn’t fit Antiochus most
    recent deeds or his death, nor has the messianic kingdom come”</span></span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" style="font-size:12.0pt"><span data-dcnode-id="1166" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Those
    who hold to a late date first interpret chapter 11 as they saw fit then make
    their judgment about a failure in fulfillment based on their own
    interpretation.&nbsp; Obviously logic
    dictates that first the intended interpretation(s) must be found, then and only
    then can the prophecy be tested as to whether it came true or not or whether it
    concerns that which is yet future. &nbsp;I would note that neither Greece, Alexander the Great nor
    Anitochus nor anyone else is mentioned by name in chapter 11. </span></span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" style="font-size:12.0pt"><span data-dcnode-id="1162" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Porphyry’s
    argument as well as that of modern scholars is based on whether or not Daniel
    11:21-45, and/or the book as a whole are about Antiochus Epiphanes. While most
    people do indeed believe that at least a part of chapter eleven deals with
    Antiochus Epiphanes, yet there are some who don't think that any part of Daniel
    refers to Antiochus. </span></span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" style="font-size:12.0pt"><span data-dcnode-id="1158" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; For
    those who believe the book was written in the second century, and the whole
    book in some way relates to Antiochus, it is hard to explain what purpose
    chapter four serves. So far as we know, no affliction of the type ascribed here
    to Nebuchadnezzar ever afflicted Antiochus. Nor would it be very encouraging
    for the Jews to know that their persecutor, after going mad and apparently
    dropping out of the scene for awhile would come back to torment them. </span></span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" style="font-size:12.0pt"><span data-dcnode-id="1154" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; There
    are many places in Daniel which seem to have no parallel to, or connections
    with Antiochus, or any other events surrounding that era. It is the most
    reasonable assumption to make, that chapters one through six refer to the
    exilic times alone. It seems the Babylonian or early Persian period best
    accounts for the exact information about the Babylonian empire which we have in
    the book of Daniel. </span></span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1149" style="font-size:12.0pt"><span data-dcnode-id="1150" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; One
    opinion is that even chapter eleven does not refer to Antiochus but to
    antichrist. Some think that verses 21-35 refer to Antiochus, but that verses
    36-45 refer to the Antichrist.&nbsp; The
    passage itself is difficult, and gives no clear indication of how it is to be
    interpreted. For example, there is no transition between verses 35-36 to
    differentiate a change of personage here.&nbsp; Others see the switch at verse 40.&nbsp; At any rate, if Antiochus did die as 11:45 implies, then what about the
    coming of the kingdom of God or the resurrection of the dead?</span></span><span data-dcnode-id="1148" style="font-size:14.0pt"></span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" style="font-size:12.0pt"><b data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Nebuchadnezzar/Antiochus numerical values</span></b></span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" style="font-size:12.0pt"><span data-dcnode-id="1140" instrument_node="">Some claim that Nebuchadnezzar’s name as spelt in
    Daniel has the same </span></span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1133" style="font-size:12.0pt"><span data-dcnode-id="1136" instrument_node="">numerical value spelt in Hebrew as does the name Antiochus</span><b data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">.&nbsp; </span></b></span><span data-dcnode-id="1131" style="font-size:12.0pt"><span data-dcnode-id="1132" instrument_node="">They
    fail however to notice that Nebuchadnezzar is spelt two different ways in
    Daniel and that the name Antiochus never occurs in Daniel.&nbsp; The majority of occurrences of the name
    Nebuchadnezzar are in Aramaic and not Hebrew.&nbsp; Nor do they provide a Hebrew spelling for the name
    Antiochus, which is a Greek name.&nbsp; There is simply no evidence here in favor of a late date.</span></span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1126" style="font-size:12.0pt"><b data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">The Resurrection and Angels</span></b></span></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" style="font-size:12.0pt"><span data-dcnode-id="1123" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    mention of the resurrection and the naming of one angel does not demand a late
    date for the book.&nbsp; Both of these
    concepts have long standing traditions throughout the Middle East including in
    Babylon.&nbsp; The fact that the rest of
    the Hebrew bible does not mention any angel by name is itself an enigma.&nbsp; The concept of the resurrection existed
    over a thousand years earlier in Egypt and Babylon both.&nbsp; Daniel’s development of the doctrine is
    only slightly more (if that) than what Isaiah’s is.&nbsp; This makes sense since about two centuries separate
    them.&nbsp; Daniel’s doctrines of angels
    and the resurrection seem less developed than that which is found in the
    writings of the Maccabean era. (compare for example the book of Tobit) Thus
    this might indicate Daniel was written in an earlier&nbsp; era.</span></span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1117" style="font-size:12.0pt"><b data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Concerning the kings listed or referred to in the
    book of Daniel</span></b></span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" style="font-size:12.0pt"><span data-dcnode-id="1114" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Firstly,
    there exists the notion amongst certain scholars that if there is no external
    evidence to support a person, or place mentioned in the bible that it should
    not be regarded as valid.&nbsp; However,
    this is a faulty, unscientific approach, considering how much external evidence
    in ancient writings and archaeology there is that demonstrates the validity of
    the biblical text.&nbsp; And every year
    more discoveries are made.&nbsp; I have
    even heard people suggest that perhaps David never existed, however now we have
    external evidence with the specific mention of his name (tel Dan stele).&nbsp; This also goes for Hezekiah’s tunnel,
    Belshazzar, etc…&nbsp; Suffice to say
    that the historical accounts given in scripture should be taken seriously and
    in the present author’s view, more seriously than other history books, due to
    the length of time that the bible covers and yet has been shown to be accurate
    over that great length of time.</span></span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1107" style="page-break-after:avoid;
"><span data-dcnode-id="1108" style="font-size:12.0pt"><b data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Nebuchadnezzar / Nabonidus</span></b></span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1097" style="page-break-after:avoid;
"><span data-dcnode-id="1103" style="font-size:12.0pt"><b data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></b></span><span data-dcnode-id="1098" style="font-size:12.0pt"><span data-dcnode-id="1102" instrument_node="">Some claim that the account of Nebuchadnezzar does not
    line up with actual history.&nbsp; However
    no contradiction to actual history has ever been found.&nbsp; However some of the account found in
    Daniel does not yet have an external, independent confirmation before the 2</span><sup data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">nd</span></sup><span data-dcnode-id="1099" instrument_node=""> century BC.&nbsp; In other words, to
    date, no Babylonian or Persian records have been found to confirm the setting
    up of Nebuchadnezzar’s gold image in chapter 3 or his madness and recovery
    along with his acknowledgement of the “Most High... the King of Heaven” in
    chapter 4.&nbsp; However the setting up
    of the gold image is not unusual for the works of Nebuchadnezzar, nor does it
    indicate his inventing a new form of monotheism in preference to the other gods
    of Babylon.&nbsp; For Daniel 3:12 and
    3:18 both show that Nebuchadnezzar still had a plural amount of “gods” and that
    the gold image was not included among these gods.&nbsp; Apparently the gold image was a representation of
    Nebuchadnezzar himself as it is plainly connected to the dream of the image in
    chapter 2 were Nebuchadnezzar is referred to as the head of gold of the image
    in his dream (2:38).&nbsp; Apparently he
    didn’t want to be just the head, but the whole image.&nbsp; Notice that in 3:2 he sent to gather all his subordinates to
    come to the dedication of the image and then has them commanded to worship it.&nbsp; This was not to create a new god, but
    rather to further humble all his subordinates making them bow down and worship
    the image that represented him.&nbsp; This is very consistent with external accounts of Nebuchadnezzar’s pride
    and behavior. </span></span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1093" style="page-break-after:avoid;
"><span data-dcnode-id="1094" style="font-size:12.0pt"><span data-dcnode-id="1095" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Nor
    does Daniel’s account say that Nebuchadnezzar gave up his other gods after the
    fiery furnace event.&nbsp; Actually the
    account in 3:28-29 shows that Nebuchadnezzar continued keeping his own gods but
    simply gave immunity and protection to the worshippers of the God of the three
    Hebrew men.&nbsp; </span></span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1085" style="page-break-after:avoid;
"><span data-dcnode-id="1088" style="font-size:12.0pt"><span data-dcnode-id="1091" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    issue of his madness in chapter four is of greater significance as
    Nebuchadnezzar is driven from his kingship for a period of seven “times”(4:16,
    32) and afterwards is restored to his kingship with additional majesty (4:36)
    and acknowledging the “Most High” God.&nbsp; This does not indicate a conversion to the God of the Jews nor a
    forsaking of polytheism since in 4:8 he still acknowledges his own god as being
    the source of Belteshazzar’s (Daniel’s) name.&nbsp; Thus the main issue is only his absence, madness and
    reaccension. Many consider the seven “times” to be seven “years”, which may be
    the right understanding, however if that were the case, the author could have
    simply said “years”, but he did not.&nbsp; In addition verse 34 refers to the period as “days”.&nbsp; The period does, however, require enough
    time for the description: “</span><i data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">his hair had grown like eagles’ and his nails
    like bird’s</span></i></span><span data-dcnode-id="1086" style="font-size:12.0pt"><span data-dcnode-id="1087" instrument_node="">”(4:33).&nbsp; This apparently would be a period of
    more than a month and if long hair is indeed indicated, then a longer period is
    intended.&nbsp; </span></span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1081" style="page-break-after:avoid;
"><span data-dcnode-id="1082" style="font-size:12.0pt"><span data-dcnode-id="1083" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Several
    questions arise: </span></span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1073" style="page-break-after:
avoid;"><span data-dcnode-id="1076" style="font-size:12.0pt"><span data-dcnode-id="1079" instrument_node="">1.</span><span data-dcnode-id="1077" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="1078" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span><span data-dcnode-id="1074" style="font-size:12.0pt"><span data-dcnode-id="1075" instrument_node="">At what point in his
    reign did this occur?</span></span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1065" style="page-break-after:
avoid;"><span data-dcnode-id="1068" style="font-size:12.0pt"><span data-dcnode-id="1071" instrument_node="">2.</span><span data-dcnode-id="1069" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="1070" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span><span data-dcnode-id="1066" style="font-size:12.0pt"><span data-dcnode-id="1067" instrument_node="">Who reigned in the
