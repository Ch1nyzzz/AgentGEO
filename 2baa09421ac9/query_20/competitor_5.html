    Cyrus by about 5 years). &nbsp;The book
    is arranged in two parts, chapters 1-6, which contain historical records, and
    chapters 7-12 which contain visions that Daniel personally received. Each part
    has its chapters arranged chronologically.&nbsp; The book is written in Hebrew and Aramaic.&nbsp; The Aramaic section is from 2:4b to the
    end of chapter 7.</span></span></p><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2409"><span data-dcnode-id="2424" style="font-size:12.0pt"><span data-dcnode-id="2433" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Traditionally
    the book of Daniel has always been considered to date from the late Babylonian
    / Early Persian Period (6</span><sup data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">th</span></sup><span data-dcnode-id="2430" instrument_node=""> or 5</span><sup data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">th</span></sup><span data-dcnode-id="2427" instrument_node=""> centuries BC), as the
    book itself indicates.&nbsp;&nbsp; Some
    modern scholars have embraced an idea similar to that first put forward by
    Porphyry a neo-Platonist in his work </span><i data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Against Christians </span></i></span><span data-dcnode-id="2412" style="font-size:12.0pt"><span data-dcnode-id="2423" instrument_node="">(c.285</span><span data-dcnode-id="2421" style="color:red"><span data-dcnode-id="2422" instrument_node=""> </span></span><span data-dcnode-id="2420" instrument_node="">AD).&nbsp; The idea being that Daniel must have
    been written not earlier than c.165 BC due to the prophesies in chapter 11 that
    accurately portray events that occurred in the Middle East up until that
    time.&nbsp; Some modern scholars claim
    that at c.165BC (or Daniel 11:40) the prophecies no longer match historical
    events and therefore the book were not written any later than that.&nbsp; Porphyry, however, claimed that all the
    events described in 11:21ff refer to Antiochus Epiphenes 4</span><sup data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">th</span></sup><span data-dcnode-id="2417" instrument_node=""> and
    since he rejected predictive prophecy he concluded that this was the point in
    history when the book was written.&nbsp; In other words, the writer of Daniel was looking back on events that
    already happened.&nbsp; His thesis was
    refuted and rejected by the scholars of his day and then was burned.&nbsp; The records we have of his thesis come
    from excerpts that were quoted by his opponents.&nbsp; As Wilson states, </span><span data-dcnode-id="2415" style="color:#008100"><span data-dcnode-id="2416" instrument_node="">“</span></span><i data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">With
    the exception of the neo-Platonist Porphyry, a Greek non-Christian philosopher
    of the 3rd century AD, the genuineness of the Book of was denied by no one
    until the rise of the deistic movement in the 17th century.</span></i></span><span data-dcnode-id="2410" style="font-size:12.0pt"><span data-dcnode-id="2411" instrument_node="">” (Wilson p.28)&nbsp; In 1890, Klaus Koch wrote a book denouncing the exilic date of writing
    and proclaiming the Maccabean theory (Ferch, pg. 129).&nbsp; Next, in 1900, S.R. Driver wrote a
    famous but misleading commentary on Daniel, supporting the same theory. Since
    then, many scholars have accepted the Maccabean theory without much
    question.&nbsp; </span></span></p><span data-dcnode-id="2408" instrument_node="">
</span><p data-dcnode-id="2405"><span data-dcnode-id="2406" style="font-size:12.0pt"><span data-dcnode-id="2407" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; In
    the work that follows I will discuss the dating of the book of Daniel from a
    scholarly standpoint without any personal bias against predictive
    prophecy.&nbsp; It is my view that the
    same rules that apply to the dating of all ancient documents should also be
    applied to Daniel.&nbsp; Namely,
    examining and dating the language(s) used in the document.&nbsp; One must also review ancient witnesses
    that testify to when the book was written.&nbsp; Accuracy of the book itself in describing the events of a
    period.&nbsp; The claims the book itself
    may make about its dating and whether those claims seem legitimate.&nbsp; Clues within the text that either
    support or betray its legitimacy, etc.</span></span></p><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2400"><span data-dcnode-id="2401" style="font-size:12.0pt"><b data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">Language Considerations:</span></b></span></p><span data-dcnode-id="2399" instrument_node="">
</span><p data-dcnode-id="2393"><span data-dcnode-id="2394" style="font-size:12.0pt"><span data-dcnode-id="2398" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Firstly
    the language of the book is Hebrew with an Aramaic section between 2:4b and
    7:28.&nbsp; The fact that the book is
    composed in the two languages gives weight to the late 6</span><sup data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">th</span></sup><span data-dcnode-id="2395" instrument_node=""> century
    date.&nbsp; For if the book was
    someone’s fraudulent invention, he would have naturally used just one language
    for the sake of those who were trying to read.&nbsp;&nbsp; The author may have considered it so important to put
    forward the exact facts and words of the various kings that he refused to
    translate them into his native language.&nbsp; Further more the book of Daniel would not vacillate between Hebrew and
    Aramaic if it was written in the Hellenistic period.&nbsp; For the Apocryphal books of the Hellenistic period come down
    to us in Greek. </span></span></p><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2388"><span data-dcnode-id="2389" style="font-size:12.0pt"><b data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Hebrew</span></b></span></p><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2384"><span data-dcnode-id="2385" style="font-size:12.0pt"><span data-dcnode-id="2386" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Scholars
    widely agree that the Hebrew sections were indeed written originally in
    Hebrew.&nbsp; When the Israelites officially
    canonized the scriptures of the Hebrew Bible in the first century AD, it was
    insisted that only books originally written in Hebrew (or Aramaic) would be
    accepted and books originally written in Greek were deliberately rejected. </span></span></p><span data-dcnode-id="2383" instrument_node="">
</span><p data-dcnode-id="2362"><span data-dcnode-id="2363" style="font-size:12.0pt"><span data-dcnode-id="2382" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    Hebrew of Daniel is similar to that found in Ezra, Nehemiah, Chronicles, and
    Esther. (Montgomery1964, p14)&nbsp; Thereby placing it in the same general time period as those books, that
    being the 5</span><sup data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">th</span></sup><span data-dcnode-id="2379" instrument_node=""> century.&nbsp; </span><span data-dcnode-id="2375" style="color:blue"><span data-dcnode-id="2378" instrument_node="">In his work </span><i data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">A History of the Hebrew Language</span></i></span><span data-dcnode-id="2371" style="color:blue"><span data-dcnode-id="2374" instrument_node="">, </span><br data-dcnode-id="2373"><span data-dcnode-id="2372" instrument_node="">
    Angel Saenz-Badillos states that the Hebrew of Daniel is more closely related
    to the Hebrew of the Torah than is Chronicles or Ezra.&nbsp; In other words, the Hebrew of Daniel is
    older than that of Chronicles or Ezra.&nbsp; However he believes that Daniel (and Esther) was a later work in which
    the author used older Hebrew even though he wrote much later than Chronicles
    (p114).&nbsp; Elsewhere he calls the
    Hebrew sections an attempt to imitate pre-exilic Biblical Hebrew (p122), yet he
    fails to provide any evidence for this theory.</span></span><span data-dcnode-id="2370" instrument_node="">&nbsp;&nbsp; It is possible that the Hebrew might allow a 165BC
    date but it fits much better with a 4</span><sup data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">th</span></sup><span data-dcnode-id="2367" instrument_node=""> to 6</span><sup data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">th</span></sup><span data-dcnode-id="2364" instrument_node=""> century
    date due to foreign loan words found in the Hebrew sections.</span></span></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2358"><span data-dcnode-id="2359" style="font-size:12.0pt"><span data-dcnode-id="2360" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; It
    is generally agreed that the Hebrew appears to be slightly later than the
    Aramaic.&nbsp; But it is also likely
    that the Hebrew was updated during scribal copying.&nbsp; However it is much less likely that the Aramaic section
    would be updated since it contains quotations of foreign kings.</span></span></p><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2354"><span data-dcnode-id="2355" style="font-size:12.0pt"><span data-dcnode-id="2356" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    occurrence of Old Persian words in the text, that were unknown in the
    Hellenistic period, requires a date much earlier than 165 BC. See below under
    Persian Loan Words.</span></span></p><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2350"><span data-dcnode-id="2351" style="font-size:12.0pt"><span data-dcnode-id="2352" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    Hebrew is in agreement with what one would expect from the reign of Cyrus the
    Great and therefore fits with the c. 536 date for the final writing, however
    the Hebrew in and of itself is not sufficiently indicative of a specific date
    to help in the dispute about dating the book.&nbsp; More important in dating the Hebrew sections are the loan
    words found in the Hebrew sections, the connection of the Hebrew to the Aramaic
    section and other non-linguistic indicators found within the Hebrew
    sections.&nbsp; These all point to a
    early date and will be discussed below.&nbsp; </span></span></p><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2343"><span data-dcnode-id="2346" style="font-size:12.0pt"><b data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Aramaic</span></b></span><span data-dcnode-id="2344" style="font-size:12.0pt"><span data-dcnode-id="2345" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></p><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2339"><span data-dcnode-id="2340" style="font-size:12.0pt"><span data-dcnode-id="2341" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    Aramaic is supposedly “Hebraicized”, this would be expected if the writer was a
    native Hebrew speaker, just as the present author’s Hebrew writing tends to be
    Anglicized since English is his native language.&nbsp; </span></span></p><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2334" style="font-size:12.0pt"><span data-dcnode-id="2337" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    Aramaic clearly belongs to the time period the book itself claims.&nbsp; This is supported by Wilson: “</span><i data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">This
    Aramaic is almost exactly the same as that which is found in portions of Ezra.
    On account of the large number of Babylonian and Persian words characteristic
    of this Aramaic and of that of the papyri recently found in Egypt, as well as
    on account of the general similarity of the nominal, verbal and other forms,
    and of the syntactical construction, the Aramaic of this period might properly
    be called the Babylonian-Persian Aramaic</span></i></span><span data-dcnode-id="2330" style="font-size:12.0pt"><span data-dcnode-id="2333" instrument_node="">”
    (Wilson p.25).&nbsp; He also states </span><i data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">“We
    claim, however, that the composite Aramaic of Daniel agrees in almost every
    particular of orthography, etymology and syntax, with the Aramaic of the North
    Semitic inscriptions of the 9th, 8th and 7th centuries BC and of the Egyptian
    papyri of the 5th century BC, and that the vocabulary of Daniel has an
    admixture of Hebrew, Babylonian and Persian words similar to that of the papyri
    of the 5th century BC; whereas, it differs in composition from the Aramaic of
    the Nabateans, which is devoid of Persian, Hebrew, and Babylonian words, and is
    full of Arabisms, and also from that of the Palmyrenes, which is full of Greek
    words, while having but one or two Persian words, and no Hebrew or Babylonian.” </span></i></span><span data-dcnode-id="2328" style="font-size:12.0pt"><span data-dcnode-id="2329" instrument_node="">(Wilson p.30)</span></span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2314"><span data-dcnode-id="2324" style="font-size:12.0pt;color:#FF6600"><span data-dcnode-id="2325" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span><span data-dcnode-id="2320" style="font-size:12.0pt"><span data-dcnode-id="2323" instrument_node="">Also Townsley writes: </span><i data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">“As for the Aramaic words,
    90% of them are found in texts of the fifth century BC or earlier (Vasholz, pg.
    315). Rosenthal's studies have led him to conclude that the ‘Aramaic employed
    in Daniel was that which grew up in the courts and chancellors from the seventh
    century BC, and subsequently became widespread in the Near East’ (Waltke, pg.
    322-323). Robert Vasholz says: ‘Many morphological forms were deemed ' late'
    ...have been established as early as the eighth to the fifth centuries BC [by
    the Elephantine papyri of the sixth century and Old Aramaic treaty texts from
    Sefire],’ (Vasholz, pg. 316). Further, some syntactical forms found in Daniel
    did not survive past the fifth century BC, for example the preposition Ie
    before a king's name, and the Assur Ostracon (seventh century BC) which agrees
    with the word order in Daniel”. </span></i></span><span data-dcnode-id="2315" style="font-size:12.0pt"><span data-dcnode-id="2319" instrument_node="">(Townsley
    22</span><sup data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">nd</span></sup><span data-dcnode-id="2316" instrument_node=""> paragraph)</span></span></p><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2310"><span data-dcnode-id="2311" style="font-size:12.0pt"><span data-dcnode-id="2312" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Aramaic
    is generally classified as follows (as recorded in Stefanovic p17):</span></span></p><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2307" style="font-size:12.0pt"><span data-dcnode-id="2308" instrument_node="">Old Aramaic (900-700 BC)</span></span></p><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2303" style="font-size:12.0pt"><span data-dcnode-id="2304" instrument_node="">Official Aramaic (700-300 BC)</span></span></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2298"><span data-dcnode-id="2299" style="font-size:12.0pt"><span data-dcnode-id="2300" instrument_node="">Middle Aramaic (300 BC - 200 AD)</span></span></p><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2295" style="font-size:12.0pt"><span data-dcnode-id="2296" instrument_node="">Late Aramaic (200 - 700 AD)</span></span></p><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" style="font-size:12.0pt"><span data-dcnode-id="2292" instrument_node="">Modern Aramaic (700 AD -the present)</span></span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2285" style="font-size:12.0pt"><span data-dcnode-id="2288" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    finds at Qumran have shed a little light on the subject.&nbsp; Stefanovic states “</span><i data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">The Aramaic
    documents from Qumran, especially the Targum to Job, have been evaluated as
    pointing quite definitely to a ‘pre-second-century date for the Aramaic of
    Daniel’” </span></i></span><span data-dcnode-id="2281" style="font-size:12.0pt"><span data-dcnode-id="2284" instrument_node="">(Stefanovic p22, with reference
    to Vasholz, </span><i data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Qumran and the Dating of Daniel </span></i></span><span data-dcnode-id="2279" style="font-size:12.0pt"><span data-dcnode-id="2280" instrument_node="">p320).</span></span></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2255"><span data-dcnode-id="2273" style="font-size:12.0pt"><span data-dcnode-id="2276" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Stefanovic
    also states in his conclusion “</span><i data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">The text of DA </span></i></span><span data-dcnode-id="2269" style="font-size:12.0pt"><span data-dcnode-id="2272" instrument_node="">(Daniel Aramaic)</span><i data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node=""> in its present form (including ch.
    7) contains a significant amount of material similar to OA </span></i></span><span data-dcnode-id="2265" style="font-size:12.0pt"><span data-dcnode-id="2268" instrument_node="">(Old Aramaic) </span><i data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">texts.”&nbsp; </span></i></span><span data-dcnode-id="2258" style="font-size:12.0pt"><span data-dcnode-id="2264" instrument_node="">(Stefanovic
    p108).&nbsp; He shows that Daniel’s
    Aramaic is similar on many levels to Old Aramaic or to the transitional period
    from Old Aramaic to Official Aramaic.&nbsp; His work takes into account literary correlations, grammatical
    correlations and syntactical correlations to other ancient Aramaic finds.&nbsp; Perhaps most surprising is the
    similarities between DA and the Tell Fakhriyah inscription (9</span><sup data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">th</span></sup><span data-dcnode-id="2261" instrument_node=""> century).&nbsp; This inscription is both
    in Aramaic and Akkadian.&nbsp; Of the 95
    different words found in it, 65 are also found in DA. (Stefanovic p61)&nbsp; The word-order of DA, is eastern in
    character and </span><i data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">‘comes closer to the Akkadian version of Tell Fakhriyah than
    to its Aramaic version’ </span></i></span><span data-dcnode-id="2256" style="font-size:12.0pt"><span data-dcnode-id="2257" instrument_node="">(Stefanovic
    p106)</span></span></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2243" style="font-size:12.0pt"><span data-dcnode-id="2253" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; It
    must also be remembered that Daniel has been copied and recopied time and again
    allowing for updates in spelling and perhaps even changes in the wording
    itself.&nbsp; In comparison to this, the
    other ancient Assyrian texts we have are often inscriptions in stone and are
    not copies, thus they have been unaltered grammatically by the passing of
    time.&nbsp; Yet despite any changes
    introduced since the original writing, Daniel still resembles the Aramaic of
    the 5</span><sup data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">th</span></sup><span data-dcnode-id="2250" instrument_node="">, 6</span><sup data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">th</span></sup><span data-dcnode-id="2247" instrument_node=""> and 7</span><sup data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">th</span></sup><span data-dcnode-id="2244" instrument_node=""> centuries.&nbsp; </span></span></p><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2230"><span data-dcnode-id="2237" style="font-size:12.0pt"><span data-dcnode-id="2240" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Some
    would wonder as to why the Aramaic section continues into chapter 7 and if thus
    far why not into chapter 8.&nbsp; But I
    noted in 7:1, something very important.&nbsp; That is that someone else is recording Daniels words.&nbsp; Notice </span><i data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">- “Daniel had a Dream…his
    head…he wrote down and told the sum of the sum of the matter.&nbsp; Daniel said…” </span></i></span><span data-dcnode-id="2233" style="font-size:12.0pt"><span data-dcnode-id="2236" instrument_node="">The rest of the chapter is quoting Daniel.&nbsp; Chapter 8 reverts to Hebrew and we find
    in 8:1ff </span><i data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">“…appeared to me, Daniel…. to me…I saw….” </span></i></span><span data-dcnode-id="2231" style="font-size:12.0pt"><span data-dcnode-id="2232" instrument_node="">Here Daniel is again the actual recorder.&nbsp;&nbsp; When we see the first person
    being used in Chapter 7, it is within the framework of a quotation.&nbsp; The same treatment of Daniel also
    occurs throughout the first part of the book through chapter 7, but from
    chapter 8 onward Daniel speaks in the first person, with the exception of
    10:1.&nbsp; </span></span></p><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2226"><span data-dcnode-id="2227" style="font-size:12.0pt"><span data-dcnode-id="2228" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Perhaps
    the Aramaic section of the book was intended for publication on a large scale and
    was also therefore written in the language of the Empire.&nbsp; If the writer was recording
    Nebuchadnezzar’s words in the lingua franca of the day in order to declare the
    sovereignty of the God of Israel to the surrounding nations, then the use of
    Old Aramaic makes sense.&nbsp; But why
    use Old Aramaic if the book was written c. 165 in the Hellenistic period. </span></span></p><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" style="font-size:12.0pt"><span data-dcnode-id="2224" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Both
    early and late daters confess that Daniel’s Aramaic is almost identical to that
    of Ezra’s.&nbsp; Both sides also place
    the writing of Ezra in the 5</span><sup data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">th</span></sup><span data-dcnode-id="2221" instrument_node=""> century.&nbsp; If one wishes to date Daniel in 165 BC then he must also
    date Ezra to this period, yet no respectable scholar is willing to do that.</span></span></p><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2206"><span data-dcnode-id="2207" style="font-size:12.0pt"><span data-dcnode-id="2217" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Four
    words in the Aramaic, which are apparently of Persian origin, are not attested
    to after the 5</span><sup data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">th</span></sup><span data-dcnode-id="2214" instrument_node=""> century BC.&nbsp; The are אחשדרפן
    דתבר תיפת
    אזרא. (Collins p19 footnote 182) The use of these words
    weighs heavily in favor of a 6</span><sup data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">th</span></sup><span data-dcnode-id="2211" instrument_node=""> or 5</span><sup data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">th</span></sup><span data-dcnode-id="2208" instrument_node=""> century date.</span></span></p><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" style="font-size:12.0pt"><span data-dcnode-id="2204" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    Aramaic belongs to the period from the 9</span><sup data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">th</span></sup><span data-dcnode-id="2201" instrument_node=""> to 5</span><sup data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">th</span></sup><span data-dcnode-id="2198" instrument_node=""> centuries.&nbsp; Even supporters of a
    late date such as Collins (in his introduction) are forced to confess that the
    Aramaic is not consistent with a 2</span><sup data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">nd</span></sup><span data-dcnode-id="2195" instrument_node=""> century date and belongs to an
    earlier period. </span></span></p><span data-dcnode-id="2192" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2189" style="font-size:12.0pt"><b data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Foreign Loan Words</span></b></span></p><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" style="font-size:12.0pt"><b data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Akkadian</span></b></span></p><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2179"><span data-dcnode-id="2180" style="font-size:12.0pt"><span data-dcnode-id="2181" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Montgomery
    lists at least 12 words from Akkadian found in the Aramaic section of the books
    and 1 in the Hebrew section of the book. (Montgomery, p20).&nbsp; These words indicate that the Aramaic
    and Hebrew belong to the Babylonian period and to the Mesopotamian region.&nbsp; The appearance of one Akkadian word in
    the Hebrew section is evidence (although not proof) that the Hebrew writer was
    dwelling in Mesopotamia at the time of writing.</span></span></p><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2174"><span data-dcnode-id="2175" style="font-size:12.0pt"><b data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Persian words</span></b></span></p><span data-dcnode-id="2173" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2169" style="font-size:12.0pt"><span data-dcnode-id="2172" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The </span><i data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">International Critical Commentary </span></i></span><span data-dcnode-id="2165" style="font-size:12.0pt"><span data-dcnode-id="2168" instrument_node="">lists
    14 Persian words in the Aramaic section and 3 in the Hebrew section.
    (Montgomery, p21)&nbsp; and that 8 of
    the words are official titles, which is not surprising considering Daniel’s
    high position in the Persian court.&nbsp; Nor is it surprising to find some of these words used in sections that
    pertain to the kings of Babylon for Babylon together with their allies the
    Medes were dominating the Persians.&nbsp; In addition, Daniel may not have written down his account until the time
    of the Medo-Persian Empire when he himself was taken to their capital in Susa.&nbsp; Harrison notes “</span><i data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">…the Persian terms
    found in Daniel are specifically Old Persian words, that is to say, occurring
    within the history of the language to about 300 BC.” </span></i></span><span data-dcnode-id="2163" style="font-size:12.0pt"><span data-dcnode-id="2164" instrument_node="">(Harrison, p1126) A good example of this is “Ashpenaz”
    in 1:3, (in the Hebrew section) which was not understood in Greek times and was
    translated as a personal name with unknown meaning.&nbsp; It is now known that this is an Old Persian term meaning
    “inn-keeper”. (see Collins p127 note 9)</span></span></p><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2151"><span data-dcnode-id="2157" style="font-size:12.0pt"><span data-dcnode-id="2160" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Townsley
    gives this well documented opinion: </span><i data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">“There are also Persian loan-words and
    genre in Daniel. All of these words have been determined to be of the Old
    Persian, or Achaemedian tongue (539-332 BC; Vasholz, pg. 316ff; Wiseman, pg.
    117). Some would wonder why this Israelite would be using Persian in his book,
    and how he would know it. The answer is -that Cyrus was a Persian, and Daniel
    being the gifted statesman and fast learner that he was (Dan 1:4, 6:28), he
    would have to had learned Persian to retain his position (Waltke, pg. 323-324). </span></i></span><span data-dcnode-id="2152" style="font-size:12.0pt"><span data-dcnode-id="2156" instrument_node="">(Townsley 21</span><sup data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">st</span></sup><span data-dcnode-id="2153" instrument_node=""> paragraph)</span></span></p><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" style="font-size:12.0pt"><span data-dcnode-id="2149" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    use of Persian loan words, and these especially, indicates a Babylonian or
    Persian origin and not a Palestinian origin.&nbsp; These specific “Old Persian” words also point to the book
    being written in its final form in the Persian Period and not the Hellenistic
    period. </span></span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2142"><span data-dcnode-id="2143" style="font-size:12.0pt"><b data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Greek words</span></b></span></p><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2135"><span data-dcnode-id="2136" style="font-size:12.0pt"><span data-dcnode-id="2140" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; There
    are 3 words that are very likely of Greek origin in Daniel 3:5 and
    following.&nbsp;&nbsp; קיתרס
    פסמתרין
    סומפניא they refer to musical
    instruments, which the King James Version calls harp, psaltery, and
    dulcimer.&nbsp; The earliest occurrence
    we know of outside of the Bible for the word &nbsp;&nbsp; פסנתרין    is probably in Aristotle (384-322 BC) and the word&nbsp;&nbsp; סומפניא
    has its earliest occurrence in Plato (428-347 BC)(Montgomery, p22).&nbsp; Since one of the words has a different
    spelling only two verses away פסנטרין,
    we may surmise that the author was unsure of the spelling of this foreign word
    in translating it to Aramaic, or that since the author was a Hebrew speaker, he
    didn’t know the Aramaic spelling of this foreign Greek word.&nbsp; This word and the second one I referred
    to also have variant spellings in a manuscript tradition from Qumran.&nbsp; Another important fact is that already
    by 150 BC scribal tradition as demonstrated at Qumran was already so strict
    that they refused to correct known mistakes hence the differences in spelling
    have been maintained.&nbsp; This shows
    that there would likely need to be some time for the variants to arise, hence
    once again 165 is much to late.&nbsp; Note also that these 3 words refer to musical instruments.&nbsp; Babylonian music notation has been
    discovered and their sounds and melodies reproduced in modern times.&nbsp; The music from Babylonia was supposedly
    fairly boring and limited in its diversity.&nbsp; The introduction therefore of Greek musical instruments into
    the region is not surprising.&nbsp; Hellenistic influence had already reached Babylon by the reign of
    Nebuchadnezzar II (see Wilson p30-31, Keil p34); hence it is no surprise that
    he would use these new instruments in his worship ritual.&nbsp; Harrison notes that the instruments
    that these words refer to were known in the ancient near east even on Assyrian
    reliefs (Harrison p1126).&nbsp; It is
    important to remember that from Greece through Assyria and Babylonia all the
    way to Persia and south to Egypt was one continuous bed of civilization.&nbsp; It should be no surprise that Greek
    musical instruments were used in Babylonia.&nbsp;&nbsp; As today, people in the ancient world traveled from
    place to place and upon their return, brought back with them new ideas and new
    products.&nbsp; Also we find that Greek
    mercenaries served in the Babylonian army and there was found a Greek
    expatriate community in Babylonia dating to the 6</span><sup data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">th</span></sup><span data-dcnode-id="2137" instrument_node=""> century or
    earlier.&nbsp; If those Greeks brought
    any of their culture with them, as one would expect them to do, a musical
    instrument would be expected as it is small enough to carry and music (and of
    course food) is one of the first things to cross cultural boundaries.&nbsp; We may surmise that the author of
    Daniel did not know the Aramaic equivalents for these Greek words.&nbsp; Obviously this points to an Aramaic,
    and not Greek, original for this portion of the text.&nbsp; These words being specialized.&nbsp; It also points to a late Babylonian dating.&nbsp; Had Daniel been written in the late
    Hellenistic period, we would expect to find several other Greek loan words.&nbsp;&nbsp; Instead we find several Akkadian
    and Persian words.&nbsp; </span></span></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2124"><span data-dcnode-id="2130" style="font-size:12.0pt"><span data-dcnode-id="2133" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “</span><i data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">In
    fact, ‘an avalanche of evidence has demonstrated the presence of Greek language
    in Semitic milieu long before the sixth century BC’ (Vasholz, pg. 316). The
    Hebrew word for Greeks, YAWAN, for settlements of lonia on the western coast of
    Turkey indicates some type of contact before 1,000 BC (Yamauchi, "Daniel
    and Contacts Between the Aegean and the Near East Before Alexander," pg.
    40. ). Greeks entered the Near East by the ninth century BC, built a temple by
    c. 675 BC, and Greek pottery was found there, in abundance, dating to the
    seventh century BC.&nbsp; A. Leo
    Oppenheim discovered two documents dating from 550 BC, and 551 BC, describing
    trade between the Neo-Babylonians of the Near East, and the merchants of
    {Greece}, Tyre, and Yamana (Oppenhiem, pg. 236-254). </span></i></span><span data-dcnode-id="2125" style="font-size:12.0pt"><span data-dcnode-id="2129" instrument_node="">(in Townsley 20</span><sup data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">th</span></sup><span data-dcnode-id="2126" instrument_node=""> paragraph)</span></span></p><span data-dcnode-id="2123" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" style="font-size:12.0pt"><span data-dcnode-id="2122" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; These
    Greek words therefore are consistent with a 6</span><sup data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">th</span></sup><span data-dcnode-id="2119" instrument_node=""> century date for the
    book.&nbsp; The lack of other types of
    Greek loan words points to a pre-Hellenistic period writing.</span></span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2112"><span data-dcnode-id="2113" style="font-size:12.0pt"><b data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Literary Style</span></b></span></p><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2105"><span data-dcnode-id="2106" style="font-size:12.0pt"><span data-dcnode-id="2110" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    word Chaldean was formerly thought to be used only in an ethnic sense in the 6</span><sup data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">th</span></sup><span data-dcnode-id="2107" instrument_node=""> century.&nbsp; Daniel however uses it in
    a dual sense of both an ethnic group and in the sense of one who is a
    magician.&nbsp; However it is no longer
    a problem, since it was discovered that Herodotus (c. 450 BC) in Persian Wars,
    uses Chaldean in both senses, and accepted that their religious practices went
    back at least as far as Cyrus (Harrison, p. 1113).” </span></span></p><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2098"><span data-dcnode-id="2099" style="font-size:12.0pt"><span data-dcnode-id="2103" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Some
    argue that the apocryphal portion of Daniel is typical of apocryphal books that
    are from the 2nd century BC and therefore Daniel is from that period.&nbsp; I would argue that as mentioned
    previously Daniel is written in Hebrew and Babylonian/Persian period Aramaic,
    while the other books are in Greek.&nbsp; Since Daniel gave such an accurate prediction of the period of the early
    2</span><sup data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">nd</span></sup><span data-dcnode-id="2100" instrument_node=""> century, many Greek-speaking writers in and around Palestine at
    that time and shortly after sought to copy his linguistic mannerisms in order
    to validate their own writings.&nbsp; Had the book of Daniel been written concurrent with those books, and in
    the same geographical area, we would expect it to be in the same language, but
    it is not.</span></span></p><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2091"><span data-dcnode-id="2092" style="font-size:12.0pt"><span data-dcnode-id="2096" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Further,
    if and I stress If the book of Daniel is so much like the Apocryphal books of
    the 2</span><sup data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">nd</span></sup><span data-dcnode-id="2093" instrument_node=""> century then why was only it accepted and not these to the
    canon of scripture?</span></span></p><span data-dcnode-id="2090" instrument_node="">
</span><p data-dcnode-id="2084"><span data-dcnode-id="2087" style="font-size:12.0pt"><i data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “That
    there are spurious apocalypses no more proves that all are spurious than that
    there are spurious gospels or epistles proves that there are no genuine ones.
    The spurious epistles of Philaris do not prove that Cicero’s Letters are not
    genuine; nor do the false statements of 2 Macc, nor the many spurious Acts of
    the Apostles, prove that 1 Macc or Luke’s Acts of the Apostles is not genuine.” </span></i></span><span data-dcnode-id="2085" style="font-size:12.0pt"><span data-dcnode-id="2086" instrument_node="">(Wilson p.29)</span></span></p><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2079" style="font-size:12.0pt"><span data-dcnode-id="2082" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “</span><i data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">As
    a final note on the literary style, AK Grayson's Babylonian historical-Literary
    Texts, demonstrated, according to Baldwin, that in style, form, and rationale
    there is a striking resemblance [between parts of Daniel and tablets of ancient
    Babylonian prophecy] which it is by no means easy to account for knowledge of
    this [Babylonian] cuneiform literature in the second century Palestine. [But]
    Israel would have had Babylonian influence on all sides during the exile"
    (Baldwin, "Some Literary Affinities of Daniel," p99).”</span></i></span><span data-dcnode-id="2074" style="font-size:12.0pt"><span data-dcnode-id="2078" instrument_node=""> (Townsley 23</span><sup data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">rd</span></sup><span data-dcnode-id="2075" instrument_node=""> paragraph)</span></span></p><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2068" style="font-size:12.0pt"><span data-dcnode-id="2071" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Collins
    says the story of Ahikar was “</span><i data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">most probably composed in Aramaic in Mesopotamia
    and may be as old as the seventh century.” </span></i></span><span data-dcnode-id="2064" style="font-size:
12.0pt"><span data-dcnode-id="2067" instrument_node="">(Collins p41)&nbsp; Collins goes
    on to say, “</span><i data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">…the story of Ahikar belongs to the same kind of literature as
    Daniel, in terms of setting, plot type, and, to some degree, idiom.” </span></i></span><span data-dcnode-id="2059" style="font-size:12.0pt"><span data-dcnode-id="2063" instrument_node="">(Collins p41).&nbsp; This is one example of Daniel being similar to Babylonian period
    works.&nbsp; Thus simply saying one
    story is similar to another, by no means places them in the same time
    period.&nbsp; The argument for a 2</span><sup data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">nd</span></sup><span data-dcnode-id="2060" instrument_node=""> century dating of Daniel due to supposed similarities to Apocryphal works from
    that period, which were written in a different language, is without basis.</span></span></p><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2054"><span data-dcnode-id="2055" style="font-size:12.0pt"><span data-dcnode-id="2056" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    story of Daniel is similar in some ways to that of Joseph, in their
    unwillingness to be corrupted and in their rise to power in a foreign land, and
    is interesting to study, but bears no weight in the debate of dating either
    book to a specific time period, except to show that similarity to other works
    is no basis for dating.&nbsp; If the
    writer of Daniel copied Joseph’s story, then is it not possible by the same
    logic to say that the apocryphal writers copied Daniel.&nbsp; </span></span></p><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2048" style="font-size:12.0pt"><span data-dcnode-id="2052" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Also
    it should not be thought of as strange that Jews in exile, such as Daniel and
    Joseph, should rise to power in foreign governments.&nbsp; We have many examples of Jews today rising to power in their
    various countries of exile during the 20</span><sup data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">th</span></sup><span data-dcnode-id="2049" instrument_node=""> century.&nbsp; Nor should it be surprising if these
    Jews are forgotten in the records of those various countries.&nbsp; For if they are forgotten in a modern
    democracy, how much more in ancient dictatorships, wherein kings were only
    concerned with honoring themselves and their gods.</span></span></p><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2043" style="font-size:14.0pt"><b data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Early Texts of Daniel</span></b></span></p><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2038" style="font-size:12.0pt"><b data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">LXX</span></b></span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2034" style="font-size:12.0pt"><span data-dcnode-id="2035" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    LXX was begun c.260BC. The earliest translation work was only of the Torah (5
    books of Moses).&nbsp; Apparently the
    “prophets” were translated next, and the “writings” (including Daniel, Ezra,
    Nehemiah, Esther, Ruth) were translated last.&nbsp; The inclusion in the LXX of the additional passages of Bel
    and the Dragon, the prayer of the Three Hebrew Children and Susanna indicates
    that the Greek version of Daniel was not produced until after those books were
    written.&nbsp; We do not know when
    Daniel was first translated to Greek, but we do know from Jerome and others
    that the translation that was included with the Septuagint was considered
    unreliable.&nbsp;&nbsp; </span></span></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" style="font-size:12.0pt"><b data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Qumran</span></b></span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2025" style="font-size:12.0pt"><span data-dcnode-id="2026" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    earliest copies of the Book of Daniel in our possession today were found at
    Qumran.&nbsp; (See the appendix area for
    a listing of Qumran documents relating to Daniel) They preserve it as we have
    it today, as one work by one man.&nbsp; Though I cannot prove that between the first edition and the scrolls at
    Qumran no editing or redaction was done, I do not need to prove that for the
    burden of proof does not lie with me but with those who suggest that editing or
    additions did indeed occur.&nbsp; This
    logic holds true for any book whether ancient or modern.&nbsp; It must be assumed that the earliest
    copy we posses is identical for the large part to the original, exempting of
    course copyist errors or spelling corrections.&nbsp; This is especially true when different textual traditions
    are virtually identical.&nbsp; The
    Masorates did not rely on the texts from Qumran, yet produced virtually
    identical copies from their sources.</span></span></p><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2021" style="font-size:12.0pt"><span data-dcnode-id="2022" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Every
    part of the book of Daniel is testified at Qumran and the Hebrew - Aramaic
    shift is firmly established.&nbsp; Also
    the Apocryphal addition of the prayer of the three children is clearly shown to
    be excluded from the original work. (Collins p3)</span></span></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2016"><span data-dcnode-id="2017" style="font-size:12.0pt"><span data-dcnode-id="2018" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Several
    other manuscripts found at Qumran mention Daniel.&nbsp; At least 7 different works contained in 9 different
    fragments mention Daniel.&nbsp; All of
    the manuscripts consider Daniel to be a historical character in Babylon.</span></span></p><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2008"><span data-dcnode-id="2011" style="font-size:12.0pt"><span data-dcnode-id="2014" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “</span><i data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">As
    for the recent Qumran findings, many manuscripts of Daniel were found, in three
    different caves at Qumran (Baldwin, pg. 73-74). To determine an "earliest
    date" for those manuscripts, we need to compare them with manuscripts with
    dates that are known. Takamitsu Muraoka did a study on the Aramaic of 11QtJob
    mss, and of 1QapGen, and found that the 11QtJob mss is closer to the Aramaic of
    the Old Testament than the 1QapGen. His conclusion is that the 11QtJob should
    be dated between 250-150 BC (Muraoka, pg. 425-443). Next, Robert Vasholz
    determined that the mss of Daniel are older than the 11QtJob. How much older he
    can't be certain, but older none-the-less (Vasholz, pg. 320), which probably
    pushes the date of writing before the date deemed necessary by most Maccabean

</span><p data-dcnode-id="1981"><span data-dcnode-id="1982" style="font-size:12.0pt"><span data-dcnode-id="1986" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; All

    that Daniel himself was a historical figure.&nbsp; </span></span></p><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1977" style="font-size:14.0pt"><b data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Internal Evidence</span></b></span></p><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1972" style="font-size:12.0pt"><b data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">8:20&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></b></span><span data-dcnode-id="1968" style="font-size:12.0pt"><span data-dcnode-id="1971" instrument_node="">“</span><i data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">The ram which you saw, having the two horns - they

</span><p data-dcnode-id="1954"><span data-dcnode-id="1960" style="font-size:12.0pt"><span data-dcnode-id="1963" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Fausset,

</span><p data-dcnode-id="1943"><span data-dcnode-id="1950" style="font-size:12.0pt"><b data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">9:17</span></b></span><span data-dcnode-id="1946" style="font-size:12.0pt"><span data-dcnode-id="1949" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span><i data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">“…cause
    your face to shine on your sanctuary, which is desolate</span></i></span><span data-dcnode-id="1944" style="font-size:12.0pt"><span data-dcnode-id="1945" instrument_node="">.”&nbsp; </span></span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1927"><span data-dcnode-id="1928" style="font-size:12.0pt"><span data-dcnode-id="1941" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    temple is specifically mentioned in a present state of ruin.&nbsp; Taken at face value, this clearly
    points to an exilic period for Daniel’s prayer, due to the use of the present
    tense regarding the temple’s condition for by the early 5</span><sup data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">th</span></sup><span data-dcnode-id="1938" instrument_node=""> century
    the temple was already rebuilt. Of course one could say it’s a forgery or a
    mere story, however, this like all the rest of the book fits perfectly into the
    6</span><sup data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">th</span></sup><span data-dcnode-id="1935" instrument_node=""> century without any explanation needed.&nbsp; And since the mention or lack of
    mention of the destruction of the second temple is a way to date texts from the
    1</span><sup data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">st</span></sup><span data-dcnode-id="1932" instrument_node=""> century AD, it seems fair to also use that method to date works
    from the era of the Babylonian exile.&nbsp; In other words, Jewish works from the first century AD are dated as
    being either before 70 AD or afterwards based on whether or not they discuss
    the temple as though it were still standing or if they discuss it as having
    been destroyed.&nbsp; Hence all the
    later Qumran texts are dated to before 70 AD since they viewed the temple as
    still standing.&nbsp; The status in the
    book of Daniel is that the 1</span><sup data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">st</span></sup><span data-dcnode-id="1929" instrument_node=""> temple is destroyed and the second
    one has not been built, the Jews are still in exile and the city is still in
    ruins.&nbsp; At the same time no
    “finishing touches” have been added to Daniel such as we find at the end of
    Deuteronomy were someone is writing after Moses is already dead.</span></span></p><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1923" style="font-size:12.0pt"><b data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">10:2-4</span></b></span></p><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1909"><span data-dcnode-id="1918" style="font-size:12.0pt"><b data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></b></span><span data-dcnode-id="1910" style="font-size:12.0pt"><span data-dcnode-id="1917" instrument_node="">According to these verses Daniel was semi-fasting and
    mourning through the period of the Passover festival, which falls between the
    14</span><sup data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">th</span></sup><span data-dcnode-id="1914" instrument_node=""> and the 21</span><sup data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">st</span></sup><span data-dcnode-id="1911" instrument_node=""> day of the first month.&nbsp; This points to an exilic period origin,
    for in the post exilic period Nehemiah, Ezra and the Levites taught the people
    not to mourn during the feasts. (Nehemiah 8:9).</span></span></p><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1905" style="font-size:12.0pt"><b data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">The Fourth Kingdom</span></b></span><span data-dcnode-id="1903" style="font-size:12.0pt"><span data-dcnode-id="1904" instrument_node=""> </span></span></p><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1899" style="font-size:12.0pt"><span data-dcnode-id="1900" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Chapters
    2 and 7 of the book of Daniel contain prophecies foretelling the rise and fall
    of four different kingdoms and the establishing of the kingdom of God in the
    days of the fourth kingdom.&nbsp;&nbsp; </span></span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1893" style="font-size:12.0pt"><span data-dcnode-id="1896" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “</span><i data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">But
    after you </span></i></span><span data-dcnode-id="1889" style="font-size:12.0pt"><span data-dcnode-id="1892" instrument_node="">(Nebuchadnezzar) </span><i data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">shall
    arise another kingdom inferior to yours; then another, a third kingdom of
    bronze, which shall rule over all the earth.&nbsp; And the fourth kingdom shall be strong as iron, inasmuch as
    iron breaks in pieces and shatters everything; and like iron that crushes, that
    kingdom will break in pieces and crush all the others…” </span></i></span><span data-dcnode-id="1887" style="font-size:12.0pt"><span data-dcnode-id="1888" instrument_node="">(Daniel 2:39-40 NKJV)</span></span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1878"><span data-dcnode-id="1881" style="font-size:12.0pt"><span data-dcnode-id="1884" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “</span><i data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">And
    suddenly another beast, a second, like a bear.&nbsp; It was raised up on one side, and had three ribs in its
    mouth between its teeth.&nbsp; And they
    said thus to it: ‘Arise, devour much flesh!’&nbsp; After this I looked, and there was another, like a leopard,
    which had on its back four wings of a bird.&nbsp; The beast also had four heads, and dominion was given to
    it.&nbsp; After this I saw in the night
    visions, and behold, a fourth beast, dreadful and terrible, exceedingly
    strong.&nbsp; It had huge iron teeth; it
    was devouring, breaking in pieces, and trampling the residue with its
    feet.&nbsp; It was different from all
    the beasts that were before it, and it had ten horns.</span></i></span><span data-dcnode-id="1879" style="font-size:12.0pt"><span data-dcnode-id="1880" instrument_node="">” (Daniel 7:5-7 NKJV)</span></span></p><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" style="font-size:12.0pt"><span data-dcnode-id="1876" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; All
    scholars agree that Babylon is the first kingdom.&nbsp; Based on the events of known history the second kingdom is
    understood to be Medo-Persia, the third to be Greece and the fourth to be the
    Roman. The fourth kingdom in both of these passages is clearly one and the
    same.&nbsp; Both are symbolized by
    iron.&nbsp; In chapter two it has ten
    toes and in chapter seven it has ten horns.&nbsp; In both passages in the days of the fourth kingdom, the
    Kingdom of God is established.&nbsp; Everyone admits that these two visions represent the same four
    kingdoms.&nbsp; Those who suggest a late
    dating for the book in order to evade the concept of predictive prophecy are
    forced to change the usual interpretation of the prophesies of the fourth
    kingdom in 2:40 and 7:7 to refer to Greece instead of Rome, for even a 165 BC
    date is too early to account for the authors knowledge of the Roman empire.
    This leaves a empty spot in the place of the third kingdom, so they then divide
    the Medo-Persian kingdom into two different successive kingdoms. Making Media
    the second and Persia the third.&nbsp; This however is not accurate to history and is not consistent in any way
    with a plain reading of the text. The late daters themselves admit that the
    Babylonian kingdom was conquered by the Persians together with their weaker
    partner the Medes as one kingdom.&nbsp; Hence we have the term “Medo-Persian Empire“.&nbsp; The Medo-Persian Empire cannot represent two successive
    kingdoms which come after the kingdom of Babylon.&nbsp; Both of the visions, however, represent two successive,
    separate and different kingdoms.&nbsp; It can be shown, as follows, that the book itself gives the author’s
    intended understanding of the identification of the 2</span><sup data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">nd</span></sup><span data-dcnode-id="1873" instrument_node=""> and 3</span><sup data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">rd</span></sup><span data-dcnode-id="1870" instrument_node=""> kingdoms and thus also of the fourth.</span></span></p><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1863" style="font-size:12.0pt"><span data-dcnode-id="1866" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;5:28 “…</span><i data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">your kingdom is divided and
    given to the Medes and Persians</span></i></span><span data-dcnode-id="1861" style="font-size:12.0pt"><span data-dcnode-id="1862" instrument_node="">”&nbsp; this shows the Median / Persian kingdom
    was considered by the author to be one kingdom, just as it is today (see also
    6:8, 12, 15).&nbsp; </span></span></p><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1855" style="font-size:12.0pt"><span data-dcnode-id="1858" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Further,
    in 7:6 we read of the four wings and four heads of the third beast (the
    leopard) which symbolize the splitting of the Greek kingdom into four sections
    shortly after Alexander’s death.&nbsp; “</span><i data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">After
    Alexander’s untimely death, his empire was split up among four of his
    generals.&nbsp; Ptolemy took Egypt;
    Seleucas, Assyria and Babylon;&nbsp; Antigonas, Persia and Asia Minor;&nbsp; Philip (Alexander’s brother), Macedonia (Mayenei HaYeshuah 8:3)” </span></i></span><span data-dcnode-id="1853" style="font-size:12.0pt"><span data-dcnode-id="1854" instrument_node="">(Goldwurm p198).&nbsp; </span></span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" style="font-size:12.0pt"><span data-dcnode-id="1850" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    vision in chapter 8 clarifies the intended interpretation of chapters 2 and
    7.&nbsp;&nbsp; In Chap. 8 were the
    Medo-Persian empire is symbolized by a ram with two horns and Greece is
    symbolized as a he-goat with Alexander the Great symbolized by a conspicuous
    horn on it that is broken at the height of its strength and in its place arise
    four horns.&nbsp; Note, like the
    leopard, the he goat is also capable of flight (8:5) and similar to the four
    horns of the he-goat the leopard has four wings and four heads.&nbsp; The author himself gives the
    interpretation of the vision of the two animals in chapter 8, at 8:20ff, as
    being the Medo-Persian and Greek empires.&nbsp; </span></span></p><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1845" style="font-size:12.0pt"><span data-dcnode-id="1846" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Note
    also the Medo-Persian empire is considered a dual empire in 8:2 and is only
    symbolized by one beast, just as it is only symbolized by one beast in 7:5 (the
    bear).&nbsp; In 8:3 we see that one of
    the rams horns is higher than the other, and similarly in 7:5 the bear was
    raised up on one side.&nbsp; This is
    because the Persians were stronger than their allies the Medes.&nbsp; The three ribs in the bears mouth may
    symbolize Nebuchadnezzar, his son and his son’ son, the three generations that
    ruled Babylon according to Jeremiah 27:7.</span></span></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" style="font-size:12.0pt"><span data-dcnode-id="1842" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Again
    in 11:4 Alexander is prophesied.&nbsp; Note again the division by four of his empire.&nbsp; The leopard also symbolizes the swiftness of the Greek
    conquests.&nbsp; Alexander ruled “over
    all the earth”, as is said of the 3</span><sup data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">rd</span></sup><span data-dcnode-id="1839" instrument_node=""> kingdom in 2:39 that is all
    the way from Greece to Egypt to India. The Greek language was eventually
    adopted as the international language of the region, in superseding
    Aramaic.&nbsp; Whereas the Medo-Persian
    empire was not as vast and their language didn’t even become the language of
    their new kingdom, but rather the Assyrian/Babylonian language remained
    (Aramaic) as is seen in the quote in Ezra 7:12-26 of Artaxerxes in Aramaic.</span></span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1832" style="font-size:12.0pt"><span data-dcnode-id="1835" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Concerning
    the Jewish tradition - “</span><i data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">The Midrashim (see, e.g., Avodah Zarah 2b </span></i></span><span data-dcnode-id="1828" style="font-size:12.0pt"><span data-dcnode-id="1831" instrument_node="">חייבת
    רומיזו </span><i data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">and many other places)
    consistently list Greece&nbsp; as the
    third kingdom and Rome as the fourth kingdom.&nbsp; This is followed by almost all the commentators, starting
    with R’ Saadiah Gaon (cited by Ibn Ezra 2:40) and including Rambam (Iggeres
    Teiman) and Ramban (Sefer HaGeulah 2, and comm. to Genesis 36:23 and Numbers
    24:20 [ed. Chavel])</span></i></span><span data-dcnode-id="1823" style="font-size:12.0pt"><span data-dcnode-id="1827" instrument_node="">” (Goldwurm, 1979,
    p104 see also p199)&nbsp; The rare
    exception among Jewish commentators makes Rome and Greece together the 3</span><sup data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">rd</span></sup><span data-dcnode-id="1824" instrument_node=""> kingdom and the Arab kingdom the fourth.&nbsp; No one makes Greece the fourth.</span></span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1818"><span data-dcnode-id="1819" style="font-size:12.0pt"><span data-dcnode-id="1820" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    prophecy of the fourth kingdom is a clear reference to Rome.&nbsp; Had the author been writing in the
    Maccabean era with the intention of encouraging the Jews, it is not very likely
    that he would have predicted an even worse kingdom to come and replace the
    Grecian kingdom.&nbsp; In fact one would
    expect the author to prophesy of the Kingdom of God coming to free the “saints”
    from the oppression of the Greeks, instead he has the kingdom of God as
    conquering the Roman empire which was to replace the Greek empire.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    late dating of Daniel does not eliminate completely the fulfilled predictive
    prophecies, since the kingdom of Rome is plainly prophesied.&nbsp; Late daters have not even begun to bring
    forward a strong argument to deal with this problem in their thesis.</span></span></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" style="font-size:12.0pt"><b data-dcnode-id="1812"><span data-dcnode-id="1816" instrument_node="">Destruction of the 2</span><sup data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">nd</span></sup><span data-dcnode-id="1813" instrument_node=""> Temple</span></b></span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1806" style="font-size:12.0pt"><b data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></b></span><span data-dcnode-id="1799" style="font-size:12.0pt"><span data-dcnode-id="1805" instrument_node="">“</span><i data-dcnode-id="1800"><span data-dcnode-id="1804" instrument_node="">Know therefore and understand, that form the going

</span><p data-dcnode-id="1792"><span data-dcnode-id="1793" style="font-size:12.0pt"><span data-dcnode-id="1794" instrument_node="">Amongst the many things prophesied in these verses are
    the following:</span></span></p><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1788"><span data-dcnode-id="1789" style="font-size:12.0pt"><span data-dcnode-id="1790" instrument_node="">Street and wall built again, even in troublous times
    c.460 BC</span></span></p><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1785" style="font-size:12.0pt"><span data-dcnode-id="1786" instrument_node="">Destruction of the city and Sanctuary&nbsp; 70 AD</span></span></p><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1781" style="font-size:12.0pt"><span data-dcnode-id="1782" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; While
    a late date would explain the author’s knowledge of&nbsp; the building again of the street and wall, which occurred
    under Nehemiah it does not explain the destruction of the city and the
    Sanctuary which only happened under Titus.&nbsp; No event happened under the Greeks which could fulfill this
    prophecy.&nbsp; It is true that
    Antiochus Epiphenes defiled the temple, but he never destroyed it and certainly
    never destroyed the city.&nbsp; The
    destruction of the city and temple did occur in 70 AD and was so absolute that
    not even one stone of the temple buildings was left standing on top of another.&nbsp; Were it not for the Dead Sea scrolls,
    some modern scholar would probably say that this part of Daniel was written
    after 70 AD!&nbsp; Jesus too prophesied
    its destruction with reference to this passage from the book of Daniel.
    (Matthew 24:1-2,15&nbsp; Mark
    13:1-2,14)&nbsp; </span></span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" style="font-size:12.0pt"><b data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Babylonian names found in Daniel</span></b></span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1772" style="font-size:12.0pt"><span data-dcnode-id="1773" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    author of the book records four very authentic Babylonian sounding names for
    Daniel and his companions in 1:7.&nbsp;&nbsp; It is doubtful that he could have invented these names if he was writing
    over 360 years after the fall of Babylon and 160+ years after Alexander the
    Great and Hellenism came to the Middle East.&nbsp; The explaining of the names in chapter 1 (in the Hebrew
    section) allows the reader to make sense of the record of the companions in the
    Aramaic section at 2:17 (the Hebrew names are used) and 2:49ff (the Babylonian
    names are used).&nbsp; </span></span></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" style="font-size:12.0pt"><span data-dcnode-id="1769" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Even
    more significant is the use of “Ashpenaz” (1:3) which is an Old Persian name or
    title that was completely unknown in the Greek period. (see Persian Loan Words
    above) The occurrence of this word alone is strong evidence against any date in
    the Hellenistic period.</span></span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1763" style="font-size:14.0pt"><b data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">External Evidence</span></b></span></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" style="font-size:12.0pt"><b data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Bel and the Dragon</span></b></span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1753"><span data-dcnode-id="1754" style="font-size:12.0pt"><span data-dcnode-id="1755" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    History of the Destruction of Bel and the Dragon, cut off from the end of
    Daniel:&nbsp; </span></span></p><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1748" style="font-size:12.0pt"><span data-dcnode-id="1751" instrument_node="">1:1-3</span><i data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">&nbsp; And king Astyages was gathered to his fathers, and Cyrus of Persia
    received his kingdom.&nbsp; And Daniel
    conversed with the king, and was honored above all his friends.&nbsp; Now the Babylonians had an idol, called
    Bel, and there were spent upon him every day twelve great measures of fine
    flour, and forty sheep, and six vessels of wine...</span></i></span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1743" style="font-size:12.0pt"><i data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></i></span><span data-dcnode-id="1739" style="font-size:12.0pt"><span data-dcnode-id="1742" instrument_node="">The story goes on to provide a variant account of
    Daniel in the lions Den</span><i data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node=""> </span></i></span></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" style="font-size:12.0pt"><span data-dcnode-id="1736" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Firstly
    this story provides evidence in 1:1 of Darius the Mede being identified with
    king Astyages who is recorded in the first line as reigning before Cyrus.&nbsp; “his kingdom” refers here not simply to
    the Median kingdom but to the Babylonian, for Daniel is seen as being there in
    addition to the testimony of the book itself.&nbsp; Thus we know that it is not referring to Cyrus’ victory over
    the Medes.</span></span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1730"><span data-dcnode-id="1731" style="font-size:12.0pt"><span data-dcnode-id="1732" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Secondly
    this story places the man Daniel in Babylon/Persia in agreement with the book
    of Daniel.&nbsp; In other words the
    writer considered Daniel to be a historical figure.&nbsp; In addition the writer seems to have heard of an oral
    tradition regarding Daniel and the lion’s den, yet was apparently unaware of
    the written record we posses.&nbsp; The
    reason for this may be that the writer of Bel and the Dragon was a Greek
    speaker and as of yet the book of Daniel was not widespread in Greek, he was
    therefore relying on what he had heard orally through translation.&nbsp; </span></span></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1727" style="font-size:12.0pt"><span data-dcnode-id="1728" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Thirdly
    it is evident that a significant amount of time had passed between the actual
    event of Daniel and the lion’s den and the writing of Bel and the Dragon.&nbsp; For it is evident that the two records
    regard the same event, yet several details had been changed, including in whose
    reign the events occurred, how many days Daniel was in the lions den, and the
