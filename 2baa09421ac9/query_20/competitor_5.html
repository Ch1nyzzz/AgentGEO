    intern that would hand over the kingdom upon Nebuchadnezzar’s return?</span></span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1057" style="page-break-after:
avoid;"><span data-dcnode-id="1060" style="font-size:12.0pt"><span data-dcnode-id="1063" instrument_node="">3.</span><span data-dcnode-id="1061" style="font:7.0pt &quot;Times New Roman&quot;"><span data-dcnode-id="1062" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span><span data-dcnode-id="1058" style="font-size:12.0pt"><span data-dcnode-id="1059" instrument_node="">Do the records of
    Nebuchadnezzar’s reign thus far discovered indicate or allow for a long period
    of his absence?</span></span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1053" style="page-break-after:avoid;"><span data-dcnode-id="1054" style="font-size:12.0pt"><span data-dcnode-id="1055" instrument_node="">The book of Daniel paints this event as being towards
    the middle or later part of his reign as it is placed last in the book itself
    concerning the events of Nebuchadnezzar.&nbsp; Nebuchadnezzar is seen as well established in his kingdom (4:22) and
    relaxing in his palace (4:4) and another year (4:26) passes before his exile
    comes to pass.</span></span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1049" style="page-break-after:avoid;"><span data-dcnode-id="1050" style="font-size:12.0pt"><span data-dcnode-id="1051" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Harrison
    claims that the scarcity of inscriptions from Nebuchadnezzar’s later years
    combined with the following inscription from Babylonia which was recovered by
    Sir Henry Rawlinson, provide a period in Nebuchadnezzar’s later days when the
    events of Daniel 4 may have happened.</span></span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1034" style="page-break-after:avoid;"><span data-dcnode-id="1045" style="font-size:12.0pt"><i data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; For
    four years the seat of my kingdom in my city…did not rejoice my heart.&nbsp; In all my dominions I did not build a
    high place of power, the precious treasures of my kingdom I did not lay
    out.&nbsp; In the worship of Merodach my
    lord, the joy of my heart in Babylon, the city of my sovereignty, I did not
    sing his praises and I did not furnish his altars, nor did I clear out the canals.”&nbsp; </span></i></span><span data-dcnode-id="1041" style="font-size:12.0pt"><span data-dcnode-id="1044" instrument_node="">(Harrison
    p1115, Cf. H. Rawlinson, </span><i data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Historical Evidences of the Truth of the Scriptural
    Records</span></i></span><span data-dcnode-id="1037" style="font-size:12.0pt"><span data-dcnode-id="1040" instrument_node=""> 1859, pp. 185, 440 n. 29;
    R.K. Harrison, </span><i data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">IDB</span></i></span><span data-dcnode-id="1035" style="font-size:12.0pt"><span data-dcnode-id="1036" instrument_node="">, I, p. 851)</span></span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1018" style="page-break-after:avoid;"><span data-dcnode-id="1029" style="font-size:12.0pt"><span data-dcnode-id="1032" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; As
    far as the type of madness, Harrison records personally witnessing a man in a
    British mental institution in 1946 with the rare form of </span><i data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">monomania</span></i></span><span data-dcnode-id="1025" style="font-size:12.0pt"><span data-dcnode-id="1028" instrument_node=""> called </span><i data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">boanthropy. </span></i></span><span data-dcnode-id="1021" style="font-size:12.0pt"><span data-dcnode-id="1024" instrument_node="">(Harrison, pp1115-1117)</span><i data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node=""> </span></i></span><span data-dcnode-id="1019" style="font-size:12.0pt"><span data-dcnode-id="1020" instrument_node="">This is apparently the same affliction that
    Nebuchadnezzar had.&nbsp; It is very
    rare but is known to occur.&nbsp; Supposedly Eusebius also recorded Nebuchadnezzar’s being possessed
    towards the end of his reign and Josephus in Against Apion I,20 records Berosus
    account of Nebuchadnezzar’s becoming ill.</span></span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" style="font-size:12.0pt"><span data-dcnode-id="1016" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    book of Daniel makes no mention of Nabonidus and some think that Nabonidus is
    the same person that Daniel chapter 4 calls Nebuchadnezzar.&nbsp; This idea is largely based on an
    Aramaic text called The Prayer of Nabonidus which comes from the famous Dead
    Sea scrolls: four scraps of parchment from Cave 4, usually called 4Q242, copied
    from an older original in the second half of the first century BC. The story is
    similar in that Nabonidus suffered from an affliction that drove him out of
    society for seven years. It also shows some sort of interaction with a Jewish
    exile. </span></span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" style="font-size:12.0pt"><span data-dcnode-id="1012" instrument_node="">Prayer of Nabonidus:</span></span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1003" style="font-size:12.0pt"><span data-dcnode-id="1008" instrument_node="">&nbsp;</span><i data-dcnode-id="1004"><span data-dcnode-id="1007" instrument_node="">Words
    of the prayer, said by Nabonidus, king of Babylonia, the great king, when afflicted
    with an ulcer on command of the most high God in Temâ: </span><br data-dcnode-id="1006"><span data-dcnode-id="1005" instrument_node="">
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 'I,
    Nabonidus, was afflicted with an evil ulcer for seven years, and far from men
    was driven, until I prayed to the most high God. And an exorcist pardoned my
    sins. He was a Jew from among the children of the exile of Judah, and said:
    "Recount this in writing to glorify and exalt the name of the most high
    God." Then I wrote this: "When I was afflicted for seven years by the
    most high God with an evil ulcer during my stay at Temâ, I prayed to the gods
    of silver and gold, bronze and iron, wood, stone and lime, because I thought
    and considered them gods..."' [the end is missing]</span></i></span><span data-dcnode-id="1001" style="font-size:12.0pt"><span data-dcnode-id="1002" instrument_node=""> </span></span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" style="font-size:12.0pt"><span data-dcnode-id="998" instrument_node="">(from an article by Jona Lendering © </span><i data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">http://www.livius.org/ct-cz/cyrus_I/babylon04.html#Prayer%20of%20Nabonidus)</span></i></span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" style="font-size:12.0pt"><span data-dcnode-id="992" instrument_node="">Note that Daniel is not mentioned by name and several
    details differ, therefore we can only speculate that this story is relating the
    same event recorded in the book of Daniel.&nbsp; It is entirely possible that this is a completely different
    story from that of Nebuchadnezzar.&nbsp; What it does show is a “Jew from among the children of the exile of
    Judah” interacting in spiritual matters with the king of Babylon.&nbsp; Thus providing validity to a historical
    character like Daniel.</span></span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" style="font-size:12.0pt"><b data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Belshazzar</span></b></span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" style="font-size:12.0pt"><span data-dcnode-id="983" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; In
    Daniel 5:28 Belshazzar’s kingdom is prophesied as being given to the Medes and
    Persians. Thus the book establishes him as the last king in Babylon. </span></span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" style="font-size:12.0pt"><span data-dcnode-id="979" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Possibilities
    for his identification have been proposed.&nbsp; The Book of Daniel paints him as the son of Nebuchadnezzar
    5:2, 13, 18, 5:22, 5:11, etc.&nbsp; It
    was once claimed he never existed but his name has been discovered on the
    Nabonidus Cylinder were he appears as Nabonidus’ son. (Montgomery, pp
    66-67).&nbsp; It seems he may have been
    coregent with his father who was of on various military campaigns and away at
    Teima for several years.&nbsp; At Qumran
    The Prayer of Nabonidus 4QPrNab (4Q242) (75-50 BC) Confirms that Nabonidus was
    away at Teima. </span></span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="973" style="font-size:12.0pt"><i data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; In
    the verse account of Nabonidus, it is said that Nabonidus "entrusted the
    'camp' to his eldest son ['Belshazzar] ...entrusted the kingship to him (Hasel,
    pg. 155) and himself ...he turned towards Tema in the West." This is
    fairly strong evidence that Belshazzar was indeed the coregent of Babylon in
    his father's absence, and was there when Babylon fell in 539 BC The mystery
    here, if one accepts the second century date of writing, is how the author knew
    of Nabonidus' leaving Belshazzar in charge, when all knowledge of Belshazzar
    was lost by at least 450 BC (Archer, pg. 289), until the discovery of the
    Nabonidus Chronicle. The only conclusion that one can reach, other than some
    other information which has been lost to us today, is that the author was
    indeed alive during the events, in 539 BC. </span></i></span><span data-dcnode-id="971" style="font-size:
12.0pt"><span data-dcnode-id="972" instrument_node="">(Waltke, pg. 328 inTownsley). </span></span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" style="font-size:12.0pt"><span data-dcnode-id="968" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; As
    far as his being Nebuchadnezzar’s son, the usage of the word son in the Hebrew
    language allows for this being interpreted as one of Nebuchadnezzar’s more
    distant descendants.&nbsp; There is also
    the indication of possibility that Nabonidus married one of his
    Nebuchadnezzar’s former wives or perhaps one of his daughters in his attempt to
    seize greater control of the throne.&nbsp; This sort of thing was common among usurpers&nbsp; (Absalom took David’s concubines) and this could be the
    Queen mother referred to in Daniel 5:10 thus he was Nebuchadnezzar’s grandson
    by her.</span></span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="961" style="font-size:12.0pt"><span data-dcnode-id="964" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Also
    Jeremiah 27:7 says “</span><i data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">So all nations shall serve him </span></i></span><span data-dcnode-id="957" style="font-size:12.0pt"><span data-dcnode-id="960" instrument_node="">(Nebuchadnezzar) </span><i data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">and his son and his son’s son,
    until the time of his land comes; and then many nations and great kings shall
    make him serve them</span></i></span><span data-dcnode-id="955" style="font-size:12.0pt"><span data-dcnode-id="956" instrument_node="">.”</span></span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="949" style="font-size:12.0pt"><span data-dcnode-id="952" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    account of the feast Belshazzar made matches that of&nbsp; historical accounts of what was happening when&nbsp; Babylon was captured by the
    Medo-Persian army.&nbsp; “</span><i data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">as they
    engaged in a festival, dancing and reveling until they learned of the capture
    but too surely</span></i></span><span data-dcnode-id="947" style="font-size:12.0pt"><span data-dcnode-id="948" instrument_node="">” (Montgomery, p 68
    also see Herodotus I, 191)</span></span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="941" style="font-size:12.0pt"><span data-dcnode-id="944" instrument_node="">“</span><i data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">he (Cyrus) heard that there was a festival in
    Babylon, in which all the Babylonians drank and reveled the whole night” </span></i></span><span data-dcnode-id="939" style="font-size:12.0pt"><span data-dcnode-id="940" instrument_node="">(Montgomery, p 68 also see Xenophon’s Cyropaedia VII,
    5)&nbsp; Josephus gives a similar
    account.</span></span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" style="font-size:12.0pt"><span data-dcnode-id="936" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Notice
    that Daniel (and Baruch 1:1 which is based on Daniel) was the only historical
    record of Belshazzar before the fairly recent discovery of Babylonian records
    containing his name as the son of Nabonidus.&nbsp; How could the author of Daniel have such knowledge that was
    completely lost to the rest of the world since the time of the Persian kingdom
    unless he was actually there at that time.&nbsp; This weighs against a late date for the book.</span></span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" style="font-size:12.0pt"><b data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Darius the Mede</span></b></span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="924" style="font-size:12.0pt"><span data-dcnode-id="927" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 5:28
    “…</span><i data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">your kingdom is divided and given to the Medes and Persians</span></i></span><span data-dcnode-id="922" style="font-size:12.0pt"><span data-dcnode-id="923" instrument_node="">”&nbsp; this is
    consistent with the reign of Darius the Mede as that of co regnant with Cyrus
    and this shows the Median / Persian kingdom was considered one kingdom, just as
    it is today (see also 6:8, 12, 15).&nbsp; </span></span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="917" style="font-size:12.0pt"><i data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “That
    very night Belshazzar, king of the Chaldeans, was slain.&nbsp; And Darius the Mede received the
    kingdom, being about 62 years old.&nbsp; It pleased Darius to set over the kingdom 120 satraps, to be over the
    whole kingdom; and over these, 3 governors, of whom Daniel was one…” </span></i></span><span data-dcnode-id="915" style="font-size:12.0pt"><span data-dcnode-id="916" instrument_node="">(Daniel 5:30ff).</span></span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="909" style="font-size:12.0pt"><span data-dcnode-id="912" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span><i data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">“In
    the first year of Darius the son of Ahasuerus, of the lineage of the Medes, who
    was made king over the realm of the Chaldeans - in the first year of his reign
    I, Daniel, understood by the books the number of the years specified by the
    word of the LORD through Jeremiah the prophet, that He would accomplish 70
    years in the desolations of Jerusalem.” </span></i></span><span data-dcnode-id="907" style="font-size:12.0pt"><span data-dcnode-id="908" instrument_node="">(Daniel
    9:1ff, also see Jeremiah 29:10 concerning the 70 years). </span></span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="902" style="font-size:12.0pt"><i data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “Also
    in the first year of Darius the Mede…” (</span></i></span><span data-dcnode-id="900" style="font-size:12.0pt"><span data-dcnode-id="901" instrument_node="">Daniel
    11:1)</span></span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" style="font-size:12.0pt"><span data-dcnode-id="897" instrument_node="">Darius is described as:</span></span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" style="font-size:12.0pt"><span data-dcnode-id="893" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 62
    years old approx. (5:31)</span></span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" style="font-size:12.0pt"><span data-dcnode-id="889" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; son
    of Ahasuerus (9:1)</span></span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" style="font-size:12.0pt"><span data-dcnode-id="885" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; a
    Mede (5:31, 9:1 -&nbsp; in both the
    Aramaic and Hebrew sections)</span></span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" style="font-size:12.0pt"><span data-dcnode-id="881" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; king
    of the Chaldeans (9:1)</span></span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" style="font-size:12.0pt"><span data-dcnode-id="877" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; as
    having received the kingdom (5:31) - hence someone must have given it.</span></span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" style="font-size:12.0pt"><span data-dcnode-id="873" instrument_node="">Apparently Darius the Mede was set up as king by
    Cyrus, who went out to continue his conquests.&nbsp; Note that he is called king over the realm of the Chaldeans,
    rather than king over Babylon.&nbsp; Belshazzar is similarly called in 5:30.&nbsp; Hence we have Darius replacing Belshazzar in his position as
    king.&nbsp; As noted above Belshazzar
    was a type of coregent with his father Nabonidus who was out of the city at the
    time of the capture and later lost to Cyrus in battle.&nbsp; Perhaps a similar relationship existed
    between Cyrus and Darius.&nbsp; So then
    while Cyrus was busy fighting Nabonidus after the fall of the city of Babylon
    to the Medo-Persian Empire, he placed Darius on the throne.</span></span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" style="font-size:12.0pt"><span data-dcnode-id="869" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Darius
    the Mede may be Astyages the Median king who was conquered by Cyrus or his son
    (Josephus calls Darius the son of Astyages - Ant. 10.11.4.248).&nbsp; According to Xenophon’s Cyropaedia I,
    2, 1&nbsp; Cyrus married his daughter
    and in the same text we also see Cyrus marrying the daughter of Cyaxares (II),
    who is also suggested to be Darius (VIII, 5, 8) (1, p 63).&nbsp; I do not know if these two could
    actually be the same or not.&nbsp; The
    Apocryphal book of Bel and the Dragon mentions Astyages as reigning before
    Cyrus (1:1).&nbsp; Also we have a
    reference to Gobryus, who is Cyrus’ governor as having “placed governors in
    charge of Babylon” (Montgomery, p68).&nbsp; This would fit well with Darius’ placing 120 satraps over the kingdom
    with 3 over them.&nbsp; </span></span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" style="font-size:12.0pt"><span data-dcnode-id="865" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Bel
    and the Dragon (from a text dated 50-75 BC at Qumran) provides evidence of
    Darius the Mede being identified with king Astyages:</span></span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" style="font-size:12.0pt"><i data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">The History of the Destruction of Bel and the
    Dragon, Cut off from the end of Daniel. </span></i></span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="853" style="color:blue"><i data-dcnode-id="854"><sup data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">1:1</span></sup></i></span><span data-dcnode-id="850" style="font-size:12.0pt"><i data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">And
    king Astyages was gathered to his fathers, and Cyrus of Persia received his
    kingdom. </span></i></span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="844" style="color:blue"><i data-dcnode-id="845"><sup data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">1:2</span></sup></i></span><span data-dcnode-id="841" style="font-size:12.0pt"><i data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">And
    Daniel conversed with the king, and was honored above all his friends. </span></i></span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="835" style="color:blue"><i data-dcnode-id="836"><sup data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">1:3</span></sup></i></span><span data-dcnode-id="832" style="font-size:12.0pt"><i data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Now
    the Babylonians had an idol, called Bel, and there were spent upon him every
    day twelve great measures of fine flour, and forty sheep, and six vessels of
    wine. </span></i></span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" style="font-size:12.0pt"><span data-dcnode-id="829" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; At
    any rate Darius seems to be placed on the throne by Cyrus, while Cyrus
    continues his military campaigns, and indeed such situations were very common
    in antiquity.&nbsp; </span></span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" style="font-size:12.0pt"><span data-dcnode-id="825" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Daniel
    never calls Darius the king of the Medes or Persians, he only calls him the
    king of Chaldeans.&nbsp; Some try to say
    that Darius the Mede is Darius I of Persia, and that the author of Daniel got
    his facts confused.&nbsp; However it is
    plain from the text that this is not the right identification as he is clearly
    called Darius the Mede, as opposed to being a Persian.&nbsp; In addition he is said to be 62 years
    old in his first year which does not fit Darius the Persian.&nbsp; He is also said to reign before the 70
    years of exile were ended.&nbsp; One
    cannot say that the writer of Daniel was a master forger from the 2</span><sup data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">nd</span></sup><span data-dcnode-id="822" instrument_node=""> century such that he new ancient languages and syntax, as well as customs,
    terms, culture and history from Babylon and Persia and at the same time say that
    he would make such a horrible blunder as to think Darius the I reigned before
    Cyrus.&nbsp; From the book of
    Ezra/Nehemiah alone he would have known better.</span></span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="815" style="font-size:12.0pt"><span data-dcnode-id="818" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Daniel
    6:28 </span><i data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">“So this Daniel prospered in the reign of Darius and in the reign of
    Cyrus the Persian”&nbsp; </span></i></span><span data-dcnode-id="813" style="font-size:12.0pt"><span data-dcnode-id="814" instrument_node="">This shows that Cyrus followed Darius.</span></span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" style="font-size:12.0pt"><span data-dcnode-id="810" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Both
    Jeremiah and Isaiah make call the Medes the conquerors of the Babylonians:</span></span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="797" style="font-size:12.0pt"><span data-dcnode-id="806" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Isaiah
    21:2ff&nbsp;&nbsp;&nbsp;&nbsp; “…</span><i data-dcnode-id="798"><span data-dcnode-id="805" instrument_node="">Go
    up, O </span><u data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Elam</span></u><span data-dcnode-id="802" instrument_node="">: besiege, O </span><u data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Media</span></u><span data-dcnode-id="799" instrument_node="">; all the sighing thereof have I made
    to cease. Therefore are my loins filled with pain: pangs have taken hold upon
    me, as the pangs of a woman that travaileth: I was bowed down at the hearing of
    it; I was dismayed at the seeing of it…And he answered and said, Babylon is
    fallen, is fallen; and all the graven images of her gods he hath broken unto
    the ground.”</span></i></span><span data-dcnode-id="795" style="font-size:12.0pt"><span data-dcnode-id="796" instrument_node=""> (KJV)</span></span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="786" style="font-size:12.0pt"><span data-dcnode-id="792" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Isaiah13:17-20
    “</span><i data-dcnode-id="787"><span data-dcnode-id="791" instrument_node="">Behold, I will stir up the </span><u data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Medes</span></u><span data-dcnode-id="788" instrument_node=""> against them, which shall not
    regard silver; and as for gold, they shall not delight in it. Their bows also
    shall dash the young men to pieces; and they shall have no pity on the fruit of
    the womb; their eyes shall not spare children.&nbsp; And Babylon, the glory of kingdoms, the beauty of the
    Chaldees’ excellency, shall be as when God overthrew Sodom and Gomorrah.&nbsp; It shall never be inhabited, neither
    shall it be dwelt in from generation to generation: neither shall the Arabian
    pitch tent there; neither shall the shepherds make their fold there.” </span></i></span><span data-dcnode-id="784" style="font-size:12.0pt"><span data-dcnode-id="785" instrument_node="">(KJV)</span></span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="779" style="font-size:12.0pt"><i data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></i></span><span data-dcnode-id="772" style="font-size:12.0pt"><span data-dcnode-id="778" instrument_node="">Jeremiah 51:11-12 </span><i data-dcnode-id="773"><span data-dcnode-id="777" instrument_node="">Make bright the arrows; gather
    the shields: the LORD hath raised up the spirit of the kings of the </span><u data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Medes</span></u><span data-dcnode-id="774" instrument_node="">:
    for his device is against Babylon, to destroy it; because it is the vengeance
    of the LORD, the vengeance of his temple.&nbsp; Set up the standard upon the walls of Babylon, make the watch strong,
    set up the watchmen, prepare the ambushes: for the LORD hath both devised and
    done that which he spake against the inhabitants of Babylon.</span></i></span><span data-dcnode-id="770" style="font-size:12.0pt"><span data-dcnode-id="771" instrument_node=""> (KJV)</span></span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="761" style="font-size:12.0pt"><span data-dcnode-id="767" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Jeremiah
    51:27-29 </span><i data-dcnode-id="762"><span data-dcnode-id="766" instrument_node="">Set ye up a standard in the land, blow the trumpet among the
    nations, prepare the nations against her, call together against her the
    kingdoms of Ararat, Minni, and Ashchenaz; appoint a captain against her; cause
    the horses to come up as the rough caterpillers.&nbsp; Prepare against her the nations with the kings of the </span><u data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Medes</span></u><span data-dcnode-id="763" instrument_node="">,
    the captains thereof, and all the rulers thereof, and all the land of his
    dominion.&nbsp; And the land shall
    tremble and sorrow: for every purpose of the LORD shall be performed against
    Babylon, to make the land of Babylon a desolation without an inhabitant.</span></i></span><span data-dcnode-id="759" style="font-size:12.0pt"><span data-dcnode-id="760" instrument_node=""> (KJV)</span></span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" style="font-size:12.0pt"><span data-dcnode-id="756" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Josephus
    clearly considered Darius the Mede to be a historical character and makes much
    mention of him in Antiquities Book 10 Chapter 11.</span></span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" style="font-size:12.0pt"><span data-dcnode-id="752" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; There
    is&nbsp; reason&nbsp; to believe that Cyrus set up Darius on
    the throne in Babylon, while he continued his conquests.&nbsp; The name Darius is actually a title and
    means “restrainer”.&nbsp; The lack of an
    external text from the time period that clearly mentions Darius the Mede, only
    indicates that we haven’t discovered one yet, it does not indicate that Darius
    didn’t exist.&nbsp; </span></span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" style="font-size:12.0pt"><span data-dcnode-id="748" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    fact that Daniel mentions Darius’s age as being 62, yet never gives the ages of
    anyone else in the book including himself is interesting.&nbsp; This is information that only a writer
    in the early Persian period could have.&nbsp; There is no motivation for a writer in the Maccabean period to include
    Darius’s age, especially since no other ages are given.&nbsp; Darius’s old age would explain his
    relatively short reign of perhaps 5 years as coregent with Cyrus from 539-534
    BC.&nbsp; It would also be a proper age
    for him to be Cyrus’s father in law.</span></span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" style="font-size:12.0pt"><b data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Persian kings</span></b></span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="736" style="font-size:12.0pt"><span data-dcnode-id="739" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span><i data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">“Also
    in the first year of Darius the Mede, I, even I, stood up to confirm and
    strengthen him.)&nbsp; And now I will
    tell you the truth:&nbsp; Behold, three
    more kings will arise in Persia, and the fourth shall be far richer than them
    all; by his strength, through his riches, he shall stir up all against the
    realm of Greece.&nbsp; Then a mighty
    king shall arise, who shall rule with great dominion, and do according to his
    will.&nbsp; And when he has arisen, his
    kingdom shall be broken up and divided toward the four winds of heaven, but not
    among his posterity nor according to his dominion with which he ruled; for his
    kingdom shall be uprooted, even for others besides these.”&nbsp; </span></i></span><span data-dcnode-id="734" style="font-size:12.0pt"><span data-dcnode-id="735" instrument_node="">-Daniel
    11:1-4</span></span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" style="font-size:12.0pt"><span data-dcnode-id="731" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Clearly
    a large section of the Persian period is outlined here, apparently culminating
    in the conquest by Alexander the Great.&nbsp; Alexander died at the very height of his kingdom.&nbsp; His family line was not able to retain
    the kingdom and it was divided into four parts,&nbsp; never again approaching the dominion that Alexander
    exercised.&nbsp; </span></span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" style="font-size:12.0pt"><span data-dcnode-id="727" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;Daniel received this vision in the
    “third year of Cyrus king of Persia” (Daniel 10:1).&nbsp; The mention of the first year of Darius the Mede is spoken
    of as a past event, hence we may conclude that the 4 kings are between Cyrus
    and Alexander, who are typically dated at beginning their reigns in 539 and 333
    respectively.&nbsp; This leaves about
    200 years for the Persian period, during which time Daniel seems to have only 5
    kings reigning.&nbsp; Current historical
    understanding of the period has many more kings between Cyrus and Alexander.&nbsp; Much of our understanding of the dates
    for this period comes from Claudius Ptolemaeus (commonly called Ptolemy
    c.70-161 AD) who based his famous kings list on ancient astronomical data.</span></span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="717" style="font-size:12.0pt"><span data-dcnode-id="723" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; “</span><i data-dcnode-id="718"><span data-dcnode-id="722" instrument_node="">Ptolemy...
    is our only authority for no other system bridges the gap between 747BC and
    137AD.&nbsp; His canon, or list of reigns,
    is the only thread connecting the reign of the Biblical Darius I Hystaspis with
    Daniel’s “notable” horned “he-goat” King of Greece who was to defeat the
    Medo-Persian empire. (Dan 8:5-8, 21-22; 11:2-4)...The main point of contention
    is that from the BC 491 lunar eclipse in the 31</span><sup data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">st</span></sup><span data-dcnode-id="719" instrument_node=""> year of the reign
    of Darius, no other recorded eclipse data was available for Ptolemy to verify
    his king list over most of the later Persian period” </span></i></span><span data-dcnode-id="715" style="font-size:12.0pt"><span data-dcnode-id="716" instrument_node="">(Jones p243, see Anstey, The Romance of Bible
    Chronology pp. 288-293)</span></span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" style="font-size:12.0pt"><span data-dcnode-id="712" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
    names Artaxerxes, Xerxes, Darius, Pul, and others are actually titles meaning
    king or lord, etc…&nbsp; Therefore it is
    difficult to establish who is who, as one man may have taken more than one
    title for himself and perhaps different titles at different times.</span></span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" style="font-size:12.0pt"><span data-dcnode-id="708" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Artaxerxes
    = “the great king” or “the king of kings”</span></span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" style="font-size:12.0pt"><span data-dcnode-id="704" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Arta
    = “the great” or “king of”</span></span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" style="font-size:12.0pt"><span data-dcnode-id="700" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Darius
    = “the restrainer”</span></span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" style="font-size:12.0pt"><span data-dcnode-id="696" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Xerxes
    = “shah” i.e. “king”</span></span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" style="font-size:12.0pt"><span data-dcnode-id="692" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Ahasuerus
    = “mighty king” or “High father”</span></span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" style="font-size:12.0pt"><span data-dcnode-id="688" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Cyrus
    = “kurash” in Persian.&nbsp; The Greek
    equivalent is “Kurios” = “lord”</span></span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" style="font-size:12.0pt"><span data-dcnode-id="684" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Cyrus
    even called himself Artaxerxes. </span></span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" style="font-size:12.0pt"><span data-dcnode-id="680" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;Xerxes called himself&nbsp; “son of Darius”, “Darius”, and “Xerxes
    the Arta”. </span></span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" style="font-size:12.0pt"><span data-dcnode-id="676" instrument_node="">This is not to say that our current understanding is
    faulty, but merely limited in reconciling Daniel’s prophesies with Persian
    history.&nbsp; Indeed the two agree at
    many points including attacks against the Grecian kingdom.&nbsp; The text does not say there will be
    only 5 kings in Persia.&nbsp; It does
    allow for more, but is mainly concerned with the beginning of the conflict with
    the Greeks and its ultimate culmination in the defeat of the Persian armies at
    the hand of Alexander.&nbsp; Indeed,
    between Artaxerxes and Alexander, not much happened significantly as regards
    the Jews, thus the author was not concerned with that period.</span></span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" style="font-size:12.0pt"><b data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Porphyry</span></b></span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="665" style="font-size:12.0pt"><i data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></i></span><span data-dcnode-id="661" style="font-size:12.0pt"><span data-dcnode-id="664" instrument_node="">The historian Socrates Sozomenus states</span><i data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">“…Porphyry,
    who having been beaten by some Christians at Caesarea in Palestine and not
    being able to endure [such treatment], from the working of unrestrained rage
    renounced the Christian religion: and from hatred of those who had beaten him
    he took to write blasphemous works against Christians, as Eusebius Pamphilus
    has proved who at the same time refuted his writings.” </span></i></span><span data-dcnode-id="657" style="font-size:12.0pt"><span data-dcnode-id="660" instrument_node="">(Socrates Sozomenus </span><i data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Church Histories</span></i></span><span data-dcnode-id="655" style="font-size:12.0pt"><span data-dcnode-id="656" instrument_node=""> Book 3 chapter 23 in Schaff, Volume 2 p224)</span></span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="646" style="font-size:12.0pt"><span data-dcnode-id="652" instrument_node="">&nbsp;</span><span data-dcnode-id="650" style="color:red"><span data-dcnode-id="651" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span><span data-dcnode-id="649" instrument_node="">Jerome
    states </span><i data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">“Against the prophet Daniel Porphyry wrote a twelfth volume, denying
    that that book was composed by him with whose name it is inscribed, etc. To him
    Eusebius, bishop of Caesarea, has replied very skillfully in three volumes,
    that is, in volumes XVIII., XIX., and XX. Apollinarius also in</span></i></span><i data-dcnode-id="644"><span data-dcnode-id="645" instrument_node=""> </span></i><span data-dcnode-id="641" style="font-size:12.0pt"><i data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">one large volume, that is, in the twenty-sixth
    volume, and before these, in part, Methodius.” </span></i></span><span data-dcnode-id="639" style="font-size:12.0pt"><span data-dcnode-id="640" instrument_node="">(Jerome Commentaries in Schaff, Volume 1 p114)</span></span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" style="font-size:12.0pt"><span data-dcnode-id="636" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Unfortunately
    both Porphyry’s works and those of the men who refuted him have been lost.&nbsp; All that is known of his writings about
    Daniel are excerpts quoted in some ancient Christian writings.</span></span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" style="font-size:12.0pt"><b data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Conclusion</span></b></span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="625" style="font-size:12.0pt"><b data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></b></span><span data-dcnode-id="614" style="font-size:12.0pt"><span data-dcnode-id="624" instrument_node="">The Aramaic demands and the Hebrew indicates a date
    before the 2</span><sup data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">nd</span></sup><span data-dcnode-id="621" instrument_node=""> century BC and most likely in the late 6</span><sup data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">th</span></sup><span data-dcnode-id="618" instrument_node=""> or early 5</span><sup data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">th</span></sup><span data-dcnode-id="615" instrument_node=""> century.&nbsp; The Persian and Akkadian foreign loan words point to an early date, as
    do even the Greek loan words.&nbsp; </span></span></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="609" style="font-size:12.0pt"><b data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></b></span><span data-dcnode-id="601" style="font-size:12.0pt"><span data-dcnode-id="608" instrument_node="">All the evidence I have examined either directly
    indicates, points to, or allows for the book to have been written, in its final
    form, in the reign of Cyrus the Great.&nbsp; The only thing that seems to contradict this dating is the theory that
    predictive prophecy cannot happen.&nbsp; Were it not for a pre-disposition against predictive prophecy in
    general, most scholars would be much more willing to concede to what the
    evidence clearly points to, namely a late 6</span><sup data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">th</span></sup><span data-dcnode-id="605" instrument_node=""> or early 5</span><sup data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">th</span></sup><span data-dcnode-id="602" instrument_node=""> century origin for&nbsp; the book.</span></span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" style="font-size:12.0pt"><span data-dcnode-id="598" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; To
    say that one cannot know future events before they happen, or that a spiritual
    realm does not exist, based merely on personal prejudice is simply
    unscientific.&nbsp; Science observes what
    has happened and draws a conclusion based on the information.&nbsp; It is unscientific to close ones eyes
    to certain data due to a prejudice against it.&nbsp; There has been discussed above much internal and external
    evidence that points to a 6</span><sup data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">th</span></sup><span data-dcnode-id="595" instrument_node=""> century date for the book of Daniel. </span></span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" style="font-size:12.0pt"><span data-dcnode-id="591" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; It
    should be obvious that to change a view that has been consistently held by an
    overwhelming majority of scholars, historians, religious leaders and historical
    witnesses for a period spanning over 2000 years, one must bring to light some
    very solid evidence.&nbsp;&nbsp; The
    proponents of the Maccabean date have failed to do so.</span></span></p><span data-dcnode-id="588" instrument_node="">
</span><br clear="ALL" data-dcnode-id="587" style="page-break-before:always"><span data-dcnode-id="586" instrument_node="">
