</span><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.godtube.com/bible/"><span data-dcnode-id="1259" instrument_node="">Bible</span></a><span data-dcnode-id="1257" instrument_node=""> &gt; </span><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.godtube.com/bible/daniel/"><span data-dcnode-id="1256" instrument_node="">Daniel</span></a><span data-dcnode-id="1254" instrument_node=""> &gt; </span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.godtube.com/bible/daniel/10"><span data-dcnode-id="1253" instrument_node="">Daniel 10</span></a><span data-dcnode-id="1251" instrument_node=""> &gt; </span><span data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Daniel 10:13</span></span><span data-dcnode-id="1248" instrument_node="">

</span><h2 class="section-title" data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">
Clarke's Daniel 10:13 Bible Commentary
</span></h2><span data-dcnode-id="1241" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="1233"><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1239" instrument_node="">
But the prince of the kingdom of Persia withstood me - I think it would go far to make a legend or a precarious tale of this important place to endeavor to maintain that either a good or evil Angel Is intended here. Cyrus alone was the prince of Persia, and God had destined him to be the deliverer of his people; but there were some matters, of which we are not informed, that caused him to hesitate for some time. Fearing, probably, the greatness of the work, and not being fully satisfied of his ability to execute it, he therefore for a time resisted the secret inspirations which God had sent him. The opposition might be in reference to the building of the temple.</span><br data-dcnode-id="1238"><br data-dcnode-id="1237"><span data-dcnode-id="1236" instrument_node="">But lo, Michael - Gabriel, who speaks, did not leave Cyrus till Michael came to take his place. Michael, he who is like God, sometimes appears to signify the Messiah, at other times the highest or chief archangel. Indeed there is no archangel mentioned in the whole Scripture but this one. See Jde 1:9; Revelation 12:7.
</span></p><span data-dcnode-id="1234" instrument_node="">
</span></div><span data-dcnode-id="1232" instrument_node="">
</span><h2 class="section-title" data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">
Barnes's Daniel 10:13 Bible Commentary
</span></h2><span data-dcnode-id="1229" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="1182"><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1227" instrument_node="">
But the prince of the kingdom of Persia - In explaining this very difficult verse it may be proper</span><br data-dcnode-id="1226"><br data-dcnode-id="1225"><span data-dcnode-id="1224" instrument_node="">(1) to consider the literal sense of the words;</span><br data-dcnode-id="1223"><br data-dcnode-id="1222"><span data-dcnode-id="1221" instrument_node="">(2) to deduce the fair meaning of the passage as thus explained; and</span><br data-dcnode-id="1220"><br data-dcnode-id="1219"><span data-dcnode-id="1218" instrument_node="">(3) to notice the practical truths taught.</span><br data-dcnode-id="1217"><br data-dcnode-id="1216"><span data-dcnode-id="1215" instrument_node="">The word rendered "prince" - שׂר s'ar - means, properly, a leader, commander, chief, as of troops, Genesis 21:22; of a king's body-guard, Genesis 37:36; of cup-bearers, Genesis 41:9; of a prison, Genesis 39:21-22; of a flock, Genesis 47:6. Then it means a prince, a noble, a chief in the state, Genesis 12:15. In Daniel 8:25, in the phrase "Prince of princes," it refers to God. So far as the word is concerned in the phrase "prince of the kingdom of Persia," it might refer to a prince ruling over that kingdom, or to a prime minister of the state; but the language also is such that it is applicable to an angelic being supposed to preside over a state, or to influence its counsels. If this idea is admitted; if it is believed that angels do thus preside over particular states, this language would properly express that fact. Gesenius (Lexicon) explains it in this passage as denoting the "chiefs, princes, and angels; i. e., the archangels acting as patrons and advocates of particular nations before God." That this is the proper meaning here as deduced from the words is apparent, for</span><br data-dcnode-id="1214"><br data-dcnode-id="1213"><span data-dcnode-id="1212" instrument_node="">(a) it is an angel that is speaking, and it would seem most natural to suppose that he had encountered one of his own rank;</span><br data-dcnode-id="1211"><br data-dcnode-id="1210"><span data-dcnode-id="1209" instrument_node="">(b) the mention of Michael who came to his aid - a name which, as we shall see, properly denotes an angel, leads to the same conclusion;</span><br data-dcnode-id="1208"><br data-dcnode-id="1207"><span data-dcnode-id="1206" instrument_node="">(c) it accords, also, with the prevailing belief on the subject.</span><br data-dcnode-id="1205"><br data-dcnode-id="1204"><span data-dcnode-id="1203" instrument_node="">Undoubtedly, one who takes into view all the circumstances referred to in this passage would most naturally understand this of an angelic being, having some kind of jurisdiction over the kingdom of Persia. What was the character of this "prince," however, whether he was a good or bad angel, is not intimated by the language. It is only implied that he had a chieftainship, or some species of guardian care over that kingdom - watching over its interests and directing its affairs. As he offered resistance, however, to this heavenly messenger on his way to Daniel, as it was necessary to counteract his plans, and as the aid of Michael was required to overcome his opposition, the fair construction is, that he belonged to the class of evil angels.</span><br data-dcnode-id="1202"><br data-dcnode-id="1201"><span data-dcnode-id="1200" instrument_node="">Withstood me - Hebrew, "stood over against me." Vulgate, "restitit mihi." The fair meaning is, that he resisted or opposed him; that he stood over against him, and delayed him on his way to Daniel. In what manner he did this is not stated. The most obvious interpretation is, that, in order to answer the prayers of Daniel in respect to his people, it was necessary that some arrangement should be made in reference to the kingdom of Persia - influencing the government to be favorable to the restoration of the Jews to their own land; or removing some obstacles to such return - obstacles which had given Daniel such disquietude, and which had been thrown in his way by the presiding angel of that kingdom.</span><br data-dcnode-id="1199"><br data-dcnode-id="1198"><span data-dcnode-id="1197" instrument_node="">One and twenty days - During the whole time in which Daniel was engaged in fasting and prayer Daniel 10:2-3. The angel had been sent forth to make arrangements to secure the answer to his prayer when he began to pray, but had been delayed during all that time by the opposition which he had met with in Persia. That is, it required all that time to overcome the obstacles existing there to the accomplishment of these purposes, and to make those arrangements which were necessary to secure the result. Mean-time, Daniel, not knowing that these arrangements were in a process of completion, or that an angel was employed to secure the answer to his prayers, yet strong in faith, was suffered to continue his supplications with no intimation that his prayers were heard, or that he would be answered. How many arrangements may there be in progress designed to answer our prayers of which we know nothing! How many agents may be employed to bring about an answer! What mighty obstacles may be in a process of removal, and what changes may be made, and what influences exerted, while we are suffered to pray, and fast, and weep, amidst many discouragements, and many trials of our faith and patience! For a much longer period than Daniel was engaged in his devotions, may we be required often now to pray before the arrangements in the course of Providence shall be so far complete that we shall receive an answer to our supplications, for the things to be done may extend far into future months or years.</span><br data-dcnode-id="1196"><br data-dcnode-id="1195"><span data-dcnode-id="1194" instrument_node="">But, lo, Michael, one of the chief princes - Margin, "the first." That is, the first in rank of the "princes," or the angels. In other words, Michael, the archangel." The proper meaning of this name (מיכאל mı̂ykâ'êl) is, "Who as God," and is a name given, undoubtedly, from some resemblance to God. The exact reason why it is given is not anywhere stated; but may it not be this - that one looking on the majesty and glory of the chief of the angels would instinctively ask, "Who, after all, is like God? Even this lofty angel, with all his glory, cannot be compared to the high and lofty One." Whatever may have been the reason of the appellation, however, the name in the Scriptures has a definite application, and is given to the chief one of the angels. Compare the notes at Jde 1:9. The word "Michael," as a proper name, occurs several times in the Scriptures, Numbers 13:13; 1 Chronicles 5:13; 1 Chronicles 6:40; 1 Chronicles 7:3; 1 Chronicles 8:16; 1 Chronicles 12:20; 1 Chronicles 27:18; 2 Chronicles 21:2; Ezra 8:8. It is used as applicable to an angel or archangel in the following places: Daniel 10:13, Daniel 10:21; Daniel 12:1; Jde 1:9; Revelation 12:7. Little more is known of him than</span><br data-dcnode-id="1193"><br data-dcnode-id="1192"><span data-dcnode-id="1191" instrument_node="">(a) that he occupied the rank which entitled him to be called an archangel; and</span><br data-dcnode-id="1190"><br data-dcnode-id="1189"><span data-dcnode-id="1188" instrument_node="">(b) that he sustained, in the time of Daniel, the relation of patron of Israel before God Daniel 10:21.</span><br data-dcnode-id="1187"><br data-dcnode-id="1186"><span data-dcnode-id="1185" instrument_node="">continued...
</span></p><span data-dcnode-id="1183" instrument_node="">
</span></div><span data-dcnode-id="1181" instrument_node="">
</span><h2 class="section-title" data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">
Wesley's Daniel 10:13 Bible Commentary
</span></h2><span data-dcnode-id="1178" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="1173"><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">
10:13 Withstood me - God suffered the wicked counsels of Cambyses to take place awhile; but Daniel by his prayers, and the angel by his power, overcame him at last: and this very thing laid a foundation of the ruin of the Persian monarchies. Michael - Michael here is commonly supposed to mean Christ. I remained - To counter - work their designs against the people of God.
</span></p><span data-dcnode-id="1174" instrument_node="">
