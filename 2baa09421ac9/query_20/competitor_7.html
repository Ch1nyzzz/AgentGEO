            <template shadowrootmode="closed"><html data-dcnode-id="1"><head data-dcnode-id="997"><meta name="robots" content="noindex, nofollow"><meta charset="utf-8"></head><body data-dcnode-id="2"><span data-dcnode-id="1011" instrument_node="">
</span><title data-dcnode-id="1009">THE BOOK OF THE PROPHET DANIEL</title><span data-dcnode-id="1008" instrument_node="">
</span><meta content="The Book of the Prophet Daniel is the major apocalyptic book of the Old Testament and contains the prophecy of the Son of Man, a Messianic figure fulfilled in Jesus Christ." data-dcnode-id="1007" name="DESCRIPTION"><span data-dcnode-id="1006" instrument_node="">
</span><meta content="Daniel, God, Lions Den, Old Testament, Bible, Scripture, Babylonian Exile, Susanna, Prophecy, Apocalypse, Tribulation, Angels, Ancient of Days, Kingdom of God, Son of Man, Messiah, Hebrew, Jesus, Aramaic, Greek, Resurrection." data-dcnode-id="1005" name="KEYWORDS"><span data-dcnode-id="1004" instrument_node="">
</span><meta charset="utf-8" data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">
</span><meta content="width=device-width, initial-scale=1.0" data-dcnode-id="1001" name="Viewport"><span data-dcnode-id="1000" instrument_node="">
</span><link data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblescripture.net/Styles.css&amp;raw" rel="stylesheet" type="text/css"><span data-dcnode-id="998" instrument_node="">
</span><span data-dcnode-id="996" instrument_node="">
</span><span data-dcnode-id="995" instrument_node="">
</span><br data-dcnode-id="994"><span data-dcnode-id="993" instrument_node="">
</span><h1 data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">THE BOOK OF THE PROPHET DANIEL</span></h1><span data-dcnode-id="990" instrument_node="">
</span><br data-dcnode-id="989"><span data-dcnode-id="988" instrument_node="">
</span><img alt="Peter Paul Rubens of Antwerp, Belgium - Daniel in the Lions' Den, National Gallery of Art, Washington, D. C., 1617." class="center" data-dcnode-id="987" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblescripture.net/Lions.jpeg&amp;raw" width="734"><span data-dcnode-id="986" instrument_node="">
</span><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="880"><i data-dcnode-id="954"><span data-dcnode-id="983" instrument_node="">
The prophet Daniel is one of four Major Prophets in Hebrew Scripture, along with </span><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblescripture.net/Isaiah.html"><b data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Isaiah</span></b></a><span data-dcnode-id="979" instrument_node="">, </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblescripture.net/Jeremiah.html"><b data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Jeremiah</span></b></a><span data-dcnode-id="975" instrument_node="">, and </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblescripture.net/Ezekiel.html"><b data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Ezekiel</span></b></a><span data-dcnode-id="971" instrument_node="">.  The Book of Daniel is followed by the Prophet </span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblescripture.net/Hosea.html"><b data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Hosea</span></b></a><span data-dcnode-id="967" instrument_node="">, the first of the Prophets in the Book of the Twelve. Daniel in the Lions' Den is a favorite Bible story for children.  In addition, the captivating prophecy, imagery, and symbolism make the Book of Daniel one of the most read of </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblescripture.net/Hebrew.html"><b data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Hebrew</span></b></a><span data-dcnode-id="963" instrument_node=""> Scripture, our  Old Testament of the </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblescripture.net/Bible.html"><b data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Bible</span></b></a><span data-dcnode-id="959" instrument_node="">. 
</span><br data-dcnode-id="958"><span data-dcnode-id="957" instrument_node="">
</span><br data-dcnode-id="956"><span data-dcnode-id="955" instrument_node="">
The Book takes its name from the hero, Daniel - </span></i><span data-dcnode-id="951" style="color:red"><b data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">דָּנִיֵּאל</span></b></span><i data-dcnode-id="926"><span data-dcnode-id="950" instrument_node=""> - a young Jewish prophet who lived in Babylon, one of the first exiles from Jerusalem during the Babylonian Captivity (Daniel 1:1-7). The prophet Ezekiel, who wrote his prophecy in Babylon about the same time, mentioned three Biblical figures in a row as men of righteousness, Noah, Daniel, and Job (Ezekiel 14:14 and 14:20).
Jesus Christ referred to Daniel the Prophet (Matthew 24:15).  
</span><br data-dcnode-id="949"><span data-dcnode-id="948" instrument_node="">
</span><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node="">
Themes in the Book of Daniel include heroism, remaining true to God in the midst of an adverse and idolatrous culture, and God's protection of his faithful ones through his </span><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maryourmother.net/Angels.html"><b data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Angels</span></b></a><span data-dcnode-id="942" instrument_node="">.  Chapters 1-6 refer to the trials of Daniel and his three young companions, Hananiah, Mishael, and Azariah, during the time of the great Kings of the East. Their names, all of which reflect the name of God, are changed to names referring to Babylonian idols.  Daniel and the three young men stay faithful to God throughout the book through Prayer (2:19-23, 3:24-25, 6:11-12, 9:3-4, 9:16-20).  Shadrach, Meshach, and Abednego are saved from the fiery furnace by "one like a Son of God" in Chapter 3.  Chapter 6 describes Daniel in the Lions' Den, where an angel saved Daniel by shutting the mouths of the lions.  Chapters 7-12 first reveal the angels Gabriel (8:16) and Michael (10:13) in the apocalyptic visions.    Daniel 12:2 is one of the rare passages in Hebrew Scripture that refers to the Resurrection of the Dead.   Chapters 13-14 relate the beautiful story of the heroine Susanna and mention the prophet Habakkuk in the vignette on Bel and the Dragon.
</span><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">
</span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node="">
</span><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jesuschristsavior.net/"><b data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Jesus Christ</span></b></a><span data-dcnode-id="934" instrument_node="">, in announcing the Kingdom of God is at hand in Mark 1:15, fulfills the prophecy in Daniel 2:44-45. He calls himself the </span><i data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Son of Man</span></i><span data-dcnode-id="931" instrument_node=""> in all four Gospels and the Book of </span><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblescripture.net/Revelation.html"><b data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Revelation</span></b></a><span data-dcnode-id="927" instrument_node=""> (1:13 and 14:14), reminding us that he fulfills the destiny of the Messianic figure in Daniel 7:13.  The striking prophecy of the Anointed One - </span></i><span data-dcnode-id="923" style="color:red"><b data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">מָשִׁיחַ</span></b></span><i data-dcnode-id="881"><span data-dcnode-id="922" instrument_node=""> - in Daniel 9:24-26 is accomplished in Jesus the Christ (</span><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblescripture.net/Matthew.html"><b data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Matthew</span></b></a><span data-dcnode-id="918" instrument_node=""> 1:16, 16:16) or Messiah (</span><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblescripture.net/John.html"><b data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">John</span></b></a><span data-dcnode-id="914" instrument_node=""> 1:41, 4:25).  
</span><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">
</span><br data-dcnode-id="911"><span data-dcnode-id="910" instrument_node="">
The Book of Daniel serves as the major apocalyptic Book of the Old Testament, as Chapters 7-12 foretell the End Times.  The prophecy of Daniel 12:1 speaks of a time of great "distress" unsurpassed in history, when Michael will arise.  This period is called the Great Tribulation by Jesus in Matthew 24:21 and is further referenced in Revelation 7:14.  The great nations of the world have risen against the Lord; but God will protect His people and His Kingdom shall prevail and last forever.  
</span><br data-dcnode-id="909"><span data-dcnode-id="908" instrument_node="">
</span><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">
The textual problems encountered in the Book of Daniel in a sense are representative of the entire Old Testament.  The traditional view that the Book was written by Daniel in the sixth century BC has been questioned, the book is written in three different languages, and the actual text varies with each of our four extant versions: the Greek Septuagint assembled in Alexandria, the Dead Sea Scrolls uncovered in Qumran, the Masoretic text, and the Syriac Aramaic Peshitta Bible of the Middle East!  For example, the Book of Daniel is placed with the Prophets in the Dead Sea Scrolls, but is found in the Writings in the Masoretic Hebrew texts.
</span><br data-dcnode-id="905"><span data-dcnode-id="904" instrument_node="">
</span><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">
Chapters 1 to 2:3 and Chapters 8 through 12 were written in Hebrew; Chapters 2:4 through 7:28 - nearly half of the Book of Daniel - were written in Aramaic; and three passages were written in Greek. 
</span><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">
</span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">
The first complete version of Hebrew Scripture was  composed in the third century BC in Alexandria and was actually written in Greek, known as the Septuagint.  The Hebrew canon for Judaism developed through the ages and recognized 10 books less than the Greek Septuagint. The Masoretic Text developed from the eighth through tenth century AD reflected the traditional Hebrew canon.  See the </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblescripture.net/Canon.html"><b data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Canon</span></b></a><span data-dcnode-id="894" instrument_node=""> for a more complete discussion.
</span><br data-dcnode-id="893"><span data-dcnode-id="892" instrument_node="">
</span><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">
Even though nearly half of Daniel was composed in Aramaic, the Hebrew Canon for Judaism retained all of the book except the Greek text:  the Song of the Three Young Men (3:24-90) and the Appendix - Chapter 13, which contained the beautiful story of Susanna, as well as Chapter 14 on Bel, the Dragon, and the Rescue of Daniel.  
</span><br data-dcnode-id="889"><span data-dcnode-id="888" instrument_node="">
</span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">
The time of composition has become a matter of interest.  The informed description of historical events in Chapters 1 to 6 and the use of the first person in the apocalyptic visions of Chapters 7 to 12 suggest that Daniel likely originated the book during his lifetime.  This traditional view is also supported by classical historians such as Flavius Josephus and Church Fathers such as St. Jerome, the Father of Biblical Scholars.  The presence of the Book of Daniel in the Dead Sea Scrolls indicates the book was written before 200 BC.  Whereas modern historical-critical methods propose the book may have been written in the mid-second century BC, the inclusion of the book in the Hebrew Canon for Judaism advises that Hebrew tradition placed the Book as written before 400 BC!
</span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">
</span><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">
The Hebrew and Aramaic texts are in blue, the Greek scripture is in navy.  The following Scripture is from the Douay-Rheims Bible now in the public domain and the New American Bible.  The Douay-Rheims Bible was the standard English Bible for Catholics for over 300 years, and still remains in use today.  The Douay-Rheims Bible was the first approved English translation of St. Jerome's Latin Vulgate Bible. The Old Testament translation was completed at the English College of Douai, France in 1609, and the New Testament at the English College of Rheims, France in 1582. The Douay-Rheims Bible was revised by Bishop Challoner in England from 1749 to 1752.  The Haydock Douay-Rheims Bible of 1814 was the one upon which President John F. Kennedy took the oath of office on January 20, 1961 to become the 35th President of the United States. The New American Bible is widely read among Catholics in the USA.  The Old Testament of the New American Bible is authorized by the Confraternity of Christian Doctrine of the National Conference of Catholic Bishops, Washington, D. C., Copyright 1970.  Used by Permission.  All Rights Reserved.  The Aramaic (2.4 through 7:28) and Greek texts (3:24-90 and Chapters 13-14) are from the Douay-Rheims Bible.
</span></i></p><span data-dcnode-id="879" instrument_node="">
</span><br data-dcnode-id="878"><span data-dcnode-id="877" instrument_node="">
</span><h2 data-dcnode-id="874"><span data-dcnode-id="875" style="color:blue"><span data-dcnode-id="876" instrument_node="">THE BOOK OF THE PROPHET DANIEL</span></span></h2><span data-dcnode-id="873" instrument_node="">
</span><br data-dcnode-id="872"><span data-dcnode-id="871" instrument_node="">
</span><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node="">
</span><h2 data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">DANIEL DURING THE BABYLONIAN EXILE</span></h2><span data-dcnode-id="866" instrument_node="">
</span><br data-dcnode-id="865"><span data-dcnode-id="864" instrument_node="">
</span><br data-dcnode-id="863"><span data-dcnode-id="862" instrument_node="">
</span><div class="chapter" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">
			CHAPTER 1
</span></div><span data-dcnode-id="859" instrument_node="">
</span><h3 data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Daniel and King Nebuchadnezzar</span></h3><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="855" instrument_node="">
1  In the third year of the reign of Jehoiakim, king of Judah, King Nebuchadnezzar of Babylon came and laid siege to Jerusalem.
2  The Lord handed over to him Jehoiakim, king of Judah, and some of the vessels of the temple of God, which he carried off to the land of Shinar, and placed in the temple treasury of his god.
</span><br data-dcnode-id="854"><span data-dcnode-id="853" instrument_node="">
</span><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node="">
3  The king told Ashpenaz, his chief chamberlain, to bring in some of the Israelites of royal blood and of the nobility,
4  young men without any defect, handsome, intelligent and wise, quick to learn, and prudent in judgment, such as could take their place in the king's palace; they were to be taught the language and literature of the Chaldeans;
5  after three years' training they were to enter the king's service. The king allotted them a daily portion of food and wine from the royal table.
6  Among these were men of Judah: Daniel, Hananiah, Mishael, and Azariah.
7 The chief chamberlain changed their names: Daniel to Belteshazzar, Hananiah to Shadrach, Mishael to Meshach, and Azariah to Abednego.
</span><br data-dcnode-id="850"><span data-dcnode-id="849" instrument_node="">
</span><br data-dcnode-id="848"><span data-dcnode-id="847" instrument_node="">
8  But Daniel was resolved not to defile himself with the king's food or wine; so he begged the chief chamberlain to spare him this defilement.
9  Though God had given Daniel the favor and sympathy of the chief chamberlain,
10  he nevertheless said to Daniel, "I am afraid of my lord the king; it is he who allotted your food and drink. If he sees that you look wretched by comparison with the other young men of your age, you will endanger my life with the king."
11  Then Daniel said to the steward whom the chief chamberlain had put in charge of Daniel, Hananiah, Mishael, and Azariah,
12  "Please test your servants for ten days. Give us vegetables to eat and water to drink.
13  Then see how we look in comparison with the other young men who eat from the royal table, and treat your servants according to what you see."
14  He acceded to this request, and tested them for ten days;
15  after ten days they looked healthier and better fed than any of the young men who ate from the royal table.
16  So the steward continued to take away the food and wine they were to receive, and gave them vegetables.
</span><br data-dcnode-id="846"><span data-dcnode-id="845" instrument_node="">
</span><br data-dcnode-id="844"><span data-dcnode-id="843" instrument_node=""> 
17  To these four young men God gave knowledge and proficiency in all literature and science, and to Daniel the understanding of all visions and dreams.
18  At the end of the time the king had specified for their preparation, the chief chamberlain brought them before Nebuchadnezzar.
19  When the king had spoken with all of them, none was found equal to Daniel, Hananiah, Mishael, and Azariah; and so they entered the king's service.
20  In any question of wisdom or prudence which the king put to them, he found them ten times better than all the magicians and enchanters in his kingdom.
21  Daniel remained there until the first year of King Cyrus.
</span></p><span data-dcnode-id="841" instrument_node="">
</span><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">
</span><div class="chapter" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">
			CHAPTER 2
</span></div><span data-dcnode-id="836" instrument_node="">
</span><h3 data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">The King's Dream</span></h3><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="832" instrument_node="">
1  In the second year of his reign, King Nebuchadnezzar had a dream which left his spirit no rest and robbed him of his sleep.
2  So he ordered that the magicians, enchanters, sorcerers, and Chaldeans be summoned to interpret the dream for him. When they came and presented themselves to the king,
3  he said to them, "I had a dream which will allow my spirit no rest until I know what it means."
</span><br data-dcnode-id="831"><span data-dcnode-id="830" instrument_node="">
</span><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node="">
4 And the Chaldeans answered the king in Syriac: O king, live for ever: tell to thy servants thy dream, and we will declare the interpretation thereof.
5 And the king answering said to the Chaldeans: The thing is gone out of my mind: unless you tell me the dream, and the meaning thereof, you shall be put to death, and your houses shall be confiscated.
6 But if you tell the dream, and the meaning of it, you shall receive of me rewards, and gifts, and great honour: therefore tell me the dream, and the interpretation thereof.
</span><br data-dcnode-id="827"><span data-dcnode-id="826" instrument_node="">
</span><br data-dcnode-id="825"><span data-dcnode-id="824" instrument_node="">
7 They answered again and said: Let the king tell his servants the dream, and we will declare the interpretation of it.
8 The king answered, and said: I know for certain that you seek to gain time, since you know that the thing is gone from me.
9 If therefore you tell me not the dream, there is one sentence concerning you, that you have also framed a lying interpretation, and full of deceit, to speak before me till the time pass away. Tell me therefore the dream, that I may know that you also give a true interpretation thereof.
10 Then the Chaldeans answered before the king, and said: There is no man upon earth, that can accomplish thy word, O king, neither doth any king, though great and mighty, ask such a thing of any diviner, or wise man, or Chaldean.
11 For the thing that thou askest, O king, is difficult; nor can any one be found that can shew it before the king, except the gods, whose conversation is not with men.
12 Upon hearing this, the king in fury, and in great wrath, commanded that all the wise men of Babylon should be put to death.
</span><br data-dcnode-id="823"><span data-dcnode-id="822" instrument_node="">
</span><br data-dcnode-id="821"><span data-dcnode-id="820" instrument_node="">
13 And the decree being gone forth, the wise men were slain: and Daniel and his companions were sought for, to be put to death.
14 Then Daniel inquired concerning the law and the sentence, of Arioch the general of the king's army, who was gone forth to kill the wise men of Babylon.
15 And he asked him that had received the orders of the king, why so cruel a sentence was gone forth from the face of the king. And when Arioch had told the matter to Daniel,
16 Daniel went in and desired of the king, that he would give him time to resolve the question and declare it to the king.
17 And he went into his house, and told the matter to Hananiah, and Mishael, and Azariah his companions:
18 To the end that they should ask mercy at the face of the God of heaven concerning this secret, and that Daniel and his companions might not perish with the rest of the wise men of Babylon.
</span><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node="">
</span><br data-dcnode-id="817"><span data-dcnode-id="816" instrument_node="">
19 Then was the mystery revealed to Daniel by a vision in the night: and Daniel blessed the God of heaven,
20 And speaking he said: Blessed be the name of the Lord from eternity and for evermore: for wisdom and fortitude are his.
21 And he changeth times and ages: taketh away kingdoms and establisheth them, giveth wisdom to the wise, and knowledge to them that have understanding.
22 He revealeth deep and hidden things, and knoweth what is in darkness: and light is with him.
23 To thee, O God of our fathers, I give thanks, and I praise thee: because thou hast given me wisdom and strength: and now thou hast shewn me what we desired of thee, for thou hast made known to us, the king's discourse.
</span><br data-dcnode-id="815"><span data-dcnode-id="814" instrument_node="">
</span><br data-dcnode-id="813"><span data-dcnode-id="812" instrument_node="">
24 After this Daniel went in to Arioch, to whom the king had given orders to destroy the wise men of Babylon, and he spoke thus to him: Destroy not the wise men of Babylon: bring me in before the king, and I will tell the solution to the king.
25 Then Arioch in haste brought in Daniel to the king, and said to him: I have found a man of the children of the captivity of Juda, that will resolve the question to the king.
26 The king answered, and said to Daniel, whose name was Belteshazzar: Thinkest thou indeed that thou canst tell me the dream that I saw, and the interpretation thereof?
27 And Daniel made answer before the king, and said: The secret that the king desireth to know, none of the wise men, or the philosophers, or the diviners, or the soothsayers can declare to the king.
</span><br data-dcnode-id="811"><span data-dcnode-id="810" instrument_node="">
</span><br data-dcnode-id="809"><span data-dcnode-id="808" instrument_node="">
28 But there is a God in heaven that revealeth mysteries, who hath shewn to thee, O king Nebuchadnezzar (Nabuchodonosor), what is to come to pass in the latter times. Thy dream, and the visions of thy head upon thy bed, are these:
29 Thou, O king, didst begin to think in thy bed, what should come to pass hereafter: and he that revealeth mysteries shewed thee what shall come to pass.
30 To me also this secret is revealed, not by any wisdom that I have more than all men alive: but that the interpretation might be made manifest to the king, and thou mightest know the thoughts of thy mind.
</span><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
</span><br data-dcnode-id="805"><span data-dcnode-id="804" instrument_node="">
31 Thou, O king, sawest, and behold there was as it were a great statue: this statue, which was great and high, tall of stature, stood before thee, and the look thereof was terrible.
32 The head of this statue was of fine gold, but the breast and the arms of silver, and the belly and the thighs of brass:
33 And the legs of iron, the feet part of iron and part of clay.
34 Thus thou sawest, till a stone was cut out of a mountain without hands: and it struck the statue upon the feet thereof that were of iron and of clay, and broke them in pieces.
35 Then was the iron, the clay, the brass, the silver, and the gold broken to pieces together, and became like the chaff of a summer's thrashingfloor, and they were carried away by the wind: and there was no place found for them: but the stone that struck the statue, became a great mountain, and filled the whole earth.
</span><br data-dcnode-id="803"><span data-dcnode-id="802" instrument_node="">
</span><br data-dcnode-id="801"><span data-dcnode-id="800" instrument_node="">
36 This is the dream: we will also tell the interpretation thereof before thee, O king.
37 Thou art a king of kings: and the God of heaven hath given thee a kingdom, and strength, and power, and glory:
38 And all places wherein the children of men, and the beasts of the field do dwell: he hath also given the birds of the air into thy hand, and hath put all things under thy power: thou therefore art the head of gold.
39 And after thee shall rise up another kingdom, inferior to thee, of silver: and another third kingdom of brass, which shall rule over all the world.
40 And the fourth kingdom shall be as iron. As iron breaketh into pieces, and subdueth all things, so shall that break and destroy all these.
41 Arid whereas thou sawest the feet, and the toes, part of potter's clay, and part of iron: the kingdom shall be divided, but yet it shall take its origin from the iron, according as thou sawest the iron mixed with the miry clay.
42 And as the toes of the feet were part of iron, and part of clay, the kingdom shall be partly strong, and partly broken.
43 And whereas thou sawest the iron mixed with miry clay, they shall be mingled indeed together with the seed of man, but they shall not stick fast one to another, as iron cannot be mixed with clay.
</span><br data-dcnode-id="799"><span data-dcnode-id="798" instrument_node="">
</span><br data-dcnode-id="797"><span data-dcnode-id="796" instrument_node="">
44 </span><b data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">But in the days of those kingdoms the God of heaven will set up a kingdom that shall never be destroyed,</span></b><span data-dcnode-id="793" instrument_node="">
</span><br data-dcnode-id="792"><span data-dcnode-id="791" instrument_node="">and his kingdom shall not be delivered up to another people, and it shall break in pieces, and shall consume all these kingdoms, 
and itself shall stand for ever.
45 According as thou sawest that the stone was cut out of the mountain without hands, and broke in pieces, 
the clay, and the iron, and the brass, and the silver, and the gold, the great God hath shewn the king what shall come to pass hereafter, and the dream is true, and the interpretation thereof is faithful.
</span><br data-dcnode-id="790"><span data-dcnode-id="789" instrument_node="">
</span><br data-dcnode-id="788"><span data-dcnode-id="787" instrument_node="">
46 Then king Nebuchadnezzar fell on his face, and worshipped Daniel, and commanded that they should offer in sacrifice to him victims and incense.
47 And the king spoke to Daniel, and said: Verily your God is the God of gods, and Lord of kings, and a revealer of hidden things: seeing thou couldst discover this secret.
48 Then the king advanced Daniel to a high station, and gave him many and great gifts: and he made him governor over all the provinces of Babylon, and chief of the magistrates over all the wise men of Babylon.
49 And Daniel requested of the king, and he appointed Shadrach, Meshach, and Abednago over the works of the province of Babylon: but Daniel himself was in the king's palace.
</span></p><span data-dcnode-id="785" instrument_node="">
</span><br data-dcnode-id="784"><span data-dcnode-id="783" instrument_node="">
</span><div class="chapter" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">
			CHAPTER 3
</span></div><span data-dcnode-id="780" instrument_node="">
</span><h3 data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">The Fiery Furnace</span></h3><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="776" instrument_node="">
1 King Nebuchadnezzar made a statue of gold, of sixty cubits high, and six cubits broad, and he set it up in the plain of Dura of the province of Babylon.
2 Then Nebuchadnezzar the king sent to call together the nobles, the magistrates, and the judges, the captains, the rulers, and governors, and all the chief men of the provinces, to come to the dedication of the statue which king Nebuchadnezzar had set up.
3 Then the nobles, the magistrates, and the judges, the captains, and rulers, and the great men that were placed in authority, and all the princes of the provinces, were gathered together to come to the dedication of the statue, which king Nebuchadnezzar had set up. And they stood before the statue which king Nebuchadnezzar had set up.
4 Then a herald cried with a strong voice: To you it is commanded, O nations, tribes, and languages:
5 That in the hour that you shall hear the sound of the trumpet, and of the flute, and of the harp, of the sackbut, and of the psaltery, and of the symphony, and of all kind of music; ye fall down and adore the golden statue which king Nebuchadnezzar hath set up.
6 But if any man shall not fall down and adore, he shall the same hour be cast into a furnace of burning fire.
</span><br data-dcnode-id="775"><span data-dcnode-id="774" instrument_node="">
</span><br data-dcnode-id="773"><span data-dcnode-id="772" instrument_node="">
7 Upon this therefore, at the time when all the people heard the sound of the trumpet, the flute, and the harp, of the sackbut, and the psaltery, of the symphony, and of all kind of music: all the nations, tribes, and languages fell down and adored the golden statue which king Nebuchadnezzar had set up.
8 And presently at that very time some Chaldeans came and accused the Jews,
9 And said to king Nebuchadnezzar: O king, live for ever:
10 Thou, O king, hast made a decree that every man that shall bear the sound of the trumpet, the flute, and the harp, of the sackbut, and the psaltery, of the symphony, and of all kind of music, shall prostrate himself, and adore the golden statue:
11 And that if any man shall not fall down and adore, he should be cast into a furnace of burning fire.
</span><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node="">
</span><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">
12 Now there are certain Jews whom thou hast set over the works of the province of Babylon, Shadrach, Meshach, and Abednago: these men, O king, have slighted thy decree: they worship not thy gods, nor do they adore the golden statue which thou hast set up.
13 Then Nebuchadnezzar in fury, and in wrath, commanded that Shadrach, Meshach, and Abednago should be brought: who immediately were brought before the king.
14 And Nebuchadnezzar the king spoke to them, and said: Is it true, O Shadrach, Meshach, and Abednago, that you do not worship my gods, nor adore the golden statue that I have set up?
15 Now therefore if you be ready at what hour soever you shall hear the sound of the trumpet, flute, harp, sackbut, and psaltery, and symphony, and of all kind of music, prostrate yourselves, and adore the statue which I have made: but if you do not adore, you shall be cast the same hour into the furnace of burning fire: and who is the God that shall deliver you out of my hand?
</span><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">
</span><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">
16  Shadrach, Meshach, and Abednago  answered and said to king Nebuchadnezzar: We have no occasion to answer thee concerning this matter.
17 For behold our God, whom we worship, is able to save us from the furnace of burning fire, and to deliver us out of thy hands, O king.
18 But if he will not, be it known to thee, O king, that we will not worship thy gods, nor adore the golden statue which thou hast set up.
</span><br data-dcnode-id="763"><span data-dcnode-id="762" instrument_node="">
</span><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">
19 Then was Nebuchadnezzar filled with fury: and the countenance of his face was changed against Shadrach, Meshach, and Abednago, and he commanded that the furnace should be heated seven times more than it had been accustomed to be heated.
20 And he commanded the strongest men that were in his army, to bind the feet of Shadrach, Meshach, and Abednago and to cast them into the furnace of burning fire.
21 And immediately these men were bound and were cast into the furnace of burning fire, with their coats, and their caps, and their shoes, and their garments.
22 For the king's commandment was urgent, and the furnace was heated exceedingly. And the flame of the fire slew those men that had cast in Shadrach, Meshach, and Abednago.
23 But these three men, that is, Shadrach, Meshach, and Abednago, fell down bound in the midst of the furnace of burning fire.
</span></p><span data-dcnode-id="758" instrument_node="">
</span><h3 data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">The Song of the Three Young Men</span></h3><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" style="color:navy"><span data-dcnode-id="754" instrument_node="">
24  And they walked in the midst of the flame, praising God, and blessing the Lord.
</span><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node="">  25  Then Azarias standing up, prayed in this manner, and opening his mouth in the midst of the fire, he said:
</span><br data-dcnode-id="751"><span data-dcnode-id="750" instrument_node="">  26  Blessed art thou, O Lord, the God of our fathers, and thy name is worthy of praise, and glorious for ever:
</span><br data-dcnode-id="749"><span data-dcnode-id="748" instrument_node="">27  For thou art just in all that thou hast done to us, and all thy works are true, and thy ways right, and all thy judgments true.
</span><br data-dcnode-id="747"><span data-dcnode-id="746" instrument_node="">28  For thou hast executed true judgments in all the things that thou hast brought upon us, and upon Jerusalem, the holy city of our fathers: 
</span><br data-dcnode-id="745"><span data-dcnode-id="744" instrument_node="">for according to truth and judgment, thou hast brought all these things upon us for our sins.
</span><br data-dcnode-id="743"><span data-dcnode-id="742" instrument_node="">29  For we have sinned, and committed iniquity, departing from thee: and we have trespassed in all things:
</span><br data-dcnode-id="741"><span data-dcnode-id="740" instrument_node="">30  And we have not hearkened to thy commandments, nor have we observed nor done as thou hadst commanded us, that it might go well with us.
</span><br data-dcnode-id="739"><span data-dcnode-id="738" instrument_node="">31  Wherefore, all that thou hast brought upon us, and every thing that thou hast done to us, thou hast done in true judgment:
</span><br data-dcnode-id="737"><span data-dcnode-id="736" instrument_node="">32  And thou hast delivered us into the hands of our enemies that are unjust, and most wicked, and prevaricators, 
</span><br data-dcnode-id="735"><span data-dcnode-id="734" instrument_node="">and to a king unjust, and most wicked beyond all that are upon the earth.
</span><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node="">33  And now we cannot open our mouths: we are become a shame, and a reproach to thy servants, and to them that worship thee.
</span><br data-dcnode-id="731"><span data-dcnode-id="730" instrument_node="">34  Deliver us not up for ever, we beseech thee, for thy name's sake, and abolish not thy covenant.
</span><br data-dcnode-id="729"><span data-dcnode-id="728" instrument_node="">35  And take not away thy mercy from us, for the sake of Abraham, thy beloved, and Isaac, thy servant, and Israel, thy holy one:
</span><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">36  To whom thou hast spoken, promising that thou wouldst multiply their seed as the stars of heaven, and as the sand that is on the sea shore.
</span><br data-dcnode-id="725"><span data-dcnode-id="724" instrument_node="">37  For we, O Lord, are diminished more than any nation, and are brought low in all the earth this day for our sins.
</span><br data-dcnode-id="723"><span data-dcnode-id="722" instrument_node="">38  Neither is there at this time prince, or leader, or prophet, or holocaust, or sacrifice, or oblation, or incense, or place of first fruits before thee,
</span><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">39  That we may find thy mercy: nevertheless, in a contrite heart and humble spirit let us be accepted.
</span><br data-dcnode-id="719"><span data-dcnode-id="718" instrument_node="">40  As in holocausts of rams, and bullocks, and as in thousands of fat lambs: so let our sacrifice be made in thy sight this day, 
</span><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node="">that it may please thee: for there is no confusion to them that trust in thee.
</span><br data-dcnode-id="715"><span data-dcnode-id="714" instrument_node="">41  And now we follow thee with all our heart, and we fear thee, and seek thy face.
</span><br data-dcnode-id="713"><span data-dcnode-id="712" instrument_node="">42  Put us not to confusion, but deal with us according to thy meekness, and according to the multitude of thy mercies.
</span><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">43  And deliver us, according to thy wonderful works, and give glory to thy name, O Lord:
</span><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">44  And let all them be confounded that shew evils to thy servants, let them be confounded in all thy might, and let their strength be broken:
</span><br data-dcnode-id="707"><span data-dcnode-id="706" instrument_node="">45  And let them know that thou art the Lord, the only God, and glorious over all the world.
</span><br data-dcnode-id="705"><span data-dcnode-id="704" instrument_node="">46  Now the king's servants that had cast them in, ceased not to heat the furnace with brimstone and tow, and pitch, and dry sticks,
</span><br data-dcnode-id="703"><span data-dcnode-id="702" instrument_node="">47  And the flame mounted up above the furnace nine and forth cubits:
</span><br data-dcnode-id="701"><span data-dcnode-id="700" instrument_node="">48  And it broke forth, and burnt such of the Chaldeans as it found near the furnace.
</span><br data-dcnode-id="699"><span data-dcnode-id="698" instrument_node="">49  But the angel of the Lord went down with Azariah and his companions into the furnace: and he drove the flame of the fire out of the furnace,
</span><br data-dcnode-id="697"><span data-dcnode-id="696" instrument_node="">50  And made the midst of the furnace like the blowing of a wind bringing dew, and the fire touched them not at all, nor troubled them, nor did them any harm.
</span><br data-dcnode-id="695"><span data-dcnode-id="694" instrument_node="">51  Then these three, as with one mouth, praised and glorified and blessed God, in the furnace, saying:
</span><br data-dcnode-id="693"><span data-dcnode-id="692" instrument_node="">52  Blessed art thou, O Lord, the God of our fathers; and worthy to be praised, and glorified, and exalted above all for ever: 
</span><br data-dcnode-id="691"><span data-dcnode-id="690" instrument_node="">53  and blessed is the holy name of thy glory: and worthy to be praised and exalted above all, in all ages.
</span><br data-dcnode-id="689"><span data-dcnode-id="688" instrument_node="">54  Blessed art thou in the holy temple of thy glory: and exceedingly to be praised and exalted above all for ever.
</span><br data-dcnode-id="687"><span data-dcnode-id="686" instrument_node="">55  Blessed art thou that beholdest the depths, and sittest upon the cherubims: and worthy to be praised and exalted above all for ever.
</span><br data-dcnode-id="685"><span data-dcnode-id="684" instrument_node="">56  Blessed art thou in the firmament of heaven: and worthy of praise, and glorious for ever.
</span><br data-dcnode-id="683"><span data-dcnode-id="682" instrument_node="">57  All ye works of the Lord, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="681"><span data-dcnode-id="680" instrument_node="">58  O ye angels of the Lord, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">59  O ye heavens, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="677"><span data-dcnode-id="676" instrument_node="">60  O all ye waters that are above the heavens, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="675"><span data-dcnode-id="674" instrument_node="">61  O all ye powers of the Lord, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="673"><span data-dcnode-id="672" instrument_node="">62  O ye sun and moon, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="671"><span data-dcnode-id="670" instrument_node="">63  O ye stars of heaven, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="669"><span data-dcnode-id="668" instrument_node="">64  O every shower and dew, bless ye the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="667"><span data-dcnode-id="666" instrument_node="">65  O all ye spirits of God, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="665"><span data-dcnode-id="664" instrument_node="">66  O ye fire and heat, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="663"><span data-dcnode-id="662" instrument_node="">67  O ye cold and heat, bless the Lord, praise and exalt him above all for ever.
</span><br data-dcnode-id="661"><span data-dcnode-id="660" instrument_node="">68  O ye dews and hoar frost, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="659"><span data-dcnode-id="658" instrument_node="">69  O ye frost and cold, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="657"><span data-dcnode-id="656" instrument_node="">70  O ye ice and snow, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="655"><span data-dcnode-id="654" instrument_node="">71  O ye nights and days, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="653"><span data-dcnode-id="652" instrument_node="">72  O ye light and darkness, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="651"><span data-dcnode-id="650" instrument_node="">73  O ye lightnings and clouds, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="649"><span data-dcnode-id="648" instrument_node="">74  O let the earth bless the Lord: let it praise and exalt him above all for ever.
</span><br data-dcnode-id="647"><span data-dcnode-id="646" instrument_node="">76  O all ye things that spring up in the earth, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="645"><span data-dcnode-id="644" instrument_node="">77  O ye fountains, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="643"><span data-dcnode-id="642" instrument_node="">78  O ye seas and rivers, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="641"><span data-dcnode-id="640" instrument_node="">79  O ye whales, and all that move in the waters, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">80  O all ye fowls of the air, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">81  O all ye beasts and cattle, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="635"><span data-dcnode-id="634" instrument_node="">82  O ye sons of men, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="633"><span data-dcnode-id="632" instrument_node="">83  O let Israel bless the Lord: let them praise and exalt him above all for ever.
</span><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">84  O ye priests of the Lord, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="629"><span data-dcnode-id="628" instrument_node="">85  O ye servants of the Lord, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="627"><span data-dcnode-id="626" instrument_node="">86  O ye spirits and souls of the just, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">87  O ye holy and humble of heart, bless the Lord: praise and exalt him above all for ever.
</span><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">88  O Ananias, Azarias, Misael, bless ye the Lord: praise and exalt him above all for ever. For he hath delivered us from hell, </span><br data-dcnode-id="621"><span data-dcnode-id="620" instrument_node="">and saved us out of the hand of death, and delivered us out of the midst of the burning flame, and saved us out of the midst of the fire.
</span><br data-dcnode-id="619"><span data-dcnode-id="618" instrument_node="">89  O give thanks to the Lord, because he is good: because his mercy endureth for ever and ever.
</span><br data-dcnode-id="617"><span data-dcnode-id="616" instrument_node="">90  O all ye religious, bless the Lord, the God of gods: praise him, and give him thanks, because his mercy endureth for ever and ever.
</span></span></p><span data-dcnode-id="613" instrument_node="">
</span><h3 data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">The King is Amazed</span></h3><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="609" instrument_node="">
91 Then Nebuchadnezzar the king was astonished, and rose up in haste, and said to his nobles: Did we not cast three men bound into the midst of the fire? They answered the king, and said: True, O king.
92 He answered, and said: Behold I see four men loose, and walking in the midst of the fire, and there is no hurt in them, and the form of the fourth is like the Son of God.
93 Then Nebuchadnezzar came to the door of the burning fiery furnace, and said: Shadrach, Meshach, and Abednago, ye servants of the most high God, go ye forth, and come. And immediately Shadrach, Meshach, and Abednago went out from the midst of the fire.
</span><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node="">
</span><br data-dcnode-id="606"><span data-dcnode-id="605" instrument_node="">
94 And the nobles, and the magistrates, and the judges, and the great men of the king being gathered together, considered these men, that the fire had no power on their bodies, and that not a hair of their head had been singed, nor their garments altered, nor the smell of the fire had passed on them.
</span><br data-dcnode-id="604"><span data-dcnode-id="603" instrument_node="">
</span><br data-dcnode-id="602"><span data-dcnode-id="601" instrument_node="">
95 Then Nebuchadnezzar breaking forth, said: Blessed be the God of them, to wit, of Shadrach, Meshach, and Abednago, who hath sent his angel, and delivered his servants that believed in him: and they changed the king's word, and delivered up their bodies that they might not serve, nor adore any god, except their own God.
96 By me therefore this decree is made, that every people, tribe, and tongue, which shall speak blasphemy against the God of Shadrach, Meshach, and Abednago, shall be destroyed, and their houses laid waste: for there is no other God that can save in this manner.
</span><br data-dcnode-id="600"><span data-dcnode-id="599" instrument_node="">
</span><br data-dcnode-id="598"><span data-dcnode-id="597" instrument_node="">
97 Then the king promoted Shadrach, Meshach, and Abednago, in the province of Babylon.
98 Nebuchadnezzar the king, to all peoples, nations, and tongues, that dwell in all the earth, peace be multiplied unto you.
99 The most high God hath wrought signs and wonders toward me. It hath seemed good to me therefore to publish
100 His signs, because they are great: and his wonders, because they are mighty: and his kingdom is an everlasting kingdom, I and his power to all generations.
</span></p><span data-dcnode-id="595" instrument_node="">
</span><br data-dcnode-id="594"><span data-dcnode-id="593" instrument_node="">
</span><div class="chapter" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">
			CHAPTER 4
</span></div><span data-dcnode-id="590" instrument_node="">
</span><h3 data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">The King's Vision of the Great Tree</span></h3><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="586" instrument_node="">
1 I Nebuchadnezzar was at rest in my house, and flourishing in my palace:
2 I saw a dream that affrighted me: and my thoughts in my bed, and the visions of my head troubled me.
3 Then I set forth a decree, that all the wise men of Babylon should be brought in before me, and that they should shew me the interpretation of the dream.
4 Then came in the diviners, the wise men, the Chaldeans, and the soothsayers, and I told the dream before them: but they did not shew me the interpretation thereof:
</span><br data-dcnode-id="585"><span data-dcnode-id="584" instrument_node="">
</span><br data-dcnode-id="583"><span data-dcnode-id="582" instrument_node="">
5 Till their colleague Daniel came in before me, whose name is Belteshazzar, according to the name of my god, who hath in him the spirit of the holy gods: and I told the dream before him.
6 Belteshazzar, prince of the diviners, because I know that thou hast in thee the spirit of the holy gods, and that no secret is impossible to thee: tell me the visions of my dreams that I have seen, and the interpretation of them.
</span><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">
</span><br data-dcnode-id="579"><span data-dcnode-id="578" instrument_node="">
7 This was the vision of my head in my bed: I saw, and behold a tree in the midst of the earth, and the height thereof was exceeding great.
8 The tree was great, and strong: and the height thereof reached unto heaven: the sight thereof was even to the ends of all the earth.
9 Its leaves were most beautiful, and its fruit exceeding much: and in it was food for all: under it dwelt cattle, and beasts, and in the branches thereof the fowls of the air had their abode: and all flesh did eat of it.
10 I saw in the vision of my head upon my bed, and behold a watcher, and a holy one came down from heaven.
</span><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node="">
</span><br data-dcnode-id="575"><span data-dcnode-id="574" instrument_node="">
11 He cried aloud, and said thus: Cut down the tree, and chop off the branches thereof: shake off its leaves, and scatter its fruits: let the beasts fly away that are under it, and the birds from its branches.
12 Nevertheless leave the stump of its roots in the earth, and let it be tied with a band of iron, and of brass, among the grass, that is without, and let it be wet with the dew of heaven, and let its portion be with the wild beasts in the grass of the earth.
13 Let his heart be changed from man's, and let a beast's heart be given him; and let seven times pass over him.
14 This is the decree by the sentence of the watchers, and the word by order of the holy ones; till the living know that the most High ruleth in the kingdom of men; and he will give it to whomsoever it shall please him, and he will appoint the basest man over it.
</span><br data-dcnode-id="573"><span data-dcnode-id="572" instrument_node="">
</span><br data-dcnode-id="571"><span data-dcnode-id="570" instrument_node="">
15 I king Nebuchadnezzar saw this dream: thou, therefore, O Belteshazzar, tell me quickly the interpretation: for all the wise men of my kingdom are not able to declare the meaning of it to me: but thou art able, because the spirit of the holy gods is in thee.
</span><br data-dcnode-id="569"><span data-dcnode-id="568" instrument_node="">
</span><br data-dcnode-id="567"><span data-dcnode-id="566" instrument_node="">
16 Then Daniel, whose name was Belteshazzar, began silently to think within himself for about one hour: and his thoughts troubled him. But the king answering, said: Belteshazzar, let not the dream and the interpretation thereof trouble thee. Belteshazzar answered, and said: My lord, the dream be to them that hate thee, and the interpretation thereof to thy enemies.
17 The tree which thou sawest which was high and strong, whose height reached to the skies, and the sight thereof into all tire earth:
18 And the branches thereof were most beautiful, and its fruit exceeding much, and in it was food for all, under which the beasts of the field dwelt, and the birds of the air had their abode in its branches.
19 It is thou, O king, who art grown great and become mighty: for thy greatness hath grown, and hath reached to heaven, and thy power unto the ends of the earth.
</span><br data-dcnode-id="565"><span data-dcnode-id="564" instrument_node="">
</span><br data-dcnode-id="563"><span data-dcnode-id="562" instrument_node="">
20 And whereas the king saw a watcher, and a holy one come down from heaven, and say: Cut down the tree and destroy it, but leave the stump of the roots thereof in the earth, and let it be bound with iron and brass among the grass without, and let it be sprinkled with the dew of heaven, and let his feeding be with the wild beasts, till seven times pass over him.
21 This is the interpretation of the sentence of the most High, which is come upon my lord the king.
22 They shall cast thee out from among men, and thy dwelling shall be with cattle and with wild beasts, and thou shalt eat grass as an ox, and shalt be wet with the dew of heaven: and seven times shall pass over thee, till thou know that the most High ruleth over the kingdom of men, and giveth it to whomsoever he will.
23 But whereas he commanded, that the stump of the roots thereof, that is, of the tree, should be left: thy kingdom shall remain to thee after thou shalt have known that power is from heaven.
24 Wherefore, O king, let my counsel be acceptable to thee, and redeem thou thy sins with alms, and thy iniquities with works of mercy to the poor: perhaps he will forgive thy offences.
</span><br data-dcnode-id="561"><span data-dcnode-id="560" instrument_node="">
</span><br data-dcnode-id="559"><span data-dcnode-id="558" instrument_node="">
25 All these things came upon king Nebuchadnezzar.
26 At the end of twelve months he was walking in the palace of Babylon.
27 And the king answered, and said: Is not this the great Babylon, which I have built to be the seat of the kingdom, by the strength of my power, and in the glory of my excellence?
</span><br data-dcnode-id="557"><span data-dcnode-id="556" instrument_node="">
</span><br data-dcnode-id="555"><span data-dcnode-id="554" instrument_node="">
28 And while the word was yet in the king's mouth, a voice came down from heaven: To thee, O king Nebuchadnezzar, it is said: Thy kingdom shall pass from thee,
29 And they shall cast thee out from among men, and thy dwelling shall be with cattle and wild beasts: thou shalt eat grass like an ox, and seven times shall pass over thee, till thou know that the most High ruleth in the kingdom of men, and giveth it to whomsoever he will.
</span><br data-dcnode-id="553"><span data-dcnode-id="552" instrument_node="">
</span><br data-dcnode-id="551"><span data-dcnode-id="550" instrument_node="">
30 The same hour the word was fulfilled upon Nebuchadnezzar, and he was driven away from among men, and did eat grass like an ox, and his body was wet with the dew of heaven: till his hairs grew like the feathers of eagles, and his nails like birds' claws.
31 Now at the end of the days, I Nebuchadnezzar lifted up my eyes to heaven, and my sense was restored to me: and I blessed the most High, and I praised and glorified him that liveth for ever: for his power is an everlasting power, and his kingdom is to all generations.
32 And all the inhabitants of the earth are reputed as nothing before him: for he doth according to his will, I as well with the powers of heaven, as among the inhabitants of the earth: and there is none that can resist his hand, and say to him: Why hast thou done it?
33 At the same time my sense returned to me, and I came to the honour and glory of my kingdom: and my shape returned to me: and my nobles, and my magistrates sought for me, and I was restored to my kingdom: and greater majesty was added to me.
34 Therefore I Nebuchadnezzar do now praise, and magnify, and glorify the King of heaven: because all his works are true, and his ways judgments, and them that walk in pride he is able to abase.
</span></p><span data-dcnode-id="548" instrument_node="">
</span><br data-dcnode-id="547"><span data-dcnode-id="546" instrument_node="">
</span><div class="chapter" data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">
			CHAPTER 5
</span></div><span data-dcnode-id="543" instrument_node="">
</span><h3 data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">The Handwriting on the Wall</span></h3><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="539" instrument_node="">
1 Belshazzar the king made a great feast for a thousand of his nobles: and every one drank according to his age.
2 And being now drunk he commanded that they should bring the vessels of gold and silver which Nebuchadnezzar his father had brought away out of the temple, that was in Jerusalem, that the king and his nobles, and his wives and his concubines, might drink in them.
3 Then were the golden and silver vessels brought, which he had brought away out of the temple that was in Jerusalem: and the king and his nobles, his wives and his concubines, drank in them.
4 They drank wine, and praised their gods of gold, and of silver, of brass, of iron, and of wood, and of stone.
</span><br data-dcnode-id="538"><span data-dcnode-id="537" instrument_node="">
</span><br data-dcnode-id="536"><span data-dcnode-id="535" instrument_node="">
5 In the same hour there appeared fingers, as it were of the hand of a man, writing over against the candlestick upon the surface of the wall of the king's palace: and the king beheld the joints of the hand that wrote.
6 Then was the king's countenance changed, and his thoughts troubled him: and the joints of his loins were loosed, and his knees struck one against the other.
7 And the king cried out aloud to bring in the wise men, the Chaldeans, and the soothsayers. And the king spoke, and said to the wise men of Babylon: Whosoever shall read this writing, and shall make known to me the interpretation thereof, shall be clothed with purple, and shall have a golden chain on his neck, and shall be the third man in my kingdom.
8 Then came in all the king's wise men, but they could neither read the writing, nor declare the interpretation to the king.
9 Wherewith king Belshazzar was much troubled, and his countenance was changed: and his nobles also were troubled.
</span><br data-dcnode-id="534"><span data-dcnode-id="533" instrument_node="">
</span><br data-dcnode-id="532"><span data-dcnode-id="531" instrument_node="">
10 Then the queen, on occasion of what had happened to the king, and his nobles, came into the banquet house: and she spoke and said: O king, live for ever: let not thy thoughts trouble thee, neither let thy countenance be changed.
11 There is a man in thy kingdom that hath the spirit of the holy gods in him: and in the days of thy father knowledge and wisdom were found in him: for king Nebuchadnezzar thy father appointed him prince of the wise men, enchanters, Chaldeans, and soothsayers, thy father, I say, O king:
12 Because a greater spirit, and knowledge, and understanding, and interpretation of dreams, and shewing of secrets, and resolving of difficult things, were found in him, that is, in Daniel: whom the king named Belteshazzar. Now therefore let Daniel be called for, and he will tell the interpretation.
</span><br data-dcnode-id="530"><span data-dcnode-id="529" instrument_node="">
</span><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node="">
13 Then Daniel was brought in before the king. And the king spoke, and said to him: Art thou Daniel of the children of the captivity of Juda, whom my father the king brought out of Judea?
14 I have heard of thee, that thou hast the spirit of the gods, and excellent knowledge, and understanding, and wisdom are found in thee.
15 And now the wise men the magicians have come in before me, to read this writing, and shew me the interpretation thereof: and they could not declare to me the meaning of this writing.
16 But I have heard of thee, that thou canst interpret obscure things, and resolve difficult things: now if thou art able to read the writing, and to shew me the interpretation thereof, thou shalt be clothed with purple, and shalt have a chain of gold about thy neck, and shalt be the third prince in my kingdom.
</span><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node="">
</span><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node="">
17 To which Daniel made answer, and said before the king: Thy rewards be to thyself, and the gifts of thy house give to another: but the writing I will read to thee, O king, and shew thee the interpretation thereof.
18 O king, the most high God gave to Nebuchadnezzar thy father a kingdom, and greatness, and glory, and honour.
19 And for the greatness that he gave to him, all people, tribes, and languages trembled, and were afraid of him: whom he would, he slew: and whom he would, he destroyed: and whom he would, he set up: and whom he would, he brought down.
20 But when his heart was lifted up, and his spirit hardened unto pride, he was put down from the throne of his kingdom, and his glory was taken away.
21 And he was driven out from the sons of men, and his heart was made like the beasts, and his dwelling was with the wild asses, and he did eat grass like an ox, and his body was wet with the dew of heaven: till he knew that the most High ruled in the kingdom of men, and that he will set over it whomsoever it shall please him.
</span><br data-dcnode-id="522"><span data-dcnode-id="521" instrument_node="">
</span><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node="">
22 Thou also his son, O Belshazzar, hast not humbled thy heart, whereas thou knewest all these things:
23 But hast lifted thyself up against the Lord of heaven: and the vessels of his house have been brought before thee: and thou, and thy nobles, and thy wives, and thy concubines have drunk wine in them: and thou hast praised the gods of silver, and of gold, and of brass, of iron, and of wood, and of stone, that neither see, nor hear, nor feel: but the God who hath thy breath in his hand, and all thy ways, thou hast not glorified.
</span><br data-dcnode-id="518"><span data-dcnode-id="517" instrument_node="">
</span><br data-dcnode-id="516"><span data-dcnode-id="515" instrument_node="">
24 Wherefore he hath sent the part of the hand which hath written this that is set down.
25 And this is the writing that is written: MANE, THECEL, PHARES.
26 And this is the interpretation of the word. MANE: God hath numbered thy kingdom, and hath finished it.
27 THECEL: thou art weighed in the balance, and art found wanting.
28 PHARES: thy kingdom is divided, and is given to the Medes and Persians.
</span><br data-dcnode-id="514"><span data-dcnode-id="513" instrument_node="">
</span><br data-dcnode-id="512"><span data-dcnode-id="511" instrument_node="">
29 Then by the king's command Daniel was clothed with purple, and a chain of gold was put about his neck: and it was proclaimed of him that he had power as the third man in the kingdom.
30 The same night Belshazzar the Chaldean king was slain.
31 And Darius the Mede succeeded to the kingdom, being threescore and two years old.
</span></p><span data-dcnode-id="509" instrument_node="">
</span><br data-dcnode-id="508"><span data-dcnode-id="507" instrument_node="">
</span><div class="chapter" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">
			CHAPTER 6
</span></div><span data-dcnode-id="504" instrument_node="">
</span><h3 data-dcnode-id="501"><span data-dcnode-id="502" style="color:red"><span data-dcnode-id="503" instrument_node="">Daniel in the Lion's Den</span></span></h3><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="499" instrument_node="">
1 It seemed good to Darius, and he appointed over the kingdom a hundred and twenty governors to be over his whole kingdom.
2 And three princes over them, of whom Daniel was one: that the governors might give an account to them, and the king might have no trouble.
</span><br data-dcnode-id="498"><span data-dcnode-id="497" instrument_node="">
</span><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">
3 And Daniel excelled all the princes, and governors: because a greater spirit of God was in him.
4 And the king thought to set him over all the kingdom: whereupon the princes, and the governors sought to find occasion against Daniel with regard to the king: and they could find no cause, nor suspicion, because he was faithful, and no fault, nor suspicion was found in him
</span><br data-dcnode-id="494"><span data-dcnode-id="493" instrument_node="">
</span><br data-dcnode-id="492"><span data-dcnode-id="491" instrument_node="">
5 Then these men said: We shall not find any occasion against this Daniel, unless perhaps concerning the law of his God.
6 Then the princes, and the governors craftily suggested to the king, and spoke thus unto him: King Darius, live for ever:
7 All the princes of the kingdom, the magistrates, and governors, the senators, and judges have consulted together, that an imperial decree, and an edict be published: That whosoever shall ask any petition of any god, or man, for thirty days, but of thee, O king, shall be cast into the den of lions.
8 Now, therefore, O king, confirm the sentence, and sign the decree: that what is decreed by the Medes and Persians may not be altered, nor any man be allowed to transgress it.
9 So king Darius set forth the decree, and established it.
</span><br data-dcnode-id="490"><span data-dcnode-id="489" instrument_node="">
</span><br data-dcnode-id="488"><span data-dcnode-id="487" instrument_node="">
10 Now when Daniel knew this, that is to say, that the law was made, he went into his house: and opening the windows in his upper chamber towards Jerusalem, he knelt down three times a day, and adored, and gave thanks before his God, as he had been accustomed to do before.
11 Wherefore those men carefully watching him, found Daniel praying and making supplication to his God.
</span><br data-dcnode-id="486"><span data-dcnode-id="485" instrument_node="">
</span><br data-dcnode-id="484"><span data-dcnode-id="483" instrument_node="">
12 And they came and spoke to the king concerning the edict: O king, hast thou not decreed, that every man that should make a request to any of the gods, or men, for thirty days, but to thyself, O king, should be cast into the den of the lions? And the king answered them, saying: The word is true according to the decree of the Medes and Persians, which it is not lawful to violate.
13 Then they answered, and said before the king: Daniel, who is of the children of the captivity of Judah, hath not regarded thy law, nor the decree that thou hast made: but three times a day he maketh his prayer.
</span><br data-dcnode-id="482"><span data-dcnode-id="481" instrument_node="">
</span><br data-dcnode-id="480"><span data-dcnode-id="479" instrument_node="">
14 Now when the king had heard these words, he was very much grieved, and in behalf of Daniel he set his heart to deliver him and even till sunset he laboured to save him.
15 But those men, perceiving the king's design, said to him: Know thou, O king, that the law of the Medes and Persians is, that no decree which the king hath made, may be altered.
</span><br data-dcnode-id="478"><span data-dcnode-id="477" instrument_node="">
</span><br data-dcnode-id="476"><span data-dcnode-id="475" instrument_node="">
16 Then the king commanded, and they brought Daniel, and cast him into the den of the lions. And the king said to Daniel: Thy God, whom thou always servest, he will deliver thee.
17 And a stone was brought, and laid upon the mouth of the den: which the king sealed with his own ring, and with the ring of his nobles, that nothing should be done against Daniel.
18 And the king went away to his house and laid himself down without taking supper, and meat was not set before him, and even sleep departed from him.
</span><br data-dcnode-id="474"><span data-dcnode-id="473" instrument_node="">
</span><br data-dcnode-id="472"><span data-dcnode-id="471" instrument_node="">
19 Then the king rising very early in the morning, went in haste to the lions' den:
20 And coming near to the den, cried with a lamentable voice to Daniel, and said to him: Daniel, servant of the living God, hath thy God, whom thou servest always, been able, thinkest thou, to deliver thee from the lions?
</span><br data-dcnode-id="470"><span data-dcnode-id="469" instrument_node="">
</span><br data-dcnode-id="468"><span data-dcnode-id="467" instrument_node="">
21 And Daniel answering the king, said: O king, live for ever:
22 My God hath sent his angel, and hath shut up the mouths of the lions, and they have not hurt me: forasmuch as before him justice hath been found in me: yea and before thee, O king, I have done no offence.
</span><br data-dcnode-id="466"><span data-dcnode-id="465" instrument_node="">
</span><br data-dcnode-id="464"><span data-dcnode-id="463" instrument_node="">
23 Then was the king exceeding glad for him, and he commanded that Daniel should be taken out of the den: and Daniel was taken out of the den, and no hurt was found in him, because he believed in his God.
24 And by the king's commandment, those men were brought that bad accused Daniel: and they were cast into the lions' den, they and their children, and their wives: and they did not reach the bottom of the den, before the lions caught them, and broke all their bones in pieces.
</span><br data-dcnode-id="462"><span data-dcnode-id="461" instrument_node="">
</span><br data-dcnode-id="460"><span data-dcnode-id="459" instrument_node="">
25 Then king Darius wrote to all people, tribes, and languages, dwelling in the whole earth: PEACE be multiplied unto you.
26 It is decreed by me, that in all my empire and my kingdom all men dread and fear the God of Daniel. For he is the living and eternal God for ever: and his kingdom shall not be destroyed, and his power shall be for ever.
27 He is the deliverer, and saviour, doing signs and wonders in heaven, and in earth: who hath delivered Daniel out of the lions' den.
28 Now Daniel continued unto the reign of Darius, and the reign of Cyrus the Persian.
</span></p><span data-dcnode-id="457" instrument_node="">
</span><br data-dcnode-id="456"><span data-dcnode-id="455" instrument_node="">
</span><br data-dcnode-id="454"><span data-dcnode-id="453" instrument_node="">
</span><h2 data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">VISIONS OF DANIEL</span></h2><span data-dcnode-id="450" instrument_node="">
</span><br data-dcnode-id="449"><span data-dcnode-id="448" instrument_node="">
</span><br data-dcnode-id="447"><span data-dcnode-id="446" instrument_node="">
</span><div class="chapter" data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">
			CHAPTER 7
</span></div><span data-dcnode-id="443" instrument_node="">
</span><h3 data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">The Four Beasts, Ten Horns and another Horn</span></h3><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="439" instrument_node="">
1 In the first year of Belshazzar king of Babylon, Daniel saw a dream: and the vision of his head was upon his bed: and writing the dream, he comprehended it in few words: and relating the sum of it in short, he said: 2 I saw in my vision by night, and behold the four winds of the heaven strove upon the great sea. 3 And four great beasts, different one from another, came up out of the sea. 4 The first was like a lioness, and had the wings of an eagle: I beheld till her wings were plucked off, and she was lifted up from the earth, and stood upon her feet as a man, and the heart of a man was given to her. 5 And behold another beast like a bear stood up on one side: and there were three rows in the mouth thereof, and in the teeth thereof, and thus they said to it: Arise, devour much flesh.
</span><br data-dcnode-id="438"><span data-dcnode-id="437" instrument_node="">
</span><br data-dcnode-id="436"><span data-dcnode-id="435" instrument_node="">
6 After this I beheld, and lo, another like a leopard, and it had upon it four wings as of a fowl, and the beast had four heads, and power was given to it. 7 After this I beheld in the vision of the night, and lo, a fourth beast, terrible and wonderful, and exceeding strong, it had great iron teeth, eating and breaking in pieces, and treading down the rest with its feet: and it was unlike to the other beasts which I had seen before it, and had ten horns. 8 I considered the horns, and behold another little horn sprung out of the midst of them: and three of the first horns were plucked up at the presence thereof: and behold eyes like the eyes of a man were in this horn, and a mouth speaking great things. 
</span></p><span data-dcnode-id="433" instrument_node="">
</span><h3 data-dcnode-id="430"><span data-dcnode-id="431" style="color:red"><span data-dcnode-id="432" instrument_node="">The Ancient of Days</span></span></h3><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="407" id="poetry"><span data-dcnode-id="428" instrument_node="">
9 I beheld till thrones were placed, and the Ancient of days sat: 
</span><br data-dcnode-id="427"><span data-dcnode-id="426" instrument_node="">his garment was white as snow, and the hair of his head like clean wool: 
</span><br data-dcnode-id="425"><span data-dcnode-id="424" instrument_node="">his throne like flames of fire: the wheels of it like a burning fire. 
</span><br data-dcnode-id="423"><span data-dcnode-id="422" instrument_node="">10 A swift stream of fire issued forth from before him: 
</span><br data-dcnode-id="421"><span data-dcnode-id="420" instrument_node="">thousands of thousands ministered to him, and ten thousand times a hundred thousand stood before him: 
</span><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node="">the judgment sat, and the books were opened.
</span><br data-dcnode-id="417"><span data-dcnode-id="416" instrument_node="">
</span><br data-dcnode-id="415"><span data-dcnode-id="414" instrument_node="">
11 I beheld because of the voice of the great words which that horn spoke: 
</span><br data-dcnode-id="413"><span data-dcnode-id="412" instrument_node="">and I saw that the beast was slain, and the body thereof was destroyed, and given to the fire to be burnt: 
</span><br data-dcnode-id="411"><span data-dcnode-id="410" instrument_node="">12 And that the power of the other beasts was taken away: 
</span><br data-dcnode-id="409"><span data-dcnode-id="408" instrument_node="">and that times of life were appointed them for a time, and a time. 
</span></p><span data-dcnode-id="406" instrument_node="">
</span><h3 data-dcnode-id="403"><span data-dcnode-id="404" style="color:red"><span data-dcnode-id="405" instrument_node="">The Son of Man</span></span></h3><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="392" id="poetry"><span data-dcnode-id="401" instrument_node="">
13 I beheld therefore in the vision of the night, and lo, one like the son of man came with the clouds of heaven, 
</span><br data-dcnode-id="400"><span data-dcnode-id="399" instrument_node="">and he came even to the Ancient of days: and they presented him before him. 
</span><br data-dcnode-id="398"><span data-dcnode-id="397" instrument_node="">14 And he gave him power, and glory, and a kingdom: and all peoples, tribes and tongues shall serve him: 
</span><br data-dcnode-id="396"><span data-dcnode-id="395" instrument_node="">his power is an everlasting power that shall not be taken away: 
</span><br data-dcnode-id="394"><span data-dcnode-id="393" instrument_node="">and his kingdom that shall not be destroyed. 
</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="390" instrument_node="">
15 My spirit trembled, I Daniel was affrighted at these things, and the visions of my head troubled me.
16 I went near to one of them that stood by, and asked the truth of him concerning all these things, and he told me the interpretation of the words, and instructed me: 17 These four great beasts are four kingdoms, which shall arise out of the earth. 18 But the saints of the most high God shall take the kingdom: and they shall possess the kingdom for ever and ever.
