</span><br data-dcnode-id="389"><span data-dcnode-id="388" instrument_node="">
</span><br data-dcnode-id="387"><span data-dcnode-id="386" instrument_node="">
19 After this I would diligently learn concerning the fourth beast, which was very different from all, and exceeding terrible: his teeth and claws were of iron: he devoured and broke in pieces, and the rest he stamped upon with his feet: 20 And concerning the ten horns that he had on his head: and concerning the other that came up, before which three horns fell: and of that horn that had eyes, and a mouth speaking great things, and was greater than the rest.
</span><br data-dcnode-id="385"><span data-dcnode-id="384" instrument_node="">
</span><br data-dcnode-id="383"><span data-dcnode-id="382" instrument_node="">
21 I beheld, and lo, that horn made war against the saints, and prevailed over them, 22 Till the Ancient of days came and gave judgment to the saints of the most High, and the time came, and the saints obtained the kingdom. 23 And thus he said: The fourth beast shall be the fourth kingdom upon earth, which shall be greater than all the kingdoms, and shall devour the whole earth, and shall tread it down, and break it in pieces. 24 And the ten horns of the same kingdom, shall be ten kings: and another shall rise up after them, and he shall be mightier than the former, and he shall bring down three kings. 25 And he shall speak words against the High One, and shall crush the saints of the most High: and he shall think himself able to change times and laws, and they shall be delivered into his hand until a time, and times, and half a time.
</span><br data-dcnode-id="381"><span data-dcnode-id="380" instrument_node="">
</span><br data-dcnode-id="379"><span data-dcnode-id="378" instrument_node="">
26 And judgment shall sit, that his power may be taken away, and be broken in pieces, and perish even to the end. 
</span><br data-dcnode-id="377"><span data-dcnode-id="376" instrument_node="">27 And that the kingdom, and power, and the greatness of the kingdom, under the whole heaven, 
may be given to the people of the saints of the most High: whose kingdom is an everlasting kingdom, and all kings shall serve him, and shall obey him. 28 Hitherto is the end of the word. 
</span><br data-dcnode-id="375"><span data-dcnode-id="374" instrument_node="">I Daniel was much troubled with my thoughts, and my countenance was changed in me: but I kept the word in my heart.
</span></p><span data-dcnode-id="372" instrument_node="">
</span><br data-dcnode-id="371"><span data-dcnode-id="370" instrument_node="">
</span><div class="chapter" data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">
			CHAPTER 8
</span></div><span data-dcnode-id="367" instrument_node="">
</span><h3 data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Vision of the Ram and He-goat</span></h3><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="363" instrument_node="">
1  After this first vision, I, Daniel, had another, in the third year of the reign of King Belshazzar.
2  In my vision I saw myself in the fortress of Susa in the province of Elam; I was beside the river Ulai.
3  I looked up and saw standing by the river a ram with two great horns, the one larger and newer than the other.
4  I saw the ram butting toward the west, north, and south. No beast could withstand it or be rescued from its power; it did what it pleased and became very powerful.
5  As I was reflecting, a he-goat with a prominent horn on its forehead suddenly came from the west across the whole earth without touching the ground.
6  It approached the two-horned ram I had seen standing by the river, and rushed toward it with savage force.
7  I saw it attack the ram with furious blows when they met, and break both its horns. It threw the ram, which had not the force to withstand it, to the ground, and trampled upon it; and no one could rescue it from its power.
8  The he-goat became very powerful, but at the height of its power the great horn was shattered, and in its place came up four others, facing the four winds of heaven.
9  Out of one of them came a little horn which kept growing toward the south, the east, and the glorious country.
10  Its power extended to the host of heaven, so that it cast down to earth some of the host and some of the stars and trampled on them.
</span><br data-dcnode-id="362"><span data-dcnode-id="361" instrument_node="">
</span><br data-dcnode-id="360"><span data-dcnode-id="359" instrument_node="">
11  It boasted even against the prince of the host, from whom it removed the daily sacrifice, and whose sanctuary it cast down,
12  as well as the host, while sin replaced the daily sacrifice. It cast truth to the ground, and was succeeding in its undertaking.
</span><br data-dcnode-id="358"><span data-dcnode-id="357" instrument_node="">
</span><br data-dcnode-id="356"><span data-dcnode-id="355" instrument_node="">
13  I heard a holy one speaking, and another said to whichever one it was that spoke, "How long shall the events of this vision last concerning the daily sacrifice, the desolating sin which is placed there, the sanctuary, and the trampled host?"
14  He answered him, "For two thousand three hundred evenings and mornings; then the sanctuary shall be purified."
</span><br data-dcnode-id="354"><span data-dcnode-id="353" instrument_node="">
</span><br data-dcnode-id="352"><span data-dcnode-id="351" instrument_node="">
15  While I, Daniel, sought the meaning of the vision I had seen, a manlike figure stood before me,
16  and on the Ulai I heard a human voice that cried out, 
</span></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="340" id="poetry"><span data-dcnode-id="348" instrument_node="">
"</span><b data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Gabriel</span></b><span data-dcnode-id="345" instrument_node="">, explain the vision to this man."
</span><br data-dcnode-id="344"><span data-dcnode-id="343" instrument_node="">17  When he came near where I was standing, I fell prostrate in terror. 
</span><br data-dcnode-id="342"><span data-dcnode-id="341" instrument_node="">But he said to me, "Understand, son of man, that the vision refers to the end time."
</span></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="338" instrument_node="">
18  As he spoke to me, I fell forward in a faint; he touched me and made me stand up.
19  "I will show you," he said, "what is to happen later in the period of wrath; for at the appointed time, there will be an end.
20  "The two-horned ram you saw represents the kings of the Medes and Persians.
21  The he-goat is the king of the Greeks, and the great horn on its forehead is the first king.
22  The four that rose in its place when it was broken are four kingdoms that will issue from his nation, but without his strength.
23  "After their reign, when sinners have reached their measure, There shall arise a king, impudent and skilled in intrigue.
24  He shall be strong and powerful, bring about fearful ruin, and succeed in his undertaking. He shall destroy powerful peoples;
25  his cunning shall be against the holy ones, his treacherous conduct shall succeed. He shall be proud of heart and destroy many by stealth. But when he rises against the prince of princes, he shall be broken without a hand being raised.
26  The vision of the evenings and the mornings is true, as spoken; Do you, however, keep this vision undisclosed, because the days are to be many."
</span><br data-dcnode-id="337"><span data-dcnode-id="336" instrument_node="">
</span><br data-dcnode-id="335"><span data-dcnode-id="334" instrument_node="">
27  I, Daniel, was weak and ill for some days; then I arose and took care of the king's affairs. But I was appalled at the vision, which I could not understand.
</span></p><span data-dcnode-id="332" instrument_node="">
</span><br data-dcnode-id="331"><span data-dcnode-id="330" instrument_node="">
</span><div class="chapter" data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">
	     CHAPTER 9
</span></div><span data-dcnode-id="327" instrument_node="">
</span><h3 data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Gabriel and the Seventy Weeks</span></h3><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="323" instrument_node="">
1  It was the first year that Darius, son of Ahasuerus, of the race of the Medes, reigned over the kingdom of the Chaldeans;
2  in the first year of his reign I, Daniel, tried to understand in the Scriptures the counting of the years of which the LORD spoke to the prophet </span><b data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Jeremiah</span></b><span data-dcnode-id="320" instrument_node="">: that for the ruins of Jerusalem seventy years must be fulfilled.
</span><br data-dcnode-id="319"><span data-dcnode-id="318" instrument_node="">
</span><br data-dcnode-id="317"><span data-dcnode-id="316" instrument_node="">
3  I turned to the Lord God, pleading in earnest prayer, with fasting, sackcloth, and ashes.
4  I prayed to the LORD, my God, and confessed, "Ah, Lord, great and awesome God, you who keep your merciful covenant toward those who love you and observe your commandments!
5  We have sinned, been wicked and done evil; we have rebelled and departed from your commandments and your laws.
6  We have not obeyed your servants the prophets, who spoke in your name to our kings, our princes, our fathers, and all the people of the land.
7  Justice, O Lord, is on your side; we are shamefaced even to this day: the men of Judah, the residents of Jerusalem, and all Israel, near and far, in all the countries to which you have scattered them because of their treachery toward you.
8  O LORD, we are shamefaced, like our kings, our princes, and our fathers, for having sinned against you.
9  But yours, O Lord, our God, are compassion and forgiveness! Yet we rebelled against you
10  and paid no heed to your command, O LORD, our God, to live by the law you gave us through your servants the prophets.
</span><br data-dcnode-id="315"><span data-dcnode-id="314" instrument_node="">
</span><br data-dcnode-id="313"><span data-dcnode-id="312" instrument_node="">
11  Because all Israel transgressed your law and went astray, not heeding your voice, the sworn malediction, recorded in the law of Moses, the servant of God, was poured out over us for our sins.
12  You carried out the threats you spoke against us and against those who governed us, by bringing upon us in Jerusalem the greatest calamity that has ever occurred under heaven.
13  As it is written in the law of Moses, this calamity came full upon us. As we did not appease the LORD, our God, by turning back from our wickedness and recognizing his constancy,
14  so the LORD kept watch over the calamity and brought it upon us. You, O LORD, our God, are just in all that you have done, for we did not listen to your voice.
</span><br data-dcnode-id="311"><span data-dcnode-id="310" instrument_node="">
</span><br data-dcnode-id="309"><span data-dcnode-id="308" instrument_node="">
15  "Now, O Lord, our God, who led your people out of the land of Egypt with a strong hand, and made a name for yourself even to this day, we have sinned, we are guilty.
16  O Lord, in keeping with all your just deeds, let your anger and your wrath be turned away from your city Jerusalem, your holy mountain. On account of our sins and the crimes of our fathers, Jerusalem and your people have become the reproach of all our neighbors.
17  Hear, therefore, O God, the prayer and petition of your servant; and for your own sake, O Lord, let your face shine upon your desolate sanctuary.
18  Give ear, O my God, and listen; open your eyes and see our ruins and the city which bears your name. When we present our petition before you, we rely not on our just deeds, but on your great mercy.
19  O Lord, hear! O Lord, pardon! O Lord, be attentive and act without delay, for your own sake, O my God, because this city and your people bear your name!"
</span><br data-dcnode-id="307"><span data-dcnode-id="306" instrument_node="">
</span><br data-dcnode-id="305"><span data-dcnode-id="304" instrument_node="">
20  I was still occupied with my prayer, confessing my sin and the sin of my people Israel, presenting my petition to the LORD, my God, on behalf of his holy mountain -
21  I was still occupied with this prayer, when </span><b data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Gabriel</span></b><span data-dcnode-id="301" instrument_node="">, the one whom I had seen before in vision, came to me in rapid flight at the time of the evening sacrifice.
22  He instructed me in these words: "Daniel, I have now come to give you understanding.
23  When you began your petition, an answer was given which I have come to announce, because you are beloved. Therefore, mark the answer and understand the vision.
</span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="281" id="poetry"><span data-dcnode-id="298" instrument_node="">
24  "Seventy weeks are decreed for your people and for your holy city: 
</span><br data-dcnode-id="297"><span data-dcnode-id="296" instrument_node="">Then transgression will stop and sin will end, guilt will be expiated, 
</span><br data-dcnode-id="295"><span data-dcnode-id="294" instrument_node="">Everlasting justice will be introduced, vision and prophecy ratified, 
</span><br data-dcnode-id="293"><span data-dcnode-id="292" instrument_node="">and a most holy will be anointed.
</span><br data-dcnode-id="291"><span data-dcnode-id="290" instrument_node="">25  Know and understand this: From the utterance of the word that Jerusalem was to be rebuilt 
</span><br data-dcnode-id="289"><span data-dcnode-id="288" instrument_node="">Until one who is anointed and a leader, there shall be seven weeks. 
</span><br data-dcnode-id="287"><span data-dcnode-id="286" instrument_node="">During sixty-two weeks it shall be rebuilt, With streets and trenches, in time of affliction.
</span><br data-dcnode-id="285"><span data-dcnode-id="284" instrument_node="">26  After the sixty-two weeks an anointed shall be cut down when he does not possess the city; 
</span><br data-dcnode-id="283"><span data-dcnode-id="282" instrument_node="">And the people of a leader who will come shall destroy the sanctuary. 
</span></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">
Then the end shall come like a torrent; until the end there shall be war, the desolation that is decreed.
27  For one week he shall make a firm compact with the many; Half the week he shall abolish sacrifice and oblation; On the temple wing shall be the horrible abomination until the ruin that is decreed is poured out upon the horror."
</span></p><span data-dcnode-id="277" instrument_node="">
</span><br data-dcnode-id="276"><span data-dcnode-id="275" instrument_node="">
</span><div class="chapter" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">
CHAPTER 10
</span></div><span data-dcnode-id="272" instrument_node="">
</span><h3 data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Vision of War</span></h3><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="245"><span data-dcnode-id="268" instrument_node="">
1  In the third year of Cyrus, king of Persia, a revelation was given to Daniel, who had been named Belteshazzar. The revelation was certain: a great war; he understood it from the vision.
2  In those days, I, Daniel, mourned three full weeks.
3  I ate no savory food, I took no meat or wine, and I did not anoint myself at all until the end of the three weeks.
</span><br data-dcnode-id="267"><span data-dcnode-id="266" instrument_node="">
</span><br data-dcnode-id="265"><span data-dcnode-id="264" instrument_node="">
4  On the twenty-fourth day of the first month I was on the bank of the great river, the Tigris.
5  As I looked up, I saw a man dressed in linen with a belt of fine gold around his waist.
6  His body was like chrysolite, his face shown like lightning, his eyes were like fiery torches, his arms and feet looked like burnished bronze, and his voice sounded like the roar of a multitude.
7  I alone, Daniel, saw the vision; but great fear seized the men who were with me; they fled and hid themselves, although they did not see the vision.
8  So I was left alone, seeing this great vision. No strength remained in me; I turned the color of death and was powerless.
9  When I heard the sound of his voice, I fell face forward in a faint.
</span><br data-dcnode-id="263"><span data-dcnode-id="262" instrument_node="">
</span><br data-dcnode-id="261"><span data-dcnode-id="260" instrument_node="">
10  But then a hand touched me, raising me to my hands and knees.
11  "Daniel, beloved," he said to me, "understand the words which I am speaking to you; stand up, for my mission now is to you." When he said this to me, I stood up trembling.
12  "Fear not, Daniel," he continued; "from the first day you made up your mind to acquire understanding and humble yourself before God, your prayer was heard. Because of it I started out,
13  but the prince of the kingdom of Persia stood in my way for twenty-one days, until finally </span><b data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Michael</span></b><span data-dcnode-id="257" instrument_node="">, one of the chief princes, came to help me. I left him there with the prince of the kings of Persia,
14  and came to make you understand what shall happen to your people in the days to come; for there is yet a vision concerning those days."
</span><br data-dcnode-id="256"><span data-dcnode-id="255" instrument_node="">
</span><br data-dcnode-id="254"><span data-dcnode-id="253" instrument_node="">
15  While he was speaking thus to me, I fell forward and kept silent.
16  Then something like a man's hand touched my lips; I opened my mouth and said to the one facing me, "My lord, I was seized with pangs at the vision and I was powerless.
17  How can my lord's servant speak with you, my lord? For now no strength or even breath is left in me."
</span><br data-dcnode-id="252"><span data-dcnode-id="251" instrument_node="">
</span><br data-dcnode-id="250"><span data-dcnode-id="249" instrument_node="">
18  The one who looked like a man touched me again and strengthened me, saying,
19  "Fear not, beloved, you are safe; take courage and be strong."
20  When he spoke to me, I grew strong and said, "Speak, my lord, for you have strengthened me." "Do you know," he asked, "why I have come to you? Soon I must fight the prince of Persia again. When I leave, the prince of Greece will come;
21  but I shall tell you what is written in the truthful book. No one supports me against all these except </span><b data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Michael</span></b><span data-dcnode-id="246" instrument_node="">, your prince,
</span></p><span data-dcnode-id="244" instrument_node="">
</span><br data-dcnode-id="243"><span data-dcnode-id="242" instrument_node="">
</span><div class="chapter" data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">
			CHAPTER 11
</span></div><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="213"><span data-dcnode-id="238" instrument_node="">
1  standing as a reinforcement and a bulwark for me.
2  Now I shall tell you the truth. "Three kings of Persia are yet to come; and a fourth shall acquire the greatest riches of all. Strengthened by his riches, he shall rouse all the kingdom of Greece.
3  But a powerful king shall appear and rule with great might, doing as he pleases.
4  No sooner shall he appear than his kingdom shall be broken and divided in four directions under heaven; but not among his descendants or in keeping with his mighty rule, for his kingdom shall be torn to pieces and belong to others than they.
</span><br data-dcnode-id="237"><span data-dcnode-id="236" instrument_node="">
</span><br data-dcnode-id="235"><span data-dcnode-id="234" instrument_node="">
5  "The king of the south shall grow strong, but one of his princes shall grow stronger still and govern a domain greater than his.
6  After some years they shall become allies: the daughter of the king of the south shall come to the king of the north in the interest of peace. But her bid for power shall fail: and her line shall not be recognized, and she shall be given up, together with those who brought her, her son and her husband. But later
7  a descendant of her line shall succeed to his rank, and shall come against the rampart and enter the stronghold of the king of the north, and conquer them.
8  Even their gods, with their molten images and their precious vessels of silver and gold, he shall carry away as booty into Egypt. For years he shall have nothing to do with the king of the north.
9  Then the latter shall invade the land of the king of the south, and return to his own country.
</span><br data-dcnode-id="233"><span data-dcnode-id="232" instrument_node="">
</span><br data-dcnode-id="231"><span data-dcnode-id="230" instrument_node="">
10  "But his sons shall prepare and assemble a great armed host, which shall advance like a flood, then withdraw. When it returns and surges around the stronghold,
11  the king of the south, provoked, shall go out to fight against the king of the north, whose great host shall make a stand but shall be given into his hand
12  and be carried off. In the pride of his heart, he shall lay low tens of thousands, but he shall not triumph.
13  For the king of the north shall raise another army, greater than before; after some years he shall attack with this large army and great resources.
14  In those times many shall resist the king of the south, and outlaws of your people shall rise up in fulfillment of vision, but they shall fail.
15  When the king of the north comes, he shall set up siegeworks and take the fortified city by storm. The power of the south shall not withstand him, and not even his picked troops shall have the strength to resist.
16  He shall attack him and do as he pleases, with no one to withstand him. He shall stop in the glorious land, dealing destruction.
17  He shall set himself to penetrate the entire strength of his kingdom. He shall conclude an agreement with him and give him a daughter in marriage in order to destroy the kingdom, but this shall not succeed in his favor.
18  He shall turn to the coastland and take many, but a leader shall put an end to his shameful conduct, so that he cannot renew it against him.
19  He shall turn to the strongholds of his own land, but shall stumble and fall, to be found no more.
20  In his stead one shall arise who will send a tax collector through the glorious kingdom, but he shall soon be destroyed, though not in conflict or in battle.
</span><br data-dcnode-id="229"><span data-dcnode-id="228" instrument_node="">
</span><br data-dcnode-id="227"><span data-dcnode-id="226" instrument_node="">
21  "There shall rise in his place a despicable person, to whom the royal insignia shall not be given. By stealth and fraud he shall seize the kingdom.
22  Armed might shall be completely overwhelmed by him and crushed, and even the prince of the covenant.
23  After allying with him, he shall treacherously rise to power with a small party.
24  By stealth he shall enter prosperous provinces and do that which his fathers or grandfathers never did; he shall distribute spoil, booty, and riches among them and devise plots against their strongholds; but only for a time.
25  He shall call on his strength and cleverness to meet the king of the south with a great army; the king of the south shall prepare for battle with a very large and strong army, but he shall not succeed because of the plots devised against him.
26  Even his table companions shall seek to destroy him, his army shall be overwhelmed, and many shall fall slain.
27  The two kings, resolved on evil, shall sit at table together and exchange lies, but they shall have no success, because the appointed end is not yet.
</span><br data-dcnode-id="225"><span data-dcnode-id="224" instrument_node="">
</span><br data-dcnode-id="223"><span data-dcnode-id="222" instrument_node="">
28  "He shall turn back toward his land with great riches, his mind set against the holy covenant; he shall arrange matters and return to his land.
29  At the time appointed he shall come again to the south, but this time it shall not be as before.
30  When ships of the Kittim confront him, he shall lose heart and retreat. Then he shall direct his rage and energy against the holy covenant; those who forsake it he shall once more single out.
31  Armed forces shall move at his command and defile the sanctuary stronghold, abolishing the daily sacrifice and setting up the horrible abomination.
32  By his deceit he shall make some who were disloyal to the covenant apostatize; but those who remain loyal to their God shall take strong action.
33  The nation's wise men shall instruct the many; though for a time they will become victims of the sword, of flames, exile, and plunder.
34  When they fall, few people shall help them, but many shall join them out of treachery.
35  Of the wise men, some shall fall, so that the rest may be tested, refined, and purified, until the end time which is still appointed to come.
</span><br data-dcnode-id="221"><span data-dcnode-id="220" instrument_node="">
</span><br data-dcnode-id="219"><span data-dcnode-id="218" instrument_node="">
36  "The king shall do as he pleases, exalting himself and making himself greater than any god; he shall utter dreadful blasphemies against the God of gods. He shall prosper only till divine wrath is ready, for what is determined must take place.
37  He shall have no regard for the gods of his ancestors or for the one in whom women delight; for no god shall he have regard, because he shall make himself greater than all.
38  Instead, he shall give glory to the god of strongholds; a god unknown to his fathers he shall glorify with gold, silver, precious stones, and other treasures.
39  To defend the strongholds he shall station a people of a foreign god. Whoever acknowledges him he shall provide with abundant honor; he shall make them rule over the many and distribute the land as a reward.
</span><br data-dcnode-id="217"><span data-dcnode-id="216" instrument_node="">
</span><br data-dcnode-id="215"><span data-dcnode-id="214" instrument_node="">
40  "At the appointed time the king of the south shall come to grips with him, but the king of the north shall overwhelm him with chariots and horsemen and a great fleet, passing through the countries like a flood.
41  He shall enter the glorious land and many shall fall, except Edom, Moab, and the chief part of Ammon, which shall escape from his power.
42  He shall extend his power over the countries, and not even the land of Egypt shall escape.
43  He shall control the riches of gold and silver and all the treasures of Egypt; Libya and Ethiopia shall be in his train.
44  When news from the east and the north terrifies him, he shall set out with great fury to slay and to doom many.
45  He shall pitch the tents of his royal pavilion between the sea and the glorious holy mountain, but he shall come to his end with none to help him.
</span></p><span data-dcnode-id="212" instrument_node="">
</span><br data-dcnode-id="211"><span data-dcnode-id="210" instrument_node="">
</span><div class="chapter" data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">
			CHAPTER 12
</span></div><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="184" id="poetry"><span data-dcnode-id="206" instrument_node="">
1  "At that time there shall arise </span><b data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Michael</span></b><span data-dcnode-id="203" instrument_node="">, the great prince, guardian of your people; 
</span><br data-dcnode-id="202"><span data-dcnode-id="201" instrument_node="">It shall be a time unsurpassed in distress since nations began until that time. 
</span><br data-dcnode-id="200"><span data-dcnode-id="199" instrument_node="">At that time your people shall escape, everyone who is found written in the book.
</span><br data-dcnode-id="198"><span data-dcnode-id="197" instrument_node="">
</span><br data-dcnode-id="196"><span data-dcnode-id="195" instrument_node="">
2  Many of those who sleep in the dust of the earth shall awake; 
</span><br data-dcnode-id="194"><span data-dcnode-id="193" instrument_node="">some shall live forever, others shall be an everlasting horror and disgrace.
</span><br data-dcnode-id="192"><span data-dcnode-id="191" instrument_node="">3  But the wise shall shine brightly like the splendor of the firmament, 
</span><br data-dcnode-id="190"><span data-dcnode-id="189" instrument_node="">And those who lead the many to justice shall be like the stars forever.
</span><br data-dcnode-id="188"><span data-dcnode-id="187" instrument_node="">4  "As for you, Daniel, keep secret the message and seal the book until the end time; 
</span><br data-dcnode-id="186"><span data-dcnode-id="185" instrument_node="">many shall fall away and evil shall increase."
</span></p><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="173"><span data-dcnode-id="182" instrument_node="">
5  I, Daniel, looked and saw two others, one standing on either bank of the river.
6  One of them said to the man clothed in linen, who was upstream, "How long shall it be to the end of these appalling things?"
7  The man clothed in linen, who was upstream, lifted his right and left hands to heaven; and I heard him swear by him who lives forever that it should be for a year, two years, a half-year; and that, when the power of the destroyer of the holy people was brought to an end, all these things should end.
8  I heard, but I did not understand; so I asked, "My lord, what follows this?"
</span><br data-dcnode-id="181"><span data-dcnode-id="180" instrument_node="">
9  "Go, Daniel," he said, "because the words are to be kept secret and sealed until the end time.
</span><br data-dcnode-id="179"><span data-dcnode-id="178" instrument_node="">
10  Many shall be refined, purified, and tested, but the wicked shall prove wicked; none of them shall have understanding, but the wise shall have it.
</span><br data-dcnode-id="177"><span data-dcnode-id="176" instrument_node="">
</span><br data-dcnode-id="175"><span data-dcnode-id="174" instrument_node="">
11  From the time that the daily sacrifice is abolished and the horrible abomination is set up, 
there shall be one thousand two hundred and ninety days.
12  Blessed is the man who has patience and perseveres until the one thousand three hundred and thirty-five days.
13  Go, take your rest, you shall rise for your reward at the end of days."
</span></p><span data-dcnode-id="172" instrument_node="">
</span><br data-dcnode-id="171"><span data-dcnode-id="170" instrument_node="">
</span><br data-dcnode-id="169"><span data-dcnode-id="168" instrument_node="">
</span><h2 data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">APPENDIX</span></h2><span data-dcnode-id="165" instrument_node="">
</span><br data-dcnode-id="164"><span data-dcnode-id="163" instrument_node="">
</span><br data-dcnode-id="162"><span data-dcnode-id="161" instrument_node="">
</span><div class="chapter" data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">
			CHAPTER 13
</span></div><span data-dcnode-id="158" instrument_node="">
</span><h3 data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Susanna</span></h3><span data-dcnode-id="155" instrument_node="">
</span><p data-dcnode-id="114"><span data-dcnode-id="115" style="color:navy"><span data-dcnode-id="154" instrument_node="">
1 Now there was a man that dwelt in Babylon, and his name was Joakim: 2 And he took a wife whose name was </span><b data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">Susanna</span></b><span data-dcnode-id="151" instrument_node="">, the daughter of Helcias, a very beautiful woman, and one that feared God. 3 For her parents being just, had instructed their daughter according to the law of Moses. 4 Now Joakim was very rich, and had an orchard near his house: and the Jews resorted to him, because he was the most honourable of them all. 5 And there were two of the ancients of the people appointed judges that year, of whom the Lord said: Iniquity came out from Babylon from the ancient judges, that seemed to govern the people.
</span><br data-dcnode-id="150"><span data-dcnode-id="149" instrument_node="">
</span><br data-dcnode-id="148"><span data-dcnode-id="147" instrument_node="">
6 These men frequented the house of Joakim, and all that had any matters of judgment came to them. 7 And when the people departed away at noon, Susanna went in, and walked in her husband's orchard. 8 And the old men saw her going in every day, and walking: and they were inflamed with lust towards her: 9 And they perverted their own mind and turned away their eyes that they might not look unto heaven, nor remember just judgments. 10 So they were both wounded with the love of her, yet they did not make known their grief one to the other:  11 For they were ashamed to declare to one another their lust, being desirous to have to do with her. 
</span><br data-dcnode-id="146"><span data-dcnode-id="145" instrument_node="">
</span><br data-dcnode-id="144"><span data-dcnode-id="143" instrument_node="">
12 And they watched carefully every day to see her. And one said to the other: 13 Let us now go home, for it is dinner time. So going out they departed one from another. 14 And turning back again, they came both to the same place: and asking one another the cause, they acknowledged their lust; and then they agreed upon a time, when they might find her alone. 15 And it fell out, as they watched a fit day, she went in on a time, as yesterday and the day before, with two maids only, and was desirous to wash herself in the orchard: for it was hot weather.
</span><br data-dcnode-id="142"><span data-dcnode-id="141" instrument_node="">
</span><br data-dcnode-id="140"><span data-dcnode-id="139" instrument_node="">
16 And there was nobody there, but the two old men that had hid themselves and were beholding her. 17 So she said to the maids: Bring me oil, and washing balls, and shut the doors of the orchard, that I may wash me. 18 And they did as she bade them: and they shut the doors of the orchard, and went out by a back door to fetch what she had commanded them, and they knew not that the elders were hid within. 19 Now when the maids were gone forth, the two elders arose, and ran to her, and said: 20 Behold the doors of the orchard are shut, and nobody seeth us, and we are in love with thee: wherefore consent to us, and lie with us.
</span><br data-dcnode-id="138"><span data-dcnode-id="137" instrument_node="">
</span><br data-dcnode-id="136"><span data-dcnode-id="135" instrument_node="">
21 But if thou wilt not, we will bear witness against thee, that a young man was with thee, and therefore thou didst send away thy maids from thee. 22 Susanna sighed, and said: I am straitened on every side: for if I do this thing, it is death to me: and if I do it not, I shall not escape your hands. 23 But it is better for me to fall into your hands without doing it, than to sin in the sight of the Lord. 24 With that Susanna cried out with a loud voice: and the elders also cried out against her. 25 And one of them ran to the door of the orchard, and opened it.
</span><br data-dcnode-id="134"><span data-dcnode-id="133" instrument_node="">
</span><br data-dcnode-id="132"><span data-dcnode-id="131" instrument_node="">
26 So when the servants of the house heard the cry in the orchard, they rushed in by the back door to see what was the matter. 27 But after the old men had spoken, the servants were greatly ashamed: for never had there been any such word said of Susanna. And on the next day, 28 When the people were come to Joakim her husband, the two elders also came full of wicked device against Susanna, to put her to death. 29 And they said before the people: Send to Susanna daughter of Helcias the wife of Joakim. And presently they sent. 30 And she came with her parents, and children, and all her kindred.
</span><br data-dcnode-id="130"><span data-dcnode-id="129" instrument_node="">
</span><br data-dcnode-id="128"><span data-dcnode-id="127" instrument_node="">
31 Now Susanna was exceeding delicate, and beautiful to behold. 32 But those wicked men commanded that her face should be uncovered, (for she was covered,) that so at least they might be satisfied with her beauty. 33 Therefore her friends and all her acquaintance wept. 34 But the two elders rising up in the midst of the people, laid their hands upon her head. 35 And she weeping looked up to heaven, for her heart had confidence in the Lord.
</span><br data-dcnode-id="126"><span data-dcnode-id="125" instrument_node="">
</span><br data-dcnode-id="124"><span data-dcnode-id="123" instrument_node="">
36 And the elders said: As we walked in the orchard alone, this woman came in with two maids, and shut the doors of the orchard, and sent away the maids from her. 37 Then a young man that was there hid came to her, and lay with her. 38 But we that were in a corner of the orchard, seeing this wickedness, ran up to them, and we saw them lie together. 39 And him indeed we could not take, because he was stronger than us, and opening the doors he leaped out: 40 But having taken this woman, we asked who the young man was, but she would not tell us: of this thing we are witnesses.
</span><br data-dcnode-id="122"><span data-dcnode-id="121" instrument_node="">
</span><br data-dcnode-id="120"><span data-dcnode-id="119" instrument_node="">
41 The multitude believed them as being the elders and the judges of the people, and they condemned her to death. 42 Then Susanna cried out with a loud voice, and said: O eternal God, who knowest hidden things, who knowest all things before they come to pass, 43 Thou knowest that they have borne false witness against me: and behold I must die, whereas I have done none of these things, which these men have maliciously forged against me. 44 And the Lord heard her voice. 45 And when she was led to be put to death, the Lord raised up the holy spirit of a young boy, whose name was </span><b data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">Daniel</span></b><span data-dcnode-id="116" instrument_node="">.
</span></span></p><span data-dcnode-id="113" instrument_node="">
</span><h3 data-dcnode-id="111"><span data-dcnode-id="112" instrument_node="">Daniel Cries Out For Justice</span></h3><span data-dcnode-id="110" instrument_node="">
</span><p data-dcnode-id="83"><span data-dcnode-id="84" style="color:navy"><span data-dcnode-id="109" instrument_node="">
46 And he cried out with a loud voice I am clear from the blood of this woman. 47 Then all the people turning themselves towards him, said: What meaneth this word that thou hast spoken? 48 But he standing in the midst of them, said: Are ye so foolish, ye children of Israel, that without examination or knowledge of the truth, you have condemned a daughter of Israel? 49 Return to judgment, for they have borne false witness against her. 50 So all the people turned again in haste, and the old men said to him: Come, and sit thou down among us, and shew it us: seeing God hath given thee the honour of old age.
</span><br data-dcnode-id="108"><span data-dcnode-id="107" instrument_node="">
</span><br data-dcnode-id="106"><span data-dcnode-id="105" instrument_node="">
51 And Daniel said to the people: Separate these two far from one another, and I will examine them. 
</span><br data-dcnode-id="104"><span data-dcnode-id="103" instrument_node="">
</span><br data-dcnode-id="102"><span data-dcnode-id="101" instrument_node="">
52 So when they were put asunder one from the other, he called one of them, and said to him: O thou that art grown old in evil days, now are thy sins come out, which thou hast committed before: 53 In judging unjust judgments, oppressing the innocent, and letting the guilty to go free, whereas the Lord saith: The innocent and the just thou shalt not kill. 54 Now then, if thou sawest her, tell me under what tree thou sawest them conversing together. He said: Under a mastic tree. 55 And Daniel said: Well hast thou lied against thy own head: for behold the angel of God having received the sentence of him, shall cut thee in two.
</span><br data-dcnode-id="100"><span data-dcnode-id="99" instrument_node="">
</span><br data-dcnode-id="98"><span data-dcnode-id="97" instrument_node="">
56 And having put him aside, he commanded that the other should come, and he said to him: O thou seed of Chanaan, and not of Juda, beauty hath deceived thee, and lust hath perverted thy heart: 57 Thus did you do to the daughters of Israel, and they for fear conversed with you: but a daughter of Juda would not abide your wickedness. 58 Now therefore tell me, under what tree didst thou take them conversing together. And he answered: Under a holm tree. 59 And Daniel said to him: Well hast thou also lied against thy own head: for the angel of the Lord waiteth with a sword to cut thee in two, and to destroy you. 
</span><br data-dcnode-id="96"><span data-dcnode-id="95" instrument_node="">
</span><br data-dcnode-id="94"><span data-dcnode-id="93" instrument_node="">
60 With that all the assembly cried out with a loud voice, and they blessed God, who saveth them that trust in him.
61 And they rose up against the two elders, (for Daniel had convicted them of false witness by their own mouth,) and they did to them as they had maliciously dealt against their neighbour, 62 To fulfill the law of Moses: and they put them to death, and innocent blood was saved in that day. 
</span><br data-dcnode-id="92"><span data-dcnode-id="91" instrument_node="">
</span><br data-dcnode-id="90"><span data-dcnode-id="89" instrument_node="">
63 But Helcias and his wife praised God, for their daughter Susanna, with Joakim her husband, and all her kindred, because there was no dishonesty found in her. 64 And Daniel became great in the sight of the people from that day, and thenceforward. 
</span><br data-dcnode-id="88"><span data-dcnode-id="87" instrument_node="">
</span><br data-dcnode-id="86"><span data-dcnode-id="85" instrument_node="">
65 And king Astyages was gathered to his fathers, and Cyrus the Persian received his kingdom.
</span></span></p><span data-dcnode-id="82" instrument_node="">
</span><br data-dcnode-id="81"><span data-dcnode-id="80" instrument_node="">
</span><div class="chapter" data-dcnode-id="78"><span data-dcnode-id="79" instrument_node="">
			CHAPTER 14
</span></div><span data-dcnode-id="77" instrument_node="">
</span><h3 data-dcnode-id="75"><span data-dcnode-id="76" instrument_node="">Bel</span></h3><span data-dcnode-id="74" instrument_node="">
</span><p data-dcnode-id="59"><span data-dcnode-id="60" style="color:navy"><span data-dcnode-id="73" instrument_node="">
1 And Daniel was the king's guest, and was honoured above all his friends. 2 Now the Babylonians had an idol called Bel: and there were spent upon him every day twelve great measures of fine flour, and forty sheep, and sixty vessels of wine. 3 The king also worshipped him, and went every day to adore him: but Daniel adored his God. And the king said to him: Why dost thou not adore Bel? 4 And he answered, and said to him: Because I do not worship idols made with hands, but the living God, that created heaven and earth, and hath power over all flesh. 5 And the king said to him: Doth not Bel seem to thee to be a living god? Seest thou not how much he eateth and drinketh every day?
</span><br data-dcnode-id="72"><span data-dcnode-id="71" instrument_node="">
</span><br data-dcnode-id="70"><span data-dcnode-id="69" instrument_node="">
6 Then Daniel smiled and said: O king, be not deceived: for this is but clay within, and brass without, neither hath he eaten at any time. 7 And the king being angry called for his priests, and said to them: If you tell me not, who it is that eateth up these expenses, you shall die. 8 But if you can shew that Bel eateth these things, Daniel shall die, because he hath blasphemed against Bel. And Daniel said to the king: Be it done according to thy word. 9 Now the priests of Bel were seventy, besides their wives, and little ones, and children. And the king went with Daniel into the temple of Bel. 10 And the priests of Bel said: Behold we go out: and do thou, O king, set on the meats, and make ready the wine, and shut the door fast, and seal it with thy own ring:  11 And when thou comest in the morning, if thou findest not that Bel hath eaten up all, we will suffer death, or else Daniel that hath lied against us. 
</span><br data-dcnode-id="68"><span data-dcnode-id="67" instrument_node="">
</span><br data-dcnode-id="66"><span data-dcnode-id="65" instrument_node="">
12 And they little regarded it, because they had made under the table a secret entrance, and they always came in by it, and consumed those things. 13 So it came to pass after they were gone out, the king set the meats before Bel: and Daniel commanded his servants, and they brought ashes, and he sifted them all over the temple before the king: and going forth they shut the door, and having sealed it with the king's ring, they departed. 14 But the priests went in by night, according to their custom, with their wives and their children: and they ate and drank up all. 15 And the king arose early in the morning, and Daniel with him.
</span><br data-dcnode-id="64"><span data-dcnode-id="63" instrument_node="">
</span><br data-dcnode-id="62"><span data-dcnode-id="61" instrument_node="">
16 And the king said: Are the seals whole, Daniel? And he answered: They are whole, O king. 17 And as soon as he had opened the door, the king looked upon the table, and cried out with a loud voice: Great art thou, O Bel, and there is not any deceit with thee. 18 And Daniel laughed: and he held the king that he should not go in: and he said: Behold the pavement, mark whose footsteps these are. 19 And the king said: I see the footsteps of men, and women, and children. And the king was angry. 20 Then he took the priests, and their wives, and their children: and they shewed him the private doors by which they came in, and consumed the things that were on the table. 
21 The king therefore put them to death, and delivered Bel into the power of Daniel: who destroyed him, and his temple. 
</span></span></p><span data-dcnode-id="58" instrument_node="">
</span><h3 data-dcnode-id="56"><span data-dcnode-id="57" instrument_node="">The Dragon</span></h3><span data-dcnode-id="55" instrument_node="">
</span><p data-dcnode-id="48"><span data-dcnode-id="49" style="color:navy"><span data-dcnode-id="54" instrument_node="">
22 And there was a great dragon in that place, and the Babylonians worshipped him. 23 And the king said to Daniel: Behold thou canst not say now, that this is not a living god: adore him therefore. 24 And Daniel said: I adore the Lord my God: for he is the living God: but that is no living god. 25 But give me leave, O king, and I will kill this dragon without sword or club. And the king said: I give thee leave.
</span><br data-dcnode-id="53"><span data-dcnode-id="52" instrument_node="">
</span><br data-dcnode-id="51"><span data-dcnode-id="50" instrument_node="">
26 Then Daniel took pitch, and fat, and hair, and boiled them together: and he made lumps, and put them into the dragon's mouth, and the dragon burst asunder. And he said: Behold him whom you worshipped. 
</span></span></p><span data-dcnode-id="47" instrument_node="">
</span><h3 data-dcnode-id="45"><span data-dcnode-id="46" instrument_node="">The Rescue of Daniel</span></h3><span data-dcnode-id="44" instrument_node="">
</span><p data-dcnode-id="14"><span data-dcnode-id="15" style="color:navy"><span data-dcnode-id="43" instrument_node="">
27 And when the Babylonians had heard this, they took great indignation: and being gathered together against the king, they said: The king is become a Jew. He hath destroyed Bel, he hath killed the dragon, and he hath put the priests to death. 28 And they came to the king, and said: Deliver us Daniel, or else we will destroy thee and thy house. 29 And the king saw that they pressed upon him violently: and being constrained by necessity he delivered Daniel to them. 
</span><br data-dcnode-id="42"><span data-dcnode-id="41" instrument_node="">
</span><br data-dcnode-id="40"><span data-dcnode-id="39" instrument_node="">
30 And they cast him into the den of lions, and he was there six days.
31 And in the den there were seven lions, and they had given to them two carcasses every day, and two sheep: 
but then they were not given unto them, that they might devour Daniel. 
</span><br data-dcnode-id="38"><span data-dcnode-id="37" instrument_node="">
</span><br data-dcnode-id="36"><span data-dcnode-id="35" instrument_node="">
32 Now there was in Judea a prophet called </span><b data-dcnode-id="33"><span data-dcnode-id="34" instrument_node="">Habacuc</span></b><span data-dcnode-id="32" instrument_node="">, and he had boiled pottage, and had broken bread in a bowl: and was going into the field, to carry it to the reapers. 33 And the angel of the Lord said to Habacuc: Carry the dinner which thou hast into Babylon to Daniel, who is in the lions' den. 
</span><br data-dcnode-id="31"><span data-dcnode-id="30" instrument_node="">
</span><br data-dcnode-id="29"><span data-dcnode-id="28" instrument_node="">
34 And Habacuc said: Lord, I never saw Babylon, nor do I know the den. 35 And the angel of the Lord took him by the top of his head, and carried him by the hair of his head, and set him in Babylon over the den in the force of his spirit.
</span><br data-dcnode-id="27"><span data-dcnode-id="26" instrument_node="">
</span><br data-dcnode-id="25"><span data-dcnode-id="24" instrument_node="">
36 And Habacuc cried, saying: O Daniel, thou servant of God, take the dinner that God hath sent thee. 37 And Daniel said: Thou hast remembered me, O God, and thou hast not forsaken them that love thee. 38 And Daniel arose and ate. And the angel of the Lord presently set Habacuc again in his own place. 
</span><br data-dcnode-id="23"><span data-dcnode-id="22" instrument_node="">
</span><br data-dcnode-id="21"><span data-dcnode-id="20" instrument_node="">
39 And upon the seventh day the king came to bewail Daniel: and he came to the den, and looked in, and behold Daniel was sitting in the midst of the lions. 
40 And the king cried out with a loud voice, saying: Great art thou, O Lord the God of Daniel. And he drew him out of the lions' den.
41 But those that had been the cause of his destruction, he cast into the den, and they were devoured in a moment before him. 
</span><br data-dcnode-id="19"><span data-dcnode-id="18" instrument_node="">
</span><br data-dcnode-id="17"><span data-dcnode-id="16" instrument_node="">
42 Then the king said: Let all the inhabitants of the whole earth fear the God of Daniel: for he is the Saviour, working signs, and wonders in the earth: who hath delivered Daniel out of the lions' den.
</span></span></p><span data-dcnode-id="13" instrument_node="">
</span><br data-dcnode-id="12"><span data-dcnode-id="11" instrument_node="">
</span><br data-dcnode-id="10"><span data-dcnode-id="9" instrument_node="">
