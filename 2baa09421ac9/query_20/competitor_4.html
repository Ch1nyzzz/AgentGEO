</span><p data-dcnode-id="956"><span data-dcnode-id="959" instrument_node="">
</span><span data-dcnode-id="957" instrument_node="">
</span></p><span data-dcnode-id="955" instrument_node="">
</span></center><span data-dcnode-id="953" instrument_node="">
</span><p align="center" data-dcnode-id="951"><img alt="horizontal rule" data-dcnode-id="952" height="10" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.religioustolerance.org/_themes/topo/topruled.gif&amp;raw" width="600"></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="949" instrument_node="">Some insightful Bible students noticed, the proof lies in the obvious 
identity that exists between Daniel's "the king of the north" in the last days 
and Ezekiel's "Gog" of the latter days. By comparing what is said about each of 
them in the two prophecies, it is manifest that they can only be different 
titles for the same being. </span><br data-dcnode-id="948"><span data-dcnode-id="947" instrument_node="">
</span><br data-dcnode-id="946"><span data-dcnode-id="945" instrument_node="">
Ezekiel Chapter 38 and 39 = Daniel 11:45</span></p><span data-dcnode-id="943" instrument_node="">
</span><ol data-dcnode-id="929"><span data-dcnode-id="942" instrument_node="">
</span><li data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Their geographical position is the same. "Gog's" country is in the north 
	part in relation to the Holy Land; as it is written, "Thou shalt come from 
	thy place out of the north parts". "Gog" is therefore "the king of the 
	north", his place or country being there. </span></li><span data-dcnode-id="939" instrument_node="">
</span><li data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Both of them are adversaries of Israel and invaders of the Holy Land. 
	The eleventh chapter of Daniel abundantly proves this in relation to "the 
	king of the north"; and of "Gog", Yahoueh said: "Thou shalt come up against 
	my people Israel, as a cloud to cover the land". </span></li><span data-dcnode-id="936" instrument_node="">
</span><li data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">The time they invade the land is the same. "The king of the north" 
	invades in the last days. Of "Gog" it is said: "It shall be in the latter 
	days, and I will bring thee against my land". </span></li><span data-dcnode-id="933" instrument_node="">
</span><li data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">The same peoples are named as components of their armies. The Libyans 
	and Ethiopians are allies with "the king of the north"; and in the 
	enumeration of Gog's forces, it says, "Persia, Ethiopia, and Libya with 
	them". </span></li><span data-dcnode-id="930" instrument_node="">
</span></ol><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="927" instrument_node="">Who is "Gog"? Which land is the land of "Magog"? </span><br data-dcnode-id="926"><span data-dcnode-id="925" instrument_node="">
Some people think that "Gog" is the Devil. But does the context support this 
idea? Ezekiel wrote that after "Gog's" last attack he will fall and then be 
buried by the people. (Ez.39:4,11) So there is no need to prove that "Gog" 
represents the Devil as we know that the devil does not have a body of flesh and 
bone and has no need for a grave. Thus, in actuality, whom does "Gog" symbolize?
</span><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">
</span><br data-dcnode-id="922"><span data-dcnode-id="921" instrument_node="">
"Gog" is the chief prince of Meschech and Tubal. Meshech, the sixth son of 
Japheth (Genesis 10:2) is the founder of a tribe (1 Chronicles 1:5; Ezekiel 
27:13; 38:2,3). They were in all probability the Moschi people, inhabiting the 
Moschian Mountains, between the Black and the Caspian Seas. In Psalms 120:5 the 
name occurs simply as a synonym for foreigners or barbarians. "During the 
ascendancy of the Babylonians and Persians in Western Asia, the Moschi were 
subdued; but it seems probable that a large number of them crossed the Caucasus 
range and spread over the northern steppes, mingling with the Scythians. There 
they became known as Muscovs and gave this name to the Russian nation and its 
ancient capital by which they are still generally known throughout the East" 
(Easton's Bible Dictionary). </span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="918" instrument_node="">Many ancient sources have clearly identified "Magog" as referring to the "Scythians".
</span><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node="">
One of the earliest references to Magog was made by Hesiod, "the father of Greek 
didactic poetry" who identified Magog with the Scythians and southern Russia in 
the 7th century B.C. Hesiod was a contemporary of Ezekiel.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="913" instrument_node="">Josephus Flavius clearly identified Magog. "Magog founded the Magogians, thus 
named after him, but who were by the Greeks called Scythians". (Josephus, 
Antiquities, 1.123; Jerome, Commentary on Ezekiel 38:2) </span><br data-dcnode-id="912"><span data-dcnode-id="911" instrument_node="">
</span><br data-dcnode-id="910"><span data-dcnode-id="909" instrument_node="">
The Greek historian Herodotus wrote that in the fifth century B.C. the Scythians 
ruled from the Don River, in present southern Russia, to the Carpathian 
Mountains in central Europe. </span><br data-dcnode-id="908"><span data-dcnode-id="907" instrument_node="">
</span><br data-dcnode-id="906"><span data-dcnode-id="905" instrument_node="">
Philo, is another historian in the first century A.D. who identified "Magog" 
with southern Russia. </span><br data-dcnode-id="904"><span data-dcnode-id="903" instrument_node="">
</span><br data-dcnode-id="902"><span data-dcnode-id="901" instrument_node="">
Ancient authorities clearly identified the Scythians as the ancestors of the 
present day Russians. </span><br data-dcnode-id="900"><span data-dcnode-id="899" instrument_node="">
</span><br data-dcnode-id="898"><span data-dcnode-id="897" instrument_node="">
However, even without that information, the identity of "Magog" is not too 
difficult to figure out. In Ezekiel 38:15, it says: "And thou shalt come from 
thy place out of the north parts, thou, and many people with thee". The "north 
parts" is literally the "extreme, or uttermost" parts of the north. </span><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">
</span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">
Who are "the kings of the north" and "south"? Who are the "kings" of this 
chapter? </span><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node="">
</span><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node="">
</span><b data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Daniel 11:2 </span></b><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node="">
Since the Prophecy was given in the third year of Cyrus (Daniel 10:1), the three 
kings that were to "stand up yet", that is, "after him", were Cambyses II, 
Smerdis the Magian imposter, Darius I Hystaspes.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="882" instrument_node="">The fourth king, Xerxes I, stirred up Persia against Greece, which he invaded 
in 480 B.C. but failed to conquer. Since prophecy touches only upon important 
events and characters, the remaining kings of Persia are omitted, and the 
prophecy jumps over nearly 150 years to the time of Alexander the Great 336-323 
B.C.E. </span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">
</span><br data-dcnode-id="879"><span data-dcnode-id="878" instrument_node="">
</span><b data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Daniel 11:3,4 </span></b><br data-dcnode-id="875"><span data-dcnode-id="874" instrument_node="">
"A valiant king", Alexander the Great, whose kingdom after his death was divided 
into four parts. </span><br data-dcnode-id="873"><span data-dcnode-id="872" instrument_node="">
1) Seleucus I - who began the Seleucid (Syrian) empire, from Turkey to India.
</span><br data-dcnode-id="871"><span data-dcnode-id="870" instrument_node="">
2) Cassander - who took over Macedonia (Greece). </span><br data-dcnode-id="869"><span data-dcnode-id="868" instrument_node="">
3) Lysimachus - who took Thracia (between Greece and Turkey). </span><br data-dcnode-id="867"><span data-dcnode-id="866" instrument_node="">
4) Ptolemy I - who ruled over Egypt. </span><br data-dcnode-id="865"><span data-dcnode-id="864" instrument_node="">
</span><br data-dcnode-id="863"><span data-dcnode-id="862" instrument_node="">
</span><b data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Daniel 11:5 </span></b><br data-dcnode-id="859"><span data-dcnode-id="858" instrument_node="">
After the death of Alexander the Great in 323 B.C., the throne of Egypt fell to 
Ptolemy I Soter, the son of Lagus, the king of the south. </span><br data-dcnode-id="857"><span data-dcnode-id="856" instrument_node="">
"One of his princes", Seleucus I, Nicator ["the king of the north"] also rose to 
power, and took over the region of Syria. He eventually became more powerful 
than his former Egyptian ruler. </span><br data-dcnode-id="855"><span data-dcnode-id="854" instrument_node="">
</span><br data-dcnode-id="853"><span data-dcnode-id="852" instrument_node="">
</span><b data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Daniel 11:6 </span></b><br data-dcnode-id="849"><span data-dcnode-id="848" instrument_node="">
"The daughter of the king of the south" = Berenice II, daughter of Ptolemy II 
Philadelphus. </span><br data-dcnode-id="847"><span data-dcnode-id="846" instrument_node="">
"The king of the north" = Antiochus II Theos. </span><br data-dcnode-id="845"><span data-dcnode-id="844" instrument_node="">
Two years after the marriage, Berenice's father (Ptolemy Philadelphus) died. </span><br data-dcnode-id="843"><span data-dcnode-id="842" instrument_node="">
Antiochus restored Laodice and put away Berenice. </span><br data-dcnode-id="841"><span data-dcnode-id="840" instrument_node="">
He was then poisoned by Laodice. </span><br data-dcnode-id="839"><span data-dcnode-id="838" instrument_node="">
Berenice fled with her children to Daphne where she was killed. </span><br data-dcnode-id="837"><span data-dcnode-id="836" instrument_node="">
</span><br data-dcnode-id="835"><span data-dcnode-id="834" instrument_node="">
</span><b data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Daniel 11:7-9</span></b><span data-dcnode-id="831" instrument_node=""> </span><br data-dcnode-id="830"><span data-dcnode-id="829" instrument_node="">
A "branch of her roots" will come with an army. This was Berenice's brother, 
Ptolemy III Euregetes, "the king of the south". </span><br data-dcnode-id="828"><span data-dcnode-id="827" instrument_node="">
"The king of the north" is Seleucus II Kallinikos, son of Laodice who was 
defeated in a later invasion of Egypt. He lost most of Asia Minor along with 
losing to the military expansion of Ptolemy III who put his mother, Laodice, to 
death. </span><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">
Verse 9: "And [the king of the north] will enter into the kingdom of the king of 
the south, but will return to his own land". (literal translation) </span><br data-dcnode-id="824"><span data-dcnode-id="823" instrument_node="">
Seleucus II, son of the deceased Laodice, sought revenge for the vengeance taken 
by Ptolemy III. "Justin says that he fitted out a great fleet, which was 
destroyed by a violent storm; and after this he raised a great army to recover 
his dominion, but was defeated by Ptolemy, and fled in great terror and 
trembling to Antioch" (Gill's Commentary). </span><br data-dcnode-id="822"><span data-dcnode-id="821" instrument_node="">
</span><br data-dcnode-id="820"><span data-dcnode-id="819" instrument_node="">
</span><b data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Daniel 11:10-12 </span></b><br data-dcnode-id="816"><span data-dcnode-id="815" instrument_node="">
His ["the king of the north"] sons = Seleucus III Ceraunus and Antiochus III the 
Great. </span><br data-dcnode-id="814"><span data-dcnode-id="813" instrument_node="">
"The king of the north" = Antiochus III, the Great. </span><br data-dcnode-id="812"><span data-dcnode-id="811" instrument_node="">
"The king of the south" = Ptolemy IV Philopator. </span><br data-dcnode-id="810"><span data-dcnode-id="809" instrument_node="">
Ptolemy IV defeated the much larger army of Antiochus III at the Battle of 
Raphia in 217. </span><br data-dcnode-id="808"><span data-dcnode-id="807" instrument_node="">
</span><br data-dcnode-id="806"><span data-dcnode-id="805" instrument_node="">
</span><b data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Daniel 11:13-17</span></b><span data-dcnode-id="802" instrument_node=""> </span><br data-dcnode-id="801"><span data-dcnode-id="800" instrument_node="">
"The king of the south" = Ptolemy V Epiphanes. </span><br data-dcnode-id="799"><span data-dcnode-id="798" instrument_node="">
"The king of the north" = Antiochus III. </span><br data-dcnode-id="797"><span data-dcnode-id="796" instrument_node="">
Antiochus III gives his daughter Cleopatra I to Ptolemy V, in hopes of permanent 
influence in Egypt. </span><br data-dcnode-id="795"><span data-dcnode-id="794" instrument_node="">
Verse 14a: "And in those times many will rise against the king of the south".
</span><br data-dcnode-id="793"><span data-dcnode-id="792" instrument_node="">
At this time, many of the Egyptians began rebelling against the ruling Grecian 
family and began rioting and defying them. </span><br data-dcnode-id="791"><span data-dcnode-id="790" instrument_node="">
</span><br data-dcnode-id="789"><span data-dcnode-id="788" instrument_node="">
Verse 14b: "And the sons of the violent ones of your people shall rise up to 
establish the vision, but they shall stumble". (LIT) </span><br data-dcnode-id="787"><span data-dcnode-id="786" instrument_node="">
This verse speaks of the violent sons of Daniel's nation. Many commentators 
suggest that these people will stand up against the king of the south, but this 
text foretells that these people will lift themselves up to establish the 
vision. They were called a violent people by Ezekiel who in this way described 
them as shedders of blood. (18:10a) The word vision [in Aramaic chezev; in 
Hebrew chazown] is used in the Book of Daniel e.g. in: 7:1,2,7,13,15; 
8:1,2,13,15,17,26; 9:24; 10:14; 11:14. All of these visions prophecy of the 
future persecution of God's nation, that would be fulfilled in the distant 
future. (Daniel 8:17; 10:14) </span><br data-dcnode-id="785"><span data-dcnode-id="784" instrument_node="">
What kind of violent people would lift themselves in the ancient time, to 
fulfill the inspired visions and prophecies before their time? The First Book of 
the Maccabees clearly indicates the Maccabees as being these violent people. 
(1:54; 6:7) Until now, many commentators believe that the Maccabees fulfilled 
the prophecies of the Book of Daniel. But Jesus said that the vision which 
concerns the abomination of desolation and the persecutions of God's nation will 
be fulfilled in the future. (Compare Matthew 24:15; Revelation 13:1-8) </span><br data-dcnode-id="783"><span data-dcnode-id="782" instrument_node="">
</span><br data-dcnode-id="781"><span data-dcnode-id="780" instrument_node="">
Verse 11:16b "and he standeth in the desirable land, and it is wholly in his 
hand". (YLT) </span><br data-dcnode-id="779"><span data-dcnode-id="778" instrument_node="">
After one hundred years, Palestine again changed hands. The Seleucid king, 
Antiochus III, took control of Palestine c. 200 B.C.E. </span><br data-dcnode-id="777"><span data-dcnode-id="776" instrument_node="">
</span><br data-dcnode-id="775"><span data-dcnode-id="774" instrument_node="">
</span><b data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Daniel 11:18 </span></b><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node="">
Antioch III against the Roman Empire. </span><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">
"Ruler" = Lucius Cornelius, the Roman general. </span><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">
The Romans humbled him (191) at Thermopylae and again at Magnesia (190). </span><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">
</span><br data-dcnode-id="763"><span data-dcnode-id="762" instrument_node="">
</span><b data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Daniel 11:19a </span></b><br data-dcnode-id="759"><span data-dcnode-id="758" instrument_node="">
Subsequently, Antiochus was forced to campaign within his own lands to stop his 
satraps from declaring themselves independent rulers. </span><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node="">
</span><br data-dcnode-id="755"><span data-dcnode-id="754" instrument_node="">
</span><b data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Daniel 11:19b</span></b><span data-dcnode-id="751" instrument_node=""> </span><br data-dcnode-id="750"><span data-dcnode-id="749" instrument_node="">
"He shall stumble and fall, and shall not be found" = end of the period of 
greatness for the Seleucid Empire. (Compare Revelation 18:21; Jeremiah 51:64)
</span><br data-dcnode-id="748"><span data-dcnode-id="747" instrument_node="">
</span><br data-dcnode-id="746"><span data-dcnode-id="745" instrument_node="">
</span><b data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Daniel 11:20 </span></b><br data-dcnode-id="742"><span data-dcnode-id="741" instrument_node="">
"And stood up on his station hath one causing an exactor to pass over the honour 
of the kingdom, and in a few days he is destroyed, and not in anger, nor in 
battle". (YLT) </span><br data-dcnode-id="740"><span data-dcnode-id="739" instrument_node="">
</span><br data-dcnode-id="738"><span data-dcnode-id="737" instrument_node="">
"The king of the north" = Caesar Augustus. The first Roman emperor. </span><br data-dcnode-id="736"><span data-dcnode-id="735" instrument_node="">
"The king of the south" not on the scene. </span><br data-dcnode-id="734"><span data-dcnode-id="733" instrument_node="">
</span><br data-dcnode-id="732"><span data-dcnode-id="731" instrument_node="">
In 2 B.C., Augustus sent out "an exactor" by ordering a registration, or census, 
most likely to learn the size of the population for purposes of taxation and 
military conscription. Because of this decree, Joseph and Mary traveled to 
Bethlehem for registration, resulting in Jesus' birth at that foretold location. 
(Micah 5:2; Matthew 2:1-12) </span><br data-dcnode-id="730"><span data-dcnode-id="729" instrument_node="">
</span><br data-dcnode-id="728"><span data-dcnode-id="727" instrument_node="">
Daniel didn’t prophecy that "the king of the north" would die "after a few days" 
from this event, but would die in the undetermined future "after a few days". In 
the end of July, in the year 14 A.D., August left Rome. He took a vacation in 
his old age and health. On the 19th of August, after a short sickness, he 
"passed away peacefully, not feeling any pain". While traveling in Campania, 
Augustus died "in a few days", neither "in anger" at an assassin's hands nor "in 
warfare", but after a short illness. </span><br data-dcnode-id="726"><span data-dcnode-id="725" instrument_node="">
</span><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node="">
Many say that "the king of the north" is Seleucus IV Philopater, who sent out 
his finance minister, Heliodorus to collect taxes. But Seleucus was murdered in 
a conspiracy engineered by Heliodorus. It is said that the king here was to 
however die a natural death (not one of anger or of battle). Therefore, this 
writing does not conform to Seleucus IV. Also, verse 21 cannot carry over to the 
rule of Antiochus IV Epiphanes. </span><br data-dcnode-id="722"><span data-dcnode-id="721" instrument_node="">
</span><br data-dcnode-id="720"><span data-dcnode-id="719" instrument_node="">
</span><b data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Daniel 11:21-23 </span></b><br data-dcnode-id="716"><span data-dcnode-id="715" instrument_node="">
Verse 21: "And in his place shall arise a despised. And they will not give him 
the royal majesty. He will come in a time of peace and will seize the kingdom 
through duplicity". </span><br data-dcnode-id="714"><span data-dcnode-id="713" instrument_node="">
</span><br data-dcnode-id="712"><span data-dcnode-id="711" instrument_node="">
"The king of the north" = Tiberius 14-37. </span><br data-dcnode-id="710"><span data-dcnode-id="709" instrument_node="">
"The king of the south" not on the scene. </span><br data-dcnode-id="708"><span data-dcnode-id="707" instrument_node="">
</span><br data-dcnode-id="706"><span data-dcnode-id="705" instrument_node="">
"The ruler of the covenant" = Jesus [Yeshua]. </span><br data-dcnode-id="704"><span data-dcnode-id="703" instrument_node="">
</span><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">
Augustus only chose him after more favored heirs had died. </span><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">
The New Encyclop</span><font data-dcnode-id="697" face="Trebuchet MS"><span data-dcnode-id="698" instrument_node="">æ</span></font><span data-dcnode-id="696" instrument_node="">dia Britannica says, Tiberius 
played politics with the Senate and did not allow it to name him emperor for 
almost a month [after Augustus died]". He told the Senate that no one but 
Augustus was capable of carrying the burden of ruling the Roman Empire and asked 
the senators to restore the republic by entrusting such authority to a group of 
men rather than to one man. "Not daring to take him at his word", wrote 
historian Will Durant, "the Senate exchanged bows with him until at last he 
accepted power". Durant added: "The play was well acted on both sides. Tiberius 
wanted the principate, or he would have found some way to evade it; the Senate 
feared and hated him, but shrank from reestablishing a republic based, like the 
old, upon theoretically sovereign assemblies". Thus, Tiberius took hold of the 
kingdom by means of duplicity. </span><br data-dcnode-id="695"><span data-dcnode-id="694" instrument_node="">
</span><br data-dcnode-id="693"><span data-dcnode-id="692" instrument_node="">
Verse 22: "And the arms of the flood shall be swept from before his face, and 
they will be broken, and also the ruler of a covenant". </span><br data-dcnode-id="691"><span data-dcnode-id="690" instrument_node="">
</span><br data-dcnode-id="689"><span data-dcnode-id="688" instrument_node="">
In 15 A.D., Germanicus led his forces against the German hero Arminius, with 
some success. However, the limited victories were won at great cost, and 
Tiberius thereafter aborted operations in Germany. Instead, by promoting civil 
war, he tried to prevent German tribes from uniting. Tiberius generally favoured 
a defensive foreign policy and focused on strengthening the frontiers. This 
stance was fairly successful. In this way "the arms of the flood" were 
controlled and were "broken". </span><br data-dcnode-id="687"><span data-dcnode-id="686" instrument_node="">
"Broken" too was "the Leader of the covenant" = Jesus [Yeshua]. (Compare Isaiah 
55:4; Daniel 9:25, 27a) </span><br data-dcnode-id="685"><span data-dcnode-id="684" instrument_node="">
</span><br data-dcnode-id="683"><span data-dcnode-id="682" instrument_node="">
Verse 23: "And after they join themselves to him, he will do guile, and he will 
exalt himself, and will do strong by a few of the people". </span><br data-dcnode-id="681"><span data-dcnode-id="680" instrument_node="">
</span><br data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">
The oath of loyalty bound the army and officials to the Tiberius. </span><br data-dcnode-id="677"><span data-dcnode-id="676" instrument_node="">
"Sextus Pompeius and Sextus Apuleius, the consuls, were the first to swear 
allegiance to Tiberius Caesar, and in their presence the oath was taken by Seius 
Strabo and Caius Turranius, respectively the commander of the praetorian cohorts 
and the superintendent of the corn supplies. Then the Senate, the soldiers and 
the people did the same". </span><br data-dcnode-id="675"><span data-dcnode-id="674" instrument_node="">
Those few people were the Roman Praetorian Guard, encamped close to Rome's 
walls. Its proximity intimidated the Senate and helped Tiberius keep in check 
any uprisings against his authority among the populace. By means of some 10.000 
guards Tiberius remained mighty. </span><br data-dcnode-id="673"><span data-dcnode-id="672" instrument_node="">
</span><br data-dcnode-id="671"><span data-dcnode-id="670" instrument_node="">

The Palmyrene army occupied Egypt in 269 B.C.E. under the pretext of making it 
secure for Rome. Zenobia wanted to make Palmyra the dominant city in the east 
and wanted to rule over Rome's eastern provinces. Alarmed by her ambition, 
Aurelian aroused "his power and his heart" to proceed against Zenobia. </span><br data-dcnode-id="641"><span data-dcnode-id="640" instrument_node="">
Zenobia valiantly defended it, but without success. She and her son fled toward 
Persia, only to be captured by the Romans at the Euphrates River. The Palmyrenes 
surrendered their city in 272 B.C. Aurelian spared Zenobia, making her the prize 
feature in his triumphal procession through Rome in 274 B.C. She spent the rest 
of her life as a Roman matron. </span><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">

set out on an expedition against the Persians. While he was waiting in Thrace 
for the opportunity to cross the straits into Asia Minor, those who 'ate his 
food' carried out schemes against him and brought about his "breakdown". He was 
going to call his secretary Eros to account for irregularities. Eros, however, 
forged a list of names of certain officers marked for death. The sight of this 
list moved the officers to plot Aurelian's assassination and to murder him. </span><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">

Egyptian history dates back to about 4000 B.C., when the kingdoms of upper and 
lower Egypt, already highly sophisticated, were united. Egypt's golden age 
coincided with the 18th and 19th dynasties (16th to 13th century B.C.), during 
which the empire was established. Persia conquered Egypt in 525 B.C.E, Alexander 
the Great subdued it in 332 B.C.E., and then the Ptolemaic dynasty ruled the 
land until 30 B.C., when Cleopatra, last of the line, committed suicide and 
Egypt became a Roman, then Byzantine, province. Arab caliphs ruled Egypt from 
641 until 1517, when the Turks took it for their Ottoman Empire. Napoléon's 
armies occupied the country from 1798 to 1801. In 1805, Mohammed Ali, leader of 
a band of Albanian soldiers, became pasha of Egypt. After completion of the Suez 
Canal in 1869, the French and British took increasing interest in Egypt. British 
troops occupied Egypt in 1882, and British resident agents became its actual 
administrators, though it remained under nominal Turkish sovereignty. In 1914, 
this fiction was ended, and Egypt became a protectorate of Britain. </span><br data-dcnode-id="602"><span data-dcnode-id="601" instrument_node="">
Russia grew expanding its power over huge regions, and by the end of XIX century 
Russia possessed territories from the mouths of the Danube and Visla in the 
west, reached the Pacific Ocean in the east, began in the Euroasian tundra in 
the north and had borders with Turkey, Iran, Afghanistan and China in the south.

</span><br data-dcnode-id="345"><span data-dcnode-id="344" instrument_node="">
18. Next, nations see the sign of the Son of man (Matthew 24:30). Probably it 
will be connected with the first resurrection (Revelation 20:6). People who have 
died in union with Jesus will rise first (among 144.000). They will get a spirit 
body at the resurrection. (1 Corinthians 15:35,44) What will be the proof of the 
resurrection? Immediately after that, remaining of 144,000 will be transfigured 
(1 Corinthians 15:52; 1 Thessalonians 4:15-17). Simultaneously they will be 
caught away from the earth and taken to heaven. The transfigurations of 
belonging to Jesus dependably will not be seen and it will cause a great 
expression on nations. </span><br data-dcnode-id="343"><span data-dcnode-id="342" instrument_node="">
</span><br data-dcnode-id="341"><span data-dcnode-id="340" instrument_node="">
19. The whole nation of Israel is converting and gathering. (Ezekiel 39:25-29; 
Romans 11:25-32). After taking to heaven belonging to group of 144,000 nation of 
Israel will be a light for the nations. God will be with them and will pour his 
spirit over them. (Ezekiel 39:29)</span><br data-dcnode-id="339"><span data-dcnode-id="338" instrument_node="">
</span><br data-dcnode-id="337"><span data-dcnode-id="336" instrument_node="">
20. Rebuilding of the Temple according to directions given to Ezekiel. (Ezekiel 
37:24-28; 43:11) </span><br data-dcnode-id="335"><span data-dcnode-id="334" instrument_node="">
</span><br data-dcnode-id="333"><span data-dcnode-id="332" instrument_node="">
21. There will be collection of chosen, separation the "sheep from the goats". 
(Matthew 24:31; 25:31-44; Revelation 14:15,16).</span><br data-dcnode-id="331"><span data-dcnode-id="330" instrument_node="">
</span><br data-dcnode-id="329"><span data-dcnode-id="328" instrument_node="">
22. "The king of the north" will attack people who worship the true God [Israel] 
(Ezekiel 38:10-12). "The beast" [the word government] also will take part in 
this attack. (Revelation 19:19).</span><br data-dcnode-id="327"><span data-dcnode-id="326" instrument_node="">
</span><br data-dcnode-id="325"><span data-dcnode-id="324" instrument_node="">
23. After Armageddon the power on the world will be taken over by the "new 
heaven" = the kingdom of God i.e. Jesus and belonging to him. (Daniel 7:27; 
Matthew 6:10; Revelation 21:1-4) "The old heaven" = imperfect system of 
authority created by man will go away. Rules and the law created by imperfect 
people which are captivating and making difficulty will be untied. All 
activities remaining uncovered, good or bad will be revealed, all crimes will 
come to light. (2 Peter 3:10; 1 Timothy 5:25). </span><br data-dcnode-id="323"><span data-dcnode-id="322" instrument_node="">
</span><br data-dcnode-id="321"><span data-dcnode-id="320" instrument_node="">
24. The rest of dead will come to life! The earth will become the paradise. 
(Acts 24:15; Psalm 37:29; Isaiah 11:6-9; 25:8; 35:5-7). When the thousand year’s 
period of Jesus’ kingdom will end people who come to life during this period are 
put to the test. And then they will really come to life God’s point of view and 
then they will get ability to live forever. (Revelation 20:5a,7,8; comp. Luke 
15:32; 1 John 3:14).</span></p><span data-dcnode-id="318" instrument_node="">
</span><p align="center" data-dcnode-id="316"><img alt="horizontal rule" data-dcnode-id="317" height="10" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.religioustolerance.org/_themes/topo/topruled.gif&amp;raw" width="600"></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">"Behold, the former things are come to pass, and new things do I declare: 
before they spring forth will I cause you to hear them". (Isaiah 42:9)</span></p><span data-dcnode-id="312" instrument_node="">
