.com/commentaries/expositors/daniel/10.htm" title="Expositor's Bible"><span data-dcnode-id="1190" instrument_node="">Expositor's</span></a><span data-dcnode-id="1188" instrument_node=""> • </span><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/edt/daniel/10.htm" title="Expositor's Dictionary"><span data-dcnode-id="1187" instrument_node="">Exp&nbsp;Dct</span></a><span data-dcnode-id="1185" instrument_node=""> • </span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/gaebelein/daniel/10.htm" title="Gaebelein's Annotated Bible"><span data-dcnode-id="1184" instrument_node="">Gaebelein</span></a><span data-dcnode-id="1182" instrument_node=""> • </span><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/gsb/daniel/10.htm" title="Geneva Study Bible"><span data-dcnode-id="1181" instrument_node="">GSB</span></a><span data-dcnode-id="1179" instrument_node=""> • </span><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/gill/daniel/10.htm" title="Gill's Bible Exposition"><span data-dcnode-id="1178" instrument_node="">Gill</span></a><span data-dcnode-id="1176" instrument_node=""> • </span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/gray/daniel/10.htm" title="Gray's Concise"><span data-dcnode-id="1175" instrument_node="">Gray</span></a><span data-dcnode-id="1173" instrument_node=""> • </span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/guzik/daniel/10.htm" title="Guzik Bible Commentary"><span data-dcnode-id="1172" instrument_node="">Guzik</span></a><span data-dcnode-id="1170" instrument_node=""> • </span><a data-dcn 1151" instrument_node="">King</span></a><span data-dcnode-id="1149" instrument_node=""> • </span><a data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/lange/daniel/10.htm" title="Lange Commentary"><span data-dcnode-id="1148" instrument_node="">Lange</span></a><span data-dcnode-id="1146" instrument_node=""> • </span><a data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/maclaren/daniel/10.htm" title="MacLaren Expositions"><span data-dcnode-id="1145" instrument_node="">MacLaren</span></a><span data-dcnode-id="1143" instrument_node=""> • </span><a data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/mhc/daniel/10.htm" title="Matthew Henry Concise"><span data-dcnode-id="1142" instrument_node="">MHC</span></a><span data-dcnode-id="1140" instrument_node=""> • </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/mhcw/daniel/10.htm" title="Matthew Henry Full"><span data-dcnode-id="1139" instrument_node="">MHCW</span></a><span data-dcnode-id="1137" instrument_node=""> • </span><a data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/parker/daniel/10.htm" title="The People's Bible by Joseph Parker"><span data-dcnode-id="1136" instrument_node="">Parker</span></a><span data-dcnode-id="1134" instrument_node=""> • </span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/poole/daniel/10.htm" title="Matthew Poole"><span data-dcnode-id="1133" instrument_node="">Poole</span></a><span data-dcnode-id="1131" instrument_node=""> • </span><a data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/pulpit/daniel/10.htm" title="Pulpit Commentary"><span data-dcnode-id="1130" instrument_node="">Pulpit</span></a><span data-dcnode-id="1128" instrument_node=""> • </span><a data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/sermon/daniel/10.htm" title="Sermon Bible"><span data-dcnode-id="1127" instrument_node="">Sermon</span></a><span data-dcnode-id="1125" instrument_node=""> • </span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/sco/daniel/10.htm" title="Scofield Reference Notes"><span data-dcnode-id="1124" instrument_node="">SCO</span></a><span data-dcnode-id="1122" instrument_node=""> • </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/ttb/daniel/10.htm" title="Through The Bible"><span data-dcnode-id="1121" instrument_node="">TTB</span></a><span data-dcnode-id="1119" instrument_node=""> • </span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/wes/daniel/10.htm" title="Wesley's Notes"><span data-dcnode-id="1118" instrument_node="">WES</span></a><span data-dcnode-id="1116" instrument_node=""> • </span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/anc2.htm%23tsk" title="Treasury of Scripture Knowledge"><span data-dcnode-id="1115" instrument_node="">TSK</span></a></div><div data-dcnode-id="756" id="leftbox"><div class="padleft" data-dcnode-id="757"><div class="comtype" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">EXPOSITORY (ENGLISH BIBLE)</span></div><div class="vheading2" data-dcnode-id="1108"><a data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/ellicott/daniel/10.htm"><span data-dcnode-id="1110" instrument_node="">Ellicott's Commentary for English Readers</span></a></div><span data-dcnode-id="1107" instrument_node="">(13) </span><span class="bld" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">The prince of the kingdom.</span></span><span data-dcnode-id="1104" instrument_node="">—Perhaps no single verse in the whole of the Scriptures speaks more clearly than this upon the invisible powers which rule and influence nations. If we were without a revelation, we should have thought it congruent that God Himself should direct all events in the world without using any intervening means. But revelation points out that as spiritual beings carry out God’s purpose in the natural world (</span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/12-23.htm" title="For the LORD will pass through to smite the Egyptians; and when he sees the blood on the lintel, and on the two side posts, the LORD will pass over the door, and will not suffer the destroyer to come in to your houses to smite you."><span data-dcnode-id="1103" instrument_node="">Exodus 12:23</span></a><span data-dcnode-id="1101" instrument_node="">; </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/2_samuel/24-16.htm" title="And when the angel stretched out his hand on Jerusalem to destroy it, the LORD repented him of the evil, and said to the angel that destroyed the people, It is enough: stay now your hand. And the angel of the LORD was by the threshing place of Araunah the Jebusite."><span data-dcnode-id="1100" instrument_node="">2Samuel 24:16</span></a><span data-dcnode-id="1098" instrument_node="">) and in the moral world (</span><a data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/luke/15-10.htm" title="Likewise, I say to you, there is joy in the presence of the angels of God over one sinner that repents."><span data-dcnode-id="1097" instrument_node="">Luke 15:10</span></a><span data-dcnode-id="1095" instrument_node="">), so also they do in the political world. From this chapter we not only learn that Israel had a spiritual champion (</span><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-21.htm" title="But I will show you that which is noted in the scripture of truth: and there is none that holds with me in these things, but Michael your prince."><span data-dcnode-id="1094" instrument_node="">Daniel 10:21</span></a><span data-dcnode-id="1092" instrument_node="">) to protect her in her national life, and to watch over her interests, but also that the powers opposed to Israel had their princes, or saviours, which were antagonists of those which watched over Israel. The “princes” of the heathen powers are devils, according to </span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_corinthians/10-20.htm" title="But I say, that the things which the Gentiles sacrifice, they sacrifice to devils, and not to God: and I would not that you should have fellowship with devils."><span data-dcnode-id="1091" instrument_node="">1Corinthians 10:20</span></a><span data-dcnode-id="1089" instrument_node="">. The doctrine of the ministry of angels is taught in </span><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/psalms/34-7.htm" title="The angel of the LORD encamps round about them that fear him, and delivers them."><span data-dcnode-id="1088" instrument_node="">Psalm 34:7</span></a><span data-dcnode-id="1086" instrument_node="">; </span><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/psalms/91-11.htm" title="For he shall give his angels charge over you, to keep you in all your ways."><span data-dcnode-id="1085" instrument_node="">Psalm 91:11</span></a><span data-dcnode-id="1083" instrument_node="">; </span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/psalms/96-5.htm" title="For all the gods of the nations are idols: but the LORD made the heavens."><span data-dcnode-id="1082" instrument_node="">Psalm 96:5</span></a><span data-dcnode-id="1080" instrument_node=""> (LXX.); </span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/isaiah/24-21.htm" title="And it shall come to pass in that day, that the LORD shall punish the host of the high ones that are on high, and the kings of the earth on the earth."><span data-dcnode-id="1079" instrument_node="">Isaiah 24:21</span></a><span data-dcnode-id="1077" instrument_node="">; </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/isaiah/46-2.htm" title="They stoop, they bow down together; they could not deliver the burden, but themselves are gone into captivity."><span data-dcnode-id="1076" instrument_node="">Isaiah 46:2</span></a><span data-dcnode-id="1074" instrument_node="">; </span><a data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/jeremiah/46-25.htm" title="The LORD of hosts, the God of Israel, said; Behold, I will punish the multitude of No, and Pharaoh, and Egypt, with their gods, and their kings; even Pharaoh, and all them that trust in him:"><span data-dcnode-id="1073" instrument_node="">Jeremiah 46:25</span></a><span data-dcnode-id="1071" instrument_node="">; </span><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/jeremiah/49-3.htm" title="Howl, O Heshbon, for Ai is spoiled: cry, you daughters of Rabbah, gird you with sackcloth; lament, and run to and fro by the hedges; for their king shall go into captivity, and his priests and his princes together."><span data-dcnode-id="1070" instrument_node="">Jeremiah 49:3</span></a><span data-dcnode-id="1068" instrument_node="">. Further passages in the New Testament bearing upon the question are </span><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_corinthians/8-5.htm" title="For though there be that are called gods, whether in heaven or in earth, (as there be gods many, and lords many,)"><span data-dcnode-id="1067" instrument_node="">1Corinthians 8:5</span></a><span data-dcnode-id="1065" instrument_node="">; </span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/colossians/1-16.htm" title=" For by him were all things created, that are in heaven, and that are in earth, visible and invisible, whether they be thrones, or dominions, or principalities, or powers: all things were created by him, and for him:"><span data-dcnode-id="1064" instrument_node="">Colossians 1:16</span></a><span data-dcnode-id="1062" instrument_node="">.</span><p data-dcnode-id="1052"><span class="bld" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Withstood me.—</span></span><span data-dcnode-id="1059" instrument_node="">The phrase is identical with </span><span class="ital" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">“</span></span><span data-dcnode-id="1056" instrument_node="">stood over against him” (</span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/joshua/5-13.htm" title="And it came to pass, when Joshua was by Jericho, that he lifted up his eyes and looked, and, behold, there stood a man over against him with his sword drawn in his hand: and Joshua went to him, and said to him, Are you for us, or for our adversaries?"><span data-dcnode-id="1055" instrument_node="">Joshua 5:13</span></a><span data-dcnode-id="1053" instrument_node="">). The verse implies that the spiritual powers attached to Persia were influencing Cyrus in a manner that was prejudicial to the interests of God’s people. It must be borne in mind that the vision occurred at the time of the Samaritan intrigues with the Persian Court in opposition to Zerubbabel.</span></p><p data-dcnode-id="1042"><span class="bld" data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Michael.—</span></span><span data-dcnode-id="1049" instrument_node="">Mentioned only in the Book of Daniel and </span><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/jude/1-9.htm" title="Yet Michael the archangel, when contending with the devil he disputed about the body of Moses, dared not bring against him a railing accusation, but said, The Lord rebuke you."><span data-dcnode-id="1048" instrument_node="">Jude 1:9</span></a><span data-dcnode-id="1046" instrument_node="">, </span><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/12-7.htm" title="And there was war in heaven: Michael and his angels fought against the dragon; and the dragon fought and his angels,"><span data-dcnode-id="1045" instrument_node="">Revelation 12:7</span></a><span data-dcnode-id="1043" instrument_node="">. The title “chief princes,” rightly explained in the margin, shows that the charge of Israel had been entrusted by God to the highest of the heavenly powers; but the name “first prince” points out that, great though he is, he is inconsiderable when compared with God.</span></p><p data-dcnode-id="1032"><span class="bld" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">I remained there.</span></span><span data-dcnode-id="1039" instrument_node="">—Literally, </span><span class="ital" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">I prevailed there,</span></span><span data-dcnode-id="1036" instrument_node=""> as </span><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/genesis/49-4.htm" title="Unstable as water, you shall not excel; because you went up to your father's bed; then defiled you it: he went up to my couch."><span data-dcnode-id="1035" instrument_node="">Genesis 49:4</span></a><span data-dcnode-id="1033" instrument_node="">. The person is explaining to Daniel how it had happened that he had received no visible answer to a prayer that had been offered with success three weeks previously. There had been a conflict between the powers of light and darkness, in which the former had gained the victory, which had been decisive. By the kings of Persia are meant all the successors of Cyrus. It may be remarked that from this time onward the Persian kings were, upon the whole, favourable to the interests of Israel.</span></p><p data-dcnode-id="1031"></p><div class="vheading2" data-dcnode-id="1028"><a data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/benson/daniel/10.htm"><span data-dcnode-id="1030" instrument_node="">Benson Commentary</span></a></div><span class="bld" data-dcnode-id="1025"><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/context/daniel/10-13.htm" title="But the prince of the kingdom of Persia withstood me one and twenty days: but, see, Michael, one of the chief princes, came to help me; and I remained there with the kings of Persia...."><span data-dcnode-id="1027" instrument_node="">Daniel 10:13-14</span></a></span><span data-dcnode-id="1024" instrument_node="">. </span><span class="ital" data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">But the prince of the kingdom of Persia opposed me — </span></span><span data-dcnode-id="1021" instrument_node="">Hebrew, </span><span class="greekheb" data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">עמד לנגדי</span></span><span data-dcnode-id="1018" instrument_node="">, </span><span class="ital" data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">stood before me. — </span></span><span data-dcnode-id="1015" instrument_node="">Purver. And so Jun. and Tremel., referring it to an earthly prince. This is thought by some to be Cambyses, the son of Cyrus, intrusted with the management of affairs in the court of Persia when his father was absent on some expedition, and set against the Jews by their enemies, and now endeavouring to embarrass their affairs: over his designs the angel had been watching, in order to defeat them. Others have thought there is an allusion in this verse, and at </span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-20.htm" title="Then said he, Know you why I come to you? and now will I return to fight with the prince of Persia: and when I am gone forth, see, the prince of Grecia shall come."><span data-dcnode-id="1014" instrument_node="">Daniel 10:20</span></a><span data-dcnode-id="1012" instrument_node="">, to the guardian, or tutelary angels, of different countries; which doctrine seems to be countenanced by some passages in Scripture, and especially by Zechariah, chap. </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/6-5.htm" title="Then said these men, We shall not find any occasion against this Daniel, except we find it against him concerning the law of his God."><span data-dcnode-id="1011" instrument_node="">Daniel 6:5</span></a><span data-dcnode-id="1009" instrument_node="">. Grotius is of this opinion; and Bishop Newcome, on the last-mentioned place, refers to the passage before us. “That there were such tutelar angels,” says Lowth, “not only over private persons, </span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/acts/12-15.htm" title="And they said to her, You are mad. But she constantly affirmed that it was even so. Then said they, It is his angel."><span data-dcnode-id="1008" instrument_node="">Acts 12:15</span></a><span data-dcnode-id="1006" instrument_node="">, but likewise over provinces and kingdoms, was an opinion generally received. The </span><span class="ital" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">four spirits, </span></span><span data-dcnode-id="1003" instrument_node="">mentioned </span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/zechariah/6-5.htm" title="And the angel answered and said to me, These are the four spirits of the heavens, which go forth from standing before the LORD of all the earth."><span data-dcnode-id="1002" instrument_node="">Zechariah 6:5</span></a><span data-dcnode-id="1000" instrument_node="">, seem to be the guardian angels of the four great empires.” This opinion supposes the presiding angels, here mentioned, to be good angels, but it is surely absurd to think that the holy angels are ever engaged in contending with each other; or that “one holy angel is set to oppose another holy angel.” — Scott. Others suppose the contest to be between a good and an evil angel, as in </span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/zechariah/3-1.htm" title="And he showed me Joshua the high priest standing before the angel of the LORD, and Satan standing at his right hand to resist him."><span data-dcnode-id="999" instrument_node="">Zechariah 3:1</span></a><span data-dcnode-id="997" instrument_node="">, and Jude, </span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-9.htm" title="Yet heard I the voice of his words: and when I heard the voice of his words, then was I in a deep sleep on my face, and my face toward the ground."><span data-dcnode-id="996" instrument_node="">Daniel 10:9</span></a><span data-dcnode-id="994" instrument_node="">, “which latter opinion,” says Wintle, “is perhaps the most just, as there should seem to be no dispute, or contest, between the ministering spirits of heaven, who are always obedient to the pleasure of their Lord. And when the Almighty sent a superior angel, Michael, whose name is sometimes given to Christ himself, </span><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/12-7.htm" title="And there was war in heaven: Michael and his angels fought against the dragon; and the dragon fought and his angels,"><span data-dcnode-id="993" instrument_node="">Revelation 12:7</span></a><span data-dcnode-id="991" instrument_node="">, his office probably was to assist Gabriel in subduing </span><span class="ital" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">the prince of the power of the air, </span></span><span data-dcnode-id="988" instrument_node="">the powers of this darksome world, or the </span><span class="ital" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">spirits that rule over the children of disobedience, </span></span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/ephesians/2-2.htm" title="Wherein in time past you walked according to the course of this world, according to the prince of the power of the air, the spirit that now works in the children of disobedience:"><span data-dcnode-id="985" instrument_node="">Ephesians 2:2</span></a><span data-dcnode-id="983" instrument_node="">. The opposition was made twenty-one days; and as this was exactly the number of days that Daniel fasted, the contest may possibly have some allusion to this struggle. Daniel was certainly highly favoured, and the Almighty, who delights in hearing and answering the prayers of his servants, directs the angel to apologize (if I may so speak) for his delay in attending to the patient solicitations of the prophet: the angel also is represented as pleading the difficulty of his task, and another higher power, or chief, in the regal court of heaven, favours his business, and comes in to his assistance. In whatever light this is to be understood, it is a strong and affecting, though less gross, instance of the anthropopathia, or of the Deity’s accommodating himself and his measures to the manners of men.” See </span><span class="ital" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">De Sacra Poes. Hebrews, </span></span><span data-dcnode-id="980" instrument_node="">Præl. 6. Houbigant is of opinion, that this </span><span class="ital" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">prince of the kingdom of Persia </span></span><span data-dcnode-id="977" instrument_node="">was an evil angel, and in agreement with it renders the last clause of the verse, </span><span class="ital" data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">and I have now left him on the side of the kings of Persia. </span></span><span data-dcnode-id="974" instrument_node="">But it seems most proper to understand Cambyses as meant. </span><span class="ital" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Now I am come to make thee understand, </span></span><span data-dcnode-id="971" instrument_node="">&amp;c. — I am now come to inform thee of what shall befall thy people hereafter; </span><span class="ital" data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">for yet the vision is</span></span><span data-dcnode-id="968" instrument_node=""> </span><span class="ital" data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">for many days — </span></span><span data-dcnode-id="965" instrument_node="">For it will be a long course of time before the things I shall inform thee of shall come to pass. Daniel, we find, was informed by this vision, that the empire should be translated from the Persians to the Greeks, </span><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/11-3.htm" title="And a mighty king shall stand up, that shall rule with great dominion, and do according to his will."><span data-dcnode-id="964" instrument_node="">Daniel 11:3</span></a><span data-dcnode-id="962" instrument_node="">; and then what should be the condition of the Jews under Alexander’s successors, the kings of Syria and Egypt.</span><span class="p" data-dcnode-id="959"><br data-dcnode-id="961"><br data-dcnode-id="960"></span><a data-dcnode-id="958" id="mhc" name="mhc"></a><div class="vheading2" data-dcnode-id="955"><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/mhc/daniel/10.htm"><span data-dcnode-id="957" instrument_node="">Matthew Henry's Concise Commentary</span></a></div><span data-dcnode-id="954" instrument_node="">10:10-21 Whenever we enter into communion with God, it becomes us to have a due sense of the infinite distance between us and the holy God. How shall we, that are dust and ashes, speak to the Lord of glory? Nothing is more likely, nothing more effectual to revive the drooping spirits of the saints, than to be assured of God's love to them. From the very first day we begin to look toward God in a way of duty, he is ready to meet us in the way of mercy. Thus ready is God to hear prayer. When the angel had told the prophet of the things to come, he was to return, and oppose the decrees of the Persian kings against the Jews. The angels are employed as God's ministering servants, Heb 1:14. Though much was done against the Jews by the kings of Persia, God permitting it, much more mischief would have been done if God had not prevented it. He would now more fully show what were God's purposes, of which the prophecies form an outline; and we are concerned to study what is written in these Scriptures of truth, for they belong to our everlasting peace. While Satan and his angels, and evil counsellors, excite princes to mischief against the church, we may rejoice that Christ our Prince, and all his mighty angels, act against our enemies; but we ought not to expect many to favour us in this evil world. Yet the whole counsel of God shall be established; and let each one pray, Lord Jesus, be our righteousness now, and thou wilt be our everlasting confidence, through life, in death, at the day of judgment, and for evermore.</span><a data-dcnode-id="953" id="bar" name="bar"></a><div class="vheading2" data-dcnode-id="950"><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/barnes/daniel/10.htm"><span data-dcnode-id="952" instrument_node="">Barnes' Notes on the Bible</span></a></div><span data-dcnode-id="949" instrument_node="">But the prince of the kingdom of Persia - In explaining this very difficult verse it may be proper</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">(1) to consider the literal sense of the words;</span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">(2) to deduce the fair meaning of the passage as thus explained; and</span></p><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">(3) to notice the practical truths taught.</span></p><p data-dcnode-id="920"><span data-dcnode-id="942" instrument_node="">The word rendered "prince" - שׂר  s'ar - means, properly, a leader, commander, chief, as of troops, </span><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/genesis/21-22.htm"><span data-dcnode-id="941" instrument_node="">Genesis 21:22</span></a><span data-dcnode-id="939" instrument_node="">; of a king's body-guard, </span><a data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/genesis/37-36.htm"><span data-dcnode-id="938" instrument_node="">Genesis 37:36</span></a><span data-dcnode-id="936" instrument_node="">; of cup-bearers, </span><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/genesis/41-9.htm"><span data-dcnode-id="935" instrument_node="">Genesis 41:9</span></a><span data-dcnode-id="933" instrument_node="">; of a prison, </span><a data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/genesis/39-21.htm"><span data-dcnode-id="932" instrument_node="">Genesis 39:21-22</span></a><span data-dcnode-id="930" instrument_node="">; of a flock, </span><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/genesis/47-6.htm"><span data-dcnode-id="929" instrument_node="">Genesis 47:6</span></a><span data-dcnode-id="927" instrument_node="">. Then it means a prince, a noble, a chief in the state, </span><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/genesis/12-15.htm"><span data-dcnode-id="926" instrument_node="">Genesis 12:15</span></a><span data-dcnode-id="924" instrument_node="">. In </span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/8-25.htm"><span data-dcnode-id="923" instrument_node="">Daniel 8:25</span></a><span data-dcnode-id="921" instrument_node="">, in the phrase "Prince of princes," it refers to God. So far as the word is concerned in the phrase "prince of the kingdom of Persia," it might refer to a prince ruling over that kingdom, or to a prime minister of the state; but the language also is such that it is applicable to an angelic being supposed to preside over a state, or to influence its counsels. If this idea is admitted; if it is believed that angels do thus preside over particular states, this language would properly express that fact. Gesenius (Lexicon) explains it in this passage as denoting the "chiefs, princes, and angels; i. e., the archangels acting as patrons and advocates of particular nations before God." That this is the proper meaning here as deduced from the words is apparent, for</span></p><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">(a) it is an angel that is speaking, and it would seem most natural to suppose that he had encountered one of his own rank;</span></p><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">(b) the mention of Michael who came to his aid - a name which, as we shall see, properly denotes an angel, leads to the same conclusion;</span></p><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">(c) it accords, also, with the prevailing belief on the subject.</span></p><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Undoubtedly, one who takes into view all the circumstances referred to in this passage would most naturally understand this of an angelic being, having some kind of jurisdiction over the kingdom of Persia. What was the character of this "prince," however, whether he was a good or bad angel, is not intimated by the language. It is only implied that he had a chieftainship, or some species of guardian care over that kingdom - watching over its interests and directing its affairs. As he offered resistance, however, to this heavenly messenger on his way to Daniel, as it was necessary to counteract his plans, and as the aid of Michael was required to overcome his opposition, the fair construction is, that he belonged to the class of evil angels.</span></p><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Withstood me - Hebrew, "stood over against me." Vulgate, "restitit mihi." The fair meaning is, that he resisted or opposed him; that he stood over against him, and delayed him on his way to Daniel. In what manner he did this is not stated. The most obvious interpretation is, that, in order to answer the prayers of Daniel in respect to his people, it was necessary that some arrangement should be made in reference to the kingdom of Persia - influencing the government to be favorable to the restoration of the Jews to their own land; or removing some obstacles to such return - obstacles which had given Daniel such disquietude, and which had been thrown in his way by the presiding angel of that kingdom.</span></p><p data-dcnode-id="905"><span data-dcnode-id="909" instrument_node="">One and twenty days - During the whole time in which Daniel was engaged in fasting and prayer </span><a data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/10-2.htm"><span data-dcnode-id="908" instrument_node="">Daniel 10:2-3</span></a><span data-dcnode-id="906" instrument_node="">. The angel had been sent forth to make arrangements to secure the answer to his prayer when he began to pray, but had been delayed during all that time by the opposition which he had met with in Persia. That is, it required all that time to overcome the obstacles existing there to the accomplishment of these purposes, and to make those arrangements which were necessary to secure the result. Mean-time, Daniel, not knowing that these arrangements were in a process of completion, or that an angel was employed to secure the answer to his prayers, yet strong in faith, was suffered to continue his supplications with no intimation that his prayers were heard, or that he would be answered. How many arrangements may there be in progress designed to answer our prayers of which we know nothing! How many agents may be employed to bring about an answer! What mighty obstacles may be in a process of removal, and what changes may be made, and what influences exerted, while we are suffered to pray, and fast, and weep, amidst many discouragements, and many trials of our faith and patience! For a much longer period than Daniel was engaged in his devotions, may we be required often now to pray before the arrangements in the course of Providence shall be so far complete that we shall receive an answer to our supplications, for the things to be done may extend far into future months or years.</span></p><p data-dcnode-id="864"><span data-dcnode-id="904" instrument_node="">But, lo, Michael, one of the chief princes - Margin, "the first." That is, the first in rank of the "princes," or the angels. In other words, Michael, the archangel." The proper meaning of this name (מיכאל  mı̂ykâ'êl) is, "Who as God," and is a name given, undoubtedly, from some resemblance to God. The exact reason why it is given is not anywhere stated; but may it not be this - that one looking on the majesty and glory of the chief of the angels would instinctively ask, "Who, after all, is like God? Even this lofty angel, with all his glory, cannot be compared to the high and lofty One." Whatever may have been the reason of the appellation, however, the name in the Scriptures has a definite application, and is given to the chief one of the angels. Compare the notes at Jde 1:9. The word "Michael," as a proper name, occurs several times in the Scriptures, </span><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/numbers/13-13.htm"><span data-dcnode-id="903" instrument_node="">Numbers 13:13</span></a><span data-dcnode-id="901" instrument_node="">; </span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_chronicles/5-13.htm"><span data-dcnode-id="900" instrument_node="">1 Chronicles 5:13</span></a><span data-dcnode-id="898" instrument_node="">; </span><a data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_chronicles/6-40.htm"><span data-dcnode-id="897" instrument_node="">1 Chronicles 6:40</span></a><span data-dcnode-id="895" instrument_node="">; </span><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_chronicles/7-3.htm"><span data-dcnode-id="894" instrument_node="">1 Chronicles 7:3</span></a><span data-dcnode-id="892" instrument_node="">; </span><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_chronicles/8-16.htm"><span data-dcnode-id="891" instrument_node="">1 Chronicles 8:16</span></a><span data-dcnode-id="889" instrument_node="">; </span><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_chronicles/12-20.htm"><span data-dcnode-id="888" instrument_node="">1 Chronicles 12:20</span></a><span data-dcnode-id="886" instrument_node="">; </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_chronicles/27-18.htm"><span data-dcnode-id="885" instrument_node="">1 Chronicles 27:18</span></a><span data-dcnode-id="883" instrument_node="">; </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/2_chronicles/21-2.htm"><span data-dcnode-id="882" instrument_node="">2 Chronicles 21:2</span></a><span data-dcnode-id="880" instrument_node="">; </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/ezra/8-8.htm"><span data-dcnode-id="879" instrument_node="">Ezra 8:8</span></a><span data-dcnode-id="877" instrument_node="">. It is used as applicable to an angel or archangel in the following places: </span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/10-13.htm"><span data-dcnode-id="876" instrument_node="">Daniel 10:13</span></a><span data-dcnode-id="874" instrument_node="">, </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-21.htm"><span data-dcnode-id="873" instrument_node="">Daniel 10:21</span></a><span data-dcnode-id="871" instrument_node="">; </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/12-1.htm"><span data-dcnode-id="870" instrument_node="">Daniel 12:1</span></a><span data-dcnode-id="868" instrument_node="">; Jde 1:9; </span><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/12-7.htm"><span data-dcnode-id="867" instrument_node="">Revelation 12:7</span></a><span data-dcnode-id="865" instrument_node="">. Little more is known of him than</span></p><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">(a) that he occupied the rank which entitled him to be called an archangel; and</span></p><p data-dcnode-id="857"><span data-dcnode-id="861" instrument_node="">(b) that he sustained, in the time of Daniel, the relation of patron of Israel before God </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-21.htm"><span data-dcnode-id="860" instrument_node="">Daniel 10:21</span></a><span data-dcnode-id="858" instrument_node="">.</span></p><p data-dcnode-id="854"><span data-dcnode-id="856" instrument_node="">continued...</span><a data-dcnode-id="855" id="jfb" name="jfb"></a></p><div class="vheading2" data-dcnode-id="851"><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/jfb/daniel/10.htm"><span data-dcnode-id="853" instrument_node="">Jamieson-Fausset-Brown Bible Commentary</span></a></div><span data-dcnode-id="850" instrument_node="">13. prince of … Persia—the angel of darkness that represented the Persian world power, to which Israel was then subject. This verse gives the reason why, though Daniel's "words were heard from the first day" (Da 10:12), the good angel did not come to him until more than three weeks had elapsed (Da 10:4).</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">one and twenty days—answering to the three weeks of Daniel's mourning (Da 10:2).</span></p><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Michael—that is, "Who is like God?" Though an archangel, "one of the chief princes," Michael was not to be compared to God.</span></p><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">help me—Michael, as patron of Israel before God (Da 10:21; 12:1), "helped" to influence the Persian king to permit the Jews' return to Jerusalem.</span></p><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">I remained—I was detained there with the kings of Persia, that is, with the angel of the Persian rulers, with whom I had to contend, and from whom I should not have got free, but for the help of Michael. Gesenius translates, "I obtained the ascendency," that is, I gained my point against the adverse angel of Persia, so as to influence the Persian authorities to favor Israel's restoration.</span></p><div class="vheading2" data-dcnode-id="839"><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/poole/daniel/10.htm"><span data-dcnode-id="841" instrument_node="">Matthew Poole's Commentary</span></a></div><span data-dcnode-id="838" instrument_node=""> </span><span class="bld" data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">But the prince of the kingdom of Persia withstood me one and twenty days:</span></span><span data-dcnode-id="835" instrument_node=""> this place hath some difficulty, therefore variously expounded. Some expound it of earthly princes, some of angels, and among them some will have good angels meant, who they say have the patronage of the kingdoms and provinces of the earth; but who can imagine that good angels should quarrel one with the other? therefore, say others, they are bad angels that oppose the people of God, and their deliverance, seeking rather their ruin, as Michael and the devil strove, </span><span class="bld" data-dcnode-id="832"><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/12-7.htm" title="And there was war in heaven: Michael and his angels fought against the dragon; and the dragon fought and his angels,"><span data-dcnode-id="834" instrument_node="">Revelation 12:7</span></a></span><span data-dcnode-id="831" instrument_node="">: now sometimes God permits Satan to do much this way. But I judge by the prince of Persia is meant Cambyses, who was an enemy to the Jews, and hindered the building of the temple. Now he could not properly resist the angel, but figuratively he did. Angels’ power is not unlimited, but by commission and instructions from God, and their works successive. Therefore God suffered the wicked counsels of Cambyses to take place a while; but Daniel by his prayers, and the angel by his power, overcame him at last. And this very thing laid a foundation of the Persian monarchy’s ruin, </span><span class="bld" data-dcnode-id="828"><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-20.htm" title="Then said he, Know you why I come to you? and now will I return to fight with the prince of Persia: and when I am gone forth, see, the prince of Grecia shall come."><span data-dcnode-id="830" instrument_node="">Daniel 10:20</span></a></span><span data-dcnode-id="827" instrument_node="">; and doubtless that king was stirred up to his evil machinations against the people of God by the prince of the powers of darkness, that ruleth in the children of disobedience, </span><span class="bld" data-dcnode-id="824"><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/ephesians/2-2.htm" title="Wherein in time past you walked according to the course of this world, according to the prince of the power of the air, the spirit that now works in the children of disobedience:"><span data-dcnode-id="826" instrument_node="">Ephesians 2:2</span></a></span><span data-dcnode-id="823" instrument_node="">. </span><span class="p" data-dcnode-id="820"><br data-dcnode-id="822"><br data-dcnode-id="821"></span><span class="bld" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Michael:</span></span><span data-dcnode-id="817" instrument_node=""> this we take to be Christ. </span><span class="p" data-dcnode-id="814"><br data-dcnode-id="816"><br data-dcnode-id="815"></span><span data-dcnode-id="813" instrument_node="">1. His name signifies, who is like God. </span><span class="p" data-dcnode-id="810"><br data-dcnode-id="812"><br data-dcnode-id="811"></span><span data-dcnode-id="809" instrument_node="">2. He is the first in dignity above all the angels, </span><span class="bld" data-dcnode-id="806"><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/context/hebrews/1-4.htm" title="Being made so much better than the angels, as he has by inheritance obtained a more excellent name than they...."><span data-dcnode-id="808" instrument_node="">Hebrews 1:4-7</span></a></span><span data-dcnode-id="805" instrument_node="">, &amp;c., called archangel, and the church’s prince, </span><span class="bld" data-dcnode-id="802"><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-21.htm" title="But I will show you that which is noted in the scripture of truth: and there is none that holds with me in these things, but Michael your prince."><span data-dcnode-id="804" instrument_node="">Daniel 10:21</span></a></span><span data-dcnode-id="801" instrument_node="">. </span><span class="p" data-dcnode-id="798"><br data-dcnode-id="800"><br data-dcnode-id="799"></span><span data-dcnode-id="797" instrument_node="">3. The chief champion of his church, helping Gabriel not as his fellow, but as his general. Thus we see what care God takes of his church’s safety against their potent enemies, by doubling their succours, (when he could do it, if he pleased, without means,) thereby to consult his own glory in the world by defeating the counsels and breaking the powers of the mightiest enemies, after he had given them rope to do their worst. </span><span class="p" data-dcnode-id="794"><br data-dcnode-id="796"><br data-dcnode-id="795"></span><a data-dcnode-id="793" id="gil" name="gil"></a><div class="vheading2" data-dcnode-id="790"><a data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/gill/daniel/10.htm"><span data-dcnode-id="792" instrument_node="">Gill's Exposition of the Entire Bible</span></a></div><span data-dcnode-id="789" instrument_node="">But the prince of the kingdom of Persia withstood me one and twenty days,.... Which was just the time Daniel had been mourning and fasting, </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/10-2.htm"><span data-dcnode-id="788" instrument_node="">Daniel 10:2</span></a><span data-dcnode-id="786" instrument_node="">, and the angel had had his instructions to acquaint him with the Lord's answer to his prayers: by "the prince of the kingdom of Persia" is not to be understood the then reigning king of Persia, Cyrus, or his son Cambyses; who either of them would have been called rather king of Persia; nor were they able to withstand an angel, and such an one as Gabriel; nor is a good angel meant, the tutelar one of this kingdom; for it cannot be reasonably thought that good angels should militate against one another; but an evil angel, either Satan, the prince and god of this world, or one of his principal angels under him, employed by him to do what mischief he could in the court of Persia, against the people of God, the Jews; and with this sense agree the contests ascribed to Satan and the Angel of the Lord concerning Joshua, </span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/zechariah/3-1.htm"><span data-dcnode-id="785" instrument_node="">Zechariah 3:1</span></a><span data-dcnode-id="783" instrument_node=""> and to Michael and the devil disputing about the body of Moses, Jde 1:9 and to Michael and his angels, and the devil and his angels, warring in heaven, </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/revelation/12-7.htm"><span data-dcnode-id="782" instrument_node="">Revelation 12:7</span></a><span data-dcnode-id="780" instrument_node="">, now Gabriel's business in the court of Persia was to work upon the minds of the king of Persia and his nobles, and to influence their counsels, and put them on such measures as would be in favour of the Jews, and be encouraging to them to go on in the rebuilding of their city and temple: in this he was withstood and opposed by an evil spirit that counterworked him; by exasperating the spirit of Cambyses against them; by stirring up the Samaritans to corrupt the Persian courtiers with gifts, to take their part against the Jews; and by influencing them to accept of their gifts, and act in their favour; and this business on the angel's hands, to oppose these measures, detained him at the Persian court for the three weeks Daniel had been fasting and praying: </span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">but, lo, Michael one of the chief Princes, came to help me; called in the New Testament an Archangel, the Prince of angels, the Head of all principality and power; and is no other than Christ the Son of God, an uncreated Angel; who is "one", or "the first of the chief Princes" (x), superior to angels, in nature, name, and office; he came to "help" Gabriel, not as a fellow creature, but as the Lord of hosts; not as a fellow soldier, but as General of the armies in heaven and earth, as superior to him in wisdom and strength; and he helped him by giving him fresh counsels, orders, and instructions, which he following succeeded: </span></p><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">and I remained there with the kings of Persia; with the king of Persia and his nobles, putting into execution the orders Michael had given him, and so baffled the designs of the evil spirit; and this retarded him from being with the prophet one and twenty days. The Septuagint and Arabic versions very wrongly render the words, "and I left him there with the kings of Persia"; as if Michael was left there by Gabriel, whereas it was just the reverse. </span></p><p data-dcnode-id="773"><span data-dcnode-id="775" instrument_node="">(x) "primus", Junius &amp; Tremellius. </span><a data-dcnode-id="774" id="gsb" name="gsb"></a></p><div class="vheading2" data-dcnode-id="770"><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/gsb/daniel/10.htm"><span data-dcnode-id="772" instrument_node="">Geneva Study Bible</span></a></div><span class="cverse2" data-dcnode-id="762"><span data-dcnode-id="769" instrument_node="">But the </span><span class="cverse3" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">{h}</span></span><span data-dcnode-id="766" instrument_node=""> prince of the kingdom of Persia withstood me one and twenty days: but, lo, </span><span class="cverse3" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">{i}</span></span><span data-dcnode-id="763" instrument_node=""> Michael, one of the chief princes, came to help me; and I remained there with the kings of Persia.</span></span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">(h) Meaning Cambyses, who reigned in his father's absence, and did not only for this time hinder the building of the temple, but would have further raged, if God had not sent me to resist him: and therefore I have stayed for the profit of the Church.</span></p><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">(i) Even though God could by one angel destroy all the world, yet to assure his children of his love he sends forth double power, even Michael, that is, Christ Jesus the head of angels.</span></p></div></div><div data-dcnode-id="175" id="centbox"><div class="padcent" data-dcnode-id="176"><div class="comtype" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">EXEGETICAL (ORIGINAL LANGUAGES)</span></div><div class="vheading2" data-dcnode-id="751"><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/cambridge/daniel/10.htm"><span data-dcnode-id="753" instrument_node="">Cambridge Bible for Schools and Colleges</span></a></div><span class="bld" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">13</span></span><span data-dcnode-id="748" instrument_node="">. The opposition, for 21 days (cf. </span><span class="ital" data-dcnode-id="745"><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-2.htm" title="In those days I Daniel was mourning three full weeks."><span data-dcnode-id="747" instrument_node="">Daniel 10:2</span></a></span><span data-dcnode-id="744" instrument_node="">), of the ‘prince,’ i.e. the patron-angel, of Persia, prevented the dazzling being from reaching Daniel sooner.</span><span class="p" data-dcnode-id="741"><br data-dcnode-id="743"><br data-dcnode-id="742"></span><span class="ital" data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">the prince of the kingdom of Persia</span></span><span data-dcnode-id="738" instrument_node="">] its patron- or guardian-angel. The doctrine of tutelary angels, presiding over the destinies of particular nations, though there appears a trace of the idea in </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/isaiah/24-21.htm" title="And it shall come to pass in that day, that the LORD shall punish the host of the high ones that are on high, and the kings of the earth on the earth."><span data-dcnode-id="737" instrument_node="">Isaiah 24:21</span></a><span data-dcnode-id="735" instrument_node="">, and according to some commentators, in Psalms 82, is found for the first time distinctly in the O.T. in this prophecy of Dan. (</span><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-13.htm" title="But the prince of the kingdom of Persia withstood me one and twenty days: but, see, Michael, one of the chief princes, came to help me; and I remained there with the kings of Persia."><span data-dcnode-id="734" instrument_node="">Daniel 10:13</span></a><span data-dcnode-id="732" instrument_node="">; </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/context/daniel/10-20.htm" title="Then said he, Know you why I come to you? and now will I return to fight with the prince of Persia: and when I am gone forth, see, the prince of Grecia shall come...."><span data-dcnode-id="731" instrument_node="">Daniel 10:20-21</span></a><span data-dcnode-id="729" instrument_node="">, </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/11-1.htm" title="Also I in the first year of Darius the Mede, even I, stood to confirm and to strengthen him."><span data-dcnode-id="728" instrument_node="">Daniel 11:1</span></a><span data-dcnode-id="726" instrument_node="">, </span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/12-1.htm" title="And at that time shall Michael stand up, the great prince which stands for the children of your people: and there shall be a time of trouble, such as never was since there was a nation even to that same time: and at that time your people shall be delivered, every one that shall be found written in the book."><span data-dcnode-id="725" instrument_node="">Daniel 12:1</span></a><span data-dcnode-id="723" instrument_node="">). In the earlier books of the O.T. angels appear merely as the ‘messengers’ of Jehovah, with little or no personal character or distinctness of their own: in the later books of the O.T. grades and differences begin to be recognised among them; particular angels are appropriated to particular purposes or functions; and they begin to receive individual names (see below). The origin of the idea of patron-angels is matter of conjecture: even as applied to Israel, it evidently signifies more than is implied in such passages as </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/23-20.htm" title="Behold, I send an Angel before you, to keep you in the way, and to bring you into the place which I have prepared."><span data-dcnode-id="722" instrument_node="">Exodus 23:20</span></a><span data-dcnode-id="720" instrument_node="">; </span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/23-23.htm" title="For my Angel shall go before you, and bring you in to the Amorites, and the Hittites, and the Perizzites, and the Canaanites, the Hivites, and the Jebusites: and I will cut them off."><span data-dcnode-id="719" instrument_node="">Exodus 23:23</span></a><span data-dcnode-id="717" instrument_node="">; </span><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/32-34.htm" title="Therefore now go, lead the people to the place of which I have spoken to you: behold, my Angel shall go before you: nevertheless in the day when I visit I will visit their sin on them."><span data-dcnode-id="716" instrument_node="">Exodus 32:34</span></a><span data-dcnode-id="714" instrument_node="">; </span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/33-2.htm" title="And I will send an angel before you; and I will drive out the Canaanite, the Amorite, and the Hittite, and the Perizzite, the Hivite, and the Jebusite:"><span data-dcnode-id="713" instrument_node="">Exodus 33:2</span></a><span data-dcnode-id="711" instrument_node=""> (which speak of an angel leading Israel to its home in Canaan). According to some (see the art. Angel in the </span><span class="ital" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Encycl. Biblica</span></span><span data-dcnode-id="708" instrument_node="">, col. 108), they are the ancient ‘gods of the nations,’—which, according to </span><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/deuteronomy/29-26.htm" title="For they went and served other gods, and worshipped them, gods whom they knew not, and whom he had not given to them:"><span data-dcnode-id="707" instrument_node="">Deuteronomy 29:26</span></a><span data-dcnode-id="705" instrument_node=""> (cf. </span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/4-19.htm" title="Then Daniel, whose name was Belteshazzar, was astonished for one hour, and his thoughts troubled him. The king spoke, and said, Belteshazzar, let not the dream, or the interpretation thereof, trouble you. Belteshazzar answered and said, My lord, the dream be to them that hate you, and the interpretation thereof to your enemies."><span data-dcnode-id="704" instrument_node="">Daniel 4:19</span></a><span data-dcnode-id="702" instrument_node="">), are ‘allotted’ by Jehovah to the several peoples of the earth,—transformed into ‘angels,’ under the teachings of a more consistent monotheism, for the purpose of being more distinctly subordinated to Him; according to others (see the art. Angel in Hastings’ </span><span class="ital" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Dict. of the Bible</span></span><span data-dcnode-id="699" instrument_node="">, p. 96 </span><span class="ital" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">b</span></span><span data-dcnode-id="696" instrument_node="">), the idea is due to the tendencies which arose in later times, (1) of conceiving God as ruling the world by intermediate agencies, and (2) of personifying abstract conceptions, such as the ‘spirit,’ or genius, of a nation, and of locating such personified forces in the supersensible world, whence they ruled the destinies of men. Other passages in which the same idea is found are </span><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//apocrypha.org/ecclesiasticus/17-17.htm" title="For in the division of the nations of the whole earth he set a ruler over every people; but Israel is the Lord's portion:"><span data-dcnode-id="695" instrument_node="">Sir 17:17</span></a><span data-dcnode-id="693" instrument_node=""> </span><span class="greekheb" data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">ἑκάστῳ ἔθνει κατέστησεν ἡγούμενον</span></span><span data-dcnode-id="690" instrument_node="">); and </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/deuteronomy/32-8.htm" title="When the Most High divided to the nations their inheritance, when he separated the sons of Adam, he set the bounds of the people according to the number of the children of Israel."><span data-dcnode-id="689" instrument_node="">Deuteronomy 32:8</span></a><span data-dcnode-id="687" instrument_node=""> LXX. (‘he fixed the borders of the peoples according to the number </span><span class="ital" data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">of the sons of God</span></span><span data-dcnode-id="684" instrument_node=""> [</span><span class="greekheb" data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">אל</span></span><span data-dcnode-id="681" instrument_node=""> for </span><span class="greekheb" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">ישראל</span></span><span data-dcnode-id="678" instrument_node="">],’ a reading thought by some moderns to be the original). The later Jews developed the doctrine further, teaching, for instance, that each of the 70 nations mentioned in Genesis 10 had its Angel-Prince, who defended its interests, and pleaded its cause with God (cf. the Targ. of Ps.-Jon. on </span><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/context/genesis/11-7.htm" title="Go to, let us go down, and there confound their language, that they may not understand one another's speech...."><span data-dcnode-id="677" instrument_node="">Genesis 11:7-8</span></a><span data-dcnode-id="675" instrument_node=""> and </span><a data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/deuteronomy/32-8.htm" title="When the Most High divided to the nations their inheritance, when he separated the sons of Adam, he set the bounds of the people according to the number of the children of Israel."><span data-dcnode-id="674" instrument_node="">Deuteronomy 32:8</span></a><span data-dcnode-id="672" instrument_node="">; and Weber, </span><span class="ital" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">System der Altsynag. Theol</span></span><span data-dcnode-id="669" instrument_node="">., p. 165 f.).</span><span class="p" data-dcnode-id="666"><br data-dcnode-id="668"><br data-dcnode-id="667"></span><span class="ital" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Michael</span></span><span data-dcnode-id="663" instrument_node="">] the patron-angel of the Jews (</span><span class="ital" data-dcnode-id="660"><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-21.htm" title="But I will show you that which is noted in the scripture of truth: and there is none that holds with me in these things, but Michael your prince."><span data-dcnode-id="662" instrument_node="">Daniel 10:21</span></a></span><span data-dcnode-id="659" instrument_node="">, </span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/12-1.htm" title="And at that time shall Michael stand up, the great prince which stands for the children of your people: and there shall be a time of trouble, such as never was since there was a nation even to that same time: and at that time your people shall be delivered, every one that shall be found written in the book."><span data-dcnode-id="658" instrument_node="">Daniel 12:1</span></a><span data-dcnode-id="656" instrument_node="">). The idea of the passage is that the fortunes of nations are determined by the angels representing them in heaven: the success or failure of these regulating the success or failure of the nations themselves. Cf. </span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/isaiah/24-21.htm" title="And it shall come to pass in that day, that the LORD shall punish the host of the high ones that are on high, and the kings of the earth on the earth."><span data-dcnode-id="655" instrument_node="">Isaiah 24:21</span></a><span data-dcnode-id="653" instrument_node="">.</span><span class="p" data-dcnode-id="650"><br data-dcnode-id="652"><br data-dcnode-id="651"></span><span data-dcnode-id="649" instrument_node="">As was remarked in the last note but one, it is not till the later books of the O.T. that angels begin to receive names. The only angels mentioned by name in O.T. and N.T. are ‘the Satan’ (i.e. the unfriendly Opposer or Thwarter: see Davidson’s note on </span><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/job/1-6.htm" title="Now there was a day when the sons of God came to present themselves before the LORD, and Satan came also among them."><span data-dcnode-id="648" instrument_node="">Job 1:6</span></a><span data-dcnode-id="646" instrument_node="">), Job 1-2, </span><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/context/zechariah/3-1.htm" title="And he showed me Joshua the high priest standing before the angel of the LORD, and Satan standing at his right hand to resist him...."><span data-dcnode-id="645" instrument_node="">Zechariah 3:1-2</span></a><span data-dcnode-id="643" instrument_node="">, </span><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_chronicles/21-1.htm" title="And Satan stood up against Israel, and provoked David to number Israel."><span data-dcnode-id="642" instrument_node="">1 Chronicles 21:1</span></a><span data-dcnode-id="640" instrument_node=""> [</span><span class="ital" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">altered</span></span><span data-dcnode-id="637" instrument_node=""> from the parallel, </span><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/2_samuel/24-1.htm" title="And again the anger of the LORD was kindled against Israel, and he moved David against them to say, Go, number Israel and Judah."><span data-dcnode-id="636" instrument_node="">2 Samuel 24:1</span></a><span data-dcnode-id="634" instrument_node="">], and frequently in the N.T.; Michael, here and </span><span class="ital" data-dcnode-id="631"><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-21.htm" title="But I will show you that which is noted in the scripture of truth: and there is none that holds with me in these things, but Michael your prince."><span data-dcnode-id="633" instrument_node="">Daniel 10:21</span></a></span><span data-dcnode-id="630" instrument_node="">, </span><a data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/12-1.htm" title="And at that time shall Michael stand up, the great prince which stands for the children of your people: and there shall be a time of trouble, such as never was since there was a nation even to that same time: and at that time your people shall be delivered, every one that shall be found written in the book."><span data-dcnode-id="629" instrument_node="">Daniel 12:1</span></a><span data-dcnode-id="627" instrument_node="">, Judges 9, </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/12-7.htm" title="And there was war in heaven: Michael and his angels fought against the dragon; and the dragon fought and his angels,"><span data-dcnode-id="626" instrument_node="">Revelation 12:7</span></a><span data-dcnode-id="624" instrument_node="">; and Gabriel, </span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/8-16.htm" title="And I heard a man's voice between the banks of Ulai, which called, and said, Gabriel, make this man to understand the vision."><span data-dcnode-id="623" instrument_node="">Daniel 8:16</span></a><span data-dcnode-id="621" instrument_node="">; </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/9-21.htm" title="Yes, whiles I was speaking in prayer, even the man Gabriel, whom I had seen in the vision at the beginning, being caused to fly swiftly, touched me about the time of the evening oblation."><span data-dcnode-id="620" instrument_node="">Daniel 9:21</span></a><span data-dcnode-id="618" instrument_node="">, </span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/luke/1-19.htm" title="And the angel answering said to him, I am Gabriel, that stand in the presence of God; and am sent to speak to you, and to show you these glad tidings."><span data-dcnode-id="617" instrument_node="">Luke 1:19</span></a><span data-dcnode-id="615" instrument_node="">; </span><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/luke/1-26.htm" title="And in the sixth month the angel Gabriel was sent from God to a city of Galilee, named Nazareth,"><span data-dcnode-id="614" instrument_node="">Luke 1:26</span></a><span data-dcnode-id="612" instrument_node="">.</span><span class="p" data-dcnode-id="609"><br data-dcnode-id="611"><br data-dcnode-id="610"></span><span data-dcnode-id="608" instrument_node="">In the extra-canonical books other names of angels appear. Thus in the Book of Tobit, an angel Raphael is named, who, disguised as a man, performs various offices for Tobit and Tobias (</span><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//apocrypha.org/tobit/3-17.htm" title="And Raphael was sent to heal them both, that is, to scale away the whiteness of Tobit's eyes, and to give Sara the daughter of Raguel for a wife to Tobias the son of Tobit; and to bind Asmodeus the evil spirit; because she belonged to Tobias by right of inheritance. The selfsame time came Tobit home, and entered into his house, and Sara the daughter of Raguel came down from her upper chamber."><span data-dcnode-id="607" instrument_node="">Tob 3:17</span></a><span data-dcnode-id="605" instrument_node="">, </span><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//apocrypha.org/tobit/5-4.htm" title="Therefore when he went to seek a man, he found Raphael that was an angel."><span data-dcnode-id="604" instrument_node="">Tob 5:4</span></a><span data-dcnode-id="602" instrument_node="">, &amp;c.); in </span><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//apocrypha.org/tobit/12-15.htm" title="I am Raphael, one of the seven holy angels, which present the prayers of the saints, and which go in and out before the glory of the Holy One."><span data-dcnode-id="601" instrument_node="">Tob 12:15</span></a><span data-dcnode-id="599" instrument_node=""> (cf. </span><span class="ital" data-dcnode-id="596"><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-12.htm" title="Then said he to me, Fear not, Daniel: for from the first day that you did set your heart to understand, and to chasten yourself before your God, your words were heard, and I am come for your words."><span data-dcnode-id="598" instrument_node="">Daniel 10:12</span></a></span><span data-dcnode-id="595" instrument_node="">), he is said to be ‘one of the seven holy angels [cf. Enoch lxxxi. 5 ‘those seven holy ones,’ xc. 21, 22] which present the prayers of the saints’ to God. In 2 (4) Esdr. 4:1, 5:20, 10:28, Uriel is mentioned; and in </span><a data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/4-36.htm" title="At the same time my reason returned to me; and for the glory of my kingdom, my honor and brightness returned to me; and my counsellors and my lords sought to me; and I was established in my kingdom, and excellent majesty was added to me."><span data-dcnode-id="594" instrument_node="">Daniel 4:36</span></a><span data-dcnode-id="592" instrument_node=""> (R.V.) Jeremiel, the ‘archangel.’ In the book of Enoch many names of angels occur: in ix. 1 [see the Greek text, in Charles’ ed., p. 333] and elsewhere, Michael, Uriel, Raphael, and Gabriel; in xx. 1–7 (p. 356f., Charles) the names and offices of seven principal angels, or ‘archangels,’ are enumerated (Uriel, Raphael, Raguel, Michael, Sariel, Gabriel, and Remeiel); in xl. 2–10, those of four principal angels, called here ‘presences’ (cf. </span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/isaiah/63-9.htm" title="In all their affliction he was afflicted, and the angel of his presence saved them: in his love and in his pity he redeemed them; and he bore them, and carried them all the days of old."><span data-dcnode-id="591" instrument_node="">Isaiah 63:9</span></a><span data-dcnode-id="589" instrument_node="">), Michael, Rufael (Raphael), Gabriel, and Phanuel (</span><span class="greekheb" data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">פנואל</span></span><span data-dcnode-id="586" instrument_node="">): the names of many fallen angels, who seduced the children of men (</span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/genesis/6-2.htm" title="That the sons of God saw the daughters of men that they were fair; and they took them wives of all which they chose."><span data-dcnode-id="585" instrument_node="">Genesis 6:2</span></a><span data-dcnode-id="583" instrument_node="">; </span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/genesis/6-5.htm" title="And God saw that the wickedness of man was great in the earth, and that every imagination of the thoughts of his heart was only evil continually."><span data-dcnode-id="582" instrument_node="">Genesis 6:5</span></a><span data-dcnode-id="580" instrument_node="">), are also given (vi. 7, viii. 1–3, lxix. 1–15, &amp;c.). See, further, on the names and functions of angels in the later Jewish Angelology, Weber, </span><span class="ital" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">l. c.</span></span><span data-dcnode-id="577" instrument_node=""> p. 161 ff.; Edersheim, </span><span class="ital" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Life and Times of Jesus</span></span><span data-dcnode-id="574" instrument_node="">, ii. 745 ff.; and cf. A. B. Davidson’s art. Angel in Hastings’ </span><span class="ital" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Dict. of the Bible</span></span><span data-dcnode-id="571" instrument_node="">.</span><span class="p" data-dcnode-id="568"><br data-dcnode-id="570"><br data-dcnode-id="569"></span><span class="ital" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">one of the chief princes</span></span><span data-dcnode-id="565" instrument_node="">] The reference is evidently to some group of superior angels, or (to adopt the later Greek expression) ‘archangels.’ In the book of Enoch, as has just been shewn, sometimes four angels (see esp. xl. 2–9), sometimes seven, are distinguished above the rest. Among the later Jews (Edersheim, </span><span class="ital" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">l.c.</span></span><span data-dcnode-id="562" instrument_node=""> p. 748 f.; </span><span class="ital" data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Midrash Rabba</span></span><span data-dcnode-id="559" instrument_node=""> on </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/numbers/2-20.htm" title="And by him shall be
