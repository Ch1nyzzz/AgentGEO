 the tribe of Manasseh: and the captain of the children of Manasseh shall be Gamaliel the son of Pedahzur."><span data-dcnode-id="558" instrument_node="">Numbers 2:20</span></a><span data-dcnode-id="556" instrument_node="">) Michael, Gabriel, Uriel, and Raphael were usually regarded as the four principal angels, privileged to stand immediately about the throne of God; but seven are mentioned, not only in Enoch xx. 1–7, lxxxi. 5, xc. 21, but also in </span><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//apocrypha.org/tobit/12-15.htm" title="I am Raphael, one of the seven holy angels, which present the prayers of the saints, and which go in and out before the glory of the Holy One."><span data-dcnode-id="555" instrument_node="">Tob 12:15</span></a><span data-dcnode-id="553" instrument_node=""> (see the last note), and </span><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/8-2.htm" title="And I saw the seven angels which stood before God; and to them were given seven trumpets."><span data-dcnode-id="552" instrument_node="">Revelation 8:2</span></a><span data-dcnode-id="550" instrument_node=""> (‘the seven angels which stand before God’); and probably these seven are alluded to here. Cf. Judges 9, where Michael is called the ‘archangel.’</span><span class="p" data-dcnode-id="547"><br data-dcnode-id="549"><br data-dcnode-id="548"></span><span data-dcnode-id="546" instrument_node="">Michael is the warrior-angel (cf. </span><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/12-7.htm" title="And there was war in heaven: Michael and his angels fought against the dragon; and the dragon fought and his angels,"><span data-dcnode-id="545" instrument_node="">Revelation 12:7</span></a><span data-dcnode-id="543" instrument_node="">), whose special office it is to protect the interests of Israel; in Enoch xx. 5 he is described as </span><span class="greekheb" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">ὁ εῖς τῶν ἁγίων ἀγγέλων ὃς ἐπὶ τῶν τοῦ λαοῦ ἀγαθῶν τέτακται</span></span><span data-dcnode-id="540" instrument_node=""> [</span><span class="greekheb" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">καὶ</span></span><span data-dcnode-id="537" instrument_node="">] </span><span class="greekheb" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">ἐπὶ τῷ λαῷ</span></span><span data-dcnode-id="534" instrument_node="">; in the Assumption of Moses x. 2 (ed. Charles, 1897) he appears to be the ‘angel’ who avenges Israel on their enemies at the end of the world; in the legend quoted in Judges 9 (see the patristic quotations, in Charles, </span><span class="ital" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">l. c.</span></span><span data-dcnode-id="531" instrument_node=""> p. 106 ff.), it is he who, as the angelic patron of Israel, defends the body of Moses against the devil (who claims it on the ground that Moses has been guilty of the murder of the Egyptians). For other extra-Biblical references to Michael, see Hastings’ </span><span class="ital" data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Dict. of the Bible</span></span><span data-dcnode-id="528" instrument_node="">, s. v.</span><span class="p" data-dcnode-id="525"><br data-dcnode-id="527"><br data-dcnode-id="526"></span><span class="ital" data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">remained there</span></span><span data-dcnode-id="522" instrument_node="">] properly, </span><span class="bld" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">was left over</span></span><span data-dcnode-id="519" instrument_node=""> </span><span class="ital" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">there</span></span><span data-dcnode-id="516" instrument_node=""> (the word used implying that others had departed, or been destroyed, </span><a data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/genesis/32-24.htm" title="And Jacob was left alone; and there wrestled a man with him until the breaking of the day."><span data-dcnode-id="515" instrument_node="">Genesis 32:24</span></a><span data-dcnode-id="513" instrument_node="">; </span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_samuel/30-9.htm" title="So David went, he and the six hundred men that were with him, and came to the brook Besor, where those that were left behind stayed."><span data-dcnode-id="512" instrument_node="">1 Samuel 30:9</span></a><span data-dcnode-id="510" instrument_node="">; </span><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_kings/19-10.htm" title="And he said, I have been very jealous for the LORD God of hosts: for the children of Israel have forsaken your covenant, thrown down your altars, and slain your prophets with the sword; and I, even I only, am left; and they seek my life, to take it away."><span data-dcnode-id="509" instrument_node="">1 Kings 19:10</span></a><span data-dcnode-id="507" instrument_node="">; </span><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/amos/6-9.htm" title="And it shall come to pass, if there remain ten men in one house, that they shall die."><span data-dcnode-id="506" instrument_node="">Amos 6:9</span></a><span data-dcnode-id="504" instrument_node="">), though the meaning of the expression here is far from certain. According to some it is simply </span><span class="ital" data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">I remained there</span></span><span data-dcnode-id="501" instrument_node="">, which, however, does not do justice to the word used; according to v. Lengerke, Ges., and Keil, it is </span><span class="ital" data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">I had the superiority</span></span><span data-dcnode-id="498" instrument_node="">, i.e. obtained the victory (cf. Luther, </span><span class="ital" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">da behielt ich den Sieg</span></span><span data-dcnode-id="495" instrument_node="">), the ‘prince’ of Persia having been, at least temporarily (see </span><span class="ital" data-dcnode-id="492"><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-20.htm" title="Then said he, Know you why I come to you? and now will I return to fight with the prince of Persia: and when I am gone forth, see, the prince of Grecia shall come."><span data-dcnode-id="494" instrument_node="">Daniel 10:20</span></a></span><span data-dcnode-id="491" instrument_node="">), disabled; according to Ewald, it is </span><span class="ital" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">I was superfluous there</span></span><span data-dcnode-id="488" instrument_node="">, i.e. (R.V. </span><span class="ital" data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">marg.</span></span><span data-dcnode-id="485" instrument_node="">) I was no longer needed. Meinh. and Behrm. follow LXX. and Theod. in reading </span><span class="ital" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">and I left him there</span></span><span data-dcnode-id="482" instrument_node=""> (</span><span class="greekheb" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">הותרתיו</span></span><span data-dcnode-id="479" instrument_node=""> for </span><span class="greekheb" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">נותרתי</span></span><span data-dcnode-id="476" instrument_node="">); but this verb means not </span><span class="ital" data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">to leave</span></span><span data-dcnode-id="473" instrument_node=""> simply, but </span><span class="ital" data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">to leave over</span></span><span data-dcnode-id="470" instrument_node=""> or </span><span class="ital" data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">remaining</span></span><span data-dcnode-id="467" instrument_node=""> (viz. from what has been taken elsewhere, </span><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/ezekiel/39-28.htm" title="Then shall they know that I am the LORD their God, which caused them to be led into captivity among the heathen: but I have gathered them to their own land, and have left none of them any more there."><span data-dcnode-id="466" instrument_node="">Ezekiel 39:28</span></a><span data-dcnode-id="464" instrument_node="">, or destroyed, </span><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/10-15.htm" title="For they covered the face of the whole earth, so that the land was darkened; and they did eat every herb of the land, and all the fruit of the trees which the hail had left: and there remained not any green thing in the trees, or in the herbs of the field, through all the land of Egypt."><span data-dcnode-id="463" instrument_node="">Exodus 10:15</span></a><span data-dcnode-id="461" instrument_node="">; </span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/16-19.htm" title="And Moses said, Let no man leave of it till the morning."><span data-dcnode-id="460" instrument_node="">Exodus 16:19</span></a><span data-dcnode-id="458" instrument_node=""> </span><span class="ital" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">al.</span></span><span data-dcnode-id="455" instrument_node="">): so that it is doubtful whether it would here be suitable. Perhaps, on the whole, we may acquiesce in the rend. </span><span class="ital" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">was left over</span></span><span data-dcnode-id="452" instrument_node=""> (viz. in the conflict): the ‘prince of Persia,’ for the time, succumbed; the angel, with Michael’s aid, overcame his opposition, and so was able to come to Daniel.</span><span class="p" data-dcnode-id="449"><br data-dcnode-id="451"><br data-dcnode-id="450"></span><span class="bld" data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">beside</span></span><span data-dcnode-id="446" instrument_node=""> (</span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nehemiah/8-4.htm" title="And Ezra the scribe stood on a pulpit of wood, which they had made for the purpose; and beside him stood Mattithiah, and Shema, and Anaiah, and Urijah, and Hilkiah, and Maaseiah, on his right hand; and on his left hand, Pedaiah, and Mishael, and Malchiah, and Hashum, and Hashbadana, Zechariah, and Meshullam."><span data-dcnode-id="445" instrument_node="">Nehemiah 8:4</span></a><span data-dcnode-id="443" instrument_node="">) </span><span class="ital" data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">the kings of Persia</span></span><span data-dcnode-id="440" instrument_node="">] Both the plural, and also the statement itself that the angel, after his conflict, should have found himself ‘beside’ the kings of Persia, are strange. It is probable that we should read (with LXX., Meinh., Behrm.) ‘beside </span><span class="ital" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">the prince of</span></span><span data-dcnode-id="437" instrument_node=""> the kings of Persia.’</span><span class="p" data-dcnode-id="434"><br data-dcnode-id="436"><br data-dcnode-id="435"></span><a data-dcnode-id="433" id="pul" name="pul"></a><div class="vheading2" data-dcnode-id="430"><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/pulpit/daniel/10.htm"><span data-dcnode-id="432" instrument_node="">Pulpit Commentary</span></a></div><span class="cmt_sub_title" data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Verse 13.</span></span><span data-dcnode-id="427" instrument_node=""> - </span><span class="cmt_word" data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">But the prince of the kingdom of Persia withstood me one and twenty days; but, lo, Michael, one of the ohief princes, came to help me; and I remained there with the kings of Persia</span></span><span data-dcnode-id="424" instrument_node="">. The rendering of the LXX. is, "And the general (</span><span class="greek" data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">στρατηγὸς</span></span><span data-dcnode-id="421" instrument_node="">) of the King of the Persians withstood me one and twenty days, and behold Michael, one of the first princes, came to help me, and I left him there with the general of the King of the Persians." The sense of Theedotion is nearly the same as the LXX., only he has </span><span class="greek" data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">βασιλείας Περσῶν</span></span><span data-dcnode-id="418" instrument_node=""> instead of </span><span class="greek" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">βασιλέως</span></span><span data-dcnode-id="415" instrument_node="">. Like the LXX., Thee-dotion declares that Michael was left with the Prince of Persia. The Peshitta agrees more with the Massoretic, but, like the LXX. and Theedotion, it is with the "Prince" of Persia that there is some one remaining. The Peshitta here, in opposition to the Greek versions, has the statement that Gabriel remained, not Michael. The Vulgate agrees still further with the Massoretic, only instead of the plural "kings," it has "king." The most important differences are in the last clause, where the LXX. and Theodotion must have had the hiphil of </span><span class="hebrew" data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">יָתִר</span></span><span data-dcnode-id="412" instrument_node=""> where the Massoretic has the niphal. Gratz adopts this reading, which certainly has the advantage of making sense of an otherwise unintelligible passage. Professor Bevan, in his easy way, suggests this to be probably a mere guess, the insertion of </span><span class="greek" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">αὐτὸν</span></span><span data-dcnode-id="409" instrument_node="">, and the substitution of a transitive for an intransitive verb are quite in the manner of the LXX. translators. He forgets that Theodotion also has this variation, and also that, without any justification from the versions, he himself has suggested various readings. He does not observe that this interpretation affords a reason for Gabriel's presence with Daniel. Michael relieved him in his opposition to the Prince of Persia. The other variant, "prince" instead of "king," has the support of all the versions. </span><span class="accented" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">But the prince of the kingdom of Persia withstood me one and twenty days.</span></span><span data-dcnode-id="406" instrument_node=""> That is to say, during the whole of Daniel's fast. The angelology of later Judaism is a very complicated, not to say confused, subject. The angelology of one age is not that of another; and the angelology of the Jews in one country is not that of the Jews in another. The Jews themselves understood that the Babylonian captivity did a great deal to develop the doctrine of the angels; the Jewish tradition was that they brought back from Babylon the names of the angels. Not only had their residence in Babylon defined the Jewish ideas as to the names f the angels, they began to have clearer ideas of their functions. They reached the idea that every race had its guardian angel. This view is expressed in </span><a data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/deuteronomy/32-8.htm"><span data-dcnode-id="405" instrument_node="">Deuteronomy 32:8</span></a><span data-dcnode-id="403" instrument_node="">, according to the Septuagint, "He set bounds for the nations according to the number of the angels of God." To a similar purport is Ecclus. 17:17, "To each of the nations he appointed a leader, and Israel is the portion of the Lord." There seems, however, a preparation for this in </span><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/isaiah/24-21.htm"><span data-dcnode-id="402" instrument_node="">Isaiah 24:21</span></a><span data-dcnode-id="400" instrument_node=""> (comp. also </span><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/psalms/29-1.htm"><span data-dcnode-id="399" instrument_node="">Psalm 29:1</span></a><span data-dcnode-id="397" instrument_node="">; </span><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/psalms/106-9.htm"><span data-dcnode-id="396" instrument_node="">Psalm 106:9</span></a><span data-dcnode-id="394" instrument_node="">). As independent of revelation there is a strong inherent probability that there are races of beings of intelligence and might vastly superior to man, there is nothing inherently improbable in these intelligences being employed by the Almighty in furthering his providential scheme. Men are instruments of God; is it not at least not improbable that, if there are angels, they, too, co-operate with God in the working out of his great purpose? That every nation should have an angelic prince over it is not more extraordinary than that every Church should have a special angel over it (</span><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/1-20.htm"><span data-dcnode-id="393" instrument_node="">Revelation 1:20</span></a><span data-dcnode-id="391" instrument_node="">; </span><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/2-2.htm"><span data-dcnode-id="390" instrument_node="">Revelation 2:2</span></a><span data-dcnode-id="388" instrument_node="">, etc.). That there should be conflicts between these angelic princes is simply to say they are finite. Hitzig's reference to </span><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/12-7.htm"><span data-dcnode-id="387" instrument_node="">Revelation 12:7</span></a><span data-dcnode-id="385" instrument_node=""> is not to the point, for there is no indication of warlike opposition here. By the indications here, we might judge that the opposition of the Prince of Persia was to the coming of Gabriel to reveal to Daniel the purpose of God. We know nothing of the means employed in the opposition, or of the reason of it. Keil and Kliefoth have the idea that Gabriel was striving to influence the King of Persia, but was hindered in his efforts by the "Prince of Persia;" this is scarcely berne out by the context. </span><span class="accented" data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">But</span></span><span data-dcnode-id="382" instrument_node="">, </span><span class="accented" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">lo</span></span><span data-dcnode-id="379" instrument_node="">, </span><span class="accented" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Michael</span></span><span data-dcnode-id="376" instrument_node="">, </span><span class="accented" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">one of the chief princes</span></span><span data-dcnode-id="373" instrument_node="">, </span><span class="accented" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">came to help</span></span><span data-dcnode-id="370" instrument_node=""> me. Michael ("Who is like God?") is, in the twenty-first verse, declared to be the "prince" of the Jewish people, therefore equivalent to "the captain of the host of the Lord" (</span><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/joshua/5-14.htm"><span data-dcnode-id="369" instrument_node="">Joshua 5:14</span></a><span data-dcnode-id="367" instrument_node="">). He is referred to in </span><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/12-7.htm"><span data-dcnode-id="366" instrument_node="">Revelation 12:7</span></a><span data-dcnode-id="364" instrument_node=""> and </span><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/jude/1-9.htm"><span data-dcnode-id="363" instrument_node="">Jude 1:9</span></a><span data-dcnode-id="361" instrument_node="">. Where he is called one of "the chief princes," there is reference to an angelic hierarchy, whether the same as that we find developed in the Book of Enoch or not cannot be decided certainly. In the Book of Tobit 12:15 Raphael declares himself "one of the seven holy angels who present the prayers of the saints, and who go in and out before the glory of the Holy One." The Book of Tobit seems to have been written about  </span><span class="date" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">B.C. 400</span></span><span data-dcnode-id="358" instrument_node="">; hence this is an indication of opinion before the Books of Enoch. In the Enoch books not only are the great  angels mentioned, but their names arc given, and functions are assigned to them; but they are numbered as four, not seven. Enoch is posterior to Tobit, and finds a place for Michael, Raphael, and Gabriel. We have no means of testing whether the number of the chief angelic princes, of whom Michael was one, was four or seven, according to the opinion of Daniel. From the fact that Enoch is, so to speak, in the direct line of apocalyptic descent from Daniel, and Tobit is not, and, moreover, as the angelology of Tobit is in close connection with the Persian hierarchy of </span><span class="accented" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">am-haspentas</span></span><span data-dcnode-id="355" instrument_node="">, of which there were seven, - we may regard four as the more genuinely Jewish number. The later Jewish angel-elegy has many Persian elements, as shown by Dr. Kohut, in his 'Angelologie und Demonologie.' Whether the number of the archangels be made four or seven, both Gabriel and Michael are of the number, whereas Gabriel's words would rather indicate that, though Michael belonged to the rank of chief prince, he did not. As we cannot tell the nature of the opposition, we cannot tell the nature of the help afforded. </span><span class="accented" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">And I remained there with the kings of Persia.</span></span><span data-dcnode-id="352" instrument_node=""> It is very difficult to interpret this if we retain the Massoretic reading. In the first place, the sense given to </span><span class="accented" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">nothartee</span></span><span data-dcnode-id="349" instrument_node=""> in the Authorized and Revised is unsuitable. The angel is explaining how, after having delayed three whole weeks, he has now come. The sentence, as interpreted above,would have explained why he could not come at all to Daniel. It is attempted to get over this by explaining that Gabriel had beaten off the "Prince" of Persia, and that Michael remained with the King of Persia instead of him. This view, however, contradicts the function assigned to angels of nations, and implies a quasi-omnipresence on the part of Gabriel, and would render his explanation no explanation. The explanation of Gesenius, Havernick, and yon Lengerke, that </span><span class="accented" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">nothartee</span></span><span data-dcnode-id="346" instrument_node=""> is to be taken as meaning "I received the pre-eminence," as Wirier, "superior discessi apud reges Persarum," has no justification in usage. Gescnius would bring in the Syriac use of the hithpael of this verb, but though both Castell and Brockehuann assign meanings suitable, none of their quotations represents a sense precisely similar to that assigned to the verb here Hitzig's interpretation, "I was delayed," fails to explain his coming. Ewald's explanation, "I was superfluous," is logical, but has no grammatical justification. Professor Bevan's explanation, which would take this last clause as parenthetical, is untenable, as it supplies no redden for the presence of Gabriel with Daniel. We must follow the LXX. and Theodotion in reading, either as Meinhold and Behrmann, </span><span class="hebrew" data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">וְהותַרְתִּין</span></span><span data-dcnode-id="343" instrument_node=""> or better, as Gratz, </span><span class="hebrew" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">אִתּו הֹותַרְתִּי</span></span><span data-dcnode-id="340" instrument_node="">, as the </span><span class="accented" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">vav </span></span><span data-dcnode-id="337" instrument_node="">in the former ease would naturally be read conversively. Besides, Gratz's reading explains the needlessly emphatic </span><span class="hebrew" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">אֲנִי</span></span><span data-dcnode-id="334" instrument_node="">. Further, it seems needful to accept the reading of the two Greek versions and the Peshitta, and instead of </span><span class="hebrew" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">מַלְכֵי</span></span><span data-dcnode-id="331" instrument_node=""> read </span><span class="hebrew" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">שד</span></span><span data-dcnode-id="328" instrument_node="">. None of the old versions support the Massoretic; the Vulgate is the nearest; and all of them have either read </span><span class="hebrew" data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">מֶלֶך</span></span><span data-dcnode-id="325" instrument_node=""> or regarded </span><span class="hebrew" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">מלכי</span></span><span data-dcnode-id="322" instrument_node=""> as a form of the construct state, and so vocalized differently. Further, the later context here implies the contiuance of the conflict or controversy (vers. 20, 21). We must understand, then, that Gabriel left Michael to maintain the conflict against the angelic "Prince" of Persia, while he came in obedience to Daniel's prayer. We can have but little idea of what is meant by this conflict in the heavenlies between angelic beings. Daniel 10:13</span><a data-dcnode-id="321" id="kad" name="kad"></a><div class="vheading2" data-dcnode-id="318"><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/kad/daniel/10.htm"><span data-dcnode-id="320" instrument_node="">Keil and Delitzsch Biblical Commentary on the Old Testament</span></a></div><span data-dcnode-id="317" instrument_node="">According to this verse, the words of Daniel, i.e., his prayer from the first day of his seeking to understand the future, and of his self-mortification in sorrow and fasting (</span><a data-dcnode-id="315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/10-2.htm"><span data-dcnode-id="316" instrument_node="">Daniel 10:2</span></a><span data-dcnode-id="314" instrument_node="">, </span><a data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-3.htm"><span data-dcnode-id="313" instrument_node="">Daniel 10:3</span></a><span data-dcnode-id="311" instrument_node="">), was heard of God, and the angel was immediately sent forth by God to convey to him revelations. And, he adds, בּדבריך בּאתי, I am come for thy words, i.e., in consequence of thy prayer, according to it. The בּאתי most interpreters understand of the coming to Daniel; Hofmann (Schriftbew. i. p. 331) and Kliefoth, on the contrary, understand it of the coming of the angel to Persia (</span><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-13.htm"><span data-dcnode-id="310" instrument_node="">Daniel 10:13</span></a><span data-dcnode-id="308" instrument_node="">). According to the matter, both views are correct, but in the form in which they are presented they are incorrect. Against the latter stands the adversative  וin ושׂר (but the prince), </span><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/10-13.htm"><span data-dcnode-id="307" instrument_node="">Daniel 10:13</span></a><span data-dcnode-id="305" instrument_node="">, by which the contents of </span><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-13.htm"><span data-dcnode-id="304" instrument_node="">Daniel 10:13</span></a><span data-dcnode-id="302" instrument_node=""> are introduced; for, according to this, </span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-13.htm"><span data-dcnode-id="301" instrument_node="">Daniel 10:13</span></a><span data-dcnode-id="299" instrument_node=""> cannot represent the object of the coming. Against the former stands the fact, that the angel does not come to Daniel immediately, but only after having gained a victory over the prince of the kingdom. The בּאתי is again taken up in </span><a data-dcnode-id="297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/10-14.htm"><span data-dcnode-id="298" instrument_node="">Daniel 10:14</span></a><span data-dcnode-id="296" instrument_node="">, and must have here the same meaning that it has there. But in </span><a data-dcnode-id="294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-14.htm"><span data-dcnode-id="295" instrument_node="">Daniel 10:14</span></a><span data-dcnode-id="293" instrument_node=""> it is connected with להבינך, "I am come to bring thee understanding," in </span><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-12.htm"><span data-dcnode-id="292" instrument_node="">Daniel 10:12</span></a><span data-dcnode-id="290" instrument_node=""> with בּדבריך, which only denotes that the "coming" corresponded to Daniel's prayer, but not that he came immediately to him. Daniel had, without doubt, prayed for the accomplishment of the salvation promised to his people, and eo ipso for the removal of all the hindrances that stood in the way of that accomplishment. The hearing of his prayer may be regarded, therefore, as containing in it not merely the fact that God directed an angel to convey to him disclosures regarding the future fortunes of his people, but also at the same time as implying that on the side of God steps were taken for the removal of these hindrances.</span><p data-dcnode-id="264"><span data-dcnode-id="289" instrument_node="">The thirteenth verse speaks of this, not as denoting that the angel came to Persia for the purpose of working for Israel, but much rather as announcing the reason of the twenty-one days' delay in the coming of the angel to Daniel, in the form of a parenthetical clause. His coming to Daniel was hindered by this, that the prince of the kingdom of Persia withstood him twenty-one days. The twenty-one days are those three weeks of Daniel's fasting and prayer, </span><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-2.htm"><span data-dcnode-id="288" instrument_node="">Daniel 10:2</span></a><span data-dcnode-id="286" instrument_node="">. Hence we see that the coming of the angel had its reference to Daniel, for he came to bring him a comforting answer from God; but in order that he might be able to do this, he must first, according to </span><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/10-13.htm"><span data-dcnode-id="285" instrument_node="">Daniel 10:13</span></a><span data-dcnode-id="283" instrument_node="">, enter into war with and overcome the spirit of the king of Persia, hostile to the people of God. The contents of </span><a data-dcnode-id="281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-13.htm"><span data-dcnode-id="282" instrument_node="">Daniel 10:13</span></a><span data-dcnode-id="280" instrument_node=""> are hence not to be understood as showing that the angel went to Persia in order that he might there arrange the cause of Israel with the king; the verse much rather speaks of a war in the kingdom of the supernatural spirits, which could not relate to the court of the king of Persia. The prince (שׂר) of the kingdom of Persia, briefly designated in </span><a data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-21.htm"><span data-dcnode-id="279" instrument_node="">Daniel 10:21</span></a><span data-dcnode-id="277" instrument_node=""> "the prince of Persia," is not king Cyrus, or the collectivum of the kings of Persia, as Hv. and Kran., with Calvin and most of the Reformers, think, but the guardian spirit or the protecting genius of the Persian kingdom, as the Rabbis and most of the Christian interpreters have rightly acknowledged. For the angel that appeared to Daniel did not fight with the kings of Persia, but with a spiritual intelligence of a like nature, for the victory, or precedence with the kings of Persia. This spirit of the kingdom of Persia, whom, after the example of Jerome, almost all interpreters call the guardian angel of his kingdom, is as little the nature-power of this kingdom as Michael is the nature-power of Israel, but is a spirit-being; yet not the heathen national god of the Persians, but, according to the view of Scripture (</span><a data-dcnode-id="275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/1_corinthians/10-20.htm"><span data-dcnode-id="276" instrument_node="">1 Corinthians 10:20</span></a><span data-dcnode-id="274" instrument_node="">.), the δαιμόνιον of the Persian kingdom, i.e., the supernatural spiritual power standing behind the national gods, which we may properly call the guardian spirit of this kingdom. In the לנגדּי עמד lies, according to the excellent remark of Kliefoth, the idea, that "the שׂר of the kingdom of Persian stood beside the kings of the Persians to influence them against Israel, and to direct against Israel the power lying in Persian heathendom, so as to support the insinuations of the Samaritans; that the angel, </span><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/10-5.htm"><span data-dcnode-id="273" instrument_node="">Daniel 10:5</span></a><span data-dcnode-id="271" instrument_node="">, came on account of Daniel's prayer to dislodge this 'prince' from his position and deprive him of his influence, but he kept his place for twenty-one days, till Michael came to his help; then he so gained the mastery over him, that he now stood in his place beside the kings of Persia, so as henceforth to influence them in favour of Israel." He who appeared to Daniel, </span><a data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/10-5.htm"><span data-dcnode-id="270" instrument_node="">Daniel 10:5</span></a><span data-dcnode-id="268" instrument_node="">, and spake with him, </span><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/10-11.htm"><span data-dcnode-id="267" instrument_node="">Daniel 10:11</span></a><span data-dcnode-id="265" instrument_node="">, is not "the angel who had his dominion among the nations of the world," or "his sphere of action in the embodiments of the heathen world-power, to which the Jewish people were now in subjection, to promote therein the working out of God's plan of salvation" (Hofm. Schriftbew. i. p. 334). This supposition is destitute of support from the Scriptures. It is rather the Angel of the Lord who carries out God's plans in the world, and for their accomplishment and execution makes war against the hostile spirit of the heathen world-power. The subjugation of this spirit supposes a particular angel ruling in the heathen world just as little as Jehovah's contending against the heathen nations that oppress and persecute His kingdom and people.</span></p><p data-dcnode-id="250"><span data-dcnode-id="263" instrument_node="">In the war against the hostile spirit of the kingdom of Persia, the archangel Michael came to the help of the Angel of the Lord. The name מיכאל, who is as God, comes into view, as does the name Gabriel, only according to the appellative signification of the word, and expresses, after the analogy of </span><a data-dcnode-id="261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/15-11.htm"><span data-dcnode-id="262" instrument_node="">Exodus 15:11</span></a><span data-dcnode-id="260" instrument_node="">; </span><a data-dcnode-id="258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/psalms/89-7.htm"><span data-dcnode-id="259" instrument_node="">Psalm 89:7</span></a><span data-dcnode-id="257" instrument_node="">., the idea of God's unparalleled helping power. Michael is thus the angel possessing the unparalleled power of God. He is here said to be "one of the chief princes," i.e., of the highest angel-princes, - </span><a data-dcnode-id="255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/10-21.htm"><span data-dcnode-id="256" instrument_node="">Daniel 10:21</span></a><span data-dcnode-id="254" instrument_node="">, "your prince," i.e., the prince who contends for Israel, who conducts the cause of Israel. The first title points undoubtedly to an arrangement of orders and degrees among the angels, designating Michael as one of the most distinguished of the angel-princes; hence called in Jde 1:9 ἀρχάγγελος, also in </span><a data-dcnode-id="252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/revelation/12-7.htm"><span data-dcnode-id="253" instrument_node="">Revelation 12:7</span></a><span data-dcnode-id="251" instrument_node="">, where he is represented as contending with his angels against the dragon. The opinion that Michael is called "one of the chief princes," not as in contrast with the angels, but only with the demons of the heathen gods (Kliefoth), is opposed by the words themselves and by the context. From the circumstance that the guardian spirit of Persia is called שׂר it does not follow that שׂרים is not a designation of the angels generally, but only of the princes of the people, who are the spirits ruling in the social affairs of nations and kingdoms (Hofmann, p. 337); and even though this conclusion may be granted, this meaning for השׂרים with the article and the predicate הראשׁנים is undemonstrable. For the Scripture does not place the demon-powers of heathendom so on a line with the angels that both are designated as ראשׁנים שׂרים. The ראשׁנים שׁרים can only be the princes, chiefs, of the good angels remaining in communion with God, and working for the kingdom of God. Though what is said by the angel Michael, for the sake of the Israelitish people, among whom he has the sphere of his activity, may be said for their comfort, yet it does not follow therefrom that that which is said "cannot give disclosures regarding the relation within the angel-world, but only regarding the relation to the great historical nations and powers of the world" (Hofm. p. 338). For as regards the statement adduced in support of this opinion - "the greatness and importance of the work entrusted to him makes him one of the ראשׁנים, not that the work is entrusted to him because he is so" - just the contrary is true. To a subordinate spirit God will not entrust a work demanding special power and greatness; much rather the being entrusted with a great and important work supposes a man exalted above the common mass. And for the comforting of Israel the words, "Michael, one of the foremost princes, came to my help," affirm that Israel is under very powerful protection, because its guardian spirit is one of the foremost of the angel-princes, whereby implic. it is said at the same time that the people, though they be little esteemed before the world, yet cannot be destroyed by the nations of the world. This thought follows as a conclusion from what is said regarding the dignity of their guardian angel, but it does not form the contents of the saying regarding Michael and his place among the heavenly spirits.</span></p><p data-dcnode-id="233"><span data-dcnode-id="249" instrument_node="">But we learn from </span><a data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-21.htm"><span data-dcnode-id="248" instrument_node="">Daniel 10:21</span></a><span data-dcnode-id="246" instrument_node=""> the reason why the archangel Michael, and no other angel, came to the help of him who was clothed with linen. It was because Michael was the prince of Israel, i.e., "the high angel-prince who had to maintain the cause of the people of God in the invisible spirit-world against opposing powers" (Auberlen, p. 289); and as such he appears also in Jde 1:9 and </span><a data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/12-7.htm"><span data-dcnode-id="245" instrument_node="">Revelation 12:7</span></a><span data-dcnode-id="243" instrument_node="">. The coming of Michael to give help does not include in it this, that he was superior in might or in position to the angel that spake, and thus supplies no proof that the angel that spake was Gabriel, or an angel different from him who was clothed with linen. For even a subordinate servant can bring help to his master, and in a conflict render him aid in gaining the victory. Against the idea of the subjection of Michael to the angel that spake, or the man clothed with linen, stands the further unfolding of the angel's message, the statement in </span><a data-dcnode-id="241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/10-21.htm"><span data-dcnode-id="242" instrument_node="">Daniel 10:21</span></a><span data-dcnode-id="240" instrument_node=""> and </span><a data-dcnode-id="238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/daniel/11-1.htm"><span data-dcnode-id="239" instrument_node="">Daniel 11:1</span></a><span data-dcnode-id="237" instrument_node="">, according to which the angel that spake gave strength and help to Michael in the first year of the Median Darius, from which we have more reason to conclude that the angel who spake stood above the angel Michael; see under </span><a data-dcnode-id="235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/daniel/11-1.htm"><span data-dcnode-id="236" instrument_node="">Daniel 11:1</span></a><span data-dcnode-id="234" instrument_node="">.</span></p><p data-dcnode-id="228"><span data-dcnode-id="232" instrument_node="">In consequence of the assistance on the part of Michael, the Angel of the Lord obtained the place of superiority by the side of the king of Persia. נותר has not here the usual meaning, to be over and above, to remain, but is to be translated after הותיר, </span><a data-dcnode-id="230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/genesis/49-4.htm"><span data-dcnode-id="231" instrument_node="">Genesis 49:4</span></a><span data-dcnode-id="229" instrument_node="">, to have the pre-eminence, to excel, in the passive signification of the Hiphil: "to be provided with the preference, to gain the superiority." The translation, "I have maintained the place" (Hofm.), cannot be proved. אצל, at the side of, near, is explained from the idea of the protecting spirit standing by the side of his protege. The plural, "kings of Persia," neither refers to Cyrus and Cambyses, nor to Cyrus and the conquered kings living with him (Croesus, etc.), nor to Cyrus and the prince, i.e., his guardian spirit (Hitzig). The plural denotes, that by the subjugation of the demon of the Persian kingdom, his influence not merely over Cyrus, but over all the following kings of Persia, was brought to an end, so that the whole of the Persian kings became accessible to the influence of the spirit proceeding from God and advancing the welfare of Israel. </span></p><div class="vheading2" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Links</span></div><a data-dcnode-id="224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/interlinear/daniel/10-13.htm"><span data-dcnode-id="225" instrument_node="">Daniel 10:13 Interlinear</span></a><br data-dcnode-id="223"><a data-dcnode-id="221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/texts/daniel/10-13.htm"><span data-dcnode-id="222" instrument_node="">Daniel 10:13 Parallel Texts</span></a><br data-dcnode-id="220"><span class="p" data-dcnode-id="217"><br data-dcnode-id="219"><br data-dcnode-id="218"></span><a data-dcnode-id="215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/niv/daniel/10-13.htm"><span data-dcnode-id="216" instrument_node="">Daniel 10:13 NIV</span></a><br data-dcnode-id="214"><a data-dcnode-id="212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nlt/daniel/10-13.htm"><span data-dcnode-id="213" instrument_node="">Daniel 10:13 NLT</span></a><br data-dcnode-id="211"><a data-dcnode-id="209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/esv/daniel/10-13.htm"><span data-dcnode-id="210" instrument_node="">Daniel 10:13 ESV</span></a><br data-dcnode-id="208"><a data-dcnode-id="206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nasb/daniel/10-13.htm"><span data-dcnode-id="207" instrument_node="">Daniel 10:13 NASB</span></a><br data-dcnode-id="205"><a data-dcnode-id="203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/kjv/daniel/10-13.htm"><span data-dcnode-id="204" instrument_node="">Daniel 10:13 KJV</span></a><span class="p" data-dcnode-id="200"><br data-dcnode-id="202"><br data-dcnode-id="201"></span><a data-dcnode-id="198" href="https://chatnoir-webcontent.chatnoir.eu/?inde
