</span><div class="sponsor-sidebar" data-dcnode-id="281"><div align="center" class="desktop-show" data-dcnode-id="282"><div class="adManager-placeholder" data-dcnode-id="283"><div class="adManager-content adManager-content-iframe" data-dcnode-id="284"><iframe data-dcnode-id="285" frameborder="0" height="600" id="adManagerIframe" marginheight="0" marginwidth="0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//banners.compassion.com/banners/birthday-search/frame-160x600V2.php%3Freferer%3D633526%26utm_source%3Dgotquestions%26utm_medium%3Daffiliate&amp;raw" style="border: 0px; vertical-align: bottom;" title="3rd party ad content" width="160"></iframe></div></div></div></div><span data-dcnode-id="280" instrument_node="">
</span><h1 data-dcnode-id="277"><span data-dcnode-id="278" itemprop="name headline" property="og:title"><span data-dcnode-id="279" instrument_node="">Who is the prince of Persia in Daniel 10?</span></span></h1><span data-dcnode-id="276" instrument_node="">
</span><div class="actions-wrap" data-dcnode-id="272"><div class="actions" data-dcnode-id="273"><a data-dcnode-id="274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//printer.gotquestions.net/GeneratePF%3FarticleId%3D17028" onclick="gtag('event', 'click', {'event_category':'engagement', 'event_label':'print'});" rel="noopener" target="_blank"><img alt="prince of Persia" class="questionInteract" data-dcnode-id="275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotquestions.org/img/print.svg&amp;raw"></a></div></div><span data-dcnode-id="271" instrument_node="">
</span><div data-dcnode-id="213" itemprop="articleBody"><span data-dcnode-id="270" instrument_node="">
</span><div class="label gradient-to-tr" data-dcnode-id="268" style="--color-start: #29a699; --color-end: #749c5a;"><span data-dcnode-id="269" instrument_node="">Answer</span></div><br data-dcnode-id="267"><br data-dcnode-id="266"><span data-dcnode-id="265" instrument_node="">
The prince of Persia is only mentioned in </span><a class="rtBibleRef" data-dcnode-id="263" data-purpose="bible-reference" data-reference="Dan 10" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Dan%252010" rel="noopener" target="_blank"><span data-dcnode-id="264" instrument_node="">Daniel 10</span></a><span data-dcnode-id="262" instrument_node="">, a highly apocalyptic (and therefore at least partially symbolic) section of the </span><a data-dcnode-id="260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotquestions.org/Book-of-Daniel.html"><span data-dcnode-id="261" instrument_node="">book of Daniel</span></a><span data-dcnode-id="259" instrument_node="">. Most likely, the prince of Persia is a reference to an evil spiritual entity that wielded authority over the ancient kingdom of Persia.</span><br data-dcnode-id="258"><br data-dcnode-id="257"><span data-dcnode-id="256" instrument_node="">
The prophet Daniel had received a troubling vision concerning a great war (</span><a class="rtBibleRef" data-dcnode-id="254" data-purpose="bible-reference" data-reference="Dan 10.1" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Dan%252010.1" rel="noopener" target="_blank"><span data-dcnode-id="255" instrument_node="">Daniel 10:1</span></a><span data-dcnode-id="253" instrument_node="">). He went into a three-week period of mourning, fasting, and prayer. In response to Daniel’s prayer, God sent a heavenly messenger to explain the vision. However, the messenger was delayed for those same three weeks, as he explains to Daniel: “But the prince of the Persian kingdom resisted me twenty-one days. Then Michael, one of the chief princes, came to help me, because I was detained there with the king of Persia” (</span><a class="rtBibleRef" data-dcnode-id="251" data-purpose="bible-reference" data-reference="Dan 10.13" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Dan%252010.13" rel="noopener" target="_blank"><span data-dcnode-id="252" instrument_node="">Daniel 10:13</span></a><span data-dcnode-id="250" instrument_node="">). Later, the angel speaking to Daniel predicts further fighting: “Soon I will return to fight against the prince of Persia, and when I go, the prince of Greece will come; but first I will tell you what is written in the Book of Truth. (No one supports me against them except Michael, your prince)” (verses 20–21).</span><br data-dcnode-id="249"><br data-dcnode-id="248"><span data-dcnode-id="247" instrument_node="">
Taking this passage at face value, it seems that the prince of Persia is a fallen angel who in some sense had authority or influence over the physical </span><a data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotquestions.org/Medo-Persian-empire.html"><span data-dcnode-id="246" instrument_node="">kingdom of Persia</span></a><span data-dcnode-id="244" instrument_node="">. In </span><a class="rtBibleRef" data-dcnode-id="242" data-purpose="bible-reference" data-reference="Dan 10" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Dan%252010" rel="noopener" target="_blank"><span data-dcnode-id="243" instrument_node="">Daniel 10</span></a><span data-dcnode-id="241" instrument_node="">, the prophet is praying about the future of his people and their exile in Persia. A heavenly angel is dispatched with the answer, but a demonic “prince of Persia” obstructs the messenger. This action would make sense, as the divine answer involves the overthrow of the Persian Empire. The angelic messenger finally gets some help from the </span><a data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotquestions.org/Michael-the-archangel.html"><span data-dcnode-id="240" instrument_node="">archangel Michael</span></a><span data-dcnode-id="238" instrument_node="">, who is apparently the prince (or one of the princes) of Israel in the angelic realm (</span><a class="rtBibleRef" data-dcnode-id="236" data-purpose="bible-reference" data-reference="Dan 10.13" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Dan%252010.13" rel="noopener" target="_blank"><span data-dcnode-id="237" instrument_node="">Daniel 10:13</span></a><span data-dcnode-id="235" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="233" data-purpose="bible-reference" data-reference="Daniel 10.21" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Daniel%252010.21" rel="noopener" target="_blank"><span data-dcnode-id="234" instrument_node="">21</span></a><span data-dcnode-id="232" instrument_node="">).</span><br data-dcnode-id="231"><br data-dcnode-id="230"><span data-dcnode-id="229" instrument_node="">
Then the angelic messenger says he will face even more spiritual warfare, returning to fight against the prince of Persia. After that, he will face another spiritual enemy, the prince of Greece (</span><a class="rtBibleRef" data-dcnode-id="227" data-purpose="bible-reference" data-reference="Dan 10.20" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Dan%252010.20" rel="noopener" target="_blank"><span data-dcnode-id="228" instrument_node="">Daniel 10:20</span></a><span data-dcnode-id="226" instrument_node="">). We know from history (and as was prophesied in Daniel) that </span><a data-dcnode-id="224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotquestions.org/Greek-empire.html"><span data-dcnode-id="225" instrument_node="">Greece</span></a><span data-dcnode-id="223" instrument_node=""> would be the next world power after Persia, and that Greece would dominate Israel for a time. In this passage, three spiritual entities are mentioned in relation to three earthly nations: the prince of Persia, the prince of Greece, and the prince of Israel (Michael). As the New Testament reminds us, “Our struggle is not against flesh and blood, but against the rulers, against the authorities, against the powers of this dark world and against the spiritual forces of evil in the heavenly realms” (</span><a class="rtBibleRef" data-dcnode-id="221" data-purpose="bible-reference" data-reference="Eph 6.12" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Eph%25206.12" rel="noopener" target="_blank"><span data-dcnode-id="222" instrument_node="">Ephesians 6:12</span></a><span data-dcnode-id="220" instrument_node="">). The battle is real.</span><br data-dcnode-id="219"><br data-dcnode-id="218"><span data-dcnode-id="217" instrument_node="">
It seems that, as events play out on earth, there is corresponding activity in the spiritual realm. Whether or not this spiritual prince of Persia’s fate was tied to that of the physical Persian Empire is unknown. We do know that, if his job was to keep the Persian Empire in a place of dominance over the nation of Israel, he failed. It is interesting to note that Iran is modern Persia, and the leaders of Iran still want to dominate or obliterate the nation of Israel. As a Shiite Muslim nation, Iran persecutes Christian believers as well—so perhaps the spiritual prince of Persia is still active today. But, as with all of Satan’s minions, his time is limited, and he can only go as far as God will allow in accomplishing His perfect will.</span><br data-dcnode-id="216"><br data-dcnode-id="215"><span data-dcnode-id="214" instrument_node="">
</span></div><span data-dcnode-id="212" instrument_node="">
