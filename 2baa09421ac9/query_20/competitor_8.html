</span><h1 class="post-title mb-30" data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">The Book of Daniel</span></h1><span data-dcnode-id="1706" instrument_node="">
</span></div><span data-dcnode-id="1704" instrument_node="">
</span><div class="bt-1 border-color-1 mb-10" data-dcnode-id="1703"></div><span data-dcnode-id="1702" instrument_node="">
</span><div class="entry-main-content" data-dcnode-id="1507"><span data-dcnode-id="1701" instrument_node="">
</span><span data-dcnode-id="1699" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1408050821633755" data-ad-format="auto" data-ad-slot="3589505073" data-dcnode-id="1698" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1697" instrument_node="">
</span><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1690"><strong data-dcnode-id="1691"><em data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Introduction to the Book of Daniel in the Bible</span></em></strong></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1685"><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible-history.com/studybible/Daniel/6/"><span data-dcnode-id="1688" instrument_node="">Daniel 6:15-16</span></a><span data-dcnode-id="1686" instrument_node=""> - Then these men assembled unto the king, and said unto the king, Know, O king, that the law of the Medes and Persians [is], That no decree nor statute which the king establisheth may be changed. Then the king commanded, and they brought Daniel, and cast [him] into the den of lions. [Now] the king spake and said unto Daniel, Thy God whom thou servest continually, he will deliver thee.</span></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1680"><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible-history.com/studybible/Daniel/7/"><span data-dcnode-id="1683" instrument_node="">Daniel 7:13-14</span></a><span data-dcnode-id="1681" instrument_node=""> - I saw in the night visions, and, behold, [one] like the Son of man came with the clouds of heaven, and came to the Ancient of days, and they brought him near before him. And there was given him dominion, and glory, and a kingdom, that all people, nations, and languages, should serve him: his dominion [is] an everlasting dominion, which shall not pass away, and his kingdom [that] which shall not be destroyed.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1675"><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible-history.com/studybible/Daniel/9/"><span data-dcnode-id="1678" instrument_node="">Daniel 9:24-27</span></a><span data-dcnode-id="1676" instrument_node=""> - Seventy weeks are determined upon thy people and upon thy holy city, to finish the transgression, and to make an end of sins, and to make reconciliation for iniquity, and to bring in everlasting righteousness, and to seal up the vision and prophecy, and to anoint the most Holy. Know therefore and understand, [that] from the going forth of the commandment to restore and to build Jerusalem unto the Messiah the Prince [shall be] seven weeks, and threescore and two weeks: the street shall be built again, and the wall, even in troublous times. And after threescore and two weeks shall Messiah be cut off, but not for himself: and the people of the prince that shall come shall destroy the city and the sanctuary; and the end thereof [shall be] with a flood, and unto the end of the war desolations are determined. And he shall confirm the covenant with many for one week: and in the midst of the week he shall cause the sacrifice and the oblation to cease, and for the overspreading of abominations he shall make [it] desolate, even until the consummation, and that determined shall be poured upon the desolate.</span></p><span data-dcnode-id="1674" instrument_node="">
</span><h1 data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">The Old Testament - A Brief Overview</span></h1><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1650"><strong data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Bible Survey - Daniel</span></strong><br data-dcnode-id="1668"><span data-dcnode-id="1667" instrument_node="">Hebrew Name - </span><em data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Dani-El </span></em><span data-dcnode-id="1664" instrument_node="">"God is my judge"</span><br data-dcnode-id="1663"><span data-dcnode-id="1662" instrument_node="">Greek Name - </span><em data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Danil </span></em><span data-dcnode-id="1659" instrument_node="">(Greek form of the Hebrew)</span><br data-dcnode-id="1658"><span data-dcnode-id="1657" instrument_node="">Author - Daniel (According to Tradition)</span><br data-dcnode-id="1656"><span data-dcnode-id="1655" instrument_node="">Date - 607 BC Approximately</span><br data-dcnode-id="1654"><span data-dcnode-id="1653" instrument_node="">Theme - The final kingdom of the Messiah</span><br data-dcnode-id="1652"><span data-dcnode-id="1651" instrument_node="">Types and Shadows - In Daniel Jesus was the fourth man in the fiery furnace</span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1646"><strong data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Summary of The Book of Daniel</span></strong></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1641"><strong data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Quick Overview of Daniel.</span></strong><span data-dcnode-id="1642" instrument_node=""> – –1-6 – – the prophetic ministry of Daniel from King Nebuchadnezzar and Babylon to King Cyrus and Persia– – 7-12– – the visions of Daniel during the reigns of Belshazzar of Babylon, Darius and Cyrus of Persia.</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1636"><em data-dcnode-id="1637"><strong data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">The prophet Daniel was actually taken captive during the Babylonian invasion on Jerusalem, the first attack in 607 BC. When Daniel came to Babylon he became a chief minister at Nebuchadnezzar's royal court. He became known as a man who could interpret dreams and visions. God did mighty miracles through Daniel that impressed King Nebuchadnezzar himself, so much so that he worshiped the Jewish God. Later when the Medes and Persians conquered Babylon King Cyrus ruled the Persian Empire. He also had visions that Daniel had given interpretation to. some of the great miracles mentioned in the Bible happened in the book of Daniel: the fiery furnace, the handwriting on the wall, and Daniel in the lion's den. Daniel can be seen in the Bible as the Empire predicting prophet, because he accurately predicted the world governing empires before they came on the scene, first Babylon, second Persia, third Greece, fourth Rome, and in the last days would be another Roman empire where the antichrist would arise. At this time the Messiah will return and set up his everlasting kingdom. Daniel also predicted the exact day and year the Messiah would die. There is also a prophecy Daniel refers to as the 70th week, which speaks of a seven-year period in the future that will mark the second coming of the Messiah (Son of Man) coming with the clouds of heaven.</span></strong></em></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1632"><em data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">"I was watching in the night visions, and behold, One like the Son of Man, coming with the clouds of heaven! He came to the Ancient of Days, and they brought Him near before Him. Then to Him was given dominion and glory and a kingdom, that all peoples, nations, and languages should serve Him. His dominion is an everlasting dominion, which shall not pass away, and His kingdom the one which shall not be destroyed." Daniel 7:13-14</span></em></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Daniel was among the Jewish captives who were brought to Babylon from Jerusalem after Nebuchadnezzar conquered the city. Daniel was still a youth but apparently of high status (Daniel 1:3). He was of such a high status that he was considered one of the wise men of the court of Babylon .He was quickly recognized in Babylon for his devotion to the one God Yahweh, and he refused to eat of the "dainties" which were brought to him by the king's servants. He also became recognized as the interpreter of dreams (Daniel 1:8-16), because when King Nebuchadnezzar being disturbed by a dream asked his own wise men to interpret they could not. Daniel offered to give the king the interpretation and the King was very appreciative to Daniel, he was so impressed that he allowed Daniel to rise to a place of great prominence in Babylon. Later when Babylon fell to the Persians the Jews had new masters over them, and Daniel was quickly recognized as a very special man and he had favor with the king of Persia. This caused many of those in authority to scrutinize Daniel and to look for flaws in his character and they could not find any. They developed a plot which forced the King to have Daniel thrown in the lion's den. The King recognizing their treachery and hoped for Daniel's deliverance, and when the Lord saved Daniel from the mouth of the lions Darius ordered his own leaders to be thrown into the lion's den and they were torn in pieces immediately.</span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1625"><strong data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Daniel the Empire Predicting Prophet</span></strong></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1623" instrument_node="">Daniel is clearly seen as the Empire predicting prophet. He was an interpreter of dreams, and God revealed through his interpretations his plans for the kingdoms that would rise to power in world history. At that time Babylon was in power, and in fact a world governing Empire in the ancient world. But Daniel said that Babylon would be defeated by the Medes and the Persians who would become a world governing empire. Then Greece would come and dominate the world, and after Greece the Romans would become a world governing empire. Then Daniel predicted that way in the future a final world governing empire would rise that would be like Rome, but different in that it would consist of 10 kings, and then finally 1 king who would rise to power. This 1 king would be a man referred to in the Bible as </span><a data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible-history.com/sketches/ancient/antichrist.html"><span data-dcnode-id="1622" instrument_node="">the antichrist</span></a><span data-dcnode-id="1620" instrument_node="">. This would all take place in the final seven-year period known as the 70th week of Daniel. At its consummation the Lord will return, he will crush the enemy, and he will set up a kingdom, an everlasting kingdom, which will never be destroyed.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1615"><strong data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">The 70 weeks of Daniel</span></strong></p><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">The 70 weeks in Daniel are mentioned in Daniel 9, and they refer to a prophecy of Daniel where he claims that the king of Persia will release the Jews to rebuild their Temple in Jerusalem. When he makes this decree the Jews are to begin counting, and after 70 weeks (7 year periods or 490 years) the kingdom of the Messiah will be established on earth. But something interesting would happen, at the end of the 69th week (483 years) the Messiah will be "cut off" which indicates His death. The final seven year period is suddenly thrown into the future, to the time of the end of the world. This final seven year period is described in the book of Revelation as a time of the Messiah taking back the earth. It is divided into two 3 1/2 year periods and directly in the middle is when the antichrist sets up his throne in Jerusalem and reveals himself as God. Certain portions of this final seven years are mentioned in other prophetic books of the Bible like Zechariah.</span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1608"><strong data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Daniel, The Author of His Book</span></strong></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Daniel was the author of this book, and this was confirmed by Jesus himself, but there has been considerable criticism about the book of Daniel because of the accuracy of the prophecies. Many claim that these had to been written after the fact, and that Daniel could not possibly have known so much detail about the future. The first major critic of the genuineness of the book of Daniel was Porphyry of Tyre, a Greek philosopher of the third century AD who claimed that the book of Daniel had been written by a person living in the second century BC during the reign of Antiochus Epiphanes. His main reason for rejecting the book of Daniel was centered around the person of Antiochus Epiphanes, whom Daniel claimed was a prototype of the Antichrist. Daniel's prophecies written a few hundred years prior but were very very accurate in their detail. Many other critics have tried to discredit the book of Daniel, but the Bible and history have confirmed that Daniel was the author of this book, and therefore was written at the time of the Persian Empire (sixth century BC).</span></p><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">The contents of the book may be analyzed further as follows :</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1598"><strong data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Outline of the Book of Daniel</span></strong></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Daniel is divided into two sections of six chapters each. Daniel 1-6 are largely historical, explaining how Daniel came to be in the court of Nebuchadnezzar and of his rise to power. It tells of Nebuchadnezzar's dream of the image which Daniel interpreted to refer to the current kingdom and three world powers which would arise after it and of the kingdom of God "a kingdom which shall never be destroyed" which would arise during the era of the last of these great empires. This section also includes the account of the deliverance of Shadrach, Meshach, and Abednego from the fiery furnace and of the handwriting on the wall which spelled out the defeat of Belshazzar at the hands of the Medes and the Persians.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">The second section, Daniel 8-12, describes visions which Daniel received concerning the great world powers of the future and the kingdom of God.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">The Greek translation of Daniel contains additions not found in the Hebrew and Aramaic text. These additions are found as separate books in the Apocrypha and are called The Song of the Three Holy Children, the History of Susanna, and Bel and the Dragon.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1587" instrument_node="">The book of Daniel assures God's people that their situation in exile would not be permanent, that God would keep his promise to Abraham, he would keep his promise through Jeremiah the prophet that they would return after 70 years. And he would also keep his promise that the Jews would still be the channel through which all nations would be blessed. The book of Daniel is a grand tribute to the providence of God and His lordship of history and the universe.</span><br data-dcnode-id="1586"><span data-dcnode-id="1585" instrument_node=""> </span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1580"><strong data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Read Daniel</span></strong></p><span data-dcnode-id="1579" instrument_node="">
