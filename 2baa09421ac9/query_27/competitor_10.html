</span><h2 data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">About This Game</span></h2><span data-dcnode-id="2999" instrument_node="">
							The critically acclaimed Prince of Persia® franchise returns for the first time on next-generation platforms with an all-new epic journey.                    </span><br data-dcnode-id="2998"><span data-dcnode-id="2997" instrument_node="">					Built by the same award-winning Ubisoft Montreal studio that created Assassin's Creed™, Prince of Persia has been in development for over three years to deliver a whole new action-adventure gaming experience to consumers.                    </span><br data-dcnode-id="2996"><span data-dcnode-id="2995" instrument_node="">					With a whole new Prince, storyline, open world environments, combat style, signature illustrative graphical style and the addition of Elika, a deadly new ally, Prince of Persia brings the franchise to new heights of deadly acrobatic artistry and is set to become the #1 action-adventure game of 2008 this holiday season.                    </span><br data-dcnode-id="2994"><span data-dcnode-id="2993" instrument_node=""> </span><ul class="bb_ul" data-dcnode-id="2970"><li data-dcnode-id="2987"><strong data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">A new hero emerges: </span></strong><span data-dcnode-id="2990" instrument_node="">Master the acrobatics, strategy and fighting tactics of the most agile warrior of all time. Grip fall down the face of a building, perform perfectly timed acrobatic combinations, and swing over canyons, buildings and anything that is reachable. This new rogue warrior must utilize all of his new skills, along with a whole new combat system, to battle Ahriman's corrupted lieutenants to heal the land from the dark Corruption and restore the light.                        </span><br data-dcnode-id="2989"><span data-dcnode-id="2988" instrument_node=""> </span></li><li data-dcnode-id="2981"><strong data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">A new epic journey begins: </span></strong><span data-dcnode-id="2984" instrument_node="">Escape to experience the new fantasy world of ancient Persia. Masterful storytelling and sprawling environments will deliver to action-adventure fans an experience that rivals even the best Hollywood movies.                        </span><br data-dcnode-id="2983"><span data-dcnode-id="2982" instrument_node=""> </span></li><li data-dcnode-id="2975"><strong data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">A new open world structure: </span></strong><span data-dcnode-id="2978" instrument_node="">A first for the Prince of Persia franchise  now you have the freedom to determine how the game evolves in this non-linear adventure. Players will decide how they unfold the storyline by choosing their path in the open-ended world.                        </span><br data-dcnode-id="2977"><span data-dcnode-id="2976" instrument_node=""> </span></li><li data-dcnode-id="2971"><strong data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">Emergence of a deadly new ally: </span></strong><span data-dcnode-id="2972" instrument_node="">History's greatest ally is revealed in the form of Elika, a dynamic AI companion who joins the Prince in his fight to save the world. Gifted with magical powers, she interacts with the player in combat, acrobatics and puzzle-solving, enabling the Prince to reach new heights of deadly high-flying artistry through special duo acrobatic moves or devastating fighting combo attacks.                    </span></li></ul><span data-dcnode-id="2969" instrument_node=""> </span></div><span data-dcnode-id="2967" instrument_node="">
</span></div><div class="game_page_autocollapse_fade" data-dcnode-id="2963"><div class="game_page_autocollapse_readmore" data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">READ MORE</span></div></div></div><span data-dcnode-id="2961" instrument_node="">

</span><ul class="bb_ul" data-dcnode-id="2906"><li data-dcnode-id="2947"><strong data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">OS:</span></strong><span data-dcnode-id="2950" instrument_node=""> Windows® XP/Windows Vista® (only)                    </span><br data-dcnode-id="2949"><span data-dcnode-id="2948" instrument_node=""> </span></li><li data-dcnode-id="2941"><strong data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Processor:</span></strong><span data-dcnode-id="2944" instrument_node=""> Dual core processor 2.6 GHz Intel® Pentium® D or AMD Athlon™ 64 X2 3800+ (Intel Core® 2 Duo 2.2 GHz or AMD Athlon 64 X2 4400+ or better recommended)                     </span><br data-dcnode-id="2943"><span data-dcnode-id="2942" instrument_node=""> </span></li><li data-dcnode-id="2935"><strong data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Memory:</span></strong><span data-dcnode-id="2938" instrument_node=""> 1 GB Windows XP/2 GB Windows Vista                    </span><br data-dcnode-id="2937"><span data-dcnode-id="2936" instrument_node=""> </span></li><li data-dcnode-id="2929"><strong data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Graphics:</span></strong><span data-dcnode-id="2932" instrument_node=""> 256 MB DirectX® 10.0–compliant video card or DirectX 9.0–compliant card with Shader Model 3.0 or higher (see supported list)*                     </span><br data-dcnode-id="2931"><span data-dcnode-id="2930" instrument_node=""> </span></li><li data-dcnode-id="2923"><strong data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">DirectX Version:</span></strong><span data-dcnode-id="2926" instrument_node=""> DirectX 9.0 or 10.0 libraries                    </span><br data-dcnode-id="2925"><span data-dcnode-id="2924" instrument_node=""> </span></li><li data-dcnode-id="2917"><strong data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Hard Drive:</span></strong><span data-dcnode-id="2920" instrument_node=""> 9 GB                    </span><br data-dcnode-id="2919"><span data-dcnode-id="2918" instrument_node=""> </span></li><li data-dcnode-id="2911"><strong data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">Sound Card:</span></strong><span data-dcnode-id="2914" instrument_node=""> DirectX 9.0 or 10.0–compliant sound card (5.1 sound card recommended)                    </span><br data-dcnode-id="2913"><span data-dcnode-id="2912" instrument_node=""> </span></li><li data-dcnode-id="2907"><strong data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Input:</span></strong><span data-dcnode-id="2908" instrument_node=""> Windows-compliant keyboard, mouse, optional controller (Xbox 360® Controller for Windows recommended)                     </span></li></ul><span data-dcnode-id="2905" instrument_node="">*Supported Video Cards at Time of Release:</span><br data-dcnode-id="2904"><span data-dcnode-id="2903" instrument_node="">                    ATI® RADEON® X1600*/1650*-1950/HD 2000–4000 series</span><br data-dcnode-id="2902"><span data-dcnode-id="2901" instrument_node="">                    NVIDIA GeForce® 6800*/7/8/9/GTX 260–280 series</span><br data-dcnode-id="2900"><span data-dcnode-id="2899" instrument_node="">                    *PCI Express only supported                    </span><br data-dcnode-id="2898"><span data-dcnode-id="2897" instrument_node="">					Laptop versions of these cards may work but are NOT supported. These chipsets are the only ones that will run this game. For the most up-to-date minimum requirement listings, please visit the FAQ for this game on our support website at: </span><a data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//steamcommunity.com/linkfilter/%3Furl%3Dhttp%3A//support.ubi.com" rel="noopener" target="_blank"><span data-dcnode-id="2896" instrument_node="">http://support.ubi.com</span></a><span data-dcnode-id="2894" instrument_node="">.                    </span><br data-dcnode-id="2893"><span data-dcnode-id="2892" instrument_node="">					NVIDIA® nForce™ or other motherboards/soundcards containing the Dolby® Digital Interactive Content Encoder required for Dolby Digital audio.							</span></ul><span data-dcnode-id="2890" instrument_node="">

</span><b data-dcnode-id="1786"><i data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Prince of Persia</span></i></b><span data-dcnode-id="1785" instrument_node=""> (reboot) is an action-adventure/platformer with combat being focused on duels (2vs1). The advertised AI-companion is more of a utility than an actual AI-controlled character - all functions (attacks, saves, etc.) have strict triggers (mostly, the keys pressed) and performed regardless of the companion's location (i.e. if Elika is far when you need to extend your jump, she just teleports next to you when you press the key).</span><br data-dcnode-id="1784"><br data-dcnode-id="1783"><span data-dcnode-id="1782" instrument_node="">The game supports 5-button mice and does not require the Ubisoft DRM to run. </span><br data-dcnode-id="1781"><br data-dcnode-id="1780"><span data-dcnode-id="1779" instrument_node="">There is no connection to the previous games in the Prince of Persia series. Also there is no prince or Persia in the game. </span><br data-dcnode-id="1778"><span data-dcnode-id="1777" instrument_node="">The post-epilogue DLC and the sequel are not available on PC.					</span><div class="gradient" data-dcnode-id="1776"></div><span data-dcnode-id="1775" instrument_node="">

</span><div class="content" data-dcnode-id="1284"><span data-dcnode-id="1296" instrument_node="">
					Personally, I liked this game a lot, and I think it's on par with the Sands of Time, although it really shouldn't be compared to the trilogy because it's a completely different game. The graphics are different, the parkour is similar to the trilogy, but it is much more satisfying and smooth, with an addition of a grapple attached to your hand for even more variety. The story has virtually no similarities to the trilogy, but nevertheless it's still a good story.</span><br data-dcnode-id="1295"><br data-dcnode-id="1294"><span data-dcnode-id="1293" instrument_node="">Actually, the game feels more like a fairy tale rather than a game. Before I was complaining about the 2nd and 3rd PoP being difficult games to beat, but this one was fairly easy and relaxing. The combat was fun and visually appealing, and it took a bit of brain power to complete successfully, rather than spamming the same buttons and combos like in the trilogy.</span><br data-dcnode-id="1292"><br data-dcnode-id="1291"><span data-dcnode-id="1290" instrument_node="">This game does not have time manipulation like the previous ones, but it does have Elika, a trustworthy and cute sidekick who helps you in combat and parkour. She has to be the most useful AI companion I've ever had in a video game so far. It's not hard to fall in love with her as she helps you complete the game. Speaking of Elika, she never let's you die in the game, so it does feel like this game is geared more towards children, which I don't mind at all.</span><br data-dcnode-id="1289"><br data-dcnode-id="1288"><span data-dcnode-id="1287" instrument_node="">So, if you're looking for an adventure and a chill game to relax to after work, this is one of the best options out there.					</span><div class="gradient" data-dcnode-id="1286"></div><span data-dcnode-id="1285" instrument_node="">
