</span><div class="article-content retro-folders" data-dcnode-id="1221" id="main-article"><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2069"></p><div class="quoteright" data-dcnode-id="2066" style="width:320px;"><div class="lazy_load_img_box" data-dcnode-id="2067" style="padding-top:62.5%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/prince_of_persia_1.png" border="0" class="embeddedimage" data-dcnode-id="2068" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/prince_of_persia_1.png&amp;raw" width="320"></div></div><div class="acaptionright" data-dcnode-id="2064" style="width:320px;"><span data-dcnode-id="2065" instrument_node="">Who needs Jerry Bruckheimer?</span></div><p data-dcnode-id="2063"></p><dl data-dcnode-id="2039"><dd data-dcnode-id="2040"><div class="indent" data-dcnode-id="2043"><em data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">It is a time of darkness. While the Sultan is off fighting a foreign war, his Grand Vizier Jaffar has seized the reins of power. Throughout the land, the people groan under the yoke of tyranny, and dream of better days.</span></em><span data-dcnode-id="2060" instrument_node=""> </span><br data-dcnode-id="2059"><em data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">You are the only obstacle between Jaffar and the throne. An adventurer from a foreign land, innocent of palace intrigues, you have won the heart of the Sultan's lovely daughter. And in so doing, you have unwittingly made a powerful enemy.</span></em><span data-dcnode-id="2056" instrument_node=""> </span><br data-dcnode-id="2055"><em data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">On Jaffar's orders, you are arrested, stripped of your sword and possessions, and thrown into the Sultan's dungeons. As for the Princess, Jaffar gives her a choice, and an hour to decide: Marry him—or die.</span></em><span data-dcnode-id="2052" instrument_node=""> </span><br data-dcnode-id="2051"><em data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Locked in her room high in the palace tower, the Princess rests all her hopes on you. For when the last sands drain from the hourglass, her choice can bring only a throne for the Grand Vizier...a new reign of terror for his long-suffering subjects...and death for the brave youth who might have been...</span></em><span data-dcnode-id="2048" instrument_node=""> </span><br data-dcnode-id="2047"><em data-dcnode-id="2044"><strong data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Prince of Persia.</span></strong></em></div><div class="indent" data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">— The game's story as laid out in the manual.</span></div></dd></dl><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2033"><span class="ad-caption" data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2034" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="2015"><span data-dcnode-id="2032" instrument_node="">The first </span><em data-dcnode-id="2029"><a class="twikilink" data-dcnode-id="2030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/PrinceOfPersia" title="/pmwiki/pmwiki.php/Franchise/PrinceOfPersia"><span data-dcnode-id="2031" instrument_node="">Prince of Persia</span></a></em><span data-dcnode-id="2028" instrument_node=""> game follows the story of an </span><a class="twikilink" data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilChancellor" title="/pmwiki/pmwiki.php/Main/EvilChancellor"><span data-dcnode-id="2027" instrument_node="">evil vizier</span></a><span data-dcnode-id="2025" instrument_node=""> who, in the absence of the sultan, threatens to kill the princess within an hour unless she agrees to marry him. The princess's one true love, the eponymous Prince, has been thrown into the dungeons, and must run, jump, climb and fight his way through a series of passageways filled with </span><a class="twikilink" data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathCourse" title="/pmwiki/pmwiki.php/Main/DeathCourse"><span data-dcnode-id="2024" instrument_node="">traps</span></a><span data-dcnode-id="2022" instrument_node="">, guards and other surprises to </span><a class="twikilink" data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SaveThePrincess" title="/pmwiki/pmwiki.php/Main/SaveThePrincess"><span data-dcnode-id="2021" instrument_node="">rescue the princess</span></a><span data-dcnode-id="2019" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RaceAgainstTheClock" title="/pmwiki/pmwiki.php/Main/RaceAgainstTheClock"><span data-dcnode-id="2018" instrument_node="">all the while the minutes tick by at the bottom of the screen</span></a><span data-dcnode-id="2016" instrument_node="">.</span></p><p data-dcnode-id="1932"><span data-dcnode-id="2014" instrument_node="">Originally created by Jordan Mechner for the </span><a class="twikilink" data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/AppleII" title="/pmwiki/pmwiki.php/UsefulNotes/AppleII"><span data-dcnode-id="2013" instrument_node="">Apple IIe</span></a><span data-dcnode-id="2011" instrument_node=""> and released by </span><a class="twikilink" data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/BroderbundSoftware" title="/pmwiki/pmwiki.php/Creator/BroderbundSoftware"><span data-dcnode-id="2010" instrument_node="">Brøderbund Software</span></a><span data-dcnode-id="2008" instrument_node=""> in 1989, it was ported to more systems than any </span><em data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Prince of Persia</span></em><span data-dcnode-id="2005" instrument_node=""> game since. Versions of the game were released for just about anything that was Turing-complete, including the </span><a class="twikilink" data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/AtariST" title="/pmwiki/pmwiki.php/UsefulNotes/AtariST"><span data-dcnode-id="2004" instrument_node="">Atari ST</span></a><span data-dcnode-id="2002" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Amiga" title="/pmwiki/pmwiki.php/UsefulNotes/Amiga"><span data-dcnode-id="2001" instrument_node="">Amiga</span></a><span data-dcnode-id="1999" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/AmstradCPC" title="/pmwiki/pmwiki.php/UsefulNotes/AmstradCPC"><span data-dcnode-id="1998" instrument_node="">Amstrad CPC</span></a><span data-dcnode-id="1996" instrument_node="">, Sam Coupé, </span><a class="twikilink" data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/IBMPersonalComputer" title="/pmwiki/pmwiki.php/UsefulNotes/IBMPersonalComputer"><span data-dcnode-id="1995" instrument_node="">IBM Personal Computer</span></a><span data-dcnode-id="1993" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/PC98" title="/pmwiki/pmwiki.php/UsefulNotes/PC98"><span data-dcnode-id="1992" instrument_node="">PC-98</span></a><span data-dcnode-id="1990" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/SharpX68000" title="/pmwiki/pmwiki.php/UsefulNotes/SharpX68000"><span data-dcnode-id="1989" instrument_node="">Sharp X68000</span></a><span data-dcnode-id="1987" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/FMTowns" title="/pmwiki/pmwiki.php/UsefulNotes/FMTowns"><span data-dcnode-id="1986" instrument_node="">FM Towns</span></a><span data-dcnode-id="1984" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/AppleMacintosh" title="/pmwiki/pmwiki.php/UsefulNotes/AppleMacintosh"><span data-dcnode-id="1983" instrument_node="">Apple Macintosh</span></a><span data-dcnode-id="1981" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/NintendoEntertainmentSystem" title="/pmwiki/pmwiki.php/UsefulNotes/NintendoEntertainmentSystem"><span data-dcnode-id="1980" instrument_node="">Nintendo Entertainment System</span></a><span data-dcnode-id="1978" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/SuperNintendoEntertainmentSystem" title="/pmwiki/pmwiki.php/UsefulNotes/SuperNintendoEntertainmentSystem"><span data-dcnode-id="1977" instrument_node="">Super Nintendo Entertainment System</span></a><span data-dcnode-id="1975" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/SegaMasterSystem" title="/pmwiki/pmwiki.php/UsefulNotes/SegaMasterSystem"><span data-dcnode-id="1974" instrument_node="">Sega Master System</span></a><span data-dcnode-id="1972" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/SegaGenesis" title="/pmwiki/pmwiki.php/UsefulNotes/SegaGenesis"><span data-dcnode-id="1971" instrument_node="">Sega Genesis</span></a><span data-dcnode-id="1969" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/SegaCD" title="/pmwiki/pmwiki.php/UsefulNotes/SegaCD"><span data-dcnode-id="1968" instrument_node="">Sega CD</span></a><span data-dcnode-id="1966" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/TurboGrafxCD" title="/pmwiki/pmwiki.php/UsefulNotes/TurboGrafxCD"><span data-dcnode-id="1965" instrument_node="">TurboGrafx-CD</span></a><span data-dcnode-id="1963" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/GameBoy" title="/pmwiki/pmwiki.php/UsefulNotes/GameBoy"><span data-dcnode-id="1962" instrument_node="">Game Boy</span></a><span data-dcnode-id="1960" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/GameGear" title="/pmwiki/pmwiki.php/UsefulNotes/GameGear"><span data-dcnode-id="1959" instrument_node="">Game Gear</span></a><span data-dcnode-id="1957" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/GameBoyColor" title="/pmwiki/pmwiki.php/UsefulNotes/GameBoyColor"><span data-dcnode-id="1956" instrument_node="">Game Boy Color</span></a><span data-dcnode-id="1954" instrument_node="">. This is not counting the unofficial ports to the </span><a class="twikilink" data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/ZXSpectrum" title="/pmwiki/pmwiki.php/UsefulNotes/ZXSpectrum"><span data-dcnode-id="1953" instrument_node="">ZX Spectrum</span></a><span data-dcnode-id="1951" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Commodore64" title="/pmwiki/pmwiki.php/UsefulNotes/Commodore64"><span data-dcnode-id="1950" instrument_node="">Commodore 64</span></a><span data-dcnode-id="1948" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Atari8BitComputers" title="/pmwiki/pmwiki.php/UsefulNotes/Atari8BitComputers"><span data-dcnode-id="1947" instrument_node="">Atari 130 XE</span></a><span data-dcnode-id="1945" instrument_node="">, the </span><a class="twikilink" data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGameRemake" title="/pmwiki/pmwiki.php/Main/VideoGameRemake"><span data-dcnode-id="1944" instrument_node="">Video Game Remake</span></a><span data-dcnode-id="1942" instrument_node=""> </span><em data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Prince of Persia Classic</span></em><span data-dcnode-id="1939" instrument_node="">, or the numerous appearances of the game as an </span><a class="twikilink" data-dcnode-id="1937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EmbeddedPrecursor" title="/pmwiki/pmwiki.php/Main/EmbeddedPrecursor"><span data-dcnode-id="1938" instrument_node="">Embedded Precursor</span></a><span data-dcnode-id="1936" instrument_node=""> in later </span><em data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Prince of Persia</span></em><span data-dcnode-id="1933" instrument_node=""> games.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1926"><span class="ad-caption" data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1927" id="proper-ad-tvtropes_mobile_ad_2"></div></div><hr data-dcnode-id="1925"><h2 data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Tropes appearing in this game:</span></h2><p data-dcnode-id="1922"></p><ul data-dcnode-id="1224"><li data-dcnode-id="1917"><span data-dcnode-id="1921" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Acrofatic" title="/pmwiki/pmwiki.php/Main/Acrofatic"><span data-dcnode-id="1920" instrument_node="">Acrofatic</span></a><span data-dcnode-id="1918" instrument_node="">: The fat guard in the sixth level is an incredibly skilled swordfighter and the hardest opponent you'll face until you face Jaffar himself.</span></li><li data-dcnode-id="1906"><span data-dcnode-id="1916" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AIBreaker" title="/pmwiki/pmwiki.php/Main/AIBreaker"><span data-dcnode-id="1915" instrument_node="">A.I. Breaker</span></a><span data-dcnode-id="1913" instrument_node="">: In the SNES version, sword-fighting is a simple minigame where you block, attack, block, attack, block, attack until either you or your opponent messes the timing up. Easier enemies mess up sooner than harder ones. However, the game assumes that you are going to attack as soon as you block, and then block again (if you don't block as soon as you attack, you get hit). BUT, if you wait a split second after blocking and </span><em data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">then</span></em><span data-dcnode-id="1910" instrument_node=""> attack, you will hit the enemy every single time. This works on the very first guard, the captain, Jaffar, and every other swordfighting enemy in-between. Could also be used as a speedrunning tactic, as blocking, waiting a second and hitting them is much faster than clanging swords with them for 15-20 seconds per hit. This same trick works on the original as well. In fact, this is required to actually beat Jaffar in this version, because when he starts swordfighting, he </span><em data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">never</span></em><span data-dcnode-id="1907" instrument_node=""> messes up the counterattack chain. You HAVE to delay your strike back by the right amount of time, or you will NEVER hit him.</span></li><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1900"><span class="ad-caption" data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1901" id="proper-ad-tvtropes_mobile_ad_3"></div></div><li data-dcnode-id="1886"><span data-dcnode-id="1899" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Antepiece" title="/pmwiki/pmwiki.php/Main/Antepiece"><span data-dcnode-id="1898" instrument_node="">Antepiece</span></a><span data-dcnode-id="1896" instrument_node="">: Level 4 has lots of examples that demonstrate how loose tiles and guards can trigger </span><a class="twikilink" data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PressurePlate" title="/pmwiki/pmwiki.php/Main/PressurePlate"><span data-dcnode-id="1895" instrument_node="">pressure plates</span></a><span data-dcnode-id="1893" instrument_node=""> to not just open portcullises, but hold them open (since they normally start slipping shut after a few seconds). This is then explicitly demonstrated in level 6 in the room with the </span><a class="twikilink" data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Acrofatic" title="/pmwiki/pmwiki.php/Main/Acrofatic"><span data-dcnode-id="1892" instrument_node="">Acrofatic</span></a><span data-dcnode-id="1890" instrument_node=""> guard (the single loose tile falls down a deadly drop and lands on a </span><a class="twikilink" data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PressurePlate" title="/pmwiki/pmwiki.php/Main/PressurePlate"><span data-dcnode-id="1889" instrument_node="">Pressure Plate</span></a><span data-dcnode-id="1887" instrument_node=""> that opens the portcullis in the same room). Going out of your way to set this up is required for completing level 9.</span></li><li data-dcnode-id="1876"><span data-dcnode-id="1885" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BarefootCaptives" title="/pmwiki/pmwiki.php/Main/BarefootCaptives"><span data-dcnode-id="1884" instrument_node="">Barefoot Captives</span></a><span data-dcnode-id="1882" instrument_node="">:</span><ul data-dcnode-id="1877"><li data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node=""> The Prince is barefoot in some versions, which is presumably part of his being thrown in the dungeon, stripped of all his belongings. Averted in some other versions (like the original Apple II version), where he has white shoes. Notably, the DOS version varies depending on graphics driver; the VGA graphics have him barefoot, but the EGA, CGA and Hercules graphics all give him white shoes. His feet actually use a different VGA palette index from the rest of his skin, implying they'd intended to give his VGA variant shoes as well at one point, but opted not to.</span></li><li data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node=""> The Princess is also barefoot in some versions; she's sequestered in her bedroom.</span></li></ul></li><li data-dcnode-id="1868"><span data-dcnode-id="1875" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeardOfEvil" title="/pmwiki/pmwiki.php/Main/BeardOfEvil"><span data-dcnode-id="1874" instrument_node="">Beard of Evil</span></a><span data-dcnode-id="1872" instrument_node="">: Jaffar, the </span><a class="twikilink" data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilChancellor" title="/pmwiki/pmwiki.php/Main/EvilChancellor"><span data-dcnode-id="1871" instrument_node="">evil vizier</span></a><span data-dcnode-id="1869" instrument_node="">, has a beard as shown in console ports with stronger graphics, as well as the intro of the second game.</span></li><li data-dcnode-id="1858"><span data-dcnode-id="1867" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigDamnHeroes" title="/pmwiki/pmwiki.php/Main/BigDamnHeroes"><span data-dcnode-id="1866" instrument_node="">Big Damn Heroes</span></a><span data-dcnode-id="1864" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1859" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1863" instrument_node=""> From a </span><em data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">mouse</span></em><span data-dcnode-id="1860" instrument_node="">, actually.</span></span></li><li data-dcnode-id="1847"><span data-dcnode-id="1857" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossInMookClothing" title="/pmwiki/pmwiki.php/Main/BossInMookClothing"><span data-dcnode-id="1856" instrument_node="">Boss in Mook Clothing</span></a><span data-dcnode-id="1854" instrument_node="">: The first enemy you meet on level 8 looks like a regular guard, but is incredibly smart and doesn't get too close to you, instead taking a defensive stance and only attacking when you try to close the distance yourself. </span><span class="spoiler" data-dcnode-id="1852" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1853" instrument_node="">It's actually easier to shove him into the spike pit instead of defeating him conventionally.</span></span><span data-dcnode-id="1851" instrument_node=""> Also an example of </span><a class="twikilink" data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoobBridge" title="/pmwiki/pmwiki.php/Main/NoobBridge"><span data-dcnode-id="1850" instrument_node="">Noob Bridge</span></a><span data-dcnode-id="1848" instrument_node="">, since this is the first time you are forced to learn to use the "parry" button.</span></li><li data-dcnode-id="1828"><span data-dcnode-id="1846" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossArenaIdiocy" title="/pmwiki/pmwiki.php/Main/BossArenaIdiocy"><span data-dcnode-id="1845" instrument_node="">Boss Arena Idiocy</span></a><span data-dcnode-id="1843" instrument_node="">:</span><ul data-dcnode-id="1829"><li data-dcnode-id="1835"><span data-dcnode-id="1842" instrument_node=""> The Skeleton boss from level 3, who can only be defeated by pushing it off of a ledge... guess where it fights the Prince? Taken </span><a class="twikilink" data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpToEleven" title="/pmwiki/pmwiki.php/Main/UpToEleven"><span data-dcnode-id="1841" instrument_node="">Up to Eleven</span></a><span data-dcnode-id="1839" instrument_node=""> in the SNES version, where it makes that same mistake </span><em data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">twice</span></em><span data-dcnode-id="1836" instrument_node="">, and then lets the Prince lead it under a collapsing roof trap to finish it off for good measure.</span></li><li data-dcnode-id="1830"><span data-dcnode-id="1834" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1832" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1833" instrument_node="">Jaffar</span></span><span data-dcnode-id="1831" instrument_node=""> makes the same mistake as the Skeleton boss, but only in the original version of the game. In the SNES, he fights in a different arena and cannot be one-shotted in that manner.</span></li></ul></li><li data-dcnode-id="1820"><span data-dcnode-id="1827" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossOnlyLevel" title="/pmwiki/pmwiki.php/Main/BossOnlyLevel"><span data-dcnode-id="1826" instrument_node="">Boss-Only Level</span></a><span data-dcnode-id="1824" instrument_node="">: Level 20 in the SNES version poses no challenges other than the </span><a class="twikilink" data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="1823" instrument_node="">Final Boss</span></a><span data-dcnode-id="1821" instrument_node="">.</span></li><li data-dcnode-id="1815"><span data-dcnode-id="1819" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossRush" title="/pmwiki/pmwiki.php/Main/BossRush"><span data-dcnode-id="1818" instrument_node="">Boss Rush</span></a><span data-dcnode-id="1816" instrument_node="">: At the end of Level 19 in the SNES version.</span></li><li data-dcnode-id="1808"><span data-dcnode-id="1814" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallBack" title="/pmwiki/pmwiki.php/Main/CallBack"><span data-dcnode-id="1813" instrument_node="">Call-Back</span></a><span data-dcnode-id="1811" instrument_node="">: In Level 5, there's a large potion in a room. However, when you are about to reach it, the Shadow appears and drinks it. </span><span class="spoiler" data-dcnode-id="1809" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1810" instrument_node="">When you face the Shadow in Level 12, he has 4 health points - the initial 3 the Prince started with, plus 1 from the large potion he took.</span></span></li><li data-dcnode-id="1800"><span data-dcnode-id="1807" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChekhovsGunman" title="/pmwiki/pmwiki.php/Main/ChekhovsGunman"><span data-dcnode-id="1806" instrument_node="">Chekhov's Gunman</span></a><span data-dcnode-id="1804" instrument_node="">: The princess's pet mouse, seen with her before the start of level 8. </span><span class="spoiler" data-dcnode-id="1802" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1803" instrument_node="">It later pushes the trigger needed to open a gate for you that you get trapped behind. And when you're reunited with the Princess, it appears and watches over the happy reunion</span></span><span data-dcnode-id="1801" instrument_node="">.</span></li><li data-dcnode-id="1792"><span data-dcnode-id="1799" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CinematicPlatformGame" title="/pmwiki/pmwiki.php/Main/CinematicPlatformGame"><span data-dcnode-id="1798" instrument_node="">Cinematic Platform Game</span></a><span data-dcnode-id="1796" instrument_node="">: The </span><a class="twikilink" data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TropeMaker" title="/pmwiki/pmwiki.php/Main/TropeMaker"><span data-dcnode-id="1795" instrument_node="">Trope Maker</span></a><span data-dcnode-id="1793" instrument_node=""> for the genre. Most 2D entries in the genre were inspired by this game in some way.</span></li><li data-dcnode-id="1787"><span data-dcnode-id="1791" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ControllableHelplessness" title="/pmwiki/pmwiki.php/Main/ControllableHelplessness"><span data-dcnode-id="1790" instrument_node="">Controllable Helplessness</span></a><span data-dcnode-id="1788" instrument_node="">: The SNES version has a particularly cruel example. If you run out of time, then the game doesn't end immediately. In fact, you can still complete levels and respawn after death as normal. But not only is Jaffar absent from level 20, upon reaching the Princess' room, which would normally end the game in triumph, her room will be empty, and the player will be met with a game over. Time could run out very early in the game, but no matter how many levels the player completes or how well they play from then on, the game ends in failure either way.</span></li><li data-dcnode-id="1782"><span data-dcnode-id="1786" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CopyProtection" title="/pmwiki/pmwiki.php/Main/CopyProtection"><span data-dcnode-id="1785" instrument_node="">Copy Protection</span></a><span data-dcnode-id="1783" instrument_node="">: When loading a game, the player may be greeted with a manual-based copy protection room containing potions with various letters above them. To pass this room, the player must drink the potion with the letter corresponding to a certain word in the manual, with the game telling you what page and line the word is on. Drinking the wrong one three times kills you and sends you back to Level 1. Drinking the right one causes the exit door in the room to open, allowing you to continue on.</span></li><li data-dcnode-id="1772"><span data-dcnode-id="1781" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CounterAttack" title="/pmwiki/pmwiki.php/Main/CounterAttack"><span data-dcnode-id="1780" instrument_node="">Counter-Attack</span></a><span data-dcnode-id="1778" instrument_node="">:</span><ul data-dcnode-id="1773"><li data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node=""> One way to fight is to wait for the opponent to attack, then defend and counter the attack.</span></li><li data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node=""> The first guard encountered in Level 8 actually utilizes this tactic himself; he will patiently wait for you to make your move and attacks only when you try to approach him.</span></li></ul></li><li data-dcnode-id="1767"><span data-dcnode-id="1771" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DamselInDistress" title="/pmwiki/pmwiki.php/Main/DamselInDistress"><span data-dcnode-id="1770" instrument_node="">Damsel in Distress</span></a><span data-dcnode-id="1768" instrument_node="">: The princess is in danger and must be saved by the prince.</span></li><li data-dcnode-id="1762"><span data-dcnode-id="1766" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkActionGirl" title="/pmwiki/pmwiki.php/Main/DarkActionGirl"><span data-dcnode-id="1765" instrument_node="">Dark Action Girl</span></a><span data-dcnode-id="1763" instrument_node="">: In the SNES version, one of the bosses is an amazon.</span></li><li data-dcnode-id="1757"><span data-dcnode-id="1761" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="1760" instrument_node="">Death's Hourglass</span></a><span data-dcnode-id="1758" instrument_node="">: In the intro scene, Jaffar approaches the Princess, raises his arms, and suddenly an hourglass appears. "Marry Jaffar... or die within the hour."</span></li><li data-dcnode-id="1752"><span data-dcnode-id="1756" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DemBones" title="/pmwiki/pmwiki.php/Main/DemBones"><span data-dcnode-id="1755" instrument_node="">Dem Bones</span></a><span data-dcnode-id="1753" instrument_node="">: The animated skeleton on level 3. The SNES version also features a number of skeletons as enemies in several levels.</span></li><li data-dcnode-id="1741"><span data-dcnode-id="1751" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DirectContinuousLevels" title="/pmwiki/pmwiki.php/Main/DirectContinuousLevels"><span data-dcnode-id="1750" instrument_node="">Direct Continuous Levels</span></a><span data-dcnode-id="1748" instrument_node="">: Level 6 ends with you falling down a pit, and Level 7 starts with you falling and grabbing a ledge (</span><a class="twikilink" data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YetAnotherStupidDeath" title="/pmwiki/pmwiki.php/Main/YetAnotherStupidDeath"><span data-dcnode-id="1747" instrument_node="">at least you better grab it!</span></a><span data-dcnode-id="1745" instrument_node="">).</span><ul data-dcnode-id="1742"><li data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node=""> Level 12 ends with you running off the side of the screen, and Level 13 starts with you in the lower corridor leading towards Jaffar, without the Prince going through an exit door first.</span></li></ul></li><li data-dcnode-id="1734"><span data-dcnode-id="1740" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DisneyVillainDeath" title="/pmwiki/pmwiki.php/Main/DisneyVillainDeath"><span data-dcnode-id="1739" instrument_node="">Disney Villain Death</span></a><span data-dcnode-id="1737" instrument_node="">: Guards can be instantly killed by being knocked back at the platform's end, provided that the fall is high enough or situates over a spiked pit. </span><span class="spoiler" data-dcnode-id="1735" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1736" instrument_node="">Even Jaffar can be killed this way, except in the Sega CD and SNES versions.</span></span></li><li data-dcnode-id="1729"><span data-dcnode-id="1733" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EdgeGravity" title="/pmwiki/pmwiki.php/Main/EdgeGravity"><span data-dcnode-id="1732" instrument_node="">Edge Gravity</span></a><span data-dcnode-id="1730" instrument_node="">: When you choose to walk instead of running, the Prince will stop himself from stepping off an edge.</span></li><li data-dcnode-id="1716"><span data-dcnode-id="1728" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnemyWithout" title="/pmwiki/pmwiki.php/Main/EnemyWithout"><span data-dcnode-id="1727" instrument_node="">Enemy Without</span></a><span data-dcnode-id="1725" instrument_node="">: When the Prince must bypass a magic mirror by jumping through it, a </span><a class="twikilink" data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LivingShadow" title="/pmwiki/pmwiki.php/Main/LivingShadow"><span data-dcnode-id="1724" instrument_node="">Living Shadow</span></a><span data-dcnode-id="1722" instrument_node=""> version of himself emerges from the other side of it and proceeds to cause mischief for the rest of the game. </span><span class="spoiler" data-dcnode-id="1717" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1721" instrument_node="">It can be defeated only by </span><a class="twikilink" data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SheatheYourSword" title="/pmwiki/pmwiki.php/Main/SheatheYourSword"><span data-dcnode-id="1720" instrument_node="">putting away your weapon</span></a><span data-dcnode-id="1718" instrument_node=""> and merging with it.</span></span></li><li data-dcnode-id="1711"><span data-dcnode-id="1715" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilChancellor" title="/pmwiki/pmwiki.php/Main/EvilChancellor"><span data-dcnode-id="1714" instrument_node="">Evil Chancellor</span></a><span data-dcnode-id="1712" instrument_node="">: Jaffar, who tries to force the princess to marry him under threat of death.</span></li><li data-dcnode-id="1703"><span data-dcnode-id="1710" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FallingDamage" title="/pmwiki/pmwiki.php/Main/FallingDamage"><span data-dcnode-id="1709" instrument_node="">Falling Damage</span></a><span data-dcnode-id="1707" instrument_node="">: Falling two levels will subtract one from your </span><a class="twikilink" data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LifeMeter" title="/pmwiki/pmwiki.php/Main/LifeMeter"><span data-dcnode-id="1706" instrument_node="">Life Meter</span></a><span data-dcnode-id="1704" instrument_node="">, and falling three levels will outright kill you.</span></li><li data-dcnode-id="1689"><span data-dcnode-id="1702" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FatBastard" title="/pmwiki/pmwiki.php/Main/FatBastard"><span data-dcnode-id="1701" instrument_node="">Fat Bastard</span></a><span data-dcnode-id="1699" instrument_node="">: Level six has </span><a class="twikilink" data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UniqueEnemy" title="/pmwiki/pmwiki.php/Main/UniqueEnemy"><span data-dcnode-id="1698" instrument_node="">one enemy</span></a><span data-dcnode-id="1696" instrument_node=""> who is this. He becomes a proper bossfight in the SNES version, with the </span><a class="twikilink" data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllThereInTheManual" title="/pmwiki/pmwiki.php/Main/AllThereInTheManual"><span data-dcnode-id="1695" instrument_node="">manual calling</span></a><span data-dcnode-id="1693" instrument_node=""> him </span><a class="twikilink" data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorruptPolitician" title="/pmwiki/pmwiki.php/Main/CorruptPolitician"><span data-dcnode-id="1692" instrument_node="">Politician</span></a><span data-dcnode-id="1690" instrument_node="">.</span></li><li data-dcnode-id="1684"><span data-dcnode-id="1688" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalDeathMode" title="/pmwiki/pmwiki.php/Main/FinalDeathMode"><span data-dcnode-id="1687" instrument_node="">Final Death Mode</span></a><span data-dcnode-id="1685" instrument_node="">: Survival Mode in the remake.</span></li><li data-dcnode-id="1679"><span data-dcnode-id="1683" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiantMook" title="/pmwiki/pmwiki.php/Main/GiantMook"><span data-dcnode-id="1682" instrument_node="">Giant Mook</span></a><span data-dcnode-id="1680" instrument_node="">: The fat guard from Level 6. He's noticeably thicker and a somewhat better fighter than most of the other guards. He has five hit points, something the other guards don't have until Level 9, but the guards of Levels 10 and 11 have six hit points. Averted in the SNES version where he's a proper boss.</span></li><li data-dcnode-id="1674"><span data-dcnode-id="1678" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HalfTheManHeUsedToBe" title="/pmwiki/pmwiki.php/Main/HalfTheManHeUsedToBe"><span data-dcnode-id="1677" instrument_node="">Half the Man He Used to Be</span></a><span data-dcnode-id="1675" instrument_node="">: The saw-toothed traps will slice the Prince in half if he's not careful, resulting in his death. Of course, this can also happen to enemies that get pushed into one, so the things play fair.</span></li><li data-dcnode-id="1669"><span data-dcnode-id="1673" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeartContainer" title="/pmwiki/pmwiki.php/Main/HeartContainer"><span data-dcnode-id="1672" instrument_node="">Heart Container</span></a><span data-dcnode-id="1670" instrument_node="">: You can find in most levels a potion that restores you to full health and gives you one additional hit point. They are distinct from regular healing potions only by being taller.</span></li><li data-dcnode-id="1659"><span data-dcnode-id="1668" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HellIsThatNoise" title="/pmwiki/pmwiki.php/Main/HellIsThatNoise"><span data-dcnode-id="1667" instrument_node="">Hell Is That Noise</span></a><span data-dcnode-id="1665" instrument_node="">: The clanging of the saw-toothed traps. To say nothing of the sound they make </span><em data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">when someone get chopped in two by them.</span></em><span data-dcnode-id="1662" instrument_node=""> </span><strong data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Yeowch.</span></strong></li><li data-dcnode-id="1654"><span data-dcnode-id="1658" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HitFlash" title="/pmwiki/pmwiki.php/Main/HitFlash"><span data-dcnode-id="1657" instrument_node="">Hit Flash</span></a><span data-dcnode-id="1655" instrument_node="">: Whenever an enemy is hit by a sword or falls on the ground, a colored flash is shown. The color matches the character's clothes and life points. But if it happens to the Prince, the whole screen will briefly flash red.</span></li><li data-dcnode-id="1640"><span data-dcnode-id="1653" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HoistByTheirOwnPetard" title="/pmwiki/pmwiki.php/Main/HoistByTheirOwnPetard"><span data-dcnode-id="1652" instrument_node="">Hoist by Their Own Petard</span></a><span data-dcnode-id="1650" instrument_node="">: A lot of later combat encounters involve you crossing a hazard (such as chompers or a deadly drop) to confront a guard, putting you in the position where you have to fight with your back to the hazard, threatening death if you are forced back by parrying too much. It's quite easy to slip past the guard and swap places with them then force </span><em data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">them</span></em><span data-dcnode-id="1647" instrument_node=""> back into the hazard for an instant kill. </span><span class="spoiler" data-dcnode-id="1641" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1646" instrument_node="">You can even do this to </span><em data-dcnode-id="1643"><a class="twikilink" data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnticlimaxBoss" title="/pmwiki/pmwiki.php/Main/AnticlimaxBoss"><span data-dcnode-id="1645" instrument_node="">Jaffar!</span></a></em><span data-dcnode-id="1642" instrument_node=""> Albeit only in the original version of the game.</span></span></li><li data-dcnode-id="1635"><span data-dcnode-id="1639" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HollywoodTorches" title="/pmwiki/pmwiki.php/Main/HollywoodTorches"><span data-dcnode-id="1638" instrument_node="">Hollywood Torches</span></a><span data-dcnode-id="1636" instrument_node="">: Torches provide illumination for the entire room and never burn out.</span></li><li data-dcnode-id="1625"><span data-dcnode-id="1634" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImpaledWithExtremePrejudice" title="/pmwiki/pmwiki.php/Main/ImpaledWithExtremePrejudice"><span data-dcnode-id="1633" instrument_node="">Impaled with Extreme Prejudice</span></a><span data-dcnode-id="1631" instrument_node="">:</span><ul data-dcnode-id="1626"><li data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node=""> The spike traps will pierce the Prince if he's not careful.</span></li><li data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node=""> A careful and fast enough player can use the spike traps to their advantage and push mooks into them.</span></li></ul></li><li data-dcnode-id="1615"><span data-dcnode-id="1624" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InertialImpalement" title="/pmwiki/pmwiki.php/Main/InertialImpalement"><span data-dcnode-id="1623" instrument_node="">Inertial Impalement</span></a><span data-dcnode-id="1621" instrument_node="">: You can either run, jump or fall onto spiked traps, or you can force your enemies to step or fall onto them. Death will be instant for you all. </span><span class="spoiler" data-dcnode-id="1616" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1620" instrument_node="">This is one of the easiest ways to kill the </span><a class="twikilink" data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossInMookClothing" title="/pmwiki/pmwiki.php/Main/BossInMookClothing"><span data-dcnode-id="1619" instrument_node="">Boss in Mook Clothing</span></a><span data-dcnode-id="1617" instrument_node=""> in Level 8.</span></span></li><li data-dcnode-id="1610"><span data-dcnode-id="1614" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterfaceScrew" title="/pmwiki/pmwiki.php/Main/InterfaceScrew"><span data-dcnode-id="1613" instrument_node="">Interface Screw</span></a><span data-dcnode-id="1611" instrument_node="">: One of the large potions in the ninth level (it has green vapor on the PC version) inverts the screen. You have to find a second one to correct it again.</span></li><li data-dcnode-id="1605"><span data-dcnode-id="1609" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InvincibleMinorMinion" title="/pmwiki/pmwiki.php/Main/InvincibleMinorMinion"><span data-dcnode-id="1608" instrument_node="">Invincible Minor Minion</span></a><span data-dcnode-id="1606" instrument_node="">: The walking skeleton from Level 3 can't be hurt with stabs. It can only be pushed off the edge.</span></li><li data-dcnode-id="1585"><span data-dcnode-id="1604" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItsAWonderfulFailure" title="/pmwiki/pmwiki.php/Main/ItsAWonderfulFailure"><span data-dcnode-id="1603" instrument_node="">It's a Wonderful Failure</span></a><span data-dcnode-id="1601" instrument_node="">: The </span><a class="twikilink" data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameOver" title="/pmwiki/pmwiki.php/Main/GameOver"><span data-dcnode-id="1600" instrument_node="">Game Over</span></a><span data-dcnode-id="1598" instrument_node=""> screen in at least one version of the game describes what happens when you run out of time, complete with depressing music. The </span><a class="twikilink" data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/SegaGenesis" title="/pmwiki/pmwiki.php/UsefulNotes/SegaGenesis"><span data-dcnode-id="1597" instrument_node="">Sega Genesis</span></a><span data-dcnode-id="1595" instrument_node=""> version being the most notable:</span><div class="indent" data-dcnode-id="1592"><em data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Final hope destroyed, the Princess has no choice but to submit to the Vizier. Jaffar takes the crown, and Persia is plunged into an age of fear and tyranny.</span></em></div><ul data-dcnode-id="1586"><li data-dcnode-id="1587"><span data-dcnode-id="1591" instrument_node=""> The NES and Game Boy versions also have a text wall when time runs out, albeit a strangely-toothless one, with the NES version not even having depressing music:</span><div class="indent" data-dcnode-id="1588"><em data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Despite the brave youth's best efforts, the sands of time have run out. Hoping for another chance, he has already begun to prepare for his inevitable rematch with the tyrant Jaffar...</span></em></div></li></ul></li><li data-dcnode-id="1580"><span data-dcnode-id="1584" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JumpPhysics" title="/pmwiki/pmwiki.php/Main/JumpPhysics"><span data-dcnode-id="1583" instrument_node="">Jump Physics</span></a><span data-dcnode-id="1581" instrument_node="">: Pretty much averted in that jumping is portrayed very realistically, a rarity for the time, putting your agility on par with a traceur. A running start will allow you to clear a lot more distance than a standing jump (and even then you still have to hold Shift to grab the opposite ledge sometimes), and you only get enough height to climb a single storey or touch the ceiling directly above you (and dislodge the tile if it's loose).</span></li><li data-dcnode-id="1575"><span data-dcnode-id="1579" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Knockback" title="/pmwiki/pmwiki.php/Main/Knockback"><span data-dcnode-id="1578" instrument_node="">Knockback</span></a><span data-dcnode-id="1576" instrument_node="">: Any hits on the player and the enemies result in some them being knocked back. This makes it easier to defeat enemies by pushing them over ledge.</span></li><li data-dcnode-id="1570"><span data-dcnode-id="1574" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LawOfChromaticSuperiority" title="/pmwiki/pmwiki.php/Main/LawOfChromaticSuperiority"><span data-dcnode-id="1573" instrument_node="">Law of Chromatic Superiority</span></a><span data-dcnode-id="1571" instrument_node="">: In the Super Nintendo version, the guards are given different colored outfits that roughly correspond to how much health they have. Green guards have the least, blue guards have middling health, and purple guards have the most.</span></li><li data-dcnode-id="1559"><span data-dcnode-id="1569" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeapOfFaith" title="/pmwiki/pmwiki.php/Main/LeapOfFaith"><span data-dcnode-id="1568" instrument_node="">Leap of Faith</span></a><span data-dcnode-id="1566" instrument_node="">: The game required quite a few, most notably early in level 3 and at the end of level 7 (where you have to guess that the strange-coloured potion you just found would cause you to float down what would otherwise be a fatal drop, rather than just being a poison potion). Not to mention the infamous part in level 12 where you have to </span><span class="spoiler" data-dcnode-id="1561" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1565" instrument_node="">run out over an empty abyss, </span><a class="twikilink" data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SceneryAsYouGo" title="/pmwiki/pmwiki.php/Main/SceneryAsYouGo"><span data-dcnode-id="1564" instrument_node="">revealing invisible tiles</span></a><span data-dcnode-id="1562" instrument_node=""> that appear under your feet</span></span><span data-dcnode-id="1560" instrument_node="">.</span></li><li data-dcnode-id="1548"><span data-dcnode-id="1558" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LevelGoal" title="/pmwiki/pmwiki.php/Main/LevelGoal"><span data-dcnode-id="1557" instrument_node="">Level Goal</span></a><span data-dcnode-id="1555" instrument_node="">: The goal of each level is finding the exit gate and opening it with the right </span><a class="twikilink" data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PressurePlate" title="/pmwiki/pmwiki.php/Main/PressurePlate"><span data-dcnode-id="1554" instrument_node="">Pressure Plate</span></a><span data-dcnode-id="1552" instrument_node="">. </span><a class="twikilink" data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoundCodedForYourConvenience" title="/pmwiki/pmwiki.php/Main/SoundCodedForYourConvenience"><span data-dcnode-id="1551" instrument_node="">The sound of an opening gate will let you know</span></a><span data-dcnode-id="1549" instrument_node=""> you've stepped on the right plate.</span></li><li data-dcnode-id="1543"><span data-dcnode-id="1547" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LiteralCliffhanger" title="/pmwiki/pmwiki.php/Main/LiteralCliffhanger"><span data-dcnode-id="1546" instrument_node="">Literal Cliffhanger</span></a><span data-dcnode-id="1544" instrument_node="">: Required many times if you don't want to die from the huge drop below. There's a button that allows you to manually hold on to ledges, and some platform jumps are even calculated or distanced with this mechanic in mind.</span></li><li data-dcnode-id="1538"><span data-dcnode-id="1542" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LockedInTheDungeon" title="/pmwiki/pmwiki.php/Main/LockedInTheDungeon"><span data-dcnode-id="1541" instrument_node="">Locked in the Dungeon</span></a><span data-dcnode-id="1539" instrument_node="">: You are locked in the palace's dungeon in the beginning, and from there your quest to rescue the princess begins.</span></li><li data-dcnode-id="1533"><span data-dcnode-id="1537" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitKill" title="/pmwiki/pmwiki.php/Main/OneHitKill"><span data-dcnode-id="1536" instrument_node="">One-Hit Kill</span></a><span data-dcnode-id="1534" instrument_node="">: Take a hit from an enemy with your sword sheathed, and the Prince will cark it on the spot.</span></li><li data-dcnode-id="1522"><span data-dcnode-id="1532" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicKnight" title="/pmwiki/pmwiki.php/Main/MagicKnight"><span data-dcnode-id="1531" instrument_node="">Magic Knight</span></a><span data-dcnode-id="1529" instrument_node="">: In addition to being capable of casting a spell that will kill the Princess within the hour, Jaffar, as the game's </span><a class="twikilink" data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1528" instrument_node="">Big Bad</span></a><span data-dcnode-id="1526" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="1525" instrument_node="">Final Boss</span></a><span data-dcnode-id="1523" instrument_node="">, is an extremely capable swordsman.</span></li><li data-dcnode-id="1506"><span data-dcnode-id="1521" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicMirror" title="/pmwiki/pmwiki.php/Main/MagicMirror"><span data-dcnode-id="1520" instrument_node="">Magic Mirror</span></a><span data-dcnode-id="1518" instrument_node="">: Level 4 has one that can't be broken with a sword </span><em data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">and</span></em><span data-dcnode-id="1515" instrument_node=""> blocks one of the paths that the Prince must go through. </span><span class="spoiler" data-dcnode-id="1510" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1514" instrument_node="">The correct solution is to have the Prince take some steps behind, then run back towards the mirror and ultimately </span><em data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">leap</span></em><span data-dcnode-id="1511" instrument_node=""> into it.</span></span><span data-dcnode-id="1509" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1507" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1508" instrument_node="">Bad thing, doing so will release his Shadow, whom he must fight later.</span></span></li><li data-dcnode-id="1499"><span data-dcnode-id="1505" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MalevolentArchitecture" title="/pmwiki/pmwiki.php/Main/MalevolentArchitecture"><span data-dcnode-id="1504" instrument_node="">Malevolent Architecture</span></a><span data-dcnode-id="1502" instrument_node="">: Loose floor tiles, spike traps and chomper traps, not only in the dungeon but also in the palace proper. Players can use them to their benefit, however, by tricking the mooks into falling in said traps. </span><span class="spoiler" data-dcnode-id="1500" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1501" instrument_node=""> It's required to defeat the Skeleton.</span></span></li><li data-dcnode-id="1494"><span data-dcnode-id="1498" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaninglessLives" title="/pmwiki/pmwiki.php/Main/MeaninglessLives"><span data-dcnode-id="1497" instrument_node="">Meaningless Lives</span></a><span data-dcnode-id="1495" instrument_node="">: Whenever you die, you just restart the current level. The problem is that the timer does not reset.</span></li><li data-dcnode-id="1483"><span data-dcnode-id="1493" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MirrorMatch" title="/pmwiki/pmwiki.php/Main/MirrorMatch"><span data-dcnode-id="1492" instrument_node="">Mirror Match</span></a><span data-dcnode-id="1490" instrument_node="">: You have to </span><a class="twikilink" data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MirrorBoss" title="/pmwiki/pmwiki.php/Main/MirrorBoss"><span data-dcnode-id="1489" instrument_node="">face a literal mirror copy of yourself</span></a><span data-dcnode-id="1487" instrument_node="">, released from a magic mirror you had leaped through earlier. He shares your health bar and mirrors every attack identically. The only way to defeat him is to </span><span class="spoiler" data-dcnode-id="1485" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1486" instrument_node="">sheathe your sword</span></span><span data-dcnode-id="1484" instrument_node="">.</span></li><li data-dcnode-id="1478"><span data-dcnode-id="1482" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MirrorMonster" title="/pmwiki/pmwiki.php/Main/MirrorMonster"><span data-dcnode-id="1481" instrument_node="">Mirror Monster</span></a><span data-dcnode-id="1479" instrument_node="">: Shadow Man is created when the Prince jumps through Jaffar's magic mirror.</span></li><li data-dcnode-id="1473"><span data-dcnode-id="1477" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MirrorSelf" title="/pmwiki/pmwiki.php/Main/MirrorSelf"><span data-dcnode-id="1476" instrument_node="">Mirror Self</span></a><span data-dcnode-id="1474" instrument_node="">: Depending on the version, Shadow Man is a spectral or darker version of the protagonist.</span></li><li data-dcnode-id="1468"><span data-dcnode-id="1472" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MultiArmedAndDangerous" title="/pmwiki/pmwiki.php/Main/MultiArmedAndDangerous"><span data-dcnode-id="1471" instrument_node="">Multi-Armed and Dangerous</span></a><span data-dcnode-id="1469" instrument_node="">: In the SNES version, the Hindu god-like monster fights in this way by stomping on the floor and making skulls fall down.</span></li><li data-dcnode-id="1461"><span data-dcnode-id="1467" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceMice" title="/pmwiki/pmwiki.php/Main/NiceMice"><span data-dcnode-id="1466" instrument_node="">Nice Mice</span></a><span data-dcnode-id="1464" instrument_node="">: The Princess's mouse </span><span class="spoiler" data-dcnode-id="1462" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1463" instrument_node=""> rescues the Prince in one level by opening a gate he gets trapped behind.</span></span></li><li data-dcnode-id="1456"><span data-dcnode-id="1460" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoNameGiven" title="/pmwiki/pmwiki.php/Main/NoNameGiven"><span data-dcnode-id="1459" instrument_node="">No Name Given</span></a><span data-dcnode-id="1457" instrument_node="">: The Prince and the Princess's names were never revealed.</span></li><li data-dcnode-id="1432"><span data-dcnode-id="1455" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoobBridge" title="/pmwiki/pmwiki.php/Main/NoobBridge"><span data-dcnode-id="1454" instrument_node="">Noob Bridge</span></a><span data-dcnode-id="1452" instrument_node="">: See the </span><a class="twikilink" data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossInMookClothing" title="/pmwiki/pmwiki.php/Main/BossInMookClothing"><span data-dcnode-id="1451" instrument_node="">Boss in Mook Clothing</span></a><span data-dcnode-id="1449" instrument_node=""> entry for a combat example. For platforming examples, the early levels especially introduce elements that require learning particular mechanics to overcome.</span><ul data-dcnode-id="1433"><li data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node=""> On the way back from getting the sword in Level 1, you must climb up onto the pressure plate, </span><em data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">walk</span></em><span data-dcnode-id="1445" instrument_node=""> to the edge and then do a standing jump across, instead of a running jump like in most other cases.</span></li><li data-dcnode-id="1439"><span data-dcnode-id="1443" instrument_node=""> The end of level 2 (speedrunning trickery notwithstanding) requires making a jump that necessitates grabbing the opposite ledge and pulling yourself up. You </span><em data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">need</span></em><span data-dcnode-id="1440" instrument_node=""> to know how to ledge-grab by the time levels 3 and 7 roll around.</span></li><li data-dcnode-id="1434"><span data-dcnode-id="1438" instrument_node=""> Level 3 requires making a </span><a class="twikilink" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeapOfFaith" title="/pmwiki/pmwiki.php/Main/LeapOfFaith"><span data-dcnode-id="1437" instrument_node="">Leap of Faith</span></a><span data-dcnode-id="1435" instrument_node=""> or otherwise carefully examining an optional part of the level to draw the logical conclusion that the pillars are supporting some unseen platforms higher up. It also stretches out the lesson from level 2 by requiring a ledge pull from a running jump this time, through a closing portcullis to boot.</span></li></ul></li><li data-dcnode-id="1427"><span data-dcnode-id="1431" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NothingIsScarier" title="/pmwiki/pmwiki.php/Main/NothingIsScarier"><span data-dcnode-id="1430" instrument_node="">Nothing Is Scarier</span></a><span data-dcnode-id="1428" instrument_node="">: If the time runs out in the original version, the final cutscene is of the empty room where Princess was imprisoned, save for the hourglass with all the sand drained into the bottom section. Did she die? Was she forced to marry Jaffar? It's never revealed.</span></li><li data-dcnode-id="1419"><span data-dcnode-id="1426" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OrcusOnHisThrone" title="/pmwiki/pmwiki.php/Main/OrcusOnHisThrone"><span data-dcnode-id="1425" instrument_node="">Orcus on His Throne</span></a><span data-dcnode-id="1423" instrument_node="">: Jaffar sits on his throne in this way in the SNES version, initiating a </span><a class="twikilink" data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossRush" title="/pmwiki/pmwiki.php/Main/BossRush"><span data-dcnode-id="1422" instrument_node="">Boss Rush</span></a><span data-dcnode-id="1420" instrument_node="">.</span></li><li data-dcnode-id="1414"><span data-dcnode-id="1418" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PaletteSwap" title="/pmwiki/pmwiki.php/Main/PaletteSwap"><span data-dcnode-id="1417" instrument_node="">Palette Swap</span></a><span data-dcnode-id="1415" instrument_node="">: Many of the guards only differ by clothes colors. Shadow sprites are created from Prince sprites by XOR operation (selective inversion), at least on Apple ][ and some earlier ports.</span></li><li data-dcnode-id="1409"><span data-dcnode-id="1413" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PendulumOfDeath" title="/pmwiki/pmwiki.php/Main/PendulumOfDeath"><span data-dcnode-id="1412" instrument_node="">Pendulum of Death</span></a><span data-dcnode-id="1410" instrument_node="">: One of the new traps in the SNES version.</span></li><li data-dcnode-id="1401"><span data-dcnode-id="1408" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PoisonMushroom" title="/pmwiki/pmwiki.php/Main/PoisonMushroom"><span data-dcnode-id="1407" instrument_node="">Poison Mushroom</span></a><span data-dcnode-id="1405" instrument_node="">: The healing potions that restore one unit of your </span><a class="twikilink" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LifeMeter" title="/pmwiki/pmwiki.php/Main/LifeMeter"><span data-dcnode-id="1404" instrument_node="">Life Meter</span></a><span data-dcnode-id="1402" instrument_node=""> look nearly identical to the poison potions that take off one unit instead. The poison potions just emit blue bubbles instead of red ones. The SNES version also has two large potions placed together, one of which will kill you instantly instead of increasing your life.</span></li><li data-dcnode-id="1396"><span data-dcnode-id="1400" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PressurePlate" title="/pmwiki/pmwiki.php/Main/PressurePlate"><span data-dcnode-id="1399" instrument_node="">Pressure Plate</span></a><span data-dcnode-id="1397" instrument_node="">: Raised floor plates open doors to next levels or raise portcullises. Plates with empty space under them close portcullises.</span></li><li data-dcnode-id="1391"><span data-dcnode-id="1395" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProtagonistTitle" title="/pmwiki/pmwiki.php/Main/ProtagonistTitle"><span data-dcnode-id="1394" instrument_node="">Protagonist Title</span></a><span data-dcnode-id="1392" instrument_node="">: In a unique twist on this trope, the protagonist isn't actually the prince yet, but a foreign traveller who's arrived in Persia. He only becomes the prince once the game's beaten, when he marries the princess. Otherwise in most manual synopses, he's simply referred to as "traveller" or "youth."</span></li><li data-dcnode-id="1381"><span data-dcnode-id="1390" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PurpleIsPowerful" title="/pmwiki/pmwiki.php/Main/PurpleIsPowerful"><span data-dcnode-id="1389" instrument_node="">Purple Is Powerful</span></a><span data-dcnode-id="1387" instrument_node="">:</span><ul data-dcnode-id="1382"><li data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node=""> The first guard in Level 8 wears purple, and is surprisingly tough, playing defensively and only attacking when the player tries to close the gap.</span></li><li data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node=""> In the SNES version, guards in purple have the most health out of any standard mook.</span></li></ul></li><li data-dcnode-id="1349"><span data-dcnode-id="1380" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PuzzleBoss" title="/pmwiki/pmwiki.php/Main/PuzzleBoss"><span data-dcnode-id="1379" instrument_node="">Puzzle Boss</span></a><span data-dcnode-id="1377" instrument_node="">:</span><ul data-dcnode-id="1350"><li data-dcnode-id="1369"><span data-dcnode-id="1376" instrument_node=""> The skeleton on level 3 is immortal — hitting it with a sword only pushes it away. </span><span class="spoiler" data-dcnode-id="1374" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1375" instrument_node="">You need to push it off the edge. Twice.</span></span><span data-dcnode-id="1373" instrument_node=""> And it becomes active only after you open the door to the next level. Additionally, in the SNES version, you have to push it into a </span><a class="twikilink" data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmashingHallwayTrapsOfDoom" title="/pmwiki/pmwiki.php/Main/SmashingHallwayTrapsOfDoom"><span data-dcnode-id="1372" instrument_node="">crushing trap</span></a><span data-dcnode-id="1370" instrument_node=""> to finish it off.</span></li><li data-dcnode-id="1351"><span data-dcnode-id="1368" instrument_node=""> The Shadow. First you meet an impassable </span><a class="twikilink" data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicMirror" title="/pmwiki/pmwiki.php/Main/MagicMirror"><span data-dcnode-id="1367" instrument_node="">Magic Mirror</span></a><span data-dcnode-id="1365" instrument_node=""> after opening the door to level 5. </span><span class="spoiler" data-dcnode-id="1360" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1364" instrument_node="">Jumping through it breaks it, releases the Shadow and leaves you with </span><a class="twikilink" data-dcnode-
