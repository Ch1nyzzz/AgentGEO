id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitPointWonder" title="/pmwiki/pmwiki.php/Main/OneHitPointWonder"><span data-dcnode-id="1363" instrument_node="">one unit of health</span></a><span data-dcnode-id="1361" instrument_node="">.</span></span><span data-dcnode-id="1359" instrument_node=""> When you meet him next time, he pushes a switch to prevent you from proceeding anywhere but downwards. When you get to fight him, hitting him hurts you too. </span><span class="spoiler" data-dcnode-id="1352" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeAThirdOption" title="/pmwiki/pmwiki.php/Main/TakeAThirdOption"><span data-dcnode-id="1358" instrument_node="">You</span></a><span data-dcnode-id="1356" instrument_node=""> need to </span><a class="twikilink" data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SheatheYourSword" title="/pmwiki/pmwiki.php/Main/SheatheYourSword"><span data-dcnode-id="1355" instrument_node="">Sheathe Your Sword</span></a><span data-dcnode-id="1353" instrument_node=""> and merge with him.</span></span></li></ul></li><li data-dcnode-id="1344"><span data-dcnode-id="1348" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RaceAgainstTheClock" title="/pmwiki/pmwiki.php/Main/RaceAgainstTheClock"><span data-dcnode-id="1347" instrument_node="">Race Against the Clock</span></a><span data-dcnode-id="1345" instrument_node="">: The entire game! At the beginning, Jaffar gives an ultimatum to the Princess: marry him or die within one hour (two in the SNES version). This hour goes by in real time, and while dying simply resets the level, it doesn't reset the time limit. Die too much, and the game could become unwinnable.</span></li><li data-dcnode-id="1332"><span data-dcnode-id="1343" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RingOutBoss" title="/pmwiki/pmwiki.php/Main/RingOutBoss"><span data-dcnode-id="1342" instrument_node="">Ring-Out Boss</span></a><span data-dcnode-id="1340" instrument_node="">:</span><ul data-dcnode-id="1333"><li data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node=""> The skeleton from Level 3 cannot be defeated in any other way than pushing it into a pit.</span></li><li data-dcnode-id="1334"><span data-dcnode-id="1337" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1335" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1336" instrument_node="">Jaffar himself can be defeated by simply pushing him over the convenient ledge behind you.</span></span></li></ul></li><li data-dcnode-id="1327"><span data-dcnode-id="1331" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Rotoscoping" title="/pmwiki/pmwiki.php/Main/Rotoscoping"><span data-dcnode-id="1330" instrument_node="">Rotoscoping</span></a><span data-dcnode-id="1328" instrument_node="">: Used to achieve the smooth animation in the game.</span></li><li data-dcnode-id="1319"><span data-dcnode-id="1326" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RedIsViolent" title="/pmwiki/pmwiki.php/Main/RedIsViolent"><span data-dcnode-id="1325" instrument_node="">Red Is Violent</span></a><span data-dcnode-id="1323" instrument_node="">: The Super Famicom boxart has the forces of Jaffar depicted as such, while the Prince, Princess and mouse all show </span><a class="twikilink" data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LightIsGood" title="/pmwiki/pmwiki.php/Main/LightIsGood"><span data-dcnode-id="1322" instrument_node="">as white</span></a><span data-dcnode-id="1320" instrument_node="">.</span></li><li data-dcnode-id="1314"><span data-dcnode-id="1318" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SequenceBreaking" title="/pmwiki/pmwiki.php/Main/SequenceBreaking"><span data-dcnode-id="1317" instrument_node="">Sequence Breaking</span></a><span data-dcnode-id="1315" instrument_node="">: It is possible with a well-timed jump to bypass the guard on the first level without ever picking up the sword (a trick exploited by speedrunners). Thankfully the game assumes you picked it up and it is available to use from the second level onwards.</span></li><li data-dcnode-id="1306"><span data-dcnode-id="1313" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SheatheYourSword" title="/pmwiki/pmwiki.php/Main/SheatheYourSword"><span data-dcnode-id="1312" instrument_node="">Sheathe Your Sword</span></a><span data-dcnode-id="1310" instrument_node="">: Sheathing your sword is the only way to </span><span class="spoiler" data-dcnode-id="1308" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1309" instrument_node="">defeat your shadow</span></span><span data-dcnode-id="1307" instrument_node="">.</span></li><li data-dcnode-id="1298"><span data-dcnode-id="1305" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="1304" instrument_node="">Shout-Out</span></a><span data-dcnode-id="1302" instrument_node="">: The soundtrack takes more than a few cues from Maurice Jarre's score for </span><em data-dcnode-id="1299"><a class="twikilink" data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/LawrenceOfArabia" title="/pmwiki/pmwiki.php/Film/LawrenceOfArabia"><span data-dcnode-id="1301" instrument_node="">Lawrence of Arabia</span></a></em></li><li data-dcnode-id="1293"><span data-dcnode-id="1297" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpikesOfDoom" title="/pmwiki/pmwiki.php/Main/SpikesOfDoom"><span data-dcnode-id="1296" instrument_node="">Spikes of Doom</span></a><span data-dcnode-id="1294" instrument_node="">: One of the most common traps in the game, as is usual for Platform Games. However, unlike most examples, they only kill you if you fall or run into them with too much speed. If you walk slowly, you can go straight through them with no problem.</span></li><li data-dcnode-id="1288"><span data-dcnode-id="1292" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimedMission" title="/pmwiki/pmwiki.php/Main/TimedMission"><span data-dcnode-id="1291" instrument_node="">Timed Mission</span></a><span data-dcnode-id="1289" instrument_node="">: You have unlimited continues, but you have only an hour to save the princess (two in the SNES version), and dying subtracts a minute from the timer.</span></li><li data-dcnode-id="1281"><span data-dcnode-id="1287" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TitleDrop" title="/pmwiki/pmwiki.php/Main/TitleDrop"><span data-dcnode-id="1286" instrument_node="">Title Drop</span></a><span data-dcnode-id="1284" instrument_node="">: At the end, regarding the protagonist.</span><div class="indent" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">No longer a stranger, he shall from this day forth be known as... PRINCE OF PERSIA.</span></div></li><li data-dcnode-id="1269"><span data-dcnode-id="1280" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrialAndErrorGameplay" title="/pmwiki/pmwiki.php/Main/TrialAndErrorGameplay"><span data-dcnode-id="1279" instrument_node="">Trial-and-Error Gameplay</span></a><span data-dcnode-id="1277" instrument_node="">: If you're playing the game for the first time blind without a walkthrough in hand, you will NOT be able to beat it, guaranteed. Despite unlimited continues, the 60 minute time limit ensured that there was no way you could navigate the mind-bending labyrinth in time to reach Jaffar before the Princess was executed. Finding your way to each level exit (and finding the switch to open the exit door so you can proceed) was a very time-consuming task, even if you could avoid falling prey to the various deadly traps and opponents in your path, not helped by the occasional requirement to make a </span><a class="twikilink" data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeapOfFaith" title="/pmwiki/pmwiki.php/Main/LeapOfFaith"><span data-dcnode-id="1276" instrument_node="">Leap of Faith</span></a><span data-dcnode-id="1274" instrument_node=""> (most infamously near the start of level 3 where you need to make a blind jump off the screen to the right to find a pivotal switch). The idea was that you would explore as far as you could in your hour, then after you ran out of time you'd start again, this time going through everything you'd already worked out faster to explore new ground, until you got to Jaffar, eventually forcing you to effectively complete a mandatory </span><img class="ymmv1 rounded" data-dcnode-id="1273" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Speedrun" title="/pmwiki/pmwiki.php/Main/Speedrun"><span data-dcnode-id="1272" instrument_node="">Speedrun</span></a><span data-dcnode-id="1270" instrument_node=""> to beat the game.</span></li><li data-dcnode-id="1258"><span data-dcnode-id="1268" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UniqueEnemy" title="/pmwiki/pmwiki.php/Main/UniqueEnemy"><span data-dcnode-id="1267" instrument_node="">Unique Enemy</span></a><span data-dcnode-id="1265" instrument_node="">: The </span><a class="twikilink" data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiantMook" title="/pmwiki/pmwiki.php/Main/GiantMook"><span data-dcnode-id="1264" instrument_node="">Giant Mook</span></a><span data-dcnode-id="1262" instrument_node=""> from Level 6 and </span><a class="twikilink" data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BossInMookClothing" title="/pmwiki/pmwiki.php/Main/BossInMookClothing"><span data-dcnode-id="1261" instrument_node="">Boss in Mook Clothing</span></a><span data-dcnode-id="1259" instrument_node=""> from Level 8.</span></li><li data-dcnode-id="1244"><span data-dcnode-id="1257" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheUsurper" title="/pmwiki/pmwiki.php/Main/TheUsurper"><span data-dcnode-id="1256" instrument_node="">The Usurper</span></a><span data-dcnode-id="1254" instrument_node="">: The sultan's vizier has taken over the palace </span><a class="twikilink" data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HorribleJudgeOfCharacter" title="/pmwiki/pmwiki.php/Main/HorribleJudgeOfCharacter"><span data-dcnode-id="1253" instrument_node="">in his absence</span></a><span data-dcnode-id="1251" instrument_node=""> and transformed it into a </span><a class="twikilink" data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathCourse" title="/pmwiki/pmwiki.php/Main/DeathCourse"><span data-dcnode-id="1250" instrument_node="">Death Course</span></a><span data-dcnode-id="1248" instrument_node=""> with </span><a class="twikilink" data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EverythingTryingToKillYou" title="/pmwiki/pmwiki.php/Main/EverythingTryingToKillYou"><span data-dcnode-id="1247" instrument_node="">Everything Trying to Kill You</span></a><span data-dcnode-id="1245" instrument_node="">.</span></li><li data-dcnode-id="1230"><span data-dcnode-id="1243" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ViolationOfCommonSense" title="/pmwiki/pmwi
