</span><div class="article-content retro-folders" data-dcnode-id="1035" id="main-article"><span data-dcnode-id="2397" instrument_node="">
</span><p data-dcnode-id="2395"></p><p data-dcnode-id="2394"></p><div class="quoteright" data-dcnode-id="2391" style="width:350px;"><div class="lazy_load_img_box" data-dcnode-id="2392" style="padding-top:100%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/prince_of_persia_2008_cover.jpg" border="0" class="embeddedimage" data-dcnode-id="2393" height="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/prince_of_persia_2008_cover.jpg&amp;raw" width="350"></div></div><div class="acaptionright" data-dcnode-id="2389" style="width:350px;"><span data-dcnode-id="2390" instrument_node="">The wind is free, but the sand goes where it is blown.</span></div><p data-dcnode-id="2388"></p><div class="indent" data-dcnode-id="2385"><em data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">"What is one grain of sand in the desert? What is one grain of sand in the storm?"</span></em></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2379"><span class="ad-caption" data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2380" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="2359"><em data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Prince of Persia</span></em><span data-dcnode-id="2376" instrument_node=""> is another </span><a class="twikilink" data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityReboot" title="/pmwiki/pmwiki.php/Main/ContinuityReboot"><span data-dcnode-id="2375" instrument_node="">Continuity Reboot</span></a><span data-dcnode-id="2373" instrument_node=""> for the action-adventure and platforming </span><em data-dcnode-id="2370"><a class="twikilink" data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/PrinceOfPersia" title="/pmwiki/pmwiki.php/Franchise/PrinceOfPersia"><span data-dcnode-id="2372" instrument_node="">Prince of Persia</span></a></em><span data-dcnode-id="2369" instrument_node=""> series, developed by Ubisoft Montreal and published by </span><a class="twikilink" data-dcnode-id="2367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/Ubisoft" title="/pmwiki/pmwiki.php/Creator/Ubisoft"><span data-dcnode-id="2368" instrument_node="">Ubisoft</span></a><span data-dcnode-id="2366" instrument_node="">. It was released in the United States on December 2, 2008 for </span><a class="twikilink" data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/PlayStation3" title="/pmwiki/pmwiki.php/UsefulNotes/PlayStation3"><span data-dcnode-id="2365" instrument_node="">PlayStation 3</span></a><span data-dcnode-id="2363" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/XBox360" title="/pmwiki/pmwiki.php/UsefulNotes/XBox360"><span data-dcnode-id="2362" instrument_node="">Xbox 360</span></a><span data-dcnode-id="2360" instrument_node=""> and on December 9, 2008 for Microsoft Windows. It was later released on March 24, 2009 for Mac OS X via the Cider engine.</span></p><p data-dcnode-id="2351"><span data-dcnode-id="2358" instrument_node="">The game is set in ancient Persia, with the eponymous Prince as the main character, reimagined as a roguish thief. When a freak sandstorm diverts him from his course and separates him from his donkey, Farah (and the gold she's carrying), he stumbles into a canyon and runs into a woman named Elika. Elika is one of the Ahura, people tasked by the god Ormazd to keep his brother </span><a class="twikilink" data-dcnode-id="2356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodOfEvil" title="/pmwiki/pmwiki.php/Main/GodOfEvil"><span data-dcnode-id="2357" instrument_node="">Ahriman</span></a><span data-dcnode-id="2355" instrument_node=""> imprisoned inside a temple. But </span><a class="twikilink" data-dcnode-id="2353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HaveYouSeenMyGod" title="/pmwiki/pmwiki.php/Main/HaveYouSeenMyGod"><span data-dcnode-id="2354" instrument_node="">Ormazd hasn't been heard in centuries</span></a><span data-dcnode-id="2352" instrument_node="">, the land has fallen into neglect, many of the Ahura have abandoned their duties, and those that remain are disillusioned. When Elika's father breaks the seal holding Ahriman, Ahriman's corruption spreads across the land as his generals are unleashed. It's up to the Prince and Elika to purify the land and seal Ahriman back in his prison.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2345"><span class="ad-caption" data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2346" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="2340"><span data-dcnode-id="2344" instrument_node="">Players traverse many different environments using his acrobatic abilities to scale walls and even crawl on the ceilings. Throughout the journey, players combat various enemies as they attempt to cleanse the land of corruption. A notable feature of gameplay is that the Prince can never be killed. Failing at platforming will result in Elika saving the Prince, resetting you to a safe spot before your attempt, and failing at combat will cause the enemy to regain some health but otherwise the battle will continue without stopping. The game's storyline and setting borrowed several aspects from </span><a class="twikilink" data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Zoroastrianism" title="/pmwiki/pmwiki.php/UsefulNotes/Zoroastrianism"><span data-dcnode-id="2343" instrument_node="">Zoroastrianism</span></a><span data-dcnode-id="2341" instrument_node="">, the world's oldest monotheistic religion.</span></p><p data-dcnode-id="2321"><span data-dcnode-id="2339" instrument_node="">The next chapter is a downloadable expansion simply titled </span><em data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Epilogue</span></em><span data-dcnode-id="2336" instrument_node="">, released on March 5, 2009, exclusively on consoles. A spin-off </span><a class="twikilink" data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/NintendoDS" title="/pmwiki/pmwiki.php/UsefulNotes/NintendoDS"><span data-dcnode-id="2335" instrument_node="">DS</span></a><span data-dcnode-id="2333" instrument_node=""> game, </span><em data-dcnode-id="2330"><a class="twikilink" data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/PrinceOfPersiaTheFallenKing" title="/pmwiki/pmwiki.php/VideoGame/PrinceOfPersiaTheFallenKing"><span data-dcnode-id="2332" instrument_node="">Prince of Persia: The Fallen King</span></a></em><span data-dcnode-id="2329" instrument_node=""> was released on Dec 2, 2008. </span><a class="twikilink" data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/PennyArcade" title="/pmwiki/pmwiki.php/Webcomic/PennyArcade"><span data-dcnode-id="2328" instrument_node="">Penny Arcade</span></a><span data-dcnode-id="2326" instrument_node=""> made </span><a class="urllink" data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//prince-of-persia.us.ubi.com/PA/html/index.php"><span data-dcnode-id="2325" instrument_node="">a thirty-page comic</span><img data-dcnode-id="2324" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2322" instrument_node=""> about the origin of the Hunter.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2315"><span class="ad-caption" data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2316" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="2293"><span data-dcnode-id="2314" instrument_node="">There has been no word on a true sequel to the game or any continuation of the franchise with Ubisoft mostly focusing on </span><em data-dcnode-id="2311"><a class="twikilink" data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/AssassinsCreed" title="/pmwiki/pmwiki.php/Franchise/AssassinsCreed"><span data-dcnode-id="2313" instrument_node="">Assassin's Creed</span></a></em><span data-dcnode-id="2310" instrument_node="">, </span><em data-dcnode-id="2307"><a class="twikilink" data-dcnode-id="2308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/WatchDogs" title="/pmwiki/pmwiki.php/VideoGame/WatchDogs"><span data-dcnode-id="2309" instrument_node="">Watch_Dogs</span></a></em><span data-dcnode-id="2306" instrument_node="">, and more additions to the </span><em data-dcnode-id="2303"><a class="twikilink" data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/FarCry" title="/pmwiki/pmwiki.php/Franchise/FarCry"><span data-dcnode-id="2305" instrument_node="">Far Cry</span></a></em><span data-dcnode-id="2302" instrument_node=""> series, with Ubisoft Montreal's CEO saying that the franchise was being "paused".</span><span class="notelabel" data-dcnode-id="2299" onclick="togglenote('note0jf41');" style="cursor: pointer;"><sup data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2294" id="note0jf41" isnote="true" onclick="togglenote('note0jf41');" style="display: none; cursor: pointer;"><span data-dcnode-id="2298" instrument_node="">Altough Ubisoft has said they are considering next-gen entries into multiple franchises, including </span><em data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Prince of Persia</span></em><span data-dcnode-id="2295" instrument_node="">.</span></span></p><hr data-dcnode-id="2292"><h2 data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">The game provides examples of following tropes:</span></h2><p data-dcnode-id="2289"></p><ul data-dcnode-id="1711"><li data-dcnode-id="2281"><span data-dcnode-id="2288" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysSaveTheGirl" title="/pmwiki/pmwiki.php/Main/AlwaysSaveTheGirl"><span data-dcnode-id="2287" instrument_node="">Always Save the Girl</span></a><span data-dcnode-id="2285" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2283" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2284" instrument_node="">Depressingly so, and subverted at the end of the DLC</span></span><span data-dcnode-id="2282" instrument_node="">.</span></li><li data-dcnode-id="2276"><span data-dcnode-id="2280" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndYourRewardIsClothes" title="/pmwiki/pmwiki.php/Main/AndYourRewardIsClothes"><span data-dcnode-id="2279" instrument_node="">And Your Reward Is Clothes</span></a><span data-dcnode-id="2277" instrument_node="">: Collecting all 1001 light seeds grants you the "Prototype" skin for Elika and the Prince (you only need 540  in order to complete the actual game). Its also unlocked by completing the Epilogue DLC</span></li><li data-dcnode-id="2268"><span data-dcnode-id="2275" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiHero" title="/pmwiki/pmwiki.php/Main/AntiHero"><span data-dcnode-id="2274" instrument_node="">Anti-Hero</span></a><span data-dcnode-id="2272" instrument_node="">: The Prince looks to be the </span><a class="createlink" data-dcnode-id="2270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StarWars" title="/pmwiki/pmwiki.php/Main/StarWars"><span data-dcnode-id="2271" instrument_node="">Han Solo</span></a><span data-dcnode-id="2269" instrument_node=""> type.</span></li><li data-dcnode-id="2253"><span data-dcnode-id="2267" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiVillain" title="/pmwiki/pmwiki.php/Main/AntiVillain"><span data-dcnode-id="2266" instrument_node="">Anti-Villain</span></a><span data-dcnode-id="2264" instrument_node="">:</span><ul data-dcnode-id="2254"><li data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node=""> The Warrior.</span></li><li data-dcnode-id="2255"><span data-dcnode-id="2261" instrument_node=""> The Mourning King. </span><span class="spoiler" data-dcnode-id="2257" title="you can set spoilers visible by default on your profile"><em data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Everything</span></em><span data-dcnode-id="2258" instrument_node=""> he did was to spare his daughter Elika from having to kill herself to imprison Ahriman</span></span><span data-dcnode-id="2256" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2235"><span data-dcnode-id="2252" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcWords" title="/pmwiki/pmwiki.php/Main/ArcWords"><span data-dcnode-id="2251" instrument_node="">Arc Words</span></a><span data-dcnode-id="2249" instrument_node="">:</span><ul data-dcnode-id="2236"><li data-dcnode-id="2242"><span data-dcnode-id="2248" instrument_node=""> </span><em data-dcnode-id="2243"><span data-dcnode-id="2247" instrument_node="">"If you would have your wish, </span><strong data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">then give me mine</span></strong><span data-dcnode-id="2244" instrument_node="">."</span></em></li><li data-dcnode-id="2237"><span data-dcnode-id="2241" instrument_node=""> "What is one grain of sand in the desert? What is one grain of sand in the storm?" First stated by Elika </span><span class="spoiler" data-dcnode-id="2239" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2240" instrument_node="">then by Ahriman</span></span><span data-dcnode-id="2238" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2227"><span data-dcnode-id="2234" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArmorPiercingSlap" title="/pmwiki/pmwiki.php/Main/ArmorPiercingSlap"><span data-dcnode-id="2233" instrument_node="">Armor-Piercing Slap</span></a><span data-dcnode-id="2231" instrument_node="">: Subverted. Elika tries to pull one on the Prince at the start of the Epilogue </span><a class="twikilink" data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DLC" title="/pmwiki/pmwiki.php/Main/DLC"><span data-dcnode-id="2230" instrument_node="">DLC</span></a><span data-dcnode-id="2228" instrument_node="">, but it doesn't help either of them see the other's point of view.</span></li><li data-dcnode-id="2219"><span data-dcnode-id="2226" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassNormal" title="/pmwiki/pmwiki.php/Main/BadassNormal"><span data-dcnode-id="2225" instrument_node="">Badass Normal</span></a><span data-dcnode-id="2223" instrument_node="">: Compared to creatures twisted by evil and given the power to use corruption as a weapon, a princess who can wield magical light, and a vengeful god who wants to unleash misery and suffering upon the world in a never-ending reign of darkness, the Prince has a sword and a clawed gauntlet. And he's </span><em data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">kicking ass</span></em><span data-dcnode-id="2220" instrument_node="">.</span></li><li data-dcnode-id="2214"><span data-dcnode-id="2218" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BattleCouple" title="/pmwiki/pmwiki.php/Main/BattleCouple"><span data-dcnode-id="2217" instrument_node="">Battle Couple</span></a><span data-dcnode-id="2215" instrument_node="">: The Prince and Elika are a variation.</span></li><li data-dcnode-id="2209"><span data-dcnode-id="2213" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeingGoodSucks" title="/pmwiki/pmwiki.php/Main/BeingGoodSucks"><span data-dcnode-id="2212" instrument_node="">Being Good Sucks</span></a><span data-dcnode-id="2210" instrument_node="">: The Prince's opinion of things.</span></li><li data-dcnode-id="2204"><span data-dcnode-id="2208" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BelligerentSexualTension" title="/pmwiki/pmwiki.php/Main/BelligerentSexualTension"><span data-dcnode-id="2207" instrument_node="">Belligerent Sexual Tension</span></a><span data-dcnode-id="2205" instrument_node="">: How the relationship between the Prince and Elika starts.</span></li><li data-dcnode-id="2190"><span data-dcnode-id="2203" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BenevolentArchitecture" title="/pmwiki/pmwiki.php/Main/BenevolentArchitecture"><span data-dcnode-id="2202" instrument_node="">Benevolent Architecture</span></a><span data-dcnode-id="2200" instrument_node="">: An uncanny amount of the scenery is implausibly handy for jumping/climbing/hanging/swinging/</span><a class="twikilink" data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeParkour" title="/pmwiki/pmwiki.php/Main/LeParkour"><span data-dcnode-id="2199" instrument_node="">free-running</span></a><span data-dcnode-id="2197" instrument_node=""> around on. Which is lucky, since there's a distinct imbalance in the ratios of really-high-places to staircases/ladders/jetpacks, smooth stable floors vs. </span><a class="twikilink" data-dcnode-id="2195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpikesOfDoom" title="/pmwiki/pmwiki.php/Main/SpikesOfDoom"><span data-dcnode-id="2196" instrument_node="">fatal</span></a><span data-dcnode-id="2194" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BottomlessPit" title="/pmwiki/pmwiki.php/Main/BottomlessPit"><span data-dcnode-id="2193" instrument_node="">drops</span></a><span data-dcnode-id="2191" instrument_node=""> etc.</span></li><li data-dcnode-id="2185"><span data-dcnode-id="2189" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BetterThanABareBulb" title="/pmwiki/pmwiki.php/Main/BetterThanABareBulb"><span data-dcnode-id="2188" instrument_node="">Better Than a Bare Bulb</span></a><span data-dcnode-id="2186" instrument_node="">: The Prince loves lampshading everything he sees.</span></li><li data-dcnode-id="2176"><span data-dcnode-id="2184" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigDamnHeroes" title="/pmwiki/pmwiki.php/Main/BigDamnHeroes"><span data-dcnode-id="2183" instrument_node="">Big Damn Heroes</span></a><span data-dcnode-id="2181" instrument_node="">: Mentioned.</span><div class="indent" data-dcnode-id="2177"><strong data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Prince:</span></strong><span data-dcnode-id="2178" instrument_node=""> You know how heroes are supposed to arrive in the nick of time? I think we missed our entrance...</span></div></li><li data-dcnode-id="2166"><span data-dcnode-id="2175" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigWhy" title="/pmwiki/pmwiki.php/Main/BigWhy"><span data-dcnode-id="2174" instrument_node="">Big "WHY?!"</span></a><span data-dcnode-id="2172" instrument_node="">: The last dialog of the main game is </span><span class="spoiler" data-dcnode-id="2167" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2171" instrument_node="">a resurrected Elika moaning to The Prince, "</span><a class="twikilink" data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArmorPiercingQuestion" title="/pmwiki/pmwiki.php/Main/ArmorPiercingQuestion"><span data-dcnode-id="2170" instrument_node="">...Why?</span></a><span data-dcnode-id="2168" instrument_node="">" as Ahriman is freed.</span></span></li><li data-dcnode-id="2143"><span data-dcnode-id="2165" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackAndGreyMorality" title="/pmwiki/pmwiki.php/Main/BlackAndGreyMorality"><span data-dcnode-id="2164" instrument_node="">Black-and-Grey Morality</span></a><span data-dcnode-id="2162" instrument_node="">: Ahriman is definitely evil, but his brother/counterpart, Ormazd, despite being the </span><a class="twikilink" data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LightIsNotGood" title="/pmwiki/pmwiki.php/Main/LightIsNotGood"><span data-dcnode-id="2161" instrument_node="">god of light</span></a><span data-dcnode-id="2159" instrument_node=""> is lacking in admirable qualities and at best is a </span><a class="twikilink" data-dcnode-id="2157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeglectfulPrecursors" title="/pmwiki/pmwiki.php/Main/NeglectfulPrecursors"><span data-dcnode-id="2158" instrument_node="">Neglectful Precursor</span></a><span data-dcnode-id="2156" instrument_node="">. This may be </span><a class="twikilink" data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustifiedTrope" title="/pmwiki/pmwiki.php/Main/JustifiedTrope"><span data-dcnode-id="2155" instrument_node="">justified</span></a><span data-dcnode-id="2153" instrument_node=""> in that being the god of light, and </span><a class="twikilink" data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealLife" title="/pmwiki/pmwiki.php/Main/RealLife"><span data-dcnode-id="2152" instrument_node="">IRL</span></a><span data-dcnode-id="2150" instrument_node=""> the equivalent of </span><em data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">God</span></em><span data-dcnode-id="2147" instrument_node=""> in Zoroastrianism, he isn't the kind of god that intervenes much in the world affairs... </span><a class="twikilink" data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChosenOne" title="/pmwiki/pmwiki.php/Main/ChosenOne"><span data-dcnode-id="2146" instrument_node="">Not personally anyway</span></a><span data-dcnode-id="2144" instrument_node="">.</span></li><li data-dcnode-id="2138"><span data-dcnode-id="2142" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BodyHorror" title="/pmwiki/pmwiki.php/Main/BodyHorror"><span data-dcnode-id="2141" instrument_node="">Body Horror</span></a><span data-dcnode-id="2139" instrument_node="">: What the Corruption does to its victims.</span></li><li data-dcnode-id="2133"><span data-dcnode-id="2137" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BookEnds" title="/pmwiki/pmwiki.php/Main/BookEnds"><span data-dcnode-id="2136" instrument_node="">Bookends</span></a><span data-dcnode-id="2134" instrument_node="">: The opening and closing scenes. "What is one grain of sand in the desert? One grain amongst the storm?"</span></li><li data-dcnode-id="2128"><span data-dcnode-id="2132" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BottomlessPitRescueService" title="/pmwiki/pmwiki.php/Main/BottomlessPitRescueService"><span data-dcnode-id="2131" instrument_node="">Bottomless Pit Rescue Service</span></a><span data-dcnode-id="2129" instrument_node="">: Elika is happy to help.</span></li><li data-dcnode-id="2120"><span data-dcnode-id="2127" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokeYourArmPunchingOutCthulhu" title="/pmwiki/pmwiki.php/Main/BrokeYourArmPunchingOutCthulhu"><span data-dcnode-id="2126" instrument_node="">Broke Your Arm Punching Out Cthulhu</span></a><span data-dcnode-id="2124" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2122" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2123" instrument_node="">Elika dies to seal away Ahriman. Then immediately subverted by the Prince who breaks the seal of Ahriman's prison in order to revive Elika again</span></span><span data-dcnode-id="2121" instrument_node="">.</span></li><li data-dcnode-id="2112"><span data-dcnode-id="2119" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CelShading" title="/pmwiki/pmwiki.php/Main/CelShading"><span data-dcnode-id="2118" instrument_node="">Cel Shading</span></a><span data-dcnode-id="2116" instrument_node="">: Taken to an extreme, combined with wide, sweeping vistas for maximum </span><a class="twikilink" data-dcnode-id="2114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SceneryPorn" title="/pmwiki/pmwiki.php/Main/SceneryPorn"><span data-dcnode-id="2115" instrument_node="">Scenery Porn</span></a><span data-dcnode-id="2113" instrument_node="">.</span></li><li data-dcnode-id="2107"><span data-dcnode-id="2111" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterDevelopment" title="/pmwiki/pmwiki.php/Main/CharacterDevelopment"><span data-dcnode-id="2110" instrument_node="">Character Development</span></a><span data-dcnode-id="2108" instrument_node="">: The left trigger/L2 is a dialogue button for the "Prince" to talk to Elika, which may dole out a hint, more about the backstory of the land or characters, or simply Han-and-Leia-esque playful banter.</span></li><li data-dcnode-id="2099"><span data-dcnode-id="2106" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharlesAtlasSuperpower" title="/pmwiki/pmwiki.php/Main/CharlesAtlasSuperpower"><span data-dcnode-id="2105" instrument_node="">Charles Atlas Superpower</span></a><span data-dcnode-id="2103" instrument_node="">: All the incarnations of the Prince are inhumanly agile. The Prince in this game might take the cake, however. The boss fights make it clear that he is more than strong enough to block and parry the blows of a massive stone behemoth, that he's physically stronger than the rest of the Corrupted (who are larger than him and empowered with darkness), and that </span><a class="twikilink" data-dcnode-id="2101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArsonMurderAndJaywalking" title="/pmwiki/pmwiki.php/Main/ArsonMurderAndJaywalking"><span data-dcnode-id="2102" instrument_node="">his head is harder than the Mourning King's helmet</span></a><span data-dcnode-id="2100" instrument_node="">. He can generally throw the Corrupted in the air one-handed, as well.</span></li><li data-dcnode-id="2081"><span data-dcnode-id="2098" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClothingDamage" title="/pmwiki/pmwiki.php/Main/ClothingDamage"><span data-dcnode-id="2097" instrument_node="">Clothing Damage</span></a><span data-dcnode-id="2095" instrument_node="">: Elika's lacy blouse gets slightly more torn each time the plot advances, and it's subtle enough that the player may not even notice. This is also a </span><a class="twikilink" data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FanService" title="/pmwiki/pmwiki.php/Main/FanService"><span data-dcnode-id="2094" instrument_node="">Fanservice</span></a><span data-dcnode-id="2092" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="2091" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="2089" instrument_node="">, because a player who remembers the Prince's </span><a class="twikilink" data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShirtlessScene" title="/pmwiki/pmwiki.php/Main/ShirtlessScene"><span data-dcnode-id="2088" instrument_node="">Shirtless Scene</span></a><span data-dcnode-id="2086" instrument_node=""> from </span><em data-dcnode-id="2083"><a class="twikilink" data-dcnode-id="2084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/PrinceOfPersiaTheSandsOfTime" title="/pmwiki/pmwiki.php/VideoGame/PrinceOfPersiaTheSandsOfTime"><span data-dcnode-id="2085" instrument_node="">Sands of Time</span></a></em><span data-dcnode-id="2082" instrument_node=""> may expect Elika to repeat it. (She doesn't.)</span></li><li data-dcnode-id="2073"><span data-dcnode-id="2080" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityReboot" title="/pmwiki/pmwiki.php/Main/ContinuityReboot"><span data-dcnode-id="2079" instrument_node="">Continuity Reboot</span></a><span data-dcnode-id="2077" instrument_node="">: This game is unconnected to the </span><em data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Sands of Time</span></em><span data-dcnode-id="2074" instrument_node=""> trilogy. Pity it was abandoned in order to return to that series.</span></li><li data-dcnode-id="2068"><span data-dcnode-id="2072" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CounterAttack" title="/pmwiki/pmwiki.php/Main/CounterAttack"><span data-dcnode-id="2071" instrument_node="">Counter-Attack</span></a><span data-dcnode-id="2069" instrument_node="">: In combat, the Prince is able to counter most enemy attacks and deal them a devastating blow.</span></li><li data-dcnode-id="2063"><span data-dcnode-id="2067" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCorruption" title="/pmwiki/pmwiki.php/Main/TheCorruption"><span data-dcnode-id="2066" instrument_node="">The Corruption</span></a><span data-dcnode-id="2064" instrument_node="">: Ahriman's influence.</span></li><li data-dcnode-id="2054"><span data-dcnode-id="2062" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CutscenePowerToTheMax" title="/pmwiki/pmwiki.php/Main/CutscenePowerToTheMax"><span data-dcnode-id="2061" instrument_node="">Cutscene Power to the Max</span></a><span data-dcnode-id="2059" instrument_node="">: The Prince is able to grab hold of specific ledges and bars to move around the area. In certain cutscenes, though, he is shown to be capable of much more elaborate manuevers. This style was actually moved into </span><em data-dcnode-id="2056"><a class="twikilink" data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/AssassinsCreed" title="/pmwiki/pmwiki.php/Franchise/AssassinsCreed"><span data-dcnode-id="2058" instrument_node="">Assassin's Creed</span></a></em><span data-dcnode-id="2055" instrument_node=""> made by the same people, where you can literally grab onto almost anything.</span></li><li data-dcnode-id="2049"><span data-dcnode-id="2053" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CutShort" title="/pmwiki/pmwiki.php/Main/CutShort"><span data-dcnode-id="2052" instrument_node="">Cut Short</span></a><span data-dcnode-id="2050" instrument_node="">: The reboot had only two games and epilogue DLC, resolving nothing.</span></li><li data-dcnode-id="2044"><span data-dcnode-id="2048" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrashIntoHello" title="/pmwiki/pmwiki.php/Main/CrashIntoHello"><span data-dcnode-id="2047" instrument_node="">Crash-Into Hello</span></a><span data-dcnode-id="2045" instrument_node="">: Elika and the Prince.</span></li><li data-dcnode-id="2026"><span data-dcnode-id="2043" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadpanSnarker" title="/pmwiki/pmwiki.php/Main/DeadpanSnarker"><span data-dcnode-id="2042" instrument_node="">Deadpan Snarker</span></a><span data-dcnode-id="2040" instrument_node="">:</span><ul data-dcnode-id="2027"><li data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node=""> The Prince is constantly snarking in the cutscenes, and once you exhaust the optional conversations with Elika, the dialogue button basically becomes a snark button.</span></li><li data-dcnode-id="2028"><span data-dcnode-id="2037" instrument_node=""> Even Elika snarks from time to time.</span><div class="indent" data-dcnode-id="2029"><strong data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Prince:</span></strong><span data-dcnode-id="2034" instrument_node=""> That's a nice blouse. </span><br data-dcnode-id="2033"><strong data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Elika:</span></strong><span data-dcnode-id="2030" instrument_node=""> I think I have a spare if you'd like it.</span></div></li></ul></li><li data-dcnode-id="2018"><span data-dcnode-id="2025" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathCourse" title="/pmwiki/pmwiki.php/Main/DeathCourse"><span data-dcnode-id="2024" instrument_node="">Death Course</span></a><span data-dcnode-id="2022" instrument_node="">: </span><em data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Lots</span></em><span data-dcnode-id="2019" instrument_node="">.</span></li><li data-dcnode-id="2010"><span data-dcnode-id="2017" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Deuteragonist" title="/pmwiki/pmwiki.php/Main/Deuteragonist"><span data-dcnode-id="2016" instrument_node="">Deuteragonist</span></a><span data-dcnode-id="2014" instrument_node="">: The Prince and Elika take turns swapping between that and being the protagonist. A lot of the time, the story is about Elika and her thoughts on the whole situation, but the focus sometimes shifts to the Prince and how </span><a class="twikilink" data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterDevelopment" title="/pmwiki/pmwiki.php/Main/CharacterDevelopment"><span data-dcnode-id="2013" instrument_node="">his relationship with Elika is changing him</span></a><span data-dcnode-id="2011" instrument_node="">.</span></li><li data-dcnode-id="1998"><span data-dcnode-id="2009" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DevelopersForesight" title="/pmwiki/pmwiki.php/Main/DevelopersForesight"><span data-dcnode-id="2008" instrument_node="">Developers' Foresight</span></a><span data-dcnode-id="2006" instrument_node="">:</span><ul data-dcnode-id="1999"><li data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node=""> The Prince and Elika have special animations if Elika lands on the Prince.</span></li><li data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node=""> There are unique conversation options available for the Prince and Elika during pretty much every single section of the game, even before Ahriman is released, and many of them pertain specifically to the events happening right then. For example, if you try to talk to Elika while climbing a collapsing tower, she'll yell at you to keep going instead of standing around.</span></li><li data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node=""> Although the sword and gauntlet have no purpose when the Prince is standing on a flat surface, pressing the attack button will make the Prince wiggle the sword a little, while pressing the gauntlet button will make the Prince adjust his gauntlet so it's more snug.</span></li></ul></li><li data-dcnode-id="1993"><span data-dcnode-id="1997" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DialogDuringGameplay" title="/pmwiki/pmwiki.php/Main/DialogDuringGameplay"><span data-dcnode-id="1996" instrument_node="">Dialog During Gameplay</span></a><span data-dcnode-id="1994" instrument_node="">: There's even a button for it.</span></li><li data-dcnode-id="1985"><span data-dcnode-id="1992" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoesNotLikeShoes" title="/pmwiki/pmwiki.php/Main/DoesNotLikeShoes"><span data-dcnode-id="1991" instrument_node="">Does Not Like Shoes</span></a><span data-dcnode-id="1989" instrument_node="">: Elika displays her </span><a class="twikilink" data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActionGirl" title="/pmwiki/pmwiki.php/Main/ActionGirl"><span data-dcnode-id="1988" instrument_node="">action girl</span></a><span data-dcnode-id="1986" instrument_node=""> badassery by traversing rough terrain completely barefoot.</span></li><li data-dcnode-id="1945"><span data-dcnode-id="1984" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerEnding" title="/pmwiki/pmwiki.php/Main/DownerEnding"><span data-dcnode-id="1983" instrument_node="">Downer Ending</span></a><span data-dcnode-id="1981" instrument_node="">:</span><ul data-dcnode-id="1946"><li data-dcnode-id="1955"><span data-dcnode-id="1980" instrument_node=""> The Prince releases </span><span class="spoiler" data-dcnode-id="1978" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1979" instrument_node="">Ahriman</span></span><span data-dcnode-id="1977" instrument_node=""> in order to revive Elika. The Prince calmly walks away as </span><span class="spoiler" data-dcnode-id="1975" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1976" instrument_node="">Ahriman's darkness engulfs the land.</span></span><span data-dcnode-id="1974" instrument_node=""> </span><em data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Somewhat</span></em><span data-dcnode-id="1971" instrument_node=""> subverted in the </span><a class="twikilink" data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DLC" title="/pmwiki/pmwiki.php/Main/DLC"><span data-dcnode-id="1970" instrument_node="">Epilogue</span></a><span data-dcnode-id="1968" instrument_node="">, where it's revealed that the Prince revived Elika because her power is the only thing that can defeat </span><span class="spoiler" data-dcnode-id="1966" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1967" instrument_node="">Ahriman</span></span><span data-dcnode-id="1965" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KilledOffForReal" title="/pmwiki/pmwiki.php/Main/KilledOffForReal"><span data-dcnode-id="1964" instrument_node="">for good</span></a><span data-dcnode-id="1962" instrument_node="">; if she'd stayed dead, it would have just been a waiting game until </span><span class="spoiler" data-dcnode-id="1960" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1961" instrument_node="">Ahriman's</span></span><span data-dcnode-id="1959" instrument_node=""> seal broke and he took over the land without resistance. Then it's played straight again when Elika leaves the Prince high and dry to go look for her people, and it's implied that </span><span class="spoiler" data-dcnode-id="1957" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1958" instrument_node="">Ahriman</span></span><span data-dcnode-id="1956" instrument_node=""> attacks him shortly after.</span></li><li data-dcnode-id="1947"><span data-dcnode-id="1954" instrument_node=""> The DS game </span><em data-dcnode-id="1951"><a class="twikilink" data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/PrinceOfPersiaTheFallenKing" title="/pmwiki/pmwiki.php/VideoGame/PrinceOfPersiaTheFallenKing"><span data-dcnode-id="1953" instrument_node="">The Fallen King</span></a></em><span data-dcnode-id="1950" instrument_node="">, which could be considered a sequel to both the main 2008 game and Epilogue, at least </span><span class="spoiler" data-dcnode-id="1948" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1949" instrument_node="">leaves some hope for a happy ending. It has The Prince go after the king of the City of New Dawn in an attempt to summon Ormazd, and gains a temporary ally, Zal, the "good half" of the king, who ends up dying after killing his other half. The Prince's other new ally, the Ancestor, leaves a message of hope for the Prince, promising that, in time, an inner power would be revealed and new ally would be found.</span></span></li></ul></li><li data-dcnode-id="1940"><span data-dcnode-id="1944" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoubleJump" title="/pmwiki/pmwiki.php/Main/DoubleJump"><span data-dcnode-id="1943" instrument_node="">Double Jump</span></a><span data-dcnode-id="1941" instrument_node="">: Elika can use her magic to swing the Prince farther through the air, although he doesn't gain any additional height.</span></li><li data-dcnode-id="1932"><span data-dcnode-id="1939" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DramaticWind" title="/pmwiki/pmwiki.php/Main/DramaticWind"><span data-dcnode-id="1938" instrument_node="">Dramatic Wind</span></a><span data-dcnode-id="1936" instrument_node="">: There's always </span><em data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">some</span></em><span data-dcnode-id="1933" instrument_node=""> wind blowing in the land of the Ahura.</span></li><li data-dcnode-id="1864"><span data-dcnode-id="1931" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDulcineaEffect" title="/pmwiki/pmwiki.php/Main/TheDulcineaEffect"><span data-dcnode-id="1930" instrument_node="">The Dulcinea Effect</span></a><span data-dcnode-id="1928" instrument_node="">: Discussed and subverted. </span><span class="spoiler" data-dcnode-id="1921" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1927" instrument_node="">At the end, the Prince resurrects Elika partially because it's the only way to defeat Ahriman for good, but also partially because he's fallen for her. But to be fair, he </span><em data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">did</span></em><span data-dcnode-id="1924" instrument_node=""> just spend a good chunk of time fighting the forces of world-ending darkness with her, </span><a class="twikilink" data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FireForgedFriends" title="/pmwiki/pmwiki.php/Main/FireForgedFriends"><span data-dcnode-id="1923" instrument_node="">which tends to bring people together</span></a></span><span data-dcnode-id="1920" instrument_node="">.</span><div class="indent" data-dcnode-id="1907"><strong data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Elika:</span></strong><span data-dcnode-id="1917" instrument_node=""> Why are you doing this? </span><a class="twikilink" data-dcnode-id="1915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDulcineaEffect" title="/pmwiki/pmwiki.php/Main/TheDulcineaEffect"><span data-dcnode-id="1916" instrument_node="">You're not doing this for me, are you</span></a><span data-dcnode-id="1914" instrument_node="">? </span><a class="twikilink" data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MaleGaze" title="/pmwiki/pmwiki.php/Main/MaleGaze"><span data-dcnode-id="1913" instrument_node="">I've seen you looking at me</span></a><span data-dcnode-id="1911" instrument_node="">. </span><a class="twikilink" data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllMenArePerverts" title="/pmwiki/pmwiki.php/Main/AllMenArePerverts"><span data-dcnode-id="1910" instrument_node="">I recognize that look</span></a><span data-dcnode-id="1908" instrument_node="">.</span></div><div class="indent" data-dcnode-id="1903"><strong data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Prince:</span></strong><span data-dcnode-id="1904" instrument_node=""> Hey, you're cute, but not 'stay to fight a dark god' cute.</span></div><div class="indent" data-dcnode-id="1896"><strong data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Elika:</span></strong><span data-dcnode-id="1900" instrument_node=""> Would you have helped my father if </span><em data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">he</span></em><span data-dcnode-id="1897" instrument_node=""> had asked you?</span></div><div class="indent" data-dcnode-id="1872"><strong data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Prince:</span></strong><span data-dcnode-id="1893" instrument_node=""> He's not that cute, either. </span><br data-dcnode-id="1892"><span data-dcnode-id="1891" instrument_node="">... </span><br data-dcnode-id="1890"><strong data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Elika:</span></strong><span data-dcnode-id="1887" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="1886" instrument_node="">I have experience with men doing stupid things for women</span></a><span data-dcnode-id="1884" instrument_node="">.</span><span class="notelabel" data-dcnode-id="1881" onclick="togglenote('note1qgtd');" style="cursor: pointer;"><sup data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1873" id="note1qgtd" isnote="true" onclick="togglenote('note1qgtd');" style="display: none; cursor: pointer;"><img class="ymmv1 rounded" data-dcnode-id="1880" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HarsherInHindsight" title="/pmwiki/pmwiki.php/Main/HarsherInHindsight"><span data-dcnode-id="1879" instrument_node="">Harsher in Hindsight</span></a><span data-dcnode-id="1877" instrument_node=""> when you realize she's talking about </span><em data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">her father</span></em><span data-dcnode-id="1874" instrument_node="">.</span></span></div><div class="indent" data-dcnode-id="1865"><strong data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Prince:</span></strong><span data-dcnode-id="1869" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SelfishGood" title="/pmwiki/pmwiki.php/Main/SelfishGood"><span data-dcnode-id="1868" instrument_node="">Well, I only ever do stupid things for myself</span></a><span data-dcnode-id="1866" instrument_node="">.</span></div></li><li data-dcnode-id="1859"><span data-dcnode-id="1863" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EscortMission" title="/pmwiki/pmwiki.php/Main/EscortMission"><span data-dcnode-id="1862" instrument_node="">Escort Mission</span></a><span data-dcnode-id="1860" instrument_node="">: The developers went out of their way to avoid this feel with Elika, with an explicit intent of changing the way player's look at AI-controlled allies. They succeeded. In a lot of ways, the escortee actually helps the escorter, so it's a mutual benefit.</span></li><li data-dcnode-id="1846"><span data-dcnode-id="1858" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilTowerOfOminousness" title="/pmwiki/pmwiki.php/Main/EvilTowerOfOminousness"><span data-dcnode-id="1857" instrument_node="">Evil Tower of Ominousness</span></a><span data-dcnode-id="1855" instrument_node="">: There are plenty of towers in the game, but only a few qualify for this.</span><ul data-dcnode-id="1847"><li data-dcnode-id="1850"><span data-dcnode-id="1854" instrument_node=""> The Martyrs' Tower, which the Prince speculates is from the </span><a class="twikilink" data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="1853" instrument_node="">'ominous and forbidding' school of architecture</span></a><span data-dcnode-id="1851" instrument_node="">, is where the Hunter strung up the corpses of those he caught.</span></li><li data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node=""> The Alchemist's lair is a hodgepodge affair held up by balloons with an observatory located at the very top.</span></li></ul></li><li data-dcnode-id="1826"><span data-dcnode-id="1845" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FailureIsTheOnlyOption" title="/pmwiki/pmwiki.php/Main/FailureIsTheOnlyOption"><span data-dcnode-id="1844" instrument_node="">Failure Is the Only Option</span></a><span data-dcnode-id="1842" instrument_node="">:</span><ul data-dcnode-id="1827"><li data-dcnode-id="1835"><span data-dcnode-id="1841" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1836" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1840" instrument_node="">The Concubine's final illusion, in her sixth and final encounter, is to create many illusory duplicates of Elika. You can attack these illusions — which you'd have done throughout the Concubine's path with other illusions — but </span><em data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">all</span></em><span data-dcnode-id="1837" instrument_node=""> of them will seem to be false with no true Elika present. The way to solve it is to jump off the tower and let the real Elika save you — something that ordinarily only happens if you mess up.</span></span></li><li data-dcnode-id="1828"><span data-dcnode-id="1834" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1830" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1833" instrument_node="">If you want to actually finish the game, you have to release Ahriman despite having spent the past god-knows-how-many hours </span><em data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">sealing him away</span></em></span><span data-dcnode-id="1829" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1818"><span data-dcnode-id="1825" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FallenHero" title="/pmwiki/pmwiki.php/Main/FallenHero"><span data-dcnode-id="1824" instrument_node="">Fallen Hero</span></a><span data-dcnode-id="1822" instrument_node="">: The Warrior, who accepted Ahriman's offer of power so he could protect his people. Also, </span><span class="spoiler" data-dcnode-id="1820" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1821" instrument_node="">the Prince at the end</span></span><span data-dcnode-id="1819" instrument_node="">.</span></li><li data-dcnode-id="1810"><span data-dcnode-id="1817" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FallInAngel" title="/pmwiki/pmwiki.php/Main/FallInAngel"><span data-dcnode-id="1816" instrument_node="">Fall-in Angel</span></a><span data-dcnode-id="1814" instrument_node="">: this is how Prince meets Elika. Doubles as an </span><a class="twikilink" data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EstablishingCharacterMoment" title="/pmwiki/pmwiki.php/Main/EstablishingCharacterMoment"><span data-dcnode-id="1813" instrument_node="">Establishing Character Moment</span></a><span data-dcnode-id="1811" instrument_node="">, as Prince's first response to a strange woman falling on him is to smile and say "Hi".</span></li><li data-dcnode-id="1800"><span data-dcnode-id="1809" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FashionableAsymmetry" title="/pmwiki/pmwiki.php/Main/FashionableAsymmetry"><span data-dcnode-id="1808" instrument_node="">Fashionable Asymmetry</span></a><span data-dcnode-id="1806" instrument_node="">:</span><ul data-dcnode-id="1801"><li data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node=""> The Prince has an armored gauntlet on one hand, and two different-colored scarves are wrapped differently around his head.</span></li><li data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node=""> Elika's shirt is missing a sleeve. She also wears a bracelet on one wrist and an anklet on the opposite leg.</span></li></ul></li><li data-dcnode-id="1787"><span data-dcnode-id="1799" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FireForgedFriends" title="/pmwiki/pmwiki.php/Main/FireForgedFriends"><span data-dcnode-id="1798" instrument_node="">Fire-Forged Friends</span></a><span data-dcnode-id="1796" instrument_node="">: The Prince and Elika. </span><span class="spoiler" data-dcnode-id="1788" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1795" instrument_node="">Ruined when the Prince re-unleashes Ahriman. Elika </span><em data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">never</span></em><span data-dcnode-id="1792" instrument_node=""> forgives him for that, even when he's revealed to have had a </span><em data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">very good reason</span></em><span data-dcnode-id="1789" instrument_node=""> for doing it.</span></span></li><li data-dcnode-id="1780"><span data-dcnode-id="1786" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FlawExploitation" title="/pmwiki/pmwiki.php/Main/FlawExploitation"><span data-dcnode-id="1785" instrument_node="">Flaw Exploitation</span></a><span data-dcnode-id="1783" instrument_node="">: Whenever the Prince and Elika fight the Warrior, she tries to appeal to the Warrior's honor to get him to reject Ahriman, often against the Prince's wishes. </span><span class="spoiler" data-dcnode-id="1781" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1782" instrument_node="">The Warrior finally accepts her offers in his dying moments.</span></span></li><li data-dcnode-id="1724"><span data-dcnode-id="1779" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Foreshadowing" title="/pmwiki/pmwiki.php/Main/Foreshadowing"><span data-dcnode-id="1778" instrument_node="">Foreshadowing</span></a><span data-dcnode-id="1776" instrument_node="">:</span><ul data-dcnode-id="1725"><li data-dcnode-id="1762"><span data-dcnode-id="1775" instrument_node=""> The Prince refers to both the war his parents died in and his fight against Ahriman as "someone else's war", in addition to expressing doubt that someone could fight for something other than themselves. </span><span class="spoiler" data-dcnode-id="1770" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1774" instrument_node="">When Elika </span><a class="twikilink" data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="1773" instrument_node="">gives up her life</span></a><span data-dcnode-id="1771" instrument_node=""> to re-seal Ahriman, the Prince releases Ahriman again to resurrect her</span></span><span data-dcnode-id="1769" instrument_node="">. There are also several hints to </span><span class="spoiler" data-dcnode-id="1767" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1768" instrument_node="">Elika's earlier death</span></span><span data-dcnode-id="1766" instrument_node="">, which is in itself </span><em data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">more</span></em><span data-dcnode-id="1763" instrument_node=""> foreshadowing the above spoiler.</span></li><li data-dcnode-id="1738"><span data-dcnode-id="1761" instrument_node=""> Also this conversation, which hints a lot at </span><span class="spoiler" data-dcnode-id="1759" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1760" instrument_node="">what happens in the ending</span></span><span data-dcnode-id="1758" instrument_node="">:</span><div class="indent" data-dcnode-id="1739"><strong data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Elika:</span></strong><span data-dcnode-id="1755" instrument_node=""> Trusting your own judgement can get lonely. </span><br data-dcnode-id="1754"><strong data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Prince:</span></strong><span data-dcnode-id="1751" instrument_node=""> You rely on someone else, they'll just let you down. </span><br data-dcnode-id="1750"><strong data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Elika:</span></strong><span data-dcnode-id="1747" instrument_node=""> You haven't let </span><em data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">me</span></em><span data-dcnode-id="1744" instrument_node=""> down. </span><br data-dcnode-id="1743"><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Prince:</span></strong><span data-dcnode-id="1740" instrument_node=""> You haven't known me long enough.</span></div></li><li data-dcnode-id="1731"><span data-dcnode-id="1737" instrument_node=""> Sharp listeners would have realized </span><span class="spoiler" data-dcnode-id="1732" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1736" instrument_node=""> Elika was going to perform a </span><a class="twikilink" data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="1735" instrument_node="">Heroic Sacrifice</span></a><span data-dcnode-id="1733" instrument_node="">.</span></span></li><li data-dcnode-id="1726"><span data-dcnode-id="1730" instrument_node=""> The Prince also states flatly he doesn't believe in fate, and that no one is destined for anything, including </span><a class="twikilink" data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="1729" instrument_node="">Heroic Sacrifices</span></a><span data-dcnode-id="1727" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1719"><span data-dcnode-id="1723" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForScience" title="/pmwiki/pmwiki.php/Main/ForScience"><span data-dcnode-id="1722" instrument_node="">For Science!</span></a><span data-dcnode-id="1720" instrument_node="">: Stated word-for-word to be The Alchemist's reason for turning to Ahriman.</span></li><li data-dcnode-id="1712"><span data-dcnode-id="1718" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStoryIntegration" title="/pmwiki/pmwiki.php/Main/GameplayAndStoryIntegration"><span data-dcnode-id="1717" instrument_node="">Gameplay and Story Integration</span></a><span data-dcnode-id="1715" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1713" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1714" instrument_node="">At one point, the Concubine creates a dozen Elikas, daring you to figure out which one is the real deal. The answer is to leap off the side of the structure, revealing the real Elika because she saves you as usual.</span></span></li></ul><ul data-dcnode-id="1346"><li data-dcnode-id="1705"><span data-dcnode-id="1709" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGhost" title="/pmwiki/pmwiki.php/Main/TheGhost"><span data-dcnode-id="1708" instrument_node="">The Ghost</span></a><span data-dcnode-id="1706" instrument_node="">: Ormazd never appears in the game, and we only learn about him second-hand through Elika.</span></li><li data-dcnode-id="1696"><span data-dcnode-id="1704" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GraveRobbing" title="/pmwiki/pmwiki.php/Main/GraveRobbing"><span data-dcnode-id="1703" instrument_node="">Grave Robbing</span></a><span data-dcnode-id="1701" instrument_node="">: The Prince admits to this. Shamelessly. Hey, it's not like they need it anymore, right?</span><div class="indent" data-dcnode-id="1697"><strong data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">The Prince:</span></strong><span data-dcnode-id="1698" instrument_node=""> I reclaim abandoned property!</span></div></li><li data-dcnode-id="1673"><span data-dcnode-id="1695" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuideDangIt" title="/pmwiki/pmwiki.php/Main/GuideDangIt"><span data-dcnode-id="1694" instrument_node="">Guide Dang It!</span></a><span data-dcnode-id="1692" instrument_node="">: Plenty.</span><ul data-dcnode-id="1674"><li data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node=""> Finding all the Light Seeds, for one.</span></li><li data-dcnode-id="1682"><span data-dcnode-id="1689" instrument_node=""> If you want the "Precious Time" achievement, you have to hold </span><em data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">completely still</span></em><span data-dcnode-id="1686" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1684" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1685" instrument_node="">after Elika dies</span></span><span data-dcnode-id="1683" instrument_node="">. Do not touch any buttons, not even ones that don't make the Prince move. Hell, set down the controller, just to be safe.</span></li><li data-dcnode-id="1677"><span data-dcnode-id="1681" instrument_node=""> After you seal the evil back into the can, you get to walk around while credits roll, trigger a cutscene, and then find yourself trapped in a relatively small area of the game and expected to somehow figure out what you're supposed to do next - </span><span class="spoiler" data-dcnode-id="1679" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1680" instrument_node="">let the sealed evil out of the can you've just spent the entire game going to great lengths to seal him back into</span></span><span data-dcnode-id="1678" instrument_node=""> - with only a cryptic camera shot that could be showing off the restored landscape, and a flashback sequence explaining one of the game's unanswered questions as hints...</span></li><li data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node=""> A fourth is the game never explaining that you can press the jump button while on vines to have the Prince speed up his climbing. This makes going over them much less arduous, as vines often slow the normally quick traversal down to a literal crawl without this move.</span></li></ul></li><li data-dcnode-id="1668"><span data-dcnode-id="1672" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeadsUpDisplay" title="/pmwiki/pmwiki.php/Main/HeadsUpDisplay"><span data-dcnode-id="1671" instrument_node="">Heads-Up Display</span></a><span data-dcnode-id="1669" instrument_node="">: Surprisingly averted. Aside from a counter of light seeds that pops up and disappears, there is no permanent HUD whatsoever. Health bars aren't needed because the Prince doesn't literally die anyway, thanks to Elika.</span></li><li data-dcnode-id="1663"><span data-dcnode-id="1667" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HereWeGoAgain" title="/pmwiki/pmwiki.php/Main/HereWeGoAgain"><span data-dcnode-id="1666" instrument_node="">Here We Go Again!</span></a><span data-dcnode-id="1664" instrument_node="">: A fairly somber example, invoked by the Prince.</span></li><li data-dcnode-id="1656"><span data-dcnode-id="1662" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="1661" instrument_node="">Heroic Sacrifice</span></a><span data-dcnode-id="1659" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1657" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1658" instrument_node="">Elika dies at the end in order to reseal Ahriman. The Prince promptly releases Ahriman to free her. She's not happy about it.</span></span></li><li data-dcnode-id="1651"><span data-dcnode-id="1655" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HuntingTheMostDangerousGame" title="/pmwiki/pmwiki.php/Main/HuntingTheMostDangerousGame"><span data-dcnode-id="1654" instrument_node="">Hunting the Most Dangerous Game</span></a><span data-dcnode-id="1652" instrument_node="">: The Hunter's reason for selling his soul.</span></li><li data-dcnode-id="1644"><span data-dcnode-id="1650" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImpostorExposingTest" title="/pmwiki/pmwiki.php/Main/ImpostorExposingTest"><span data-dcnode-id="1649" instrument_node="">Impostor Exposing Test</span></a><span data-dcnode-id="1647" instrument_node="">: The Concubine conjures up a whole helluva lot of fake Elikas and the player has to figure out which is the real one. The solution is to </span><span class="spoiler" data-dcnode-id="1645" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1646" instrument_node=""> jump off a ledge; the real Elika will save the Prince like usual.</span></span></li><li data-dcnode-id="1636"><span data-dcnode-id="1643" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InsistentTerminology" title="/pmwiki/pmwiki.php/Main/InsistentTerminology"><span data-dcnode-id="1642" instrument_node="">Insistent Terminology</span></a><span data-dcnode-id="1640" instrument_node="">: You'll quickly lose track of how many times the Prince or Elika mention Fertile Ground and the slightly odd emphasis of the word </span><em data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">fertile</span></em><span data-dcnode-id="1637" instrument_node=""> will stay with you.</span></li><li data-dcnode-id="1625"><span data-dcnode-id="1635" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterfaceScrew" title="/pmwiki/pmwiki.php/Main/InterfaceScrew"><span data-dcnode-id="1634" instrument_node="">Interface Screw</span></a><span data-dcnode-id="1632" instrument_node="">: The Hunter likes to spit gobs of corruption, which obscure the centre of the screen. When </span><span class="spoiler" data-dcnode-id="1630" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1631" instrument_node="">the Prince is infected with Corruption by the Alchemist</span></span><span data-dcnode-id="1629" instrument_node="">, the screen has a sickly green and black border. The same effect happens in </span><a class="twikilink" data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PaletteSwap" title="/pmwiki/pmwiki.php/Main/PaletteSwap"><span data-dcnode-id="1628" instrument_node="">red and black</span></a><span data-dcnode-id="1626" instrument_node=""> if the Prince is injured during a fight.</span></li><li data-dcnode-id="1618"><span data-dcnode-id="1624" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JawsFirstPersonPerspective" title="/pmwiki/pmwiki.php/Main/JawsFirstPersonPerspective"><span data-dcnode-id="1623" instrument_node="">"Jaws" First-Person Perspective</span></a><span data-dcnode-id="1621" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1619" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1620" instrument_node="">The end boss is played entirely from Ahriman's perspective.</span></span></li><li data-dcnode-id="1613"><span data-dcnode-id="1617" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkWithAHeartOfGold" title="/pmwiki/pmwiki.php/Main/JerkWithAHeartOfGold"><span data-dcnode-id="1616" instrument_node="">Jerk with a Heart of Gold</span></a><span data-dcnode-id="1614" instrument_node="">: The Prince.</span></li><li data-dcnode-id="1600"><span data-dcnode-id="1612" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnightInSourArmor" title="/pmwiki/pmwiki.php/Main/KnightInSourArmor"><span data-dcnode-id="1611" instrument_node="">Knight in Sour Armor</span></a><span data-dcnode-id="1609" instrument_node="">:</span><ul data-dcnode-id="1601"><li data-dcnode-id="1607"><span data-dc
