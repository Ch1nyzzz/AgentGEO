node-id="1608" instrument_node=""> Elika is a rare female example.</span></li><li data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node=""> The Prince </span><a class="twikilink" data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterDevelopment" title="/pmwiki/pmwiki.php/Main/CharacterDevelopment"><span data-dcnode-id="1605" instrument_node="">becomes this</span></a><span data-dcnode-id="1603" instrument_node=""> as the game progresses.</span></li></ul></li><li data-dcnode-id="1583"><span data-dcnode-id="1599" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall" title="/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall"><span data-dcnode-id="1598" instrument_node="">Leaning on the Fourth Wall</span></a><span data-dcnode-id="1596" instrument_node="">: "</span><a class="twikilink" data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeParkour" title="/pmwiki/pmwiki.php/Main/LeParkour"><span data-dcnode-id="1595" instrument_node="">Run</span></a><span data-dcnode-id="1593" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeapOfFaith" title="/pmwiki/pmwiki.php/Main/LeapOfFaith"><span data-dcnode-id="1592" instrument_node="">jump</span></a><span data-dcnode-id="1590" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YetAnotherStupidDeath" title="/pmwiki/pmwiki.php/Main/YetAnotherStupidDeath"><span data-dcnode-id="1589" instrument_node="">die</span></a><span data-dcnode-id="1587" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathIsASlapOnTheWrist" title="/pmwiki/pmwiki.php/Main/DeathIsASlapOnTheWrist"><span data-dcnode-id="1586" instrument_node="">repeat</span></a><span data-dcnode-id="1584" instrument_node="">. Run, jump, die, repeat. I'm starting to get the hang of this."</span></li><li data-dcnode-id="1576"><span data-dcnode-id="1582" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeapOfFaith" title="/pmwiki/pmwiki.php/Main/LeapOfFaith"><span data-dcnode-id="1581" instrument_node="">Leap of Faith</span></a><span data-dcnode-id="1579" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1577" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1578" instrument_node="">The Prince must leap off a tower to defeat the Concubine's illusory Elikas by making the real one save him.</span></span></li><li data-dcnode-id="1569"><span data-dcnode-id="1575" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeftHanging" title="/pmwiki/pmwiki.php/Main/LeftHanging"><span data-dcnode-id="1574" instrument_node="">Left Hanging</span></a><span data-dcnode-id="1572" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1570" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1571" instrument_node="">The ending, and frustratingly, the Epilogue as well.</span></span></li><li data-dcnode-id="1547"><span data-dcnode-id="1568" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeParkour" title="/pmwiki/pmwiki.php/Main/LeParkour"><span data-dcnode-id="1567" instrument_node="">Le Parkour</span></a><span data-dcnode-id="1565" instrument_node="">: Probably the defining game of the genre. Taken to ridiculous extremes in this game, almost outing the Prince as a relative of </span><a class="twikilink" data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/SpiderMan" title="/pmwiki/pmwiki.php/Franchise/SpiderMan"><span data-dcnode-id="1564" instrument_node="">Spider-Man</span></a><span data-dcnode-id="1562" instrument_node="">. The game even includes a </span><em data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">ceiling run</span></em><span data-dcnode-id="1559" instrument_node=""> move:</span><div class="indent" data-dcnode-id="1548"><strong data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Elika:</span></strong><span data-dcnode-id="1556" instrument_node=""> We have to cross over there! </span><br data-dcnode-id="1555"><strong data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Prince:</span></strong><span data-dcnode-id="1552" instrument_node=""> Sure, climb on the roof. </span><a class="twikilink" data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadpanSnarker" title="/pmwiki/pmwiki.php/Main/DeadpanSnarker"><span data-dcnode-id="1551" instrument_node="">It's not like gravity ever killed anyone</span></a><span data-dcnode-id="1549" instrument_node="">.</span></div></li><li data-dcnode-id="1542"><span data-dcnode-id="1546" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoadBearingBoss" title="/pmwiki/pmwiki.php/Main/LoadBearingBoss"><span data-dcnode-id="1545" instrument_node="">Load-Bearing Boss</span></a><span data-dcnode-id="1543" instrument_node="">: Each of the Corrupted has their own private lair, which collapses as you leave after defeating them.</span></li><li data-dcnode-id="1537"><span data-dcnode-id="1541" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LovableRogue" title="/pmwiki/pmwiki.php/Main/LovableRogue"><span data-dcnode-id="1540" instrument_node="">Lovable Rogue</span></a><span data-dcnode-id="1538" instrument_node="">: The Prince to a T.</span></li><li data-dcnode-id="1532"><span data-dcnode-id="1536" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MalevolentArchitecture" title="/pmwiki/pmwiki.php/Main/MalevolentArchitecture"><span data-dcnode-id="1535" instrument_node="">Malevolent Architecture</span></a><span data-dcnode-id="1533" instrument_node="">: The land was falling into decay even before Ahriman broke out, and the Corruption just made everything worse. Lampshaded by the Prince: "When you rebuild this place, find a better architect."</span></li><li data-dcnode-id="1527"><span data-dcnode-id="1531" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane" title="/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane"><span data-dcnode-id="1530" instrument_node="">Maybe Magic, Maybe Mundane</span></a><span data-dcnode-id="1528" instrument_node="">: The Prince chalks up his involvement in everything to (bad) luck, while Elika claims it was Ormazd's doing. Ultimately, the truth of the matter is left ambiguous.</span></li><li data-dcnode-id="1522"><span data-dcnode-id="1526" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Metroidvania" title="/pmwiki/pmwiki.php/Main/Metroidvania"><span data-dcnode-id="1525" instrument_node="">Metroidvania</span></a><span data-dcnode-id="1523" instrument_node="">: The game is a 3D version of this genre. Played with, as you choose which powerups you unlock.</span></li><li data-dcnode-id="1514"><span data-dcnode-id="1521" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MundaneMadeAwesome" title="/pmwiki/pmwiki.php/Main/MundaneMadeAwesome"><span data-dcnode-id="1520" instrument_node="">Mundane Made Awesome</span></a><span data-dcnode-id="1518" instrument_node="">: The Prince describes mountain ice with more than a little awe in his voice and borderline </span><a class="twikilink" data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PurpleProse" title="/pmwiki/pmwiki.php/Main/PurpleProse"><span data-dcnode-id="1517" instrument_node="">Purple Prose</span></a><span data-dcnode-id="1515" instrument_node="">. Given that he's from Persia, he probably barely sees ice.</span></li><li data-dcnode-id="1491"><span data-dcnode-id="1513" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="1512" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="1510" instrument_node="">:</span><ul data-dcnode-id="1492"><li data-dcnode-id="1499"><span data-dcnode-id="1509" instrument_node=""> The game opens with The Prince calling for Farah (the name of the </span><a class="twikilink" data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoveInterest" title="/pmwiki/pmwiki.php/Main/LoveInterest"><span data-dcnode-id="1508" instrument_node="">Love Interest</span></a><span data-dcnode-id="1506" instrument_node=""> from the </span><em data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Sands of Time</span></em><span data-dcnode-id="1503" instrument_node=""> trilogy). Later when asked if Farah is his girlfriend, he reveals it to be the name of </span><span class="spoiler" data-dcnode-id="1501" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1502" instrument_node="">his donkey</span></span><span data-dcnode-id="1500" instrument_node="">.</span></li><li data-dcnode-id="1493"><span data-dcnode-id="1498" instrument_node=""> In one of the featurette videos, producer Ben Mattes mentions that the Prince doesn't "</span><a class="urllink" data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.penny-arcade.com/comic/2004/12/03/"><span data-dcnode-id="1497" instrument_node="">smolder with generic rage</span><img data-dcnode-id="1496" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1494" instrument_node="">".</span></li></ul></li><li data-dcnode-id="1480"><span data-dcnode-id="1490" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero" title="/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero"><span data-dcnode-id="1489" instrument_node="">Nice Job Breaking It, Hero</span></a><span data-dcnode-id="1487" instrument_node="">: Invoked </span><span class="spoiler" data-dcnode-id="1485" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1486" instrument_node="">at the end. After sealing away Ahriman (at the cost of Elika's life), the Prince almost immediately undoes the same seal he worked his hands to the bone to put in place</span></span><span data-dcnode-id="1484" instrument_node="">. See </span><a class="twikilink" data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SadisticChoice" title="/pmwiki/pmwiki.php/Main/SadisticChoice"><span data-dcnode-id="1483" instrument_node="">Sadistic Choice</span></a><span data-dcnode-id="1481" instrument_node="">.</span></li><li data-dcnode-id="1467"><span data-dcnode-id="1479" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoEnding" title="/pmwiki/pmwiki.php/Main/NoEnding"><span data-dcnode-id="1478" instrument_node="">No Ending</span></a><span data-dcnode-id="1476" instrument_node="">: The Epilogue just </span><em data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">ends</span></em><span data-dcnode-id="1473" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1471" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1472" instrument_node=""> with Elika abandoning the Prince</span></span><span data-dcnode-id="1470" instrument_node="">. </span><a class="twikilink" data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CutShort" title="/pmwiki/pmwiki.php/Main/CutShort"><span data-dcnode-id="1469" instrument_node="">And there never be resolution, either.</span></a></li><li data-dcnode-id="1457"><span data-dcnode-id="1466" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoFlowInCGI" title="/pmwiki/pmwiki.php/Main/NoFlowInCGI"><span data-dcnode-id="1465" instrument_node="">No Flow in CGI</span></a><span data-dcnode-id="1463" instrument_node="">:</span><ul data-dcnode-id="1458"><li data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node=""> Averted. There's always a slight wind blowing, and everyone's clothes react to it, even in different ways. The Prince's long scarf and bearskin cape billow dramatically, while Elika's blouse only moves a little.</span></li><li data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node=""> Unfortunately played straight when it comes to hair, though. Particularly Elika's father with his long dreadlocks.</span></li></ul></li><li data-dcnode-id="1452"><span data-dcnode-id="1456" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NominalImportance" title="/pmwiki/pmwiki.php/Main/NominalImportance"><span data-dcnode-id="1455" instrument_node="">Nominal Importance</span></a><span data-dcnode-id="1453" instrument_node="">: Averted. Like in most games in the series, The Prince is never named. He's never even given a nickname. "The Prince" is just a placeholder based on the title. Especially notable in this game as he's the only character of any importance who doesn't have a name (Elika, Ormazd, Ahriman) or nickname (The Mourning King, the Hunter, the Concubine, the Warrior, the Alchemist).</span></li><li data-dcnode-id="1447"><span data-dcnode-id="1451" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoNameGiven" title="/pmwiki/pmwiki.php/Main/NoNameGiven"><span data-dcnode-id="1450" instrument_node="">No Name Given</span></a><span data-dcnode-id="1448" instrument_node="">: The Prince.</span></li><li data-dcnode-id="1442"><span data-dcnode-id="1446" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonPlayerCompanion" title="/pmwiki/pmwiki.php/Main/NonPlayerCompanion"><span data-dcnode-id="1445" instrument_node="">Non-Player Companion</span></a><span data-dcnode-id="1443" instrument_node="">: Elika, to the Prince.</span></li><li data-dcnode-id="1419"><span data-dcnode-id="1441" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotSoDifferentRemark" title="/pmwiki/pmwiki.php/Main/NotSoDifferentRemark"><span data-dcnode-id="1440" instrument_node="">"Not So Different" Remark</span></a><span data-dcnode-id="1438" instrument_node="">:</span><ul data-dcnode-id="1420"><li data-dcnode-id="1425"><span data-dcnode-id="1437" instrument_node=""> Ahriman pulls this to </span><span class="spoiler" data-dcnode-id="1435" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1436" instrument_node="">the Prince</span></span><span data-dcnode-id="1434" instrument_node=""> near the end.</span><div class="indent" data-dcnode-id="1426"><span data-dcnode-id="1433" instrument_node="">Jailer... </span><br data-dcnode-id="1432"><span data-dcnode-id="1431" instrument_node="">Torturer... </span><br data-dcnode-id="1430"><span data-dcnode-id="1429" instrument_node="">What injury have I done to you </span><br data-dcnode-id="1428"><span data-dcnode-id="1427" instrument_node="">That you have not done to me?</span></div></li><li data-dcnode-id="1421"><span data-dcnode-id="1424" instrument_node=""> The Concubine tries this card on Elika at one point.</span><div class="indent" data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node=""> "And you, Princess? I know the dreams you've dreamed. Your mind traveling distant lands, your body trapped in this decaying place. We are not so distant you and I, we share many desires..."</span></div></li></ul></li><li data-dcnode-id="1414"><span data-dcnode-id="1418" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NowWhereWasIGoingAgain" title="/pmwiki/pmwiki.php/Main/NowWhereWasIGoingAgain"><span data-dcnode-id="1417" instrument_node="">Now, Where Was I Going Again?</span></a><span data-dcnode-id="1415" instrument_node="">: The game's map screen helpfully shows you which Fertile Grounds are corrupted, which are corrupted but you have the powers to access, and which have been cleansed. Additionally, you can press a button at any time for Elika to send a ball of light to your selected destination for you to follow.</span></li><li data-dcnode-id="1402"><span data-dcnode-id="1413" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnlySmartPeopleMayPass" title="/pmwiki/pmwiki.php/Main/OnlySmartPeopleMayPass"><span data-dcnode-id="1412" instrument_node="">Only Smart People May Pass</span></a><span data-dcnode-id="1410" instrument_node="">: The game contains several puzzles. The most notable example of this trope, however, doesn't appear to be one at first. In the final encounter with the Concubine, she creates five illusory copies of Elika, and you must find the real one. </span><span class="spoiler" data-dcnode-id="1403" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1409" instrument_node=""> However, running into or attacking the six one-by-one reveals that </span><em data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">all</span></em><span data-dcnode-id="1406" instrument_node=""> of them are illusions. How do you uncover the real Elika? By throwing yourself off the tower, of course, prompting her to save you, </span><a class="twikilink" data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathIsASlapOnTheWrist" title="/pmwiki/pmwiki.php/Main/DeathIsASlapOnTheWrist"><span data-dcnode-id="1405" instrument_node="">as always.</span></a></span></li><li data-dcnode-id="1391"><span data-dcnode-id="1401" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheOnlyOne" title="/pmwiki/pmwiki.php/Main/TheOnlyOne"><span data-dcnode-id="1400" instrument_node="">The Only Two</span></a><span data-dcnode-id="1398" instrument_node="">: The Prince and Elika vs a </span><a class="twikilink" data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodOfEvil" title="/pmwiki/pmwiki.php/Main/GodOfEvil"><span data-dcnode-id="1397" instrument_node="">God of Evil</span></a><span data-dcnode-id="1395" instrument_node="">, his four lieutenants, and an endless horde of mooks. Lampshaded by the Prince: "You know, I wish some more good guys would show up."</span><ul data-dcnode-id="1392"><li data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node=""> Partially justified; when the Prince talks about spreading the word about Ahriman to get more people to come and keep him trapped, Elika points out that the stories would also bring forth people who want to sell their souls to him. It's better if he remains a secret to the world at large.</span></li></ul></li><li data-dcnode-id="1380"><span data-dcnode-id="1390" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OOCIsSeriousBusiness" title="/pmwiki/pmwiki.php/Main/OOCIsSeriousBusiness"><span data-dcnode-id="1389" instrument_node="">OOC Is Serious Business</span></a><span data-dcnode-id="1387" instrument_node="">: The closing moments of the game, the happy-go-lucky, </span><a class="twikilink" data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MotorMouth" title="/pmwiki/pmwiki.php/Main/MotorMouth"><span data-dcnode-id="1386" instrument_node="">Motor Mouth</span></a><span data-dcnode-id="1384" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadpanSnarker" title="/pmwiki/pmwiki.php/Main/DeadpanSnarker"><span data-dcnode-id="1383" instrument_node="">Deadpan Snarker</span></a><span data-dcnode-id="1381" instrument_node=""> Prince is serious and quiet.</span></li><li data-dcnode-id="1375"><span data-dcnode-id="1379" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PercussiveMaintenance" title="/pmwiki/pmwiki.php/Main/PercussiveMaintenance"><span data-dcnode-id="1378" instrument_node="">Percussive Maintenance</span></a><span data-dcnode-id="1376" instrument_node="">: Played (perhaps unintentionally) hilariously straight in the "Epilogue" DLC, which introduces a new type of power plate. Instead of needing to grab dozens or even hundreds of light seeds to power it up, the Prince simply smacks it once.</span></li><li data-dcnode-id="1367"><span data-dcnode-id="1374" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PointAndClickMap" title="/pmwiki/pmwiki.php/Main/PointAndClickMap"><span data-dcnode-id="1373" instrument_node="">Point-and-Click Map</span></a><span data-dcnode-id="1371" instrument_node="">: This helps you choose which area to go next and advance the plot, amidst the </span><a class="createlink" data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OpenWorld" title="/pmwiki/pmwiki.php/Main/OpenWorld"><span data-dcnode-id="1370" instrument_node="">Open World</span></a><span data-dcnode-id="1368" instrument_node=""> nature of the game.</span></li><li data-dcnode-id="1360"><span data-dcnode-id="1366" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PragmaticHero" title="/pmwiki/pmwiki.php/Main/PragmaticHero"><span data-dcnode-id="1365" instrument_node="">Pragmatic Hero</span></a><span data-dcnode-id="1363" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1361" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1362" instrument_node=""> Ahriman encourages the Prince to be this in the end. Since his prison won't last forever, Elika's death buys only years, maybe decades at most, until he's free, so he may as well restore her stolen life at the cost of Ahriman getting out now.</span></span></li><li data-dcnode-id="1355"><span data-dcnode-id="1359" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PressXToNotDie" title="/pmwiki/pmwiki.php/Main/PressXToNotDie"><span data-dcnode-id="1358" instrument_node="">Press X to Not Die</span></a><span data-dcnode-id="1356" instrument_node="">: Used in combat when the player is about to be defeated, as well as to finish certain bosses off.</span></li><li data-dcnode-id="1347"><span data-dcnode-id="1354" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProtagonistWithoutAPast" title="/pmwiki/pmwiki.php/Main/ProtagonistWithoutAPast"><span data-dcnode-id="1353" instrument_node="">Protagonist Without a Past</span></a><span data-dcnode-id="1351" instrument_node="">: The Prince. He tells Elika as much when she starts questioning him. Hell, the game manual even backs him up on this one. If Elika's persistent enough (i.e. if the player keeps hitting that Snark Button) he does reveal that when he was young both of his parents died for someone else's cause, leaving him with an uncle. He's been all over the world and met all kinds of people, but never got strongly attached to anyone. He robs graves and is always getting into trouble, and he's repeatedly gotten his hands on and subsequently lost a great deal of treasure. Where he comes from, rather than inheriting power, people get it by killing each other or </span><a class="twikilink" data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BribingYourWayToVictory" title="/pmwiki/pmwiki.php/Main/BribingYourWayToVictory"><span data-dcnode-id="1350" instrument_node="">bribing their way into it</span></a><span data-dcnode-id="1348" instrument_node="">.</span></li></ul><ul data-dcnode-id="1243"><li data-dcnode-id="1338"><span data-dcnode-id="1344" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PyrrhicVictory" title="/pmwiki/pmwiki.php/Main/PyrrhicVictory"><span data-dcnode-id="1343" instrument_node="">Pyrrhic Victory</span></a><span data-dcnode-id="1341" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1339" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1340" instrument_node="">Save the world, lose the girl. Then subverted.</span></span></li><li data-dcnode-id="1331"><span data-dcnode-id="1337" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PyrrhicVillainy" title="/pmwiki/pmwiki.php/Main/PyrrhicVillainy"><span data-dcnode-id="1336" instrument_node="">Pyrrhic Villainy</span></a><span data-dcnode-id="1334" instrument_node="">: A bit trickier to see, but it's there. It is implied in the DLC that </span><span class="spoiler" data-dcnode-id="1332" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1333" instrument_node="">Elika is somehow crucial to defeating Ahriman for real. By bringing her back to life, Ahriman has secured his release, but it will ultimately bring about his downfall.</span></span></li><li data-dcnode-id="1326"><span data-dcnode-id="1330" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealIsBrown" title="/pmwiki/pmwiki.php/Main/RealIsBrown"><span data-dcnode-id="1329" instrument_node="">Real Is Brown</span></a><span data-dcnode-id="1327" instrument_node="">: The game does have this, but the areas became much more colorful after being purified. Additionally, each area has a certain color palette before being purified.</span></li><li data-dcnode-id="1312"><span data-dcnode-id="1325" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RecycledTitle" title="/pmwiki/pmwiki.php/Main/RecycledTitle"><span data-dcnode-id="1324" instrument_node="">Recycled Title</span></a><span data-dcnode-id="1322" instrument_node="">: The original game and this one share the name </span><em data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Prince of Persia</span></em><span data-dcnode-id="1319" instrument_node="">. Early in development, subtitles were considered, including </span><em data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Prodigy</span></em><span data-dcnode-id="1316" instrument_node=""> and </span><em data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Heir Apparent</span></em><span data-dcnode-id="1313" instrument_node="">.</span></li><li data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RescueRomance" title="/pmwiki/pmwiki.php/Main/RescueRomance"><span data-dcnode-id="1310" instrument_node="">Rescue Romance</span></a><span data-dcnode-id="1308" instrument_node="">: Played with. The Prince meets Elika as she's running away from men sent by her father, but it's implied that she would have gotten along just fine without him. Played a bit straighter when Elika saves the Prince from a collapsing bridge, but it's still a while before they begin to warm up to each other.</span></li><li data-dcnode-id="1302"><span data-dcnode-id="1306" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReverseGrip" title="/pmwiki/pmwiki.php/Main/ReverseGrip"><span data-dcnode-id="1305" instrument_node="">Reverse Grip</span></a><span data-dcnode-id="1303" instrument_node="">: The Prince will shift his scimitar from a standard saber grip to this when going into a defensive stance. His sword is actually subtly designed for switching between grips; there's a hole in the hilt for him to stick his index finger in to act as an axle when spinning, and the hilt extends up past the crossguard for him to grab without slicing his hand open on the blade.</span></li><li data-dcnode-id="1297"><span data-dcnode-id="1301" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RightManInTheWrongPlace" title="/pmwiki/pmwiki.php/Main/RightManInTheWrongPlace"><span data-dcnode-id="1300" instrument_node="">Right Man in the Wrong Place</span></a><span data-dcnode-id="1298" instrument_node="">: Had the Prince not happened to fall into the canyon, the game would've turned out very differently, and probably for the worse.</span></li><li data-dcnode-id="1292"><span data-dcnode-id="1296" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RingOutBoss" title="/pmwiki/pmwiki.php/Main/RingOutBoss"><span data-dcnode-id="1295" instrument_node="">Ring-Out Boss</span></a><span data-dcnode-id="1293" instrument_node="">: The Warrior.</span></li><li data-dcnode-id="1287"><span data-dcnode-id="1291" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RoyalsWhoActuallyDoSomething" title="/pmwiki/pmwiki.php/Main/RoyalsWhoActuallyDoSomething"><span data-dcnode-id="1290" instrument_node="">Royals Who Actually Do Something</span></a><span data-dcnode-id="1288" instrument_node="">: Elika.</span></li><li data-dcnode-id="1282"><span data-dcnode-id="1286" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RunningGag" title="/pmwiki/pmwiki.php/Main/RunningGag"><span data-dcnode-id="1285" instrument_node="">Running Gag</span></a><span data-dcnode-id="1283" instrument_node="">: The Prince's game of "I Spy" with Elika.</span></li><li data-dcnode-id="1272"><span data-dcnode-id="1281" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SadisticChoice" title="/pmwiki/pmwiki.php/Main/SadisticChoice"><span data-dcnode-id="1280" instrument_node="">Sadistic Choice</span></a><span data-dcnode-id="1278" instrument_node="">: The game gives the Prince a pretty hefty one: </span><span class="spoiler" data-dcnode-id="1276" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1277" instrument_node="">keep Ahriman trapped and the world safe (for the short time it takes for Ahriman to bust out of the weakened prison), or undo everything he's fought for and release Ahriman to destroy the world in order to bring Elika back from the dead so that she can find a way to put Ahriman back in the seal for good</span></span><span data-dcnode-id="1275" instrument_node="">. And because, of course, by then we have </span><span class="spoiler" data-dcnode-id="1273" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1274" instrument_node="">completely fallen for her.</span></span></li><li data-dcnode-id="1267"><span data-dcnode-id="1271" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SceneryGorn" title="/pmwiki/pmwiki.php/Main/SceneryGorn"><span data-dcnode-id="1270" instrument_node="">Scenery Gorn</span></a><span data-dcnode-id="1268" instrument_node="">: Before the land is healed.</span></li><li data-dcnode-id="1254"><span data-dcnode-id="1266" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SceneryPorn" title="/pmwiki/pmwiki.php/Main/SceneryPorn"><span data-dcnode-id="1265" instrument_node="">Scenery Porn</span></a><span data-dcnode-id="1263" instrument_node="">:</span><ul data-dcnode-id="1255"><li data-dcnode-id="1258"><span data-dcnode-id="1262" instrument_node=""> </span><em data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">After</span></em><span data-dcnode-id="1259" instrument_node=""> the land is healed.</span></li><li data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node=""> The sky after Ahriman is released at the beginning of the game. Yes, it's the sign of evil overtaking the land and plunging the world into an era of darkness, but it sure is pretty.</span></li></ul></li><li data-dcnode-id="1249"><span data-dcnode-id="1253" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewDestiny" title="/pmwiki/pmwiki.php/Main/ScrewDestiny"><span data-dcnode-id="1252" instrument_node="">Screw Destiny</span></a><span data-dcnode-id="1250" instrument_node="">: One of the themes.</span></li><li data-dcnode-id="1244"><span data-dcnode-id="1248" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SealedEvilInACan" title="/pmwiki/pmwiki.php/Main/SealedEvilInACan"><span data-dcnode-id="1247" instrument_node="">Sealed Evil in a Can</span></a><span data-dcnode-id="1245" instrument_node="">: Ahriman.</span></li></ul><ul data-dcnode-id="1038"><li data-dcnode-id="1235"><span data-dcnode-id="1241" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShaggyDogStory" title="/pmwiki/pmwiki.php/Main/ShaggyDogStory"><span data-dcnode-id="1240" instrument_node="">"Shaggy Dog" Story</span></a><span data-dcnode-id="1238" instrument_node="">: Seal away the Dark God to save the world. </span><span class="spoiler" data-dcnode-id="1236" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1237" instrument_node=""> And then immediately undo his sealing in order to revive Elika, who sacrificed her life to seal him away in the first place.</span></span></li><li data-dcnode-id="1230"><span data-dcnode-id="1234" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShirtlessScene" title="/pmwiki/pmwiki.php/Main/ShirtlessScene"><span data-dcnode-id="1233" instrument_node="">Shirtless Scene</span></a><span data-dcnode-id="1231" instrument_node="">: The Prince isn't quite shirtless, but his open vest shows off quite a bit of his lovingly-rendered abdominals.</span></li><li data-dcnode-id="1182"><span data-dcnode-id="1229" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="1228" instrument_node="">Shout-Out</span></a><span data-dcnode-id="1226" instrument_node="">:</span><ul data-dcnode-id="1183"><li data-dcnode-id="1210"><span data-dcnode-id="1225" instrument_node=""> You can unlock the </span><em data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Sands Of Time</span></em><span data-dcnode-id="1222" instrument_node=""> Prince's outfit, as well as Altair's (from </span><em data-dcnode-id="1219"><a class="twikilink" data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/AssassinsCreed" title="/pmwiki/pmwiki.php/Franchise/AssassinsCreed"><span data-dcnode-id="1221" instrument_node="">Assassin's Creed</span></a></em><span data-dcnode-id="1218" instrument_node="">) outfit. Similarly, Elika can be dressed as either Farah from the </span><em data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Sands of Time</span></em><span data-dcnode-id="1215" instrument_node=""> trilogy or as Jade from </span><em data-dcnode-id="1212"><a class="twikilink" data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BeyondGoodAndEvil" title="/pmwiki/pmwiki.php/VideoGame/BeyondGoodAndEvil"><span data-dcnode-id="1214" instrument_node="">Beyond Good &amp; Evil</span></a></em><span data-dcnode-id="1211" instrument_node="">.</span></li><li data-dcnode-id="1202"><span data-dcnode-id="1209" instrument_node=""> You also get achievements for </span><a class="twikilink" data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Titanic1997" title="/pmwiki/pmwiki.php/Film/Titanic1997"><span data-dcnode-id="1208" instrument_node="">standing on the beam on the prow of an airship</span></a><span data-dcnode-id="1206" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/AssassinsCreed" title="/pmwiki/pmwiki.php/Franchise/AssassinsCreed"><span data-dcnode-id="1205" instrument_node="">standing on a beam jutting out from a building that provides a spectacular view</span></a><span data-dcnode-id="1203" instrument_node="">.</span></li><li data-dcnode-id="1197"><span data-dcnode-id="1201" instrument_node=""> The game contains a total of </span><a class="twikilink" data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ArabianNights" title="/pmwiki/pmwiki.php/Literature/ArabianNights"><span data-dcnode-id="1200" instrument_node="">one thousand and one</span></a><span data-dcnode-id="1198" instrument_node=""> light seeds.</span></li><li data-dcnode-id="1184"><span data-dcnode-id="1196" instrument_node=""> There are also loads of references to </span><em data-dcnode-id="1193"><a class="twikilink" data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ICO" title="/pmwiki/pmwiki.php/VideoGame/ICO"><span data-dcnode-id="1195" instrument_node="">ICO</span></a></em><span data-dcnode-id="1192" instrument_node=""> and especially </span><em data-dcnode-id="1189"><a class="twikilink" data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ShadowOfTheColossus" title="/pmwiki/pmwiki.php/VideoGame/ShadowOfTheColossus"><span data-dcnode-id="1191" instrument_node="">Shadow of the Colossus</span></a></em><span data-dcnode-id="1188" instrument_node=""> (</span><span class="spoiler" data-dcnode-id="1186" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1187" instrument_node="">the pedestal where the Prince places Elika's body on is a direct lift, as is the overall plot of making a pact with the devil to save the one you love</span></span><span data-dcnode-id="1185" instrument_node="">).</span></li></ul></li><li data-dcnode-id="1177"><span data-dcnode-id="1181" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SidekickExMachina" title="/pmwiki/pmwiki.php/Main/SidekickExMachina"><span data-dcnode-id="1180" instrument_node="">Sidekick Ex Machina</span></a><span data-dcnode-id="1178" instrument_node="">: Elika.</span></li><li data-dcnode-id="1157"><span data-dcnode-id="1176" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ASinisterClue" title="/pmwiki/pmwiki.php/Main/ASinisterClue"><span data-dcnode-id="1175" instrument_node="">A Sinister Clue</span></a><span data-dcnode-id="1173" instrument_node="">: Kinda. Looking from the temple, the Corrupted get more evil as you move from right to left.</span><ul data-dcnode-id="1158"><li data-dcnode-id="1168"><span data-dcnode-id="1172" instrument_node=""> The right-most Grounds are guarded by the Warrior, a </span><a class="twikilink" data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TragicMonster" title="/pmwiki/pmwiki.php/Main/TragicMonster"><span data-dcnode-id="1171" instrument_node="">Tragic Monster</span></a><span data-dcnode-id="1169" instrument_node=""> and the only Corrupted Elika feels sympathy for.</span></li><li data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node=""> Moving left, the Concubine sold her soul in a moment of weakness but is too </span><a class="twikilink" data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmugSnake" title="/pmwiki/pmwiki.php/Main/SmugSnake"><span data-dcnode-id="1166" instrument_node="">smug</span></a><span data-dcnode-id="1164" instrument_node=""> to be sympathetic.</span></li><li data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node=""> The Alchemist betrayed and tortured his own people but served Ahriman because he feared death, which is somewhat understandable.</span></li><li data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node=""> The left-most is the Hunter, the most decadent of the Corrupted with no redeeming qualities whatsoever. He sold his soul simply so he could murder humans.</span></li></ul></li><li data-dcnode-id="1144"><span data-dcnode-id="1156" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmitingEvilFeelsGood" title="/pmwiki/pmwiki.php/Main/SmitingEvilFeelsGood"><span data-dcnode-id="1155" instrument_node="">Smiting Evil Feels Good</span></a><span data-dcnode-id="1153" instrument_node="">: Elika calls the Prince out for this tendency.</span><div class="indent" data-dcnode-id="1145"><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Elika:</span></strong><span data-dcnode-id="1150" instrument_node=""> You enjoyed that. </span><br data-dcnode-id="1149"><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">The Prince:</span></strong><span data-dcnode-id="1146" instrument_node=""> Teaching that thing a lesson? Taking some revenge for the people it killed? Yes. I enjoyed that. And you enjoyed that side of things too.</span></div></li><li data-dcnode-id="1134"><span data-dcnode-id="1143" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeMyHand" title="/pmwiki/pmwiki.php/Main/TakeMyHand"><span data-dcnode-id="1142" instrument_node="">Take My Hand!</span></a><span data-dcnode-id="1140" instrument_node="">:</span><ul data-dcnode-id="1135"><li data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node=""> How Elika saves the Prince. Repeatedly.</span></li><li data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node=""> Additionally, if Elika attempts to jump to a ledge the Prince is hanging, she'll start to fall, but the Prince will spin around and grab her hand.</span></li></ul></li><li data-dcnode-id="1123"><span data-dcnode-id="1133" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ToBeContinued" title="/pmwiki/pmwiki.php/Main/ToBeContinued"><span data-dcnode-id="1132" instrument_node="">To Be Continued</span></a><span data-dcnode-id="1130" instrument_node="">: This is the Achievement that pops up after </span><span class="spoiler" data-dcnode-id="1128" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1129" instrument_node="">the Prince resurrects Elika and releases Ahriman</span></span><span data-dcnode-id="1127" instrument_node="">. Turns out they've abandoned the new storyline in favor of a fourth installment to the </span><em data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Sands of Time</span></em><span data-dcnode-id="1124" instrument_node=""> storyline.</span></li><li data-dcnode-id="1116"><span data-dcnode-id="1122" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnflinchingWalk" title="/pmwiki/pmwiki.php/Main/UnflinchingWalk"><span data-dcnode-id="1121" instrument_node="">Unflinching Walk</span></a><span data-dcnode-id="1119" instrument_node="">: The Prince </span><span class="spoiler" data-dcnode-id="1117" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1118" instrument_node="">walks calmly away as he is engulfed by a sandstorm and a dark god flies overhead.</span></span></li><li data-dcnode-id="1108"><span data-dcnode-id="1115" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnwittingPawn" title="/pmwiki/pmwiki.php/Main/UnwittingPawn"><span data-dcnode-id="1114" instrument_node="">Unwitting Pawn</span></a><span data-dcnode-id="1112" instrument_node="">: Ahriman </span><span class="spoiler" data-dcnode-id="1110" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1111" instrument_node="">uses the same sales pitch on both the Prince and the Mourning King and succeeds both times. The Prince seems to think its been subverted in the second case, as he has Elika brought back to life so she can defeat Ahriman for good. Elika herself thinks she can't, and that Ahriman's playing him for a fool.</span></span><span data-dcnode-id="1109" instrument_node="">.</span></li><li data-dcnode-id="1097"><span data-dcnode-id="1107" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGameCaringPotential" title="/pmwiki/pmwiki.php/Main/VideoGameCaringPotential"><span data-dcnode-id="1106" instrument_node="">Video Game Caring Potential</span></a><span data-dcnode-id="1104" instrument_node="">: What makes the final </span><a class="twikilink" data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SadisticChoice" title="/pmwiki/pmwiki.php/Main/SadisticChoice"><span data-dcnode-id="1103" instrument_node="">Sadistic Choice</span></a><span data-dcnode-id="1101" instrument_node=""> hit so hard is that the Prince must choose between </span><span class="spoiler" data-dcnode-id="1099" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1100" instrument_node="">undoing the result of many hours of gameplay and giving up on the person he and the player have grown to adore throughout said hours of perfect teamwork and bilateral UST-laden snarking</span></span><span data-dcnode-id="1098" instrument_node="">.</span></li><li data-dcnode-id="1083"><span data-dcnode-id="1096" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGameCrueltyPotential" title="/pmwiki/pmwiki.php/Main/VideoGameCrueltyPotential"><span data-dcnode-id="1095" instrument_node="">Video Game Cruelty Potential</span></a><span data-dcnode-id="1093" instrument_node="">: Throw the Prince down pits as many times as you like! And </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">infinitely</span></em><span data-dcnode-id="1090" instrument_node="">, because Elika will always save him, although you </span><a class="twikilink" data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoGameCrueltyPunishment" title="/pmwiki/pmwiki.php/Main/VideoGameCrueltyPunishment"><span data-dcnode-id="1089" instrument_node="">will miss out on an achievement if you do this too much</span></a><span data-dcnode-id="1087" instrument_node="">. Some of the combat moves are rather nasty, too - throwing an enemy into the air, juggling them with your sword, grabbing them out of the air and smashing them to the ground, shoving them through pillars, hurling </span><em data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">them</span></em><span data-dcnode-id="1084" instrument_node=""> off ledges...</span></li><li data-dcnode-id="1072"><span data-dcnode-id="1082" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WallCrawl" title="/pmwiki/pmwiki.php/Main/WallCrawl"><span data-dcnode-id="1081" instrument_node="">Wall Crawl</span></a><span data-dcnode-id="1079" instrument_node="">: Along with </span><em data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">ceiling crawl</span></em><span data-dcnode-id="1076" instrument_node="">. Assuming there are rings bolted along the wall/ceiling, he can run along them indefinitely. Even </span><a class="twikilink" data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/SpiderMan" title="/pmwiki/pmwiki.php/Franchise/SpiderMan"><span data-dcnode-id="1075" instrument_node="">Spider-Man</span></a><span data-dcnode-id="1073" instrument_node=""> would be impressed.</span></li><li data-dcnode-id="1067"><span data-dcnode-id="1071" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WallJump" title="/pmwiki/pmwiki.php/Main/WallJump"><span data-dcnode-id="1070" instrument_node="">Wall Jump</span></a><span data-dcnode-id="1068" instrument_node="">: Hell yes. The Prince can do it indefinitely, even.</span></li><li data-dcnode-id="1062"><span data-dcnode-id="1066" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WarriorPrince" title="/pmwiki/pmwiki.php/Main/WarriorPrince"><span data-dcnode-id="1065" instrument_node="">Warrior Prince</span></a><span data-dcnode-id="1063" instrument_node="">: By name, but not by actual position.</span></li><li data-dcnode-id="1044"><span data-dcnode-id="1061" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatTheHellHero" title="/pmwiki/pmwiki.php/Main/WhatTheHellHero"><span data-dcnode-id="1060" instrument_node="">What the Hell, Hero?</span></a><span data-dcnode-id="1058" instrument_node="">: Asked by </span><span class="spoiler" data-dcnode-id="1056" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1057" instrument_node="">Elika</span></span><span data-dcnode-id="1055" instrument_node=""> at the end of the game when </span><span class="spoiler" data-dcnode-id="1053" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1054" instrument_node="">the Prince resurrects her and releases Ahriman</span></span><span data-dcnode-id="1052" instrument_node="">.</span><div class="indent" data-dcnode-id="1045"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Elika:</span></strong><span data-dcnode-id="1049" instrument_node=""> ... </span><em data-dcnode-id="1046"><strong data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Why?</span></strong></em></div></li><li data-dcnode-id="1039"><span data-dcnode-id="1043" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldHealingWave" title="/pmwiki/pmwiki.php/Main/WorldHealingWave"><span data-dcnode-id="1042" instrument_node="">World-Healing Wave</span></a><span data-dcnode-id="1040" instrument_node="">: Every time Elika heals a fertile ground.</span></li></ul><hr data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node="">
