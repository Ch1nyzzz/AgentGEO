</span><p data-dcnode-id="1961"><span data-dcnode-id="1972" instrument_node="">In 2003,&nbsp;Ubisoft took over the franchise and released&nbsp;</span><a data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamerant.com/tag/prince-of-persia-the-sands-of-time/"><em data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Prince of Persia: The Sands of Time</span></em></a><span data-dcnode-id="1968" instrument_node="">. They found a way to blend the platforming genre, which was beginning to wither due to a lack of innovation around that time, with the thriving action-adventure genre. Although games like&nbsp;</span><em data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">Sands of Time&nbsp;</span></em><span data-dcnode-id="1965" instrument_node="">and the original&nbsp;</span><em data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Prince of Persia&nbsp;</span></em><span data-dcnode-id="1962" instrument_node="">are classics, it's fair to say that not every game in the series has reached such heights.</span></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1946"><em data-dcnode-id="1957"><strong data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Updated&nbsp;July 20th,&nbsp;2021, by Jack Pursey:&nbsp;</span></strong></em><span data-dcnode-id="1956" instrument_node="">To a chorus of moans and groans, it was recently announced that </span><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/ubisoft-delay-prince-of-persia-sands-of-time/%23%3A~%3Atext%3DPrince%2520of%2520Persia%253A%2520The%2520Sands%2520of%2520Time%2520Remake%2520was%2520then%2Cspecific%2520release%2520date%2520beyond%25202022." rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1955" instrument_node="">the&nbsp;highly&nbsp;anticipated&nbsp;</span><em data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Prince of Persia: Sands of Time&nbsp;</span></em><span data-dcnode-id="1952" instrument_node="">remake had been delayed once again</span></a><span data-dcnode-id="1950" instrument_node="">. Of course, it's always better for a game to be delayed until it's ready; however, the news still understandably disappointed fans of the franchise. So, to give&nbsp;fans of an idea of what to play in the meantime, we've updated this list to include key details for each game. These include where they can be played, as well as how long they take to beat according to the aptly named </span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howlongtobeat.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1949" instrument_node="">howlongtobeat.com</span></a><span data-dcnode-id="1947" instrument_node="">.</span></p><span data-dcnode-id="1945" instrument_node="">

</span><p data-dcnode-id="1864"><span data-dcnode-id="1875" instrument_node="">When gaming began to transition from 2D to 3D, it marked a significant&nbsp;moment in the industry's history. This era provided a plethora of incredible games from&nbsp;</span><em data-dcnode-id="1870"><span data-dcnode-id="1874" instrument_node="">The Legend of Zelda:&nbsp;</span><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamerant.com/tag/ocarina%2520of%2520time/"><span data-dcnode-id="1873" instrument_node="">Ocarina of Time</span></a><span data-dcnode-id="1871" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1869" instrument_node="">to&nbsp;</span><a data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamerant.com/tag/mario%252064/"><em data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Super Mario 64</span></em></a><span data-dcnode-id="1865" instrument_node="">.</span></p><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1862" instrument_node="">As the title suggests,&nbsp;</span><em data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Prince of Persia 3D&nbsp;</span></em><span data-dcnode-id="1859" instrument_node="">was the franchise first attempt at taking the </span><a data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamerant.com/2d-super-mario-games-nintendo-best/"><span data-dcnode-id="1858" instrument_node="">2D side-scrolling</span></a><span data-dcnode-id="1856" instrument_node=""> series into the new world of 3D gaming. Unfortunately, as far as&nbsp;franchises making the transition from 2D to 3D goes,&nbsp;</span><em data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">Prince of Persia 3D&nbsp;</span></em><span data-dcnode-id="1853" instrument_node="">is closer to the&nbsp;</span><em data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Bubsy 3D&nbsp;</span></em><span data-dcnode-id="1850" instrument_node="">end of the spectrum than the&nbsp;</span><em data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Super Mario 64&nbsp;</span></em><span data-dcnode-id="1847" instrument_node="">one.</span></p><span data-dcnode-id="1845" instrument_node="">

</span><p data-dcnode-id="1770"><span data-dcnode-id="1777" instrument_node="">Making an action-adventure game on the Nintendo DS is always going to be a tough ask. Sadly,&nbsp;</span><em data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Prince of Persia: The Fallen King&nbsp;</span></em><span data-dcnode-id="1774" instrument_node="">doesn't buck the trend.&nbsp;The game </span><a data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metacritic.com/game/ds/prince-of-persia-the-fallen-king" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1773" instrument_node="">scored a lackluster with 64 on Metacritic</span></a><span data-dcnode-id="1771" instrument_node="">, with criticism predominantly directed towards the game's poor controls.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1768" instrument_node="">2020&nbsp;was set to conclude with&nbsp;</span><em data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Pr</span></em><em data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">ince of Persia: The Fallen King</span></em><span data-dcnode-id="1763" instrument_node="">&nbsp;having&nbsp;a higher Metascore than </span><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metacritic.com/game/xbox-one/cyberpunk-2077" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1762" instrument_node="">the console iteration of&nbsp;</span></a><em data-dcnode-id="1757"><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metacritic.com/game/xbox-one/cyberpunk-2077" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1760" instrument_node="">Cyberpunk 2077</span></a><span data-dcnode-id="1758" instrument_node="">. </span></em><span data-dcnode-id="1756" instrument_node="">It&nbsp;served as a&nbsp;fittingly unexpected end to&nbsp;the year.</span></p><span data-dcnode-id="1754" instrument_node="">

</span><p data-dcnode-id="1668"><span data-dcnode-id="1681" instrument_node="">From one </span><a data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamerant.com/nintendo-ds-rarest-limited-editions-value/"><span data-dcnode-id="1680" instrument_node="">Nintendo DS</span></a><span data-dcnode-id="1678" instrument_node=""> game to another, Ubisoft took the handheld console's limitations into account with 2005's&nbsp;</span><em data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Battles of Prince of Persia</span></em><span data-dcnode-id="1675" instrument_node="">. This title&nbsp;opted for&nbsp;a crack at the turn-based tactics genre. The game&nbsp;is set&nbsp;between the events of&nbsp;</span><em data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">The Sands of Time</span></em><span data-dcnode-id="1672" instrument_node=""> and </span><em data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Warrior Within&nbsp;</span></em><span data-dcnode-id="1669" instrument_node="">and takes players to&nbsp;Persia, India, and a fictional kingdom known as&nbsp;Aresura.</span></p><span data-dcnode-id="1667" instrument_node="">

</span><p data-dcnode-id="1650"><span data-dcnode-id="1658" instrument_node="">Interestingly,&nbsp;</span><a data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metacritic.com/game/ds/battles-of-prince-of-persia" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Battles of Prince of Persia&nbsp;</span></em><span data-dcnode-id="1655" instrument_node="">has the same Metascore as&nbsp;</span><em data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Prince of Persia: The Fallen King</span></em></a><span data-dcnode-id="1651" instrument_node="">.&nbsp;The game deservedly has a&nbsp;considerably higher User Score, though, as it feels far better suited for the DS.</span></p><span data-dcnode-id="1649" instrument_node="">

</span><p data-dcnode-id="1562"><span data-dcnode-id="1566" instrument_node="">Ubisoft made the ambitious decision of&nbsp;offering different storylines and gameplay mechanics throughout some of the game's releases. The gamble seemingly didn't pay off, as the IP has fallen out of favor with Ubisoft since. The&nbsp;</span><em data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Sands of Time&nbsp;</span></em><span data-dcnode-id="1563" instrument_node="">remake&nbsp;may be the franchise's last chance at a rejuvenation.</span></p><span data-dcnode-id="1561" instrument_node="">

</span><span data-dcnode-id="1494" instrument_node=""> </span><p data-dcnode-id="1470"><span data-dcnode-id="1493" instrument_node="">A remake of the game that started it all,&nbsp;</span><em data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Prince of Persia&nbsp;</span></em><em data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Classic&nbsp;</span></em><span data-dcnode-id="1488" instrument_node="">took players back to&nbsp;the series' side-scrolling roots with a reimagining of Broderbund's original&nbsp;</span><em data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Prince of Persia</span></em><span data-dcnode-id="1485" instrument_node="">.&nbsp;The game was developed by Gameloft, who&nbsp;were best known at the time for developing popular games on mobile phones such as&nbsp;</span><a data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamerant.com/tag/splinter-cell/"><em data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Tom</span></em><span data-dcnode-id="1482" instrument_node=""> </span></a><em data-dcnode-id="1474"><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamerant.com/tag/splinter-cell/"><span data-dcnode-id="1480" instrument_node="">Clancy's Splinter Cell: Chaos Theory</span></a><span data-dcnode-id="1478" instrument_node="">,&nbsp;</span><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamerant.com/tag/assassins-creed-2/"><span data-dcnode-id="1477" instrument_node="">Assassin's Creed II</span></a><span data-dcnode-id="1475" instrument_node="">,&nbsp;</span></em><span data-dcnode-id="1473" instrument_node="">and&nbsp;</span><em data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Prince of Persia: Sands of Time.</span></em></p><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1465"><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metacritic.com/game/xbox-360/prince-of-persia-classic" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1468" instrument_node="">The game scored a very respectable 82 on Metacritic</span></a><span data-dcnode-id="1466" instrument_node="">. This&nbsp;is especially impressive when taking into account that many gamers still looked down upon as cash-grabs in 2007.</span></p><span data-dcnode-id="1464" instrument_node="">

</span><p data-dcnode-id="1382"><span class="related-single" data-dcnode-id="1383"><span data-dcnode-id="1386" instrument_node="">RELATED:&nbsp;</span><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamerant.com/best-offline-ps4-games/"><span data-dcnode-id="1385" instrument_node="">Ranking The Best Offline PS4 Games</span></a></span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1380" instrument_node="">Ubisoft decided not to return to the art style of&nbsp;</span><em data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Prince of Persia&nbsp;</span></em><span data-dcnode-id="1377" instrument_node="">(2008) with</span><em data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">&nbsp;Prince of Persia: The Forgotten Sands</span></em><span data-dcnode-id="1374" instrument_node="">. This was&nbsp;a shame, as the game won the </span><a data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20090223101156/http%3A//www.interactive.org/awards/annual_awards.asp%3FidAward%3D2009" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1373" instrument_node="">Outstanding Achievement in Animation award at the AIAS Annual Awards</span></a><span data-dcnode-id="1371" instrument_node="">.</span></p><span data-dcnode-id="1369" instrument_node="">

</span><span data-dcnode-id="1286" instrument_node=""> </span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">The game implements an interesting mechanic based around the Dark Prince, an alter-ego of the Prince. At random occasions, the Prince will transform into this alter-ego. The Dark Prince wields a weapon known as the Daggertail and constantly loses health, which players need to regain with sand to stay alive.</span></p><span data-dcnode-id="1283" instrument_node="">

</span></ul><span data-dcnode-id="1134" instrument_node="">
</span><span data-dcnode-id="1132" instrument_node=""> </span><p data-dcnode-id="1127"><span data-dcnode-id="1131" instrument_node="">Much like&nbsp;</span><em data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Warrior Within,&nbsp;Prince of Persia 2: The Shadow and the Flame&nbsp;</span></em><span data-dcnode-id="1128" instrument_node="">had the pressure of competing with its critically acclaimed predecessor. Although it didn't reach quite reach those heights, it certainly didn't disappoint.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1121"><span class="related-single" data-dcnode-id="1122"><span data-dcnode-id="1125" instrument_node="">RELATED:&nbsp;</span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamerant.com/nintendo-switch-best-first-party-games/"><span data-dcnode-id="1124" instrument_node="">Ranking The Best First-Party Nintendo Switch Games</span></a></span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1110"><em data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Prince of Persia 2: The Shadow and the Flame&nbsp;</span></em><span data-dcnode-id="1117" instrument_node="">is predominantly a platformer, though&nbsp;it does have more combat than its predecessor. Only one enemy would ever confront the player at a time in 1989's&nbsp;</span><em data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Prince of Persia</span></em><span data-dcnode-id="1114" instrument_node="">; meanwhile, foes would often swarm the player in&nbsp;</span><em data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Prince of Perisa 2</span></em><span data-dcnode-id="1111" instrument_node="">&nbsp;if they weren't careful.</span></p><span data-dcnode-id="1109" instrument_node="">

</span></ul><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1043" instrument_node="">The one that started it all,&nbsp;</span><em data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Prince of Persia&nbsp;</span></em><span data-dcnode-id="1040" instrument_node="">was certainly a product of its time. Not only is the gameplay&nbsp;the most platforming-centric of the franchise, but it's&nbsp;also </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamerant.com/nintendo-switch-most-difficult-games-ranked/"><span data-dcnode-id="1039" instrument_node="">brutally difficult</span></a><span data-dcnode-id="1037" instrument_node="">.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1034" instrument_node="">Although it may not seem like anything special today, the game's graphics, aesthetics, and sound design were incredible for the time. The game is considered to be the first </span><a data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CinematicPlatformGame" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1033" instrument_node="">cinematic platformer</span></a><span data-dcnode-id="1031" instrument_node=""> ever released, and many considered it one of the best platformers of all time when it first hit shelves.</span></p><span data-dcnode-id="1029" instrument_node="">

 </span></li><span data-dcnode-id="965" instrument_node="">
</span></ul><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="962" instrument_node="">As alluded to before, Ubisoft's first&nbsp;</span><em data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Prince of Persia&nbsp;</span></em><span data-dcnode-id="959" instrument_node="">game,&nbsp;</span><em data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Sands of Time, </span></em><span data-dcnode-id="956" instrument_node="">is a&nbsp;wonderfully balanced title. It combines the platforming gameplay that dominated the industry during the 90s&nbsp;with the action-heavy style that began taking over the gaming industry with the release of the PlayStation 2.</span></p><span data-dcnode-id="954" instrument_node="">
</span><span data-dcnode-id="952" instrument_node=""> </span><p data-dcnode-id="939"><em data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Prince of Persia: The Sands of Time&nbsp;</span></em><span data-dcnode-id="949" instrument_node="">is one of the PlayStation 2 generation's most critically acclaimed games ever, exemplified by its </span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metacritic.com/game/gamecube/prince-of-persia-the-sands-of-time" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="948" instrument_node="">whopping 92 Metascore</span></a><span data-dcnode-id="946" instrument_node="">. If the upcoming&nbsp;</span><em data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Sand of Time&nbsp;</span></em><span data-dcnode-id="943" instrument_node="">remake can recapture the magic of its source material, the&nbsp;</span><em data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Prince of Persia </span></em><span data-dcnode-id="940" instrument_node="">franchise&nbsp;could be set for a return to the top tier of the gaming industry.</span></p><span data-dcnode-id="938" instrument_node="">
