tyle="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4888"><svg data-dcnode-id="4889" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4890" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4811" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4812" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4813"><span class="q-box qu-userSelect--text" data-dcnode-id="4814" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4874" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4875" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4876" instrument_node="">There’s not a good way to know.</span></span></p><span data-dcnode-id="4873" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4862" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4871" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4872" instrument_node="">It is sometimes asserted that </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Did-Cyrus-the-great-abolish-or-ban-slavery/answer/Steve-Theodore" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="4870" instrument_node="">Cyrus the great banned slavery in his empire</span></a><span data-dcnode-id="4867" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4868" instrument_node="">, but (as you’ll see in the link) that’s a </span></span><span data-dcnode-id="4865" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4866" instrument_node="">very</span></span><span data-dcnode-id="4863" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4864" instrument_node=""> optimistic reading of one particular text — and we know from other sources that in most of the empire, at least, slavery continued to be a fact of life.</span></span></p><span data-dcnode-id="4861" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4849" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4859" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4860" instrument_node="">That said, there are some records, particularly the </span></span><span class="q-inline" data-dcnode-id="4852" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oi.uchicago.edu/research/projects/persepolis-fortification-archive" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="oi.uchicago.edu"><span data-dcnode-id="4858" instrument_node="">Persepolis archives</span></a><span class="q-inlineBlock" data-dcnode-id="4853" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4854"><svg data-dcnode-id="4855" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4856" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4850" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4851" instrument_node="">, which indicate pretty clearly that a lot of labor which in contemporary countries — particularly Greece — which would have been done by slaves was done by paid free labor in Persia proper. The Persians tended to view themselves as a special elite within the empire and were proud of their distinct culture — which, having originated in the steppes and hills rather than among settled agriculturists and townsmen, does not seem to have been based on the routine use of slave labor familiar in Greece, Rome, Phoenicia or Mesopotamia.</span></span></p><span data-dcnode-id="4848" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4845" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4846" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4847" instrument_node="">Thus, Persia itself — the home territory of the ethnic Persians — seems to have had fewer slaves than other contemporary regions. We can’t easily assign numbers to that “fewer,” though - our sources are pretty spotty.</span></span></p><span data-dcnode-id="4844" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4819" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4842" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4843" instrument_node="">We also don’t know whether the Persian empire as a whole had fewer slaves than the rest of the ancient world — or whether the Persians simply delegated the grubby business of owning and managing slaves to subject peoples. An analogy might be the Mongols, under whose rule slavery as an institution flourished even though ethnic Mongols tended not to amass large staffs of slaves after the manner of Roman plutocrats. Since the empire included many places (Asia Minor, the Levant, and Mesopotamia) where slavery flourished it’s quite possible that most Persians simply collected the </span></span><span data-dcnode-id="4840" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4841" instrument_node="">profits </span></span><span data-dcnode-id="4838" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4839" instrument_node="">of the slave trade rather than actually owning slaves in large numbers themselves. We do have a handful of pieces of evidence for Persian nobles owned slaves themselves as well: Xenophon, for example, mentions that when satrap Tissaphernes arrived at a parley, he brought a large entourage of slaves (</span></span><span class="q-inline" data-dcnode-id="4831" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//perseus.uchicago.edu/perseus-cgi/citequery3.pl%3Fdbname%3DGreekFeb2011%26query%3DXen.%2520An.%25202.3.16%26getid%3D1" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="perseus.uchicago.edu"><span data-dcnode-id="4837" instrument_node="">Anabasis 2.13.17</span></a><span class="q-inlineBlock" data-dcnode-id="4832" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4833"><svg data-dcnode-id="4834" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4835" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4829" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4830" instrument_node="">), and Arshama the Satrap of Egypt — the only Persian whose correspondence has survived — writes </span></span><span class="q-inline" data-dcnode-id="4822" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayback.archive-it.org/org-467/20190828084246/http%3A//blogs.bodleian.ox.ac.uk/wp-content/uploads/sites/116/2013/10/Volume-2-text-and-translation-interleaved-20.1.14.pdf" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="wayback.archive-it.org"><span data-dcnode-id="4828" instrument_node="">letters concerning his own slaves and those of other Persians</span></a><span class="q-inlineBlock" data-dcnode-id="4823" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4824"><svg data-dcnode-id="4825" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4826" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4820" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4821" instrument_node=""> (TAD A6.3 and A6.7).</span></span></p><span data-dcnode-id="4818" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4815" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4816" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4817" instrument_node="">In contemporary Greece (and later Rome) the percentage of the population enslaved varied a lot depending on circumstances: in the aftermath of a long war, when prisoners were plentiful, the number of slaves would be huge. In a few cases it seems like 40–50% of the population was unfree (for example in Italy after the Punic wars and Macedonian wars had produced huge slave surpluses). At other times the percentage was much lower: in Roman Egypt (one of the few places where we have anything like real statistics) only about 10% of the population were slaves. It’s reasonable to assume that the Persian empire experienced similar fluctuations: there were more slaves available when the empire expanded, and fewer when it was stagnant or contracting.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4733" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4734" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4735" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4749" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4781" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4782" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4792" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4793" style="box-sizing: border-box; position: relative;"><button aria-label="57 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="4794" role="button" style="box-sizing: border-box; font: inherit; padding: r Rome or ancient Greece (especially Athens). You would be able to own your own businesses, control your own finances, and rise to command in the military. See douche-bag comment above.</span></span></p><span data-dcnode-id="4583" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4573" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="4576" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//badassladiesofhistory.wordpress.com/2014/06/08/parteshbod/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="badassladiesofhistory.wordpress.com"><span data-dcnode-id="4582" instrument_node="">Pantea Arteshbod</span></a><span class="q-inlineBlock" data-dcnode-id="4577" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4578"><svg data-dcnode-id="4579" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4580" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4574" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4575" instrument_node=""> one of the badass ladies of history:</span></span></p><div c " style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4347" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4350" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4351" instrument_node="">The contemporary name of Iran (that is, Persia) is actually derived from the same root. So, it’s a tough case to make: if even the Aryans are black, who </span></span><span data-dcnode-id="4348" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4349" instrument_node="">isn’t?</span></span></p><span data-dcnode-id="4346" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4339" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4344" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4345" instrument_node="">OK, that’s a </span></span><span data-dcnode-id="4342" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4343" instrument_node="">bit</span></span><span data-dcnode-id="4340" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4341" instrument_node=""> unfair.</span></span></p><span data-dcnode-id="4338" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4331" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4336" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4337" instrument_node="">In Persian and related la great earth far and wide, son of Hystaspes, an Achaemenid, </span></span><span data-dcnode-id="4300" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4301" instrument_node="">a Persian, son of a Persian,</span></span><span data-dcnode-id="4298" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4299" instrument_node=""> </span></span><span data-dcnode-id="4296" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4297" instrument_node="">an Aryan, having Aryan lineage.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="4294" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4288" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4291" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4292" instrument_node="">The contemporary name of Iran (that is, Persia) is actually derived from the same root. So, it’s a tough case to make: if even the Aryans are black, who </span></span><span data-dcnode-id="4289" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4290" instrument_node="">isn’t?</span></span></p><span data-dcnode-id="4287" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4280" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4285" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4286" instrument_node="">OK, that’s a </span></span><span data-dcnode-id="4283" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4284" instrument_node="">bit</span></span><span data-dcnode-id="4281" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4282" instrument_node=""> unfair.</span></span></p><span data-dcnode-id="4279" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4268" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4277" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4278" instrument_node="">In Persian and related languages, “Aryan” was roughly a synonym for “noble” or “best” — it’s from the the same ancient root </span></span><span data-dcnode-id="4275" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4276" instrument_node="">aristos </span></span><span data-dcnode-id="4273" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4274" instrument_node="">in Greek</span></span><span data-dcnode-id="4271" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4272" instrument_node="">, </span></span><span data-dcnode-id="4269" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4270" instrument_node="">from which we get “aristocrat.” Ancient Persians used it to differentiate speakers of Iranian or Vedic languages from people who spoke other languages, and also as a marker of high status. For Darius, it’s a boast about his high birth, not about his melanin quota; when he says “I’m an Aryan” he’s saying “I’m a part of the elite of the Iranian-speaking world.”</span></span></p><span data-dcnode-id="4267" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4246" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4265" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4266" instrument_node="">The “racial” connotation shows up millennia later, thanks to the unfortunate influence of </span></span><span class="q-inline" data-dcnode-id="4258" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_de_Gobineau" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="4264" instrument_node="">Arthur de Gobineau</span></a><span class="q-inlineBlock" data-dcnode-id="4259" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4260"><svg data-dcnode-id="4261" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4262" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4256" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4257" instrument_node=""> in the 1800’s. Gobineau, a reactionary defender of aristocracy — noted the fact that the root of “Aryan” is the word for “noble” or “excellent” and decided that Aryans were a racial grouping of “superior” peoples. This idea took a detour through </span></span><span class="q-inline" data-dcnode-id="4249" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.express.co.uk/news/world/444076/The-Nazis-search-for-Atlantis-and-the-Holy-Grail" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.express.co.uk"><span data-dcnode-id="4255" instrument_node="">bizarre Nazi theories about Atlantis</span></a><span class="q-inlineBlock" data-dcnode-id="4250" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4251"><svg data-dcnode-id="4252" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4253" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4247" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4248" instrument_node=""> and eventually you get the modern idea that “Aryan” and “bottle blond” were equivalent.</span></span></p><span data-dcnode-id="4245" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4234" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4243" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4244" instrument_node="">Nevertheless, even the Nazi’s didn’t forget who the original Aryans were: they</span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/What-did-Hitler-think-about-Iranians-Persians/answer/Pasha-Damirchi%3Fch%3D10%26share%3D4af2c25f%26srid%3DzLvM" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="4242" instrument_node=""> awarded “Aryan” status in their own sense to 20th century Iranians.</span></a><span data-dcnode-id="4239" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4240" instrument_node=""> When you find yourself being </span></span><span data-dcnode-id="4237" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4238" instrument_node="">less inclusive than Hitler,</span></span><span data-dcnode-id="4235" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4236" instrument_node=""> that’s probably a good sign you’re pursuing a bad theory.</span></span></p><span data-dcnode-id="4233" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4208" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4231" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4232" instrument_node="">Leaving aside bad racial theories from the past, there’s a very interesting laboratory experiment you can use to address this question. The </span></span><span class="q-inline" data-dcnode-id="4224" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parsis" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="4230" instrument_node="">Parsee community in India</span></a><span class="q-inlineBlock" data-dcnode-id="4225" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4226"><svg data-dcnode-id="4227" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4228" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4222" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4223" instrument_node="">, which was formed by refugees from Persia fleeing the Islamic conquest after the 8th century, is kind of a time capsule letting us see what the genetic makeup of Persia looked like a thousand years ago. The Parsees practice </span></span><span data-dcnode-id="4220" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4221" instrument_node="">very</span></span><span data-dcnode-id="4218" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4219" instrument_node=""> strict endogamy — that is, they don’t marry outside their own community. It turns out that, even though they’ve been living in India for more than a thousand years, they are actually </span></span><span class="q-inline" data-dcnode-id="4211" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//genomebiology.biomedcentral.com/articles/10.1186/s13059-017-1244-9" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="genomebiology.biomedcentral.com"><span data-dcnode-id="4217" instrument_node="">genetically closer to the Neolithic population of Persia than many modern Iranians</span></a><span class="q-inlineBlock" data-dcnode-id="4212" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4213"><svg data-dcnode-id="4214" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4215" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4209" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4210" instrument_node="">, having less admixture from the west and south. But there’s clear continuity between modern Iranians, the bottled-in-time Parsee community, and the evidence for the pre-historic populations of the Iranian plateau, particularly in the north and east.</span></span></p><span data-dcnode-id="4207" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4204" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4205" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4206" instrument_node="">And no, they don’t look very closely related to Africans.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4201" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4202" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4203" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-113ed4b12379db734d9b4d7b566a1d06-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4191" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4199" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4200" instrument_node="">Photo: </span></span><span class="q-inline" data-dcnode-id="4192" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parsikhabar.net/heritage/dna-proves-parsis-link-to-iran/15455/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: italic; background: none;" target="_blank" title="parsikhabar.net"><span data-dcnode-id="4198" instrument_node="">Parsikhabar.net</span></a><span class="q-inlineBlock" data-dcnode-id="4193" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4194"><svg data-dcnode-id="4195" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4196" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="4190" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4187" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4188" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4189" instrument_node="">If you want the usual string of pictures that accompany these kinds of questions, it’s hard to find contemporary depictions of Persians that would satisfy. There’s a lot of uncolored statuary from the Achaemenid Era (550–330 BC) but not much colored stuff until the Parthian period a couple of hundred years after Alexander the Great’s conquest.</span></span></p><span data-dcnode-id="4186" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4183" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4184" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4185" instrument_node="">The famous faience tiles from Persepolis might satisfy a fan of the “Black Persian” hypothesis:</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4180" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4181" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4182" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-43bb8717ed3694cb361946c9ab2c2500-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4170" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="4173" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/03/12/arts/persian-collections-louvre-susa.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: italic; background: none;" target="_blank" title="www.nytimes.com"><span data-dcnode-id="4179" instrument_node="">This picture from the New York Times </span></a><span class="q-inlineBlock" data-dcnode-id="4174" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4175"><svg data-dcnode-id="4176" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4177" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4171" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4172" instrument_node="">shows a modern audience with a frieze of Persian archers from the imperial palace at Persepolis, now in the Louvre Museum.</span></span></p><span data-dcnode-id="4169" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4166" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4167" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4168" instrument_node="">Some scholars think these archers are Elamites, rather than Persians (the Elamites are a distinct group in antiquity, centered along what’s now the southern part of the Iran-Iraq border). In any event, this piece certainly doesn’t look like fair-skinned people — whether that’s ‘black’ in your eyes is up to you.</span></span></p><span data-dcnode-id="4165" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4162" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4163" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4164" instrument_node="">On the other hand, the archers are a bit of an anomaly. The same archaeological site provides a good example of how Persian artists saw the difference between themselves and Africans. Here’s a court official (at right) leading a delegation bringing tribute to the Persian empire from the kingdom of Kush, in what’s now Sudan, on the southern border of Persian-controlled Egypt. The difference in height is probably exaggerated, but the artist certainly trying to portray these folks as quite distinct (his effort at depicting the giraffe, at left, is… interesting…).</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4158" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4159"><div class="q-box unzoomed" data-dcnode-id="4160" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4161" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-fee7c015464d80abdea98aebcf539c7d-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4148" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4156" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4157" instrument_node="">Kushite tributaries bringing gifts to the Persian court, from the Apadana at Persepolis, some time after 525 BC. Photo: </span></span><span class="q-inline" data-dcnode-id="4149" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pbase.com/rjstone/image/153898994" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: italic; background: none;" target="_blank" title="pbase.com"><span data-dcnode-id="4155" instrument_node="">Richard Stone</span></a><span y-through-history" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3901" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="3902" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="3903" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="3904" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3905" style="box-sizing: border-box;"><span data-dcnode-id="3906" style="background: none;"><span data-dcnode-id="3907" instrument_node="">Why didn't Persians practice slavery through history?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3446" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="3447" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3448" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="3893" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="3449" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="3865" style="box-sizing: border-
