a-dcnode-id="3228" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3229" instrument_node="">But </span></span><span data-dcnode-id="3226" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3227" instrument_node="">Aurangzeb</span></span><span data-dcnode-id="3224" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3225" instrument_node=""> was totally different from them.</span></span></p><span data-dcnode-id="3222" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3219" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3220" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3221" instrument_node="">*WARNING*</span></span></p><span data-dcnode-id="3218" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3215" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3216" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3217" instrument_node="">VIOLENT AND EXPLICIT CONTENT AHEAD</span></span></p><span data-dcnode-id="3214" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3211" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3212" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3213" instrument_node="">He ruled over most of the Indian subcontinent. His reign lasted for 49 years from 1658 until his death in 1707. During this time, Aurangzeb greatly expanded the territory of the Mughal Empire. He was constantly at war.Victories in the south expanded the Empire to more than 3.2 million square kilometres.</span></span></p><span data-dcnode-id="3210" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3207" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3208" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3209" instrument_node="">The sixth Mughal emperor was Mumtaz Mahal and Shah Jahan’s sixth child. He was born in Dahod, Gujarat during November 1618.</span></span></p><span data-dcnode-id="3206" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3203" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3204" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3205" instrument_node="">Out of four sons, Murad Bakhsh, Aurangzeb, Shah Shuja and Dara Shikoh, records suggest that Shah Jahan was close to Dara Shikoh.</span></span></p><span data-dcnode-id="3202" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3199" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3200" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3201" instrument_node="">Evilness and hatred for some:</span></span></p><span data-dcnode-id="3198" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3195" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3196" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3197" instrument_node="">Some records would compel you to compare Aurangzeb’s rule with that of the Islamic State’s current rule in Iraq and Syria. It was a terror for non-Muslims. His main targets were Brahmins. Many temples, schools, non-Muslim religious places were destroyed on his instructions. Around 60,000 temples were destroyed by the Muslim ruler and the list also included Somnath temple, Kesava Deo temple, as well as the Kashi Vishwanath temple. Aurangzeb ordered his Subahdars to construct large mosques after destroying Hindu religious places.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3192" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3193" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3194" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-e41d0b2198528cddbf5846e331262bbe-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3189" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3190" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3191" instrument_node="">Now comes the most brutal part of his rule:</span></span></p><span data-dcnode-id="3188" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3185" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3186" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3187" instrument_node="">Libtards often say that almost all the rulers had executed some of their opponents during their rule. Nope, Aurangzeb did not simply execute his opponents, but he BRUTALLY TORTURED them in such a way that death would seem better.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3182" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3183" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-7f5fe2f15f59586f6eccfb17769ec8d9-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="3181" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="3178" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3179" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-bc9d3fb704d51231f182782bcb45c110-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="3177" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="3174" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3175" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3176" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-b54c37b9c67c02accf3bd566ef7377aa-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3171" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3172" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3173" instrument_node="">Not just his own brothers, but the Muslim ruler even poisoned and killed his nephew Sulaiman Shikoh. Aurangzeb’s cruelty can be seen in the way Maratha Emperor Sambhaji and 9th Sikh Guru Tegh Bahadur were executed by him.</span></span></p><span data-dcnode-id="3170" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3167" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3168" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3169" instrument_node="">Hindus all over the country were forced to accept Islam and were harassed for not doing so. Thus, Hindus approached Sikh Guru Tegh Bahadur to intervene and help. The Sikh Guru urged the Muslim ruler to stop harassing people. Instead of considering his suggestion, libtards’ hero Aurangzeb arrested the Guru and forced him to accept Islam. When he refused to do so, Aurangzeb tortured Guru’s colleagues and beheaded the Guru in public during November 1675.</span></span></p><span data-dcnode-id="3166" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3163" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3164" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3165" instrument_node="">The way he tortured Chhatrapati Sambhaji and Kavi Kailash is totally inhuman.Both were taken into custody by Mughal forces after 1687s Wai battle. Their eyes, tongue, and all nails were plucked out. Their skin was peeled. Records suggest that Chhatrapati Sambhaji was beheaded and his body was cut into pieces with metal tiger claws.</span></span></p><span data-dcnode-id="3162" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3159" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3160" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3161" instrument_node="">Hope we don't get to see such ruler again for our country and also for any other nation.</span></span></p><span data-dcnode-id="3158" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3155" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3156" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3157" instrument_node="">Edit1: oh god! 300+ upvotes and 3k+ views!None of my answers have even reached till this benchmark …Thanks everyone for your support.. I'll try to deliver better answers in the coming future…Thanks again and Happy Diwali!:-)</span></span></p><span data-dcnode-id="3154" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3149" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3152" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3153" instrument_node="">VRT</span></s d="3020" style="box-sizing: border-box;"><span data-dcnode-id="3021" style="background: none;"><span data-dcnode-id="3022" instrument_node="">How did slavery in Persia help in the rise of Islam and the end to the Persian Empire?</span></span></span></div></div></div></div></a></span></span></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2994" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit; cursor: initial;" tabindex="-1" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="2995" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2997" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2998"><span class="q-box qu-userSelect--text" data-dcnode-id="2999" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3008" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3009" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3010" instrument_node="">Persian empire was built on the backbone of slavery and class based divided society. It was a heaven for small percentage of high class people but a hell for majority of people.</span></span></p><span data-dcnode-id="3007" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3004" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3005" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3006" instrument_node="">It was a matter of time to see these people rising up against the injustice. They started to rebel against the slave traders and all those high class Persians.</span></span></p><span data-dcnode-id="3003" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3000" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3001" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3002" instrument_node="">Rise of Islam was a direct result of such rebellion. Islamic prophet was one from the same people who suffered injustice.</span></span></p></span></span></div><div data-dcnode-id="2996"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="2979" style="box-sizing: border-box;"><span data-dcnode-id="2980"><span class="q-box qu-display--none" data-dcnode-id="2992" style="box-sizing: border-box;"></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 bxBZxD" data-dcnode-id="2989"><span data-dcnode-id="2991" instrument_node="">47</span><span data-dcnode-id="2990" instrument_node=""> views</span></span><span class="q-box qu-display--none" data-dcnode-id="2987" style="box-sizing: border-box;"><span data-dcnode-id="2988" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="2984"><div class="q-click-wrapper qu-display--inline-block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2985" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><span data-dcnode-id="2986" instrument_node="">View upvotes</span></div></span><span c ejgusd" data-dcnode-id="2802" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2803" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2804" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="2805" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2806" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2823" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2824" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2825" instrument_node="">Part of the ancient Greek disdain for the “barbarians” or non-Greeks, whose royalty lived ostentatiously. The other is the Greek disgust towards monarchs. Alexander knew many Greeks viewed him as no better than Darius, so he made sure he aligned himself culturally with the Greeks as a democrat and civilized.</span></span></p><span data-dcnode-id="2822" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2819" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2820" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2821" instrument_node="">For the Greeks, only a Greek is a truly free man. The rest of the world is barbarian, and barbarians by their nature are slaves to better men. That is why the Romans and Greeks preferred to make slaves out of foreigners in order to feel better about the institution-they had to treat their o</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2807" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2808" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2809" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2810" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2811" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2816" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2817" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2818" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2812" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2813"><svg data-dcnode-id="2814" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2815" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2775" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2776" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2777"><span class="q-box qu-userSelect--text" data-dcnode-id="2778" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2799" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2800" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2801" instrument_node="">Part of the ancient Greek disdain for the “barbarians” or non-Greeks, whose royalty lived ostentatiously. The other is the Greek disgust towards monarchs. Alexander knew many Greeks viewed him as no better than Darius, so he made sure he aligned himself culturally with the Greeks as a democrat and civilized.</span></span></p><span data-dcnode-id="2798" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2795" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2796" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2797" instrument_node="">For the Greeks, only a Greek is a truly free man. The rest of the world is barbarian, and barbarians by their nature are slaves to better men. That is why the Romans and Greeks preferred to make slaves out of foreigners in order to feel better about the institution-they had to treat their own people with a lot more respect or be considered cruel. Ethnic stereotypes, as always, justified abuse.</span></span></p><span data-dcnode-id="2794" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2791" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2792" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2793" instrument_node="">In this case, Alexander argued that the barbarians of Persia were not fit to run free, as they would only cause chaos and despotism. They would have to be controlled by their betters, the Greeks.</span></span></p><span data-dcnode-id="2790" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2787" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2788" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2789" instrument_node="">The Greeks believed in limited democracy and oligarchy-at least some citizens deserved a right to participate in government, and never would one ruler hold domain. In Sparta, the most authoritarian city state that kept their monarchy, there was still an assembly and a complex system of checks and balances to keep free citizens and picked men still relevant, and there would be two kings to balance each other’s decisions. Phillip and Alexander were denounced by many as barbarians for being absolute monarchs.</span></span></p><span data-dcnode-id="2786" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2779" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2784" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2785" instrument_node="">One of the most despised practices was the Persian custom of </span></span><span data-dcnode-id="2782" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2783" instrument_node="">Proskynesis </span></span><span data-dcnode-id="2780" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2781" instrument_node="">to the King of Kings, acknowledging him as blessed representative of Ahura Mazda. The Greeks thought it disgusting that a mortal was given the reverence they assigned gods, as even priests and kings were not considered to be in the favor of the gods by their position. They simplified the Persian system greatly as part of their stereotype. The Greeks thus came up with the idea that the Persians thought their King was actually a god, and that all his subjects were slaves to him. This completely simplifies the complex Persian hierarchy, theology, and the rights of Persian subjects, but that is how the Greeks saw any kind of absolute rule.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2702" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2703" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2704" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems-- " style="box-sizing: border-box; position: relative;"><div class="q-flex qu-justifyContent--space-between" data-dcnode-id="1901" style="box-sizing: border-box; display: flex; min-height: 100px;"><div class="q-relative qu-overflow--hidden" data-dcnode-id="1916" style="box-sizing: border-box; position: relative; flex: 0 0 100px;"><div class="q-box qu-bg--darken" data-dcnode-id="1918" style="box-sizing: border-box; background-image: url(&quot;https://www.iranchamber.com/images/ics_logo900x110.jpg&quot;); height: 100%; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat;"></div><div class="q-absolute qu-fullY qu-borderLeft" data-dcnode-id="1917" style="box-sizing: border-box; position: absolute; right: 0px; border-color: rgba(0, 0, 0, 0.1); z-index: 1;"></div></div><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="1902" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="1903" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="1904" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="1914" style="box-sizing: border-box;"><span data-dcnode-id="1915" instrument_node="">Women's lives in ancient Persia</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="1912" style="box-sizing: border-box;"><span data-dcnode-id="1913" instrument_node="">History of Iran Women's lives in ancient Persia By: Massoume Price A ny analysis of women's lives and status in ancient times is a very complicated task and needs time and space. This very brief article intends to provide much needed basic information based on archaeological evidence and will primarily deal with women in Achaemenid times. The material is based on Fortification and Treasury texts discovered at Persepolis (509-438 BC) and documents recovered at Susa Babylonia and other major Mesopotamian cities of the period. These texts provide us with a unique insight into the social and economic situation of both the royal and non-royal women at the time. In the texts individual women are identified, payments of rations and wages for male and female workers are documented and sealed orders by the royal women themselves or their agents gives us valuable information on how these powerful women managed their wealth. The documents clearly indicate distinctions of status between different members of the royal household. The titles used by the royal women are determined by the relationship between these women and the king. For example the King's mother had the highest rank and seems to be the head of the female members of the household. The next was the Queen (mother of the crown prince or the principal wife) followed by the kings' daughters and sisters. They all had titles with recognized authority at the court, and had their own administration for managing their considerable wealth. Funerary customs and inscriptions commemorating the death of royal women also reflect the official recognition of these women, particularly the king's mother and wife. The king was the ultimate source of authority and the royal women acted within a clearly defined spectrum of norms and standards set by the king. However within the spectrum they enjoyed economic independence, were involved in the administration of economic affairs, traveled and controlled their wealth and position by being active resolute and enterprising. The non-royals and the ordinary workers are mentioned by their rank in the specific work group or workshops they were employed. The rations they received are based on skill and the level of responsibility they assumed in the workplace. The professions are divided by gender and listed according to the amount of ration. Records indicate that some professions were undertaken by both sexes while others were restricted to either male or female workers. There are male and female supervisors at the mixed workshops as evident by the higher rations they have received with little difference in the amount of rations between the two sexes. There are also occasions where women listed in the same category as men received less rations and vice versa. Female managers have different titles presumably reflecting their level of skill and rank. The highest-ranking female workers in the texts are called arashshara (great chief). They appear repeatedly in the texts, were emp</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="1905" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="1908" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-right: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1909"><svg data-dcnode-id="1910" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-fill_as_stroke" d="M16.316 10.241c-.006-.016.017-.042.041-.066l1.103-1.098c1.351-1.363.93-3.652-.816-4.443a2.767 2.767 0 0 0-3.098.545l-3.293 3.282c-.769.784-1 1.733-.662 2.775s1.087 1.658 2.165 1.874c.15.03.304.034.461.051v1.378l-.477-.032A4.07 4.07 0 0 1 9.073 13.1c-.771-.891-1.103-1.932-.994-3.103.093-1.002.513-1.853 1.229-2.563l3.25-3.23c.859-.847 1.906-1.246 3.11-1.199a4.01 4.01 0 0 1 2.678 1.128 4.01 4.01 0 0 1 1.302 3.112 3.996 3.996 0 0 1-1.161 2.77l-1.421 1.418a.256.256 0 0 1-.032.027l-.719-1.217zm-8.784 3.697-.973.969a2.744 2.744 0 0 0-.028 3.881 2.77 2.77 0 0 0 -text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1271" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1272" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1273" instrument_node="">The Founding Fathers of the US drew much of their inspiration for building a multi-ethnic, multi-faith state from the Cyropedia:</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1267" style="box-sizing: border-box;"><div class="q-relative qu-cursor--pointer" data-dcnode-id="1268" data-embed-type="youtube" style="box-sizing: border-box; position: relative; margin-bottom: 1em;" type="youtube"><div class="q-box qu-bg--gray_ultralight" data-dcnode-id="1270" style="box-sizing: border-box; background-image: url(&quot;https://img.youtube.com/vi/NTAgTCXja4Q/0.jpg&quot;); width: 100%; box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px inset; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat; padding-top: 56.25%;" width="100%"></div><div class="q-absolute qu-full qu-zIndex--qtext_overlay" data-dcnode-id="1269" style="box-sizing: border-box; position: absolute; pointer-events: none; background: url(&quot;/static/ans_frontend_assets/images/play3.png&quot;) center center no-repeat transparent;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1264" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1265" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1266" instrument_node="">Essentially, take almost everything Hollywood says about the Persian Empire, believe the exact opposite, and you’ll be a veritable scholar in Ancient Iranian Studies.</span></span></p><span data-dcnode-id="1263" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1260" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1261" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1262" instrument_node="">I checked and good old Wikipedia has a fairly good section on the history of slavery in Iran, both during the pre-Islamic and Islamic periods. Essentially no Iranian empire “relied” on slavery in the fashion of Spartans, Romans, or the antebellum US. On the other hand, Iran’s experience with slavery isn’t as pristine as some ultra-nationalists would like to believe either:</span></span></p><span data-dcnode-id="1259" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1251" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="1252" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavery_in_Iran" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="1258" instrument_node="">Slavery in Iran</span></a><span class="q-inlineBlock" data-dcnode-id="1253" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs
