id="3882" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3883" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3884" instrument_node="">On the positive side, we do know that Persian society was more or less “feudal”; a lot of the population were “free” but bound to the land like medieval European serfs. There’s als</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3870" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3871" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3872" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3873" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3874" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3879" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3880" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3881" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3875" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3876"><svg data-dcnode-id="3877" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3878" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3450" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3451" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3452"><span class="q-box qu-userSelect--text" data-dcnode-id="3453" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3858" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3863" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3864" instrument_node="">It’s misleading say the Persian’s didn’t practice slavery or slave trading. There are a lot of internet claims about this but they reflect a mixture of a very real distinction between the Persian economy and those of the Mediterranean world and a </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Did-Cyrus-the-great-abolish-or-ban-slavery/answer/Steve-Theodore" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="3862" instrument_node="">misreading of the Cyrus Cylinder</span></a><span data-dcnode-id="3859" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3860" instrument_node=""> (a misreading which was happily fostered by the Shah of Iran, who wanted to find a “progressive” role model in pre-Islamic Persian history).</span></span></p><span data-dcnode-id="3857" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3841" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3855" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3856" instrument_node="">On the positive side, we do know that Persian society was more or less “feudal”; a lot of the population were “free” but bound to the land like medieval European serfs. There’s also good bit of evidence — literary and archaeological — that suggests that the Persians (or more precisely </span></span><span data-dcnode-id="3853" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3854" instrument_node="">one part of Persia, </span></span><span data-dcnode-id="3851" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3852" instrument_node="">the region of </span></span><span class="q-inline" data-dcnode-id="3844" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persepolis_Administrative_Archives" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3850" instrument_node="">Persepolis </span></a><span class="q-inlineBlock" data-dcnode-id="3845" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3846"><svg data-dcnode-id="3847" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3848" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3842" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3843" instrument_node="">for which we have some archival material) did not rely on slaves to the same extent as Greeks, Romans, or Mesopotamians did. That much is pretty uncontroversial</span></span></p><span data-dcnode-id="3840" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3833" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3838" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3839" instrument_node="">Still: there was slavery in the Persian empire. There’s a </span></span><span data-dcnode-id="3836" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3837" instrument_node="">lot </span></span><span data-dcnode-id="3834" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3835" instrument_node="">of evidence over several hundred years, across all three incarnations of the Persian empire.</span></span></p><span data-dcnode-id="3832" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3829" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3830" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3831" instrument_node="">Achaemenids</span></span></p><span data-dcnode-id="3828" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3825" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3826" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3827" instrument_node="">In the Achaemenid empire there are a number of accounts of Persians taking slaves. For example, here’s this from Herodotus:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3820" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3822" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3823" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3824" instrument_node="">All this now came upon the Milesians; for the most part of their men were slain by the long-haired Persians, and their women and children were accounted as slaves, and the temple at Didyma with its shrine and place of divination was plundered and burnt.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3821" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3812" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="3813" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//penelope.uchicago.edu/Thayer/E/Roman/Texts/Herodotus/6A%2A.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="penelope.uchicago.edu"><span data-dcnode-id="3819" instrument_node="">6.19</span></a><span class="q-inlineBlock" data-dcnode-id="3814" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3815"><svg data-dcnode-id="3816" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3817" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="3811" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3808" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3809" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3810" instrument_node="">People who want to believe in Persian abolitionism dismiss this (and several other stories involving mass enslavement of captured Greek cities) as “propaganda.” That’s an entirely anachronistic way to to look at it: what kind of propaganda value this would have for a Greek audience who regarded slavery as a normal consequence of warfare? It’s hardly some kind of uniquely Persian vice in their eyes, and it’s passed along without comment time after time.</span></span></p><span data-dcnode-id="3807" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3804" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3805" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3806" instrument_node="">This isn’t in any way unique, either; similar stories crop up all over Herodotus (again, without being particularly highlighted). When Persian satrap Oroetes murders Polycrates of Samos, he takes his followers as slaves:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3799" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3801" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3802" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3803" instrument_node="">Oroetes then crucified him; as for the Samians in his retinue he let them go, bidding them thank Oroetes for their freedom; those who were not Samians, or were servants of Polycrates' followers, he kept for slaves.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3800" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3791" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="3792" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//penelope.uchicago.edu/Thayer/E/Roman/Texts/Herodotus/3e%2A.html%23127" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="penelope.uchicago.edu"><span data-dcnode-id="3798" instrument_node="">3.126</span></a><span class="q-inlineBlock" data-dcnode-id="3793" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3794"><svg data-dcnode-id="3795" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3796" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="3790" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3787" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3788" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3789" instrument_node="">But when Darius has Oroetes killed, he still keeps Oroetes’ slaves:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3782" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3784" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3785" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3786" instrument_node="">Oroetes' slaves and other possessions were brought to Susa. Not long after this, it happened that Darius, one morning, while hunting, twisted his foot in dismounting from his horse, so violently that the ball of the ankle joint was dislocated from its socket. Darius called in the first physicians of Egypt,α whom he had till now kept near his person; who, by their forcible wrenching of the foot, did but make the hurt worse; and seven days and nights the king could get no sleep for the pain. On the eighth day he was in very evil case; then someone, who had heard in Sardis of the skill of Democedes of Croton, told the king of him. Darius bade Democedes be brought to him without delay. Finding the physician somewhere all unregarded and forgotten among Oroetes' slaves, they brought him into view, dragging his chains and clad in rags.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3783" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3774" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="3775" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//penelope.uchicago.edu/Thayer/E/Roman/Texts/Herodotus/3e%2A.html%23127" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="penelope.uchicago.edu"><span data-dcnode-id="3781" instrument_node="">3.129</span></a><span class="q-inlineBlock" data-dcnode-id="3776" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3777"><svg data-dcnode-id="3778" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3779" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="3773" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3761" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3771" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3772" instrument_node="">In a similar vein Herodotus tells</span></span><span class="q-inline" data-dcnode-id="3764" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.perseus.tufts.edu/hopper/text%3Fdoc%3DPerseus%253Atext%253A1999.01.0126%253Abook%253D8%253Achapter%253D105" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.perseus.tufts.edu"><span data-dcnode-id="3770" instrument_node=""> the story of Hermotimus of Pedasa,</span></a><span class="q-inlineBlock" data-dcnode-id="3765" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3766"><svg data-dcnode-id="3767" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3768" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3762" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3763" instrument_node=""> a young Carian who was castrated and sold to the Persian king as a eunuch. He eventually rose to a position of power at court and used his position to wreak revenge upon the man who had enslaved him.</span></span></p><span data-dcnode-id="3760" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3751" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3758" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3759" instrument_node="">But even if you want to read all of </span></span><span data-dcnode-id="3756" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3757" instrument_node="">that</span></span><span data-dcnode-id="3754" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3755" instrument_node=""> as propaganda there’s really no good explanation for these first-hand observations from Xenophon’s </span></span><span data-dcnode-id="3752" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3753" instrument_node="">Anabasis</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3746" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3748" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3749" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3750" instrument_node="">Cyrus [the younger] presented him with the customary royal gifts—to wit, a horse with a gold bit, a necklace of gold, a gold bracelet, and a gold scimitar, a Persian dress, and lastly, the exemption of his territory from further pillage, with the privilege of taking back the slaves that had been seized, wherever they might chance to come upon them.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3747" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3738" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="3739" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//perseus.uchicago.edu/perseus-cgi/citequery3.pl%3Fdbname%3DGreekFeb2011%26getid%3D1%26query%3DXen.%2520An.%25201.2.23" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="perseus.uchicago.edu"><span data-dcnode-id="3745" instrument_node="">1.2.27</span></a><span class="q-inlineBlock" data-dcnode-id="3740" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3741"><svg data-dcnode-id="3742" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3743" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="3737" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3734" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3735" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3736" instrument_node="">and</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3729" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3731" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3732" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3733" instrument_node="">In these villages they remained three days, and a deputation from the great king arrived—Tissaphernes and the king's brother-in-law and three other Persians—with a retinue of many slaves.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3730" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3721" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="3722" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//perseus.uchicago.edu/perseus-cgi/citequery3.pl%3Fdbname%3DGreekFeb2011%26query%3DXen.%2520An.%25202.3.16%26getid%3D1" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="perseus.uchicago.edu"><span data-dcnode-id="3728" instrument_node="">2.3.17</span></a><span class="q-inlineBlock" data-dcnode-id="3723" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3724"><svg data-dcnode-id="3725" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3726" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="3720" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3717" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3718" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3719" instrument_node="">There’s also things like the fact that Babylon’s annual tribute to Persia included 500 castrated boys — a form of taxation which makes no sense at all if those boys were free to turn around and go home whenever they chose.</span></span></p><span data-dcnode-id="3716" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3705" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3714" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3715" instrument_node="">It is worth pointing out that this doesn’t proves that the Persians practiced slavery on the same </span></span><span data-dcnode-id="3712" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3713" instrument_node="">scale</span></span><span data-dcnode-id="3710" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3711" instrument_node=""> as their neighbors. But that’s a very different claim than the often repeated but never documented claim that they actually </span></span><span data-dcnode-id="3708" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3709" instrument_node="">abolished</span></span><span data-dcnode-id="3706" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3707" instrument_node=""> slavery in their domains. We know from innumerable pieces of of evidence — literary and archaeological — that Greeks and Lydians and Babylonians and Phoenicians and many other subject peoples still practiced slavery under the Persian empire without hindrance from the Persian authorities.</span></span></p><span data-dcnode-id="3704" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3692" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3702" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3703" instrument_node="">Greek sources are the most accessible evidence, but they aren’t the only examples. For example the biblical book of Esther is set in Persia, and Esther is attended both by female slaves and eunuchs. In the biblical book of Nehemiah — </span></span><span class="q-inline" data-dcnode-id="3695" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nehemiah" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3701" instrument_node="">who was governor of Judaea under Artaxerxes I</span></a><span class="q-inlineBlock" data-dcnode-id="3696" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3697"><svg data-dcnode-id="3698" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3699" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3693" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3694" instrument_node=""> — poor Israelites are reduced to selling their children into slavery.</span></span></p><span data-dcnode-id="3691" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3670" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3689" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3690" instrument_node="">We have very little documentary evidence from the Achaemenid empire but, we do have things like cuneiform documents from this period include </span></span><span class="q-inline" data-dcnode-id="3682" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.iranicaonline.org/articles/barda-i" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.iranicaonline.org"><span data-dcnode-id="3688" instrument_node="">records of slave sales</span></a><span class="q-inlineBlock" data-dcnode-id="3683" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3684"><svg data-dcnode-id="3685" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3686" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3680" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3681" instrument_node=""> including Persian buyers and sellers, and even slaves with Persian-sounding names. There’s </span></span><span class="q-inline" data-dcnode-id="3673" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academia.edu/23572293/Registration_and_Taxation_of_Slave_Sales_in_Achaemenid_Babylonia_ZA_79_1989_" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.academia.edu"><span data-dcnode-id="3679" instrument_node="">good evidence for the Persian imperial government collecting taxes on the sale of slaves</span></a><span class="q-inlineBlock" data-dcnode-id="3674" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3675"><svg data-dcnode-id="3676" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3677" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3671" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3672" instrument_node="">, so it’s not an example of some kind of surreptitious underground trade.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3666" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3667"><div class="q-box unzoomed" data-dcnode-id="3668" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3669" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-b5e3823e9af552c31a25060e4efc06d1-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3656" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3664" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3665" instrument_node="">A slave-sale contract from the archives of the Babylonian firm of Egibi. The Egibi archives include slaves from as far away as Gandhara in modern Pakistan — people who could never have reached Babylon if the Persians did not permit slave trading through the Persian heartland. Image: </span></span><span class="q-inline" data-dcnode-id="3657" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/art/collection/search/321545" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: italic; background: none;" target="_blank" title="www.metmuseum.org"><span data-dcnode-id="3663" instrument_node="">Metropolitan Museum</span></a><span class="q-inlineBlock" data-dcnode-id="3658" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3659"><svg data-dcnode-id="3660" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3661" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="3655" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3643" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3653" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3654" instrument_node="">Above all — surprisingly, given how few private Persian documents actually survive from this period — we even have first-person evidence: </span></span><span class="q-inline" data-dcnode-id="3646" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayback.archive-it.org/org-467/20190828083642/http%3A/arshama.bodleian.ox.ac.uk" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="wayback.archive-it.org"><span data-dcnode-id="3652" instrument_node="">the letters of the Persian nobleman Aršama</span></a><span class="q-inlineBlock" data-dcnode-id="3647" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3648"><svg data-dcnode-id="3649" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3650" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3644" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3645" instrument_node="">, a satrap of Egypt in the fifth century BC make it pretty obvious:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3638" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3640" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3641" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3642" instrument_node="">From Aršama to Artavanta (‘Artahanta’). I send yo[u] (wishes for) much peace and strength! And now, (there is) peace in this (place) before me. 2. May there also be peace there before y[o]u. And now: there are Cili[cian] men, my slaves, in Egypt: 3. (he) whose name is Pariyama, (he) whose name is Ammuwana, (he) whose name is Saraka, (he) whose [n]ame is TʿNDY, [] (he) whose name is [….]MY, (he) whose name is Sadasbinazi 4. [] (he) whose name is I[nda]ma (?), (he) whose name is Sarmanazi, (he) whose name is Kaʾ, (he) whose name is Bagafarnah, (he) whose name is Piyatarunazi, (he) whose name is Asmaraupa, (he) whose name is Muwasarma, (In) all, 13 men. They were appointed (as) pressers among my domains which are in Upper and Lower (Egypt). After, when Egypt rebelled, and the (armed) force were garrisoned, then that Pariyama and his companions were not able to enter into the fortress. After, the wicked [I]n[ḥ]arou seized them, (and) they were with him. Now, if (it seems) like a good thing to you, let an order be issued by you, so that a person should not do anything bad to that Pariyama and his companions. Let them be released. Let them do my work as previously</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3639" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3628" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="3631" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayback.archive-it.org/org-467/20190828084246/http%3A//blogs.bodleian.ox.ac.uk/wp-content/uploads/sites/116/2013/10/Volume-2-text-and-translation-interleaved-20.1.14.pdf" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="wayback.archive-it.org"><span data-dcnode-id="3637" instrument_node="">T.AD.6.7</span></a><span class="q-inlineBlock" data-dcnode-id="3632" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3633"><svg data-dcnode-id="3634" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3635" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3629" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3630" instrument_node="">. You’ll note that both Aršama and Artavanta are Persians.</span></span></p><span data-dcnode-id="3627" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3611" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3625" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3626" instrument_node="">It’s also worth remembering that slavery doesn’t just mean whip-cracking labor in the fields or the mines. Persian men had both wives and concubines, and the latter were frequently slaves. For example the poor Greek girl </span></span><span class="q-inline" data-dcnode-id="3618" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//penelope.uchicago.edu/aelian/varhist12.xhtml" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="penelope.uchicago.edu"><span data-dcnode-id="3624" instrument_node="">Aspasia</span></a><span class="q-inlineBlock" data-dcnode-id="3619" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3620"><svg data-dcnode-id="3621" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3622" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3616" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3617" instrument_node=""> ended up in the harem of Cyrus the Younger “not willingly nor with the consent of her father, but by compulsion, as it often happens upon the taking of cities.” Now, the story makes a big deal of the way that Cyrus became besotted with her and showered her with gifts — but that is hardly typical of a system where young women are carted off into the embraces of powerful men by force. After Cyrus’ death, she found her way into the good graces of Artaxerxes — by comforting him for the death of his </span></span><span data-dcnode-id="3614" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3615" instrument_node="">own </span></span><span data-dcnode-id="3612" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3613" instrument_node="">favorite slave lover, a eunuch boy named Tiridates.</span></span></p><span data-dcnode-id="3610" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3607" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3608" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3609" instrument_node="">Parthian Period</span></span></p><span data-dcnode-id="3606" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3603" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3604" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3605" instrument_node="">There’s also good evidence for slavery in the Parthian period.</span></span></p><span data-dcnode-id="3602" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3590" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3600" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3601" instrument_node="">The most famous example is the 10,000 or so Roman survivors of the battle of Carrhae who were enslaved and deported to Bactria. But the most picturesque example is the slave girl who became empress of the Parthian realm: </span></span><span class="q-inline" data-dcnode-id="3593" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Musa_of_Parthia" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3599" instrument_node="">Musa of Parthia</span></a><span class="q-inlineBlock" data-dcnode-id="3594" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3595"><svg data-dcnode-id="3596" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3597" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3591" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3592" instrument_node=""> was an Italian slave — a gift of the emperor Augustus — who charmed Phraates IV into marrying her… at least, until she had him poisoned and ruled as regent with her young son Phraates V.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3586" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3587"><div class="q-box unzoomed" data-dcnode-id="3588" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3589" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-cb0964d617ae872b45f08d527a5033ad-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3583" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3584" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3585" instrument_node="">Phraates (left) and Musa (right)</span></span></p><span data-dcnode-id="3582" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3570" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3580" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3581" instrument_node="">There’s also the Parthian viceroy Himerus, who (according to </span></span><span class="q-inline" data-dcnode-id="3573" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//attalus.org/translate/diodorus34.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="attalus.org"><span data-dcnode-id="3579" instrument_node="">Diodorus</span></a><span class="q-inlineBlock" data-dcnode-id="3574" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3575"><svg data-dcnode-id="3576" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3577" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3571" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3572" instrument_node="">)</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3565" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3567" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3568" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3569" instrument_node="">enslaved many of the Babylonians, upon slight pretexts, along with their whole families, and sent them into Media to be sold as booty. He also burnt to the ground the market-place, and some of the temples in Babylon; and destroyed the best part of the city.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3566" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3562" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3563" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3564" instrument_node="">Himerus was a Hyrcanian, so perhaps his vices reflect the behavior of his rough-and-ready origins — but he’s taking his victims to Media, in the heartland of the empire, not west to Mediterranean markets.</span></span></p><span data-dcnode-id="3561" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3549" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3559" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3560" instrument_node="">It appears that the Parthians particularly used slaves in their mines:</span></span><span class="q-inline" data-dcnode-id="3552" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/9/4/2026.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.bartleby.com"><span data-dcnode-id="3558" instrument_node=""> Pliny the Younger writes to the emperor Trajan</span></a><span class="q-inlineBlock" data-dcnode-id="3553" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3554"><svg data-dcnode-id="3555" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3556" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3550" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3551" instrument_node=""> (letter XXVI) about an encounter with a Greek named Callidromos who escaped from a Parthian mine. Interestingly Callidromos was not captured in war, but sent to the Parthian king Pacorus by Decebalus, the king of the Dacians — evidence for an international movement of slaves between the Balkans and Persia, independent of Rome. Pliny enclosed with the letter a small nugget of gold which the escaped slave had smuggled out of the mine.</span></span></p><span data-dcnode-id="3548" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3545" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3546" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3547" instrument_node="">Sassanian Period</span></span></p><span data-dcnode-id="3544" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3525" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3542" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3543" instrument_node="">Slavery is well </span></span><span class="q-inline" data-dcnode-id="3535" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.iranicaonline.org/articles/barda-ii" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.iranicaonline.org"><span data-dcnode-id="3541" instrument_node="">attested in Sassanian law</span></a><span class="q-inlineBlock" data-dcnode-id="3536" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3537"><svg data-dcnode-id="3538" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3539" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3533" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3534" instrument_node=""> — for which, unlike previous eras, we have a reasonable number of Iranian sources. The martial exploits of the Sassanids generated a lot of captives, who ended up as slaves. For example, Shapur I boasted in </span></span><span class="q-inline" data-dcnode-id="3526" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//parthiansources.com/texts/skz/skz-translation/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="parthiansources.com"><span data-dcnode-id="3532" instrument_node="">his inscription at Naqsh-i-Rustam:</span></a><span class="q-inlineBlock" data-dcnode-id="3527" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3528"><svg data-dcnode-id="3529" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3530" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3520" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3522" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3523" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3524" instrument_node="">And the men, who from the land of the Romans, from not-Iran, were led back as spoils, into Iran, into Persis, Parthia, Xuzestan, Asurestan and the other lands, land by land, where settlements were established by me and my father and forebearers and ancestors, there they were settled.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3521" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3509" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3518" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3519" instrument_node="">Thus </span></span><span data-dcnode-id="3516" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3517" instrument_node="">anšahrīg, </span></span><span data-dcnode-id="3514" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3515" instrument_node="">“foreigner” and </span></span><span data-dcnode-id="3512" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3513" instrument_node="">wardāg,</span></span><span data-dcnode-id="3510" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3511" instrument_node=""> “captive.” became the common ways to refer to slaves. However Sassanian slavery also encompassed people sold into slavery for debt, or who sold themselves into it voluntarily to obtain economic support.</span></span></p><span data-dcnode-id="3508" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3505" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3506" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3507" instrument_node="">The terms seem to be generally fairly humane, for a slave law-code — cruelty and mutilation were punishable with fines, for example — but it’s still slave law. It seems to have been illegal to sell an Iranian to a non-Iranian, or a Zoroastrian to a non-Zoroastrian. This is similar to (and may even be the inspiration for) similar prohibitions on the enslavement of co-religionists in Byzantine among Byzantine Christians and early Muslims.</span></span></p><span data-dcnode-id="3504" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3501" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3502" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3503" instrument_node="">Islamic Period</span></span></p><span data-dcnode-id="3500" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3497" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3498" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3499" instrument_node="">In Islamic times slavery became common in Persia.</span></span></p><span data-dcnode-id="3496" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3466" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3494" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3495" instrument_node="">The Arab Abbassid Caliphate, centered in Baghdad but including much of Persia, was a massive importer of slaves from both Africa and Europe. And the even when the Persians reasserted themselves (under the </span></span><span class="q-inline" data-dcnode-id="3487" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saffarid_dynasty" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3493" instrument_node="">Saffarids</span></a><span class="q-inlineBlock" data-dcnode-id="3488" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3489"><svg data-dcnode-id="3490" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3491" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3485" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3486" instrument_node="">, in the later 9th century) they clearly still had domestic slaves. There’s a famous story, for example, that </span></span><span class="q-inline" data-dcnode-id="3478" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ferdowsi" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3484" instrument_node="">Ferdowsi</span></a><span class="q-inlineBlock" data-dcnode-id="3479" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3480"><svg data-dcnode-id="3481" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3482" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3476" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3477" instrument_node="">, the father of classical Persian literature, was so offended at a skimpy fee given him for one of his poems that he gave the reward to the slave who had brought the money. Later on the </span></span><span class="q-inline" data-dcnode-id="3469" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safavid_dynasty%23The_Royal_Court" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3475" instrument_node="">Safavid dynasty</span></a><span class="q-inlineBlock" data-dcnode-id="3470" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3471"><svg data-dcnode-id="3472" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3473" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3467" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3468" instrument_node=""> in the 16th, 17th and 18th centuries used slave soldiers (similar to the Mamluks in Egypt) taken among Christian Georgians and pagan Circassians.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="3465" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3454" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3463" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3464" instrument_node="">All this said, it’s still worth pointing out that the Persian practice of slavery does not seem to have reached the same level of ubiquity we find in the Greco-Roman or Mesopotamian world. However there’s a world of difference between that recognition and the claim that that Persians “abolished” slavery. Our knowledge of all of this is more limited than we’d like— we don’t have much native Persian information before the Sassanians — but there’s no reason to think the Persians were so radically different from their neighbors. In addition to all of contemporary evidence already cited it’s important to remember that </span></span><span data-dcnode-id="3461" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3462" instrument_node="">no </span></span><span data-dcnode-id="3459" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3460" instrument_node="">ancient source ever says that they </span></span><span data-dcnode-id="3457" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3458" instrument_node="">didn’t</span></span><span data-dcnode-id="3455" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3456" instrument_node=""> have slaves: something that the many Greek, Roman, and Jewish sources would have found remarkable if it had been true, since it would have been a glaring exception to the behavior of all the neighboring societies.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3372" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3373" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3374" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3388" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3420" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3421" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3431" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3432" style="box-sizing: border-box; position: relative;"><button aria-label="84 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--now
