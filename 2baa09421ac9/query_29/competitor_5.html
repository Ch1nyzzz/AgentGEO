</span><h1 data-dcnode-id="1506" style="text-align: center"><u data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Queen Esther of the Bible</span></u><br data-dcnode-id="1507"></h1><span data-dcnode-id="1505" instrument_node="">
</span><span data-dcnode-id="1503" instrument_node="">
</span><span data-dcnode-id="1501" instrument_node="">
</span><a data-dcnode-id="1500" name="Queen Esther of the Bible"></a><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1496" style="font-size: 21px;font-family: 'palatino linotype','book antiqua',palatino,serif;"><b data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Queen Esther of the Bible</span></b></span><span data-dcnode-id="1495" instrument_node="">
</span></p><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Esther is one of the most beloved characters in all of the Old 
Testament. So loved is she, and so important was her role that a Feast 
was created in her honor, celebrated to this day as Purim. 

</span></p><p data-dcnode-id="1487"><span data-dcnode-id="1491" instrument_node="">Yet, the </span><b data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Book of Esther</span></b><span data-dcnode-id="1488" instrument_node=""> is the least "Jewish", or "Christian", book of the Bible, including both the Old Testament and New Testament. 

</span></p><p data-dcnode-id="1482"><span data-dcnode-id="1486" instrument_node="">The chief reason for this being the word "God" is not mentioned one time in the entire </span><b data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Book of Esther</span></b><span data-dcnode-id="1483" instrument_node="">, nor is 

</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">
</span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/history-of-jerusalem.html" onclick="return FIX.track(this);" target="_blank"><span data-dcnode-id="1479" instrument_node="">"Jerusalem"</span></a><span data-dcnode-id="1477" instrument_node="">
, "the temple", "the Law of Moses", or "Palestine" (Zodhiates, NASB Study Bible). 

</span></p><span data-dcnode-id="1475" instrument_node="">
</span><table align="left" border="0" data-dcnode-id="1462"><tbody data-dcnode-id="1463"><tr data-dcnode-id="1464"><td data-dcnode-id="1465"><span data-dcnode-id="1474" instrument_node="">
</span><span data-dcnode-id="1467" style="text-align:center; float:center; width:120px; margin:5px;"><span data-dcnode-id="1473" instrument_node="">
</span><span data-dcnode-id="1470" instrument_node="">
</span><span data-dcnode-id="1468" instrument_node="">
</span></span><span data-dcnode-id="1466" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Queen Esther of the Bible lived during the Persian Empire, thus the 
Jews of this time were spread throughout all of the vast empire and 
beyond. There was no central Jewish identity, nor was there a central 
homeland. 

</span></p><p data-dcnode-id="1451"><span data-dcnode-id="1458" instrument_node="">Spiros Zodhiates states the </span><b data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Book of Esther</span></b><span data-dcnode-id="1455" instrument_node=""> has </span><i data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">"no organic connection"</span></i><span data-dcnode-id="1452" instrument_node="">
 to the rest of the Bible. However, Zodhiates points out that many 
scholars feel this is our only view of what life was like for Jews under
 Persian rule. 

</span></p><p data-dcnode-id="1446"><span data-dcnode-id="1450" instrument_node="">The nature of the book, thus, reflects the nature of life for Jews 
during the Persian Empire. The people were disjointed, separated from 
one another, and from their </span><a data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/map-of-palestine.html" onclick="return FIX.track(this);" target="_blank"><span data-dcnode-id="1449" instrument_node="">Holy Land</span></a><span data-dcnode-id="1447" instrument_node="">. Many of these Jewish  people probably felt separated from God as well. 

</span></p><p data-dcnode-id="1441"><span data-dcnode-id="1445" instrument_node="">Women in the Bible.net has a wonderful article on Queen Esther of the Bible. In it, the author points out the </span><b data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Book of Esther</span></b><span data-dcnode-id="1442" instrument_node=""> was written for Diaspora Jews.

</span></p><span data-dcnode-id="1440" instrument_node="">
</span><a data-dcnode-id="1439" name="Map of the Persian Empire"></a><span data-dcnode-id="1438" instrument_node="">
</span><div class="ImageBlock ImageBlockLeft" data-dcnode-id="1428"><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/PersianEmpire.jpg" rel="gallery[pageGallery]" title="The Persian Empire stretched across the continent, engulfing lands &amp; peoples on its way to the West."><img alt="Map of the Persian Empire" data-dcnode-id="1437" data-pin-media="https://www.israel-a-history-of.com/images/PersianEmpire.jpg" height="249" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/xPersianEmpire.jpg.pagespeed.ic.dEJtwB8wp2.jpg&amp;raw" style="width: 343px; height: auto" title="Map of the Persian Empire" width="400"></a><div class="pinit" data-dcnode-id="1429"><span data-dcnode-id="1435" instrument_node="">
</span><a class="PIN_1651311227602_button_pin PIN_1651311227602_beside PIN_1651311227602_save PIN_1651311227602_padded" data-dcnode-id="1431" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-4&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FPersianEmpire.jpg&amp;description=The%20Persian%20Empire%20stretched%20across%20the%20continent%2C%20engulfing%20lands%20%26%20peoples%20on%20its%20way%20to%20the%20West." data-pin-log="button_pinit" data-pin-x="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DZgwrgucG1ZEb-4%26url%3Dhttp%253A%252F%252Fwww.israel-a-history-of.com%252Fqueen-esther-of-the-bible.html%26media%3Dhttps%253A%252F%252Fwww.israel-a-history-of.com%252Fimages%252FPersianEmpire.jpg%26description%3DThe%2520Persian%2520Empire%2520stretched%2520across%2520the%2520continent%252C%2520engulfing%2520lands%2520%2526%2520peoples%2520on%2520its%2520way%2520to%2520the%2520West."><span class="PIN_1651311227602_count" data-dcnode-id="1433" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-4&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FPersianEmpire.jpg&amp;description=The%20Persian%20Empire%20stretched%20across%20the%20continent%2C%20engulfing%20lands%20%26%20peoples%20on%20its%20way%20to%20the%20West." data-pin-log="button_pinit" data-pin-x="60"><span data-dcnode-id="1434" instrument_node="">60</span></span><span data-dcnode-id="1432" instrument_node="">Save</span></a><span data-dcnode-id="1430" instrument_node="">
</span></div></div><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">For those unfamiliar with the term, the Diaspora roughly refers to 
that time period beginning with the Babylonian destruction of Jerusalem 
in 586 B.C., through the Roman destruction of the Second Temple in 70 
A.D., up until the establishment of the Jewish state in 1948 A.D. 

</span></p><p data-dcnode-id="1420"><span data-dcnode-id="1424" instrument_node="">It must also be noted that prior Jews had scattered to Egypt with
 the fall of the northern kingdom of Israel in 722 B.C. by the 
Assyrians.  According to the </span><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jewishvirtuallibrary.org/index.html" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="1423" instrument_node="">Jewish Virtual Library</span></a><span data-dcnode-id="1421" instrument_node="">, the start date of the Diaspora was 597 B.C., the first deportation of Judah under Nebuchadnezzar.

</span></p><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Thus the events involving Queen Esther of the Bible were written 
to Jews living during the early years of the Diaspora. The scar from the
 Babylonian destruction of Jerusalem and their Temple was still fresh. 
Queen Esther of the Bible was an example to "all Jews of how to face 
injustice, bigotry and prejudice". 

</span></p><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Women in the Bible.net stated that Queen Esther of the Bible 
showed Jews how "they must act with courage and integrity" when faced 
with the anti-semitism which has pervaded throughout the centuries. 

</span></p><span data-dcnode-id="1415" instrument_node="">
</span><hr data-dcnode-id="1414" style="width:100%;height:1px;margin-left:auto;margin-right:auto;"><span data-dcnode-id="1413" instrument_node="">
</span><h3 data-dcnode-id="1408" style="text-align: center"><span data-dcnode-id="1410" style="font-family: 'lucida sans unicode','lucida grande',sans-serif;font-size: 20.2px;"><em data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">QUEEN ESTHER OF THE BIBLE</span></em></span><br data-dcnode-id="1409"></h3><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1403"><b data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Click on a link to view that section of Queen Esther of the Bible</span></b><span data-dcnode-id="1404" instrument_node="">.

</span></p><p data-dcnode-id="1399"><a data-dcnode-id="1401" href="#Queen%20Esther%20of%20the%20Bible" onclick="return FIX.track(this);"><span data-dcnode-id="1402" instrument_node="">The Biblical Narrative</span></a><span data-dcnode-id="1400" instrument_node="">
</span></p><span data-dcnode-id="1398" instrument_node="">
</span><a data-dcnode-id="1397" name="Ruins of Persepolis"></a><span data-dcnode-id="1396" instrument_node="">
</span><div data-dcnode-id="1363" style="overflow-x: auto;"><span data-dcnode-id="1395" instrument_node="">
</span><table border="0" class="columns_block grid_block" data-dcnode-id="1365" style="width: 100%;"><tbody data-dcnode-id="1366"><tr data-dcnode-id="1367"><td class="column_0" data-dcnode-id="1370" style="width: 99%;vertical-align:top;"><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1390"><a data-dcnode-id="1392" href="#Map%20of%20the%20Persian%20Empire" onclick="return FIX.track(this);"><span data-dcnode-id="1393" instrument_node="">Map of the Persian Empire</span></a><span data-dcnode-id="1391" instrument_node="">

</span><a data-dcnode-id="1357" name="Dating Esther in the Bible"></a><span data-dcnode-id="1356" instrument_node="">
</span><h3 data-dcnode-id="1353"><span data-dcnode-id="1354" style="font-size: 18.2px;font-family: 'palatino linotype','book antiqua',palatino,serif;"><span data-dcnode-id="1355" instrument_node="">DATING QUEEN ESTHER OF THE BIBLE</span></span></h3><span data-dcnode-id="1352" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="1342"><a data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/persepolis0.jpg" rel="gallery[pageGallery]" title="Ruins from the vast Persian capital, Persepolis. This was a large, metropolitan area with impressive wealth and grandeur."><img alt="Ruins from ancient Persepolis, capital of the Persian Empire." data-dcnode-id="1351" data-pin-media="https://www.israel-a-history-of.com/images/persepolis0.jpg" height="198" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/xpersepolis0.jpg.pagespeed.ic.bx6VH9riM2.jpg&amp;raw" style="width: 270px; height: auto" title="Ruins from ancient Persepolis, capital of the Persian Empire." width="325"></a><div class="pinit" data-dcnode-id="1343"><span data-dcnode-id="1349" instrument_node="">
</span><a class="PIN_1651311227602_button_pin PIN_1651311227602_beside PIN_1651311227602_save PIN_1651311227602_padded" data-dcnode-id="1345" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-3&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2Fpersepolis0.jpg&amp;description=Ruins%20from%20the%20vast%20Persian%20capital%2C%20Persepolis.%20This%20was%20a%20large%2C%20metropolitan%20area%20with%20impressive%20wealth%20and%20grandeur." data-pin-log="button_pinit" data-pin-x="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DZgwrgucG1ZEb-3%26url%3Dhttp%253A%252F%252Fwww.israel-a-history-of.com%252Fqueen-esther-of-the-bible.html%26media%3Dhttps%253A%252F%252Fwww.israel-a-history-of.com%252Fimages%252Fpersepolis0.jpg%26description%3DRuins%2520from%2520the%2520vast%2520Persian%2520capital%252C%2520Persepolis.%2520This%2520was%2520a%2520large%252C%2520metropolitan%2520area%2520with%2520impressive%2520wealth%2520and%2520grandeur."><span class="PIN_1651311227602_count" data-dcnode-id="1347" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-3&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2Fpersepolis0.jpg&amp;description=Ruins%20from%20the%20vast%20Persian%20capital%2C%20Persepolis.%20This%20was%20a%20large%2C%20metropolitan%20area%20with%20impressive%20wealth%20and%20grandeur." data-pin-log="button_pinit" data-pin-x="60"><span data-dcnode-id="1348" instrument_node="">60</span></span><span data-dcnode-id="1346" instrument_node="">Save</span></a><span data-dcnode-id="1344" instrument_node="">
</span></div></div><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1340" instrument_node="">As is the case in many situations regarding the Old Testament, the date of the </span><b data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Book of Esther</span></b><span data-dcnode-id="1337" instrument_node="">
 remains a subject of debate amongst scholars. Queen Esther of the Bible
 became queen to King Ahasuerus of Persia. Two theories exist regarding 
the identity of this Persian king. </span><u data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">The Septuagint</span></u><span data-dcnode-id="1334" instrument_node=""> (LXX) and </span><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/flavius-josephus.html" onclick="return FIX.track(this);" target="_blank"><span data-dcnode-id="1333" instrument_node="">Josephus</span></a><span data-dcnode-id="1331" instrument_node=""> claim this king was Artaxerxes II. He reigned in Persia from 404 - 359 B.C.

</span></p><p data-dcnode-id="1318"><span data-dcnode-id="1329" instrument_node="">Most scholars, however, agree that this king represents Xerxes I. His Persian name was </span><i data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Khshayarsha</span></i><span data-dcnode-id="1326" instrument_node="">.
  Xerxes I reigned in Persia from 486 B.C. - 464 B.C.  Queen Esther of 
the Bible is said to have ascended to the queenship in 479 B.C. This is 
founded upon </span><b data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Esther 2:16</span></b><span data-dcnode-id="1323" instrument_node="">, which states Xerxes claimed Esther queen of Persia </span><b data-dcnode-id="1320"><i data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">"in the tenth month which is the month Tebeth, in the seventh year of his reign"</span></i></b><span data-dcnode-id="1319" instrument_node="">.

</span></p><p data-dcnode-id="1314"><a data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bible-history.com/" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="1317" instrument_node="">Bible history.com</span></a><span data-dcnode-id="1315" instrument_node="">
 states Queen Esther of the Bible ascended to the queenship ca. 478 B.C.
 They have an excellent list of the Persian kings and their dates as 
well. 

</span></p><p data-dcnode-id="1303"><span data-dcnode-id="1313" instrument_node="">Two lines of thought exist on the writing of the </span><b data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Book of Esther</span></b><span data-dcnode-id="1310" instrument_node="">. Jon Bright, in his book </span><u data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">A History of Israel</span></u><span data-dcnode-id="1307" instrument_node="">, states that; </span><i data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">"Though many place it in the Maccabean period, a date late in the fourth century is not implausible"</span></i><span data-dcnode-id="1304" instrument_node="">.  

</span></p><p data-dcnode-id="1298"><span data-dcnode-id="1302" instrument_node="">Michael Grant claims the book is not based on historical fact, 
and "may" date from the "second century B.C." Yet, the date surrounding 
the </span><b data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Book of Esther</span></b><span data-dcnode-id="1299" instrument_node=""> remains uncertain and under debate. He argues no extra-biblical source mentions Queen Esther of the Bible.

</span></p><p data-dcnode-id="1293"><span data-dcnode-id="1297" instrument_node="">Similarly, the author of the </span><b data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Book of Esther</span></b><span data-dcnode-id="1294" instrument_node=""> is in 
question.  The most critical of views states it "probably originated 
among Persians and Babylonians rather than Jews" (Grant, A History of 
Israel 261). Biblical scholars claim Esther from the Bible was penned by
 either Mordecai or Nehemiah.  Either one places the date of writing 
later than the Maccabean period. 

</span></p><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Nehemiah served the successor to Xerxes I, Artaxerxes I, who 
reigned from 465 - 425 B.C.  Both Nehemiah and Mordecai had intimate 
knowledge of the Persian kingdom and culture, as both had access to the 
throne. Both were literate and well educated, and it is likely both had 
access to the royal scribes. 

</span></p><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">It is also quite possible that Nehemiah and Mordecai knew of each
 other, or at least about each other. Regardless of the author, the 
story of Esther in the Bible is a remarkable story of God's providence 
and guidance, even in times of apparent despair. 

</span></p><span data-dcnode-id="1288" instrument_node="">
</span><h4 data-dcnode-id="1285"><span data-dcnode-id="1287" instrument_node="">THE PERSIAN EMPIRE &amp; QUEEN ESTHER</span><br data-dcnode-id="1286"></h4><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1283" instrument_node="">J. McKee Adams authored a remarkable book entitled, </span><u data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Biblical Backgrounds</span></u><span data-dcnode-id="1280" instrument_node="">.
 In it he gives a detailed description of the Persian Empire. By 554 
B.C. Cyrus had effectively conquered the Persian Empire. Cyrus the Great
 was part of the Achaemenid dynasty. The Persian Empire itself would 
last until Alexander the Great came sweeping through with his army. 

</span></p><p data-dcnode-id="1274"><span data-dcnode-id="1278" instrument_node="">Queen Esther of the Bible would become queen over the largest 
empire the earth had ever seen. It stretched its fingers over the land 
formerly occupied by all of the previous world empires; Egyptian, 
Hittite, Aramean, Assyrian, and Babylonian. </span><b data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Esther 1:1</span></b><span data-dcnode-id="1275" instrument_node=""> gives an indication of the enormous size and great expanse of the Persian Empire.

</span></p><p data-dcnode-id="1269"><b data-dcnode-id="1271"><i data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">"Now it took place in the days of Ahasuerus, the Ahasuerus who reigned from India to Ethiopia, over 127 provinces."</span></i></b><span data-dcnode-id="1270" instrument_node="">
</span></p><p data-dcnode-id="1261"><span data-dcnode-id="1268" instrument_node="">Ethiopia is translated from </span><i data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Cush</span></i><span data-dcnode-id="1265" instrument_node="">. This was a great kingdom
 indeed. It's greatness was found not only in its mammoth size, but also
 in its organization. These provinces were not mere states, but rather 
large territories, as Adams points out, which covered many different 
peoples, nations and cultures.  Over these provinces was a </span><i data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Satrap</span></i><span data-dcnode-id="1262" instrument_node="">. 

</span></p><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">This was the direct representative of the king in his particular 
province. A Satrap was a great position in which one answered directly 
to the king of Persia, and exercised a great deal of independent power. 
 

</span></p><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">The relationship between Satrap and King was such that over time 
the Satraps came to be thought of as royal princes. They partook in the 
formation of state policy as well. 

</span></p><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">The Persian Empire encouraged local self-government, and this 
system of provinces and Satraps, according to Adams, promoted such rule.
  

</span></p><span data-dcnode-id="1254" instrument_node="">
</span><div data-dcnode-id="1221" style="overflow-x: auto;"><span data-dcnode-id="1253" instrument_node="">
</span><table border="0" class="columns_block grid_block" data-dcnode-id="1223" style="width: 100%;"><tbody data-dcnode-id="1224"><tr data-dcnode-id="1225"><td class="column_0" data-dcnode-id="1248" style="width: 47.1%;vertical-align:top;"><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Early in the Persian Empire Babylon was the capital. Thus the Persians 
maintained a sense of continuity during the transition from Babylonian 
rule when they initially established Babylon as their capital. 

</span></p><span data-dcnode-id="1249" instrument_node="">
</span></td><td class="column_1" data-dcnode-id="1226" style="width: 52.9%;vertical-align:top;"><span data-dcnode-id="1247" instrument_node="">
</span><a data-dcnode-id="1246" name="Map of Susa"></a><span data-dcnode-id="1245" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="1235"><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/Susa.jpg" rel="gallery[pageGallery]" title="Southern Mesopotamia was home to many great civilizations, such as the Elam &amp; the Sumerians. The region fell under Persian rule during the Persian Empire."><img alt="Map of ancient Mesopotamia under the Persian Empire." data-dcnode-id="1244" data-pin-media="https://www.israel-a-history-of.com/images/Susa.jpg" height="167" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/xSusa.jpg.pagespeed.ic.lA-FTuPKlz.jpg&amp;raw" style="width: 240px; height: auto" title="Map of ancient Mesopotamia under the Persian Empire." width="350"></a><div class="pinit" data-dcnode-id="1236"><span data-dcnode-id="1242" instrument_node="">
</span><a class="PIN_1651311227602_button_pin PIN_1651311227602_beside PIN_1651311227602_save PIN_1651311227602_padded" data-dcnode-id="1238" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-2&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FSusa.jpg&amp;description=Southern%20Mesopotamia%20was%20home%20to%20many%20great%20civilizations%2C%20such%20as%20the%20Elam%20%26%20the%20Sumerians.%20The%20region%20fell%20under%20Persian%20rule%20during%20the%20Persian%20Empire." data-pin-log="button_pinit" data-pin-x="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DZgwrgucG1ZEb-2%26url%3Dhttp%253A%252F%252Fwww.israel-a-history-of.com%252Fqueen-esther-of-the-bible.html%26media%3Dhttps%253A%252F%252Fwww.israel-a-history-of.com%252Fimages%252FSusa.jpg%26description%3DSouthern%2520Mesopotamia%2520was%2520home%2520to%2520many%2520great%2520civilizations%252C%2520such%2520as%2520the%2520Elam%2520%2526%2520the%2520Sumerians.%2520The%2520region%2520fell%2520under%2520Persian%2520rule%2520during%2520the%2520Persian%2520Empire."><span class="PIN_1651311227602_count" data-dcnode-id="1240" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-2&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FSusa.jpg&amp;description=Southern%20Mesopotamia%20was%20home%20to%20many%20great%20civilizations%2C%20such%20as%20the%20Elam%20%26%20the%20Sumerians.%20The%20region%20fell%20under%20Persian%20rule%20during%20the%20Persian%20Empire." data-pin-log="button_pinit" data-pin-x="60"><span data-dcnode-id="1241" instrument_node="">60</span></span><span data-dcnode-id="1239" instrument_node="">Save</span></a><span data-dcnode-id="1237" instrument_node="">
</span></div></div><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1228" style="text-align: center;"><span data-dcnode-id="1230" style="font-size: 9px;color: rgb(0, 0, 238);"><em data-dcnode-id="1231"><b data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">SUMER WAS HOME TO THE ANCIENT SUMERIANS. THIS AREA WOULD FALL UNDER PERSIAN RULE DURING THE PERSIAN EMPIRE.</span></b></em></span><br data-dcnode-id="1229"></p><span data-dcnode-id="1227" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1222" instrument_node="">
</span></div><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">During the reign of Cambyses, however, the capital was moved to Susa. He
 showed excellent foresight by including all of the advantages of 
Babylon, with none of the disadvantages ( Adams, Biblical Backgrounds 
134 ). The city was situated on the Ulai River, mentioned below. 

</span></p><span data-dcnode-id="1217" instrument_node="">
</span><table align="left" border="0" data-dcnode-id="1204"><tbody data-dcnode-id="1205"><tr data-dcnode-id="1206"><td data-dcnode-id="1207"><span data-dcnode-id="1216" instrument_node="">
</span><span data-dcnode-id="1209" style="text-align:center; float:center; width:120px; margin:5px;"><span data-dcnode-id="1215" instrument_node="">
</span><span data-dcnode-id="1212" instrument_node="">
</span><span data-dcnode-id="1210" instrument_node="">
</span></span><span data-dcnode-id="1208" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1202" instrument_node="">Susa was the city of Esther in the Bible. It is referred to as both 
the capital city, and the site of the royal palace. The great dream 
interpreter Daniel spoke of Susa concerning one of his visions. He gives
 an exact location within the city in </span><b data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Daniel 8:2</span></b><span data-dcnode-id="1199" instrument_node="">.

</span></p><p data-dcnode-id="1193"><b data-dcnode-id="1195"><i data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">"And I looked in the vision, and it came about while I was 
looking, that I was in the citadel of Susa, which is in the province of 
Elam; and I looked in the vision, and I myself was beside the Ulai 
Canal."</span></i></b><span data-dcnode-id="1194" instrument_node="">
</span></p><p data-dcnode-id="1181"><span data-dcnode-id="1192" instrument_node="">The word translated as </span><b data-dcnode-id="1189"><i data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">"canal"</span></i></b><span data-dcnode-id="1188" instrument_node=""> may also be translated as </span><i data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">"river"</span></i><span data-dcnode-id="1185" instrument_node="">.
  Daniel, however, saw Susa during the reign of the Babylonians, thus it
 was a citadel, or stronghold, of the Babylonians. The city rested on 
the banks of the Ulai River in the province of Elam. This was an ancient
 region. Elam was also the name of one of Shem's sons according to </span><b data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Genesis 10:22</span></b><span data-dcnode-id="1182" instrument_node="">.

</span></p><p data-dcnode-id="1170"><span data-dcnode-id="1180" instrument_node="">During the days of Abraham, king Chederlaomer hailed from Elam, and brought an army to conquer 
</span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/sodom-and-gomorrah.html" onclick="return FIX.track(this);" target="_blank"><span data-dcnode-id="1179" instrument_node="">Sodom and Gomorrah </span></a><span data-dcnode-id="1177" instrument_node="">
in </span><b data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Genesis 14</span></b><span data-dcnode-id="1174" instrument_node="">. One remembers that Lot was taken captive by Chederlaomer, sparking a rescue mission by 
</span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/abraham.html" onclick="return FIX.track(this);" target="_blank"><span data-dcnode-id="1173" instrument_node="">Abraham </span></a><span data-dcnode-id="1171" instrument_node="">
with some of his Canaanite allies in support.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><div class="ImageBlock ImageBlockLeft" data-dcnode-id="1159"><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/PersianSoldiersBiblehistoryonlinecom.jpg" rel="gallery[pageGallery]" title="An ancient relief picturing Persian soldiers marching."><img alt="An ancient relief depicting Persian soldiers." data-dcnode-id="1168" data-pin-media="https://www.israel-a-history-of.com/images/PersianSoldiersBiblehistoryonlinecom.jpg" height="104" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/xPersianSoldiersBiblehistoryonlinecom.jpg.pagespeed.ic.C3SeJJpuqV.jpg&amp;raw" style="width: 150px; height: auto; border-color: #000000; border-width: 2px 2px 2px 2px; border-style: solid" title="An ancient relief depicting Persian soldiers." width="150"></a><div class="pinit" data-dcnode-id="1160"><span data-dcnode-id="1166" instrument_node="">
</span><a class="PIN_1651311227602_button_pin PIN_1651311227602_beside PIN_1651311227602_save PIN_1651311227602_padded" data-dcnode-id="1162" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-1&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FPersianSoldiersBiblehistoryonlinecom.jpg&amp;description=An%20ancient%20relief%20picturing%20Persian%20soldiers%20marching." data-pin-log="button_pinit" data-pin-x="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DZgwrgucG1ZEb-1%26url%3Dhttp%253A%252F%252Fwww.israel-a-history-of.com%252Fqueen-esther-of-the-bible.html%26media%3Dhttps%253A%252F%252Fwww.israel-a-history-of.com%252Fimages%252FPersianSoldiersBiblehistoryonlinecom.jpg%26description%3DAn%2520ancient%2520relief%2520picturing%2520Persian%2520soldiers%2520marching."><span class="PIN_1651311227602_count" data-dcnode-id="1164" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-1&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FPersianSoldiersBiblehistoryonlinecom.jpg&amp;description=An%20ancient%20relief%20picturing%20Persian%20soldiers%20marching." data-pin-log="button_pinit" data-pin-x="60"><span data-dcnode-id="1165" instrument_node="">60</span></span><span data-dcnode-id="1163" instrument_node="">Save</span></a><span data-dcnode-id="1161" instrument_node="">
</span></div></div><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1157" instrument_node="">Isaiah prophecied that God </span><b data-dcnode-id="1154"><i data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">"will again recover the second time with His hand the remnant"</span></i></b><span data-dcnode-id="1153" instrument_node="">
 which lies in Egypt, Pathros, Cush, Shinar, Hamath, and Elam.  The 
great prophet Jeremiah predicted the kings of Elam, as well as many 
other kings from the nations, would rise against Babylon and destroy it 
in </span><b data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Jeremiah 25</span></b><span data-dcnode-id="1150" instrument_node="">.

</span></p><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Queen Esther of the Bible thus lived in an ancient city, one 
whose roots were not kind to Israel. As will be seen, both Mordecai and 
Esther hid their ethnic identity from the King and his court for as long
 as they could. 

</span></p><p data-dcnode-id="1142"><span data-dcnode-id="1146" instrument_node="">For this reason, the </span><b data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Book of Esther</span></b><span data-dcnode-id="1143" instrument_node=""> does not mirror the 
traditional standards of Jewish behavior. Queen Esther of the Bible does
 not dress, nor does she eat, according to traditional Jewish 
expectations. 

</span></p><p data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node="">God used Cyrus the Great and the Persian Empire to accomplish His
 purposes in regards to His people. In 537 B.C., Cyrus issued a decree 
allowing Jews to return to Jerusalem and rebuild the city.  Zerrubbabel 
led the initial return, composed of 42, 000 Jews. This return to Judah 
is recorded in </span><b data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Ezra 2:64</span></b><span data-dcnode-id="1138" instrument_node="">. This was typical of Persian Rule. They 
encouraged self-government, as stated above, and allowed nations to 
pursue their own theology.

</span></p><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">The relationship between the Persians and the Jews was favorable.
 From the decree by Cyrus, until the ascension of Alexander the Great, 
Jews were encouraged to return to their homeland and rebuild Jerusalem 
and the Temple. They received protection from Persia, privilege of being
 one of it's provinces. 

</span></p><span data-dcnode-id="1134" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="1124"><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/RuinsPersepolisAncientPersianPalaceDarius515BC.jpg" rel="gallery[pageGallery]" title="Magnificent ruins from the splendid ancient palace of Darius, king of Persia in Persepolis, ca 515 BC."><img alt="Ruins from Dariu's palace in Persepolis, ca 515 BC." data-dcnode-id="1133" data-pin-media="https://www.israel-a-history-of.com/images/RuinsPersepolisAncientPersianPalaceDarius515BC.jpg" height="441" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/xRuinsPersepolisAncientPersianPalaceDarius515BC.jpg.pagespeed.ic.dydxcPtjnX.jpg&amp;raw" style="width: 248px; height: auto; border-color: #000000; border-width: 3px 3px 3px 3px; border-style: solid" title="Ruins from Dariu's palace in Persepolis, ca 515 BC." width="350"></a><div class="pinit" data-dcnode-id="1125"><span data-dcnode-id="1131" instrument_node="">
</span><a class="PIN_1651311227602_button_pin PIN_1651311227602_beside PIN_1651311227602_save PIN_1651311227602_padded" data-dcnode-id="1127" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-5&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FRuinsPersepolisAncientPersianPalaceDarius515BC.jpg&amp;description=Magnificent%20ruins%20from%20the%20splendid%20ancient%20palace%20of%20Darius%2C%20king%20of%20Persia%20in%20Persepolis%2C%20ca%20515%20BC." data-pin-log="button_pinit" data-pin-x="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DZgwrgucG1ZEb-5%26url%3Dhttp%253A%252F%252Fwww.israel-a-history-of.com%252Fqueen-esther-of-the-bible.html%26media%3Dhttps%253A%252F%252Fwww.israel-a-history-of.com%252Fimages%252FRuinsPersepolisAncientPersianPalaceDarius515BC.jpg%26description%3DMagnificent%2520ruins%2520from%2520the%2520splendid%2520ancient%2520palace%2520of%2520Darius%252C%2520king%2520of%2520Persia%2520in%2520Persepolis%252C%2520ca%2520515%2520BC."><span class="PIN_1651311227602_count" data-dcnode-id="1129" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-5&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FRuinsPersepolisAncientPersianPalaceDarius515BC.jpg&amp;description=Magnificent%20ruins%20from%20the%20splendid%20ancient%20palace%20of%20Darius%2C%20king%20of%20Persia%20in%20Persepolis%2C%20ca%20515%20BC." data-pin-log="button_pinit" data-pin-x="60"><span data-dcnode-id="1130" instrument_node="">60</span></span><span data-dcnode-id="1128" instrument_node="">Save</span></a><span data-dcnode-id="1126" instrument_node="">
</span></div></div><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Palestine, according to Adams, lie in the zone of the fifth Persian 
satrapy. Though the Jews occupied but a small fraction of the Persian 
Empire, Adams makes an interesting statement in his book;

</span></p><p data-dcnode-id="1117"><i data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">"It is remarkable, however, that the Jews, though occupying 
only a mere patch of territory in the Persian continental organization, 
were made the objects of several unusually favorable state policies. 
There is evidence that the Persian government actually gave the remnant 
financial help."</span></i><span data-dcnode-id="1118" instrument_node="">
</span></p><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Why would the Persians look so favorably upon an insignificant 
and minute part of its empire? However, during the days of Esther queen 
of Persia such sentiments were not shared by all Persians. 

</span></p><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">One, in particular, managed to trick the king into issuing a 
decree to kill all the Jews throughout the entire Persian Empire. It was
 for this precise moment in history Queen Esther of the Bible was placed
 by God Almighty as Esther Queen of Persia.  

</span></p><span data-dcnode-id="1112" instrument_node="">
</span><a data-dcnode-id="1111" name="Queen of Persia"></a><span data-dcnode-id="1110" instrument_node="">
</span><h3 data-dcnode-id="1107"><span data-dcnode-id="1109" instrument_node="">ESTHER, QUEEN OF PERSIA</span><br data-dcnode-id="1108"></h3><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1105" instrument_node="">Esther's Hebrew name was </span><i data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Hadassah</span></i><span data-dcnode-id="1102" instrument_node="">, which means </span><i data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">"myrtle"</span></i><span data-dcnode-id="1099" instrument_node=""> in Hebrew. The name Esther is believed by some scholars to have derived from the Persian word for star, </span><i data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">"stareh"</span></i><span data-dcnode-id="1096" instrument_node="">, or, </span><i data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">"satarah"</span></i><span data-dcnode-id="1093" instrument_node="">,
 depending on one's source. Women in the Bible.net, among others, claims
 both the names of Mordecai and Esther in the Bible "may have arisen 
from stories about the Persian dieties Ishtar and Marduk". 

</span></p><p data-dcnode-id="1087"><span data-dcnode-id="1091" instrument_node="">Similar circumstances occurred in </span><b data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Daniel</span></b><span data-dcnode-id="1088" instrument_node="">, with the renaming of Daniel, Shadrach, Meshach, and Abednego to reflect Babylonian gods and meanings. 

</span></p><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Part of what makes Queen Esther of the Bible so remarkable is her
 rise from extremely humble beginnings. Throughout the Bible God attests
 to His power through the actions and achievements of seemingly 
insignificant and disadvantaged individuals. 

</span></p><span data-dcnode-id="1084" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="1074"><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/QueenEstherAndMordecai.gif" rel="gallery[pageGallery]" title="Queen Esther of the Bible with her uncle Mordecai."><img alt="Queen Esther of the Bible with her uncle Mordecai." data-dcnode-id="1083" data-pin-media="https://www.israel-a-history-of.com/images/QueenEstherAndMordecai.gif" height="164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/xQueenEstherAndMordecai.gif.pagespeed.ic.nuwsi9d02f.jpg&amp;raw" style="width: 260px; height: auto" title="Queen Esther of the Bible with her uncle Mordecai." width="200"></a><div class="pinit" data-dcnode-id="1075"><span data-dcnode-id="1081" instrument_node="">
</span><a class="PIN_1651311227602_button_pin PIN_1651311227602_beside PIN_1651311227602_save PIN_1651311227602_padded" data-dcnode-id="1077" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-8&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FQueenEstherAndMordecai.gif&amp;description=Queen%20Esther%20of%20the%20Bible%20with%20her%20uncle%20Mordecai." data-pin-log="button_pinit" data-pin-x="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DZgwrgucG1ZEb-8%26url%3Dhttp%253A%252F%252Fwww.israel-a-history-of.com%252Fqueen-esther-of-the-bible.html%26media%3Dhttps%253A%252F%252Fwww.israel-a-history-of.com%252Fimages%252FQueenEstherAndMordecai.gif%26description%3DQueen%2520Esther%2520of%2520the%2520Bible%2520with%2520her%2520uncle%2520Mordecai."><span class="PIN_1651311227602_count" data-dcnode-id="1079" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-8&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FQueenEstherAndMordecai.gif&amp;description=Queen%20Esther%20of%20the%20Bible%20with%20her%20uncle%20Mordecai." data-pin-log="button_pinit" data-pin-x="60"><span data-dcnode-id="1080" instrument_node="">60</span></span><span data-dcnode-id="1078" instrument_node="">Save</span></a><span data-dcnode-id="1076" instrument_node="">
</span></div></div><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1072" instrument_node="">Queen Esther of the Bible was no different. The opening verses of </span><b data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Esther 2</span></b><span data-dcnode-id="1069" instrument_node="">
 give the Queen's lineage and background. It suits God perfectly that 
Esther queen of Persia, at the time the largest empire in the history of
 the world, was an orphan.   
</span><b data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Esther 2:5-7</span></b><span data-dcnode-id="1066" instrument_node=""> introduces Mordecai into the narrative, and the background involving both Mordecai and Esther. 

</span></p><p data-dcnode-id="1060"><b data-dcnode-id="1062"><i data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">"Now there was a Jew in Susa the capital whose name was 
Mordecai, the son of Jair, the son of Shimei, the son of Kish, a 
Benjamite, who had been taken into exile from Jerusalem with the 
captives who had been exiled with Jeconiah king of Judah, whom 
Nebuchadnezzar the king of Babylon had exiled. And he was bringing up 
Hadassah, that is Esther, his uncle's daughter, for she had neither 
father nor mother. Now the young lady was beautiful of form and face, 
and when her father and her mother died, Mordecai took her as his own 
daughter."</span></i></b><span data-dcnode-id="1061" instrument_node="">
</span></p><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Thus a fascinating picture regarding Queen Esther of the Bible is
 painted by these verses. The Bible is silent as to how her parents 
died. The Bible is also silent as to how the pair came to Susa. Perhaps 
Mordecai's ancestors had been placed in Susa, or had migrated from 
Babylon or some other Babylonian city earlier. The destruction of 
Jerusalem had occurred over a century ago, thus neither had previously 
seen Jerusalem or Judah. Mordecai, thus, chose to stay behind when Cyrus
 issued the decree allowing Jews to return to the Holy Land.

</span></p><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">As indicated by the above passage, Queen Esther of the Bible had a
 direct relation to king Saul. Both hailed from the tribe of Benjamin. 
Mordecai is a direct descendant of king Saul as indicated by his 
lineage, and was the uncle to Queen Esther of the Bible.  

</span></p><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Mordecai becomes a great man, heralded as such by many Rabbi's 
and writings throughout antiquity. His righteousness and piousness is 
seen in his willingness to raise his niece as his own. Mordecai and 
Esther in the Bible show an immense reliance upon the God of their 
forefathers.

</span></p><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">In verse fifteen we learn the name of Esther's father, Abihail. 
Abihail was the uncle to Mordecai. The relation to king Saul plays an 
intriguing role later in the narrative, a role in which one senses the 
ancient forces of good and evil manifesting themselves through the 
actions of the characters.

</span></p><span data-dcnode-id="1051" instrument_node="">
</span><a data-dcnode-id="1050" name="The Book of Esther"></a><span data-dcnode-id="1049" instrument_node="">
</span><h3 data-dcnode-id="1046"><span data-dcnode-id="1047" style="font-family: 'palatino linotype','book antiqua',palatino,serif;"><span data-dcnode-id="1048" instrument_node="">THE BOOK OF ESTHER</span></span></h3><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1041"><b data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Eshter</span></b><span data-dcnode-id="1042" instrument_node=""> opens up with a depiction of the king of Persia, said 
to be Ahasuerus. As indicated above, most scholarship associates him 
with Xerxes I. Scripture states he sat upon his throne in the capital 
city of Susa. In the third year of his reign he gave a banquet for all 
the nobles, princes, and leaders of the army throughout all of his 
kingdom. The extravagance of this banquet is seen in verse four.

</span></p><p data-dcnode-id="1036"><b data-dcnode-id="1038"><i data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">"And he displayed the riches of his royal glory and the splendor of his great majesty for many days, 180 days."</span></i></b><span data-dcnode-id="1037" instrument_node="">
</span></p><p data-dcnode-id="1031"><span data-dcnode-id="1035" instrument_node="">Ahasuerus, thus, gave a banquet which lasted approximately six months. In books seven and nine of Herodotus' writings, </span><u data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">The Persian Wars</span></u><span data-dcnode-id="1032" instrument_node="">, he goes into in-depth detail concerning feasts of Xerxes I. These were no small matters. 

</span></p><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Xerxes I was an impulsive ruler, oftentimes succumbing foolishly 
to ill advice from advisers. The Bible oftentimes  portrays him making 
decisions on whims and impulses, rather than thoughtfulness and 
sobriety. Queen Esther of the Bible thus, was to be queen of an 
abundantly rich, yet equally impulsive King. 

</span></p><p data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">Upon the conclusion of this 180 day banquet, king Xerxes threw a 
seven day feast to culminate the events. It was during the last day of 
the banquet that the king summoned Queen Vashti to the banquet hall. 
Xerxes I displayed his pride in </span><b data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Esther 1:11</span></b><span data-dcnode-id="1025" instrument_node="">.

</span></p><p data-dcnode-id="1019"><b data-dcnode-id="1021"><i data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">"...to bring Queen Vashti before the king with her royal 
crown in order to display her beauty to the people and the princes, for 
she was beautiful."</span></i></b><span data-dcnode-id="1020" instrument_node="">
</span></p><span data-dcnode-id="1018" instrument_node="">
</span><div class="ImageBlock ImageBlockLeft" data-dcnode-id="1008"><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/KingDariusSeated.jpg" rel="gallery[pageGallery]" title="An ancient relief of King Darius seated on his throne."><img alt="Queen Esther of the Bible: An ancient relief of King Darius seated on his throne." data-dcnode-id="1017" data-pin-media="https://www.israel-a-history-of.com/images/KingDariusSeated.jpg" height="267" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/xKingDariusSeated.jpg.pagespeed.ic.w4mLrkxXMo.jpg&amp;raw" style="width: 321px; height: auto" title="Queen Esther of the Bible: An ancient relief of King Darius seated on his throne." width="350"></a><div class="pinit" data-dcnode-id="1009"><span data-dcnode-id="1015" instrument_node="">
</span><a class="PIN_1651311227602_button_pin PIN_1651311227602_beside PIN_1651311227602_save PIN_1651311227602_padded" data-dcnode-id="1011" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-6&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FKingDariusSeated.jpg&amp;description=An%20ancient%20relief%20of%20King%20Darius%20seated%20on%20his%20throne." data-pin-log="button_pinit" data-pin-x="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DZgwrgucG1ZEb-6%26url%3Dhttp%253A%252F%252Fwww.israel-a-history-of.com%252Fqueen-esther-of-the-bible.html%26media%3Dhttps%253A%252F%252Fwww.israel-a-history-of.com%252Fimages%252FKingDariusSeated.jpg%26description%3DAn%2520ancient%2520relief%2520of%2520King%2520Darius%2520seated%2520on%2520his%2520throne."><span class="PIN_1651311227602_count" data-dcnode-id="1013" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-6&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FKingDariusSeated.jpg&amp;description=An%20ancient%20relief%20of%20King%20Darius%20seated%20on%20his%20throne." data-pin-log="button_pinit" data-pin-x="60"><span data-dcnode-id="1014" instrument_node="">60</span></span><span data-dcnode-id="1012" instrument_node="">Save</span></a><span data-dcnode-id="1010" instrument_node="">
</span></div></div><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">He wanted to parade her around as a sign of his glory. Vashti refused
 in verse twelve, an act which would lead to her expulsion from the 
palace. This is the first example of the king's rash decisions. He asked
 his advisers what should he do in regards to his queen's insolence. In 
verses sixteen through twenty-two, Memucan, an adviser of the kings, 
argues in favor of banishing Queen Vashti from the kingdom. 

</span></p><p data-dcnode-id="999"><span data-dcnode-id="1004" instrument_node="">His reasoning was her defiance would be heralded and copied by 
the other women of the kingdom, thus bringing shame on the men of 
Persia. She must be punished, he argued, to send a message. Queen Vashti
 was to become an example throughout the Persian Empire. Memucan urged 
king Ahaseurus to issue a </span><b data-dcnode-id="1001"><i data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">"royal edict...so that it cannot be repealed..."</span></i></b><span data-dcnode-id="1000" instrument_node="">.

</span></p><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Such an edict from the king carried a definite sentence with it. 
It could not be reversed, for the word of the king was law and final. 
Thus in verse twenty-one we learn of the king's tendency towards 
impulsive decisions. 

</span></p><p data-dcnode-id="992"><b data-dcnode-id="994"><i data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">"And this word pleased the king and the princes, and the king did as Memucan proposed."</span></i></b><span data-dcnode-id="993" instrument_node="">
</span></p><p data-dcnode-id="986"><span data-dcnode-id="991" instrument_node="">It must be kept in mind the king had been drinking and 
celebrating for over six months. Scripture indicates by the seventh day 
of the feast </span><b data-dcnode-id="988"><i data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">"the king was merry with wine"</span></i></b><span data-dcnode-id="987" instrument_node="">. 

</span></p><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">In plain terms, he was drunk, and probably exceedingly so. Thus 
his decision-making process was severely impaired. In his drunken state 
he hastily agreed to advice from a likely equally drunk adviser. Queen 
Esther of the Bible would end up confronting another decision made in 
similar haste, and with far more evil consequences.

</span></p><p data-dcnode-id="979"><span data-dcnode-id="983" instrument_node="">However, it is the banishment of Vashti which opens the door for 
Esther's ascension to the queenship of Persia. Interestingly, Women in 
the Bible.net point out chapter two of the </span><b data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Book of Esther</span></b><span data-dcnode-id="980" instrument_node=""> not only tells about Queen Esther of the Bible, but also relates the first beauty pageant recorded in world history.  

</span></p><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">One of the king's advisers suggests the king send out a 
proclamation throughout the empire urging those of the most beautiful 
virgins to come to Susa, his capital, so that he may select one from 
among them to be queen.

</span></p><p data-dcnode-id="973"><b data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Esther 2:8</span></b><span data-dcnode-id="974" instrument_node=""> depicts the entrance of Esther into the king's harem.

</span></p><p data-dcnode-id="968"><b data-dcnode-id="970"><i data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">"So it came about when the command and decree of the king 
were heard and many young ladies were gathered to Susa the capital into 
the custody of Hegai, that Esther was taken to the king's palace into 
the custody of Hegai, who was in charge of the women."</span></i></b><span data-dcnode-id="969" instrument_node="">
</span></p><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Hegai was the king's chief eunuch. A eunuch is one who has been 
castrated. These men were often placed over the king's harem for obvious
 reasons. Hegai, we learn, had been castrated since he was a child. 
Queen Esther of the Bible displays her humility throughout the entire 
narrative. From the beginning she understands it is important to seek 
the advice and guidance of others. 

</span></p><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Queen Esther of the Bible also exhibited a reliance upon God that
 echoes throughout. Her treatment of Hegai reflects the humble and Godly
 spirit found within.

</span></p><p data-dcnode-id="959"><b data-dcnode-id="961"><i data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">"Now the young lady pleased him and found favor with him. 
So he quickly provided her with her cosmetics and food, gave her seven 
choice maids from the king's palace, and transferred her and her maids 
to the best place in the harem."</span></i></b><span data-dcnode-id="960" instrument_node="">
</span></p><p data-dcnode-id="953"><span data-dcnode-id="958" instrument_node="">Hegai's favor would prove extremely beneficial to Esther in the 
Bible story. Scripture also reveals that Queen Esther of the Bible kept 
her Jewish identity, and that of her uncle Mordecai, secret; </span><b data-dcnode-id="955"><i data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">"for Mordecai had instructed her that she should not make them known."</span></i></b><span data-dcnode-id="954" instrument_node="">
</span></p><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Mordecai is quietly the driving force behind Queen Esther of the 
Bible. He has foresight and wisdom to instruct her in how she should 
conduct herself amongst foreigners. Esther again shows her humble nature
 by complying with Mordecai, whom she looked at as a father. 

</span></p><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Indeed, in verse eleven Mordecai is pictured as a nervous and 
anxious father, one ultimately concerned with the well-being of his 
daughter.

</span></p><p data-dcnode-id="944"><b data-dcnode-id="946"><i data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">"And every day Mordecai walked back and forth in front of the court of the harem to learn how Esther was and how she fared."</span></i></b><span data-dcnode-id="945" instrument_node="">
</span></p><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">What a touching picture of a concerned father, one which only 
those men that are fathers can truly relate to. In Mordecai we see but a
 cloudy reflection of the love and concern of God Almighty for His 
children. The first ever beauty pageant was in the hands of God 
Almighty. The outcome had been predetermined; now it was up to Esther to
 simply respond in faith.

</span></p><span data-dcnode-id="941" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="931"><a data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/AncientPersianPalaceInBishapur.jpg" rel="gallery[pageGallery]" title="An ancient Persian palace in Bishapur."><img alt="An ancient Persian palace in Bishapur." data-dcnode-id="940" data-pin-media="https://www.israel-a-history-of.com/images/AncientPersianPalaceInBishapur.jpg" height="188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/xAncientPersianPalaceInBishapur.jpg.pagespeed.ic.bzvvNlGa9Q.jpg&amp;raw" style="width: 250px; height: auto; border-color: #000000; border-width: 2px 2px 2px 2px; border-style: solid" title="An ancient Persian palace in Bishapur." width="250"></a><div class="pinit" data-dcnode-id="932"><span data-dcnode-id="938" instrument_node="">
</span><a class="PIN_1651311227602_button_pin PIN_1651311227602_beside PIN_1651311227602_save PIN_1651311227602_padded" data-dcnode-id="934" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-7&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FAncientPersianPalaceInBishapur.jpg&amp;description=An%20ancient%20Persian%20palace%20in%20Bishapur." data-pin-log="button_pinit" data-pin-x="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DZgwrgucG1ZEb-7%26url%3Dhttp%253A%252F%252Fwww.israel-a-history-of.com%252Fqueen-esther-of-the-bible.html%26media%3Dhttps%253A%252F%252Fwww.israel-a-history-of.com%252Fimages%252FAncientPersianPalaceInBishapur.jpg%26description%3DAn%2520ancient%2520Persian%2520palace%2520in%2520Bishapur."><span class="PIN_1651311227602_count" data-dcnode-id="936" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-7&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FAncientPersianPalaceInBishapur.jpg&amp;description=An%20ancient%20Persian%20palace%20in%20Bishapur." data-pin-log="button_pinit" data-pin-x="60"><span data-dcnode-id="937" instrument_node="">60</span></span><span data-dcnode-id="935" instrument_node="">Save</span></a><span data-dcnode-id="933" instrument_node="">
</span></div></div><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="929" instrument_node="">The process involved in preparing the women to appear before the king was quite extensive. A full year was allotted </span><b data-dcnode-id="926"><i data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">"for the days of their beautification"</span></i></b><span data-dcnode-id="925" instrument_node="">.
 Out of this twelve month period, the first six months involved 
treatments with oil of myrrh. The ancients used myrrh for a number of 
social, religious, and ritual purposes.

</span></p><p data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">It was used as medicine, perfume, incense, and embalming, amongst other uses.  In </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/ancient-egyptian-literature.html" onclick="return FIX.track(this);" target="_blank"><span data-dcnode-id="922" instrument_node="">ancient Egypt</span></a><span data-dcnode-id="920" instrument_node="">
 it was considered to be the finest of perfumes. It's exact nature of 
use in regards to Esther from the Bible are not specified. The next six 
months involved treatment with spices. In modern times, some spices are 
used in conjunction with perfume. 

</span></p><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Spices such as lavender, sage and rosemary are frequently used in
 such instances. Also used are spices such as cinnamon, clover, vanilla 
and ginger, many of these in use since antiquity. 

</span></p><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">After her year-long treatment, soon to be Queen Esther of the 
Bible once again displayed her humility when it came time to meet the 
king. Instead of arrogantly parading herself in front of the king, she 
sought the advice and guidance of Hegai as to what she should say. 

</span></p><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Hegai surely knew the king's tastes as well, if not better, than 
anyone in the kingdom. Esther was humble enough, and wise enough, to 
seek his advice, rather than rely on her own inexperience. 

</span></p><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Verses fifteen and sixteen depict the result of her actions. 

</span></p><p data-dcnode-id="906"><b data-dcnode-id="908"><i data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">"Now when the turn of Esther, the daughter of Abihail the 
uncle of Mordecai who had taken her as his daughter, came to go in to 
the house of the king, she did not request anything except what Hegai, 
the king's eunuch who was in charge of the women, advised. And Esther 
found favor in the eyes of all who saw her. So Esther was taken to King 
Ahaseurus to his royal palace in the tenth month which is the month of 
Tebeth, in the seventh year of his reign."</span></i></b><span data-dcnode-id="907" instrument_node="">
</span></p><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Thus Queen Esther of the Bible, the orphaned Jewish daughter of 
Abihail, raised by her uncle Mordecai, became officially known as Esther
 queen of Persia, the largest empire the world had known. Queen Esther 
of the Bible was now in a position of direct influence over the king. 

</span></p><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Yet she was also subjected to the whims and impulses of the king,
 as everyone else was. She must learn to rely not on her new found 
status of queen, but on the everlasting promise of God to faithfully 
guide those who seek Him. 

</span></p><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Her uncle Mordecai thought it best to hide their Jewish ancestry,
 thus Esther followed his advice. Scripture seems to suggest things 
moved rather quickly from this point on. 

</span></p><p data-dcnode-id="894"><span data-dcnode-id="899" instrument_node="">For verse seventeen indicates the king  </span><b data-dcnode-id="896"><i data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">"loved Esther more than all the women, and she found favor and kindness with him"</span></i></b><span data-dcnode-id="895" instrument_node="">.  The king, thus thew a banquet in her honor in verse eighteen. 

</span></p><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Queen Esther of the Bible had not revealed her relation to 
Mordecai, for Mordecai is pictured as sitting at the king's gate, rather
 than at her side. It is quite likely Mordecai was always at a distance,
 carefully watching Esther queen of Persia like a hawk. He was never far
 from her mind either. For in verse twenty-one Mordecai is again 
pictured sitting at the King's Gate, perhaps waiting to catch a glimpse 
of his niece/daughter the queen.

</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="890" instrument_node="">This day turned out differently, however, for Mordecai became aware of a plot by two of the king's servants to </span><b data-dcnode-id="887"><i data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">"lay hands on king Ahaseurus"</span></i></b><span data-dcnode-id="886" instrument_node="">.
 Scripture does not elaborate on how Mordecai came to such knowledge, 
but immediately upon his discovery he told Queen Esther. The Queen, 
thus, </span><b data-dcnode-id="883"><i data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">"informed the king in Mordecai's name"</span></i></b><span data-dcnode-id="882" instrument_node="">.

</span></p><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Yet again Queen Esther of the Bible demonstrates her humility and
 reverence for her father and God. She could have claimed the knowledge 
in her own name, thus heaping up more honors and favor in the king's 
eyes. However, like a faithful child she credits her father with the 
discovery, though the King is not aware of the true nature of Mordecai 
and Esther. 

</span></p><p data-dcnode-id="871"><span data-dcnode-id="878" instrument_node="">The king is obviously very grateful to Mordecai, and in </span><b data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Esther 2:23</span></b><span data-dcnode-id="875" instrument_node=""> his actions are said to have been recorded in </span><u data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">The Book of the Chronicles</span></u><span data-dcnode-id="872" instrument_node=""> of the Persian kings. The significance of this will be seen later in the narrative. 

</span></p><p data-dcnode-id="865"><span data-dcnode-id="870" instrument_node="">Chapter three introduces the personage of Haman. In verse one the
 king is said to have promoted Haman, the son of Hammedatha the Agagite.
 Haman found such favor in the king's eyes he was promoted to head over </span><b data-dcnode-id="867"><i data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">"all the princes who were with him"</span></i></b><span data-dcnode-id="866" instrument_node="">. 

</span></p><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Haman, though, was a proud man. He immediately sought the worship
 and attention of the people. He wanted them to see his power and 
authority, and acknowledge him by bowing to him in his presence.

</span></p><p data-dcnode-id="858"><b data-dcnode-id="860"><i data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">"But Mordecai neither bowed down nor paid homage."</span></i></b><span data-dcnode-id="859" instrument_node="">
</span></p><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">The motivations for Mordecai's refusal are not outright stated in
 Scripture. However, individuals through the Old Testament have refused 
to bow before foreign leaders and gods. These were the truly righteous 
of Israel. They acknowledged no other god or power other than that of 
God Almighty, God of Abraham, Isaac, and Jacob.  Women in the Bible.net 
sheds an interesting light on another possible motivation, touched on 
above.

</span></p><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Queen Esther of the Bible and her uncle Mordecai were Jews 
descended from the tribe of Benjamin, and ultimately descended from the 
lineage of the first king of Israel, king Saul son of Kish.  

</span></p><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">In a fascinating twist, the ancestor's of Haman are equally as 
interesting. Haman is said to have been an Agagite, descended from the 
Amalekites.

</span></p><p data-dcnode-id="840"><span data-dcnode-id="851" instrument_node="">Agag the Amalekite was an enemy of king Saul's in </span><b data-dcnode-id="849"><span data-dcnode-id="850" instrument_node=""> I Samuel</span></b><span data-dcnode-id="848" instrument_node="">. He was king of </span><b data-dcnode-id="845"><i data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">"the sinners, the Amalekties"</span></i></b><span data-dcnode-id="844" instrument_node="">. Some scholars suggest the appellation </span><i data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Agag</span></i><span data-dcnode-id="841" instrument_node=""> was simply a title given to the king of the Amalekites, similar to Caesar of Pharaoh. 

</span></p><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">The ancient forces of God's righteousness and the enemy's evil 
confronted each other once again in the ongoing cosmic struggle between 
the two opposing forces. This time they manifested themselves in the 
current personages of Haman and Mordecai. 

</span></p><p data-dcnode-id="833"><span data-dcnode-id="837" instrument_node="">Mordecai's refusal infuriated Haman. At first Haman simply wanted
 to kill Mordecai. However, upon learning of Mordecai's identity, 
Haman's hatred was to such an extent he sought the destruction of all 
Jews in the kingdom. His desire is recorded in </span><b data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Esther 3:6</span></b><span data-dcnode-id="834" instrument_node="">
</span></p><p data-dcnode-id="828"><b data-dcnode-id="830"><i data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">"But he disdained to lay hands on Mordecai alone, for they 
had told him who the people of Mordecai were; therefore Haman sought to 
destroy all the Jews, the people of Mordecai, who were throughout the 
whole kingdom of Ahaseurus."</span></i></b><span data-dcnode-id="829" instrument_node="">
</span></p><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">The sentiments of Haman are reflected in some of the individuals 
within certain organizations, such as the Islamic Brotherhood, in our 
current time. Certainly the Nazi regime under Hitler mirrored the policy
 Haman sought to establish centuries prior in the Persian Empire.

</span></p><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Time and again the ancient attitudes and treatment of God's 
people manifest themselves at different stages throughout human history.
 We see it happening this very day. Queen Esther of the Bible had been 
placed there for just such purposes as this. As God has consistently 
done through the ages, He provided His people with a deliverer at the 
exact time they needed one. 

</span></p><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Haman deceives the king into issuing a royal edict, such as the 
one banishing Queen Vashti earlier, to execute all the Jews throughout 
the Persian Empire. In order to establish the day of execution, Haman 
cost lots as to what day. Haman's decision making process is recorded in
 verse seven of chapter three.

</span></p><p data-dcnode-id="817"><b data-dcnode-id="819"><i data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">"In the first month, which is the month Nisan, in the 
twelfth year of king Ahaseurus, Pur, that is the lot, was cast before 
Haman from day to day and from month to month, until the twelfth month, 
that is the month Adar."</span></i></b><span data-dcnode-id="818" instrument_node="">
</span></p><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Haman's plot to annihilate the Jews due to Mordecai's insult had 
been set in motion. After he had decided what day to carry out the 
execution, he now had to convince the king to issue the decree. Haman 
filled the king with lies about the Jews, and even offered to pay the 
king to issue the decree. His words are recorded in verses eight and 
nine.

</span></p><p data-dcnode-id="810"><b data-dcnode-id="812"><i data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">"Then Haman said to King Ahasuerus, 'There is a certain 
people scattered and dispersed among the peoples in all the provinces of
 your kingdom; their laws are different from those of all other people, 
and they do not observe the king's laws, so it is not in the king's 
interest to let them remain. If is pleasing to the king, let it be 
decreed that they be destroyed and I will pay ten thousand talents of 
silver into the hands of those who carry out the king's business, to put
 into the king's treasuries."</span></i></b><span data-dcnode-id="811" instrument_node="">
</span></p><p data-dcnode-id="802"><span data-dcnode-id="809" instrument_node="">The king, as he was prone to do, agreed to Haman's statement. Throughout the </span><b data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Book of Esther</span></b><span data-dcnode-id="806" instrument_node=""> the king readily agrees to just about anything that is proposed to him.  Mordecai, upon hearing of the King's proclamation in </span><b data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Esther 4:1</span></b><span data-dcnode-id="803" instrument_node="">;

</span></p><p data-dcnode-id="797"><b data-dcnode-id="799"><i data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">"tore his clothes, put on sackcloth and ashes, and went out into the midst of the city and wailed loudly and bitterly."</span></i></b><span data-dcnode-id="798" instrument_node="">
</span></p><p data-dcnode-id="792"><span data-dcnode-id="796" instrument_node="">Mordecai's despair was likely coupled with the fact he was the 
cause of Haman's anger initially; and now Haman had used that instance 
to execute </span><i data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">all</span></i><span data-dcnode-id="793" instrument_node=""> Jewish people everywhere throughout the Persian 
Empire. The fate of the Jewish nation, scattered as it was, had just 
been sealed. Queen Esther of the Bible was about to be called upon to 
test her faith in God Almighty.

</span></p><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">In many ancient civilizations the king, or head of state, was 
often thought of in divine terms, as either being a god himself, or 
having a closer connection to the gods than other humans. Ancient Egypt 
regarded the Pharaoh as divinity, as did the Romans with Caesar. 

</span></p><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">The Persians were no different. The King of Persia was considered
 being closer to the gods than normal humans. He was a divine presence 
on earth. His decrees were final, thus in the case of Mordecai his fate 
was sealed.

</span></p><p data-dcnode-id="782"><span data-dcnode-id="787" instrument_node="">Queen Esther's servants rushed back to her and told her of 
Mordecai's actions. Queen Esther of the Bible does not, at this point, 
know why Mordecai is acting as he is. She was unaware of her husband's 
decree. Mordecai's pain, however, was enough on it's own to cause Esther
