 to have </span><b data-dcnode-id="784"><i data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">"writhed in great anguish"</span></i></b><span data-dcnode-id="783" instrument_node="">. Scripture makes it evident Queen Esther of the Bible was truly a pious, humble, loving, and obedient daughter of Israel. 

</span></p><p data-dcnode-id="776"><span data-dcnode-id="781" instrument_node="">For whatever reason Queen Esther of the Bible does not rush out 
to meet her uncle. Instead she sent Hathach, one of the king's eunuchs 
assigned to her. Hathach went out to meet Mordecai on the queen's 
behalf, at which point Mordecai </span><b data-dcnode-id="778"><i data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">"told him all that had happened to him"</span></i></b><span data-dcnode-id="777" instrument_node="">. He even gave Hathach a copy of the edict to show Esther. 

</span></p><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Esther's response is interesting. Upon faced with this life or 
death situation, her first reaction was to seek out an excuse why she 
could not help. It is human nature to shrink from such responsibilities.
 Moses shrank from God's call to lead the Israelites out of Egypt.  
Jonah fled from God upon being called to preach to Nineveh. Yet in each 
instance, the individual was strengthened by God, and prevailed in the 
end.

</span></p><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Queen Esther of the Bible was no different. Her excuse rested on 
the fact she had not been called into the king's presence in over thirty
 days. This typically meant one had fallen out of favor with the king. 
It was against the law to approach the king, however, without being 
summoned first. To do so risk death. 

</span></p><span data-dcnode-id="771" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="761"><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/EsthersBanquetGustavDore.jpg" rel="gallery[pageGallery]" title="Queen Esther of the Bible as depicted by Gustav Dore."><img alt="Queen Esther of the Bible as depicted by Gustav Dore." data-dcnode-id="770" data-pin-media="https://www.israel-a-history-of.com/images/EsthersBanquetGustavDore.jpg" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/xEsthersBanquetGustavDore.jpg.pagespeed.ic.q02Eor2Ytv.jpg&amp;raw" style="width: 300px; height: auto" title="Queen Esther of the Bible as depicted by Gustav Dore." width="300"></a><div class="pinit" data-dcnode-id="762"><span data-dcnode-id="768" instrument_node="">
</span><a class="PIN_1651311227602_button_pin PIN_1651311227602_beside PIN_1651311227602_save PIN_1651311227602_padded" data-dcnode-id="764" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-9&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FEsthersBanquetGustavDore.jpg&amp;description=Queen%20Esther%20of%20the%20Bible%20as%20depicted%20by%20Gustav%20Dore." data-pin-log="button_pinit" data-pin-x="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DZgwrgucG1ZEb-9%26url%3Dhttp%253A%252F%252Fwww.israel-a-history-of.com%252Fqueen-esther-of-the-bible.html%26media%3Dhttps%253A%252F%252Fwww.israel-a-history-of.com%252Fimages%252FEsthersBanquetGustavDore.jpg%26description%3DQueen%2520Esther%2520of%2520the%2520Bible%2520as%2520depicted%2520by%2520Gustav%2520Dore."><span class="PIN_1651311227602_count" data-dcnode-id="766" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-9&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FEsthersBanquetGustavDore.jpg&amp;description=Queen%20Esther%20of%20the%20Bible%20as%20depicted%20by%20Gustav%20Dore." data-pin-log="button_pinit" data-pin-x="60"><span data-dcnode-id="767" instrument_node="">60</span></span><span data-dcnode-id="765" instrument_node="">Save</span></a><span data-dcnode-id="763" instrument_node="">
</span></div></div><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">If Queen Esther of the Bible was to approach the king, and he not 
extend his golden scepter, she would be put to death.  She related her 
reasoning to Mordecai, who had little patience for such excuses and 
responded with sobering words in verses thirteen and fourteen.

</span></p><p data-dcnode-id="753"><b data-dcnode-id="755"><i data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">"Then Mordecai told them to reply to Esther, 'Do not 
imagine that you in the king's palace can escape any more than all the 
Jews. For if you remain silent at this time, relief and deliverance will
 arise for the Jews from another place and you and your father's house 
will perish. And who knows whether you have not attained royalty for 
such a time as this?"</span></i></b><span data-dcnode-id="754" instrument_node="">
</span></p><p data-dcnode-id="747"><span data-dcnode-id="752" instrument_node="">These are some of the wisest words given in counsel in all of the
 Scriptures. Queen Esther of the Bible, as humble in spirit as she was, 
needed a sobering reminder that God </span><b data-dcnode-id="749"><i data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">WILL</span></i></b><span data-dcnode-id="748" instrument_node=""> accomplish His tasks regardless of who He must use. 

</span></p><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Esther's role was not as deliverer, but to act faithfully and 
with confidence in God. Mordecai reminded her that God will deliver His 
people. If she refused the honor to act as God's instrument, shame would
 be brought upon her father's house. 

</span></p><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Mordecai then touched on a significant aspect of God's nature; 
His omnipotent providence. God foresaw the treachery and deception of 
Haman, for God is all knowing. Thus, using His divine influence over His
 creation, God Almighty made Queen Esther of the Bible queen of Persia 
at precisely the right moment in time in order to accomplish His tasks. 

</span></p><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">God is not limited to only using His people of Israel; as He used
 Cyrus a Gentile decades earlier. Neither is God limited to only using 
people, as He can surely influence nature and the earth to accomplish 
His tasks as well, evidenced by the words of Jesus Christ in the New 
Testament calming the waters of the Sea of Galilee. For He is the 
creator of all.  

</span></p><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Queen Esther of the Bible responded in faith to Mordecai's words.
 He brought her back to her faith, and she tells Mordecai to assemble 
all the Jews in Susa. Scholars, such as Adams, indicate that many Jews 
lived in Susa. These Persian Jews, Adams states in his book, "were 
important factors in its commercial, cultural, and political affairs". 

</span></p><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Thousands of years later, fascinatingly enough, the largest 
traditional Persian Jewish congregation in the United States is located 
in the heart of Beverly Hills. The influence Jews, particularly Persian 
Jews, have had consistently over time in centers of economic and 
political power is mind boggling; and taking place today as it did 
thousands of years ago! Most Persian Jews within the United States live 
in California and New York. These two states stand as the Entertainment 
and Economic hearts of the U.S., and arguably the world. God's hands 
never stop working.

</span></p><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Queen Esther of the Bible thus summoned the Jews of Susa to 
gather and fast for three days, as she and her maids would do the same 
within the palace. Her last words in verse sixteen are words of faith 
and courage in God Almighty.

</span></p><p data-dcnode-id="730"><b data-dcnode-id="732"><i data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">...I and my maidens will also fast in the same way. And 
thus I will go in to the king, which is not according to the law; and if
 I perish, I perish."</span></i></b><span data-dcnode-id="731" instrument_node="">
</span></p><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">What a beautiful statement of faith made by Queen Esther of the 
Bible. Thus Esther overcame her initial fears of losing her life, 
choosing instead to place the outcome of her actions in the hands of 
God.  The opening verses of chapter five depict the daring move by 
Esther, queen of Persia.

</span></p><p data-dcnode-id="723"><b data-dcnode-id="725"><i data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">"Now it came about on the third day that Esther put on her 
royal robes and stood in the inner court of the king's palace in front 
of the king's rooms, and the king was sitting on his royal throne in the
 throne room, opposite the entrance to the palace. And it happened when 
the king saw Esther the queen standing in the court, she obtained favor 
in his sight; and the king extended to Esther the golden scepter which 
was in his hand. So Esther came near and touched the top of the 
scepter."</span></i></b><span data-dcnode-id="724" instrument_node="">
</span></p><span data-dcnode-id="722" instrument_node="">
</span><div class="ImageBlock ImageBlockLeft" data-dcnode-id="712"><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/EstherAndMordecaiTombInterior.jpg" rel="gallery[pageGallery]" title="The interior of the tomb of Queen Esther of the Bible and Mordecai."><img alt="The interior of the tomb of Queen Esther of the Bible and Mordecai." data-dcnode-id="721" data-pin-media="https://www.israel-a-history-of.com/images/EstherAndMordecaiTombInterior.jpg" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/xEstherAndMordecaiTombInterior.jpg.pagespeed.ic.S9KhP9vQU7.jpg&amp;raw" style="width: 300px; height: auto" title="The interior of the tomb of Queen Esther of the Bible and Mordecai." width="300"></a><div class="pinit" data-dcnode-id="713"><span data-dcnode-id="719" instrument_node="">
</span><a class="PIN_1651311227602_button_pin PIN_1651311227602_beside PIN_1651311227602_save PIN_1651311227602_padded" data-dcnode-id="715" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-10&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FEstherAndMordecaiTombInterior.jpg&amp;description=The%20interior%20of%20the%20tomb%20of%20Queen%20Esther%20of%20the%20Bible%20and%20Mordecai." data-pin-log="button_pinit" data-pin-x="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DZgwrgucG1ZEb-10%26url%3Dhttp%253A%252F%252Fwww.israel-a-history-of.com%252Fqueen-esther-of-the-bible.html%26media%3Dhttps%253A%252F%252Fwww.israel-a-history-of.com%252Fimages%252FEstherAndMordecaiTombInterior.jpg%26description%3DThe%2520interior%2520of%2520the%2520tomb%2520of%2520Queen%2520Esther%2520of%2520the%2520Bible%2520and%2520Mordecai."><span class="PIN_1651311227602_count" data-dcnode-id="717" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-10&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FEstherAndMordecaiTombInterior.jpg&amp;description=The%20interior%20of%20the%20tomb%20of%20Queen%20Esther%20of%20the%20Bible%20and%20Mordecai." data-pin-log="button_pinit" data-pin-x="60"><span data-dcnode-id="718" instrument_node="">60</span></span><span data-dcnode-id="716" instrument_node="">Save</span></a><span data-dcnode-id="714" instrument_node="">
</span></div></div><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">The king seemed amused by Esther's daring and bold appearance. It had
 been thirty days since he had summoned her. Scripture is silent as to 
why. The king, however, was pleased to see her and reached out his 
golden scepter to her. Upon asking what was troubling her, the king said
 he would give her up to half of his kingdom in verse three. Queen 
Esther of the Bible, instead, asked for the presence of himself and 
Haman at a banquet she was going to throw. 

</span></p><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">It must be kept in mind that Queen Esther of the Bible had not 
revealed her true identity to the king as of yet. He still had no idea 
he had issued the execution of the Queen of Persia.

</span></p><p data-dcnode-id="697"><span data-dcnode-id="706" instrument_node="">Upon news of his invitation, Haman </span><b data-dcnode-id="703"><i data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">"went out that day glad and pleased of heart"</span></i></b><span data-dcnode-id="702" instrument_node="">. His vanity was working overtime. However, Haman again encountered Mordecai at the king's gate, to which Mordecai </span><b data-dcnode-id="699"><i data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">"did not stand up or tremble before him"</span></i></b><span data-dcnode-id="698" instrument_node="">. 

</span></p><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Haman, thus, was infuriated at the insult.  Scripture indicates that Haman controlled himself despite his inward rage. 

</span></p><p data-dcnode-id="689"><span data-dcnode-id="694" instrument_node="">Immediately upon arriving at his house he sent for his friends and wife in order to relate to all of his glory, yet </span><b data-dcnode-id="691"><i data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">"all of this does not satisfy me every time I see Mordecai the Jew sitting at the king's gate"</span></i></b><span data-dcnode-id="690" instrument_node="">. His wife's answer is found in verse fourteen.

</span></p><p data-dcnode-id="684"><b data-dcnode-id="686"><i data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">"Then Zeresh his wife and all his friends said to him, 
'Have a gallows fifty cubits high made and in the morning ask the king 
to have Mordecai hanged on it, then go joyfully with the king to the 
banquet."</span></i></b><span data-dcnode-id="685" instrument_node="">
</span></p><p data-dcnode-id="678"><span data-dcnode-id="683" instrument_node="">This pleased Haman greatly. Yet, he did not realize the king was 
having a troubled night sleeping. Thus, while Haman may have been 
planning his murderous scheme of Mordecai, the king was having the </span><b data-dcnode-id="680"><i data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">"the book of records, the chronicles"</span></i></b><span data-dcnode-id="679" instrument_node=""> read to him, in all likelihood an attempt to put his troubled soul to sleep. Once again God's timing manifests itself.

</span></p><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">It just happened  the record of Mordecai's report of the 
assassination attempt on the king was read to the king. At which point 
the king asked what had been done as a reward for Mordecai. His servants
 reported that nothing had been done. Xerxes then seeks the advice of 
anybody found at court. The only person found was Haman. 

</span></p><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Ironically, verse four states Haman had just entered the court to
 discuss with the king his plan to hang Mordecai. It is interesting to 
point out that while Haman was planning Mordecai's demise, at the 
precise time the king was planning his honor. He asks Haman what should 
be done to one who has gained the favor of the king. 

</span></p><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Haman, in all of his vanity and pride, believed the king to be 
talking of himself. Thus, Haman's answer was to shower the particular 
individual with royal pomp and splendor. 

</span></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">In Haman's mind, the day could not begin any better. Not only had
 he just planned his own parade, but he was about to vanquish his 
nemesis.  Verse ten records the king's orders to his servant Haman.

</span></p><p data-dcnode-id="665"><b data-dcnode-id="667"><i data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">"Then the king said to Haman, 'Take quickly the robes and 
the horse as you have said, and do so for Mordecai the Jew, who is 
sitting at the king's gate; do not fall short in anything of all that 
you have said."</span></i></b><span data-dcnode-id="666" instrument_node="">
</span></p><p data-dcnode-id="659"><span data-dcnode-id="664" instrument_node="">The shock to Haman's system must have been like a hammer to the chest. As soon as the ordeal with Mordecai was over, </span><b data-dcnode-id="661"><i data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">"Haman hurried  home, mourning, with his head covered"</span></i></b><span data-dcnode-id="660" instrument_node="">.
 Yet, things were to get much worse for Haman.  For Queen Esther of the 
Bible had just readied her second banquet for Haman and the king, thus 
the king's servants arrived at Haman's home to take him to the banquet. 

</span></p><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">It is at this time that Esther queen of Persia issued her request
 to the king.  She pleas to the king in verse four. Interestingly, it 
does not appear that Queen Esther of the Bible ever tells the king she 
is a Jew outright. Instead, she states her people are to be killed by 
the order of Haman, thus the king would've realized Esther was a Jew.

</span></p><p data-dcnode-id="652"><b data-dcnode-id="654"><i data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">"for we have been sold, I and my people, to be destroyed, to be killed and to be annihilated..."</span></i></b><span data-dcnode-id="653" instrument_node="">
</span></p><p data-dcnode-id="646"><span data-dcnode-id="651" instrument_node="">The king asked Queen Esther of the Bible; </span><b data-dcnode-id="648"><i data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">"Who is he, and where is he, who would presume to do thus?"</span></i></b><span data-dcnode-id="647" instrument_node="">
</span></p><p data-dcnode-id="633"><span data-dcnode-id="645" instrument_node="">At which point Queen Esther of the Bible revealed that it was Haman; </span><b data-dcnode-id="642"><i data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">"a foe and an enemy, is this wicked Haman"</span></i></b><span data-dcnode-id="641" instrument_node="">.
 The king arose in anger and stormed from the room. Haman, terrified by 
the fact Esther queen of Persia was a Jew, begged of her for his life. 
His pleas were so earnest he reached out his hand, and grabbed hold of 
the queen. At this moment, the king came back into the room, and 
witnessed Haman </span><b data-dcnode-id="638"><i data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">"falling on the couch where Esther was"</span></i></b><span data-dcnode-id="637" instrument_node="">. The king's response was swift. In </span><b data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Esther 7:10</span></b><span data-dcnode-id="634" instrument_node=""> Haman's fate was sealed on the very gallows he had built.

</span></p><p data-dcnode-id="628"><b data-dcnode-id="630"><i data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">"So they hanged Haman on the gallows, which he had prepared for Mordecai, and the king's anger subsided."</span></i></b><span data-dcnode-id="629" instrument_node="">
</span></p><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Thus Queen Esther of the Bible had saved the fate of the Jewish 
people throughout all of the Persian Empire. Not only that, but the king
 issued another decree freeing the Jews from execution, and allowing 
them to take up arms against those threatening them. This was done upon 
request by Esther to the king. Thus, on the thirteenth day of Adar, the 
Jews rose up in the Persian Empire, slaughtering 75, 000 men in Persia. 
Eight hundred men were killed by the Jews of Susa. Yet, Scripture 
records on the fourteenth day of Adar they rested. 

</span></p><span data-dcnode-id="625" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="615"><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/SindhCapturedByPersians.jpg" rel="gallery[pageGallery]" title="Ancient Sindh, captured by the Persian army."><img alt="Ancient Sindh, captured by the Persian army." data-dcnode-id="624" data-pin-media="https://www.israel-a-history-of.com/images/SindhCapturedByPersians.jpg" height="166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.israel-a-history-of.com/images/xSindhCapturedByPersians.jpg.pagespeed.ic.bwR8FvrNTr.jpg&amp;raw" style="width: 250px; height: auto; border-color: #000000; border-width: 1px 1px 1px 1px; border-style: solid" title="Ancient Sindh, captured by the Persian army." width="250"></a><div class="pinit" data-dcnode-id="616"><span data-dcnode-id="622" instrument_node="">
</span><a class="PIN_1651311227602_button_pin PIN_1651311227602_beside PIN_1651311227602_save PIN_1651311227602_padded" data-dcnode-id="618" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-11&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FSindhCapturedByPersians.jpg&amp;description=Ancient%20Sindh%2C%20captured%20by%20the%20Persian%20army." data-pin-log="button_pinit" data-pin-x="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DZgwrgucG1ZEb-11%26url%3Dhttp%253A%252F%252Fwww.israel-a-history-of.com%252Fqueen-esther-of-the-bible.html%26media%3Dhttps%253A%252F%252Fwww.israel-a-history-of.com%252Fimages%252FSindhCapturedByPersians.jpg%26description%3DAncient%2520Sindh%252C%2520captured%2520by%2520the%2520Persian%2520army."><span class="PIN_1651311227602_count" data-dcnode-id="620" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ZgwrgucG1ZEb-11&amp;url=http%3A%2F%2Fwww.israel-a-history-of.com%2Fqueen-esther-of-the-bible.html&amp;media=https%3A%2F%2Fwww.israel-a-history-of.com%2Fimages%2FSindhCapturedByPersians.jpg&amp;description=Ancient%20Sindh%2C%20captured%20by%20the%20Persian%20army." data-pin-log="button_pinit" data-pin-x="60"><span data-dcnode-id="621" instrument_node="">60</span></span><span data-dcnode-id="619" instrument_node="">Save</span></a><span data-dcnode-id="617" instrument_node="">
</span></div></div><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="613" instrument_node="">Mordecai implements a feast to commemorate the day in </span><b data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Esther 9:20-22</span></b><span data-dcnode-id="610" instrument_node="">. Queen Esther of the Bible was to be remembered throughout the remained of history on this festive day.

</span></p><p data-dcnode-id="604"><b data-dcnode-id="606"><i data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">"Then Mordecai recorded these events, and he sent letters 
to all the Jews who were in all the provinces of King Ahaseurus, both 
near and far, obliging them to celebrate the fourteenth day of the month
 Adar, and the fifteenth day of the same month, annually, because on 
those days the Jews rid themselves of their enemies, and it was a month 
which was turned for them from sorrow into gladness and from mourning 
into a holiday; that they should make them days of feasting and 
rejoicing and sending portions of food to one another and gifts to the 
poor."</span></i></b><span data-dcnode-id="605" instrument_node="">
</span></p><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">This feast is called Purim. Pur is Hebrew for "lot", thus Purim 
is the plural, or "lots". Lots are what Haman cast to determine the day 
of their destruction. God, however, delivered His people through Queen 
Esther of the Bible. 

</span></p><span data-dcnode-id="601" instrument_node="">
</span><div data-dcnode-id="571" style="overflow-x: auto;"><span data-dcnode-id="600" instrument_node="">
</span><table border="0" class="columns_block grid_block" data-dcnode-id="573" style="width: 100%;"><tbody data-dcnode-id="574"><tr data-dcnode-id="575"><td class="column_0" data-dcnode-id="592" style="width: 50%;vertical-align:top;"><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">After the king granted them the right to celebrate Purim, the Jews 
swore to each year honor the occasion. Purim lasts two days, and is an 
occasion of much joy amongst the Jews. It is a celebration of rest, and 
people exchange presents. The month of Adar typically corresponds with 
the month of March. 

</span></p><p data-dcnode-id="594"><span data-dcnode-id="596" instrument_node="">Hence to this day Queen Esther of the Bible is commemorated 
during the Feast of Purim. </span><br data-dcnode-id="595"></p><span data-dcnode-id="593" instrument_node="">
</span></td><td class="column_1" data-dcnode-id="576" style="width: 50%;vertical-align:top;"><span data-dcnode-id="591" instrument_node="">
