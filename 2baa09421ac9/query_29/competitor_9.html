</span></div><span class="marker before-article" data-dcnode-id="2074"></span><div class="md-sentinel--spy-target" data-dcnode-id="2073"></div><section data-dcnode-id="2012" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="2050"><strong data-dcnode-id="2070"><span data-dcnode-id="2072" id="ref14810"></span><span data-dcnode-id="2071" instrument_node="">Bardiya</span></strong><span data-dcnode-id="2069" instrument_node="">, also called </span><strong data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Smerdis</span></strong><span data-dcnode-id="2066" instrument_node="">,  (died 522 </span><span class="text-smallcaps" data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">bce</span></span><span data-dcnode-id="2063" instrument_node="">), a son of </span><a class="md-crosslink" data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Cyrus-the-Great"><span data-dcnode-id="2062" instrument_node="">Cyrus the Great</span></a><span data-dcnode-id="2060" instrument_node=""> of </span><a class="md-crosslink autoxref" data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Persia"><span data-dcnode-id="2059" instrument_node="">Persia</span></a><span data-dcnode-id="2057" instrument_node=""> and possible </span><a class="md-crosslink autoxref" data-dcnode-id="2055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/king-monarch"><span data-dcnode-id="2056" instrument_node="">king</span></a><span data-dcnode-id="2054" instrument_node=""> of Persia in 522 </span><span class="text-smallcaps" data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">bce</span></span><span data-dcnode-id="2051" instrument_node="">, although some accounts claim the king known as Bardiya was an impersonator of that son.</span></p><span class="marker p1" data-dcnode-id="2048"></span><span class="marker AM1 am-inline" data-dcnode-id="2046"></span><span class="marker MOD1 mod-inline" data-dcnode-id="2044"></span><p class="topic-paragraph" data-dcnode-id="2019"><span data-dcnode-id="2043" instrument_node="">The Greek historian </span><a class="md-crosslink" data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Herodotus-Greek-historian"><span data-dcnode-id="2042" instrument_node="">Herodotus</span></a><span data-dcnode-id="2040" instrument_node=""> and the </span><a class="md-crosslink autoxref" data-dcnode-id="2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Persian"><span data-dcnode-id="2039" instrument_node="">Persian</span></a><span data-dcnode-id="2037" instrument_node=""> king </span><span data-dcnode-id="2036" id="ref14811"></span><a class="md-crosslink" data-dcnode-id="2034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Darius-I"><span data-dcnode-id="2035" instrument_node="">Darius</span></a><span data-dcnode-id="2033" instrument_node="">, in his inscription at Bīsitūn, state that Bardiya was murdered by his brother, </span><a class="md-crosslink" data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Cambyses-II"><span data-dcnode-id="2032" instrument_node="">Cambyses II</span></a><span data-dcnode-id="2030" instrument_node="">, but was later successfully impersonated by </span><span data-dcnode-id="2029" id="ref14812"></span><a class="md-crosslink" data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Gaumata"><span data-dcnode-id="2028" instrument_node="">Gaumata</span></a><span data-dcnode-id="2026" instrument_node="">, a Magian, who was able to seize the throne when Cambyses died in 522 </span><span class="text-smallcaps" data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">bce</span></span><span data-dcnode-id="2023" instrument_node="">. The usurper reigned for only eight months, however, before he was </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="2021" data-term="slain" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/slain"><span data-dcnode-id="2022" instrument_node="">slain</span></a><span data-dcnode-id="2020" instrument_node=""> by Darius and other Persian nobles suspicious of his origin. Certain modern historians consider that Darius, who succeeded to the throne, invented the story of Gaumata to justify his actions and that the murdered king had indeed been a son of Cyrus.</span></p><span class="marker p2" data-dcnode-id="2017"></span><span class="marker AM2 am-inline" data-dcnode-id="2015"></span><span class="marker MOD2 mod-inline" data-dcnode-id="2013"></span></section><span data-dcnode-id="2011" instrument_node="">

</span><div class="md-intent-accordion mb-30 p-10 border border-gray-200 border-top-purple border-top-5 rounded-bl rounded-br shadow-sm" data-dcnode-id="1281" id="intent-accordion"><div class="title mb-5 font-weight-bold text-uppercase font-14 text-center" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Top Questions</span></div><h3 class="accordion--question p-10 pr-25 bg-gray-100 mb-0 mt-5" data-dcnode-id="1425" data-value="1"><div class="pe-none" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Why was Cyrus the Great “great”?</span></div></h3><div class="accordion--answer hidden border border-top-0" data-dcnode-id="1401"><div class="accordion--answer-copy p-20 bg-gray-50" data-dcnode-id="1407"><p class="font-16 lh-sm" data-dcnode-id="1408"><span data-dcnode-id="1424" instrument_node="">Cyrus the Great was the founder of the </span><a class="md-crosslink" data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Achaemenian-dynasty"><span data-dcnode-id="1423" instrument_node="">Achaemenian</span></a><span data-dcnode-id="1421" instrument_node=""> Empire. His empire, stretching from the </span><a class="md-crosslink" data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Aegean-Sea"><span data-dcnode-id="1420" instrument_node="">Aegean Sea</span></a><span data-dcnode-id="1418" instrument_node=""> to the </span><a class="md-crosslink" data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Indus-River"><span data-dcnode-id="1417" instrument_node="">Indus River</span></a><span data-dcnode-id="1415" instrument_node="">, was the largest that had ever existed at the time of his rule. Cyrus pieced his kingdom together using a mixture of conquest and diplomacy, attesting to his skills as a warrior and a statesman. His reputation as “great” was probably enhanced by the extent to which his figure was mythologized. The Greek historian </span><a class="md-crosslink" data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Herodotus-Greek-historian"><span data-dcnode-id="1414" instrument_node="">Herodotus</span></a><span data-dcnode-id="1412" instrument_node=""> recorded one of the most well-known legends about the ruler in his </span><em data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">History</span></em><span data-dcnode-id="1409" instrument_node="">.</span></p></div><div class="connections" data-dcnode-id="1402"><a class="p-20 p-sm-30" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Achaemenian-dynasty"><div class="text-decoration-underline text-blue" data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Achaemenian Dynasty</span></div><span data-dcnode-id="1404" instrument_node="">Read more about the Achaemenian dynasty.</span></a></div></div><h3 class="accordion--question p-10 pr-25 bg-gray-100 mb-0 mt-5" data-dcnode-id="1398" data-value="2"><div class="pe-none" data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">How did Cyrus the Great become king? </span></div></h3><div class="accordion--answer hidden border border-top-0" data-dcnode-id="1367"><div class="accordion--answer-copy p-20 bg-gray-50" data-dcnode-id="1373"><p class="font-16 lh-sm" data-dcnode-id="1378"><span data-dcnode-id="1397" instrument_node="">In </span><a class="md-crosslink" data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Herodotus-Greek-historian"><span data-dcnode-id="1396" instrument_node="">Herodotus</span></a><span data-dcnode-id="1394" instrument_node="">’s historically dubious account of Cyrus’s upbringing, Cyrus overthrows his grandfather </span><a class="md-crosslink" data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Astyages"><span data-dcnode-id="1393" instrument_node="">Astyages</span></a><span data-dcnode-id="1391" instrument_node=""> and unites the latter’s </span><a class="md-crosslink" data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Mede"><span data-dcnode-id="1390" instrument_node="">Median</span></a><span data-dcnode-id="1388" instrument_node=""> kingdom with the Persian one he inherited. Herodotus’s telling proceeds in a recognizably mythic fashion: King </span><a class="md-crosslink" data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Astyages"><span data-dcnode-id="1387" instrument_node="">Astyages</span></a><span data-dcnode-id="1385" instrument_node=""> has a dream that his grandson Cyrus would usurp him. Astyages tries to forestall the events of the dream but instead brings them to fruition. Alternate versions of Cyrus’s life can be found in other Classical texts, such as works by the Greek historians </span><a class="md-crosslink" data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Xenophon"><span data-dcnode-id="1384" instrument_node="">Xenophon</span></a><span data-dcnode-id="1382" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Ctesias"><span data-dcnode-id="1381" instrument_node="">Ctesias</span></a><span data-dcnode-id="1379" instrument_node="">—both of whom lived not long after Herodotus.</span></p><div class="continue-reading" data-dcnode-id="1374"><span data-dcnode-id="1377" instrument_node="">
			Read more below:
		    </span><a data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Cyrus-the-Great%23ref1683"><span data-dcnode-id="1376" instrument_node="">Life and legend</span></a></div></div><div class="connections" data-dcnode-id="1368"><a class="p-20 p-sm-30" data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Astyages"><div class="text-decoration-underline text-blue" data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Astyages</span></div><span data-dcnode-id="1370" instrument_node="">Read more about Astyages, Cyrus’s grandfather.</span></a></div></div><h3 class="accordion--question p-10 pr-25 bg-gray-100 mb-0 mt-5" data-dcnode-id="1364" data-value="3"><div class="pe-none" data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">What did Cyrus the Great conquer?</span></div></h3><div class="accordion--answer hidden border border-top-0" data-dcnode-id="1336"><div class="accordion--answer-copy p-20 bg-gray-50" data-dcnode-id="1342"><p class="font-16 lh-sm" data-dcnode-id="1347"><span data-dcnode-id="1363" instrument_node="">Cyrus’s career as a military leader began in earnest in 550 BCE, when he rose up against his </span><a class="md-crosslink" data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Mede"><span data-dcnode-id="1362" instrument_node="">Median</span></a><span data-dcnode-id="1360" instrument_node=""> overlord (and by some accounts, his grandfather), King </span><a class="md-crosslink" data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Astyages"><span data-dcnode-id="1359" instrument_node="">Astyages</span></a><span data-dcnode-id="1357" instrument_node="">. Cyrus led other much-mythologized campaigns during his reign, such as his conquests of </span><a class="md-crosslink" data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Lydia-ancient-region-Anatolia"><span data-dcnode-id="1356" instrument_node="">Lydia</span></a><span data-dcnode-id="1354" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Babylonia"><span data-dcnode-id="1353" instrument_node="">Babylonia</span></a><span data-dcnode-id="1351" instrument_node="">. An account of the latter appears in the </span><a class="md-crosslink" data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Old-Testament"><span data-dcnode-id="1350" instrument_node="">Bible</span></a><span data-dcnode-id="1348" instrument_node="">: Cyrus is the ruler that liberated the Jewish people from their Babylonian captors. Our knowledge of his reign after this point is vague, although it’s likely that he died while undertaking campaigns on his eastern frontier.</span></p><div class="continue-reading" data-dcnode-id="1343"><span data-dcnode-id="1346" instrument_node="">
			Read more below:
		    </span><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Cyrus-the-Great%23ref1684"><span data-dcnode-id="1345" instrument_node="">Cyrus’s conquests</span></a></div></div><div class="connections" data-dcnode-id="1337"><a class="p-20 p-sm-30" data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/Babylonian-Captivity"><div class="text-decoration-underline text-blue" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Babylonian Captivity</span></div><span data-dcnode-id="1339" instrument_node="">Read more about the Babylonian Captivity of the Jewish people.</span></a></div></div><h3 class="accordion--question p-10 pr-25 bg-gray-100 mb-0 mt-5" data-dcnode-id="1333" data-value="4"><div class="pe-none" data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">What ancient sources mention Cyrus the Great?</span></div></h3><div class="accordion--answer hidden border border-top-0" data-dcnode-id="1302"><div class="accordion--answer-copy p-20 bg-gray-50" data-dcnode-id="1308"><p class="font-16 lh-sm" data-dcnode-id="1313"><span data-dcnode-id="1332" instrument_node="">The Greek historian </span><a class="md-crosslink" data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Herodotus-Greek-historian"><span data-dcnode-id="1331" instrument_node="">Herodotus</span></a><span data-dcnode-id="1329" instrument_node=""> provides the most famous account of Cyrus’s life in his </span><em data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">History</span></em><span data-dcnode-id="1326" instrument_node="">, a work that was probably as much fiction as it was fact (if not more). Later writers in antiquity also took part in lionizing Cyrus, sacrificing historical accuracy in the process. In the 4th century BCE, </span><a class="md-crosslink" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Xenophon"><span data-dcnode-id="1325" instrument_node="">Xenophon</span></a><span data-dcnode-id="1323" instrument_node=""> wrote a biography that framed Cyrus as the ideal ruler; </span><a class="md-crosslink" data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Ctesias"><span data-dcnode-id="1322" instrument_node="">Ctesias</span></a><span data-dcnode-id="1320" instrument_node=""> also wrote about Cyrus’s life in the 4th century, offering an account that diverges notably from Herodotus’s. Cyrus also appears briefly in the </span><a class="md-crosslink" data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Old-Testament"><span data-dcnode-id="1319" instrument_node="">Bible</span></a><span data-dcnode-id="1317" instrument_node=""> as the ruler who freed the Jewish people from captivity in </span><a class="md-crosslink" data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Babylonia"><span data-dcnode-id="1316" instrument_node="">Babylonia</span></a><span data-dcnode-id="1314" instrument_node="">.</span></p><div class="continue-reading" data-dcnode-id="1309"><span data-dcnode-id="1312" instrument_node="">
			Read more below:
		    </span><a data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Cyrus-the-Great%23ref1683"><span data-dcnode-id="1311" instrument_node="">Life and legend</span></a></div></div><div class="connections" data-dcnode-id="1303"><a class="p-20 p-sm-30" data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Herodotus-Greek-historian"><div class="text-decoration-underline text-blue" data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Herodotus</span></div><span data-dcnode-id="1305" instrument_node="">Read more about Herodotus.</span></a></div></div><h3 class="accordion--question p-10 pr-25 bg-gray-100 mb-0 mt-5" data-dcnode-id="1299" data-value="5"><div class="pe-none" data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">How did Cyrus the Great die?</span></div></h3><div class="accordion--answer hidden border border-top-0" data-dcnode-id="1282"><div class="accordion--answer-copy p-20 bg-gray-50" data-dcnode-id="1283"><p class="font-16 lh-sm" data-dcnode-id="1288"><span data-dcnode-id="1298" instrument_node="">Little is known about the last years of Cyrus’s life, and various contradicting stories of his death exist. It’s clear that he died while campaigning on his empire’s eastern frontier, somewhere near the </span><a class="md-crosslink" data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Amu-Darya"><span data-dcnode-id="1297" instrument_node="">Oxus</span></a><span data-dcnode-id="1295" instrument_node=""> (Amu Darya) and </span><a class="md-crosslink" data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Syr-Darya"><span data-dcnode-id="1294" instrument_node="">Jaxartes</span></a><span data-dcnode-id="1292" instrument_node=""> (Syr Darya) rivers. </span><a class="md-crosslink" data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Herodotus-Greek-historian"><span data-dcnode-id="1291" instrument_node="">Herodotus</span></a><span data-dcnode-id="1289" instrument_node=""> offers an account of Cyrus’s downfall wherein the queen of a nomadic group that Cyrus is trying to conquer, and whose son Cyrus has killed, placed Cyrus’s disembodied head in a bag of human blood to “give [him his] fill”. By Herodotus’s own admission, however, this is only one of several versions of the events that he had come across.</span></p><div class="continue-reading" data-dcnode-id="1284"><span data-dcnode-id="1287" instrument_node="">
			Read more below:
		    </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Cyrus-the-Great%23ref1684"><span data-dcnode-id="1286" instrument_node="">Cyrus’s conquests</span></a></div></div></div></div><span class="marker before-article" data-dcnode-id="1279"></span><div class="md-sentinel--spy-target" data-dcnode-id="1278"></div><section data-dcnode-id="1222" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="1229"><strong data-dcnode-id="1275"><span data-dcnode-id="1277" id="ref91534"></span><span data-dcnode-id="1276" instrument_node="">Cyrus the Great</span></strong><span data-dcnode-id="1274" instrument_node="">, also called </span><strong data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Cyrus II</span></strong><span data-dcnode-id="1271" instrument_node="">,  (born 590–580 </span><span class="text-smallcaps" data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">bce</span></span><span data-dcnode-id="1268" instrument_node="">, </span><a class="md-crosslink autoxref" data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Media-ancient-region-Iran"><span data-dcnode-id="1267" instrument_node="">Media</span></a><span data-dcnode-id="1265" instrument_node="">, or Persis [now in Iran]—died c. 529, Asia), conqueror who founded the Achaemenian </span><a class="md-crosslink autoxref" data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/empire-political-science"><span data-dcnode-id="1264" instrument_node="">empire</span></a><span data-dcnode-id="1262" instrument_node="">, centred on </span><a class="md-crosslink autoxref" data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Persia"><span data-dcnode-id="1261" instrument_node="">Persia</span></a><span data-dcnode-id="1259" instrument_node=""> and </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1257" data-term="comprising" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/comprising"><span data-dcnode-id="1258" instrument_node="">comprising</span></a><span data-dcnode-id="1256" instrument_node=""> the </span><span data-dcnode-id="1255" id="ref91535"></span><a class="md-crosslink" data-dcnode-id="1253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Near-East"><span data-dcnode-id="1254" instrument_node="">Near East</span></a><span data-dcnode-id="1252" instrument_node=""> from the </span><a class="md-crosslink autoxref" data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Aegean-Sea"><span data-dcnode-id="1251" instrument_node="">Aegean Sea</span></a><span data-dcnode-id="1249" instrument_node=""> eastward to the </span><a class="md-crosslink autoxref" data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Indus-River"><span data-dcnode-id="1248" instrument_node="">Indus River</span></a><span data-dcnode-id="1246" instrument_node="">. He is also remembered in the Cyrus legend—first recorded by </span><span data-dcnode-id="1245" id="ref91536"></span><a class="md-crosslink" data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Xenophon"><span data-dcnode-id="1244" instrument_node="">Xenophon</span></a><span data-dcnode-id="1242" instrument_node="">, Greek soldier and author, in his </span><em data-dcnode-id="1238"><span data-dcnode-id="1241" id="ref91537"></span><a class="md-crosslink" data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Cyropaedia"><span data-dcnode-id="1240" instrument_node="">Cyropaedia</span></a></em><span data-dcnode-id="1237" instrument_node="">—as a tolerant and ideal monarch who was called the father of his people by the ancient Persians. In the </span><a class="md-crosslink autoxref" data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Bible"><span data-dcnode-id="1236" instrument_node="">Bible</span></a><span data-dcnode-id="1234" instrument_node=""> he is the liberator of the </span><span data-dcnode-id="1233" id="ref91538"></span><a class="md-crosslink" data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Judaism"><span data-dcnode-id="1232" instrument_node="">Jews</span></a><span data-dcnode-id="1230" instrument_node=""> who were captive in Babylonia.</span></p><span class="marker p1" data-dcnode-id="1227"></span><span class="marker AM1 am-inline" data-dcnode-id="1225"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1223"></span></section><span data-dcnode-id="1221" instrument_node=""> </span><span class="marker h2" data-dcnode-id="1219"></span><div class="md-sentinel--spy-target" data-dcnode-id="1218"></div><section data-dcnode-id="1101" data-has-spy="true" data-level="1" id="ref1683"><h2 class="h1" data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Life and legend</span></h2><span data-dcnode-id="1214" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1202"><span data-dcnode-id="1213" instrument_node="">Cyrus was born between 590 and 580 </span><span class="text-smallcaps" data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">bce</span></span><span data-dcnode-id="1210" instrument_node="">, either in Media or, more probably, in </span><span data-dcnode-id="1209" id="ref91539"></span><a class="md-crosslink" data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Persis"><span data-dcnode-id="1208" instrument_node="">Persis</span></a><span data-dcnode-id="1206" instrument_node="">, the modern Fārs province of </span><a class="md-crosslink autoxref" data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Iran"><span data-dcnode-id="1205" instrument_node="">Iran</span></a><span data-dcnode-id="1203" instrument_node="">. The meaning of his name is in dispute, for it is not known whether it was a personal name or a throne name given to him when he became a ruler. It is noteworthy that after the Achaemenian empire the name does not appear again in sources relating to Iran, which may indicate some special sense of the name.</span></p><span class="marker p2" data-dcnode-id="1200"></span><span class="marker AM2 am-inline" data-dcnode-id="1198"></span><span class="marker MOD2 mod-inline" data-dcnode-id="1196"></span><span data-dcnode-id="1195" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node="">Most scholars agree, however, that Cyrus the Great was at least the second of the name to rule in Persia. One </span><a class="md-crosslink autoxref" data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/cuneiform"><span data-dcnode-id="1193" instrument_node="">cuneiform</span></a><span data-dcnode-id="1191" instrument_node=""> text in Akkadian—the language of Mesopotamia (present-day Iraq) in the pre-Christian era—asserts he was the</span></p><span class="marker p3" data-dcnode-id="1188"></span><span class="marker AM3 am-inline" data-dcnode-id="1186"></span><span class="marker MOD3 mod-inline" data-dcnode-id="1184"></span><span data-dcnode-id="1183" instrument_node=""> </span><blockquote data-dcnode-id="1168"><p data-dcnode-id="1169"><span data-dcnode-id="1182" instrument_node="">son of Cambyses, great </span><span data-dcnode-id="1181" id="ref91540"></span><a class="md-crosslink" data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/king-list"><span data-dcnode-id="1180" instrument_node="">king</span></a><span data-dcnode-id="1178" instrument_node="">, king of </span><span data-dcnode-id="1177" id="ref91541"></span><a class="md-crosslink" data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Anshan-ancient-territory-Iran"><span data-dcnode-id="1176" instrument_node="">Anshan</span></a><span data-dcnode-id="1174" instrument_node="">, grandson of Cyrus, great king, king of Anshan, descendant of </span><span data-dcnode-id="1173" id="ref91542"></span><a class="md-crosslink" data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Teispes"><span data-dcnode-id="1172" instrument_node="">Teispes</span></a><span data-dcnode-id="1170" instrument_node="">, great king, king of Anshan, of a family [which] always [exercised] kingship.</span></p></blockquote><span data-dcnode-id="1167" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">In any case, it is clear that Cyrus came from a long line of ruling chiefs.</span></p><span class="marker p5" data-dcnode-id="1163"></span><span class="marker AM5 am-inline" data-dcnode-id="1161"></span><span class="marker MOD5 mod-inline" data-dcnode-id="1159"></span><span data-dcnode-id="1158" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1108"><span data-dcnode-id="1157" instrument_node="">The most important source for his life is the Greek historian </span><span data-dcnode-id="1156" id="ref91543"></span><a class="md-crosslink" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Herodotus-Greek-historian"><span data-dcnode-id="1155" instrument_node="">Herodotus</span></a><span data-dcnode-id="1153" instrument_node="">. The idealized biography by Xenophon is a work for the edification of the </span><span data-dcnode-id="1152" id="ref91544"></span><a class="md-crosslink" data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/ancient-Greece"><span data-dcnode-id="1151" instrument_node="">Greeks</span></a><span data-dcnode-id="1149" instrument_node=""> concerning the ideal ruler, rather than a historical </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1147" data-term="treatise" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/treatise"><span data-dcnode-id="1148" instrument_node="">treatise</span></a><span data-dcnode-id="1146" instrument_node="">. It does, however, indicate the high esteem in which Cyrus was held, not only by his own people, the Persians, but by the Greeks and others. Herodotus says that the Persians called Cyrus their father, while later Achaemenian rulers were not so well regarded. The story of the childhood of Cyrus, as told by Herodotus with echoes in Xenophon, may be called a Cyrus </span><span data-dcnode-id="1145" id="ref91545"></span><a class="md-crosslink" data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/art/legend-literature"><span data-dcnode-id="1144" instrument_node="">legend</span></a><span data-dcnode-id="1142" instrument_node=""> since it obviously follows a pattern of folk beliefs about the almost superhuman qualities of the founder of a </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1140" data-term="dynasty" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/dynasty"><span data-dcnode-id="1141" instrument_node="">dynasty</span></a><span data-dcnode-id="1139" instrument_node="">. Similar beliefs also exist about the founders of later </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1137" data-term="dynasties" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/dynasties"><span data-dcnode-id="1138" instrument_node="">dynasties</span></a><span data-dcnode-id="1136" instrument_node=""> throughout the </span><a class="md-crosslink autoxref" data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/history"><span data-dcnode-id="1135" instrument_node="">history</span></a><span data-dcnode-id="1133" instrument_node=""> of Iran. According to the </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1131" data-term="legend" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/legend"><span data-dcnode-id="1132" instrument_node="">legend</span></a><span data-dcnode-id="1130" instrument_node="">, Astyages, the king of the </span><span data-dcnode-id="1129" id="ref91546"></span><a class="md-crosslink" data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Media-ancient-region-Iran"><span data-dcnode-id="1128" instrument_node="">Medes</span></a><span data-dcnode-id="1126" instrument_node=""> and overlord of the Persians, gave his daughter in marriage to his </span><a class="md-crosslink autoxref" data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/vassal"><span data-dcnode-id="1125" instrument_node="">vassal</span></a><span data-dcnode-id="1123" instrument_node=""> in Persis, a prince called </span><span data-dcnode-id="1122" id="ref91547"></span><a class="md-crosslink" data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Cambyses-I"><span data-dcnode-id="1121" instrument_node="">Cambyses</span></a><span data-dcnode-id="1119" instrument_node="">. From this marriage Cyrus was born. </span><span data-dcnode-id="1118" id="ref91548"></span><a class="md-crosslink" data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Astyages"><span data-dcnode-id="1117" instrument_node="">Astyages</span></a><span data-dcnode-id="1115" instrument_node="">, having had a dream that the baby would grow up to overthrow him, ordered Cyrus slain. His chief adviser, however, instead gave the baby to a shepherd to raise. When he was 10 years old, Cyrus, because of his outstanding qualities, was discovered by Astyages, who, in spite of the dream, was persuaded to allow the boy to live. Cyrus, when he reached manhood in Persis, revolted against his maternal grandfather and overlord. Astyages marched against the rebel, but his army deserted him and </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1113" data-term="surrendered" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/surrendered"><span data-dcnode-id="1114" instrument_node="">surrendered</span></a><span data-dcnode-id="1112" instrument_node=""> to Cyrus in 550 </span><span class="text-smallcaps" data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">bce</span></span><span data-dcnode-id="1109" instrument_node="">.</span></p><span class="marker p6" data-dcnode-id="1106"></span><span class="marker AM6 am-inline" data-dcnode-id="1104"></span><span class="marker MOD6 mod-inline" data-dcnode-id="1102"></span></section><span data-dcnode-id="1100" instrument_node=""> </span><span class="marker h3" data-dcnode-id="1098"></span><div class="md-sentinel--spy-target" data-dcnode-id="1097"></div><section data-dcnode-id="884" data-has-spy="true" data-level="1" id="ref1684"><h2 class="h1" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Cyrus’s conquests</span></h2><span data-dcnode-id="1093" instrument_node=""> </span><div class="assemblies inline-video" data-dcnode-id="1074"><div class="w-100" data-dcnode-id="1075"><figure class="md-assembly card print-false" data-assembly-id="245664" data-dcnode-id="1076"><div class="md-assembly-wrapper card-media" data-dcnode-id="1086" data-type="video"><a class="d-flex justify-content-center" data-dcnode-id="1087" data-id="215350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/video/215350/Questions-answers-Cyrus-the-Great" style="--aspect-ratio: 16/9"><img alt="Learn about Cyrus the Great and the Achaemenian Empire" data-dcnode-id="1092" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/50/215350-138-1FD72DEE/Questions-answers-Cyrus-the-Great.jpg%3Fw%3D800%26h%3D450%26c%3Dcrop&amp;raw"><div class="btn btn-xl btn-white btn-circle position-absolute shadow" data-dcnode-id="1088" style="top: 50%; transform: translateY(-50%)"><em class="material-icons" data-dcnode-id="1089" data-icon="play_arrow"></em></div></a></div><figcaption class="card-body" data-dcnode-id="1077"><div class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Learn about Cyrus the Great and the Achaemenian Empire</span></div><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Questions and answers about Cyrus the Great.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Encyclopædia Britannica, Inc.</span></cite><a class="font-14 mt-10 d-inline-block" data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Cyrus-the-Great/images-videos"><span data-dcnode-id="1079" instrument_node="">See all videos for this article</span></a></figcaption></figure></div></div><p class="topic-paragraph" data-dcnode-id="1027"><span data-dcnode-id="1073" instrument_node="">After inheriting the empire of the Medes, Cyrus first had to consolidate his power over Iranian tribes on the Iranian plateau before expanding to the west. </span><span data-dcnode-id="1072" id="ref91549"></span><a class="md-crosslink" data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Croesus"><span data-dcnode-id="1071" instrument_node="">Croesus</span></a><span data-dcnode-id="1069" instrument_node="">, king of </span><span data-dcnode-id="1068" id="ref91550"></span><a class="md-crosslink" data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Lydia-ancient-region-Anatolia"><span data-dcnode-id="1067" instrument_node="">Lydia</span></a><span data-dcnode-id="1065" instrument_node=""> in Asia Minor (</span><span data-dcnode-id="1064" id="ref91551"></span><a class="md-crosslink" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Anatolia"><span data-dcnode-id="1063" instrument_node="">Anatolia</span></a><span data-dcnode-id="1061" instrument_node="">), had enlarged his domains at the expense of the Medes when he heard of the fall of Astyages, and Cyrus, as successor of the Median king, marched against Lydia. </span><span data-dcnode-id="1060" id="ref91552"></span><a class="md-crosslink" data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Sardis"><span data-dcnode-id="1059" instrument_node="">Sardis</span></a><span data-dcnode-id="1057" instrument_node="">, the Lydian capital, was captured in 547 or 546, and Croesus was either killed or burned himself to death, though according to other sources he was taken prisoner by Cyrus and well treated. The </span><span data-dcnode-id="1056" id="ref91554"></span><a class="md-crosslink" data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Ionia"><span data-dcnode-id="1055" instrument_node="">Ionian</span></a><span data-dcnode-id="1053" instrument_node=""> Greek cities on the </span><span data-dcnode-id="1052" id="ref91553"></span><a class="md-crosslink" data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Aegean-civilization"><span data-dcnode-id="1051" instrument_node="">Aegean</span></a><span data-dcnode-id="1049" instrument_node=""> Sea coast, as </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1047" data-term="vassals" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/vassals"><span data-dcnode-id="1048" instrument_node="">vassals</span></a><span data-dcnode-id="1046" instrument_node=""> of the Lydian king, now became subject to Cyrus, and most of them submitted after short sieges. Several revolts of the Greek cities were later suppressed with severity. Next Cyrus turned to </span><span data-dcnode-id="1045" id="ref91555"></span><a class="md-crosslink" data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Babylonia"><span data-dcnode-id="1044" instrument_node="">Babylonia</span></a><span data-dcnode-id="1042" instrument_node="">, where the dissatisfaction of the people with the ruler </span><span data-dcnode-id="1041" id="ref91556"></span><a class="md-crosslink" data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Nabonidus"><span data-dcnode-id="1040" instrument_node="">Nabonidus</span></a><span data-dcnode-id="1038" instrument_node=""> gave him a pretext for invading the lowlands. The conquest was quick, for even the priests of </span><span data-dcnode-id="1037" id="ref91557"></span><a class="md-crosslink" data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Marduk"><span data-dcnode-id="1036" instrument_node="">Marduk</span></a><span data-dcnode-id="1034" instrument_node="">, the national deity of the great metropolis of </span><a class="md-crosslink autoxref" data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Babylon-ancient-city-Mesopotamia-Asia"><span data-dcnode-id="1033" instrument_node="">Babylon</span></a><span data-dcnode-id="1031" instrument_node="">, had become estranged from Nabonidus. In October 539 </span><span class="text-smallcaps" data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">bce</span></span><span data-dcnode-id="1028" instrument_node="">, the greatest city of the ancient world fell to the Persians.</span></p><span class="marker p7" data-dcnode-id="1025"></span><span class="marker AM7 am-inline" data-dcnode-id="1023"></span><span class="marker MOD7 mod-inline" data-dcnode-id="1021"></span><span data-dcnode-id="1020" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="995"><span data-dcnode-id="1019" instrument_node="">In the Bible (e.g., Ezra 1:1–4), Cyrus is famous for freeing the Jewish captives in </span><span data-dcnode-id="1018" id="ref91558"></span><a class="md-crosslink" data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/Babylonian-Captivity"><span data-dcnode-id="1017" instrument_node="">Babylonia</span></a><span data-dcnode-id="1015" instrument_node=""> and allowing them to return to their homeland. Cyrus was also </span><span data-dcnode-id="1014" id="ref91559"></span><a class="md-crosslink" data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/religious-toleration"><span data-dcnode-id="1013" instrument_node="">tolerant</span></a><span data-dcnode-id="1011" instrument_node=""> toward the Babylonians and others. He conciliated local populations by supporting local customs and even sacrificing to local </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1009" data-term="deities" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/deities"><span data-dcnode-id="1010" instrument_node="">deities</span></a><span data-dcnode-id="1008" instrument_node="">. The capture of Babylon delivered not only </span><span data-dcnode-id="1007" id="ref91560"></span><a class="md-crosslink" data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Mesopotamia-historical-region-Asia"><span data-dcnode-id="1006" instrument_node="">Mesopotamia</span></a><span data-dcnode-id="1004" instrument_node=""> into the hands of Cyrus but also </span><span data-dcnode-id="1003" id="ref91561"></span><a class="md-crosslink" data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/history-of-Syria"><span data-dcnode-id="1002" instrument_node="">Syria</span></a><span data-dcnode-id="1000" instrument_node=""> and Palestine, which had been conquered previously by the Babylonians. The ruler of </span><span data-dcnode-id="999" id="ref91562"></span><a class="md-crosslink" data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Cilicia"><span data-dcnode-id="998" instrument_node="">Cilicia</span></a><span data-dcnode-id="996" instrument_node=""> in Asia Minor had become an ally of Cyrus when the latter marched against Croesus, and Cilicia retained a special status in Cyrus’s empire. Thus it was by diplomacy as well as force of arms that he established the largest empire known until his time.</span></p><span class="marker p8" data-dcnode-id="993"></span><span class="marker AM8 am-inline" data-dcnode-id="991"></span><span class="marker MOD8 mod-inline" data-dcnode-id="989"></span><span data-dcnode-id="988" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="978"><span data-dcnode-id="987" instrument_node="">Cyrus seems to have had several capitals. One was the city of </span><span data-dcnode-id="986" id="ref91563"></span><a class="md-crosslink" data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Ecbatana"><span data-dcnode-id="985" instrument_node="">Ecbatana</span></a><span data-dcnode-id="983" instrument_node="">, modern Hamadan, former capital of the Medes, and another was a new capital of the empire, </span><span data-dcnode-id="982" id="ref91564"></span><a class="md-crosslink" data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Pasargadae-ancient-city-Iran"><span data-dcnode-id="981" instrument_node="">Pasargadae</span></a><span data-dcnode-id="979" instrument_node="">, in Persis, said to be on the site where Cyrus had won the battle against Astyages. The ruins today, though few, arouse admiration in the visitor. Cyrus also kept Babylon as a winter capital.</span></p><span class="marker p9" data-dcnode-id="976"></span><span class="marker AM9 am-inline" data-dcnode-id="974"></span><span class="marker MOD9 mod-inline" data-dcnode-id="972"></span><span data-dcnode-id="971" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="938"><span data-dcnode-id="970" instrument_node="">No </span><a class="md-crosslink autoxref" data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Persian"><span data-dcnode-id="969" instrument_node="">Persian</span></a><span data-dcnode-id="967" instrument_node=""> chauvinist, Cyrus was quick to learn from the conquered peoples. He not only conciliated the Medes but united them with the Persians in a kind of dual monarchy of the Medes and Persians. Cyrus had to borrow the </span><span data-dcnode-id="966" id="ref91565"></span><a class="md-crosslink" data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/political-system"><span data-dcnode-id="965" instrument_node="">traditions</span></a><span data-dcnode-id="963" instrument_node=""> of kingship from the Medes, who had ruled an empire when the Persians were merely their vassals. A </span><a class="md-crosslink autoxref" data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Mede"><span data-dcnode-id="962" instrument_node="">Mede</span></a><span data-dcnode-id="960" instrument_node=""> was probably made an adviser to the Achaemenian king, as a sort of chief minister; on later reliefs at </span><span data-dcnode-id="959" id="ref91566"></span><a class="md-crosslink" data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Persepolis"><span data-dcnode-id="958" instrument_node="">Persepolis</span></a><span data-dcnode-id="956" instrument_node="">, a capital of the Achaemenian kings from the time of Darius, a Mede is frequently depicted together with the great king. The </span><span data-dcnode-id="955" id="ref91567"></span><a class="md-crosslink" data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Elam"><span data-dcnode-id="954" instrument_node="">Elamites</span></a><span data-dcnode-id="952" instrument_node="">, </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="950" data-term="indigenous" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/indigenous"><span data-dcnode-id="951" instrument_node="">indigenous</span></a><span data-dcnode-id="949" instrument_node=""> inhabitants of Persis, were also the teachers of the Persians in many ways, as can be seen, for example, in the Elamite dress worn by Persians and by Elamite objects carried by them on the stone reliefs at Persepolis. There also seems to have been little </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="947" data-term="innovation" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/innovation"><span data-dcnode-id="948" instrument_node="">innovation</span></a><span data-dcnode-id="946" instrument_node=""> in government and rule, but rather a willingness to borrow, combined with an ability to adapt what was borrowed to the new empire. Cyrus was undoubtedly the guiding genius in the creation not only of a great empire but in the formation of </span><span data-dcnode-id="945" id="ref91568"></span><a class="md-crosslink" data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Achaemenian-dynasty"><span data-dcnode-id="944" instrument_node="">Achaemenian</span></a><span data-dcnode-id="942" instrument_node=""> </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="940" data-term="culture" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/culture"><span data-dcnode-id="941" instrument_node="">culture</span></a><span data-dcnode-id="939" instrument_node=""> and civilization.</span></p><span class="marker p10" data-dcnode-id="936"></span><span class="marker AM10 am-inline" data-dcnode-id="934"></span><span class="marker MOD10 mod-inline" data-dcnode-id="932"></span><span data-dcnode-id="931" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="919"><span data-dcnode-id="930" instrument_node="">Little is known of the family life of Cyrus. He had two sons, one of whom, </span><span data-dcnode-id="929" id="ref91569"></span><a class="md-crosslink" data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Cambyses-II"><span data-dcnode-id="928" instrument_node="">Cambyses</span></a><span data-dcnode-id="926" instrument_node="">, succeeded him; the other, Bardiya (</span><span data-dcnode-id="925" id="ref91570"></span><a class="md-crosslink" data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Bardiya"><span data-dcnode-id="924" instrument_node="">Smerdis</span></a><span data-dcnode-id="922" instrument_node=""> of the Greeks), was probably secretly put to death by Cambyses after he became ruler. Cyrus had at least one daughter, </span><span data-dcnode-id="921" id="ref91571"></span><span data-dcnode-id="920" instrument_node="">Atossa (who married her brother Cambyses), and possibly two others, but they played no role in history.</span></p><span class="marker p11" data-dcnode-id="917"></span><span class="marker AM11 am-inline" data-dcnode-id="915"></span><span class="marker MOD11 mod-inline" data-dcnode-id="913"></span><span data-dcnode-id="912" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="891"><span data-dcnode-id="911" instrument_node="">When Cyrus defeated Astyages he also inherited Median possessions in eastern Iran, but he had to engage in much warfare to consolidate his rule in this region. After his conquest of Babylonia, he again turned to the east, and Herodotus tells of his campaign against nomads living east of the </span><a class="md-crosslink autoxref" data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Caspian-Sea"><span data-dcnode-id="910" instrument_node="">Caspian Sea</span></a><span data-dcnode-id="908" instrument_node="">. According to the Greek historian, Cyrus was at first successful in defeating the ruler of the nomads—called the </span><span data-dcnode-id="907" id="ref91572"></span><a class="md-crosslink" data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Massagetai"><span data-dcnode-id="906" instrument_node="">Massagetai</span></a><span data-dcnode-id="904" instrument_node="">—who was a woman, and captured her son. On the son’s committing </span><a class="md-crosslink autoxref" data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/suicide"><span data-dcnode-id="903" instrument_node="">suicide</span></a><span data-dcnode-id="901" instrument_node=""> in captivity, his mother swore revenge and defeated and killed Cyrus. Herodotus’s story may be </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="899" data-term="apocryphal" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/apocryphal"><span data-dcnode-id="900" instrument_node="">apocryphal</span></a><span data-dcnode-id="898" instrument_node="">, but Cyrus’s conquests in </span><span data-dcnode-id="897" id="ref91573"></span><a class="md-crosslink" data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Transoxania"><span data-dcnode-id="896" instrument_node="">Central Asia</span></a><span data-dcnode-id="894" instrument_node=""> were probably genuine, since a city in farthest Sogdiana was called </span><span data-dcnode-id="893" id="ref91574"></span><span data-dcnode-id="892" instrument_node="">Cyreschata, or Cyropolis, by the Greeks, which seems to prove the extent of his Eastern conquests.</span></p><span class="marker p12" data-dcnode-id="889"></span><span class="marker AM12 am-inline" data-dcnode-id="887"></span><span class="marker MOD12 mod-inline" data-dcnode-id="885"></span></section><span data-dcnode-id="883" instrument_node=""> </span><span class="marker h4" data-dcnode-id="881"></span><div class="md-sentinel--spy-target" data-dcnode-id="880"></div><section data-dcnode-id="830" data-has-spy="true" data-level="1" id="ref1685"><h2 class="h1" data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">The legacy of Cyrus</span></h2><span data-dcnode-id="876" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="859"><span data-dcnode-id="875" instrument_node="">It is a testimony to the capability of the founder of the Achaemenian empire that it continued to expand after his death and lasted for more than two centuries. But Cyrus was not only a great conqueror and administrator; he held a place in the minds of the Persian people similar to that of </span><a class="md-crosslink autoxref" data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Romulus-and-Remus"><span data-dcnode-id="874" instrument_node="">Romulus and Remus</span></a><span data-dcnode-id="872" instrument_node=""> in Rome or Moses for the Israelites. His saga follows in many details the stories of hero and conquerors from elsewhere in the ancient world. The manner in which the baby Cyrus was given to a shepherd to raise is reminiscent of Moses in the bulrushes in </span><a class="md-crosslink autoxref" data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Egypt"><span data-dcnode-id="871" instrument_node="">Egypt</span></a><span data-dcnode-id="869" instrument_node="">, and the overthrow of his tyrannical grandfather has echoes in other </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="867" data-term="myths" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/myths"><span data-dcnode-id="868" instrument_node="">myths</span></a><span data-dcnode-id="866" instrument_node=""> and </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="864" data-term="legends" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/legends"><span data-dcnode-id="865" instrument_node="">legends</span></a><span data-dcnode-id="863" instrument_node="">. There is no doubt that the Cyrus saga arose early among the Persians and was known to the Greeks. The </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="861" data-term="sentiments" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/sentiments"><span data-dcnode-id="862" instrument_node="">sentiments</span></a><span data-dcnode-id="860" instrument_node=""> of esteem or even awe in which Persians held him were transmitted to the Greeks, and it was no accident that Xenophon chose Cyrus to be the model of a ruler for the lessons he wished to impart to his fellow Greeks.</span></p><span class="marker p13" data-dcnode-id="857"></span><span class="marker AM13 am-inline" data-dcnode-id="855"></span><span class="marker MOD13 mod-inline" data-dcnode-id="853"></span><span data-dcnode-id="852" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="841"><span data-dcnode-id="851" instrument_node="">In short, the figure of Cyrus has survived throughout history as more than a great man who founded an empire. He became the </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="849" data-term="epitome" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/epitome"><span data-dcnode-id="850" instrument_node="">epitome</span></a><span data-dcnode-id="848" instrument_node=""> of the great qualities expected of a ruler in antiquity, and he assumed heroic features as a conqueror who was tolerant and </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="846" data-term="magnanimous" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/magnanimous"><span data-dcnode-id="847" instrument_node="">magnanimous</span></a><span data-dcnode-id="845" instrument_node=""> as well as brave and daring. His personality as seen by the Greeks influenced them and </span><a class="md-crosslink autoxref" data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Alexander-the-Great"><span data-dcnode-id="844" instrument_node="">Alexander the Great</span></a><span data-dcnode-id="842" instrument_node="">, and, as the tradition was transmitted by the Romans, may be considered to influence our thinking even now. In the year 1971, Iran celebrated the 2,500th anniversary of the founding of the monarchy by Cyrus.</span></p><span class="marker p14" data-dcnode-id="839"></span><span class="marker AM14 am-inline" data-dcnode-id="837"></span><span class="marker MOD14 mod-inline" data-dcnode-id="835"></span><span data-dcnode-id="834" instrument_node=""> </span><span class="md-signature" data-dcnode-id="831"><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/contributor/Richard-N-Frye/1004"><span data-dcnode-id="833" instrument_node="">Richard N. Frye</span></a></span></section><span data-dcnode-id="829" instrument_node="">
</span><span class="marker end-of-content" data-dcnode-id="827"></span><span class="marker after-article" data-dcnode-id="825"></span></div><span data-dcnode-id="823" instrument_node="">
