</span><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">But the nations of Asia Minor were themselves part of a greater empire composed of kings of Shinar, Elam and Assyria. The Jewish historian Josephus describes this vast empire in "Antiquities", I, ix. "At this time, when the Assyrians had the dominion over Asia, the people of Sodom were in a flourishing condition .... the Assyrians made war upon them; and, dividing their army into four parts, fought against them. Now every part of the army had its own commander; and when the battle was joined, the Assyrians were conquerors; and imposed tribute on the kings of the Sodomites, who submitted to this slavery twelve years ... but on the thirteenth year they rebelled, and then the army of the Assyrians came upon them, under their commanders Amraphel, Arioch, Chodorlaomer, and Tidal. These kings had laid waste all Syria, and overthrown the offspring of the giants ...."    </span></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Tidal was therefore an Assyrian king and general ruling over several different nations and peoples. So famous was Tidal that many later kings took the same name in Asia Minor. Historians, transliterating late cuneiform inscriptions, spell the name Tudhaliya(s) — as, in similar fashion, they spell Tiglathpileser Tukulti-apil-Esarra.    In the three succeeding centuries after the battle of Genesis 14, little is known of Asia Minor. The curtain lifts during the reign of Sargon "the Great" of Akkad. Assyrians from Mesopotamia continually migrated into Asia Minor, where they set up numerous trading posts. The Akkadian kings claim to have conquered the region. A vast collection of cuneiform tablets from this and later periods have been recovered by archaeologists. They exhibit an unusual affiliation between native rulers and Assyrian traders. An affiliation inexplicable apart from Josephus' statement that Assyrians settled and ruled Anatolia in Abram's day. So prominent were the Assyrians in Asia Minor that Sylax, the author of "Periplus" (he lived about 550), wrote of this region: "The coast of the Black Sea ... is called Assyria" (p. 261 of Perrot and Chipiez' "History of Art in Sardinia, Judaea, Syria and Asia Minor", vol. II).    </span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Assyrian kings and traders were only one of the early people to inhabit Asia Minor. ... After the fall of Troy in 677 the Assyrians commenced migration out of Anatolia northwest up the Danube into Europe. Roman annals within a few centuries were filled with the name Chatti, or Hatti, which later became changed to Hesse. (See "Encyclopaedia Britannica" article "Germany".) (Hoeh HL. Compendium of World History - Volume 1. 1962).</span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="435" instrument_node="">The ancient city of Germanicopolis was located </span><em data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">in Cilicia</span></em><span data-dcnode-id="432" instrument_node="">, in southeastern Asia Minor according to Ammianus Marellinus, book 1, § 27. It belonged of old to the Hatti. Cilicia is mentioned several places in the Bible. Paul was born in Cilicia (Acts 21:39 and 22:3).      Now look at a map of Europe. We find that one of the eastern </span><em data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">provinces of pre-World War II Germany is called</span></em><span data-dcnode-id="429" instrument_node=""> SILESIA! -- spelled slightly different, but pronounced the same!      The name of Cilicia in Asia Minor was simply transplanted to Eastern Germany by the Hatti who migrated from Cilicia to Silesia, then to the Rhine. Silesia is only a modern spelling! (Hoeh H. Germany in Prophecy. Plain Truth, January 1963, p. 17)</span></p><span data-dcnode-id="427" instrument_node="">
</span></blockquote><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">The Roman Catholic saint Jerome (late fourth/early fifth century) seems to have indicated that the descendants of the biblical Asshur (Genesis 10:22) which seems to be Assyria (Radmacher Concordance in. Nelson Study Bible, p. 11), ended up in parts of Europe, like Germany: </span></p><span data-dcnode-id="422" instrument_node="">
</span><blockquote data-dcnode-id="414"><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="420" instrument_node="">He that lets is taken out of the way, and yet we do not realize that Antichrist is near. Yes, Antichrist is near...The whole country between the Alps and the Pyrenees, between the Rhine and the Ocean, has been laid waste by hordes of Quadi, Vandals, Sarmatians, Alans, Gepids, Herules, Saxons, Burgundians, Allemanni and— alas! For the commonweal!— even Pannonians. </span><em data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">For Assur also is joined with them</span></em><span data-dcnode-id="417" instrument_node="">.  The once noble city of Moguntiacum  has been captured and destroyed. In its church many thousands have been massacred. The people of Vangium  after standing a long siege have been extirpated. The powerful city of Rheims, the Ambiani, the Altrebatæ,  the Belgians on the skirts of the world, Tournay, Spires, and Strasburg have fallen to Germany: while the provinces of Aquitaine and of the Nine Nations, of Lyons and of Narbonne are with the exception of a few cities one universal scene of desolation. (Jerome. Letter CXXIII to Ageruchia, Chapter 16.&nbsp; Translated by W.H. Fremantle, G. Lewis and  W.G. Martley. From Nicene and Post-Nicene Fathers, Second Series, Vol. 6.  Edited by Philip Schaff and Henry Wace. (Buffalo, NY: Christian Literature  Publishing Co., 1893.) Revised and edited for New Advent by Kevin Knight.  &lt;http://www.newadvent.org/fathers/3001123.htm&gt;).&nbsp; </span></p><span data-dcnode-id="415" instrument_node="">
</span></blockquote><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node=""> The late scholar and evangelist Dr. Herman Hoeh wrote the following:</span></p><span data-dcnode-id="410" instrument_node="">
</span><blockquote data-dcnode-id="383"><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="408" instrument_node="">Ninus (his Bible name was Nimrod), according to Genesis 10, led the ancient Assyrians from Babylon and supervised their building of Nineveh, the capital of ancient Assyria. (In 1957 Dr. C. Paul Meredith and I viewed in Iraq, the ancient Mesopotamia, the very cities originally settled with the Assyrians by Nimrod.) From there the Assyrians began their conquest of the ancient world. They, too, called themselves "the Master Race." But why do the German records speak of the son of an ASSYRIAN King as the builder of their first city? What connection have the German tribes WITH THE ASSYRIANS of history?</span><br data-dcnode-id="407"><span data-dcnode-id="406" instrument_node="">
</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Jerome, who lived at the time when the Indo-Germanic tribes were invading Europe, gives the answer: "For 'Assur (the Assyrian) also is joined with them'"! (Letter 123, § 16, quoted from Psalm 83:8; from "Nicene and Post-Nicene Fathers".)</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="398"><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Did the Assyrians Invade Europe?</span></strong></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="396" instrument_node="">Yes! Jerome said so! But how did he know?</span><br data-dcnode-id="395"><span data-dcnode-id="394" instrument_node="">
</span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="391" instrument_node="">He saw them! He was an EYEWITNESS to their migrations from Mesopotamia and the shores of the Black and Caspian seas!</span><br data-dcnode-id="390"><span data-dcnode-id="389" instrument_node="">
</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Only 300 years before Jerome, the Roman naturalist Pliny the Elder declared the "Assyriani" — the Assyrians — were dwelling north of the Black Sea ("Natural History", IV, § 12, page 183). But the Assyrians did not remain there! They are not there today! Of course not — they migrated into Central Europe — where the Germans live today! (Hoeh H. Germany in Prophecy! - Part 1. Plain Truth, December 1962)</span></p><span data-dcnode-id="384" instrument_node="">
</span></blockquote><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Various other scholars have noted similarities between ancient Assyria and modern Germany:</span></p><span data-dcnode-id="379" instrument_node="">
</span><blockquote data-dcnode-id="374"><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Assyria is interesting on account of the close parallel between her methods and morals and those of modern Germany. In politics, Germany has been an imitator of Assyria. (Vestal SC. The maintenance of peace, or, The foundations of domestic and international peace as deduced from a study of the history of nations. G.P. Putnam's Sons, 1920 Original from	Harvard University Digitized	Dec 15, 2008, p. 118)</span></p><span data-dcnode-id="375" instrument_node="">
</span></blockquote><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Similarities between Assyria and Germany have been noted by several (Oswalt JN, Oswalt J. The Book of Isaiah, Chapters 1-39 New International Commentary on the Old Testament. Wm. B. Eerdmans Publishing, 1986, p. 226)</span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Some others, like George Spiteri, also call modern Assyria as Germany (Spiteri G. Return of the Living Jesus Christ. 	Xulon Press, 2007, p. xxvii), but without going into much detail as to why.</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="362"><span data-dcnode-id="366" instrument_node="">A recent work that goes into the most detail about the similarities on this was published by Craig White and is titled </span><em data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">The Great German Nation: Origins and Destiny</span></em><span data-dcnode-id="363" instrument_node="">. Without going into all the details, his book looks at ancient records and practices of the Assyrians, including certain archaeological records, to demonstrate his reasoning why Germans are, in the main, basically descended from ancient Assyrians.</span></p><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">In the first century AD, Pliny reportedly claimed that the Assyrians were north of the Black Sea (Winnail D. Resurgent Germany: A Fourth Reich? Tomorrow's World Magazine, Volume 9, Issue 5, Sep-Oct 2007). Here is Pliny's account in Latin and a google-computer translation into English:</span></p><span data-dcnode-id="358" instrument_node="">
</span><blockquote data-dcnode-id="350"><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Sed a Carcinite Taurica incipit, quondam mari circumfusa et ipsa qua nunc campi iacent; dein vastis attollitur iugis. triginta sunt eorum populi, ex iis mediterranei XXIII; VI oppida Orgocini, Characeni, Assyrani, Stactari, Acisalitae, Caliordi. iugum ipsum Scythotauri tenent; cluduntur ab occidente Cherroneso Nea, ab ortu Scythis Satarcis. in ora a Carcine oppida Taphrae in ipsis angustiis paeninsulae, mox Heraclea Cherronesus, libertate a Romanis donatum; Megarice vocabatur antea, praecipui nitoris, in toto eo tractu custoditis Graeciae moribus, Vpassuum ambiente muro. (Pliny the Elder.&nbsp;  Natural History, Book 4, Chapter 85 (in Latin).&nbsp;  http://penelope.uchicago.edu/Thayer/L/Roman/Texts/Pliny_the_Elder/4*.html  viewed 10/06/11)</span></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">A  Carcinite Taurica begins, once the sea he was surrounded and the field itself which I am now lie then raised huge hills. and thirty of them are the people, of the Midland 23; Orgocini 6 towns, Characeni, Assyrani, Stactari, Acisalitae, Caliordi. the yoke itself Scythotauri hold the Nea CHERSONESE conclude from the west, from the rising of the Scythians, Satarcis. CRAB Taphrae from the towns on the coast in the midst of the narrow peninsula, just CHERSONESE Heraclea, freedom given by the Romans; Megarice was called before, the principal of brightness, of Greece was kept tract of all his character, encompassing Vpassuum the wall. (Computer-generated translation).</span></p><span data-dcnode-id="351" instrument_node="">
</span></blockquote><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">So, Pliny's account seems to support the idea of ending up in Middle Europe. Simlarly, one of the oldest traditions of the Bavarians claim that they came to Central Europe by way of the Black Sea (White, p. 100).</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">There is also a very old legend that claims that the city of Trier in Germany was founded by an Assyrian leader:</span></p><span data-dcnode-id="343" instrument_node="">
</span><blockquote data-dcnode-id="338"><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">For legend, going history better by more than 2000 years, ascribes the founding' 
    of Trier to Assyrian Prince Trebeta, who gave it his name, in 2053 BC. (Fodor E. Germany 1962. D. McKay, 1962 Original from	the University of Michigan Digitized	Oct 12, 2006, p. 175; see also Treverorum A. British Quarterly Review, July 1875, pp. 1-3)</span></p><span data-dcnode-id="339" instrument_node="">
</span></blockquote><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Hence, the idea that at least some of the Germans have Assyrian heritage has long been held and is not a new idea. </span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Secular scholars have tended to minimized connections between the Assyrians and Germans, such as the old city of Trier, the writing of 1605 that Dr. Hoeh referred to, and other information. </span></p><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">It is not that many of the relevant scholars do not know about Trier and certain aspects of the Assyrian-German connection, it is basically that they consider these records of history as questionable myths/legends which do not tend to fit their preferred views on the origins of the Germanic peoples. Yet most other "scholarly" theories that I have seen of Germanic ancestry have no real proof of where the German peoples originate from much prior to the time of Christ and the Roman Empire. Basically the mainstream scholars tend to simply believe that somehow people from Asia (including those just north of the Black Sea) ended up in northern and central Europe through migration, but without being clear as to from whom they originally descended from, given that they do not have a biblical basis for their theories.  Since pretty much everyone has to have descended from someone listed in Genesis chapter 10 of the Bible, the connections of the Germanic peoples to having Asshur as at least one of their progenitors has more historical support than any other theory for that time period than I have come across.</span></p><span data-dcnode-id="328" instrument_node="">
</span><h2 data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">There Have Been Faithful Christians in Germany for Centuries</span></h2><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">It probably should be mentioned that although there was often conflict between God's people and Assyria in the Old Testament times, it was not always completely negative. Notice, for a biblical example, the following:</span></p><span data-dcnode-id="322" instrument_node="">
</span><blockquote data-dcnode-id="314"><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="320" instrument_node="">19 And the descendants of the captivity kept the Passover on the fourteenth day of the first month. 20 For the priests and the Levites had purified themselves; all of them were ritually clean. And they slaughtered the Passover lambs for all the descendants of the captivity, for their brethren the priests, and for themselves. 21 Then the children of Israel who had returned from the captivity ate together with all who had separated themselves from the filth of the nations of the land in order to seek the Lord God of Israel. 22 And they kept the Feast of Unleavened Bread seven days with joy; for </span><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">the Lord made them joyful, and turned the heart of the king of Assyria toward them</span></strong><span data-dcnode-id="317" instrument_node="">, to strengthen their hands in the work of the house of God, the God of Israel. (Ezra 6:19-22)</span></p><span data-dcnode-id="315" instrument_node="">
</span></blockquote><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Additionally, it should also be mentioned that there have been faithful Christians in the Germanic region of Europe for centuries. When they first came is not highly clear, but they probably came as the result of missionary activities that originated from Asia Minor.</span></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Notice what Dr. T.V. Moore reported:</span></p><span data-dcnode-id="307" instrument_node="">
</span><blockquote data-dcnode-id="302"><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">The type of Christianity which first was favored, then raised to leadership by Constantine was that of the Roman Papacy. But this was not the type of Christianity that first penetrated Syria, northern Italy, southern France, and Great Britain. The ancient records of the first believers in Christ in those parts, disclose a Christianity which is not Roman but apostolic. These lands were first penetrated by missionaries, not from Rome, but from Palestine and Asia Minor. The Greek New Testament, the Received Text, they brought with them, or its translation, was of the type from which the Protestant Bibles, as the King James in the English, and the Lutheran in German, were translated. (Moore  T.V. The Culdee Church, chapters 3 and 4, and Wilkinson, Our Authorized Bible Vindicated, pp. 25, 26 (As cited in Dugger A, A History of True Religion, pp. 90-91)</span></p><span data-dcnode-id="303" instrument_node="">
</span></blockquote><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">A. Dugger and C. Dodd reported that there were faithful ones in the Germanic areas that resisted the Church of Rome:</span></p><span data-dcnode-id="298" instrument_node="">
</span><blockquote data-dcnode-id="236"><span data-dcnode-id="297" instrument_node="">
</span><p align="justify" data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">It was between 500 and 600 A.D. that the Church of   God was sorely oppressed by the state religion clothed with civil power,   and completely overpowered, and scattered to the valleys of the   mountains in all parts of the world. We shall now insert a few facts   from reliable historians to show how the true followers of Jesus were   indeed driven into the wilderness, where they took refuge in the rocks,   and dens, and caves of the earth, yet they rejoiced in persecution, and   lived in humble obedience to the will of God, being fed by Him from His   word.</span></p><span data-dcnode-id="294" instrument_node="">
</span><p align="justify" data-dcnode-id="292"><span data-dcnode-id="293" instrument_node=""> The historian Jones gives an account of the flight   of the persecuted saints from the oppression of the harlot church seated   upon the Roman beast. His account follows:</span></p><span data-dcnode-id="291" instrument_node="">
</span><blockquote data-dcnode-id="286"><span data-dcnode-id="290" instrument_node="">
</span><p align="justify" data-dcnode-id="288"><span data-dcnode-id="289" instrument_node=""> "Multitudes however, fled like innocent and   defenseless sheep from these devouring wolves. They crossed the Alps,   and traveled in every direction, as Providence and the prospect of   safety conducted them, into Germany, England, France, Italy, and other   countries. There they trimmed their lamps, and shone with new luster.   Their worth everywhere drew attention, and their doctrine formed   increasing circles around them. The storm which threatened their   destruction only scattered them as the precious seeds of the glorious   reformation of the Christian Church." -- Jones' Church History, p. 208,   ed. 1837. </span></p><span data-dcnode-id="287" instrument_node="">
</span></blockquote><span data-dcnode-id="285" instrument_node="">
</span><p align="justify" data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">...In Hugh Smith's history of the seventh century, we find the statement on page 191, as follows: "Missionaries from Britain, Scotland, and Ireland traveled into Germany with the design of propagating or preserving Christianity."... </span></p><span data-dcnode-id="282" instrument_node="">
</span><p align="justify" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node=""> Dr. Allix says, "We have found a body of men in   Italy before the year 1026, who believed contrary to the opinions of the   church of Rome, and who highly condemned their errors." -- Idem, p.   218.</span></p><span data-dcnode-id="279" instrument_node="">
</span><blockquote data-dcnode-id="274"><span data-dcnode-id="278" instrument_node="">
</span><p align="justify" data-dcnode-id="276"><span data-dcnode-id="277" instrument_node=""> "That the Waldensian faith and worship existed many   centuries before Protestantism arose is undeniable; the proofs and   monuments of this fact lie scattered over all Europe; but the antiquity   of the Waldenses is the antiquity of Protestantism. The Church of the   Reformation was in the loins of the Waldensian church ages before the   birth of Luther; her first cradle was placed amid these terrors and   sublimities, those ice-clad peaks and great bulwarks of rock. In their   dispersions over so many lands over France, the Low Countries, Germany,   Poland, Bohemia, Moravia, England, Calabria, Naples, -- the Waldenses   sowed the seeds of the great spiritual revival which, beginning with the   days of Wycliffe, and advancing in the times of Luther and Calvin,   awaits its full consummation in the ages to come." -- Wylie, History of   the Waldenses, pp. 24, 25.</span></p><span data-dcnode-id="275" instrument_node="">
</span></blockquote><span data-dcnode-id="273" instrument_node="">
</span><p align="justify" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node=""> Between the years of 700 and 800 A.D., Hugh Smith   says, in his history of the church, page 232, "Many British missionaries   crossed the ocean (the English Channel), and penetrated into the gloomy   recesses of the German forests for the instruction of the fierce and   uncivilized people."...</span></p><span data-dcnode-id="270" instrument_node="">
</span><p align="justify" data-dcnode-id="268"><span data-dcnode-id="269" instrument_node=""> Charlemagne, emperor of Rome, called a council of   300 bishops, 794 A.D., to consider the subject of images in the   churches, and some other matters. The first teaching of   transubstantiation appeared during this century in the teaching of the   Roman church, says Hugh Smith, page 222...</span></p><span data-dcnode-id="267" instrument_node="">
</span><p align="justify" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node=""> How Rome sought to extirpate the true faith by the   sword of the legions of Charlemagne, is told in the following extract   from the history of Orchard:</span></p><span data-dcnode-id="264" instrument_node="">
</span><blockquote data-dcnode-id="253"><span data-dcnode-id="263" instrument_node="">
</span><p align="justify" data-dcnode-id="261"><span data-dcnode-id="262" instrument_node=""> "In 789, Charles the Great resolved to subdue the   Saxons or destroy them, unless they accepted of life on the condition of   professing the Christian religion agreeably to the Roman ritual. On   pain of death the Saxons, with their infant offspring, were to receive   baptism. Germany in time was subdued, and religious liberty destroyed.   The king took an oath of fidelity of them and received pledges for the   fulfillment of his stipulations. In this way the religious privileges of   these and other nations were infringed on, and by these and similar   means Christianity, under state patronage, made rapid progress for ages,   as detailed in the works of hierarchists. To make the conversion of   these people accord with the gospel record, apostles were sent to them,   but the Germans were exceedingly jealous of such commissioned ministers   of religion.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p align="justify" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node=""> "These apostles of Rome preached trine-immersion,   but said nothing of infants. Success attended the imperial commands;   other kingdoms were visited in virtue of the same authority, and   converted from fear of the carnal weapon. The evidence of their complete   conversion was made apparent by their baptism. Wooden tubs and other   uten-sils were placed in the open air, and the new converts with their   children were immersed naked into the profession of Christianity. This   indelicacy in the mode originated with the advocates of minor baptism as   already shown: it has never been practiced in Baptist communities. This   mandate of Charles is the first legal authority for infant baptism, and   we ask if the mental character must not have been exceedingly low, to   enforce such terms of denudation on the female portion of candidates. We   repudiate the charge, and leave the blot on those who were guilty of   the practice.</span></p><span data-dcnode-id="257" instrument_node="">
</span><p align="justify" data-dcnode-id="255"><span data-dcnode-id="256" instrument_node=""> "The wilds and forests of Germany would prove   asylums to dissenters through the rise and assumption of the man of sin.   That Germany was inhabited by persons of this description is evident,   and that such persons must have been very active in disseminating the   truth becomes plain, since it is recorded that the Baptist itinerant   preachers, could in their travels, pass, during the ninth century   through the whole German empire, and lodge every night at the house of   one of their friends. It is very probable these traveling ministers were   Paulicians or Paterines from Bulgaria or Italy. They were termed by   Catholics anabaptist preachers. Their sentiments of religion are   learned, and their views of the ordinances proved, from their confession   of faith, which asserts, `In the beginning of Christianity there was no   baptizing of children; and their forefathers practiced no such thing';   and, `We do from our hearts acknowledge that baptism is a washing, which   is performed with water, and doth hold out the washing of the soul from   sin.'" -- Orchard's Baptist History, pp. 322, 323.</span></p><span data-dcnode-id="254" instrument_node="">
</span></blockquote><span data-dcnode-id="252" instrument_node="">
</span><p align="justify" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node=""> "There was no kingdom of Southern and Central Europe   to which these missionaries did not find their way, and where they did   not leave traces of their visit by the disciples whom they made. On the   west they penetrated into Spain. In Southern France they found congenial   fellow laborers in the Albigenses, by whom the seeds of truth were   plentifull scattered over Dauphine and Languedoc. On the east,   descending the Rhine and the Danube, they leavened Germany, Bohemia, and   Poland with their doctrines, their track being marked with the edifices   for worship and the stakes of martyrdom that arose around their steps.   Even the Seven-hilled City they feared not to enter, scattering the seed   on ungenial soil, if perchance some of it might take root and grow.   Their naked feet and coarse woolen garments made them somewhat marked   figures in the streets of a city that clothed itself in purple and fine   linen; and when their errand was discovered, as sometimes chanced, the   rulers of Christendom took care to further, in their own way, the   springing of the seed, by watering it with the blood of the men who had   sowed it.</span></p><span data-dcnode-id="249" instrument_node="">
</span><p align="justify" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node=""> "Thus did the Bible in those ages, veiling its   majesty and its mission, travel silently through Christendom, entering   homes and hearts, and there making its abode.</span></p><span data-dcnode-id="246" instrument_node="">
</span><p align="justify" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node=""> "From her lofty seat Rome looked down with contempt   upon the Book and its humble bearers. She aimed at bowing the necks of   kings, thinking if they were obedient, meaner men would not dare to   revolt; and so she took little heed of a power which, weak as it seemed,   was destined at a future day to break in pieces the fabric of her   dominion.</span></p><span data-dcnode-id="243" instrument_node="">
</span><p align="justify" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node=""> "By and by she began to be uneasy, and to have a   boding of calamity. The penetrating eye of Innocent III detected the   quarter whence danger was to arise. He saw in the labors of these humble   men the beginning of a movement which, if permitted to go on and gather   strength, would one day sweep away all that it had taken the toils and   intrigues of centuries to achieve. He straightway commenced those   terrible crusades which wasted the sowers, but watered the seed, and   helped to bring on, at its appointed hour, the catastrophe which he   sought to avert." -- Wylie, History of the Waldenses, pp. 22, 23</span></p><span data-dcnode-id="240" instrument_node="">
</span><p align="justify" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">(Dugger AN, Dodd CO.  A History of True Religion, 3rd ed.  Jerusalem, 1972 (Church of God, 7th Day).   Chapters 9, 10, 11,13)</span></p><span data-dcnode-id="237" instrument_node="">
</span></blockquote><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Notice  what the Catholic Cardinal Newman wrote:</span></p><span data-dcnode-id="232" instrument_node="">
</span><blockquote data-dcnode-id="212"><span data-dcnode-id="231" instrument_node="">
</span><p data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">One of the first questions which it is natural to ask  on entering upon the subject is, whereas the Pope is said to be Antichrist,  sometimes from the fourth, sometimes from the seventh century, when was he  first detected and denounced, and by whom? </span></p><span data-dcnode-id="228" instrument_node="">
</span><p data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">On this point, Todd supplies us with much information.  &nbsp;It appears that the belief that the Pope  was Antichrist was the conclusion gradually formed and matured out of the  belief that the Church of Rome was Babylon, by three heretical bodies, between  the eleventh and sixteenth centuries, in consequence of their being submitted  to persecution for their opinions.</span></p><span data-dcnode-id="225" instrument_node="">
</span><blockquote data-dcnode-id="220"><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">"In the middle of the eleventh century, numerous  emigrants from Thrace  and the East had established themselves in the north of Italy, and  especially in the neighbourhood of Milan;  and some, despising a fixed habitation, or unable to obtain one, itinerated  throughout various parts of France  and Germany.  The doctrines of these sects exhibit various shades of extravagance and error,  and appear to have had a close affinity with the Oriental Manichees or  Paulicians, from whom they are historically descended…”</span></p><span data-dcnode-id="221" instrument_node="">
</span></blockquote><span data-dcnode-id="219" instrument_node="">
</span><p data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">These were the Albigenses, the first of the three  independent families of heresy above mentioned.</span></p><span data-dcnode-id="216" instrument_node="">
</span><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">The second protesting sect which those times produced  was, according to Dr. Todd, of a much purer and more respectable character. It  originated at the end of the twelfth century, The Waldenses…(Newman JH. The Protestant Idea of Antichrist.       [British Critic, Oct. 1840]. Newman Reader — Works of John Henry   Newman.       Copyright © 2004 by The National Institute for Newman Studies.   http://www.newmanreader.org/works/essays/volume2/antichrist1.htmlpp. 117-118)</span></p><span data-dcnode-id="213" instrument_node="">
</span></blockquote><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="206"><span data-dcnode-id="210" instrument_node="">Perhaps it should be noted that </span><em data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">The Catholic Encyclopedia</span></em><span data-dcnode-id="207" instrument_node=""> apparently overlooked the fact that  during the Pergamos era that certain Paulicians had came up with the  papal/antichrist teaching (Mass A.J. Antichrist. The Catholic Encyclopedia, Volume I. Copyright ©   1907 by Robert Appleton Company. Online Edition Copyright © 2003 by K.   Knight. Nihil Obstat, March 1, 1907. Remy Lafort, S.T.D., Censor.   Imprimatur. +John Cardinal Farley, Archbishop of New York)--but  it Cardinal Newman recognized that it had dissenters in the Germanic areas.</span></p><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">In  1968, the old Worldwide Church of God claimed:</span></p><span data-dcnode-id="202" instrument_node="">
</span><blockquote data-dcnode-id="195"><span data-dcnode-id="201" instrument_node="">
</span><p data-dcnode-id="197"><strong data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Thyatira  Era...</span></strong><span data-dcnode-id="198" instrument_node="">The Waldenses recognized that they were the true  successors of the apostolic church. They kept the SABBATH, also the yearly  PASSOVER. And each September or October (in God's seventh month -- see Lev.  23), they held at the headquarters church a great "conference." As  many as 700 persons attended from afar. New students were chosen, ministerial  assignments were made, AND CROWDS GATHERED DAILY TO LISTEN TO SERMONS. What  could this gathering have been but the Feast of Tabernacles! Under the name of  Passagini, we have the clearest sort of statement that these people, about  1200, observed the whole Old Testament law, including the Sabbath and  FESTIVALS! People called Cathars at Cologne,   Germany, kept a  fall festival, called "Malilosa", even before Waldo began to preach.
    (LESSON 51 (1968) AMBASSADOR COLLEGE BIBLE  CORRESPONDENCE COURSE "And the woman fled into the wilderness, where she  hath a place ..." Rev. 12:6)</span></p><span data-dcnode-id="196" instrument_node="">
</span></blockquote><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">There  was a group of Germans who came to the Americas in the 1600/1700s that kept the  Sabbath:</span></p><span data-dcnode-id="191" instrument_node="">
</span><blockquote data-dcnode-id="180"><span data-dcnode-id="190" instrument_node="">
</span><p data-dcnode-id="182"><span data-dcnode-id="189" instrument_node="">...while the </span><em data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Order  of the Woman of the Wilderness</span></em><span data-dcnode-id="186" instrument_node="">, as they were popularly known, or </span><em data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">The Contented of the God-loving Soul</span></em><span data-dcnode-id="183" instrument_node="">, as  they styled themselves, were not actual Seventh Day Baptists, we do know that  they observed the Seventh Day as the Sabbath... (Randolph  CF.&nbsp; THE GERMAN SEVENTH DAY BAPTISTS.&nbsp; In Seventh Day Baptists in Europe and  America: A Series of Historical Papers Written in Commemoration of the One  Hundredth Anniversary of the Organization of the Seventh Day Baptist General  Conference, Celebrated at Ashaway, Rhode Island, August 20-25, 1902, Seventh  Day Baptist General Conference.&nbsp; Seventh  Day Baptist General Conference by the American Sabbath Tract Society, 1910.&nbsp; Original from the University of Michigan.  Digitized, Sep 25, 2007, p. 936)</span></p><span data-dcnode-id="181" instrument_node="">
</span></blockquote><span data-dcnode-id="179" instrument_node="">
</span><p data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">It is possible that the above group was a compromised (they  may have also held certain Lutheran as well as monastic doctrines) descendant  of certain faithful Albigensian groups.&nbsp; The  group emphasized the millennium and tried to figure out who the “ten lost  tribes of Israel” were (they wondered if the American Indians were the  descendants) (Ibid,  pp. 949-950).&nbsp; Many, if not nearly all, of the German  Sabbath-keepers in the 1600-1700s were also pacifists and considered to be  separatists, even in Germany (Ibid,  pp. 938-939). </span></p><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="171"><span data-dcnode-id="175" instrument_node="">In 1584 a treatise by Englishman John Stockwood,  titled </span><em data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">A Verie Profitable and Necessarie  Discourse Concerning the observation and keeping of the Sabboth Day</span></em><span data-dcnode-id="172" instrument_node="">,  extracted from an earlier work by the German theologian Urisinus, was produced. (Ball B.&nbsp;  Seventh Day Men: Sabbatarians and Sabbatarianism in England and Wales,  1600-1800, 2nd edition.&nbsp; James Clark  &amp; Co., 2009, pp. 35,36)</span></p><span data-dcnode-id="170" instrument_node="">
</span><p data-dcnode-id="165"><span data-dcnode-id="169" instrument_node="">Here  is some of what </span><em data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">The Catholic Encyclopedia</span></em><span data-dcnode-id="166" instrument_node=""> said about the First Vatican Council:</span></p><span data-dcnode-id="164" instrument_node="">
</span><blockquote data-dcnode-id="159"><span data-dcnode-id="163" instrument_node="">
</span><p data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">On 6   December, 1864, two days before the publication of the Syllabus,  Pius IX announced, at a session of the Congregation of Rites, his intention to  call a general council…Although the Bull convoking the council was received  with joy by the bulk of the Catholic masses, it aroused much discontent in many  places, especially in Germany,  France,  and England. (Kirch, Joseph. "Vatican Council." The  Catholic Encyclopedia. Vol. 15. New York: Robert Appleton Company, 1912. 11  Jul. 2008 &lt;http://www.newadvent.org/cathen/15303a.htm&gt;)</span></p><span data-dcnode-id="160" instrument_node="">
</span></blockquote><span data-dcnode-id="158" instrument_node="">
</span><p data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">The following may describe the first Sabbatarians in Canada, who apparently came from Germany: </span></p><span data-dcnode-id="155" instrument_node="">
</span><blockquote data-dcnode-id="150"><span data-dcnode-id="154" instrument_node="">
</span><p data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">The first Sabbath-observers in Canada...were brought to Quebec against their will. The German Sabbatarians were pacifist fur traders in the Shenandoah Valley. In March 1757 a French priest led a party of Indians to attack the German Sabbatarians...Most of the German Seventh-Day Baptists were killed and scalped...Only three Germans were taken as prisoners...They eventually were taken to France...they died. (Neumann B. A History of the Seventh-Day Sabbath Among Christians in Asia, Africa, Europe, and North America. Bible Sabbath Association, Gillette (WY), 2004, p. 28)</span></p><span data-dcnode-id="151" instrument_node="">
</span></blockquote><span data-dcnode-id="149" instrument_node="">
</span><p data-dcnode-id="144"><span data-dcnode-id="148" instrument_node="">In the 20th century, the old Worldwide Church of God had several congregations in German-speaking regions in Europe. In the 21st century, various COG groups have congregations in German-speaking regions in Europe. Later, God will call nearly all of the German people (for details, please see </span><a data-dcnode-id="146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cogwriter.com/germany-in-prophecy.htm"><span data-dcnode-id="147" instrument_node="">Germany in Biblical and Catholic Prophecy</span></a><span data-dcnode-id="145" instrument_node="">).</span></p><span data-dcnode-id="143" instrument_node="">
</span><p data-dcnode-id="136"><span class="style3" data-dcnode-id="138"><span data-dcnode-id="142" instrument_node="">As far as origins go, it should be noted that many of the Germans that came to North America, ethnically, seem to be more descendants of Israel (see </span><a data-dcnode-id="140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cogwriter.com/britishisrael.htm"><span data-dcnode-id="141" instrument_node="">Anglo – America in Prophecy &amp; the Lost Tribes of Israel</span></a><span data-dcnode-id="139" instrument_node="">) than Asshur</span></span><span data-dcnode-id="137" instrument_node="">. </span></p><span data-dcnode-id="135" instrument_node="">
</span><h2 data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">Yet, Some in Germany Helped Establish Greco-Roman Power Against the True Faith</span></h2><span data-dcnode-id="132" instrument_node="">
</span><p data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">On the other hand, many non-faithful who professed Christ have also been in Germany.</span></p><span data-dcnode-id="129" instrument_node="">
</span><p data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">The  Catholic writer C.M. Mangan reported: </span></p><span data-dcnode-id="126" instrument_node="">
</span><blockquote data-dcnode-id="121"><span data-dcnode-id="125" instrument_node="">
</span><p data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">In 312, the Roman Emperor Constantine I the Great was  in Trier, Germany where he had an unexpected vision of a cross that appeared in  the sky with the haunting words, “In hoc signum vinces” (“In this sign you  conquer”). The Emperor was buoyed by the apparition and encouraged his 20,000  troops for the upcoming bloody battle against Maxentius and his 100,000 men. Constantine’s soldiers,  the majority of whom were pagans, placed the sacred image of the cross on their  shields. (Mangan C.M. In This Sign You Conquer, 0/15/03  Copyright © 2004 Catholic Online)</span></p><span data-dcnode-id="122" instrument_node="">
</span></blockquote><span data-dcnode-id="120" instrument_node="">
</span><p data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">From ancient times, a type of cross was a sign that the ancient Assyrians promoted:</span></p><span data-dcnode-id="117" instrument_node="">
</span><blockquote data-dcnode-id="109"><span data-dcnode-id="116" instrument_node="">
</span><p data-dcnode-id="111"><span data-dcnode-id="115" instrument_node="">Another </span><em data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">signatio</span></em><span data-dcnode-id="112" instrument_node="">...was that of putting the neck...a cross or necklace with a cross. This custom is very old, and we find it in old images, e.g. that of Shamshi - Adar V, king of Assyria...(Bagatti, Bellarmino.&nbsp;  Translated by Eugene Hoade.&nbsp; The  Church from the Circumcision.&nbsp; Nihil  obstat: Marcus Adinolfi. Imprimi potest: Herminius Roncari. Imprimatur:  +Albertus Gori, die 26 Junii 1970.&nbsp;  Franciscan Printing Press, Jerusalem, p.140).</span></p><span data-dcnode-id="110" instrument_node="">
</span></blockquote><span data-dcnode-id="108" instrument_node="">
</span><p data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">The use of the cross has been a very old symbol of the Assyrians, and other ancient peoples.</span></p><span data-dcnode-id="105" instrument_node="">
</span><p data-dcnode-id="94"><span data-dcnode-id="104" instrument_node="">It also is one of the symbols of the "Holy Roman Empire," which essentially was led by people of German/Austrian heritage. The Bible tells of a future 'King of Assyria' rising up again (see </span><a data-dcnode-id="102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cogwriter.com/germany-in-prophecy.htm"><span data-dcnode-id="103" instrument_node="">Germany in Biblical  Prophecy</span></a><span data-dcnode-id="101" instrument_node="">) and a cross may well be a symbol (see </span><a data-dcnode-id="99" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cogwriter.com/mark-of-the-beast.htm"><span data-dcnode-id="100" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="98" instrument_node=""> and </span><a data-dcnode-id="96" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cogwriter.com/cross.htm"><span data-dcnode-id="97" instrument_node="">What is the Origin of the Cross as a 'Christian' Symbol?</span></a><span data-dcnode-id="95" instrument_node="">).</span></p><span data-dcnode-id="93" instrument_node="">
</span><p data-dcnode-id="82"><span data-dcnode-id="92" instrument_node="">The "Holy Roman Empire" (Latin: </span><em data-dcnode-id="90"><span data-dcnode-id="91" instrument_node="">Imperium Romanum Sacrum</span></em><span data-dcnode-id="89" instrument_node="">; German: </span><em data-dcnode-id="87"><span data-dcnode-id="88" instrument_node="">Heiliges Römisches Reich</span></em><span data-dcnode-id="86" instrument_node="">; Italian: </span><em data-dcnode-id="84"><span data-dcnode-id="85" instrument_node="">Sacro Romano Impero</span></em><span data-dcnode-id="83" instrument_node="">) is  also commonly known as the "Holy Roman Empire of the German Nation."  Here are a few brief statements about it:</span></p><span data-dcnode-id="81" instrument_node="">
</span><blockquote data-dcnode-id="76"><span data-dcnode-id="80" instrument_node="">
</span><p data-dcnode-id="78"><span data-dcnode-id="79" instrument_node="">The empire's territory was centred on the Kingdom of Germany, and included neighbouring territories, which at its peak included the Kingdom of Italy and the Kingdom of Burgundy. For much of its history, the Empire consisted of hundreds of smaller sub-units, principalities, duchies, counties, Free Imperial Cities and other domains. The Holy Roman Empire explicitly proclaimed itself to be the successor of the Western Roman Empire under the doctrine of translatio imperii. In 962 Otto I was crowned Holy Roman Emperor (German: Römisch-Deutscher Kaiser), although the Roman imperial title was first restored to Charlemagne by the Pope in 800. Otto was the first emperor of the realm who was not a member of the earlier Carolingian dynasty. The last Holy Roman Emperor was Francis II, who abdicated and dissolved the Empire in 1806 during the Napoleonic Wars. (Holy Roman Empire.  Wikipedia, viewed 07/24/12)</span></p><span data-dcnode-id="77" instrument_node="">
</span></blockquote><span data-dcnode-id="75" instrument_node="">
</span><p data-dcnode-id="73"><span data-dcnode-id="74" instrument_node="">Throughout its history, the "Holy Roman Empire" has caused problems for those in the genuine Church of God. And sadly, when it is fully formed and functional again in the future, it will as well (cf. Revelation 13).</span></p><span data-dcnode-id="72" instrument_node="">
</span><h2 data-dcnode-id="70"><span data-dcnode-id="71" instrument_node="">Concluding Comments</span></h2><span data-dcnode-id="69" instrument_node="">
</span><p data-dcnode-id="67"><span data-dcnode-id="68" instrument_node="">All peoples on earth descended from Adam and Eve (Genesis 3:20). And then through Noah (Genesis 10:1). Those of German heritage seem to mainly have descended through Noah's grandson Asshur (Genesis 10:22).</span></p><span data-dcnode-id="66" instrument_node="">
</span><p data-dcnode-id="64"><span data-dcnode-id="65" instrument_node="">And those who are willing to try to "connect-the-dots" should be able to see that this is a reasonable, though sometimes debatable, conclusion. </span></p><span data-dcnode-id="63" instrument_node="">
</span><p data-dcnode-id="61"><span data-dcnode-id="62" instrument_node="">There were Assyrians who were willing to heed some of God's warnings from Jonah (Jonah 3:1-10). There have been some Germans throughout history who have also heeded the message of Christ that His church, the true Church of God, has proclaimed. Additional others will heed the call in the future, while many will sadly support the final revival of the "Holy Roman Empire" of Revelation 13.</span></p><span data-dcnode-id="60" instrument_node="">
</span><p data-dcnode-id="55"><span data-dcnode-id="59" instrument_node="">Knowledge of who the modern Germanic peoples gives insight into their role in end time events that are prophesied in the Bible (see </span><a data-dcnode-id="57" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cogwriter.com/germany-in-prophecy.htm"><span data-dcnode-id="58" instrument_node="">Germany in Biblical and Catholic Prophecy</span></a><span data-dcnode-id="56" instrument_node="">).</span></p><span data-dcnode-id="54" instrument_node="">
