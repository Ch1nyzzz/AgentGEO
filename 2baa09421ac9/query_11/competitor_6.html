            <template shadowrootmode="closed"><html data-dcnode-id="1" xmlns="http://www.w3.org/1999/xhtml"><head data-dcnode-id="1213"><meta name="robots" content="noindex, nofollow"><meta charset="utf-8"></head><body data-dcnode-id="2"><span data-dcnode-id="1222" instrument_node="">
</span><meta content="text/html; charset=utf-8" data-dcnode-id="1221" http-equiv="Content-Type"><span data-dcnode-id="1220" instrument_node="">
</span><title data-dcnode-id="1218">Germany in Scripture and History</title><span data-dcnode-id="1217" instrument_node="">
</span><span data-dcnode-id="1214" instrument_node="">
</span><span data-dcnode-id="1212" instrument_node="">
</span><span data-dcnode-id="1211" instrument_node="">
</span><h1 data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Germany's Assyrian Roots Throughout History</span></h1><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1207" instrument_node="">by </span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cogwriter.com/cogwriter.htm"><span data-dcnode-id="1206" instrument_node="">COGwriter</span></a></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Germany was the major force behind both World War I and World War II.  For decades since WWII, it was seemingly content to mainly align with the international views of the USA and France.  Yet, in the past few years, its increasing wealth has seemingly emboldened it to start to take more divergent views, as well as to extend its diplomatic and economic reach.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">This article is the first of two. These articles will attempt to identify the identity of Germany in the Bible, some highly limited German history, and  Germany's prophesied role.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1194"><em data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Readers of the German language may find the following booklet of interest:</span></em></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1190"><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ccog.eu/wo-ist-die-wahre-christliche-kirche-heute/" title="WO IST DIE WAHRE CHRISTLICHE KIRCHE HEUTE?"><span data-dcnode-id="1192" instrument_node="">WO IST DIE WAHRE CHRISTLICHE KIRCHE HEUTE?</span></a></p><span data-dcnode-id="1189" instrument_node="">
</span><h2 data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Asshur, Assyria, and Germany</span></h2><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Where do the Germanic peoples come from? The male ancestors of all those currently on planet earth are listed in Genesis chapter 10.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">In that portion of the Bible we see that one of the sons of Shem and grandson of Noah was named Assur/Ashur/Asshur:</span></p><span data-dcnode-id="1180" instrument_node="">
</span><blockquote data-dcnode-id="1175"><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">1 
    Now this is the genealogy of the sons of Noah: Shem, Ham, and Japheth. And sons were born to them after the flood...21 And children were born also to Shem, the father of all the children of Eber, the brother of Japheth the elder. 22 The sons of Shem were Elam, Asshur, Arphaxad, Lud, and Aram. 
    (Genesis 10:1,21-22, NKJV). </span></p><span data-dcnode-id="1176" instrument_node="">
</span></blockquote><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Throughout the Hebrew scriptures (the Old Testament) there are various mentions of a people called the Assyrians (e.g. 2 Kings 19:35; Isaiah 37:36). The old area of Assyria is first listed in scripture in Genesis 2:14 and apparently was near where Eden was:</span></p><span data-dcnode-id="1171" instrument_node="">
</span><blockquote data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">10 Now a river went out of Eden to water the garden, and from there it parted and became four riverheads. 11 The name of the first is Pishon; it is the one which skirts the whole land of Havilah, where there is gold. 12 And the gold of that land is good. Bdellium and the onyx stone are there. 13 The name of the second river is Gihon; it is the one which goes around the whole land of Cush. 14 The name of the third river is Hiddekel; it is the one which goes toward the east of Assyria. The fourth river is the Euphrates. (Genesis 2:10-14)  </span></p><span data-dcnode-id="1167" instrument_node="">
</span></blockquote><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">The first century Jewish historian Josephus tied this son Asshur/Ashur in with Assyria as did the late fourth/early fifth century Roman Catholic doctor and saint Augustine:</span></p><span data-dcnode-id="1162" instrument_node="">
</span><blockquote data-dcnode-id="1130"><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Shem, the third son of Noah, had five sons, who inhabited the land that began at the Euphrates, and reached to the Indian Ocean. Elam left behind him the Elamites, the ancestors of the Persians. Ashur lived in Ninevah; and named his descendants Assyrians, who became the most fortunate nation, beyond others. (Josephus. Josephus Complete Works. Antiquities of the Jews, Book I, Chapter VI, Verse 4. Translated by William Whiston in 1867. Kregel Publications, Grand Rapids (MI), 1960, p. 31)</span></p><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1157" instrument_node="">Assur, father of the Assyrian...Of these nations the names have partly survived, so that at this day we can see from whom they have sprung, as the Assyrians from Assur...(Augustine. The City of God (Book XVI). </span><span data-dcnode-id="1155" id="srctrans"><span data-dcnode-id="1156" instrument_node="">Translated by Marcus Dods.</span></span><span data-dcnode-id="1154" instrument_node=""> From </span><span data-dcnode-id="1152" id="srcwork"><span data-dcnode-id="1153" instrument_node="">Nicene and Post-Nicene Fathers, First Series</span></span><span data-dcnode-id="1151" instrument_node="">, </span><span data-dcnode-id="1149" id="srcvolume"><span data-dcnode-id="1150" instrument_node="">Vol. 2.</span></span><span data-dcnode-id="1148" instrument_node=""> </span><span data-dcnode-id="1146" id="srced"><span data-dcnode-id="1147" instrument_node="">Edited by Philip Schaff.</span></span><span data-dcnode-id="1145" instrument_node=""> (</span><span data-dcnode-id="1143" id="srcpublisher"><span data-dcnode-id="1144" instrument_node="">Buffalo, NY: Christian Literature Publishing Co.,</span></span><span data-dcnode-id="1142" instrument_node=""> </span><span data-dcnode-id="1140" id="srcyear"><span data-dcnode-id="1141" instrument_node="">1887.</span></span><span data-dcnode-id="1139" instrument_node="">) </span><span data-dcnode-id="1137" id="kk"><span data-dcnode-id="1138" instrument_node="">Revised and edited for New Advent by Kevin Knight.</span></span><span data-dcnode-id="1136" instrument_node=""> </span><span data-dcnode-id="1134" id="srcurl"><span data-dcnode-id="1135" instrument_node="">&lt;http://www.newadvent.org/fathers/120116.htm&gt;</span></span><span data-dcnode-id="1133" instrument_node="">)</span></p><span data-dcnode-id="1131" instrument_node="">
</span></blockquote><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1128" instrument_node="">So, the term Assyria has long been considered to be a derivative term for descendant of Assur/Ashur/Asshur, grandson of Noah. Some Assyrian kings were named a version of Ashur (Rines GE. </span><span data-dcnode-id="1126" dir="ltr"><span data-dcnode-id="1127" instrument_node="">The Encyclopedia Americana: a library of universal knowledge, Volume 2. </span></span><span data-dcnode-id="1125" instrument_node="">Encyclopedia Americana Corp., 1918 Original from	the University of Wisconsin - Madison. Digitized	Nov 9, 2007, pp. 428-439).  </span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">There is a relatively new report that concluded that certain modern ancestors of the Germans came from the Near East:</span></p><span data-dcnode-id="1120" instrument_node="">
</span><blockquote data-dcnode-id="1094"><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">A study of remains from Central Europe suggests the foundations of the   modern gene pool were laid down between 4,000 and 2,000 BC - in   Neolithic times...a wave of migration by Near Eastern farmers some 6,000 years ago. (in the early Neolithic)</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">But the extent to which present-day people are descended from   the indigenous hunters versus the newcomers that arrived in the   Neolithic has been a matter of some debate...</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Haplogroup H dominates mtDNA variation in Europe. Today, more than 40%   of Europeans belong to this genetic "clan", with frequencies much higher   in the west of the continent than in the east.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">The team selected 39 human remains from the Mitelelbe Saale region of Germany, all of whom belonged to the "H" clan...The remains investigated here span 3,500 years of European prehistory, from the Early Neolithic to the Bronze Age...</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">And only about 19% of the Early Neolithic remains from Central Europe belonged to this genetic clan.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">But, from the Middle Neolithic onwards, DNA patterns more   closely resembled those of people living in the area today, pointing to a   major - and previously unrecognised - population upheaval around 4,000   BC...</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1100" instrument_node="">"We have established that the genetic foundations for modern Europe were   only established in the Mid-Neolithic, after this major genetic   transition around 4000 years ago," said co-author Dr Wolfgang Haak. (Ricon P. Making of Europe unlocked by DNA. BBC, April 23, 2013. </span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/news/science-environment-22252099"><span data-dcnode-id="1099" instrument_node="">http://www.bbc.co.uk/news/science-environment-22252099</span></a><span data-dcnode-id="1097" instrument_node="">)</span></p><span data-dcnode-id="1095" instrument_node="">
</span></blockquote><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">People coming from the Near East is consistent with Assyrian migrations from that area. And there are also various facts and legends.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Probably one of the more famous early Assyrian kings was Sargon. Interestingly, a later eighth century B.C. Assyrian king named named Sargon II ascribed his success to a god named Asshur:</span></p><span data-dcnode-id="1087" instrument_node="">
</span><blockquote data-dcnode-id="1082"><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Sargon and his successors continued the worship of Merodach. Sargon  constantly ascribed his power to the united favor of Asshur and Merodach, and  Esar-haddon sculptured the emblems of these two gods over the images of  foreign gods. (Clare IS.  Ancient oriental nations, Volume 1 of The Unrivaled History of the World: Containing a Full and Complete Record of the Human Race from the Earliest Historical Period to the Present Time, Embracing a General Survey of the Progress of Mankind in National and Social Life, Civil Government, Religion, Literature, Science and Art. Unrivaled Publishing Co., 1889.  Original from Indiana University, Digitized Feb 3, 2010,, p. 225)</span></p><span data-dcnode-id="1083" instrument_node="">
</span></blockquote><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Various records of history show that the Assyrians claimed ties to Asshur, apparently originated from the one in Genesis 10. Sargon II's son was Sennacherib, who invaded and took the fortified cities of Judah as discussed in Isaiah 36:1-2:</span></p><span data-dcnode-id="1078" instrument_node="">
</span><blockquote data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">1 Now it came to pass in the fourteenth year of King Hezekiah that Sennacherib king of Assyria came up against all the fortified cities of Judah and took them. 2 Then the king of Assyria sent the Rabshakeh with a great army from Lachish to King Hezekiah at Jerusalem. And he stood by the aqueduct from the upper pool, on the highway to the Fuller's Field.  (Isaiah 36:1-2)  </span></p><span data-dcnode-id="1074" instrument_node="">
</span></blockquote><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1068"><em data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Smith's Bible Dictionary</span></em><span data-dcnode-id="1069" instrument_node=""> states:</span></p><span data-dcnode-id="1067" instrument_node="">
</span><blockquote data-dcnode-id="1060"><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1062"><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Assyria, Asshur</span></strong><span data-dcnode-id="1063" instrument_node="">...The civilization of the Assyrians was derived originally from the Babylonians. They were a Shemetic race, originally resident in Babylonia (which at that time was Cushite) and thus acquainted with Babylonian inventions and discoveries...But they were still in the most important points barbarians. Their government was rude and artificial, their religion coarse and sensual, and their conduct in war cruel. (Assyria. Smith's Bible Dictionary. Hendrickson Publishers, pp. 61-62)</span></p><span data-dcnode-id="1061" instrument_node="">
</span></blockquote><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Also notice:</span></p><span data-dcnode-id="1056" instrument_node="">
</span><blockquote data-dcnode-id="1051"><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node=""> Ishtar was a favorite goddess of the Assyrian kings, who styled her as  "their lady," and sometimes coupled her with Asshur, "the Great Lord," in their invocations. Ishtar had a very old temple at Asshur, the primitive Assyrian capital, and this temple, Tiglath-Pileser I, repaired and beautified. (Clare, p. 225). </span></p><span data-dcnode-id="1052" instrument_node="">
</span></blockquote><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1049" instrument_node="">Ishtar, also known as </span><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cogwriter.com/easter.htm"><span data-dcnode-id="1048" instrument_node="">Easter/Oster/Ostern</span></a><span data-dcnode-id="1046" instrument_node=""> (the Germanic goddess of Springtime), long influenced the Assyrians and as well the modern Germans. Ishtar was the goddess of fertility and war. Ishtar also has ties to the ancient Babylonian mystery religion and Nimrod. She was also called Beltis. Belits was the wife of Bel-Nimrod. She was  called "the Queen of Fertility" and also known as  "the Great Mother" (similar to how some revere Mary, the mother of Jesus today) and essentially was also Ishtar in the Assyrian triad (Clare, pp. 222-223).</span></p><span data-dcnode-id="1044" instrument_node="">
</span><blockquote data-dcnode-id="1039"><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Bel, or Bel-Nimrod, according to the testimony of the Assyrian monuments, was worshiped as extensively in Assyria as in Chaldaea, and Babylonia. (Clare, p. 222)</span></p><span data-dcnode-id="1040" instrument_node="">
</span></blockquote><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Notice some of what the Bible teaches about Nimrod:</span></p><span data-dcnode-id="1035" instrument_node="">
</span><blockquote data-dcnode-id="1030"><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">8 Cush begot Nimrod; he began to be a mighty one on the earth. 9 He was a mighty hunter before the Lord; therefore it is said, "Like Nimrod the mighty hunter before the Lord." 10 And the beginning of his kingdom was Babel, Erech, Accad, and Calneh, in the land of Shinar. 11 From that land he went to Assyria and built Nineveh, Rehoboth Ir, Calah, 12 and Resen between Nineveh and Calah (that is the principal city). (Genesis 10:8-12).</span></p><span data-dcnode-id="1031" instrument_node="">
</span></blockquote><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1028" instrument_node="">Nimrod, probably around 2300 B.C. (cf. </span><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cogwriter.com/six_thousand_year_plan_6000.htm"><span data-dcnode-id="1027" instrument_node="">Does God Have a 6,000 Year Plan? What Year Does the 6,000 Years End?</span></a><span data-dcnode-id="1025" instrument_node=""> and Genesis 10), built Nineveh in the land of the Assyrians (Genesis 10:11) and, as may have been  expected,  had religious and military influence on the people of that land. Nimrod "after his death was deified as Bel-Nimrod" (Clare, p. 125). (More on Nimrod can be found in the article </span><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cogwriter.com/mystery-of-civilization.htm"><span data-dcnode-id="1024" instrument_node="">Mystery of Civilization</span></a><span data-dcnode-id="1022" instrument_node="">.)</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Calah and Nineveh were both later capitals of the Assyrian empire.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1016" instrument_node="">Around the 8th century B.C., God sent Jonah to the people of  Nineveh. At that time, Nineveh was the capital of the Neo-Assyrian Empire and was one of the major cities in the world. While there, Jonah  preached repentance (Jonah 3:1-4). And the people of that great city did repent then (Jonah 3:5-10).  At least one 21st century discovery provides some evidence of the biblical Jonah (see </span><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cogwriter.com/news/wcg-news/james-tabor-seems-to-have-found-old-jonah-related-tomb/" rel="bookmark" title="James Tabor Seems to Have Found Old Jonah-Related Tomb"><span data-dcnode-id="1015" instrument_node="">James Tabor Seems to Have Found Old Jonah-Related Tomb</span></a><span data-dcnode-id="1013" instrument_node="">).</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">It has been claimed:</span></p><span data-dcnode-id="1008" instrument_node="">
</span><blockquote data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">In 700 B.C.E. Germany was practically uninhabited. (Davidy  Y.&nbsp; The Tribes.&nbsp; Rabbinical approbation: Rabbi Abraham Feld of      the Maccabee Institute Jerusalem, July   4, 1993.&nbsp; Russell-Davis      Publishers, Hebron (Israel),  p. 110)</span></p><span data-dcnode-id="1004" instrument_node="">
</span></blockquote><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">The Assyrians themselve sometimes moved and were in different areas. Around 530 B.C.:</span></p><span data-dcnode-id="999" instrument_node="">
</span><blockquote data-dcnode-id="991"><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">Scylax of Caryanda names the coast of the Black Sea, from 
    the Chalybians to Armene, westward of the promontory of Syrias, Assyria. Strabo states that these Syrians, who extended from the Taurus northwards as far as the Pontus; were named Leuko-Syrians, </span><em data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">i.e. </span></em><span data-dcnode-id="994" instrument_node="">white Syrians. (Dunker M. The history of antiquity, Volume 1. Evelyn Abbott Publisher	R. Bentley &amp; son, 1877. Original from	the University of Michigan, Digitized	Sep 12, 2007, p. 540)</span></p><span data-dcnode-id="992" instrument_node="">
</span></blockquote><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Places like Pontus were in Asia Minor, typically referred to as the East by Latins/Romans. (In Finnish, Germany is called Saksa.)</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Notice the following:</span></p><span data-dcnode-id="984" instrument_node="">
</span><blockquote data-dcnode-id="973"><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="982" instrument_node="">According to </span><em data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">National Geographic’s</span></em><span data-dcnode-id="979" instrument_node=""> project, one study   provided evidence that “the people who lived in Central Europe 7,000   years ago had different DNA lineages than those that lived there 5,000   years ago, and again different to those that lived 3,500 years ago.”</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">It showed definitively that from 5500 B.C. to 1500 B.C. the region   that is today Germany saw at least four stages of significant migration   and settlement. The stages were highlighted by marked shifts in the   genetic composition of the popula- tions in the region. Researchers   focus on mitochondrial DNA (mtDNA). This type of DNA is passed down,   almost unchanged, from a mother to her children, thereby allowing   geneticists to probe the maternal histories of populations. (Killingley R.&nbsp;Are we the lost tribes? Check our DNA to find out.&nbsp; The   Journal: News of the Churches of God, September-October 2013, p. 5)</span></p><span data-dcnode-id="974" instrument_node="">
</span></blockquote><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Tacitus was a late first/early second century historian who apparently knew that the Germans at least claimed to have come from Asia Minor at one time:</span></p><span data-dcnode-id="969" instrument_node="">
</span><blockquote data-dcnode-id="964"><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">When Tacitus informs us that the first act of a German on rising was ablution {washing}, it will be conceded, this habit was not acquired in the cold climate of Germany but must have been of eastern origin; as were the loose flowing robe, the long and braided hair, tied in a knot on the top of the head...Tacitus...knew their {German} claim to Asiatic origin, when he asks, "who would leave the softer abodes of Asia for Germany where nature yields nothing but deformity?" (Tod J. The annals and antiquities of Rajastʾhan: or the central and western Rajpoot states of India, Volume 1. Indian Publication Society, 1899. Original from	Princeton University, Digitized	Jan 15, 2010, p. 70)</span></p><span data-dcnode-id="965" instrument_node="">
</span></blockquote><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Craig White reported that the above hairstyle "seems similar to the Assyrian hairstyle" (White,  C. The Great German Nation: Origins and Destiny. AuthorHouse, 2007, p. 96)</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Apparently, Assyrians were considered to be of similar ethnicity to the Germans by some Arabs:</span></p><span data-dcnode-id="957" instrument_node="">
</span><blockquote data-dcnode-id="952"><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node=""> Medieval Arab authors say that the Assyrians are from the same source as the Germans...Barhebraeus, a Syria Bishop living during the twelfth century wrote that 'The Germanikah are a people in Mosel (Nineveh) who came from Persia'...Arab tradition have the Germanikah as Assyrians. (Gemol M. Israelites und Hyksos. Leipzig, 1913, pp.88-90, as shown translated in White, p. 92)</span></p><span data-dcnode-id="953" instrument_node="">
</span></blockquote><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">History does show that the Assyrians conquered Persia (Malcom J. The history of Persia, from the most early period to the present time: containing an account of the religion, government, usages, and character of the inhabitants of that kingdom, Volume 1. J. Murray, 1829. Original from	Oxford University, Digitized	Jan 30, 2009, p. 509), hence Barhebraeus' comments seem consistent with the old Arab beliefs. </span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Some Assyrians were described as having black or dark hair, while Sir William Smith reported of the Northern Germans:</span></p><span data-dcnode-id="945" instrument_node="">
</span><blockquote data-dcnode-id="940"><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">The Germans were a branch of the great Indo-Germanic race, who, along with the Celts, migrated into Europe from the Caucasus, and the countries around the Black and Caspian seas, at a period long anterior to historical records. They are described as a people of high stature and of great bodily strength, with fair complexions, blue eyes, and yellow or red hair. (Smith W. A smaller classical dictionary of biography, mythology, and geography. Harper, 1877. Original from	Harvard University, Digitized	Jan 24, 2008, p. 175)</span></p><span data-dcnode-id="941" instrument_node="">
</span></blockquote><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">The above consistent with historical Church of God teachings (e.g. McNair R. America and Britain in Prophecy. Global Church of God, San Diego, 1996; Winnail D. Modern Nations and God’s Ancient Plan. Tomorrow's World Magazine, Volume 8, Issue 4. July-August, 2006).</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">It may be of interest to realize that Germany is called Alemanya in Catalan, Duitsland in Dutch, Allemagne in French, Německo in Czech, Saksamaa in Estonian, Németország in Hungarian, Germania in Italian, Vācija in Lativian, Vokietija in Lithuanian, Tyskland in Norwegian, Niemcy in Polish, Alemanha in Portuguese, Немачка in Serbian, Nemecko in Slovak, Alemania in Spanish, Almanya in Turkish, Німеччина in Ukranian, and yr Almaen in Welsh. The fact that there are words that are so different to describe the German nation in various languages, supports the view that the Germans had been called various names throughout history.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="932" instrument_node="">It also appears that a group that the Bible calls Hittites (e.g. Genesis 15:20) were also in the area of central Europe and northern Germany. Because of certain language and DNA connections, there is evidence that they too could have contributed to the ancestry of modern Germans (Kaiser DP. Origin &amp; Ancestors Families Karle &amp; Kaiser of the German-Russian Volga Colonies. Darrel P. Kaiser, 2006, p. 39). Many were considered as "White Nordic types," one of their provinces was named Assura, and the Assyrians, under Sargon II, apparently absorbed many into the Assyrian empire (White C. The Great German Nation: Origins and Destiny. </span><span data-dcnode-id="930" dir="ltr"><span data-dcnode-id="931" instrument_node="">AuthorHouse, 2007</span></span><span data-dcnode-id="929" instrument_node="">, pp. 101, 107,109).</span></p><span data-dcnode-id="927" instrument_node="">
</span><h2 data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">More on Assyrian Gods</span></h2><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="916"><img alt="" data-dcnode-id="923" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cogwriter.com/645-635-nineveh.jpg&amp;raw" width="220"><br data-dcnode-id="922"><span data-dcnode-id="921" instrument_node="">
</span><em data-dcnode-id="917"><span data-dcnode-id="920" instrument_node="">Assyrian Relief from Nineveh, 645-635 B.C.</span><br data-dcnode-id="919"><span data-dcnode-id="918" instrument_node="">
</span></em></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="914" instrument_node="">On September 16, 2012, </span><em data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">World News Daily</span></em><span data-dcnode-id="911" instrument_node=""> reported the following:</span></p><span data-dcnode-id="909" instrument_node="">
</span><blockquote data-dcnode-id="902"><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="907" instrument_node="">…Babylonian artifacts. Ancient tablets describe “Alla” as   a deity of “violence and revolution.”… The…find…links the name to the   Epic of Atrahasis, chiseled on tablets sometime around 1700 B.C. in   Babylon…“The beginning of the Epic of Atrahasis describes Allah as how   all of the gods labored endlessly in grueling work, under the rule of   the patron deity Enlil or Elil. But soon revolt of the gods had erupted,   and one deity of ‘violence and revolution’ [was] named Allah (spelled   by the experts as Alla),” he wrote….“The question remains as to why no   expert on Assyriology or Sumerology had even suspected that ‘Alla’ had a   connection with the Arabian ‘Allah,’” he wrote. </span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wnd.com/2012/09/1700-b-c-alla-god-of-violence-and-revolution/" title="http://www.wnd.com/2012/09/1700-b-c-alla-god-of-violence-and-revolution/"><span data-dcnode-id="906" instrument_node="">http://www.wnd.com/2012/09/1700-b-c-alla-god-of-violence-and-revolution/</span></a></p><span data-dcnode-id="903" instrument_node="">
</span></blockquote><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">While the above article attempts to connect that to modern Islam,   various scholars likely have their doubts. But there is no doubt that   names Alla and Allah certainly seem similar. </span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">But could there be any Germanic ties?</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Well clearly this research shows a connection between the ancient Assyrians and a warring deity.</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Other sources have demonstrated that the ancient Assyrians used the term Alla for some of their deities:</span></p><span data-dcnode-id="889" instrument_node="">
</span><blockquote data-dcnode-id="881"><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="887" instrument_node="">Al-sarru, if Al had been an Assyrian god. We may   set down Alman as a possible reading, or even Alnis, but there seems no   meaning to either. Now we have a similar name Alla-MAN, this can hardly   be phonetic. I venture therefore to read Alla-sarru and Al-sarru, ‘Alla   is king.’ As MAN means king…Mannu-ki-Alla shows the same divine name.   (Johns CHW. An Assyrian doomsday book, or, Liber censualis of the   district round Harran in the seventh century B.C.: copied from the   cuneiform tablets in the British Museum, </span><em data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Volume 17 of Assyriologische Bibliothek</span></em><span data-dcnode-id="884" instrument_node="">. J. C. Hinrichs, 1901. Original from Princeton University, Digitized May 28, 2009, p. 15)</span></p><span data-dcnode-id="882" instrument_node="">
</span></blockquote><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">They also had other warring deities.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Here are two other references:</span></p><span data-dcnode-id="874" instrument_node="">
</span><blockquote data-dcnode-id="848"><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="872" instrument_node="">ON THE ORIGINAL ASSYRIA. WE proceed to consider the   character of another country, noticed as marking… by the Hebrews and   Chaldeans, was either </span><em data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Syr, Shur</span></em><span data-dcnode-id="869" instrument_node="">, or </span><em data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Tyr</span></em><span data-dcnode-id="866" instrument_node=""> ; so that the compound word might be </span><em data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Ai-syria</span></em><span data-dcnode-id="863" instrument_node="">, or </span><em data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Ai-shyria</span></em><span data-dcnode-id="860" instrument_node="">…which is here rendered </span><em data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Assyria</span></em><span data-dcnode-id="857" instrument_node="">.   (Clamet A, Taylor Calmet’s dictionary of the Holy Bible: with the   Biblical fragments, Volume 4, 5th edition. Holdsworth and Ball, 1830.   Original from the New York Public Library, Digitized Oct 20, 2010, p.   60)</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Men prayed to Tyr…In some places he was called Tiwaz and was   associated with the Roman God, Mars, the Celtic God, Nadu, as well as   the Indian God, Mitra…Tyr was the original God of war, and the precursor   of Odin…The name Tiwaz is also related to the Roman God Jupiter, and   the Greek God, Zeus. All three names are descended from Dyaus Piter or   Father Dyaus, and are all descended from the name Dieus…</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">A helmet was found in Negau in Austria which bears an   inscription…translated as Teiwa, which is an archaic form of Tyr’s   name…Tyr was worshipped…in Bavaria (Blumetti R. The Book of Balder   Rising. iUniverse, 2004, pp. 142, 143).</span></p><span data-dcnode-id="849" instrument_node="">
</span></blockquote><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Tyr, Mars, etc. were gods of war. And Tyr was worshiped in Bavaria (essentially southern Germany).</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Also notice:</span></p><span data-dcnode-id="841" instrument_node="">
</span><blockquote data-dcnode-id="836"><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Ishtar was a favorite goddess of the Assyrian kings, who   styled her as “their lady,” and sometimes coupled her with Asshur, “the   Great Lord,” in their invocations. Ishtar had a very old temple at   Asshur, the primitive Assyrian capital, and this temple, Tiglath-Pileser   I, repaired and beautified. (Clare IS. Ancient oriental nations, Volume   1 of The Unrivaled History of the World: Containing a Full and Complete   Record of the Human Race from the Earliest Historical Period to the   Present Time, Embracing a General Survey of the Progress of Mankind in   National and Social Life, Civil Government, Religion, Literature,   Science and Art. Unrivaled Publishing Co., 1889. Original from Indiana   University, Digitized Feb 3, 2010p. 225).</span></p><span data-dcnode-id="837" instrument_node="">
</span></blockquote><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Ishtar, also known as Easter/Oster/Ostern (the Germanic goddess of   Springtime), long influenced the Assyrians and as well the modern   Germans. Ishtar was the goddess of fertility and war. Ishtar also has   ties to the ancient Babylonian mystery religion and Nimrod. She was also   called Beltis. Belits was the wife of Bel-Nimrod. She was called “the   Queen of Fertility” and also known as “the Great Mother” (similar to how   some revere Mary, the mother of Jesus today) and essentially was also   Ishtar in the Assyrian triad (Clare, pp. 222-223).</span></p><span data-dcnode-id="832" instrument_node="">
</span><blockquote data-dcnode-id="827"><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Bel, or Bel-Nimrod, according to the testimony of the   Assyrian monuments, was worshiped as extensively in Assyria as in   Chaldaea, and Babylonia. (Clare, p. 222)</span></p><span data-dcnode-id="828" instrument_node="">
</span></blockquote><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">What is the possible relevance of any of this?</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">The tying together of violent deities from Babylon to Assyria in the past suggests a possible connection in the future.</span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Why?</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Notice the following from the Bible:</span></p><span data-dcnode-id="814" instrument_node="">
</span><blockquote data-dcnode-id="785"><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="812" instrument_node="">23 The Babylonians,</span><br data-dcnode-id="811"><span data-dcnode-id="810" instrument_node="">
    All the Chaldeans,</span><br data-dcnode-id="809"><span data-dcnode-id="808" instrument_node="">
    Pekod, Shoa, Koa,</span><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
    All the Assyrians with them,</span><br data-dcnode-id="805"><span data-dcnode-id="804" instrument_node="">
    All of them desirable young men,</span><br data-dcnode-id="803"><span data-dcnode-id="802" instrument_node="">
    Governors and rulers,</span><br data-dcnode-id="801"><span data-dcnode-id="800" instrument_node="">
    Captains and men of renown,</span><br data-dcnode-id="799"><span data-dcnode-id="798" instrument_node="">
    All of them riding on horses. </span><br data-dcnode-id="797"><span data-dcnode-id="796" instrument_node="">
    24 And they shall come against you</span><br data-dcnode-id="795"><span data-dcnode-id="794" instrument_node="">
    With chariots, wagons, and war-horses,</span><br data-dcnode-id="793"><span data-dcnode-id="792" instrument_node="">
    With a horde of people.</span><br data-dcnode-id="791"><span data-dcnode-id="790" instrument_node="">
    They shall array against you</span><br data-dcnode-id="789"><span data-dcnode-id="788" instrument_node="">
    Buckler, shield, and helmet all around. (Ezekiel 23:23-24)</span></p><span data-dcnode-id="786" instrument_node="">
</span></blockquote><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="783" instrument_node="">So, we see a confederation of Babylonians, Chaldeans, and Assyrians--this is consistent with prophecies like Revelation 17:12-13 (see also </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cogwriter.com/ten-kings.htm"><span data-dcnode-id="782" instrument_node="">Must the Ten Kings of Revelation 17:12 Rule over Ten Currently Existing Nations?</span></a><span data-dcnode-id="780" instrument_node="">).</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="777" instrument_node="">The Bible tells of a time where a leader with Assyrian ties (Isaiah   10:5-7) will rise up and destroy not a few nations. This leader is also   the one called the </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cogwriter.com/kingofthenorth.htm"><span data-dcnode-id="776" instrument_node="">King of the North</span></a><span data-dcnode-id="774" instrument_node="">. This final such leader will, according to the Bible, honor a violent god and he also will destroy many:</span></p><span data-dcnode-id="772" instrument_node="">
</span><blockquote data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">38 But in their place he shall honor a god of fortresses;   and a god which his fathers did not know he shall honor with gold and   silver, with precious stones and pleasant things. 39 Thus he shall act   against the strongest fortresses with a foreign god, which he shall   acknowledge, and advance its glory; and he shall cause them to rule over   many, and divide the land for gain. 40 “At the time of the end the king   of the South shall attack him; and the king of the North shall come   against him like a whirlwind, with chariots, horsemen, and with many   ships; and he shall enter the countries, overwhelm them, and pass   through. 41 He shall also enter the Glorious Land, and many countries   shall be overthrown…(Daniel 11:38-41)</span></p><span data-dcnode-id="768" instrument_node="">
</span></blockquote><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">What’s the Alla, Tyr, and Ishtar connection?</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Precisely the distinguishing in Daniel 11:38 between the “god of   fortresses” and “a god his fathers did not know.” The implication, to me   at least, is that the “god of fortresses” is related to a “god” of   violence that his fathers did know, like Alla, Tyr, and Ishtar.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">And while there will also be a new “god” that the King of the North   will honor, there will be some difference between his empire (Daniel   2:41-43 and the Babylonian one (Daniel 2:24, 36-37). It may be important   to realize that the empire of this final King of the North is also   called the “daughter Babylon” in scripture (Jeremiah 50:41-43), thus it   must be somehow different, but with some Babylonian connections.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">So, this information about the Babylonian warring connection of   ancient deities tied in with biblical prophecy shows an additional   apparent connection between ancient Babylon and the coming King of the   North power.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">It should be understood that although the coming King of the North   will likely claim to be some type of Christian, the reality is that the   historical record shows that the early professors of Christ would not   participate in carnal warfare. It is only those whose faiths have   stronger ties to warring deities than the true Christian God that do   that.</span></p><span data-dcnode-id="751" instrument_node="">
</span><h2 data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Germany and Deutschland </span></h2><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="747" instrument_node="">While English-speaking people call the nation Germany, the Germans themselves refer to it as Deutschland. While many claim that the term German come from the Medieval Latin term </span><em data-dcnode-id="745" xmlns:mwref="http://www.m-w.com/mwref"><span data-dcnode-id="746" instrument_node="">Germanus</span></em><span data-dcnode-id="744" instrument_node=""> and essentially means "brother," another explanation is that it is made up of the Latin words </span><em data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Guerra manus</span></em><span data-dcnode-id="741" instrument_node="">, which basically means "war gang" (some have said "war man" or "war men").</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Notice also the following:</span></p><span data-dcnode-id="736" instrument_node="">
</span><blockquote data-dcnode-id="681"><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Ancient Assyria was the greatest war-making power in all history. Its soldiers were drilled to be hard-fighting WARMEN. When the Assyrians invaded Europe, the Romans called them "Germans" — a name meaning "men of war."    And that is how the Assyrians came to be known as Germans. But that is not the only reason the modern Assyrians are called Germans today. ...</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">The event is recorded in Genesis 14. It is the story of an invasion, by four kings of Mesopotamia and Asia Minor, of the land of Palestine. Josephus, the famous Jewish historian, describes this event in these words: "At that time, when the Assyrians had the dominion over Asia... the Assyrians made war upon them" — the Canaanites — "and dividing their army into four parts, fought against them. Now every part of the army had its own commander... then the army of the Assyrians came upon them, under their commanders, Amrephel, Arioch, Chodorlaomer, and Tidal." ("Antiquities of the Jews", I, ix, § 1.)    </span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">These men were ASSYRIAN generals, commanding an ASSYRIAN army divided into four parts. Notice that the Assyrians are making war, conquering and plundering other people. But did you notice the NAMES of these Assyrians? Not a single name is Hebrew. All are of foreign derivation.    </span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">The name of one of these four Assyrian commanders was Tidal. It is an INDO-GERMANIC name. It is not Semitic. Here we have evidence that even before the days of Abraham the Assyrians were speaking more than one language — and one of the languages was an INDO-GERMANIC tongue! More on this later. But now, back to King Tidal.    </span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">The name Tidal was a common throne name among the ancient Hatti or Chatti kings of Anatolia, or Asia Minor. Since Tidal was ALSO an Assyrian king or commander, that would make the Hatti or Chatti AN ASSYRIAN TRIBE! The Chatti were the ruling tribe in Anatolia (Asia Minor). They forded it over several other nations. Notice that in Genesis 14:1 Tidal, the Hattian king, is called "king of nations." </span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="717"><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">The Hatti Were Hessian Germans!    </span></strong></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Now what does the word "Hatti" or "Chatti" mean in the Hebrew language? Its closest derivation is the root "chathath" (Strongs - 2865). It means "to terrorize, or break down, as in war, hence a warrior or MAN OF WAR." The Chatti were therefore Men of War or Germans. The name Chatti is but the Hebrew form of the word GERMAN, THE VERY WORD which the Romans applied to the Assyrians.    </span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">That means that the ancient Chatti were Assyrian — or German — migrants who early settled in Asia Minor. Did these Chatti or Hatti later also migrate into Western Europe, where the Germans are today?</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node=""> Indeed! The Chatti were the chief people who settled in modern Germany. Their descendants are the HESSIANS today! In fact, the Old High German spelling of Hesse was Hatti!    </span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">The land of Hatti was the WESTERN part of the Assyrian Empire. The ancient Assyrian Empire was divided just as the modern Germans are divided between East and West Germany and Austria. THE ANCIENT KINGS OF ASSYRIA called themselves Khatti-sars — meaning the "Kaisers of Hatti," or "Kings of Hatti." The chief people of Hatti regarded themselves AS ASSYRIANS.    </span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">The Assyrian kings wrote of the tribes of Hatti — the ancestors of the Hessians: "AS ASSYRIANS I [ac]counted them" (D. D. Luckenbill, "Ancient Records of Assyria and Babylonia", Vol. II, § 29). The ancient capital of the land of Hatti was popularly known among the Romans as "Ninus Vetus — the old Nineveh" ("History of Art in Sardinia, Judaea, Syria and Asia Minor", by G. Perrot and C. Chipiez, Vol. II, page 272). (Hoeh H. GERMANY in Prophecy! - Part 2. Plain Truth, January 1963)</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="700" instrument_node="">Among the most important German tribes were   the "Hatti" (the ancestors of the modern Hessians), the "Alemani" and   "Suabi," the "Quadi," the "Casuari" and others. The Romans called them   collectively Germani, meaning "War-men" (from the Encyclopedia   Britannica, article, "Germany"). </span><br data-dcnode-id="699"><span data-dcnode-id="698" instrument_node="">
    &nbsp;&nbsp;&nbsp;The ancestor of the Germans was   glorified as their God of war. The ancient Germans called him Thor or   Thur from which our word "Thursday" comes. Thursday means the "day of   Thur or Thor," the thunderer. </span><br data-dcnode-id="697"><span data-dcnode-id="696" instrument_node="">
    &nbsp;&nbsp;&nbsp;But from where did all these Germanic people come? — for Europe was not their original homeland! </span><br data-dcnode-id="695"><span data-dcnode-id="694" instrument_node="">
    &nbsp;&nbsp;&nbsp;Here   is the answer of history: "There can be no doubt that they... migrated   into Europe from the Caucasus and the countries around the Black and   Caspian seas," states Smith's Classical Dictionary, article "Germania,"   p. 361. </span><br data-dcnode-id="693"><span data-dcnode-id="692" instrument_node="">
    &nbsp;&nbsp;&nbsp;The Germans, then, can be traced in historical records to   the regions surrounding the Black and Caspian seas, which border on the   ancient Biblical land of Mesopotamia. This is the region where   civilization commenced and from where the Bible patriarchs came! </span><br data-dcnode-id="691"><span data-dcnode-id="690" instrument_node="">
  &nbsp;&nbsp;&nbsp;In   this very region we find in ancient times cities bearing such names as   Germanopolis, meaning "the city of the Germans," and Germanicia! (See   Lempriere's Classical Dictionary, p. 282.) </span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="685"><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Germans Spread Out from Bible Lands</span></strong></p><span data-dcnode-id="684" instrument_node="">
  &nbsp;&nbsp;&nbsp;Most   of the ancient Germans moved westward from the Bible lands into Europe.   But one small tribe moved eastward and settled among the Persians.   Historians called them the Germanii (Herodotus' History, bk. 1, § 125).   The region where they settled is today called Kharmania or Carmania. The   oriental Kerman rugs, recognized the world over for their fine quality,   are made by this region. Last year, Dr. Meredith and I had the   opportunity to visit Persia, where this one small branch of the Germanic   people anciently settled. </span><br data-dcnode-id="683"><span data-dcnode-id="682" instrument_node="">
&nbsp;&nbsp;&nbsp;But the bulk of the warring Germanic   people moved westward into Europe from Mesopotamia (the present-day   Iraq, where the Nazi Underground is working). Mesopotamia was the   central home land from which the Aryans of history sprang. Notice that   under Hitler the Germans were thoroughly indoctrinated in the concept   that they were the true "Aryans" or "the Master Race"! (Hoeh H. Germany in Prophecy, 1958)</span></blockquote><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Many moderns will note that the Germans under Adolf Hitler claimed to be Aryans, which, to me at least, is interesting as it sounds a bit like Assyrians. While most of the NAZI history of the Aryans was false, the Assyrians did exist and also claimed to be the master race.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">The following claim, which I have NOT been able to independently verify, suggests that there were Aryans that became Assyrians:</span></p><span data-dcnode-id="674" instrument_node="">
</span><blockquote data-dcnode-id="658"><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="672" instrument_node="">The Sumerians, SHUMERIANS - ASSYRIANS ( WHITE ARYANS) are definately   {sic} recorded on their tablet writing records tell of coming down from   Eastern Central Europe! You will find that the early writing there is   the same as even shown on the Bulgarian ancient history native writing   as well thread.</span><br data-dcnode-id="671"><span data-dcnode-id="670" instrument_node="">
</span><br data-dcnode-id="669"><span data-dcnode-id="668" instrument_node="">
An ARYAN racial physical type are   seen in their early stone facial portraits and seals from the earliest   Sumerian times. They are seen prerdonderatingly of longish-headed, broad   browed and large brained 'NORDIC' type!   They were fair in complextion and attested by their blue eyes of white   shell inlaid with lapis lazuli stone and of fair hair.</span><br data-dcnode-id="667"><span data-dcnode-id="666" instrument_node="">
</span><br data-dcnode-id="665"><span data-dcnode-id="664" instrument_node="">
The officals {sic} and other 'Seafaring Sumerians' wore the horned helmet and   thus called the Hatti, Catti , Katti or Kaddi of the ancient Goths ... </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stormfront.org/forum/t427832-2/"><span data-dcnode-id="663" instrument_node="">https://www.stormfront.org/forum/t427832-2/</span></a><span data-dcnode-id="661" instrument_node=""> accessed 04/10/18</span></p><span data-dcnode-id="659" instrument_node="">
</span></blockquote><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">(Now, perhaps it should be mentioned that I have been able to verify with another source that there seems to have been some type of Sumerian-Assyrian-Aryan link. Yet, while it did not discuss 'White Aryans,' it did mention 'Aryan Europe.' Here is the paper: Cooper JS. </span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persee.fr/doc/rhr_0035-1423_1993_num_210_2_1437" onmousedown="return rwt(this,'','','','1','AOvVaw38tNv4kt-QRNbYfSv2WzvC','','0ahUKEwjiy_PnjLXaAhWC0J8KHS19AJoQFggsMAA','','',event)"><span data-dcnode-id="655" instrument_node="">Sumerian and Aryan : Racial Theory, Academic Politics and Parisian Assyriology</span></a><span data-dcnode-id="653" instrument_node="">.  Revue de l'histoire des religions Année 1993 210-2: 169-205.)</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">The term Deutschland is an interesting one and a bit difficult to nail down where it came from. Some tie it in with Zeus and/or the name Tiw:</span></p><span data-dcnode-id="648" instrument_node="">
</span><blockquote data-dcnode-id="634"><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Zeus Pater of the former and the Dyaus-pitar of the latter represent the Jupiter of the Latins, and the Tuisco, Zio, Tyr and Tiw of the German nations. The etymological changes of the word are indeed almost numberless. (Cox GW. The mythology of the Aryan nations. Longmans, Green, and co., 1870 Original from	Princeton University, Digitized	Dec 8, 2009, Volume 1. p. 354)</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Tyr,  the German sun god is made the same as Zeus and Jove by Grimm (Cambell J. The Primitive History of the Ionians.  The Canadian Journal of Science, Literature, and History, No. LXXXVI, August 1874, p. 561).</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="640" instrument_node="">One old German story held that Tiw* was the father of Man, and that Man's three sons were Ing, Isk, and Er, the fathers of the chief Deutsch tribes. ...* The same word as the Greek Zeus and Latin Deus. (Yonge CM. </span><span data-dcnode-id="638" dir="ltr"><span data-dcnode-id="639" instrument_node="">Aunt Charlotte's stories of German history for the little ones. Marcus Ward &amp; co., Chandos street, Strand and Royal Ulster works, 1878 Original from	Harvard University Digitized	Mar 20, 2008, p. 22</span></span><span data-dcnode-id="637" instrument_node="">)</span></p><span data-dcnode-id="635" instrument_node="">
</span></blockquote><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">So in the above we see a possible connection between Dyaus-pitar  with Tiw/Tyr and Tiw/Zeus with Deutsch. Others have suggested that the term Tuisco became the term Deutsch and even with the term Assyria (it should be noted that not all sources agree completely with each other on this issue):</span></p><span data-dcnode-id="630" instrument_node="">
</span><blockquote data-dcnode-id="601"><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">It is usual to identify Tiw or Tyr with the god Tuisco...Tuisco (i.e. Thiudiaks or Deutsch) (Braddon ME. Belgravia: Volume 41. 1880 via Google Books, p 429).</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="625" instrument_node="">The ancient Teutons venerated the earth-god Tuisco and his son Mannus, as found in old songs and history -books; from the former, the nation derived its 
    ultimate name, </span><em data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">tuisco, Deutsch</span></em><span data-dcnode-id="622" instrument_node=""> in German. He was considered the founder of the nation. (P.F. The Ancient Teutons. In: Tingley KAW. The Theosophical path: illustrated monthly ..., Volume 23, New Century Corporation., July-December 1922. Original from	the University of Michigan. Digitized	Feb 23, 2009, p. 575)</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="619" instrument_node="">Assyria is </span><em data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">s</span></em><span data-dcnode-id="616" instrument_node="">:Athur (Awde N, Lamassu M, Al-Jeloo N. Aramaic (Assyrian/Syriac) dictionary and phrasebook. Hippocrene Books, 2007, p. 4)</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Tyr and Bauga were two subordinate gods of war (Mallett PH. e	Northern antiquities: or, A description of the manners, customs, religion and laws of the ancient Danes ... With a translation of the Edda ... Tr. from "L'introduction à l'histoire de Dannemarc, &amp;c., par Mons. Mallet." With additional notes by the English translator, and Goranson's Latin version. Translated by	Johan Göransson and Thomas Percy.	Printed by C. Stewart, 1809. Original from	Oxford University, Digitized	Jan 31, 2007, p. 328).</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">The supreme god of the Assyrians was Asshur who later became known in Europe as Tyr or Tir, derived from Atir or Athur, which is the Indo-Germanic form of the Hebrew Asshur...Another deity of Germany was Thuisto, Tusito or Tuisco...Deutsch and Deutchsland is directly derived from Tuisto or Tuisch. (White, pp. 68,98)</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="607" instrument_node="">The great god of Assyria was Asshur...</span><em data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Germanic Peoples</span></em><span data-dcnode-id="604" instrument_node="">...Their hero is Askr, or the ash, and he is also Tuisco, whose wife Nertha is Naarah. Irmin and Hermoder, connecting with him, must give us Harum, who, as Naram Sin, is made a son of the Assyrian Shagarak- tiyach. (Campbell J. The Shepherd Kings of Egypt. The Canadian Journal of Science, Literature, and History, No. LXXXVI, August 1874, pp. 225, 266)</span></p><span data-dcnode-id="602" instrument_node="">
</span></blockquote><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">In Swedish, Germany is called Tyskland, and that may be related to why Deutschland is used (as it might indicate land of Tyr). The Danish word for German is Tysk, and for Germany is also Tyskland.</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="596" instrument_node="">On the other hand, </span><em data-dcnode-id="594"><span data-dcnode-id="595" instrument_node=""> Wikipedia</span></em><span data-dcnode-id="593" instrument_node=""> does not tie Tiw in with the term Deutsch in its article on Tuesday, but it indicates some Germanic connection:</span></p><span data-dcnode-id="591" instrument_node="">
</span><blockquote data-dcnode-id="583"><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="589" instrument_node="">The name </span><em data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Tuesday</span></em><span data-dcnode-id="586" instrument_node=""> derives from the Old English "Tiwesdæg" and literally means "Tiw's Day." Tiw is the Old English form of the Proto-Germanic god *Tîwaz, or Týr in Norse, a god of war and law.</span></p><span data-dcnode-id="584" instrument_node="">
</span></blockquote><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Here is some information related to the Roman historian Tacitus (died 117 A.D.):</span></p><span data-dcnode-id="579" instrument_node="">
</span><blockquote data-dcnode-id="556"><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="577" instrument_node="">Tacitus says the name Germani was of late use, and...were at one time called </span><em data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Tungri</span></em><span data-dcnode-id="574" instrument_node="">...</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="571" instrument_node="">...Tacitus writes that the Germans had poems (</span><em data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">sagas?</span></em><span data-dcnode-id="568" instrument_node="">), which celebrated </span><em data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Tuisto, Tiw</span></em><span data-dcnode-id="565" instrument_node="">, born of the earth, and his son </span><em data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Mannus</span></em><span data-dcnode-id="562" instrument_node="">, man; though </span><em data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Tiw</span></em><span data-dcnode-id="559" instrument_node=""> elsewhere is seen to be the son of Woden and Fraga...(Barnes W. Early England and the Saxon-English: with some notes on the father-stock of the Saxon-English, the Frisians. Smith, 1869. Original from	the University of Michigan, Digitized	Oct 3, 2007, pp. 142, 144).</span></p><span data-dcnode-id="557" instrument_node="">
</span></blockquote><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Notice what was reported about 50 years ago:</span></p><span data-dcnode-id="552" instrument_node="">
</span><blockquote data-dcnode-id="468"><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="548"><strong data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Why Germans Call Themselves "Deutsch" </span></strong></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="546" instrument_node="">Perhaps you have never thought of it -- but the Germans do not call themselves "German." They refer to themselves as </span><em data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Deutsh</span></em><span data-dcnode-id="543" instrument_node="">, and to their country as </span><em data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Deutshland</span></em><span data-dcnode-id="540" instrument_node="">. Why? </span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Let's turn back the pages of history for the answer. </span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="534" instrument_node="">The Assyrians anciently called their land </span><em data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Athur</span></em><span data-dcnode-id="531" instrument_node=""> -- the Indo-Germanic form of the Semitic word </span><em data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Asshur</span></em><span data-dcnode-id="528" instrument_node=""> (</span><em data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Encyclopedia Britannica</span></em><span data-dcnode-id="525" instrument_node="">, article, "Mesopotamia"). </span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="522" instrument_node="">Sometimes the name </span><em data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Athur</span></em><span data-dcnode-id="519" instrument_node=""> was shortened simply to </span><em data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Tyr</span></em><span data-dcnode-id="516" instrument_node=""> in the Indo-European tongue. Asshur or Tyr was worshipped as the god of war by all the ancient world. His name was placed on the </span><em data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">third day</span></em><span data-dcnode-id="513" instrument_node=""> of the week -- called "Tuesday" in the English-speaking world. Tuesday is Asshur's day. </span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Tuesday is from an old Saxon word meaning "Tiw's day." Tiw was the god of war of the Germanic people of Europe. Tiw, or Tiwe, was also known by the name Tyr -- that is, Asshur. Tiw is another name of Asshur! The Assyrians knew Asshur or Tyr was their ancestor. We should expect, therefore, that when they migrated to Europe they would still be known as the sons of Tyr or Tiw, that is, Asshur. And what do we find? </span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">When the Germans appeared in Europe, they claimed Tyr or Tiw as their ancestor! But what has the name "Deutsch" to do with Tiw? </span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">The modern German word "Deutsch" -- as educated Germans know -- is derived from the old Anglo-Saxon word Tiw. (See any thorough book on etymology and word derivations.) Whenever a German calls himself Deutsch, he is saying he is Tiw's or Asshur's son -- an Assyrian. And when he terms his country Deutschland, he is saying Tiw's or Asshur's land -- Assyria! </span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="501" instrument_node="">Even ancient Hindu literature uses both the word </span><em data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Asgras</span></em><span data-dcnode-id="498" instrument_node=""> and </span><em data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Daityas</span></em><span data-dcnode-id="495" instrument_node=""> to refer to the Assyrians. </span><em data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Daityas</span></em><span data-dcnode-id="492" instrument_node=""> is but a Sanskrit word for "Deutsch" -- a name applied to the Assyrians over 1500 years before the birth of Christ! (Hoeh H. Germany in Prophecy. Plain Truth, January 1963, pp. 17,27)</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="489" instrument_node="">Early in 1605 an important publication appeared in England entitled </span><em data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Restitution of Decayed Intelligence: in Antiquities.</span></em><span data-dcnode-id="486" instrument_node=""> The author, R. Verstegan, had this to say about the origin of the name of the German people: </span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="483" instrument_node="">"Tuysco, the most ancient and peculiar god of all the Germans ... Of this Tuisco, the first and chiefest man of many among the Germans, AND AFTER WHOM THEY DO CALL THEMSELVES </span><em data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Tuytshen</span></em><span data-dcnode-id="480" instrument_node="">, that is, </span><em data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">duytshes</span></em><span data-dcnode-id="477" instrument_node=""> or </span><em data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">duytsh</span></em><span data-dcnode-id="474" instrument_node=""> people, I have already spoken." </span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Tuysco-often spelled for short as Tiw---or Tyr were the German names of Asshur, ancestor of the Assyrians. And the only modern nation to bear his name, to call themselves and their land after him, are the German people. By their own admission they are Assyrians! ( The Bible Answers Short Questions from our Readers. Plain Truth, February 1963, p. 45)</span></p><span data-dcnode-id="469" instrument_node="">
</span></blockquote><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">In general, modern secular scholars do not  agree with the above from Dr. Hoeh (and Dr. Hoeh, himself, was not accurate in every detail) nor a clear Assyrian ancestoral connection to Germany.   </span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="463" instrument_node="">Note: the terms </span><em data-dcnode-id="461" xmlns:mwref="http://www.m-w.com/mwref"><span data-dcnode-id="462" instrument_node="">Germanus</span></em><span data-dcnode-id="460" instrument_node="">, German, Germany, and Deutschland are not found in the Bible. Yet that is not particularly unusual as most nations are not mentioned by their modern names in scripture. However, since the Bible is clear that all humans descended from Adam and Eve (Genesis 3:20) and many of their descendants through Noah are mentioned by name in scripture (Genesis 10), various ones have attempted to identify which group the Germanic peoples could have descended from that are listed in the Bible. By combining biblical with historical information assists us to understand who the Germans are and what they will ultimately do in the near future. </span></p><span data-dcnode-id="458" instrument_node="">
</span><h2 data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Assyrian Migration into Central Europe</span></h2><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Various Church of God researchers believe that the  Assyrian peoples migrated into central Europe in ancient times. Notice what the following two Church of God researchers have written: </span></p><span data-dcnode-id="452" instrument_node="">
</span><blockquote data-dcnode-id="426"><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">After the fall of the Assyrian Empire, the Roman historian Pliny   mentioned a tribe of the "Assyriani" among the Scythian peoples in the   Crimea north of the Black Sea (Natural History, Bk IV. XII. 81)...Researcher Leon Poliakov notes the ancient Bavarian account   that the people of Bavaria came into central Europe from the region of   Armenia by the Black Sea (The Aryan Myth, p. 76). Considering this   information, it is not surprising to find medieval Arab writers   describing the Germans as "Assyrians" (Israelites und Hyksos, Germol,   pp. 89–90). The links between Germany and Assyria can be found, and are   neither far-fetched nor imagined. (Winnail D. Resurgent Germany: A Fourth Reich? Tomorrow's World Magazine, Volume 9, Issue 5, Sep-Oct 2007, pp. 16-20, 29)</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Asia Minor first appears in Biblical history in the days of Abram. In Genesis 14:1 "Tidal king of Goiim" is named as ruler of Asia Minor. "Goiim" is the Hebrew word for "Nations." The history of ancient Asia Minor is the story of continuous attempts to unite the warring nations of the region into a loose confederacy. In earliest days Tidal ruled this confederacy.    </span></p><span data-dcnode-id="445" instrument_node="">
