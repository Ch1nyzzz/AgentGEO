</span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="2395"><p class="tml-image--caption" data-dcnode-id="2396" itemprop="caption"><span data-dcnode-id="2397" instrument_node="">An Artist's depiction showing Zoroaster holding a globe (bearded man upper right and facing front)</span></p></figcaption></figure></div><p data-dcnode-id="2388"><span data-dcnode-id="2392" instrument_node="">Zoroaster or Zarathustra lived sometime between the eighteenth and sixth centuries B.C.E. Zoroaster was the reputed founder of Zoroastrianism, the major religion of the </span><a data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Achaemenid_Empire" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="2391" instrument_node="">Achaemenid Empire</span></a><span data-dcnode-id="2389" instrument_node=""> (aka the Persian Empire), which flourished from 550 B.C.E. to 330 B.C.E. Nobody seems to know where Zoroaster was born, but many Arabic sources assert he was born in what is now Azerbaijan. In fact, so many countries have laid claim to Zoroaster’s birth place that he may actually have been more than one person!</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="2385"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="2386" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-adv istory&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="2378"></phoenix-ad></div></aside><p data-dcnode-id="2368"><span data-dcnode-id="2375" instrument_node="">There are two texts which comprise the sacred works of Zoroastrianism: the </span><a data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Gathas" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="2374" instrument_node="">Gathas</span></a><span data-dcnode-id="2372" instrument_node="">, containing some 5,660 words, and the </span><a data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Yasna_Haptanghaiti" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="2371" instrument_node="">Yasna Haptanghaiti</span></a><span data-dcnode-id="2369" instrument_node="">. These are collections of hymns supposedly written by Zoroaster and both hold references to the life of the prophet. But there appears to be no historical record of Zoroaster the man, only collections of legends.</span></p><p data-dcnode-id="2360"><span data-dcnode-id="2367" instrument_node="">Zoroaster worshipped </span><a data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Ahura_Mazda" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="2366" instrument_node="">Ahura Mazda</span></a><span data-dcnode-id="2364" instrument_node="">, the supreme being or god of Zoroastrianism, who manifests himself by fire. Ahura Mazda was considered omniscient but not all-powerful, though he eventually defeats </span><a data-dcnode-id="2362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Angra_Mainyu" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="2363" instrument_node="">Angra Mainyu</span></a><span data-dcnode-id="2361" instrument_node="">, the evil one.</span></p><p data-dcnode-id="2349"><span data-dcnode-id="2359" instrument_node="">Zoroastrianism influenced many other ancient civilizations. In Classic Greek philosophy, </span><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Heraclitus" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="2358" instrument_node="">Heraclitus</span></a><span data-dcnode-id="2356" instrument_node=""> was inspired by Zoroaster’s teachings. To many Greeks, Zoroaster was the sorcerer-astrologer. As for the Romans, </span><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Pliny_the_elder" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="2355" instrument_node="">Pliny the elder</span></a><span data-dcnode-id="2353" instrument_node=""> called Zoroaster the inventor of magic. And Christian-Judeo literature associates Zoroaster with </span><a data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Nimrod" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="2352" instrument_node="">Nimrod</span></a><span data-dcnode-id="2350" instrument_node="">, a Babylonian who invented astrology.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-2" data-dcnode-id="2346"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-2" data-dcnode-id="2347" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-d5271a9526604bd386528ca78fa70878&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-2&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-d5271a9526604bd386528ca78fa70878&quot;,&quot;adUnitPath&quot;:&quot;/88059007/owlcation.com/humanities/history&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="2348"></phoenix-ad></div></aside><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Even though Zoroaster may not have existed, Zoroastrianism is still practiced by some people in countries such as India.</span></p><aside class="m-pullquote l-inline is-aligned-center" data-dcnode-id="2338" tml-render-layout="inline"><span data-dcnode-id="2343" instrument_node="">

data-dcnode-id="2126" instrument_node="">Often misunderstood and denigrated, Muhammad and Islam have become synonymous —at least in the minds of many people in the West —with religion-based terrorism. Even though Muhammad may have been ruthless in military matters and assassinated poets who discredited him, the Arabs of that time had to administer their own law and order just to survive. Also, on a parting note, it is said that Islam signifies peace and reconciliation.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-3" data-dcnode-id="2122"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-3" data-dcnode-id="2123" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quo </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="2056"><p class="tml-image--caption" data-dcnode-id="2057" itemprop="caption"><span data-dcnode-id="2058" instrument_node="">Statue of Maimonides</span></p></figcaption></figure></div><p data-dcnode-id="2046"><span data-dcnode-id="2053" instrument_node="">One of the greatest Jewish scholars of medieval times, Maimonides, born in 1135 to 1138, was a Sephardic Jew who wrote the 14-volume </span><a data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mishneh_Torah" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="2052" instrument_node="">Mishneh Torah</span></a><span data-dcnode-id="2050" instrument_node="">, subtitled, Book of the Strong Hand, a code of Jewish religious law completed in 1180. The book still carries a great deal of canonical weight in contemporary Jewish religious thought, particularly as it relates to the codification of Talmudic law, even though through the ages many scholars criticized it. Maimonides was also an exponent of the </span><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oral_Torah" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="2049" instrument_node="">Oral Torah</span></a><span data-dcnode-id="2047" instrument_node="">, which includes laws not contained in the Five Books of Moses (the Written Torah). Notably, he was not a supporter of mysticism, only a kind of intellectual mysticism, which seems discernible in his various works.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-6" data-dcnode-id="2043"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-6" data-dcnode-id="2044" data-zone-c ckthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="2045"></phoenix-ad></div></aside><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">A polymath, Maimonides was also known as a philosopher, historian, scientist and physician, in both Jewish and Islamic kingdoms or domains. Nevertheless, when the Muslims conquered Córdoba, located in the southern part of what is now Spain, the Muslim authorities gave all Jews three choices: conversion, death or exile. Born in Córdoba and still residing there, Maimonides chose exile and eventually settled in Egypt, where he became a renowned authority of the Jewish community.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-4" data-dcnode-id="2038"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-4" data-dcnode-id="2039" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot; h&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;7&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-8882827ece464e2b89aba244fbfbe087&quot;,&quot;adUnitPath&quot;:&quot;/88059007/owlcation.com/humanities/history&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1967"></phoenix-ad></div></aside><p data-dcnode-id="1960"><span data-dcnode-id="1964" instrument_node="">Born in 1182 in Assisi, Italy, part of the Holy Roman Empire, St. Francis was a Catholic friar and preacher who eventually became one of the most important religious figures in the Middle Ages, if not throughout all of history. Canonized by Pope Gregory IX in 1228, St. Francis became the patron saint of Italy, as well as that of animals and the natural world. In 1209, he founded the </span><a data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Order_of_Friars_Minor" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1963" instrument_node="">Order of Friars Minor</span></a><span data-dcnode-id="1961" instrument_node="">, aka the Franciscan Order; he also founded the Order of Saint Claire and the Third Order of Saint Francis.</span></p><p data-dcnode-id="1952"><span data-dcnode-id="1959" instrument_node="">St. Francis is also known for his veneration and celebration of the </span><a data-dcnode-id="1957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eucharist" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1958" instrument_node="">Eucharist</span></a><span data-dcnode-id="1956" instrument_node="">; he also arranged the first live nativity scene at Christmas in 1223. Perhaps similar in stature to St. Paul, who, according to the Christian tradition, was the first to manifest the wounds of Christ, aka the stigmata, St. Francis did the same while in a state of transcendental rapture, attended by the </span><a data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seraph" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1955" instrument_node="">Seraphic</span></a><span data-dcnode-id="1953" instrument_node=""> angels, in 1224.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-5" data-dcnode-id="1949"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-5" data-dcnode-id="1950" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;  here?” Understandably, as a teenager he became known as the eternal question mark. Soon Holmes began studying the works of Ralph Waldo Emerson, Mary Baker Eddy, Christian D. Larson, Ralph Waldo Trine and Phineas Quimby. In 1914, Holmes moved to the Los Angeles area and became a minister of the Divine Science Church. By the 1920s, he was speaking to large audiences in Los Angeles. And, in 1954, Holmes established the Church of Religious Science.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-6" data-dcnode-id="1860"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-6" data-dcnode-id="1861" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;: </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="1708"><p class="tml-image--caption" data-dcnode-id="1709" itemprop="caption"><span data-dcnode-id="1710" instrument_node="">Mural of Guru Nanak</span></p></figcaption></figure></div><p data-dcnode-id="1698"><span data-dcnode-id="1705" instrument_node="">Born in 1469 and living for 70 years, Guru Nanak or Baba Nanak (father Nanak) was the founder of </span><a data-dcnode-id="1703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sikhism" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1704" instrument_node="">Sikhism</span></a><span data-dcnode-id="1702" instrument_node="">, a monotheistic religion springing from the Punjab region of the Indian subcontinent; it is one of the world’s largest organized religions. Guru Nanak is recognized as the first of ten Sikh Gurus. The sacred book of Sikhism is </span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guru_Granth_Sahib" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1701" instrument_node="">the Guru Granth Sahib</span></a><span data-dcnode-id="1699" instrument_node="">, a compilation of 974 poetic hymns, written by Guru Nanak and other subsequent Sikh Gurus.</span></p><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">According to Sikh tradition, Guru Nanak seemed blessed by the divine from an early age, astonishing his teachers. At seven, he was able to explain the symbolism behind the first letter of the alphabet, aleph, which represents the number one and denotes unity with God. In the early decades of the sixteenth century, Guru Nanak took long journeys through the Hindu and Muslim pilgrimage locations in what is now India and Pakistan; he may also have visited cities in the Middle East, including Baghdad, Jerusalem and Mecca, and many legends and hagiographical accounts stem from these western locations. In the final years of Guru Nanak’s life, he lived in Kartarpur, a town in the Punjab region of Pakistan.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dcnode-id="1693"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dcnode-id="1694" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&q e-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-e63981cbb56a4f6eb53793602c556310&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-13&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;13&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;13&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-e63981cbb56a4f6eb53793602c556310&quot;,&quot;adUnitPath&quot;:&quot;/88059007/owlcation.com/humanities/history&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1611"></phoenix-ad></div></aside><p data-dcnode-id="1604"><span data-dcnode-id="1608" instrument_node="">At the age of 31, Hakuin returned to Shoin-ji, the temple where he had been ordained as a monk, and was soon elevated to head priest or first monk, a position he held for the next 50 years. But, in spite of having many awakening experiences, Hakuin did not feel free in his ordinary life. Then, after re-reading the Lotus sutra which, as a young man, he had dismissed as useless, he realized he must help all sentient beings attain salvation—and, he realized, a good way of doing that was to teach them Zen! Soon hundreds of monks from all over Japan came to Shoin-ji and studied Hakuin’s teachings, which adhered to the </span><a data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rinzai_school" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1607" instrument_node="">Rinzai school</span></a><span data-dcnode-id="1605" instrument_node="">, one of three sects of Japanese Zen Buddhism.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-9" data-dcnode-id="1601"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-9" data-dcnode-id="1602" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&q </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="1533"><p class="tml-image--caption" data-dcnode-id="1534" itemprop="caption"><span data-dcnode-id="1535" instrument_node="">Photo of Mary Baker Eddy</span></p></figcaption></figure></div><p data-dcnode-id="1526"><span data-dcnode-id="1530" instrument_node="">Born in 1821, Mary Baker Eddy founded Christian Science in New England in the late 1800s. In 1875, Eddy wrote the textbook of Christian Science, entitled </span><em data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Science and Health With Key to the Scriptures, </span></em><span data-dcnode-id="1527" instrument_node="">which has undergone numerous revisions over the decades. In some ways, Eddy’s Christian Science emphasizes the use of what has been called "faith healing." Her religious denomination was also often associated with Spiritualism, another movement popular in those days, though Eddy claimed she was never a believer. Be that as it may, in Eddy’s early days in the 1860s, she was known as a trance medium while living in Boston, Massachusetts. She sometimes gave séances for money and also practiced automatic writing. Nevertheless, once Eddy introduced Christian Science, she denounced spiritualism until her death.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-10" data-dcnode-id="1523"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-10" data-dcnode-id="1524" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot; uot;:&quot;in_content-17&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;17&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;17&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-f21feadfa8834d428b2f3d585bc1bdb1&quot;,&quot;adUnitPath&quot;:&quot;/88059007/owlcation.com/humanities/history&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1370"></phoenix-ad></div></aside><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Most scholars believe Siddhartha Gautama was a man who eventually became the Buddha — a name which means “the enlightened one.” Born in Nepal to a royal Hindu family, a man named Siddhartha Gautama lived a life full of luxury and sensual pleasures. Then, at about the age of 30, Siddhartha discovered poverty and sickness in the world and determined that in order to relieve such suffering he would became a mendicant.</span></p><p data-dcnode-id="1361"><span data-dcnode-id="1365" instrument_node="">Thereafter, Siddhartha entered a life of asceticism and meditation, though he eventually learned that deprivation and mortification of the flesh would not lead to a state of awakening. So he meditated under the Bodhi Tree for 49 days until he reached a heightened state of awareness known as "nirvana." Soon after, he formulated the </span><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Four_Noble_Truths" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1364" instrument_node="">Four Noble Truths</span></a><span data-dcnode-id="1362" instrument_node=""> — the vary tenets of Buddhism. For the remaining 45 years of his life, the Buddha traveled around northeastern India teaching the principles of Buddhism until his death at the age of 80.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-12" data-dcnode-id="1358"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-12" data-dcnode-id="1359" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;i </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="1292"><p class="tml-image--caption" data-dcnode-id="1293" itemprop="caption"><span data-dcnode-id="1294" instrument_node="">Glass painting of Jesus of Nazareth</span></p></figcaption></figure></div><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">In the Western tradition, much has been written about the life of Jesus of Nazareth, a.k.a. Jesus Christ. Though little is known about his early life, Jesus, who some scholars believe may have studied Buddhism for a time, started his ministry around the age of 30 and was eventually crucified by the Romans. After his death, he ascended to Heaven, but not before he showed himself to the Twelve Apostles who later continued to spread the Word as is written in the Four Canonical Gospels of Mathew, Mark, Luke, and John. As the biblical account goes, Jesus will one day return to earth where he will rule for a thousand years.</span></p><p data-dcnode-id="1283"><span data-dcnode-id="1287" instrument_node="">But since the eighteenth century, if not before that, people have doubted the existence of Jesus of Nazareth, claiming there is little historical or archaeological evidence for his existence. They, thereby, assert a </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Christ_myth_theory" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1286" instrument_node="">Christ myth theory</span></a><span data-dcnode-id="1284" instrument_node="">. Nevertheless, most historians of the biblical period believe that Jesus actually existed because Roman accounts of his life are extant. But exactly what Jesus did during his life will probably remain more of an aspect of faith than one of fact. At any rate, the story of Jesus may be one of the greatest ever told!</span></p><aside class="m-in-conte </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="1214"><p class="tml-image--caption" data-dcnode-id="1215" itemprop="caption"><span data-dcnode-id="1216" instrument_node="">Painting of Joseph Smith Jr. with his purported golden plates</span></p></figcaption></figure></div><p data-dcnode-id="1207"><span data-dcnode-id="1211" instrument_node="">Living during the Second Great Awakening, Joseph Smith Jr., reportedly received revelations from God, Jesus, and an angel named Moroni when he was a teenager. The angel told Smith that a book of golden plates was buried on a hill near his parent’s property. As the story goes, these plates were inscribed with the words of a modern “reformed” version of Egyptian. Smith used a seer stone (a treasure hunting device) to translate the ancient words. This translation supposedly chronicled the lives of biblical people (perhaps a Lost Tribe of Israel) who had lived in the New World many centuries before. This story became the basis for the </span><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Book_of_Mormon" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1210" instrument_node="">Book of Mormon</span></a><span data-dcnode-id="1208" instrument_node="">, published in 1830. Not surprisingly, Smith, purporting to be a latter-day prophet of God, had many detractors and was murdered by a violent mob in 1844.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-20" data-dcnode-id="1204"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-20" data-dcnode-id="1205" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adRel </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="1052"><p class="tml-image--caption" data-dcnode-id="1053" itemprop="caption"><span data-dcnode-id="1054" instrument_node="">Photo of Madam Blavatsky</span></p></figcaption></figure></div><p data-dcnode-id="1039"><span data-dcnode-id="1049" instrument_node="">A world traveler to far-flung locales such as India, Tibet, Cyprus, and Greece, Russian-born mystic Helena Blavatsky founded the </span><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Theosophical_Society" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1048" instrument_node="">Theosophical Society</span></a><span data-dcnode-id="1046" instrument_node=""> in New York City in 1875. Based on esoteric ideas and principles going back many centuries, the Theosophical Society promotes the eclectic study of comparative religion and philosophy and science, hoping to reconcile such knowledge with the metaphysical possibilities of humankind and doing so without any political or religious connections. The Society’s motto is: “There is no religion higher than truth.” Based on this weighty interpretation, Blavatsky wrote her primary work, the </span><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Secret_Doctrine" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1045" instrument_node="">Secret Doctrine</span></a><span data-dcnode-id="1043" instrument_node="">, published in two volumes in 1888. She also edited the magazine, </span><em data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">The Theosophist, </span></em><span data-dcnode-id="1040" instrument_node="">and wrote many other highly influential books regarding esoteric and occult concepts.</span></p a-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">After Pope Francis’ election to the papacy in 2013, he told an audience he’s been inspired by Saint Francis of Assisi "the man who gives us this spirit of peace, the poor man,” he said, and then added, “how I would like a poor Church, and for the poor." Then the Pope continued," he (St. Francis) brought to Christianity an idea of poverty against the luxury, pride, vanity of the civil and ecclesiastical powers of the time. He changed history."</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-18" data-dcnode-id="872"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-18" data-dcnode-id="873" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quo l proof? </span></p><p data-dcnode-id="851"><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Answer:</span></strong><span data-dcnode-id="852" instrument_node=""> There is no proof that any religious leader died and rose again.</span></p><p data-dcnode-id="847"><strong data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Question:</span></strong><span data-dcnode-id="848" instrument_node=""> Is Buddha male or female?</span></p><p data-dcnode-id="843"><strong data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Answer:</span></strong><span data-dcnode-id="844" instrument_node=""> As far as I know, he was a man.</span></p><p data-dcnode-id="839"><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Question:</span></strong><span data-dcnode-id="840" instrument_node=""> Who was the wise and holy leader of India?</span></p><p data-dcnode-id="835"><strong data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Answer:</span></strong><span data-dcnode-id="836" instrument_node=""> Mahatma Gandhi.</span></p><p data-dcnode-id="831"><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Question:</span></strong><span data-dcnode-id="832" instrument_node=""> Which of them has really lived on earth with proof?</span></p><p data-dcnode-id="827"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Answer:</span></strong><span data-dcnode-id="828" instrument_node=""> Krishna may not have been an actual person, and some people think Jesus of Nazareth was more myth than a real human.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-19" data-dcnode-id="824"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-19" data-dcnode-id="825" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;: quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="820"></phoenix-ad></div></aside><p data-dcnode-id="814"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Question:</span></strong><span data-dcnode-id="815" instrument_node=""> Was Zoroaster also a religious leader?</span></p><p data-dcnode-id="810"><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Answer:</span></strong><span data-dcnode-id="811" instrument_node=""> Zoroaster lived about the same time as the Buddha and Confucius, circa 500 B.C. He founded Zoroastrianism, the dominant religion of Ancient Persia.</span></p><p data-dcnode-id="806"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Question:</span></strong><span data-dcnode-id="807" instrument_node=""> What religion is the author?</span></p><p data-dcnode-id="802"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Answer:</span></strong><span data-dcnode-id="803" instrument_node=""> The author is agnostic.</span></p><p data-dcnode-id="798"><strong data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Question:</span></strong><span data-dcnode-id="799" instrument_node=""> Are there any religious leaders who died and rose again, with historical proof?</span></p><p data-dcnode-id="794"><strong data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Answer:</span></strong><span data-dcnode-id="795" instrument_node=""> There's no historical proof that any of these religious leaders died and rose again.</span></p><p data-dcnode-id="791"><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">© 2013 Kelley Marks</span></strong></p><h2 class="hubpages-comments" data-dcnode-id="789" id="comments"><span data-dcnode-id="790" instrument_node="">Comments</span></h2><p data-dcnode-id="785"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Kelley Marks (author)</span></strong><span data-dcnode-id="786" instrument_node=""> from Sacramento, California on June 15, 2020:</span></p><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Thanks for the comment, Tim Truzy. I've enjoyed getting feedback from people on this subject. Later!...</span></p><p data-dcnode-id="779"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Tim Truzy</span></strong><span data-dcnode-id="780" instrument_node=""> from U.S.A. on June 13, 2020:</span></p><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">I liked your list. These leaders are all important and it would have taken a book to write about so many others. Thanks for a fine read.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-20" data-dcnode-id="774"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-20" data-dcnode-id="775" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{  from Sacramento, California on December 29, 2019:</span></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">If I added a Sikh leader to this list, who should it be? Please advise!...</span></p><p data-dcnode-id="750"><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Sarim Ahmad</span></strong><span data-dcnode-id="751" instrument_node=""> on October 07, 2018:</span></p><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Prophet Muhammad's personality can't be explained in words it's beyond any humans thinking capacity. Peace be upon him.</span></p><p data-dcnode-id="744"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Hari Perera</span></strong><span data-dcnode-id="745" instrument_node=""> on August 21, 2017:</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">On Buddha</span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">=========</span></p><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Was he man or God?</span></p><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">He is a man not a God. This is very clear in all buddhist scriptures and none claimed he is a God.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-21" data-dcnode-id="733"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-21" data-dcnode-id="734" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-a eel of Karma because there is no such thing. (It is not actually called wheel of Karma , we have something called wheel of Dhamma ).</span></p><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Was he born of a virgin?</span></p><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">No he was not born out of a virgin , just like every other human being he has a father and a mother. No script claimed his mother was a virgin.</span></p><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Could he live forever?</span></p><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Actually the last question  once he was asked  will he be there after his death . He said No. Then he was asked will he not be there after the death. He said No.  If you learn little bit on buddhist and jain logic , you will find A and not A can be true at the same time.</span></p><p data-dcnode-id="711"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Abhinav</span></strong><span data-dcnode-id="712" instrument_node=""> on March 19, 2014:</span></p><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">What makes that Idiot Prophet Muhammad on the Top?</span></p><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Muhammad killed Peoples, raped a 6 year old girl. He is the least.</span></p><p data-dcnode-id="703"><strong data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Kelley Marks (author)</span></strong><span data-dcnode-id="704" instrument_node=""> from Sacramento, California on October 31, 2013:</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-22" data-dcnode-id="700"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-22" data-dcnode-id="701" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quo
