</span><p class="paragraph" data-dcnode-id="1589"><span data-dcnode-id="1594" instrument_node="">First, in agreement with Revelation 11: 15, this passage is, at the time of writing, </span><em data-dcnode-id="1591"><strong data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">in the past tense</span></strong></em><span data-dcnode-id="1590" instrument_node="">. “…YOU have not approached…” (verse 18); “…YOU have approached…” (verse 22), indicating an event or occurrence having taken place already. What is that event or occurrence? Second, this past event includes mention of the antitype of the physical Jerusalem. According to the Table of Books of the Bible in the New World Translation (1984 revision), p. 1547, the book of Hebrews was completed c. 61 CE</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1582"><span data-dcnode-id="1587" instrument_node="">The conclusion we </span><em data-dcnode-id="1584"><strong data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">must</span></strong></em><span data-dcnode-id="1583" instrument_node=""> come to, according to the Watchtower Society’s own Bible, is that the ‘heavenly Jerusalem’ was already in place prior to 61 CE, which means that it cannot have been set up in 1914. In order to check this interpretation (again, Scripture with Scripture), we need only to turn to Galatians 4, culminating with the following words of verses 24 to 26 (NWT):</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p class="scripture" data-dcnode-id="1578"><em data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">“These thing stand as a symbolic drama; for these [women] mean two covenants, the one from Mount Sinai, which brings forth children for slavery, and which is Hagar. Now this Hagar means Sinai, a mountain in Arabia, and she corresponds with Jerusalem today, for she is in slavery with her children. But the Jerusalem above is free, and she is our mother.”</span></em></p><span data-dcnode-id="1577" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1568"><span class="paragraph" data-dcnode-id="1571"><span data-dcnode-id="1576" instrument_node="">We have to conclude, from this, that the Apostle Paul taught, and was himself aware of, the antitype of the physical Jerusalem </span><em data-dcnode-id="1573"><strong data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">in his own day</span></strong></em><span data-dcnode-id="1572" instrument_node="">. This is inescapable (according to the above table, Galatians was completed c. 50 – 52 CE). If Paul knew, and was aware of it in his own experience (implied by the phrase “…and she is our mother.”), why not the Apostle John when he wrote of: </span></span><span class="paragraph" data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">“…the holy city, New Jerusalem, coming down out of heaven from God and prepared as a bride adorned for her husband…” (Revelation 21: 2, NWT)?</span></span></p><span data-dcnode-id="1567" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1564"><span class="paragraph" data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Could not John also be using words, which would be well known to his readers as something that is in place already? What a comfort that would be to those going through persecutions, and had perhaps lost loved ones. But how could a concept, which was to be fulfilled approximately 1,818 years later (Revelation having been completed c. 96 CE) encourage John’s readers?</span></span></p><span data-dcnode-id="1563" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">The calculation which the Watchtower Society use to arrive at 1914, based on 607 as the destruction of Jerusalem, is historically and Biblically unsound. The years 587 and 586 have been given repeatedly, and not “…dependent on the writings of men who lived centuries after it happened…” but on evidence from no less a source than the Babylonian Chronicle.</span></p><span data-dcnode-id="1560" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Also relevant is the fact that Nebuchadrezzar became king in 605 BCE – two years after the Watchtower Society have repeatedly claimed that he sacked Jerusalem. If 607 BCE was not the date of the destruction of (the physical) Jerusalem, then neither can 1914 CE have the spiritual importance attributed to it</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1551"><span data-dcnode-id="1556" instrument_node="">The events of </span><em data-dcnode-id="1553"><strong data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">spiritual </span></strong></em><span data-dcnode-id="1552" instrument_node="">significance, claimed to have taken place in 1914 CE, had already taken place in the first century, according to the Bible. If the heavenly Jerusalem was known and in place in c. 50 to 52, 61 and 96 CE, then Jesus did not return invisibly in 1914 to set it up! Thus, doctrine after doctrine of the Watchtower Society tumbles like a house of cards when the foundation has been taken away. They cannot stand.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">The main doctrines to fall are that the Watchtower Society’s Governing Body and its past Presidents cannot be the ‘Faithful and Wise servant’, the idea of 144,000 spiritual ‘Israelites’ is bolted into the 1914 teaching, and the refusal to “…honour the Son just as they honour the Father…” (John 5: 23 NWT)</span></p><span data-dcnode-id="1547" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">There are many issues not yet considered here. For example, other interpretations of Jeremiah’s 70 years and how the Watchtower Society account for the missing time (12 months of 30 days each, when some of these became 28 and 31 days long respectively). But the main issues have been given due attention.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><h4 class="subHeader" data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">The Real Issue!</span></h4><span data-dcnode-id="1541" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">In the crucial teachings about 1914 and its spiritual significance, the Watchtower Society is at variance with known history and with the Bible itself.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1533"><span data-dcnode-id="1537" instrument_node="">True Christian religion is rooted in historical fact, as The Watchtower, June 15, 2003 testified in its article</span><em data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node=""> ‘Jesus Christ – Evidence That He Walked The Earth.’</span></em><span data-dcnode-id="1534" instrument_node=""> For a religion that claims to be made up of the only true Christians today, to ignore history in order to perpetuate its own particular teaching, whilst claiming to be in accordance with history is a very serious matter.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">As serious as this is, it is not the most serious. This is a time to take stock:</span></p><span data-dcnode-id="1529" instrument_node="">
</span><p class="quote" data-dcnode-id="1525"><em data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">“Since we do not want our worship to be in vain, it is important for each one of us to examine his religion. We need to examine, not only what we personally believe, but also what is taught by any religious organization with which we may be associated. Are its teachings in full harmony with God’s Word, or are they based on the traditions of men? If we are lovers of the truth, there is nothing to fear from such an examination…If a religion really accepts the Bible as God’s Word, it is not going to use certain parts of it and reject other parts.”</span></em><span data-dcnode-id="1526" instrument_node=""> – The Truth that Leads to Eternal Life, 1968, p.13</span></p><span data-dcnode-id="1524" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">This is the issue that needs to be addressed now!</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">The question to answer, the decision to make, is, are you going to believe the Bible – The Word of God, or The Watchtower Society?</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">It is clear from this study that it has to be one or the other. Both cannot be true, as their teachings are plainly opposite.</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Is the teaching on 1914 in “full harmony” with the Bible? If so, why do the very Scripture texts they quote, in their own translation, contradict what they are saying?</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Are YOU prepared to examine the Watchtower Society’s teachings the way they suggest others should? Listen to the words of Jesus Christ:</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Jesus, when questioned by Pilate, said:</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p class="scripture" data-dcnode-id="1502"><em data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">“My kingdom is no part of this world. If my kingdom were part of this world, my attendants would have fought that I should not be delivered up to the Jews. But as it is, my kingdom is not of this world.”</span></em><span data-dcnode-id="1503" instrument_node=""> (John 18: 36 NWT)</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1495"><span data-dcnode-id="1500" instrument_node="">Notice, in his words, ‘my kingdom </span><em data-dcnode-id="1497"><strong data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">is</span></strong></em><span data-dcnode-id="1496" instrument_node="">‘, not ‘will be’! Jesus also said:</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p class="scripture" data-dcnode-id="1490"><em data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">“Then if anyone says to YOU, ‘Look! Here is the Christ’ or ‘There!’ do not believe it…Look! I have forewarned YOU, if people say to YOU, ‘Look! He is in the wilderness,’ do not go out; ‘Look! He is in the inner chambers,’ do not believe it.”</span></em><span data-dcnode-id="1491" instrument_node=""> (Matthew 24: 23, 25, 26 NWT)</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Now that you know that there is neither a historical or Biblical (spiritual) reason for upholding 1914 CE as the year of Christ’s return, Jesus’ words about not believing in an invisible return are appropriate. Check the following also (all RSV):</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1481"><span class="scripture" data-dcnode-id="1482"><span data-dcnode-id="1485" instrument_node="">Matthew 24: 27: </span><em data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">“For as the lightning comes from the east and shines as far as the west, so will be the coming of the Son of Man”</span></em></span></p><span data-dcnode-id="1480" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1475"><span class="scripture" data-dcnode-id="1476"><span data-dcnode-id="1479" instrument_node="">Acts 1: 11:</span><em data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node=""> “…and said ‘Men of Galilee, why do you stand looking into heaven? This Jesus, who was taken up from you into heaven, will come in the same way as you saw him go into heaven.”</span></em></span></p><span data-dcnode-id="1474" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1469"><span class="scripture" data-dcnode-id="1470"><span data-dcnode-id="1473" instrument_node="">Revelation 1: 5 -7: </span><em data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">“To him who loves us and has freed us from our sins by his blood and made us a kingdom, priests to his God and Father, to him be glory and dominion for ever and ever. Amen. Behold, he is coming with the clouds, and every eye shall see him, every one who pierced him; and all the tribes of the earth will wail on account of him. Even so, Amen.”</span></em></span></p><span data-dcnode-id="1468" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1463"><span data-dcnode-id="1467" instrument_node="">It is only by knowing the truth, and letting that truth set us free that we can ever be free of traditions taught by men. The Bible alone is God’s Word. And God’s true Congregation (</span><em data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">ekklesia</span></em><span data-dcnode-id="1464" instrument_node="">) is waiting to welcome you!</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1458"><strong data-dcnode-id="1459"><span class="subHeader" data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Appendix 1</span></span></strong></p><span data-dcnode-id="1457" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Quotes about 1914 from Watchtower Society publications produced prior to that year.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1451"><span class="quote" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">“The date of the close of that battle (Armageddon) is definitely marked in scripture as October, 1914. It is already in progress, its beginning dating from October 1874.” – Zion’s Watch Tower, January 15, 1892.</span></span></p><span data-dcnode-id="1450" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1447"><span class="quote" data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">“In view of this strong Bible evidence concerning the times of the Gentiles, we consider it an established truth that the final end of the kingdoms of this world, and the establishment of the Kingdom of God, will be accomplished at the end of A.D. 1914.” – Studies in the Scriptures, vol. II, “The Time is at Hand,” 1908 edition, p. 99.</span></span></p><span data-dcnode-id="1446" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1443"><span class="quote" data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">“In this chapter we present the Bible evidence proving that the full end of the times of the Gentiles, i.e., the full end of their lease of dominion, will be reached in AD 1914; and that date will be the farthest limit of the rule of imperfect men.” – Studies in the Scriptures, Vol. II, “The Time is at Hand,” 1908 edition, pp. 76-77.</span></span></p><span data-dcnode-id="1442" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1439"><span class="quote" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">“…1914…at that date the Kingdom of God, for which our Lord taught us to pray, saying, ‘Thy Kingdom come,’ will obtain full, universal control, and that it will then be ‘set up’ or firmly established, in the earth…It will prove that some time before the end of AD 1914 the last member of the divinely recognized Church of Christ, the ‘royal Priesthood,’ ‘the body of Christ,’ will be glorified with the Head…” – Studies in the Scriptures, Vol. II, “The Time is at Hand,” 1908 edition, p. 77. </span></span></p><span data-dcnode-id="1438" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1435"><span class="quote" data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">“…the ‘battle of the great day of God Almighty’ (Rev. 16: 14) which will end in AD 1914 with the complete overthrow of the earth’s present rulership, has already commenced.” – Studies in the Scriptures, Vol. II, “The Time is at Hand,” 1908 edition, p.101.</span></span></p><span data-dcnode-id="1434" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1431"><span class="quote" data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">“We see no reason for changing the figures – nor could we change them if we would. They are, we believe, God’s dates, not ours. But bear in mind that the end of 1914 is not the date for the beginning, but for the end of the time of trouble.” – Zion’s Watch Tower, 7/15/1894, reprint p. 1677.</span></span></p><span data-dcnode-id="1430" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1427"><span class="quote" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">“As nearly as we were able to reckon, we did not positively say that this would be the year,” – Zion’s Watch Tower, Nov. 1 1914, p. 325.</span></span></p><span data-dcnode-id="1426" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1421"><span data-dcnode-id="1425" instrument_node="">And, as a matter of comparison,</span><em data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node=""> Studies in the Scriptures, Vol. VII, The Finished Mystery, </span></em><span data-dcnode-id="1422" instrument_node="">pages 484 &amp; 485 records the following:</span></p><span data-dcnode-id="1420" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1417"><span class="quote" data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">“Until 1878 the nominal church had been in a sense God’s sanctuary or temple; but he was from then on, culminating in 1918, to remove it with a stroke or plague…Also, in the year 1918, when God destroys the churches wholesale and the church members by the millions, it shall be that any escape shall come to the works of Pastor Russell to learn the meaning of the downfall of ‘Christianity’.”</span></span></p><span data-dcnode-id="1416" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1411"><span data-dcnode-id="1415" instrument_node="">Also, from </span><em data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Millions Now Living Will Never Die</span></em><span data-dcnode-id="1412" instrument_node="">, p. 97, J. F. Rutherford, second President of the Watchtower Society, wrote:</span></p><span data-dcnode-id="1410" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1407"><span class="quote" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">“Based on the argument heretofore set forth, that the old order of things, the old world, is ending and is therefore passing away, and that the new order is coming in, and that 1925 shall mark the resurrection of the faithful worthies of old and the beginning of reconstruction, it is reasonable to conclude that millions of people now on the earth will still be on the earth in 1925. Then, based on the promises set forth in the divine Word, we must reach the indisputable conclusion that millions now living will never die.”</span></span></p><span data-dcnode-id="1406" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1403"><span class="quote" data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">“The date 1925 is even more distinctly indicated by the Scriptures than 1914.” – The Watchtower, Sept. 1, 1922. p. 2.</span></span></p><span data-dcnode-id="1402" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1399"><span class="quote" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">“Our thought is that 1925 is definitely settled by the Scriptures.” – The Watchtower, Apr. 1, 1923. p. 106.</span></span></p><span data-dcnode-id="1398" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1395"><span class="quote" data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">“Some anticipated that the work would end in 1925, but the Lord did not state so. The difficulty was, the friends inflated their imaginations beyond reason, and that when their imaginations burst asunder, they were inclined to throw away everything.” – The Watchtower, Oct. 15, 1925. p. 232.</span></span></p><span data-dcnode-id="1394" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1389"><span data-dcnode-id="1393" instrument_node="">Rutherford, in </span><em data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Vindication</span></em><span data-dcnode-id="1390" instrument_node="">, Vol.1, page 338, admitted:</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p class="quote" data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">“There was a measure of disappointment on the part of Jehovah’s faithful ones on earth concerning the years 1914, 1918, 1925, which disappointment lasted for a time. Later the faithful learned that these dates were definitely fixed in the Scriptures; and they also learned to quit fixing dates for the future and predicting what would come to pass in a certain date…”</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">The Awake! magazine, Aug. 10 1968. p. 23:</span></p><span data-dcnode-id="1382" instrument_node="">
</span><p class="quote" data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">“True, there have been those in times past who predicted an end to the world, even announcing a specific date…The end did not come. They were guilty of false prophesying. Why? What was missing? Missing was the full measure of evidence required in fulfilment of Bible prophecy… But what about today: Today we have evidence (Evidence for 1975, that is!!)required, all of it. And it is overwhelming!”</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">What we clearly see in the above is that whilst 1914 has been retained as a key date 1918, 1925 and 1975 are not mentioned by the Watchtower Bible and Tract Society. Yet the disappointment was about 1914 as well. And the Watchtower Society has proclaimed itself as guilty of false prophecy.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">The Watchtower, May 15, 1976:</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p class="quote" data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">“It is a serious matter to represent God and Christ in one way, then find out that our understanding of the major teachings and fundamental doctrines of the Scriptures was in error, and then after that, go back to the very doctrines that, by years of study, we had thoroughly determined to be in error. Christians cannot be vacillating – ‘wishy-washy’ – about such fundamental teachings. What confidence can one put in the sincerity or judgment of such persons?”</span></p><span data-dcnode-id="1370" instrument_node="">
</span></div><span data-dcnode-id="1368" instrument_node="">
</span><div class="clear" data-dcnode-id="1367"></div><span data-dcnode-id="1366" instrument_node="">
