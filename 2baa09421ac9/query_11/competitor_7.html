</span><a class="twitter" data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3D1914%2B%25E2%2580%2593%2BIs%2BIt%2BMarked%2BIn%2BScripture%253F%26url%3Dhttps%3A//reachouttrust.org/1914-marked-in-scripture/" onclick="window.open(this.href, 'twitter-share', 'width=550,height=235');return false;" rel="nofollow noopener"><i class="fa fa-twitter" data-dcnode-id="2303"></i></a><span data-dcnode-id="2301" instrument_node="">
</span><a class="email" data-dcnode-id="2299" href="mailto:?subject=1914+%E2%80%93+Is+It+Marked+In+Scripture%3F&amp;body=https://reachouttrust.org/1914-marked-in-scripture/" rel="nofollow noopener" target="_blank"><i class="fa fa-envelope" data-dcnode-id="2300"></i></a><span data-dcnode-id="2298" instrument_node="">
</span></div><span data-dcnode-id="2296" instrument_node=""> </span></div></div><span data-dcnode-id="2293" instrument_node="">
</span><div class="text" data-dcnode-id="1369"><span data-dcnode-id="2292" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2288"><strong data-dcnode-id="2289"><span class="subHeader" data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Author: Mike Troke</span></span></strong></p><span data-dcnode-id="2287" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2278"><img alt="Image result for what does god require of us jw" class="alignright" data-dcnode-id="2286" data-lazy="true" data-src="http://www.newworldpublishers.org/projec62.jpg" height="206" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reachouttrust.org/wp-content/themes/reco/assets/images/transparent.gif&amp;raw" width="161"><span data-dcnode-id="2285" instrument_node="">Jehovah’s Witnesses insist that the key date of 1914 has a solid basis in Scripture. Around the end of December 2002 Jehovah’s Witnesses handed me a little booklet called </span><em data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">‘What Does God Require of Us?’</span></em><span data-dcnode-id="2282" instrument_node=""> </span><em data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">(WB&amp;TS, 1996)</span></em><span data-dcnode-id="2279" instrument_node=""> Inside the front cover is a paragraph designed to aid the reader in the use of the booklet. This includes the following:</span></p><span data-dcnode-id="2277" instrument_node="">
</span><p class="quote" data-dcnode-id="2266"><span data-dcnode-id="2276" instrument_node="">“This brochure is designed as a </span><span data-dcnode-id="2274" style="color: #ff0000;"><span data-dcnode-id="2275" instrument_node="">Bible</span></span><span data-dcnode-id="2273" instrument_node=""> study course…At the beginning of each lesson there are questions…Read the questions through first…Then read each paragraph, and look up the Scriptures in your </span><span data-dcnode-id="2271" style="color: #ff0000;"><span data-dcnode-id="2272" instrument_node="">Bible</span></span><span data-dcnode-id="2270" instrument_node="">…When you have finished a lesson, go back to the questions and try to recall the </span><span data-dcnode-id="2268" style="color: #ff0000;"><span data-dcnode-id="2269" instrument_node="">Bible’s</span></span><span data-dcnode-id="2267" instrument_node=""> answer to each question.” (Emphasis mine.)</span></p><span data-dcnode-id="2265" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2260"><span data-dcnode-id="2264" instrument_node="">On page 12, the lesson is</span><em data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node=""> ‘What is the Kingdom of God?’</span></em><span data-dcnode-id="2261" instrument_node=""> and the questions that need Biblical answers are;</span></p><span data-dcnode-id="2259" instrument_node="">
</span><ul data-dcnode-id="2242"><span data-dcnode-id="2258" instrument_node="">
</span><li data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Where is the Kingdom of God located?</span></li><span data-dcnode-id="2255" instrument_node="">
</span><li data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">&nbsp;Who is its King?</span></li><span data-dcnode-id="2252" instrument_node="">
</span><li data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">&nbsp;Do others share in ruling with the King? If so, how many?</span></li><span data-dcnode-id="2249" instrument_node="">
</span><li data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">&nbsp;What shows that we are living in the last days?</span></li><span data-dcnode-id="2246" instrument_node="">
</span><li data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">&nbsp;What will God’s Kingdom do for mankind in the future?</span></li><span data-dcnode-id="2243" instrument_node="">
</span></ul><span data-dcnode-id="2241" instrument_node="">
</span><h4 data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">1914 A Turning Point?</span></h4><span data-dcnode-id="2238" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">All are good questions and below I quote extensively from the text on pages 12 and 13, to show the material that the Biblical answers are to be drawn from.</span></p><span data-dcnode-id="2235" instrument_node="">
</span><p class="quote" data-dcnode-id="2232"><em data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">“God promised that Jesus would become the King of His Kingdom. (Luke 1: 30-33) When Jesus was on earth, he proved that he would be a kind, just and perfect Ruler. When he returned to heaven, he was not enthroned as King of God’s Kingdom right away. (Hebrews 10: 12, 13) In 1914, Jehovah gave Jesus the authority He had promised him. Since then, Jesus has ruled in heaven as Jehovah’s appointed King – Daniel 7: 13, 14… As soon as Jesus became King, he threw Satan and his wicked angels out of heaven and down to the locality of earth. That is why things have become so bad here on earth since 1914. (Revelation 12: 9, 12) Wars, famines, pestilences, increasing lawlessness – all these are part of a ‘sign’ indicating that Jesus is ruling and that this system is in its last days. – Matthew 24: 3, 7, 8, 12; Luke 21: 10, 11; 2 Timothy 3: 1 – 5.”</span></em></p><span data-dcnode-id="2231" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Twice in the above passage, the year 1914 is mentioned as the time when Jesus became the King of God’s Kingdom, although none of the Bible references cited support this information.</span></p><span data-dcnode-id="2228" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2223"><span data-dcnode-id="2227" instrument_node="">Similarly, in a leaflet entitled</span><em data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node=""> ‘Is Time Running Out For Mankind?’</span></em><span data-dcnode-id="2224" instrument_node="">, the following statements are made:</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2217"><span class="quote" data-dcnode-id="2218"><em data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">“…how do we know that we live in the generation of which Jesus spoke? Because people now living have seen the foretold events take place, all of them, and on a global scale. Furthermore, Bible prophecy pinpoints the year 1914 as one of great significance. That is why, over thirty years before that date, Jehovah’s witnesses, careful students of the Bible, widely announced this… What does all this mean? That 1914 was the start of what the Bible calls ‘the last days’… The generation seeing the start of ‘the sign’ in 1914 is now far along in years. Time is obviously running out.”</span></em><span data-dcnode-id="2219" instrument_node=""> </span></span></p><span data-dcnode-id="2216" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">What did the early Jehovah’s Witnesses “widely announce” about 1914, “over thirty years before that date”, from the publications of the time. A selection of relevant quotes appear in Appendix 1.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2205"><span data-dcnode-id="2212" instrument_node="">The back cover of </span><em data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">The Watchtower 1 Jan 1989,</span></em><span data-dcnode-id="2209" instrument_node=""> carries an advertisement for the book </span><em data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">“True Peace and Security – How Can You Find It?”</span></em><span data-dcnode-id="2206" instrument_node=""> with the headline ‘1914 A TURNING POINT’ saying that,</span></p><span data-dcnode-id="2204" instrument_node="">
</span><p class="quote" data-dcnode-id="2201"><em data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">“Historians say that 1914 was a turning point in history. Yet the Bible long before had foretold it would be. What does the Bible say regarding 1914?”</span></em></p><span data-dcnode-id="2200" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">In the light of what we have seen so far, this is a most important question! Before investigating what the Bible says about 1914, we shall cite more WB&amp;TS references to the importance of the year and what they believe the Bible says.</span></p><span data-dcnode-id="2197" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2188"><span class="quote" data-dcnode-id="2191"><em data-dcnode-id="2192"><span data-dcnode-id="2196" instrument_node="">“Hence it was in the invisible heavens that the year 1914 C.E. witnessed the fulfilment of Revelation 11: 15… The </span><span data-dcnode-id="2194" style="color: #ff0000;"><span data-dcnode-id="2195" instrument_node="">Bible </span></span><span data-dcnode-id="2193" instrument_node="">clearly pinpoints the generation alive in 1914 CE as the one that will yet witness the ushering in of Kingdom rule free from Satanic interference.” – </span></em></span><span class="quote" data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Is This Life all there is?, 1974, pp.160&amp;164</span></span></p><span data-dcnode-id="2187" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2182"><span class="quote" data-dcnode-id="2183"><em data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">“In the year 1914 CE an even more marvellous event of universal importance took place…Before the generation that witnessed the events of 1914 dies off, God will crush the entire Satanic system of things.”</span></em><span data-dcnode-id="2184" instrument_node=""> – United in Worship of the Only True God, 1963, pp.169-170</span></span></p><span data-dcnode-id="2181" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2167"><span class="quote" data-dcnode-id="2168"><em data-dcnode-id="2170"><span data-dcnode-id="2180" instrument_node="">“Years in advance </span><span data-dcnode-id="2178" style="color: #ff0000;"><span data-dcnode-id="2179" instrument_node="">Bible</span></span><span data-dcnode-id="2177" instrument_node=""> scholars realized that 1914 was to be a year of great significance. </span><span data-dcnode-id="2175" style="color: #ff0000;"><span data-dcnode-id="2176" instrument_node="">Bible chronology</span></span><span data-dcnode-id="2174" instrument_node=""> specifically points to that year, and careful students of </span><span data-dcnode-id="2172" style="color: #ff0000;"><span data-dcnode-id="2173" instrument_node="">God’s Word</span></span><span data-dcnode-id="2171" instrument_node=""> knew that. They expected great changes to take place, and the facts confirm that 1914 was, indeed, a marked year…The London ‘Evening Star’ commented that…some historian in the next century may well conclude that the day the world went mad was August 4, 1914.”</span></em><span data-dcnode-id="2169" instrument_node=""> – The Truth that Leads to Eternal Life, 1968, p.91 (see also pp.95-96)</span></span></p><span data-dcnode-id="2166" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2152"><span class="quote" data-dcnode-id="2153"><em data-dcnode-id="2158"><span data-dcnode-id="2165" instrument_node="">“But the </span><span data-dcnode-id="2163" style="color: #ff0000;"><span data-dcnode-id="2164" instrument_node="">Bible</span></span><span data-dcnode-id="2162" instrument_node=""> had foretold the opposite – that the unprecedented war of 1914 to 1918 would highlight the beginning of ‘the last days.’ (2 Timothy 3:1) The </span><span data-dcnode-id="2160" style="color: #ff0000;"><span data-dcnode-id="2161" instrument_node="">Bible </span></span><span data-dcnode-id="2159" instrument_node="">also provided chronological evidence that 1914 would mark the birth of God’s heavenly Kingdom… 1914 A TURNING POINT IN HISTORY”</span></em><span data-dcnode-id="2157" instrument_node=""> followed by a page of quotes from </span><em data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">‘The Scientific Monthly’, July 1951; ‘The New York Times Magazine’, September 27, 1953; ‘The Seattle Times’, January 1, 1959; James Cameron’s ‘1914’, published in 1959; ‘American Medical News’, November 21, 1977; ‘The Economist’, London, August 4, 1979; ‘St. Louis Post – Dispatch’, January 27, 1980 and British statesman Harold Macmillan in ‘The New York Times’, November 23, 1980.”</span></em><span data-dcnode-id="2154" instrument_node=""> – Life – How Did It Get Here? By Evolution or Creation?, 1985, pp.227-228 (see also pp.229&amp;231)</span></span></p><span data-dcnode-id="2151" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2143"><span class="quote" data-dcnode-id="2144"><em data-dcnode-id="2146"><span data-dcnode-id="2150" instrument_node="">“In 1914 CE Jesus Christ began to rule as King of God’s heavenly government… we considered </span><span data-dcnode-id="2148" style="color: #ff0000;"><span data-dcnode-id="2149" instrument_node="">Bible evidence</span></span><span data-dcnode-id="2147" instrument_node=""> that Christ returned and began ruling in the midst of his enemies in the year 1914.”</span></em><span data-dcnode-id="2145" instrument_node=""> – You can Live Forever in Paradise on Earth, 1982, pp.141&amp;149. </span></span></p><span data-dcnode-id="2142" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2134"><span class="quote" data-dcnode-id="2135"><em data-dcnode-id="2137"><span data-dcnode-id="2141" instrument_node="">“</span><span data-dcnode-id="2139" style="color: #ff0000;"><span data-dcnode-id="2140" instrument_node="">Bible evidence</span></span><span data-dcnode-id="2138" instrument_node=""> shows that in the year 1914 CE God’s time arrived for Christ to return and begin ruling.”</span></em><span data-dcnode-id="2136" instrument_node=""> – Ibid, p.147 </span></span></p><span data-dcnode-id="2133" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2128"><span class="quote" data-dcnode-id="2129"><em data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">“In that year (1914) ‘the appointed times of the nations’ were fulfilled, and God gave rulership to ‘the lowliest of mankind’ – Jesus Christ – who had been considered so base by his foes that they even had him impaled.”</span></em><span data-dcnode-id="2130" instrument_node=""> – Pay Attention to Daniel’s Prophecy!, 1999, p.97</span></span></p><span data-dcnode-id="2127" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2122"><span class="quote" data-dcnode-id="2123"><em data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">“What about Jehovah’s people? They had long declared that ‘the appointed times of the nations’ would end in 1914. (Luke 21: 24) In that year, God’s Kingdom in the hands of King David’s Heir, Jesus Christ, was established in the heavens. (2 Samuel 7: 12 – 16; Luke 22: 28,29). As far back as March 1880, the Watch Tower magazine linked the rule of God’s Kingdom with the ending of ‘the appointed times for the nations,’ or ‘the times of the Gentiles.’ (King James Version)…God’s ‘time appointed’ to end Gentile domination of the earth came in 1914 when he set up the heavenly Kingdom. In June 28 of that year, Austrian Archduke Francis Ferdinand and his wife were assassinated by a Serbian terrorist in Sarajevo, Bosnia. That was the spark that touched off World War I.”</span></em><span data-dcnode-id="2124" instrument_node=""> – Ibid, p.261</span></span></p><span data-dcnode-id="2121" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2116"><span class="quote" data-dcnode-id="2117"><em data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">“As far back as 1876, Jehovah’s Witnesses realized that Bible prophecy marked the year 1914 CE as a time when major events would take place that would have far-reaching effects on human affairs. They gave the reason for this fact wide publicity.”</span></em><span data-dcnode-id="2118" instrument_node=""> – True Peace and Security, how can you find it?,1986,p.70</span></span></p><span data-dcnode-id="2115" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2110"><span class="quote" data-dcnode-id="2111"><em data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">“After going on record that the Bible pointed to 1914, Jehovah’s Witnesses had to wait several decades before they saw the outcome. Early in 1914 the peacefulness of the world made it appear to many that nothing was going to happen. But before the summer was over, the Witnesses’ confidence was justified when the world plunged into a war that was without precedent.”</span></em><span data-dcnode-id="2112" instrument_node=""> – Ibid, p.73</span></span></p><span data-dcnode-id="2109" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2105"><em data-dcnode-id="2106"><span class="quote" data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">“In their investigation of God’s Word, those Bible Students (under Russell) were keenly interested in the prophecies of the Christian Greek Scriptures related to the ‘end of the world’ and to Christ’s ‘coming.’ (Matthew 24:3 KJ) By turning to the Greek text, they discovered that Christ’s ‘coming’ was, in fact, a ‘parousia, ‘ or ‘invisible presence.’ Therefore, Christ had given his disciples information about the evidence of his invisible presence in the time of the end, not a future visible coming. Along with this study, those Bible students had a keen desire to understand the Bible’s chronology in relation to Christ’s presence. Without understanding all the details, Russell and his associates realized that 1914 would be a crucial date in human history. – Matthew 24: 3 – 22; Luke 21: 7 – 33…There was a sense of urgency to the activity of those Bible Students prior to 1914. They believed that their preaching activity would culminate in that year, and therefore they felt they should expend every effort to help others to know ‘this good news of the kingdom.” – Mankind’s Search for God,1990, pp.353&amp;354</span></span></em></p><span data-dcnode-id="2104" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2099"><span class="quote" data-dcnode-id="2100"><em data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">“Humans cannot see angels in their heavenly glory. So the arrival of the Son of man, Jesus Christ, with the angels must be invisible to human eyes. The arrival occurs in the year 1914.”</span></em><span data-dcnode-id="2101" instrument_node=""> – The Greatest man that ever Lived, 1991, section 111.</span></span></p><span data-dcnode-id="2098" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2093"><span class="quote" data-dcnode-id="2094"><em data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">“A careful study of Bible prophecies, including Jesus’ own prophecy regarding the last days, reveals that ‘the Lord’s day’ began in the history-making year 1914, yes within this generation! So it was in 1914 that Jesus returned invisibly, without public fanfare and with only his faithful servants being aware of his return. In that year Jehovah gave Jesus the command to go subduing in the midst of his enemies! Obeying his Father’s order, Jesus cleansed the heavens of Satan and his demons, hurling them down to the earth. After seeing this occur in vision, John hears a heavenly voice proclaim: ‘Now have come to pass the salvation and the power and the kingdom of our God and the authority of his Christ!’ Yes, in 1914 Christ began ruling as King!”</span></em><span data-dcnode-id="2095" instrument_node=""> – Ibid, Section 132.</span></span></p><span data-dcnode-id="2092" instrument_node="">
</span><h4 data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">The Path to 1914</span></h4><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2087"><img alt="Image result for 1914 jw" class="aligncenter" data-dcnode-id="2088" data-lazy="true" data-src="https://assetsnffrgf-a.akamaihd.net/assets/m/502014148/E/art/502014148_E_cnt_1_xl.jpg" height="404" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reachouttrust.org/wp-content/themes/reco/assets/images/transparent.gif&amp;raw" width="520"></p><span data-dcnode-id="2086" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2080"><span data-dcnode-id="2085" instrument_node="">In all of the above quotations from past and present Watchtower Bible and Tract Society publications there is a definite unity on the issue of the year 1914. It is also evident from the </span><span data-dcnode-id="2082" style="color: #ff0000;"><strong data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">words in red</span></strong></span><span data-dcnode-id="2081" instrument_node=""> that the Society claims authority for this teaching from the Bible.</span></p><span data-dcnode-id="2079" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">It is clear that the actual date of 1914 would not appear in the Bible text, as the system of dating it was not in use when the canon of Scripture was completed. However, the preceding statements are so bold and confident that the date is explicitly marked out in the Bible.</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2070"><span data-dcnode-id="2075" instrument_node="">So how was the date of 1914 arrived at? We must review the actual statements in Watchtower Society publications in order to find out. I have highlighted in </span><span data-dcnode-id="2072" style="color: #990066;"><strong data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">mauve</span></strong></span><span data-dcnode-id="2071" instrument_node=""> the different steps mentioned.</span></p><span data-dcnode-id="2069" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2054"><span class="quote" data-dcnode-id="2055"><span data-dcnode-id="2068" instrument_node="">“The only city in all the earth upon which Jehovah placed his name was </span><em data-dcnode-id="2057"><span data-dcnode-id="2067" instrument_node="">Jerusalem. (1 Kings 11: 36) it was also the capital of a God – approved earthly kingdom typical of God’s heavenly Kingdom. </span><span data-dcnode-id="2065" style="color: #990066;"><span data-dcnode-id="2066" instrument_node="">Therefore, the destruction of Jerusalem by the Babylonians in 607 B.C.E. was very significant</span></span><span data-dcnode-id="2064" instrument_node="">…Some six centuries later, Jesus indicated that this period of interrupted rule was still in effect, for he said: ‘Jerusalem will be trampled on by the nations until the appointed times of the nations are fulfilled.’ – Luke 21: 24…</span><span data-dcnode-id="2062" style="color: #990066;"><span data-dcnode-id="2063" instrument_node="">That period began with the destruction of Jerusalem in 607 B.CE.</span></span><span data-dcnode-id="2061" instrument_node="">, and Daniel indicated that it would go on for ‘seven times.’ (Daniel 4: 23 – 25) How long is that? The Bible shows that three and a half ‘times’ equal 1,260 days. (Revelation 12: 6, 14) twice that period, or seven times would be 2,520 days. But nothing noteworthy happened at the end of that short period of time. </span><span data-dcnode-id="2059" style="color: #990066;"><span data-dcnode-id="2060" instrument_node="">By applying ‘a day for a year’ to Daniel’s prophecy and counting 2,520 years from 607 B.C.E., however, we arrive at the year 1914 CE</span></span><span data-dcnode-id="2058" instrument_node=""> – Numbers 14: 34; Ezekiel 4: 6.”</span></em><span data-dcnode-id="2056" instrument_node=""> – Knowledge that Leads to Eternal Life, 1995, pp.96-97.</span></span></p><span data-dcnode-id="2053" instrument_node="">
</span><p class="bodyText" data-dcnode-id="2040"><em data-dcnode-id="2041"><span class="quote" data-dcnode-id="2042"><span data-dcnode-id="2052" instrument_node="">“Many centuries ago Jehovah God revealed the specific time for the conferring of rulership upon the one whom he would designate to be king over all the world of mankind. He used symbols to do so and transmitted some of the information by means of a dream…In the fourth chapter of that book [Daniel] you will find narrated a divinely sent dream of King Nebuchadnezzar of Babylon…So this dream had an initial fulfilment upon King Nebuchadnezzar. </span><span data-dcnode-id="2050" style="color: #990066;"><span data-dcnode-id="2051" instrument_node="">For ‘seven times’ or seven literal years, Nebuchadnezzar was insane</span></span><span data-dcnode-id="2049" instrument_node="">…But this detailed account…was not limited in its fulfilment to King Nebuchadnezzar. How do we know this? Because, as stated in the vision itself, it relates to God’s kingdom and rulership by the one whom he designates. And who is God’s choice for the kingship?…The one…described [in Daniel 7: 2 – 8] is none other than Jesus Christ…the prophetic dream…must point to the time when he would receive rulership over the world of mankind. This would be at the end of ‘seven times.’ How long are these ‘times’? When do they start? When do they end?… The evidence is that these ‘seven times’ amounted to 2,520 days, that is, seven prophetic years of 360 days each. This is confirmed in other parts of the Bible that mention ‘times,’ ‘months,’ and ‘days.’ For example, Revelation 11: 2 speaks of a period of ‘forty – two months,’ or three and a half years. In the next verse the same period is mentioned as being ‘a thousand two hundred and sixty days.’ Now, if you were to divide 1,260 days by 42 months, you would get 30 days for each month. </span><span data-dcnode-id="2047" style="color: #990066;"><span data-dcnode-id="2048" instrument_node="">A year of 12 months would therefore be 360 days long. ON THIS BASIS, ‘SEVEN TIMES,’ OR SEVEN YEARS, WOULD BE 2,520 DAYS LONG (7 x 360).</span></span><span data-dcnode-id="2046" instrument_node=""> [Emphasis in caps. mine] The correctness of this computation is verified by Revelation 12: 6, 14 where 1,260 days are spoken of as ‘a time and times and half a time,’ or ‘three and a half times’ (‘three years and a half, New English Bible’). Seven being the double of three and a half, ‘seven times’ would equal 2,520 days (2 x 1,260)… Is there a way to ascertain the length of each of these ‘days’? Yes, the Bible’s formula for prophetic days is ‘a day for a year,’ (Numbers 14: 34, Ezekiel 4: 6). Applying this to the ‘seven times,’ we see that they amount to 2,520 years… Knowing the length of the ‘seven times,’ we are now in a position to investigate when they began…At one time the government that had its seat in Jerusalem was a kingdom of God…Jerusalem was…the seat of God’s government in a representative sense. </span><span data-dcnode-id="2044" style="color: #990066;"><span data-dcnode-id="2045" instrument_node="">So when the Babylonians under Nebuchadnezzar destroyed Jerusalem, and the land was completely desolated, world rulership passed into Gentile hands without any interference from a kingdom representing Jehovah’s sovereignty…That means…that the ‘seven times’ had their start at the time that Nebuchadnezzar destroyed Jerusalem and the land of Judah was completely desolated. When did that event occur? The Bible and secular history can be used to establish 607 BCE as the date for this event.</span></span><span data-dcnode-id="2043" instrument_node="">“</span></span></em></p><span data-dcnode-id="2039" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">A footnote at this point reveals the following information:</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p class="quote" data-dcnode-id="2020"><em data-dcnode-id="2022"><span data-dcnode-id="2035" instrument_node="">“Modern secular historians do not generally present 607 BCE as the date for the event (so in what sense does secular history help to establish 607 BCE as the date? M.T.), but they are dependant on the writings of men who lived centuries after it happened. On the other hand, The </span><span data-dcnode-id="2033" style="color: #ff0000;"><span data-dcnode-id="2034" instrument_node="">Bible</span></span><span data-dcnode-id="2032" instrument_node=""> contains testimony from eyewitnesses, and it sets out factors that are ignored by secular writers. Furthermore, the fulfilment of </span><span data-dcnode-id="2030" style="color: #ff0000;"><span data-dcnode-id="2031" instrument_node="">Bible prophecy</span></span><span data-dcnode-id="2029" instrument_node=""> at the end of the ‘seven times’ establishes the date beyond doubt. As to why the </span><span data-dcnode-id="2027" style="color: #ff0000;"><span data-dcnode-id="2028" instrument_node="">Bible’s chronological data</span></span><span data-dcnode-id="2026" instrument_node=""> is more reliable than secular history, see the book ‘Aid to Bible Understanding,’ pp. 322 – 348. Secular historians are in agreement that Babylon fell to Cyrus the Persian in 539 BCE This date is substantiated by all available historical records of ancient times…Cyrus’ first year of rule toward Babylon evidently extended from 538 to 537 BCE…it must have been by the seventh month of 537 BCE that the Israelites were back in their cities, ending the desolation of Jerusalem…Second Chronicles (36: 19 -21) shows that a period of seventy years passed from the time of the destruction of Jerusalem…until the restoration…Counting back seventy years from…537 BCE brings us to 607 BCE Jesus Christ referred to this trampling on Jerusalem when he said to his disciples ‘Jerusalem will be trampled on by the nations, until the appointed times of the nation are fulfilled.’ (Luke 21: 24) T</span><span data-dcnode-id="2024" style="color: #990066;"><span data-dcnode-id="2025" instrument_node="">hose ‘appointed times’ were to end 2,520 years after 607 BCE This would be in the year 1914 CE</span></span><span data-dcnode-id="2023" instrument_node="">“</span></em><span data-dcnode-id="2021" instrument_node=""> – Is this Life All There Is?, 1974, pp.151-159</span></p><span data-dcnode-id="2019" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">This, rather lengthy, information is confirmed by the following:</span></p><span data-dcnode-id="2016" instrument_node="">
</span><p class="quote" data-dcnode-id="2006"><em data-dcnode-id="2008"><span data-dcnode-id="2015" instrument_node="">“…Zedekiah, the last king in the typical Kingdom of God, was removed from the throne in Jerusalem by the Babylonians. (Ezek. 21: 25 – 27) Finally, </span><span data-dcnode-id="2013" style="color: #990066;"><span data-dcnode-id="2014" instrument_node="">by early October of 607 BCE</span></span><span data-dcnode-id="2012" instrument_node=""> the last vestige of Jewish sovereignty was gone…Counting 2,520 years </span><span data-dcnode-id="2010" style="color: #990066;"><span data-dcnode-id="2011" instrument_node="">from early October of 607 BCE brings us to early October of 1914 CE</span></span><span data-dcnode-id="2009" instrument_node="">“</span></em><span data-dcnode-id="2007" instrument_node=""> – Reasoning from the Scriptures, 1985, p.96.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><h4 class="subHeader" data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Summary</span></h4><span data-dcnode-id="2002" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">All of the above passages have been taken from publications of the Watchtower Bible and Tract Society, and give the Society’s teaching on the importance of the year 1914.</span></p><span data-dcnode-id="1999" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">As expected, statements about the importance of 1914, as being a year marked in Scripture, means that its importance needs to be deduced by an interpretation of a variety of Bible passages and an interpretation of certain historical events deemed to pinpoint particular dates of these events. The date of 1914 itself is then calculated by identifying 607 BCE as the date of the destruction of Jerusalem, then counting forward 2, 520 years – each year containing 12 months with 30 days in each month.</span></p><span data-dcnode-id="1996" instrument_node="">
</span><h4 data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Reliable Sources Say</span></h4><span data-dcnode-id="1993" instrument_node="">
</span><p class="subSubHeaderItalic" data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">What do other sources tell us about this subject?&nbsp;Having given careful consideration to the material published by Jehovah’s Witnesses, it is important to ensure that these are balanced by other sources which relate to the subject.</span></p><span data-dcnode-id="1990" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">It is clear that the text of the Bible itself – the true and only foundation for Christian faith and practice and a historically accurate record, does not provide explicit information by which the dating of certain events can be established. Bible students, therefore, need to take into account helpful non-Biblical data regarding the periods of history covered by the Bible record. In the following, the author’s title (if any) is given as it appears in their publication or article.</span></p><span data-dcnode-id="1987" instrument_node="">
</span><p class="subSubHeaderItalic" data-dcnode-id="1984"><strong data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">A. The Destruction of Jerusalem</span></strong></p><span data-dcnode-id="1983" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">D.F. Payne, lecturer in Semitic Studies at the Queen’s University, Belfast, wrote:</span></p><span data-dcnode-id="1980" instrument_node="">
</span><p class="quote" data-dcnode-id="1976"><em data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">“Nebuchadrezzar of Babylon destroyed the city and Temple in 587 B.C.”</span></em><span data-dcnode-id="1977" instrument_node=""> – The New Bible Dictionary, IVP, 1977, p.616</span></p><span data-dcnode-id="1975" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">K.A. Kitchen, lecturer in Egyptian and Coptic at the University of Liverpool; and T.C. Mitchell, Research Assistant in the Department of Western Asiatic Antiquities at the British Museum, state:</span></p><span data-dcnode-id="1972" instrument_node="">
</span><p class="quote" data-dcnode-id="1959"><em data-dcnode-id="1961"><span data-dcnode-id="1971" instrument_node="">“From Hezekiah’s reign until that of Jehoiachin, dates can still be worked out to the year, culminating in that of the Babylonian capture (NOTE: This is the first capture NOT the final Fall) of Jerusalem in </span><span data-dcnode-id="1969" style="color: #990066;"><span data-dcnode-id="1970" instrument_node="">597 BC</span></span><span data-dcnode-id="1968" instrument_node="">, precisely dated to 15/16 March (second of Adar) </span><span data-dcnode-id="1966" style="color: #990066;"><span data-dcnode-id="1967" instrument_node="">597 </span></span><span data-dcnode-id="1965" instrument_node="">by the recently published Babylonian chronicle tablets covering this period. But from this point to the fall of Jerusalem, some uncertainty reigns over the precise mode of reckoning of the Hebrew civil year and of the various regnal years of Zedekiah and Nebuchadrezzar in 2 Kings and Jeremiah. Consequently, two different dates are current for the fall of Jerusalem: </span><span data-dcnode-id="1963" style="color: #990066;"><span data-dcnode-id="1964" instrument_node="">587 and 586 BC The date 587 is here preferred</span></span><span data-dcnode-id="1962" instrument_node="">, with Wiseman and Albright (against Thiele for 586).”</span></em><span data-dcnode-id="1960" instrument_node=""> – Ibid, see the article “Chronology of the Old Testament”</span></p><span data-dcnode-id="1958" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Bernhard W. Anderson, Professor of Old Testament Theology at Princeton Theological Seminary, in a chronological chart places this entry:</span></p><span data-dcnode-id="1955" instrument_node="">
</span><p class="quote" data-dcnode-id="1948"><em data-dcnode-id="1950"><span data-dcnode-id="1954" instrument_node="">“Fall of Jerusalem Second Deportation, </span><span data-dcnode-id="1952" style="color: #990066;"><span data-dcnode-id="1953" instrument_node="">587</span></span><span data-dcnode-id="1951" instrument_node="">.”</span></em><span data-dcnode-id="1949" instrument_node=""> – The Living Word of the old Testament, Longman, 1982, p.395</span></p><span data-dcnode-id="1947" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">John Bright elaborates on one of the points touched on by Kitchen and Mitchell:</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p class="quote" data-dcnode-id="1938"><em data-dcnode-id="1939"><span data-dcnode-id="1943" instrument_node="">“Though Jerusalem held out with heroic stubbornness until the following summer, its fate was sealed. Zedekiah wished to surrender (Jer. 38: 14 – 23) but feared to do so. In July </span><span data-dcnode-id="1941" style="color: #990066;"><span data-dcnode-id="1942" instrument_node="">587</span></span><span data-dcnode-id="1940" instrument_node=""> (II Kings 25: 2f; Jeremiah 52: 5f), just as the city’s food supply was exhausted, the Babylonians breached the walls and poured in.”</span></em></p><span data-dcnode-id="1937" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">A footnote at the date in the above says:</span></p><span data-dcnode-id="1934" instrument_node="">
</span><p class="quote" data-dcnode-id="1927"><em data-dcnode-id="1929"><span data-dcnode-id="1933" instrument_node="">“Some scholars believe that the city did not fall until July 586: recently, A. Malamat, ‘Israel Exploration Journal’, 18 (1968) pp. 137 -156; K.S. Freedy and D.B. Redford, ‘Journal of the American Oriental Society’, 90 (1970) pp. 462 – 485. </span><span data-dcnode-id="1931" style="color: #990066;"><span data-dcnode-id="1932" instrument_node="">But 587 seems preferable</span></span><span data-dcnode-id="1930" instrument_node="">; cf. E. Kutch, ‘Zeilschrift fur die alttestamentliche Wissenschaft’ , 71 (1959) pp. 270 – 274.”</span></em><span data-dcnode-id="1928" instrument_node=""> – A History of Israel, 1976, p.329.</span></p><span data-dcnode-id="1926" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Arthur E. Cundall, lecturer in Old Testament Studies at London Bible College, gives more detail on one important non – Biblical source of information, which is contemporary with the Bible record:</span></p><span data-dcnode-id="1923" instrument_node="">
</span><p class="quote" data-dcnode-id="1901"><em data-dcnode-id="1903"><span data-dcnode-id="1922" instrument_node="">“The Babylonian Chronicle. These tablets, some only recently published, deal with Babylonian history during the period from Hezekiah to the fall of Jerusalem. They are of special interest to biblical scholars for the period when Judah was subject to Babylon, i.e. after</span><span data-dcnode-id="1920" style="color: #990066;"><span data-dcnode-id="1921" instrument_node=""> 605 BC</span></span><span data-dcnode-id="1919" instrument_node=""> Many facts, which before were not clear, have now been resolved. For instance, it was not known what encouraged the Judean king, Jehoiakim, to rebel against the Babylonians in </span><span data-dcnode-id="1917" style="color: #990066;"><span data-dcnode-id="1918" instrument_node="">601/600 BC</span></span><span data-dcnode-id="1916" instrument_node="">, or why the revolt was not put down until </span><span data-dcnode-id="1914" style="color: #990066;"><span data-dcnode-id="1915" instrument_node="">598/597 BC</span></span><span data-dcnode-id="1913" instrument_node=""> The Babylonian Chronicle tells us that in </span><span data-dcnode-id="1911" style="color: #990066;"><span data-dcnode-id="1912" instrument_node="">601</span></span><span data-dcnode-id="1910" instrument_node=""> BC there was a fierce between Babylonia and Egypt on the borders of Egypt. Although the battle was indecisive, Babylonian losses were great and meant a withdrawal from the area and a regrouping of the army. It was this apparent weakness which led Jehoiakim to rebel. The Chronicle gives the </span><span data-dcnode-id="1908" style="color: #990066;"><span data-dcnode-id="1909" instrument_node="">ONLY EXACT DATE FOR AN EVENT IN OLD TESTAMENT HISTORY, THE CAPTURE OF JERUSALEM ON 15 – 16 MARCH 597 B.C.</span></span><span data-dcnode-id="1907" instrument_node=""> One minor problem remains. It is not certain whether the Hebrew civil year uniformly followed the Babylonian pattern. This makes for an uncertainty of one year in dates during the reign of Zedekiah, the last king of Judah. </span><span data-dcnode-id="1905" style="color: #990066;"><span data-dcnode-id="1906" instrument_node="">The fall of Jerusalem, for example, is given as either 587 or 586 BC</span></span><span data-dcnode-id="1904" instrument_node=""> The two modes of reckoning appear in Jeremiah 52: 12 and 29 where, on first sight, the prisoners were taken from Jerusalem a year before it was captured!”</span></em><span data-dcnode-id="1902" instrument_node=""> – The Lion Handbook of the Bible, 1975, p.271</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1895"><span data-dcnode-id="1899" instrument_node="">It will be recalled that the 1974 Watchtower book </span><em data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">‘Is This Life All There Is?’</span></em><span data-dcnode-id="1896" instrument_node=""> said that</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p class="quote" data-dcnode-id="1890"><em data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">“Modern secular historians do not generally present 607 BCE as the date for this event, but they are dependent on the writings of men who lived centuries after it happened.”</span></em><span data-dcnode-id="1891" instrument_node=""> (p.159)</span></p><span data-dcnode-id="1889" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1883"><span data-dcnode-id="1888" instrument_node="">This is now, of course, no longer the case. The Babylonian Chronicle is a witness from the actual time these events happened, and proves beyond doubt that </span><em data-dcnode-id="1885"><strong data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">607 BCE for the fall and desolation of Jerusalem is an impossibility!</span></strong></em><span data-dcnode-id="1884" instrument_node=""> More from the Chronicle later.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">J.A. Thompson, Chairman of the Department of Middle Eastern Studies at the University of Melbourne, whose particular interest in archaeology, especially where it relates to the Bible, writes:</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p class="quote" data-dcnode-id="1869"><em data-dcnode-id="1871"><span data-dcnode-id="1878" instrument_node="">“Bible history makes it clear that the people of Judah w</span><span data-dcnode-id="1876" style="color: #990066;"><span data-dcnode-id="1877" instrument_node="">ere invaded more than once by the armies of Nebuchadnezzar, and each time captives were taken. In 597 BCE</span></span><span data-dcnode-id="1875" instrument_node=""> King Jehoiachin and many of his notables, among whom was the prophet Ezekiel (Ezek. 1: 2), were taken away to Babylonia. When Jerusalem fell to Nebuchadnezzar in </span><span data-dcnode-id="1873" style="color: #990066;"><span data-dcnode-id="1874" instrument_node="">586 BC, another group of people from Judah joined the party that had been exiled some eleven years before.</span></span><span data-dcnode-id="1872" instrument_node="">“</span></em><span data-dcnode-id="1870" instrument_node=""> – The Bible and Archaeology, Paternoster, 1976, pp.155-156</span></p><span data-dcnode-id="1868" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Thompson, here, may account in part for the seeming difficulty expressed by Cundall, that Jeremiah 52 seems to have prisoners being taken from Jerusalem a year before it was captured.</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Leon J. Wood, in a work revised by David E. O’Brien, offers the following:</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p class="quote" data-dcnode-id="1859"><em data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">“In accordance with Jeremiah’s warning, the city fell to the Babylonians in 586 BC”</span></em></p><span data-dcnode-id="1858" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">A footnote at this point says</span></p><span data-dcnode-id="1855" instrument_node="">
</span><p class="quote" data-dcnode-id="1852"><em data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">“Siege began in the tenth month of Zedekiah’s ninth year (588 BC) and continued until the fourth month of his eleventh year (July 586 BC), a total of eighteen months.”</span></em></p><span data-dcnode-id="1851" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">He continues:</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p class="quote" data-dcnode-id="1844"><em data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">“With Jerusalem destroyed, Gedaliah established a new capital at Mizpah. Perhaps he was active earlier in the court during the reign of Zedekiah. A seal found at Lachish and bearing the inscription ‘Belonging to Gedaliah who is over the house,’ is archaeologically dated to the time of the general destruction of 586 BC If reference is to Gedaliah, the man had filled a supervisory position in Zedekiah’s palace.”</span></em><span data-dcnode-id="1845" instrument_node=""> – A Survey of Israel’s History, Zondervan, 1985, pp.319&amp;322</span></p><span data-dcnode-id="1843" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Professor Ninian Smart, of the Department of Religious Studies at the University of Lancaster, concurs:</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p class="quote" data-dcnode-id="1836"><em data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">“Jeremiah, whose ministry spanned the years between 626 BC to the fall of Jerusalem in 586 BC, is important because he gave the ethical dimension of Hebrew religion new emphasis, making the ethical code incumbent upon each individual worshipper.”</span></em><span data-dcnode-id="1837" instrument_node=""> – The Religious Experience of Mankind, Fount, 1969, p.356.</span></p><span data-dcnode-id="1835" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">In reviewing the Watchtower Society material, it was seen that emphasis was laid on the fact that ‘modern historians’ do not accept 607 BCE Also, it will be recalled that the year 1914 was ‘announced as a year of great significance over thirty years before that date’ – in other words, before 1884. This raises a possible question as to whether 607 BCE was generally understood to be the date of the fall of Jerusalem in the thirty years before the turn of that century.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">In order to answer this, I quote from H.H. Milman, under the heading of BC 587:</span></p><span data-dcnode-id="1829" instrument_node="">
</span><p class="quote" data-dcnode-id="1825"><em data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">“The capture of Jerusalem took place on the ninth day of the fourth month: on the seventh day of the fifth month (two days on which Hebrew devotion still commemorates the desolation of the city by solemn fast and humiliation) the relentless Nebuzaradan executed the orders of his master, by levelling the city, the palaces, and the temple in one common ruin.”</span></em><span data-dcnode-id="1826" instrument_node=""> – The History of the Jews, Routledge, 1878, p.176</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">The unanimous verdict of these many witnesses is that Jerusalem was devastated in 587/586 BCE, not twenty years earlier as the Watchtower Society would like us to believe. There is another good reason why 607 must be erroneous, and that is:</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p class="subSubHeaderItalic" data-dcnode-id="1818"><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">B. The dates of Nebuchadrezzar’s reign</span></strong></p><span data-dcnode-id="1817" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Joyce G. Baldwin, Dean of Women at Trinity College, Bristol, writes:</span></p><span data-dcnode-id="1814" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1803"><em data-dcnode-id="1804"><span class="quote" data-dcnode-id="1805"><span data-dcnode-id="1813" instrument_node="">“The publication of the Babylonian Chronicles in the British Museum made available an independent source of </span><span data-dcnode-id="1811" style="color: #990066;"><span data-dcnode-id="1812" instrument_node="">precise information relating to the events of Nebuchadrezzar’s accession</span></span><span data-dcnode-id="1810" instrument_node="">. The following table sets out the details as they can be reconstructed from the</span><span data-dcnode-id="1808" style="color: #990066;"><span data-dcnode-id="1809" instrument_node=""> Babylonian data for 605 BC:</span></span><br data-dcnode-id="1807"><span data-dcnode-id="1806" instrument_node="">
</span></span></em></p><span data-dcnode-id="1802" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1785"><span class="quote" data-dcnode-id="1786"><em data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">January/February – Army returned from a campaign to Babylon.</span></em><br data-dcnode-id="1799"><span data-dcnode-id="1798" instrument_node="">
</span><em data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">April/August (probably May/June) – Battle of Carchemish, after which Nebuchadrezzar pursued the Egyptians south and conquered the whole of Hatti-land (i.e. Syria – Palestine).</span></em><br data-dcnode-id="1795"><span data-dcnode-id="1794" instrument_node="">
</span><em data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">August 15 – Death of Nabopolassar, father of Nebuchadrezzar.</span></em><br data-dcnode-id="1791"><span data-dcnode-id="1790" instrument_node="">
</span><em data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">September 7 – Accession of Nebuchadrezzar.”</span></em><span data-dcnode-id="1787" instrument_node=""> – Tyndale Old Testament Commentaries – Daniel, 1978, pp.19-20</span></span></p><span data-dcnode-id="1784" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node="">Thompson </span><em data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">(The Bible and Archaeology, p.448)</span></em><span data-dcnode-id="1780" instrument_node="">, in his King Lists, under ‘Babylonian Kings’ gives the dates of Nebuchadnezzar as 605 – 562 BC</span></p><span data-dcnode-id="1778" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">D.J. Wiseman, professor of Assyriology at the University of London, offers further help on Nebuchadrezzar:</span></p><span data-dcnode-id="1775" instrument_node="">
</span><p class="quote" data-dcnode-id="1765"><em data-dcnode-id="1767"><span data-dcnode-id="1774" instrument_node="">“The king of Babylon (605 – 562 BC) frequently named by the prophets Jeremiah, Ezekiel and Daniel, and in the history of the last days of Judah. His name in Hebrew (nebukadre’ssar) transliterates the Bab[ylonian] Nabu – kudurri – usur, meaning perhaps ‘Nabu has protected the succession-rights’. The alternative Heb[rew] rendering (nebukadne’ssar; cf. Gk. Nabochodonosor) may be derived from the Aramaic form of the name. According to the Bab[ylonian] Chronicle this son of the founder of the Chaldean dynasty, Nabopolassar, first commanded the Bab[ylonian] army as ‘crown prince’ in the fighting in N. Assyria in </span><span data-dcnode-id="1772" style="color: #990066;"><span data-dcnode-id="1773" instrument_node="">606 BC</span></span><span data-dcnode-id="1771" instrument_node=""> In the following year he defeated Necho II and the Egyptians at Carchemish and Hamath (2 Ki. 23: 29f.; 2 Ch. 35: 20ff.; Je. 46: 2). ‘At this time he conquered the whole of Hatti’ (i.e. Syria and Palestine, so Bab. Chronicle; 2 Ki. 24: 7; Jos[ephus] Ant[iquities] 10: 6). Daniel was among the hostages taken from Judah (Dn. 1: 1), where Jehoiakim was in his fourth regnal year (Je. 36: 1). While in the field Nebuchadrezzar heard of his father’s death and rode across the desert to claim the Babylonian throne, which he ascended to on 6 September</span><span data-dcnode-id="1769" style="color: #990066;"><span data-dcnode-id="1770" instrument_node=""> 605 BC</span></span><span data-dcnode-id="1768" instrument_node="">“</span></em><span data-dcnode-id="1766" instrument_node=""> – The New Bible Dictionary, IVP, 1977, p.873.</span></p><span data-dcnode-id="1764" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">The unmistakable conclusion of these sources is that the Nebuchadrezzar, who sacked Jerusalem in 587/586 BCE, ascended to the throne of Babylon in 605 BCE. Also, he did not lead the army as ‘Crown Prince’ until 606 BCE Therefore, the desolation of Jerusalem could not have taken place in 607 BCE when Nabopolassar was clearly still king, and commander-in-chief of the army. These facts undermine the whole basis of the teaching that Jesus Christ came into His invisible temple in 1914, since the date used to calculate this is proven to have been false. If the date of 1914 is unreliable, then so must be the whole notion of Jesus Christ receiving the Kingdom of God in that year.</span></p><span data-dcnode-id="1761" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">There is one area of Bible interpretation used by the Watchtower Society that needs to be examined:</span></p><span data-dcnode-id="1758" instrument_node="">
</span><p class="subSubHeaderItalic" data-dcnode-id="1755"><strong data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">C. What about those ‘prophetic days’?</span></strong></p><span data-dcnode-id="1754" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">It should be recalled that a major factor in calculating the date of 1914 is the length of the ‘prophetic day’ as a Biblical principle.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p class="quote" data-dcnode-id="1747"><em data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">“Is there any way to ascertain the length of each of these ‘days’? Yes, the Bible’s formula for prophetic days is: ‘A day for a year.’ (Numbers 14: 34; Ezekiel 4: 6) Applying this to the ‘seven times,’ we see that they amount to 2,520 years.”</span></em><span data-dcnode-id="1748" instrument_node=""> – Is This Life All There Is?, p.156 (See also Reasoning from the Scriptures, p.96)</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">We need to be clear as to whether this is a valid Bible formula, therefore a Biblical principle; or more properly seen as an interpretation of the Bible, and therefore open to comparison and criticism.</span></p><span data-dcnode-id="1743" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">In deciding this, we need to see what the texts actually say:</span></p><span data-dcnode-id="1740" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Numbers 14: 34 (NWT)</span></p><span data-dcnode-id="1737" instrument_node="">
</span><p class="scripture" data-dcnode-id="1734"><em data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">“By the number of days that YOU spied out the land, forty days, a day for a year, a day for a year, YOU will answer for YOUR errors forty years, as YOU must know what my being estranged means.”</span></em></p><span data-dcnode-id="1733" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Ezekiel 4: 6 (NWT)</span></p><span data-dcnode-id="1730" instrument_node="">
</span><p class="scripture" data-dcnode-id="1727"><em data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">“And you must complete them. And you must lie upon your right side in the second case, and you must carry the error of the house of Judah forty days. A day for a year, a day for a year, is what I have given you.”</span></em></p><span data-dcnode-id="1726" instrument_node="">
</span><p class="bodyText" data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Looking at these two verses we can see certain parallels. For example, forty days is the period of time in both cases, but in the ‘Numbers’ verse, it is clear that this is because of the number of days the spies were in the land. Also clear is that the forty years spoken of is God’s judgement for errors having been committed, therefore for a specific point in time. Matthew Henry on the ‘Numbers’ verse:</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p class="quote" data-dcnode-id="1719"><em data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">“Thus long they were kept wandering…To answer the number of days the spies were searching the land. They were content to wait forty days for the testimony of men, because they could not take God’s word; and therefore justly are they kept forty years waiting for the performance of God’s promise.”</span></em><span data-dcnode-id="1720" instrument_node=""> – Matthew Henry’s Commentary on the Whole Bible, Hendrickson,1991, p.206</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">D.D. Bartlett, Lecturer at St. David’s College, Lampeter, agrees:</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p class="quote" data-dcnode-id="1711"><em data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">“The forty years in the wilderness are clearly to be understood here…as a time of unrelieved punishment.”</span></em><span data-dcnode-id="1712" instrument_node=""> – A New Commentary on Holy Scripture, S.P.C.K., 1928, p.131</span></p><span data-dcnode-id="1710" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">J.A. Thompson reinforces the same point:</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p class="quote" data-dcnode-id="1703"><em data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">“According to the number of days the spies spent in reconnaissance, forty, would be the number of years spent in the wilderness. The number is probably a symbolic one denoting a generation.”</span></em><span data-dcnode-id="1704" instrument_node=""> – The New Bible Commentary revised, IVP, 1977, p.184</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Certainly in its context, the ‘Numbers’ verse is clearly a statement of God’s judgement on the people who grumbled against God, so that none of them would live to enter the ‘promised land’, with the exception of Joshua and Caleb. On that basis, Thompson’s assessment of the meaning of the number appears to be accurate.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Moving on to the ‘Ezekiel’ verse, Matthew Henry is, once again, informative:</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p class="quote" data-dcnode-id="1692"><em data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">“He was ordered to lie upon his side before it [a portraiture of Jerusalem], as it were, to surround it, representing the Chaldean army lying before it to block it up, to keep the meat from going in and the mouths from going out. He was to lie on his left side 390 days (v. 5), about thirteen months; the siege of Jerusalem is computed to last eighteen months (Jer. 25: 4 – 6), but if we deduct from that five months interval, when the besiegers withdrew upon the approach of Pharaoh’s army (Jer. 37: 5 – 8), the number of the days of the close siege will be 390. Yet that also had another signification. The 390 days, according to the prophetic dialect, signified 390 years; and , when the prophet lies so many days on his side, he bears the guilt of that iniquity which the house of Israel, the ten tribes had borne 390 years, reckoning from their first apostasy under Jeroboam to the destruction of Jerusalem, which completed the ruin of those small remains of them that had incorporated with Judah. He is to then lie forty days upon his right side, and so long to bear the iniquity of the house of Judah, the kingdom of two tribes, because the measure – filling sins of that people were those which they were guilty of during the last forty years before their captivity, since the thirteenth year of Josiah, when Jeremiah began to prophesy (Jer. 1: 1, 2), or as some reckon it, since the eighteenth, when the book of the Law was found and the people renewed their covenant with God.”</span></em><span data-dcnode-id="1693" instrument_node=""> – pp.1345-1346</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Henry makes an important point here in the context of this investigation. Another major difference has now been highlighted between the ‘Numbers’ and ‘Ezekiel’ verses, in that whilst the ‘Numbers’ verse is foretelling the fate of wandering Israelites over a certain age to be fulfilled in their immediate future, the ‘Ezekiel’ verse is wrenched right out of its natural context of judgements against Israel and Judah, reflecting time, the majority of which was in the past. Therefore, it does not fulfil the same purpose as the ‘Numbers’ verse, making it unlikely to be any kind of ‘prophetic formula’ for working out dates.</span></p><span data-dcnode-id="1688" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">However, if this objection is unconvincing to some, who still maintain that these two verses out of the whole Bible contain “the Bible’s formula for prophetic days”, how does 2 Peter 3: 8 fit in?</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p class="scripture" data-dcnode-id="1681"><em data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">“However, let this one fact not be escaping YOUR notice, beloved ones, that one day is with Jehovah as a thousand years and a thousand years as a day.”</span></em><span data-dcnode-id="1682" instrument_node=""> (NWT)</span></p><span data-dcnode-id="1680" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Also, Psalm 90: 4 says:</span></p><span data-dcnode-id="1677" instrument_node="">
</span><p class="scripture" data-dcnode-id="1673"><em data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">“For a thousand years are in your eyes (Jehovah, see v. 1) but as yesterday when it is past, and as a watch during the night.”</span></em><span data-dcnode-id="1674" instrument_node=""> (NWT)</span></p><span data-dcnode-id="1672" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">On the basis of these verses and, for the sake of argument, using the date 607 BCE as the fall of Jerusalem, why is not the significant year 394 CE? While this seems to be an absurd question, it is just as valid, and offered with as much justification as the ‘Numbers’ and ‘Ezekiel’ verses, and with as much Biblical support! According to the Watchtower Bible and Tract Society, 2 Peter 3: 8 and Psalm 90: 4 do have an interpretative bearing on Genesis 1:</span></p><span data-dcnode-id="1669" instrument_node="">
</span><p class="quote" data-dcnode-id="1665"><em data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">“Are God’s ‘days’ of work controlled by the rotation of this globe? Obviously not. Of God, the Bible says: ‘One day is with Jehovah as a thousand years and a thousand years as one day.’ (2 Peter 3: 8) And that even to God a ‘day’ can have more than one meaning is seen when comparing this text with Psalm 90: 4, which says: ‘A thousand years are in your eyes [not a full day] but…as a watch during the night.’</span></em><span data-dcnode-id="1666" instrument_node="">” – Is the Bible Really the Word of God, 1969, pp.18-19</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">So, why can this ‘prophetic day’ not be used at other places? The above evidence shows that there is no actual Biblical justification for using any of these isolated verses as a formula for calculating the length of a ‘prophetic day.’</span></p><span data-dcnode-id="1661" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">It is notable that in the publications these claims appear, the Watchtower Society, who can usually muster some external support for what they teach, offer no opinions of external, scholarly sources in order to support their assertions. Therefore, it should be noted that the idea of a ‘prophetic day’ formula is a dubious interpretation, which insists on the verses being wrested out of their contexts and without any justification from the Bible whatsoever.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">The verses from ‘Numbers’ and ‘Ezekiel’ can be seen to relate to particular circumstances, and are certainly ‘prophetic’ in the sense of revealing God’s perspective on definite situations which affected the nation of Israel (including Judah), but it cannot be substantiated that they can also refer to any other number, or to any other part of Scripture.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Do you believe that 1914 is a year marked in Scripture?</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">That is really the question every person must be able to answer with confidence.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Historically, 1914 was an important and significant year. It brought about the start of World War I – a time of conflict that transformed the whole concept of conflict, and other issues. It was hailed as ‘ the war to end all war’ – another prediction which, sadly, was in error.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">However, it is not this importance or significance that is really the point here. The date 1914 is so central to Watchtower teachings that it appears, somewhere, in almost all Watchtower publications. As an example, consider the following:</span></p><span data-dcnode-id="1643" instrument_node="">
</span><p class="quote" data-dcnode-id="1639"><em data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">“Just before Jesus was impaled, he gave a grand prophecy about his future presence. He also indicated that he would be resurrected and would sit at God’s right hand awaiting the time to deal with his enemies…When would all of that happen? Jesus gave his disciples ‘the sign of his presence and of the conclusion of the system of things.’…Like the pieces of a jigsaw puzzle that fit together, the things that Jesus prophesied have occurred. Since the outbreak of World War I in 1914, we have seen the composite evidence of the invisible presence of Jesus Christ. He is reigning as the King of God’s Kingdom and is wielding tremendous influence…To appreciate further the effect of Jesus’ existence, you need to study the Bible. Why not ask Jehovah’s Witnesses about the details of Jesus’ presence?”</span></em><span data-dcnode-id="1640" instrument_node=""> – The Watchtower, 15 June 2003, p.7</span></p><span data-dcnode-id="1638" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">There are many facets to this quotation that need further exploration, such as the ‘invisible presence of Jesus Christ’. However, it does demonstrate the importance of 1914 in Watchtower thinking. Consideration of the following should reveal the truth of the matter:</span></p><span data-dcnode-id="1635" instrument_node="">
</span><p class="quote" data-dcnode-id="1631"><em data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">“Jesus Christ referred to this trampling on Jerusalem when he said to his disciples: ‘Jerusalem will be trampled on by the nations, until the appointed times of the nations are fulfilled.’ (Luke 21: 24) Those ‘appointed times’ were to end 2,520 years after 607 B.C.E, This would be in the year 1914 CE Did the trampling on Jerusalem cease then? True, the earthly city of Jerusalem did not witness the restoration of a king in the royal line of David in 1914 CE But such a thing was not to be expected. Why not? The earthly city of Jerusalem no longer had any holy significance from God’s viewpoint. While on earth, Jesus Christ stated: ‘Jerusalem, Jerusalem, the killer of the prophets and stoner of those sent forth to her – how often I wanted to gather your children together in the manner that a hen gathers her chicks under her wings, but you people did not want it. Look! Your house is abandoned to you.’ (Luke 13: 34, 35) Moreover, the kingdom in the hands of Jesus Christ is not an earthly government with Jerusalem or any other city as its capital. It is a heavenly kingdom. Hence, it was in the invisible heavens that in the year 1914 CE witnessed the fulfilment of Revelation 11: 15. ‘The kingdom of the world did become the kingdom of our Lord and of his Christ, and he will rule as king forever and ever.’ What Jerusalem represented, that is, the Messianic government ruling with divine approval, was then no longer being trampled on. Once again there was a king of the Davidic dynasty who, by divine appointment, exercised rulership over the affairs of mankind. The visible events that have taken place here on earth in fulfilment of Bible prophecy since 1914 CE prove that this is the case.”</span></em><span data-dcnode-id="1632" instrument_node=""> – Is This Life All there Is?, 1974, pp.159-160</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1620"><span data-dcnode-id="1629" instrument_node="">This rather lengthy quote is very, very important in finding the truth here. The reference to Jesus’ prophecy in Luke 21: 24 is instructive. Jesus said “Jerusalem </span><em data-dcnode-id="1626"><strong data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">will be </span></strong></em><span data-dcnode-id="1625" instrument_node="">trampled on by the nations.” This clearly shows that, according to Jesus Christ, the trampling </span><em data-dcnode-id="1622"><strong data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">had not yet started</span></strong></em><span data-dcnode-id="1621" instrument_node="">. This also sheds light on something else that this passage said. It would have been very simple for Jesus, as he was prophesying, to have stated that it was not the physical city of Jerusalem but an invisible counterpart in heaven, which He was referring to.</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">On the contrary, He made clear that physical Jerusalem would be physically trampled by the nations. The Watchtower Society freely admit that the city of Jerusalem did not stop being trampled on in 1914. However, by what stretch of credibility can Jerusalem – a heavenly city, complete with temple – which had never been trampled by the nations, fulfil the expectations of the prophecy? It certainly is not consistent with the Bible.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">One key principle of Biblical interpretation is to interpret Scripture with Scripture, in other words to allow passages which describe the same event to interpret each other. In order to support what I have said about Revelation 11: 15 in this way, I offer the following.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1604"><span data-dcnode-id="1612" instrument_node="">In the above passage, the Watchtower Society claim that in 1914, Jesus Christ established His heavenly kingdom which the physical city of Jerusalem, in its time, typified. This meant that God’s ‘theatre of operations’ became transferred, </span><em data-dcnode-id="1609"><strong data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">at that time</span></strong></em><span data-dcnode-id="1608" instrument_node="">, from the physical city to its spiritual antitype. Revelation 11: 15 seems to contradict this, and ignored is the following passage of Scripture, from the </span><em data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">New World Translation</span></em><span data-dcnode-id="1605" instrument_node="">, found in Hebrews 12:18 – 24:</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p class="scripture" data-dcnode-id="1600"><em data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">“For YOU have not approached that which can be felt and which has been set aflame with fire, and a dark cloud and a thick darkness and a tempest, and the blare of a trumpet and the voice of words; on hearing which voice the people implored that no word be added to them: ‘And if a beast touches that mountain, it must be stoned.’ Also, the display was so fearsome that Moses said: ‘I am fearful and trembling.’ But YOU have approached a Mount Zion and a city of [the] living God, heavenly Jerusalem, and myriads of angels, in general assembly, and to the congregation of the firstborn who have been enrolled in the heavens, and God the Judge of all, and all the spiritual lives (‘spirits’, N.I.V., N.A.S.B., R.S.V., K.J.V., G.N.B., Barclay, R.V., N.E.B., J.N.D., J.B., Emphatic Diaglott, K.I.T. Interlinear, Berkeley, Living, Amplified, N.K.J.V., N.L.T.) of righteous ones who have been made perfect, and Jesus, the mediator of a new covenant, and the blood of sprinkling, which speaks in a better way than Abel’s [blood].”</span></em></p><span data-dcnode-id="1599" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1596"><strong data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Notice two things;</span></strong></p><span data-dcnode-id="1595" instrument_node="">
