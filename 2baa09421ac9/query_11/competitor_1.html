</span><h2 data-dcnode-id="2015"><span class="mw-headline" data-dcnode-id="2023" id="Seven_Treatises"><span data-dcnode-id="2024" instrument_node="">Seven Treatises</span></span><span class="mw-editsection" data-dcnode-id="2016"><span class="mw-editsection-bracket" data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">[</span></span><a data-dcnode-id="2019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DManichaean_scripture%26action%3Dedit%26section%3D1" title="Edit section: Seven Treatises"><span data-dcnode-id="2020" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="1997"><b data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Seven Treatises of Manichaeism</span></b><span data-dcnode-id="2011" instrument_node="">, sometimes also referred to as the Manichaean </span><a data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heptateuch" title="Heptateuch"><span data-dcnode-id="2010" instrument_node="">Heptateuch</span></a><span data-dcnode-id="2008" instrument_node="">,</span><sup class="reference" data-dcnode-id="2005" id="cite_ref-1"><a data-dcnode-id="2006" href="#cite_note-1"><span data-dcnode-id="2007" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2004" instrument_node=""> are seven scriptures personally written by the founder of </span><a data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manichaeism" title="Manichaeism"><span data-dcnode-id="2003" instrument_node="">Manichaeism</span></a><span data-dcnode-id="2001" instrument_node="">, </span><a data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mani_%28prophet%29" title="Mani (prophet)"><span data-dcnode-id="2000" instrument_node="">Mani</span></a><span data-dcnode-id="1998" instrument_node="">, and are the scriptures of Manichaeism. 
</span></p><p data-dcnode-id="1991"><span data-dcnode-id="1996" instrument_node="">Recognizing the shortcomings of the religions that preceded him, Mani was determined to create a world, unified religion. In Mani's view, the unity of religious thought in the past could only be achieved when the founders were alive. However, these founders did not write books themselves, and when they died, their disciples went their own way, leading their own religions into division and confusion. Mani said of Manichaeism "The religion I have chosen is ten times greater than any previous religion. First, unlike the previous religions, which were limited to one country and one language, my religion will be popular in every country, in all languages, and spread to the ends of the earth. Secondly, previous religions existed only when they had pure leaders, and once the leaders died, their religion immediately fell into chaos and their precepts and writings were neglected. But my religion, however, thanks to its living classics, its preachers, bishops, friars, and laymen, and thanks to its wisdom and writings, will endure to the end."</span><sup class="reference" data-dcnode-id="1993" id="cite_ref-:0_2-0"><a data-dcnode-id="1994" href="#cite_note-:0-2"><span data-dcnode-id="1995" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1992" instrument_node="">
</span></p><span data-dcnode-id="1990" instrument_node="">
</span><ol data-dcnode-id="1923"><li data-dcnode-id="1980"><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gospel_of_Mani" title="Gospel of Mani"><span data-dcnode-id="1989" instrument_node="">The Gospel of Mani</span></a><span data-dcnode-id="1987" instrument_node=""> may have been designed as a gospel of the gnostic type, perhaps intended to comment on or replace the </span><a class="mw-redirect" data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Good_news_%28Christianity%29" title="Good news (Christianity)"><span data-dcnode-id="1986" instrument_node="">Christian gospel</span></a><span data-dcnode-id="1984" instrument_node="">.</span><sup class="reference" data-dcnode-id="1981" id="cite_ref-3"><a data-dcnode-id="1982" href="#cite_note-3"><span data-dcnode-id="1983" instrument_node="">[3]</span></a></sup></li><span data-dcnode-id="1979" instrument_node="">

</span><h2 data-dcnode-id="1565"><span class="mw-headline" data-dcnode-id="1573" id="Shabuhragan"><span data-dcnode-id="1574" instrument_node="">Shabuhragan</span></span><span class="mw-editsection" data-dcnode-id="1566"><span class="mw-editsection-bracket" data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">[</span></span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DManichaean_scripture%26action%3Dedit%26section%3D4" title="Edit section: Shabuhragan"><span data-dcnode-id="1570" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1564" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="1558" role="note"><span data-dcnode-id="1561" instrument_node="">Main article: </span><a data-dcnode-id="1559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shabuhragan" title="Shabuhragan"><span data-dcnode-id="1560" instrument_node="">Shabuhragan</span></a></div><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1556" instrument_node="">The </span><i data-dcnode-id="1553"><a data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shabuhragan" title="Shabuhragan"><span data-dcnode-id="1555" instrument_node="">Shabuhragan</span></a></i><span data-dcnode-id="1552" instrument_node="">(</span><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_language" title="Persian language"><span data-dcnode-id="1551" instrument_node="">Persian</span></a><span data-dcnode-id="1549" instrument_node="">: </span><span data-dcnode-id="1547" dir="rtl" lang="fa"><span data-dcnode-id="1548" instrument_node="">شاپورگان</span></span><span data-dcnode-id="1546" instrument_node=""> </span><i data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Shāpuragān</span></i><span data-dcnode-id="1543" instrument_node="">), which means "[the] book of </span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shapur_I" title="Shapur I"><span data-dcnode-id="1542" instrument_node="">Shapur</span></a><span data-dcnode-id="1540" instrument_node="">", was a sacred book of the </span><a class="mw-redirect" data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manichaean" title="Manichaean"><span data-dcnode-id="1539" instrument_node="">Manichaean</span></a><span data-dcnode-id="1537" instrument_node=""> religion, written by the founder </span><a data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mani_%28prophet%29" title="Mani (prophet)"><span data-dcnode-id="1536" instrument_node="">Mani</span></a><span data-dcnode-id="1534" instrument_node=""> (c. 210–276 CE) himself, originally in </span><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_Persian" title="Middle Persian"><span data-dcnode-id="1533" instrument_node="">Middle Persian</span></a><span data-dcnode-id="1531" instrument_node="">, and dedicated to </span><a data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shapur_I" title="Shapur I"><span data-dcnode-id="1530" instrument_node="">Shapur I</span></a><span data-dcnode-id="1528" instrument_node=""> (c. 215–272 CE), the contemporary king of the </span><a class="mw-redirect" data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sassanid_Empire" title="Sassanid Empire"><span data-dcnode-id="1527" instrument_node=""> Sassanid Persian Empire</span></a><span data-dcnode-id="1525" instrument_node="">.  The book was designed to present to Shapur an outline of Mani's new religion, which united elements from </span><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zoroastrianism" title="Zoroastrianism"><span data-dcnode-id="1524" instrument_node="">Zoroastrianism</span></a><span data-dcnode-id="1522" instrument_node="">, </span><a data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christianity" title="Christianity"><span data-dcnode-id="1521" instrument_node="">Christianity</span></a><span data-dcnode-id="1519" instrument_node="">, and </span><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buddhism" title="Buddhism"><span data-dcnode-id="1518" instrument_node="">Buddhism</span></a><span data-dcnode-id="1516" instrument_node="">.  Original Middle Persian fragments were discovered at </span><a data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turpan" title="Turpan"><span data-dcnode-id="1515" instrument_node="">Turpan</span></a><span data-dcnode-id="1513" instrument_node="">, and quotations were brought in Arabic by </span><a class="mw-redirect" data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abu_Rayhan_Biruni" title="Abu Rayhan Biruni"><span data-dcnode-id="1512" instrument_node="">Biruni</span></a><span data-dcnode-id="1510" instrument_node="">: It is the only work of Mani's not written in Syriac</span><sup class="reference" data-dcnode-id="1507" id="cite_ref-17"><a data-dcnode-id="1508" href="#cite_note-17"><span data-dcnode-id="1509" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1506" instrument_node=""> This book is listed as one of the </span><a class="mw-redirect" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seven_treatises_of_Manichaeism" title="Seven treatises of Manichaeism"><span data-dcnode-id="1505" instrument_node="">seven treatises of Manichaeism</span></a><span data-dcnode-id="1503" instrument_node=""> in </span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arabic" title="Arabic"><span data-dcnode-id="1502" instrument_node="">Arabic</span></a><span data-dcnode-id="1500" instrument_node=""> historical sources, but it is not among the seven treatises in the Manichaean account itself.</span><sup class="reference" data-dcnode-id="1497" id="cite_ref-:02_18-0"><a data-dcnode-id="1498" href="#cite_note-:02-18"><span data-dcnode-id="1499" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="1494" id="cite_ref-:0z_19-0"><a data-dcnode-id="1495" href="#cite_note-:0z-19"><span data-dcnode-id="1496" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1493" instrument_node=""> The book was designed to present to Shapur an outline of Mani's new religion, which united elements from </span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zoroastrianism" title="Zoroastrianism"><span data-dcnode-id="1492" instrument_node="">Zoroastrianism</span></a><span data-dcnode-id="1490" instrument_node="">, </span><a data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christianity" title="Christianity"><span data-dcnode-id="1489" instrument_node="">Christianity</span></a><span data-dcnode-id="1487" instrument_node="">, and </span><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buddhism" title="Buddhism"><span data-dcnode-id="1486" instrument_node="">Buddhism</span></a><span data-dcnode-id="1484" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1477" style="white-space:nowrap;"><span data-dcnode-id="1483" instrument_node="">[</span><i data-dcnode-id="1479"><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1481" title="This claim needs references to reliable sources. (October 2021)"><span data-dcnode-id="1482" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1478" instrument_node="">]</span></sup><span data-dcnode-id="1476" instrument_node="">
</span></p><p data-dcnode-id="1445"><span data-dcnode-id="1474" instrument_node="">The </span><a data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_Persian" title="Middle Persian"><span data-dcnode-id="1473" instrument_node="">Middle Persian</span></a><span data-dcnode-id="1471" instrument_node=""> word for "Shabuhragan" is "dw bwn wzrg'y š'bwhrg'n", meaning "the two sutras dedicated to </span><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shapur_I" title="Shapur I"><span data-dcnode-id="1470" instrument_node="">Shabur</span></a><span data-dcnode-id="1468" instrument_node=""> "The Chinese translation is abbreviated as "two sutras". Mani wrote this book in Middle Persian and presented it to Shabur I, the king of Persia, as an outline of the teachings of </span><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manichaeism" title="Manichaeism"><span data-dcnode-id="1467" instrument_node="">Manichaeism</span></a><span data-dcnode-id="1465" instrument_node="">. In this book, Mani described his religion as the perfection and continuation of other existing religions, and called himself the "Sealed Prophet": "Throughout the generations, the apostles of God have never ceased to bring wisdom and work here. Thus, they came in one age through the Apostle </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gautama_Buddha" title="Gautama Buddha"><span data-dcnode-id="1464" instrument_node="">Buddha</span></a><span data-dcnode-id="1462" instrument_node=""> into the countries of India; in another, through the Apostle </span><a data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zoroaster" title="Zoroaster"><span data-dcnode-id="1461" instrument_node="">Zoroaster</span></a><span data-dcnode-id="1459" instrument_node=""> into Persia; and in another, through </span><a class="mw-redirect" data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus_Christ" title="Jesus Christ"><span data-dcnode-id="1458" instrument_node="">Jesus Christ</span></a><span data-dcnode-id="1456" instrument_node=""> into the West. After that, in this last age, the revelation came, which was prophesied to come to </span><a data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Babylon" title="Babylon"><span data-dcnode-id="1455" instrument_node="">Babylon</span></a><span data-dcnode-id="1453" instrument_node=""> through Myself, </span><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mani_%28prophet%29" title="Mani (prophet)"><span data-dcnode-id="1452" instrument_node="">Mani</span></a><span data-dcnode-id="1450" instrument_node="">, the apostle of the true God."</span><sup class="reference" data-dcnode-id="1447" id="cite_ref-:0z_19-1"><a data-dcnode-id="1448" href="#cite_note-:0z-19"><span data-dcnode-id="1449" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1446" instrument_node="">
</span></p><span data-dcnode-id="1444" instrument_node="">
</span><h2 data-dcnode-id="1434"><span class="mw-headline" data-dcnode-id="1442" id="Book_of_Pictures"><span data-dcnode-id="1443" instrument_node="">Book of Pictures</span></span><span class="mw-editsection" data-dcnode-id="1435"><span class="mw-editsection-bracket" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">[</span></span><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DManichaean_scripture%26action%3Dedit%26section%3D5" title="Edit section: Book of Pictures"><span data-dcnode-id="1439" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1433" instrument_node="">
</span><link data-dcnode-id="1432" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1428" role="note"><span data-dcnode-id="1431" instrument_node="">Main article: </span><a data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arzhang" title="Arzhang"><span data-dcnode-id="1430" instrument_node="">Arzhang</span></a></div><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1426" instrument_node="">The Book of Pictures is an atlas illustrating the dualism of light and dark in Manichaeism. It was drawn by Mani and used to explain the doctrine to illiterate people. At this point, Mani believes that his religion is more superior than the previous ones: "Indeed, all the apostles, my brothers who came before me, did not write a book. Their wisdom is just like mine. They did not paint their wisdom in the pictures like me."</span><sup class="reference" data-dcnode-id="1423" id="cite_ref-20"><a data-dcnode-id="1424" href="#cite_note-20"><span data-dcnode-id="1425" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1422" instrument_node="">The importance of the Book of Pictures is second only to the Seven Treatises. In the Parthian language, this collection is also called "Ādrhang".</span><sup class="reference" data-dcnode-id="1419" id="cite_ref-21"><a data-dcnode-id="1420" href="#cite_note-21"><span data-dcnode-id="1421" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1418" instrument_node=""> </span><sup class="reference" data-dcnode-id="1415" id="cite_ref-22"><a data-dcnode-id="1416" href="#cite_note-22"><span data-dcnode-id="1417" instrument_node="">[22]</span></a></sup><span data-dcnode-id="1414" instrument_node="">
</span></p><span data-dcnode-id="1412" instrument_node="">
