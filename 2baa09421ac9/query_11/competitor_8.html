</span><h3 data-dcnode-id="6036"><span class="mw-headline" data-dcnode-id="6044" id="Pakistan_and_India"><span data-dcnode-id="6045" instrument_node="">Pakistan and India</span></span><span class="mw-editsection" data-dcnode-id="6037"><span class="mw-editsection-bracket" data-dcnode-id="6042"><span data-dcnode-id="6043" instrument_node="">[</span></span><a data-dcnode-id="6040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D27" title="Edit section: Pakistan and India"><span data-dcnode-id="6041" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6038"><span data-dcnode-id="6039" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6035" instrument_node="">
</span><p data-dcnode-id="6010"><span data-dcnode-id="6034" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="6032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/All_India_Muslim_League" title="All India Muslim League"><span data-dcnode-id="6033" instrument_node="">All India Muslim League</span></a><span data-dcnode-id="6031" instrument_node=""> (AIML) was formed in </span><a data-dcnode-id="6029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dhaka" title="Dhaka"><span data-dcnode-id="6030" instrument_node="">Dhaka</span></a><span data-dcnode-id="6028" instrument_node=""> in 1906 by Muslims who were suspicious of the Hindu-majority </span><a data-dcnode-id="6026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_National_Congress" title="Indian National Congress"><span data-dcnode-id="6027" instrument_node="">Indian National Congress</span></a><span data-dcnode-id="6025" instrument_node="">. They complained that Muslim members did not have the same rights as Hindu members. A number of different scenarios were proposed at various times. This was fuelled by the British policy of "Divide and Rule", which they tried to bring upon every political situation. Among the first to make the demand for a separate state was the writer/philosopher </span><a class="mw-redirect" data-dcnode-id="6023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allama_Iqbal" title="Allama Iqbal"><span data-dcnode-id="6024" instrument_node="">Allama Iqbal</span></a><span data-dcnode-id="6022" instrument_node="">, who, in his presidential address to the 1930 convention of the Muslim League said that a separate nation for Muslims was essential in an otherwise </span><a class="mw-redirect" data-dcnode-id="6020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hindu" title="Hindu"><span data-dcnode-id="6021" instrument_node="">Hindu</span></a><span data-dcnode-id="6019" instrument_node="">-dominated subcontinent.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6012" style="white-space:nowrap;"><span data-dcnode-id="6018" instrument_node="">[</span><i data-dcnode-id="6014"><a data-dcnode-id="6015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6016" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="6017" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6013" instrument_node="">]</span></sup><span data-dcnode-id="6011" instrument_node="">
</span></p><p data-dcnode-id="5970"><span data-dcnode-id="6009" instrument_node="">After the dissolution of the </span><a data-dcnode-id="6007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Raj" title="British Raj"><span data-dcnode-id="6008" instrument_node="">British Raj</span></a><span data-dcnode-id="6006" instrument_node=""> in 1947, </span><a data-dcnode-id="6004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partition_of_India" title="Partition of India"><span data-dcnode-id="6005" instrument_node="">British India was partitioned</span></a><span data-dcnode-id="6003" instrument_node=""> into two new sovereign states—the </span><a data-dcnode-id="6001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dominion_of_India" title="Dominion of India"><span data-dcnode-id="6002" instrument_node="">Dominion of India</span></a><span data-dcnode-id="6000" instrument_node=""> and the </span><a data-dcnode-id="5998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dominion_of_Pakistan" title="Dominion of Pakistan"><span data-dcnode-id="5999" instrument_node="">Dominion of Pakistan</span></a><span data-dcnode-id="5997" instrument_node="">. In the resulting </span><a data-dcnode-id="5995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indo-Pakistani_War_of_1947%25E2%2580%25931948" title="Indo-Pakistani War of 1947–1948"><span data-dcnode-id="5996" instrument_node="">Indo-Pakistani War of 1947–1948</span></a><span data-dcnode-id="5994" instrument_node="">, up to 12.5 million people were displaced, with estimates of loss of life varying from several hundred thousand to a million.</span><sup class="reference" data-dcnode-id="5991" id="cite_ref-92"><a data-dcnode-id="5992" href="#cite_note-92"><span data-dcnode-id="5993" instrument_node="">[92]</span></a></sup><span data-dcnode-id="5990" instrument_node=""> India emerged as a </span><a data-dcnode-id="5988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secularism_in_India" title="Secularism in India"><span data-dcnode-id="5989" instrument_node="">secular nation</span></a><span data-dcnode-id="5987" instrument_node=""> with a </span><a data-dcnode-id="5985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hinduism_in_India" title="Hinduism in India"><span data-dcnode-id="5986" instrument_node="">Hindu majority</span></a><span data-dcnode-id="5984" instrument_node="">, while Pakistan was established as an </span><a data-dcnode-id="5982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_republic" title="Islamic republic"><span data-dcnode-id="5983" instrument_node="">Islamic republic</span></a><span data-dcnode-id="5981" instrument_node=""> with </span><a data-dcnode-id="5979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam_in_Pakistan" title="Islam in Pakistan"><span data-dcnode-id="5980" instrument_node="">Muslim majority</span></a><span data-dcnode-id="5978" instrument_node=""> population.</span><sup class="reference" data-dcnode-id="5975" id="cite_ref-Indian_Census_93-0"><a data-dcnode-id="5976" href="#cite_note-Indian_Census-93"><span data-dcnode-id="5977" instrument_node="">[93]</span></a></sup><sup class="reference" data-dcnode-id="5972" id="cite_ref-94"><a data-dcnode-id="5973" href="#cite_note-94"><span data-dcnode-id="5974" instrument_node="">[94]</span></a></sup><span data-dcnode-id="5971" instrument_node="">
</span></p><span data-dcnode-id="5969" instrument_node="">
</span><h3 data-dcnode-id="5959"><span class="mw-headline" data-dcnode-id="5967" id="Nigerian_conflict"><span data-dcnode-id="5968" instrument_node="">Nigerian conflict</span></span><span class="mw-editsection" data-dcnode-id="5960"><span class="mw-editsection-bracket" data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">[</span></span><a data-dcnode-id="5963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D28" title="Edit section: Nigerian conflict"><span data-dcnode-id="5964" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5961"><span data-dcnode-id="5962" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5958" instrument_node="">
</span><link data-dcnode-id="5957" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5953" role="note"><span data-dcnode-id="5956" instrument_node="">See also: </span><a data-dcnode-id="5954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religious_violence_in_Nigeria" title="Religious violence in Nigeria"><span data-dcnode-id="5955" instrument_node="">Religious violence in Nigeria</span></a></div><span data-dcnode-id="5952" instrument_node="">
</span><p data-dcnode-id="5942"><span data-dcnode-id="5951" instrument_node="">Inter-ethnic conflict in Nigeria has generally had a religious element. Riots against Igbo in 1953 and in the 1960s in the north were said to have been sparked by religious conflict. The riots against Igbo in the north in 1966 were said to have been inspired by radio reports of mistreatment of Muslims in the south.</span><sup class="reference" data-dcnode-id="5948" id="cite_ref-95"><a data-dcnode-id="5949" href="#cite_note-95"><span data-dcnode-id="5950" instrument_node="">[95]</span></a></sup><span data-dcnode-id="5947" instrument_node=""> A military coup d'état led by lower and middle-ranking officers, some of them Igbo, overthrew the NPC-NCNC dominated government. Prime Minister Balewa along with other northern and western government officials were assassinated during the coup. The coup was considered an Igbo plot to overthrow the northern dominated government. A counter-coup was launched by mostly northern troops. Between June and July there was a mass exodus of Ibo from the north and west. Over 1.3 million Ibo fled the neighboring regions in order to escape persecution as anti-Ibo riots increased. The aftermath of the anti-Ibo riots led many to believe that security could only be gained by separating from the North.</span><sup class="reference" data-dcnode-id="5944" id="cite_ref-96"><a data-dcnode-id="5945" href="#cite_note-96"><span data-dcnode-id="5946" instrument_node="">[96]</span></a></sup><span data-dcnode-id="5943" instrument_node="">
</span></p><p data-dcnode-id="5926"><span data-dcnode-id="5941" instrument_node="">In the 1980s, serious outbreaks between Christians and Muslims occurred in </span><a data-dcnode-id="5939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kafanchan" title="Kafanchan"><span data-dcnode-id="5940" instrument_node="">Kafanchan</span></a><span data-dcnode-id="5938" instrument_node=""> in southern </span><a data-dcnode-id="5936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kaduna_State" title="Kaduna State"><span data-dcnode-id="5937" instrument_node="">Kaduna State</span></a><span data-dcnode-id="5935" instrument_node=""> in a border area between the two religions.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5928" style="white-space:nowrap;"><span data-dcnode-id="5934" instrument_node="">[</span><i data-dcnode-id="5930"><a data-dcnode-id="5931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5932" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="5933" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5929" instrument_node="">]</span></sup><span data-dcnode-id="5927" instrument_node="">
</span></p><p data-dcnode-id="5910"><span data-dcnode-id="5925" instrument_node="">The </span><a data-dcnode-id="5923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2010_Jos_riots" title="2010 Jos riots"><span data-dcnode-id="5924" instrument_node="">2010 Jos riots</span></a><span data-dcnode-id="5922" instrument_node=""> saw clashes between Muslim herders against Christian farmers near the volatile city of </span><a data-dcnode-id="5920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jos" title="Jos"><span data-dcnode-id="5921" instrument_node="">Jos</span></a><span data-dcnode-id="5919" instrument_node="">, resulting in hundreds of casualties.</span><sup class="reference" data-dcnode-id="5916" id="cite_ref-97"><a data-dcnode-id="5917" href="#cite_note-97"><span data-dcnode-id="5918" instrument_node="">[97]</span></a></sup><span data-dcnode-id="5915" instrument_node=""> Officials estimated that 500 people were massacred in night-time raids by rampaging Muslim gangs.</span><sup class="reference" data-dcnode-id="5912" id="cite_ref-98"><a data-dcnode-id="5913" href="#cite_note-98"><span data-dcnode-id="5914" instrument_node="">[98]</span></a></sup><span data-dcnode-id="5911" instrument_node="">
</span></p><span data-dcnode-id="5909" instrument_node="">
</span><h3 data-dcnode-id="5899"><span class="mw-headline" data-dcnode-id="5907" id="Buddhist_uprising"><span data-dcnode-id="5908" instrument_node="">Buddhist uprising</span></span><span class="mw-editsection" data-dcnode-id="5900"><span class="mw-editsection-bracket" data-dcnode-id="5905"><span data-dcnode-id="5906" instrument_node="">[</span></span><a data-dcnode-id="5903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D29" title="Edit section: Buddhist uprising"><span data-dcnode-id="5904" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5901"><span data-dcnode-id="5902" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5898" instrument_node="">
</span><p data-dcnode-id="5877"><span data-dcnode-id="5897" instrument_node="">During the rule of the Catholic </span><a data-dcnode-id="5895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ngo_Dinh_Diem" title="Ngo Dinh Diem"><span data-dcnode-id="5896" instrument_node="">Ngo Dinh Diem</span></a><span data-dcnode-id="5894" instrument_node=""> in </span><a data-dcnode-id="5892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Vietnam" title="South Vietnam"><span data-dcnode-id="5893" instrument_node="">South Vietnam</span></a><span data-dcnode-id="5891" instrument_node="">, the discrimination against the majority Buddhist population generated the growth of Buddhist institutions as they sought to participate in national politics and gain better treatment. The </span><a data-dcnode-id="5889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buddhist_Uprising" title="Buddhist Uprising"><span data-dcnode-id="5890" instrument_node="">Buddhist Uprising</span></a><span data-dcnode-id="5888" instrument_node=""> of 1966 was a period of civil and military unrest in </span><a data-dcnode-id="5886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Vietnam" title="South Vietnam"><span data-dcnode-id="5887" instrument_node="">South Vietnam</span></a><span data-dcnode-id="5885" instrument_node="">, largely focused in the </span><a data-dcnode-id="5883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/I_Corps_%28South_Vietnam%29" title="I Corps (South Vietnam)"><span data-dcnode-id="5884" instrument_node="">I Corps</span></a><span data-dcnode-id="5882" instrument_node=""> area in the north of the country in central Vietnam.</span><sup class="reference" data-dcnode-id="5879" id="cite_ref-99"><a data-dcnode-id="5880" href="#cite_note-99"><span data-dcnode-id="5881" instrument_node="">[99]</span></a></sup><span data-dcnode-id="5878" instrument_node="">
</span></p><p data-dcnode-id="5848"><span data-dcnode-id="5876" instrument_node="">In a country where the Buddhist majority was estimated to be between 70 and 90 percent,</span><sup class="reference" data-dcnode-id="5873" id="cite_ref-100"><a data-dcnode-id="5874" href="#cite_note-100"><span data-dcnode-id="5875" instrument_node="">[100]</span></a></sup><sup class="reference" data-dcnode-id="5870" id="cite_ref-TIME1963_101-0"><a data-dcnode-id="5871" href="#cite_note-TIME1963-101"><span data-dcnode-id="5872" instrument_node="">[101]</span></a></sup><sup class="reference" data-dcnode-id="5867" id="cite_ref-102"><a data-dcnode-id="5868" href="#cite_note-102"><span data-dcnode-id="5869" instrument_node="">[102]</span></a></sup><sup class="reference" data-dcnode-id="5864" id="cite_ref-103"><a data-dcnode-id="5865" href="#cite_note-103"><span data-dcnode-id="5866" instrument_node="">[103]</span></a></sup><sup class="reference" data-dcnode-id="5861" id="cite_ref-PentagonPapers_104-0"><a data-dcnode-id="5862" href="#cite_note-PentagonPapers-104"><span data-dcnode-id="5863" instrument_node="">[104]</span></a></sup><span data-dcnode-id="5860" instrument_node=""> Diem ruled with a strong religious bias. As a member of the </span><a class="mw-redirect" data-dcnode-id="5858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Catholicism_in_Vietnam" title="Roman Catholicism in Vietnam"><span data-dcnode-id="5859" instrument_node="">Catholic Vietnamese</span></a><span data-dcnode-id="5857" instrument_node=""> minority, he pursued pro-Catholic policies that antagonized many Buddhists.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5850" style="white-space:nowrap;"><span data-dcnode-id="5856" instrument_node="">[</span><i data-dcnode-id="5852"><a data-dcnode-id="5853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5854" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="5855" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5851" instrument_node="">]</span></sup><span data-dcnode-id="5849" instrument_node="">
</span></p><span data-dcnode-id="5847" instrument_node="">
</span><h3 data-dcnode-id="5837"><span class="mw-headline" data-dcnode-id="5845" id="Chinese_conflict"><span data-dcnode-id="5846" instrument_node="">Chinese conflict</span></span><span class="mw-editsection" data-dcnode-id="5838"><span class="mw-editsection-bracket" data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">[</span></span><a data-dcnode-id="5841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D30" title="Edit section: Chinese conflict"><span data-dcnode-id="5842" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5839"><span data-dcnode-id="5840" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5836" instrument_node="">
</span><p data-dcnode-id="5810"><span data-dcnode-id="5835" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="5833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dungan_revolt_%281862%25E2%2580%25931877%29" title="Dungan revolt (1862–1877)"><span data-dcnode-id="5834" instrument_node="">Dungan revolt (1862–1877)</span></a><span data-dcnode-id="5832" instrument_node=""> and </span><a data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panthay_Rebellion" title="Panthay Rebellion"><span data-dcnode-id="5831" instrument_node="">Panthay Rebellion</span></a><span data-dcnode-id="5829" instrument_node=""> (1856–1873) by the </span><a data-dcnode-id="5827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hui_people" title="Hui people"><span data-dcnode-id="5828" instrument_node="">Hui</span></a><span data-dcnode-id="5826" instrument_node=""> were also set off by racial antagonism and class warfare, rather than the mistaken assumption that it was all due to Islam that the rebellions broke out.</span><sup class="reference" data-dcnode-id="5823" id="cite_ref-105"><a data-dcnode-id="5824" href="#cite_note-105"><span data-dcnode-id="5825" instrument_node="">[105]</span></a></sup><span data-dcnode-id="5822" instrument_node=""> During the Dungan revolt fighting broke out between </span><a data-dcnode-id="5820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uyghurs" title="Uyghurs"><span data-dcnode-id="5821" instrument_node="">Uyghurs</span></a><span data-dcnode-id="5819" instrument_node=""> and Hui.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5812" style="white-space:nowrap;"><span data-dcnode-id="5818" instrument_node="">[</span><i data-dcnode-id="5814"><a data-dcnode-id="5815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5816" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="5817" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5813" instrument_node="">]</span></sup><span data-dcnode-id="5811" instrument_node="">
</span></p><p data-dcnode-id="5792"><span data-dcnode-id="5809" instrument_node="">In 1936, after Sheng Shicai </span><a data-dcnode-id="5807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kazakh_exodus_from_Xinjiang" title="Kazakh exodus from Xinjiang"><span data-dcnode-id="5808" instrument_node="">expelled 20,000 Kazakhs from Xinjiang to Qinghai</span></a><span data-dcnode-id="5806" instrument_node="">, the Hui led by General </span><a data-dcnode-id="5804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ma_Bufang" title="Ma Bufang"><span data-dcnode-id="5805" instrument_node="">Ma Bufang</span></a><span data-dcnode-id="5803" instrument_node=""> massacred their fellow Muslims, the </span><a data-dcnode-id="5801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kazakhs" title="Kazakhs"><span data-dcnode-id="5802" instrument_node="">Kazakhs</span></a><span data-dcnode-id="5800" instrument_node="">, until there were only 135 of them left.</span><sup class="reference" data-dcnode-id="5797" id="cite_ref-106"><a data-dcnode-id="5798" href="#cite_note-106"><span data-dcnode-id="5799" instrument_node="">[106]</span></a></sup><sup class="reference" data-dcnode-id="5794" id="cite_ref-107"><a data-dcnode-id="5795" href="#cite_note-107"><span data-dcnode-id="5796" instrument_node="">[107]</span></a></sup><span data-dcnode-id="5793" instrument_node="">
</span></p><p data-dcnode-id="5765"><span data-dcnode-id="5791" instrument_node="">Tensions with Uyghurs and Hui arose because Qing and Republican Chinese authorities used Hui troops and officials to dominate the Uyghurs and crush Uyghur revolts.</span><sup class="reference" data-dcnode-id="5788" id="cite_ref-108"><a data-dcnode-id="5789" href="#cite_note-108"><span data-dcnode-id="5790" instrument_node="">[108]</span></a></sup><span data-dcnode-id="5787" instrument_node=""> Xinjiang's Hui population increased by over 520 percent between 1940 and 1982, an average annual growth rate of 4.4 percent, while the Uyghur population only grew by 1.7 percent. This dramatic increase in the Hui population led inevitably to significant tensions between the Hui and Uyghur Muslim populations. Some old Uyghurs in </span><a data-dcnode-id="5785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kashgar" title="Kashgar"><span data-dcnode-id="5786" instrument_node="">Kashgar</span></a><span data-dcnode-id="5784" instrument_node=""> remember that the Hui army at the </span><a data-dcnode-id="5782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Kashgar_%281934%29" title="Battle of Kashgar (1934)"><span data-dcnode-id="5783" instrument_node="">Battle of Kashgar (1934)</span></a><span data-dcnode-id="5781" instrument_node=""> massacred 2,000 to 8,000 Uyghurs, which caused tension as more Hui moved into Kashgar from other parts of China.</span><sup class="reference" data-dcnode-id="5778" id="cite_ref-109"><a data-dcnode-id="5779" href="#cite_note-109"><span data-dcnode-id="5780" instrument_node="">[109]</span></a></sup><span data-dcnode-id="5777" instrument_node=""> Some Hui criticize </span><a class="mw-redirect" data-dcnode-id="5775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uyghur_separatism" title="Uyghur separatism"><span data-dcnode-id="5776" instrument_node="">Uyghur separatism</span></a><span data-dcnode-id="5774" instrument_node="">, and generally do not want to get involved in conflicts in other countries over Islam for fear of being perceived as radical.</span><sup class="reference" data-dcnode-id="5771" id="cite_ref-Van_Wie_Davis_110-0"><a data-dcnode-id="5772" href="#cite_note-Van_Wie_Davis-110"><span data-dcnode-id="5773" instrument_node="">[110]</span></a></sup><span data-dcnode-id="5770" instrument_node=""> Hui and Uyghur live apart from each other, praying separately and attending different mosques.</span><sup class="reference" data-dcnode-id="5767" id="cite_ref-111"><a data-dcnode-id="5768" href="#cite_note-111"><span data-dcnode-id="5769" instrument_node="">[111]</span></a></sup><span data-dcnode-id="5766" instrument_node="">
</span></p><span data-dcnode-id="5764" instrument_node="">
</span><h3 data-dcnode-id="5754"><span class="mw-headline" data-dcnode-id="5762" id="Lebanese_Civil_War"><span data-dcnode-id="5763" instrument_node="">Lebanese Civil War</span></span><span class="mw-editsection" data-dcnode-id="5755"><span class="mw-editsection-bracket" data-dcnode-id="5760"><span data-dcnode-id="5761" instrument_node="">[</span></span><a data-dcnode-id="5758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D31" title="Edit section: Lebanese Civil War"><span data-dcnode-id="5759" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5756"><span data-dcnode-id="5757" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5753" instrument_node="">

nstrument_node="">

</span><div class="thumb tright" data-dcnode-id="5694"><div class="thumbinner" data-dcnode-id="5695" style="width:222px;"><a class="image" data-dcnode-id="5701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABeirut-_building_from_before_civil_war.jpeg"><img alt="" class="thumbimage" data-dcnode-id="5702" data-file-height="2048" data-file-width="3072" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/11/Beirut-_building_from_before_civil_war.jpeg/220px-Beirut-_building_from_before_civil_war.jpeg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/11/Beirut-_building_from_before_civil_war.jpeg/330px-Beirut-_building_from_before_civil_war.jpeg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/11/Beirut-_building_from_before_civil_war.jpeg/440px-Beirut-_building_from_before_civil_war.jpeg 2x" width="220"></a><span data-dcnode-id="5700" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5696"><div class="magnify" data-dcnode-id="5698"><a class="internal" data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABeirut-_building_from_before_civil_war.jpeg" title="Enlarge"></a></div><span data-dcnode-id="5697" instrument_node="">War-damaged buildings in Beirut</span></div></div></div><span data-dcnode-id="5693" instrument_node="">
</span><p data-dcnode-id="5664"><span data-dcnode-id="5692" instrument_node="">There is no consensus among scholars on what triggered the </span><a data-dcnode-id="5690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lebanese_Civil_War" title="Lebanese Civil War"><span data-dcnode-id="5691" instrument_node="">Lebanese Civil War</span></a><span data-dcnode-id="5689" instrument_node=""> (1975–1990). However, the militarization of the </span><a class="mw-redirect" data-dcnode-id="5687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palestinian_refugee" title="Palestinian refugee"><span data-dcnode-id="5688" instrument_node="">Palestinian refugee</span></a><span data-dcnode-id="5686" instrument_node=""> population, along with the arrival of the </span><a class="mw-redirect" data-dcnode-id="5684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PLO" title="PLO"><span data-dcnode-id="5685" instrument_node="">PLO</span></a><span data-dcnode-id="5683" instrument_node=""> guerrilla forces, sparked an </span><a data-dcnode-id="5681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arms_race" title="Arms race"><span data-dcnode-id="5682" instrument_node="">arms race</span></a><span data-dcnode-id="5680" instrument_node=""> for the different </span><a data-dcnode-id="5678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lebanon" title="Lebanon"><span data-dcnode-id="5679" instrument_node="">Lebanese</span></a><span data-dcnode-id="5677" instrument_node=""> political factions. However, the conflict played out along three religious lines: </span><a class="mw-redirect" data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sunni_Muslim" title="Sunni Muslim"><span data-dcnode-id="5676" instrument_node="">Sunni Muslim</span></a><span data-dcnode-id="5674" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_Lebanese" title="Christian Lebanese"><span data-dcnode-id="5673" instrument_node="">Christian Lebanese</span></a><span data-dcnode-id="5671" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shiite_Muslim" title="Shiite Muslim"><span data-dcnode-id="5670" instrument_node="">Shiite Muslim</span></a><span data-dcnode-id="5668" instrument_node="">, </span><a data-dcnode-id="5666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Druze" title="Druze"><span data-dcnode-id="5667" instrument_node="">Druze</span></a><span data-dcnode-id="5665" instrument_node=""> are considered among Shiite Muslims.
</span></p><p data-dcnode-id="5641"><span data-dcnode-id="5663" instrument_node="">It has been argued that the antecedents of the war can be traced back to the conflicts and political compromises reached after the end of Lebanon's administration by the </span><a data-dcnode-id="5661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_Empire" title="Ottoman Empire"><span data-dcnode-id="5662" instrument_node="">Ottoman Empire</span></a><span data-dcnode-id="5660" instrument_node="">. The </span><a data-dcnode-id="5658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="5659" instrument_node="">Cold War</span></a><span data-dcnode-id="5657" instrument_node=""> had a powerful disintegrative effect on Lebanon, which was closely linked to the </span><a class="mw-redirect" data-dcnode-id="5655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polarization_%28politics%29" title="Polarization (politics)"><span data-dcnode-id="5656" instrument_node="">polarization</span></a><span data-dcnode-id="5654" instrument_node=""> that preceded the </span><a data-dcnode-id="5652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1958_Lebanon_crisis" title="1958 Lebanon crisis"><span data-dcnode-id="5653" instrument_node="">1958 political crisis</span></a><span data-dcnode-id="5651" instrument_node="">. During the </span><a data-dcnode-id="5649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1948_Arab%25E2%2580%2593Israeli_War" title="1948 Arab–Israeli War"><span data-dcnode-id="5650" instrument_node="">1948 Arab–Israeli War</span></a><span data-dcnode-id="5648" instrument_node="">, an exodus of </span><a data-dcnode-id="5646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palestinian_refugees" title="Palestinian refugees"><span data-dcnode-id="5647" instrument_node="">Palestinian refugees</span></a><span data-dcnode-id="5645" instrument_node="">, who </span><a data-dcnode-id="5643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1948_Palestinian_exodus" title="1948 Palestinian exodus"><span data-dcnode-id="5644" instrument_node="">fled the fighting or were expelled from their homes</span></a><span data-dcnode-id="5642" instrument_node="">, arrived in Lebanon. Palestinians came to play a very important role in future Lebanese civil conflicts, and the establishment of Israel radically changed the local environment in which Lebanon found itself.
</span></p><p data-dcnode-id="5633"><span data-dcnode-id="5640" instrument_node="">Lebanon was promised independence, which was achieved on 22 November 1943. </span><a data-dcnode-id="5638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_France" title="Free France"><span data-dcnode-id="5639" instrument_node="">Free French</span></a><span data-dcnode-id="5637" instrument_node=""> troops, who had invaded Lebanon in 1941 to rid Beirut of the </span><a data-dcnode-id="5635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vichy_France" title="Vichy France"><span data-dcnode-id="5636" instrument_node="">Vichy French</span></a><span data-dcnode-id="5634" instrument_node=""> forces, left the country in 1946. The Christians assumed power over the country and its economy. A confessional Parliament was created in which Muslims and Christians were given quotas of seats. As well, the president was to be a Christian, the prime minister a Sunni Muslim and the speaker of Parliament a Shia Muslim.
</span></p><p data-dcnode-id="5622"><span data-dcnode-id="5632" instrument_node="">In March 1991, Parliament passed an </span><a data-dcnode-id="5630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_law" title="Amnesty law"><span data-dcnode-id="5631" instrument_node="">amnesty law</span></a><span data-dcnode-id="5629" instrument_node=""> that pardoned all political crimes prior to its enactment. The amnesty was not extended to crimes perpetrated against foreign diplomats or certain crimes referred by the cabinet to the Higher Judicial Council. In May 1991, the militias (with the important exception of </span><a data-dcnode-id="5627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hezbollah" title="Hezbollah"><span data-dcnode-id="5628" instrument_node="">Hezbollah</span></a><span data-dcnode-id="5626" instrument_node="">) were dissolved, and the </span><a data-dcnode-id="5624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lebanese_Armed_Forces" title="Lebanese Armed Forces"><span data-dcnode-id="5625" instrument_node="">Lebanese Armed Forces</span></a><span data-dcnode-id="5623" instrument_node=""> began slowly to rebuild themselves as Lebanon's only major non-sectarian institution.
</span></p><p data-dcnode-id="5614"><span data-dcnode-id="5621" instrument_node="">Some violence still occurred. In late December 1991 a car bomb (estimated to carry 220 pounds of TNT) exploded in the Muslim neighborhood of </span><a class="new" data-dcnode-id="5619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBasta%2C_Lebanon%26action%3Dedit%26redlink%3D1" title="Basta, Lebanon (page does not exist)"><span data-dcnode-id="5620" instrument_node="">Basta</span></a><span data-dcnode-id="5618" instrument_node="">. At least 30 people were killed, and 120 wounded, including former Prime Minister </span><a data-dcnode-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shafik_Wazzan" title="Shafik Wazzan"><span data-dcnode-id="5617" instrument_node="">Shafik Wazzan</span></a><span data-dcnode-id="5615" instrument_node="">, who was riding in a bulletproof car.
</span></p><span data-dcnode-id="5613" instrument_node="">
</span><h3 data-dcnode-id="5602"><span data-dcnode-id="5612" id="Iran.E2.80.93Iraq_War"></span><span class="mw-headline" data-dcnode-id="5610" id="Iran–Iraq_War"><span data-dcnode-id="5611" instrument_node="">Iran–Iraq War</span></span><span class="mw-editsection" data-dcnode-id="5603"><span class="mw-editsection-bracket" data-dcnode-id="5608"><span data-dcnode-id="5609" instrument_node="">[</span></span><a data-dcnode-id="5606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D32" title="Edit section: Iran–Iraq War"><span data-dcnode-id="5607" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5604"><span data-dcnode-id="5605" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5601" instrument_node="">
</span><p data-dcnode-id="5502"><span data-dcnode-id="5600" instrument_node="">In the case of the </span><a data-dcnode-id="5598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran%25E2%2580%2593Iraq_War" title="Iran–Iraq War"><span data-dcnode-id="5599" instrument_node="">Iran–Iraq War</span></a><span data-dcnode-id="5597" instrument_node=""> (1980–1988), the new </span><a data-dcnode-id="5595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_Revolution" title="Iranian Revolution"><span data-dcnode-id="5596" instrument_node="">revolutionary</span></a><span data-dcnode-id="5594" instrument_node=""> government of the </span><a class="mw-redirect" data-dcnode-id="5592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_Republic_of_Iran" title="Islamic Republic of Iran"><span data-dcnode-id="5593" instrument_node="">Islamic Republic of Iran</span></a><span data-dcnode-id="5591" instrument_node=""> generally described the conflict as a religious war,</span><sup class="reference" data-dcnode-id="5588" id="cite_ref-Asadzade_112-0"><a data-dcnode-id="5589" href="#cite_note-Asadzade-112"><span data-dcnode-id="5590" instrument_node="">[112]</span></a></sup><span data-dcnode-id="5587" instrument_node=""> and used the narrative of </span><i data-dcnode-id="5584"><a data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jihad" title="Jihad"><span data-dcnode-id="5586" instrument_node="">jihad</span></a></i><span data-dcnode-id="5583" instrument_node=""> to recruit, mobilise and motivate its troops.</span><sup class="reference" data-dcnode-id="5580" id="cite_ref-Asadzade_112-1"><a data-dcnode-id="5581" href="#cite_note-Asadzade-112"><span data-dcnode-id="5582" instrument_node="">[112]</span></a></sup><sup class="reference" data-dcnode-id="5577" id="cite_ref-Johnsen_113-0"><a data-dcnode-id="5578" href="#cite_note-Johnsen-113"><span data-dcnode-id="5579" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5574"><span data-dcnode-id="5575" title="Location: 9:24, 16:05"><span data-dcnode-id="5576" instrument_node="">: 9:24, 16:05 </span></span></sup><span data-dcnode-id="5573" instrument_node=""> On the other hand, justifications from the </span><a data-dcnode-id="5571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saddam_Hussein" title="Saddam Hussein"><span data-dcnode-id="5572" instrument_node="">Saddam Hussein</span></a><span data-dcnode-id="5570" instrument_node="">-led </span><a data-dcnode-id="5568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ba%2527athist_Iraq" title="Ba'athist Iraq"><span data-dcnode-id="5569" instrument_node="">Ba'athist Iraq</span></a><span data-dcnode-id="5567" instrument_node=""> were mostly framed in terms of a supposed Persian–Arab historical emnity, and Iraq-centred </span><a data-dcnode-id="5565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_nationalism" title="Arab nationalism"><span data-dcnode-id="5566" instrument_node="">Arab nationalism</span></a><span data-dcnode-id="5564" instrument_node=""> (including support for </span><a data-dcnode-id="5562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_separatism_in_Khuzestan" title="Arab separatism in Khuzestan"><span data-dcnode-id="5563" instrument_node="">Arab separatism in Khuzestan</span></a><span data-dcnode-id="5561" instrument_node="">).</span><sup class="reference" data-dcnode-id="5558" id="cite_ref-Asadzade_112-2"><a data-dcnode-id="5559" href="#cite_note-Asadzade-112"><span data-dcnode-id="5560" instrument_node="">[112]</span></a></sup><span data-dcnode-id="5557" instrument_node=""> Some of the underlying motives of Saddam appear to have been </span><a data-dcnode-id="5555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shatt_al-Arab_dispute" title="Shatt al-Arab dispute"><span data-dcnode-id="5556" instrument_node="">controlling the Shatt al-Arab waterway and region</span></a><span data-dcnode-id="5554" instrument_node=""> (previously settled by the </span><a data-dcnode-id="5552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1975_Algiers_Agreement" title="1975 Algiers Agreement"><span data-dcnode-id="5553" instrument_node="">1975 Algiers Agreement</span></a><span data-dcnode-id="5551" instrument_node="">, which had ended </span><a data-dcnode-id="5549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pahlavi_Iran" title="Pahlavi Iran"><span data-dcnode-id="5550" instrument_node="">Imperial Iranian</span></a><span data-dcnode-id="5548" instrument_node=""> support for the </span><a data-dcnode-id="5546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Iraqi%25E2%2580%2593Kurdish_War" title="Second Iraqi–Kurdish War"><span data-dcnode-id="5547" instrument_node="">1974–75 Kurdish rebellion against the Iraqi government</span></a><sup class="reference" data-dcnode-id="5543" id="cite_ref-Johnsen_113-1"><a data-dcnode-id="5544" href="#cite_note-Johnsen-113"><span data-dcnode-id="5545" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5540"><span data-dcnode-id="5541" title="Location: 3:27"><span data-dcnode-id="5542" instrument_node="">: 3:27 </span></span></sup><span data-dcnode-id="5539" instrument_node="">), obtaining access to the </span><a data-dcnode-id="5537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Politics_of_Khuzestan_Province" title="Politics of Khuzestan Province"><span data-dcnode-id="5538" instrument_node="">oil reserves in Khuzestan</span></a><span data-dcnode-id="5536" instrument_node="">, and exploiting </span><a data-dcnode-id="5534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consolidation_of_the_Iranian_Revolution" title="Consolidation of the Iranian Revolution"><span data-dcnode-id="5535" instrument_node="">the instability of post-Revolution Iran</span></a><span data-dcnode-id="5533" instrument_node="">, including the failed </span><a data-dcnode-id="5531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1979_Khuzestan_insurgency" title="1979 Khuzestan insurgency"><span data-dcnode-id="5532" instrument_node="">1979 Khuzestan insurgency</span></a><span data-dcnode-id="5530" instrument_node="">.</span><sup class="reference" data-dcnode-id="5527" id="cite_ref-Johnsen_113-2"><a data-dcnode-id="5528" href="#cite_note-Johnsen-113"><span data-dcnode-id="5529" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5524"><span data-dcnode-id="5525" title="Location: 3:06"><span data-dcnode-id="5526" instrument_node="">: 3:06 </span></span></sup><span data-dcnode-id="5523" instrument_node=""> Peyman Asadzade (2019) stated: 'Although the evidence suggests that religious motivations by no means contributed to Saddam's decision to </span><a data-dcnode-id="5521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraqi_invasion_of_Iran" title="Iraqi invasion of Iran"><span data-dcnode-id="5522" instrument_node="">launch the war</span></a><span data-dcnode-id="5520" instrument_node="">, an overview of the Iranian leaders' speeches and martyrs' statements reveals that religion significantly motivated people to take part in the war. (...) The Iranian leadership painted the war as a battle between believers and unbelievers, Muslims and infidels, and the true and the false.'</span><sup class="reference" data-dcnode-id="5517" id="cite_ref-Asadzade_112-3"><a data-dcnode-id="5518" href="#cite_note-Asadzade-112"><span data-dcnode-id="5519" instrument_node="">[112]</span></a></sup><span data-dcnode-id="5516" instrument_node=""> Iran cited religious reasons to justify continuing combat operations, for example in the face of Saddam's offer of peace in mid-1982, rejected by </span><a data-dcnode-id="5514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruhollah_Khomeini" title="Ruhollah Khomeini"><span data-dcnode-id="5515" instrument_node="">Ayatollah Khomeini</span></a><span data-dcnode-id="5513" instrument_node="">'s declaration that the war would not end until Iran had defeated the Ba'athist regime and replaced it with an </span><a data-dcnode-id="5511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_republic" title="Islamic republic"><span data-dcnode-id="5512" instrument_node="">Islamic republic</span></a><span data-dcnode-id="5510" instrument_node="">.</span><sup class="reference" data-dcnode-id="5507" id="cite_ref-Johnsen_113-3"><a data-dcnode-id="5508" href="#cite_note-Johnsen-113"><span data-dcnode-id="5509" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5504"><span data-dcnode-id="5505" title="Location: 8:16"><span data-dcnode-id="5506" instrument_node="">: 8:16 </span></span></sup><span data-dcnode-id="5503" instrument_node="">
</span></p><p data-dcnode-id="5423"><span data-dcnode-id="5501" instrument_node="">While Ba'athist Iraq has sometimes been described as a 'secular dictatorship' before the war, and therefore in ideological conflict with the Shia Islamic '</span><a data-dcnode-id="5499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theocracy" title="Theocracy"><span data-dcnode-id="5500" instrument_node="">theocracy</span></a><span data-dcnode-id="5498" instrument_node="">' which seized control of Iran in 1979,</span><sup class="reference" data-dcnode-id="5495" id="cite_ref-Johnsen_113-4"><a data-dcnode-id="5496" href="#cite_note-Johnsen-113"><span data-dcnode-id="5497" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5492"><span data-dcnode-id="5493" title="Location: 3:40"><span data-dcnode-id="5494" instrument_node="">: 3:40 </span></span></sup><span data-dcnode-id="5491" instrument_node=""> Iraq also launched the so-called </span><a data-dcnode-id="5487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tawakalna_ala_Allah_Operations" title="Tawakalna ala Allah Operations"><i data-dcnode-id="5489"><span data-dcnode-id="5490" instrument_node="">Tawakalna ala Allah</span></i><span data-dcnode-id="5488" instrument_node=""> ("Trust in God") Operations</span></a><span data-dcnode-id="5486" instrument_node=""> (April–July 1988) in the final stages of the war.</span><sup class="reference" data-dcnode-id="5483" id="cite_ref-Johnsen_113-5"><a data-dcnode-id="5484" href="#cite_note-Johnsen-113"><span data-dcnode-id="5485" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5480"><span data-dcnode-id="5481" title="Location: 16:05"><span data-dcnode-id="5482" instrument_node="">: 16:05 </span></span></sup><span data-dcnode-id="5479" instrument_node=""> Moreover, the </span><a data-dcnode-id="5477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anfal_campaign" title="Anfal campaign"><span data-dcnode-id="5478" instrument_node="">Anfal campaign</span></a><span data-dcnode-id="5476" instrument_node=""> (1986–1989; in strict sense February–September 1988) was code-named after </span><a data-dcnode-id="5474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al-Anfal" title="Al-Anfal"><span data-dcnode-id="5475" instrument_node="">Al-Anfal</span></a><span data-dcnode-id="5473" instrument_node="">, the eighth </span><a class="mw-redirect" data-dcnode-id="5471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sura" title="Sura"><span data-dcnode-id="5472" instrument_node="">sura</span></a><span data-dcnode-id="5470" instrument_node=""> of the </span><a class="mw-redirect" data-dcnode-id="5468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qur%2527an" title="Qur'an"><span data-dcnode-id="5469" instrument_node="">Qur'an</span></a><span data-dcnode-id="5467" instrument_node=""> which narrates the triumph of 313 followers of the new Muslim faith over almost 900 </span><a class="mw-redirect" data-dcnode-id="5465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pagan" title="Pagan"><span data-dcnode-id="5466" instrument_node="">pagans</span></a><span data-dcnode-id="5464" instrument_node=""> at the </span><a data-dcnode-id="5462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Badr" title="Battle of Badr"><span data-dcnode-id="5463" instrument_node="">Battle of Badr</span></a><span data-dcnode-id="5461" instrument_node=""> in the year 624.</span><sup class="reference" data-dcnode-id="5458" id="cite_ref-knowledge_114-0"><a data-dcnode-id="5459" href="#cite_note-knowledge-114"><span data-dcnode-id="5460" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5457" instrument_node=""> "Al Anfal" literally means </span><i data-dcnode-id="5455"><span data-dcnode-id="5456" instrument_node="">the spoils (of war)</span></i><span data-dcnode-id="5454" instrument_node=""> and was used to describe the military campaign of extermination and looting commanded by </span><a data-dcnode-id="5452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ali_Hassan_al-Majid" title="Ali Hassan al-Majid"><span data-dcnode-id="5453" instrument_node="">Ali Hassan al-Majid</span></a><span data-dcnode-id="5451" instrument_node=""> (also known as "Chemical Ali").</span><sup class="reference" data-dcnode-id="5448" id="cite_ref-knowledge_114-1"><a data-dcnode-id="5449" href="#cite_note-knowledge-114"><span data-dcnode-id="5450" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5447" instrument_node=""> His orders informed </span><i data-dcnode-id="5444"><a data-dcnode-id="5445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jash_%28term%29" title="Jash (term)"><span data-dcnode-id="5446" instrument_node="">jash</span></a></i><span data-dcnode-id="5443" instrument_node=""> (Kurdish collaborators with the Baathists, literally "donkey's foal" in </span><a class="mw-redirect" data-dcnode-id="5441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurdish_language" title="Kurdish language"><span data-dcnode-id="5442" instrument_node="">Kurdish</span></a><span data-dcnode-id="5440" instrument_node="">) units that taking cattle, sheep, goats, money, weapons and even women as spoils of war was </span><i data-dcnode-id="5437"><a data-dcnode-id="5438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Halal" title="Halal"><span data-dcnode-id="5439" instrument_node="">halal</span></a></i><span data-dcnode-id="5436" instrument_node=""> (religiously permitted or legal).</span><sup class="reference" data-dcnode-id="5433" id="cite_ref-knowledge_114-2"><a data-dcnode-id="5434" href="#cite_note-knowledge-114"><span data-dcnode-id="5435" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5432" instrument_node=""> Randal (1998, 2019) argued that 'Al Anfal' was 'a curious nod to Islam' by the Ba'athist government, because it had originally been known as a 'militantly secular regime'.</span><sup class="reference" data-dcnode-id="5429" id="cite_ref-knowledge_114-3"><a data-dcnode-id="5430" href="#cite_note-knowledge-114"><span data-dcnode-id="5431" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5428" instrument_node=""> Some commentators have concluded that the code name was meant to serve as 'a religious justification' for the campaign against the Kurds.</span><sup class="reference" data-dcnode-id="5425" id="cite_ref-115"><a data-dcnode-id="5426" href="#cite_note-115"><span data-dcnode-id="5427" instrument_node="">[115]</span></a></sup><span data-dcnode-id="5424" instrument_node="">
</span></p><span data-dcnode-id="5422" instrument_node="">
</span><h3 data-dcnode-id="5412"><span class="mw-headline" data-dcnode-id="5420" id="Yugoslav_Wars"><span data-dcnode-id="5421" instrument_node="">Yugoslav Wars</span></span><span class="mw-editsection" data-dcnode-id="5413"><span class="mw-editsection-bracket" data-dcnode-id="5418"><span data-dcnode-id="5419" instrument_node="">[</span></span><a data-dcnode-id="5416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D33" title="Edit section: Yugoslav Wars"><span data-dcnode-id="5417" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5414"><span data-dcnode-id="5415" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5411" instrument_node="">
</span><link data-dcnode-id="5410" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5406" role="note"><span data-dcnode-id="5409" instrument_node="">See also: </span><a data-dcnode-id="5407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_fighters_in_the_Bosnian_War" title="Foreign fighters in the Bosnian War"><span data-dcnode-id="5408" instrument_node="">Foreign fighters in the Bosnian War</span></a></div><span data-dcnode-id="5405" instrument_node="">
</span><p data-dcnode-id="5359"><span data-dcnode-id="5404" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="5402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croatian_War" title="Croatian War"><span data-dcnode-id="5403" instrument_node="">Croatian War</span></a><span data-dcnode-id="5401" instrument_node=""> (1991–95) and the </span><a data-dcnode-id="5399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bosnian_War" title="Bosnian War"><span data-dcnode-id="5400" instrument_node="">Bosnian War</span></a><span data-dcnode-id="5398" instrument_node=""> (1992–95) have been viewed as religious wars between the Orthodox, Catholic and Muslim populations of former </span><a data-dcnode-id="5396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslavia" title="Yugoslavia"><span data-dcnode-id="5397" instrument_node="">Yugoslavia</span></a><span data-dcnode-id="5395" instrument_node="">: respectively called "</span><a data-dcnode-id="5393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbs" title="Serbs"><span data-dcnode-id="5394" instrument_node="">Serbs</span></a><span data-dcnode-id="5392" instrument_node="">", "</span><a data-dcnode-id="5390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croats" title="Croats"><span data-dcnode-id="5391" instrument_node="">Croats</span></a><span data-dcnode-id="5389" instrument_node="">" and "</span><a data-dcnode-id="5387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bosniaks" title="Bosniaks"><span data-dcnode-id="5388" instrument_node="">Bosniaks</span></a><span data-dcnode-id="5386" instrument_node="">" (or "Bosnian Muslims").</span><sup class="reference" data-dcnode-id="5383" id="cite_ref-RadeljićTopić2015_116-0"><a data-dcnode-id="5384" href="#cite_note-Radelji%C4%87Topi%C4%872015-116"><span data-dcnode-id="5385" instrument_node="">[116]</span></a></sup><sup class="reference" data-dcnode-id="5380" id="cite_ref-BoyleSheen1997_117-0"><a data-dcnode-id="5381" href="#cite_note-BoyleSheen1997-117"><span data-dcnode-id="5382" instrument_node="">[117]</span></a></sup><span data-dcnode-id="5379" instrument_node=""> Traditional religious symbols were used during the wars.</span><sup class="reference" data-dcnode-id="5376" id="cite_ref-118"><a data-dcnode-id="5377" href="#cite_note-118"><span data-dcnode-id="5378" instrument_node="">[118]</span></a></sup><span data-dcnode-id="5375" instrument_node=""> Notably, foreign Muslim volunteers came to Bosnia to wage </span><i data-dcnode-id="5372"><a data-dcnode-id="5373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jihad" title="Jihad"><span data-dcnode-id="5374" instrument_node="">jihad</span></a></i><span data-dcnode-id="5371" instrument_node=""> and were thus known as "</span><a data-dcnode-id="5369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bosnian_mujahideen" title="Bosnian mujahideen"><span data-dcnode-id="5370" instrument_node="">Bosnian mujahideen</span></a><span data-dcnode-id="5368" instrument_node="">".</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5361" style="white-space:nowrap;"><span data-dcnode-id="5367" instrument_node="">[</span><i data-dcnode-id="5363"><a data-dcnode-id="5364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5365" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="5366" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5362" instrument_node="">]</span></sup><span data-dcnode-id="5360" instrument_node="">
</span></p><span data-dcnode-id="5358" instrument_node="">
</span><h3 data-dcnode-id="5348"><span class="mw-headline" data-dcnode-id="5356" id="Sudanese_Civil_War"><span data-dcnode-id="5357" instrument_node="">Sudanese Civil War</span></span><span class="mw-editsection" data-dcnode-id="5349"><span class="mw-editsection-bracket" data-dcnode-id="5354"><span data-dcnode-id="5355" instrument_node="">[</span></span><a data-dcnode-id="5352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D34" title="Edit section: Sudanese Civil War"><span data-dcnode-id="5353" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5350"><span data-dcnode-id="5351" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5347" instrument_node="">
</span><p data-dcnode-id="5323"><span data-dcnode-id="5346" instrument_node="">The </span><a data-dcnode-id="5344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Sudanese_Civil_War" title="Second Sudanese Civil War"><span data-dcnode-id="5345" instrument_node="">Second Sudanese Civil War</span></a><span data-dcnode-id="5343" instrument_node=""> from 1983 to 2005 has been described as an </span><a class="mw-redirect" data-dcnode-id="5341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnoreligious" title="Ethnoreligious"><span data-dcnode-id="5342" instrument_node="">ethnoreligious</span></a><span data-dcnode-id="5340" instrument_node=""> conflict where the Muslim central government's pursuits to impose sharia law on non-Muslim southerners led to violence, and eventually to the civil war. The war resulted in the independence of </span><a data-dcnode-id="5338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Sudan" title="South Sudan"><span data-dcnode-id="5339" instrument_node="">South Sudan</span></a><span data-dcnode-id="5337" instrument_node=""> six years after the war ended. Sudan is majority-Muslim and South Sudan is majority-Christian.</span><sup class="reference" data-dcnode-id="5334" id="cite_ref-119"><a data-dcnode-id="5335" href="#cite_note-119"><span data-dcnode-id="5336" instrument_node="">[119]</span></a></sup><sup class="reference" data-dcnode-id="5331" id="cite_ref-120"><a data-dcnode-id="5332" href="#cite_note-120"><span data-dcnode-id="5333" instrument_node="">[120]</span></a></sup><sup class="reference" data-dcnode-id="5328" id="cite_ref-121"><a data-dcnode-id="5329" href="#cite_note-121"><span data-dcnode-id="5330" instrument_node="">[121]</span></a></sup><sup class="reference" data-dcnode-id="5325" id="cite_ref-122"><a data-dcnode-id="5326" href="#cite_note-122"><span data-dcnode-id="5327" instrument_node="">[122]</span></a></sup><span data-dcnode-id="5324" instrument_node="">
</span></p><span data-dcnode-id="5322" instrument_node="">

instrument_node="">The factors that provoked the military coup, primarily the closely intertwined issues of Islamic law and of the civil war in the south, remained unresolved in 1991. The September 1983 implementation of the sharia throughout the country had been controversial and provoked widespread resistance in the predominantly non-Muslim south ... Opposition to the sharia, especially to the application of hudud (sing., hadd), or Islamic penalties, such as the public amputation of hands for theft, was not confined to the south and had been a principal factor leading to the popular uprising of April 1985 that overthrew the government of Jaafar an Nimeiri</span></q></cite><span class="Z3988" data-dcnode-id="1608" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=unknown&amp;rft.jtitle=Country+Studies&amp;rft.atitle=Sudan&amp;rft_id=http%3A%2F%2Fcountrystudies.us%2Fsudan%2F63.htm&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AReligious+war"></span></span><span data-dcnode-id="1606" instrument_node="">
</span></li><span data-dcnode-id="1604" instrument_node="">
</span><li data-dcnode-id="1579" id="cite_note-120"><span class="mw-cite-backlink" data-dcnode-id="1600"><b data-dcnode-id="1601"><a aria-label="Jump up" data-dcnode-id="1602" href="#cite_ref-120" title="Jump up"><span data-dcnode-id="1603" instrument_node="">^</span></a></b></span><span data-dcnode-id="1599" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1581"><link data-dcnode-id="1598" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation web cs1" data-dcnode-id="1583"><a class="external text" data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pbs.org/frontlineworld/stories/sudan/facts.html" rel="nofollow"><span data-dcnode-id="1597" instrument_node="">"PBS Frontline: "Civil war was sparked in 1983 when the military regime tried to impose sharia law as part of its overall policy to "Islamicize" all of Sudan."</span><span class="cs1-kern-right" data-dcnode-id="1596"></span><span data-dcnode-id="1595" instrument_node="">"</span></a><span data-dcnode-id="1593" instrument_node="">. Pbs.org. </span><a class="external text" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20120304223804/http%3A//www.pbs.org/frontlineworld/stories/sudan/facts.html" rel="nofollow"><span data-dcnode-id="1592" instrument_node="">Archived</span></a><span data-dcnode-id="1590" instrument_node=""> from the original on 4 March 2012</span><span class="reference-accessdate" data-dcnode-id="1585"><span data-dcnode-id="1589" instrument_node="">. Retrieved </span><span class="nowrap" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">4 April</span></span><span data-dcnode-id="1586" instrument_node=""> 2012</span></span><span data-dcnode-id="1584" instrument_node="">.</span></cite><span class="Z3988" data-dcnode-id="1582" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=unknown&amp;rft.btitle=PBS+Frontline%3A+%22Civil+war+was+sparked+in+1983+when+the+military+regime+tried+to+impose+sharia+law+as+part+of+its+overall+policy+to+%22Islamicize%22+all+of+Sudan.%22&amp;rft.pub=Pbs.org&amp;rft_id=https%3A%2F%2Fwww.pbs.org%2Ffrontlineworld%2Fstories%2Fsudan%2Ffacts.html&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AReligious+war"></span></span><span data-dcnode-id="1580" instrument_node="">

</span><li data-dcnode-id="1549" id="cite_note-121"><span class="mw-cite-backlink" data-dcnode-id="1574"><b data-dcnode-id="1575"><a aria-label="Jump up" data-dcnode-id="1576" href="#cite_ref-121" title="Jump up"><span data-dcnode-id="1577" instrument_node="">^</span></a></b></span><span data-dcnode-id="1573" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1551"><link data-dcnode-id="1572" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation web cs1" data-dcnode-id="1553"><a class="external text" data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20080515104053/http%3A//media.washingtonpost.com/wp-srv/world/pdf/darfur_040707.pdf" rel="nofollow"><span data-dcnode-id="1571" instrument_node="">"Sudan at War With Itself"</span></a><span data-dcnode-id="1569" instrument_node=""> </span><span class="cs1-format" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">(PDF)</span></span><span data-dcnode-id="1566" instrument_node="">. </span><i data-dcnode-id="1563"><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Washington_Post" title="The Washington Post"><span data-dcnode-id="1565" instrument_node="">The Washington Post</span></a></i><span data-dcnode-id="1562" instrument_node="">. Archived from </span><a class="external text" data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.washingtonpost.com/wp-srv/world/pdf/darfur_040707.pdf" rel="nofollow"><span data-dcnode-id="1561" instrument_node="">the original</span></a><span data-dcnode-id="1559" instrument_node=""> </span><span class="cs1-format" data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">(PDF)</span></span><span data-dcnode-id="1556" instrument_node=""> on 15 May 2008. </span><q data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">The war flared again in 1983 after then-President Jaafar Nimeri abrogated the peace accord and announced he would turn Sudan into a Muslim Arab state, where Islamic law, or sharia, would prevail, including in the southern provinces. Sharia can include amputation of limbs for theft, public flogging and stoning. The war, fought between the government and several rebel groups, continued for two decades.</span></q></cite><span class="Z3988" data-dcnode-id="1552" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=unknown&amp;rft.jtitle=The+Washington+Post&amp;rft.atitle=Sudan+at+War+With+Itself&amp;rft_id=https%3A%2F%2Fmedia.washingtonpost.com%2Fwp-srv%2Fworld%2Fpdf%2Fdarfur_040707.pdf&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AReligious+war"></span></span><span data-dcnode-id="1550" instrument_node="">
</span></li><span data-dcnode-id="1548" instrument_node="">
</span><li data-dcnode-id="1531" id="cite_note-122"><span class="mw-cite-backlink" data-dcnode-id="1544"><b data-dcnode-id="1545"><a aria-label="Jump up" data-dcnode-id="1546" href="#cite_ref-122" title="Jump up"><span data-dcnode-id="1547" instrument_node="">^</span></a></b></span><span data-dcnode-id="1543" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1533"><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bassam_Tibi" title="Bassam Tibi"><span data-dcnode-id="1542" instrument_node="">Tibi, Bassam</span></a><span data-dcnode-id="1540" instrument_node=""> (2008). </span><i data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Political Islam, World Politics and Europe</span></i><span data-dcnode-id="1537" instrument_node="">. </span><a data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Routledge" title="Routledge"><span data-dcnode-id="1536" instrument_node="">Routledge</span></a><span data-dcnode-id="1534" instrument_node="">. p. 33. "The shari'a was imposed on non-Muslim Sudanese peoples in September 1983, and since that time Muslims in the north have been fighting a jihad against the non-Muslims in the south."</span></span><span data-dcnode-id="1532" instrument_node="">
