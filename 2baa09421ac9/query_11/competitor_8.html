</span><link data-dcnode-id="7723" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7707" role="note"><span data-dcnode-id="7722" instrument_node="">Further information: </span><a data-dcnode-id="7720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christianity_and_violence" title="Christianity and violence"><span data-dcnode-id="7721" instrument_node="">Christianity and violence</span></a><span data-dcnode-id="7719" instrument_node="">, </span><a data-dcnode-id="7717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crusades" title="Crusades"><span data-dcnode-id="7718" instrument_node="">Crusades</span></a><span data-dcnode-id="7716" instrument_node="">, </span><a data-dcnode-id="7714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_wars_of_religion" title="European wars of religion"><span data-dcnode-id="7715" instrument_node="">European wars of religion</span></a><span data-dcnode-id="7713" instrument_node="">, </span><a data-dcnode-id="7711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Counter-Reformation%23Politics" title="Counter-Reformation"><span data-dcnode-id="7712" instrument_node="">Counter-Reformation §&nbsp;Politics</span></a><span data-dcnode-id="7710" instrument_node="">, and </span><a data-dcnode-id="7708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sectarian_violence_among_Christians" title="Sectarian violence among Christians"><span data-dcnode-id="7709" instrument_node="">Sectarian violence among Christians</span></a></div><span data-dcnode-id="7706" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7694"><div class="thumbinner" data-dcnode-id="7695" style="width:222px;"><a class="image" data-dcnode-id="7704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALa_masacre_de_San_Bartolom%25C3%25A9%2C_por_Fran%25C3%25A7ois_Dubois.jpg"><img alt="" class="thumbimage" data-dcnode-id="7705" data-file-height="1398" data-file-width="2304" decoding="async" height="133" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/40/La_masacre_de_San_Bartolom%25C3%25A9%252C_por_Fran%25C3%25A7ois_Dubois.jpg/220px-La_masacre_de_San_Bartolom%25C3%25A9%252C_por_Fran%25C3%25A7ois_Dubois.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/40/La_masacre_de_San_Bartolom%C3%A9%2C_por_Fran%C3%A7ois_Dubois.jpg/330px-La_masacre_de_San_Bartolom%C3%A9%2C_por_Fran%C3%A7ois_Dubois.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/40/La_masacre_de_San_Bartolom%C3%A9%2C_por_Fran%C3%A7ois_Dubois.jpg/440px-La_masacre_de_San_Bartolom%C3%A9%2C_por_Fran%C3%A7ois_Dubois.jpg 2x" width="220"></a><span data-dcnode-id="7703" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7696"><div class="magnify" data-dcnode-id="7701"><a class="internal" data-dcnode-id="7702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALa_masacre_de_San_Bartolom%25C3%25A9%2C_por_Fran%25C3%25A7ois_Dubois.jpg" title="Enlarge"></a></div><span data-dcnode-id="7700" instrument_node="">The </span><a data-dcnode-id="7698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Bartholomew%2527s_Day_massacre" title="St. Bartholomew's Day massacre"><span data-dcnode-id="7699" instrument_node="">St. Bartholomew's Day massacre</span></a><span data-dcnode-id="7697" instrument_node=""> of French Protestants, 1572</span></div></div></div><span data-dcnode-id="7693" instrument_node="">
</span><p data-dcnode-id="7657"><span data-dcnode-id="7692" instrument_node="">According to historian Edward Peters, before the 11th century, Christians had not developed a concept of "Holy War" (</span><i data-dcnode-id="7690"><span data-dcnode-id="7691" instrument_node="">bellum sacrum</span></i><span data-dcnode-id="7689" instrument_node="">), whereby fighting itself might be considered a penitential and spiritually meritorious act.</span><sup class="reference" data-dcnode-id="7686" id="cite_ref-Peters_First_31-0"><a data-dcnode-id="7687" href="#cite_note-Peters_First-31"><span data-dcnode-id="7688" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="7683" id="cite_ref-Levine_War_32-0"><a data-dcnode-id="7684" href="#cite_note-Levine_War-32"><span data-dcnode-id="7685" instrument_node="">[32]</span></a></sup><span data-dcnode-id="7682" instrument_node=""> During the ninth and tenth centuries, multiple invasions occurred which led some regions to make their own armies to defend themselves and this slowly lead to the emergence of the Crusades, the concept of "holy war", and terminology such as "enemies of God" in the 11th century.</span><sup class="reference" data-dcnode-id="7679" id="cite_ref-Peters_First_31-1"><a data-dcnode-id="7680" href="#cite_note-Peters_First-31"><span data-dcnode-id="7681" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="7676" id="cite_ref-Levine_War_32-1"><a data-dcnode-id="7677" href="#cite_note-Levine_War-32"><span data-dcnode-id="7678" instrument_node="">[32]</span></a></sup><span data-dcnode-id="7675" instrument_node="">In early Christianity, St. Augustine's concept of </span><a data-dcnode-id="7673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Just_war_theory" title="Just war theory"><span data-dcnode-id="7674" instrument_node="">just war</span></a><span data-dcnode-id="7672" instrument_node=""> (</span><i data-dcnode-id="7670"><span data-dcnode-id="7671" instrument_node="">bellum iustum</span></i><span data-dcnode-id="7669" instrument_node="">) was widely accepted, but warfare was not regarded as a virtuous activity</span><sup class="reference" data-dcnode-id="7666" id="cite_ref-Peters_First_31-2"><a data-dcnode-id="7667" href="#cite_note-Peters_First-31"><span data-dcnode-id="7668" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="7663" id="cite_ref-usna_33-0"><a data-dcnode-id="7664" href="#cite_note-usna-33"><span data-dcnode-id="7665" instrument_node="">[33]</span></a></sup><span data-dcnode-id="7662" instrument_node=""> and expressions of concern for the salvation of those who killed enemies in battle, regardless of the cause for which they fought, was common.</span><sup class="reference" data-dcnode-id="7659" id="cite_ref-Peters_First_31-3"><a data-dcnode-id="7660" href="#cite_note-Peters_First-31"><span data-dcnode-id="7661" instrument_node="">[31]</span></a></sup><span data-dcnode-id="7658" instrument_node="">
</span></p><p data-dcnode-id="7591"><span data-dcnode-id="7656" instrument_node="">During the era of the </span><a data-dcnode-id="7654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crusades" title="Crusades"><span data-dcnode-id="7655" instrument_node="">Crusades</span></a><span data-dcnode-id="7653" instrument_node="">, some of the Crusaders who fought in the name of God were recognized as the </span><i data-dcnode-id="7650"><a data-dcnode-id="7651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miles_Christianus" title="Miles Christianus"><span data-dcnode-id="7652" instrument_node="">Milites Christi</span></a></i><span data-dcnode-id="7649" instrument_node="">, the soldiers or the knights of Christ.</span><sup class="reference" data-dcnode-id="7646" id="cite_ref-34"><a data-dcnode-id="7647" href="#cite_note-34"><span data-dcnode-id="7648" instrument_node="">[34]</span></a></sup><span data-dcnode-id="7645" instrument_node="">
The </span><a data-dcnode-id="7643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crusades" title="Crusades"><span data-dcnode-id="7644" instrument_node="">Crusades</span></a><span data-dcnode-id="7642" instrument_node=""> were a series of military campaigns against the </span><a class="mw-redirect" data-dcnode-id="7640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_Conquests" title="Muslim Conquests"><span data-dcnode-id="7641" instrument_node="">Muslim Conquests</span></a><span data-dcnode-id="7639" instrument_node=""> that were waged from the end of the 11th century through the 13th century. Originally, the goal of the Crusaders was the recapture of </span><a data-dcnode-id="7637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerusalem" title="Jerusalem"><span data-dcnode-id="7638" instrument_node="">Jerusalem</span></a><span data-dcnode-id="7636" instrument_node=""> and the </span><a data-dcnode-id="7634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holy_Land" title="Holy Land"><span data-dcnode-id="7635" instrument_node="">Holy Land</span></a><span data-dcnode-id="7633" instrument_node=""> from the </span><a data-dcnode-id="7631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam" title="Islam"><span data-dcnode-id="7632" instrument_node="">Muslims</span></a><span data-dcnode-id="7630" instrument_node="">, and the provision of support to the besieged Christian </span><a data-dcnode-id="7628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byzantine_Empire" title="Byzantine Empire"><span data-dcnode-id="7629" instrument_node="">Byzantine Empire</span></a><span data-dcnode-id="7627" instrument_node=""> which was waging a war against </span><a class="mw-redirect" data-dcnode-id="7625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim" title="Muslim"><span data-dcnode-id="7626" instrument_node="">Muslim</span></a><span data-dcnode-id="7624" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="7622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seljuq_dynasty" title="Seljuq dynasty"><span data-dcnode-id="7623" instrument_node="">Seljuq</span></a><span data-dcnode-id="7621" instrument_node=""> expansion into </span><a data-dcnode-id="7619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anatolia" title="Anatolia"><span data-dcnode-id="7620" instrument_node="">Asia Minor</span></a><span data-dcnode-id="7618" instrument_node=""> and Europe proper. Later, Crusades were launched against other targets, either for religious reasons, such as the </span><a data-dcnode-id="7616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albigensian_Crusade" title="Albigensian Crusade"><span data-dcnode-id="7617" instrument_node="">Albigensian Crusade</span></a><span data-dcnode-id="7615" instrument_node="">, the </span><a data-dcnode-id="7613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Crusades" title="Northern Crusades"><span data-dcnode-id="7614" instrument_node="">Northern Crusades</span></a><span data-dcnode-id="7612" instrument_node="">, or because of political conflicts, such as the </span><a data-dcnode-id="7610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aragonese_Crusade" title="Aragonese Crusade"><span data-dcnode-id="7611" instrument_node="">Aragonese Crusade</span></a><span data-dcnode-id="7609" instrument_node="">. In 1095, at the </span><a data-dcnode-id="7607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_Clermont" title="Council of Clermont"><span data-dcnode-id="7608" instrument_node="">Council of Clermont</span></a><span data-dcnode-id="7606" instrument_node="">, </span><a data-dcnode-id="7604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pope_Urban_II" title="Pope Urban II"><span data-dcnode-id="7605" instrument_node="">Pope Urban II</span></a><span data-dcnode-id="7603" instrument_node=""> raised the level of the war from a </span><i data-dcnode-id="7600"><a class="mw-redirect" data-dcnode-id="7601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bellum_iustum" title="Bellum iustum"><span data-dcnode-id="7602" instrument_node="">bellum iustum</span></a></i><span data-dcnode-id="7599" instrument_node=""> (a "just war"), to a </span><i data-dcnode-id="7597"><span data-dcnode-id="7598" instrument_node="">bellum sacrum</span></i><span data-dcnode-id="7596" instrument_node=""> (a "holy war").</span><sup class="reference" data-dcnode-id="7593" id="cite_ref-35"><a data-dcnode-id="7594" href="#cite_note-35"><span data-dcnode-id="7595" instrument_node="">[35]</span></a></sup><span data-dcnode-id="7592" instrument_node="">
</span></p><span data-dcnode-id="7590" instrument_node="">
</span><h3 data-dcnode-id="7580"><span class="mw-headline" data-dcnode-id="7588" id="Hinduism"><span data-dcnode-id="7589" instrument_node="">Hinduism</span></span><span class="mw-editsection" data-dcnode-id="7581"><span class="mw-editsection-bracket" data-dcnode-id="7586"><span data-dcnode-id="7587" instrument_node="">[</span></span><a data-dcnode-id="7584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D8" title="Edit section: Hinduism"><span data-dcnode-id="7585" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7582"><span data-dcnode-id="7583" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7579" instrument_node="">
</span><link data-dcnode-id="7578" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7574" role="note"><span data-dcnode-id="7577" instrument_node="">Main article: </span><a data-dcnode-id="7575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dharma-yuddha" title="Dharma-yuddha"><span data-dcnode-id="7576" instrument_node="">Dharma-yuddha</span></a></div><span data-dcnode-id="7573" instrument_node="">
</span><p data-dcnode-id="7526"><span data-dcnode-id="7572" instrument_node="">In the </span><a data-dcnode-id="7570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hindu_texts" title="Hindu texts"><span data-dcnode-id="7571" instrument_node="">Hindu texts</span></a><span data-dcnode-id="7569" instrument_node="">, </span><i data-dcnode-id="7566"><a data-dcnode-id="7567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dharma-yuddha" title="Dharma-yuddha"><span data-dcnode-id="7568" instrument_node="">dharma-yuddha</span></a></i><span data-dcnode-id="7565" instrument_node=""> refers to a war that is fought while following several rules that make the war fair.</span><sup class="reference" data-dcnode-id="7562" id="cite_ref-36"><a data-dcnode-id="7563" href="#cite_note-36"><span data-dcnode-id="7564" instrument_node="">[36]</span></a></sup><span data-dcnode-id="7561" instrument_node=""> In other words, just conduct within a war (</span><i data-dcnode-id="7559"><span data-dcnode-id="7560" instrument_node="">jus in bello</span></i><span data-dcnode-id="7558" instrument_node="">) is important in </span><a data-dcnode-id="7556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vedas" title="Vedas"><span data-dcnode-id="7557" instrument_node="">Vedic</span></a><span data-dcnode-id="7555" instrument_node=""> and </span><a data-dcnode-id="7553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_epic_poetry" title="Indian epic poetry"><span data-dcnode-id="7554" instrument_node="">epic literature</span></a><span data-dcnode-id="7552" instrument_node=""> such as the </span><i data-dcnode-id="7549"><a data-dcnode-id="7550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mahabharata" title="Mahabharata"><span data-dcnode-id="7551" instrument_node="">Mahabharata</span></a></i><span data-dcnode-id="7548" instrument_node=""> and the </span><i data-dcnode-id="7545"><a data-dcnode-id="7546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramayana" title="Ramayana"><span data-dcnode-id="7547" instrument_node="">Ramayana</span></a></i><span data-dcnode-id="7544" instrument_node="">.</span><sup class="reference" data-dcnode-id="7541" id="cite_ref-Roy_37-0"><a data-dcnode-id="7542" href="#cite_note-Roy-37"><span data-dcnode-id="7543" instrument_node="">[37]</span></a></sup><span data-dcnode-id="7540" instrument_node=""> However, according to Torkel Berkke, the </span><i data-dcnode-id="7538"><span data-dcnode-id="7539" instrument_node="">Mahabharata</span></i><span data-dcnode-id="7537" instrument_node=""> does not provide a clear discussion on who has the authority to initiate a war (</span><i data-dcnode-id="7535"><span data-dcnode-id="7536" instrument_node="">jus ad bellum</span></i><span data-dcnode-id="7534" instrument_node="">), nor on what makes a war just (</span><i data-dcnode-id="7532"><span data-dcnode-id="7533" instrument_node="">bellum justum</span></i><span data-dcnode-id="7531" instrument_node="">).</span><sup class="reference" data-dcnode-id="7528" id="cite_ref-Roy_37-1"><a data-dcnode-id="7529" href="#cite_note-Roy-37"><span data-dcnode-id="7530" instrument_node="">[37]</span></a></sup><span data-dcnode-id="7527" instrument_node="">
</span></p><span data-dcnode-id="7525" instrument_node="">
</span><h3 data-dcnode-id="7515"><span class="mw-headline" data-dcnode-id="7523" id="Islam"><span data-dcnode-id="7524" instrument_node="">Islam</span></span><span class="mw-editsection" data-dcnode-id="7516"><span class="mw-editsection-bracket" data-dcnode-id="7521"><span data-dcnode-id="7522" instrument_node="">[</span></span><a data-dcnode-id="7519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D9" title="Edit section: Islam"><span data-dcnode-id="7520" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7517"><span data-dcnode-id="7518" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7514" instrument_node="">
</span><link data-dcnode-id="7513" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7503" role="note"><span data-dcnode-id="7512" instrument_node="">Further information: </span><a data-dcnode-id="7510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jihad" title="Jihad"><span data-dcnode-id="7511" instrument_node="">Jihad</span></a><span data-dcnode-id="7509" instrument_node="">, </span><a data-dcnode-id="7507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_Muslim_conquests" title="Early Muslim conquests"><span data-dcnode-id="7508" instrument_node="">Early Muslim conquests</span></a><span data-dcnode-id="7506" instrument_node="">, and </span><a data-dcnode-id="7504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ghazi_%28warrior%29" title="Ghazi (warrior)"><span data-dcnode-id="7505" instrument_node="">Ghazi (warrior)</span></a></div><span data-dcnode-id="7502" instrument_node="">
</span><p data-dcnode-id="7462"><span data-dcnode-id="7501" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="7499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_conquests" title="Muslim conquests"><span data-dcnode-id="7500" instrument_node="">Muslim conquests</span></a><span data-dcnode-id="7498" instrument_node=""> were a military expansion on an unprecedented scale, beginning in the lifetime of </span><a data-dcnode-id="7496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muhammad" title="Muhammad"><span data-dcnode-id="7497" instrument_node="">Muhammad</span></a><span data-dcnode-id="7495" instrument_node=""> and spanning the centuries, down to the </span><a data-dcnode-id="7493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_wars_in_Europe" title="Ottoman wars in Europe"><span data-dcnode-id="7494" instrument_node="">Ottoman wars in Europe</span></a><span data-dcnode-id="7492" instrument_node="">.  Until the 13th century, the Muslim conquests were those of a more or less coherent </span><a data-dcnode-id="7490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empire" title="Empire"><span data-dcnode-id="7491" instrument_node="">empire</span></a><span data-dcnode-id="7489" instrument_node="">, the </span><a data-dcnode-id="7487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caliphate" title="Caliphate"><span data-dcnode-id="7488" instrument_node="">Caliphate</span></a><span data-dcnode-id="7486" instrument_node="">, but after the </span><a class="mw-redirect" data-dcnode-id="7484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mongol_invasions" title="Mongol invasions"><span data-dcnode-id="7485" instrument_node="">Mongol invasions</span></a><span data-dcnode-id="7483" instrument_node="">, expansion continued on all fronts (other than Iberia which was lost in the </span><a data-dcnode-id="7481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reconquista" title="Reconquista"><span data-dcnode-id="7482" instrument_node="">Reconquista</span></a><span data-dcnode-id="7480" instrument_node="">) for another half millennium until the final collapse of the </span><a data-dcnode-id="7478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mughal_Empire" title="Mughal Empire"><span data-dcnode-id="7479" instrument_node="">Mughal Empire</span></a><span data-dcnode-id="7477" instrument_node=""> in the east  and the </span><a data-dcnode-id="7475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_Empire" title="Ottoman Empire"><span data-dcnode-id="7476" instrument_node="">Ottoman Empire</span></a><span data-dcnode-id="7474" instrument_node=""> in the west with the onset of the </span><a data-dcnode-id="7472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modernity" title="Modernity"><span data-dcnode-id="7473" instrument_node="">modern period</span></a><span data-dcnode-id="7471" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7464" style="white-space:nowrap;"><span data-dcnode-id="7470" instrument_node="">[</span><i data-dcnode-id="7466"><a data-dcnode-id="7467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7468" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="7469" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7465" instrument_node="">]</span></sup><span data-dcnode-id="7463" instrument_node="">
</span></p><p data-dcnode-id="7446"><span data-dcnode-id="7461" instrument_node="">There were also a number of periods of infighting among Muslims; these are known by the term </span><a data-dcnode-id="7459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fitna_%28word%29" title="Fitna (word)"><span data-dcnode-id="7460" instrument_node="">Fitna</span></a><span data-dcnode-id="7458" instrument_node=""> and mostly concern the early period of Islam, from the 7th to 11th centuries, i.e. before the collapse of the Caliphate and the emergence of the various later </span><a class="mw-redirect" data-dcnode-id="7456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_empires" title="Islamic empires"><span data-dcnode-id="7457" instrument_node="">Islamic empires</span></a><span data-dcnode-id="7455" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7448" style="white-space:nowrap;"><span data-dcnode-id="7454" instrument_node="">[</span><i data-dcnode-id="7450"><a data-dcnode-id="7451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7452" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="7453" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7449" instrument_node="">]</span></sup><span data-dcnode-id="7447" instrument_node="">
</span></p><span data-dcnode-id="7445" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7434"><div class="thumbinner" data-dcnode-id="7435" style="width:222px;"><a class="image" data-dcnode-id="7443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFula_jihad_states_map_general_c1830.png"><img alt="" class="thumbimage" data-dcnode-id="7444" data-file-height="408" data-file-width="694" decoding="async" height="129" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Fula_jihad_states_map_general_c1830.png/220px-Fula_jihad_states_map_general_c1830.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Fula_jihad_states_map_general_c1830.png/330px-Fula_jihad_states_map_general_c1830.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Fula_jihad_states_map_general_c1830.png/440px-Fula_jihad_states_map_general_c1830.png 2x" width="220"></a><span data-dcnode-id="7442" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7436"><div class="magnify" data-dcnode-id="7440"><a class="internal" data-dcnode-id="7441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFula_jihad_states_map_general_c1830.png" title="Enlarge"></a></div><a data-dcnode-id="7438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fula_jihads" title="Fula jihads"><span data-dcnode-id="7439" instrument_node="">Fulani jihad states</span></a><span data-dcnode-id="7437" instrument_node=""> of Africa, c. 1830</span></div></div></div><span data-dcnode-id="7433" instrument_node="">
</span><p data-dcnode-id="7410"><span data-dcnode-id="7432" instrument_node="">While technically, the millennium of Muslim conquests could be classified as "religious war", the applicability of the term has been questioned.
The reason is that the very notion of a "religious war" as opposed to a "secular war" is the result of the Western concept of the  </span><a class="mw-redirect" data-dcnode-id="7430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Separation_of_Church_and_State" title="Separation of Church and State"><span data-dcnode-id="7431" instrument_node="">separation of Church and State</span></a><span data-dcnode-id="7429" instrument_node="">. No such division has ever existed in the Islamic world, and consequently there cannot be a real division between wars that are "religious" from such that are "non-religious". Islam does not have any normative tradition of </span><a data-dcnode-id="7427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacifism" title="Pacifism"><span data-dcnode-id="7428" instrument_node="">pacifism</span></a><span data-dcnode-id="7426" instrument_node="">, and warfare has been integral part of Islamic history both for the defense and the spread of the faith since the time of Muhammad. This was formalised in the juristic definition of </span><a data-dcnode-id="7424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam_and_war" title="Islam and war"><span data-dcnode-id="7425" instrument_node="">war in Islam</span></a><span data-dcnode-id="7423" instrument_node="">, which continues to hold normative power in contemporary Islam,  inextricably linking political and religious justification of war.</span><sup class="reference" data-dcnode-id="7420" id="cite_ref-38"><a data-dcnode-id="7421" href="#cite_note-38"><span data-dcnode-id="7422" instrument_node="">[38]</span></a></sup><span data-dcnode-id="7419" instrument_node=""> This normative concept is known as </span><i data-dcnode-id="7416"><a data-dcnode-id="7417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jihad" title="Jihad"><span data-dcnode-id="7418" instrument_node="">Jihad</span></a></i><span data-dcnode-id="7415" instrument_node="">, an Arabic word with the meaning "to strive; to struggle" (viz. "in the way of God"), which includes the aspect of struggle "by the sword".</span><sup class="reference" data-dcnode-id="7412" id="cite_ref-39"><a data-dcnode-id="7413" href="#cite_note-39"><span data-dcnode-id="7414" instrument_node="">[39]</span></a></sup><span data-dcnode-id="7411" instrument_node="">
</span></p><p data-dcnode-id="7391"><span data-dcnode-id="7409" instrument_node="">
The first forms of military Jihad occurred after the migration (</span><a class="mw-redirect" data-dcnode-id="7407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hijra_%28Islam%29" title="Hijra (Islam)"><span data-dcnode-id="7408" instrument_node="">hijra</span></a><span data-dcnode-id="7406" instrument_node="">) of Muhammad and his small group of followers to </span><a data-dcnode-id="7404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medina" title="Medina"><span data-dcnode-id="7405" instrument_node="">Medina</span></a><span data-dcnode-id="7403" instrument_node=""> from </span><a data-dcnode-id="7401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mecca" title="Mecca"><span data-dcnode-id="7402" instrument_node="">Mecca</span></a><span data-dcnode-id="7400" instrument_node=""> and the conversion of several inhabitants of the city to Islam. The first revelation concerning the struggle against the Meccans was </span><a class="mw-redirect" data-dcnode-id="7398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quran_22%3A39-40" title="Quran 22:39-40"><span data-dcnode-id="7399" instrument_node="">Quran 22:39-40</span></a><span data-dcnode-id="7397" instrument_node="">:</span><sup class="reference" data-dcnode-id="7394" id="cite_ref-40"><a data-dcnode-id="7395" href="#cite_note-40"><span data-dcnode-id="7396" instrument_node="">[40]</span></a></sup><span data-dcnode-id="7393" instrument_node=""> </span><link data-dcnode-id="7392" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"></p><blockquote class="templatequote" data-dcnode-id="7384"><p data-dcnode-id="7389"><span data-dcnode-id="7390" instrument_node="">To those against whom war is made, permission is given (to fight), because they are wronged;- and verily, Allah is most powerful for their aid. (They are) those who have been expelled from their homes in defiance of right,- (for no cause) except that they say, "our Lord is Allah". Did not Allah check one set of people by means of another, there would surely have been pulled down monasteries, churches, synagogues, and mosques, in which the name of Allah is commemorated in abundant measure. Allah will certainly aid those who aid his (cause);- for verily Allah is full of Strength, Exalted in Might, (able to enforce His Will).</span></p><div class="templatequotecite" data-dcnode-id="7385"><span data-dcnode-id="7388" instrument_node="">— </span><cite data-dcnode-id="7386"><span data-dcnode-id="7387" instrument_node="">Quran 22:39-40 - Abdullah Yusuf Ali Translation</span></cite></div></blockquote><span data-dcnode-id="7383" instrument_node="">
</span><p data-dcnode-id="7352"><span data-dcnode-id="7382" instrument_node="">This happened many times throughout history, beginning with </span><a data-dcnode-id="7380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muhammad" title="Muhammad"><span data-dcnode-id="7381" instrument_node="">Muhammad</span></a><span data-dcnode-id="7379" instrument_node="">'s battles against the </span><a class="mw-redirect" data-dcnode-id="7377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polytheist" title="Polytheist"><span data-dcnode-id="7378" instrument_node="">polytheist</span></a><span data-dcnode-id="7376" instrument_node=""> Arabs including the </span><a data-dcnode-id="7374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Badr" title="Battle of Badr"><span data-dcnode-id="7375" instrument_node="">Battle of Badr</span></a><span data-dcnode-id="7373" instrument_node=""> (624), and battles in </span><a class="mw-redirect" data-dcnode-id="7371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uhud" title="Uhud"><span data-dcnode-id="7372" instrument_node="">Uhud</span></a><span data-dcnode-id="7370" instrument_node=""> (625), </span><a data-dcnode-id="7368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_the_Trench" title="Battle of the Trench"><span data-dcnode-id="7369" instrument_node="">Khandaq</span></a><span data-dcnode-id="7367" instrument_node=""> (627), </span><a data-dcnode-id="7365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mecca" title="Mecca"><span data-dcnode-id="7366" instrument_node="">Mecca</span></a><span data-dcnode-id="7364" instrument_node=""> (630) and </span><a data-dcnode-id="7362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Hunayn" title="Battle of Hunayn"><span data-dcnode-id="7363" instrument_node="">Hunayn</span></a><span data-dcnode-id="7361" instrument_node=""> (630).</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7354" style="white-space:nowrap;"><span data-dcnode-id="7360" instrument_node="">[</span><i data-dcnode-id="7356"><a data-dcnode-id="7357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7358" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="7359" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7355" instrument_node="">]</span></sup><span data-dcnode-id="7353" instrument_node="">
</span></p><span data-dcnode-id="7351" instrument_node="">
</span><h3 data-dcnode-id="7341"><span class="mw-headline" data-dcnode-id="7349" id="Judaism"><span data-dcnode-id="7350" instrument_node="">Judaism</span></span><span class="mw-editsection" data-dcnode-id="7342"><span class="mw-editsection-bracket" data-dcnode-id="7347"><span data-dcnode-id="7348" instrument_node="">[</span></span><a data-dcnode-id="7345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D10" title="Edit section: Judaism"><span data-dcnode-id="7346" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7343"><span data-dcnode-id="7344" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7340" instrument_node="">
</span><link data-dcnode-id="7339" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7335" role="note"><span data-dcnode-id="7338" instrument_node="">Main article: </span><a data-dcnode-id="7336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milkhemet_Mitzvah" title="Milkhemet Mitzvah"><span data-dcnode-id="7337" instrument_node="">Milkhemet Mitzvah</span></a></div><span data-dcnode-id="7334" instrument_node="">
</span><link data-dcnode-id="7333" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7329" role="note"><span data-dcnode-id="7332" instrument_node="">Further information: </span><a data-dcnode-id="7330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Bible_and_violence" title="The Bible and violence"><span data-dcnode-id="7331" instrument_node="">The Bible and violence</span></a></div><span data-dcnode-id="7328" instrument_node="">
</span><link data-dcnode-id="7327" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7323" role="note"><span data-dcnode-id="7326" instrument_node="">See also: </span><a data-dcnode-id="7324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Numbers_31%23Scholary_discussions" title="Numbers 31"><span data-dcnode-id="7325" instrument_node="">Numbers 31 §&nbsp;Scholary discussions</span></a></div><span data-dcnode-id="7322" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7307"><div class="thumbinner" data-dcnode-id="7308" style="width:222px;"><a class="image" data-dcnode-id="7320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATissot_The_Women_of_Midian_Led_Captive_by_the_Hebrews.jpg"><img alt="" class="thumbimage" data-dcnode-id="7321" data-file-height="359" data-file-width="600" decoding="async" height="132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/85/Tissot_The_Women_of_Midian_Led_Captive_by_the_Hebrews.jpg/220px-Tissot_The_Women_of_Midian_Led_Captive_by_the_Hebrews.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/85/Tissot_The_Women_of_Midian_Led_Captive_by_the_Hebrews.jpg/330px-Tissot_The_Women_of_Midian_Led_Captive_by_the_Hebrews.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/85/Tissot_The_Women_of_Midian_Led_Captive_by_the_Hebrews.jpg/440px-Tissot_The_Women_of_Midian_Led_Captive_by_the_Hebrews.jpg 2x" width="220"></a><span data-dcnode-id="7319" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7309"><div class="magnify" data-dcnode-id="7317"><a class="internal" data-dcnode-id="7318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATissot_The_Women_of_Midian_Led_Captive_by_the_Hebrews.jpg" title="Enlarge"></a></div><span data-dcnode-id="7316" instrument_node="">Midianite women, children and livestock taken captive by Israelite soldiers after all Midianite men had been killed and their towns burnt. Watercolour by </span><a data-dcnode-id="7314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Tissot" title="James Tissot"><span data-dcnode-id="7315" instrument_node="">James Tissot</span></a><span data-dcnode-id="7313" instrument_node=""> (c. 1900) illustrating the War against the Midianites as narrated in </span><a data-dcnode-id="7311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Numbers_31" title="Numbers 31"><span data-dcnode-id="7312" instrument_node="">Numbers 31</span></a><span data-dcnode-id="7310" instrument_node="">.</span></div></div></div><span data-dcnode-id="7306" instrument_node="">
</span><p data-dcnode-id="7255"><a data-dcnode-id="7304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reuven_Firestone" title="Reuven Firestone"><span data-dcnode-id="7305" instrument_node="">Reuven Firestone</span></a><span data-dcnode-id="7303" instrument_node=""> (2012) stated 'that holy war is a common theme in the Hebrew Bible. Divinely legitimized through the authority of biblical scripture and its interpretation, holy war became a historical reality for the Jews of antiquity. Among at least some of the Jewish groups of the late </span><a data-dcnode-id="7301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Temple_period" title="Second Temple period"><span data-dcnode-id="7302" instrument_node="">Second Temple period</span></a><span data-dcnode-id="7300" instrument_node=""> until the middle of the second century, C.E., holy war was an operative institution. That is, Jews engaged in what is defined here as holy war.'</span><sup class="reference" data-dcnode-id="7297" id="cite_ref-FOOTNOTEFirestone20123_41-0"><a data-dcnode-id="7298" href="#cite_note-FOOTNOTEFirestone20123-41"><span data-dcnode-id="7299" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7296" instrument_node=""> He mentioned the </span><a data-dcnode-id="7294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maccabean_Revolt" title="Maccabean Revolt"><span data-dcnode-id="7295" instrument_node="">Maccabean Revolt</span></a><span data-dcnode-id="7293" instrument_node=""> (167–160 BCE), the </span><a data-dcnode-id="7291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Jewish%25E2%2580%2593Roman_War" title="First Jewish–Roman War"><span data-dcnode-id="7292" instrument_node="">First Jewish–Roman War</span></a><span data-dcnode-id="7290" instrument_node=""> (66–73 CE) and the </span><a data-dcnode-id="7288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bar_Kokhba_revolt" title="Bar Kokhba revolt"><span data-dcnode-id="7289" instrument_node="">Bar Kokhba revolt</span></a><span data-dcnode-id="7287" instrument_node=""> (132–136 CE) as three examples of a "holy war" or "Commanded War" (</span><a data-dcnode-id="7285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_language" title="Hebrew language"><span data-dcnode-id="7286" instrument_node="">Hebrew</span></a><span data-dcnode-id="7284" instrument_node="">: מלחמת מצווה </span><i data-dcnode-id="7281"><a data-dcnode-id="7282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milkhemet_Mitzvah" title="Milkhemet Mitzvah"><span data-dcnode-id="7283" instrument_node="">Milkhemet Mitzvah</span></a></i><span data-dcnode-id="7280" instrument_node="">) in the eyes of </span><a data-dcnode-id="7278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabbinic_Judaism" title="Rabbinic Judaism"><span data-dcnode-id="7279" instrument_node="">Rabbinic Judaism</span></a><span data-dcnode-id="7277" instrument_node=""> at the time.</span><sup class="reference" data-dcnode-id="7274" id="cite_ref-FOOTNOTEFirestone20123_41-1"><a data-dcnode-id="7275" href="#cite_note-FOOTNOTEFirestone20123-41"><span data-dcnode-id="7276" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7273" instrument_node=""> He asserted that this concept may have re-emerged in modern times within some factions of the </span><a class="mw-redirect" data-dcnode-id="7271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zionist_movement" title="Zionist movement"><span data-dcnode-id="7272" instrument_node="">Zionist movement</span></a><span data-dcnode-id="7270" instrument_node="">, particularly </span><a data-dcnode-id="7268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revisionist_Zionism" title="Revisionist Zionism"><span data-dcnode-id="7269" instrument_node="">Revisionist Zionism</span></a><span data-dcnode-id="7267" instrument_node="">.</span><sup class="reference" data-dcnode-id="7264" id="cite_ref-42"><a data-dcnode-id="7265" href="#cite_note-42"><span data-dcnode-id="7266" instrument_node="">[42]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="7257" style="white-space:nowrap;"><span data-dcnode-id="7263" instrument_node="">[</span><i data-dcnode-id="7259"><a data-dcnode-id="7260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="7261" title="This citation requires a reference to the specific page or range of pages in which the material appears. (March 2022)"><span data-dcnode-id="7262" instrument_node="">page&nbsp;needed</span></span></a></i><span data-dcnode-id="7258" instrument_node="">]</span></sup><span data-dcnode-id="7256" instrument_node="">
</span></p><p data-dcnode-id="7249"><span data-dcnode-id="7254" instrument_node="">In 2016, however, Firestone made a distinction between what he regarded as the Hebrew Bible's concept and the 'Western' concept of holy war: ""Holy War" is a Western concept referring to war that is fought for religion, against adherents of other religions, often in order to promote religion through conversion, and with no specific geographic limitation. This concept does not occur in the Hebrew Bible, whose wars are not fought for religion or in order to promote it but, rather, in order to preserve religion and a religiously unique people in relation to a specific and limited geography."</span><sup class="reference" data-dcnode-id="7251" id="cite_ref-43"><a data-dcnode-id="7252" href="#cite_note-43"><span data-dcnode-id="7253" instrument_node="">[43]</span></a></sup><span data-dcnode-id="7250" instrument_node="">
</span></p><p data-dcnode-id="7215"><span data-dcnode-id="7248" instrument_node="">Several scholars regard </span><a data-dcnode-id="7246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Bible_and_violence%23Warfare_from_Genesis_through_Joshua" title="The Bible and violence"><span data-dcnode-id="7247" instrument_node="">war narratives in the Hebrew Bible</span></a><span data-dcnode-id="7245" instrument_node="">, such as the </span><a data-dcnode-id="7243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Numbers_31" title="Numbers 31"><span data-dcnode-id="7244" instrument_node="">War against the Midianites in Numbers 31</span></a><span data-dcnode-id="7242" instrument_node="">, to be a holy war, with Niditch (1995) asserting the presence of a 'priestly ideology of war in Numbers 31'.</span><sup class="reference" data-dcnode-id="7239" id="cite_ref-Niditch_44-0"><a data-dcnode-id="7240" href="#cite_note-Niditch-44"><span data-dcnode-id="7241" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7238" instrument_node=""> Hamilton (2005) argued that the two major concerns of Number 31 are the idea that war is a defiling activity, but Israelite soldiers need to be ritually pure, so they may only fight wars for a holy cause, and are required to cleanse themselves afterwards to restore their ritual purity.</span><sup class="reference" data-dcnode-id="7235" id="cite_ref-Hamilton_45-0"><a data-dcnode-id="7236" href="#cite_note-Hamilton-45"><span data-dcnode-id="7237" instrument_node="">[45]</span></a></sup><span data-dcnode-id="7234" instrument_node=""> The Israelite campaign against Midian was blessed by the Israelite god </span><a data-dcnode-id="7232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yahweh" title="Yahweh"><span data-dcnode-id="7233" instrument_node="">Yahweh</span></a><span data-dcnode-id="7231" instrument_node="">, and could therefore be considered a holy war.</span><sup class="reference" data-dcnode-id="7228" id="cite_ref-Hamilton_45-1"><a data-dcnode-id="7229" href="#cite_note-Hamilton-45"><span data-dcnode-id="7230" instrument_node="">[45]</span></a></sup><span data-dcnode-id="7227" instrument_node=""> Olson (2012), who believed the war narrative to be a fictional story with a theological purpose, noted that the Israelite soldiers' actions in Numbers 31 closely followed the holy war regulations set out in Deuteronomy 20:14, although </span><a data-dcnode-id="7225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses" title="Moses"><span data-dcnode-id="7226" instrument_node="">Moses</span></a><span data-dcnode-id="7224" instrument_node="">' commandment to also kill the captive male children and non-virgin women was a marked departure from these regulations.</span><sup class="reference" data-dcnode-id="7221" id="cite_ref-Olson_46-0"><a data-dcnode-id="7222" href="#cite_note-Olson-46"><span data-dcnode-id="7223" instrument_node="">[46]</span></a></sup><span data-dcnode-id="7220" instrument_node=""> He concluded: "Many aspects of this holy war text may be troublesome to a contemporary reader. But understood within the symbolic world of the ancient writers of Numbers, the story of the war against the Midianites is a kind of dress rehearsal that builds confidence and hope in anticipation of the actual conquest of Canaan that lay ahead."</span><sup class="reference" data-dcnode-id="7217" id="cite_ref-Olson_46-1"><a data-dcnode-id="7218" href="#cite_note-Olson-46"><span data-dcnode-id="7219" instrument_node="">[46]</span></a></sup><span data-dcnode-id="7216" instrument_node="">
</span></p><p data-dcnode-id="7209"><span data-dcnode-id="7214" instrument_node="">Dawn (2016) stated: "From the earliest days of Israel's existence as a people, holy war was a sacred institution, undertaken as a cultic act of a religious community".</span><sup class="reference" data-dcnode-id="7211" id="cite_ref-47"><a data-dcnode-id="7212" href="#cite_note-47"><span data-dcnode-id="7213" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7210" instrument_node="">
</span></p><span data-dcnode-id="7208" instrument_node="">
</span><h3 data-dcnode-id="7198"><span class="mw-headline" data-dcnode-id="7206" id="Shinto"><span data-dcnode-id="7207" instrument_node="">Shinto</span></span><span class="mw-editsection" data-dcnode-id="7199"><span class="mw-editsection-bracket" data-dcnode-id="7204"><span data-dcnode-id="7205" instrument_node="">[</span></span><a data-dcnode-id="7202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D11" title="Edit section: Shinto"><span data-dcnode-id="7203" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7200"><span data-dcnode-id="7201" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7197" instrument_node="">

ode-id="7175" instrument_node="">

</span><h3 data-dcnode-id="7159"><span class="mw-headline" data-dcnode-id="7167" id="Sikhism"><span data-dcnode-id="7168" instrument_node="">Sikhism</span></span><span class="mw-editsection" data-dcnode-id="7160"><span class="mw-editsection-bracket" data-dcnode-id="7165"><span data-dcnode-id="7166" instrument_node="">[</span></span><a data-dcnode-id="7163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D12" title="Edit section: Sikhism"><span data-dcnode-id="7164" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7161"><span data-dcnode-id="7162" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7158" instrument_node="">
</span><div class="excerpt-block" data-dcnode-id="7096"><link data-dcnode-id="7155" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable dablink excerpt-hat selfref" data-dcnode-id="7143" role="note"><span data-dcnode-id="7154" instrument_node="">This section is an excerpt from </span><a data-dcnode-id="7152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dharamyudh_%28Sikhism%29" title="Dharamyudh (Sikhism)"><span data-dcnode-id="7153" instrument_node="">Dharamyudh (Sikhism)</span></a><span data-dcnode-id="7151" instrument_node="">.</span><span class="mw-editsection-like plainlinks" data-dcnode-id="7144"><span class="mw-editsection-bracket" data-dcnode-id="7149"><span data-dcnode-id="7150" instrument_node="">[</span></span><a class="external text" data-dcnode-id="7147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDharamyudh_%28Sikhism%29%26action%3Dedit"><span data-dcnode-id="7148" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7145"><span data-dcnode-id="7146" instrument_node="">]</span></span></span></div><div class="excerpt" data-dcnode-id="7097"><span data-dcnode-id="7142" instrument_node="">
In </span><a data-dcnode-id="7140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sikhism" title="Sikhism"><span data-dcnode-id="7141" instrument_node="">Sikhism</span></a><span data-dcnode-id="7139" instrument_node="">, </span><a data-dcnode-id="7137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dharamyudh_%28Sikhism%29" title="Dharamyudh (Sikhism)"><span data-dcnode-id="7138" instrument_node="">dharamyudh</span></a><span data-dcnode-id="7136" instrument_node="">, dharam-yudh or dharam yudh is a term which is variously translated as 'religious war',</span><sup class="reference" data-dcnode-id="7133" id="cite_ref-48"><a data-dcnode-id="7134" href="#cite_note-48"><span data-dcnode-id="7135" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="7130" id="cite_ref-Dharamyudh_(Sikhism)_Chima_49-0"><a data-dcnode-id="7131" href="#cite_note-Dharamyudh_(Sikhism)_Chima-49"><span data-dcnode-id="7132" instrument_node="">[49]</span></a></sup><span data-dcnode-id="7129" instrument_node=""> 'war of righteousness',</span><sup class="reference" data-dcnode-id="7126" id="cite_ref-Dharamyudh_(Sikhism)_Chima_49-1"><a data-dcnode-id="7127" href="#cite_note-Dharamyudh_(Sikhism)_Chima-49"><span data-dcnode-id="7128" instrument_node="">[49]</span></a></sup><span data-dcnode-id="7125" instrument_node=""> 'war in defence of righteousness',</span><sup class="reference" data-dcnode-id="7122" id="cite_ref-Dharamyudh_(Sikhism)_Fenech_50-0"><a data-dcnode-id="7123" href="#cite_note-Dharamyudh_(Sikhism)_Fenech-50"><span data-dcnode-id="7124" instrument_node="">[50]</span></a></sup><span data-dcnode-id="7121" instrument_node=""> or 'war for justice'.</span><sup class="reference" data-dcnode-id="7118" id="cite_ref-Dharamyudh_(Sikhism)_Schnabel_51-0"><a data-dcnode-id="7119" href="#cite_note-Dharamyudh_(Sikhism)_Schnabel-51"><span data-dcnode-id="7120" instrument_node="">[51]</span></a></sup><span data-dcnode-id="7117" instrument_node=""> Though some core tenets in the Sikh religion are understood to emphasise peace and nonviolence, especially before the 1606 execution of </span><a data-dcnode-id="7115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guru_Arjan" title="Guru Arjan"><span data-dcnode-id="7116" instrument_node="">Guru Arjan</span></a><span data-dcnode-id="7114" instrument_node=""> by </span><a data-dcnode-id="7112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mughal_Empire" title="Mughal Empire"><span data-dcnode-id="7113" instrument_node="">Mughal</span></a><span data-dcnode-id="7111" instrument_node=""> emperor </span><a data-dcnode-id="7109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jahangir" title="Jahangir"><span data-dcnode-id="7110" instrument_node="">Jahangir</span></a><span data-dcnode-id="7108" instrument_node="">,</span><sup class="reference" data-dcnode-id="7105" id="cite_ref-Dharamyudh_(Sikhism)_Syan_52-0"><a data-dcnode-id="7106" href="#cite_note-Dharamyudh_(Sikhism)_Syan-52"><span data-dcnode-id="7107" instrument_node="">[52]</span></a></sup><span data-dcnode-id="7104" instrument_node=""> military force may be justified if all peaceful means to settle a conflict have been exhausted, thus resulting in a </span><i data-dcnode-id="7102"><span data-dcnode-id="7103" instrument_node="">dharamyudh</span></i><span data-dcnode-id="7101" instrument_node="">.</span><sup class="reference" data-dcnode-id="7098" id="cite_ref-Dharamyudh_(Sikhism)_Fenech_50-1"><a data-dcnode-id="7099" href="#cite_note-Dharamyudh_(Sikhism)_Fenech-50"><span data-dcnode-id="7100" instrument_node="">[50]</span></a></sup></div></div><span data-dcnode-id="7095" instrument_node="">
</span><h2 data-dcnode-id="7085"><span class="mw-headline" data-dcnode-id="7093" id="Antiquity"><span data-dcnode-id="7094" instrument_node="">Antiquity</span></span><span class="mw-editsection" data-dcnode-id="7086"><span class="mw-editsection-bracket" data-dcnode-id="7091"><span data-dcnode-id="7092" instrument_node="">[</span></span><a data-dcnode-id="7089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D13" title="Edit section: Antiquity"><span data-dcnode-id="7090" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7087"><span data-dcnode-id="7088" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7084" instrument_node="">
</span><p data-dcnode-id="7060"><span data-dcnode-id="7083" instrument_node="">In </span><a class="mw-redirect" data-dcnode-id="7081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greek_antiquity" title="Greek antiquity"><span data-dcnode-id="7082" instrument_node="">Greek antiquity</span></a><span data-dcnode-id="7080" instrument_node="">, four (or five) wars were fought in and around the </span><a data-dcnode-id="7078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panhellenic_sanctuary" title="Panhellenic sanctuary"><span data-dcnode-id="7079" instrument_node="">Panhellenic sanctuary</span></a><span data-dcnode-id="7077" instrument_node=""> at </span><a data-dcnode-id="7075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delphi" title="Delphi"><span data-dcnode-id="7076" instrument_node="">Delphi</span></a><span data-dcnode-id="7074" instrument_node=""> (the </span><a data-dcnode-id="7072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pythia" title="Pythia"><span data-dcnode-id="7073" instrument_node="">Pythia</span></a><span data-dcnode-id="7071" instrument_node=""> (Oracle) residing in the </span><a data-dcnode-id="7069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temple_of_Apollo_%28Delphi%29" title="Temple of Apollo (Delphi)"><span data-dcnode-id="7070" instrument_node="">Temple of Apollo</span></a><span data-dcnode-id="7068" instrument_node="">) against persons or states who allegedly committed sacrilegious acts before the god </span><a data-dcnode-id="7066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apollo" title="Apollo"><span data-dcnode-id="7067" instrument_node="">Apollo</span></a><span data-dcnode-id="7065" instrument_node="">.</span><sup class="reference" data-dcnode-id="7062" id="cite_ref-53"><a data-dcnode-id="7063" href="#cite_note-53"><span data-dcnode-id="7064" instrument_node="">[53]</span></a></sup><span data-dcnode-id="7061" instrument_node=""> The following are distinguished:
</span></p><span data-dcnode-id="7059" instrument_node="">
</span><ul data-dcnode-id="7029"><li data-dcnode-id="7054"><span data-dcnode-id="7058" instrument_node="">The </span><a data-dcnode-id="7056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Sacred_War" title="First Sacred War"><span data-dcnode-id="7057" instrument_node="">First Sacred War</span></a><span data-dcnode-id="7055" instrument_node=""> (595–585 BCE)</span></li><span data-dcnode-id="7053" instrument_node="">
</span><li data-dcnode-id="7048"><span data-dcnode-id="7052" instrument_node="">The </span><a data-dcnode-id="7050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Sacred_War" title="Second Sacred War"><span data-dcnode-id="7051" instrument_node="">Second Sacred War</span></a><span data-dcnode-id="7049" instrument_node=""> (449–448 BCE)</span></li><span data-dcnode-id="7047" instrument_node="">
</span><li data-dcnode-id="7042"><span data-dcnode-id="7046" instrument_node="">The </span><a data-dcnode-id="7044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_Sacred_War" title="Third Sacred War"><span data-dcnode-id="7045" instrument_node="">Third Sacred War</span></a><span data-dcnode-id="7043" instrument_node=""> (356–346 BCE)</span></li><span data-dcnode-id="7041" instrument_node="">
</span><li data-dcnode-id="7036"><span data-dcnode-id="7040" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="7038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fourth_Sacred_War" title="Fourth Sacred War"><span data-dcnode-id="7039" instrument_node="">Fourth Sacred War</span></a><span data-dcnode-id="7037" instrument_node=""> (339–338 BCE)</span></li><span data-dcnode-id="7035" instrument_node="">
</span><li data-dcnode-id="7030"><span data-dcnode-id="7034" instrument_node="">The </span><a data-dcnode-id="7032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Areus_I%23Fifth_Sacred_War_%28281%25E2%2580%2593280_BC%29" title="Areus I"><span data-dcnode-id="7033" instrument_node="">Fifth Sacred War</span></a><span data-dcnode-id="7031" instrument_node=""> (281–280 BCE)</span></li></ul><span data-dcnode-id="7028" instrument_node="">
</span><p data-dcnode-id="7003"><span data-dcnode-id="7027" instrument_node="">Firestone (2012) stated that in the eyes of ancient </span><a data-dcnode-id="7025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabbinic_Judaism" title="Rabbinic Judaism"><span data-dcnode-id="7026" instrument_node="">Rabbinic Judaism</span></a><span data-dcnode-id="7024" instrument_node="">, the </span><a data-dcnode-id="7022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maccabean_Revolt" title="Maccabean Revolt"><span data-dcnode-id="7023" instrument_node="">Maccabean Revolt</span></a><span data-dcnode-id="7021" instrument_node=""> (167–160 BCE), the </span><a data-dcnode-id="7019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Jewish%25E2%2580%2593Roman_War" title="First Jewish–Roman War"><span data-dcnode-id="7020" instrument_node="">First Jewish–Roman War</span></a><span data-dcnode-id="7018" instrument_node=""> (66–73 CE) and the </span><a data-dcnode-id="7016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bar_Kokhba_revolt" title="Bar Kokhba revolt"><span data-dcnode-id="7017" instrument_node="">Bar Kokhba revolt</span></a><span data-dcnode-id="7015" instrument_node=""> (132–136 CE) were "holy wars" or "Commanded Wars" (</span><a data-dcnode-id="7013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_language" title="Hebrew language"><span data-dcnode-id="7014" instrument_node="">Hebrew</span></a><span data-dcnode-id="7012" instrument_node="">: מלחמת מצווה </span><i data-dcnode-id="7009"><a data-dcnode-id="7010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milkhemet_Mitzvah" title="Milkhemet Mitzvah"><span data-dcnode-id="7011" instrument_node="">Milkhemet Mitzvah</span></a></i><span data-dcnode-id="7008" instrument_node="">).</span><sup class="reference" data-dcnode-id="7005" id="cite_ref-FOOTNOTEFirestone20123_41-2"><a data-dcnode-id="7006" href="#cite_note-FOOTNOTEFirestone20123-41"><span data-dcnode-id="7007" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7004" instrument_node="">
</span></p><span data-dcnode-id="7002" instrument_node="">
</span><h2 data-dcnode-id="6992"><span class="mw-headline" data-dcnode-id="7000" id="Middle_Ages"><span data-dcnode-id="7001" instrument_node="">Middle Ages</span></span><span class="mw-editsection" data-dcnode-id="6993"><span class="mw-editsection-bracket" data-dcnode-id="6998"><span data-dcnode-id="6999" instrument_node="">[</span></span><a data-dcnode-id="6996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D14" title="Edit section: Middle Ages"><span data-dcnode-id="6997" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6994"><span data-dcnode-id="6995" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6991" instrument_node="">
</span><h3 data-dcnode-id="6981"><span class="mw-headline" data-dcnode-id="6989" id="Christianisation_of_Europe"><span data-dcnode-id="6990" instrument_node="">Christianisation of Europe</span></span><span class="mw-editsection" data-dcnode-id="6982"><span class="mw-editsection-bracket" data-dcnode-id="6987"><span data-dcnode-id="6988" instrument_node="">[</span></span><a data-dcnode-id="6985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D15" title="Edit section: Christianisation of Europe"><span data-dcnode-id="6986" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6983"><span data-dcnode-id="6984" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6980" instrument_node="">
</span><div class="quotebox pullquote floatright" data-dcnode-id="6952" style="width:20%; ;"><span data-dcnode-id="6977" instrument_node="">
</span><blockquote class="quotebox-quote left-aligned" data-dcnode-id="6972" style=""><span data-dcnode-id="6976" instrument_node="">
</span><p data-dcnode-id="6974"><span data-dcnode-id="6975" instrument_node="">"Never was there a war more prolonged nor more cruel than this, nor one that required greater efforts on the part of the Frankish people. For the Saxons (...) are by nature fierce, devoted to the worship of demons and hostile to our religion, and they think it no dishonour to confound and transgress the laws of God and man. On both sides of the frontier murder, robbery, and arson were of constant occurrence, so the Franks declared open war against them."
</span></p><span data-dcnode-id="6973" instrument_node="">
</span></blockquote><span data-dcnode-id="6971" instrument_node="">
</span><p data-dcnode-id="6954"><cite class="left-aligned" data-dcnode-id="6956" style=""><span data-dcnode-id="6970" instrument_node="">– </span><a data-dcnode-id="6968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Einhard" title="Einhard"><span data-dcnode-id="6969" instrument_node="">Einhard</span></a><span data-dcnode-id="6967" instrument_node=""> on the origins of the </span><a data-dcnode-id="6965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saxon_Wars" title="Saxon Wars"><span data-dcnode-id="6966" instrument_node="">Saxon Wars</span></a><span data-dcnode-id="6964" instrument_node=""> in </span><i data-dcnode-id="6961"><a data-dcnode-id="6962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vita_Karoli_Magni" title="Vita Karoli Magni"><span data-dcnode-id="6963" instrument_node="">Vita Karoli Magni</span></a></i><span data-dcnode-id="6960" instrument_node=""> (c. 820)</span><sup class="reference" data-dcnode-id="6957" id="cite_ref-FOOTNOTEUllidtz2010127_54-0"><a data-dcnode-id="6958" href="#cite_note-FOOTNOTEUllidtz2010127-54"><span data-dcnode-id="6959" instrument_node="">[54]</span></a></sup></cite><span data-dcnode-id="6955" instrument_node="">
</span></p><span data-dcnode-id="6953" instrument_node="">
</span></div><span data-dcnode-id="6951" instrument_node="">
</span><p data-dcnode-id="6890"><span data-dcnode-id="6950" instrument_node="">The </span><a data-dcnode-id="6948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saxon_Wars" title="Saxon Wars"><span data-dcnode-id="6949" instrument_node="">Saxon Wars</span></a><span data-dcnode-id="6947" instrument_node=""> (772–804) of Frankish king </span><a data-dcnode-id="6945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charlemagne" title="Charlemagne"><span data-dcnode-id="6946" instrument_node="">Charlemagne</span></a><span data-dcnode-id="6944" instrument_node=""> against the </span><a data-dcnode-id="6942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saxons" title="Saxons"><span data-dcnode-id="6943" instrument_node="">Saxons</span></a><span data-dcnode-id="6941" instrument_node=""> under </span><a data-dcnode-id="6939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Widukind" title="Widukind"><span data-dcnode-id="6940" instrument_node="">Widukind</span></a><span data-dcnode-id="6938" instrument_node=""> were described by </span><a data-dcnode-id="6936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Bradbury" title="Jim Bradbury"><span data-dcnode-id="6937" instrument_node="">Jim Bradbury</span></a><span data-dcnode-id="6935" instrument_node=""> (2004) as 'in essence a frontier struggle and a religious war against pagans – devil-worshippers according to </span><a data-dcnode-id="6933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Einhard" title="Einhard"><span data-dcnode-id="6934" instrument_node="">Einhard</span></a><span data-dcnode-id="6932" instrument_node="">.'</span><sup class="reference" data-dcnode-id="6929" id="cite_ref-FOOTNOTEBradbury200421_55-0"><a data-dcnode-id="6930" href="#cite_note-FOOTNOTEBradbury200421-55"><span data-dcnode-id="6931" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6928" instrument_node=""> He noted that Charlemagne ordered the destruction of the </span><a data-dcnode-id="6926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irminsul" title="Irminsul"><span data-dcnode-id="6927" instrument_node="">Irminsul</span></a><span data-dcnode-id="6925" instrument_node="">, an object sacred to the Saxons.</span><sup class="reference" data-dcnode-id="6922" id="cite_ref-FOOTNOTEBradbury200421_55-1"><a data-dcnode-id="6923" href="#cite_note-FOOTNOTEBradbury200421-55"><span data-dcnode-id="6924" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6921" instrument_node=""> Per Ullidtz (2010) stated that previous Frankish–Saxon conflicts spanning almost a century 'had been mostly a border war', 'but under Charles it changed character': because of 'Charles' idea of unity, of a king over all German tribes, and of universal Christianity in all of his kingdom, it changed into a mission from heaven.'</span><sup class="reference" data-dcnode-id="6918" id="cite_ref-FOOTNOTEUllidtz2010126_56-0"><a data-dcnode-id="6919" href="#cite_note-FOOTNOTEUllidtz2010126-56"><span data-dcnode-id="6920" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6917" instrument_node=""> Similarly, a successful </span><a data-dcnode-id="6915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pannonian_Avars%23Collapse" title="Pannonian Avars"><span data-dcnode-id="6916" instrument_node="">Carolingian campaign against the Pannonian Avars</span></a><span data-dcnode-id="6914" instrument_node=""> in the 790s led to their forced conversion to Christianity.</span><sup class="reference" data-dcnode-id="6911" id="cite_ref-FOOTNOTEBradbury200421_55-2"><a data-dcnode-id="6912" href="#cite_note-FOOTNOTEBradbury200421-55"><span data-dcnode-id="6913" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6910" instrument_node=""> The earlier </span><a data-dcnode-id="6908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merovingian_dynasty" title="Merovingian dynasty"><span data-dcnode-id="6909" instrument_node="">Merovingian</span></a><span data-dcnode-id="6907" instrument_node=""> conquests of Thuringia, Allemannia and Bavaria had also resulted in their Christianisation by 555, although the </span><a data-dcnode-id="6905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frisians" title="Frisians"><span data-dcnode-id="6906" instrument_node="">Frisians</span></a><span data-dcnode-id="6904" instrument_node=""> resisted with similar determinacy as the Saxons during the </span><a data-dcnode-id="6902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frisian%25E2%2580%2593Frankish_wars" title="Frisian–Frankish wars"><span data-dcnode-id="6903" instrument_node="">Frisian–Frankish wars</span></a><span data-dcnode-id="6901" instrument_node=""> (7th and 8th century), with both tribes killing several Christian missionaries in defence of their </span><a data-dcnode-id="6899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germanic_paganism" title="Germanic paganism"><span data-dcnode-id="6900" instrument_node="">Germanic paganism</span></a><span data-dcnode-id="6898" instrument_node="">, to the horror of Christian </span><a data-dcnode-id="6896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hagiography" title="Hagiography"><span data-dcnode-id="6897" instrument_node="">hagiographers</span></a><span data-dcnode-id="6895" instrument_node="">.</span><sup class="reference" data-dcnode-id="6892" id="cite_ref-FOOTNOTEUllidtz2010126_56-1"><a data-dcnode-id="6893" href="#cite_note-FOOTNOTEUllidtz2010126-56"><span data-dcnode-id="6894" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6891" instrument_node="">
</span></p><span data-dcnode-id="6889" instrument_node="">
</span><h3 data-dcnode-id="6879"><span class="mw-headline" data-dcnode-id="6887" id="Crusades"><span data-dcnode-id="6888" instrument_node="">Crusades</span></span><span class="mw-editsection" data-dcnode-id="6880"><span class="mw-editsection-bracket" data-dcnode-id="6885"><span data-dcnode-id="6886" instrument_node="">[</span></span><a data-dcnode-id="6883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D16" title="Edit section: Crusades"><span data-dcnode-id="6884" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6881"><span data-dcnode-id="6882" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6878" instrument_node="">
</span><link data-dcnode-id="6877" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6873" role="note"><span data-dcnode-id="6876" instrument_node="">Main article: </span><a data-dcnode-id="6874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Historiography_of_the_Crusades" title="Historiography of the Crusades"><span data-dcnode-id="6875" instrument_node="">Historiography of the Crusades</span></a></div><span data-dcnode-id="6872" instrument_node="">
</span><p data-dcnode-id="6855"><span data-dcnode-id="6871" instrument_node="">The </span><a data-dcnode-id="6869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crusades" title="Crusades"><span data-dcnode-id="6870" instrument_node="">Crusades</span></a><span data-dcnode-id="6868" instrument_node=""> are a prime example of wars whose religious elements have been extensively debated for centuries, with some groups of people in some periods emphasising, restoring or overstating the religious aspects, and other groups of people in some periods denying, nuancing or downplaying the religious aspects of the Crusades in favour of other factors. </span><i data-dcnode-id="6865"><a data-dcnode-id="6866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Winkler_Prins" title="Winkler Prins"><span data-dcnode-id="6867" instrument_node="">Winkler Prins</span></a></i><span data-dcnode-id="6864" instrument_node="">/</span><i data-dcnode-id="6861"><a data-dcnode-id="6862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Encarta" title="Encarta"><span data-dcnode-id="6863" instrument_node="">Encarta</span></a></i><span data-dcnode-id="6860" instrument_node=""> (2002) concluded: "The traditional explanation for the Crusades (a religious enthusiasm that found an outlet in a Holy War) has also retained its value in modern historical scholarship, keeping in mind the fact that it has been pointed out that a complex set of socio-economic and political factors allowed this enthusiasm to manifest itself."</span><sup class="reference" data-dcnode-id="6857" id="cite_ref-57"><a data-dcnode-id="6858" href="#cite_note-57"><span data-dcnode-id="6859" instrument_node="">[57]</span></a></sup><span data-dcnode-id="6856" instrument_node="">
