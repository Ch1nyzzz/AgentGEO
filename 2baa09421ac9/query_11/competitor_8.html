</span><div class="thumb tright" data-dcnode-id="8757"><div class="thumbinner" data-dcnode-id="8758" style="width:222px;"><a class="image" data-dcnode-id="8767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARegaining_the_Provincial_Capital_of_Ruizhou.jpg"><img alt="" class="thumbimage" data-dcnode-id="8768" data-file-height="877" data-file-width="2000" decoding="async" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Regaining_the_Provincial_Capital_of_Ruizhou.jpg/220px-Regaining_the_Provincial_Capital_of_Ruizhou.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Regaining_the_Provincial_Capital_of_Ruizhou.jpg/330px-Regaining_the_Provincial_Capital_of_Ruizhou.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Regaining_the_Provincial_Capital_of_Ruizhou.jpg/440px-Regaining_the_Provincial_Capital_of_Ruizhou.jpg 2x" width="220"></a><span data-dcnode-id="8766" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8759"><div class="magnify" data-dcnode-id="8764"><a class="internal" data-dcnode-id="8765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARegaining_the_Provincial_Capital_of_Ruizhou.jpg" title="Enlarge"></a></div><span data-dcnode-id="8763" instrument_node="">A sample scene of the </span><a data-dcnode-id="8761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taiping_Rebellion" title="Taiping Rebellion"><span data-dcnode-id="8762" instrument_node="">Taiping Rebellion</span></a><span data-dcnode-id="8760" instrument_node="">.</span></div></div></div><span data-dcnode-id="8756" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8739"><div class="thumbinner" data-dcnode-id="8740" style="width:222px;"><a class="image" data-dcnode-id="8754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASaladin_and_Guy.jpg"><img alt="" class="thumbimage" data-dcnode-id="8755" data-file-height="931" data-file-width="1200" decoding="async" height="171" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Saladin_and_Guy.jpg/220px-Saladin_and_Guy.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Saladin_and_Guy.jpg/330px-Saladin_and_Guy.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Saladin_and_Guy.jpg/440px-Saladin_and_Guy.jpg 2x" width="220"></a><span data-dcnode-id="8753" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8741"><div class="magnify" data-dcnode-id="8751"><a class="internal" data-dcnode-id="8752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASaladin_and_Guy.jpg" title="Enlarge"></a></div><a data-dcnode-id="8749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saladin" title="Saladin"><span data-dcnode-id="8750" instrument_node="">Saladin</span></a><span data-dcnode-id="8748" instrument_node=""> and </span><a data-dcnode-id="8746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_of_Lusignan" title="Guy of Lusignan"><span data-dcnode-id="8747" instrument_node="">Guy of Lusignan</span></a><span data-dcnode-id="8745" instrument_node=""> after the </span><a data-dcnode-id="8743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Hattin" title="Battle of Hattin"><span data-dcnode-id="8744" instrument_node="">Battle of Hattin</span></a><span data-dcnode-id="8742" instrument_node=""> of 1187</span></div></div></div><span data-dcnode-id="8738" instrument_node="">
</span><p data-dcnode-id="8703"><span data-dcnode-id="8737" instrument_node="">A </span><b data-dcnode-id="8735"><span data-dcnode-id="8736" instrument_node="">religious war</span></b><span data-dcnode-id="8734" instrument_node=""> or a </span><b data-dcnode-id="8732"><span data-dcnode-id="8733" instrument_node="">war of religion</span></b><span data-dcnode-id="8731" instrument_node="">, sometimes also known as a </span><b data-dcnode-id="8729"><span data-dcnode-id="8730" instrument_node="">holy war</span></b><span data-dcnode-id="8728" instrument_node=""> (</span><a class="mw-redirect" data-dcnode-id="8726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin_language" title="Latin language"><span data-dcnode-id="8727" instrument_node="">Latin</span></a><span data-dcnode-id="8725" instrument_node="">: </span><i data-dcnode-id="8723" lang="la"><span data-dcnode-id="8724" instrument_node="">bellum sacrum</span></i><span data-dcnode-id="8722" instrument_node="">), is a </span><a data-dcnode-id="8720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War" title="War"><span data-dcnode-id="8721" instrument_node="">war</span></a><span data-dcnode-id="8719" instrument_node=""> which is primarily caused or justified by differences in </span><a data-dcnode-id="8717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religion" title="Religion"><span data-dcnode-id="8718" instrument_node="">religion</span></a><span data-dcnode-id="8716" instrument_node="">. In the </span><a class="mw-redirect" data-dcnode-id="8714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_period" title="Modern period"><span data-dcnode-id="8715" instrument_node="">modern period</span></a><span data-dcnode-id="8713" instrument_node="">, there are frequent debates over the extent to which religious, </span><a data-dcnode-id="8711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War%23Economic" title="War"><span data-dcnode-id="8712" instrument_node="">economic</span></a><span data-dcnode-id="8710" instrument_node="">, </span><a data-dcnode-id="8708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnic_conflict" title="Ethnic conflict"><span data-dcnode-id="8709" instrument_node="">ethnic</span></a><span data-dcnode-id="8707" instrument_node=""> or other aspects of a conflict are predominant in a given war. The degree to which a war may be considered religious depends on many underlying questions, such as the </span><a data-dcnode-id="8705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Definition_of_religion" title="Definition of religion"><span data-dcnode-id="8706" instrument_node="">definition of religion</span></a><span data-dcnode-id="8704" instrument_node="">, the definition of 'religious war' (taking religious traditions on violence such as 'holy war' into account), and the applicability of religion to war as opposed to other possible factors. Answers to these questions heavily influence conclusions on how prevalent religious wars have been as opposed to other types of wars.
</span></p><p data-dcnode-id="8662"><span data-dcnode-id="8702" instrument_node="">According to scholars such as </span><a data-dcnode-id="8700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeffrey_Burton_Russell" title="Jeffrey Burton Russell"><span data-dcnode-id="8701" instrument_node="">Jeffrey Burton Russell</span></a><span data-dcnode-id="8699" instrument_node="">, conflicts  may not be rooted strictly in religion and instead may be a cover for the underlying secular power, ethnic, social, political, and economic reasons for conflict.</span><sup class="reference" data-dcnode-id="8696" id="cite_ref-Jeffrey_Russell_1-0"><a data-dcnode-id="8697" href="#cite_note-Jeffrey_Russell-1"><span data-dcnode-id="8698" instrument_node="">[1]</span></a></sup><span data-dcnode-id="8695" instrument_node=""> Other scholars have argued that what is termed "religious wars" is a largely "Western dichotomy" and a modern invention from the past few centuries, arguing that all wars that are classed as "religious" have secular (economic or political) ramifications.</span><sup class="reference" data-dcnode-id="8692" id="cite_ref-Cavanaugh_2-0"><a data-dcnode-id="8693" href="#cite_note-Cavanaugh-2"><span data-dcnode-id="8694" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="8689" id="cite_ref-50_great1_3-0"><a data-dcnode-id="8690" href="#cite_note-50_great1-3"><span data-dcnode-id="8691" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="8686" id="cite_ref-p._110_4-0"><a data-dcnode-id="8687" href="#cite_note-p._110-4"><span data-dcnode-id="8688" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8685" instrument_node=""> In several conflicts including the </span><a data-dcnode-id="8683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israeli%25E2%2580%2593Palestinian_conflict" title="Israeli–Palestinian conflict"><span data-dcnode-id="8684" instrument_node="">Israeli–Palestinian conflict</span></a><span data-dcnode-id="8682" instrument_node="">, the </span><a data-dcnode-id="8680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syrian_civil_war" title="Syrian civil war"><span data-dcnode-id="8681" instrument_node="">Syrian civil war</span></a><span data-dcnode-id="8679" instrument_node="">, and the wars in </span><a class="mw-redirect" data-dcnode-id="8677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_in_Afghanistan_%282001%25E2%2580%2593present%29" title="War in Afghanistan (2001–present)"><span data-dcnode-id="8678" instrument_node="">Afghanistan</span></a><span data-dcnode-id="8676" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraqi_insurgency_%28post-U.S._withdrawal%29" title="Iraqi insurgency (post-U.S. withdrawal)"><span data-dcnode-id="8675" instrument_node="">Iraq</span></a><span data-dcnode-id="8673" instrument_node="">, religious elements are overtly present, but variously described as </span><a data-dcnode-id="8671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fundamentalism" title="Fundamentalism"><span data-dcnode-id="8672" instrument_node="">fundamentalism</span></a><span data-dcnode-id="8670" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="8668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religious_extremism" title="Religious extremism"><span data-dcnode-id="8669" instrument_node="">religious extremism</span></a><span data-dcnode-id="8667" instrument_node="">—depending upon the observer's sympathies. However, studies on these cases often conclude that ethnic animosities drive much of the conflicts.</span><sup class="reference" data-dcnode-id="8664" id="cite_ref-Omar_5-0"><a data-dcnode-id="8665" href="#cite_note-Omar-5"><span data-dcnode-id="8666" instrument_node="">[5]</span></a></sup><span data-dcnode-id="8663" instrument_node="">
</span></p><p data-dcnode-id="8642"><span data-dcnode-id="8661" instrument_node="">According to the </span><i data-dcnode-id="8659"><span data-dcnode-id="8660" instrument_node="">Encyclopedia of Wars</span></i><span data-dcnode-id="8658" instrument_node="">, out of all 1,763 known/recorded historical conflicts, 121, or 6.87%, had religion as their primary cause.</span><sup class="reference" data-dcnode-id="8655" id="cite_ref-Axelrod_vol3_6-0"><a data-dcnode-id="8656" href="#cite_note-Axelrod_vol3-6"><span data-dcnode-id="8657" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8654" instrument_node=""> Matthew White's </span><i data-dcnode-id="8651"><a data-dcnode-id="8652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Great_Big_Book_of_Horrible_Things" title="The Great Big Book of Horrible Things"><span data-dcnode-id="8653" instrument_node="">The Great Big Book of Horrible Things</span></a></i><span data-dcnode-id="8650" instrument_node=""> gives religion as the primary cause of 11 of the world's 100 deadliest atrocities.</span><sup class="reference" data-dcnode-id="8647" id="cite_ref-White_7-0"><a data-dcnode-id="8648" href="#cite_note-White-7"><span data-dcnode-id="8649" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="8644" id="cite_ref-8"><a data-dcnode-id="8645" href="#cite_note-8"><span data-dcnode-id="8646" instrument_node="">[8]</span></a></sup><span data-dcnode-id="8643" instrument_node="">
</span></p><span data-dcnode-id="8641" instrument_node="">

</span><link data-dcnode-id="8251" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8241" role="note"><span data-dcnode-id="8250" instrument_node="">See also: </span><a data-dcnode-id="8248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Just_war_theory" title="Just war theory"><span data-dcnode-id="8249" instrument_node="">Just war theory</span></a><span data-dcnode-id="8247" instrument_node="">, </span><a data-dcnode-id="8245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religious_terrorism" title="Religious terrorism"><span data-dcnode-id="8246" instrument_node="">Religious terrorism</span></a><span data-dcnode-id="8244" instrument_node="">, and </span><a data-dcnode-id="8242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religious_violence" title="Religious violence"><span data-dcnode-id="8243" instrument_node="">Religious violence</span></a></div><span data-dcnode-id="8240" instrument_node="">
</span><p data-dcnode-id="8225"><a data-dcnode-id="8238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Konrad_Repgen" title="Konrad Repgen"><span data-dcnode-id="8239" instrument_node="">Konrad Repgen</span></a><span data-dcnode-id="8237" instrument_node=""> (1987) pointed out that belligerents may have multiple intentions to wage a war, may have had ulterior motives that historians can no longer discover, and therefore, calling something a 'religious war' (or '</span><a data-dcnode-id="8235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_succession" title="War of succession"><span data-dcnode-id="8236" instrument_node="">war of succession</span></a><span data-dcnode-id="8234" instrument_node="">') based merely on a motive that a belligerent may have had, doesn't necessarily make it one.</span><sup class="reference" data-dcnode-id="8231" id="cite_ref-Onnekink_9-0"><a data-dcnode-id="8232" href="#cite_note-Onnekink-9"><span data-dcnode-id="8233" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8230" instrument_node=""> Although ulterior motives may never be known, war proclamations do provide evidence for a belligerent's legitimisation of the war to the public.</span><sup class="reference" data-dcnode-id="8227" id="cite_ref-Onnekink_9-1"><a data-dcnode-id="8228" href="#cite_note-Onnekink-9"><span data-dcnode-id="8229" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8226" instrument_node=""> Repgen therefore concluded: 
</span></p><span data-dcnode-id="8224" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="8213"><p data-dcnode-id="8214"><span data-dcnode-id="8221" instrument_node="">...wars should only be termed [religious wars], in so far as at least one of the belligerents lays claim to 'religion', a religious law, in order to justify his warfare and to substantiate publicly why his use of military force against a political authority should be a </span><i data-dcnode-id="8219"><span data-dcnode-id="8220" instrument_node="">bellum iustum</span></i><span data-dcnode-id="8218" instrument_node="">.</span><sup class="reference" data-dcnode-id="8215" id="cite_ref-Onnekink_9-2"><a data-dcnode-id="8216" href="#cite_note-Onnekink-9"><span data-dcnode-id="8217" instrument_node="">[9]</span></a></sup></p></blockquote><span data-dcnode-id="8212" instrument_node="">
</span><p data-dcnode-id="8193"><a data-dcnode-id="8210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philip_Benedict" title="Philip Benedict"><span data-dcnode-id="8211" instrument_node="">Philip Benedict</span></a><span data-dcnode-id="8209" instrument_node=""> (2006) argued that Repgen's definition of 'religious war' was too narrow, because sometimes both legitimisation and motivation can established.</span><sup class="reference" data-dcnode-id="8206" id="cite_ref-Onnekink_9-3"><a data-dcnode-id="8207" href="#cite_note-Onnekink-9"><span data-dcnode-id="8208" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8205" instrument_node=""> David Onnekink (2013) added that a 'religious war' is not necessarily the same as a 'holy war' (</span><i data-dcnode-id="8203"><span data-dcnode-id="8204" instrument_node="">bellum sacrum</span></i><span data-dcnode-id="8202" instrument_node="">): 'After all, it is perfectly acceptable to suggest that a worldly prince, say, a Lutheran prince in Reformation Germany, engages in religious warfare using mercenary armies.'</span><sup class="reference" data-dcnode-id="8199" id="cite_ref-Onnekink_9-4"><a data-dcnode-id="8200" href="#cite_note-Onnekink-9"><span data-dcnode-id="8201" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8198" instrument_node=""> While a holy war needs to be authorised by a religious leader and fought by pious soldiers, a religious war does not, he reasoned.</span><sup class="reference" data-dcnode-id="8195" id="cite_ref-Onnekink_9-5"><a data-dcnode-id="8196" href="#cite_note-Onnekink-9"><span data-dcnode-id="8197" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8194" instrument_node=""> His definition of 'war of religion' thus became:
</span></p><span data-dcnode-id="8192" instrument_node="">
</span><link data-dcnode-id="8191" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8185"><p data-dcnode-id="8186"><span data-dcnode-id="8190" instrument_node="">a war legitimised by religion and/or for religious ends (but possibly fought by secular leaders and soldiers).</span><sup class="reference" data-dcnode-id="8187" id="cite_ref-Onnekink_9-6"><a data-dcnode-id="8188" href="#cite_note-Onnekink-9"><span data-dcnode-id="8189" instrument_node="">[9]</span></a></sup></p></blockquote><span data-dcnode-id="8184" instrument_node="">
</span><h2 data-dcnode-id="8174"><span class="mw-headline" data-dcnode-id="8182" id="Applicability_of_religion_to_war"><span data-dcnode-id="8183" instrument_node="">Applicability of religion to war</span></span><span class="mw-editsection" data-dcnode-id="8175"><span class="mw-editsection-bracket" data-dcnode-id="8180"><span data-dcnode-id="8181" instrument_node="">[</span></span><a data-dcnode-id="8178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D2" title="Edit section: Applicability of religion to war"><span data-dcnode-id="8179" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8176"><span data-dcnode-id="8177" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8173" instrument_node="">
</span><link data-dcnode-id="8172" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8165" role="note"><span data-dcnode-id="8171" instrument_node="">See also: </span><a data-dcnode-id="8169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Definition_of_religion" title="Definition of religion"><span data-dcnode-id="8170" instrument_node="">Definition of religion</span></a><span data-dcnode-id="8168" instrument_node=""> and </span><a data-dcnode-id="8166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_succession%23Applicability" title="War of succession"><span data-dcnode-id="8167" instrument_node="">War of succession §&nbsp;Applicability</span></a></div><span data-dcnode-id="8164" instrument_node="">
</span><p data-dcnode-id="8134"><span data-dcnode-id="8163" instrument_node="">Some commentators have questioned the applicability of religion to war, in part because the word "religion" itself is difficult to define, particularly posing challenges when one tries to apply it to non-Western cultures. Secondly, it has been argued that religion is difficult to isolate as a factor, and is often just one of many factors driving a war. For example, many armed conflicts may be simultaneously </span><a data-dcnode-id="8161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_succession" title="War of succession"><span data-dcnode-id="8162" instrument_node="">wars of succession</span></a><span data-dcnode-id="8160" instrument_node=""> as well as wars of religion when two rival claimants to a throne also represent opposing religions.</span><sup class="reference" data-dcnode-id="8157" id="cite_ref-Luard_10-0"><a data-dcnode-id="8158" href="#cite_note-Luard-10"><span data-dcnode-id="8159" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8156" instrument_node=""> Examples include the </span><a data-dcnode-id="8154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_the_Three_Henrys" title="War of the Three Henrys"><span data-dcnode-id="8155" instrument_node="">War of the Three Henrys</span></a><span data-dcnode-id="8153" instrument_node=""> and the </span><a data-dcnode-id="8151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Succession_of_Henry_IV_of_France" title="Succession of Henry IV of France"><span data-dcnode-id="8152" instrument_node="">Succession of Henry IV of France</span></a><span data-dcnode-id="8150" instrument_node=""> during the </span><a data-dcnode-id="8148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Wars_of_Religion" title="French Wars of Religion"><span data-dcnode-id="8149" instrument_node="">French Wars of Religion</span></a><span data-dcnode-id="8147" instrument_node="">, the </span><a data-dcnode-id="8145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hessian_War" title="Hessian War"><span data-dcnode-id="8146" instrument_node="">Hessian War</span></a><span data-dcnode-id="8144" instrument_node=""> and the </span><a data-dcnode-id="8142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_the_J%25C3%25BClich_Succession" title="War of the Jülich Succession"><span data-dcnode-id="8143" instrument_node="">War of the Jülich Succession</span></a><span data-dcnode-id="8141" instrument_node=""> during the Reformation in Germany, and the </span><a class="mw-redirect" data-dcnode-id="8139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacobite_risings" title="Jacobite risings"><span data-dcnode-id="8140" instrument_node="">Jacobite risings</span></a><span data-dcnode-id="8138" instrument_node=""> (including the </span><a data-dcnode-id="8136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Williamite" title="Williamite"><span data-dcnode-id="8137" instrument_node="">Williamite</span></a><span data-dcnode-id="8135" instrument_node="">–Jacobite wars) during the Reformation in Great Britain and Ireland.
</span></p><p data-dcnode-id="8128"><span data-dcnode-id="8133" instrument_node="">John Morreall and Tamara Sonn (2013) have argued that since there is no consensus on definitions of "religion" among scholars and no way to isolate "religion" from the rest of the more likely motivational dimensions (social, political, and economic); it is incorrect to label any violent event as "religious".</span><sup class="reference" data-dcnode-id="8130" id="cite_ref-50_great_11-0"><a data-dcnode-id="8131" href="#cite_note-50_great-11"><span data-dcnode-id="8132" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8129" instrument_node="">
</span></p><p data-dcnode-id="8087"><span data-dcnode-id="8127" instrument_node="">Theologian </span><a data-dcnode-id="8125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_T._Cavanaugh" title="William T. Cavanaugh"><span data-dcnode-id="8126" instrument_node="">William T. Cavanaugh</span></a><span data-dcnode-id="8124" instrument_node=""> in his </span><i data-dcnode-id="8122"><span data-dcnode-id="8123" instrument_node="">Myth of Religious Violence</span></i><span data-dcnode-id="8121" instrument_node=""> (2009) argues that the very concept of "religion" is a modern Western concept that was invented recently in history. As such, he argues that the concept of "religious violence" or "religious wars" are incorrectly used to anachronistically label people and conflicts as participants in religious ideologies that never existed in the first place.</span><sup class="reference" data-dcnode-id="8118" id="cite_ref-Cavanaugh_2-1"><a data-dcnode-id="8119" href="#cite_note-Cavanaugh-2"><span data-dcnode-id="8120" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8117" instrument_node=""> The concept of "religion" as an abstraction which entails distinct sets of beliefs or doctrines is a recently invented concept in the English language since such usage began with texts from the 17th century due to the splitting of Christendom during the Protestant Reformation and more prevalent colonization or globalization in the age of exploration which involved contact with numerous foreign and indigenous cultures with non-European languages.</span><sup class="reference" data-dcnode-id="8114" id="cite_ref-Harrison_Territories_12-0"><a data-dcnode-id="8115" href="#cite_note-Harrison_Territories-12"><span data-dcnode-id="8116" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8113" instrument_node=""> It was in the 17th century that the concept of "religion" received its modern shape despite the fact that the Bible, the Quran, and other ancient sacred texts did not have a concept of religion in the original languages and neither did the people or the cultures in which these sacred texts were written.</span><sup class="reference" data-dcnode-id="8110" id="cite_ref-Nongbri_13-0"><a data-dcnode-id="8111" href="#cite_note-Nongbri-13"><span data-dcnode-id="8112" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8109" instrument_node=""> The modern word </span><i data-dcnode-id="8107"><span data-dcnode-id="8108" instrument_node="">religion</span></i><span data-dcnode-id="8106" instrument_node=""> comes from the Latin word </span><i data-dcnode-id="8104"><span data-dcnode-id="8105" instrument_node="">religio</span></i><span data-dcnode-id="8103" instrument_node=""> which, in the ancient and medieval world, was understood as an individual virtue of worship, never as doctrine, practice, or actual source of knowledge.</span><sup class="reference" data-dcnode-id="8100" id="cite_ref-Harrison_Territories_12-1"><a data-dcnode-id="8101" href="#cite_note-Harrison_Territories-12"><span data-dcnode-id="8102" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8099" instrument_node=""> Cavanaugh argued that all wars that are classed as "religious" have secular (economic or political) ramifications.</span><sup class="reference" data-dcnode-id="8096" id="cite_ref-Cavanaugh_2-2"><a data-dcnode-id="8097" href="#cite_note-Cavanaugh-2"><span data-dcnode-id="8098" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8095" instrument_node=""> Similar opinions were expressed as early as the 1760s, during the </span><a data-dcnode-id="8093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seven_Years%2527_War" title="Seven Years' War"><span data-dcnode-id="8094" instrument_node="">Seven Years' War</span></a><span data-dcnode-id="8092" instrument_node="">, widely recognized to be "religious" in motivation, noting that the warring factions were not necessarily split along confessional lines as much as along secular interests.</span><sup class="reference" data-dcnode-id="8089" id="cite_ref-p._110_4-1"><a data-dcnode-id="8090" href="#cite_note-p._110-4"><span data-dcnode-id="8091" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8088" instrument_node="">
</span></p><p data-dcnode-id="8068"><span data-dcnode-id="8086" instrument_node="">There is no precise equivalent of "religion" in Hebrew, and </span><a data-dcnode-id="8084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judaism" title="Judaism"><span data-dcnode-id="8085" instrument_node="">Judaism</span></a><span data-dcnode-id="8083" instrument_node=""> does not distinguish clearly between religious, national, racial, or ethnic identities.</span><sup class="reference" data-dcnode-id="8080" id="cite_ref-14"><a data-dcnode-id="8081" href="#cite_note-14"><span data-dcnode-id="8082" instrument_node="">[14]</span></a></sup><span data-dcnode-id="8079" instrument_node=""> In the Quran, the Arabic word </span><i data-dcnode-id="8077"><span data-dcnode-id="8078" instrument_node="">din</span></i><span data-dcnode-id="8076" instrument_node=""> is often translated as "religion" in modern translations, but up to the mid-17th century, translators expressed </span><i data-dcnode-id="8074"><span data-dcnode-id="8075" instrument_node="">din</span></i><span data-dcnode-id="8073" instrument_node=""> as "law".</span><sup class="reference" data-dcnode-id="8070" id="cite_ref-Nongbri_13-1"><a data-dcnode-id="8071" href="#cite_note-Nongbri-13"><span data-dcnode-id="8072" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8069" instrument_node="">
</span></p><p data-dcnode-id="8020"><span data-dcnode-id="8067" instrument_node="">It was in the 19th century that the terms "Buddhism", "Hinduism", "Taoism", and "Confucianism" first emerged.</span><sup class="reference" data-dcnode-id="8064" id="cite_ref-Harrison_Territories_12-2"><a data-dcnode-id="8065" href="#cite_note-Harrison_Territories-12"><span data-dcnode-id="8066" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="8061" id="cite_ref-Invention_Japan_15-0"><a data-dcnode-id="8062" href="#cite_note-Invention_Japan-15"><span data-dcnode-id="8063" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8060" instrument_node=""> Throughout its long history, Japan had no concept of "religion" since there was no corresponding Japanese word, nor anything close to its meaning, but when American warships appeared off the coast of Japan in 1853 and forced the Japanese government to sign treaties demanding, among other things, freedom of religion, the country had to contend with this Western idea.</span><sup class="reference" data-dcnode-id="8057" id="cite_ref-Invention_Japan_15-1"><a data-dcnode-id="8058" href="#cite_note-Invention_Japan-15"><span data-dcnode-id="8059" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8056" instrument_node=""> According to the </span><a class="mw-redirect" data-dcnode-id="8054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philologist" title="Philologist"><span data-dcnode-id="8055" instrument_node="">philologist</span></a><span data-dcnode-id="8053" instrument_node=""> </span><a data-dcnode-id="8051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Max_M%25C3%25BCller" title="Max Müller"><span data-dcnode-id="8052" instrument_node="">Max Müller</span></a><span data-dcnode-id="8050" instrument_node="">, what is called ancient religion today, would have only been understood as "law" by the people in the ancient world.</span><sup class="reference" data-dcnode-id="8047" id="cite_ref-16"><a data-dcnode-id="8048" href="#cite_note-16"><span data-dcnode-id="8049" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8046" instrument_node=""> In </span><a data-dcnode-id="8044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanskrit" title="Sanskrit"><span data-dcnode-id="8045" instrument_node="">Sanskrit</span></a><span data-dcnode-id="8043" instrument_node=""> word </span><a data-dcnode-id="8041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dharma" title="Dharma"><span data-dcnode-id="8042" instrument_node="">dharma</span></a><span data-dcnode-id="8040" instrument_node="">, sometimes translated as "religion", also means law. Throughout the classical </span><a data-dcnode-id="8038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_subcontinent" title="Indian subcontinent"><span data-dcnode-id="8039" instrument_node="">Indian subcontinent</span></a><span data-dcnode-id="8037" instrument_node="">, the </span><a data-dcnode-id="8035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dharma%25C5%259B%25C4%2581stra" title="Dharmaśāstra"><span data-dcnode-id="8036" instrument_node="">study of law</span></a><span data-dcnode-id="8034" instrument_node=""> consisted of concepts such as </span><a data-dcnode-id="8032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pr%25C4%2581ya%25C5%259Bcitta" title="Prāyaścitta"><span data-dcnode-id="8033" instrument_node="">penance through piety</span></a><span data-dcnode-id="8031" instrument_node=""> and </span><a data-dcnode-id="8029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C4%2580c%25C4%2581ra" title="Ācāra"><span data-dcnode-id="8030" instrument_node="">ceremonial as well as practical traditions</span></a><span data-dcnode-id="8028" instrument_node="">. Medieval Japan at first had a similar union between "imperial law" and universal or "Buddha law", but these later became independent sources of power.</span><sup class="reference" data-dcnode-id="8025" id="cite_ref-17"><a data-dcnode-id="8026" href="#cite_note-17"><span data-dcnode-id="8027" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="8022" id="cite_ref-18"><a data-dcnode-id="8023" href="#cite_note-18"><span data-dcnode-id="8024" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8021" instrument_node="">
</span></p><p data-dcnode-id="8004"><span data-dcnode-id="8019" instrument_node="">According to McGarry &amp; O'Leary (1995), it is evident that religion as one aspect of a people's </span><a data-dcnode-id="8017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_heritage" title="Cultural heritage"><span data-dcnode-id="8018" instrument_node="">cultural heritage</span></a><span data-dcnode-id="8016" instrument_node=""> may serve as a cultural marker or ideological rationalisation for a conflict that has deeper ethnic and cultural differences. They argued this specifically in the case of </span><a data-dcnode-id="8014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Troubles" title="The Troubles"><span data-dcnode-id="8015" instrument_node="">The Troubles</span></a><span data-dcnode-id="8013" instrument_node=""> in Northern Ireland, often portrayed as a religious conflict of a Catholic vs. a Protestant faction, while the more fundamental cause of the conflict  was supposedly ethnic or nationalistic rather than religious in nature.</span><sup class="reference" data-dcnode-id="8010" id="cite_ref-McGarry_J_1995_19-0"><a data-dcnode-id="8011" href="#cite_note-McGarry_J_1995-19"><span data-dcnode-id="8012" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8009" instrument_node=""> Since the native Irish were mostly Catholic and the later British-sponsored immigrants were mainly Protestant, the terms become shorthand for the two cultures, but McGarry &amp; O'Leary argued that it would be inaccurate to describe the conflict as a religious one.</span><sup class="reference" data-dcnode-id="8006" id="cite_ref-McGarry_J_1995_19-1"><a data-dcnode-id="8007" href="#cite_note-McGarry_J_1995-19"><span data-dcnode-id="8008" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8005" instrument_node="">
</span></p><p data-dcnode-id="7998"><span data-dcnode-id="8003" instrument_node="">In their 2015 review of violence and peacemaking in world religions, Irfan Omar and Michael Duffey stated: "This book does not ignore violence committed in the name of religion. Analyses of case studies of seeming religious violence often conclude that violence is strongly driven by ethnic animosities."</span><sup class="reference" data-dcnode-id="8000" id="cite_ref-Omar_5-1"><a data-dcnode-id="8001" href="#cite_note-Omar-5"><span data-dcnode-id="8002" instrument_node="">[5]</span></a></sup><span data-dcnode-id="7999" instrument_node="">
</span></p><span data-dcnode-id="7997" instrument_node="">
</span><h2 data-dcnode-id="7987"><span class="mw-headline" data-dcnode-id="7995" id="Prevalence"><span data-dcnode-id="7996" instrument_node="">Prevalence</span></span><span class="mw-editsection" data-dcnode-id="7988"><span class="mw-editsection-bracket" data-dcnode-id="7993"><span data-dcnode-id="7994" instrument_node="">[</span></span><a data-dcnode-id="7991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D3" title="Edit section: Prevalence"><span data-dcnode-id="7992" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7989"><span data-dcnode-id="7990" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7986" instrument_node="">
</span><link data-dcnode-id="7985" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7978" role="note"><span data-dcnode-id="7984" instrument_node="">See also: </span><a data-dcnode-id="7982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Casus_belli%23Categorisation" title="Casus belli"><span data-dcnode-id="7983" instrument_node="">Casus belli §&nbsp;Categorisation</span></a><span data-dcnode-id="7981" instrument_node="">, and </span><a data-dcnode-id="7979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_succession%23Prevalence_and_impact" title="War of succession"><span data-dcnode-id="7980" instrument_node="">War of succession §&nbsp;Prevalence and impact</span></a></div><span data-dcnode-id="7977" instrument_node="">
</span><p data-dcnode-id="7975"><span data-dcnode-id="7976" instrument_node="">The definition of 'religious war' and the applicability of religion to war have a strong influence on how many wars may be properly labelled 'religious wars', and thus how prevalent religious wars have been as opposed to other wars.
</span></p><p data-dcnode-id="7956"><span data-dcnode-id="7974" instrument_node="">According to </span><a data-dcnode-id="7972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kalevi_Holsti" title="Kalevi Holsti"><span data-dcnode-id="7973" instrument_node="">Kalevi Holsti</span></a><span data-dcnode-id="7971" instrument_node=""> (1991, p. 308, Table 12.2), who catalogued and categorised wars from 1648 to 1989 into to 24 categories of 'issues that generated wars', 'protect[ion of] religious </span><a class="extiw" data-dcnode-id="7969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/confrere" title="wikt:confrere"><span data-dcnode-id="7970" instrument_node="">confrères</span></a><span data-dcnode-id="7968" instrument_node="">' (co-religionists) was (one of) the primary cause(s) of 14% of all wars during 1648–1714, 11% during 1715–1814, 10% during 1815–1914, and 0% during 1918–1941 and 1945–1989.</span><sup class="reference" data-dcnode-id="7965" id="cite_ref-FOOTNOTEHolsti1991308_20-0"><a data-dcnode-id="7966" href="#cite_note-FOOTNOTEHolsti1991308-20"><span data-dcnode-id="7967" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7964" instrument_node=""> Additionally, he found 'ethnic/religious unification/</span><a data-dcnode-id="7962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irredentism" title="Irredentism"><span data-dcnode-id="7963" instrument_node="">irredenta</span></a><span data-dcnode-id="7961" instrument_node="">' to be (one of) the primary cause(s) of 0% of all wars during 1648–1714 and 1715–1814, 6% during 1815–1914, 17% during 1918–1941, and 12% during 1945–1989.</span><sup class="reference" data-dcnode-id="7958" id="cite_ref-FOOTNOTEHolsti1991308_20-1"><a data-dcnode-id="7959" href="#cite_note-FOOTNOTEHolsti1991308-20"><span data-dcnode-id="7960" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7957" instrument_node="">
</span></p><p data-dcnode-id="7910"><span data-dcnode-id="7955" instrument_node="">In their 1997 </span><i data-dcnode-id="7953"><span data-dcnode-id="7954" instrument_node="">Encyclopedia of Wars</span></i><span data-dcnode-id="7952" instrument_node="">, authors </span><a class="new" data-dcnode-id="7950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCharles_Phillips_%28historian%29%26action%3Dedit%26redlink%3D1" title="Charles Phillips (historian) (page does not exist)"><span data-dcnode-id="7951" instrument_node="">Charles Phillips</span></a><span data-dcnode-id="7949" instrument_node=""> and </span><a data-dcnode-id="7947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alan_Axelrod" title="Alan Axelrod"><span data-dcnode-id="7948" instrument_node="">Alan Axelrod</span></a><span data-dcnode-id="7946" instrument_node=""> documented 1763 notable wars in world history, out of which 121 wars were in the "religious wars" category in the index.</span><sup class="reference" data-dcnode-id="7943" id="cite_ref-Holt_21-0"><a data-dcnode-id="7944" href="#cite_note-Holt-21"><span data-dcnode-id="7945" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="7940" id="cite_ref-Axelrod_vol3_6-1"><a data-dcnode-id="7941" href="#cite_note-Axelrod_vol3-6"><span data-dcnode-id="7942" instrument_node="">[6]</span></a></sup><span data-dcnode-id="7939" instrument_node=""> They note that before the 17th century, much of the "reasons" for conflicts were explained through the lens of religion and that after that time wars were explained through the lens of wars as a way to further sovereign interests.</span><sup class="reference" data-dcnode-id="7936" id="cite_ref-Axelrod,_Alan_2004_22-0"><a data-dcnode-id="7937" href="#cite_note-Axelrod,_Alan_2004-22"><span data-dcnode-id="7938" instrument_node="">[22]</span></a></sup><span data-dcnode-id="7935" instrument_node=""> Some commentators have concluded that only 123 wars (7%) out of these 1763 wars were fundamentally originated by religious motivations.</span><sup class="reference" data-dcnode-id="7932" id="cite_ref-23"><a data-dcnode-id="7933" href="#cite_note-23"><span data-dcnode-id="7934" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="7929" id="cite_ref-24"><a data-dcnode-id="7930" href="#cite_note-24"><span data-dcnode-id="7931" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="7926" id="cite_ref-25"><a data-dcnode-id="7927" href="#cite_note-25"><span data-dcnode-id="7928" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7925" instrument_node=""> Andrew Holt (2018) traced the origin of the 'only 123 religious wars' claim back to the 2008 book </span><i data-dcnode-id="7922"><a data-dcnode-id="7923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Irrational_Atheist" title="The Irrational Atheist"><span data-dcnode-id="7924" instrument_node="">The Irrational Atheist</span></a></i><span data-dcnode-id="7921" instrument_node=""> of far-right activist </span><a data-dcnode-id="7919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vox_Day" title="Vox Day"><span data-dcnode-id="7920" instrument_node="">Vox Day</span></a><span data-dcnode-id="7918" instrument_node="">, which he notes is slightly adjusted compared to the 121 that is indeed found in the </span><i data-dcnode-id="7916"><span data-dcnode-id="7917" instrument_node="">Encyclopedia of Wars</span></i><span data-dcnode-id="7915" instrument_node=""> itself.</span><sup class="reference" data-dcnode-id="7912" id="cite_ref-Holt_21-1"><a data-dcnode-id="7913" href="#cite_note-Holt-21"><span data-dcnode-id="7914" instrument_node="">[21]</span></a></sup><span data-dcnode-id="7911" instrument_node="">
</span></p><p data-dcnode-id="7895"><i data-dcnode-id="7908"><span data-dcnode-id="7909" instrument_node="">The Encyclopedia of War</span></i><span data-dcnode-id="7907" instrument_node="">, edited by Gordon Martel, using the criteria that the armed conflict must involve some overt religious action, concludes that 6% of the wars listed in their encyclopedia can be labelled religious wars.</span><sup class="reference" data-dcnode-id="7904" id="cite_ref-26"><a data-dcnode-id="7905" href="#cite_note-26"><span data-dcnode-id="7906" instrument_node="">[26]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="7897" style="white-space:nowrap;"><span data-dcnode-id="7903" instrument_node="">[</span><i data-dcnode-id="7899"><a data-dcnode-id="7900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="7901" title="This citation requires a reference to the specific page or range of pages in which the material appears. (February 2015)"><span data-dcnode-id="7902" instrument_node="">page&nbsp;needed</span></span></a></i><span data-dcnode-id="7898" instrument_node="">]</span></sup><span data-dcnode-id="7896" instrument_node="">
</span></p><span data-dcnode-id="7894" instrument_node="">
</span><h2 data-dcnode-id="7882"><span class="mw-headline" data-dcnode-id="7890" id="Holy_war_concepts_in_religious_traditions"><i data-dcnode-id="7892"><span data-dcnode-id="7893" instrument_node="">Holy war</span></i><span data-dcnode-id="7891" instrument_node=""> concepts in religious traditions</span></span><span class="mw-editsection" data-dcnode-id="7883"><span class="mw-editsection-bracket" data-dcnode-id="7888"><span data-dcnode-id="7889" instrument_node="">[</span></span><a data-dcnode-id="7886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D4" title="Edit section: Holy war concepts in religious traditions"><span data-dcnode-id="7887" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7884"><span data-dcnode-id="7885" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7881" instrument_node="">
</span><p data-dcnode-id="7854"><span data-dcnode-id="7880" instrument_node="">While early empires could be described as </span><a class="mw-redirect" data-dcnode-id="7878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henotheistic" title="Henotheistic"><span data-dcnode-id="7879" instrument_node="">henotheistic</span></a><span data-dcnode-id="7877" instrument_node="">, i.e. dominated by a single god of the ruling elite (as </span><a data-dcnode-id="7875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marduk" title="Marduk"><span data-dcnode-id="7876" instrument_node="">Marduk</span></a><span data-dcnode-id="7874" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="7872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Babylonian_empire" title="Babylonian empire"><span data-dcnode-id="7873" instrument_node="">Babylonian empire</span></a><span data-dcnode-id="7871" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assur_%28god%29" title="Assur (god)"><span data-dcnode-id="7870" instrument_node="">Assur</span></a><span data-dcnode-id="7868" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="7866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assyrian_empire" title="Assyrian empire"><span data-dcnode-id="7867" instrument_node="">Assyrian empire</span></a><span data-dcnode-id="7865" instrument_node="">, etc.), or more directly by deifying the ruler in an </span><a data-dcnode-id="7863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Imperial_cult" title="Imperial cult"><span data-dcnode-id="7864" instrument_node="">imperial cult</span></a><span data-dcnode-id="7862" instrument_node="">, the concept of "Holy War" enters a new phase with the development of </span><a data-dcnode-id="7860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monotheism" title="Monotheism"><span data-dcnode-id="7861" instrument_node="">monotheism</span></a><span data-dcnode-id="7859" instrument_node="">.</span><sup class="reference" data-dcnode-id="7856" id="cite_ref-27"><a data-dcnode-id="7857" href="#cite_note-27"><span data-dcnode-id="7858" instrument_node="">[27]</span></a></sup><span data-dcnode-id="7855" instrument_node="">
</span></p><span data-dcnode-id="7853" instrument_node="">
</span><h3 data-dcnode-id="7843"><span class="mw-headline" data-dcnode-id="7851" id="Ancient_warfare_and_polytheism"><span data-dcnode-id="7852" instrument_node="">Ancient warfare and polytheism</span></span><span class="mw-editsection" data-dcnode-id="7844"><span class="mw-editsection-bracket" data-dcnode-id="7849"><span data-dcnode-id="7850" instrument_node="">[</span></span><a data-dcnode-id="7847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D5" title="Edit section: Ancient warfare and polytheism"><span data-dcnode-id="7848" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7845"><span data-dcnode-id="7846" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7842" instrument_node="">
</span><link data-dcnode-id="7841" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7831" role="note"><span data-dcnode-id="7840" instrument_node="">Further information: </span><a data-dcnode-id="7838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_warfare" title="Ancient warfare"><span data-dcnode-id="7839" instrument_node="">Ancient warfare</span></a><span data-dcnode-id="7837" instrument_node="">, </span><a data-dcnode-id="7835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polytheism" title="Polytheism"><span data-dcnode-id="7836" instrument_node="">Polytheism</span></a><span data-dcnode-id="7834" instrument_node="">, and </span><a data-dcnode-id="7832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_war_deities" title="List of war deities"><span data-dcnode-id="7833" instrument_node="">List of war deities</span></a></div><span data-dcnode-id="7830" instrument_node="">
</span><p data-dcnode-id="7802"><span data-dcnode-id="7829" instrument_node="">During </span><a data-dcnode-id="7827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Classical_antiquity" title="Classical antiquity"><span data-dcnode-id="7828" instrument_node="">classical antiquity</span></a><span data-dcnode-id="7826" instrument_node="">, the </span><a data-dcnode-id="7824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greco-Roman_world" title="Greco-Roman world"><span data-dcnode-id="7825" instrument_node="">Greco-Roman world</span></a><span data-dcnode-id="7823" instrument_node=""> had a </span><a class="mw-redirect" data-dcnode-id="7821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pantheon_%28gods%29" title="Pantheon (gods)"><span data-dcnode-id="7822" instrument_node="">pantheon</span></a><span data-dcnode-id="7820" instrument_node=""> with particular attributes and interest areas. </span><a data-dcnode-id="7818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ares" title="Ares"><span data-dcnode-id="7819" instrument_node="">Ares</span></a><span data-dcnode-id="7817" instrument_node=""> personified war. While he received occasional sacrifice from armies going to war, there was only a very limited "cult of Ares".</span><sup class="reference" data-dcnode-id="7814" id="cite_ref-Burkert,_p._170_28-0"><a data-dcnode-id="7815" href="#cite_note-Burkert,_p._170-28"><span data-dcnode-id="7816" instrument_node="">[28]</span></a></sup><span data-dcnode-id="7813" instrument_node=""> In </span><a data-dcnode-id="7811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sparta" title="Sparta"><span data-dcnode-id="7812" instrument_node="">Sparta</span></a><span data-dcnode-id="7810" instrument_node="">, however, each company of youths sacrificed to </span><a class="mw-redirect" data-dcnode-id="7808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enyalios" title="Enyalios"><span data-dcnode-id="7809" instrument_node="">Enyalios</span></a><span data-dcnode-id="7807" instrument_node=""> before engaging in ritual fighting at the Phoebaeum.</span><sup class="reference" data-dcnode-id="7804" id="cite_ref-29"><a data-dcnode-id="7805" href="#cite_note-29"><span data-dcnode-id="7806" instrument_node="">[29]</span></a></sup><span data-dcnode-id="7803" instrument_node="">
</span></p><p data-dcnode-id="7778"><a data-dcnode-id="7800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hans_M._Barstad" title="Hans M. Barstad"><span data-dcnode-id="7801" instrument_node="">Hans M. Barstad</span></a><span data-dcnode-id="7799" instrument_node=""> (2008) claimed that this </span><a data-dcnode-id="7797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Greece" title="Ancient Greece"><span data-dcnode-id="7798" instrument_node="">ancient Greek</span></a><span data-dcnode-id="7796" instrument_node=""> attitude to war and religion differed from that of </span><a data-dcnode-id="7794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_ancient_Israel_and_Judah" title="History of ancient Israel and Judah"><span data-dcnode-id="7795" instrument_node="">ancient Israel and Judah</span></a><span data-dcnode-id="7793" instrument_node="">: 'Quite unlike what we find with the Greeks, holy war permeated ancient Israelite society.'</span><sup class="reference" data-dcnode-id="7790" id="cite_ref-Barstad_30-0"><a data-dcnode-id="7791" href="#cite_note-Barstad-30"><span data-dcnode-id="7792" instrument_node="">[30]</span></a></sup><span data-dcnode-id="7789" instrument_node=""> Moreover, ever since the pioneering study of Manfred Weippert, "»Heiliger Krieg«&nbsp;in Israel und Assyrien" (1972), scholars have been comparing the holy war concept in the (monotheistic) </span><a data-dcnode-id="7787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_Bible" title="Hebrew Bible"><span data-dcnode-id="7788" instrument_node="">Hebrew Bible</span></a><span data-dcnode-id="7786" instrument_node=""> with other (polytheistic) </span><a data-dcnode-id="7784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Near_East" title="Ancient Near East"><span data-dcnode-id="7785" instrument_node="">ancient Near Eastern</span></a><span data-dcnode-id="7783" instrument_node=""> war traditions, and found 'many [striking] similarities in phraseology and ideology'.</span><sup class="reference" data-dcnode-id="7780" id="cite_ref-Barstad_30-1"><a data-dcnode-id="7781" href="#cite_note-Barstad-30"><span data-dcnode-id="7782" instrument_node="">[30]</span></a></sup><span data-dcnode-id="7779" instrument_node="">
</span></p><span data-dcnode-id="7777" instrument_node="">
</span><h3 data-dcnode-id="7767"><span class="mw-headline" data-dcnode-id="7775" id="Buddhism"><span data-dcnode-id="7776" instrument_node="">Buddhism</span></span><span class="mw-editsection" data-dcnode-id="7768"><span class="mw-editsection-bracket" data-dcnode-id="7773"><span data-dcnode-id="7774" instrument_node="">[</span></span><a data-dcnode-id="7771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D6" title="Edit section: Buddhism"><span data-dcnode-id="7772" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7769"><span data-dcnode-id="7770" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7766" instrument_node="">

ode-id="7744" instrument_node="">
