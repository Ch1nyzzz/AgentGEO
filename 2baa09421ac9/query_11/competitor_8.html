</span></p><p data-dcnode-id="6833"><span data-dcnode-id="6854" instrument_node="">The Crusades against </span><a class="mw-redirect" data-dcnode-id="6852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_conquests" title="Muslim conquests"><span data-dcnode-id="6853" instrument_node="">Muslim expansion</span></a><span data-dcnode-id="6851" instrument_node=""> in the 11th century were recognized as a "holy war" or a </span><i data-dcnode-id="6849"><span data-dcnode-id="6850" instrument_node="">bellum sacrum</span></i><span data-dcnode-id="6848" instrument_node=""> by later writers in the 17th century. The early modern wars against the </span><a data-dcnode-id="6846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_Empire" title="Ottoman Empire"><span data-dcnode-id="6847" instrument_node="">Ottoman Empire</span></a><span data-dcnode-id="6845" instrument_node=""> were seen as a seamless continuation of this conflict by contemporaries.</span><sup class="reference" data-dcnode-id="6842" id="cite_ref-58"><a data-dcnode-id="6843" href="#cite_note-58"><span data-dcnode-id="6844" instrument_node="">[58]</span></a></sup><sup class="noprint Inline-Template noprint Template-Fact" data-dcnode-id="6835" style="white-space:nowrap;"><span data-dcnode-id="6841" instrument_node="">[</span><i data-dcnode-id="6837"><a data-dcnode-id="6838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANo_original_research%23Primary%2C_secondary_and_tertiary_sources" title="Wikipedia:No original research"><span data-dcnode-id="6839" title="This claim needs references to reliable secondary sources. (March 2022)"><span data-dcnode-id="6840" instrument_node="">non-primary source needed</span></span></a></i><span data-dcnode-id="6836" instrument_node="">]</span></sup><span data-dcnode-id="6834" instrument_node="">
</span></p><span data-dcnode-id="6832" instrument_node="">
</span><h3 data-dcnode-id="6822"><span class="mw-headline" data-dcnode-id="6830" id="Reconquista"><span data-dcnode-id="6831" instrument_node="">Reconquista</span></span><span class="mw-editsection" data-dcnode-id="6823"><span class="mw-editsection-bracket" data-dcnode-id="6828"><span data-dcnode-id="6829" instrument_node="">[</span></span><a data-dcnode-id="6826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D17" title="Edit section: Reconquista"><span data-dcnode-id="6827" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6824"><span data-dcnode-id="6825" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6821" instrument_node="">
</span><link data-dcnode-id="6820" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6816" role="note"><span data-dcnode-id="6819" instrument_node="">Main article: </span><a data-dcnode-id="6817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reconquista%23Concept_and_duration" title="Reconquista"><span data-dcnode-id="6818" instrument_node="">Reconquista §&nbsp;Concept and duration</span></a></div><span data-dcnode-id="6815" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6799"><div class="thumbinner" data-dcnode-id="6800" style="width:222px;"><a class="image" data-dcnode-id="6813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACantigas_battle.jpg"><img alt="" class="thumbimage" data-dcnode-id="6814" data-file-height="466" data-file-width="481" decoding="async" height="213" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Cantigas_battle.jpg/220px-Cantigas_battle.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Cantigas_battle.jpg/330px-Cantigas_battle.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Cantigas_battle.jpg/440px-Cantigas_battle.jpg 2x" width="220"></a><span data-dcnode-id="6812" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6801"><div class="magnify" data-dcnode-id="6810"><a class="internal" data-dcnode-id="6811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACantigas_battle.jpg" title="Enlarge"></a></div><span data-dcnode-id="6809" instrument_node="">A battle of the </span><i data-dcnode-id="6806"><a data-dcnode-id="6807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reconquista" title="Reconquista"><span data-dcnode-id="6808" instrument_node="">Reconquista</span></a></i><span data-dcnode-id="6805" instrument_node=""> from the </span><i data-dcnode-id="6802"><a data-dcnode-id="6803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cantigas_de_Santa_Maria" title="Cantigas de Santa Maria"><span data-dcnode-id="6804" instrument_node="">Cantigas de Santa Maria</span></a></i></div></div></div><span data-dcnode-id="6798" instrument_node="">
</span><p data-dcnode-id="6761"><a data-dcnode-id="6796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Bradbury" title="Jim Bradbury"><span data-dcnode-id="6797" instrument_node="">Jim Bradbury</span></a><span data-dcnode-id="6795" instrument_node=""> (2004) noted that the belligerents in the </span><i data-dcnode-id="6792"><a data-dcnode-id="6793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reconquista" title="Reconquista"><span data-dcnode-id="6794" instrument_node="">Reconquista</span></a></i><span data-dcnode-id="6791" instrument_node=""> were not all equally motivated by religion, and that a distinction should be made between 'secular rulers' on the one hand, and on the other hand Christian military orders which came from elsewhere (including the three main orders of </span><a data-dcnode-id="6789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Knights_Templar" title="Knights Templar"><span data-dcnode-id="6790" instrument_node="">Knights Templar</span></a><span data-dcnode-id="6788" instrument_node="">, </span><a data-dcnode-id="6786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Knights_Hospitaller" title="Knights Hospitaller"><span data-dcnode-id="6787" instrument_node="">Knights Hospitaller</span></a><span data-dcnode-id="6785" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teutonic_Knights" title="Teutonic Knights"><span data-dcnode-id="6784" instrument_node="">Teutonic Knights</span></a><span data-dcnode-id="6782" instrument_node="">), or were </span><a data-dcnode-id="6780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orders%2C_decorations%2C_and_medals_of_Spain" title="Orders, decorations, and medals of Spain"><span data-dcnode-id="6781" instrument_node="">established inside Iberia</span></a><span data-dcnode-id="6779" instrument_node=""> (such as those of </span><a data-dcnode-id="6777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Order_of_Santiago" title="Order of Santiago"><span data-dcnode-id="6778" instrument_node="">Santiago</span></a><span data-dcnode-id="6776" instrument_node="">, </span><a data-dcnode-id="6774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Order_of_Alc%25C3%25A1ntara" title="Order of Alcántara"><span data-dcnode-id="6775" instrument_node="">Alcántara</span></a><span data-dcnode-id="6773" instrument_node=""> and </span><a data-dcnode-id="6771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Order_of_Calatrava" title="Order of Calatrava"><span data-dcnode-id="6772" instrument_node="">Calatrava</span></a><span data-dcnode-id="6770" instrument_node="">).</span><sup class="reference" data-dcnode-id="6767" id="cite_ref-FOOTNOTEBradbury2004314_59-0"><a data-dcnode-id="6768" href="#cite_note-FOOTNOTEBradbury2004314-59"><span data-dcnode-id="6769" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6766" instrument_node=""> '[The Knights] were more committed to religious war than some of their secular counterparts, were opposed to treating with Muslims and carried out raids and even atrocities, such as decapitating Muslim prisoners.'</span><sup class="reference" data-dcnode-id="6763" id="cite_ref-FOOTNOTEBradbury2004314_59-1"><a data-dcnode-id="6764" href="#cite_note-FOOTNOTEBradbury2004314-59"><span data-dcnode-id="6765" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6762" instrument_node="">
</span></p><p data-dcnode-id="6713"><span data-dcnode-id="6760" instrument_node="">The </span><a data-dcnode-id="6758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Las_Navas_de_Tolosa" title="Battle of Las Navas de Tolosa"><span data-dcnode-id="6759" instrument_node="">Battle of Las Navas de Tolosa</span></a><span data-dcnode-id="6757" instrument_node="">, known in Arab history as the Battle of Al-Uqab (معركة العقاب), was fought on 16 July 1212 and it was an important turning point in both the </span><i data-dcnode-id="6755"><span data-dcnode-id="6756" instrument_node="">Reconquista</span></i><span data-dcnode-id="6754" instrument_node=""> and the </span><a data-dcnode-id="6752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spain_in_the_Middle_Ages" title="Spain in the Middle Ages"><span data-dcnode-id="6753" instrument_node="">medieval history of Spain</span></a><span data-dcnode-id="6751" instrument_node="">.</span><sup class="reference" data-dcnode-id="6748" id="cite_ref-60"><a data-dcnode-id="6749" href="#cite_note-60"><span data-dcnode-id="6750" instrument_node="">[60]</span></a></sup><span data-dcnode-id="6747" instrument_node="">  The forces of King </span><a data-dcnode-id="6745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfonso_VIII_of_Castile" title="Alfonso VIII of Castile"><span data-dcnode-id="6746" instrument_node="">Alfonso VIII of Castile</span></a><span data-dcnode-id="6744" instrument_node=""> were joined by the armies of his Christian rivals, </span><a data-dcnode-id="6742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sancho_VII_of_Navarre" title="Sancho VII of Navarre"><span data-dcnode-id="6743" instrument_node="">Sancho VII of Navarre</span></a><span data-dcnode-id="6741" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedro_II_of_Aragon" title="Pedro II of Aragon"><span data-dcnode-id="6740" instrument_node="">Pedro II of Aragon</span></a><span data-dcnode-id="6738" instrument_node=""> and </span><a data-dcnode-id="6736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afonso_II_of_Portugal" title="Afonso II of Portugal"><span data-dcnode-id="6737" instrument_node="">Afonso II of Portugal</span></a><span data-dcnode-id="6735" instrument_node=""> in battle</span><sup class="reference" data-dcnode-id="6732" id="cite_ref-61"><a data-dcnode-id="6733" href="#cite_note-61"><span data-dcnode-id="6734" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6731" instrument_node=""> against the </span><a class="mw-redirect" data-dcnode-id="6729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berber_people" title="Berber people"><span data-dcnode-id="6730" instrument_node="">Berber</span></a><span data-dcnode-id="6728" instrument_node=""> Muslim </span><a class="mw-redirect" data-dcnode-id="6726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Almohad" title="Almohad"><span data-dcnode-id="6727" instrument_node="">Almohad</span></a><span data-dcnode-id="6725" instrument_node=""> conquerors of the southern half of the </span><a data-dcnode-id="6723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iberian_Peninsula" title="Iberian Peninsula"><span data-dcnode-id="6724" instrument_node="">Iberian Peninsula</span></a><span data-dcnode-id="6722" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6715" style="white-space:nowrap;"><span data-dcnode-id="6721" instrument_node="">[</span><i data-dcnode-id="6717"><a data-dcnode-id="6718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6719" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="6720" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6716" instrument_node="">]</span></sup><span data-dcnode-id="6714" instrument_node="">
</span></p><span data-dcnode-id="6712" instrument_node="">
</span><h3 data-dcnode-id="6702"><span class="mw-headline" data-dcnode-id="6710" id="Hussite_Wars"><span data-dcnode-id="6711" instrument_node="">Hussite Wars</span></span><span class="mw-editsection" data-dcnode-id="6703"><span class="mw-editsection-bracket" data-dcnode-id="6708"><span data-dcnode-id="6709" instrument_node="">[</span></span><a data-dcnode-id="6706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D18" title="Edit section: Hussite Wars"><span data-dcnode-id="6707" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6704"><span data-dcnode-id="6705" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6701" instrument_node="">
</span><link data-dcnode-id="6700" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6696" role="note"><span data-dcnode-id="6699" instrument_node="">Further information: </span><a data-dcnode-id="6697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hussite_Wars%23Origins" title="Hussite Wars"><span data-dcnode-id="6698" instrument_node="">Hussite Wars §&nbsp;Origins</span></a></div><span data-dcnode-id="6695" instrument_node="">
</span><p data-dcnode-id="6637"><span data-dcnode-id="6694" instrument_node="">The relative importance of the various factors that caused the </span><a data-dcnode-id="6692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hussite_Wars" title="Hussite Wars"><span data-dcnode-id="6693" instrument_node="">Hussite Wars</span></a><span data-dcnode-id="6691" instrument_node=""> (1419–1434) is debated. Kokkonen &amp; Sundell (2017) claimed that the death of king </span><a data-dcnode-id="6689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wenceslaus_IV_of_Bohemia" title="Wenceslaus IV of Bohemia"><span data-dcnode-id="6690" instrument_node="">Wenceslaus IV of Bohemia</span></a><span data-dcnode-id="6688" instrument_node=""> on 19 August 1419 is the event that sparked the Hussite rebellion against his nominal heir </span><a data-dcnode-id="6686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sigismund%2C_Holy_Roman_Emperor" title="Sigismund, Holy Roman Emperor"><span data-dcnode-id="6687" instrument_node="">Sigismund (then king of Germany, Hungary and Croatia)</span></a><span data-dcnode-id="6685" instrument_node="">, making it essentially a </span><a data-dcnode-id="6683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_succession" title="War of succession"><span data-dcnode-id="6684" instrument_node="">war of succession</span></a><span data-dcnode-id="6682" instrument_node="">.</span><sup class="reference" data-dcnode-id="6679" id="cite_ref-FOOTNOTE(Appendix)_KokkonenSundell201722_62-0"><a data-dcnode-id="6680" href="#cite_note-FOOTNOTE(Appendix)_KokkonenSundell201722-62"><span data-dcnode-id="6681" instrument_node="">[62]</span></a></sup><span data-dcnode-id="6678" instrument_node=""> Nolan (2006) named religion as one of several significant causes, summarising the Hussites' motives as 'doctrinal as well as "nationalistic" and constitutional', and providing a series of issues that led to war: the trial and execution of </span><a data-dcnode-id="6676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jan_Hus" title="Jan Hus"><span data-dcnode-id="6677" instrument_node="">Jan Hus</span></a><span data-dcnode-id="6675" instrument_node=""> (1415) 'provoked the conflict', the </span><a data-dcnode-id="6673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Defenestrations_of_Prague" title="Defenestrations of Prague"><span data-dcnode-id="6674" instrument_node="">Defenestration of Prague (30 July 1419)</span></a><span data-dcnode-id="6672" instrument_node=""> 'began the conflict', while 'fighting began after King Wenceslaus died, shortly after the defenestration' (that is, after 19 August 1419).</span><sup class="reference" data-dcnode-id="6669" id="cite_ref-FOOTNOTENolan2006428–429_63-0"><a data-dcnode-id="6670" href="#cite_note-FOOTNOTENolan2006428%E2%80%93429-63"><span data-dcnode-id="6671" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6668" instrument_node=""> Nolan described the wars' goals and character as follows: 'The main aim of the Hussites was to prevent the hated Sigismund mounting the throne of Bohemia, but fighting between Bohemian Hussites and Catholics spread into Moravia. (...) cross-class support gave the Hussite Wars a tripartite and even "national" character unusual for the age, and a religious and social unity of purpose, faith, and hate'.</span><sup class="reference" data-dcnode-id="6665" id="cite_ref-FOOTNOTENolan2006429_64-0"><a data-dcnode-id="6666" href="#cite_note-FOOTNOTENolan2006429-64"><span data-dcnode-id="6667" instrument_node="">[64]</span></a></sup><span data-dcnode-id="6664" instrument_node=""> </span><i data-dcnode-id="6662"><span data-dcnode-id="6663" instrument_node="">Winkler Prins</span></i><span data-dcnode-id="6661" instrument_node="">/</span><i data-dcnode-id="6659"><span data-dcnode-id="6660" instrument_node="">Encarta</span></i><span data-dcnode-id="6658" instrument_node=""> (2002) described the Hussites as a 'movement which developed from a religious denomination to a nationalist faction, opposed to German and Papal influence; in the bloody </span><i data-dcnode-id="6656"><span data-dcnode-id="6657" instrument_node="">Hussite Wars</span></i><span data-dcnode-id="6655" instrument_node=""> (1419–1438), they managed to resist.' It didn't mention the succession of Wenceslaus by Sigismund,</span><sup class="reference" data-dcnode-id="6652" id="cite_ref-65"><a data-dcnode-id="6653" href="#cite_note-65"><span data-dcnode-id="6654" instrument_node="">[65]</span></a></sup><span data-dcnode-id="6651" instrument_node=""> but noted elsewhere that it was Sigismund's policy of Catholic Church unity which </span><a data-dcnode-id="6649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_Constance%23Origin_and_background" title="Council of Constance"><span data-dcnode-id="6650" instrument_node="">prompted him to urge</span></a><span data-dcnode-id="6648" instrument_node=""> </span><a data-dcnode-id="6646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antipope_John_XXIII" title="Antipope John XXIII"><span data-dcnode-id="6647" instrument_node="">Antipope John XXIII</span></a><span data-dcnode-id="6645" instrument_node=""> to convene the </span><a data-dcnode-id="6643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_Constance" title="Council of Constance"><span data-dcnode-id="6644" instrument_node="">Council of Constance</span></a><span data-dcnode-id="6642" instrument_node=""> in 1414, which ultimately condemned Jan Hus.</span><sup class="reference" data-dcnode-id="6639" id="cite_ref-66"><a data-dcnode-id="6640" href="#cite_note-66"><span data-dcnode-id="6641" instrument_node="">[66]</span></a></sup><span data-dcnode-id="6638" instrument_node="">
</span></p><span data-dcnode-id="6636" instrument_node="">
</span><h3 data-dcnode-id="6625"><span data-dcnode-id="6635" id="Soga.E2.80.93Mononobe_conflict"></span><span class="mw-headline" data-dcnode-id="6633" id="Soga–Mononobe_conflict"><span data-dcnode-id="6634" instrument_node="">Soga–Mononobe conflict</span></span><span class="mw-editsection" data-dcnode-id="6626"><span class="mw-editsection-bracket" data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">[</span></span><a data-dcnode-id="6629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D19" title="Edit section: Soga–Mononobe conflict"><span data-dcnode-id="6630" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6627"><span data-dcnode-id="6628" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6624" instrument_node="">
</span><link data-dcnode-id="6623" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6619" role="note"><span data-dcnode-id="6622" instrument_node="">Further information: </span><a data-dcnode-id="6620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soga%25E2%2580%2593Mononobe_conflict" title="Soga–Mononobe conflict"><span data-dcnode-id="6621" instrument_node="">Soga–Mononobe conflict</span></a></div><span data-dcnode-id="6618" instrument_node="">
</span><p data-dcnode-id="6553"><a data-dcnode-id="6616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buddhism" title="Buddhism"><span data-dcnode-id="6617" instrument_node="">Buddhism</span></a><span data-dcnode-id="6615" instrument_node=""> was formally introduced into Japan by </span><a data-dcnode-id="6613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Missionary" title="Missionary"><span data-dcnode-id="6614" instrument_node="">missionaries</span></a><span data-dcnode-id="6612" instrument_node=""> from the kingdom of </span><a data-dcnode-id="6610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baekje" title="Baekje"><span data-dcnode-id="6611" instrument_node="">Baekje</span></a><span data-dcnode-id="6609" instrument_node=""> in 552. Adherents of the native </span><a data-dcnode-id="6607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shinto" title="Shinto"><span data-dcnode-id="6608" instrument_node="">Shinto</span></a><span data-dcnode-id="6606" instrument_node=""> religion resisted the spread of Buddhism, and several military conflicts broke out,</span><sup class="reference" data-dcnode-id="6603" id="cite_ref-67"><a data-dcnode-id="6604" href="#cite_note-67"><span data-dcnode-id="6605" instrument_node="">[67]</span></a></sup><span data-dcnode-id="6602" instrument_node=""> starting with the </span><a data-dcnode-id="6600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soga%25E2%2580%2593Mononobe_conflict" title="Soga–Mononobe conflict"><span data-dcnode-id="6601" instrument_node="">Soga–Mononobe conflict</span></a><span data-dcnode-id="6599" instrument_node=""> (552–587) between the pro-Shinto </span><a data-dcnode-id="6597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mononobe_clan" title="Mononobe clan"><span data-dcnode-id="6598" instrument_node="">Mononobe clan</span></a><span data-dcnode-id="6596" instrument_node=""> (and </span><a data-dcnode-id="6594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nakatomi_clan" title="Nakatomi clan"><span data-dcnode-id="6595" instrument_node="">Nakatomi clan</span></a><span data-dcnode-id="6593" instrument_node="">) and the pro-Buddhist </span><a data-dcnode-id="6591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soga_clan" title="Soga clan"><span data-dcnode-id="6592" instrument_node="">Soga clan</span></a><span data-dcnode-id="6590" instrument_node="">. Although the political power each of the clans could wield over the royal family was also an important factor, and was arguably a strategic reason for the Soga to adopt and promote Buddhism as a means to increase their authority, the religious beliefs from both doctrines, as well as religious explanations from events that happened after the arrival of Buddhism, were also causes of the conflict that escalated to war.</span><sup class="reference" data-dcnode-id="6587" id="cite_ref-Wolff_68-0"><a data-dcnode-id="6588" href="#cite_note-Wolff-68"><span data-dcnode-id="6589" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6586" instrument_node=""> Whereas the Soga argued that Buddhism was a better religion because it had come from China and Korea, whose civilisations were widely regarded as superior and to be emulated in </span><a data-dcnode-id="6584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yamato_period" title="Yamato period"><span data-dcnode-id="6585" instrument_node="">Yamato</span></a><span data-dcnode-id="6583" instrument_node=""> (the central kingdom of Japan), the Mononobe and Nakatomi maintained that there should be continuity of tradition and that worshipping the native gods (</span><i data-dcnode-id="6581"><span data-dcnode-id="6582" instrument_node="">kami</span></i><span data-dcnode-id="6580" instrument_node="">) was in the best interest of the Japanese.</span><sup class="reference" data-dcnode-id="6577" id="cite_ref-Wolff_68-1"><a data-dcnode-id="6578" href="#cite_note-Wolff-68"><span data-dcnode-id="6579" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6576" instrument_node=""> Unable to reach a decision, </span><a data-dcnode-id="6574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emperor_Kinmei" title="Emperor Kinmei"><span data-dcnode-id="6575" instrument_node="">Emperor Kinmei</span></a><span data-dcnode-id="6573" instrument_node=""> (r. 539–571) maintained Shinto as the royal religion, but allowed the Soga to erect a temple for the statue of Buddha.</span><sup class="reference" data-dcnode-id="6570" id="cite_ref-Wolff_68-2"><a data-dcnode-id="6571" href="#cite_note-Wolff-68"><span data-dcnode-id="6572" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6569" instrument_node=""> Afterwards, an epidemic broke out, which Shintoists attributed to the anger of the native gods to the intrusion of Buddhism; in reaction, some burnt down the Buddhist temple and threw the Buddha statue into a canal.</span><sup class="reference" data-dcnode-id="6566" id="cite_ref-Wolff_68-3"><a data-dcnode-id="6567" href="#cite_note-Wolff-68"><span data-dcnode-id="6568" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6565" instrument_node=""> However, the epidemic worsened, which Buddhists in turn interpreted as the anger of Buddha to the sacrilege committed against his temple and statue.</span><sup class="reference" data-dcnode-id="6562" id="cite_ref-Wolff_68-4"><a data-dcnode-id="6563" href="#cite_note-Wolff-68"><span data-dcnode-id="6564" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6561" instrument_node=""> Both during the 585 and 587 wars of succession, the opposing camps were drawn along the Shinto–Buddhist divide, and the Soga clan's victory resulted in the imposition of Buddhism as the Yamato court religion under the regency of </span><a class="mw-redirect" data-dcnode-id="6559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_Shotoku" title="Prince Shotoku"><span data-dcnode-id="6560" instrument_node="">Prince Shotoku</span></a><span data-dcnode-id="6558" instrument_node="">.</span><sup class="reference" data-dcnode-id="6555" id="cite_ref-Wolff_68-5"><a data-dcnode-id="6556" href="#cite_note-Wolff-68"><span data-dcnode-id="6557" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6554" instrument_node="">
</span></p><span data-dcnode-id="6552" instrument_node="">
</span><h3 data-dcnode-id="6542"><span class="mw-headline" data-dcnode-id="6550" id="Toltec_religious_wars"><span data-dcnode-id="6551" instrument_node="">Toltec religious wars</span></span><span class="mw-editsection" data-dcnode-id="6543"><span class="mw-editsection-bracket" data-dcnode-id="6548"><span data-dcnode-id="6549" instrument_node="">[</span></span><a data-dcnode-id="6546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D20" title="Edit section: Toltec religious wars"><span data-dcnode-id="6547" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6544"><span data-dcnode-id="6545" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6541" instrument_node="">
</span><p data-dcnode-id="6523"><span data-dcnode-id="6540" instrument_node="">There have been several </span><a data-dcnode-id="6538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toltec_Empire%23Internal_conflicts_and_settlement_in_Yucatan" title="Toltec Empire"><span data-dcnode-id="6539" instrument_node="">religious wars in the Toltec Empire</span></a><span data-dcnode-id="6537" instrument_node=""> of Mesoamerica (c. 980–1110) between devotees of </span><a data-dcnode-id="6535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tezcatlipoca" title="Tezcatlipoca"><span data-dcnode-id="6536" instrument_node="">Tezcatlipoca</span></a><span data-dcnode-id="6534" instrument_node=""> and followers of </span><a data-dcnode-id="6532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quetzalcoatl" title="Quetzalcoatl"><span data-dcnode-id="6533" instrument_node="">Quetzalcoatl</span></a><span data-dcnode-id="6531" instrument_node="">; the latter lost and were driven to flee to the </span><a data-dcnode-id="6529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yucat%25C3%25A1n_Peninsula" title="Yucatán Peninsula"><span data-dcnode-id="6530" instrument_node="">Yucatán Peninsula</span></a><span data-dcnode-id="6528" instrument_node="">.</span><sup class="reference" data-dcnode-id="6525" id="cite_ref-69"><a data-dcnode-id="6526" href="#cite_note-69"><span data-dcnode-id="6527" instrument_node="">[69]</span></a></sup><span data-dcnode-id="6524" instrument_node="">
</span></p><span data-dcnode-id="6522" instrument_node="">
</span><h2 data-dcnode-id="6512"><span class="mw-headline" data-dcnode-id="6520" id="Early_modern_period"><span data-dcnode-id="6521" instrument_node="">Early modern period</span></span><span class="mw-editsection" data-dcnode-id="6513"><span class="mw-editsection-bracket" data-dcnode-id="6518"><span data-dcnode-id="6519" instrument_node="">[</span></span><a data-dcnode-id="6516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D21" title="Edit section: Early modern period"><span data-dcnode-id="6517" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6514"><span data-dcnode-id="6515" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6511" instrument_node="">
</span><h3 data-dcnode-id="6501"><span class="mw-headline" data-dcnode-id="6509" id="European_wars_of_religion"><span data-dcnode-id="6510" instrument_node="">European wars of religion</span></span><span class="mw-editsection" data-dcnode-id="6502"><span class="mw-editsection-bracket" data-dcnode-id="6507"><span data-dcnode-id="6508" instrument_node="">[</span></span><a data-dcnode-id="6505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D22" title="Edit section: European wars of religion"><span data-dcnode-id="6506" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6503"><span data-dcnode-id="6504" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6500" instrument_node="">
</span><link data-dcnode-id="6499" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6495" role="note"><span data-dcnode-id="6498" instrument_node="">Main article: </span><a data-dcnode-id="6496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_wars_of_religion%23Definitions_and_discussions" title="European wars of religion"><span data-dcnode-id="6497" instrument_node="">European wars of religion §&nbsp;Definitions and discussions</span></a></div><span data-dcnode-id="6494" instrument_node="">
</span><p data-dcnode-id="6467"><span data-dcnode-id="6493" instrument_node="">The term "religious war" was used to describe, controversially at the time, what are now known as the </span><a data-dcnode-id="6491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_wars_of_religion" title="European wars of religion"><span data-dcnode-id="6492" instrument_node="">European wars of religion</span></a><span data-dcnode-id="6490" instrument_node="">, and especially the then-ongoing </span><a data-dcnode-id="6488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seven_Years%2527_War" title="Seven Years' War"><span data-dcnode-id="6489" instrument_node="">Seven Years' War</span></a><span data-dcnode-id="6487" instrument_node="">,  from at least the mid 18th century.</span><sup class="reference" data-dcnode-id="6484" id="cite_ref-70"><a data-dcnode-id="6485" href="#cite_note-70"><span data-dcnode-id="6486" instrument_node="">[70]</span></a></sup><sup class="noprint Inline-Template noprint Template-Fact" data-dcnode-id="6477" style="white-space:nowrap;"><span data-dcnode-id="6483" instrument_node="">[</span><i data-dcnode-id="6479"><a data-dcnode-id="6480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANo_original_research%23Primary%2C_secondary_and_tertiary_sources" title="Wikipedia:No original research"><span data-dcnode-id="6481" title="This claim needs references to reliable secondary sources. (March 2022)"><span data-dcnode-id="6482" instrument_node="">non-primary source needed</span></span></a></i><span data-dcnode-id="6478" instrument_node="">]</span></sup><span data-dcnode-id="6476" instrument_node=""> The </span><i data-dcnode-id="6473"><a data-dcnode-id="6474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Encyclop%25C3%25A6dia_Britannica" title="Encyclopædia Britannica"><span data-dcnode-id="6475" instrument_node="">Encyclopædia Britannica</span></a></i><span data-dcnode-id="6472" instrument_node=""> maintains that "[the] wars of religion of this period [were] fought mainly for confessional security and political gain".</span><sup class="reference" data-dcnode-id="6469" id="cite_ref-Britannica_71-0"><a data-dcnode-id="6470" href="#cite_note-Britannica-71"><span data-dcnode-id="6471" instrument_node="">[71]</span></a></sup><span data-dcnode-id="6468" instrument_node="">
</span></p><p data-dcnode-id="6433"><span data-dcnode-id="6466" instrument_node="">In 16th-century France, there was a series of wars between </span><a class="mw-redirect" data-dcnode-id="6464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Catholics" title="Roman Catholics"><span data-dcnode-id="6465" instrument_node="">Roman Catholics</span></a><span data-dcnode-id="6463" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protestants" title="Protestants"><span data-dcnode-id="6462" instrument_node="">Protestants</span></a><span data-dcnode-id="6460" instrument_node=""> (</span><a data-dcnode-id="6458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Huguenots" title="Huguenots"><span data-dcnode-id="6459" instrument_node="">Huguenots</span></a><span data-dcnode-id="6457" instrument_node=""> primarily), known as the </span><a data-dcnode-id="6455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Wars_of_Religion" title="French Wars of Religion"><span data-dcnode-id="6456" instrument_node="">French Wars of Religion</span></a><span data-dcnode-id="6454" instrument_node="">. In the first half of the 17th century, the </span><a data-dcnode-id="6452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="6453" instrument_node="">German</span></a><span data-dcnode-id="6451" instrument_node=""> states, Scandinavia (Sweden, primarily) and Poland were beset by religious warfare during the </span><a class="mw-redirect" data-dcnode-id="6449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thirty_Years_War" title="Thirty Years War"><span data-dcnode-id="6450" instrument_node="">Thirty Years War</span></a><span data-dcnode-id="6448" instrument_node="">. </span><a class="mw-redirect" data-dcnode-id="6446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Catholicism" title="Roman Catholicism"><span data-dcnode-id="6447" instrument_node="">Roman Catholicism</span></a><span data-dcnode-id="6445" instrument_node=""> and </span><a data-dcnode-id="6443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protestantism" title="Protestantism"><span data-dcnode-id="6444" instrument_node="">Protestantism</span></a><span data-dcnode-id="6442" instrument_node=""> figured on the opposing sides of this conflict, though Catholic France took the side of the Protestants, but it did so for purely political reasons.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6435" style="white-space:nowrap;"><span data-dcnode-id="6441" instrument_node="">[</span><i data-dcnode-id="6437"><a data-dcnode-id="6438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6439" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="6440" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6436" instrument_node="">]</span></sup><span data-dcnode-id="6434" instrument_node="">
</span></p><p data-dcnode-id="6384"><span data-dcnode-id="6432" instrument_node="">In the late 20th century, a number of revisionist historians such as William M. Lamont regarded the </span><a data-dcnode-id="6430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_Civil_War" title="English Civil War"><span data-dcnode-id="6431" instrument_node="">English Civil War</span></a><span data-dcnode-id="6429" instrument_node=""> (1642–1651) as a religious war, with </span><a data-dcnode-id="6427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Morrill_%28historian%29" title="John Morrill (historian)"><span data-dcnode-id="6428" instrument_node="">John Morrill</span></a><span data-dcnode-id="6426" instrument_node=""> (1993) stating: 'The English Civil War was not the first European revolution: it was the last of the Wars of Religion.'</span><sup class="reference" data-dcnode-id="6423" id="cite_ref-FOOTNOTEBurgess1998175_72-0"><a data-dcnode-id="6424" href="#cite_note-FOOTNOTEBurgess1998175-72"><span data-dcnode-id="6425" instrument_node="">[72]</span></a></sup><span data-dcnode-id="6422" instrument_node=""> This view has been criticised by various pre-, post- and anti-revisionist historians.</span><sup class="reference" data-dcnode-id="6419" id="cite_ref-FOOTNOTEBurgess1998175_72-1"><a data-dcnode-id="6420" href="#cite_note-FOOTNOTEBurgess1998175-72"><span data-dcnode-id="6421" instrument_node="">[72]</span></a></sup><span data-dcnode-id="6418" instrument_node=""> Glen Burgess (1998) examined political propaganda written by the </span><a data-dcnode-id="6416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roundhead" title="Roundhead"><span data-dcnode-id="6417" instrument_node="">Parliamentarian</span></a><span data-dcnode-id="6415" instrument_node=""> politicians and clerics at the time, noting that many were or may have been motivated by their </span><a data-dcnode-id="6413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Puritans" title="Puritans"><span data-dcnode-id="6414" instrument_node="">Puritan religious beliefs</span></a><span data-dcnode-id="6412" instrument_node=""> to support the war against the 'Catholic' king </span><a data-dcnode-id="6410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_I_of_England" title="Charles I of England"><span data-dcnode-id="6411" instrument_node="">Charles I of England</span></a><span data-dcnode-id="6409" instrument_node="">, but tried to express and legitimise their opposition and rebellion in terms of a legal revolt against a monarch who had violated crucial constitutional principles and thus had to be overthrown.</span><sup class="reference" data-dcnode-id="6406" id="cite_ref-FOOTNOTEBurgess1998196–197_73-0"><a data-dcnode-id="6407" href="#cite_note-FOOTNOTEBurgess1998196%E2%80%93197-73"><span data-dcnode-id="6408" instrument_node="">[73]</span></a></sup><span data-dcnode-id="6405" instrument_node=""> They even warned their Parliamentarian allies to not make overt use of religious arguments in making their case for war against the king.</span><sup class="reference" data-dcnode-id="6402" id="cite_ref-FOOTNOTEBurgess1998196–197_73-1"><a data-dcnode-id="6403" href="#cite_note-FOOTNOTEBurgess1998196%E2%80%93197-73"><span data-dcnode-id="6404" instrument_node="">[73]</span></a></sup><span data-dcnode-id="6401" instrument_node=""> However, in some cases it may be argued that they hid their pro-Anglican and anti-Catholic motives behind legal parlance, for example by emphasising that the </span><a data-dcnode-id="6399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Church_of_England" title="Church of England"><span data-dcnode-id="6400" instrument_node="">Church of England</span></a><span data-dcnode-id="6398" instrument_node=""> was the </span><a data-dcnode-id="6394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_religion" title="State religion"><i data-dcnode-id="6396"><span data-dcnode-id="6397" instrument_node="">legally established</span></i><span data-dcnode-id="6395" instrument_node=""> religion</span></a><span data-dcnode-id="6393" instrument_node="">: 'Seen in this light, the defenses of Parliament's war, with their apparent legal-constitutional thrust, are not at all ways of saying that the struggle was not religious. On the contrary, they are ways of saying that it was.'</span><sup class="reference" data-dcnode-id="6390" id="cite_ref-FOOTNOTEBurgess1998198–200_74-0"><a data-dcnode-id="6391" href="#cite_note-FOOTNOTEBurgess1998198%E2%80%93200-74"><span data-dcnode-id="6392" instrument_node="">[74]</span></a></sup><span data-dcnode-id="6389" instrument_node=""> Burgess concluded: '[T]he Civil War left behind it just the sort of evidence that we could reasonably expect a war of religion to leave.'</span><sup class="reference" data-dcnode-id="6386" id="cite_ref-FOOTNOTEBurgess1998201_75-0"><a data-dcnode-id="6387" href="#cite_note-FOOTNOTEBurgess1998201-75"><span data-dcnode-id="6388" instrument_node="">[75]</span></a></sup><span data-dcnode-id="6385" instrument_node="">
</span></p><span data-dcnode-id="6383" instrument_node="">
</span><h3 data-dcnode-id="6372"><span data-dcnode-id="6382" id="Ethiopian.E2.80.93Adal_War"></span><span class="mw-headline" data-dcnode-id="6380" id="Ethiopian–Adal_War"><span data-dcnode-id="6381" instrument_node="">Ethiopian–Adal War</span></span><span class="mw-editsection" data-dcnode-id="6373"><span class="mw-editsection-bracket" data-dcnode-id="6378"><span data-dcnode-id="6379" instrument_node="">[</span></span><a data-dcnode-id="6376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D23" title="Edit section: Ethiopian–Adal War"><span data-dcnode-id="6377" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6374"><span data-dcnode-id="6375" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6371" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6340"><div class="thumbinner" data-dcnode-id="6341" style="width:222px;"><a class="image" data-dcnode-id="6369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMap_of_Ethiopia_circa_1540.png"><img alt="" class="thumbimage" data-dcnode-id="6370" data-file-height="1328" data-file-width="1638" decoding="async" height="178" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Map_of_Ethiopia_circa_1540.png/220px-Map_of_Ethiopia_circa_1540.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Map_of_Ethiopia_circa_1540.png/330px-Map_of_Ethiopia_circa_1540.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Map_of_Ethiopia_circa_1540.png/440px-Map_of_Ethiopia_circa_1540.png 2x" width="220"></a><span data-dcnode-id="6368" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6342"><div class="magnify" data-dcnode-id="6366"><a class="internal" data-dcnode-id="6367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMap_of_Ethiopia_circa_1540.png" title="Enlarge"></a></div><span data-dcnode-id="6365" instrument_node="">Horn of Africa circa 1540 during the </span><a data-dcnode-id="6363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethiopian%25E2%2580%2593Adal_War" title="Ethiopian–Adal War"><span data-dcnode-id="6364" instrument_node="">Ethiopian–Adal War</span></a><span data-dcnode-id="6362" instrument_node="">, at the peak of </span><a data-dcnode-id="6360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahmad_ibn_Ibrahim_al-Ghazi" title="Ahmad ibn Ibrahim al-Ghazi"><span data-dcnode-id="6361" instrument_node="">al-Ghazi</span></a><span data-dcnode-id="6359" instrument_node="">'s expansion. </span><div class="legend" data-dcnode-id="6351"><span class="legend-color" data-dcnode-id="6355" style="background-color:#CFD3C4; color:black;"><span data-dcnode-id="6356" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6354" instrument_node="">&nbsp;</span><a data-dcnode-id="6352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adal_Sultanate" title="Adal Sultanate"><span data-dcnode-id="6353" instrument_node="">Adal Sultanate</span></a></div><span data-dcnode-id="6350" instrument_node=""> </span><link data-dcnode-id="6349" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="6343"><span class="legend-color" data-dcnode-id="6347" style="background-color:#E0DBB7; color:black;"><span data-dcnode-id="6348" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6346" instrument_node="">&nbsp;</span><a data-dcnode-id="6344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethiopian_Empire" title="Ethiopian Empire"><span data-dcnode-id="6345" instrument_node="">Ethiopian Empire (Abyssinian/Habesha Kingdom)</span></a></div></div></div></div><span data-dcnode-id="6339" instrument_node="">
</span><p data-dcnode-id="6280"><span data-dcnode-id="6338" instrument_node="">The </span><a data-dcnode-id="6336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethiopian%25E2%2580%2593Adal_War" title="Ethiopian–Adal War"><span data-dcnode-id="6337" instrument_node="">Ethiopian–Adal War</span></a><span data-dcnode-id="6335" instrument_node=""> (1529–1543) was a military conflict between the </span><a data-dcnode-id="6333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethiopian_Empire" title="Ethiopian Empire"><span data-dcnode-id="6334" instrument_node="">Abyssinians</span></a><span data-dcnode-id="6332" instrument_node=""> and the </span><a data-dcnode-id="6330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adal_Sultanate" title="Adal Sultanate"><span data-dcnode-id="6331" instrument_node="">Adal Sultanate</span></a><span data-dcnode-id="6329" instrument_node="">. The </span><a data-dcnode-id="6327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Imam" title="Imam"><span data-dcnode-id="6328" instrument_node="">Imam</span></a><span data-dcnode-id="6326" instrument_node=""> </span><a data-dcnode-id="6324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahmad_ibn_Ibrahim_al-Ghazi" title="Ahmad ibn Ibrahim al-Ghazi"><span data-dcnode-id="6325" instrument_node="">Ahmad ibn Ibrahim al-Ghazi</span></a><span data-dcnode-id="6323" instrument_node=""> came close to extinguishing the ancient realm of Abyssinia, and forcibly converting all of its surviving subjects to </span><a data-dcnode-id="6321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam" title="Islam"><span data-dcnode-id="6322" instrument_node="">Islam</span></a><span data-dcnode-id="6320" instrument_node="">. The intervention of the European </span><a data-dcnode-id="6318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crist%25C3%25B3v%25C3%25A3o_da_Gama" title="Cristóvão da Gama"><span data-dcnode-id="6319" instrument_node="">Cristóvão da Gama</span></a><span data-dcnode-id="6317" instrument_node=""> attempted to help to prevent this outcome, but he was killed by al-Ghazi. However, both polities exhausted their resources and manpower in this conflict, allowing the northward migration of the </span><a data-dcnode-id="6315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oromo_people" title="Oromo people"><span data-dcnode-id="6316" instrument_node="">Oromo</span></a><span data-dcnode-id="6314" instrument_node=""> into their present homelands to the north and west of </span><a data-dcnode-id="6312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Addis_Ababa" title="Addis Ababa"><span data-dcnode-id="6313" instrument_node="">Addis Ababa</span></a><span data-dcnode-id="6311" instrument_node="">.</span><sup class="reference" data-dcnode-id="6308" id="cite_ref-76"><a data-dcnode-id="6309" href="#cite_note-76"><span data-dcnode-id="6310" instrument_node="">[76]</span></a></sup><span data-dcnode-id="6307" instrument_node=""> Many historians trace the origins of hostility between </span><a data-dcnode-id="6305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Somalia" title="Somalia"><span data-dcnode-id="6306" instrument_node="">Somalia</span></a><span data-dcnode-id="6304" instrument_node=""> and Ethiopia to this war.</span><sup class="reference" data-dcnode-id="6301" id="cite_ref-77"><a data-dcnode-id="6302" href="#cite_note-77"><span data-dcnode-id="6303" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6300" instrument_node=""> Some historians also argue that this conflict proved, through their use on both sides, the value of </span><a class="mw-redirect" data-dcnode-id="6298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Firearms" title="Firearms"><span data-dcnode-id="6299" instrument_node="">firearms</span></a><span data-dcnode-id="6297" instrument_node=""> such as the </span><a data-dcnode-id="6295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matchlock" title="Matchlock"><span data-dcnode-id="6296" instrument_node="">matchlock</span></a><span data-dcnode-id="6294" instrument_node=""> </span><a data-dcnode-id="6292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Musket" title="Musket"><span data-dcnode-id="6293" instrument_node="">musket</span></a><span data-dcnode-id="6291" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cannons" title="Cannons"><span data-dcnode-id="6290" instrument_node="">cannons</span></a><span data-dcnode-id="6288" instrument_node="">, and the </span><a data-dcnode-id="6286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arquebus" title="Arquebus"><span data-dcnode-id="6287" instrument_node="">arquebus</span></a><span data-dcnode-id="6285" instrument_node=""> over traditional weapons.</span><sup class="reference" data-dcnode-id="6282" id="cite_ref-78"><a data-dcnode-id="6283" href="#cite_note-78"><span data-dcnode-id="6284" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6281" instrument_node="">
</span></p><span data-dcnode-id="6279" instrument_node="">
</span><h2 data-dcnode-id="6269"><span class="mw-headline" data-dcnode-id="6277" id="Modern_period"><span data-dcnode-id="6278" instrument_node="">Modern period</span></span><span class="mw-editsection" data-dcnode-id="6270"><span class="mw-editsection-bracket" data-dcnode-id="6275"><span data-dcnode-id="6276" instrument_node="">[</span></span><a data-dcnode-id="6273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D24" title="Edit section: Modern period"><span data-dcnode-id="6274" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6271"><span data-dcnode-id="6272" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6268" instrument_node="">
</span><h3 data-dcnode-id="6258"><span class="mw-headline" data-dcnode-id="6266" id="Greek_War_of_Independence"><span data-dcnode-id="6267" instrument_node="">Greek War of Independence</span></span><span class="mw-editsection" data-dcnode-id="6259"><span class="mw-editsection-bracket" data-dcnode-id="6264"><span data-dcnode-id="6265" instrument_node="">[</span></span><a data-dcnode-id="6262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D25" title="Edit section: Greek War of Independence"><span data-dcnode-id="6263" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6260"><span data-dcnode-id="6261" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6257" instrument_node="">
</span><p data-dcnode-id="6199"><span data-dcnode-id="6256" instrument_node="">The </span><a data-dcnode-id="6254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greek_War_of_Independence" title="Greek War of Independence"><span data-dcnode-id="6255" instrument_node="">Greek War of Independence</span></a><span data-dcnode-id="6253" instrument_node=""> (1821–1829) has sometimes been considered a religious war between Christians and Muslims, especially in its early phase. The Greek Declaration of Independence (issued on 15 January 1822) legitimised the armed rebellion against the </span><a data-dcnode-id="6251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_Empire" title="Ottoman Empire"><span data-dcnode-id="6252" instrument_node="">Ottoman Empire</span></a><span data-dcnode-id="6250" instrument_node=""> in a mix of religious and </span><a data-dcnode-id="6248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nationalism" title="Nationalism"><span data-dcnode-id="6249" instrument_node="">nationalist</span></a><span data-dcnode-id="6247" instrument_node=""> terms: 'The war we are waging against the Turks, far from being founded in demagoguery, seditiousness or the selfish interests of any one part of the Greek nation, is a national and holy war (...). It is from these principles of natural rights and desiring to assimilate ourselves with our European Christian brethren, that we have embarked upon our war against the Turks.'</span><sup class="reference" data-dcnode-id="6244" id="cite_ref-79"><a data-dcnode-id="6245" href="#cite_note-79"><span data-dcnode-id="6246" instrument_node="">[79]</span></a></sup><span data-dcnode-id="6243" instrument_node=""> Scottish writer </span><a data-dcnode-id="6241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Felicia_Skene" title="Felicia Skene"><span data-dcnode-id="6242" instrument_node="">Felicia Skene</span></a><span data-dcnode-id="6240" instrument_node=""> remarked in 1877: 'The Greek war of independence has never been called a religious war, and yet it had a better claim to that appellation than many a conflict which has been so named by the chroniclers of the past. It is a significant fact that the standard of revolt was raised by no mere patriot, but by </span><a data-dcnode-id="6238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germanos_III_of_Old_Patras" title="Germanos III of Old Patras"><span data-dcnode-id="6239" instrument_node="">Germanus, the aged Archbishop of Patras</span></a><span data-dcnode-id="6237" instrument_node="">, who came forward, strong in his spiritual dignity (...) to be the first champion in the cause of Hellenic liberty.'</span><sup class="reference" data-dcnode-id="6234" id="cite_ref-80"><a data-dcnode-id="6235" href="#cite_note-80"><span data-dcnode-id="6236" instrument_node="">[80]</span></a></sup><span data-dcnode-id="6233" instrument_node=""> </span><a data-dcnode-id="6231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ian_Morris_%28historian%29" title="Ian Morris (historian)"><span data-dcnode-id="6232" instrument_node="">Ian Morris</span></a><span data-dcnode-id="6230" instrument_node=""> (1994) stated that 'the uprising in 1821 was mainly a religious war', but that </span><a data-dcnode-id="6228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philhellenism" title="Philhellenism"><span data-dcnode-id="6229" instrument_node="">philhellene</span></a><span data-dcnode-id="6227" instrument_node=""> Western volunteers joined the war for quite different reasons, namely to 'regenerate' Greece and thereby Europe, motivated by </span><a data-dcnode-id="6225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanticism" title="Romanticism"><span data-dcnode-id="6226" instrument_node="">Romantic ideas</span></a><span data-dcnode-id="6224" instrument_node=""> about European history and civilisation, and </span><a data-dcnode-id="6222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orientalism" title="Orientalism"><span data-dcnode-id="6223" instrument_node="">Orientalist views</span></a><span data-dcnode-id="6221" instrument_node=""> of Ottoman culture.</span><sup class="reference" data-dcnode-id="6218" id="cite_ref-Morris_81-0"><a data-dcnode-id="6219" href="#cite_note-Morris-81"><span data-dcnode-id="6220" instrument_node="">[81]</span></a></sup><span data-dcnode-id="6217" instrument_node=""> The </span><a data-dcnode-id="6215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Filiki_Eteria" title="Filiki Eteria"><span data-dcnode-id="6216" instrument_node="">Filiki Eteria</span></a><span data-dcnode-id="6214" instrument_node="">, the main organisation driving the rebellion, was split between two groups: one advocated the restoration of the </span><a data-dcnode-id="6212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byzantine_Empire" title="Byzantine Empire"><span data-dcnode-id="6213" instrument_node="">Byzantine Empire</span></a><span data-dcnode-id="6211" instrument_node=""> on religious grounds, and to encourage all Christians within Ottoman territory to join the Greek revolutionaries; the other advocated the </span><a data-dcnode-id="6209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Megali_Idea" title="Megali Idea"><span data-dcnode-id="6210" instrument_node="">Megali Idea</span></a><span data-dcnode-id="6208" instrument_node="">, a large Greek nation-state based on shared language rather than religion.</span><sup class="reference" data-dcnode-id="6205" id="cite_ref-Morris_81-1"><a data-dcnode-id="6206" href="#cite_note-Morris-81"><span data-dcnode-id="6207" instrument_node="">[81]</span></a></sup><span data-dcnode-id="6204" instrument_node=""> Both of these grand objectives failed, but a smaller version of the latter goal was accepted by most members of the Eteria by 1823, and this goal was generally compatible with the motives of philhellenes who travelled to Greece to enter the war in 1821–23.</span><sup class="reference" data-dcnode-id="6201" id="cite_ref-Morris_81-2"><a data-dcnode-id="6202" href="#cite_note-Morris-81"><span data-dcnode-id="6203" instrument_node="">[81]</span></a></sup><span data-dcnode-id="6200" instrument_node="">
</span></p><span data-dcnode-id="6198" instrument_node="">
</span><h3 data-dcnode-id="6187"><span data-dcnode-id="6197" id="Israeli.E2.80.93Palestinian_conflict"></span><span class="mw-headline" data-dcnode-id="6195" id="Israeli–Palestinian_conflict"><span data-dcnode-id="6196" instrument_node="">Israeli–Palestinian conflict</span></span><span class="mw-editsection" data-dcnode-id="6188"><span class="mw-editsection-bracket" data-dcnode-id="6193"><span data-dcnode-id="6194" instrument_node="">[</span></span><a data-dcnode-id="6191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligious_war%26action%3Dedit%26section%3D26" title="Edit section: Israeli–Palestinian conflict"><span data-dcnode-id="6192" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6186" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6175"><div class="thumbinner" data-dcnode-id="6176" style="width:152px;"><a class="image" data-dcnode-id="6184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASumayya_and_her_cat_in_front_of_her_demolished_home_2002%2C_2nd_Intifada.jpg"><img alt="" class="thumbimage" data-dcnode-id="6185" data-file-height="410" data-file-width="292" decoding="async" height="211" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Sumayya_and_her_cat_in_front_of_her_demolished_home_2002%252C_2nd_Intifada.jpg/150px-Sumayya_and_her_cat_in_front_of_her_demolished_home_2002%252C_2nd_Intifada.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Sumayya_and_her_cat_in_front_of_her_demolished_home_2002%2C_2nd_Intifada.jpg/225px-Sumayya_and_her_cat_in_front_of_her_demolished_home_2002%2C_2nd_Intifada.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/5/5c/Sumayya_and_her_cat_in_front_of_her_demolished_home_2002%2C_2nd_Intifada.jpg 2x" width="150"></a><span data-dcnode-id="6183" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6177"><div class="magnify" data-dcnode-id="6181"><a class="internal" data-dcnode-id="6182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASumayya_and_her_cat_in_front_of_her_demolished_home_2002%2C_2nd_Intifada.jpg" title="Enlarge"></a></div><span data-dcnode-id="6180" instrument_node="">Demolished home in Balata, 2002, </span><a data-dcnode-id="6178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Intifada" title="Second Intifada"><span data-dcnode-id="6179" instrument_node="">Second Intifada</span></a></div></div></div><span data-dcnode-id="6174" instrument_node="">
</span><p data-dcnode-id="6104"><span data-dcnode-id="6173" instrument_node="">The </span><a data-dcnode-id="6171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israeli%25E2%2580%2593Palestinian_conflict" title="Israeli–Palestinian conflict"><span data-dcnode-id="6172" instrument_node="">Israeli–Palestinian conflict</span></a><span data-dcnode-id="6170" instrument_node=""> can primarily be viewed as an </span><a data-dcnode-id="6168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnic_conflict" title="Ethnic conflict"><span data-dcnode-id="6169" instrument_node="">ethnic conflict</span></a><span data-dcnode-id="6167" instrument_node=""> between two parties where one party is most often portrayed as a singular ethno-religious group which only consists of the Jewish majority and ignores non-Jewish minority Israeli citizens who support the existence of a </span><a class="mw-redirect" data-dcnode-id="6165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_of_Israel" title="State of Israel"><span data-dcnode-id="6166" instrument_node="">Zionist state</span></a><span data-dcnode-id="6164" instrument_node=""> to varying degrees, especially the </span><a data-dcnode-id="6162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Druze" title="Druze"><span data-dcnode-id="6163" instrument_node="">Druze</span></a><span data-dcnode-id="6161" instrument_node=""> and the </span><a data-dcnode-id="6159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Circassians" title="Circassians"><span data-dcnode-id="6160" instrument_node="">Circassians</span></a><span data-dcnode-id="6158" instrument_node=""> who, for example, volunteer to serve in the </span><a data-dcnode-id="6156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel_Defense_Forces" title="Israel Defense Forces"><span data-dcnode-id="6157" instrument_node="">IDF</span></a><span data-dcnode-id="6155" instrument_node="">, participate in combat and are represented in the </span><a data-dcnode-id="6153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Knesset" title="Knesset"><span data-dcnode-id="6154" instrument_node="">Israeli parliament</span></a><span data-dcnode-id="6152" instrument_node=""> in higher numbers and greater percentages than Israeli Jews are</span><sup class="reference" data-dcnode-id="6149" id="cite_ref-82"><a data-dcnode-id="6150" href="#cite_note-82"><span data-dcnode-id="6151" instrument_node="">[82]</span></a></sup><sup class="reference" data-dcnode-id="6146" id="cite_ref-83"><a data-dcnode-id="6147" href="#cite_note-83"><span data-dcnode-id="6148" instrument_node="">[83]</span></a></sup><span data-dcnode-id="6145" instrument_node=""> as well as </span><a class="mw-redirect" data-dcnode-id="6143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israeli_Arabs" title="Israeli Arabs"><span data-dcnode-id="6144" instrument_node="">Israeli Arabs</span></a><span data-dcnode-id="6142" instrument_node="">, </span><a data-dcnode-id="6140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samaritans" title="Samaritans"><span data-dcnode-id="6141" instrument_node="">Samaritans</span></a><span data-dcnode-id="6139" instrument_node="">,</span><sup class="reference" data-dcnode-id="6136" id="cite_ref-84"><a data-dcnode-id="6137" href="#cite_note-84"><span data-dcnode-id="6138" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6135" instrument_node=""> various other Christians, and </span><a data-dcnode-id="6133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Negev_Bedouin" title="Negev Bedouin"><span data-dcnode-id="6134" instrument_node="">Negev Bedouin</span></a><span data-dcnode-id="6132" instrument_node="">;</span><sup class="reference" data-dcnode-id="6129" id="cite_ref-85"><a data-dcnode-id="6130" href="#cite_note-85"><span data-dcnode-id="6131" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6128" instrument_node=""> the other party is sometimes presented as an ethnic group which is multi-religious (although most numerously consisting of Muslims, then Christians, then other religious groups up to and including Samaritans and even Jews). Yet despite the multi-religious composition of both of the parties in the conflict, elements on both sides often view it as a religious war between Jews and Muslims. In 1929, religious tensions between Muslim and Jewish Palestinians over Jews praying at the </span><a class="mw-redirect" data-dcnode-id="6126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wailing_Wall" title="Wailing Wall"><span data-dcnode-id="6127" instrument_node="">Wailing Wall</span></a><span data-dcnode-id="6125" instrument_node=""> led to the </span><a data-dcnode-id="6123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1929_Palestine_riots" title="1929 Palestine riots"><span data-dcnode-id="6124" instrument_node="">1929 Palestine riots</span></a><sup class="reference" data-dcnode-id="6120" id="cite_ref-segev_86-0"><a data-dcnode-id="6121" href="#cite_note-segev-86"><span data-dcnode-id="6122" instrument_node="">[86]</span></a></sup><span data-dcnode-id="6119" instrument_node=""> including the </span><a data-dcnode-id="6117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1929_Hebron_massacre" title="1929 Hebron massacre"><span data-dcnode-id="6118" instrument_node="">Hebron</span></a><span data-dcnode-id="6116" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1929_Safed_pogrom" title="1929 Safed pogrom"><span data-dcnode-id="6115" instrument_node="">Safed</span></a><span data-dcnode-id="6113" instrument_node=""> ethnic cleansings of Jews.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6106" style="white-space:nowrap;"><span data-dcnode-id="6112" instrument_node="">[</span><i data-dcnode-id="6108"><a data-dcnode-id="6109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6110" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="6111" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6107" instrument_node="">]</span></sup><span data-dcnode-id="6105" instrument_node="">
</span></p><p data-dcnode-id="6047"><span data-dcnode-id="6103" instrument_node="">In 1947, the UN's decision to </span><a data-dcnode-id="6101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Partition_Plan_for_Palestine" title="United Nations Partition Plan for Palestine"><span data-dcnode-id="6102" instrument_node="">partition</span></a><span data-dcnode-id="6100" instrument_node=""> the </span><a data-dcnode-id="6098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mandatory_Palestine" title="Mandatory Palestine"><span data-dcnode-id="6099" instrument_node="">Mandate of Palestine</span></a><span data-dcnode-id="6097" instrument_node="">, led to the creation of the state of Israel and </span><a data-dcnode-id="6095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan" title="Jordan"><span data-dcnode-id="6096" instrument_node="">Jordan</span></a><span data-dcnode-id="6094" instrument_node="">, which annexed the West Bank portion of the mandate, since then, the region has been plagued with </span><a data-dcnode-id="6092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab%25E2%2580%2593Israeli_conflict" title="Arab–Israeli conflict"><span data-dcnode-id="6093" instrument_node="">conflict</span></a><span data-dcnode-id="6091" instrument_node="">. The 1948 Palestinian exodus also known as the </span><i data-dcnode-id="6089"><span data-dcnode-id="6090" instrument_node="">Nakba</span></i><span data-dcnode-id="6088" instrument_node=""> (</span><a class="mw-redirect" data-dcnode-id="6086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arabic_language" title="Arabic language"><span data-dcnode-id="6087" instrument_node="">Arabic</span></a><span data-dcnode-id="6085" instrument_node="">: </span><span data-dcnode-id="6083" dir="rtl" lang="ar"><span data-dcnode-id="6084" instrument_node="">النكبة</span></span><span data-dcnode-id="6082" instrument_node="">),</span><sup class="reference" data-dcnode-id="6079" id="cite_ref-87"><a data-dcnode-id="6080" href="#cite_note-87"><span data-dcnode-id="6081" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6078" instrument_node=""> occurred when </span><a class="mw-redirect" data-dcnode-id="6076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estimates_of_the_Palestinian_Refugee_flight_of_1948" title="Estimates of the Palestinian Refugee flight of 1948"><span data-dcnode-id="6077" instrument_node="">approximately 711,000 to 726,000</span></a><span data-dcnode-id="6075" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="6073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palestinian_people" title="Palestinian people"><span data-dcnode-id="6074" instrument_node="">Palestinian Arabs</span></a><span data-dcnode-id="6072" instrument_node=""> </span><a data-dcnode-id="6070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Causes_of_the_1948_Palestinian_exodus" title="Causes of the 1948 Palestinian exodus"><span data-dcnode-id="6071" instrument_node="">fled or were expelled from their homes</span></a><span data-dcnode-id="6069" instrument_node="">, during the </span><a data-dcnode-id="6067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1948_Arab%25E2%2580%2593Israeli_War" title="1948 Arab–Israeli War"><span data-dcnode-id="6068" instrument_node="">1948 Arab–Israeli War</span></a><span data-dcnode-id="6066" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="6064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1947%25E2%2580%25931948_Civil_War_in_Mandatory_Palestine" title="1947–1948 Civil War in Mandatory Palestine"><span data-dcnode-id="6065" instrument_node="">Civil War</span></a><span data-dcnode-id="6063" instrument_node=""> that preceded it.</span><sup class="reference" data-dcnode-id="6060" id="cite_ref-88"><a data-dcnode-id="6061" href="#cite_note-88"><span data-dcnode-id="6062" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6059" instrument_node=""> The exact number of refugees is a matter of dispute, though the number of Palestine refugees and their unsettled descendants registered with UNRWA is more than 4.3 million.</span><sup class="reference" data-dcnode-id="6056" id="cite_ref-89"><a data-dcnode-id="6057" href="#cite_note-89"><span data-dcnode-id="6058" instrument_node="">[89]</span></a></sup><sup class="reference" data-dcnode-id="6053" id="cite_ref-Crenshaw2010_90-0"><a data-dcnode-id="6054" href="#cite_note-Crenshaw2010-90"><span data-dcnode-id="6055" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6052" instrument_node=""> The causes remain the subject of fundamental disagreement between Palestinians and Israelis. Both Jews and Palestinians make ethnic and historical claims to the land, and Jews make religious claims as well.</span><sup class="reference" data-dcnode-id="6049" id="cite_ref-91"><a data-dcnode-id="6050" href="#cite_note-91"><span data-dcnode-id="6051" instrument_node="">[91]</span></a></sup><span data-dcnode-id="6048" instrument_node="">
</span></p><span data-dcnode-id="6046" instrument_node="">
