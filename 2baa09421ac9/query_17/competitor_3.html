</span><i data-dcnode-id="1808"><b data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Prince of Persia: The Sands of Time</span></b></i><span data-dcnode-id="1807" instrument_node=""> is a </span><a data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/2010" title="2010"><span data-dcnode-id="1806" instrument_node="">2010</span></a><span data-dcnode-id="1804" instrument_node=""> American fantasy adventure film written by Jordan Mechner, Boaz Yakin, Doug Miro, and Carlo Bernard; directed by Mike Newell; produced by </span><a data-dcnode-id="1802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Jerry_Bruckheimer" title="Jerry Bruckheimer"><span data-dcnode-id="1803" instrument_node="">Jerry Bruckheimer</span></a><span data-dcnode-id="1801" instrument_node=""> and released by </span><a data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Walt_Disney_Pictures" title="Walt Disney Pictures"><span data-dcnode-id="1800" instrument_node="">Walt Disney Pictures</span></a><span data-dcnode-id="1798" instrument_node=""> in its </span><a data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/London" title="London"><span data-dcnode-id="1797" instrument_node="">London</span></a><span data-dcnode-id="1795" instrument_node=""> premiere of </span><a data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/May_9" title="May 9"><span data-dcnode-id="1794" instrument_node="">May 9</span></a><span data-dcnode-id="1792" instrument_node="">, </span><a data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/2010" title="2010"><span data-dcnode-id="1791" instrument_node="">2010</span></a><span data-dcnode-id="1789" instrument_node=""> and in the </span><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/United_States" title="United States"><span data-dcnode-id="1788" instrument_node="">United States</span></a><span data-dcnode-id="1786" instrument_node=""> on </span><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/May_28" title="May 28"><span data-dcnode-id="1785" instrument_node="">May 28</span></a><span data-dcnode-id="1783" instrument_node=""> of the same year. The film is a retelling of the </span><a data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/2003" title="2003"><span data-dcnode-id="1782" instrument_node="">2003</span></a><span data-dcnode-id="1780" instrument_node=""> video game of the same name, developed and released by </span><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Ubisoft" title="Ubisoft"><span data-dcnode-id="1779" instrument_node="">Ubisoft</span></a><span data-dcnode-id="1777" instrument_node=""> Montreal.
</span><p data-dcnode-id="1776"></p><p data-dcnode-id="1759"><span data-dcnode-id="1775" instrument_node="">The film stars </span><a data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Jake_Gyllenhaal" title="Jake Gyllenhaal"><span data-dcnode-id="1774" instrument_node="">Jake Gyllenhaal</span></a><span data-dcnode-id="1772" instrument_node=""> as </span><a data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Prince_Dastan" title="Prince Dastan"><span data-dcnode-id="1771" instrument_node="">Prince Dastan</span></a><span data-dcnode-id="1769" instrument_node="">, </span><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Gemma_Arterton" title="Gemma Arterton"><span data-dcnode-id="1768" instrument_node="">Gemma Arterton</span></a><span data-dcnode-id="1766" instrument_node=""> as Princess Tamina, </span><a data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Ben_Kingsley" title="Ben Kingsley"><span data-dcnode-id="1765" instrument_node="">Ben Kingsley</span></a><span data-dcnode-id="1763" instrument_node=""> as Nizam, and </span><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Alfred_Molina" title="Alfred Molina"><span data-dcnode-id="1762" instrument_node="">Alfred Molina</span></a><span data-dcnode-id="1760" instrument_node=""> as Sheik Amar.
</span></p><p data-dcnode-id="1739"><span data-dcnode-id="1758" instrument_node="">The film has the same title as the video game </span><i data-dcnode-id="1755"><a class="extiw" data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Sands_of_Time" title="wikipedia:Prince of Persia: The Sands of Time"><span data-dcnode-id="1757" instrument_node="">Prince of Persia: The Sands of Time</span></a></i><span data-dcnode-id="1754" instrument_node="">, and is primarily based on it. Elements from </span><i data-dcnode-id="1751"><a class="extiw" data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_Warrior_Within" title="wikipedia:Prince of Persia: Warrior Within"><span data-dcnode-id="1753" instrument_node="">Prince of Persia: Warrior Within</span></a></i><span data-dcnode-id="1750" instrument_node=""> and </span><i data-dcnode-id="1747"><a class="extiw" data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Two_Thrones" title="wikipedia:Prince of Persia: The Two Thrones"><span data-dcnode-id="1749" instrument_node="">Prince of Persia: The Two Thrones</span></a></i><span data-dcnode-id="1746" instrument_node="">, the two other titles from the </span><i data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Sands of Time</span></i><span data-dcnode-id="1743" instrument_node=""> trilogy of the </span><i data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="1740" instrument_node=""> video game franchise, are also incorporated.
</span></p><span data-dcnode-id="1738" instrument_node="">

</span><p data-dcnode-id="1618"><span data-dcnode-id="1625" instrument_node="">Two Brothers ruled over the ancient kingdom of Persia, </span><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/King_Sharaman" title="King Sharaman"><span data-dcnode-id="1624" instrument_node="">King Sharaman</span></a><span data-dcnode-id="1622" instrument_node=""> (Ronald Pickup) and his advisor, </span><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Nizam" title="Nizam"><span data-dcnode-id="1621" instrument_node="">Nizam</span></a><span data-dcnode-id="1619" instrument_node=""> (Ben Kingsley). While the King had two sons, Tus and Garsiv, he took pity on a young orphan boy, Dastan, who impressed the King with his bravery while protecting a friend from a violent guard. The King saves Dastan from getting his hand chopped off and decides to adopt him because he felt that Dastan had the spirit of a Prince.
</span></p><p data-dcnode-id="1607"><span data-dcnode-id="1617" instrument_node="">Years later, </span><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Prince_Dastan" title="Prince Dastan"><span data-dcnode-id="1616" instrument_node="">Dastan</span></a><span data-dcnode-id="1614" instrument_node=""> (Jake Gyllenhaal), </span><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Tus" title="Tus"><span data-dcnode-id="1613" instrument_node="">Tus</span></a><span data-dcnode-id="1611" instrument_node=""> (Richard Coyle) and </span><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Garsiv" title="Garsiv"><span data-dcnode-id="1610" instrument_node="">Garsiv</span></a><span data-dcnode-id="1608" instrument_node=""> (Toby Kebbell) lead their father's forces to war against the Kosh. A spy informs Nizam that the Holy City of Alamut has been providing the Kosh with weapons. Nizam convinces Tus, the leader of the army, to go into the city and crush it, despite King Sharaman's desire for it to be left in peace. Dastan protests, but Garsiv and Tus listen to their uncle Nizam instead. Dastan wants to lead the attack but Garsiv claims that he wants the first blood. Tus tells Dastan that he is not ready to lead the attack. The group begins firing catapults of flaming rocks toward the city.
</span></p><p data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Dastan disregards Tus's orders and leads his own gang of warriors through the East gate of the city. Bis (Reece Ritchie) and Dastan's other troops shoot arrows above Dastan so that he can climb into the city. Dastan opens the East Gate and takes on the “Impossible Gate” by climbing up a tower and entering from above. He notices Alamutian soldiers charging towards his men, so he knocks over a large bowl of boiling oil and ignites it to create a barrier of flames.
</span></p><p data-dcnode-id="1600"><span data-dcnode-id="1604" instrument_node="">In the high temple of Alamut, </span><a data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Princess_Tamina" title="Princess Tamina"><span data-dcnode-id="1603" instrument_node="">Princess Tamina</span></a><span data-dcnode-id="1601" instrument_node=""> (Gemma Arterton) wraps up a dagger and hands it to a messenger, telling him to bring it to a secret temple outside of the city. The messenger runs into the battle raging in the city but crosses paths with Dastan. The two duel in the city square and Dastan knocks the messenger out by slamming him into a wall. He finds the dagger and takes it as his own prize.
</span></p><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Tus and Garsiv are impressed by Dastan's daring. They decide to confront the Princess and Tus declares his intention to marry her to keep the peace between Persia and the people of Alamut. Tamina sees that Dastan has the dagger and is immediately alarmed. She is escorted out by Persian guards.
</span></p><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Dastan and Bis get drunk with their men when Tus comes riding on horseback. Tus tells Dastan that their father is riding in and asks where Dastan's gift is. Dastan has misplaced his in his drunken stupor, so Tus gives Dastan the robes of the high regent of Alamut to present to their father. Tus tells Dastan that if their father doesn't agree to have Tamina marry Tus, Dastan must kill her. He notices Dastan's dagger and asks Dastan for it, but Nizam arrives and reminds Tus that Dastan delivered him that entire city. Tus goes and meets with Nizam and King Sharaman but King Sharaman is outraged that Tus attacked the holy city. King Sharaman tells Tus that he is not ready to be king, despite how much he'd like to be. Nizam watches the conversation unfold before the trio head into the banquet in their honor.
</span></p><p data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">In the banquet, Dastan presents his father with the robes of the regent. His father tells him that he is proud of him but that Dastan hasn't learned that a real leader does what he has to in order to defend what he knows is right. Dastan asks his father to allow Tus to marry Tamina, but King Sharaman points out that Tus has many wives. Since Dastan has none, King Sharaman gives Tamina to Dastan as his first wife. Dastan is shocked and can barely speak before his father starts screaming. The robes of the high regent were covered in poisonous acid which eat away at the king. Garsiv tries to rip them off while Dastan screams for help but Dastan appears to be a murderer. His father's guards move to capture him, but Bis jumps to his aid and fights them. Bis is quickly killed but Tamina leads Dastan out of the palace. They escape the city on horseback with Garsiv in pursuit.
</span></p><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Once outside the city, Dastan tries to make sense of what happened. He tells Tamina that Tus gave him the robe and decides that he needs to get to his uncle Nizam. Tamina then tries to stab Dastan but he accidentally activates the knife, travelling back 1 minute into the past. He's caught off guard and when Tamina makes her move to stab him again, she slashes him across the chest. He activates the dagger again and disarms her, telling her that if she goes for that sword one more time he'll break her arms. She's alarmed that he's used the dagger and then sees that he's used up all the sand. Dastan looks over the dagger and fills it with normal sand, but Tamina points out that only special sand can power the dagger: The Sands of Time. Dastan throws her onto the horse and the two travel into the desert. He realizes that Alamut had no weapons, just the dagger and that with the dagger, Tus would be the most powerful king in the world. Dastan hopes to find his uncle at the king's funeral and they will travel into the Valley of the Slaves as a short cut, hopefully avoiding the murderous robbers who inhabit it.
</span></p><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Upon entering the Valley of the Slaves, Dastan and Tamina are greeted by skeletons stuck on wooden pikes to mark the entrance. While walking, Tamina faints due to lack of dehydration. When Dastan goes to help her, she knocks him out using a nearby bone. When he comes to, she and the dagger are gone. He walks around for a bit, only to be found by Sheik Amar (Alfred Molina) and his henchmen. His knife thrower, Seso (Steve Toussaint), throws a knife just shy of Dastan's penis and Amar tells Dastan that he better give him something good if he wants to stay alive. A few minutes later, Tamina is captured by the Sheik and Dastan, who used her as a bartering chip, steals back the dagger.
</span></p><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">The Valley of the Slaves turns out to be an elaborate lie. The Sheik, who hates paying taxes, created the horrible infamy associated with the Valley to keep the Persians away (since the Sheik hates paying taxes). He makes Tamina serve the gamblers near his Ostrich races and talks to Dastan with Seso. He points out that Dastan looks a lot like the man who killed the king and that Tus is offering a very large reward for Dastan's capture. Dastan avoids Seso's knives and steals back the dagger when Tamina causes a distraction on the ostrich track. Dastan opens up a gate and the two narrowly escape, pausing just long enough to mock the Sheik.
</span></p><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Dastan and Tamina make it to the city holding the king's funeral. Dastan uses Tamina to smuggle himself into the event and then hide's on his father's funeral casket (which houses his coffin behind shrouds). He writes a meeting place on a piece of parchment and slips it into his uncle's coat before leaving. Tamina is impressed by Dastan's success but steals the dagger when he isn't looking. Nizam and Dastan meet but it quickly becomes apparent that Dastan has been set up. He sees burn marks on Nizam's hands, proving that Nizam poisoned the robes. Dastan escapes the city but is forced to fight Garsiv to do so. He insists his innocence and leaves Garsiv on his back.
</span></p><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Dastan catches up to Tamina just as a sand storm begins. They set up a tent and wait it out. Tamina tells him the story of the dagger: The gods waged a war of elements against the people of the planet until one young girl was willing to give her life to stop them. The Gods gave her a gift: the dagger of time which allowed the user to turn back. She removed the dagger from a mountain wall and a temple was built around it. Alamut was built over the Hour Glass, which houses the sands of Time. Dastan realizes that Nizam wants to break the seal on the Hour Glass in order to change history and go back to a specific day: When Nizam and Sharaman were children, they went hunting and Nizam saved Sharaman from a lioness. Dastan postulates that Nizam will go back to that time and not act, resulting in Sharaman's death and erasing the future. Tamina warns him that if the dagger is misused, its raw energy will destroy Alamut and then go on to destroy the world.
</span></p><p data-dcnode-id="1579"><span data-dcnode-id="1583" instrument_node="">Nizam talks to Tus and Garsiv about what should be done with Dastan. Tus wants to put him on trial, but Nizam tells him that Dastan should be killed and not allowed to return; otherwise his accusations could destabilize the region. Garsiv is suspicious of Nizam's desire to have Dastan killed but says nothing. Tus tells him that Dastan will be put on trail and ends the discussion. Nizam visits an outpost of the </span><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Hassansins" title="Hassansins"><span data-dcnode-id="1582" instrument_node="">Hassansins</span></a><span data-dcnode-id="1580" instrument_node="">, an elite group of killers. He pays their leader, a former monk of Alamut, to hunt down and kill Dastan and Tamina. The leader uses asps as his main weapon and leads his men out to hunt them down.
</span></p><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">As Dastan and Tamina continue on to their temple, the Sheik catches up to them. He ties up Dastan and Tamina and scolds them for their actions, which resulted in the destruction of the Sheik's gambling den and death of most of his ostriches. Tamina convinces the Sheik to take them to the Temple and promises him more gold than his horses can carry. That night, several asps attack the camp and kill the Sheik and his men, but Dastan convinces Seso to give him the dagger, and turns back time enough to locate and kill all of the asps as they surface. The Leader of the Hassansins sees this and decides that their best chance is to kill everyone in the temple before Dastan and Tamina can get there. The Sheik is impressed with Dastan's actions, so he frees him.
</span></p><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">The group arrives at the temple two days later and finds the village around it has been completely slaughtered. Garsiv and his men arrive and he takes Dastan in doors. Dastan makes his case and tells him that Nizam is the one who killed their father. Garsiv tells Dastan what Nizam told them, confirming that he believes Dastan. However, the Hassansins arrive and attack the Sheik's men. In the onslaught, Tamina is knocked out and the dagger is taken, Garsiv is killed and the surviving Hassansins escape.
</span></p><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Dastan convinces the Sheik and Seso to help him stop Nizam. They bury Garsiv and return to Alamut. Nizam puts the dagger in the high temple of Alamut and has a Hassansin specialized in throwing spikes guard the tower. Since Seso is the only one who can match the Hassansin, he volunteers to fight him. While Nizam oversees the excavation of the tunnel to the Hour Glass, Dastan and company penetrate the tower's defenses and allow Seso access to the tower. Seso and the Hassansin engage in a tense throwing duel which ends in Seso stabbing the Hassansin through the heart with his throwing axe, but at the cost of his own life. Having been pierced by four arrows to the heart, he throws the dagger out of a window which Dastan and the Sheik retrieve. The Sheik grieves for his friend and pretends to be Dastan in order to drawn the guards away from the palace. Tamina and Dastan sneak into the King's chamber to speak with Tus.
</span></p><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Dastan takes Tus hostage in order to speak to him in private. He tells him that it Nizam's plot to kill their father, not his. He then explains the dagger's powers but can tell that Tus doesn't believe him. With Tamina watching, he stabs himself through the heart with the dagger as Tus cries out in shock. Nizam enters and tells Tus that Dastan took the coward's way out. However, Tus picks up the dagger and goes back in time and prevents Dastan's death. Dastan is relieved that Tus used the dagger (having gambled it all on the fact that he would), but Nizam enters and immediately slits Tus's throat. Tamina helps Dastan escape and the two decide that they need to get to the Hour Glass before Nizam.
</span></p><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Tamina and Dastan enter into the secret catacombs and Tamina tells Dastan to only step where she steps. Unfortunately, a stray rock causes the ground to collapse into sand. Dastan maneuvers on debris as he falls and winds up separated from Tamina in a passage way. He walks through until he sees the Hour Glass. Unfortunately, the lead Hassansin attacks and the two fight to a stalemate. Tamina arrives just as the leader's asp is about to bite Dastan and she shoves the asp into the leader's face. Dastan stabs the leader and he falls into the chasm below. With a moment to themselves before everything turns to hell, Tamina and Dastan share a kiss as Nizam gains access to the Hour Glass cavern from above.
</span></p><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Nizam arrives at the Hour Glass with scaffolding and ready to plunge the knife into the hour glass. Dastan and Tamina climb up to the base of the Hour Glass and fight Nizam. Nizam stabs Dastan in the shoulder and kicks him off. Tamina tries to stop Nizam but Nizam kicks her off the edge as well. Dastan catches her but she forces him to let go so that he can stop Nizam. She tells him that she wished they could have been together. Dastan climbs up and attacks Nizam as he unleashes the Sands of Time. As Time flows through the hour glass, scenes of his past appear as echoes in the glass. Nizam struggles to maintain his hold on the dagger, but Dastan forces the dagger to deactivate and he thrown back in time.
</span></p><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Dastan finds himself at the point where he first procured the dagger. Bis runs up to him to announce the conquering of the city. Realizing that he can undo all the damage which was done, Dastan finds Tus and Garsiv and immediately decries Nizam as a traitor in public. Tus tells his men to find the spy, but that proves unnecessary. Exposed, Nizam tries to kill Dastan. Dastan and Nizam fall off of the palace stairs and Dastan tells him that Nizam had everything he could have wanted, but he turned his back on his family for personal gain. He walks away from Nizam but Nizam tries to skewer him with his sword. Tus stabs Nizam through the stomach before Nizam can kill Dastan, saving his brother's life.
</span></p><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">With the timeline altered and the ruse exposed, Dastan accompanies his brother to Tamina's quarters. Tus apologizes for their attack and offers a marriage to Dastan as a means of healing the broken trust between Alamut and Persia. Dastan presents Tamina with the dagger and overtly hints that he knows what it does. They exchange banter in the palace garden and he tells her that he looks forward to the day they will know each other well enough to be more forward in their talks. The dagger is then returned to the high temple.
</span></p><span data-dcnode-id="1562" instrument_node="">

</span><h2 data-dcnode-id="1498"><span class="mw-headline" data-dcnode-id="1499" id="Production"><span data-dcnode-id="1500" instrument_node="">Production</span></span></h2><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1496" instrument_node="">In March 2004, the production company Jerry Bruckheimer Films sought to acquire feature film rights to the 2003 video game </span><i data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Prince of Persia: The Sands of Time</span></i><span data-dcnode-id="1493" instrument_node=""> with the film to be distributed by </span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Walt_Disney_Pictures" title="Walt Disney Pictures"><span data-dcnode-id="1492" instrument_node="">Walt Disney Pictures</span></a><span data-dcnode-id="1490" instrument_node="">. Under John August as executive producer, the series' creator Jordan Mechner was hired to write the script. Producer </span><a data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Jerry_Bruckheimer" title="Jerry Bruckheimer"><span data-dcnode-id="1489" instrument_node="">Jerry Bruckheimer</span></a><span data-dcnode-id="1487" instrument_node="">'s </span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Pirates_of_the_Caribbean_%28franchise%29" title="Pirates of the Caribbean (franchise)"><i data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Pirates of the Caribbean</span></i><span data-dcnode-id="1484" instrument_node=""> film trilogy</span></a><span data-dcnode-id="1482" instrument_node=""> served as a touchstone in how a theme park ride was converted into a film franchise. According to Mechner, "Rather than do a straight beat-for-beat adaptation of the new videogame, we're taking some cool elements from the game and using them to craft a new story." Mechner previously considered producing an animated film based on the games, but could not resist Disney and Bruckheimer's offer. In February 2006, Disney hired screenwriter Jeffrey Nachmanoff to write a new script for </span><i data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="1479" instrument_node="">.
</span></p><p data-dcnode-id="1461"><span data-dcnode-id="1477" instrument_node="">Early in 2007, Disney announced </span><i data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Rahul the Prince</span></i><span data-dcnode-id="1474" instrument_node=""> as one of its tentpole films and by June had scheduled a release date for July 10, 2009, before having a final script or any actors attached. By November 2007, Disney entered negotiations with Mike Newell to direct the film based on a script by Mechner and Nachmanoff, though the studio held off production until the 2007–2008 Writers Guild of America strike was resolved. Newell was fond of Bruckheimer's films, and loved the "exciting and immensely romantic" script, which reminded him of </span><i data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Lost Horizon</span></i><span data-dcnode-id="1471" instrument_node="">. His assistant played the video games and gave the director key details. Mechner, in writing the script, re-conceived the storyline to shift the perspective from the interactive one experienced by video gamers to the non-interactive experience by film audiences. The screenwriter left out elements of the </span><i data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="1468" instrument_node=""> video games </span><i data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Warrior Within</span></i><span data-dcnode-id="1465" instrument_node=""> and </span><i data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">The Two Thrones</span></i><span data-dcnode-id="1462" instrument_node=""> and did not anticipate including these elements in the film's possible sequels.
</span></p><p data-dcnode-id="1438"><span data-dcnode-id="1460" instrument_node="">When filming began, the film's release date was postponed to May 28, 2010, with the studio seeking enough time for the post-production process in designing the film's special effects. The profit margin on the </span><i data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Pirates of the Caribbean</span></i><span data-dcnode-id="1457" instrument_node=""> films was compromised by overspending as special effects teams rushed to complete the films for their release dates. </span><i data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Variety</span></i><span data-dcnode-id="1454" instrument_node=""> also ascribed the postponement to avoiding the potential 2008 Screen Actors Guild strike so the studio could ensure that the film leads to a "mega-franchise" similar to its successful </span><i data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Pirates of the Caribbean</span></i><span data-dcnode-id="1451" instrument_node=""> series. Other reasons for the release date change were that the film was originally scheduled a week before </span><i data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Transformers: Revenge of the Fallen</span></i><span data-dcnode-id="1448" instrument_node="">, and Disney needed more time to co-ordinate its marketing campaign. Gyllenhaal claims he "over-prepared" for the role, gaining five or six pounds of muscle. The actor says, "I never knew how much they were going to ask me to do, so I just made sure I'd be hopefully able to do anything." </span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Gemma_Arterton" title="Gemma Arterton"><span data-dcnode-id="1447" instrument_node="">Gemma Arterton</span></a><span data-dcnode-id="1445" instrument_node=""> was announced to play the role of protagonist Tamina, and Arterton reported she practiced horse back riding in Madrid before filming. </span><a data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Ben_Kingsley" title="Ben Kingsley"><span data-dcnode-id="1444" instrument_node="">Ben Kingsley</span></a><span data-dcnode-id="1442" instrument_node=""> was to portray the film's antagonist, Nizam. </span><a data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Alfred_Molina" title="Alfred Molina"><span data-dcnode-id="1441" instrument_node="">Alfred Molina</span></a><span data-dcnode-id="1439" instrument_node=""> was to portray a character named Sheik Amar, who becomes a mentor to the prince. Toby Kebbell was to play Prince Garsiv, Dastan's brother and head of the Persian army. Richard Coyle was cast as the eldest brother Crown prince Tus and William Foster was cast as young Dastan based on his experience in parkour. The leading characters of the film all speak with recognisably English accents.
</span></p><span data-dcnode-id="1437" instrument_node="">
</span><h3 data-dcnode-id="1434"><span class="mw-headline" data-dcnode-id="1435" id="Filming"><span data-dcnode-id="1436" instrument_node="">Filming</span></span></h3><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1432" instrument_node="">In March 2008, director Mike Newell selected Morocco as a shooting location for </span><i data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="1429" instrument_node=""> and also planned to film in </span><a data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Pinewood_Studios" title="Pinewood Studios"><span data-dcnode-id="1428" instrument_node="">Pinewood Studios</span></a><span data-dcnode-id="1426" instrument_node="">. Production was scheduled to begin in mid-June 2008. By May 2008, actors Jake Gyllenhaal and Gemma Arterton were cast into the lead roles. With a new script by Jordan Mechner, Doug Miro, Carlo Bernard, and Boaz Yakin, filming began in July 2008 in Morocco as well as London. Eight weeks were spent in Morocco before the first unit moved to Pinewood. Unlike other Disney films being made at the time, filming was </span><i data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">not</span></i><span data-dcnode-id="1423" instrument_node=""> done in three dimensions, nor was the film converted into 3-D during post production.
</span></p><span data-dcnode-id="1421" instrument_node="">
</span><h3 data-dcnode-id="1418"><span class="mw-headline" data-dcnode-id="1419" id="Soundtrack"><span data-dcnode-id="1420" instrument_node="">Soundtrack</span></span></h3><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Alanis Morissette composed the theme song for the film, named "I Remain". The score was written by composer Harry Gregson-Williams.
</span></p><span data-dcnode-id="1414" instrument_node="">
</span><h2 data-dcnode-id="1411"><span class="mw-headline" data-dcnode-id="1412" id="Marketing"><span data-dcnode-id="1413" instrument_node="">Marketing</span></span></h2><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1409" instrument_node="">The poster made its debut as a background prop in a 2009 Bruckheimer production, </span><i data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Confessions of a Shopaholic</span></i><span data-dcnode-id="1406" instrument_node="">, similar to how Warner Bros. incorporated poster for various developed but never filmed projects based on their comic characters in </span><i data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">I Am Legend</span></i><span data-dcnode-id="1403" instrument_node="">. The week of </span><i data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Confessions of a Shopaholic</span></i><span data-dcnode-id="1400" instrument_node="">'s release, Disney signed a merchandising deal with Lego for the film.
</span></p><p data-dcnode-id="1388"><span data-dcnode-id="1398" instrument_node="">Disney released merchandise such as action figures, sets, costumes and a replica Dagger of Time. It also released a graphic novel called </span><i data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Prince of Persia: Before the Sandstorm</span></i><span data-dcnode-id="1395" instrument_node="">, which will act as a prequel to the film. Also, a video game was developed by Ubisoft Montreal titled </span><i data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Prince of Persia: The Forgotten Sands</span></i><span data-dcnode-id="1392" instrument_node=""> and was released alongside the film; however, the game's story is unrelated to the film, and instead serves as an interquel to the first two games in the </span><i data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Sands of Time</span></i><span data-dcnode-id="1389" instrument_node=""> trilogy.
</span></p><span data-dcnode-id="1387" instrument_node="">
</span><h2 data-dcnode-id="1384"><span class="mw-headline" data-dcnode-id="1385" id="Release"><span data-dcnode-id="1386" instrument_node="">Release</span></span></h2><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1382" instrument_node="">Disney's marketing strategy included a step by step release of the film. </span><i data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="1379" instrument_node=""> was released first in Europe, with its world premiere held in Westfield, </span><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/London" title="London"><span data-dcnode-id="1378" instrument_node="">London</span></a><span data-dcnode-id="1376" instrument_node="">, UK on May 9 then premiered on May 19, 2010 in </span><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Italy" title="Italy"><span data-dcnode-id="1375" instrument_node="">Italy</span></a><span data-dcnode-id="1373" instrument_node="">, </span><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/France" title="France"><span data-dcnode-id="1372" instrument_node="">France</span></a><span data-dcnode-id="1370" instrument_node="">, Belgium, the Netherlands, </span><a data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Norway" title="Norway"><span data-dcnode-id="1369" instrument_node="">Norway</span></a><span data-dcnode-id="1367" instrument_node="">, Denmark, Sweden and Finland, and on May 20 in </span><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Germany" title="Germany"><span data-dcnode-id="1366" instrument_node="">Germany</span></a><span data-dcnode-id="1364" instrument_node="">. It was released on May 21 in the United Kingdom, </span><a data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Spain" title="Spain"><span data-dcnode-id="1363" instrument_node="">Spain</span></a><span data-dcnode-id="1361" instrument_node="">, Bulgaria, Poland, and Turkey. It was released in </span><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Australia" title="Australia"><span data-dcnode-id="1360" instrument_node="">Australia</span></a><span data-dcnode-id="1358" instrument_node="">, </span><a data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Hong_Kong" title="Hong Kong"><span data-dcnode-id="1357" instrument_node="">Hong Kong</span></a><span data-dcnode-id="1355" instrument_node="">, Malaysia, and the Philippines on May 27. The film was not released in the </span><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/United_States" title="United States"><span data-dcnode-id="1354" instrument_node="">United States</span></a><span data-dcnode-id="1352" instrument_node=""> until May 28 to try to profit from the potentially higher audience on Memorial Day weekend. It was also released in Ghana, </span><a data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/India" title="India"><span data-dcnode-id="1351" instrument_node="">India</span></a><span data-dcnode-id="1349" instrument_node="">, Romania and Nigeria on May 28.
</span></p><span data-dcnode-id="1347" instrument_node="">
</span><h2 data-dcnode-id="1344"><span class="mw-headline" data-dcnode-id="1345" id="Reception"><span data-dcnode-id="1346" instrument_node="">Reception</span></span></h2><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1342" instrument_node="">The film received mixed to negative reviews, and holds a 35% rating on Rotten Tomatoes, with an average score of 5/10. The critical consensus is: "It doesn't offer much in the way of substance, but </span><i data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="1339" instrument_node=""> is a suitably entertaining swashbuckler—and a substantial improvement over most video game adaptations." Another review aggregate, Metacritic, which calculates an average rating based on reviews from mainstream critics, gave a score of 50/100. </span><i data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Chicago Sun-Times</span></i><span data-dcnode-id="1336" instrument_node=""> film critic Roger Ebert gave the film two stars out of four and wrote, "The two leads are not inspired. Jake Gyllenhaal could make the cover of a muscle mag, but he plays Dastan as if harboring </span><a data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Spider-Man" title="Spider-Man"><span data-dcnode-id="1335" instrument_node="">Spider-Man</span></a><span data-dcnode-id="1333" instrument_node="">'s doubts and insecurities." Film critic David Roark of </span><i data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Relevant Magazine</span></i><span data-dcnode-id="1330" instrument_node="">, on the other hand, gave the film a positive review and wrote: "Newell has unquestionably accomplished what he set out to do, which is ridiculous, silly and forgettable, but amusing nonetheless."
</span></p><span data-dcnode-id="1328" instrument_node="">
</span><h3 data-dcnode-id="1325"><span class="mw-headline" data-dcnode-id="1326" id="Box_office"><span data-dcnode-id="1327" instrument_node="">Box office</span></span></h3><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1295"><i data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Prince of Persia: The Sands of Time</span></i><span data-dcnode-id="1321" instrument_node="">, which, according to </span><a class="mw-redirect" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Disney" title="Disney"><span data-dcnode-id="1320" instrument_node="">Disney</span></a><span data-dcnode-id="1318" instrument_node=""> and </span><a data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Jerry_Bruckheimer" title="Jerry Bruckheimer"><span data-dcnode-id="1317" instrument_node="">Jerry Bruckheimer</span></a><span data-dcnode-id="1315" instrument_node="">, was supposed to be "the new </span><i data-dcnode-id="1312"><a data-dcnode-id="1313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Pirates_of_the_Caribbean_%28franchise%29" title="Pirates of the Caribbean (franchise)"><span data-dcnode-id="1314" instrument_node="">Pirates of the Caribbean</span></a></i><span data-dcnode-id="1311" instrument_node="">", debuted #3 at the U.S. box office behind </span><i data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Shrek Forever After</span></i><span data-dcnode-id="1308" instrument_node=""> and </span><i data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Sex and the City 2</span></i><span data-dcnode-id="1305" instrument_node=""> with $30.1 million in its first 3-day weekend of release. It is the third highest opening for a video game adaptation, behind </span><i data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Lara Croft: Tomb Raider</span></i><span data-dcnode-id="1302" instrument_node=""> and </span><i data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Pokémon: The First Movie</span></i><span data-dcnode-id="1299" instrument_node="">. During Memorial Day, it surpassed </span><i data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Sex and the City 2</span></i><span data-dcnode-id="1296" instrument_node=""> to gross $37,813,075 for the 4-day weekend and finish in second place.
</span></p><p data-dcnode-id="1287"><span data-dcnode-id="1294" instrument_node="">Internationally, the film grossed an estimated $18 million in its first weekend (before its US release), when it opened in 19 major European countries. </span><i data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="1291" instrument_node=""> debuted at #1 in these countries, except UK where it lost the top spot to </span><i data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">StreetDance 3D</span></i><span data-dcnode-id="1288" instrument_node="">. A week later the film was released in the rest of the world and it grossed an estimated $61.6 million in total from 47 countries and $30.1 million in North America, becoming the leader of the worldwide box office with $91,695,259, while reaching the #1 spot in 41 of the 47 countries.
</span></p><p data-dcnode-id="1273"><span data-dcnode-id="1286" instrument_node="">The film has ultimately earned $90,759,676 in the United States and Canada and $244,394,967 in other countries, for a total worldwide gross of $335,154,643 and has become the highest-grossing video-game adaptation worldwide, overtaking previous record holder </span><i data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Lara Croft: Tomb Raider</span></i><span data-dcnode-id="1283" instrument_node=""> and </span><i data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Mortal Kombat</span></i><span data-dcnode-id="1280" instrument_node="">, the record was hold until 2016, which was overtaken by </span><a data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Sony_Pictures_Entertainment" title="Sony Pictures Entertainment"><span data-dcnode-id="1279" instrument_node="">Sony's</span></a><span data-dcnode-id="1277" instrument_node=""> </span><i data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">The Angry Birds Movie</span></i><span data-dcnode-id="1274" instrument_node="">.
</span></p><span data-dcnode-id="1272" instrument_node="">
</span><h3 data-dcnode-id="1269"><span class="mw-headline" data-dcnode-id="1270" id="Home_media"><span data-dcnode-id="1271" instrument_node="">Home media</span></span></h3><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1261"><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Walt_Disney_Studios_Home_Entertainment" title="Walt Disney Studios Home Entertainment"><span data-dcnode-id="1267" instrument_node="">Walt Disney Studios Home Entertainment</span></a><span data-dcnode-id="1265" instrument_node=""> released a single-disc </span><a class="mw-redirect" data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/DVD" title="DVD"><span data-dcnode-id="1264" instrument_node="">DVD</span></a><span data-dcnode-id="1262" instrument_node="">, a single-disc Blu-ray Disc, and a 3-disc Blu-ray Disc combo-pack in the US on September 14, 2010. The DVD landed in the number one spot on the US DVD sales chart, with 664,041 units sold within the first week and 1,623,361 units in total (equal to $33,941,976) as of March 13, 2011.
</span></p><p data-dcnode-id="1253"><span data-dcnode-id="1260" instrument_node="">In the </span><a class="mw-redirect" data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/UK" title="UK"><span data-dcnode-id="1259" instrument_node="">UK</span></a><span data-dcnode-id="1257" instrument_node="">, it opened at number one on the DVD and Blu-ray Disc charts during its first week. In </span><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disney.fandom.com/wiki/Germany" title="Germany"><span data-dcnode-id="1256" instrument_node="">Germany</span></a><span data-dcnode-id="1254" instrument_node="">, too, the DVD landed No. 1 on the country's DVD chart.
</span></p><span data-dcnode-id="1252" instrument_node="">
</span><h2 data-dcnode-id="1249"><span class="mw-headline" data-dcnode-id="1250" id="External_links"><span data-dcnode-id="1251" instrument_node="">External links</span></span></h2><span data-dcnode-id="1248" instrument_node="">
