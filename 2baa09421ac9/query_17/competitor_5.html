</span><section class="article-body" data-dcnode-id="802" id="article-body" itemprop="articleBody"><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1157"><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/prince-of-persia/"><strong data-dcnode-id="1168"><em data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Prince of Persia: The Sands of Time</span></em></strong></a><em data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1164" instrument_node="">debuted a decade ago; will a sequel ever happen? Directed by Mike Newell (</span><em data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Four Weddings and a Funeral</span></em><span data-dcnode-id="1161" instrument_node="">) and starring Jake Gyllenhaal - sporting a surprisingly believable British accent - the film was a fun romp. Albeit, one hampered by accusations of </span><a data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/worst-examples-whitewashing-movies/"><span data-dcnode-id="1160" instrument_node="">white-washing</span></a><span data-dcnode-id="1158" instrument_node="">.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1145"><em data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Prince of Persia: The Sands of Time&nbsp;</span></em><span data-dcnode-id="1153" instrument_node="">is adapted from the beloved Ubisoft video game franchise of the same name; generally a side-scrolling adventure that has appeared on every major gaming platform in various incarnations since 1989.&nbsp;Recently, new life has been breathed into the&nbsp;franchise with original creator Jordan Mechner wanting to </span><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamerant.com/prince-of-persia-new-game/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1152" instrument_node="">create a new game</span></a><span data-dcnode-id="1150" instrument_node="">, and there has been a DLC crossover with Ubisoft's </span><a data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/prince-persia-return-for-honor/"><em data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">For Honor</span></em></a><span data-dcnode-id="1146" instrument_node=""> series.</span></p><span data-dcnode-id="1144" instrument_node="">
</span><span data-dcnode-id="1141" instrument_node="">
</span><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1134"><span class="related-single" data-dcnode-id="1135"><span data-dcnode-id="1138" instrument_node="">Related:&nbsp;</span><a data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/why-video-game-movies-suck/"><span data-dcnode-id="1137" instrument_node="">Why Video Game Movies Suck</span></a></span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1132" instrument_node="">In 2010, </span><em data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Prince of Persia: The Sands of Time&nbsp;</span></em><span data-dcnode-id="1129" instrument_node="">was optimistically seen as the beginning of a big-screen franchise for Disney, who were looking for their new&nbsp;</span><em data-dcnode-id="1126"><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/pirates-of-the-caribbean/"><span data-dcnode-id="1128" instrument_node="">Pirates of the Caribbean</span></a></em><span data-dcnode-id="1125" instrument_node="">, a franchise that has grossed around $4.5 billion worldwide. They even went so far as placing an expensive ad at the Superbowl. So why has it been a decade without a&nbsp;</span><em data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Prince of Persia: The Sands of Time&nbsp;</span></em><span data-dcnode-id="1122" instrument_node="">sequel and is one going to happen?</span></p><span data-dcnode-id="1120" instrument_node="">
</span><h2 data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Prince of Persia: The Sands of Time&nbsp;Received&nbsp;Poor Reviews</span></h2><span data-dcnode-id="1117" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1092"><span data-dcnode-id="1116" instrument_node="">

</span><span data-dcnode-id="1088" instrument_node="">
</span></div><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1073"><em data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Prince of Persia: The Sands of Time </span></em><span data-dcnode-id="1083" instrument_node="">was&nbsp;described as "</span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/prince-of-persia-sands-of-time-review/"><span data-dcnode-id="1082" instrument_node="">mildly entertaining and immediately forgettable</span></a><span data-dcnode-id="1080" instrument_node="">" by Screen Rant upon release in 2010.&nbsp;</span><em data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Prince of Persia: The Sands of Time&nbsp;</span></em><span data-dcnode-id="1077" instrument_node="">didn't fare much better with other critics, currently sitting at 37% on Rotten Tomatoes. Although, audiences obviously responded a little better to it as its Audience rating is a more generous 58%. With those kind of stats, sadly,&nbsp;</span><em data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Prince of Persia: The Sands of Time&nbsp;</span></em><span data-dcnode-id="1074" instrument_node="">is not crying out for a sequel. Whilst a sub-par first installment doesn't mean a sequel would automatically be bad, it does mean the studio may have less faith in financing one.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><span data-dcnode-id="1069" instrument_node="">
</span><span data-dcnode-id="1067" instrument_node="">
</span><h2 data-dcnode-id="1062"><span data-dcnode-id="1066" instrument_node="">Prince of Persia: The Sands of Time</span><em data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1063" instrument_node="">Didn't Make Enough Money</span></h2><span data-dcnode-id="1061" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1036"><span data-dcnode-id="1060" instrument_node="">
</span><div data-dcnode-id="1038" style="margin:0 auto;max-width:1400px;"><span data-dcnode-id="1059" instrument_node="">

</span><picture data-dcnode-id="1042"><span data-dcnode-id="1057" instrument_node="">

</span><p data-dcnode-id="1010"><em data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Prince of Persia: The Sands of Time&nbsp;</span></em><span data-dcnode-id="1027" instrument_node="">was the </span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/prince-persia-top-grossing-video-game-movie/"><span data-dcnode-id="1026" instrument_node="">highest-grossing video game adaptation</span></a><span data-dcnode-id="1024" instrument_node=""> of all time when released in 2010. The film ended up chugging along to $336 million worldwide, lurching ahead of previous box office champ&nbsp;</span><em data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Lara Croft: Tomb Raider.&nbsp;</span></em><em data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Prince of Persia: The Sands of Time&nbsp;</span></em><span data-dcnode-id="1019" instrument_node="">has since been dethroned by a plethora of movies, including&nbsp;</span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/sonic-the-hedgehog/"><em data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Sonic the Hedgehog</span></em></a><span data-dcnode-id="1015" instrument_node="">, and&nbsp;</span><em data-dcnode-id="1012"><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/detective-pikachu/"><span data-dcnode-id="1014" instrument_node="">Pokémon: Detective Pikachu</span></a></em><span data-dcnode-id="1011" instrument_node="">.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1008" instrument_node="">Without any title-holding pedigree behind it, what's left is the fact that&nbsp;</span><em data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Prince of Persia: The Sands of Time&nbsp;</span></em><span data-dcnode-id="1005" instrument_node="">cost a whopping $200 million dollars to produce. Its marketing budget could have been as much as $100 million on top of that. In the eyes of a corporate behemoth like Disney,&nbsp;</span><em data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Prince of Persia: The Sands of Time&nbsp;</span></em><span data-dcnode-id="1002" instrument_node="">would have been viewed as a commercial failure.</span></p><span data-dcnode-id="1000" instrument_node="">
</span><span data-dcnode-id="997" instrument_node="">

</span><p data-dcnode-id="949"><span data-dcnode-id="959" instrument_node="">Bad reviews combined with a disappointing box office - in Disney's eyes - means a&nbsp;</span><em data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Prince of Persia: The Sands of Time </span></em><span data-dcnode-id="956" instrument_node="">sequel&nbsp;is unlikely. It's been ten years and lad Jake Gyllenhaal has most likely lost interest. If anything, audiences are more likely to see a reboot of&nbsp;</span><strong data-dcnode-id="953"><em data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Prince of Persia: The Sands of Time</span></em></strong><em data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">&nbsp;</span></em><span data-dcnode-id="950" instrument_node="">rather than a sequel. Injected with some fresh blood and a smaller budget, the House of Mouse might be willing to give the franchise another stab.</span></p><span data-dcnode-id="948" instrument_node="">
