ass="reference" data-dcnode-id="3729" id="cite_ref-mojo_2-0"><a data-dcnode-id="3730" href="#cite_note-mojo-2"><span data-dcnode-id="3731" instrument_node="">[2]</span></a></sup></td></tr></tbody></table><span data-dcnode-id="3724" instrument_node="">
</span><p data-dcnode-id="3657"><i data-dcnode-id="3721"><b data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">Prince of Persia: The Sands of Time</span></b></i><span data-dcnode-id="3720" instrument_node=""> is a 2010 American </span><a data-dcnode-id="3718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Action_film" title="Action film"><span data-dcnode-id="3719" instrument_node="">action</span></a><span data-dcnode-id="3717" instrument_node=""> </span><a data-dcnode-id="3715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fantasy_film" title="Fantasy film"><span data-dcnode-id="3716" instrument_node="">fantasy film</span></a><span data-dcnode-id="3714" instrument_node=""> directed by </span><a data-dcnode-id="3712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mike_Newell_%28director%29" title="Mike Newell (director)"><span data-dcnode-id="3713" instrument_node="">Mike Newell</span></a><span data-dcnode-id="3711" instrument_node="">. The film was written by </span><a data-dcnode-id="3709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan_Mechner" title="Jordan Mechner"><span data-dcnode-id="3710" instrument_node="">Jordan Mechner</span></a><span data-dcnode-id="3708" instrument_node="">, </span><a data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boaz_Yakin" title="Boaz Yakin"><span data-dcnode-id="3707" instrument_node="">Boaz Yakin</span></a><span data-dcnode-id="3705" instrument_node="">, </span><a data-dcnode-id="3703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doug_Miro" title="Doug Miro"><span data-dcnode-id="3704" instrument_node="">Doug Miro</span></a><span data-dcnode-id="3702" instrument_node="">, and Carlo Bernard, produced by </span><a data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerry_Bruckheimer" title="Jerry Bruckheimer"><span data-dcnode-id="3701" instrument_node="">Jerry Bruckheimer</span></a><span data-dcnode-id="3699" instrument_node="">, and released by </span><a data-dcnode-id="3697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walt_Disney_Pictures" title="Walt Disney Pictures"><span data-dcnode-id="3698" instrument_node="">Walt Disney Pictures</span></a><span data-dcnode-id="3696" instrument_node=""> on May 28, 2010. The film stars </span><a data-dcnode-id="3694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jake_Gyllenhaal" title="Jake Gyllenhaal"><span data-dcnode-id="3695" instrument_node="">Jake Gyllenhaal</span></a><span data-dcnode-id="3693" instrument_node=""> as </span><a data-dcnode-id="3691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_%28Prince_of_Persia%29" title="Prince (Prince of Persia)"><span data-dcnode-id="3692" instrument_node="">Prince Dastan</span></a><span data-dcnode-id="3690" instrument_node="">, </span><a data-dcnode-id="3688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gemma_Arterton" title="Gemma Arterton"><span data-dcnode-id="3689" instrument_node="">Gemma Arterton</span></a><span data-dcnode-id="3687" instrument_node=""> as Princess Tamina, </span><a data-dcnode-id="3685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ben_Kingsley" title="Ben Kingsley"><span data-dcnode-id="3686" instrument_node="">Ben Kingsley</span></a><span data-dcnode-id="3684" instrument_node=""> as Nizam, </span><a data-dcnode-id="3682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toby_Kebbell" title="Toby Kebbell"><span data-dcnode-id="3683" instrument_node="">Toby Kebbell</span></a><span data-dcnode-id="3681" instrument_node=""> as Garsiv and </span><a data-dcnode-id="3679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Molina" title="Alfred Molina"><span data-dcnode-id="3680" instrument_node="">Alfred Molina</span></a><span data-dcnode-id="3678" instrument_node=""> as Sheik Amar. The film is an adaptation of the video game of </span><a data-dcnode-id="3676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Sands_of_Time" title="Prince of Persia: The Sands of Time"><span data-dcnode-id="3677" instrument_node="">the same name</span></a><span data-dcnode-id="3675" instrument_node=""> developed and published by </span><a data-dcnode-id="3673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft" title="Ubisoft"><span data-dcnode-id="3674" instrument_node="">Ubisoft</span></a><span data-dcnode-id="3672" instrument_node="">. Elements from </span><i data-dcnode-id="3669"><a data-dcnode-id="3670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_Warrior_Within" title="Prince of Persia: Warrior Within"><span data-dcnode-id="3671" instrument_node="">Warrior Within</span></a></i><span data-dcnode-id="3668" instrument_node=""> and </span><i data-dcnode-id="3665"><a data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Two_Thrones" title="Prince of Persia: The Two Thrones"><span data-dcnode-id="3667" instrument_node="">The Two Thrones</span></a></i><span data-dcnode-id="3664" instrument_node="">, the two other titles from the </span><i data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">Sands of Time</span></i><span data-dcnode-id="3661" instrument_node=""> trilogy of the </span><i data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3658" instrument_node=""> video game franchise, are also incorporated.
</span></p><p data-dcnode-id="3643"><span data-dcnode-id="3656" instrument_node="">The film was premiered in London on May 5, 2010 and was officially released on May 28, 2010 in the United States. It received mixed reviews from critics, who felt that it was nevertheless an entertaining improvement over previous video game adaptations at the time.</span><sup class="reference" data-dcnode-id="3653" id="cite_ref-3"><a data-dcnode-id="3654" href="#cite_note-3"><span data-dcnode-id="3655" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3652" instrument_node=""> It grossed over $336 million</span><sup class="reference" data-dcnode-id="3649" id="cite_ref-4"><a data-dcnode-id="3650" href="#cite_note-4"><span data-dcnode-id="3651" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3648" instrument_node=""> against a production budget of $150–200 million, and was the highest-grossing video game film until it was surpassed by </span><i data-dcnode-id="3645"><a data-dcnode-id="3646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warcraft_%28film%29" title="Warcraft (film)"><span data-dcnode-id="3647" instrument_node="">Warcraft</span></a></i><span data-dcnode-id="3644" instrument_node=""> in 2016.

</span><h2 data-dcnode-id="3480"><span class="mw-headline" data-dcnode-id="3488" id="Plot"><span data-dcnode-id="3489" instrument_node="">Plot</span></span><span class="mw-editsection" data-dcnode-id="3481"><span class="mw-editsection-bracket" data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">[</span></span><a data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time_%28film%29%26action%3Dedit%26section%3D1" title="Edit section: Plot"><span data-dcnode-id="3485" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3479" instrument_node="">
</span><p data-dcnode-id="3469"><a data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_%28Prince_of_Persia%29" title="Prince (Prince of Persia)"><span data-dcnode-id="3478" instrument_node="">Dastan</span></a><span data-dcnode-id="3476" instrument_node="">, a street urchin in </span><a class="mw-redirect" data-dcnode-id="3474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persia" title="Persia"><span data-dcnode-id="3475" instrument_node="">Persia</span></a><span data-dcnode-id="3473" instrument_node="">, is adopted by King Sharaman after showing courage. Fifteen years later, the king's brother Nizam relays evidence to the princes—Dastan, along with the king's biological sons Tus and Garsiv—that the holy city of </span><a data-dcnode-id="3471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alamut_Castle" title="Alamut Castle"><span data-dcnode-id="3472" instrument_node="">Alamut</span></a><span data-dcnode-id="3470" instrument_node=""> is forging weapons for Persia's enemies. Tus directs the Persian army to capture Alamut. Dastan and his friends breach the city and open a gate for the siege. During the attack, Dastan defeats a royal guard and takes from him a sacred dagger.
</span></p><p data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">Alamut falls to the Persians, but Princess Tamina denies that the city has any weapon forges. Tus asks her to marry him to unite the two nations, and she only accepts after seeing the dagger in Dastan's possession. At their celebratory banquet, Tus has Dastan give their father an embroidered robe. However, the robe is poisoned, fatally burning Sharaman. Garsiv accuses Dastan of the king's murder, but Dastan escapes with Tamina. Tus is appointed king and a bounty on Dastan’s head is set.
</span></p><p data-dcnode-id="3459"><span data-dcnode-id="3466" instrument_node="">While in hiding, Tamina attempts to kill Dastan and steal the dagger, and in the struggle Dastan discovers the dagger enables the wielder to </span><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Time_travel" title="Time travel"><span data-dcnode-id="3465" instrument_node="">travel back in time</span></a><span data-dcnode-id="3463" instrument_node="">. Dastan concludes that Tus invaded Alamut for the dagger, and decides to confront his brother at the funeral of the king in Avrat. On the way, the two are captured by merchant-bandits led by Sheik Amar who seeks the reward money, but they manage to escape. After arriving in Avrat, Dastan tries to convince Nizam of his innocence. Seeing burns on Nizam's hands, Dastan realizes that Nizam orchestrated the king's murder. Furthermore, Nizam has set up an ambush for Dastan along the Persian streets, but after a conflict with Garsiv, Dastan escapes. Nizam sends a group of covert warriors, the </span><a data-dcnode-id="3461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Order_of_Assassins" title="Order of Assassins"><span data-dcnode-id="3462" instrument_node="">Hassansins</span></a><span data-dcnode-id="3460" instrument_node="">, to kill Dastan and find the dagger.
</span></p><p data-dcnode-id="3454"><span data-dcnode-id="3458" instrument_node="">During a sandstorm, Tamina tells Dastan that long ago, the gods unleashed a great sandstorm to destroy humanity but were moved by a young girl's offer to sacrifice herself in humanity's place and trapped the Sands of Time in a large sandglass. Tamina is the latest guardian of the dagger, given to the young girl by the gods, which can pierce the sandglass and potentially destroy the world but also enable the dagger's wielder to travel further back in time than the one minute's worth of sand the dagger holds. Dastan realizes that Nizam intends to travel back to his childhood, prevent himself from saving Sharaman from a lion attack, and grow up to become King of Persia in Sharaman's place. Amar captures the two again, but Dastan saves Amar's men from a Hassansin attack using the dagger. This convinces Amar to escort them to a sanctuary near the </span><a data-dcnode-id="3456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hindu_Kush" title="Hindu Kush"><span data-dcnode-id="3457" instrument_node="">Hindu Kush</span></a><span data-dcnode-id="3455" instrument_node="">, where Tamina will seal the dagger within the stone it first came from. At the sanctuary, they are found by Garsiv, whom Dastan convinces of his innocence, but the Hassansins ambush them, killing Garsiv and stealing the dagger.
</span></p><p data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">Dastan's group travels back to Alamut to retrieve the dagger from Nizam and warn Tus of Nizam. Amar's right-hand man Seso dies retrieving the dagger for Dastan, who demonstrates the dagger's powers to Tus to convince him of the truth. Afterwards, Nizam interrupts them, kills Tus, and takes the dagger back. Tamina saves Dastan from being killed and the two head for the secret tunnels beneath the city that lead to the sandglass. When they reach Nizam, he stabs the sandglass and throws them both off a cliff. Tamina sacrifices herself, releasing Dastan's hand and falling to her death to allow him to fight Nizam.
</span></p><p data-dcnode-id="3444"><span data-dcnode-id="3451" instrument_node="">Nizam thrusts the dagger into the </span><a data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_esotericism%23Definition" title="Western esotericism"><span data-dcnode-id="3450" instrument_node="">esoterical</span></a><span data-dcnode-id="3448" instrument_node=""> column of sandglass under the temple. Dastan grabs hold of the hilt of the dagger together with Nizam; as sand is released from the sandglass, time rewinds to the moment Dastan found the dagger. He finds Tus and Garsiv and exposes Nizam's treachery. Nizam tries to kill Dastan, but Dastan easily defeats him yet spares him. Nizam gets up and attempts to attack again but is subdued and killed by Tus. Tus apologizes to Tamina for the siege and proposes to strengthen the two nations' bond by </span><a class="mw-redirect" data-dcnode-id="3446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marital_alliance" title="Marital alliance"><span data-dcnode-id="3447" instrument_node="">marital alliance</span></a><span data-dcnode-id="3445" instrument_node=""> of the Princess to Dastan. Dastan returns the dagger to Tamina as an engagement gift and tells her he looks forward to their future together.
</span></p><span data-dcnode-id="3443" instrument_node="">

</span><h3 data-dcnode-id="3349"><span class="mw-headline" data-dcnode-id="3357" id="Development"><span data-dcnode-id="3358" instrument_node="">Development</span></span><span class="mw-editsection" data-dcnode-id="3350"><span class="mw-editsection-bracket" data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">[</span></span><a data-dcnode-id="3353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time_%28film%29%26action%3Dedit%26section%3D4" title="Edit section: Development"><span data-dcnode-id="3354" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3348" instrument_node="">
</span><p data-dcnode-id="3305"><span data-dcnode-id="3347" instrument_node="">In March 2004, the production company </span><a data-dcnode-id="3345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerry_Bruckheimer_Films" title="Jerry Bruckheimer Films"><span data-dcnode-id="3346" instrument_node="">Jerry Bruckheimer Films</span></a><span data-dcnode-id="3344" instrument_node=""> sought to acquire feature film rights to the 2003 video game </span><i data-dcnode-id="3341"><a data-dcnode-id="3342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Sands_of_Time" title="Prince of Persia: The Sands of Time"><span data-dcnode-id="3343" instrument_node="">Prince of Persia: The Sands of Time</span></a></i><span data-dcnode-id="3340" instrument_node=""> with the film to be distributed by </span><a data-dcnode-id="3338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walt_Disney_Pictures" title="Walt Disney Pictures"><span data-dcnode-id="3339" instrument_node="">Walt Disney Pictures</span></a><span data-dcnode-id="3337" instrument_node="">. Under </span><a data-dcnode-id="3335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_August" title="John August"><span data-dcnode-id="3336" instrument_node="">John August</span></a><span data-dcnode-id="3334" instrument_node=""> as executive producer, the series' creator </span><a data-dcnode-id="3332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan_Mechner" title="Jordan Mechner"><span data-dcnode-id="3333" instrument_node="">Jordan Mechner</span></a><span data-dcnode-id="3331" instrument_node=""> was hired to write the script. Producer </span><a data-dcnode-id="3329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerry_Bruckheimer" title="Jerry Bruckheimer"><span data-dcnode-id="3330" instrument_node="">Jerry Bruckheimer</span></a><span data-dcnode-id="3328" instrument_node="">'s </span><i data-dcnode-id="3325"><a data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pirates_of_the_Caribbean_%28film_series%29" title="Pirates of the Caribbean (film series)"><span data-dcnode-id="3327" instrument_node="">Pirates of the Caribbean</span></a></i><span data-dcnode-id="3324" instrument_node=""> film trilogy served as a touchstone in how a theme park ride was converted into a film franchise. According to Mechner, "Rather than do a straight beat-for-beat adaptation of the new videogame, we're taking some cool elements from the game and using them to craft a new story."</span><sup class="reference" data-dcnode-id="3321" id="cite_ref-5"><a data-dcnode-id="3322" href="#cite_note-5"><span data-dcnode-id="3323" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3320" instrument_node=""> Mechner previously considered producing an animated film based on the games, but could not resist Disney and Bruckheimer's offer.</span><sup class="reference" data-dcnode-id="3317" id="cite_ref-trickster_6-0"><a data-dcnode-id="3318" href="#cite_note-trickster-6"><span data-dcnode-id="3319" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3316" instrument_node=""> In February 2006, Disney hired screenwriter </span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeffrey_Nachmanoff" title="Jeffrey Nachmanoff"><span data-dcnode-id="3315" instrument_node="">Jeffrey Nachmanoff</span></a><span data-dcnode-id="3313" instrument_node=""> to write a new script for </span><i data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3310" instrument_node="">.</span><sup class="reference" data-dcnode-id="3307" id="cite_ref-7"><a data-dcnode-id="3308" href="#cite_note-7"><span data-dcnode-id="3309" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3306" instrument_node="">
</span></p><p data-dcnode-id="3256"><span data-dcnode-id="3304" instrument_node="">Early in 2007, Disney announced </span><i data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3301" instrument_node=""> as one of its </span><a class="mw-redirect" data-dcnode-id="3299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tent-pole_programming" title="Tent-pole programming"><span data-dcnode-id="3300" instrument_node="">tentpole films</span></a><span data-dcnode-id="3298" instrument_node=""> and by June had scheduled a release date for July 10, 2009, before having a final script or any actors attached.</span><sup class="reference" data-dcnode-id="3295" id="cite_ref-8"><a data-dcnode-id="3296" href="#cite_note-8"><span data-dcnode-id="3297" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3294" instrument_node=""> By November 2007, Disney entered negotiations with </span><a data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mike_Newell_%28director%29" title="Mike Newell (director)"><span data-dcnode-id="3293" instrument_node="">Mike Newell</span></a><span data-dcnode-id="3291" instrument_node=""> to direct the film based on a script by Mechner and Nachmanoff, though the studio held off production until the </span><a class="mw-redirect" data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2007%25E2%2580%25932008_Writers_Guild_of_America_strike" title="2007–2008 Writers Guild of America strike"><span data-dcnode-id="3290" instrument_node="">2007–2008 Writers Guild of America strike</span></a><span data-dcnode-id="3288" instrument_node=""> was resolved.</span><sup class="reference" data-dcnode-id="3285" id="cite_ref-9"><a data-dcnode-id="3286" href="#cite_note-9"><span data-dcnode-id="3287" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3284" instrument_node=""> Newell was fond of Bruckheimer's films,</span><sup class="reference" data-dcnode-id="3281" id="cite_ref-10"><a data-dcnode-id="3282" href="#cite_note-10"><span data-dcnode-id="3283" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3280" instrument_node=""> and loved the "exciting and immensely romantic" script, which reminded him of </span><i data-dcnode-id="3277"><a data-dcnode-id="3278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lost_Horizon" title="Lost Horizon"><span data-dcnode-id="3279" instrument_node="">Lost Horizon</span></a></i><span data-dcnode-id="3276" instrument_node="">. His assistant played the video games and gave the director key details.</span><sup class="reference" data-dcnode-id="3273" id="cite_ref-11"><a data-dcnode-id="3274" href="#cite_note-11"><span data-dcnode-id="3275" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3272" instrument_node=""> Mechner, in writing the script, re-conceived the storyline to shift the perspective from the interactive one experienced by video gamers to the non-interactive experience by film audiences. The screenwriter left out elements of the </span><i data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3269" instrument_node=""> video games </span><i data-dcnode-id="3266"><a data-dcnode-id="3267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_Warrior_Within" title="Prince of Persia: Warrior Within"><span data-dcnode-id="3268" instrument_node="">Warrior Within</span></a></i><span data-dcnode-id="3265" instrument_node=""> and </span><i data-dcnode-id="3262"><a data-dcnode-id="3263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Two_Thrones" title="Prince of Persia: The Two Thrones"><span data-dcnode-id="3264" instrument_node="">The Two Thrones</span></a></i><span data-dcnode-id="3261" instrument_node=""> and did not anticipate including these elements in the film's possible sequels.</span><sup class="reference" data-dcnode-id="3258" id="cite_ref-trickster_6-1"><a data-dcnode-id="3259" href="#cite_note-trickster-6"><span data-dcnode-id="3260" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3257" instrument_node="">
</span></p><p data-dcnode-id="3181"><span data-dcnode-id="3255" instrument_node="">When filming began, the film's release date was postponed to May 28, 2010, with the studio seeking enough time for the post-production process in designing the film's special effects. The profit margin on the </span><i data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">Pirates of the Caribbean</span></i><span data-dcnode-id="3252" instrument_node=""> films was compromised by overspending as special effects teams rushed to complete the films for their release dates.</span><sup class="reference" data-dcnode-id="3249" id="cite_ref-why_12-0"><a data-dcnode-id="3250" href="#cite_note-why-12"><span data-dcnode-id="3251" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3248" instrument_node=""> </span><i data-dcnode-id="3245"><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Variety_%28magazine%29" title="Variety (magazine)"><span data-dcnode-id="3247" instrument_node="">Variety</span></a></i><span data-dcnode-id="3244" instrument_node=""> also ascribed the postponement to avoiding the potential </span><a class="mw-redirect" data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2008%25E2%2580%259309_Screen_Actors_Guild_labor_dispute" title="2008–09 Screen Actors Guild labor dispute"><span data-dcnode-id="3243" instrument_node="">2008 Screen Actors Guild strike</span></a><span data-dcnode-id="3241" instrument_node=""> so the studio could ensure that the film leads to a "mega-franchise" similar to its successful </span><i data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">Pirates of the Caribbean</span></i><span data-dcnode-id="3238" instrument_node=""> series.</span><sup class="reference" data-dcnode-id="3235" id="cite_ref-13"><a data-dcnode-id="3236" href="#cite_note-13"><span data-dcnode-id="3237" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3234" instrument_node=""> Other reasons for the release date change were that the film was originally scheduled a week before </span><i data-dcnode-id="3231"><a data-dcnode-id="3232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transformers%3A_Revenge_of_the_Fallen" title="Transformers: Revenge of the Fallen"><span data-dcnode-id="3233" instrument_node="">Transformers: Revenge of the Fallen</span></a></i><span data-dcnode-id="3230" instrument_node="">, and Disney needed more time to co-ordinate its marketing campaign.</span><sup class="reference" data-dcnode-id="3227" id="cite_ref-prince_14-0"><a data-dcnode-id="3228" href="#cite_note-prince-14"><span data-dcnode-id="3229" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3226" instrument_node=""> Gyllenhaal claims he "over-prepared"</span><sup class="reference" data-dcnode-id="3223" id="cite_ref-et_15-0"><a data-dcnode-id="3224" href="#cite_note-et-15"><span data-dcnode-id="3225" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3222" instrument_node=""> for the role, gaining five or six pounds of muscle.</span><sup class="reference" data-dcnode-id="3219" id="cite_ref-et_15-1"><a data-dcnode-id="3220" href="#cite_note-et-15"><span data-dcnode-id="3221" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3218" instrument_node=""> The actor says, "I never knew how much they were going to ask me to do, so I just made sure I'd be hopefully able to do anything."</span><sup class="reference" data-dcnode-id="3215" id="cite_ref-et_15-2"><a data-dcnode-id="3216" href="#cite_note-et-15"><span data-dcnode-id="3217" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3214" instrument_node=""> </span><a data-dcnode-id="3212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gemma_Arterton" title="Gemma Arterton"><span data-dcnode-id="3213" instrument_node="">Gemma Arterton</span></a><span data-dcnode-id="3211" instrument_node=""> was announced to play the role of protagonist Tamina,</span><sup class="reference" data-dcnode-id="3208" id="cite_ref-prince_14-1"><a data-dcnode-id="3209" href="#cite_note-prince-14"><span data-dcnode-id="3210" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3207" instrument_node=""> and Arterton reported she practiced horse back riding in Madrid before filming.</span><sup class="reference" data-dcnode-id="3204" id="cite_ref-16"><a data-dcnode-id="3205" href="#cite_note-16"><span data-dcnode-id="3206" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3203" instrument_node=""> </span><a data-dcnode-id="3201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ben_Kingsley" title="Ben Kingsley"><span data-dcnode-id="3202" instrument_node="">Ben Kingsley</span></a><span data-dcnode-id="3200" instrument_node=""> was to portray the film's antagonist, Nizam.</span><sup class="reference" data-dcnode-id="3197" id="cite_ref-kingsley_17-0"><a data-dcnode-id="3198" href="#cite_note-kingsley-17"><span data-dcnode-id="3199" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3196" instrument_node=""> </span><a data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Molina" title="Alfred Molina"><span data-dcnode-id="3195" instrument_node="">Alfred Molina</span></a><span data-dcnode-id="3193" instrument_node=""> was to portray a character named Sheik Amar, who becomes a mentor to the prince.</span><sup class="reference" data-dcnode-id="3190" id="cite_ref-18"><a data-dcnode-id="3191" href="#cite_note-18"><span data-dcnode-id="3192" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3189" instrument_node=""> </span><a data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toby_Kebbell" title="Toby Kebbell"><span data-dcnode-id="3188" instrument_node="">Toby Kebbell</span></a><span data-dcnode-id="3186" instrument_node=""> was to play Prince Garsiv, Dastan's brother and head of the Persian army.</span><sup class="reference" data-dcnode-id="3183" id="cite_ref-19"><a data-dcnode-id="3184" href="#cite_note-19"><span data-dcnode-id="3185" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3182" instrument_node="">
</span></p><span data-dcnode-id="3180" instrument_node="">
</span><h3 data-dcnode-id="3170"><span class="mw-headline" data-dcnode-id="3178" id="Filming"><span data-dcnode-id="3179" instrument_node="">Filming</span></span><span class="mw-editsection" data-dcnode-id="3171"><span class="mw-editsection-bracket" data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">[</span></span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time_%28film%29%26action%3Dedit%26section%3D5" title="Edit section: Filming"><span data-dcnode-id="3175" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3169" instrument_node="">
</span><p data-dcnode-id="3139"><span data-dcnode-id="3168" instrument_node="">In March 2008, director Newell selected </span><a data-dcnode-id="3166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morocco" title="Morocco"><span data-dcnode-id="3167" instrument_node="">Morocco</span></a><span data-dcnode-id="3165" instrument_node=""> as a shooting location for </span><i data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3162" instrument_node=""> and also planned to film in </span><a data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pinewood_Studios" title="Pinewood Studios"><span data-dcnode-id="3161" instrument_node="">Pinewood Studios</span></a><span data-dcnode-id="3159" instrument_node="">. Production was scheduled to begin in mid-June 2008.</span><sup class="reference" data-dcnode-id="3156" id="cite_ref-20"><a data-dcnode-id="3157" href="#cite_note-20"><span data-dcnode-id="3158" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3155" instrument_node=""> By May 2008, actors Jake Gyllenhaal and Gemma Arterton were cast into the lead roles. With a new script by Jordan Mechner, Doug Miro, Carlo Bernard, and Boaz Yakin, filming began in July 2008 in Morocco as well as London.</span><sup class="reference" data-dcnode-id="3152" id="cite_ref-prince_14-2"><a data-dcnode-id="3153" href="#cite_note-prince-14"><span data-dcnode-id="3154" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3151" instrument_node=""> Eight weeks were spent in Morocco before the first unit moved to Pinewood.</span><sup class="reference" data-dcnode-id="3148" id="cite_ref-et_15-3"><a data-dcnode-id="3149" href="#cite_note-et-15"><span data-dcnode-id="3150" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3147" instrument_node=""> Unlike other Disney films being made at the time, filming was </span><i data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">not</span></i><span data-dcnode-id="3144" instrument_node=""> done in three dimensions, nor was the film converted into 3-D during post production.</span><sup class="reference" data-dcnode-id="3141" id="cite_ref-21"><a data-dcnode-id="3142" href="#cite_note-21"><span data-dcnode-id="3143" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3140" instrument_node="">
</span></p><span data-dcnode-id="3138" instrument_node="">

e-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Film_score" title="Film score"><span data-dcnode-id="3104" instrument_node="">Film score</span></a></td></tr><tr data-dcnode-id="3091"><th class="infobox-label" data-dcnode-id="3099" scope="row"><span data-dcnode-id="3100" instrument_node="">Length</span></th><td class="infobox-data" data-dcnode-id="3092"><span class="duration" data-dcnode-id="3093"><span class="min" data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">66</span></span><span data-dcnode-id="3096" instrument_node="">:</span><span class="s" data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">26</span></span></span></td></tr><tr data-dcnode-id="3084"><th class="infobox-label" data-dcnode-id="3088" scope="row"><a data-dcnode-id="3089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Record_label" title="Record label"><span data-dcnode-id="3090" instrument_node="">Label</span></a></th><td class="infobox-data hlist" data-dcnode-id="3085"><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walt_Disney_Records" title="Walt Disney Records"><span data-dcnode-id="3087" instrument_node="">Walt Disney</span></a></td></tr><tr data-dcnode-id="3077"><th class="infobox-label" data-dcnode-id="3081" scope="row"><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Record_producer" title="Record producer"><span data-dcnode-id="3083" instrument_node="">Producer</span></a></th><td class="infobox-data hlist" data-dcnode-id="3078"><a data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hans_Zimmer" title="Hans Zimmer"><span data-dcnode-id="3080" instrument_node="">Hans Zimmer</span></a></td></tr></tbody></table><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3063"><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alanis_Morissette" title="Alanis Morissette"><span data-dcnode-id="3073" instrument_node="">Alanis Morissette</span></a><span data-dcnode-id="3071" instrument_node=""> composed the theme song for the film, named "I Remain".</span><sup class="reference" data-dcnode-id="3068" id="cite_ref-22"><a data-dcnode-id="3069" href="#cite_note-22"><span data-dcnode-id="3070" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3067" instrument_node=""> The score was written by composer </span><a data-dcnode-id="3065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_Gregson-Williams" title="Harry Gregson-Williams"><span data-dcnode-id="3066" instrument_node="">Harry Gregson-Williams</span></a><span data-dcnode-id="3064" instrument_node="">.
</span></p><span data-dcnode-id="3062" instrument_node="">
</span><h2 data-dcnode-id="3052"><span class="mw-headline" data-dcnode-id="3060" id="Release"><span data-dcnode-id="3061" instrument_node="">Release</span></span><span class="mw-editsection" data-dcnode-id="3053"><span class="mw-editsection-bracket" data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">[</span></span><a data-dcnode-id="3056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time_%28film%29%26action%3Dedit%26section%3D7" title="Edit section: Release"><span data-dcnode-id="3057" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3051" instrument_node="">
</span><p data-dcnode-id="3006"><span data-dcnode-id="3050" instrument_node="">Disney's marketing strategy included a step by step release of the film. </span><i data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3047" instrument_node=""> was released first in Europe, with its world premiere held in </span><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Westfield_London" title="Westfield London"><span data-dcnode-id="3046" instrument_node="">Westfield</span></a><span data-dcnode-id="3044" instrument_node="">, London, UK on May 9 then premiered on May 19, 2010 in Italy, France, </span><a data-dcnode-id="3042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgium" title="Belgium"><span data-dcnode-id="3043" instrument_node="">Belgium</span></a><span data-dcnode-id="3041" instrument_node="">, the </span><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="3040" instrument_node="">Netherlands</span></a><span data-dcnode-id="3038" instrument_node="">, Norway, </span><a data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denmark" title="Denmark"><span data-dcnode-id="3037" instrument_node="">Denmark</span></a><span data-dcnode-id="3035" instrument_node="">, Sweden and </span><a data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Finland" title="Finland"><span data-dcnode-id="3034" instrument_node="">Finland</span></a><span data-dcnode-id="3032" instrument_node="">, and on May 20 in Germany.</span><sup class="reference" data-dcnode-id="3029" id="cite_ref-23"><a data-dcnode-id="3030" href="#cite_note-23"><span data-dcnode-id="3031" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3028" instrument_node=""> It was released on May 21 in the United Kingdom, Spain, </span><a data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bulgaria" title="Bulgaria"><span data-dcnode-id="3027" instrument_node="">Bulgaria</span></a><span data-dcnode-id="3025" instrument_node="">, Poland, and </span><a data-dcnode-id="3023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey" title="Turkey"><span data-dcnode-id="3024" instrument_node="">Turkey</span></a><span data-dcnode-id="3022" instrument_node="">. It was released in Australia, Hong Kong, Malaysia, and the </span><a data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philippines" title="Philippines"><span data-dcnode-id="3021" instrument_node="">Philippines</span></a><span data-dcnode-id="3019" instrument_node=""> on May 27. The film was not released in the United States until May 28 to try to profit from the potentially higher audience on </span><a data-dcnode-id="3017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Memorial_Day" title="Memorial Day"><span data-dcnode-id="3018" instrument_node="">Memorial Day</span></a><span data-dcnode-id="3016" instrument_node=""> weekend. It was also released in </span><a data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ghana" title="Ghana"><span data-dcnode-id="3015" instrument_node="">Ghana</span></a><span data-dcnode-id="3013" instrument_node="">, India, </span><a data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romania" title="Romania"><span data-dcnode-id="3012" instrument_node="">Romania</span></a><span data-dcnode-id="3010" instrument_node=""> and </span><a data-dcnode-id="3008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nigeria" title="Nigeria"><span data-dcnode-id="3009" instrument_node="">Nigeria</span></a><span data-dcnode-id="3007" instrument_node=""> on May 28.
</span></p><span data-dcnode-id="3005" instrument_node="">
</span><h3 data-dcnode-id="2995"><span class="mw-headline" data-dcnode-id="3003" id="Marketing"><span data-dcnode-id="3004" instrument_node="">Marketing</span></span><span class="mw-editsection" data-dcnode-id="2996"><span class="mw-editsection-bracket" data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">[</span></span><a data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time_%28film%29%26action%3Dedit%26section%3D8" title="Edit section: Marketing"><span data-dcnode-id="3000" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2994" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2982"><div class="thumbinner" data-dcnode-id="2983" style="width:352px;"><a class="image" data-dcnode-id="2992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrince_of_Persia_-_The_Sands_of_Time_movie_panel_at_WonderCon_2010_3.JPG"><img alt="" class="thumbimage" data-dcnode-id="2993" data-file-height="616" data-file-width="2288" decoding="async" height="94" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Prince_of_Persia_-_The_Sands_of_Time_movie_panel_at_WonderCon_2010_3.JPG/350px-Prince_of_Persia_-_The_Sands_of_Time_movie_panel_at_WonderCon_2010_3.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Prince_of_Persia_-_The_Sands_of_Time_movie_panel_at_WonderCon_2010_3.JPG/525px-Prince_of_Persia_-_The_Sands_of_Time_movie_panel_at_WonderCon_2010_3.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Prince_of_Persia_-_The_Sands_of_Time_movie_panel_at_WonderCon_2010_3.JPG/700px-Prince_of_Persia_-_The_Sands_of_Time_movie_panel_at_WonderCon_2010_3.JPG 2x" width="350"></a><span data-dcnode-id="2991" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2984"><div class="magnify" data-dcnode-id="2989"><a class="internal" data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrince_of_Persia_-_The_Sands_of_Time_movie_panel_at_WonderCon_2010_3.JPG" title="Enlarge"></a></div><span data-dcnode-id="2988" instrument_node="">Mechner, Gyllenhaal, Bruckheimer, and Newell at a panel promoting the film at </span><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WonderCon" title="WonderCon"><span data-dcnode-id="2987" instrument_node="">WonderCon</span></a><span data-dcnode-id="2985" instrument_node=""> 2010.</span></div></div></div><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2951"><span data-dcnode-id="2980" instrument_node="">The </span><a data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Film_poster" title="Film poster"><span data-dcnode-id="2979" instrument_node="">poster</span></a><span data-dcnode-id="2977" instrument_node=""> made its debut as a background prop in a 2009 Bruckheimer production, </span><i data-dcnode-id="2974"><a data-dcnode-id="2975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confessions_of_a_Shopaholic_%28film%29" title="Confessions of a Shopaholic (film)"><span data-dcnode-id="2976" instrument_node="">Confessions of a Shopaholic</span></a></i><span data-dcnode-id="2973" instrument_node="">, similar to how </span><a data-dcnode-id="2971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warner_Bros." title="Warner Bros."><span data-dcnode-id="2972" instrument_node="">Warner Bros.</span></a><span data-dcnode-id="2970" instrument_node=""> incorporated posters for various developed but never filmed projects based on their comic characters in </span><i data-dcnode-id="2967"><a data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/I_Am_Legend_%28film%29" title="I Am Legend (film)"><span data-dcnode-id="2969" instrument_node="">I Am Legend</span></a></i><span data-dcnode-id="2966" instrument_node="">.</span><sup class="reference" data-dcnode-id="2963" id="cite_ref-24"><a data-dcnode-id="2964" href="#cite_note-24"><span data-dcnode-id="2965" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2962" instrument_node=""> The week of </span><i data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">Confessions of a Shopaholic</span></i><span data-dcnode-id="2959" instrument_node="">’s release, Disney signed a merchandising deal with </span><a class="mw-redirect" data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lego_Group" title="Lego Group"><span data-dcnode-id="2958" instrument_node="">Lego</span></a><span data-dcnode-id="2956" instrument_node=""> for the film.</span><sup class="reference" data-dcnode-id="2953" id="cite_ref-25"><a data-dcnode-id="2954" href="#cite_note-25"><span data-dcnode-id="2955" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2952" instrument_node="">
</span></p><p data-dcnode-id="2925"><span data-dcnode-id="2950" instrument_node="">Disney released merchandise such as action figures, </span><a data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lego" title="Lego"><span data-dcnode-id="2949" instrument_node="">Lego</span></a><span data-dcnode-id="2947" instrument_node=""> sets, costumes and a replica Dagger of Time. It also released a graphic novel called </span><i data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Prince of Persia: Before the Sandstorm</span></i><span data-dcnode-id="2944" instrument_node="">, which will act as a prequel to the film. Also, a video game was developed by </span><a data-dcnode-id="2942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft_Montreal" title="Ubisoft Montreal"><span data-dcnode-id="2943" instrument_node="">Ubisoft Montreal</span></a><span data-dcnode-id="2941" instrument_node=""> titled </span><i data-dcnode-id="2938"><a data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Forgotten_Sands" title="Prince of Persia: The Forgotten Sands"><span data-dcnode-id="2940" instrument_node="">Prince of Persia: The Forgotten Sands</span></a></i><span data-dcnode-id="2937" instrument_node=""> and was released alongside the film; however, the game's story is unrelated to the film, and instead takes place between the first two games in the </span><i data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Sands of Time</span></i><span data-dcnode-id="2934" instrument_node=""> trilogy.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2927" style="white-space:nowrap;"><span data-dcnode-id="2933" instrument_node="">[</span><i data-dcnode-id="2929"><a data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2931" title="This claim needs references to reliable sources. (June 2011)"><span data-dcnode-id="2932" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2928" instrument_node="">]</span></sup><span data-dcnode-id="2926" instrument_node="">
</span></p><span data-dcnode-id="2924" instrument_node="">
</span><h3 data-dcnode-id="2914"><span class="mw-headline" data-dcnode-id="2922" id="Home_media"><span data-dcnode-id="2923" instrument_node="">Home media</span></span><span class="mw-editsection" data-dcnode-id="2915"><span class="mw-editsection-bracket" data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">[</span></span><a data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time_%28film%29%26action%3Dedit%26section%3D9" title="Edit section: Home media"><span data-dcnode-id="2919" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2913" instrument_node="">
</span><p data-dcnode-id="2902"><a data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walt_Disney_Studios_Home_Entertainment" title="Walt Disney Studios Home Entertainment"><span data-dcnode-id="2912" instrument_node="">Walt Disney Studios Home Entertainment</span></a><span data-dcnode-id="2910" instrument_node=""> released a single-disc DVD, a single-disc </span><a class="mw-redirect" data-dcnode-id="2908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blu-ray_Disc" title="Blu-ray Disc"><span data-dcnode-id="2909" instrument_node="">Blu-ray Disc</span></a><span data-dcnode-id="2907" instrument_node="">, and a 3-disc Blu-ray combo-pack in the US on September 14, 2010. The DVD landed in the number one spot on the US DVD sales chart, with 664,041 units sold within the first week and 1,623,361 units in total (equal to $33,941,976) as of March 13, 2011.</span><sup class="reference" data-dcnode-id="2904" id="cite_ref-26"><a data-dcnode-id="2905" href="#cite_note-26"><span data-dcnode-id="2906" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2903" instrument_node="">
</span></p><p data-dcnode-id="2889"><span data-dcnode-id="2901" instrument_node="">In the UK, it opened at number one on the DVD and Blu-ray charts during its first week.</span><sup class="reference" data-dcnode-id="2898" id="cite_ref-27"><a data-dcnode-id="2899" href="#cite_note-27"><span data-dcnode-id="2900" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2897" instrument_node=""> In Germany, too, the DVD landed No. 1 on the </span><a class="mw-redirect" data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Media_Control" title="Media Control"><span data-dcnode-id="2896" instrument_node="">country's DVD chart</span></a><span data-dcnode-id="2894" instrument_node="">.</span><sup class="reference" data-dcnode-id="2891" id="cite_ref-28"><a data-dcnode-id="2892" href="#cite_note-28"><span data-dcnode-id="2893" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2890" instrument_node="">
</span></p><span data-dcnode-id="2888" instrument_node="">
</span><h2 data-dcnode-id="2878"><span class="mw-headline" data-dcnode-id="2886" id="Reception"><span data-dcnode-id="2887" instrument_node="">Reception</span></span><span class="mw-editsection" data-dcnode-id="2879"><span class="mw-editsection-bracket" data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">[</span></span><a data-dcnode-id="2882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time_%28film%29%26action%3Dedit%26section%3D10" title="Edit section: Reception"><span data-dcnode-id="2883" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2877" instrument_node="">
</span><h3 data-dcnode-id="2867"><span class="mw-headline" data-dcnode-id="2875" id="Box_office"><span data-dcnode-id="2876" instrument_node="">Box office</span></span><span class="mw-editsection" data-dcnode-id="2868"><span class="mw-editsection-bracket" data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">[</span></span><a data-dcnode-id="2871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time_%28film%29%26action%3Dedit%26section%3D11" title="Edit section: Box office"><span data-dcnode-id="2872" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2866" instrument_node="">
</span><p data-dcnode-id="2837"><span data-dcnode-id="2865" instrument_node="">The film which—according to Disney and Bruckheimer—was supposed to be "the new </span><i data-dcnode-id="2862"><a data-dcnode-id="2863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pirates_of_the_Caribbean_%28film_series%29" title="Pirates of the Caribbean (film series)"><span data-dcnode-id="2864" instrument_node="">Pirates of the Caribbean</span></a></i><span data-dcnode-id="2861" instrument_node="">", debuted #3 at the U.S. box office behind </span><i data-dcnode-id="2858"><a data-dcnode-id="2859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shrek_Forever_After" title="Shrek Forever After"><span data-dcnode-id="2860" instrument_node="">Shrek Forever After</span></a></i><span data-dcnode-id="2857" instrument_node=""> and </span><i data-dcnode-id="2854"><a data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_and_the_City_2" title="Sex and the City 2"><span data-dcnode-id="2856" instrument_node="">Sex and the City 2</span></a></i><span data-dcnode-id="2853" instrument_node=""> with $30.1 million in its first 3-day weekend of release. It is the third highest opening for a video game adaptation, behind </span><i data-dcnode-id="2850"><a data-dcnode-id="2851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lara_Croft%3A_Tomb_Raider" title="Lara Croft: Tomb Raider"><span data-dcnode-id="2852" instrument_node="">Lara Croft: Tomb Raider</span></a></i><span data-dcnode-id="2849" instrument_node=""> and </span><i data-dcnode-id="2846"><a data-dcnode-id="2847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pok%25C3%25A9mon%3A_The_First_Movie" title="Pokémon: The First Movie"><span data-dcnode-id="2848" instrument_node="">Pokémon: The First Movie</span></a></i><span data-dcnode-id="2845" instrument_node="">. During </span><a data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Memorial_Day" title="Memorial Day"><span data-dcnode-id="2844" instrument_node="">Memorial Day</span></a><span data-dcnode-id="2842" instrument_node="">, it surpassed </span><i data-dcnode-id="2839"><a data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_and_the_City_2" title="Sex and the City 2"><span data-dcnode-id="2841" instrument_node="">Sex and the City 2</span></a></i><span data-dcnode-id="2838" instrument_node=""> to gross $37,813,075 for the 4-day weekend and finish in second place.
</span></p><p data-dcnode-id="2805"><span data-dcnode-id="2836" instrument_node="">Internationally, the film grossed an estimated $18 million in its first weekend (before its US release), when it opened in 19  European countries.</span><sup class="reference" data-dcnode-id="2833" id="cite_ref-29"><a data-dcnode-id="2834" href="#cite_note-29"><span data-dcnode-id="2835" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2832" instrument_node=""> </span><i data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="2829" instrument_node=""> debuted at #1 in these countries, except the United Kingdom where it lost the top spot to </span><i data-dcnode-id="2826"><a data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/StreetDance_3D" title="StreetDance 3D"><span data-dcnode-id="2828" instrument_node="">StreetDance 3D</span></a></i><span data-dcnode-id="2825" instrument_node="">. A week later the film was released in the rest of the world and it grossed an estimated $61.6 million in total from 47 countries and $30.1 million in North America,</span><sup class="reference" data-dcnode-id="2822" id="cite_ref-30"><a data-dcnode-id="2823" href="#cite_note-30"><span data-dcnode-id="2824" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2821" instrument_node=""> becoming the leader of the worldwide box office with $91,695,259, while reaching the #1 spot in 41 of the 47 countries.</span><sup class="reference" data-dcnode-id="2818" id="cite_ref-31"><a data-dcnode-id="2819" href="#cite_note-31"><span data-dcnode-id="2820" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2817" instrument_node=""> The film has ultimately earned $90,759,676 in the United States and Canada and $244,394,967 in other countries, for a total worldwide gross of $335,154,643. The film overtook previous record holder, </span><i data-dcnode-id="2814"><a data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lara_Croft%3A_Tomb_Raider" title="Lara Croft: Tomb Raider"><span data-dcnode-id="2816" instrument_node="">Lara Croft: Tomb Raider</span></a></i><span data-dcnode-id="2813" instrument_node=""> as the highest-grossing </span><a data-dcnode-id="2811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_game" title="Video game"><span data-dcnode-id="2812" instrument_node="">video game</span></a><span data-dcnode-id="2810" instrument_node=""> adaptation of all time, before it was surpassed by </span><i data-dcnode-id="2807"><a data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warcraft_%28film%29" title="Warcraft (film)"><span data-dcnode-id="2809" instrument_node="">Warcraft</span></a></i><span data-dcnode-id="2806" instrument_node=""> in 2016.
</span></p><span data-dcnode-id="2804" instrument_node="">
</span><h3 data-dcnode-id="2794"><span class="mw-headline" data-dcnode-id="2802" id="Critical_response"><span data-dcnode-id="2803" instrument_node="">Critical response</span></span><span class="mw-editsection" data-dcnode-id="2795"><span class="mw-editsection-bracket" data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">[</span></span><a data-dcnode-id="2798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time_%28film%29%26action%3Dedit%26section%3D12" title="Edit section: Critical response"><span data-dcnode-id="2799" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2793" instrument_node="">
</span><p data-dcnode-id="2765"><i data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">Prince of Persia: The Sands of Time</span></i><span data-dcnode-id="2790" instrument_node=""> holds a 37% rating on aggregate review site </span><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rotten_Tomatoes" title="Rotten Tomatoes"><span data-dcnode-id="2789" instrument_node="">Rotten Tomatoes</span></a><span data-dcnode-id="2787" instrument_node=""> based on 229 reviews, with an average score of 5.1/10. The critical consensus is: "It doesn't offer much in the way of substance, but </span><i data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="2784" instrument_node=""> is a suitably entertaining swashbuckler—and a substantial improvement over most video game adaptations."</span><sup class="reference" data-dcnode-id="2781" id="cite_ref-Rotten_Tomatoes_32-0"><a data-dcnode-id="2782" href="#cite_note-Rotten_Tomatoes-32"><span data-dcnode-id="2783" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2780" instrument_node=""> Another review aggregate, </span><a data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metacritic" title="Metacritic"><span data-dcnode-id="2779" instrument_node="">Metacritic</span></a><span data-dcnode-id="2777" instrument_node="">, which calculates an average rating based on reviews from mainstream critics, gave a score of 50/100, indicating "mixed or average reviews".</span><sup class="reference" data-dcnode-id="2774" id="cite_ref-33"><a data-dcnode-id="2775" href="#cite_note-33"><span data-dcnode-id="2776" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2773" instrument_node=""> Audiences polled by </span><a data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CinemaScore" title="CinemaScore"><span data-dcnode-id="2772" instrument_node="">CinemaScore</span></a><span data-dcnode-id="2770" instrument_node=""> gave the film an average grade of "B" on an A+ to F scale.</span><sup class="reference" data-dcnode-id="2767" id="cite_ref-34"><a data-dcnode-id="2768" href="#cite_note-34"><span data-dcnode-id="2769" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2766" instrument_node="">
</span></p><p data-dcnode-id="2742"><i data-dcnode-id="2762"><a data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chicago_Sun-Times" title="Chicago Sun-Times"><span data-dcnode-id="2764" instrument_node="">Chicago Sun-Times</span></a></i><span data-dcnode-id="2761" instrument_node=""> film critic </span><a data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roger_Ebert" title="Roger Ebert"><span data-dcnode-id="2760" instrument_node="">Roger Ebert</span></a><span data-dcnode-id="2758" instrument_node=""> gave the film two stars out of four and wrote, "The two leads are not inspired. Jake Gyllenhaal could make the cover of a muscle mag, but he plays Dastan as if harboring </span><a data-dcnode-id="2756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spider-Man" title="Spider-Man"><span data-dcnode-id="2757" instrument_node="">Spider-Man</span></a><span data-dcnode-id="2755" instrument_node="">'s doubts and insecurities."</span><sup class="reference" data-dcnode-id="2752" id="cite_ref-ebert_35-0"><a data-dcnode-id="2753" href="#cite_note-ebert-35"><span data-dcnode-id="2754" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2751" instrument_node=""> Film critic David Roark of </span><i data-dcnode-id="2748"><a class="mw-redirect" data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Relevant_Magazine" title="Relevant Magazine"><span data-dcnode-id="2750" instrument_node="">Relevant Magazine</span></a></i><span data-dcnode-id="2747" instrument_node="">, on the other hand, gave the film a positive review and wrote: "Newell has unquestionably accomplished what he set out to do, which is ridiculous, silly and forgettable, but amusing nonetheless."</span><sup class="reference" data-dcnode-id="2744" id="cite_ref-36"><a data-dcnode-id="2745" href="#cite_note-36"><span data-dcnode-id="2746" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2743" instrument_node="">
</span></p><span data-dcnode-id="2741" instrument_node="">
</span><h3 data-dcnode-id="2731"><span class="mw-headline" data-dcnode-id="2739" id="Response_from_Gyllenhaal"><span data-dcnode-id="2740" instrument_node="">Response from Gyllenhaal</span></span><span class="mw-editsection" data-dcnode-id="2732"><span class="mw-editsection-bracket" data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">[</span></span><a data-dcnode-id="2735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time_%28film%29%26action%3Dedit%26section%3D13" title="Edit section: Response from Gyllenhaal"><span data-dcnode-id="2736" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2721"><span data-dcnode-id="2729" instrument_node="">In a 2019 interview with </span><a data-dcnode-id="2727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yahoo%21" title="Yahoo!"><span data-dcnode-id="2728" instrument_node="">Yahoo! Entertainment</span></a><span data-dcnode-id="2726" instrument_node="">, Gyllenhaal expressed his regret with the film. "I think I learned a lot from that movie in that I spend a lot of time trying to be very thoughtful about the roles that I pick and why I'm picking them," he said. "And you're bound to slip up and be like, 'That wasn't right for me,' or 'That didn't fit perfectly.' There have been a number of roles like that. And then a number of roles that do."</span><sup class="reference" data-dcnode-id="2723" id="cite_ref-37"><a data-dcnode-id="2724" href="#cite_note-37"><span data-dcnode-id="2725" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2722" instrument_node="">
</span></p><span data-dcnode-id="2720" instrument_node="">
