" aria-label="Review" class="ipc-button ipc-button--single-padding ipc-button--center-align-content ipc-button--default-height ipc-button--core-base ipc-button--theme-base ipc-button--on-accent2 ipc-text-button sc-c76d0c39-0 ihAqbC" data-dcnode-id="630" data-testid="edit-action-button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//contribute.imdb.com/review/tt0437437/add%3Fbus%3Dimdb%26return_url%3Dhttps%253A%252F%252Fwww.imdb.com%252Fclose_me%26site%3Dweb%26ref_%3Dtt_urv_add" role="button" tabindex="0"><svg class="ipc-icon ipc-icon--add ipc-button__icon ipc-button__icon--pre" data-dcnode-id="633" fill="currentColor" height="24" id="iconContext-add" role="presentation" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13h-5v5c0 .55-.45 1-1 1s-1-.45-1-1v-5H6c-.55 0-1-.45-1-1s.45-1 1-1h5V6c0-.55.45-1 1-1s1 .45 1 1v5h5c.55 0 1 .45 1 1s-.45 1-1 1z" data-dcnode-id="634"></path></svg><div class="ipc-button__text" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Review</span></div></a></div><div class="sc-f65f65be-0 ktSkVi" data-dcnode-id="555"><div class="ipc-list-card--border-speech ipc-list-card sc-1201338c-1 SmVod ipc-list-card--base" data-dcnode-id="563"><div class="sc-1201338c-0 ljHBFo" data-dcnode-id="624" data-testid="review-featured-header"><span data-dcnode-id="625"><div class="ipc-signpost ipc-signpost--accent1 ipc-signpost--left-aligned review-top-review" data-dcnode-id="626" role="presentation"><div class="ipc-signpost__text" data-dcnode-id="627" role="presentation"><span data-dcnode-id="628" instrument_node="">Top review</span></div></div></span></div><span data-dcnode-id="623" instrument_node=""> </span><div class="sc-27d2f80b-0 dQWMou" data-dcnode-id="620"><span class="sc-27d2f80b-1 lhyjbj" data-dcnode-id="621" data-testid="review-summary"><span data-dcnode-id="622" instrument_node="">Best Game Ever</span></span></div><div class="ipc-overflowText ipc-overflowText--listCard ipc-overflowText--height-long ipc-overflowText--long ipc-overflowText--base" data-dcnode-id="591" data-testid="review-overflow" role="presentation"><div class="ipc-html-content ipc-html-content--base" data-dcnode-id="596"><div class="ipc-html-content-inner-div" data-dcnode-id="597"><span data-dcnode-id="619" instrument_node="">I have been looking forward to this game since I first completed Sands of Time, and for me, unlike many others, it failed to disappoint. It is definitely better than the Sands of Time, which was a very straightforward game, too easy, and completed within the day.</span><br data-dcnode-id="618"><br data-dcnode-id="617"><span data-dcnode-id="616" instrument_node="">Yes, the Prince has grown up, and he is no longer a boy looking for his father's acceptance. He is not as lovable as the original prince. I do not believe this to be a bad thing, for it truly reflects the story. People who say otherwise either have a completely different opinion, or are too obsessed with the fact that the game isn't "Persian" enough to focus on the actual story.</span><br data-dcnode-id="615"><br data-dcnode-id="614"><span data-dcnode-id="613" instrument_node="">The prince is darker, angrier, and with a definite edge to his personality. This, I found to be very enticing.</span><br data-dcnode-id="612"><br data-dcnode-id="611"><span data-dcnode-id="610" instrument_node="">However, There are a lot of problems with the way characters are dressed. The women in this game are scantily dressed, especially Kailina and Shadhee, who seem to be practically naked apart from their thin garments and very revealing armour. The prince also has a strange armour. Everything except his chest is absolutely wonderful. His chest though...putting it lightly, it looks like he has breasts from certain camera angles.</span><br data-dcnode-id="609"><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node="">The music is amazing, still retaining much of the Arabian style, although others may have missed this due to the strength of the Heavy Metal in the background. It is all a matter of taste, really. Don't like the music? Turn the music off and turn on your stereo. There, problem solved.</span><br data-dcnode-id="606"><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">The graphics are spectacular, letting you see true contrast between the past and "present". However, I regret that the graphics were dumbed down for the PS2 version of the game. Really, this is a game made for the X-Box, since it's that that has a lot of the cool features...although I've only played on the PC and PS2 versions of the game.</span><br data-dcnode-id="603"><br data-dcnode-id="602"><span data-dcnode-id="601" instrument_node="">Fighting, as Ubisoft promised, is breathtaking. However, it is not quite as "free-form" as you might think. I found myself repeating the strongest moves in the game over and over, as I'm sure many others have as well. It is still strongly a free-form fighting system, nonetheless. You just have to learn how to use it.</span><br data-dcnode-id="600"><br data-dcnode-id="599"><span data-dcnode-id="598" instrument_node="">I am definitely looking forward to a sequel. I suggest you go out and buy/rent this game, and see just how much better it is than the Sands of Time, which was undoubtedly good in its own right.</span></div></div><div class="ipc-overflowText-overlay" data-dcnode-id="592"><svg class="ipc-icon ipc-icon--more-horiz ipc-overflowText-overlay__affordance" data-dcnode-id="593" fill="currentColor" height="24" id="iconContext-more-horiz" role="presentation" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h24v24H0V0z" data-dcnode-id="595" fill="none"></path><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" data-dcnode-id="594"></path></svg></div></div><div class="ipc-list-card__actions" data-dcno
