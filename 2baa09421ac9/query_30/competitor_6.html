oad.wikimedia.org/wikipedia/commons/thumb/5/51/Star_full.svg/22px-Star_full.svg.png 2x" width="11"><img alt="" data-dcnode-id="5144" data-file-height="110" data-file-width="108" decoding="async" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Star_full.svg/11px-Star_full.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Star_full.svg/17px-Star_full.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/51/Star_full.svg/22px-Star_full.svg.png 2x" width="11"></span><sup class="reference" data-dcnode-id="5140" id="cite_ref-OPMreview_76-0"><a data-dcnode-id="5141" href="#cite_note-OPMreview-76"><span data-dcnode-id="5142" instrument_node="">[75]</span></a></sup></td><td class="table-na" data-dcnode-id="5137"><span data-dcnode-id="5138" instrument_node="">N/A</span></td></tr><tr data-dcnode-id="5117"><td data-dcnode-id="5131"><a data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Official_Xbox_Magazine" title="Official Xbox Magazine"><i data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">OXM</span></i><span data-dcnode-id="5133" instrument_node=""> (US)</span></a></td><td class="table-na" data-dcnode-id="5129"><span data-dcnode-id="5130" instrument_node="">N/A</span></td><td class="table-na" data-dcnode-id="5127"><span data-dcnode-id="5128" instrument_node="">N/A</span></td><td class="table-na" data-dcnode-id="5125"><span data-dcnode-id="5126" instrument_node="">N/A</span></td><td class="table-na" data-dcnode-id="5123"><span data-dcnode-id="5124" instrument_node="">N/A</span></td><td data-dcnode-id="5118"><span data-dcnode-id="5122" instrument_node="">9.4/10</span><sup class="reference" data-dcnode-id="5119" id="cite_ref-OXMreview_77-0"><a data-dcnode-id="5120" href="#cite_note-OXMreview-77"><span data-dcnode-id="5121" instrument_node="">[76]</span></a></sup></td></tr><tr data-dcnode-id="5098"><td data-dcnode-id="5112"><a data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PC_Gamer" title="PC Gamer"><i data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">PC Gamer</span></i><span data-dcnode-id="5114" instrument_node=""> (US)</span></a></td><td class="table-na" data-dcnode-id="5110"><span data-dcnode-id="5111" instrument_node="">N/A</span></td><td class="table-na" data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">N/A</span></td><td data-dcnode-id="5103"><span data-dcnode-id="5107" instrument_node="">79%</span><sup class="reference" data-dcnode-id="5104" id="cite_ref-78"><a data-dcnode-id="5105" href="#cite_note-78"><span data-dcnode-id="5106" instrument_node="">[77]</span></a></sup></td><td class="table-na" data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">N/A</span></td><td class="table-na" data-dcnode-id="5099"><span data-dcnode-id="5100" instrument_node="">N/A</span></td></tr></tbody></table></div><span data-dcnode-id="5094" instrument_node="">
</span><p data-dcnode-id="5014"><i data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="5091" instrument_node=""> received critical acclaim upon launch. </span><i data-dcnode-id="5088"><a data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edge_%28magazine%29" title="Edge (magazine)"><span data-dcnode-id="5090" instrument_node="">Edge</span></a></i><span data-dcnode-id="5087" instrument_node=""> said that, despite difficulty spikes caused by respawning enemies, "the game cannot be commended highly enough".</span><sup class="reference" data-dcnode-id="5084" id="cite_ref-EdgeReview_8-6"><a data-dcnode-id="5085" href="#cite_note-EdgeReview-8"><span data-dcnode-id="5086" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5083" instrument_node=""> </span><a data-dcnode-id="5081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IGN" title="IGN"><span data-dcnode-id="5082" instrument_node="">IGN</span></a><span data-dcnode-id="5080" instrument_node="">'s Matt Casamassina found the entire experience enjoyable, saying that "Whether you're a diehard </span><i data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="5077" instrument_node=""> fan or somebody with a mild interest in action-adventures, </span><i data-dcnode-id="5075"><span data-dcnode-id="5076" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="5074" instrument_node=""> is a must own -- a soon-to-be-classic worthy of a permanent place in your collection".</span><sup class="reference" data-dcnode-id="5071" id="cite_ref-IGNPS2_5-3"><a data-dcnode-id="5072" href="#cite_note-IGNPS2-5"><span data-dcnode-id="5073" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5070" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="5068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1UP.com" title="1UP.com"><span data-dcnode-id="5069" instrument_node="">1UP.com</span></a><span data-dcnode-id="5067" instrument_node="">, while pointing out the camera control as "tricky", said that the game "will make your chest explode if you've got a heart condition (in a good way, of course)".</span><sup class="reference" data-dcnode-id="5064" id="cite_ref-1UPreview_44-1"><a data-dcnode-id="5065" href="#cite_note-1UPreview-44"><span data-dcnode-id="5066" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5063" instrument_node=""> </span><a data-dcnode-id="5061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GameSpot" title="GameSpot"><span data-dcnode-id="5062" instrument_node="">GameSpot</span></a><span data-dcnode-id="5060" instrument_node="">'s Greg Kasavin called it "a game that can be recommended wholeheartedly",</span><sup class="reference" data-dcnode-id="5057" id="cite_ref-GSps2_7-3"><a data-dcnode-id="5058" href="#cite_note-GSps2-7"><span data-dcnode-id="5059" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5056" instrument_node=""> and the publication named it the best game of November 2003 for GameCube, PlayStation 2 and Xbox.</span><sup class="reference" data-dcnode-id="5053" id="cite_ref-gotm2_84-0"><a data-dcnode-id="5054" href="#cite_note-gotm2-84"><span data-dcnode-id="5055" instrument_node="">[83]</span></a></sup><span data-dcnode-id="5052" instrument_node=""> Both </span><a data-dcnode-id="5050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eurogamer" title="Eurogamer"><span data-dcnode-id="5051" instrument_node="">Eurogamer</span></a><span data-dcnode-id="5049" instrument_node=""> and </span><i data-dcnode-id="5046"><a class="mw-redirect" data-dcnode-id="5047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Official_US_PlayStation_Magazine" title="Official US PlayStation Magazine"><span data-dcnode-id="5048" instrument_node="">Official PlayStation Magazine</span></a></i><span data-dcnode-id="5045" instrument_node=""> positively compared the game's aesthetics and presentation to </span><i data-dcnode-id="5042"><a data-dcnode-id="5043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ico" title="Ico"><span data-dcnode-id="5044" instrument_node="">Ico</span></a></i><span data-dcnode-id="5041" instrument_node="">.</span><sup class="reference" data-dcnode-id="5038" id="cite_ref-EuroPS2_49-1"><a data-dcnode-id="5039" href="#cite_note-EuroPS2-49"><span data-dcnode-id="5040" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="5035" id="cite_ref-OPMreview_76-1"><a data-dcnode-id="5036" href="#cite_note-OPMreview-76"><span data-dcnode-id="5037" instrument_node="">[75]</span></a></sup><span data-dcnode-id="5034" instrument_node=""> Francesca Reyes of </span><i data-dcnode-id="5031"><a data-dcnode-id="5032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Official_Xbox_Magazine" title="Official Xbox Magazine"><span data-dcnode-id="5033" instrument_node="">Official Xbox Magazine</span></a></i><span data-dcnode-id="5030" instrument_node=""> gave the game a good review, praising the story and general gameplay, but finding the combat difficult at times and lack of new skills. In closing, she praised the game's lasting appeal: "When the whole thing is over, it's perfectly timed to leave you wanting more. It's a stunning and rare achievement that makes you feel happy to be a gamer."</span><sup class="reference" data-dcnode-id="5027" id="cite_ref-OXMreview_77-1"><a data-dcnode-id="5028" href="#cite_note-OXMreview-77"><span data-dcnode-id="5029" instrument_node="">[76]</span></a></sup><span data-dcnode-id="5026" instrument_node=""> Japanese gaming magazine </span><i data-dcnode-id="5023"><a data-dcnode-id="5024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Famitsu" title="Famitsu"><span data-dcnode-id="5025" instrument_node="">Famitsu</span></a></i><span data-dcnode-id="5022" instrument_node=""> gave the PS2 version a good review, saying that the action was smooth and challenging, bearing similarities to the original </span><i data-dcnode-id="5020"><span data-dcnode-id="5021" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="5019" instrument_node="">, and one reviewer found the Prince "colourful".</span><sup class="reference" data-dcnode-id="5016" id="cite_ref-FamReview_57-1"><a data-dcnode-id="5017" href="#cite_note-FamReview-57"><span data-dcnode-id="5018" instrument_node="">[56]</span></a></sup><span data-dcnode-id="5015" instrument_node="">
</span></p><p data-dcnode-id="4967"><span data-dcnode-id="5013" instrument_node="">The PC version shared much of the console version's praise, but the controls and responsiveness of the camera caused criticism.</span><sup class="reference" data-dcnode-id="5010" id="cite_ref-1UPpc_45-1"><a data-dcnode-id="5011" href="#cite_note-1UPpc-45"><span data-dcnode-id="5012" instrument_node="">[44]</span></a></sup><sup class="reference" data-dcnode-id="5007" id="cite_ref-GSpc_62-1"><a data-dcnode-id="5008" href="#cite_note-GSpc-62"><span data-dcnode-id="5009" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="5004" id="cite_ref-IGNPC_70-1"><a data-dcnode-id="5005" href="#cite_note-IGNPC-70"><span data-dcnode-id="5006" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5003" instrument_node=""> The Game Boy Advance version garnered lower scores than the console and PC versions due to its scaled-down gameplay and presentation, but was still generally praised as a competent port of the game.</span><sup class="reference" data-dcnode-id="5000" id="cite_ref-GSgba_9-2"><a data-dcnode-id="5001" href="#cite_note-GSgba-9"><span data-dcnode-id="5002" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="4997" id="cite_ref-GBAgamespy_54-1"><a data-dcnode-id="4998" href="#cite_note-GBAgamespy-54"><span data-dcnode-id="4999" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="4994" id="cite_ref-GIgba_60-1"><a data-dcnode-id="4995" href="#cite_note-GIgba-60"><span data-dcnode-id="4996" instrument_node="">[59]</span></a></sup><sup class="reference" data-dcnode-id="4991" id="cite_ref-GZgba_68-1"><a data-dcnode-id="4992" href="#cite_note-GZgba-68"><span data-dcnode-id="4993" instrument_node="">[67]</span></a></sup><sup class="reference" data-dcnode-id="4988" id="cite_ref-GBAign_73-1"><a data-dcnode-id="4989" href="#cite_note-GBAign-73"><span data-dcnode-id="4990" instrument_node="">[72]</span></a></sup><span data-dcnode-id="4987" instrument_node=""> </span><i data-dcnode-id="4984"><a data-dcnode-id="4985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nintendo_Power" title="Nintendo Power"><span data-dcnode-id="4986" instrument_node="">Nintendo Power</span></a></i><span data-dcnode-id="4983" instrument_node=""> said that "Acrobatic moves and inventive traps have never been as free-flowing as they are in [</span><i data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="4980" instrument_node="">]".</span><sup class="reference" data-dcnode-id="4977" id="cite_ref-NPgba_74-1"><a data-dcnode-id="4978" href="#cite_note-NPgba-74"><span data-dcnode-id="4979" instrument_node="">[73]</span></a></sup><span data-dcnode-id="4976" instrument_node=""> Reviewing the mobile version, IGN reviewer Levi Buchanan was impressed by the company's adaptation of the console game's basic actions and atmosphere, giving it a score of 9.5 out of 10.</span><sup class="reference" data-dcnode-id="4973" id="cite_ref-IGNmobile_31-1"><a data-dcnode-id="4974" href="#cite_note-IGNmobile-31"><span data-dcnode-id="4975" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4972" instrument_node=""> 1UP reviewer Corey Padnos was pleased with the Prince's acrobatic performance and the game's general performance, while lamenting the lack of the time-based mechanics of the main games and the lack of plot.</span><sup class="reference" data-dcnode-id="4969" id="cite_ref-1UPmobile_10-1"><a data-dcnode-id="4970" href="#cite_note-1UPmobile-10"><span data-dcnode-id="4971" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4968" instrument_node="">
</span></p><p data-dcnode-id="4930"><span data-dcnode-id="4966" instrument_node="">At E3 2003, </span><i data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="4963" instrument_node=""> was named as "Game of the Year".</span><sup class="reference" data-dcnode-id="4960" id="cite_ref-85"><a data-dcnode-id="4961" href="#cite_note-85"><span data-dcnode-id="4962" instrument_node="">[84]</span></a></sup><span data-dcnode-id="4959" instrument_node=""> The game was named as Editor's Choice by GameSpot and IGN.</span><sup class="reference" data-dcnode-id="4956" id="cite_ref-IGNPS2_5-4"><a data-dcnode-id="4957" href="#cite_note-IGNPS2-5"><span data-dcnode-id="4958" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="4953" id="cite_ref-GSps2_7-4"><a data-dcnode-id="4954" href="#cite_note-GSps2-7"><span data-dcnode-id="4955" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4952" instrument_node=""> At the 2003 </span><a data-dcnode-id="4950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Game_Critics_Awards" title="Game Critics Awards"><span data-dcnode-id="4951" instrument_node="">Game Critics Awards</span></a><span data-dcnode-id="4949" instrument_node="">, the game was awarded as "Best Action/Adventure Game".</span><sup class="reference" data-dcnode-id="4946" id="cite_ref-86"><a data-dcnode-id="4947" href="#cite_note-86"><span data-dcnode-id="4948" instrument_node="">[85]</span></a></sup><span data-dcnode-id="4945" instrument_node=""> The </span><a data-dcnode-id="4943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academy_of_Interactive_Arts_%2526_Sciences" title="Academy of Interactive Arts &amp; Sciences"><span data-dcnode-id="4944" instrument_node="">Academy of Interactive Arts &amp; Sciences</span></a><span data-dcnode-id="4942" instrument_node="">, at its meeting in 2004, recognised the game as "Console Game of the Year", "Console Platform Action Adventure Game of the Year", and "Computer Action/Adventure Game of the Year". It was also awarded for "Outstanding Innovation in Computer Gaming", "Outstanding Achievement in Game Design", "Outstanding Achievement in Visual Engineering", "Outstanding Achievement in Animation", and "Outstanding Achievement in Game Play Engineering".</span><sup class="reference" data-dcnode-id="4939" id="cite_ref-87"><a data-dcnode-id="4940" href="#cite_note-87"><span data-dcnode-id="4941" instrument_node="">[86]</span></a></sup><span data-dcnode-id="4938" instrument_node=""> At the 2004 </span><a data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Game_Developers_Choice_Awards" title="Game Developers Choice Awards"><span data-dcnode-id="4937" instrument_node="">Game Developers Choice Awards</span></a><span data-dcnode-id="4935" instrument_node="">, the game won the "Excellence in Game Design" and "Excellence in Programming" awards. It was also nominated in the "Game of the Year" and "Excellence in Visual Arts" categories.</span><sup class="reference" data-dcnode-id="4932" id="cite_ref-88"><a data-dcnode-id="4933" href="#cite_note-88"><span data-dcnode-id="4934" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4931" instrument_node="">
</span></p><p data-dcnode-id="4894"><span data-dcnode-id="4929" instrument_node="">In 2009, </span><i data-dcnode-id="4926"><a data-dcnode-id="4927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Official_Nintendo_Magazine" title="Official Nintendo Magazine"><span data-dcnode-id="4928" instrument_node="">Official Nintendo Magazine</span></a></i><span data-dcnode-id="4925" instrument_node=""> ranked it the 86th best game available on Nintendo platforms. The staff praised the developer's successful transition from 2D to 3D.</span><sup class="reference" data-dcnode-id="4922" id="cite_ref-89"><a data-dcnode-id="4923" href="#cite_note-89"><span data-dcnode-id="4924" instrument_node="">[88]</span></a></sup><span data-dcnode-id="4921" instrument_node=""> IGN and </span><i data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">Edge</span></i><span data-dcnode-id="4918" instrument_node=""> both named it among their 100 greatest games of all time in 2005 and 2007 respectively.</span><sup class="reference" data-dcnode-id="4915" id="cite_ref-90"><a data-dcnode-id="4916" href="#cite_note-90"><span data-dcnode-id="4917" instrument_node="">[89]</span></a></sup><sup class="reference" data-dcnode-id="4912" id="cite_ref-91"><a data-dcnode-id="4913" href="#cite_note-91"><span data-dcnode-id="4914" instrument_node="">[90]</span></a></sup><span data-dcnode-id="4911" instrument_node=""> </span><i data-dcnode-id="4908"><a data-dcnode-id="4909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer_and_Video_Games" title="Computer and Video Games"><span data-dcnode-id="4910" instrument_node="">Computer and Video Games</span></a></i><span data-dcnode-id="4907" instrument_node=""> placed it in its 2007 list of the 101 best PC games ever.</span><sup class="reference" data-dcnode-id="4904" id="cite_ref-92"><a data-dcnode-id="4905" href="#cite_note-92"><span data-dcnode-id="4906" instrument_node="">[91]</span></a></sup><span data-dcnode-id="4903" instrument_node=""> In 2010, </span><i data-dcnode-id="4900"><a data-dcnode-id="4901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GamePro" title="GamePro"><span data-dcnode-id="4902" instrument_node="">GamePro</span></a></i><span data-dcnode-id="4899" instrument_node=""> chose it as the 13th best PS2 game of all time.</span><sup class="reference" data-dcnode-id="4896" id="cite_ref-93"><a data-dcnode-id="4897" href="#cite_note-93"><span data-dcnode-id="4898" instrument_node="">[92]</span></a></sup><span data-dcnode-id="4895" instrument_node="">
</span></p><span data-dcnode-id="4893" instrument_node="">
</span><h2 data-dcnode-id="4883"><span class="mw-headline" data-dcnode-id="4891" id="Legacy"><span data-dcnode-id="4892" instrument_node="">Legacy</span></span><span class="mw-editsection" data-dcnode-id="4884"><span class="mw-editsection-bracket" data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">[</span></span><a data-dcnode-id="4887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time%26action%3Dedit%26section%3D10" title="Edit section: Legacy"><span data-dcnode-id="4888" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4885"><span data-dcnode-id="4886" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4882" instrument_node="">
</span><p data-dcnode-id="4814"><span data-dcnode-id="4881" instrument_node="">The year after the game's release, the game was featured in an episode of </span><i data-dcnode-id="4878"><a data-dcnode-id="4879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/How_It%2527s_Made" title="How It's Made"><span data-dcnode-id="4880" instrument_node="">How It's Made</span></a></i><span data-dcnode-id="4877" instrument_node="">, in a segment dedicated to video game production.</span><sup class="reference" data-dcnode-id="4874" id="cite_ref-HITepisode_23-1"><a data-dcnode-id="4875" href="#cite_note-HITepisode-23"><span data-dcnode-id="4876" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4873" instrument_node=""> The game has been cited as the reason why the </span><i data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="4870" instrument_node=""> series, formerly ignored after </span><i data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">Prince of Persia 3D</span></i><span data-dcnode-id="4867" instrument_node="">, returned to prominence in the gaming world.</span><sup class="reference" data-dcnode-id="4864" id="cite_ref-PrinceAfterword_6-5"><a data-dcnode-id="4865" href="#cite_note-PrinceAfterword-6"><span data-dcnode-id="4866" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="4861" id="cite_ref-IGNhistory_18-3"><a data-dcnode-id="4862" href="#cite_note-IGNhistory-18"><span data-dcnode-id="4863" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="4858" id="cite_ref-Edge100_39-1"><a data-dcnode-id="4859" href="#cite_note-Edge100-39"><span data-dcnode-id="4860" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4857" instrument_node=""> In 2004, Mechner began work on a </span><a data-dcnode-id="4855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Sands_of_Time_%28film%29" title="Prince of Persia: The Sands of Time (film)"><span data-dcnode-id="4856" instrument_node="">film adaptation</span></a><span data-dcnode-id="4854" instrument_node="">, produced by </span><a data-dcnode-id="4852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerry_Bruckheimer" title="Jerry Bruckheimer"><span data-dcnode-id="4853" instrument_node="">Jerry Bruckheimer</span></a><span data-dcnode-id="4851" instrument_node="">. The film was eventually released in 2010.</span><sup class="reference" data-dcnode-id="4848" id="cite_ref-PrinceMovie_94-0"><a data-dcnode-id="4849" href="#cite_note-PrinceMovie-94"><span data-dcnode-id="4850" instrument_node="">[93]</span></a></sup><span data-dcnode-id="4847" instrument_node=""> The success of the game prompted immediate development on a sequel. Titled </span><i data-dcnode-id="4844"><a data-dcnode-id="4845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_Warrior_Within" title="Prince of Persia: Warrior Within"><span data-dcnode-id="4846" instrument_node="">Prince of Persia: Warrior Within</span></a></i><span data-dcnode-id="4843" instrument_node="">, the game was made aesthetically darker by the team. It released in November 2004.</span><sup class="reference" data-dcnode-id="4840" id="cite_ref-IGNhistory_18-4"><a data-dcnode-id="4841" href="#cite_note-IGNhistory-18"><span data-dcnode-id="4842" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="4837" id="cite_ref-IGNwarrior_95-0"><a data-dcnode-id="4838" href="#cite_note-IGNwarrior-95"><span data-dcnode-id="4839" instrument_node="">[94]</span></a></sup><span data-dcnode-id="4836" instrument_node=""> Several further sequels set in the continuity of </span><i data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="4833" instrument_node=""> followed.</span><sup class="reference" data-dcnode-id="4830" id="cite_ref-IGNhistory_18-5"><a data-dcnode-id="4831" href="#cite_note-IGNhistory-18"><span data-dcnode-id="4832" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4829" instrument_node=""> Aspects of its design, such as the relationship between the Prince and Farah, later provided inspiration for the </span><a data-dcnode-id="4827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia_%282008_video_game%29" title="Prince of Persia (2008 video game)"><span data-dcnode-id="4828" instrument_node="">2008 series reboot</span></a><span data-dcnode-id="4826" instrument_node="">.</span><sup class="reference" data-dcnode-id="4823" id="cite_ref-MattesPrima_96-0"><a data-dcnode-id="4824" href="#cite_note-MattesPrima-96"><span data-dcnode-id="4825" instrument_node="">[95]</span></a></sup><span data-dcnode-id="4822" instrument_node=""> </span><i data-dcnode-id="4820"><span data-dcnode-id="4821" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="4819" instrument_node=""> incorporates facets of its gameplay, such as save points and game overs, into the context of said gameplay recreating past experiences, which has been subject to recognition.</span><sup class="reference" data-dcnode-id="4816" id="cite_ref-:0_97-0"><a data-dcnode-id="4817" href="#cite_note-:0-97"><span data-dcnode-id="4818" instrument_node="">[96]</span></a></sup><span data-dcnode-id="4815" instrument_node="">
</span></p><p data-dcnode-id="4772"><span data-dcnode-id="4813" instrument_node="">The </span><i data-dcnode-id="4810"><a data-dcnode-id="4811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassin%2527s_Creed" title="Assassin's Creed"><span data-dcnode-id="4812" instrument_node="">Assassin's Creed</span></a></i><span data-dcnode-id="4809" instrument_node=""> series originated out of ideas for a sequel for </span><i data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">Prince of Persia: The Sands of Time</span></i><span data-dcnode-id="4806" instrument_node="">. Its critical and financial success led Ubisoft to request </span><a data-dcnode-id="4804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft_Montreal" title="Ubisoft Montreal"><span data-dcnode-id="4805" instrument_node="">Ubisoft Montreal</span></a><span data-dcnode-id="4803" instrument_node=""> to develop a sequel, aiming for the </span><a data-dcnode-id="4801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seventh_generation_of_video_game_consoles" title="Seventh generation of video game consoles"><span data-dcnode-id="4802" instrument_node="">next console generation</span></a><span data-dcnode-id="4800" instrument_node="">. The Ubisoft Montreal team decided on taking the gameplay from </span><i data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="4797" instrument_node=""> into an </span><a data-dcnode-id="4795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_world" title="Open world"><span data-dcnode-id="4796" instrument_node="">open world</span></a><span data-dcnode-id="4794" instrument_node=""> approach, taking advantage of the improved processing power to render larger spaces and crowds. Narratively, the team wanted to move away from the Prince simply being someone next in line for the throne but to have to work for it; combined with research into secret societies led them to focus on the </span><a data-dcnode-id="4792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Order_of_Assassins" title="Order of Assassins"><span data-dcnode-id="4793" instrument_node="">Assassins</span></a><span data-dcnode-id="4791" instrument_node="">, heavily borrowing from the novel </span><i data-dcnode-id="4788"><a data-dcnode-id="4789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alamut_%28Bartol_novel%29" title="Alamut (Bartol novel)"><span data-dcnode-id="4790" instrument_node="">Alamut</span></a></i><span data-dcnode-id="4787" instrument_node="">.</span><sup class="reference" data-dcnode-id="4784" id="cite_ref-polygon_oral_98-0"><a data-dcnode-id="4785" href="#cite_note-polygon_oral-98"><span data-dcnode-id="4786" instrument_node="">[97]</span></a></sup><span data-dcnode-id="4783" instrument_node=""> They developed a narrative where the player would control an Assassin that served as a bodyguard for a non-playable Prince, leading them to call this game </span><i data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">Prince of Persia: Assassin</span></i><span data-dcnode-id="4780" instrument_node="">. The "Animus" device allowed them to explain certain facets of gameplay, such as accounting when the player fails a mission, in the same way they had done in </span><i data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="4777" instrument_node="">.</span><sup class="reference" data-dcnode-id="4774" id="cite_ref-polygon_oral_98-1"><a data-dcnode-id="4775" href="#cite_note-polygon_oral-98"><span data-dcnode-id="4776" instrument_node="">[97]</span></a></sup><span data-dcnode-id="4773" instrument_node="">
</span></p><p data-dcnode-id="4745"><i data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">Prince of Persia: The Sands of Time</span></i><span data-dcnode-id="4769" instrument_node=""> pioneered a rhythmic, free-flow style of melee combat that later inspired the combat systems of numerous video games, such as the </span><i data-dcnode-id="4767"><span data-dcnode-id="4768" instrument_node="">Assassin's Creed</span></i><span data-dcnode-id="4766" instrument_node=""> series, the </span><i data-dcnode-id="4763"><a data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Batman%3A_Arkham" title="Batman: Arkham"><span data-dcnode-id="4765" instrument_node="">Batman: Arkham</span></a></i><span data-dcnode-id="4762" instrument_node=""> series, </span><i data-dcnode-id="4759"><a data-dcnode-id="4760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle-earth%3A_Shadow_of_Mordor" title="Middle-earth: Shadow of Mordor"><span data-dcnode-id="4761" instrument_node="">Middle-earth: Shadow of Mordor</span></a></i><span data-dcnode-id="4758" instrument_node=""> (2014), </span><i data-dcnode-id="4755"><a data-dcnode-id="4756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mad_Max_%282015_video_game%29" title="Mad Max (2015 video game)"><span data-dcnode-id="4757" instrument_node="">Mad Max</span></a></i><span data-dcnode-id="4754" instrument_node=""> (2015), and </span><i data-dcnode-id="4751"><a data-dcnode-id="4752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spider-Man_%282018_video_game%29" title="Spider-Man (2018 video game)"><span data-dcnode-id="4753" instrument_node="">Spider-Man</span></a></i><span data-dcnode-id="4750" instrument_node=""> (2018).</span><sup class="reference" data-dcnode-id="4747" id="cite_ref-99"><a data-dcnode-id="4748" href="#cite_note-99"><span data-dcnode-id="4749" instrument_node="">[98]</span></a></sup><span data-dcnode-id="4746" instrument_node="">
</span></p><span data-dcnode-id="4744" instrument_node="">
</span><h3 data-dcnode-id="4734"><span class="mw-headline" data-dcnode-id="4742" id="Remake"><span data-dcnode-id="4743" instrument_node="">Remake</span></span><span class="mw-editsection" data-dcnode-id="4735"><span class="mw-editsection-bracket" data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">[</span></span><a data-dcnode-id="4738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time%26action%3Dedit%26section%3D11" title="Edit section: Remake"><span data-dcnode-id="4739" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4733" instrument_node="">
</span><p data-dcnode-id="4689"><span data-dcnode-id="4732" instrument_node="">A remake of the game was announced at Ubisoft Forward 2020 and was originally scheduled to release on 21 January, 2021, for Microsoft Windows, </span><a data-dcnode-id="4730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PlayStation_4" title="PlayStation 4"><span data-dcnode-id="4731" instrument_node="">PlayStation 4</span></a><span data-dcnode-id="4729" instrument_node=""> and </span><a data-dcnode-id="4727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xbox_One" title="Xbox One"><span data-dcnode-id="4728" instrument_node="">Xbox One</span></a><span data-dcnode-id="4726" instrument_node="">. The game is being developed by Indian studios Ubisoft Mumbai and Ubisoft Pune.</span><sup class="reference" data-dcnode-id="4723" id="cite_ref-100"><a data-dcnode-id="4724" href="#cite_note-100"><span data-dcnode-id="4725" instrument_node="">[99]</span></a></sup><span data-dcnode-id="4722" instrument_node=""> The announcement trailer drew criticism from fans who considered the game's graphics to be lackluster, particularly as it was being developed using the newest iteration of </span><a data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft_Anvil" title="Ubisoft Anvil"><span data-dcnode-id="4721" instrument_node="">Ubisoft Anvil</span></a><span data-dcnode-id="4719" instrument_node="">. Ubisoft responded by stating that the visual style was an intentional choice, as they had wanted it to be "unique [...] to make this game standout from other games" due to its fantasy elements.</span><sup class="reference" data-dcnode-id="4716" id="cite_ref-101"><a data-dcnode-id="4717" href="#cite_note-101"><span data-dcnode-id="4718" instrument_node="">[100]</span></a></sup><sup class="reference" data-dcnode-id="4713" id="cite_ref-102"><a data-dcnode-id="4714" href="#cite_note-102"><span data-dcnode-id="4715" instrument_node="">[101]</span></a></sup><sup class="reference" data-dcnode-id="4710" id="cite_ref-103"><a data-dcnode-id="4711" href="#cite_note-103"><span data-dcnode-id="4712" instrument_node="">[102]</span></a></sup><span data-dcnode-id="4709" instrument_node=""> The release of the game was initially delayed by Ubisoft to 18 March, 2021,</span><sup class="reference" data-dcnode-id="4706" id="cite_ref-104"><a data-dcnode-id="4707" href="#cite_note-104"><span data-dcnode-id="4708" instrument_node="">[103]</span></a></sup><span data-dcnode-id="4705" instrument_node=""> before being postponed indefinitely to "deliver a remake that feels fresh while remaining faithful to the original."</span><sup class="reference" data-dcnode-id="4702" id="cite_ref-105"><a data-dcnode-id="4703" href="#cite_note-105"><span data-dcnode-id="4704" instrument_node="">[104]</span></a></sup><sup class="reference" data-dcnode-id="4699" id="cite_ref-106"><a data-dcnode-id="4700" href="#cite_note-106"><span data-dcnode-id="4701" instrument_node="">[105]</span></a></sup><span data-dcnode-id="4698" instrument_node=""> In its quarterly financial report of 2021, Ubisoft stated the game is expected to be out during its 2022–2023 fiscal year.</span><sup class="reference" data-dcnode-id="4695" id="cite_ref-107"><a data-dcnode-id="4696" href="#cite_note-107"><span data-dcnode-id="4697" instrument_node="">[106]</span></a></sup><span data-dcnode-id="4694" instrument_node=""> In May 2022, Ubisoft announced that Ubisoft Montreal was taking over development of the remake.</span><sup class="reference" data-dcnode-id="4691" id="cite_ref-108"><a data-dcnode-id="4692" href="#cite_note-108"><span data-dcnode-id="4693" instrument_node="">[107]</span></a></sup><span data-dcnode-id="4690" instrument_node="">
</span></p><span data-dcnode-id="4688" instrument_node="">

-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">g</span></b></i></sup></a><span data-dcnode-id="4103" instrument_node=""> </span><a data-dcnode-id="4098" href="#cite_ref-SoTwriting_12-7"><sup data-dcnode-id="4099"><i data-dcnode-id="4100"><b data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">h</span></b></i></sup></a></span><span data-dcnode-id="4096" instrument_node=""> </span><span class="reference-text" data-dcnode-id="4077"><link data-dcnode-id="4095" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation web cs1" data-dcnode-id="4079" id="CITEREFMechner,_Jordan2008"><a data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan_Mechner" title="Jordan Mechner"><span data-dcnode-id="4094" instrument_node="">Mechner, Jordan</span></a><span data-dcnode-id="4092" instrument_node=""> (22 February 2008). </span><a class="external text" data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.electronicbookreview.com/thread/firstperson/pop-friendly" rel="nofollow"><span data-dcnode-id="4091" instrument_node="">"The Sands of Time: Crafting a Video Game Story"</span></a><span data-dcnode-id="4089" instrument_node="">. Electronic Book Review. </span><a class="external text" data-dcnode-id="4087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20141216002040/http%3A//www.electronicbookreview.com/thread/firstperson/pop-friendly" rel="nofollow"><span data-dcnode-id="4088" instrument_node="">Archived</span></a><span data-dcnode-id="4086" instrument_node=""> from the original on 16 December 2014</span><span class="reference-accessdate" data-dcnode-id="4081"><span data-dcnode-id="4085" instrument_node="">. Retrieved </span><span class="nowrap" data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">25 June</span></span><span data-dcnode-id="4082" instrument_node=""> 2015</span></span><span data-dcnode-id="4080" instrument_node="">.</span></cite><span class="Z3988" data-dcnode-id="4078" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=unknown&amp;rft.btitle=The+Sands+of+Time%3A+Crafting+a+Video+Game+Story&amp;rft.pub=Electronic+Book+Review&amp;rft.date=2008-02-22&amp;rft.au=Mechner%2C+Jordan&amp;rft_id=http%3A%2F%2Fwww.electronicbookreview.com%2Fthread%2Ffirstperson%2Fpop-friendly&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APrince+of+Persia%3A+The+Sands+of+Time"></span></span><span data-dcnode-id="4076" instrument_node="">

</span><li data-dcnode-id="4028" id="cite_note-13"><span class="mw-cite-backlink" data-dcnode-id="4070"><b data-dcnode-id="4071"><a aria-label="Jump up" data-dcnode-id="4072" href="#cite_ref-13" title="Jump up"><span data-dcnode-id="4073" instrument_node="">^</span></a></b></span><span data-dcnode-id="4069" instrument_node=""> </span><span class="reference-text" data-dcnode-id="4030"><link data-dcnode-id="4068" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation book cs1" data-dcnode-id="4032" id="CITEREFUbisoft_Montreal2003"><a data-dcnode-id="4066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft_Montreal" title="Ubisoft Montreal"><span data-dcnode-id="4067" instrument_node="">Ubisoft Montreal</span></a><span data-dcnode-id="4065" instrument_node=""> (6 November 2003). </span><i data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">Prince of Persia: The Sands of Time</span></i><span data-dcnode-id="4062" instrument_node=""> (Multiple). </span><a data-dcnode-id="4060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft" title="Ubisoft"><span data-dcnode-id="4061" instrument_node="">Ubisoft</span></a><span data-dcnode-id="4059" instrument_node="">. </span><q data-dcnode-id="4033"><span data-dcnode-id="4058" instrument_node="">[</span><i data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">Farah attempts to pick up the Dagger from the floor. The Prince grabs it.</span></i><span data-dcnode-id="4055" instrument_node="">] </span><b data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">Prince</span></b><span data-dcnode-id="4052" instrument_node="">: So, this is the thanks I get for saving your life. / </span><b data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">Farah</span></b><span data-dcnode-id="4049" instrument_node="">: You don't understand. I need that dagger to undo.. / </span><b data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Prince</span></b><span data-dcnode-id="4046" instrument_node="">: "To undo what I have done." Truly you must think I am a fool. / </span><b data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">Farah</span></b><span data-dcnode-id="4043" instrument_node="">: You are right to be cautious, but fight as bravely as you may, you cannot defeat this enemy. The Sands will spread. They will consume... everything. I have heard it said that you are kind, as well as brave. Please believe me. We must find the hourglass. / </span><b data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">Prince</span></b><span data-dcnode-id="4040" instrument_node="">: It is in the Sultan's treasure vault, atop the Tower of Dawn. / </span><b data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">Farah</span></b><span data-dcnode-id="4037" instrument_node="">: How do you know that? / </span><b data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">Prince</span></b><span data-dcnode-id="4034" instrument_node="">: Come with me then, if you insist. But I warn you, I move pretty fast.</span></q></cite><span class="Z3988" data-dcnode-id="4031" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=book&amp;rft.btitle=Prince+of+Persia%3A+The+Sands+of+Time&amp;rft.pub=Ubisoft&amp;rft.date=2003-11-06&amp;rft.au=Ubisoft+Montreal&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APrince+of+Persia%3A+The+Sands+of+Time"></span></span><span data-dcnode-id="4029" instrument_node="">

001"><span data-dcnode-id="4002" instrument_node="">Farah</span></b><span data-dcnode-id="4000" instrument_node="">: What? / </span><b data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">Prince</span></b><span data-dcnode-id="3997" instrument_node="">: You have every reason to hate me. / </span><b data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">Farah</span></b><span data-dcnode-id="3994" instrument_node="">: What are you talking about? / </span><b data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">Prince</span></b><span data-dcnode-id="3991" instrument_node="">: Now you want me to trust you?</span></q></cite><span class="Z3988" data-dcnode-id="3988" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=book&amp;rft.btitle=Prince+of+Persia%3A+The+Sands+of+Time&amp;rft.pub=Ubisoft&amp;rft.date=2003-11-06&amp;rft.au=Ubisoft+Montreal&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APrince+of+Persia%3A+The+Sands+of+Time"></span></span><span data-dcnode-id="3986" instrument_node="">
</span></li><span data-dcnode-id="3984" instrument_node="">

e=Prince+of+Persia%3A+The+Sands+of+Time&amp;rft.pub=Ubisoft&amp;rft.date=2003-11-06&amp;rft.au=Ubisoft+Montreal&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APrince+of+Persia%3A+The+Sands+of+Time"></span></span><span data-dcnode-id="3958" instrument_node="">

</span><li data-dcnode-id="3917" id="cite_note-16"><span class="mw-cite-backlink" data-dcnode-id="3952"><b data-dcnode-id="3953"><a aria-label="Jump up" data-dcnode-id="3954" href="#cite_ref-16" title="Jump up"><span data-dcnode-id="3955" instrument_node="">^</span></a></b></span><span data-dcnode-id="3951" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3919"><link data-dcnode-id="3950" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation book cs1" data-dcnode-id="3921" id="CITEREFUbisoft_Montreal2003"><a data-dcnode-id="3948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft_Montreal" title="Ubisoft Montreal"><span data-dcnode-id="3949" instrument_node="">Ubisoft Montreal</span></a><span data-dcnode-id="3947" instrument_node=""> (6 November 2003). </span><i data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">Prince of Persia: The Sands of Time</span></i><span data-dcnode-id="3944" instrument_node=""> (Multiple). </span><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft" title="Ubisoft"><span data-dcnode-id="3943" instrument_node="">Ubisoft</span></a><span data-dcnode-id="3941" instrument_node="">. </span><q data-dcnode-id="3922"><b data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">Farah</span></b><span data-dcnode-id="3938" instrument_node="">: Then it's true. He was a traitor / </span><b data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">Prince</span></b><span data-dcnode-id="3935" instrument_node="">: Take this. Return it to your father's treasure vault. Guard it well. / </span><b data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">Farah</span></b><span data-dcnode-id="3932" instrument_node="">: I owe you thanks. But why did you invent such a fantastic story? Do you think me a child, that I
