-right:0.65em;"><a data-dcnode-id="6453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_game_genre" title="Video game genre"><span data-dcnode-id="6454" instrument_node="">Genre(s)</span></a></th><td class="infobox-data" data-dcnode-id="6446"><a data-dcnode-id="6450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Action-adventure_game" title="Action-adventure game"><span data-dcnode-id="6451" instrument_node="">Action-adventure</span></a><span data-dcnode-id="6449" instrument_node="">, </span><a data-dcnode-id="6447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Platform_game" title="Platform game"><span data-dcnode-id="6448" instrument_node="">platform</span></a></td></tr><tr data-dcnode-id="6439"><th class="infobox-label" data-dcnode-id="6443" scope="row" style="white-space:nowrap;padding-right:0.65em;"><span data-dcnode-id="6444" instrument_node="">Mode(s)</span></th><td class="infobox-data" data-dcnode-id="6440"><a data-dcnode-id="6441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Single-player_video_game" title="Single-player video game"><span data-dcnode-id="6442" instrument_node="">Single-player</span></a></td></tr></tbody></table><span data-dcnode-id="6436" instrument_node="">
</span><p data-dcnode-id="6394"><i data-dcnode-id="6433"><b data-dcnode-id="6434"><span data-dcnode-id="6435" instrument_node="">Prince of Persia: The Sands of Time</span></b></i><span data-dcnode-id="6432" instrument_node=""> is a 2003  </span><a data-dcnode-id="6430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Action-adventure_game" title="Action-adventure game"><span data-dcnode-id="6431" instrument_node="">action-adventure</span></a><span data-dcnode-id="6429" instrument_node=""> </span><a data-dcnode-id="6427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_game" title="Video game"><span data-dcnode-id="6428" instrument_node="">video game</span></a><span data-dcnode-id="6426" instrument_node=""> developed and published by </span><a data-dcnode-id="6424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft" title="Ubisoft"><span data-dcnode-id="6425" instrument_node="">Ubisoft</span></a><span data-dcnode-id="6423" instrument_node="">. Revealed in March 2003, it was released on the </span><a data-dcnode-id="6421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Game_Boy_Advance" title="Game Boy Advance"><span data-dcnode-id="6422" instrument_node="">Game Boy Advance</span></a><span data-dcnode-id="6420" instrument_node="">, </span><a data-dcnode-id="6418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PlayStation_2" title="PlayStation 2"><span data-dcnode-id="6419" instrument_node="">PlayStation 2</span></a><span data-dcnode-id="6417" instrument_node="">, </span><a data-dcnode-id="6415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GameCube" title="GameCube"><span data-dcnode-id="6416" instrument_node="">GameCube</span></a><span data-dcnode-id="6414" instrument_node="">, </span><a data-dcnode-id="6412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xbox_%28console%29" title="Xbox (console)"><span data-dcnode-id="6413" instrument_node="">Xbox</span></a><span data-dcnode-id="6411" instrument_node=""> and </span><a data-dcnode-id="6409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsoft_Windows" title="Microsoft Windows"><span data-dcnode-id="6410" instrument_node="">Microsoft Windows</span></a><span data-dcnode-id="6408" instrument_node=""> in November 2003. </span><i data-dcnode-id="6406"><span data-dcnode-id="6407" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="6405" instrument_node=""> is a reboot of the </span><i data-dcnode-id="6402"><a data-dcnode-id="6403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia" title="Prince of Persia"><span data-dcnode-id="6404" instrument_node="">Prince of Persia</span></a></i><span data-dcnode-id="6401" instrument_node=""> series, created by </span><a data-dcnode-id="6399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan_Mechner" title="Jordan Mechner"><span data-dcnode-id="6400" instrument_node="">Jordan Mechner</span></a><span data-dcnode-id="6398" instrument_node="">. Mechner served as creative consultant, designer, and scenario writer for </span><i data-dcnode-id="6396"><span data-dcnode-id="6397" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="6395" instrument_node="">.
</span></p><p data-dcnode-id="6389"><span data-dcnode-id="6393" instrument_node="">The game follows an </span><a data-dcnode-id="6391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_%28Prince_of_Persia%29" title="Prince (Prince of Persia)"><span data-dcnode-id="6392" instrument_node="">unnamed Prince</span></a><span data-dcnode-id="6390" instrument_node=""> whose father sacks an ancient city at the instigation of a traitorous Vizier. During the attack, the Prince obtains an artifact called the Dagger of Time, while his father's army captures an hourglass containing the mysterious Sands of Time. Visiting the palace of the Sultan of Azad to present the Sands as a gift, the Vizier tricks the Prince into releasing the Sands, transforming the people of Azad into savage monsters under his control. Together with Farah, a young Princess who knows the power of the Sands, the Prince works to correct his mistake and foil the Vizier's evil plans. The gameplay revolves around the Prince's platforming abilities, broken up by fights with the creatures created by the Sands. A key mechanic in the game is using the Dagger to rewind time if the Prince makes a mistake platforming, and using it to kill and freeze enemies.
</span></p><p data-dcnode-id="6367"><span data-dcnode-id="6388" instrument_node="">Concept work began in spring of 2001, after Ubisoft acquired the </span><i data-dcnode-id="6386"><span data-dcnode-id="6387" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="6385" instrument_node=""> catalog. After Mechner was brought on board, production began in June of that year. After the initial story draft was scrapped as it was too complex, the team began with four guiding concepts, including the ability to rewind time: this idea grew into the Dagger, the Sands, and the various powers related to them. Mechner's script drew inspiration from the </span><i data-dcnode-id="6382"><a data-dcnode-id="6383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shahnameh" title="Shahnameh"><span data-dcnode-id="6384" instrument_node="">Shahnameh</span></a></i><span data-dcnode-id="6381" instrument_node="">, with the main focus on creating a simple narrative that worked with the pace of gameplay. The game used Ubisoft's </span><a class="mw-redirect" data-dcnode-id="6379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jade_%28game_engine%29" title="Jade (game engine)"><span data-dcnode-id="6380" instrument_node="">Jade engine</span></a><span data-dcnode-id="6378" instrument_node="">, originally designed for </span><i data-dcnode-id="6375"><a data-dcnode-id="6376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beyond_Good_%2526_Evil_%28video_game%29" title="Beyond Good &amp; Evil (video game)"><span data-dcnode-id="6377" instrument_node="">Beyond Good &amp; Evil</span></a></i><span data-dcnode-id="6374" instrument_node="">, another game published by the company. Production was troubled, with the team facing problems with the engine structure and delays with environment assets, while also managing to create an effective tester network to seek out the game's bugs. In 2004, a version for </span><a data-dcnode-id="6372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mobile_game" title="Mobile game"><span data-dcnode-id="6373" instrument_node="">mobile phones</span></a><span data-dcnode-id="6371" instrument_node=""> was developed and published in North America by </span><a data-dcnode-id="6369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gameloft" title="Gameloft"><span data-dcnode-id="6370" instrument_node="">Gameloft</span></a><span data-dcnode-id="6368" instrument_node="">.
</span></p><p data-dcnode-id="6336"><span data-dcnode-id="6366" instrument_node="">Upon release, it received critical acclaim, was nominated for, and won numerous awards and has been recognized by many as one of the </span><a data-dcnode-id="6364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_video_games_considered_the_best" title="List of video games considered the best"><span data-dcnode-id="6365" instrument_node="">greatest video games of all time</span></a><span data-dcnode-id="6363" instrument_node="">. Sales of the title were initially slow, but it eventually became a commercial success. Its success prompted the development of a sequel, </span><i data-dcnode-id="6360"><a data-dcnode-id="6361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_Warrior_Within" title="Prince of Persia: Warrior Within"><span data-dcnode-id="6362" instrument_node="">Prince of Persia: Warrior Within</span></a></i><span data-dcnode-id="6359" instrument_node="">, which was released in November 2004. Further games set in the </span><i data-dcnode-id="6357"><span data-dcnode-id="6358" instrument_node="">Sands of Time</span></i><span data-dcnode-id="6356" instrument_node=""> continuity have been developed, and it is generally cited as the reason for the </span><i data-dcnode-id="6354"><span data-dcnode-id="6355" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="6353" instrument_node=""> series' return to fame. As of 2014</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="6350" style="display:none;"><a class="external text" data-dcnode-id="6351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time%26action%3Dedit"><span data-dcnode-id="6352" instrument_node="">[update]</span></a></sup><span data-dcnode-id="6349" instrument_node="">, the game has sold over 14</span><span class="nowrap" data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6346" instrument_node="">million copies worldwide, across all platforms. A </span><a data-dcnode-id="6344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_game_remake" title="Video game remake"><span data-dcnode-id="6345" instrument_node="">remake</span></a><span data-dcnode-id="6343" instrument_node=""> of the game was announced at Ubisoft Forward 2020, and is scheduled to release for Microsoft Windows, </span><a data-dcnode-id="6341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PlayStation_4" title="PlayStation 4"><span data-dcnode-id="6342" instrument_node="">PlayStation 4</span></a><span data-dcnode-id="6340" instrument_node=""> and </span><a data-dcnode-id="6338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xbox_One" title="Xbox One"><span data-dcnode-id="6339" instrument_node="">Xbox One</span></a><span data-dcnode-id="6337" instrument_node=""> in 2022–2023.
</span></p><span data-dcnode-id="6335" instrument_node="">
