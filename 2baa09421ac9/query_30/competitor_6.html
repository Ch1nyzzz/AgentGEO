</span><h2 data-dcnode-id="6197"><span class="mw-headline" data-dcnode-id="6205" id="Gameplay"><span data-dcnode-id="6206" instrument_node="">Gameplay</span></span><span class="mw-editsection" data-dcnode-id="6198"><span class="mw-editsection-bracket" data-dcnode-id="6203"><span data-dcnode-id="6204" instrument_node="">[</span></span><a data-dcnode-id="6201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time%26action%3Dedit%26section%3D1" title="Edit section: Gameplay"><span data-dcnode-id="6202" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6199"><span data-dcnode-id="6200" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6196" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6187"><div class="thumbinner" data-dcnode-id="6188" style="width:222px;"><a class="image" data-dcnode-id="6194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrince_of_Persia_SoT_screenshot.jpg"><img alt="" class="thumbimage" data-dcnode-id="6195" data-file-height="255" data-file-width="340" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/f/f6/Prince_of_Persia_SoT_screenshot.jpg/220px-Prince_of_Persia_SoT_screenshot.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/f/f6/Prince_of_Persia_SoT_screenshot.jpg/330px-Prince_of_Persia_SoT_screenshot.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/f/f6/Prince_of_Persia_SoT_screenshot.jpg 2x" width="220"></a><span data-dcnode-id="6193" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6189"><div class="magnify" data-dcnode-id="6191"><a class="internal" data-dcnode-id="6192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrince_of_Persia_SoT_screenshot.jpg" title="Enlarge"></a></div><span data-dcnode-id="6190" instrument_node="">The Prince in combat with Sands Monsters. Shown are the battle interface and the Dagger's available Sand chambers.</span></div></div></div><span data-dcnode-id="6186" instrument_node="">
</span><p data-dcnode-id="6149"><i data-dcnode-id="6184"><span data-dcnode-id="6185" instrument_node="">Prince of Persia: The Sands of Time</span></i><span data-dcnode-id="6183" instrument_node=""> is an </span><a data-dcnode-id="6181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Action-adventure_game" title="Action-adventure game"><span data-dcnode-id="6182" instrument_node="">action-adventure</span></a><span data-dcnode-id="6180" instrument_node=""> </span><a data-dcnode-id="6178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Platform_game%23Puzzle_platformers" title="Platform game"><span data-dcnode-id="6179" instrument_node="">puzzle-platformer</span></a><span data-dcnode-id="6177" instrument_node="">. The player controls the main protagonist, an </span><a data-dcnode-id="6175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_%28Prince_of_Persia%29" title="Prince (Prince of Persia)"><span data-dcnode-id="6176" instrument_node="">unnamed Prince</span></a><span data-dcnode-id="6174" instrument_node=""> from a kingdom in Persia. Environments are seen through a controllable </span><a data-dcnode-id="6172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virtual_camera_system%23Third-person_view" title="Virtual camera system"><span data-dcnode-id="6173" instrument_node="">third-person view</span></a><span data-dcnode-id="6171" instrument_node="">. The camera's view changes to different positions triggered by entering certain areas or performing actions.</span><sup class="reference" data-dcnode-id="6168" id="cite_ref-SoTManual_3-0"><a data-dcnode-id="6169" href="#cite_note-SoTManual-3"><span data-dcnode-id="6170" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="6165" id="cite_ref-DVDfeature_4-0"><a data-dcnode-id="6166" href="#cite_note-DVDfeature-4"><span data-dcnode-id="6167" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6164" instrument_node=""> The Prince can be moved in all directions, and he is able to manipulate large objects such as blocks and levers connected to mechanisms. His health and power metre are represented in the top left-hand corner of the screen. The Prince restores health by drinking water from pools and fountains. Collecting Sands increases the Prince's power, and drinking from hidden magic fountains increases the Prince's maximum health.</span><sup class="reference" data-dcnode-id="6161" id="cite_ref-SoTManual_3-1"><a data-dcnode-id="6162" href="#cite_note-SoTManual-3"><span data-dcnode-id="6163" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="6158" id="cite_ref-IGNPS2_5-0"><a data-dcnode-id="6159" href="#cite_note-IGNPS2-5"><span data-dcnode-id="6160" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6157" instrument_node=""> During several points in the game, the Prince is assisted by his companion Farah, who fires a bow at enemies, though her arrows can also hit the Prince if he strays into her line of fire. Monsters will attack her, and if she is killed, the game ends.</span><sup class="reference" data-dcnode-id="6154" id="cite_ref-SoTManual_3-2"><a data-dcnode-id="6155" href="#cite_note-SoTManual-3"><span data-dcnode-id="6156" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="6151" id="cite_ref-PrinceAfterword_6-0"><a data-dcnode-id="6152" href="#cite_note-PrinceAfterword-6"><span data-dcnode-id="6153" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6150" instrument_node="">
</span></p><p data-dcnode-id="6126"><span data-dcnode-id="6148" instrument_node="">During exploration, the Prince navigates areas filled with traps: these traps include spike pits, arrow traps, wall-mounted blades and saws, and spinning spiked stakes. The Prince's main contextual move is wall-running, an action where he runs up onto and along a wall for a set distance, either to land on or jump off to a platform. The Prince's other acrobatic abilities include climbing along and across ledges, walking along beams, swinging on and jumping from poles, jumping onto and between pillars, and swinging on ropes.</span><sup class="reference" data-dcnode-id="6145" id="cite_ref-SoTManual_3-3"><a data-dcnode-id="6146" href="#cite_note-SoTManual-3"><span data-dcnode-id="6147" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="6142" id="cite_ref-IGNPS2_5-1"><a data-dcnode-id="6143" href="#cite_note-IGNPS2-5"><span data-dcnode-id="6144" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="6139" id="cite_ref-GSps2_7-0"><a data-dcnode-id="6140" href="#cite_note-GSps2-7"><span data-dcnode-id="6141" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6138" instrument_node=""> Large environmental puzzles are encountered during the Prince's journey, extending across multiple areas in large rooms. Many puzzles are cooperative, requiring Farah's help to complete them.</span><sup class="reference" data-dcnode-id="6135" id="cite_ref-GSps2_7-1"><a data-dcnode-id="6136" href="#cite_note-GSps2-7"><span data-dcnode-id="6137" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6134" instrument_node=""> In combat, the Prince fights monsters created by the Sands infecting the Palace's inhabitants. A single command contextually triggers different moves depending on position and directional movement, while other special moves such as a somersault attack and bouncing off walls into enemies require additional commands. Enemies can only be killed by stabbing them with the Dagger of Time, which gathers up the Sands inside them.</span><sup class="reference" data-dcnode-id="6131" id="cite_ref-SoTManual_3-4"><a data-dcnode-id="6132" href="#cite_note-SoTManual-3"><span data-dcnode-id="6133" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="6128" id="cite_ref-EdgeReview_8-0"><a data-dcnode-id="6129" href="#cite_note-EdgeReview-8"><span data-dcnode-id="6130" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6127" instrument_node="">
</span></p><p data-dcnode-id="6120"><span data-dcnode-id="6125" instrument_node="">The Sands the Prince collects from enemies and the environment are tied to his magical abilities, themselves connected with the Dagger. The most basic power is Rewind, the ability for the Prince to rewind time by up to ten seconds if he makes a mistake in platforming or dies. In combat, the Prince can also slow time immediately around him, freeze time for a single enemy, and freeze time completely so the Prince can attack his enemies at great speed while they are unable to move. Each use of power uses up one Sand Tank, and when empty, all powers become inaccessible until more Sand is collected. More powerful abilities, such as freezing time, are powered by Power Tanks. Increasing their number unlocks new Sand-based powers. Starting out with a small amount of Sand available to him, its capacity can be increased by collecting Sand from enemies, along with Sand Clouds scattered around the palace. Large columns of Sand within the Palace grant visions of future areas and act as save points.</span><sup class="reference" data-dcnode-id="6122" id="cite_ref-SoTManual_3-5"><a data-dcnode-id="6123" href="#cite_note-SoTManual-3"><span data-dcnode-id="6124" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6121" instrument_node="">
</span></p><p data-dcnode-id="6110"><span data-dcnode-id="6119" instrument_node="">The Game Boy Advance version shares basic elements with its console counterparts. Displayed from a side-scrolling view, the Prince navigates the palace of Azad using his acrobatic skills. The Rewind ability is still present to save the Prince's life, and is also involved in solving some puzzles and fighting bosses. New moves and abilities are gained by the Prince by performing moves and solving puzzles. Farah is featured as a second playable character in some sections, with switching between the two being key to some puzzles.</span><sup class="reference" data-dcnode-id="6116" id="cite_ref-GSgba_9-0"><a data-dcnode-id="6117" href="#cite_note-GSgba-9"><span data-dcnode-id="6118" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6115" instrument_node=""> The mobile version is similarly a side-scroller, featuring simple puzzles and traps. The powers linked to the Sands are absent, but enemies must still be killed by stabbing them with the Dagger. There are three enemy types: archers, flying enemies, and foot soldiers.</span><sup class="reference" data-dcnode-id="6112" id="cite_ref-1UPmobile_10-0"><a data-dcnode-id="6113" href="#cite_note-1UPmobile-10"><span data-dcnode-id="6114" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6111" instrument_node="">
</span></p><span data-dcnode-id="6109" instrument_node="">
</span><h2 data-dcnode-id="6099"><span class="mw-headline" data-dcnode-id="6107" id="Plot"><span data-dcnode-id="6108" instrument_node="">Plot</span></span><span class="mw-editsection" data-dcnode-id="6100"><span class="mw-editsection-bracket" data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">[</span></span><a data-dcnode-id="6103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time%26action%3Dedit%26section%3D2" title="Edit section: Plot"><span data-dcnode-id="6104" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6101"><span data-dcnode-id="6102" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6098" instrument_node="">
</span><p data-dcnode-id="6078"><span data-dcnode-id="6097" instrument_node="">The game is set in Persia during the 9th century AD, and begins with the Prince narrating to an unseen listener about his adventures.</span><sup class="reference" data-dcnode-id="6094" id="cite_ref-PrinceAfterword_6-1"><a data-dcnode-id="6095" href="#cite_note-PrinceAfterword-6"><span data-dcnode-id="6096" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="6091" id="cite_ref-11"><a data-dcnode-id="6092" href="#cite_note-11"><span data-dcnode-id="6093" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6090" instrument_node=""> The Prince and the army of his father Shahraman are passing through India to visit the Sultan of Azad. The Vizier of a local Maharaja, wanting to prevent his death using a substance known as the Sands of Time, entices them into attacking the Maharaja's palace, where the Sands are stored. During the fight, the Prince loots an artefact called the Dagger of Time, and the Maharaja's daughter Farah is taken as a gift for the Sultan of Azad. Visiting Azad, the Vizier tricks the Prince into releasing the Sands, turning everyone but the Prince, the Vizier and Farah (protected by the Dagger, a staff and a medallion respectively) into monsters.</span><sup class="reference" data-dcnode-id="6087" id="cite_ref-SoTwriting_12-0"><a data-dcnode-id="6088" href="#cite_note-SoTwriting-12"><span data-dcnode-id="6089" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6086" instrument_node=""> The Vizier attempts to seize the Dagger from the Prince, but he escapes and eventually allies with Farah to undo the damage he has caused and prevent the Sands from covering the world, even though he has doubts about her loyalties and motives.</span><sup class="reference" data-dcnode-id="6083" id="cite_ref-SoTwriting_12-1"><a data-dcnode-id="6084" href="#cite_note-SoTwriting-12"><span data-dcnode-id="6085" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="6080" id="cite_ref-13"><a data-dcnode-id="6081" href="#cite_note-13"><span data-dcnode-id="6082" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6079" instrument_node="">
</span></p><p data-dcnode-id="6064"><span data-dcnode-id="6077" instrument_node="">After navigating the palace of Azad and reaching the hourglass of the Sands in the Tower of Dawn, the Prince hesitates when following Farah's instructions on containing the Sands, unsure of whether to trust her.</span><sup class="reference" data-dcnode-id="6074" id="cite_ref-14"><a data-dcnode-id="6075" href="#cite_note-14"><span data-dcnode-id="6076" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6073" instrument_node=""> The Vizier ambushes them and they barely escape with the Dagger, ending up in a tomb beneath the city. Eventually finding shelter in a mysterious bathhouse, the two rest and begin showing feelings for each other. When the Prince wakes back in the palace, Farah has gone with the Dagger, leaving him her medallion. He follows her and only just manages to catch her as she is driven over a ledge above the hourglass by monsters. To save the Prince, Farah allows herself to fall to her death. As the Prince mourns over her, the Vizier offers him eternal life in exchange for the Dagger. The Prince refuses and stabs the hourglass with the Dagger.</span><sup class="reference" data-dcnode-id="6070" id="cite_ref-15"><a data-dcnode-id="6071" href="#cite_note-15"><span data-dcnode-id="6072" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6069" instrument_node=""> Time rewinds to before the attack on the Maharaja's palace, and the Prince, still in possession of the Dagger and his memories, runs ahead to warn Farah of the Vizier's treachery. It is now revealed that the Prince has been recounting his tale to Farah, and as he finishes, the Vizier enters to kill him. The Prince kills the Vizier and returns the Dagger to Farah, who believes his narrative was just a story. In parting, the Prince mentions a private word she told him during their time in the tomb, leaving her amazed.</span><sup class="reference" data-dcnode-id="6066" id="cite_ref-16"><a data-dcnode-id="6067" href="#cite_note-16"><span data-dcnode-id="6068" instrument_node="">[15]</span></a></sup><span data-dcnode-id="6065" instrument_node="">
</span></p><span data-dcnode-id="6063" instrument_node="">
</span><h2 data-dcnode-id="6053"><span class="mw-headline" data-dcnode-id="6061" id="Development"><span data-dcnode-id="6062" instrument_node="">Development</span></span><span class="mw-editsection" data-dcnode-id="6054"><span class="mw-editsection-bracket" data-dcnode-id="6059"><span data-dcnode-id="6060" instrument_node="">[</span></span><a data-dcnode-id="6057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time%26action%3Dedit%26section%3D3" title="Edit section: Development"><span data-dcnode-id="6058" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6055"><span data-dcnode-id="6056" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6052" instrument_node="">
</span><p data-dcnode-id="5983"><span data-dcnode-id="6051" instrument_node="">The development of the initial concept work for </span><i data-dcnode-id="6049"><span data-dcnode-id="6050" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="6048" instrument_node=""> began in the second quarter of 2001, after Ubisoft had bought the </span><i data-dcnode-id="6046"><span data-dcnode-id="6047" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="6045" instrument_node=""> license. While Ubisoft held the </span><i data-dcnode-id="6043"><span data-dcnode-id="6044" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="6042" instrument_node=""> catalog, the actual IP still belonged to the series original creator </span><a data-dcnode-id="6040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan_Mechner" title="Jordan Mechner"><span data-dcnode-id="6041" instrument_node="">Jordan Mechner</span></a><span data-dcnode-id="6039" instrument_node="">, but he was initially unwilling to return to the series after poor experiences with </span><i data-dcnode-id="6036"><a data-dcnode-id="6037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia_3D" title="Prince of Persia 3D"><span data-dcnode-id="6038" instrument_node="">Prince of Persia 3D</span></a></i><span data-dcnode-id="6035" instrument_node="">. The game was developed by </span><a data-dcnode-id="6033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft_Montreal" title="Ubisoft Montreal"><span data-dcnode-id="6034" instrument_node="">Ubisoft Montreal</span></a><span data-dcnode-id="6032" instrument_node="">, which was also a year into developing </span><i data-dcnode-id="6029"><a data-dcnode-id="6030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tom_Clancy%2527s_Splinter_Cell_%28video_game%29" title="Tom Clancy's Splinter Cell (video game)"><span data-dcnode-id="6031" instrument_node="">Tom Clancy's Splinter Cell</span></a></i><span data-dcnode-id="6028" instrument_node="">.</span><sup class="reference" data-dcnode-id="6025" id="cite_ref-GDMpostmortem_17-0"><a data-dcnode-id="6026" href="#cite_note-GDMpostmortem-17"><span data-dcnode-id="6027" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="6022" id="cite_ref-IGNhistory_18-0"><a data-dcnode-id="6023" href="#cite_note-IGNhistory-18"><span data-dcnode-id="6024" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6021" instrument_node=""> After some mock assets had been created, Ubisoft asked Mechner to come and help develop the game, showing them their concepts and the assets as </span><a data-dcnode-id="6019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Audio_Video_Interleave" title="Audio Video Interleave"><span data-dcnode-id="6020" instrument_node="">AVIs</span></a><span data-dcnode-id="6018" instrument_node="">. Mechner was impressed by Ubisoft's work and came on board as a creative consultant. He soon became more involved with the project, becoming the game's designer and writer. Full production began in June 2001, and at its peak was worked on by a staff of 65 people, internally known as "PoP Team".</span><sup class="reference" data-dcnode-id="6015" id="cite_ref-GDMpostmortem_17-1"><a data-dcnode-id="6016" href="#cite_note-GDMpostmortem-17"><span data-dcnode-id="6017" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="6012" id="cite_ref-GSdevelopment_19-0"><a data-dcnode-id="6013" href="#cite_note-GSdevelopment-19"><span data-dcnode-id="6014" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6011" instrument_node=""> Development ran parallel to that of </span><i data-dcnode-id="6009"><span data-dcnode-id="6010" instrument_node="">Splinter Cell</span></i><span data-dcnode-id="6008" instrument_node="">, and as part of their research, the development team read </span><i data-dcnode-id="6005"><a data-dcnode-id="6006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/One_Thousand_and_One_Nights" title="One Thousand and One Nights"><span data-dcnode-id="6007" instrument_node="">One Thousand and One Nights</span></a></i><span data-dcnode-id="6004" instrument_node="">, a collection of stories originating from the Middle East that Mechner had previously used as inspiration when designing the original </span><i data-dcnode-id="6002"><span data-dcnode-id="6003" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="6001" instrument_node="">.</span><sup class="reference" data-dcnode-id="5998" id="cite_ref-PrinceAfterword_6-2"><a data-dcnode-id="5999" href="#cite_note-PrinceAfterword-6"><span data-dcnode-id="6000" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="5995" id="cite_ref-GDMpostmortem_17-2"><a data-dcnode-id="5996" href="#cite_note-GDMpostmortem-17"><span data-dcnode-id="5997" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="5992" id="cite_ref-IGNhistory_18-1"><a data-dcnode-id="5993" href="#cite_note-IGNhistory-18"><span data-dcnode-id="5994" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="5989" id="cite_ref-GamaMechner_20-0"><a data-dcnode-id="5990" href="#cite_note-GamaMechner-20"><span data-dcnode-id="5991" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5988" instrument_node=""> Over the course of production, the team ran through over 150 different versions before the retail version.</span><sup class="reference" data-dcnode-id="5985" id="cite_ref-GSdevelopment_19-1"><a data-dcnode-id="5986" href="#cite_note-GSdevelopment-19"><span data-dcnode-id="5987" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5984" instrument_node="">
</span></p><p data-dcnode-id="5947"><span data-dcnode-id="5982" instrument_node="">The game's title was thought up by the production team, but the original story built around the title proved impossible to work. The original draft had nine characters (including the Prince, two love interests, two villains, and two helper characters) representing different political factions, and the setting of the Prince's own palace home instead of in another kingdom. This storyline ultimately impeded other aspects of development, and so was scrapped. In starting over, the team returned to "</span><i data-dcnode-id="5980"><span data-dcnode-id="5981" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="5979" instrument_node="">" title and concept. They decided upon four key elements for the game: "Unity of time and place", with the game taking place over twenty-four hours within the palace of Azad; "Acrobatics", referring to the gameplay and how the setting was constructed around this concept; "Combat", with the palace being filled with monsters to give the game and story a fast-paced feeling; and "Rewind", the ability to turn back and manipulate time.</span><sup class="reference" data-dcnode-id="5976" id="cite_ref-SoTwriting_12-2"><a data-dcnode-id="5977" href="#cite_note-SoTwriting-12"><span data-dcnode-id="5978" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5975" instrument_node=""> One of the early decisions made by the production team was not to refer to </span><i data-dcnode-id="5973"><span data-dcnode-id="5974" instrument_node="">Prince of Persia 3D</span></i><span data-dcnode-id="5972" instrument_node=""> in any degree in designing the gameplay, instead looking to the 1989 original for reference. They intended to capture the original feeling of platforming an adventure in a 3D environment. The Rewind mechanic began as a gameplay wish for the title, surviving the initial rewrite of the story and becoming key to both story and gameplay. The Dagger of Time and the Sands were both born from the need to explain this mechanic in-game. The initial concept was simply using the Dagger to rewind time and dispatch enemies, but its powers were gradually expanded into its current roster.</span><sup class="reference" data-dcnode-id="5969" id="cite_ref-GamaMechner_20-1"><a data-dcnode-id="5970" href="#cite_note-GamaMechner-20"><span data-dcnode-id="5971" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5968" instrument_node=""> The main character's acrobatics were designed to be novel to the video game medium, inspired by similar stunts performed in </span><i data-dcnode-id="5965"><a data-dcnode-id="5966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crouching_Tiger%2C_Hidden_Dragon" title="Crouching Tiger, Hidden Dragon"><span data-dcnode-id="5967" instrument_node="">Crouching Tiger, Hidden Dragon</span></a></i><span data-dcnode-id="5964" instrument_node=""> and </span><i data-dcnode-id="5961"><a data-dcnode-id="5962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Matrix" title="The Matrix"><span data-dcnode-id="5963" instrument_node="">The Matrix</span></a></i><span data-dcnode-id="5960" instrument_node="">. A video game which provided inspiration for the acrobatic feats of the Prince was </span><i data-dcnode-id="5957"><a class="mw-redirect" data-dcnode-id="5958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tony_Hawk%2527s_Pro_Skater" title="Tony Hawk's Pro Skater"><span data-dcnode-id="5959" instrument_node="">Tony Hawk's Pro Skater</span></a></i><span data-dcnode-id="5956" instrument_node="">. Elements such as using ladders as part of combat, and riding on a magic carpet or a horse were axed early in development. The Rewind function was suggested by the game's director Patrice Désilets based on experiences playing </span><i data-dcnode-id="5953"><a data-dcnode-id="5954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Duck%3A_Goin%2527_Quackers" title="Donald Duck: Goin' Quackers"><span data-dcnode-id="5955" instrument_node="">Donald Duck: Goin' Quackers</span></a></i><span data-dcnode-id="5952" instrument_node="">, where he had wished to rewind after making a mistake rather than restarting the entire level.</span><sup class="reference" data-dcnode-id="5949" id="cite_ref-GSdevelopment_19-2"><a data-dcnode-id="5950" href="#cite_note-GSdevelopment-19"><span data-dcnode-id="5951" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5948" instrument_node="">
</span></p><p data-dcnode-id="5928"><span data-dcnode-id="5946" instrument_node="">The game design was also influenced by </span><i data-dcnode-id="5943"><a data-dcnode-id="5944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ico" title="Ico"><span data-dcnode-id="5945" instrument_node="">Ico</span></a></i><span data-dcnode-id="5942" instrument_node="">. According to Désilets, they "spent an entire day going through [</span><i data-dcnode-id="5940"><span data-dcnode-id="5941" instrument_node="">Ico</span></i><span data-dcnode-id="5939" instrument_node="">], the entire team together sitting down, looking at it, playing it, discussing it, brainstorming," and they particularly liked "how the castle in Ico seems real and you always know where you are, so we tried to have this a little bit also in the second palace." It also influenced the interaction between the player and the lead female character, but with some changes. According to Désilets, Farah "has some behaviors to help you out, but we didn't want for her to become a key just like in </span><i data-dcnode-id="5937"><span data-dcnode-id="5938" instrument_node="">Ico</span></i><span data-dcnode-id="5936" instrument_node="">, a key to a door all the time."</span><sup class="reference" data-dcnode-id="5933" id="cite_ref-21"><a data-dcnode-id="5934" href="#cite_note-21"><span data-dcnode-id="5935" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="5930" id="cite_ref-22"><a data-dcnode-id="5931" href="#cite_note-22"><span data-dcnode-id="5932" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5929" instrument_node="">
</span></p><p data-dcnode-id="5894"><span data-dcnode-id="5927" instrument_node="">Pre-production was originally estimated at ten months, but ultimately extended to fourteen months. Each time a new movement or ability was created for the Prince, it required adjustments to multiple other systems, as leaving them alone would have damaged the game. They also needed to make adjustments to the enemy and partner </span><a class="mw-redirect" data-dcnode-id="5925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artificial_intelligence_%28video_games%29" title="Artificial intelligence (video games)"><span data-dcnode-id="5926" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="5924" instrument_node="">, and they did not have time to polish those systems. All this meant that the debugging started much later than originally scheduled. The Prince had over 780 scripted movements, far more than any other character in the game. This caused problems with creating the movements for other characters.</span><sup class="reference" data-dcnode-id="5921" id="cite_ref-GDMpostmortem_17-3"><a data-dcnode-id="5922" href="#cite_note-GDMpostmortem-17"><span data-dcnode-id="5923" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5920" instrument_node=""> To make the character movements realistic, the team used </span><a data-dcnode-id="5918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motion_capture" title="Motion capture"><span data-dcnode-id="5919" instrument_node="">motion capture</span></a><span data-dcnode-id="5917" instrument_node=""> to animate their movements.</span><sup class="reference" data-dcnode-id="5914" id="cite_ref-HITepisode_23-0"><a data-dcnode-id="5915" href="#cite_note-HITepisode-23"><span data-dcnode-id="5916" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5913" instrument_node=""> Art director Raphael Lacoste did not join the team until July 2002, well into the game's production, resulting in multiple delays in creating the game's environments. This issue was compounded by the need to produce a demo for the </span><a class="mw-redirect" data-dcnode-id="5911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_Electronic_Entertainment_Expo%232003" title="History of the Electronic Entertainment Expo"><span data-dcnode-id="5912" instrument_node="">2003 Electronic Entertainment Expo</span></a><span data-dcnode-id="5910" instrument_node="">, then to deliver an entire game at the same if not a higher quality than the demo.</span><sup class="reference" data-dcnode-id="5907" id="cite_ref-GDMpostmortem_17-4"><a data-dcnode-id="5908" href="#cite_note-GDMpostmortem-17"><span data-dcnode-id="5909" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5906" instrument_node=""> Each environment needed to work for the Prince's set of movements and abilities: the work needed involved checking each rewind sequence, and each of the Prince's movement in and effect on the environment worked. These issues were compounded by the late delivery of environmental maps. In hindsight, producer Yannis Mallat lamented the fact that they did not have enough time to work out the problems caused by these issues. Despite these problems, other parts of production including play-testing, management of creative tools, and the integrated testing system worked smoothly. A cited example was the team discovering a tester that was good at finding severe bugs, so they included her in one of their testing groups, giving her a development kit she could use to sort out those bugs. This was replicated, and managed to greatly increase the amount of bugs that could be found and fixed. The development team's enthusiasm was also high, which enabled the problems during development to be overcome.</span><sup class="reference" data-dcnode-id="5903" id="cite_ref-GDMpostmortem_17-5"><a data-dcnode-id="5904" href="#cite_note-GDMpostmortem-17"><span data-dcnode-id="5905" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5902" instrument_node=""> During the aftermath of E3, the team considered release </span><i data-dcnode-id="5900"><span data-dcnode-id="5901" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="5899" instrument_node=""> as two games so they could include all the desired content, but the idea was dropped. Another element that needed to be cut after the demo was a griffin boss that would appear three times during the Prince's journey.</span><sup class="reference" data-dcnode-id="5896" id="cite_ref-GSdevelopment_19-3"><a data-dcnode-id="5897" href="#cite_note-GSdevelopment-19"><span data-dcnode-id="5898" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5895" instrument_node="">
</span></p><p data-dcnode-id="5871"><span data-dcnode-id="5893" instrument_node="">The game used an updated version of the company's </span><a class="mw-redirect" data-dcnode-id="5891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jade_%28game_engine%29" title="Jade (game engine)"><span data-dcnode-id="5892" instrument_node="">Jade engine</span></a><span data-dcnode-id="5890" instrument_node="">, designed for </span><i data-dcnode-id="5887"><a data-dcnode-id="5888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beyond_Good_%2526_Evil_%28video_game%29" title="Beyond Good &amp; Evil (video game)"><span data-dcnode-id="5889" instrument_node="">Beyond Good &amp; Evil</span></a></i><span data-dcnode-id="5886" instrument_node="">. When the team saw the capacities of the Jade engine, they decided to use it for </span><i data-dcnode-id="5884"><span data-dcnode-id="5885" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="5883" instrument_node="">. For </span><i data-dcnode-id="5881"><span data-dcnode-id="5882" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="5880" instrument_node="">, the team made improvements to the engine by adding additional walking and running animations, enabling smoother character movement. They also made custom animations for the character. The engine made editing and fine-tuning the game very easy due to its easy-to-use tools. Using this as a base, they were able to focus on rapid integration of new elements into the game, and were also able to do quick testing and adjustments. The team developed "substance" and "glow" systems, which respectively enabled natural movements of cloth and gave the lightning effects a "magical" feel.</span><sup class="reference" data-dcnode-id="5877" id="cite_ref-XboxInterview_24-0"><a data-dcnode-id="5878" href="#cite_note-XboxInterview-24"><span data-dcnode-id="5879" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5876" instrument_node=""> The way the engine was structured, with all assets in a single accessible folder, proved problematic when alterations needed to be made or new features added, as the team size meant too many people were accessing the engine and were causing data to be overwritten, files to be corrupted, and the whole system to crash. They attempted to solve the problem using a "data monkey" solution which would allow for simultaneous access, but it came late in development and they did not risk making such a radical change to the system. Instead, they set up a file server to manage check-in times, which could allow for management of access and prioritisation of critical work.</span><sup class="reference" data-dcnode-id="5873" id="cite_ref-GDMpostmortem_17-6"><a data-dcnode-id="5874" href="#cite_note-GDMpostmortem-17"><span data-dcnode-id="5875" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5872" instrument_node="">
</span></p><span data-dcnode-id="5870" instrument_node="">
</span><h3 data-dcnode-id="5860"><span class="mw-headline" data-dcnode-id="5868" id="Writing"><span data-dcnode-id="5869" instrument_node="">Writing</span></span><span class="mw-editsection" data-dcnode-id="5861"><span class="mw-editsection-bracket" data-dcnode-id="5866"><span data-dcnode-id="5867" instrument_node="">[</span></span><a data-dcnode-id="5864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time%26action%3Dedit%26section%3D4" title="Edit section: Writing"><span data-dcnode-id="5865" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5862"><span data-dcnode-id="5863" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5859" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5844"><div class="thumbinner" data-dcnode-id="5845" style="width:222px;"><a class="image" data-dcnode-id="5857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJordan_Mechner_at_WonderCon_2010_3.JPG"><img alt="" class="thumbimage" data-dcnode-id="5858" data-file-height="2672" data-file-width="3520" decoding="async" height="167" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Jordan_Mechner_at_WonderCon_2010_3.JPG/220px-Jordan_Mechner_at_WonderCon_2010_3.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Jordan_Mechner_at_WonderCon_2010_3.JPG/330px-Jordan_Mechner_at_WonderCon_2010_3.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Jordan_Mechner_at_WonderCon_2010_3.JPG/440px-Jordan_Mechner_at_WonderCon_2010_3.JPG 2x" width="220"></a><span data-dcnode-id="5856" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5846"><div class="magnify" data-dcnode-id="5854"><a class="internal" data-dcnode-id="5855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJordan_Mechner_at_WonderCon_2010_3.JPG" title="Enlarge"></a></div><span data-dcnode-id="5853" instrument_node="">Jordan Mechner, scenario writer and game designer for </span><i data-dcnode-id="5851"><span data-dcnode-id="5852" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="5850" instrument_node="">, at </span><a data-dcnode-id="5848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WonderCon" title="WonderCon"><span data-dcnode-id="5849" instrument_node="">WonderCon</span></a><span data-dcnode-id="5847" instrument_node=""> 2010.</span></div></div></div><span data-dcnode-id="5843" instrument_node="">
</span><p data-dcnode-id="5801"><span data-dcnode-id="5842" instrument_node="">Mechner created the scenario and wrote the game's script.</span><sup class="reference" data-dcnode-id="5839" id="cite_ref-SoTwriting_12-3"><a data-dcnode-id="5840" href="#cite_note-SoTwriting-12"><span data-dcnode-id="5841" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5838" instrument_node=""> While doing his research for the script, Mechner read a translation of the </span><i data-dcnode-id="5835"><a data-dcnode-id="5836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shahnameh" title="Shahnameh"><span data-dcnode-id="5837" instrument_node="">Shahnameh</span></a></i><span data-dcnode-id="5834" instrument_node="">, an epic poem written by </span><a data-dcnode-id="5832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ferdowsi" title="Ferdowsi"><span data-dcnode-id="5833" instrument_node="">Ferdowsi</span></a><span data-dcnode-id="5831" instrument_node=""> between the 10th and 11th century. Reading it through helped Mechner visualise the new Prince as a more mature character than the original. Despite this, Mechner felt that the character could not fully shed the "happy-go-lucky" elements of </span><i data-dcnode-id="5829"><span data-dcnode-id="5830" instrument_node="">One Thousand and One Nights</span></i><span data-dcnode-id="5828" instrument_node="">. In retrospect, Mechner also felt that this inability to resolve this inherent conflict gave the character his charm. Mechner also included specific references in the Prince's dialogue to stories from the </span><i data-dcnode-id="5826"><span data-dcnode-id="5827" instrument_node="">Shahnameh</span></i><span data-dcnode-id="5825" instrument_node="">.</span><sup class="reference" data-dcnode-id="5822" id="cite_ref-PrinceAfterword_6-3"><a data-dcnode-id="5823" href="#cite_note-PrinceAfterword-6"><span data-dcnode-id="5824" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5821" instrument_node=""> The story and the Prince were created for newcomers to the series. The main scenario was based around second chances, while an unstated anti-war theme was also included by Mechner and showcased in the game's opening level.</span><sup class="reference" data-dcnode-id="5818" id="cite_ref-PrinceAfterword_6-4"><a data-dcnode-id="5819" href="#cite_note-PrinceAfterword-6"><span data-dcnode-id="5820" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="5815" id="cite_ref-SoTwriting_12-4"><a data-dcnode-id="5816" href="#cite_note-SoTwriting-12"><span data-dcnode-id="5817" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5814" instrument_node=""> Mechner created the Dagger of Time as a combined gameplay and narrative device within the four core concepts created by the team. Its acquisition by the Prince was directly inspired by the opening of </span><i data-dcnode-id="5811"><a data-dcnode-id="5812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raiders_of_the_Lost_Ark" title="Raiders of the Lost Ark"><span data-dcnode-id="5813" instrument_node="">Raiders of the Lost Ark</span></a></i><span data-dcnode-id="5810" instrument_node="">, which had previously inspired his portrayal of the Prince in the original </span><i data-dcnode-id="5807"><a data-dcnode-id="5808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia_%281989_video_game%29" title="Prince of Persia (1989 video game)"><span data-dcnode-id="5809" instrument_node="">Prince of Persia</span></a></i><span data-dcnode-id="5806" instrument_node="">. The palace of Azad was crafted to be the Prince's "playground", while some scenes which developed the Prince's portrayal (the opening attack on the Maharaja's palace, activating Azad's traps on the instructions of a deranged guard) were deliberately meant to be morally dubious to the player while increasing empathy with the character.</span><sup class="reference" data-dcnode-id="5803" id="cite_ref-SoTwriting_12-5"><a data-dcnode-id="5804" href="#cite_note-SoTwriting-12"><span data-dcnode-id="5805" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5802" instrument_node="">
</span></p><p data-dcnode-id="5780"><span data-dcnode-id="5800" instrument_node="">Mechner's main preoccupation for this new storyline was keeping the narrative simple and engaging, using his preferred writing style of keeping cutscenes short and working as much of the story as possible into the gameplay. He also aimed to mix narrative and gameplay genres that might normally clash with one-another. The three main characters he created were the hero (the Prince), the villain (the Vizier) and the love interest and sidekick (Farah). Two non-playable authority figures (the Prince's father Shahraman and the Sultan of Azad) were included to add weight to the Prince's burden as they were transformed into monsters by the Sands. The three artefacts each character used (the Dagger, Farah's medallion and the Vizier's staff) were created to explain their survival of the Sands' release, with the Dagger also becoming integral to gameplay. The Prince's narration was both difficult and satisfying for Mechner. It needed to be written to work on two levels: first to be understandable for first-time players, and to gain greater significance upon future playthroughs. The narration also served to give gentle hints to the player, and expand upon the setting and add depth to the experience. Among his cited reference points for the narration were the 1940s version of </span><i data-dcnode-id="5797"><a data-dcnode-id="5798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Thief_of_Bagdad_%281940_film%29" title="The Thief of Bagdad (1940 film)"><span data-dcnode-id="5799" instrument_node="">The Thief of Bagdad</span></a></i><span data-dcnode-id="5796" instrument_node="">, the works of </span><a data-dcnode-id="5794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edgar_Allan_Poe" title="Edgar Allan Poe"><span data-dcnode-id="5795" instrument_node="">Edgar Allan Poe</span></a><span data-dcnode-id="5793" instrument_node="">, and films such as </span><i data-dcnode-id="5790"><a data-dcnode-id="5791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Double_Indemnity" title="Double Indemnity"><span data-dcnode-id="5792" instrument_node="">Double Indemnity</span></a></i><span data-dcnode-id="5789" instrument_node=""> and </span><i data-dcnode-id="5786"><a data-dcnode-id="5787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sunset_Boulevard_%28film%29" title="Sunset Boulevard (film)"><span data-dcnode-id="5788" instrument_node="">Sunset Boulevard</span></a></i><span data-dcnode-id="5785" instrument_node="">. The Prince's interactions with Farah were also an important factor. As part of the character interaction, Farah was deliberately designed not to be a perfect archer, sometimes hitting the Prince if he strayed into her line of fire. Despite this, unspecified features planned for her needed to be cut.</span><sup class="reference" data-dcnode-id="5782" id="cite_ref-SoTwriting_12-6"><a data-dcnode-id="5783" href="#cite_note-SoTwriting-12"><span data-dcnode-id="5784" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5781" instrument_node="">
</span></p><span data-dcnode-id="5779" instrument_node="">
</span><h3 data-dcnode-id="5769"><span class="mw-headline" data-dcnode-id="5777" id="Audio"><span data-dcnode-id="5778" instrument_node="">Audio</span></span><span class="mw-editsection" data-dcnode-id="5770"><span class="mw-editsection-bracket" data-dcnode-id="5775"><span data-dcnode-id="5776" instrument_node="">[</span></span><a data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time%26action%3Dedit%26section%3D5" title="Edit section: Audio"><span data-dcnode-id="5774" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5771"><span data-dcnode-id="5772" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5768" instrument_node="">
</span><p data-dcnode-id="5712"><span data-dcnode-id="5767" instrument_node="">The music for </span><i data-dcnode-id="5765"><span data-dcnode-id="5766" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="5764" instrument_node=""> was composed by </span><a data-dcnode-id="5762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stuart_Chatwood" title="Stuart Chatwood"><span data-dcnode-id="5763" instrument_node="">Stuart Chatwood</span></a><span data-dcnode-id="5761" instrument_node=""> of the Canadian rock band </span><a data-dcnode-id="5759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Tea_Party" title="The Tea Party"><span data-dcnode-id="5760" instrument_node="">The Tea Party</span></a><span data-dcnode-id="5758" instrument_node="">.</span><sup class="reference" data-dcnode-id="5755" id="cite_ref-DVDfeature_4-1"><a data-dcnode-id="5756" href="#cite_note-DVDfeature-4"><span data-dcnode-id="5757" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="5752" id="cite_ref-TracksChatwood_25-0"><a data-dcnode-id="5753" href="#cite_note-TracksChatwood-25"><span data-dcnode-id="5754" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5751" instrument_node=""> Chatwood was chosen for the role as Ubisoft wanted music that had Persian elements in it to fit the setting, while not being pure Persian music. When he was approached, Chatwood expanded his music library as part of his research. To achieve the desired effect, rock elements were mixed with Middle Eastern music and melodies, along with Indian elements. Chatwood used different instruments, including an Indian tabla and strings, along with vocal tracks by </span><a data-dcnode-id="5749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cindy_Gomez" title="Cindy Gomez"><span data-dcnode-id="5750" instrument_node="">Cindy Gomez</span></a><span data-dcnode-id="5748" instrument_node=""> and </span><a data-dcnode-id="5746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maryem_Tollar" title="Maryem Tollar"><span data-dcnode-id="5747" instrument_node="">Maryem Tollar</span></a><span data-dcnode-id="5745" instrument_node="">.</span><sup class="reference" data-dcnode-id="5742" id="cite_ref-DVDfeature_4-2"><a data-dcnode-id="5743" href="#cite_note-DVDfeature-4"><span data-dcnode-id="5744" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="5739" id="cite_ref-TracksChatwood_25-1"><a data-dcnode-id="5740" href="#cite_note-TracksChatwood-25"><span data-dcnode-id="5741" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5738" instrument_node=""> A soundtrack album for the game, </span><i data-dcnode-id="5736"><span data-dcnode-id="5737" instrument_node="">Prince of Persia: The Sands of Time Original Soundtrack</span></i><span data-dcnode-id="5735" instrument_node="">, was released in Japan on 20 October 2004 by Scitron Digital Content.</span><sup class="reference" data-dcnode-id="5732" id="cite_ref-26"><a data-dcnode-id="5733" href="#cite_note-26"><span data-dcnode-id="5734" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5731" instrument_node=""> Tracks from the game were included in an album featuring music from both </span><i data-dcnode-id="5729"><span data-dcnode-id="5730" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="5728" instrument_node=""> and its two sequels </span><i data-dcnode-id="5725"><a data-dcnode-id="5726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_Warrior_Within" title="Prince of Persia: Warrior Within"><span data-dcnode-id="5727" instrument_node="">Warrior Within</span></a></i><span data-dcnode-id="5724" instrument_node=""> and </span><i data-dcnode-id="5721"><a data-dcnode-id="5722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Two_Thrones" title="Prince of Persia: The Two Thrones"><span data-dcnode-id="5723" instrument_node="">The Two Thrones</span></a></i><span data-dcnode-id="5720" instrument_node="">. Titled </span><i data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">Prince Of Persia The Official Trilogy Soundtrack</span></i><span data-dcnode-id="5717" instrument_node="">, the album was released by Ubisoft on 1 December 2005.</span><sup class="reference" data-dcnode-id="5714" id="cite_ref-27"><a data-dcnode-id="5715" href="#cite_note-27"><span data-dcnode-id="5716" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5713" instrument_node="">
</span></p><p data-dcnode-id="5685"><span data-dcnode-id="5711" instrument_node="">For the sound effects, the team worked with sound company Dane Tracks to create most of the game's sound effects, with the rest being done by Ubisoft Montreal. To make the enemies in the game stand out, the sound team mixed "organic and evil" sound effects with whispering sounds, rather than using sound effects associated with the </span><a data-dcnode-id="5709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Undead" title="Undead"><span data-dcnode-id="5710" instrument_node="">undead</span></a><span data-dcnode-id="5708" instrument_node="">.</span><sup class="reference" data-dcnode-id="5705" id="cite_ref-DVDfeature_4-3"><a data-dcnode-id="5706" href="#cite_note-DVDfeature-4"><span data-dcnode-id="5707" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5704" instrument_node=""> Mechner supervised the game's voice recording.</span><sup class="reference" data-dcnode-id="5701" id="cite_ref-IGNhistory_18-2"><a data-dcnode-id="5702" href="#cite_note-IGNhistory-18"><span data-dcnode-id="5703" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5700" instrument_node=""> One of the unconventional choices made by the team was not to halt gameplay during in-game dialogue, meaning players could miss large portions of character interaction. In addition to story-based dialogue and banter, context-specific dialogue was written for certain situations. Over one thousand lines of dialogue were written, though over half of them were cut. To help with voice recording, the recording team created a graph to help the actors playing the Prince and Farah time their exchanges correctly. Aside from some exceptions which played in sequence, all comments made by Farah when the Prince did a specific thing were stand-alone responses.</span><sup class="reference" data-dcnode-id="5697" id="cite_ref-SoTwriting_12-7"><a data-dcnode-id="5698" href="#cite_note-SoTwriting-12"><span data-dcnode-id="5699" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5696" instrument_node=""> The Prince was voiced by </span><a data-dcnode-id="5694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yuri_Lowenthal" title="Yuri Lowenthal"><span data-dcnode-id="5695" instrument_node="">Yuri Lowenthal</span></a><span data-dcnode-id="5693" instrument_node="">, whose performance was proven popular and would return to voice the character in future games set after </span><i data-dcnode-id="5691"><span data-dcnode-id="5692" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="5690" instrument_node="">. Speaking in a 2008 interview, Lowenthal felt "that [he] in a way originated that role".</span><sup class="reference" data-dcnode-id="5687" id="cite_ref-PrinceLowenthall_28-0"><a data-dcnode-id="5688" href="#cite_note-PrinceLowenthall-28"><span data-dcnode-id="5689" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5686" instrument_node="">
</span></p><span data-dcnode-id="5684" instrument_node="">
</span><h2 data-dcnode-id="5674"><span class="mw-headline" data-dcnode-id="5682" id="Release"><span data-dcnode-id="5683" instrument_node="">Release</span></span><span class="mw-editsection" data-dcnode-id="5675"><span class="mw-editsection-bracket" data-dcnode-id="5680"><span data-dcnode-id="5681" instrument_node="">[</span></span><a data-dcnode-id="5678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time%26action%3Dedit%26section%3D6" title="Edit section: Release"><span data-dcnode-id="5679" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5676"><span data-dcnode-id="5677" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5673" instrument_node="">
</span><p data-dcnode-id="5626"><i data-dcnode-id="5671"><span data-dcnode-id="5672" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="5670" instrument_node=""> was announced in March 2003.</span><sup class="reference" data-dcnode-id="5667" id="cite_ref-29"><a data-dcnode-id="5668" href="#cite_note-29"><span data-dcnode-id="5669" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5666" instrument_node=""> It was released for the </span><a data-dcnode-id="5664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PlayStation_2" title="PlayStation 2"><span data-dcnode-id="5665" instrument_node="">PlayStation 2</span></a><span data-dcnode-id="5663" instrument_node="">, </span><a data-dcnode-id="5661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xbox_%28console%29" title="Xbox (console)"><span data-dcnode-id="5662" instrument_node="">Xbox</span></a><span data-dcnode-id="5660" instrument_node="">, </span><a data-dcnode-id="5658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GameCube" title="GameCube"><span data-dcnode-id="5659" instrument_node="">GameCube</span></a><span data-dcnode-id="5657" instrument_node="">, </span><a data-dcnode-id="5655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Game_Boy_Advance" title="Game Boy Advance"><span data-dcnode-id="5656" instrument_node="">Game Boy Advance</span></a><span data-dcnode-id="5654" instrument_node=""> and </span><a data-dcnode-id="5652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsoft_Windows" title="Microsoft Windows"><span data-dcnode-id="5653" instrument_node="">Microsoft Windows</span></a><span data-dcnode-id="5651" instrument_node="">. The versions were released gradually between October and November 2003. The various versions had multiple differences in both graphics and control options. The GameCube and Xbox versions included a documentary about the making of the game. The PC port came with support for EAX, EAX2, and EAX3 Advanced HD. </span><a data-dcnode-id="5649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gameloft" title="Gameloft"><span data-dcnode-id="5650" instrument_node="">Gameloft</span></a><span data-dcnode-id="5648" instrument_node=""> developed a version of the game for mobile phones, which released in April 2004. Two versions were developed for higher and lower-spec mobile phones.</span><sup class="reference" data-dcnode-id="5645" id="cite_ref-30"><a data-dcnode-id="5646" href="#cite_note-30"><span data-dcnode-id="5647" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="5642" id="cite_ref-IGNmobile_31-0"><a data-dcnode-id="5643" href="#cite_note-IGNmobile-31"><span data-dcnode-id="5644" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5641" instrument_node=""> Connecting the GameCube and Game Boy Advance versions of the game gave access to a port of the original </span><i data-dcnode-id="5639"><span data-dcnode-id="5640" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="5638" instrument_node=""> with the GameCube version, along with the ability for the Prince to automatically regenerate health.</span><sup class="reference" data-dcnode-id="5635" id="cite_ref-32"><a data-dcnode-id="5636" href="#cite_note-32"><span data-dcnode-id="5637" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5634" instrument_node=""> The PS2 version was released in Japan in September 2004. The game was published in the region by Sony Computer Entertainment Japan, who were impressed by both the quality and the praise it earned in the west.</span><sup class="reference" data-dcnode-id="5631" id="cite_ref-33"><a data-dcnode-id="5632" href="#cite_note-33"><span data-dcnode-id="5633" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="5628" id="cite_ref-JPrelease_34-0"><a data-dcnode-id="5629" href="#cite_note-JPrelease-34"><span data-dcnode-id="5630" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5627" instrument_node="">
</span></p><span data-dcnode-id="5625" instrument_node="">
</span><h2 data-dcnode-id="5615"><span class="mw-headline" data-dcnode-id="5623" id="Reception"><span data-dcnode-id="5624" instrument_node="">Reception</span></span><span class="mw-editsection" data-dcnode-id="5616"><span class="mw-editsection-bracket" data-dcnode-id="5621"><span data-dcnode-id="5622" instrument_node="">[</span></span><a data-dcnode-id="5619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time%26action%3Dedit%26section%3D7" title="Edit section: Reception"><span data-dcnode-id="5620" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5617"><span data-dcnode-id="5618" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5614" instrument_node="">
</span><h3 data-dcnode-id="5604"><span class="mw-headline" data-dcnode-id="5612" id="Sales"><span data-dcnode-id="5613" instrument_node="">Sales</span></span><span class="mw-editsection" data-dcnode-id="5605"><span class="mw-editsection-bracket" data-dcnode-id="5610"><span data-dcnode-id="5611" instrument_node="">[</span></span><a data-dcnode-id="5608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time%26action%3Dedit%26section%3D8" title="Edit section: Sales"><span data-dcnode-id="5609" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5606"><span data-dcnode-id="5607" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5603" instrument_node="">
</span><p data-dcnode-id="5543"><span data-dcnode-id="5602" instrument_node="">By the end of 2003, sales of </span><i data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node="">Prince of Persia: The Sands of Time</span></i><span data-dcnode-id="5599" instrument_node=""> had reached 2 million copies, and Ubisoft highlighted the game's success in Europe in a quarterly business report.</span><sup class="reference" data-dcnode-id="5596" id="cite_ref-sales4_35-0"><a data-dcnode-id="5597" href="#cite_note-sales4-35"><span data-dcnode-id="5598" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5595" instrument_node=""> Europe accounted for 1.1 million sales by February 2004;</span><sup class="reference" data-dcnode-id="5592" id="cite_ref-europesales1_36-0"><a data-dcnode-id="5593" href="#cite_note-europesales1-36"><span data-dcnode-id="5594" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5591" instrument_node=""> worldwide sales rose to 2.4 million units by the end of March.</span><sup class="reference" data-dcnode-id="5588" id="cite_ref-sales5_37-0"><a data-dcnode-id="5589" href="#cite_note-sales5-37"><span data-dcnode-id="5590" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5587" instrument_node=""> During its North American debut, the game suffered from poor sales: by December, the PS2 version had sold 218,000 copies, the Xbox version 128,000 copies, and the GameCube version 85,000 copies. Its combined sales since release at that time totaled 272,000 (PS2), 172,000 (Xbox), and 100,000 copies (GameCube). It was speculated that its sales were negatively affected by the concurrent release of </span><i data-dcnode-id="5585"><span data-dcnode-id="5586" instrument_node="">Beyond Good &amp; Evil</span></i><span data-dcnode-id="5584" instrument_node="">, alongside other prominent releases at the time. In response to this, Ubisoft offered copies of their other games free with purchases of </span><i data-dcnode-id="5582"><span data-dcnode-id="5583" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="5581" instrument_node="">, providing a boost to sales.</span><sup class="reference" data-dcnode-id="5578" id="cite_ref-38"><a data-dcnode-id="5579" href="#cite_note-38"><span data-dcnode-id="5580" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5577" instrument_node=""> By July 2006, the game's PlayStation 2 version alone had sold 700,000 copies in North America, bringing an estimated revenue of $24 million.</span><sup class="reference" data-dcnode-id="5574" id="cite_ref-Edge100_39-0"><a data-dcnode-id="5575" href="#cite_note-Edge100-39"><span data-dcnode-id="5576" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5573" instrument_node=""> During its week of release in Japan, the game reached seventh place in the charts, selling 14,000 copies. This was noted as being high for a western game released in Japan. By the end of 2004, it had sold 26,116 copies.</span><sup class="reference" data-dcnode-id="5570" id="cite_ref-JPrelease_34-1"><a data-dcnode-id="5571" href="#cite_note-JPrelease-34"><span data-dcnode-id="5572" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="5567" id="cite_ref-40"><a data-dcnode-id="5568" href="#cite_note-40"><span data-dcnode-id="5569" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5566" instrument_node=""> It received a "Gold" sales award from the </span><a class="mw-redirect" data-dcnode-id="5564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Entertainment_and_Leisure_Software_Publishers_Association" title="Entertainment and Leisure Software Publishers Association"><span data-dcnode-id="5565" instrument_node="">Entertainment and Leisure Software Publishers Association</span></a><span data-dcnode-id="5563" instrument_node=""> (ELSPA),</span><sup class="reference" data-dcnode-id="5560" id="cite_ref-goldelspa_41-0"><a data-dcnode-id="5561" href="#cite_note-goldelspa-41"><span data-dcnode-id="5562" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5559" instrument_node=""> indicating sales of at least 200,000 copies in the United Kingdom.</span><sup class="reference" data-dcnode-id="5556" id="cite_ref-gamasutrasales_42-0"><a data-dcnode-id="5557" href="#cite_note-gamasutrasales-42"><span data-dcnode-id="5558" instrument_node="">[41]</span></a></sup><span data-dcnode-id="5555" instrument_node=""> As of 2014</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="5552" style="display:none;"><a class="external text" data-dcnode-id="5553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_of_Persia%3A_The_Sands_of_Time%26action%3Dedit"><span data-dcnode-id="5554" instrument_node="">[update]</span></a></sup><span data-dcnode-id="5551" instrument_node="">, the game has sold over 14</span><span class="nowrap" data-dcnode-id="5549"><span data-dcnode-id="5550" instrument_node="">&nbsp;</span></span><span data-dcnode-id="5548" instrument_node="">million copies worldwide, across all platforms.</span><sup class="reference" data-dcnode-id="5545" id="cite_ref-HouseOfDreams_43-0"><a data-dcnode-id="5546" href="#cite_note-HouseOfDreams-43"><span data-dcnode-id="5547" instrument_node="">[42]</span></a></sup><span data-dcnode-id="5544" instrument_node="">
</span></p><span data-dcnode-id="5542" instrument_node="">
