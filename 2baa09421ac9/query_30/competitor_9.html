</span><h3 data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">An evil proposal...</span></h3><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">In the Sultan's absence, the grand Vissor Jaffar ruled the kingdom with an iron fist. Bent on maintaining control when the Sultan returns, Jaffar demanded the hand of the Sultan's daughter in marriage. However, she fell in love with a travelling prince from another country! But what Jaffar wants, Jaffar gets! Jaffar quickly hunted down the traveler and imprisoned him in the dungeons so that he would not stop Jaffar's wedding to the princess. The princess, however, would have nothing to do with Jaffar, so he gave her two hours to live unless she would marry him! Is there any hope for the lovers?</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">After being beaten and dragged to the dungeons, you the traveler, overhear guards talking about Jaffar's mad demand. You only have two hours to get to the princess! Based on the popular computer version, this cart is filled with superb animation and sounds that give it a movie-like feel. Just to make things better, there are 20 levels that need to be explored before you can get to your beloved and the final showdown with Jaffar! There are plenty of traps, hidden pressure plates and guards to make an adventurer grit his or her teeth in excitement! You will hang from perilous ledges, leap through fields of spikes, dash through a hall of weak floor panels and face many more dangers. So, make sure that your skills are at their peak, because this is going to be one rough trip!</span></p><span data-dcnode-id="1230" instrument_node="">
</span><div class="row" data-dcnode-id="1216"><span data-dcnode-id="1229" instrument_node="">
</span><div class="review-footer gray col-6" data-dcnode-id="1224"><span data-dcnode-id="1228" instrument_node="">
</span><span class="highlight" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">reggie</span></span><span data-dcnode-id="1225" instrument_node=""> posted a review
					</span></div><span data-dcnode-id="1223" instrument_node="">
</span><div class="review-footer gray col-6 text-right" data-dcnode-id="1218"><span data-dcnode-id="1222" instrument_node="">
			Overall rating: </span><span class="review-rating" data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">9</span></span><span data-dcnode-id="1219" instrument_node="">
</span></div><span data-dcnode-id="1217" instrument_node="">
</span></div><span data-dcnode-id="1215" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1186"><div class="game-info" data-dcnode-id="1206"><span data-dcnode-id="1213" instrument_node="">
</span><ul data-dcnode-id="1208"><span data-dcnode-id="1212" instrument_node="">
</span><li data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Domark / Game Gear</span></li><span data-dcnode-id="1209" instrument_node="">
</span></ul><span data-dcnode-id="1207" instrument_node="">
</span></div><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">While Prince of Persia may be coming to every video game system, the game just never seems to grow tiresome. The Game Gear version contains the same fluid animation and crisp graphics that made every other version so great! Many traps await your every mistake. So hop to it and rescue your woman from a nasty wizard!</span></p><span data-dcnode-id="1202" instrument_node="">
</span><div class="row" data-dcnode-id="1188"><span data-dcnode-id="1201" instrument_node="">
</span><div class="review-footer gray col-6" data-dcnode-id="1196"><span data-dcnode-id="1200" instrument_node="">
</span><span class="highlight" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">reggie</span></span><span data-dcnode-id="1197" instrument_node=""> posted a review
					</span></div><span data-dcnode-id="1195" instrument_node="">
</span><div class="review-footer gray col-6 text-right" data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node="">
			Overall rating: </span><span class="review-rating" data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">9.5</span></span><span data-dcnode-id="1191" instrument_node="">
</span></div><span data-dcnode-id="1189" instrument_node="">
</span></div><span data-dcnode-id="1187" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1134"><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Tengen's new game lineup is going to prove once and for all that they are a force to be reckoned with in the video game industry. Never a company to rest on its laurels, Tengen has some truly impressive games slated for the upcoming months. Here are just a few of the Tengen titles which will be released soon on the various gaming platforms.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">The first game, Prince of Persia, is an extremely popular title which will be released for the Sega Genesis. Featuring unbelievably fluid animation combined with a great story line, Prince of Persia will situate itself as one of the more popular of the new carts for the Genesis.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">The second game is Bubba'N Stix which is an action game for the Genesis with a twist. Here, you control the actions of Bubba who uses his pal Stix to wipe out enemies, climb walls and perform other assorted-tasks. Stix is, quite literally, a stick with a certain...how shall we say it... utilitarian value. This looks to be a very fresh concept as well as a really fun game!</span></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1176" instrument_node="">The next game is a Sega CD shooter called Soul Star. Following in the paths of </span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamefabrique.com/games/star-fox/"><span data-dcnode-id="1175" instrument_node="">Star Fox</span></a><span data-dcnode-id="1173" instrument_node=""> and </span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamefabrique.com/games/silpheed/"><span data-dcnode-id="1172" instrument_node="">Silpheed</span></a><span data-dcnode-id="1170" instrument_node="">, Soul Star uses special effects and rough-and-tumble game play to blast you through the cosmos. The scaling effects are among the cleanest, most precise ever seen on the home gaming market. It's a real killer! The final game, which is showcased in the following pages, is a battle simulator/ shooter called Battle Corps: Here, you pilot a combination aircraft/tank through different battlefields while using sophisticated instruments and weapons systems to guide your way.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Tengen looks to make its mark in the upcoming year with a barrage of high quality intensely realistic and downright fun video games. Look out world!</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Prince of Persia has finally made its way to the Sega Genesis! Fans of this game who have been waiting patiently for its arrival to the Genesis will not be disappointed.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">The story centers on the kidnapping of the Princess, who is being hostage by an evil Sultan. The Prince has a set amount of time to find her before it's too late! Sounds easy, huh?</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">WRONG-O! The path to the Princess is strewn with booby traps and armed enemies who would sooner lop off one of your ears rather than ask you the time of day!</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Highlighting this cart is the incredibly smooth animation of the characters that made this game so popular on other formats. The challenge is high and the action is very intense.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">This game is no cake-walk, so be prepared for a challenge that will make your Genesis begin to smoke. Right on Tengen!</span></p><span data-dcnode-id="1150" instrument_node="">
</span><div class="row" data-dcnode-id="1136"><span data-dcnode-id="1149" instrument_node="">
</span><div class="review-footer gray col-6" data-dcnode-id="1144"><span data-dcnode-id="1148" instrument_node="">
</span><span class="highlight" data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">reggie</span></span><span data-dcnode-id="1145" instrument_node=""> posted a review
					</span></div><span data-dcnode-id="1143" instrument_node="">
</span><div class="review-footer gray col-6 text-right" data-dcnode-id="1138"><span data-dcnode-id="1142" instrument_node="">
			Overall rating: </span><span class="review-rating" data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">10</span></span><span data-dcnode-id="1139" instrument_node="">
</span></div><span data-dcnode-id="1137" instrument_node="">
</span></div><span data-dcnode-id="1135" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1088"><div class="game-info" data-dcnode-id="1114"><span data-dcnode-id="1133" instrument_node="">
</span><ul data-dcnode-id="1116"><span data-dcnode-id="1132" instrument_node="">
</span><li data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node=""># of players: 1</span></li><span data-dcnode-id="1129" instrument_node="">
</span><li data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Difficulty: Moderate</span></li><span data-dcnode-id="1126" instrument_node="">
</span><li data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Available: February 1994</span></li><span data-dcnode-id="1123" instrument_node="">
</span><li data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">No. of Levels: 12</span></li><span data-dcnode-id="1120" instrument_node="">
</span><li data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Theme: Action</span></li><span data-dcnode-id="1117" instrument_node="">
</span></ul><span data-dcnode-id="1115" instrument_node="">
</span></div><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">You are an adventure from a foreign land who has won the heart of the Sultan's daughter. Knowing you are a threat to his plans, the Grand Vizier has imprisoned you and you must escape the dungeons before he takes the throne.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Like the CD, this version contains all the elements and graphics that made the game a hit. There are plenty of dungeons loaded with guards and dozens of traps. Each level is like a puzzle that has to be solved in order to escape.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">The graphics, although already good, are enhanced with some incredible character animations. The movements of the hero as he runs, jumps, climbs and fight are very impressive.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><div class="row" data-dcnode-id="1090"><span data-dcnode-id="1103" instrument_node="">
</span><div class="review-footer gray col-6" data-dcnode-id="1098"><span data-dcnode-id="1102" instrument_node="">
</span><span class="highlight" data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">reggie</span></span><span data-dcnode-id="1099" instrument_node=""> posted a review
					</span></div><span data-dcnode-id="1097" instrument_node="">
</span><div class="review-footer gray col-6 text-right" data-dcnode-id="1092"><span data-dcnode-id="1096" instrument_node="">
			Overall rating: </span><span class="review-rating" data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">9</span></span><span data-dcnode-id="1093" instrument_node="">
</span></div><span data-dcnode-id="1091" instrument_node="">
</span></div><span data-dcnode-id="1089" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1063"><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">And legs. And even wits. Because in Prince of Persia from Konami, only a fast mind and fit muscles can conquer all 20 Super NES stages, including 8 you've never seen anywhere before.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Once sealed inside the desert palace maze you'll hardly have time to appreciate the awesome high resolution graphics, incredibly cool life-like player animation, and mood setting Arabian melodies. Because when you're not hanging by your fingertips over spiked pits or leaping through razor sharp guillotines, you'll be saber dueling with skeletal remaps and vicious turbaned terrors.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">The sands of time are against you, so you must be constantly on the move, making split second decisions with no margin for error. Is that vessel filled with poison or life giving nectar? Will that floor cave in or open a secret passage? Only the sultan of sin Jaffar knows for sure. And he'll even use magic to keep you from rescuing the princess and becoming the Prince of Persia.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><div class="row" data-dcnode-id="1065"><span data-dcnode-id="1078" instrument_node="">
</span><div class="review-footer gray col-6" data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node="">
</span><span class="highlight" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">reggie</span></span><span data-dcnode-id="1074" instrument_node=""> posted a review
					</span></div><span data-dcnode-id="1072" instrument_node="">
</span><div class="review-footer gray col-6 text-right" data-dcnode-id="1067"><span data-dcnode-id="1071" instrument_node="">
			Overall rating: </span><span class="review-rating" data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">8.5</span></span><span data-dcnode-id="1068" instrument_node="">
</span></div><span data-dcnode-id="1066" instrument_node="">
</span></div><span data-dcnode-id="1064" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1010"><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Bent on total domination of your peaceful land, the insidious Jaffar has imprisoned you so that he may claim the Sultan's daughter, your true love, for himself. After escaping from Jaffar's dungeons, you must now fight your way through eight levels of deadly traps, mysterious paths, and dozens of Jaffar's murderous underlings. This computer classic is now available for the Sega Game Gear.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><div class="game-info" data-dcnode-id="1027"><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">People say:</span></p><span data-dcnode-id="1056" instrument_node="">
</span><div class="numblocks" data-dcnode-id="1050"><div class="span-mark" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">8</span></div><div class="mark-text" data-dcnode-id="1051"><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Most of the features of Prince of Persia  that I have always enjoyed have been retained in the Game Gear translation, Not only does the game deliver some great animation, the traps and challenges that lurk around every corner keep the pace of play at the same addictive levels. I like Prince of Persia and this version.</span></p></div></div><span data-dcnode-id="1049" instrument_node="">
</span><div class="numblocks" data-dcnode-id="1043"><div class="span-mark" data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">8</span></div><div class="mark-text" data-dcnode-id="1044"><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">I was very impressed with this version of the game. Not only were the characters and the pitfalls very easy to see on the small screen, but even the very fluid animation found on the other versions of the game was duplicated almost perfectly. This is a very addicting game and hard to put away. One of the best GG carts.</span></p></div></div><span data-dcnode-id="1042" instrument_node="">
</span><div class="numblocks" data-dcnode-id="1036"><div class="span-mark" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">7</span></div><div class="mark-text" data-dcnode-id="1037"><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">I like this version of P.O.P. because you can bring it with you wherever you go. The graphics are very good for the Game Gear and the animation is cool. The sounds are kind of annoying, but expected from the 8-Bit hardware. The game play is very solid and has lost little if nothing in the translation. Lots of fun.</span></p></div></div><span data-dcnode-id="1035" instrument_node="">
</span><div class="numblocks" data-dcnode-id="1029"><div class="span-mark" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">5</span></div><div class="mark-text" data-dcnode-id="1030"><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">This game has gotten good reviews for every system it has appeared on, but this is an exception. The game play could have been better! What happened? The animation is decent, but for some reason it's choppy. I really was looking for a better playing version than what it is. Still an average game though.</span></p></div></div><span data-dcnode-id="1028" instrument_node="">
</span></div><span data-dcnode-id="1026" instrument_node="">
</span><div class="row" data-dcnode-id="1012"><span data-dcnode-id="1025" instrument_node="">
</span><div class="review-footer gray col-6" data-dcnode-id="1020"><span data-dcnode-id="1024" instrument_node="">
</span><span class="highlight" data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">reggie</span></span><span data-dcnode-id="1021" instrument_node=""> posted a review
					</span></div><span data-dcnode-id="1019" instrument_node="">
</span><div class="review-footer gray col-6 text-right" data-dcnode-id="1014"><span data-dcnode-id="1018" instrument_node="">
			Overall rating: </span><span class="review-rating" data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">7</span></span><span data-dcnode-id="1015" instrument_node="">
</span></div><span data-dcnode-id="1013" instrument_node="">
</span></div><span data-dcnode-id="1011" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="982"><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">You have seen Prince of Persia released on virtually every video gaming format. Well, Victor Musical Industries is introducing its latest version for the Mega CD-ROM.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">As the often repeated story goes, your lovely girlfriend has been kidnapped by an evil dictator and only you can save her.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Prince of Persia features some of the most fluid animation ever seen! As the good Prince travels from place to place, his running movements are displayed with beautiful animation. Even the jumps and climbs of the Prince have to be seen to be believed.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">The most worthy addition is the cinema displays. Each one has sufficient length to keep you interested, while filling you in on the story!</span></p><span data-dcnode-id="998" instrument_node="">
</span><div class="row" data-dcnode-id="984"><span data-dcnode-id="997" instrument_node="">
</span><div class="review-footer gray col-6" data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">
</span><span class="highlight" data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">reggie</span></span><span data-dcnode-id="993" instrument_node=""> posted a review
					</span></div><span data-dcnode-id="991" instrument_node="">
</span><div class="review-footer gray col-6 text-right" data-dcnode-id="986"><span data-dcnode-id="990" instrument_node="">
			Overall rating: </span><span class="review-rating" data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">9.5</span></span><span data-dcnode-id="987" instrument_node="">
</span></div><span data-dcnode-id="985" instrument_node="">
</span></div><span data-dcnode-id="983" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="963"><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">You are the prince of Persia and your woman has been kidnapped by the evil wizard. He has taken her to his castle and locked her in a jail cell at the top of his castle. This castle is a huge maze, made up of many levels of endless catacombs. You must find the correct path to the top and survive the onslaught of enemy soldiers in your way.</span></p><span data-dcnode-id="979" instrument_node="">
</span><div class="row" data-dcnode-id="965"><span data-dcnode-id="978" instrument_node="">
</span><div class="review-footer gray col-6" data-dcnode-id="973"><span data-dcnode-id="977" instrument_node="">
</span><span class="highlight" data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">reggie</span></span><span data-dcnode-id="974" instrument_node=""> posted a review
					</span></div><span data-dcnode-id="972" instrument_node="">
</span><div class="review-footer gray col-6 text-right" data-dcnode-id="967"><span data-dcnode-id="971" instrument_node="">
			Overall rating: </span><span class="review-rating" data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">10</span></span><span data-dcnode-id="968" instrument_node="">
</span></div><span data-dcnode-id="966" instrument_node="">
</span></div><span data-dcnode-id="964" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="923"><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">The Prince is back solving puzzles, leaping chasms, swordfighting, and dodging traps, all to save the princess from Jaffar. But in Prince of Persia 2, someone turned on the lights!</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">The graphics are livelier with well-lit, detailed dungeons and outdoor scenes. Unfortunately, the characters are outlined in retro-black and are fairly small. The music is still eerie, but this game could use more demonstrative sound effects.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">A tough thinking-gamer's game, POP2 is a decent adventure. </span></p><span data-dcnode-id="954" instrument_node="">
</span><div class="game-info" data-dcnode-id="940"><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">ProTips:</span></p><span data-dcnode-id="950" instrument_node="">
</span><ul data-dcnode-id="942"><span data-dcnode-id="949" instrument_node="">
</span><li data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Let yourself down by your hands whenever you can.</span></li><span data-dcnode-id="946" instrument_node="">
</span><li data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Keep running after you cross the bridge or you won't make the leap onto the ship.</span></li><span data-dcnode-id="943" instrument_node="">
</span></ul><span data-dcnode-id="941" instrument_node="">

			Overall rating: </span><span class="review-rating" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">7.5</span></span><span data-dcnode-id="928" instrument_node="">
</span></div><span data-dcnode-id="926" instrument_node="">
</span></div><span data-dcnode-id="924" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="895"><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">In a time of darkness, while the Sultan is off fighting a foreign war, his Grand Vizier Jaffar has seized the reins of power. Throughout the land, people groan under the yoke of tyranny, and dream of better days.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">You are the only obstacle between Jaffar and the throne. An adventurer from a foreign land, innocent of palace intrigues, you have won the heart of the Sultan's lovely young daughter. And in so doing, you have unwittingly made a powerful enemy.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">On Jaffar's orders, you are arrested, stripped of your sword and possessions, and thrown into the Sultan's dungeons. As for the princess, Jaffar gives her a choice, and an hour to decide. Marry him - or die.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Locked in her room high in the palace tower, the Princess rests all her hopes on you. For when the last sands drain from the hourglass, her choice can bring only a throne for the Grand Vizier... a new reign of terror for his long-suffering subjects... and death for the brave young youth who might have been... Prince of Persia. </span></p><span data-dcnode-id="911" instrument_node="">
</span><div class="row" data-dcnode-id="897"><span data-dcnode-id="910" instrument_node="">
</span><div class="review-footer gray col-6" data-dcnode-id="905"><span data-dcnode-id="909" instrument_node="">
</span><span class="highlight" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">reggie</span></span><span data-dcnode-id="906" instrument_node=""> posted a review
					</span></div><span data-dcnode-id="904" instrument_node="">
</span><div class="review-footer gray col-6 text-right" data-dcnode-id="899"><span data-dcnode-id="903" instrument_node="">
			Overall rating: </span><span class="review-rating" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">9</span></span><span data-dcnode-id="900" instrument_node="">
</span></div><span data-dcnode-id="898" instrument_node="">
</span></div><span data-dcnode-id="896" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="864"><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Broderbund's Prince of Persia is the Amiga version of a game previously released for the Apple II and PC compatibles. What sets it apart from most other action games is the remarkable cartoon-like animation that makes its characters seem to come alive. But that's not surprising, because game designer Jordon Mechner achieved this realism the same way cartoonists do — by studying film footage and still photos of live models. So while the figures in this game may not have detailed features, they run, leap, climb ledges, and duel just like movie heroes.</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Aside from the lifelike animation, Prince of Persia is a fairly standard action game in which you must escape from a many-leveled dungeon in order to rescue a princess. There are plenty of puzzles to solve, including floors that crumble beneath your feet and iron gates that open or close when you step on certain panels.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Another twist is that you have only one hour to rescue the princess, and the game counts down your time as you make your way through the dungeon. You can save a game in progress, but only after reaching the third level.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">The realistic animation can take some getting used to, however. Since the arm and leg motions of your character are so natural, they don't always respond instantly to the joystick. For that reason, you should keep pressing the joystick in the desired direction until the action is completed.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">For example, if you move the stick upward to jump and then release it too soon, the jump may not come off quite right, and you'll find yourself in a crumpled heap at the bottom of a pit. Hint: Try using the keyboard instead of the joystick. I was able to make good running jumps by holding down the left or right arrow key, and then pressing and holding the diagonal-up key at the same time.</span></p><span data-dcnode-id="880" instrument_node="">
</span><div class="row" data-dcnode-id="866"><span data-dcnode-id="879" instrument_node="">
