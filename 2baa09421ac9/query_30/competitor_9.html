</span><p data-dcnode-id="2681"><a data-dcnode-id="2683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamefabrique.com/developers/tengen/"><span data-dcnode-id="2684" instrument_node="">Tengen</span></a><span data-dcnode-id="2682" instrument_node=""> challenges you to rescue the Princess and become the Prince of Persia. There's only one small problem: Jaffar has had you arrested, stripped of your sword, and thrown into his dungeon. You have only 60 minutes to escape, save the Princess, and dethrone Jaffar. Good luck!</span></p><span data-dcnode-id="2680" instrument_node="">
</span><h3 data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">A Princely Delight</span></h3><span data-dcnode-id="2677" instrument_node="">
</span><p data-dcnode-id="2669"><span data-dcnode-id="2676" instrument_node="">Prince of Persia is a royal Genesis action/adventure game that's very similar to </span><a data-dcnode-id="2674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamefabrique.com/games/flashback/"><span data-dcnode-id="2675" instrument_node="">Flashback</span></a><span data-dcnode-id="2673" instrument_node=""> and </span><a data-dcnode-id="2671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamefabrique.com/games/out-of-this-world/"><span data-dcnode-id="2672" instrument_node="">Out of this World</span></a><span data-dcnode-id="2670" instrument_node="">. Strategy and fast fingers are essential if you intend to survive.</span></p><span data-dcnode-id="2668" instrument_node="">
</span><div class="game-info" data-dcnode-id="2663"><span data-dcnode-id="2667" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">ProTip: In Level One, you'll find these two flasks. The one on the left contains poison, but the one on the right revitalizes your health.</span></p><span data-dcnode-id="2664" instrument_node="">
</span></div><span data-dcnode-id="2662" instrument_node="">
</span><p data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">You must fight through 14 levels filled with traps and Jaffar's soldiers. Hack-n-slashers get action-packed sword fights, but making the Prince run, jump, leap, and climb to overcome lethal obstacles such as trap doors and beds of spikes are your keys to success.</span></p><span data-dcnode-id="2659" instrument_node="">
</span><p data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">The controls are very good, but mastering them is the most difficult part of this game. You must take many running jumps over deadly chasms. At first, frustration is a factor, because beginners will make a running start to jump over a pit and end up running into it, instead. Don't give up.</span></p><span data-dcnode-id="2656" instrument_node="">
</span><h3 data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">Royal Graphics, Common Sounds</span></h3><span data-dcnode-id="2653" instrument_node="">
</span><p data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">Prince's graphics are fit for a king. The intro screens are especially nice, and the game play screens have sharp detail. They aren't too colorful, but, hey, you're in a dungeon! Your character's movements are extremely fluid, giving the Prince lifelike action.</span></p><span data-dcnode-id="2650" instrument_node="">
</span><div class="game-info" data-dcnode-id="2639"><span data-dcnode-id="2649" instrument_node="">
</span><ul data-dcnode-id="2641"><span data-dcnode-id="2648" instrument_node="">
</span><li data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Always check above you for hidden passages. They generally lead to power-ups or shortcuts.</span></li><span data-dcnode-id="2645" instrument_node="">
</span><li data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Your first quest should be for a Sword. You're doomed without it.</span></li><span data-dcnode-id="2642" instrument_node="">
</span></ul><span data-dcnode-id="2640" instrument_node="">
</span></div><span data-dcnode-id="2638" instrument_node="">
</span><p data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">The sounds are solid, but they lack magic. Here's a game that cries out for exotic mood music, but the meager tunes, although they have Middle Eastern flair, are nonexistent during game play. Audio effects, on the other hand, are clean and clear throughout, from the clack of your footsteps to the clang of steel hitting steel.</span></p><span data-dcnode-id="2635" instrument_node="">
</span><div class="game-info" data-dcnode-id="2630"><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Precise timing is the key here. Jump just as the jaws begin to open. </span></p><span data-dcnode-id="2631" instrument_node="">
</span></div><span data-dcnode-id="2629" instrument_node="">
</span><h3 data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Royal Blood</span></h3><span data-dcnode-id="2626" instrument_node="">
</span><p data-dcnode-id="2621"><span data-dcnode-id="2625" instrument_node="">The legacy continues with excellent results. How does Prince of Persia compare to the SNES version? Simply put, the Genesis version has better graphics, and the </span><a data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamefabrique.com/snes/"><span data-dcnode-id="2624" instrument_node="">SNES</span></a><span data-dcnode-id="2622" instrument_node=""> has better music. Otherwise, the two are identical in almost every way, including the most important way...fun! Prince of Persia is a royal treat. </span></p><span data-dcnode-id="2620" instrument_node="">

</span></div></div><div data-dcnode-id="1972" id="last"></div><div class="row" data-dcnode-id="863"><div class="col-md-12" data-dcnode-id="1969"><h2 data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Game Reviews</span></h2></div><div class="col-md-12 review" data-dcnode-id="1868"><p data-dcnode-id="1966"><strong data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">The Prince of Persia, one of gamedom's most famous heroes, has been called into service once again. Jaffar, a vile Prime Minister, has snatched the Princess and holds her hostage in the Sultan King's palace. His sinister plot is to take over the country in the King's absence. As the Prince, you must save the Princess and vanquish Jaffar.</span></strong></p><span data-dcnode-id="1965" instrument_node="">
</span><h3 data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Open Sesame</span></h3><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">Prince of Persia, one of the best known game titles of all time, has made an appearance on almost every PC and video game platform. At long last, Konami brings us the Super Nintendo version. Fans of the game will rejoice when they plug in this game, hear the first haunting strains of bewitching Middle Eastern music, and catch their first glimpse of the lonely princess awaiting rescue on the castle parapets. This translation is a feast for the eyes, the ears, and all your other senses. It's just about the ultimate in challenge for expert gamers!</span></p><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">For the uninitiated, the Prince's task is to battle his way to the Princess by making his way through 20 vertically-and horizontally-scrolling, side-view castle levels. Prince of Persia veterans will recognize some of the levels, but also find some entirely new ones. The quest begins in the bowels of the castle prison, where the Prince has been locked away to rot with more than a few fellow unfortunates. To find the door that leads to the next level, our hero makes his way through a winding labyrinth of tunnels, passageways, ledges, deadly drops, gates, spear traps, demonic pendulums, walls of flame, and other evils almost too horrible to contemplate.</span></p><span data-dcnode-id="1956" instrument_node="">
</span><div class="game-info" data-dcnode-id="1942"><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">ProTips:</span></p><span data-dcnode-id="1952" instrument_node="">
</span><ul data-dcnode-id="1944"><span data-dcnode-id="1951" instrument_node="">
</span><li data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">Your first task in Level 1 is to find the Sword. Survival is impossible without it. When you reach the first passageway, where you must move left or right, move left. Go left through the first three gates. Drop down the left side of the hole in the floor and climb down all four ledges. Move left and climb down to the wooden walkway. Run right until you find the Sword!</span></li><span data-dcnode-id="1948" instrument_node="">
</span><li data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Prince of Persia players will find some levels more familiar than others. Level 3 contains the famous "leap of faith". Open the gate to the far left with the panel on the far right tower. Then RUN and jump as fast as you can. If you're quick, you may just make it through the gate.</span></li><span data-dcnode-id="1945" instrument_node="">
</span></ul><span data-dcnode-id="1943" instrument_node="">
</span></div><span data-dcnode-id="1941" instrument_node="">
</span><h3 data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Slice and Dice</span></h3><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1930"><span data-dcnode-id="1937" instrument_node="">Alas, sinister foes and minions of the evil Jaffar also lie in wait for the Prince. He'll encounter lowly Soldiers, fat but crafty Politicians, Knights in Golden Armor, </span><a data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamefabrique.com/games/skeleton-warriors/"><span data-dcnode-id="1936" instrument_node="">Skeleton Warriors</span></a><span data-dcnode-id="1934" instrument_node="">, and even his own a ego, the </span><a data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamefabrique.com/games/shadow-man/"><span data-dcnode-id="1933" instrument_node="">Shadow Man</span></a><span data-dcnode-id="1931" instrument_node="">. The only way to defeat any of these foes is through sword-slashing, head-to-head battle -- and a hefty dose of quick wits.</span></p><span data-dcnode-id="1929" instrument_node="">
</span><div class="game-info" data-dcnode-id="1918"><span data-dcnode-id="1928" instrument_node="">
</span><ul data-dcnode-id="1920"><span data-dcnode-id="1927" instrument_node="">
</span><li data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Use the terrain around you to finish off your tougher sword-fighting opponents. For example, try to push a soldier off onto some spikes. Skeletons are invincible. One way to defeat them is to knock them off ledges. They'll fall and smash the pieces. </span></li><span data-dcnode-id="1924" instrument_node="">
</span><li data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">The easiest way to survive a sword fight is to stand still and let your foe attack you. When they get within striking distance, quickly slash them. Repeat this procedure until they're done for.</span></li><span data-dcnode-id="1921" instrument_node="">
</span></ul><span data-dcnode-id="1919" instrument_node="">
</span></div><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Fortunately, the Prince is agile, strong, and clever beyond compare. Unluckily for him, you're in control! The Prince's repertoire of moves is fairly large, complicated and somewhat difficult to learn. It's up to you to master the Prince's many moves and guide him through his perilous journey. The Super Nintendo version captures the animated movement that's always been a standout quality of the game. The Prince looks real as he runs, jumps, climbs, crouches, shuffles, crosses swords with enemies, and skids to a halt through the castle passageways. </span></p><span data-dcnode-id="1914" instrument_node="">
</span><div class="game-info" data-dcnode-id="1906"><span data-dcnode-id="1913" instrument_node="">
</span><ul data-dcnode-id="1908"><span data-dcnode-id="1912" instrument_node="">
</span><li data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Always hold down Up on your control pad while you jump. If you miss your jump, or if it's a long jump, your hands will usually graze the edge of the ledge and grab onto it. Then you can pull yourself up to safety.</span></li><span data-dcnode-id="1909" instrument_node="">
</span></ul><span data-dcnode-id="1907" instrument_node="">
</span></div><span data-dcnode-id="1905" instrument_node="">
</span><h3 data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Good Karma</span></h3><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Luckily for you, the Prince apparently had good Karma in another life (and he's had a lot of them)! Scattered here and there throughout the castle are powerful Medicines that restore his health. Of course, Jaffar has also left dangerous potions to tempt you. Poison takes away part of your life, and the Inverter potion turns the screen upside down.</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Successfully negotiating the palace labyrinth requires quick wits, puzzle-solving ability, nimble fingers, calm nerves, and PATIENCE. Advanced and Expert gamers have the best shot at rescuing the Princess, although, Intermediate and Beginning gamers will also enjoy the game (if they're not easily frustrated). Those inexperienced in the ways of the Prince should definitely seek guidance through the five levels of the Training Mode.
With everyone's stress level in mind, Konami has kindly included a password feature that enables you to access your current password at any time during the game. You can also check your best time on any given level, as well as your total time on the overall game. To beat the game, you must finish all 20 levels in 120 minutes.</span></p><span data-dcnode-id="1896" instrument_node="">
</span><div class="game-info" data-dcnode-id="1891"><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Use this password to skip Level 1 and begin at Level 2 armed with the sword and ready for battle: BK1MQEL</span></p><span data-dcnode-id="1892" instrument_node="">
</span></div><span data-dcnode-id="1890" instrument_node="">
</span><h3 data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Shazam!</span></h3><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">4198, gorgeous tunes, and eerie beautifully animated graphics create a beautiful background. Intricate game play that challenges your wits and dexterity finish off the picture. Konami's done it again! Now get going... she's waiting and the sands in the hourglass are running out!</span></p><span data-dcnode-id="1884" instrument_node="">
</span><div class="row" data-dcnode-id="1870"><span data-dcnode-id="1883" instrument_node="">
</span><div class="review-footer gray col-6" data-dcnode-id="1878"><span data-dcnode-id="1882" instrument_node="">
</span><span class="highlight" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">reggie</span></span><span data-dcnode-id="1879" instrument_node=""> posted a review
					</span></div><span data-dcnode-id="1877" instrument_node="">
</span><div class="review-footer gray col-6 text-right" data-dcnode-id="1872"><span data-dcnode-id="1876" instrument_node="">
			Overall rating: </span><span class="review-rating" data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">9.5</span></span><span data-dcnode-id="1873" instrument_node="">
</span></div><span data-dcnode-id="1871" instrument_node="">
</span></div><span data-dcnode-id="1869" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1796"><p data-dcnode-id="1865"><strong data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">If you've never stumbled through a few zillion attempts at Prince of Persia on either the Macintosh, or the Game Boy, your golden opportunity has just arrived. Virgin Games has produced Prince of Persia for your NES.</span></strong></p><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1861"><strong data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Grand Vizier Jaffar has imposed his nasty will upon the Sultan by taking over his palace. He's also given the Sultan's daughter, your lady love, a radically harsh ultimatum -- marry him or die.</span></strong></p><span data-dcnode-id="1860" instrument_node="">
</span><h3 data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Down and Out</span></h3><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Jaffar's peeved 'cause the princess is sweet on you. So, he's tossed you into the dungeon. The prognosis isn't good. You have exactly one hour to work your way through 18 strenuous stages on your way to save the princess.</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">The Sultan didn't spare any change when he built his dungeon. This place is the pits, literally! Each of the 18 stages is comprised of various dead-end ledgesand monstrous iron gates. Also, sword-bearing turbaned terrors are everywhere, ready and waiting to slice-'n-dice you to bits.</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">It only gets worse. Step on the wrong tile and its splatsville when you plummet three stories. Fall a tad short of a ledge when you make a leap towards freedom and a cushy bed of spikes will break your fall. Survive these traps and you eventually come upon the tile which activates the exit door to that stage.</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Fortunately, a sword, as well as a few dozen bottles of potion, have been hidden in the dungeon. Some of the potions are restorative, others are pure poison. It pays to gamble, 'cuz you get endless continues should you lose.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><h3 data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Smooth Moves</span></h3><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Graphically the game is simple, yet clear and attractive. However, it's the animation that really knocks your socks off. All movement appears so smooth and natural that you become half convinced that you really are a tiny man on your T.V. screen.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">However, it takes time to master the many precise moves the prince can perform. To be specific, he can jump upwards, leap forwards, squat, pull himself upwards, lower himself down, and take "baby" steps. The controls are highly sensitive -- too sensitive. It's guaranteed that you're going to panic and pull a dumb move, such as taking a flying leap when you meant to jump up. It's a tossup between what's more difficult-the obstacles or the moves.</span></p><span data-dcnode-id="1836" instrument_node="">
</span><div class="game-info" data-dcnode-id="1819"><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">ProTips:</span></p><span data-dcnode-id="1832" instrument_node="">
</span><ul data-dcnode-id="1821"><span data-dcnode-id="1831" instrument_node="">
</span><li data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Polish your sword skills before you hit Stage 5.</span></li><span data-dcnode-id="1828" instrument_node="">
</span><li data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Look closely for these tiny holes in the ground. They are a dear indication that the floor is rigged with spring-action spikes, which you must leap over or die.</span></li><span data-dcnode-id="1825" instrument_node="">
</span><li data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">All potions found are safe to drink.</span></li><span data-dcnode-id="1822" instrument_node="">
</span></ul><span data-dcnode-id="1820" instrument_node="">
</span></div><span data-dcnode-id="1818" instrument_node="">
</span><h3 data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Hail to the Prince</span></h3><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Prince of Persia is one of the more attractive, unusual, challenging, and nerve-crunching titles that's ever found a home on the NES. Although the ultra smooth animation doesn't shine through quite as brightly here as it does on its more powerful computer cousins, it rates an A+ on the somewhat limited 8-bit scale. If you could, would you be the Prince of Persia? Only a few dozen hours of frustration will tell.</span></p><span data-dcnode-id="1812" instrument_node="">
</span><div class="row" data-dcnode-id="1798"><span data-dcnode-id="1811" instrument_node="">
</span><div class="review-footer gray col-6" data-dcnode-id="1806"><span data-dcnode-id="1810" instrument_node="">
</span><span class="highlight" data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">reggie</span></span><span data-dcnode-id="1807" instrument_node=""> posted a review
					</span></div><span data-dcnode-id="1805" instrument_node="">
</span><div class="review-footer gray col-6 text-right" data-dcnode-id="1800"><span data-dcnode-id="1804" instrument_node="">
			Overall rating: </span><span class="review-rating" data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">8.5</span></span><span data-dcnode-id="1801" instrument_node="">
</span></div><span data-dcnode-id="1799" instrument_node="">
</span></div><span data-dcnode-id="1797" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1741"><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">That's A Working Title, by the way, as this game is still early enough into development that you could harvest it for stem cells without God batting a celestial eyelid.</span></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">As for why you should be excited about it? Well imagine Prince of Persia crossed with Ico and Okanii, all cel-shaded and hand-drawn. Then open the gameplay up to allow for one huge, cohesive world rather than the level-based palaces of old. This isn't just Prince with a new hat on; it's an entirely new breed of Prince altogether, and one we can't wait to make run up a wall.</span></p><span data-dcnode-id="1790" instrument_node="">
</span><h3 data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Formerly Known As...</span></h3><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Inspired by such notable adventure-seekers as Sinbad, Han Solo and Aragom, the new Prince will find himself battling to restore light to ancient Persia.</span></p><span data-dcnode-id="1784" instrument_node="">
</span><h3 data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Glover</span></h3><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">The new Prince can't reverse time, but his new trick will come in the form of this clawlike gauntlet Using this he can control his falls with absolute precision.</span></p><span data-dcnode-id="1778" instrument_node="">
</span><h3 data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Expansive</span></h3><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Gone are the elaborate palace interiors of old, replaced with an ancient non-linear world - probably not terribly unlike the developer's previous title, Assassin's Creed.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><h3 data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Duelism</span></h3><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Rather than fighting hordes of enemies at once, the game will focus more on epic Errol Flynn-style duels against hardened enemies, making every fight count.</span></p><span data-dcnode-id="1766" instrument_node="">
</span><h3 data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Fight Fight Fight</span></h3><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">The Prince will meet allies on his travels, who'll be important to both the story and the gameplay. Ubisoft Montreal are claiming they're focusing most of their effort on Al.</span></p><span data-dcnode-id="1760" instrument_node="">
</span><h3 data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Corruption</span></h3><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Environments will vary from 'safe' areas to dark, corrupted areas. An organic corruption system means this decay will creep through the world as a living substance, challenging and interacting with the Prince.</span></p><span data-dcnode-id="1754" instrument_node="">
</span><h3 data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Creedy Bugger</span></h3><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">The game will use an updated version of Assassin's Creed engine, allowing meticulously hand-sculpted animal and incredible outdoor visuals like.</span></p><span data-dcnode-id="1748" instrument_node="">
</span><div class="review-footer gray" data-dcnode-id="1743"><span data-dcnode-id="1747" instrument_node="">
</span><span class="highlight" data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">reggie</span></span><span data-dcnode-id="1744" instrument_node=""> posted a review
			</span></div><span data-dcnode-id="1742" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1677"><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Prince Of Persia has come a long way from Jordan Mechner's 1989 smoothly-animated platformer which usually ended up with the poor Arabian adventurer impaled on spikes.
After the successful Sands of Time trilogy put the magic back in the Prince's carpet a few years back, Ubisoft is again reinventing POP with a brand new graphics style (see Hard Cel box out), setting, enemies and a fresh hero - and this time, he has a sidekick. Again.</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">The new Prince of Persia begins with an ancient tale of two warring gods, one of whom - Ahriman - goes on an evil bender, spreading nastiness throughout the world in the form of a gloopy black substance called the Corruption. The bad god's brother Ormazd manages to defeat Ahriman's goons, the Corrupted, and also imprisons his evil sibling in a sapling called the Tree of Life. Ormazd then entrusts the care of this woody prison to a race of people called the Ahuras, and for thousands of years the world sleeps safe in its giant space bed, until Ahriman begins to plan his escape.</span></p><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">'I don't think we necessarily reached the limit of what we could do with the previous games' storyline, but that plot seemed like a whole - it was about the Sands of Time, where they came from and how they were destroyed." says creative director, Jean-Christophe Guyot. "Prince of Persia is a universe with many branches inspired by Arabian Nights, and in that you have lots of different tales. We felt this was a good opportunity to start over and have a new story arc and new characters."</span></p><span data-dcnode-id="1732" instrument_node="">
</span><h3 data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Node Future</span></h3><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">The new Prince is a wanderer, dressed in ragged clothing, torn from years of battles, but the luxurious material wrapped around his neck hints at a more regal past. Ubisoft Montreal are creating a beautiful mythical Persia for the hero to explore, built from the Assassin's Creed engine - but does this mean the game is turning its back on previous Prince of Persia titles to become a more open-world gaming experience?</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">"I think we have to be careful how we qualify the world - it's open-ended, but it's not a sandbox or free-roaming game." asserts Guyot. "The previous POP games were very linear in their structure, so we're trying to change that a little bit and give some freedom to the player. But our structure is more like a network, so you have nodes you can reach and in between the nodes are lines of gameplay that connect them. You have a choice of going to whatever node you want, but we're deliberately keeping the rhythm and pacing of the previous POPs."</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">As the Corruption begins to swamp the world when Ahriman is unleashed, parts of the game will be off-limits, while others will be changed and invaded by the terrifying minions of the bad god -which is somewhat reminiscent of the structure in Nintendo's Legend of Zelda: Twilight Princess.</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">"At the beginning the world is open, so you start with every node you want." continues Guyot. "However, the Corruption and the various traps that the Prince has to overcome, are things that enable us to dynamically manage your journey through the game and make Ahriman react to your progress, so the world will evolve as you move on."</span></p><span data-dcnode-id="1717" instrument_node="">
</span><h3 data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Woman Trouble</span></h3><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">As well as a new set of acrobatic moves that will help the Prince negotiate the large environments and city streets, a lethal-looking metal gauntlet has been clamped to his left hand that can be used to slide down sheer cliffs and walls to access hard-to-reach areas.</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">"The gauntlet adds a different dimension to the gameplay. We wanted a more acrobatic style, so this makes it a bit more credible, as it explains his ability to do some of the moves such as the wall-runs," continues Guyot. The metal glove can also be used in combat to lift enemies into the air and slam them down onto the ground, as well as a few other nifty moves yet to be revealed. "We re exaggerating the moves seen in the previous Prince of Persia games. You can run around in the city easily, but we wanted more platform action, so you'll be controlling every jump, unlike the system in Assassin's Creed."</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">However, the biggest change in combat, and the game itself, is the addition of a female companion - Elika. A descendent of the Ahuras (the tree people, remember) and blessed with magical abilities, Elika is a constant sidekick for the Prince, a tool for the player to interact with during acrobatics, combat and puzzle-solving.</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">"Elika is semi-automated - she'll do her own thing, but you can also control her using one button, which is contextual, so for example in combat, she will perform attacks, doing a combo with yon," says Guyot.</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Ubisoft want to build the relationship between you and Elika, who has been inspired by such strong female roles as, arm, Queen Amidala from the Star Wars prequels and, urn, Elizabeth Swann from Pirates of the Caribbean. Go feminism!</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">"The goal is for her to be a function for the player, as well as enhance the relationship and tell the story. We didn't want to have too much of us just telling you the plot through watching cut scenes, so having this character with you all the time is a good way of providing stuff like backstory without stopping the action."</span></p><span data-dcnode-id="1696" instrument_node="">
</span><h3 data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Fighting Talk</span></h3><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">The focus for the combat in the new POP is on duels, rather than melees involving half-a-dozen foes wading into the action, as the development team want each fight to be significant.
"It allows us to get closer to the fighters, get the camera right in there so we can see their emotions and create more dramatic moments," an animated Guyot explains. "We also wanted the Prince to be a more roguish type, a wanderer like Sinbad for example, so killing 10,000 enemies on-screen with huge combos works when you're a barbarian, but it doesn't feel right for an adventurer. The Prince knows how to fight, but we want him to feel human."</span></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">In battles you have the freedom to perform certain actions - you can use your sword, your glove, acrobatics or Elika - and you can also use the environment to smash enemies up against walls and other equally vicious moves. Each of the enemies you'll encounter have varying special magical attacks, but they'll all have the same basic global fighting system, so if they do a grab for example, you have to quickly perform a counter-grab, or they'll hurl you violently through the air. Different monsters require the Prince to use different abilities, but new moves and other tricks will be unlocked as you progress, which will be essential if you don't want to end up being a corrupted pile of Ali Baba.</span></p><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Ubisoft leave taken away with one hand (Splinter Cell: Conviction has been delayed until next year) but given with the gauntlet-enhanced other - and most pressingly, the new Prince of Persia is already lined up for a Christmas launch. Pie new setting, central hero, special moves and weapons, and gorgeous graphical style with smooth land-drawn animation, are all brave departures for the series that previously intoxicated gamers with its smart chasm leaping gameplay.
While the full name of the game is still under wraps, Prince of Persia is definitely full of eastern promise.</span></p><span data-dcnode-id="1684" instrument_node="">
</span><div class="review-footer gray" data-dcnode-id="1679"><span data-dcnode-id="1683" instrument_node="">
</span><span class="highlight" data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">reggie</span></span><span data-dcnode-id="1680" instrument_node=""> posted a review
			</span></div><span data-dcnode-id="1678" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1592"><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Saving a princess from the evil clutches of a despotic captor may not sound like the most innovative of game scenarios, but the original Prince Of Persia broke new ground in ways that could not have been apparent at the time. As much a part of the 1980s as big hair and pending nuclear Armageddon, platform games were firmly entrenched in the public psyche by the time the Prince showed up at the arse end of the decade. However, by adding such innovations as pressure plates, grabbing ledges and sword-fighting, along with a coherent storyline, Prince Of Persia revolutionised the genre and opened the door for a new style of gameplay.</span></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">As was commonplace back in the day. the game was the work of a solo visionary, namely Yale graduate Jordan Mechner, whose first foray into programming came at the tender age of 15.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">"When I was in high school I got my first Apple II computer and was so captivated by it that it's pretty much what
I did for the next few years, including, unfortunately, my first two years of college." Jordan manfully admits. "Instead of going to the classes and taking advantage of all the great learning I could have been doing, I programmed a game called Karateka. My ambition was to create a game that would be good enough to get published, and Karataka was, and had some success (selling half a million copies). Because of that, when I graduated from college, rather than look for a job as most of my classmates were doing, I thought 'Well, I'll just program another computer game and maybe that one will work too.' I don't know if I was naive or what - maybe I was too young when I started - but I wasn't thinking in terms of careers, I was just thinking this is really cool, so you know, I'll do this."</span></p><span data-dcnode-id="1668" instrument_node="">
</span><h3 data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Back In The Day</span></h3><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Work began on Prince of Persia in 1986 and continued at a leisurely pace, appearing on the Apple II at the end of 1989. As Jordan says: "Those were the good days, you know, no release date, no budgets, no timetables. Just the peace and quiet to fiddle around with the game. The industry was so different then."</span></p><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">It certainly was, but it's also an industry that Jordan may never have entered had he been more successful in pursuing his initial dream. As he recalls, "I think I got into computer games to begin with because I was kind of a frustrated comic book artist. If computers hadn't been invented I think my life ambition would have been to be a Disney animator. But I couldn't draw very well, so the computer, for me, first and foremost was just a great way to make a little animated story that you could play. So with Karateka and Prince Of Persia, part of the kick for me was telling a story through the game."</span></p><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Jordan's cack-handedness with a pencil was Disney's loss and gaming's gain, as he set to work on Prince Of Persia. And as a filmmaker himself (see 'Profile', above), it's fitting that the inspiration came from the movies.</span></p><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">"It's interesting how things come full circle," Jordan recalls. 'Prince of Persia really started not with a story but with a particular type of gameplay. A movie I had seen recently was Raiders Of The Lost Ark, which was - oh my God! - 23 years ago. It made a big impression on me, the whole movie, but especially the first sequence where he's running, jumping and things are chasing him and there are spikes. You know, that's so cool -wouldn't it be cod to do a game that had that kind of feel to it? So I knew I was going to do a game with a character who could run and jump and dodge traps, but then I was just worried - OK, well what's it going to be? Can't do Raiders Of The Lost Ark because that's been done and I don't have the rights to do that. Dungeons &amp; Dragons'? No, there was a Dungeons &amp; Dragons game this year. Egyptian pyramids? No, there's been too many of those. What hadn't been done as a computer game at that time, gdng down the list of the great touchstones of Western civilisation? The Arabian Nights. It was this incredibly rich mother lode of stories and villains and genies and magic and it had its own particular style of architecture. One of the things I thought had made Karateka work so well was the fact that it was set in medieval Japan and had that graphic of Mount Fuji. As a player you had to bring a lot of imagination to the games you played back in those days -one picture of Mount Fuji, that's Japan! So it needs something that's immediately identifiable so that people will bnng to it everything else that will make them believe m the story. So, The Arabian Nights was the perfect choice."</span></p><span data-dcnode-id="1653" instrument_node="">
</span><h3 data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Video Nasty</span></h3><span data-dcnode-id="1650" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">With the setting in place and the story envisaged, Jordan dwelled upon the idea of making the main character move in a realistic fashion, an area that hadn't really been explored before. Using the comparatively meagre resources of the time, and keeping it in the family - Jordan's dad provided the game's music -the expenmental animation technique initially involved a video camera and a wilting younger brother.</span></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">As Jordan explains. "Yes, I brought my brother to the local parking lot and had him run and jump and turn around while running and do all of the things that the Pnnce would have to do in the game." </span></p><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Albeit without the obligatory ping-pong balls attached to his extremities, this was surely the first instance of motion capture in a computer game. Jordan, however, prefers a more arcane term.</span></p><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">"It was actually a version of rotoscoping. Although in those days, remember, we didn't have scanners and stuff so you couldn't take the video and feed it into the Apple II. I had to go through a number of intermediate stages. I filmed my brother on video, in fact, and popped the cassette into the VCR - which was a new technology at that time - pressed play, freeze-frame, set up a 35mm camera on a tripod and took a photograph of each frame. Frame advance, take a picture, frame advance, take a picture. I sent the film to the Photomart. came back with all the prints, laid them out, and with each frame I coloured in the outlines in black and white so that I got a black and white silhouette, getting rid of the background. Again, we didn't have blue-screening available.''
A laborious process, but one that Jordan persevered with doggedly, with remarkable results, thanks in part to British technology.</span></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">"So I took all those silhouettes. Xeroxed them, shrunk them down so I got one big image with like 25 on it, and then I pointed another video camera at it. Although there was no scanner at that time, there was a British company that was manufacturing a device that let you do a single frame capture with a video camera, just black and white, no shades of grey. So I put that Xeroxed piece of paper on an animation stand, pointed the camera at it, took a frame, digitised it in the computer and ended up with all the frames on the computer. So I just went around, captured each one. you know, again using proprietary software written by myself the night before, and got all those frames and played them in order like a flipbook. And Io and behold, to my astonishment there was this silhouette of this kid running and jumping."</span></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Sounds like motion capture to us. but no - Jordan is adamant.</span></p><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">"I would say the correct term is really rotoscoping because that is something that had been done since the 20s and 30s, the early days of animation. Disney for Snow White would film the actors and then the animators would take those frames and trace them, redraw them, change them a little bit. but really they traced them. So I think it's a descendent of rotoscoping."</span></p><span data-dcnode-id="1629" instrument_node="">
</span><h3 data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Mind The Trap</span></h3><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Call it what you like, the results are clearly visible when playing the game now. Whether jumping, climbing, running or skidding to a halt, despite the rudimentary graphics, the Prince's movements still look wholly convincing, a testament to Jordan's pioneering work.</span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">With 60 minutes to save the princess, the action involves negotiating a series of catacombs set in a Persian palace, riddled with such hazards as the famous spikes, upon which the Prince is regularly impaled with a satisfying splash of blood.
It was by no means an overnight hit, but this can largely be attributed to the disparate state of the gaming platforms
of the time. According to Jordan. "I think the Apple II being at the end of its life, most people who played Prince Of Persia probably played one of the ports that came out in the few years following that. From 1990 to '93, it came out on the PC, Mac, and all the consoles, 8-bit Nintendo, 16-bit Nintendo, Sega, Game Boy..</span></p><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">A lot of people in the games industry clearly played it, as the influences are sign-posted throughout the last decade. As Jordan says, "The first time it really sunk in to me that PoP had not gone away was when I saw Tomb Raider and Super Mario 64 on PlayStation and Nintendo 64. They were two very different games but still there was a character running, jumping, grabbing onto edges, pulling themself up. And of course in Tomb Raider ihere were spikes and pressure plates, which was pretty cool."</span></p><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">In the mainstream at least, it's generally Tomb Raider that takes the credit for pioneering that style of game, something that Jordan concedes. "Tomb Raider deserves a lot of credit for having been the first game to bring that Prince Of Persia move-set into a 3D world. Just how good an idea that was is shown just by walking round the E3 show and seeing the number of games that are in some sense variations on Tomb Raider."</span></p><span data-dcnode-id="1614" instrument_node="">
</span><h3 data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Ten Years After</span></h3><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">A highly influential game it may have been, but Jordan didn't stop there, turning out a sequel. Prince Of Persia 2: The Shadow And The Flame, which was released in 1993. A further variation on the classic gameplay, it was well received and again lifted a slew of awards, as well as shifting a hefty number of copies.</span></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">That could have been the end of the road for the Prince, but in the wake of the phenomenal success of the Tomb Raider series, work began on Prince Of Persia 3D, an attempt to regain the plaudits from its bastard offspring. Development was notionally overseen by Jordan, and the game was released in 1999. Looking back on it now. he is prepared to admit that mistakes were made.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">"Pnnce 3D was a good example of the wrong way to take the Prince Of Persia moves set into 3D. That is. it was a literal mapping of what you could do in Pnnce Of Persia - running and jumping, drinking a potion - into a 3D world. There were two problems with that. One was that Tomb Raider has already done that, and the other was that once you get over the novelty factor of being able to do all that stuff in 3D, it's just not that much fun. Tomb Raider is not that much fun if you play it now. It was fun when it was new. but now we've had that, we know how to run and jump and explore big 3D worlds; those are not reasons to play a game."</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">The press largely concurred, and following some damning reviews it disappeared without trace, a tawdry footnote to a classic game. In timeless Hollywood fashion though, the story doesn't end there, and the Prince looks set to regain his crown with the highly promising PoP: Sands Of Time, currently in the latter stages of development at Ubi Soft's Montreal studio, and a nominee for best game at this year s E3. We've played it. and came away extremely impressed, as you can see from the preview on page 50. wnetner it cnanges the world in the same way as the original remains to be seen, but it looks like there's life in the old Pnnce yet. Providing he can avoid those spikes.</span></p><span data-dcnode-id="1599" instrument_node="">
</span><div class="review-footer gray" data-dcnode-id="1594"><span data-dcnode-id="1598" instrument_node="">
</span><span class="highlight" data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">reggie</span></span><span data-dcnode-id="1595" instrument_node=""> posted a review
			</span></div><span data-dcnode-id="1593" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1512"><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">You've Got To feel sorry for the poor old Prince Of Persia. While he has a reasonable case for pioneering the whole prancing athletically around exotic lands shtick, his thunder was unceremoniously stolen by a big-titted harlot from the Home Counties. Yet while the man on the Clapham Omnibus knows who Lara Croft is, nobody in the real world has ever heard of the Prince. You'd think he would be bitter and twisted about this, and we could be reading too much into it, but there's a bit in the game where the Prince himself, in one of his more eloquent moments, describes tomb raiding as a "glamorous reclamation of the past".</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">There have been several attempts to reclaim the Prince Of Persia's past over the years - ranging from the mediocre to the tolerable - of which this outing is nothing less than the very latest. Reverting to the original moniker (no Sands of Time or Warrior Within gubbins) it has already been described by an overpaid marketing skunk as "a re-imagining of the franchise". Hardly a visionary statement, it's the same glib sound bite that Tim Burton wheeled out before summarily pissing in the eyes of The Planet Of The Apes.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><h3 data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Cartoon Gaming</span></h3><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Prince Of Persia's so-called re-imagining takes place courtesy of the same graphics engine as Assassin's Creed (there's even a secret skin that enables you to play as Altair from that game), however, while the huge vistas and vertiginous topology are comparable, POP is very much its own game, with a bespoke art style that would probably once have been called cel-shaded, but is now described as illustrative.</span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Falling somewhere between Saturday morning cartons and a fully-fledged Disney feature, whatever it's called, it's extremely impressive, throwing you into a consistent, visually stunning fantasy world that screenshots can't really do justice to. With no heads-up display or gaming baggage such as ammo counts and weapon selection, it's a bold move away from the current trend of ultrarealism, and a welcome one at that, like stepping into a fairy tale. Perfectly suited to the subject matter, it conjures up such touchstones as the Sinbad and The Thief of Baghdad movies.</span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">And while the story of POP may not be remembered with such affection, there is one somewhere, the details of which are inevitably absolute poppycock. As a very loose synopsis, once upon a time there were two brothers who fell out, resulting in the world being a constant battle between corruption and healing, dark and light, with evil represented by oozing black pus, and good by flowers and butterflies. As a fan of good stuff, it's your job to heal the land from corruption and reclaim the fertile grounds so that everybody lives happily ever after.</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">More pragmatically, to start with you're some bloke in an ornate waistcoat wandering through the desert with a donkey laden with stolen gold when you stumble across a damsel in distress. That damsel is a Princess called Elika, and doing the decent thing you save the day through what is essentially an interactive tutorial that teaches you the basics of swordplay, climbing, dropping, wall running, ceiling running and all that stuff.</span></p><span data-dcnode-id="1571" instrument_node="">
</span><h3 data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Tap-Tap Combat</span></h3><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">While there's some initial swearing, controlling the Prince soon becomes second nature, with a mouse and keyboard proving adequate for even the most athletic of moves. However, so stringent are the paths through the game that it soon becomes apparent that you're not doing much more than pressing the right key at the right time. Clearly, we're exaggerating slightly, but it's fair to say there isn't a great deal of skill involved, as there's a distinctly binary approach to the gameplay in that you either do something or you don't.</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">As for the sultry Elika, once you've rescued her she follows you around like a pretty pot of glue, proving to be not so much a damsel in distress as a guardian angel, helping you out of scrapes using some fairly nifty magic. For instance, if you attempt a jump that is too far, press E for Elika and she'll fly through the air and give you a helping hand. Further, in what is arguably one of the game's biggest deals, even if you don't ask her for help, should you be plummeting to your death she'll appear and haul you to safety in the nick of time, ensuring that at no point in the game do you ever actually die.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">While it might sound like a feature that makes the game too easy, Elika's life-saving is a permanent quicksave, and is arguably an extremely elegant way of overcoming the immersion-breaking concept of saving and loading, a quandary that gaming's greatest minds have grappled with since the three lives of Space Invaders.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">As for the overall structure of the game, you dart about a hub-based environment fighting minions of evil and then healing the relevant area. Or more accurately, Elika heals the area while you stand by making wisecracks. In many ways the game is more about the Princess than the alleged Prince, and she even joins in with the combat, throwing in some magic while you stick to your sword, gauntlet and an acrobatic attack. With a fixed camera view, defeating beasts is a matter of stringing the right combos together, and rhythmically tapping the right button in a seriesuf quick-time mini-games. The environment can also come in handy, as it's possible to kick a monster off his ledge.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">While the early monsters can be laid to waste with a few lashes of your trusty sword, you do eventually have to resort to the various combos. When these go right, they can be spectacular, but the combat is one sticking point that might turn people off. Indeed every time we stormed off in disgust during the review it was a result of boredom having circled a monster for 10 minutes, pressed pause to access the combos menu, attempted to remember a couple and then spent valuable minutes of our lives chipping away at his health bar, which replenishes if Elika has to save your life.</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Almost as tacit acknowledgement of this time-sapping routine, some of the bosses will piss off halfway through a fight, only to reappear later to enable you to finish off the job. With the bosses becoming progressively harder as the game continues, they each take longer to beat, and given that you can't actually die, time is your only currency.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Well, time and your fingers, as this is an area of the game that betrays its console roots. Tapping out combos on a pad is less ruinous, both to the hardware and to your index finger, which can seize up in the midst of a long scrap. Repetitive strain injury notwithstanding, having beaten the boss and healed the land, collectable 'light seeds' magically appear, a certain number of which grant Elika further powers enabling her to access more of the land and perform more healing. These can be collected during some more predetermined platforming, and so it goes on, an essentially repetitive, if spellbinding and occasionally exhilarating, tour round a magical world with a Princess hanging off your back, a few nonsensical cutscenes, a clutch of rudimentary puzzles and some vaguely sinister-dream sequences.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><h3 data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Mixed Baggage</span></h3><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Hardcore gamers will inevitably dismiss POP as not being challenging enough, but you'd have to have a steel heart not to be slightly seduced by the fantastical setting. That said, the magic is shattered the minute the Prince opens his mouth, proving to be an appalling dullard. All the same, this is a brave attempt at doing something different in a gaming marketplace littered with war and aliens. Despite being the work of Ubisoft Montreal, it's probably as far away from a Tom Clancy-branded title as it's possible to get.</span></p><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">And despite an original approach to the gameplay, in many ways POP is imbued with an old-school sensibility kill the boss, save the girl. Although she spends a lot more time saving you, and you do sometimes feel like a spare prick at a wedding, bringing little more to the party than a series of excruciating one-liners and some functional swordplay.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">All the same there's a definite elegance to the action, with the sublime animation complementing the setting, and a superbly realised colour palette that visually demonstrates the difference between the corrupted and healed areas. It's undeniably charming, but how long you remain charmed depends largely on your patience. </span></p><span data-dcnode-id="1535" instrument_node="">
</span><h3 data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">The Fresh Prince Of Bell-end</span></h3><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1529"><em data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">What a berk</span></em></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Proving anything but regal, this is arguably one of the most misjudged examples of scriptwriting to sully the already dismal world of games scripting.</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Despite fighting for the future of humanity, the so-called Prince comes across as if he's auditioning for the next Bill &amp; Ted movie, spending the entire game trying to get into the Princess's knickers, reeling out appalling gags, and even resorting to a lengthy and witless game of I Spy. There would be more dignity in silence.</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">And he does himself no favours by fighting her dad and inadvertently dancing on her mum's tomb. A class act.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><div class="review-footer gray" data-dcnode-id="1514"><span data-dcnode-id="1518" instrument_node="">
</span><span class="highlight" data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">reggie</span></span><span data-dcnode-id="1515" instrument_node=""> posted a review
			</span></div><span data-dcnode-id="1513" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1493"><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">We thought we'd focus on this classic game because it ties in nicely with the release of Prince of Persia 2. At first sight, Prince of Persia doesn't seem to offer anything over and above traditional platform fare. It has a disgustingly yucky storyline: young princess and handsome mysterious traveller fall in love and put the wind up the evil Jaffar who, in the absence of the girl's father, wants to have his own wicked way with the princess, so he locks them both up and the hero has to fight his way through several levels of dungeon and palace to rescue his beloved. I know, it makes you want to puke doesn't It? Look beyond the sickly sweet plot however, and you have a game that excels in several different ways. The most fundamental and refreshing new feature in Prince of Persia is the superb quality of the animation. Author Jordan Mechner made videos of his brother performing all the actions that the main character would be likely to undertake, like running, climbing and so on, and used the film as a basis for his animations. The result is the smoothest, most fluid, and most realistic animation ever seen in a game of this type. You can edge up to the tops of chasms, where the prince will topple slightly before stepping back. Run fast and then change directions rapidly and he will slide realistically.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">But beyond that, Prince of Persia is a cracking good game. Not only does it present a well-progressed challenge that guides the player smoothly from a learning level through to some torturously difficult areas, but the entire design has been well thought out from beginning to end, with some of the most inventive puzzles ever created for a platform game.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">At one point you rescue a trapped mouse and release it. That's that, you think, but the mouse helps you out later in the game. The puzzle that most POP players rave about however, is the mirror half way through the game. When you jump through this, a doppelganger appears as a mirror image of you. Discovering how to deal with him in the later stages of the game is one of Prince of Persians most appealing tests.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">If you haven't yet experienced Prince of Persia you won't regret doing so, even though it has now been superseded by a sequel. Very highly recommended.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><div class="review-footer gray" data-dcnode-id="1495"><span data-dcnode-id="1499" instrument_node="">
</span><span class="highlight" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">reggie</span></span><span data-dcnode-id="1496" instrument_node=""> posted a review
			</span></div><span data-dcnode-id="1494" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1474"><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">The latest in a string of PC to Dreamcast conversions, PoP is coming to Sega's system this November from Mattel Interactive. But unlike many PC ports, Avalanche Software rebuilt this title from scratch to better utilize the DC's strengths. That means better camera angles, improved visuals and tighter control--which is good considering the amount of sword swinging and perilous jumping you have to do.</span></p><span data-dcnode-id="1490" instrument_node="">

</span></div><span data-dcnode-id="1475" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1455"><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Ed Magnin &amp; Associates and Mmdscape Entertainment are bringing the classic sidescrolling action/adventure to the Game Boy Color in April. This one features all-new levels (13 levels in all) and new enemies. Expect many of the token baddies, traps and mazes from the original while on your way to saving the beautiful princess. In case you care, PoP supports five different languages.</span></p><span data-dcnode-id="1471" instrument_node="">

</span></div><span data-dcnode-id="1456" instrument_node="">
</span></div><div class="col-md-12 review" data-dcnode-id="1379"><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Stop! Hold the music! Don't abandon us yet! Yes, we have another damsel in distress, a fair maiden in need of rescue. But this one's different...she's RICH!</span></p><span data-dcnode-id="1452" instrument_node="">
</span><h3 data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">To Heir Is Human</span></h3><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Seems a tyrant named Jaffar usurped Persia's crown while the good Sultan was vacationing and then tossed the former ruler's daughter into a dungeon. Now her loveliness has one hour to marry Jaffar or be executed. Tough choice. It's left to you, a stranger from out of town-a man with no name-to brave a 12-level maze and slay the evil "J." What's in it for you? Her, you dufus, and she'd make you Prince. So get to it!</span></p><span data-dcnode-id="1446" instrument_node="">
</span><h3 data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Move It or Lose It</span></h3><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Prince of Persia originally slashed its way across computer screens; now this classic's turned up on the Game Boy. The prince-to-be's dungeon-spelunking takes place in side-view perspective, and scenery changes each time you walk off the edge of a screen.</span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Umber up those thumbs, the controls are different and more difficult when compared with previous Game Boy action-fantasies, such as Wizards and Warriors. Instead of using just the control pad to move the great nameless one forward, you must use both the control pad and Button B. Press the control pad and he runs; press B and he takes tiny, deliberate steps. Because of this dual control you must make very precise moves if you want to get through the many evils and deadsplats safely.</span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">You can grab ledges and swing from them, too, a handy way to avoid long falls and sharp objects which, by the way suck up your energy. Expect to meet up with plenty of guards who reap great pleasure in chopping you down to size.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><h3 data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Password Priority</span></h3><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">The bad news is you've only got sixty minutes to bust this rat-hole your hero's landed in. The good news is that a password appears after each area is completed, so don't sweat the clock if your batteries run low. Other help? Potions may restore strength...or suck it away. Poison or ambrosia, it's a risky gamble, but one you must take.</span></p><span data-dcnode-id="1428" instrument_node="">
</span><h3 data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Game Boy Royalty</span></h3><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Prince of Persia is graced with detailed backgrounds and hilarious animations-you'll love the way the prince literally "shakes out the cobwebs" when he bumps into a wall. Although a greater variety of tunes and sounds would have been welcome, effects such as the pitter-patter of his moving feet add a nice, realistic touch. The gameplay is tough to learn, but once you pick up on the controls, Prince of Persia is a negotiable maze-maddening adventure. But once, just once, wouldn't it be fun to play the villain? Nahhhhh.</span></p><span data-dcnode-id="1422" instrument_node="">
</span><div class="game-info" data-dcnode-id="1396"><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">ProTips: </span></p><span data-dcnode-id="1418" instrument_node="">
</span><ul data-dcnode-id="1398"><span data-dcnode-id="1417" instrument_node="">
</span><li data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Run over collapsing blocks and you won't drop off with them.</span></li><span data-dcnode-id="1414" instrument_node="">
</span><li data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Carefully approach a princecrunching slicer by pressing B, then start your dash when it's closed.</span></li><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Open locked doors by stepping on the right tile.</span></li><span data-dcnode-id="1408" instrument_node="">
</span><li data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">To find your sword on Level One, fall through the first pit and head left until you see it on the floor.</span></li><span data-dcnode-id="1405" instrument_node="">
</span><li data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">During a fight, allow your opponent to draw nose-to-nose before you take a swing You can get in multipie hits before he retreats.</span></li><span data-dcnode-id="1402" instrument_node="">
</span><li data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">If you perish and you've used up too much time, just reset the clock with your password. Allow no more than five minutes per level.</span></li><span data-dcnode-id="1399" instrument_node="">

</span></div><div class="col-md-12 review" data-dcnode-id="1214"><div class="game-info" data-dcnode-id="1240"><span data-dcnode-id="1262" instrument_node="">

</span><li data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Manufacturer: Konami</span></li><span data-dcnode-id="1258" instrument_node="">
</span><li data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Machine: Super NES</span></li><span data-dcnode-id="1255" instrument_node="">
</span><li data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Difficulty: Hard</span></li><span data-dcnode-id="1252" instrument_node="">
</span><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Available: November 1992</span></li><span data-dcnode-id="1249" instrument_node="">
</span><li data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Number of levels: 20</span></li><span data-dcnode-id="1246" instrument_node="">
</span><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Theme: Adventure</span></li><span data-dcnode-id="1243" instrument_node="">
