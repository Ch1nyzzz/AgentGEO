            <template shadowrootmode="closed"><html data-dcnode-id="1"><head data-dcnode-id="25"><meta name="robots" content="noindex, nofollow"><meta charset="utf-8"><meta charset="utf-8" data-dcnode-id="31"><meta content="Impact of science on society, VII, 4" data-dcnode-id="30" property="og:title"><title data-dcnode-id="28">Impact of science on society, VII, 4</title><meta content="https://unesdoc.unesco.org/in/rest/Thumb/image?id=p%3A%3Ausmarcdef_0000008241&amp;title=Impact+of+science+on+society%2C+VII%2C+4&amp;year=1956&amp;TypeOfDocument=UnescoPhysicalDocument&amp;mat=ISS&amp;ct=true&amp;size=512&amp;isPhysical=1" data-dcnode-id="27" property="og:image"><meta content="numéro de périodique" data-dcnode-id="26" name="description"></head><body data-dcnode-id="2"><h1 data-dcnode-id="23"><span data-dcnode-id="24" instrument_node="">Impact of science on society, VII, 4</span></h1><h2 data-dcnode-id="19"><span data-dcnode-id="22" instrument_node="">Fait partie de : </span><a data-dcnode-id="20" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unesdoc.unesco.org/ark%3A/48223/pf0000108361" target="_blank"><span data-dcnode-id="21" instrument_node="">Impact of science on society</span></a></h2><h2 data-dcnode-id="17"><span data-dcnode-id="18" instrument_node="">Langue : Anglais</span></h2><h2 data-dcnode-id="13"><span data-dcnode-id="16" instrument_node="">Aussi disponible en : </span><a data-dcnode-id="14" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unesdoc.unesco.org/ark%3A/48223/pf0000008241_fre" target="_blank"><span data-dcnode-id="15" instrument_node="">Français</span></a></h2><h2 data-dcnode-id="11"><span data-dcnode-id="12" instrument_node="">Année de publication : 1956</span></h2><img alt="numéro de périodique" data-dcnode-id="10" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unesdoc.unesco.org/in/rest/Thumb/image%3Fid%3Dp%253A%253Ausmarcdef_0000008241%26title%3DImpact%2Bof%2Bscience%2Bon%2Bsociety%252C%2BVII%252C%2B4%26year%3D1956%26TypeOfDocument%3DUnescoPhysicalDocument%26mat%3DISS%26ct%3Dtrue%26size%3D512%26isPhysical%3D1&amp;raw"><p data-dcnode-id="8" style="font-size: 24px;"><span data-dcnode-id="9" instrument_node="">numéro de périodique</span></p><p data-dcnode-id="3"><span data-dcnode-id="7" instrument_node="">IMPACT of science on society Vol. vn, No. 4 xjcwve^ December 1956 [A] Price per copy: $ .50; 2/6; 125 fr. IN THIS ISSUE: ''Automation—Verbal Fiction, Psychological Reality by the E A R L O F H A L S B D K Y The Identity of the Person—Its Importance for the Individual and for Society by C H A R L E S S A N N I É Leaf Protein—Food of the Future by R A L P H W H I T L O C XI M P A C T of Science on Society quarterly Annual subscription: [A] $1.75; 9 / 6 ; 450 fr. A n y of the National Distributors listed at the end of this number will accept subscriptions; rates in currencies other than the above will be supplied on application to the National Distributor in the country concerned. W h e n notifying change of address please enclose last wrapper or envelope. © Unesco 1957 Printed in France N S 56 I 25A UNITED NATIONS EDUCATIONAL, SCIENTIFIC AND CULTURAL ORGANIZATION 19 Avenue Kléber, Paris-16e, FranceContents Impact, Vol. VII, No. 4, December 1956 A U T O M A T I O N — V E R B A L FICTION, PSYCHOLOGICAL REALITY by the E A R L O F HALSBURY 179 Automation is a material reality. It is also a psychological reality. The two realities do not necessarily correspond. As a material reality automation is a source of wealth. As a psychological reality it is a source of fear. This essay, which studies closely both realities, helps to show how they can coalesce, for such is the function of the social sciences in their application. They have few functions of comparable importance in the contemporary world. THE IDENTITY OF THE PERSON—ITS IMPORTANCE FOR THE INDIVIDUAL AND FOR SOCIETY by CHARLES SANNIÉ 202 The identity of the person is of great importance from the social, legal and purely human points of view. Every month thousands of people disappear leaving no trace—and many of them reappear under a false identity. Innumer- able frauds are perpetrated under cover of false identities. Sometimes an innocent is found guilty on evidence which is based on unreliable criteria of identity. It even happens that children are substituted in maternity clinics for lack of reliable criteria of identity. In fact, the present methods of ascertaining the identity of the person are unreliable and even misleading. The author studies these methods and considers how they could be improved so as to give better guarantees to the individual as well as to society. LEAF PROTEIN—FOOD OF THE FUTURE by RALPH WHITLOCK 225 Side by side with the encouragement of more efficient agriculture on land already under cultivation and with the development of new marginal areas, goes investigation into new sources of food supply. One such source which has recently made its appearance is from the extraction of leaf protein. This protein, when refined, is easily digestible by human beings; in its cruder form it is an ideal animal food. The extraction of leaf protein, if suitably developed, would prove a powerful factor in solving the problem of the world's food supply. BOOKS AND PUBLICATIONS The Father of Scientific Detection by C H A R L E S S A N N I É 234 The Director of the Paris Identité judiciaire writes a brief essay on his famous predecessor apropos a biography of Alphonse Bert ilion by H . T. F. Rhodes.C O N T E N T S O F P R E C E D I N G ISSUES Vol. VI , N o . 3, September 1955 The Duality of Science: Knowledge and Action, by Pierre A U G E R . Population Genetics and the Study of M a n , by Jean S U T T E R . National Research Councils and Science Policy, by Werner M O L L E R . The Career of the Research Worker, by Y . de H E M P T I N N E . Vol. VI , N o . 4, December 1955 Warning and Promise of Experimental Embryology, by H . V . B R O N D S T E D . Design and Chance in Discovery and Invention, by René T A T O N . Pages from the Past: T . H . Huxley—The Statesman of Nineteenth-Century Science. Vol. VII, No . 1, March 1956 Science and the Changing Face of Industry—The Social Phase, by Alexander K I N G . Biology and Medicine at the Geneva Conference (8-20 August 1955), by Jean C O U R S A G E T . Vol. VII, No . 2, June 1956 Medical and Social Problems of Aging, by R . E . T U N B R I D G E . The Impact of Viruses on Society, by F. C . B A W D E N . Energy Production at the Geneva Conference (8-20 August 1955), by P. T A R A N G E R . Vol. VII, No. 3, September 1956 Ten Years of Science at Unesco, by Marcel F L O R K I N . The Social Character of Technology, by Tom B U R N S . Fifty Years of Medical Research, by A . C . A L L I S O N .AUTOMATION—VERBAL FICTION, PSYCHOLOGICAL REALITY by the EARL OF HALSBURY Lord Halsbury, F.R.I.C., F.Inst.P., a research chemist by training, has been Managing Director of the National Re- search Development Corporation since 1949. He was a member of the Advisory Council of the Committee of the Privy Council for Scientific and Industrial Research from 1949 to 1954, and is now a member of its Mechanical Engineering Research Board. He is also a Deputy Chair- man of the Parliamentary and Scientific Committee of the United Kingdom, Chairman of the National Institute of Industrial Psychology, Vice-President of the Institution of Production Engineers and of the Royal Institute of Philo- sophy, and a member of the Court of Governors of the Manchester College of Science and Technology. 'Automation' is not a technological term, though it started as the nickname for a technological problem of m u c h narrower scope than its current use would lead one to suppose. Its use, m o r e frequently its abuse, pertains to journalism and sales promotion. Journalists for the most part seem unaware that they have, to all intents and purposes, coined it themselves. W h e n they ask technologists what it means, the question ought to be referred back to them. There is in fact considerable confusion involved in this matter. Journalists seem to think that there is a new technological process, called automation, to be compared in its novelty with nuclear energy generation or antibiotic manufacture, and that this new technique will result in automatic unmanned factories, the installation of which will cause widespread unemployment. Thus journalists have misled not only one another and the public, but trade unionists as well—some of w h o m have reacted by stating what they would do about it. These statements have been written up by the daily press as if a real situation were involved, and some current events (such as the strike at the Standard Motor Co . ) have been interpreted in terms of workers' resistance to automation. The public has thereby been still further misinformed. The situation is rather like the growth of a rumour; no one can subsequently give a satisfactory account of h o w large numbers came to believe a story having no foundation in fact. Press and unions have in fact been stoking one another up till both have c o m e to believe that what they are talking about corresponds to reality. Needless to say, the more responsible members of each group do not believe this. 179A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y WHAT IS MEANT BY AUTOMATION Various attempts have been m a d e at defining automation in general terms. These all exclude one or another of the activities which, by popular consent, are n o w called 'automative'. Consequently they are unsatisfactory. I have suggested elsewhere that the only w a y of bringing order out of this chaos is to freeze the use of this word so as to cover every context in which it is n o w employed, and to extend it no further. Failing this, it will c o m e to m e a n whatever the user has in his mind when he uses it, and by meaning everything in general will end by meaning nothing in particular. If this proposal is accepted (and no one has so far disagreed with it), then w e are left with four unrelated topics to discuss. 1. Transfer Processing. That is to say, linking fabrication operations, normally performed individually and in sequence, into a continuous process of an automatic character. 2. Automatic Assembly. This resembles transfer processing in definition, except that it relates to the assembly of m a n y units rather than to the forming or fashioning of a single unit. 3. Control Engineering. This is concerned with the automatic control of self- regulating processes, and describes devices of which examples are the speed governors of steam engines, thermostats, autopilots and so on. 4 . Communication Engineering. Only part of this subject is involved, namely that part which relates to data processing, accountancy and mathematical operations conducted with electronic digital computers, and the linkage of computers to physical or chemical processes. These topics will be described in more detail below. For the present it will suffice to have enumerated them briefly, as above, in order to continue the process of definition and explanation for the removal of misunderstandings. First of all, m a n y processes employ more than one of the above techniques. Thus transfer processing involves a measure of automatic control, and auto- matic control m a y involve the use of a digital computer, parts of which m a y have been fabricated using methods of automatic assembly. Secondly, it should be noted that the fourth item above includes the use of the word 'electronic' to describe a particular device, the computer. A s automation is linked in the public mind with electronics, it ought to be explained that there is no necessary connexion between them. Transfer pro- cessing is in fact far more dependent upon pneumatics (the use of compressed air) than u p o n electronics. Automatic control employs both pneumatics and electronics w h e n suitable opportunities for either present themselves. C o m - munication engineering is, in its automative aspects, almost entirely electronic in character. Automatic assembly does not at present depend to any great extent on either type of technique. Thirdly, from the sociological point of view, it is impossible to avoid 180A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y spurious distinctions arising from the foregoing. Thus if a milling cutter and a grinder, regarded as unit machines in sequence, are coupled by a transfer machine, the n e w unit process resulting is 'automation'. If, however, the grinding machine is rendered superfluous by high speed milling, the result is not automation. W e have in fact no generic term for it, except 'advanced machine shop practice'. Examining these four processes in search of a c o m m o n feature which could be m a d e the basis of a general definition, it seems that they possess one rather slender link in c o m m o n , namely that they reintegrate processes, hitherto broken d o w n into sub-divided tasks, by rendering the whole con- tinuous. 'Re-unification in continuity' thus presents itself as a theme which could be the basis of a general definition, but it is too general to be of m u c h use and would result in including old processes which no one has, as yet, classed as automative. So far, this description runs parallel with that given in the report on auto- mation sponsored by the Department of Scientific and Industrial Research,1 except that the report couples transfer processing and automatic assembly together, and thus reduces the topics classifiable as 'automation' to three in number. There are, I think, some advantages in keeping them separate. The report, however, goes a great deal further by defining 'complete automation' as appropriate to cover the case of a completely automatic or 'push-button factory', the administration and works management being supposedly con- trolled by a computer. In fact, it goes a great deal too far if the definition implies that such a factory exists anywhere on earth. If one is to take cognizance of mere possibilities (in the sense that there is no law of nature excluding them) in framing definitions, then w h y not go to the limit and declare the factory self-repairing, thus eliminating the maintenance engineers as well as the works manager? O n e would then be well and truly embarked on the writing of science fiction! O n e could dismiss public preoccupation with the subject by observing that 'automation', as here defined, is no more than an arbitrary selection of topics culled from the current phase of advance in a two-centuries-old field, that of mechanization. W h y coin a special word for an arbitrary selection, implying that something unprecedented is taking place? This attitude is certainly tempting. It is one that m a n y if not most engineers would like to adopt. O n the other hand, there is often a measure of unconscious wisdom in a public attitude, even if overlaid with misunderstanding, and it m a y be advisable to take cognizance of it. Technical advances m a y be of two kinds: steady cumulative advances on broad fronts, and concentrated advances on narrow fronts—salients as it were thrust out into the technological unknown. T h e topics selected here as 1. Automation, Department of Scientific and Industrial Research, H M S O , London, 19S6. 181A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y automative are not in fact chosen entirely at random. They are just those branches of technology where interesting salients are at present being pushed out. They are the subject-matter of m a n y technical textbooks n o w being written, though the word automation is not found in them. T o some extent these branches abut—are contiguous. They m a y later join up into a major strategic advance, or they m a y not; it is too early to say. In so far as their implications m a y be more far-reaching than one can foresee, there is a case for advanced consideration of them, if that is the public wish. In fact, it is the public wish. O n e m a y therefore accept rather than reject the word automation, but help the public to use it in a rational way . B e it remembered always, however, that automation deals with ad- vances, not with novelties, and that it is but a sub-species of the familiar species 'mechanization'. N o one of the four topics is new. Like the Bourgeois Gentilhomme w h o talked prose all his life without knowing it, m a n y people have been subject to automation for m a n y years and were content, until recently, to call it 'advancing productivity'. THE TECHNICAL REALITY Transfer Processing Transfer processing is not generally concerned with the manufacture of capital goods, such as electric generators, or consumable goods, such as textiles. It applies more typically to the manufacture of consumer's durables —products such as automobiles, refrigerators, sewing machines, typewriters and so on. These commodities are assemblies of sub-assemblies which m a y in their turn consist of sub-assemblies. Ultimately w e reach parts. A part is itself the product of a sequence of fabricating operations. Considering an automobile as typical, it is an assembly consisting of sub-assemblies such as the chassis, the engine, the transmission, the gear box, the body work, the upholstery and so on. T h e engine is itself m a d e up of sub-assemblies— the engine proper, the carburettor, petrol p u m p , self-starter, etc. T h e engine proper is m a d e of parts—the cylinder block, the crank shaft, connecting rods, pistons, valves, bearings, and other such units. Each of these parts results from a sequence of machining operations. Taking the cylinder block as typical, the top and bottom must be milled or broached flat and parallel, the cylinders must be bored, valve guides drilled, seatings ground, various flat surfaces milled on the exterior of the engine to which auxiliary sub-assemblies will be bolted in due course, and a multi- plicity of holes drilled, some of which must be tapped so that bolts m a y be inserted in them. Each of these operations is carried out by a special-purpose machine designed to do that one operation and no other. S o m e of these 182A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y machines perform multiple operations, such as boring six cylinders simultane- ously. A s the function of machines of this character is to remove material, the production engineer is concerned to keep the latter to a m i n i m u m by appropriate design of the material fed to the machine. T h e generic term for an input of this kind is a blank. It will generally take the form of a casting, a forging or a stamping—the result of some prior, relatively unprecise, operation of a large scale character. With these preliminaries, consider the function of a machinist. His task is threefold: first, to feed the blank into the machine in correct register there- with, by forcing it to abut on some fixed framework called a jig; secondly, to supervise the performance of the machine; and thirdly, to remove the finished work, and to inspect its dimensional accuracy by means of a gauge, thereby ensuring that nothing but good work is passed forward to his suc- cessor in the sequence of machine operations. If the blank is small, it m a y be possible to mechanize the input process by means of hopper or magazine feed, of which a familiar illustration can be furnished in terms of the belt or drum feed of bullets to a machine-gun. If the throughput is large, it m a y be possible to arrange that it starts in response to the completion of automatic feed, carries out its operations auto- matically, and switches off to discharge its output on completion of its task. In this w a y an operator m a y be able to keep an eye on several such machines, inspecting the output of each in turn, subject to a suitable sampling routine. If the blank is large, such as a cylinder-block casting, this approach fails; though it should be possible, in principle at any rate, to m a k e the output of one machine feed automatically into the input of the next. This is the essence of transfer machining, and the issue is not whether it can be done, but whether is can be m a d e to pay. Cylinder blocks are large unwieldy objects; moving them about automatically and clamping them into register to within a thousandth of an inch entails a large heavy machine for the purpose. M o r e - over, in committing himself to a continuous sequence of operations of this character, the production engineer commits himself also to the strategic snag that the whole fine of machines must stop if, for one reason or another, any one of them stops, breaks d o w n or goes out of adjustment. Furthermore, the mechanization of the feed must be accompanied by mechanization of the inspection procedure, and arrangements for rejecting defective work. Failing this, expensive machining operations will be carried out on worthless products. T h e capital cost of providing these complicated automatic operations in relation to the capital cost of the machine tools will be an important con- sideration in determining whether transfer pays or not; for the object of transfer is primarily to increase output, and not to eliminate labour, which is a secondary objective. T h e first such transfer-line was installed at the works of the Morris Motor 183A U T O M A T I O N : V E R B A L FICTION, P S Y C H O L O G I C A L R E A L I T Y C o m p a n y in 1923. It was technically sound but economically unsound. T h e capital costs of machine tools in relation to their rate of output was not high enough to m a k e the transfer installation a paying proposition. T h e second attempt at a transfer-line was m a d e some twenty years later by Fords in Detroit and was economically successful, the relative capital costs involved having in the meanwhile altered in favour of the transfer process. T h e engineers responsible nicknamed their problem 'automation', and the n a m e stuck. (Various proposals for a general definition of automation have to be rejected on the ground that they exclude what Fords did in Detroit; a general definition of a word which excludes its historical origin would be inappropriate.) There is nothing which renders machining operations m o r e suitable for linkage by automatic transfer than other engineering operations. The body work of a car consists of parts called panels, and each of these is the product of a sequence of pressing operations carried out on sheet-metal blanks. Linkage of these by automatic sequences constitutes 'transfer-pressing', and the totality of similar operations m a y be called 'transfer processing', one of the four topics to which the n a m e 'automation' m a y be given. The terminal economics of all such processes—that is, the economics of carrying an idea through to its logical conclusion, 'going the whole hog' or whatever one m a y call it—is a rather sensitive function of throughput. A production engineer tends to tackle first the easy problems which cost least, together with the rewarding problems which pay a high dividend. Next he will tackle willy-nilly any subordinate problems whose solution is required to m a k e a bigger or better success of the first group of solutions. There will remain, thirdly, a group of problems which are not of prime importance, and whose solution is neither particularly easy, nor notably remunerative. The cost of solving these is usually determined by the law of diminishing returns. At the point where they engage the production engineer's attention, he is liable to be distracted by something more important elsewhere. But this m a y be all to the good, for there are disadvantages in overdoing a process of this kind. It becomes inelastic as it becomes more complex, and the cost of hold-ups and breakdowns rises. In order that a whole line should not halt by reason of an adjustment required to one machine, it is necessary to arrange reserve stocks of w o r k in progress at regular intervals d o w n the line in such a w a y that the line can deliver into the reserve or buffer stock if there is a halt ahead of it, or take its input from the buffer stock if there is a halt behind it. It m a y be convenient to m a k e these points identical with s o m e process requiring manual operation, the mechanization of which would be tricky and difficult. Matching all these necessities and opportunities requires detailed ingenuity by production engineers. They are not engaged in an intellectual game called 'going the whole hog' or 'eliminating the last m a n ' . They are concerned with 184A U T O M A T I O N : V E R B A L FICTION, P S Y C H O L O G I C A L R E A L I T Y minimizing costs. A s to 'eliminating the last m a n ' , suppose the manual operators have indeed been reduced to one and one alone. Replacing him would require a machine and the services of a maintenance engineer. A special purpose machine which replaced on balance less than one m a n would be of very marginal interest. The 'last m a n ' would be liable to linger at his post for quite a while! This point is of some importance. Automation is found in patches here and there. N o factory is homogeneously automated. The Russians, it is true, claim to have a completely automatic factory. Study of the published descriptions of this factory, however, scarcely con- firms this view. The factory produces a part only. In fact it produces pistons for automobile engines. It would be a mere department in some modern auto- mobile plants. In designing this factory, the Russian production engineers have coupled the melting shop and foundry to the machine shop. I personally doubt the economic wisdom of this. A melting shop and foundry, on the one hand, and a machine shop, on the other, work to such intrinsically dif- ferent rhythms that I would have been inclined to classify their coupling as of the third type mentioned above, that is to say, 'not technically easy nor very remunerative'. I m a y however be mistaken. Only very detailed study of costs, which are not available in this case, can demonstrate whether a given device is economic or not. Automatic Assembly Automatic assembly is not new. If one wants to be pedantic, one can regard a loom as a device for the automatic assembly of cloth. This takes us back a very long w a y into the past. Electric lamp bulbs and radio valves (and lat- terly television tubes) have been automatically assembled for a generation at least. Recently some significant advances have taken place in this field. A n y - one w h o has looked inside a radio or television set will have seen a tangle of electrical interconnexions running from part to part. Each of these is a wire, the two ends of which are soldered to contact points at which other wires also are soldered. If there are 100 interconnexions, then 200 soldering operations are necessary (usually m a d e by young w o m e n workers). These connexions have not only to be m a d e , but inspected. The cost of inspection m a y be a multiple of the cost of wiring. The first stage in mechanizing this assembly is to print the pattern of electrical interconnexions on a light board m a d e of insulating plastic material. There are various ways of doing this, but they all amount essentially to the use at some stage of a standard printing press. The electrical components have next to be fitted on to this board. A component is typically a little cylindrical cartridge from a quarter of an inch to an inch long and from a tenth to a quarter of an inch in diameter. F r o m its extremities project axially two leads of tinned copper wire. These components are customarily 185A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y mass-produced by the million in factories operated by sub-contractors to the electronics trade. Fixing them to the printed circuit board is effected by piercing the board with holes appropriately located, stapling the two leads through the holes, and bending the stapled ends round so that they abut on to the appropriate parts of the printed conducting pattern on the board. T h e reader will be familiar with the stapling pliers which are used in offices to clip dockets of paper together. A machine to clip components on to a printed circuit board would be no different. T h e components would require to be fed to it rather as bullets are belt-fed to a machine-gun. This can in fact be achieved without difficulty or expense, using expendable belts of paper tape, for example. A sequence of these stapling devices, suitably registered at 'stations', accordingly staples a sequence of components o n to a board fed past the stations in succession by a travelling conveyor which halts under each station while the stapling operation is carried out. O n completion of the assembly in this way, it is lowered whole and entire into a dip-soldering bath and all the soldered connexions are formed simultaneously. T h e manifest success of this sort of device in the U . S . A . (it is quite n e w , and believed to be not yet completely operating in the U . K . ) has aroused great interest, and produced fairly typical consequences. First, the c o m - ponent designers are redesigning their products so as to m a k e them m o r e adaptable to automatic assembly, and, secondly, production engineers are asking themselves whether there m a y not be other problems which could be solved by a similar approach. In the U . S . A . , experiments have been begun towards the automatic assembly of automobile engines. A wide range of relative difficulty seems to be involved. O n e can visualize without too great difficulty the automatic assembly of rigid products, such as engines. Floppy objects, such as body-panels, present more difficulty, and pliable objects, such as upholstery, a great deal more . Control Engineering Control devices are not new. W h e n James Watt patented the centrifugal governor in connexion with his steam engine, he was only adapting a governor that had been used for some time on water-wheels and in flour mills. T h e thermostat is a familiar device on electric water heaters and radiators of cars. It functions as a temperature regulator, turning a source of heat on when the temperature is below a pre-assigned figure, and off w h e n it is above. A n autopilot embodies the same idea. It applies rudder to a ship, or control surface action to an aeroplane, so as to turn it to the right w h e n it is off its course to the left, and to the left when it is off its course to the right. All such devices tend to maintain some quantity—such as, a velocity, a flow, a temperature, a direction, a pressure, a liquid level- constant at a pre-assigned value irrespective of an input which m a y be 186A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y fluctuating, or of an output load which m a y also be fluctuating. They consist essentially of the following components: 1. A 'setting' device which designates the value required to be kept constant. 2. A measuring device which generates a signal indicating the actual value in question. 3. A subtractive device which subtracts component 1 from component 2 and so generates an error signal. 4. A n amplifying device which converts the error signal into a source of power. 5. A servo-mechanism which applies power to the controlled system in such a w a y as to cause an increase in the signal (component 2) when the error is negative, and a decrease w h e n the error is positive. This mechanism m a y be linear (effect simply proportional to cause) or non-linear as in the case of on-off systems such as thermostats. T h e point to note is that these systems are diabolically unstable, and 'hunt' or 'oscillate' about the desired performance instead of maintaining it constant. This is particularly true of non-linear systems. In fact, the cure is often worse than the disease, and early attempts to stabilize ships against rolling resulted in their turning turtle—owing to the designer's inability to stabilize the stabilizer. Guided missiles have given a tremendous incentive to designers in the control field, and our understanding of the all-important but very difficult non-linear systems has increased noticeably in the last 15 years. Current progress in this field is associated with the design of simulators, sometimes called analogue computers (not to be confused with digital computers, see the next section), which are all-electric models of control systems which m a y themselves be pneumatic, hydraulic, aerodynamic, etc. Apart from aero- nautical and marine uses (for example, the D e n n y - B r o w n ship-stabilizer), the most important field for control engineering appears to lie in the chemical industry, where continuous processes involving multiple feed-back loops m a y , if unstable, be highly dangerous, owing to 'surging'. Control engineering is, from the standpoint of its importance, in s o m e - what marked contrast to the other topics embraced by 'automation'. In all these fields the advances have been primarily practical and empirical. In control engineering the advances have been mainly theoretical. This has led to an interesting situation in which control engineering terminology has been found to have a wide field of application in quite unrelated directions, notably in the physiology of the nervous system and in economics and socio- logy. In so far as it avoids control engineering terms, the language of political controversy in economic matters is becoming increasingly archaic. 187A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y Communication Engineering—Computers In expounding an unfamiliar subject, two types of difficulty m a y be encount- ered—conceptual difficulties and complexities. In expounding the modus' operandi of a digital computer, the difficulty is of the second kind. There is no conceptual difficulty, but the reader cannot be expected to follow an explanation involving the interaction of parts w h e n these are numbered in thousands. The following general picture can however be attempted in terms of certain familiar devices: the Morse code, a clock, a gramophone record, a telephone, and the operation of dialling a telephone number to an automatic exchange. These devices m a y be used for the purpose of illustration as follows. The Morse code is k n o w n to represent numbers and letters of the alphabet as combinations of dots and dashes. Let it be supposed that w e are dealing with a modified code in which a dash is represented by the absence of a dot. In order to be able to discriminate between the absence of a dot and a pause between dots, w e suppose further that the transmission of information in the code is coupled to the ticking of a clock. T h e absence of a dot is then equi- valent to suppressing a 'tick'. Suppose next that w e have a gramophone record, dictaphone, tape re- corder or some such device on which 'ticks' transmitted by a microphone can be recorded (written) or reproduced (read). Turn next to the telephone. T h e reader will be familiar with the fact that a telephone can be used in two ways—either for sending a message, or for dialling a number . W h e n dialling a number, one can hear the succession of 'clicks' or 'pops' which occur w h e n the dial is released, and which are the means of activating a response at the automatic exchange, whereby a circuit is set up connecting the subscriber to his correspondent. Lastly, conceive that the telephone is operating to a rhythm ultimately derived from a clock, and that it is transmitting coded letters or numbers stored on the gramophone record or 'store' in such a way that during alternate periods the device treats the information from the store first as a dialling signal and then as a message. There is no distinction in kind between dial- ling signal and message. Both consist of clock 'ticks' with some of the ticks suppressed according to the code in use. T h e difference consists entirely in h o w the circuitry of the machine treats them. A s described here, it treats them as an alternate series: dial—message: dial—message: dial—message. The effect of such a design is that the machine will perform a programme of operations in accordance with the coded 'information' on the record or store. If the unit alternation dial—message results in an operation of the form 'contents of store A via route C to store B ' , and C is the accumulator of an electrical adding machine working in the appropriate code, the effect 188A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y will be that some number stored at A (A is usually called its address) is added to the number in the accumulator and transferred to store B (ad- dress B ) . A , B and C are merely numbers suitably coded. Those familiar with accountancy will recognize that this is what an ac- countant is continuously doing: taking a sum from one account, adding something to it, perhaps, and transferring it to some other account (which could be identical with the first). For example, a bank balance might be extracted, credited with the sum on a pay-in slip or debited with the amount of a cheque, and the balance thus modified written back into its original position. The importance of this to accountancy lies in the simple fact that, these devices being all electronic, the clock 'tick' which controls the basic rhythm of the machine can proceed at the rate of a million ticks per second. This is high-speed accountancy with a vengeance! It is m u c h more than that, however, for so spectacular an increase in speed opens up whole n e w territories for exploration, inasmuch as c o m - mercial or managerial calculations too laborious to be undertaken otherwise, become possible for the first time: calculation of optimum traffic routing, for example. Alternatively, these machines open up a n e w technique in the field of management accountancy, so called 'management by exception'. In this instance, management only receives in the first place such information as appears statistically significant and requiring action. The computing device can select this information from the total information in its store according to criteria laid d o w n for it in advance by statisticians and mathematicians. Lest it be imagined that this would lead to a managerial rigidity confined to a framework of rules laid d o w n in advance, it should be added that with machines of this kind management can have as m u c h more information as it pleases to call for from m o m e n t to m o m e n t , by an operation equivalent to 'changing a gramophone record'. Computing machines of the electronic digital variety are highly novel. Historically, the first such machine produced its first useful result a bare eight years ago. However, a flourishing industry is already based on their production. Their full potentialities have still to be explored. O n e most interesting field of use covers the control of machine tools. This is liable to have a very far-reaching effect on small-scale production, that is, where but one piece of some very complicated shape, such as a three-dimensional c a m , is required. Reductions in working time of the order of ten or twenty to one have been claimed for devices of this kind. It might be noted that the most advanced pioneering design of this kind was inspired by an acute and irremediable shortage of skilled labour in the district where it was produced. Such is the fourth topic which can properly be included in 'automation'. 189A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y AUTOMATION AND TECHNOLOGICAL CHANGE In view of the likely spread of automation, it is desirable to have a clear pic- ture of h o w the technological world reacts to changes of a novel character. A novelty can frequently be postulated years in advance of its first eco- nomic reduction to practice. But a latent period of very variable length has to be presumed before this occurs. T h e first economic reduction to practice m a y be caused by one of three changes in the interim period. First, n e w methods or materials m a y have become available. This was so in the case of Whittle's gas turbine: creep-resisting stainless steel turbine blades were available to Whittle, whereas they had not been to his precursors in the field. Second, the economic factors m a y have changed in the interim, as witness the relative success of automation in Detroit twenty years after its relative failure in England. The history of retractable undercarriages for aeroplanes is another instance. Such undercarriages reduce drag. They were first pro- posed when air speed and drag were both too low for the reduction of the latter to be worth while. A s air speeds rose, retractable undercarriages be- c a m e economic. Thirdly, a special purpose m a y emerge which requires the use of the novelty irrespective of cost. Such was the history of silicone greases which found their first big field of application for certain special purposes in nuclear energy plants. Once the first economic reduction to practice has taken place a number of consequences follow. Duplicate devices cost m u c h less than prototypes. Costs c o m e d o w n , and what was barely profitable to start with becomes progressively more so as time goes on. Secondly, designers crowd into the n e w field opened up. Early designs are minutely examined and prove on analysis to be relatively clumsy and expensive. A wave of redesigning takes place, and relevant gadgetry multi- plies without limit. Costs accordingly c o m e d o w n still further. Thirdly, as costs are progressively reduced, so n e w fields of application become more profitable. A novel technical process is thus converted into a technical snowball. Nothing succeeds like success. Something of this sort is bound to occur with automation, whichever of its sub-divisions w e choose to consider. W e are scarcely at the beginning of 'redesign for automation' as distinct from 'production by automation'; nor has factory redesign for automation yet had m u c h consideration. In fact, 'reunification in continuity' cannot occur if components of manufacturing processes requiring 'reunification' are conducted at opposite ends of the plant site. In its physiology a factory resembles an arthropod, such as a lobster, rather than a verbetrate, such as a horse. Its rigid framework or skeleton 190A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y —its building—is outside, not inside, its functional organs. The framework cannot grow accordingly. A verbetrate and its skeleton grow in proportion to one another. A n arthropod must 'moult' at regular intervals if it is to grow. Factory growth is not dissimilar. A t intervals a n e w factory is built on an adjacent site and the old factory dismantled. W e must accordingly wait for a new generation of factories in order to see the full consequences of automation. The regeneration of factories is, however, a continuous process like the h u m a n birthrate. For this reason w e cannot expect to see spectacular results. For a long time to come the evidences of automation must be re- stricted to a patch here and a patch there, as at present. A n y technology which operates with long-life facilities cannot by and large produce short- term revolutions. THE SOCIAL AND ECONOMIC CONSEQUENCES O n e of the surprising disclosures resulting from the interest shown in the social and economic consequences of automation, and the controversies it has aroused, is that no one appears to have any clear ideas h o w social and technological changes accommodate themselves to one another. Does ad- vancing technology create employment or cause unemployment? Has society a normal state to which it tends to revert? Is it one of massive structural unemployment from which it has to be rescued? O r is it one of full employ- ment and inflation which has to be kept in bounds? Alternatively, has society no stable state? Is employment oscillatory and highly disturbed? A r e technological changes the sort of disturbances which cause oscillation? There seems no accepted doctrine on any of these points. Let m e first consider the integration of technical and social changes. Advancing Productivity Whatever the consequences of automation m a y be, they cannot differ from the consequences of any other advance in productivity—for an advance in productivity is what automation amounts to. Consider, for example,, that in 1956 w e enjoy per capita all the goods w e consumed in 1906 and m a n y more besides—automobiles, television sets, antibiotics, and other products which scarcely existed or did not exist at all 50 years ago. H o w is it possible to make , per head of population, all that w e m a d e 50 years ago and more besides? It can only be because w e can m a k e the type-products of 1906 with less effort than was entailed 50 years ago, the displaced productive-power being redeployed for the manufacture of, for example, television sets. In fact, productivity per head has been advancing at about 1¿ per cent compound interest per a n n u m for the last 191A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y 50 years, with a marked acceleration recently; the present figure is thought to be as high as 3 per cent. H o w is it, then, that w e enjoy full employment in 1956? Is it a coincidence? W e r e there no television, would all the people e m - ployed in manufacturing television sets be unemployed? If people could not buy television sets, would they buy vacuum cleaners instead? Would there be higher employment in other trades accordingly? Has technology a reservoir of ideas for consumers' durables, capable of absorbing redundancy, caused by advancing productivity, for an indefinite time to come? If any substantial thinking along these lines preceded public interest in automation, few of its conclusions seem to have found their way into circulation in time to be of any use in discussions of the matter. In these circumstances, I can only give m y o w n conclusions in the form of assertions. The first is that technology as such can create neither employment nor unemployment. The only component of society which can create employ- ment or unemployment is the money market. The second question, concerning the normal state of society, I must answer with a second and qualified assertion. Are w e talking of the pre-Keynsian or post-Keynsian economies? Keynes claimed to k n o w the answer to the cause of trade cycles, and F . D . Roosevelt gave his exponents a chance to prove it. In the opinion of most people, they succeeded in doing so. W e are all K e y n - sians n o w . In the pre-Keynsian era the normal state of society was one of deflation and structural unemployment. The investment rate tended, as it were, to b u m p along the bottom of its permissible value. A n economy in this condition is near the instability level and over-sensitive to disturbances which cause oscillations of the ' boom and slump' variety, with their attendant unemployment in the slump phase of the trade cycle. In the post-Keynsian era the investment rate has, by central government and banking action, been kept up to a permanent level high enough to maintain the economy in a reasonably safe, stable, non-oscillatory condition. At the price of some inflationary writing off of old capital, capitalist society has achieved the stability denied to it by Marxist theory. It appears that full employment, with some inflation, has c o m e to stay; and most people are prepared to tolerate the inflation for the sake of the increased stability. There has been a real change. T o the cynic murmuring 'Plus ça change, plus c'est la m ê m e chose,' I would reply that change can be real. The change from the mercan- tilist to the laissez-faire outlook was a real change. That from the pre- to the post-Keynsian outlook is another. The third question concerning the supply in perpetuity of novelties such as television can be answered in the affirmative, even though these novelties will not necessarily be technical in character. A sewing machine is a novelty for the housewife w h o has not got one. So long as man's standard of living is distributed over a broad range and there is an adequate investment and 192A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y employment policy, the raising of the standard of living of the lower levels in society to that of the higher can absorb any skill displaced by advancing productivity. T h e only issue therefore turns upon h o w society accommodates itself to advancing productivity locally and over short periods. Labour Turnover—Retirement and Recruitment Retirement and recruitment would appear to be the normal mechanism whereby technology is integrated with social change. A s happens too often where the under-endowed social sciences are concerned, the need to provide an authoritative answer to snap-questions in this field finds us short of the requisite information. The following picture cannot however be very far from the truth. First, a working career begins some time after school-leaving age at 15/16, and continues, in the majority of cases, until retirement at some time before 65. A s a first approximation, it thus occupies 50 years. There is accordingly a basic labour turnover of 2 per cent due to h u m a n senescence. It is m u c h greater locally, however, since not m a n y m e n remain in the same job or employment that they entered as apprentices or on leaving school. If the average m a n were to hold five jobs in the course of his working career, representing an average of 10 years apiece, the basic turnover in any factory would be 10 per cent. W o m e n frequently retire from work when they marry and start a family, and resume it again on completion of their principal life occupation as mothers: two 10-year periods, covering the ages of 15/25 and 4 5 / 5 5 , are likely to be spent in employment. This would correspond to turnovers of 10 per cent if only one job were followed in each period. If two jobs were followed, the turnover would be 20 per cent. It is not always easy to check these figures, owing to the inadequacy of available statistics. It is known, however, that there are two classes of employed labour, one k n o w n as stable labour, usually of a skilled variety, and the other as unstable labour, the former having a relatively low rate of turnover, the latter a relatively high rate. Gross turnover averages the two. For example, in the U . K . the figures for all industry for July 1956 were:1 Engagements and additions (per cent) Discharges and losses (per cent) Male 2.7 2.8 Female 4.2 4.4 Total 3.2 3.3 These are monthly figures (five weeks in this case), and it will be noted that they balance to within 0.1 per cent. T h e annual turnover appears accordingly 1. Ministry of Labour Gazette, July 1956, p. 271. 193A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y to be of the order of 30 per cent. It seems clear that a spontaneous turnover of something like 30 per cent can easily accommodate a 3 per cent displace- ment caused by advancing productivity at constant production. (In fact production is not constant but increases, so that any redundancy due to advancing productivity is less than the 3 per cent advance in productivity itself). The Changing Pattern of Society A s technology advances, the requisite pattern of skills changes across the years. Old skills become obsolete, n e w skills are called into being. Jobs that once required skill are performed by the unskilled, while jobs once the function of the unskilled are transformed so that skill is required in their performance. In one sense, however, the net changes are in the direction of increasing skill of a kind at the expense of un-skill. The proportion of society's members occupied as hewers of wood and drawers of water is dwindling, a higher standard of education is required of all, and the proportion of the highly skilled tends to increase progressively. This process is frequently described as the up-grading of labour. If a hard task once performed by h u m a n muscles is transformed so that it is effected by a machine requiring a skilled operative, w e say that the labourer has been up-graded into a machine minder. It is important to remember that the word 'up-graded' has a statistical and not an individual meaning. The individual labourer m a y only rarely be up- graded; he more usually changes his job. S o m e labourer's son, however, ceases to follow his father's calling, and becomes a skilled operative. Let it be supposed, then, that some skilled m a n is m a d e redundant by a n e w technical process. W h a t exactly happens to him as an individual? In the first instance, he merely changes his job and fills one of the vacancies that are constantly occurring owing to retirement of fellow workers possessing his skill, or to their leaving their job spontaneously for some reason or another. If his skill is 'on the w a y out', the consequence of a long-term trend, then there will be no d e m a n d for apprentices to replace those w h o retire and he will find himself a m e m b e r of an aging group of craftsmen, the demand for whose skill diminishes as their numbers dwindle. This is the broad picture. W h a t w e require to k n o w is h o w a process, which is clearly self-balancing in a statistical sense, operates equitably in its effects upon the individual. It is assumed above that the craftsmen displaced by a new technical vacancy can be redeployed. C a n they however be re- deployed without personal hardship? 194A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y Strain and Stress In engineering jargon a strain is a displacement, a movement of material; stress is the force that always appears as a concomitant of strain, resisting it, restoring the status quo. For a given strain, stress will be higher in a material such as steel than in one such as aluminium or lead. There are some advantages in carrying this terminology over into socio- logical nomenclature. Social strains will then denote displacement, dismissal, redeployment, and change of status or income, while the concomitant stresses will be psychic forces and their manifestations, resentments, strikes and so on. In the process of integrating social change with technological change, w e must assume that there will be strains. T h e problem is simply h o w to keep d o w n the stresses. Consider, for example, the strain represented by displacement and rede- ployment of labour. W h a t will determine the magnitude of the stress? Stress will clearly be least if the individual can be redeployed at the same occupation and wage within the same factory. Even in this case, stress will not vanish, for there will be anxiety until the issue is clear, and anxiety, even if finally relieved, will leave a scar of resentment. Stress will be greater if the individual has to seek alternative employment. There will be anxiety until it is secured, and there m a y be dissatisfaction with its nature. This dissatisfaction will be least if alternative employment is secured in a locality no farther from h o m e . It will be m u c h greater if change of employment involves change of district. Stress will be greatest if a change of occupation is involved, especially if a skilled craftsman, after a period of unemployment, secures employment as a labourer at a lower rate of pay. M u c h of the report of the Department of Scientific and Industrial R e - search on automation is concerned with techniques for keeping the stresses d o w n , with particular reference to re-training of displaced personnel. H o w realistic re-training will prove to be on the material plane, it is difficult to foresee. It is hard to teach an old dog n e w tricks. Its advocacy, however, is real on the psychological plane. It is not enough that justice be done: it must also be seen to be done. It seems but fair that if a man's occupation is transformed by a machine, then he should be given a chance to be the m a n to work the machine if he can; that if his skill is in danger of redundancy by other men's actions (the whole complex of actions by management, designers, technologists, scientists and others responsible), then these actions should include re-establishing him at his old earning power; and that the cost of doing so should be part of the true cost of the technical development rendering him redundant. It is perhaps worth noting that this approach is advocated by scientists and engineers, and is a welcome sign of their sensitivity to the problems they help to create. It might be helpful to introduce here two concepts currently used by the 195A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y communication engineer: that of 'signal' and that of 'noise'. A signal is what- ever can be recognized and acted upon. Noise is the component of a signal which contains no information and cannot therefore be a basis for action. Social hardships m a y be considered in these terms. A certain amount of hardship is inevitable as the price of being alive. It is always happening to someone. Should society treat it as signal or as noise? Thus in the United Kingdom, for example, 20,000 people die by violence every year: 5,000 on the roads; 5,000 from industrial accidents; 10,000 from domestic accidents—they fall out of windows, out of bed, downstairs, into the fire or off ladders; they electrocute themselves in the bath, are struck by lightning or eat poisonous mushrooms; they commit suicide. These accidents occur after the traffic police, the factory inspector and society at large have done whatever is possible to ensure that they do not occur. They are what cannot apparently be helped. Yet each of them means hardship or sorrow for someone. I suggest that they should be regarded as society's 'noise level' of personal misfortune. In this sense, the misfortune of the m a n in a thousand w h o , under present conditions of full employment in the United Kingdom, m a y be unemployed for so long as 10 weeks if he loses his job, is 'noise'. W h e n society has paid his unemployment relief, it has done all that can be done. Whether the victim reacts with fortitude or self-pity, there seems little his neighbours can do about it, save by way of sympathy and small kind- nesses. But structural unemployment, by contrast, is not 'noise'; it is a 'signal' calling for action. BACK TO AUTOMATION With a firmly established picture of h o w the integration of social change with technological change takes place, w e can return to our original subject. Automation does not differ generally from any other advance in productivity, and everything that has been said here applies not only to automation but to any other technological advance. Strains caused by automation will be no greater than those caused by any other technological advance. The stresses associated with them will be determined by the manner in which they are dealt with, and this will not be affected by the technological origin of the strains. All that remains for consideration therefore is the number of occasions on which strains will arise. Reverting to the engineer's concepts: will the social strains arising from automation be signal or noise? There already seems to be sufficient evidence to assert that they will be indistinguishable from other background strains. Let us consider the components of automation in order. 196A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y Transfer machining is n o w some 10 years old and its introduction seems to have been as strain-free as that of any other n e w process. It has so far been employed in the context of consumers' durables, such as automobiles, and its use has been initiated to clear production and bottlenecks in factories where total employment is rising. It is difficult to see w h y it should cause more strain in the future than in the past. Automatic assembly has been employed for so long in the electric-lamp bulb industry that its introduction elsewhere should not cause alarm. In the context of the electronics industry (printed circuit assembly techniques) any displacement it effects is likely to fall on young female labour having a very high rate of spontaneous turnover. There should therefore be no serious problem here. Control engineering techniques are already widely employed in the c h e m - ical industry, which uses them pre-emptively. This industry characteristically employs but few direct operatives as compared to maintenance engineers. It is only the plant operators w h o will be affected by automation, and they are more likely to be assisted than displaced. (Note that an autopilot does not replace the pilot of an aeroplane. It merely lightens his task.) W h e r e but few are employed, few can be displaced. Data processing and computerized accountancy is the most interesting of the four cases calling for analysis, because a digital computer is a more fundamentally novel and powerful device than any other employed in auto- mation. Accountants are likely to be the victims, if there are any, particularly accountants concerned specifically with the mechanics of book-keeping. It must be remembered in the first place that such accountants are not generally employed in local concentrations; with rare exceptions (such as, in the U . K . , the City of London, and the National Health Insurance offices in Newcastle) they never constitute local industries to be compared with coal-mining, ship- building, or automobile manufacture. They are distributed over all industry. Secondly, the computerizing of an office routine is a long and tricky business. Those qualified to operate it are at present an almost microscopical handful, and suitable recruits are very difficult to find. Computerization, therefore, can scarcely proceed very fast, even if the production difficulties involved in manufacturing computers on a large scale could be overcome. Thirdly, accountants and clerical workers generally are at present in short supply; there is little prospect of automation doing in this field more than it has tended to do in every other field where it has been introduced, that is, to clear a bottleneck. It must be remembered that a n e w facility presents the user with three opportunities. T o perform a traditional task more cheaply, to perform it better for the same cost, and to undertake some non-traditional task. T h e importance of computers, in the opinion of those w h o have used them most, appears to lie in the second and third of these opportunities. 197A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y Having considered the four types of interaction which automation m a y have with industrial society, w e m a y conclude this section with a review of those industries which are unlikely to be affected by labour displacement as a result of automation. In each case the fourth type of automation, c o m - puterized accountancy, will be disregarded, since clerical work is more or less the same everywhere and has been dealt with above. With this qualifica- tion, industries m a y be split into the following groups. 1. Industries where automation is unlikely to be applied, for example, agri- culture, mining and transport. All are highly mechanized, but the sub- species of mechanization which pertains to them does not seem to be automative in character or to lend itself to further automation. 2. Highly mechanized industries where automation seems unlikely to be applied, other than as an occasional auxiliary. The textile industry based on natural fibres is one such case. N o doubt textile machinery can be improved and productivity raised, but that does not by itself constitute automation. Transfer does not seem to be a problem involving m a n y operations, though the auto-doffer for ring spinning frames has some- thing of the transfer idea in it. Control-engineering techniques seem u n - likely to be more than useful auxiliaries. They are unlikely to cause labour displacement. 3. Industries basically similar to the chemical industry, that is, those which have low direct labour costs and where automatic control techniques are more likely to improve the performance of the operatives than to render them redundant. All continuous processes, and plants operating them, such as sheet rolling mills, would fall into this class, together with brick- making, iron and steel works, coke ovens, gas works, electrical generating stations, and so on. 4. Industries such as soap and beer manufacture, where an initial operation resembling those of the chemical industry (group 3), for example, soap boiling or brewing, is followed by a highly mechanized stage (similar to one of those in group 2) for distribution purposes, for example, soap tableting and packaging, and beer bottling. 5. Trades involved in the manufacture of heavy capital goods, such as, housing and structural engineering generally, and shipbuilding. The trades most likely to be affected are those already aware of their involve- ment with automation, that is to say, those engaged in manufacturing con- sumers' durables. These trades are already highly sensitive to problems of redundancy, as they are always the ultimate victims of a slump or a fiscal policy based on restricting consumption. In this connexion, it should be noticed that the recent increase in purchase tax on automobiles and the restriction of credit for hire purchase in the U . K . has dislocated the employ- ment situation in the British motor industry far more than the installation of transfer machining ever did. 198A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y BENEFITS AND LONG-TERM EFFECTS Having looked on the dark side of automation, in so far as it has one, and decided that it is not so dark, let us dwell briefly on its advantages. First, it must be regarded as an advance in productivity, and welcomed accordingly as the type-contribution to a continually rising standard of livi</span><span data-dcnode-id="6" instrument_node="">ng. In this sense, it is but the current phase of a process at least two centuries old. Its adoption will be enforced by competition. Whether misinformed theorists like it or not, automation will be adopted. The issue, as the D S I R report clearly demonstrates, is whether w e put it to good use or not. It m a y however be more far-reaching than a mere current advance in productivity. In a section of his book specially written for the American translation, Friedmann1 considers automation, without however defining it very clearly (he seems to think mainly in terms of transfer machining). H e concludes that it m a y offer an avenue of escape from the problem whose answer partly baffles him—the monotony of sub-divided repetitive tasks, and the elimination of joy in work from the worker's daily routine. Personally I doubt this being so, and yet there is a sense in which I believe Friedmann m a y be right if one takes a long enough view of the matter, though the solution which he foresees will not, I think, any longer be called 'automation' when it becomes manifest. I believe, in fact, that our society is emerging from the worst of the machine age into better times, and that automation is a symptom of this partial emergence. There has been a trend to 're-unification in continuity' for some time, and automation is an aspect of it. Increasingly, continuous processes replace batch processes, and observational skills are becoming as highly sought for as manipulative skills. The passing of the old-fashioned foreman, old-fashioned manager, and old-fashioned boss are palliatives. The tyranny of the assembly line (which actually affects only a minority, though a vocal one, of workers) is becoming less unendurable, while in patches it is being mechanized and integrated—though only in patches and that but experimentally. If Friedmann is correct in his hope and I a m correct in m y belief, then our society has escaped spiritual destruction, though perhaps by a very small margin. THE LABOURER M y o w n concern has from the start been with the m a n w h o is not going to be affected by automation rather than with the m a n w h o is—the hewers of wood and drawers of water w h o do the heavy labouring work for a society 1. Georges Friedmann, Industrial Society, T h e Free Press, Glencoe, Illinois, 1955. 199A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y which does not k n o w h o w to lighten their task. Typical of such are the coal-miner, the stevedore, the road-mender, and the builder's labourer. T h e miner has the dirtiest, hardest, and most dangerous occupation in the world. T h e stevedore ranks second. The road-mender and the builder's labourer are subject to every hazard of wind and weather. N o matter h o w highly mechan- ized the task m a y be, the unpleasant and dangerous character of coal-mining will remain so long as coal is black and must be w o n underground, subject to the hazard of a roof that m a y fall or of fire-damp that m a y explode. W h a t is going to be the effect on the community of harbouring within it a dwindling minority of essential workers w h o live a life u n k n o w n to the rest of the community, subject to dangers unshared by the rest of the community? T h e life of a fisherman is hard; it is also dangerous. But the fishing fleet does not sail in and out at the beck and call of a siren, and if the sea is dangerous it can also be beautiful. There is a 'lure of the sea'. Is there a 'lure of the mines'? T w o problems require to be faced, and w e k n o w the answer to neither. T h e first is h o w to lighten the essential burden of the miner's occupation. T h e second is h o w to integrate his outlook with that of the rest of the community. These are indeed baffling problems. SCIENCE AND INDUSTRIAL SOCIETY T h e function of science is to observe, explain and expound. It is not its function to take sides in controversy, for controversy only arises where authoritative exposition is lacking because science has nothing to say. In so far as scientists have any part to play in controversy, it can only be by placing the facts at the disposal of all contestants so that they m a y see the nature of their dispute more objectively. In writing of automation, I have endeavoured to keep this ideal before m e . The main problem our society has to resolve is the inability of m a n at any level of specialization to undo his mythical fall, and re-integrate himself. This fact is basic. There is no dif- ference in this respect between worker and manager, and the fall is replicated at every level, manifests itself in every occupation, and repeats itself every day as, grasping at a more abundant life for ourselves, w e .initiate develop- ments whose consequences w e cannot foresee. It appears, moreover, that this cannot be otherwise: as w e re-integrate ourselves in one respect, w e are disintegrated in some other. T h e Marxist attempt to re-integrate society economically merely disintegrated whatever tender growth of liberalism once existed in Russia. T h e political liberalism of Western Europe merely connived at gross exploitation of m a n by m a n in the economic sphere. O u r current dangers lie in the division of society into two hostile sub- groups, a managerial group relatively free and a workers' group relatively 200A U T O M A T I O N : V E R B A L F I C T I O N , P S Y C H O L O G I C A L R E A L I T Y unfree. Their unfreedom and their discontents are however of a sophisticated character. Although the cleavage follows the old line of demarcation between rich and poor, riches and poverty are not the current issue between the con- testants, for the standard of living in the West is n o w so high that poverty in the old sense of the word scarcely exists. The current issue, barely acknow- ledged to be so, is more freedom in relation to work. It m a y well be the case that as freedom spreads, any residual bondage is felt to be increasingly savage. It m a y be the case that where bondage is least, there it is felt to be most insufferable. For this reason I regard our current discontents as sophisticated. They could not occur at a lower level of evolution. O n all such matters, however, w e need far more information than w e yet possess. W e cannot give manager and worker an objective picture of one another, because w e do not k n o w enough about their interactions. W e can, however, recognize components of hostility, of suspicion, of anxiety, and its attendant aggression. These are psychological realities. Their causes m a y not correspond to material realities. Therefore, it seems, good will and trust must to some extent be dependent upon objectivity springing from dispassionate accumulation of facts. Automation is a material reality. It is also a psychological reality. T h e two realities do not necessarily correspond. A s a material reality automation is a source of wealth. A s a psychological reality it is a source of fear. M a y this present essay help to show h o w the two realities can coalesce, for such is the function of the social sciences in their application. They have few functions of comparable importance to the contemporary world. 201THE IDENTITY OF THE PERSON- ITS IMPORTANCE FOR THE INDIVIDUAL AND FOR SOCIETY by CHARLES SANNIÉ Dr. Sannié is Honorary Professor at the Faculty of Medicine, Paris, and Professor of Organic Chemistry at the National Museum of Natural History. Since 1930, he has been Di- rector of the Identité Judiciaire (Criminal Records Depart- ment)—the third to occupy that post, following Bertillon and Bayle. He is the author of a number of works on chemistry and forensic science and of various reports and books on criminology. If there is one concept of which each of us is aware in the innermost recesses of his being, it is surely that of his o w n personal existence, of his inde- pendence vis-à-vis all other living creatures. All our reactions—psychic, moral, religious or biological—find therein a personal, an inner, support so strong that most of our acts are determined by this feeling of our indi- viduality. But the notion of identity extends far beyond the limits of the individual. All w h o are interested in the problems of life have been led to extend it to ever wider zoological groups, establishing thereby the concept of race, species, genus and order. It is possible to understand the countless variety of living creatures only through this classification which, starting with the indi- vidual, ends with the huge aggregates formed by the zoological groups. In this study, the closer w e get to the individual the narrower become the characteristics of the species, then of the race or variety. Here, morphology is not the only thing to be considered; the dog, Canis familiaris, provides one of the most striking examples. A s Isidore Geoffroy St-Hilaire wrote a hundred years ago: 'Where in the list of m a m m a l s should w e find not only two species of the same natural genus, but two neighbouring genera differing from each other from the point of view of the development of their brain and skull to the same extent as do the barbet spaniel and the pug from the majority of other dogs?' Apart from morphological identity, which is often concealed by considerable variations in shape or size, w e must thus have recourse, in order to define the species, to the biological notion of inter- fecundity. It is thus sometimes more difficult to define accurately a race than an individual. Anyone w h o has kept dogs will have no difficulty in recognizing 202THE IDENTITY OF THE PERSON his o w n dog from a m o n g a hundred other similar dogs, whereas the naturalist has difficulty in defining the species dog. T h e individual possesses certain sufficiently specific characteristics to enable persons in daily contact with him to recognize him without difficulty. This notion of individual identity applies, of course, throughout the scale of animate beings. If w e cannot distinguish one bacterium from the next, one fungus from another of the same species, this is because w e are not able, or do not k n o w h o w , to distinguish the characteristics which differentiate them. But these characteristics exist, and a close study very often makes it possible to discover them. Identity, whose importance is fundamental for the living creature, can be considered from a great m a n y points of view. W e shall not attempt here to deal with the question in general, but only to define it in respect of the h u m a n species, taking in turn its various aspects. PSYCHOLOGICAL IDENTITY O f first importance in the case of m a n is the consciousness that each of us has of his 'self, of what m a y be called his psychological identity. A n essential characteristic of the h u m a n being is the sense of his o w n individuality which everyone possesses as m u c h by instinct as by reason. Descartes's famous aphorism: T think, therefore I a m ' perhaps expresses it most accurately. This notion is so normal that the loss of it is regarded as pathological; it is one of the forms of madness. It appears so universal that it has become part, in one form or another, of the majority of religions. It has been the subject of countless debates between philosophers and psychologists, which w e need not discuss here. A s the share of the intellect in the sense of personality becomes stronger, that sense broadens, embracing a greater number of aspects, but it loses in precision. Biological or morphological identity have material bases that are more or less easy to determine and, even if w e do not k n o w them in detail, w e can at least always conceive of their existence. But as soon as w e enter the psychological or the psychical sphere, facts become less and less clear- cut until finally they are completely obscured, giving place to purely sub- jective notions that are highly controversial. However , in spite of this im- precision, the sense of one's o w n personality is probably as strong and as widespread a m o n g animate beings as is the maternal instinct, even though each of us can only k n o w with certainty what pertains to his o w n life. 203T H E IDENTITY OF T H E P E R S O N BIOLOGICAL IDENTITY A n y o n e w h o analyses by chemical or biochemical methods a large n u m b e r of living creatures belonging to the same species, or even to widely differing species within the same genus or the same order, cannot fail to be struck by the similarity between their essential components, and even between their metabolisms. For instance, a m o n g all m a m m a l s , m a n included, the same protides, glucides and lipides are to be found, and the same mineral salts in fairly equal proportions. They all follow an identical procedure in breaking d o w n their food or building up their tissues, with the aid of the same series of reactions and the same enzymes. T h e vitamins they need, the hormones which co-ordinate their biological reactions are similar, often interchangeable. Their excreta are identical, varying only in the proportions according to the source of food. There are, of course, a few differences. The digestive mechanism of rumi- nants, especially in their stomach, is not the same as that of carnivores. This is due
