ctice, however, the future of leaf protein extraction is not likely to lie with the individual farmer. The cost of the machine (at present something over £-4,000 for the complete outfit) is such that only the larger farmers in the wealthier countries could afford to install it. O n the other hand, the scope offered to co-operatives, feeding-stuff manufacturers, etc., is very wide. In- vestigations so far undertaken indicate that leaf protein extract can be prepared at perhaps two-thirds of the current price of animal protein, so that an early effect m a y be a reduction in the price of animal feeding-stuffs, and hence in the price of certain foods for h u m a n consumption. Scope for still further economy lies in the possible use of materials which otherwise would be wasted, such as pea-vine waste and sunflower husks, as well as several luxuriantly growing plants n o w regarded as weeds, such as nettles and goosefoot. M a n y other weeds and by-products, such as sugar- beet tops and even potato-haulm, m a y also be utilized, and the possibilities in tropical countries are immense. Experiments on a laboratory scale show that potato-haulm is a substance from which leaf protein can be easily extracted. It appears that if the haulm is left on the plant until the time w h e n it just starts to deteriorate, and is then cut, little or no effect is noticeable on the crop of tubers. A n y additional use m a d e of the haulm would therefore increase the profit per acre. T h e wet weight of green matter per acre in potato-haulm is somewhere around 10 tons per acre. A s the amount of crude protein available in potato^haulm is about 1.5 per 231L E A F PROTEIN: F O O D OF T H E F U T U R E cent of the total wet weight, an acre of potato-haulm would yield about 336 lb of crude protein, of which more than half could be extracted by present processes. A 10-acre crop of potatoes could thus yield 15 cwt leaf protein extract. The cost of extraction amounts to from £ 1 5 to £ 2 5 per ton, according to the number of hours the machine is used annually. A processing plant situated in a potato-growing district, where it could be used most advantage- ously, would thus extract 15 cwt of leaf protein at a cost of about £ 1 0 to £ 1 2 . The value of leaf protein at present amounts to some £ 5 0 a ton, that is £ 3 7 10s. for 15 cwt, which would give about £ 2 5 of profit per 10 acres from a by-product which would otherwise be wasted. This profit is well worth considering when w e remember that the potato crop in Britain alone covers well over 1,000,000 acres. N o r is potato-haulm the only waste product that can be used seasonally. In installing a plant, arrangements would have to be m a d e for the bulk of the green matter to be provided by a succession of green crops, such as lucerne, grass and cereals, with potato-haulm filling in a few weeks towards the end of s u m m e r . Pea-vines and sundry vegetable waste could similarly be utilized. In tropical countries, the waste products from various commercial crops nearly all present difficulties. Cotton, sugar-cane, cassava and sisal are all harvested at a time when the leaf growth has passed its prime. However, some of these leaves at their best contain fairly high quantities of protein, particularly cassava. It has been suggested that late manuring with nitrogen could increase the growth and protein content of the foliage of sugar-cane and cassava, and that slightly earlier harvesting might catch this protein at its best without materially altering the value of the rest of the crop. Banana leaves have also been suggested as a possible source of supply, though, so far as is known, no experiments in protein extraction have yet been m a d e with them. W e e d growth in tropical lands is also rapid and luxuriant, and might well be harvested as a catch-crop. Beyond the present stage of converting such vegetable raw material into digestible protein for livestock lie the infinitely more important prospects of using it for h u m a n consumption. A s w e have seen, most of the basic problems are solved. The present protessor machine is perfectly capable of producing from various green matter a meal rich in protein and digestible by h u m a n beings. This meal, being tasteless, odourless and colourless, could be used as a basis for an infinite variety of food preparations, from soups to ice-cream and biscuits. Flavour could be added at will. Moreover, the protessor machine is only a beginning. Its potentialities have by no means been thoroughly explored; nor have those of the protess it produces. Other machines will no doubt be introduced within the next decade or so. 232LEAF PROTEIN: F O O D OF T H E F U T U R E A s stated earlier, m a n y teams in several countries are engaged in research, on the problem, and everywhere a wide measure of success has been achieved on a laboratory scale. It m a y be expected that, before long, a variety of leaf protein extraction plants capable of operating on a large scale will be pro- duced, some perhaps similar to the protessor, others based on different principles. It is not difficult to imagine, in the not too distant future, m u c h of the lavish but at present useless vegetation of the tropical countries being thus forced to yield up its protein to feed the teeming population of these lands. Such a development would prove a powerful n e w factor in solving the prob- lem of the world's food supply. 233BOOKS AND PUBLICATIONS The Father of Scientific Detection Henry T . F . Rhodes, Alphonse Bertillon, Father of Scientific Detection, pub- lished by George G . Harrap, London, 1956, 238 p., illustrated, price 15 s. T h e lives of famous m e n , w h e n not romanticized but described realistically with all their greatness and their misfortunes, often m a k e most interesting reading, and one is frequently struck by h o w m u c h in their careers appears to have been due to chance. H a d Alphonse Bertillon not been a failure, that is to say, a schoolboy incapable of absorbing what he was taught or of submitting to the necessary discipline of school, had he not failed in all his examinations and reached the age of 20 without acquiring either m u c h general knowledge or any degrees, he would probably be completely unknown to the general public today. Despite the influence of his father and grandfather, he would not, in any case, have been able to realize his long-cherished ambition of becoming a laboratory assistant at the National M u s e u m of Natural History, with an annual salary of 1,200 francs and the hope of possibly one day being m a d e a demonstrator. Modest as this dream was, it was too ambitious for him, since it called for the possession of degrees which the young Alphonse was incapable of obtaining, considering that he did not pass his baccalauréat until the age of 20, and even then with some difficulty. W h e n an undisciplined youngster is expelled from all the schools which have endeavoured, one after the other, to m a k e him m e n d his ways, w h e n he refuses to assimilate either the rudiments of Latin grammar or the most elementary notions of history and geography, what is there to do, w h e n he comes of age, but to send him abroad? There, he will at least be obliged to speak the language of the foreign country. If, at the same time, he is given no money, the unruly young m a n will have to cope with the harsh necessities of daily life and show what he is m a d e of. This exile was Bertillon's first stroke of luck. In those days (1874), it was very unusual for young Frenchmen to leave their country and spend several months or years abroad, even if it were no further away than England. Alphonse Bertillon's stay in that country was to influence him all his life. Not only did he adapt himself to English customs and the English outlook, but he came to like them and ever afterwards showed their influence. At the same time, he learnt to write and speak English fluently, which was later to prove very useful to him. 234B O O K S A N D P U B L I C A T I O N S W h e n recalled to France in 1875 to do his military service, Alphonse Bertillon was sent to Clermont-Ferrand and, for the first time, his family heredity, which was later to play such an important part in his work, began to influence his life. T h e French army in those days was very different from modern armies. Courteline's descriptions are only just caricatures; his people are all too often faithful portraits of the officers and non-commissioned officers to be seen at that time, in their thousands, in all the small garrison towns of the country. Even then, of course, there were m a n y exceptions; and fortunately Bertillon happened to strike one of them, for otherwise his natural unruliness might have cost him dear. A s it was, his officers realized that this young m a n had certain very unusual qualities and that the best course was to allow them to develop. W h a t can a young soldier in a small provincial town do with his spare time? If he spends his leisure attending courses at the faculty of medicine and, above all, in the anatomical theatre, measuring and comparing the length of h u m a n bones, he will certainly be thought somewhat eccentric. Yet that is exactly h o w Bertillon did spend his time, when not on duty, playing over again the games of his whole childhood, for he had been accustomed, from earliest youth, to the conversations and discussions which went on in the family between his father, grandfather and uncles, on sta- tistics, anthropology and anthropometry. Alphonse's father, Louis-Adolphe Bertillon, had refused to go into the family distilling business, since he wanted to take up medicine, which, in fact, he practised throughout his life. F r o m the beginning of his studies, however, he showed a marked preference for anatomy, and especially for anthropology—a science which was making rapid strides at that time. In particular, he was very m u c h taken with the various ways of applying mathematics to the h u m a n frame, described by Quetelet in his Physique sociale: from this he learnt that measurements of the h u m a n body could be expressed in terms of statistical laws and, from 1846 onwards, he began to apply those laws to certain ethnic groups. H e was thus able, thanks to Quetelet's laws and statistical research, to prove that the population of the department of the Doubs fell into two groups, one small in stature, of Celtic origin, and the other large in stature, of Germanic origin. A s a young m a n , Dr . Bertillon held extremely liberal political opinions and, after the failure of the revolution of 1848, he was imprisoned for no other reason—if reason it could be called—than that his ideas were too advanced. At Sainte-Pélagie, where political prisoners were at that time incarcerated, he was surprised to meet Achille Guillard, a m u c h older m a n and the author of a Démographie comparée, which was published in 1854; D r . Bertillon had followed a series of lectures on demography given by Guil- lard and had a great admiration for him. 235B O O K S A N D P U B L I C A T I O N S This encounter had a decisive influence, not only on Louis-Adolphe, but also, at a later date, on his son Alphonse. The friendship struck up during their six months in prison continued after both m e n had been released. Alone in Paris and very shy, Louis-Adolphe came to regard Guillard's house as a second h o m e , and the two families were very soon united by still closer ties when, in 1850, D r . Bertillon married Achille Guillard's daughter, w h o was thus to be the mother of Alphonse. It was during their time in prison that Guillard and his future son-in-law laid the foundation for the School and Society of Anthropology, which were established in 1859 by Broca, Quatrefages, Achille Guillard and D r . Ber- tillon, and were soon to enjoy an international reputation. All Dr . Bertillon's children, including Alphonse, were accustomed to hearing their father, grand- father and all their friends holding lengthy discussions on statistical and anthropological problems and the instruments for measuring the h u m a n body; and they very soon learnt to use those instruments. W h e n he had finished his military service, Alphonse Bertillon went back h o m e and had to be found employment. After an unsuccessful experiment in a bank, which very quickly dismissed the young clerk for his unruly conduct and untidy handwriting, he obtained a post, in desperation, as a clerk at the Paris police headquarters (Préfecture de Police), where his father had in- fluential friends. This was the turning point in Alphonse Bertillon's whole career. His w a y - wardness and lack of general education prevented him from achieving his ambition to undertake scientific research. In order to earn a living, and because he was incapable of doing anything else, he was obliged to accept a penpusher's job at police headquarters and, as luck would have it, found himself in the office responsible for copying out the index cards of the offenders committed to the cells each day; habitual offenders had to be sorted out from the others and, as Bertillon was of an independent disposition and hated routine work, he could not bring himself to accept the stupid procedure of his office and set out to improve it by the only means at his disposal, the only scientific methods within his range of knowledge. Thus, the science of anthropometry was born. This is not the place to relate its history; in any case, H . T . F . Rhodes devotes m a n y pages to it in his book. A study of its genesis and development shows that it cost Ber- tillon an amazing amount of effort to work out his methods. Rhodes several times draws attention to one aspect of the latter's personality, namely, that he was a technician far more than a theoretical scientist. In her book on Alphonse, his niece, Suzanne Bertillon, tells us h o w difficult he found it to prepare the notes or memoranda in which he described his methods, and indeed he wrote extremely little. O n the other hand, he was unequalled at perfecting a technique, carrying out repeated tests and measurements and 236B O O K S A N D P U B L I C A T I O N S comparing the results of his experiments. Apart from the invention of his methods of identifying habitual offenders, to which he owes his fame, A l - phonse Bertillon m a d e m a n y improvements in the methods and apparatus which he used in his photographic laboratory. For instance, basing his ex- periments on the work of Colonel Laussedat, one of the pioneers of photo- grammetry, he applied this technique to photographing the scenes of crime and his method can still be used today, although it has n o w been far out- stripped by the progress of stereo-photogrammetry. Because of the deficiencies of his general education, and particularly of his knowledge of mathematics, and because of his liking for experimental research, Bertillon's labours in working out his methods were far heavier than they would have been, had he been able to apply to his observations the principles and rules of statistical computation, which has m a d e such great strides since 1875. Bertillon m a d e up for the gaps in his knowledge by tenacity and unremit- ting efforts, which finally enabled him to overcome all obstacles; the saying that 'Genius is an infinite capacity for taking pains' is pre-eminently applic- able to him. This stubbornness was one of his fundamental characteristics and is reflected in his every act. It was not always without its disadvantages, however, some of them very serious, and it probably accounts for his attitude in the Dreyfus case, from the consequences of which he was to suffer for the rest of his life. Captain Dreyfus was court-martialled in 1894 and sentenced to transporta- tion for life and military degradation on the evidence of a document k n o w n as the 'bordereau', informing a foreign agent of the dispatch of information relating to national defence. After m a n y ups and downs and dramatic revelations, the Supreme Court of Appeal later recognized that no charge could be substantiated against the accused and Dreyfus, after having served part of his sentence on Devil's Island, was fully rehabilitated. At the very beginning of the case, the 'bordereau' was transmitted to Ber- tillon, in order that he might establish whether or not it had been written by Dreyfus; it was a question of comparing it with the handwriting of the accused by means of enlarged photographs, on which the Head of the Criminal Records Office was particularly expert. A s Bertillon had stated on m a n y occasions, he was convinced that handwriting experts could not be absolutely sure of their conclusions and that it was impossible to prove scientifically that a particular document had been written by a given person. This makes it all the more difficult to understand w h y he should have agreed to give an expert opinion on the 'bordereau', and, above all, h o w he could have at- tributed it to Dreyfus. Bertillon's advice on the 'bordereau' was sought by the Ministry of W a r at a time w h e n the case was still top secret; this appeal to his patriotism was 237B O O K S A N D P U B L I C A T I O N S impossible to withstand. After studying the document, Bertillon realized that it was a forgery. A n d indeed, if there is one thing certain in the whole case, it is that the famous 'bordereau' was not written by Dreyfus. W h e n he had applied his n e w techniques for the measurement of hand- writing to the text, Bertillon in fact came to the conclusion that the writing had been traced. Not stopping there, however, he sought to show, by specious reasoning, that the tracing had been done by Dreyfus himself, in an attempt to disguise his writing. T h e closeness of his reasoning, although in fact deceptive, seemed to him so unquestionable that it entirely convinced him. Subsequently, even w h e n it was obvious that he had m a d e a mistake, his obstinacy prevented him from admitting it. Again, Bertillon's obstinacy was at the root of his incredible distrust of fingerprints, which continued, unabated, until his death. W h e n the evolution of the problem of identification is viewed in perspective —the controversies and disputes in which the inventors of our methods of identifying criminals felt obliged to engage being things of the past—Ber- tillon's total lack of understanding of the admirable method of identification by means of fingerprints is quite astounding. A s he wrote on several oc- casions, he was convinced that it was impossible even to begin to classify— and particularly to classify any large n u m b e r of individuals—on the basis of their fingerprints. Yet, exactly the opposite is true—Bertillon's system of anthropometry cannot be used, without great complications, for large-scale classification and, as the scope of his classifications grew wider, he was obliged to resort to fingerprints as a basis for subdivisions. His attitude is surprising—for those w h o created the fingerprint system and particularly Sir Francis Galton, w h o has the distinction of having been the first to tackle this problem as a whole and from every angle, had drawn Bertillon's attention to the possible importance of fingerprints as a m o r p h o - logical feature in the identification of individuals. A s early as 1886 and 1888, Faulds had suggested that Scotland Yard might use fingerprints for that purpose. Nor could Bertillon have been unaware of Feorgeot's doctor's thesis on this subject, defended at Lyons in 1891 with Lacassagne, one of Bertillon's closest and most loyal friends, presiding. Bertillon's strong dislike of the fingerprint system can therefore be ex- plained only by his pride as an inventor, which led him to take any attempt to improve the art of identifying criminals as a personal affront. This would account for his behaviour in 1913 towards Vucetich, the great South American fingerprint expert, w h o was responsible for the substitution of fingerprints for Bertillon's system of anthropometry in the South A m e r i - can republics. Bertillon's wounded vanity, coupled with his natural bluntness, led him into grave discourtesy towards Vucetich w h e n , with a few biting remarks, he closed his door in the face of the visitor w h o had journeyed so far to see him. 238B O O K S A N D P U B L I C A T I O N » Yet even today m a n y people regard Bertillon as the 'inventor' of finger- prints. W h a t is even more astonishing is that he, w h o did not believe in fingerprints, in 1902 had the honour of being the first to identify a criminal w h o was entirely u n k n o w n to the police except by the marks of his ringers on the glass of a piece of furniture which had been broken open after a murder. With the help of those marks, Bertillon reconstructed the murderer's fingerprints and then, with infinite patience, worked systematically through his cards, on which, as the reader will remember, fingerprints served merely as a basis for subdivisions; he finally discovered a previous offender, H . L . Scheffer, whose fingerprints were identical with those left on the scene of the crime. Scheffer, w h o had fled to Marseilles, was arrested, confessed, and died shortly afterwards in prison. Bertillon undoubtedly invented the art of criminal identification, introducing into police methods the techniques and reasoning of a real science, namely, anthropology. In this sense, he m a y be considered as a pioneer. But is it justi- fiable to call him, as H . T . F . Rhodes does, the father of scientific detection? It would be ridiculous indeed to claim that, before Bertillon, no one had thought of collecting and interpreting the material evidence left by criminals* often involuntarily, on the scene of their crimes. T h e search for objective evidence is as old as the world, and its development, or rather the importance attributed to it, varies according to the legal system of each country. In legal systems in which the accusatory procedure is generally adopted, primary importance has always been attached to proof by evidence. Thus in R o m e , towards the end of the Republic, the signa, or material evidence, and the argumenta, or evidence of reasoning, were the basis of any accusation. Under the Empire, and with the trend towards inquisitorial procedure, the system of legal proof called for a confession, obtained if necessary by torture, or with the help of witnesses. Subsequently, u p to the Middle Ages , proof of guilt was based on divine intervention in h u m a n justice, leading to trial by ordeal and the judgement of G o d . W h e n inquisitorial procedure was finally established and regulated in France by the Ordinance of 1670, the system of trying to obtain a confession took precedence over that of seeking evidence. With the Renaissance, h o w - ever, scientific progress inevitably led to the adoption of m o r e scientific methods in the investigation of evidence and the handling of proof. Though ordeals m a y have been called the 'expert medico-legal appraisements of the past', the progress of medicine subsequently had a very great influence on police investigations; and in this w a y forensic medicine, the first science to serve the cause of justice, came into being. This happened, not only with medicine, but also with toxicology, and later with the more modern techniques evolved in the second half of the nineteenth century. Long before Bertillon's time, people had thought of 239B O O K S A N D P U B L I C A T I O N S jnaking a plan of the scene of the crime, and then of photographing it, but the process was still too complicated to form part of a policeman's everyday duties. It was not until the introduction of more and more sensitive silver bromide papers and plates that photography became a c o m m o n art in general use. It is nevertheless to Bertillon's credit that he realized h o w greatly this science could contribute to the improvement of police methods. While he was working out his system of identification, he also set up his photographic laboratory, originally intended for the photographing of prisoners, but later adapted to the study of fingerprints and clues left by criminals. In this sense, the excellence of his results and their general applicability fully entitle him to be k n o w n as a great pioneer in his field. Similarly, although long before Bertillon, others had thought of collecting material evidence left o n the scene of a crime and studying it in a laboratory, it appears that no one, before him, had had the idea of setting up a special body for this purpose. Such material evidence was nearly always within the field of forensic medicine, and the official pathologists often did not k n o w enough chemistry and physics to bring those sciences to bear upon the investigation and study of clues. In point of fact, Bertillon did not possess the necessary knowledge either, and so he concentrated on photography. This, however, covers so wide a field that the work done by Bertillon really represented the establishment of a full-scale laboratory for scientific detection. It was some time later, just before and during the first world war, that the most delicate techniques of physics and chemistry were adapted to criminal investigation problems. In this field, as in m a n y others, the needs of national defence called for research in entirely n e w directions, and instruments and methods used in physics and chemistry were introduced into police laboratories, which had previously been purely photographic. If Bertillon has a claim to be a pioneer it is not so m u c h because he created an entirely n e w science of criminal investigation, as because he brought to the police, which had previously worked on a purely empirical basis, the attitude and methods of the experimental scientist. His originality lay in approaching police problems as matters for scientific research and in using the most rational methods for solving them; w h e n he had elaborated those methods, he incorporated them in a series of specific rules, whereby the desired result w a s certain to be achieved. After solving the problem of the identification of old offenders, he en- deavoured, by reference to the data recorded on anthropometric cards, to devise a method of recognizing and identifying in the street an individual wanted by the police; this was the origin of anthropometric photography and the police description. :240B O O K S A N D P U B L I C A T I O N S Contrary to general belief, it is impossible to identify an individual with absolute certainty from a photograph alone. There is the danger of glaring, and sometimes tragic, errors; there have been well-known cases of indi- viduals arrested and imprisoned on account of their astonishing resemblance to certain criminals wanted by the police. The usual identity card and pass- port photographs, in particular, are quite unreliable, in view of the conditions in which they are taken—and especially as, in order to flatter the customer, they are often extensively touched up. Is a photograph therefore entirely useless w h e n looking for a suspect in the street? It certainly is, if it is taken without observing certain special rules. But on the other hand, if a portrait reveals the specific characteristics of the face, the photograph is then truly descriptive and can serve its purpose. In fact, in such a case, the photograph is not really of great importance; it is enough to note d o w n the facial characteristics, either from the photo- graph or direct from the person concerned, and to arrange them in accord- ance with a definite code, to be able to pick out in a crowd the person—the one and only person—who is being sought and w h o corresponds to the written description. These facial characteristics, arranged in a given order, make up the por- trait parlé (visual identification). This was probably Bertillon's most im- portant discovery and one which has stood the test of time. The system of visual identification is still taught in most police forces in the world; it is practically irreplaceable and all attempts to substitute other methods for it have been in vain. Scarcely anything is left of the system of anthropometry, for Bertillon's photographic methods and apparatus have n o w been super- seded by more advanced techniques; but visual identification is still, and will continue to be, what it was when invented by the genius of Bertillon. Bertillon's work thus opened up a n e w era in criminal investigation. The impetus which he gave to accurate research on evidence and the attitude of mind which he introduced into the police force have continued to m a k e steady progress ever since. A n d w e m a y well wonder whither this evolution will lead us and h o w far it will influence the course of justice. There is no doubt that the introduction of scientific methods into criminal investigation is a great step forward, and every discovery of science adds another stone to the structure which is daily growing before our eyes. The electron microscope, for example, with whose help the most infinitesimal objects can be studied, permits of identifications which would have been almost impossible in the past. Similarly, X-ray spectrography and micro- photography provide the best method of identifying car paint, while the use of radio-isotopes is becoming more and more c o m m o n ; this not only enables the working of certain poisons, such as arsenic, to be followed in the h u m a n body and such appendages as hair, nails, etc., but also makes it possible to narrow d o w n the age of prehistoric objects or bones. 241B O O K S A N D P U B L I C A T I O N S It is unnecessary in this context to give further examples; those quoted are enough to show what great strides are being m a d e in the field of criminal investigation; these developments are bound to have profound repercussions on the existing French legal system and penal code, the defects and short- comings of which are day by day becoming so evident, that a thorough study of the possibility of revising them is at present being made . T h e title of H . T . F . Rhodes' book is therefore well chosen. Alphonse Bertillon's scientific approach, the results which he achieved, and the in- fluence which he has exercised on his successors, undoubtedly entitle him to be known as the father of scientific detection. C H . SANNIÉ 242SCIENCE AND FILM Quarterly Journal of the International Scientific Film Association Published in March, June, September and December Subscription: 12s. 6d. per annum, post free Write for a specimen copy, free on request from: SCIENCE A N D FILM Film Centre, Ltd., 24-25 Conduit Street, London, W . l . In the December issue: Cinematographic Studies of Photostatic Movements of Chloroplasts by J. Zurzycki Experiences in making a Surgical Film by Dr. H. Meixner Full report of Tenth International Scientific Film Association Congress, with complete list of films shown. BIOLOGY AND HUMAN AFFAIRS A journal for teachers and social workers, designed to present an integrated approach to all the life sciences as they affect education, social welfare and human culture. Contributions are invited. In the October issue, 1956: Editorial Comment: Life and Death. The Adaptability of Trypanosomes, by W . E . Ormerod. The Different Worlds in which We Live, by H . Kalmus. Food: Personal Taste, Manufacturers, Scientists and the State, by R . Weatherall, M . A . Psychology and Human Affairs, by L . R . C . Haward, M . A . The School Museum and Biology Teaching, by B . W . H . Coulson. Deoxyribonucleic Acid. Book Reviews.BULLETIN OF THE ATOMIC SCIENTISTS T E N T H A N N I V E R S A R Y S Y M P O S I U M includes Science and Government T h e Scientist as Citizen Science and Our Times Food Economics and Politics The M a n of Science and His Responsibilities The Questions Science Cannot Answer T h e Social Co
