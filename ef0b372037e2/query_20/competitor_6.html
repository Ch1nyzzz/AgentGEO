to the nature of their food—plant cellulose cannot be hydrolyzed by the gastric juices meant for digesting meat. Similarly, with some species certain metabolisms result in very specific waste products. Thus m a n is able to break d o w n the nucleoproteins in his food only as far as the uric acid stage, whereas other omnivorous creatures break them down more c o m - pletely. But these are merely details, which are in no w a y confined to a parti- cular species. This inability on the part of the h u m a n species to transform uric acid is, in fact, found again in a certain breed of dog—and in one only! N o one, however, would dream of casting doubts on the fact of the bio- logical individuality of every living creature. Each individual in a given species is m a d e up of the same essential elements as other individuals in that species, but necessarily differs from them either by slight variations in the structure of those elements or by their different assemblage. Given the extraordinarily large number of individuals in the same species, and—to confine ourselves to the h u m a n species—given the fact that there are on this earth about 2,500,000,000 h u m a n beings, h o w are w e to explain that such a vast number of m e n built on the same structural model should all differ from one another? Not only, among these two and a half thousand million m e n , is none identical with another, but they each differ from their parents and their children, and that has been so, no doubt, throughout untold generations. Moreover, it is almost certain that their organs, humours and even their individual cells differ from all other existing cells, and this is doubtless one of the reasons w h y the grafting of organs is very often a failure. T h e research carried out since the beginning of the century on the con- stitution of the protides and glucides, together with the spectacular advances recently m a d e in this field, have m a d e it possible, if not to clear up entirely 204T H E IDENTITY OF T H E P E R S O N the problem of individual or cellular specificity, at any rate to understand h o w it could be brought about. Protides, which are specific components of all living beings, are formed mainly by a concatenation of simple molecules, the amino-acids of organic chemistry. Each of these amino-acids possesses one or several organic acid functions, and one or several basic nitrogen functions. The acid function of an amino-acid can be combined with the basic amino function of another, with the loss of one molecule of water, thereby giving a n e w body, a di- peptide, in which there still exist at either extremity an acid function and a free basic function. W h e n this process is repeated a number of times it gives rise to 'polypeptides', able to condense together several hundred simple molecules of amino-acids. W e k n o w h o w to synthesize aggregates which include a m a x i m u m of 20 amino-acids, and they have served as models for studying the structure of natural polypeptides, which are considerably m o r e complex. This constitution has been confirmed by the acid or fermentative hydrolysis of protides, which first of all gives simpler though still very complex molecules—peptones—then a whole series of polypeptides from the simplest to the most condensed. At the present time, w e k n o w of 28 amino-acids, that is to say, most, if not all, of those which exist in protides. W e have been able to isolate them from the products of the complete hydrolysis of the latter, to identify them, establish their structure and reproduce them by a process of synthesis. Finally, w e know, as already mentioned, h o w to condense them into simple polypeptides, and even h o w to reproduce in this way natural polypeptides. These explanations are necessary for an understanding of h o w the proto- plasm of every living cell can attain a degree of specificity that explains not only the individuality, the identity of each living being, but even that of the cell. Each protein molecule having a molecular weight of several thousands, or even several tens of thousands, thus contains hundreds of thousands of amino-acids. The 28 fundamental types of these acids can combine in every possible way, and m a k e it possible to effect a priori a number of combina- tions equal to 28 (number of k n o w n amino-acids) raised to a power equal to the number of amino-acids present in the protide molecule. If the latter is composed of 1,000 acids and all types of acids are represented, the number of possibilities that the combination of these acids allows for will be 28 1 0 0 0 . Such a number no longer possesses any real meaning for our intelligence; it far surpasses the biggest numbers employed by astronomers to express the interstellar spaces, and w e can no longer either write it d o w n or even clearly conceive of its magnitude. But it enables us readily to ascribe to every animate being, and even to each cell of every animate being, a specific protide, different from all other protides in time and space. But cellular specificity is still more complex. The protides composing the protoplasm are not simple chemical compounds; they play a part in the 205THE IDENTITY OF THE PERSON morphology of the cell by associating themselves with the other components of living matter, the glucides, lipides and mineral salts. Although the c o m - position of the glucides and lipides is infinitely simpler than that of the protides, they also, especially the glucides, can themselves form complex molecules such as glycogen as they condense. They can unite in variable proportions with the protides to produce colloidal complexes, micellae, in a state of equilibrium, in which the relative proportion of each component can vary ad infinitum, thus further increasing the causes of cellular individuality. Thus, even taking into account more recent research which has shown that the n u m b e r of amino-acids in the molecule is not indeterminate, but that they are periodically distributed throughout the polypeptide chain, the ab- solute specificity of the protoplasm of each cell is a perfectly admissible theory. E v e n n o w w e can go so far as to assume that in addition to this individual specificity of the cell, there exists a specificity of the species, which is the reason w h y the albumen in dog's milk is not the same as that in h u m a n milk, although it has a similar chemical structure. Probably cellular protoplasms differ from each other by the 'secondary' bonds in the poly- peptide chains, owing to m o r e or less loose molecular associations or to hydrogène bonds, or again to colloidal associations with the other components of the cell. Further evidence of the biological identity of m a n is afforded by those manifestations of idiosyncrasy whereby some h u m a n beings display greater sensitivity to various substances and react, for example, pathologically to the ingestion of certain foods. But proof of the individuality of every one of an individual's cells is insuf- ficient for a biological delineation of his identity. A m a n is composed of tissues and organs similar in structure to those of all other beings of the same species, and yet his body is a unit that is distinct from all the other h u m a n bodies. Morphology is powerless to explain w h y this is so, and w e cannot at present explain what it is that distinguishes one m a n from another biologically. It is certain that cellular specificity is of paramount importance in the individualization of our tissues and organs, but w e are still quite unable to say h o w it works. There is, however, a tissue in which w e are beginning to glimpse the specific factors of at least a group of individuals belonging to the same race, if not of an individual. It has been possible to isolate plasmatic protides from the blood; these are found to differ, at any rate in their relative pro- portions, according to the individual. W e k n o w , furthermore, that in the globules and plasma there are complex compounds the chemical nature of which is only beginning to be understood, and which m a k e it possible to classify the various types of h u m a n blood in clearly defined groups. These factors, which were limited at first to the four main blood groups—A, B , A B and O — a r e n o w far more numerous, and n e w ones are being discovered as research develops. Thus , groups M and N , the factors S and P , finally 206T H E IDENTITY OF T H E P E R S O » the Rhesus group, itself broken up into numerous combinations, have been isolated. W e are moving towards a more and more advanced individualization of the blood of each h u m a n being. That is a n e w conception which would have been thought revolutionary only 20 years ago. Again, chemical knowledge of blood pigment, haemoglobin, has shown that several different sorts exist. That of the foetus is not the same as the adult's and numerous sorts are found in some diseases. T h e blood of each one of us m a y therefore be our o w n particular blood, different from every- one else's. In all probability this is the case with all the other tissues, and these specificities taken together are the basis of biological identity. If these facts are true, if each individual carries within himself, in his cells, blood and tissues, the factors of his identity, w e can then explain the transmission of some of these to his children. Beside certain individual, mainly morphological, characteristics which are not transmitted or only partly transmitted, there are characteristics of constitution, race or species which inevitably recur in our descendants. T h e distinction between the two is sometimes extremely subtle, because the proofs of biological identity are themselves extremely subtle. T h e child is the product of the amalgamation of factors transmitted by the father and the mother; some are dominant and others are recessive, and the laws of heredity, which are n o w well known, enable us to understand w h y he resembles both father and mother while at the same time being quite distinct from either. Biological identity, in the case of the blood factors, and its hereditary transmission are extremely important in the social and judicial spheres.1 The w a y the groups are distributed in a population provides ethnographers with the essential data for determining the concept of race and people. Their transmission by heredity is more and more relied upon in paternity investiga- tions, and 'blood proof is n o w pretty well universally accepted. Based on the calculations of probability on which the laws of heredity depend, it not only enables us to rule out with certainty the possibility of a particular paternal origin, but also sometimes furnishes a strong presumption in favour of the true paternal origin. T h e more w e k n o w about individual blood factors, the stronger will this presumption become, and some writers foresee the time w h e n blood analysis will rival fingerprinting as a means of identification. I doubt whether that end can be achieved for some time to c o m e . Except for the case of the blood groups, w e still k n o w practically nothing about the factors of biological identity, and it is as yet far too soon to contemplate using them for judicial or social purposes. But the day will undoubtedly c o m e w h e n w e shall succeed in isolating these factors and in classifying and identifying them—with all the legal, individual and social consequences that w e can even n o w ascribe to certain other factors of identity. These w e shall consider next. 1. See A . C . Allison, 'Blood Groups and Racial Groups', Impact, Vol. VI, N o . 1. 207T H E IDENTITY OF T H E P E R S O N MORPHOLOGICAL IDENTITY This is the most obvious form of identity, thanks to which each of us is recognized by his neighbour. It supplements biological identity and, as it is found a m o n g all living beings, it is also a characteristic of life in general. H u m a n anatomy has been a fully developed science for several decades past. It is not surprising, therefore, that anatomists should have been able to pick out what, in the h u m a n body, has seemed to them special and parti- cular to each individual. It might thus have been expected that physical identification would have been based long ago on definite anatomical facts, since nothing could be easier to observe and verify. In point of fact the anatomist, in studying h u m a n physical structure, has always concentrated o n general rather than particular characteristics. N o r is this surprising, for science is always a question of generalities. Similarly all w h o have sought to describe the h u m a n face and body have directed their attention only to the usual characteristics, admittedly obvious enough, but of little value precisely because they are so usual. Thus , in describing a face, people will speak of a round chin, an oval face, as if it were possible to have a polyhedral chin or face! Even anthropologists had considered the variations in morphological characteristics which they noted and measured in their subjects only in order to deduce general laws, without paying attention to the individual as such. This deficiency proves once more that the problem of identity has not interested scientists, any more, as w e shall see, than it once interested jurists, sociologists, and for a very long time the police themselves. Only w h e n an anthropologist, Alphonse Bertillon, was led, of necessity, to interest himself in the subject in connexion with habitual offenders was it finally tackled scientifically, and resolved. A great deal has been written about the process by which Bertillon was led to carry out his work , and all that can be dorte here is to give a very brief idea of it. A n y reader w h o wants a fuller account should refer to the various biographies of Bertillon.1 Through his father, D r . Adolphe Bertillon, and his grandfather, Achille Guillard, Alphonse Bertillon had, from an early age, become familiar with, and learnt h o w to carry out, anthropometric measurements, which between 1860 and 1890 were in high repute thanks to the fame of the anthropo- logical schools of Broca in France, Lombroso in Italy, etc. Although he had learnt a good deal about anthropology, his general education and scholastic attainments were meagre in the extreme, and at the age of 25, after a stay in England and having done his military service, he found himself without 1. S. Bertillon, Alphonse Bertillon, Paris, 1941; H . T . F . Rhodes, Alphonse Bertillon, Father of Scientific Detection, London, 19S6. The reader will find, at the end of this issue, a review of the latter work written by the author of this study. 208T H E IDENTITY OF T H E P E R S O N employment and incapable of holding a regular job because of his un- predictable temperament. For the sake of peace and quiet, his father found him a post as a clerk at the Préfecture de Police, and the young m a n had to settle d o w n to spending the whole day entering and checking the records of the daily batches of offenders consigned to the cells. There was at that time no means of discovering which of these individuals had been previously arrested, and the methods employed were absurd and repugnant, and not conspicuously efficient. Alphonse Bertillon's great merit was, first of all, to pose the problem clearly in scientific terms. H e very soon realized that it was only by a morphological criterion that an individual could be recognized, and that identity had to be defined as the general body of morphological characteristics connected with the individual human being, specific to one person and one only. Bertillon was quite familiar with these morphological characteristics, but which of them were to be chosen? In fact, as w e shall see, there are a great m a n y of them and they differ widely from each other. H o w were the best among them to be selected? Naturally, Bertillon's choice fell on those criteria with which he was familiar, those which he had seen used ever since his childhood by his father and grandfather—anthropometric measurements. But not all were suitable for the purpose in view. Measurements of the fleshy parts of the body, such as the chest, the waist, the thickness of arm or thigh, are too m u c h affected by physiological or pathological variations due to diet or disease. The first necessity, therefore, was to determine the rules to which measurements should conform in order to m a k e identification possible. Criteria of Identification The first criterion must obviously be to satisfy the fundamental condition of morphological identification—specificity. The observed characteristic, whether an anthropometric measurement or any other characteristic, must be specific to one person and one only. Where a measurement is concerned, that measurement must vary sufficiently from one person to another, and not in a systematic but a haphazard way. This condition is so important that it will in fact determine the final choice. But it is not the only condition. The morphological characteristic selected must remain invariable through time, that is to say, remain constant in the same individual throughout his life, and even, as w e shall see, for some time after his death. A further requirement is that the various circumstances of life should not change—and more especially that wounds and illnesses should not modify—the characteristic to any extent. The selected characteristic must also be easily identifiable in the individual, whether living or dead, though this is a less important condition. W e shall 209T H E IDENTITY OF T H E PERSON see later that some characteristics duly satisfy the first two criteria but can be recorded only by complicated and sometimes expensive methods. In such cases, preference will be given to the simplest and most generally applicable techniques. But the accumulation of descriptive data is not enough to solve the prob- lem of identification. While in some cases it m a y be sufficient to assemble such data in any order, because the choice to be m a d e later will be limited to a few individuals, this is not so most of the time. In order to trace an individual whose description is available from a collection of records cover- ing hundreds of thousands or even millions of individuals, it is imperative that such data should be easily classifiable in some simple way, so that tracing m a y be both easy and quick. It is altogether exceptional for one single morphological characteristic to satisfy all these requirements. But a group of characteristics m a y satisfy them in an adequate degree, and that is precisely the case with anthropometric measurements. The Bertillon System—Bone Measurements A s w e have seen, Bertillon chose as identifying characteristics the measure- ments of the h u m a n body with which he was familiar. But he soon saw that it was necessary to m a k e a selection a m o n g them, and that on that selection the value of his system depended. F r o m 1878 to 1882, at the cost of con- siderable work, the details of which he unfortunately did not publish, he compared countless measurements, drawing up statistics of their variations in different individuals, establishing the frequency curves of these measure- ments as his father and grandfather had done, calculating the frequency of each measurement in a given population. H e quickly perceived that no single anthropological measurement satisfied the criteria for correct identification. Only the bone measurements were suf- ficiently stable, at any rate in adults; variations in them during growth did not seem to him sufficient to justify rejecting them, since the number of juvenile offenders was small as compared with that of offenders as a whole. O f these bone measurements he chose only those which can easily be taken from the living individual, because they relate to parts of the body where the skeleton is covered only by a fatty panniculus, for example, the olecranon and the calcaneum, the fingers and finger-joints, the cheek bones and skull bones. Then by comparing the statistics and frequency curves for each, he eliminated all those which seemed to him to be correlated, that is to say, whose values varied in parallel fashion. In this w a y he managed to select a few bone measurements—length of the middle finger, length from elbow to finger-tip, length of the foot, length and breadth of the skull, etc.—each varying independently of all the rest and 210T H E IDENTITY OF THE P E R S O N capable of being taken and correctly reproduced for an individual, whether living or dead, with a suitable degree of precision. O f course, none of these measurements, by itself, was sufficient for the identification of an individual, but when brought together on a record card they provided an accurate des- cription for identification purposes. O n e problem still remained to be solved: the classification of the descriptive records. T o bring together a series of cards each recording the measure- ments of a given individual is not in itself enough; it must also be possible to locate the card for the individual you seek to identify quickly and accurately. Bertillon's statistical researches had enabled him to discover the frequency of each bone measurement for any given thousand individuals; this followed the probability curve with which all statisticians and biologists are familiar. It then occurred to him to separate each of these curves into three parts, in such a way that each part contained about the same number of individuals. Thus, the length of the head was divided into three groups, short, m e d i u m and long. In this way he obtained an initial sub-division. The head width supplied him with a second, the length of the middle finger with a third, and so on. Thus, when working on 100,000 cards, the head lengths provided three groups each containing about 30,000 cards; the head widths sub-divided the 30,000 cards into three groups of 10,000, the bizygomatic diameter, into three groups of 3,000, the left middle finger lengths supplied three groups of 1,000, etc. Finally, all that was left was a few cards in a particular box, among which was to be found the wanted person. The imperfections of bone measurements, however, m a d e it impossible to go further; not only were they valueless in the case of young people w h o had not yet finished growing, but their variations, because of the inevitable errors of measurement, made a final selection from a small number of cards in a large collection of records difficult. Indeed, it was quite possible to find two individuals having exactly the same measurements within the usual margin of error, and consequently indistinguishable from each other by this method alone. Bertillon was not unaware of these shortcomings of bone measurements; but he had noticed, in the course of the countless physical examinations he had carried out, that there were very few people without some distinguishing marks such as warts, scars, birth-marks, tattooing, etc. If it were possible to define their shape, size and position exactly, these personal distinguishing marks would allow of supplementing the bone description by supplying a specificity which it lacked. Bertillon therefore drew up a code of distinguishing marks likely to be found on the face, hands, forearms, bust, etc. H e divided the body into several sections and, in the case of each distinguishing mark, defined its nature, shape, size, direction and position. Thus, a scar on the hand might be defined as a curved scar with concave side uppermost, 2.5 c m long, set 211T H E IDENTITY OF T H E P E R S O N obliquely inwards, 4 c m . above the first point of the left forefinger, on the back of the hand. Each of these indications increases the descriptive value of the distinguishing mark by a coefficient which m a y be high- T h e terms used for such a description were reduced to an abbreviated code by which the foregoing indications could be summarized in one line. Supplemented in this w a y by distinguishing marks, the bone measurements enabled Bertillon to record on his card-indexes several hundreds of thousands of descriptions, with the success w e know. T h e efficiency of his method was admittedly restricted by the shortcomings to which w e have drawn attention, but it nevertheless rendered the services that its inventor expected of it. T o increase its scope, he added photography to bone measurements and dis- tinguishing marks, together with a detailed description of the face. Photography and Identity It might seem surprising that, a m o n g the means for determining identity, w e should not yet have referred to that which has the appearance of being the most accurate—photography. Surely nothing could be superior to an exact reproduction of the face in all its aspects. A photographic portrait should, it might be thought, be the most reliable documentary evidence of identity. That, indeed, was the assumption of its first users. F r o m the very m o m e n t that Niepce and Daguerre m a d e their discovery, magistrates and police realized h o w useful it could be to them. O n 4 December 1854, Captain L . W . Lees, of the San Francisco Police, started photographing criminals, and in the same year a felon in the Grand Duchy of Baden was identified by the examining magistrate of Lausanne through his daguerreotype which had been forwarded to the police of all the Swiss cantons and adjacent countries. Bertillon did not neglect this method. Like his predecessors he sought to m a k e use of it for his records. But he quickly realized that it could be of little use to him, though it might help if it were supplemented by a m o r p h o - logical description of the face, carried out systematically in accordance with precise rules. This was the origin of the police description or portrait parlé (visual identification). H o w are w e to explain the failure of the photograph as evidence of identity? Experience has shown that as a description of the sitter a portrait photograph, even one taken in the best conditions, is nearly always worthless unless the observer has been specially trained to read it. T o recognize a person simply by means of his photograph, or to identify him by means of two photographic portraits, is not in fact such a simple operation as might at first be thought. W e often find that w e fail to recognize somebody by his photo- graph, or w e identify him with the portrait of someone else. Neither the physiognomical likeness between two individuals, nor the unlikeness between two photographs taken 212T H E IDENTITY OF T H E P E R S O N of the same individual at a fairly long interval can be checked by a more or less instantaneous general impression, but only by an analytical comparison of the facial lineaments.1 The entry headed 'description', unfortunately still used on most identity cards, is therefore worthless. O u r eye takes in only the general features of a face, which are c o m m o n to most individuals; unless it has been trained to consider them systematically, it fails to observe all the characteristic details. W e must therefore k n o w in advance the facial characteristics which should be looked for and the terms to be used in order to bring out their importance. Let us consider the different facial features separately one after the other. In each w e shall note the hue, the shape of the lines, the slopes and size. There are well-defined terms for each of these four categories; for example, w e shall refer to the shape of the lines as rectilinear, hollow (for concave), arched (for convex), aquiline, sinuous or curved. Similarly the slopes will be defined by such terms as vertical, horizontal, oblique, prominent or receding. Lastly, the size will be classified as small, m e d i u m or large, using inter- mediate or extreme terms where necessary. Proceeding thus systematically with each feature in turn—eyebrows, fore- head, nose, eyes, lips, right ear, chin and head—and adding as ancillary characteristics the colour of the eyes, complexion, general shape of the face, wrinkles and even the general appearance, Bertillon produced a descriptive record of such precision that by means of it w e can identify with a high degree of accuracy anyone of w h o m w e have such a description, even if w e have never seen him. Thenceforward, it was easy to m a k e the photographic likeness a more efficient instrument for establishing identity. All that was necessary was that the photograph should be taken (a) in adequate conditions as to sharpness and (b) with a measurements gauge or on a k n o w n scale of enlargement. This is what Bertillon did. Thus anthropometric photography c a m e into being, profile and full face being taken so that all the data contained in the 'description' would be found in the picture. T h e anthropometric record was completed by a photograph taken in this manner , which was not only a most useful adjunct in establishing identification, but also afforded the pos- sibility' of detecting in it the above-mentioned data. In the mind of its creator, the principal object of the portrait parlé was to enable the police to identify a person they were looking for a m o n g a crowd, even without the aid of his photograph. This object was fully attained, and even today there is nothing to replace the portrait parlé. A photograph, provided it is taken in the conditions required for the purposes of police description, is therefore an excellent instrument for estab- lishing identity. W h y , therefore, are not photographic records set up in which 1. C . Sannié and B . Guérin, Eléments de police scientifique, Paris, 1938, Vol. II, p. 6. 213T H E IDENTITY OF THE P E R S O N photographs would be classified in accordance with the rules used for the police description, thus replacing the various other methods? T h e reason is that all the m a n y attempts at such a classification have failed. A s soon as photography became a regular police practice in all coun- tries such records were established, in the hope of detecting habitual offenders in this way. With the aid of his albums, in which the portraits were classified by the shape of the nose seen in profile and the lobe of the ear, Bertillon himself tried to arrange in series a certain number of individuals wanted by the police. Ingenious as his system was, he was obliged to drop it, since it was impossible to keep the records u p to date and they were not really very useful. It cannot however be repeated too often that identification by m e a n s of a photograph is only reliable if the portrait has not been touched u p , has been taken in accordance with the requirements of anthropometric photo- graphy, and is sharp enough to bring out the various items in the police description. Most photographs on identity cards or passports do not satisfy these requirements, and their value for identification purposes is nil. A vague resemblance, or the presence or absence of a beard or moustache, are enough to cause a mistake in identity. N o r should m u c h importance be attached to the robot-portraits that have recently come into vogue in certain police circles for identifying individuals wanted by the police, whose physical appearance has been reconstructed from evidence supplied by witnesses. Only those completely familiar with Ber- tillon's portrait parlé would be able to give a sufficiently accurate description to m a k e sure that the identification was correct. Statements by witnesses afford only very general indications and can never be accepted as sufficient proof of identity. Moreover, this method is only used by the police as a guide, in order to obtain information they can use later in their inquiries. O n e point not to be forgotten is that facial details can be altered out of all recognition by plastic surgery, and that criminals, especially international criminals, have often had resort to it. For instance, between 1946 and 1952, the International Criminal Police Commission was concerned, in conjunction with the French, G e r m a n and Belgian police, with the case of an international thief w h o underwent an operation to turn his aquiline nose into a straight one. A portrait parlé and photograph can therefore only be regarded as a convenient means of identification. They are not completely reliable. W e must always remember to find out whether a recent scar m a y not be the explanation of a change in one feature of the face. Lastly, a photograph can always be faked and, if open to suspicion, can never be accepted as conclusive proof. 214T H E IDENTITY OF T H E P E R S O N Fingerprints W e are all familiar with those more or less incurved furrows which each of us has on the palms of our hands and soles of our feet, and the use m a d e of them in criminal investigation has often been described. They are formed by the epidermal ridges corresponding to the dermal papillae, arranged in regular rows which constitute the finger patterns. Malpighi (1686) was the first to study their anatomy, and the first pattern of a fingerprint is found in the Anatomia Humani Corporis by Govard Bidloo, published in 1685 at Amsterdam and reissued in 1728 at Utrecht. A n excellent historical account has recently appeared in a book by Castellanos.1 The first systematic study of fingerprints is contained in a treatise by Purkinje (1823), where a detailed description is given of the different forms. This study was taken up and developed by the anatomist Huschke and by Alix, a pupil of Gratiolet, m e m b e r of the Anthropological Society of Paris. All these authors consider the papillary ridges from a purely anatomical standpoint. Sir William Herschell was the first to consider using them as an identification mark, by having the fingerprints of Hindu notables affixed to their pension certificates. H e noted that in no case did the marks undergo any change, and in 1877 he suggested, though unsuccessfully, that they be used for the purposes of criminal investigation. In 1878 Faulds, in Japan, took up the question and brought out a clas- sification of fingerprint types. O n 17 February 1880 he wrote to Darwin communicating the results of his researches. Darwin, w h o was then an old m a n living in retirement, advised him to get in touch with Francis Galton as being the m a n best qualified to take up the matter. Galton, in two reports written between 1889 and 1891, carried out a scientific and methodical study of finger patterns and established a system for classifying and identifying individuals by means of their fingerprints. H e showed that the finger pattern possessed to an immeasurably greater degree than any other morphological characteristic the qualities of invariability, permanency, diversity, and facility for recording and classifying, these being the four indispensable criteria for ascertaining a h u m a n being's identity. Following upon Galton's investigations, all concerned with the problem of identification have adopted fingerprints as the fundamental test. W e m a y cite a m o n g them Vucetich, in the Argentine, w h o in 1891 originated the classification system still used in Latin America, and Henry w h o developed the Anglo-Saxon system. Bertillon alone adhered to his anthropometric method, but was compelled by force of circumstances to include fingerprints in his records, though in the form of an ancillary subdivision. Faulds and above all Galton had already drawn attention to the permanence 1. I. Castellanos, Dermopapiìoscopia clinica, L a Havana» 1953t 2 vols. 215T H E IDENTITY OF T H E PE R S O N of fingerprints. All the research carried out during the past seventy years shows that the fingerprints never change throughout life. They first appear in the foetus towards the fourth month of pregnancy and only disappear with the decomposition, not of the epidermis, but of the derma. Thus the corpses of the drowned have often been identified several weeks after immersion, the dermal papillae being still well preserved in spite of the disappearance of the epidermis. Nor is it possible to change them at will. Certain criminals have tried to get rid of them by replacing them with scars. But the mere fact of having scars where the marks of the fingers should be is suspicious, and the pattern of such scars is, of course, in itself sufficiently specific to take the place of the actual fingerprints. Sometimes, however, the fingerprints change and become deformed so that identification is no longer possible. This happens in the case of wounds caused by "cuts, burns or lacerations sufficiently deep to affect the derma. In these cases the fingerprint suffers a local change and is replaced by a scar at the particular spot affected. But everything outside the area of the w o u n d remains intact and suffices to m a k e identification possible. The position is not, however, the same in the case of certain diseases, especially those where trophic disorders affect the extremities, and again in that of lesions of the radial and ulnar nerves (Cestan, Descomps and E u - zières, 1916). T o Professor Leonidio Ribeiro, of Rio de Janeiro, is due the credit for having drawn attention to the changes which occur in fingerprints, especially in cases of leprosy.1 H e showed, moreover, that if the patient improves, the finger pattern is built up again exactly as it was before. T h e same is true in m a n y other cases, such as, scleroderma, X-ray dermatitis, and certain forms of poisoning. Readers interested in this subject will find a very clear account in Ribeiro's book and in Castellanos' important and m o r e recent publication already mentioned. Another advantage of papillary patterns for identification purposes is their immense variety, which no other morphological characteristic possesses to the same extent. M a n y investigators, a m o n g them Bertillon himself, have sought in vain for two identical fingerprints. O n the contrary, all the research undertaken throughout the world on hundreds of millions of finger- prints has shown with absolute certainty that no two finger patterns are absolutely identical. This diversity is explained by the morphology of the fingerprint, which is formed by ridges that stop short, break u p , divide and branch off. E a c h irregularity in these ridges occupies a definite position in the pattern in relation to the rest, so that all w e have to do is to pick out a few of these irregularities in order to prove that the fingerprint is unquestionably that of 1. Leonidio Ribeiro, Pathologie des empreintes digitales, Paris, 1946. 216THE IDENTITY OF THE PERSON- the person w e are seeking to identify. It has been confirmed by both experi- ment and calculation (Balthazard, Sannié and A m y ) that a limited number of points is sufficient for absolute certainty. All dactyloscopists n o w agree that from 12 to 15 identical points between two papillary marks are suf- ficient proof that they belong to the same finger. The mark m a d e by the tip of the finger contains more than a hundred of these informative points, arranged in no particular order. Thus , only one papillary m a r k is necessary for an individual's formal identification, even if it is very incomplete and fragmentary. W e have only to pick out the indis- pensable characteristic points, but w e can then be absolutely sure of the result.1 Fingerprints are moreover very easy not only to record but also to classify. All that is needed is a metal plate, a gelatine inking roller and a tube of ink. T w o main systems of classification are in use, one in the Anglo-Saxon coun- tries, the other in the Latin countries. Both systems are based on the general shape of the pattern which can be reduced to a limited number of types, generally four or five. In the French system (also used in other Latin coun- tries in Europe and in South America), each of a person's 10 fingers is given a number corresponding to the type of his fingerprint, the number thus obtained making a large selection possible; w h e n a card index becomes too full it is subdivided by counting the ridges in the pattern on each finger in accordance with certain very precise rules. Whatever method is chosen, it is possible to assemble m a n y millions of individuals on a single card index and to identify a m o n g this mass of cards the person wanted. But the prints of all 10 fingers are necessary, since only with them can w e draw up the requisite dactyloscopic formula by which the required card can be found in the files. This difference between the significance of a fingerprint, or even part of a fingerprint, as a clue, and the identification value of the 10 fingerprints is basic, but it is too often overlooked. H o w often have w e been asked to find a person in our records with the aid of a more or less fragmentary print of one finger only! But that is quite impossible. Other Morphological Criteria Bone measurements, special marks, the police description and anthropo- metric photography, fingerprints—these are not the only criteria of morpho- logical identification. M a n y other physical characteristics have been suggested, the value of which varies considerably. S o m e are connected with the Bertillon system; thus Frigerio's otometry and Fresneda's2 method based on the shape of the ear seen from behind,. 1. C . Sannié, La recherche scientifique du criminel, Paris, 1954, p. 38. 2. D . M . F . Fresneda, Investigación, Sept. 1954, p. 58. 217'T H E IDENTITY OF T H E P E R S O N are merely developments of it. Other aids recommended are occupational markings on the hands, which unfortunately are evanescent, the topography of the veins on the back of the hand (Tomasio), the shape of the lips, and even, for identifying thoroughbred stallions, the pattern on the muzzle. W e find on the muzzle of cattle, horses and dogs delicate furrows which resemble papillary ridges, and which like them are absolutely reliable for identification purposes. In the same way the white of the eye shows a network of blood vessels of which the pattern varies in one way or another, and which can be used as a characteristic. They can be seen with the ophthalmoscope and photo- graphed, and it is impossible for anyone to change them (Capdeville). Radiography was thought of a long time ago. In 1889 Levinsohn, in Berlin, tried to develop a system of radiological anthropology. Later, Calico, and afterwards Luis Belclos (1933), suggested radiography of the finger- joints. Ercole Bocchi experimented with radiography of the spinal cord1 and attempted a classification of the shapes so observed. M o r e recently, E . Moniz , 2 has tried to systematize craniofacial radiography, the shape of the skull and face being very characteristic and showing notable individual variations. In point of fact, the only significant anatomical characteristic is the bucco- dentary system. It is not possible to quote all the writers w h o have studied the problem of identification by the teeth. Already in the last century corpses were identified by this means, and D r . Oscar Almoedo's treatise on a corpse supposed to be that of the dauphin, Louis X V I I , w h o died in the Temple, is still famous. In 1883, Dr. Grady, medical officer at the Naval College of Annapolis, U . S . A . , brought out his first published work, and in 1915 he started a card- index of the pupils at the Academy. W e m a y also mention, in Latin America, the names of Lopez de León, Luis Silva, Carrea, Repullini and Gramajo, Santos; in the United States, Taylor; in France, Jean Morisot's treatise (1925) and the researches of Budin, Filderman, Sapet, and more recently those of Bonnafoux, which actually resulted in the tabling of a motion in the French parliament. Identification by the teeth can claim some resounding successes, for example in the case of the Bazar de la Charité fire in 1897, and the fires at the Paris Opéra Comique and the Ring Theatre in Vienna. The cases of the Marquis de Mores, the Prince Imperial, and Becker, secretary to the Ger- m a n Legation in Chile, this last solved by Dr. Valenzuala Bastorrica, are «lassie examples to this day. In these cases all other means of identification were found worthless, and the remains could only be identified by the teeth. 1. E . Bocchi, ' A identificaçao do adulte pelo esqueleto cráneo', Minerva medico-legale, 1950, Vol. 70, N o . 5, p. 170. 2. E . Moniz, Jr, Revista de Identificaçao e Ciencias Conexas, June 1951, N o . 13, p. 163. 218THE IDENTITY OF THE P E R S O N W h e n the other morphological criteria have disappeared, the teeth, which are far more difficult to destroy, m a y be used as the means of identification. This is the regular practice in all disasters due to fire or water (fires, aero- plane accidents, shipwrecks, drowning). The epidermis, the derma, frequently too the muscular tissues, have disappeared or are putrescent. All that is left is the skeleton, and even that is not always intact. The brain-pan is, however, the strongest portion of the human frame, and the teeth, being protected by the maxillaries, are often found undamaged with all their defects, stoppings and artificial additions. The dentist whose patient the victim was can re- cognize his o w n work and thus identify the person to w h o m the teeth belong. CRIMINAL IDENTIFICATION All civilized societies have sought means of identifying, among the mass of their citizens, individuals already convicted of a crime and therefore to be regarded as potentially dangerous. W e find this preoccupation expressed in the most ancient legal systems, in those of India, R o m e and Greece, then in Europe, and lastly in America. They all m a k e provision for the branding of the criminal with a mark that will enable him to be identified. A m o n g some primitive peoples punishment for crime involved mutilation, which thus served as a distinguishing mark. In Assyria, a thief's right hand was cut off. Again, in Russia, the law provided for certain forms of mutila- tion—cutting off the nose or the ears—which in themselves constituted a brand of infamy. Later, however, the use of patterns or letters became more c o m m o n . In India, the laws of M a n u prescribed that a device appropriate to the offence should be imprinted on a convict's forehead. In France, the fleur- de-lys was branded by a red-hot iron on the forehead. In 1562 the fleur-de-lys was replaced by the letter V for an ordinary thief, W for an habitual thief, F for forgers. Later, in 1724, galley-slaves had the mark G A L branded with a red-hot iron on the shoulder. Branding was abolished in France after the 1789 Revolution, together with certain penalties which were felt to be unduly barbarous, such as torture by the wheel and fire. But it was reintroduced by a law of Floréal, Year X , and was only finally abolished in 1821. In France all such marks of infamy were finally done away with in 1832. A similar evolution took place in England, where branding was used from the reign of Edward V I until its abolition in 1829, the practice being accompanied by a special ceremony. Such marks, being applied in the manner described, could have only a very relative value as a clue to identity. They merely indicated that the person branded had committed a crime once upon a time, but they gave no 219T H E IDENTITY OF T H E PERSON information whatever as to the individual himself. With the exception of the W used in France for habitual offenders, they afforded absolutely no indica- tion as to whether the delinquent had been convicted more than once. In 1831 a recommendation was sent to governors of prisons to have a record m a d e of tattooings or similar markings on the prisoners' bodies, since this would do away with the need for branding. After branding had been abolished there was no longer any means of recognizing habitual offenders, and to remedy this omission the police had to resign themselves to the use of methods which did them little credit. Thus , in a cell housing a prisoner whose judicial past the police were anxious to ascertain they placed another prisoner w h o was in their confidence—a 'cop- pers' nark'—with instructions to m a k e him talk and reveal his previous crimes. O r , again, a reward would be offered to police inspectors w h o visited the cells daily for every identification they succeeded in making. In 1885, the French parliament, alarmed at the existence of a criminal population which was mainly recruited a m o n g escaped prisoners and ex- convicts, tightened up the laws dealing with habitual offenders. W e find the same tendency to a greater or smaller degree in all legal systems. A n y civilized society is, of course, in duty bound to protect itself against habitual offenders, but it is even more important for it to try and eliminate from the body politic all those w h o have m a d e a habit of crime. A n d it m a y be that with the present trend in criminology, knowledge of an individual's criminal record, and consequently knowledge of the offender's criminal identity, have become still m o r e necessary. H o w can w e decide whether he can be reformed or is incorrigible if w e k n o w nothing at all about his past history? Without such data no scheme could be worked out for the reformation of the criminal or for placing him on probation. W e have already shown h o w Bertillon solved the problem by introducing his anthropometric method. H e invented this system with the idea of apply- ing it to prisoners undergoing detention, and its success was proof of the very great progress it represented throughout the whole realm of criminology. Bertillon's system has n o w been replaced by fingerprinting, and every organ- ized country has a criminal identification service. In France, a law of 1943 provides that, if the magistrate thinks it neces- sary to establish or confirm a person's identity, such person must allow his fingerprints to be taken and they are then filed. His morphological identity is then definitely known and fixed, quite apart from his n a m e and civil status. CIVIL IDENTITY It is difficult to explain the utter failure of the legal mind to take any interest in the question of identity. For the lawyer it is purely a matter of civil status, 220THE IDENTITY OF T H E PERS O N that is, the individual's n a m e , parentage and birthplace. T h e only proofs of identity which he seemingly regards as having any value are a person's certificates of birth, marriage and death, and the signature, the chief ad- vantage of which is that it affords an abundant harvest for graphologists. In France, for instance, a very complete general directive was recently issued with detailed instructions on the keeping of the registers and the filing of the various documents,1 but containing not a single reference to morphological identity. For those w h o drafted it, identity is sufficiently established by the civil status record and the accompanying supporting documents. Legally, the recognized civil status documents are the birth, marriage or death certificate or some civil status document in lieu, for example, the family registration booklet (livret de famille), passport, and the various identity cards. There is no need to demonstrate the inadequacy of a signature as a proof of identity. Those jurists w h o regard it as reliable seem to look on it as a kind of personal seal for which there is no substitute. A decision given by the Cour de Cassation2 (15 M a y 1934) refused to recognize the possibility of its replacement by a fingerprint. The Court regarded the latter as a 'mere mark' ! In France, a change of n a m e and identity is not an offence. A n y o n e can, as the fancy takes him, declare an imaginary civil status without incurring any legal sanction, provided he does not assume the identity of another person. A recent Order (2 N o v e m b e r 1945) introduces penalties for the use of an imaginary identity by a foreigner. Although this represents some pro- gress towards the safeguarding of identity, m u c h remains to be done, and not</span><span data-dcnode-id="5" instrument_node="">hing really constructive will emerge until the morphological tests are m a d e the basis of identification. They are the only reliable criteria. In point of fact, there are no civil status documents by which identity can be proved. Nothing is easier than to falsify them or obtain a fake, and all magistrates and police inspectors k n o w what care is needed in accepting them. Even identity cards, which would seem to be the safest, are in reality worthless as evidence. H o w is this to be explained, seeing that in Paris the identity card issued by the Préfecture de Police contains not only the entries as to civil status, but also a description and a fingerprint, and that a duplicate is kept in a special file in the Central Office? T h e truth is that, in France at any rate, all identity documents were invented by officials with no knowledge of identification problems. T h e best example is, in fact, the identity card issued in Paris, or the n e w French national identity card. 1. Journal officiel, 22 September 1955. 2. The supreme court of appeal in France. 221T H E IDENTITY OF T H E P E R S O N W h a t is the use of amassing the duplicates of these identity cards in a card-index if the only clues for looking up a card are the n a m e and civil status, that is, those very characteristics which it is desired to safeguard and which anyone can change or modify at will? But, it will be objected, there is a fingerprint affixed to the identity card. Will not that serve to confirm or reveal a man's identity, if the n a m e and civil status do not suffice? True, the fingerprint is proof of identity, that is to say, with one of these cards in our hand w e can state positively that the fingerprint on it is definitely that of the person whose photograph is affixed to the card. But the fingerprint does not help us—and this is the essential point—to look up the duplicate card in the card-index. For that w e must have, as has already been stated, the fingerprints of all 10 fingers. Without these, classification and con- sequently a search become impossible. That is w h y the identity card-indexes kept in France, and in most other countries, are a very imperfect safeguard in the matter of identity. Whereas for the last 60 years examining magistrates and the police have recognized the importance of morphological tests as evidence of identity and as a means of avoiding judicial errors, registry office officials and the ad- ministrative departments are still without any knowledge of them. A n d yet what is true in criminology is equally applicable in the social and civil spheres, and there can be no doubt that one day the same solutions will be used in matters of civil identity. For a good m a n y years some of the Latin countries, for example, most of the South American States and Portugal, have been moving along these lines. They have set on foot a national card-index, in which either the whole population is recorded, or else certain categories, such as foreigners. This card-index, which is modelled on criminological card-indexes, makes use of the 10 fingerprints for looking up cards; it thus links up, beyond all pos- sibility of error, a civil status record with a morphological characteristic, namely the fingerprints. There is no other means of making identification certain. It is most likely that one day this will be a universally acknowledged truth and that civil dactyloscopic records will be as widely used as criminal records are at present. THE SOCIAL ROLE OF CIVIL IDENTIFICATION W h a t are the advantages that will accrue to the individual and society from a national card-index system of identification? They will accrue to every one the day that he or she is born. Although child substitution in maternity clinics is very rare, it raises a serious moral 222T H E I D E N T I T Y O F T H E P E R S O N problem, and m u c h work has been done on ways and means of avoiding it. Here again the only effective method is to have a fingerprint record. But with a new-born infant there are certain difficulties; the papillary ridges are not sufficiently prominent, and above all it is very difficult to take the finger- prints of a child w h o keeps its hand clenched. So it has been suggested that prints should be taken of the soles of the feet, as these can be more easily inked and printed on a card. Both methods are most effective. Large numbers of impressions are not wanted, the point being to m a k e sure of the infant's identity for a certain period, not more than one or two years. The child's dactyloscopic record can, if necessary, be made out later. New-born infants are not the only children to benefit from the fingerprint method of identification. There is the curious case of the mother w h o was obliged to apply to the head of the Identification Bureau at Evansville, Indiana, so as to be able to distinguish between her twin girls. They were so alike that she was never sure which was which; once their fingerprints had been taken and recorded, there was no possibility of error. Fingerprint identification is obviously to the advantage of every citizen. W e all k n o w h o w strict are the laws in the matter of missing persons and h o w serious the difficulties with which a family is faced when the father has disappeared leaving no trace, it m a y be in an air accident or shipwreck or at the wars; or he m a y have gone off on an escapade or yielded to a patho- logical impulse; or perhaps he has been accidentally drowned and later his corpse lies in the mortuary unrecognized. In every country thousands of persons disappear each year and leave no trace; among them there are always m a n y w h o have deserted their family and changed their civil status in order to start a new life. The problem would be greatly simplified if there were a national civil identification service which, except when the body was not recovered or had been completely destroyed, could verify the identity of an unknown corpse and thus save families all the hardships resulting from the laws on missing persons. A n account of cases like these was published by J. E . Hoover, Director of the Federal Bureau of Investigation in the United States, with the aid of his identification branch which keeps a large body of civil as well as criminal records. H e describes cases in which a mother found her long-lost son, and a m a n w h o had lost his m e m o r y and an unknown corpse were identified, etc.1 W e have had personal experience of cases of usurpation of civil status. If a criminal steals your identity documents, and is then condemned by default under your name , it is very difficult for you to prove your bona fides without submitting to a searching inquiry and all kinds of difficulties. The con- sequences can be extremely serious and without redress, and w e have often 1. J. E . Hoover, 'Dactyloscopy's Humanitarian Role', International Criminal Police Review, N o . 34, January 1950. 223T H E IDENTITY OF T H E P E R S O N been visited by people w h o , as a result of such disagreeable experiences, came of their o w n accord to have their fingerprints recorded in our files. They ihen felt they were absolutely safe. But the main benefit that would accrue to each of us from the establish- ment of a civil identification service would be an immense simplification of all administrative formalities. A s soon as each citizen's identity was estab- lished, beyond all possibility of error, by a national card-index the latter could be used for the issue of a national identity card, which could be checked at any time and would take the place of all identity documents n o w in use. Society would also stand to benefit by such a card-index. Apart from its obligation to protect the new-born infant—a responsibility in which the community comes next to the child's mother—it would also be able to simplify a host of administrative records. M a n y difficult problems would also be simplified by using fingerprints. Pensions frauds and desertions from the colours could be avoided, and it would be far easier to check passports and supervise aliens if there were a national register to refer to. O n e has only to think of the millions of stateless persons w h o have wandered u p and d o w n the world over the past 20 years, of the hundreds of thousands of children w h o have been cut off from their parents by the tragic events of these last few decades, and have in m a n y cases lost them with no hope of seeing them again, to realize the immense services that national identification card-indexes could have rendered. The question of personal identity raises social and humanitarian problems which no well-organized society has the right to neglect. 224LEAF PROTEIN— FOOD OF THE FUTURE by R A L P H WHITLOCK Ralph Whitlock, Farming Editor of the British magazine The Field, is the author of a number of books on agriculture and country life, including The Land First, London, 1954, which is a survey of modern British farming. With the present world population estimated at well over two and a half thousand million and expanding at an ever-increasing rate, the old Malthusian nightmare of a world whose inhabitants had outgrown the food supply threatens more and more to become a reality. It is not simply a problem of making existing surpluses available. Al- though temporary surpluses of certain foodstuffs do occur from time to time, there is an over-all shortage of food; undernourishment is the c o m m o n lot of more than half of mankind. N o r is there likely to be a change in this situation in the near future. The days of the nineteenth century, when vast n e w territories were be- coming available for exploitation by agriculture, have gone for ever. N o such virgin territories of any size n o w remain. Today, it is a matter of making better use of land already under cultivation, and of extending the food-producing area by bringing into cultivation land which would have been considered unsuitable by our ancestors. In recent years, m e n have been appraising the deserts of Africa, Asia and Australia, the sub-Arctic plains of Russia and Canada, and the tropical forests and scrubland of Africa and South America. Yet although m a n y ambitious schemes have been and will be launched, the developments of such marginal regions for food production is both expensive and hazardous—as the British ground-nut scheme in Tanganyika has shown. N o r is it en- couraging to be confronted with such facts as the low standard of living of the inhabitants of the A m a z o n basin, which is theoretically one of the richest regions on earth, and the difficulty experienced by Australia, that most thinly- populated of all continents, in feeding the swollen population of its cities. In the circumstances, there can be no slackening in our efforts to increase food supplies, however limited the results of these efforts. Side by side with the encouragement of more efficient agriculture on land already under culti- vation, and with the development of new marginal areas, goes investigation into new sources of supply. Increasing interest is being taken in the world's fisheries, particularly in remoter waters such as the Behring Sea and off the 225L E A F PROTEIN: F O O D OF T H E F U T U R E west coast of South America. Plankton has been advocated as a nourishing food, both for h u m a n beings and for farm livestock, the latter being the likelier to prove a practical proposition. A green alga, Chlorella, has pro- duced by photosynthesis, under experimental conditions, high yields of a protein-rich food, though the problems of large-scale production have yet to be solved. M u c h publicity has also been given to the development of pond cultures, especially in the Far East. The fishponds of Hongkong, for instance, produce fish at the rate of 3,000 lb per acre. N o w , a new source of food supply makes its appearance: after years of experiment, success has been achieved in the extraction of leaf protein, and a n e w world of possibilities is thus opened up to us. THE ADVANTAGES OF LEAF PROTEIN All food comes primarily from plants, but complications arise from the in- ability of the h u m a n stomach to digest m u c h of it in its vegetable form. Though w e can eat a wide range of plants, from wheat to lettuces, those that are digestible by m a n constitute a very small minority in comparison with those that are inedible for us. Unfortunately, some of the most abundant plants, such as the grasses, fall into the latter category. So w e have to employ 'middlemen'—the farm livestock—whose function it is to digest the vegetable matters which are beyond the capacity of our o w n stomachs, and to trans- form them into foods suitable for m a n . N o w , if this intermediary process could be eliminated, the implications would be enormous. In theory, the colossal livestock population of the world's farms would become redundant, and farmers could concentrate entirely on growing crops. However, this is a theoretical pattern which is not likely to be adopted in the near future. For although the extracted protein, when refined, is easily digestible by h u m a n beings, in its cruder form it is an ideal animal food; and it therefore seems probable that it will bring about an increase rather than a decrease in the farm livestock population, at least in the earlier stages of development. A s an animal feeding-stuff it has three main advantages: 1. It can provide for pigs and poultry the protein required in a balanced ration, and can thus m a k e the farmer independent of purchased proteins in the form of fish meal or meat meal. H e can grow a completely balanced ration for his livestock on his o w n fields more cheaply than he can buy it. 2. It can provide a satisfactory method of storing protein-rich plant foods, gathered at the time of their greatest abundance, against a time of scarcity. Thus, in the northern temperate zone, grass cut at the spring flush m a y , after processing, be kept for feeding in the winter months. It maintains 226LEAF P R O T E I N : F O O D OF THE F U T U R E almost its full value in the leaf protein extract—certain constituents such as carotene, being preserved m u c h better than they are in dried grass, where they rapidly become a wasting asset. 3. It makes a n e w selection of farm crops possible. In the past, farmers have had to grow crops which not only had good feeding value but were also palatable, either to h u m a n beings or to animals. There was no advantage in growing a protein-rich crop if neither m a n nor beast could or would eat it. With leaf protein extracts, the question of palatability does not arise. The extract is of roughly the same quality whatever its source. The only criteria in selecting the plants for processing are protein content and abundance. A m o n g the best of such plants in the northern hemisphere are lucerne (alfalfa), lupins and grasses; but plants such as nettles (normally regarded as weeds) have a high protein content and are of luxuriant growth, so that they are worthy of consideration as a farm crop. In the tropics, a very wide range of lush vegetation is under consideration and indeed, at the m o m e n t , tropical countries are taking m u c h more interest in the development of leaf protein extraction than are most of the temperate ones. THE PRODUCTION OF LEAF PROTEIN Interest in the extraction of leaf protein m a y be traced back to the work of two French chemists, the brothers G . F . and H . M . Rouelle, in the 1760s and 1770s.1 H . M . Rouelle extracted from hemlock leaves what he called 'la matière glutineusé', and realized its similarity to animal proteins. Since then, several patents have been taken out to cover various methods of extraction, and research has been going on intensively in recent years in a number of countries, notably the U . S . A . , Britain, the Netherlands and Germany. In Germany, before the second world war, the firm Alexandrawerk was marketing a machine, based on the screw-expeller principle, for extracting juices from sugar beet tops and leaves. A very similar machine has been under experiment in Austria since the war. D r . N . W . Pirie,2 n o w of Rothamsted Experimental Station in England, in 1940 began large-scale experiments in leaf protein extraction and prepara- tion, using a wide variety of available machines. After a year or so, this 1. 'Observations sur les fécules ou parties vertes des plantes, et sur la matière glutineusé ou vegete animale', Journal de médecine, chirurgie (et) pharmacie, 1773. 2. N . W . Pirie, 'Some Practical Aspects of Leaf Protein Manufacture', Food Manufacture, 17, 1942; 'Leaf Protein', Food Manufacture, 22, 1947; 'Green Leaves as a Source of Protein and Other Nutrients', Nature, 149, 1942; "The Circumvention of Waste', in Four Thousand Million Mouths, ed. by F. le Gros Clark and N . W . Pirie, London, 19S1. 227LEAF PROTEIN: FOOD OF THE F U T U R E work was discontinued, but it was resumed after the war and is still pro- ceeding. R . E . Slade and J. H . Birkinshaw,1 in Britain, took out a patent in 1939 for extracting protein from grass, chiefly by means of pressing. In 1936, C . Goodall, working mainly on the extraction of vitamins and medicinal constituents from plants, described the extraction of juice from the leaf cells by means of grooved sugar-cane rollers.2 The Western Regional Laboratory at Albany, California, carried out experiments in 1947 in extracting protein from lucerne by means of a machine k n o w n as the Reitz disintegrator, which apparently combines the properties of a hammer-mill and a centrifuge.3 Somewhat similar investiga- tions were being m a d e about the same time in various other parts of the United States, and work is presumably still in progress. In the Netherlands, W . B . Deijs4 succeeded in 1949 in extracting from grass a juice containing 43 per cent of crude protein by means of a wringer- press. It is, however, almost impossible to give a complete picture of the progress of experiments in different parts of the world. A n increasing number of scientists, in both state and private laboratories, are working in secret on various processes for protein extraction, and the nearer they c o m e to success the greater the secrecy; details of the processes are jealously preserved until the time is deemed ripe for publication. But enough has been said to show that they have reached an advanced stage. In general, it m a y be said that the principle behind leaf protein extraction is the release of the protein in the cells by a combination of pressure and abrasion. In later stages, the extracted juice m a y have to be treated by other processes before being ideal for storage or use. A n ordinary kitchen mincing- machine is a reasonably efficient extractor of leaf protein on a small scale, though obviously it becomes less economical as the scale increases. It is interesting to note that pressure and abrasion are precisely the forces used by cattle to extract leaf protein naturally by chewing. The one notable exception, so far published, to this general principle is that described by J. T . Sullivan,5 w h o first dried and ground the leaves, and 1. R . E . Slade and J. H . Birkinshaw, 'Improvements in or relating to the Utilization oí Grass and Other Green Crops', Brit. Pat. 511525 (1939); R . E . Slade, Branscombe and J. C . M c G o w a n , 'Protein Extraction', Chemical Industries, 23, 1945. 2. C . Goodall, 'Improvements relating to the Treatment of Grass and Other Vegetable Substances', Brit. Pat. 457789 (1936). 3. E . M . Bickoff, A . Bevenue and K . T . Williams, 'Alfalfa has a Promising Chemurgic Future', Chemurgic Digest, 6, 1947. 4. W . B . Deijs, Experiments in the Pressing of Grass, Central Institute of Agricultural Research, Wageningen, Holland, Stencil N o . 413, January 1949; Results of Experiments in the Pressing of Grass with the Aid of a Wringer Press, Central Institute of Agricultural Research, Stencil N o . 1, 1950; Experiments in the Pressing of Silo Grass and Beet Leaves, Central Institute of Agricultural Research, Stencil N o . 1068, 1951; W . B . Deijs and J. J. I. Sprenger, The Production of Proteins from Green Fodder Plants, Central Institute of Agricultural Research, Stencil N o . 1, 1953. 5. J. T . Sullivan, 'Protein Concentrates from Grasses', Science, 98, 1943; 'High Protein Concentrate can be obtained from Grass', Food Ind., 245, 1944. 228L E A F P R O T E I N : F O O D OF T H E F U T U R B then extracted the protein from the meal or powder. His product, obtained on a laboratory scale, contained 72 per cent of protein. T h e process would, however, apparently be prohibitively expensive on a commercial scale. The first firm to lift the veil from their experiments and to venture on to the market with a commercial machine is a British firm. Their machine, the 'professor,' was exhibited at the Royal S h o w in 1955 and is n o w in limited production. It works on the following lines. The green plants are first prepared for processing by means of a chopping machine called the 'pre-chopper'. A conveyor then takes this green matter into the main part of the machine—a specially constructed wringer-press in which the material is crushed and pressed simultaneously. The juice runs into a settling tank, in which a sediment of impurities forms on the bottom. Meantime, the residue of the green matter passes into a washing machine, where it absorbs more water in readiness for a second passage through the protessor. T h e second extraction of juice joins the first in the settling tank. T h e juice, rich in protein, can be used in its liquid form, but in general it is taken a stage further and coagulated, by means of steam, in a second tank. After coagulation, the 'protess', as the extract is called, can be pressed in a cheese-press, from which it emerges as a hard cake, dark greenish in colour. This cake m a y afterwards be ground into meal, or it can be subjected to various purifying processes, ultimately leaving a colourless, tasteless powder which is largely pure protein. The actual protein content of the protess naturally varies a good deal with the type, quality and age of the crop from which it is m a d e ; and so does the extraction rate. Let us take, for instance, a green crop containing 80 per cent moisture, which means that one ton of the crop will produce about 448 lb of dry matter. This dry matter is composed of fibre and nutrient, according to the state of growth, the time of year and other factors, but usually the rate is approximately 60 per cent fibre to 40 per cent nutrient. Thus one ton of green matter would produce about 180 lb of nutrient, which is here called protess. In general, this protess will contain about 40-50 per cent of protein according to the crop, the season, etc., the remainder consisting of digestible carbohydrates, fats, oil and other foods. The following table gives actual results obtained from the protessor plant. Crop Cocksfoot Peas Barley I Barley II Dry matter in ton of fresh crop aw 635 354 434 497 Crude protein in ton of fresh crop aw 67 64 52 52 Dry matter in protess aw 148 134 120 152 Crude protein aw 28 35 29 28 in protess % 18.9 26.2 24.2 18.4 Yield of crude protein extracted from green crop % 41.7 54.7 55.8 53.8 229LEAF PROTEIN: F O O D OF T H E F U T U R E In each instance, one ton of fresh crop was used. T w o separate crops of barley, taken from different fields and at different stages of growth, were processed to give an idea of the variation that m a y be expected between two different crops of the same plant. The results were obtained by putting the green matter through the machines once only. Normal practice is to put it through twice, and this results in the extraction of an additional 50 per cent or more of protess, with a correspond- ing additional yield of protein. The final percentages of crude protein in the protesses m a d e from these four substances were as follows: cocksfoot, 25 per cent; peas, 34.1 per cent; barley I, 34.7 per cent; barley II, 33.6 per cent. Comparable results for protesses m a d e from other green crops are: white clover, 38.4 per cent; lucerne, 43.7 per cent; Italian rye-grass, 38.7 per cent; maize, 37.25 per cent; pea-vine waste, 41.1 per cent; nettles, 37.0 per cent; fat hen (goosefoot), 44.0 per cent; sunflower husk, 24.6 per cent. Another highly relevant point is the percentage of protein in the original green matter which can be extracted by the process. Reverting to the above table, it will be seen that from about 40 to 55 per cent of the protein originally contained in the green matter can be extracted by putting the matter through the machines once only. Even better results have been obtained with two pressings. With lucerne, for example, it is possible thus to extract about 70 per cent of the original crude protein in the green matter. The machines are capable of dealing with fresh green matter at a rate of one ton or m o r e per hour. THE USES OF LEAF PROTEIN Though modifications and improvements could doubtless be m a d e to increase these extraction rates, at the m o m e n t it is not certain whether this would be desirable. Farmers w h o have studied the process believe that on a c o m - mercial farm it might well be used in conjunction with silage-making. A protessor working alongside a silage clamp could process the green matter as it was brought in. After the extraction of juice, the fibrous residue would still contain anything from 30 to 60 per cent of the original crude protein in the crop, and could be transferred immediately to the silage clamp for mixing with the silage. T h e mastication process to which this residue had been subjected would help to improve the texture of the silage as a whole, besides enriching it with protein. In brief, the protein extracted in the form of protess might well be considered as a by-product of silage-making, costing very little beyond the running expenses of the machine. It should be kept in mind that the extracted protein can be used either in liquid or solid form. In the former case, half of the machinery m a y be dispensed with, for the liquid can be used straight from the settling tank. 230L E A F PROTEIN: F O O D OF T H E F U T U R E This brings us again to the chief advantage of leaf protein extract, which is that, while being rich in protein, it has a low fibre content. Consequently it can easily be digested by non-ruminant animals. If used in liquid form, direct from the settling tanks, it can be mixed with ground barley and similar cereal meals to form a crumbly mash, eminently suitable for pigs and poultry. Experiments are still going on to determine the optimum ration of leaf protein extract w h e n fed in this way, but it is k n o w n that it can largely replace fish meal in a balanced ration for such livestock. However, the main use of the leaf protein extract must be confined to its powder form. The storage problem posed by the liquid extract is obviously a limiting factor. A s a powder, however, the protein can be mixed into c o m p o u n d feeding-stuffs in exactly the same w a y as animal proteins, and it can replace them, at least in part, in rations for any kind of livestock. T h e immediate application of the professor and similar processes is there- fore likely to consist in providing an alternative source of protein for the feeding of livestock. It does, in fact, bring within sight that millenial day foreseen by the Prophet Isaiah w h e n 'the lion shall eat straw like the ox'. A n y farm equipped to produce leaf protein extract could become almost completely self-supporting in the matter of feeding-stuffs, producing from its o w n fields a balanced diet for all its livestock. In pra
