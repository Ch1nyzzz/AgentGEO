" data-rapid="marko-sec" id="entry-body"><section class="entry__content-list js-entry-content js-cet-subunit" data-dcnode-id="1125"><div class="primary-cli cli cli-text" data-dcnode-id="1365"><p data-dcnode-id="1366"><span class="big" data-dcnode-id="1371"><strong data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">by Evan Rawn</span></strong></span><span data-dcnode-id="1370" instrument_node=""> (</span><a class="js-entry-link cet-external-link" data-dcnode-id="1368" data-vars-item-name="This post originally appeared on ArchDaily" data-vars-item-type="text" data-vars-position-in-subunit="0" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos/" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5c9a9100e4b012c156665450" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos/" role="link" target="_hplink"><span data-dcnode-id="1369" instrument_node="">This post originally appeared on ArchDaily</span></a><span data-dcnode-id="1367" instrument_node="">)</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1362"><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">World Expos have long been important in advancing architectural innovation and discourse. Many of our most beloved monuments were designed and constructed specifically for world’s fairs, only to remain as iconic fixtures in the cities that host them. But what is it about Expos that seem to create such lasting architectural landmarks, and is this still the case today? </span></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1353"><div class="advertisement__label" data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1354"><div class="ad-entry_paragraph_1 ad-spot--gam ad-spot--gam-inline-1" data-dcnode-id="1359" id="ad-inline-1-1"></div><span data-dcnode-id="1358" instrument_node="">
</span><span data-dcnode-id="1355" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1350"><p data-dcnode-id="1351"><img alt="expo" data-dcnode-id="1352" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.huffpost.com/gen/2935666/thumbs/o-EXPO-900.jpg%3F3&amp;raw"></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1347"><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Throughout history, each new Expo offered architects an opportunity to present radical ideas and use these events as a creative laboratory for testing bold innovations in design and building technology. World’s fairs inevitably encourage competition, with every country striving to put their best foot forward at almost any cost. This carte blanche of sorts allows architects to eschew many of the programmatic constraints of everyday commissions and concentrate on expressing ideas in their purest form. Many masterworks such as Mies van der Rohe’s German Pavilion (better known as the Barcelona Pavilion) for the 1929 Barcelona International Exposition are so wholeheartedly devoted to their conceptual approach that they could only be possible in the context of an Exposition pavilion.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1341"><p data-dcnode-id="1342"><span data-dcnode-id="1346" instrument_node="">To celebrate the recent opening of the </span><a class="js-entry-link cet-external-link" data-dcnode-id="1344" data-vars-item-name="Expo Milano 2015" data-vars-item-type="text" data-vars-position-in-subunit="1" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.archdaily.com/tag/milan-expo-2015/" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5c9a9100e4b012c156665450" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/tag/milan-expo-2015/" role="link" target="_hplink"><span data-dcnode-id="1345" instrument_node="">Expo Milano 2015</span></a><span data-dcnode-id="1343" instrument_node="">, we’ve rounded up a few of history’s most noteworthy World Expositions to take a closer look at their impact on architectural development.</span></p></div><div class="pg-placeholder" data-dcnode-id="1339" id="public-good-placeholder"><div class="pgs-dpg-flex" data-dcnode-id="1340" data-loaded="true" data-pgs-partner-id="verizon-huffpost" widget-loading="true"></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1333"><p data-dcnode-id="1334"><span class="big" data-dcnode-id="1335"><span class="big" data-dcnode-id="1336"><strong data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">The Great Exhibition of 1851</span></strong></span></span></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1324"><div class="advertisement__label" data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1325"><div class="ad-entry_paragraph_3 ad-spot--gam ad-spot--gam-inline-2" data-dcnode-id="1330" id="ad-inline-2-1"></div><span data-dcnode-id="1329" instrument_node="">
</span><span data-dcnode-id="1326" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1318"><p data-dcnode-id="1319"><img alt="tree" data-dcnode-id="1323" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.huffpost.com/gen/2935678/original.jpg&amp;raw"><span data-dcnode-id="1322" instrument_node=""> </span><small data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">The Crystal Palace. Image via Wikimedia Commons</span></small></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1315"><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Originally intended to display innovations in technology and manufacturing from around the world, the Great Exhibition took place in London in 1851 and is generally considered to be the first world’s fair. The exhibits here showcased over 100,000 objects including the latest printing presses, carriages, and rare gems, but perhaps the most astonishing feature of the fair was its famed Crystal Palace. </span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1312"><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Designed by Sir Joseph Paxton and constructed primarily of glass and iron, the Crystal Palace demonstrated incredible engineering feats and was noted for the largest amount of glass ever seen in building of the time. With its open interiors and natural lighting, the Crystal Palace served as an optimal space for exhibits by taking advantage of a self-supporting shell resting on slim iron columns and reducing the exhibition’s operating costs by eschewing any need for artificial lighting. The building was later relocated after the conclusion of the exhibition but was destroyed by fire in 1936. Despite its unfortunate demise, the Crystal Palace would serve as an inspiration for developing glass manufacturing techniques in buildings and became a precedent for subsequent curtain-wall structures.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1306"><p data-dcnode-id="1307"><span class="big" data-dcnode-id="1308"><span class="big" data-dcnode-id="1309"><strong data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">The Universal Exposition of 1889</span></strong></span></span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1300"><p data-dcnode-id="1301"><img alt="paris" data-dcnode-id="1305" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.huffpost.com/gen/2935694/thumbs/o-PARIS-900.jpg%3F2&amp;raw"><span data-dcnode-id="1304" instrument_node=""> </span><small data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Galerie des Machines . Image via Wikimedia Commons</span></small></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1297"><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">The Universal Exposition of 1889 (Exposition Universelle de 1889) was a celebration of international achievements in architecture, fine arts, and the latest technology, with the newly built Eiffel Tower as its central attraction. The 1889 exhibition was part of a tradition of universal exhibitions taking place every eleven years in Paris, with the 1889 event occurring on the centennial of the French Revolution. The commissioners decided to reject early plans for a 300-meter-tall guillotine in favor of an iron tower design by Gustave Eiffel. </span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1294"><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">The tower served as the entrance arch, and the icon for the fair which attracted nearly 2 million visitors. At the time, the tower was the tallest structure in the world and the public flocked to its upper floors to experience views over the French capital. Although initially despised by many Parisians for its looming presence over the city and meant to last only for the duration of the exhibition, the tower still stands as one of the most iconic works of architecture in the world.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1291"><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">A less well-known yet equally significant structure built for the exhibition was the Galerie des Machines designed by architect Ferdinand Dutert and engineer Victor Contamin. The Machinery Hall spanned 111 meters and was the longest interior space in the world at the time making use of a system of hinged arches constructed of iron. With no internal supports, this massive iron and glass structure likely drew upon the Crystal Palace as a precedent and was reused for the 1900 exhibition before it was demolished in 1910 to open up the view along the Champ de Mars.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1285"><p data-dcnode-id="1286"><span class="big" data-dcnode-id="1287"><span class="big" data-dcnode-id="1288"><strong data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Barcelona International Exhibition of 1929</span></strong></span></span></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1276"><div class="advertisement__label" data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1277"><div class="ad-repeating_dynamic_display ad-spot--gam ad-spot--gam-inline-infinite" data-dcnode-id="1282" id="ad-inline-infinite-1"></div><span data-dcnode-id="1281" instrument_node="">
</span><span data-dcnode-id="1278" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1270"><p data-dcnode-id="1271"><img alt="barc" data-dcnode-id="1275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.huffpost.com/gen/2935700/thumbs/o-BARC-900.jpg%3F2&amp;raw"><span data-dcnode-id="1274" instrument_node=""> </span><small data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Barcelona International Exhibition. Image © Canaan, via Wikimedia Commons</span></small></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1267"><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">The second World Fair to be held in Barcelona after 1888, The Barcelona Exhibition of 1929 resulted in a series of prominent and lasting structures of varying architectural styles. Many of these buildings surround the Plaça d’Espanya at the foot of Montjuïc and are situated along an axial street. This grandiose sequence of space culminates in the Palau Nacional, now the Museu Nacional d’Art de Catalunya, and is striking for the fact that these ornate, historically inspired structures were built during the same time period and for the same event as Mies van der Rohe’s Barcelona Pavilion. This juxtaposition between history and modernity was one of the most unique elements of the exposition and is a notable departure from the common science fiction theme seen in so many other world’s fairs.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1264"><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">The original Barcelona Pavilion was dismantled in 1930 shortly after the conclusion of the exposition, but it was rebuilt in 1983 by a group of Catalan architects in the same location using only the few photographs and salvaged drawings which remained.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1258"><p data-dcnode-id="1259"><span class="big" data-dcnode-id="1260"><span class="big" data-dcnode-id="1261"><strong data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">1964 New York World’s Fair</span></strong></span></span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1252"><p data-dcnode-id="1253"><img alt="ny" data-dcnode-id="1257" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.huffpost.com/gen/2935704/original.jpg&amp;raw"><span data-dcnode-id="1256" instrument_node=""> </span><small data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">1964 New York World’s Fair . Image via People for the Pavilion website</span></small></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1249"><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">With everything from rockets, to futuristic cars and cities, to an animatronic Abraham Lincoln, the 1964 New York World’s Fair truly embraced the novelty of science fiction. With a theme of “Peace Through Understanding,” the exposition took place in Flushing Meadows Corona Park, Queens on the same site as the 1939-40 World’s Fair. Here 650 acres of pavilions, displays, and public facilities dotted the landscape of the park to showcase the latest ideas and accomplishments of corporations and countries to over 50 million visitors. </span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1246"><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Even the architecture at the exposition seemed to draw inspiration from the space-age and included Phillip Johnson’s famous New York State Pavilion. Rising 100 feet, the “bicycle wheel roof” of the main pavilion is supported by sixteen slip-formed hollow concrete columns. Compression and tension rings of steel cables gave the roof its convex shape and supported colorful plastic Kalwall sheeting. Both of these techniques represented radical architectural innovations at the time and appear to be very different from many of Johnson’s other works. Adjacent to the pavilion three disk-shaped observation towers reach a height of 226 feet and provide visitors with a new vantage point on the expo site.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1243"><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Johnson’s pavilion can still be seen at the Expo site today, although its fate in the coming years is uncertain. Abandoned for many years, the pavilion is in dire need of restoration and a small group of volunteers has dedicated time each year since 2009 to repainting its red, white, and yellow walls, but further action is required to preserve this unique architectural landmark.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1237"><p data-dcnode-id="1238"><span class="big" data-dcnode-id="1239"><span class="big" data-dcnode-id="1240"><strong data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Century 21 Exposition of 1962</span></strong></span></span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1231"><p data-dcnode-id="1232"><img alt="needle" data-dcnode-id="1236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.huffpost.com/gen/2935712/original.jpg&amp;raw"><span data-dcnode-id="1235" instrument_node=""> </span><small data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Century 21 Exposition of 1962 . Image © Seattle Municipal Archives via Wikimedia Commons</span></small></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1228"><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Occasionally, expositions have far-reaching impacts on not only the built environment, but also the economic and cultural life of their host cities. Similar to many other world’s fairs, the 1962 exposition focused on themes of space, science and technology and the future, and its theme was heavily influenced by the ongoing Space Race at the time. The 1962 Century 21 Exposition in Seattle is one of the relatively few expositions in history to make a profit, and some even credit it with revitalizing the city’s economy and encouraging its cultural development in this way. Most notably, the fair resulted in the construction of the Space Needle and the Alweg Monorail, which is still running today. Public infrastructural moves such as this were made possible in the context of showcasing the latest technology for the exhibition, but also resulted in a dramatic infrastructural improvement for the life of the city.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1222"><p data-dcnode-id="1223"><span class="big" data-dcnode-id="1224"><span class="big" data-dcnode-id="1225"><strong data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Expo 67</span></strong></span></span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1216"><p data-dcnode-id="1217"><img alt="bucky" data-dcnode-id="1221" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.huffpost.com/gen/2935714/thumbs/o-BUCKY-900.jpg%3F3&amp;raw"><span data-dcnode-id="1220" instrument_node=""> </span><small data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Buckminster Fuller’s Dome. Image © Flickr user abdallahh</span></small></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1213"><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Expo 67 in Montreal was the main feature of Canada’s Centennial celebrations of 1967. Entitled “Man and His World,” the theme for the expo showcased man’s cultural and technological advancements and encouraged participation from countries around the world. The choice of the site for the exhibition proved to be a challenge, and a new island was created in the center of the St. Lawrence River to provide additional space. Aiming to demonstrate innovative applications of architecture and engineering, the exposition featured several major pavilions contributed by various countries. </span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1210"><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">A few of the most significant pavilions included Arthur Erickson’s pyramidal Man in His Community of hexagonal wooden frames, Frei Otto and Rolf Gutbrod’s tensile canopy structure for the German pavilion, and Buckminster Fuller’s geodesic dome for the US pavilion.</span></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1201"><div class="advertisement__label" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1202"><div class="ad-repeating_dynamic_display ad-spot--gam ad-spot--gam-inline-infinite" data-dcnode-id="1207" id="ad-inline-infinite-2"></div><span data-dcnode-id="1206" instrument_node="">
</span><span data-dcnode-id="1203" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1195"><p data-dcnode-id="1196"><img alt="cubes" data-dcnode-id="1200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.huffpost.com/gen/2935728/thumbs/o-CUBES-900.jpg%3F3&amp;raw"><span data-dcnode-id="1199" instrument_node=""> </span><small data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Habitat 67. Image © Wladyslaw via Wikimedia Commons</span></small></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1192"><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Later known as the Montreal Biosphere, Fuller’s dome had far-reaching influence as a prototype for a new trend in construction. The structure is made up of steel and acrylic cells and includes a complex shading system to control internal temperatures. Visitor’s circulated through four themed platforms divided into seven levels and accessed by the longest escalator ever built at the time. Additionally, the pavilion’s futuristic look was exaggerated by the Minirail monorail that ran through the pavilion. Unfortunately, the building fell victim to a devastating fire in May 1976 in which all of the building’s transparent acrylic sections were destroyed. In 1990 the property was purchased and transformed into an environment museum which continues to occupy the building to this day.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1189"><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Another famous architectural remnant from Expo 67 is Moshe Safdie’s Habitat 67. The building was initially intended to provide high-quality housing in dense urban environments using prefabricated modular units. Its configuration attempted to combine elements of suburban homes with the density of an urban high-rise. Although the design did not succeed in prompting a trend in radical prefabricated buildings, a new typology was created that expanded our ideas for what is possible in prefabricated construction. Like several other structures we have seen in world’s fairs, Habitat 67 was not disassembled upon the Fair’s completion and continues to serve as a housing complex today.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1183"><p data-dcnode-id="1184"><span class="big" data-dcnode-id="1185"><span class="big" data-dcnode-id="1186"><strong data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Osaka World Expo 1970</span></strong></span></span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1177"><p data-dcnode-id="1178"><img alt="tower" data-dcnode-id="1182" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.huffpost.com/gen/2935736/original.jpg&amp;raw"><span data-dcnode-id="1181" instrument_node=""> </span><small data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Kiyonari Kikutake’s Landmark Tower</span></small></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1174"><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">With a theme of “Progress and Harmony for Mankind,” the Osaka World Expo in 1970 was the first World’s Fair to be held in Japan and represented a desire to embrace modern technology and create the potential for higher standards of living. This expo came at a particular progressive time in Japan’s history after having experienced an extremely rapid period of development in the 1960s and furthering the development of metabolism. It is also one of the best attended expositions in history with over 64 million visitors.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1168"><p data-dcnode-id="1169"><span class="big" data-dcnode-id="1170"><span class="big" data-dcnode-id="1171"><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Expo 2010 Shanghai China</span></strong></span></span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1162"><p data-dcnode-id="1163"><img alt="kisho" data-dcnode-id="1167" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.huffpost.com/gen/2935746/original.jpg&amp;raw"><span data-dcnode-id="1166" instrument_node=""> </span><small data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Toshiba-IHI Pavilion by Kisho Kurokawa. Image © Flickr CC user m-louis</span></small></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1159"><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Expo 2010 in Shanghai took place on the banks of the Huangpu River and broke numerous records in the history of world’s fairs. With the theme of “Better City – Better Life,” the expo sought to showcase China’s incredible advancements in recent decades as a global power and elevate Shanghai’s status as the “next great world city.” Known to be the most expensive expo in the history of world’s fairs, it hosted the largest number of participants and was also the largest fair site ever at an astonishing 5.28 square km. Not surprising given its scope and scale, it also drew a record 73 million visitors and surpassed the attendance record for a single day at 1.03 million visitors. Surpassing the cost of cleaning up Beijing for the 2008 Olympics, preparation for the Shanghai expo included clearing large tracts of land and moving existing buildings and factories on the site, building six new subway lines, as well as planning for extensive security preparation.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1156"><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Among the Expo’s most notable projects were BIG’s Danish Pavilion and Thomas Heatherwick’s UK Pavilion. Similar to the goals for this year’s Expo Milano, many pavilions at the Exposition advocated for a focus on environmental sustainability, efficiency and diversity. Today, the grounds of the former Expo site have been transformed into a park and the former China Pavilion remains.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1150"><p data-dcnode-id="1151"><span class="big" data-dcnode-id="1152"><span class="big" data-dcnode-id="1153"><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Expo Milano 2015 </span></strong></span></span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1147"><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Clearly World Expositions have had remarkable impacts on the world of architecture and building technology, and many hope that Expo Milano 2015 will continue this tradition with its theme “Feeding the Planet, Energy for Life.” Although traditional building materials and technology in architecture have come a long way since the first World’s Fair, there is still plenty of room for innovation in regards to responding to the urgent environmental needs of today. This year’s expo recognizes this fact and offers architects opportunities to continue to explore notions of sustainability and how we engage with our planet.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1137"><div data-dcnode-id="1138" style="padding:2px;background:#E8F0F9;border:1px solid #ccc;clear:both"><p data-dcnode-id="1139" style="margin:2px;"><a class="js-entry-link cet-external-link" data-dcnode-id="1145" data-vars-item-name="The Architectural Lab: A History Of World Expos" data-vars-item-type="text" data-vars-position-in-subunit="2" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos/" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5c9a9100e4b012c156665450" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/625936/the-arc
