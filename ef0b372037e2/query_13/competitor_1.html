/why-was-the-eiffel-tower-built-300x161.jpg 300w, https://www.frenchplanations.com/wp-content/uploads/why-was-the-eiffel-tower-built-600x322.jpg 600w, https://www.frenchplanations.com/wp-content/uploads/why-was-the-eiffel-tower-built.jpg 1814w" sizes="(max-width: 1020px) 100vw, 1020px"&gt;</span></noscript></picture></a><span data-dcnode-id="1102" instrument_node="">

</span><span class="post-date-day" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">02</span></span><br data-dcnode-id="1097"><span data-dcnode-id="1096" instrument_node="">
</span><span class="post-date-month is-small" data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Aug</span></span><span data-dcnode-id="1093" instrument_node="">
</span></div><span data-dcnode-id="1091" instrument_node="">
</span></div><span data-dcnode-id="1089" instrument_node=""> </span></div><span data-dcnode-id="1087" instrument_node="">
</span></header><span data-dcnode-id="1085" instrument_node="">
</span><div class="entry-content single-page" data-dcnode-id="821"><span data-dcnode-id="1084" instrument_node="">
</span><div class="text" data-dcnode-id="1063" id="text-3775105159"><span data-dcnode-id="1083" instrument_node="">
</span><p class="p1" data-dcnode-id="1080"><span data-dcnode-id="1081" style="font-size: 120%; color: #282828;"><span data-dcnode-id="1082" instrument_node="">Paris has beautiful scenery, incredible cuisine and so many different things to go see and do. </span></span></p><span data-dcnode-id="1079" instrument_node="">
</span><p class="p1" data-dcnode-id="1076"><span data-dcnode-id="1077" style="font-size: 120%; color: #282828;"><span data-dcnode-id="1078" instrument_node="">At the very top of the list, however, is the crown jewel of the city, The Eiffel Tower. </span></span></p><span data-dcnode-id="1075" instrument_node="">
</span><p class="p1" data-dcnode-id="1072"><span data-dcnode-id="1073" style="font-size: 120%; color: #282828;"><span data-dcnode-id="1074" instrument_node="">Many people know of the Eiffel Tower but might not know the origins of the iconic symbol of the city of light. </span></span></p><span data-dcnode-id="1071" instrument_node="">
</span><p class="p1" data-dcnode-id="1068"><span data-dcnode-id="1069" style="font-size: 120%; color: #282828;"><span data-dcnode-id="1070" instrument_node="">We’re going to look at the origins of the monument and examine its fittingly notable history.</span></span></p><span data-dcnode-id="1067" instrument_node="">
</span><span data-dcnode-id="1064" instrument_node="">
</span></div><span data-dcnode-id="1062" instrument_node="">
</span><div class="gap-element clearfix" data-dcnode-id="1057" id="gap-641575196" style="display:block; height:auto;"><span data-dcnode-id="1061" instrument_node="">
</span><span data-dcnode-id="1058" instrument_node="">
</span></div><span data-dcnode-id="1056" instrument_node="">
</span><div class="container section-title-container" data-dcnode-id="1050"><h2 class="section-title section-title-normal" data-dcnode-id="1051"><b data-dcnode-id="1055"></b><span class="section-title-main" data-dcnode-id="1053" style="color:rgb(0, 0, 0);"><span data-dcnode-id="1054" instrument_node="">Some Context..</span></span><b data-dcnode-id="1052"></b></h2></div><span data-dcnode-id="1049" instrument_node="">
</span><div class="text" data-dcnode-id="1024" id="text-2787138940"><span data-dcnode-id="1048" instrument_node="">
</span><p class="p1" data-dcnode-id="1045"><span data-dcnode-id="1046" style="font-size: 120%; color: #282828;"><span data-dcnode-id="1047" instrument_node="">The Eiffel Tower was built from 1887 to 1889 by French Engineer Gustave Eiffel, hence the name of the monument. </span></span></p><span data-dcnode-id="1044" instrument_node="">
</span><p class="p1" data-dcnode-id="1041"><span data-dcnode-id="1042" style="font-size: 120%; color: #282828;"><span data-dcnode-id="1043" instrument_node="">His company specialized in building metal frameworks and structures, and he was the creator of many metallic works across Europe. </span></span></p><span data-dcnode-id="1040" instrument_node="">
</span><p class="p1" data-dcnode-id="1037"><span data-dcnode-id="1038" style="font-size: 120%; color: #282828;"><span data-dcnode-id="1039" instrument_node="">His artistic mark was impressed upon the culture everywhere from Portugal to Hungary. </span></span></p><span data-dcnode-id="1036" instrument_node="">
</span><p class="p1" data-dcnode-id="1029"><span data-dcnode-id="1030" style="font-size: 120%; color: #282828;"><span data-dcnode-id="1035" instrument_node="">Gustave’s company also was the inventor and creator of the metal internal framework of The Statue of Liberty, designed by Auguste Bartholdi and offered to the United States as a gift to celebrate the 100</span><span class="s1" data-dcnode-id="1032"><sup data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">th</span></sup></span><span data-dcnode-id="1031" instrument_node=""> Anniversary of the nation’s independence in 1886.</span></span></p><span data-dcnode-id="1028" instrument_node="">
</span><span data-dcnode-id="1025" instrument_node="">
</span></div><span data-dcnode-id="1023" instrument_node="">
</span><div class="gap-element clearfix" data-dcnode-id="1018" id="gap-835512879" style="display:block; height:auto;"><span data-dcnode-id="1022" instrument_node="">
</span><span data-dcnode-id="1019" instrument_node="">
</span></div><span data-dcnode-id="1017" instrument_node="">
</span><div class="container section-title-container" data-dcnode-id="1011"><h2 class="section-title section-title-normal" data-dcnode-id="1012"><b data-dcnode-id="1016"></b><span class="section-title-main" data-dcnode-id="1014" style="color:rgb(0, 0, 0);"><span data-dcnode-id="1015" instrument_node="">so why was the eiffel tower built?</span></span><b data-dcnode-id="1013"></b></h2></div><span data-dcnode-id="1010" instrument_node="">
</span><div class="text" data-dcnode-id="969" id="text-2722248940"><span data-dcnode-id="1009" instrument_node="">
</span><p class="p1" data-dcnode-id="1006"><span data-dcnode-id="1007" style="font-size: 120%; color: #000000;"><span data-dcnode-id="1008" instrument_node="">The Eiffel Tower was built to be one of the main attractions of The Paris World Fair in 1889. </span></span></p><span data-dcnode-id="1005" instrument_node="">
</span><p class="p1" data-dcnode-id="1002"><span data-dcnode-id="1003" style="font-size: 120%; color: #000000;"><span data-dcnode-id="1004" instrument_node="">The Fair covered the entire Champ de Mars in Paris and its main focus was the industrial advancement and use of iron and steel in construction and the impact it’s had on the industry. </span></span></p><span data-dcnode-id="1001" instrument_node="">
</span><p class="p1" data-dcnode-id="994"><span data-dcnode-id="995" style="font-size: 120%; color: #000000;"><span data-dcnode-id="1000" instrument_node="">It was first called the 300-meter tower but it quickly took the name of the man who built it into what we know today, The Eiffel Tower. The monument opened on May 15</span><span class="s1" data-dcnode-id="997"><sup data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">th</span></sup></span><span data-dcnode-id="996" instrument_node="">, 1889.</span></span></p><span data-dcnode-id="993" instrument_node="">
</span><p class="p1" data-dcnode-id="990"><span data-dcnode-id="991" style="font-size: 120%; color: #000000;"><span data-dcnode-id="992" instrument_node="">It was also a commemoration of France’s own independence and the centennial of the French Revolution. </span></span></p><span data-dcnode-id="989" instrument_node="">
</span><p class="p1" data-dcnode-id="986"><span data-dcnode-id="987" style="font-size: 120%; color: #000000;"><span data-dcnode-id="988" instrument_node="">The Revolution was aimed at eliminating the divine rights of kings and ending dictatorships to install a democratic system of government. </span></span></p><span data-dcnode-id="985" instrument_node="">
</span><p class="p1" data-dcnode-id="982"><span data-dcnode-id="983" style="font-size: 120%; color: #000000;"><span data-dcnode-id="984" instrument_node="">Leading up to the World Fair, the organizers held a design competition all over France to come up with different ideas on how to improve the city, and the tower was one of the frontrunners of the race.</span></span></p><span data-dcnode-id="981" instrument_node="">
</span><p class="p1" data-dcnode-id="978"><span data-dcnode-id="979" style="font-size: 120%; color: #000000;"><span data-dcnode-id="980" instrument_node="">Additionally, at the time, The Eiffel Tower was the tallest building in the world. </span></span></p><span data-dcnode-id="977" instrument_node="">
</span><p class="p1" data-dcnode-id="974"><span data-dcnode-id="975" style="font-size: 120%; color: #000000;"><span data-dcnode-id="976" instrument_node="">This structure showed promise for industrial revolution and advancement in the future and propelled the already motivated French builders to execute this project.</span></span></p><span data-dcnode-id="973" instrument_node="">
</span><span data-dcnode-id="970" instrument_node="">
</span></div><span data-dcnode-id="968" instrument_node="">
</span><div class="gap-element clearfix" data-dcnode-id="963" id="gap-1195624513" style="display:block; height:auto;"><span data-dcnode-id="967" instrument_node="">
</span><span data-dcnode-id="964" instrument_node="">
</span></div><span data-dcnode-id="962" instrument_node="">
</span><div class="container section-title-container" data-dcnode-id="956"><h2 class="section-title section-title-normal" data-dcnode-id="957"><b data-dcnode-id="961"></b><span class="section-title-main" data-dcnode-id="959" style="color:rgb(0, 0, 0);"><span data-dcnode-id="960" instrument_node="">The Controversy Surrounding the Eiffel Tower</span></span><b data-dcnode-id="958"></b></h2></div><span data-dcnode-id="955" instrument_node="">
</span><div class="text" data-dcnode-id="904" id="text-3213883131"><span data-dcnode-id="954" instrument_node="">
</span><p class="p1" data-dcnode-id="951"><span data-dcnode-id="952" style="font-size: 120%; color: #000000;"><span data-dcnode-id="953" instrument_node="">While some people were celebrating the progress and looking forward to the display of revolution, others were disappointed in the construction. </span></span></p><span data-dcnode-id="950" instrument_node="">
</span><p class="p1" data-dcnode-id="947"><span data-dcnode-id="948" style="font-size: 120%; color: #000000;"><span data-dcnode-id="949" instrument_node="">Some even calling it a “truly tragic streetlamp,” a “mast of iron gymnasium apparatus, incomplete, confused and deformed.” </span></span></p><span data-dcnode-id="946" instrument_node="">
</span><p class="p1" data-dcnode-id="943"><span data-dcnode-id="944" style="font-size: 120%; color: #000000;"><span data-dcnode-id="945" instrument_node="">Thankfully, the construction was carried out and is now the unmistakable symbol of the city, but at the time, it was not revered as such. </span></span></p><span data-dcnode-id="942" instrument_node="">
</span><p class="p1" data-dcnode-id="939"><span data-dcnode-id="940" style="font-size: 120%; color: #000000;"><span data-dcnode-id="941" instrument_node="">Even before the construction commenced, the Eiffel Tower was met by mass protests led by Parisian critics who called the landmark a disastrous eyesore.</span></span></p><span data-dcnode-id="938" instrument_node="">
</span><p class="p1" data-dcnode-id="932"><span data-dcnode-id="933" style="font-size: 120%; color: #000000;"><span data-dcnode-id="937" instrument_node="">A group of famous artists even gathered a petition to shoot down plans for the monument. They filed an article in </span><i data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Le Temps</span></i><span data-dcnode-id="934" instrument_node=""> to publicly express their disdain for the piece:</span></span></p><span data-dcnode-id="931" instrument_node="">
</span><blockquote data-dcnode-id="917"><span data-dcnode-id="930" instrument_node="">
</span><p class="p1" data-dcnode-id="927"><span data-dcnode-id="928" style="font-size: 120%; color: #000000;"><span data-dcnode-id="929" instrument_node="">“We have come, writers, painters, sculptors, architects and passionate devotees of the hitherto untouched beauty of Paris, to protest with all our strength, all our indignation, in the name of slighted French taste…against the erection, in the heart of our capital, of this useless and monstrous Eiffel Tower…</span></span></p><span data-dcnode-id="926" instrument_node="">
</span><p class="p1" data-dcnode-id="923"><span data-dcnode-id="924" style="font-size: 120%; color: #000000;"><span data-dcnode-id="925" instrument_node="">Will the city of Paris go on to associate itself with the baroques, with the mercantile imaginations of a machine builder, to become irreparably ugly and dishonor itself? For the Eiffel Tower, which commercial America itself would not want, is, doubtless, the dishonor of Paris. </span></span></p><span data-dcnode-id="922" instrument_node="">
</span><p class="p1" data-dcnode-id="919"><span data-dcnode-id="920" style="font-size: 120%; color: #000000;"><span data-dcnode-id="921" instrument_node="">Everyone feels it, everyone says it, everyone deeply grieves it, and we are only a weak echo of the universal opinion, so legitimately alarmed.”</span></span></p><span data-dcnode-id="918" instrument_node="">
</span></blockquote><span data-dcnode-id="916" instrument_node="">
</span><p class="p1" data-dcnode-id="913"><span data-dcnode-id="914" style="font-size: 120%; color: #000000;"><span data-dcnode-id="915" instrument_node="">Designer Gustave Eiffel argued that they were not only a country of artists and entertainers, but also engineers and builders with the desire to have their vision seen and their progress made. </span></span></p><span data-dcnode-id="912" instrument_node="">
</span><p class="p1" data-dcnode-id="909"><span data-dcnode-id="910" style="font-size: 120%; color: #000000;"><span data-dcnode-id="911" instrument_node="">In hindsight, it appears that Eiffel was right. In 1887, the French government determined they agreed as well and construction on the monument began.</span></span></p><span data-dcnode-id="908" instrument_node="">
</span><span data-dcnode-id="905" instrument_node="">
</span></div><span data-dcnode-id="903" instrument_node="">
</span><div class="gap-element clearfix" data-dcnode-id="898" id="gap-285390844" style="display:block; height:auto;"><span data-dcnode-id="902" instrument_node="">
</span><span data-dcnode-id="899" instrument_node="">
</span></div><span data-dcnode-id="897" instrument_node="">
</span><div class="container section-title-container" data-dcnode-id="891"><h2 class="section-title section-title-normal" data-dcnode-id="892"><b data-dcnode-id="896"></b><span class="section-title-main" data-dcnode-id="894" style="color:rgb(0, 0, 0);"><span data-dcnode-id="895" instrument_node="">Additional Threats to The Eiffel Tower</span></span><b data-dcnode-id="893"></b></h2></div><span data-dcnode-id="890" instrument_node="">
</span><div class="text" data-dcnode-id="865" id="text-223566064"><span data-dcnode-id="889" instrument_node="">
</span><p class="p1" data-dcnode-id="886"><span data-dcnode-id="887" style="font-size: 120%; color: #000000;"><span data-dcnode-id="888" instrument_node="">The Eiffel Tower was initially supposed to be torn down after 20 years. </span></span></p><span data-dcnode-id="885" instrument_node="">
</span><p class="p1" data-dcnode-id="882"><span data-dcnode-id="883" style="font-size: 120%; color: #000000;"><span data-dcnode-id="884" instrument_node="">It was a temporary show of France’s Industrial gains, but not intended to last forever as a historic landmark. </span></span></p><span data-dcnode-id="881" instrument_node="">
</span><p class="p1" data-dcnode-id="878"><span data-dcnode-id="879" style="font-size: 120%; color: #000000;"><span data-dcnode-id="880" instrument_node="">In the end, it not only became too prominent as a city symbol, but also, Eiffel had placed a radio transmitter at the top, making the tower both too expensive and too useful to demolish.</span></span></p><span data-dcnode-id="877" instrument_node="">
</span><p class="p1" data-dcnode-id="874"><span data-dcnode-id="875" style="font-size: 120%; color: #000000;"><span data-dcnode-id="876" instrument_node="">When Germany occupied France during World War II, Hitler ordered that the Eiffel Tower be torn down, but the order was obviously never carried out. </span></span></p><span data-dcnode-id="873" instrument_node="">
</span><p class="p1" data-dcnode-id="870"><span data-dcnode-id="871" style="font-size: 120%; color: #000000;"><span data-dcnode-id="872" instrument_node="">French resistance fighters, in the end, got their revenge, they cut the elevator cables so that The Nazis would have to climb the stairs to hoist their flag.</span></span></p><span data-dcnode-id="869" instrument_node="">
</span><span data-dcnode-id="866" instrument_node="">
</span></div><span data-dcnode-id="864" instrument_node="">
</span><div class="gap-element clearfix" data-dcnode-id="859" id="gap-1664393454" style="display:block; height:auto;"><span data-dcnode-id="863" instrument_node="">
</span><span data-dcnode-id="860" instrument_node="">
</span></div><span data-dcnode-id="858" instrument_node="">
</span><div class="container section-title-container" data-dcnode-id="852"><h2 class="section-title section-title-normal" data-dcnode-id="853"><b data-dcnode-id="857"></b><span class="section-title-main" data-dcnode-id="855" style="color:rgb(0, 0, 0);"><span data-dcnode-id="856" instrument_node="">Conclusion</span></span><b data-dcnode-id="854"></b></h2></div><span data-dcnode-id="851" instrument_node="">
</span><div class="text" data-dcnode-id="838" id="text-3456771254"><span data-dcnode-id="850" instrument_node="">
</span><p class="p1" data-dcnode-id="847"><span data-dcnode-id="848" style="font-size: 120%; color: #000000;"><span data-dcnode-id="849" instrument_node="">The Eiffel Tower is a beautiful and scenic monument that had to overcome adversity and protest to just be built, showing us that the origin story of this great tower is just as important and historic as it stands today. </span></span></p><span data-dcnode-id="846" instrument_node="">
</span><p class="p1" data-dcnode-id="843"><span data-dcnode-id="844" style="font-size: 120%; color: #000000;"><span data-dcnode-id="845" instrument_node="">Great things are difficult to do, and we see that with the construction of this incredible and culturally rich symbol of Paris.</span></span></p><span data-dcnode-id="842" instrument_node="">
