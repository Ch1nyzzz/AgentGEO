</span></div></div></header><div class="site-inner" data-dcnode-id="350"><section class="hero-section" data-dcnode-id="734" id="hero-section" role="banner"><div class="wrap" data-dcnode-id="735"><h1 class="entry-title" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">The Story Behind Why the Eiffel Tower was Built is Awe-inspiring</span></h1><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Eiffel Tower, also known as 'Iron Lady' of France, is the tallest man-made marvel and is one of the most visited sites in the world. the history behind 'why was the Eiffel Tower built' is quite a fascinating one</span></p><div class="breadcrumb" data-dcnode-id="736"><span class="breadcrumb-link-wrap" data-dcnode-id="744"><a class="breadcrumb-link" data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacayholics.com/"><span class="breadcrumb-link-text-wrap" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Home</span></span></a><meta data-dcnode-id="745"></span><span data-dcnode-id="743" instrument_node=""> / </span><span class="breadcrumb-link-wrap" data-dcnode-id="738"><a class="breadcrumb-link" data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacayholics.com/category/uncategorized"><span class="breadcrumb-link-text-wrap" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Uncategorized</span></span></a><meta data-dcnode-id="739"></span><span data-dcnode-id="737" instrument_node=""> / The Story Behind Why the Eiffel Tower was Built is Awe-inspiring</span></div></div></section><div class="content-sidebar-wrap" data-dcnode-id="351"><main class="content" data-dcnode-id="406" id="genesis-content"><article aria-label="The Story Behind Why the Eiffel Tower was Built is Awe-inspiring" class="post-1409 post type-post status-publish format-standard category-uncategorized entry" data-dcnode-id="527" itemref="hero-section"><div class="entry-content" data-dcnode-id="614"><div class="revbox-inline-the-content-wrapper" data-dcnode-id="622"><div class="bz-card-image" data-dcnode-id="732"><img alt="Why Was the Eiffel Tower Built?" data-dcnode-id="733" height="853" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixfeeds.com/images/france/travel/1280-454987953-eiffel-tower-and-fountain.jpg&amp;raw" width="1280"></div><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Eiffel Tower, also known as 'Iron Lady' of France, is the tallest man-made marvel and is one of the most visited sites in the world. the history behind 'why was the Eiffel Tower built' is quite a fascinating one</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Eiffel Tower, standing serenely on the Champ de Mars, on the southern bank of River Seine, in Paris, is one of the most renowned and enchanting structures in the world.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Named after its designer and engineer Alexandre Gustave Eiffel (1832-1923), Eiffel Tower is the pride and glory of France and contributes highly in boosting the tourism of France. This massive latticework structure, a landmark destination of millions of tourists across the globe, is one of the seven wonders of the world.</span></p><span data-dcnode-id="722" instrument_node="">
</span><h3 data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">How Tall is the Eiffel Tower</span></h3><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">The Eiffel Tower, seen from all over Paris, is a tall structure and stands at a height of 984 feet, that is 300 meters. If the total height of the Eiffel Tower is calculated, including the television antenna on top, then its height is 1,052 feet (approximately 320.6 meters).</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">This means that the Eiffel Tower is twice the height of the Pyramid of Giza in Egypt and the dome of St. Peter’s Basilica, Rome. It is also twice as high as the Washington Monument in Washington D.C.</span></p><span data-dcnode-id="713" instrument_node="">
</span><h3 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Eiffel Tower: A Rewind</span></h3><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">The construction of this splendid tower began on January 26th 1887 and came to an end after two years, two months and five days, on March 28th 1889. On completion of the tower, the national flag of France was unfurled on top. It was officially inaugurated by Edward VII of England, the then Prince of Wales who later became the king, on 31st March 1889.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">The tower was under a 20-year lease in Paris and there were plans to dismantle it once the lease expired. Since, it was found to be useful for telegraphy, the plan to dismantle it was dropped and the structure was retained, making it the most prized possession of France.</span></p><span data-dcnode-id="704" instrument_node="">
</span><h3 data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Why was the Eiffel Tower Constructed</span></h3><span data-dcnode-id="701" instrument_node="">
</span><div class="bz-card-image" data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">
</span><a class="bz-enlarge remote" data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixfeeds.com/images/10/353755/1200-507209962-eiffel-tower-in-paris.jpg" rel="noopener noreferrer nofollow" target="_blank"><img alt="Eiffel tower and green Field of Mars in Paris" data-dcnode-id="699" data-pin-media="https://pixfeeds.com/images/10/353755/1200-507209962-eiffel-tower-in-paris.jpg" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixfeeds.com/images/10/353755/640-507209962-eiffel-tower-in-paris.jpg&amp;raw" width="640"></a><span data-dcnode-id="697" instrument_node="">
</span></div><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">The main reason for why was the Eiffel Tower constructed was to commemorate the centenary anniversary of the French Revolution.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">The Eiffel Tower was originally built as an entrance arch for the Paris Exposition of 1889 (also known as the International Exhibition of Paris). During the First World War, in the Battle of Marne, Parisian taxi cabs were dispatched from the Eiffel Tower to transport French infantry troops to the battlefield.</span></p><span data-dcnode-id="689" instrument_node="">
</span><h3 data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Eiffel Tower History and Facts</span></h3><span data-dcnode-id="686" instrument_node="">
</span><div class="bz-card-image" data-dcnode-id="681"><span data-dcnode-id="685" instrument_node="">
</span><a class="bz-enlarge remote" data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixfeeds.com/images/10/353755/1200-506040330-romantic-dating-couple.jpg" rel="noopener noreferrer nofollow" target="_blank"><img alt="Romantic dating couple in Paris" data-dcnode-id="684" data-pin-media="https://pixfeeds.com/images/10/353755/1200-506040330-romantic-dating-couple.jpg" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixfeeds.com/images/10/353755/640-506040330-romantic-dating-couple.jpg&amp;raw" width="640"></a><span data-dcnode-id="682" instrument_node="">
</span></div><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">If we delve into the history of the Eiffel Tower, we can come across a number of fascinating facts. Seven hundred proposed designs to build the tower, but only Gustave Eiffel’s design was chosen.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Three hundred petitioners opposed its construction, but after being designed in 1884, was built in 1889.&nbsp;This magnificent architecture was&nbsp;an idea of Alexandre Gustave Eiffel, who was assisted by Maurice Koechlin and Emile Nouguier, both were engineers, and Stephen Sauvestre, an architect, in the design and construction of the unique shape of the tower.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Three hundred workers labored for two years to erect this monument, whose design was based on mathematical calculations involving resistance of the wind. This lattice work structure was made using wrought iron of the finest quality and looks like an assembled set of numerous pieces of iron.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">These iron pieces were first manufactured in Gustave Eiffel’s factory. The foundation of the tower took five months to built and special cranes were used to lift the iron pieces higher to build the tower. The&nbsp;structure was used for many scientific experiments,&nbsp;like experiments like measuring the speed of wind and the experiment of Foucault’s giant pendulum.</span></p><span data-dcnode-id="668" instrument_node="">
</span><h3 data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Facts about Eiffel Tower</span></h3><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Though it is one of the most popular iconic structures in the world, facts about the Eiffel Tower are unknown to many. Given here are&nbsp;some interesting information regarding this monumental tower.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">✹ Alexandre Gustave Eiffel also designed the internal frame of the Statue of Liberty in 1885.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">✹ The Eiffel Tower was constructed using 9441 tons of wrought iron. A total of 18,038 wrought iron pieces were joined together to create Eiffel Tower.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">✹ The total cost of construction of the tower amounted to 7,800,800 gold francs.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">✹ The names of 72 French scientists, engineers, and famous men including Gay-Lussac, Tresca, Ampere, Sauvage and Laplace are carved on the tower.</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">✹ The Eiffel Tower is always painted in three shades of brown (with the darkest shade at the bottom) and approximately 60 tons of paint is used to paint it once in seven years.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">✹ On its centenary celebrations in 1989, the history of the Eiffel Tower was depicted in the form of a painting.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">✹ There are 352 sodium yellow-orange tint lamps, placed on the inside of the tower structure to illuminate its beauty.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="640" instrument_node="">✹</span><em data-dcnode-id="638"><span data-dcnode-id="639" instrument_node=""> la Tour Eiffel</span></em><span data-dcnode-id="637" instrument_node=""> is one of the most romantic places in the world and is a ‘must visit’ on the itinerary of many lovers.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">✹ The Eiffel Tower sways up to 15 cm on gusty wind days.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">✹ On a clear weather day, one can see up to 45 miles, from the top of the tower.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">✹ There are a few shops and two restaurants, Jules Verne and Altitude 95, in the Eiffel Tower.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">The Eiffel Tower, built as a symbol of victory, is an iconic monument and attracts multitudes who come to visit from across the globe. One cannot think of the ‘City of Light’ without the Eiffel Tower.</span></p><span data-dcnode-id="623" instrument_node="">
</span></div><span data-dcnode-id="621" instrument_node="">
