</span><h3 class="title" data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Century 21 World's Fair — Structural&nbsp;Engineering</span></h3><span data-dcnode-id="808" instrument_node="">

</span><article data-dcnode-id="518"><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">The Seattle World's Fair of 1962 celebrated Century 21, offering a vision of the future to 10 &nbsp;million visitors and defining Seattle as a city of innovation.&nbsp; Structural engineers contributed to this vision through the application of pioneering techniques in the design of the fair’s structures -- the Space Needle, the Washington State Coliseum (now Key Arena), the Monorail, the United States Science Pavilion (now Pacific Science Center), and other permanent and temporary structures. Their design and construction involved cutting-edge structural technology, challenging the fair’s designers to push the limits of contemporary structural design. The structures incorporated tension-cable roofs, pre-cast concrete, high-rise steel, thin-shell concrete -- all relatively new methods of building, offering new possibilities to the fair’s future-thinking design. By design, the buildings and structures expressed and supported the fair’s celebrations, while also creating a landmark urban center with an enduring role in the life of the city. &nbsp;</span></p><p data-dcnode-id="767"><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Structures of the Fair</span></strong></p><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Structural engineers collaborated with the architects in incorporating innovative concepts into the fair’s distinctive buildings.&nbsp;Their efforts impressed both fairgoers and armchair travelers who read about these achievements in popular and professional publications.&nbsp;</span></p><p data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">Harlan Edwards (1893-1975), Progress Engineer for the Century 21 Exposition, summarized these accomplishments in his introduction to </span><em data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Concrete Construction for the Century 21 Exposition</span></em><span data-dcnode-id="761" instrument_node="">, proceedings of the American Concrete Institute’s 15th&nbsp;Fall Convention held in Seattle on September 28 and 29, 1962. He emphasized the speed and economy of the building process as well as the beauty of simple lines, and the efficacy of structures free of interior supports:&nbsp;</span></p><blockquote data-dcnode-id="743"><span data-dcnode-id="759" instrument_node="">"Engineering and Architecture have combined their talents to create, in Seattle, history's finest World's Fair. &nbsp;Not only have its structures been built economically, in record time, but also with the aid of modern design and concrete technology, they have provided permanent, column-free areas at a fraction of the usual foundation loadings and costs. More than anything else, however, these World's Fair buildings have proved that beauty is not costly — that it only takes competent architectural imagination combined with ingenious engineering skills, modern materials and construction know-how — and that ugliness </span><em data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">per se</span></em><span data-dcnode-id="756" instrument_node=""> is not a necessary part of building economy.&nbsp;
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">"Here, in architecture as in people, beauty is characterized by simple, pleasing lines not embellished by costly ‘gingerbread.’ &nbsp;Witness the immediate popular acclaim of the Space Needle featuring the age-old graceful and simple sheaf, with a wide-brimmed hat above. Consider the Science Pavilion, a masterpiece of concrete design, technology and construction, termed by many fairgoers as ‘America's Taj Mahal.’</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">"Or the immense Coliseum with its massive structural frame and its unique roof suspension, or the delicate flower-like thin-shell structures, the straightforward Exhibition Hall with its long-span folded plate concrete roof, and the pre-stressed concrete parking structure that was not only built quickly, but provides effective service at a cost one-third less than usual.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="749" instrument_node="">"All these vividly illustrate our modern know-how, detailed further by those who did it" ("Concrete&nbsp;Construction for the Century 21 Exposition"</span><em data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">).</span></em><span data-dcnode-id="746" instrument_node="">&nbsp;</span></p><span data-dcnode-id="744" instrument_node="">
</span></blockquote><p data-dcnode-id="740"><strong data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">The Space Needle </span></strong></p><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">The John Graham Company developed and designed the Space Needle, with architects John Ridley (b. 1913) and Victor Steinbrueck (1911-1985) and with structural engineering services provided by the Pasadena-based firm of John K. Minasian (1913-2007) and by Harvey H. Dodd &amp; Associates, Seattle. Minasian had designed the structure for the Saturn rocket assembly gantry for NASA, establishing his knowledge of tower design. Gary Noble Curtis (b. 1913) worked with the Minasian firm at that time, and recalls the intensity of the 13-month schedule for its design and construction:&nbsp;</span></p><blockquote data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">"John [Minasian] would fly up and meet with John Graham’s office. He’d fly up [to Seattle] real early in the morning and spend all day with Al Fast [Alfred H. Fast (1917-2004), an architect with the Graham firm, Space Needle project manager] then catch a flight back to LA and a limo from there up to Pasadena. We’d be waiting for him at the office at 6 or 7 o’clock at night, and he’d have all the changes needed to the drawings, and we’d work until 10 or 11 on changes to the drawings. Then we’d print and get them into the post office by midnight and they’d be on the architect’s desk the next morning ... . At times we were detailing about 100 feet above the actual construction" (Structural Engineers Foundation of Washington).&nbsp;</span></blockquote><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Describing the challenges of preparing an adequate foundation for the towering Needle, Curtis notes: "They had to start digging a hole. It was on glacially compacted silt, the soil was like rock. We had a limited site like 150 feet square. So we clipped off the corners and made a Y-shape, and went down like 30 feet, and a 12-foot thick pad at the bottom, figured out the mass of this thing and what the overturning would be ... it’s pretty awesome ..." (Structural Engineers Foundation of Washington).</span></p><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">It took 467 cement trucks less than 12 hours to fill the foundation hole, which was 30 feet deep and 120 feet across, "the largest continuous concrete pour ever attempted in the West" (www.spaceneedle.com). The weight of the foundation is 5,850 tons, including 250 tons of rebar. The structure weighed 3,700 tons, with the center of gravity falling five feet above ground. It is bolted to the foundation with 72 30-foot-long bolts. The iconic structure sways one inch for every 10 mph of wind, and was build to withstand a wind velocity of 200 miles per hour. This doubled the 1962 building code specifications.</span></p><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">According to the construction firm, Howard S. Wright Construction Co., its earthquake resistance is twice that required by code, and its wind resistance allows it to tolerate gales over 150 miles per hour.</span></p><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Curtis said, "I’ve heard comments that there is a million more dollars of steel in the Needle than there needed to be, very well could have been. However, if the tower wasn’t done when the Fair opened, a million dollars (of a total construction cost of $4.5 million) was nothing" (Structural Engineers Foundation of Washington).</span></p><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">At the time of its construction, the Space Needle ranked as the tallest structure west of the Mississippi, at 605 feet -- edging out Seattle’s Smith Tower. On the occasion of its 37th birthday, April 21, 1999, Seattle's Landmarks Preservation Board named it an official City of Seattle Landmark. In its Report on Designation, the Landmarks Preservation Board wrote, ‘The Space Needle marks a point in history of the City of Seattle and represents American aspirations towards technological prowess. [It] embodies in its form and construction the era's belief in commerce, technology and progress’" (www.spaceneedle.com).</span></p><p data-dcnode-id="702"><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Washington State Coliseum</span></strong><span data-dcnode-id="723" instrument_node=""> </span><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">(Key Arena)</span></strong><br data-dcnode-id="720"><span data-dcnode-id="719" instrument_node=""> </span><br data-dcnode-id="718"><span data-dcnode-id="717" instrument_node=""> Engineer Peter H. Hostmark&nbsp; (d. 1969) worked with the fair's principal architect, Paul Thiry (1904-1993), in designing a 130,000-square-foot pavilion as a large clear span which housed exhibits including the World of Tomorrow accessed by a 28-foot ride on the Bubbleator. &nbsp;Thomas Kane, with Andersen Bjornstad Kane, served as a special advisor to contractor Howard S. Wright during the construction of the Coliseum, assisting with tensioning, ring beams, and cables.&nbsp; As Kane recalls, "Thiry’s concept was putting a tent over the whole fairgrounds &nbsp;... The Expo commission cut him down to size" (Structural Engineers Foundation of Washington).</span><br data-dcnode-id="716"><span data-dcnode-id="715" instrument_node=""> </span><br data-dcnode-id="714"><span data-dcnode-id="713" instrument_node=""> The </span><em data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Official Guide Book to the Seattle World's</span></em><span data-dcnode-id="710" instrument_node=""> Fair described the building's form: "In the shape of a hyperbolic paraboloid, it has no interior roof supports. Four massive concrete abutments support the building's roof, which is 110 feet or 11 stories high. The aluminum paneled roof is supported by steel compression trusses and nearly 6 miles of steel tension cables. It cost $4.5 million to build, and was paid for by the State of Washington, Department of Commerce and Economic Development" (</span><em data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Guide to the Fair</span></em><span data-dcnode-id="707" instrument_node="">, pp. 26-27). Thomas Kane said of the cable-suspended roof&nbsp;that it was "pretty unique at that time. There were very few structures using cable as the main roof suspension system.&nbsp; And there was very little in the code" (Structural Engineers Foundation of Washington).&nbsp;</span><br data-dcnode-id="706"><span data-dcnode-id="705" instrument_node=""> </span><br data-dcnode-id="704"><span data-dcnode-id="703" instrument_node=""> More recently there have been structural issues that have led to leaking, such as at the 1986 NBA game that was "rained out" -- the first-ever National Basketball Association rainout. Kane had this story:&nbsp;</span></p><blockquote data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">"We were about ready … to start running the tension on the main support cables, and one of our guys came up to me and said, ‘Have you seen the flashing detail on the aluminum ... roof panels? &nbsp;This thing has got to be up here for a long time. I don’t like it very well; as a matter of fact, I don’t like it all.’ So I took a look at it and I didn’t like it either. So I called Paul Thiry ... and said, ‘We’re just about ready to start more detail engineering on this project, and we’re just wondering if you wanted to take one more look at the flashing details on the panels.’&nbsp; He says, ‘Young man, we’ll take care of the architectural details. You handle the engineering.’ I said, ‘OK, Paul’" (Structural Engineers Foundation of Washington).</span></blockquote><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">According to B. Richal Smith (b. 1932), a Hostmark employee from 1961 to 1963, the Hostmark firm did the structural engineering on all the fair buildings designed by Paul Thiry, in the Coliseum vicinity (Smith conversation). These would include the International Commerce and Industry Buildings (now known as the Northwest Rooms) and the Sweden Pavilion (later the Northwest Craft Center).&nbsp;</span></p><p data-dcnode-id="695"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">The Seattle Monorail</span></strong></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">One of the most notable structures built for the fair was the Seattle Monorail, the train that ran back and forth above the street from the fairgrounds to downtown Seattle at Westlake.</span></p><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Johann Enderlein, a structural engineer with Alweg Rapid Transit Systems of Washington State, offered this prediction in 1962: &nbsp;&nbsp;</span></p><blockquote data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">"When Seattle opened the gates to America's Space Age World's Fair in April 1962, it did not limit its futuristic theme to the exposition grounds only. For the visitor may reach the Fair from the downtown center by taking one of the two fast and quiet trains of the Alweg Monorail. Operating high above the street level without regard to traffic lights on the road below, this monorail installation represents the first rapid transit facility of this kind on the American continent and may well become the mass transportation system of the future — a highly feasible solution to the ever increasing problem of disorganized commuter travel" ("Concrete&nbsp;Construction for the Century 21 Exposition</span><em data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">"</span></em><span data-dcnode-id="687" instrument_node="">).&nbsp;</span></blockquote><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">For the nation’s first full-scale commercial monorail system, the Alweg Rapid Transit Company designed the Monorail cars and built them in Germany, then shipped them from Bremen to New York for cross-country train shipment to Seattle. Engineer Einar Svensson worked with Alweg, and later relocated to the greater Seattle area with his Urbanaut firm, specializing in monorail design. The Washington structural engineering firm Anderson Birkeland Anderson (ABA, later BergerABAM) collaborated in the design of the concrete monorail beams, manufactured in Tacoma.</span></p><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Svensson observed that the train and the beam it rode on were two integral parts of the Alweg monorail. You couldn't separate them, and since the train was manufactured in Germany and the beam here, the beam had to be constructed to precisely fit the train.</span></p><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">According to Robert Mast, an early ABA employee and partner, the Howard S. Wright contract for the monorail was a design/build contract. Concrete Technology was a subcontractor to Howard S. Wright, and ABA was a subcontractor to Concrete Technology. Two brothers, Arthur Anderson (1910-1995) and Thomas Anderson (1912-2000) had two companies: one was ABA, which was the engineering company; the other was Concrete Technology, which was the fabricator of pre-stressed concrete beams. Svensson recalled, "I went down there [to Concrete Technology, in Tacoma] for an inspection in the plant, and they had me meet two cement workers. They had overalls on and big boots. I said, ‘I’m supposed to meet Dr. and Engineer Arthur and Thomas Anderson.’ They both stretched their hands out" (Structural Engineers Foundation of Washington).</span></p><p data-dcnode-id="674"><span data-dcnode-id="679" instrument_node="">Mast relates that Alweg's original design for the monorail's beam bearings used machine bronze, which were expensive and required tight tolerances. ABA developed an alternative using laminated pads and stainless steel. This was done working with bearings specialist E. Terry Dalton, of Lake Oswego, Oregon. Mast says, "I believe that was a new concept in 1960-61" (Structural Engineers Foundation of Washington).</span><br data-dcnode-id="678"><span data-dcnode-id="677" instrument_node=""> </span><br data-dcnode-id="676"><span data-dcnode-id="675" instrument_node=""> "At that time," notes Einar Svensson, "the Germans and French were far ahead [of the U.S.] in concrete technology, and … German codes were far more advanced.&nbsp; … &nbsp;I would say the codes were revised after this" (Structural Engineers Foundation of Washington).</span></p><p data-dcnode-id="665"><span data-dcnode-id="673" instrument_node="">The Monorail route required extensive curving and elevation changes of the beams. Every curve was unique. "It not like toy train track," said Mast, "where you have straight sections and curved sections. … Many of the beams might be half transition, half curved …. There were many people who said you could not pre-stress a curved beam.&nbsp; Some people said the tendons will try to straighten out and so the beam will try to straighten out; other people say the opposite: that the force of the tendons will make it bend more. But it turns out the tensile forces in the steel and the compressive forces in the concrete </span><em data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">balance </span></em><span data-dcnode-id="670" instrument_node="">each other.&nbsp; And the design of the curved beams was almost the same as for a straight beam -- except for the torsion" (Structural Engineers Foundation of Washington).</span><br data-dcnode-id="669"><span data-dcnode-id="668" instrument_node=""> </span><br data-dcnode-id="667"><span data-dcnode-id="666" instrument_node=""> Arthur Anderson details monorail design and construction in his article, “Pre-Stressed Concrete Girder Production for Seattle’s Monorail:&nbsp;</span></p><blockquote data-dcnode-id="656"><span data-dcnode-id="664" instrument_node="">"The mile-long monorail connecting Seattle's business district with the World's Fair site consists of two lines of pre-stressed concrete hollow box girders 35-1/2-in. wide and 59 in. deep.&nbsp;
</span><p data-dcnode-id="658"><span data-dcnode-id="663" instrument_node="">"Two girder types were produced — straight sections, 82 in number; and curved sections, 60 in number. The straight girders had a maximum span of 90 feet, and an average span 85 feet. The longest girder weighs approximately 60 tons. The straight girder section … is pre-stressed by a combination of pre-tensioned straight tendons and post-tensioned draped tendons.&nbsp; All tendons consist of seven-wire stress-relieved strand with a tensile strength of 250,000 psi. …</span><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node=""> </span><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node=""> "All curved girders had solid ends, and the hollow box sections were formed by plywood cores which remain in the girders.&nbsp; The plywood cores were rigidly held by the reinforcing steel cage which was prefabricated and welded as a complete assembly" (Concrete&nbsp;Construction for the Century 21 Exposition).&nbsp;</span></p><span data-dcnode-id="657" instrument_node="">
</span></blockquote><p data-dcnode-id="645"><span data-dcnode-id="655" instrument_node="">Construction of the Monorail system and stations took place over a 10-month period, at a cost of $3.5 million. The Monorail opened to the public on March 24, 1962.</span><br data-dcnode-id="654"><span data-dcnode-id="653" instrument_node=""> </span><br data-dcnode-id="652"><span data-dcnode-id="651" instrument_node=""> </span><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">United States Science Pavilion</span></strong><span data-dcnode-id="648" instrument_node=""> </span><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">(Pacific Science Center) </span></strong></p><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Architect Minoru Yamasaki (1912-1986), working in collaboration with Naramore, Bain, Brady &amp; Johanson (later NBBJ) of Seattle, designed the complex of buildings originally known as the United States Science Pavilion, with structural engineering services provided by the Seattle firm of Worthington, Skilling, Helle &amp; Jackson. John Skilling (1921-1998) and John V. "Jack" Christiansen (1927-2017) joined others on the Pavilion design team. Norman G. Jacobson Jr. (1927-2015) and his firm did the form work. The buildings were constructed&nbsp;for the federal General Services Administration and they housed the government's science exhibit as well as the Boeing Spaceareum.</span></p><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Much of the work took advantage of a relatively new technique for handling concrete -- pre-stressed concrete, which had emerged in structural engineering in the 1950s. Concrete by itself is strong in compression (when pressed down upon) and weak in tension (when pulled apart). Pre-stressed concrete is concrete within which reinforcing steel bars (rebar) are stretched and anchored in order to increase the concrete's resistance to stress. Jack Christiansen called pre-stressed concrete "a wonderful technique that overcomes many of the drawbacks that come with concrete construction. … I had developed a great interest in thin shell concrete…. The whole thing is pre-stressed pre-cast concrete. … It’s a hexagonal shape, hyperbolic paraboloid shells, those are probably one and a half inches thick" (Structural Engineers Foundation of Washington).</span></p><p data-dcnode-id="636"><span data-dcnode-id="640" instrument_node="">John L. Hutsell, with Associated Sand &amp; Gravel, explained (in 1962) "This exhibit complex is, in actuality, an interconnecting group of six different buildings all constructed of decorative precast, pre-stressed concrete and erected upon cast-on-site footings and substructures. The decision to utilize precast concrete was based upon several requirements: first, the time limits for construction nearly precluded conventional methods; secondly, the quality and beauty desired and the extremely critical design of the long, thin-shell wall sections made the degree of control that can only be achieved in plant work a necessity" ("Concrete&nbsp;Construction for the Century 21 Exposition"</span><em data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">)</span></em><span data-dcnode-id="637" instrument_node="">.</span></p><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">As engineer John Skilling was reviewing the project drawings with architects Minoru Yamasaki and Naramore, Bain, Brady, and Johanson, he noted that the columns supporting the Pavilion’s geometric domes seemed "a bit chunky." He said, "I can make those columns thinner"("Skilling, John B. (1921-1998)"). And so he did.</span></p><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Christiansen later recalled an exchange with architect Yamasaki about the design of the Pavilion’s signature arches:</span></p><p data-dcnode-id="630" style="padding-left: 30px;"><span data-dcnode-id="631" instrument_node="">"I was working on the job and he came to the office and I was sitting there working on the towers … and that latticework at the top. And I looked at the latticework and I said ‘we don’t need all these members.’ So I was drawing it up, taking out the members that we didn’t really need. He walked down the aisle, and he stopped and he said ‘that’s not right … put all that back in.’ &nbsp;So I put it back in" (Structural Engineers Foundation of Washington).</span></p><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">The contract for the precast panels went to Associated Sand and Gravel. It was worth over a million dollars, the&nbsp;larger precast contract up to that time. The firm cast 500 panels for the Science Pavilion in just over five months.</span></p><p data-dcnode-id="621"><span data-dcnode-id="627" instrument_node="">Christiansen noted that if you look at the buildings today, "they are in&nbsp;remarkably good condition. Keep in mind they are very thin sections -- three inches thick. &nbsp;And you’d be hard pressed to find a crack in there" (Structural Engineers Foundation of Washington). </span><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node=""> </span><strong data-dcnode-id="622"><br data-dcnode-id="624"><span data-dcnode-id="623" instrument_node=""> Seattle Center Complex</span></strong></p><p data-dcnode-id="616"><span data-dcnode-id="620" instrument_node="">The Seattle Center Complex comprises the Exhibition Hall, Playhouse (later Intiman Theatre), and the Mercer Street parking garage.</span><strong data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="617" instrument_node="">The Seattle-based firm of Kirk, Wallace, McKinley &amp; Associates provided architectural services for this complex of exposition buildings along and spanning Mercer Street. The structural engineering firm of Worthington, Skilling, Helle and Jackson provided services for the Exhibition Hall and Playhouse, and Norman G. Jacobson &amp; Associates, Structural Engineers for the Parking Garage.&nbsp;</span></p><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">The Exhibition Hall included a folded plate retaining wall along Mercer Street. "It's flower-like," Jack Christiansen said. "My design just came out of the mathematics of the shape" (Structural Engineers Foundation of Washington).&nbsp;</span></p><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Norman Jacobson detailed the design and construction: "Cost of the garage, including professional fees, taxes, supervision and inspection, two elevators, a 150-foot pedestrian overpass, automatic gates, ultra-sonic vehicle counters, landscaping, intercommunication equipment, washdown lines and exterior &nbsp;signs, etc., amounts to approximately $1,650,000, which breaks down to $3.46 per square foot, or $1,095 per car" ("Concrete Construction for the Century 21 Exposition"). Jacobson presented “Seattle Center Self-Parking Facility” at the 15th Fall Convention of the American Concrete Institute held in Seattle on September 28-29, 1962.</span></p><p data-dcnode-id="602"><strong data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Opera House</span></strong><span data-dcnode-id="609" instrument_node=""> </span><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">(McCaw Hall)</span></strong><br data-dcnode-id="606"><span data-dcnode-id="605" instrument_node=""> </span><br data-dcnode-id="604"><span data-dcnode-id="603" instrument_node=""> Architect James J. Chiarelli (1909-1990), in consultation with architect/theater designer B. Marcus Priteca (1889-1971), oversaw the gutting of the Civic Auditorium and Ice Arena and the design in its place of the Opera House with its modern brick façade. The firm of Worthington, Skilling, Helle and Jackson performed the structural engineering for this project.</span></p><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Christiansen wrote in 1962: "The conversion of the old Seattle Civic Auditorium into a modern 3,100-seat Concert Convention Hall and Opera House involved considerable structural work. The stage was deepened 28 feet and the existing gridiron was raised and enlarged. The existing 200’ span trusses were modified and the bottom chords were raised 10 feet. The main floor was changed to a parabolic bowl by the addition of dwarf walls and a light-weight concrete slab. Two parabolic balconies were added with the upper balcony carried by a 110' span, post-tensioned concrete girder. The exterior of the building was enclosed by a 60' high brick wall" ("Concrete Construction of the Century 21 Exposition").</span></p><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Lester "Les" Robertson (b. 1926) worked with the firm on the design of the Opera House (as well as the Science Pavilion). He recalled, "I worked closely with B. Marcus Priteca ... . Benny had converted many of the old vaudeville theaters to movie houses. For Seattle, on the basis that the access to the fly gallery was too dangerous, he wanted to put an elevator up to the loft. Over a wager, I climbed the shear concrete wall to the fly gallery ... and he gave up on the elevator" (Hall of Fame). (Note: the fly gallery is a raised platform to the side of the stage that holds ropes and pulleys and other equipment for moving props and scenery. &nbsp;A stagehand stationed on the fly gallery works the ropes.)</span></p><p data-dcnode-id="595"><strong data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Home of Living Light</span></strong></p><p data-dcnode-id="590"><span data-dcnode-id="594" instrument_node="">This was a home constructed of plywood, a project commissioned by the Douglas Fir Plywood Association to demonstrate the possibilities of new plywood products. Plywood consists of thin sheets of wood glued together with the grain of alternating sheets running in opposite directions. Se</span><em data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">attle Times </span></em><span data-dcnode-id="591" instrument_node="">reporter Alice Staples described a tour through the Home of Living Light as "a trip into the future" ("Future Seen in Plywood Home").&nbsp;</span></p><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">The house, designed to let in lots of light but also to enable the control of both light and air, consisted of a series of circles -- circular rooms surrounding an atrium entry court complete with pool and garden. The rooms could be accessed via the entry court and each had its own patio with an exterior entryway. This house of the future broke tradition with the square, and was planned to "eliminate today's conventional stud wall-framing, and permits the curves themselves to carry the roof load" ("Future Seen in Plywood Home"). Incidentally, the furnished home included bedding and dressing gowns made of paper-plus-nylon, designed to be disposable and thus eliminating the chore of laundry. (The exposition took place before the future in which sustainability became an issue.)</span></p><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">The Home of Living Light was a temporary structure. The architect was&nbsp;Alan Liddle&nbsp;(1922-2009) of Liddle and Jones, Tacoma.&nbsp;Engineer Fred Pneuman, with the Douglas Fir Plywood Association, worked on it. The lighting design was done by architect Edmund J. Schrang and consultant Kaye Leighton.</span></p><p data-dcnode-id="575"><span data-dcnode-id="585" instrument_node="">At the time, engineered wood products had begun to replace traditional wood materials.&nbsp; As Pneuman remembers it, “Everything in there was plywood.&nbsp; …&nbsp; It was designed to get light in. I think there was one six-foot straight wall. A lot of people came through that place.&nbsp; … It turned into a restaurant in Olympia … burned down in 1967.”</span><br data-dcnode-id="584"><span data-dcnode-id="583" instrument_node=""> </span><strong data-dcnode-id="580"><br data-dcnode-id="582"><span data-dcnode-id="581" instrument_node=""> Pavilion of Electric Power/Hydro-Electric Utilities Exhibit</span></strong><br data-dcnode-id="579"><span data-dcnode-id="578" instrument_node=""> </span><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node=""> The Pavilion of Electric Power, a temporary structure designed by engineer Harvey H. Johnson (1915-2012), featured a spiral-shaped viewing platform overlooking a 40-foot-tall shell that simulated a dam. Three thousand gallons of water per minute flowed over the spillway into a large pond at the base.</span></p><p data-dcnode-id="564"><span data-dcnode-id="574" instrument_node="">The pond featured a map that pinpointed the location of dams in Washington state. People enjoyed throwing coins into the pool, and one attendant, Jack McCarthy, said, "But I wish they'd throw straighter. They're hitting the Washington map with four-bit pieces and knocking out the neon tubes" (</span><em data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">The Seattle Times</span></em><span data-dcnode-id="571" instrument_node="">, April 29, 1962).</span><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node=""> </span><br data-dcnode-id="568"><span data-dcnode-id="567" instrument_node=""> </span><strong data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">The Aquadrome </span></strong></p><p data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">The Aquadrome was a circular water course, a concrete tank that traced the outer rim of the stadium floor. It was four feet deep, 26 feet wide, and went 330 feet around. The tank contained 700,000 gallons of water and the structure provided two bridges so that persons and animals could get across this indoor moat to the center of the stadium. An anticipatory article in </span><em data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">The Seattle Times</span></em><span data-dcnode-id="560" instrument_node="">&nbsp;noted that the Aquadrome would feature "high-speed water skiing, ski-jumps from floating platforms, gymnastics, human pyramids, barefoot water skiing, and costumed production numbers" (Stanton H. Patty). There were two shows a day.</span></p><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">The firm of Andersen Bjornstad Kane designed the Aquadrome circular water ski exhibit and the Howard S. Wright Construction Co. built it. Trygve Bjornstad (1913-2000) told friends that "the hardest part was getting the damned elephants onto the center island" -- a circus performance area (Hall of Fame).&nbsp;His design incorporated a special bridge for the reluctant animals.</span></p><p data-dcnode-id="554"><strong data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">A Structural Failure: the East Gate</span></strong></p><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">On February 26, 1962, at 2:10 in the afternoon, the World's Fair's recently completed East Gate collapsed. This was a 60-foot-high, five-ply laminated-wood structure. “The ... structure had been standing free of its scaffolding since Thursday, said Dale Yount, foreman. Three men [carpenters cleaning out debris under the structure] had been standing under the entrance when it collapsed, but saw it weaving and rushed out of the way" ("World's Fair East Gate Collapses").&nbsp; &nbsp;</span></p><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Architect Fred Bassetti (1917-2013) recollected his work on this structure with engineer Christiansen of Worthington, Skilling, Helle and Jackson: "At the time of its construction, my office looked out over this structure, and I kept an eye on it. On Monday morning I walked over and looked out the window, and it was all on the ground, a broken bird. It had three beams crossing diagonally -- a parabolic arch. There had been only a mild wind that weekend. I called Jack [Christiansen] and he and I went over to take a look. We’d had ongoing conversations with the contractor about screws vs. staples vs. glue. The contractor said staples would do the job ten times as fast as wood screws, but you’d better use twice as many staples. They also tested the glue, but they didn’t test the combination of glue and staples. It turned out that the staples didn’t hold the three layers together beyond about 5 percent of the surface, so the glue didn’t hold. The engineer and the contractor and the owner settled up the $150,000 in damages" (Bassetti conversation).</span></p><p data-dcnode-id="547"><strong data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Publications about the Structures</span></strong></p><p data-dcnode-id="542"><span data-dcnode-id="546" instrument_node="">There were several notable publications that praised and discussed the structures at the fair. The American Concrete Institute's publication of proceedings from its 1962 Fall Meeting held September 28-29 in Seattle, titled </span><em data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Concrete Construction for the Century 21 Exposition,</span></em><span data-dcnode-id="543" instrument_node="">&nbsp;included "Casting Curved Prestressed Monorail Beam," by&nbsp;Arthur Anderson,&nbsp;"Prestressing the Coliseum Ring Girder" by Peter H. Hostmark, "Seattle Center Self-Parking Facility" by Norman G. Jacobson Jr., and "Post-tensioned Folded Plate Roofs" by Jack Christiansen.&nbsp;</span></p><p data-dcnode-id="533"><em data-dcnode-id="540" style="font-family: Arial;"><span data-dcnode-id="541" instrument_node="">C</span></em><em data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">ivil Engineering</span></em><span data-dcnode-id="537" instrument_node=""> magazine's February 1962 edition featured "Seattle's New Kind of World's Fair," by Harlan Edwards.&nbsp;</span><em data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Modern Steel Construction</span></em><span data-dcnode-id="534" instrument_node="">'s January 1962 edition featured a cover shot of the Space Needle and "Step into the Next Century: For a Big Problem of Man in the Space Age, Structural Steel Provides Down-to -Earth Answers."</span></p><p data-dcnode-id="526"><strong data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">A Heritage of Structural Innovation</span></strong><br data-dcnode-id="530"><span data-dcnode-id="529" instrument_node=""> </span><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node=""> Individually and cumulatively, the structures of the Century 21 Seattle World's Fair offered visitors a vision of the future and the impression that design technology as advanced by architects and engineers can drive transformations in human behavior and aspirations.</span></p><p data-dcnode-id="521"><span data-dcnode-id="525" instrument_node="">During the 50th anniversary of the exposition, the Structural Engineers Foundation of Washington assembled nine structural engineers who had taken part in the design of fair buildings and had observed the design, construction, and operation of these structures. The foundation recorded the recollections and observations of Richard Chauner (b. 1929), Jack Christiansen, Gary Noble Curtis (b. 1937), Victor O. Gray (1926-2016), Norman Jacobson, Thomas Kane (1927-2012), Robert Mast (b. 1934), Fred Pneuman (b. 1931), and Einar Svensson (b. 1926). The documentary film&nbsp;made of their reminiscences, titled&nbsp;</span><em data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Structural Engineers of the Seattle 1962 World’s Fair&nbsp;</span></em><span data-dcnode-id="522" instrument_node="">(May 2012 recording, May 2013 release)&nbsp;help preserve a record of the visionary ideas and technology introduced at the fair.&nbsp;</span></p><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">The Seattle Center's 50th&nbsp;anniversary observances of the Century 21 Exposition in 2012 reasserted these possibilities, yet to unfold for future generations.</span></p></article><span data-dcnode-id="517" instrument_node="">
