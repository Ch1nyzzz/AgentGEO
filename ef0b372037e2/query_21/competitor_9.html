</span><article class="post-4950 post type-post status-publish format-standard hentry category-nato category-russia category-ukraine" data-dcnode-id="2929" id="post-4950"><span data-dcnode-id="3184" instrument_node="">
</span><div class="posted-meta" data-dcnode-id="3170"><span data-dcnode-id="3183" instrument_node="">
</span><div class="date-meta" data-dcnode-id="3178"><span data-dcnode-id="3182" instrument_node="">
</span><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/2022/03/10/this-war-is-perfect-for-the-us-and-uk-thats-why-they-goaded-russia-into-waging-it/" rel="bookmark"><span data-dcnode-id="3181" instrument_node="">03.10.22</span></a><span data-dcnode-id="3179" instrument_node="">

        	by </span><a class="url fn n" data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/author/danglazebrook2000/" rel="author" title="View all posts by G"><span data-dcnode-id="3175" instrument_node="">G</span></a><span data-dcnode-id="3173" instrument_node=""> </span></div><span data-dcnode-id="3171" instrument_node="">
</span></div><span data-dcnode-id="3168" instrument_node="">
</span><header class="entry-header" data-dcnode-id="3162"><span data-dcnode-id="3167" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3164"><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/2022/03/10/this-war-is-perfect-for-the-us-and-uk-thats-why-they-goaded-russia-into-waging-it/" rel="bookmark"><span data-dcnode-id="3166" instrument_node="">This war is perfect for the US and UK. That’s why they goaded Russia into waging&nbsp;it.</span></a></h1><span data-dcnode-id="3163" instrument_node="">
</span></header><span data-dcnode-id="3160" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2962"><span data-dcnode-id="3159" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3154"><a data-dcnode-id="3157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrookdotcom.files.wordpress.com/2022/03/image.png"><img alt="" class="wp-image-4952" data-attachment-id="4952" data-comments-opened="1" data-dcnode-id="3158" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image" data-large-file="https://danglazebrookdotcom.files.wordpress.com/2022/03/image.png?w=585" data-medium-file="https://danglazebrookdotcom.files.wordpress.com/2022/03/image.png?w=300" data-orig-file="https://danglazebrookdotcom.files.wordpress.com/2022/03/image.png" data-orig-size="840,488" data-permalink="https://danglazebrook.com/image-3/" sizes="(max-width: 840px) 100vw, 840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrookdotcom.files.wordpress.com/2022/03/image.png%3Fw%3D840&amp;raw" srcset="https://danglazebrookdotcom.files.wordpress.com/2022/03/image.png 840w, https://danglazebrookdotcom.files.wordpress.com/2022/03/image.png?w=150 150w, https://danglazebrookdotcom.files.wordpress.com/2022/03/image.png?w=300 300w, https://danglazebrookdotcom.files.wordpress.com/2022/03/image.png?w=768 768w"></a><figcaption data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">Zbigniew Brzezinski</span></figcaption></figure><span data-dcnode-id="3153" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3150"><em data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">Russia has been baited into a repeat of the Afghan Trap: first time as tragedy, second time as sickening farce.</span></em></p><span data-dcnode-id="3149" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">The term ‘bait and bleed’ was defined by International Relations theorist John Mearsheimer in 2001 as a military strategy that “involves causing two rivals to engage in a protracted war, so that they bleed each other white, while the baiter remains on the sideline, its military strength intact.”&nbsp;</span></p><span data-dcnode-id="3146" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3141"><span data-dcnode-id="3145" instrument_node="">The current </span><a data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dod.defense.gov/Portals/1/Documents/pubs/2018-National-Defense-Strategy-Summary.pdf"><span data-dcnode-id="3144" instrument_node="">National Defence Strategy</span></a><span data-dcnode-id="3142" instrument_node=""> (NDS) of the USA explicitly endorses such a strategy, and it makes no bones about who it is aimed at. The NDS, authored by then Secretary of Defence James Mattis in 2018, describes itself as “a clear road map for the Department of Defense to meet the challenges posed by a re-emergence of long-term strategic competition with China and Russia,” adding that “interstate strategic competition, not terrorism, is now the primary concern in US national security.” On p.5 of the summary document, under the heading “strategic approach,” the NDS vows that “with our allies and partners, we will challenge competitors by maneuvering them into unfavorable positions, frustrating their efforts, precluding their options while expanding our own, and forcing them to confront conflict under adverse conditions.” There it is, in black and white: it is official US policy to bait Russia into conflict.&nbsp;</span></p><span data-dcnode-id="3140" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3135"><span data-dcnode-id="3139" instrument_node="">The US certainly has form in this regard. Until 1998, the mainstream view of US support for the anti-communist insurgency in Afghanistan throughout the 1980s was that it had been a response to the Russian invasion of December 1979. But in an </span><a data-dcnode-id="3137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dgibbs.faculty.arizona.edu/brzezinski_interview"><span data-dcnode-id="3138" instrument_node="">interview in 1998</span></a><span data-dcnode-id="3136" instrument_node="">, Zbigniew Brzezinski, National Security Advisor to US President Jimmy Carter, admitted that the truth was the exact opposite. In fact “it was July 3, 1979 that President Carter signed the first directive for secret aid to the opponents of the pro-Soviet regime in Kabul. And that very day, I wrote a note to the president in which I explained to him that in my opinion this aid was going to induce a Soviet military intervention…The day that the Soviets officially crossed the border, I wrote to President Carter, essentially: ‘We now have the opportunity of giving to the USSR its Vietnam war.’ Indeed, for almost 10 years, Moscow had to carry on a war that was unsustainable for the regime, a conflict that brought about the demoralization and finally the breakup of the Soviet empire.” Asked whether he regretted the move, which plunged Afghanistan into a conflict which is now into its fifth decade, he replied “Regret what? That secret operation was an excellent idea. It had the effect of drawing the Russians into the Afghan trap and you want me to regret it?” Plunging the Afghan people into a half century of devastating war was of no consequence for the likes of Brzezinski. His successors clearly have the same attitude towards Ukraine.&nbsp;</span></p><span data-dcnode-id="3134" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3129"><span data-dcnode-id="3133" instrument_node="">In a widely viewed 2015 </span><a data-dcnode-id="3131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DJrMiSQAGOS4"><span data-dcnode-id="3132" instrument_node="">lecture on Ukraine</span></a><span data-dcnode-id="3130" instrument_node="">, Mearsheimer noted that “If you really want to wreck Russia, what you really want to do is encourage Russia to conquer Ukraine.” The US and the UK – the latter in particular – appear to have been taking this advice very seriously.&nbsp;</span></p><span data-dcnode-id="3128" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3123"><span data-dcnode-id="3127" instrument_node="">NATO’s expansion into the former Soviet ‘sphere of influence,’ beginning with Bill Clinton in 1997, has always been recklessly provocative, as widely noted even way back then. A widely circulated </span><a data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.armscontrol.org/act/1997-06/arms-control-today/opposition-nato-expansion"><span data-dcnode-id="3126" instrument_node="">letter </span></a><span data-dcnode-id="3124" instrument_node="">by fifty leading academics, diplomats and retired military officers called the move a “policy error of historic proportions” which will “unsettle European stability” and “ultimately diminish the sense of security of those countries which are not included.” Even George Kennan, whose ‘long telegram’ in 1946 is viewed as a founding document of the post-WW2 strategy of Soviet containment, warned that NATO expansion eastwards would result in “a new Cold War, probably ending in a hot one.” Each round of NATO enlargement deepened Russia’s suspicions, but it was the Bucharest agreement of 2008 that really ratcheted up the tension. The US and UK had been pushing for Ukraine and Georgia to join NATO as soon as possible, but France and Germany resisted the move, viewing it as gratuitously provocative. Russia had, after all, been invaded three times via its western border during the previous century, the most recent, well within living memory, costing it an unfathomable 27 million lives. The prospect of Ukraine joining NATO – that is, becoming a giant military base for Britain, Germany and the US, the very countries that had built up and unleashed the fascist war machine in the 1930s – was understandably considered a red line, given Ukraine’s 2000km land border with Russia, penetrating deep into its territory. The compromise, if you can call it that, was an agreement that Ukraine (along with Georgia) would not join NATO immediately but definitely would do so in the future. Georgia’s government took this as a green light to make moves against Russian interests there, and got a shock when NATO support was not, after all, forthcoming against Putin’s predictable response. Following that episode, wrote Richard Sakwa, “British foreign secretary David Miliband visited Kiev and pledged Britain’s support, dooming the country to become the next epicentre of the artificially constructed struggle for mastery in Europe.”&nbsp;</span></p><span data-dcnode-id="3122" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3114"><span data-dcnode-id="3121" instrument_node="">Russia’s concerns were allayed for a time during the period 2010-14, during the presidency of Yanokovych, whose mandate was to keep Ukraine neutral – militarily allied to neither Russia nor the west, but with good diplomatic and trade relations with both. Unfortunately this policy was thrown into reverse following the 2014 coup, egged on (and immediately recognised) by the US and UK, and carried out with neo-Nazi paramilitaries as the vanguard force. Following an unsuccessful attempt to impose the writ of the coup regime on the Russian-speaking east of the country, those paramilitaries were, under US prodding, integrated into a new ‘National Guard’ which has been the spearhead of the war effort ever since, at the cost of 14,000 lives. Following the coup, noted Professor Sakwa, and “as if to rub salt into the wounds, NATO staged the Rapid Trident military exercise on Ukrainian territory on 15-16 September” of that year, a war gaming </span><a data-dcnode-id="3119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.army.mil/article/133762/rapid_trident_2014_begins_in_ukraine"><span data-dcnode-id="3120" instrument_node="">exercise</span></a><span data-dcnode-id="3118" instrument_node=""> involving fifteen countries “designed to enhance interoperability with allied and partner nations.” Since then, plans for NATO incorporation have proceeded apace. A </span><a data-dcnode-id="3116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//researchbriefings.files.parliament.uk/documents/SN07135/SN07135.pdf"><span data-dcnode-id="3117" instrument_node="">British government document </span></a><span data-dcnode-id="3115" instrument_node="">listing British support for the Ukrainian military outlines these plans in detail. In 2016, NATO outlined its Comprehensive Assistance Package of 16 “capacity building programmes and several trust funds” for military modernisation, whilst “NATO allies also participate in a wide range of military exercises with Ukrainian armed forces through the Military Committee with Ukraine Work Plan.”&nbsp;</span></p><span data-dcnode-id="3113" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3108"><span data-dcnode-id="3112" instrument_node="">&nbsp; But it was in June 2020 that this process was really ramped up, when Ukraine was offered “Enhanced Opportunity Partner status” with NATO.&nbsp; Notes the British document, “this status provides Ukraine with preferential access to NATO’s exercises, training and exchange of information and situational awareness, in order to increase interoperability. In September 2020 Ukraine hosted Exercise Joint Endeavour, with British, US and Canadian troops.” This was “the first exercise conducted under Ukraine’s new enhanced status,” but far from the last, with </span><a data-dcnode-id="3110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//economictimes.indiatimes.com/news/defence/ukraine-to-hold-10-large-international-military-drills-in-2022/articleshow/87999803.cms"><span data-dcnode-id="3111" instrument_node="">another ten planned</span></a><span data-dcnode-id="3109" instrument_node="">, involving tens of thousands of NATO troops, for 2022 alone.&nbsp;</span></p><span data-dcnode-id="3107" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">If Russia was going to enforce its red line, time was fast running out. From spring 2021, it began a counter-provocation of its own, building up a huge armed presence on the Ukrainian border, in what was widely interpreted as a show of strength to scare Ukraine into backing down from this suicidal course. Mearsheimer’s warning in 2015 that “the West is leading Ukraine down the primrose path and Ukraine is going to get wrecked” looked ever more ominous.&nbsp;</span></p><span data-dcnode-id="3104" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">This cycle of provocation and counter-provocation continued throughout the year. In June 2021, Britain sent HMS Defender, part of its Carrier Strike Group’s Indo-Pacific mission, into the Black Sea “in a show of solidarity with Ukraine and regional NATO allies.” This sabre-rattling agitprop was presumably intended to fool Ukraine into thinking this equipment might actually be used in the event of a showdown with Russia, and that they should therefore press on with NATO membership safe in the knowledge that Britain would bring its full force to bear should it trigger a reaction. It was an intentionally misleading and irresponsible message; but, for years now, and as Mearsheimer had noted, “What we’re doing is encouraging the Ukrainians to play tough with the Russians.”&nbsp;</span></p><span data-dcnode-id="3101" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Even the EU, which, notes the British document, has traditionally left “military reform” as an issue for “NATO and bilateral cooperation,” joined in the Russia-baiting. In December 2021 it announced a new militarist turn, with “a package of measures to help strengthen the capacity of the Ukrainian armed forces,” worth €31million. US, UK and the EU were united, it seemed, in sending a clear message to the Russians: ‘we’re gonna build up a massive military force on your doorstep, you losers, and there’s nothing you can do about it’. Such wilful humiliation can only be aimed at one thing: triggering a response.&nbsp;</span></p><span data-dcnode-id="3098" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3090"><span data-dcnode-id="3097" instrument_node="">But the militarisation of Ukraine was only one part of the ‘bait and bleed’ strategy. Alongside the goading to invade came, in November 2021, a more or less open invitation to do so. In a sharp reversal of the message sent by the HMS Defender visit in June – that Britain would ‘have Ukraine’s back’ in the event of war – came the opposite signal – that NATO would </span><em data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">not </span></em><span data-dcnode-id="3094" instrument_node="">defend their plucky new partner should Russia choose to invade. Reported </span><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2021-11-30/u-k-to-russia-a-ukraine-incursion-would-be-strategic-mistake"><span data-dcnode-id="3093" instrument_node="">Bloomberg</span></a><span data-dcnode-id="3091" instrument_node=""> on the 30th November 2021, “President Vladimir Putin warned the West not to cross the Kremlin’s security “red line” as the U.S. and the U.K. said any Russian incursion into Ukraine would trigger serious diplomatic and economic responses.” Serious diplomatic and economic responses means, of course,&nbsp; zero military consequences. Moscow was being told openly that, should they choose to settle the issue by force, the only response from the west would be “diplomatic and economic,” that is to say – not military. At a stroke, US and UK statements had undermined NATO chief Jans Stolzenberg’s attempts to leave a military option on the table. Whilst NATO had no Article Five obligation to militarily defend Ukraine, Stolzenberg had been attempting to deter a Russian invasion by leaving its potential response ambiguous; when asked by reporters whether he ruled out a military intervention by NATO in the event of Russian incursions, his reply was “We have different options,” referring to “the fact that we have increased our presence here, in the region, both in the Black Sea region and in the Baltic region, in the air, on land and at sea.” That ambiguity was ended by the USUK guarantee that they would not militarily oppose a Russian invasion. Russia was being simultaneously goaded into conducting an invasion and openly invited to do so. The trap was set.&nbsp;</span></p><span data-dcnode-id="3089" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3084"><span data-dcnode-id="3088" instrument_node="">From the moment that invitation was issued, the character of the Russian troop buildup began to change. What started off in spring as a show of strength, designed to coerce Ukraine into respecting its security needs, began to look like something very different. Noted </span><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecfr.eu/article/russias-military-movements-what-they-could-mean-for-ukraine-europe-and-nato/"><span data-dcnode-id="3087" instrument_node="">Gustav Gressel</span></a><span data-dcnode-id="3085" instrument_node=""> at the time, “Compared to the situation in March and April 2021, when it last moved troops close to the Ukrainian border, Russia seems to be making much less effort to ensure the current assembly is visible. This may hint towards a significantly more serious intention than simply a wish to appear threatening.”</span></p><span data-dcnode-id="3083" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3078"><span data-dcnode-id="3082" instrument_node="">Nevertheless, </span><a data-dcnode-id="3080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.euronews.com/my-europe/2021/11/24/russia-s-military-build-up-near-ukraine-is-different-this-time-say-experts"><span data-dcnode-id="3081" instrument_node="">noted</span></a><span data-dcnode-id="3079" instrument_node=""> strategic analyst and former Ukrainian Defence Minister Andriy Zagorodnyuk, “The fact that they’re getting ready [for an invasion] does not mean that they will start it.” Rather, he suggested, the objective&nbsp; might still have been to apply pressure for a negotiated settlement that meets Russia’s security needs. Indeed, concurrent with its buildup, Russia continued to push hard on the diplomatic front. Putin began by reminding the world that, as far as the expansion of western&nbsp; military infrastructure into Ukraine goes, “This creation of such threats for us is the red line,” before on 17th December, laying his demands for de-escalating tensions with NATO: the ruling out of NATO membership for Ukraine, NATO forces to return to their 1997 positions, no new NATO members and an end to NATO drills in countries bordering Russia. These were simply dismissed and derided by the US. Putin’s basic error was to attempt to use as leverage the threat of the very thing US planners were attempting to goad him to do in the first place – invading Ukraine.&nbsp;</span></p><span data-dcnode-id="3077" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">From that point on, it was a simple matter of calling his bluff. USUK ‘intelligence’ and media playing up of the co-called ‘planned invasion’ only added to the pressure on Putin to follow through, ensuring the world’s attention would be entirely focused on the humiliation of any ‘climbdown.’&nbsp;</span></p><span data-dcnode-id="3074" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Right up to the last minute,&nbsp; despite the west’s ‘warnings’, many were convinced that such a climbdown was on the cards, myself included. The danger it held, of course, was that USUK and the Ukrainian National Guard would take full advantage of this moment of Russian ‘weakness’ to launch a major military escalation in the Donbass, attempting to finally impose the military solution they had been denied for the past eight years, before moving to finalise Ukraine’s integration into NATO in short order. Literally hours before Putin’s announcement of a ‘special military operation’ on February 21st, I posted the following message on a political discussion forum, in a response to a question about whether Russia would invade: “Putin is not gonna do it. He blinked and now NATO and their fascist mercenaries are taking full advantage. This is the beginning of the end for Putin and the start of a devastating war to retake the Donbass.” in hindsight, however, that was simply not an option Putin was willing to accept. He would risk everything – and everybody – rather than accept humiliation and defeat. As Patrick Cockburn put it, “For Putin, having gone as far as he had, the choice was starkly posed between escalation and capitulation. It was at this point that method turned into madness, and the murderous, strategically disastrous Russian land invasion of Ukraine began.” And madness it was – as Richard Sakwa had pointed out in 2016, Putin “was well aware that the US had lured the Soviet Union into the Afghan quagmire, precipitating its collapse” and was “well aware of the dangers of being sucked into a war over Ukraine, which would be unwinnable and disastrous.” The US and UK had achieved what once had seemed impossible – goading Russia into a battlefield on which they could be crucified. They had been baited. Now they would be bled.&nbsp;</span></p><span data-dcnode-id="3071" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3063"><span data-dcnode-id="3070" instrument_node="">The UK, in particular, had been preparing for this war for years. Even whilst Obama had banned lethal military aid to Ukraine (a ban overturned by Trump in 2018), Britain was running a military training programme for Ukraine called “</span><a data-dcnode-id="3068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//researchbriefings.files.parliament.uk/documents/SN07135/SN07135.pdf"><span data-dcnode-id="3069" instrument_node="">Operation Orbital.</span></a><span data-dcnode-id="3067" instrument_node="">” Beginning in 2015 with 75 UK military trainers focussed on&nbsp; “medical, logistics, general infantry skills and intelligence capacity building,” since then it has “been expanded and extended several times.” By 2018, it also involved “training for defensive operations in an urban environment, operational planning, engineering [and] countering attacks from snipers, armoured vehicles and mortars,” and had been expanded to cover “all branches of Ukraine’s armed forces,” including the Ukrainian navy. In October 2020, the UK and Ukraine agreed to proceed with a new Naval Capabilities Enhancement Programme, which would involve, amongst other things, “Ukraine’s purchase of two refurbished Royal Navy Sandown-class minehunters…the sale and integration of missiles on new and in-service Ukrainian Navy patrol and airborne platforms, including a training and engineering support package, assistance in building new naval bases in the Black Sea and Azov Sea, the development and joint production of eight fast missile warships, and participation in the Ukrainian project to deliver a modern frigate capability.” In November 2021, the UK released £1.7billion of financing for the project, and had, according to a Downing Street press release, trained a total of 22,000 Ukrainian military personnel by January 2022. The Naval initiative already seems to be paying dividends, with evidence emerging that a </span><a data-dcnode-id="3065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/news/world/europe/russia-warship-snake-island-ukraine-navy-b2030878.html"><span data-dcnode-id="3066" instrument_node="">Russian warship was destroyed</span></a><span data-dcnode-id="3064" instrument_node=""> by the Ukrainian navy in early March.&nbsp;</span></p><span data-dcnode-id="3062" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">The trick for the US and UK now is to make sure the war lasts as long as possible, to maximise Russian casualties and trigger economic collapse. In other words, having goaded the Russians into starting the war, the aim is now to goad the Ukrainians to keep it going, resisting the temptation to come to terms with the Russians and make peace. This part of the operation was termed by Mearsheimer ‘bloodletting,’ in which “the aim is to make sure that any war between one’s rivals turns into a long and costly conflict that saps their strength.” Senator, later President, Harry Truman had this strategy in mind, Mearsheimer noted, in his infamous reaction to the Nazi invasion of the Soviet Union in June 1941: “If we see that Germany is winning we ought to help Russia, and if Russia is winning we ought to help Germany, and that way let them kill as many as possible.”</span></p><span data-dcnode-id="3059" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3048"><span data-dcnode-id="3058" instrument_node="">Countering a perceived </span><a data-dcnode-id="3056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailymail.co.uk/video/ukraine/video-2623025/Video-Rattled-Zelensky-ready-talk-terms-Putin-neutral-status.html"><span data-dcnode-id="3057" instrument_node="">wobble</span></a><span data-dcnode-id="3055" instrument_node=""> from Ukrainian President Zelensky, who seemed to imply he would, now he finally understood the Russians were serious, consider returning Ukraine to a non-aligned position, the British government made clear there was to be no such compromise. On the first day of the invasion, February 24th, Foreign Office minister </span><a data-dcnode-id="3053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hansard.parliament.uk/lords/2022-02-24/debates/C842B116-1C10-4828-913C-4996653696EA/UkraineNATOMembership"><span data-dcnode-id="3054" instrument_node="">Lord Ahmed told parliament</span></a><span data-dcnode-id="3052" instrument_node=""> that “we remain committed to the 2008 Bucharest Summit Declaration in which all NATO allies agreed that Ukraine will become a member of the alliance.” A negotiated settlement is, it seems, unacceptable to the UK, who are willing to fight Russia, as the saying goes, down to the last Ukrainian; their vision was spelt out by Foreign Secretary Liz Truss, who </span><a data-dcnode-id="3050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.sky.com/story/ukraine-conflict-could-last-years-and-uk-needs-to-be-prepared-for-a-very-long-haul-says-foreign-secretary-liz-truss-12553040"><span data-dcnode-id="3051" instrument_node="">told Sky News</span></a><span data-dcnode-id="3049" instrument_node=""> that the conflict could last ‘years’ and the UK needs to be ‘prepared for a very long haul’. Western media, meanwhile, have clearly been instructed to play up the supposed successes of the “Ukrainian resistance” and the chance, therefore, of a total military victory against Russia, to stave off the chances of serious negotiations.&nbsp;</span></p><span data-dcnode-id="3047" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3036"><span data-dcnode-id="3046" instrument_node="">The Ukraine trap is being modelled on the Afghan trap right down to the weapons being sent. Stinger surface-to-air missiles played a crucial role in the CIA-MI6 backed anti-Soviet insurgency in the 1980s; the Times reported on 9th March that Ukraine has now received 17,000 anti-tank and 2000 Stinger anti-aircraft missiles, most from Germany, Belgium and Britain, with huge US and British cargo planes full of them being sent every 90 minutes, day and night, from an undisclosed airfield. The US Department of Defence has, since September 2021, provided Ukraine with “Stinger missiles, Javelin missiles, anti-tank rocket systems, grenade launchers, more than 2,000 tons of ammunition, including mortar and artillery rounds, small arms, machine guns,” </span><a data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/newsletters/national-security-daily/2022/03/04/the-u-s-wont-repeat-its-sending-stingers-to-ukraine-00014317%3Ffbclid%3DIwAR1-5qIRIEgEUESfWzdAM1fcNRjlmh5kaslUHOPYLRZZx627Gf0-KhTqvBc"><span data-dcnode-id="3045" instrument_node="">according to</span></a><span data-dcnode-id="3043" instrument_node=""> the assistant secretary of Defence, Mara Karlin, with a total of $1billion in military equipment provided over the past year and $2billion over the previous seven. “Taken together, the</span><strong data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node=""> </span></strong><span data-dcnode-id="3040" instrument_node="">variety, volume and potency of firepower being rushed into the war zone illustrate the extent to which the United States [and the UK] sought to prepare the Ukrainian military to wage a hybrid war against Russia,” suggests the Washington Post article. An additional $13.6 billion of supplies was </span><a data-dcnode-id="3038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/03/09/us/politics/house-emergency-aid-ukraine.html"><span data-dcnode-id="3039" instrument_node="">approved</span></a><span data-dcnode-id="3037" instrument_node=""> by Congress, on March 9th, with Britain announcing it will send state-of-the-art laser-guided “Starstreak” anti-missile systems to Ukraine on the same day.&nbsp;</span></p><span data-dcnode-id="3035" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3030"><span data-dcnode-id="3034" instrument_node="">On top of the weapons deliveries, </span><a data-dcnode-id="3032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzfeednews.com/article/christopherm51/american-nato-military-veterans-fight-russia-with-ukraine"><span data-dcnode-id="3033" instrument_node="">Buzzfeed</span></a><span data-dcnode-id="3031" instrument_node=""> has reported that a small group of NATO special operations forces have been sent into Ukraine:</span></p><span data-dcnode-id="3029" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3021"><span data-dcnode-id="3028" instrument_node="">“The group, composed of six US citizens, three Brits, and a German, are NATO-trained and experienced in close combat and counterterrorism. Two former American infantry officers are also making plans to come to Ukraine to provide “leadership” for the group.” They are hoped to be the first of many volunteers who will arrive in the country to fight the Russians, in a replay of the ‘international jihad’ that was fought in Afghanistan in the 1980s. Indeed, NATO member Turkey is already thought to be </span><a data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asbarez.com/turkey-deploys-syrian-jihadists-to-aid-ukraine-against-russia/"><span data-dcnode-id="3027" instrument_node="">sending Syrian militants</span></a><span data-dcnode-id="3025" instrument_node="">, with combat experience against Russia, to the frontlines in Syria, whilst “groups like the </span><a data-dcnode-id="3023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzfeednews.com/article/christopherm51/russia-invade-ukraine-western-fighters-nato%3Fbfsource%3Drelatedmanual"><span data-dcnode-id="3024" instrument_node="">Georgian National Legion</span></a><span data-dcnode-id="3022" instrument_node="">,” through whose ranks which “more than 300 Western foreigners have passed” since its formation in 2014, many “from NATO countries and with prior military experience… help pave the way for people to sign official contracts with the Ukrainian military.” The Ukraine war thus already appears to be becoming a magnet for both far right and ‘radical Islamist’ fighters to join the war against Russia, providing the double benefit&nbsp; for US and Britain of bleeding Russia and removing potentially destabilising elements from their territory.</span></p><span data-dcnode-id="3020" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3012"><span data-dcnode-id="3019" instrument_node="">Should the Zelensky government collapse, and be replaced by a pro-Russian administration – presumably propped up by the Russian military – the plan is for a long insurgency, again modelled on 1980s Afghanistan. UK Armed Forces Minister James Heappey told </span><a data-dcnode-id="3017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forces.net/ukraine/news/uk-among-countries-continuing-military-aid-ukraine-fight-russia"><span data-dcnode-id="3018" instrument_node="">Forces News</span></a><span data-dcnode-id="3016" instrument_node=""> that the MoD had been asked by Boris Johnson to “look at and plan for” British assistance to any future resistance movement if Ukraine was captured, whilst according to the </span><a data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/national-security/2022/03/05/russia-ukraine-insurgency/%3Ffbclid%3DIwAR2IeLqIC8whxc0fE3WxD6lKhZ9843wZ24wL_xcNDB9Tq5z8IcFaPHy-v1M"><span data-dcnode-id="3015" instrument_node="">Washington Post</span></a><span data-dcnode-id="3013" instrument_node="">, “Ukraine’s allies are planning how to help establish and support a government-in-exile, which could direct guerrilla operations against Russian occupiers, according to several U.S. and European officials… As early as last December, some U.S. officials saw signs that the Ukrainian military was preparing for an eventual resistance, even as Zelensky downplayed the threat of invasion. During an official visit, a Ukrainian special operations commander told Rep. Michael Waltz (R-Fla.), Rep. Seth Moulton (D-Mass.) and other lawmakers that they were shifting training and planning to focus on maintaining an armed opposition, relying on insurgent-like tactics.” But key to this outcome is scuppering any moves towards a peaceful settlement: “The number one thing you have to have is people on the ground who want to fight,” said Jack Devine, a retired senior CIA officer who ran the agency’s successful covert campaign to arm Afghan fighters who drove out the Soviet military in the 1980s…. If Russian and Ukrainian negotiators who have been meeting near the border in Belarus reach some settlement, that will likely diminish the momentum for an insurgency and support for it, Devine predicted.”&nbsp;</span></p><span data-dcnode-id="3011" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Again, Washington has form here. The Bosnian war could have been prevented altogether, saving tens&nbsp;</span></p><span data-dcnode-id="3008" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">of thousands of lives, had the Carrington–Cutileiro peace plan ever been implemented. The plan had been signed by the leaders of all three sides in the conflict, but fell apart after Bosnian leader Izetbegovic withdrew his signature immediately after a meeting with US ambassador Warren Zimmerman. It is thought Zimmerman had pushed him to fight for a better deal with the promise of lavish US military support. We are likely to see much of this in the months and years to come; watch in particular for announcements of increased military or economic escalations around the time of peace talks taking place. Already, the announcement of $13.6billion additional US aid and UK delivery of the “Starstreak” anti-aircraft system on the very day of the first talks between the Ukrainian and Russian foreign ministers was unlikely to be a coincidence.&nbsp;</span></p><span data-dcnode-id="3005" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">The benefits of this prolonged war to the USUK bourgeois establishment are clear. But this is not only about the ‘bleeding’ of a strategic competitor, whose hampering of regime change in Syria and alliances with Iran and China had made it an increasing thorn in the side of western hegemony. It is aimed not only at Russia, but at Europe, at China, and at Ukraine itself.&nbsp;</span></p><span data-dcnode-id="3002" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2997"><span data-dcnode-id="3001" instrument_node="">The driving of a wedge between Russia and Europe, in order to weaken both, and heighten European dependence on the US, has long been a goal of US foreign policy. Yet Germany and France, in particular, have, for obvious reasons, been unwilling to play ball. That is why, throughout the Russian troop buildup, those countries consistently advocated talks and compromise in direct contrast to the belligerent sabre-rattling of their Atlantic partners. Germany has always had to be dragged kicking and screaming into the economic war against Russia, for the simple reason that that war constitutes an act of serious self-harm for Germany, which, unlike the US, is deeply dependent on Russian energy and markets. It took the downing of the MH17 aircraft to arm-twist them into joining the first round of USUK-led sanctions following the 2014 coup, and it took the Russian invasion of Ukraine for Germany to finally accede to US demands to cancel the NordStream 2 gas pipeline from Russia to Germany, which had been completed and ready to begin operations since September 2021. As </span><a data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iwallerstein.com/geopolitics-ukraines-schism/"><span data-dcnode-id="3000" instrument_node="">Immanuel Wallerstein</span></a><span data-dcnode-id="2998" instrument_node=""> wrote back in 2014, “What haunts the Nulands of this world [a reference to the then US ambassador to Ukraine, Victoria Nuland] is not a putative “absorption” of Ukraine by Russia – an eventuality with which she could live. What haunts her and those who share her views is a geopolitical alliance of Germany/France and Russia.” The Ukraine trap has certainly put paid to that prospect – and the collateral damage to Europe from the economic war on Russia is only a benefit to US hegemony. NATO’s raison d’etre in Europe, as described by its first Secretary General Lord Ismay, was “to keep the Russians out, the Americans in, and the Germans down,” and the war in Ukraine is already well on the way to achieving all three.&nbsp;</span></p><span data-dcnode-id="2996" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Then, of course, there is China. China has condemned the sanctions on Russia as economic warfare against the population, but as the bloodshed mounts, so too will the pressure on China to join in with them, or risk being treated in the same way itself; this war is increasingly being portrayed as a Manichean struggle of good versus evil in which bystanders are not allowed. Of course, the US economy is far more entangled with that of China than it is with that of Russia, making an all out boycott a trickier prospect – but there is little to stop the US simply freezing Chinese dollar assets in the same way as they have done with Russian. The Russian central bank’s $630billion in foreign reserves were frozen almost immediately after the invasion, eliminating at a stroke Russia’s painstakingly built up insurance policy to protect the ruble. Its value has fallen continuously since then and is now worth barely half of what it was a month ago. What is to stop the US doing the same to China, eliminating a quarter of its foreign debt, and greatly pumping up the value of the dollar, into the bargain? This will be the real worry for Beijing right now, and there is every reason to believe that this is the direction in which we are headed. The Ukraine trap has been designed ultimately to ensnare China as well; we may very well be witnessing the start of the ‘final showdown’ aimed at extending US dominance for another fifty years by ending the Russia-China challenge once and for all.&nbsp;</span></p><span data-dcnode-id="2993" instrument_node="">
</span><p class="inline-ad-slot" data-adtags-visited="true" data-adtags-width="496" data-dcnode-id="2992" id="inline-ad-0" style="float:left;height:0px;margin:0 auto;overflow:hidden;width:496px;"></p><p data-adtags-visited="true" data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">As for Ukraine itself, its ruined economy and infrastructure will leave it utterly dependent on foreign support for reconstruction. If this does turn out to be Russia, the costs to the Russian economy will be crippling, and ongoing with an insurgency to deal with; if the West, Ukrainian policy will be completely under their control, with reparations likely to be forced out of Russia to pay for reconstruction anyway. Either way, the Russian economy and Ukrainian sovereignty are both finished.&nbsp;</span></p><span data-dcnode-id="2989" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2984"><span data-dcnode-id="2988" instrument_node="">Finally, quite apart from all the geopolitical machinations, are the straightforward capitalist economic interests. In times of economic crisis and stagnation, war becomes an ever more tempting prospect for capitalist powers, providing opportunities to capture state markets (eg for weapons), rather than having to rely on stagnating private consumer markets, organise political boycotts of rival producers in areas where you cannot compete economically, and gain from inflated commodity prices affected by the war (eg oil and gas, of which the USA is a net exporter). </span><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.counterpunch.org/2022/03/01/america-defeats-germany-for-the-third-time-in-a-century/"><span data-dcnode-id="2987" instrument_node="">Michael Hudson</span></a><span data-dcnode-id="2985" instrument_node=""> has analysed how the three key economic sectors in the USA – that is, the military-industrial complex; the oil, gas and mining industry and the banking and real estate, which between them control the purse strings of virtually every member of Congress – have all had their strategic goals served very well by this war.&nbsp;</span></p><span data-dcnode-id="2983" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">If anything, then, the Ukraine trap looks set to be even more beneficial for the US than the Afghan trap – and even more devastating, not only to Ukraine and Russia, but to China and even the EU as well.&nbsp;</span></p><span data-dcnode-id="2980" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">But, as Marx told us long ago, when history repeats itself it does so “first time as tragedy, second time as farce.” In Afghanistan, Soviet forces were fighting to defend a genuine popular socialist revolution, which had liberated women and ended feudal oppression, against a vicious sectarian obscurantism that was utterly dependent on MI6, CIA, Pakistani and Saudi largesse. The popularity of Najibullah’s communist government was revealed by the fact that it hung on against this combined terror operation for a further three years after being abandoned by the Soviet withdrawal in 1989.&nbsp;</span></p><span data-dcnode-id="2977" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">This time around, there is no such emancipatory project to defend, quite the opposite. Putin’s war is a grotesque caricature of the Soviet intervention, little more in fact than a mirror image of the western warmongering he claims to oppose, replete with obviously fraudulent claims put forward to justify the unjustifiable. His ‘denazification’ programme amounts to the replacement of ‘pro-Ukrainian’ fascists with ‘pro-Russian’ fascists, his vision of Ukraine essentially another Syria – a patchwork of dysfunctional ethno-nationalist statelets, each to be used and abused by their own regional power patron, the whole mess overseen by Grand Master [sic] Putin.&nbsp;</span></p><span data-dcnode-id="2974" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">The tragedy of Putin’s Russia has been its crippling desperation to be accepted by ‘the west’. Like Israel, Russia is offended that its right to dehumanise and exterminate – the very essence of whiteness – seems to be constantly called into question, as if their very identity as white nations is being denied. Why are you allowed to shit on international law, to invade sovereign states, to starve and beseige, to use thermobarbaric weapons, to bomb hospitals, and we are not? What is this Russophobia, this anti-Semitism? Am I not a white man and a white brother?&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="2971" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">Farce indeed. And utterly sickening to watch.</span></p><span data-dcnode-id="2968" instrument_node="">
</span><div data-adtags-width="496" data-dcnode-id="2967" id="atatags-26942-62659f8622ed7"></div><span data-dcnode-id="2966" instrument_node="">
</span><span data-dcnode-id="2963" instrument_node=""> </span></div><span data-dcnode-id="2960" instrument_node="">

</span><div class="date-meta" data-dcnode-id="2920"><span data-dcnode-id="2924" instrument_node="">
</span><a data-dcnode-id="2922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/2022/02/22/4941/" rel="bookmark"><span data-dcnode-id="2923" instrument_node="">02.22.22</span></a><span data-dcnode-id="2921" instrument_node="">

        	by </span><a class="url fn n" data-dcnode-id="2916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/author/danglazebrook2000/" rel="author" title="View all posts by G"><span data-dcnode-id="2917" instrument_node="">G</span></a><span data-dcnode-id="2915" instrument_node=""> </span></div><span data-dcnode-id="2913" instrument_node="">
</span></div><span data-dcnode-id="2910" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2904"><span data-dcnode-id="2909" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2906"><a data-dcnode-id="2907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/2022/02/22/4941/" rel="bookmark"><span data-dcnode-id="2908" instrument_node="">Ukraine: fascist militias could be the US’ key to destabilise Ukraine, weaken Europe and drag Russia into a&nbsp;quagmire</span></a></h1><span data-dcnode-id="2905" instrument_node="">
</span></header><span data-dcnode-id="2902" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2791"><span data-dcnode-id="2901" instrument_node="">
</span><h1 data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node=""> </span></h1><span data-dcnode-id="2898" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2896"><img alt="" data-dcnode-id="2897" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/&amp;raw"></figure><span data-dcnode-id="2895" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2892"><a data-dcnode-id="2893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrookdotcom.files.wordpress.com/2022/02/457486324.0.jpg"><img alt="" class="wp-image-4946" data-attachment-id="4946" data-comments-opened="1" data-dcnode-id="2894" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="457486324.0" data-large-file="https://danglazebrookdotcom.files.wordpress.com/2022/02/457486324.0.jpg?w=585" data-medium-file="https://danglazebrookdotcom.files.wordpress.com/2022/02/457486324.0.jpg?w=300" data-orig-file="https://danglazebrookdotcom.files.wordpress.com/2022/02/457486324.0.jpg" data-orig-size="1200,867" data-permalink="https://danglazebrook.com/457486324-0/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrookdotcom.files.wordpress.com/2022/02/457486324.0.jpg%3Fw%3D1024&amp;raw" srcset="https://danglazebrookdotcom.files.wordpress.com/2022/02/457486324.0.jpg?w=1024 1024w, https://danglazebrookdotcom.files.wordpress.com/2022/02/457486324.0.jpg?w=150 150w, https://danglazebrookdotcom.files.wordpress.com/2022/02/457486324.0.jpg?w=300 300w, https://danglazebrookdotcom.files.wordpress.com/2022/02/457486324.0.jpg?w=768 768w, https://danglazebrookdotcom.files.wordpress.com/2022/02/457486324.0.jpg 1200w"></a></figure><span data-dcnode-id="2891" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2887"><img alt="" data-dcnode-id="2890" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/&amp;raw"><figcaption data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Participants in a Right Sector public meeting in Kiev. © StringerRIA Novosti</span></figcaption></figure><span data-dcnode-id="2886" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2885"></p><span data-dcnode-id="2884" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2883"></p><span data-dcnode-id="2882" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2879"><em data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Originally published October 2015</span></em></p><span data-dcnode-id="2878" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Little noticed amongst all the Syria coverage, peace has been breaking out across Ukraine. After a faltering start, the so-called ‘Minsk II’ agreement – signed in February by the so-called ‘Normandy Four’ – now seems to be making serious headway.</span></p><span data-dcnode-id="2875" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">A new ceasefire, which began on September 1, has been largely adhered to by all sides, paving the way for the withdrawal of weaponry from the frontline which was a key demand of the Minsk agreements.</span></p><span data-dcnode-id="2872" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">On the political front, there have also been breakthroughs. One of the key sticking points was resolved two weeks ago when representatives of the self-declared People’s Republics in Lugansk and Donbass agreed to postpone elections to ensure they are held in line with Ukrainian law and international electoral standards. Meanwhile, in August the Ukrainian parliament – after a heated and tumultuous session – approved a law on decentralization that grants significant autonomy to the Eastern regions; another key demand of the Minsk agreements.</span></p><span data-dcnode-id="2869" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">That the so-called ‘Normandy Four’ (Russia, Germany, France and Ukraine) are keen for the peace to hold no surprises. For, ultimately, the US-UK destabilization strategy in Ukraine aims at weakening all of them.</span></p><span data-dcnode-id="2866" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">It is worth recalling the key US and UK role in fomenting the war in the East of Ukraine. Whilst both powers openly supported the fascist-led coup in February 2014 – British EU commissioner Catherine Ashton, for example, giving immediate recognition and finance to the new coup government – they have also been instrumental in stoking the war in the East of the country. When resistance to the coup began in the Donbass region in April, CIA Director John Brennan was immediately flown to Kiev. By the time he left, the Ukrainian coup government’s bloody crackdown on the Eastern regions was well under way; it was pretty obvious he had been sent to push for precisely this response.</span></p><span data-dcnode-id="2863" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">However, the crackdown did not go as hoped. Ukrainian tanks were met by angry crowds demanding the soldiers refuse to fire on their compatriots and give up their weapons. Many did precisely this, expressing sympathy for the resistance and fraternizing with the crowds; within days, a full scale mutiny appeared to be underway, with 21 armored vehicles turned over to the resistance. The futility of a military solution became increasingly clear, and even the coup-installed Prime Minister Yatsenyuk began making noises about federalism and the need to respect the rights of ethnic Russians for the first time since coming to power. The door appeared to be opening for negotiations and some kind of peaceful compromise.</span></p><span data-dcnode-id="2860" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2855"><span data-dcnode-id="2859" instrument_node="">It was at this point that no less a figure than US Vice President Joe Biden was sent over – and, once again, the offensive was renewed the day he left. But this time the reliance was less on the regular army, and more on the ‘National Guard’, a new paramilitary formation created the month before by Andriy Parubiy. Parubiy, from the extreme Russophobic ‘Fatherland’ party, had been the ‘head of security’ of the Maidan protests (and therefore directly&nbsp;</span><a data-dcnode-id="2857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rt.com/news/ashton-maidan-snipers-estonia-946/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2858" instrument_node="">implicated</span></a><span data-dcnode-id="2856" instrument_node="">&nbsp;in the sniper shootings of February 20) before being made National Security Chief of the new government following the coup. The National Guard was a crude means of putting ultra-nationalist militias on the government payroll – and following visits by Biden and Brennan these militias became the spearhead of the US policy of war on Ukraine’s ethnic Russian population.</span></p><span data-dcnode-id="2854" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2846"><span data-dcnode-id="2853" instrument_node="">Within weeks, new militia such as the Azov, Donbas and Dnipro battalions were created, incorporated into the National Guard and thrown into battle. Azov’s founder, Biletsky, explained that: “</span><em data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">The historic mission of our nation in this critical moment is to lead the white races of the world in a final crusade for their survival: a crusade against the Semite-led Untermenschen.</span></em><span data-dcnode-id="2850" instrument_node="">” The US has subsequently poured hundreds of millions into the&nbsp;</span><a data-dcnode-id="2848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theguardian.com/world/2015/apr/20/us-paratroopers-begin-training-national-guard-units-in-ukraine" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2849" instrument_node="">training</span></a><span data-dcnode-id="2847" instrument_node="">&nbsp;and equipping of such militias.</span></p><span data-dcnode-id="2845" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">The result of this fascistic war has been to weaken Russia, Europe and Ukraine itself. On the one hand, it has been a willful provocation of Russia, whose very modest attempts to defend the eastern regions (allowing Russian volunteers to join the resistance, for example) have been characterized as aggression and used by the US as means of maneuvering Europe into supporting self-destructive sanctions against Russia. At the same time, Ukraine – which had higher per-capita industrial output than Germany during Soviet times – has become an economic basket case, facing massive inflation and economic contraction. Just last week, Ukrainian Finance Minister Natalie Jaresko requested a doubling of the $40 billion IMF rescue package just to stay afloat.</span></p><span data-dcnode-id="2842" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2838"><img alt="A private house destroyed in shelling by Ukrainian army in Spartak, Donetsk Region. © Irina Gerashchenko
" data-dcnode-id="2841" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdni-rt-com.cdn.ampproject.org/ii/AW/s/cdni.rt.com/files/2015.10/original/56211aa5c36188121b8b4567.jpg&amp;raw"><figcaption data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">A private house destroyed in shelling by Ukrainian army in Spartak, Donetsk Region. © Irina GerashchenkoRIA Novosti</span></figcaption></figure><span data-dcnode-id="2837" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">All of this suits the US very well. On the one hand, it is fully in line with veteran cold warrior (and Obama advisor) Zbigniew Brzezinski’s strategy to maintain US supremacy by keeping Europe and Russia divided. On the other, the sinking of the Ukrainian economy leaves the country utterly dependent on foreign loans and at the mercy of its Western creditors in the IMF, making the return of a genuinely non-aligned foreign policy along the lines of those followed by Yanukovich ever more unlikely. That is why the US has been at the forefront of pushing for this war.</span></p><span data-dcnode-id="2834" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2826"><span data-dcnode-id="2833" instrument_node="">It is also why not only Putin, but Hollande, Merkel and even Poroshenko are so keen for the war to end. So long as the ceasefire holds, European sanctions on Russia are due to expire at the end of the year. And as EU President Jean-Claude Juncker – well aware of the damage sanctions are doing to the European economy –&nbsp;</span><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rt.com/news/318074-eu-russia-relations-improve-juncker/amp/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2832" instrument_node="">said</span></a><span data-dcnode-id="2830" instrument_node="">&nbsp;last week, “</span><em data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">We must make efforts towards a practical relationship with Russia … we can’t go on like this… We can’t let our relationship with Russia be dictated by Washington.</span></em><span data-dcnode-id="2827" instrument_node="">” Likewise, even Poroshenko – despite all his tub-thumping at the UN – knows that simple geographical reality dictates he needs to have a constructive relationship with Russia, and that continuation of the war will make economic recovery impossible.</span></p><span data-dcnode-id="2825" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">For the US, however, the surest route to maintaining economic war against Russia, keeping Europe and Russia divided, and keeping Ukraine dependent, is for the war in the Ukraine to continue. This is why the US policy of directly supplying and training the fascist militias is so worrying. For these militias will be the wild card in the months to come. They have already shown their willingness to violently challenge Ukrainian government authority, and have made no bones about their willingness to subvert any peace agreement that is not to their liking.</span></p><span data-dcnode-id="2822" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2808"><span data-dcnode-id="2821" instrument_node="">Three people were killed, for example, during ultra-nationalist&nbsp;</span><a data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rt.com/news/313880-ukraine-radicals-protest-parliament/amp/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2820" instrument_node="">demonstrations</span></a><span data-dcnode-id="2818" instrument_node="">&nbsp;against the decentralization law, and in July Right Sector militias were involved in a&nbsp;</span><a data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rt.com/news/273160-ukraine-right-sector-police/amp/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2817" instrument_node="">firefight</span></a><span data-dcnode-id="2815" instrument_node="">&nbsp;with Ukrainian police, leaving four dead. Following that incident, the Right Sector’s press spokesman commented that: “</span><em data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">In the event of a new revolution, Ukrainian president Poroshenko and his associates will not be able to flee the country as the former president did. They can expect nothing but execution in some dark cellar, conducted by young Ukrainian military men or members of the National Guard.</span></em><span data-dcnode-id="2812" instrument_node="">” A fascinating&nbsp;</span><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.russia-direct.org/opinion/maidan-mukachevo-evolution-ukraine-crisis" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2811" instrument_node="">article</span></a><span data-dcnode-id="2809" instrument_node="">&nbsp;by Nicolai Petro argued that, in the event of a full scale showdown between the paramilitaries and the official government forces, it is far from clear that the government would win.</span></p><span data-dcnode-id="2807" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2799"><span data-dcnode-id="2806" instrument_node="">The fascist militias, then, are the wild card who may threaten the peace that Russia, Europe and even the Ukrainian government are seemingly so committed. Could it be that the US has been developing its relationship with these forces for this very reason? The fact that the immediate US response to the success of the recent ceasefire has been to promise an additional&nbsp;</span><a data-dcnode-id="2804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rt.com/usa/318054-ndaa-syria-isis-ukraine/amp/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2805" instrument_node="">$300 million</span></a><span data-dcnode-id="2803" instrument_node="">&nbsp;worth of training and equipment to military “</span><em data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">and other security forces</span></em><span data-dcnode-id="2800" instrument_node="">” in Ukraine is a worrying step indeed.</span></p><span data-dcnode-id="2798" instrument_node="">
</span><div data-dcnode-id="2793" id="atatags-370373-62659f86260c8"><span data-dcnode-id="2797" instrument_node="">
</span><span data-dcnode-id="2794" instrument_node="">
</span></div><span data-dcnode-id="2792" instrument_node=""> </span></div><span data-dcnode-id="2789" instrument_node="">
