</span></div><span data-dcnode-id="1809" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1803"><span data-dcnode-id="1808" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1805"><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/2020/06/24/decolonising-education-rhodes-must-fall/" rel="bookmark"><span data-dcnode-id="1807" instrument_node="">Decolonising Education: Rhodes Must&nbsp;Fall</span></a></h1><span data-dcnode-id="1804" instrument_node="">
</span></header><span data-dcnode-id="1801" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1599"><span data-dcnode-id="1800" instrument_node="">
</span><div class="article__cover" data-dcnode-id="1796"><span data-dcnode-id="1799" instrument_node="">
</span><div class="media__footer media__footer_bottom" data-dcnode-id="1798"></div><span data-dcnode-id="1797" instrument_node="">
</span></div><span data-dcnode-id="1795" instrument_node="">
</span><div class="article__share" data-dcnode-id="1784"><span data-dcnode-id="1794" instrument_node="">
</span><div class="article__social-wrapper_upper" data-dcnode-id="1786"><span data-dcnode-id="1793" instrument_node="">
</span><div class="article__google-news upper" data-dcnode-id="1790"><em data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">23rd November 2015</span></em></div><span data-dcnode-id="1789" instrument_node="">
</span><div data-dcnode-id="1788"></div><span data-dcnode-id="1787" instrument_node="">
</span></div><span data-dcnode-id="1785" instrument_node="">
</span></div><span data-dcnode-id="1783" instrument_node="">
</span><div class="article__summary summary" data-dcnode-id="1781"><img alt="Take it down!': Rhodes Must Fall campaign marches through Oxford ..." data-dcnode-id="1782" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.guim.co.uk/img/media/fc93289cad084b40af4727ad7ea7ff4dd3d7ca66/0_101_4368_2624/master/4368.jpg%3Fwidth%3D1200%26height%3D1200%26quality%3D85%26auto%3Dformat%26fit%3Dcrop%26s%3Dc00eb673ed240728fef9a54cddccf55c&amp;raw"></div><span data-dcnode-id="1780" instrument_node="">
</span><div class="article__text text" data-dcnode-id="1601"><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1778" instrument_node="">The world needs to&nbsp;</span><em data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">“move on”</span></em><span data-dcnode-id="1775" instrument_node="">&nbsp;from slavery and colonialism, David Cameron declared during his visit to Jamaica earlier this year. He went on to casually dismiss demands for either reparations or even an apology for the systematic kidnapping and enslavement of Africans which laid the basis of both of the wealth of his own country (and indeed his own family) and the poverty of the nation hosting his visit. What he meant by&nbsp;</span><em data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">“move on”</span></em><span data-dcnode-id="1772" instrument_node="">, of course, was simple: forget it ever happened and ignore its continuing legacy.</span></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Last week, in Oxford, a demonstration of around 200 students were also demanding that Britain ‘move on’ from its colonial past – not by forgetting about it, but precisely the opposite – by acknowledging the damage done (and still being done) and atoning for it.</span></p><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">The Rhodes Must Fall movement began in South Africa this year, demanding an end to the veneration of ‘colonial murderers’ like Cecil Rhodes, but has since spread to Oxford, where Rhodes’ alma mater, Oriel College, still displays a huge statue in his honor. Rhodes’ statue at Cape Town University was eventually removed after protests, and the Oxford campaign hopes to repeat the success here.</span></p><span data-dcnode-id="1764" instrument_node="">
</span><div class="article__cover" data-dcnode-id="1752"><span data-dcnode-id="1763" instrument_node="">
</span><div class="media" data-dcnode-id="1754"><img alt="RT" class="read-more__cover lazyautosizes lazyloaded" data-dcnode-id="1762" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdni.rt.com/files/2015.11/original/564f21eac361888d458b4593.jpg&amp;raw"><p data-dcnode-id="1761"></p><span data-dcnode-id="1760" instrument_node="">
</span><div class="media__footer media__footer_bottom" data-dcnode-id="1756"><span data-dcnode-id="1759" instrument_node="">
</span><div class="media__title media__title_footer" data-dcnode-id="1758"></div><span data-dcnode-id="1757" instrument_node="">
</span></div><span data-dcnode-id="1755" instrument_node="">
</span></div><span data-dcnode-id="1753" instrument_node="">
</span></div><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Cecil Rhodes was the archetypal British imperialist – a tyrannical stealer of land, ruthless exploiter of labor and rabid butcher of men, women and children. By the 1890s, he had conquered around one million square miles of territory (including modern day Malawi, Zimbabwe and Zambia) and laid waste to its inhabitants, using the newly invented Maxim gun to massacre all those who stood in his way and forcing many of the rest into the living graves that were his company’s diamond mines.</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1747" instrument_node="">As Prime Minister of Britain’s Cape Colony, his policies laid the basis for what became the apartheid system, as he forced Africans onto reserves, introduced segregation and forced labor, and systematically excluded Africans from voting, explaining to the Cape Assembly in 1887 that&nbsp;</span><em data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">“the native is to be treated as a child and denied the franchise. We must adopt a system of despotism in our relations with the barbarians of South Africa.”</span></em></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1742" instrument_node="">What exactly this meant was spelt out in one of his more prosaic pronouncements:&nbsp;</span><em data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">“one should kill as many n*ggers as possible.”</span></em><span data-dcnode-id="1739" instrument_node="">&nbsp;The question is not so much why there is a campaign to have his statue removed as why on earth it is still there. It says a lot about just how little Britain has ‘moved on’ from its imperial past when the leader of the Zimbabwean liberation struggle, Robert Mugabe, is one of the most demonized figures in the British media – whilst the architect of that country’s subjugation, Cecil Rhodes, remains a ubiquitous and venerated presence in Britain’s most hallowed academic institution.</span></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">But the campaign is about much more than statues; as the press release for the event noted,&nbsp;</span><em data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">“Our call for the statue to fall is but the first step. What we stand for is something much greater: the transformation of the university in its physical and intellectual spaces, its colleges and its curricula.”</span></em><span data-dcnode-id="1733" instrument_node="">&nbsp;Indeed, Rhodes Must Fall is part of a much broader global movement that has emerged in recent years, based around the demand to decolonize academia.</span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1730" instrument_node="">As Maori anthropologist and activist Linda Tuhiwai Smith has put it,&nbsp;</span><em data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">“decolonization, once viewed as the formal process of handing over the instruments of government, is now recognized as a long term process involving the bureaucratic, cultural, linguistic and psychological divesting of colonial power.”</span></em></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Western academia is in particular and urgent need of such a decolonizing process as it so clearly continues to reproduce Eurocentric fallacies and omissions in manifold ways.</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">One way is through its erasure of the crime of colonialism; that is, its tendency to overlook – or, worse, deem as irrelevant – the sheer scale of human suffering caused by European colonialism.</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Surinamese scholar Sandew Hira, for example, notes how the typical figure given for enslaved Africans in Western histories is around 12 million. But this figure neglects both those killed in the process of capture in Africa, and those enslaved at birth in the Americas. Once these two groups are added, the true figure rises to between 236 and 432 million – that is at least twenty times higher than the standard Western statistic.</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1716" instrument_node="">Hira has also made a calculation of the reparations owed by European colonial powers to those they colonized based on the value of goods stolen, unpaid rent and labor, and compensation for human suffering, plus a very reasonable three percent compound interest on the debt (half the rate charged to Haiti on the ‘reparations’ imposed by France for the crime of abolishing slavery). The estimated total comes to $321 quadrillion, demonstrating&nbsp;</span><em data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">“the inconceivable damage that colonization has caused upon the colonized and the unimaginable debt that rests of the shoulders of the colonizer.”</span></em></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Little of this is recognized in mainstream Western historical accounts of the rise of Europe, which still tend to treat colonialism either as a mixed blessing for the colonized or a net drain – that is, effectively an act of benevolence – for the colonizing powers. This ‘weighing up’ of supposed ‘positive and negative’ aspects of colonialism would never be accepted for other acts of mass murder, such as the Hitlerite atrocities – yet are apparently perfectly valid for colonialism.</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1708" instrument_node="">As Rhodes Must Fall activist Chi Chi put it at the Oxford event –&nbsp;</span><em data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">“You cannot reconcile ‘but what about the railways?’ with genocide.”</span></em><span data-dcnode-id="1705" instrument_node="">&nbsp;Except that, apparently, you can, and those who do, such as empire cheerleader Niall Ferguson, are handsomely rewarded with research grants, media accolades and seemingly endless commissions by the BBC.</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1702" instrument_node="">But it is not only the crimes of empire that are erased in Western academia – so too is the non-European contribution to European civilization itself. As JM Blaut has analyzed in depth in The Colonizers’ Model of the World, ‘Greater Europe’ is still depicted by the majority of European historians as&nbsp;</span><em data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">“the perpetual fountainhead of history”</span></em><span data-dcnode-id="1699" instrument_node="">&nbsp;based on what he calls the ‘diffusionist’ notion that&nbsp;</span><em data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">“the world as a whole has one permanent center from which culture-changing ideas tend to originate, and a vast periphery that changes as a result.”</span></em><span data-dcnode-id="1696" instrument_node="">&nbsp;This unique capacity for progress, in this view, is based on Europe’s supposedly superior and self-generated ‘value system’.</span></p><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1693" instrument_node="">Hand in hand with the notion that all that is good in the world flows from ‘Inside’ (Europe) to ‘Outside’ is its inevitable corollary of a&nbsp;</span><em data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">“counter-diffusion of evil and savagery and disease from outside to Inside.”</span></em><span data-dcnode-id="1690" instrument_node="">&nbsp;The supposed knowledge about the non-European world, on which such ideas are based, was, of course, produced in the process of colonialism, reflecting the biases – and interests – of the colonizer.</span></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1681"><span data-dcnode-id="1687" instrument_node="">As Blaut writes,&nbsp;</span><em data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">“the plain fact is that theories constructed from this information – and this includes the great bulk of nineteenth century anthropological, geographic, and politico-economic theories about non-Europeans – are systematically distorted”</span></em><span data-dcnode-id="1684" instrument_node="">&nbsp;as not only were they based on information reflecting the bias of the colonialists who collected it, but also involved&nbsp;</span><em data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">“shaping knowledge into theories that would prove useful for colonialism.”</span></em></p><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1675"><span data-dcnode-id="1679" instrument_node="">It hardly needs stating that the ‘diffusionist’ theories produced by such methods are completely false. As John M Hobson has outlined in great detail in his magisterial The Eastern Origins of Western Civilization, far from being the passive recipient of Western innovation, Africa and Asia largely provided the technological and institutional ‘portfolios’ (not to mention the labor power and resources) that enabled both the European industrial revolution and the ‘voyages of discovery’ that preceded it Vasco Da Gama’s travel round the Cape, for example, was not the unprecedented triumph it is still depicted as in Eurocentric history; in fact the voyage had already been accomplished 20-50 years earlier by the Islamic navigator Ahmad ibn-Majid, whilst&nbsp;</span><em data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">“the Javanese, Indians and Chinese had all made it across to the Cape many decades, if not centuries, before Da Gama”</span></em><span data-dcnode-id="1676" instrument_node="">&nbsp;(who, incidentally, relied on a Gujarati Muslim pilot as his guide).</span></p><span data-dcnode-id="1674" instrument_node="">
</span><div class="article__cover" data-dcnode-id="1670"><span data-dcnode-id="1673" instrument_node="">
</span><div class="media" data-dcnode-id="1672"></div><span data-dcnode-id="1671" instrument_node="">
</span></div><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Similarly, Hobson shows how non-European societies had a major influence on all the major turning points in European history, with, for example, Chinese technological innovations and ideas underpinning both the industrial revolution and the European Enlightenment, and Afro-Asian trading circuits originating a millennia and a half ago laying the foundation of the global trading system of today.</span></p><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1665" instrument_node="">But it is not only history that continues to reproduce colonial theories; as Hobson has argued elsewhere, Eurocentrism thoroughly permeates fields such as international relations as well:&nbsp;</span><em data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">“international theory does not so much explain international politics in an objective, positivist and universalist manner but seeks, rather, to parochially celebrate and defend or promote the West as the proactive subject of, and as the highest or ideal normative referent in world politics.”</span></em></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1660" instrument_node="">In philosophy, too, only European philosophy is typically taught, with non-European philosophy consigned to anthropology – to be studied as the quaint beliefs of irrational societies. At the same time, the racism of the European philosophers under discussion are buried or ignored. As Charles W. Mills points out in The Racial Contract, there is a&nbsp;</span><em data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">“uniformity of opinion”</span></em><span data-dcnode-id="1657" instrument_node="">&nbsp;on the inferiority of non-Europeans amongst pretty much all major European thinkers from the Enlightenment onwards: he cites, for example,&nbsp;</span><em data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">“Hume, who denies that any race other than the white one has produced a civilization; the utilitarian Mill, who denies the applicability of the anti-paternalist ‘harm principle’ to ‘barbarians’ and maintains that they need European colonial despotism; [and] the historicist GWF Hegel, who denies that Africa has any history and suggests that blacks were morally improved through being enslaved.”</span></em><span data-dcnode-id="1654" instrument_node="">&nbsp;None of this will typically be mentioned on undergraduate philosophy courses.</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1651" instrument_node="">Underlying all of this is what decolonial scholar Ramon Grosfoguel calls&nbsp;</span><em data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">“epistemic racism”</span></em><span data-dcnode-id="1648" instrument_node="">. Seventeenth century Europe saw a revolution in epistemology, epitomized by Rene Descartes’ idea of mind-body dualism. By separating the mind from the body, Descartes was able to posit the idea of a completely objective system of knowledge, unbounded by the limitations of societal specificity. This afforded the subject – the privileged male Western subject, that is – a ‘God’s eye’ universal view of the world, superior to all other epistemologies. Such a claim to perfect, godlike, knowledge, would have been treated as idolatry in other cosmologies; and for decolonial scholars, all knowledge is&nbsp;</span><em data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">“bio-graphically and geo-historically located,”</span></em><span data-dcnode-id="1645" instrument_node="">&nbsp;to use Walter Mignolo’s terminology.</span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1642" instrument_node="">But Western epistemology has, by sheer force of arms, been able to impose itself on the rest of the world, presenting itself as the one true and valid system of knowledge production; it is no coincidence that the epistemological revolution overlaps with the era of colonialism. As Enrique Dussel argues, it is not so much that&nbsp;</span><em data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">“I think, therefore I am” as “I conquer, therefore I am.”</span></em></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1637" instrument_node="">And academia still bears the birthmarks of its colonial genesis. Grosfoguel points out that this is the case to such an extent that supposedly&nbsp;</span><em data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">“universal knowledge”</span></em><span data-dcnode-id="1634" instrument_node="">&nbsp;is still based on&nbsp;</span><em data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">“the socio-historical experience of just five countries”</span></em><span data-dcnode-id="1631" instrument_node="">&nbsp;– Italy, Germany, Britain, France and the USA, comprising between them a mere 12 percent of the world’s population, but virtually 100 percent of the reading material of almost every academic social science course in the western world. Knowledge produced in all other parts of the world is interiorized.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1628" instrument_node="">Oxford was, and is, central to both this inferiorization of non-European knowledge, and the conquests and exterminations that allowed this process to develop. I asked Ciaran Walsh, radical Labor historian at Ruskin College, who runs the excellent Radical Oxford walking tour, about the university’s role in colonialism:&nbsp;</span><em data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">“The ideologues who justified the creation of first the English and then the British Empire came from Oxford, and generations of imperial administrators were educated at Oxford under the banner of the civilizing mission. But this mission was a cover for the expansion of European political forms, structures, property relations and all the oppression, dislocation and death that flowed with that. Imperialism and capital accumulation have been co-emergent in the modern era and Oxford’s played a key role in this whole process in Britain and globally.”</span></em></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1623" instrument_node="">Places like Oxford’s Indian Institute – founded after the first war of Indian independence in 1857 had shaken the foundations of the British Empire – were created as what Walsh calls&nbsp;</span><em data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">“centers of orientalism,”</span></em><span data-dcnode-id="1620" instrument_node="">&nbsp;designed to study non-European cosmologies, legal systems, institutions and social structures the better to dominate them. Walsh explains that William Jones, the first European to study Sanskrit, was a product of Oxford, who went on to study Indian law in order to allow&nbsp;</span><em data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">“a more workable system of European property relations to be imposed. This is the instrumental nature of orientalism.”</span></em></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1615" instrument_node="">And still today, as Mignolo notes,&nbsp;</span><em data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">“seldom, if ever, are intellectual debates in the regions being reported taken into account…very much like natural resources, Third World ideas are processed in European intellectual factories.”</span></em><span data-dcnode-id="1612" instrument_node="">&nbsp;Thus, as Kiran Benipal put it on the demonstration,&nbsp;</span><em data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">“Rhodes legacy is alive and well, and runs through the blood of this institution.”</span></em></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">And Oxford continues to produce the modern-day Rhodes’ who are his worthy successors in British colonial barbarism in Africa and beyond. Oxford graduate, Tony Blair, was involved in plans to follow directly in Rhodes’ footsteps and invade Zimbabwe; it was only the steadfastness of Mbeki’s ANC government in South Africa that prevented this from taking place and subsequently exposed the plot. Likewise, David Cameron, a graduate of Brasenose College, did his bit to stymie African development; his blitzkrieg destruction of Libya paved the way for a bloodbath that has already enveloped Mali, Nigeria, Cameroon, Niger, Algeria, Egypt, Tunisia and Syria and continues to grow.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">So Rhodes’ legacy continues not only through the manifold monuments, buildings and institutions that bear his name, not only through the European supremacist foundations of academia, but also through British policies that continue to brutalize and subjugate Africa, Asia and South America. The British state cannot bear to see anti-colonial resistance movements in power anywhere, and have still not reconciled themselves to the reality that the movements that led the fight for independence remain in government across much of Southern Africa. Rhodes will fall. But it will require constant vigilance – and we must never forget that the enemy today is the same as it was then – British imperialism.</span></p><span data-dcnode-id="1602" instrument_node="">
</span></div><span data-dcnode-id="1600" instrument_node="">
</span></div><span data-dcnode-id="1597" instrument_node="">

        	by </span><a class="url fn n" data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/author/danglazebrook2000/" rel="author" title="View all posts by G"><span data-dcnode-id="1554" instrument_node="">G</span></a><span data-dcnode-id="1552" instrument_node=""> </span></div><span data-dcnode-id="1550" instrument_node="">

</span><header class="entry-header" data-dcnode-id="1541"><span data-dcnode-id="1546" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1543"><a data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/2020/06/04/the-police-murder-of-habib-ullah/" rel="bookmark"><span data-dcnode-id="1545" instrument_node="">The Police Murder of Habib&nbsp;Ullah</span></a></h1><span data-dcnode-id="1542" instrument_node="">
</span></header><span data-dcnode-id="1539" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1339"><span data-dcnode-id="1538" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1536"><img alt="Habib Ullah: Family outcry as CPS declines to charge police ..." data-dcnode-id="1537" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.independent.co.uk/s3fs-public/thumbnails/image/2014/08/08/16/Habib-Ullah.jpg%3Fw968h681&amp;raw"></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1532"><em data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">11th May 2015</span></em></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1524"><span data-dcnode-id="1529" style="color:var(--color-text);font-size:1rem;"><span data-dcnode-id="1530" instrument_node="">The killings of Michael Brown, Eric Garner and Freddie Gray triggered protests not just in their home states but worldwide, with the campaign group Black Lives Matter emerging to protest the ongoing deaths at the hands of US police. The Oxford Union hosted a packed debate on whether the US is&nbsp;</span></span><i data-dcnode-id="1527" style="color:var(--color-text);font-size:1rem;"><span data-dcnode-id="1528" instrument_node="">“institutionally racist”</span></i><span data-dcnode-id="1525" style="color:var(--color-text);font-size:1rem;"><span data-dcnode-id="1526" instrument_node="">earlier this year, and the deaths, protests and trials resulting from the killings have all made regular headline news.</span></span></p><span data-dcnode-id="1523" instrument_node="">
</span><div class="article__text text" data-dcnode-id="1341"><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1521" instrument_node="">What has received far less attention has been the continued deaths at the hands of UK state officials. In March, the Institute for Race Relations published an in-depth&nbsp;</span><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mail.rttv.ru%3A444/owa/misedova%40rttv.ru/redir.aspx%3FC%3DK6M1vPwhF0KlGiKBRAdL4XErPo9cX9IIKvwnK3i9DrssjhZnlmXaKIab84fQATnkpqroDgkNWgY.%26URL%3Dhttp%253a%252f%252fwww.irr.org.uk%252fnews%252fdying-for-justice%252f"><span data-dcnode-id="1520" instrument_node="">report</span></a><span data-dcnode-id="1518" instrument_node="">&nbsp;on 509 people of color who died in suspicious circumstances between 1991 and 2014 whilst in the custody of police, prison or immigration officers. Their analysis of these deaths – which averaged almost one per fortnight over the period covered – showed that a large number occurred after excessive use of force by the authorities, and an even larger number involved a culpable lack of care. Perhaps even more damning, the report concluded that&nbsp;</span><em data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">“lessons are not being learnt; people die in similar ways year on year.”</span></em></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1513" instrument_node="">But the big difference that emerges from the US is the handling of the officers involved. Officers stood trial following all three of the big recent cases from the US – even if, infamously, they have all so far been found not guilty. In the 509 cases examine by the IRR, however, a mere five cases – less than 1 percent – led to prosecutions – with not a single conviction. This is despite inquests recording verdicts of unlawful killing in over a dozen cases. Indeed, of the thousands of deaths in custody that have occurred since the late 1960s (current levels are around&nbsp;</span><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mail.rttv.ru%3A444/owa/misedova%40rttv.ru/redir.aspx%3FC%3DK6M1vPwhF0KlGiKBRAdL4XErPo9cX9IIKvwnK3i9DrssjhZnlmXaKIab84fQATnkpqroDgkNWgY.%26URL%3Dhttp%253a%252f%252fnews.bbc.co.uk%252f1%252fhi%252fuk%252f7005556.stm"><span data-dcnode-id="1512" instrument_node="">600 per year</span></a><span data-dcnode-id="1510" instrument_node="">), only one single case, that of David Oluwale in 1969, has resulted in the conviction of an officer.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1507" instrument_node="">One case which clearly illustrates the difficulties faced by families of the victims in their struggle for justice is that of Habib&nbsp;</span><em data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">“Paps”</span></em><span data-dcnode-id="1504" instrument_node="">&nbsp;Ullah.</span></p><span data-dcnode-id="1502" instrument_node="">
</span><div class="article__cover" data-dcnode-id="1497"><span data-dcnode-id="1501" instrument_node="">
</span><div class="media" data-dcnode-id="1499"><img alt="Image from justice4paps.wordpress.com" class="read-more__cover lazyautosizes lazyloaded" data-dcnode-id="1500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdni.rt.com/files/opinionpost/3e/d7/d0/00/habib-ullah-1st-demo9.jpg&amp;raw"></div><span data-dcnode-id="1498" instrument_node="">
</span></div><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1495" instrument_node="">Habib and two of his friends were pulled over by police in High Wycombe, near London, on July 3, 2008. Habib was peaceful and compliant with the police, who he allowed to search him. However, when he was asked to open his mouth, he turned his back on them. That was the trigger for a vicious assault. Without warning, one officer, DS Liles, punched him in the back with maximum force, at which point four officers set upon him. Over the course of the next 10 minutes, Habib was subjected to further blows, knee strikes, a finger in his eye socket, the squeezing of his throat, and the full bodyweight of an officer on top of him whilst face down on the ground, along with a variety of&nbsp;</span><em data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">“pain compliance”</span></em><span data-dcnode-id="1492" instrument_node="">&nbsp;techniques. At one stage, DS Liles shouted to his colleagues:&nbsp;</span><em data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">“Break his arm.”</span></em></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1487" instrument_node="">Witnesses were screaming at the officers that they were strangling him, with another witness describing it as like something from a horror film. By the end of the assault, Habib had lost consciousness, with officers noting that his arm dropped to the floor when released, and that his eyes were motionless when his eyelids pulled back. Nevertheless, the police waited a further 10 minutes before calling an ambulance. Witnesses spoke of the police&nbsp;</span><em data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">“standing around”</span></em><span data-dcnode-id="1484" instrument_node="">; no CPR or mouth-to-mouth resuscitation was given to Habib, he was not put into a full recovery position, and his pulse was not taken: the officers all claimed that they believed Habib had been&nbsp;</span><em data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">“faking it.”</span></em><span data-dcnode-id="1481" instrument_node="">&nbsp;When an ambulance was finally called, the police gave the code B1, for a non-life threatening situation; by the time it arrived, witnesses – including the officers themselves – had confirmed Habib had been making very strange coughing sounds with his face turning first blue and then grey. Those sounds, it now seems clear, were almost certainly his death rattle. The small wrap of drugs which Habib had in his mouth had got lodged in his throat during the attack which, combined with likely&nbsp;</span><em data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">“positional asphyxia”</span></em><span data-dcnode-id="1478" instrument_node="">&nbsp;caused by the restraint, had caused him to suffocate.</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">The family have had to wait seven years until the inquest was finally held in February this year for this account of Habib’s death to finally emerge. Yet the initial police statements, written by the five officers involved immediately after Habib’s death, had pretty much admitted the full story. So what happened in the intervening seven years?</span></p><span data-dcnode-id="1473" instrument_node="">
</span><blockquote data-dcnode-id="1461"><p data-dcnode-id="1467"><span data-dcnode-id="1472" instrument_node="">Last few days of inquest &amp; legal submissions going in before Coroner sums up &amp; gives directions tmrw&nbsp;</span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/7YearsNoJustice%3Fsrc%3Dhash"><span data-dcnode-id="1471" instrument_node="">#7YearsNoJustice</span></a><a data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//t.co/tg84X6Z2gO"><span data-dcnode-id="1469" instrument_node="">pic.twitter.com/tg84X6Z2gO</span></a></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1465" instrument_node="">— Justice4Paps (@Justice4Paps)&nbsp;</span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/Justice4Paps/status/570312161429483520"><span data-dcnode-id="1464" instrument_node="">24 февраля 2015</span></a></p></blockquote><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Following Habib’s death being confirmed in the hospital, the Independent Police Complaints Commission (IPCC) was brought in to conduct an investigation, as is the usual practice following a death in custody. But those initial statements made by the officers were not the ones that were handed to the IPCC.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Rather, what happened is that senior police officers, members of the Police Federation, and a police solicitor oversaw a process in which the officers were instructed to rewrite their statements. References to the compliance of Habib and his friends; to the amount of force used by the police; to Habib’s condition (including his going limp and his strange breathing); to warnings from witnesses that Habib was being strangled and even to the presence of some of the witnesses were all removed from the final statements. It is entirely clear that senior officers, the Police Federation and the police solicitor were actively instigating a cover-up, in which the IPCC was being deliberately misled as to what was done to Habib, the warning signs about his condition, and even as to who witnessed the event.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">At first, the cover-up worked. The IPCC investigation exonerated all the officers involved and concluded that no wrongdoing had taken place (none that is except for failing to inform Habib’s family of his death promptly enough, exhibiting a disregard for the family’s welfare that seems to be disgracefully common in such cases). Two years later, however, when the inquest began, the truth about the redacting of the statements began to emerge. Under cross-examination – when asked why so many relevant details now coming out were not included in the initial statements – one of the officers gave the game away. The inquest was suspended whilst the IPCC re-opened their investigation. The new investigation was to look into not only whether the original findings were affected by the new evidence, but also into whether the rewriting of the statements itself constituted wrongdoing.</span></p><span data-dcnode-id="1451" instrument_node="">
</span><div class="article__cover" data-dcnode-id="1446"><span data-dcnode-id="1450" instrument_node="">
</span><div class="media" data-dcnode-id="1448"><img alt="Image from justice4paps.wordpress.com" class="read-more__cover lazyautosizes lazyloaded" data-dcnode-id="1449" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdni.rt.com/files/opinionpost/3e/d7/d0/00/vigil-2010-voice-of-the-youth.jpg&amp;raw"></div><span data-dcnode-id="1447" instrument_node="">
</span></div><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">This new investigation, amazingly, took the IPCC a full three years. The final report – which has still not been published – concluded that the case should be referred to the Crown Prosecution Service (the CPS) for criminal prosecution of the officers involved; charges to be considered included misconduct in public office, assault, intention to pervert the course of justice and perjury. Months passed – until, in August 2014, the CPS announced that it did not intend to prosecute a single one of the officers involved.</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">But that was not the end of the matter. An inquest had still to take place, and it was announced that this would be held in February 2015. If this inquest resulted in a verdict of unlawful killing, the potential for a criminal prosecution would be reopened.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1438" instrument_node="">As the inquest unfolded, the likelihood of this outcome seemed to grow. One expert witness after another concluded that the officers’&nbsp;</span><em data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">“restraint”</span></em><span data-dcnode-id="1435" instrument_node="">&nbsp;significantly contributed to Habib’s death. Under cross-examination, even the police’s own preferred specialist – the appropriately named Dr Bleetman – eventually had to accept this (a finding he had denied in his initial report). Police trainers testified that many of the strikes and&nbsp;</span><em data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">“compliance techniques”</span></em><span data-dcnode-id="1432" instrument_node="">&nbsp;used by the officers were not approved, and even those that were should not have been administered in those circumstances – that is, without warning against a passive victim. It was revealed that, despite officers’ claims to be trying to open Habib’s mouth, some of the techniques used are actually deigned to&nbsp;</span><em data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">close</span></em><span data-dcnode-id="1429" instrument_node="">&nbsp;the mouth. The evidence of the inquest revealed, overwhelmingly, that the assault had been unlawful and had, in part at the very least, led to Habib’s death.</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1426" instrument_node="">After a month taking evidence, the jury deliberated. Their highly critical&nbsp;</span><a data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mail.rttv.ru%3A444/owa/misedova%40rttv.ru/redir.aspx%3FC%3DK6M1vPwhF0KlGiKBRAdL4XErPo9cX9IIKvwnK3i9DrssjhZnlmXaKIab84fQATnkpqroDgkNWgY.%26URL%3Dhttp%253a%252f%252fwww.bucksfreepress.co.uk%252fnews%252f11828604.Full_Habib_Ullah_verdict__jury_criticises__poorly_managed__restraint%252f"><span data-dcnode-id="1425" instrument_node="">narrative</span></a><span data-dcnode-id="1423" instrument_node="">&nbsp;concluded:&nbsp;</span><em data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">“Several officers recognised some signs associated with abnormal breathing but no practical assistance was offered. Valuable time was lost due to the fact that the officers believed him to be feigning unconsciousness. Once Mr Ullah was unconscious rigorous monitoring should have been undertaken. The jury believes that the level of monitoring was inadequate. Furthermore the jury considered that the incident was poorly managed. In particular the lack of communication and clear commands by a leading officer resulted in an uncoordinated and ineffective restraint.”</span></em><span data-dcnode-id="1420" instrument_node="">&nbsp;Yet they did not reach a verdict of unlawful killing; rather they recorded&nbsp;</span><em data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">“death by misadventure.”</span></em><span data-dcnode-id="1417" instrument_node="">&nbsp;The last chance for a criminal prosecution was over; the officers who had just been shown to have launched an unprovoked attack on Habib and then left him to die would walk free.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><div class="article__cover" data-dcnode-id="1410"><span data-dcnode-id="1414" instrument_node="">
</span><div class="media" data-dcnode-id="1412"><img alt="Image from justice4paps.wordpress.com" class="read-more__cover lazyautosizes lazyloaded" data-dcnode-id="1413" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdni.rt.com/files/opinionpost/3e/d7/d0/00/vigil-2011-a-moments-silence-small.jpg&amp;raw"></div><span data-dcnode-id="1411" instrument_node="">
</span></div><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">These are the battles which families of victims face in case after case in this country: uphill struggles even just to find out what happened, endless delays, and then total lack of accountability or justice at the end of it all. The whole labyrinthine system is a masterclass in obfuscation and the perversion of justice under the guise of bureaucratic procedures. And every step of the way, the institutions involved emerge complicit in protecting the impunity of the police.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Firstly, the police themselves and the Police Federation. It was senior police officers and Police Federation members who stepped in to ensure that the original police statements were doctored to protect the officers. Yet they have never been called to account for their actions.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Secondly, the IPCC. Established in 2004 to replace the entirely discredited Police Complaints Commission, the IPCC was supposed to be an independent body which could be relied on to impartially investigate the police. Paps’ case shows how far this is from the truth. The senior officers and Police Federation members who instigated the cover-up were never the subject of the IPCC’s investigations, which focused solely on the officers involved in the death – despite the fact that the second investigation had a remit to specifically investigate that cover-up.</span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1399" instrument_node="">Furthermore, the fact that the scene was not treated as a crime scene, and that the officers were interviewed not as suspects but as witnesses is indicative of the bias that is at the very heart of the IPCC. These decisions – which are standard practice when investigating custody deaths – reveal that, from the very outset, the IPCC’s assumption is that no crime has been committed, and the idea that the officers involved might be responsible for the death is not even a possibility. Deaths in custody are treated not as crimes, but, at worst, as tragic accidents. This goes beyond the concept of&nbsp;</span><em data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">“innocent until proven guilty”</span></em><span data-dcnode-id="1396" instrument_node="">; the IPCC, begins by assuming there is not even anything to be guilty&nbsp;</span><em data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">of</span></em><span data-dcnode-id="1393" instrument_node="">. And inasmuch as there is any case to answer, it is only ever for the officers on the ground to answer – never their superiors.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1390" instrument_node="">None of this should be surprising, however, given the composition of the IPCC: eight out of its nine most senior members are themselves former police officers. Some independence. In 2012, the IPCC was even&nbsp;</span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mail.rttv.ru%3A444/owa/misedova%40rttv.ru/redir.aspx%3FC%3DK6M1vPwhF0KlGiKBRAdL4XErPo9cX9IIKvwnK3i9DrssjhZnlmXaKIab84fQATnkpqroDgkNWgY.%26URL%3Dhttp%253a%252f%252fwww.theguardian.com%252fuk%252f2012%252fjun%252f28%252fmark-duggan-coroner-police-watchdog"><span data-dcnode-id="1389" instrument_node="">threatened</span></a><span data-dcnode-id="1387" instrument_node="">&nbsp;with contempt of court proceedings by a coroner following its refusal to hand over key evidence during the Mark Duggan case. The IPCC is clearly unable to act as the independent watchdog it proclaims to be; indeed, in 2013 a parliamentary inquiry concluded that the IPCC&nbsp;</span><em data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">“has neither the powers nor the resources that it needs to get to the truth when the integrity of the police is in doubt.”</span></em></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1382" instrument_node="">Thirdly, the CPS. The decision not to prosecute the officers – after the IPCC had handed them detailed evidence of assault, perjury, and intent to pervert the course of justice – can only be understood in terms of an institutional determination to protect the police from prosecution at all costs. The evidence to mount a prosecution clearly&nbsp;</span><em data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">was</span></em><span data-dcnode-id="1379" instrument_node="">&nbsp;there. Even the police officers themselves admitted that the passages they removed from their statements were relevant and should have been included. Yet, as one officer noted at the inquest:&nbsp;</span><em data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">“The Crown Prosecution Service concluded we were looking to make the evidence more accurate and not wishing to mislead people.”</span></em><span data-dcnode-id="1376" instrument_node="">&nbsp;Given what was removed – details of the assault, details about Habib’s condition, details of other witnesses – even the IPCC concluded there was no way that making these omissions could have made the evidence ‘more accurate’.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1373" instrument_node="">But again, the CPS have form in this regard. In 1999, a government inquiry conducted by Gerald Butler was highly critical of the CPS’s reluctance to prosecute police officers involved in custody deaths. Since then, little has changed. In 2011, Janet Alder made history as the first person ever to take the CPS to court. Janet’s brother had died in police custody in Hull in 1998 and, as ever, the CPS refused to prosecute the officers involved. Four years later, after massive campaigning and evidence-gathering by the family, the CPS did eventually bring a case against five of the officers – but, it seems, deliberately bungled the case. Key pieces of evidence were not submitted, and others were conflated and thrown out. As Janet Alder said:&nbsp;</span><em data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">“I don’t think it’s incompetence, because they’ve been prosecuting cases for hundreds of years… I think the CPS from the beginning had absolutely no intention whatsoever of prosecuting these officers. They’d proved that for four years. ”</span></em></p><span data-dcnode-id="1369" instrument_node="">
</span><div class="article__cover" data-dcnode-id="1364"><span data-dcnode-id="1368" instrument_node="">
</span><div class="media" data-dcnode-id="1366"><img alt="Image from justice4paps.wordpress.com" class="read-more__cover lazyautosizes lazyloaded" data-dcnode-id="1367" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdni.rt.com/files/opinionpost/3e/d7/d0/00/anniversay-vigil4-small.jpg&amp;raw"></div><span data-dcnode-id="1365" instrument_node="">
</span></div><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Between them, these institutions – the Police Federation, the IPCC (and its predecessor) and the CPS – have shielded the police from justice for decades. This shielding has allowed a culture of impunity to persist and grow where officers believe they will never be held to account for their actions. What was particularly revealing about Habib’s inquest was that the more senior the officers involved, the more brazen and vicious were their actions.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">The most senior officer, DS Liles, with eighteen years experience, was the one who initiated and led the attack itself, but also who showed the least remorse and the most arrogance subsequently, telling the jurors he would act in just the same way again. His younger colleagues, in contrast, were clearly worried about what had happened: one, PC Pomery, confessed to a colleague that he was worried he had gripped Habib’s throat too hard, for example. Liles clearly knew, however, that they had nothing to worry about. He knew they would be protected.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Their victim was well chosen. Many of the suspicious deaths in custody involve members of vulnerable groups who are already treated with contempt by society. Victims often have mental health problems; in Habib’s case, he was a drug user (a point which the officers never failed to mention in their testimonies at the inquest). The officers knew, it seems, that such a character – and a Muslim to boot – could hope for little sympathy from the jury. They may not have expected him to die from the attack – but the point is, they knew they could attack him with impunity, breaking every rule in the book. And those who had been there the longest, knew this the most clearly.</span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1353" instrument_node="">But for the family of Habib&nbsp;</span><em data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">“Paps”</span></em><span data-dcnode-id="1350" instrument_node="">&nbsp;Ullah – and for many others – the struggle for justice continues. The police’s internal gross misconduct case is due to take place in June; it will be one of the first ever to be held in public. In addition, the family have instigated a civil claim against Thames Valley Police on the basis of assault and breaches of the Human Rights Act Article 2, the Right to Life.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1347" instrument_node="">Over the past year, Prime Minister David Cameron has constantly declared his undying commitment to the&nbsp;</span><em data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">“rule of law.”</span></em><span data-dcnode-id="1344" instrument_node="">&nbsp;Yet while his own police force retain the level of impunity they currently enjoy, the notion remains a total fiction.</span></p><span data-dcnode-id="1342" instrument_node="">
</span></div><span data-dcnode-id="1340" instrument_node="">
</span></div><span data-dcnode-id="1337" instrument_node="">
</span><footer class="entry-meta" data-dcnode-id="1309"><span data-dcnode-id="1336" instrument_node="">
</span><span class="post-format-link" data-dcnode-id="1333"><a data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/" rel="bookmark" title="Permalink to "><span data-dcnode-id="1335" instrument_node="">Standard</span></a></span><span data-dcnode-id="1332" instrument_node=""> </span><span class="sep" data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node=""> | </span></span><span data-dcnode-id="1329" instrument_node="">
</span><span class="cat-links" data-dcnode-id="1318"><span data-dcnode-id="1328" instrument_node="">

</span><article class="post-4697 post type-post status-publish format-standard hentry category-articles category-police-brutality-uk category-uncategorized" data-dcnode-id="1064" id="post-4697"><span data-dcnode-id="1303" instrument_node="">

</span><div class="date-meta" data-dcnode-id="1297"><span data-dcnode-id="1301" instrument_node="">
</span><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/2020/06/04/how-humberside-police-cps-uk-govt-conspired-to-cover-up-racist-killing-of-christopher-alder/" rel="bookmark"><span data-dcnode-id="1300" instrument_node="">06.04.20</span></a><span data-dcnode-id="1298" instrument_node="">
