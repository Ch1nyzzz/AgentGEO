</span><header class="entry-header" data-dcnode-id="2739"><span data-dcnode-id="2744" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2741"><a data-dcnode-id="2742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/2022/02/19/the-real-role-of-the-uk-monarchy/" rel="bookmark"><span data-dcnode-id="2743" instrument_node="">The real role of the UK&nbsp;monarchy</span></a></h1><span data-dcnode-id="2740" instrument_node="">
</span></header><span data-dcnode-id="2737" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2616"><span data-dcnode-id="2736" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2733"><a data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrookdotcom.files.wordpress.com/2022/02/queen-royal-mint.jpg"><img alt="" class="wp-image-4937" data-attachment-id="4937" data-comments-opened="1" data-dcnode-id="2735" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="queen-royal-mint" data-large-file="https://danglazebrookdotcom.files.wordpress.com/2022/02/queen-royal-mint.jpg?w=585" data-medium-file="https://danglazebrookdotcom.files.wordpress.com/2022/02/queen-royal-mint.jpg?w=300" data-orig-file="https://danglazebrookdotcom.files.wordpress.com/2022/02/queen-royal-mint.jpg" data-orig-size="982,726" data-permalink="https://danglazebrook.com/queen-royal-mint/" sizes="(max-width: 982px) 100vw, 982px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrookdotcom.files.wordpress.com/2022/02/queen-royal-mint.jpg%3Fw%3D982&amp;raw" srcset="https://danglazebrookdotcom.files.wordpress.com/2022/02/queen-royal-mint.jpg 982w, https://danglazebrookdotcom.files.wordpress.com/2022/02/queen-royal-mint.jpg?w=150 150w, https://danglazebrookdotcom.files.wordpress.com/2022/02/queen-royal-mint.jpg?w=300 300w, https://danglazebrookdotcom.files.wordpress.com/2022/02/queen-royal-mint.jpg?w=768 768w"></a></figure><span data-dcnode-id="2732" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">Part one: counter-revolutionary backstop</span></p><span data-dcnode-id="2729" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2728"></p><span data-dcnode-id="2727" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2724"><em data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Originally published in Counterpunch magazine, 2021</span></em></p><span data-dcnode-id="2723" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">The death of Elizabeth Windsor’s husband Philip Mountbatten earlier this year prompted an establishment-led frenzy of monarchism across Britain, with wall-to-wall sycophantic TV and radio coverage and Covid public information boards replaced with Philip’s portrait. The standard view of the British monarchy is that they are no more than symbolic figureheads lacking any real power; mere ornaments adorning the British political system. But the truth is that Philip and his family were and are crucial pillars in the maintenance of the class power of the British imperialist bourgeoisie, both domestically and globally.&nbsp;</span></p><span data-dcnode-id="2720" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2712"><span data-dcnode-id="2719" instrument_node="">To begin with, the Sovereign still has a significant place in the British political system. The government is still known as ‘her majesty’s government,’ there to govern on her behalf. It is she who appoints the prime minister, not just in the UK, but in Australia, New Zealand, Canada and twelve other countries. And it is only by convention that she appoints the leader of the winning party following an election – as Gough Whitlam discovered in 1975 when the monarch’s representative in Australia dismissed him from office, despite his party having won the previous year’s elections, and appointed in his place the leader of the </span><em data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">losing </span></em><span data-dcnode-id="2716" instrument_node="">party, deeming the winners too radical. In the UK, she has weekly meetings with the prime minister to discuss government business, and her approval is required before any legislation passed by parliament can become law. Whilst it is true that this approval – known as Royal Assent – has been granted to all Acts of Parliament since 1707, what is more commonly withheld is the lesser known ‘Queen’s Consent.’ For bills affecting the Queen’s private interests, as well as those impinging on the royal prerogative powers (executive powers which can be used without consulting parliament), the Queen’s permission must be granted </span><em data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">before </span></em><span data-dcnode-id="2713" instrument_node="">it can be put to parliament. Such ‘Queen’s Consent’ (or ‘Prince’s Consent’ in the case of bills affecting the Prince of Wales’ private interests) was sought 146 times between 1970 and 2013 according to former government minister Norman Baker. Any bill that might affect the income from the monarch and her son’s private estates, for example (the Duchy of Cornwall and the Duchy of Lancaster, comprising some of the most lucrative real estate in the London, the Strand, as well as Balmoral and Sandringham) is subject to veto by the Crown. And here, unlike for Royal Assent, the Queen is neither obliged by convention to give her consent, nor to act in accordance with advice from her ministers – she is free to use her discretion. All laws affecting income or land tax, for example, or employment rights, require Queen’s Consent, as did the 2006 Animal Welfare Act, because it granted inspectors the right to go onto private estates to investigate claims of animal abuse. To prevent the bill being vetoed by the Crown, the Labour government agreed that the Windsors’ private estates would be exempt from the legislation – literally putting them above the law. Queen’s Consent even had to be sought for the 2008 Child Maintenance Act as it affected payments to the Queen’s private staff. And the Queen is uniquely exempt from a 1973 Act of Parliament requiring shareholders to identify themselves, allowing her to anonymously hold shares in companies of dubious repute. This exemption may well have been a condition for giving consent to the bill in the first place – we cannot know for sure, because no record is kept of when and how Queen’s Consent is used, and the negotiations go on behind closed doors before the first draft of the bill is ever published. &nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="2711" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">&nbsp;&nbsp;&nbsp; ‘Queen’s Consent’ is not only a tool for the personal enrichment of the Windsors, however. Bills which affect the Royal Prerogative powers (powers exercised on behalf of the monarch by government ministers) also require Queen’s Consent, and in this case, unlike in the case of bills where her personal interests are involved, the Queen will simply give or withhold consent according to advice from her ministers. This allows the government to use the Queen to prevent certain private members’ bills, for example, from even being discussed in parliament. Norman Baker’s excellent book on royal powers, “And What Do You Do?”, from which much of the material for this article was garnered, notes that the Military Action Against Iraq (Parliamentary Approval) Bill in 1999 was blocked after the Queen withheld her consent, as was the 1964 Titles (Abolition) Bill and the 1969 Rhodesia Independence Bill, amongst others.&nbsp;</span></p><span data-dcnode-id="2708" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">But this use of Queen’s Consent is just one way in which the residual powers of the monarch are used by the government to avoid public or parliamentary debate and scrutiny. The Royal Prerogative powers, exercised by government ministers on behalf of the monarch, mainly pertain to foreign relations, and can be exercised without the consultation of parliament. This allows the prime minister to deploy troops and agree treaties without even informing, let alone consulting, parliament. The use of the Royal Prerogative occurs through the Privy Council, a group of current and former members of the government, senior members of the opposition, and senior members of the royal family, including the Queen. Members are sworn to secrecy, and the body has the power to secretly create legislation, known as ‘Orders of Council’. In the first half of 2000, over 250 such Orders were issued, around ten per week – including, says Baker (who was made a Privy Councillor by virtue of his position a junior minister in the Conservative-Liberal Coalition government) “an Order relating to the Saint Helena Act 1833, an amendment to a naval pension scheme, an Order relating to sanctions on Yemen – the sort of thing thing that the Commons ought to have had the chance to debate – and an amendment to the misuse of drugs act 1971, which I knew nothing about despite having been the drugs minister for a year until shortly before.” And these were just those passed in one meeting. Baker broke his oath to reveal this information, but such revelations are highly unusual, and the passage of such laws willo rarely reach the public domain.&nbsp;</span></p><span data-dcnode-id="2705" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">Yet the most important aspect of monarchical power in British politics is not the Windsors’ role in day-to-day government so much as their function as a kind of ‘counter-revolutionary backstop’. Globally, this is an ongoing and active role, as will be explored in part two of this series. In the domestic arena, however, it is more as a potential, a ‘force of last resort,’ should popular unrest ever get seriously out of hand.</span></p><span data-dcnode-id="2702" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2697"><span data-dcnode-id="2701" instrument_node="">Of fundamental importance here is the oath of loyalty sworn by members of the armed forces. This oath commits them to the defence, not of the constitution or the elected parliament, but of the monarch and her successors, and to do so “against all enemies,” including, therefore, domestic enemies – such as, for example, any future parliament that attempted to abolish them. It also commits them to “obey all orders of her majesty, her heirs and successors.” Were, for example, a genuinely radical parliament to be elected in Britain, the armed forces would be </span><em data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">a priori </span></em><span data-dcnode-id="2698" instrument_node="">committed to support an armed overthrow of such a parliament should the monarch command them to do so. Baker suggests that we “suppose Hitler had invaded England, and suppose Edward the Eighth, with his Nazi sympathies, were restored to the throne as a sort of puppet, a scenario that certainly existed in Hitler’s mind. If the restored Edward the Eighth had called on the armed forces to lay down their weapons and accept a sort of Vichy Britain with him at the head, they may well have done so, whatever the elected government may have thought. I know members of the armed forces who take their oath to the Queen very seriously, and for them this allegiance trumps any democratic considerations. The fact that members of the royal family occupy senior positions right across the military only reinforces this.”</span></p><span data-dcnode-id="2696" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">Nor is it only the armed forces who are made to swear such an oath – it is also a condition of entry into the British police force, judiciary, and parliament, as well as (since 2003) British citizenship itself, for those applying for it.&nbsp; This means that when (and it is indeed a matter of when, not if) the proverbial shit hits the fan in the UK, should the ruling class feel the need to impose military rule and rule by diktat, this oath ensures the army, the police and the entire criminal justice system, will be committed in advance to support such a measure, so long as the Windsors are on board. As Baker has noted, “the Queen herself on her accession took an oath to govern the country and uphold the rights of bishops. Parliamentarians take an oath to the Queen. Nobody takes an oath to uphold democracy.”</span></p><span data-dcnode-id="2693" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">The key to understanding the role of the monarchy in a bourgeois society like Britain is to go back to its origins, which lie, not deep in antiquity, but in the tumultuous events of the seventeenth century. There has not been seamless continuity or evolution when it comes to royal power, but rather three distinct major monarchical epochs, separated by violent upheavals. First was the feudal monarchy that existed prior to 1485, in which the monarchy was the head of an aristocratic-ruled state. Second was the monarchy that was established under Henry the Seventh in 1485, at the head of an alliance between the aristocracy and the rising bourgeoisie, an era that was decisively ended with the execution of Charles I and the creation of the English republic in 1649. Our current monarchy, under bourgeois domination, took shape between 1660 and 1689, and though it was ushered in with the so-called ‘Restoration’ of Stuart power, when the deposed Charles’ son, Charles II, was invited to take the throne, it was in reality an entirely new institution (as Charles’ brother James II learnt to his cost when he attempted to challenge the new dispensation and was swiftly replaced). The question is – why did this third epoch of monarchism even come about? When the bourgeoisie had so decisively defeated the aristocratic power that the monarchy represents, why did they then re-create the institution? And the answer is – the fear of popular revolution.&nbsp;</span></p><span data-dcnode-id="2690" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2682"><span data-dcnode-id="2689" instrument_node="">Cromwell had mobilised the masses in his war against Charles I, but their demands – as exploited, land hungry, peasants, and even as small traders and artisans – went far beyond his as a merchant landowner. What Cromwell sought was not the abolition of exploitation, but the </span><em data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">extension</span></em><span data-dcnode-id="2686" instrument_node=""> of the absolute right to exploit, from the aristocracy to the bourgeoisie, via an end to the aristocratic monopolies on foreign trade and land ownership. Radical trends within the republican movement, however – including, crucially, within Cromwell’s army itself, such as the Levellers – sought genuine social equality – equal access to land, political participation, and a toppling of the very hierarchical pyramid that Cromwell had been fighting for the right to ascend. Cromwell had their leaders executed but the fear of a resurgence remained – and in the late 1650s, when rising prices were leading to growing unrest and agitation, the bourgeoisie reasoned that, though their power seemed secure </span><em data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">for now</span></em><span data-dcnode-id="2683" instrument_node="">, the time may yet come when they would need to call on the defeated aristocracy to help suppress a renewed popular uprising. And this is what the current British monarchy is: the artificial keeping alive of feudal remnants (along with their symbolic counterpart in the human psyche) as a potential counter-revolutionary ally of an insecure bourgeoisie.&nbsp;</span></p><span data-dcnode-id="2681" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">That this is so can be seen clearly in the waxing and waning of royal privilege over the years. Here, a clear pattern emerges whereby, in periods where the bourgeoisie feel more secure, and less in need of their feudal allies, royal privileges are limited or revoked; whilst in periods of real or potential unrest, they are extended. If the army are loyal to the monarch, the ruling class need to be sure that the monarch is willing to do its bidding. And that costs money.&nbsp;</span></p><span data-dcnode-id="2678" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">In the years following the so-called ‘Glorious Revolution,’ however – when, in 1688, Parliament called on the Dutch King William of Orange to depose King James II and take the crown for himself, on the strict understanding that his position would be subordinate to Parliament – bourgeois rule seemed impregnable. The 1690s saw the formation of the Bank of England, the tearing up of the Royal trading monopolies – heralding a commercial frenzy, especially in the trafficking of kidnapped Africans – and the dispossession of Ireland. With the English merchant class triumphant, they had little need to make concessions to a monarchy that, after all, they themselves had placed into position, and was effectively their mouthpiece. Thus, in 1697, did the Crown agree to surrender even the income it gained from the Duchy of Cornwall.&nbsp;</span></p><span data-dcnode-id="2675" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">This era of untrammelled security did not last long, however. The failure of William and Mary, as well as her sister Anne, to produce any surviving offspring, had led Parliament to pass the Act of Settlement in 1701, decreeing that the Crown would pass to the (Protestant) Hanoverians. Their claim to the throne by virtue of royal bloodline was shaky to say the least – but the newly empowered merchant class were determined to prevent a Catholic restoration, with all the resultant continental political realignments and reversals that would entail. This seemingly arbitrary passing around of the Crown for political convenience was a step too far for many, however, and the Jacobite movement – which called for the continuation of the Stuart monarchy, in line with established hereditary principles – was born. Thus it was in 1721, two years after the third major Jacobite rising, at a time when the schemes of the government were under serious threat from inter-ruling class rivalry, that the mechanism of ‘King’s Consent’ – whereby the monarch gets veto power on any bill affecting his private interests – was introduced.&nbsp;</span></p><span data-dcnode-id="2672" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Once the threat dissipated, however, the monarch’s fortunes were reversed. In 1745, the Jacobite movement was decisively defeated, and the bourgeois ascendancy seemed, once again, triumphant – and in no need of feudal backup.&nbsp; Thus, in 1760, did the entirety of the Crown estates (with the supposed exception of the Duchies of Cornwall and Lancaster) pass into the hands of the state, finally stripping the king of his position as ‘landowner-in-chief,’ the basic tenet of monarchical power since 1066. It was not without some benefit for the monarch, as, along with the estates, he also gave up responsibility for funding the growing costs of the state, which would now be taken on by the government directly. The king also negotiated a hefty annual subsidy from the state coffers, set initially at £800,000 per year and still in operation today, known as the ‘civil list.’ Yet the ban on the monarch’s ownership of private property that accompanied the deal was, by any standards, a reduction in power. It was not to last.&nbsp;</span></p><span data-dcnode-id="2669" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2661"><span data-dcnode-id="2668" instrument_node="">The earth shattering events of the 1790s – in France and Haiti primarily, but with planet-wide reverberations that continue to this day – struck terror once again into the hearts of the English ruling class, and over the decades that followed, various forms of emergency rule and suspension of liberties became the norm. Lacking the legitimising cloak of liberal niceties, the legitimising cloak of regal bullshit took on a new importance for government. The monarch’s value to the imperilled bureaucracy grew, and the ban on his ownership of private property was lifted. And not only that – an argument was made that the Duchies of Lancaster and Cornwall were </span><em data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">already </span></em><span data-dcnode-id="2665" instrument_node="">private estates of the monarch, exempt from the 1760 agreement that surrendered the rest of the Crown estates. The reasoning? They had not been explicitly mentioned in that agreement, and were therefore not covered by them. The compelling legal argument that this was so precisely because, since 1697, the Duchies were </span><em data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">already </span></em><span data-dcnode-id="2662" instrument_node="">understood to be public assets (their income streams having been handed over at that date) was trampled underfoot by the cavalry charge of the counter-revolutionary war and its need for maximum unity against the Jacobins. Two hundred years later, the income streams from this desperate act of political expediency remain exceptionally lucrative: the holdings of the Duchy of Lancaster alone amount to over half a billion pounds, with annual profits reaching £20 million in 2018, and the Duchy of Cornwall not far behind, including a particular bonanza in 2012 from the auctioning of tungsten and iridium mining rights on Duchy land.&nbsp;&nbsp;</span></p><span data-dcnode-id="2660" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">The pattern continued throughout the nineteenth century. As tumult grew in Ireland, Jamaica and both rural and urban Britain between 1829 and 1831 – resulting in major concessions on all three islands – the Duchy of Lancaster was, in 1830, again exempted from a bill formalising the government takeover of royal income streams. As Baker noted, “with the great reform bill on the stocks, the government did not want to alienate the king unnecessarily.” The same year, the two Duchies also secured an exemption – alone in the country – from the abolition of the feudal practice of landowners taking over the estates of anyone who dies on their land without relatives. This would prove particularly lucrative for George VI, who got a bonanza from all those killed on Duchy land during World War Two, and continues to bring in additional income for the Windsors to this day.&nbsp;</span></p><span data-dcnode-id="2657" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">The Great Reform Act was eventually passed in 1832, successfully breaking the middle class-working class alliance that had shaken the country in previous years. The wealthier middle classes had been enfranchised by the Act, and now happily supported the repression of their erstwhile proletarian comrades. Bourgeois rule was secure, and again the need to buy royal favour declined. In 1842, income tax was introduced for the first time, and the monarch was not exempt. From now on, taxes would be paid not only on royal income – including on the civil list subsidy, and on Duchy profits – but on royal land and property also. This was confirmed in the Crown Private Estates Act of 1862 (during another period when the British ruling class were feeling secure, when the country’s industrial monopoly had birthed a labour aristocracy following the defeat of the Chartists).&nbsp; The Act was unambiguous: “The private estates of her majesty,her heirs or successors, shall be subject to all such rates, duties, assessments, and other impositions, parliamentary and parochial, as the same would have been subject to if the same had been the property of any subject of the realm.”&nbsp;</span></p><span data-dcnode-id="2654" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">Yet even during this period, royal privileges ebbed and flowed in line with the degree of feared unrest. In 1848, proletarian revolution broke out across the continent, and the Chartists planned a march on London. Although the demonstration was ultimately outnumbered by pro-government volunteers, the state took no chances, and shored up its favour with the King through the establishment of ‘Prince’s consent’, extending the existing veto rights over legislation affecting the King’s private interests to his eldest son. No legal justification for this anti-democratic provision was even attempted; threat of revolt demanded royal concessions, the practice was established, and that was that. Again, it is a practice that continues until today.&nbsp;</span></p><span data-dcnode-id="2651" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">In the period 1865-7, near-simultaneous risings again broke out again across Jamaica, England and Ireland. Then, In 1873, the great economic boom which had begun in the 1850s ground decisively to a halt, just when Britain had lost its industrial monopoly to Germany and the USA. The depression lasted until 1896, and a new wave of militant trade unionism amongst the lowest paid broke out. Foreseeing a time when the monarch’s collaboration in the suspension of civil government might be required, the government during this period ramped up the civil list payments, on the flimsiest of pretexts. Writes Baker, “As a result of Albert’s pleadings of poverty they [Victoria and Albert] were given more than they needed to enable Victoria to carry our her constitutional duties, but then hung onto the cash which had been obtained under false pretences and invested it in property.” In 1889, a parliamentary select committee noted that Victoria had siphoned off almost £1 million from her civil list ‘expenses,’ which had been used to purchase the private estates of Balmoral, Sandringham and Osborne (in the Isle of Wight). Philip Hall, in his book Royal Fortune, estimates that a total of £67million has been saved by the monarch from civil list payments over the last five reigns, making the MPs’ expenses scandal look like a parking violation. But the point is, this subsidy has been willingly granted by an insecure ruling class as an insurance policy against (so-called) democracy.&nbsp;&nbsp;</span></p><span data-dcnode-id="2648" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2643"><span data-dcnode-id="2647" instrument_node="">In the years before the First World War, this insecurity went into overdrive – and so too did the ‘insurance payments’ to the royals. Revolutionary trade unionism was spreading like wildfire across Britain, with major strikes taking place in key industries such as minings, docking, building and transport, many of them successful. The ruling class were terrified: Conservative cabinet minister Leo Amery recorded in his diary at the time that he went to purchase a revolver to arm himself against the revolutionary threat, but found they had all sold out. The value – and so the price – of royal backup thus increased again; already by 1903, Edward VII had wrangled his way out of paying income tax on his civil list payments (despite the existence of very clear laws on the matter), and in 1910 prime minister Lloyd George agreed to exempt the monarch from paying income tax </span><em data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">at all</span></em><span data-dcnode-id="2644" instrument_node="">. In 1913, this tax exemption was extended to the Duchy of Cornwall. Says Baker, “Despite the fact that the inland revenue had gone into the matter of the Duchy’s status quite exhaustively and concluded there was no case for its exemption from taxes, the government’s law officers, in a very short ruling, and one without any explanatory arguments, disagreed, and that was that.” In 1911, another unprecedented – and legally indefensible – ruling exempted royal wills from public scrutiny. To this day, royal wills are the only wills that can be kept private, enabling the extent of royal wealth to remain forever secret. This means that the amount of wealth stolen from civil list payments can be kept hidden, as can the extent of ‘gifts’ – which must, by law, be turned over to the state when given in connection with public duties – amassed by the monarch and her family. Says Baker, “if it became publicly known how much had been bequeathed, the public might begin to question afresh the level of taxpayers’ support the royal family benefits from, or indeed begin asking how it was possible to accumulate such wealth in their lifetimes without seemingly having any external means to do so.”&nbsp; The 1911 ruling thus effectively sanctioned the siphoning off of civil list payments for private gain, giving legal cover to what had already become standard practice. Thus, by the time of Elizabeth Windsor’s sister Margaret’s death in 2002, she was believed to have amassed a fortune of £20 million. “Where did Princess Margaret get £20 million from?,” asks Norman Baker, “Even the generous largesses provided by taxpayers through the civil list cannot explain that.” Elizabeth’s mother, meanwhile, is believed to have left a fortune of £70 million, well beyond what she is believed to have inherited herself. And yet her spending far exceeded the £634,000 per year she received from the civil list, her private staff wage bill alone coming to £1.5 million per year. Comments Baker, “What is certain is that the sealing of royal wills does not allow the proper checks to be made to ensure that what properly belongs to the state has not slipped across into private property [of the Windsors].”&nbsp;&nbsp;</span></p><span data-dcnode-id="2642" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Popular unrest did not cease in the years after the war, and there was genuine fear of Bolshevism spreading throughout Europe following the epic events in Russia. 1919 saw a police strike in Liverpool, the growth of the militant ‘tripartite’ alliance between the dockers, railwaymen and miners’ unions, and the establishment of a workers’ Soviet in Glasgow, prompting Lloyd George to send in the tanks. The price of royal backup appreciated further. In 1921, just as the ‘Geddes Axe’ fell, decimating public services, the Prince of Wales was granted further tax concessions, enabling him to stash away £1million by the time he became King Edward VIII in 1936. In the 1930s, too, as the Great Depression took hold, King George V stopped paying tax on Duchy of Lancaster profits, with his entire tax levy dropped in 1937. Writes Baker, “Overall in the interwar period, royal taxes dropped while those for everyone else rose. This dichotomy became even more pronounced during World War Two.”</span></p><span data-dcnode-id="2639" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">The end of the Second World War saw Soviet prestige at an all time high, a powerful workers’ movement (with military experience) across Europe, and anti-colonial insurgencies across the globe, a situation that largely pertained until well into the 1960s. In 1952, when Elizabeth Windsor took the throne, the civil list payments were extended from the monarch and her spouse to their entire extended family, today covering over 40 people. At the same time, the monarch was no longer required to pay tax on her investments. Up until George VI, monarchs had always paid such taxes, although George began the dubious practice of reclaiming it. In 2001, it was calculated that the Treasury had lost out an estimated £1 billion revenue in lost payments on the £200million stock market investment made by the Queen in 1952 alone. Also in 1952, it was agreed that the wages of workers employed on the upkeep of the palaces should be transferred from the monarch to the Ministry of Works, as well as further tax exemptions such as taxes on agricultural profits, a major windfall for the Duchies.&nbsp;</span></p><span data-dcnode-id="2636" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2631"><span data-dcnode-id="2635" instrument_node="">The era of neoliberalism, however, saw a reversal of workers’ power, and, especially after the defeat of the miners in 1985 and the dissolution of the USSR in 1991, bourgeois supremacy once again seemed guaranteed. The need for a royal coup seemed far off, and the period saw a corresponding limitation of handouts to the monarchy. In 1992, following a major fire at Windsor castle, the royals were left to fork out their own cash for the repairs, and a year later, Charles and Elizabeth actually started to pay income tax, including on their investment income. The Memorandum of Understanding that initiated this spelt out that this was a purely voluntary arrangement that the could rescind whenever they chose, but nevertheless, the fact it was agreed at all suggested that the royals had become aware that their financial privileges were now at risk. In 2000, the civil list payments were frozen for a period of ten years, with some expenditure previously paid for by government departments now to come out of those payments. This amounted to a real-terms cut, the closest the list had ever come to an </span><em data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">actual </span></em><span data-dcnode-id="2632" instrument_node="">cut.&nbsp;</span></p><span data-dcnode-id="2630" instrument_node="">
</span><p class="inline-ad-slot" data-adtags-visited="true" data-adtags-width="496" data-dcnode-id="2629" id="inline-ad-1" style="float:left;height:0px;margin:0 auto;overflow:hidden;width:496px;"></p><p data-adtags-visited="true" data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">The ‘neoliberal (domestic) peace’ did not last. The buildup to the war on Iraq would ultimately lead to the biggest ever demonstrations in British history, and the biggest backbench rebellion for 150 years. Luckily for the Blair government, the colonial left leadership of the Stop the War movement prevented this anger from being channelled into effective resistance, but such resistance had been a real possibility. Had even a fraction of the crowds that amassed in 2003 stayed for ongoing protest outside parliament, or heeded the anarchists’ calls for direct action at airbases, the situation could have quickly got out of hand. Thus in 2002, the era of containment of royal finances came to an end, and the convention banning the public from viewing royal wills was secretly – and without legal precedent or justification – made into law. Also during this period, some very dubious accounting practices – such as including the wages of 28 members of Charles’ personal staff, along with the jewellery, clothes, horses and bodyguards of his mistress Camilla, as tax deductible – were discretely ‘overlooked’ by the inland revenue. The result was that, by 2012, Charles was paying less than half a million pounds tax on £18 million of Duchy profits; the 1993 Memorandum of Understanding had now been virtually revoked in all but name.&nbsp;</span></p><span data-dcnode-id="2626" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">The 2007-8 financial crisis was the biggest financial crash since the Wall Street Crash of 1929, and triggered a global slump from which the world has still not recovered. The danger of mass unrest suddenly became very real. To add to the fears, the election of 2010 was indecisive, threatening political stability just as economic and social stability was already on a knife-edge. The coalition government that emerged took the opportunity to restore owning-class fortunes through a massive attack on public spending through their flagship policy of ‘austerity.’ Cuts led to riots in 2010 and in 2011 following the police execution of Mark Duggan in Tottenham, at the same time as uprisings across the Gulf threatened the ruling families placed in power by the British. The threat to bourgeois order was as high as it had been at any time since the miners’ strike. Emergency powers suddenly did not seem so unthinkable.&nbsp;</span></p><span data-dcnode-id="2623" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">Thus in 2011 was royal collaboration with such a path ensured by the biggest hike in royal finances since at least 1952. The Sovereign Grant Act finally overturned the 1760 deal with George III entirely, ushering in a massive and ongoing hike in taxpayer payments to the royals. For the first time since that deal, the link between royal fortunes and the Crown Estates was reestablished, with the civil list payments no longer based on an estimate (however fraudulent) of the legitimate expenses of the royals, but instead calculated as a proportion (15%, later increased to 25%) of the income from the (former) ‘Crown Estates’ that had been in effective public ownership since 1760, a massively retrograde step at a time of deepening mass poverty. In the first year – a time of severe wage cuts for the population at large – the civil list payments rose by well over 50% from just under £8million to almost £14 million. Similar rises followed year on year, taking the payment to a staggering £82.8 million by 2019, a more than tenfold increase from the pre-austerity amount. Furthermore, it was written into the Act that these payments could never be reduced, making permanent any temporary good fortune in the value of their estates, and immunising the royals against any collapse in the value of British real estate. The forthcoming auction of windfarm sites on Crown Estate land (which covers hundreds of miles of coastline) alone is likely to produce a windfall of hundreds of millions for the royals.&nbsp;</span></p><span data-dcnode-id="2620" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">&nbsp;&nbsp;&nbsp; Since the bourgeois monarchy was first established in 1660, then, the pattern has been clear: when the capitalist order is under threat, the stock of the royals – as the ultimate counter-revolutionary backstop and ‘legitimising’ force for the imposition of rule by decree – increases. When the order is secure, it declines. The fact that royal handouts have increased tenfold in recent years, then, should be seen as a sign not so much of a ruling class so powerful it can plunder public funds with impunity, but of one with a desperate fear of the future, and of the masses, and with a total lack of faith in its own ability to rule by consent. Either way, the case for republicanism has never been clearer.&nbsp;</span></p><span data-dcnode-id="2617" instrument_node="">
</span></div><span data-dcnode-id="2614" instrument_node="">

        	by </span><a class="url fn n" data-dcnode-id="2576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/author/danglazebrook2000/" rel="author" title="View all posts by G"><span data-dcnode-id="2577" instrument_node="">G</span></a><span data-dcnode-id="2575" instrument_node=""> </span></div><span data-dcnode-id="2573" instrument_node="">
</span></div><span data-dcnode-id="2570" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2564"><span data-dcnode-id="2569" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2566"><a data-dcnode-id="2567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/2021/07/30/why-i-quit-working-with-rt/" rel="bookmark"><span data-dcnode-id="2568" instrument_node="">Why I Quit Working with&nbsp;RT</span></a></h1><span data-dcnode-id="2565" instrument_node="">
</span></header><span data-dcnode-id="2562" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2492"><span data-dcnode-id="2561" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2556"><span data-dcnode-id="2560" instrument_node="">(Prologue to </span><em data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">Supremacy Unravelling: Crumbling Western Dominance and the Slide to Fascism</span></em><span data-dcnode-id="2557" instrument_node="">) </span></p><span data-dcnode-id="2555" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2552"><em data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">27th May 2020</span></em></p><span data-dcnode-id="2551" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="2548"><a data-dcnode-id="2549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrookdotcom.files.wordpress.com/2021/07/image.jpeg"><img alt="" class="wp-image-4911" data-attachment-id="4911" data-comments-opened="1" data-dcnode-id="2550" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image" data-large-file="https://danglazebrookdotcom.files.wordpress.com/2021/07/image.jpeg?w=275" data-medium-file="https://danglazebrookdotcom.files.wordpress.com/2021/07/image.jpeg?w=275" data-orig-file="https://danglazebrookdotcom.files.wordpress.com/2021/07/image.jpeg" data-orig-size="275,183" data-permalink="https://danglazebrook.com/image/" height="475" loading="lazy" sizes="(max-width: 714px) 100vw, 714px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrookdotcom.files.wordpress.com/2021/07/image.jpeg%3Fw%3D275&amp;raw" srcset="https://danglazebrookdotcom.files.wordpress.com/2021/07/image.jpeg 275w, https://danglazebrookdotcom.files.wordpress.com/2021/07/image.jpeg?w=150 150w" width="714"></a></figure><span data-dcnode-id="2547" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2542"><span data-dcnode-id="2546" instrument_node="">Many of the chapters in this book were originally published on </span><span class="skimlinks-unlinked" data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">RT.com</span></span><span data-dcnode-id="2543" instrument_node="">, the website of the Russian state’s English-language news channel RT (formerly Russia Today). Back in 2011, when the war on Libya was raging, RT’s coverage was a breath of fresh air. The major western news channels have never been much more than state propaganda outfits during times of war, and the NATO bombardment of Libya was no exception. Even Al Jazeera, the Qatari-owned channel that made its name with its no-holds barred coverage of the 2003 attack on Iraq, had seemingly cashed in its hard-won credibility as a voice speaking truth to power to become an unashamed mouthpiece of NATO. This should, perhaps, have been no surprise, given how deeply invested Qatar was in the NATO aggression, providing the foot soldiers and much of the training for the operation to kill Gaddafi and destroy the state he had built. But RT – despite Russian support for the UN Security Council resolution that paved the way for NATO’s attack – stepped into the vacuum created by Al-Jazeera’s conversion to the war party. Their uncompromising output combined reports on the brutal reality of NATO’s actions and allies with critical, forthright anti-war analysis of a type formerly relegated to the very margins of the internet.&nbsp;</span></p><span data-dcnode-id="2541" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">I had been recommended to the channel by my old friend and comrade Sukant Chandan, who had spent much of 2011 in Libya in solidarity with those resisting NATO’s criminal bombardment. My first interview with them seemed to go well, and received 39,000 views on youtube. Having until that point been the author of articles and leaflets that rarely went beyond the confines of the anti-war meetings and demos in which they were distributed, this was by far the biggest platform I had ever had. A few weeks later I was asked to appear again, and soon I was appearing every month or so. Later it was suggested to me that I pitch some articles for their website. I did, and they were accepted. I started writing regularly for them, and my broadcast appearances increased in frequency also. By 2013, my output had drawn the attention of Middle East Eye, who started to commission pieces from me as well. This writing work became regular – and relatively lucrative – enough that I was able to reduce my teaching workload, and focus one or two days per week on writing. This was, in many ways, my dream job, allowing me to dedicate serious time to researching and writing about the things I considered important, helping (as I saw it) to produce analysis that would inform and equip the anti-war movement to really understand the machinations of a crisis-ridden western capitalism. For the first time in my working life I felt like I had real freedom: my pitches were almost always accepted, and they were never edited or tinkered with in any way.&nbsp;</span></p><span data-dcnode-id="2538" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">RT had always hosted some dodgy characters, however. That was no surprise; I knew it was a not a left-wing operation per se – it was funded and run by the oligarchic-capitalist Russian state, after all – but if they were prepared to give a platform to socialists, I thought, in amongst all the conservatives and nationalists, that was surely a good thing. Wasn’t it?&nbsp;</span></p><span data-dcnode-id="2535" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">But over the years, I started to notice more and more coverage being given to the hardcore far right and neofascists. Representatives of France’s Front Nationale, Austria’s Freedom Party, Germany’s Pegida and AfD seemed to be getting slots almost every day, giving their ‘interpretation’ of the day’s events. Tommy Robinson even got an entire half hour slot. Sukant pointed out that, disturbingly, much of the far right seemed to be saying very similar things to us about Syria, and that if we did not make a clear distinction between our analysis and theirs, we were effectively legitimising them.&nbsp;</span></p><span data-dcnode-id="2532" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">For a while I kept my head in the sand, and even justified it – ‘oh well, they have lots of different viewpoints, of course they are going to have some right-wingers as well as left-wingers – they want a diversity of opinion’ blah blah blah. And anyway, I managed to convince myself that nothing would be improved by me cutting my ties, which would merely be cutting off my nose to spite my face. My position was – I will speak on any platform that lets me state my piece uncensored. That’s it.&nbsp;&nbsp;</span></p><span data-dcnode-id="2529" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">But the dirty role RT was playing just became too blatant to ignore. Even more insidious than the guests being invited were the increasingly frequent ‘news items’ that whipped up a barely-veiled hatred of migrants. It seemed that every half-hour news slot would contain at least one piece on a ‘migrant crimewave’, ‘migrant stabbing’, ‘migrant rape’ etc etc – always inevitably followed up with an interview by some fascist or other telling us what to think about it. On the website, too, I noticed some really toxic pieces going up, consisting of base migrant-baiting, or pushing the ‘death of Europe’ fantasies about European civilisation being swamped by alien cultures. The comments on these articles – my own included – were, it is no exagerration to say, pretty much wall-to-wall antisemitic conspiracies.&nbsp;</span></p><span data-dcnode-id="2526" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">By this time, Sukant had become persona non grata with the channel for his candid denunciation of the new fascism and forthright defence of immigration on their flagship panel show Cross Talk. But still my line was – I’m not being compromised: I stand by what I publish, and as long as they are giving me a platform to say what I like and get it out there, I will take it. I’m not endorsing any of these fascists.&nbsp;</span></p><span data-dcnode-id="2523" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2518"><span data-dcnode-id="2522" instrument_node="">But what I </span><em data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">was</span></em><span data-dcnode-id="2519" instrument_node=""> doing, I came to realise, was helping to bring these fascists an audience.&nbsp;</span></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">What I eventually had to admit was that the presence on RT of people like me and others on the left was giving the channel a credibility and reach amongst a large section of people that would not have touched an out-and-out far right platform with a bargepole. Myself and others like me were being used to pull in people from the anti-war movement and the anti-austerity movement, and draw them in to an anti-immigrant, anti-refugee, antisemitic mileau, which rendered them harmless to capital but deeply harmful to the global proletariat. And I am not talking about small numbers of people; RT was the first youtube channel to reach a billion views, and RTUK has more viewers than Al Jazeera; it is, I would argue, the most powerful ‘alternative’ news channel/ site in the world. And it is a gateway drug to fascism.</span></p><span data-dcnode-id="2514" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2509"><span data-dcnode-id="2513" instrument_node="">But it was only when I started really researching into some of these neofascist currents and people that I realised that this is a very carefully crafted strategy. Up until around the new millenium, most of the fascist movements in the west had always been about </span><em data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">bashing </span></em><span data-dcnode-id="2510" instrument_node="">the left, the ‘reds’ and the ‘commies’. But around the year 2000, some of them underwent a shift in strategy. Witnessing events like the ‘Battle of Seattle’ – when anarchists fought cops in an attempt to close down the World Trade Organisation – they thought, ‘here are angry kids, ready to take militant action in the streets against [what they saw as] the ‘Jewish power structure’. We shouldn’t be fighting these kids. We should be recruiting them’.&nbsp;</span></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Fast forward to today, and this strategy has made serious headway. The boundaries between militant left and militant right have become more porous, to the benefit of the right, and RT has played a major part in facilitating this phenomenon. Fascists like Alexander Dugin in Russia and Steve Bannon in the US – with deep ties to the Russian and US bourgeois state leadership – are leading this new type of fascist recruitment drive which aims to unite far left and far right under the leadership of the far right. Leftwingers like George Galloway are now defending Steve Bannon and people who consider themselves leftists are reposting fascist websites and talking points without even realising it. The new fascist strategy – of reaching out to the left and slowly, subtly, bringing them round to neo-fascist positions – has been very effective. One example of how successful this strategy has been is on the issue of migration. There is a theory very popular amongst the RT crowd, that Muslim immigration is a Jewish plot to weaken Europe by diluting its cultural identity and virility, and ultimately wiping out its white population. Even prominent figures like Julian Assange have given credence to these theories, which have gone on to inspire massacres such as those in Christchurch New Zealand in March 2019.&nbsp;</span></p><span data-dcnode-id="2505" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">I am not saying RT is a ‘fascist channel’ per se; it is more subtle than that. Rather, it is doing the spadework for fascism. Alain de Benoist (see the chapter in this book on politically correct fascism) came to the view back in the 1960s that, for fascism to become acceptable again, a long-term battle of ideas would need to be fought, to slowly shift the contours of debates on race, identity and ethnicity such that a reformulated fascism could be cast as a legitimate response to these debates. The mainstream has already been doing this for decades of course, but RT is taking it to the next level, through its steady drip-drip dehumanisation of migrants and refugees and the normalisation of fascist parties. It is working hard to create what Hitler called “a people ready for” fascism.&nbsp;</span></p><span data-dcnode-id="2502" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">So, finally, the nature of the project I had been involved in dawned on me. I had been extending the reach of fascism, for money. I had a vested interest in not seeing what was going on.&nbsp;</span></p><span data-dcnode-id="2499" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">The way I squared it with my conscience was to call them out on air. Every time I did an interview, I would criticise RT or the Russian state (or both) for their facilitation of fascism. The first time I did it, I assumed I would not get called back. But I did. It became a running joke with the guy at the studio – ‘I don’t think you’ll be seeing me again’ I would tell him, again and again. But eventually, on maybe the 6th or 7th time, my final interview did come. I think the interviewer was a bit of a novice; she didn’t cut me off like the others had as soon as I started going ‘off piste,’ so I just carried on, calling out Russia for selling out Iran, collaborating with Trump, facilitating fascism in a totally self-defeating manner, and on and on. I haven’t heard from them since, nor have I pitched to them.&nbsp;&nbsp;</span></p><span data-dcnode-id="2496" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Unfortunately, others have not taken the same view. Leftwingers still contribute regularly, and RT have now added big names like John Pilger, George Galloway and Slavoj Zizek to their writers’ roster. A brief glance at the site shows their work nestling in amongst a piece painting Nigel Farage as a courageous truthteller unfairly victimised by the powers-that-be, a flattering interview with Hungary’s far right foreign minister, and an article bemoaning “record numbers of non-EU migrants” arriving in the UK. The normalisation of anti-migrant fascism continues – and sections of the left continue to facilitate it.&nbsp;</span></p><span data-dcnode-id="2493" instrument_node="">
</span></div><span data-dcnode-id="2490" instrument_node="">

</span><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//danglazebrook.com/2021/06/17/covid-19-a-weapon-against-surplus-humanity/" rel="bookmark"><span data-dcnode-id="2443" instrument_node="">06.17.21</span></a><span data-dcnode-id="2441" instrument_node="">
