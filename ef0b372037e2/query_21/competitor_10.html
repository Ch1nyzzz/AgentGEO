</span><h2 data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">
					The Huffington Post names a WAA project as one of 'The World's Greatest Libraries'
				</span></h2><span data-dcnode-id="2853" instrument_node="">
</span><p data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">'The Utrecht University Library by Wiel Arets is completely black inside, except for the furniture (which is red) and the color provided by the books themselves and their readers. Light enters the space through windows etched with an image of tall grasses, a reminder... of the materials used to make paper. This haunting library with its calm interior offers readers a whole range of different spaces to work in. You can sit in large open areas, enjoying the light coming in through the windows and the sight of dozens of other readers working away around you. Or you can find desks hidden away in the book stacks, far from prying eyes (the perfect place to escape the outside world and immerse yourself in books).'</span></p><span data-dcnode-id="2850" instrument_node="">
</span><p data-dcnode-id="2847"><a data-dcnode-id="2848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.huffingtonpost.com/james-w-p-campbell/exploring-the-worlds-grea_b_4232812.html"><span data-dcnode-id="2849" instrument_node="">Read the full article at Huffington Post</span></a></p><span data-dcnode-id="2846" instrument_node="">

				</span></h2><span data-dcnode-id="2832" instrument_node="">
</span><p data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">
</span></p><p data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">The AvB Tower–a hyper-hybrid academic building located in The Hague–was on October 31st, 2013 officially opened at an inaugural ceremony held in its 220 seat auditorium and attended by the Dutch Minister of Foreign Affairs&nbsp;Frans Timmermans, who delivered a keynote speech whose central theme was: ‘Knowledge as a Global Challenge in Times of Information Overload’. Also in attendance were Professor Jos Schaeken (Dean of Leiden University College at The Hague), Professor Jouke de Vries (Dean of Faculty Campus The Hague), Professor Simone Buitendijk (Vice-Rector Magnificus of Leiden University) and Ingrid van Engelshoven (Deputy Mayor of the municipality of The Hague),…</span></p><p class="readmore" data-dcnode-id="2824"><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_celebrate_the_official_opening_of_the_avb_tower_in_the_hague"><span data-dcnode-id="2827" instrument_node="">Continue reading</span></a><span data-dcnode-id="2825" instrument_node="">

</span><h2 data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">
					Wiel Arets to be in conversation with Phyllis Lambert at IIT in Chicago
				</span></h2><span data-dcnode-id="2809" instrument_node="">
</span><p data-dcnode-id="2804"><span data-dcnode-id="2808" instrument_node="">On November 14, 2013 Wiel Arets will be in conversation with Phyllis Lambert, the Founding Director and Chair of the Board of Trustees of the Canadian Centre for Architecture (CCA) in Montréal. Lambert graduated from the Illinois Institute of Technology (IIT) in 1963&nbsp;and&nbsp;was the Director of Planning for the Seagram Building in New York City (1954–58) designed by&nbsp;Mies van der Rohe–the development of which is documented in her recently released book entitled&nbsp;</span><i data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Building Seagram</span></i><span data-dcnode-id="2805" instrument_node=""> (Yale University Press, 2013).</span></p><span data-dcnode-id="2803" instrument_node="">
</span><p data-dcnode-id="2788"><span data-dcnode-id="2802" instrument_node="">S. R. Crown Hall</span><br data-dcnode-id="2801"><span data-dcnode-id="2800" instrument_node="">November 14th, 2013 17:30</span><br data-dcnode-id="2799"><br data-dcnode-id="2798"><span data-dcnode-id="2797" instrument_node="">3360 South State Street&nbsp;</span><br data-dcnode-id="2796"><span data-dcnode-id="2795" instrument_node="">Chicago, Illinois&nbsp;60616</span><br data-dcnode-id="2794"><span data-dcnode-id="2793" instrument_node="">United States of America</span><br data-dcnode-id="2792"><br data-dcnode-id="2791"><a data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//iit.edu/arch/events/2013/lecture_phyllis_lambert.shtml"><span data-dcnode-id="2790" instrument_node="">Read more about the event</span></a></p><span data-dcnode-id="2787" instrument_node="">

				</span></h2><span data-dcnode-id="2773" instrument_node="">
</span><p data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">
</span></p><p data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">This housing project is&nbsp;composed of two building blocks and&nbsp;located within a former industrial area in the city of Eindhoven that was redeveloped into a residential neighborhood&nbsp;named&nbsp;Stripe S. The E' Tower forms the entry to this new development, with 110 apartments dispersed across its 22 floors, while a separate auxiliary building echoing the former's façade rises 10 stories and consists of 36 apartments. This auxiliary building is situated along a road bisecting the neighborhood. The tower’s eastern façade has been receded from the adjacent building block to enable its complete fenestration in spite of its corner location, while at ground level…</span></p><p class="readmore" data-dcnode-id="2765"><a data-dcnode-id="2767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_complete_the_e_tower_in_eindhoven"><span data-dcnode-id="2768" instrument_node="">Continue reading</span></a><span data-dcnode-id="2766" instrument_node="">

</span><h2 data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">
					Wiel Arets to lecture at 'Days of Oris' in Croatia
				</span></h2><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2745"><span data-dcnode-id="2749" instrument_node="">Wiel Arets is set to lecture as part of the 2013 'Days of Oris' symposium that will take place in in Zagreb, Croatia from October 19-20, an annual gathering organized by the Croatian architecture magazine </span><i data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Oris</span></i><span data-dcnode-id="2746" instrument_node="">. This two-day symposium will consist of a series of lectures given by eminent architects, 'in which they present their works, creative approaches and concepts, while simultaneously exploring topics of construction'. Wiel Arets will present both WAA projects under construction and those nearing completion, expounding on the ways in which technology continues its assimilation and integration within buildings, and how these developments are evolving to affect methods of construction.</span></p><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2743" instrument_node="">Days of Oris</span><br data-dcnode-id="2742"><span data-dcnode-id="2741" instrument_node=""> October 19-20, 2013</span><br data-dcnode-id="2740"><br data-dcnode-id="2739"><span data-dcnode-id="2738" instrument_node="">Klaićeva 44  </span><br data-dcnode-id="2737"><span data-dcnode-id="2736" instrument_node="">10000 Klaićeva, Croatia</span></p><span data-dcnode-id="2734" instrument_node="">

</span><h2 data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">
					The B' Tower exhibited as part of 'Dutch Design Week' in Eindhoven
				</span></h2><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">The B' Tower will be on exhibit within the 'Vertigo' building of the Technical University of Eindhoven's campus, anchoring the show of graduating student work, entitled 'Built Environment', which is part of the larger annual celebration that is 'Dutch Design Week'. Exhibited in analytical form, oversized images and explanatory texts decipher the B' Tower's interior, while technical drawings analyze a chair custom designed for the project, which has been produced by the Dutch furniture manufacturer Lensvelt.</span></p><span data-dcnode-id="2717" instrument_node="">
</span><p data-dcnode-id="2704"><span data-dcnode-id="2716" instrument_node="">'Built Environment'</span><br data-dcnode-id="2715"><span data-dcnode-id="2714" instrument_node="">October 19-26, 2013</span><br data-dcnode-id="2713"><br data-dcnode-id="2712"><span data-dcnode-id="2711" instrument_node="">Vertigo Buildng</span><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">De Wielen 1&nbsp;</span><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node="">5612 AZ Eindhoven</span><br data-dcnode-id="2706"><span data-dcnode-id="2705" instrument_node="">the Netherlands</span></p><span data-dcnode-id="2703" instrument_node="">

</span><h2 data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">
					Schwäbisch Media certified 'silver' by the German Sustainable Building Council
				</span></h2><span data-dcnode-id="2689" instrument_node="">
</span><p data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">Schwäbisch Media, an office building for a publishing company located in the Upper Swabia region of Germany, was today certified 'silver' by the German Sustainable Building Council, whose mission is 'the development of methods and solutions for sustainable design and construction, and the management and promotion of such buildings'. This certification is similar in its scope and scale to the American 'LEED' certification program for sustainable buildings, which promotes 'Leadership in Energy and Environment Design'.</span></p><span data-dcnode-id="2686" instrument_node="">
</span><p data-dcnode-id="2683"><a data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/schwaebisch_media/"><span data-dcnode-id="2685" instrument_node="">Read more about Schwäbisch Media</span></a></p><span data-dcnode-id="2682" instrument_node="">

</span><h2 data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">
					Wiel Arets to lecture at the 2013 'American Institute of Architects Iowa Annual Convention'
				</span></h2><span data-dcnode-id="2665" instrument_node="">
</span><p data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">As part of the 2013 'American Institute of Architects (AIA) Iowa Annual Convention' in Des Moines, Iowa, Wiel Arets will lecture on architecture and design in relation to the convention's theme of 'Feedback', which according to the chapter is, '…an essential activity in expanding our professional development and understanding of where we exist within our continuum of life-long learning.' Wiel Arets will lecture on recent projects by WAA, hybrid programming, and the evolving integration of technology and buildings.</span></p><span data-dcnode-id="2662" instrument_node="">
</span><p data-dcnode-id="2658"><span data-dcnode-id="2661" instrument_node="">AIA Iowa Annual Convention</span><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">September 26-27, 2013</span></p><span data-dcnode-id="2657" instrument_node="">
</span><p data-dcnode-id="2649"><span data-dcnode-id="2656" instrument_node="">Iowa Events Center</span><br data-dcnode-id="2655"><span data-dcnode-id="2654" instrument_node="">833 5th Avenue</span><br data-dcnode-id="2653"><span data-dcnode-id="2652" instrument_node="">Des Moines, IA 50309</span><br data-dcnode-id="2651"><span data-dcnode-id="2650" instrument_node="">United States of America</span></p><span data-dcnode-id="2648" instrument_node="">

</span><div class="date" data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">September 20, 2013</span></div><span data-dcnode-id="2637" instrument_node="">
</span><h2 data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">
					WAA progress construction on the Allianz Headquarters in Zürich
				</span></h2><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Once completed, the Allianz Headquarters will be composed of a 20-story tower and a 5-story annex. Upon entering the lobby of the complex, a monumental sculptural staircase will rise 72 m–the entire height of the building. Multi-story voids create short cuts between floors through the use of open stairways. Circulation to and from these stairs and voids is toward and perpendicular to the outer glass skin, while circulation on each floor takes place along and parallel to the façade, so that the buildings are always alive with movement.</span></p><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2628"><a data-dcnode-id="2629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/allianz_headquarters/"><span data-dcnode-id="2630" instrument_node="">Read more about Allianz Headquarters</span></a></p><span data-dcnode-id="2627" instrument_node="">

</span><h2 data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">
					'Perspectives' to be broadcast on television in the Netherlands
				</span></h2><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2606"><i data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">Perspectives</span></i><span data-dcnode-id="2607" instrument_node=""> is documentary on the life and work of architect Wiel Arets, produced by George Vogelaar and Geert van Gemert, which premiered as part of the 'Rotterdam Architecture Film Festival' in 2011. This documentary will be broadcast on 'TV Maastricht', a television channel localized to the Dutch province of Limburg, from September 20-22, 2013. It sketches an image of this globally active architect engaging in the fields of architecture, design, and metropolitan development. Set within the Netherlands, Milan, Zürich, Berlin, and Tokyo, the producers unravel Arets' affection for Comme des Garçon, his passion for Japan and its culture, and capture his conversations with Kazuyo Sejima, Toyo Ito, and Rolf Fehlbaum of Vitra, among others.</span></p><span data-dcnode-id="2605" instrument_node="">
</span><p data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">September 20-22, 2013,&nbsp;'TV Maastricht'</span></p><span data-dcnode-id="2602" instrument_node="">

</span><h2 data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">
					WAA progress construction on Campus Hoogvliet in Rotterdam
				</span></h2><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">
</span></p><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">Located on the southern edge of Rotterdam, Campus Hoogvliet is a new educational and cultural center set for completion in autumn 2013. This area of the city is characterized by its mid-twentieth century housing developments, and this new campus seeks to rectify the social and cultural exchange that coupled this former village's demolition, which took place during its post-war period of growth. The project is composed of six separate buildings that together encompass two vocational schools, an art studio, sports building, lyceum, restaurant, retail spaces, and housing facilities. Each of the campus' buildings has an outdoor terrace linking the extensive…</span></p><p class="readmore" data-dcnode-id="2577"><a data-dcnode-id="2579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_progress_construction_on_campus_hoogvliet_in_rotterdam_3010"><span data-dcnode-id="2580" instrument_node="">Continue reading</span></a><span data-dcnode-id="2578" instrument_node="">

</span><h2 data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">
					WAA progress construction on the B' Tower in Rotterdam
				</span></h2><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2556"><span data-dcnode-id="2561" instrument_node="">Located in the center of Rotterdam, immediately adjacent to the Bijenkorf department store by Marcel Breuer, the tower comprises a hybrid of urban programs composed of three volumes of similar height but varying width. The volume that meets the ground, which rises to the height of the Bijenkorf store, houses a fashion store and parking garage, while the two upper volumes that rise above the department store contain apartments, each with a cantilevered balcony large enough to accommodate a table for a dinner party of six.</span><br data-dcnode-id="2560"><br data-dcnode-id="2559"><a data-dcnode-id="2557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/b_tower/"><span data-dcnode-id="2558" instrument_node="">Read more about the B' Tower</span></a></p><span data-dcnode-id="2555" instrument_node="">

</span><h2 data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">
					WAA awarded the 2013 'Victor de Stuers Award' for The Post in Maastricht
				</span></h2><span data-dcnode-id="2541" instrument_node="">
</span><p data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Located in the center of Maastricht, in the south of the Netherlands, the project is an extensive renovation of a former post office that dates from 1915. A 'protected' state monument, the project consists of 19 short-stay apartments whose design has been dictated by the building's pre-existing and culturally significant components. Two apartments within the building have balconies that face the adjacent Vrijhof, a large pedestrian square in the center of this ancient Roman city, while the penthouse apartment on the rear of the building features a roof terrace that overlooks the spired skyline of Maastricht.</span></p><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2535"><a data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/the_post/"><span data-dcnode-id="2537" instrument_node="">Read more about The Post</span></a></p><span data-dcnode-id="2534" instrument_node="">
</span><p data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2531" instrument_node="">
</span></div><span data-dcnode-id="2529" instrument_node="">
</span></div><span data-dcnode-id="2527" instrument_node="">
</span><div class="news item cf" data-dcnode-id="2502"><span data-dcnode-id="2526" instrument_node="">
</span><img alt="" data-dcnode-id="2525" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003459image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="2524" instrument_node="">

</span><h2 data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">
					WAA included in the 2012 'Best Dutch Book Design' exhibition in Amsterdam
				</span></h2><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">
</span></p><p data-dcnode-id="2510"><span data-dcnode-id="2514" instrument_node="">After presentation in Leipzig, Buenos Aires, and Porto, the 2012 'Best Dutch Book Designs' will be exhibited at the Stedelijk Museum in Amsterdam. </span><em data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Wiel Arets: Autobiographical References</span></em><span data-dcnode-id="2511" instrument_node="">, designed by renowned Dutch graphic designer Irma Boom and edited by American academic Robert McCarter, was awarded this annual prize alongside 32 other publications representing the most distinguished books made in the Netherlands during 2012. These books have been chosen for their meticulous attention to detail and their timeless qualities, capturing the spirit of the period within which they were produced. This literary award is one of the most time-honored of its kind…</span></p><p class="readmore" data-dcnode-id="2506"><a data-dcnode-id="2508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_included_in_the_2012_best_dutch_book_design_exhibition_in_amsterdam"><span data-dcnode-id="2509" instrument_node="">Continue reading</span></a><span data-dcnode-id="2507" instrument_node="">
</span></p><span data-dcnode-id="2505" instrument_node="">
</span></div><span data-dcnode-id="2503" instrument_node="">
</span></div><span data-dcnode-id="2501" instrument_node="">
</span><div class="news item cf" data-dcnode-id="2475"><span data-dcnode-id="2500" instrument_node="">
</span><img alt="" data-dcnode-id="2499" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002974image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="2498" instrument_node="">
</span><div class="text" data-dcnode-id="2477"><span data-dcnode-id="2497" instrument_node="">
</span><div class="date" data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">September 10, 2013</span></div><span data-dcnode-id="2494" instrument_node="">
</span><h2 data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">
					WAA complete the AvB Tower in The Hague
				</span></h2><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">The AvB Tower is a hyper-hybrid academic building and a dynamic hub threading The Hague’s central train station to the adjacent urban envelope, accommodating students and faculty with a program of housing, retail, and dining. Surrounded by an expansive and newly constructed pedestrian square–the Anna van Buerenplein–this 72 m steel tower is foreseen to be a catalyst for further redevelopment of this centrally sited urban space. As the city’s train station is a terminus, this square is a point of convergence for multiple modes of transportation and a gathering space for the tower’s 396 student residents.</span></p><span data-dcnode-id="2488" instrument_node="">
</span><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Clusters of office buildings and a surface parking lot were demolished to create this new residential and retail situation, which is part of a larger master plan to restructure this formerly under-utilized space in the center of this stately city. A newly submerged 3-story parking garage serves as the plinth for the tower’s foundation, dictating its structural solutions due to the pre-existing weight limitations of the parking garage. It was therefore chosen to construct the tower in steel&nbsp;, distributing its structural load across 11 pre-determined columns.</span></p><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Carving an extension of its lobby from the surrounding square...</span></p><span data-dcnode-id="2482" instrument_node="">
</span><p data-dcnode-id="2479"><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/avb_tower/"><span data-dcnode-id="2481" instrument_node="">Continue reading</span></a></p><span data-dcnode-id="2478" instrument_node="">

</span><img alt="" data-dcnode-id="2472" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002977image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="2471" instrument_node="">
</span><div class="text" data-dcnode-id="2446"><span data-dcnode-id="2470" instrument_node="">
</span><div class="date" data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">September  5, 2013</span></div><span data-dcnode-id="2467" instrument_node="">
</span><h2 data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">
					Wiel Arets to lecture at Korea University
				</span></h2><span data-dcnode-id="2464" instrument_node="">
</span><p data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">As part of the eight 'Annual Asian Alumni Meeting', set to take place in Seoul, Korea, Wiel Arets will lecture at the 'Korea University-Illinois Institute of Technology (IIT) Symposium' entitled 'Mega Trends in Innovation'. This annual meeting is organized by the IIT Asian Alumni Council, and all alumni and past associates of IIT, from every part of the globe, have been invited to attend. Wiel Arets will lecture on currently developing innovations within architecture and design, focusing on energy efficiency, the interstitial spaces between building, and wider issues, such as culture and life within cities.</span></p><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2460" instrument_node="">Korea University-IIT Symposium</span><br data-dcnode-id="2459"><span data-dcnode-id="2458" instrument_node="">September 7, 2013 9:00-13:00</span></p><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2455" instrument_node="">Korea University</span><br data-dcnode-id="2454"><span data-dcnode-id="2453" instrument_node="">Hana Square, Room 112</span><br data-dcnode-id="2452"><span data-dcnode-id="2451" instrument_node="">145, Anam-ro, Seongbuk-gu</span><br data-dcnode-id="2450"><span data-dcnode-id="2449" instrument_node="">Seoul, 136-701 Korea</span></p><span data-dcnode-id="2447" instrument_node="">
</span></div><span data-dcnode-id="2445" instrument_node="">
</span></div><span data-dcnode-id="2443" instrument_node="">
</span><div class="news item cf" data-dcnode-id="2423"><span data-dcnode-id="2442" instrument_node="">
</span><img alt="" data-dcnode-id="2441" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002901image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="2440" instrument_node="">
</span><div class="text" data-dcnode-id="2425"><span data-dcnode-id="2439" instrument_node="">
</span><div class="date" data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">August 28, 2013</span></div><span data-dcnode-id="2436" instrument_node="">
</span><h2 data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">
					WAA progress construction on the Allianz Headquarters in Zürich
				</span></h2><span data-dcnode-id="2433" instrument_node="">
</span><p data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Once completed, the Allianz Headquarters will be composed of a 20-story tower and a 5-story annex. Upon entering the lobby of the complex, a monumental sculptural staircase will rise 72 m–the entire height of the building. Multi-story voids create short cuts between floors through the use of open stairways. Circulation to and from these stairs and voids is toward and perpendicular to the outer glass skin, while circulation on each floor takes place along and parallel to the façade, so that the buildings are always alive with movement.</span></p><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2427"><a data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/allianz_headquarters/"><span data-dcnode-id="2429" instrument_node="">Read more about Allianz Headquarters</span></a></p><span data-dcnode-id="2426" instrument_node="">
</span></div><span data-dcnode-id="2424" instrument_node="">
</span></div><span data-dcnode-id="2422" instrument_node="">
</span><div class="news item cf" data-dcnode-id="2399"><span data-dcnode-id="2421" instrument_node="">
</span><img alt="" data-dcnode-id="2420" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002968image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="2419" instrument_node="">
</span><div class="text" data-dcnode-id="2401"><span data-dcnode-id="2418" instrument_node="">
</span><div class="date" data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">August 26, 2013</span></div><span data-dcnode-id="2415" instrument_node="">
</span><h2 data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">
					WAA win competition to design the Europaallee 'Site D' in Zürich
				</span></h2><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">This new building is an integral component of ‘Europaallee’, a currently emerging district adjacent to the city of Zürich’s central train station. A plinth of retail programming anchors the project to its site, while its upper volumes consist of flexible office spaces that, due to their shallow depth and efficient façade grid, can be occupied by several individual companies or a larger singular tenant. The main entry has been positioned along the parallel ‘Europaallee’, and opens onto the ground floor's main retail and circulation spaces. From the ground floor, a central staircase complemented by two ramping escalators traverses and connects these areas. Foreseeing a possible conversion into future residential units, the building’s flexible structure was designed to allow for such a repurpose of its program.</span></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2408" instrument_node="">Construction will begin in 2017, and is scheduled to commence in 2019.</span><br data-dcnode-id="2407"><br data-dcnode-id="2406"><a data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/europaallee_site_d/"><span data-dcnode-id="2405" instrument_node="">Read more about&nbsp;Europaallee 'Site D'</span></a></p><span data-dcnode-id="2402" instrument_node="">
</span></div><span data-dcnode-id="2400" instrument_node="">
</span></div><span data-dcnode-id="2398" instrument_node="">
</span><div class="news item cf" data-dcnode-id="2376"><span data-dcnode-id="2397" instrument_node="">
</span><img alt="" data-dcnode-id="2396" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002956image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="2395" instrument_node="">

</span><div class="date" data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">August 22, 2013</span></div><span data-dcnode-id="2391" instrument_node="">
</span><h2 data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">
					WAA included in the Amsterdam exhibition 'XS Architecture'
				</span></h2><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">
</span></p><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">WAA has been invited to participate in the upcoming exhibition 'XS Architecture', a platform for products–of a smaller scale–created by architects, artists, and designers. The exhibition will include a wide-range of products, including chairs, kitchen accessories, prototypes, and textiles, among others. Each piece will support the exhibition's concern for highlighting products originating from those whose main profession lies in another trade. Alongside communicating these objects to a wider audience–extending their reach beyond the architecture profession–the products on display will investigate currently occurring cross-discipline collaborations within design and production methods. WAA will exhibit products created for and produced by Alessi, including…</span></p><p class="readmore" data-dcnode-id="2380"><a data-dcnode-id="2382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_included_in_the_amsterdam_exhibition_xs_architecture"><span data-dcnode-id="2383" instrument_node="">Continue reading</span></a><span data-dcnode-id="2381" instrument_node="">

</span><h2 data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">
					The Post is nominated for the 2013 Maastricht 'Victor de Stuers Award'
				</span></h2><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Located in the center of Maastricht, in the south of the Netherlands, the project is an extensive renovation of a former post office that dates from 1915. A 'protected' state monument, the project consists of 19 short-stay apartments whose design has been dictated by the building's pre-existing and culturally significant components. Two apartments within the building have balconies that face the adjacent Vrijhof, a large pedestrian square in the center of this ancient Roman city, while the penthouse apartment on the rear of the building features a roof terrace that overlooks the spired skyline of Maastricht. The winner of the 'Monument Prize' will be announced at the awards ceremony on September 13th, in Maastricht.&nbsp;</span></p><span data-dcnode-id="2362" instrument_node="">
</span><p data-dcnode-id="2359"><a data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/the_post/"><span data-dcnode-id="2361" instrument_node="">Read more about The Post</span></a></p><span data-dcnode-id="2358" instrument_node="">

</span><img alt="" data-dcnode-id="2352" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002927image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="2351" instrument_node="">

</span><div class="date" data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">July 26, 2013</span></div><span data-dcnode-id="2347" instrument_node="">
</span><h2 data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">
					WAA publish 'TC Cuadernos: Wiel Arets 1997-2013'
				</span></h2><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2335"><span data-dcnode-id="2343" instrument_node="">The first extensive publication on the work of Wiel Arets Architects in nearly a decade, </span><i data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">TC Cuadernos: Wiel Arets 1997-2013</span></i><span data-dcnode-id="2340" instrument_node=""> includes 35 projects designed by the studio over the last 16 years, intensely investigates the most recent buildings, products, competitions, and exhibitions. Featuring many projects in print for the first time, the publication examines the technical aspects of the studio's work, delving into the each project's technological achievements and innovations, as communicated via the more than 300 drawings, and more than 200 photographs by the renowned architectural photographers Jan Bitter, Hélène Binet, and Christian Richters.</span><br data-dcnode-id="2339"><br data-dcnode-id="2338"><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tccuadernos.com/tccuadernos_numero.php%3Fid%3D95"><span data-dcnode-id="2337" instrument_node="">Order from TC Cuadernos</span></a></p><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2331"><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/tc_cuadernos_wiel_arets_1997_2013"><span data-dcnode-id="2333" instrument_node="">View the interior of the publication</span></a></p><span data-dcnode-id="2330" instrument_node="">

</span><h2 data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">
					WAA progress construction on the AvB Tower in The Hague
				</span></h2><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">The AvB Tower is situated on the Anne van Bueren Square, which serves as the lobby for this hybrid tower in the center of The Hague. With a program of 396 student 'guest-rooms’–with the first five floors combining retail, lobby, restaurant, offices, lecture hall, and library–the building will become the newest home of the University of Leiden, providing its student residents with accommodations featuring floor-to-ceiling sliding tinted glass panels, which provide views to the square, the skyline of The Hague, and the North Sea beyond.</span></p><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2310"><a data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/avb_tower/"><span data-dcnode-id="2312" instrument_node="">Read more about the AvB Tower</span></a></p><span data-dcnode-id="2309" instrument_node="">

					WAA celebrate the opening of Schwäbisch Media in Ravensburg
				</span></h2><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">
</span></p><p data-dcnode-id="2288"><span data-dcnode-id="2292" instrument_node="">This new building is an office for Schwäbisch Media (Swabian Media), a publishing company active in many facets of traditional and new media. Six protruding glass-walled cubes define and compose the project, with their proportions and dimensions based on the surrounding traditional German </span><em data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">fachwerk</span></em><span data-dcnode-id="2289" instrument_node=""> villas in the city of Ravensburg. These six working areas have been stacked on top of a transparent ground floor, through which access is afforded to each, creating a new urban typology in the center of this medieval city. As the company’s activities were previously scattered throughout the Upper Swabia region, this building brings all 350…</span></p><p class="readmore" data-dcnode-id="2284"><a data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_celebrate_the_opening_of_schwaebisch_media_in_ravensburg"><span data-dcnode-id="2287" instrument_node="">Continue reading</span></a><span data-dcnode-id="2285" instrument_node="">

</span><h2 data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">
					WAA progress construction on Campus Hoogvliet in Rotterdam
				</span></h2><span data-dcnode-id="2269" instrument_node="">
</span><p data-dcnode-id="2263"><span data-dcnode-id="2268" instrument_node="">Campus Hoogvliet is a new educational and cultural area located on the southern edge of Rotterdam composed of six buildings encompassing two vocational schools, an art studio, sports building, lyceum, restaurant, retail, and housing facilities. Each building has an outdoor patio linking the campus’ public space with each building’s private interior. Each of these patios is enclosed by a translucent glass ‘fence’ equal in height to the façades of the ground floor, and each fence contains a ‘gate’ allowing access to the patio from the main public space. A number of mature green areas surrounding the site have been incorporated into the landscaping, while in contrast each patio will be planted with red Japanese Maple trees.</span><br data-dcnode-id="2267"><br data-dcnode-id="2266"><a data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/campus_hoogvliet/"><span data-dcnode-id="2265" instrument_node="">Read more about Campus Hoogvliet</span></a></p><span data-dcnode-id="2262" instrument_node="">

					WAA progress construction on the E' Tower in Eindhoven
				</span></h2><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2247" instrument_node="">The project is located in the Stadium Quarter, an area next to the Phillips Stadium in Eindhoven, which is an integral part of the Stripe S urban plan created by the landscape firm West 8. The original brief for the area includes the E' Tower, the E’ Block, and a slender end piece of the adjacent annex, which are all apartment buildings in this emerging district. A gap between the E' Tower and the annex will define the area's entrance while also providing an outdoor space adjacent to the tower, for use by its inhabitants.</span><br data-dcnode-id="2246"><br data-dcnode-id="2245"><a data-dcnode-id="2243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/e_tower/"><span data-dcnode-id="2244" instrument_node="">Read more about the E' Tower</span></a></p><span data-dcnode-id="2241" instrument_node="">

</span><h2 data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">
					WAA progress construction on the Allianz Headquarters in Zürich
				</span></h2><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">
</span></p><p data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">The Allianz Headquarters is an office complex linked and interlocked by a series of bridges and voids. Once completed, the Allianz Headquarters will be composed of a 20-story tower and a 5-story annex set within an urban plan based on a modified block structure. The two buildings will be connected by a series of bridges, enabling work, gastronomic, and leisure spaces to fluidly interact. Upon entering the lobby of the complex, a monumental sculptural staircase will rise 72 m–the entire height of the building–essentially creating an accessible atrium that visually and intuitively routes users.&nbsp;These multi-story voids create short cuts between…</span></p><p class="readmore" data-dcnode-id="2219"><a data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_progress_construction_on_the_allianz_headquarters_in_zuerich_2848"><span data-dcnode-id="2222" instrument_node="">Continue reading</span></a><span data-dcnode-id="2220" instrument_node="">

</span><h2 data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">
					Campus Hoogvliet's construction site to be open for public viewing
				</span></h2><span data-dcnode-id="2204" instrument_node="">
</span><p data-dcnode-id="2198"><span data-dcnode-id="2203" instrument_node="">As part of the 'Day of Building' set to take place in Rotterdam, Campus Hoogvliet–a new educational, residential, and cultural cluster of six separate buildings–will open its construction site for public viewing on June 1st, 2013 from 10:00-16:00. The project forms the core of recent efforts to revitalize the Hoogvliet neighborhood of Rotterdam, and aims to increase the amount of public space available to area residents. The six buildings encompass two vocational schools, an art studio, sports building, lyceum, restaurant, retail, and housing facilities. Each of the six buildings has an outdoor patio linking the the private interiors to the public spaces of the surrounding extensive campus.</span><br data-dcnode-id="2202"><br data-dcnode-id="2201"><a data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/campus_hoogvliet/"><span data-dcnode-id="2200" instrument_node="">Read more about Campus Hoogvliet</span></a></p><span data-dcnode-id="2197" instrument_node="">

</span><h2 data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">
					WAA complete construction on Schwäbisch Media in Ravensburg
				</span></h2><span data-dcnode-id="2183" instrument_node="">
</span><p data-dcnode-id="2174"><span data-dcnode-id="2182" instrument_node="">Schwäbisch Media is an office building for a publishing company active in many facets of both traditional and new media. Six protruding glass-walled cubes define and compose the project, with their proportions and dimensions based on the surrounding traditional German </span><i data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">fachwerk</span></i><span data-dcnode-id="2179" instrument_node=""> villas. These six working areas have been stacked on top of a transparent ground floor, through which access is afforded to each, creating a new urban typology in the center of this medieval city. Wrapping the project’s perimeter is a glass fence, varying in height from 1-4.5 m, allowing the building to be perceived as one continuous urban intervention that fluidly interweaves interior and exterior.</span><br data-dcnode-id="2178"><br data-dcnode-id="2177"><a data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/videos/schwaebisch_media"><span data-dcnode-id="2176" instrument_node="">Watch the construction process</span></a></p><span data-dcnode-id="2173" instrument_node="">

</span><h2 data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">
					WAA reach the highest point of construction on Campus Hoogvliet in Rotterdam
				</span></h2><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Campus Hoogvliet, a new educational and cultural area located on the southern edge of Rotterdam, has today reached its highest point of construction. The project is composed of six buildings encompassing two vocational schools, an art studio, sports building, lyceum, restaurant, retail, and housing facilities. The central theme raised during the design process of the campus was the ideas of 'connections', and how the campus interacts with the areas of the surrounding neighborhood, while simultaneously functioning as a cluster of interrelated public and private spaces.</span></p><span data-dcnode-id="2156" instrument_node="">
</span><p data-dcnode-id="2153"><a data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/campus_hoogvliet/"><span data-dcnode-id="2155" instrument_node="">Read more about Campus Hoogvliet</span></a></p><span data-dcnode-id="2152" instrument_node="">

					WAA awarded the 2013 'AIT Innovation Award for Architecture and Technology'
				</span></h2><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">
</span></p><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node=""> </span></p><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">The Allianz Headquarters, an under construction office building in Zürich, Switzerland, was recently awarded the 2013 ‘AIT Innovation Award for Architecture &amp; Technology’ for its interior heating and cooling ceiling panels, which feature concrete core activation and concealed air ventilation. Designed specifically for the new Allianz Headquarters, the paneled ceiling system houses the technical specifications a modern office building demands, and measures 1.35 x 1.35 m, reducing the amount of hanging points while simultaneously introducing a larger scale to the interior office spaces. Composed&nbsp;of steel sheets that have been ‘crumpled’ for added stability, the panels resist central…</span></p><p class="readmore" data-dcnode-id="2127"><a data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_awarded_the_2013_ait_innovation_award_for_architecture_and_technology"><span data-dcnode-id="2130" instrument_node="">Continue reading</span></a><span data-dcnode-id="2128" instrument_node="">

</span><h2 data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">
					The College of Architecture at IIT publishes NOWNESS
				</span></h2><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">
</span></p><p data-dcnode-id="2103"><em data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">NOWNESS </span></em><span data-dcnode-id="2107" instrument_node="">is the first publication of the Illinois Institute of Technology College of Architecture (IIT CoA) under the direction of Wiel Arets, published to coincide with the investiture of Arets as the college's newest Dean. Presenting the curriculum&nbsp;and ambitions for the&nbsp;2013-2014&nbsp;academic year,&nbsp;</span><em data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">NOWNESS </span></em><span data-dcnode-id="2104" instrument_node="">also&nbsp;introduces readers and prospective students to the college's history and legacy, the latter inherited from Mies van der Rohe–the college's original director in the early twentieth century. Including interviews, conversations, and commentary by Ken Frampton, Stanley Tigerman, and Robert McCarter, with imagery by Erwin Olaf and Thomas Ruff–among others–the publication formalizes the foundations of the school's refocused academic…</span></p><p class="readmore" data-dcnode-id="2099"><a data-dcnode-id="2101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/the_college_of_architecture_at_iit_publishes_nowness"><span data-dcnode-id="2102" instrument_node="">Continue reading</span></a><span data-dcnode-id="2100" instrument_node="">

</span><h2 data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">

				</span></h2><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2052" instrument_node="">The Graham Foundation of Chicago will host a presentation and signing of </span><i data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Wiel Arets: Autobiographical References</span></i><span data-dcnode-id="2049" instrument_node="">, a new book edited by Robert McCarter and designed by Irma Boom exploring the notion of 'A Wonderful World'. The evening will begin with a discussion and debate between Arets and McCarter, introducing the book's origins as well as the work of Wiel Arets Architects, after which signed copies of the publication will be available for purchase.</span></p><span data-dcnode-id="2047" instrument_node="">

</span><h2 data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">
					WAA progress construction on the Allianz Headquarters in Zürich
				</span></h2><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">The Allianz Headquarters is an office complex linked and interlocked by a series of bridges&nbsp;and voids. Once completed, the Allianz Headquarters will be composed of a high-rise tower and a 5-story building, both with a program of mainly office space, set within an urban plan based on a modified block structure. The two buildings will be connected by a series of bridges, enabling work, gastronomic, and leisure spaces to fluidly interact. Upon entering the lobby of the complex, a monumental sculptural staircase will rise 72 m–the entire height of the building–essentially creating an accessible atrium that visually and intuitively routes users.</span></p><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="2009"><a data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/allianz_headquarters/"><span data-dcnode-id="2011" instrument_node="">Read more about Allianz Headquarters</span></a></p><span data-dcnode-id="2008" instrument_node="">

					'A Daily Dose of Architecture' reviews 'Wiel Arets: Autobiographical References'
				</span></h2><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">'As the title makes clear, the book is as much an autobiography as a monograph… In addition to the interviews, lectures, debates, and other content from a spring 2010 studio Arets taught with Professor Robert McCarter at Washington University, the book includes a handful of project portfolios and some short project descriptions of many buildings designed by Arets… Irma Boom instills a logic to the loads of writing and photos through a design that is actually pretty simple. But the experience of holding and flipping through the book is enriched by the design, and Arets' words are like layers of meaning within the regular structure.'</span></p><span data-dcnode-id="1988" instrument_node="">
</span><p data-dcnode-id="1985"><a data-dcnode-id="1986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//archidose.org/wp/2013/02/25/wiel-arets-autobiographical-references/"><span data-dcnode-id="1987" instrument_node="">Read the full review</span></a></p><span data-dcnode-id="1984" instrument_node="">

</span><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">On March 5th, 2013 Wiel Arets will be the keynote speaker at the City of Vienna's municipal housing festival and symposium 'Wohnbaufestwochen 2013'.&nbsp;The conference is hosted biennially by the city, and is a forum for dialogue between architects, planners, scientists, researchers, and politicians on various municipal housing topics. Wiel Arets will lecture on the state of high-rise apartment towers in the Netherlands, focusing on the Amsterdam housing project 'Four Towers Osdorp'.</span></p><span data-dcnode-id="1967" instrument_node="">

					WAA progress construction on Schwäbisch Media in Ravensburg 
				</span></h2><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">The building houses the new headquarters of a company active in many facets of the media, utilizing the notion of 'villas' within the project. A transparent glazed outer membrane will wrap the interior and exterior spaces, imparting a singular identity to the project as well as allowing the individual 'villas' to be distinguished. For those working in the building, the smaller areas of each working unit allow a sense of place and comfort, giving a domestic character to the experience of inhabitation.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1907"><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/schwaebisch_media/"><span data-dcnode-id="1909" instrument_node="">Read more about Schwäbisch Media</span></a></p><span data-dcnode-id="1906" instrument_node="">

					WAA awarded the 2012 Best Dutch Book Design Award for 'Wiel Arets: Autobiographical References'
				</span></h2><span data-dcnode-id="1889" instrument_node="">
</span><p data-dcnode-id="1885"><i data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Wiel Arets: Autobiographical References</span></i><span data-dcnode-id="1886" instrument_node=""> (Birkhäuser, 2012) explores the topic of 'A Wonderful World'–a theory brought forth by Wiel Arets–stating that the the world will become one metropolis,&nbsp;with individual cities functioning as neighborhoods, each with their own regional identity, and each&nbsp;comparable to stops on a subway map.&nbsp;Designed by Irma Boom and edited by Robert McCarter, the book totals 536 pages and is organized with a colored-coded tab system, ensuring intuitive understanding of its complex compilation and content.</span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1881"><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bestverzorgdeboeken.nl/en/news/"><span data-dcnode-id="1883" instrument_node="">Read the full list of award recipients</span></a></p><span data-dcnode-id="1880" instrument_node="">

</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">
</span></p><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">On March 13th, 2013 the Illinois Institute of Technology College of Architecture (IIT CoA) will celebrate Mies van der Rohe's 127th birthday, his influence on Chicago, and the investiture of Wiel Arets.&nbsp;Seventy-five years ago, Ludwig Mies van der Rohe arrived in the United States to lead IIT's College of Architecture and profoundly influence the world’s taste and built environment. Today, the college begins another era of influence as it celebrates the investiture of Wiel Arets, Rowe Family College of Architecture Dean Endowed Chair.&nbsp;</span></p><span data-dcnode-id="1861" instrument_node="">

</span><h2 data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">
					Wiel Arets named Chair of Jury for the 2013 Mies van der Rohe Award
				</span></h2><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1830" instrument_node="">The European Union Prize for Contemporary Architecture, also known as the Mies van der Rohe Award, highlights the contributions of architects to the development of new ideas and technologies in contemporary&nbsp;European&nbsp;urban development. Initiated in 1987 and presented biannually, it is the most prestigious award in European architecture. Wiel Arets, as Chair of the Jury, recently convened in Barcelona to select this year's award finalists, and the full list of nominees was announced on January 31st, 2013.</span><br data-dcnode-id="1829"><br data-dcnode-id="1828"><a data-dcnode-id="1826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.miesarch.com/index.php%3Foption%3Dcom_mipress_anterior%26cerca%3D%26autor%3D-1%26tipologia%3D-1%26classificacio%3D-1%26pais%3D-1%26edicio%3D2013%26lang%3Den"><span data-dcnode-id="1827" instrument_node="">View the full list of nominees</span></a></p><span data-dcnode-id="1824" instrument_node="">

					Wiel Arets to lecture at Unity Temple in Chicago
				</span></h2><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1809" instrument_node="">On March 11th, 2013 at 19:00 Wiel Arets will lecture at Unity Temple in Chicago, discussing recent works of WAA, his appointment as Dean of the Illinois Institute of Technology College of Architecture, and 'A Wonderful World', his optimistic outlook toward the future our of continuously 'shrinking' world.&nbsp;</span><i data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Wiel Arets: Autobiographical References</span></i><span data-dcnode-id="1806" instrument_node="">&nbsp;explores the topic of 'A Wonderful World', and is the latest publication by Wiel Arets, made in collaboration with editor Robert McCarter and graphic designer Irma Boom, and copies will be available for purchase at the event.</span></p><span data-dcnode-id="1804" instrument_node="">

</span><h2 data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">
					WAA awarded 3rd in competition design for Dutch Supreme Court
				</span></h2><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1773" instrument_node="">The Hoge Raad der Nederlanden, the Supreme Court of the Netherlands, is situated in The Hague, and appears restrained and transparent, projecting a sense of timelessness suitable to its neutral role separate from the country's politics. Two courtrooms form the core of the project, both composed of natural stone, and around which public space is laced on the ground floor. These courtrooms are affixed with vertical voids in the form of pyramids, while a third cone, composed of glass, creates an internal skylight.</span><br data-dcnode-id="1772"><br data-dcnode-id="1771"><a data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/hoge_raad_der_nederlanden/" target="_blank"><span data-dcnode-id="1770" instrument_node="">Read about Hoge Raad der Nederlanden</span></a></p><span data-dcnode-id="1767" instrument_node="">

</span><h2 data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">
					An interview with Wiel Arets is published in 'The Architect's Newspaper'
				</span></h2><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1722"><i data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">The Architect's Newspaper</span></i><span data-dcnode-id="1723" instrument_node="">&nbsp;recently published an interview with Wiel Arets addressing the legacy of Mies van der Rohe at IIT, Chicago's architectural heritage, and the meaning of 'rough premium'. Arets explains: 'I’m interested in rough reading, rereading. Because there is no straight, smooth way from A to Z. I would say the better ideas develop along the rough way. That’s why I think resistance is extremely important for an architect, and architecture schools. In certain ways I’m interested in stress, forces–when there is wind out, there is something you have to fight against. Roughness creates questions. For me, that’s very important for students...'</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1718"><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//archpaper.com/news/articles.asp%3Fid%3D6424"><span data-dcnode-id="1720" instrument_node="">Read the full interview</span></a></p><span data-dcnode-id="1717" instrument_node="">

</span><h2 data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">
					WAA reach highest point of construction on the AvB Tower in The Hague
				</span></h2><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">The Anne van Bueren Square serves as the lobby for AvB Tower, where a hybrid programming of&nbsp;shops, lobby, restaurant, offices, lecture hall, and library–where the academic dweller finds a communicative atmosphere–when fluidly linked, can be seen&nbsp;as an extension of the 'commuter-leisure' concept currently emerging in the world's major metropolises. The first five floors provide space for this hybrid programming, while above, 396 spacious 'guest-rooms’ will function as student studios with floor-to-ceiling sliding yellow-tinted glass panels, thus providing views to the square, the skyline of The Hague, and the North Sea beyond.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1667"><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/avb_tower/"><span data-dcnode-id="1669" instrument_node="">Read more about the AvB Tower</span></a></p><span data-dcnode-id="1666" instrument_node="">

</span><h2 data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">
					WAA book presentation at AEDES in Berlin on December 14th
				</span></h2><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1648"><i data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Wiel Arets: Inspiration and Process in Architecture</span></i><span data-dcnode-id="1649" instrument_node=""> (Moleskine, 2012) is a new book exploring the relationships between the sources of&nbsp;inspiration&nbsp;that influence the work of Wiel Arets. Frozen thoughts, exaggerated perspectives, snapshots, and diagrammatic sketches fill the book's pages. The Aedes Network Campus Berlin (ANCB) is a 'Metropolitan Laboratory' and will host the first presentation of this book, including a moderated conversation between architects Wiel Arets, Peter Wilson, and Cino Zucchi–all of whom are featured subjects in this series' latest release.</span></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1637"><a data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ancb.de/sixcms/detail.php%3Fid%3D8099285"><span data-dcnode-id="1646" instrument_node="">ANCB The Metropolitan Laboratory</span></a><br data-dcnode-id="1644"><span data-dcnode-id="1643" instrument_node="">December 14th, 2012 18:00</span><br data-dcnode-id="1642"><br data-dcnode-id="1641"><span data-dcnode-id="1640" instrument_node="">Christinenstraße 18</span><br data-dcnode-id="1639"><span data-dcnode-id="1638" instrument_node="">Berlin, Germany</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1633"><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Moleskine-Inspiration-Process-Architecture-Arets/dp/8866134708/"><span data-dcnode-id="1635" instrument_node="">Order the book from Amazon</span></a></p><span data-dcnode-id="1632" instrument_node="">

</span><h2 data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">
					WAA participate in competition to design Dutch Supreme Court
				</span></h2><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1614" instrument_node=""> </span><span data-dcnode-id="1612" instrument_node=""> </span><span data-dcnode-id="1610" instrument_node=""> </span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">WAA together with the Brink Groep and Hillen &amp; Roosen were the initiators of the 'Hageraad' consortium, participating in the PPP competition for the 'Hoge Raad der Nederlanden'–the Dutch Supreme Court–located in The Hague. The project encompassed the design, build, finance, maintain, and operate (DBFMO) contract for this governmental building, and all parties of the consortium were equally involved throughout the project's year and a half duration. WAA congratulates the Poort van Den Haag consortium with their winning proposal for the 'Hoge Raad der Nederlanden'.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1599"><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/hoge_raad_der_nederlanden/"><span data-dcnode-id="1601" instrument_node="">Read more about the&nbsp;Hoge Raad</span></a></p><span data-dcnode-id="1598" instrument_node="">

</span><h2 data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">
					The Hedge House becomes the 'Bonnefanten Hedge House Foundation'
				</span></h2><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">The Hedge House, located on the grounds of Castle Wijlre in Limburg, the Netherlands, has been entrusted to the management of the Bonnefanten Museum, located in nearby Maastricht. The castle, its gardens, and the Hedge House will all become part of an independent organization, the 'Bonnefanten Hedge House Foundation', working in close collaboration with the Bonnefanten Museum, who is responsible for its exhibition program content.&nbsp;</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1578"><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bonnefanten.nl/en/bonnefanten_outdoor/bonnefanten_hedge_house"><span data-dcnode-id="1580" instrument_node="">Read more about the&nbsp;Hedge House</span></a></p><span data-dcnode-id="1577" instrument_node="">

</span><img alt="" data-dcnode-id="1571" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003440image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="1570" instrument_node="">
</span><div class="text" data-dcnode-id="1555"><span data-dcnode-id="1569" instrument_node="">
</span><div class="date" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">November 14, 2012</span></div><span data-dcnode-id="1566" instrument_node="">
</span><h2 data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">
					WAA progress construction on the B' Tower in Rotterdam
				</span></h2><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1562" instrument_node="">Located in the center of Rotterdam, immediately adjacent to the Bijenkorf department store by Marcel Breuer, the tower comprises a hybrid of urban programs composed of three volumes of similar height but varying width. The volume that meets the ground, which rises to the height of the Bijenkorf store, houses a fashion store and parking garage, while the two upper volumes that rise above the department store contain apartments. The entry to the fashion store opens to the pedestrian precinct next to the department store, and the apartments are accessed from the side road. Similar to the Breuer building, the façade, of alternating glass and aluminum panels, is not related to the floor levels or the individual functions but to the larger volumes, with cantilevered balconies clustered in lines along the façade creating shadows that give the building a larger, urban scale.</span><br data-dcnode-id="1561"><br data-dcnode-id="1560"><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/b_tower/"><span data-dcnode-id="1559" instrument_node="">Read more about the B' Tower</span></a></p><span data-dcnode-id="1556" instrument_node="">
</span></div><span data-dcnode-id="1554" instrument_node="">
</span></div><span data-dcnode-id="1552" instrument_node="">

</span><img alt="" data-dcnode-id="1550" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002583image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="1549" instrument_node="">
</span><div class="text" data-dcnode-id="1534"><span data-dcnode-id="1548" instrument_node="">
</span><div class="date" data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">October 23, 2012</span></div><span data-dcnode-id="1545" instrument_node="">
</span><h2 data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">
					WAA progress construction on Campus Hoogvliet in Rotterdam
				</span></h2><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1541" instrument_node="">Campus Hoogvliet is a new educational and cultural area located on the southern edge of Rotterdam composed of six buildings encompassing two vocational schools, an art studio, sports building, lyceum, restaurant, retail, and housing facilities. Each building has an outdoor patio linking the campus’ public space with each building’s private interior. Each of these patios is enclosed by a translucent glass ‘fence’ equal in height to the façades of the ground floor, and each fence contains a ‘gate’ allowing access to the patio from the main public space. A number of mature green areas surrounding the site have been incorporated into the landscaping, while in contrast each patio will be planted with red Japanese Maple trees.</span><br data-dcnode-id="1540"><br data-dcnode-id="1539"><a data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/campus_hoogvliet/"><span data-dcnode-id="1538" instrument_node="">Read more about Campus Hoogvliet</span></a></p><span data-dcnode-id="1535" instrument_node="">
</span></div><span data-dcnode-id="1533" instrument_node="">

</span><img alt="" data-dcnode-id="1529" height="535" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003450image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="1528" instrument_node="">
</span><div class="text" data-dcnode-id="1506"><span data-dcnode-id="1527" instrument_node="">
</span><div class="date" data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">October 19, 2012</span></div><span data-dcnode-id="1524" instrument_node="">
</span><h2 data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">
					An article on Wiel Arets is published in 'Dezeen'
				</span></h2><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1508"><i data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Dezeen</span></i><span data-dcnode-id="1518" instrument_node="">, one of the world's most influential architecture and design blogs, has recently published an article spotlighting the curriculum changes Dean Wiel Arets intends to introduce to IIT's College of Architecture in Chicago. States </span><i data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Dezeen</span></i><span data-dcnode-id="1515" instrument_node="">: 'Dutch architect Wiel Arets has set out his vision for the school, rejecting fashionable form-making in favor of greater concern for the public realm.' Arets added: 'What we saw during the boom was that people first made a shape and then said, "What can we do with it?" That worries me. There should always be a relationship between form, concept, programmatic forces, and sustainability. Form should not be autonomous. It should not be a fashionable thing.'</span><br data-dcnode-id="1514"><br data-dcnode-id="1513"><a data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dezeen.com/2012/10/18/signature-architecture-worries-me-says-new-iit-architecture-dean-wiel-arets/"><span data-dcnode-id="1512" instrument_node="">Read the full article at&nbsp;</span><i data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Dezeen</span></i></a></p><span data-dcnode-id="1507" instrument_node="">
</span></div><span data-dcnode-id="1505" instrument_node="">
</span></div><span data-dcnode-id="1503" instrument_node="">
</span><div class="news item cf" data-dcnode-id="1479"><span data-dcnode-id="1502" instrument_node="">
</span><img alt="" data-dcnode-id="1501" height="511" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002532image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="1500" instrument_node="">
</span><div class="text" data-dcnode-id="1481"><span data-dcnode-id="1499" instrument_node="">
</span><div class="date" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">October 18, 2012</span></div><span data-dcnode-id="1496" instrument_node="">
</span><h2 data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">
					An extensive interview with Wiel Arets is published in 'Architect'
				</span></h2><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1489"><i data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Architect</span></i><span data-dcnode-id="1490" instrument_node="">, the official magazine of the American Institute of Architects, has published an extensive interview between Wiel Arets and Stanley Tigerman, the former director of the School of Architecture at the University of Illinois at Chicago. Arets and Tigerman begin the conversation by discussing Arets' previous teaching experiences, and how these experiences shape his approach to academia. Arets continues by emphasizing his belief in research and cross-discipline collaboration, the ways in which the school's degree programs might evolve, and how he foresees the school becoming an international meeting-point for poignant architectural and design debate.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1483"><a data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.architectmagazine.com/education/meeting-of-the-deans_1.aspx"><span data-dcnode-id="1487" instrument_node="">Read the full interview at </span><i data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Architect</span></i></a></p><span data-dcnode-id="1482" instrument_node="">
</span></div><span data-dcnode-id="1480" instrument_node="">

</span><div class="date" data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">October 17, 2012</span></div><span data-dcnode-id="1471" instrument_node="">
</span><h2 data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">
					WAA book presentation at 'Do you read me?' in Berlin on November 13th
				</span></h2><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1464"><i data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Wiel Arets: Autobiographical References</span></i><span data-dcnode-id="1465" instrument_node="">&nbsp;(Birkhaüser, 2012) is a new book edited by Robert McCarter and designed by Irma Boom. 'do you read me?!', the renowned Berlin bookshop, will host the first presentation and signing of the publication in their 'Reading Room' located in Berlin-Tiergarten. The evening will begin with a discussion on the topic of 'A Wonderful World', Arets' optimistic outlook toward the future our of continuously 'shrinking' world, followed by a book signing session with Wiel Arets.</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1449"><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.doyoureadme.de/readingroom/" target="_blank"><span data-dcnode-id="1462" instrument_node="">do you read me?! 'Reading Room'</span></a><br data-dcnode-id="1460"><span data-dcnode-id="1459" instrument_node="">November 13th, 2012 19:00</span><br data-dcnode-id="1458"><br data-dcnode-id="1457"><span data-dcnode-id="1456" instrument_node="">Potsdamer Straße 98</span><br data-dcnode-id="1455"><span data-dcnode-id="1454" instrument_node="">Berlin, Germany</span><br data-dcnode-id="1453"><br data-dcnode-id="1452"><a data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.degruyter.com/view/product/203058" target="_blank"><span data-dcnode-id="1451" instrument_node="">Order the book from Birkhäuser</span></a></p><span data-dcnode-id="1448" instrument_node="">
