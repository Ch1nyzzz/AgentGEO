</span><div class="date" data-dcnode-id="5390"><span data-dcnode-id="5391" instrument_node="">March 19, 2018</span></div><span data-dcnode-id="5389" instrument_node="">
</span><h2 data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">
					Wiel Arets to lecture at the Technical University of Eindhoven
				</span></h2><span data-dcnode-id="5386" instrument_node="">
</span><p data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">On March 22nd Wiel Arets will give a lecture at the Technical University of Eindhoven, as part of the university’s 2018 ‘Making Architecture’ lecture series. The lecture will discuss new work of WAA, delve into the narratives behind the making of several recently completed projects, and explore the importance of self education as it relates biographical architecture. &nbsp;&nbsp;</span></p><span data-dcnode-id="5383" instrument_node="">
</span><p data-dcnode-id="5379"><span data-dcnode-id="5382" instrument_node="">March 22nd, 2018 19:00-21:30</span><br data-dcnode-id="5381"><span data-dcnode-id="5380" instrument_node="">Auditorium, Lecture Room 4</span></p><span data-dcnode-id="5378" instrument_node="">
</span><p data-dcnode-id="5370"><span data-dcnode-id="5377" instrument_node="">TU Eindhoven</span><br data-dcnode-id="5376"><span data-dcnode-id="5375" instrument_node="">Den Dolech 2</span><br data-dcnode-id="5374"><span data-dcnode-id="5373" instrument_node="">5616 AZ Eindhoven</span><br data-dcnode-id="5372"><span data-dcnode-id="5371" instrument_node="">the Netherlands</span></p><span data-dcnode-id="5369" instrument_node="">
</span><p data-dcnode-id="5366"><a data-dcnode-id="5367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anarchi.cc/activities/making-architecture-lecture-series/"><span data-dcnode-id="5368" instrument_node="">Read more about the event</span></a></p><span data-dcnode-id="5365" instrument_node="">

</span><img alt="" data-dcnode-id="5359" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004873image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5358" instrument_node="">

</span><h2 data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node="">
					The A’ House is published in ‘GA Japan 100 Details’
				</span></h2><span data-dcnode-id="5351" instrument_node="">
</span><p data-dcnode-id="5346"><span data-dcnode-id="5350" instrument_node="">The A’ House in Nishi-Azabu, Tokyo, is currently featured in </span><i data-dcnode-id="5348"><span data-dcnode-id="5349" instrument_node="">GA Japan 100 Details</span></i><span data-dcnode-id="5347" instrument_node="">; a Japanese language publication that aims to delve deeply into the construction details of 100 buildings completed in Japan during the past five years, to reveal the ‘wisdom’ of each architect behind the featured projects. The A' House is project number 79 within the publication.</span></p><span data-dcnode-id="5345" instrument_node="">
</span><p data-dcnode-id="5340"><a data-dcnode-id="5341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ga-ada.co.jp/japanese/ga_japan/gaj151.html"><span data-dcnode-id="5344" instrument_node="">Purchase </span><i data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">GA Japan 100 Details</span></i></a></p><span data-dcnode-id="5339" instrument_node="">
</span><p data-dcnode-id="5336"><a data-dcnode-id="5337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/a_house/"><span data-dcnode-id="5338" instrument_node="">Read more about the A’ House</span></a></p><span data-dcnode-id="5335" instrument_node="">

</span><img alt="" data-dcnode-id="5329" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004874image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5328" instrument_node="">
</span><div class="text" data-dcnode-id="5313"><span data-dcnode-id="5327" instrument_node="">
</span><div class="date" data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">March  5, 2018</span></div><span data-dcnode-id="5324" instrument_node="">
</span><h2 data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node="">
					WAA progress construction on the Antwerp Tower in Antwerp, Belgium
				</span></h2><span data-dcnode-id="5321" instrument_node="">
</span><p data-dcnode-id="5319"><span data-dcnode-id="5320" instrument_node="">Situated on a corner site, adjacent to the Flemish Opera house, the Antwerp Tower is an existing building that will be repurposed to hybrid-programmed residential tower, reusing the existing building’s structure, and shape. It is the city's third tallest tower.&nbsp;Currently 87 m tall, and expected to be 100 m when completed, the building will eventually total 59.800 m2. The tower sits atop a plinth, which to be outfit with retail space. There are dining, and wellness areas in the first level of the tower–with a sprawling plinth-rooftop terrace abutting the side façade of the adjacent opera. The tower sits atop a plinth, which to be outfit with retail space...</span></p><span data-dcnode-id="5318" instrument_node="">
</span><p data-dcnode-id="5315"><a data-dcnode-id="5316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/antwerp_tower/"><span data-dcnode-id="5317" instrument_node="">Read more about the Antwerp Tower</span></a></p><span data-dcnode-id="5314" instrument_node="">

</span></div><span data-dcnode-id="5310" instrument_node="">
</span><div class="news item cf" data-dcnode-id="5290"><span data-dcnode-id="5309" instrument_node="">
</span><img alt="" data-dcnode-id="5308" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004850image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5307" instrument_node="">

</span><div class="date" data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">February 12, 2018</span></div><span data-dcnode-id="5303" instrument_node="">
</span><h2 data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">
					WAA begin construction on the Van der Valk Hotel in Amsterdam’s Zuidas District
				</span></h2><span data-dcnode-id="5300" instrument_node="">
</span><p data-dcnode-id="5298"><span data-dcnode-id="5299" instrument_node="">With origins as a highway-centric motel chain for travelers by automobile; Van der Valk is an international company, whose roots are Dutch, and whose hotels are almost always sited adjacent to highways, providing comfortable lodging and dining for locals and those traveling long distances by car. Seeking to reposition itself in the Dutch market, while spurring a renewal of its image; the chain, long known for its hotels sited in-between major Dutch cities, will add a new location to their portfolio of properties, with a 26.000 m2 hotel in Amsterdam...</span></p><span data-dcnode-id="5297" instrument_node="">
</span><p data-dcnode-id="5294"><a data-dcnode-id="5295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/van_der_valk_hotel/"><span data-dcnode-id="5296" instrument_node="">Read more about the Van der Valk Hotel</span></a></p><span data-dcnode-id="5293" instrument_node="">

</span></div><span data-dcnode-id="5289" instrument_node="">

</span><img alt="" data-dcnode-id="5287" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004801image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5286" instrument_node="">
</span><div class="text" data-dcnode-id="5271"><span data-dcnode-id="5285" instrument_node="">
</span><div class="date" data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">January 17, 2018</span></div><span data-dcnode-id="5282" instrument_node="">
</span><h2 data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">
					WAA progress construction on Europaallee 'Site D' in Zürich
				</span></h2><span data-dcnode-id="5279" instrument_node="">
</span><p data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">Europaallee is a new urban district west of the city’s main train station, south of its terminating tracks. It consists of eight new buildings, each assigned a letter, ’A-H’; ‘Site D’ was designed by WAA. Google is the district’s main tenant, and will occupy most office space in ‘Site D’. Parallel to the adjacent railroad tracks; the first two floors will contain retail and dining, organized around a central void traversed by dual ramping escalators. Eight floors of office space are set atop the plinth, organized around an multi-level exterior courtyard, essentially creating two office ‘towers’. A closed cavity fau0003çade system, bound by polished concrete containing Carrara marble, encases the building; luxuriously contrasting matte-brass finishings.</span></p><span data-dcnode-id="5276" instrument_node="">

				</span></h2><span data-dcnode-id="5258" instrument_node="">
</span><p data-dcnode-id="5256"><span data-dcnode-id="5257" instrument_node="">A luxurious holiday home wth a 9 m cantilevered pool extending from its roof, to provide views to the Mediterranean Sea; the Jellyfish House is currently featured on CNN Style, in an article entitled 'Awe-inspiring pool designs from around the world'. So states the article: ‘From infinity pools that blend into the landscape to suspended baths linking skyscrapers together, swimming pools that push boundaries are fast becoming a statement feature in the design of a building. While clients asking for a residential pool often favor extravagance in terms of cost and size, unusual designs can be more memorable… An elevated swimming pool built by Wiel Arets for a holiday home in Marbella has a glazed underside that cantilevers over an outdoor lounge area.’&nbsp;</span></p><span data-dcnode-id="5255" instrument_node="">

</span><h2 data-dcnode-id="5130"><span data-dcnode-id="5131" instrument_node="">
					WAA progress construction on Europaallee 'Site D' in Zürich
				</span></h2><span data-dcnode-id="5129" instrument_node="">
</span><p data-dcnode-id="5124"><span data-dcnode-id="5128" instrument_node="">Foundation work is nearly complete on WAA's newest building in Zürich–Europaallee 'Site D'. The building is currently known as 'Site D' due to the numbers of buildings in the new Europaallee district–eight in total, each assigned a letter, 'A-H'. The district is located west of the city’s main train station, and, upon completion, will consist of office space, with restaurants and retail occupying ground floor spaces. As with many new urban spaces in Zürich, ample seating and bike parking will be incorporated. Similar to </span><i data-dcnode-id="5126"><span data-dcnode-id="5127" instrument_node="">allée</span></i><span data-dcnode-id="5125" instrument_node=""> of formal gardens; the district will be planted with copious amounts of greenery, with trees bordering the main pedestrian passage, creating a 'small-scale' urban garden within the resulting small 'urban canyon' the district will form.&nbsp;Google is the district’s main tenant, and will occupy most office space in ‘Site D’, whose basement level is connected to two adjacent buildings and contains a tunnel for vehicles, so that deliveries can be made underground, minimizing automobile presence in the area.</span></p><span data-dcnode-id="5123" instrument_node="">

</span><h2 data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">
					The IIT CoA &amp; Actar publish the book 'Crown Hall Dean's Dialogues 2012-2017'
				</span></h2><span data-dcnode-id="5105" instrument_node="">
</span><p data-dcnode-id="5101"><i data-dcnode-id="5103"><span data-dcnode-id="5104" instrument_node="">Crown Hall Dean’s Dialogues: 2012-2017</span></i><span data-dcnode-id="5102" instrument_node=""> (Actar/IITAC) collects an array of intimate thoughts from 18 of the world’s leading architects, designers, and photographers; all of whom were interviewed by students and faculty, before they lectured at the Illinois Institute of Technology's College of Architecture (IIT CoA), under the tenure of Dean Wiel Arets. Acclaimed voices ranging from Kazuyo Sejima, Phyllis Lambert, Erwin Olaf, Ben van Berkel, Peter Eisenman, David Adjaye, and Rafael Vinoly freely express their thoughts on the essential issues that drive their work and process. Designed by Mainstudio in Amsterdam; the book totals 300 pages.</span></p><span data-dcnode-id="5100" instrument_node="">
</span><p data-dcnode-id="5093"><a data-dcnode-id="5098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/crown_hall_dean_s_dialogues_2012_2017"><span data-dcnode-id="5099" instrument_node="">Read more about the book</span></a><br data-dcnode-id="5097"><br data-dcnode-id="5096"><a data-dcnode-id="5094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Crown-Hall-Deans-Dialogues-2012-2017/dp/1945150505"><span data-dcnode-id="5095" instrument_node="">Purchase the book from Amazon</span></a></p><span data-dcnode-id="5092" instrument_node="">

</span><p data-dcnode-id="5076"><span data-dcnode-id="5077" instrument_node="">Europaallee is a new urban district west of the city’s main train station, south of its terminating tracks. It consists of eight new buildings, each assigned a letter, ’A-H’; ‘Site D’ was designed by WAA. Google is the district’s main tenant, and will occupy most office space in ‘Site D’. Parallel to the adjacent railroad tracks; the first two floors will contain retail and dining, organized around a central void traversed by dual ramping escalators. Eight floors of office space are set atop the plinth, organized around an multi-level exterior courtyard, essentially creating two office ‘towers’. A closed cavity fau0003çade system, bound by polished concrete containing Carrara marble, encases the building; luxuriously contrasting matte-brass finishings.</span></p><span data-dcnode-id="5075" instrument_node="">

</span><h2 data-dcnode-id="5058"><span data-dcnode-id="5059" instrument_node="">
					'A Daily Dose of Architecture' discusses ‘Ellen Kooi Above Rotterdam’
				</span></h2><span data-dcnode-id="5057" instrument_node="">
</span><p data-dcnode-id="5055"><span data-dcnode-id="5056" instrument_node="">'Wiel Arets Architects' B' Tower is the subject of this book, which is unlike any other architectural case study. A collaboration between Arets and artists Ellen Kooi and Katrien Van den Brande, the book presents glimpses into the tower's units through Kooi's photographs and Van den Brande's stories... Although obviously staged, the images reveal scenarios that activate the modern and often bare spaces of the five apartments portrayed. Ironically both the photos and the poetic words between the apartment spreads embody a way of thinking and interacting with the surroundings that is so much more artistic than the mundane, day-to-day lives often depicted in photos and writings about buildings.'</span></p><span data-dcnode-id="5054" instrument_node="">
</span><p data-dcnode-id="5051"><a data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/ellen_kooi_above_rotterdam"><span data-dcnode-id="5053" instrument_node="">Read about the book</span></a></p><span data-dcnode-id="5050" instrument_node="">
</span><p data-dcnode-id="5047"><a data-dcnode-id="5048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//archidose.blogspot.nl/2017/05/book-briefs-29.html"><span data-dcnode-id="5049" instrument_node="">Read the full 'book brief'</span></a></p><span data-dcnode-id="5046" instrument_node="">
</span></div><span data-dcnode-id="5044" instrument_node="">
</span></div><span data-dcnode-id="5042" instrument_node="">
</span><div class="news item cf" data-dcnode-id="5016"><span data-dcnode-id="5041" instrument_node="">
</span><img alt="" data-dcnode-id="5040" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004620image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5039" instrument_node="">
</span><div class="text" data-dcnode-id="5018"><span data-dcnode-id="5038" instrument_node="">
</span><div class="date" data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">June  1, 2017</span></div><span data-dcnode-id="5035" instrument_node="">
</span><h2 data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">
					WAA publish 'Ellen Kooi Above Rotterdam'
				</span></h2><span data-dcnode-id="5032" instrument_node="">
</span><p data-dcnode-id="5028"><i data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">Ellen Kooi Above Rotterdam: One Glass Tower by Wiel Arets and Nine Situations by Katrien Van den Brande</span></i><span data-dcnode-id="5029" instrument_node="">&nbsp;(Actar, 2016) is a new book that documents five sets of highly-staged ‘scenarios’ by artist Ellen Kooi, and nine textual ‘situations’ by Katrien Van den Brande, of numerous imaginary guests, who simultaneously inhabit the B’ Tower–a high-rise in the center of Rotterdam by WAA. In Kooi's 'sets', a girl cuddles with Weimaraners; a lonely business man digitally pines for his distant love; a young couple seduces one another; an informal dinner gathering morphs into a musical; a mother creates a dream world for her and her children. The publication is a two-dimensional immersion into a parallel urban reality, that’s at once fantasy and fiction–yet remarkably familiar.</span></p><span data-dcnode-id="5027" instrument_node="">
</span><p data-dcnode-id="5020"><a data-dcnode-id="5025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/ellen_kooi_above_rotterdam"><span data-dcnode-id="5026" instrument_node="">Read more about the book</span></a><br data-dcnode-id="5024"><br data-dcnode-id="5023"><a data-dcnode-id="5021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Ellen-Kooi-Above-Rotterdam-Situations/dp/194515022X"><span data-dcnode-id="5022" instrument_node="">Order the book from Amazon</span></a></p><span data-dcnode-id="5019" instrument_node="">

</span><h2 data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">
					Wiel Arets concludes deanship at the Illinois Institute of Technology College of Architecture
				</span></h2><span data-dcnode-id="5005" instrument_node="">
</span><p data-dcnode-id="4999"><span data-dcnode-id="5004" instrument_node="">At the end of the 2016-2017 academic calendar, Wiel Arets will conclude his deanship at the Illinois Institute of Technology College of Architecture in Chicago–after being appointed in 2012. Seeking new leadership to infuse the college with a globally oriented outlook and engagement; Arets has been vital to reestablishing the college as a center of international architecture, urbanism, and metropolitan debate–simultaneously advancing the college beyond its own legacy, long overshadowed by Mies van der Rohe. Arets will join the faculty at the&nbsp;Illinois Institute of Technology College of Architecture, at the onset of the 2017-2018 academic calendar.</span><br data-dcnode-id="5003"><br data-dcnode-id="5002"><a data-dcnode-id="5000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//arch.iit.edu/life/wiel-arets-concludes-deanship"><span data-dcnode-id="5001" instrument_node="">Read the official&nbsp;announcement</span></a></p><span data-dcnode-id="4998" instrument_node="">

</span><h2 data-dcnode-id="4985"><span data-dcnode-id="4986" instrument_node="">
					‘MCHAP: The Americas’ wins 2016 Best Dutch Book Design Award
				</span></h2><span data-dcnode-id="4984" instrument_node="">
</span><p data-dcnode-id="4976"><span data-dcnode-id="4983" instrument_node="">Published by the Illinois Institute of Technology’s College of Architecture (IITAC Press) and Actar; </span><i data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">MCHAP: The Americas </span></i><span data-dcnode-id="4980" instrument_node="">has won a 2016 Best Dutch Book Design Award. Annually bestowed to books produced in the Netherlands, the award recognizes, ‘editorial choices, graphic design, treatment of images and text, choice of material and technical workmanship.’ The book&nbsp;documents the inaugural MCHAP award, instated by Wiel Arets at the College of Architecture in 2014. Edited by Fabrizio Gallanti, designed by Mainstudio, and 500 pages long; </span><i data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">MCHAP: The Americas</span></i><span data-dcnode-id="4977" instrument_node=""> encapsulates early-twenty-first century innovative architecture, throughout the Americas.</span></p><span data-dcnode-id="4975" instrument_node="">
</span><p data-dcnode-id="4972"><a data-dcnode-id="4973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bestverzorgdeboeken.nl/en/"><span data-dcnode-id="4974" instrument_node="">Read more about the award</span></a></p><span data-dcnode-id="4971" instrument_node="">
</span><p data-dcnode-id="4966"><a data-dcnode-id="4967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//actar.com/mchap-the-americas/"><span data-dcnode-id="4970" instrument_node="">Purchase </span><i data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">MCHAP: The Americas</span></i></a></p><span data-dcnode-id="4965" instrument_node="">

</span><h2 data-dcnode-id="4952"><span data-dcnode-id="4953" instrument_node="">
					Wiel Arets to lecture at Rice University
				</span></h2><span data-dcnode-id="4951" instrument_node="">
</span><p data-dcnode-id="4946"><span data-dcnode-id="4950" instrument_node="">On January 18th Wiel Arets will give a lecture at Rice University in Houston, entitled ‘Unconscious City’, which will explore the notion of the, largely invisible changes currently mutating the way we move through, experience, and perceive the world’s metropolises. The ideals presented will soon find permanent form, in the forthcoming WAA publication </span><i data-dcnode-id="4948"><span data-dcnode-id="4949" instrument_node="">Unconscious City. </span></i><span data-dcnode-id="4947" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4945" instrument_node="">
</span><p data-dcnode-id="4941"><span data-dcnode-id="4944" instrument_node="">January 18th, 2017 17:30-19:00</span><br data-dcnode-id="4943"><span data-dcnode-id="4942" instrument_node="">Farish Gallery, Anderson Hall</span></p><span data-dcnode-id="4940" instrument_node="">
</span><p data-dcnode-id="4932"><span data-dcnode-id="4939" instrument_node="">Rice University</span><br data-dcnode-id="4938"><span data-dcnode-id="4937" instrument_node="">6100 Main Street</span><br data-dcnode-id="4936"><span data-dcnode-id="4935" instrument_node="">Houston, Texas&nbsp;77005</span><br data-dcnode-id="4934"><span data-dcnode-id="4933" instrument_node="">United States of America</span></p><span data-dcnode-id="4931" instrument_node="">
</span><p data-dcnode-id="4928"><a data-dcnode-id="4929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//events.rice.edu/index.cfm%3FEventRecord%3D32070"><span data-dcnode-id="4930" instrument_node="">Read more about the event</span></a></p><span data-dcnode-id="4927" instrument_node="">

</span><h2 data-dcnode-id="4914"><span data-dcnode-id="4915" instrument_node="">
					WAA complete the IJhal in Amsterdam
				</span></h2><span data-dcnode-id="4913" instrument_node="">
</span><p data-dcnode-id="4907"><span data-dcnode-id="4912" instrument_node="">The IJhal is a recently completed pedestrian passageway situated within Amsterdam’s central train station, on its the northern, waterside–which abuts the river it’s named for, the IJ. The station has been under continuous construction, for approximately the last decade, as the city spearheaded a total transformation of the original nineteenth century building; expanding it to accommodate the city’s growing population.&nbsp;Outfit with enormous LED screens that continually transition between voyeuristic and calming scenes of the city, and a golden-yellow-tan hued terrazzo floor; the mirrored passage encourages constant pedestrian movement, while remaining durable under the daily foot traffic, of tens of thousands of travelers.</span><br data-dcnode-id="4911"><br data-dcnode-id="4910"><a data-dcnode-id="4908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/ijhal/"><span data-dcnode-id="4909" instrument_node="">Read more about the IJhal</span></a></p><span data-dcnode-id="4906" instrument_node="">

</span><h2 data-dcnode-id="4893"><span data-dcnode-id="4894" instrument_node="">
					Winter greetings and happy 2017 from WAA
				</span></h2><span data-dcnode-id="4892" instrument_node="">
</span><p data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">WAA extends season's greetings and well wishes for the new year ahead–as with this week's solstice, winter has officially begun. This autumn in Zürich, the Blumenhaus–a mixed-use office and residential building in the city's&nbsp;Escher Wyss district–was completed. The project's custom façade components distantly recall the hibiscus&nbsp;flowers of Andy Warhol's famed 1960s prints.</span></p><span data-dcnode-id="4889" instrument_node="">
</span><p data-dcnode-id="4886"><a data-dcnode-id="4887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/blumenhaus/"><span data-dcnode-id="4888" instrument_node="">Read more about the Blumenhaus</span></a></p><span data-dcnode-id="4885" instrument_node="">

</span><div class="text" data-dcnode-id="4860"><span data-dcnode-id="4877" instrument_node="">
</span><div class="date" data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">November 24, 2016</span></div><span data-dcnode-id="4874" instrument_node="">
</span><h2 data-dcnode-id="4872"><span data-dcnode-id="4873" instrument_node="">
					The IJhal is published in Domus
				</span></h2><span data-dcnode-id="4871" instrument_node="">
</span><p data-dcnode-id="4862"><span data-dcnode-id="4870" instrument_node="">The November 2016 issue of the Italian publication </span><i data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">Domus</span></i><span data-dcnode-id="4867" instrument_node=""> includes a 12 page article featuring the IJhal in Amsterdam’s Central Station. The new pedestrian passage is adjacent to the water at the back of the train station; inside, its rounded-mirrored ceiling elements, reflect sunlight refracted from the water's undulating waves. The IJhal signifies a new chapter in the story of Amsterdam’s historic, deeply intertwined relationship with water.</span><br data-dcnode-id="4866"><br data-dcnode-id="4865"><a data-dcnode-id="4863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/ijhal/"><span data-dcnode-id="4864" instrument_node="">Read more about the IJhal</span></a></p><span data-dcnode-id="4861" instrument_node="">

</span><h2 data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">
					The Allianz Headquarters in Zürich is nominated for the 2016 'Architecture Photography Award'
				</span></h2><span data-dcnode-id="4847" instrument_node="">
</span><p data-dcnode-id="4841"><span data-dcnode-id="4846" instrument_node="">An image of WAA’s Allianz Headquarters–a hybrid office tower dispersed over two buildings, connected by sky bridges–in Zürich, taken by photographer Adrien Barakat, was recently nominated for the ‘Arcaid Images Architectural Photography Awards 2016’. Captured in the image is one of the project’s many roof terraces; two men are seated at a table, ostensibly for a meeting, while another, lone worker, checks his smartphone at the terrace’s opposite end. The award ceremony will occur during the 2016 World Architecture Festival–set to take place in Berlin from 16-18 November.</span><br data-dcnode-id="4845"><br data-dcnode-id="4844"><a data-dcnode-id="4842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/allianz_headquarters/"><span data-dcnode-id="4843" instrument_node="">Read more about Allianz Headquarters</span></a></p><span data-dcnode-id="4840" instrument_node="">

</span><h2 data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node="">
					Wiel Arets to lecture on 'Making' at the University of Illinois at Chicago
				</span></h2><span data-dcnode-id="4820" instrument_node="">
</span><p data-dcnode-id="4818"><span data-dcnode-id="4819" instrument_node="">On October 25th Wiel Arets will give a lecture at the University of Illinois at Chicago, entitled ‘Five+Zero+Me’. The lecture will explore the notion of ‘making’ in WAA’s recent projects–such as the IJhal in Amsterdam’s central train station, and the Blumenhaus, in Zürich’s 'rough-premium' district of Escher-Wyss.</span></p><span data-dcnode-id="4817" instrument_node="">

					The IIT College of Architecture to host 2014-2015 'MCHAP Award Symposium'
				</span></h2><span data-dcnode-id="4783" instrument_node="">
</span><p data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">On October 19th, 2016 the College of Architecture at the Illinois Institute of Technology will host a symposium and dinner for the 'MCHAP Finalist'. Throughout the day students, faculty, and the public are invited to participate in a dialogue between the jury and the nominated architects. Later, the award's benefit dinner will occur–with Rahm Emanuel, Mayer of Chicago, and Phyllis Lambert, as esteemed honorary guests–culminating with&nbsp;winner's&nbsp;announcement.</span></p><span data-dcnode-id="4780" instrument_node="">

					 WAA complete construction on the Blumenhaus in Zürich
				</span></h2><span data-dcnode-id="4749" instrument_node="">
</span><p data-dcnode-id="4743"><span data-dcnode-id="4748" instrument_node="">A mixed-use program of office and retail, with private residences above, define the Blumenhaus. The building is an integral component of a larger effort by the city of Zürich to rebrand its Escher-Wyss district through a metamorphosis of new development, including green spaces, bikes lanes, and a plethora of new housing. The district is characterized by its industrial heritage, and palette of raw concrete, burgundy brick, and rusted steel; it is bounded to its north by the Limmat River, and to its south by the entanglement of railway tracks that lead to the city’s main train station...</span><br data-dcnode-id="4747"><br data-dcnode-id="4746"><a data-dcnode-id="4744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/blumenhaus/"><span data-dcnode-id="4745" instrument_node="">Read more about the Blumenhaus</span></a></p><span data-dcnode-id="4742" instrument_node="">

</span><img alt="" data-dcnode-id="4736" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004468image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="4735" instrument_node="">

</span><h2 data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">
					The IIT School of Architecture's visual identity is featured in AIGA's 'Eye on Design'
				</span></h2><span data-dcnode-id="4728" instrument_node="">
</span><p data-dcnode-id="4711"><span data-dcnode-id="4727" instrument_node="">The </span><a data-dcnode-id="4725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//arch.iit.edu/"><span data-dcnode-id="4726" instrument_node="">School of Architecture</span></a><span data-dcnode-id="4724" instrument_node=""> at the Illinois Institute of Chicago, under the deanship of Wiel Arets, began in 2012 to introduce a new visual identity to the school’s print and digital media, as well as its way finding systems within S.R. Crown Hall. Designed by Mainstudio (Edwin van Gelder) of Amsterdam, the identity–which has evolved since its introduction, as well as received with increasing acclaim–was recently featured in the </span><a data-dcnode-id="4722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/AIGA"><span data-dcnode-id="4723" instrument_node="">AIGA</span></a><span data-dcnode-id="4721" instrument_node=""> publication </span><i data-dcnode-id="4719"><span data-dcnode-id="4720" instrument_node="">Eye on Design</span></i><span data-dcnode-id="4718" instrument_node="">; ‘…Van Gelder went to Chicago to speak with [Arets] and draw from the structure of the canonical building by Mies van der Rohe that houses the university; he used its shape and Arets’ theories to inform the editorial layout.’</span><br data-dcnode-id="4717"><br data-dcnode-id="4716"><a data-dcnode-id="4712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eyeondesign.aiga.org/how-main-studios-communications-for-the-school-of-architecture-illinois-have-evolved/"><span data-dcnode-id="4715" instrument_node="">Read the article at </span><i data-dcnode-id="4713"><span data-dcnode-id="4714" instrument_node="">Eye on Design</span></i></a></p><span data-dcnode-id="4710" instrument_node="">
</span></div><span data-dcnode-id="4708" instrument_node="">

</span><h2 data-dcnode-id="4697"><span data-dcnode-id="4698" instrument_node="">
					The Utrecht University Library is published in ‘Architectural Digest’
				</span></h2><span data-dcnode-id="4696" instrument_node="">
</span><p data-dcnode-id="4691"><span data-dcnode-id="4695" instrument_node="">Located on the Uithof campus, the Utrecht University Library–completed in 2004, just as libraries began to anticipate the effects of the digital revolution on their modus operandi-was recently published in </span><i data-dcnode-id="4693"><span data-dcnode-id="4694" instrument_node="">Architectural Digest</span></i><span data-dcnode-id="4692" instrument_node="">. Where the library’s black concrete surfaces are imprinted with the papyrus relief, book stacks are to be found behind, as the library does not have one central book depot, and instead utilizes multiple stacks dispersed throughout each level, which seem to float like black storm clouds throughout the main space. So states the magazine: ‘The fritted glass that sheathes the exterior of Wiel Arets Architects’ Utrecht University Library in the Netherlands is printed with a pattern of fossilized papyrus. The material helps to protect the books on display within.’</span></p><span data-dcnode-id="4690" instrument_node="">
</span><p data-dcnode-id="4687"><a data-dcnode-id="4688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/utrecht_university_library/"><span data-dcnode-id="4689" instrument_node="">Read more about the library</span></a></p><span data-dcnode-id="4686" instrument_node="">

</span><h2 data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">
					WAA's Jellyfish House is published in 'GA Houses'
				</span></h2><span data-dcnode-id="4672" instrument_node="">
</span><p data-dcnode-id="4667"><span data-dcnode-id="4671" instrument_node="">The most recent issue of the Japanese publication </span><i data-dcnode-id="4669"><span data-dcnode-id="4670" instrument_node="">GA Houses</span></i><span data-dcnode-id="4668" instrument_node="">, #147, includes a 16 page feature article on the Jellyfish House, which is located on the Costa del Sol of Spain, near to Marbella, the famed jet-set destination of the mid- to late-twentieth century. The issue includes new photography of the house–in color and black and white–taken specifically for the publication, by the acclaimed Japanese photographer Yoshio Futagawa.</span></p><span data-dcnode-id="4666" instrument_node="">
</span><p data-dcnode-id="4663"><a data-dcnode-id="4664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ga-ada.co.jp/english/ga_houses/gah147.html"><span data-dcnode-id="4665" instrument_node="">Purchase GA Houses #147</span></a></p><span data-dcnode-id="4662" instrument_node="">
</span><p data-dcnode-id="4659"><a data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/jellyfish_house/"><span data-dcnode-id="4661" instrument_node="">Read more about the Jellyfish House</span></a></p><span data-dcnode-id="4658" instrument_node="">

</span><h2 data-dcnode-id="4645"><span data-dcnode-id="4646" instrument_node="">
					WAA progress construction on the Blumenhaus in Zürich
				</span></h2><span data-dcnode-id="4644" instrument_node="">
</span><p data-dcnode-id="4639"><span data-dcnode-id="4643" instrument_node="">A mixed-use program of office and retail, with private residences above, define the Blumenhaus. It is a newly built building set for completion this summer; it is, together with those nearing completion in its immediate vicinity, part of the larger effort to rebrand the Escher-Wyss district of Zürich–characterized by its industrial heritage. Blumenhaus is adjacent to a former ship building hall–or </span><i data-dcnode-id="4641"><span data-dcnode-id="4642" instrument_node="">Shiffbau</span></i><span data-dcnode-id="4640" instrument_node="">, in German–of Escher Wyss &amp; Cie., an industrial company from which the area derives its name. Blumenhaus' façade is finished in matte aluminum, punctuated by poppy flower silhouettes, and inversely, reliefs of the same pattern; Blumenhaus' materiality acknowledges the area's 'rough' industrial past, whose incorporation of technology is readily apparent, upon second-glance.</span></p><span data-dcnode-id="4638" instrument_node="">
</span><p data-dcnode-id="4634"><br data-dcnode-id="4637"><a data-dcnode-id="4635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/blumenhaus/"><span data-dcnode-id="4636" instrument_node="">Read more about the Blumenhaus</span></a></p><span data-dcnode-id="4633" instrument_node="">
</span></div><span data-dcnode-id="4631" instrument_node="">

</span><img alt="" data-dcnode-id="4627" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004425image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="4626" instrument_node="">
</span><div class="text" data-dcnode-id="4611"><span data-dcnode-id="4625" instrument_node="">
</span><div class="date" data-dcnode-id="4623"><span data-dcnode-id="4624" instrument_node="">April 22, 2016</span></div><span data-dcnode-id="4622" instrument_node="">
</span><h2 data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">
					WAA progress construction on the IJhal in Amsterdam
				</span></h2><span data-dcnode-id="4619" instrument_node="">
</span><p data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node="">As spring emerges in Amsterdam, and its greenery effloresces, so too is another emergence taking place in the city; the IJhal in the central train station, which is quickly nearing its completion. The IJhal is a new pedestrian passageway on the waterside of the station; it is situated under a new bus terminal, and above the yet-to-be opened 'North-South' metro line. The station is a confluence point for taxi, train, metro, tram, and water ferry traffic; the IJhal is a major node of pedestrian movement in Amsterdam. Outfit with enormous LED screens, which display scenes of the city, a yellow-tan hued terrazzo floor, and many rounded mirrored elements, on its ceiling, as well as wrapped around its poles–its eastern half will soon be completed.</span></p><span data-dcnode-id="4616" instrument_node="">
</span><p data-dcnode-id="4613"><a data-dcnode-id="4614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/ijhal/"><span data-dcnode-id="4615" instrument_node="">Read more about the IJhal</span></a></p><span data-dcnode-id="4612" instrument_node="">

</span><img alt="" data-dcnode-id="4606" height="515" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004407image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="4605" instrument_node="">

</span><div class="date" data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">April 13, 2016</span></div><span data-dcnode-id="4601" instrument_node="">
</span><h2 data-dcnode-id="4599"><span data-dcnode-id="4600" instrument_node="">
					Wiel Arets to lecture on Mies van der Rohe at the TU Eindhoven
				</span></h2><span data-dcnode-id="4598" instrument_node="">
</span><p data-dcnode-id="4580"><span data-dcnode-id="4597" instrument_node="">On April 21st Wiel Arets will give a lecture at the Technical University of Eindhoven, regarding Mies van der Rohe and his architectural legacy in relation to modernism. In addition to focusing on Mies and his surviving oeuvre of built projects, the lecture will also highlight the nature of the projects' innovations, how the oeuvre has been received, and how its founding principals have since been reinterpreted by successive generations of architects.&nbsp;</span><br data-dcnode-id="4596"><br data-dcnode-id="4595"><span data-dcnode-id="4594" instrument_node="">Technical University of Eindhoven</span><br data-dcnode-id="4593"><span data-dcnode-id="4592" instrument_node="">April 21st, 2016 19:00</span><br data-dcnode-id="4591"><br data-dcnode-id="4590"><span data-dcnode-id="4589" instrument_node="">TU Eindhoven, De Zaale</span><br data-dcnode-id="4588"><span data-dcnode-id="4587" instrument_node="">5612 AZ Eindhoven</span><br data-dcnode-id="4586"><span data-dcnode-id="4585" instrument_node="">the Netherlands</span><br data-dcnode-id="4584"><br data-dcnode-id="4583"><a data-dcnode-id="4581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//schunck.nl/architectuur/miesvanderrohe/mies-de-erfenis-van-het-modernisme-symposia/http%3A//schunck.nl/architectuur/miesvanderrohe/mies-de-erfenis-van-het-modernisme-symposia/"><span data-dcnode-id="4582" instrument_node="">Read more about the event</span></a></p><span data-dcnode-id="4579" instrument_node="">

</span><div class="date" data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">March 23, 2016</span></div><span data-dcnode-id="4568" instrument_node="">
</span><h2 data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">
					Wiel Arets to participate in an IIT Alumni event held in New York City
				</span></h2><span data-dcnode-id="4565" instrument_node="">
</span><p data-dcnode-id="4553"><span data-dcnode-id="4564" instrument_node="">The Illinois Institute of Technology's Alumni Association will soon convene in New York, and Wiel Arets will hold a lecture during the gathering, on the nature of the College of Architecture's revised curriculum, and its impact on architectural education in Chicago; including how the College of Architecture has communicated its activities and revised pedagogical philosophy to the city outside of its walls, as well as to the world beyond the city of Chicago.</span><br data-dcnode-id="4563"><br data-dcnode-id="4562"><span data-dcnode-id="4561" instrument_node="">March 29th, 2016 19:00</span><br data-dcnode-id="4560"><br data-dcnode-id="4559"><span data-dcnode-id="4558" instrument_node="">225 E. 21st Street </span><br data-dcnode-id="4557"><span data-dcnode-id="4556" instrument_node="">New York, NY 10010</span><br data-dcnode-id="4555"><span data-dcnode-id="4554" instrument_node="">United States of America</span></p><span data-dcnode-id="4552" instrument_node="">
</span><p data-dcnode-id="4549"><a data-dcnode-id="4550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alumni.iit.edu/event-pages/new-york-alumni-gathering-registration-march-29-2016"><span data-dcnode-id="4551" instrument_node="">RSVP for the event</span></a></p><span data-dcnode-id="4548" instrument_node="">
</span></div><span data-dcnode-id="4546" instrument_node="">
</span></div><span data-dcnode-id="4544" instrument_node="">

</span><img alt="" data-dcnode-id="4542" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004391image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="4541" instrument_node="">
</span><div class="text" data-dcnode-id="4513"><span data-dcnode-id="4540" instrument_node="">
</span><div class="date" data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">March  9, 2016</span></div><span data-dcnode-id="4537" instrument_node="">
</span><h2 data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">
					Wiel Arets to lecture at the Amsterdam Academy of Architecture
				</span></h2><span data-dcnode-id="4534" instrument_node="">
</span><p data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">On March 17th, as part of the 2016 'Spring Lecture Series' at the Amsterdam Academy of Architecture, Wiel Arets will give a lecture on the ever evolving state of architectural education, recent work by WAA–such as the IJhal, with its mirrored ceiling, in Amsterdam–and how the many influences that he finds from outside the realm of architecture, are applied to the works of WAA, in order to create innovative solutions, often reflecting local craftsmanship.</span></p><span data-dcnode-id="4531" instrument_node="">
</span><p data-dcnode-id="4515"><a data-dcnode-id="4529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ahk.nl/actueel/agenda/event/cal////event/1lectures-met-wiel-arets-one-architect///tx_cal_phpicalendar/"><span data-dcnode-id="4530" instrument_node="">Amsterdam Academy of Architecture</span></a><br data-dcnode-id="4528"><span data-dcnode-id="4527" instrument_node="">March 17th, 2016 20:00-21:30</span><br data-dcnode-id="4526"><br data-dcnode-id="4525"><span data-dcnode-id="4524" instrument_node="">Waterlooplein 211</span><br data-dcnode-id="4523"><span data-dcnode-id="4522" instrument_node="">Amsterdam 1011 PG</span><br data-dcnode-id="4521"><span data-dcnode-id="4520" instrument_node="">the Netherlands</span><br data-dcnode-id="4519"><br data-dcnode-id="4518"><a data-dcnode-id="4516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.arcam.nl/shop/tickets/"><span data-dcnode-id="4517" instrument_node="">Read more about the event and RSVP</span></a></p><span data-dcnode-id="4514" instrument_node="">
</span></div><span data-dcnode-id="4512" instrument_node="">
</span></div><span data-dcnode-id="4510" instrument_node="">
</span><div class="news item cf" data-dcnode-id="4476"><span data-dcnode-id="4509" instrument_node="">
</span><img alt="" data-dcnode-id="4508" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004388image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="4507" instrument_node="">
</span><div class="text" data-dcnode-id="4478"><span data-dcnode-id="4506" instrument_node="">
</span><div class="date" data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">February 10, 2016</span></div><span data-dcnode-id="4503" instrument_node="">
</span><h2 data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">
					'A Daily Dose of Architecture' reviews 'Wiel Arets–Bas Princen'
				</span></h2><span data-dcnode-id="4500" instrument_node="">
</span><p data-dcnode-id="4486"><span data-dcnode-id="4499" instrument_node="">'The two names in this book's title indicates it is not a run-of-the-mill monograph… It follows two other atypical books on the architect: </span><i data-dcnode-id="4496"><a data-dcnode-id="4497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/stills_a_timeline_of_ideas_articles_amp_interviews_1983_2010"><span data-dcnode-id="4498" instrument_node="">Stills</span></a></i><span data-dcnode-id="4495" instrument_node=""> (010, 2011), which compiles Arets' numerous essays and interviews alongside photographs of numerous built projects; as well as&nbsp;</span><i data-dcnode-id="4492"><a data-dcnode-id="4493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/wiel_arets_autobiographical_references"><span data-dcnode-id="4494" instrument_node="">Autobiographical References</span></a></i><span data-dcnode-id="4491" instrument_node=""> (Birkhäuser, 2012)... [which features] interviews between Arets and Robert McCarter. Those books are heavy on words and theory, perhaps paving the way for this book's almost total reliance on photographs… With shots that range from the typically architectural to the highly abstract, the book is about understanding buildings through the medium of photography.'</span><br data-dcnode-id="4490"><br data-dcnode-id="4489"><a data-dcnode-id="4487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//archidose.blogspot.nl/2016/02/book-review-wiel-arets-bas-princen.html"><span data-dcnode-id="4488" instrument_node="">Read the full book review</span></a></p><span data-dcnode-id="4485" instrument_node="">
</span><p data-dcnode-id="4480"><a data-dcnode-id="4481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/wiel_arets_bas_princen"><span data-dcnode-id="4484" instrument_node="">More about </span><i data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">Wiel Arets–Bas Princen</span></i></a></p><span data-dcnode-id="4479" instrument_node="">
</span></div><span data-dcnode-id="4477" instrument_node="">
</span></div><span data-dcnode-id="4475" instrument_node="">
</span><div class="news item cf" data-dcnode-id="4455"><span data-dcnode-id="4474" instrument_node="">
</span><img alt="" data-dcnode-id="4473" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004384image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="4472" instrument_node="">

</span><h2 data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">
					WAA progress construction on the IJhal in Amsterdam
				</span></h2><span data-dcnode-id="4465" instrument_node="">
</span><p data-dcnode-id="4459"><span data-dcnode-id="4464" instrument_node="">The IJhal, within Amsterdam’s central train station, creates a more welcoming 'gateway' to the city for passengers, by simplifying the connections between its numerous public transportation types. Voids of stairs and escalators, each with winter-hearty hanging gardens, connect the IJhal to the station’s bus terminal above, and to the future North-South metro line below. Rounded-reflective elements adorn its ceiling; they mirror the shimmering sunlight that refracts upon on the IJ's surface, in a nod to the city's historic relationship to water. Curved glazing mimics the ceiling elements, which softens the corners of intersecting passageways. The western portion of the IJhal is in use; its eastern portion will open autumn of 2016.</span><br data-dcnode-id="4463"><br data-dcnode-id="4462"><a data-dcnode-id="4460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/ijhal/"><span data-dcnode-id="4461" instrument_node="">Read more about the IJhal</span></a></p><span data-dcnode-id="4458" instrument_node="">

</span><h2 data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">
					Winter greetings and happy 2016 from WAA
				</span></h2><span data-dcnode-id="4444" instrument_node="">
</span><p data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">WAA extends season's greetings and well wishes for the new year ahead–as with this week's solstice, winter has officially begun. In spring of 2016, Amsterdam's IJhal–the city's main pedestrian passageway within its central train station–will festively open to the public. The IJhal's many wall-sized LED screens, some of which are currently installed, transition their displays alongside the seasons, as with autumnal scenes of Amsterdam's central park, Vondelpark.&nbsp;</span></p><span data-dcnode-id="4441" instrument_node="">
</span><p data-dcnode-id="4438"><a data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/ijhal/"><span data-dcnode-id="4440" instrument_node="">Read more about the IJhal</span></a></p><span data-dcnode-id="4437" instrument_node="">

</span><h2 data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">
					WAA's V' House and H' House in Maastricht are published in 'GA Houses'
				</span></h2><span data-dcnode-id="4423" instrument_node="">
</span><p data-dcnode-id="4418"><span data-dcnode-id="4422" instrument_node="">The most recent issue of the Japanese publication</span><i data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node=""> GA Houses, </span></i><span data-dcnode-id="4419" instrument_node="">#144, includes&nbsp;a 14 page feature article on the V' House, and a 16 page feature article on the H' House, both in Maastricht. The issue includes new photography of both projects, taken specifically for the publication, by the acclaimed Japanese photographer Yoshio Futagawa.</span></p><span data-dcnode-id="4417" instrument_node="">
</span><p data-dcnode-id="4407"><a data-dcnode-id="4412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ga-ada.co.jp/english/ga_houses/gah144.html"><span data-dcnode-id="4416" instrument_node="">Purchase </span><i data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">GA Houses</span></i><span data-dcnode-id="4413" instrument_node=""> #144</span></a><br data-dcnode-id="4411"><br data-dcnode-id="4410"><a data-dcnode-id="4408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/v_house/"><span data-dcnode-id="4409" instrument_node=""> Read more about the V' House</span></a></p><span data-dcnode-id="4406" instrument_node="">

</span><h2 data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">
					WAA progress construction on the Blumenhaus in Zürich
				</span></h2><span data-dcnode-id="4388" instrument_node="">
</span><p data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">Blumenhaus is located in the Escher-Wyss district of Zürich–a 'rough' area of the city and one of the most urban spaces in Switzerland. When juxtaposed against the backdrop of Zürich's center, relics from the city’s industrial past characterize this neighborhood. Steps away from the Hardbrücke transit station; the area is currently being redeveloped to incorporate extensive residential units, alongside more commercial spaces, such as restaurants and cafés. Reflecting the project's immediate surrounding, its raw matte-aluminum façade is accentuated by cutouts and reliefs,&nbsp;shielding the interior from this ‘rough’ exterior condition...</span></p><span data-dcnode-id="4385" instrument_node="">
</span><p data-dcnode-id="4382"><a data-dcnode-id="4383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/blumenhaus/"><span data-dcnode-id="4384" instrument_node="">Read more about Blumenhaus</span></a></p><span data-dcnode-id="4381" instrument_node="">

</span><h2 data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">
					The Allianz Headquarters in Zürich, activates its plaza and urban context
				</span></h2><span data-dcnode-id="4367" instrument_node="">
</span><p data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">Completed in spring 2014, the Allianz Headquarters in Zürich has been in use for nearly two years. During that time the district in which the building is located has matured, as construction subsided. Since the building's opening, all remaining components of the master planned area were completed, including the pedestrian only Richtiplatz–the heart of this new urban area. The Allianz Headquarters is bound by arcades along its many street facing façades–all of which are outfit with custom designed WAA light fixtures–which provide shelter to the area's residents and visitors, for instance, from any unexpected rain. A small fountain is located in the center of Richtiplatz to remind its occupants that, while their immediate context was recently created, the center of the urbanity–Zürich's city center–in which the district sits, is a swift tram ride away.</span></p><span data-dcnode-id="4364" instrument_node="">
</span><p data-dcnode-id="4361"><a data-dcnode-id="4362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/allianz_headquarters/"><span data-dcnode-id="4363" instrument_node="">New imagery of Allianz Headquarters</span></a></p><span data-dcnode-id="4360" instrument_node="">

</span><h2 data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">
					The Arts Club of Chicago to host a dialogue on the inaugural 2015 Chicago Architecture Biennial
				</span></h2><span data-dcnode-id="4346" instrument_node="">
</span><p data-dcnode-id="4332"><span data-dcnode-id="4345" instrument_node="">On November 7th, 2015 Wiel Arets will be in conversation with Robert Somol, Director of the University of Chicago's School of Architecture, moderated by local architect Geoff Goldberg. Their discussion will revolve around the Chicago Biennal; its successes, its shortcomings, and its larger impact on both the city, and the architectural professions active around and within it. </span><br data-dcnode-id="4344"><br data-dcnode-id="4343"><span data-dcnode-id="4342" instrument_node="">The Arts Club of Chicago</span><br data-dcnode-id="4341"><span data-dcnode-id="4340" instrument_node="">November 7th, 2015 12:00</span><br data-dcnode-id="4339"><br data-dcnode-id="4338"><span data-dcnode-id="4337" instrument_node="">201 East Ontario Street</span><br data-dcnode-id="4336"><span data-dcnode-id="4335" instrument_node="">Chicago, Illinois 60611</span><br data-dcnode-id="4334"><span data-dcnode-id="4333" instrument_node="">United States of America</span></p><span data-dcnode-id="4331" instrument_node="">
</span><p data-dcnode-id="4328"><a data-dcnode-id="4329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.artsclubchicago.org/"><span data-dcnode-id="4330" instrument_node="">Read more about the event and RSVP</span></a></p><span data-dcnode-id="4327" instrument_node="">

</span><h2 data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">
					WAA book presentation at Maastricht Bureau Europa November 4th
				</span></h2><span data-dcnode-id="4313" instrument_node="">
</span><p data-dcnode-id="4302"><span data-dcnode-id="4312" instrument_node="">Bureau Europa of Maastricht will host a presentation and discussion of </span><i data-dcnode-id="4309"><a data-dcnode-id="4310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/wiel_arets_bas_princen"><span data-dcnode-id="4311" instrument_node="">Wiel Arets–Bas Princen</span></a></i><span data-dcnode-id="4308" instrument_node=""> (Hatje Cantz, 2015), moderated by Saskia van Stein. The publication encapsulates a multi-year exploration of twelve WAA building, photographed throughout the seasons, and at both day and night. The evening will begin with discussion of the book's genesis, and conclude by relating the twelve projects within the book, to the larger framework of the oeuvre of WAA.</span><br data-dcnode-id="4307"><br data-dcnode-id="4306"><span data-dcnode-id="4305" instrument_node="">Bureau Europa Maastricht</span><br data-dcnode-id="4304"><span data-dcnode-id="4303" instrument_node="">November 4th, 2015 20:00</span></p><span data-dcnode-id="4301" instrument_node="">
</span><p data-dcnode-id="4289"><span data-dcnode-id="4300" instrument_node="">Timmerfabriek</span><br data-dcnode-id="4299"><span data-dcnode-id="4298" instrument_node="">Boschstraat 9</span><br data-dcnode-id="4297"><span data-dcnode-id="4296" instrument_node="">6211 AS Maastricht</span><br data-dcnode-id="4295"><span data-dcnode-id="4294" instrument_node="">the Netherlands</span><br data-dcnode-id="4293"><br data-dcnode-id="4292"><a data-dcnode-id="4290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bureau-europa.nl/en/manifestations/lecture_by_wiel_arets_and_book_launch_wiel_arets_bas_princen/"><span data-dcnode-id="4291" instrument_node="">Read more about the event</span></a></p><span data-dcnode-id="4288" instrument_node="">
</span></div><span data-dcnode-id="4286" instrument_node="">

</span><img alt="" data-dcnode-id="4282" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004282image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="4281" instrument_node="">
</span><div class="text" data-dcnode-id="4266"><span data-dcnode-id="4280" instrument_node="">
</span><div class="date" data-dcnode-id="4278"><span data-dcnode-id="4279" instrument_node="">September 30, 2015</span></div><span data-dcnode-id="4277" instrument_node="">
</span><h2 data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">
					WAA to design the Bahrain Bay Tower in Manama, Bahrain
				</span></h2><span data-dcnode-id="4274" instrument_node="">
</span><p data-dcnode-id="4268"><span data-dcnode-id="4273" instrument_node="">Sited in the currently emerging Bahrain Bay, just north of Manama, the tower encompasses housing, offices, retail, and public spaces–all of which seek to remain flexible and adaptable to future change. In this way, as Bahrain Bay further develops, the tower strengthens local character and supports community needs, while simultaneously creating an iconic destination. Standing at a height of 49 stories–or 170 m–it is composed of two housing components atop of plinth of retail, offices, and a parking garage, the last of which occupies seven stories and includes 700 spaces...</span><br data-dcnode-id="4272"><br data-dcnode-id="4271"><a data-dcnode-id="4269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/bahrain_bay_tower/"><span data-dcnode-id="4270" instrument_node="">Read more about Bahrain Bay Tower</span></a></p><span data-dcnode-id="4267" instrument_node="">
</span></div><span data-dcnode-id="4265" instrument_node="">
</span></div><span data-dcnode-id="4263" instrument_node="">
</span><div class="news item cf" data-dcnode-id="4243"><span data-dcnode-id="4262" instrument_node="">
</span><img alt="" data-dcnode-id="4261" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004261image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="4260" instrument_node="">
</span><div class="text" data-dcnode-id="4245"><span data-dcnode-id="4259" instrument_node="">
</span><div class="date" data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">September  7, 2015</span></div><span data-dcnode-id="4256" instrument_node="">
</span><h2 data-dcnode-id="4254"><span data-dcnode-id="4255" instrument_node="">
					WAA progress construction on the Double in Amsterdam
				</span></h2><span data-dcnode-id="4253" instrument_node="">
</span><p data-dcnode-id="4247"><span data-dcnode-id="4252" instrument_node="">On the eastern edge of Amsterdam's city center lies the Valkenburgerstraat; a major thoroughfare that was created in the 1960s, the eastern half of which saw the buildings that align it completely demolished and rebuilt during the 1990s. The street's western edge has retained its historic buildings, all of which are from different decades of the last century–the Double is the newest addition to it. The building is composed of two volumes, which together contain 45 units separated by an exterior communal courtyard garden on the roof of the ground floor. Most units have direct access to this communal area, and the units that abut it carve their terraces from it...</span><br data-dcnode-id="4251"><br data-dcnode-id="4250"><a data-dcnode-id="4248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/the_double/"><span data-dcnode-id="4249" instrument_node="">Read more about the Double</span></a></p><span data-dcnode-id="4246" instrument_node="">
</span></div><span data-dcnode-id="4244" instrument_node="">
</span></div><span data-dcnode-id="4242" instrument_node="">
</span><div class="news item cf" data-dcnode-id="4222"><span data-dcnode-id="4241" instrument_node="">
</span><img alt="" data-dcnode-id="4240" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004225image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="4239" instrument_node="">
</span><div class="text" data-dcnode-id="4224"><span data-dcnode-id="4238" instrument_node="">
</span><div class="date" data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">August 24, 2015</span></div><span data-dcnode-id="4235" instrument_node="">
</span><h2 data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">
					Autumn semester begins at the IIT College of Architecture in Chicago
				</span></h2><span data-dcnode-id="4232" instrument_node="">
</span><p data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">Today in Chicago, autumn semester officially begins at the Illinois Institute of Technology's (IIT) College of Architecture (CoA). Since 2013, the college's refocused curriculum concenrt he metropolis, and since 2014, has disseminated its events through its new website, alongside its redesigned print and digital identity, for which it is becoming increasingly recognized; also in 2014, the CoA launched the MCHAP Award for the best architecture in the Americas, and the Louis Vuitton Spark Award for student work, and in 2015 will participate in the inaugural Chicago Architecture Biennial.</span></p><span data-dcnode-id="4229" instrument_node="">
</span><p data-dcnode-id="4226"><a data-dcnode-id="4227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//arch.iit.edu/life/news"><span data-dcnode-id="4228" instrument_node="">Stay current with all IIT CoA Events</span></a></p><span data-dcnode-id="4225" instrument_node="">
</span></div><span data-dcnode-id="4223" instrument_node="">
</span></div><span data-dcnode-id="4221" instrument_node="">

</span><img alt="" data-dcnode-id="4219" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004214image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="4218" instrument_node="">
</span><div class="text" data-dcnode-id="4190"><span data-dcnode-id="4217" instrument_node="">
</span><div class="date" data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">July 21, 2015</span></div><span data-dcnode-id="4214" instrument_node="">
</span><h2 data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">
					WAA's A' House is published in 'GA Houses'
				</span></h2><span data-dcnode-id="4211" instrument_node="">
</span><p data-dcnode-id="4206"><span data-dcnode-id="4210" instrument_node="">The most recent issue, #142, of the Japanese publication&nbsp;</span><i data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">GA Houses</span></i><span data-dcnode-id="4207" instrument_node="">–with GA standing for 'Global Architecture'–includes a 12 page feature article on the A' House, in Tokyo. Tucked within a tranquil street in Nishi-Azabu; the main entry is an immense sliding, double-textured glass door, which opens directly onto the ground floor kitchen. When left open during dinner, the space carves an extension of itself from the adjacent street. Featuring six buildings in Japan and six in Australia; the issue includes new photography of the A' House, taken specifically for the publication, by the acclaimed Japanese photographer Yoshio Futagawa.</span></p><span data-dcnode-id="4205" instrument_node="">
</span><p data-dcnode-id="4195"><a data-dcnode-id="4200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ga-ada.co.jp/english/ga_houses/gah142.html"><span data-dcnode-id="4204" instrument_node="">Purchase </span><i data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">GA Houses</span></i><span data-dcnode-id="4201" instrument_node=""> #142</span></a><br data-dcnode-id="4199"><br data-dcnode-id="4198"><a data-dcnode-id="4196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/a_house/"><span data-dcnode-id="4197" instrument_node="">Read more about the A' House</span></a></p><span data-dcnode-id="4194" instrument_node="">
</span><p data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4191" instrument_node="">

</span><div class="date" data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">July 13, 2015</span></div><span data-dcnode-id="4180" instrument_node="">
</span><h2 data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node="">
					WAA's B' Tower and its interior are able to be viewed in 360-degrees
				</span></h2><span data-dcnode-id="4177" instrument_node="">
</span><p data-dcnode-id="4171"><span data-dcnode-id="4176" instrument_node="">Offering glimpses of the North Sea–a mere 15 k to its west–from its penthouse apartments, the B' Tower is a short-stay hotel that's also a refuge to momentary visitors to the city of Rotterdam. The tower's mirrored bottom balconies–all of which cantilever–are immensely scaled; they are thus able to accommodate a dinner party of six, as the city's skyline glitters and dances, below and beyond. Completed in December 2013, its interiors–including one of its many balconies–are now able to be digitally experienced, by way of a series of&nbsp;360-degree panorama scenes.</span><br data-dcnode-id="4175"><br data-dcnode-id="4174"><a data-dcnode-id="4172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.nl/maps/place/Urban%2BResidences%2BRotterdam/%4051.920071%2C4.477849%2C3a%2C75y%2C281h%2C90t/data%3D%213m8%211e1%213m6%211sscWClcBqHSYAAAGuxVfk8w%212e0%213e2%216s//geo0.ggpht.com/cbk%253Fcb_client%253Dmaps_sv.tactile%2526output%253Dthumbnail%2526thumb%253D2%2526panoid%253DscWClcBqHSYAAAGuxVfk8w%2526w%253D124%2526h%253D75%2526yaw%253D281%2526pitch%253D0%2526thumbfov%253D103%2526ll%253D51.920071%2C4.477849%217i13312%218i6656%214m2%213m1%211s0x47c434a755c8e4b9%3A0x41b7739ceb3e3cf3%216m1%211e1"><span data-dcnode-id="4173" instrument_node="">View interiors of the B' Tower</span></a></p><span data-dcnode-id="4170" instrument_node="">
</span><p data-dcnode-id="4167"><a data-dcnode-id="4168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/b_tower/"><span data-dcnode-id="4169" instrument_node="">Read more about the B' Tower</span></a></p><span data-dcnode-id="4166" instrument_node="">

</span><h2 data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">
					WAA complete the first half of the IJhal in Amsterdam
				</span></h2><span data-dcnode-id="4152" instrument_node="">
</span><p data-dcnode-id="4146"><span data-dcnode-id="4151" instrument_node="">Today in Amsterdam, the first section of the IJhal–the main pedestrian passageway within the city's main train station–officially opened to the public. The IJhal creates a more welcoming 'gateway' to the city for passengers, by simplifying the connections between numerous public transportation types. Rounded-reflective elements adorn its ceiling; they mirror the shimmering sunlight that refracts upon on the IJ's surface, throughout the IJhal, in a nod to the city's historic relationship with water. Curved glazing mimics the ceiling elements, which soften the corners of intersecting passageways. The station's new bus terminal–located directly above the IJhal–can now be accessed, via voids of stairs and escalators, each with winter-hearty hanging gardens.</span><br data-dcnode-id="4150"><br data-dcnode-id="4149"><a data-dcnode-id="4147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/ijhal/"><span data-dcnode-id="4148" instrument_node="">Read more about the IJhal</span></a></p><span data-dcnode-id="4145" instrument_node="">

</span><h2 data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">
					The Jellyfish House in Marbella is published in 'Eigen Huis &amp; Interieur'
				</span></h2><span data-dcnode-id="4131" instrument_node="">
</span><p data-dcnode-id="4122"><span data-dcnode-id="4130" instrument_node="">The June 2015 issue of the Dutch publication </span><i data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">Eigen Huis &amp; Interieur</span></i><span data-dcnode-id="4127" instrument_node=""> includes a 14 page feature article on the the Jellyfish House, located in Marbella, Spain. The house's glass-bottomed pool cantilevers 9 m from the roof, which allows those on the terrace below, to see this swimming above, and vice versa. A second glass wall, along the pool's short-side edge, allows those in the kitchen to see those swimming, like jellyfish gracefully floating in the sea.&nbsp;</span><br data-dcnode-id="4126"><br data-dcnode-id="4125"><a data-dcnode-id="4123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/jellyfish_house/"><span data-dcnode-id="4124" instrument_node="">Read more about the Jellyfish House</span></a></p><span data-dcnode-id="4121" instrument_node="">

</span><p data-dcnode-id="4102"><span data-dcnode-id="4106" instrument_node="">'Am Hirschgarten', the 1st prize design of a mixed-use project in Munich, is currently featured in the June/July 2015 issue of the Dutch publication </span><i data-dcnode-id="4104"><span data-dcnode-id="4105" instrument_node="">MARK</span></i><span data-dcnode-id="4103" instrument_node="">.</span></p><span data-dcnode-id="4101" instrument_node="">

</span><h2 data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">
					'Wiel Arets–Bas Princen' is reviewed in 'Pin-Up' 
				</span></h2><span data-dcnode-id="4080" instrument_node="">
</span><p data-dcnode-id="4073"><i data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">Wiel Arets–Bas Princen</span></i><span data-dcnode-id="4077" instrument_node=""> (Hatje-Cantz, 2015) is currently featured in </span><i data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">Pin-Up</span></i><span data-dcnode-id="4074" instrument_node=""> magazine's spring/summer 2015 issue. So states writer and reviewer Elias Redstone: '…Rarely is the building itself revealed in full, Princen instead searches for the more symbolic, mythic qualities that can be found in architecture, and takes the reader on a personal journey through Arets' creations. Princen obsesses over corners, wall details, and windows… Through windows and over walls, nature and greenery is never far away, but always appears cut off, kept at bay... With this beautifully crafted 164 page book, Princen has again proven himself one of the most interesting documenters of our built world.'</span></p><span data-dcnode-id="4072" instrument_node="">
</span><p data-dcnode-id="4063"><a data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pinupmagazine.org/2015/07/book-club-wiel-arets/"><span data-dcnode-id="4071" instrument_node="">Read the book review at </span><i data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">PIN-Up</span></i></a><br data-dcnode-id="4067"><br data-dcnode-id="4066"><a data-dcnode-id="4064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hatjecantz.de/wiel-arets-bas-princen-5402-1.html"><span data-dcnode-id="4065" instrument_node="">Purchase the book from Hatje Cantz</span></a></p><span data-dcnode-id="4062" instrument_node="">

</span><div class="date" data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">May 18, 2015</span></div><span data-dcnode-id="4051" instrument_node="">
</span><h2 data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">
					Wiel Arets to lecture at INDESDEM at Delft University of Technology
				</span></h2><span data-dcnode-id="4048" instrument_node="">
</span><p data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">INDESEM is a bi-annual design seminar hosted by the Delft University of Technology. With the stated goal of 'investigating innovations in the manufacturing industry and highlighting its impact on the architecture practice', this year's event focuses on the balance between tradition and emerging fabrication techniques–under the banner of 'craft'. Wiel Arets will lecture on June 1st, on innovation in WAA's work, which is, most often, holistically incorporated within a project's design.</span></p><span data-dcnode-id="4045" instrument_node="">
</span><p data-dcnode-id="4038"><span data-dcnode-id="4044" instrument_node="">Delft University of Technology</span><br data-dcnode-id="4043"><a data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//indesem.nl/about/"><span data-dcnode-id="4042" instrument_node="">INDESEM: International Design Seminar</span></a><br data-dcnode-id="4040"><span data-dcnode-id="4039" instrument_node="">May 29th-June 5th, 2015</span></p><span data-dcnode-id="4037" instrument_node="">
</span><p data-dcnode-id="4029"><span data-dcnode-id="4036" instrument_node="">Faculty of Architecture</span><br data-dcnode-id="4035"><span data-dcnode-id="4034" instrument_node="">Julianalaan 132-134</span><br data-dcnode-id="4033"><span data-dcnode-id="4032" instrument_node="">2628 BL Delft, the Netherlands</span><br data-dcnode-id="4031"><span data-dcnode-id="4030" instrument_node="">June 1st, 2015 18:00</span></p><span data-dcnode-id="4028" instrument_node="">
