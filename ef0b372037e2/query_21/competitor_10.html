</span><div class="date" data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">June 20, 2010</span></div><span data-dcnode-id="175" instrument_node="">
</span><h2 data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">
					WAA begin construction on the A' House in Tokyo
				</span></h2><span data-dcnode-id="172" instrument_node="">
</span><p data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">This compact live/work, gallery-like space is nestled within the dense expanse of Tokyo, in Nishi-Azabu—a neighborhood characterized by narrow streets and traditional low-rise houses—which borders a park heavily visited during the spring, when the city’s cherry trees begin to bloom. Its 136-square-meter area consists of five horizontally divided spaces, each connected by a minuscule sculptural spiraling staircase that, given the footprint of the building, allows for loft-like spaces within its intimate confines...</span></p><span data-dcnode-id="169" instrument_node="">
</span><p data-dcnode-id="166"><a data-dcnode-id="167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/a_house/"><span data-dcnode-id="168" instrument_node="">Read more about the A' House</span></a></p><span data-dcnode-id="165" instrument_node="">
</span></div><span data-dcnode-id="163" instrument_node="">
</span></div><span data-dcnode-id="161" instrument_node="">
</span><div class="news item cf" data-dcnode-id="141"><span data-dcnode-id="160" instrument_node="">
</span><img alt="" data-dcnode-id="159" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002570image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="158" instrument_node="">
</span><div class="text" data-dcnode-id="143"><span data-dcnode-id="157" instrument_node="">
</span><div class="date" data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">June 10, 2010</span></div><span data-dcnode-id="154" instrument_node="">
</span><h2 data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">
					WAA progress construction on the Jellyfish House in Marbella
				</span></h2><span data-dcnode-id="151" instrument_node="">
</span><p data-dcnode-id="145"><span data-dcnode-id="150" instrument_node="">This vacation house is located on a site close to the beach, where the view to the ocean is blocked at the ground level by a neighboring building. The swimming pool is lifted to the roof, where it is cantilevered out as an extension of the roof terrace, providing panoramic views. The house provides possibilities for voyeuristic experiences, such as the window in the bottom of the pool that allows those on the covered terrace below to see who is swimming, and a window in the wall of the pool that allows those swimming to see who is in the kitchen.</span><br data-dcnode-id="149"><br data-dcnode-id="148"><a data-dcnode-id="146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/jellyfish_house/"><span data-dcnode-id="147" instrument_node="">Read more about the Jellyfish House</span></a></p><span data-dcnode-id="144" instrument_node="">
</span></div><span data-dcnode-id="142" instrument_node="">
</span></div><span data-dcnode-id="140" instrument_node="">
</span><div class="news item cf" data-dcnode-id="106"><span data-dcnode-id="139" instrument_node="">
</span><img alt="" data-dcnode-id="138" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003470image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="137" instrument_node="">
</span><div class="text" data-dcnode-id="108"><span data-dcnode-id="136" instrument_node="">
</span><div class="date" data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">April  9, 2010</span></div><span data-dcnode-id="133" instrument_node="">
</span><h2 data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">
					Wiel Arets to lecture at Washington University in St. Louis
				</span></h2><span data-dcnode-id="130" instrument_node="">
</span><p data-dcnode-id="120"><span data-dcnode-id="129" instrument_node="">Wiel Arets is set to lecture at Washington University in St. Louis on April 10th, 2010 at 19:00, discussing recent works of WAA. Arets is currently the Ruth &amp; Norman Moore Visiting Professor of Architecture at Washington University in St. Louis, and will speak as part of the Sam Fox School's Public Lecture Series. The lecture, entitled </span><i data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">Architectural Work</span></i><span data-dcnode-id="126" instrument_node="">s, will be held in conjunction with the Graduate Architecture Open House.</span><br data-dcnode-id="125"><br data-dcnode-id="124"><span data-dcnode-id="123" instrument_node="">Washington University</span><br data-dcnode-id="122"><span data-dcnode-id="121" instrument_node="">April 10, 2010 19:00</span></p><span data-dcnode-id="119" instrument_node="">
</span><p data-dcnode-id="113"><span data-dcnode-id="118" instrument_node="">1 Brookings Drive</span><br data-dcnode-id="117"><span data-dcnode-id="116" instrument_node="">St Louis, Missouri 63130</span><br data-dcnode-id="115"><span data-dcnode-id="114" instrument_node="">United States of America</span></p><span data-dcnode-id="112" instrument_node="">
</span><p data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">&nbsp;</span></p><span data-dcnode-id="109" instrument_node="">
</span></div><span data-dcnode-id="107" instrument_node="">

</span><img alt="" data-dcnode-id="103" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_001796image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="102" instrument_node="">
</span><div class="text" data-dcnode-id="91"><span data-dcnode-id="101" instrument_node="">
</span><div class="date" data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">April  8, 2010</span></div><span data-dcnode-id="98" instrument_node="">
</span><h2 data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">
					WAA win the 2010 Amsterdam Architecture Award for Four Towers Osdorp
				</span></h2><span data-dcnode-id="95" instrument_node="">
</span><p data-dcnode-id="93"><span data-dcnode-id="94" instrument_node="">Four Towers Osdorp–a housing project located in the southwest of Amsterdam–has won the 2010 Amsterdam Architecture Award presented by the Amsterdam Architecture Center (ARCAM).&nbsp;The jury praised the project's underground and integrated parking garage, thus allowing the project's site to retain its original park-like setting. Stated the jury, 'Within the urban plan of the towers a mesmerizing effect has been achieved. This is particularly contributed to by the stately simplicity and modesty in the design and detailing. The project has all the hallmarks of a kind of 'hyper-modernity' and leaves also a metropolitan, forward-looking impression.'</span></p><span data-dcnode-id="92" instrument_node="">
</span></div><span data-dcnode-id="90" instrument_node="">
</span></div><span data-dcnode-id="88" instrument_node="">
</span><div class="news item cf" data-dcnode-id="68"><span data-dcnode-id="87" instrument_node="">
</span><img alt="" data-dcnode-id="86" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_001798image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="85" instrument_node="">
</span><div class="text" data-dcnode-id="70"><span data-dcnode-id="84" instrument_node="">
</span><div class="date" data-dcnode-id="82"><span data-dcnode-id="83" instrument_node="">April  4, 2010</span></div><span data-dcnode-id="81" instrument_node="">
</span><h2 data-dcnode-id="79"><span data-dcnode-id="80" instrument_node="">
					WAA begin construction on Schwäbisch Media in Ravensburg
				</span></h2><span data-dcnode-id="78" instrument_node="">
</span><p data-dcnode-id="72"><span data-dcnode-id="77" instrument_node="">Several and diverse media types will make up the  Schwäbisch Media, to be situated in one building in Ravensburg, which is  the economic center of Upper Swabia. The six working clusters of the company will be housed  in separate glass office cubes, whose proportions and dimensions  are based on surrounding urban villas, which are disposed on several plots  so as to integrate with the surrounding historic context. At the ground  floor will be a café, conference and event center; walled gardens will&nbsp;externally interconnect the six cubes, which will be wrapped by a transparent  glazed outer membrane.</span><br data-dcnode-id="76"><br data-dcnode-id="75"><a data-dcnode-id="73" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/schwaebischer_verlag/"><span data-dcnode-id="74" instrument_node="">Read more about Schwäbisch Media</span></a></p><span data-dcnode-id="71" instrument_node="">
</span></div><span data-dcnode-id="69" instrument_node="">
</span></div><span data-dcnode-id="67" instrument_node="">
</span><div class="news item cf" data-dcnode-id="47"><span data-dcnode-id="66" instrument_node="">
</span><img alt="" data-dcnode-id="65" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_001790image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="64" instrument_node="">
</span><div class="text" data-dcnode-id="49"><span data-dcnode-id="63" instrument_node="">
</span><div class="date" data-dcnode-id="61"><span data-dcnode-id="62" instrument_node="">February 12, 2010</span></div><span data-dcnode-id="60" instrument_node="">
</span><h2 data-dcnode-id="58"><span data-dcnode-id="59" instrument_node="">
					WAA complete Four Towers Osdorp in Amsterdam
				</span></h2><span data-dcnode-id="57" instrument_node="">
</span><p data-dcnode-id="51"><span data-dcnode-id="56" instrument_node="">Built at the edge of a new park and small lake in the southwest of  Amsterdam, the four slab-like towers each cantilever out over the public  street, allowing the street to pass under the building at the entry,  and they cantilever over the lake at the other end, where they face the  park. Between the four towers, the naturally-lit and ventilated parking  is placed underground, with plantings on the roof so that the landscape  of the housing site is joined with that of the public park, and the  glazed entry lobbies are experienced as being surrounded by nature.  The façades of the  four towers present the subtle overlapping patterns of the domestic  spaces inside.</span><br data-dcnode-id="55"><br data-dcnode-id="54"><a data-dcnode-id="52" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/four_towers_osdorp/"><span data-dcnode-id="53" instrument_node="">Read more about Four Towers Osdorp</span></a></p><span data-dcnode-id="50" instrument_node="">

</span><h2 data-dcnode-id="37"><span data-dcnode-id="38" instrument_node="">
					Wiel Arets teaches at Washington University in St. Louis
				</span></h2><span data-dcnode-id="36" instrument_node="">
</span><p data-dcnode-id="34"><span data-dcnode-id="35" instrument_node="">Wiel Arets is currently the Ruth &amp; Norman Moore Visiting Professor during the spring 2012 semester at Washington University in St. Louis, Missouri, USA. Students worked collectively on developing a 'New Map of the World', and individually on developing a design for a 72,000 square-meter&nbsp;hybrid building sited in one of 20 selected metropolises around the world. These individual design projects concretized the conception of 'A Wonderful World', grounding it in the specific contexts of a selected group of rapidly changing international urban centers. In this way, each student was required to give place-specific architectural presence to the collectively generated theoretical and speculative ideas recorded in their 'New Map of the World'.</span></p><span data-dcnode-id="33" instrument_node="">
