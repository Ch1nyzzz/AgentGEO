</span><h2 data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">
					La Biennale di Venezia publishes the 2012 Awards Ceremony
				</span></h2><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1433" instrument_node="">The 2012 Venice Biennale currently hosts the 13th International Architecture Exhibition–'Common Ground'–which lasts until November 15, 2012. As 'President of the International Jury', Wiel Arets oversaw the judging of the event's awards before its opening to the public, with the 'Golden Lion&nbsp;for Best National Participation' awarded to the Japanese Pavilion, curated by Toyo Ito and entitled 'Home-for-all'. Wiel Arets discussed his thoughts on the festivities, why the 'Torre David/Grand Horizonte' installation received the 'Golden Lion&nbsp;for the Best Project', and the ways in which architects might further promote cross-discipline collaboration.</span><br data-dcnode-id="1432"><br data-dcnode-id="1431"><a data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//youtu.be/7DKpFDfZTt0"><span data-dcnode-id="1430" instrument_node="">Watch the full awards ceremony</span></a></p><span data-dcnode-id="1427" instrument_node="">

</span><h2 data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">
					Wiel Arets appointed Dean of the Illinois Institute of Technology College of Architecture
				</span></h2><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">
</span></p><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Illinois Institute of Technology (IIT) Provost Alan Cramb announced today the appointment of Wiel Arets as the new Dean of the IIT College of Architecture. Arets is known for his academic progressive research and hybrid design solutions. He is currently the Professor of Building Planning and Design at the Berlin University of the Arts, and the work of his architecture and design practice has been nominated for the EU's celebrated ‘Mies van der Rohe Award’ on numerous occasions.&nbsp;</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Arets, who was Dean of the Berlage Institute in Rotterdam from 1995-2002, will join IIT this fall and will lead an academic program…</span></p><p class="readmore" data-dcnode-id="1402"><a data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/wiel_arets_appointed_dean_of_the_illinois_institute_of_technology_college_of_architecture"><span data-dcnode-id="1405" instrument_node="">Continue reading</span></a><span data-dcnode-id="1403" instrument_node="">
</span></p><span data-dcnode-id="1401" instrument_node="">

</span><h2 data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">
					An article on Wiel Arets is published in 'Crain's Chicago Business'
				</span></h2><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1377"><i data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Crain's Chicago Business</span></i><span data-dcnode-id="1384" instrument_node="">, a leading business publication in the 'Windy City', has published an extensive article on Wiel Arets highlighting his recent appointment as the Dean of IIT's College of Architecture and the challenges he faces in 'coming to terms with the ghost of Mies van der Rohe'. States the article's author, Robert Sharoff: 'Mr. Arets, who is Dutch, is the first non-American to hold the position since Mies. He is a hyper-articulate, 57-year-old polymath with a wide-ranging academic résumé that includes stints as Dean of the Berlage Institute in Rotterdam as well as teaching positions at Columbia University and Cooper Union.'</span><br data-dcnode-id="1383"><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node="">Read the article at </span><i data-dcnode-id="1378"><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chicagobusiness.com/article/20121009/NEWS07/121009804/a-new-dean-promises-to-shake-up-iits-architecture-school%23ixzz28sfmMKIf"><span data-dcnode-id="1380" instrument_node="">ChicagoBusiness.com</span></a></i></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1373" instrument_node="">

</span><h2 data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">
					WAA progress construction on the Allianz Headquarters in Zürich
				</span></h2><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Once completed, the Allianz Headquarters will be composed of a 20-story tower and a 5-story annex. Upon entering the lobby of the complex, a monumental sculptural staircase will rise 72 m–the entire height of the building. Multi-story voids create short cuts between floors through the use of open stairways. Circulation to and from these stairs and voids is toward and perpendicular to the outer glass skin, while circulation on each floor takes place along and parallel to the façade, so that the buildings are always alive with movement.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1353"><a data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/allianz_headquarters/"><span data-dcnode-id="1355" instrument_node="">Read more about Allianz Headquarters</span></a></p><span data-dcnode-id="1352" instrument_node="">

</span><h2 data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">
					WAA publish 'Wiel Arets: Inspiration and Process in Architecture'
				</span></h2><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1334" instrument_node="">Moleskine will soon publish&nbsp;</span><i data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Wiel Arets: Inspiration and Process in Architecture. </span></i><span data-dcnode-id="1331" instrument_node="">The book&nbsp;opens with an&nbsp;essay by&nbsp;Kenneth Frampton, which highlights the evolution of the studio's work over the last 25 years, while previously unpublished hand sketches and colored pencil perspectives from the late 1980s and early 1990s fill the pages. An&nbsp;extensive interview with Arets concludes the book, unraveling his words, works, and working methods.&nbsp;Moleskin states: 'Exacting, oversized perspective views are alternated with schematic diagrams, fixing nascent ideas onto paper. These materials reveal an attitude and approach to design which are more concerned with content than with form.'</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1326"><a data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Moleskine-Inspiration-Process-Architecture-Arets/dp/8866134708/ref%3Dpd_sxp_f_pt"><span data-dcnode-id="1328" instrument_node="">Pre-order the book at Amazon</span></a></p><span data-dcnode-id="1325" instrument_node="">

</span><h2 data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">
					The AZL Pension Fund Headquarters is nominated for the 'Betonprijs 2012'
				</span></h2><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">The AZL Pension Fund Headquarters, an extension to an existing office building dating from the 1940s and located in the center of Heerlen, the Netherlands, has been nominated for the Dutch 'Betonprijs 2012' ('Concrete Prize' in English), for the category of 'Renovation'. The full list of &nbsp;winners will be announced on November 14th, 2012 at the award's ceremony in Rotterdam.&nbsp;</span></p><span data-dcnode-id="1308" instrument_node="">

</span><p data-dcnode-id="1289"><span data-dcnode-id="1293" instrument_node="">The October 2012 issue of the Argentinean publication </span><i data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">PLOT</span></i><span data-dcnode-id="1290" instrument_node=""> includes a 16 page article featuring Living Madrid, a housing project located on the edge of Parque de Pradolongo in Madrid.</span></p><span data-dcnode-id="1288" instrument_node="">

</span><h2 data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">
					'A Wonderful World' exhibited at 'Metropolis' in Utrecht
				</span></h2><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Two pieces from the exhibition 'A Wonderful World', originally on display in Antwerp during late 2011, have been chosen for inclusion in the exhibition 'Metropolis' in Utrecht, opening Sunday October 14th at 16:00. The&nbsp;exhibition&nbsp;is being hosted by 'Kunstliefde' and will feature artists from the Netherlands, Germany, and the USA. The exhibition seeks to explore how 'the city' is a representation of our culture, and specifically how it has become our&nbsp;accepted&nbsp;daily habitat.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1265" instrument_node="">October 14-November 18, 2012</span><br data-dcnode-id="1264"><span data-dcnode-id="1263" instrument_node="">Wednesday-Sunday 13:00-17:00</span><br data-dcnode-id="1262"><br data-dcnode-id="1261"><span data-dcnode-id="1260" instrument_node="">Metropolis</span><br data-dcnode-id="1259"><span data-dcnode-id="1258" instrument_node="">Nobelstraat 12a</span><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">3512 EN Utrecht</span><br data-dcnode-id="1255"><span data-dcnode-id="1254" instrument_node="">the Netherlands</span></p><span data-dcnode-id="1252" instrument_node="">

</span><h2 data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">
					Baunetz reviews 'Wiel Arets: Autobiographical References'
				</span></h2><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1231"><i data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Wiel Arets: Autobiographical References</span></i><span data-dcnode-id="1235" instrument_node=""> (Birkhäuser, 2012) is currently featured in the book review section of the German publication </span><i data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">BaunetzWoche</span></i><span data-dcnode-id="1232" instrument_node=""> #289. Baunetz states: 'Author and editor Robert McCarter has produced a truly mammoth work. With more than 500 pages of alternating interviews, lectures, and discussions, all easily read at your own pace, alongside pictures and project descriptions–the book's colored 'tab' structure compliments its content.'&nbsp;</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1221"><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.baunetz.de/meldungen/Meldungen-Buecher_im_BauNetz_2954829.html"><span data-dcnode-id="1229" instrument_node="">Read the full review at&nbsp;</span><i data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Baunetz</span></i></a><br data-dcnode-id="1225"><br data-dcnode-id="1224"><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.degruyter.com/view/product/203058" target="_blank"><span data-dcnode-id="1223" instrument_node="">Order the book from Birkhäuser</span></a></p><span data-dcnode-id="1220" instrument_node="">

</span><img alt="" data-dcnode-id="1214" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002511image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="1213" instrument_node="">
</span><div class="text" data-dcnode-id="1187"><span data-dcnode-id="1212" instrument_node="">
</span><div class="date" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">September 28, 2012</span></div><span data-dcnode-id="1209" instrument_node="">
</span><h2 data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">
					Wiel Arets to lecture at the Illinois Institute of Technology College of Architecture
				</span></h2><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1205" instrument_node="">On October 3rd, 2012 at 18:30, Wiel Arets will publicly lecture at the the Illinois Institute of Technology College of Architecture, located in Crown Hall, discussing recent works of WAA and his recent appointment as the school's newest Dean. The lecture is the third of the school's fall 2012 lecture series, and will highlight recent developments in the work of WAA, and simultaneously attempt to bridge the gap between architecture and wider issues, such as culture, transportation, the countryside, and public spaces in cities.</span><br data-dcnode-id="1204"><br data-dcnode-id="1203"><span data-dcnode-id="1202" instrument_node="">S. R. Crown Hall</span><br data-dcnode-id="1201"><span data-dcnode-id="1200" instrument_node="">October 3, 2012 18:30</span><br data-dcnode-id="1199"><span data-dcnode-id="1198" instrument_node="">
</span></p><p data-dcnode-id="1191"><span data-dcnode-id="1196" instrument_node="">3360 South State Street&nbsp;</span><br data-dcnode-id="1195"><span data-dcnode-id="1194" instrument_node="">Chicago, Illinois 60616</span><br data-dcnode-id="1193"><span data-dcnode-id="1192" instrument_node="">United States of America</span></p><span data-dcnode-id="1190" instrument_node="">

</span><h2 data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">
					Wiel Arets interviewed on the Dutch radio program 'De Avonden'
				</span></h2><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1173" instrument_node="">Wiel Arets will be in conversation with Susan Boorst on the Dutch language radio program 'De Avonden', which will air in the Netherlands on September 12, 2012 at 21:00 on Radio 6. 'De Avonden' is a daily cultural radio program that has previously featured interviews and conversations with some of the Netherlands' most prominent designers, artists, and makers. Arets will discuss the recently published book </span><i data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Wiel Arets: Autobiographical References</span></i><span data-dcnode-id="1170" instrument_node="">, in addition to his appointment as Dean of the&nbsp;College of Architecture at the&nbsp;Illinois Institute of Technology in Chicago, Illinois, USA–which was&nbsp;from 1938-1958&nbsp;under the direction of Mies van der Rohe–and how he foresees leading and reshaping the school's academic focus.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1165"><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//programma.vpro.nl/deavonden/afleveringen/2012/september/woensdag-12-september.html"><span data-dcnode-id="1167" instrument_node="">More about 'De Avonden'</span></a></p><span data-dcnode-id="1164" instrument_node="">

</span><h2 data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">
					'Perspectives' part of the 'Reset the City' film series in Den Bosch
				</span></h2><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">
</span></p><p data-dcnode-id="1144"><em data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Perspectives</span></em><span data-dcnode-id="1145" instrument_node="">, a documentary on the life and work of Dutch architect Wiel Arets, produced by George Vogelaar, will be screened as part of the 'Reset the City' film series taking place in Den Bosch, the Netherlands, on October 2nd and December 17th, 2012, in cooperation with the Bosch Architectuur Initiatief. The documentary sketches an image of an enthusiastic and tireless architect working throughout the world. Set within the Netherlands, Milan, Zürich, Berlin, and Tokyo, the producers travelled with Arets for months, talking with him along the way about his ideas and theories as they relate to architecture, design, and metropolitan…</span></p><p class="readmore" data-dcnode-id="1140"><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/perspectives_part_of_the_reset_the_city_film_series_in_den_bosch"><span data-dcnode-id="1143" instrument_node="">Continue reading</span></a><span data-dcnode-id="1141" instrument_node="">
</span></p><span data-dcnode-id="1139" instrument_node="">

</span><h2 data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">
					WAA publish 'Wiel Arets: Autobiographical References'
				</span></h2><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1113"><i data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Wiel Arets: Autobiographical References</span></i><span data-dcnode-id="1122" instrument_node=""> (Birkhäuser, 2012) offers a unique and unparalleled view of this internationally renowned architect. Arets' optimistic outlook toward the future, which he calls 'A Wonderful World: A New Map of the World', underlies his global philosophy. This book presents Arets' lectures on that topic, debates between him and other thinkers and makers, 60 designs from his studio, and an extensive series of interviews. Within these texts his background, education, projects, and teachings are interwoven in a discussion that highlights the evolution of his career. Edited by Robert McCarter and designed by Irma Boom, the book will launch in summer 2012.</span><br data-dcnode-id="1121"><br data-dcnode-id="1120"><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.degruyter.com/view/product/203058" target="_blank"><span data-dcnode-id="1119" instrument_node="">Order the book from Birkhäuser</span></a><br data-dcnode-id="1117"><br data-dcnode-id="1116"><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/wiel_arets_autobiographical_references"><span data-dcnode-id="1115" instrument_node="">Read more about the publication</span></a></p><span data-dcnode-id="1112" instrument_node="">

</span><img alt="" data-dcnode-id="1106" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002107image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="1105" instrument_node="">

</span><h2 data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">
					WAA progress construction on the AvB Tower in The Hague
				</span></h2><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1097" instrument_node="">The AvB Tower will be located at the Anna van Bueren Square in the center of The Hague, and is an extension of the ‘commuter-leisure’ concept currently emerging in the world’s metropolises. 396 spacious ‘guest-rooms’ will function as studios with floor-to-ceiling sliding yellow-tinted glass panels, providing views to the adjacent square, the skyline of The Hague, and the North Sea beyond.&nbsp;Located next to the city's Central Station, at the intersection of urban envelope and square, the tower was designed to encourage an amplified ‘interiority’ within and around the Anne van Bueren Square.</span><br data-dcnode-id="1096"><br data-dcnode-id="1095"><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/avb_tower/"><span data-dcnode-id="1094" instrument_node="">Read more about the AvB Tower</span></a></p><span data-dcnode-id="1091" instrument_node="">

</span><div class="date" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">July  8, 2012</span></div><span data-dcnode-id="1080" instrument_node="">
</span><h2 data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">
					Wiel Arets appointed president of the jury of the 2012 Venice Biennale of Architecture
				</span></h2><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Wiel Arets has been appointed to the International Jury of the 13th International Architecture Exhibition, as part of the 2012 Venice Biennale of Architecture. This year's festivities are entitled 'Common Ground', directed by David Chipperfield, and will last from August 29th to November 25th, 2012.</span></p><span data-dcnode-id="1074" instrument_node="">

</span><h2 data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">
					Wiel Arets lectures at the Brandenburg University of Technology in Cottbus
				</span></h2><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">On July 5th, 2012 at 18:30 Wiel Arets publicly lectured at Brandenburg University of Technology in Cottbus,&nbsp;discussing&nbsp;recent works of WAA. The lecture was the last of the school's 'Get in Touch with the Dutch' summer lecture series, highlighting the Dutch influence in global architecture, while simultaneously bridging the gap between architecture and wider issues, such as culture and the urban environment.</span></p><span data-dcnode-id="1057" instrument_node="">

</span><h2 data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">
					WAA progress construction on Schwäbisch Media in Ravensburg
				</span></h2><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">The building will house the new headquarters of a company active in many facets of the media, utilizing the notion of 'villas'. A transparent glazed outer membrane will wrap the interior and exterior spaces, imparting a singular identity to the project as well as allowing the individual 'villas' to be distinguished. For those working in the building, the smaller areas of each working unit allow a sense of place and comfort, which will lend a rather domestic character to the experience of inhabitation.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1037"><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/schwaebisch_media/"><span data-dcnode-id="1039" instrument_node="">Read more about Schwäbisch Media</span></a></p><span data-dcnode-id="1036" instrument_node="">

				</span></h2><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1021" instrument_node="">The AvB Tower, to be located in The Hague, is currently featured in the June/July 2012 issue of the Dutch publication&nbsp;</span><i data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">MARK.</span></i></p><span data-dcnode-id="1017" instrument_node="">

</span><h2 data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">
					The H' House is published in 'Wohnrevue'
				</span></h2><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">The June 2012 issue of the Swiss publication </span><i data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Wohnrevue</span></i><span data-dcnode-id="988" instrument_node=""> includes a 9 page spread featuring the the H' House, located in Maastricht.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="983"><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/h_house/"><span data-dcnode-id="985" instrument_node="">Read more about the H' House</span></a></p><span data-dcnode-id="982" instrument_node="">

</span><img alt="" data-dcnode-id="976" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002561image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="975" instrument_node="">

</span><div class="date" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">May 22, 2012</span></div><span data-dcnode-id="971" instrument_node="">
</span><h2 data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">
					WAA progress construction on the V' House in Maastricht
				</span></h2><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="967" instrument_node="">Designed for a couple that collects vintage cars, the entrance is a covered outdoor space where several of the owners’ cars can be placed. From this main entrance the house is accessed via a ramp leading through all floors, while secondary circulation consists of an elevator and staircase, allowing for a vertical shortcuts. 3x3 m sliding doors perforate the structural façade, complimented by the in-situ concrete. Together with custom furnishings, the house is an expression of free space in a regulated heritage context.</span><br data-dcnode-id="966"><br data-dcnode-id="965"><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/v_house/"><span data-dcnode-id="964" instrument_node="">Read more about the V' House</span></a></p><span data-dcnode-id="961" instrument_node="">
</span></div><span data-dcnode-id="959" instrument_node="">

</span><img alt="" data-dcnode-id="955" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_001885image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="954" instrument_node="">
</span><div class="text" data-dcnode-id="939"><span data-dcnode-id="953" instrument_node="">
</span><div class="date" data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">May 18, 2012</span></div><span data-dcnode-id="950" instrument_node="">
</span><h2 data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">
					WAA progress construction on the Allianz Headquarters in Zürich
				</span></h2><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="946" instrument_node="">Multiple voids will create shortcuts between floors within the Allianz Headquarters, connecting floors with multiple staircases and allowing a greater flexibility of work space arrangements. As these voids have been incorporated into the structure, the building is adaptable to individual and future uses in many ways. The resulting voids, and the visual connections they create, will encourage a high degree of social interaction and further encourage use of the main staircase as the dominant vertical circulation path, rather than the use of elevators–thus encouraging 'interiority'.</span><br data-dcnode-id="945"><br data-dcnode-id="944"><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/allianz_headquarters/"><span data-dcnode-id="943" instrument_node="">Read more about Allianz Headquarters</span></a></p><span data-dcnode-id="940" instrument_node="">

</span><h2 data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">
					WAA launch LaCucinaAlessi at Salone Internazionale del Mobile
				</span></h2><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">
</span></p><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">WAA has collaborated with Alessi and Valcucine to introduce LaCucina Alessi, launching in Milan at the 2012 Salone Internazionale del Mobile as part of EuroCucina. Made of white Corian®, the freestanding furniture has a unified appearance and is assembled by a hidden joint system, while the upper storage area has sliding doors with an inset pull. The unit is, as shown, equipped with the Alessi Il Bagno dOt faucets, designed by WAA and produced Oras. Alberto Alessi explains, the typical features of WAA's design approach are firmly in evidence in the project's design: '...the tendency for the parts to be…</span></p><p class="readmore" data-dcnode-id="918"><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_launch_lacucinaalessi_at_salone_internazionale_del_mobile"><span data-dcnode-id="921" instrument_node="">Continue reading</span></a><span data-dcnode-id="919" instrument_node="">

</span><h2 data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">
					WAA progress construction on the B' Tower in Rotterdam
				</span></h2><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">The B' Tower is located in the center of Rotterdam, immediately adjacent to the Bijenkorf department store designed by Marcel Breuer in the late 1950s. The individual studio homes and short stay apartments are completely fitted with WAA designs–including custom designed kitchens, furniture, and fittings by&nbsp;Alessi, Laufen, Miele, Oras, and Valcucine. The design stacks three volumes of similar height. The ground-related volume contains a fashion store and a car park; the two upper volumes contain apartments, most of which include a&nbsp;each wtih a cantilevered balcony large enough to accomodate a table for a dinner party of six.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="894"><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/b_tower/"><span data-dcnode-id="896" instrument_node="">Read more about the B' Tower</span></a></p><span data-dcnode-id="893" instrument_node="">

</span><img alt="" data-dcnode-id="885" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002100image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="884" instrument_node="">

</span><h2 data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">
					The Utrecht University Library is published in the 2011/2012 'Architecture in the Netherlands Yearbook'
				</span></h2><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="876" instrument_node="">The Utrecht University Library is featured in a six page feature in the </span><i data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">2011/2012 Architecture in the Netherlands Yearbook</span></i><span data-dcnode-id="873" instrument_node="">, published by NAi Publishers of Rotterdam. This year marks the 25th anniversary of the publication, and as such the 10 best buildings in the Netherlands constructed over the past 25 years, as chosen by the editors, were included as a special supplement–and the Utrecht University Library was chosen as one of these 10 best projects.</span></p><span data-dcnode-id="871" instrument_node="">

</span><h2 data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">
					WAA to design the Blumenhaus in Zürich
				</span></h2><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="856" instrument_node="">Blumenhaus is located in the Escher-Wyss district of Zürich; a 'rough' area of the city and one of the most urban spaces in Switzerland. The neighborhood, when juxtaposed against the backdrop of Zürich's center, is characterized by its relics from the city's industrial past. Reflecting the project's immediate surroundings, a corten façade encloses 23 apartments, ground level retail, and office spaces on the first floor, seemingly merging the building with its existing context. The ground floor façade has been kept free on three sides, maximizing its street-facing retail frontage, while the ground and first floors have been kept flexible, allowing each to be able to accommodate offices, restaurants, and/or shops.</span><br data-dcnode-id="855"><br data-dcnode-id="854"><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/blumenhaus/"><span data-dcnode-id="853" instrument_node="">Read more about the Blumenhaus</span></a></p><span data-dcnode-id="850" instrument_node="">

				</span></h2><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="835" instrument_node="">The April 2012 issue of the Dutch publication&nbsp;</span><i data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Eigen Huis &amp; Interieur</span></i><span data-dcnode-id="832" instrument_node=""> includes a 12 page article featuring the the H' House, located in Maastricht.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="827"><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/h_house/"><span data-dcnode-id="829" instrument_node="">Read more about the H' House</span></a></p><span data-dcnode-id="826" instrument_node="">

</span><h2 data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">
					WAA begin construction on the AvB Tower in The Hague 
				</span></h2><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="811" instrument_node="">The AvB Tower will be located at the Anna van Bueren Square in the center of The Hague, and is an extension of the ‘commuter-leisure’ concept currently emerging in the world’s metropolises.&nbsp;The first five floors provide space for shops and the lobby, a restaurant, offices, lecture hall, and library–where the academic dweller finds a communicative atmosphere.&nbsp;396 spacious ‘guest-rooms’ will function as studios with floor-to-ceiling sliding yellow-tinted glass panels, providing views to the adjacent square, the skyline of The Hague, and the North Sea beyond. The hybrid program of the steel tower, located next to the city's Central Station, at the intersection of urban envelope and square.</span><br data-dcnode-id="810"><br data-dcnode-id="809"><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/avb_tower/"><span data-dcnode-id="808" instrument_node="">Read more about the AvB Tower</span></a></p><span data-dcnode-id="805" instrument_node="">

</span><img alt="" data-dcnode-id="799" height="513" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002094image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="798" instrument_node="">

</span><div class="date" data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">March 12, 2012</span></div><span data-dcnode-id="794" instrument_node="">
</span><h2 data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">
					Wiel Arets teaches at MCH in Madrid
				</span></h2><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">From March 12-16 Wiel Arets returned to Madrid as a guest professor to once again take part in MCH Master in Collective Housing program, itself part of the Universidad Politécnica de Madrid. Arets and assistants Lena Wimmer and John Bezold debated the notion of ’Tokyo Utopia’ with the students, making use of their week-long investigative research into the future of Japan. The workshop focused on Tokyo as a ‘battle-ground’ and its ability to function as an example for a new 'Utopian' society.</span></p><span data-dcnode-id="788" instrument_node="">
</span></div><span data-dcnode-id="786" instrument_node="">
</span></div><span data-dcnode-id="784" instrument_node="">
</span><div class="news item cf" data-dcnode-id="764"><span data-dcnode-id="783" instrument_node="">
</span><img alt="" data-dcnode-id="782" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_001537image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="781" instrument_node="">

</span><h2 data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">
					WAA progress construction on Regiocentrale Zuid in Maasbracht
				</span></h2><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="773" instrument_node="">The building houses the operation center for&nbsp;levees&nbsp;along the river Meuse as well as a lobby, nautical training facility, and public educational spaces. At the center of the building, an inner polygonal void is filled with water, and as such is a constant reminder of the water control of the lock-sluices that takes place within the building. As the building will be in constant use, day and night, its occupants are provided with the ability to regulate the light, sound and view within their spaces, importing a domestic quality to the workplace, while a roof terrace offers panoramic views to the waterways beyond.</span><br data-dcnode-id="772"><br data-dcnode-id="771"><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/regiocentrale_zuid/"><span data-dcnode-id="770" instrument_node="">Read more about Regiocentrale Zuid</span></a></p><span data-dcnode-id="767" instrument_node="">

					Villa Reed Island is published in 'GA Houses', #125
				</span></h2><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="752" instrument_node="">Villa Reed Island, to be located in Amsterdam, is currently featured in the Japanese publication&nbsp;</span><i data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">GA Houses, #125.</span></i></p><span data-dcnode-id="748" instrument_node="">

					WAA progress construction on the E' Tower in Eindhoven
				</span></h2><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">With a program of simple apartments, the project deals mainly with the  horizontal stacking of slabs, from which projects a series of  specifically shaped brise-soleils, creating a constant play of shadow  on the façade, itself composed of a semi-structural glazing of sliding  panels. Some apartments have an internal conservatory, serving as a  balcony during summer, and an extra room during cooler months. All other  apartments have their own private balcony.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="728"><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/e_tower/"><span data-dcnode-id="730" instrument_node="">Read more about the E' Tower</span></a></p><span data-dcnode-id="727" instrument_node="">

</span><h2 data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">
					'A Wonderful World' exhibition opens in Antwerp
				</span></h2><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">
</span></p><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Cityscapes Gallery presents a solo exhibition of architect Wiel Arets at the Locus Solus Art Space in Antwerp. The exhibition displays new work of WAA, depicting Arets' outlook on the emerging global metropolis, asserting that: 'We are living in a time where technology is invisible and no one seems to be in control. To help us understand this world, we need to redefine the map of the world; a mental construct reinterpreted countless times since 1492. We could read the world anno 2020 as a collective living space for everyone, with individual cities functioning as neighborhoods, each with their own…</span></p><p class="readmore" data-dcnode-id="705"><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/a_wonderful_world_exhibition_opens_in_antwerp"><span data-dcnode-id="708" instrument_node="">Continue reading</span></a><span data-dcnode-id="706" instrument_node="">

</span><img alt="" data-dcnode-id="698" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_001081image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="697" instrument_node="">

</span><h2 data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">
					'Wiel Arets Architects: STILLS' exhibition opens at Fundación COAM in Madrid
				</span></h2><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">
</span></p><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">With more than 50 built projects, 20 monographs, a series of products in production, countless lectures and professorships given by Wiel Arets, and four new office publications in the works, the timing is perfect for an oeuvre exhibition on the work of WAA. STILLS shows the development of the oeuvre, expands upon the theoretical background that informs the work, and offers insight into the sources of inspiration and fascination of Arets; from his very early beginnings, to his current teachings and projects. In six short video documentaries, the architect leads the visitor through the cities of Tokyo, Zürich, Berlin, and…</span></p><p class="readmore" data-dcnode-id="682"><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/wiel_arets_architects_stills_exhibition_opens_at_fundacian_coam_in_madrid"><span data-dcnode-id="685" instrument_node="">Continue reading</span></a><span data-dcnode-id="683" instrument_node="">

</span><h2 data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">
					WAA awarded the 2011 Geurt Brinkgreve Bokaal for De Nieuwe Liefde
				</span></h2><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="666" instrument_node="">De Nieuwe Liefde, a theater and community center located in a monumental white building on Amsterdam’s Da Costakade, has been awarded the 2011 Geurt Brinkgreve Bokaal prize. The extensive reconstruction transformed the existing building into a series of new spaces composed of a main hall with seating for 230, a conference room with space for 60, a choir space for 50, a library, a separate restaurant-café, and a grand foyer that decompresses into a central circulation void.</span><br data-dcnode-id="665"><br data-dcnode-id="664"><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/de_nieuwe_liefde/"><span data-dcnode-id="663" instrument_node="">Read more about De Nieuwe Liefde</span></a></p><span data-dcnode-id="660" instrument_node="">

</span><h2 data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">
					WAA progress construction on the A' House in Tokyo
				</span></h2><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">The volume consists of four horizontally divided spaces with floor slabs of varying heights, each connected by a small vertically screwed staircase that, given the footprint of the building, allows for loft like spaces. Two bedrooms and a bathroom are situated on the lower level, a kitchen and dining area on the ground floor, living and study on the first floor, and a master suite highest floor, with an adjacent outdoor terrace on the front end of the building. The terrace is located on the south, allowing for the best possible natural lighting, and the façade envelopes this space.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="640"><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/a_house/"><span data-dcnode-id="642" instrument_node="">Read more about the A' House</span></a></p><span data-dcnode-id="639" instrument_node="">

					WAA progress construction on Schwäbisch Media in Ravensburg
				</span></h2><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">The building will house the new headquarters of a company active in many facets of the media, utilizing the notion of 'villas'. A transparent glazed outer membrane will wrap the interior and exterior spaces, imparting a singular identity to the project as well as allowing the individual 'villas' to be distinguished. For those working in the building, the smaller areas of each working unit allow a sense of place and comfort, which will lend a rather domestic character to the experience of inhabitation.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="619"><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/schwaebisch_media/"><span data-dcnode-id="621" instrument_node="">Read more about Schwäbisch Media</span></a></p><span data-dcnode-id="618" instrument_node="">
</span></div><span data-dcnode-id="616" instrument_node="">
</span></div><span data-dcnode-id="614" instrument_node="">
</span><div class="news item cf" data-dcnode-id="590"><span data-dcnode-id="613" instrument_node="">
</span><img alt="" data-dcnode-id="612" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003463image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="611" instrument_node="">

</span><h2 data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">
					'Perspectives' premieres at the Architecture Film Festival Rotterdam
				</span></h2><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">
</span></p><p data-dcnode-id="598"><em data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Perspectives</span></em><span data-dcnode-id="599" instrument_node="">, a documentary on the life and work of Dutch architect Wiel Arets, produced by George Vogelaar, will have its world premiere at the 2011 Architecture Film Festival Rotterdam on October 8th at 17:45. The documentary sketches an image of an enthusiastic and tireless architect working throughout the world. Set within the Netherlands, Milan, Zürich, Berlin, and Tokyo, the producers travelled with Arets for months, talking with him along the way about his ideas and theories as they relate to architecture, design, and metropolitan development–as well as his current projects. The film’s producers also speak to Arets about his choice…</span></p><p class="readmore" data-dcnode-id="594"><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/perspectives_premieres_at_the_architecture_film_festival_rotterdam"><span data-dcnode-id="597" instrument_node="">Continue reading</span></a><span data-dcnode-id="595" instrument_node="">
</span></p><span data-dcnode-id="593" instrument_node="">
</span></div><span data-dcnode-id="591" instrument_node="">
</span></div><span data-dcnode-id="589" instrument_node="">
</span><div class="news item cf" data-dcnode-id="566"><span data-dcnode-id="588" instrument_node="">
</span><img alt="" data-dcnode-id="587" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_001432image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="586" instrument_node="">
</span><div class="text" data-dcnode-id="568"><span data-dcnode-id="585" instrument_node="">
</span><div class="date" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">September  6, 2011</span></div><span data-dcnode-id="582" instrument_node="">
</span><h2 data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">
					WAA progress construction on the Allianz Headquarters in Zürich
				</span></h2><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="578" instrument_node="">The Allianz Headquarters is an office complex linked and interlocked by a series of bridges&nbsp;and voids. Once completed, the Allianz Headquarters will be composed of a high-rise tower and a 5-story building, both with a program of mainly office space, set within an urban plan based on a modified block structure. The two buildings will be connected by a series of bridges, enabling work, gastronomic and leisure spaces to fluidly interact. Upon entering the lobby of the complex, a monumental sculptural staircase will rise 72 m–the entire height of the building–essentially creating an accessible atrium that visually and intuitively routes users.</span><br data-dcnode-id="577"><br data-dcnode-id="576"><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/allianz_headquarters/"><span data-dcnode-id="575" instrument_node="">Read more about Allianz Headquarters</span></a></p><span data-dcnode-id="572" instrument_node="">

</span></div><span data-dcnode-id="567" instrument_node="">

</span><img alt="" data-dcnode-id="563" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003014image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="562" instrument_node="">
</span><div class="text" data-dcnode-id="547"><span data-dcnode-id="561" instrument_node="">
</span><div class="date" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">September  1, 2011</span></div><span data-dcnode-id="558" instrument_node="">
</span><h2 data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">
					WAA begin construction on Campus Hoogvliet in Rotterdam
				</span></h2><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="554" instrument_node="">Campus Hoogvliet is a key project in the plan to restructure the Hoogvliet area of Rotterdam. The location of this new educational and cultural campus lies within the district of Zalmplaat, a postwar area of the city characterized by Modernist intentions and a park-like setting. The project will form a unique meeting-point within the neighborhood, acting as a transformative catalyst to further strengthen cultural, educational, sport, and work communities. The central theme raised during the design process of the campus was the ideas of 'connections', and how the campus interacts with the areas of the surrounding neighborhood, while simultaneously functioning as a cluster of interrelated public and private spaces.</span><br data-dcnode-id="553"><br data-dcnode-id="552"><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/campus_hoogvliet/"><span data-dcnode-id="551" instrument_node="">Read more about Campus Hoogvliet</span></a></p><span data-dcnode-id="548" instrument_node="">

</span><img alt="" data-dcnode-id="542" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_001975image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="541" instrument_node="">
</span><div class="text" data-dcnode-id="526"><span data-dcnode-id="540" instrument_node="">
</span><div class="date" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">August  1, 2011</span></div><span data-dcnode-id="537" instrument_node="">
</span><h2 data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">
					WAA begin construction on the V' House in Maastricht
				</span></h2><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="533" instrument_node="">Designed for a couple that collects vintage cars, the entrance is a covered outdoor space where several of the owners’ cars can be placed. From this main entrance the house is accessed via a ramp leading through all floors, while secondary circulation consists of an elevator and staircase, allowing for a vertical shortcuts. 3x3 m sliding doors perforate the structural façade, complimented by the in-situ concrete. Together with custom furnishings, the house is an expression of free space in a regulated heritage context.</span><br data-dcnode-id="532"><br data-dcnode-id="531"><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/v_house/"><span data-dcnode-id="530" instrument_node="">Read more about the V' House</span></a></p><span data-dcnode-id="527" instrument_node="">

				</span></h2><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="512" instrument_node="">The H' House, located in Maastricht, is currently featured as the June 2011 'House of the Month' in the American publication </span><i data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Architectural Record</span></i><span data-dcnode-id="509" instrument_node="">.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="504"><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/h_house/"><span data-dcnode-id="506" instrument_node="">Read more about the H' House</span></a></p><span data-dcnode-id="503" instrument_node="">

</span><img alt="" data-dcnode-id="497" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003443image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="496" instrument_node="">

					WAA progress construction on the E' Tower in Eindhoven
				</span></h2><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="488" instrument_node="">The project is located in the Stadium Quarter, an area next to the Phillips Stadium in Eindhoven, and is an integral part of the urban plan drawn up by landscape firm West 8. The original brief for the area includes the E' Tower, the E' Block and a slender end-piece of the adjacent block–all apartment buildings in this emerging district. A gap between the E' Tower and the adjacent block will give form to the area's entrance while also providing an outdoor space for use by the tower's inhabitants.</span><br data-dcnode-id="487"><br data-dcnode-id="486"><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/e_tower/"><span data-dcnode-id="485" instrument_node="">Read more about the E' Tower</span></a></p><span data-dcnode-id="482" instrument_node="">
</span></div><span data-dcnode-id="480" instrument_node="">
</span></div><span data-dcnode-id="478" instrument_node="">

</span><img alt="" data-dcnode-id="476" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002096image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="475" instrument_node="">

</span><h2 data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">
					An extensive interview with Wiel Arets is published in 'Abitare'
				</span></h2><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="467" instrument_node="">The June 2011 issue of the Italian publication&nbsp;</span><i data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Abitare</span></i><span data-dcnode-id="464" instrument_node=""> includes an extensive interview with Wiel Arets highlighting the technical and theoretical evolution of the studio's work.&nbsp;</span></p><span data-dcnode-id="462" instrument_node="">
</span></div><span data-dcnode-id="460" instrument_node="">
</span></div><span data-dcnode-id="458" instrument_node="">
</span><div class="news item cf" data-dcnode-id="438"><span data-dcnode-id="457" instrument_node="">
</span><img alt="" data-dcnode-id="456" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_001888image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="455" instrument_node="">
</span><div class="text" data-dcnode-id="440"><span data-dcnode-id="454" instrument_node="">
</span><div class="date" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">April 30, 2011</span></div><span data-dcnode-id="451" instrument_node="">
</span><h2 data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">
					WAA progress construction on Regiocentrale Zuid in Maasbracht
				</span></h2><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="447" instrument_node="">Regiocentrale Zuid is located on the river Meuse, which is a water  source for drinking, industry, agriculture, wildlife, recreation, as  well as inland shipping. The prominently sited building houses the  control of levees on this section of the Meuse for the first time in one  location, thereby becoming a key component of regional and national  water management. Barges, bridges, and lock-sluices between Maastricht  and Venlo will be directed from the operational center, the space of  which determines the primary volume of the building.</span><br data-dcnode-id="446"><br data-dcnode-id="445"><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/regiocentrale_zuid/"><span data-dcnode-id="444" instrument_node="">Read more about Regiocentrale Zuid</span></a></p><span data-dcnode-id="441" instrument_node="">
</span></div><span data-dcnode-id="439" instrument_node="">
</span></div><span data-dcnode-id="437" instrument_node="">
</span><div class="news item cf" data-dcnode-id="417"><span data-dcnode-id="436" instrument_node="">
</span><img alt="" data-dcnode-id="435" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_001179image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="434" instrument_node="">
</span><div class="text" data-dcnode-id="419"><span data-dcnode-id="433" instrument_node="">
</span><div class="date" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">April 29, 2011</span></div><span data-dcnode-id="430" instrument_node="">
</span><h2 data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">
					WAA complete De Nieuwe Liefde in Amsterdam
				</span></h2><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="426" instrument_node="">De Nieuwe Liefde is a theater and community center located in a monumental white building on Amsterdam’s Da Costakade that was originally constructed in 1904 as storage space for a local wine company. The extensive reconstruction transformed the existing building into a series of new spaces composed of a main hall with seating for 230, a conference room with space for 60, a choir space for 50, a library, a separate restaurant-café, and a grand foyer that decompresses into a central circulation void.</span><br data-dcnode-id="425"><br data-dcnode-id="424"><a data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/de_nieuwe_liefde/"><span data-dcnode-id="423" instrument_node="">Read more about De Nieuwe Liefde</span></a></p><span data-dcnode-id="420" instrument_node="">
</span></div><span data-dcnode-id="418" instrument_node="">
</span></div><span data-dcnode-id="416" instrument_node="">
</span><div class="news item cf" data-dcnode-id="396"><span data-dcnode-id="415" instrument_node="">
</span><img alt="" data-dcnode-id="414" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_001178image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="413" instrument_node="">
</span><div class="text" data-dcnode-id="398"><span data-dcnode-id="412" instrument_node="">
</span><div class="date" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">March 21, 2011</span></div><span data-dcnode-id="409" instrument_node="">
</span><h2 data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">
					WAA complete the H' House in Maastricht
				</span></h2><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="405" instrument_node="">The H' House is a detached single family glass residence, situated within a formal garden, which heavily utilizes varying shades of transparency to obtain desired privacy levels. Designed for a couple and sited in a suburban area of Maastricht near the Netherlands-Belgium border, the house was designed for a couple with a strong interest in the arts. Individually an actor and a dancer, and dually landscape architects, the owners are able to keep their landscaping skills honed in the formal garden behind the house, which they occasionally open to the public.</span><br data-dcnode-id="404"><br data-dcnode-id="403"><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/h_house/"><span data-dcnode-id="402" instrument_node="">Read more about the H' House</span></a></p><span data-dcnode-id="399" instrument_node="">
</span></div><span data-dcnode-id="397" instrument_node="">
</span></div><span data-dcnode-id="395" instrument_node="">
</span><div class="news item cf" data-dcnode-id="379"><span data-dcnode-id="394" instrument_node="">
</span><img alt="" data-dcnode-id="393" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_001667image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="392" instrument_node="">
</span><div class="text" data-dcnode-id="381"><span data-dcnode-id="391" instrument_node="">
</span><div class="date" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">January  4, 2011</span></div><span data-dcnode-id="388" instrument_node="">
</span><h2 data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">
					Wiel Arets lectures at the Berlage Institute in Rotterdam
				</span></h2><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">On January 4th, 2011 at 19:00 Wiel Arets publicly lectured at the Berlage Institute in Rotterdam on the notion of 'A Wonderful World: A New Map of the World', asserting that: 'We are living in a time where technology is invisible and no one seems  to be in control. To help us understand this world, we need to redefine  the map of the world; a mental construct reinterpreted countless times  since 1492.'</span></p><span data-dcnode-id="382" instrument_node="">
</span></div><span data-dcnode-id="380" instrument_node="">
</span></div><span data-dcnode-id="378" instrument_node="">
</span><div class="news item cf" data-dcnode-id="362"><span data-dcnode-id="377" instrument_node="">
</span><img alt="" data-dcnode-id="376" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002098image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="375" instrument_node="">
</span><div class="text" data-dcnode-id="364"><span data-dcnode-id="374" instrument_node="">
</span><div class="date" data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">January  3, 2011</span></div><span data-dcnode-id="371" instrument_node="">
</span><h2 data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">
					Wiel Arets teaches at the Berlage Institute in Rotterdam
				</span></h2><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Wiel Arets and Robert McCarter of Washington University in St. Louis, researched the notion of 'A Wonderful World: A New Map of the World' in the form of a master class at the Berlage Institute in Rotterdam from January 3-7, 2011.</span></p><span data-dcnode-id="365" instrument_node="">
</span></div><span data-dcnode-id="363" instrument_node="">
</span></div><span data-dcnode-id="361" instrument_node="">
</span><div class="news item cf" data-dcnode-id="342"><span data-dcnode-id="360" instrument_node="">
</span><img alt="" data-dcnode-id="359" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003464image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="358" instrument_node="">
</span><div class="text" data-dcnode-id="344"><span data-dcnode-id="357" instrument_node="">
</span><div class="date" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">January  3, 2011</span></div><span data-dcnode-id="354" instrument_node="">
</span><h2 data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">
					WAA awarded the 2010 Best Dutch Book Design Award for 'STILLS'
				</span></h2><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="350" instrument_node="">States the jury, 'Wiel Arets is already the subject of at least 20 published monographs, and new ones are in preparation. Arets himself has always been something of a reader, and his life is not all about form and space: there is room in it for books and other texts too. </span><i data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">STILLS</span></i><span data-dcnode-id="347" instrument_node=""> is a book that has been created to point up this other side of him. Covering a period of 29 years, it collects in chronological order some 40 texts written by him and a further 50 or so written about him–dark pages set in a single column for his own texts, light pages in two columns for the rest. Years of sowing alternate with years of reaping, years of writing with years of building. An open spine guarantees good handling and triple-thick front and back covers give it the required stiffness.'</span></p><span data-dcnode-id="345" instrument_node="">
</span></div><span data-dcnode-id="343" instrument_node="">
</span></div><span data-dcnode-id="341" instrument_node="">
</span><div class="news item cf" data-dcnode-id="325"><span data-dcnode-id="340" instrument_node="">

</span><h2 data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">
					WAA nominated for the 2011 Mies van der Rohe Award for the V' Tower
				</span></h2><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">The V' Tower has been nominated for the 2011 Mies van der Rohe Award. The glazing of the building's skin is fritted with an enamel printed pattern, which ranges from transparent to translucent in a non-repeating rhythm, so that, depending on the angle, time of day, and density of the pattern, one either sees into the interior or sees a reflection of the building’s surroundings.</span></p><span data-dcnode-id="328" instrument_node="">

</span><h2 data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">
					WAA publish 'STILLS: A Timeline of Ideas, Articles &amp; Interviews 1982-2010'
				</span></h2><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="302"><i data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">STILLS: A Timeline of Ideas, Articles &amp; Interviews 1982-2010 </span></i><span data-dcnode-id="311" instrument_node="">(010 Publishers, Rotterdam)&nbsp;is a 632 page in-depth look at the words behind the work of Dutch architect; included are articles about, by, and interviews with Arets. Edited by Roemer van Toorn, a cross section of some of architecture’s most influential voices can be found inside, including: Stan Allen, Ben van Berkel &amp; Caroline Bos, Kenneth Frampton, Jacques Herzog, Toyo Ito, Rem Koolhaas, Bart Lootsma, Greg Lynn, Robert McCarter, Dominique Perrault, Hani Rashid, Kazuyo Sejima, and Anthony Vidler.</span><br data-dcnode-id="310"><br data-dcnode-id="309"><a data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/stills_a_timeline_of_ideas_articles_amp_interviews_1983_2010"><span data-dcnode-id="308" instrument_node="">Read more about the publication</span></a><br data-dcnode-id="306"><br data-dcnode-id="305"><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nai010.com/en/component/zoo/item/stills"><span data-dcnode-id="304" instrument_node="">Order the book from 010 Publishers</span></a></p><span data-dcnode-id="301" instrument_node="">

</span><h2 data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">
					'Wiel Arets Architects: STILLS' exhibition opens at the Glaspaleis in Heerlen
				</span></h2><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">
</span></p><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">The exhibition STILLS freezes time, providing visitors the opportunity to explore and reflect on a selection of designs, texts, and images carefully curated from the archives of WAA. Exhibitions visitors can follow the studio’s evolution through a timeline that highlights major milestones of Arets’ life and work. Built projects, model studies, sketches, exhibitions, books, and awards are all on display. A selection of architectural projects from the oeuvre are additionally exhibited through the use of foam models and video presentations. In six short video documentaries, Arets discusses his experiences and thoughts on the architectural profession, expounding on what’s most influential…</span></p><p class="readmore" data-dcnode-id="279"><a data-dcnode-id="281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/wiel_arets_architects_stills_exhibition_opens_at_the_glaspaleis_in_heerlen"><span data-dcnode-id="282" instrument_node="">Continue reading</span></a><span data-dcnode-id="280" instrument_node="">
</span></p><span data-dcnode-id="278" instrument_node="">

</span><h2 data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">
					Wiel Arets to lecture at the Mackintosh School of Architecture in Glasgow
				</span></h2><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="263" instrument_node="">On November 26th, 2010 Wiel Arets will publicly lecture at the Mackintosh School of Architecture in Glasgow, discussing recent works of WAA. Hosted by The Glasgow School of Art, the Architecture Friday Lecture Series will look beyond the buildings and make connections between architecture and wider issues, such as culture and the urban environment.</span><br data-dcnode-id="262"><br data-dcnode-id="261"><span data-dcnode-id="260" instrument_node="">Mackintosh School of Architecture</span><br data-dcnode-id="259"><span data-dcnode-id="258" instrument_node="">November 26th, 2010</span><br data-dcnode-id="257"><br data-dcnode-id="256"><span data-dcnode-id="255" instrument_node="">167 Renfrew Street</span><br data-dcnode-id="254"><span data-dcnode-id="253" instrument_node="">Glasgow G3 6RQ</span><br data-dcnode-id="252"><span data-dcnode-id="251" instrument_node="">Scotland, United Kingdom</span></p><span data-dcnode-id="249" instrument_node="">

</span><div class="text" data-dcnode-id="227"><span data-dcnode-id="241" instrument_node="">

</span><h2 data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">
					WAA begin construction on the Allianz Headquarters in Zürich
				</span></h2><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="229"><span data-dcnode-id="234" instrument_node="">The Allianz Headquarters is an office complex linked and interlocked by a series of bridges&nbsp;and voids. Once completed, the Allianz Headquarters will be composed of a high-rise tower and a five story building, both with a program of mainly office space, set within an urban plan based on a modified block structure. The two buildings will be connected by a series of bridges, enabling work, gastronomic, and leisure spaces to fluidly interact. Upon entering the lobby of the complex, a monumental sculptural staircase will rise 72 m–the entire height of the building–essentially creating an accessible atrium that visually and intuitively routes users.</span><br data-dcnode-id="233"><br data-dcnode-id="232"><a data-dcnode-id="230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/allianz_headquarters/"><span data-dcnode-id="231" instrument_node="">Read more about Allianz Headquarters</span></a></p><span data-dcnode-id="228" instrument_node="">
</span></div><span data-dcnode-id="226" instrument_node="">

</span><img alt="" data-dcnode-id="222" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_002700image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="221" instrument_node="">

</span><div class="date" data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">October  8, 2010</span></div><span data-dcnode-id="217" instrument_node="">
</span><h2 data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">
					WAA win competition for the IJhal at Amsterdam's Centraal Station
				</span></h2><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="208"><span data-dcnode-id="213" instrument_node="">The IJhal,&nbsp;to be located on the waterfront of the river IJ,&nbsp;will be Amsterdam Centraal Station’s pedestrian centric area for gastronomic, retail and, leisure facilities for passengers and city residents alike. The&nbsp;station is currently undergoing a drastic transformation to become the centerpiece of the city’s plan to reconnect the disparate neighborhood clusters along the city's waterfront through the restructuring of its public transportation systems.&nbsp;Construction will begin in 2014.</span><br data-dcnode-id="212"><br data-dcnode-id="211"><a data-dcnode-id="209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/ijhal/"><span data-dcnode-id="210" instrument_node="">Read more about the IJhal</span></a></p><span data-dcnode-id="207" instrument_node="">
</span></div><span data-dcnode-id="205" instrument_node="">
</span></div><span data-dcnode-id="203" instrument_node="">
</span><div class="news item cf" data-dcnode-id="183"><span data-dcnode-id="202" instrument_node="">
</span><img alt="" data-dcnode-id="201" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003471image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="200" instrument_node="">
</span><div class="text" data-dcnode-id="185"><span data-dcnode-id="199" instrument_node="">
</span><div class="date" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">September 15, 2010</span></div><span data-dcnode-id="196" instrument_node="">
</span><h2 data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">
					WAA awarded the 2011 ContractWorld Award for the V' Tower
				</span></h2><span data-dcnode-id="193" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="192" instrument_node="">The V' Tower has won the 2011 ContractWorld Award under the category 'Offices'. Its façade is fritted with a pixilated enamel image; this creates an abstract pattern that spans a gradating density–from transparent to translucent–in a non-repeating rhythm. Constructed for a private company that oversees information and communication technology solutions, the tower exemplifies the open, transparent, and efficient cultural characteristics of its occupant.</span><br data-dcnode-id="191"><br data-dcnode-id="190"><a data-dcnode-id="188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/v_tower/"><span data-dcnode-id="189" instrument_node="">Read more about the V' Tower</span></a></p><span data-dcnode-id="186" instrument_node="">
</span></div><span data-dcnode-id="184" instrument_node="">
</span></div><span data-dcnode-id="182" instrument_node="">

</span><img alt="" data-dcnode-id="180" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_000450image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="179" instrument_node="">
