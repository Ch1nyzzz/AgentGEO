</span><img alt="" data-dcnode-id="4022" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004144image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="4021" instrument_node="">
</span><div class="text" data-dcnode-id="3991"><span data-dcnode-id="4020" instrument_node="">
</span><div class="date" data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node="">April 21, 2015</span></div><span data-dcnode-id="4017" instrument_node="">
</span><h2 data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">
					Wiel Arets to lecture at Princeton University
				</span></h2><span data-dcnode-id="4014" instrument_node="">
</span><p data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">As part of the spring 2015 lecture series–curated by Stan Allen–at Princeton University, Wiel Arets will give a lecture on April 27th. His words and visuals will wander around the idea that the world is currently undergoing a powerfully subtle shift in the ways in which its cities function; connectivity, accessibility, hybridity, and the silencing of transportation modes–such as cars, planes, and trains–will come to define the twenty first century metropolis.</span></p><span data-dcnode-id="4011" instrument_node="">
</span><p data-dcnode-id="4004"><span data-dcnode-id="4010" instrument_node="">Princeton School of Architecture </span><br data-dcnode-id="4009"><a data-dcnode-id="4007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//soa.princeton.edu/content/soa-lecture%253A-wiel-arets"><span data-dcnode-id="4008" instrument_node=""> Spring 2015 Lecture Series </span></a><br data-dcnode-id="4006"><span data-dcnode-id="4005" instrument_node="">April 27th, 2015 18:00</span></p><span data-dcnode-id="4003" instrument_node="">
</span><p data-dcnode-id="3997"><span data-dcnode-id="4002" instrument_node="">Betts Auditorium</span><br data-dcnode-id="4001"><span data-dcnode-id="4000" instrument_node="">Princeton, NJ 08544 </span><br data-dcnode-id="3999"><span data-dcnode-id="3998" instrument_node="">United States of America</span></p><span data-dcnode-id="3996" instrument_node="">
</span><p data-dcnode-id="3993"><a data-dcnode-id="3994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mediacentrallive.princeton.edu/"><span data-dcnode-id="3995" instrument_node="">Stream the lecture live on the 27th</span></a></p><span data-dcnode-id="3992" instrument_node="">

</span><img alt="" data-dcnode-id="3986" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004132image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="3985" instrument_node="">
</span><div class="text" data-dcnode-id="3964"><span data-dcnode-id="3984" instrument_node="">
</span><div class="date" data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">April 13, 2015</span></div><span data-dcnode-id="3981" instrument_node="">
</span><h2 data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">
					WAA publish the book 'Wiel Arets–Bas Princen'
				</span></h2><span data-dcnode-id="3978" instrument_node="">
</span><p data-dcnode-id="3974"><i data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">Wiel Arets–Bas Princen</span></i><span data-dcnode-id="3975" instrument_node=""> (Hatje Cantz, 2015) encapsulates a five year journey throughout the life of twelve buildings, as experienced by artist Bas Princen–whose imagery documents the interplay of contemporary metropolitan conditions, as they converge with raw wilderness. Within the book's pages, columns seem to be composed of trees; fritted surfaces resemble abstract paintings; and mechanical systems appear to replicate sculptural silhouettes. 164 pages, with 80 images; the book freezes inconspicuous incidents of ephemerality that paralleled the use and construction of the twelve buildings. Edited by John Bezold, designed by Mevis &amp; van Duersen, with a contribution by Ludovic Balland–the publication is set to launch in May 2015.</span></p><span data-dcnode-id="3973" instrument_node="">
</span><p data-dcnode-id="3966"><a data-dcnode-id="3971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hatjecantz.de/wiel-arets-bas-princen-5402-1.html"><span data-dcnode-id="3972" instrument_node="">Order the book from Hatje Cantz</span></a><br data-dcnode-id="3970"><br data-dcnode-id="3969"><a data-dcnode-id="3967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/wiel_arets_bas_princen"><span data-dcnode-id="3968" instrument_node="">Read more about the publication</span></a></p><span data-dcnode-id="3965" instrument_node="">
</span></div><span data-dcnode-id="3963" instrument_node="">
</span></div><span data-dcnode-id="3961" instrument_node="">
</span><div class="news item cf" data-dcnode-id="3928"><span data-dcnode-id="3960" instrument_node="">
</span><img alt="" data-dcnode-id="3959" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004127image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="3958" instrument_node="">
</span><div class="text" data-dcnode-id="3930"><span data-dcnode-id="3957" instrument_node="">
</span><div class="date" data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">March 23, 2015</span></div><span data-dcnode-id="3954" instrument_node="">
</span><h2 data-dcnode-id="3952"><span data-dcnode-id="3953" instrument_node="">
					Wiel Arets to lecture on 'Toward a Hybrid Metropolis' in Chicago
				</span></h2><span data-dcnode-id="3951" instrument_node="">
</span><p data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">On March 30th, 2015, under the banner of the 'Presidential Lecture Series', Wiel Arets will give a lecture entitled 'Toward a Hybrid Metropolis', at the IIT's Herman Hall. The lecture will wander around the idea that today's cities are currently undergoing a subtle yet powerful shift in the ways in which they function, the results of which will become readily apparent, decades from today. As the lecture will put forth, and elucidate upon; metropolises of the twenty first century will be hybrid–connected, automated, and noiseless.</span></p><span data-dcnode-id="3948" instrument_node="">
</span><p data-dcnode-id="3941"><span data-dcnode-id="3947" instrument_node="">IIT Presidential Lecture Series</span><br data-dcnode-id="3946"><a data-dcnode-id="3944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.iit.edu/news/iittoday/%3Fp%3D40591"><span data-dcnode-id="3945" instrument_node="">'Toward a Hybrid Metropolis'</span></a><br data-dcnode-id="3943"><span data-dcnode-id="3942" instrument_node="">March 30th, 2015 15:30</span></p><span data-dcnode-id="3940" instrument_node="">
</span><p data-dcnode-id="3932"><span data-dcnode-id="3939" instrument_node="">Herman Hall</span><br data-dcnode-id="3938"><span data-dcnode-id="3937" instrument_node="">3241 South Federal Street</span><br data-dcnode-id="3936"><span data-dcnode-id="3935" instrument_node="">Chicago, Illinois 60616</span><br data-dcnode-id="3934"><span data-dcnode-id="3933" instrument_node="">United States of America</span></p><span data-dcnode-id="3931" instrument_node="">

</span><h2 data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">
					WAA win competition to design 'Am Hirschgarten' in Munich, Germany
				</span></h2><span data-dcnode-id="3917" instrument_node="">
</span><p data-dcnode-id="3911"><span data-dcnode-id="3916" instrument_node="">Located on the western edge of Munich, near the Friedenheimer bridge, and adjacent to the light-rail lines that string throughout the city’s center, ‘Am Hirschgarten’ is a campus-like cluster of four buildings, each of which entails a tower, which rises from the base of every building’s plinth. The project’s urban planning requirements mandated economical, sustainable, and flexible buildings, whose programming could also accommodate a future conversion–for instance–into residential spaces. ‘Am Hirschgarten’ therefore constitutes four horseshoe-shaped buildings, each with a plinth of six to seven stories. A tower rises from each plinth–the pinnacle of which is 17-stories...</span><br data-dcnode-id="3915"><br data-dcnode-id="3914"><a data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/am_hirschgarten/"><span data-dcnode-id="3913" instrument_node="">Read more about 'Am Hirschgarten'</span></a></p><span data-dcnode-id="3910" instrument_node="">

</span><h2 data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">
					WAA progress construction on the IJhal in Amsterdam
				</span></h2><span data-dcnode-id="3896" instrument_node="">
</span><p data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">
</span></p><p data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">The IJhal is situated within Amsterdam's Centraal Station, parallel to the IJ–the city's connection to the North Sea–and below the station's new bus terminal, all of which is capped by a new roof that proudly proclaims the city's name. The IJhal is one component of a larger initiative to transform Amsterdam's currently entangled transportation systems. When the station opened in 1889, the city lost both its view onto the IJ and its connection to Amsterdam North. With the opening of city's new North-South subway line in 2017, which tunnels the IJ, Amsterdam's two halves will be connected for the first…</span></p><p class="readmore" data-dcnode-id="3888"><a data-dcnode-id="3890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_progress_construction_on_the_ijhal_in_amsterdam_4097"><span data-dcnode-id="3891" instrument_node="">Continue reading</span></a><span data-dcnode-id="3889" instrument_node="">

</span><h2 data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">
					Wiel Arets to lecture at Carnegie Mellon University in Pittsburgh
				</span></h2><span data-dcnode-id="3873" instrument_node="">
</span><p data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">On February 23rd, as part of the 2015 'Spring Lecture Series' at Carnegie Mellon University's School of Architecture, Wiel Arets will give a lecture on the evolving state of architectural education, the start of construction on new works by WAA, and the currently emerging 'hybrid metropolises' of the twenty-first century–which are connected, automated, and noiseless.</span></p><span data-dcnode-id="3870" instrument_node="">
</span><p data-dcnode-id="3865"><a data-dcnode-id="3868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cmu.edu/architecture/index.html"><span data-dcnode-id="3869" instrument_node="">Carnegie Mellon University</span></a><br data-dcnode-id="3867"><span data-dcnode-id="3866" instrument_node="">February 23rd, 2015 18:30</span></p><span data-dcnode-id="3864" instrument_node="">
</span><p data-dcnode-id="3856"><span data-dcnode-id="3863" instrument_node="">Kresge Theatre</span><br data-dcnode-id="3862"><span data-dcnode-id="3861" instrument_node="">5000 Forbes Avenue</span><br data-dcnode-id="3860"><span data-dcnode-id="3859" instrument_node="">Pittsburgh, PA 15213 </span><br data-dcnode-id="3858"><span data-dcnode-id="3857" instrument_node="">United States of America</span></p><span data-dcnode-id="3855" instrument_node="">

</span><h2 data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">
					The V' House is published in the magazine 'Häuser'
				</span></h2><span data-dcnode-id="3841" instrument_node="">
</span><p data-dcnode-id="3832"><span data-dcnode-id="3840" instrument_node="">The February/March 2015 issue of the German shelter publication </span><i data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">Häuser</span></i><span data-dcnode-id="3837" instrument_node=""> includes an 8 page article featuring the V' House, located in Maastricht, the Netherlands. The house's glass-fronted façade, which is screen-printed with an image of fluttering curtains, retracts halfway for entry by foot and fully for entry by automobile. And the house's ground floor serves as an outdoor area in which the owners are able to store their collection of Aston Martins.</span><br data-dcnode-id="3836"><br data-dcnode-id="3835"><a data-dcnode-id="3833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/v_house/"><span data-dcnode-id="3834" instrument_node="">Read more about the V' House</span></a></p><span data-dcnode-id="3831" instrument_node="">
</span><p data-dcnode-id="3826"><a data-dcnode-id="3827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//aboshop.schoener-wohnen.de/hauser/einzelausgaben/%3Fonwewe%3D0626"><span data-dcnode-id="3830" instrument_node="">Order the February/March 2015 </span><i data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">Häuser</span></i></a></p><span data-dcnode-id="3825" instrument_node="">

</span><img alt="" data-dcnode-id="3819" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004055image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="3818" instrument_node="">
</span><div class="text" data-dcnode-id="3800"><span data-dcnode-id="3817" instrument_node="">
</span><div class="date" data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">December 23, 2014</span></div><span data-dcnode-id="3814" instrument_node="">
</span><h2 data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">
					WAA complete the A' House in Tokyo, Japan
				</span></h2><span data-dcnode-id="3811" instrument_node="">
</span><p data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">This compact live/work, gallery-like space is nestled within the dense expanse of Tokyo, in Nishi-Azabu—a neighborhood characterized by narrow streets and traditional low-rise houses—which borders a park heavily visited during the spring, when the city’s cherry trees begin to bloom. Its 136-square-meter area consists of five horizontally divided spaces, each connected by a minuscule sculptural spiraling staircase that, given the footprint of the building, allows for loft-like spaces within its intimate confines. Oversized windows punctuate the façade, each with two layers of glazing; one is transparent and one is of the same relief glass that wraps the façade. These oversized windows, with their dual layers of glazing, can be countlessly reconfigured, to regulate the interior flow of daylight.</span></p><span data-dcnode-id="3808" instrument_node="">
</span><p data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">Both the transparent and relief glass of the windows slides on tracks, which extend to double the width of each, for unobstructed views. They also extend to the floor, to ensure that the building remains responsive to passing street life. When closed, they cloak it within an iridescent texture. On the ground floor, one of these windows serves as the main entry, and slides open to reveal the kitchen.</span></p><span data-dcnode-id="3805" instrument_node="">
</span><p data-dcnode-id="3802"><a data-dcnode-id="3803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/a_house/"><span data-dcnode-id="3804" instrument_node="">Read more about the A' House</span></a></p><span data-dcnode-id="3801" instrument_node="">

</span><div class="date" data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">December 15, 2014</span></div><span data-dcnode-id="3790" instrument_node="">
</span><h2 data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">
					WAA awarded the 2015 Good Design Award for the Alessi 'Eat.it' cutlery
				</span></h2><span data-dcnode-id="3787" instrument_node="">
</span><p data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">Crafted over a period of six years and launched in early 2014, the Eat.it cutlery set, designed by WAA and produced by Alessi–the Italian manufacturer of kitchen products and accessories–was recently awarded the 2015 Good Design Award. The cutlery set originated from a symmetrical design, in which the shape of the handle and the upper portions are both equivalent and opposite. Constructed entirely from 18/10 stainless steel, it includes a risotto serving spoon, a cake server, and a spaghetti fork, alongside the multiple sized forks, knives, and spoons. Absent of any ornamentation, the cutlery is meant for both everyday use and the formality required of small gatherings.</span></p><span data-dcnode-id="3784" instrument_node="">
</span><p data-dcnode-id="3781"><a data-dcnode-id="3782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/products/eat_it/"><span data-dcnode-id="3783" instrument_node="">Read more about Eat.it</span></a></p><span data-dcnode-id="3780" instrument_node="">
</span><p data-dcnode-id="3777"><a data-dcnode-id="3778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//store.alessi.com/nld/en-gb/catalog/detail/eatit-cutleryflatware-set/wa10"><span data-dcnode-id="3779" instrument_node="">Purchase Eat.it from Alessi</span></a></p><span data-dcnode-id="3776" instrument_node="">
</span><p data-dcnode-id="3773"><a data-dcnode-id="3774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chi-athenaeum.org/tabletop-2014/2014/12/16/alessi-eat.it-cutlery-2014/"><span data-dcnode-id="3775" instrument_node="">Read about the Good Design Award</span></a></p><span data-dcnode-id="3772" instrument_node="">

</span><h2 data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">
					Three new WAA projects published in 'PLOT'
				</span></h2><span data-dcnode-id="3758" instrument_node="">
</span><p data-dcnode-id="3750"><i data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">PLOT</span></i><span data-dcnode-id="3755" instrument_node=""> is an avant-garde Argentinian magazine that covers the world of contemporary architecture. Its December 2014/January 2015 issue includes a 62 page article on WAA's educational and architectural endeavors: Irene Chin interviews Wiel Arets at the College of Architecture at the Illinois Institute of Technology, about the school's epistemological origins and future directions, while the Allianz Headquarters in Zürich–which graces the cover–the AvB Tower in The Hague, and Regiocentrale Zuid in Maasbracht are all investigated in detail.</span><br data-dcnode-id="3754"><br data-dcnode-id="3753"><a data-dcnode-id="3751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.revistaplot.com/es/tienda/plot-22-2/"><span data-dcnode-id="3752" instrument_node="">Order PLOT #22</span></a></p><span data-dcnode-id="3749" instrument_node="">
</span></div><span data-dcnode-id="3747" instrument_node="">
</span></div><span data-dcnode-id="3745" instrument_node="">
</span><div class="news item cf" data-dcnode-id="3721"><span data-dcnode-id="3744" instrument_node="">
</span><img alt="" data-dcnode-id="3743" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003868image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="3742" instrument_node="">
</span><div class="text" data-dcnode-id="3723"><span data-dcnode-id="3741" instrument_node="">
</span><div class="date" data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">November 10, 2014</span></div><span data-dcnode-id="3738" instrument_node="">
</span><h2 data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">
					WAA a finalist for the 2015 Mies van der Rohe Award for the V' House
				</span></h2><span data-dcnode-id="3735" instrument_node="">
</span><p data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">The V' House, located in Maastricht, has been nominated for the 2015 Mies van der Rohe Award. Designed for a couple that collects vintage cars, the house totals 530 square-meters and is located in Maastricht. It is entered through two oversized sliding glass doors that perforate its front façade, which is composed of structural glazing. These doors serve as the house’s main entry, and open in different combinations depending on access type–by foot or automobile. Due to safety and privacy concerns, these glass entry doors have no handles or keyholes and are instead remotely opened from any iPhone, from anywhere in the world. The living room has been suspended from two I-beams that span two masonry bearing walls that surround the rear of the site, which allows its volume to float above the Aston Martins below. This living room flows into the adjacent kitchen, which creates one contiguous space that spans the entire length of the house's site. The custom furnishings, together with its in-situ concrete and multiple roof terraces, make the V’ House an expression of free space in a regulated heritage context.</span></p><span data-dcnode-id="3732" instrument_node="">
</span><p data-dcnode-id="3725"><a data-dcnode-id="3730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/v_house/"><span data-dcnode-id="3731" instrument_node="">Read more about the V' House</span></a><br data-dcnode-id="3729"><br data-dcnode-id="3728"><a data-dcnode-id="3726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//miesbcn.com/prize"><span data-dcnode-id="3727" instrument_node="">Read about EU Mies van der Rohe Award</span></a></p><span data-dcnode-id="3724" instrument_node="">
</span></div><span data-dcnode-id="3722" instrument_node="">
</span></div><span data-dcnode-id="3720" instrument_node="">

</span><div class="text" data-dcnode-id="3702"><span data-dcnode-id="3716" instrument_node="">
</span><div class="date" data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">November  3, 2014</span></div><span data-dcnode-id="3713" instrument_node="">
</span><h2 data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">
					WAA progress construction on the Double in Amsterdam
				</span></h2><span data-dcnode-id="3710" instrument_node="">
</span><p data-dcnode-id="3704"><span data-dcnode-id="3709" instrument_node="">On the eastern edge of Amsterdam's city center lies the Valkenburgerstraat; a major thoroughfare that was created in the 1960s, the eastern half of which saw the buildings that align it completely demolished and rebuilt during the 1990s. The street's western edge has retained its historic buildings, all of which are from different decades of the last century–the Double is the newest addition to it. The building is composed of two volumes, which together contain 45 units separated by an exterior communal courtyard garden on the roof of the ground floor. Most units have direct access to this communal area, and the units that abut it carve their terraces from it...</span><br data-dcnode-id="3708"><br data-dcnode-id="3707"><a data-dcnode-id="3705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/the_double/"><span data-dcnode-id="3706" instrument_node="">Read more about the Double</span></a></p><span data-dcnode-id="3703" instrument_node="">

</span><h2 data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">
					The College of Architecture at IIT to host 'MCHAP Award Symposium'
				</span></h2><span data-dcnode-id="3689" instrument_node="">
</span><p data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">On October 22nd, 2014 the College of Architecture at the Illinois Institute of Technology will host an award celebration for the 'MCHAP Finalist'. Throughout the day students, faculty, and the public are invited to participate in a dialogue between the jury and the nominated architects. Later the award's benefit dinner will occur–with Rahm Emanuel, Mayer of Chicago, and Mary Elizabeth Spies Droste as its honorary guests–culminating with the winner's announcement.</span></p><span data-dcnode-id="3686" instrument_node="">
</span><p data-dcnode-id="3682"><span data-dcnode-id="3685" instrument_node="">S. R. Crown Hall</span><br data-dcnode-id="3684"><span data-dcnode-id="3683" instrument_node="">October 22nd, 2014&nbsp;</span></p><span data-dcnode-id="3681" instrument_node="">

				</span></h2><span data-dcnode-id="3656" instrument_node="">
</span><p data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">Situated in Maasbracht–near the Dutch-Belgian border–this sinuous 1.850-square-meter office is a headquarters for the water traffic control of surrounding sluices, canals, and locks–all of which are adjacent to the river Meuse. This plethora of entangled waterways is heavily utilized for shipping throughout this area, at the confluence of France, Luxembourg, Belgium, Germany, and the Netherlands. Numerous previously disparate waterway control centers were combined to create this new office...</span></p><span data-dcnode-id="3653" instrument_node="">
</span><p data-dcnode-id="3650"><a data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/regiocentrale_zuid/"><span data-dcnode-id="3652" instrument_node="">Read more about Regiocentrale Zuid</span></a></p><span data-dcnode-id="3649" instrument_node="">

				</span></h2><span data-dcnode-id="3635" instrument_node="">
</span><p data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">
</span></p><p data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">As an extension of Felix &amp; FOAM, a temporary cultural center in Amsterdam, and in collaboration with Frame magazine–whose pop-up shop currently occupies the institution–WAA has been invited to participate in the upcoming exhibition 'XS Architecture'. Intended as a platform for products–of a smaller scale–created by architects, artists, and designers; each piece in the exhibition originates from those whose main profession lies in another trade. Alongside communicating these objects to a wider audience, the products on display will draw attention to current innovative production methods in product design. WAA will exhibit products created for and produced by Alessi, including the…</span></p><p class="readmore" data-dcnode-id="3627"><a data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_included_in_the_amsterdam_exhibition_xs_architecture_3828"><span data-dcnode-id="3630" instrument_node="">Continue reading</span></a><span data-dcnode-id="3628" instrument_node="">

</span><h2 data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">
					Allianz Headquarters awarded the 2014 'Chicago Athenaeum International Architecture Award'
				</span></h2><span data-dcnode-id="3612" instrument_node="">
</span><p data-dcnode-id="3607"><span data-dcnode-id="3611" instrument_node="">The Allianz Headquarters, a hybrid office tower in Zürich, Switzerland, was recently awarded the the 2014 'Chicago Athenaeum International Architecture Award'. Bestowed annually, the award 'pays tribute to new developments in design and underscores the directions and understanding of current cutting-edge processes.' The tower–which totals 72.000 square-meters–is the new home of German insurance company Allianz. Composed of a closed cavity system, the tower's façade is fritted with an abstracted image of marble from Mies van der Rohe's Barcelona Pavilion, which lends to it the illusion of stone materiality. The lobby and courtyard are publicly accessible, while the private upper-story interiors combine programmatic spaces more often left disparate within offices, which ensures the tower's continuous animation. Roof terraces, espresso corners, and areas for informal conversation are dispersed throughout the 5- and 20-story towers, which are intertwined by a series of 8 m wide bridges and numerous interior voids.</span><br data-dcnode-id="3610"><br data-dcnode-id="3609"><span data-dcnode-id="3608" instrument_node="">In November the awarded projects will be exhibited at 'The City and the World' symposium in Turkey, as part of the 'Second Istanbul Design Biennial'.</span></p><span data-dcnode-id="3606" instrument_node="">
</span><p data-dcnode-id="3603"><a data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/allianz_headquarters/"><span data-dcnode-id="3605" instrument_node="">Read more about Allianz Headquarters</span></a></p><span data-dcnode-id="3602" instrument_node="">

</span><h2 data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">
					The Hedge House's garden nominated for the '2014 European Garden Award'
				</span></h2><span data-dcnode-id="3588" instrument_node="">
</span><p data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">The Hedge House, an art gallery on the grounds of a seventeenth century castle in Wijlre, the Netherlands, was in 2012 transformed into a non-profit foundation affiliated with the Bonnefanten Museum, in Maastricht. Completed the 2001, it combines a tool shed, chicken coop, and two orchid houses, all of which interlock with a subterranean gallery. Named for its immersion within the castle's hedges; the Hedge House's garden is a nominee for the '2014 European Garden Award', along with two other gardens, in England and Italy. The winner will be announced on September 5th, by the 'European Gardens Heritage Network'.</span></p><span data-dcnode-id="3585" instrument_node="">
</span><p data-dcnode-id="3578"><a data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cmsen.eghn.org/wijlre-garten.html"><span data-dcnode-id="3584" instrument_node="">Read more about the garden</span></a><br data-dcnode-id="3582"><br data-dcnode-id="3581"><a data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/hedge_house/"><span data-dcnode-id="3580" instrument_node="">Read more about the Hedge House</span></a></p><span data-dcnode-id="3577" instrument_node="">

				</span></h2><span data-dcnode-id="3563" instrument_node="">
</span><p data-dcnode-id="3558"><span data-dcnode-id="3562" instrument_node="">The July 2014 issue of the Spanish publication </span><i data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">Arquitectura y Diseño</span></i><span data-dcnode-id="3559" instrument_node=""> includes a 16 page article featuring the the Jellyfish House, located in Marbella, Spain. The house's glass-bottomed pool, which cantilevers 9 m from the roof, also has a glass wall along its&nbsp;interior facing&nbsp;edge, which allows those swimming to see those in the kitchen, and vice versa.</span></p><span data-dcnode-id="3557" instrument_node="">

</span><h2 data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">
					WAA progress construction on the IJhal in Amsterdam
				</span></h2><span data-dcnode-id="3539" instrument_node="">
</span><p data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">
</span></p><p data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">Housed within Amsterdam's Centraal Station–the city's nucleus for its numerous modes of public transportation, including trains, buses, subways, trams, and boats–the IJhal is situated at the rear of the station, below its new exoskeleton-capped bus terminal, and along the city's waterfront, the IJ, for which the project is named. Set for completion in 2016, the IJhal is one component of a larger initiative to transform the city's entangled transportation systems. Until the end of the nineteenth century the IJ was a bay still connected to the Atlantic Ocean, and the main entry point for those arriving to the city by…</span></p><p class="readmore" data-dcnode-id="3531"><a data-dcnode-id="3533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_progress_construction_on_the_ijhal_in_amsterdam"><span data-dcnode-id="3534" instrument_node="">Continue reading</span></a><span data-dcnode-id="3532" instrument_node="">

</span><h2 data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">
					WAA complete the programmed tarmac of Campus Hoogvliet
				</span></h2><span data-dcnode-id="3516" instrument_node="">
</span><p data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">
</span></p><p data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">Campus Hoogvliet is located on the edge of Rotterdam; it is the new home of multiple educational&nbsp;institutions that support their students' aspirations. Completed earlier this year, the campus is now fully in use by students, faculty, and administrators. Submersed within an abundance of leafy residential streets–most of which are aligned with housing constructed in the 1950s–the campus has reactivated this former village by infusing it with a vibrant symbiosis of modernity and youth. The campus' six buildings echo the structural language of the existing residential buildings they abut, while innovating their material composition. The programmed tarmac is the 'carpet' on…</span></p><p class="readmore" data-dcnode-id="3508"><a data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_complete_the_programmed_tarmac_of_campus_hoogvliet"><span data-dcnode-id="3511" instrument_node="">Continue reading</span></a><span data-dcnode-id="3509" instrument_node="">

</span><div class="date" data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">June 17, 2014</span></div><span data-dcnode-id="3496" instrument_node="">
</span><h2 data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">
					The Financial Times publishes the Jellyfish House, located in Spain
				</span></h2><span data-dcnode-id="3493" instrument_node="">
</span><p data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">This past Saturday the Financial Times of London published the Jellyfish House, a luxurious vacation home located on the&nbsp;Mediterranean coast of Spain,&nbsp;in the printed and digital editions of the paper. The house–with its five bedrooms, seven bathrooms, steam room, sauna, and cantilevered rooftop infinity pool–is located a mere 150 m from the beach. Striking when seen from the street, the house's 9 m cantilevered pool has a glass bottom floor–and a glass wall along its interior facing edge–both of which allow for voyeuristic views into the pool and the former of which allows turquoise Spanish sunlight to&nbsp;dance and&nbsp;glitter onto the terrace below.</span></p><span data-dcnode-id="3490" instrument_node="">
</span><p data-dcnode-id="3483"><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ft.com/intl/cms/s/2/a3d011a4-ec04-11e3-ab1b-00144feabdc0.html%23axzz34sZ8Uw1z"><span data-dcnode-id="3489" instrument_node="">Read the Financial Times article</span></a><br data-dcnode-id="3487"><br data-dcnode-id="3486"><a data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/jellyfish_house/"><span data-dcnode-id="3485" instrument_node="">Read more about the Jellyfish House</span></a></p><span data-dcnode-id="3482" instrument_node="">
</span></div><span data-dcnode-id="3480" instrument_node="">

</span><img alt="" data-dcnode-id="3476" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003595image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="3475" instrument_node="">
</span><div class="text" data-dcnode-id="3457"><span data-dcnode-id="3474" instrument_node="">
</span><div class="date" data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">June 13, 2014</span></div><span data-dcnode-id="3471" instrument_node="">
</span><h2 data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">
					V' House nominated for the 2014 Maastricht 'Victor de Stuers Award'
				</span></h2><span data-dcnode-id="3468" instrument_node="">
</span><p data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Located in a rapidly gentrifying neighborhood of Maastricht–in the south the Netherlands–V' House is the private residence of a couple that collects vintage cars. Its foreside is composed of structural glazing, onto which a rastorized image of curtains fluttering in the wind has been fritted, for privacy, in tandem with interior curtains. Automobile entry to the house occurs via two doors within this structural glazing that simultaneously retract, while only one door retracts for entry to the house by foot. These doors are the only entry to the house; they are remotely opened via the owners' programmed smartphones. The ground floor is open the exterior elements, which introduces a void to the site; the first floor living room hangs over half of this outdoor space, which roofs the collection of vintage cars below. This living room is contiguous to the house's kitchen to create one fluid space on the first floor, while above is the master bedroom, which opens onto the roof of the living room below to create a sprawling roof terrace. Capping the house is a second, enormous roof terrace, which overlooks the stately spired skyline of Maastricht.</span></p><span data-dcnode-id="3465" instrument_node="">
</span><p data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">Awarded annually, the prize winner will be announced on June 20th, 2014 at 16:00, within Maastricht's City Hall.</span></p><span data-dcnode-id="3462" instrument_node="">
</span><p data-dcnode-id="3459"><a data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/v_house/"><span data-dcnode-id="3461" instrument_node="">Read more about the V' House</span></a></p><span data-dcnode-id="3458" instrument_node="">

</span><div class="text" data-dcnode-id="3420"><span data-dcnode-id="3450" instrument_node="">
</span><div class="date" data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">June  9, 2014</span></div><span data-dcnode-id="3447" instrument_node="">
</span><h2 data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">
					H’ House and its garden to be open to the public
				</span></h2><span data-dcnode-id="3444" instrument_node="">
</span><p data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">From June 14-15th, 2014 the H’ House and its formal garden–in Maastricht, the Netherlands–will be open to the public, as both morph into a temporary gallery for local artists. Designed for a couple—a dancer and an actor, who are also landscape architects—the H' House is located within a formal garden that the owners have cultivated since the house’s completion in 2010. Artworks of ceramic, glass, and bronze will be on display.</span></p><span data-dcnode-id="3441" instrument_node="">

</span><h2 data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">
					WAA design a birthday cake for the 50th MARK
				</span></h2><span data-dcnode-id="3407" instrument_node="">
</span><p data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">
</span></p><p data-dcnode-id="3400"><span data-dcnode-id="3404" instrument_node="">To celebrate the the 50th issue of </span><em data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">MARK</span></em><span data-dcnode-id="3401" instrument_node="">–an avant-garde magazine that covers the world of contemporary architecture–WAA designed a birthday cake for the publication, which is featured in its June/July 2014 issue. The cake is composed 50 cubes of various dimensions, and topped with a multi-faceted 'candle' that–when viewed from any nearly any angle–displays the number '50'. Published alongside the cake are its plan, section, and elevation, as well as the WAA designed espresso cups and cutlery, both of which are produced by Alessi, and the latter of which launched in spring 2014.&nbsp;The issue will be on newsstands from June…</span></p><p class="readmore" data-dcnode-id="3396"><a data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_design_a_birthday_cake_for_the_50th_mark"><span data-dcnode-id="3399" instrument_node="">Continue reading</span></a><span data-dcnode-id="3397" instrument_node="">

</span></p><p data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">On May 20th, 2014 the College of Architecture at the Illinois Institute of Technology will host a benefit dinner for the 'MCHAP for Emerging Architecture'–one component of the new MCHAP award recently established by the college. The benefit will begin with remarks from the Mayor of Chicago–Rahm Emanuel–followed by the presentation of the award finalists, the dinner, and concluding with the announcement of the inaugural winner. Recognizing an 'outstanding built work in the Americas', as created by 'a member of the profession's younger generations', the 'MCHAP for Emerging Architecture' will again be conferred in 2016. The winner of the 'MCHAP'–the…</span></p><p class="readmore" data-dcnode-id="3373"><a data-dcnode-id="3375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/the_college_of_architecture_at_iit_to_host_the_mchap_award_benefit_dinner"><span data-dcnode-id="3376" instrument_node="">Continue reading</span></a><span data-dcnode-id="3374" instrument_node="">

</span><h2 data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">
					WAA celebrate the official opening of Campus Hoogvliet
				</span></h2><span data-dcnode-id="3358" instrument_node="">
</span><p data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">Campus Hoogvliet is an academic campus located in Rotterdam that was&nbsp;on April 8th, 2014&nbsp;officially opened by Her Majesty Queen Máxima of the Netherlands. Accompanying the opening ceremony of the campus–which has now been in use for just over a month–was a short documentary created specifically for the occasion; it showcases the project's six buildings, the student and public life that occurs within them, and the ways in which the surrounding neighborhood has begun to transform in response to the project's completion. The documentary–in Dutch–is now available to the public.</span></p><span data-dcnode-id="3355" instrument_node="">
</span><p data-dcnode-id="3352"><a data-dcnode-id="3353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/videos/campus_hoogvliet"><span data-dcnode-id="3354" instrument_node="">Watch the full documentary</span></a></p><span data-dcnode-id="3351" instrument_node="">

</span><p data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">
</span></p><p data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">WAA has been invited to participate in the upcoming exhibition 'XS Architecture', a platform for products–of a smaller scale–created by architects, artists, and designers. The exhibition will include a wide-range of products, including chairs, kitchen accessories, prototypes, and textiles, among others. Each piece will support the exhibition's concern for highlighting products originating from those whose main profession lies in another trade. Alongside communicating these objects to a wider audience–extending their reach beyond the architecture profession–the products on display will investigate currently occurring cross-discipline collaborations within design and production methods. WAA will exhibit products created for and produced by Alessi, including…</span></p><p class="readmore" data-dcnode-id="3329"><a data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_included_in_the_amsterdam_exhibition_xs_architecture_3578"><span data-dcnode-id="3332" instrument_node="">Continue reading</span></a><span data-dcnode-id="3330" instrument_node="">

</span><h2 data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">
					WAA nominated for 'German Design Award'
				</span></h2><span data-dcnode-id="3314" instrument_node="">
</span><p data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">WAA was recently nominated for the 'German Design Award', for two new&nbsp;projects: Schwäbisch Media–an office for a publishing company active in print and digital media–located in Ravensburg, Germany, and the Allianz Headquarters–a 72 m office composed of two buildings intertwined by a series of four bridges and countless interior voids–located in Zürich, Switzerland. Annually recognizing 'pioneering contributions to the German and international design landscape', the award is organized by the 'German Design Council', and the award winners will be announced after the jury convenes this August.</span></p><span data-dcnode-id="3311" instrument_node="">
</span><p data-dcnode-id="3308"><a data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/schwaebisch_media/"><span data-dcnode-id="3310" instrument_node="">Read more about Schwäbisch Media</span></a></p><span data-dcnode-id="3307" instrument_node="">

</span><h2 data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">
					Her Majesty Queen Máxima of the Netherlands Opens Campus Hoogvliet
				</span></h2><span data-dcnode-id="3289" instrument_node="">
</span><p data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">Today in Rotterdam Her Majesty Queen Máxima of the Netherlands officially opened Campus Hoogvliet, during a ceremony that took place on the campus' main square. After the officiation, the campus opened its doors to the public, allowing neighborhood residents a chance to tour the interior of the non-public buildings, such as the schools and housing, as well as the campus' public buildings, such as its sports facilities, shops, and small cafés.</span></p><span data-dcnode-id="3286" instrument_node="">
</span><p data-dcnode-id="3282"><span data-dcnode-id="3285" instrument_node="">Campus Hoogvliet</span><br data-dcnode-id="3284"><span data-dcnode-id="3283" instrument_node="">April 8th, 2014 10:00-13:30</span></p><span data-dcnode-id="3281" instrument_node="">

</span><h2 data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">
					The College of Architecture at IIT awarded 'D&amp;AD Award 2014' for NOWNESS
				</span></h2><span data-dcnode-id="3256" instrument_node="">
</span><p data-dcnode-id="3251"><span data-dcnode-id="3255" instrument_node="">In March 2013 the Illinois Institute of Technology College of Architecture (IIT CoA) published </span><i data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">NOWNESS</span></i><span data-dcnode-id="3252" instrument_node=""> to coincide with the investiture of Wiel Arets as its Dean. The publication–which formalizes the focus of the school's 2013-2014 academic year–was recently honored with an 'In Book' award&nbsp;for its design by Dutch graphic designer Edwin van Gelder, from the 'Design &amp; Art Direction Awards'. The organization was founded in Britain in 1962, and is recognized globally for its 'promotion of excellence in design and advertising'. The publication, which is no longer available in print, is available for download from IIT's website.</span></p><span data-dcnode-id="3250" instrument_node="">
</span><p data-dcnode-id="3241"><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.iit.edu/arch/nowness.pdf"><span data-dcnode-id="3249" instrument_node="">Download </span><i data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">NOWNESS</span></i></a><br data-dcnode-id="3245"><br data-dcnode-id="3244"><a data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dandad.org/awards/professional/2014/graphic-design/23686/nowness/"><span data-dcnode-id="3243" instrument_node="">View the publication at D&amp;AD</span></a></p><span data-dcnode-id="3240" instrument_node="">
</span></div><span data-dcnode-id="3238" instrument_node="">
</span></div><span data-dcnode-id="3236" instrument_node="">

</span><img alt="" data-dcnode-id="3234" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003427image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="3233" instrument_node="">
</span><div class="text" data-dcnode-id="3215"><span data-dcnode-id="3232" instrument_node="">
</span><div class="date" data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">March 25, 2014</span></div><span data-dcnode-id="3229" instrument_node="">
</span><h2 data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">
					WAA complete the Allianz Headquarters in Zürich, Switzerland
				</span></h2><span data-dcnode-id="3226" instrument_node="">
</span><p data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">The Allianz Headquarters is a hybrid-office and the pinnacle of a master planned mixed-use district on the edge of Zürich’s city center. Comprised of a 20-story tower and a 5-story annex, these two components are externally linked by a series of four bridges, and vertically linked by numerous interior voids and staircases; as such, the Allianz Headquarters can be experienced as horizontal and vertical landscape of neighborhoods. Fluidly connected to the city center by a multitude of public transportation options, the building encourages the blossoming of twenty-first century office culture, which demands flexibility in space and its use, via its hyper-hybrid programming that amplifies ‘interiority’.</span></p><span data-dcnode-id="3223" instrument_node="">
</span><p data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">The entire lobby and ground floor are publicly accessible, ensuring a continuous animation throughout both, which compliments the adjacent public square. A central staircase rises from the lobby up and into the 20-story tower, allowing employees to, if desired, meander throughout all levels of the office without entering its core...</span></p><span data-dcnode-id="3220" instrument_node="">
</span><p data-dcnode-id="3217"><a data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/allianz_headquarters/"><span data-dcnode-id="3219" instrument_node="">Continue reading</span></a></p><span data-dcnode-id="3216" instrument_node="">

</span><img alt="" data-dcnode-id="3210" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003373image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="3209" instrument_node="">

</span><div class="date" data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">March  5, 2014</span></div><span data-dcnode-id="3205" instrument_node="">
</span><h2 data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">
					WAA and Alessi launch the 'Eat.it' cutlery set
				</span></h2><span data-dcnode-id="3202" instrument_node="">
</span><p data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">
</span></p><p data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">Alessi, the esteemed Italian manufacturer of kitchen products and accessories, recently launched the 'Eat.it' cutlery designed by Wiel Arets. Crafted over a period of six years, in order to ensure proper ergonomics at such a refined scale, the set originated from a symmetrical design in which the shape of the handle and the upper portions are both equivalent and opposite. Each piece is constructed from 18/10 stainless steel, and in additional to spoons, forks, and knives in various sizes, the set also includes a risotto serving spoon, a cake server, and a spaghetti fork. Eat.it embodies a practical approach to…</span></p><p class="readmore" data-dcnode-id="3194"><a data-dcnode-id="3196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_and_alessi_launch_the_eat_it_cutlery_set"><span data-dcnode-id="3197" instrument_node="">Continue reading</span></a><span data-dcnode-id="3195" instrument_node="">
</span></p><span data-dcnode-id="3193" instrument_node="">

</span></div><span data-dcnode-id="3189" instrument_node="">

</span><img alt="" data-dcnode-id="3187" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003365image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="3186" instrument_node="">

</span><div class="date" data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">February 21, 2014</span></div><span data-dcnode-id="3182" instrument_node="">
</span><h2 data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">
					WAA begin construction on the IJhal within Amsterdam Centraal
				</span></h2><span data-dcnode-id="3179" instrument_node="">
</span><p data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">
</span></p><p data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">Construction commenced today on the IJhal–the main pedestrian passageway within Amsterdam's Centraal Station–which parallels the river IJ and is the&nbsp;convergence point for the city's multitude of transportation types.&nbsp;The station and its immediate surroundings are metamorphosizing to become the centerpiece of a larger master plan to create a more welcoming 'gateway' to the city for passengers arriving via train, tram, metro, or bus, by simplifying the connections between each. A series of secondary passageways perpendicular to the IJhal will impart direct visual connections to the waterfront throughout the station. This will reestablish Amsterdam's connection to both the IJ and Amsterdam North–a…</span></p><p class="readmore" data-dcnode-id="3171"><a data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_begin_construction_on_the_ijhal_within_amsterdam_centraal"><span data-dcnode-id="3174" instrument_node="">Continue reading</span></a><span data-dcnode-id="3172" instrument_node="">

</span><img alt="" data-dcnode-id="3164" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003361image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="3163" instrument_node="">
</span><div class="text" data-dcnode-id="3141"><span data-dcnode-id="3162" instrument_node="">
</span><div class="date" data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">February 19, 2014</span></div><span data-dcnode-id="3159" instrument_node="">
</span><h2 data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">
					The New York Times publishes a podcast featuring Wiel Arets
				</span></h2><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3155" instrument_node="">This past weekend the American Association for the Advancement of Science (AAAS) held their annual meeting in Chicago–the third largest city in the United States of America–to explore and discuss 'recent developments in science and technology'. Wiel Arets joined a panel discussion as part of the event entitled '</span><i data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">The Future of Cities: Dense or Dispersed</span></i><span data-dcnode-id="3152" instrument_node="">’, which debated the topic of density within the world's cities, in relation to the ever increasing urbanization of the world's currently estimated&nbsp;population of&nbsp;7.145 billion. The article and podcast also feature all speakers from that panel, and other noteworthy discussions that took place throughout the weekend.</span></p><span data-dcnode-id="3150" instrument_node="">
</span><p data-dcnode-id="3143"><a data-dcnode-id="3148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//graphics8.nytimes.com/packages/audio/science/podcast/AAAS-future-cities.mp3"><span data-dcnode-id="3149" instrument_node="">Download the podcast</span></a><br data-dcnode-id="3147"><br data-dcnode-id="3146"><a data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2014/02/18/science/the-podcast-hits-the-road.html%3F_r%3D0"><span data-dcnode-id="3145" instrument_node="">Read the New York Times article</span></a></p><span data-dcnode-id="3142" instrument_node="">

</span><h2 data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">
					Wiel Arets to join panel discussion at 2014 AAAS meeting in Chicago
				</span></h2><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3123"><span data-dcnode-id="3127" instrument_node="">On February 15th, 2014 from 8:30-11:30, as part of the 2014 American Association for the Advancement of Science’s annual meeting, Wiel Arets will participate in a panel discussion entitled 'T</span><i data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">he Future of Cities: Dense or Dispersed</span></i><span data-dcnode-id="3124" instrument_node="">’. The discussion will contemplate the ways in which the world's cities are currently coping with an ever increasing influx of new residents. Organized by Antony Wood of the ‘Council on Tall Buildings and Urban Habitat’, the panel includes Wiel Arets, William F. Baker, Francesca Birks, Saskia Sassen, and Virginia Parks.</span></p><span data-dcnode-id="3122" instrument_node="">
</span><p data-dcnode-id="3117"><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aaas.confex.com/aaas/2014/webprogram/Session6890.html"><span data-dcnode-id="3121" instrument_node="">AAAS Annual Meeting</span></a><br data-dcnode-id="3119"><span data-dcnode-id="3118" instrument_node="">February 13-17, 2014</span></p><span data-dcnode-id="3116" instrument_node="">
</span><p data-dcnode-id="3108"><span data-dcnode-id="3115" instrument_node="">Hyatt Regency</span><br data-dcnode-id="3114"><span data-dcnode-id="3113" instrument_node="">151 E Upper Wacker Dr</span><br data-dcnode-id="3112"><span data-dcnode-id="3111" instrument_node="">Chicago, Illinois, 60601</span><br data-dcnode-id="3110"><span data-dcnode-id="3109" instrument_node="">United States of America</span></p><span data-dcnode-id="3107" instrument_node="">

</span><h2 data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">
					The College of Architecture at IIT announces the 'MCHAP'
				</span></h2><span data-dcnode-id="3093" instrument_node="">
</span><p data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">
</span></p><p data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">The College of Architecture (CoA) at the Illinois Institute of Technology (IIT) announced this week the creation of the 'Mies Crown Hall Americas Prize' (MCHAP) and the 'MCHAP for Emerging Architecture'; both will recognize works of architectural eminence constructed throughout North and South America. Awarded biennially, the 'MCHAP' and the 'MCHAP for Emerging Architecture' are extensions of the larger curricular and research initiatives of the CoA at IIT, as established by its Dean, Wiel Arets. The award's inaugural jury includes Wiel Arets, Kenneth Frampton, Jorge Francisco Liernur, Dominique Perrault, and Sarah Whiting. Both components of the award will begin in…</span></p><p class="readmore" data-dcnode-id="3085"><a data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/the_college_of_architecture_at_iit_announces_the_mchap"><span data-dcnode-id="3088" instrument_node="">Continue reading</span></a><span data-dcnode-id="3086" instrument_node="">

</span><h2 data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">
					WAA complete Campus Hoogvliet in Rotterdam
				</span></h2><span data-dcnode-id="3070" instrument_node="">
</span><p data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">
</span></p><p data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">Campus Hoogvliet is a cluster of six buildings that together compose one academic and socially focused campus, located just outside of Rotterdam. These six new buildings–a sports center, an art studio, a safety academy, 100 residential units within one building, and two schools–have been plugged into a programmed tarmac that communicates the campus' boundary, and includes custom designed seating, a running track, and other place-making denotations. The campus’ immediate surroundings are characterized by mid-twentieth century housing developments–which were prolifically constructed during its booming period of post-WWII growth–and the campus aims to rectify the social and cultural deterioration that coupled the…</span></p><p class="readmore" data-dcnode-id="3062"><a data-dcnode-id="3064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_complete_campus_hoogvliet_in_rotterdam"><span data-dcnode-id="3065" instrument_node="">Continue reading</span></a><span data-dcnode-id="3063" instrument_node="">

</span><h2 data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">
					The New York Times publishes the Jellyfish House, located in Spain
				</span></h2><span data-dcnode-id="3047" instrument_node="">
</span><p data-dcnode-id="3034"><span data-dcnode-id="3046" instrument_node="">The&nbsp;New York Times today&nbsp;published the Jellyfish House, a vacation home located in Marbella, Spain, in the digital edition of the paper–as well as on page D3 of the New York print edition, with the headline: '</span><i data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">A Pool That’s Over the Top</span></i><span data-dcnode-id="3043" instrument_node="">'.&nbsp;The house's pool, which is cantilevered 9 m from the roof, features a glass-bottom floor and a panoramic window at its interior facing edge, both of which enable sunlight to spill throughout the house's interior.</span><br data-dcnode-id="3042"><br data-dcnode-id="3041"><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2014/01/16/garden/where-are-the-jellyfish-exactly.html%3F_r%3D0"><span data-dcnode-id="3040" instrument_node="">Read the New York Times article</span></a><br data-dcnode-id="3038"><br data-dcnode-id="3037"><a data-dcnode-id="3035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/jellyfish_house/"><span data-dcnode-id="3036" instrument_node="">Read more about the Jellyfish House</span></a></p><span data-dcnode-id="3033" instrument_node="">
</span></div><span data-dcnode-id="3031" instrument_node="">
</span></div><span data-dcnode-id="3029" instrument_node="">

</span><img alt="" data-dcnode-id="3027" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003264image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="3026" instrument_node="">

</span><div class="date" data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">January  6, 2014</span></div><span data-dcnode-id="3022" instrument_node="">
</span><h2 data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">
					WAA complete the Jellyfish House in Spain
				</span></h2><span data-dcnode-id="3019" instrument_node="">
</span><p data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">Located in Marbella, on the Mediterranean coast of Spain, the Jellyfish House’s neighboring buildings block its view onto the nearby sea. Appropriately, it was chosen to cantilever the house’s pool from its roof, so that the beach and sea can always be seen while sunbathing or swimming. The house is organized around two paths of circulation: a ‘fast’ and ‘slow’ set of stairs, which intertwine and traverse the house’s four levels of living. The ‘fast’ stair leads from the exterior directly to the roof; it is enclosed in glass, which physically separates it from the house’s interior, yet it is simultaneously open to the exterior elements, so that sand is not brought into the house when returning from the beach...</span></p><span data-dcnode-id="3016" instrument_node="">
</span><p data-dcnode-id="3013"><a data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/jellyfish_house/"><span data-dcnode-id="3015" instrument_node="">Continue reading</span></a></p><span data-dcnode-id="3012" instrument_node="">

</span><img alt="" data-dcnode-id="3006" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003226image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="3005" instrument_node="">
</span><div class="text" data-dcnode-id="2980"><span data-dcnode-id="3004" instrument_node="">
</span><div class="date" data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">December 16, 2013</span></div><span data-dcnode-id="3001" instrument_node="">
</span><h2 data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">
					Four new WAA projects published in 'MARK'
				</span></h2><span data-dcnode-id="2998" instrument_node="">
</span><p data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">
</span></p><p data-dcnode-id="2989"><em data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">MARK</span></em><span data-dcnode-id="2993" instrument_node="">&nbsp;is&nbsp;an avant-garde magazine that covers the world of contemporary architecture.&nbsp;Its December 2013/January 2014 issue includes a 16 page article on WAA entitled, '</span><em data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">Four new projects from Wiel Arets show the architect at the top of his cinema-inspired game</span></em><span data-dcnode-id="2990" instrument_node="">'. This feature article includes an extensive interview with Wiel Arets, wherein he discusses four recently completed WAA projects, which are located in Switzerland, Spain, Japan, and the Netherlands.</span></p><span data-dcnode-id="2988" instrument_node="">
</span><p data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">'If we were in LA and not Marbella, somebody would surely be shooting a movie here at the Jellyfish House. In fact, it’s almost as though someone already is. The scene couldn’t be more perfect,…</span></p><p class="readmore" data-dcnode-id="2982"><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/four_new_waa_projects_published_in_mark"><span data-dcnode-id="2985" instrument_node="">Continue reading</span></a><span data-dcnode-id="2983" instrument_node="">
</span></p><span data-dcnode-id="2981" instrument_node="">
</span></div><span data-dcnode-id="2979" instrument_node="">
</span></div><span data-dcnode-id="2977" instrument_node="">
</span><div class="news item cf" data-dcnode-id="2954"><span data-dcnode-id="2976" instrument_node="">
</span><img alt="" data-dcnode-id="2975" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003356image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="2974" instrument_node="">
</span><div class="text" data-dcnode-id="2956"><span data-dcnode-id="2973" instrument_node="">
</span><div class="date" data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">December  9, 2013</span></div><span data-dcnode-id="2970" instrument_node="">
</span><h2 data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">
					WAA complete the V' House in Maastricht
				</span></h2><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2958"><span data-dcnode-id="2966" instrument_node="">V’ House was constructed for a couple that collects vintage cars, and is stitched within the medieval tapestry of Maastricht. The city dictates all new structures remain within the envelope of pre-existing buildings, and so a cut was created in the house’s front façade to generate a triangulated surface, which leads from one neighbor’s sloped roof to the opposite neighbor’s vertical bearing wall. As the house’s site is long and narrow, voids were cut into the maximum permitted volume to ensure that natural light spills throughout the interior. The ground floor is both open to the exterior elements and sunken to the rear of the site, which makes possible the maximum two-story height allowance. A covered portion of this exterior space serves as an outdoor parking garage for the owners’ collection of Aston Martins.</span><br data-dcnode-id="2965"><br data-dcnode-id="2964"><span data-dcnode-id="2963" instrument_node="">As the house finds refuge between two historical buildings, it is a burst of modernity within this currently gentrifying neighborhood of Maastricht. The house is enormous, totaling 530 square-meters, and is entered through two oversized sliding glass doors that perforate its front façade. These doors serve as the house’s main entry and open to either their left or right for entry by foot, and both simultaneously retract to allow the entry of automobiles...</span><br data-dcnode-id="2962"><br data-dcnode-id="2961"><a data-dcnode-id="2959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/v_house/"><span data-dcnode-id="2960" instrument_node="">Continue reading</span></a></p><span data-dcnode-id="2957" instrument_node="">
</span></div><span data-dcnode-id="2955" instrument_node="">
</span></div><span data-dcnode-id="2953" instrument_node="">
</span><div class="news item cf" data-dcnode-id="2930"><span data-dcnode-id="2952" instrument_node="">
</span><img alt="" data-dcnode-id="2951" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003335image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="2950" instrument_node="">
</span><div class="text" data-dcnode-id="2932"><span data-dcnode-id="2949" instrument_node="">
</span><div class="date" data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">December  5, 2013</span></div><span data-dcnode-id="2946" instrument_node="">
</span><h2 data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">
					WAA the subject of 'Cameracronica', #3
				</span></h2><span data-dcnode-id="2943" instrument_node="">
</span><p data-dcnode-id="2938"><span data-dcnode-id="2942" instrument_node="">Cameracronica is an Italian&nbsp;digital quarterly review of architecture first published in 2013 and designed to be read on an iPad. The magazine's third issue, '</span><i data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">Wiel Arets: Essence and Absence</span></i><span data-dcnode-id="2939" instrument_node="">', was recently published; it includes an essay entitled 'On the Irreducible Architectural Substance' that explores the effects of digital publishing on the architectural profession and its parallel cultural conversation, an essay entitled 'Transcending and Translucent' that compares the firm's studios to the famed Manhattan 'Factory', alongside three recent WAA projects: Schwäbisch Media, Four Towers Osdorp, and Regiocentrale Zuid.&nbsp;</span></p><span data-dcnode-id="2937" instrument_node="">
</span><p data-dcnode-id="2934"><a data-dcnode-id="2935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cameracronica.it/files/ccm_n3.pdf"><span data-dcnode-id="2936" instrument_node="">Download Cameracronica #3</span></a></p><span data-dcnode-id="2933" instrument_node="">
</span></div><span data-dcnode-id="2931" instrument_node="">
</span></div><span data-dcnode-id="2929" instrument_node="">
</span><div class="news item cf" data-dcnode-id="2906"><span data-dcnode-id="2928" instrument_node="">
</span><img alt="" data-dcnode-id="2927" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003192image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="2926" instrument_node="">
</span><div class="text" data-dcnode-id="2908"><span data-dcnode-id="2925" instrument_node="">
</span><div class="date" data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">December  3, 2013</span></div><span data-dcnode-id="2922" instrument_node="">
</span><h2 data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">
					WAA complete the B' Tower in Rotterdam
				</span></h2><span data-dcnode-id="2919" instrument_node="">
</span><p data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">The B’ Tower, located in the center of Rotterdam,&nbsp;is composed of three distinct volumes of retail and residential program, and is a contiguous extension of Marcel Breuer’s 1955 ‘Bijkenkorf’ department store. Standing at a height of 70 m, its plinth encompasses retail while its subsequent volumes are composed of 54 studios and 24 apartments, respectively. The city of Rotterdam mandated in the mid-1990s that a portion of newly built structures in its center incorporate housing; intrinsically, the B’ Tower is one of the first of these buildings, seeking to impart and sustain an urban vibrancy within this rapidly restructuring district.</span></p><span data-dcnode-id="2916" instrument_node="">
</span><p data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Adjacently sited to a pedestrian promenade, the tower’s retail and lobby are accessed by foot, while its residential program provides additional entry options for automobiles and bicyclists. Specially designated elevators enable this automobile entry, which rise four stories to an elevated park that offers direct access to the building’s core. This two-story and 64 space car park allows for views onto the city’s surroundings beyond a ribbon of transparent glazing, disclosing the first of many cinematographic experiential sequences within this hybrid tower...</span></p><span data-dcnode-id="2913" instrument_node="">
</span><p data-dcnode-id="2910"><a data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/b_tower/"><span data-dcnode-id="2912" instrument_node="">Continue reading</span></a></p><span data-dcnode-id="2909" instrument_node="">
</span></div><span data-dcnode-id="2907" instrument_node="">
</span></div><span data-dcnode-id="2905" instrument_node="">
</span><div class="news item cf" data-dcnode-id="2885"><span data-dcnode-id="2904" instrument_node="">
</span><img alt="" data-dcnode-id="2903" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003123image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="2902" instrument_node="">
</span><div class="text" data-dcnode-id="2887"><span data-dcnode-id="2901" instrument_node="">
</span><div class="date" data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">November 20, 2013</span></div><span data-dcnode-id="2898" instrument_node="">
</span><h2 data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">
					WAA design the Siamese Chair with Lensvelt
				</span></h2><span data-dcnode-id="2895" instrument_node="">
</span><p data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Custom designed for the B' Tower–a high-rise residential building located in Rotterdam–the Siamese chair was designed in collaboration with Dutch furniture manufacturer Lensvelt. It is composed of oak, with fabric from the Danish textile manufacturer Kvadrat. Previously custom made, the chair has recently been placed into full production by Lensvelt.</span></p><span data-dcnode-id="2892" instrument_node="">
</span><p data-dcnode-id="2889"><a data-dcnode-id="2890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/products/siamese_chair/"><span data-dcnode-id="2891" instrument_node="">Read more about the Siamese Chair</span></a></p><span data-dcnode-id="2888" instrument_node="">
</span></div><span data-dcnode-id="2886" instrument_node="">
</span></div><span data-dcnode-id="2884" instrument_node="">
</span><div class="news item cf" data-dcnode-id="2864"><span data-dcnode-id="2883" instrument_node="">
</span><img alt="" data-dcnode-id="2882" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_003195image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="2881" instrument_node="">
</span><div class="text" data-dcnode-id="2866"><span data-dcnode-id="2880" instrument_node="">

</span><h2 data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">
					WAA complete the Post in Maastricht
				</span></h2><span data-dcnode-id="2874" instrument_node="">
</span><p data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">Sited at the edge of the Vrijhof, a square in the center of Maastricht, the Post contains 19 short-stay apartments whose creation entailed the extensive renovation of an existing state protected monument–a post office originally constructed in 1915. The main building is an outstanding example of Dutch brick expressionism, and its elements of historical significance were retained, such as the cast iron balustrade of the main staircase, and the two balconies flanking its Vrijhof facing façade. With the exception of these protected elements, the building was completely stripped of its original structure and interior divisions...</span></p><span data-dcnode-id="2871" instrument_node="">
</span><p data-dcnode-id="2868"><a data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/the_post/"><span data-dcnode-id="2870" instrument_node="">Continue reading</span></a></p><span data-dcnode-id="2867" instrument_node="">
