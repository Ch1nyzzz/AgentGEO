</span><div class="date" data-dcnode-id="6437"><span data-dcnode-id="6438" instrument_node="">April  1, 2022</span></div><span data-dcnode-id="6436" instrument_node="">
</span><h2 data-dcnode-id="6434"><span data-dcnode-id="6435" instrument_node="">
					WAA and C3 publish 'Nature is Nature'
				</span></h2><span data-dcnode-id="6433" instrument_node="">
</span><p data-dcnode-id="6429"><i data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">Nature is Nature </span></i><span data-dcnode-id="6430" instrument_node="">(C3, 2022) is a monograph on the work of the esteemed architecture and design studio of Wiel Arets. This publication is a visual and textual flow that presents the studio’s output in such a way that amplifies the making, the technological and efficient innovations of each work, using a series of drawings, images, diagrams, texts, theories, sketches, and citations from commentary on the work. Having been founded by the acclaimed and globally renowned intellectual, architect, and educator Wiel Arets immediately after matriculating from his immersive study of architecture at the Technical University of Eindhoven in the Netherlands; the work of the studio is instantly recognizable to those familiar with Arets’ philosophies on the inhabitation of space, which he terms ‘interiority’.&nbsp;</span></p><span data-dcnode-id="6428" instrument_node="">
</span><p data-dcnode-id="6425"><a data-dcnode-id="6426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/nature_is_nature" target="_self"><span data-dcnode-id="6427" instrument_node="">Read more about the book</span></a></p><span data-dcnode-id="6424" instrument_node="">
</span><p data-dcnode-id="6421"><a data-dcnode-id="6422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.c3magazine.net/books/%3Fidx%3D526"><span data-dcnode-id="6423" instrument_node="">Order the book from C3</span></a></p><span data-dcnode-id="6420" instrument_node="">
</span><p data-dcnode-id="6418"><span data-dcnode-id="6419" instrument_node="">&nbsp;</span></p><span data-dcnode-id="6417" instrument_node="">
</span></div><span data-dcnode-id="6415" instrument_node="">
</span></div><span data-dcnode-id="6413" instrument_node="">
</span><div class="news item cf" data-dcnode-id="6383"><span data-dcnode-id="6412" instrument_node="">
</span><img alt="" data-dcnode-id="6411" height="620" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005665image.jpg&amp;raw" style="opacity: 1;" width="771"><span data-dcnode-id="6410" instrument_node="">
</span><div class="text" data-dcnode-id="6385"><span data-dcnode-id="6409" instrument_node="">
</span><div class="date" data-dcnode-id="6407"><span data-dcnode-id="6408" instrument_node="">September 16, 2021</span></div><span data-dcnode-id="6406" instrument_node="">
</span><h2 data-dcnode-id="6404"><span data-dcnode-id="6405" instrument_node="">
					Van der Valk Hotel Zuidas awarded by BNA as “Beste Gebouw van het Jaar '21”
				</span></h2><span data-dcnode-id="6403" instrument_node="">
</span><p data-dcnode-id="6401"><span data-dcnode-id="6402" instrument_node="">During the awards ceremony held on September 16th, the Van der Valk Hotel Zuidas was awarded the ‘BNA Beste Gebouw van het Jaar 2021’. The jury states in their report: ‘Van der Valk wanted a hotel with a view; WAA’s assignment was, to create that view on a plot sandwiched between the highway and several towers. The client and the architect jointly designed the interior and created a contrasting warm environment. The hotel shows how a building can be of significance to the urban environment. The parking is solved sublimely. With its open facades, public entrance with a local shop and the adjacent restaurant, the building presents itself as hospitable to the neighborhood and accompanies the urban route from RAI station towards the Zuidas. When it comes to the significance of architecture for people and society, the hotel is the surprise.’</span></p><span data-dcnode-id="6400" instrument_node="">
</span><p data-dcnode-id="6395"><a data-dcnode-id="6398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.volkskrant.nl/cultuur-media/van-der-valkhotel-amsterdam-zuidas-gekozen-tot-beste-gebouw-van-2021~b56fd32a/%3Freferrer%3Dhttps%253A%252F%252Fwww.google.com%252F"><span data-dcnode-id="6399" instrument_node="">Read more about the winn</span></a><a data-dcnode-id="6396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.volkskrant.nl/cultuur-media/van-der-valkhotel-amsterdam-zuidas-gekozen-tot-beste-gebouw-van-2021~b56fd32a/%3Freferrer%3Dhttps%253A%252F%252Fwww.google.com%252F"><span data-dcnode-id="6397" instrument_node="">er </span></a></p><span data-dcnode-id="6394" instrument_node="">
</span><p data-dcnode-id="6391"><a data-dcnode-id="6392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bna.nl/nieuws/bna-beste-gebouw-2021"><span data-dcnode-id="6393" instrument_node="">Read more about the award</span></a></p><span data-dcnode-id="6390" instrument_node="">
</span><p data-dcnode-id="6387"><a data-dcnode-id="6388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hotelamsterdam-zuidas.nl/%3Fgclid%3DEAIaIQobChMI2KnpkqCN8wIVGKd3Ch34owNBEAAYAiAAEgLxQ_D_BwE"><span data-dcnode-id="6389" instrument_node="">Book a stay at Van der Valk Hotel Zuidas</span></a></p><span data-dcnode-id="6386" instrument_node="">
</span></div><span data-dcnode-id="6384" instrument_node="">
</span></div><span data-dcnode-id="6382" instrument_node="">
</span><div class="news item cf" data-dcnode-id="6353"><span data-dcnode-id="6381" instrument_node="">
</span><img alt="" data-dcnode-id="6380" height="540" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005659image.jpg&amp;raw" style="opacity: 1;" width="771"><span data-dcnode-id="6379" instrument_node="">
</span><div class="text" data-dcnode-id="6355"><span data-dcnode-id="6378" instrument_node="">
</span><div class="date" data-dcnode-id="6376"><span data-dcnode-id="6377" instrument_node="">June 14, 2021</span></div><span data-dcnode-id="6375" instrument_node="">
</span><h2 data-dcnode-id="6373"><span data-dcnode-id="6374" instrument_node="">
					Van der Valk hotel Zuidas is nominated for BNA Beste Gebouw 2021 Award
				</span></h2><span data-dcnode-id="6372" instrument_node="">
</span><p data-dcnode-id="6370"><span data-dcnode-id="6371" instrument_node="">This brand new Van der Valk hotel is located within the Zuidas district. It is one of 12 projects nominated for the BNA Beste Gebouw 2021 Award.&nbsp;The hotel is situated on a triangular shaped site. The building shape this creates gives every room 'a room with a view'. Three corridors branch out, so that the hotel's 240 rooms have views in every direction. Fresh, sharp, and clean, without being sterile; the new Van der Valk Hotel expands on the chain's 20th century origins, while updating amenities for travelers living in the 21st century.</span></p><span data-dcnode-id="6369" instrument_node="">
</span><p data-dcnode-id="6364"><span data-dcnode-id="6368" instrument_node="">All nominated buildings have a chance to win the Jury Award and the Public Award. You can </span><a data-dcnode-id="6366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bna.nl/gebouw-van-het-jaar/overzicht/genomineerden"><span data-dcnode-id="6367" instrument_node="">vote</span></a><span data-dcnode-id="6365" instrument_node=""> for the nominees for the Public Award until August 9th.</span></p><span data-dcnode-id="6363" instrument_node="">
</span><p data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">The winner will be announced on September 16th from ’t HEM in Zaandam.</span></p><span data-dcnode-id="6360" instrument_node="">
</span><p data-dcnode-id="6357"><a data-dcnode-id="6358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bna.nl/nieuws/12-gebouwen-in-de-race-voor-bna-beste-gebouw-2021"><span data-dcnode-id="6359" instrument_node="">Read more about the award</span></a></p><span data-dcnode-id="6356" instrument_node="">
</span></div><span data-dcnode-id="6354" instrument_node="">
</span></div><span data-dcnode-id="6352" instrument_node="">
</span><div class="news item cf" data-dcnode-id="6327"><span data-dcnode-id="6351" instrument_node="">
</span><img alt="" data-dcnode-id="6350" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005657image.jpg&amp;raw" style="opacity: 1;" width="771"><span data-dcnode-id="6349" instrument_node="">
</span><div class="text" data-dcnode-id="6329"><span data-dcnode-id="6348" instrument_node="">
</span><div class="date" data-dcnode-id="6346"><span data-dcnode-id="6347" instrument_node="">March 15, 2021</span></div><span data-dcnode-id="6345" instrument_node="">
</span><h2 data-dcnode-id="6343"><span data-dcnode-id="6344" instrument_node="">
					Van der Valk hotel Zuidas is nominated for the 2021 Amsterdam Architecture Prize
				</span></h2><span data-dcnode-id="6342" instrument_node="">
</span><p data-dcnode-id="6340"><span data-dcnode-id="6341" instrument_node="">This brand new 26.000 m2 Van der Valk hotel is located within the Zuidas district; the main business district of the city of Amsterdam. Seeking to fill requirements of travelers for business and pleasure, who do not want to be in the city center but still wish to be close to it. It is one of 10 projects nominated for the 2021 Amsterdam Architecture Prize.&nbsp;The hotel is situated on a triangular shaped site, which prescribed the volume. Standing at a height of 55 m, the hotel is positioned in prominent view of those driving past it.</span></p><span data-dcnode-id="6339" instrument_node="">
</span><p data-dcnode-id="6331"><span data-dcnode-id="6338" instrument_node="">The winner will be announced on 28 May, online from the Trippenhuiscomplex in Amsterdam.</span><br data-dcnode-id="6337"><span data-dcnode-id="6336" instrument_node=""> </span><br data-dcnode-id="6335"><span data-dcnode-id="6334" instrument_node=""> </span><a data-dcnode-id="6332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arcam.nl/nominaties-amsterdamse-architectuurprijs-2021-bekend/"><span data-dcnode-id="6333" instrument_node="">Read more about the award</span></a></p><span data-dcnode-id="6330" instrument_node="">

</span><h2 data-dcnode-id="6317"><span data-dcnode-id="6318" instrument_node="">
					WAA complete Van der Valk Hotel in Amsterdam
				</span></h2><span data-dcnode-id="6316" instrument_node="">
</span><p data-dcnode-id="6314"><span data-dcnode-id="6315" instrument_node="">This brand new 26.000 m2 hotel is located within Amsterdam’s Zuidas district; the main business district of the city, similar in stance to Le Défense in Paris, or Canary Wharf in London. The chain is well known in the Netherlands for its hotels sited in-between Dutch metropolises, and with this location has added a new destination to their portfolio of properties, with 240 more hotel rooms. In recent years, Amsterdam has seen an unprecedented number of new hotels open within restored, monumental buildings its city center. Yet there has been a lack of new-built hotels in the city; this is one of several seeking to fill requirements of travelers for business and pleasure...</span></p><span data-dcnode-id="6313" instrument_node="">
</span><p data-dcnode-id="6310"><a data-dcnode-id="6311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/van_der_valk_hotel/"><span data-dcnode-id="6312" instrument_node="">Read more about Van der valk Hotel</span></a></p><span data-dcnode-id="6309" instrument_node="">

</span><img alt="" data-dcnode-id="6303" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005655image.jpg&amp;raw" style="opacity: 1;" width="771"><span data-dcnode-id="6302" instrument_node="">
</span><div class="text" data-dcnode-id="6284"><span data-dcnode-id="6301" instrument_node="">

</span><h2 data-dcnode-id="6296"><span data-dcnode-id="6297" instrument_node="">
					Wiel Arets publishes an essay in honor of Professor Emeritus Kenneth Frampton
				</span></h2><span data-dcnode-id="6295" instrument_node="">
</span><p data-dcnode-id="6290"><span data-dcnode-id="6294" instrument_node="">Last month the new book </span><i data-dcnode-id="6292"><span data-dcnode-id="6293" instrument_node="">Modern Architecture and the Lifeworld: Essays in Honor of Kenneth Frampton </span></i><span data-dcnode-id="6291" instrument_node="">was published by Thames &amp; Hudson–wherein more than 30 contributors pen their heartfelt admiration for Frampton. Arets’ essay is entitled ‘An Englishman in New York’, focusing on Frampton’s pedagogical evolution through the framework of his time in Europe and the USA.&nbsp;</span></p><span data-dcnode-id="6289" instrument_node="">
</span><p data-dcnode-id="6286"><a data-dcnode-id="6287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/academia/theory/an_englishman_in_new_york"><span data-dcnode-id="6288" instrument_node="">Read the essay</span></a></p><span data-dcnode-id="6285" instrument_node="">

</span><div class="date" data-dcnode-id="6275"><span data-dcnode-id="6276" instrument_node="">October 21, 2020</span></div><span data-dcnode-id="6274" instrument_node="">
</span><h2 data-dcnode-id="6272"><span data-dcnode-id="6273" instrument_node="">
					WAA near completion of Europaallee 'Site D' adjacent to Zürich's Central Train Station
				</span></h2><span data-dcnode-id="6271" instrument_node="">
</span><p data-dcnode-id="6269"><span data-dcnode-id="6270" instrument_node="">Construction is nearing completion on one of WAA's recent projects in Zürich: Europaallee 'Site D', an office and mix-used building located in the center of the city, parallel to its central train station. It is finished in prefabricated custom Carrera marble façade elements, combined with closed-cavity glazing with integrated aluminum curtains; the building will mostly be occupied by Google upon its completion.&nbsp;As with many new urban spaces within Zürich, ample seating and bike parking will be incorporated. Similar to allée of formal gardens; the district will be planted with copious amounts of greenery. Trees will border the main pedestrian path, thus creating a ‘small-scale’ urban garden in the resulting ‘urban canyon’ that this new district will shape. With the completion of this building–the last remaining plot in the development–Europaallee Zürich will be finalized in its entirety, after the corporation developing it was first formed, back in 1995...</span></p><span data-dcnode-id="6268" instrument_node="">
</span><p data-dcnode-id="6265"><a data-dcnode-id="6266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/europaallee_site_d/"><span data-dcnode-id="6267" instrument_node="">Read more about Europaallee 'Site D'</span></a></p><span data-dcnode-id="6264" instrument_node="">

</span><img alt="" data-dcnode-id="6258" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005591image.jpg&amp;raw" style="opacity: 1;" width="771"><span data-dcnode-id="6257" instrument_node="">

</span><h2 data-dcnode-id="6251"><span data-dcnode-id="6252" instrument_node="">
					WAA included in the 2019 'Best Dutch Book Design' exhibition in Amsterdam
				</span></h2><span data-dcnode-id="6250" instrument_node="">
</span><p data-dcnode-id="6248"><span data-dcnode-id="6249" instrument_node="">
</span></p><p data-dcnode-id="6243"><span data-dcnode-id="6247" instrument_node="">As of 3 October 2020, the 2019 'Best Dutch Book Designs' are on exhibit at the Stedelijk Museum in Amsterdam, representing the most distinguished books made in the Netherlands during 2019.&nbsp;</span><em data-dcnode-id="6245"><span data-dcnode-id="6246" instrument_node="">Un-Conscious-City</span></em><span data-dcnode-id="6244" instrument_node="">, designed by Mainstudio and published by Actar, was chosen as one of the 33 books. So states the jury report: ‘This book presents architect Wiel Arets’ kaleidoscopic vision of the future of the modern metropolis and the often unconscious, collective human choices that color, drive, and transform life in this environment… [This is an] intelligent book; designed through and through. Bravo!’ The book also contains photographs taken by Arets…</span></p><p class="readmore" data-dcnode-id="6239"><a data-dcnode-id="6241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/waa_included_in_the_2019_best_dutch_book_design_exhibition_in_amsterdam"><span data-dcnode-id="6242" instrument_node="">Continue reading</span></a><span data-dcnode-id="6240" instrument_node="">
</span></p><span data-dcnode-id="6238" instrument_node="">
</span></div><span data-dcnode-id="6236" instrument_node="">

</span><div class="text" data-dcnode-id="6216"><span data-dcnode-id="6230" instrument_node="">
</span><div class="date" data-dcnode-id="6228"><span data-dcnode-id="6229" instrument_node="">August 17, 2020</span></div><span data-dcnode-id="6227" instrument_node="">
</span><h2 data-dcnode-id="6225"><span data-dcnode-id="6226" instrument_node="">
					WAA progress construction on the Antwerp Tower in Antwerp, Belgium
				</span></h2><span data-dcnode-id="6224" instrument_node="">
</span><p data-dcnode-id="6222"><span data-dcnode-id="6223" instrument_node="">Even as the world has slowed in ways it has never previously had to, over the past several months, construction progresses on buildings. The Antwerp Tower is situated, about 300 m from Antwerp's Central Train Station. The most direct manner of routing between these two buildings, for automobiles, trams, as well as pedestrians, is a boulevard serving as the western, and secondary entrance to the station–the so-named Keyserlei.</span></p><span data-dcnode-id="6221" instrument_node="">
</span><p data-dcnode-id="6218"><a data-dcnode-id="6219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/antwerp_tower/"><span data-dcnode-id="6220" instrument_node="">Read more about the Antwerp Tower</span></a></p><span data-dcnode-id="6217" instrument_node="">

</span><img alt="" data-dcnode-id="6211" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005520image.jpg&amp;raw" style="opacity: 1;" width="771"><span data-dcnode-id="6210" instrument_node="">
</span><div class="text" data-dcnode-id="6191"><span data-dcnode-id="6209" instrument_node="">
</span><div class="date" data-dcnode-id="6207"><span data-dcnode-id="6208" instrument_node="">May  7, 2020</span></div><span data-dcnode-id="6206" instrument_node="">
</span><h2 data-dcnode-id="6204"><span data-dcnode-id="6205" instrument_node="">
					WAA progress construction on Van der Valk Hotel in Amsterdam’s Zuidas District
				</span></h2><span data-dcnode-id="6203" instrument_node="">
</span><p data-dcnode-id="6201"><span data-dcnode-id="6202" instrument_node="">The hotel occupies a found, triangular shaped site, which has informed its volume. The parking lobby occupies the five first floors, utilizing the maximum possible floor area and extending to the site’s borders. The ground floor semi-lobby, oppositely, does not extend to the site’s edges, with varying cuts into its façade, which creates covered spaces acting as awnings for guests entering the property. The ground floor has two main entrances that enter onto the same, semi-lobby-like space; one entry is nearer to the nearby tram stop, for those approaching the hotel by foot, whereas the other is at the site’s western edge...</span></p><span data-dcnode-id="6200" instrument_node="">
</span><p data-dcnode-id="6193"><a data-dcnode-id="6198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/van_der_valk_hotel/"><span data-dcnode-id="6199" instrument_node="">Read more about the Van der Valk Hotel</span></a><br data-dcnode-id="6197"><br data-dcnode-id="6196"><a data-dcnode-id="6194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/videos/van_der_valk_hotel_amsterdam"><span data-dcnode-id="6195" instrument_node="">Watch a video of the Van der Valk Hotel</span></a></p><span data-dcnode-id="6192" instrument_node="">
</span></div><span data-dcnode-id="6190" instrument_node="">
</span></div><span data-dcnode-id="6188" instrument_node="">

</span><img alt="" data-dcnode-id="6186" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005527image.jpg&amp;raw" style="opacity: 1;" width="771"><span data-dcnode-id="6185" instrument_node="">
</span><div class="text" data-dcnode-id="6162"><span data-dcnode-id="6184" instrument_node="">
</span><div class="date" data-dcnode-id="6182"><span data-dcnode-id="6183" instrument_node="">February 28, 2020</span></div><span data-dcnode-id="6181" instrument_node="">
</span><h2 data-dcnode-id="6179"><span data-dcnode-id="6180" instrument_node="">
					WAA awarded 2020 Best Dutch Book Design Award for 'Un-Conscious-City'
				</span></h2><span data-dcnode-id="6178" instrument_node="">
</span><p data-dcnode-id="6174"><i data-dcnode-id="6176"><span data-dcnode-id="6177" instrument_node="">Un-Conscious-City</span></i><span data-dcnode-id="6175" instrument_node=""> (Actar, 2020) is a new book about the future of the modern metropolis, as envisioned by Dutch architect Wiel Arets, centered on Tokyo as an ideal prototype. The book’s Japanese folded pages, composed of a translucent, slightly off-white, rough-yet-delicate to the touch paper, reflect the ideals contained in the book’s prose. A series of images, all taken in Tokyo, book-end all but the first chapter. The interior of the cover is printed with an image of a burnt wood texture, printed in two tones of black, referencing the traditional Japanese weather-proofing building methods. It totals 274 pages.&nbsp;</span></p><span data-dcnode-id="6173" instrument_node="">
</span><p data-dcnode-id="6170"><a data-dcnode-id="6171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//debestverzorgdeboeken.nl/nl/boeken/"><span data-dcnode-id="6172" instrument_node="">View the full list of award recipients</span></a></p><span data-dcnode-id="6169" instrument_node="">
</span><p data-dcnode-id="6164"><a data-dcnode-id="6165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Unconscious-City-Conversations-Wiel-Arets/dp/1945150653"><span data-dcnode-id="6168" instrument_node="">Purchase a copy of</span><i data-dcnode-id="6166"><span data-dcnode-id="6167" instrument_node=""> Un-Conscious-City</span></i></a></p><span data-dcnode-id="6163" instrument_node="">
</span></div><span data-dcnode-id="6161" instrument_node="">

</span><img alt="" data-dcnode-id="6157" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005501image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="6156" instrument_node="">
</span><div class="text" data-dcnode-id="6141"><span data-dcnode-id="6155" instrument_node="">
</span><div class="date" data-dcnode-id="6153"><span data-dcnode-id="6154" instrument_node="">December  4, 2019</span></div><span data-dcnode-id="6152" instrument_node="">
</span><h2 data-dcnode-id="6150"><span data-dcnode-id="6151" instrument_node="">
					WAA progress construction on Europaallee 'Site D' in Zürich
				</span></h2><span data-dcnode-id="6149" instrument_node="">
</span><p data-dcnode-id="6147"><span data-dcnode-id="6148" instrument_node="">This new mixed-use office and retail building is an integral component of Zürich's ‘Europaallee’, a currently emerging district adjacent to the city's central train station. The building is currently known as ‘Site D’ due to the numbers of buildings in the central Europaallee district; eight in total, each assigned a letter, ‘A' through 'H’. A plinth of retail programming anchors the building to its site, while its upper volumes consist of flexible office spaces that, due to their shallow depth and efficient façade grid, can be occupied by several individual companies or a larger singular tenant. These dual programs posed the challenge of creating two lighting and spatial requirements within this prominently sited building...</span></p><span data-dcnode-id="6146" instrument_node="">
</span><p data-dcnode-id="6143"><a data-dcnode-id="6144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/europaallee_site_d/"><span data-dcnode-id="6145" instrument_node="">Read more about Europaallee 'Site D'</span></a></p><span data-dcnode-id="6142" instrument_node="">

</span><img alt="" data-dcnode-id="6136" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005483image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="6135" instrument_node="">

</span><div class="date" data-dcnode-id="6132"><span data-dcnode-id="6133" instrument_node="">November 13, 2019</span></div><span data-dcnode-id="6131" instrument_node="">
</span><h2 data-dcnode-id="6129"><span data-dcnode-id="6130" instrument_node="">
					WAA progress construction on Van der Valk Hotel in Amsterdam’s Zuidas District
				</span></h2><span data-dcnode-id="6128" instrument_node="">
</span><p data-dcnode-id="6126"><span data-dcnode-id="6127" instrument_node="">With origins as a highway-centric hotel chain for travelers by automobile; Van der Valk is an international company, whose roots are Dutch, and whose hotels are almost always sited adjacent to highways, providing comfortable lodging and dining for those traveling long distances by car–as well as locals. Seeking to reposition itself in the Dutch market, while spurring a renewal of its image; the chain, long known for its hotels sited in-between major Dutch cities, will add a new location to their portfolio of properties, with a 26.000 m2 hotel in Amsterdam's Zuidas district. Situated along the southern edge of the ring highway...</span></p><span data-dcnode-id="6125" instrument_node="">
</span><p data-dcnode-id="6122"><a data-dcnode-id="6123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/van_der_valk_hotel/"><span data-dcnode-id="6124" instrument_node="">Read more about Van der Valk Hotel</span></a></p><span data-dcnode-id="6121" instrument_node="">

</span><img alt="" data-dcnode-id="6115" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005481image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="6114" instrument_node="">
</span><div class="text" data-dcnode-id="6097"><span data-dcnode-id="6113" instrument_node="">
</span><div class="date" data-dcnode-id="6111"><span data-dcnode-id="6112" instrument_node="">November 11, 2019</span></div><span data-dcnode-id="6110" instrument_node="">
</span><h2 data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">
					‘A Daily Dose of Architecture Books’ reviews ‘Strange Bodies’
				</span></h2><span data-dcnode-id="6107" instrument_node="">
</span><p data-dcnode-id="6103"><i data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">Strange Bodies</span></i><span data-dcnode-id="6104" instrument_node=""> was published by Birkhäuser in 1996, as apart of the exhibition ‘Wiel Arets: A Virological Architecture’ at the Basel Architecture Museum, in Switzerland. ‘…The book is very much of its time. Instead of one project after another, text and images overlap, the former sometimes aligned with the images on the same page, but not always. The many contributions–by Stan Allen, Elizabeth Diller, Greg Lynn, Hani Rashid, and others–run across the top of the page in an almost cinematic fashion. So, if the photos and drawings are images on the screen and the words are dialogue, the latter continues beyond the cuts from one "scene" to the next in the book's "montage," sometimes literally overlapping each other in a cacophony of voices.’&nbsp;</span></p><span data-dcnode-id="6102" instrument_node="">
</span><p data-dcnode-id="6099"><a data-dcnode-id="6100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archidose.blogspot.com/2019/11/wiel-arets.html"><span data-dcnode-id="6101" instrument_node="">Read the full book review</span></a></p><span data-dcnode-id="6098" instrument_node="">

</span><div class="date" data-dcnode-id="6088"><span data-dcnode-id="6089" instrument_node="">November  6, 2019</span></div><span data-dcnode-id="6087" instrument_node="">
</span><h2 data-dcnode-id="6085"><span data-dcnode-id="6086" instrument_node="">
					'A Daily Dose of Architecture Books' reviews the book 'Un-Conscious-City'
				</span></h2><span data-dcnode-id="6084" instrument_node="">
</span><p data-dcnode-id="6079"><span data-dcnode-id="6083" instrument_node="">‘</span><i data-dcnode-id="6081"><span data-dcnode-id="6082" instrument_node="">Un-Conscious-City </span></i><span data-dcnode-id="6080" instrument_node="">(Actar, 2019) is structured as a conversation between the "Prompter" and "The Architect" ...broadly about cities and the informality of their evolution... the book’s content and format are fairly unconventional. First, all the pages are lightweight, single-sided, and folded… which helps the book lay flat and gives it a unique feel, due to the folds at the fore edge… punctuated by excerpts from books and articles... Lastly, between the interview's seven sections are photographs taken by Arets on numerous trips to Japan this decade. They show people working, eating, and moving about the city, as well as construction sites and other vignettes that are focused on the unconscious.’</span></p><span data-dcnode-id="6078" instrument_node="">
</span><p data-dcnode-id="6075"><a data-dcnode-id="6076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archidose.blogspot.com/2019/11/un-conscious-city.html"><span data-dcnode-id="6077" instrument_node="">Read the full book review</span></a></p><span data-dcnode-id="6074" instrument_node="">

</span><h2 data-dcnode-id="6061"><span data-dcnode-id="6062" instrument_node="">
					WAA progress construction on the Antwerp Tower in Antwerp, Belgium
				</span></h2><span data-dcnode-id="6060" instrument_node="">
</span><h1 data-dcnode-id="6058"><span data-dcnode-id="6059" instrument_node="">In 1907, in Antwerp, Belgium, a new opera house was completed in the then fashionable Beaux-Arts style that was sweeping through Europe as a reaction to the numerous unifications of nations, which had taken place at the end of the nineteenth century. The Flemish Opera, as the building is currently called, is situated, about 300 m from Antwerp's Central Train Station; the latter being completed just two years later, in 1909, in a similar yet more eclectic manner, due to its idiosyncratic use of ornamentation. The most direct manner of routing between these two buildings, for automobiles, trams, as well as pedestrians, is a boulevard serving as the western, and secondary entrance to the station–the so-named Keyserlei. This boulevard is one of the most trafficked streets in the city, giving direct access to the city center from the station; the Keyserlei is c. 300 m long, and received even more impetus as a major thoroughfare for the city when the premetro was opened in 1975, with the dedicated and adjacent stop–Opera. At the western end of the Keyserlei–which is its terminus–is the Antwerp Tower.</span></h1><span data-dcnode-id="6057" instrument_node="">
</span><h1 data-dcnode-id="6055"><br data-dcnode-id="6056"></h1><span data-dcnode-id="6054" instrument_node="">
</span><h1 data-dcnode-id="6052"><span data-dcnode-id="6053" instrument_node="">Constructed in the 1970s, when the premetro was nearing its completion; the Antwerp Tower was built on the site of a former dance hall that was...</span></h1><span data-dcnode-id="6051" instrument_node="">
</span><h1 data-dcnode-id="6049"><br data-dcnode-id="6050"></h1><span data-dcnode-id="6048" instrument_node="">
</span><h1 data-dcnode-id="6045"><a data-dcnode-id="6046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/antwerp_tower/"><span data-dcnode-id="6047" instrument_node="">Read more about the Antwerp Tower</span></a></h1><span data-dcnode-id="6044" instrument_node="">

</span><h2 data-dcnode-id="6031"><span data-dcnode-id="6032" instrument_node="">
					'Un-Conscious-City' shortlisted for German Architecture Museum Architectural Book Award
				</span></h2><span data-dcnode-id="6030" instrument_node="">
</span><p data-dcnode-id="6025"><span data-dcnode-id="6029" instrument_node="">The Deutsches Architekturmuseum (German Architecture Museum) annually holds a competition to recognize the ten best crafted and produced books, from throughout the entire world. Over 100 publishers sent in more than 227 books to the ten person jury–who also selected a second ten books, for the award’s ‘shortlist’. </span><i data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">Un-Conscious-City </span></i><span data-dcnode-id="6026" instrument_node="">(Actar, 2019) was shortlisted for the award. The jury awarded based off the aspects of, ‘design, concept, quality in terms of material and finishing, level of innovation, and timeliness.’ All recognized books were presented at the Frankfurt Book Fair, from 16-20 October, 2019.&nbsp;</span></p><span data-dcnode-id="6024" instrument_node="">
</span><p data-dcnode-id="6021"><a data-dcnode-id="6022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dam-online.de/en/program/architecture-prizes/dam-architectural-book-award/"><span data-dcnode-id="6023" instrument_node="">Read more about the award</span></a></p><span data-dcnode-id="6020" instrument_node="">

</span><h2 data-dcnode-id="6007"><span data-dcnode-id="6008" instrument_node="">
					The Double is published in esteemed Chinese architecture publication Gooood
				</span></h2><span data-dcnode-id="6006" instrument_node="">
</span><p data-dcnode-id="6002"><i data-dcnode-id="6004"><span data-dcnode-id="6005" instrument_node="">Gooood</span></i><span data-dcnode-id="6003" instrument_node="">, one of China's leading architecture and design websites, has published the WAA project The Double–a luxury housing complex located in the center of Amsterdam containing 45 units, of which six are penthouses. In a city where housing is often small and amenity-less; The Double contains a gym and a sauna–as well as a small pool, which can be seen into from the sauna due to the use of one-way glass. Simultaneously, those in the gym and pool–also due to the use of one-way glass–can covertly gaze at passersby on the street. &nbsp; &nbsp;</span></p><span data-dcnode-id="6001" instrument_node="">
</span><p data-dcnode-id="5996"><a data-dcnode-id="5997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooood.cn/the-double-housing-complex-by-wiel-arets-architects.htm"><span data-dcnode-id="6000" instrument_node="">View The Double on </span><i data-dcnode-id="5998"><span data-dcnode-id="5999" instrument_node="">Gooood</span></i></a></p><span data-dcnode-id="5995" instrument_node="">

</span><h2 data-dcnode-id="5982"><span data-dcnode-id="5983" instrument_node="">
					Wiel Arets to participate in symposium about happiness in modern metropolises, in Kuwait
				</span></h2><span data-dcnode-id="5981" instrument_node="">
</span><p data-dcnode-id="5979"><span data-dcnode-id="5980" instrument_node="">On Monday October 14th, Wiel Arets will participate in a symposium at the Regency Hotel in Kuwait. The event brings together global leaders in culture, creativity, and technology–to explore how the built environment influences happiness and wellbeing, for humanity and nature, within today’s metropolises. Like many cities in the Middle East, prosperity during the late twentieth century has led to rapid development in Kuwait that fundamentally changed the experience and quality of life of citizens. The symposium takes Kuwait as a case study of a metropolis that rapidly developed in the late-twentieth century, and abstracts the ways that lessons taken from its own development, can be applied to other world metropolises.</span></p><span data-dcnode-id="5978" instrument_node="">
</span><p data-dcnode-id="5974"><span data-dcnode-id="5977" instrument_node="">‘Happiness in the City'</span><br data-dcnode-id="5976"><span data-dcnode-id="5975" instrument_node="">14 October 2019</span></p><span data-dcnode-id="5973" instrument_node="">
</span><p data-dcnode-id="5965"><span data-dcnode-id="5972" instrument_node="">Regency Hotel</span><br data-dcnode-id="5971"><span data-dcnode-id="5970" instrument_node="">Al Bidea, 25 Al Ta'awen Street</span><br data-dcnode-id="5969"><span data-dcnode-id="5968" instrument_node="">Salmiya, Kuwait، 22012</span><br data-dcnode-id="5967"><span data-dcnode-id="5966" instrument_node="">Kuwait City, Kuwait</span></p><span data-dcnode-id="5964" instrument_node="">
</span><p data-dcnode-id="5961"><a data-dcnode-id="5962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eventbrite.co.uk/e/happiness-in-the-city-redesigning-urban-living-international-symposium-tickets-70621730497"><span data-dcnode-id="5963" instrument_node="">Register and/or read about the event</span></a></p><span data-dcnode-id="5960" instrument_node="">

					WAA complete the Double in Amsterdam
				</span></h2><span data-dcnode-id="5946" instrument_node="">
</span><p data-dcnode-id="5940"><span data-dcnode-id="5945" instrument_node="">This recently completed luxury-housing complex, consisting of 45 residential units in two volumes–one street side, and the other canal-facing–are connected by an underground, communal parking garage, and are separated above by an internal, and lushishly landscaped, intimate courtyard for its residents. Four penthouses are situated on the top two floors of the rear, canal-facing volume; two in the front.&nbsp;The building itself is sited on the eastern edge of Amsterdam's city center, which was built in the sixteenth century, about a half a kilometer from the 'Zuiderkerk' (Southern Church), which dates from 1608. Due to the delicate nature of the site within the center of historic Amsterdam, groundwork during preparation of the building's foundation, uncovered evidence of archaeological remains from the sixteenth and...</span><br data-dcnode-id="5944"><br data-dcnode-id="5943"><a data-dcnode-id="5941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/the_double/"><span data-dcnode-id="5942" instrument_node="">Read more about the Double</span></a></p><span data-dcnode-id="5939" instrument_node="">

					Europaallee 'Site D' is published in esteemed Chinese architecture publication Gooood
				</span></h2><span data-dcnode-id="5925" instrument_node="">
</span><p data-dcnode-id="5921"><i data-dcnode-id="5923"><span data-dcnode-id="5924" instrument_node="">Gooood</span></i><span data-dcnode-id="5922" instrument_node="">, one of China's leading architecture and design websites, has published the WAA project Europaallee ‘Site D’–the future office of Google Switzerland, in which there is also retail and dining establishments. Sited adjacent to Zürich's central train station, the building will finish completion in 2020, and due to the nature of the building’s interior, it will be possible to convert the offices spaces into residential units, should that be desired in the future.&nbsp;</span></p><span data-dcnode-id="5920" instrument_node="">
</span><p data-dcnode-id="5915"><a data-dcnode-id="5916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooood.cn/europaallee-site-d-by-wiel-arets-architects.htm"><span data-dcnode-id="5919" instrument_node="">View Europaallee ‘Site D’ on </span><i data-dcnode-id="5917"><span data-dcnode-id="5918" instrument_node="">Gooood</span></i></a></p><span data-dcnode-id="5914" instrument_node="">

</span><h2 data-dcnode-id="5901"><span data-dcnode-id="5902" instrument_node="">
					The IIT CoA and Actar publish 'Nowness Files: 2012-2018 IIT Architecture Chicago'
				</span></h2><span data-dcnode-id="5900" instrument_node="">
</span><p data-dcnode-id="5898"><span data-dcnode-id="5899" instrument_node="">
</span></p><p data-dcnode-id="5890"><span data-dcnode-id="5897" instrument_node="">This week the&nbsp;Illinois Institute of Technology's&nbsp;College of Architecture officially marked the beginning of its 2019-2020 academic year. </span><em data-dcnode-id="5895"><span data-dcnode-id="5896" instrument_node="">Nowness File</span></em><span data-dcnode-id="5894" instrument_node="">s marks the period of Wiel Arets’ deanship at the college, after a six year period of renewal and change to the college’s functioning–effecting nearly everything from education, to events and publications. It is the second edition of </span><em data-dcnode-id="5892"><span data-dcnode-id="5893" instrument_node="">Nowness</span></em><span data-dcnode-id="5891" instrument_node=""> published by the college, and its pages chart the evolution of the Mies Crown Hall Americas Prize (MCHAP), reflect on books, lectures, and lecturers, and highlight the new digital media outlets, as the website.&nbsp;Special attention is given to the revised and expanded degrees…</span></p><p class="readmore" data-dcnode-id="5886"><a data-dcnode-id="5888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/news/the_iit_coa_and_actar_publish_nowness_files_2012_2018_iit_architecture_chicago"><span data-dcnode-id="5889" instrument_node="">Continue reading</span></a><span data-dcnode-id="5887" instrument_node="">
</span></p><span data-dcnode-id="5885" instrument_node="">

</span><img alt="" data-dcnode-id="5879" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005266image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5878" instrument_node="">
</span><div class="text" data-dcnode-id="5860"><span data-dcnode-id="5877" instrument_node="">
</span><div class="date" data-dcnode-id="5875"><span data-dcnode-id="5876" instrument_node="">August  6, 2019</span></div><span data-dcnode-id="5874" instrument_node="">
</span><h2 data-dcnode-id="5872"><span data-dcnode-id="5873" instrument_node="">
					WAA progress construction on Europaallee 'Site D' in Zürich
				</span></h2><span data-dcnode-id="5871" instrument_node="">
</span><h1 data-dcnode-id="5869"><span data-dcnode-id="5870" instrument_node="">This new mixed-use office and retail building is an integral component of Zürich's ‘Europaallee’, a currently emerging district adjacent to the city's central train station. The building is currently known as ‘Site D’ due to the numbers of buildings in the central Europaallee district; eight in total, each assigned a letter, ‘A' through 'H’. A plinth of retail programming anchors the building to its site, while its upper volumes consist of flexible office spaces that, due to their shallow depth and efficient façade grid, can be occupied by several individual companies or a larger singular tenant. These dual programs posed the challenge of creating two lighting and spatial requirements within this prominently sited building. The main entry is positioned along the parallel street named Europaallee, and opens onto the ground floor’s main retail, dining, and circulation spaces. From the ground floor, a central staircase complemented by two ramping escalators traverses and connects these areas. Eight floors of office space are set atop the plinth, and are organized around a multi-level exterior courtyard, essentially creating two office ‘towers’...</span></h1><span data-dcnode-id="5868" instrument_node="">
</span><p data-dcnode-id="5866"><span data-dcnode-id="5867" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5865" instrument_node="">
</span><h1 data-dcnode-id="5862"><a data-dcnode-id="5863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/europaallee_site_d/"><span data-dcnode-id="5864" instrument_node="">Read more about Europaallee 'Site D'</span></a></h1><span data-dcnode-id="5861" instrument_node="">
</span></div><span data-dcnode-id="5859" instrument_node="">
</span></div><span data-dcnode-id="5857" instrument_node="">
</span><div class="news item cf" data-dcnode-id="5837"><span data-dcnode-id="5856" instrument_node="">
</span><img alt="" data-dcnode-id="5855" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005249image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5854" instrument_node="">
</span><div class="text" data-dcnode-id="5839"><span data-dcnode-id="5853" instrument_node="">
</span><div class="date" data-dcnode-id="5851"><span data-dcnode-id="5852" instrument_node="">July 17, 2019</span></div><span data-dcnode-id="5850" instrument_node="">
</span><h2 data-dcnode-id="5848"><span data-dcnode-id="5849" instrument_node="">
					WAA progress construction on the Antwerp Tower in Antwerp, Belgium
				</span></h2><span data-dcnode-id="5847" instrument_node="">
</span><p data-dcnode-id="5845"><span data-dcnode-id="5846" instrument_node="">The Antwerp Tower is a skyscraper in the center of Antwerp, which itself is currently being renovated from an office tower to a building with 290 luxury apartments, based off a design by WAA. The tower is part of a larger renovation of the area directly around its base–the Keyserlei, which is the main pedestrian avenue that leads from Antwerp’s central train station–into the center of the city. The design of the Antwerp Tower entails extending the width of the marquise-diamond-like floorpan, increasing its height to 100 m, and demolishing and repurposing the space directly between the opera house and the tower–to create a four story plinth at the tower’s base, for restaurants and cafés, with a roof terrace for overlooking the city below.</span></p><span data-dcnode-id="5844" instrument_node="">
</span><p data-dcnode-id="5841"><a data-dcnode-id="5842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/antwerp_tower/"><span data-dcnode-id="5843" instrument_node="">Read more about the Antwerp Tower</span></a></p><span data-dcnode-id="5840" instrument_node="">

</span><div class="news item cf" data-dcnode-id="5807"><span data-dcnode-id="5835" instrument_node="">
</span><img alt="" data-dcnode-id="5834" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005239image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5833" instrument_node="">

</span><div class="date" data-dcnode-id="5830"><span data-dcnode-id="5831" instrument_node="">June 19, 2019</span></div><span data-dcnode-id="5829" instrument_node="">
</span><h2 data-dcnode-id="5827"><span data-dcnode-id="5828" instrument_node="">
					WAA and Actar publish 'Un-Conscious-City'
				</span></h2><span data-dcnode-id="5826" instrument_node="">
</span><p data-dcnode-id="5819"><i data-dcnode-id="5824"><span data-dcnode-id="5825" instrument_node="">Un-Conscious-City </span></i><span data-dcnode-id="5823" instrument_node="">(Actar, 2019) is a new book that explores and unravels Dutch architect Wiel Arets’ kaleidoscopic viewpoints on the ways the collective, unconscious decisions taken by the world’s citizens throughout time–a process that remains invisible to the naked eye–are now working to transform and shift the physical, sensory, and emotional experiences of human beings, as they navigate and live in today’s metropolises as well as the countryside. </span><i data-dcnode-id="5821"><span data-dcnode-id="5822" instrument_node="">Un-Conscious-City</span></i><span data-dcnode-id="5820" instrument_node=""> raises questions, predicaments, and ideals regarding the future of our cities, while recognizing their limitations. Wiel Arets–renowned architect, writer, and thinker–identifies this condition as the Un-Conscious-City.</span></p><span data-dcnode-id="5818" instrument_node="">
</span><p data-dcnode-id="5815"><a data-dcnode-id="5816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/media/publications/un_conscious_city"><span data-dcnode-id="5817" instrument_node="">Read more about the book</span></a></p><span data-dcnode-id="5814" instrument_node="">
</span><p data-dcnode-id="5811"><a data-dcnode-id="5812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Unconscious-City-Conversations-Wiel-Arets/dp/1945150653"><span data-dcnode-id="5813" instrument_node="">Order the book from Amazon</span></a></p><span data-dcnode-id="5810" instrument_node="">
</span></div><span data-dcnode-id="5808" instrument_node="">

</span><h2 data-dcnode-id="5797"><span data-dcnode-id="5798" instrument_node="">
					Wiel Arets to lecture at the University of Naples Federico II
				</span></h2><span data-dcnode-id="5796" instrument_node="">
</span><p data-dcnode-id="5782"><span data-dcnode-id="5795" instrument_node="">On Wednesday June 19th at 17:00, Wiel Arets will lecture at the University of Naples Federico II, in Naples, Italy. The lecture will examine recent developments in the evolution of WAA’s work, and highlight new projects currently under construction. The event is also the first time that the newest publication authored by Wiel Arets, </span><i data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node="">Un-Conscious-City</span></i><span data-dcnode-id="5792" instrument_node="">, will be presented to the public.</span><br data-dcnode-id="5791"><br data-dcnode-id="5790"><span data-dcnode-id="5789" instrument_node="">June 19th, 2019 17:00</span><br data-dcnode-id="5788"><span data-dcnode-id="5787" instrument_node="">University of Naples Federico II</span><br data-dcnode-id="5786"><span data-dcnode-id="5785" instrument_node="">Palazzo Orsini di Gravina</span><br data-dcnode-id="5784"><span data-dcnode-id="5783" instrument_node="">Via Monteoliveto 3 80134 Naples, Italy</span></p><span data-dcnode-id="5781" instrument_node="">

</span><h2 data-dcnode-id="5768"><span data-dcnode-id="5769" instrument_node="">
					WAA's Hedge House is transformed by an installation from artist Peter Struycken 
				</span></h2><span data-dcnode-id="5767" instrument_node="">
</span><p data-dcnode-id="5765"><span data-dcnode-id="5766" instrument_node="">The Hedge House is an art pavilion located on the grounds of Castle Wijlre in the south of the Netherlands. Completed in 2001, it was designed by WAA, and is now a an art foundation named&nbsp;Kasteel Wijlre Estate. The&nbsp;Dutch artist Peter Struycken has undertaken a, ‘transformation consisting of a painting that covers all of the building's floors, walls, and ceiling… he has never before realized a painted work on this scale, and for the first time, the Hedge House is using its space for a spatially all-encompassing artwork.’</span></p><span data-dcnode-id="5764" instrument_node="">
</span><p data-dcnode-id="5760"><span data-dcnode-id="5763" instrument_node="">’P. Struycken–Color: Profusion and Variability’</span><br data-dcnode-id="5762"><span data-dcnode-id="5761" instrument_node="">March 3, 2019-November 10, 2019</span></p><span data-dcnode-id="5759" instrument_node="">
</span><p data-dcnode-id="5756"><a data-dcnode-id="5757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kasteelwijlre.nl/en/programme/p-struycken-colour-profusion-and-variability/"><span data-dcnode-id="5758" instrument_node="">Read more about the exhibition</span></a></p><span data-dcnode-id="5755" instrument_node="">
</span><p data-dcnode-id="5752"><a data-dcnode-id="5753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/hedge_house/"><span data-dcnode-id="5754" instrument_node="">Read more about the Hedge House</span></a></p><span data-dcnode-id="5751" instrument_node="">

</span><h2 data-dcnode-id="5738"><span data-dcnode-id="5739" instrument_node="">
					WAA progress construction on the new Hotel Van der Valk in Amsterdam’s Zuidas District
				</span></h2><span data-dcnode-id="5737" instrument_node="">
</span><p data-dcnode-id="5735"><span data-dcnode-id="5736" instrument_node="">With origins as a highway-centric hotel chain for travelers by automobile; Van der Valk is an international company, whose roots are Dutch, and whose hotels are almost always sited adjacent to highways, providing comfortable lodging and dining for those traveling long distances by car–as well as locals. Seeking to reposition itself in the Dutch market, while spurring a renewal of its image; the chain, long known for its hotels sited in-between major Dutch cities, will add a new location to their portfolio of properties, with a 26.000 m2 hotel in Amsterdam's Zuidas district. Situated along the southern edge of the ring highway that encircles the city–the A10–the new hotel encompasses circa 240 rooms...</span></p><span data-dcnode-id="5734" instrument_node="">
</span><p data-dcnode-id="5731"><a data-dcnode-id="5732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/van_der_valk_hotel/"><span data-dcnode-id="5733" instrument_node="">Read more about the Van der Valk Hotel</span></a></p><span data-dcnode-id="5730" instrument_node="">

</span><h2 data-dcnode-id="5717"><span data-dcnode-id="5718" instrument_node="">
					WAA progress construction on Europaallee 'Site D' in Zürich
				</span></h2><span data-dcnode-id="5716" instrument_node="">
</span><h1 data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">This new mixed-use office and retail building is an integral component of Zürich's ‘Europaallee’, a currently emerging district adjacent to the city's central train station. The building is currently known as ‘Site D’ due to the numbers of buildings in the central Europaallee district; eight in total, each assigned a letter, ‘A' through 'H’. A plinth of retail programming anchors the building to its site, while its upper volumes consist of flexible office spaces that, due to their shallow depth and efficient façade grid, can be occupied by several individual companies or a larger singular tenant. These dual programs posed the challenge of creating two lighting and spatial requirements within this prominently sited building. The main entry is positioned along the parallel street named Europaallee, and opens onto the ground floor’s main retail, dining, and circulation spaces. From the ground floor, a central staircase complemented by two ramping escalators traverses and connects these areas. Eight floors of office space are set atop the plinth, and are organized around a multi-level exterior courtyard, essentially creating two office ‘towers’...</span></h1><span data-dcnode-id="5713" instrument_node="">
</span><br data-dcnode-id="5712"><span data-dcnode-id="5711" instrument_node="">
</span><h1 data-dcnode-id="5708"><a data-dcnode-id="5709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/europaallee_site_d/"><span data-dcnode-id="5710" instrument_node="">Read more about Europaallee 'Site D'</span></a></h1><span data-dcnode-id="5707" instrument_node="">
</span></div><span data-dcnode-id="5705" instrument_node="">

</span><img alt="" data-dcnode-id="5701" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005172image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5700" instrument_node="">

</span><h2 data-dcnode-id="5694"><span data-dcnode-id="5695" instrument_node="">
					Schwäbisch Media is published in esteemed Chinese architecture publication Gooood
				</span></h2><span data-dcnode-id="5693" instrument_node="">
</span><p data-dcnode-id="5689"><i data-dcnode-id="5691"><span data-dcnode-id="5692" instrument_node="">Gooood</span></i><span data-dcnode-id="5690" instrument_node="">, one of China's leading architecture and design websites, has published the WAA project Schäbsich Media–the office of a broadcasting, and publishing office in Schwäbia, Germany. The office was completed in 2013, and is currently undergoing a delicate expansion that retains the building's original morphology, which is expected to be completed in the coming years.&nbsp;</span></p><span data-dcnode-id="5688" instrument_node="">
</span><p data-dcnode-id="5683"><a data-dcnode-id="5684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooood.cn/schwabisch-media-by-wiel-arets-architects.htm"><span data-dcnode-id="5687" instrument_node="">View Schwäbisch Media on </span><i data-dcnode-id="5685"><span data-dcnode-id="5686" instrument_node="">Gooood</span></i></a></p><span data-dcnode-id="5682" instrument_node="">
</span></div><span data-dcnode-id="5680" instrument_node="">
</span></div><span data-dcnode-id="5678" instrument_node="">
</span><div class="news item cf" data-dcnode-id="5652"><span data-dcnode-id="5677" instrument_node="">
</span><img alt="" data-dcnode-id="5676" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005159image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5675" instrument_node="">
</span><div class="text" data-dcnode-id="5654"><span data-dcnode-id="5674" instrument_node="">
</span><div class="date" data-dcnode-id="5672"><span data-dcnode-id="5673" instrument_node="">February 25, 2019</span></div><span data-dcnode-id="5671" instrument_node="">
</span><h2 data-dcnode-id="5669"><span data-dcnode-id="5670" instrument_node="">
					WAA publish new photography of Schwäbisch Media in Ravensburg, Germany
				</span></h2><span data-dcnode-id="5668" instrument_node="">
</span><p data-dcnode-id="5660"><span data-dcnode-id="5667" instrument_node="">This office-headquarters for a regional publishing company, Schwäbisch Media, was completed in 2013, encompasses 13.000 m</span><sup data-dcnode-id="5665"><span data-dcnode-id="5666" instrument_node="">2, </span></sup><span data-dcnode-id="5664" instrument_node="">and is outfit with all the facilities needed for television and radio broadcast. It is composed of a large ground floor, which connects six smaller volumes arranged so as to recall the form of the area's </span><i data-dcnode-id="5662"><span data-dcnode-id="5663" instrument_node="">fachwerk</span></i><span data-dcnode-id="5661" instrument_node="">, or half-timbered houses from centuries past. The building is bound by a tall glass fence, which in some instances–such as when the building abuts the city's sidewalks–becomes the glazing of the ground floor, thus merging with the building. The building houses 350 employees, and will soon undergo an expansion designed by WAA, partly due to the building's design and success.</span></p><span data-dcnode-id="5659" instrument_node="">
</span><p data-dcnode-id="5656"><a data-dcnode-id="5657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/schwaebisch_media/"><span data-dcnode-id="5658" instrument_node="">Read more about&nbsp;Schwäbisch Media</span></a></p><span data-dcnode-id="5655" instrument_node="">
</span></div><span data-dcnode-id="5653" instrument_node="">

</span><img alt="" data-dcnode-id="5649" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005162image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5648" instrument_node="">

</span><div class="date" data-dcnode-id="5645"><span data-dcnode-id="5646" instrument_node="">February 20, 2019</span></div><span data-dcnode-id="5644" instrument_node="">
</span><h2 data-dcnode-id="5642"><span data-dcnode-id="5643" instrument_node="">
					Wiel Arets to participate in Bauhaus conference in Berlin, Germany
				</span></h2><span data-dcnode-id="5641" instrument_node="">
</span><p data-dcnode-id="5639"><span data-dcnode-id="5640" instrument_node="">On March 1st, Wiel Arets will participate in the 2019 ‘100 Years Bauhaus: What interest do We Take in Modernism Today’ conference in Berlin, Germany. Arets is the keynote speaker of the event’s evening podium discussion, centering on the issue of, ‘the 100th anniversary of the Bauhaus as an opportunity to discuss the significance of modernity in the 21st century. The conference focus will be on the concepts, visions, and impulses emanating from Modern Movement and how they can be related to today’s social, economic, cultural and in particular creative issues.’&nbsp;</span></p><span data-dcnode-id="5638" instrument_node="">
</span><p data-dcnode-id="5632"><span data-dcnode-id="5637" instrument_node="">Werkstatt der Kulturen</span><br data-dcnode-id="5636"><span data-dcnode-id="5635" instrument_node="">Wissmannstraße 32</span><br data-dcnode-id="5634"><span data-dcnode-id="5633" instrument_node="">12049 Berlin, Germany</span></p><span data-dcnode-id="5631" instrument_node="">
</span><p data-dcnode-id="5628"><a data-dcnode-id="5629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rmb-eu.com/"><span data-dcnode-id="5630" instrument_node="">Read more about the event</span></a></p><span data-dcnode-id="5627" instrument_node="">
</span></div><span data-dcnode-id="5625" instrument_node="">

</span><img alt="" data-dcnode-id="5621" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005154image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5620" instrument_node="">

</span><h2 data-dcnode-id="5614"><span data-dcnode-id="5615" instrument_node="">
					Wiel Arets to lecture at the Academy of Fine Arts in Maastricht
				</span></h2><span data-dcnode-id="5613" instrument_node="">
</span><p data-dcnode-id="5611"><span data-dcnode-id="5612" instrument_node="">On Thursday 29 November at 20:00, at the Academy of Fine Arts in Maastricht, Wiel Arets will lecture on the evolution of his eponymous studio's work. The lecture will revisit several early building including the Academy of Fine Arts, and their relation to other works in the&nbsp;oeuvre.&nbsp;</span></p><span data-dcnode-id="5610" instrument_node="">
</span><p data-dcnode-id="5599"><span data-dcnode-id="5609" instrument_node="">November 29th, 2018 20:00</span><br data-dcnode-id="5608"><br data-dcnode-id="5607"><span data-dcnode-id="5606" instrument_node="">Academy&nbsp;of Fine Arts</span><br data-dcnode-id="5605"><span data-dcnode-id="5604" instrument_node="">Herdenkingsplein 12</span><br data-dcnode-id="5603"><span data-dcnode-id="5602" instrument_node="">6211 PW Maastricht</span><br data-dcnode-id="5601"><span data-dcnode-id="5600" instrument_node="">the Netherlands</span></p><span data-dcnode-id="5598" instrument_node="">

</span><img alt="" data-dcnode-id="5589" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005152image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5588" instrument_node="">

</span><div class="date" data-dcnode-id="5585"><span data-dcnode-id="5586" instrument_node="">November 12, 2018</span></div><span data-dcnode-id="5584" instrument_node="">
</span><h2 data-dcnode-id="5582"><span data-dcnode-id="5583" instrument_node="">
					Wiel Arets to lecture at the University of Sassari
				</span></h2><span data-dcnode-id="5581" instrument_node="">
</span><p data-dcnode-id="5579"><span data-dcnode-id="5580" instrument_node="">On Monday 12 November at 17:00, at the University of Sassari in Alghero, Wiel Arets will lecture under the tile ‘Timeless Making’. The lecture will revisit several early works of Wiel Arets Architects (WAA), including the Academy of Architecture in Maastricht, and their representation in photography; the evolution of the use of transparency in the buildings; and ways that the work is represented in photography today.</span></p><span data-dcnode-id="5578" instrument_node="">
</span><p data-dcnode-id="5567"><span data-dcnode-id="5577" instrument_node="">November 12th, 2018 17:00</span><br data-dcnode-id="5576"><br data-dcnode-id="5575"><span data-dcnode-id="5574" instrument_node="">University of Sassari</span><br data-dcnode-id="5573"><span data-dcnode-id="5572" instrument_node="">Architecture and Design </span><br data-dcnode-id="5571"><span data-dcnode-id="5570" instrument_node="">Aula 7, Complesso Santa Chiara</span><br data-dcnode-id="5569"><span data-dcnode-id="5568" instrument_node="">Alghero, Sardinia, Italy</span></p><span data-dcnode-id="5566" instrument_node="">

</span><img alt="" data-dcnode-id="5557" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_005105image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5556" instrument_node="">
</span><div class="text" data-dcnode-id="5541"><span data-dcnode-id="5555" instrument_node="">
</span><div class="date" data-dcnode-id="5553"><span data-dcnode-id="5554" instrument_node="">September 21, 2018</span></div><span data-dcnode-id="5552" instrument_node="">
</span><h2 data-dcnode-id="5550"><span data-dcnode-id="5551" instrument_node="">
					WAA publish new photography of Leidsche Rijn College in Utrecht
				</span></h2><span data-dcnode-id="5549" instrument_node="">
</span><p data-dcnode-id="5547"><span data-dcnode-id="5548" instrument_node="">Leidsche Rijn College is situated about 30 minutes south of Amsterdam, and was completed in the mid-2000’s. It is a custom designed school for secondary education, whose load bearing, prefabricated, and textured façade elements lend to it, a monumental scale. Four wings branch out from a central volume, whose roof is suspended from four massive I-beams, which–much like S. R. Crown Hall by Mies van der Rohe in Chicago–allow the central space to be column free. Contained within the double-height ground floor of the central volume are two staircases that function as both seating and the primary routing. On the double-height third floor are three basketball courts, which can mutate to accommodate several sports. This series of new photographs provides a glimpse of the school's daily life.</span></p><span data-dcnode-id="5546" instrument_node="">
</span><p data-dcnode-id="5543"><a data-dcnode-id="5544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/leidsche_rijn_college/"><span data-dcnode-id="5545" instrument_node="">Read more about Leidsche Rijn College</span></a></p><span data-dcnode-id="5542" instrument_node="">

</span><h2 data-dcnode-id="5529"><span data-dcnode-id="5530" instrument_node="">
					WAA progress construction on Europaallee 'Site D' in Zürich
				</span></h2><span data-dcnode-id="5528" instrument_node="">
</span><p data-dcnode-id="5526"><span data-dcnode-id="5527" instrument_node="">Europaallee is a new urban district west of the city’s main train station, south of its terminating tracks. It consists of eight new buildings, each assigned a letter, ’A-H’; ‘Site D’ was designed by WAA. Google is the district’s main tenant, and will occupy most office space in ‘Site D’. Parallel to the adjacent railroad tracks; the first two floors will contain retail and dining, organized around a central void traversed by dual ramping escalators. Eight floors of office space are set atop the plinth, organized around an multi-level exterior courtyard, essentially creating two office ‘towers’. A closed cavity fau0003çade system, bound by polished concrete containing Carrara marble, encases the building; luxuriously contrasting matte-brass finishings.</span></p><span data-dcnode-id="5525" instrument_node="">
</span><p data-dcnode-id="5522"><a data-dcnode-id="5523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/europaallee_site_d/"><span data-dcnode-id="5524" instrument_node="">Read more about Europaallee ‘Site D’</span></a></p><span data-dcnode-id="5521" instrument_node="">

</span><h2 data-dcnode-id="5508"><span data-dcnode-id="5509" instrument_node="">
					The Antwerp Tower is published in Architectenweb
				</span></h2><span data-dcnode-id="5507" instrument_node="">
</span><p data-dcnode-id="5502"><span data-dcnode-id="5506" instrument_node="">The role photography has played in assisting to create the renderings of the design for the Antwerp Tower–which is currently being renovated from its original state, into a 100 m tall luxury residential tower of 290 apartments–is currently featured in a spread, in the June edition of the Dutch architecture and design magazine, of&nbsp;</span><i data-dcnode-id="5504"><span data-dcnode-id="5505" instrument_node="">Architectenweb</span></i><span data-dcnode-id="5503" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="5501" instrument_node="">
</span><p data-dcnode-id="5498"><a data-dcnode-id="5499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/antwerp_tower/"><span data-dcnode-id="5500" instrument_node="">Read more about the Antwerp Tower</span></a></p><span data-dcnode-id="5497" instrument_node="">

</span><img alt="" data-dcnode-id="5491" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004917image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5490" instrument_node="">

</span><h2 data-dcnode-id="5484"><span data-dcnode-id="5485" instrument_node="">
					WAA progress construction on the Antwerp Tower in Antwerp, Belgium
				</span></h2><span data-dcnode-id="5483" instrument_node="">
</span><p data-dcnode-id="5481"><span data-dcnode-id="5482" instrument_node="">The Antwerp Tower is a skyscraper in the center of Antwerp, which itself is currently being renovated from an office tower to a building with 290 luxury apartments, based off a design by WAA. The tower is part of a larger renovation of the area directly around its base–the Keyserlei, which is the main pedestrian avenue that leads from Antwerp’s central train station–into the center of the city. The design of the Antwerp Tower entails extending the width of the marquise-diamond-like floorpan, increasing its height to 100 m, and demolishing and repurposing the space directly between the opera house and the tower–to create a four story plinth at the tower’s base, for restaurants and cafés, with a roof terrace for overlooking the city below.</span></p><span data-dcnode-id="5480" instrument_node="">
</span><p data-dcnode-id="5477"><a data-dcnode-id="5478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/antwerp_tower/"><span data-dcnode-id="5479" instrument_node="">Read more about the Antwerp Tower</span></a></p><span data-dcnode-id="5476" instrument_node="">

</span><img alt="" data-dcnode-id="5470" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004912image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5469" instrument_node="">
</span><div class="text" data-dcnode-id="5447"><span data-dcnode-id="5468" instrument_node="">
</span><div class="date" data-dcnode-id="5466"><span data-dcnode-id="5467" instrument_node="">May  1, 2018</span></div><span data-dcnode-id="5465" instrument_node="">
</span><h2 data-dcnode-id="5463"><span data-dcnode-id="5464" instrument_node="">
					WAA win the 2018 Amsterdam Architecture Prize for the IJhal
				</span></h2><span data-dcnode-id="5462" instrument_node="">
</span><p data-dcnode-id="5460"><span data-dcnode-id="5461" instrument_node="">During an awards ceremony held on the 12th of April in Amsterdam, Wiel Arets Architects were awarded the 2018 ‘Amsterdam Architecture Prize’, for the IJhal–the nearly 325 m long, primary pedestrian passage within Amsterdam’s central train station. It is outfit with terrazzo floors, and mirrored ceilings and columns, to maximize visual space. The award consists of a trade jury and a public jury; the IJhal won the award as bestowed by the public jury. So states their report: ‘Everything mirrors and moves in a playful manner. The color cacophony of too many restaurant and shop signs has been prevented; they are all displayed in white. Only the lettering of NS and other, important information for the traveler, has been made in the relevant house style. Architect and client have made it a celebration and do not burden their guests with "wine from the bottom of the supermarket shelves." The IJhal exudes luxury and grandeur, and is an enrichment of Amsterdam, and a present for all Amsterdammers and the many tourists.’</span></p><span data-dcnode-id="5459" instrument_node="">
</span><p data-dcnode-id="5453"><span data-dcnode-id="5458" instrument_node="">The IJhal was officially opened in late 2016, and, for most visitors to the city by train or bus, is their first point of entry to Amsterdam.</span><br data-dcnode-id="5457"><br data-dcnode-id="5456"><a data-dcnode-id="5454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/ijhal/"><span data-dcnode-id="5455" instrument_node="">Read more about the IJhal</span></a></p><span data-dcnode-id="5452" instrument_node="">
</span><p data-dcnode-id="5449"><a data-dcnode-id="5450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arcam.nl/wp-content/uploads/2018/04/Publiekjuryrapport-Gouden-AAP-2018.pdf"><span data-dcnode-id="5451" instrument_node="">Read the full report of the jury</span></a></p><span data-dcnode-id="5448" instrument_node="">

</span><img alt="" data-dcnode-id="5442" height="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004905image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5441" instrument_node="">

</span><div class="date" data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">April 10, 2018</span></div><span data-dcnode-id="5437" instrument_node="">
</span><h2 data-dcnode-id="5435"><span data-dcnode-id="5436" instrument_node="">
					WAA publish new photography of the H’ House in Maastricht
				</span></h2><span data-dcnode-id="5434" instrument_node="">
</span><p data-dcnode-id="5425"><span data-dcnode-id="5433" instrument_node="">The H’ House is situated in the south of the Netherlands, and was completed in early 2010. It is a custom designed all glass home for two landscapists, who have created a formal garden behind the house, complete with parterres and sinuous topiaries. Sliding glass panels allow access to the garden from the house’s living room. And several peacocks can often be found roaming the garden at leisure. In June 2011, this private residence was featured in the magazine </span><i data-dcnode-id="5431"><span data-dcnode-id="5432" instrument_node="">Architectural Record</span></i><span data-dcnode-id="5430" instrument_node="">, as its ‘House of the Month’. This series of new photographs provides an intimate view into the garden and interior of this refined house, which is composed of various degrees of transparent and translucent panels.</span><br data-dcnode-id="5429"><br data-dcnode-id="5428"><a data-dcnode-id="5426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/en/projects/h_house/"><span data-dcnode-id="5427" instrument_node="">Read more about the H' House</span></a></p><span data-dcnode-id="5424" instrument_node="">
</span></div><span data-dcnode-id="5422" instrument_node="">
</span></div><span data-dcnode-id="5420" instrument_node="">
</span><div class="news item cf" data-dcnode-id="5397"><span data-dcnode-id="5419" instrument_node="">
</span><img alt="" data-dcnode-id="5418" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004878image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5417" instrument_node="">
</span><div class="text" data-dcnode-id="5399"><span data-dcnode-id="5416" instrument_node="">
</span><div class="date" data-dcnode-id="5414"><span data-dcnode-id="5415" instrument_node="">March 28, 2018</span></div><span data-dcnode-id="5413" instrument_node="">
</span><h2 data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">
					The IJhal is nominated for the 2018 Amsterdam Architecture Prize
				</span></h2><span data-dcnode-id="5410" instrument_node="">
</span><p data-dcnode-id="5401"><span data-dcnode-id="5409" instrument_node="">The IJhal is a recently completed pedestrian passageway situated within Amsterdam’s central train station, on its the northern, waterside–which abuts the river it’s named for, the IJ. It is one of 10 projects nominated for the 2018 Amsterdam Architecture Prize.&nbsp;The passage is meant to encourage constant pedestrian movement, simultaneously remaining durable under the foot traffic of tens of thousands of travelers each day. A system of modular, rounded mirrored elements adorns the ceiling, arranged in a playful grid that introduces a sense of movement, communicating in tandem with the mirrors that wrap the passage’s load bearing poles. </span><br data-dcnode-id="5408"><br data-dcnode-id="5407"><span data-dcnode-id="5406" instrument_node="">The winner will be announced on 12 April at Hotel Arena in Amsterdam.</span><br data-dcnode-id="5405"><br data-dcnode-id="5404"><a data-dcnode-id="5402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arcam.nl/nominaties-amsterdamse-architectuur-prijs-2018-bekend/"><span data-dcnode-id="5403" instrument_node="">Read more about the award</span></a></p><span data-dcnode-id="5400" instrument_node="">

</span><img alt="" data-dcnode-id="5394" height="514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wielaretsarchitects.com/images/3_004876image.jpg&amp;raw" style="opacity: 0;" width="771"><span data-dcnode-id="5393" instrument_node="">
