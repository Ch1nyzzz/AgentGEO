?index=cw22&amp;url=https%3A//www.britannica.com/biography/Francois-Mitterrand"><span data-dcnode-id="503" instrument_node="">François Mitterrand</span></a><span data-dcnode-id="501" instrument_node="">’s “Grands Projets,” the Pyramide was part of a much-needed rationalization of France’s greatest museum. Since the early 19th century, the sprawling Palais du Louvre has housed the extensive highlights of the state collection of antiquities and fine and decorative arts. By the 1980s the entrance spaces were inadequate for the yearly millions of visitors, endless corridors left tourists exhausted and lost, and the curatorial facilities were appalling. Digging out the larger courtyard gave a generous foyer, the wings of the museum were united, and space was created for facilities and shops. The appointment of </span><a class="md-crosslink" data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/I-M-Pei"><span data-dcnode-id="500" instrument_node="">I.M. Pei</span></a><span data-dcnode-id="498" instrument_node="">, a Chinese-born American, rather than a French architect, was regarded as shocking—perhaps explaining why it was the only Grand Projet not to receive an architectural award.</span></p><span class="AM52 am-inline" data-dcnode-id="494"></span><span class="MOD52" data-dcnode-id="492"></span><span data-dcnode-id="491" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">The great glass pyramid over the foyer solves all the problems of a subterranean entrance: it draws visitors in by its striking shape and, with the three smaller flanking pyramids, lights the space below. The pyramids, together with fountains and pools, are unequivocally modern, but they also hold echoes of French garden planning, which relate them to their palatial context. The fine Egyptian collection of the museum makes the pyramid an especially resonant shape.</span></p><span class="AM53 am-inline" data-dcnode-id="485"></span><span class="MOD53" data-dcnode-id="483"></span><span data-dcnode-id="482" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Initially disliked by many as inappropriately modern, the Pyramide is now widely loved. Inside, the pyramid soars high above, and a great slab of perfect concrete stands on the slenderest of stone columns. (Barnabas Calder)</span></p><span class="AM54 am-inline" data-dcnode-id="476"></span><span class="MOD54" data-dcnode-id="474"></span><span data-dcnode-id="473" instrument_node=""> </span></div><span class="LIST-ITEM-20" data-dcnode-id="470"></span></li><li data-dcnode-id="435"><h2 data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Opéra de la Bastille</span></h2><div data-dcnode-id="438"><span data-dcnode-id="466" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="457"><span data-dcnode-id="464" instrument_node="">The Opéra de la Bastille was developed for new creative concepts and technical innovation, as opposed to the illusionistic bourgeois theater epitomized by the layers of </span><em data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">trompe l’oeil</span></em><span data-dcnode-id="461" instrument_node=""> painted backcloths of the Opéra Garnier and earlier theaters. The idea of a “people’s opera” is reinforced by the introduction of a subway station and commercial activities into the precincts of the building. Designed by Canadian-Uruguayan architect Carlos Ott, it is one of the Grands Projets masterminded by </span><a class="md-crosslink" data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Francois-Mitterrand"><span data-dcnode-id="460" instrument_node="">François Mitterrand</span></a><span data-dcnode-id="458" instrument_node=""> to symbolize France’s central role in art, politics, and the world economy. </span></p><span class="AM55 am-inline" data-dcnode-id="454"></span><span class="MOD55" data-dcnode-id="452"></span><span data-dcnode-id="451" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="445"><span data-dcnode-id="449" instrument_node="">Conceived as a popular venue for modern classical music and opera, it replaced the Opéra Garnier as the home of the Opéra National de Paris. It offers the facilities to create three-dimensional sets, with revolving stages, rehearsal areas, and costume and prop workshops. Its acoustically consistent seats all have an unrestricted view of the stage. The design was intended to present an iconic formal simplicity and to create an open and democratic invitation to enter the theater. This lack of </span><em data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">hauteur</span></em><span data-dcnode-id="446" instrument_node=""> is marked by the anonymous, transparent, and featureless facades, black granite floors, and the application of identical square limestone blocks for the exterior and the interior. (Jeremy Hunt)</span></p><span class="AM56 am-inline" data-dcnode-id="442"></span><span class="MOD56" data-dcnode-id="440"></span><span data-dcnode-id="439" instrument_node=""> </span></div><span class="LIST-ITEM-21" data-dcnode-id="436"></span></li><li data-dcnode-id="401"><h2 data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">La Grande Arche de la Défense</span></h2><div data-dcnode-id="404"><span data-dcnode-id="432" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">La Grande Arche de la Défense, also known as La Grande Arche de l'Humanité, is an open cube and terminating landmark on the “Grand Ax” of Paris. The renovation of the axis was part of a series of modern cultural monuments in commemoration of the 200th anniversary of the French Revolution, in 1989.</span></p><span class="AM57 am-inline" data-dcnode-id="426"></span><span class="MOD57" data-dcnode-id="424"></span><span data-dcnode-id="423" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Danish architect Johann Otto von Spreckelsen’s (1929–87) scheme was chosen for its “purity and strength” and was based on simple geometrical figures. When von Spreckelsen retired from the project, it was completed by Paul Andreu (1938–2018).</span></p><span class="AM58 am-inline" data-dcnode-id="417"></span><span class="MOD58" data-dcnode-id="415"></span><span data-dcnode-id="414" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">The modern triumphal squared arch is the centerpiece of La Défense—a futuristic complex of 50 office towers. It is a prestressed concrete structure housing a 35-story office building. It rises 360 feet (110 meters), faced in glass, granite, and white Carrara marble. It sits in a 328-feet-diameter (100 meter) square approached by banks of steps. The building is rotated 6 degrees off center of the Grand Ax. This was not part of the original design but had to be done so that the piles supporting the structure could avoid the network of tunnels under the site. (Jeremy Hunt)</span></p><span class="AM59 am-inline" data-dcnode-id="408"></span><span class="MOD59" data-dcnode-id="406"></span><span data-dcnode-id="405" instrument_node=""> </span></div><span class="LIST-ITEM-22" data-dcnode-id="402"></span></li><li data-dcnode-id="371"><h2 data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Bibliothèque François-Mitterrand</span></h2><div data-dcnode-id="374"><span data-dcnode-id="398" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="392"><span data-dcnode-id="396" instrument_node="">Très Grande Bibliothèque (TGB, or Very Large Library): just a code name for what was an urban and bureaucratic utopia before it took shape in the form of an actual building. Certainly the most emblematic of President </span><a class="md-crosslink" data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Francois-Mitterrand"><span data-dcnode-id="395" instrument_node="">François Mitterrand</span></a><span data-dcnode-id="393" instrument_node="">’s Grands Projets (together with the Grand Louvre), it was bound to be the ultimate library, an innovative tool for culture, education, and archiving. It was meant to break new ground in a derelict industrial area and to initiate a new urbanity. </span></p><span class="AM60 am-inline" data-dcnode-id="389"></span><span class="MOD60" data-dcnode-id="387"></span><span data-dcnode-id="386" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="381"><a class="md-crosslink" data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Dominique-Perrault"><span data-dcnode-id="384" instrument_node="">Dominique Perrault</span></a><span data-dcnode-id="382" instrument_node="">, an architect who had built a mere fraction of the square feet allocated for the TGB, won the international competition. His scheme was simple: readers and researchers would use a secluded garden dug into the ground and open onto the sky, topped by a wooden deck, flanked by four book-shaped corner storage towers. The lines were pure, the surfaces seducing, and the aspiration high: replace and update the old Bibliothèque Nationale and thus shift the intellectual center of Paris toward the east of the city. The TGB was surrounded for many years by wasteland, then by construction sites. However, what long appeared as a forlorn bastion became the heart of a multifunctional neighborhood. (Yves Nacher)</span></p><span class="AM61 am-inline" data-dcnode-id="378"></span><span class="MOD61" data-dcnode-id="376"></span><span data-dcnode-id="375" instrument_node=""> </span></div><span class="LIST-ITEM-23" data-dcnode-id="372"></span></li><li data-dcnode-id="337"><h2 data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Flower Tower</span></h2><div data-dcnode-id="340"><span data-dcnode-id="368" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">The Maison Vegetale, or Flower Tower, is a social housing block disguised as a vertical urban garden wrapped in an outer screen of green bamboo plants. The screen promotes green design to make low-cost housing more attractive and environmentally sound, and it differentiates the building from its fellows in a complex of many similar public housing blocks.</span></p><span class="AM62 am-inline" data-dcnode-id="362"></span><span class="MOD62" data-dcnode-id="360"></span><span data-dcnode-id="359" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">The monolithic 107,640-square-foot (10,000-square-meter) structure relates to an adjacent park through the permanent presence of quick-growing bamboo in hundreds of concrete pots lining the balconies of apartments on three sides of the 10-story building. The flowerpots have an irrigation system where fertilizer is added to the water in a basement storage tank and the solution is pumped up to the balconies. The result is a self-sustaining bamboo garden that remains constant throughout the year. Variety is added by the seasonal flowering of blue-violet morning glories. The bamboo grows to about 13 feet (4 meters) and provides cool shade and privacy for the residents. The greenery partly conceals the building’s unique variegated two-tone concrete appearance, resulting from the deliberate specification of two aggregates for the walls, a white cement sourced from France and a gray color from Belgium.</span></p><span class="AM63 am-inline" data-dcnode-id="353"></span><span class="MOD63" data-dcnode-id="351"></span><span data-dcnode-id="350" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Other projects by the Flower Tower’s architect, Edouard François, also reflect his focus on green architecture and sustainable development. They include “Sprouting Building,” in Montpellier (2000), with exterior walls featuring rocks held in place by a plant-covered stainless-steel net, and the “Alliance Française” in New Delhi (2001). (Jeremy Hunt)</span></p><span class="AM64 am-inline" data-dcnode-id="344"></span><span class="MOD64" data-dcnode-id="342"></span><span data-dcnode-id="341" instrument_node=""> </span></div><span class="LIST-ITEM-24" data-dcnode-id="338"></span></li><li data-dcnode-id="297"><h2 data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Quai Branly Museum </span></h2><div data-dcnode-id="300"><span data-dcnode-id="334" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="328"><span data-dcnode-id="332" instrument_node="">Described by its architect, </span><a class="md-crosslink" data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Jean-Nouvel"><span data-dcnode-id="331" instrument_node="">Jean Nouvel</span></a><span data-dcnode-id="329" instrument_node="">, as space organized around “the symbols of the forest, the river, and the obsessions of death and oblivion,” the Quai Branly Museum is an ensemble of four connected buildings comprising plate glass, natural woods, and concrete integrated with nature and vegetation. The dominant feature is an aerial, pierlike, rectangular box containing a 656-foot-long (200-meter) exhibition hall perched on 33-foot- (10-meter-) high curved supporting pillars, “hovering” over an undulating landscaped garden. The external structure on the riverside facade presents a horizontal row of 26 protruding cubes in multicolored earth tones.</span></p><span class="AM65 am-inline" data-dcnode-id="325"></span><span class="MOD65" data-dcnode-id="323"></span><span data-dcnode-id="322" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Inside, a five-story atrium and a spiraling 656-foot- (200-meter-) long ramp connect to the exhibition area and roof terrace. This space is one large gallery, divided by leather-covered partitions and devoted to the arts and civilizations of Africa, Asia, Oceania, and the Americas. The boxes protruding from the building are thematic rooms, and freestanding display cabinets and ramped floors enable discovery of thousands of objects on display. The reserve collection is visible in a glass-fronted, central, circular vault.</span></p><span class="AM66 am-inline" data-dcnode-id="316"></span><span class="MOD66" data-dcnode-id="314"></span><span data-dcnode-id="313" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="307"><span data-dcnode-id="311" instrument_node="">The garden is separated from the Quai Branly and River Seine by an 8,600-square-foot (800-square-meter) vertical wall of vegetation that is 40 feet (12 meters) high. The metaphor is of visitor as explorer discovering the building like a Mayan ruin in a jungle. The museum addresses the question of </span><em data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">décontextualisation</span></em><span data-dcnode-id="308" instrument_node="">—whether artifacts isolated from their ethnographic context should be presented within the ethnocentric Western museum culture. (Jeremy Hunt)</span></p><span class="AM67 am-inline" data-dcnode-id="304"></span><span class="MOD67" data-dcnode-id="302"></span><span data-dcnode-id="301" instrument_node=""> </span></div><span class="LIST-ITEM-25" data-dcnode-id="298"></span></li><li data-dcnode-id="248"><h2 data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Fondation Louis Vuitton</span></h2><div data-dcnode-id="251"><span data-dcnode-id="294" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="288"><span data-dcnode-id="292" instrument_node="">The Fondation Louis Vuitton is in Paris’s Bois de Boulogne, a large public park. This is a relatively affluent area, so—unlike some of </span><a class="md-crosslink" data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Frank-Gehry"><span data-dcnode-id="291" instrument_node="">Frank Gehry</span></a><span data-dcnode-id="289" instrument_node="">’s other museums, the Guggenheim in Bilbao being a prime example—the Fondation Louis Vuitton is not an attempt at regeneration but simply a magnificent new facility in an unexpected location.</span></p><span class="AM68 am-inline" data-dcnode-id="285"></span><span class="MOD68" data-dcnode-id="283"></span><span data-dcnode-id="282" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Built on the edge of a specially constructed water garden, this contemporary art gallery was designed to be as welcoming and attractive as possible to the children who play in the park and their parents. It consists of a series of stacked boxes that form exhibition spaces but whose logic is masked from the outside by wrapping them in a series of overlapping “sails” of glass that are supported by steel columns and glue-laminated timber beams. The architecture of the building is inspired by Paris’s historic exhibition hall the Grand Palais.</span></p><span class="AM69 am-inline" data-dcnode-id="276"></span><span class="MOD69" data-dcnode-id="274"></span><span data-dcnode-id="273" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Visitors to the gallery can climb up above the exhibition spaces and onto the roof, where they will find themselves among the sails, enjoying carefully curated views of Paris’s unique skyline. At the lower end, the building has a kind of subterranean undercroft, enhanced by flowing water, where visitors can get a sense of the structural gymnastics that are needed to make something like this stand up; 30 patents for technological innovations were filed as part of the design process.</span></p><span class="AM70 am-inline" data-dcnode-id="267"></span><span class="MOD70" data-dcnode-id="265"></span><span data-dcnode-id="264" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="258"><span data-dcnode-id="262" instrument_node="">This is an obviously extravagant building, a celebration of itself and its wealthy patron </span><a class="md-crosslink" data-dcnode-id="260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Bernard-Arnault"><span data-dcnode-id="261" instrument_node="">Bernard Arnault</span></a><span data-dcnode-id="259" instrument_node=""> as well as of the art collection that it houses. It has been executed with great cleverness by a master of barnstorming. The Fondation Louis Vuitton is architecture as exhibition, an exuberant event of a building. (Ruth Slavid)</span></p><span class="AM71 am-inline" data-dcnode-id="255"></span><span class="MOD71" data-dcnode-id="253"></span><span data-dcnode-id="252" instrument_node=""> </span></div><span class="LIST-ITEM-26" data-dcnode-id="249"></span></li></ul></article><span data-dcnode-id="245" instrument_node="">
