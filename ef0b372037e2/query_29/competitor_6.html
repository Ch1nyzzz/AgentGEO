</span><article class="topic-content content" data-dcnode-id="1435"><div class="md-list-intro pb-20" data-dcnode-id="1647"><figure class="md-assembly md-feature-assembly print-false" data-dcnode-id="1672"><div class="md-assembly-wrapper card-media" data-dcnode-id="1676" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link" data-dcnode-id="1677" data-href="*0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/80/170680-131-DA86771C/Bahai-House-of-Worship-Lotus-Temple-Delhi-India.jpg" style=""><img alt="The Baha'i House of Worship, (Lotus Temple), designed by architect Fariborz Sahba in Delhi, India. (modern architecture; religious temple; religion; Bahapur; white marble)" data-dcnode-id="1678" data-height="675" data-width="900" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/80/170680-131-DA86771C/Bahai-House-of-Worship-Lotus-Temple-Delhi-India.jpg%3Fq%3D60&amp;raw"></a></div><figcaption class="" data-dcnode-id="1673"><cite class="credit d-block mt-5" data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">© paul prescott/Fotolia</span></cite></figcaption></figure><span data-dcnode-id="1671" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">These five places are all historically and architecturally significant buildings unique to Delhi. They offer a physical manifestation of the city’s cultural development through time.</span></p><span class="AM1 am-inline" data-dcnode-id="1665"></span><span class="MOD1" data-dcnode-id="1663"></span><span data-dcnode-id="1662" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1655"><em data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Earlier versions of the descriptions of these buildings first appeared in</span></em><span data-dcnode-id="1658" instrument_node=""> 1001 Buildings You Must See Before You Die</span><em data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">, edited by Mark Irving (2016). Writers’ names appear in parentheses.</span></em></p><span class="AM2 am-inline" data-dcnode-id="1652"></span><span class="MOD2" data-dcnode-id="1650"></span><span data-dcnode-id="1649" instrument_node=""> </span></div><hr data-dcnode-id="1646"><ul class="list-unstyled md-mendel-list md-list-order-" data-dcnode-id="1436" style=""><li data-dcnode-id="1594"><h2 data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Quṭb Mīnār</span></h2><div data-dcnode-id="1597"><span data-dcnode-id="1643" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">One of the first structures of the Islamic architectural legacy, the Quṭb Mīnār stands tall in the midst of the sprawling Qutb complex. The best-preserved building of the complex, it may have been inspired by the minaret of Jām in Afghanistan.</span></p><span class="AM3 am-inline" data-dcnode-id="1637"></span><span class="MOD3" data-dcnode-id="1635"></span><span data-dcnode-id="1634" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1622"><span data-dcnode-id="1632" instrument_node="">The tower was probably commissioned by the first Muslim ruler of Delhi, </span><a class="md-crosslink" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Qutb-al-Din-Aibak"><span data-dcnode-id="1631" instrument_node="">Quṭb al-Dīn Aibak</span></a><span data-dcnode-id="1629" instrument_node="">, although only the first tier was completed during his rule. (He died in 1210.) His successor, </span><a class="md-crosslink" data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Iltutmish"><span data-dcnode-id="1628" instrument_node="">Iltumish</span></a><span data-dcnode-id="1626" instrument_node="">, and thereafter </span><a class="md-crosslink" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Firuz-Shah-Tughluq"><span data-dcnode-id="1625" instrument_node="">Fīrūz Shah Tughluq</span></a><span data-dcnode-id="1623" instrument_node="">, commissioned the subsequent tiers, raising its height to an astounding 238 feet (72.5 meters), making it the tallest brick masonry tower in the world. The diameter of the tower is 47 feet (14.3 meters) at the base, gradually tapering to less than 11.5 feet (3.5 meters) at the top. The tiers are multifaceted cylindrical shafts, with intricate carvings and verses, illustrative of the refinement and evolving craftsmanship of Islamic styles over the different ruling dynasties. Each of the five tiers is marked by a balcony supported by corbels.</span></p><span class="AM4 am-inline" data-dcnode-id="1619"></span><span class="MOD4" data-dcnode-id="1617"></span><span data-dcnode-id="1616" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">There continues to be speculation about the purpose of the tower. Traditionally, all mosques had minarets to call people to prayer. Though the Quṭb Mīnār seems modeled on a similar style and it flanks the Qūwat-ul-Islām&nbsp;mosque, its scale supports the idea that it was envisaged as a victory tower, marking the overthrow of the Chauhan rulers of Delhi by Muḥammad of Ghūr.</span></p><span class="AM5 am-inline" data-dcnode-id="1610"></span><span class="MOD5" data-dcnode-id="1608"></span><span data-dcnode-id="1607" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">The name Quṭb means “axis” and is believed to denote a new axis for Islamic dominion. Whatever the historical pedigree of the tower, it has stood the test of time and continues to be synonymous with the south Delhi skyline. (Bidisha Sinha)</span></p><span class="AM6 am-inline" data-dcnode-id="1601"></span><span class="MOD6" data-dcnode-id="1599"></span><span data-dcnode-id="1598" instrument_node=""> </span></div><span class="LIST-ITEM-1" data-dcnode-id="1595"></span></li><li data-dcnode-id="1548"><h2 data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Jama Masjid </span></h2><div data-dcnode-id="1551"><span data-dcnode-id="1591" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1585"><span data-dcnode-id="1589" instrument_node="">Considered to be one of the last of the Mughal emperor </span><a class="md-crosslink" data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Shah-Jahan"><span data-dcnode-id="1588" instrument_node="">Shah Jahān</span></a><span data-dcnode-id="1586" instrument_node="">’s vast architectural legacies, the Masjid-i-Jahan Numa—meaning “Mosque Commanding a View of the World“ and popularly known as the Jama Masjid—is one of India’s largest and most revered mosques.</span></p><span class="AM7 am-inline" data-dcnode-id="1582"></span><span class="MOD7" data-dcnode-id="1580"></span><span data-dcnode-id="1579" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">It was constructed in 1650–56&nbsp;in the Mughal capital of Shahjahanaba (now known as Old Delhi) opposite the emperor’s home, the Lal Quila (Red Fort). The royal residence had no private place of prayer, and the construction of the mosque beyond its walls was a symbol that the city outside the fort was not deprived of royal patronage. The emperor came to the mosque for his Friday prayers, entering through the East Gate that frames a stunning vista of the old city.</span></p><span class="AM8 am-inline" data-dcnode-id="1573"></span><span class="MOD8" data-dcnode-id="1571"></span><span data-dcnode-id="1570" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">As one ascends the red sandstone steps to one of the three imposing entrances to the complex, the frenzy of the city is left behind, and one steps into the peaceful grand courtyard.</span></p><span class="AM9 am-inline" data-dcnode-id="1564"></span><span class="MOD9" data-dcnode-id="1562"></span><span data-dcnode-id="1561" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Capable of accommodating more than 20,000 devotees, this house of worship is designed in alternating strips of red sandstone and white marble in the well-established Mughal tradition. Its main prayer hall, arches, pillars, and three grand domes all evoke awe. The marble entrances are inlaid with inscriptions from the Qurʾān. (Bidisha Sinha)</span></p><span class="AM10 am-inline" data-dcnode-id="1555"></span><span class="MOD10" data-dcnode-id="1553"></span><span data-dcnode-id="1552" instrument_node=""> </span></div><span class="LIST-ITEM-2" data-dcnode-id="1549"></span></li><li data-dcnode-id="1514"><h2 data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Asian Games Village</span></h2><div data-dcnode-id="1517"><span data-dcnode-id="1545" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">In the postcolonial milieu, it became a challenge for architects in the Indian subcontinent to delve into their past and eclectically reconstruct the fractured social fabric through the built environment. The Asian Games Village in Delhi, completed in 1982, is an example of one such intervention realized through the contemporary design of the traditional courtyard typology of residences. The scheme does not use the pastiche symbolism of architectural elements but finds its reference in the way private and public spaces function with respect to each other.</span></p><span class="AM11 am-inline" data-dcnode-id="1539"></span><span class="MOD11" data-dcnode-id="1537"></span><span data-dcnode-id="1536" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Spread over a 35-acre (14-hectare) site, the Asian Games Village accommodates 700 housing units. Whereas 200 of these are of the individual town-house type, the remaining 500 are apartment units organized over multiple floors. The individual units are based on very simple plans with living areas on the lower level and sleeping areas on the upper level. Each unit then forms a composite, which can be linked to other units on at least two other sides to create clusters or row houses. This allows for a range of open communal spaces both at higher and lower levels.</span></p><span class="AM12 am-inline" data-dcnode-id="1530"></span><span class="MOD12" data-dcnode-id="1528"></span><span data-dcnode-id="1527" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">The complex, by architect Raj Rewal, has received some criticism for being essentially an adult space—not fluid enough to encourage informal play. However, it still stands as one of the more successful contemporary experiments at creating a sustainable community. (Bidisha Sinha)</span></p><span class="AM13 am-inline" data-dcnode-id="1521"></span><span class="MOD13" data-dcnode-id="1519"></span><span data-dcnode-id="1518" instrument_node=""> </span></div><span class="LIST-ITEM-3" data-dcnode-id="1515"></span></li><li data-dcnode-id="1471"><h2 data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Lotus Temple</span></h2><div data-dcnode-id="1474"><span data-dcnode-id="1511" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">A symbol of purity metaphorically rising out of the muddy water of life and blossoming in liberation—that is how the lotus flower has been perceived though eons of cultural and religious evolution in India. The understanding of this is what drove architect Fariborz Sabha to conceive the house of worship for the Baha’i faith in Delhi as an iconographic abstraction of this symbol of faith. </span></p><span class="AM14 am-inline" data-dcnode-id="1505"></span><span class="MOD14" data-dcnode-id="1503"></span><span data-dcnode-id="1502" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">It seems paradoxically apt that the Lotus Temple, or Baha’i Mashriq al-Adhkār, sits in the middle of one of the densest urban mixed-use settlements in southern Delhi. With a backdrop of random land usage and the chaos of coexisting medieval and modern transportation networks, this temple is almost a sigh of relief, evocative of less worldly concerns in its grandeur and elegant simplicity. Conceived as a nine-sided lotus with 27 petals, it sits in a sprawling landscape of 26 acres (10 hectares), with a nine-sided pool forming a base, which gives the illusion of the hall floating independent of any foundation. Each of the petals is constructed in concrete with white Greek marble cladding. Because of the varying curvatures of the petals, each piece of marble was individually dressed in accordance with its intended location and orientation and then assembled on-site. </span></p><span class="AM15 am-inline" data-dcnode-id="1496"></span><span class="MOD15" data-dcnode-id="1494"></span><span data-dcnode-id="1493" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Another remarkable feature of this 111-foot- (34-meter-) high hall of worship, which was completed in 1986, is that the superstructure is designed to act as a light well. The core petals form a bud, which allows light to filter through, and every subsequent layer of petals reinforces the bud. </span></p><span class="AM16 am-inline" data-dcnode-id="1487"></span><span class="MOD16" data-dcnode-id="1485"></span><span data-dcnode-id="1484" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">The Lotus Temple, a retreat for followers of all religions to meditate in, sits peacefully within its urban bedlam, exuding an aura of divinity. It is indeed a successful icon of the translation of an ancient motif into a construct of contemporary belief. “I cannot believe it: it is God’s work,” exclaimed jazz musician Dizzy Gillespie on seeing it. (Bidisha Sinha)</span></p><span class="AM17 am-inline" data-dcnode-id="1478"></span><span class="MOD17" data-dcnode-id="1476"></span><span data-dcnode-id="1475" instrument_node=""> </span></div><span class="LIST-ITEM-4" data-dcnode-id="1472"></span></li><li data-dcnode-id="1437"><h2 data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Poddar Farmhouse</span></h2><div data-dcnode-id="1440"><span data-dcnode-id="1468" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">The luxury of a countryside retreat in an urban context comes in the form of expansive farmhouses for the privileged residents of Delhi. These farmhouses have gained the reputation of being a surreal world of fiction. One can find houses modeled on Swiss chalets or Victorian mansions, all forming what is known as the Punjabi Baroque style. Within this environment, the Poddar Farmhouse by Indrajeet Chatterjee is a refreshing change.</span></p><span class="AM18 am-inline" data-dcnode-id="1462"></span><span class="MOD18" data-dcnode-id="1460"></span><span data-dcnode-id="1459" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Owners of the Sirpur paper mills and a number of hotels, Poddar family members are leading patrons of contemporary Indian art, and their house sits as a showcase for that collection. Situated in more than 2 acres (0.9 hectare) of sprawling landscape, the house, which was completed in 1999, visually integrates with the outside space. The living areas are split over two levels, allowing the family to enjoy stunning views of the landscape and lakes through the large expanses of uninterrupted glass. Primarily executed in exposed concrete bands and infill masonry blocks, the building has a quiet and stoic presence.</span></p><span class="AM19 am-inline" data-dcnode-id="1453"></span><span class="MOD19" data-dcnode-id="1451"></span><span data-dcnode-id="1450" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">The highlight of the structure is the elegant copper roof. Made to resemble a horizontal cascade, it spans the length of the residence. The underside of it is paneled in Myanmar teak, which gives the interior spaces, finished in granite and wood, a warm glow. The Poddar Farmhouse is ultimately a flight of fancy, elegantly grounded in its context. (Lars Teichmann)</span></p><span class="AM20 am-inline" data-dcnode-id="1444"></span><span class="MOD20" data-dcnode-id="1442"></span><span data-dcnode-id="1441" instrument_node=""> </span></div><span class="LIST-ITEM-5" data-dcnode-id="1438"></span></li></ul></article><span data-dcnode-id="1434" instrument_node="">

</span></div><span data-dcnode-id="1269" instrument_node="">
</span><article class="topic-content content" data-dcnode-id="246"><div class="md-list-intro pb-20" data-dcnode-id="1236"><figure class="md-assembly md-feature-assembly print-false" data-dcnode-id="1261"><div class="md-assembly-wrapper card-media" data-dcnode-id="1265" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link" data-dcnode-id="1266" data-href="*0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/85/83885-131-37A85D47/Notre-Dame-de-Paris-France.jpg" style=""><img alt="Cathedral of Notre-Dame, Paris, France." data-dcnode-id="1267" data-height="675" data-width="900" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/85/83885-131-37A85D47/Notre-Dame-de-Paris-France.jpg%3Fq%3D60&amp;raw"></a></div><figcaption class="" data-dcnode-id="1262"><cite class="credit d-block mt-5" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">© Corbis</span></cite></figcaption></figure><span data-dcnode-id="1260" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Paris is known today as the City of Lights. Thousands of years ago it was called Midwater-Dwelling—which is how its Latin name, Lutetia, can be translated. This list covers just a few of the most notable structures built in Paris over all of these years.</span></p><span class="AM1 am-inline" data-dcnode-id="1254"></span><span class="MOD1" data-dcnode-id="1252"></span><span data-dcnode-id="1251" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1244"><em data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Earlier versions of the descriptions of these buildings first appeared in</span></em><span data-dcnode-id="1247" instrument_node=""> 1001 Buildings You Must See Before You Die</span><em data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">, edited by Mark Irving (2016). Writers’ names appear in parentheses.</span></em></p><span class="AM2 am-inline" data-dcnode-id="1241"></span><span class="MOD2" data-dcnode-id="1239"></span><span data-dcnode-id="1238" instrument_node=""> </span></div><hr data-dcnode-id="1235"><ul class="list-unstyled md-mendel-list md-list-order-" data-dcnode-id="247" style=""><li data-dcnode-id="1198"><h2 data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Notre-Dame de Paris</span></h2><div data-dcnode-id="1201"><span data-dcnode-id="1232" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1217"><span data-dcnode-id="1230" instrument_node="">Notre-Dame de Paris has been the cathedral of the city of Paris since the Middle Ages. It is a Gothic exemplar of a radical change in the Romanesque tradition of construction, both in terms of naturalistic decoration and revolutionary engineering techniques. In particular, via a framework of flying buttresses, external arched struts receive the lateral thrust of high vaults and provide sufficient strength and rigidity to allow the use of relatively slender supports in the main arcade. The cathedral stands on the Île de la Cité, an island in the middle of the River Seine, on a site previously occupied by Paris’s first Christian church, the Basilica of Saint-Étienne, as well as an earlier Gallo-Roman temple to Jupiter, and the original Notre-Dame, built by </span><a class="md-crosslink" data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Childebert-I"><span data-dcnode-id="1229" instrument_node="">Childebert I</span></a><span data-dcnode-id="1227" instrument_node="">, the king of the Franks, in 528. </span><a class="md-crosslink" data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Maurice-de-Sully"><span data-dcnode-id="1226" instrument_node="">Maurice de Sully</span></a><span data-dcnode-id="1224" instrument_node="">, the bishop of Paris, began construction in 1163 during the reign of King </span><a class="md-crosslink" data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Louis-VII"><span data-dcnode-id="1223" instrument_node="">Louis VII</span></a><span data-dcnode-id="1221" instrument_node="">, and building continued until 1330. The spire was erected in the 1800s during a renovation by </span><a class="md-crosslink" data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Eugene-Emmanuel-Viollet-le-Duc"><span data-dcnode-id="1220" instrument_node="">Eugène-Emmanuel&nbsp;Viollet-le-Duc</span></a><span data-dcnode-id="1218" instrument_node="">, though it was destroyed by fire in 2019.</span></p><span class="AM3 am-inline" data-dcnode-id="1214"></span><span class="MOD3" data-dcnode-id="1212"></span><span data-dcnode-id="1211" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">The western facade is the distinguishing feature of the cathedral. It comprises the Gallery of Kings, a horizontal row of stone sculptures; a rose window glorifying the Virgin, who also appears in statue form below; the Gallery of Chimeras; two unfinished square towers; and three portals, those of the Virgin, the Last Judgment, and St. Anne, with richly carved sculptures around the ornate doorways. The circular rose window in the west front and two more in the north and south transept crossings, created between 1250 and 1270, are masterpieces of Gothic engineering. The stained glass is supported by delicate radiating webs of carved stone tracery. (Jeremy Hunt)</span></p><span class="AM4 am-inline" data-dcnode-id="1205"></span><span class="MOD4" data-dcnode-id="1203"></span><span data-dcnode-id="1202" instrument_node=""> </span></div><span class="LIST-ITEM-1" data-dcnode-id="1199"></span></li><li data-dcnode-id="1155"><h2 data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Hôtel de Soubise </span></h2><div data-dcnode-id="1158"><span data-dcnode-id="1195" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">The Hôtel de Soubise is a city mansion built for the prince and princess de Soubise. In 1700 François de Rohan bought the Hôtel de Clisson, and in 1704 the architect Pierre-Alexis Delamair (1675–1745) was hired to renovate and remodel the building. Delamair designed the huge courtyard on the Rue des Francs-Bourgeois. On the far side of the courtyard is a facade with twin colonnades topped by a series of statues by Robert Le Lorrain representing the four seasons.</span></p><span class="AM5 am-inline" data-dcnode-id="1189"></span><span class="MOD5" data-dcnode-id="1187"></span><span data-dcnode-id="1186" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1177"><span data-dcnode-id="1184" instrument_node="">In 1708 Delamair was replaced by </span><a class="md-crosslink" data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Germain-Boffrand"><span data-dcnode-id="1183" instrument_node="">Germain Boffrand</span></a><span data-dcnode-id="1181" instrument_node=""> (1667–1754), who carried out all the interior decoration for the apartments for the prince’s son, Hercule-Mériadec de Rohan-Soubise, on the ground floor and for the princess on the </span><em data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">piano nobile</span></em><span data-dcnode-id="1178" instrument_node=""> (principal floor), both of which featured oval salons looking into the garden.</span></p><span class="AM6 am-inline" data-dcnode-id="1174"></span><span class="MOD6" data-dcnode-id="1172"></span><span data-dcnode-id="1171" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1165"><span data-dcnode-id="1169" instrument_node="">The interiors are considered among the finest Rococo decorative interiors in France. In the prince’s salon, the wood paneling is painted a pale green and surmounted by plaster reliefs. The princess’s salon is painted white with delicate gilded moldings and features arched niches containing mirrors, windows, and panels. Above the panels are shallow arches containing cherubs and eight paintings by Charles Natoire depicting the history of Psyche. Plaster </span><em data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">rocailles</span></em><span data-dcnode-id="1166" instrument_node=""> (shellwork) and a decorative band of medallions and shields complete the sweetly disordered effect. At the time of the French Revolution, the building was given to the National Archives. A Napoleonic decree of 1808 granted the residence to the state. (Jeremy Hunt)</span></p><span class="AM7 am-inline" data-dcnode-id="1162"></span><span class="MOD7" data-dcnode-id="1160"></span><span data-dcnode-id="1159" instrument_node=""> </span></div><span class="LIST-ITEM-2" data-dcnode-id="1156"></span></li><li data-dcnode-id="1122"><h2 data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Panthéon</span></h2><div data-dcnode-id="1125"><span data-dcnode-id="1152" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1146"><span data-dcnode-id="1150" instrument_node="">The Panthéon is the quintessential Neoclassical monument in Paris and an outstanding example of Enlightenment architecture. Commissioned as the church of St. Geneviève by King </span><a class="md-crosslink" data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Louis-XV"><span data-dcnode-id="1149" instrument_node="">Louis XV</span></a><span data-dcnode-id="1147" instrument_node="">, the project has become known as a secular building and a prestigious tomb dedicated to great French political and artistic figures including Mirabeau, Voltaire, Rousseau, Hugo, Zola, Curie, and Malraux, who have been honored and interred in the vaults following the ceremony of Panthéonization.</span></p><span class="AM8 am-inline" data-dcnode-id="1143"></span><span class="MOD8" data-dcnode-id="1141"></span><span data-dcnode-id="1140" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1132"><a class="md-crosslink" data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Jacques-Germain-Soufflot"><span data-dcnode-id="1138" instrument_node="">Jacques-Germain&nbsp;Soufflot</span></a><span data-dcnode-id="1136" instrument_node=""> (1713–80) was a self-taught architect and tutor to the marquis de Marigny, general director of the king’s buildings, who had been influenced by the Pantheon in Rome. Soufflot claimed that his principal aim was to unite “the structural lightness of Gothic churches with the purity and magnificence of Greek architecture.” His Panthéon was revolutionary: built on the Greek cross plan of a central dome and four equal transepts, his innovation in construction was to use rational scientific and mathematical principles to determine structural formulas for the engineering of the building. This eliminated many of the supporting piers and walls with the result that the vaulting and interiors are slender and elegant. The Neoclassical interior contrasts with the solidity and austere geometry of the exterior. The initial scheme was considered too lacking in gravity and was replaced with a more funereal scheme, which involved blocking 40 windows and destroying the original sculptural decorations. The Panthéon was the location for </span><a class="md-crosslink" data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Leon-Foucault"><span data-dcnode-id="1135" instrument_node="">Léon&nbsp;Foucault</span></a><span data-dcnode-id="1133" instrument_node="">’s pendulum experiment to demonstrate the rotation of the Earth in 1851. (Jeremy Hunt)</span></p><span class="AM9 am-inline" data-dcnode-id="1129"></span><span class="MOD9" data-dcnode-id="1127"></span><span data-dcnode-id="1126" instrument_node=""> </span></div><span class="LIST-ITEM-3" data-dcnode-id="1123"></span></li><li data-dcnode-id="1067"><h2 data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Arc de Triomphe</span></h2><div data-dcnode-id="1070"><span data-dcnode-id="1119" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1113"><span data-dcnode-id="1117" instrument_node="">The Arc de Triomphe is one of the world’s largest triumphal arches. Inspired by the Arch of Titus in Rome, it was commissioned by </span><a class="md-crosslink" data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Napoleon-I"><span data-dcnode-id="1116" instrument_node="">Napoleon I</span></a><span data-dcnode-id="1114" instrument_node=""> in 1806 after his victory at Austerlitz, to commemorate all the victories of the French army; it has since engendered a worldwide military taste for triumphal and nationalistic monuments. </span></p><span class="AM10 am-inline" data-dcnode-id="1110"></span><span class="MOD10" data-dcnode-id="1108"></span><span data-dcnode-id="1107" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1086"><span data-dcnode-id="1105" instrument_node="">The astylar design consists of a simple arch with a vaulted passageway topped by an attic. The monument’s iconography includes four main allegorical sculptural reliefs on the four pillars of the Arc. </span><em data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">The Triumph of Napoleon, 1810</span></em><span data-dcnode-id="1102" instrument_node="">, by Jean-Pierre Cortot, shows an imperial Napoleon, wearing a laurel wreath and toga, accepting the surrender of a city while Fame blows a trumpet. There are two reliefs by Antoine Etex: </span><em data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Resistance</span></em><span data-dcnode-id="1099" instrument_node="">, depicting an equestrian figure and a naked soldier defending his family, protected by the spirit of the future, and </span><em data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Peace</span></em><span data-dcnode-id="1096" instrument_node="">, in which a warrior protected by Minerva, the Roman goddess of wisdom, is sheathing his sword surrounded by scenes of agricultural laborers. The </span><em data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Departure of the Volunteers of ’92</span></em><span data-dcnode-id="1093" instrument_node="">, commonly called </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">La Marseillaise</span></em><span data-dcnode-id="1090" instrument_node="">, by </span><a class="md-crosslink" data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Francois-Rude"><span data-dcnode-id="1089" instrument_node="">François Rude</span></a><span data-dcnode-id="1087" instrument_node="">, presents naked and patriotic figures, led by Bellona, goddess of war, against the enemies of France. In the vault of the Arc de Triomphe are engraved the names of 128 battles of the Republican and Napoleonic regimes. The attic is decorated with 30 shields, each inscribed with a military victory, and the inner walls list the names of 558 French generals, with those who died in battle underlined. </span></p><span class="AM11 am-inline" data-dcnode-id="1083"></span><span class="MOD11" data-dcnode-id="1081"></span><span data-dcnode-id="1080" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">The arch has subsequently become a symbol of national unity and reconciliation as the site of the Tomb of the Unknown Soldier from World War I. He was interred here on Armistice Day, 1920; today there is an eternal flame commemorating the dead of two world wars. (Jeremy Hunt)</span></p><span class="AM12 am-inline" data-dcnode-id="1074"></span><span class="MOD12" data-dcnode-id="1072"></span><span data-dcnode-id="1071" instrument_node=""> </span></div><span class="LIST-ITEM-4" data-dcnode-id="1068"></span></li><li data-dcnode-id="1018"><h2 data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Church of St. Mary Magdalene</span></h2><div data-dcnode-id="1021"><span data-dcnode-id="1064" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1049"><span data-dcnode-id="1062" instrument_node="">In 1806 </span><a class="md-crosslink" data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Napoleon-I"><span data-dcnode-id="1061" instrument_node="">Napoleon</span></a><span data-dcnode-id="1059" instrument_node=""> commissioned </span><a class="md-crosslink" data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Pierre-Alexandre-Vignon"><span data-dcnode-id="1058" instrument_node="">Pierre-Alexandre Vignon</span></a><span data-dcnode-id="1056" instrument_node="">, inspector–general of buildings of the Republic, to build a Temple to the Glory of the Great Army and provide a monumental view to the north of Place de la Concorde. Known as ”The Madeleine,” this church was designed as a Neoclassical temple surrounded by a Corinthian colonnade, reflecting the predominant taste for Classical art and architecture. The proposal of the Arc de Triomphe, however, reduced the original commemorative intention for the temple, and, after the fall of Napoleon, King </span><a class="md-crosslink" data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Louis-XVIII"><span data-dcnode-id="1055" instrument_node="">Louis XVIII</span></a><span data-dcnode-id="1053" instrument_node=""> ordered that the church be consecrated to </span><a class="md-crosslink" data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Saint-Mary-Magdalene"><span data-dcnode-id="1052" instrument_node="">St. Mary Magdalene</span></a><span data-dcnode-id="1050" instrument_node=""> in Paris in 1842.</span></p><span class="AM13 am-inline" data-dcnode-id="1046"></span><span class="MOD13" data-dcnode-id="1044"></span><span data-dcnode-id="1043" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">The Madeleine has no steps at the sides but a grand entrance of 28 steps at each end. The church’s exterior is surrounded by 52 Corinthian columns, 66 feet (20 meters) high. The pediment sculpture of Mary Magdalene at the Last Judgment is by Philippe-Henri Lemaire; bronze relief designs in the church doors represent the Ten Commandments.</span></p><span class="AM14 am-inline" data-dcnode-id="1037"></span><span class="MOD14" data-dcnode-id="1035"></span><span data-dcnode-id="1034" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1028"><span data-dcnode-id="1032" instrument_node="">The 19th-century interior is lavishly gilded. Above the altar is a statue of the ascension of St. Mary Magdalene by Charles Marochetti and a fresco by Jules-Claude Ziegler, </span><em data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">The History of Christianity</span></em><span data-dcnode-id="1029" instrument_node="">, with Napoleon as the central figure surrounded by such luminaries as Michelangelo, Constantine, and Joan of Arc. (Jeremy Hunt)</span></p><span class="AM15 am-inline" data-dcnode-id="1025"></span><span class="MOD15" data-dcnode-id="1023"></span><span data-dcnode-id="1022" instrument_node=""> </span></div><span class="LIST-ITEM-5" data-dcnode-id="1019"></span></li><li data-dcnode-id="960"><h2 data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Palais Garnier </span></h2><div data-dcnode-id="963"><span data-dcnode-id="1015" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1006"><span data-dcnode-id="1013" instrument_node="">The Palais Garnier, or Opéra National de Paris, is a sumptuous and flamboyant 19th-century Neo-Baroque opera house, designed by </span><a class="md-crosslink" data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Charles-Garnier"><span data-dcnode-id="1012" instrument_node="">Charles Garnier</span></a><span data-dcnode-id="1010" instrument_node=""> (1825–98). Conceived as a grandiose centerpiece for the boulevards being constructed by civic planner </span><a class="md-crosslink" data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Georges-Eugene-Baron-Haussmann"><span data-dcnode-id="1009" instrument_node="">Georges-Eugène, Baron Haussmann</span></a><span data-dcnode-id="1007" instrument_node="">, it was representative of the official art of the Second French Empire.</span></p><span class="AM16 am-inline" data-dcnode-id="1003"></span><span class="MOD16" data-dcnode-id="1001"></span><span data-dcnode-id="1000" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="994"><span data-dcnode-id="998" instrument_node="">Garnier created an opera house in the traditional Italian style on a grand scale, with seats for an audience of more than 2,000 and a stage for hundreds of performers. The venue was intended for promenading by the emperor‘s entourage and the wealthy Belle Epoque audience, and the </span><em data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">loggias</span></em><span data-dcnode-id="995" instrument_node="">, foyers, staircases, and rotundas occupy a larger area than the theater itself.</span></p><span class="AM17 am-inline" data-dcnode-id="991"></span><span class="MOD17" data-dcnode-id="989"></span><span data-dcnode-id="988" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="982"><span data-dcnode-id="986" instrument_node="">Garnier personally supervised the opulent decorative schemes, commissioning figurative academic statuary and paintings from 73 painters and 14 sculptors. The building has an iron-frame structure covered with ornate interiors, rich with marble friezes, Venetian mosaic, gilt mirrors, chandeliers, columns, and caryatids. The luxurious Foyer de la Danse is lined with chandeliers and 30 paintings of allegories of dance and music by Paul Baudry. The magnificent central staircase, the Grand Escalier, is decorated in marble and onyx. In the auditorium the great central chandelier illuminates the ceiling painted by </span><a class="md-crosslink" data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Marc-Chagall"><span data-dcnode-id="985" instrument_node="">Marc Chagall</span></a><span data-dcnode-id="983" instrument_node=""> in 1964.</span></p><span class="AM18 am-inline" data-dcnode-id="979"></span><span class="MOD18" data-dcnode-id="977"></span><span data-dcnode-id="976" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">The facade has a Classical structure but is draped with statues and eclectic Baroque decoration. The green copper roof is crowned by a gilded sculpture, </span><em data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Apollo, Poetry and Music</span></em><span data-dcnode-id="971" instrument_node="">, by Aimé Millet. Gold-leafed sculptural assemblages of Harmony and Liberty by Charles Gumery sit on either side of the pediment. The vestibule has seven arcades decorated with four monumental sculptural groups. (Jeremy Hunt)</span></p><span class="AM19 am-inline" data-dcnode-id="967"></span><span class="MOD19" data-dcnode-id="965"></span><span data-dcnode-id="964" instrument_node=""> </span></div><span class="LIST-ITEM-6" data-dcnode-id="961"></span></li><li data-dcnode-id="921"><h2 data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Castel Béranger</span></h2><div data-dcnode-id="924"><span data-dcnode-id="957" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="952"><a class="md-crosslink" data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Hector-Guimard"><span data-dcnode-id="955" instrument_node="">Hector Guimard</span></a><span data-dcnode-id="953" instrument_node=""> (1867–1942) was the initiator of French Art Nouveau, his ornamental entrances to the Paris Métro being his most visible legacy. At Castel Béranger, in the fashionable area of Auteuil, he designed an impressive building of 36 apartments as an Art Nouveau showpiece.</span></p><span class="AM20 am-inline" data-dcnode-id="949"></span><span class="MOD20" data-dcnode-id="947"></span><span data-dcnode-id="946" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="940"><span data-dcnode-id="944" instrument_node="">The building is a rectangle pierced with irregular windows and a varied facade of red brick, enamel tiles, white stone, and red sandstone. Metalwork was a feature with a spectacular red copper entrance gate and ironwork in the balconies. The elaborate interior stairwell is of red sandstone decorated with bespoke rich wallpapers and fabrics and a mosaic inventively decorated with steel and copper. Guimard applied the principles of French Art Nouveau where the decoration was integral to the building. Like many of his contemporaries, he was influenced by the theories of </span><a class="md-crosslink" data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Eugene-Emmanuel-Viollet-le-Duc"><span data-dcnode-id="943" instrument_node="">Eugène-Emmanuel&nbsp;Viollet-le-Duc</span></a><span data-dcnode-id="941" instrument_node=""> in rejecting flatness and symmetry. Guimard’s unique stylistic vocabulary is derived from plants and organic forms in abstract two-dimensional patterns.</span></p><span class="AM21 am-inline" data-dcnode-id="937"></span><span class="MOD21" data-dcnode-id="935"></span><span data-dcnode-id="934" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Castel Béranger was described on its inauguration as the Maison des Diables (”House of Devils”) because of its profusion of swirling chimeraic figures. Although critics called it “subversive” and “deranged,” it won first prize as the most beautiful facade in Paris in 1898. (Jeremy Hunt)</span></p><span class="AM22 am-inline" data-dcnode-id="928"></span><span class="MOD22" data-dcnode-id="926"></span><span data-dcnode-id="925" instrument_node=""> </span></div><span class="LIST-ITEM-7" data-dcnode-id="922"></span></li><li data-dcnode-id="893"><h2 data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">La Ruche studios</span></h2><div data-dcnode-id="896"><span data-dcnode-id="918" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="912"><span data-dcnode-id="916" instrument_node="">La Ruche (”The Beehive”) is a circular structure with a steel frame and was originally designed by </span><a class="md-crosslink" data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Gustave-Eiffel"><span data-dcnode-id="915" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="913" instrument_node=""> (1832–1923) as a temporary wine pavilion for the Great Exposition of 1900. Sculptor Alfred Boucher (1850–1934) dismantled it and transferred it from the Champ de Mars to its present location in a secluded garden off the Passage de Dantzig in Montparnasse. Here it was transformed into a complex of low-cost artists‘ studios and lodgings, exhibition space, and a theater, which was active until 1934. The 12-sided wooden rotunda is on three levels and is made up of wedge-shaped segments, subdivided into cells around a central stairwell. At its inauguration in 1902, it housed 46 artists and 80 studios. </span></p><span class="AM23 am-inline" data-dcnode-id="909"></span><span class="MOD23" data-dcnode-id="907"></span><span data-dcnode-id="906" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Boucher was a successful monumental figurative sculptor and a contemporary of Rodin and Claudel who was “in the situation of the hen who sits on the eggs of the duck.” At La Ruche he sought to help artists with low-rent space: “Here everyone has a share of the cake, each artist is judged by his own. He has a space at his disposal that is the same size as his neighbor.” La Ruche housed an astounding array of artistic talent. Artists from all over the world went there to become part of L’Ecole de Paris, including Léger, Soutine, Modigliani, Chagall, Zadkine, Cendrars, and Max Jacob. Chagall once said, “You either died there or left famous.” La Ruche declined during World War II and by 1968 was threatened with demolition, but, thanks to support from leading cultural figures, such as Jean-Paul Sartre, Jean Renoir, and René Char, it was preserved and restored in 1971. Paintings, sculptures, films, and photographs from its heyday can be seen at the Musée du Montparnasse. (Jeremy Hunt)</span></p><span class="AM24 am-inline" data-dcnode-id="900"></span><span class="MOD24" data-dcnode-id="898"></span><span data-dcnode-id="897" instrument_node=""> </span></div><span class="LIST-ITEM-8" data-dcnode-id="894"></span></li><li data-dcnode-id="866"><h2 data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Rue Franklin apartments</span></h2><div data-dcnode-id="869"><span data-dcnode-id="890" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="885"><a class="md-crosslink" data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Auguste-Perret"><span data-dcnode-id="888" instrument_node="">Auguste Perret</span></a><span data-dcnode-id="886" instrument_node=""> (1874–1954) came from a family of building contractors and trained as an architect in order to bring the profitable work of design within the capabilities of the family business. This background gave Perret an understanding of how buildings are actually made, far outstripping that of most architects of his time. His buildings have all the classical rigor of his architectural training, combined with the structural logic and technical mastery learned within his family firm—a mastery in particular of the then new building material, reinforced concrete.</span></p><span class="AM25 am-inline" data-dcnode-id="882"></span><span class="MOD25" data-dcnode-id="880"></span><span data-dcnode-id="879" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">The Rue Franklin apartment block was one of the first fruits of this fertile coupling, although, unusually for Perret, the concrete frame was in this case subcontracted to another builder as being too complicated for the Perret firm at that date. The building uses a concrete frame structure rather than treating the entire wall area as support, and this frame is visible on the outside. To profit from good views, Perret moved the legally obligatory light-well to the street front, producing a C-shaped facade, and enlarged the windows as far as building regulations then permitted. The clear structural framework is enlivened by a symmetrical pattern of bay windows, balconies, tiled panels, and windows flush with the walls. A shop at the bottom and receding balconies at the top increase the visual interest. This attractive building is most famous as the first residential building to use a reinforced concrete structural framework. (Barnabas Calder)</span></p><span class="AM26 am-inline" data-dcnode-id="873"></span><span class="MOD26" data-dcnode-id="871"></span><span data-dcnode-id="870" instrument_node=""> </span></div><span class="LIST-ITEM-9" data-dcnode-id="867"></span></li><li data-dcnode-id="838"><h2 data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Hôtel Guimard</span></h2><div data-dcnode-id="841"><span data-dcnode-id="863" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="857"><span data-dcnode-id="861" instrument_node="">The Hôtel Guimard was built by </span><a class="md-crosslink" data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Hector-Guimard"><span data-dcnode-id="860" instrument_node="">Hector Guimard</span></a><span data-dcnode-id="858" instrument_node=""> as a wedding present to his American wife, the painter Adeline Oppenheim. More polemical than his earlier turn-of-the-century houses, such as the Castel Béranger, the Hôtel Guimard is the culmination of his mature Art Nouveau style, and it is a unified masterpiece of harmonious integration between architecture and decoration. It is arranged over six stories, with a narrow footprint of 968 square feet (90 square meters) per floor, featuring oval room interiors and unique pieces of furniture, as well as an elevator and central staircase. Guimard lit his wife’s painting studio with north-facing windows on the top floor, and he installed his own office on the ground floor.</span></p><span class="AM27 am-inline" data-dcnode-id="854"></span><span class="MOD27" data-dcnode-id="852"></span><span data-dcnode-id="851" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">The building suggests some of the influences of other Art Nouveau architects, including Victor Horta and Charles Rennie Mackintosh. In particular, the elegant buff-colored brick facade displays a fluid and sinuous use of masonry, featuring melting Flemish windows with decorative floral and organic motifs. The building has an irregular arrangement of balconies and windows of different sizes, reflecting the internal structure of the building. Guimard detailed the exterior and interior decoration himself, working with craftsmen in the fabrication of furniture, stained glass, iron gates and balconies, furniture, and even the door locks. (Jeremy Hunt)</span></p><span class="AM28 am-inline" data-dcnode-id="845"></span><span class="MOD28" data-dcnode-id="843"></span><span data-dcnode-id="842" instrument_node=""> </span></div><span class="LIST-ITEM-10" data-dcnode-id="839"></span></li><li data-dcnode-id="799"><h2 data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Théâtre des Champs Elysées</span></h2><div data-dcnode-id="802"><span data-dcnode-id="835" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="830"><a class="md-crosslink" data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Auguste-Perret"><span data-dcnode-id="833" instrument_node="">Auguste Perret</span></a><span data-dcnode-id="831" instrument_node=""> was not initially appointed architect for this avant-garde theater. The Belgian Art Nouveau master Henry van de Velde was to be the architect, but Perret edged him out after his family firm of building contractors was called in to help with the structural design.</span></p><span class="AM29 am-inline" data-dcnode-id="827"></span><span class="MOD29" data-dcnode-id="825"></span><span data-dcnode-id="824" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">The theater is renowned as the first public building using a frame of reinforced concrete for its structure. For the visitor, however, the great elegance of this frame, especially the paired shallow arches spanning the auditorium, is mostly concealed behind understated decorative moldings. Only in the foyer did Perret permit himself a full expression of the frame. Simple cylindrical columns rise through two tall stories, supporting a balcony on their way up, and the beams of the floor level above form a sort of Classical coffering. The Modernist overtones of this expressive concrete structure go remarkably well with the unequivocally Art Nouveau staircase, which appears almost to drip down from the upper floor like candle wax. Outside, a few sculpted panels enliven a characteristically restrained Perret facade. The underlying frame is implied here by the emphasized verticals and horizontals.</span></p><span class="AM30 am-inline" data-dcnode-id="818"></span><span class="MOD30" data-dcnode-id="816"></span><span data-dcnode-id="815" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="809"><span data-dcnode-id="813" instrument_node="">One of the first performances in the theater was the 1913 premiere of Stravinsky’s </span><em data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Rite of Spring</span></em><span data-dcnode-id="810" instrument_node="">, much of it infamously drowned out by fistfights between opponents and supporters of the new sound. (Barnabas Calder)</span></p><span class="AM31 am-inline" data-dcnode-id="806"></span><span class="MOD31" data-dcnode-id="804"></span><span data-dcnode-id="803" instrument_node=""> </span></div><span class="LIST-ITEM-11" data-dcnode-id="800"></span></li><li data-dcnode-id="762"><h2 data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Apartments at 26, rue Vavin</span></h2><div data-dcnode-id="765"><span data-dcnode-id="796" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Henri Sauvage (1873–1932) collaborated with Charles Sarazin (1873–1950) between 1898 and 1912 to build apartment blocks for the Society for Hygienic Low-Cost Housing. Sauvage had already built one such apartment block in Paris for the society—the unusual building at No. 7, rue Trétaigne, built in 1904, which demonstrated his concern with providing space and light in multiple-occupancy buildings.</span></p><span class="AM32 am-inline" data-dcnode-id="790"></span><span class="MOD32" data-dcnode-id="788"></span><span data-dcnode-id="787" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">Visually and functionally a benchmark building, the six-story apartment block, called the Maison à Gradins Sportive or La Sportive, draws inspiration from Art Nouveau but presages the International Style in its concern with providing light, airy living spaces. Sauvage and Sarazin designed the block with two dwellings on each floor and shops at street level. The building is tiered, with each upper floor receding to allow for the implementation of a balcony or </span><em data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">gradin</span></em><span data-dcnode-id="782" instrument_node="">. This innovation ensured that each apartment had adequate light, and it gave the building an almost sculptural aspect. The building facade is in reinforced concrete completely overlaid with rectangular white ceramic tiles, with occasional geometric patterns in navy blue tiles. The blue-and-white tiles are the same as those used throughout the Paris Métro system, supplied by the manufacturer Boulenger. This lends the apartment block a distinctly nautical appearance, reminiscent of a public bath or sports club.</span></p><span class="AM33 am-inline" data-dcnode-id="778"></span><span class="MOD33" data-dcnode-id="776"></span><span data-dcnode-id="775" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Sauvage’s signature buildings include the Paris department store La Samaritaine (1930), designed with Frantz Jourdain, and the artists’ studios on rue la Fontaine. He is probably best known for his simple but ingenious design for the social housing apartment block at rue des Amiraux, Paris, which was completed between 1922 and 1927 and restored in the 1980s by the architects Daniel and Patrick Rubin. (Jeremy Hunt)</span></p><span class="AM34 am-inline" data-dcnode-id="769"></span><span class="MOD34" data-dcnode-id="767"></span><span data-dcnode-id="766" instrument_node=""> </span></div><span class="LIST-ITEM-12" data-dcnode-id="763"></span></li><li data-dcnode-id="734"><h2 data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Basilica of the Sacred Heart of Christ</span></h2><div data-dcnode-id="737"><span data-dcnode-id="759" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">The Roman Catholic Basilique du Sacré Coeur is a popular landmark in Paris. The harmonious edifice, built of white travertine stone, is located at the summit of Montmartre, the highest point in the city. From the 272-foot- (83-meter-) high dome there is a south-facing panoramic view of 18 miles (30 km). At its consecration in 1919, the building was declared not a parish church but a basilica, an independent sanctuary and place of pilgrimage where the Sacred Heart of Christ is venerated. Architect Paul Abadie, Jr. (1812–84), designed the basilica, but he died in 1884, and five successive architects continued the work. The last of these, Louis-Jean Hulot, built the bell tower with a garden and fountain for meditation; he also commissioned the monumental sculpture. Abadie had restored several medieval churches, and the style of the structure shows a strong Romano-Byzantine influence. </span></p><span class="AM35 am-inline" data-dcnode-id="753"></span><span class="MOD35" data-dcnode-id="751"></span><span data-dcnode-id="750" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="744"><span data-dcnode-id="748" instrument_node="">The original idea of constructing the church developed in France after the </span><a class="md-crosslink" data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/Franco-German-War"><span data-dcnode-id="747" instrument_node="">Franco-Prussian War</span></a><span data-dcnode-id="745" instrument_node="">. It was intended to expiate the spiritual and moral collapse held to be responsible for the defeat of 1870. Many design elements of the basilica are based on nationalistic themes. The portico, with its three arches, is flanked by bronze equestrian statues of French national saints—Joan of Arc and King-Saint Louis IX—by Hippolyte Lefebvre. In the apse is a massive mosaic of Christ in Majesty by Luc-Olivier Merson. (Jeremy Hunt)</span></p><span class="AM36 am-inline" data-dcnode-id="741"></span><span class="MOD36" data-dcnode-id="739"></span><span data-dcnode-id="738" instrument_node=""> </span></div><span class="LIST-ITEM-13" data-dcnode-id="735"></span></li><li data-dcnode-id="706"><h2 data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Paris Great Mosque</span></h2><div data-dcnode-id="709"><span data-dcnode-id="731" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">The magnificent Grande Mosqué de Paris (Paris Great Mosque) was built between 1922 and 1926, following the Mudéjar style in a composite Hispano-Moorish design. The architects, Robert Fournez, Maurice Mantout, and Charles Heubès, based their design on plans drawn up by Maurice Tranchant de Lunel, chief of the Beaux-Arts service in Morocco. Partially financed by the French state and constructed on land donated by the city of Paris, the mosque is a memorial to the 100,000 Muslim soldiers who died in World War I fighting with the French army. The mosque is an active place of worship, and it serves as the main religious center for the Islamic community in Paris. </span></p><span class="AM37 am-inline" data-dcnode-id="725"></span><span class="MOD37" data-dcnode-id="723"></span><span data-dcnode-id="722" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">The white-walled green-roofed building surrounds a 108-feet- (33-meter-) high square minaret and includes a prayer room noteworthy for its decoration and magnificent carpets, an Islamic school and library, and a marble </span><em data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">hammam</span></em><span data-dcnode-id="717" instrument_node=""> (Turkish bath). At the heart of the building is a courtyard surrounded by finely carved colonnades, featuring eucalyptus and cedar wood and modeled on the Alhambra in Granada. The structure is of reinforced concrete, and it is decorated with mosaics, floor tiles, green roof tiles, faience ceramics, wrought iron, plaster molding, and carvings illustrating Islamic calligraphy. These materials were imported from Morocco for the interior decoration that was created in situ by North African artists and craftsmen. The mosque’s fine gardens, tiled entrance patio, tearoom, and restaurant cluster around the axis of the central courtyard. Open to the elements, shaded by fig trees, and cooled by fountains, it provides an oasis of calm and seclusion. (Jeremy Hunt)</span></p><span class="AM38 am-inline" data-dcnode-id="713"></span><span class="MOD38" data-dcnode-id="711"></span><span data-dcnode-id="710" instrument_node=""> </span></div><span class="LIST-ITEM-14" data-dcnode-id="707"></span></li><li data-dcnode-id="672"><h2 data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Le Grand Rex</span></h2><div data-dcnode-id="675"><span data-dcnode-id="703" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="697"><span data-dcnode-id="701" instrument_node="">The Grand Rex is an impressive Art Deco example of the theater as a kitsch temple of cinema and Hollywood glamour. It opened on December 8, 1932, the work of impressario Jacques Haik and architect Auguste Bluyssen; they had been advised by John Eberson, who constructed around 400 cinemas across the United States in the 1920s. The facade is pure Art Deco, with its illuminated ziggurat crown, ocean-liner styling, and angled </span><em data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">pan coupé</span></em><span data-dcnode-id="698" instrument_node=""> corner entrance.</span></p><span class="AM39 am-inline" data-dcnode-id="694"></span><span class="MOD39" data-dcnode-id="692"></span><span data-dcnode-id="691" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="682"><span data-dcnode-id="689" instrument_node="">The interior continues the Art Deco style, melding Ottoman, Hispanic, and Moorish fantasia. Designer Maurice Dufrêne took inspiration from </span><em data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Arabian Nights</span></em><span data-dcnode-id="686" instrument_node=""> and created an opulent auditorium, complete with antique statues, Moroccan plasterwork, palm trees, arcades, and Classical pediments. The illuminated ceiling features moving clouds and the constellations of the night sky. The Grand Rex auditorium accommodates thousands of seats arranged in three tiers. It also features one of the largest screens in Europe, </span><em data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Le Grand Large</span></em><span data-dcnode-id="683" instrument_node="">. Three new screens were added in the 1970s, replacing the original nursery and kennels. (Jeremy Hunt)</span></p><span class="AM40 am-inline" data-dcnode-id="679"></span><span class="MOD40" data-dcnode-id="677"></span><span data-dcnode-id="676" instrument_node=""> </span></div><span class="LIST-ITEM-15" data-dcnode-id="673"></span></li><li data-dcnode-id="635"><h2 data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Maison de Verre</span></h2><div data-dcnode-id="638"><span data-dcnode-id="669" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Pierre Chareau (1883–1950) presents a dual paradox: Just one work made him world famous. He was not an architect or an interior designer, but he had a special aptitude for architecture and the decorative arts. His fashionable friends included Jean Lurçat, the painter; Louis Dalbet, a craftsman in wrought iron; and Marcel L’Herbier, the moviemaker. Chareau himself was a brilliant self-taught designer.</span></p><span class="AM41 am-inline" data-dcnode-id="663"></span><span class="MOD41" data-dcnode-id="661"></span><span data-dcnode-id="660" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="654"><span data-dcnode-id="658" instrument_node="">Jean Dalsace and his wife were Chareau’s first clients, and they entrusted him with the challenge of turning an unlit </span><em data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">hôtel particulier</span></em><span data-dcnode-id="655" instrument_node="">, situated on the trendy rue Saint-Guillaume, into a modern house and an office. Chareau reshaped the inner space entirely through unique volumes distributed within a massive void bathed in dimmed light. Abstraction, geometry, authenticity of materials—all these characteristics of 1930s avant-garde were emphasized by Chareau’s boldness. The glass wall—until then a technical device used only for industrial purposes—softly filters daylight into the heart of a domestic interior. Steel structures arrange the stages of modern living. Non-simplistic Functionalism offers more than a cold response to the brief.</span></p><span class="AM42 am-inline" data-dcnode-id="651"></span><span class="MOD42" data-dcnode-id="649"></span><span data-dcnode-id="648" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Chareau set up practice in the United States in 1940 and died 10 years later, leaving no other significant work beyond that first and only masterstroke. (Yves Nacher)</span></p><span class="AM43 am-inline" data-dcnode-id="642"></span><span class="MOD43" data-dcnode-id="640"></span><span data-dcnode-id="639" instrument_node=""> </span></div><span class="LIST-ITEM-16" data-dcnode-id="636"></span></li><li data-dcnode-id="580"><h2 data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Centre Pompidou</span></h2><div data-dcnode-id="583"><span data-dcnode-id="632" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">The Centre Pompidou changed not only the face of central Paris but also the nature of contemporary architecture, albeit being heavily influenced itself by Futurism, Constructivism, and the work of the 1960s U.K. collective Archigram.</span></p><span class="AM44 am-inline" data-dcnode-id="626"></span><span class="MOD44" data-dcnode-id="624"></span><span data-dcnode-id="623" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="611"><span data-dcnode-id="621" instrument_node="">The building sits in Paris’s medieval fourth </span><em data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">arrondissement</span></em><span data-dcnode-id="618" instrument_node=""> (administrative district) on the site of Les Halles market, and it was designed by the team of </span><a class="md-crosslink" data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Richard-Rogers"><span data-dcnode-id="617" instrument_node="">Richard Rogers</span></a><span data-dcnode-id="615" instrument_node="">, Italian architect </span><a class="md-crosslink" data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Renzo-Piano"><span data-dcnode-id="614" instrument_node="">Renzo Piano</span></a><span data-dcnode-id="612" instrument_node="">, and structural engineer Peter Rice. Famously, it was the result of a last-minute entry to an architectural competition, and the “inside out” nature of the art complex is its chief signature, bearing its steel exoskeleton structure and long, snaking, glass tube-enclosed escalator “honestly” on its red, white, and blue exterior. In this sense, it may have also been influenced by Cedric Price’s Fun Palace proposal.</span></p><span class="AM45 am-inline" data-dcnode-id="608"></span><span class="MOD45" data-dcnode-id="606"></span><span data-dcnode-id="605" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="599"><span data-dcnode-id="603" instrument_node="">Named for </span><a class="md-crosslink" data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Georges-Jean-Raymond-Pompidou"><span data-dcnode-id="602" instrument_node="">Georges Pompidou</span></a><span data-dcnode-id="600" instrument_node="">, who was president of France from 1969 until his death in 1974, in place of the former Centre Beaubourg, the scheme was built in an area in crisis, with the former market—which had supplied Paris with fresh food for decades—scheduled for demolition. Instead, the area has a one-million-square-foot (93,000-square-meter) cultural center housing four main elements: an extensive museum of modern art, a reference library, a center for industrial design, and a center for music and acoustic research. Added to this mix are areas given over to office administration, bookshops, restaurants, cinemas, and children‘s activities, along with a popular external space, the Place Georges Pompidou.</span></p><span class="AM46 am-inline" data-dcnode-id="596"></span><span class="MOD46" data-dcnode-id="594"></span><span data-dcnode-id="593" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">The building was designed and built in six years, delivered on time and under budget in January 1977. (David Taylor)</span></p><span class="AM47 am-inline" data-dcnode-id="587"></span><span class="MOD47" data-dcnode-id="585"></span><span data-dcnode-id="584" instrument_node=""> </span></div><span class="LIST-ITEM-17" data-dcnode-id="581"></span></li><li data-dcnode-id="543"><h2 data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Musée d’Orsay</span></h2><div data-dcnode-id="546"><span data-dcnode-id="577" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="571"><span data-dcnode-id="575" instrument_node="">The Tate Modern in London showed how an industrial building could be transformed into a rugged home for art, but Paris’s Musée d’Orsay had done the same with a former railway station previously. On the eve of the 1900’s World Fair, the French government planned to build a more central terminus station on the site of the ruined Palais d’Orsay and chose architect </span><a class="md-crosslink" data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Victor-Laloux"><span data-dcnode-id="574" instrument_node="">Victor Laloux</span></a><span data-dcnode-id="572" instrument_node=""> (1850–1937), who had just completed the Hôtel de Ville in Tours, to design it. The station and hotel, built within a record two years, were inaugurated for the World’s Fair on July 14, 1900, its modern metallic structures masked by a hotel facade built in the academic style using finely cut stone from the regions of Charente and Poitou. However, after 1939 the station was to serve only the suburbs, as modern trains outgrew its platforms. </span></p><span class="AM48 am-inline" data-dcnode-id="568"></span><span class="MOD48" data-dcnode-id="566"></span><span data-dcnode-id="565" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="553"><span data-dcnode-id="563" instrument_node="">On the initiative of President </span><a class="md-crosslink" data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Valery-Giscard-dEstaing"><span data-dcnode-id="562" instrument_node="">Valéry Giscard d’Estaing</span></a><span data-dcnode-id="560" instrument_node="">, the decision to build the Musée d’Orsay inside it was taken during the interministerial council of October 20, 1977, with the President of the Republic, </span><a class="md-crosslink" data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Francois-Mitterrand"><span data-dcnode-id="559" instrument_node="">François Mitterrand</span></a><span data-dcnode-id="557" instrument_node="">, inaugurating it on December 1, 1986. It opened eight days later. The transformation of the station into a stunning museum was accomplished by ACT architecture group, made up of Renaud Bardon, Pierre Colboc, and Jean-Paul Philippon, with leading Italian architect </span><a class="md-crosslink" data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Gaetana-Aulenti"><span data-dcnode-id="556" instrument_node="">Gaetana Aulenti</span></a><span data-dcnode-id="554" instrument_node=""> overseeing the transformation of the interior. The three-level scheme highlights the building’s airy great hall while respecting the original cast-iron pillars and stucco decorations, with the glass awning becoming the museum’s entrance. On the ground floor, galleries are distributed on either side of a central nave and are overlooked by terraces at a median level. These, in turn, open up into additional exhibition galleries, along with a museum restaurant—installed in the dining hall of the former hotel—bookshop, and auditorium. (David Taylor)</span></p><span class="AM49 am-inline" data-dcnode-id="550"></span><span class="MOD49" data-dcnode-id="548"></span><span data-dcnode-id="547" instrument_node=""> </span></div><span class="LIST-ITEM-18" data-dcnode-id="544"></span></li><li data-dcnode-id="509"><h2 data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Institut du Monde Arabe</span></h2><div data-dcnode-id="512"><span data-dcnode-id="540" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="531"><span data-dcnode-id="538" instrument_node="">The Institut du Monde Arabe (IMA, or Arab World Institute) is the smallest of </span><a class="md-crosslink" data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Francois-Mitterrand"><span data-dcnode-id="537" instrument_node="">François Mitterrand</span></a><span data-dcnode-id="535" instrument_node="">’s so-called “Grands Projets,” but it cannot be called the least daring. It was crowned with the Aga Khan Award for Architecture in 1989—thus catapulting its architect, </span><a class="md-crosslink" data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Jean-Nouvel"><span data-dcnode-id="534" instrument_node="">Jean Nouvel</span></a><span data-dcnode-id="532" instrument_node="">, to stardom. With France being a former colonial power in North Africa and the Middle East, IMA’s purpose was to spread knowledge of Arab culture in France and throughout Europe. </span></p><span class="AM50 am-inline" data-dcnode-id="528"></span><span class="MOD50" data-dcnode-id="526"></span><span data-dcnode-id="525" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="519"><span data-dcnode-id="523" instrument_node="">Housing a library, exhibition spaces, and an auditorium, IMA experiments with intensive cultural exchanges, mainly in the areas of science and technology. Located along the Seine, its geometrical steel and glass figure stands out like a pivotal landmark. On the north side, the curving facade becomes the mirror (in the true sense of the word) of historical Paris stretched across the river through a silk-screened stylized reproduction of the facing skyline. On the south side, IMA opens onto a plaza bridging the gap between the building and the contemporary urban grid of the Jussieu University designed in the mid-1960s. There, a screen composed of thousands of light-sensitive sun-control diaphragms reinterprets the pattern of the Arab </span><em data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">moucharabieh</span></em><span data-dcnode-id="520" instrument_node="">, a traditional turned-wood latticework. The theme of light was also a driving force and a common denominator when it came to dealing with IMA’s inner spaces, with blurred outlines, superimpositions, reflections, and shadows. (Yves Nacher)</span></p><span class="AM51 am-inline" data-dcnode-id="516"></span><span class="MOD51" data-dcnode-id="514"></span><span data-dcnode-id="513" instrument_node=""> </span></div><span class="LIST-ITEM-19" data-dcnode-id="510"></span></li><li data-dcnode-id="469"><h2 data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Pyramide, Le Grand Louvre</span></h2><div data-dcnode-id="472"><span data-dcnode-id="506" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="497"><span data-dcnode-id="504" instrument_node="">Another of </span><a class="md-crosslink" data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/
