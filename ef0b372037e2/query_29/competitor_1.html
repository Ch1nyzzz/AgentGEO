</span><meta content="Complex systems have become a popular lens for analyzing cities, and complexity theory has many implications for urban performance and resilience. This paper develops a typology of measures and indicators for assessing the physical complexity of the built environment at the scale of urban design. It extends quantitative measures from city planning, network science, ecosystems studies, fractal geometry, statistical physics,&amp;nbsp;and information theory to the analysis of urban form and qualitative human experience. Metrics at multiple scales are scattered throughout diverse bodies of literature and have useful applications in analyzing the adaptive complexity that both evolves and results from local design processes. In turn, they enable urban designers to assess resilience, adaptability, connectedness, and livability with an advanced toolkit. The typology developed here applies to empirical research of various neighborhood types and design standards. It includes temporal, visual, spatial, scaling, and connectivity measures of the urban form.&amp;nbsp;Today, prominent urban design movements openly embrace complexity&amp;nbsp;but&amp;nbsp;must move beyond metaphor and inspiration to&amp;nbsp;formalize what &quot;complexity&quot; is and how we can use&amp;nbsp;it to assess both the world as-is as well as proposals for how it could be instead." data-dcnode-id="5414" name="dc.description"><span data-dcnode-id="5413" instrument_node="">

</span><meta content="Measuring the complexity of urban form and design - URBAN DESIGN International" data-dcnode-id="5094" property="og:title"><span data-dcnode-id="5093" instrument_node="">
</span><meta content="Complex systems have become a popular lens for analyzing cities, and complexity theory has many implications for urban performance and resilience. This paper develops a typology of measures and indicators for assessing the physical complexity of the built environment at the scale of urban design. It extends quantitative measures from city planning, network science, ecosystems studies, fractal geometry, statistical physics, and information theory to the analysis of urban form and qualitative human experience. Metrics at multiple scales are scattered throughout diverse bodies of literature and have useful applications in analyzing the adaptive complexity that both evolves and results from local design processes. In turn, they enable urban designers to assess resilience, adaptability, connectedness, and livability with an advanced toolkit. The typology developed here applies to empirical research of various neighborhood types and design standards. It includes temporal, visual, spatial, scaling, and connectivity measures of the urban form. Today, prominent urban design movements openly embrace complexity but must move beyond metaphor and inspiration to formalize what &quot;complexity&quot; is and how we can use it to assess both the world as-is as well as proposals for how it could be instead." data-dcnode-id="5092" property="og:description"><span data-dcnode-id="5091" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="4652" data-gtm-vis-first-on-screen-50443292_562="1405" data-gtm-vis-first-on-screen-50443292_563="1405" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1405" data-gtm-vis-recent-on-screen-50443292_563="1405" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4653" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4657" id="Abs1"><span data-dcnode-id="4658" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4654" id="Abs1-content"><p data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">Complex systems have become a popular lens for analyzing cities, and complexity theory has many implications for urban performance and resilience. This paper develops a typology of measures and indicators for assessing the physical complexity of the built environment at the scale of urban design. It extends quantitative measures from city planning, network science, ecosystems studies, fractal geometry, statistical physics,&nbsp;and information theory to the analysis of urban form and qualitative human experience. Metrics at multiple scales are scattered throughout diverse bodies of literature and have useful applications in analyzing the adaptive complexity that both evolves and results from local design processes. In turn, they enable urban designers to assess resilience, adaptability, connectedness, and livability with an advanced toolkit. The typology developed here applies to empirical research of various neighborhood types and design standards. It includes temporal, visual, spatial, scaling, and connectivity measures of the urban form.&nbsp;Today, prominent urban design movements openly embrace complexity&nbsp;but&nbsp;must move beyond metaphor and inspiration to&nbsp;formalize what "complexity" is and how we can use&nbsp;it to assess both the world as-is as well as proposals for how it could be instead.</span></p></div></div></section><span data-dcnode-id="4651" instrument_node="">
</span><section data-dcnode-id="4529" data-gtm-vis-first-on-screen-50443292_562="1405" data-gtm-vis-first-on-screen-50443292_563="1405" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1405" data-gtm-vis-recent-on-screen-50443292_563="1405" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="4530" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4649" id="Sec1"><span data-dcnode-id="4650" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="4531" id="Sec1-content"><p data-dcnode-id="4596"><span data-dcnode-id="4648" instrument_node="">Complex systems are large nonlinear systems of interacting components that can produce “emergent” phenomena and allow structure to self-organize. Nearly, all real-world systems are inherently nonlinear and their emergent features pervade our world (Barabási </span><a aria-label="Reference 2007" data-dcnode-id="4646" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d191688938e275" title="Barabási, A.-L. 2007. The Architecture of Complexity. IEEE Control Systems Magazine&nbsp;(August), 33–42."><span data-dcnode-id="4647" instrument_node="">2007</span></a><span data-dcnode-id="4645" instrument_node="">;&nbsp;Wells </span><a aria-label="Reference 2014" data-dcnode-id="4643" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d191688938e278" title="Wells, J. 2014. Complexity and Sustainability. London: Routledge."><span data-dcnode-id="4644" instrument_node="">2014</span></a><span data-dcnode-id="4642" instrument_node="">; Turnbull et al. </span><a aria-label="Reference 2018" data-dcnode-id="4640" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d191688938e281" title="Turnbull, L., M.-T. Hütt, A.A. Ioannides, S. Kininmonth, R. Poeppl, K. Tockner, and A.J. Parsons. 2018. Connectivity and Complex Systems: Learning from a Multi-disciplinary Perspective. Applied Network Science. 
                    https://doi.org/10.1007/s41109-018-0067-2
                    
                  ."><span data-dcnode-id="4641" instrument_node="">2018</span></a><span data-dcnode-id="4639" instrument_node="">). The term </span><i data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">complexity</span></i><span data-dcnode-id="4636" instrument_node=""> refers to the higher-order phenomena arising from a system’s many connected, interacting subcomponents and describes both dynamics (i.e., processes) and structure (i.e., patterns and configurations) (Batty </span><a aria-label="Reference 2005" data-dcnode-id="4634" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d191688938e287" title="Batty, M. 2005. Cities and Complexity. Cambridge: MIT Press."><span data-dcnode-id="4635" instrument_node="">2005</span></a><span data-dcnode-id="4633" instrument_node="">). </span><i data-dcnode-id="4631"><span data-dcnode-id="4632" instrument_node="">Emergence</span></i><span data-dcnode-id="4630" instrument_node=""> refers to the appearance of these characteristics over time as the components self-organize (Goldstein </span><a aria-label="Reference 1999" data-dcnode-id="4628" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d191688938e294" title="Goldstein, J. 1999. Emergence as a Construct: History and Issues. Emergence 1 (1): 49–72. 
                    https://doi.org/10.1207/s15327000em0101_4
                    
                  ."><span data-dcnode-id="4629" instrument_node="">1999</span></a><span data-dcnode-id="4627" instrument_node="">). Human societies and cities are examples of large, complex systems (de Roo and Rauws </span><a aria-label="Reference 2012" data-dcnode-id="4625" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d191688938e297" title="de Roo, G., and W.S. Rauws. 2012. Positioning Planning in the World of Order, Chaos and Complexity. In Complexity Theories of Cities Have Come of Age, ed. J. Portugali, H. Meyer, E. Stolk, and E. Tan, 207–220. Berlin: Springer."><span data-dcnode-id="4626" instrument_node="">2012</span></a><span data-dcnode-id="4624" instrument_node="">). Principles of complexity have been applied in urban planning and design from collaborative rationality, to cellular automata and agent-based models, to the design of livable neighborhoods (Innes and Booher </span><a aria-label="Reference 1999" data-dcnode-id="4622" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d191688938e300" title="Innes, J.E., and D.E. Booher. 1999. Consensus Building and Complex Adaptive Systems. Journal of the American Planning Association 65 (4): 412–423. 
                    https://doi.org/10.1080/01944369908976071
                    
                  ."><span data-dcnode-id="4623" instrument_node="">1999</span></a><span data-dcnode-id="4621" instrument_node="">, </span><a aria-label="Reference 2000" data-dcnode-id="4619" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d191688938e303" title="Innes, J.E., and D.E. Booher. 2000. Indicators for Sustainable Communities. Planning Theory &amp; Practice 1 (2): 173–186. 
                    https://doi.org/10.1080/14649350020008378
                    
                  ."><span data-dcnode-id="4620" instrument_node="">2000</span></a><span data-dcnode-id="4618" instrument_node="">; Batty </span><a aria-label="Reference 2005" data-dcnode-id="4616" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d191688938e306" title="Batty, M. 2005. Cities and Complexity. Cambridge: MIT Press."><span data-dcnode-id="4617" instrument_node="">2005</span></a><span data-dcnode-id="4615" instrument_node="">; Sanders </span><a aria-label="Reference 2008" data-dcnode-id="4613" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d191688938e310" title="Sanders, T.I. 2008. Complex Systems Thinking and New Urbanism. In New Urbanism and Beyond, ed. T. Haas, 275–279. New York: Rizzoli."><span data-dcnode-id="4614" instrument_node="">2008</span></a><span data-dcnode-id="4612" instrument_node="">; de Roo </span><a aria-label="Reference 2010" data-dcnode-id="4610" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d191688938e313" title="de Roo, G. 2010. Being or Becoming? That is the Question! In A Planner’s Encounter with Complexity, ed. G. de Roo and E. Silva, 19–40. Burlington: Ashgate."><span data-dcnode-id="4611" instrument_node="">2010</span></a><span data-dcnode-id="4609" instrument_node="">). Complexity problematizes rationality and certainty—due to emergence’s ability to surprise—providing a frame to theorize prediction’s limitations and approach “wicked problems,” incrementalism, and collaborative place-making (Innes and Booher </span><a aria-label="Reference 2010" data-dcnode-id="4607" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d191688938e316" title="Innes, J.E., and D.E. Booher. 2010. Planning with Complexity. London: Routledge."><span data-dcnode-id="4608" instrument_node="">2010</span></a><span data-dcnode-id="4606" instrument_node="">; Yamu et al. </span><a aria-label="Reference 2016" data-dcnode-id="4604" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d191688938e319" title="Yamu, C., G. de Roo, and P. Frankhauser. 2016. Assuming It is All About Conditions. Environment and Planning B 43 (6): 1019–1039. 
                    https://doi.org/10.1177/0265813515607858
                    
                  ."><span data-dcnode-id="4605" instrument_node="">2016</span></a><span data-dcnode-id="4603" instrument_node="">; Rauws </span><a aria-label="Reference 2017" data-dcnode-id="4601" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d191688938e322" title="Rauws, W. 2017. Embracing Uncertainty Without Abandoning Planning. DisP:&nbsp;The Planning Review 53 (1): 32–45. 
                    https://doi.org/10.1080/02513625.2017.1316539
                    
                  ."><span data-dcnode-id="4602" instrument_node="">2017</span></a><span data-dcnode-id="4600" instrument_node="">; Skrimizea et al. </span><a aria-label="Reference 2018" data-dcnode-id="4598" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d191688938e325" title="Skrimizea, E., H. Haniotou, and C. Parra. 2018. On the “complexity turn” in Planning. Planning Theory. 
                    https://doi.org/10.1177/1473095218780515
                    
                  ."><span data-dcnode-id="4599" instrument_node="">2018</span></a><span data-dcnode-id="4597" instrument_node="">).</span></p><p data-dcnode-id="4534"><span data-dcnode-id="4595" instrument_node="">A city’s planned and emergent structure, connectedness, accessibility, stability, resilience, and robustness involve urban design and bridge qualitative theories of cities and quantitative studies of physical form, design, and transportation (Portugali </span><a aria-label="Reference 2006" data-dcnode-id="4593" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d191688938e331" title="Portugali, J. 2006. Complexity Theory as a Link Between Space and Place. Environment and Planning A 38 (4): 647–664. 
                    https://doi.org/10.1068/a37260
                    
                  ."><span data-dcnode-id="4594" instrument_node="">2006</span></a><span data-dcnode-id="4592" instrument_node="">). Urban designers often discuss urban form and design projects in terms of complexity (e.g., Duany et al. </span><a aria-label="Reference 2001" data-dcnode-id="4590" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d191688938e334" title="Duany, A., E. Plater-Zyberk, et al. 2001. The Lexicon of New Urbanism. Miami, FL: Duany, Plater-Zyberk &amp; Co."><span data-dcnode-id="4591" instrument_node="">2001</span></a><span data-dcnode-id="4589" instrument_node="">; Macdonald </span><a aria-label="Reference 2002" data-dcnode-id="4587" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d191688938e337" title="Macdonald, E. 2002. Structuring a Landscape, Structuring a Sense of Place. Journal of Urban Design 7 (2): 117–143. 
                    https://doi.org/10.1080/1357480022000012203
                    
                  ."><span data-dcnode-id="4588" instrument_node="">2002</span></a><span data-dcnode-id="4586" instrument_node="">; Talen </span><a aria-label="Reference 2003" data-dcnode-id="4584" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d191688938e340" title="Talen, E. 2003. Measuring Urbanism. Journal of Urban Design 8 (3): 195–215. 
                    https://doi.org/10.1080/1357480032000155141
                    
                  ."><span data-dcnode-id="4585" instrument_node="">2003</span></a><span data-dcnode-id="4583" instrument_node="">; Alexander </span><a aria-label="Reference 2003" data-dcnode-id="4581" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d191688938e343" title="Alexander, C. 2003. New Concepts in Complexity Theory Arising from Studies in the Field of Architecture. Katarxis 3 (3): 1–24."><span data-dcnode-id="4582" instrument_node="">2003</span></a><span data-dcnode-id="4580" instrument_node="">;&nbsp;Sanders </span><a aria-label="Reference 2008" data-dcnode-id="4578" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d191688938e347" title="Sanders, T.I. 2008. Complex Systems Thinking and New Urbanism. In New Urbanism and Beyond, ed. T. Haas, 275–279. New York: Rizzoli."><span data-dcnode-id="4579" instrument_node="">2008</span></a><span data-dcnode-id="4577" instrument_node="">; Congress for the New Urbanism </span><a aria-label="Reference 2015" data-dcnode-id="4575" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d191688938e350" title="Congress for the New Urbanism. 2015. New Urbanism Embraces Complexity. 
                    http://www.cnu.org/node/45
                    
                  ."><span data-dcnode-id="4576" instrument_node="">2015</span></a><span data-dcnode-id="4574" instrument_node="">). These discussions borrow salient concepts of complexity theory, but often loosely or metaphorically&nbsp;rather than scientifically, making it difficult to assess claims and outcomes (Chettiparamb </span><a aria-label="Reference 2006" data-dcnode-id="4572" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d191688938e353" title="Chettiparamb, A. 2006. Metaphors in Complexity Theory and Planning. Planning Theory 5 (1): 71–91. 
                    https://doi.org/10.1177/1473095206061022
                    
                  ."><span data-dcnode-id="4573" instrument_node="">2006</span></a><span data-dcnode-id="4571" instrument_node="">; cf. Marshall </span><a aria-label="Reference 2012a" data-dcnode-id="4569" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d191688938e356" title="Marshall, S. 2012a. Science, Pseudo-Science and Urban Design. Urban Design International 17 (4): 257–271. 
                    https://doi.org/10.1057/udi.2012.22
                    
                  ."><span data-dcnode-id="4570" instrument_node="">2012a</span></a><span data-dcnode-id="4568" instrument_node="">; Dovey and Pafka </span><a aria-label="Reference 2016" data-dcnode-id="4566" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d191688938e359" title="Dovey, K., and E. Pafka. 2016. The Science of Urban Design? Urban Design International 21 (1): 1–10. 
                    https://doi.org/10.1057/udi.2015.28
                    
                  ."><span data-dcnode-id="4567" instrument_node="">2016</span></a><span data-dcnode-id="4565" instrument_node="">; Rauber and Krafta </span><a aria-label="Reference 2018" data-dcnode-id="4563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d191688938e362" title="Rauber, A., and R. Krafta. 2018. Alexander’s Theories Applied to Urban Design. Urban Science 2 (3): 86. 
                    https://doi.org/10.3390/urbansci2030086
                    
                  ."><span data-dcnode-id="4564" instrument_node="">2018</span></a><span data-dcnode-id="4562" instrument_node="">). Nevertheless, various formulations of complexity have long been regarded as critical to urban design. It contributes to lively, enjoyable, walkable, healthy, and vital neighborhoods (Jacobs </span><a aria-label="Reference 1961" data-dcnode-id="4560" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d191688938e366" title="Jacobs, J. 1961. The Death and Life of Great American Cities. New York: Vintage."><span data-dcnode-id="4561" instrument_node="">1961</span></a><span data-dcnode-id="4559" instrument_node="">; Macdonald </span><a aria-label="Reference 2002" data-dcnode-id="4557" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d191688938e369" title="Macdonald, E. 2002. Structuring a Landscape, Structuring a Sense of Place. Journal of Urban Design 7 (2): 117–143. 
                    https://doi.org/10.1080/1357480022000012203
                    
                  ."><span data-dcnode-id="4558" instrument_node="">2002</span></a><span data-dcnode-id="4556" instrument_node="">; Carlson et al. </span><a aria-label="Reference 2012" data-dcnode-id="4554" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d191688938e372" title="Carlson, C., S. Aytur, K. Gardner, and S. Rogers. 2012. Complexity in Built Environment, Health, and Destination Walking. Journal of Urban Health 89 (2): 270–284. 
                    https://doi.org/10.1007/s11524-011-9652-8
                    
                  ."><span data-dcnode-id="4555" instrument_node="">2012</span></a><span data-dcnode-id="4553" instrument_node="">; McGreevy and Wilson </span><a aria-label="Reference 2016" data-dcnode-id="4551" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d191688938e375" title="McGreevy, M., and L. Wilson. 2016. The Civic and Neighbourhood Commons as Complex Adaptive Systems. Planning Theory. 
                    https://doi.org/10.1177/1473095216631587
                    
                  ."><span data-dcnode-id="4552" instrument_node="">2016</span></a><span data-dcnode-id="4550" instrument_node="">). It implies resilience, robustness, connectivity, and access—playing into wider debates about sustainability and resource efficiency (Peter and Swilling </span><a aria-label="Reference 2014" data-dcnode-id="4548" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d191688938e378" title="Peter, C., and M. Swilling. 2014. Linking Complexity and Sustainability Theories. Sustainability 6 (3): 1594–1622. 
                    https://doi.org/10.3390/su6031594
                    
                  ."><span data-dcnode-id="4549" instrument_node="">2014</span></a><span data-dcnode-id="4547" instrument_node="">; Pugh </span><a aria-label="Reference 2014" data-dcnode-id="4545" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d191688938e381" title="Pugh, J. 2014. Resilience, Complexity and Post-liberalism. Area 46 (3): 313–319. 
                    https://doi.org/10.1111/area.12118
                    
                  ."><span data-dcnode-id="4546" instrument_node="">2014</span></a><span data-dcnode-id="4544" instrument_node="">; Wells </span><a aria-label="Reference 2014" data-dcnode-id="4542" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d191688938e385" title="Wells, J. 2014. Complexity and Sustainability. London: Routledge."><span data-dcnode-id="4543" instrument_node="">2014</span></a><span data-dcnode-id="4541" instrument_node="">). Complexity in urban design can be emancipatory, re-centering top–down practices as liberating bottom–up collaborations that restructure the built environment to improve equity, spatial justice, adaptiveness, and social contact and exchange (Byrne </span><a aria-label="Reference 2003" data-dcnode-id="4539" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d191688938e388" title="Byrne, D. 2003. Complexity Theory and Planning Theory: A Necessary Encounter. Planning Theory 2 (3): 171–178. 
                    https://doi.org/10.1177/147309520323002
                    
                  ."><span data-dcnode-id="4540" instrument_node="">2003</span></a><span data-dcnode-id="4538" instrument_node="">; cf. Pettigrew and Tropp </span><a aria-label="Reference 2006" data-dcnode-id="4536" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d191688938e391" title="Pettigrew, T.F., and L.R. Tropp. 2006. A Meta-analytic Test of Intergroup Contact Theory. Journal of Personality and Social Psychology 90 (5): 751–783. 
                    https://doi.org/10.1037/0022-3514.90.5.751
                    
                  ."><span data-dcnode-id="4537" instrument_node="">2006</span></a><span data-dcnode-id="4535" instrument_node="">).</span></p><p data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">Research in multiple literature streams has considered cities, ecosystems, and other physical phenomena in terms of systemic complexity. Urban design can build on these foundations to formalize, clarify, and assess values and claims about physical complexity in the built environment. However, no synthesis exists in the urban design literature to organize and link these bodies of scholarship. This paper aims to address this gap. First, it unpacks complexity’s relevance to urban design. Then, it reviews temporal, visual, spatial, scaling, and connectivity measures of complexity from various disciplines, exploring their relevance to urban form character and urban design outcomes. Finally, it collates these measures into a typology to formalize and assess design claims, project results, and the urban form, before concluding with implications for practice and scholarship.</span></p></div></div></section><section data-dcnode-id="4342" data-gtm-vis-first-on-screen-50443292_562="1405" data-gtm-vis-first-on-screen-50443292_563="1406" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1405" data-gtm-vis-recent-on-screen-50443292_563="1406" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Background"><div class="c-article-section" data-dcnode-id="4343" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4527" id="Sec2"><span data-dcnode-id="4528" instrument_node="">Background</span></h2><div class="c-article-section__content" data-dcnode-id="4344" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="4525" id="Sec3"><span data-dcnode-id="4526" instrument_node="">Complexity and cities</span></h3><p data-dcnode-id="4511"><span data-dcnode-id="4524" instrument_node="">Belying the simple definition of complexity provided in the introduction, disagreements exist about the domain, interpretation, and implications of complexity theory. Shiner et al. (</span><a aria-label="Reference 1999" data-dcnode-id="4522" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d191688938e409" title="Shiner, J.S., M. Davison, and P.T. Landsberg. 1999. Simple Measure for Complexity. Physical Review E 59 (2): 1459. 
                    https://doi.org/10.1103/PhysRevE.59.1459
                    
                  ."><span data-dcnode-id="4523" instrument_node="">1999</span></a><span data-dcnode-id="4521" instrument_node="">) offer a useful abstract distillation of these debates and interpretations in terms of order and disorder, illustrated by Fig.&nbsp;</span><a data-dcnode-id="4519" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4520" instrument_node="">1</span></a><span data-dcnode-id="4518" instrument_node="">’s broad categories of complexity. Category I is positively correlated with disorder and includes algorithmic complexity and most measures of entropy. Here, complexity is highest when objects are scrambled up with the greatest variety and diversity. Category II is a convex function of disorder, peaking at some midpoint between order and disorder. This balances variety and structure, conforming to traditional definitions of complex adaptive systems (e.g., Gershenson and Fernández </span><a aria-label="Reference 2012" data-dcnode-id="4516" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d191688938e415" title="Gershenson, C., and N. Fernández. 2012. Complexity and information. Complexity 18 (2): 29–44. 
                    https://doi.org/10.1002/cplx.21424
                    
                  ."><span data-dcnode-id="4517" instrument_node="">2012</span></a><span data-dcnode-id="4515" instrument_node="">). Category III takes complexity to be related more purely to order or structure alone, favoring self-organization and emergence in which structure emerges from disorder. This paper uses these interpretative categories to consider measures of complexity in urban design (depending on context and character), focusing on the second: the Jacobsian balance between structure and variety. While these categories are mutually incompatible (e.g., complexity cannot be simultaneously high </span><i data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">and</span></i><span data-dcnode-id="4512" instrument_node=""> low when disorder is high), they reflect aspects of complexity to consider and assess.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4480" data-gtm-vis-first-on-screen-50443292_561="1405" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="1404" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig.&nbsp;1" id="figure-1"><figure data-dcnode-id="4481"><figcaption data-dcnode-id="4508"><b class="c-article-section__figure-caption" data-dcnode-id="4509" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="4510" instrument_node="">Fig.&nbsp;1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4492"><div class="c-article-section__figure-item" data-dcnode-id="4496"><a class="c-article-section__figure-link" data-dcnode-id="4504" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/s41289-018-0072-1/figures/1" rel="nofollow"><picture data-dcnode-id="4505"><source data-dcnode-id="4507" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1057%2Fs41289-018-0072-1/MediaObjects/41289_2018_72_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="4506" height="242" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1057/s41289-018-0072-1/MediaObjects/41289_2018_72_Fig1_HTML.png&amp;raw" width="685"></picture></a><p class="c-article-section__figure-credit text-right c-article-section__figure-credit-right" data-dcnode-id="4497" data-test="figure-credit"><i data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">Image Source</span></i><span data-dcnode-id="4501" instrument_node=""> author, adapted from Shiner et al. (</span><a aria-label="Reference 1999" data-dcnode-id="4499" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d191688938e437" title="Shiner, J.S., M. Davison, and P.T. Landsberg. 1999. Simple Measure for Complexity. Physical Review E 59 (2): 1459. 
                    https://doi.org/10.1103/PhysRevE.59.1459
                    
                  ."><span data-dcnode-id="4500" instrument_node="">1999</span></a><span data-dcnode-id="4498" instrument_node="">)</span></p></div><div class="c-article-section__figure-description" data-dcnode-id="4493" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">Three interpretations of complexity as a function of disorder. Category I increases monotonically with disorder. Category II peaks at a midpoint between order and disorder. Category III decreases monotonically as disorder increases</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4482"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="4483" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/s41289-018-0072-1/figures/1" rel="nofollow"><span data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4484" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4485" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4486" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4489" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4488" fill-rule="evenodd"></path><span data-dcnode-id="4487" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4479" instrument_node="">
</span><p data-dcnode-id="4474"><span data-dcnode-id="4478" instrument_node="">How does the experience of—or preference for—complexity vary from person to person and culture to culture? We may have some intuitive sense of the complexity of a place simply by observing it or moving through it, but how might this be formalized? Cities are complex human ecosystems: population, density, employment, wealth, traffic volume, etc. can be (potentially) identified and (potentially) calculated at various scales to describe the system’s evolving state. We can explore its dynamics with differential equations, regression models, machine learning algorithms, cellular automata, or agent-based models. But system dynamics, stock/flow modeling, and other such measures of a world “becoming” are less useful for the characterization and analysis of urban structure and physical patterns “as exists” or “as proposed” (cf. de Roo </span><a aria-label="Reference 2010" data-dcnode-id="4476" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d191688938e453" title="de Roo, G. 2010. Being or Becoming? That is the Question! In A Planner’s Encounter with Complexity, ed. G. de Roo and E. Silva, 19–40. Burlington: Ashgate."><span data-dcnode-id="4477" instrument_node="">2010</span></a><span data-dcnode-id="4475" instrument_node="">).</span></p><p data-dcnode-id="4463"><span data-dcnode-id="4473" instrument_node="">For the latter, we study built environments as physical structures produced by human behavior. This emphasizes spatial form rather than dynamical processes. Through co-evolution, humans both shape their cities and neighborhoods and are in turn shaped by them. The resulting physical patterns compose the urban form and can be studied in terms of network character, fractal structure, diversity (of various sorts), and entropy. At higher levels of abstraction, we can analyze the resilience, robustness, and adaptive capacity of urban complex systems and how they respond to perturbation given their spatial patterns, structure, connectedness, and efficiency. This provides a critical link from measuring complexity to the goals of urban decision-making, design, and planning interventions (de Roo and Rauws </span><a aria-label="Reference 2012" data-dcnode-id="4471" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d191688938e459" title="de Roo, G., and W.S. Rauws. 2012. Positioning Planning in the World of Order, Chaos and Complexity. In Complexity Theories of Cities Have Come of Age, ed. J. Portugali, H. Meyer, E. Stolk, and E. Tan, 207–220. Berlin: Springer."><span data-dcnode-id="4472" instrument_node="">2012</span></a><span data-dcnode-id="4470" instrument_node="">; Yamu et al. </span><a aria-label="Reference 2016" data-dcnode-id="4468" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d191688938e462" title="Yamu, C., G. de Roo, and P. Frankhauser. 2016. Assuming It is All About Conditions. Environment and Planning B 43 (6): 1019–1039. 
                    https://doi.org/10.1177/0265813515607858
                    
                  ."><span data-dcnode-id="4469" instrument_node="">2016</span></a><span data-dcnode-id="4467" instrument_node="">; Rauws </span><a aria-label="Reference 2017" data-dcnode-id="4465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d191688938e465" title="Rauws, W. 2017. Embracing Uncertainty Without Abandoning Planning. DisP:&nbsp;The Planning Review 53 (1): 32–45. 
                    https://doi.org/10.1080/02513625.2017.1316539
                    
                  ."><span data-dcnode-id="4466" instrument_node="">2017</span></a><span data-dcnode-id="4464" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4461" id="Sec4"><span data-dcnode-id="4462" instrument_node="">Urban design and physical complexity</span></h3><p data-dcnode-id="4435"><span data-dcnode-id="4460" instrument_node="">Urban designers shape the public realm at the intersection of architecture and city planning (Moudon </span><a aria-label="Reference 1992" data-dcnode-id="4458" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d191688938e476" title="Moudon, A.V. 1992. A Catholic Approach to Organizing What Urban Designers Should Know. Journal of Planning Literature 6 (4): 331–349. 
                    https://doi.org/10.1177/088541229200600401
                    
                  ."><span data-dcnode-id="4459" instrument_node="">1992</span></a><span data-dcnode-id="4457" instrument_node="">; Cuthbert </span><a aria-label="Reference 2007" data-dcnode-id="4455" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR111" id="ref-link-section-d191688938e479" title="Cuthbert, A.R. 2007. Urban Design: Requiem for an Era. Urban Design International 12 (4): 177–223. 
                    https://doi.org/10.1057/palgrave.udi.9000200
                    
                  ."><span data-dcnode-id="4456" instrument_node="">2007</span></a><span data-dcnode-id="4454" instrument_node="">;&nbsp;Biddulph </span><a aria-label="Reference 2012" data-dcnode-id="4452" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d191688938e482" title="Biddulph, M. 2012. The Problem with Thinking about or for Urban Design. Journal of Urban Design 17 (1): 1–20. 
                    https://doi.org/10.1080/13574809.2011.646251
                    
                  ."><span data-dcnode-id="4453" instrument_node="">2012</span></a><span data-dcnode-id="4451" instrument_node="">). Urban design includes centralized top–down acts, informal bottom–up acts, and everything in between. Its history reflects normative stances shifting through eras of classical formalism, romantic organicism, modernist simplifications, and post-Jane Jacobs gestures toward “organized complexity” (Barnett </span><a aria-label="Reference 2011" data-dcnode-id="4449" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d191688938e485" title="Barnett, J. 2011. City Design. New York: Routledge."><span data-dcnode-id="4450" instrument_node="">2011</span></a><span data-dcnode-id="4448" instrument_node="">). Jacobs’s theories of complexity and bottom–up urbanism have been embraced by complex systems scholars studying cities—particularly from the physical sciences (Batty </span><a aria-label="Reference 2005" data-dcnode-id="4446" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d191688938e488" title="Batty, M. 2005. Cities and Complexity. Cambridge: MIT Press."><span data-dcnode-id="4447" instrument_node="">2005</span></a><span data-dcnode-id="4445" instrument_node="">; Bettencourt </span><a aria-label="Reference 2014" data-dcnode-id="4443" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d191688938e492" title="Bettencourt, L. 2014. The Kind of Problem a City Is. In Decoding the City, ed. D. Offenhuber and C. Ratti. DeGruyter: Berlin, Germany."><span data-dcnode-id="4444" instrument_node="">2014</span></a><span data-dcnode-id="4442" instrument_node="">; Batty and Marshall </span><a aria-label="Reference 2016" data-dcnode-id="4440" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d191688938e495" title="Batty, M., and S. Marshall. 2016. Thinking Organic, Acting Civic. Landscape and Urban Planning. 
                    https://doi.org/10.1016/j.landurbplan.2016.06.002
                    
                  ."><span data-dcnode-id="4441" instrument_node="">2016</span></a><span data-dcnode-id="4439" instrument_node="">; cf. O’Sullivan and Manson </span><a aria-label="Reference 2015" data-dcnode-id="4437" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d191688938e498" title="O’Sullivan, D., and S.M. Manson. 2015. Do Physicists Have Geography Envy? And What Can Geographers Learn from It? Annals of the Association of American Geographers 105 (4): 704–722. 
                    https://doi.org/10.1080/00045608.2015.1039105
                    
                  ."><span data-dcnode-id="4438" instrument_node="">2015</span></a><span data-dcnode-id="4436" instrument_node="">).</span></p><p data-dcnode-id="4412"><span data-dcnode-id="4434" instrument_node="">In the twentieth century, Corbusier and fellow modernists sought to eradicate the physical complexity of traditional cities, setting the stage for automobile dependency and single-use functional zoning (Hall </span><a aria-label="Reference 1996" data-dcnode-id="4432" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d191688938e504" title="Hall, P. 1996. Cities of Tomorrow. Malden: Blackwell Publishers."><span data-dcnode-id="4433" instrument_node="">1996</span></a><span data-dcnode-id="4431" instrument_node="">). Scott (</span><a aria-label="Reference 1998" data-dcnode-id="4429" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d191688938e507" title="Scott, J.C. 1998. Seeing Like a State. New Haven: Yale University Press."><span data-dcnode-id="4430" instrument_node="">1998</span></a><span data-dcnode-id="4428" instrument_node="">) critiques modernist urban design by contrasting Corbusier’s top–down, simplified, rational, polished, utopian cities with bottom–up, organically built, messy everyday urbanisms dependent on localized tacit knowledge (cf. Jacobs </span><a aria-label="Reference 1961" data-dcnode-id="4426" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d191688938e510" title="Jacobs, J. 1961. The Death and Life of Great American Cities. New York: Vintage."><span data-dcnode-id="4427" instrument_node="">1961</span></a><span data-dcnode-id="4425" instrument_node="">; Holston </span><a aria-label="Reference 1989" data-dcnode-id="4423" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d191688938e513" title="Holston, J. 1989. The Modernist City. Chicago: University of Chicago Press."><span data-dcnode-id="4424" instrument_node="">1989</span></a><span data-dcnode-id="4422" instrument_node="">). Modernist designers confused geometric visual order for well-functioning, sustainable social order in the built environment (Roy </span><a aria-label="Reference 2005" data-dcnode-id="4420" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d191688938e516" title="Roy, A. 2005. Urban Informality: Toward an Epistemology of Planning. Journal of the American Planning Association 71 (2): 147–158. 
                    https://doi.org/10.1080/01944360508976689
                    
                  ."><span data-dcnode-id="4421" instrument_node="">2005</span></a><span data-dcnode-id="4419" instrument_node="">; Sussman and Hollander </span><a aria-label="Reference 2015" data-dcnode-id="4417" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d191688938e520" title="Sussman, A., and J.B. Hollander. 2015. Cognitive Architecture. New York: Routledge."><span data-dcnode-id="4418" instrument_node="">2015</span></a><span data-dcnode-id="4416" instrument_node="">). Scholars following in Jane Jacobs’s wake have argued that simplified single-purpose urban design destroys functional capacity and synergy. Over-simplified interventions cut into the living tissue of urban complex systems, killing vital social processes: while healthy complex adaptive systems are resilient to perturbation, their resilience and adaptability can be compromised by too many simplifying interventions (Marshall </span><a aria-label="Reference 2012b" data-dcnode-id="4414" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d191688938e523" title="Marshall, S. 2012b. Planning, Design and the Complexity of Cities. In Complexity Theories of Cities Have Come of Age, ed. J. Portugali, H. Meyer, E. Stolk, and E. Tan, 191–205. Berlin: Springer-Verlag."><span data-dcnode-id="4415" instrument_node="">2012b</span></a><span data-dcnode-id="4413" instrument_node="">).</span></p><p data-dcnode-id="4407"><span data-dcnode-id="4411" instrument_node="">How does urban design fit into the spectrum of bottom–up complexity versus top–down control? Every built environment includes </span><i data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">some</span></i><span data-dcnode-id="4408" instrument_node=""> deliberate design—especially in the public realm. Building façades are designed, roads are engineered, sidewalk widths are selected, and parks are laid out. Marshall (ibid.) suggests a critical role of urban design in delivering “functional complexity” for neighborhoods. Jacobs similarly argued for planners to generate diversity and supply what a neighborhood lacks. According to this stream of scholarship, urban design and planning can encourage diversity, adaptability, connectedness, resilience, and robustness—elements of healthy complex systems.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4405" id="Sec5"><span data-dcnode-id="4406" instrument_node="">Measuring complexity</span></h3><p data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">Beyond qualitative formulations of complexity in urban form and design, how might it be measured and assessed? If cities are complex systems, and if complexity is important for systemic resilience, connectedness, and adaptability, then indicators of their complexity are essential for grounding debates and evaluating existing and proposed patterns and processes. However, no compilation or synthesis of relevant measures exists in the urban design literature to organize and connect these theories and methodologies to the practice of planning and designing resilient, connected, adaptable communities. While these measures are well known to complexity scholars, many remain underexplored in design practice and research.</span></p><p data-dcnode-id="4368"><span data-dcnode-id="4402" instrument_node="">One stream of planning literature has considered quantitative measures of the urban form, but without explicitly engaging with complexity (e.g., Cervero and Kockelman </span><a aria-label="Reference 1997" data-dcnode-id="4400" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d191688938e543" title="Cervero, R., and K. Kockelman. 1997. Travel Demand and the 3 Ds. Transportation Research Part D 2 (3): 199–219. 
                    https://doi.org/10.1016/S1361-9209(97)00009-6
                    
                  ."><span data-dcnode-id="4401" instrument_node="">1997</span></a><span data-dcnode-id="4399" instrument_node="">; Song and Knaap </span><a aria-label="Reference 2004" data-dcnode-id="4397" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d191688938e546" title="Song, Y., and G.-J. Knaap. 2004. Measuring Urban Form. Journal of the American Planning Association 70 (2): 210–225. 
                    https://doi.org/10.1080/01944360408976371
                    
                  ."><span data-dcnode-id="4398" instrument_node="">2004</span></a><span data-dcnode-id="4396" instrument_node="">; Tsai </span><a aria-label="Reference 2005" data-dcnode-id="4394" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d191688938e549" title="Tsai, Y.-H. 2005. Quantifying Urban Form. Urban Studies 42 (1): 141–161. 
                    https://doi.org/10.1080/0042098042000309748
                    
                  ."><span data-dcnode-id="4395" instrument_node="">2005</span></a><span data-dcnode-id="4393" instrument_node="">; Clifton et al. </span><a aria-label="Reference 2008" data-dcnode-id="4391" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d191688938e552" title="Clifton, K., R. Ewing, G. Knaap, and Y. Song. 2008. Quantitative Analysis of Urban Form. Journal of Urbanism 1 (1): 17–45. 
                    https://doi.org/10.1080/17549170801903496
                    
                  ."><span data-dcnode-id="4392" instrument_node="">2008</span></a><span data-dcnode-id="4390" instrument_node="">; Ewing and Cervero </span><a aria-label="Reference 2010" data-dcnode-id="4388" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d191688938e555" title="Ewing, R., and R. Cervero. 2010. Travel and the Built Environment. Journal of the American Planning Association 76 (3): 265–294. 
                    https://doi.org/10.1080/01944361003766766
                    
                  ."><span data-dcnode-id="4389" instrument_node="">2010</span></a><span data-dcnode-id="4387" instrument_node="">; Schwarz </span><a aria-label="Reference 2010" data-dcnode-id="4385" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d191688938e559" title="Schwarz, N. 2010. Urban Form Revisited. Landscape and Urban Planning 96 (1): 29–47. 
                    https://doi.org/10.1016/j.landurbplan.2010.01.007
                    
                  ."><span data-dcnode-id="4386" instrument_node="">2010</span></a><span data-dcnode-id="4384" instrument_node="">; Song et al. </span><a aria-label="Reference 2013b" data-dcnode-id="4382" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d191688938e562" title="Song, Y., B. Popkin, and P. Gordon-Larsen. 2013b. A National-Level Analysis of Neighborhood Form Metrics. Landscape and Urban Planning 116: 73–85. 
                    https://doi.org/10.1016/j.landurbplan.2013.04.002
                    
                  ."><span data-dcnode-id="4383" instrument_node="">2013b</span></a><span data-dcnode-id="4381" instrument_node="">). Various complexity metrics at multiple scales, from metropolitan to neighborhood to building, are scattered throughout different bodies of literature. Lloyd (</span><a aria-label="Reference 2001" data-dcnode-id="4379" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d191688938e565" title="Lloyd, S. 2001. Measures of Complexity. IEEE Control Systems Magazine 21 (4): 7–8."><span data-dcnode-id="4380" instrument_node="">2001</span></a><span data-dcnode-id="4378" instrument_node="">) surveyed and categorized measures of complexity across numerous fields of inquiry. Bourdic et al. (</span><a aria-label="Reference 2012" data-dcnode-id="4376" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d191688938e568" title="Bourdic, L., S. Salat, and C. Nowacki. 2012. Assessing Cities. Building Research &amp; Information 40 (5): 592–605. 
                    https://doi.org/10.1080/09613218.2012.703488
                    
                  ."><span data-dcnode-id="4377" instrument_node="">2012</span></a><span data-dcnode-id="4375" instrument_node="">) provide an overview of cross-scale spatial indicators and touch on LEED-ND’s neighborhood design assessment criteria. Additional surveys of complexity indicators for ecosystems and cities have been produced by Parrott (</span><a aria-label="Reference 2010" data-dcnode-id="4373" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d191688938e571" title="Parrott, L. 2010. Measuring Ecological Complexity. Ecological Indicators 10 (6): 1069–1076. 
                    https://doi.org/10.1016/j.ecolind.2010.03.014
                    
                  ."><span data-dcnode-id="4374" instrument_node="">2010</span></a><span data-dcnode-id="4372" instrument_node="">) and Salat et al. (</span><a aria-label="Reference 2010" data-dcnode-id="4370" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d191688938e574" title="Salat, S., L. Bourdic, and C. Nowacki. 2010. Assessing Urban Complexity. International Journal of Sustainable Building Technology and Urban Development 1 (2): 160–167. 
                    https://doi.org/10.5390/SUSB.2010.1.2.160
                    
                  ."><span data-dcnode-id="4371" instrument_node="">2010</span></a><span data-dcnode-id="4369" instrument_node="">).</span></p><p data-dcnode-id="4360"><span data-dcnode-id="4367" instrument_node="">The following discussion introduces, borrows, adapts, and reformulates relevant measures of complexity at the scale of urban design, touching on temporal measures but focusing on visual, spatial and structural measures applicable to urban morphology. In particular, it provides a quantitative framework organized around these key dimensions of complexity (Table&nbsp;</span><a data-dcnode-id="4365" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4366" instrument_node="">1</span></a><span data-dcnode-id="4364" instrument_node="">) that accounts for both traditional urban design indicators as well as abstract measures arising from the complexity sciences. It reserves extended derivations and formulae for the references. This framework does not attempt to quantify all aspects of “good” design. Rather, it intends to formalize and measure the indistinct notion of </span><i data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">complexity</span></i><span data-dcnode-id="4361" instrument_node=""> as it applies to urban design. Qualities related to vitality, sustainability, sense of place, and other important characteristics overlap, but are otherwise not the subject of this paper.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4345" data-test="inline-table" id="table-1"><figure data-dcnode-id="4346"><figcaption class="c-article-table__figcaption" data-dcnode-id="4357"><b data-dcnode-id="4358" data-test="table-caption" id="Tab1"><span data-dcnode-id="4359" instrument_node="">Table&nbsp;1 Key dimensions of complexity in urban design</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4347"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="4348" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/s41289-018-0072-1/tables/1" rel="nofollow"><span data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4349" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4350" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4351" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4354" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4353" fill-rule="evenodd"></path><span data-dcnode-id="4352" instrument_node="">
</span></a></div></figure></div></div></div></section><section data-dcnode-id="3881" data-title="Measures of complexity"><div class="c-article-section" data-dcnode-id="3882" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4340" id="Sec6"><span data-dcnode-id="4341" instrument_node="">Measures of complexity</span></h2><div class="c-article-section__content" data-dcnode-id="3883" id="Sec6-content"><h3 class="c-article__sub-heading" data-dcnode-id="4338" id="Sec7"><span data-dcnode-id="4339" instrument_node="">Temporal measures</span></h3><p data-dcnode-id="4312"><span data-dcnode-id="4337" instrument_node="">As they only loosely relate to physical form/design, we briefly introduce temporal measures (which describe time series and system dynamics) before moving to form and structure. Temporal analysis techniques include embedding time series in higher dimensions, uncovering underlying attractors, estimating Lyapunov exponents, and analyzing the system from an information-theoretic perspective (Batty </span><a aria-label="Reference 2005" data-dcnode-id="4335" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d191688938e775" title="Batty, M. 2005. Cities and Complexity. Cambridge: MIT Press."><span data-dcnode-id="4336" instrument_node="">2005</span></a><span data-dcnode-id="4334" instrument_node="">; Boeing </span><a aria-label="Reference 2016" data-dcnode-id="4332" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d191688938e778" title="Boeing, G. 2016. Visual Analysis of Nonlinear Dynamical Systems: Chaos, Fractals, Self-Similarity and the Limits of Prediction. Systems 4 (4): 37. 
                    https://doi.org/10.3390/systems4040037
                    
                  ."><span data-dcnode-id="4333" instrument_node="">2016</span></a><span data-dcnode-id="4331" instrument_node="">). Nonlinear analysis techniques from the physical sciences, such as reconstructing attractors or estimating Lyapunov exponents, have not been found to be particularly effective in the ecology literature (Parrott </span><a aria-label="Reference 2010" data-dcnode-id="4329" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d191688938e781" title="Parrott, L. 2010. Measuring Ecological Complexity. Ecological Indicators 10 (6): 1069–1076. 
                    https://doi.org/10.1016/j.ecolind.2010.03.014
                    
                  ."><span data-dcnode-id="4330" instrument_node="">2010</span></a><span data-dcnode-id="4328" instrument_node="">). Information theory, however, provides useful measures of complexity that may be applied to urban design. Shannon’s (</span><a aria-label="Reference 1948" data-dcnode-id="4326" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d191688938e784" title="Shannon, C.E. 1948. A Mathematical Theory of Communication. The Bell System Technical Journal 27 (379–423): 623–656. 
                    https://doi.org/10.1145/584091.584093
                    
                  ."><span data-dcnode-id="4327" instrument_node="">1948</span></a><span data-dcnode-id="4325" instrument_node="">) theory of information entropy concerns the average amount of information contained in the revelation of a message or event. </span><i data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">Shannon entropy</span></i><span data-dcnode-id="4322" instrument_node=""> indicates that the more types of things there are and the more equal each type’s proportional abundance is, the less predictable the type of any single object will be (Boeing </span><a aria-label="Reference 2018b" data-dcnode-id="4320" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d191688938e791" title="Boeing, G. 2018b. Urban Spatial Order: Street Network Orientation, Configuration, and Entropy. arXiv:1808.00600. 
                    https://arxiv.org/pdf/1808.00600
                    
                  
                        "><span data-dcnode-id="4321" instrument_node="">2018b</span></a><span data-dcnode-id="4319" instrument_node="">). This can be applied to abstract messages, time series, or spatial diversity (as discussed momentarily). Entropy is lowest when the system is highly ordered and, thus, completely predictable. It is highest when the system’s disorder is maximized. Such a (category I) measure thus emphasizes disorder rather than peaking at some point between order and disorder (Batty </span><a aria-label="Reference 2005" data-dcnode-id="4317" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d191688938e794" title="Batty, M. 2005. Cities and Complexity. Cambridge: MIT Press."><span data-dcnode-id="4318" instrument_node="">2005</span></a><span data-dcnode-id="4316" instrument_node="">; Yeh and Li </span><a aria-label="Reference 2001" data-dcnode-id="4314" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d191688938e797" title="Yeh, A.G.-O., and X. Li. 2001. Measuring and Monitoring of Urban Sprawl in a Rapidly Growing Region Using Entropy. Photogrammetric Engineering and Remote Sensing 67 (1): 83–90."><span data-dcnode-id="4315" instrument_node="">2001</span></a><span data-dcnode-id="4313" instrument_node="">).</span></p><p data-dcnode-id="4292"><span data-dcnode-id="4311" instrument_node="">Derived from Shannon entropy, </span><i data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">mean information gain</span></i><span data-dcnode-id="4308" instrument_node=""> assesses how much new information is gained from each subsequent datum in a time series (Proulx and Parrott </span><a aria-label="Reference 2008" data-dcnode-id="4306" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d191688938e806" title="Proulx, R., and L. Parrott. 2008. Measures of Structural Complexity in Digital Images for Monitoring the Ecological Signature of an Old-Growth Forest Ecosystem. Ecological Indicators 8 (3): 270–284. 
                    https://doi.org/10.1016/j.ecolind.2007.02.005
                    
                  ."><span data-dcnode-id="4307" instrument_node="">2008</span></a><span data-dcnode-id="4305" instrument_node="">) and </span><i data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">fluctuation complexity</span></i><span data-dcnode-id="4302" instrument_node=""> measures the amount of structure within a time series by evaluating the order of and relationship between its values. In other words, how likely is it that we will observe some value </span><i data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">y</span></i><span data-dcnode-id="4299" instrument_node=""> proximately after some other value </span><i data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">x</span></i><span data-dcnode-id="4296" instrument_node="">? Shannon entropy, mean information gain, and fluctuation complexity can be used to assess time series arising from urban systems. However, more usefully, they can be abstracted and re-appropriated to evaluate the human experience of moving through the physical space that results from urban design (Kuper </span><a aria-label="Reference 2017" data-dcnode-id="4294" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d191688938e819" title="Kuper, R. 2017. Evaluations of Landscape Preference, Complexity, and Coherence for Designed Digital Landscape Models. Landscape and Urban Planning 157: 407–421. 
                    https://doi.org/10.1016/j.landurbplan.2016.09.002
                    
                  ."><span data-dcnode-id="4295" instrument_node="">2017</span></a><span data-dcnode-id="4293" instrument_node="">), which we turn to next.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4290" id="Sec8"><span data-dcnode-id="4291" instrument_node="">Visual complexity</span></h3><p data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">In a simplified urban landscape, pedestrians gain little new information from the visual revelations of each passing step. However, highly complex (category I) urban environments bombard individuals with extensive new information as they move through space. In these examples, space is the medium and the unfolding visual tableaux are the message. This message could be discretized into arbitrary units such as meters, or into units relative to the specific urban landscape, such as street blocks or land parcels.</span></p><p data-dcnode-id="4265"><span data-dcnode-id="4287" instrument_node="">Much of the research on human perception of the built environment follows in the wake of Gibson’s (</span><a aria-label="Reference 1979" data-dcnode-id="4285" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d191688938e833" title="Gibson, J.J. 1979. The Ecological Approach to Visual Perception. Boston: Houghton Mifflin."><span data-dcnode-id="4286" instrument_node="">1979</span></a><span data-dcnode-id="4284" instrument_node="">) ecological framework and Appleton’s (</span><a aria-label="Reference 1975" data-dcnode-id="4282" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d191688938e836" title="Appleton, J. 1975. The Experience of Landscape. New York: Wiley."><span data-dcnode-id="4283" instrument_node="">1975</span></a><span data-dcnode-id="4281" instrument_node="">) prospect–refuge theory (e.g., Tveit et al. </span><a aria-label="Reference 2006" data-dcnode-id="4279" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d191688938e839" title="Tveit, M., Å. Ode, and G. Fry. 2006. Key Concepts in a Framework for Analysing Visual Landscape Character. Landscape Research 31 (3): 229–255. 
                    https://doi.org/10.1080/01426390600783269
                    
                  ."><span data-dcnode-id="4280" instrument_node="">2006</span></a><span data-dcnode-id="4278" instrument_node="">; Ode et al. </span><a aria-label="Reference 2010" data-dcnode-id="4276" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d191688938e842" title="Ode, Å., C.M. Hagerhall, and N. Sang. 2010. Analysing Visual Landscape Complexity. Landscape Research 35 (1): 111–131. 
                    https://doi.org/10.1080/01426390903414935
                    
                  ."><span data-dcnode-id="4277" instrument_node="">2010</span></a><span data-dcnode-id="4275" instrument_node="">). Clifton et al. (</span><a aria-label="Reference 2008" data-dcnode-id="4273" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d191688938e845" title="Clifton, K., R. Ewing, G. Knaap, and Y. Song. 2008. Quantitative Analysis of Urban Form. Journal of Urbanism 1 (1): 17–45. 
                    https://doi.org/10.1080/17549170801903496
                    
                  ."><span data-dcnode-id="4274" instrument_node="">2008</span></a><span data-dcnode-id="4272" instrument_node="">) discuss qualities of the urban form and human perceptions at multiple scales. For neighborhood and street-scale urban design, perceptions of human scale are related to building heights and signage, perceptions of coherence are related to consistency of building heights, and sense of enclosure is related to building/element spacing and tree canopy. “Good” visual complexity tends to reach an optimum at some balance point between order and disorder, with “unity in variety,” implying a (category II) convex interpretation (Elsheshtawy </span><a aria-label="Reference 1997" data-dcnode-id="4270" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d191688938e849" title="Elsheshtawy, Y. 1997. Urban Complexity. Journal of Architectural and Planning Research 14 (4): 301–316. 
                    https://doi.org/10.2307/43030433
                    
                  ."><span data-dcnode-id="4271" instrument_node="">1997</span></a><span data-dcnode-id="4269" instrument_node="">; Gunawardena et al. </span><a aria-label="Reference 2015" data-dcnode-id="4267" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d191688938e852" title="Gunawardena, G.M.W.L., Y. Kubota, and K. Fukahori. 2015. Visual Complexity Analysis Using Taxonomic Diagrams of Figures and Backgrounds in Japanese Residential Streetscapes. Urban Studies Research 2015 (173862): 1–12. 
                    https://doi.org/10.1155/2015/173862
                    
                  ."><span data-dcnode-id="4268" instrument_node="">2015</span></a><span data-dcnode-id="4266" instrument_node="">).</span></p><p data-dcnode-id="4254"><span data-dcnode-id="4264" instrument_node="">Ewing and Clemente (</span><a aria-label="Reference 2013" data-dcnode-id="4262" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d191688938e858" title="Ewing, R., and O. Clemente. 2013. Measuring Urban Design. Washington, DC: Island Press."><span data-dcnode-id="4263" instrument_node="">2013</span></a><span data-dcnode-id="4261" instrument_node="">) perform a literature review yielding 51 perceptual qualities of urban environments, eight of which they select for further study because of their importance across the literature: imageability, enclosure, human scale, transparency, coherence, legibility, linkage, and visual complexity (cf. Ewing and Handy </span><a aria-label="Reference 2009" data-dcnode-id="4259" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d191688938e861" title="Ewing, R., and S. Handy. 2009. Measuring the Unmeasurable. Journal of Urban Design 14 (1): 65–84. 
                    https://doi.org/10.1080/13574800802451155
                    
                  ."><span data-dcnode-id="4260" instrument_node="">2009</span></a><span data-dcnode-id="4258" instrument_node="">). These researchers relate complexity to the number of perceptible differences a person is exposed to while moving through the city. Humans prefer to experience information at a comfortable rate—too little deprives the senses and too much overloads them. Good visual complexity depends on variety in buildings types, design details, street furniture, signage, human activity, sunlight patterns, and the rich textural details of street trees and urban forests. Complexity is lost when design becomes too top–down, controlled, and predictable in modern large-scale master plans. Poor complexity exists when urban design elements are too few, too similar and predictable, or too disordered to be comprehensible. In this formulation, complexity follows a category II convex function with a maximum value at some midpoint between order and disorder. Finally, Ewing and Clemente develop a field manual for measuring visual complexity as part of a larger toolkit for analyzing urban design according to their eight perceptual qualities. Cavalcante et al. (</span><a aria-label="Reference 2014" data-dcnode-id="4256" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d191688938e864" title="Cavalcante, A., A. Mansouri, L. Kacha, A.K. Barros, Y. Takeuchi, N. Matsumoto, and N. Ohnishi. 2014. Measuring Streetscape Complexity Based on the Statistics of Local Contrast and Spatial Frequency. PLoS ONE 9 (2): e87097. 
                    https://doi.org/10.1371/journal.pone.0087097
                    
                  ."><span data-dcnode-id="4257" instrument_node="">2014</span></a><span data-dcnode-id="4255" instrument_node="">) provide an alternate, statistical image processing measure of urban visual complexity.</span></p><p data-dcnode-id="4231"><span data-dcnode-id="4253" instrument_node="">Fishman (</span><a aria-label="Reference 2011" data-dcnode-id="4251" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d191688938e870" title="Fishman, R. 2011. The Open and the Enclosed. In Companion to Urban Design, ed. T. Banerjee and A. Loukaitou-Sideris, 30–40. London: Routledge."><span data-dcnode-id="4252" instrument_node="">2011</span></a><span data-dcnode-id="4250" instrument_node="">) proposes that a significant conflict exists between the two primary paradigms of modern urban design. The first paradigm, spearheaded by the modernists, seeks to </span><i data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">open up</span></i><span data-dcnode-id="4247" instrument_node=""> the dense and messy urban fabric with towers-in-the-park, spacing, highways, and technology. The second, espoused by neotraditionalists, seeks instead to </span><i data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">enclose space</span></i><span data-dcnode-id="4244" instrument_node=""> through human-scale architecture, walkability, and a dense, complex, organic urban fabric. Jacobs and Appleyard (</span><a aria-label="Reference 1987" data-dcnode-id="4242" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d191688938e879" title="Jacobs, A., and D. Appleyard. 1987. Toward an Urban Design Manifesto. Journal of the American Planning Association 53 (1): 112–120. 
                    https://doi.org/10.1080/01944368708976642
