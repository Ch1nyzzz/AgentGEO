                  ."><span data-dcnode-id="4243" instrument_node="">1987</span></a><span data-dcnode-id="4241" instrument_node="">) argue that buildings in varied arrangements (in accordance with Fishman’s second paradigm) enhance visual complexity, but interminable wide buildings—a hallmark of modernist design—detract from it (cf. Sussman and Hollander </span><a aria-label="Reference 2015" data-dcnode-id="4239" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d191688938e882" title="Sussman, A., and J.B. Hollander. 2015. Cognitive Architecture. New York: Routledge."><span data-dcnode-id="4240" instrument_node="">2015</span></a><span data-dcnode-id="4238" instrument_node="">). Jacobs (</span><a aria-label="Reference 1995" data-dcnode-id="4236" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d191688938e886" title="Jacobs, A. 1995. Great Streets. Cambridge: MIT Press."><span data-dcnode-id="4237" instrument_node="">1995</span></a><span data-dcnode-id="4235" instrument_node="">) further argues that buildings need multiple varied surfaces for light to move over to generate visual complexity. Macdonald (</span><a aria-label="Reference 2005" data-dcnode-id="4233" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d191688938e889" title="Macdonald, E. 2005. Street-Facing Dwelling Units and Livability. Journal of Urban Design 10 (1): 13–38. 
                    https://doi.org/10.1080/13574800500062320
                    
                  ."><span data-dcnode-id="4234" instrument_node="">2005</span></a><span data-dcnode-id="4232" instrument_node="">) explores how Vancouver generates visual complexity to put proverbial eyes on the street, with many entryways and interesting ground-level design.</span></p><p data-dcnode-id="4223"><span data-dcnode-id="4230" instrument_node="">Slow-moving pedestrians need a high level of complexity to hold their interest, but fast-moving motorists find that same environment chaotic. Dumbaugh and Li (</span><a aria-label="Reference 2011" data-dcnode-id="4228" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d191688938e896" title="Dumbaugh, E., and W. Li. 2011. Designing for the Safety of Pedestrians, Cyclists, and Motorists in Urban Environments. Journal of the American Planning Association 77 (1): 69–88. 
                    https://doi.org/10.1080/01944363.2011.536101
                    
                  ."><span data-dcnode-id="4229" instrument_node="">2011</span></a><span data-dcnode-id="4227" instrument_node="">) argue that urban designs that balance vehicle speeds, visual complexity, and traffic conflicts can increase motorist awareness, decrease collisions, and improve pedestrian safety. Marshall (</span><a aria-label="Reference 2012b" data-dcnode-id="4225" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d191688938e899" title="Marshall, S. 2012b. Planning, Design and the Complexity of Cities. In Complexity Theories of Cities Have Come of Age, ed. J. Portugali, H. Meyer, E. Stolk, and E. Tan, 191–205. Berlin: Springer-Verlag."><span data-dcnode-id="4226" instrument_node="">2012b</span></a><span data-dcnode-id="4224" instrument_node="">) contends that urban environments with perceptual richness are more interesting and enjoyable for humans, possibly because our species evolved in natural environments with high degrees of visual complexity.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4221" id="Sec9"><span data-dcnode-id="4222" instrument_node="">Spatial measures</span></h3><p data-dcnode-id="4207"><span data-dcnode-id="4220" instrument_node="">Spatial complexity measures assess the system’s patterns at snapshots in time rather than looking at dynamics over time. Shannon entropy can measure spatial complexity (Batty </span><a aria-label="Reference 2005" data-dcnode-id="4218" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d191688938e910" title="Batty, M. 2005. Cities and Complexity. Cambridge: MIT Press."><span data-dcnode-id="4219" instrument_node="">2005</span></a><span data-dcnode-id="4217" instrument_node="">) and mean information gain can measure ecosystem spatial complexity (Proulx and Parrott </span><a aria-label="Reference 2008" data-dcnode-id="4215" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d191688938e913" title="Proulx, R., and L. Parrott. 2008. Measures of Structural Complexity in Digital Images for Monitoring the Ecological Signature of an Old-Growth Forest Ecosystem. Ecological Indicators 8 (3): 270–284. 
                    https://doi.org/10.1016/j.ecolind.2007.02.005
                    
                  ."><span data-dcnode-id="4216" instrument_node="">2008</span></a><span data-dcnode-id="4214" instrument_node="">). Boeing (</span><a aria-label="Reference 2018b" data-dcnode-id="4212" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d191688938e916" title="Boeing, G. 2018b. Urban Spatial Order: Street Network Orientation, Configuration, and Entropy. arXiv:1808.00600. 
                    https://arxiv.org/pdf/1808.00600
                    
                  
                        "><span data-dcnode-id="4213" instrument_node="">2018b</span></a><span data-dcnode-id="4211" instrument_node="">) adapts entropy measures to analyze urban spatial order through street orientations. Yeh and Li (</span><a aria-label="Reference 2001" data-dcnode-id="4209" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d191688938e919" title="Yeh, A.G.-O., and X. Li. 2001. Measuring and Monitoring of Urban Sprawl in a Rapidly Growing Region Using Entropy. Photogrammetric Engineering and Remote Sensing 67 (1): 83–90."><span data-dcnode-id="4210" instrument_node="">2001</span></a><span data-dcnode-id="4208" instrument_node="">) use entropy to monitor and track urban sprawl. Applying these information-theoretic metrics to space usually entails analyzing raster data for predictability.</span></p><p data-dcnode-id="4193"><span data-dcnode-id="4206" instrument_node="">Diversity and dispersion, however, are the most common spatial complexity measures in the urban design literature. Social diversity can enhance learning, adaptation, and unexpected social mixing. Jacobs (</span><a aria-label="Reference 1961" data-dcnode-id="4204" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d191688938e925" title="Jacobs, J. 1961. The Death and Life of Great American Cities. New York: Vintage."><span data-dcnode-id="4205" instrument_node="">1961</span></a><span data-dcnode-id="4203" instrument_node="">) praised diverse land uses for their ability to create synergies from complementary functions. Boarnet and Crane’s (</span><a aria-label="Reference 2001" data-dcnode-id="4201" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d191688938e928" title="Boarnet, M.G., and R. Crane. 2001. Travel by Design. Oxford: Oxford University Press."><span data-dcnode-id="4202" instrument_node="">2001</span></a><span data-dcnode-id="4200" instrument_node="">) behavioral framework of travel demand argues that urban design influences the (time) cost of travel by placing origins and destinations in closer proximity to (or further from) one another. Similarly, Cervero and Kockelman (</span><a aria-label="Reference 1997" data-dcnode-id="4198" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d191688938e931" title="Cervero, R., and K. Kockelman. 1997. Travel Demand and the 3 Ds. Transportation Research Part D 2 (3): 199–219. 
                    https://doi.org/10.1016/S1361-9209(97)00009-6
                    
                  ."><span data-dcnode-id="4199" instrument_node="">1997</span></a><span data-dcnode-id="4197" instrument_node="">) argue that land use diversity shapes travel behavior in urban environments. Salat et al. (</span><a aria-label="Reference 2010" data-dcnode-id="4195" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d191688938e934" title="Salat, S., L. Bourdic, and C. Nowacki. 2010. Assessing Urban Complexity. International Journal of Sustainable Building Technology and Urban Development 1 (2): 160–167. 
                    https://doi.org/10.5390/SUSB.2010.1.2.160
                    
                  ."><span data-dcnode-id="4196" instrument_node="">2010</span></a><span data-dcnode-id="4194" instrument_node="">) identify three types of urban spatial entropy related to complexity: diversity among similar objects, diversity in spatial distribution, and diversity of scale. Diversity among similar objects might refer to humans’ income, ethnicity, employment, education, etc. It does, however, imply that even distributions score the highest, a questionable planning goal&nbsp;and reflection of complexity.</span></p><p data-dcnode-id="4167"><span data-dcnode-id="4192" instrument_node="">Wissen Hayek et al. (</span><a aria-label="Reference 2015" data-dcnode-id="4190" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d191688938e940" title="Wissen Hayek, U., D. Efthymiou, B. Farooq, T. von Wirth, M. Teich, N. Neuenschwander, and A. Grêt-Regamey. 2015. Quality of Urban Patterns. Landscape and Urban Planning 142: 47–62. 
                    https://doi.org/10.1016/j.landurbplan.2015.05.010
                    
                  ."><span data-dcnode-id="4191" instrument_node="">2015</span></a><span data-dcnode-id="4189" instrument_node="">) measure land use mix and density to evaluate the quality of the neighborhood-scale urban environment. The Simpson diversity index measures the entropy of objects across space and is a common measure of land use mixture in urban design research (economists often call it the Herfindahl–Hirschmann index, while ecologists call it the probability of interspecies encounter). It is an </span><i data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">integral measure</span></i><span data-dcnode-id="4186" instrument_node=""> that considers land use in a district as a whole, ignoring microscale structure (Song et al. </span><a aria-label="Reference 2013a" data-dcnode-id="4184" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d191688938e946" title="Song, Y., L. Merlin, and D. Rodriguez. 2013a. Comparing Measures of Urban Land Use Mix. Computers, Environment and Urban Systems 42: 1–13. 
                    https://doi.org/10.1016/j.compenvurbsys.2013.08.001
                    
                  ."><span data-dcnode-id="4185" instrument_node="">2013a</span></a><span data-dcnode-id="4183" instrument_node="">). In contrast, a </span><i data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">divisional measure</span></i><span data-dcnode-id="4180" instrument_node=""> reflects patterns within a district. Divisional measures better consider questions of scale. Dissimilarity indices measure how the land use mix within a district relates to the mix across the area as a whole (ibid.). Bordoloi et al. (</span><a aria-label="Reference 2013" data-dcnode-id="4178" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d191688938e952" title="Bordoloi, R., A. Mote, P.P. Sarkar, and C. Mallikarjuna. 2013. Quantification of Land Use Diversity in The Context of Mixed Land Use. Procedia—Social and Behavioral Sciences 104: 563–572. 
                    https://doi.org/10.1016/j.sbspro.2013.11.150
                    
                  ."><span data-dcnode-id="4179" instrument_node="">2013</span></a><span data-dcnode-id="4177" instrument_node="">) explore further measures of dissimilarity: these spatial distributions quantify how equitably some set of desirable or undesirable phenomena disperse across the city. For example, are schools clustered in wealthy neighborhoods rather than distributed evenly among all neighborhoods? Are waste treatment facilities concentrated in poor neighborhoods? Some clusters indicate spatial injustice, but other clusters can self-organize and emerge for inevitable or “good” reasons. Agglomeration economies cause job centers to cluster in certain areas (Jacobs </span><a aria-label="Reference 1969" data-dcnode-id="4175" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d191688938e956" title="Jacobs, J. 1969. The Economy of Cities. New York: Vintage."><span data-dcnode-id="4176" instrument_node="">1969</span></a><span data-dcnode-id="4174" instrument_node="">; Glaeser </span><a aria-label="Reference 2011" data-dcnode-id="4172" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d191688938e959" title="Glaeser, E.L. 2011. Triumph of the City. New York: Penguin Press."><span data-dcnode-id="4173" instrument_node="">2011</span></a><span data-dcnode-id="4171" instrument_node="">) and the ecosystem services of urban forests are highest when green spaces are concentrated rather than evenly distributed throughout the built environment (Krasny et al. </span><a aria-label="Reference 2014" data-dcnode-id="4169" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d191688938e962" title="Krasny, M.E., A. Russ, K.G. Tidball, and T. Elmqvist. 2014. Civic Ecology Practices. Ecosystem Services 7: 177–186. 
                    https://doi.org/10.1016/j.ecoser.2013.11.002
                    
                  ."><span data-dcnode-id="4170" instrument_node="">2014</span></a><span data-dcnode-id="4168" instrument_node="">).</span></p><p data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">Measures of topological structure assess the shape and physical configuration of a system. They are perhaps the most applicable measures of the complexity outcomes of urban design because they characterize that which is most dependent upon the design process: physical structure and topological arrangement. At the scale of urban design, structural measures fall primarily into two categories—scaling and connectivity—which we turn to next.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4163" id="Sec10"><span data-dcnode-id="4164" instrument_node="">Scaling</span></h3><p data-dcnode-id="4155"><span data-dcnode-id="4162" instrument_node="">Fractal structure refers to the roughness and self-similarity of some object, and how its detail relates to the scale at which it is observed&nbsp;(Jiang and Yin </span><a aria-label="Reference 2014" data-dcnode-id="4160" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR115" id="ref-link-section-d191688938e976" title="Jiang, B., and J. Yin. 2014. Ht-Index for Quantifying the Fractal or Scaling Structure of Geographic Features. Annals of the Association of American Geographers 104 (3): 530–540. 
                    https://doi.org/10.1080/00045608.2013.834239
                    
                  ."><span data-dcnode-id="4161" instrument_node="">2014</span></a><span data-dcnode-id="4159" instrument_node="">). Fractals have similar structure at every scale rather than one single characteristic scale. In the real world, fractals do not perfectly exist at all spatial scales—from the infinitesimal to the infinite—as abstract mathematical fractals do (Fig.&nbsp;</span><a data-dcnode-id="4157" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4158" instrument_node="">2</span></a><span data-dcnode-id="4156" instrument_node="">). However, self-similarity of patterns over multiple scales exists throughout nature. Batty (e.g., 2005) has demonstrated how city structure and urban peripheries are fractal. Their features tend to be distributed according to a power law (a scale-free distribution) with few large items, a medium number of medium-sized items, and many small items.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4128" data-test="figure" data-title="Fig.&nbsp;2" id="figure-2"><figure data-dcnode-id="4129"><figcaption data-dcnode-id="4152"><b class="c-article-section__figure-caption" data-dcnode-id="4153" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="4154" instrument_node="">Fig.&nbsp;2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4140"><div class="c-article-section__figure-item" data-dcnode-id="4147"><a class="c-article-section__figure-link" data-dcnode-id="4148" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/s41289-018-0072-1/figures/2" rel="nofollow"><picture data-dcnode-id="4149"><source data-dcnode-id="4151" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1057%2Fs41289-018-0072-1/MediaObjects/41289_2018_72_Fig2_HTML.jpg?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="4150" height="224" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1057/s41289-018-0072-1/MediaObjects/41289_2018_72_Fig2_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4141" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="4142"><span data-dcnode-id="4146" instrument_node="">Left: the Mandelbrot set, a mathematical fractal. Center: Venice’s fractal urban fabric. Right: the Eiffel Tower’s fractal architecture. </span><i data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">Image sources</span></i><span data-dcnode-id="4143" instrument_node=""> author</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4130"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="4131" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/s41289-018-0072-1/figures/2" rel="nofollow"><span data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4132" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4133" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4134" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4137" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4136" fill-rule="evenodd"></path><span data-dcnode-id="4135" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4123"><span data-dcnode-id="4127" instrument_node="">Consider the example of an urban street network. At the largest scale, the city has a few major arterial roads and boulevards that serve as the key routes for system-wide traffic circulation. But if we zoom into this picture, a larger number of mid-sized collector streets appear, branching off from these few large arteries. As we zoom in further to a fine scale, a denser mesh of local streets appears, branching off from these collector streets. Certain distributions within a complex system may produce greater efficiency when they follow a power law rather than, say, an even distribution. For example, it is not ideal for a neighborhood to have the same number of arterial roads, collector streets, and local streets. Rather, there might be a small number of large arterial roads, a medium number of mid-sized collector streets, and a large number of capillary local streets. Such a system resembles a fractal. Murcio et al. (</span><a aria-label="Reference 2015" data-dcnode-id="4125" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d191688938e1006" title="Murcio, R., R. Morphet, C. Gershenson, and M. Batty. 2015. Urban Transfer Entropy Across Scales. PLoS ONE 10 (7): e0133780. 
                    https://doi.org/10.1371/journal.pone.0133780
                    
                  ."><span data-dcnode-id="4126" instrument_node="">2015</span></a><span data-dcnode-id="4124" instrument_node="">) measure urban transfer entropy to examine multi-scale patterns and flows. Similar fractal analyses can apply to the distribution and scaling of other urban structures such as buildings and land uses.</span></p><p data-dcnode-id="4109"><span data-dcnode-id="4122" instrument_node="">In particular, the fractal dimension measures how a form’s complexity changes with regard to the scale at which it is measured. The fractal dimension of an object with one topological dimension refers to its space-filling characteristics that, through self-similarity, become a bit more than a one-dimensional line, yet a bit less than a two-dimensional plane. Measures of fractal dimension include the Hausdorff dimension and the box-counting dimension (Shen </span><a aria-label="Reference 2002" data-dcnode-id="4120" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d191688938e1012" title="Shen, G. 2002. Fractal Dimension and Fractal Growth of Urbanized Areas. International Journal of Geographical Information Science 16 (5): 419–437. 
                    https://doi.org/10.1080/13658810210137013
                    
                  ."><span data-dcnode-id="4121" instrument_node="">2002</span></a><span data-dcnode-id="4119" instrument_node="">). The concept of fractal dimensions can also be applied to two-dimensional surfaces, such as the surface of a city, the surface of a building, or the surface of other urban design elements (Cooper et al. </span><a aria-label="Reference 2013" data-dcnode-id="4117" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d191688938e1015" title="Cooper, J., M. Su, and R. Oskrochi. 2013. The Influence of Fractal Dimension and Vegetation on the Perceptions of Streetscape Quality in Taipei. Environment and Planning B 40 (1): 43–62. 
                    https://doi.org/10.1068/b38010
                    
                  ."><span data-dcnode-id="4118" instrument_node="">2013</span></a><span data-dcnode-id="4116" instrument_node="">). The Eiffel Tower, for example, exhibits fractal structure (Mandelbrot </span><a aria-label="Reference 1983" data-dcnode-id="4114" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d191688938e1018" title="Mandelbrot, B.B. 1983. The Fractal Geometry of Nature. New York: Macmillan."><span data-dcnode-id="4115" instrument_node="">1983</span></a><span data-dcnode-id="4113" instrument_node="">). Fractals interweave qualities of scaling and visual complexity: while modernist architecture sought to erase complexity with simplified, segregated, sterile forms, both traditional architecture and today’s paradigm tend to espouse organic forms with rich detail at multiple scales (Marshall </span><a aria-label="Reference 2008" data-dcnode-id="4111" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d191688938e1021" title="Marshall, S. 2008. Cities Design and Evolution. New York: Spon."><span data-dcnode-id="4112" instrument_node="">2008</span></a><span data-dcnode-id="4110" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4107" id="Sec11"><span data-dcnode-id="4108" instrument_node="">Connectivity</span></h3><p data-dcnode-id="4078"><span data-dcnode-id="4106" instrument_node="">Network science provides a lens to explore structure through connectivity (Jiang </span><a aria-label="Reference 2016" data-dcnode-id="4104" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d191688938e1033" title="Jiang, B. 2016. A Complex-Network Perspective on Alexander’s Wholeness. Physica A 463: 475–484. 
                    https://doi.org/10.1016/j.physa.2016.07.038
                    
                  ."><span data-dcnode-id="4105" instrument_node="">2016</span></a><span data-dcnode-id="4103" instrument_node="">;&nbsp;Boeing </span><a aria-label="Reference 2017" data-dcnode-id="4101" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d191688938e1036" title="Boeing, G. 2017. OSMnx: New Methods for Acquiring, Constructing, Analyzing, and Visualizing Complex Street Networks. Computers, Environment and Urban Systems 65: 126–139. 
                    https://doi.org/10.1016/j.compenvurbsys.2017.05.004
                    
                  ."><span data-dcnode-id="4102" instrument_node="">2017</span></a><span data-dcnode-id="4100" instrument_node="">,&nbsp;</span><a aria-label="Reference 2018a" data-dcnode-id="4098" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d191688938e1039" title="Boeing, G. 2018a. A Multi-Scale Analysis of 27,000 Urban Street Networks: Every US City, Town, Urbanized Area, and Zillow Neighborhood. Environment and Planning B. 
                    https://doi.org/10.1177/2399808318784595
                    
                  
                        "><span data-dcnode-id="4099" instrument_node="">2018a</span></a><span data-dcnode-id="4097" instrument_node="">; Turnbull et al. </span><a aria-label="Reference 2018" data-dcnode-id="4095" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d191688938e1042" title="Turnbull, L., M.-T. Hütt, A.A. Ioannides, S. Kininmonth, R. Poeppl, K. Tockner, and A.J. Parsons. 2018. Connectivity and Complex Systems: Learning from a Multi-disciplinary Perspective. Applied Network Science. 
                    https://doi.org/10.1007/s41109-018-0067-2
                    
                  ."><span data-dcnode-id="4096" instrument_node="">2018</span></a><span data-dcnode-id="4094" instrument_node="">). A network comprises a set of elements (called nodes) and their connections to one another (called edges). In a street network, nodes represent intersections and dead-ends, and edges represent the street segments that link them (Barthélemy </span><a aria-label="Reference 2011" data-dcnode-id="4092" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d191688938e1045" title="Barthélemy, M. 2011. Spatial Networks. Physics Reports 499 (1–3): 1–101. 
                    https://doi.org/10.1016/j.physrep.2010.11.002
                    
                  ."><span data-dcnode-id="4093" instrument_node="">2011</span></a><span data-dcnode-id="4091" instrument_node="">). Accessibility is a useful measure of urban design outcomes (and transportation/land use) related to network analysis. It concerns proximity, mobility, and social interaction within the public sphere. Popular “walkability” tools, such as WalkScore, and modeling tools such as UrbanSim use street networks to measure accessibility (Waddell et al. </span><a aria-label="Reference 2018" data-dcnode-id="4089" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR98" id="ref-link-section-d191688938e1049" title="Waddell, P., Garcia-Dorado, I., Maurer, S. M., Boeing, G., Gardner, M., Porter, E., &amp; Aliaga, D. 2018. Architecture for Modular Microsimulation of Real Estate Markets and Transportation. Presented at the Applied Urban Modelling Symposium, Cambridge, England (June 27–29)."><span data-dcnode-id="4090" instrument_node="">2018</span></a><span data-dcnode-id="4088" instrument_node="">). Urban networks can be measured for their complexity of structure particularly in terms of density, resilience, and connectedness (Fig.&nbsp;</span><a data-dcnode-id="4086" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4087" instrument_node="">3</span></a><span data-dcnode-id="4085" instrument_node="">), extending the toolkit commonly used by urban morphologists (Talen </span><a aria-label="Reference 2003" data-dcnode-id="4083" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d191688938e1055" title="Talen, E. 2003. Measuring Urbanism. Journal of Urban Design 8 (3): 195–215. 
                    https://doi.org/10.1080/1357480032000155141
                    
                  ."><span data-dcnode-id="4084" instrument_node="">2003</span></a><span data-dcnode-id="4082" instrument_node="">; Marshall and Caliskan </span><a aria-label="Reference 2011" data-dcnode-id="4080" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d191688938e1058" title="Marshall, S., and O. Caliskan. 2011. A Joint Framework for Urban Morphology and Design. Built Environment 37 (4): 409–426. 
                    https://doi.org/10.2148/benv.37.4.409
                    
                  ."><span data-dcnode-id="4081" instrument_node="">2011</span></a><span data-dcnode-id="4079" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4051" data-test="figure" data-title="Fig.&nbsp;3" id="figure-3"><figure data-dcnode-id="4052"><figcaption data-dcnode-id="4075"><b class="c-article-section__figure-caption" data-dcnode-id="4076" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="4077" instrument_node="">Fig.&nbsp;3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4063"><div class="c-article-section__figure-item" data-dcnode-id="4070"><a class="c-article-section__figure-link" data-dcnode-id="4071" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/s41289-018-0072-1/figures/3" rel="nofollow"><picture data-dcnode-id="4072"><source data-dcnode-id="4074" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1057%2Fs41289-018-0072-1/MediaObjects/41289_2018_72_Fig3_HTML.jpg?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="4073" height="220" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1057/s41289-018-0072-1/MediaObjects/41289_2018_72_Fig3_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4064" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="4065"><span data-dcnode-id="4069" instrument_node="">Street networks (one square mile each) exhibiting varying complexity through density, grain, connectivity, and permeability. Left: Irvine, California. Center: Rome, Italy. Right: Dubai, UAE. </span><i data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">Image sources</span></i><span data-dcnode-id="4066" instrument_node=""> author</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4053"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="4054" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/s41289-018-0072-1/figures/3" rel="nofollow"><span data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4055" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4056" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4057" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4060" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4059" fill-rule="evenodd"></path><span data-dcnode-id="4058" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4023"><i data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">Metric structure</span></i><span data-dcnode-id="4048" instrument_node=""> refers to geometric areas, lengths, and familiar transportation and urban design variables (e.g., Cervero and Kockelman </span><a aria-label="Reference 1997" data-dcnode-id="4046" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d191688938e1087" title="Cervero, R., and K. Kockelman. 1997. Travel Demand and the 3 Ds. Transportation Research Part D 2 (3): 199–219. 
                    https://doi.org/10.1016/S1361-9209(97)00009-6
                    
                  ."><span data-dcnode-id="4047" instrument_node="">1997</span></a><span data-dcnode-id="4045" instrument_node="">; Masucci et al. </span><a aria-label="Reference 2009" data-dcnode-id="4043" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d191688938e1090" title="Masucci, A.P., D. Smith, A. Crooks, and M. Batty. 2009. Random Planar Graphs and the London Street Network. The European Physical Journal B 71 (2): 259–271. 
                    https://doi.org/10.1140/epjb/e2009-00290-4
                    
                  ."><span data-dcnode-id="4044" instrument_node="">2009</span></a><span data-dcnode-id="4042" instrument_node="">; Ewing and Cervero </span><a aria-label="Reference 2010" data-dcnode-id="4040" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d191688938e1093" title="Ewing, R., and R. Cervero. 2010. Travel and the Built Environment. Journal of the American Planning Association 76 (3): 265–294. 
                    https://doi.org/10.1080/01944361003766766
                    
                  ."><span data-dcnode-id="4041" instrument_node="">2010</span></a><span data-dcnode-id="4039" instrument_node="">). The </span><i data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">average street segment length</span></i><span data-dcnode-id="4036" instrument_node=""> is a linear proxy for block size and indicates the network’s grain. </span><i data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">Average circuity</span></i><span data-dcnode-id="4033" instrument_node=""> measures the ratio of edge lengths to the great-circle distances between the nodes these edges connect, indicating the street pattern’s efficiency (cf. Barthélemy </span><a aria-label="Reference 2011" data-dcnode-id="4031" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d191688938e1103" title="Barthélemy, M. 2011. Spatial Networks. Physics Reports 499 (1–3): 1–101. 
                    https://doi.org/10.1016/j.physrep.2010.11.002
                    
                  ."><span data-dcnode-id="4032" instrument_node="">2011</span></a><span data-dcnode-id="4030" instrument_node="">). These metrics, alongside node, intersection, edge, and street densities measure complexity by quantifying how the circulation network percolates through urban tissue, providing opportunities for movement and contact. However, connectivity </span><i data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">metrics</span></i><span data-dcnode-id="4027" instrument_node=""> can behave inconsistently based on how study areas are drawn (Knight and Marshall </span><a aria-label="Reference 2015" data-dcnode-id="4025" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d191688938e1109" title="Knight, P.L., and W.E. Marshall. 2015. The Metrics of Street Network Connectivity. Journal of Urbanism 8 (3): 241–259. 
                    https://doi.org/10.1080/17549175.2014.909515
                    
                  ."><span data-dcnode-id="4026" instrument_node="">2015</span></a><span data-dcnode-id="4024" instrument_node="">).</span></p><p data-dcnode-id="3977"><i data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">Topological</span></i><span data-dcnode-id="4020" instrument_node=""> measures of street network structure more robustly indicate connectedness and configuration. The network’s </span><i data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node="">average node degree</span></i><span data-dcnode-id="4017" instrument_node=""> topologically quantifies connectedness as the average number of edges incident to its nodes. The </span><i data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">average streets per node</span></i><span data-dcnode-id="4014" instrument_node=""> adapts this for physical form rather than directed circulation, measuring the average number of physical streets that emanate from each node (i.e., intersection or dead-end). The </span><i data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">eccentricity</span></i><span data-dcnode-id="4011" instrument_node=""> of a node is the longest shortest-path distance between it and every other node, representing how far it is from the node furthest from it (Urban and Keitt </span><a aria-label="Reference 2001" data-dcnode-id="4009" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d191688938e1126" title="Urban, D., and T. Keitt. 2001. Landscape Connectivity. Ecology 82 (5): 1205–1218. 
                    https://doi.org/10.2307/2679983
                    
                  ."><span data-dcnode-id="4010" instrument_node="">2001</span></a><span data-dcnode-id="4008" instrument_node="">). A network’s </span><i data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">diameter</span></i><span data-dcnode-id="4005" instrument_node=""> is its greatest eccentricity and its </span><i data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">radius</span></i><span data-dcnode-id="4002" instrument_node=""> is its smallest eccentricity (Hage and Harary </span><a aria-label="Reference 1995" data-dcnode-id="4000" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d191688938e1136" title="Hage, P., and F. Harary. 1995. Eccentricity and Centrality in Networks. Social Networks 17 (1): 57–63. 
                    https://doi.org/10.1016/0378-8733(94)00248-9
                    
                  ."><span data-dcnode-id="4001" instrument_node="">1995</span></a><span data-dcnode-id="3999" instrument_node="">). A network’s </span><i data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">center</span></i><span data-dcnode-id="3996" instrument_node=""> is the node with eccentricity equal to the radius. A network’s </span><i data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">periphery</span></i><span data-dcnode-id="3993" instrument_node=""> is the node with eccentricity equal to the diameter. These measures link fundamental complex network theory with analyses of urban design and mobility patterns. </span><i data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">Connectivity</span></i><span data-dcnode-id="3990" instrument_node=""> represents the fewest number of nodes or edges that will disconnect the network if they are removed (Urban and Keitt </span><a aria-label="Reference 2001" data-dcnode-id="3988" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d191688938e1148" title="Urban, D., and T. Keitt. 2001. Landscape Connectivity. Ecology 82 (5): 1205–1218. 
                    https://doi.org/10.2307/2679983
                    
                  ."><span data-dcnode-id="3989" instrument_node="">2001</span></a><span data-dcnode-id="3987" instrument_node="">; O’Sullivan </span><a aria-label="Reference 2014" data-dcnode-id="3985" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d191688938e1152" title="O’Sullivan, D. 2014. Spatial Network Analysis. In Handbook of Regional Science, ed. M.M. Fischer and P. Nijkamp, 1253–1273. Berlin: Springer-Verlag."><span data-dcnode-id="3986" instrument_node="">2014</span></a><span data-dcnode-id="3984" instrument_node="">), and thus indicates resilience. A network’s </span><i data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">average node connectivity</span></i><span data-dcnode-id="3981" instrument_node=""> more usefully denotes how many nodes must be removed on average to disconnect a randomly selected pair of nodes (Beineke et al. </span><a aria-label="Reference 2002" data-dcnode-id="3979" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d191688938e1158" title="Beineke, L.W., O.R. Oellermann, and R.E. Pippert. 2002. The Average Connectivity of a Graph. Discrete Mathematics 252 (1): 31–45. 
                    https://doi.org/10.1016/S0012-365X(01)00180-7
                    
                  ."><span data-dcnode-id="3980" instrument_node="">2002</span></a><span data-dcnode-id="3978" instrument_node="">). Brittle points of vulnerability characterize networks with low average connectivity: traffic jams and disruptions can arise when the urban form forces circulation through low-permeability choke points.</span></p><p data-dcnode-id="3930"><span data-dcnode-id="3976" instrument_node="">Clustering and centrality also indicate topological complexity, structure, and spatial distribution. A node’s </span><i data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">clustering coefficient</span></i><span data-dcnode-id="3973" instrument_node=""> represents the ratio between its neighbors’ links and the maximum number of links that could exist between them (Opsahl and Panzarasa </span><a aria-label="Reference 2009" data-dcnode-id="3971" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d191688938e1167" title="Opsahl, T., and P. Panzarasa. 2009. Clustering in Weighted Networks. Social Networks 31 (2): 155–163. 
                    https://doi.org/10.1016/j.socnet.2009.02.002
                    
                  ."><span data-dcnode-id="3972" instrument_node="">2009</span></a><span data-dcnode-id="3970" instrument_node="">). Jiang and Claramunt (</span><a aria-label="Reference 2004" data-dcnode-id="3968" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d191688938e1170" title="Jiang, B., and C. Claramunt. 2004. Topological Analysis of Urban Street Networks. Environment and Planning B 31 (1): 151–162. 
                    https://doi.org/10.1068/b306
                    
                  ."><span data-dcnode-id="3969" instrument_node="">2004</span></a><span data-dcnode-id="3967" instrument_node="">) adapt this indicator to neighborhoods. Centrality specifies an element’s importance in a network (Zhong et al. </span><a aria-label="Reference 2017" data-dcnode-id="3965" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d191688938e1173" title="Zhong, C., M. Schläpfer, S.M. Arisona, M. Batty, C. Ratti, and G. Schmitt. 2017. Revealing Centrality in the Spatial Structure of Cities from Human Activity Patterns. Urban Studies 54 (2): 437–455. 
                    https://doi.org/10.1177/0042098015601599
                    
                  ."><span data-dcnode-id="3966" instrument_node="">2017</span></a><span data-dcnode-id="3964" instrument_node="">). </span><i data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">Betweenness centrality</span></i><span data-dcnode-id="3961" instrument_node=""> evaluates how many of the network’s shortest paths pass through some node or edge (Barthélemy </span><a aria-label="Reference 2004" data-dcnode-id="3959" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d191688938e1180" title="Barthélemy, M. 2004. Betweenness Centrality in Large Complex Networks. The European Physical Journal B 38 (2): 163–168. 
                    https://doi.org/10.1140/epjb/e2004-00111-4
                    
                  ."><span data-dcnode-id="3960" instrument_node="">2004</span></a><span data-dcnode-id="3958" instrument_node="">, </span><a aria-label="Reference 2011" data-dcnode-id="3956" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d191688938e1183" title="Barthélemy, M. 2011. Spatial Networks. Physics Reports 499 (1–3): 1–101. 
                    https://doi.org/10.1016/j.physrep.2010.11.002
                    
                  ."><span data-dcnode-id="3957" instrument_node="">2011</span></a><span data-dcnode-id="3955" instrument_node="">). Barthélemy et al. (</span><a aria-label="Reference 2013" data-dcnode-id="3953" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d191688938e1186" title="Barthélemy, M., P. Bordin, H. Berestycki, and M. Gribaudi. 2013. Self-Organization Versus Top-Down Planning in the Evolution of a City. Scientific Reports. 
                    https://doi.org/10.1038/srep02153
                    
                  ."><span data-dcnode-id="3954" instrument_node="">2013</span></a><span data-dcnode-id="3952" instrument_node="">) operationalizes it to disambiguate the spatial signatures of Haussmann’s renovation of Paris and the earlier self-organization and evolution of its urban fabric and street patterns. The maximum betweenness centrality measures the share of shortest paths that pass through the network’s most important node: higher maximum betweenness centralities indicate networks more prone to inefficiency if this important choke point should fail. Other variations of centrality such as </span><i data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">closeness centrality</span></i><span data-dcnode-id="3949" instrument_node=""> and </span><i data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">PageRank</span></i><span data-dcnode-id="3946" instrument_node=""> can also be applied to street networks (Brin and Page </span><a aria-label="Reference 1998" data-dcnode-id="3944" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d191688938e1195" title="Brin, S., and L. Page. 1998. The Anatomy of a Large-Scale Hypertextual Web Search Engine. Computer Networks and ISDN Systems 30 (1–7): 107–117. 
                    https://doi.org/10.1016/S0169-7552(98)00110-X
                    
                  ."><span data-dcnode-id="3945" instrument_node="">1998</span></a><span data-dcnode-id="3943" instrument_node="">; Wang et al. </span><a aria-label="Reference 2011" data-dcnode-id="3941" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d191688938e1199" title="Wang, F., A. Antipova, and S. Porta. 2011. Street Centrality and Land Use Intensity in Baton Rouge, Louisiana. Journal of Transport Geography 19 (2): 285–293. 
                    https://doi.org/10.1016/j.jtrangeo.2010.01.004
                    
                  ."><span data-dcnode-id="3942" instrument_node="">2011</span></a><span data-dcnode-id="3940" instrument_node="">). Researchers often operationalize a basket of measures in unison to assess street network complexity. For instance, Porta et al. (</span><a aria-label="Reference 2006" data-dcnode-id="3938" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d191688938e1202" title="Porta, S., P. Crucitti, and V. Latora. 2006. The Network Analysis of Urban Streets: A Primal Approach. Environment and Planning B 33 (5): 705–725. 
                    https://doi.org/10.1068/b32045
                    
                  ."><span data-dcnode-id="3939" instrument_node="">2006</span></a><span data-dcnode-id="3937" instrument_node="">) develop a </span><i data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">multiple centrality assessment</span></i><span data-dcnode-id="3934" instrument_node=""> for urban street networks and use it to differentiate the signatures of planned cities versus self-organized cities. Crucitti et al. (</span><a aria-label="Reference 2006" data-dcnode-id="3932" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d191688938e1208" title="Crucitti, P., V. Latora, and S. Porta. 2006. Centrality Measures in Spatial Networks of Urban Streets. Physical Review E 73 (3): 036125. 
                    https://doi.org/10.1103/PhysRevE.73.036125
                    
                  ."><span data-dcnode-id="3933" instrument_node="">2006</span></a><span data-dcnode-id="3931" instrument_node="">) measure urban network centrality through a blend of closeness, betweenness, and information centralities.</span></p><p data-dcnode-id="3910"><span data-dcnode-id="3929" instrument_node="">Finally, we briefly consider space syntax theory. Thus far, we have discussed street networks represented with their intersections as nodes and streets as edges. This is a </span><i data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">primal</span></i><span data-dcnode-id="3926" instrument_node=""> representation. A </span><i data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">dual</span></i><span data-dcnode-id="3923" instrument_node=""> representation inverts this topology, depicting the streets as nodes and the intersections as edges, and provides some analytical advantages in studying network structure (Crucitti et al. </span><a aria-label="Reference 2006" data-dcnode-id="3921" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d191688938e1221" title="Crucitti, P., V. Latora, and S. Porta. 2006. Centrality Measures in Spatial Networks of Urban Streets. Physical Review E 73 (3): 036125. 
                    https://doi.org/10.1103/PhysRevE.73.036125
                    
                  ."><span data-dcnode-id="3922" instrument_node="">2006</span></a><span data-dcnode-id="3920" instrument_node="">). Space syntax studies this dual representation of urban street networks, analyzing axial streets and measuring the depth between edges (Hillier et al. </span><a aria-label="Reference 1976" data-dcnode-id="3918" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d191688938e1224" title="Hillier, B., A. Leaman, P. Stansall, and M. Bedford. 1976. Space Syntax. Environment and Planning B 3 (2): 147–185. 
                    https://doi.org/10.1068/b030147
                    
                  ."><span data-dcnode-id="3919" instrument_node="">1976</span></a><span data-dcnode-id="3917" instrument_node="">). However, space syntax’s dual networks inherently disregard geometric, spatial, experiential information important to urban design that primal networks retain (Ratti </span><a aria-label="Reference 2004" data-dcnode-id="3915" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d191688938e1227" title="Ratti, C. 2004. Space Syntax: Some Inconsistencies. Environment and Planning B 31 (4): 487–499. 
                    https://doi.org/10.1068/b3019
                    
                  ."><span data-dcnode-id="3916" instrument_node="">2004</span></a><span data-dcnode-id="3914" instrument_node="">). Nevertheless, it underlies various adapted approaches to analytical urban design (Karimi </span><a aria-label="Reference 2012" data-dcnode-id="3912" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d191688938e1231" title="Karimi, K. 2012. A Configurational Approach to Analytical Urban Design. Urban Design International 17 (4): 297–318. 
                    https://doi.org/10.1057/udi.2012.19
                    
                  ."><span data-dcnode-id="3913" instrument_node="">2012</span></a><span data-dcnode-id="3911" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3908" id="Sec12"><span data-dcnode-id="3909" instrument_node="">Typology of complexity measures</span></h3><p data-dcnode-id="3900"><span data-dcnode-id="3907" instrument_node="">All of these methods of assessing the complexity of urban design, primarily at the neighborhood scale, can be organized into a preliminary typology (Table&nbsp;</span><a data-dcnode-id="3905" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="3906" instrument_node="">2</span></a><span data-dcnode-id="3904" instrument_node="">). The measures are grouped by Table&nbsp;</span><a data-dcnode-id="3902" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3903" instrument_node="">1</span></a><span data-dcnode-id="3901" instrument_node="">’s key dimensions: temporal, spatial, visual, scaling, and connectivity. While temporal measures assess the complexity of dynamics and process, the spatial, visual, and structural (i.e., scaling and connectivity) measures appear most promising for evaluating physical complexity at the scale of urban design.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3885" data-test="inline-table" id="table-2"><figure data-dcnode-id="3886"><figcaption class="c-article-table__figcaption" data-dcnode-id="3897"><b data-dcnode-id="3898" data-test="table-caption" id="Tab2"><span data-dcnode-id="3899" instrument_node="">Table&nbsp;2 Typology of urban form/design complexity measures</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3887"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="3888" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/s41289-018-0072-1/tables/2" rel="nofollow"><span data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3889" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3890" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3891" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3894" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3893" fill-rule="evenodd"></path><span data-dcnode-id="3892" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3884" instrument_node="">
</span></div></div></section><section data-dcnode-id="3844" data-title="Discussion"><div class="c-article-section" data-dcnode-id="3845" id="Sec13-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3879" id="Sec13"><span data-dcnode-id="3880" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="3846" id="Sec13-content"><p data-dcnode-id="3862"><span data-dcnode-id="3878" instrument_node="">Cities are complex systems composed of many human agents interacting in physical urban space. Urban design has evolved through eras of classicism, organicism, austere modernism, postmodernism, and neotraditionalism—each of which encounters the city’s physical complexity with different goals. Multiple synergies exist today between urban design objectives and recent knowledge emerging from the complexity sciences as complexity theory. Complexity underlies urban resilience, accessibility, and livability. Path dependence, hysteresis, and historical accidents all arise in complex systems and shape the future of the urban form (Siodla </span><a aria-label="Reference 2015" data-dcnode-id="3876" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d191688938e1829" title="Siodla, J. 2015. Razing San Francisco. Journal of Urban Economics 89: 48–61. 
                    https://doi.org/10.1016/j.jue.2015.07.001
                    
                  ."><span data-dcnode-id="3877" instrument_node="">2015</span></a><span data-dcnode-id="3875" instrument_node="">). Complexity makes urban environments more resilient and robust, providing greater opportunities for social encounter, mixing, and adaptation through social learning. Complexity entails greater connectivity, diversity, variety, and sustainability. Today, prominent urban design movements such as the new urbanism and smart growth openly embrace complexity (Duany et al. </span><a aria-label="Reference 2001" data-dcnode-id="3873" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d191688938e1832" title="Duany, A., E. Plater-Zyberk, et al. 2001. The Lexicon of New Urbanism. Miami, FL: Duany, Plater-Zyberk &amp; Co."><span data-dcnode-id="3874" instrument_node="">2001</span></a><span data-dcnode-id="3872" instrument_node="">; Talen </span><a aria-label="Reference 2003" data-dcnode-id="3870" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d191688938e1835" title="Talen, E. 2003. Measuring Urbanism. Journal of Urban Design 8 (3): 195–215. 
                    https://doi.org/10.1080/1357480032000155141
                    
                  ."><span data-dcnode-id="3871" instrument_node="">2003</span></a><span data-dcnode-id="3869" instrument_node="">; Sanders </span><a aria-label="Reference 2008" data-dcnode-id="3867" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d191688938e1838" title="Sanders, T.I. 2008. Complex Systems Thinking and New Urbanism. In New Urbanism and Beyond, ed. T. Haas, 275–279. New York: Rizzoli."><span data-dcnode-id="3868" instrument_node="">2008</span></a><span data-dcnode-id="3866" instrument_node="">; Congress for the New Urbanism </span><a aria-label="Reference 2015" data-dcnode-id="3864" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d191688938e1841" title="Congress for the New Urbanism. 2015. New Urbanism Embraces Complexity. 
                    http://www.cnu.org/node/45
                    
                  ."><span data-dcnode-id="3865" instrument_node="">2015</span></a><span data-dcnode-id="3863" instrument_node="">). But to better foster the benefits of healthy complex adaptive systems, urban design must move beyond metaphor and inspiration to more precisely formalize what complexity is and how we can measure it to assess both the world as it is, and proposals for how it could be instead.</span></p><p data-dcnode-id="3851"><span data-dcnode-id="3861" instrument_node="">This paper takes a step in this direction by compiling a toolkit of indicators and measures of complexity to analyze resilience, connectedness, and adaptive capacity at the scale of urban design. First, it introduced three interpretative categories of complexity (Fig.&nbsp;</span><a data-dcnode-id="3859" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3860" instrument_node="">1</span></a><span data-dcnode-id="3858" instrument_node="">), before honing in on how category II—the structured balance between order and chaos—pertains to urban form. Next, it identified five key dimensions of complexity: temporal, visual, spatial, scaling, and connectivity (Table&nbsp;</span><a data-dcnode-id="3856" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3857" instrument_node="">1</span></a><span data-dcnode-id="3855" instrument_node="">). It then presented various measures, indicators, and examples of each dimension and how they relate to urban form and design. Finally, it collated these into a typology to assess urban form, design claims, and project outcomes (Table&nbsp;</span><a data-dcnode-id="3853" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="3854" instrument_node="">2</span></a><span data-dcnode-id="3852" instrument_node="">). The analytical framework developed here is generalizable to empirical research of various neighborhood types and design standards. This typology draws from multiple scientific disciplines to identify how an urban system’s physical form organizes complex human interactions and connections—thus linking structure and dynamics—particularly at urban design’s scale of intervention.</span></p><p data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">How does this knowledge lead to different or better urban design? First, the categories can help urban design theory and practice critically evaluate and normatively balance complexity goals based on local culture and politics. Urban design, as a channel of human self-organization, can produce various balances of order and variety in its streetscapes (anywhere from sterile monotony to bewildering overstimulation), circulation networks (from compact grids, to sprawling loops-and-lollipops, to dense meshes of interwoven paths), land uses (from single-use functional zoning to intermixed variety), and social character (from segregation and disconnection to integration, contact, and exchange).</span></p><p data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">Second, to critically evaluate these possible futures beyond metaphor and inspiration, the five dimensions of complexity and their attendant measures can ground debate and analysis. They organize and quantify characteristics of current and proposed urban design that shape circulation, contact, access, choice, resilience, adaptability, and equity. For example, this provides new ways to evaluate how thoroughly linked and permeable a network is, and how it can be resilient against floods, earthquakes, traffic collisions, congestion, and other disruptions. It grounds design decisions in science and theory to clarify goals and evaluate the outcomes of alternative plans. These measures help designers to evaluate how well the physical built environment might adapt to expected—or unexpected—change. They offer a rubric for the continuing shift of design theory and practice away from a logic of top–down artificially constructed urban landscapes and towards a logic of organic growth, evolution, and resilience. If cities are complex systems, then a key goal of urban design must be to support their complex functioning by producing a physical substrate conducive to the values of resilience, connectedness, adaptability, and equity. This paper synthesized a set of key measures to evaluate these forms, goals, and actions rigorously.</span></p></div></div></section><span data-dcnode-id="3843" instrument_node="">
