</span><p data-dcnode-id="3255"><img alt="OzarkCon QRP Conference Collage" class="lozad" data-dcnode-id="3273" data-loaded="true" data-src="/images/2022/ozarkcon-map.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2022/ozarkcon-map.jpg&amp;raw" style="float:right; margin-left:10px; margin-bottom:10px; margin-right:10px; width:400px" usemap="#ozarkcon-2022-map"><span data-dcnode-id="3272" instrument_node="">

</span><area alt="work-area" coords="200,265,395,395" data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2022/ozarkcon-badge-cric-key.png" rel="noopener" shape="rect" target="_blank"><span data-dcnode-id="3261" instrument_node="">
</span></map><span data-dcnode-id="3259" instrument_node="">I had a lot of fun at the </span><a data-dcnode-id="3257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ocon.rleepotter.com/index.html%23index" rel="noopener" target="_blank"><span data-dcnode-id="3258" instrument_node="">OzarkCon QRP Conference</span></a><span data-dcnode-id="3256" instrument_node="">! It was fantastic to have the conference back in person! Ninety-three people came from 20 states. If you couldn't make it this year, consider going next year. QRP and CW go together like peanut butter and jelly.</span></p><span data-dcnode-id="3254" instrument_node="">
</span><p data-dcnode-id="3237"><span data-dcnode-id="3253" instrument_node="">I was transfixed by the announcement of the T41 Plus QRP Transceiver by Jack (</span><a data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/w8tee" rel="noopener" target="_blank"><span data-dcnode-id="3252" instrument_node="">W8TEE</span></a><span data-dcnode-id="3250" instrument_node="">) and Al (</span><a data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/ac8gy" rel="noopener" target="_blank"><span data-dcnode-id="3249" instrument_node="">AC8GY</span></a><span data-dcnode-id="3247" instrument_node="">). It is a modular, low-cost, five HF bands (80, 40, 20, 15, and 10 meters), up to 20watts, Software Defined Transceiver that is open-hardware and open-source and doesn't require a computer. The </span><a data-dcnode-id="3245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.4sqrp.com/" rel="noopener" target="_blank"><span data-dcnode-id="3246" instrument_node="">Four State QRP Group</span></a><span data-dcnode-id="3244" instrument_node=""> will sell it as a kit. The price is still being determined, but the components cost about $150. Astonishingly Jack and Al poured six man-years into the design of this QRP radio! Check out their companion book, </span><a data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Software-Defined-Radio-Transceiver-Construction/dp/B09WYP1ST8" rel="noopener" target="_blank"><span data-dcnode-id="3243" instrument_node="">Software Defined Radio Transceiver: Theory and Construction of the T41-EP Amateur Radio SDT</span></a><span data-dcnode-id="3241" instrument_node="">! Also, check out their </span><a data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dropbox.com/sh/35zgiszbipwukn7/AACiXYyB6b4f8_SydbvXo8vIa%3Fdl%3D0%26preview%3DTheT41SDT%2BV3.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3240" instrument_node="">slide deck</span></a><span data-dcnode-id="3238" instrument_node="">.</span></p><span data-dcnode-id="3236" instrument_node="">
</span><p data-dcnode-id="3220"><span data-dcnode-id="3235" instrument_node="">Bryan (</span><a data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/k0emt" rel="noopener" target="_blank"><span data-dcnode-id="3234" instrument_node="">K0EMT</span></a><span data-dcnode-id="3232" instrument_node="">) and Joe's (</span><a data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/k0neb" rel="noopener" target="_blank"><span data-dcnode-id="3231" instrument_node="">K0NEB</span></a><span data-dcnode-id="3229" instrument_node="">) presentations were inspiring. Bryan's QRP equipment, operations, and software development survey highlighted the vastness of our hobby and invited us all to try something new — </span><span data-dcnode-id="3227" instrument_node=""> </span><a data-dcnode-id="3225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/files/backup/K0EMT-Non_Sequitur-Presentation.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3226" instrument_node="">Slide Deck</span></a><span data-dcnode-id="3224" instrument_node="">. And Joe's presentation on the intersection of 3D printing, ham radio, and the pandemic kindled my latent interest in buying a 3D printer. I was inspired to bite the bullet and ordered a best-in-class 3D printer — </span><a data-dcnode-id="3222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prusa3d.com/product/original-prusa-i3-mk3s-3d-printer-8/" rel="noopener" target="_blank"><span data-dcnode-id="3223" instrument_node="">Original Prusa i3 MK3S+ 3D printer</span></a><span data-dcnode-id="3221" instrument_node="">.</span></p><span data-dcnode-id="3219" instrument_node="">
</span><p data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">I was delighted to see a few entries in the Wacky Key Contest! The Lego Key won the competition and was my favorite. The "Key" paddle was a clever play on words and my second choice.</span></p><span data-dcnode-id="3216" instrument_node="">
</span><p data-dcnode-id="3211"><span data-dcnode-id="3215" instrument_node="">The group kit building is always worthwhile, and this year did not disappoint. We built the </span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.4sqrp.com/crickey.php" rel="noopener" target="_blank"><span data-dcnode-id="3214" instrument_node="">Cric-Key</span></a><span data-dcnode-id="3212" instrument_node="">, a low-cost entry-level paddle and keyer. The kit has 19 parts to solder and went together smoothly. The paddles are slightly tricky to put together but straightforward with the help of a partner who could provide an extra pair of hands to hold everything together.</span></p><span data-dcnode-id="3210" instrument_node="">
</span><p data-dcnode-id="3191"><span data-dcnode-id="3209" instrument_node="">Prizes and more prizes! I won four kits this year — </span><a data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.4sqrp.com/bayoujumper.php" rel="noopener" target="_blank"><span data-dcnode-id="3208" instrument_node="">Bayou Jumper Transceiver</span></a><span data-dcnode-id="3206" instrument_node=""> (40m QRP rig), </span><a data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.4sqrp.com/crickey.php" rel="noopener" target="_blank"><span data-dcnode-id="3205" instrument_node="">Cric-Key</span></a><span data-dcnode-id="3203" instrument_node="">, </span><a data-dcnode-id="3201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//n6ara.com/" rel="noopener" target="_blank"><span data-dcnode-id="3202" instrument_node="">N6ARA TinyPaddles</span></a><span data-dcnode-id="3200" instrument_node="">, and a big bag of resistors, capacitors, and diodes. Bryan (</span><a data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/k0emt" rel="noopener" target="_blank"><span data-dcnode-id="3199" instrument_node="">K0EMT</span></a><span data-dcnode-id="3197" instrument_node="">) also gave me an </span><span data-dcnode-id="3195" instrument_node=""> </span><a data-dcnode-id="3193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/files/backup/N0SS-noise-generator-instructions.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3194" instrument_node="">N0SS Noise Generator</span></a><span data-dcnode-id="3192" instrument_node="">, which will be my first surface mount kit! I'm always amazed at how many prizes are given away at Ozarkcon. They strive to ensure that everyone wins at least one prize.</span></p><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">I hope to see you next year! In the meantime, feel free to join the Four States QRP DMR Talk Group (TG31654) and discuss QRP, ask questions, or rag chew. Or join the voice net on the DMR talk group Wednesday at 9 PM Central (Thursday 0300 UTC).</span></p><span data-dcnode-id="3187" instrument_node="">
</span><br data-dcnode-id="3186"><span data-dcnode-id="3185" instrument_node="">
</span><h4 data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">A Learning Approach to Achieve QRQ:</span></h4><span data-dcnode-id="3182" instrument_node="">
</span><p data-dcnode-id="3175"><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/advice/%23LearningApproachToQRQ" rel="noopener" target="_blank"><img alt="W4BQF station" class="lozad" data-dcnode-id="3181" data-loaded="true" data-src="/images/2022/QRQ-Course-Logo.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2022/QRQ-Course-Logo.png&amp;raw" style="float:right; clear: both; margin-bottom:30px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="3179" instrument_node="">We have developed a </span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/advice/%23LearningApproachToQRQ" rel="noopener" target="_blank"><span data-dcnode-id="3178" instrument_node="">learning approach</span></a><span data-dcnode-id="3176" instrument_node=""> to achieve QRQ using a structured high-speed curriculum! It is self-paced and should take about a year to complete. To our knowledge, this is the first-ever such course.</span></p><span data-dcnode-id="3174" instrument_node="">
</span><p data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">The structured approach to achieving QRQ is a starting point, open to refinement. With additional feedback and collective experience, our goal is to make QRQ accessible to as many people as possible.</span></p><span data-dcnode-id="3171" instrument_node="">
</span><p data-dcnode-id="3163"><span data-dcnode-id="3170" instrument_node="">Working with Jack (</span><a data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/aa0iz" rel="noopener" target="_blank"><span data-dcnode-id="3169" instrument_node="">AA0IZ</span></a><span data-dcnode-id="3167" instrument_node="">) and Terry (</span><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/wb0jrh" rel="noopener" target="_blank"><span data-dcnode-id="3166" instrument_node="">WB0JRH</span></a><span data-dcnode-id="3164" instrument_node="">) on this project has been a delight! We appreciate all of the critical feedback while developing the course.</span></p><span data-dcnode-id="3162" instrument_node="">
</span><p data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">We wish you all the best on your Morse code journey!</span></p><span data-dcnode-id="3159" instrument_node="">
</span><br data-dcnode-id="3158"><span data-dcnode-id="3157" instrument_node="">
</span><h4 data-dcnode-id="3155" id="ACaseForBookCopy"><span data-dcnode-id="3156" instrument_node="">A Case for "Book Copy":</span></h4><span data-dcnode-id="3154" instrument_node="">
</span><p data-dcnode-id="3137"><a data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/n6hcn" rel="noopener" target="_blank"><img alt="W4BQF station" class="lozad" data-dcnode-id="3153" data-loaded="true" data-src="/images/2022/N6HCN-small.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2022/N6HCN-small.png&amp;raw" style="float:right; clear: both; margin-bottom:30px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="3151" instrument_node="">Author John Silzel (</span><a data-dcnode-id="3149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/n6hcn" rel="noopener" target="_blank"><span data-dcnode-id="3150" instrument_node="">N6HCN</span></a><a data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">) — Reprinted with permission. Originally published in the </span></a><a data-dcnode-id="3145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cwops.org/newsletter/2018/05scopy18may.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3146" instrument_node="">May 2018</span></a><span data-dcnode-id="3144" instrument_node=""> edition of </span><a data-dcnode-id="3142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cwops.org/newsletters/" rel="noopener" target="_blank"><span data-dcnode-id="3143" instrument_node="">Solid Copy</span></a><span data-dcnode-id="3141" instrument_node="">. This article compliments the recently released </span><a data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/advice/%23LearningApproachToQRQ" rel="noopener" target="_blank"><span data-dcnode-id="3140" instrument_node="">QRQ Course</span></a><span data-dcnode-id="3138" instrument_node="">.</span></p><span data-dcnode-id="3136" instrument_node="">
</span><p data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">It may be that there are two different CW dialects. The "symbolic" dialect, so fluently spoken by contesters and commercial ops, is far more efficient than voice for the accurate transmission of data: formal traffic, call signs or serial numbers, even ciphered military communications. In symbolic CW, anticipation of the next character is a no-no, since the traffic consists of compressed data of high information content and little redundancy. Every character is crucial, and copy must be perfect.</span></p><span data-dcnode-id="3133" instrument_node="">
</span><p data-dcnode-id="3128"><span data-dcnode-id="3132" instrument_node="">The other CW dialect may be newer and reflect the rise of CW as an art: the use of code as an auditory language. This "conversational" CW is more like speech or silent reading: concepts and context ride naturally on a fuller vocabulary. Neither sender nor receiver may remember the exact words sent, and neither is conscious of characters at all. This CW dialect comes closer to reading than data transmission, and in fact brain mapping research</span><sup data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">1,2</span></sup><span data-dcnode-id="3129" instrument_node=""> shows that the brain processes "head copy" much the same way as it does speech or printed text during fast, silent reading.</span></p><span data-dcnode-id="3127" instrument_node="">
</span><p data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">We know that learning a second language begins awkwardly, with symbols and sounds, mechanical grammatical rules and memorization of seemingly infinite vocabulary. But at some point, the mind assimilates the new tongue, and the mechanics of the language become internalized and unconscious. This process appears to involve a rewiring, or "neuroplasticity" of the brain, involving new connections between sensory and cognitive centers, and a detectable increase in gray matter density.</span></p><span data-dcnode-id="3124" instrument_node="">
</span><p data-dcnode-id="3119"><span data-dcnode-id="3123" instrument_node="">It seemed to me that expertise in conversational CW, like fluency in any language, would benefit from immersion. But my family and work could not accommodate hours and hours at my rig hunting up a ragchew or listening to </span><a data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.arrl.org/w1aw-operating-schedule" rel="noopener" target="_blank"><span data-dcnode-id="3122" instrument_node="">W1AW sessions</span></a><span data-dcnode-id="3120" instrument_node="">, only a portion of which were of interest or at useful speed, anyway. Making matters worse were poor propagation, QSB, and nighttime QRN at my home. If only, I thought, I could listen to... a good story... sent perfectly, anywhere, hour after hour in CW, at a speed always high enough to stretch my copy skills.</span></p><span data-dcnode-id="3118" instrument_node="">
</span><p data-dcnode-id="3107"><strong data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">The Solution: CW e-Books</span></strong><br data-dcnode-id="3115"><span data-dcnode-id="3114" instrument_node="">
I found the answer on my first internet search: a free, open-source software application called "</span><a data-dcnode-id="3112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fkurz.net/ham/ebook2cw.html" rel="noopener" target="_blank"><span data-dcnode-id="3113" instrument_node="">ebook2cw</span></a><span data-dcnode-id="3111" instrument_node="">". This code runs on Windows, MAC OS, and best of all on Linux, my favorite OS. The work of champion QRQQ operator Fabian Kurz, </span><a data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/dj1yfk" rel="noopener" target="_blank"><span data-dcnode-id="3110" instrument_node="">DJ1YFK</span></a><span data-dcnode-id="3108" instrument_node=""> (CWOps #1566), ebook2cw does just what it says: converts any ASCII text file to a collection of audio .mp3 files that can be loaded on an inexpensive player or your smartphone, burned to CD, or played however you normally listen to digital music. Converting a full-size novel takes about 40 minutes on a laptop, and just slightly longer on a $35 Raspberry Pi computer, an amazing unit worthy of its own article. My solution is to drag-and-drop the converted audio files to a cheap Coby 8Gb MP3 player, which fits in my pocket and holds enough CW for months of nightly "reading".</span></p><span data-dcnode-id="3106" instrument_node="">
</span><p data-dcnode-id="3098"><span data-dcnode-id="3105" instrument_node="">All of this is great, but until book publishers start releasing CW editions (we won't hold our breaths, will we?) you’ll need a way to get your reading material in ASCII form. Fortunately, the good folks at </span><a data-dcnode-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gutenberg.org/" rel="noopener" target="_blank"><span data-dcnode-id="3104" instrument_node="">The Gutenberg Project</span></a><span data-dcnode-id="3102" instrument_node=""> have provided more than 50,000 ebooks, virtually copyright-free, with more added all the time. Acquiring a CW library is as simple as downloading the "plain ASCII text" version of your chosen book. Even "</span><a data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gutenberg.org/ebooks/2600" rel="noopener" target="_blank"><span data-dcnode-id="3101" instrument_node="">War and Peace</span></a><span data-dcnode-id="3099" instrument_node="">" is only about 3 Mbytes, smaller than an average music download.</span></p><span data-dcnode-id="3097" instrument_node="">
</span><p data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">It’s of course optional, but I like to use an editor to "search and replace", making some CW- friendly edits to the downloaded book: I replace "and" with "ES" for example. I used to remove quotation marks, but I’ve found that copying that unusual character has become second nature. In fact, ebook2cw handles more punctuation than we use on the air and has means for you to insert prosigns as well. Ebook2cw will optionally insert a BT at the end of each paragraph, which I like very much. (Fabian Kurtz tells me it will even handle some special Greek, Cyrillic, and Hebrew characters!) While you’re at it, check your book to see what text is used to delineate chapters. Ebook2cw can break the book into chapters based on "hits" to a particular search string, like "CHAPTER", and I add this keyword to books whose chapters were ambiguously marked in the original file. This whole editing process takes only about 15 minutes for a typical novel.</span></p><span data-dcnode-id="3094" instrument_node="">
</span><p data-dcnode-id="3089"><span data-dcnode-id="3093" instrument_node="">At this point, you're ready to feed the edited book into Ebook2cw. I use the no-frills command-line version of the app, but there is a version of the code that includes the familiar "GUI" window interface. It is a simple process and there are good instructions on the website listed above. There are separate speed settings for characters and WPM. I set the program to chop the book up by chapters, and limit each MP3 file to 30 minutes, so they’re manageable for me in one reading session. (Longer files mean more work to find my place if I fall asleep while listening!) I set ebook2cw’s QRQ feature to give me 3-4 WPM of QRQ per 30 minutes, so each file begins at my current comfortable "base" speed and ends up pushing me a bit. Any time I am not stretching a bit to copy the last QRQ, I will reconvert the remaining chapters, bumping things up 3 WPM or so. But I never let it get frustrating — my goal is a relaxed but focused reading experience, not a sweat -breaking adrenaline meltdown! (Save that for </span><a data-dcnode-id="3091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cwops.org/cwops-tests/" rel="noopener" target="_blank"><span data-dcnode-id="3092" instrument_node="">CWTs</span></a><span data-dcnode-id="3090" instrument_node="">...)</span></p><span data-dcnode-id="3088" instrument_node="">
</span><p data-dcnode-id="3083"><strong data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">Rewiring Your Brain: From CW "Guinea Pig" to Speed Reader</span></strong><br data-dcnode-id="3085"><span data-dcnode-id="3084" instrument_node="">
Your first CW book might seem like slow going. At first, I thought I’d wear out the "rewind" button on my mp3 player. Books are, after all, more eloquent and complex than our on-air QSOs. Strange spellings, dialog, contractions, and sections of oddly spelled vernacular can be challenging at first. Stick with it, and don’t be tempted to peek at the text! If you like Westerns, the books by Zane Grey stick to a fairly common vocabulary and style that helped me adapt to "book copy". When I started out, my (rusty) base speed was about 15 WPM, I still needed a pencil and paper, and I was accustomed to Farnsworth timing. My first goals (besides enjoying the books) were to toss my pencil "cold turkey" and wean myself to normal CW word and character spacing. Then I began to build WPM. As any op knows, this is an irregular process, with plateaus and periods where progress seems nonexistent. But with a good book, it is easy to be patient and "stick with the program".</span></p><span data-dcnode-id="3082" instrument_node="">
</span><p data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">Once hooked on a good book, you'll be motivated to practice. And with regular practice, learning is inevitable. Your brain is pre-wired for language and cannot help but become more and more fluent. Relax and enjoy the book, speed will come inevitably and effortlessly. After a few books, the unconscious head copy will have you wondering just how fast you can go! I believe anyone can eventually pass 30 WPM by spending 30 minutes per day doing "book copy".</span></p><span data-dcnode-id="3079" instrument_node="">
</span><p data-dcnode-id="3056"><span data-dcnode-id="3078" instrument_node="">You’ll probably spend several months reading a novel in CW, so you’ll want to pick good reading material. No matter your tastes, there are fine books out there just waiting to be converted to CW. Some favorites of mine are "</span><a data-dcnode-id="3076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gutenberg.org/ebooks/1300" rel="noopener" target="_blank"><span data-dcnode-id="3077" instrument_node="">Riders of the Purple Sage</span></a><span data-dcnode-id="3075" instrument_node="">", "</span><a data-dcnode-id="3073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gutenberg.org/ebooks/1262" rel="noopener" target="_blank"><span data-dcnode-id="3074" instrument_node="">The Heritage of the Desert</span></a><span data-dcnode-id="3072" instrument_node="">" and "</span><a data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gutenberg.org/ebooks/13937" rel="noopener" target="_blank"><span data-dcnode-id="3071" instrument_node="">Mysterious Rider</span></a><span data-dcnode-id="3069" instrument_node="">" by Zane Grey. "</span><a data-dcnode-id="3067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gutenberg.org/ebooks/2055" rel="noopener" target="_blank"><span data-dcnode-id="3068" instrument_node="">Two Years Before the Mast</span></a><span data-dcnode-id="3066" instrument_node="">" by Dana, and "</span><a data-dcnode-id="3064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gutenberg.org/ebooks/12797" rel="noopener" target="_blank"><span data-dcnode-id="3065" instrument_node="">Log of a Cowboy</span></a><span data-dcnode-id="3063" instrument_node="">" by Adams are great picks. If a novel sounds daunting, try short stories, like the Sherlock Holmes cases by Sir Arthur Conan Doyle. In the military nonfiction vein, you might enjoy "</span><a data-dcnode-id="3061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gutenberg.org/ebooks/8423" rel="noopener" target="_blank"><span data-dcnode-id="3062" instrument_node="">Blood Brothers</span></a><span data-dcnode-id="3060" instrument_node="">", by Colonel Eugene C. Jacobs, and if you’re a geek like me, or just want to practice numbers, you can read government technical reports like the declassified "</span><a data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gutenberg.org/ebooks/548" rel="noopener" target="_blank"><span data-dcnode-id="3059" instrument_node="">Project Trinity</span></a><span data-dcnode-id="3057" instrument_node="">" documents detailing the first atomic tests. All of these and more are downloadable via the Project Gutenberg site. And of course, you can convert any text file, email, or webpage text — even this issue of Solid Copy! I’ve tried scanning and OCR of printed books, but the process takes too long for me.</span></p><span data-dcnode-id="3055" instrument_node="">
</span><p data-dcnode-id="3050"><strong data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">The Payoff</span></strong><br data-dcnode-id="3052"><span data-dcnode-id="3051" instrument_node="">
Why try this admittedly eccentric pastime? Well, for one thing, enjoying a good book in bed with your eyes shut is very relaxing, and there is no book light or page turning to disturb the XYL. There is no SDR to tweak, no panadapter to scan, no QSB, no QRM, just Fabian’s computer-perfect fist, solid copy, and no speed limits. A suspenseful plot unfolding in rapid CW reminds me of listening to a radio drama, and the pace, though slower than reading or an audio book, has become surprisingly enjoyable.</span></p><span data-dcnode-id="3049" instrument_node="">
</span><p data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">Like other ops, I have been startled to find that the neuroplastic "rewiring" of my brain has some strange side effects, as well. The ears automatically "lock" onto CW almost instantly and unconsciously, and seem to find code everywhere, on and off the bands. You might find yourself distracted by the odd things being "said" by birds, dishwashers, squeaking machinery, and the vari- ous beeping devices all around us. During ragchews you might be unaware that you are copying code rather than voice. You might find yourself copying more than one QSO at a time.</span></p><span data-dcnode-id="3046" instrument_node="">
</span><p data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Has it been a while since you enjoyed effortless CW as a true language, a mental connection, hanging on every word to see if the "good guy" was going to win, or leaning back at the paddles, eyes shut, enjoying a rapid-fire QSK back-and-forth, telling jokes or yarn-spinning with one of the fine ragchewers on the bands? I’m sure that "book copy" will give even the most crazy-fast op a new level of fun and fluency in our wonderful "second language". You might find yourself waxing eloquent on the air, adopting the gritty prose of Hemingway, or the sly humor of Twain in your next ragchew. If you need help converting that first book, drop me an email and I'll be glad to assist.</span></p><span data-dcnode-id="3043" instrument_node="">
</span><p data-dcnode-id="3038"><strong data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">References</span></strong><br data-dcnode-id="3040"><span data-dcnode-id="3039" instrument_node="">
1. Schlaffke L, Leemans A, Schweizer LM, Ocklenburg S and Schmidt-Wilcke T, Learning Morse Code Alters Microstructural Properties in the Inferior Longitudinal Fasciculus: A DTI Study. Front. Hum. Neurosci. 11:383, (2017). https://doi.org/10.3389/fnhum.2017.00383</span></p><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">2. Maier J, Hartvig, NV, Green AC, Stodkilde-Jorgensen H, Reading with the Ears, Neuroscience Letters, 364, 185–188, (2004). https://doi.org/10.1016/j.neulet.2004.04.040</span></p><span data-dcnode-id="3034" instrument_node="">
</span><br data-dcnode-id="3033"><span data-dcnode-id="3032" instrument_node="">
</span><h4 data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">QRQ = Fun:</span></h4><span data-dcnode-id="3029" instrument_node="">
</span><p data-dcnode-id="3022"><a data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2022/W4BQF.jpg" rel="noopener" target="_blank"><img alt="W4BQF station" class="lozad" data-dcnode-id="3028" data-loaded="true" data-src="/images/2022/W4BQF-small.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2022/W4BQF-small.jpg&amp;raw" style="float:right; clear: both; margin-bottom:30px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="3026" instrument_node="">The following article was written by Tom (</span><a data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/w4bqf" rel="noopener" target="_blank"><span data-dcnode-id="3025" instrument_node="">W4BQF</span></a><span data-dcnode-id="3023" instrument_node="">) SK. We will remember his passion and enthusiasm for QRQ (high-speed). I thoroughly enjoyed reading his thoughts and advice. I hope you do too! I hope it inspires you to aim high when you set your Morse code proficiency goals! If not today, perhaps tomorrow.</span></p><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3016"><span data-dcnode-id="3020" instrument_node="">(Note that the following article was edited for grammar and clarity. You can find the original </span><a data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/site/tomw4bqf/copyingcwover70wpm" rel="noopener" target="_blank"><span data-dcnode-id="3019" instrument_node="">here</span></a><span data-dcnode-id="3017" instrument_node="">. It is unclear how long it will be available.)</span></p><span data-dcnode-id="3015" instrument_node="">
</span><p data-dcnode-id="3010"><strong data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">70wpm:</span></strong><br data-dcnode-id="3012"><span data-dcnode-id="3011" instrument_node="">I am often asked, "How can you copy CW at 70wpm and higher?" Since it's pretty insulting to answer by saying, "Practice, practice, practice," I usually end up emailing back a synopsis on how I learned to do it.</span></p><p data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">
</span></p><p data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">What I have to say on this subject is only my personal opinion, which generally does not agree with everyone else! I don't believe in the various methods of learning code. I think learning to copy high-speed code is much simpler than following someone else's method of learning to copy QRQ. What I am sharing with you are things that I found to work for me. Others have used different methods of achieving QRQ to copy by ear.</span></p><p data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">
</span></p><p data-dcnode-id="2999"><strong data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Basics:</span></strong><br data-dcnode-id="3001"><span data-dcnode-id="3000" instrument_node="">There are some basics I think one MUST learn, and the very first one is you must learn to copy ONLY in your head. That's very important! From there, you can begin to increase your copy speed. So copying in your head is a MUST. Jotting down notes or 'keywords' is okay to remind you of something you want to respond to during your QSO.</span></p><span data-dcnode-id="2998" instrument_node="">
</span><p data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">QSO'ing at 70 to 120wpm is no different than having a conversation on the telephone; you are just doing it using a different language! No sending call signs (except as required) and no sending &lt;BK&gt;. You don't do that on the telephone! And speaking on a telephone is operating duplex. So why not do the same thing using CW?</span></p><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2984"><span data-dcnode-id="2994" instrument_node="">The second most important thing you must do is have a radio with excellent full </span><a data-dcnode-id="2992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/QSK_operation_%28full_break-in%29" rel="noopener" target="_blank"><span data-dcnode-id="2993" instrument_node="">QSK</span></a><span data-dcnode-id="2991" instrument_node=""> (full break-in) at high speeds. Simply because when operating QRQ, you MUST do it in duplex! You don't stop and take notes when conversing on the telephone, so why do it when you are operating QRQ? The radios that I know of that can run full QSK at speeds over 100wpm are the </span><a data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rigreference.com/rigs/4165-ten-tec-corsair-ii" rel="noopener" target="_blank"><span data-dcnode-id="2990" instrument_node="">Ten-Tec Corsair II</span></a><span data-dcnode-id="2988" instrument_node=""> and the </span><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universal-radio.com/catalog/hamhf/2435.html" rel="noopener" target="_blank"><span data-dcnode-id="2987" instrument_node="">Icom IC-781</span></a><span data-dcnode-id="2985" instrument_node="">, and they do it flawlessly. In my opinion, full QSK is not at what speed you can hear another signal between dots, but at what speed you can hear your fellow ham trying to break you! Hearing between dots is an acceptable criterion for speeds below 40wpm but is inconsequential over 60wpm. Unfortunately, the more digital circuitry that is added to modern transceivers, the less high-speed QRQ capable they become.</span></p><span data-dcnode-id="2983" instrument_node="">
</span><p data-dcnode-id="2976"><strong data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">Keyboard Sending:</span></strong><br data-dcnode-id="2980"><a data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mfjenterprises.com/products/mfj-464" rel="noopener" target="_blank"><img alt="MFJ-464 CW Keyer/Reader" class="lozad" data-dcnode-id="2979" data-loaded="true" data-src="/images/2022/MFJ-464-small.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2022/MFJ-464-small.jpg&amp;raw" style="float:right; clear: both; margin-bottom:30px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="2977" instrument_node="">All high-speed code (above 55wpm) is sent with a keyboard/keyer or a computer keyboard simply because one cannot consistently send 'clean' code by hand on a key. Consistent 'clean' code makes for easier copying! I've been a CW operator for over 55 years, but I am not one of those 'old goats' who claim that sending CW by any other means than using your hand is not 'real' CW. 'Real' CW is a dot and a dash, no matter how you send it. The idea here is how you copy QRQ, not how you send it!</span></p><span data-dcnode-id="2975" instrument_node="">
</span><p data-dcnode-id="2958"><span data-dcnode-id="2974" instrument_node="">Most computer programs that are capable of generating CW, for some reason, are not designed to exceed 99wpm. And most computer programs generate CW via a </span><a data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serial_port" rel="noopener" target="_blank"><span data-dcnode-id="2973" instrument_node="">serial</span></a><span data-dcnode-id="2971" instrument_node=""> or a </span><a data-dcnode-id="2969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parallel_port" rel="noopener" target="_blank"><span data-dcnode-id="2970" instrument_node="">parallel port</span></a><span data-dcnode-id="2968" instrument_node="">. Using these I/O ports causes an inherent problem for smooth CW generation. A computer's CPU produces random (to us) </span><a data-dcnode-id="2966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.geeksforgeeks.org/interrupts/" rel="noopener" target="_blank"><span data-dcnode-id="2967" instrument_node="">interrupts</span></a><span data-dcnode-id="2965" instrument_node="">, which almost always stops activity in any I/O port FIRST! This leads to a 'stutter' sound in generated CW coming from these I/O ports. </span><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/ve6yp" rel="noopener" target="_blank"><span data-dcnode-id="2964" instrument_node="">VE6YP</span></a><span data-dcnode-id="2962" instrument_node="">, the author of the program I've been using for close to 10 years, is the only author I know of who has found a solution to this problem. In his program, </span><a data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qsl.net/ve6yp/index.html" rel="noopener" target="_blank"><span data-dcnode-id="2961" instrument_node="">YPlog</span></a><span data-dcnode-id="2959" instrument_node="">, he generates CW via the computer sound card, which is never interrupted by a computer's CPU 'house-keeping.' The user will need to build a very simple audio detector and a transistor switch to key his radio. This system works very well to over 160wpm.</span></p><span data-dcnode-id="2957" instrument_node="">
</span><p data-dcnode-id="2952"><strong data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">Head-Copy:</span></strong><br data-dcnode-id="2954"><span data-dcnode-id="2953" instrument_node="">You first want to learn to copy in your head only because when you get to speeds around 50 to 55wpm, you have to teach your brain literally to change its method of interpreting code. (And it takes a while to do this!) Below about 50wpm, you still hear a dot and a dash to form a word. When copying at 60wpm and higher, you do not consciously hear a dot and a dash. You literally hear a word. Also, at that time, you begin to have a 'flow of conversation,' just like you are when you're talking on the telephone. If you send me code groups at 70wpm, I could not copy most of them, but if you and I are in a conversation at 70wpm or higher, THEN I can copy pretty solid.</span></p><span data-dcnode-id="2951" instrument_node="">
</span><p data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Although you will not be conscious of copying dots and dashes, if the sender misspells a word, but somehow, you will notice. For instance, if the sender sends the word 'will' as 'wEll,' your mind will catch that one dit was missed. But your trained mind will ignore that one missed dit, and it will continue copying.</span></p><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">I'm not entirely sure, but above 70 to 80wpm, your mind is in the 'flow of the conversation' and will not likely copy every word sent to you. But your brain is copying enough to make sense of what is being sent!</span></p><span data-dcnode-id="2945" instrument_node="">
</span><p data-dcnode-id="2938"><strong data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Code Reader:</span></strong><br data-dcnode-id="2942"><a data-dcnode-id="2940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.apple.com/us/app/morsedecoder/id313071325%3Fign-mpt%3Duo%253D4" rel="noopener" target="_blank"><img alt="MFJ-464 CW Keyer/Reader" class="lozad" data-dcnode-id="2941" data-loaded="true" data-src="/images/2022/MorseDecoder.webp" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2022/MorseDecoder.webp&amp;raw" style="float:right; clear: both; margin-bottom:30px; margin-left:10px; margin-right:10px; width:230px"></a><span data-dcnode-id="2939" instrument_node="">To increase your copy speed, I recommend a code reader. And don't be shocked by that! I recommend a code reader because the process of learning to copy from about 50 to 60wpm is where you have to teach your brain to copy code differently. The problem at these speeds is if you miss a word, your brain automatically freezes and tries to 'guess' the missed word. While the brain is trying to decide what that one word is, many more words go flying by, and you get very confused and lose track of what is being sent to you. When you start using a code reader, you're going to just read the screen, but subconsciously, the brain is associating the dots and dashes with what you're reading on the screen. The more you do this, the less you read the screen. You will only need to glance at the code reader when you miss a word! This will get you over the 'brain freeze' caused by missing just one word! Once you get to copying around 60wpm, when you DO miss that one word, your brain realizes it but then continues to copy, ignoring or filling in the missed word.</span></p><span data-dcnode-id="2937" instrument_node="">
</span><p data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Don't worry about a code reader being a crutch, simply because when you get to where you can copy around 60wpm, you will find that you can then copy code better than a code reader! A code reader is not very good at handling high-speed code in the presence of normal band noise of your receiver. Beyond 60 to 70wpm, the readers cannot keep up anymore because of noise crashes, but your brain can easily filter out the noise. A code reader is an 'aid' to helping one learn to copy code faster. It is NOT a crutch!</span></p><span data-dcnode-id="2934" instrument_node="">
</span><p data-dcnode-id="2929"><span data-dcnode-id="2933" instrument_node="">Two big things about QRQ: 1) You HAVE to make it just another FUN thing you want to do with your hobby. 2) You are not going to learn to do it overnight! But </span><i data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">anybody</span></i><span data-dcnode-id="2930" instrument_node=""> can learn to do it.</span></p><span data-dcnode-id="2928" instrument_node="">
</span><p data-dcnode-id="2917"><strong data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">Tom's Story:</span></strong><br data-dcnode-id="2925"><span data-dcnode-id="2924" instrument_node="">I started doing QRQ sometime in the late '60s when I heard two hams talking to each other on their regular skeds on 40m, at 100wpm. I thought it was fascinating and just decided that was something I WANTED to do. And it took me about a year to go from 30wpm on my keyer to over 60wpm. That includes the time it took me to change from a </span><a data-dcnode-id="2922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/QWERTY" rel="noopener" target="_blank"><span data-dcnode-id="2923" instrument_node="">QWERTY</span></a><span data-dcnode-id="2921" instrument_node=""> to a </span><a data-dcnode-id="2919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dvorak_keyboard_layout" rel="noopener" target="_blank"><span data-dcnode-id="2920" instrument_node="">Dvorak</span></a><span data-dcnode-id="2918" instrument_node=""> keyboard layout. The neat and fun thing I found is that once you get to where you can copy between 60 and 70wpm, your mind seems to open up to copying QRQ. Going from 60 to 100wpm appeared to be a breeze compared to retraining my brain to get through the 50 to 60wpm 'brick wall' we all have to go through.</span></p><span data-dcnode-id="2916" instrument_node="">
</span><p data-dcnode-id="2902"><span data-dcnode-id="2915" instrument_node="">I really don't know how fast I can copy, but I used to have QSOs with </span><a data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/kb9xe" rel="noopener" target="_blank"><span data-dcnode-id="2914" instrument_node="">KB9XE</span></a><span data-dcnode-id="2912" instrument_node=""> and </span><a data-dcnode-id="2910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/nu2c" rel="noopener" target="_blank"><span data-dcnode-id="2911" instrument_node="">NU2C</span></a><span data-dcnode-id="2909" instrument_node=""> at 120wpm and could fully understand what they were saying. </span><a data-dcnode-id="2907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/nu2c" rel="noopener" target="_blank"><span data-dcnode-id="2908" instrument_node="">NU2C</span></a><span data-dcnode-id="2906" instrument_node=""> tested me once, and he would send me two questions, which I had to answer both, then he would go up 5wpm. Finally, at 145wpm, I got only one of his questions! I have recently read that a German ham copied a call sign being sent with </span><a data-dcnode-id="2904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rufzxp.net/" rel="noopener" target="_blank"><span data-dcnode-id="2905" instrument_node="">RufzXP</span></a><span data-dcnode-id="2903" instrument_node=""> (a high-speed competition program) at 200wpm! Copying CW at high speeds, either 145 or 200wpm, is one thing. Having a conversation at those speeds is something entirely different.</span></p><span data-dcnode-id="2901" instrument_node="">
</span><p data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">Again, two things. You have to make this a fun thing, you have to want to do it, and it can get pretty frustrating at times. You have to be willing to spend the necessary time on the air working at improving your copy. That is the only way I know of that you can do it, as there are no shortcuts. Interestingly, of the maybe ten hams that I know operate at high speeds, none of them have any interest in records or recognition for their QRQ ability. They all simply do it for the enjoyment of it.</span></p><span data-dcnode-id="2898" instrument_node="">
</span><p data-dcnode-id="2893"><strong data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">Epilog:</span></strong><br data-dcnode-id="2895"><span data-dcnode-id="2894" instrument_node="">I relate to many of the things Tom has to say. I am currently practicing at 55wpm, having reasonable success, and intend to switch to 65 or 70wpm in a few months. My long-term goal is to read a book at 40wpm. I once read that your enjoyment with Morse code is proportional to your proficiency. I wish I knew where I read that! I have found it to be true in my experience.</span></p><span data-dcnode-id="2892" instrument_node="">
</span><p data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">I strive for efficient Morse code practice. In my experience and research, rapid and continuous feedback will enable the quickest path to mastery. It is the idea behind the Morse Code Ninja format — Sent in Morse code, Spoken, and then Repeated in Morse code. Tom's suggestion to use a code reader may be controversial for some people. But used well, it will provide instantaneous feedback at a glance.</span></p><span data-dcnode-id="2889" instrument_node="">
</span><br data-dcnode-id="2888"><span data-dcnode-id="2887" instrument_node="">

</span><span data-dcnode-id="2882" instrument_node="">

</span><p data-dcnode-id="2873"><span data-dcnode-id="2879" instrument_node="">
</span><video controls="" data-dcnode-id="2875" height="480" poster="/images/2022/Daniel-Davis-Cameo.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px;" width="360"><span data-dcnode-id="2878" instrument_node="">

I am smiling ear-to-ear after receiving a surprise gift from someone that knows me very well. To say that it made my day would be an understatement.</span></p><span data-dcnode-id="2872" instrument_node="">
</span><p data-dcnode-id="2856"><a data-dcnode-id="2870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daniel_Davis" rel="noopener" target="_blank"><span data-dcnode-id="2871" instrument_node="">Daniel Davis</span></a><span data-dcnode-id="2869" instrument_node=""> was hired on </span><a data-dcnode-id="2867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cameo.com/" rel="noopener" target="_blank"><span data-dcnode-id="2868" instrument_node="">Cameo</span></a><span data-dcnode-id="2866" instrument_node=""> to lift my spirits. Daniel was a guest actor on Star Trek: The Next Generation and played the role of the holographic </span><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.no/detail/news-photo/daniel-davis-as-professor-james-moriarty-in-the-star-trek-news-photo/160975221" rel="noopener" target="_blank"><span data-dcnode-id="2865" instrument_node="">Professor James Moriarty</span></a><span data-dcnode-id="2863" instrument_node="">. He appeared on the second and sixth season episodes "</span><a data-dcnode-id="2861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jammersreviews.com/st-tng/s2/elementary.php" rel="noopener" target="_blank"><span data-dcnode-id="2862" instrument_node="">Elementary, Dear Data</span></a><span data-dcnode-id="2860" instrument_node="">" and "</span><a data-dcnode-id="2858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jammersreviews.com/st-tng/s6/bottle.php" rel="noopener" target="_blank"><span data-dcnode-id="2859" instrument_node="">Ship in a Bottle</span></a><span data-dcnode-id="2857" instrument_node="">."</span></p><span data-dcnode-id="2855" instrument_node="">
</span><p data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">Daniel claiming to have run into Samuel Morris and knowing that he is delighted by my efforts is a marvelous and fantastical thought!! It makes me giddy and laugh out loud every time I think of it.</span></p><span data-dcnode-id="2852" instrument_node="">
</span><p data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">This is a personal video and something that I waited almost a year to share. I hope that it brightens your day too. (Note that I removed a couple of personal segments to retain for my enjoyment.)</span></p><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">My very best regards and thanks to Daniel,</span></p><span data-dcnode-id="2846" instrument_node="">
</span><p data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">Kurt</span></p><span data-dcnode-id="2843" instrument_node="">

</span><table data-dcnode-id="2789"><tbody data-dcnode-id="2791"><tr data-dcnode-id="2793"><td data-dcnode-id="2795" style="line-height:1.5;"><span data-dcnode-id="2820" instrument_node="">
</span><p data-dcnode-id="2809"><a data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2021/Christmas-Card-Exchange-Collage.jpg" rel="noopener" target="_blank"><img alt="Morse Code Ninja sticker Collage" class="lozad" data-dcnode-id="2819" data-src="/images/2021/Christmas-Card-Exchange-Collage.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:400px" usemap="#nick-stickers-map"></a><span data-dcnode-id="2817" instrument_node="">

</span></map><span data-dcnode-id="2810" instrument_node="">I celebrated the holiday season with a Christmas card exchange. Each card came with a Morse Code Ninja sticker, personalized message, and a Ninja winter photo.</span></p><span data-dcnode-id="2808" instrument_node="">
</span><p data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">In all, I sent 109 cards! It was a lot of work, but also a lot of fun. It is a small joy receiving personal mail in our ever digital world. If you missed out, I plan on doing another exchange next year!</span></p><span data-dcnode-id="2805" instrument_node="">
</span><p data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">I hope that everyone had a terrific and merry holiday season! As the year came to a close, it has been fantastic coming to know so many wonderful people in the CW community.</span></p><span data-dcnode-id="2802" instrument_node="">
</span><p data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">I wish everyone all the best on their Morse code journey!</span></p><span data-dcnode-id="2799" instrument_node="">
