</span><h4 data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">TR-25 Transceiver Build:</span></h4><span data-dcnode-id="2785" instrument_node="">
</span><div data-dcnode-id="65" style="overflow: hidden;"><span data-dcnode-id="2784" instrument_node="">
</span><p data-dcnode-id="2768"><a data-dcnode-id="2782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2021/TR-25-Collage2.jpg" rel="noopener" target="_blank"><img alt="TR-25 Transceiver Build Collage" class="lozad" data-dcnode-id="2783" data-src="/images/2021/TR-25-Collage2.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:400px" usemap="#tr-25-map"></a><span data-dcnode-id="2781" instrument_node="">
</span><map data-dcnode-id="2773" name="tr-25-map"><span data-dcnode-id="2780" instrument_node="">
</span><area alt="work-area" coords="0,0,400,266" data-dcnode-id="2779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2021/tr-25-assembled.jpg" rel="noopener" shape="rect" target="_blank"><span data-dcnode-id="2778" instrument_node="">
</span><area alt="work-area" coords="0,268,198,398" data-dcnode-id="2777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2021/tr-25-build1.jpg" rel="noopener" shape="rect" target="_blank"><span data-dcnode-id="2776" instrument_node="">
</span><area alt="work-area" coords="200,268,400,398" data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2021/tr-25-build2.jpg" rel="noopener" shape="rect" target="_blank"><span data-dcnode-id="2774" instrument_node="">
</span></map><span data-dcnode-id="2772" instrument_node="">
I am excited to have successfully built the </span><a data-dcnode-id="2770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wa3rnc.com/store/tr-25-cw-transceiver-kit.html" rel="noopener" target="_blank"><span data-dcnode-id="2771" instrument_node="">TR-25 transceiver</span></a><span data-dcnode-id="2769" instrument_node="">! At $200, it is an excellent QRP 2-band CW transceiver. It provides operations on 20 and 40-meters and supports RIT (transmit frequency offset from receiving frequency).</span></p><span data-dcnode-id="2767" instrument_node="">
</span><p data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">I love the feel and aesthetics of this transceiver. It has a nice heft without being overly heavy. The OLED display is bright and can easily be seen outside in full daylight. All functions are accessible with physical controls, there are no complicated back menus, and the controls are intuitive and not crowded. You can quickly tune to the desired frequency; depressing the frequency knob cycles the frequency-step through 10 Hz, 100 Hz, and 1 kHz. The headphone jack has enough amplification to drive a small speaker! And as a bonus, there are separate ports for a straight key and paddles.</span></p><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2763" instrument_node="">Half glass full perspective? 1) The built-in keyer does not support multiple iambic keyer modes. Depending on your muscle memory, this might take some practice getting used to. Or you may prefer to utilize an external keyer. 2) You cannot completely turn down the sidetone volume. At its lowest setting, it is just at my comfort level. Any louder, and it would be too loud for me. 3) For portable operations, it would be convenient if the transceiver did not require an external battery pack. Unfortunately, the case does not have a holder for three </span><a data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fenix-store.com/blog/the-story-behind-18650-batteries/" rel="noopener" target="_blank"><span data-dcnode-id="2762" instrument_node="">18650 Lithium-Ion batteries</span></a><span data-dcnode-id="2760" instrument_node="">.</span></p><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">The minor limitations are just that, minor. This is a fantastic little rig!</span></p><span data-dcnode-id="2755" instrument_node="">
</span><p data-dcnode-id="2747"><strong data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Build:</span></strong><br data-dcnode-id="2752"><span data-dcnode-id="2751" instrument_node="">
</span><a data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/wa3rnc" rel="noopener" target="_blank"><span data-dcnode-id="2750" instrument_node="">WA3RNC</span></a><span data-dcnode-id="2748" instrument_node=""> did an excellent job with the kit! The instructions are clear, detailed, and divided into four parts: 1) Upper Board Assembly, 2) Lower Board Assembly, 3) Preliminary Checks and Tests, and 4) Final Assembly. There are 55 components to solder, which include six toroids. The components and two PCBs fit into the case with tight tolerances. Take your time during assembly to ensure a proper fit.</span></p><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">I was impressed with the packaging of the parts! Typically, I undertake a process of inventorying, checking the values of each component, and labeling and laying out all of the parts affixed to a piece of paper. However, that isn't needed for this kit. There are three long polybags associated with the Upper Board Assembly, Lower Board Assembly, and Final Assembly instructions. And the parts for each step are sectioned off within each polybag. This style of packaging saves a lot of time and potential mistakes!</span></p><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2738"><span data-dcnode-id="2742" instrument_node="">Although the instructions are excellent, I have one suggestion. Set the side-tone level to the lowest setting by turning pot R38 counterclockwise </span><strong data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">before</span></strong><span data-dcnode-id="2739" instrument_node=""> keying the radio for the first time. Then key the transmitter and slowly increase the sidetone level to the desired volume. I about blew my ears out initially because pot R38 was randomly set at the highest setting. Depending on when you plan to attach headphones, you may want to do this in the "Preliminary Checks and Tests" or the "Final Assembly" section.</span></p><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2726"><strong data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">Bottom Line:</span></strong><br data-dcnode-id="2734"><span data-dcnode-id="2733" instrument_node="">
The TR-25 transceiver is an excellent portable radio for </span><a data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parksontheair.com/" rel="noopener" target="_blank"><span data-dcnode-id="2732" instrument_node="">POTA</span></a><span data-dcnode-id="2730" instrument_node=""> and </span><a data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sota.org.uk/" rel="noopener" target="_blank"><span data-dcnode-id="2729" instrument_node="">SOTA</span></a><span data-dcnode-id="2727" instrument_node=""> operations, and it is a lot of fun to build! (Depending on the antenna, you may also need an external antenna turner.) And this transceiver is a reasonable first radio for a newly minted amateur radio operator on a strict budget and solely interested in CW.</span></p><span data-dcnode-id="2725" instrument_node="">
</span><div data-dcnode-id="2718" style="max-width: 560px; "><span data-dcnode-id="2724" instrument_node="">
</span><div class="video-container" data-dcnode-id="2720"><span data-dcnode-id="2723" instrument_node="">
</span><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lozad" data-dcnode-id="2722" data-src="https://www.youtube.com/embed/H8MhMcIROfw" frameborder="0" height="315" width="560"></iframe><span data-dcnode-id="2721" instrument_node="">
</span></div><span data-dcnode-id="2719" instrument_node="">
</span></div><span data-dcnode-id="2717" instrument_node="">
</span><br data-dcnode-id="2716"><span data-dcnode-id="2715" instrument_node="">
</span><br data-dcnode-id="2714"><span data-dcnode-id="2713" instrument_node="">
</span><h4 data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">Soldering Workshop:</span></h4><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2697"><a data-dcnode-id="2708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2021/soldering-workshop-alt.jpg" rel="noopener" target="_blank"><img alt="Workshop group picture" class="lozad" data-dcnode-id="2709" data-src="/images/2021/soldering-workshop-alt-small.jpg" style="float:right; clear: both; margin-bottom:30px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="2707" instrument_node="">
 It was a fantastic  experience leading a soldering workshop at the Kansas State University </span><a data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lib.k-state.edu/technology/innovation-lab/" rel="noopener" target="_blank"><span data-dcnode-id="2706" instrument_node="">Sunderland Foundation Innovation Lab</span></a><span data-dcnode-id="2704" instrument_node="">. While students put together the </span><a data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hamcrafters2.com/K16tutor.html" rel="noopener" target="_blank"><span data-dcnode-id="2703" instrument_node="">K1EL Morse Tutor Keyer Kit</span></a><span data-dcnode-id="2701" instrument_node="">, </span><a data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/kristopherlewison/" rel="noopener" target="_blank"><span data-dcnode-id="2700" instrument_node="">Kristopher "Mac" Lewison</span></a><span data-dcnode-id="2698" instrument_node=""> gave an exciting presentation on the historical intersection of Morse code and espionage, along with his own experience. Mac is a retired FBI agent and current K-State instructor. </span></p><span data-dcnode-id="2696" instrument_node="">
</span><p data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">It was awesome seeing a diversity of students outside of STEM-related majors. This was their first exposure to soldering and hands-on experience with electronics. Everyone had bated breath as they inserted batteries for the first time and were quite excited as their board came to life with the music of dits and dahs filling the room. A couple of boards required troubleshooting, but we eventually figured it out!</span></p><span data-dcnode-id="2693" instrument_node="">
</span><p data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">I learned that it is much easier to desolder a component with two people working together! Once the component is out, prepare the PCB by having one person suction up the solder while the other person applies heat from the opposite side of the PCB.</span></p><span data-dcnode-id="2690" instrument_node="">
</span><br data-dcnode-id="2689"><span data-dcnode-id="2688" instrument_node="">
</span><h4 data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Radiogram:</span></h4><span data-dcnode-id="2685" instrument_node="">
</span><span data-dcnode-id="2684" instrument_node="">
</span><span data-dcnode-id="2683" instrument_node="">
</span><span data-dcnode-id="2682" instrument_node="">
</span><span data-dcnode-id="2653" instrument_node="">
</span><span data-dcnode-id="2651" instrument_node="">
</span><span data-dcnode-id="2649" instrument_node="">
</span><table data-dcnode-id="2648"><tbody data-dcnode-id="2650"><tr data-dcnode-id="2652"><td data-dcnode-id="2654" style="line-height:1.5;"><span data-dcnode-id="2681" instrument_node="">
</span><p data-dcnode-id="2668"><a data-dcnode-id="2679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2021/Radiogram.jpg" rel="noopener" target="_blank"><img alt="Radiogram to AD0WE" class="lozad" data-dcnode-id="2680" data-src="/images/2021/Radiogram-smaller.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="2678" instrument_node="">Wow! I received a radiogram from Lane (</span><a data-dcnode-id="2676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/wk4wc" rel="noopener" target="_blank"><span data-dcnode-id="2677" instrument_node="">WK4WC</span></a><span data-dcnode-id="2675" instrument_node="">). That made my day! And my first ever! I appreciate James (</span><a data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/ki0bk" rel="noopener" target="_blank"><span data-dcnode-id="2674" instrument_node="">KI0BK</span></a><span data-dcnode-id="2672" instrument_node="">), Larry (</span><a data-dcnode-id="2670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/wb9fhp" rel="noopener" target="_blank"><span data-dcnode-id="2671" instrument_node="">WB9FHP</span></a><span data-dcnode-id="2669" instrument_node="">), and anyone else involved in getting the message to me.</span></p><span data-dcnode-id="2667" instrument_node="">
</span><p data-dcnode-id="2662"><span data-dcnode-id="2666" instrument_node="">ARRL radiograms are messages routed by a network of amateur radio operators through traffic nets, called the </span><a data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.arrl.org/nts" rel="noopener" target="_blank"><span data-dcnode-id="2665" instrument_node="">National Traffic System</span></a><span data-dcnode-id="2663" instrument_node=""> (NTS). It is a system used to route messages throughout the U.S. and Canada.</span></p><span data-dcnode-id="2661" instrument_node="">
</span><p data-dcnode-id="2656"><span data-dcnode-id="2660" instrument_node="">While everyday messages are a delight to send and receive, NTS works closely with </span><a data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.arrl.org/ares" rel="noopener" target="_blank"><span data-dcnode-id="2659" instrument_node="">ARES</span></a><span data-dcnode-id="2657" instrument_node=""> (Amateur Radio Emergency Services) to provide emergency communications. Routine messages are sent to ensure that everyone is coordinated, well-practiced, and ready when emergency communication services are needed.</span></p><span data-dcnode-id="2655" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2647" instrument_node="">
</span><br data-dcnode-id="2646"><span data-dcnode-id="2645" instrument_node="">
</span><h4 data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">10GHz Rain Scatter:</span></h4><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2635"><a data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2021/rain-scatter.svg" rel="noopener" target="_blank"><img alt="RF Scattering diagram" class="lozad" data-dcnode-id="2641" data-src="/images/2021/rain-scatter.svg" style="float:right; clear: both; margin-bottom:30px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="2639" instrument_node="">Morse code with no tone?!? Under certain conditions, such as in a thunderstorm, a 10GHz signal will become so scattered that it sounds like pulses of white noise. Take a listen to this short video below, courtesy of Pete (</span><a data-dcnode-id="2637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/N0OY" rel="noopener" target="_blank"><span data-dcnode-id="2638" instrument_node="">N0OY</span></a><span data-dcnode-id="2636" instrument_node="">). Note that the radio shows 144.100 Mhz. But that is only the IF (Intermediate Frequency). The received signal was at 10.3681 GHz, and the remote station was 650km away, line of sight.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">The 10GHz band lends itself to rain scatter and enables communication over hundreds of miles. This is possible because scattering occurs more strongly as the particle size increases or the wavelength gets shorter. And it just so happens that resonance occurs because raindrops are approximately 1/10 the wavelength of a 10GHz signal, which has a wavelength of 3cm.</span></p><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">The larger the angle between stations and the higher the thunderstorm, the longer the potential communication path becomes. Under ideal circumstances, 700km direct line-of-sight paths are possible.</span></p><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2627" instrument_node="">To learn more about this fascinating topic, please take a look at Tom William's (</span><a data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/WA1MBA" rel="noopener" target="_blank"><span data-dcnode-id="2626" instrument_node="">WA1MBA</span></a><span data-dcnode-id="2624" instrument_node="">) Rain Scatter, SHF and EHF </span><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wa1mba.org/papers/WA1MBA%2520Scattering%2520Super%25202019%2520Paper.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2623" instrument_node="">paper</span></a><span data-dcnode-id="2621" instrument_node="">.</span></p><span data-dcnode-id="2619" instrument_node="">
</span><div data-dcnode-id="2612" style="max-width: 560px; "><span data-dcnode-id="2618" instrument_node="">
</span><div class="video-container" data-dcnode-id="2614"><span data-dcnode-id="2617" instrument_node="">
</span><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lozad" data-dcnode-id="2616" data-src="https://www.youtube.com/embed/uKqjSvZUAAE" frameborder="0" height="315" width="560"></iframe><span data-dcnode-id="2615" instrument_node="">
</span></div><span data-dcnode-id="2613" instrument_node="">
</span></div><span data-dcnode-id="2611" instrument_node="">
</span><br data-dcnode-id="2610"><span data-dcnode-id="2609" instrument_node="">
</span><br data-dcnode-id="2608"><span data-dcnode-id="2607" instrument_node="">
</span><h4 data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">Limits of Human Perception:</span></h4><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2601"><a data-dcnode-id="2602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dh3kqBX1j7f8%26t%3D25s" rel="noopener" target="_blank"><img alt="speed" class="lozad" data-dcnode-id="2603" data-src="/images/2021/speed-smaller.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:300px"></a></p><span data-dcnode-id="2600" instrument_node="">
</span><p data-dcnode-id="2595"><span data-dcnode-id="2599" instrument_node="">I stumbled across a thought-provoking 11-minute video — </span><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/h3kqBX1j7f8%3Ft%3D25" rel="noopener" target="_blank"><span data-dcnode-id="2598" instrument_node="">What is the fastest music humanly possible?</span></a><span data-dcnode-id="2596" instrument_node=""> — that may have exciting implications on how we perceive Morse code at high speeds. Music and Morse code share an underlying rhythm, and our internal clock governs our perception of that rhythm.</span></p><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">In my experience, Morse code loses its signature tone as the speed reaches 50wpm or more, which can make it initially difficult to learn to copy. Yet still higher, at 70wpm, I notice something distinctly odd that makes Morse code incredibly difficult to copy. It just sounds different, and I can't explain it. However, this video may provide some insight.</span></p><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2586"><span data-dcnode-id="2590" instrument_node="">In music, the </span><a data-dcnode-id="2588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Time_point" rel="noopener" target="_blank"><span data-dcnode-id="2589" instrument_node="">inter-onset interval</span></a><span data-dcnode-id="2587" instrument_node=""> (IOI) is the interval between onsets of stimuli, or more specifically, the time between the perceived beginning of one note and the next one. The faster the rhythm, the shorter the IOI.</span></p><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2581"><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4264405/" rel="noopener" target="_blank"><span data-dcnode-id="2584" instrument_node="">Research</span></a><span data-dcnode-id="2582" instrument_node=""> shows that as IOIs shorten to 50ms, human perception begins to shift from perceiving a beat/rhythm to pitch.</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">At 50wpm, a dot is 24ms, and the dash is 72ms long. The average of these two numbers is 48ms. It is hard to imagine that this is just a coincidence that Morse code begins to take on a different sound at this speed! I'm far from alone in noting that Morse code takes on more of a pulsing sound at 50+wpm.</span></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">At 73wpm, both the length of a dot and dash fall below 50ms — the dot is 16.4ms while the dash is 49.2ms. Very few people ever develop proficiency beyond 75wpm. Perhaps 73wpm represents a natural speed barrier. It isn't insurmountable, but it keeps most people from going faster. It would be great to see more research into this area.</span></p><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">How fast can you copy? And how fast do you want to go? &nbsp; :)</span></p><span data-dcnode-id="2571" instrument_node="">
</span><br data-dcnode-id="2570"><span data-dcnode-id="2569" instrument_node="">
</span><h4 data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Released Ninja Software:</span></h4><span data-dcnode-id="2566" instrument_node="">
</span><span data-dcnode-id="2565" instrument_node="">
</span><span data-dcnode-id="2564" instrument_node="">
</span><span data-dcnode-id="2563" instrument_node="">
</span><span data-dcnode-id="2528" instrument_node="">
</span><span data-dcnode-id="2526" instrument_node="">
</span><span data-dcnode-id="2524" instrument_node="">
</span><table data-dcnode-id="2523"><tbody data-dcnode-id="2525"><tr data-dcnode-id="2527"><td data-dcnode-id="2529" style="line-height:1.5;"><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2549"><a data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/zoglmannk/Morse-Code-Ninja" rel="noopener" target="_blank"><img alt="GitHub screenshot" class="lozad" data-dcnode-id="2561" data-src="/images/2021/Morse-Code-Ninja-GitHub-smaller.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:350px"></a><span data-dcnode-id="2559" instrument_node="">I have open-sourced the software used to generate Morse Code Ninja </span><a data-dcnode-id="2557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/practice/index.html" rel="noopener" target="_blank"><span data-dcnode-id="2558" instrument_node="">practice sets</span></a><span data-dcnode-id="2556" instrument_node="">. It has been released under the </span><a data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/zoglmannk/Morse-Code-Ninja/blob/main/LICENSE" rel="noopener" target="_blank"><span data-dcnode-id="2555" instrument_node="">GPLv3 license</span></a><span data-dcnode-id="2553" instrument_node="">. Check it out on </span><a data-dcnode-id="2551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/zoglmannk/Morse-Code-Ninja" rel="noopener" target="_blank"><span data-dcnode-id="2552" instrument_node="">GitHub</span></a><span data-dcnode-id="2550" instrument_node="">!</span></p><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2540"><span data-dcnode-id="2547" instrument_node="">The software has a lot of opportunities for improvement. It is far from user friendly! It requires many libraries and other utilities to be installed. And it requires setting up an </span><a data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aws.amazon.com/premiumsupport/knowledge-center/create-and-activate-aws-account/" rel="noopener" target="_blank"><span data-dcnode-id="2546" instrument_node="">AWS account</span></a><span data-dcnode-id="2544" instrument_node=""> to make use of </span><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aws.amazon.com/polly/" rel="noopener" target="_blank"><span data-dcnode-id="2543" instrument_node="">AWS Polly</span></a><span data-dcnode-id="2541" instrument_node="">, a high-quality text-to-speech service.</span></p><span data-dcnode-id="2539" instrument_node="">
</span><p data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">The initial priority will be to improve the documentation and bring the user interface up to a level that would be expected for a command-line utility. The software is known to work on macOS but should also work on Linux.</span></p><span data-dcnode-id="2536" instrument_node="">
</span><p data-dcnode-id="2531"><span data-dcnode-id="2535" instrument_node="">There is interest within the </span><a data-dcnode-id="2533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//longislandcwclub.org/" rel="noopener" target="_blank"><span data-dcnode-id="2534" instrument_node="">Long Island CW Club</span></a><span data-dcnode-id="2532" instrument_node=""> to make the software more accessible to a general audience. If you have the time and talent, I welcome contributions. Feel free to open a pull request.</span></p><span data-dcnode-id="2530" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2522" instrument_node="">
</span><br data-dcnode-id="2521"><span data-dcnode-id="2520" instrument_node="">
</span><h4 data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Insights on ICR:</span></h4><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2507"><a data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2021/magic-eye-dinosaur.jpg" rel="noopener" target="_blank"><img alt="Magic Eye Dinosaur" class="lozad" data-dcnode-id="2516" data-src="/images/2021/magic-eye-dinosaur.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="2514" instrument_node="">Steve (</span><a data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/K9NUD" rel="noopener" target="_blank"><span data-dcnode-id="2513" instrument_node="">K9NUD</span></a><span data-dcnode-id="2511" instrument_node="">) is making excellent progress in mastering </span><a data-dcnode-id="2509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/reference/index.html%23LevelsOfCopyProficiency" rel="noopener" target="_blank"><span data-dcnode-id="2510" instrument_node="">ICR</span></a><span data-dcnode-id="2508" instrument_node=""> (Instant Character Recognition) and has made insightful observations on his journey. With his permission, please enjoy his thoughts on the matter.</span></p><span data-dcnode-id="2506" instrument_node="">
</span><p data-dcnode-id="2498"><span data-dcnode-id="2505" instrument_node="">Have you ever messed with those "</span><a data-dcnode-id="2503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magic_Eye" rel="noopener" target="_blank"><span data-dcnode-id="2504" instrument_node="">Magic Eye</span></a><span data-dcnode-id="2502" instrument_node="">" images? Some people can't see the intended hidden image, but many can, though it requires effort to transition into the required state of visual perception. The image to the right jumps out as a 3-D dinosaur. I mention this because I am learning how my brain works when it comes to CW. (Feel free to enjoy </span><a data-dcnode-id="2500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.magiceye3ds.com/pictures.aspx%3Fpage%3D42" rel="noopener" target="_blank"><span data-dcnode-id="2501" instrument_node="">additional stereograms</span></a><span data-dcnode-id="2499" instrument_node="">.)</span></p><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2492"><span data-dcnode-id="2496" instrument_node="">After switching to </span><a data-dcnode-id="2494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DCgRMS3_UMGQ%26feature%3Dyoutu.be" rel="noopener" target="_blank"><span data-dcnode-id="2495" instrument_node="">25 WPM two-character random sets</span></a><span data-dcnode-id="2493" instrument_node="">, I have identified at least four states of perception:</span></p><span data-dcnode-id="2491" instrument_node="">
</span><ol data-dcnode-id="2477"><span data-dcnode-id="2490" instrument_node="">
</span><li data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">I totally got that wrong. This usually happens when my attention is not fixed on the task. I hear two characters, and I try to do a quick translation before the announcement. I often get one or both wrong.</span></li><span data-dcnode-id="2487" instrument_node="">
</span><li data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">I got the first character, but I spent a moment translating it and subsequently missed the second character.</span></li><span data-dcnode-id="2484" instrument_node="">
</span><li data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">I got both, but it took a moment. I still think or say it before the answer is given.</span></li><span data-dcnode-id="2481" instrument_node="">
</span><li data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">I know the character the moment I hear it, understanding its meaning before I hear the second character, which I also decode and perceive the moment I hear it.</span></li><span data-dcnode-id="2478" instrument_node="">
</span></ol><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">All of this helps me discover how my mind works, or more specifically, how my attention works. When I am in the right state of perception, the characters just flow. Getting into that state reminds me of achieving the visual state needed to perceive the magic eye stereograms. Interestingly, I can expend effort and remain in the fourth state, but a slight pause in my thoughts will cause me to drop into the third state momentarily. The fourth state is also helping me identify characters that I have not completely mastered, such as the letters Z and X. I haven't begun numbers, punctuation, and prosigns yet. I wonder how many people who can copy fast code have mastered the ability to bounce between 3 and 4. I suspect there are more states I have not yet discovered. Words are probably the fifth state.</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2472" instrument_node="">Anyway, this has been a remarkable exercise in self-discovery. I intend to keep pursuing it. As an interesting side-effect, I actually lost some weight since beginning my journey. I was once obese but lost 70 lbs in recent years through lifestyle interventions. I know that the </span><a data-dcnode-id="2470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brainfacts.org/brain-anatomy-and-function/anatomy/2019/how-much-energy-does-the-brain-use-020119%23%3A~%3Atext%3DFor%2520the%2520average%2520adult%2520in%2Cin%2520terms%2520of%2520energy%2520use." rel="noopener" target="_blank"><span data-dcnode-id="2471" instrument_node="">brain consumes</span></a><span data-dcnode-id="2469" instrument_node=""> upwards of 20% of our energy, so it only makes sense that intense mental activity will consume more of the available energy. Without increasing energy intake, weight loss just happens. Others have noted this anecdotally when it comes to cramming for tests and term papers, among other things. I can only assume the effect will diminish as I learn to enter the more efficient states of perception.</span></p><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2459"><span data-dcnode-id="2466" instrument_node="">I have yet to discover how to store what I'm decoding in a region of memory that remains separate from the decoding area. I actually struggle more with 5-10 WPM CW, almost needing to write it down. Rather than being frustrated by it, I'm learning to observe my learning process and gauge my progress. I practice yoga and </span><a data-dcnode-id="2464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/mindfulness-meditation-88369" rel="noopener" target="_blank"><span data-dcnode-id="2465" instrument_node="">mindfulness meditation</span></a><span data-dcnode-id="2463" instrument_node="">, both of which have helped me identify a kind of "higher mind" that oversees and orchestrates my train of thought. Sometimes I feel like </span><a data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timothy_Leary" rel="noopener" target="_blank"><span data-dcnode-id="2462" instrument_node="">Timothy Leary</span></a><span data-dcnode-id="2460" instrument_node="">, sans the LSD.</span></p><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2457" instrument_node="">I am thankful for the Morse Code Ninja </span><a data-dcnode-id="2455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/practice/index.html" rel="noopener" target="_blank"><span data-dcnode-id="2456" instrument_node="">practice sets</span></a><span data-dcnode-id="2454" instrument_node=""> for facilitating this fascinating self-discovery journey. The compilations are like plugins for the 3D modeling tools of the brain. I wish all others all the best on their Morse code journey!</span></p><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">Best regards,</span></p><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2445"><span data-dcnode-id="2448" instrument_node="">Steve, </span><a data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/K9NUD" rel="noopener" target="_blank"><span data-dcnode-id="2447" instrument_node="">K9NUD</span></a></p><span data-dcnode-id="2444" instrument_node="">
</span><br data-dcnode-id="2443"><span data-dcnode-id="2442" instrument_node="">
</span><h4 data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Practice Over Time:</span></h4><span data-dcnode-id="2439" instrument_node="">
</span><p data-dcnode-id="2435"><a data-dcnode-id="2437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2021/Practice-over-Time-Day-vs-Speed.jpg" rel="noopener" target="_blank"><img alt="Illustration of hamster and Morse Code Ninja" class="lozad" data-dcnode-id="2438" data-src="/images/2021/Practice-over-Time-Day-vs-Speed-smaller.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="2436" instrument_node="">I started my Morse code journey 3 years ago! To this day, I have spent a little over 500 hours learning Morse code and improving my proficiency. My long-term goal is to head-copy an audiobook in Morse code at 40wpm comfortably, and I am making excellent progress toward that goal.</span></p><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2427"><a data-dcnode-id="2432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2021/Practice-over-Time-Month-vs-Speed.jpg" rel="noopener" target="_blank"><img alt="Illustration of hamster and Morse Code Ninja" class="lozad" data-dcnode-id="2433" data-src="/images/2021/Practice-over-Time-Month-vs-Speed-smaller.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="2431" instrument_node="">I have kept a detailed </span><a data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/Morse-code-progress.rtf" rel="noopener" target="_blank"><span data-dcnode-id="2430" instrument_node="">log of my practice</span></a><span data-dcnode-id="2428" instrument_node="">, which allows me to indulge in data analysis and visualize my practice. To the right, you will see two graphs that show the same data in slightly different ways. The top graph, "Practice Over Time: Day vs. Speed," will give you some insight into when I started practicing at a given speed and how that increased over time. Along the x-axis is the day of practice. Day 1 is the first day of practice.</span></p><span data-dcnode-id="2426" instrument_node="">
</span><p data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">The colored graph, "Practice Over Time: Month vs. Speed," gives you an idea of where and how much time I have spent practicing at a given speed. It is a heat-map, and along the x-axis is the number of months since begging to learn Morse Code. It is interesting to note that I spent a lot of time at 30wpm in the first couple of years and then largely transitioned to practicing at 40wpm in the last 6 months.</span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">To meet my long-term goal of reading a book at 40wpm, I am expanding my vocabulary of words so that I can instantly recognize their sound-pattern (aka Instant Word Recognition) without needing to spell them out letter-by-letter. Books make use of a large vocabulary, so it is an awesome challenge! It is like learning a new language! Literally!</span></p><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2415"><span data-dcnode-id="2419" instrument_node="">You may have noticed that I have a lot of </span><a data-dcnode-id="2417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/practice/index.html" rel="noopener" target="_blank"><span data-dcnode-id="2418" instrument_node="">practice sets</span></a><span data-dcnode-id="2416" instrument_node=""> available. I have created a series of practice sets — Sentences from Top X Words, where X currently goes from the Top 100 Words to the Top 1,500 Words. Each practice set is intended to teach the sound pattern of 100 new words at a time. I have found that learning any more words at one time can be overwhelming, and I don't find it efficient practice to encounter multiple words in a sentence that I don't know.</span></p><span data-dcnode-id="2414" instrument_node="">
</span><p data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Because the Top 1,000 Words are some of the most common even in a ragchew, I have gone back and created an extensive collection of review practice sets to ensure that every single word is used in a sentence at least 20 times! Hearing a word in a sentence 20 times is the magic number for me to learn them! Hopefully, your experience will mirror mine. Also, in my experience, it is most efficient to learn words at a speed no less than 30wpm. And I find longer words such as INFORMATION easier to learn at 40 to 45wpm. There is a maximum length of time that a word can take up before I can no longer recognize it as a complete sound pattern.</span></p><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">I really enjoy the learning process itself, and I hope you enjoy the journey too!</span></p><span data-dcnode-id="2408" instrument_node="">
</span><br data-dcnode-id="2407"><span data-dcnode-id="2406" instrument_node="">
</span><h2 data-dcnode-id="2403"><strong data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">2020</span></strong></h2><span data-dcnode-id="2402" instrument_node="">

</span><area alt="work-area" coords="200,268,400,398" data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/ninja-stickers3.jpg" rel="noopener" shape="rect" target="_blank"><span data-dcnode-id="2386" instrument_node="">

</span><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">In December, I sent out a lot of stickers over the Christmas break! I ran out of stickers initially. But by January 19th, I was able to send everyone on the waiting list a sticker. I have plenty of stickers left over for anyone who wants one!</span></p><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Happy New Year to all!</span></p><span data-dcnode-id="2364" instrument_node="">
</span></div><span data-dcnode-id="2362" instrument_node="">
</span><br data-dcnode-id="2361"><span data-dcnode-id="2360" instrument_node="">
</span><h4 data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Practicing with Daisy:</span></h4><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2353"><a data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/Daisey-and-Ninja.svg" rel="noopener" target="_blank"><img alt="Illustration of hamster and Morse Code Ninja" class="lozad" data-dcnode-id="2356" data-src="/images/2020/Daisey-and-Ninja-smaller.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="2354" instrument_node="">New skill unlocked — playing hand-over-hand with a cheek-filled hamster while copying Morse code sentences at 40wpm for 30 minutes! It is akin to patting your head and rubbing your stomach at the same time.</span></p><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">It was a fascinating experience. It was just distracting enough that I often let go of consciously copying each word and merely focused on the meaning. To my surprise, I often got the practice sentence correct in those moments. For reference, these are the Levels of Morse Code Proficiency.</span></p><span data-dcnode-id="2349" instrument_node="">
</span><ol data-dcnode-id="2335"><span data-dcnode-id="2348" instrument_node="">
</span><li data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Conscious decoding of Dits and Dahs</span></li><span data-dcnode-id="2345" instrument_node="">
</span><li data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Instant Character Recognition</span></li><span data-dcnode-id="2342" instrument_node="">
</span><li data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Instant Word Recognition</span></li><span data-dcnode-id="2339" instrument_node="">
</span><li data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Focus on the Meaning</span></li><span data-dcnode-id="2336" instrument_node="">
</span></ol><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">At 40wpm, I rely heavily on IWR (Instant Word Recognition) and typically pay close attention to each word as I copy it. Letting go is not something I have done before with success.</span></p><span data-dcnode-id="2331" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Daisy requires a lot of attention. She begs to be pet, held, and played with. She refuses to be ignored when I practice Morse code in the evenings. I'm sure she will increasingly be a part of my practice routine.</span></p><span data-dcnode-id="2328" instrument_node="">
</span><div data-dcnode-id="2321" style="max-width: 560px"><span data-dcnode-id="2327" instrument_node="">
</span><div class="video-container" data-dcnode-id="2323"><span data-dcnode-id="2326" instrument_node="">
</span><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lozad" data-dcnode-id="2325" data-src="https://www.youtube.com/embed/VKfJaIQMVGA" frameborder="0" height="315" width="560"></iframe><span data-dcnode-id="2324" instrument_node="">
</span></div><span data-dcnode-id="2322" instrument_node="">
</span></div><span data-dcnode-id="2320" instrument_node="">
</span><br data-dcnode-id="2319"><span data-dcnode-id="2318" instrument_node="">
</span><br data-dcnode-id="2317"><span data-dcnode-id="2316" instrument_node="">
</span><h4 data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Portable Satellite Tracking Presentation:</span></h4><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2306"><a data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/presentation/d/1MVYmY8_r4ApoaorKX7qf3j8KTWXy_jZ4Pk3nqqnKEZY/edit%3Fusp%3Dsharing" rel="noopener" target="_blank"><img alt="First slide of Portable Satellite Tracking slide deck" class="lozad" data-dcnode-id="2312" data-src="/images/2020/Portable-Satellite-Tracking-SlideDeck-smaller.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="2310" instrument_node="">I appreciated the opportunity to speak to the </span><a data-dcnode-id="2308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graysoncountyarc.org/" rel="noopener" target="_blank"><span data-dcnode-id="2309" instrument_node="">Grayson County Amateur Radio Club</span></a><span data-dcnode-id="2307" instrument_node=""> in Texas. Their club is planning a satellite-related project to build together as a club. And I have been researching different options for building a portable and inexpensive satellite tracking system, so it was a good fit. Eventually, I would like to make a CW contact via one of the amateur radio birds!</span></p><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">In my research, there are three published options.</span></p><span data-dcnode-id="2302" instrument_node="">
</span><ol data-dcnode-id="2278"><span data-dcnode-id="2301" instrument_node="">
</span><li data-dcnode-id="2294"><a data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//clearskyinstitute.com/ham/AST/" rel="noopener" target="_blank"><span data-dcnode-id="2300" instrument_node="">Autonomous Satellite Tracker</span></a><span data-dcnode-id="2298" instrument_node=""> (Elwood </span><a data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/WB0OEW" rel="noopener" target="_blank"><span data-dcnode-id="2297" instrument_node="">WB0OEW</span></a><span data-dcnode-id="2295" instrument_node="">)</span></li><span data-dcnode-id="2293" instrument_node="">
</span><li data-dcnode-id="2286"><a data-dcnode-id="2291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amsat.org/wordpress/xtra/Tricked-Out%2520WRAPS%2520Article.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2292" instrument_node="">Tricked-Out WRAPS Satellite Antenna Rotator</span></a><span data-dcnode-id="2290" instrument_node=""> (Mark </span><a data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/WA8SME" rel="noopener" target="_blank"><span data-dcnode-id="2289" instrument_node="">WA8SME</span></a><span data-dcnode-id="2287" instrument_node="">)</span></li><span data-dcnode-id="2285" instrument_node="">
</span><li data-dcnode-id="2280"><span data-dcnode-id="2284" instrument_node="">Repurposed Telescope Alt/Az Mount (Dwayne </span><a data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/NA6US" rel="noopener" target="_blank"><span data-dcnode-id="2283" instrument_node="">NA6US</span></a><span data-dcnode-id="2281" instrument_node="">)</span></li><span data-dcnode-id="2279" instrument_node="">
</span></ol><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2276" instrument_node="">Each of them has its pros and cons. Feel free to check out my </span><a data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/presentation/d/1MVYmY8_r4ApoaorKX7qf3j8KTWXy_jZ4Pk3nqqnKEZY/edit%3Fusp%3Dsharing" target="_blank"><span data-dcnode-id="2275" instrument_node="">slide deck</span></a><span data-dcnode-id="2273" instrument_node="">, which has links and details for each project. I tried to make the slide deck useful on its own.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><br data-dcnode-id="2270"><span data-dcnode-id="2269" instrument_node="">
</span><h4 data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Halloween Fun:</span></h4><span data-dcnode-id="2266" instrument_node="">
</span><span data-dcnode-id="2265" instrument_node="">
</span><span data-dcnode-id="2264" instrument_node="">
</span><span data-dcnode-id="2263" instrument_node="">
</span><span data-dcnode-id="2234" instrument_node="">
</span><span data-dcnode-id="2232" instrument_node="">
</span><span data-dcnode-id="2230" instrument_node="">
</span><table data-dcnode-id="2229"><tbody data-dcnode-id="2231"><tr data-dcnode-id="2233"><td data-dcnode-id="2235" style="line-height:1.5;"><span data-dcnode-id="2262" instrument_node="">
</span><p data-dcnode-id="2249"><a data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/Mike-N1CC-as-Morse-Code-Ninja.jpg" rel="noopener" target="_blank"><img alt="Mike N1CC with Julia KJ7QIO dressed in Halloween costumes" class="lozad" data-dcnode-id="2261" data-src="/images/2020/Mike-N1CC-as-Morse-Code-Ninja-smaller.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="2259" instrument_node="">The </span><a data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//longislandcwclub.org/licw-at-a-glance/" rel="noopener" target="_blank"><span data-dcnode-id="2258" instrument_node="">Long Island CW Club</span></a><span data-dcnode-id="2256" instrument_node=""> hosted a Halloween CW Game Night over Zoom! They used Morse code to play games, such as Bingo, word unscramble, joke-telling, and snowman (aka politically correct hangman)! The grand prize was a </span><a data-dcnode-id="2254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.morserino.info/morserino-32.html" rel="noopener" target="_blank"><span data-dcnode-id="2255" instrument_node="">Moserino-32</span></a><span data-dcnode-id="2253" instrument_node=""> donated by Willi (OE5WKF) and Rob (</span><a data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/W2ITT" rel="noopener" target="_blank"><span data-dcnode-id="2252" instrument_node="">W2ITT</span></a><span data-dcnode-id="2250" instrument_node="">).</span></p><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2240"><span data-dcnode-id="2247" instrument_node="">This year Mike (</span><a data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/N1CC" rel="noopener" target="_blank"><span data-dcnode-id="2246" instrument_node="">N1CC</span></a><span data-dcnode-id="2244" instrument_node="">) made an appearance as the Morse Code Ninja!! That's amazing and hilarious! Joining Mike and also pictured was his daughter Julia (</span><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/KJ7QIO" rel="noopener" target="_blank"><span data-dcnode-id="2243" instrument_node="">KJ7QIO</span></a><span data-dcnode-id="2241" instrument_node="">). On a side note, Mike has been using Morse code Ninja practice and recently received his 25wpm proficiency award! Congratulations, Mike!</span></p><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">It sounds like everyone had a blast, and there was great attendance! I plan to participate next year!</span></p><span data-dcnode-id="2236" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2228" instrument_node="">
</span><br data-dcnode-id="2227"><span data-dcnode-id="2226" instrument_node="">
</span><h4 data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Dear future wireless telegraphers,</span></h4><span data-dcnode-id="2223" instrument_node="">
</span><span data-dcnode-id="2222" instrument_node="">
</span><span data-dcnode-id="2221" instrument_node="">
</span><span data-dcnode-id="2220" instrument_node="">
</span><span data-dcnode-id="2203" instrument_node="">
</span><span data-dcnode-id="2201" instrument_node="">
</span><span data-dcnode-id="2199" instrument_node="">
</span><table data-dcnode-id="2198"><tbody data-dcnode-id="2200"><tr data-dcnode-id="2202"><td data-dcnode-id="2204" style="line-height:1.5;"><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2215"><a data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/ninja-into-sunset.jpg" rel="noopener" target="_blank"><img alt="Morse Code Ninja silhouetted at sunset" class="lozad" data-dcnode-id="2218" data-src="/images/2020/ninja-into-sunset-smaller.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:300px"></a><span data-dcnode-id="2216" instrument_node="">Remember why you started. Think about all the friends, your mentors, the people you look up to, and all the memories you have made. Think about your first QSO. Think about why you practice, your goals, and what you want to achieve. Those moments — think about the adrenaline rush of that special contact. Not everyone gets to experience that. And it is something great to be a part of. Think about how much pride you take in it.</span></p><span data-dcnode-id="2214" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Think about all the hours you have put in and all the sacrifices to be proficient. Don’t think about it like you have to do it. Take pride in the fact that you’re willing to sacrifice. And take pride in the fact that you’re willing to do the things that a lot of people aren’t willing to do.</span></p><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Be appreciative. Not many people get to experience the joy of Morse Code and the awesome CW community that spans the world.</span></p><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Just think, one day, you could be writing to future CW operators to inspire a new generation. — The Morse Code Ninja</span></p><span data-dcnode-id="2205" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2197" instrument_node="">
</span><br data-dcnode-id="2196"><span data-dcnode-id="2195" instrument_node="">
</span><h4 data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">HecKits Step Attenuator:</span></h4><span data-dcnode-id="2192" instrument_node="">
</span><span data-dcnode-id="2191" instrument_node="">
</span><span data-dcnode-id="2190" instrument_node="">
</span><span data-dcnode-id="2189" instrument_node="">
</span><span data-dcnode-id="2154" instrument_node="">
</span><span data-dcnode-id="2152" instrument_node="">
</span><span data-dcnode-id="2150" instrument_node="">
</span><table data-dcnode-id="2149"><tbody data-dcnode-id="2151"><tr data-dcnode-id="2153"><td data-dcnode-id="2155" style="line-height:1.5;"><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2169"><img alt="HecKits 50 Ohm 62db Step Attenuator build" class="lozad" data-dcnode-id="2187" data-src="/images/2020/HecKits-Attenuator-map.jpg" style="float:right; margin-left:10px; margin-bottom:10px; margin-right:10px; width:400px" usemap="#heckits-attenuator-map"><span data-dcnode-id="2186" instrument_node="">
</span><map data-dcnode-id="2174" name="heckits-attenuator-map"><span data-dcnode-id="2185" instrument_node="">
</span><area alt="work-area" coords="0,0,199,198" data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/HecKits-Attenuator1.jpg" rel="noopener" shape="rect" target="_blank"><span data-dcnode-id="2183" instrument_node="">
</span><area alt="work-area" coords="0,199,199,395" data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/HecKits-Attenuator2.jpg" rel="noopener" shape="rect" target="_blank"><span data-dcnode-id="2181" instrument_node="">
</span><area alt="work-area" coords="200,0,395,134" data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/HecKits-Attenuator3.jpg" rel="noopener" shape="rect" target="_blank"><span data-dcnode-id="2179" instrument_node="">
</span><area alt="work-area" coords="200,135,395,264" data-dcnode-id="2178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/HecKits-Attenuator4.jpg" rel="noopener" shape="rect" target="_blank"><span data-dcnode-id="2177" instrument_node="">
</span><area alt="work-area" coords="200,265,395,395" data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/HecKits-Attenuator5.jpg" rel="noopener" shape="rect" target="_blank"><span data-dcnode-id="2175" instrument_node="">
</span></map><span data-dcnode-id="2173" instrument_node="">
I had fun putting together a </span><a data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//heckits.com/62db-step-attenuator" rel="noopener" target="_blank"><span data-dcnode-id="2172" instrument_node="">HecKits 50 Ohm 62dB Step Attenuator</span></a><span data-dcnode-id="2170" instrument_node="">. It is easy to solder and assemble. The kit contains 21 metal film resistors (hand-labeled), 7 DPDT toggle switches, 2 BNC connectors, and an aluminum box. The only difficult part is carefully following the directions to ensure all the switches, BNC connectors, and PCB board fit correctly into the enclosure. If you make a mistake, things will not line up correctly with the pre-drilled holes!</span></p><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">This stepped attenuator will come in handy while locating nearby RFI or participating in a fox hunt! It allows selecting any attenuation between 0 to 62 dB in 1 dB steps. I tested out the kit in my apartment, and it works flawlessly.</span></p><span data-dcnode-id="2165" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2164" instrument_node="">Darrel Heckendorf (</span><a data-dcnode-id="2162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/WA7OIB" rel="noopener" target="_blank"><span data-dcnode-id="2163" instrument_node="">WA7OIB</span></a><span data-dcnode-id="2161" instrument_node="">) shipped the kit quickly and included the instructions with the shipping notification. </span><a data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.arrl.org/qst" rel="noopener" target="_blank"><span data-dcnode-id="2160" instrument_node="">QST Magazine</span></a><span data-dcnode-id="2158" instrument_node=""> has an in-depth analysis of the attenuator in the October 2020 issue, pages 43 to 46. With 6 dB selected, the SWR is very close to 1:1 through the 2-meter band. And the attenuation is flat through the HF range and rising to about 6.4 dB in the 2-meter band.</span></p><span data-dcnode-id="2156" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2148" instrument_node="">
</span><br data-dcnode-id="2147"><span data-dcnode-id="2146" instrument_node="">
</span><h4 data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Letter and postcards from Paris:</span></h4><span data-dcnode-id="2143" instrument_node="">
</span><span data-dcnode-id="2142" instrument_node="">
</span><span data-dcnode-id="2141" instrument_node="">
</span><span data-dcnode-id="2140" instrument_node="">
</span><span data-dcnode-id="2104" instrument_node="">
</span><span data-dcnode-id="2102" instrument_node="">
</span><span data-dcnode-id="2100" instrument_node="">
</span><table data-dcnode-id="2099"><tbody data-dcnode-id="2101"><tr data-dcnode-id="2103"><td data-dcnode-id="2105" style="line-height:1.5;"><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2125"><span data-dcnode-id="2138" instrument_node="">
</span><a data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/paris1.jpg" target="_blank"><img alt="Eiffel Tower with statue on the right" class="lozad" data-dcnode-id="2137" data-src="/images/2020/paris1-smaller.jpg" style="float:right; margin-left:10px; margin-bottom:10px; margin-right:10px; width:166px"></a><span data-dcnode-id="2135" instrument_node="">
</span><a data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/paris2.jpg" target="_blank"><img alt="Eiffel Tower at sunset" class="lozad" data-dcnode-id="2134" data-src="/images/2020/paris2-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:166px"></a><span data-dcnode-id="2132" instrument_node="">
</span><a data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/paris4.jpg" rel="noopener" target="_blank"><img alt="Kids skating in front of the Eiffel Tower" class="lozad" data-dcnode-id="2131" data-src="/images/2020/paris4-smaller.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:352px"></a><span data-dcnode-id="2129" instrument_node="">
I received a letter and postcards in the mail from Serge (</span><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/F4HYY" rel="noopener" target="_blank"><span data-dcnode-id="2128" instrument_node="">F4HYY</span></a><span data-dcnode-id="2126" instrument_node="">) in Paris! He sent me a nice letter thanking me for all my YouTube videos and this website dedicated to learning Morse code. It made my day, and I especially appreciated the handwritten note. It was an awesome surprise to find in the mail.</span></p><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">The Eiffel Tower is iconic. One day I hope to see it in person! Serge notes in his letter that as an antenna, radio saved the Eiffel Tower from being destroyed! I didn't know that.</span></p><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2120" instrument_node="">A bit more research showed that “Since </span><a data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Eiffel" rel="noopener" target="_blank"><span data-dcnode-id="2119" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="2117" instrument_node=""> footed 80 percent of the tower’s construction costs, he was permitted to have the structure stand for 20 years in order to recoup his investment before it passed into the hands of the Parisian government, which planned to disassemble it for scrap metal. Seeking a way to prove the structure’s strategic utility in a bid to save it, Eiffel erected an antenna atop the tower and financed experiments with wireless telegraphy that began in 1898. The value of the tower in sending and receiving wireless messages, particularly for the French military, caused the city to renew Eiffel’s concession when it expired in 1909. Today, more than 100 antennae on the tower beam radio and television broadcasts around the world.”</span></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2110"><span data-dcnode-id="2114" instrument_node="">It is awesome to be at the right time and place to give back to the amateur radio community. My </span><a data-dcnode-id="2112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/channel/UCXrTMfMEhkC9rVyQNU5aZlA" rel="noopener" target="_blank"><span data-dcnode-id="2113" instrument_node="">YouTube channel</span></a><span data-dcnode-id="2111" instrument_node=""> averages 200 visitors watching 100 hours of content every day! And those who wish to practice offline download about 300GB/month from my website.
</span></p><span data-dcnode-id="2109" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Thanks Serge!</span></p><span data-dcnode-id="2106" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2098" instrument_node="">
</span><br data-dcnode-id="2097"><span data-dcnode-id="2096" instrument_node="">
</span><h4 data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">ICOM 7300 Panadaptor:</span></h4><span data-dcnode-id="2093" instrument_node="">
</span><div class="video-limit-size" data-dcnode-id="2086"><span data-dcnode-id="2092" instrument_node="">
</span><div class="video-container" data-dcnode-id="2088"><span data-dcnode-id="2091" instrument_node="">
</span><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lozad" data-dcnode-id="2090" data-src="https://www.youtube.com/embed/xz6OnAK-dXs" frameborder="0" height="315" width="560"></iframe><span data-dcnode-id="2089" instrument_node="">
</span></div><span data-dcnode-id="2087" instrument_node="">
</span></div><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2084" instrument_node="">I am excited to get the </span><a data-dcnode-id="2082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.radioanalog.com/" rel="noopener" target="_blank"><span data-dcnode-id="2083" instrument_node="">RadioAnalog Panadaptor module</span></a><span data-dcnode-id="2081" instrument_node=""> for the </span><a data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icomamerica.com/en/products/amateur/hf/7300/default.aspx" rel="noopener" target="_blank"><span data-dcnode-id="2080" instrument_node="">ICOM 7300</span></a><span data-dcnode-id="2078" instrument_node=""> radio. It is fantastic to see the entire band at one time in high resolution and easily and quickly control the radio from my computer. The panadaptor module is easy to install, and it provides a significant boost in experience and enjoyment listening to the radio. Watch my 4-minute video for a quick demonstration.</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2075" instrument_node="">I also discovered that </span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sdrplay.com/sdruno/" rel="noopener" target="_blank"><span data-dcnode-id="2074" instrument_node="">SDRUno</span></a><span data-dcnode-id="2072" instrument_node=""> version 1.3 is now able to output 192kHz worth of </span><a data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pe0sat.vgnet.nl/sdr/iq-data-explained/" rel="noopener" target="_blank"><span data-dcnode-id="2071" instrument_node="">Raw IQ</span></a><span data-dcnode-id="2069" instrument_node=""> to </span><a data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dxatlas.com/cwskimmer/" rel="noopener" target="_blank"><span data-dcnode-id="2068" instrument_node="">CW Skimmer</span></a><span data-dcnode-id="2066" instrument_node="">! (But it does require cheap </span><a data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vb-audio.com/Cable/index.htm" rel="noopener" target="_blank"><span data-dcnode-id="2065" instrument_node="">virtual audio cables</span></a><span data-dcnode-id="2063" instrument_node="">.) The feature allows me to quickly decode everyone on the band at the same time, which is impressive during contest conditions! The only downside is that it taxes my laptop to the limit, almost to the point of being unusable! Perhaps I will have to upgrade my computer sometime this summer. I'd love to build a custom PC that can handle SDR with ease.</span></p><span data-dcnode-id="2061" instrument_node="">
</span><br data-dcnode-id="2060"><span data-dcnode-id="2059" instrument_node="">
</span><h4 data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Morse Code Revival:</span></h4><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2043"><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/Morse-Code-Search-Trends.jpg" rel="noopener" target="_blank"><img alt="Google search trend for Morse Code from 2004 to 2020, showing an upward trend towards 2020." class="lozad" data-dcnode-id="2055" data-src="/images/2020/Morse-Code-Search-Trends-smaller.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="2053" instrument_node="">I discovered something exciting! According to </span><a data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trends.google.com/trends/explore%3Fdate%3Dall%26geo%3DUS%26q%3DMorse%2520code" rel="noopener" target="_blank"><span data-dcnode-id="2052" instrument_node="">Google Search Trends</span></a><span data-dcnode-id="2050" instrument_node="">, their data shows a resurgence and growth in the interest of Morse Code in recent years. In the graph, the blue line represents Google searches for "Morse code" by month, while the black line shows a rolling average. This seems to match what many people have noticed in recent years. I am sure that the </span><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cwops.org/cw-academy/" rel="noopener" target="_blank"><span data-dcnode-id="2049" instrument_node="">CW Academy</span></a><span data-dcnode-id="2047" instrument_node=""> and the Long Island CW Club's </span><a data-dcnode-id="2045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//longislandcwclub.org/cw-online-classes/" rel="noopener" target="_blank"><span data-dcnode-id="2046" instrument_node="">online classes</span></a><span data-dcnode-id="2044" instrument_node=""> have played a large role in making this happen!</span></p><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2041" instrument_node="">Google provides data from 2004 until the present. In the data, you can see the revival starting around 2015 and reaching highs not seen since the beginning of the 2000s. For context, the </span><a data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fcc.gov/document/fcc-modifies-amateur-radio-service-rules-eliminating-morse-code-exam" rel="noopener" target="_blank"><span data-dcnode-id="2040" instrument_node="">FCC eliminated</span></a><span data-dcnode-id="2038" instrument_node=""> any Morse code requirement for licensing at the beginning of 2007. Interest in Morse code sharply fell off around the same time, so it is awesome to see a come back.</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">It will be interesting to see where interest goes over the next few years. I believe we are in the golden age of Morse code!</span></p><span data-dcnode-id="2033" instrument_node="">
</span><br data-dcnode-id="2032"><span data-dcnode-id="2031" instrument_node="">
</span><h4 data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Research during WWII:</span></h4><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2021"><a data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/WWII-Research.jpg" rel="noopener" target="_blank"><img alt="Research paper on Morse code laid out on a desk" class="lozad" data-dcnode-id="2027" data-src="/images/2020/WWII-Research-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="2025" instrument_node="">I spend an afternoon restoring a fascinating </span><a data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/files/The-Learning-of-Radiotelegraphic-Code.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2024" instrument_node="">research paper</span></a><span data-dcnode-id="2022" instrument_node=""> on Morse Code from Harvard University released in the Journal of Psychology in July 1943!</span></p><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">The outbreak of World Word II created a massive demand for the United States to train men in the use of the International Morse Code, perhaps as many as 10,000 men per month! The problem was that 30 to 60% of men entering radiotelegraphy schools failed to become proficient operators. The author, Donald Taylor, carried out experiments to determine aptitude and ways to shorten the length of time necessary to train men to become proficient with Morse code. The results are fascinating! And some of it goes against commonly held beliefs in the amateur radio community even today! The sample size was relatively small, so there is that.</span></p><p data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">
</span></p><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">What I found fascinating is the predictive power of The Initial Learning Test for aptitude. It had an adjusted correlation coefficient of .73 between the results of it and the speed test given during the 22nd hour of practice.
It was also interesting that the results didn't find any statistical difference in what character speed was used in learning Morse code. That seems to fly in the face of going advice for those who aspire proficiency above 12wpm. However, no matter what speeds they used, the format of instruction helped the students avoid decomposing the sound pattern of characters into dits and dahs. And that might be the most crucial key. But from a practical perspective, it would seem increasingly difficult with slower character speeds to avoid hearing the sound pattern as dits and dahs instead of the sound pattern.</span></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">The restoration of this document was more time consuming than I had expected. I used OCR to convert the text. But it required a lot of proofing and formatting to restore the document to its previous glory. It is so much easier to read than the original!</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2005"><span data-dcnode-id="2009" instrument_node="">If you have a bit of time, I invite you to give it a </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/files/The-Learning-of-Radiotelegraphic-Code.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2008" instrument_node="">read</span></a><span data-dcnode-id="2006" instrument_node="">!</span></p><span data-dcnode-id="2004" instrument_node="">
</span><br data-dcnode-id="2003"><span data-dcnode-id="2002" instrument_node="">
</span><h4 data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Exploring Satellite Radio with SDR:</span></h4><span data-dcnode-id="1999" instrument_node="">
