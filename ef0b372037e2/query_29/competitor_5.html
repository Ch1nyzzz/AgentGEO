</span><p data-dcnode-id="1296"><span data-dcnode-id="1300" instrument_node="">Quivira is a hidden gem in south-central Kansas (30 miles to the west of </span><a data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hutchinson%2C_Kansas" rel="noopener" target="_blank"><span data-dcnode-id="1299" instrument_node="">Hutchison</span></a><span data-dcnode-id="1297" instrument_node="">). At 22,000 acres, it is the only salt marsh in Kansas and attracts vast numbers of migratory birds. There are 20 miles of roads that closely wind around the water and afford excellent opportunities to view wildlife on your own personal safari. The salt marsh is created by groundwater percolating up from salt deposits near the surface. Some parts of the marsh have salt concentrations high enough to support salt-tolerant plants. Coronado even visited the area in 1541 in search of gold!</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1288"><a data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parksontheair.com/" rel="noopener" target="_blank"><span data-dcnode-id="1294" instrument_node="">Parks on the Air</span></a><span data-dcnode-id="1292" instrument_node=""> is an awesome program that brings together the great outdoors and amateur radio! The goal is to make a minimum of 10 contacts with other amateur radio operators while enjoying fresh air, wildlife, and beautiful scenery. A month ago, I realized that there was a perfect spot to set up and play radio. At the </span><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/place/Quivira%2BNational%2BWildlife%2BRefuge/%4038.1444426%2C-98.4918184%2C496m/data%3D%213m1%211e3%214m5%213m4%211s0x87a466b495908505%3A0xab937f66c9ed7ebf%218m2%213d38.0745305%214d-98.4911916" rel="noopener" target="_blank"><span data-dcnode-id="1291" instrument_node="">head of Migrants Mile</span></a><span data-dcnode-id="1289" instrument_node=""> (a paved .75 mile trail midway in the refuge), there is an open parking lot next to Park Smith Lake. It is beautiful, quiet, and spacious. I made plans to supply the power and antenna, while Greg would provide the radio and antenna tuner.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1282"><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/quivira-park-smith-lake.jpg" target="_blank"><img alt="Park Smith Lake at Quivira National Wildlife Refuge" class="lozad" data-dcnode-id="1286" data-src="/images/2019/quivira-park-smith-lake-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:10px; width:250px"></a><a data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/quivira-entrance.jpg" target="_blank"><img alt="Quivira National Wildlife Refuge entrance sign" class="lozad" data-dcnode-id="1284" data-src="/images/2019/quivira-entrance-smaller.jpg" style="float:right; margin-left:1px; margin-right:10px; width:250px"></a></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Wherever challenges are encountered, ingenuity is not far behind! Once we arrived and began to set up, things did not go according to plan. I provided half of the gear, while my uncle had provided the rest.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1277" instrument_node="">1) We quickly discovered that we didn't bring along the tool bag. Uh, oh! The </span><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hamradiocenter.biz/loopandmore.html"><span data-dcnode-id="1276" instrument_node="">Grasshopper vertical antenna</span></a><span data-dcnode-id="1274" instrument_node=""> has three hose clamps holding the segmented pole in place. If we could not extend the antenna, it would be too short and prevent us from getting on the air. With a moment to ponder, I asked Greg if he had any change. He said yes. There were quarters in the dashboard, and they worked for a makeshift flat-head screwdriver!</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1269"><a data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/quivera-greg-antenna.jpg" target="_blank"><img alt="Greg Wycoff (N0ZHE) at Quivira National Wildlife Refuge setting up an antenna for POTA (Parks On The Air)" class="lozad" data-dcnode-id="1271" data-src="/images/2019/quivera-greg-antenna-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">2) Next, we realized that the heavy-duty zip ties needed to be cut. If we could not unroll the antenna radials, we would not be able to transmit using the vertical antenna. We looked and looked, and looked some more. Without success, Greg even tried ripping the zip ties apart with a key. We were stumped. We did not have a pocket knife or anything sharp to cut through the plastic. Eventually, Greg spotted a Cotter Hairpin and realized that he could use it to twist the zip ties until they broke.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">3) Then the wind started blowing! The tool bag also had the guy wires to hold the antenna in place and prevent it from toppling over in the wind. Fortunately, the base plate was just big enough to load it down with weight. And the nearby trees provided just enough protection from the wind to get away using 5lbs of dead weight. If it were any windier, we would have had to find heavy rocks.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">4) Lastly, we learned that we did not have a way to power the antenna tuner! Without the antenna tuner, there was no way we were going to transmit on that Grasshopper antenna. By design, it is non-resonant on all amateur radio bands! This predicament required carefully looking at what we had and problem-solving together. We ended up with a precarious solution. We took apart the existing power cord for the antenna tuner. That left us with two open wires. We connected each end to another length of wire that had a battery terminal clamp on one side and an Anderson power pole on the end. Finally, we plugged that into an MFJ power box. Fortunately, the break out box included fuses and protected us from a short!</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1256"><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/quivira-me-thinking.JPG" target="_blank"><img alt="Kurt Zogmann (AD0WE) thinking and listening to Morse code at Quivira National Wildlife Refuge" class="lozad" data-dcnode-id="1258" data-src="/images/2019/quivira-me-thinking-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1254" instrument_node="">After a lengthy setup, I reached out to Julia, </span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/KF8JBB" rel="noopener" target="_blank"><span data-dcnode-id="1253" instrument_node="">KF8JBB</span></a><span data-dcnode-id="1251" instrument_node="">, via text message for an exceptional contact. I met Julia a year ago in my </span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cwops.org/cw-academy/cw-academy-options/" rel="noopener" target="_blank"><span data-dcnode-id="1250" instrument_node="">CW Academy</span></a><span data-dcnode-id="1248" instrument_node=""> Level 2 class. And we have been practicing Morse code once a week for a year. We have tried several times in the past to make a QSO, but have been unsuccessful. She operates QRP and lives in Columbus, Ohio. And while at home in Manhattan, KS, I have a fairly high noise floor. The two circumstances have hindered our efforts. But we wanted to try again before calling CQ and spotting myself on the POTA reflector.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">I called out to Julia on 20meters using CW. After several attempts, she texted back asking if I could increase power. She barely heard my signal. I was not optimistic about our chances. I was already transmitting 50 watts, and she was going to come back to me with 10 watts. I upped the power to 100 watts and hoped for the best.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1242" instrument_node="">I tried again and got about 20 seconds into calling her when the radio abruptly shut off. What the heck! In our haste to power the antenna tuner, we overlooked the fact that we plugged the transceiver into an outlet on the </span><a data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mfjenterprises.com/products/mfj-1104" rel="noopener" target="_blank"><span data-dcnode-id="1241" instrument_node="">MFJ power breakout box</span></a><span data-dcnode-id="1239" instrument_node=""> with a 10 amp fuse! The radio was pulling close to 20amps when I keyed up with 100watts of RF power. Luckily, there was an outlet with a 25amp fuse. With a quick switch of outlets, I was back up and running again.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1232"><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/quivira-greg-operating.jpg" target="_blank"><img alt="Greg Wycoff (N0ZHE) working SSB at Quivira National Wildlife Refuge" class="lozad" data-dcnode-id="1236" data-src="/images/2019/quivira-greg-operating-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:10px; width:250px"></a><a data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/quivira-blown-fuse.jpg" target="_blank"><img alt="blown fuse" class="lozad" data-dcnode-id="1234" data-src="/images/2019/quivira-blown-fuse-smaller.jpg" style="float:right; margin-left:1px; margin-right:10px; width:250px"></a></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">I called Julia again. This time she heard me! And when she called back to me, I could hear her! We exchanged signal reports and thanked each other for the QSO. I was excited, and Julia was overjoyed. She texted me back and said, "AWESOME!!! Like a Friggin drug. It is the highlight of my weekend already!!" I was also on cloud nine.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">After a couple more QSOs, I handed off operations to Greg. He found an open frequency on the upper end of 20 meters and called CQ using SSB. Over the next hour, he made eight contacts. It took a while even though propagation seemed to be reasonably decent. Most operators were giving Greg a signal report of 57 or 59.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Then we took a short break to move the pickup truck into the shade. I reapplied sunscreen and took to the air again using CW. To avoid the on-going contests I set up on the WARC bands. I tried calling CQ on 17meters for a while, but no one came back. So I switched to 30meters and made four more contacts over the next half hour.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1217"><a data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/quivira-greg-chilling.jpg" target="_blank"><img alt="Greg Wycoff (N0ZHE) enjoying pizza after POTA activation" class="lozad" data-dcnode-id="1221" data-src="/images/2019/quivira-greg-chilling-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:10px; width:250px"></a><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/quivira-me-chilling.jpg" target="_blank"><img alt="Kurt Zoglmann (AD0WE) enjoying pizza after POTA activation" class="lozad" data-dcnode-id="1219" data-src="/images/2019/quivira-me-chilling-smaller.jpg" style="float:right; margin-left:1px; margin-right:10px; width:250px"></a></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">By this time, the sun was starting to beat down on us, and my laptop was almost out of power. I switched to SSB on the upper end of 20meters and over the next 15 minutes, I made three more contacts. I was delighted when I crossed the ten QSO's needed to count for a successful park activation. Greg considered getting two more contacts, but creature comforts and home were calling to us.</span></p><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">We drove 2 hours back home and treated ourselves to a well-deserved pizza. Relaxing in the shade and on the patio was great. It had cooled off a little by then. The dogs entertained us as they ran around and begged for a bite of pizza.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Greg and I hope to activate another park in June. We learned valuable lessons and will plan better next time! It was a fun and awesome experience.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><br data-dcnode-id="1206"><span data-dcnode-id="1205" instrument_node="">
</span><h4 data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">OzarkCon QRP Conference:</span></h4><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1199"><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/ozarkcon-speaker.jpg" target="_blank"><img alt="2019 OzarkCon QRP Conference session" class="lozad" data-dcnode-id="1201" data-src="/images/2019/ozarkcon-speaker-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1197" instrument_node="">Toby (</span><a data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/KE0KUY" rel="noopener" target="_blank"><span data-dcnode-id="1196" instrument_node="">KE0KUY</span></a><span data-dcnode-id="1194" instrument_node="">) and I had a blast at the </span><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ozarkcon.com/index.php" rel="noopener" target="_blank"><span data-dcnode-id="1193" instrument_node="">Ozarkcon QRP Conference</span></a><span data-dcnode-id="1191" instrument_node="">! Amazingly, Toby won the grand prize!! What a remarkable experience for our first time!</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">The atmosphere reminded me of a large family reunion — everyone was exceptionally friendly and social. We made several new friends and were implored to come back next year. It was a treat meeting so many passionate and enthusiastic amateur radio operators.</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1185" instrument_node="">The conference schedule was jammed packed with sessions and activities. My favorite was the Kit Building session. Toby and I signed up to build the </span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.4sqrp.com/cricket40.php" rel="noopener" target="_blank"><span data-dcnode-id="1184" instrument_node="">Cricket 40</span></a><span data-dcnode-id="1182" instrument_node="">, which is a minimalist 40M crystal controlled CW transceiver. We only had to pay a small additional fee and bring several tools, such as a soldering iron, needle nose pliers, and a tray to protect the table.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1179" instrument_node="">By coincidence, I sat next to Joe Eisenberg (</span><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/K0NEB" rel="noopener" target="_blank"><span data-dcnode-id="1178" instrument_node="">K0NEB</span></a><span data-dcnode-id="1176" instrument_node="">). That was a neat experience! Joe is an expert kit builder and has written many articles for </span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cq-amateur-radio.com/" rel="noopener" target="_blank"><span data-dcnode-id="1175" instrument_node="">CQ Magazine</span></a><span data-dcnode-id="1173" instrument_node=""> over the last ten years! Joe puts together two to three kits every month and writes about them. And because he helps coordinate and oversees group kit building sessions, he was delighted to be a mere participant this time.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1166"><a data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/ozarkcon-40m-cricket.jpg" target="_blank"><img alt="Assembled Cricket 40 transmitter at the 2019 OzarkCon QRP Conference" class="lozad" data-dcnode-id="1170" data-src="/images/2019/ozarkcon-40m-cricket-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:10px; width:250px"></a><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/ozarkcon-joe-kit-building.jpg" target="_blank"><img alt="Joe Eisenberg (K0NEB) assembling Cricket 40 at the 2019 OzarkCon QRP Conference" class="lozad" data-dcnode-id="1168" data-src="/images/2019/ozarkcon-joe-kit-building-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:250px"></a></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Joe flew through the assembly of the Cricket transceiver. Oh my! To say that he is adept at handling a soldering iron would be an understatement. He was more than generous to stop and help me when I had some hesitation on a couple of steps.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Toby and I finished building the Cricket at nearly the same time — nearly 3.5 hours later. It was nearly 11 pm, and I was exhausted by that point. I wasn't confident when I brought my radio up to the front of the room to be tested, but it worked on the first try! And so did Toby's!</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1156"><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/ozarkcon-pine-board.jpg" target="_blank"><img alt="Bob Heil's (K9EID) Pine Board AM Transmitter Kit on display at the 2019 OzarkCon QRP Conference" class="lozad" data-dcnode-id="1158" data-src="/images/2019/ozarkcon-pine-board-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1154" instrument_node="">My second favorite activity was looking at all the homebrew equipment that was on display in the vendor area. I fell in love with an </span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.amazonaws.com/ad0we/ozcarkcon%2B80m%2Bspiral%2Bloop%2Bhomebrew.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1153" instrument_node="">80-meter spiral loop antenna</span></a><span data-dcnode-id="1151" instrument_node=""> that someone had put together. It was a work of art, and it looked as if it could have been made during the early days of AM radio. I was also taken with Bob Heil's (</span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/K9EID" target="_blank"><span data-dcnode-id="1150" instrument_node="">K9EID</span></a><span data-dcnode-id="1148" instrument_node="">) </span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arrl.org/files/file/QST/This%2520Month%2520in%2520QST/January2018/Heil.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1147" instrument_node="">Pine Board AM Transmitter Kit</span></a><span data-dcnode-id="1145" instrument_node="">. It is renown within some circles in the amateur radio community.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1142" instrument_node="">Despite 200 people attending the conference, everyone won a prize! Yes, everyone! I won an </span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.4sqrp.com/4slpf.php" rel="noopener" target="_blank"><span data-dcnode-id="1141" instrument_node="">80 meter Low Pass Filter kit</span></a><span data-dcnode-id="1139" instrument_node="">. But Toby won the grand prize, an </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elecraft.com/products/kx2-ssb-cw-data-80-10-m-transceiver" rel="noopener" target="_blank"><span data-dcnode-id="1138" instrument_node="">Elecraft KX2</span></a><span data-dcnode-id="1136" instrument_node="">!! I don't know how, but I just knew moments before they called out the winning ticket number that either Toby or I was going to win. And sure enough, Toby won! Everyone was delighted with the outcome. Toby is a relatively new ham and has been evaluating several portable HF transceivers over the last few months. Toby had rejected the KX2 because of cost even though it is considered to be one of the very best portable HF transceivers on the market.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Coincidentally, I bought a KX2 just two weeks prior! After the conference, we spent an extra day sightseeing. We packed the day and made the most of every moment. We did a ton of things! I hope to come back again.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><br data-dcnode-id="1130"><span data-dcnode-id="1129" instrument_node="">
</span><h4 data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">My First Ragchew:</span></h4><span data-dcnode-id="1126" instrument_node="">
</span><span data-dcnode-id="1125" instrument_node="">
</span><span data-dcnode-id="1124" instrument_node="">
</span><span data-dcnode-id="1123" instrument_node="">
</span><span data-dcnode-id="1097" instrument_node="">
</span><span data-dcnode-id="1095" instrument_node="">
</span><span data-dcnode-id="1093" instrument_node="">
</span><table data-dcnode-id="1092"><tbody data-dcnode-id="1094"><tr data-dcnode-id="1096"><td data-dcnode-id="1098" style="line-height:1.5;"><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1112"><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/First-Ragchew.jpg" target="_blank"><img alt="Map of United States showing contact between Mike (KK7N) in Troutdale, Oregan and Kurt (AD0WE) in Manhattan, Kansas" class="lozad" data-dcnode-id="1121" data-src="/images/2019/First-Ragchew-small.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:25px; width:400px"></a><span data-dcnode-id="1119" instrument_node="">I had my first rag chew (aka log conversation) using Morse code! I talked to Mike (</span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/KK7N" rel="noopener" target="_blank"><span data-dcnode-id="1118" instrument_node="">KK7N</span></a><span data-dcnode-id="1116" instrument_node="">) in </span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.troutdaleoregon.gov/" rel="noopener" target="_blank"><span data-dcnode-id="1115" instrument_node="">Troutdale, Oregan</span></a><span data-dcnode-id="1113" instrument_node=""> on 20-meters. Signals were strong with just a touch of QSB. For 20 minutes we talked about the weather and other small pleasantries. We jokingly complained to each other about all the snow and cold temperatures this winter. I wanted to keep conversing, but my mind began to tire, and my accuracy in copying started to suffer. So I gave Mike my best regards and let him go. This achievement is a noteworthy milestone in my Morse code journey!</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1110" instrument_node="">I made several other CW contacts this weekend including one with a special event station </span><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/WA1WCC" rel="noopener" target="_blank"><span data-dcnode-id="1109" instrument_node="">WA1WCC</span></a><span data-dcnode-id="1107" instrument_node="">. They are celebrating the centennial of the </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rca.com/us_en/our-legacy-266-us-en" rel="noopener" target="_blank"><span data-dcnode-id="1106" instrument_node="">Radio Corporation of America's</span></a><span data-dcnode-id="1104" instrument_node=""> incorporation on October 17, 1919. In November 1919, RCA acquired the assets of the </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marconi_Wireless_Telegraph_Company_of_America" rel="noopener" target="_blank"><span data-dcnode-id="1103" instrument_node="">Marconi Wireless Telegraph Company</span></a><span data-dcnode-id="1101" instrument_node="">.</span></p><span data-dcnode-id="1099" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1091" instrument_node="">
</span><br data-dcnode-id="1090"><span data-dcnode-id="1089" instrument_node="">
</span><h4 data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">K1EL Morse Tutor Board:</span></h4><span data-dcnode-id="1086" instrument_node="">
</span><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/K1EL-Tutor-Board-being-assembled.jpg" target="_blank"><img alt="Assembled K1EL Morse Tutor Board" class="lozad" data-dcnode-id="1085" data-src="/images/2019/K1EL-Tutor-Board-being-assembled-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:10px; width:250px"></a><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/K1EL-Tutor-Board-Assembled.jpg" target="_blank"><img alt="Soldering and assembling K1EL Morse Tutor Board on the kitchen table" class="lozad" data-dcnode-id="1083" data-src="/images/2019/K1EL-Tutor-Board-Assembled-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:250px"></a><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1080" instrument_node="">I let the fun out of two identical kits, the </span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hamcrafters2.com/K16tutor.html" rel="noopener" target="_blank"><span data-dcnode-id="1079" instrument_node="">Morse Tutor Board</span></a><span data-dcnode-id="1077" instrument_node=""> by </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/K1EL" rel="noopener" target="_blank"><span data-dcnode-id="1076" instrument_node="">K1EL</span></a><span data-dcnode-id="1074" instrument_node="">. After a few hours of soldering and assembly, I had both of them working! The </span><a data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hamcrafters2.com/files/MorseTutor_V1.1.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1073" instrument_node="">manual</span></a><span data-dcnode-id="1071" instrument_node=""> has clear, but brief instructions on how to assemble the kit. If you have experience with other kits, this one will be a breeze to assemble.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">It is a neat little board. The capacitance keying is fantastic and perhaps the best feature! It has a nice tactile feel that is entirely different compared to a paddle. And yet it feels comfortable and natural. I will have to try it on air sometime soon. I don't think it will take too long to master this style of keying. I might even try it while working portable. It is light, and I won't have to worry about it sliding around left and right.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">There are a couple of other notable features. 1) With two kits hooked together, you can practice Morse code in person with a friend across the table or room! 2) By yourself, you can practice playing a Simon-like game. The game works by sending one character. You repeat it back. If you are right, it sends the same character, followed by another one. Every time you are right, it adds one character with a maximum of 5 characters. If you get the character sequence wrong, it sends the letter X and starts over with a new character group. 3) The kit can also be used as a keyer with built-in memory functions.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">As a follow-up, a couple of months later, I bought and assembled two more! I have given three away as an inexpensive gift. It has been a great way to excite the right person about Morse code.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">
</span><h4 data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">First CW Contest:</span></h4><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1050"><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/ARRL-DX-Contest-Winter-sunset.jpg" target="_blank"><img alt="Plaza West apartment complex parking lot in early winter showing snow on the ground at sunset" class="lozad" data-dcnode-id="1054" data-src="/images/2019/ARRL-DX-Contest-Winter-sunset-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:10px; width:250px"></a><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/ARRL-DX-Contest-QSOs.png" target="_blank"><img alt="Map showing AD0WE contacts in the 2019 ARRL International DX Contest" class="lozad" data-dcnode-id="1052" data-src="/images/2019/ARRL-DX-Contest-QSOs-smaller.png" style="float:right; margin-left:10px; margin-right:10px; width:250px"></a></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node="">I am thrilled to have participated in my first Morse code contest, the </span><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.arrl.org/arrl-dx" rel="noopener" target="_blank"><span data-dcnode-id="1047" instrument_node="">ARRL International DX Contest</span></a><span data-dcnode-id="1045" instrument_node="">! It was a great learning experience! I spent several hours searching and pouncing. Next time I will spend more time operating the 2-day event.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1042" instrument_node="">I made a total of 15 contacts. Most of them were international — Germany, Scotland, </span><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azores" rel="noopener" target="_blank"><span data-dcnode-id="1041" instrument_node="">Azores</span></a><span data-dcnode-id="1039" instrument_node="">, </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bonaire" rel="noopener" target="_blank"><span data-dcnode-id="1038" instrument_node="">Bonaire</span></a><span data-dcnode-id="1036" instrument_node="">, </span><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belize" rel="noopener" target="_blank"><span data-dcnode-id="1035" instrument_node="">Belize</span></a><span data-dcnode-id="1033" instrument_node="">, </span><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barbados" rel="noopener" target="_blank"><span data-dcnode-id="1032" instrument_node="">Barbados</span></a><span data-dcnode-id="1030" instrument_node="">, Jamaica, and Mexico. On my second contact, I spent 10 minutes trying to decode a callsign being sent at 40wpm while listening to a weak signal. I finally figured out that it was </span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/6Y3M" rel="noopener" target="_blank"><span data-dcnode-id="1029" instrument_node="">6Y3M</span></a><span data-dcnode-id="1027" instrument_node="">! I did not cheat and use the </span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.reversebeacon.net/" rel="noopener" target="_blank"><span data-dcnode-id="1026" instrument_node="">Reverse Beacon Network</span></a><span data-dcnode-id="1024" instrument_node="">. That was the highlight of the contest!</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">I was surprised to work several Hawaiian stations. They were strong, and they heard me on the first try. I am delighted that my callsign is easy to recognize in Morse code even with a weak signal. Almost all of my QSO's were on 20-meters. The noise level was fantastically low at S1, which is unheard of at my home QTH! I made one contact on 40-meters, but I gave up on the lower band after a while. The majority of the stations sounded mushy with the high S8 noise level and low signal strength.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">I look forward to the next contest. By all comparisons, many stations will have made 100's if not 1000's of contacts! Some people live for radiosport. For my next one, I will focus on breaking my record of 15 QSOs.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">
</span><h4 data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">QCX 20m transceiver:</span></h4><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><img alt="Kurt Zoglmann (AD0WE)" class="lozad" data-dcnode-id="1010" data-src="/images/2019/QCX-me-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:300px"></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">I am excited to have successfully built my first transceiver and made my first QRP contact! There is a long and proud tradition of building your own radio in the amateur radio community. It is was a great learning experience and a lot of fun! It has rekindled my interest in electrical engineering and tinkering.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="1004" instrument_node="">At $50, the </span><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qrp-labs.com/qcx.html" rel="noopener" target="_blank"><span data-dcnode-id="1003" instrument_node="">QCX transceiver</span></a><span data-dcnode-id="1001" instrument_node=""> is one of the cheapest full-featured QRP CW kits on the market. Kits are available with your choice of a single band, 80 through 17m. It has a 200Hz filter, an on-screen S-meter, CW shaping to remove key clicks, and 3 to 5 watts on transmit. It supports split operation and even decodes stronger CW signals! The internal keyer supports iambic and straight keys. And the kit has built-in test equipment to assist in troubleshooting and calibrating the transceiver without additional expensive equipment. </span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hanssummers.com/" rel="noopener" target="_blank"><span data-dcnode-id="1000" instrument_node="">Hans Summers</span></a><span data-dcnode-id="998" instrument_node=""> (</span><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/G0UPL" rel="noopener" target="_blank"><span data-dcnode-id="997" instrument_node="">G0UPL</span></a><span data-dcnode-id="995" instrument_node="">) has done a marvelous job in designing this kit! Perhaps the best part is the detailed and clear </span><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//qrp-labs.com/images/qcx/assembly_A4.pdf" rel="noopener" target="_blank"><span data-dcnode-id="994" instrument_node="">instruction manual</span></a><span data-dcnode-id="992" instrument_node=""> for putting it all together.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="989" instrument_node="">My QCX transceiver sat unassembled and in a box for nearly a year! I considered putting it together earlier, but instead, I prioritized learning Morse code starting from no proficiency. (See below for how I learned Morse code and was able to copy at 30wpm in less than a year. I am very appreciative of </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cwops.org/" rel="noopener" target="_blank"><span data-dcnode-id="988" instrument_node="">CW Ops</span></a><span data-dcnode-id="986" instrument_node=""> and the opportunity to take their </span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cwops.org/cw-academy-2/cw-academy/" rel="noopener" target="_blank"><span data-dcnode-id="985" instrument_node="">CW Academy Level</span></a><span data-dcnode-id="983" instrument_node=""> 2 and 3 classes. They were invaluable!) But enough was enough. The anticipation was mounting! So this winter I set a goal of assembling the QCX. Short days and cold temperatures are a great time to work on indoor projects.</span></p><span data-dcnode-id="981" instrument_node="">
</span><h5 data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Day 1 - Preparing for the Build:</span></h5><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="975"><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/QCX-inventory.jpg" target="_blank"><img alt="Parts laid out neatly on the kitchen table in preparation for soldering and assembling the QCX 20m transceiver" class="lozad" data-dcnode-id="977" data-src="/images/2019/QCX-inventory-smaller.jpg" style="float:right;margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Before getting too serious, I inventoried the parts and made sure that nothing was missing. Next, I affixed the capacitors, resistors, and other small parts to a sheet of paper and clearly labeled them. This step saves time in locating capacitors and resistors with specific values during the build. And it reduces the likelihood of parts getting lost. Avoid using tape on any components, such as integrated circuits, that are sensitive to ESD (electrostatic discharge).</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Then I read through the first part of the manual and discovered that I needed a jeweler's magnifying loupe. As the manual suggests, you will want to inspect and verify each soldering joint closely. It is easy to get a cold soldering joint or accidentally bridge two joints together. While I have had some prior soldering experience, this was the first time soldering so many parts so closely together! I also decided to purchase an antistatic mat and strap.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">If you are considering building this radio, you will also need a fine-tipped temperature controlled soldering iron, fine soldering wire, and a PCB holder. While not strictly required, you will want a digital multimeter for checking continuity and a de-soldering tool to correct any mistakes.</span></p><span data-dcnode-id="965" instrument_node="">
</span><h5 data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Day 2 and 3 - Building:</span></h5><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="959"><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/QCX-assembly-ICs.jpg" target="_blank"><img alt="QCX 20m transceiver partially soldered and assembled" class="lozad" data-dcnode-id="961" data-src="/images/2019/QCX-assembly-ICs-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:300px"></a></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">After I received my shipment of tools, I was ready to begin the project in earnest. And as luck would have it, it was just in time for the weekend!</span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">The first soldering step was to install all of the IC's onto the PCB. This made me a little nervous since it had been several years since I last touched a soldering iron! You have to balance applying just enough heat to the IC pin and PCB pad to avoid a cold solder joint, but not so much heat that you burn up the integrated component. I set the soldering iron to 375C, which required a few seconds of heating to melt the soldering wire in place.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">The ATmega328, the primary microcontroller, was a little more difficult to solder in place. It required first soldering the 28-pin DIP socket, and then carefully inserting the chip into its holder. The pins have to be bent gently and just slightly so that the IC can slip into the socket. If you are not careful, it can result in breaking off a pin! The rest of the IC's were relatively a piece of cake since they were soldered directly onto the PCB.</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Next, all of the capacitors are soldered in place. I made sure to double and triple check the value of each capacitor and its placement on the PCB before soldering them into place. The jeweler's loupe made it easy to read the tiny print on the capacitors.</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Things did not go so smoothly. Difficulty started when I created a cold solder joint. I had trouble getting the leads on one capacitor heated back up to melt the solder quickly enough without excessively heating the component. Turning up the iron 25C to 400C took care of that problem.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="940"><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/QCX-mostly-assembled.jpg" target="_blank"><img alt="QCX 20m transceiver mostly soldered and assembled" class="lozad" data-dcnode-id="942" data-src="/images/2019/QCX-mostly-assembled-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Then after the numerous capacitors, I soldered a handful of diodes and two crystals into place. Next, I started to solder the abundance of resisters onto the PCB. Once I got to resistor R12, I did a double take. Wait, what? Despite carefully checking the position of each component before soldering them into place, I discovered I had reversed the position of capacitor C18 and resistor R18! They were firmly soldered into place. What should I do?</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">For a while, I thought I might have to purchase a new kit and start over!! It was extremely difficult to correct. I slightly damaged the capacitor, but it checked okay — 978pF versus the expected 1nF. I also ruined one of the PCB pads getting them desoldered. So after getting them swapped, I checked and re-checked the electrical conductivity between the traces to the other connecting components from C18 and R18. I was relieved when everything checked out. I was very fortunate! Learn from my mistake. All of the capacitors are annotated on the PCB with a rectangle! C18 and R18 are right next to each other, which is unlike any of the other ones.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Next, I soldered a multitude of components onto the PCB — potentiometers, electrolytic capacitors, transistors, .1" male pin headers, a voltage regulator, and power connector. All of these were straightforward and easy to install. By the time I had gotten to this step, I had put in 15 hours into the build and had 141 components soldered together!</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="927"><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/QCX-powered-on.jpg" target="_blank"><img alt="QCX 20m transceiver soldered, assembled, and powered on for the first time" class="lozad" data-dcnode-id="929" data-src="/images/2019/QCX-powered-on-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Next, the toroids and transformer need to be assembled and installed onto the PCB. I made sure to stop right before this step and get a good nights rest. These are difficult and critical steps in the build.</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="922" instrument_node="">The first torrid was the most difficult one to assemble and solder since it was my first one ever. The instruction manual indicates that the number one cause of problems with building kits from </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrp-labs.com/" rel="noopener" target="_blank"><span data-dcnode-id="921" instrument_node="">QRP Labs</span></a><span data-dcnode-id="919" instrument_node=""> is the failure to remove wire enamel before soldering toroids and transformers into place. It is bold and in red! I used fine-grit sandpaper to remove the enamel from the leads coming off the torrid. Before soldering them into place, I used a digital multimeter to ensure continuity between both leads. Then I soldered them in place and re-checked continuity between the two PCB pads. It didn't take too long to repeat the same steps for the remaining three toroids.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Then I took on the granddaddy of build steps — correctly wind and solder the transformer onto the PCB. The manual dedicates seven pages and many diagrams to help you avoid problems! There are four windings on the transformer. They must all be wound in the same direction, and each winding needs to be soldered onto the correct PCB pad.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Despite taking my time with the transformer, I ran into a problem. I didn't scrape enough of the enamel off of the wire on one of the windings! I had significant difficulty getting conductivity on the two leads after I had everything soldiered in place. Persistence and patience with the soldering iron paid off. I was able to burn off the enamel with each lead still partially soldered. It required the highest temperature setting on the iron! Then it was a matter of re-tinning the two leads and soldering them securely to their respective PCB pad.</span></p><span data-dcnode-id="911" instrument_node="">
</span><div class="video-limit-size" data-dcnode-id="904"><span data-dcnode-id="910" instrument_node="">
</span><div class="video-container" data-dcnode-id="906"><span data-dcnode-id="909" instrument_node="">
</span><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lozad" data-dcnode-id="908" data-src="https://www.youtube.com/embed/0g_cKgg2j58" frameborder="0" height="315" width="560"></iframe><span data-dcnode-id="907" instrument_node="">
</span></div><span data-dcnode-id="905" instrument_node="">
</span></div><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Finally, I soldered a handful of remaining components into place — the rotary encoder, microswitch, potentiometer, and female header to the LCD module. By the end of Sunday night, I had completed the initial build and was ready for the moment of truth. I was exhausted, but I had to know. As you can see in the video, I plugged in the QCX transceiver and no magic smoke was let out!! The screen was blank, but I was relieved. Hours of work were not in vain!</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">I spent the next 30 minutes following the manual to initially adjust the contrast on the LCD screen and calibrate the receiver. Before propagation went away on 20-meters for the evening, I hooked up an indoor dipole antenna and was able to catch the end of a CW QSO. I took a break and ate dinner.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Even though the band had died, I called out CQ and confirmed that the transceiver was transmitting a small amount of power. I don't have a QRP watt meter so unfortunately, I cannot accurately see how much power the radio is outputting. However, it appears to be about 1 watt.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">The radio isn't perfect. There is a loud clicking sound that occurs randomly when the VFO dial is turned or pushed in. It happens more frequently when I turn up the audio gain more than halfway. It is more of an annoyance than anything. Later, I discovered that the clicking noise is a design flaw which allows RFI generated from updating the LCD to be picked up by the audio amplifier. It doesn't bother me too much.</span></p><span data-dcnode-id="891" instrument_node="">
</span><h5 data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Day 4 - Testing:</span></h5><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="885"><a data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/QCX-winter-sunset.jpg" target="_blank"><img alt="View at sunset from the balcony of Plaza West Apartments in Manhattan, Kansas" class="lozad" data-dcnode-id="887" data-src="/images/2019/QCX-winter-sunset-smaller.jpg" style="float:right; margin-bottom:10px; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">I verified that the transmitter is operational. If you can imagine seeing a night light in my living room from several 1,000 miles away, you can understand why I was delighted and amazed. I estimate that 1 watt of power was making it out from my indoor dipole antenna.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="880" instrument_node="">First I tested the radio by calling CQ. After several minutes with no one answering back, I checked the </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.reversebeacon.net/" rel="noopener" target="_blank"><span data-dcnode-id="879" instrument_node="">Reverse Beacon Network</span></a><span data-dcnode-id="877" instrument_node=""> and confirmed that my signal was making it as far away as Arizona, Nevada, and Utah. My signal wasn't very strong. And only a handful of automated listening stations spotted me. With better band conditions and persistence, I'm sure I will make my first QRP contact with this radio. I am motivated to try again soon!</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="874" instrument_node="">Next, I tested the built-in </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//physics.princeton.edu/pulsar/k1jt/wspr.html" rel="noopener" target="_blank"><span data-dcnode-id="873" instrument_node="">WSPR</span></a><span data-dcnode-id="871" instrument_node=""> functionality and checked </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//wsprnet.org/drupal/" rel="noopener" target="_blank"><span data-dcnode-id="870" instrument_node="">WSPRnet</span></a><span data-dcnode-id="868" instrument_node=""> to see who heard me. After two successful test transmissions sent 10 minutes apart, I was being heard as far away as Iceland and Brazil! Propagation was beginning to close up as the sun went down, so I was not surprised to see that I was primarily being heard to the west and southwest within the United States.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="863"><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/QCX-WSPR-run.jpg" rel="noopener" target="_blank"><img alt="WSPR contacts from Manhattan, Kansas using the QCX 20m transceiver" class="lozad" data-dcnode-id="865" data-src="/images/2019/QCX-WSPR-run-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="861" instrument_node="">I was successful with WSPR, but not on the first try! Initially, I had difficulty finding the right transmitter frequency. Part of it was my fault for not reading the manual, and part of it was a calibration problem with the radio. The </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//wsprnet.org/drupal/node/218" rel="noopener" target="_blank"><span data-dcnode-id="860" instrument_node="">published</span></a><span data-dcnode-id="858" instrument_node=""> WSPR frequency for 20meters is 14.0956MHz using USB (Upper Side Band) with audio inserted at 1.5KHz. Setting the QCX to that frequency won't work since there is no CW offset. The correct frequency is supposed to be between 14.0970 to 14.0972Mhz. That would be the right. However, the timing of my radio was slightly off by +200Hz (approx). I was finally heard once I set the frequency to 14.0970Mhz. Anything higher and it didn't work.</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="855" instrument_node="">Once I realized the display frequency was off slightly, I committed to building the corresponding </span><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qrp-labs.com/qlg1.html" rel="noopener" target="_blank"><span data-dcnode-id="854" instrument_node="">QLG1 GPS Receiver Kit</span></a><span data-dcnode-id="852" instrument_node=""> that plugs into the QCX transceiver. It will allow me to finish calibrating the radio and ensure that the displayed frequency is accurate. The timing error comes from slight operating deviations in the 20Mhz and 27Mhz crystals.</span></p><span data-dcnode-id="850" instrument_node="">
</span><h5 data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Day 5 - Building the GPS Receiver:</span></h5><span data-dcnode-id="847" instrument_node="">
</span><span data-dcnode-id="846" instrument_node="">
</span><span data-dcnode-id="845" instrument_node="">
</span><span data-dcnode-id="844" instrument_node="">
</span><span data-dcnode-id="823" instrument_node="">
</span><span data-dcnode-id="821" instrument_node="">
</span><span data-dcnode-id="819" instrument_node="">
</span><table data-dcnode-id="818"><tbody data-dcnode-id="820"><tr data-dcnode-id="822"><td data-dcnode-id="824" style="line-height:1.5;"><span data-dcnode-id="843" instrument_node="">
</span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/QCX-GPS-receiver.jpg" rel="noopener" target="_blank"><img alt="QLG1 GPS Receiver Kit soldered together and assembled" class="lozad" data-dcnode-id="842" data-src="/images/2019/QCX-GPS-receiver-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="839" instrument_node="">Next, I built the $23 </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qrp-labs.com/qlg1.html" rel="noopener" target="_blank"><span data-dcnode-id="838" instrument_node="">QLG1 GPS Receiver Kit</span></a><span data-dcnode-id="836" instrument_node="">. It was not nearly as hard to solder and assemble compared to the QCX 20-meter transceiver! There were far fewer parts. However, the </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qrp-labs.com/images/qlg1/qlg1_assembly.pdf" rel="noopener" target="_blank"><span data-dcnode-id="835" instrument_node="">instruction manual</span></a><span data-dcnode-id="833" instrument_node=""> could have been slightly better. It is not nearly as detailed as the QCX manual. On the positive side, it is straightforward to assemble the GPS receiver.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="830" instrument_node="">I was a little disappointed that the GPS kit did not come with the necessary 4-pin male header and corresponding cable to connect the GPS and QCX transceiver together. So I ordered the parts from </span><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sparkfun.com/" rel="noopener" target="_blank"><span data-dcnode-id="829" instrument_node="">Sparkfun</span></a><span data-dcnode-id="827" instrument_node=""> for a few dollars and waited until the following weekend to verify that the GPS receiver worked.</span></p><span data-dcnode-id="825" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="817" instrument_node="">
</span><h5 data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Day 6 - Making my first contact:</span></h5><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="811"><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/W6ZE" rel="noopener" target="_blank"><img alt="Orange County Amateur Radio Club members on ARRL Field Day" class="lozad" data-dcnode-id="813" data-src="/images/2019/QCX-1st-contact-radio-club.jpg" style="float:right; margin-bottom:10px; margin-left:10px; margin-right:10px; width:500px"></a></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="809" instrument_node="">I was very excited to have made my first contact using the QCX 20-meter transceiver! It was with </span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/W6ZE" target="_blank"><span data-dcnode-id="808" instrument_node="">W6ZE</span></a><span data-dcnode-id="806" instrument_node="">, the </span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.w6ze.org/" rel="noopener" target="_blank"><span data-dcnode-id="805" instrument_node="">Orange County Amateur Radio Club</span></a><span data-dcnode-id="803" instrument_node=""> in California. Pretty cool for 1 watt of power! Orange County is 1,991 miles away from Manhattan, KS!</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="800" instrument_node="">I didn't initially realize that the yearly </span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.winterfieldday.com/" rel="noopener" target="_blank"><span data-dcnode-id="799" instrument_node="">Winter Field Day</span></a><span data-dcnode-id="797" instrument_node=""> contest was going on when I called CQ. Silly me! After a confusing and failed contact, I realized my mistake. I looked up the expected exchange so that I could participate in the contest. Next, I searched the 20-meter band and found a relatively strong station calling CQ WFD. I waited for the right moment and provided my callsign. On the first try, the operator picked up my callsign. I was surprised! He didn't even ask for a repeat on the contest exchange. I'm convinced he was receiving me much more weakly than I was receiving him!</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><img alt="Map showing the distance between Manhattan, Kansas and Orange County, California " class="lozad" data-dcnode-id="794" data-src="/images/2019/QCX-1st-contact-map.jpg" style="float:right; margin-left:10px; margin-right:10px; width:500px"></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Later I finished calibrating the QCX transceiver. The display frequency was slightly off. The calibration entailed soldering a 4-pin header to the GPS receiver, waiting a little bit for the GPS receiver to lock on to enough satellites to provide a highly accurate 1-second tick, and running through a couple of documented steps on the QCX. The transceiver was able to determine that its 27Mhz crystal was oscillating at 27,004,112 cycles per second while the 20Mhz crystal was oscillating at 20,006,486 cycles per second. That was just enough to cause the displayed frequency to be off in the neighborhood of 200Hz. After the calibration, I used WSPR to confirm the accuracy of the calibration. It appears to be spot on.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">On a side note, the GPS receiver worked for the calibration procedure, but it didn't work well enough in my apartment to resolve its location. I placed it next to our sliding glass door. The GPS receiver was able to hear and track more than a dozen satellites at one time. And I gave it more than an hour to resolve its location for the first time. Maybe at some point, I will have to try again when it is dry and warmer, and when I have a portable battery for the transceiver. Perhaps it is a matter of taking it outside to have an unobstructed view of the sky.</span></p><span data-dcnode-id="786" instrument_node="">
</span><h5 data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Day 7 - Tempt fate?</span></h5><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="780"><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qrp-labs.com/images/qcx/assembly_Rev_4.pdf" rel="noopener" target="_blank"><img alt="Graph of expected QCX transceiver power output versus power supply voltage" class="lozad" data-dcnode-id="782" data-src="/images/2019/QCX-power-in-vs-out.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">I am undecided on whether I should try and increase the radio's transmitter power. With the 12 volts I am supplying the transceiver, I should expect 3 watts.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">A simple </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//groups.io/g/QRPLabs/topic/low_power_output_s_n_2857/12379072%3Fp%3D%2C%2C%2C20%2C0%2C0%2C0%3A%3Arecentpostdate%252Fsticky%2C%2C%2C20%2C2%2C0%2C12379072" rel="noopener" target="_blank"><span data-dcnode-id="774" instrument_node="">solution</span></a><span data-dcnode-id="772" instrument_node=""> is to provide a higher power supply voltage. For context, the graph on the right shows the relationship between power supply voltage and transmitter power. The manual indicates that the transceiver can safely be driven with 15 to 16 volts. Any more voltage and I risk overheating the small BS170 MOSFET transistors. A related option is to short the reverse polarity protection diode (D3 1N5819), which would avoid lowering the supplied voltage by 0.3 to 0.4V.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Another solution is to remove 1 or 2 windings from the Low Pass Filter toroids — L1, L2, and L3. For context, the transceiver uses a class E amplifier. And like all amplifiers, it produces harmonics that must be suppressed to avoid harmful out of band transmissions. A Low Pass Filter is the last stage of the transmitter circuit. It attenuates frequencies greater than the target frequency. It might be the case that the inductors I wound by hand have too high of inductor values. Ideally, I would have measured the inductance values and made any fine adjustments before soldering them onto the PCB. This solution is not without its dangers. As I found out the hard way, removing any component might result in damaging a PCB pad and ruining the radio. The recommended procedure is to desolder the toroid, adjust the winding, and resolder it to the top side of the PCB.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="766" instrument_node="">For now, I am happy with the estimated 1 watt of output. Before making any adjustments, I will purchase an accurate QRP RF power meter. The </span><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ldgelectronics.com/index.php/products/desktop/at-600proii/" rel="noopener" target="_blank"><span data-dcnode-id="765" instrument_node="">LDG AT-600PROII</span></a><span data-dcnode-id="763" instrument_node=""> and its segmented display that I am using do not offer enough precision to evaluate changes made to the QCX.</span></p><span data-dcnode-id="761" instrument_node="">
</span><br data-dcnode-id="760"><span data-dcnode-id="759" instrument_node="">
</span><br data-dcnode-id="758"><span data-dcnode-id="757" instrument_node="">
</span><h2 data-dcnode-id="754"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">2018</span></strong></h2><span data-dcnode-id="753" instrument_node="">
</span><br data-dcnode-id="752"><span data-dcnode-id="751" instrument_node="">
</span><h4 data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">CW Academy:</span></h4><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="745"><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cwops.org/" rel="noopener" target="_blank"><img alt="CWops Logo" class="lozad" data-dcnode-id="747" data-src="/images/2018/CW-Academy-Logo.jpg" style="float:right; margin-left:10px; margin-right:10px; width:282px"></a></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="743" instrument_node="">I had a lot of fun, made new friends, and significantly improved my proficiency in sending and receiving Morse code. I highly recommend the CW Academy! Find out more and </span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cwops.org/cw-academy-2/cw-academy-student-sign-up/" rel="noopener" target="_blank"><span data-dcnode-id="742" instrument_node="">signup</span></a><span data-dcnode-id="740" instrument_node=""> for free.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">I completed Level 2 and 3 CW Academy classes. It was an awesome experience! Thank you, Joe (</span><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/KK5NA" rel="noopener" target="_blank"><span data-dcnode-id="736" instrument_node="">KK5NA</span></a><span data-dcnode-id="734" instrument_node="">) and all my classmates. I appreciated your advice and patience. And thanks to CW Ops for putting together the CW Academy program. Each year it continues to grow and get better!</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">After ten months of practice and two academy classes, I can reasonably keyboard-copy Morse code at 30wpm. I routinely practice copying up to 42wpm. I can head-copy common words at 25wpm with extra word spacing. And I can comfortably send pre-composed messages at 27wpm on iambic paddles. Despite that, I have not reached my proficiency goals. I am not as proficient in real-world conditions. I know with practice, I will get there. Morse code is not hard to learn, but it does require a lot of practice. It is like learning to play the piano. Practice. Practice. Practice. Thankfully it takes a lot less time!</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">A few weeks after my Level 3 Academy class, I was nominated for membership to CW Ops. It was my pleasure to support the organization with a lifetime membership. CW Ops is an international organization working hard to preserve and perpetuate the art of CW. For example, they teach Morse code for free to hundreds of other amateur radio operators through the CW Academy program.</span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">I am also looking forward to giving back and teaching a Level 1 CW Academy class, hopefully, I will find an opportunity to teach in 2019.</span></p><span data-dcnode-id="723" instrument_node="">
</span><br data-dcnode-id="722"><span data-dcnode-id="721" instrument_node="">
</span><h4 data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">The Thrill of QRP:</span></h4><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="717" instrument_node="">I am excited to have worked Gary (</span><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/W0ITT" rel="noopener" target="_blank"><span data-dcnode-id="716" instrument_node="">W0ITT</span></a><span data-dcnode-id="714" instrument_node="">) using CW. It was one of the most challenging QSO's I have had! He was right at the noise floor, and there was deep QSB. I have a high noise floor on 40-meters, and band conditions were not great that evening. After struggling for several minutes, I discovered that Gary was QRP (transmitting 5 watts or less). That made me smile. I was amazed and delighted. Imagine being able to see a nightlight flicker 100's of miles away. Crazy huh? That's why I am amazed!</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">I had a sneaking suspicion that I should slow down and call CQ at 17wpm instead of 25+ wpm. Initially, after calling CQ, I wasn't sure if I even heard someone there or not. I sent AGN AGN (again) and carefully listened. Sure enough, I heard just a small part of a call sign. And from there, the challenge was on. Part of my success was staying cool and not rushing to transmit. I did not know with certainty when it was my turn to transmit. That was unnerving.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Even though Gary was only 232 miles away from me, I will remember this QSO for a long time. It is a milestone in my Morse code journey. Without hesitation, I will send Gary a QSL card.</span></p><span data-dcnode-id="706" instrument_node="">
</span><br data-dcnode-id="705"><span data-dcnode-id="704" instrument_node="">
</span><h4 data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Randolph State Park:</span></h4><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="682"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2018/Randolph-Me.jpg" target="_blank"><img alt="Kurt Zoglmann (AD0WE) at Randolph State Park" class="lozad" data-dcnode-id="700" data-src="/images/2018/Randolph-Me-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:10px; width:400px"></a><span data-dcnode-id="698" instrument_node="">I had a wonderful time at </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/%4039.4272399%2C-96.7146802%2C522m/data%3D%213m1%211e3" rel="noopener" target="_blank"><span data-dcnode-id="697" instrument_node="">Randolph State Park</span></a><span data-dcnode-id="695" instrument_node=""> playing amateur radio this afternoon. Despite propagation not being all that great, I made two CW contacts after calling CQ many times. I talked to Jim (</span><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/W6LFB" rel="noopener" target="_blank"><span data-dcnode-id="694" instrument_node="">W6LFB</span></a><span data-dcnode-id="692" instrument_node="">) in </span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denton%2C_Texas" rel="noopener" target="_blank"><span data-dcnode-id="691" instrument_node="">Denton, Texas</span></a><span data-dcnode-id="689" instrument_node="">, and Keith (</span><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/KA4KPB" rel="noopener" target="_blank"><span data-dcnode-id="688" instrument_node="">KA4KPB</span></a><span data-dcnode-id="686" instrument_node="">) in </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walhalla%2C_South_Carolina" rel="noopener" target="_blank"><span data-dcnode-id="685" instrument_node="">Walhalla, South Carolina</span></a><span data-dcnode-id="683" instrument_node="">. Each conversation lasted about 10 minutes, and we conversed at 17wpm. Keith and Jim were using straight keys, and I managed to copy them! I still tend to struggle with slight variations in timing. These were my 6th and 7th Morse code contacts.</span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="680" instrument_node="">For this adventure, I focused on unaided Morse code copying with some assistance in sending. I used the </span><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.i2rtf.com/cw-machine.html" rel="noopener" target="_blank"><span data-dcnode-id="679" instrument_node="">Begali machine</span></a><span data-dcnode-id="677" instrument_node=""> to allow me to type and send perfect code. I am still working on becoming proficient with the </span><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vibroplex.com/contents/en-us/p200.html" rel="noopener" target="_blank"><span data-dcnode-id="676" instrument_node="">Bencher paddle</span></a><span data-dcnode-id="674" instrument_node="">. I didn't want to inflect my troubled fist on others, especially with poor conditions. hi hi.</span></p><span data-dcnode-id="672" instrument_node="">
