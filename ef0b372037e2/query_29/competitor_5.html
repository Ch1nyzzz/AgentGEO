</span><p data-dcnode-id="664"><span data-dcnode-id="671" instrument_node="">I also had an opportunity to work my uncle Greg (</span><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/N0ZHE" rel="noopener" target="_blank"><span data-dcnode-id="670" instrument_node="">N0ZHE</span></a><span data-dcnode-id="668" instrument_node="">). We made contact on 7.255Mhz using SSB. Despite band conditions, we were able to talk briefly. I was excited because ever since I first went to college 22 years ago, I had always dreamed of using amateur radio to make contact back home to </span><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conway_Springs%2C_Kansas" rel="noopener" target="_blank"><span data-dcnode-id="667" instrument_node="">Conway Springs, KS</span></a><span data-dcnode-id="665" instrument_node="">!</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="650"><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2018/Randolph-Setup.jpg" target="_blank"><img alt="Kurt Zoglmann (AD0WE) at Randolph State Park making a POTA (Parks on the air) activation" class="lozad" data-dcnode-id="662" data-src="/images/2018/Randolph-Setup-smaller.jpg" style="float:right;margin-left:10px; margin-right:10px; margin-bottom:10px; width:400px"></a><span data-dcnode-id="660" instrument_node="">My </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioennopower.com/collections/12v-series-lifepo4-batteries/products/12v-60ah-lfp-battery-al-case-blf-1260l" rel="noopener" target="_blank"><span data-dcnode-id="659" instrument_node="">Bionenno 60Ah battery</span></a><span data-dcnode-id="657" instrument_node=""> worked flawlessly! Today was the first time that I tested the </span><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithium_iron_phosphate_battery" rel="noopener" target="_blank"><span data-dcnode-id="656" instrument_node="">LiFePO4</span></a><span data-dcnode-id="654" instrument_node=""> battery in the field. It weighs a LOT less than the deep-cycle lead-acid battery that I was previously using, and I don't have to worry about it spilling in my car! It can handle up to a 60-amp continuous load without sagging, which allows me to operate at full power (100 Watts) on my </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icomamerica.com/en/products/amateur/hf/7300/default.aspx" rel="noopener" target="_blank"><span data-dcnode-id="653" instrument_node="">IC-7300</span></a><span data-dcnode-id="651" instrument_node="">. And running the radio for hours this afternoon barely discharged the battery.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Randolph State Park is becoming my favorite location to play radio and test my Morse code skills. I love how the park overlooks the surrounding area. It was a little warm, but not too hot — It was close to 90F. I was darn sure to put on sunscreen. Getting sunburnt is one of my least favorite things in life, and it tends to happen at least once in the springtime.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">I packed up just as a small storm system moved through the area. It very lightly sprinkled as I packed everything away. It was neat seeing heavy rain about a mile away across the valley. It was raining hard enough that I could hear the rain pounding the lake. Luckily I was prepared for the rain. Nothing got wet except the antenna.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="640"><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2018/Randolph-Scenery.jpg" target="_blank"><img alt="Incoming thunderstorm at Randolph State Park during early spring" class="lozad" data-dcnode-id="642" data-src="/images/2018/Randolph-Scenery-smaller.jpg" style="margin-right:10px; width:900px"></a></p><span data-dcnode-id="639" instrument_node="">
</span><br data-dcnode-id="638"><span data-dcnode-id="637" instrument_node="">
</span><h4 data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">First mini-contest (CWT):</span></h4><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">I was exhausted after participating in my first Morse code contest. </span><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cwops.org/cwops-tests/" rel="noopener" target="_blank"><span data-dcnode-id="632" instrument_node="">CWT</span></a><span data-dcnode-id="630" instrument_node=""> is a mini one hour contest that is held every week. Three times a year at the end of each CW Acadamy session, a special event is held in honor of recent graduates. The speed is kept to a maximum of 20wpm, and the exchange is simplified. These limits help newcomers adjust to the challenge and pace of radio-sport. I took up this opportunity to give it a try!</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">I made six contacts in that one hour! I had a lot of fun, I struggled, and I learned a lot! I was not prepared for so many people to be transmitting nearly on top of each other. Even on the narrowest filter on my radio, I could frequently hear other people that I wasn't trying to contact. This made it difficult. It was like listening to a single voice in a crowded room. The extra challenge was the hurried nature of the contacts. I had not experienced that frenzied rush before. Lastly, I stayed a little too long on 40 meters when 80 meters appears to have been a better choice — band conditions were better, and there were more people to work. I did not check the other bands until the last 10 minutes of the hour. I will try again soon!</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">I had to laugh a little at the end of the contest. Literally, dozens of people stopped transmitting within seconds of each other. And I noticed that there was one person still transmitting. So I spun the dial to listen in. I caught him sending AGN AGN…(long pause)... WHOEVER YOU ARE 73 UNTIL NEXT TIME. He was left hanging. Aww.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">After that, I heard another station up about 15kHz. He was calling CQ, so I answered back. I chatted with Larry (N5MEP) in Arkansas for a little over 15 minutes! I was challenged to copy him for such an extended period. He was just above my noise floor, and there was significant QSB. His speed was a little under 25wpm.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">I’m not sure if it was a more significant achievement participating in my first contest exchange or holding an extended QSO with someone just above my noise floor! I was exhausted at the end of the night!</span></p><span data-dcnode-id="616" instrument_node="">
</span><br data-dcnode-id="615"><span data-dcnode-id="614" instrument_node="">
</span><h4 data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Visualizing my progress:</span></h4><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="610"></p><div class="video-limit-size" data-dcnode-id="603"><span data-dcnode-id="609" instrument_node="">
</span><div class="video-container" data-dcnode-id="605"><span data-dcnode-id="608" instrument_node="">
</span><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lozad" data-dcnode-id="607" data-src="https://www.youtube.com/embed/f7dsFICnqHM" frameborder="0" height="315" width="560"></iframe><span data-dcnode-id="606" instrument_node="">
</span></div><span data-dcnode-id="604" instrument_node="">
</span></div><span data-dcnode-id="602" instrument_node="">
After 10 months of diligent practice, I had a blast visualizing my progress using </span><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justlearnmorsecode.com/" rel="noopener" target="_blank"><span data-dcnode-id="601" instrument_node="">Just Learn Morse Code</span></a><span data-dcnode-id="599" instrument_node="">. Even if you don't plan to analyze your practice in this way, it is helpful to keep a log. At some point in the learning process, everyone gets discouraged with how fast they are learning. Diligent practice and keeping a log will allow you to see consistent gains over time, even when they aren't apparent.</span><p data-dcnode-id="598"></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="596" instrument_node="">In this video, I use </span><a data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.python.org/" rel="noopener" target="_blank"><span data-dcnode-id="595" instrument_node="">Python</span></a><span data-dcnode-id="593" instrument_node=""> and </span><a data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.r-project.org/" rel="noopener" target="_blank"><span data-dcnode-id="592" instrument_node="">R</span></a><span data-dcnode-id="590" instrument_node=""> to create a three-dimensional graph of my progress using </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justlearnmorsecode.com/" rel="noopener" target="_blank"><span data-dcnode-id="589" instrument_node="">Just Learn Morse Code</span></a><span data-dcnode-id="587" instrument_node="">. Specifically, I used Python to parse my log file into </span><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comma-separated_values" rel="noopener" target="_blank"><span data-dcnode-id="586" instrument_node="">CSV</span></a><span data-dcnode-id="584" instrument_node="">. Then I used R and the </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plotly.com/r/" rel="noopener" target="_blank"><span data-dcnode-id="583" instrument_node="">Plotly</span></a><span data-dcnode-id="581" instrument_node=""> package to create a 3D representation. If you would like to visualize your progress, you may download my </span><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/files/analysis/process-practice-log-into-csv.py" target="_blank"><span data-dcnode-id="580" instrument_node="">Python script</span></a><span data-dcnode-id="578" instrument_node=""> and </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/files/analysis/progress.R" target="_blank"><span data-dcnode-id="577" instrument_node="">R script</span></a><span data-dcnode-id="575" instrument_node="">. Unless you happen to use the same format for tracking your progress, you will need to modify these scripts to suit your needs. (If you are going to modify them, take a look at the </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/files/analysis/word_trials.csv" target="_blank"><span data-dcnode-id="574" instrument_node="">CSV file</span></a><span data-dcnode-id="572" instrument_node=""> generated by my Python script. Also, note that the input file names in both scripts are hardcoded and need to be changed.)</span></p><span data-dcnode-id="570" instrument_node="">
</span><br data-dcnode-id="569"><span data-dcnode-id="568" instrument_node="">
</span><h4 data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Morse Camp:</span></h4><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="562"><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morse.camp/" target="_blank"><img alt="Screenshot of Morse Camp software" class="lozad" data-dcnode-id="564" data-src="/images/2018/Morse-Camp.jpg" style="float:right; margin-left:10px; margin-right:10px; width:282px"></a></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="560" instrument_node="">If you are interested in learning to practice copying Morse code in your head, take a look at </span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//morse.camp/" rel="noopener" target="_blank"><span data-dcnode-id="559" instrument_node="">Morse Camp</span></a><span data-dcnode-id="557" instrument_node="">. It is a free standalone web application. It runs well on handheld devices and on desktop computers. It should work in any modern browser. Morse Camp initially challenges you with short, common, and easy words. As you become more proficient, it automatically increases the difficulty to include longer, less common, and multiple words.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="554" instrument_node="">I am continuing to work with Petru Paler (</span><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/HB9GKP" rel="noopener" target="_blank"><span data-dcnode-id="553" instrument_node="">HB9GKP</span></a><span data-dcnode-id="551" instrument_node="">) to develop and enhance the web application. Petru graciously open sourced the application. If there are features you would like to see implemented, feel free to send me an email. The list of open requests can be found on </span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/ppetru/morse-camp/issues" rel="noopener" target="_blank"><span data-dcnode-id="550" instrument_node="">GitHub</span></a><span data-dcnode-id="548" instrument_node="">.</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">I have extended the application to be more configurable. Users can customize which parts of the dictionary are active. In the future, I plan to enable users to define a custom dictionary. Users will be able to create a custom dictionary by cut-and-pasting an article or short book into a window that will then analyze the text for unique words. The motivation is to help users learn the sound pattern of words in an article or book so they can later practice head-copying it. There are a number of other features that I plan on implementing too.</span></p><span data-dcnode-id="543" instrument_node="">
</span><br data-dcnode-id="542"><span data-dcnode-id="541" instrument_node="">
</span><h4 data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">First CW QSO:</span></h4><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="535"><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2018/First-CW-QSO-me-operating.jpg" target="_blank"><img alt="Kurt Zoglmann (AD0WE) at Randolph State Park making first CW contact" class="lozad" data-dcnode-id="537" data-src="/images/2018/First-CW-QSO-me-operating-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:300px"></a></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">I am excited to have made my very first Morse code contact April 22, 2018! And portable at that! I forgot the microphone at home. I kid you not! It helped me overcome my hesitation to get on the air after months of practice.</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="530" instrument_node="">We went out to </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/%4039.4272399%2C-96.7146802%2C522m/data%3D%213m1%211e3" rel="noopener" target="_blank"><span data-dcnode-id="529" instrument_node="">Randolph State Park</span></a><span data-dcnode-id="527" instrument_node="">, which is at the North end of </span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nwk.usace.army.mil/Locations/District-Lakes/Tuttle-Creek-Lake/" rel="noopener" target="_blank"><span data-dcnode-id="526" instrument_node="">Tuttle Creek Lake</span></a><span data-dcnode-id="524" instrument_node=""> near Manhattan, Kansas (Grid square EM19PK). I appreciated that my XYL came with me. He had fun painting with watercolors and listening to podcasts while I played amateur radio. My uncle Greg, </span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/N0ZHE" rel="noopener" target="_blank"><span data-dcnode-id="523" instrument_node="">N0ZHE</span></a><span data-dcnode-id="521" instrument_node="">, listened intently 300 miles away to the South and encouraged me via text message to keep trying after an initial failed attempt. I welcomed the moral support!</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="518" instrument_node="">Unfavorable band conditions did not deter me. I called CQ for about 5 to 10 minutes on 14.035 Mhz using 75watts. Then </span><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/VE7UBC" rel="noopener" target="_blank"><span data-dcnode-id="517" instrument_node="">VE7UBC</span></a><span data-dcnode-id="515" instrument_node="">, the </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ars.ams.ubc.ca/" rel="noopener" target="_blank"><span data-dcnode-id="514" instrument_node="">University of British Columbia Amateur Radio Society</span></a><span data-dcnode-id="512" instrument_node="">, came back to me. They were in Vancouver Canada! We had a short QSO. I gave my name, mentioned that this was my first CW contact, and provided the weather conditions at my location. Dan gave his location, radio, antenna, and indicated that my first QSO was going much better than his first one from years ago. That made me feel better.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">What I wasn't anticipating was how nervous I became when someone back to me. I was able to copy just fine, but my nervousness caused me to make a lot of mistakes in sending. I especially valued Dan's patience! He mentioned that QSB was making it extra hard for him to copy me. His signal was 559 with little to no QSB. I would have loved to rag chew, but I did not want to test his endurance. hi hi. I thanked him and was left smiling ear-to-ear.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="506" instrument_node="">As pictured, you can see that I am transmitting with my ICOM7300 radio into an </span><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mfjenterprises.com/products/mfj-1788" rel="noopener" target="_blank"><span data-dcnode-id="505" instrument_node="">MFJ magnetic loop antenna</span></a><span data-dcnode-id="503" instrument_node="">. To the left of me, I am sending code with the </span><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vibroplex.com/contents/en-us/p200.html" rel="noopener" target="_blank"><span data-dcnode-id="502" instrument_node="">Bencher BY-2 paddle</span></a><span data-dcnode-id="500" instrument_node=""> and using the </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.i2rtf.com/cw-machine.html" rel="noopener" target="_blank"><span data-dcnode-id="499" instrument_node="">Begli CW Machine</span></a><span data-dcnode-id="497" instrument_node=""> as a keyer. The Bencher paddle isn't the most portable paddle, but it worked splendidly. I was happy to have brought the battery boost. It enabled me to send more than 20 watts using the deep cycle lead-acid battery.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="494" instrument_node="">I am hoping to participate in </span><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parksontheair.com/" rel="noopener" target="_blank"><span data-dcnode-id="493" instrument_node="">POTA</span></a><span data-dcnode-id="491" instrument_node=""> (Parks On The Air) spring and summer 2019. I am looking forward to many more Morse code contacts! I am also forward to using my Lithium-Iron-Phosphate battery. It will be lighter and won't sag under high amperage draws.</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="483"><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2018/First-CW-QSO-scenery.jpg" target="_blank"><img alt="Watercolor painting at Randolph State Park overlooking the lake in the distance" class="lozad" data-dcnode-id="488" data-src="/images/2018/First-CW-QSO-scenery-smaller.jpg" style="margin-left:10px; margin-right:10px; width:300px"></a><span data-dcnode-id="486" instrument_node="">&nbsp;&nbsp;</span><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2018/First-CW-QSO-VE7UBC-Confirmed.jpg" target="_blank"><img alt="The University of British Columbia (VE7UBC) QSL card confirming first CW QSO with AD0WE" class="lozad" data-dcnode-id="485" data-src="/images/2018/First-CW-QSO-VE7UBC-Confirmed-smaller.jpg" style="width:474px"></a></p><span data-dcnode-id="482" instrument_node="">
</span><br data-dcnode-id="481"><span data-dcnode-id="480" instrument_node="">
</span><h4 data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Morse Code and the Call of the Hambone:</span></h4><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="474"><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2018/Hambone-QSL-Card-Front.jpg" target="_blank"><img alt="AD0WE QSL card titled The Call of the Hambone, which depicts a hamster sending cheese in Morse code" class="lozad" data-dcnode-id="476" data-src="/images/2018/Hambone-QSL-Card-Front-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:10px; width:400px"></a></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">On my journey to learn Morse Code I have practiced every night. On most nights the rhythmic code has been heard in our living room. I practiced sending code with a paddle and often practiced copying without headphones.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Hamsters are nocturnal. But whenever I practiced in the evening, our hambone, Waffles, would rise several hours before she would normally wake up. She would then proceed to look around with great curiosity and playful vigor.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">At first, I thought it was a coincidence, but then after a while, I realized that little Waffles was likely mistaking the stream of swift dits and dahs for a nearby hamster that was extraordinarily happy. If you don't know, hamsters make the cutest little-chirping noises when they are happy and content. Waffles must have been surprised because this neighboring hambone would continue on for more than an hour every night!</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Perhaps the frequency I used was close enough to be mistaken for hamster talk, especially when practicing at higher speeds. I am most comfortable practicing Morse code using a tone of 700Hz, and at the time I was practicing at a character speed of 30wpm.
About a month ago, Waffles passed away. We miss her dearly! She loved to play on the couch with me and beg for cheese. She even grew to tolerate if not enjoy our affection to hold and pet her.</span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="458"><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2018/Hambone-Waffles-Curled-Up.jpg" target="_blank"><img alt="A cute sleeping hamster named Waffles nestled in shavings" class="lozad" data-dcnode-id="460" data-src="/images/2018/Hambone-Waffles-Curled-Up-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom: 10px; width:272px; border: 1px solid #ddd; border-radius: 4px;"></a></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Her memory lives on. A couple of weeks after her passing, we filled the void in our heart with another little hambone, Gus. He is a Roborovski hamster and is the cutest little bean. Gus is exceptionally afraid and likes to hide when the lights are on. But you know what? He also begins to stir every evening as soon as the music of Morse code fills his little ears.</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">I asked Jason to illustrate this story. As you can see, he exceeded my expectations by delivering a 5"x5" painting! It will become a part of my amateur radio work-space, and I will smile every time I see it. And as pictured above, I created a QSL card to commemorate our hambone and will send them when out I make contacts with others using Morse code. 73's to all the little hambones out there!</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="450" instrument_node="">(This Hambone article garnered national attention after I posted it to the </span><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/groups/100wattsandawire/" rel="noopener" target="_blank"><span data-dcnode-id="449" instrument_node="">100 Watts and a Wire</span></a><span data-dcnode-id="447" instrument_node=""> Facebook group. It was picked by Amateur Radio Newsline on March 23, 2018. Feel free to </span><a data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arnewsline.org/news/2018/3/22/amateur-radio-newsline-report-2108-for-friday-march-23-2018" rel="noopener" target="_blank"><span data-dcnode-id="446" instrument_node="">listen</span></a><span data-dcnode-id="444" instrument_node=""> to the broadcast.)</span></p><span data-dcnode-id="442" instrument_node="">
</span><br data-dcnode-id="441"><span data-dcnode-id="440" instrument_node="">
</span><h4 data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Initially Learning Morse Code:</span></h4><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="434"><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justlearnmorsecode.com/" rel="noopener" target="_blank"><img alt="A screenshot of Just Learn Morse Code" class="lozad" data-dcnode-id="436" data-src="/images/2018/Just-Learn-Morse-Code-smaller.png" style="float:right; margin-left:10px; margin-right:10px; width:497px"></a></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="432" instrument_node="">I did not have anyone to mentor me initially. But through a bit of research, I discovered an excellent book — </span><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//morse-rss-news.sourceforge.net/artskill.pdf" rel="noopener" target="_blank"><span data-dcnode-id="431" instrument_node="">The Art and Skill of Radio-Telegraphy</span></a><span data-dcnode-id="429" instrument_node=""> by William Pierpont (N0HFF). It is a free book available for download as a PDF. I highly recommend it. It is filled with history and practical advice. And it is a fun read!</span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">In his book, I discovered the importance of leveraging the unconscious mind to do the heavy lifting of copying Morse code. And I learned it takes significantly more time to learn to copy than to send Morse code.</span></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Many people start by learning the letters as a sequence of dits and dahs. As they copy Morse code, they count the dits and dahs that make up each letter. With this approach, people will start at 5wpm and slowly increase their speed until they reach 10 to 13wpm. The problem is that they are unable to go any faster despite ample practice or even with heroic effort. Sometimes this ceiling can persist for years! The problem with this approach is that counting relies on the conscious mind. And the conscious mind is much slower than the unconscious mind. The unconscious mind can easily handle 60+ wpm with sufficient practice!</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="418" style="font-size:16px"><a data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rufzxp.net/" rel="noopener" target="_blank"><img alt="A screenshot of RufzXP" class="lozad" data-dcnode-id="420" data-src="/images/2018/RufzXP-smaller.png" style="float:right; margin-left:10px; margin-right:10px; width:497px"></a></span></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="415" instrument_node="">With that in mind, I took the book's advice and focused on acquiring instant character recognition. This means that when I heard a particular sound pattern, I instantly recognized it as a specific letter associated with that sound pattern. To avoid counting while copying, it is recommended to begin learning at a character speed of 20 to 25wpm. If you are </span><i data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">still</span></i><span data-dcnode-id="412" instrument_node=""> able to count while copying, go faster. For me, this meant starting the learning process at a character speed of 30wpm! It seemed crazy fast!</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">The next step was to figure out whether the Farnsworth or Koch method was better suited for me. With the Farnsworth method, the character speed is kept above 20wpm, but extra spacing is introduced between the letters and words. The alternative is the Koch method, which starts the learning process with two characters at a standard 20wpm. Once two letters can be copied randomly with 90% proficiency, another letter is added. The process repeats until all the letters, numbers, and prosigns have been learned.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">After trying both methods for a couple of days, I settled on the Farnsworth method. I felt too overwhelmed with the Koch method. So I started out at a speed of 30/10wpm — a 30wpm character speed with an overall speed of 10wpm. Like the Koch method, I started out copying two letters send randomly. Once I scored 90%, I added another letter. It took several weeks before I was able to copy all 40 characters. The tricky part was switching to standard timing. I started at 15wpm and then worked on learning to copy faster.</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Once I felt that I had some level of proficiency in copying Morse code, I started working on sending. What I learned in the book is that no matter if you learn to send with a straight key, bug, or a paddle, you need to focus on learning proper timing. Without proper timing, you will make it that much more difficult if not impossible for someone else to correctly copy your code even in the most ideal of band conditions. If you don't have someone to help you, use software to check your sending. I was spoiled and used the Begali CW Machine to check my timing.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="400" instrument_node="">To sum up, I dipped my toes into learning Morse code using </span><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itunes.apple.com/us/app/morse-toad/id906586079%3Fmt%3D8" rel="noopener" target="_blank"><span data-dcnode-id="399" instrument_node="">Morse Toad</span></a><span data-dcnode-id="397" instrument_node=""> (available for iOS). I did all of my initial learning using </span><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justlearnmorsecode.com/" rel="noopener" target="_blank"><span data-dcnode-id="396" instrument_node="">Just Learn Morse Code</span></a><span data-dcnode-id="394" instrument_node="">. It a Windows program, but it also works well on a Mac using </span><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.codeweavers.com/products/crossover-mac" rel="noopener" target="_blank"><span data-dcnode-id="393" instrument_node="">CrossOver</span></a><span data-dcnode-id="391" instrument_node="">. Then I used a variety of programs to assist in my practice. I used </span><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dxatlas.com/morserunner/" rel="noopener" target="_blank"><span data-dcnode-id="390" instrument_node="">Morse Runner</span></a><span data-dcnode-id="388" instrument_node=""> to practice participating in contest-like conditions. I used </span><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rufzxp.net/" rel="noopener" target="_blank"><span data-dcnode-id="387" instrument_node="">RufzXP</span></a><span data-dcnode-id="385" instrument_node=""> to practice copying call signs. I used </span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fkurz.net/ham/ebook2cw.html" rel="noopener" target="_blank"><span data-dcnode-id="384" instrument_node="">ebook2cw</span></a><span data-dcnode-id="382" instrument_node=""> to convert short articles and paragraphs into Morse code. And I used </span><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morse.camp/" rel="noopener" target="_blank"><span data-dcnode-id="381" instrument_node="">Morse Camp</span></a><span data-dcnode-id="379" instrument_node=""> to practice learning the sound pattern of entire words.</span></p><span data-dcnode-id="377" instrument_node="">
</span><br data-dcnode-id="376"><span data-dcnode-id="375" instrument_node="">
</span><h4 data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Practice Log (From 0 to 50+ wpm):</span></h4><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="369"><a data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/Morse-code-progress.rtf"><img alt="A screenshot of AD0WE's Morse code practice log" class="lozad" data-dcnode-id="371" data-src="/images/2018/Practice-Log.png" style="float:right; margin-left:10px; margin-right:10px; width:303px"></a></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="367" instrument_node="">&lt;</span><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/Morse-code-progress.rtf" target="_blank"><span data-dcnode-id="366" instrument_node="">Download</span></a><span data-dcnode-id="364" instrument_node="">&gt; —  Last uploaded November 21, 2021</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="361" instrument_node="">I have kept a detailed journal of my Morse code practice. It starts three weeks after the start of my Morse code journey. At a high-level, I have strived to practice every day for at least an hour. I try to train at uncomfortable levels at some point in my daily practice sessions. In the log, unless otherwise specified, I am using </span><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justlearnmorsecode.com/" rel="noopener" target="_blank"><span data-dcnode-id="360" instrument_node="">Just Learn Morse Code</span></a><span data-dcnode-id="358" instrument_node=""> and keyboard-copying (meaning I am typing what I hear as I hear it). Things that are bolded are new personal bests as of that date.</span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">If you have an interest in looking at it, there are two take ways that I would like you to have. 1) If you practice every day, it will lead to consistent improvement over time. 2) Consider keeping a log of your practice. When it felt that I was not making progress, it was helpful to look back through my log. At times it did not seem like I was making progress. At others times, it was not happening as quickly as I wanted. In each case, it was helpful to see improvement over time. It was motivation to keep with it and remain persistent.</span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">It is not necessarily a good idea to try to follow my exact path in learning Morse code. You may have different goals than mine. And there are differences in learning preferences. For example, I initially learned using the Farnsworth method, and yet other people will learn better using the Koch method.</span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">I have had many people interested in looking through my log, so I am making it more widely available. If you have any questions about it or find it helpful, feel free to email me. I will try to remember to upload an updated file periodically.</span></p><span data-dcnode-id="347" instrument_node="">
</span><br data-dcnode-id="346"><span data-dcnode-id="345" instrument_node="">
</span><h4 data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Sharing the joy of ham radio:</span></h4><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="340"><img alt="Kurt Zoglmann (AD0WE) and Greg Wycoff (N0ZHE) at 2018 Dayton Hamvention" class="lozad" data-dcnode-id="341" data-src="/images/2018/Hamvention-Greg-and-Kurt-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:300px"></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="334"><span data-dcnode-id="338" instrument_node="">My uncle Greg (</span><a data-dcnode-id="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/N0ZHE" rel="noopener" target="_blank"><span data-dcnode-id="337" instrument_node="">N0ZHE</span></a><span data-dcnode-id="335" instrument_node="">) got me interested in Amateur radio as a teenager. His passion for working amateur radio satellites was infectious. In 1995, it was the driving force for me to get my no-code Technician class license as KB0TMQ. Greg has positively shaped my life and helped me become interested in computers, software development, photography, electronics, and astronomy.</span></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="332" instrument_node="">After my grandfather (</span><a data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/KA0OXY" rel="noopener" target="_blank"><span data-dcnode-id="331" instrument_node="">KA0OXY</span></a><span data-dcnode-id="329" instrument_node="">) passed away in 2012, my uncle's interested waned, and he sold all of his amateur radio equipment. They had enjoyed amateur radio together since the early 1990's.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="326" instrument_node="">After I got relicensed in 2016, I increasing enjoyed the hobby and wished to share my enthusiasm for amateur radio. Perhaps it was destiny to come full circle and rekindle my uncle's passion for amateur radio. In 2017, for Christmas, I gave Greg a special gift. I wrapped up an </span><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/General-Class-License-Manual-Spiral-dp-1625950314/dp/1625950314/ref%3Dmt_spiral_bound%3F_encoding%3DUTF8%26me%3D%26qid%3D" rel="noopener" target="_blank"><span data-dcnode-id="325" instrument_node="">ARRL General Class License Manual</span></a><span data-dcnode-id="323" instrument_node=""> with a small note attached. At first, Greg did not say anything. And that was okay. But it turned out to be a seed.</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="320" instrument_node="">Greg began to study in 2018. And a couple of months later, he passed the exam and upgraded to a General class license. In May we traveled hundreds of miles together to attend our first </span><a data-dcnode-id="318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hamvention.org/" rel="noopener"><span data-dcnode-id="319" instrument_node="">Dayton Hamvention</span></a><span data-dcnode-id="317" instrument_node="">. Greg then took up an interest in </span><a data-dcnode-id="315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parksontheair.com/" rel="noopener" target="_blank"><span data-dcnode-id="316" instrument_node="">POTA</span></a><span data-dcnode-id="314" instrument_node="">, started studying for his Extra class license, and has even begun to practice learning Morse code!</span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">I suspect many amateur radio operators share the hobby with at least one family member. It makes amateur radio that much more fun and enjoyable when shared with those we care about the most.</span></p><span data-dcnode-id="309" instrument_node="">
</span><br data-dcnode-id="308"><span data-dcnode-id="307" instrument_node="">
</span><h2 data-dcnode-id="304"><strong data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">2017</span></strong></h2><span data-dcnode-id="303" instrument_node="">
</span><br data-dcnode-id="302"><span data-dcnode-id="301" instrument_node="">
</span><h4 data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">First portable operations:</span></h4><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="285"><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2017/Stockdale-Portable-Operations.jpg" rel="noopener" target="_blank"><img alt="AD0WE portable HF radio setup at Stockdale campsite overlooking Tuttle Creek Lake" class="lozad" data-dcnode-id="297" data-src="/images/2017/Stockdale-Portable-Operations-smaller.jpg" style="float:right; clear: both; margin-top:10px; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="295" instrument_node="">I had an epic weekend playing Amateur Radio! For the first time, I went portable with my HF gear at </span><a data-dcnode-id="293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/place/Stockdale%2BRecreation%2BArea%2C%2BManhattan%2C%2BKS%2B66503/%4039.307755%2C-96.6604116%2C2005m/data%3D%213m1%211e3%214m5%213m4%211s0x87bdc5e553e66e0d%3A0xd25fcd150f6d1c85%218m2%213d39.3071663%214d-96.6541237" rel="noopener" target="_blank"><span data-dcnode-id="294" instrument_node="">Stockdale</span></a><span data-dcnode-id="292" instrument_node="">, a campsite at </span><a data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nwk.usace.army.mil/Locations/District-Lakes/Tuttle-Creek-Lake/" rel="noopener" target="_blank"><span data-dcnode-id="291" instrument_node="">Tuttle Creek Lake</span></a><span data-dcnode-id="289" instrument_node="">. I was astonished at what I could hear in the absence of electrical noise. At my apartment, I typically hear S9 white noise caused by all sorts of RFI. At this campground, it was S1! I heard signals from Japan, Europe, South America, and the US. However, I could not transmit as well as I could hear others. The deep-cycle lead-acid battery could only sustain 35 watts. But while I was out there, I made two contacts using </span><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sigidwiki.com/wiki/JT9" rel="noopener" target="_blank"><span data-dcnode-id="288" instrument_node="">JT9</span></a><span data-dcnode-id="286" instrument_node=""> to Massachusetts and Texas. And I had a lot of fun. I can't wait to do it again!</span></p><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="283" instrument_node="">Second, I made my 1,000th QSO since getting relicensed! It took me one year and two weeks to reach it. I have worked 15 countries, with Japan and Spain being my most distant contacts. Most of them were made using </span><a data-dcnode-id="281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sigidwiki.com/wiki/JT65" rel="noopener" target="_blank"><span data-dcnode-id="282" instrument_node="">JT65</span></a><span data-dcnode-id="280" instrument_node="">. I have worked every state in the United States, and most of my contacts have been on 80, 40, and 20 meters.</span></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="277" instrument_node="">And finally, I started to learn Morse Code. I am learning at a character speed of 30 wpm and an overall speed of 10 wpm using the </span><a data-dcnode-id="275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/reference/index.html%23farnsworthMethod" rel="noopener" target="_blank"><span data-dcnode-id="276" instrument_node="">Farnsworth method</span></a><span data-dcnode-id="274" instrument_node="">. So far, I am making good progress. I look forward to my first CW QSO!</span></p><span data-dcnode-id="272" instrument_node="">
</span><h4 data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">On a personal note:</span></h4><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267"><img alt="Outdoor portrait at sunset of Kurt Zoglmann (AD0WE)" class="lozad" data-dcnode-id="268" data-src="/images/2017/Life-is-good-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Some of us work very long hours, but we continue to do it even if we realize how stressful it is. Why, because in a sense we are weak and we seem not to care at times. But then all of a sudden when a 'life event' occurs, say for example, having a heart attack, then you realize just how wrong you were to continue to do things that work against your health. In some cases, you may be too late to admit to being wrong.</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">On November 27th, 2017 I had a heart attack. I am thankful for so many people and things that happened on the day of and the after my health concern.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">I have kept a gratitude journal since March of this year. I do it to reflect on all the good that happens throughout the day. It is a personal moment and not something that I typically share with others. However, I want to share with you my entries for Monday and Tuesday. I hope that it will encourage you to take a moment and reflect on the positive and good things in your life. If you are open to sharing, I would love to see a comment on something that you are grateful for.</span></p><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">November 27, 2017 (Monday)</span></p><span data-dcnode-id="254" instrument_node="">
</span><ol data-dcnode-id="243"><span data-dcnode-id="253" instrument_node="">
</span><li data-dcnode-id="251" style="margin: 0px 0px 20px;"><span data-dcnode-id="252" instrument_node="">I am very very thankful to be alive after my heart attack. Things could have gone so much worse.</span></li><span data-dcnode-id="250" instrument_node="">
</span><li data-dcnode-id="248" style="margin: 0px 0px 20px;"><span data-dcnode-id="249" instrument_node="">I am thankful that Jason took me to the emergency room with haste and care. I love Jason with all my heart. If I had to leave this world, there is no other person whom I would want more to be at my side when I took my last breath.</span></li><span data-dcnode-id="247" instrument_node="">
</span><li data-dcnode-id="245" style="margin: 0px 0px 20px;"><span data-dcnode-id="246" instrument_node="">I am grateful to the emergency room staff for their professional and empathic care. Despite other difficult concerns in the ER, their performance was exemplary.</span></li><span data-dcnode-id="244" instrument_node="">
</span></ol><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">November 28, 2017 (Tuesday)</span></p><span data-dcnode-id="239" instrument_node="">
</span><ol data-dcnode-id="219"><span data-dcnode-id="238" instrument_node="">
</span><li data-dcnode-id="236" style="margin: 0px 0px 20px;"><span data-dcnode-id="237" instrument_node="">I appreciate the head nurse that stopped by and visited me at 2 am. She kept me company for half an hour, answered every question, shared a little of her own life, and expressed such deep empathy and compassion. Words cannot adequately describe how much it meant to me when Jason had to leave for a while.</span></li><span data-dcnode-id="235" instrument_node="">
</span><li data-dcnode-id="233" style="margin: 0px 0px 20px;"><span data-dcnode-id="234" instrument_node="">I am very appreciative of the head of the Cath lab team. As I cried before going into surgery, she gave me the biggest hug and comforted me. In that moment, I saw the best in humanity. We make the world a better place when we care for each other.</span></li><span data-dcnode-id="232" instrument_node="">
</span><li data-dcnode-id="230" style="margin: 0px 0px 20px;"><span data-dcnode-id="231" instrument_node="">I felt so much love, compassion, and care from others that I am indebted to everyone. I appreciated everyone's concern and keeping me in their thoughts.</span></li><span data-dcnode-id="229" instrument_node="">
</span><li data-dcnode-id="227" style="margin: 0px 0px 20px;"><span data-dcnode-id="228" instrument_node="">I am very thankful to learn that there is no evidence that I have any permanent damage to my heart and that I should make a full recovery.</span></li><span data-dcnode-id="226" instrument_node="">
</span><li data-dcnode-id="224" style="margin: 0px 0px 20px;"><span data-dcnode-id="225" instrument_node="">I am thankful to my mom who took time off of work to be with me. I share a deep bond with my mom. And I love her so much.</span></li><span data-dcnode-id="223" instrument_node="">
</span><li data-dcnode-id="221" style="margin: 0px 0px 20px;"><span data-dcnode-id="222" instrument_node="">I am thankful that I was able to come home and slowly walk on my own last night.</span></li><span data-dcnode-id="220" instrument_node="">
</span></ol><span data-dcnode-id="218" instrument_node="">
</span><p data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">This incident gave me great pause. It helped me realize the need to spend time away from work and to make time for family, friends, and to enjoy hobbies. And it triggered a renewed desire to achieve a dream as a teenager of making contact with another amateur radio operator using Morse Code. I had tried once before right after college to learn the code, but I gave up too quickly and did not put the time into it.</span></p><span data-dcnode-id="215" instrument_node="">
</span><br data-dcnode-id="214"><span data-dcnode-id="213" instrument_node="">
</span><h2 data-dcnode-id="210"><strong data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">2016</span></strong></h2><span data-dcnode-id="209" instrument_node="">
</span><h4 data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">Getting Started Again:</span></h4><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="201"><a data-dcnode-id="204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2016/QSL-Card-Front.jpg" target="_blank"><img alt="AD0WE QSL Card showing beautiful winter sunrise at Tutte Creek Lake" class="lozad" data-dcnode-id="205" data-src="/images/2016/QSL-Card-Front-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:10px; width:250px"></a><a data-dcnode-id="202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2016/AD0WE-station.jpg" target="_blank"><img alt="AD0WE amateur radio HF station in an apartment" class="lozad" data-dcnode-id="203" data-src="/images/2016/AD0WE-station.jpg" style="float:right; margin-left:10px; margin-right:10px; width:250px"></a></p><span data-dcnode-id="200" instrument_node="">
</span><p data-dcnode-id="195"><span data-dcnode-id="199" instrument_node="">At the end of 2016, I got started again in Amateur Radio after an 11-year vacation. SDR (Software Defined Radio), DSP (digital signal processing), and new digital techniques have ignited my interest and imagination. Initially, I spent a lot of time using JT65, JT9, and FT8 on 80, 40, and 20 meters. But I have started to focus on learning and using Morse code. I also like to have longer rag chews using </span><a data-dcnode-id="197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oliviamode.com/" rel="noopener" target="_blank"><span data-dcnode-id="198" instrument_node="">Olivia</span></a><span data-dcnode-id="196" instrument_node=""> 500/8 or 500/16 depending on band conditions.</span></p><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="193" instrument_node="">I designed both the front and back of my QSL card. I took the photo on the front of the card January 2016. </span><a data-dcnode-id="191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/zoglmannk/" rel="noopener" target="_blank"><span data-dcnode-id="192" instrument_node="">Photography</span></a><span data-dcnode-id="190" instrument_node=""> is my other hobby.</span></p><span data-dcnode-id="188" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="187" instrument_node="">I started out with a modest setup for D-Star: an </span><a data-dcnode-id="185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icomamerica.com/en/products/amateur/handheld/id51aplus/default.aspx" rel="noopener" target="_blank"><span data-dcnode-id="186" instrument_node="">Icom ID-51A Plus</span></a><span data-dcnode-id="184" instrument_node=""> handheld transceiver, a 70cm </span><a data-dcnode-id="182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dvapdongle.com/DV_Access_Point_Dongle/Home.html" rel="noopener" target="_blank"><span data-dcnode-id="183" instrument_node="">DVAP</span></a><span data-dcnode-id="181" instrument_node="">, and a Raspberry Pi 2B running D-Star Commander. I enclosed the DVAP and Raspberry Pi in a DHAP Mini enclosure so I can take my D-Star set up anywhere there is mobile service.</span></p><span data-dcnode-id="179" instrument_node="">
</span><p data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">As pictured below, you can see I have gotten started with HF operations. I really enjoy the Icom 7300 HF radio. And I am using homemade dipole antennas. I use banana plugs to create a resonate antenna beyond 40m. If you can believe it, I can even get on 160m. No one ever said a dipole has to run in a straight line! And because I am on the third floor of an apartment building, I use an artificial ground.</span></p><span data-dcnode-id="176" instrument_node="">
</span><br data-dcnode-id="175"><span data-dcnode-id="174" instrument_node="">
</span><h4 data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">RFI:</span></h4><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="169"><img alt="A massive daisy chain of RFI chokes on a plasma TV" class="lozad" data-dcnode-id="170" data-src="/images/2016/RFI-chokes-no-good-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:10px; width:400px"></p><span data-dcnode-id="168" instrument_node="">
</span><p data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">When I first got started with Amateur radio, I was compelled to learn a lot about RFI! I had no idea the adventure that I was getting myself into as I got into HF amateur radio again.</span></p><span data-dcnode-id="165" instrument_node="">
</span><p data-dcnode-id="154"><span data-dcnode-id="164" instrument_node="">For hunting RFI, I used a handheld AM/FM radio, the </span><a data-dcnode-id="162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mfjenterprises.com/products/mfj-856" rel="noopener" target="_blank"><span data-dcnode-id="163" instrument_node="">MFJ-856 Directional Line Noise Finder</span></a><span data-dcnode-id="161" instrument_node="">, and the </span><a data-dcnode-id="159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mfjenterprises.com/products/mfj-5008" rel="noopener" target="_blank"><span data-dcnode-id="160" instrument_node="">MFJ-5008 Ultrasonic detector</span></a><span data-dcnode-id="158" instrument_node="">. I read The ARRL RFI Book </span><a data-dcnode-id="156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.arrl.org/shop/AC-Power-Interference-Handbook" rel="noopener"><span data-dcnode-id="157" instrument_node="">Practical Cures for Radio Frequency Interference and the AC Power Interference Handbook</span></a><span data-dcnode-id="155" instrument_node=""> by Marv Loftness. Both books helped me understand the fundamentals and get practical information on finding and resolving RFI issues.</span></p><span data-dcnode-id="153" instrument_node="">
</span><p data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">My biggest problem was a neighbor with a plasma TV. It was giving off broadband RFI from 1.8 to 10MHz. Luckily, they moved out after a few months. Our landlords forced them out when they refused to replace their TV. It wasn't just interfering with my beloved hobby; it was causing intermittent problems with the Cable TV internet service. (And even going to ridiculous lengths with RF chokes, the RFI could not be stopped since it was being emitted directly from the screen!)</span></p><span data-dcnode-id="150" instrument_node="">
</span><p data-dcnode-id="148"><img alt="Burned out streetlight causing RFI" class="lozad" data-dcnode-id="149" data-src="/images/2016/RFI-light-burned-out-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:225px"></p><span data-dcnode-id="147" instrument_node="">
</span><p data-dcnode-id="142"><span data-dcnode-id="146" instrument_node="">I got our local electric utility to replace two sparking insulators and one burnt out street light across the street. I am left with broadband noise that I have yet to identify and resolve completely. Now I am down to S7 to S9 white noise depending on the band. I can identify no structure to this white noise. If I don't hear you as well as you hear me, RFI on my side is likely the reason. I can knock the noise down S3 to S5 by using an </span><a data-dcnode-id="144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mfjenterprises.com/products/mfj-1788" rel="noopener" target="_blank"><span data-dcnode-id="145" instrument_node="">MFJ magnetic loop</span></a><span data-dcnode-id="143" instrument_node=""> as a receive antenna. It is inconvenient to set up in our living room, so I don't often get it out.</span></p><span data-dcnode-id="141" instrument_node="">
</span><p data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">On a side issue, I worked with a friend and fellow ham to resolve his RFI problems. We worked together to get his electric utility to replace one sparking insulator and one hot wire that was dangerously and loosely connected to another electric pole in his front yard. We also identified a problem with his hot tub and with a long CAT5 ethernet cable. We are still tracking down RFI problems at his place, but we have made significant progress!</span></p><span data-dcnode-id="138" instrument_node="">
</span><br data-dcnode-id="137"><span data-dcnode-id="136" instrument_node="">
</span><h2 data-dcnode-id="133"><strong data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">2010</span></strong></h2><span data-dcnode-id="132" instrument_node="">
</span><h4 data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">A precursor of things to come:</span></h4><span data-dcnode-id="129" instrument_node="">
</span><div class="video-limit-size" data-dcnode-id="122"><span data-dcnode-id="128" instrument_node="">
</span><div class="video-container" data-dcnode-id="124"><span data-dcnode-id="127" instrument_node="">
</span><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lozad" data-dcnode-id="126" data-src="https://www.youtube.com/embed/P9wKfRj2mrg" frameborder="0" height="315" width="560"></iframe><span data-dcnode-id="125" instrument_node="">
</span></div><span data-dcnode-id="123" instrument_node="">
</span></div><span data-dcnode-id="121" instrument_node="">
</span><p data-dcnode-id="116"><span data-dcnode-id="120" instrument_node="">I became interested in microcontrollers and electronics using an </span><a data-dcnode-id="118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arduino.cc/" rel="noopener" target="_blank"><span data-dcnode-id="119" instrument_node="">Arduino</span></a><span data-dcnode-id="117" instrument_node="">. I built many small projects, including this one involving Morse code! It was a precursor of good things to come! My amateur radio license had expired several years before, and it would be several more years before getting engaged with ham radio again.</span></p><span data-dcnode-id="115" instrument_node="">
</span><p data-dcnode-id="110"><span data-dcnode-id="114" instrument_node="">I set up the Arduino to listen for input on the USB-to-serial interface connected to a computer. Once I input a message and hit return, the Ardunio sends the message to the buzzer as Morse code and echos it out on the serial port as dots and dashes. The project idea came from </span><a data-dcnode-id="112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Practical-Arduino-Projects-Hardware-Technology-ebook/dp/B004VHJI9M/" rel="noopener" target="_blank"><span data-dcnode-id="113" instrument_node="">Practical Arduino: Cool Projects for Open Source Hardware</span></a><span data-dcnode-id="111" instrument_node=""> by Jonathan Oxer and Hugh Blemings.</span></p><span data-dcnode-id="109" instrument_node="">
</span><p data-dcnode-id="107"><span data-dcnode-id="108" instrument_node="">This project helped me to understand the principle of transistors used to amplify a small signal coming from the Arduino and turn on and off a 3-volt buzzer. It is mildly humorous that I made a mistake in the programming and would not catch it until ten years later! The letter Y is mistakenly encoded as the letter Z.</span></p><span data-dcnode-id="106" instrument_node="">
</span><p data-dcnode-id="102"><br data-dcnode-id="105"><br data-dcnode-id="104"><br data-dcnode-id="103"></p><span data-dcnode-id="101" instrument_node="">
