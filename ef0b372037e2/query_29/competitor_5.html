</span><p data-dcnode-id="1986"><a data-dcnode-id="1997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/RS-44-Tracking.jpg" rel="noopener" target="_blank"><img alt="Screen capture of MacDopler showing an RS-44 pass over Kansas" class="lozad" data-dcnode-id="1998" data-src="/images/2020/RS-44-Tracking-smaller.jpg" style="float:right;margin-left:10px; margin-right:10px; margin-bottom:20px; width:400px"></a><span data-dcnode-id="1996" instrument_node="">I had fun exploring Software Defined Radio and Amateur Radio Satellites! On the morning of May 10th, there was a great opportunity to catch a bird. </span><a data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.n2yo.com/satellite/%3Fs%3D44909" rel="noopener" target="_blank"><span data-dcnode-id="1995" instrument_node="">RS-44</span></a><span data-dcnode-id="1993" instrument_node=""> (aka DOSAAF-85), a satellite built by students at </span><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Siberian_State_Aerospace_University" rel="noopener" target="_blank"><span data-dcnode-id="1992" instrument_node="">Siberian State Aerospace University</span></a><span data-dcnode-id="1990" instrument_node=""> and </span><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//in-the-sky.org/spacecraft.php%3Fid%3D44909" rel="noopener" target="_blank"><span data-dcnode-id="1989" instrument_node="">launched</span></a><span data-dcnode-id="1987" instrument_node=""> in December 2019, passed nearly overhead and would transit the sky for over 21 minutes from horizon to horizon. The Amateur Radio transponder had been activated only a couple of weeks prior.</span></p><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1980"><span data-dcnode-id="1984" instrument_node="">The satellite is in orbit at an altitude of 775 miles! For a low earth-orbiting satellite, the satellite has a vast footprint and can be seen across North, Central, and parts of South America at the same time! It is one of the best opportunities to work DX, given the </span><a data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amsat.org/status/" rel="noopener" target="_blank"><span data-dcnode-id="1983" instrument_node="">currently available satellites</span></a><span data-dcnode-id="1981" instrument_node=""> in operation.</span></p><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1978" instrument_node="">At 11:13 am, I pointed my handheld </span><a data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.arrowantennas.com/arrowii/146-437.html" rel="noopener" target="_blank"><span data-dcnode-id="1977" instrument_node="">arrow antenna</span></a><span data-dcnode-id="1975" instrument_node=""> at RS-44 and hit the record button on my SDR software, </span><a data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sdrplay.com/sdruno/" rel="noopener" target="_blank"><span data-dcnode-id="1974" instrument_node="">SDRUno</span></a><span data-dcnode-id="1972" instrument_node="">. While recording, it captures 2MHhz worth of raw spectrum as </span><a data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pe0sat.vgnet.nl/sdr/iq-data-explained/" rel="noopener" target="_blank"><span data-dcnode-id="1971" instrument_node="">I/Q data</span></a><span data-dcnode-id="1969" instrument_node="">.</span></p><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1963"><a data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/RS-44-setup.jpg" rel="noopener" target="_blank"><img alt="Back of a car showing portable reception of satellites using SDRUno and Software Defined Radio" class="lozad" data-dcnode-id="1966" data-src="/images/2020/RS-44-setup-smaller.jpg" style="float:right; clear: both; margin-left:10px; margin-right:10px; margin-bottom:35px; width:400px"></a><span data-dcnode-id="1964" instrument_node="">After a few minutes, I could see and hear the satellite beacon on my laptop. The doppler shift from the speeding satellite was quite noticeable on the Morse code sidetone. (Think about how a train sounds as it blows its whistle approaching and then passing you.) And almost immediately, I could see that the satellite passband was filled with amateur radio operators contacting each other using SSB voice! (The satellite has a 60kHz inverting transponder. Uplink 145.965 MHz +- 30kHz and Downlink 435.640 Mhz +- 30kHz.)</span></p><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">It was difficult to watch the trajectory on my phone, keep the antenna pointed to where I thought the satellite was, adjust the antenna's polarization by twisting it one way or the other, find a station to listen to, and continuously adjust the frequently for doppler shift! That is a lot of multi-tasking, but I managed to listen to a couple of amateur radio operators working each other!</span></p><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1958"></p><div class="video-limit-size" data-dcnode-id="1951"><span data-dcnode-id="1957" instrument_node="">
</span><div class="video-container" data-dcnode-id="1953"><span data-dcnode-id="1956" instrument_node="">
</span><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lozad" data-dcnode-id="1955" data-src="https://www.youtube.com/embed/FY9adU6pmrM" frameborder="0" height="315" width="560"></iframe><span data-dcnode-id="1954" instrument_node="">
</span></div><span data-dcnode-id="1952" instrument_node="">
</span></div><span data-dcnode-id="1950" instrument_node="">
Finally, at 11:33 am, the satellite passed below the northeastern horizon. But the best part was yet to come! As soon as I got home and got everything put away, I began to re-play the recorded I/Q data. I could tune anywhere within that 2Mhz! So I listened to </span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/XE1KK" rel="noopener" target="_blank"><span data-dcnode-id="1949" instrument_node="">XE1KK</span></a><span data-dcnode-id="1947" instrument_node=""> for a while. Then I backed the recording up and listened to </span><a data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/W5CBF" rel="noopener" target="_blank"><span data-dcnode-id="1946" instrument_node="">W5CBF</span></a><span data-dcnode-id="1944" instrument_node=""> on a different frequency, and then again to hear other QSOs. I had no idea how useful it could be to record raw RF and play it back later! For example, it was helpful to experiment with different filters while listening to the same station and adjusting for doppler shift. There was no time pressure.
</span><p data-dcnode-id="1943"></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Toward the end of the pass (but not shown in the video), there was some CW traffic. There was also a lot of fading, so I couldn't quite make out any particular calls. It would have been neet to catch a CW QSO! Perhaps one day, I will even work CW on an amateur radio satellite. Until then, I need more automation to track and adjust for the doppler shift before I'd personally attempt to contact a bird with CW! That is just too much multi-tasking for me.</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1938" instrument_node="">If you would like to hear the pass for yourself, you are welcome to </span><a data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/files/rs-44-pass.zip" rel="noopener" target="_blank"><span data-dcnode-id="1937" instrument_node="">download</span></a><span data-dcnode-id="1935" instrument_node=""> an 8.4GB Zip file with the I/Q data. You will also need to download and install </span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sdrplay.com/softwarehome/" rel="noopener" target="_blank"><span data-dcnode-id="1934" instrument_node="">SDRUno</span></a><span data-dcnode-id="1932" instrument_node="">. Once the SDRUno is installed, unpack the Zip file and load the first .wav file into the program. As you listen, SDRUno will automatically move to the following files.</span></p><span data-dcnode-id="1930" instrument_node="">
</span><br data-dcnode-id="1929"><span data-dcnode-id="1928" instrument_node="">
</span><h4 data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Joy of Hiking with Morse Code:</span></h4><span data-dcnode-id="1925" instrument_node="">
</span><span data-dcnode-id="1924" instrument_node="">
</span><span data-dcnode-id="1923" instrument_node="">
</span><span data-dcnode-id="1922" instrument_node="">
</span><span data-dcnode-id="1890" instrument_node="">
</span><span data-dcnode-id="1888" instrument_node="">
</span><span data-dcnode-id="1886" instrument_node="">
</span><table data-dcnode-id="1885"><tbody data-dcnode-id="1887"><tr data-dcnode-id="1889"><td data-dcnode-id="1891" style="line-height:1.5;"><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1911"><a data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/Hiking-with-code.jpg" rel="noopener" target="_blank"><img alt="Kurt Zoglmann (AD0WE) with sunglasses and listening to Morse code on a hike" class="lozad" data-dcnode-id="1920" data-src="/images/2020/Hiking-with-code-small.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="1918" instrument_node="">It was a treat to go out on a hike and listen to a short story in Morse code! The warm, bright, spring afternoon sun made for the perfect opportunity to go on an 8-mile hike along </span><a data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/kansas/linear-trail-river-trails" rel="noopener" target="_blank"><span data-dcnode-id="1917" instrument_node="">Linear Trail</span></a><span data-dcnode-id="1915" instrument_node=""> and enjoy listening to </span><a data-dcnode-id="1913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Grinch-Stole-Christmas-Classic-Seuss/dp/0394800796" rel="noopener" target="_blank"><span data-dcnode-id="1914" instrument_node="">How the Grinch Stole Christmas</span></a><span data-dcnode-id="1912" instrument_node=""> at 30wpm.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1909" instrument_node="">I hadn't had an opportunity to listen to it since creating the audiobook last December. It turned out to be surprisingly tricky to head-copy in certain parts of the story. </span><a data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dr._Seuss" rel="noopener" target="_blank"><span data-dcnode-id="1908" instrument_node="">Dr. Suess</span></a><span data-dcnode-id="1906" instrument_node=""> makes use of uncommon words in some passages! And I heard many words for the first time in Morse code, such as </span><i data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Who-ville</span></i><span data-dcnode-id="1903" instrument_node=""> and </span><i data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">clucked</span></i><span data-dcnode-id="1900" instrument_node="">.</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">It was great to get out into the fresh air and enjoy the warm springtime temperatures. I was a bit tired by the end of the hike. But it was good for the soul, and I am looking forward to the landscape turning green again.</span></p><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Discover the joy of hiking with Morse code too! Autumn and springtime are some of the most temperate in Kansas, even if they don't last long. Perhaps they are too in your part of the world? Be sure to use earbuds. Wind and other nearby sounds can make it challenging to hear Morse code clearly and easily outdoors.</span></p><span data-dcnode-id="1892" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1884" instrument_node="">
</span><br data-dcnode-id="1883"><span data-dcnode-id="1882" instrument_node="">
</span><h4 data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">DX: The Easy Way:</span></h4><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1875"><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/How-to-chase-work-confirm-DX.jpg" rel="noopener" target="_blank"><img alt="How to Chase, Work, and Confirm DX The Easy Way book laying on a coffee table" class="lozad" data-dcnode-id="1878" data-src="/images/2020/How-to-chase-work-confirm-DX-small.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="1876" instrument_node="">It was a great day to spend inside and read a book! The weather was bad, and the roads were treacherous.</span></p><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1856"><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/DX-Easy-Chase-Work-Confirm/dp/1523286644/" rel="noopener" target="_blank"><span data-dcnode-id="1873" instrument_node="">How to Chase, Work, and Confirm DX The Easy Way</span></a><span data-dcnode-id="1871" instrument_node=""> by Craig Buck (</span><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/K4IA" rel="noopener" target="_blank"><span data-dcnode-id="1870" instrument_node="">K4IA</span></a><span data-dcnode-id="1868" instrument_node="">) was a great short read. Rarely do I read a whole book in a single day! It is chalked full of practical advice and tips for working DX. It was exciting reading about </span><a data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oqrs.net/" rel="noopener" target="_blank"><span data-dcnode-id="1867" instrument_node="">OQRS</span></a><span data-dcnode-id="1865" instrument_node=""> (Online QSL Request System) and </span><span data-dcnode-id="1863" instrument_node=""> GlobalQSL (offline 2021) as options for getting QSOs confirmed. I wasn't familiar with either. I was already familiar with other options — direct, QSL managers, </span><a data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iaru.org/reference/qsl-bureau-2/" rel="noopener" target="_blank"><span data-dcnode-id="1862" instrument_node="">QSL Bureau system</span></a><span data-dcnode-id="1860" instrument_node="">, and </span><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lotw.arrl.org/" rel="noopener" target="_blank"><span data-dcnode-id="1859" instrument_node="">LOTW</span></a><span data-dcnode-id="1857" instrument_node=""> (Logbook of the World).</span></p><span data-dcnode-id="1855" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1854" instrument_node="">I also learned about the </span><a data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncdxf.org/beacon/" rel="noopener" target="_blank"><span data-dcnode-id="1853" instrument_node="">NCDXF/IARU Beacon Network</span></a><span data-dcnode-id="1851" instrument_node="">, which has 18 worldwide beacons that broadcast on a rotating schedule across 14.100, 18.110, 21.150, 24.930, and 28.200Mhz. I tuned into the 20m beacon frequency and heard nothing. So I checked a </span><a data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.remotehamradio.com/remotedx/" rel="noopener" target="_blank"><span data-dcnode-id="1850" instrument_node="">remote station</span></a><span data-dcnode-id="1848" instrument_node=""> on the east coast and was only able to hear </span><a data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/LU4AA" rel="noopener" target="_blank"><span data-dcnode-id="1847" instrument_node="">LU4AA</span></a><span data-dcnode-id="1845" instrument_node="">. I guess propagation wasn't that great this afternoon on 20m!</span></p><span data-dcnode-id="1843" instrument_node="">
</span><br data-dcnode-id="1842"><span data-dcnode-id="1841" instrument_node="">
</span><h4 data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">DitDit Interview:</span></h4><span data-dcnode-id="1838" instrument_node="">
</span><p data-dcnode-id="1825"><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ditdit.fm/" rel="noopener" target="_blank"><img alt="DitDit.fm podcast logo" class="lozad" data-dcnode-id="1837" data-src="/images/2020/DIT_DIT-Red-Blue-DS-large.png" style="float:right; margin-left:10px; margin-right:10px; width:500px"></a><span data-dcnode-id="1835" instrument_node="">It was an awesome opportunity to be interviewed for </span><a data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ditdit.fm/shows/episode-29-morse-code-ninja" rel="noopener" target="_blank"><span data-dcnode-id="1834" instrument_node="">Episode #29</span></a><span data-dcnode-id="1832" instrument_node=""> on the </span><a data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ditdit.fm/" rel="noopener" target="_blank"><span data-dcnode-id="1831" instrument_node="">DitDit.fm</span></a><span data-dcnode-id="1829" instrument_node=""> podcast, the most popular podcast dedicated to amateur radio operators using and learning CW. Bruce (</span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/N9WKE" rel="noopener" target="_blank"><span data-dcnode-id="1828" instrument_node="">N9WKE</span></a><span data-dcnode-id="1826" instrument_node="">) is a wonderful guy and a lot of fun to talk to! It was a joy talking to him about my love and passion for Morse code. We talked about my Morse code journey, my Morse code Ninja website, and tips for learning Morse code.</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">If you listen to the episode, I hope that you enjoy my excitement, enthusiasm, and hope for a brighter future. We live in the Golden Age of CW! There are so many resources and opportunities available to anyone willing to learn and use Morse code.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><br data-dcnode-id="1820"><span data-dcnode-id="1819" instrument_node="">
</span><h4 data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Two Year Anniversary:</span></h4><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Over the last two years, I have had a wondrous adventure learning Morse code, making my first CW contact, making many friends along the way, and giving back! It all started with a desire to fulfill a dream when I was a teenager of learning Morse code.</span></p><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1803"><a data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.k-state.edu/" rel="noopener" target="_blank"><img alt="Aerial view of Kansas State University looking down on Anderson Hall" class="lozad" data-dcnode-id="1812" data-src="/images/2020/K-State-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:500px"></a><span data-dcnode-id="1810" instrument_node="">Many years ago, in 1996, I received a $2,000 scholarship from the </span><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.w8bi.org/index.php/about-dara" rel="noopener" target="_blank"><span data-dcnode-id="1809" instrument_node="">Dayton Amateur Radio Association</span></a><span data-dcnode-id="1807" instrument_node="">. At the time, I was looking forward to studying electrical engineering at </span><a data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.k-state.edu/" rel="noopener" target="_blank"><span data-dcnode-id="1806" instrument_node="">Kansas State University</span></a><span data-dcnode-id="1804" instrument_node="">. I had high hopes of becoming an RF engineering and designing cool new radios.</span></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1797"><span data-dcnode-id="1801" instrument_node="">That didn't happen, but I hope that whoever made the scholarship possible would be proud to know that I graduated cum laude from the </span><a data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engg.ksu.edu/" rel="noopener" target="_blank"><span data-dcnode-id="1800" instrument_node="">College of Engineering</span></a><span data-dcnode-id="1798" instrument_node=""> at Kansas State University with a B.S in Information Systems, a degree closely related to computer science. And proud I would later go on to pay it forward and give back to the amateur radio community by using my expertise as a software developer and my passion for Morse code.</span></p><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1795" instrument_node="">After becoming proficient at 25wpm, I was nominated and accepted into </span><a data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cwops.org/" rel="noopener" target="_blank"><span data-dcnode-id="1794" instrument_node="">CWops</span></a><span data-dcnode-id="1792" instrument_node="">. And then, I became an associate advisor for two </span><a data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cwops.org/cw-academy/" rel="noopener" target="_blank"><span data-dcnode-id="1791" instrument_node="">CW Academy</span></a><span data-dcnode-id="1789" instrument_node=""> classes — Level 2 class with Mark Tyler (</span><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/K5GQ" rel="noopener" target="_blank"><span data-dcnode-id="1788" instrument_node="">K5GQ</span></a><span data-dcnode-id="1786" instrument_node="">) Spring 2019 and now a Level 1 class with George Burger (</span><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/W0PHX" rel="noopener" target="_blank"><span data-dcnode-id="1785" instrument_node="">W0PHX</span></a><span data-dcnode-id="1783" instrument_node="">) Winter 2020. Both have been remarkable experiences. Meeting students online, seeing their excitement and progress, and being a small part of their success is a delight.</span></p><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1780" instrument_node="">In the summer of 2019, I created this website, a </span><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/learn/index.html"><span data-dcnode-id="1779" instrument_node="">Morse code course</span></a><span data-dcnode-id="1777" instrument_node="">, and a vast repository of </span><a data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/practice/index.html"><span data-dcnode-id="1776" instrument_node="">practice content</span></a><span data-dcnode-id="1774" instrument_node=""> from 15 to 50wpm! At the beginning of 2020, I now have 979 YouTube videos and 2,000 hours of content! I also made this content available for download at no cost, but donations are always appreciated to offset hosting expenses.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><h5 data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Creative Spark:</span></h5><span data-dcnode-id="1769" instrument_node="">
</span><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Make-Stick-Science-Successful-Learning/dp/0674729013" rel="noopener" target="_blank"><img alt="Cover of Make it Stick: The Science of Successful Learning" class="lozad" data-dcnode-id="1768" data-src="/images/2020/Make-It-Stick-Cover-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:250px"></a><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1765" instrument_node="">Where did the inventive spark come from to create all this content? It started with reading </span><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Make-Stick-Science-Successful-Learning/dp/0674729013" rel="noopener" target="_blank"><span data-dcnode-id="1764" instrument_node="">Make It Stick: The Science of Successful Learning</span></a><span data-dcnode-id="1762" instrument_node=""> by Brown, Roediger, and McDaniel. The book lays out many ideas for improving learning outcomes, both from the perspective of students and instructors.  The authors do not merely present good advice. Instead, they present practical approaches to learning that are backed by evidence and decades of peer-reviewed research. A good portion of the book is dedicated to summarizing all of the references! If you have the time and are a life long learner, I highly recommend it. I wish that I had read it much earlier in life!</span></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1756"><strong data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Important ideas from the book</span></strong><span data-dcnode-id="1757" instrument_node="">
</span></p><ul data-dcnode-id="1739"><span data-dcnode-id="1755" instrument_node="">
</span><li data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Spaced retrieval practice, of at least one day, halts forgetting, strengthens retrieval routes, and is essential for hanging onto the knowledge and skills you want to gain.</span></li><span data-dcnode-id="1752" instrument_node="">
</span><li data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">If you're going to become an expert, utilize deliberate practice, which entails self-discipline, grit, and persistence. Realize that it often takes 10,000 hours or ten years of training with high-quality and immediate feedback from coaches and experts.</span></li><span data-dcnode-id="1749" instrument_node="">
</span><li data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Strive towards learning goals as opposed to performance goals. If your goal is to increase your ability, you pick ever-increasing challenges, and you interpret setbacks as useful information that helps you to sharpen your focus, get more creative, and work harder.</span></li><span data-dcnode-id="1746" instrument_node="">
</span><li data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Making mistakes is part of learning. Recognize that mistakes are not a sign of failure, but of effort.</span></li><span data-dcnode-id="1743" instrument_node="">
</span><li data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">If you think you can, or you think you can't, you are right. — Henry Ford</span></li><span data-dcnode-id="1740" instrument_node="">
</span></ul><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1737"></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1735" instrument_node="">After reading the book and using </span><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rufzxp.net/" rel="noopener" target="_blank"><span data-dcnode-id="1734" instrument_node="">RufzXP</span></a><span data-dcnode-id="1732" instrument_node=""> and </span><a data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morse.camp/" rel="noopener" target="_blank"><span data-dcnode-id="1731" instrument_node="">Morse Camp</span></a><span data-dcnode-id="1729" instrument_node=""> for an extended time, I realized first hand just how useful and vital it is to practice every day and get immediate feedback. Immediately knowing whether you got something right or wrong and seeing the answer is a crucial aspect of learning efficiently and effectively.</span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1726" instrument_node="">
</span><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//themercury.com/news/after-fire-and-water-gut-building-hale-library-restoration-will/article_36380245-0ea6-57e7-9f88-657f0686ef9d.html" rel="noopener" target="_blank"><img alt="Hale Library fire aftermath at Kansas State University" class="lozad" data-dcnode-id="1725" data-src="/images/2020/Hale-Library-Fire-Damage-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a><span data-dcnode-id="1723" instrument_node="">
  The second insight came in response to a </span><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//themercury.com/news/after-fire-and-water-gut-building-hale-library-restoration-will/article_36380245-0ea6-57e7-9f88-657f0686ef9d.html" rel="noopener" target="_blank"><span data-dcnode-id="1722" instrument_node="">disaster</span></a><span data-dcnode-id="1720" instrument_node=""> at my workplace. May 2018, the roof on K-State's </span><a data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lib.k-state.edu/" rel="noopener" target="_blank"><span data-dcnode-id="1719" instrument_node="">central library</span></a><span data-dcnode-id="1717" instrument_node=""> caught on fire, and local firefighters poured thousands of gallons of water into the building to douse the blaze. This disaster compromised our datacenter, which was located in the basement! And it has forced us to migrate our applications to the cloud.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1714" instrument_node="">In preparing for this migration, I studied for the </span><a data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aws.amazon.com/certification/certified-cloud-practitioner/" rel="noopener" target="_blank"><span data-dcnode-id="1713" instrument_node="">AWS Cloud Practitioner Certification</span></a><span data-dcnode-id="1711" instrument_node=""> and stumbled across a cool service called </span><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aws.amazon.com/polly/" rel="noopener" target="_blank"><span data-dcnode-id="1710" instrument_node="">AWS Polly</span></a><span data-dcnode-id="1708" instrument_node="">. This service turns text into lifelike speech, and it is the technology that powers Alexa. It allows any developer to create voice-powered applications inexpensively.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">So putting this all together, reading Make It Stick, using RufzXP and Morse Camp, and discovering AWS Polly led to my signature format of 1) Sent in Morse code, 2) Spoken, 3) Repeated in Morse code, and 4) a courtesy tone. On a side note, I am very thankful for the generous free-tier provided by AWS. I have yet to pay anything for my usage of AWS Polly. However, I have had significant expenses creating many 100s of hours of video to post to YouTube. I use ten large servers at a time, to render in a day what would take my iMac an entire month!</span></p><span data-dcnode-id="1703" instrument_node="">
</span><h5 data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Innovation:</span></h5><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1693"><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cwops.org/" rel="noopener" target="_blank"><img alt="CWops logo" class="lozad" data-dcnode-id="1699" data-src="/images/2018/CW-Academy-Logo.jpg" style="float:right; margin-left:10px; margin-right:10px; width:282px"></a><span data-dcnode-id="1697" instrument_node="">After going through CW Academy Levels 2 and 3 as a student, I was proficient enough to be nominated and accepted into CWops. But it wasn't because of my ability to head-copy. Instead, I typed everything as I heard it. And it took monumental effort to maintain speeds close to 30wpm despite being able to type at over 60wpm! I practiced hard and frequently, but my ability remained capped at 30wpm. This finally convinced me to take up head-copying wholly and enthusiastically. Joe </span><a data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/KK5NA" rel="noopener" target="_blank"><span data-dcnode-id="1696" instrument_node="">KK5NA</span></a><span data-dcnode-id="1694" instrument_node="">, my CW Academy advisor, was right after all! Hmm. I hate being wrong!</span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">I changed the way I practiced and left my hands off the keyboard. I had early success learning to head-copy individual words, but I struggled to string those words together to form ideas, phrases, and complete thoughts. This was a problem to overcome, and this necessity became the mother of invention!</span></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1681"><strong data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">N-grams</span></strong><br data-dcnode-id="1686"><span data-dcnode-id="1685" instrument_node="">
To ease the cognitive load of remembering a string of words, I recalled an idea from computer science and located a source of the Top 500 n-grams containing the most frequent 2, 3, 4, and 5-word combinations used in contemporary English. </span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/N-gram" rel="noopener" target="_blank"><span data-dcnode-id="1684" instrument_node="">N-Grams</span></a><span data-dcnode-id="1682" instrument_node=""> in this context are sequential words found in a sentence where n is the number of words found in the sequence. For example, "on top of the" and "I was going to" are common four-grams.</span></p><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1675"><span data-dcnode-id="1679" instrument_node="">On my </span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/practice/index.html" target="_blank"><span data-dcnode-id="1678" instrument_node="">practice page</span></a><span data-dcnode-id="1676" instrument_node="">, you will find these labeled as Sets of X Words, where X is a number between 2 through 5. For each practice set, I randomly selected each entry twice for a total of 1,000 practice opportunities creating many hours of practice content!</span></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">I then used the n-gram practice sets extensively and was able to get up to 40wpm with consistent practice. That was great! But...</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1663"><strong data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Sentences from a limited vocabulary</span></strong><br data-dcnode-id="1668"><span data-dcnode-id="1667" instrument_node="">
</span><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/War-Peace-Leo-Tolstoy/dp/1785992627" rel="noopener" target="_blank"><img alt="Book cover for War and Peace by Leo Tolstoy" class="lozad" data-dcnode-id="1666" data-src="/images/2020/War-and-Peace-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:250px"></a><span data-dcnode-id="1664" instrument_node="">
The second source of innovation came from my difficulty in stringing a larger number of words together to form a complete sentence and thought. I knew there had to be an intermediate step between the short common phrases that I created from n-grams and complete sentences. The key was to remove the cognitive difficulty of encountering a lot of new words while acquiring this skill.</span></p><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">So I came up with creating practice sets with sentences made up of the Top 100, 200, 300, 400, and 500 words. Each sentence would be between three and twelve words long and of limited complexity. This practice would be useful for anyone, including myself, who had acquired ICR (Instant Character Recognition) and could easily copy the Top 100 Words or more. This also lets students quickly transition to practicing with entire sentences! It doesn't take long to get familiar with the Top 100 words once proficiency is reached with ICR.</span></p><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1658" instrument_node="">But how would I find these sentences matching this criteria? I am creative, but not that creative! So first, I downloaded two dozen public domain books, such as </span><a data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_and_Peace" rel="noopener" target="_blank"><span data-dcnode-id="1657" instrument_node="">War and Peace</span></a><span data-dcnode-id="1655" instrument_node="">, by Leo Tolstoy. Then I wrote a script to parse the books into sentences, located sentences between 3 and 12 words, identified the least frequent word in each sentence, and then filtered and ordered the sentences for review. Finally, I carefully went through the list and picked out sentences that were easy to understand in isolation.</span></p><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">For each practice set, I identified around 275 unique sentences. But for the sentences made up of the Top 100 Words, I was only able to come up with 190 sentences. So, in that case, I provided plenty of material to work with by randomly selecting each sentence twice.</span></p><span data-dcnode-id="1650" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">I have enjoyed practicing with these sentences made from the Top 100 to Top 500 words, and I have had much more success in head-copying entire ideas and sentences!</span></p><span data-dcnode-id="1647" instrument_node="">
</span><h5 data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">The Future:</span></h5><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">I don't know what the future holds, but I know that the future is bright and full of opportunity. I have a lot of optimism. I will leave you with a short story and video that will hopefully bring a smile from me to you.</span></p><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">At the end of 2019, I have made a lot of progress, but I am still a ways away from being able to reach my long term goal of head-copying a book easily at 40wpm. I know with continued practice, I will get there one day.</span></p><span data-dcnode-id="1638" instrument_node="">
</span><div class="video-limit-size" data-dcnode-id="1631"><span data-dcnode-id="1637" instrument_node="">
</span><div class="video-container" data-dcnode-id="1633"><span data-dcnode-id="1636" instrument_node="">
</span><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lozad" data-dcnode-id="1635" data-src="https://www.youtube.com/embed/s15wVhqUdb0" frameborder="0" height="315" width="560"></iframe><span data-dcnode-id="1634" instrument_node="">
</span></div><span data-dcnode-id="1632" instrument_node="">
</span></div><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">While I don't have a goal to head-copy at extremely high speed, I have made significant strides towards it in recent months. This became obvious when I noticed that five-gram practice seemed unusually easy at 40wpm. So, of course, I had to put myself to the test.</span></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">In this video, you see me for the first time copying three-grams in Morse code at 50wpm!! I could clearly and easily hear the separation between the characters for the first time! My excitement was genuine. I was astonished because I had been focused on head-copying sentences and on building up my vocabulary of sound patterns to recognize words. This latter part of that is known as ICW (Instant Word Recognition).</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Perhaps more astonishingly, since then, I have continued to test myself on occasion. And I have even had some limited success head-copying three-grams at 70wpm! Morse code sounds a lot different beyond 60wpm. It loses much of its tone and takes on more of a pulsating sound.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">If I have any immediate advice to give, it is to practice, practice, and practice some more. I keep detailed logs of my practice. If you can believe it, I have practiced 19,022 minutes over two years, which works out to be an average of 26min/day.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1617" instrument_node="">I wish you all the best on your Morse code journey! If there is anything I can do to help you, please do not hesitate to reach out and </span><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/contact/index.html"><span data-dcnode-id="1616" instrument_node="">contact</span></a><span data-dcnode-id="1614" instrument_node=""> me.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><br data-dcnode-id="1611"><span data-dcnode-id="1610" instrument_node="">
</span><span data-dcnode-id="1609" instrument_node="">
</span><span data-dcnode-id="1608" instrument_node="">
</span><span data-dcnode-id="1607" instrument_node="">
</span><span data-dcnode-id="1584" instrument_node="">
</span><span data-dcnode-id="1582" instrument_node="">
</span><span data-dcnode-id="1580" instrument_node="">
</span><table data-dcnode-id="1579"><tbody data-dcnode-id="1581"><tr data-dcnode-id="1583"><td data-dcnode-id="1585" style="line-height:1.5;"><span data-dcnode-id="1606" instrument_node="">
</span><h4 data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Inspired on the First Day of the New Year:</span></h4><span data-dcnode-id="1603" instrument_node="">
</span><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/N0OY-EME-Station-Dish.jpg" target="_blank"><img alt="N0OY station's 28-foot satellite dish" class="lozad" data-dcnode-id="1602" data-src="/images/2020/N0OY-EME-Station-Dish-smaller.jpg" style="float:right; margin-left:10px; margin-bottom:10px; margin-right:10px; width:250px"></a><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2020/N0OY-EME-Station-shack.jpg" target="_blank"><img alt="N0OY EME station during a demonstration of solar noise when pointed at the sun" class="lozad" data-dcnode-id="1600" data-src="/images/2020/N0OY-EME-Station-shack-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:250px"></a><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1597" instrument_node="">I spent the first day of the year at Pete's (</span><a data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/N0OY" rel="noopener" target="_blank"><span data-dcnode-id="1596" instrument_node="">N0OY</span></a><span data-dcnode-id="1594" instrument_node="">) Open House. His 10GHz EME station is just outside of </span><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salina%2C_Kansas" rel="noopener" target="_blank"><span data-dcnode-id="1593" instrument_node="">Salina, Kansas</span></a><span data-dcnode-id="1591" instrument_node="">. Amazingly, there are only 100 world-class amateur EME stations such as his.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">I thoroughly enjoyed visiting! It was a lot of fun meeting other area hams and seeing familiar faces. I especially enjoyed a personal tour of the antenna farm, industrial projects, and his amateur radio station. Pete is a really great guy!</span></p><span data-dcnode-id="1586" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Walking up to Pete's 28-foot dish is awe-inspiring! It is mounted on a battleship gun turret, which is positioned above the shack! The station sits atop a hill looking down on the treeless countryside, and the dish has an unobstructed view of the sky.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><span data-dcnode-id="1574" instrument_node="">
</span><span data-dcnode-id="1573" instrument_node="">
</span><span data-dcnode-id="1572" instrument_node="">
</span><span data-dcnode-id="1551" instrument_node="">
</span><span data-dcnode-id="1549" instrument_node="">
</span><span data-dcnode-id="1547" instrument_node="">
</span><table data-dcnode-id="1546"><tbody data-dcnode-id="1548"><tr data-dcnode-id="1550"><td data-dcnode-id="1552" style="line-height:1.5;"><span data-dcnode-id="1571" instrument_node="">
</span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/1995/VHF-QSO-Party.jpg" target="_blank"><img alt="Kurt Zoglmann (KB0TMQ) in portable setup for VHF QSO Party in 1995" class="lozad" data-dcnode-id="1570" data-src="/images/1995/VHF-QSO-Party-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:300px"></a><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1567" instrument_node="">Seeing such an EME station reminded me of a humorous incident when I was a teenager and just getting into amateur radio in 1995. My uncle, </span><a data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/N0ZHE" rel="noopener" target="_blank"><span data-dcnode-id="1566" instrument_node="">N0ZHE</span></a><span data-dcnode-id="1564" instrument_node="">, came out to our farm to work the </span><a data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.arrl.org/june-vhf" rel="noopener" target="_blank"><span data-dcnode-id="1563" instrument_node="">June VHF QSO Party</span></a><span data-dcnode-id="1561" instrument_node="">. It was hot that summer weekend, but a lot of fun. Right before we tore down the station, I noticed that the moon was rising over the eastern horizon. I had heard of EME and thought we should give it a try! My uncle laughed and said, "No, that will never work!" We had a single 13 element 2-meter beam up 15ft and 100watt out. I was undeterred and kept pestering him. And finally, he relented and said okay, let's do it.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1558" instrument_node="">We carefully lined up the beam and called out CQ over 2m SSB. And of course, we heard nothing but static. Not even a hint of an echo! My uncle just smiled. Little did I know how </span><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electronics-notes.com/articles/ham_radio/amateur-propagation/moonbounce-propagation-eme.php" rel="noopener" target="_blank"><span data-dcnode-id="1557" instrument_node="">difficult</span></a><span data-dcnode-id="1555" instrument_node=""> it is to bounce a radio signal off of the moon and hear yourself on SSB. However, I still have an inkling to do it! But perhaps with CW!</span></p><span data-dcnode-id="1553" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1545" instrument_node="">
</span><br data-dcnode-id="1544"><span data-dcnode-id="1543" instrument_node="">
</span><h2 data-dcnode-id="1540"><strong data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">2019</span></strong></h2><span data-dcnode-id="1539" instrument_node="">
</span><br data-dcnode-id="1538"><span data-dcnode-id="1537" instrument_node="">
</span><h4 data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Hike with The Cat in the Hat:</span></h4><span data-dcnode-id="1534" instrument_node="">
</span><span data-dcnode-id="1533" instrument_node="">
</span><span data-dcnode-id="1532" instrument_node="">
</span><span data-dcnode-id="1531" instrument_node="">
</span><span data-dcnode-id="1498" instrument_node="">
</span><span data-dcnode-id="1496" instrument_node="">
</span><span data-dcnode-id="1494" instrument_node="">
</span><table data-dcnode-id="1493"><tbody data-dcnode-id="1495"><tr data-dcnode-id="1497"><td data-dcnode-id="1499" style="line-height:1.5;"><span data-dcnode-id="1530" instrument_node="">
</span><a data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/cat-in-the-hat-hike-bridge2.jpg" target="_blank"><img alt="The underside of a bridge on Linear Trail in Manhattan, KS" class="lozad" data-dcnode-id="1529" data-src="/images/2019/cat-in-the-hat-hike-bridge2-smaller.jpg" style="float:right; margin-left:10px; margin-bottom:10px; margin-right:10px; width:250px"></a><a data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/cat-in-the-hat-hike-planet-walk.jpg" target="_blank"><img alt="Kurt Zoglmann (AD0WE) on hike listening to Morse code" class="lozad" data-dcnode-id="1527" data-src="/images/2019/cat-in-the-hat-hike-planet-walk-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:250px"></a><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">I went on an 8-mile hike and listened to The Cat and the Hat in Morse code at 30wpm! It had been about a year since the last time I enjoyed this childhood favorite.</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">It was a great day to embark on a playful adventure. The temperatures were in the low 60s with a gentle breeze, an occasional crunch of leaves under foot, and the sun poking out between the clouds. There are not many days left before it turns off cold.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Cat and the Hat was delightful. It is an easy listen. It has a limited vocabulary, and many words are repeated. I missed a few words here and there, but I did much better than last year! Perhaps next year, I will be ready for the story at 40wpm!</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1513"><a data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/cat-in-the-hat-hike1.jpg" target="_blank"><img alt="Linear Trail in Manhattan, KS" class="lozad" data-dcnode-id="1515" data-src="/images/2019/cat-in-the-hat-hike1-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">For comparison, here is my account from a year ago. </span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Learning to read again. Or at least that is what it feels like as I "read" Cat in the Hat. I walked 5 miles yesterday and today. Both times I listened to the story in Morse code at 25wpm. It took 1 hour and 50 minutes to get through the whole story each time.
On the first read, I got 70% of the words. Occasionally I would get a whole sentence or two. I only got a little of the story because all my effort was on hearing the words. On my second read, I got 90% of the words and was able to follow the story.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">The funny thing is that I haven't read this story in 30+ years. And I didn't remember a lick of it. So it was surprisingly satisfying, slowly figuring out what the story was all about. I had plenty of time to use my imagination to paint a vivid picture.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">This experience strongly reminded me of when I was a little kid trying to read for the first time. I struggled to read the words AND follow the story. It took a year for me to catch up to the other kids at school.</span></p><span data-dcnode-id="1500" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1492" instrument_node="">
</span><h4 data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Worked All States CW Goal:</span></h4><span data-dcnode-id="1489" instrument_node="">
</span><span data-dcnode-id="1488" instrument_node="">
</span><span data-dcnode-id="1487" instrument_node="">
</span><span data-dcnode-id="1486" instrument_node="">
</span><span data-dcnode-id="1465" instrument_node="">
</span><span data-dcnode-id="1463" instrument_node="">
</span><span data-dcnode-id="1461" instrument_node="">
</span><table data-dcnode-id="1460"><tbody data-dcnode-id="1462"><tr data-dcnode-id="1464"><td data-dcnode-id="1466" style="line-height:1.5;"><span data-dcnode-id="1485" instrument_node="">
</span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/2019-03-22-CW-Contacts.jpg" target="_blank"><img alt="Progress on Worked All States Award using CW" class="lozad" data-dcnode-id="1484" data-src="/images/2019/2019-03-22-CW-Contacts-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px; border: 1px solid #ddd; border-radius: 4px;"></a><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">My goal for 2019 is to work every state using CW. It is a celebration for all the progress I made last year to learn Morse code. Ideally, QSO's will be confirmed through LoTW so I can get an official award. Any method of confirmation is appreciated!</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1478" instrument_node="">I plan on regularly getting on the air and participating in contests. This spring and summer I will go portable and activate several state parks with </span><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parksontheair.com/" rel="noopener" target="_blank"><span data-dcnode-id="1477" instrument_node="">POTA</span></a><span data-dcnode-id="1475" instrument_node="">. (Parks on the Air is an excellent opportunity to enjoy the great outdoors and amateur radio!)</span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">I am anticipating that Alaska and North Dakota will be my most challenging states. It took quite a while to work and get them confirmed using JT65 and FT8!</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">As I make progress, I will periodically update the graphic. If you would like to help me, I am always up for a scheduled contact. Feel free to email me!</span></p><span data-dcnode-id="1467" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1459" instrument_node="">
</span><br data-dcnode-id="1458"><span data-dcnode-id="1457" instrument_node="">
</span><h4 data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">First Book in Morse code:</span></h4><span data-dcnode-id="1454" instrument_node="">
</span><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/Thirteenth-Child-ebook.jpg" target="_blank"><img alt="iPhone screen capture of listening to a homemade audio book" class="lozad" data-dcnode-id="1453" data-src="/images/2019/Thirteenth-Child-ebook-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:10px; width:125px"></a><a data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/Aura-Book-Scanner.jpg" target="_blank"><img alt="CZUR book scanner laying on top of kitchen table" class="lozad" data-dcnode-id="1451" data-src="images/2019/Aura-Book-Scanner-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:170px"></a><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Patience finally paid off! And now I have a full-length book to listen to in Morse code over the coming months! After an expansive seven month journey, I listened to the first hour of it today.
</span></p><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Last fall I had success listening to The Cat in the Hat. It was a delightful experience. Afterward, I made a long term goal of being able to read a full-length book in Morse code at 40wpm. Since that time, I have been practicing Morse code every day.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1443" instrument_node="">To make my goal happen, I was not interested in listening to </span><a data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gutenberg.org/" rel="noopener" target="_blank"><span data-dcnode-id="1442" instrument_node="">public domain books</span></a><span data-dcnode-id="1440" instrument_node=""> from the turn of the 20 century or earlier. So I had to find a way of scanning in an entire book. Coincidentally a </span><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indiegogo.com/projects/aura-speeds-simplifies-all-your-scanning-needs%23/" rel="noopener" target="_blank"><span data-dcnode-id="1439" instrument_node="">book scanner</span></a><span data-dcnode-id="1437" instrument_node=""> became available on </span><a data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indiegogo.com/" rel="noopener" target="_blank"><span data-dcnode-id="1436" instrument_node="">Indiegogo</span></a><span data-dcnode-id="1434" instrument_node=""> for $175, which is less than half of the retail price of another model </span><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.czur.com/" target="_blank"><span data-dcnode-id="1433" instrument_node="">CZUR</span></a><span data-dcnode-id="1431" instrument_node=""> sells on </span><a data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/CZUR-ET16-Document-Scanner-Windows/dp/B01H2YCN24/ref%3Dsr_1_2%3Fkeywords%3Dcruz%2Bbook%2Bscanner%26qid%3D1562278022%26s%3Dgateway%26sr%3D8-2" rel="noopener" target="_blank"><span data-dcnode-id="1430" instrument_node="">Amazon</span></a><span data-dcnode-id="1428" instrument_node="">. So I went for it. I didn't think it would take seven months to get here! Their original estimate was three months. It turned out they had a ton of problems scaling up. They were not anticipating needing to manufacture 10,000+ units.</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1425" instrument_node="">I spent quite a bit of time trying to find just the right book. I wanted a science fiction book, but the word choice couldn't be too extensive, and the sentence structure had to be reasonably simple. Constantly encountering new words in every sentence is a bit frustrating, so an easier read is what I was looking for. I considered </span><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Name-Wind-Patrick-Rothfuss/dp/0756404746/ref%3Dsr_1_1%3Fkeywords%3DThe%2BName%2Bof%2Bthe%2BWind%2Bby%2BPatrick%2BRothfuss%26qid%3D1562278363%26s%3Dbooks%26sr%3D1-1" rel="noopener" target="_blank"><span data-dcnode-id="1424" instrument_node="">The Name of the Wind</span></a><span data-dcnode-id="1422" instrument_node=""> by Patrick Rothfuss. While at the book store in the mall, a helpful customer recommended it to me. I nearly got it, but at 662 pages, the length seemed excessive for my first real book in Morse code.</span></p><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1417"><a data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/book-scanner-setup.jpg" rel="noopener" target="_blank"><img alt="Scanning in a book using CZUR book scanner" class="lozad" data-dcnode-id="1419" data-src="/images/2019/book-scanner-setup-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1415" instrument_node="">Undeterred, I went to the library to check out the young reader's section. Having never looked for a book at the </span><a data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mhklibrary.org/" rel="noopener" target="_blank"><span data-dcnode-id="1414" instrument_node="">Manhattan Public Library</span></a><span data-dcnode-id="1412" instrument_node="">, it took a bit of time to find just the right book. But I finally found it — </span><a data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Thirteenth-Child-Frontier-Magic-Patricia/dp/054503342X/ref%3Dpd_sbs_14_1/138-1377226-2728860%3F_encoding%3DUTF8%26pd_rd_i%3D054503342X%26pd_rd_r%3D45637128-9ea8-11e9-82f8-1d9a24afbcac%26pd_rd_w%3DLFCN9%26pd_rd_wg%3DTvT7n%26pf_rd_p%3D588939de-d3f8-42f1-a3d8-d556eae5797d%26pf_rd_r%3D1FD8ETWB3H17ZMT0ZZRP%26psc%3D1%26refRID%3D1FD8ETWB3H17ZMT0ZZRP" rel="noopener" target="_blank"><span data-dcnode-id="1411" instrument_node="">The Thirteenth Child</span></a><span data-dcnode-id="1409" instrument_node=""> by Patricia Wrede. It is about a young girl who finds herself out on an old west-like frontier crossed with the fantasy of magic. It is highly rated for the demographic and it is only 320 pages!</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Once we got home, it took about an hour to scan the book and correct the OCR (optical character recognition) errors. It took another hour to extend my script Perl and Python scripts, which is used to convert the text of the book into Morse Code. I had to deal with some peculiarities. Once everything was ready to go, I kicked off the program and let it run overnight. It ended up taking 13 hours to create five versions of the book at 25, 28, 30, 32, and 35wpm. The 28wpm version is 118 hours long!!!</span></p><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">I ran into some unexpected problems trying to transfer the audiobook to my phone. Some trivial corruption had taken place in the process of concatenating 11,000 individual MP3 files together. To correct the problem, I ended up converting each of the final MP3s to AAC and then repackaged the AAC files into M4A files. After a few more hours of processing, I was able to get it on my phone and finally hear the sweet sounds of success.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">
</span><h4 data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">First CQ WW WPX Contest:</span></h4><span data-dcnode-id="1396" instrument_node="">
</span><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/CQ-WPX-CW-contest-James.jpg" target="_blank"><img alt="James (KW5CW) at W0QQQ station working the CQ Worldwide WPX Contest" class="lozad" data-dcnode-id="1395" data-src="/images/2019/CQ-WPX-CW-contest-James-smaller.jpg" style="float:right; margin-left:10px; margin-bottom:10px; margin-right:10px; width:250px"></a><a data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/CQ-WPX-CW-contest-me.jpg" target="_blank"><img alt="Kurt Zoglmann (AD0WE) at W0QQQ station during the 2019 CQ Worldwide WPX Contest" class="lozad" data-dcnode-id="1393" data-src="/images/2019/CQ-WPX-CW-contest-me-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:250px"></a><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1390" instrument_node="">I participated in the </span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cqwpx.com/" target="_blank"><span data-dcnode-id="1389" instrument_node="">CQ Worldwide WPX Contest</span></a><span data-dcnode-id="1387" instrument_node=""> with James, </span><a data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/KW5CW/" rel="noopener" target="_blank"><span data-dcnode-id="1386" instrument_node="">KW5CW</span></a><span data-dcnode-id="1384" instrument_node="">. He drove up from Texas, and together we activated the </span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.k-state.edu/ksuarc/" rel="noopener" target="_blank"><span data-dcnode-id="1383" instrument_node="">Kansas State Amateur Radio Club</span></a><span data-dcnode-id="1381" instrument_node=""> (W0QQQ)!</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">It was fun and a grand experience seeing James work one station after another all across the world. He worked 501 stations while I did the logging! I have no idea how he got by on so little sleep! But I learned a lot and know what I need to work on to gain proficiency in contesting.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1373"><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/CQ-WPX-CW-contest-QSOs.jpg" target="_blank"><img alt="Map showing all of the contacts made from Kansas State University club station (W0QQQ) during the 2019 CQ Worldwide WPX Contest" class="lozad" data-dcnode-id="1375" data-src="/images/2019/CQ-WPX-CW-contest-QSOs-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">It was also great meeting James in person for the first time. It isn't often that I find someone who is so excited and passionate about CW.</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1368" instrument_node="">Two years ago, I made a routine FT8 contact with James on 40 meters. I could not have known at the time, but it was a noteworthy moment that would lead to a great amateur radio friendship. We have exchanged numerous emails, and I have had the opportunity of contributing to the </span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.graysoncountyarc.org/" rel="noopener" target="_blank"><span data-dcnode-id="1367" instrument_node="">Grayson County Amateur Radio Club</span></a><span data-dcnode-id="1365" instrument_node=""> Newsletter in Texas.</span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">As I have progressed on my Morse code journey and gained proficiency, James has taken an interest in my progress. I would like to think he has seen the same kind of passion that has led him to many years of passionate CW operations.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><br data-dcnode-id="1359"><span data-dcnode-id="1358" instrument_node="">
</span><h4 data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Moserino-32:</span></h4><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1350"><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/Moserino32-partially-assembled.jpg" target="_blank"><img alt="Soldering and assembling the Moserino-32 on the kitchen table" class="lozad" data-dcnode-id="1354" data-src="/images/2019/Moserino32-partially-assembled-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; margin-bottom:10px; width:250px"></a><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/Moserino32-assembled.jpg" rel="noopener" target="_blank"><img alt="Moserino-32 assembled and working" class="lozad" data-dcnode-id="1352" data-src="/images/2019/Moserino32-assembled-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:250px"></a></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1348" instrument_node="">I love the </span><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.morserino.info/morserino-32.html" rel="noopener" target="_blank"><span data-dcnode-id="1347" instrument_node="">Morserino-32</span></a><span data-dcnode-id="1345" instrument_node="">! It is a multifunctional Morse code device that can be used as a practice trainer, keyer, file player, and Morse code decoder. It also functions as a CW Transceiver using the </span><a data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LoRa" rel="noopener" target="_blank"><span data-dcnode-id="1344" instrument_node="">LoRa</span></a><span data-dcnode-id="1342" instrument_node=""> (Long Range WiFi) on 430 Mhz, which allows nearby Morserino-32 users to practice with each other. I would not hesitate to recommend it to others. I have had it a couple of months now and use it every day for Morse code practice! (See this short </span><a data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DfE415NPbOlk" target="_blank"><span data-dcnode-id="1341" instrument_node="">video</span></a><span data-dcnode-id="1339" instrument_node=""> for a quick demonstration.)</span></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">I bought the Morserino-32 for its Echo Trainer (Challenge / Response) functionality. In this mode, you select either random character groups, CW abbreviations, English words, callsigns, or random. You get three attempts to get it right by default. First, it plays a selection. Then you immediately send it back using the built-in capacitance touch paddles or an external paddle. If you get it right, it continues to another round. If you get it wrong, it repeats. If you get it wrong too many times, it shows you the answer and moves on. This functionality enables me to conveniently practice sending.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">In my opinion, this is one of the best hardware Morse code trainers on the market. It is 85Euro ($99USD) and ships from Austria. The unit can also run from a battery. Please note that the kit does not ship with a LiPo battery since it is onerous to ship internationally. A set of batteries and charger can be picked up for $20 on Amazon. (The charger is not necessary since the Heltec microcontroller has an onboard trickle charger. If you don't want to purchase a battery, the Moserino-32 can run off of USB.)</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1330" instrument_node="">Assembling the Morserino-32 is straight forward and took about an hour and a half for me to put together. The </span><a data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/oe1wkl/Morserino-32/raw/master/Documentation/Assembly%2520Instructions/Detailed%2520Assembly%2520Instructions.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1329" instrument_node="">assembly instructions</span></a><span data-dcnode-id="1327" instrument_node=""> are detailed and provide closeup pictures to avoid making mistakes. Most of the parts are surface mount and are already mounted onto the PCB board, but the Heltec microcontroller and larger components are left for the end user to assemble. 1) First, the phone jacks, trimmer resistor, rotary encoder, and sliding and push-button switch are soldered into place. 2) Then the Heltec microcontroller is placed into an IC socket and soldered onto the board. 3) Next, a position for the Lithium-ion battery is determined, and the connecting wire is trimmed and attached to the PCB. 4) Finally, the case is put together and the LoRa antenna connected to the Heltec microcontroller.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1324" instrument_node="">If you are a software developer, you will be happy to know that the Morserino-32 is Open Source. You can get the documentation and microcontroller software on </span><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/oe1wkl/Morserino-32" rel="noopener" target="_blank"><span data-dcnode-id="1323" instrument_node="">GitHub</span></a><span data-dcnode-id="1321" instrument_node="">. If I can find the time, I have thought about adding a feature or two.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><br data-dcnode-id="1318"><span data-dcnode-id="1317" instrument_node="">
</span><h4 data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Parks on the Air Adventure:</span></h4><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1311"><a data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morsecode.ninja/images/2019/quivira-me.jpg" target="_blank"><img alt="Kurt Zogmann (AD0WE) at Quivira National Wildlife Refuge participating on POTA (Parks On The Air)" class="lozad" data-dcnode-id="1313" data-src="/images/2019/quivira-me-smaller.jpg" style="float:right; margin-left:10px; margin-right:10px; width:400px"></a></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1309" instrument_node="">I am excited to have activated </span><a data-dcnode-id="1307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fws.gov/refuge/quivira/" rel="noopener" target="_blank"><span data-dcnode-id="1308" instrument_node="">Quivira National Wildlife</span></a><span data-dcnode-id="1306" instrument_node=""> Refuge K-0294 with my uncle Greg, </span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrz.com/db/N0ZHE"><span data-dcnode-id="1305" instrument_node="">N0ZHE</span></a><span data-dcnode-id="1303" instrument_node="">. I will not soon forget the adventure and challenges!</span></p><span data-dcnode-id="1301" instrument_node="">
