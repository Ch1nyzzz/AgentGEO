</span><article class="post-3766 post type-post status-publish format-standard hentry category-uncategorized" data-dcnode-id="919" id="post-3766"><span data-dcnode-id="1060" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1054"><span data-dcnode-id="1059" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1056"><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/01/07/the-genius-of-light/" rel="bookmark"><span data-dcnode-id="1058" instrument_node="">The genius of&nbsp;light</span></a></h2><span data-dcnode-id="1055" instrument_node=""> </span></header><span data-dcnode-id="1052" instrument_node="">
</span><div class="entry-content" data-dcnode-id="948"><span data-dcnode-id="1051" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1045"><img alt="Man in Oriental Costume (1632)" data-dcnode-id="1050" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/rembrandt_van_rijn_2.jpg&amp;raw"><figcaption data-dcnode-id="1046"><em data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Man in Oriental Costume</span></em><span data-dcnode-id="1047" instrument_node=""> 1632</span></figcaption></figure><span data-dcnode-id="1044" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">This ambitious painting depicts the Dutch notion of a Middle Eastern potentate as an exotic foreign subject that would appeal to an experienced and knowledgeable collector. A swathed and stately colossal figure stares sternly out with his shoulders and head dramatically illuminated from the front and back. His golden garment gleams beneath a metallic scarf and silver turban while ornaments and jewellery sparkle and glow.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">During the 1630s Rembrandt depicted many figures wearing Middle Eastern garments in his paintings, drawings and etchings. The commercial enterprises of the Dutch Republic had reached the Middle East by the early seventeenth century and Levantines were to be seen in the streets and marketplaces of Amsterdam. Portraits of imaginary Persian, Ottoman or other oriental princes became popular in the bustling city. </span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Rembrandt’s images are not mere portraits of those people. They are imaginative representations of a distant culture that feature Dutch models including Rembrandt himself dressed in exotic attire.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">The piece shows Rembrandt’s mastery as a painter of light as well as figures which explains the use of a limited muted palette to create endless depth. He used deep shadows that disappeared into obscurity with uneven golden illumination and highlights brushed in with bold dashing strokes. Sometimes he used an abundance of paint, sometimes very little and sometimes he scratched the canvas with the handle of a brush working to create the exact  polished effect with oil paint.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Rembrandt’s extensive self portraits are notable in that they inform a unique visual biography of the artist. Whether painting himself in costume or as an ordinary man he surveyed himself without vanity and with a vulnerable sincerity.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">During the Dutch Golden Age portraiture rose in popularity. With the new trade routes delivering an awareness of exotic cultures and foreign interests members of the new merchant class enjoyed commissioning imaginative likenesses of their selves to display in their homes and guilds and other professional organizations would also acquire group portraits. Rembrandt was one of the greatest portraitists of this time known for his impeccable capture of the subjects’ distinct personalities and emotional idiosyncrasies.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Rembrandt would surpass the inventiveness of Titian and Velasquez&nbsp;with his progressive handling of paint making it as much a subject in the composition of a painting as his figures. Variations of brush stroke between loose and rough or the manipulation of textures in the linens through scratching or with a palette knife would all contribute greatly to a radically new signature style that would influence people in that he was leaving the paint loose or as rough brushwork. The surface of the canvas might be smooth and creamy rendering the illuminated faces and for the garments he used a palette knife to apply layers of pigment to represent textures such as rich brocades, delicate lace, glistening jewellery and intricate folds.&nbsp; </span></p><span data-dcnode-id="1023" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1014"><img alt="Belshazzar's Feast (1635)" data-dcnode-id="1022" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/rembrandt_van_rijn_4.jpg&amp;raw"><figcaption data-dcnode-id="1015"><em data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Belshazzar’s Feast</span></em><span data-dcnode-id="1019" instrument_node=""> 1635. </span><em data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Oil on Canvas in the National Gallery in London, Engla</span></em><span data-dcnode-id="1016" instrument_node="">nd</span></figcaption></figure><span data-dcnode-id="1013" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Belshazzar’s story as the King of Babylon was described in the Old Testament. He committed sacrilege by having gold and silver vessels that his father Nebuchadnezzar had looted from the temple in Jerusalem stolen back for his own use. When he ordered the vessels to be filled with wine for his many guests and nobles at a great banquet a disembodied hand emerged from a small cloud to inscribe mysterious symbols on the wall. </span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1005"><span data-dcnode-id="1009" instrument_node="">The prophet Daniel explained that the hand of God wrote the message to signify King Belshazzar’s downfall. The interpretation of the symbols was “</span><em data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">God has numbered the days of your kingdom and brought it to an end; you have been weighed in the balances and found wanting; your kingdom is given to the Medes and Persians.”</span></em><span data-dcnode-id="1006" instrument_node=""> This is the moment Belshazzar abruptly rises and twists his head around to see the glowing message on the back wall. He knocks over precious items and startles the people around him. He ended up being killed that very evening.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Rembrandt painted this canvas to establish himself as a master of large scale baroque history paintings as Rubens did in the European courts. He painted the concentrated shock of physical force as the scene is a study of action, fear and surprise. Each figure is shown in a dramatic recoiling posture within a composition of illusionist effects and compositional arrangements to involve the viewer. Belshazzar’s solid triangular form and stance determines the compositional arrangement. Three areas are established with shocked guests to the left, a bending lushly attired servant to the right and the ghostly image on the wall above. Rembrandt’s mastery of chiaroscuro makes the forms seem to gently emerge or disappear back into the darker areas. </span></p><span data-dcnode-id="1001" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="995"><img alt="The Night Watch (1642)" data-dcnode-id="1000" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/rembrandt_van_rijn_6.jpg&amp;raw"><figcaption data-dcnode-id="996"><em data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Oil on Canvas 1642 in the Rijksmuseum in Amsterdam</span></em><span data-dcnode-id="997" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="994" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="990"><em data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">The Night Watch</span></em><span data-dcnode-id="991" instrument_node="">&nbsp;certainly seems to burst forth from the canvas  a virtuoso of baroque vigour, dramatic intensity and powerful lighting. Rembrandt was named the magician of magicians and the great universal master portrait painter of the Dutch Republic. At the height of his career when he painted this ambitious painting which was a success at the time it is still regarded as one of Rembrandt’s most celebrated works.&nbsp;</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">The group portrait often called a corporation portrait was uniquely Dutch and was often times as enormous as a modern billboard. Rembrandt painted this large canvas between 1640 and 1642 on commission for the musketeer branch of a civic militia and wealthy merchants of Amsterdam society. Any of the members could be assigned to guard gates, police the streets, put out fires and maintain order. Their presence was also required at parades for visiting royalty and other festive occasions. Rather than using the accepted standard convention of a stately and formal pose such as lining up in rows or sitting at a banquet he presented a bustling and partly confused scene of members in preparation for an event.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">The men who are brightly illuminated and stepping forward in the centre foreground show there was no set standard for dress in the militia so the outfits could be quite elaborate. Captain Cocq a law school educated and prosperous citizen is elegantly dressed in black with a large lacy collar and deep red sash trimmed with gold around his chest. Captain van Ruytenburch from a family of grocers has a more dazzling costume in a golden coat made of yellow leather ornamented with bows and rich patterns complimented by gloves and cavalier riding boots with spurs. It is believed that this painting was hung low and the two central almost life sized figures would have seemed to step out of the composition while the other participants assembled to follow.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">A small female figure behind the men is also highly illuminated. She is identified as a mascot carrying the main symbols of the group in the claws of a dead chicken which represent a defeated enemy, a pistol representing the main weapon of the klover and one golden drinking horn. In the rear a group of men armed with an array of weapons wearing various bits of armour and helmets assemble before a massive but imaginary archway that represented the city gate to be defended. </span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">On the left the standard bearer dressed in blue raises the troop banner while on the far right the men hold their pikes high. A drummer hired for the occasion shown in partial view on the viewer’s right taps out a cadence while a dog barks enthusiastically at his feet. Various other participants included to heighten the activity and drama are in the background with their faces obscured or partly visible. One figure wearing a beret and peering up from behind a helmeted figure near the standard bearer has been identified as Rembrandt himself.</span></p><span data-dcnode-id="977" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="968"><img alt="Self-Portrait with Two Circles (1660)" data-dcnode-id="976" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/rembrandt_van_rijn_9.jpg&amp;raw"><figcaption data-dcnode-id="969"><em data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Self Portrait with Two Circles in 1660</span></em><span data-dcnode-id="973" instrument_node="">. </span><em data-dcnode-id="970"><em data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Oil on Canvas at Kenwood House in London, England</span></em></em></figcaption></figure><span data-dcnode-id="967" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">The artist had the ability to capture the human drama of a religious theme which earned him the appellation as the Shakespeare of painting. This painting was created the year that Rembrandt experienced bankruptcy. It was a melancholy period of time when he sought peace of mind through his work. </span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Dressed in a fur lined robe over a red garment and a white beret he holds his wooden palette, brushes and a long maulstick used as a rest to steady his hands while painting. The artist stares directly at the viewer with one hand on his hip while standing in front of a light coloured wall or canvas with large circles depicted upon it. This late work has seemingly unfinished areas such as the face and hat where the paint was rapidly and thickly applied. In some areas Rembrandt drew or scratched into the paint. The lines are cut into the moustache, left eyebrow and shirt collar.&nbsp;</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">The flat pale background with circular designs was atypical for Rembrandt and the meaning has been speculated upon greatly over the years. A &nbsp;favoured explanation which has historical precedents is that a perfect circle symbolizes artistic skill. </span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">The early Italian Renaissance artist Giotto was once summoned by the Pope to demonstrate his mastery so he drew a perfect circle in one single motion. An older story describes how Apelles painter to Alexander the Great engaged in drawing perfect lines to prove his superior talents. </span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Rembrandt’s intent was to create an honest image of himself for posterity more profoundly concerned with his personal character than a conventional self portrait. The British Academy’s President Sir Joshua Reynolds remarked about the very unfinished manner but found the painting admirable for its colour and effect. Jean Honoré Fragonard painted his own copy of this work. </span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">The nineteenth century Édouard Manet repeated Rembrandt’s technique of the quick brushstroke with a painter’s restless, live and hurried hand. Rembrandt may not have considered the work complete which is suggested by the omission of his signature and date unusual for a self portrait by the artist.</span></p><span data-dcnode-id="949" instrument_node="">
</span></div><span data-dcnode-id="946" instrument_node="">
</span><footer class="entry-footer" data-dcnode-id="922"><span data-dcnode-id="945" instrument_node="">
</span><span class="byline" data-dcnode-id="937"><span class="author vcard" data-dcnode-id="938"><img alt="" class="avatar avatar-49 grav-hashed grav-hijack" data-dcnode-id="944" height="49" id="grav-e712300d5a8681daa29a0099c8230545-8" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.gravatar.com/avatar/e712300d5a8681daa29a0099c8230545%3Fs%3D49%26d%3Didenticon%26r%3DG&amp;raw" width="49"><span class="screen-reader-text" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Author </span></span><span data-dcnode-id="941" instrument_node=""> </span><a class="url fn n" data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/author/milenapetrovic129/"><span data-dcnode-id="940" instrument_node="">Milenapetrofig</span></a></span></span><span class="posted-on" data-dcnode-id="929"><span class="screen-reader-text" data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Posted on </span></span><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/01/07/the-genius-of-light/" rel="bookmark"><time class="entry-date published" data-dcnode-id="933" datetime="2022-01-07T09:48:50+00:00"><span data-dcnode-id="934" instrument_node="">January 7, 2022</span></time><time class="updated" data-dcnode-id="931" datetime="2022-01-07T23:52:34+00:00"><span data-dcnode-id="932" instrument_node="">January 7, 2022</span></time></a></span><span class="comments-link" data-dcnode-id="924"><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/01/07/the-genius-of-light/%23respond"><span data-dcnode-id="928" instrument_node="">Leave a comment</span><span class="screen-reader-text" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node=""> on The genius of&nbsp;light</span></span></a></span><span data-dcnode-id="923" instrument_node=""> </span></footer><span data-dcnode-id="920" instrument_node="">
</span></article><span data-dcnode-id="917" instrument_node="">
</span><article class="post-3729 post type-post status-publish format-standard hentry category-uncategorized" data-dcnode-id="749" id="post-3729"><span data-dcnode-id="916" instrument_node="">
</span><header class="entry-header" data-dcnode-id="910"><span data-dcnode-id="915" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="912"><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2021/12/28/macbeth-or-the-curse/" rel="bookmark"><span data-dcnode-id="914" instrument_node="">Macbeth or the&nbsp;Curse</span></a></h2><span data-dcnode-id="911" instrument_node=""> </span></header><span data-dcnode-id="908" instrument_node="">
</span><div class="entry-content" data-dcnode-id="778"><span data-dcnode-id="907" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="901"><img alt="Henry Fuseli's painting of Macbeth with the witches (Act 4, scene 1; 1793)" data-dcnode-id="906" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.folger.edu/sites/default/files/004536.jpg&amp;raw"><figcaption data-dcnode-id="902"><em data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Macbeth Consulting the Armed Head in Henry Fuseli’s painting of Macbeth with the witches in Act 4, scene 1 is from 1793. </span></em><span data-dcnode-id="903" instrument_node=""> </span></figcaption></figure><span data-dcnode-id="900" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Macbeth the Thane of Glamis murders Duncan, the king’s two sons flee and Macbeth is crowned. Later he becomes the Thane of Cawdor and the king of Scotland in fulfilment of the witches’ prophecy. &nbsp;In Scene II it is revealed that the current Thane of Cawdor in another area of Scotland has rebelled against the king and is killed.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Having been successful in battle Macbeth defeats Norwegian forces who were assisted by the traitorous Thane of Cawdor. After he is executed for his treason his title is bestowed upon Macbeth.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">The three witches greet&nbsp;Macbeth&nbsp;as&nbsp;Thane of Glamis as he is,&nbsp;Thane&nbsp;of Cawdor and king hereafter. They promise Banquo that he will father kings and they disappear.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="886"><span data-dcnode-id="890" instrument_node="">Fearing that Banquo’s descendants will take over the kingdom according to the&nbsp; Weïrd Sisters’ predictions Macbeth has Banquo killed. At a royal banquet that evening Macbeth sees Banquo’s ghost appear covered in blood. Macbeth determines to consult the Weïrd Sisters again. They comfort him with ambiguous promises. Nuances behind this word choice for the creatures presented by Shakespeare referred to the Fates in a Greek tragedy with the ability to prophecy the future. Folio editions have the word in different form as </span><em data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">wyared</span></em><span data-dcnode-id="887" instrument_node=""> with the meaning shifting to the wayward creatures who are able to foresee and predict  events.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="880"><span data-dcnode-id="884" instrument_node="">Macbeth becomes King of Scotland but is plagued by feelings of insecurity. He remembers the prophecy that Banquo’s descendants will inherit the throne and arranges for Banquo and his son Fleance to be killed</span><strong data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">.</span></strong><span data-dcnode-id="881" instrument_node="">&nbsp;In the darkness Banquo is murdered but his son escapes the assassins.&nbsp;At his banquet that night Macbeth sees the ghost of Banquo and worries the courtiers with his mad response.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Macbeth  visits the witches in Act IV in order to learn the truth of their prophecies to him. In response they conjure horrible apparitions of an armoured head which tells him to beware of Macduff,&nbsp;a bloody child telling him that no one born of a woman will be able to harm him and next a&nbsp;crowned child holding a tree stating&nbsp;that&nbsp;Macbeth will be safe until Great Birnam Wood comes to Dunsinane Hill.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">The other nobleman Macduff rides to England to join Duncan’s older son Malcolm. Macbeth has Macduff’s wife and children murdered. Malcolm and Macduff lead an army against Macbeth as Lady Macbeth goes mad and commits suicide. Civil war erupts to overthrow Macbeth resulting in more death.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Lady Macbeth overcome with guilt for the crimes she has committed with her husband has taken to sleepwalking. After entering the stage in Act V holding a candle she laments the murders of Duncan, Banquo and Lady Macduff while trying to wash off imaginary bloodstains from her hands. In England Macduff learns of the slaughtering of his own family. Stricken with grief he vows revenge together with Duncan’s son Prince Malcolm who raised an army in England.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Macbeth confronts Malcolm’s army trusting in the Weïrd Sisters’ comforting promises. He learns that the promises are tricks but continues to fight. Macduff kills Macbeth and Malcolm becomes Scotland’s king.</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="862"><span data-dcnode-id="866" instrument_node="">Set primarily in Scotland </span><em data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Macbeth</span></em><span data-dcnode-id="863" instrument_node=""> mixes witchcraft, prophecy and murder. Three Weïrd Sisters appear to Macbeth and his comrade Banquo after a battle and prophesy that Macbeth will be king and that the descendants of Banquo will also reign. When Macbeth arrives at his castle he and Lady Macbeth plot to assassinate King Duncan soon to be their guest so that Macbeth can become king.</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="850"><span data-dcnode-id="860" instrument_node="">Associations with the witches in </span><em data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Macbeth</span></em><span data-dcnode-id="857" instrument_node=""> and early modern recipe culture shed light on the characters, plot, themes and history of&nbsp;</span><em data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Macbeth</span></em><span data-dcnode-id="854" instrument_node=""> Shakespeare’s supernatural tragedy. &nbsp;Actors in a famous production which Orson Welles directed during the Great Depression explore the performance known as the Voodoo </span><em data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Macbeth</span></em><span data-dcnode-id="851" instrument_node="">.</span></p><span data-dcnode-id="849" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="843"><img alt="Orson Welles and Jeannette Nolan as Macbeth and Lady Macbeth (1948)" data-dcnode-id="848" height="479" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.folger.edu/sites/default/files/picturing-shakespeare-images/009076.jpg&amp;raw" width="608"><figcaption data-dcnode-id="844"><em data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Orson Welles and Jeannette Nolan as Macbeth and Lady Macbeth in 1948</span></em><span data-dcnode-id="845" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="842" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Images representing Shakespeare’s plays show actors in character while others show the plays as if they were real life events. The difference is not always easy to find.&nbsp;</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Fuseli’s image of the cauldron scene draws on his fascination with fantasy, superstition, terror and the supernatural. Painted for the Irish Shakespeare Gallery in Dublin in 1793 it is still in its original frame.</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Fuseli considered it one of his best poetical conceptions. One critic was so impressed on seeing it exhibited in 1794 in London at the New Shakespeare Gallery that he wrote that it was perhaps the very best picture he has ever painted.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">The scene with the apparitions was added later in the nineteenth century because witches were not real in Shakespeare’s time and the public were offended when the weird sisters were used in plays. </span><em data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Macbeth</span></em><span data-dcnode-id="829" instrument_node=""> is a tragedy and one of the most well known of Shakespeare’s plays and one of the shortest and darkest as well.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="822"><span data-dcnode-id="826" instrument_node="">First published in 1623 </span><em data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Macbeth</span></em><span data-dcnode-id="823" instrument_node=""> is a tale which illuminates the consequences of violating the natural order and the hierarchy of beings in the universe. The first performance might have been in 1606 or 1611 and the play dramatizes the extremes of ambition and guilt. Macbeth’s three witches and other dark imagery have entered our collective imagination.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="816"><span data-dcnode-id="820" instrument_node="">Raphael Holinshed published&nbsp;Chronicles of England, Scotlande, and Irelande&nbsp;in 1577. The second edition published in 1587 was Shakespeare’s primary reference work for most of his histories and many of his other plays including&nbsp;</span><em data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Macbeth</span></em><span data-dcnode-id="817" instrument_node="">. </span></p><span data-dcnode-id="815" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="809"><img alt="Macbeth" data-dcnode-id="814" height="913" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.folger.edu/sites/default/files/TM7%2520-%2520They%2520Smack%2520of%2520Honor%2520Both%2520image.jpg&amp;raw" width="584"><figcaption data-dcnode-id="810"><em data-dcnode-id="811"><em data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">The woodcut image appears only in the 1577 edition. It is the only image in the edition that is not repeated elsewhere in the book. The other excerpts are taken from the 1587 edition.</span></em></em></figcaption></figure><span data-dcnode-id="808" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">There are various excerpts from Holinshed which have parallels and subtle differences between Holinshed’s account and Shakespeare. The common characteristics of Shakespeare’s changes of elaboration, omission, alteration and whether or not his changes add to the dramatic nature of the play might evaluate how England viewed witches and their power.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Shakespeare’s Scottish play uses the character of the weird sisters visually as evidence for their assertion of the history. What are the obvious similarities and differences between the two texts? How do the characters differ from one version of the story to the other?</span></p><span data-dcnode-id="802" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="783"><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">The historie came unto Culros, where incountering with the enimies, after a sore and cruell foughten battell, Sueno remained victorious, and Malcolme with his Scots discomfited, holdbeit the Danes were so broken by this battell, that they were not able to make long chase on their enimies, but kept themselves all night in order of battell, for doubt least the Scots assembling togither againe, might have set upon them at some advantage.</span></p><p data-dcnode-id="796"><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Sueno vanquisheth the Scots</span></strong><span data-dcnode-id="797" instrument_node="">: On the morrow, when the fields were discovered, and that it was perceived how no enimies were to be found abrode, they gathered the spoile, which they divided amongst them, according to the law of armes. </span></p><p data-dcnode-id="792"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Suenos commandement to spare fire and sword</span></strong><span data-dcnode-id="793" instrument_node="">: Then it was ordeined by commandement  of Sueno, that no souldier would hurt either man, woman , or child, except such as were found with weapon in hand, readie to make resistance, for he hoped now to conquer the realme without further bloudshed.</span></p><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Duncane fled to the castell of Bertha: But when knowledge was given of how Duncane was fled unto the castell of Bertha, and that Macbeth was gathering a new power to withstand the incursions of the Danes, Sueno raised his tents, &amp; coming to the said castell, laid a strong siege round about it. </span></p><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Sueno besiegeth king Malcolme: Duncane seeing himselfe thus environed by his enimies, sent a secret message by counsell of Banquho to Macbeth, commanding him to abide at Inchenthill, till he heard from him some other newes. </span></p><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Fained treatie: In the meane time Duncane fell in fained communication with Sueno, as though he would have yielded by the castell into his hands, under certeine conditions, and this did he to drive time, and to put his enimies out of all suspicion of anie enterprisement against them, till all things were brought to passe that might serve for the purpose. At length, when they were fallen at a point  for rendring by the hold, Duncane offered to send foorth of the castell into the campe, great provision of vittells to refresh the armie, which offer was gladlie accepted of the Danes, for that they had beene in great penurie of sustenance manie daies before.</span></p><cite data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Holinshed</span></cite></blockquote><span data-dcnode-id="782" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="780"><img alt="" data-dcnode-id="781"></figure><span data-dcnode-id="779" instrument_node="">
</span></div><span data-dcnode-id="776" instrument_node="">
</span><footer class="entry-footer" data-dcnode-id="752"><span data-dcnode-id="775" instrument_node="">
