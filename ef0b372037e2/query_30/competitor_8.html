</span><figure class="alignright is-resized" data-dcnode-id="2023"><img alt="" class="wp-image-3949" data-attachment-id="3949" data-comments-opened="1" data-dcnode-id="2027" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-12" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-12.png?w=493" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-12.png?w=191" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-12.png" data-orig-size="493,773" data-permalink="https://milenapetrofigsblog.wordpress.com/image-12-2/" height="258" loading="lazy" sizes="(max-width: 165px) 85vw, 165px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-12.png%3Fw%3D493&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-12.png?w=165 165w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-12.png?w=330 330w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-12.png?w=96 96w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-12.png?w=191 191w" width="165"><figcaption data-dcnode-id="2024"><em data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">La cenerentola </span></em></figcaption></figure></div><span data-dcnode-id="2021" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2016"><span data-dcnode-id="2020" instrument_node="">Strepponi’s voice declined and her engagements dried up in the 1845 to 1846 period. The opera singer returned to live in Milan whilst retaining contact with Verdi as his supporter, promoter, unofficial advisor and occasional secretary until she decided to move to Paris in October 1846. Before she left Verdi gave her a letter that pledged his love. On the envelope Strepponi wrote  “…</span><em data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">5 or 6 October 1846. They shall lay this letter on my heart when they bury me.</span></em><span data-dcnode-id="2017" instrument_node="">“</span></p><span data-dcnode-id="2015" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">For several months Verdi was preoccupied with family matters. These stemmed from the way in which the citizens of Busseto were treating Giuseppina Strepponi with whom he was living openly in an unmarried relationship. She was shunned in the town and at church and while Verdi appeared indifferent she was certainly not. Verdi was concerned about the administration of his newly acquired property at Sant’Agata. A growing estrangement between Verdi and his parents was perhaps also attributable to Strepponi.</span></p><span data-dcnode-id="2012" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1995"><span data-dcnode-id="2011" instrument_node="">Verdi was committed to the publisher&nbsp;Giovanni Ricordi&nbsp;for an opera which became&nbsp;</span><em data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Stiffelio</span></em><span data-dcnode-id="2008" instrument_node=""> for Trieste in the Spring of 1850 then following negotiations with La Fenice developed a libretto with Piave and wrote the music for&nbsp;</span><em data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Rigoletto</span></em><span data-dcnode-id="2005" instrument_node=""> based on&nbsp;Victor Hugo’s </span><em data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Le Roi s’amuse</span></em><span data-dcnode-id="2002" instrument_node=""> for Venice in March 1851. After the initial success of&nbsp;</span><em data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Nabucco</span></em><span data-dcnode-id="1999" instrument_node=""> Verdi settled in Milan making a number of influential acquaintances. He attended the&nbsp;</span><em data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Salotto Maffei</span></em><span data-dcnode-id="1996" instrument_node="">, Countess&nbsp;Clara Maffei’s salon in Milan becoming her lifelong friend and correspondent.</span></p><span data-dcnode-id="1994" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1989"><em data-dcnode-id="1991"><strong data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Rigoletto</span></strong></em><span data-dcnode-id="1990" instrument_node="">&nbsp;is an&nbsp;opera&nbsp;in three acts by Giuseppe Verdi. The Italian libretto&nbsp;was written by Francesco Maria Piave&nbsp;based on the 1832 play&nbsp;by&nbsp;the French writer. Despite serious initial problems with the Austrian censors who had control over northern Italian theatres at the time the opera had a triumphant premiere.</span></p><span data-dcnode-id="1988" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="1978"><span data-dcnode-id="1987" instrument_node="">
</span><figure class="alignright is-resized" data-dcnode-id="1979"><img alt="" class="wp-image-3922" data-attachment-id="3922" data-comments-opened="1" data-dcnode-id="1986" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-8" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-8.png?w=840" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-8.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-8.png" data-orig-size="1200,958" data-permalink="https://milenapetrofigsblog.wordpress.com/image-8-2/" height="229" loading="lazy" sizes="(max-width: 288px) 85vw, 288px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-8.png%3Fw%3D1024&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-8.png?w=288 288w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-8.png?w=574 574w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-8.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-8.png?w=300 300w" width="288"><figcaption data-dcnode-id="1980"><em data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Rigoletto set design by Philippe Chaperon</span></em><span data-dcnode-id="1983" instrument_node=""> </span><em data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">for La Fenice première on March 11 1851 in Venice. </span></em></figcaption></figure></div><span data-dcnode-id="1977" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1960"><span data-dcnode-id="1976" instrument_node="">This was the first of a sequence of three operas followed by</span><em data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node=""> Il trovatore</span></em><span data-dcnode-id="1973" instrument_node="">&nbsp;and&nbsp;</span><em data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">La traviata</span></em><span data-dcnode-id="1970" instrument_node=""> which were to cement his fame as a master of opera.&nbsp;The failure of&nbsp;</span><em data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Stiffelio</span></em><span data-dcnode-id="1967" instrument_node="">&nbsp;attributable not least to the censors of the time taking offence at the taboo subject of the supposed adultery of a clergyman’s wife and interfering with the text and roles incited Verdi to take pains to rework it although even in the completely recycled version of </span><em data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Aroldo </span></em><span data-dcnode-id="1964" instrument_node="">in 1857 it still failed to please.&nbsp;</span><em data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Rigoletto</span></em><span data-dcnode-id="1961" instrument_node=""> with its intended murder of royalty and its sordid attributes also upset the censors. Verdi would not compromise.</span></p><span data-dcnode-id="1959" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1954"><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">What does the sack matter to the police? Are they worried about the effect it will produce?…Do they think they know better than I?…I see the hero has been made no longer ugly and hunchbacked! Why? A singing hunchback…why not?…I think it splendid to show this character as outwardly deformed and ridiculous and inwardly passionate and full of love. I chose the subject for these very qualities…if they are removed I can no longer set it to music.</span></p><cite data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Verdi’s letter to Piave</span></cite></blockquote><span data-dcnode-id="1953" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1948"><span data-dcnode-id="1952" instrument_node="">Verdi substituted a Duke for the King and the public response and subsequent success of the opera all over Italy and Europe fully vindicated the composer. Aware that the melody of the Duke’s song </span><em data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">La donna è mobile </span></em><span data-dcnode-id="1949" instrument_node="">meaning woman is fickle would become popular Verdi excluded it from orchestral rehearsals for the opera and rehearsed the tenor separately.</span></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1933"><span data-dcnode-id="1946" instrument_node="">Another factor was the changed political situation. The failure of the 1848 revolutions led both to some diminution of the Risorgimento ethos at least initially and a significant increase in theatre censorship. Reflected both in Verdi’s choices of plots dealing more with personal relationships than political conflict and in a partly consequent dramatic reduction in the operas of this period and in the number of choruses of the type which had first made him famous there are not only on average fewer choruses in the middle period operas compared to the early period but all the early operas commence with a chorus and only one </span><em data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">Luisa Miller</span></em><span data-dcnode-id="1943" instrument_node=""> of the middle period operas begin this way. Instead Verdi experiments with a variety of means such as a stage band in </span><em data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Rigoletto</span></em><span data-dcnode-id="1940" instrument_node="">, an aria for bass in </span><em data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Stiffelio</span></em><span data-dcnode-id="1937" instrument_node="">, a party scene in </span><em data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">La traviata</span></em><span data-dcnode-id="1934" instrument_node="">.</span></p><span data-dcnode-id="1932" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1921"><span data-dcnode-id="1931" instrument_node="">By the month of January in 1851 Verdi broke off relations with his parents and in April they were ordered to leave Sant’Agata. Verdi found new premises for them and helped them financially to settle into their new home. It may not be coincidental that all six Verdi operas written in the period 1849 to 1853  including </span><em data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">La battaglia, Luisa Miller, Stiffelio, Rigoletto, Il trovatore</span></em><span data-dcnode-id="1928" instrument_node="">&nbsp;and&nbsp;</span><em data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">La traviata</span></em><span data-dcnode-id="1925" instrument_node=""> have uniquely in his oeuvre heroines who are in an opera critic’s words “….</span><em data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">women who come to grief because of sexual transgression, actual or perceived</span></em><span data-dcnode-id="1922" instrument_node="">.” The psychologist Gerald Mendelssohn saw this choice of subjects as being influenced by Verdi’s uneasy passion for Strepponi.</span></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1906"><span data-dcnode-id="1919" instrument_node="">In the winter of 1851 and 1852 Verdi decided to go to Paris with Strepponi where he concluded an agreement with the Opéra to write what became </span><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Les vêpres siciliennes</span></em><span data-dcnode-id="1916" instrument_node="">, his first original work in the style of&nbsp;grand opera. The couple attended in February of 1852 a performance of&nbsp;Alexandre Dumas </span><em data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">fils’</span></em><span data-dcnode-id="1913" instrument_node=""> play </span><em data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">The Lady of the Camellias.</span></em><span data-dcnode-id="1910" instrument_node=""> Verdi immediately began to compose music for what would later become&nbsp;</span><em data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">La traviata</span></em><span data-dcnode-id="1907" instrument_node="">.</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1891"><span data-dcnode-id="1904" instrument_node="">After his visit to Rome for&nbsp;</span><em data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Il trovatore</span></em><span data-dcnode-id="1901" instrument_node="">&nbsp;in January of 1853 Verdi worked on completing&nbsp;</span><em data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">La traviata</span></em><span data-dcnode-id="1898" instrument_node=""> but with little hope of its success owing to his lack of confidence in any of the singers engaged for the season. In the eleven years up to and including&nbsp;</span><em data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Traviata</span></em><span data-dcnode-id="1895" instrument_node=""> Verdi had written sixteen operas. Over the next eighteen years up to&nbsp;</span><em data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Aida</span></em><span data-dcnode-id="1892" instrument_node=""> he wrote only six new works for the stage.</span></p><span data-dcnode-id="1890" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1883"><span data-dcnode-id="1889" instrument_node="">Verdi went to Naples early in January of 1858 to work with Somma on the libretto of the opera&nbsp;</span><em data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Gustave III</span></em><span data-dcnode-id="1886" instrument_node=""> which over a year later would become </span><em data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">Un ballo in maschera.</span></em></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1877"><span data-dcnode-id="1881" instrument_node="">Arriving at the villa in Sant’Agata in March of 1859 Verdi and Strepponi found the nearby city of&nbsp;Piacenza&nbsp;occupied by about six thousand Austrian troops who had made it their base to combat the rise of Italian interest in unification in the Piedmont region. In the ensuing second Italian war of independence the Austrians abandoned the region and began to leave Lombardy although they remained in control of the Venice region under the terms of the armistice signed at Villafranca. Verdi was disgusted at this outcome “…</span><em data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Where then is the independence of Italy, so long hoped for and promised?…Venice is not Italian? After so many victories, what an outcome… It is enough to drive one mad”</span></em><span data-dcnode-id="1878" instrument_node=""> he wrote to Clara Maffei.</span></p><span data-dcnode-id="1876" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">The war against Piedmont Sardinia and its ally France led to the Hapsburgs losing a major part of their territories in northern Italy and the conflict lasted from April to July in 1859. Earlier the French defeated the Austrians on the fourth of June at Magenta. The decisive battle took place on the twenty fourth of June in 1859 near Solferino where the Austrian army suffered a painful defeat. Austria was forced to cede Lombardy and the Austrians lost their possessions in Tuscany, Modena and Parma. This opened the way for the founding of of the Kingdom of Italy under the House of Savoy.</span></p><span data-dcnode-id="1873" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1869"><span data-dcnode-id="1872" instrument_node="">Verdi and Strepponi now decided on marriage. They travelled to&nbsp;Collonges sous Salève a village then part of Piedmont. The couple were married there on the twenty ninth of August in 1859 with only the coachman who had driven them there and the church bell ringer as witnesses. At the end of 1859 Verdi wrote to his friend&nbsp;Cesare De Santis. “…</span><em data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Since completing&nbsp;Ballo I have not made any more music, I have not seen any more music, I have not thought anymore about music. I don’t even know what colour my last opera is and I almost don’t remember it.”&nbsp;</span></em></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">He began to remodel Sant’Agata which took most of 1860 to complete and on which he continued to work for the next twenty years including a major work on a square room that became his workroom, his bedroom and his office. </span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1834"><span data-dcnode-id="1864" instrument_node="">Beginning in Naples in 1859 and spreading throughout Italy the slogan </span><em data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Viva VERDI</span></em><span data-dcnode-id="1861" instrument_node=""> was used as an acronym for&nbsp;</span><em data-dcnode-id="1842"><strong data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Viva</span></strong><span data-dcnode-id="1858" instrument_node="">&nbsp;</span><strong data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">V</span></strong><span data-dcnode-id="1855" instrument_node="">ittorio&nbsp;</span><strong data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">E</span></strong><span data-dcnode-id="1852" instrument_node="">manuele&nbsp;</span><strong data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">R</span></strong><span data-dcnode-id="1849" instrument_node="">e&nbsp;</span><strong data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">D</span></strong><span data-dcnode-id="1846" instrument_node="">‘</span><strong data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">I</span></strong><span data-dcnode-id="1843" instrument_node="">talia</span></em><span data-dcnode-id="1841" instrument_node=""> or </span><em data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Long live Victor Emmanuel King of Italy</span></em><span data-dcnode-id="1838" instrument_node=""> referring to&nbsp;Victor Emmanuel II. The growth of the identification of Verdi’s music with Italian nationalist politics perhaps began in the 1840s and in 1848, the nationalist leader&nbsp;Giuseppe Mazzini whom Verdi had met in London the previous year requested Verdi who complied to write a patriotic hymn. The opera in 1849 </span><em data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">La battaglia di Legnano </span></em><span data-dcnode-id="1835" instrument_node="">was an opera with a purpose while parts of Verdi’s earlier operas had frequently been taken up by the fighters of the Risorgimento. This time the composer had given the movement its own opera.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="1826"><span data-dcnode-id="1832" instrument_node="">
</span><figure class="alignright is-resized" data-dcnode-id="1827"><img alt="" class="wp-image-3929" data-attachment-id="3929" data-comments-opened="1" data-dcnode-id="1831" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-9" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-9.png?w=600" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-9.png?w=198" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-9.png" data-orig-size="600,908" data-permalink="https://milenapetrofigsblog.wordpress.com/image-9-2/" height="251" loading="lazy" sizes="(max-width: 165px) 85vw, 165px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-9.png%3Fw%3D600&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-9.png?w=165 165w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-9.png?w=330 330w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-9.png?w=99 99w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-9.png?w=198 198w" width="165"><figcaption data-dcnode-id="1828"><em data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Victor Emmanuel II</span></em></figcaption></figure></div><span data-dcnode-id="1825" instrument_node="">
</span><p class="inline-ad-slot" data-adtags-visited="true" data-adtags-width="446" data-dcnode-id="1824" id="inline-ad-1" style="float:left;height:0px;margin:0 auto;overflow:hidden;width:446px;"></p><p data-adtags-visited="true" data-dcnode-id="1819"><span data-dcnode-id="1823" instrument_node="">After 1815 music became a political tool and many songwriters expressed ideals of freedom and equality. Verdi was part of this movement for his operas were inspired by the love of country, the struggle for Italian independence and speak to the sacrifice of patriots and exiles.&nbsp;Acclaimed as the greatest artist of the&nbsp;</span><em data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Risorgimento</span></em><span data-dcnode-id="1820" instrument_node=""> throughout Verdi’s work its values, its issues reoccur constantly and he expressed them with great power.</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1813"><span data-dcnode-id="1817" instrument_node="">Verdi was elected as a member of the new provincial council in 1859 and was appointed to head a group of five who would meet with King Vittorio Emanuele II in Turin. They were enthusiastically greeted along the way and in Turin Verdi himself received much of the publicity. On the seventeenth of October Verdi met with&nbsp;Cavour the architect of the initial stages of Italian unification.&nbsp;Later that year the government of Emilia was subsumed under the United Provinces of Central Italy and Verdi’s political life temporarily came to an end. Whilst still maintaining nationalist feelings he declined in 1860 the office of provincial council member to which he had been elected&nbsp;</span><em data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">in absentia</span></em><span data-dcnode-id="1814" instrument_node="">. Cavour was anxious to convince a man of Verdi’s stature that running for political office was essential to strengthening and securing Italy’s future.&nbsp;</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">The composer confided to Piave some years later that he had accepted on the condition that after a few months he would have resigned.&nbsp;Verdi was elected on the third of February in 1861 for the town of Borgo San Donnino in Fidenza to the Parliament of&nbsp;Piedmont Sardinia&nbsp;in Turin which from March in 1861 became the Parliament of the Kingdom of Italy but following the death of Cavour in 1861 which he scarcely attended.&nbsp;Later in 1874 Verdi was appointed a member of the&nbsp;Italian Senate but did not participate in its activities.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1798"><span data-dcnode-id="1808" instrument_node="">Strepponi’s description of the operas of the 1860s and 1870s as being modern where Verdi described the earlier works in 1849 as the&nbsp;</span><em data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">cavatina</span></em><span data-dcnode-id="1805" instrument_node=""> operas was further indication that Verdi became increasingly dissatisfied with the older familiar conventions of his predecessors that he had adopted at the outset of his career. The physical differentiation of the operas from&nbsp;</span><em data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">Les vêpres siciliennes</span></em><span data-dcnode-id="1802" instrument_node="">&nbsp;of 1855 to&nbsp;</span><em data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Aida</span></em><span data-dcnode-id="1799" instrument_node="">&nbsp;in 1871 is that they are significantly longer and with larger cast lists than previous works. </span></p><span data-dcnode-id="1797" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="1790"><span data-dcnode-id="1796" instrument_node="">
</span><figure class="alignright is-resized" data-dcnode-id="1791"><img alt="" class="wp-image-3931" data-attachment-id="3931" data-comments-opened="1" data-dcnode-id="1795" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-10" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-10.png?w=760" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-10.png?w=223" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-10.png" data-orig-size="1200,1616" data-permalink="https://milenapetrofigsblog.wordpress.com/image-10-2/" height="245" loading="lazy" sizes="(max-width: 181px) 85vw, 181px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-10.png%3Fw%3D760&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-10.png?w=181 181w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-10.png?w=362 362w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-10.png?w=111 111w" width="181"><figcaption data-dcnode-id="1792"><em data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Cavatina opera</span></em></figcaption></figure></div><span data-dcnode-id="1789" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1784"><span data-dcnode-id="1788" instrument_node="">They also reflect a shift towards the French genre of grand opera notable in more colourful orchestration, counterpointing of serious and comic scenes and greater spectacle.&nbsp;The opportunities of transforming Italian opera by utilising such resources appealed to him. For a commission from the Paris Opéra he expressly demanded a libretto from Eugène Scribe the favoured librettist of Meyerbeer telling him “…</span><em data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">I want, in fact, I must have a grandiose, impassioned and original subject.</span></em><span data-dcnode-id="1785" instrument_node="">” </span></p><span data-dcnode-id="1783" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1757"><span data-dcnode-id="1782" instrument_node="">The result was&nbsp;</span><em data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Les vêpres siciliennes</span></em><span data-dcnode-id="1779" instrument_node=""> and the scenarios of&nbsp;</span><em data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Simon Boccanegra</span></em><span data-dcnode-id="1776" instrument_node="">&nbsp;in 1857,&nbsp;</span><em data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Un ballo in maschera</span></em><span data-dcnode-id="1773" instrument_node="">&nbsp;in 1859,&nbsp;</span><em data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">La forza del destino</span></em><span data-dcnode-id="1770" instrument_node="">&nbsp;in 1862,&nbsp;</span><em data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Don Carlos</span></em><span data-dcnode-id="1767" instrument_node="">&nbsp;in 1865 and&nbsp;</span><em data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Aida</span></em><span data-dcnode-id="1764" instrument_node="">&nbsp;in 1872 all meet the same criteria. The work of&nbsp;</span><em data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Un ballo</span></em><span data-dcnode-id="1761" instrument_node="">&nbsp;marks an almost complete synthesis of Verdi’s style with the grand opera hallmarks such that huge spectacle is not mere decoration but essential to the drama, musical and theatrical lines remain taut and the characters still sing as warmly, passionately and personally as in&nbsp;</span><em data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Il trovatore</span></em><span data-dcnode-id="1758" instrument_node="">.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1745"><span data-dcnode-id="1755" instrument_node="">Verdi&nbsp;and Giuseppina spent late 1866 and much of 1867 in Paris where they heard and did not warm to Giacomo Meyerbeer’s last opera </span><em data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">L’Africaine</span></em><span data-dcnode-id="1752" instrument_node=""> and&nbsp;Richard Wagner’s overture to&nbsp;</span><em data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Tannhāuser</span></em><span data-dcnode-id="1749" instrument_node="">. The opera’s premiere in 1867 drew mixed comments. While the critic Théophile Gautier praised the work, the composer Georges Bizet was disappointed at Verdi’s changing style with the remark “…</span><em data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Verdi is no longer Italian. He is following Wagner.</span></em><span data-dcnode-id="1746" instrument_node="">“</span></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1737"><em data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Aida </span></em><span data-dcnode-id="1741" instrument_node="">was commissioned by the Egyptian government for the opera house&nbsp;built by the&nbsp;Khedive Isma’il Pasha to celebrate the opening of the Suez Canal in 1869. The opera house actually opened with a production of&nbsp;</span><em data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Rigoletto</span></em><span data-dcnode-id="1738" instrument_node="">. The prose libretto in French by&nbsp;Camille du Locle based on a scenario by the egyptologist Auguste Mariette was transformed to Italian verse by Antonio Ghislanzoni&nbsp;and it was first performed in Cairo in 1871.</span></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1719"><span data-dcnode-id="1735" instrument_node="">During the rehearsals for the Naples production of&nbsp;</span><em data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Aida</span></em><span data-dcnode-id="1732" instrument_node="">&nbsp;Verdi amused himself by writing his only string quartet in a sprightly work which shows in its last movement that he had not lost the skill for fugue writing that he had learned with Lavigna. By the time&nbsp;</span><em data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Otello</span></em><span data-dcnode-id="1729" instrument_node="">&nbsp;premièred in 1887 more than fifteen years after&nbsp;</span><em data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Aida</span></em><span data-dcnode-id="1726" instrument_node=""> the operas of Verdi’s contemporary Richard Wagner had begun their ascendancy in popular taste and many sought or identified Wagnerian aspects in Verdi’s latest composition.&nbsp;There is little in the music of&nbsp;</span><em data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Otello</span></em><span data-dcnode-id="1723" instrument_node="">&nbsp;that relates either to the</span><em data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node=""> verismo</span></em><span data-dcnode-id="1720" instrument_node="">&nbsp;opera of the younger Italian composers and little if anything which can be construed as a homage to the new German school.</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1707"><span data-dcnode-id="1717" instrument_node="">In&nbsp;</span><em data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Otello</span></em><span data-dcnode-id="1714" instrument_node="">&nbsp;Verdi had miniaturized the forms of romantic Italian opera of the </span><em data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">ottocento</span></em><span data-dcnode-id="1711" instrument_node="">. Six years later in&nbsp;</span><em data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Falstaff</span></em><span data-dcnode-id="1708" instrument_node="">&nbsp;he miniaturized himself. Moments crystallize a feeling as though an aria or duet had been precipitated into a phrase. The listener is bombarded by a stunning diversity of rhythms, orchestral textures, melodic motifs and harmonic devices. Passages that in earlier times would have furnished material for an entire number here crowd in on each other shouldering themselves unceremoniously to the fore in bewildering succession.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1698"><span data-dcnode-id="1705" instrument_node="">The first performance of&nbsp;</span><em data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Falstaff</span></em><span data-dcnode-id="1702" instrument_node="">&nbsp;took place at La Scala on the ninth of February in 1893. For the first night official ticket prices were thirty times higher than usual. Royalty, aristocracy, critics and leading figures from the arts all over Europe were present. The performance was a huge success with numerous encores at the end when the applause for Verdi and the cast lasted an hour. The tumultuous welcome was followed when the composer arrived at the&nbsp;Grand Hotel de Milan.&nbsp;Even more hectic scenes ensued when he went to Rome in May for the opera’s premiere at the&nbsp;</span><em data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Teatro Costanzi</span></em><span data-dcnode-id="1699" instrument_node=""> when crowds of greeters at the railway station initially forced Verdi to take refuge in a tool shed. He witnessed the performance from the royal box at the side of&nbsp;King Umberto&nbsp;and the Queen.</span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Verdi’s last three major works continued to show new development in conveying drama and emotion. The first to appear in 1874 was his Requiem scored for operatic forces but by no means an opera in ecclesiastical dress.  </span></p><span data-dcnode-id="1694" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">By the critical words in which Hans Von Bulow&nbsp;condemned it before even hearing it in the Requiem Verdi puts to use many of the techniques he learned in opera although its musical forms and emotions are not those of the stage.&nbsp;</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1686"><span data-dcnode-id="1690" instrument_node="">Verdi’s tone painting at the opening of the Requiem is vividly described by an Italian composer&nbsp;later in the words murmured by an invisible crowd over the slow swaying of a few simple chords straightaway sensing the fear and sadness of a vast multitude before the mystery of death. In the following </span><em data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Et lux perpetuum</span></em><span data-dcnode-id="1687" instrument_node="">&nbsp;the melody spreads it wings before falling back on itself.</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1677"><span data-dcnode-id="1684" instrument_node="">Verdi was never explicit about his religious beliefs. Anti clerical by nature in his early years&nbsp;he nonetheless had built a chapel at Sant’Agata but is little recorded as attending church. Strepponi wrote in 1871 “…</span><em data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">I won’t say Verdi is an atheist but he is not much of a believer.</span></em><span data-dcnode-id="1681" instrument_node="">” Rosselli commented that in the Requiem “</span><em data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">…the prospect of Hell appears to rule. The Requiem is troubled to the end</span></em><span data-dcnode-id="1678" instrument_node="">” and offers little consolation. </span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Three Italian&nbsp;conservatories, the Milan conservatory&nbsp;and those in Turin&nbsp;and Como&nbsp;are named after Verdi as are many Italian theatres.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="1666"><span data-dcnode-id="1672" instrument_node="">
</span><figure class="alignright is-resized" data-dcnode-id="1667"><img alt="" class="wp-image-3979" data-attachment-id="3979" data-comments-opened="1" data-dcnode-id="1671" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-17" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-17.png?w=800" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-17.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-17.png" data-orig-size="800,600" data-permalink="https://milenapetrofigsblog.wordpress.com/image-17/" height="197" loading="lazy" sizes="(max-width: 264px) 85vw, 264px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-17.png%3Fw%3D800&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-17.png?w=264 264w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-17.png?w=525 525w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-17.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-17.png?w=300 300w" width="264"><figcaption data-dcnode-id="1668"><em data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Milan Conservatory </span></em></figcaption></figure></div><span data-dcnode-id="1665" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1660"><span data-dcnode-id="1664" instrument_node="">Verdi’s hometown of Busseto displays&nbsp;Luigi Secchi’s statue of a seated Verdi in 1913 next to the Teatro Verdi built in his honour in the 1850s.&nbsp;It is one of many statues to the composer in Italy. The&nbsp;Giuseppe Verdi monument is a 1906 marble memorial sculpted by Pasquale Civiletti and is located in Verdi Square&nbsp;in New York City’s Manhattan. The monument includes a statue of Verdi himself and life sized statues of four characters from his operas Aida, Otello and Falstaff from the operas of the same names and Leonora from&nbsp;</span><em data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">La forza del destino</span></em><span data-dcnode-id="1661" instrument_node="">.</span></p><span data-dcnode-id="1659" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="1651"><span data-dcnode-id="1658" instrument_node="">
