</span><header class="entry-header" data-dcnode-id="2545"><span data-dcnode-id="2550" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="2547"><a data-dcnode-id="2548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/03/31/iron-lady/" rel="bookmark"><span data-dcnode-id="2549" instrument_node="">Iron Lady</span></a></h2><span data-dcnode-id="2546" instrument_node=""> </span></header><span data-dcnode-id="2543" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2382"><span data-dcnode-id="2542" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="2537"><img alt="" class="wp-image-4052" data-attachment-id="4052" data-comments-opened="1" data-dcnode-id="2541" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-23" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-23.png?w=840" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-23.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-23.png" data-orig-size="1200,675" data-permalink="https://milenapetrofigsblog.wordpress.com/image-23/" height="353" loading="lazy" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-23.png%3Fw%3D1024&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-23.png?w=1024 1024w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-23.png?w=627 627w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-23.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-23.png?w=300 300w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-23.png?w=768 768w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-23.png 1200w" width="627"><figcaption data-dcnode-id="2538"><em data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Tour Eiffel</span></em></figcaption></figure><span data-dcnode-id="2536" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2528"><span data-dcnode-id="2535" instrument_node="">The design of the Eiffel Tower is attributed to Maurice Koechlin and Émile Nouguier the two senior engineers working for the </span><em data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">Compagnie des Établissements Eiffel.</span></em><span data-dcnode-id="2532" instrument_node=""> It was envisioned after discussion about a suitable centrepiece for the proposed 1889 </span><em data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Exposition Universelle </span></em><span data-dcnode-id="2529" instrument_node="">a world’s fair to celebrate the centennial of the French Revolution. Gustave Eiffel who specialized in building large scale metal structures for bridges, train stations and aqueducts acknowledged that inspiration&nbsp;for the wrought iron lattice tower came from the Latting Observatory built in New York City in 1853.</span></p><span data-dcnode-id="2527" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2522"><span data-dcnode-id="2526" instrument_node="">Presenting his plans to the&nbsp;</span><em data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Société des Ingénieurs Civils</span></em><span data-dcnode-id="2523" instrument_node=""> after discussing the technical problems and emphasising the practical uses of the tower Eiffel finished his talk by saying the tower would symbolise</span></p><span data-dcnode-id="2521" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2516"><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">…not only the art of the modern engineer but also the century of Industry and Science in which we are living and for which the way was prepared by the great scientific movement of the eighteenth century and by the Revolution of 1789 to which this monument will be built as an expression of France’s gratitude.</span></p><cite data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">Gustave Eiffel</span></cite></blockquote><span data-dcnode-id="2515" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="2509"><figure class="alignright is-resized" data-dcnode-id="2510"><img alt="" class="wp-image-4044" data-attachment-id="4044" data-comments-opened="1" data-dcnode-id="2514" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-22" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-22.png?w=602" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-22.png?w=237" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-22.png" data-orig-size="602,763" data-permalink="https://milenapetrofigsblog.wordpress.com/image-22/" height="333" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-22.png%3Fw%3D602&amp;raw" width="261"><figcaption data-dcnode-id="2511"><em data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Latting Obervatory in New York  1853.</span></em></figcaption></figure></div><span data-dcnode-id="2508" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Little progress was made until 1886 when Jules Grévy was elected as president of France again and Edouard Lockroy was appointed as minister for trade. A budget for the exposition was passed and on the first of May when Lockroy announced an alteration to the terms of the open competition being held for a centrepiece to the exposition this effectively made the selection of Eiffel’s design a foregone conclusion as entries had to include a study for a three hundred metre four sided metal tower on the Champ de Mars.</span></p><span data-dcnode-id="2505" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">A  commission was set up to examine Eiffel’s herculean scheme and its rivals which a month later decided that all the proposals except Eiffel’s were either impractical or lacking in details. After some debate about the exact location of the tower a contract was signed on the eighth of January in 1887. The engineer signed it acting in his own capacity rather than as the representative of his company and the contract granting him one and a half million francs toward the construction costs had been less than a quarter of the estimated six and a half million francs. Eiffel was to receive all income from the commercial exploitation of the tower during the exhibition and for the next twenty years. He later established a separate company to manage the tower putting up half the necessary capital himself.</span></p><span data-dcnode-id="2502" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">There were no serious injuries or deaths during the construction of the Eiffel Tower when at the time it was the highest man made structure. Standing out against the Paris skyline the historic tower has grown for the fourth time and had another twenty feet added to its nine hundred and eighty feet on the original landmark.</span></p><span data-dcnode-id="2499" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">The proposed tower had been a subject of controversy drawing criticism from those who did not believe it was feasible and those who objected on artistic grounds. Prior to the Eiffel Tower’s construction nothing had ever been constructed to a height of three hundred metres or even twenty metres for that matter&nbsp;and many people believed it was impossible. These objections were an expression of a long standing debate in France about the relationship between architecture and engineering.</span></p><span data-dcnode-id="2496" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2491"><p data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">My tower will be the tallest edifice ever erected by man. Will it not also be grandiose in its way? And why would something admirable in Egypt become hideous and ridiculous in Paris?</span></p><cite data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Gustave Eiffel</span></cite></blockquote><span data-dcnode-id="2490" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2485"><span data-dcnode-id="2489" instrument_node="">A Committee of Three Hundred with one member for each metre of the tower’s height was formed led by the prominent architect Charles Garnier including some of the most important figures of the arts such as&nbsp;William Adolphe Bougereau, Guy de Maupassant,&nbsp;Charles Gounod and&nbsp;Jules Massenet. A petition called Artists against the Eiffel Tower was sent to the Minister of Works and Commissioner for the Exposition&nbsp;Adolphe Alphand and it was published by </span><em data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Le Temps </span></em><span data-dcnode-id="2486" instrument_node="">on the fourteenth of February in 1887.</span></p><span data-dcnode-id="2484" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">These criticisms were also dealt with by Édouard Lockroy in a letter of support written to Alphand sardonically saying that judging by the stately swell of the rhythms, the beauty of the metaphors, the elegance of its delicate and precise style one can tell the protest was the result of collaboration of the most famous writers and poets of our time and he explained that the protest was irrelevant since the project had been decided upon months before and construction on the tower was already under way.</span></p><span data-dcnode-id="2481" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Garnier was a member of the Tower Commission that had examined the various proposals and had raised no objection. Eiffel was similarly unworried pointing out to journalists that it was premature to judge the effect of the tower solely on the basis of the drawings, that the Champ de Mars was distant enough from the monuments mentioned in the protest for there to be little risk of the tower overwhelming them and putting the aesthetic argument for the tower.</span></p><span data-dcnode-id="2478" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2470"><span data-dcnode-id="2477" instrument_node="">The main structural work was completed at the end of March in 1889 and Eiffel celebrated by leading a group of government officials accompanied by representatives of the press to the top of the tower. Because the lifts were not yet in operation the ascent was made by foot and took over an hour with Eiffel stopping frequently to explain various features. Most of the party chose to stop at the lower levels but a few including the structural engineer Émile Nouguier the head of construction, Jean Compagnon the President of the City Council and reporters from </span><em data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Le Figaro</span></em><span data-dcnode-id="2474" instrument_node="">&nbsp;and </span><em data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">Le Monde Illustré</span></em><span data-dcnode-id="2471" instrument_node="">&nbsp;completed the ascent. Eiffel hoisted a large tricolour&nbsp;to the accompaniment of a twenty five gun salute fired at the first level.</span></p><span data-dcnode-id="2469" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2464"><img alt="" class="wp-image-4209" data-attachment-id="4209" data-comments-opened="1" data-dcnode-id="2468" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="image" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image.jpg?w=840" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image.jpg?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image.jpg" data-orig-size="1165,853" data-permalink="https://milenapetrofigsblog.wordpress.com/2022/03/31/iron-lady/image-31/" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/04/image.jpg%3Fw%3D1024&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/04/image.jpg?w=1024 1024w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image.jpg?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image.jpg?w=300 300w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image.jpg?w=768 768w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image.jpg 1165w"><figcaption data-dcnode-id="2465"><em data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Le Monde Illustré</span></em></figcaption></figure><span data-dcnode-id="2463" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Constructing lifts to reach the first level was relatively straightforward. The legs were wide enough at the bottom and so nearly straight that they could contain a straight track and a contract was given to the French company Roux, Combaluzier &amp; Lepape for two lifts to be fitted in the east and west legs. Installing lifts to the second level was more of a challenge because a straight track was impossible. No French company wanted to undertake the work. The European branch of&nbsp;Otis Brothers and Company&nbsp;submitted a proposal but this was rejected. The fair’s charter ruled out the use of any foreign material in the construction of the tower. The deadline for bids was extended but still no French companies put themselves forward and eventually the contract was given to Otis in July 1887.</span></p><span data-dcnode-id="2460" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2455"><p data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Monsieur Eiffel the Engineer and the brave builder of so gigantic and original specimen of modern Engineering from one who has the greatest respect and admiration for all Engineers including the Great Engineer the Bon Dieu</span></p><cite data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Thomas Edison</span></cite></blockquote><span data-dcnode-id="2454" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Eiffel had a permit for the tower to stand for twenty years. It was to be dismantled in 1909 when its ownership would revert to the City of Paris. The City had planned to tear it down as part of the original contest rules for designing a tower was that it should be easy to dismantle but as the tower proved to be valuable for radio telegraphy it was allowed to remain after the expiry of the permit and from 1910 it also became part of the International Time Service.</span></p><span data-dcnode-id="2451" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2445"><img alt="" class="wp-image-4061" data-attachment-id="4061" data-comments-opened="1" data-dcnode-id="2450" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-25" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-25.png?w=840" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-25.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-25.png" data-orig-size="3375,450" data-permalink="https://milenapetrofigsblog.wordpress.com/image-25/" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-25.png%3Fw%3D1024&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-25.png?w=1024 1024w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-25.png?w=2048 2048w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-25.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-25.png?w=300 300w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-25.png?w=768 768w"><figcaption data-dcnode-id="2446"><em data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">Paris and its suburbs from the top of the Eiffel Tower</span></em><span data-dcnode-id="2447" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="2444" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2439"><span data-dcnode-id="2443" instrument_node="">For the 1900 </span><em data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">Exposition Universelle</span></em><span data-dcnode-id="2440" instrument_node=""> the lifts in the east and west legs were replaced by lifts running as far as the second level constructed by the French firm Fives-Lille. These had a compensating mechanism to keep the floor level as the angle of ascent changed at the first level and were driven by a similar hydraulic mechanism as the Otis lifts although this was situated at the base of the tower.&nbsp;</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">On the nineteenth of October in 1901 Alberto Santos Dumont flying his number six airship won a hundred thousand franc prize offered by&nbsp;Henri Deutsch de la Meurthe&nbsp;for the first person to make a flight from Saint Cloud to the Eiffel Tower and back in less than half an hour. </span></p><span data-dcnode-id="2435" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="2429"><figure class="alignright is-resized" data-dcnode-id="2430"><img alt="" class="wp-image-4063" data-attachment-id="4063" data-comments-opened="1" data-dcnode-id="2434" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-26" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-26.png?w=431" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-26.png?w=216" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-26.png" data-orig-size="431,600" data-permalink="https://milenapetrofigsblog.wordpress.com/image-26/" height="368" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-26.png%3Fw%3D431&amp;raw" width="263"><figcaption data-dcnode-id="2431"><em data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Poster</span></em></figcaption></figure></div><span data-dcnode-id="2428" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">From 1925 to 1934 illuminated signs for&nbsp; Citroen adorned three of the tower’s sides making it the tallest advertising space in the world at the time. The tower was used in April 1935 to make experimental low resolution television transmissions using a shortwave&nbsp;transmitter of two hundred watts power. On the seventeenth of November an improved one hundred and eighty line transmitter was installed.</span></p><span data-dcnode-id="2425" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">The tower lost the title of the&nbsp; world’s tallest structure in the nineteen thirties when the Chrysler building&nbsp;in New York City was completed and in 1938 the decorative arcade around the first level was removed. </span></p><span data-dcnode-id="2422" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">A fire started in the television transmitter on the third of January in 1956 damaging the top of the tower. Repairs took a year and in 1957 the present radio aerial was added to the top.&nbsp;The Eiffel Tower was officially declared to be a historical monument in 1964 by the Minister of Cultural Affairs André Malraux. A year later an additional lift system was installed in the north pillar.</span></p><span data-dcnode-id="2419" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">The original lifts between the second and third levels were replaced after ninety seven years in service. These had been closed to the public between November and March in 1982 because the water in the hydraulic drive tended to freeze. The new cars operate in pairs with one counterbalancing the other and perform the journey in one stage reducing the journey time from eight minutes to less than two minutes. At the same time two new emergency staircases were installed replacing the original spiral staircases. </span></p><span data-dcnode-id="2416" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">The south pillar was fitted with an electrically driven Otis lift to serve the Jules Verne restaurant.&nbsp;The Fives-Lille lifts in the east and west legs fitted in 1899 were extensively refurbished in 1986. The cars were replaced and a computer system was installed to completely automate the lifts.</span></p><span data-dcnode-id="2413" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node=""> </span></p><span data-dcnode-id="2410" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="2404"><figure class="alignright is-resized" data-dcnode-id="2405"><img alt="" class="wp-image-4073" data-attachment-id="4073" data-comments-opened="1" data-dcnode-id="2409" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-27" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-27.png?w=330" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-27.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-27.png" data-orig-size="330,226" data-permalink="https://milenapetrofigsblog.wordpress.com/image-27/" height="212" loading="lazy" sizes="(max-width: 308px) 85vw, 308px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-27.png%3Fw%3D330&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-27.png?w=308 308w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-27.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-27.png?w=300 300w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-27.png 330w" width="308"><figcaption data-dcnode-id="2406"><em data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">The Eiffel Tower from below. The puddle iron or&nbsp;wrought iron on the square base of the Eiffel Tower weighs  seven thousand three hundred tonnes&nbsp;and the addition of lifts, shops and antennae have brought the total weight to approximately ten thousand one hundred&nbsp;tonnes.</span></em></figcaption></figure></div><span data-dcnode-id="2403" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2396"><span data-dcnode-id="2402" instrument_node="">When it was built many were shocked by the tower’s daring form. Eiffel was accused of trying to create something artistic with no regard to the principles of engineering. Eiffel and his team were experienced bridge builders who understood the importance of wind forces and knew that if they were going to build the tallest structure in the world they had to be sure it could withstand them. The newspaper </span><em data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Le Temps</span></em><span data-dcnode-id="2399" instrument_node="">&nbsp;had published on the fourteenth of February in 1887 Eiffel’s interview where he had stated …</span><em data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">is it not true that the very conditions which give strength also conform to the hidden rules of harmony? Now to what phenomenon did I have to give primary concern in designing the Tower? It was wind resistance. Well then! I hold that the curvature of the monument’s four outer edges which is as mathematical calculation dictated it should be … will give a great impression of strength and beauty for it will reveal to the eyes of the observer the boldness of the design as a whole.</span></em></p><span data-dcnode-id="2395" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="2389"><figure class="alignright is-resized" data-dcnode-id="2390"><img alt="" class="wp-image-4082" data-attachment-id="4082" data-comments-opened="1" data-dcnode-id="2394" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-28" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-28.png?w=330" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-28.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-28.png" data-orig-size="330,248" data-permalink="https://milenapetrofigsblog.wordpress.com/image-28/" height="248" loading="lazy" sizes="(max-width: 330px) 85vw, 330px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-28.png%3Fw%3D330&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-28.png 330w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-28.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-28.png?w=300 300w" width="330"><figcaption data-dcnode-id="2391"><em data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">A replica of the Paris Las Vegas Hotel in Nevada in the United States.</span></em></figcaption></figure></div><span data-dcnode-id="2388" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Eiffel Tower has been the inspiration for the creation of many replicas and similar towers. An early example is Blackpool Towers&nbsp;in England opened in 1894 and is about one hundred and sixty metres tall. Tokyo Tower in Japan built as a communications tower in 1958 was inspired by the Eiffel Tower. There are various scale models of the tower in the United States including a half scale version at the&nbsp;Paris Las Vegas in Nevada and one in Paris in Texas built in 1993. Two scale models can be found in China, one in&nbsp;Durango in Mexico which was donated by the local French community and several across Europe.</span></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2384"></p><span data-dcnode-id="2383" instrument_node="">
</span></div><span data-dcnode-id="2380" instrument_node="">

</span><article class="post-3987 post type-post status-publish format-standard hentry category-uncategorized" data-dcnode-id="2164" id="post-3987"><span data-dcnode-id="2350" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2344"><span data-dcnode-id="2349" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="2346"><a data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/03/17/a-sisters-testimony/" rel="bookmark"><span data-dcnode-id="2348" instrument_node="">A sister’s testimony</span></a></h2><span data-dcnode-id="2345" instrument_node=""> </span></header><span data-dcnode-id="2342" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2193"><span data-dcnode-id="2341" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2334"><span data-dcnode-id="2340" instrument_node="">
</span><figure class="alignleft size-large" data-dcnode-id="2335"><img alt="" class="wp-image-3988" data-attachment-id="3988" data-comments-opened="1" data-dcnode-id="2339" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-18" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-18.png?w=330" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-18.png?w=199" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-18.png" data-orig-size="330,497" data-permalink="https://milenapetrofigsblog.wordpress.com/image-18/" sizes="(max-width: 330px) 85vw, 330px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-18.png%3Fw%3D330&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-18.png 330w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-18.png?w=100 100w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-18.png?w=199 199w"><figcaption data-dcnode-id="2336"><em data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Edvige Mussolini by Federico Patellani, 1945. Born in Predappio on the tenth of November in 1888 Edvige who died in Rome on the twentieth of May in 1952 was the younger sister of&nbsp;Arnaldo and&nbsp;Benito Mussolini.</span></em></figcaption></figure></div><span data-dcnode-id="2333" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2328"><span data-dcnode-id="2332" instrument_node="">Edvige was the daughter of&nbsp; Alessandro Mussolini a blacksmith and activist, first anarchist and later socialist, as well as a town and district councillor of Predappio and Rosa Maltoni a schoolteacher who were the parents of Benito and Arnaldo Mussolini. After marrying Michele Mancini she moved from Predappio to&nbsp;Premilcuore where her husband became&nbsp;</span><em data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">podestà</span></em><span data-dcnode-id="2329" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="2327" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Following a local tradition the town was founded in the year 215 by a&nbsp;Roman centurion named Marcelliano who took refuge with some soldiers in the valley of&nbsp;the Rabbi&nbsp;river. First mentioned in 1124 it was part of the province of Florence&nbsp;in Tuscany until 1923.</span></p><span data-dcnode-id="2324" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">In the medieval Italian municipality the single magistracy which in substitution of the consulate represented its supreme executive body.  It was the position of head of the municipal administration during the fascist regime.</span></p><span data-dcnode-id="2321" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Mussolini believed that the government should control the mode of production, that working conditions needed to be improved and supported the creation of a society run by the working class.</span></p><span data-dcnode-id="2318" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">The father held Italian nationalist sentiments and idolized Italian nationalist figures with socialist or&nbsp;humanist tendencies such as&nbsp;Carlo Piscane,&nbsp;Giuseppe Mazzini and&nbsp;Giuseppe Garibaldi.&nbsp;Alessandro Mussolini’s political outlook combined the views of&nbsp;anarchist figures&nbsp;figures like&nbsp;Carlo Cafiero and&nbsp;Mikhail Bakunin, the military authoritarianism of Garibaldi and the nationalism of Mazzini. He taught his son about revolutionary leaders he admired such as&nbsp;Karl Marx.</span></p><span data-dcnode-id="2315" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2302"><span data-dcnode-id="2314" instrument_node="">
</span><figure class="alignright size-large is-resized" data-dcnode-id="2303"><img alt="" class="wp-image-3993" data-attachment-id="3993" data-comments-opened="1" data-dcnode-id="2313" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-19" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-19.png?w=375" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-19.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-19.png" data-orig-size="375,281" data-permalink="https://milenapetrofigsblog.wordpress.com/image-19/" height="238" loading="lazy" sizes="(max-width: 316px) 85vw, 316px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-19.png%3Fw%3D375&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-19.png?w=316 316w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-19.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-19.png?w=300 300w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-19.png 375w" width="316"><figcaption data-dcnode-id="2304"><em data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Premilcuore is a little hill town of the&nbsp;Apennine mountains below the Alpe di San Benedetto&nbsp;and&nbsp;Falterona mountains located at the borders of Romagna with Tuscany</span></em><span data-dcnode-id="2310" instrument_node="">. A </span><em data-dcnode-id="2305"><span data-dcnode-id="2309" instrument_node="">medieval old town with its fortress </span><em data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Rocca di Premilcuore</span></em><span data-dcnode-id="2306" instrument_node="">, palaces and churches it is also part of the&nbsp;Foreste Casentinesi, Monte Falterona and Campigna national Park.</span></em></figcaption></figure></div><span data-dcnode-id="2301" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Mussolini the law giver was appointed prime minister by King Victor Emmanuel becoming the youngest individual to hold the office up to that time. After removing all political opposition through his secret police and outlawing labour strikes Mussolini and his followers consolidated power through a series of laws that transformed the nation into a one party dictatorship. </span></p><span data-dcnode-id="2298" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Within five years Mussolini had established dictatorial authority by both legal and illegal means and aspired to create a totalitarian&nbsp;state. Mussolini signed the Lateran treaty in 1929&nbsp;with the Holy See to establish&nbsp;Vatican City.</span></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">The Italian politician and journalist Benito Amilcare Andrea Mussolini who founded and led the National Fascist Party was the prime minister of Italy from the March on Rome in 1922 until the deposition in 1943. </span></p><span data-dcnode-id="2292" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2281"><span data-dcnode-id="2291" instrument_node="">Mussolini was originally a socialist politician and a journalist at the&nbsp;</span><em data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">Avanti!</span></em><span data-dcnode-id="2288" instrument_node=""> newspaper. Becoming a member of the national directorate of the Italian Socialist Party&nbsp;PSI in 1912 he was expelled from the PSI for advocating military intervention in World War I in opposition to the party’s stance on neutrality. Instead Mussolini founded a new journal </span><em data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Il Popolo d’Italia </span></em><span data-dcnode-id="2285" instrument_node="">in 1914 and served in the Royal Italian Army&nbsp;under </span><em data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Vittorio Emmanuele III </span></em><span data-dcnode-id="2282" instrument_node="">during the war until he was wounded and discharged in 1917.</span></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2276"><em data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">Il Duce </span></em><span data-dcnode-id="2277" instrument_node="">was the founder of Italian fascism&nbsp;from the establishment of the&nbsp;Italian Fasces of Combat in 1919 until&nbsp;his execution in 1945 by&nbsp;Italian partisans. As dictator of Italy and principal founder of fascism Mussolini inspired and supported the international spread of fascist movements&nbsp;during the period between the wars.&nbsp;</span></p><span data-dcnode-id="2275" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Petroleum based energy production and associated mechanisation led to the prosperous Roaring Twenties in a time of both social and&nbsp;economic mobility for the middle class. Automobiles, electric lighting, radio among others became common among populations in the developed world. The indulgences of the era subsequently were followed by the&nbsp;Great Depression in an unprecedented worldwide economic downturn that severely damaged many of the world’s largest economies.</span></p><span data-dcnode-id="2272" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Politically the era coincided with the rise of communism starting in Russia with the October revolution and Russian civil war at the end of World War I and ended with the rise of fascism particularly in Germany and in Italy. </span></p><span data-dcnode-id="2269" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2263"><span data-dcnode-id="2268" instrument_node="">
</span><figure class="alignright size-large is-resized" data-dcnode-id="2264"><img alt="" class="wp-image-4005" data-attachment-id="4005" data-comments-opened="1" data-dcnode-id="2267" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-21" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-21.png?w=552" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-21.png?w=207" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-21.png" data-orig-size="552,800" data-permalink="https://milenapetrofigsblog.wordpress.com/image-21/" height="240" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-21.png%3Fw%3D552&amp;raw" width="168"><figcaption data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">Mussolini and Hitler</span></figcaption></figure></div><span data-dcnode-id="2262" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">China was in the midst of half a century of instability and the&nbsp;Chinese civil war between the Kuomintang&nbsp;and the&nbsp;Communist Party. The empires of Britain and France&nbsp;as of others faced challenges as&nbsp;imperialism was viewed negatively in Europe.</span></p><span data-dcnode-id="2259" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="2254"><img alt="" class="wp-image-4003" data-attachment-id="4003" data-comments-opened="1" data-dcnode-id="2258" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-20" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-20.png?w=840" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-20.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-20.png" data-orig-size="1200,1060" data-permalink="https://milenapetrofigsblog.wordpress.com/image-20/" height="285" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-20.png%3Fw%3D1024&amp;raw" width="325"><figcaption data-dcnode-id="2255"><em data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">The interwar period lasted from the eleventh of November in 1918 until the first of September 1939 and was relatively short between the end of the&nbsp;First World War to the beginning of the&nbsp;Second World War yet featured many significant social, political and economic changes throughout the world.&nbsp;  </span></em></figcaption></figure><span data-dcnode-id="2253" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">The Ottoman, Austro Hungarian and&nbsp;German empires&nbsp;were dismantled with the&nbsp;Ottoman and&nbsp;German colonies&nbsp;redistributed among the&nbsp;Allied powers chiefly Britain and France. The western parts of the Russian empire, Estonia, Latvia,&nbsp;Lithuania, Finland and Poland&nbsp;became independent nations in their own right and Bessarabia&nbsp;was renamed Moldova&nbsp;and parts of&nbsp;Ukraine chose to reunify with Romania.</span></p><span data-dcnode-id="2250" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">The territorial ambitions of the Soviets, Japanese, Italians and Germans led to the expansion of their domains. The era ended in September 1939 at the beginning of&nbsp;World War II. The Russian communists had managed to regain control of the other East Slavic states, Central Asia and the Caucasus forming the&nbsp;Soviet Union. Ireland was partitioned&nbsp;between the independent&nbsp;Irish Free State and the British had controlled Northern Ireland after the Irish civil war in which the Free State fought against anti treaty republicans who opposed partition. Egypt and Iraq had&nbsp;gained independence in the Middle East. During the Great Depression countries in Latin America nationalised many foreign companies most of which were American in a bid to strengthen their own economies.&nbsp;</span></p><span data-dcnode-id="2247" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">After Great Britain signed the Anglo Italian&nbsp;Easter Accords in 1938 Mussolini and Foreign Minister&nbsp;Galeazzo Ciano issued demands for concessions in the Mediterranean by France particularly regarding&nbsp;French Somaliland, Tunisia and the French run&nbsp;Suez Canal. Three weeks later Mussolini told Ciano that he intended for an Italian takeover of Albania.&nbsp;Mussolini professed that Italy would only be able to breathe easily if it had acquired a contiguous colonial domain in West Africa from the Atlantic to the Indian Oceans and when ten million Italians had settled in them.&nbsp;</span></p><span data-dcnode-id="2244" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Italy demanded a sphere of influence&nbsp;in 1938 over the Suez Canal in Egypt specifically demanding that the French dominated&nbsp;Suez Canal company accept an Italian representative on its board of directors.&nbsp;Italy opposed the French monopoly over the Suez Canal because under the French dominated Suez Canal Company all merchant traffic to the&nbsp;Italian East Africa colony was forced to pay tolls on entering the canal.</span></p><span data-dcnode-id="2241" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Italy sought the control of the Balearic Islands due to its strategic position. Italy could use the islands as a base to disrupt the lines of communication between France and its North and West African colonies and between British Gibraltar and Malta.&nbsp;After the victory by Franco and the Nationalists in the war Allied intelligence was informed that Italy was pressuring Spain to permit an Italian occupation of the Balearic Islands.</span></p><span data-dcnode-id="2238" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">In July 1936&nbsp;General Francisco Franco of the Nationalist faction in the&nbsp;Spanish civil war requested Italian support against the ruling Republican faction and guaranteed that if Italy supported the Nationalists future relations would be more than friendly and that Italian support would have permitted the influence of Rome to prevail over that of Berlin in the future politics of Spain. Italy intervened in the civil war with the intention of occupying the Balearic Islands and creating a&nbsp;client state&nbsp;in Spain.</span></p><span data-dcnode-id="2235" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">The civil war did not escalate into a larger conflict but did become a worldwide ideological battleground that pitted all the communists and many socialists and liberals against Catholics, conservatives and fascists. Worldwide there was a decline in pacifism and a growing sense that another great war was imminent and that it would be worth fighting for.</span></p><span data-dcnode-id="2232" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2227"><span data-dcnode-id="2231" instrument_node="">Mussolini’s aims were that Italy had to become the dominant power in the Mediterranean that would be able to challenge France or Britain as well as attain access to the&nbsp;Atlantic and Indian Oceans. The Italian leader alleged that Italy required uncontested access to the world’s oceans and shipping lanes to ensure its national sovereignty.&nbsp;This was elaborated on in a document he later drew up in 1939 called </span><em data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">The March to the Oceans </span></em><span data-dcnode-id="2228" instrument_node="">and included in the official records of a meeting of the&nbsp;Grand Council Fascism. The text asserted that maritime position determined a nation’s independence. Countries with free access to the high seas were independent while those who lacked this were not. Italy which only had access to an inland sea without French and British acquiescence in territorial waters was only a semi independent nation and alleged to be a prisoner in the Mediterranean.</span></p><span data-dcnode-id="2226" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2223"><p data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">The bars of this prison are&nbsp;Corsica, Tunisia, Malta and&nbsp;Cyprus. The guards of this prison are&nbsp;Gibraltar&nbsp;and Suez. Corsica is a pistol pointed at the heart of Italy, Tunisia at Sicily. Malta and Cyprus constitute a threat to all our positions in the eastern and western Mediterranean. </span></p></blockquote><span data-dcnode-id="2222" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2215"><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Greece, Turkey and&nbsp;Egypt&nbsp;have been ready to form a chain with Great Britain and to complete the political and military encirclement of Italy. Thus Greece, Turkey and Egypt must be considered vital enemies of Italy’s expansion. The aim of Italian policy which cannot have and does not have continental objectives of a European territorial nature except Albania, is first of all to break the bars of this prison. Once the bars are broken Italian policy can only have one motto to march to the oceans.</span></p><p data-dcnode-id="2216"><span data-dcnode-id="2219" instrument_node="">— Benito Mussolini, </span><strong data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">The March to the Oceans</span></strong></p></blockquote><span data-dcnode-id="2214" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">In 1940 his sister Edvige obtained the annulment of the sentence condemning the writer Pittigrilli&nbsp;known as Dino Segre accused of being an anti fascist to be locked up in the internment camp of&nbsp;L’Aquila.</span></p><span data-dcnode-id="2211" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node="">Her son Giuseppe Mancini was vice brigadier of the Sixth Company of the&nbsp;</span><em data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Tagliamento Legion</span></em><span data-dcnode-id="2207" instrument_node="">&nbsp;of the Republican National Guard who surrendered to the partisans and was killed on the twenty eighth of April in 1945 with forty two other comrades in the&nbsp;Rovetta massacre on the same day as his uncle Benito.</span></p><span data-dcnode-id="2205" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Edvige kept the diaries which according to some historians her brother Benito had written between 1935 and 1939. The five diaries and manuscripts have been extensively studied over the years to verify their authenticity. The diaries reveal an intimate and melancholic Mussolini&nbsp;frightened of&nbsp;Hitler, opposed to the war and indifferent to the Jews.</span></p><span data-dcnode-id="2202" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2197"><span data-dcnode-id="2201" instrument_node="">After the war Edvige was still very attached to her brother and her memoirs were collected and transcribed by Rosetta Ricci Crisolini in&nbsp;</span><em data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Mio fratello Benito</span></em><span data-dcnode-id="2198" instrument_node=""> published by La Fenice in Florence in 1957. In the book Edvige recounts her own memories, letters and conversations with her brother among other things.</span></p><span data-dcnode-id="2196" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2195"></p><span data-dcnode-id="2194" instrument_node="">
</span></div><span data-dcnode-id="2191" instrument_node="">
</span><footer class="entry-footer" data-dcnode-id="2167"><span data-dcnode-id="2190" instrument_node="">
</span><span class="byline" data-dcnode-id="2182"><span class="author vcard" data-dcnode-id="2183"><img alt="" class="avatar avatar-49 grav-hashed grav-hijack" data-dcnode-id="2189" height="49" id="grav-e712300d5a8681daa29a0099c8230545-3" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.gravatar.com/avatar/e712300d5a8681daa29a0099c8230545%3Fs%3D49%26d%3Didenticon%26r%3DG&amp;raw" width="49"><span class="screen-reader-text" data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">Author </span></span><span data-dcnode-id="2186" instrument_node=""> </span><a class="url fn n" data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/author/milenapetrovic129/"><span data-dcnode-id="2185" instrument_node="">Milenapetrofig</span></a></span></span><span class="posted-on" data-dcnode-id="2174"><span class="screen-reader-text" data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Posted on </span></span><a data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/03/17/a-sisters-testimony/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2178" datetime="2022-03-17T08:41:01+00:00"><span data-dcnode-id="2179" instrument_node="">March 17, 2022</span></time><time class="updated" data-dcnode-id="2176" datetime="2022-03-18T01:19:20+00:00"><span data-dcnode-id="2177" instrument_node="">March 18, 2022</span></time></a></span><span class="comments-link" data-dcnode-id="2169"><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/03/17/a-sisters-testimony/%23respond"><span data-dcnode-id="2173" instrument_node="">Leave a comment</span><span class="screen-reader-text" data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node=""> on A sister’s testimony</span></span></a></span><span data-dcnode-id="2168" instrument_node=""> </span></footer><span data-dcnode-id="2165" instrument_node="">

</span><article class="post-3917 post type-post status-publish format-standard hentry category-uncategorized" data-dcnode-id="1620" id="post-3917"><span data-dcnode-id="2161" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2155"><span data-dcnode-id="2160" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="2157"><a data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/03/11/aspects-of-verdi/" rel="bookmark"><span data-dcnode-id="2159" instrument_node="">Aspects of Verdi</span></a></h2><span data-dcnode-id="2156" instrument_node=""> </span></header><span data-dcnode-id="2153" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1649"><span data-dcnode-id="2152" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2138"><img alt="" class="wp-image-3945" data-attachment-id="3945" data-comments-opened="1" data-dcnode-id="2151" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-11" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-11.png?w=412" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-11.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-11.png" data-orig-size="412,245" data-permalink="https://milenapetrofigsblog.wordpress.com/image-11-2/" sizes="(max-width: 412px) 85vw, 412px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-11.png%3Fw%3D412&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-11.png 412w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-11.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-11.png?w=300 300w"><figcaption data-dcnode-id="2139"><em data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Giuseppe</span></em><span data-dcnode-id="2148" instrument_node=""> </span><em data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">Fortunino</span></em><span data-dcnode-id="2145" instrument_node=""> </span><em data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Francesco</span></em><span data-dcnode-id="2142" instrument_node=""> </span><em data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Verdi</span></em></figcaption></figure><span data-dcnode-id="2137" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2132"><span data-dcnode-id="2136" instrument_node="">As a young composer Verdi set his sights on Milan the cultural capital of northern Italy where he applied unsuccessfully to study at the Conservatory. Barezzi his patron made arrangements for him to become a private pupil of Vincenzo Lavigna who had been&nbsp;</span><em data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">maestro concertatore</span></em><span data-dcnode-id="2133" instrument_node="">&nbsp;at&nbsp;La Scala and who described Verdi’s compositions as very promising.&nbsp;Lavigna encouraged Verdi to take out a subscription to La Scala where he heard&nbsp;Malia Malibran in operas by&nbsp;Gioachino Rossini and&nbsp;Vincenzo Bellini. </span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2126"><span data-dcnode-id="2130" instrument_node="">The other director of the Philharmonic Society was&nbsp;Antonio Barezzi a wholesale grocer and distiller who was a dilettante of music. The young Verdi did not become involved with the Philharmonic immediately. By June 1827 in he had graduated with honours from the&nbsp;</span><em data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Ginnasio</span></em><span data-dcnode-id="2127" instrument_node="">&nbsp;and was able to focus solely on music under Provesi.</span></p><span data-dcnode-id="2125" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">In 1829 Verdi had completed his studies with Provesi who declared that he had no more to teach him. Barezzi commented that he showed a vivid imagination, a philosophical outlook and sound judgment in the arrangement of instrumental parts. At the time Verdi had been giving singing and piano lessons to Barezzi’s daughter Margherita and by 1831 they were unofficially engaged.</span></p><span data-dcnode-id="2122" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="2115"><span data-dcnode-id="2121" instrument_node="">
</span><figure class="alignleft is-resized" data-dcnode-id="2116"><img alt="" class="wp-image-3951" data-attachment-id="3951" data-comments-opened="1" data-dcnode-id="2120" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-13" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-13.png?w=255" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-13.png?w=233" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-13.png" data-orig-size="255,329" data-permalink="https://milenapetrofigsblog.wordpress.com/image-13-2/" height="329" loading="lazy" sizes="(max-width: 255px) 85vw, 255px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-13.png%3Fw%3D255&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-13.png 255w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-13.png?w=116 116w" width="255"><figcaption data-dcnode-id="2117"><em data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Margherita Barezzi, Verdi’s first wife</span></em></figcaption></figure></div><span data-dcnode-id="2114" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2100"><span data-dcnode-id="2113" instrument_node="">Verdi began making connections in the Milanese world of music that were to stand him in good stead. These included an introduction by Lavigna to an amateur choral group the&nbsp;</span><em data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Società Filarmonica</span></em><span data-dcnode-id="2110" instrument_node=""> led by Pietro Massini. Attending the&nbsp;</span><em data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Società</span></em><span data-dcnode-id="2107" instrument_node="">&nbsp;frequently in 1834 Verdi soon found himself functioning as rehearsal director for Rossini’s&nbsp;</span><em data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">La cerentola </span></em><span data-dcnode-id="2104" instrument_node="">and continuo player. It was Massini who encouraged him to write his first opera originally titled&nbsp;</span><em data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Rocester</span></em><span data-dcnode-id="2101" instrument_node=""> to a libretto by the journalist Antonio Piazza. </span></p><span data-dcnode-id="2099" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">He married Margherita in May in 1836 and by March in 1837 she had given birth to their first child Virginia Maria Luigia on the twenty sixth of March in 1837. A son  Icilio Romano followed on the eleventh of July in 1838. Both the children died young, Virginia on the twelfth of August in 1838 and Icilio on the twenty second of October in 1839.</span></p><span data-dcnode-id="2096" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2088"><span data-dcnode-id="2095" instrument_node="">The young composer asked for Massini’s assistance in 1837 to stage his opera in Milan.&nbsp;The La Scala impresario Bartolomeo Merelli agreed to put on&nbsp;</span><em data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">Oberto</span></em><span data-dcnode-id="2092" instrument_node=""> as the reworked opera was called. While Verdi was working on his second opera </span><em data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Un giorno di regno</span></em><span data-dcnode-id="2089" instrument_node="">&nbsp;Margherita died at the age of twenty six. Verdi adored his wife and children and was devastated by their early deaths.&nbsp;</span></p><span data-dcnode-id="2087" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2076"><span data-dcnode-id="2086" instrument_node="">Verdi was to claim that he gradually began to work on the music for&nbsp;</span><em data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Nabucco</span></em><span data-dcnode-id="2083" instrument_node=""> the libretto of which had originally been rejected by the composer&nbsp;Otto Nicolaï. “</span><em data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">This verse today, tomorrow that, here a note, there a whole phrase and little by little the opera was written,</span></em><span data-dcnode-id="2080" instrument_node="">” he later recalled. By the autumn of 1841 it was complete originally under the title&nbsp;</span><em data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Nabucodonosor</span></em><span data-dcnode-id="2077" instrument_node="">.</span></p><span data-dcnode-id="2075" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">At its revival in La Scala for the 1842 autumn season it was given an unprecedented and later unequalled total of fifty seven performances. Within three years it had reached among other venues Vienna, Lisbon, Barcelona, Berlin, Paris and Hamburg in 1848 and  it was heard in New York in 1850 and in Buenos Aires.</span></p><span data-dcnode-id="2072" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="2065"><span data-dcnode-id="2071" instrument_node="">
</span><figure class="alignright is-resized" data-dcnode-id="2066"><img alt="" class="wp-image-3956" data-attachment-id="3956" data-comments-opened="1" data-dcnode-id="2070" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-14" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-14.png?w=840" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-14.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-14.png" data-orig-size="841,683" data-permalink="https://milenapetrofigsblog.wordpress.com/image-14/" height="106" loading="lazy" sizes="(max-width: 132px) 85vw, 132px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-14.png%3Fw%3D841&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-14.png?w=132 132w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-14.png?w=261 261w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-14.png?w=150 150w" width="132"><figcaption data-dcnode-id="2067"><em data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Ponte Vecchio in Bassano</span></em></figcaption></figure></div><span data-dcnode-id="2064" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2050"><span data-dcnode-id="2063" instrument_node="">For the next two years except for two visits to Italy during periods of political unrest Verdi was based in Paris. Within a week of returning to Paris in July 1847 he received his first commission from the Paris Opéra. Verdi agreed to adapt&nbsp;</span><em data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">I Lombardi</span></em><span data-dcnode-id="2060" instrument_node="">&nbsp;to a new French libretto. The result was </span><em data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Jérusalem</span></em><span data-dcnode-id="2057" instrument_node=""> which contained significant changes to the music and structure of the work including an extensive&nbsp;ballet scene to meet Parisian expectations.&nbsp;Verdi was awarded the Order of Chevalier of the&nbsp;Legion of Honour. To satisfy his contracts with the publisher&nbsp;Francesco Lucca, Verdi dashed off </span><em data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Il Corsaro</span></em><span data-dcnode-id="2054" instrument_node="">. In no other opera of his does Verdi appear to have taken so little interest&nbsp;</span><em data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">before</span></em><span data-dcnode-id="2051" instrument_node="">&nbsp;it was staged.</span></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2041"><span data-dcnode-id="2048" instrument_node="">On hearing the news of the</span><em data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node=""> Cinque Giornate </span></em><span data-dcnode-id="2045" instrument_node="">as the five days of street fighting were named that took place between the eighteenth and twenty second of March 1848 and temporarily drove the Austrians out of Milan Verdi travelled there arriving on the fifth of April.&nbsp;He discovered that Piave was now Citizen Piave of the newly proclaimed republic of San Marco. Writing a patriotic letter to him in Venice Verdi concluded “</span><em data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Banish every petty municipal idea! We must all extend a fraternal hand and Italy will yet become the first nation of the world</span></em><span data-dcnode-id="2042" instrument_node="">.”</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Verdi had intended to return to Italy in early 1848 but was prevented by work and illness as well as most probably by his increasing attachment to Giuseppina Strepponi.</span></p><span data-dcnode-id="2037" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="2030"><span data-dcnode-id="2036" instrument_node="">
