</span><article class="post-4123 post type-post status-publish format-standard hentry category-uncategorized" data-dcnode-id="2679" id="post-4123"><span data-dcnode-id="3022" instrument_node="">
</span><header class="entry-header" data-dcnode-id="3016"><span data-dcnode-id="3021" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="3018"><a data-dcnode-id="3019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/04/07/trading-places/" rel="bookmark"><span data-dcnode-id="3020" instrument_node="">Trading places</span></a></h2><span data-dcnode-id="3017" instrument_node=""> </span></header><span data-dcnode-id="3014" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2708"><span data-dcnode-id="3013" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">English explorer, sea captain, privateer, slave trader, courtier and admiral Sir Francis Drake is best known for his circumnavigation of the world in a single expedition from 1577 to 1580 and by his incursion the vice admiral had sailed across the Pacific Ocean in 1579 explored then only by the Spanish and Portuguese. Drake eventually had sailed into the East Indies&nbsp;and had come across the Moluccas known as the Spice Islands and had met with&nbsp;Sultan Babullah. In return for linen, gold and silver a large haul of exotic spices including cloves&nbsp;and nutmeg&nbsp;had been traded.</span></p><span data-dcnode-id="3010" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">Drake&nbsp;had set out on an expedition from England in 1577 to plunder Spanish settlements in South America in search of gold and silver in the&nbsp;Golden Hind or Ceryneian Hind a galleon originally known as Pelican. A mythical creature that lived in Ceryneia in Greece&nbsp;was an enormous deer in Greek mythology. Drake had renamed the ship in the middle of the voyage in 1578 in honour of his patron Sir Christopher Hatton whose crest had been a golden hind.</span></p><span data-dcnode-id="3007" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="3000"><span data-dcnode-id="3006" instrument_node="">
</span><figure class="alignright is-resized" data-dcnode-id="3001"><img alt="" class="wp-image-4130" data-attachment-id="4130" data-comments-opened="1" data-dcnode-id="3005" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image.jpeg?w=96" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image.jpeg?w=96" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image.jpeg" data-orig-size="96,96" data-permalink="https://milenapetrofigsblog.wordpress.com/image-30/" height="163" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/04/image.jpeg&amp;raw" width="163"><figcaption data-dcnode-id="3002"><em data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">Map of New World discoveries.</span></em></figcaption></figure></div><span data-dcnode-id="2999" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Sir Francis Drake’s expedition had intended to pass around South America&nbsp;through the&nbsp;Strait of Magellan and to explore the coast that lay beyond. His claim to&nbsp;New Albion&nbsp;for England had been an area about the size the&nbsp;present state of California. Drake and his crew had found a protected cove when they had landed on the Pacific coast of Northern California. The expedition had inaugurated an era of conflict with the Spanish on the western coast of the Americas an area that previously had  been largely unexplored.&nbsp;</span></p><span data-dcnode-id="2996" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2987"><a data-dcnode-id="2995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bing.com/ck/a%3F%21%26%26p%3D90e1aff5bb20d590259c34302abf4a50f50810e9ebe38a5dcda416b2f84fb412JmltdHM9MTY0OTMyNTM3MCZpZ3VpZD0zMWIzMTNjNy0xYzE5LTRkYTktOTZhMy04ZGY5ZGNiMDliZWMmaW5zaWQ9NTg4Mw%26ptn%3D3%26fclid%3Df3bd7858-b658-11ec-b347-31694b193789%26u%3Da1aHR0cHM6Ly9lbi53aWtpcGVkaWEub3JnL3dpa2kvRnJhbmNpc19EcmFrZSUyN3NfQ2lyY3VtbmF2aWdhdGlvbj9tc2Nsa2lkPWYzYmQ3ODU4YjY1ODExZWNiMzQ3MzE2OTRiMTkzNzg5%26ntb%3D1" rel="noreferrer noopener" target="_blank"></a><span data-dcnode-id="2994" instrument_node="">During the early stages of the Age of Discovery&nbsp;the Treaty of Tordesillas&nbsp;which had divided&nbsp;the&nbsp;New World into</span><strong data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="2991" instrument_node="">Spanish and&nbsp;Portuguese zones had been signed by their respective monarchs and</span><strong data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="2988" instrument_node="">Pope Alexander VI.&nbsp;The Protestant Reformation in the early sixteenth century had resulted in Protestant nations of Europe that had not recognised Papal spiritual or temporal authority and subsequently had rejected the treaty. One of these nations had been England and in the 1560s King Philip II of Spain&nbsp;had been at a difference with Queen&nbsp;Elizabeth I following her restoration of royal supremacy over the Church of England&nbsp;through the Act of Supremacy in 1559. </span></p><span data-dcnode-id="2986" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">The Elizabethan Queen had awarded Drake a&nbsp;knighthood in 1581 which he had received on the Golden Hind&nbsp;in Deptford and in the same year had been appointed mayor of Plymouth. As the vice admiral he had been second in command of the English fleet in the victorious battle against the Spanish Armada in 1588. After unsuccessfully having attacked San Juan in Puerto Rico Drake had died of&nbsp;dysentery&nbsp;in January of 1596. London merchants had presented a petition to&nbsp;Queen Elizabeth I&nbsp;for permission to sail to the&nbsp;Indian Ocean and to travel around the globe. </span></p><span data-dcnode-id="2983" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">The aim had been to deliver a decisive blow to the Spanish and Portuguese monopoly of Far Eastern trade.&nbsp;Queen Elizabeth I had granted her permission and in April of 1591 James Lancaster&nbsp;in the&nbsp;Bonaventure with two other ships had sailed from Torbay&nbsp;around the&nbsp;Cape of Good Hope&nbsp;to the&nbsp;Arabian Sea on one of the earliest English overseas Indian expeditions. Having sailed around&nbsp;Cape Cormorin&nbsp;to the Malay peninsula&nbsp;they had preyed on Spanish and Portuguese ships there before having returned to England in 1594.</span></p><span data-dcnode-id="2980" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2975"><span data-dcnode-id="2979" instrument_node="">The biggest capture that had galvanised English trade was the seizure of a large Portuguese carrack&nbsp;named the&nbsp;</span><em data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">Madre de Deus </span></em><span data-dcnode-id="2976" instrument_node="">by Sir Walter Raleigh&nbsp;and the Earl of Cumberland at the&nbsp;Battle of Flores in August of 1592. When the ship had been brought in to Dartmouth&nbsp;as the largest vessel that had been seen in England her cargo had consisted of chests filled with jewels, pearls, gold, silver coins,&nbsp;ambergris, cloth, tapestries, pepper, cloves,&nbsp;cinnamon, nutmeg,&nbsp;benjamin from a tree that produces frankincense, red dye,&nbsp;cochineal&nbsp;and&nbsp;ebony.&nbsp;Equally valuable had been the ship’s rutter&nbsp;which was a mariner’s handbook containing vital information on the&nbsp;China, India and Japan trades. These riches had aroused the English traders to engage in the opulent commerce.</span></p><span data-dcnode-id="2974" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2966"><span data-dcnode-id="2973" instrument_node="">Three more English ships had sailed east but all were lost at sea. A year later trade had seen the arrival of an adventurer merchant Ralph Fitch who along with his companions had made a remarkable fifteen year overland journey to Mesopotamia, the Persian Gulf, the Indian Ocean, India and&nbsp;Southeast Asia.&nbsp;A group of merchants had met and had stated their intention in September of 1599 to venture in the pretended voyage to the East Indies </span><em data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">by</span></em><span data-dcnode-id="2970" instrument_node=""> </span><em data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">which it may please the Lord to prosper and the sums that they will adventure</span></em><span data-dcnode-id="2967" instrument_node="">.</span></p><span data-dcnode-id="2965" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2960"><span data-dcnode-id="2964" instrument_node="">A Charter had been granted by the Queen to George Earl Of Cumberland and more than two hundred knights, aldermen and burgesses under the name&nbsp;Governor and Company of Merchants of London trading into the East</span><strong data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node=""> </span></strong><span data-dcnode-id="2961" instrument_node="">Indies. For a period of fifteen years the charter had awarded the newly formed company a monopoly on English trade with all countries east of the Cape of Good Hope and west of the&nbsp;Straits of Magellan.&nbsp;Any traders in breach of the charter without a licence from the company had been liable to forfeiture of their ships and cargo half of which had gone to the Crown and the other half to the company as well as imprisonment at the royal pleasure. </span></p><span data-dcnode-id="2959" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">The company had decided to build its own ships in 1607 and had leased a yard on the&nbsp;River Thames at Deptford. By 1614 the yard having become too small, an alternative site had been acquired at Blackwall&nbsp;and the new yard had been operational by 1617. It was sold in 1656 although for some years East India Company ships had continued to be built and repaired there under the new owners. Their design as merchant vessels had meant that their performance in the warship role was underwhelming and the navy converted them to transports.</span></p><span data-dcnode-id="2956" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="2949"><span data-dcnode-id="2955" instrument_node="">
</span><figure class="alignright is-resized" data-dcnode-id="2950"><img alt="" class="wp-image-4180" data-attachment-id="4180" data-comments-opened="1" data-dcnode-id="2954" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-5" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-5.png?w=840" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-5.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-5.png" data-orig-size="1200,1035" data-permalink="https://milenapetrofigsblog.wordpress.com/image-5-4/" height="135" loading="lazy" sizes="(max-width: 157px) 85vw, 157px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/04/image-5.png%3Fw%3D1024&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-5.png?w=157 157w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-5.png?w=314 314w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-5.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-5.png?w=300 300w" width="157"><figcaption data-dcnode-id="2951"><em data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">Deptford</span></em></figcaption></figure></div><span data-dcnode-id="2948" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Sir James Lancaster had commanded the first East India Company voyage in 1601 aboard the&nbsp;Red Dragon. After having captured a rich Portuguese carrack in the&nbsp;Malacca Straits&nbsp;the trade from the booty had enabled the voyagers to set up two factories, one at Bantam&nbsp;on&nbsp;Java and another in the&nbsp;Moluccas or Spice Islands before leaving. When they had returned to England in 1603 to learn of Elizabeth’s death Lancaster had been knighted by the new king James I.</span></p><span data-dcnode-id="2945" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2940"><span data-dcnode-id="2944" instrument_node="">The Kingdom of England had ignored Spain’s long asserted claim of sovereignty over the entire continent. Spain’s similar claim to all of South America had been refuted when the Pope had divided that continent between it and Portugal in the Treaty of Tordesillas in 1494. Spain’s area of settlement had been limited to the southernmost parts of North America with little ability to enforce its sovereignty. Disregarding as did Spain the sovereignty of the indigenous nations England had claimed the entire continent though its western and northern boundaries had not been clear which it named&nbsp;</span><em data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">Virginia</span></em><span data-dcnode-id="2941" instrument_node="">&nbsp;in honour of the Virgin Queen.</span></p><span data-dcnode-id="2939" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2931"><span data-dcnode-id="2938" instrument_node="">England’s first successful settlement in North America had been Jamestown&nbsp;established by the Virginia Company of London&nbsp;in 1607 with the second being the Atlantic Ocean archipelago of&nbsp;Bermuda which had been added to the territory of the same company in 1612. The company had been in occupation of the archipelago since the 1609 wreck of its flagship the Sea Venture. Two areas of settlement in North America had been laid out in 1606 with the name&nbsp;</span><em data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">Virginia</span></em><span data-dcnode-id="2935" instrument_node="">&nbsp;coming to connote the southern area administered by the Virginia Company of London. The company’s name had been shortened to the&nbsp;</span><em data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">London Company</span></em><span data-dcnode-id="2932" instrument_node="">.</span></p><span data-dcnode-id="2930" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node=""> The  war with Spain had ended but the company had breached successfully and profitably the Spanish and Portuguese monopoly for new horizons had opened for the English. Originally&nbsp;chartered as the Governor and Company of Merchants of London Trading into the East Indies the company had struggled in the spice trade&nbsp;because of the competition from the already well established&nbsp;Dutch East India Company. The English company had opened a factory in Bantam on Java on its first voyage and imports of&nbsp;pepper from Java had remained an important part of the company’s trade for twenty years. The Bantam factory had closed in 1683.</span></p><span data-dcnode-id="2927" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2925" id="mntl-sc-block_1-0-7"><span data-dcnode-id="2926" instrument_node="">English traders had set up outposts which eventually had become the cities of Bombay, Madras and Calcutta. Numerous products including silk, cotton, sugar, tea and opium had begun to be exported out of India. In return English goods including wool, silver and other metals had been shipped to India.</span></p><span data-dcnode-id="2924" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2922" id="mntl-sc-block_1-0-11"><span data-dcnode-id="2923" instrument_node="">The company had found itself having to hire its own armies to defend trading posts. After the beginnings as a commercial enterprise it had become a military and diplomatic organization. Company ships had docked at&nbsp;Surat in&nbsp;Gujarat in 1608. The company had established its first Indian factory in 1611 at&nbsp;Masulipatnam on the&nbsp;Andhra coast of the Bay of Bengal and a second at Surat in 1613.&nbsp; The original trading post had been moved to Madras in 1639 where permission to build a fort had been obtained from the raja of Chandragiri&nbsp;in the southeast Indian fishing village. </span></p><span data-dcnode-id="2921" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2919" id="mntl-sc-block_1-0-11"><span data-dcnode-id="2920" instrument_node="">Portuguese traders had been settled in the San Thome area which is presently known as Chennai. Madras had been the shortened name of the weaving centres from which the company had obtained goods for export to Persia and the East Indies islands forming a wide belt on both sides of the equator for more than three thousand miles. It had become the headquarters of the company in south India in 1641. By 1652 the factory had been recognized as an administrative unit governed by a president and between 1668 and 1749 the first company settlement in India to be fortified had expanded its control.</span></p><span data-dcnode-id="2918" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2908"><span data-dcnode-id="2917" instrument_node="">
</span><figure class="alignright size-large is-resized" data-dcnode-id="2909"><img alt="" class="wp-image-4236" data-attachment-id="4236" data-comments-opened="1" data-dcnode-id="2916" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="img_0814" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/img_0814.jpg?w=661" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/img_0814.jpg?w=194" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/img_0814.jpg" data-orig-size="1239,1919" data-permalink="https://milenapetrofigsblog.wordpress.com/2022/04/07/trading-places/img_0814/" height="260" loading="lazy" sizes="(max-width: 167px) 85vw, 167px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/04/img_0814.jpg%3Fw%3D661&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/04/img_0814.jpg?w=167 167w, https://milenapetrofigsblog.files.wordpress.com/2022/04/img_0814.jpg?w=334 334w, https://milenapetrofigsblog.files.wordpress.com/2022/04/img_0814.jpg?w=97 97w" width="167"><figcaption data-dcnode-id="2910"><em data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node=""> Teresia, Lady Shirley</span></em><span data-dcnode-id="2913" instrument_node=""> </span><em data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">painted by Van Dyck in 1622 was a noblewoman of the Safavid empire. She was the wife of Elizabethan English adventurer Robert Shirley whom she accompanied on his travels and embassies across Europe in the name of the Safavid King Shah Abbas the ruler from 1588 to 1629.</span></em></figcaption></figure></div><span data-dcnode-id="2907" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2905" id="mntl-sc-block_1-0-11"><span data-dcnode-id="2906" instrument_node="">King James I had instructed Sir&nbsp;Thomas Roe&nbsp;to visit the Mughal Emperor Nur-ud-din Salim&nbsp;Jahangir as the ruler from 1605 to 1627 to arrange for a commercial treaty that had given the company exclusive rights to reside and establish factories in Surat and other areas. In return the company had offered to provide the Emperor with goods and rarities from the markets of Europe.</span></p><span data-dcnode-id="2904" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">Mughal emperor&nbsp;Shah Jahan had extended his hospitality in 1634 to the English traders to the region of&nbsp;Bengal&nbsp;and in 1717 customs duties had been waived for the English in Bengal. The company’s mainstay businesses had been by then cotton, silk, indigo dye, saltpetre and tea. The Dutch as aggressive competitors had expanded their monopoly of the spice trade in the Straits of Malacca&nbsp;by ousting the Portuguese in 1640 and 1641. With reduced Portuguese and Spanish influence in the region the English and Dutch companies had entered a period of intense competition resulting in the&nbsp;Anglo Dutch wars&nbsp;of the seventeenth and eighteenth centuries.</span></p><span data-dcnode-id="2901" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">The British East India Company fiercely competitive with the Dutch and French throughout the seventeenth and eighteenth centuries over spices from the&nbsp;Spice Islands had escalated into at least four Anglo Dutch&nbsp;wars. King Charles I had granted a trading licence to Sir&nbsp;William Courteen which had permitted the rivals to trade with the East at any location in which the English India Company would have had no presence.</span></p><span data-dcnode-id="2898" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">In an act aimed at strengthening their power King Charles II had granted the Company in a series of five acts around 1670 the rights to autonomous territorial acquisitions, to mint money, to command fortresses and troops and form alliances, to make war and peace and to exercise both civil and criminal jurisdiction over the acquired areas. </span></p><span data-dcnode-id="2895" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">The first of the&nbsp;Anglo Indian wars had&nbsp;occurred in 1686 when the company had conducted naval code against Shaista Khan the governor of&nbsp;Mughal Bengal.&nbsp;The Mughal fleet commanded by&nbsp;Sidi Yaqub in 1689 had&nbsp;attacked Bombay. After a year of resistance in the siege of Bengal the English had surrendered in 1690 and the company had sent envoys to Aurangzeb’s camp to plead for a pardon. The emperor had withdrawn his troops and the company subsequently had been established in Bombay and had set up a new base in Calcutta.</span></p><span data-dcnode-id="2892" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2884"><span data-dcnode-id="2891" instrument_node="">The original company had faced scarcely any measurable competition with a new parallel East India Company officially titled the&nbsp;</span><em data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">English Company Trading to the East Indies</span></em><span data-dcnode-id="2888" instrument_node=""> which had been floated in 1697 annulling the charter that had been in force for almost one hundred years. The companies had merged in 1708 by a tripartite indenture involving both companies and the state with the charter and agreement for the new&nbsp;</span><em data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">United Company of Merchants of England Trading to the East Indies</span></em><span data-dcnode-id="2885" instrument_node="">&nbsp;having been awarded by Sidney Godolphin&nbsp;the first Earl of Godolphin.</span></p><span data-dcnode-id="2883" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="2876"><span data-dcnode-id="2882" instrument_node="">
</span><figure class="alignright is-resized" data-dcnode-id="2877"><img alt="" class="wp-image-4159" data-attachment-id="4159" data-comments-opened="1" data-dcnode-id="2881" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-3" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-3.png?w=824" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-3.png?w=241" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-3.png" data-orig-size="1200,1491" data-permalink="https://milenapetrofigsblog.wordpress.com/image-3-5/" height="223" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/04/image-3.png%3Fw%3D824&amp;raw" width="181"><figcaption data-dcnode-id="2878"><em data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">Sidney Godolphin the first Earl of Godolphin</span></em></figcaption></figure></div><span data-dcnode-id="2875" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Through decades of constant battle between the company lobby and Parliament the company had sought a permanent establishment while Parliament would not allow it willingly greater autonomy and so relinquish the opportunity to exploit the company’s profits. Another act in 1712 had renewed the status of the company although the debts had been repaid.</span></p><span data-dcnode-id="2872" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">Britain and France had become bitter rivals. Frequent skirmishes between them had taken place for control of colonial possessions. Fearing the monetary consequences of a war in 1742 the British government had agreed to extend the deadline for the exclusive trade by the company in India until 1783 in return for a further loan from the Treasury. Between 1756 and 1763 the Seven Years War had&nbsp;diverted the state’s attention towards consolidation and defence of its territorial possessions&nbsp;in Europe and its&nbsp;colonies in North America.</span></p><span data-dcnode-id="2869" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2861"><span data-dcnode-id="2868" instrument_node="">The&nbsp;French and Indian War</span><strong data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="2865" instrument_node="">between 1754 and 1763 had been a theatre of the&nbsp;Seven Years’ War  which had pitted the North American colonies of the British Empire&nbsp;against those of the French&nbsp;with each side having been supported by various native American tribes. At the outset of the war the French colonies might have had a population of sixty thousand settlers compared with two million in the British colonies</span><strong data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">.</span></strong><span data-dcnode-id="2862" instrument_node=""> With the victories at Plassey in 1757 and Buxar  in 1764 the company forced the defeated Mughal emperor Shah Alam II to surrender the territories of Bengal, Bihar and Orrisa.&nbsp;</span></p><span data-dcnode-id="2860" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2854"><span data-dcnode-id="2859" instrument_node="">Two years into the French and Indian War the singular conflict which had not been associated with any European war had been named by French Canadians as the &nbsp;</span><strong data-dcnode-id="2856"><em data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">Guerre de la Conquête</span></em></strong><span data-dcnode-id="2855" instrument_node="">&nbsp;war of conquest. The British colonists had been supported at various times by the Iroquois, Catawba and&nbsp;Cherokee tribes and the French colonists had been supported by&nbsp;Wabanaki Confederacy member tribes, Abenaki, Mi’kmaq&nbsp;and the&nbsp;Algonquin, Lenape, Ojibwa, Ottawa, Shawnee and&nbsp;Wyandot tribes. Fighting had taken place primarily along the frontiers between New France and the British colonies from the&nbsp;province of Virginia&nbsp;in the south to&nbsp;Newfoundland in the north.</span></p><span data-dcnode-id="2853" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">William Pitt the elder had come to power and significantly increased British military resources in the colonies at a time when France’s unwillingness to risk large convoys to aid the limited forces in New France had concentrated their forces against&nbsp;Prussia&nbsp;and its allies who had been engaged in the Seven Years’ War in Europe.&nbsp;</span></p><span data-dcnode-id="2850" instrument_node="">
</span><p class="inline-ad-slot" data-adtags-visited="true" data-adtags-width="446" data-dcnode-id="2849" id="inline-ad-0" style="float:left;height:0px;margin:0 auto;overflow:hidden;width:446px;"></p><p data-adtags-visited="true" data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">France had ceded its territory east of the Mississippi to Great Britain as well as French Louisiana&nbsp;west of the&nbsp;Mississippi river to its ally Spain in compensation for Spain’s loss to Britain of Spanish Florida. Spain had ceded Florida to Britain in exchange for the return of&nbsp;Havana in Cuba. France’s colonial presence north of the Caribbean had been reduced to the islands of&nbsp;Saint Pierre and Miquelon confirming Great Britain’s position as the dominant colonial power.</span></p><span data-dcnode-id="2846" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2841"><span data-dcnode-id="2845" instrument_node="">British American wars were named often after the sitting British monarch such as&nbsp;King William’s war or&nbsp;Queen Anne’s war. There had been a King George’s war&nbsp;during the 1740s under the reign of&nbsp;King George II also. British colonists named this conflict after their opponents and it became known as the&nbsp;</span><em data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">French and Indian War</span></em><span data-dcnode-id="2842" instrument_node="">. The war had taken place on Indian soil between the company troops and the French forces. The&nbsp;Law Officers of the Crown in 1757 had delivered the Pratt Yorke opinion&nbsp;distinguishing overseas territories acquired by right of conquest&nbsp;from those acquired by private treaty. The opinion had asserted that while the Crown of Great Britain might have enjoyed sovereignty over both only the property of the former had been vested in the Crown.</span></p><span data-dcnode-id="2840" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Britain had acquired much of the remainder of&nbsp;Canada known as New France&nbsp;and the eastern half of Louisiana including West Florida from France, East Florida from Spain by the Treaty of Paris in 1763 which had ended the&nbsp;Seven Years’ War. Spain had not taken possession of any of Louisiana which had been ceded to it under the&nbsp;Treaty of Fontainebleau from France until 1769. By the&nbsp;Treaty of Paris in 1783 the United States had acquired the part of Quebec south of the Great Lakes. At the time Spain had gained West Florida and had regained East Florida.</span></p><span data-dcnode-id="2837" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2830"><span data-dcnode-id="2836" instrument_node="">
</span><figure class="alignright size-large is-resized" data-dcnode-id="2831"><img alt="" class="wp-image-4246" data-attachment-id="4246" data-comments-opened="1" data-dcnode-id="2835" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-10" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-10.png?w=500" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-10.png?w=201" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-10.png" data-orig-size="500,746" data-permalink="https://milenapetrofigsblog.wordpress.com/image-10-3/" height="296" loading="lazy" sizes="(max-width: 198px) 85vw, 198px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/04/image-10.png%3Fw%3D500&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-10.png?w=198 198w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-10.png?w=396 396w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-10.png?w=101 101w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-10.png?w=201 201w" width="198"><figcaption data-dcnode-id="2832"><em data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Treaty of Paris in 1783.</span></em></figcaption></figure></div><span data-dcnode-id="2829" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">With the advent of the industrial revolution Britain had surged ahead of its European rivals. Demand for Indian commodities had been boosted by the need to sustain the troops and the economy during the war and by the increased availability of raw materials and efficient methods of production. As the home country of the revolution Britain had experienced higher standards of living. The spiralling cycle of prosperity, demand and production might have had a profound influence on overseas trade. The company had become the single largest player in the British global market in 1801&nbsp;with the debts of the company amounting to one third of the effects.</span></p><span data-dcnode-id="2826" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">The Seven Years’ War had lasted from 1756 to 1763 and had resulted in the defeat of the French forces, had limited French imperial ambitions and had stunted the influence of the industrial revolution in French territories.&nbsp;The Governor General Robert Clive had led the company to a victory against Joseph François Dupleix&nbsp;the commander of the French forces in India and had recaptured Fort Saint George from the French. The company had taken this respite to seize&nbsp;Manila&nbsp;in 1762.</span></p><span data-dcnode-id="2823" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="2816"><span data-dcnode-id="2822" instrument_node="">
</span><figure class="alignright is-resized" data-dcnode-id="2817"><img alt="" class="wp-image-4173" data-attachment-id="4173" data-comments-opened="1" data-dcnode-id="2821" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-4" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-4.png?w=808" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-4.png?w=237" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-4.png" data-orig-size="1200,1521" data-permalink="https://milenapetrofigsblog.wordpress.com/image-4-4/" height="219" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/04/image-4.png%3Fw%3D808&amp;raw" width="171"><figcaption data-dcnode-id="2818"><em data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">Clive of India</span></em></figcaption></figure></div><span data-dcnode-id="2815" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">France had regained by the Treaty of Paris the five establishments captured during the war by the British of Pondichéry, Mahé, Karaikal, Yanam and Chandernagar but had been prevented from erecting fortifications and keeping troops in Bengal. Elsewhere in India the French had remained a military threat particularly during the War of American Independence and up to the capture of Pondichéry in 1793 at the outset of the French revolutionary wars without any military presence. Although these small outposts had remained French possessions for the next two hundred years the French ambitions on Indian territories and attempt to expand influence in Burma effectively had been laid to rest eliminating a major source of economic competition for the company.</span></p><span data-dcnode-id="2812" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Tipu Sultan the ruler of Mysore had been one of the company’s fiercest and most implacable enemies. After several wars he had been killed during the British conquest of Seringapatam in 1799 by the forces of expansionist Governor General Lord Wellesley and his brother the future Duke of Wellington. The richest kingdom in South India therefore  had fallen into British hands and Tipu’s palaces had been pillaged.</span></p><span data-dcnode-id="2809" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="2802"><span data-dcnode-id="2808" instrument_node="">
</span><figure class="alignright is-resized" data-dcnode-id="2803"><img alt="" class="wp-image-4197" data-attachment-id="4197" data-comments-opened="1" data-dcnode-id="2807" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-6" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-6.png?w=640" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-6.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-6.png" data-orig-size="640,360" data-permalink="https://milenapetrofigsblog.wordpress.com/image-6-4/" height="125" loading="lazy" sizes="(max-width: 221px) 85vw, 221px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/04/image-6.png%3Fw%3D640&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-6.png?w=221 221w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-6.png?w=442 442w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-6.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-6.png?w=300 300w" width="221"><figcaption data-dcnode-id="2804"><em data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Tipu Sultan’s tent </span></em></figcaption></figure></div><span data-dcnode-id="2801" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">The tent had been used by Tipu Sultan as his headquarters in the field while he had made progresses about his territories and on capture by the company following his defeat. Made of cotton chintz and patterned with acanthus leaves and flowers it had been amongst the Indian relics acquired by the eldest son Edward Clive while he  had been Governor of Madras.</span></p><span data-dcnode-id="2798" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">Madras had developed without a plan from its seventeenth century core formed by Fort Saint George and the Indian quarters. After the arrival of the mercantilists the weaving&nbsp;of cotton fabrics had become a local industry and in 1639 the English had invited the weavers and native merchants to settle near the fort.</span></p><span data-dcnode-id="2795" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">The most distinctive buildings in the city which had been renamed Chennai are the seven large temples in the Dravidian style situated in the city sections of George Town, Mylapore and Triplicane. The Chepauk Palace the former residence of the nawab Mughal ruler of Karnataka and the University Senate House both in the Deccan Muslim style and the Victoria Technical Institute and the High Court buildings both in the Indo Saracenic style are considered the most attractive buildings of the British period.</span></p><span data-dcnode-id="2792" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2787"><span data-dcnode-id="2791" instrument_node="">The East India Company had been granted competitive advantages over colonial American tea importers to sell tea from its colonies in Asia in American colonies. The coign of vantage had led to the Boston Tea Party of 1773 in which the colonists had boarded British ships and had thrown the tea overboard. When colonists had prevented the unloading of tea in three other colonies Boston Governor Thomas Hutchinson of the province of Massachusetts had refused to allow the tea to be returned to Britain. One by one the incidents had led to the&nbsp;American Revolution</span><a data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Revolution"><span data-dcnode-id="2790" instrument_node=""> </span></a><span data-dcnode-id="2788" instrument_node="">and to independence of the American colonies.</span></p><span data-dcnode-id="2786" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">By 1801 the English had become masters of southern India and Madras had become the administrative and commercial capital.&nbsp;The British East India Company’s major role had been played on the Indian subcontinent, in the Opium Wars with China and with the Boston Tea Party of 1773 which had been a precursor to the American War of Independence.</span></p><span data-dcnode-id="2783" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">From the very inception of New South Wales in 1788 the Royal Charter of the British East India Company had conferred an exclusive right on the company to control all trade to and from the penal colony. Further the founding Governor Captain Arthur Phillip had been instructed to prevent private individuals from trading with India, China and the colonies of any European nation. </span></p><span data-dcnode-id="2780" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">In the early history of Australia to this end the local building of any craft capable of such trading expressly had been forbidden. As early as 1792 the  company’s right to a monopoly on all commerce had been seriously flouted. The breaches had been conducted in a subtle manner not having been as dramatic as when a party of American colonists dressed as Mohawk Indians had boarded three British vessels in Boston Harbour and had poured forty five tons of tea into the sea. Early New South Welshmen had displayed much less deliberate  daring.</span></p><span data-dcnode-id="2777" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">The company’s trade monopoly with India had been abolished in the&nbsp;Charter Act of 1813. The monopoly with China had ended in 1833 closing the trading activities of the company and rendering its activities purely administrative.</span></p><span data-dcnode-id="2774" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">By the aftermath of the&nbsp;Indian rebellion of 1857 and under the provisions of the Government of India Act 1858 the British Government had nationalised the company. The British government had taken over its Indian possessions, its administrative powers and machinery and its&nbsp;armed forces.</span></p><span data-dcnode-id="2771" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">The company had divested itself of its commercial trading assets in India in favour of the English government in 1833 with the latter having assumed the debts and obligations of the company which had been serviced and paid from tax revenue raised in India. In return the shareholders had voted to accept an annual dividend of ten per cent guaranteed for forty years likewise to be funded from India with a final pay off to redeem outstanding shares. The debt obligations had continued beyond dissolution and had been extinguished only by the English government during the Second World War.</span></p><span data-dcnode-id="2768" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">The company had remained in existence in vestigial form having continued to manage the tea trade on behalf of the British Government and the supply of&nbsp;Saint Helena until the&nbsp;East India Stock Dividend Redemption Act 1873 had come into effect on the first of January in 1874. The Act had provided for the formal dissolution of the company on the first of June in 1874 after a final dividend payment and the commutation or redemption of its stock.</span></p><span data-dcnode-id="2765" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2763"><img alt="" class="wp-image-4253" data-attachment-id="4253" data-comments-opened="1" data-dcnode-id="2764" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-12" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-12.png?w=600" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-12.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-12.png" data-orig-size="600,347" data-permalink="https://milenapetrofigsblog.wordpress.com/image-12-3/" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/04/image-12.png%3Fw%3D600&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-12.png 600w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-12.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-12.png?w=300 300w"></figure><span data-dcnode-id="2762" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2727"><span data-dcnode-id="2761" instrument_node="">The Colonial Office&nbsp;pictured above and War Office, the Secretary of State for the Colonies&nbsp;and the Secretary of State for War had been separated in 1854. The War Office from then until the 1867&nbsp;confederation&nbsp;of the&nbsp;</span><em data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">Dominion of Canada</span></em><span data-dcnode-id="2758" instrument_node=""> had split the military administration of the British colonial and foreign stations into nine districts of </span><em data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">North America And North Atlantic</span></em><span data-dcnode-id="2755" instrument_node="">, </span><em data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">West Indies</span></em><span data-dcnode-id="2752" instrument_node="">, </span><em data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Mediterranean</span></em><span data-dcnode-id="2749" instrument_node="">, </span><em data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">West Coast Of Africa And South Atlantic</span></em><span data-dcnode-id="2746" instrument_node="">,&nbsp;</span><em data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">South Africa</span></em><span data-dcnode-id="2743" instrument_node="">,&nbsp;</span><em data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">Egypt And The Sudan</span></em><span data-dcnode-id="2740" instrument_node="">,&nbsp;</span><em data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">Indian O</span></em><span data-dcnode-id="2737" instrument_node="">cean, </span><em data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">Australia</span></em><span data-dcnode-id="2734" instrument_node=""> and&nbsp;</span><em data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">China</span></em><span data-dcnode-id="2731" instrument_node="">. North America And North Atlantic had included the following&nbsp;</span><em data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">stations</span></em><span data-dcnode-id="2728" instrument_node="">&nbsp;or garrisons namely New Westminster or British Columbia, Newfoundland, Halifax, Quebec, Kingston, Canada West and Bermuda. The English East India Company had accomplished a work such as in the whole history of the human race no other trading company ever had attempted and such as none surely is to attempt in the years to come.</span></p><span data-dcnode-id="2726" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2718"><img alt="" class="wp-image-4251" data-attachment-id="4251" data-comments-opened="1" data-dcnode-id="2725" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-11" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-11.png?w=760" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-11.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-11.png" data-orig-size="760,457" data-permalink="https://milenapetrofigsblog.wordpress.com/image-11-3/" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/04/image-11.png%3Fw%3D760&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-11.png 760w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-11.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-11.png?w=300 300w"><figcaption data-dcnode-id="2719"><em data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">Confederation of Canada</span></em><span data-dcnode-id="2722" instrument_node=""> </span><em data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">1867</span></em></figcaption></figure><span data-dcnode-id="2717" instrument_node="">

</span><article class="post-4092 post type-post status-publish format-standard hentry category-uncategorized" data-dcnode-id="2554" id="post-4092"><span data-dcnode-id="2676" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2670"><span data-dcnode-id="2675" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="2672"><a data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/04/04/4092/" rel="bookmark"><span data-dcnode-id="2674" instrument_node="">Self comes to&nbsp;mind</span></a></h2><span data-dcnode-id="2671" instrument_node=""> </span></header><span data-dcnode-id="2668" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2583"><span data-dcnode-id="2667" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2665"><img alt="" class="wp-image-4094" data-attachment-id="4094" data-comments-opened="1" data-dcnode-id="2666" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image.png?w=330" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image.png?w=273" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image.png" data-orig-size="330,363" data-permalink="https://milenapetrofigsblog.wordpress.com/image-29/" sizes="(max-width: 330px) 85vw, 330px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/04/image.png%3Fw%3D330&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/04/image.png 330w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image.png?w=136 136w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image.png?w=273 273w"></figure><span data-dcnode-id="2664" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Francis Crick was an important theoretical&nbsp;molecular biologist&nbsp;and played a crucial role in research related to revealing the helical structure of DNA. He is widely known for the use of the term central dogma to summarise the idea that once information is transferred from nucleic acids DNA or RNA to proteins it cannot flow back to nucleic acids. In other words the final step in the flow of information from nucleic acids to proteins is irreversible.</span></p><span data-dcnode-id="2661" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">During the remainder of his career he held the post of J.W. Kieckhefer Distinguished Research Professor at the Salk Institute for Biological Studies. His later research centred on theoretical&nbsp;neurobiology&nbsp;and attempts to advance the scientific study of human consciousness. He remained in this post until his death editing a manuscript on his death bed, a scientist until the bitter end.</span></p><span data-dcnode-id="2658" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2653"><span data-dcnode-id="2657" instrument_node="">Crick’s reverse learning theory which states that dreams are like the cleaning up operations of computers when they are offline, removing and suppressing parasitic nodes and other junk from the mind during sleep appeared during the eighties in the science journal </span><em data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">Nature</span></em><span data-dcnode-id="2654" instrument_node="">. A neurobiological theory of dreams reverse learning &nbsp;model likened the process of dreaming to a computer&nbsp;in that it was offline during dreaming or the Rapid Eye Movement phase of sleep. During this phase the brain sifts through information gathered throughout the day and throws out all unwanted material. According to the model one dreams in order to forget and this involves a process of reverse learning or unlearning.</span></p><span data-dcnode-id="2652" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Many studies purporting to uncover the function of dreams have in fact been studying not dreams but measurable REM sleep. Since the identification of REM sleep theories proposed the functional role for dreaming sleep in promoting some aspect of the learning process. A Harvard study was published more than two decades later showing experimental evidence that dreams were correlated with improved learning.</span></p><span data-dcnode-id="2649" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">Defensive activation theory which says that given the brain’s neuroplasticity&nbsp;dreams evolved as a visual hallucinatory activity during sleep’s extended periods of darkness busying the occipital lobe and thereby protecting it from possible appropriation by other non vision sense operations.</span></p><span data-dcnode-id="2646" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">Some philosophers have proposed that what we think of as the real world could be or is an illusion. This idea is known as the sceptical hypothesis&nbsp;about&nbsp;ontology. The first recorded mention of the idea was in the fourth century BC by&nbsp;Zhuangzi and in Eastern philosophy where the problem has been named the Zhuangzi Paradox.</span></p><span data-dcnode-id="2643" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2640"><p data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">He who dreams of drinking wine may weep when morning comes. He who dreams of weeping may in the morning go off to hunt. While he is dreaming he does not know it is a dream and in his dream he may even try to interpret a dream. Only after he wakes does he know it was a dream. Someday there will be a great awakening when we know that this is all a great dream. Yet the stupid believe they are awake busily and brightly assuming they understand things, calling this man ruler, that one herdsman—how dense! Confucius and you are both dreaming! When I say you are dreaming I am dreaming too. Words like these will be labelled the Supreme Swindle. Yet after ten thousand generations a great sage may appear who will know their meaning and it will still be as though he appeared with astonishing speed.</span></p></blockquote><span data-dcnode-id="2639" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">The idea also is discussed in Hindu and Buddhist writings.&nbsp;It was formally introduced to Western philosophy by Descartes in the seventeenth century in his&nbsp;Meditations on First Philosophy. In the&nbsp;Mandukya Upanishad part of the&nbsp;Veda scriptures of&nbsp;Indian Hinduism a dream is one of three states that the soul experiences during its lifetime, the other two states being the waking state and the sleep state.</span></p><span data-dcnode-id="2636" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">A daydream is a visionary fantasy&nbsp;especially one of happy pleasant thoughts, hopes or ambitions imagined as coming to pass and experienced while awake. There are many different types of daydreams and there is no consistent definition amongst psychologists. The general public also uses the term for a broad variety of experiences. </span></p><span data-dcnode-id="2633" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Research by Harvard psychologist Deirdre Barrett&nbsp;has found that people who experience vivid dreamlike mental images reserve the word for these whereas many other people refer to milder imagery, realistic future planning, review of past memories or just spacing out with one’s mind going relatively blank when they talk about daydreaming.</span></p><span data-dcnode-id="2630" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">While daydreaming has long been derided as a lazy unproductive pastime it is commonly acknowledged that daydreaming can be constructive in some contexts. There are numerous examples of people in creative or artistic careers such as composers, novelists and filmmakers developing new ideas through daydreaming. Similarly research scientists, mathematicians and physicists have developed new ideas by daydreaming about their subject areas.</span></p><span data-dcnode-id="2627" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">A hallucination in the broadest sense of the word is a&nbsp;perception&nbsp;in the absence of a&nbsp;stimulus. In a stricter sense hallucinations are perceptions in a conscious and awake state in the absence of external stimuli and have qualities of real perception in that they are vivid, substantial and located in external objective space. The latter definition distinguishes hallucinations from the related phenomena of dreaming which does not involve wakefulness. </span></p><span data-dcnode-id="2624" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2619"><span data-dcnode-id="2623" instrument_node="">A night terror also known as a sleep terror or&nbsp;</span><em data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">pavor nocturnus</span></em><span data-dcnode-id="2620" instrument_node=""> is a&nbsp;parasomnia disorder&nbsp;that predominantly affects children causing feelings of terror or dread. Night terrors should not be confused with&nbsp;nightmares which are bad dreams that cause the feeling of horror or fear.</span></p><span data-dcnode-id="2618" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">A nightmare is an unpleasant dream that can cause a strong negative emotional response from the mind typically&nbsp;fear or horror but also despair, anxiety&nbsp;and great&nbsp;sadness. The dream may contain situations of danger, discomfort, psychological or physical terror. Sufferers usually awaken in a state of distress and may be unable to return to sleep&nbsp;for a prolonged period of time.</span></p><span data-dcnode-id="2615" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">One theory of déjà vu attributes the feeling of having previously seen or experienced something to having dreamed about a similar situation or place and forgetting about it until one seems to be mysteriously reminded of the situation or the place while awake.</span></p><span data-dcnode-id="2612" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">There is evidence that continuity of consciousness is related to recall. Specifically people who have vivid and unusual experiences during the day tend to have more memorable dream content and hence better dream recall. People who score high on measures of personality traits associated with creativity, imagination and fantasy such as&nbsp;openness to experience, daydreaming, fantasy proneness, absorption and hypnotic susceptibility&nbsp;tend to show more frequent dream recall.</span></p><span data-dcnode-id="2609" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">There is also evidence for continuity between the bizarre aspects of dreaming and waking experience. People who report more bizarre experiences during the day such as people high in psychosis proneness have more frequent dream recall and also report more frequent&nbsp;nightmares. </span></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="2601"><span data-dcnode-id="2605" instrument_node="">A </span><strong data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">schizotypy</span></strong><span data-dcnode-id="2602" instrument_node="">&nbsp;is a theoretical concept in psychology that posits a&nbsp;continuum&nbsp;of&nbsp;personality characteristics and experiences ranging from normal dissociative, imaginative states to extreme states of mind related to&nbsp;psychosis especially schizophrenia. The continuum of personality proposed in schizotypy is in contrast to a categorical view of psychosis, wherein psychosis is considered a particular usually pathological state of mind which the person either has or does not have.</span></p><span data-dcnode-id="2600" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2590"><span data-dcnode-id="2599" instrument_node="">
</span><figure class="alignright size-large is-resized" data-dcnode-id="2591"><img alt="" class="wp-image-4104" data-attachment-id="4104" data-comments-opened="1" data-dcnode-id="2598" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-1" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-1.png?w=330" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-1.png?w=185" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-1.png" data-orig-size="330,535" data-permalink="https://milenapetrofigsblog.wordpress.com/image-1-7/" height="439" loading="lazy" sizes="(max-width: 271px) 85vw, 271px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/04/image-1.png%3Fw%3D330&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/04/image-1.png?w=271 271w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-1.png?w=93 93w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-1.png?w=185 185w, https://milenapetrofigsblog.files.wordpress.com/2022/04/image-1.png 330w" width="271"><figcaption data-dcnode-id="2592"><em data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">A philosophical treatise by René Descartes was first published in Latin</span></em><span data-dcnode-id="2595" instrument_node="">. </span><em data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">treatise in 1641. The French translation by the&nbsp;Duc de Luynes with Descartes’ supervision was published in 1647 as&nbsp;Méditations Métaphysiques.</span></em></figcaption></figure></div><div data-dcnode-id="2585" id="atatags-370373-6264a7b5f15e4"><span data-dcnode-id="2589" instrument_node="">

</span><span class="byline" data-dcnode-id="2572"><span class="author vcard" data-dcnode-id="2573"><img alt="" class="avatar avatar-49 grav-hashed grav-hijack" data-dcnode-id="2579" height="49" id="grav-e712300d5a8681daa29a0099c8230545-1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.gravatar.com/avatar/e712300d5a8681daa29a0099c8230545%3Fs%3D49%26d%3Didenticon%26r%3DG&amp;raw" width="49"><span class="screen-reader-text" data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">Author </span></span><span data-dcnode-id="2576" instrument_node=""> </span><a class="url fn n" data-dcnode-id="2574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/author/milenapetrovic129/"><span data-dcnode-id="2575" instrument_node="">Milenapetrofig</span></a></span></span><span class="posted-on" data-dcnode-id="2564"><span class="screen-reader-text" data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Posted on </span></span><a data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/04/04/4092/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2568" datetime="2022-04-04T11:20:20+00:00"><span data-dcnode-id="2569" instrument_node="">April 4, 2022</span></time><time class="updated" data-dcnode-id="2566" datetime="2022-04-06T16:03:59+00:00"><span data-dcnode-id="2567" instrument_node="">April 6, 2022</span></time></a></span><span class="comments-link" data-dcnode-id="2559"><a data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/04/04/4092/%23respond"><span data-dcnode-id="2563" instrument_node="">Leave a comment</span><span class="screen-reader-text" data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node=""> on Self comes to&nbsp;mind</span></span></a></span><span data-dcnode-id="2558" instrument_node=""> </span></footer><span data-dcnode-id="2555" instrument_node="">
