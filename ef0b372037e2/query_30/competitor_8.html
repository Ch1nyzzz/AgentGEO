</span><header class="entry-header" data-dcnode-id="1611"><span data-dcnode-id="1616" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1613"><a data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/03/04/tough-strategy/" rel="bookmark"><span data-dcnode-id="1615" instrument_node="">Tough strategy</span></a></h2><span data-dcnode-id="1612" instrument_node=""> </span></header><span data-dcnode-id="1609" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1394"><span data-dcnode-id="1608" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1601"><img alt="" class="wp-image-3860" data-attachment-id="3860" data-comments-opened="1" data-dcnode-id="1607" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image.png?w=840" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image.png" data-orig-size="1977,375" data-permalink="https://milenapetrofigsblog.wordpress.com/image-13/" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image.png%3Fw%3D1024&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image.png?w=1024 1024w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image.png?w=300 300w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image.png?w=768 768w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image.png 1977w"><figcaption data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">A </span><em data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">view of&nbsp;Podil one of Kyiv’s central neighborhoods</span></em><span data-dcnode-id="1603" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="1600" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Within the city the Dnieper River forms a branching system of&nbsp;tributaries, isles and harbours within the city limits. The city is close to the mouth of the Desna river&nbsp;and the&nbsp;Kyiv reservoir&nbsp;in the north and the&nbsp;Kyiv reservoir in the south. Both the Dnieper and Desna rivers are navigable&nbsp;at Kyiv although regulated by the reservoir shipping locks and limited by winter freeze over.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Modern Kyiv is a mix of the old Kyiv preserved about seventy percent of more than a thousand buildings built during the years of 1907 until 1914 and the new seen in everything from the architecture to the stores and to the people themselves. </span></p><span data-dcnode-id="1594" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1589"><img alt="" class="wp-image-3863" data-attachment-id="3863" data-comments-opened="1" data-dcnode-id="1593" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-1" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-1.png?w=840" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-1.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-1.png" data-orig-size="1200,674" data-permalink="https://milenapetrofigsblog.wordpress.com/image-1-6/" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-1.png%3Fw%3D1024&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-1.png?w=1024 1024w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-1.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-1.png?w=300 300w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-1.png?w=768 768w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-1.png 1200w"><figcaption data-dcnode-id="1590"><em data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Mariinskyi</span></em></figcaption></figure><span data-dcnode-id="1588" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">When the capital of the&nbsp;Ukrainian SSR was moved from Kharkiv&nbsp;to Kyiv many new buildings were commissioned to give the city the gloss and polish of a capital. In the discussions that centered on how to create a showcase city centre  the current city centre of Khreshchatyk &nbsp;and&nbsp;Maidan Nezalezhnosti Independence Square were not the obvious choices.&nbsp;Some of the early Soviet plans ultimately were not materialised with ideas included for a part of Pechersk, Lypky, European Square and&nbsp;Mykhailivska Square.</span></p><span data-dcnode-id="1585" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1576"><img alt="" class="wp-image-3865" data-attachment-id="3865" data-comments-opened="1" data-dcnode-id="1584" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-2" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-2.png?w=840" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-2.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-2.png" data-orig-size="1200,798" data-permalink="https://milenapetrofigsblog.wordpress.com/image-2-5/" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-2.png%3Fw%3D1024&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-2.png?w=1024 1024w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-2.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-2.png?w=300 300w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-2.png?w=768 768w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-2.png 1200w"><figcaption data-dcnode-id="1577"><em data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">European Square is located in the Old Town or Upper Town</span></em><span data-dcnode-id="1581" instrument_node=""> </span><em data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">in Kyiv the capital of Ukraine</span></em><span data-dcnode-id="1578" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="1575" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Kyiv’s central districts provide a dotted contrast of new modern buildings among the pale yellows, blues and greys of older apartments.&nbsp;Urban sprawl has gradually reduced while population densities of suburbs has increased. The most expensive properties are located in the Pechersk and Khreshchatyk areas. It is also prestigious to own a property in newly constructed buildings in the Kharkivskyi Raion&nbsp;or&nbsp;Obolon neighbourhood&nbsp;along the Dnieper.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Ukrainian independence at the turn of the millennium has heralded other changes.&nbsp;At the United Nations Climate Change Conference in Copenhagen in 2009 Kyiv was the only Commonwealth of Independent States&nbsp;city to have been inscribed into the TOP30 European Green City Index in thirtieth place.</span></p><span data-dcnode-id="1569" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1565"><img alt="" class="wp-image-3867" data-attachment-id="3867" data-comments-opened="1" data-dcnode-id="1568" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-3" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-3.png?w=671" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-3.png?w=197" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-3.png" data-orig-size="1200,1831" data-permalink="https://milenapetrofigsblog.wordpress.com/image-3-4/" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-3.png%3Fw%3D671&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-3.png?w=671 671w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-3.png?w=98 98w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-3.png?w=197 197w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-3.png?w=768 768w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-3.png 1200w"><figcaption data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Declaration of Ukrainian independece.</span></figcaption></figure><span data-dcnode-id="1564" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Kyiv’s most famous historical architecture complexes are the&nbsp;Saint Sophia Cathedral&nbsp;and the Kyiv Pechersk Lavra&nbsp;Monastery of the Caves which are recognized by UNESCO&nbsp;as a&nbsp;World Heritage Site. Noteworthy historical architectural landmarks also include the&nbsp;Mariinskyi palace designed and constructed from 1745 to 1752 then reconstructed in 1870, several&nbsp;Eastern Orthodox churches such as Saint Michael’s Cathedral, Saint Andrews,&nbsp;Saint Vladimir, the reconstructed Golden Gate and others.</span></p><span data-dcnode-id="1561" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1553"><img alt="" class="wp-image-3872" data-attachment-id="3872" data-comments-opened="1" data-dcnode-id="1560" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-4" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-4.png?w=840" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-4.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-4.png" data-orig-size="2051,365" data-permalink="https://milenapetrofigsblog.wordpress.com/image-4-3/" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-4.png%3Fw%3D1024&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-4.png?w=1024 1024w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-4.png?w=2048 2048w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-4.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-4.png?w=300 300w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-4.png?w=768 768w"><figcaption data-dcnode-id="1554"><em data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">From left to right the Diplomatic Academy,&nbsp;Ministry of Foreign Affairs&nbsp;behind the monument to Princess Olga and Saint Michael’s Golden Domed Monastery on Mykhailivska</span></em><span data-dcnode-id="1557" instrument_node=""> </span><em data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Square</span></em></figcaption></figure><span data-dcnode-id="1552" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Originally on the west bank modern Kyiv is located on both sides of the Dnieper&nbsp; which flows southwards through the city towards the Black Sea. The older and higher western part of the city sits on numerous wooded hills known as Kyiv Hills with ravines and small rivers. Kyiv’s geographical relief contributed to its toponyms such as Podil or lower, Pechersk caves and uzviz a steep street or descent. Kyiv is a part of the larger Dnieper Upland&nbsp;adjoining the western bank of the Dnieper in its middle flow and which contributes to the city’s elevation change.</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Kyiv prospered during the late nineteenth century&nbsp;industrial revolution under the&nbsp;Tsar of Russia when it became the third most important city of the Empire and the major centre of commerce of its southwest. In the turbulent period following the&nbsp;revolution of 1917 Kyiv became the capital of several successive Ukrainian&nbsp;states and was caught in the middle of several conflicts in World War One during which German soldiers occupied it from the second of March in 1918 to November 1918, the Russian civil war&nbsp;of 1917 to 1922 and the&nbsp;Polish Soviet war of 1919 to 1921. During the last three months of 1919 Kyiv was controlled by the White Army intermittently. Kyiv changed hands sixteen times from the end of 1918 to August 1920.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Kyiv was the historic cultural centre of the&nbsp;East Slavic civilization and a major cradle for the Christianization of Kyivan Rus which retained through centuries its cultural importance and even at times of relative decay it remained the centre of primary importance. Its sacred sites attracted pilgrims for centuries.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Among Kyiv’s best known monuments are Mikhail Mikeshin’s&nbsp;statue of&nbsp;Bohdan Khmelnytsky&nbsp;astride his horse located near&nbsp;Saint Sophia Cathedral, the venerated&nbsp;Vladimir the Great as the&nbsp;baptizer of Rus’ overlooking the river above Podil from&nbsp;Saint Vladimir Hill, the monument to&nbsp;Kyi, Shchek and Khoryv who with Lybid had been the legendary founders of the city located at the Dnieper embankment.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">There are several legendary accounts of the origin of the city. One tells of members of a Slavic tribe of Eastern Polans brothers&nbsp;of which the eldest Kyi after whom the city was named, Shchek and Khoryv and their sister&nbsp;Lybid who founded the city.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="1524"><span data-dcnode-id="1536" instrument_node="">
</span><figure class="alignright is-resized" data-dcnode-id="1525"><img alt="" class="wp-image-3885" data-attachment-id="3885" data-comments-opened="1" data-dcnode-id="1535" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-6" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-6.png?w=330" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-6.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-6.png" data-orig-size="330,255" data-permalink="https://milenapetrofigsblog.wordpress.com/image-6-3/" height="269" loading="lazy" sizes="(max-width: 349px) 85vw, 349px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-6.png%3Fw%3D330&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-6.png 330w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-6.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-6.png?w=300 300w" width="349"><figcaption data-dcnode-id="1526"><em data-dcnode-id="1527"><span data-dcnode-id="1534" instrument_node="">The&nbsp;</span><strong data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Radziwiłł Letopis</span></strong><span data-dcnode-id="1531" instrument_node=""> also known as the&nbsp;</span><strong data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Königsberg Chronicle</span></strong><span data-dcnode-id="1528" instrument_node=""> is an&nbsp;Old East Slavic series of illuminated manuscripts&nbsp;from the fifteenth century. It is believed to be a copy of a thirteenth century original. Its name is derived from the royal Radziwill&nbsp;family of the Grand Duchy of Lithuania later the Polish Lithuanian Commonwealth who kept it in the Nezvizh Castle in the seventeenth and eighteenth centuries.</span></em></figcaption></figure></div><span data-dcnode-id="1523" instrument_node="">
</span><div class="wp-block-image size-large" data-dcnode-id="1516"><span data-dcnode-id="1522" instrument_node="">
</span><figure class="alignright is-resized" data-dcnode-id="1517"><img alt="" class="wp-image-3884" data-attachment-id="3884" data-comments-opened="1" data-dcnode-id="1521" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-5" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-5.png?w=673" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-5.png?w=197" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-5.png" data-orig-size="1200,1825" data-permalink="https://milenapetrofigsblog.wordpress.com/image-5-3/" height="527" loading="lazy" sizes="(max-width: 347px) 85vw, 347px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-5.png%3Fw%3D673&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-5.png?w=673 673w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-5.png?w=347 347w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-5.png?w=694 694w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-5.png?w=99 99w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-5.png?w=197 197w" width="347"><figcaption data-dcnode-id="1518"><em data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Primary Chronicle</span></em></figcaption></figure></div><span data-dcnode-id="1515" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Another legend states that Saint Andrew&nbsp;passed through the area in the first century. The city is built  where he  erected a cross and a church later was built. Since the Middle Ages an image of Saint Michael has represented the city as well as the&nbsp;duchy.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">More than one hundred and thirty nationalities and ethnic groups reside within the territory of Kyiv.&nbsp;Ukrainians constitute the largest ethnic group&nbsp;in Kyiv and they account for about twenty two million people or eighty two percent of the population.&nbsp;The rest is comprised of Russians, Belarusians, Poles, Armenians, Azerbaijanis, Tatars, Georgians and Moldovans.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">There is little historical evidence pertaining to the period when the city was founded. Scattered&nbsp;Slavic settlements existed in the area from the sixth century but it is unclear whether any of them later developed into the city. On the&nbsp;Ptolemy world map there are several settlements indicated along the middle stream of&nbsp;Borysthenes. Among them is Azagarium who some historians believe to be the predecessor to Kyiv.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">The city probably existed as a trade centre as early as the fifth century. A&nbsp;Slavic&nbsp;settlement on the great trade route between&nbsp;Scandinavia and Constantinople, Kyiv was a tributary of the Khazars until its capture by the&nbsp;Varangians known as Vikings in the middle of the ninth century. Under Varangian rule the city became a capital of&nbsp;Kievan Rus’ the first&nbsp;East Slavic&nbsp;state. Completely destroyed during the Mongol invasions in 1240 the city lost most of its influence for the centuries to come. It was a provincial capital of marginal importance in the outskirts of the territories controlled by its powerful neighbours of&nbsp;Lithuania, then Poland and ultimately&nbsp;Russia.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Kyiv became the capital of Soviet Ukraine in 1934. The city boomed again during the years of Soviet industrialization as its population grew rapidly and many industrial giants were established some of which exist today.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">During  World War Two the city again suffered significant damage and&nbsp;was&nbsp;occupied from the nineteenth of September in 1941 to the sixth of November in 1943 by Germany. Axis forces killed or captured more than six hundred thousand Soviet soldiers in the great encirclement Battle of Kyiv&nbsp;in 1941. Most of those captured never returned alive. Shortly after the&nbsp;Wehrmacht occupied the city a team of&nbsp;NKVD&nbsp;officers who had remained hidden dynamited most of the buildings on the&nbsp;Khreshchatyk the main street of the city where German military and civil authorities had occupied most of the buildings of which some continued to burn for days.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Kyiv recovered economically in the post war years becoming once again the third most important city of the Soviet Union. The&nbsp;Chernobyl nuclear power plant disaster in 1986 occurred only a hundred kilometres or sixty two miles north of the city. Prevailing south wind blew most of the radioactive debris away from Kyiv.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">A 2015 study by the International Republican Institute&nbsp;found that ninety four percent of Kyiv was ethnic Ukrainian and five percent ethnic Russian. Most of the city’s non Slav population comprises&nbsp;Tatars, Caucasians&nbsp;and other people from the&nbsp;former Soviet Union.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">The mayor of Kyiv is Vitali Klitschko&nbsp;who was sworn in on the fifth of June in 2014 after he had won the&nbsp;Kyiv mayoral elections held on the twenty fifth of May with almost fifty seven percent of the votes. Since that date Klitschko is also&nbsp;head of Kyiv city administration. Klitschko was elected later in the&nbsp;Kyiv local election in 2020 with more than fifty percent of the votes in the first round of the election. Russia invaded and annexed the Crimean Peninsula from Ukraine in 2014. In response Russia was suspended from the G8 and subjected to several sanctions.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1480"><span data-dcnode-id="1487" instrument_node="">Most key buildings of the national government are located along&nbsp;Hrushevskoho  Street named in Russian vulytsia Mykhaila Hrushevskoho and Institute Street  or vulytsia Instytutska. Hrushevskoho Street is named after the Ukrainian academician, politician, historian and statesman&nbsp;Mykhailo Hrushevski who wrote an academic book titled </span><em data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Bar Starostvo</span></em><span data-dcnode-id="1484" instrument_node=""> </span><em data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Historical Notes: XV-XVIII </span></em><span data-dcnode-id="1481" instrument_node="">about the history of Bar in Ukraine. That portion of the city unofficially is known also as the government quarter.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">The municipality of the city of Kyiv has a&nbsp;special legal status&nbsp;within Ukraine compared to the other&nbsp;administrative subdivisions of the country. The most significant difference is that the city is considered as a region of Ukraine. It is the only city that has double jurisdiction. The head of&nbsp; City State Administration the city’s governor is appointed by the president of Ukraine&nbsp;while the head of the City Council the&nbsp;mayor of Kyiv is elected by local popular vote.</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1465"><span data-dcnode-id="1475" instrument_node="">The city state administration and council is located in the Kyiv City council building on&nbsp;Khreshchatyk Street. The oblast state administration and council is located in the&nbsp;Kyiv Oblast&nbsp;council building on </span><em data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">ploshcha Lesi Ukrayinky </span></em><span data-dcnode-id="1472" instrument_node="">or Lesya Ukrayinka Square. The&nbsp;Kyiv Sviatoshyn Raion&nbsp;state administration is located near Kiltseva doroha Ring Road on </span><em data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">prospekt Peremohy</span></em><span data-dcnode-id="1469" instrument_node=""> or Victory Parkway while the Kyiv Svyatoshyn Raion local council is located on </span><em data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">vulytsia Yantarna </span></em><span data-dcnode-id="1466" instrument_node="">or Yantarnaya Street.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1457"><strong data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Verkhovna Rada</span></strong><span data-dcnode-id="1461" instrument_node="">&nbsp;or just&nbsp;</span><strong data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Rada</span></strong><span data-dcnode-id="1458" instrument_node="">&nbsp;is the unicameral parliament&nbsp;of&nbsp;Ukraine. The Verkhovna Rada is composed of four hundred and fifty deputies who are presided over by a chairman or speaker. The Verkhovna Rada meets in the Verkhovna Rada building&nbsp;in Ukraine’s capital Kyiv. The deputies elected on the twenty first of  July in 2019 Ukrainian parliamentary election&nbsp;were inaugurated on the twenty ninth of August in 2019.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">The Verkhovna Rada was transformed out of the system of the republican representative body known in the Soviet Union as Supreme Council&nbsp;which was first established on the twenty sixth of  June in  1938 as a type of legislature of the Ukrainian SSR after the dissolution of the Congress of Soviets of the Ukrainian SSR.</span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1448"><span data-dcnode-id="1452" instrument_node="">The twelfth convocation of the Supreme Council of the Ukrainian SSR issued the&nbsp; Declaration of State Sovereignty of Ukraine on the sixteenth of July in 1990 and declared&nbsp;Ukrainian independence on the twenty fourth of August in 1991  under the&nbsp;Chairman of the Verkhovna Rada Leonid Kravchuk. The Act of Ukrainian Independence overwhelmingly was supported in a&nbsp;national referendum held on the first of December in 1991. On the twelfth of September in 1991 the parliament adopted the law on the Legal Succession of Ukraine and thus the Verkhovna Rada became the&nbsp;</span><em data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Supreme Council of Ukraine</span></em><span data-dcnode-id="1449" instrument_node="">.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1433"><span data-dcnode-id="1446" instrument_node="">The&nbsp;Constitution of Ukraine was adopted by the thirteenth convocation of the </span><em data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Verkhovna Rada</span></em><span data-dcnode-id="1443" instrument_node=""> on the twenty eighth of  June in 1996 at approximately nine o’clock local time. The parliament’s fourteenth convocation officially changed the numbering of the convocations proclaiming itself the&nbsp;</span><em data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">third</span></em><span data-dcnode-id="1440" instrument_node="">&nbsp;democratic and independent convocation of the </span><em data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Verkhovna Rada. </span></em><span data-dcnode-id="1437" instrument_node="">After the Orange revolution constitutional amendments were adopted in December 2004 by the fourth convocation or fifteenth of the </span><em data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Verkhovna Rada.</span></em><span data-dcnode-id="1434" instrument_node=""> On first of October in 2010 the Constitutional Court of Ukraine&nbsp;&nbsp;overturned the 2004 Amendments considering them unconstitutional. Parliament reinstated the December 2004 amendments to the constitution on the twenty first of February in 2014.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p class="inline-ad-slot" data-adtags-visited="true" data-adtags-width="446" data-dcnode-id="1431" id="inline-ad-2" style="float:left;height:0px;margin:0 auto;overflow:hidden;width:446px;"></p><p data-adtags-visited="true" data-dcnode-id="1417"><span data-dcnode-id="1430" instrument_node="">The </span><em data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Verkovna Rada </span></em><span data-dcnode-id="1427" instrument_node="">was the most popular among all websites of the parliaments in 2017 and 2018 of&nbsp;United Nations member states. The </span><em data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Verkhovna Rada </span></em><span data-dcnode-id="1424" instrument_node="">meets in a neo classical&nbsp;building on Kyiv’s </span><em data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">vulytsia Mikhaila Hrushevskoho&nbsp;</span></em><span data-dcnode-id="1421" instrument_node="">or Mykhaila Hrushevsky Street and&nbsp;</span><em data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Ploshcha Konstytutsii </span></em><span data-dcnode-id="1418" instrument_node="">as is named the Constitution Square. The building adjoins Mariinskyi Park and the eighteenth century&nbsp;Mariinskyi palace designed by Bartolomeo Rastrelli&nbsp;which serves as the official residence of the President of Ukraine Volodymyr Zelenskyy.</span></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1411"><span data-dcnode-id="1415" instrument_node="">The first known formal subdivision of Kyiv dates to 1810 when the city was subdivided into four  parts being Pechersk, Starokyiv and the first and the second parts of&nbsp;Podil.  From 1833 to 1834 according to the decree of Tsar Nicholas I Kyiv was subdivided into six police&nbsp;raions by districts later being increased to ten. There were eight raion councils or </span><em data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Duma</span></em><span data-dcnode-id="1412" instrument_node=""> which were reorganised by Bolsheviks&nbsp;into six party territory raions.</span></p><span data-dcnode-id="1410" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1405"><img alt="" class="wp-image-3904" data-attachment-id="3904" data-comments-opened="1" data-dcnode-id="1409" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-7" data-large-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-7.png?w=815" data-medium-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-7.png?w=300" data-orig-file="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-7.png" data-orig-size="815,584" data-permalink="https://milenapetrofigsblog.wordpress.com/image-7-3/" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.files.wordpress.com/2022/03/image-7.png%3Fw%3D815&amp;raw" srcset="https://milenapetrofigsblog.files.wordpress.com/2022/03/image-7.png 815w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-7.png?w=150 150w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-7.png?w=300 300w, https://milenapetrofigsblog.files.wordpress.com/2022/03/image-7.png?w=768 768w"><figcaption data-dcnode-id="1406"><em data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Bolsheviks</span></em></figcaption></figure><span data-dcnode-id="1404" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">During the Soviet era as the city was expanding the number of raions also gradually increased. These newer districts of the city along with some older areas were then named in honour of prominent communists and socialist revolutionary figures. Owing to the way in which many communist party members eventually after a certain period of time fell out of favour and so were replaced with new fresher minds so too did the names of Kyiv’s districts change accordingly. The last raion reform took place in 2001 when the number of raions has been decreased from  fourteen to ten.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">After the transfer of the capital of the Ukrainian SSR from Kharkiv to Kyiv in 1934 a whole set of government buildings was planned for the city. &nbsp;A contest for the construction of the new parliament building was won by architect Volodymyr Zabolotny in 1936.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">The original building was constructed from 1936 to 1938. Having been destroyed in the Second World War the building was reconstructed from 1945 to 1947 with the rebuilt glass dome one metre higher than the original.</span></p><span data-dcnode-id="1395" instrument_node="">
</span></div><span data-dcnode-id="1392" instrument_node="">

</span><header class="entry-header" data-dcnode-id="1356"><span data-dcnode-id="1361" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1358"><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/02/17/the-bush-singer/" rel="bookmark"><span data-dcnode-id="1360" instrument_node="">The Bush Singer</span></a></h2><span data-dcnode-id="1357" instrument_node=""> </span></header><span data-dcnode-id="1354" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1227"><span data-dcnode-id="1353" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1351"><img alt="The Man from Snowy River and Other Verses" data-dcnode-id="1352" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bing.com/th%3Fid%3DAMMS_a56bde00e578122ef25ff36218e5418b%26w%3D120%26h%3D180%26c%3D7%26rs%3D1%26qlt%3D80%26o%3D6%26cdv%3D1%26dpr%3D1.35%26pid%3D16.1&amp;raw"></figure><span data-dcnode-id="1350" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1349"></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1334"><span data-dcnode-id="1347" instrument_node="">‘</span><em data-dcnode-id="1336"><span data-dcnode-id="1346" instrument_node="">He hails from</span><strong data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1343" instrument_node="">Snowy River,&nbsp;up by Kosciusko’s side, ‘Where the</span><strong data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">&nbsp;hills</span></strong><span data-dcnode-id="1340" instrument_node="">&nbsp;are twice as steep and twice as rough, ‘Where a</span><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1337" instrument_node="">horse’s hoofs&nbsp;strike firelight from the flint stones every stride</span></em><span data-dcnode-id="1335" instrument_node="">…’</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1321"><em data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">The Man from Snowy River and Other Verses </span></em><span data-dcnode-id="1330" instrument_node="">is the first collection of poems by Australian poet</span><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1327" instrument_node="">Banjo Paterson. It was released in hardback by Angus and Robertson in 1895 and features the poet’s widely anthologised poems </span><em data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">The Man from Snowy River, Clancy of the Overflow, Saltbush Bill </span></em><span data-dcnode-id="1324" instrument_node="">and </span><em data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">The Man from Ironbark.</span></em></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1305"><span data-dcnode-id="1319" instrument_node="">Andrew Barton Paterson who was born on the seventeenth of February in 1864 at Narrambla near Orange was an Australian bush journalist and author. He was popularly known as Banjo Paterson from his pen name </span><em data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">The Banjo</span></em><span data-dcnode-id="1316" instrument_node="">.</span><br data-dcnode-id="1315"><span data-dcnode-id="1314" instrument_node="">He wrote many ballads and poems about Australian life drawing particularly on the rural and outback areas including the district around Binalong in New South Wales where he spent much of his childhood.</span><br data-dcnode-id="1313"><span data-dcnode-id="1312" instrument_node="">Best known for his rousing folk classics&nbsp;</span><em data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">The Man from Snowy River</span></em><span data-dcnode-id="1309" instrument_node="">&nbsp;and&nbsp;</span><em data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Waltzing Matilda</span></em><span data-dcnode-id="1306" instrument_node=""> Paterson is widely acknowledged as Australia’s greatest and most popular balladist. His poems written with great gusto and humour celebrate all the romance and rough and tumble of old Australia.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1290"><span data-dcnode-id="1303" instrument_node="">Paterson began submitting and having poetry published in the Sydney edition of&nbsp;</span><em data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">The Bulletin</span></em><span data-dcnode-id="1300" instrument_node=""> in 1885&nbsp;under the pseudonym of </span><em data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">The Banjo </span></em><span data-dcnode-id="1297" instrument_node="">being the name of a favourite horse. Paterson liked </span><em data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">The Bulletin</span></em><span data-dcnode-id="1294" instrument_node=""> and was an ardent nationalist and in 1889 published a pamphlet&nbsp;</span><em data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Australia for the Australians</span></em><span data-dcnode-id="1291" instrument_node="">&nbsp;which told of his disdain for cheap labour and his admiration of hard work and the nationalist spirit. </span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1281"><span data-dcnode-id="1288" instrument_node="">The Banjo wrote a poem&nbsp;</span><em data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">The Man from Snowy River</span></em><span data-dcnode-id="1285" instrument_node=""> about the drover when the stockmen tell the story of his ride in 1890 and caught the heart of the nation while later in 1895 the author had a collection of his works published under that name including the poem </span><em data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Clancy of The Overflow</span></em><span data-dcnode-id="1282" instrument_node=""> written in 1889 about a city dweller who met the drover whose life in the outback is romanticized. The book being the most popular collection of Australian Bush poetry is still being reprinted. </span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1272"><span data-dcnode-id="1279" instrument_node="">With his flair for the written word and rising to prominence as a writer Banjo Paterson practiced law as a solicitor in Sydney. It was during these years of legal practice that Paterson began submitting poetry for publication in The&nbsp;</span><em data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Bulletin</span></em><span data-dcnode-id="1276" instrument_node=""> the well established literary journal.&nbsp;</span><em data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">In Defence of the Bush</span></em><span data-dcnode-id="1273" instrument_node=""> written by Banjo Paterson was first published on the twenty third of July in 1892. The legal documents contained within his papers where his legal work is interspersed with snippets of verse are early drafts which  would later form the basis of publications that are widely known.&nbsp;</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1266"><span data-dcnode-id="1270" instrument_node="">Banjo Paterson was a journalist, lawyer, jockey, soldier and a farmer. He became a war correspondent for&nbsp;</span><em data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">The Sydney Morning Herald</span></em><span data-dcnode-id="1267" instrument_node="">&nbsp;during the Second Boer War, the Boxer Rebellion and World War I. The eldest son of a Scottish immigrant from Lanarkshire Andrew Bogle Paterson and Rose Isabella Barton his family lived on the isolated Buckinbah station until he was aged five. When Paterson’s uncle died his family took over the uncle’s farm in Illalong near Yass.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Paterson turned ten years old when he was sent to school at Sydney Grammar School performing well both as a student and a sportsman. Leaving school at the age of sixteen the youth took up the role of an articled clerk in a law firm and Paterson later qualified as a solicitor and married on the eighth of April in 1903 Alice Emily Walker of Tenterfield station in New South Wales at Saint Stephen’s Presbyterian Church in Tenterfield. Their first home was at Queen Street in Woollahra and the Patersons’ two children were Grace born in 1904 and Hugh in 1906.&nbsp;</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1254"><span data-dcnode-id="1261" instrument_node="">Banjo Paterson is associated with children’s poetry and did produce quite a few verses some of which were believed to have been written for his grandchildren.&nbsp;One collection </span><em data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">The Animals Noah Forgot</span></em><span data-dcnode-id="1258" instrument_node="">&nbsp;contains a series of playful verses that explore the idiosyncrasies&nbsp;of Australia’s unique wildlife. In the collections drafts and fragments of the verses that made it into the published volume with handwritten notes and amendments are in two first editions of the 1933 publication. One copy is inscribed with the message ‘</span><em data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">To my dear wife with much love and admiration for her unfailing pluck and cheerfulness</span></em><span data-dcnode-id="1255" instrument_node="">.’&nbsp;</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Amongst the drafts, manuscripts and diaries acquired with the papers of Banjo Paterson are a series of letters and photographs&nbsp;that provide a rare insight into the family life shared by Paterson with his wife and his children. The intimate letters reveal the daily life of the family often separated due to the nature of Paterson’s work and his various postings as a war correspondent.&nbsp;</span></p><span data-dcnode-id="1250" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="1244"><img alt="Photograph of a couple and two young children outside a large house" data-dcnode-id="1249" height="716" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nla.gov.au/sites/default/files/styles/wide/public/media/images/2022-02/Family%2520photograph%2520nla.obj-2869312490-1.jpg%3Fitok%3DV2ILTp7R&amp;raw" width="520"><figcaption data-dcnode-id="1245"><em data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node=""> Papers of Andrew Barton ‘Banjo’ Paterson</span></em><span data-dcnode-id="1246" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="1243" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Paterson died of a heart attack in Sydney on the fifth of February in 1941 aged seventy six. To celebrate the anniversary of Banjo Paterson’s birth one hundred and fifty eight years ago on February the seventeenth in 1864 and after four generations with the Paterson family there are manuscripts of children’s poetry, personal letters written to his family to discover more about the life and achievements of Australia’s best known bush poet.&nbsp; </span></p><span data-dcnode-id="1240" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="1232"><img alt="Front page of sheet music for song Waltzing Matilda. White text on a red background above the title reads &quot;The Unoffficial Australian National Anthem!&quot;" data-dcnode-id="1239" height="631" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nla.gov.au/sites/default/files/styles/wide/public/media/images/2022-02/Waltzing%2520Matilda%2520nla.obj-175333240-1.jpg%3Fitok%3DFSSK5Qxd&amp;raw" width="501"><figcaption data-dcnode-id="1233"><em data-dcnode-id="1235"><span data-dcnode-id="1238" instrument_node="">A.B Paterson, 1936,&nbsp;</span><em data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Waltzing Matilda, an Australian song</span></em></em><span data-dcnode-id="1234" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="1231" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Whether  best known as a bush poet, lawyer or journalist Banjo Paterson is a commanding figure in Australian history. His poetry is woven into the fabric of Australian culture.</span></p><span data-dcnode-id="1228" instrument_node="">
</span></div><span data-dcnode-id="1225" instrument_node="">
</span><footer class="entry-footer" data-dcnode-id="1201"><span data-dcnode-id="1224" instrument_node="">

ata-dcnode-id="1202" instrument_node=""> </span></footer><span data-dcnode-id="1199" instrument_node="">

</span><article class="post-3794 post type-post status-publish format-standard hentry category-uncategorized" data-dcnode-id="1063" id="post-3794"><span data-dcnode-id="1195" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1189"><span data-dcnode-id="1194" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1191"><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/02/07/a-short-history-of-nearly-everything/" rel="bookmark"><span data-dcnode-id="1193" instrument_node="">At the site of Far East&nbsp;history</span></a></h2><span data-dcnode-id="1190" instrument_node=""> </span></header><span data-dcnode-id="1187" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1092"><span data-dcnode-id="1186" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1179"><strong data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Travel Diary on the central parts of Siam, Cambodia and Laos during the years 1858 until 1861</span></strong><span data-dcnode-id="1183" instrument_node=""> </span><strong data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">focusing on the Angkor Temples</span></strong><span data-dcnode-id="1180" instrument_node="">.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1173"><img alt="Henri Mouhot.jpg" data-dcnode-id="1177" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Henri_Mouhot.jpg/175px-Henri_Mouhot.jpg&amp;raw"><figcaption data-dcnode-id="1174"><em data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">A drawing of Henri Mouhot done by H. Rousseau from a photograph</span></em></figcaption></figure><span data-dcnode-id="1172" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1167"><span data-dcnode-id="1171" instrument_node="">He travelled throughout Europe with his brother Charles studying photographic techniques developed by&nbsp;Louis Daguerre. Henri Mouhot’s travel journals are immortalized in </span><em data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Voyage dans les royaumes de Siam, de Cambodge, de Laos et autres parties centrales de l’Indochine</span></em><span data-dcnode-id="1168" instrument_node=""> which were published in 1863 and 1864.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">French naturalist and explorer of the middle of the  nineteenth century he was born in&nbsp;Montbéliard in the department of in France near the Swiss border but spent his childhood in Russia and possibly parts of Asia&nbsp;when he began devoting himself to the study of&nbsp; Natural Science in 1856.&nbsp;</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1158"><span data-dcnode-id="1162" instrument_node="">Henri Mouhot is remembered mostly in connection to Angkor&nbsp;where Mouhot’s tomb is located just outside of Ban Phanom&nbsp;to the east of&nbsp;Luang Prabang. Upon reading </span><em data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">The Kingdom and People of Siam </span></em><span data-dcnode-id="1159" instrument_node="">by Sir John Bowring in 1857 Mouhot decided to travel to Indochina&nbsp;to conduct a series of botanical expeditions for the collection of new zoological specimens. </span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">His initial requests for grants and passage were rejected by French companies and the government of Napoleon III. The Royal Geographical Society and the Zoological Society of London lent him their support and he set sail for Bangkok via&nbsp;Singapore.</span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1144"><span data-dcnode-id="1153" instrument_node="">Perhaps none of the previous European visitors wrote as evocatively as Mouhot who included interesting and detailed sketches. Posthumously published </span><em data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Travels in Siam, Cambodia and Laos</span></em><span data-dcnode-id="1150" instrument_node=""> by Mouhot compared Angkor to the pyramids for it was popular in the West at that time to ascribe the origin of all civilization to the Middle East. For example he described the Buddha heads at the gateways to Angkor Thom as “…</span><em data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">four immense heads in the Egyptian style</span></em><span data-dcnode-id="1147" instrument_node="">” and wrote of&nbsp;Angkor “…</span><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">there are ruins of such grandeur that at the first view one is filled with profound admiration and cannot but ask what has become of this powerful race, so civilized, so enlightened, the authors of these gigantic works?”</span></em></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1138"><span data-dcnode-id="1142" instrument_node="">Mouhot often mistakenly is credited with discovering Angkor although Angkor was never lost  the location and existence of the entire series of Angkor sites was always known to the Khmers and had been visited by several westerners since the sixteenth century. Mouhot mentions in his journals that his contemporary Charles Emile Bouillevaux a French missionary based in Battambang had reported that he and other Western explorers and missionaries had visited Angkor Wat&nbsp;and the other&nbsp;Khmer&nbsp;temples at least five years before Mouhot. Bouillevaux published his accounts in 1857 under the title of “</span><em data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Travel in Indochina 1848 to 1846, The Annam and Cambodia.</span></em><span data-dcnode-id="1139" instrument_node="">” Previously a Portuguese trader Diogo do Couto visited Angkor and wrote his accounts about it in 1550 and the Portuguese monk Antonio da Magdalena had written about his visit to Angkor Wat in 1586. Mouhot did enthuse people about Angkor in the West.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1134"><em data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">“One of these temples at Ongcor is a rival to that of&nbsp;Solomon and erected by some ancient&nbsp;Michelangelo might take an honourable place beside our most beautiful buildings. It is grander than anything left to us by&nbsp;Greece or Rome and presents a sad contrast to the state of barbarism in which the nation is now plunged.”</span></em></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Mouhot erroneously asserted that Angkor was the work of an earlier civilization than the Khmer. For although the very same civilization which built Angkor was alive and right before his eyes he considered them in a state of barbarism and could not believe they were civilized or enlightened enough to have built it. He assumed that the authors of such grandeur were a disappeared race and mistakenly dated Angkor back over two millennia to around the same era as Rome. </span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1125"><span data-dcnode-id="1129" instrument_node="">The true history of Angkor Wat later was pieced together from the book&nbsp;</span><em data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">The Customs of Cambodia</span></em><span data-dcnode-id="1126" instrument_node="">&nbsp;written by Temur Khan’s&nbsp;envoy&nbsp;Zhou Daguan to Cambodia in 1295 and 1296 and from stylistic and&nbsp;epigraphic&nbsp;evidence accumulated during the subsequent clearing and restoration work carried out across the whole&nbsp;Angkor site. It was  known later that the dates of Angkor’s habitation were from the early ninth to the early fifteenth centuries.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">The Royal Geographical Society and The Zoological Society both interested in announcing new finds seemed to have encouraged the rumour that Mouhot whom they had sponsored to chart mountains and rivers and catalogue new species had discovered Angkor.  Mouhot may have been a tool for French expansionism and the annexation of territories which followed shortly after his death. Mouhot did not seem to be a colonialist for he occasionally doubted the beneficial effects of European colonisation.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1114"><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">“Will the present movement of the nations of Europe towards the East result in good by introducing into these lands the blessings of our civilization? Or shall we, as blind instruments of boundless ambition, come hither as a scourge, to add to their present miseries?”</span></p><cite data-dcnode-id="1115"><em data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Travels in Siam, Cambodia and Laos, 1858 to 1860</span></em><span data-dcnode-id="1116" instrument_node="">&nbsp;by Henri Mouhot.</span></cite></blockquote><span data-dcnode-id="1113" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Mouhot died of a malarial fever&nbsp;on his fourth expedition in the jungles of Laos. He had been visiting Luang Prabang&nbsp;the capital of the Lan Xang&nbsp;kingdom as one of three kingdoms which eventually merged into what can be known as modern day Laos&nbsp;and was under the patronage of the king. Two of his servants buried him near a French mission in Naphan by the banks of the Nam Khan river. Mouhot’s favourite servant Phrai transported all of Mouhot’s journals and specimens back to Bangkok from where they were shipped to Europe.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1106"><span data-dcnode-id="1109" instrument_node="">A modest monument was erected over his grave in 1867 under the orders of French commander&nbsp;Ernest Doudart de Lagrée who gave him an eulogy. </span><em data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">“We found everywhere the memory of our compatriot who, by the uprightness of his character and his natural benevolence had acquired the regard and the affection of the natives.”</span></em></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-adtags-visited="true" data-dcnode-id="1100"><span data-dcnode-id="1104" instrument_node="">The popularity of Angkor generated by Mouhot’s writings led to more support for a major French role in its study and preservation. The French carried out the majority of research work by the&nbsp;</span><em data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Ecole Française d’Extrème Orient</span></em><span data-dcnode-id="1101" instrument_node=""> known as the French School of the Far East on Angkor until recently.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1094"><img alt="" data-dcnode-id="1098" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Facade_of_Angkor_Wat.jpg/250px-Facade_of_Angkor_Wat.jpg&amp;raw"><figcaption data-dcnode-id="1095"><em data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Facade of Angkor Wat drawing by Henri Mouhot</span></em></figcaption></figure><span data-dcnode-id="1093" instrument_node="">
</span></div><span data-dcnode-id="1090" instrument_node="">
</span><footer class="entry-footer" data-dcnode-id="1066"><span data-dcnode-id="1089" instrument_node="">
</span><span class="byline" data-dcnode-id="1081"><span class="author vcard" data-dcnode-id="1082"><img alt="" class="avatar avatar-49 grav-hashed grav-hijack" data-dcnode-id="1088" height="49" id="grav-e712300d5a8681daa29a0099c8230545-7" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.gravatar.com/avatar/e712300d5a8681daa29a0099c8230545%3Fs%3D49%26d%3Didenticon%26r%3DG&amp;raw" width="49"><span class="screen-reader-text" data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Author </span></span><span data-dcnode-id="1085" instrument_node=""> </span><a class="url fn n" data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/author/milenapetrovic129/"><span data-dcnode-id="1084" instrument_node="">Milenapetrofig</span></a></span></span><span class="posted-on" data-dcnode-id="1073"><span class="screen-reader-text" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Posted on </span></span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/02/07/a-short-history-of-nearly-everything/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1077" datetime="2022-02-07T10:25:45+00:00"><span data-dcnode-id="1078" instrument_node="">February 7, 2022</span></time><time class="updated" data-dcnode-id="1075" datetime="2022-02-18T00:46:41+00:00"><span data-dcnode-id="1076" instrument_node="">February 18, 2022</span></time></a></span><span class="comments-link" data-dcnode-id="1068"><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milenapetrofigsblog.wordpress.com/2022/02/07/a-short-history-of-nearly-everything/%23respond"><span data-dcnode-id="1072" instrument_node="">Leave a comment</span><span class="screen-reader-text" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node=""> on At the site of Far East&nbsp;history</span></span></a></span><span data-dcnode-id="1067" instrument_node=""> </span></footer><span data-dcnode-id="1064" instrument_node="">
