</span><span data-dcnode-id="5781" id="freeText5683765931894523924" style="display:none"><span data-dcnode-id="5791" instrument_node="">Author Erik Larson imbues the incredible events surrounding the 1893 Chicago World's Fair with such drama that readers may find themselves checking the book's categorization to be sure that 'The Devil in the White City' is not, in fact, a highly imaginative novel. Larson tells the stories of two men: Daniel H. Burnham, the architect responsible for the fair's construction, and H.H. Holmes, a serial killer masquerading as a charming doctor. </span><br data-dcnode-id="5790"><br data-dcnode-id="5789"><span data-dcnode-id="5788" instrument_node="">Burnham's challenge was immense. In a short period of time, he was forced to overcome the death of his partner and numerous other obstacles to construct the famous "White City" around which the fair was built. His efforts to complete the project, and the fair's incredible success, are skillfully related along with entertaining appearances by such notables as Buffalo Bill Cody, Susan B. Anthony, and Thomas Edison. </span><br data-dcnode-id="5787"><br data-dcnode-id="5786"><span data-dcnode-id="5785" instrument_node="">The activities of the sinister Dr. Holmes, who is believed to be responsible for scores of murders around the time of the fair, are equally remarkable. He devised and erected the World's Fair Hotel, complete with crematorium and gas chamber, near the fairgrounds and used the event as well as his own charismatic personality to lure victims. </span><br data-dcnode-id="5784"><br data-dcnode-id="5783"><span data-dcnode-id="5782" instrument_node="">Combining the stories of an architect and a killer in one book, mostly in alternating chapters, seems like an odd choice but it works. The magical appeal and horrifying dark side of 19th-century Chicago are both revealed through Larson's skillful writing. - John Moe</span></span><span data-dcnode-id="5780" instrument_node="">

</span><span data-dcnode-id="4941" id="freeTextContainer11169810036510043643"><span data-dcnode-id="4945" instrument_node="">Poor Erik Larson.</span><br data-dcnode-id="4944"><br data-dcnode-id="4943"><span data-dcnode-id="4942" instrument_node="">He wanted to write an extensive, in-depth look at the 1893 World's Fair, which was a collaboration of some of the greatest creative minds in the country (including the guy who designed the Flatiron building in New York and Walt Disney's dad) and gave us, among other things, the Ferris Wheel, the zipper, shredded wheat, and Columbus Day. The entire venture was almost a disaster, with delays, petty fighting, bad weather, and more delays, but it was ultimately a massive success and</span></span><span data-dcnode-id="4940" instrument_node="">
</span><span data-dcnode-id="4893" id="freeText11169810036510043643" style="display:none"><span data-dcnode-id="4939" instrument_node="">Poor Erik Larson.</span><br data-dcnode-id="4938"><br data-dcnode-id="4937"><span data-dcnode-id="4936" instrument_node="">He wanted to write an extensive, in-depth look at the 1893 World's Fair, which was a collaboration of some of the greatest creative minds in the country (including the guy who designed the Flatiron building in New York and Walt Disney's dad) and gave us, among other things, the Ferris Wheel, the zipper, shredded wheat, and Columbus Day. The entire venture was almost a disaster, with delays, petty fighting, bad weather, and more delays, but it was ultimately a massive success and helped make the city of Chicago what it is today. </span><br data-dcnode-id="4935"><br data-dcnode-id="4934"><span data-dcnode-id="4933" instrument_node="">Here's what it must have looked like when Larson pitched his idea for the book:</span><br data-dcnode-id="4932"><br data-dcnode-id="4931"><span data-dcnode-id="4930" instrument_node="">Larson: "And the fair didn't go flawlessly - towards the end of the fair, the mayor of Chicago was assassinated by a crazy guy, and there were tons of disappearances over the course of the fair, and a lot of them were probably the work of this serial killer who had opened a hotel near the fairgrounds - </span><br data-dcnode-id="4929"><br data-dcnode-id="4928"><span data-dcnode-id="4927" instrument_node="">Editor: "Wait, serial killer? And it's connected to the fair? Cool, let's try to include that in the book. Also the crazy assassin sounds good, too."</span><br data-dcnode-id="4926"><br data-dcnode-id="4925"><span data-dcnode-id="4924" instrument_node="">Larson: "No, the killer - H.H. Holmes - really wasn't connected to the fair at all. I mean, he used the fair as a way to collect victims, but he would have killed tons of people even without it. In fact, after the fair he moved on and kept murdering people, so the fair really didn't have any effect on his methods..."</span><br data-dcnode-id="4923"><br data-dcnode-id="4922"><span data-dcnode-id="4921" instrument_node="">Editor: "Doesn't matter! How about you alternate between chapters about the fair and chapters about Holmes killing people?"</span><br data-dcnode-id="4920"><br data-dcnode-id="4919"><span data-dcnode-id="4918" instrument_node="">Larson: "But I don't really know much about that. Nobody does - Holmes never admitted to killing all those people, even after the police found human remains in his basement. I don't really know any actual details about the killings."</span><br data-dcnode-id="4917"><br data-dcnode-id="4916"><span data-dcnode-id="4915" instrument_node="">Editor: "That's okay, you can just make it up. I'll give you some trashy crime novels to read, that'll give you some ideas. Now tell me more about the assassination."</span><br data-dcnode-id="4914"><br data-dcnode-id="4913"><span data-dcnode-id="4912" instrument_node="">Larson: "He was just some mentally unbalanced person who thought he deserved a position in the mayor's office and shot the guy when he realized it wasn't going to happen. But the death cast a pall over the entire closing ceremony of the fair, and it - "</span><br data-dcnode-id="4911"><br data-dcnode-id="4910"><span data-dcnode-id="4909" instrument_node="">Editor: "Good, let's sprinkle in some bits about the crazy guy throughout the book, too. Now, back to Holmes: did he maybe kill somebody at the fair, or did they find a body on the grounds or something?"</span><br data-dcnode-id="4908"><br data-dcnode-id="4907"><span data-dcnode-id="4906" instrument_node="">Larson: "No, the Chicago police didn't even notice anything was happening. It wasn't until he left Chicago that a detective from another state tracked him down."</span><br data-dcnode-id="4905"><br data-dcnode-id="4904"><span data-dcnode-id="4903" instrument_node="">Editor: "Okay, so we'll make the end of the book about the manhunt for Holmes and his capture."</span><br data-dcnode-id="4902"><br data-dcnode-id="4901"><span data-dcnode-id="4900" instrument_node="">Larson: "What does any of this have to do with the World's Fair?"</span><br data-dcnode-id="4899"><br data-dcnode-id="4898"><span data-dcnode-id="4897" instrument_node="">Editor: "Hell if I know. You're the writer, not me - you figure it out. Here's a check. Now go make me a bestseller!"</span><br data-dcnode-id="4896"><br data-dcnode-id="4895"><span data-dcnode-id="4894" instrument_node="">Four stars for the World's Fair stuff, two stars for the pulpy unrelated bullshit.</span></span><span data-dcnode-id="4892" instrument_node="">

</span><span data-dcnode-id="4784" id="freeTextContainer18110105350464832622"><span data-dcnode-id="4794" instrument_node="">This book is two, two, </span><a data-dcnode-id="4792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/watch%3Fv%3DE8zwnXjIjPM%26t%3D0m01s" rel="nofollow noopener"><span data-dcnode-id="4793" instrument_node="">two books in one</span></a><span data-dcnode-id="4791" instrument_node="">!</span><br data-dcnode-id="4790"><br data-dcnode-id="4789"><span data-dcnode-id="4788" instrument_node="">Sorry, that was annoying. But it’s almost as if Erik Larson wrote two really short books—one about the 1893 World’s Columbian Exposition and another about the murder spree of Dr. H. H. Holmes—and then shoved them together to create a single story. The result isn’t </span><i data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">bad</span></i><span data-dcnode-id="4785" instrument_node="">, and I think Larson is successful at maintaining clean seams between the two narratives, but it’s hard to argue these two occurrences are anything but abstractedly related. Yes, Holmes lived </span></span><span data-dcnode-id="4783" instrument_node="">
</span><span data-dcnode-id="4753" id="freeText18110105350464832622" style="display:none"><span data-dcnode-id="4782" instrument_node="">This book is two, two, </span><a data-dcnode-id="4780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/watch%3Fv%3DE8zwnXjIjPM%26t%3D0m01s" rel="nofollow noopener"><span data-dcnode-id="4781" instrument_node="">two books in one</span></a><span data-dcnode-id="4779" instrument_node="">!</span><br data-dcnode-id="4778"><br data-dcnode-id="4777"><span data-dcnode-id="4776" instrument_node="">Sorry, that was annoying. But it’s almost as if Erik Larson wrote two really short books—one about the 1893 World’s Columbian Exposition and another about the murder spree of Dr. H. H. Holmes—and then shoved them together to create a single story. The result isn’t </span><i data-dcnode-id="4774"><span data-dcnode-id="4775" instrument_node="">bad</span></i><span data-dcnode-id="4773" instrument_node="">, and I think Larson is successful at maintaining clean seams between the two narratives, but it’s hard to argue these two occurrences are anything but abstractedly related. Yes, Holmes lived in Chicago at the time of the fair and lured a bunch of people to his murder castle (he be snatchin’ yo’ people </span><i data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">up</span></i><span data-dcnode-id="4770" instrument_node="">!), but the events didn’t weigh heavily on the fair itself or on the atmosphere surrounding it. No alarm bells went off anywhere in Chicago as a result of his, um, unsavory indiscretions.</span><br data-dcnode-id="4769"><br data-dcnode-id="4768"><span data-dcnode-id="4767" instrument_node="">Still, there is a lot of interesting stuff here, information specific to the world’s fair, and it is fun to learn new things. For example, the Chicago Columbian Exposition exudes a long list of firsts: it saw the invention of the world’s first ferris wheel, it led the nation in its first public observance of the Pledge of Allegiance, and it helped to establish alternating current as the industry standard for electricity distribution. Even that awful </span><a data-dcnode-id="4765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/watch%3Fv%3DRFMtSDjCfXU%26t%3D02m46s" rel="nofollow noopener"><span data-dcnode-id="4766" instrument_node="">snake charmer song</span></a><span data-dcnode-id="4764" instrument_node=""> has its origins in the Chicago World’s Fair.</span><br data-dcnode-id="4763"><br data-dcnode-id="4762"><br data-dcnode-id="4761"><a data-dcnode-id="4757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//i1276.photobucket.com/albums/y472/ancatdubh2/Ferris-wheel_zps2ac51d13.jpeg" rel="nofollow noopener" title="click to enlarge"><span data-dcnode-id="4760" instrument_node="">
</span><img alt="ferris wheel" class="gr-hostedUserImg" data-dcnode-id="4759" height="296" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1422571053i/13519020._SX540_.jpg&amp;raw" width="400"><span data-dcnode-id="4758" instrument_node="">
</span></a><br data-dcnode-id="4756"><br data-dcnode-id="4755"><span data-dcnode-id="4754" instrument_node="">While writing this review, I’ve come to learn that Leonardo DiCaprio, that beautiful man with the screaming cherry tomato head on a toothpick body, is producing the film adaptation, and will also play the role of serial killer H. H. Holmes. For this I am pleased.</span></span><span data-dcnode-id="4752" instrument_node="">

</span><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4571" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1587946960i/29363149._SX540_.jpg&amp;raw" width="400"><br data-dcnode-id="4570"><br data-dcnode-id="4569"><b data-dcnode-id="4564"><u data-dcnode-id="4565"><span data-dcnode-id="4568" instrument_node=""> </span><a data-dcnode-id="4566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/efJYd7l7LGE" rel="nofollow noopener"><span data-dcnode-id="4567" instrument_node="">CLICK HERE for a Booktube Video</span></a></u></b><span data-dcnode-id="4563" instrument_node=""> about:</span><br data-dcnode-id="4562"><br data-dcnode-id="4561"><span data-dcnode-id="4560" instrument_node="">Ten Fabulous Book Reviews and One That Will Make You Go - </span><i data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">doesn't that belong to Miranda Reads?</span></i><br data-dcnode-id="4557"><br data-dcnode-id="4556"><span data-dcnode-id="4555" instrument_node="">Now that you know this one made the list check the video review to see the rest (and find the stolen surprise)!</span></blockquote><b data-dcnode-id="4549"><span data-dcnode-id="4553" instrument_node="">
</span><u data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">The Written Review</span></u><span data-dcnode-id="4550" instrument_node="">
</span></b><br data-dcnode-id="4548"><br data-dcnode-id="4547"><b data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">Overwhelmingly underwhelming</span></b><span data-dcnode-id="4544" instrument_node=""> </span><br data-dcnode-id="4543"><br data-dcnode-id="4542"><span data-dcnode-id="4541" instrument_node="">1893 was a year to remember - the World's Fair came to Chicago and H. H. Holmes (one of America's most famous serial killers) took full advantage. He stalked the streets and murdered whomever he pleased.</span></span><span data-dcnode-id="4539" instrument_node="">
</span><span data-dcnode-id="4428" id="freeText14734697047123052651" style="display:none"><blockquote data-dcnode-id="4520"><span data-dcnode-id="4538" instrument_node="">
</span><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4537" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1587946960i/29363149._SX540_.jpg&amp;raw" width="400"><br data-dcnode-id="4536"><br data-dcnode-id="4535"><b data-dcnode-id="4530"><u data-dcnode-id="4531"><span data-dcnode-id="4534" instrument_node=""> </span><a data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/efJYd7l7LGE" rel="nofollow noopener"><span data-dcnode-id="4533" instrument_node="">CLICK HERE for a Booktube Video</span></a></u></b><span data-dcnode-id="4529" instrument_node=""> about:</span><br data-dcnode-id="4528"><br data-dcnode-id="4527"><span data-dcnode-id="4526" instrument_node="">Ten Fabulous Book Reviews and One That Will Make You Go - </span><i data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">doesn't that belong to Miranda Reads?</span></i><br data-dcnode-id="4523"><br data-dcnode-id="4522"><span data-dcnode-id="4521" instrument_node="">Now that you know this one made the list check the video review to see the rest (and find the stolen surprise)!</span></blockquote><b data-dcnode-id="4515"><span data-dcnode-id="4519" instrument_node="">
</span><u data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">The Written Review</span></u><span data-dcnode-id="4516" instrument_node="">
</span></b><br data-dcnode-id="4514"><br data-dcnode-id="4513"><b data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">Overwhelmingly underwhelming</span></b><span data-dcnode-id="4510" instrument_node=""> </span><br data-dcnode-id="4509"><br data-dcnode-id="4508"><span data-dcnode-id="4507" instrument_node="">1893 was a year to remember - the World's Fair came to Chicago and H. H. Holmes (one of America's most famous serial killers) took full advantage. He stalked the streets and murdered whomever he pleased.</span><br data-dcnode-id="4506"><br data-dcnode-id="4505"><span data-dcnode-id="4504" instrument_node="">I really liked the idea of this one - to take one of America's greatest triumphs and splicing his story along with one of the greatest horrors. However. There's too high of a disconnect between these two sides </span><br data-dcnode-id="4503"><br data-dcnode-id="4502"><span data-dcnode-id="4501" instrument_node="">This reads like </span><b data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">two separate books</span></b><span data-dcnode-id="4498" instrument_node=""> thrown together at inopportune moments - as soon one half got the least bit exciting, we'd swap. It was </span><b data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">frustrating and ultimately exasperating</span></b><span data-dcnode-id="4495" instrument_node=""> to read.</span><br data-dcnode-id="4494"><br data-dcnode-id="4493"><span data-dcnode-id="4492" instrument_node=""> The World Fair section was interesting in its own right, but it </span><b data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node=""> paled so much in comparison </span></b><span data-dcnode-id="4489" instrument_node="">to the serial killer that it became something to </span><b data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">slog through</span></b><span data-dcnode-id="4486" instrument_node="">. </span><br data-dcnode-id="4485"><br data-dcnode-id="4484"><span data-dcnode-id="4483" instrument_node="">For the </span><b data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">World's Fair</span></b><span data-dcnode-id="4480" instrument_node=""> - we see the entirety of its creation and eventual destruction. Ample page space was given to dissecting every. single. mind-numbing. detail.</span><br data-dcnode-id="4479"><br data-dcnode-id="4478"><span data-dcnode-id="4477" instrument_node="">Roughly half the book was wasted on </span><b data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">petty squabbles</span></b><span data-dcnode-id="4474" instrument_node=""> about the building paint, boats in the harbor and the landscaping. (</span><i data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">I finally understand how my mother can fall asleep while reading</span></i><span data-dcnode-id="4471" instrument_node="">.) </span><br data-dcnode-id="4470"><br data-dcnode-id="4469"><span data-dcnode-id="4468" instrument_node="">Then, once I nodded off between 2-3 times, we'd jump to the insane murderer. But, there was a huge disconnect regarding page space. </span><br data-dcnode-id="4467"><br data-dcnode-id="4466"><span data-dcnode-id="4465" instrument_node="">The longer the book went on, the shorter those H. H. Holmes sections would be - towards the end, we'd only get </span><b data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">we'd get 1 to 10 pages from H. H. Holmes' perspective</span></b><span data-dcnode-id="4462" instrument_node=""> for every couple chapters of building plans. Fabulous.</span><br data-dcnode-id="4461"><br data-dcnode-id="4460"><span data-dcnode-id="4459" instrument_node="">The two main stories weren't entirely separate - they did tangentially intersect - notably H. H. Holmes managed to lure so many people into his hotel </span><i data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node=""> because</span></i><span data-dcnode-id="4456" instrument_node=""> of the fair and he </span><i data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node=""> did </span></i><span data-dcnode-id="4453" instrument_node=""> take one of his victims to the fair but those connections did not seem strong enough for a joint book.</span><br data-dcnode-id="4452"><br data-dcnode-id="4451"><span data-dcnode-id="4450" instrument_node="">While I appreciate the time and effort it took to research such a complete account of 1893, I had a hard time enjoying the novel. It felt like more of a mess than anything.</span><br data-dcnode-id="4449"><br data-dcnode-id="4448"><i data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">Popsugar 2018 Reading Challenge: A book you meant to read in 2017 but didn't get to</span></i><br data-dcnode-id="4445"><br data-dcnode-id="4444"><a data-dcnode-id="4442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bit.ly/33ii2CT" rel="nofollow noopener"><span data-dcnode-id="4443" instrument_node="">YouTube</span></a><span data-dcnode-id="4441" instrument_node=""> | </span><a data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mirandareads.com/" rel="nofollow noopener"><span data-dcnode-id="4440" instrument_node="">Blog</span></a><span data-dcnode-id="4438" instrument_node=""> | </span><a data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/miranda_reads/%3Fhl%3Den" rel="nofollow noopener"><span data-dcnode-id="4437" instrument_node="">Instagram</span></a><span data-dcnode-id="4435" instrument_node=""> | </span><a data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/Miranda_Reads" rel="nofollow noopener"><span data-dcnode-id="4434" instrument_node="">Twitter</span></a><span data-dcnode-id="4432" instrument_node=""> | </span><a data-dcnode-id="4430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/mirandareads1" rel="nofollow noopener"><span data-dcnode-id="4431" instrument_node="">Facebook</span></a><span data-dcnode-id="4429" instrument_node=""> | Snapchat @miranda_reads</span></span><span data-dcnode-id="4427" instrument_node="">

</span><span data-dcnode-id="4324" id="freeTextContainer14730869076622493308"><span data-dcnode-id="4331" instrument_node="">Humour me and please allow the channeling an eighth grader for just a moment. OMG Squeee!!1 Teh best!! (Would an eighth grader say "teh best"?) And now we return you to our regularly scheduled review.</span><br data-dcnode-id="4330"><br data-dcnode-id="4329"><span data-dcnode-id="4328" instrument_node="">I'm not a huge fan of non-fiction. Scratch that. I'm a huge fan of non-fiction, but not so huge a fan of </span><i data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">reading</span></i><span data-dcnode-id="4325" instrument_node=""> non-fiction. While I appreciate learning and broadening my understanding of the world around and as it once was, I find myself pretty quickly distracted from whatever non-fictional work I</span></span><span data-dcnode-id="4323" instrument_node="">
</span><span data-dcnode-id="4273" id="freeText14730869076622493308" style="display:none"><span data-dcnode-id="4322" instrument_node="">Humour me and please allow the channeling an eighth grader for just a moment. OMG Squeee!!1 Teh best!! (Would an eighth grader say "teh best"?) And now we return you to our regularly scheduled review.</span><br data-dcnode-id="4321"><br data-dcnode-id="4320"><span data-dcnode-id="4319" instrument_node="">I'm not a huge fan of non-fiction. Scratch that. I'm a huge fan of non-fiction, but not so huge a fan of </span><i data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">reading</span></i><span data-dcnode-id="4316" instrument_node=""> non-fiction. While I appreciate learning and broadening my understanding of the world around and as it once was, I find myself pretty quickly distracted from whatever non-fictional work I pick up. The fact is: most writers of non-fiction are more experts in their field of study than they are expert authors. They deliver the goods well, but aren't quite as adept at prettying them up for consumption.</span><br data-dcnode-id="4315"><br data-dcnode-id="4314"><span data-dcnode-id="4313" instrument_node="">Erik Larson, however, is a genius. Or something. I could not put this book down. (In the figurative sense—it actually took me about two weeks to read.) The entire length of my time in this book was marked with moments of in which I would stop reading, interrupt my wife from the depths of her studies, and remark </span><i data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">again</span></i><span data-dcnode-id="4310" instrument_node=""> how good this book was. </span><br data-dcnode-id="4309"><br data-dcnode-id="4308"><span data-dcnode-id="4307" instrument_node="">(I'm sure that she would have been happier had Larson just been your average purveyor of non-fictionalizations.)</span><br data-dcnode-id="4306"><br data-dcnode-id="4305"><span data-dcnode-id="4304" instrument_node="">In </span><i data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">The Devil in the White City</span></i><span data-dcnode-id="4301" instrument_node="">, Larson chronicles chiefly a tale of two city-dwellers. Architect, Daniel Burnham and pharmacist, Henry Holmes. One would helm the creation of a wonderland of awe-striking beauty and refinement. The other would become one of America's earliest and most diabolical serial killers. All this against the backdrop of the 1893 World's Columbian Exposition (a.k.a. the Chicago World's Fair).</span><br data-dcnode-id="4300"><br data-dcnode-id="4299"><span data-dcnode-id="4298" instrument_node="">Daniel Burnham, the self-made architect, who designed </span><a data-dcnode-id="4296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Rookery_Building" rel="nofollow noopener"><span data-dcnode-id="4297" instrument_node="">the Rookery</span></a><span data-dcnode-id="4295" instrument_node=""> in Chicago would design </span><a data-dcnode-id="4293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Flatiron_Building" rel="nofollow noopener"><span data-dcnode-id="4294" instrument_node="">the Flatiron Building</span></a><span data-dcnode-id="4292" instrument_node=""> in New York, assembled a team of the best American architects of the day for the task of crafting a World's Fair in Chicago that would be even more exquisite than the one held in Paris years earlier. The Paris Exposition had also unveiled Gustave Eiffel's incredible tower, so Burnham put a call out to American engineering: something grander would have to be proposed and built. National reputation was at stake as well as civic pride. Larson explores in exciting detail the glories and the tragedies of this great endeavor.</span><br data-dcnode-id="4291"><br data-dcnode-id="4290"><span data-dcnode-id="4289" instrument_node="">In contrast to this paean to human ingenuity and spirit, Larson focuses the other half of his narrative on a man as diligent in his chosen task as Burnham was in his. H.H. Holmes, the self-style pharmacist, who killed upwards of twenty-seven (mostly young women, fresh to the city), built for himself a hideous parody of the grand buildings that the world would soon celebrate. Bit by bit, he crafted what would later be known as his murder castle, a hotel whose ground floor hosted several businesses and whose other floors would boast far more sinister use. The second and third floors contained numerous rooms and hallways and secret compartments and switches. Airtight rooms with gas outlets. Walk-in vaults purpose not for keeping out but for keeping in. And a slicked chute to the basement where a kiln, acid, and limepits awaited. Holmes was handsome and charming in a way that made him irresistible to women. He was also a psychopath who would turn the American attention far too late.</span><br data-dcnode-id="4288"><br data-dcnode-id="4287"><span data-dcnode-id="4286" instrument_node="">Larson, as a chronicler, is top notch. He entertains even as he educates. And he leaves just enough narrative tension to compel the reader along his path. Larson knows how to keep enough information back to avoid rendering the latter half of his book naught but excruciating anti-climax. </span><i data-dcnode-id="4284"><span data-dcnode-id="4285" instrument_node="">The Devil in the White City</span></i><span data-dcnode-id="4283" instrument_node=""> is certainly an accomplishment and I wouldn't hesitate to recommend it to anyone.</span><br data-dcnode-id="4282"><br data-dcnode-id="4281"><span data-dcnode-id="4280" instrument_node="">If forced to, I will admit* two quibbles with the book: 1) I was thirsty for </span><a data-dcnode-id="4278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/World%2527s_Columbian_Exposition" rel="nofollow noopener"><span data-dcnode-id="4279" instrument_node="">more pictures</span></a><span data-dcnode-id="4277" instrument_node=""> and wanted desperately to see these buildings that Burnham and company were so busied upon; and 2) on the whole Larson keeps his voice clean of any emotive spots not merited by the characters themselves, but there were two moments when I was sure I was hearing Larson's voice beam through (it could have been worse—at least those two moments were funny).</span><br data-dcnode-id="4276"><br data-dcnode-id="4275"><span data-dcnode-id="4274" instrument_node="">*note: see what I did there? You didn't actually have to force me.</span></span><span data-dcnode-id="4272" instrument_node="">
</span><a data-dcnode-id="4270" data-text-id="14730869076622493308" href="#" onclick="swapContent($(this));; return false;"><span data-dcnode-id="4271" instrument_node="">...more</span></a><span data-dcnode-id="4269" instrument_node="">

</span><span class="readable" data-dcnode-id="4116" id="reviewTextContainer1541130020"><span data-dcnode-id="4166" instrument_node="">
</span><span data-dcnode-id="4155" id="freeTextContainer9156452065209043030"><span data-dcnode-id="4165" instrument_node="">[Edited, pictures added 1/5/21]</span><br data-dcnode-id="4164"><br data-dcnode-id="4163"><span data-dcnode-id="4162" instrument_node="">A fascinating book and an easy read. Chapter by chapter, in simple chronological order, the author juxtaposes preparations for the 1893 Chicago World’s Fair with the doings of one of the country’s first serial murderers. A movie is in the works. </span><br data-dcnode-id="4161"><br data-dcnode-id="4160"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4159" height="245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1641397428i/32409196._SX540_.jpg&amp;raw" width="399"><br data-dcnode-id="4158"><br data-dcnode-id="4157"><span data-dcnode-id="4156" instrument_node="">From the Fair chapters we learn how Chicago’s boosterism won it the fair from other competitors including Washington and New York. Construction was last-minute and in panic mode, but it got done. There’s a lot about Frederi</span></span><span data-dcnode-id="4154" instrument_node="">
</span><span data-dcnode-id="4121" id="freeText9156452065209043030" style="display:none"><span data-dcnode-id="4153" instrument_node="">[Edited, pictures added 1/5/21]</span><br data-dcnode-id="4152"><br data-dcnode-id="4151"><span data-dcnode-id="4150" instrument_node="">A fascinating book and an easy read. Chapter by chapter, in simple chronological order, the author juxtaposes preparations for the 1893 Chicago World’s Fair with the doings of one of the country’s first serial murderers. A movie is in the works. </span><br data-dcnode-id="4149"><br data-dcnode-id="4148"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4147" height="245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1641397428i/32409196._SX540_.jpg&amp;raw" width="399"><br data-dcnode-id="4146"><br data-dcnode-id="4145"><span data-dcnode-id="4144" instrument_node="">From the Fair chapters we learn how Chicago’s boosterism won it the fair from other competitors including Washington and New York. Construction was last-minute and in panic mode, but it got done. There’s a lot about Frederick Law Olmstead who was in charge of park design but he was elderly, in poor health, and struggling to stay on top of the project. A lot of the focus is on the lead architect and fair planner, Daniel Burnham, and construction of the “White City,” as the classical buildings came to be known. </span><br data-dcnode-id="4143"><br data-dcnode-id="4142"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4141" height="245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1641397428i/32409197._SX540_.jpg&amp;raw" width="399"><br data-dcnode-id="4140"><br data-dcnode-id="4139"><span data-dcnode-id="4138" instrument_node="">The serial killer was H. H. Holmes, a pharmacist who capitalized on the World’s Fair by building a hotel. It had special rooms in the basement to kill his victims and dispose of their bodies in a gas oven. Mostly his victims were young women but he was an equal opportunity killer, murdering some men and children as well – at least 20 victims but maybe many more. </span><br data-dcnode-id="4137"><br data-dcnode-id="4136"><span data-dcnode-id="4135" instrument_node="">The author spares us most of the gory details. Once you get into it, it’s hard to believe this story is NON-fiction as the author insists on telling us, but all the events really are from diaries, letters, newspapers and police reports. Fascinating, with a lot of local color of the Windy City in that era.</span><br data-dcnode-id="4134"><br data-dcnode-id="4133"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4132" height="245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1641397428i/32409198.jpg&amp;raw" width="399"><br data-dcnode-id="4131"><br data-dcnode-id="4130"><span data-dcnode-id="4129" instrument_node="">Eric Larson (b. 1954) specializes in writing fictional accounts of historical events. Two of his better-known books are Isaac's Storm about the hurricane that destroyed Galveston TX in 1900, and Dead Wake about the sinking of the Lusitania. </span><br data-dcnode-id="4128"><br data-dcnode-id="4127"><span data-dcnode-id="4126" instrument_node="">Top photo of the Chicago World's Fair from architecture.com</span><br data-dcnode-id="4125"><span data-dcnode-id="4124" instrument_node="">HH Holmes from soapboxie.com</span><br data-dcnode-id="4123"><span data-dcnode-id="4122" instrument_node="">The author from independent.com </span></span><span data-dcnode-id="4120" instrument_node="">

</span><span data-dcnode-id="4018" id="freeTextContainer820648047181970887"><span data-dcnode-id="4022" instrument_node="">So, no offense to those that liked this book, but I'm throwing in the towel after 75 pages. It's just not holding my interest. Part of the reason for this is that Larson's writing style is way too speculative for my taste in non-fiction. I just finished reading </span><a data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/2372.The_Path_Between_the_Seas_The_Creation_of_the_Panama_Canal__1870_1914" rel="nofollow noopener" title="The Path Between the Seas The Creation of the Panama Canal, 1870-1914 by David McCullough"><span data-dcnode-id="4021" instrument_node=""> the Path Between Seas</span></a><span data-dcnode-id="4019" instrument_node=""> by David McCullough, and he does such an amazing job of making complicated, historical events interesting, without fabricating scenes that "could have" happened. Even that wouldn't have bothered me that much if Lars</span></span><span data-dcnode-id="4017" instrument_node="">
</span><span data-dcnode-id="4006" id="freeText820648047181970887" style="display:none"><span data-dcnode-id="4016" instrument_node="">So, no offense to those that liked this book, but I'm throwing in the towel after 75 pages. It's just not holding my interest. Part of the reason for this is that Larson's writing style is way too speculative for my taste in non-fiction. I just finished reading </span><a data-dcnode-id="4014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/2372.The_Path_Between_the_Seas_The_Creation_of_the_Panama_Canal__1870_1914" rel="nofollow noopener" title="The Path Between the Seas The Creation of the Panama Canal, 1870-1914 by David McCullough"><span data-dcnode-id="4015" instrument_node=""> the Path Between Seas</span></a><span data-dcnode-id="4013" instrument_node=""> by David McCullough, and he does such an amazing job of making complicated, historical events interesting, without fabricating scenes that "could have" happened. Even that wouldn't have bothered me that much if Larson had said something more like, "It's likely he did this, since we know this about his personality" or whatever, rather than "He reached out and touched her hand as he spoke to her." There was no clear distinction between what definitely happened, and what maybe could have happened. That got bothersome.</span><br data-dcnode-id="4012"><span data-dcnode-id="4011" instrument_node="">I could have just ignored the non-fiction aspect and enjoyed the story, if not for Larson's habit of getting bogged down in inconsequential details. He seemed to throw facts (or conjectured facts) in whenever the fancy struck him, rather than keeping the story moving.</span><br data-dcnode-id="4010"><span data-dcnode-id="4009" instrument_node="">And finally, I got annoyed with the jumping back and forth between Holmes's story and the architecture/Worlds Fair story. Just when I'd get into one, we'd switch to the other. He could have done a better job of interweaving those.</span><br data-dcnode-id="4008"><span data-dcnode-id="4007" instrument_node="">So, since my curiosity is piqued, but not enough to continue reading this book, I'm just going to do some Wikipedia reading and call it good.</span></span><span data-dcnode-id="4005" instrument_node="">

</span><span data-dcnode-id="3912" id="freeText3449679418627361477" style="display:none"><span data-dcnode-id="3913" instrument_node="">The White City rises above the lake like a fantasy from another time that never existed but the eyes do not deceive this image is real, bright lights glow at night and millions of respectful , quiet, mesmerized people look and walk by, the moon shines and reflects on the gigantic white buildings and glittering waters, magic drapes all...The Chicago World's Fair of 1893 arguably the greatest one in history, the citizens of this metropolis the second city of the nation need to show everyone that they are more than hog killers, with speeding trains and prosperous businessmen , this is a sophisticated town particularly to arch rival New York . In a short while after winning the contest to hold this extravaganza beating St. Louis, Washington and the big enemy New York City for the honor from Congress the next step yes committees , Americans love them they multiply like rabbits but get in the way of progress. At long last emerging from countless delays, officially named the "World's Columbian Exposition" to commemorate the 400th anniversary of Columbus's discovery of America, in 1492, but its six months run will start a year later in 1893. A leading Chicago architect Mr. Daniel Burnham and his partner John Root are chosen for the enormous job to build it, but also residing in the overcrowded fast growing, violent, dirty city Dr. Herman Webster Mudgett alias (one of many ) H.H.(Henry) Holmes, America's first well known serial killer. The two will never meet but their stories will make headlines around the globe. Mr. Burnham task seems impossible, made worse when his closest friend in business and in private life dies John Root, the committees don't and can't make decisions; days pass still nothing is being accomplished, at last the authority is granted him to be the boss, Burnham (" Make no little plans; they have no magic to stir men's blood"). Slowly things begin to appear on a grand- scale the white, ( all the same color) huge, electrified buildings soaring into the sky, the scary, new Ferris Wheel will take you there if it is ever built, lagoons are made islands formed canals dug the waters come from sparkling Lake Michigan, boats follow, the ugly, empty Jackson Park begins to fill, something special even at this early stage is felt...Dr.Holmes likes pretty young women , just off farms and small towns, the feelings are mutual he pays attention to their every word, looks into their eyes, touches them gently the handsome, soft, well spoken con man has plenty of charm few are not enamored, wealthy too, owner of the strange rather gloomy, with mysterious odors the World's Fair Hotel nicknamed "The Castle ", he keeps marrying the women a real lady killer...but will murder men too. This nonfiction book is very entertaining and always informative, you can imagine yourself back to the spectacular, enormously successful , thrilling, magical fair the numerous attractions in hundreds of buildings, from the very popular, exotic , belly dancers to the unsuitable Buffalo Bill's Wild West Show , he made a fortune just outside the exposition grounds , they don't make this kind anymore..</span></span><span data-dcnode-id="3911" instrument_node="">

</span><span data-dcnode-id="3784" id="freeTextContainer5413502124103554936"><span data-dcnode-id="3801" instrument_node="">For me, reviewing this book is similar to trying to review any Nicolas Cage movie from the past 20 years, in that if I was asked if Cage's over-the-top performance was the best thing or the worst thing about the movie, I could only answer... </span><br data-dcnode-id="3800"><b data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">"Yes!"</span></b><br data-dcnode-id="3797"><img alt="" class="gr-hostedUserImg" data-dcnode-id="3796" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1486906686ra/21959798.gif&amp;raw" width="400"><br data-dcnode-id="3795"><span data-dcnode-id="3794" instrument_node="">(</span><i data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">Pictured - one of Nicolas Cage's more subdued performances; Not pictured - sanity</span></i><span data-dcnode-id="3791" instrument_node="">)</span><br data-dcnode-id="3790"><br data-dcnode-id="3789"><span data-dcnode-id="3788" instrument_node="">If you were to ask me my favorite thing about this book, I would immediately answer, "Erik Larson's writing style!"</span><br data-dcnode-id="3787"><br data-dcnode-id="3786"><span data-dcnode-id="3785" instrument_node="">This book is mostly talked about for the portions pert</span></span><span data-dcnode-id="3783" instrument_node="">
</span><span data-dcnode-id="3731" id="freeText5413502124103554936" style="display:none"><span data-dcnode-id="3782" instrument_node="">For me, reviewing this book is similar to trying to review any Nicolas Cage movie from the past 20 years, in that if I was asked if Cage's over-the-top performance was the best thing or the worst thing about the movie, I could only answer... </span><br data-dcnode-id="3781"><b data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">"Yes!"</span></b><br data-dcnode-id="3778"><img alt="" class="gr-hostedUserImg" data-dcnode-id="3777" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1486906686ra/21959798.gif&amp;raw" width="400"><br data-dcnode-id="3776"><span data-dcnode-id="3775" instrument_node="">(</span><i data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">Pictured - one of Nicolas Cage's more subdued performances; Not pictured - sanity</span></i><span data-dcnode-id="3772" instrument_node="">)</span><br data-dcnode-id="3771"><br data-dcnode-id="3770"><span data-dcnode-id="3769" instrument_node="">If you were to ask me my favorite thing about this book, I would immediately answer, "Erik Larson's writing style!"</span><br data-dcnode-id="3768"><br data-dcnode-id="3767"><span data-dcnode-id="3766" instrument_node="">This book is mostly talked about for the portions pertaining to one of America's first serial killers, Dr. H. H. Holmes. In fact, when the greenlit movie adaptation by Martin Scorsese was recently announced, it focused primarily on the casting of Holmes. Yet, more time is spent in the book detailing the history of the 1893 World's Fair, particularly architect Daniel Burnham's struggles in trying to get everything finished in time for the Fair's opening. I'm actually not much of a history buff, so I feared the </span><i data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">"true crimeless"</span></i><span data-dcnode-id="3763" instrument_node=""> segments of the book wouldn't hold my interest, but I'm happy to announce that I was wrong. Larson's wit made even some of the dryer parts of the novel entertaining, and he even manages to build suspense when he's raising questions we may already know the answer to, like what engineering marvel would the Fair's organizer's decide on to hopefully rival the Eiffel Tower unveiled at France's world fair? </span><br data-dcnode-id="3762"><br data-dcnode-id="3761"><span data-dcnode-id="3760" instrument_node="">As for the segments detailing Dr. H. H. Holmes and his grotesque crimes, this is where Larson's writing really shines. Instead of treating this strictly as a historical account </span><i data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">("and then this happened, and then this happened...)</span></i><span data-dcnode-id="3757" instrument_node="">, Larson actually writes these moments in the style of a thriller. He gets into Holmes head with the same prowess that Thomas Harris used to make Hannibal Lecter continue to chill our bones long after we had put the book down. There were times I almost forgot I was even reading a nonfiction book, as in these moments Larson's novel read more like something we'd expect to find in the horror section.</span><br data-dcnode-id="3756"><br data-dcnode-id="3755"><span data-dcnode-id="3754" instrument_node="">Which is why if you were to ask me what my least-favorite thing about this book was, I would immediately answer, "Erik Larson's writing style!"</span><br data-dcnode-id="3753"><br data-dcnode-id="3752"><i data-dcnode-id="3746"><span data-dcnode-id="3751" instrument_node="">Bet you didn't see that coming, eh? That was a twist right out of an M. Night Shyamalan movie!</span><br data-dcnode-id="3750"><img alt="" class="gr-hostedUserImg" data-dcnode-id="3749" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1486906686ra/21959799.gif&amp;raw" width="400"><br data-dcnode-id="3748"><span data-dcnode-id="3747" instrument_node="">(This clip is from "Robot Chicken" and led to "What A Twist" becoming a running joke on the show. If you already knew that, you are officially as cool as me. Whether you take that as a compliment or a reason to start sobbing is completely up to you!) </span></i><br data-dcnode-id="3745"><br data-dcnode-id="3744"><span data-dcnode-id="3743" instrument_node="">While Larson's writing during the Holmes segments was undeniably gripping, I felt he went a little overboard with his speculative approach. He describes what was going through the victims' heads moments before Holmes murdered them, things Larson has no way of knowing were actually true. This did take me out of the book quite a few times, as when I'm reading nonfiction and the author keeps adding details that can't actually be confirmed, it make me begin to wonder how true this true crime novel really is!</span><br data-dcnode-id="3742"><br data-dcnode-id="3741"><span data-dcnode-id="3740" instrument_node="">I did enjoy reading "Devil in the White City", although I would say it's more a book for history enthusiasts than true crime fans, as the 1893 World's Fair is clearly the novel's main event, while Dr. Holmes is more of a sideshow freak. Whether you're here for the Fair or the murder castle, Erik Larson's skills as a writer makes this an interesting read, as long as you don't mind getting some </span><s data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">chocolate in your peanut butter</span></s><span data-dcnode-id="3737" instrument_node=""> speculative fiction in your true crime.</span><br data-dcnode-id="3736"><img alt="" class="gr-hostedUserImg" data-dcnode-id="3735" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1486906686i/21959800._SY540_.jpg&amp;raw" width="230"><br data-dcnode-id="3734"><i data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">(2-and-a-half-hours of fighting over chocolate in peanut butter... still a better movie than "Batman V Superman: Dawn of Justice"!)</span></i></span><span data-dcnode-id="3730" instrument_node="">

</span><span data-dcnode-id="3622" id="freeTextContainer17768348197321065638"><span data-dcnode-id="3632" instrument_node="">REVIEW VANISHED! Noticed Feb 17, 2022. 🤬</span><br data-dcnode-id="3631"><br data-dcnode-id="3630"><span data-dcnode-id="3629" instrument_node="">REPOSTED: Feb 28, 2022</span><br data-dcnode-id="3628"><br data-dcnode-id="3627"><span data-dcnode-id="3626" instrument_node="">“Beneath the gore and smoke and loam, this book is about the evanescence of life, and why some men choose to fill their brief allotment of time engaging the impossible, others in the manufacture of sorrow. In the end it is a story of the ineluctable conflict between good and evil, daylight and darkness, the White City and the Black.” Erik Larson</span><br data-dcnode-id="3625"><br data-dcnode-id="3624"><span data-dcnode-id="3623" instrument_node="">Paris welcomed the world to its “Exposition Universelle” in 1889. It opened its doors to th</span></span><span data-dcnode-id="3621" instrument_node="">
</span><span data-dcnode-id="3596" id="freeText17768348197321065638" style="display:none"><span data-dcnode-id="3620" instrument_node="">REVIEW VANISHED! Noticed Feb 17, 2022. 🤬</span><br data-dcnode-id="3619"><br data-dcnode-id="3618"><span data-dcnode-id="3617" instrument_node="">REPOSTED: Feb 28, 2022</span><br data-dcnode-id="3616"><br data-dcnode-id="3615"><span data-dcnode-id="3614" instrument_node="">“Beneath the gore and smoke and loam, this book is about the evanescence of life, and why some men choose to fill their brief allotment of time engaging the impossible, others in the manufacture of sorrow. In the end it is a story of the ineluctable conflict between good and evil, daylight and darkness, the White City and the Black.” Erik Larson</span><br data-dcnode-id="3613"><br data-dcnode-id="3612"><span data-dcnode-id="3611" instrument_node="">Paris welcomed the world to its “Exposition Universelle” in 1889. It opened its doors to the world’s fair and had as it’s showstopper the Eiffel Tower. It seemed that France declared to all who saw the tower that they had overtaken the United States as the glorious leader in metalworks. The gauntlet had been thrown and American pride was at stake. When it was determined that America would hold a world’s fair to commemorate the 400th anniversary of the discovery of the “new world” by Columbus, Chicago won out over other major cities in contention for the right to host the event. The entire city worked as one to will the decision in its favor. From the moment in June 1889 that Chicago was granted the World Columbian Exposition of 1893, it had but a few scant months to organize location, financing, architects, engineers, tradespeople, exhibit collections, supplies, laborers, etc. and will the construction of a fair in all its magnanimity and splendor to be open on May 1,1893. Of course, it was understood that Chicago would have its own showstopper, but what it would be was yet to be invented! The World Columbian Exposition of 1893 was very significant in the development of many of the products/creations still in use today. </span><br data-dcnode-id="3610"><span data-dcnode-id="3609" instrument_node=""> </span><br data-dcnode-id="3608"><span data-dcnode-id="3607" instrument_node="">This organized chaos provided the backdrop for THE DEVIL IN THE WHITE CITY: MURDER, MAGIC, AND MADNESS AT THE FAIR THAT CHANGED AMERICA. The story is the juxtaposition of good and evil: the Gilded Age vs the Panic of 1893; the “White City” of the fair vs the “Black City” of Chicago; and, Daniel Burnham, lead architect of the exposition project vs H H Holmes, prolific serial killer – both blue-eyed, handsome, and skillful in their chosen professions.</span><br data-dcnode-id="3606"><br data-dcnode-id="3605"><span data-dcnode-id="3604" instrument_node="">H H Holmes was also an “architect” of sorts visualizing and having built a hotel meeting his unique specifications. His hotel would be for those travelers arriving to experience the fair; and, if a traveler happened to be a young woman, so much the better. “I was born with the devil in me,' [Holmes] wrote. 'I could not help the fact that I was a murderer, no more than the poet can help the inspiration to sing.”</span><br data-dcnode-id="3603"><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">Chicago’s world fair was a divining rod for the prolific ingenuity physically displayed by its white opulence and grandeur, hence “The White City, while “The Black City” was a reflection of the real struggle of the common man in Chicago displayed by destitution, violence, and wickedness surrounding the fair. For all the many good things that the Exposition had in its favor, time, the Chicago winters, economic depression, bank failures, and resulting unemployment were all betting against the Exposition’s success.</span><br data-dcnode-id="3600"><br data-dcnode-id="3599"><span data-dcnode-id="3598" instrument_node="">The use of alternating the chapters between the main characters helped to drive the suspense and pulse of the story. It was riveting and definitely not boring. The amount of research put into this writing project is evident from the copious Notes at the end of the book. I definitely recommend this Erik Larson work of nonfiction and rate it 5 stars. Happy reading!!</span><br data-dcnode-id="3597"></span><span data-dcnode-id="3595" instrument_node="">

</span><span data-dcnode-id="3496" id="freeTextContainer4154562670388039819"><span data-dcnode-id="3497" instrument_node="">Larson could be the worst nonfiction writer working in America today. When he notes that "[Frederick Law] Olmsted was no literary stylist. Sentences wandered through the report like morning glory through the pickets of a fence" he might as well be describing himself. It's painful to make your way through his books. The melodrama is over the top. He'll go on for several pages about some unnamed person, attempting to heighten the "mystery," and anyone who graduated second grade will quickly realiz</span></span><span data-dcnode-id="3495" instrument_node="">
</span><span data-dcnode-id="3476" id="freeText4154562670388039819" style="display:none"><span data-dcnode-id="3494" instrument_node="">Larson could be the worst nonfiction writer working in America today. When he notes that "[Frederick Law] Olmsted was no literary stylist. Sentences wandered through the report like morning glory through the pickets of a fence" he might as well be describing himself. It's painful to make your way through his books. The melodrama is over the top. He'll go on for several pages about some unnamed person, attempting to heighten the "mystery," and anyone who graduated second grade will quickly realize he's talking about the inventor of the Ferris Wheel. But only several chapters later - in the manner of Nancy Drew abruptly tumbling to the bottom of a dark well - he'll have the mystery man dramatically sign his name to a letter: George Washington Gale Ferris. George Washington Gale </span><i data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">Ferris</span></i><span data-dcnode-id="3491" instrument_node=""> !!!!!!!! </span><i data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">I did not see that coming.</span></i><br data-dcnode-id="3488"><br data-dcnode-id="3487"><span data-dcnode-id="3486" instrument_node="">His narrative is peppered with the most insignificant, totally unrelated factoids, I suppose because they amused him and he couldn't stand the thought of leaving them out. He loves nothing more than to set a scene - so and so in a Pullman car or a fine dining club, this and that person on an ocean liner, attempting to send a cable to someone on the </span><i data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">Titanic</span></i><span data-dcnode-id="3483" instrument_node=""> - merely in order to convey some piece of information totally unrelated to the wholly gratuitous scene. As to historical accuracy, doubtless there's a fair bit; he does have lots of end notes, and he consulted many historical sources. But he also embellishes novelistically in a way that no real historian would ever allow himself to do. It's shameful, and shameless. He asserts in the text that such and such happened, but if you check the endnotes, it didn't really happen - but </span><i data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">it could have</span></i><span data-dcnode-id="3480" instrument_node="">, he says. It was likely, he felt. After reading </span><i data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">Isaac's Storm</span></i><span data-dcnode-id="3477" instrument_node="">, which was also heavily embellished and the endnotes similarly acknowledging such, I don't trust anything this man writes. I wash my hands of him.</span></span><span data-dcnode-id="3475" instrument_node="">

</span><span data-dcnode-id="3300" id="freeTextContainer12423641598596243616"><span data-dcnode-id="3307" instrument_node="">in 1893, chicago took the world by storm when it hosted the world fair and created the marvel that was </span><i data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">‘the white city.’</span></i><span data-dcnode-id="3304" instrument_node=""> and the man behind it all was architect, daniel burnham. not far down the street from the fair grounds, there was another man by the name of dr. henry holmes who took advantage of those visiting the city by luring women to his hotel and killing them. he is considered americas first serial killer. </span><br data-dcnode-id="3303"><br data-dcnode-id="3302"><span data-dcnode-id="3301" instrument_node="">so what do these two men have in common? other than being in the same city at the</span></span><span data-dcnode-id="3299" instrument_node="">
</span><span data-dcnode-id="3279" id="freeText12423641598596243616" style="display:none"><span data-dcnode-id="3298" instrument_node="">in 1893, chicago took the world by storm when it hosted the world fair and created the marvel that was </span><i data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">‘the white city.’</span></i><span data-dcnode-id="3295" instrument_node=""> and the man behind it all was architect, daniel burnham. not far down the street from the fair grounds, there was another man by the name of dr. henry holmes who took advantage of those visiting the city by luring women to his hotel and killing them. he is considered americas first serial killer. </span><br data-dcnode-id="3294"><br data-dcnode-id="3293"><span data-dcnode-id="3292" instrument_node="">so what do these two men have in common? other than being in the same city at the same time, absolutely nothing. although this book will try to convince you otherwise. there honestly isnt anything connecting the two, so i am confused as to why there is so much focus on them both in this. i can understand a book about the history and creation of the chicago world fair, and i also get writing a book about the crimes of dr. holmes, but putting the two together did not make any sense to me. </span><br data-dcnode-id="3291"><br data-dcnode-id="3290"><span data-dcnode-id="3289" instrument_node="">while reading about the building and design of the fair was interesting, its very dense compared to how holmes’ story is written. its almost like an information overload compared to the true crime chapters surrounding dr. holmes (which is what i was more interested in). it almost felt like the murders of dr. homes were just a fun little fact that was sprinkled throughout a history book about the 1893 world fair. so i think the synopsis and title are a little misleading with regard to the focus of this story.</span><br data-dcnode-id="3288"><br data-dcnode-id="3287"><span data-dcnode-id="3286" instrument_node="">overall, this is quite an educational book. its not quite as entertaining as i thought it would be, but very informative nonetheless. the gilded age and importance of the world fair isnt something i knew much about, so it was neat to learn about it. although, i might try to find another book about dr. holmes, as this didnt quite satisfy my interest in him. </span><br data-dcnode-id="3285"><br data-dcnode-id="3284"><b data-dcnode-id="3280"><span data-dcnode-id="3283" instrument_node="">↠ </span><i data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">3.5 stars</span></i></b></span><span data-dcnode-id="3278" instrument_node="">

</span><span data-dcnode-id="3138" id="freeText13497299238385868168" style="display:none"><span data-dcnode-id="3180" instrument_node="">Heard the one about the architect and the serial killer? It's not a bad joke, but it is a great book. The architect was Daniel Burnham, the driving force behind the Chicago World's Fair of 1893; the killer was H.H. Holmes, a Svengali-type figure who lured young women to his hotel and did the most gruesome things, the least shocking of which was murder. The two men never met, but The Devil in the White City brings their stories together, and although it reads like a novel, everything is thoroughly researched fact. </span><br data-dcnode-id="3179"><br data-dcnode-id="3178"><b data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">The book</span></b><br data-dcnode-id="3175"><span data-dcnode-id="3174" instrument_node="">The Great Columbian Exhibition of 1893 was Chicago's big chance to shake off its old image as a hog-slaughtering, dirty and dangerous town and to take its place as America's second city. Although the fair's theme gave a backward nod to the 400th anniversary of Columbus bumping into the Americas on his way to India, its vision was futuristic: for the first time, electric lighting, clean water, and planned green spaces could be experienced on a massive scale. Innovations - the Ferris Wheel, the hamburger, an elevated railway, Juicy Fruit gum, the zip fastener and shredded wheat among them - enhanced the feeling that the next century would belong to America. The buildings were monumental, the exhibits eclectic (one example: a map of the USA made entirely of pickles) and the visitors were awestruck. They called it the White City, from the colour of main buildings that were imposing by day, dazzling by night. </span><br data-dcnode-id="3173"><br data-dcnode-id="3172"><span data-dcnode-id="3171" instrument_node="">Much of this was down to Daniel Burnham. His can-do reputation for building skyscrapers made him a natural choice as project manager. But we're frequently reminded that he had to push himself to the limit and step on quite few toes to ensure the Fair's success, a job made all the more difficult by economic recession, bickering architects, striking workers, pompous politicians and Chicago's notorious weather. </span><br data-dcnode-id="3170"><br data-dcnode-id="3169"><span data-dcnode-id="3168" instrument_node="">As if all this weren't enough to occupy the reader, a parallel story takes us inside the grim world of H.H. Holmes. Capitalising on the advent of the Fair, Holmes built his own hotel to attract single young women who were streaming into the city from across America in search of work, independence and a new life in the big city. One such unfortunate believed she was on the threshold of marriage to this enchanting gentleman; in reality, she was destined for a gas chamber in the hotel basement. She was not to be the last to fall for his charms, but even in death there was no rest. Holmes literally picked over the bones of his victims, selling their remains to medical students eager to examine recently deceased corpses - no questions asked. At first, the benefit for Holmes was financial, but as time passed, the chase, the kill, the post mortem had become ends in themselves. A single-minded detective and a stroke of luck brought Holmes to justice, but even when he realised the game was up, he managed to keep his unsettling cool. </span><br data-dcnode-id="3167"><br data-dcnode-id="3166"><br data-dcnode-id="3165"><b data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">My thoughts</span></b><span data-dcnode-id="3162" instrument_node=""> </span><br data-dcnode-id="3161"><span data-dcnode-id="3160" instrument_node="">I had a strong feeling that I would take to this book, and from start to finish I was never disappointed. It fairly zings along, both stories proving absorbing, while casting out facts like frisbees. </span><br data-dcnode-id="3159"><br data-dcnode-id="3158"><span data-dcnode-id="3157" instrument_node="">Although Burnham and Holmes are the book's dominant characters, there are walk-on parts for numerous figures who made their own mark on the White City. Buffalo Bill, Thomas Edison, and Scott Joplin are among the famous names, and the description of George Ferris's efforts to debut his eponymous wheel is a story in itself. But the lesser-known characters are also worthy of note. I pitied poor Frederick Olmsted's attempts to landscape the exhibition in the midst of an enormous, muddy construction site and a fit of depression. But I can see how ahead of his time he really was, insisting on natural greenery instead of a regimented collection of flower beds. Then there was Patrick Prendergast, whose descent into madness was to have a shocking impact on the Fair's final days; it's here that Larson's descriptive powers really come into their own. </span><br data-dcnode-id="3156"><br data-dcnode-id="3155"><span data-dcnode-id="3154" instrument_node="">As for the serial killer, the author doesn't dwell on the sensationalist aspects of his more grisly activities, but what he leaves to the imagination is far more powerful. Extracts from letters written by a child kidnapped by Holmes are among the most upsetting words I've ever read - a reminder that the worst of human nature may not only </span><br data-dcnode-id="3153"><span data-dcnode-id="3152" instrument_node="">be found in our own times. </span><br data-dcnode-id="3151"><br data-dcnode-id="3150"><span data-dcnode-id="3149" instrument_node="">But my lasting impression from this book is one of optimism, of Burnham straining every nerve and sinew to achieve the impossible, and the ordinary folk of Chicago bursting with pride at what had been achieved. </span><br data-dcnode-id="3148"><br data-dcnode-id="3147"><span data-dcnode-id="3146" instrument_node="">The U.S. edition of the book has the subtitle "the fair that changed America" - and that's certainly true, right down to the Pledge of Allegiance which can trace its origins to the exhibition's opening day. Beyond that, the Chicago Fair of 1893 not only showed America how it could be, but how it would be - better living and working conditions, convenience foods, domestic appliances, gadgets and more time for fun. In short, it heralded the prospect of a decent day's pay for a full day's work, a clean, safe environment, and of course the God-given right to eat shredded wheat. </span><br data-dcnode-id="3145"><br data-dcnode-id="3144"><b data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Who would like this book?</span></b><span data-dcnode-id="3141" instrument_node=""> </span><br data-dcnode-id="3140"><span data-dcnode-id="3139" instrument_node="">I enjoyed it because of an interest in cities and architecture. But it would equally appeal to readers who are into engineering, politics, social history,horticulture, true crimes: does that leave anyone out?</span></span><span data-dcnode-id="3137" instrument_node="">

</span><span data-dcnode-id="3019" id="freeText515632719878291222" style="display:none"><span data-dcnode-id="3033" instrument_node="">I was genuinely excited to get back into this story every time I picked it up. At times, this jumble of factual events felt like a tale I would contrive while wandering aimlessly around Wikipedia (even though </span><a data-dcnode-id="3031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/5869.Erik_Larson" rel="nofollow noopener" title="Erik Larson"><span data-dcnode-id="3032" instrument_node="">Erik Larson</span></a><span data-dcnode-id="3030" instrument_node=""> says he did not get information from the internet because, apparently all, data found on the internet is questionable). </span><br data-dcnode-id="3029"><br data-dcnode-id="3028"><span data-dcnode-id="3027" instrument_node="">Most of the dramatic facts this book will tell you show up near the top of the internet, and many are proclaimed at a bars when someone lets everyone know where Pabst won their blue ribbon and follows with, “A young man by the name of George Farris went to that same fair in Chicago, 1893 — and he built himself a wheel.”</span><br data-dcnode-id="3026"><br data-dcnode-id="3025"><span data-dcnode-id="3024" instrument_node="">The best story and the reason why I wanted more was the story of Holmes, who murdered dozens while becoming America’s first serial killer. I didn’t really care for the ten plus pages describing where the fair would go and then what park in said city it would be in. Some of these details were distracting and took too long. As the reader, I just wanted to get to the gruesome parts. </span><br data-dcnode-id="3023"><br data-dcnode-id="3022"><span data-dcnode-id="3021" instrument_node="">People like to say that non-fiction, “reads like fiction,” when they think it is good but that doesn’t make much sense to me. Books without dialogue generally feel to me like Wikipedia, and they're good when I am able to stay interested. </span><br data-dcnode-id="3020"></span><span data-dcnode-id="3018" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2941" title="really liked it"><span class="staticStar p10" data-dcnode-id="2946" size="15x15"><span data-dcnode-id="2947" instrument_node="">really liked it</span></span><span class="staticStar p10" data-dcnode-id="2945" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2944" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2943" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2942" size="15x15"></span></span><span data-dcnode-id="2940" instrument_node="">

</span><span class="readable" data-dcnode-id="2911" id="reviewTextContainer4381625753"><span data-dcnode-id="2936" instrument_node="">
</span><span data-dcnode-id="2931" id="freeTextContainer13544323218640494015"><span data-dcnode-id="2935" instrument_node="">Even though I had reviewed this book on 11-21-2021, Goodreads was showing it as "Want To Read" on 12-10-2021. When I went to change it, my entire review, along with all of the lovely comments I had gotten, disappeared. Now I am reposting it. </span><br data-dcnode-id="2934"><br data-dcnode-id="2933"><span data-dcnode-id="2932" instrument_node="">Erik Larson has taken on the role of an infomercial guy, in his 2003 book The Devil in the White City. Do you want to know the history of the Chicago World’s Fair of 1893? That’s great, BUT WAIT, there’s more! Do you like reading about true crime and one of </span></span><span data-dcnode-id="2930" instrument_node="">
</span><span data-dcnode-id="2916" id="freeText13544323218640494015" style="display:none"><span data-dcnode-id="2929" instrument_node="">Even though I had reviewed this book on 11-21-2021, Goodreads was showing it as "Want To Read" on 12-10-2021. When I went to change it, my entire review, along with all of the lovely comments I had gotten, disappeared. Now I am reposting it. </span><br data-dcnode-id="2928"><br data-dcnode-id="2927"><span data-dcnode-id="2926" instrument_node="">Erik Larson has taken on the role of an infomercial guy, in his 2003 book The Devil in the White City. Do you want to know the history of the Chicago World’s Fair of 1893? That’s great, BUT WAIT, there’s more! Do you like reading about true crime and one of the first known serial killers in the U.S? That is even better, BUT WAIT, there’s more! I’ll throw in a side story about the nut case who murdered the mayor of Chicago.</span><br data-dcnode-id="2925"><br data-dcnode-id="2924"><span data-dcnode-id="2923" instrument_node="">I found the history of the World’s Fair to be the most interesting part of the book and felt it should have been a stand-alone story. Larson captures the zeitgeist of Chicago in the 1890s. The grand buildings were all painted white, giving the grounds the name of “The White City.” The fair development and building were bogged down with bureaucracy, bad weather, union strikes, worker injuries, a short time frame to complete, and some poor structural designs. The people involved included the famous landscape architect Frederick Law Olmsted and Walt Disney’s father. Under the guidance of architect Daniel Burnham, the fair ended without losing money during a terrible economic time. The names that are dropped during the story were a who’s who of the American elite. Visitors included Nikola Tesla, President Benjamin Harrison, and Frank Lloyd White. Buffalo Bill set up his famous Wild West Show starring Annie Oakley just outside the fairgrounds. The 1893 World’s Fair introduced us to the Ferris Wheel, the tallest skyscrapers, grounds lighted by incandescent bulbs, and shredded wheat.</span><br data-dcnode-id="2922"><br data-dcnode-id="2921"><span data-dcnode-id="2920" instrument_node="">The story involving “The Devil”, H. H. Holmes was mostly interesting as Larson details the criminal activities of a charming serial killer who killed numerous people at the time of the fair. The smaller story regarding the crazy Pendergrast seemed unnecessary to the book. The intermixing of the true-crime tales with the history of the fair was a bit odd but mostly worked.</span><br data-dcnode-id="2919"><br data-dcnode-id="2918"><span data-dcnode-id="2917" instrument_node="">3.5 stars, rounded up to 4 because of Larson’s excellent story-telling ability.</span></span><span data-dcnode-id="2915" instrument_node="">

</span><span data-dcnode-id="2796" id="freeTextContainer9956377177182820633"><span data-dcnode-id="2808" instrument_node="">This is </span><b data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">really</span></b><span data-dcnode-id="2805" instrument_node=""> a great read </span><b data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">filled</span></b><span data-dcnode-id="2802" instrument_node=""> with meticulously researched historical facts and notable people of the time. Even Helen Keller made an appearance at the 1893 Chicago World's Fair! Alternating chapters educate the reader about the enormous undertaking and time constraints of building </span><i data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">"The White City"</span></i><span data-dcnode-id="2799" instrument_node=""> combined with the daily bloodthirsty activities of serial killer Herman Webster Mudgett aka Dr. H. H. Holmes.</span><p data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Reading about B. H. Burnham's construction of the fair during a time of deadly disease</span></p></span><span data-dcnode-id="2795" instrument_node="">
</span><span data-dcnode-id="2771" id="freeText9956377177182820633" style="display:none"><span data-dcnode-id="2794" instrument_node="">This is </span><b data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">really</span></b><span data-dcnode-id="2791" instrument_node=""> a great read </span><b data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">filled</span></b><span data-dcnode-id="2788" instrument_node=""> with meticulously researched historical facts and notable people of the time. Even Helen Keller made an appearance at the 1893 Chicago World's Fair! Alternating chapters educate the reader about the enormous undertaking and time constraints of building </span><i data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">"The White City"</span></i><span data-dcnode-id="2785" instrument_node=""> combined with the daily bloodthirsty activities of serial killer Herman Webster Mudgett aka Dr. H. H. Holmes.</span><p data-dcnode-id="2781"><span data-dcnode-id="2784" instrument_node="">Reading about B. H. Burnham's construction of the fair during a time of deadly diseases, grotesque environmental conditions and bank failures was certainly enlightening, but most intriguing for me was erection of the monstrous "Ferris" Wheel with enclosed glassed-in seats. </span><i data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">(googled some amazing photos)</span></i></p><p data-dcnode-id="2774"><b data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">And</span></b><span data-dcnode-id="2778" instrument_node=""> this dude Dr. HHH.....Picture a young, handsome prosperous man with mesmerizing big blue eyes who is in fact an evil psychopath, sniveling cheat and conniving polygamist. This devil incarnate killed on a whim and caused turmoil in so many families with his slithering knack of preying on the weak and vulnerable; and while I wasn't too surprised at the naivety of the young women, the men falling for his sleazy schemes </span><i data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">really</span></i><span data-dcnode-id="2775" instrument_node=""> shocked me.</span></p><p data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">This work of non-fiction is jam-packed with interesting facts, faces and descriptive details that are too numerous to even begin to mention here, but now, whenever I see Cracker Jack, I'll sure remember where it originated.</span></p></span><span data-dcnode-id="2770" instrument_node="">
