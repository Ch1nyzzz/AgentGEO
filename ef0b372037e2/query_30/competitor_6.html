</span><span data-dcnode-id="2668" id="freeTextContainer13437316049160690953"><b data-dcnode-id="2672"><span data-dcnode-id="2675" instrument_node="">Extremely well written and researched, unsettling, entertaining, educational and fascinating are all words that come to mind on finishing Eric Larson's book </span><a data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/21996.The_Devil_in_the_White_City_Murder__Magic__and_Madness_at_the_Fair_That_Changed_America" rel="nofollow noopener" title="The Devil in the White City Murder, Magic, and Madness at the Fair That Changed America by Erik Larson"><span data-dcnode-id="2674" instrument_node="">The Devil in the White City: Murder, Magic, and Madness at the Fair That Changed America</span></a></b><br data-dcnode-id="2671"><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">The Chicago World's Fair of 1893 was a remarkable achievement for the city of Chicago and it's architect Daniel H. Burnham and while the city was celebrating and enjoying this new wonder of the world, another man by the name of H.H. Holmes, a handsome and</span></span><span data-dcnode-id="2667" instrument_node="">
</span><span data-dcnode-id="2641" id="freeText13437316049160690953" style="display:none"><b data-dcnode-id="2663"><span data-dcnode-id="2666" instrument_node="">Extremely well written and researched, unsettling, entertaining, educational and fascinating are all words that come to mind on finishing Eric Larson's book </span><a data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/21996.The_Devil_in_the_White_City_Murder__Magic__and_Madness_at_the_Fair_That_Changed_America" rel="nofollow noopener" title="The Devil in the White City Murder, Magic, and Madness at the Fair That Changed America by Erik Larson"><span data-dcnode-id="2665" instrument_node="">The Devil in the White City: Murder, Magic, and Madness at the Fair That Changed America</span></a></b><br data-dcnode-id="2662"><br data-dcnode-id="2661"><span data-dcnode-id="2660" instrument_node="">The Chicago World's Fair of 1893 was a remarkable achievement for the city of Chicago and it's architect Daniel H. Burnham and while the city was celebrating and enjoying this new wonder of the world, another man by the name of H.H. Holmes, a handsome and charming doctor was luring victims to their deaths and becoming America's first Serial Killer. This is the incredible true account of two very different men and the different paths their lives would lead them.</span><br data-dcnode-id="2659"><br data-dcnode-id="2658"><span data-dcnode-id="2657" instrument_node="">This is my second Book by Eric Larson having read and loved </span><a data-dcnode-id="2655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/22551730.Dead_Wake_The_Last_Crossing_of_the_Lusitania" rel="nofollow noopener" title="Dead Wake The Last Crossing of the Lusitania by Erik Larson"><span data-dcnode-id="2656" instrument_node="">Dead Wake: The Last Crossing of the Lusitania</span></a><span data-dcnode-id="2654" instrument_node=""> previously I was looking forward to another book by this author. His books are extremely well researched and very detailed and he leaves no stone unturned when telling a story.</span><br data-dcnode-id="2653"><span data-dcnode-id="2652" instrument_node=""> </span><br data-dcnode-id="2651"><span data-dcnode-id="2650" instrument_node="">I loved learning about the Fair and the magnificent buildings, The World's first Ferris Wheel, Buffalo Bill’s Wild West show, electric boats, all the different elements that went into planning and organising such an amazing event. I loved how this book crossed over with numerous other books I had read about this time, (especially the quote from the notorious Chicago May who was born in Ireland only a few miles from my home and ended up becoming one of Chicago's most notorious Crooks of that time) I enjoyed the descriptions of families travelling long distances to the fair from small farms and towns and their amazement at witnessing these spectacular attractions and miracle of electricity for the first time. Eric Larson's descriptions are vivid and captivating and you actually imagine you are there at the centre of the city's excitement. Of course then you are brought back to reality with the murder and mayhem created by H.H Holmes and wonder how a man like this could have murdered so many innocent people and nobody noticed or suspected him.</span><br data-dcnode-id="2649"><br data-dcnode-id="2648"><span data-dcnode-id="2647" instrument_node="">A word of warning </span><i data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node=""> The Devil is in the detail</span></i><span data-dcnode-id="2644" instrument_node=""> and Eric Larson book's are high on detail and facts which I loved but some may find a tad tedious as the story does drag slightly in places but the historical information and descriptions are excellent and I loved every minute spent with this book.</span><br data-dcnode-id="2643"><span data-dcnode-id="2642" instrument_node="">I listened to this one on audio and the narration was excellent.</span></span><span data-dcnode-id="2640" instrument_node="">

</span><span data-dcnode-id="2535" id="freeTextContainer5568766790367316093"><span data-dcnode-id="2539" instrument_node="">I have been meaning to read this book since it was published and I finally got around to it 15 years later. </span><br data-dcnode-id="2538"><br data-dcnode-id="2537"><span data-dcnode-id="2536" instrument_node="">The Devil in the White City combines two of my favorite subjects Serial Killers &amp; Victorian America. I've read a lot of other reviews for this book and people seem to really hate the fact that this book isn't just about H.H.Holmes. A lot of the reviewers apparently never read the back of the book or they would have known that its a split biography. The Devil in the White City is obviously </span></span><span data-dcnode-id="2534" instrument_node="">
</span><span data-dcnode-id="2519" id="freeText5568766790367316093" style="display:none"><span data-dcnode-id="2533" instrument_node="">I have been meaning to read this book since it was published and I finally got around to it 15 years later. </span><br data-dcnode-id="2532"><br data-dcnode-id="2531"><span data-dcnode-id="2530" instrument_node="">The Devil in the White City combines two of my favorite subjects Serial Killers &amp; Victorian America. I've read a lot of other reviews for this book and people seem to really hate the fact that this book isn't just about H.H.Holmes. A lot of the reviewers apparently never read the back of the book or they would have known that its a split biography. The Devil in the White City is obviously about H. H.Holmes but its also about the 1893 Worlds Fair which was held in Chicago. </span><br data-dcnode-id="2529"><br data-dcnode-id="2528"><span data-dcnode-id="2527" instrument_node="">For me The Worlds Fair was the most fascinating part. Maybe that's because I went in knowing about Dr. Holmes but the fair was completely new to me. I had to fight the urge to Google people and places while I read because I really wanted more information. </span><br data-dcnode-id="2526"><br data-dcnode-id="2525"><span data-dcnode-id="2524" instrument_node="">Here are a few things the 1893 Worlds Fair introduced:The Ferris Wheel, Pabst Blue Ribbon beer, Aunt Jemima boxed pancakes, and juicy fruit gum. </span><br data-dcnode-id="2523"><br data-dcnode-id="2522"><span data-dcnode-id="2521" instrument_node="">For me this book lived up to the hype. Erik Larson paints a vivid and engrossing picture of the rise of Chicago and the first known American Serial Killer. If you enjoy books about True Crime or if you just enjoy a good History book then I highly recommend this book.</span><br data-dcnode-id="2520"></span><span data-dcnode-id="2518" instrument_node="">

</span><span data-dcnode-id="2285" id="freeText5598713460777204377" style="display:none"><u data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">Pre-review:</span></u><br data-dcnode-id="2375"><br data-dcnode-id="2374"><blockquote data-dcnode-id="2369"><span data-dcnode-id="2373" instrument_node="">
</span><i data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">“I was born with the devil in me,' [Holmes] wrote. 'I could not help the fact that I was a murderer, no more than the poet can help the inspiration to sing.” </span></i><span data-dcnode-id="2370" instrument_node="">

instrument_node="">unimaginable</span></i><span data-dcnode-id="2337" instrument_node=""> from both the good and the evil! Be prepared to be seduced by the magic and wonders of the glorious Chicago's World Fair ( or the so-called 'White City') *and* the twisted, gruesome but intriguing Murder Castle!</span><br data-dcnode-id="2336"><br data-dcnode-id="2335"><span data-dcnode-id="2334" instrument_node="">Let us all DREAM BIG together with Daniel Burnham and his merry band of American architects! Let follow them to go through all the dramatic twists and turns that created the World's Columbian Exposition/Chicago's World Fair! There are so many dramas you couldn't have imagined but actually took place during the construction of this massive event!</span><br data-dcnode-id="2333"><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node="">Let's just THINK BIG! If you wanted to kill a lot of people for your own pleasure and you also want to make a profit out of your activities, then why not build an entire building for the sole purpose of...murdering people just for the hell of it!? *evil grins*</span><br data-dcnode-id="2330"><br data-dcnode-id="2329"><blockquote data-dcnode-id="2322"><span data-dcnode-id="2328" instrument_node="">
</span><i data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">“His weakness was his belief that evil had boundaries.” </span></i><span data-dcnode-id="2325" instrument_node="">
</span><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node="">
</span></blockquote><br data-dcnode-id="2321"><span data-dcnode-id="2320" instrument_node="">Plus, meanwhile in London, </span><b data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">Jack the Ripper!</span></b><br data-dcnode-id="2317"><br data-dcnode-id="2316"><span data-dcnode-id="2315" instrument_node="">Still, I have to admit the parts of the book about the infamous H. H. Holmes is a bit flat compared with what had been written for Daniel Burnham and his merry band of architects, Holmes's tale reads like a dry true crime story. Don't get me wrong, Holmes' many deeds and his gruesome Murder Castle are still highly intriguing to read about, still I want more from his story even after I was finished with it.</span><br data-dcnode-id="2314"><br data-dcnode-id="2313"><span data-dcnode-id="2312" instrument_node="">Documentary for H. H. Holmes: </span><a data-dcnode-id="2310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DoPvOTG3XUM8" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2311" instrument_node="">https://www.youtube.com/watch?v=oPvOT...</span></a><br data-dcnode-id="2309"><span data-dcnode-id="2308" instrument_node="">Documentary: Slaughtered At The Murder Hotel </span><a data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DWyMeTDrq8Sc" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2307" instrument_node="">https://www.youtube.com/watch?v=WyMeT...</span></a><br data-dcnode-id="2305"><span data-dcnode-id="2304" instrument_node="">Murder Castle Explained: </span><a data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DdrfRQvK0jUw" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2303" instrument_node="">https://www.youtube.com/watch?v=drfRQ...</span></a><br data-dcnode-id="2301"><br data-dcnode-id="2300"><span data-dcnode-id="2299" instrument_node="">PS: and there seems to be a movie adaptation with Martin Scorsese and Leonardo DiCaprio in it! Isn't it wonderful?</span><br data-dcnode-id="2298"><br data-dcnode-id="2297"><br data-dcnode-id="2296"><span data-dcnode-id="2295" instrument_node="">Chinese review (short):</span><br data-dcnode-id="2294"><br data-dcnode-id="2293"><span data-dcnode-id="2292" instrument_node="">這本書真的很好看哦，內容一方面是講述一個連環殺手在1891年左右時， 自己充當建築師建造了史上首座以大量殺人及謀財害命為主要用途的惡夢之屋。 </span><br data-dcnode-id="2291"><br data-dcnode-id="2290"><span data-dcnode-id="2289" instrument_node="">而另一邊廂，芝加哥以至全美國有頭有面的建築師們也在如火如荼地興建有如夢想宮殿， 一心要和巴黎鐵塔比美的萬國博覽館建築群。</span><br data-dcnode-id="2288"><br data-dcnode-id="2287"><span data-dcnode-id="2286" instrument_node="">以上乃真人真事， 既獵奇又令人意想不到。</span></span><span data-dcnode-id="2284" instrument_node="">

</span><span data-dcnode-id="2167" id="freeText15572267452374193595" style="display:none"><span data-dcnode-id="2177" instrument_node="">The Devil in The White City is a fascinating study of the genius of two men and how they applied that genius. At first I was worried that the book would be too gory but most of the details are left to the imagination.</span><br data-dcnode-id="2176"><br data-dcnode-id="2175"><span data-dcnode-id="2174" instrument_node="">However, the Fair is what captivated me. How these men managed to build such beauty and excitement with limited time, funds and a less than favorable location, is amazing. I live in Milwaukee, about a hour and a half from Chicago and I know this area well, that brought it home to me a lot. The descriptive writing painted a picture of the dazzling buildings as well as the many famous visitors. The Ferris Wheel was such an engineering feat that it's hard to believe that it all worked, sustaining the incredible weight of the cars and the people. The writing is absolutely superb and I could not put this book down. Afterward I spent many hours on the internet searching for photographs from the fair and was amazed to view it, it was even more spectacular than I had imagined. Strangely the Chicago Museum has very little on the Fair and the development of the Ferris Wheel.</span><br data-dcnode-id="2173"><br data-dcnode-id="2172"><span data-dcnode-id="2171" instrument_node="">There was so much to learn from this book about this time period when Chicago struggled to prove itself and it did! As described in the book I'm sure it was depressing to see the fair end and go back to a regular life, particularly during those economically distressed time. The killings and plotting of H. Holmes were a tremendous shock to the 1800's society. I shiver to think how callous we have now become to such crimes.</span><br data-dcnode-id="2170"><br data-dcnode-id="2169"><span data-dcnode-id="2168" instrument_node="">I will highly recommend this book to everyone who loves great writing and particularly to lovers of historical fiction.</span></span><span data-dcnode-id="2166" instrument_node="">

</span><span data-dcnode-id="2048" id="freeText9693560247332084882" style="display:none"><span data-dcnode-id="2056" instrument_node="">The White City is the Chicago Columbia Exposition, a world fair in which all the buildings were painted white; the time the late 1800s during the fair; the Devil is a serial killer. Yet this is a non-fiction book. Larson has written a very informative as well as entertaining story. The Columbian Exposition was a very big deal. Chicago had vied for the honor of presenting a world’s fair, and when they were selected the energy of the famed slaughterhouse city was put to the wheel. There are many personalities involved, not least Daniel Burnham, one of the top architects of his day and the coordinator of the entire project design. He brought in Frederick Law Olmstead and many other top architects. Chicago was determined to outdo the French, whose world fair in Paris had been a triumph, introducing, among other things, the Eiffel Tower, and mass use of alternating current. Larson describes the conflicting and outlandish personalities of the time, and makes us marvel that the thing ever actually got done. The Chicago Exposition introduced some significant items of its own, not least of which was a very progressive notion of city planning, for the enterprise required attention to a multitude of facets simultaneously in order to come to fruition. One of the structures built was then the largest building in the world. The fair introduced Mister Ferris’ first working wheel. The Disney family attended and the fair may have inspired Walt to a development of his own. Buffalo Bill made millions with his entertainment just outside the fair gates (The fair had not allowed him to be a part of the show inside). Weather was a formidable opponent to the construction, as was the state of the economy, namely plummeting. </span><br data-dcnode-id="2055"><br data-dcnode-id="2054"><span data-dcnode-id="2053" instrument_node="">Counterbalancing the travails and triumphs of creating the fair, the Devil of the title was a young man named Holmes (no, not Sherlock). He had a very winning way with people, particularly creditors and attractive young women. He had some flaws however. Among them was a complete inability to empathize with anyone. He was an extreme example of what we refer to today as a psychopath. He set up shop in Chicago about that time, acquired some property and constructed on it a building of his own design. It was called The Castle, and one might be forgiven for imagining it with lightning bolts blasting stormy skies. For it was here that he murdered untold numbers of people, women, men, children. He designed the building to incorporate a space in which he could trap and gas people. He also allowed for his need to incinerate the bodies without releasing much aroma. His charm kept the suspicious at bay. Eventually, of course, he was found out and brought to justice, but not until he had slain somewhere between 50 and 200 people. </span><br data-dcnode-id="2052"><br data-dcnode-id="2051"><span data-dcnode-id="2050" instrument_node="">Larson peppers the book with dozens of satisfying factoids, about the people he is describing and about the times. It was, despite some of the darker subject matter, a very engaging, informative, and yes, fun read.</span><br data-dcnode-id="2049"></span><span data-dcnode-id="2047" instrument_node="">

</span><span data-dcnode-id="1947" id="freeTextContainer8766796357714744458"><span data-dcnode-id="1951" instrument_node="">Ohhhh, this book is creeeeeepy and all-true!!! Being from Chicago I was in an awful thrall the entire time. The only thing that was missing for me would have been some kind of map to show where exactly the Fair was located, and all the other buildings he talks about... I think the fair was probably located roughly on what the Museum Campus is now, but I still would like to see a map. </span><br data-dcnode-id="1950"><br data-dcnode-id="1949"><span data-dcnode-id="1948" instrument_node="">And the people! Burnham and Root and Atwood... and Carter Henry Harrison! It says his mansion was on Ashland, I'm</span></span><span data-dcnode-id="1946" instrument_node="">
</span><span data-dcnode-id="1929" id="freeText8766796357714744458" style="display:none"><span data-dcnode-id="1945" instrument_node="">Ohhhh, this book is creeeeeepy and all-true!!! Being from Chicago I was in an awful thrall the entire time. The only thing that was missing for me would have been some kind of map to show where exactly the Fair was located, and all the other buildings he talks about... I think the fair was probably located roughly on what the Museum Campus is now, but I still would like to see a map. </span><br data-dcnode-id="1944"><br data-dcnode-id="1943"><span data-dcnode-id="1942" instrument_node="">And the people! Burnham and Root and Atwood... and Carter Henry Harrison! It says his mansion was on Ashland, I'm wondering exactly where. And Mudgett... I wonder where all of his buildings were... it sends chills up my spine just to think about it. I wonder if anyone has put together a tourist's map based on this book? </span><br data-dcnode-id="1941"><br data-dcnode-id="1940"><span data-dcnode-id="1939" instrument_node="">O.K., beyond my personal reasons for being fascinated, the writing is excellent, and really well documented. And the charming thing is that he documented everything in the back of the book in a really simple way, so if you were so inclined you would not have to be a big fancy scholar to follow his paper trail and see all of this stuff for yourself. Power to the people!</span><br data-dcnode-id="1938"><br data-dcnode-id="1937"><span data-dcnode-id="1936" instrument_node="">And the writing style is accessible and the voice is also very appropriate... he kind of veers between eulogist and undertaker. And the few times that he takes liberties and describes things that no one could ever really possibly have documented, he does so in a way that is careful and responsible. And I think for him not to have taken the liberties would have been a mistake... I think everyone who read the book would have thought there was something missing. </span><br data-dcnode-id="1935"><br data-dcnode-id="1934"><span data-dcnode-id="1933" instrument_node="">And what's ultimately really rewarding about this book is that the author outlines all the ways in which the influences of Fair of 1893 reverberated in American culture (and the world) for years afterward. Our aesthetic sensibility as a nation was permanently changed. And our technological sensibility. And to think that all of this was planned so fast, it was like a supernova in the middle of this underdeveloped backwater (oh, I said it. I live here now, and sometimes I still think of Chicago that way.). And that with all that progress comes this darkness, too, there's this underside to everything. </span><br data-dcnode-id="1932"><br data-dcnode-id="1931"><span data-dcnode-id="1930" instrument_node="">And with that lovely thought, I'm going to try and find the Wooded Island. Ciao!</span></span><span data-dcnode-id="1928" instrument_node="">

</span><span data-dcnode-id="1803" id="freeText10702173702957043736" style="display:none"><span data-dcnode-id="1820" instrument_node="">3 "fascinating but somehow lacking" stars !</span><br data-dcnode-id="1819"><br data-dcnode-id="1818"><b data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node=""> 2015 Most Average of Average Award </span></b><br data-dcnode-id="1815"><br data-dcnode-id="1814"><span data-dcnode-id="1813" instrument_node="">Don't get me wrong. I enjoyed this book quite a bit. This was history made accessible but almost too accessible and readable to the detriment of depth and perhaps some additional analysis.</span><br data-dcnode-id="1812"><br data-dcnode-id="1811"><span data-dcnode-id="1810" instrument_node="">This is a book that ties together (rather loosely) the development and execution of the Chicago World Fair in the 1890s and a sociopathic doctor serial-killer. The stories were not treated equally and at times the emphasis on the design and development of the architecture of the fair overshadowed the story of the doctor who was at times presented as an after-thought.</span><br data-dcnode-id="1809"><br data-dcnode-id="1808"><span data-dcnode-id="1807" instrument_node="">To Mr. Larson's credit he took a wealth of information and presented it in an easily understandable style that read like a very long and pretty good Vanity Fair article. I, however, as a reader was not wholly satisfied and the two stories were not treated equally and sometimes the connections seemed rather loose and haphazard.</span><br data-dcnode-id="1806"><br data-dcnode-id="1805"><span data-dcnode-id="1804" instrument_node="">All in all, though, I enjoyed this book and will read further books by Mr. Larson.</span></span><span data-dcnode-id="1802" instrument_node="">

</span><span data-dcnode-id="1653" id="freeText17441142691825625008" style="display:none"><b data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">The Devil in the White City: Murder, Magic, and Madness at the Fair That Changed America, Erik Larson</span></b><br data-dcnode-id="1671"><br data-dcnode-id="1670"><span data-dcnode-id="1669" instrument_node="">The Devil in the White City, is the history of Chicago, especially the World's Fair, and the real crime of H.H. Holmes. the book is divided into four parts, the first three happening in Chicago between 1890 and 1893, while part four of the book takes place in Philadelphia circa 1895.</span><br data-dcnode-id="1668"><br data-dcnode-id="1667"><span data-dcnode-id="1666" instrument_node="">H.H. Holmes, or Herman Mudgett, a charismatic physician, artist, and serial killer who tricked twenty-seven to two hundred people into bringing them to his hotel. He killed women, tested them, and sold their bones to medical schools.</span><br data-dcnode-id="1665"><br data-dcnode-id="1664"><span data-dcnode-id="1663" instrument_node="">تاریخ نخستین خوانش روز شانزدهم ماه فوریه سال2022میلادی</span><br data-dcnode-id="1662"><br data-dcnode-id="1661"><span data-dcnode-id="1660" instrument_node="">عنوان: شیطان در شهر سپید: قتل، جادو و جنون در نمايشگاهی كه آمريكا را دگرگون كرد؛ نویسنده اریک لارسن؛ مترجم: سوگند رجبی‌نسب؛ تهران، نشر قطره، سال1400؛ در464ص؛ شابک9786223080029؛ موضوع داستانهای واقعی از نویسندگان ایالات متحده آمریکا - سده21م</span><br data-dcnode-id="1659"><br data-dcnode-id="1658"><span data-dcnode-id="1657" instrument_node="">اچ.اچ هولمز، یا «هرمن ماجت»، پزشکی کاریزماتیک، هنرمند، و قاتلی سریالی بوده، که بین بیست و هفت تا دویست تن را فریب داده، و به هتلی که در اختیار داشت آورده؛ وی زنان را به قتل میرسانده، بر روی آنها آزمایش انجام میداده، و استخوانهایشان را به دانشکده های پزشکی میفروخته است؛ او برای هر کدام از اتاقهای هتل خود، یک راه پنهانی در نظر گرفته بوده، و نیمه های شب به سراغ قربانیهای خویش میرفته؛ در زمان ساختن راههای پنهانی، او کارگرها و معماران را هماره اخراج میکرده، تا کسی متوجه راز شوم او نگردد؛ با اینحال هیچکس به او مشکوک نمیشود، و او همچنان به کشتار مهمانان هتل میپردازد؛ چیزی که همگی این رویدادها را واقعیتر و خوفناکتر میکند، این است که «هولمز» واقعا وجود داشته است، قاتلی سریالی که به اعتراف خودش مرتکب بیست و هفت قتل شده بود</span><br data-dcnode-id="1656"><br data-dcnode-id="1655"><span data-dcnode-id="1654" instrument_node="">تاریخ بهنگام رسانی 08/12/1400هجری خورشیدی؛ ا. شربیانی</span></span><span data-dcnode-id="1652" instrument_node="">

</span><span data-dcnode-id="1552" id="freeTextContainer9205239174457629698"><span data-dcnode-id="1560" instrument_node="">The Devil in the White City: Murder, Magic, and Madness at the Fair that Changed America by Erik Larson is a 2003 publication. </span><br data-dcnode-id="1559"><br data-dcnode-id="1558"><b data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Astounding! </span></b><br data-dcnode-id="1555"><br data-dcnode-id="1554"><span data-dcnode-id="1553" instrument_node="">I recently read a review of this book online, which reminded me that I had a copy of it on my bookshelf. I was sure I had already read this book- albeit a long time ago- but I had not added it to any of my online book sites, which prompted an internal debate with myself – did I- or did I not read this book or did I maybe have it confused with another book I'd</span></span><span data-dcnode-id="1551" instrument_node="">
</span><span data-dcnode-id="1511" id="freeText9205239174457629698" style="display:none"><span data-dcnode-id="1550" instrument_node="">The Devil in the White City: Murder, Magic, and Madness at the Fair that Changed America by Erik Larson is a 2003 publication. </span><br data-dcnode-id="1549"><br data-dcnode-id="1548"><b data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Astounding! </span></b><br data-dcnode-id="1545"><br data-dcnode-id="1544"><span data-dcnode-id="1543" instrument_node="">I recently read a review of this book online, which reminded me that I had a copy of it on my bookshelf. I was sure I had already read this book- albeit a long time ago- but I had not added it to any of my online book sites, which prompted an internal debate with myself – did I- or did I not read this book or did I maybe have it confused with another book I'd read about H.H. Holmes? </span><br data-dcnode-id="1542"><br data-dcnode-id="1541"><span data-dcnode-id="1540" instrument_node="">As it turns out, I had read it- but it was so long ago many of the details had faded from my memory. Since I had not added the book to any of my online book sites, and I wanted to get a review up for it, I decided a refresher was in order. </span><br data-dcnode-id="1539"><br data-dcnode-id="1538"><span data-dcnode-id="1537" instrument_node=""> To be clear, this is a true crime book about H. H. Holmes, but it's much more that- it's also about a time, a place, a huge event in history, and those who brought it all together. It's a horrifying story, but also a fascinating one. </span><br data-dcnode-id="1536"><br data-dcnode-id="1535"><span data-dcnode-id="1534" instrument_node="">Larson is quite something, isn’t he? The research is, of course, phenomenal, but it’s the way he makes history come to life that kept me turning those pages. </span><br data-dcnode-id="1533"><br data-dcnode-id="1532"><span data-dcnode-id="1531" instrument_node="">The book reads like a novel, which, as we know, is an approach many True Crime authors have mastered, but is a bit harder to pull off when writing about history. Anyone who feels history or nonfiction is too dry should give this book a try! </span><br data-dcnode-id="1530"><br data-dcnode-id="1529"><span data-dcnode-id="1528" instrument_node="">Larson had me in the palm of his hand and despite my penchant for True Crime, it was the planning and execution of the magnificent World Fair that takes center stage. The architecture, all the vivid details, the people behind the scenes, and the influx of people into the city was just incredible. </span><br data-dcnode-id="1527"><br data-dcnode-id="1526"><span data-dcnode-id="1525" instrument_node="">But evil was lurking in the background and the fair turned out to be the perfect environment for a serial killer- H. H. Holmes- to be exact. </span><br data-dcnode-id="1524"><br data-dcnode-id="1523"><span data-dcnode-id="1522" instrument_node="">Holmes was most assuredly the stuff nightmares are made of!! He got away with so much, for such a long time, it was hard to take it all in!! Times were so different back then too- which made it easier for Holmes to con a more trusting public. </span><br data-dcnode-id="1521"><br data-dcnode-id="1520"><span data-dcnode-id="1519" instrument_node="">Overall, Larson has a unique approach, and a well organized presentation, bringing together two seemingly different subjects, and linking them together in such a way that one can hardly tear themselves away from the pages. </span><br data-dcnode-id="1518"><br data-dcnode-id="1517"><span data-dcnode-id="1516" instrument_node="">That’s a rare talent for historical writing. I highly recommend this one to anyone who enjoys true crime and history, of course, but even if you usually prefer fiction, you’ll probably still find this book of great interest!! </span><br data-dcnode-id="1515"><br data-dcnode-id="1514"><br data-dcnode-id="1513"><span data-dcnode-id="1512" instrument_node="">4.5 stars</span></span><span data-dcnode-id="1510" instrument_node="">

</span><span data-dcnode-id="1411" id="freeTextContainer16027264266027380812"><span data-dcnode-id="1412" instrument_node="">Always one to enjoy a little true crime, I had this book highly recommended to me by a very close friend. Erik Larson explores not only the electric sentiment surrounding the World’s Fair in Chicago, but also a sinister character hiding in the shadows, piling up a number of bodies while no one took much notice. The year is 1890 and Chicago is vying to win the right to host the World’s Fair. Set to take place in 1893, the fair has been promised to the United States, allowing a proper quadricenten</span></span><span data-dcnode-id="1410" instrument_node="">
</span><span data-dcnode-id="1385" id="freeText16027264266027380812" style="display:none"><span data-dcnode-id="1409" instrument_node="">Always one to enjoy a little true crime, I had this book highly recommended to me by a very close friend. Erik Larson explores not only the electric sentiment surrounding the World’s Fair in Chicago, but also a sinister character hiding in the shadows, piling up a number of bodies while no one took much notice. The year is 1890 and Chicago is vying to win the right to host the World’s Fair. Set to take place in 1893, the fair has been promised to the United States, allowing a proper quadricentennial celebration of Christopher Columbus’ arrival in the New World. After a gruelling vote by Congress, Chicago won the bid and preparations began. Headed by Daniel H. Burnham, the ‘World’s Columbian Exposition’ started its planning stages, seeking the best land, the greatest buildings, and the most elaborate set-up possible to impress the world. With a limited timetable, everything had to move at lightning speed, something that Burnham would soon realise turned out to be a snail’s pace. In the background, one Herman W. Mudgett, who goes by H. H. Holmes, arrived in the area and settled in Chicago. Professing a medical background, Holmes sought to invest in local businesses and lay down some roots. His innovative ideas caught the attention of many, which was paired with his magnetic personality. However, deep within him lurked a man who was infused with the devil’s own magic, or so he believed. Larson discusses early in the book about how Holmes laid the groundwork for numerous cases of insurance fraud, having people obtain life insurance policies and name him (sometimes using more pseudonyms) as the sole beneficiary. Holmes was also known to use his eyes of the deepest blue to lock onto a woman and decide how he might have her as his own. Larson offers up a wonderful narrative as to how Holmes subtlety lured a certain young woman away from her husband, all while having the man invest deeper into a business venture. Once the woman had left her husband, he courted her and promised all the riches he could offer. He let nothing stand in his way, even a pregnancy that he sought to abort, removing all hurdles to his plans. Holmes brought the woman to his suite on Christmas Eve and killed her, though never allowed a single drop of blood to flow from her, thereby hiding much of the forensic evidence. A killer was born, at least in Chicago, though through some fast talking, Holmes convinced everyone that the victim had left to visit family, while selling her body to a local medical school once it had been disarticulated.</span><br data-dcnode-id="1408"><br data-dcnode-id="1407"><span data-dcnode-id="1406" instrument_node="">With the fair set to open before too long, Burnham had yet to find his piece de resistance; something that would rival the Eiffel Tower in Paris from the fair not five years before. After a number of options proved too underwhelming and M. Eiffel’s attempt to create something new seemed to be a slap in the face, Burnham accepted an idea by a Mr. Ferris to create a massive wheel that would allow fair-goers to see the grounds and much of Chicago from a contained pod. With all the other preparations, Burnham left Ferris to create his masterpiece, hoping that it would be ready for the May 1,1893 opening. He set about making sure everything was running smoothly, while also being feted in the most extravagant ways (Larson includes the menus, which had my mouth watering). By the time the World’s Columbian Exposition opened, the Ferris Wheel was well behind schedule and fair-goers could only gawk at it, hoping that it might be up and running before too long. Burnham seethed in the background, as gate admissions proved to be troubling and the bankers were ready to call in their debts. Meanwhile, Holmes found a new woman to woo, choosing to present himself with a pseudonym so that no one would get suspicious. His plans grew as he had her help him prepare his hotel for the fair-goers, but would wait for things to really kick off before disappearing with more bodies attributable to his sinister work. Holmes surely had a taste for death, though his was far less gruesome than Jack the Ripper, the latest serial killer whose name had been splashed all across the tabloids only a few years before.</span><br data-dcnode-id="1405"><br data-dcnode-id="1404"><span data-dcnode-id="1403" instrument_node="">In the culminating section of the book, Erik Larson offers the reader a glimpse not only into the wonders that the fair brought, but the intensity of Holmes and his killing spree. While the world was introduced to Juicy Fruit chewing gum, they were oblivious to the missing women who fell at the hands of a folded cloth of chloroform. Aunt Jemima instant pancake mix might have wooed households (more so than the new cereal, Shredded Wheat), Cracker Jacks offered up a new and sweet popcorn-based snack, and new technologies for communication and inter-personal socialisation. All the while, H. H. Holmes plotted horrible ways by which he could kill and feed his ever-growing need for power. In an interesting parallel, while the end of the exposition came, Holmes was also seeking to pack up and depart Chicago. Larson discusses some of the macabre events that saw the end of the exposition look blacker than Chicago had hoped. Holmes’ departure brought him to the attention of the authorities and a massive insurance fraud opened the door to some questions about the whereabouts of some who had gone missing. Larson shows how quickly things went from calm to chaotic and what led authorities to capture a serial killer no one even knew existed. A piece that will surely stay with me for years to come, as I make sure to find more books by Erik Larson to feed my appetite for this sort of writing. Recommended to those who love a chilling piece of true crime, as well as the reader whose love of history and late 19th century America remains high.</span><br data-dcnode-id="1402"><br data-dcnode-id="1401"><span data-dcnode-id="1400" instrument_node="">Erik Larson offers readers a sensational piece of true crime, though it is so much more. His subtle telling of the murders committed by H. H. Holmes proves to add to the eerie nature of the entire experience, as he layers the narrative with the development and launching of the World’s Columbian Exposition. Featuring so much detail in the slow and methodical planning of the event, Larson pulls the reader into the middle of it all, as though they were there with Daniel H. Burnham through trial and tribulation. Equally as stunning is the means by which Larson told of the plotting Holmes undertook for each of his victims, making sure to fit himself into the community and win over the hearts of neighbours before causing the odd (and intricate) disappearance. Larson could not have added more detail, as it truly feels to the reader as though they are right there, down to the ‘large ice fangs that covered the trains one January night as the engines travelled along the tracks’. It is this depiction that turns this from a book of true crime to one in which the reader can almost sense what is lurking in the shadows. Some may wish to bolt their doors, others might not want to go out after dark, and still others may be left wondering about their neighbours and acquaintances, such is the depth to which Larson makes the reader feel a part of the action. The book is broken into four parts, with vignettes that serve as chapters. Larson balances the narrative between the exposition and Holmes’ activities advancing both as the timeline requires. This is surely one of those books that will keep the reader wondering what to expect, especially those who are not familiar with the murders. With so much to see and do throughout the book, the reader is sure to get lost amongst all the action and the numerous characters. Erik Larson does his best to keep it straight and provides the reader with the ride of their life... and I am not even referring to the Ferris Wheel.</span><br data-dcnode-id="1399"><br data-dcnode-id="1398"><span data-dcnode-id="1397" instrument_node="">Kudos, Mr. Larson, for a sensational depiction of a period of time meant to be celebratory, with a definite pall of darkness clouding over it. I will be checking out more of your work to see what else I might learn. </span><br data-dcnode-id="1396"><br data-dcnode-id="1395"><span data-dcnode-id="1394" instrument_node="">Love/hate the review? An ever-growing collection of others appears at: </span><br data-dcnode-id="1393"><a data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pecheyponderings.wordpress.com/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1392" instrument_node="">http://pecheyponderings.wordpress.com/</span></a><br data-dcnode-id="1390"><br data-dcnode-id="1389"><span data-dcnode-id="1388" instrument_node="">A Book for All Seasons, a different sort of Book Challenge: </span><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/group/show/248185-a-book-for-all-seasons" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1387" instrument_node="">https://www.goodreads.com/group/show/...</span></a></span><span data-dcnode-id="1384" instrument_node="">

</span><span data-dcnode-id="1180" id="freeTextContainer14940273892404749868"><i data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">The Devil in the White City</span></i><span data-dcnode-id="1195" instrument_node=""> is one of those enticing little books in which you know what you're going to get, yet you read it anyway, and it delivers all the salacious excitement you desired...you filthy degenerate, you!</span><br data-dcnode-id="1194"><br data-dcnode-id="1193"><span data-dcnode-id="1192" instrument_node="">Amid of all the magnificence and enchantment of the 1893 Chicago World's Fair...</span><br data-dcnode-id="1191"><br data-dcnode-id="1190"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1189" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1400514957i/9684325._SX540_.jpg&amp;raw" width="200"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1188" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1397242310i/9253022.jpg&amp;raw" width="200"><br data-dcnode-id="1187"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1186" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1400514957i/9684326.jpg&amp;raw" width="400"><br data-dcnode-id="1185"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1184" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1400514957i/9684327.jpg&amp;raw" width="400"><br data-dcnode-id="1183"><br data-dcnode-id="1182"><span data-dcnode-id="1181" instrument_node="">...a doctor lured countless victims from the 27 million people who attended the fair into his "Murder Castle." His evasive trail is followed and his horrid deeds recorded, all intertwined with the oft</span></span><span data-dcnode-id="1179" instrument_node="">
</span><span data-dcnode-id="1154" id="freeText14940273892404749868" style="display:none"><i data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">The Devil in the White City</span></i><span data-dcnode-id="1176" instrument_node=""> is one of those enticing little books in which you know what you're going to get, yet you read it anyway, and it delivers all the salacious excitement you desired...you filthy degenerate, you!</span><br data-dcnode-id="1175"><br data-dcnode-id="1174"><span data-dcnode-id="1173" instrument_node="">Amid of all the magnificence and enchantment of the 1893 Chicago World's Fair...</span><br data-dcnode-id="1172"><br data-dcnode-id="1171"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1170" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1400514957i/9684325._SX540_.jpg&amp;raw" width="200"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1169" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1397242310i/9253022.jpg&amp;raw" width="200"><br data-dcnode-id="1168"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1167" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1400514957i/9684326.jpg&amp;raw" width="400"><br data-dcnode-id="1166"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1165" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1400514957i/9684327.jpg&amp;raw" width="400"><br data-dcnode-id="1164"><br data-dcnode-id="1163"><span data-dcnode-id="1162" instrument_node="">...a doctor lured countless victims from the 27 million people who attended the fair into his "Murder Castle." His evasive trail is followed and his horrid deeds recorded, all intertwined with the often contentious development and creation of one of the most ambitious World's Fairs ever.</span><br data-dcnode-id="1161"><br data-dcnode-id="1160"><span data-dcnode-id="1159" instrument_node="">The book is short. There isn't a wealth of information to relate, but Larson squeezes what he can out of it and in an admirable fashion, artfully revealing details and teasing out the tension. </span><br data-dcnode-id="1158"><br data-dcnode-id="1157"><span data-dcnode-id="1156" instrument_node="">Not long after reading this, I went to Chicago for my first ever visit and a naive part of me hoped to find the World's Fair exhibits still up and running. A hundred years and more after the event, Chicago has moved on, but the fair grounds are still used for peculiar exhibitions and one of the original buildings is still in use as a museum, so it's possible to visit the site and daydream yourself back into the glorious wonderment, not to mention the horror, if you wish.</span><br data-dcnode-id="1155"></span><span data-dcnode-id="1153" instrument_node="">

</span><span data-dcnode-id="1063" id="freeTextContainer15863887448885918373"><span data-dcnode-id="1064" instrument_node="">Erik Larson is an amazing historical writer -- one of those rare breed who can bring the past to life and make it seem immediate, fresh, intimate and amazing. The book is based on fact, but it reads like the best of novels, going back and forth between the team racing to put together the most important peacetime event in U.S. history, and a psychopathic murderer who is stalking the city at the same time, preying on young women with a cold efficiency that makes Jack the Ripper look like (excuse t</span></span><span data-dcnode-id="1062" instrument_node="">
</span><span data-dcnode-id="1060" id="freeText15863887448885918373" style="display:none"><span data-dcnode-id="1061" instrument_node="">Erik Larson is an amazing historical writer -- one of those rare breed who can bring the past to life and make it seem immediate, fresh, intimate and amazing. The book is based on fact, but it reads like the best of novels, going back and forth between the team racing to put together the most important peacetime event in U.S. history, and a psychopathic murderer who is stalking the city at the same time, preying on young women with a cold efficiency that makes Jack the Ripper look like (excuse the pun) a hack. I had no particular interest in the Chicago World's Fair, but Larson is a teacher who can make you forget you are learning. Anywhere he chooses to take you, you can be assured the ride is worth the price of admission.</span></span><span data-dcnode-id="1059" instrument_node="">

</span><span data-dcnode-id="375" id="freeText10413635657137205048" style="display:none"><span data-dcnode-id="386" instrument_node="">Erik Larson’s latest work of narrative nonfiction is DEAD WAKE: THE LAST CROSSING OF THE LUSITANIA, which became an immediate New York Times bestseller. His saga of the Chicago World’s Fair of 1893, THE DEVIL IN THE WHITE CITY, was a finalist for the National Book Award, and won an Edgar Award for fact-crime writing, and lingered on various NYT best-seller lists for the better part of a decade. Hulu plans to adapt the book for a limited TV series, with Leonardo DiCaprio and Martin Scorsese as executive producers. Erik’s IN THE GARDEN OF BEASTS, about America’s first ambassador to Nazi Germany and his daughter, has been optioned by Tom Hanks for development as a feature film.</span><br data-dcnode-id="385"><br data-dcnode-id="384"><span data-dcnode-id="383" instrument_node="">His next book, THE SPLENDID AND THE VILE: A SAGA OF CHURCHILL, FAMILY, AND DEFIANCE DURING THE BLITZ, due out in early spring 2020, is a story of geopolitical brinksmanship during Churchill’s first year as prime minister, but also an intimate domestic drama, set against the backdrop of Churchill’s prime-ministerial country house, Chequers, and his “full-moon home,” Ditchley, where Churchill, his family, and his “Secret Circle” convene when the moon is in its brightest phases and the bombing threat is highest. </span><br data-dcnode-id="382"><br data-dcnode-id="381"><span data-dcnode-id="380" instrument_node="">Erik is a former features writer for The Wall Street Journal and Time. His magazine stories have appeared in The New Yorker, The Atlantic Monthly, Harper's and other publications.</span><br data-dcnode-id="379"><br data-dcnode-id="378"><span data-dcnode-id="377" instrument_node="">He has taught non-fiction writing at San Francisco State, the Johns Hopkins Writing Seminars, the University of Oregon, and the Chuckanut Writers Conference, and has spoken to audiences from coast to coast. A former resident of Seattle, he now lives in Manhattan with his wife, a neonatologist and author of the nonfiction memoir, ALMOST HOME, which, as Erik puts it, "could make a stone cry." They have three daughters in far-flung locations and professions. </span><br data-dcnode-id="376"></span><span data-dcnode-id="374" instrument_node="">
