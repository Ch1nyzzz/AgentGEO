-id="1102" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TeenGenius" title="/pmwiki/pmwiki.php/Main/TeenGenius"><span data-dcnode-id="1101" instrument_node="">Teen Genius</span></a><span data-dcnode-id="1099" instrument_node="">: Casey. Frank is one that grew up and burned out.</span></li><li data-dcnode-id="1090"><span data-dcnode-id="1097" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TeleportationSickness" title="/pmwiki/pmwiki.php/Main/TeleportationSickness"><span data-dcnode-id="1096" instrument_node="">Teleportation Sickness</span></a><span data-dcnode-id="1094" instrument_node="">: The teleporter used to take </span><span class="spoiler" data-dcnode-id="1092" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1093" instrument_node=""> the main characters to Paris</span></span><span data-dcnode-id="1091" instrument_node=""> also causes a good loss of blood sugar. While Frank and Athena aren't so badly affected, Casey is.</span></li><li data-dcnode-id="1082"><span data-dcnode-id="1089" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TeleportersAndTransporters" title="/pmwiki/pmwiki.php/Main/TeleportersAndTransporters"><span data-dcnode-id="1088" instrument_node="">Teleporters and Transporters</span></a><span data-dcnode-id="1086" instrument_node="">: The main means of transportation between Earth and Tomorrowland. They are also used to take </span><span class="spoiler" data-dcnode-id="1084" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1085" instrument_node=""> Casey, Frank and Athena from New York to Paris</span></span><span data-dcnode-id="1083" instrument_node="">. Some of them can be a fairly rough ride.</span></li><li data-dcnode-id="1069"><span data-dcnode-id="1081" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThingsManWasNotMeantToKnow" title="/pmwiki/pmwiki.php/Main/ThingsManWasNotMeantToKnow"><span data-dcnode-id="1080" instrument_node="">Things Man Was Not Meant to Know</span></a><span data-dcnode-id="1078" instrument_node="">: Building a machine that predicted the future turned out not to be such a great idea. </span><span class="spoiler" data-dcnode-id="1070" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1077" instrument_node="">When people became aware that it had predicted </span><a class="twikilink" data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt" title="/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt"><span data-dcnode-id="1076" instrument_node="">The End of the World as We Know It</span></a><span data-dcnode-id="1074" instrument_node="">, they gave up hope and </span><a class="twikilink" data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SelfFulfillingProphecy" title="/pmwiki/pmwiki.php/Main/SelfFulfillingProphecy"><span data-dcnode-id="1073" instrument_node="">actually brought the world closer to that outcome</span></a><span data-dcnode-id="1071" instrument_node="">.</span></span></li><li data-dcnode-id="1064"><span data-dcnode-id="1068" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TitleDrop" title="/pmwiki/pmwiki.php/Main/TitleDrop"><span data-dcnode-id="1067" instrument_node="">Title Drop</span></a><span data-dcnode-id="1065" instrument_node="">: Done by Frank himself at one point in the movie.</span></li><li data-dcnode-id="1051"><span data-dcnode-id="1063" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThisIsNotAFloor" title="/pmwiki/pmwiki.php/Main/ThisIsNotAFloor"><span data-dcnode-id="1062" instrument_node="">This Is Not a Floor</span></a><span data-dcnode-id="1060" instrument_node="">: Since Athena hands out her pins without any context or warning whatsoever, thinking that they are transporting the user to Tomorrowland instead of just showing it is a very easy mistake to make. Also a very dangerous one, as Casey discovers by </span><a class="twikilink" data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WatchOutForThatTree" title="/pmwiki/pmwiki.php/Main/WatchOutForThatTree"><span data-dcnode-id="1059" instrument_node="">banging into real objects</span></a><span data-dcnode-id="1057" instrument_node="">. Or </span><a class="twikilink" data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StaircaseTumble" title="/pmwiki/pmwiki.php/Main/StaircaseTumble"><span data-dcnode-id="1056" instrument_node="">falling down staircases</span></a><span data-dcnode-id="1054" instrument_node="">. Over and over again </span><span class="spoiler" data-dcnode-id="1052" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1053" instrument_node="">until it runs out of power. While she's waist-deep in a lake.</span></span></li><li data-dcnode-id="1046"><span data-dcnode-id="1050" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TranslationYes" title="/pmwiki/pmwiki.php/Main/TranslationYes"><span data-dcnode-id="1049" instrument_node="">Translation: "Yes"</span></a><span data-dcnode-id="1047" instrument_node="">: One of the robot mooks in Paris shouts something at the group in French. Athena translates this to "about what you'd expect."</span></li><li data-dcnode-id="1041"><span data-dcnode-id="1045" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TurnOutLikeHisFather" title="/pmwiki/pmwiki.php/Main/TurnOutLikeHisFather"><span data-dcnode-id="1044" instrument_node="">Turn Out Like His Father</span></a><span data-dcnode-id="1042" instrument_node="">: Young Frank tells his dad he's never giving up. By the present day, he's given up and is treating Casey the same way.</span></li><li data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UncannyValley" title="/pmwiki/pmwiki.php/Main/UncannyValley"><span data-dcnode-id="1039" instrument_node="">Uncanny Valley</span></a><span data-dcnode-id="1037" instrument_node="">: Invoked by some of the audio animatronic villains.</span></li><li data-dcnode-id="1014"><span data-dcnode-id="1035" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnexplainedRecovery" title="/pmwiki/pmwiki.php/Main/UnexplainedRecovery"><span data-dcnode-id="1034" instrument_node="">Unexplained Recovery</span></a><span data-dcnode-id="1032" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1015" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1031" instrument_node="">The Monitor predicted </span><a class="twikilink" data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt" title="/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt"><span data-dcnode-id="1030" instrument_node="">inevitable doom</span></a><span data-dcnode-id="1028" instrument_node=""> for the Earth in as little as 56 days but, after it is destroyed and governor Nix dies, </span><a class="twikilink" data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoEndorHolocaust" title="/pmwiki/pmwiki.php/Main/NoEndorHolocaust"><span data-dcnode-id="1027" instrument_node="">absolutely nothing happens at all</span></a><span data-dcnode-id="1025" instrument_node="">. While it is reasonable that, without its influence, nuclear war could be averted - and it's implied the foreseen environmental collapse is a result of humanity's death throes (see </span><a class="twikilink" data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/LifeAfterPeople" title="/pmwiki/pmwiki.php/Series/LifeAfterPeople"><span data-dcnode-id="1024" instrument_node="">Life After People</span></a><span data-dcnode-id="1022" instrument_node="">) - if the planet was in such a catastrophic nosedive that </span><a class="twikilink" data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt" title="/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt"><span data-dcnode-id="1021" instrument_node="">The End of the World as We Know It</span></a><span data-dcnode-id="1019" instrument_node=""> was less than two months away, you'd think there would be more consequences, even if they're not world-ending, but when the new recruiter AAs embark to hand out new pins, they find a world stumbling along as usual. Frank goes so far as to completely </span><a class="twikilink" data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Handwave" title="/pmwiki/pmwiki.php/Main/Handwave"><span data-dcnode-id="1018" instrument_node="">handwave</span></a><span data-dcnode-id="1016" instrument_node=""> it by saying "We shouldn't even be here, but we are".</span></span></li><li data-dcnode-id="998"><span data-dcnode-id="1013" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnspecifiedApocalypse" title="/pmwiki/pmwiki.php/Main/UnspecifiedApocalypse"><span data-dcnode-id="1012" instrument_node="">Unspecified Apocalypse</span></a><span data-dcnode-id="1010" instrument_node="">: </span><span class="spoiler" data-dcnode-id="999" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1009" instrument_node="">The Monitor predicts a </span><a class="twikilink" data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ApocalypseHow/Class2" title="/pmwiki/pmwiki.php/ApocalypseHow/Class2"><span data-dcnode-id="1008" instrument_node="">Class 2</span></a><span data-dcnode-id="1006" instrument_node=""> through a combination of nuclear war, societal unrest </span><em data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">and</span></em><span data-dcnode-id="1003" instrument_node=""> environmental damage. It's implied to </span><a class="twikilink" data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ApocalypseHow/Class3a" title="/pmwiki/pmwiki.php/ApocalypseHow/Class3a"><span data-dcnode-id="1002" instrument_node="">get much worse</span></a><span data-dcnode-id="1000" instrument_node="">.</span></span></li><li data-dcnode-id="993"><span data-dcnode-id="997" instrument_node=""> </span><a class="twikilink" data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Utopia" title="/pmwiki/pmwiki.php/Main/Utopia"><span data-dcnode-id="996" instrument_node="">Utopia</span></a><span data-dcnode-id="994" instrument_node="">: What Tomorrowland was at one point. They are harmoniously multicultural, have achieved a post-scarcity society, and have technology that's borderline magical including interstellar flight that's commonplace.</span></li><li data-dcnode-id="971"><span data-dcnode-id="992" instrument_node=""> </span><a class="twikilink" data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainHasAPoint" title="/pmwiki/pmwiki.php/Main/VillainHasAPoint"><span data-dcnode-id="991" instrument_node="">Villain Has a Point</span></a><span data-dcnode-id="989" instrument_node="">: Governor Nix's plan wasn't actually evil. At first he believed </span><span class="spoiler" data-dcnode-id="972" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="988" instrument_node=""> showing humanity a possible apocalyptic future would scare them into trying to prevent it. However, he lost faith when instead of trying to prevent the apocalypse, humanity </span><em data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">embraced</span></em><span data-dcnode-id="985" instrument_node=""> the idea of it. How do you save someone who doesn't </span><em data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">want</span></em><span data-dcnode-id="982" instrument_node=""> to be saved? Even better, why would </span><em data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">you</span></em><span data-dcnode-id="979" instrument_node=""> want to interact with them in any way, shape or form? This is why the killer robots attempted to assassinate Casey, Frank and Athena; after it became blatantly clear that Earth didn't want to be saved, it was simply a manner of </span><em data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">survival</span></em><span data-dcnode-id="976" instrument_node=""> - if the nihilistic masters and masses could get to Tomorrowland, they'd almost certainly destroy it too. Secrecy was its shield. The robots were simply operating on orders received </span><em data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">decades</span></em><span data-dcnode-id="973" instrument_node=""> earlier.</span></span></li><li data-dcnode-id="966"><span data-dcnode-id="970" instrument_node=""> </span><a class="twikilink" data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeWillHavePerfectHealthInTheFuture" title="/pmwiki/pmwiki.php/Main/WeWillHavePerfectHealthInTheFuture"><span data-dcnode-id="969" instrument_node="">We Will Have Perfect Health in the Future</span></a><span data-dcnode-id="967" instrument_node="">: Governor Nix appears exactly the same after fifty years, thanks to a morning shake which keeps him in perfect health.</span></li><li data-dcnode-id="961"><span data-dcnode-id="965" instrument_node=""> </span><a class="twikilink" data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatMeasureIsANonHuman" title="/pmwiki/pmwiki.php/Main/WhatMeasureIsANonHuman"><span data-dcnode-id="964" instrument_node="">What Measure Is a Non-Human?</span></a><span data-dcnode-id="962" instrument_node="">: The violence is toned down for this PG film by making most of the villains robots, so their deaths don't really count... except for Athena, whom our heroes recognize as a living, sapient being by the end. So all those robots they've been killing were also people.</span></li><li data-dcnode-id="956"><span data-dcnode-id="960" instrument_node=""> </span><a class="twikilink" data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouCantFightFate" title="/pmwiki/pmwiki.php/Main/YouCantFightFate"><span data-dcnode-id="959" instrument_node="">You Can't Fight Fate</span></a><span data-dcnode-id="957" instrument_node="">: Nix believes that the future shown by the Monitor is inevitable.</span></li><li data-dcnode-id="951"><span data-dcnode-id="955" instrument_node=""> </span><a class="twikilink" data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Zeerust" title="/pmwiki/pmwiki.php/Main/Zeerust"><span data-dcnode-id="954" instrument_node="">Zeerust</span></a><span data-dcnode-id="952" instrument_node="">: Tomorrowland, especially in the 1960s.</span></li></ul><p data-dcnode-id="949"></p><h2 data-dcnode-id="944"><span data-dcnode-id="948" instrument_node="">The prequel novel </span><em data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Before Tomorrowland</span></em><span data-dcnode-id="945" instrument_node=""> contains examples of:</span></h2><p data-dcnode-id="943"></p><ul data-dcnode-id="897"><li data-dcnode-id="931"><span data-dcnode-id="942" instrument_node=""> </span><a class="twikilink" data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Expy" title="/pmwiki/pmwiki.php/Main/Expy"><span data-dcnode-id="941" instrument_node="">Expy</span></a><span data-dcnode-id="939" instrument_node="">: Werner Rotwang is one to the </span><em data-dcnode-id="936"><a class="twikilink" data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Metropolis" title="/pmwiki/pmwiki.php/Film/Metropolis"><span data-dcnode-id="938" instrument_node="">Metropolis</span></a></em><span data-dcnode-id="935" instrument_node=""> character of the same name, though </span><a class="twikilink" data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InUniverse" title="/pmwiki/pmwiki.php/Main/InUniverse"><span data-dcnode-id="934" instrument_node="">In-Universe</span></a><span data-dcnode-id="932" instrument_node="">, he was the one that Fritz Lang named the character after.</span></li><li data-dcnode-id="923"><span data-dcnode-id="930" instrument_node=""> </span><a class="twikilink" data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreatOffscreenWar" title="/pmwiki/pmwiki.php/Main/GreatOffscreenWar"><span data-dcnode-id="929" instrument_node="">Great Offscreen War</span></a><span data-dcnode-id="927" instrument_node="">: Rotwang earned his initial prominent place in Plus Ultra when he helped in stopping a </span><a class="twikilink" data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RobotUprising" title="/pmwiki/pmwiki.php/Main/RobotUprising"><span data-dcnode-id="926" instrument_node="">Robot Uprising</span></a><span data-dcnode-id="924" instrument_node=""> enacted by the earliest predecessors to the animatronics with EMP technology.</span></li><li data-dcnode-id="918"><span data-dcnode-id="922" instrument_node=""> </span><a class="twikilink" data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ILoveNuclearPower" title="/pmwiki/pmwiki.php/Main/ILoveNuclearPower"><span data-dcnode-id="921" instrument_node="">I Love Nuclear Power</span></a><span data-dcnode-id="919" instrument_node="">: Henry's robot body runs on a plutonium power source.</span></li><li data-dcnode-id="913"><span data-dcnode-id="917" instrument_node=""> </span><a class="twikilink" data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MindUploading" title="/pmwiki/pmwiki.php/Main/MindUploading"><span data-dcnode-id="916" instrument_node="">Mind Uploading</span></a><span data-dcnode-id="914" instrument_node="">: Henry didn't take to this very well.</span></li><li data-dcnode-id="908"><span data-dcnode-id="912" instrument_node=""> </span><a class="twikilink" data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RobotBuddy" title="/pmwiki/pmwiki.php/Main/RobotBuddy"><span data-dcnode-id="911" instrument_node="">Robot Buddy</span></a><span data-dcnode-id="909" instrument_node="">: The Faustus robots.</span></li><li data-dcnode-id="903"><span data-dcnode-id="907" instrument_node=""> </span><a class="twikilink" data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StupidJetpackHitler" title="/pmwiki/pmwiki.php/Main/StupidJetpackHitler"><span data-dcnode-id="906" instrument_node="">Stupid Jetpack Hitler</span></a><span data-dcnode-id="904" instrument_node="">: Much of the book's conflict involves an effort to prevent this, with Plus Ultra agents that defected to the Nazis trying to seize some of that technology.</span></li><li data-dcnode-id="898"><span data-dcnode-id="902" instrument_node=""> </span><a class="twikilink" data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheTunguskaEvent" title="/pmwiki/pmwiki.php/Main/TheTunguskaEvent"><span data-dcnode-id="901" instrument_node="">The Tunguska Event</span></a><span data-dcnode-id="899" instrument_node="">: It was a Plus Ultra experiment conducted by Nikola Tesla to open a portal into the other dimension via a super-powered atomic bomb. The devastating results led to them seeking out alternate, less harmful, means of crossing over and the Manhattan Project was just an effort to tone down the original design into something that wouldn't punch holes in the fabric of reality.</span></li></ul><p data-dcnode-id="896"></p><hr data-dcnode-id="895"><dl data-dcnode-id="890"><dd data-dcnode-id="891"><div class="indent" data-dcnode-id="892"><em data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">"Find the ones who haven't given up. They're the future."</span></em></div></dd></dl><span data-dcnode-id="889" instrument_node="">
