 what's this pin...</span></li><li data-dcnode-id="1802"><span data-dcnode-id="1811" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmicDeath" title="/pmwiki/pmwiki.php/Main/KarmicDeath"><span data-dcnode-id="1810" instrument_node="">Karmic Death</span></a><span data-dcnode-id="1808" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1803" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1807" instrument_node="">Athena ends up </span><a class="twikilink" data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakingTheBullet" title="/pmwiki/pmwiki.php/Main/TakingTheBullet"><span data-dcnode-id="1806" instrument_node="">Taking the Bullet</span></a><span data-dcnode-id="1804" instrument_node=""> when to protect Frank from a ray gun shot from Nix. She then has Frank take advantage of her activating self-destruct mechanism to blow up the Monitor... which then proceeds to fall directly onto Nix.</span></span></li><li data-dcnode-id="1794"><span data-dcnode-id="1801" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaserGuidedKarma" title="/pmwiki/pmwiki.php/Main/LaserGuidedKarma"><span data-dcnode-id="1800" instrument_node="">Laser-Guided Karma</span></a><span data-dcnode-id="1798" instrument_node="">: When Frank first encounters Casey, he uses a wave cannon (</span><span class="spoiler" data-dcnode-id="1796" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1797" instrument_node="">likely in case of robots</span></span><span data-dcnode-id="1795" instrument_node="">), pushing her away from the door, and leaves her outside in the rain. When Casey stages a diversion to get Frank out of the house, she turns the tables by locking him out of his house, using the wave cannon on him, and leaving him outside in the rain.</span></li><li data-dcnode-id="1784"><span data-dcnode-id="1793" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LikeAnOldMarriedCouple" title="/pmwiki/pmwiki.php/Main/LikeAnOldMarriedCouple"><span data-dcnode-id="1792" instrument_node="">Like an Old Married Couple</span></a><span data-dcnode-id="1790" instrument_node="">: Frank and Athena are butting heads like this almost constantly. Made both extra funny and creepy by Frank being (visually) almost four times as old as Athena.</span><span class="notelabel" data-dcnode-id="1787" onclick="togglenote('note1ybep');" style="cursor: pointer;"><sup data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1785" id="note1ybep" isnote="true" onclick="togglenote('note1ybep');" style="display: none; cursor: pointer;"><span data-dcnode-id="1786" instrument_node="">George Clooney was 54 at the time of filming, Raffey Cassidy only 14.</span></span></li><li data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LittleMissBadass" title="/pmwiki/pmwiki.php/Main/LittleMissBadass"><span data-dcnode-id="1782" instrument_node="">Little Miss Badass</span></a><span data-dcnode-id="1780" instrument_node="">: Athena can even beat up adult-sized robots.</span></li><li data-dcnode-id="1772"><span data-dcnode-id="1778" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LittleMissSnarker" title="/pmwiki/pmwiki.php/Main/LittleMissSnarker"><span data-dcnode-id="1777" instrument_node="">Little Miss Snarker</span></a><span data-dcnode-id="1775" instrument_node="">: Athena can be this quite a bit, especially when she's running out of patience </span><span class="spoiler" data-dcnode-id="1773" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1774" instrument_node=""> such as lying that she's got an automatic shutoff function if someone asks her too many sensitive questions. She's really just playing dead because she found Casey annoying.</span></span></li><li data-dcnode-id="1767"><span data-dcnode-id="1771" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LogoJoke" title="/pmwiki/pmwiki.php/Main/LogoJoke"><span data-dcnode-id="1770" instrument_node="">Logo Joke</span></a><span data-dcnode-id="1768" instrument_node="">: The Disney castle is replaced by Tomorrowland.</span></li><li data-dcnode-id="1757"><span data-dcnode-id="1766" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MadeOfIron" title="/pmwiki/pmwiki.php/Main/MadeOfIron"><span data-dcnode-id="1765" instrument_node="">Made of Iron</span></a><span data-dcnode-id="1763" instrument_node="">: Frank. As a kid he survives get driven into the dirt at high speeds by his jetpack instead of suffering any serious injuries. </span><span class="spoiler" data-dcnode-id="1761" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1762" instrument_node=""> It also takes his body a few seconds to disintegrate when shot with a raygun in a potential timeline, unlike everyone else who disintegrates instantly.</span></span><ul data-dcnode-id="1758"><li data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node=""> Also he doesn't seem to need to replenish his sugar levels due to Casey taking his Coke.</span></li></ul></li><li data-dcnode-id="1743"><span data-dcnode-id="1756" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Masquerade" title="/pmwiki/pmwiki.php/Main/Masquerade"><span data-dcnode-id="1755" instrument_node="">Masquerade</span></a><span data-dcnode-id="1753" instrument_node="">: Governor Nix says that, in the old days, Tomorrowland would work to have the Eiffel Tower turning into a huge rocket dismissed as a hoax. </span><span class="spoiler" data-dcnode-id="1751" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1752" instrument_node=""> However, with the world ending in less than two months, he's not going to bother keeping it a secret.</span></span><span data-dcnode-id="1750" instrument_node=""> It didn't stop his </span><a class="twikilink" data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MechaMook" title="/pmwiki/pmwiki.php/Main/MechaMook"><span data-dcnode-id="1749" instrument_node="">androids</span></a><span data-dcnode-id="1747" instrument_node=""> from atomizing those three cops when they </span><a class="twikilink" data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeKnowsTooMuch" title="/pmwiki/pmwiki.php/Main/HeKnowsTooMuch"><span data-dcnode-id="1746" instrument_node="">started asking uncomfortable questions though</span></a><span data-dcnode-id="1744" instrument_node="">.</span></li><li data-dcnode-id="1725"><span data-dcnode-id="1742" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulEcho" title="/pmwiki/pmwiki.php/Main/MeaningfulEcho"><span data-dcnode-id="1741" instrument_node="">Meaningful Echo</span></a><span data-dcnode-id="1739" instrument_node="">:</span><ul data-dcnode-id="1726"><li data-dcnode-id="1731"><span data-dcnode-id="1738" instrument_node=""> Casey at one point tells her father the story of </span><a class="urllink" data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.firstpeople.us/FP-Html-Legends/TwoWolves-Cherokee.html"><span data-dcnode-id="1737" instrument_node="">The Two Wolves</span><img data-dcnode-id="1736" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1734" instrument_node="">, a story he used to tell her, reminding him that the wolf that wins is whichever you keep feeding. </span><span class="spoiler" data-dcnode-id="1732" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1733" instrument_node=""> She later realizes that Governor Nix has been broadcasting apocalyptic images in people's minds, causing them to "feed the wrong wolf".</span></span></li><li data-dcnode-id="1727"><span data-dcnode-id="1730" instrument_node=""> Frank at one point describes the T-pin as "an invitation to a party that never happened." </span><span class="spoiler" data-dcnode-id="1728" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1729" instrument_node=""> At the end of the movie, Frank says that they should "put the party back on and print out new invitations."</span></span></li></ul></li><li data-dcnode-id="1686"><span data-dcnode-id="1724" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="1723" instrument_node="">Meaningful Name</span></a><span data-dcnode-id="1721" instrument_node="">:</span><ul data-dcnode-id="1687"><li data-dcnode-id="1710"><span data-dcnode-id="1720" instrument_node=""> Athena, named after the goddess of wisdom, inspiration, artisans and strategic warfare</span><span class="notelabel" data-dcnode-id="1717" onclick="togglenote('note0937k');" style="cursor: pointer;"><sup data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1715" id="note0937k" isnote="true" onclick="togglenote('note0937k');" style="display: none; cursor: pointer;"><span data-dcnode-id="1716" instrument_node="">(As opposed to Ares, god of violent war)</span></span><span data-dcnode-id="1714" instrument_node=""> among other things, who was born from the head of Zeus. She is the one who seeks out dreamers, encourages them to act on their ideas, and is a pretty decent fighter when she needs to be. </span><span class="spoiler" data-dcnode-id="1712" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1713" instrument_node="">She's also the one to come up with the final means to destroy the Monitor at the end</span></span><span data-dcnode-id="1711" instrument_node="">.</span></li><li data-dcnode-id="1705"><span data-dcnode-id="1709" instrument_node=""> Casey's family name is Newton. Likely after the famous scientist Isaac Newton (although her father, Ed Newton, could double as a nod to Brad Bird's frequent collaborator Ted Newton). Her first name comes from Cassandra, the prophetess whose admonitions were never believed.</span><ul data-dcnode-id="1706"><li data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node=""> Even more style points, Casey's name comes from Isaac, when spelled backwards is Caasi (pronounced as "Casey").</span></li></ul></li><li data-dcnode-id="1690"><span data-dcnode-id="1704" instrument_node=""> Hugo, the </span><span class="spoiler" data-dcnode-id="1702" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1703" instrument_node="">robotic</span></span><span data-dcnode-id="1701" instrument_node=""> proprietor of the Blast to the Past store is named for Hugo Gernsback, creator of </span><em data-dcnode-id="1698"><a class="twikilink" data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Magazine/AmazingStories" title="/pmwiki/pmwiki.php/Magazine/AmazingStories"><span data-dcnode-id="1700" instrument_node="">Amazing Stories</span></a></em><span data-dcnode-id="1697" instrument_node=""> and the namesake of the Hugo Awards. His wife, Ursula, is named after </span><a class="twikilink" data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/UrsulaKLeGuin" title="/pmwiki/pmwiki.php/Creator/UrsulaKLeGuin"><span data-dcnode-id="1696" instrument_node="">Ursula K. Le Guin</span></a><span data-dcnode-id="1694" instrument_node="">, winner of multiple </span><a class="twikilink" data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/HugoAward" title="/pmwiki/pmwiki.php/UsefulNotes/HugoAward"><span data-dcnode-id="1693" instrument_node="">Hugo Awards</span></a><span data-dcnode-id="1691" instrument_node="">.</span></li><li data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node=""> David Nix. "Nix" means "nothing" or "to end." He's content with doing nothing to prevent the end of the world.</span></li></ul></li><li data-dcnode-id="1673"><span data-dcnode-id="1685" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AMinorKidroduction" title="/pmwiki/pmwiki.php/Main/AMinorKidroduction"><span data-dcnode-id="1684" instrument_node="">A Minor Kidroduction</span></a><span data-dcnode-id="1682" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayedWith" title="/pmwiki/pmwiki.php/Main/PlayedWith"><span data-dcnode-id="1681" instrument_node="">Played with</span></a><span data-dcnode-id="1679" instrument_node="">:</span><ul data-dcnode-id="1674"><li data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node=""> While the movie starts with Frank in the present day telling his story, with Casey interrupting, the story kicks in with a young Frank visiting the New York World's Fair, where he meets Nix and Athena and first discovers Tomorrowland.</span></li><li data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node=""> After a very brief shot of her in the present day, interrupting Frank again, we cut to Casey as a kid, identifying various stars and declaring that she wants to become an astronaut.</span></li></ul></li><li data-dcnode-id="1660"><span data-dcnode-id="1672" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MissingMom" title="/pmwiki/pmwiki.php/Main/MissingMom"><span data-dcnode-id="1671" instrument_node="">Missing Mom</span></a><span data-dcnode-id="1669" instrument_node="">: Casey's mom is seen in the intro, then never again, possibly implying she died in between, though it's never explicitly stated. This might also have added to her father's embittered air. However, </span><img class="trivia1 rounded" data-dcnode-id="1668" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-trivia.png&amp;raw" title="This example contains a TRIVIA entry. It should be moved to the TRIVIA tab."><a class="twikilink" data-dcnode-id="1666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordOfGod" title="/pmwiki/pmwiki.php/Main/WordOfGod"><span data-dcnode-id="1667" instrument_node="">Word of God</span></a><span data-dcnode-id="1665" instrument_node=""> reveals that Casey's mother (along with extended family members) were </span><a class="urllink" data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cinemablend.com/new/Why-Judy-Greer-Was-Almost-Completely-Cut-Out-Tomorrowland-71536.html"><span data-dcnode-id="1664" instrument_node="">cut to streamline the story</span><img data-dcnode-id="1663" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1661" instrument_node="">. The Junior Novelization retains Casey's mother and her extended family in the present day time period.</span></li><li data-dcnode-id="1643"><span data-dcnode-id="1659" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoralMyopia" title="/pmwiki/pmwiki.php/Main/MoralMyopia"><span data-dcnode-id="1658" instrument_node="">Moral Myopia</span></a><span data-dcnode-id="1656" instrument_node="">: Governor Nix has a very </span><a class="twikilink" data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterFilibuster" title="/pmwiki/pmwiki.php/Main/CharacterFilibuster"><span data-dcnode-id="1655" instrument_node="">long and angry rant</span></a><span data-dcnode-id="1653" instrument_node=""> about </span><a class="twikilink" data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="1652" instrument_node="">why the people of Earth deserve doom</span></a><span data-dcnode-id="1650" instrument_node="">, but never stops to ponder that by doing nothing to prevent it, even though he has the means and technology to do so, </span><a class="twikilink" data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hypocrite" title="/pmwiki/pmwiki.php/Main/Hypocrite"><span data-dcnode-id="1649" instrument_node="">he's just being as apathetic as they are</span></a><span data-dcnode-id="1647" instrument_node="">. He has so few craps to give that he doesn't even bother to </span><span class="spoiler" data-dcnode-id="1645" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1646" instrument_node=""> stop the Monitor from broadcasting, even though he knows full well it's only making things worse</span></span><span data-dcnode-id="1644" instrument_node="">.</span></li><li data-dcnode-id="1635"><span data-dcnode-id="1642" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyGodWhatHaveIDone" title="/pmwiki/pmwiki.php/Main/MyGodWhatHaveIDone"><span data-dcnode-id="1641" instrument_node="">My God, What Have I Done?</span></a><span data-dcnode-id="1639" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1637" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1638" instrument_node="">Governor Nix, when he inadvertently shot Athena when she took his raygun shot for Frank</span></span><span data-dcnode-id="1636" instrument_node="">.</span></li><li data-dcnode-id="1583"><span data-dcnode-id="1634" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="1633" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="1631" instrument_node="">:</span><ul data-dcnode-id="1584"><li data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node=""> The pin is a reference to the pins sold at Disney Parks.</span></li><li data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node=""> Jetpacks were demonstrated at Disneyland's Tomorrowland during the 1950s and early '60s.</span></li><li data-dcnode-id="1608"><span data-dcnode-id="1626" instrument_node=""> Much like </span><a class="twikilink" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/MeetTheRobinsons" title="/pmwiki/pmwiki.php/WesternAnimation/MeetTheRobinsons"><span data-dcnode-id="1625" instrument_node="">another Disney film about the future</span></a><span data-dcnode-id="1623" instrument_node="">, </span><em data-dcnode-id="1620"><a class="twikilink" data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Ride/SpaceMountain" title="/pmwiki/pmwiki.php/Ride/SpaceMountain"><span data-dcnode-id="1622" instrument_node="">Space Mountain</span></a></em><span data-dcnode-id="1619" instrument_node=""> appears as part of Tomorrowland's skyline. People have also spotted nods to Epcot's </span><em data-dcnode-id="1616"><a class="twikilink" data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Ride/Horizons" title="/pmwiki/pmwiki.php/Ride/Horizons"><span data-dcnode-id="1618" instrument_node="">Horizons</span></a></em><span data-dcnode-id="1615" instrument_node=""> and the Disneyland episode </span><em data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Magic Highway USA.</span></em><span data-dcnode-id="1612" instrument_node=""> During the end credits, Space Mountain and EPCOT's iconic </span><em data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Spaceship Earth</span></em><span data-dcnode-id="1609" instrument_node=""> appear side-by-side as part of the landscape.</span></li><li data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node=""> Tomorrowland's transportation is run by the Tomorrowland Transit Authority, a nod to the Magic Kingdom's version of the Peoplemover.</span></li><li data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node=""> In a rather obscure reference, there is a scene where Frank and Casey sit under glowing trees which appear to be being used as a power source. This may be a nod to the Magic Kingdom's version of Tomorrowland, namely the in-universe Tomorrowland Light and Electric Company that uses metal palm trees as a light source.</span></li><li data-dcnode-id="1585"><span data-dcnode-id="1603" instrument_node=""> Plus Ultra's origins at the Exposition Universelle and their membership including </span><a class="twikilink" data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JulesVerne" title="/pmwiki/pmwiki.php/Creator/JulesVerne"><span data-dcnode-id="1602" instrument_node="">Jules Verne</span></a><span data-dcnode-id="1600" instrument_node="">, who's known as the Father of Science Fiction </span><em data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">and</span></em><span data-dcnode-id="1597" instrument_node=""> inspired </span><a class="twikilink" data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/HGWells" title="/pmwiki/pmwiki.php/Creator/HGWells"><span data-dcnode-id="1596" instrument_node="">H. G. Wells</span></a><span data-dcnode-id="1594" instrument_node=""> (who, in turn, invented nearly every SF trope) brings classic Tomorrowland attraction </span><em data-dcnode-id="1591"><a class="twikilink" data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheTimekeeper" title="/pmwiki/pmwiki.php/Film/TheTimekeeper"><span data-dcnode-id="1593" instrument_node="">The Timekeeper</span></a></em><span data-dcnode-id="1590" instrument_node=""> to mind, along with the much-loved attraction for </span><em data-dcnode-id="1587"><a class="twikilink" data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TwentyThousandLeaguesUnderTheSea" title="/pmwiki/pmwiki.php/Film/TwentyThousandLeaguesUnderTheSea"><span data-dcnode-id="1589" instrument_node="">20,000 Leagues Under the Sea</span></a></em><span data-dcnode-id="1586" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1578"><span data-dcnode-id="1582" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MurderIsTheBestSolution" title="/pmwiki/pmwiki.php/Main/MurderIsTheBestSolution"><span data-dcnode-id="1581" instrument_node="">Murder Is the Best Solution</span></a><span data-dcnode-id="1579" instrument_node="">: Nix's androids default to murdering witnesses or those who seek Tomorrowland with shockingly little provocation or without non-lethal alternatives.</span></li><li data-dcnode-id="1573"><span data-dcnode-id="1577" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NerdsAreSexy" title="/pmwiki/pmwiki.php/Main/NerdsAreSexy"><span data-dcnode-id="1576" instrument_node="">Nerds Are Sexy</span></a><span data-dcnode-id="1574" instrument_node="">: Coming from a family of scientists, Casey is definitely a nerd. And a beautiful one, too.</span></li><li data-dcnode-id="1540"><span data-dcnode-id="1572" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeverTrustATrailer" title="/pmwiki/pmwiki.php/Main/NeverTrustATrailer"><span data-dcnode-id="1571" instrument_node="">Never Trust a Trailer</span></a><span data-dcnode-id="1569" instrument_node="">:</span><ul data-dcnode-id="1541"><li data-dcnode-id="1558"><span data-dcnode-id="1568" instrument_node=""> The trailer makes Casey's dad out to be a </span><a class="twikilink" data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Jerkass" title="/pmwiki/pmwiki.php/Main/Jerkass"><span data-dcnode-id="1567" instrument_node="">Jerkass</span></a><span data-dcnode-id="1565" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyForbiddingFather" title="/pmwiki/pmwiki.php/Main/FantasyForbiddingFather"><span data-dcnode-id="1564" instrument_node="">Fantasy-Forbidding Father</span></a><span data-dcnode-id="1562" instrument_node=""> when in the actual movie he's… a NASA engineer who's facing unemployment as Cape Canaveral is getting closed down, but still is a loving and supporting father despite being left a tad embittered and bearing a somewhat fatalistic viewpoint over being on the verge of unemployment. His angry outburst seen in the trailer is entirely justified because he just bailed Casey out after she gets caught </span><span class="spoiler" data-dcnode-id="1560" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1561" instrument_node=""> breaking into NASA and sabotaging the demolition efforts, and he plans to ground her for it</span></span><span data-dcnode-id="1559" instrument_node="">.</span></li><li data-dcnode-id="1551"><span data-dcnode-id="1557" instrument_node=""> There's also an in-universe example that doubles as </span><a class="twikilink" data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall" title="/pmwiki/pmwiki.php/Main/LeaningOnTheFourthWall"><span data-dcnode-id="1556" instrument_node="">Leaning on the Fourth Wall</span></a><span data-dcnode-id="1554" instrument_node=""> a bit, especially given that some of the footage was also used in the trailers: </span><span class="spoiler" data-dcnode-id="1552" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1553" instrument_node="">The lapel pin that apparently transports Casey to Tomorrowland is actually playing a sophisticated interactive promotional short, and the real Tomorrowland is largely run-down and mostly abandoned.</span></span></li><li data-dcnode-id="1542"><span data-dcnode-id="1550" instrument_node=""> In relation to the above, one might view the trailer and get the impression that this was going to be a sci-fi movie about a parallel world existing on top of Earth à la </span><em data-dcnode-id="1547"><a class="twikilink" data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheCityAndTheCity" title="/pmwiki/pmwiki.php/Literature/TheCityAndTheCity"><span data-dcnode-id="1549" instrument_node="">The City &amp; the City</span></a></em><span data-dcnode-id="1546" instrument_node=""> - and while it </span><em data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">technically</span></em><span data-dcnode-id="1543" instrument_node=""> is, the movie is more of an adventure film that just happens to involve some sci-fi elements (the titular Tomorrowland only makes up a small portion of the story).</span></li></ul></li><li data-dcnode-id="1526"><span data-dcnode-id="1539" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero" title="/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero"><span data-dcnode-id="1538" instrument_node="">Nice Job Breaking It, Hero</span></a><span data-dcnode-id="1536" instrument_node="">: Governor Nix saw that, the way things were going, the Earth </span><a class="twikilink" data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt" title="/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt"><span data-dcnode-id="1535" instrument_node="">wouldn't last forever</span></a><span data-dcnode-id="1533" instrument_node=""> unless something was done to save it, so he </span><span class="spoiler" data-dcnode-id="1528" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1532" instrument_node=""> used the Monitor to subconsciously project the images of doom it had predicted in the hopes that it would scare the people into action. Instead, the only thing it achieved was to </span><a class="twikilink" data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoppedCaring" title="/pmwiki/pmwiki.php/Main/StoppedCaring"><span data-dcnode-id="1531" instrument_node="">desensitize people to the possibility of armageddon</span></a><span data-dcnode-id="1529" instrument_node=""> which actually hastened it dramatically</span></span><span data-dcnode-id="1527" instrument_node="">.</span></li><li data-dcnode-id="1501"><span data-dcnode-id="1525" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NostalgiaAintLikeItUsedToBe" title="/pmwiki/pmwiki.php/Main/NostalgiaAintLikeItUsedToBe"><span data-dcnode-id="1524" instrument_node="">Nostalgia Ain't Like It Used to Be</span></a><span data-dcnode-id="1522" instrument_node="">: A </span><a class="twikilink" data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeconReconSwitch" title="/pmwiki/pmwiki.php/Main/DeconReconSwitch"><span data-dcnode-id="1521" instrument_node="">Decon-Recon Switch</span></a><span data-dcnode-id="1519" instrument_node="">; Frank is a cynical and paranoid outcast because he was </span><em data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">exiled</span></em><span data-dcnode-id="1516" instrument_node=""> from Tomorrowland after </span><span class="spoiler" data-dcnode-id="1514" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1515" instrument_node="">inventing a machine that showed Earth was coming to an end</span></span><span data-dcnode-id="1513" instrument_node="">, which he believes proves that the optimism that built it was all a lie. After discovering that </span><span class="spoiler" data-dcnode-id="1509" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1512" instrument_node="">the machine broadcasts its predictions, creating a </span><a class="twikilink" data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SelfFulfillingProphecy" title="/pmwiki/pmwiki.php/Main/SelfFulfillingProphecy"><span data-dcnode-id="1511" instrument_node="">Self-Fulfilling Prophecy</span></a></span><span data-dcnode-id="1508" instrument_node="">, he realizes that </span><em data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">he</span></em><span data-dcnode-id="1505" instrument_node=""> was the one who made it a lie, by giving up on the future. Thus, the past wasn't "better", it was just more </span><em data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">optimistic</span></em><span data-dcnode-id="1502" instrument_node=""> - despite the myriad problems that those eras faced, people who lived in them believed they would ultimately be solved. The modern world's cynical view of the problems it faces - pollution, sickness, war, hate - has made those problems appear unsolvable, and embracing the optimism of earlier eras will help solve them.</span></li><li data-dcnode-id="1493"><span data-dcnode-id="1500" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheOmniscientCouncilOfVagueness" title="/pmwiki/pmwiki.php/Main/TheOmniscientCouncilOfVagueness"><span data-dcnode-id="1499" instrument_node="">The Omniscient Council of Vagueness</span></a><span data-dcnode-id="1497" instrument_node="">: Plus Ultra was the benevolent kind, working behind the scenes to make a better future for everyone. Unfortunately, by the time of the movie, they relegated their work to the utopian city of Tomorrowland while the "for everyone" part of the plan </span><a class="twikilink" data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MotiveDecay" title="/pmwiki/pmwiki.php/Main/MotiveDecay"><span data-dcnode-id="1496" instrument_node="">fell by the wayside</span></a><span data-dcnode-id="1494" instrument_node="">.</span></li><li data-dcnode-id="1488"><span data-dcnode-id="1492" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheOner" title="/pmwiki/pmwiki.php/Main/TheOner"><span data-dcnode-id="1491" instrument_node="">The Oner</span></a><span data-dcnode-id="1489" instrument_node="">: Casey's first full look into Tomorrowland, what Frank calls "a commercial," is this.</span></li><li data-dcnode-id="1483"><span data-dcnode-id="1487" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PaperThinDisguise" title="/pmwiki/pmwiki.php/Main/PaperThinDisguise"><span data-dcnode-id="1486" instrument_node="">Paper-Thin Disguise</span></a><span data-dcnode-id="1484" instrument_node="">: Athena briefly tries passing herself off as a Girl Scout to explain why she wants to see Casey. Her brother doesn't buy it because 1) she's not even wearing a uniform, and 2) the "Girl Scout cookies" Athena is holding are a box of Oreos.</span></li><li data-dcnode-id="1472"><span data-dcnode-id="1482" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThePollyanna" title="/pmwiki/pmwiki.php/Main/ThePollyanna"><span data-dcnode-id="1481" instrument_node="">The Pollyanna</span></a><span data-dcnode-id="1479" instrument_node="">: Casey. Her boundless optimism breaks all of </span><em data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">once</span></em><span data-dcnode-id="1476" instrument_node=""> in the entirety of the film. And even then, it takes but a few short </span><em data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">seconds</span></em><span data-dcnode-id="1473" instrument_node=""> to snap her out of it.</span></li><li data-dcnode-id="1467"><span data-dcnode-id="1471" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PrecisionFStrike" title="/pmwiki/pmwiki.php/Main/PrecisionFStrike"><span data-dcnode-id="1470" instrument_node="">Precision F-Strike</span></a><span data-dcnode-id="1468" instrument_node="">: Nix says, "Oh, bollocks!" as his last words.</span></li><li data-dcnode-id="1462"><span data-dcnode-id="1466" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PortalCut" title="/pmwiki/pmwiki.php/Main/PortalCut"><span data-dcnode-id="1465" instrument_node="">Portal Cut</span></a><span data-dcnode-id="1463" instrument_node="">: Used to defeat one of the robots near the end.</span></li><li data-dcnode-id="1446"><span data-dcnode-id="1461" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProductPlacement" title="/pmwiki/pmwiki.php/Main/ProductPlacement"><span data-dcnode-id="1460" instrument_node="">Product Placement</span></a><span data-dcnode-id="1458" instrument_node="">:</span><ul data-dcnode-id="1447"><li data-dcnode-id="1452"><span data-dcnode-id="1457" instrument_node=""> The World's Fair features a number of brands, which is probably true to life. A Greyhound-branded shuttle drives past Frank when he arrives. Disney's </span><em data-dcnode-id="1454"><a class="twikilink" data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Ride/ItsASmallWorld" title="/pmwiki/pmwiki.php/Ride/ItsASmallWorld"><span data-dcnode-id="1456" instrument_node="">"it's a small world"</span></a></em><span data-dcnode-id="1453" instrument_node=""> ride factors into the plot.</span></li><li data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node=""> After they go through a portal, Frank offers Casey a Coca-Cola, which she chugs, then she grabs a second one and chugs that as well.</span></li><li data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node=""> Casey's little brother can be seen using what looks like a PSP or PS Vita.</span></li></ul></li><li data-dcnode-id="1441"><span data-dcnode-id="1445" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/QuantumMechanicsCanDoAnything" title="/pmwiki/pmwiki.php/Main/QuantumMechanicsCanDoAnything"><span data-dcnode-id="1444" instrument_node="">Quantum Mechanics Can Do Anything</span></a><span data-dcnode-id="1442" instrument_node="">: Downplayed. While never explicitly mentioned, the tachyon broadcasting antenna seems to be influencing how wave functions collapse.</span></li><li data-dcnode-id="1436"><span data-dcnode-id="1440" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RaygunGothic" title="/pmwiki/pmwiki.php/Main/RaygunGothic"><span data-dcnode-id="1439" instrument_node="">Raygun Gothic</span></a><span data-dcnode-id="1437" instrument_node="">: Tomorrowland's primary architecture style seems to be this, with very Wells-esque touches.</span></li><li data-dcnode-id="1394"><span data-dcnode-id="1435" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="1434" instrument_node="">"The Reason You Suck" Speech</span></a><span data-dcnode-id="1432" instrument_node="">: </span><a class="urllink" data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dkn7Pn6pVkaQ"><span data-dcnode-id="1431" instrument_node="">Nix's speech</span><img data-dcnode-id="1430" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1428" instrument_node=""> about the state of the modern world to the heroes at the climax is essentially this towards society as a whole.</span><div class="indent" data-dcnode-id="1395"><span data-dcnode-id="1427" instrument_node=""> </span><strong data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Governor Nix</span></strong><span data-dcnode-id="1424" instrument_node="">: Let's imagine, if you glimpsed the future, were frightened by what you saw, what would you do with that information? Would you go to... The politicians? Captains of industry? And how would you convince them? With data, facts? Good luck. The only facts they won't challenge are the ones that keep the wheels greased and the dollars rolling in. </span><span class="spoiler" data-dcnode-id="1396" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1423" instrument_node="">But, what if? What if there was a way of skipping the middleman, and putting the critical news directly into everyone's head? The probability of widespread annihilation kept going up. The only way to stop it was to show it, and to scare people straight. Because, what </span><em data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">reasonable</span></em><span data-dcnode-id="1420" instrument_node=""> human being wouldn't be galvanized by the potential destruction of everything they've ever known or loved? To save civilization, I would show its collapse. But, how do you think this vision was received? How do you think people responded to the prospect of imminent doom? They gobbled it up! Like a chocolate eclair! They didn't fear their demise, they repackaged it! It can be enjoyed as video games, as TV shows, books, movies – the entire world wholeheartedly embraced the apocalypse, and sprinted toward it with gleeful abandon. Meanwhile, your Earth was crumbling all around you. You've got simultaneous epidemics of obesity and starvation! Explain that one! Bees and butterflies start to disappear, the glaciers melt, algae blooms... All around you the coal mine canaries are dropping dead and </span><em data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">you won't take the hint!</span></em><span data-dcnode-id="1417" instrument_node=""> </span><strong data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">In every moment there is the possibility of a better future, but you people won't believe it. And because you won't believe it, you won't do what is necessary to make it a reality!</span></strong><span data-dcnode-id="1414" instrument_node=""> So you dwell on this terrible future, you resign yourselves to it. For one reason — because </span><a class="twikilink" data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilIsEasy" title="/pmwiki/pmwiki.php/Main/EvilIsEasy"><span data-dcnode-id="1413" instrument_node="">that future doesn't ask anything of you</span></a><span data-dcnode-id="1411" instrument_node=""> </span><em data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">today.</span></em><span data-dcnode-id="1408" instrument_node=""> So, yes, we saw the iceberg, we warned the Titanic. But you all just steered for it anyway, full steam ahead. Why? Because you </span><em data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">want</span></em><span data-dcnode-id="1405" instrument_node=""> to sink. You </span><em data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">gave up.</span></em><span data-dcnode-id="1402" instrument_node=""> That's not the </span><em data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Monitor's</span></em><span data-dcnode-id="1399" instrument_node=""> fault. That's </span><em data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">yours.</span></em></span></div></li><li data-dcnode-id="1361"><span data-dcnode-id="1393" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReedRichardsIsUseless" title="/pmwiki/pmwiki.php/Main/ReedRichardsIsUseless"><span data-dcnode-id="1392" instrument_node="">Reed Richards Is Useless</span></a><span data-dcnode-id="1390" instrument_node="">: A </span><a class="twikilink" data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiscussedTrope" title="/pmwiki/pmwiki.php/Main/DiscussedTrope"><span data-dcnode-id="1389" instrument_node="">Discussed Trope</span></a><span data-dcnode-id="1387" instrument_node="">. While the founders of Tomorrowland went so far as to travel to another dimension to be able to work in peace towards a better tomorrow, once they found solutions to all the problems back home they decided not to share them, so essentially that "better tomorrow" is relegated to the tiny elite of Tomorrowland while the Earth is left to rot. Casey calls Nix out for isolating Tomorrowland instead of revealing the existence of the fantastical realm to the world as its founders originally planned and not doing anything to help prevent it; Nix reveals that </span><span class="spoiler" data-dcnode-id="1363" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1386" instrument_node="">they </span><em data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">did</span></em><span data-dcnode-id="1383" instrument_node=""> try - just as people on Earth </span><em data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">are</span></em><span data-dcnode-id="1380" instrument_node=""> trying - only to be rebuffed by the </span><a class="twikilink" data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewTheRulesIHaveMoney" title="/pmwiki/pmwiki.php/Main/ScrewTheRulesIHaveMoney"><span data-dcnode-id="1379" instrument_node="">rich</span></a><span data-dcnode-id="1377" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewTheRulesIHaveConnections" title="/pmwiki/pmwiki.php/Main/ScrewTheRulesIHaveConnections"><span data-dcnode-id="1376" instrument_node="">powerful</span></a><span data-dcnode-id="1374" instrument_node="">, who only care about business as usual and status quo. So he modified the Monitor to directly broadcast that information to the world at large... only for them to turn it into a </span><em data-dcnode-id="1371"><a class="twikilink" data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AfterTheEnd" title="/pmwiki/pmwiki.php/Main/AfterTheEnd"><span data-dcnode-id="1373" instrument_node="">genre</span></a></em><span data-dcnode-id="1370" instrument_node="">, which they proceeded to </span><a class="twikilink" data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosyCatastrophe" title="/pmwiki/pmwiki.php/Main/CosyCatastrophe"><span data-dcnode-id="1369" instrument_node="">idealize</span></a><span data-dcnode-id="1367" instrument_node=""> even as the signs of it approached. This drove Nix right past the </span><a class="twikilink" data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DespairEventHorizon" title="/pmwiki/pmwiki.php/Main/DespairEventHorizon"><span data-dcnode-id="1366" instrument_node="">Despair Event Horizon</span></a><span data-dcnode-id="1364" instrument_node="">, which is why Tomorrowland turned its back on the world it came from</span></span><span data-dcnode-id="1362" instrument_node="">.</span></li><li data-dcnode-id="1351"><span data-dcnode-id="1360" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RidiculouslyHumanRobots" title="/pmwiki/pmwiki.php/Main/RidiculouslyHumanRobots"><span data-dcnode-id="1359" instrument_node="">Ridiculously Human Robots</span></a><span data-dcnode-id="1357" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1352" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1356" instrument_node=""> Just Athena. The later robots sent to hunt her down slide too far into the Uncanny Valley. Even the robots built to succeed her mission don't have her liveliness. However, her successors are fresh off the assembly line while she had decades to </span><a class="twikilink" data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrewBeyondTheirProgramming" title="/pmwiki/pmwiki.php/Main/GrewBeyondTheirProgramming"><span data-dcnode-id="1355" instrument_node="">become more human</span></a><span data-dcnode-id="1353" instrument_node="">. Given some time and care, the new recruiters are more than likely to become like her eventually.</span></span></li><li data-dcnode-id="1341"><span data-dcnode-id="1350" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RuleOfSymbolism" title="/pmwiki/pmwiki.php/Main/RuleOfSymbolism"><span data-dcnode-id="1349" instrument_node="">Rule of Symbolism</span></a><span data-dcnode-id="1347" instrument_node="">: When Casey uses the monitor to peer into the future, she watches as the gantry she was protecting is dismantled. </span><span class="spoiler" data-dcnode-id="1342" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1346" instrument_node="">Just as the gantry is completely gone - symbolizing how mankind no longer plans to launch rockets, and thus has given up the future - the prediction dissolves into static, and when it clears an indeterminate time later, </span><a class="twikilink" data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ApocalypseHow" title="/pmwiki/pmwiki.php/Main/ApocalypseHow"><span data-dcnode-id="1345" instrument_node="">the entire world is in ruins</span></a><span data-dcnode-id="1343" instrument_node="">.</span></span></li><li data-dcnode-id="1321"><span data-dcnode-id="1340" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewDestiny" title="/pmwiki/pmwiki.php/Main/ScrewDestiny"><span data-dcnode-id="1339" instrument_node="">Screw Destiny</span></a><span data-dcnode-id="1337" instrument_node="">: Casey pretty much says this word for word in a conversation with Frank about what she would do if he could tell her exactly when she'd die; that yes, she'd want to hear it, but only so she could refuse to believe it. </span><span class="spoiler" data-dcnode-id="1332" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1336" instrument_node="">This causes the probability of an </span><a class="twikilink" data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ApocalypseHow" title="/pmwiki/pmwiki.php/Main/ApocalypseHow"><span data-dcnode-id="1335" instrument_node="">Apocalypse How</span></a><span data-dcnode-id="1333" instrument_node=""> to drop from 100% to 99.9994%</span></span><span data-dcnode-id="1331" instrument_node="">.</span><ul data-dcnode-id="1322"><li data-dcnode-id="1323"><span data-dcnode-id="1330" instrument_node=""> Athena does this later when </span><span class="spoiler" data-dcnode-id="1325" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1329" instrument_node="">she sees a tachyon image of Nix shooting Frank, </span><a class="twikilink" data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakingTheBullet" title="/pmwiki/pmwiki.php/Main/TakingTheBullet"><span data-dcnode-id="1328" instrument_node="">Taking the Bullet</span></a><span data-dcnode-id="1326" instrument_node=""> for him</span></span><span data-dcnode-id="1324" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1301"><span data-dcnode-id="1320" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SelfDestructMechanism" title="/pmwiki/pmwiki.php/Main/SelfDestructMechanism"><span data-dcnode-id="1319" instrument_node="">Self-Destruct Mechanism</span></a><span data-dcnode-id="1317" instrument_node="">: When one of Tomorrowland's androids (sorry, </span><a class="twikilink" data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InsistentTerminology" title="/pmwiki/pmwiki.php/Main/InsistentTerminology"><span data-dcnode-id="1316" instrument_node="">audio-animatronics</span></a><span data-dcnode-id="1314" instrument_node="">) suffers catastrophic damage, </span><a class="twikilink" data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DefeatEqualsExplosion" title="/pmwiki/pmwiki.php/Main/DefeatEqualsExplosion"><span data-dcnode-id="1313" instrument_node="">they will self-destruct shortly after</span></a><span data-dcnode-id="1311" instrument_node="">. However, despite having the technology to </span><a class="twikilink" data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoBodyLeftBehind" title="/pmwiki/pmwiki.php/Main/NoBodyLeftBehind"><span data-dcnode-id="1310" instrument_node="">atomize matter</span></a><span data-dcnode-id="1308" instrument_node="">, the self-destruct is more akin to </span><a class="twikilink" data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StuffBlowingUp" title="/pmwiki/pmwiki.php/Main/StuffBlowingUp"><span data-dcnode-id="1307" instrument_node="">ten pounds of C4 going off</span></a><span data-dcnode-id="1305" instrument_node="">, quite likely with the intention of </span><a class="twikilink" data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakingYouWithMe" title="/pmwiki/pmwiki.php/Main/TakingYouWithMe"><span data-dcnode-id="1304" instrument_node="">taking out whoever destroyed the AA in the first place</span></a><span data-dcnode-id="1302" instrument_node="">.</span></li><li data-dcnode-id="1279"><span data-dcnode-id="1300" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SelfFulfillingProphecy" title="/pmwiki/pmwiki.php/Main/SelfFulfillingProphecy"><span data-dcnode-id="1299" instrument_node="">Self-Fulfilling Prophecy</span></a><span data-dcnode-id="1297" instrument_node="">:</span><ul data-dcnode-id="1280"><li data-dcnode-id="1292"><span data-dcnode-id="1296" instrument_node=""> Discussed when Frank asks Casey a hypothetical question in which, if it were possible for her to know the exact moment of her death, would she want to know. Casey ponders this, thinking out loud about whether accepting your death would be what brings it about in the first place. She comes to the conclusion that the correct response is that she should know, but refuse to believe. This answer is what causes </span><span class="spoiler" data-dcnode-id="1294" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1295" instrument_node="">the 100% probability of doom to go down by 0.0006%</span></span><span data-dcnode-id="1293" instrument_node="">.</span></li><li data-dcnode-id="1281"><span data-dcnode-id="1291" instrument_node=""> Frank later refers to the trope by name upon the discovery that not only is </span><span class="spoiler" data-dcnode-id="1289" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1290" instrument_node="">the Monitor, the machine Frank built, predicting the end of the world</span></span><span data-dcnode-id="1288" instrument_node="">, it is also actually </span><span class="spoiler" data-dcnode-id="1286" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1287" instrument_node="">the thing that is making it happen</span></span><span data-dcnode-id="1285" instrument_node="">. Governor Nix, in an attempt to prevent disaster, </span><span class="spoiler" data-dcnode-id="1283" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1284" instrument_node="">zaps the prediction into people's minds so that they can try to keep it from happening. Instead, it made people accept the idea and even embrace it</span></span><span data-dcnode-id="1282" instrument_node="">, thus ensuring that the disaster does happen, much to his disgust.</span></li></ul></li><li data-dcnode-id="1223"><span data-dcnode-id="1278" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="1277" instrument_node="">Shout-Out</span></a><span data-dcnode-id="1275" instrument_node="">:</span><ul data-dcnode-id="1224"><li data-dcnode-id="1260"><span data-dcnode-id="1274" instrument_node=""> Literally all over the place when Casey visits the Blast From The Past shop, as sci-fi/fantasy collectibles of every type fill the place, and the </span><em data-dcnode-id="1271"><a class="twikilink" data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/StarWars" title="/pmwiki/pmwiki.php/Franchise/StarWars"><span data-dcnode-id="1273" instrument_node="">Star Wars</span></a></em><span data-dcnode-id="1270" instrument_node=""> theme plays when Hugo steps out of his room. Notable are the figures of </span><a class="twikilink" data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheIronGiant" title="/pmwiki/pmwiki.php/WesternAnimation/TheIronGiant"><span data-dcnode-id="1269" instrument_node="">The Iron Giant</span></a><span data-dcnode-id="1267" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheIncredibles" title="/pmwiki/pmwiki.php/WesternAnimation/TheIncredibles"><span data-dcnode-id="1266" instrument_node="">Mr. Incredible</span></a><span data-dcnode-id="1264" instrument_node="">, since their films were directed by </span><a class="twikilink" data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/BradBird" title="/pmwiki/pmwiki.php/Creator/BradBird"><span data-dcnode-id="1263" instrument_node="">Brad Bird</span></a><span data-dcnode-id="1261" instrument_node="">.</span></li><li data-dcnode-id="1254"><span data-dcnode-id="1259" instrument_node=""> The Monitor is essentially a disproportionate homage to the </span><a class="urllink" data-dcnode-id="1256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trylon_and_Perisphere"><span data-dcnode-id="1258" instrument_node="">Trylon and Perisphere</span><img data-dcnode-id="1257" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1255" instrument_node=""> of the 1939 New York World's Fair.</span></li><li data-dcnode-id="1240"><span data-dcnode-id="1253" instrument_node=""> Some of the futuristic images during the end credits animation resemble images from either </span><em data-dcnode-id="1250"><a class="twikilink" data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Metropolis" title="/pmwiki/pmwiki.php/Film/Metropolis"><span data-dcnode-id="1252" instrument_node="">Metropolis</span></a></em><span data-dcnode-id="1249" instrument_node=""> or another film called </span><em data-dcnode-id="1246"><a class="twikilink" data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/JustImagine" title="/pmwiki/pmwiki.php/Film/JustImagine"><span data-dcnode-id="1248" instrument_node="">Just Imagine</span></a></em><span data-dcnode-id="1245" instrument_node="">, or possibly both films. And another image even seems to refer to </span><em data-dcnode-id="1242"><a class="twikilink" data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheJetsons" title="/pmwiki/pmwiki.php/WesternAnimation/TheJetsons"><span data-dcnode-id="1244" instrument_node="">The Jetsons</span></a></em><span data-dcnode-id="1241" instrument_node="">.</span></li><li data-dcnode-id="1231"><span data-dcnode-id="1239" instrument_node=""> Athena adjusting her translator by turning a dial near her neck, during which her voice switches to speaking different languages, including Japanese, harks back to the scene with Dug the dog's translator collar in </span><em data-dcnode-id="1236"><a class="twikilink" data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Up" title="/pmwiki/pmwiki.php/WesternAnimation/Up"><span data-dcnode-id="1238" instrument_node="">Up</span></a></em><span data-dcnode-id="1235" instrument_node="">, from Brad Bird's colleagues back at </span><a class="twikilink" data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/Pixar" title="/pmwiki/pmwiki.php/Creator/Pixar"><span data-dcnode-id="1234" instrument_node="">Pixar</span></a><span data-dcnode-id="1232" instrument_node="">.</span></li><li data-dcnode-id="1225"><span data-dcnode-id="1230" instrument_node=""> A very small, easy-to-miss one is during Athena's playback of her journal recordings in her final moments. The year of Frank's banishment from Tomorrowland was </span><em data-dcnode-id="1227"><a class="twikilink" data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/NineteenEightyFour" title="/pmwiki/pmwiki.php/Literature/NineteenEightyFour"><span data-dcnode-id="1229" instrument_node="">1984</span></a></em><span data-dcnode-id="1226" instrument_node="">, also the signature title among dystopia fiction.</span></li></ul></li><li data-dcnode-id="1206"><span data-dcnode-id="1222" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SillyRabbitIdealismIsForKids" title="/pmwiki/pmwiki.php/Main/SillyRabbitIdealismIsForKids"><span data-dcnode-id="1221" instrument_node="">Silly Rabbit, Idealism Is for Kids!</span></a><span data-dcnode-id="1219" instrument_node="">: Frank's exile from Tomorrowland helped harden him into a pessimistic loner. </span><span class="spoiler" data-dcnode-id="1217" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1218" instrument_node="">He regains a measure of optimism before it's all over.</span></span><ul data-dcnode-id="1207"><li data-dcnode-id="1213"><span data-dcnode-id="1216" instrument_node=""> However, Frank truly lost his idealism when </span><span class="spoiler" data-dcnode-id="1214" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1215" instrument_node="">he found out Athena, his first love, was actually a robot. This was what led to his exile.</span></span></li><li data-dcnode-id="1208"><span data-dcnode-id="1212" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SillyRabbitCynicismIsForLosers" title="/pmwiki/pmwiki.php/Main/SillyRabbitCynicismIsForLosers"><span data-dcnode-id="1211" instrument_node="">Silly Rabbit, Cynicism Is for Losers!</span></a><span data-dcnode-id="1209" instrument_node="">: In contrast to Frank, Casey maintains this attitude.</span></li></ul></li><li data-dcnode-id="1201"><span data-dcnode-id="1205" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SirNotAppearingInThisTrailer" title="/pmwiki/pmwiki.php/Main/SirNotAppearingInThisTrailer"><span data-dcnode-id="1204" instrument_node="">Sir Not-Appearing-in-This-Trailer</span></a><span data-dcnode-id="1202" instrument_node="">: Athena is almost entirely absent from the trailers despite being one of the three main protagonists and appearing in most of the film.</span></li><li data-dcnode-id="1196"><span data-dcnode-id="1200" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlapstickKnowsNoGender" title="/pmwiki/pmwiki.php/Main/SlapstickKnowsNoGender"><span data-dcnode-id="1199" instrument_node="">Slapstick Knows No Gender</span></a><span data-dcnode-id="1197" instrument_node="">: Casey is subject to most of the physical comedy of the movie. Her painful interactions with the real world while inside the pin-induced vision is the prime example.</span></li><li data-dcnode-id="1176"><span data-dcnode-id="1195" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlidingScaleOfFreeWillVsFate" title="/pmwiki/pmwiki.php/Main/SlidingScaleOfFreeWillVsFate"><span data-dcnode-id="1194" instrument_node="">Sliding Scale of Free Will vs. Fate</span></a><span data-dcnode-id="1192" instrument_node="">: Besides the </span><a class="twikilink" data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlidingScaleOfIdealismVersusCynicism" title="/pmwiki/pmwiki.php/Main/SlidingScaleOfIdealismVersusCynicism"><span data-dcnode-id="1191" instrument_node="">idealism debate</span></a><span data-dcnode-id="1189" instrument_node="">, the level of inevitability the future has is a major plot point, with Nix being firmly on the Fate side of the scale, and Casey on the Free Will side. </span><span class="spoiler" data-dcnode-id="1178" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1188" instrument_node="">The events of the film, particularly Casey's ability to make the supposedly inevitable </span><a class="twikilink" data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ApocalypseHow" title="/pmwiki/pmwiki.php/Main/ApocalypseHow"><span data-dcnode-id="1187" instrument_node="">Apocalypse How</span></a><span data-dcnode-id="1185" instrument_node=""> future (which is itself a </span><a class="twikilink" data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SelfFulfillingProphecy" title="/pmwiki/pmwiki.php/Main/SelfFulfillingProphecy"><span data-dcnode-id="1184" instrument_node="">Self-Fulfilling Prophecy</span></a><span data-dcnode-id="1182" instrument_node="">) "flicker" to a better one, and Athena changing a tachyon vision by </span><a class="twikilink" data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakingTheBullet" title="/pmwiki/pmwiki.php/Main/TakingTheBullet"><span data-dcnode-id="1181" instrument_node="">Taking the Bullet</span></a><span data-dcnode-id="1179" instrument_node=""> for Frank, suggest that the Free Will viewpoint is more accurate</span></span><span data-dcnode-id="1177" instrument_node="">.</span></li><li data-dcnode-id="1169"><span data-dcnode-id="1175" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlidingScaleOfIdealismVersusCynicism" title="/pmwiki/pmwiki.php/Main/SlidingScaleOfIdealismVersusCynicism"><span data-dcnode-id="1174" instrument_node="">Sliding Scale of Idealism Versus Cynicism</span></a><span data-dcnode-id="1172" instrument_node="">: Refreshingly for a modern-day summer blockbuster, firmly and unironically on the "idealism" end of the scale. There are a few references to grimmer, darker media (such as a very b-looking movie called 'toxiCosmos 3') being the result of people </span><span class="spoiler" data-dcnode-id="1170" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1171" instrument_node="">affected by the Monitor's announcement of the apocalypse.</span></span></li><li data-dcnode-id="1162"><span data-dcnode-id="1168" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoWhatDoWeDoNow" title="/pmwiki/pmwiki.php/Main/SoWhatDoWeDoNow"><span data-dcnode-id="1167" instrument_node="">So What Do We Do Now?</span></a><span data-dcnode-id="1165" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1163" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1164" instrument_node="">Frank and Casey end up asking this once Nix is dead and his plot to destroy the world is undone. They decide to begin rebuilding Tomorrowland with help from Casey's dad, a NASA engineer, and start sending out new pins to the dreamers of the world, to invite them to Tomorrowland.</span></span></li><li data-dcnode-id="1150"><span data-dcnode-id="1161" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpiritualAntithesis" title="/pmwiki/pmwiki.php/Main/SpiritualAntithesis"><span data-dcnode-id="1160" instrument_node="">Spiritual Antithesis</span></a><span data-dcnode-id="1158" instrument_node="">: The movie is best described as </span><a class="twikilink" data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/Disney" title="/pmwiki/pmwiki.php/Creator/Disney"><span data-dcnode-id="1157" instrument_node="">Disney</span></a><span data-dcnode-id="1155" instrument_node="">'s take on </span><em data-dcnode-id="1152"><a class="twikilink" data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BioShock" title="/pmwiki/pmwiki.php/VideoGame/BioShock"><span data-dcnode-id="1154" instrument_node="">BioShock</span></a></em><span data-dcnode-id="1151" instrument_node="">, only with Rapture working instead of going to hell.</span></li><li data-dcnode-id="1145"><span data-dcnode-id="1149" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SteamPunk" title="/pmwiki/pmwiki.php/Main/SteamPunk"><span data-dcnode-id="1148" instrument_node="">Steampunk</span></a><span data-dcnode-id="1146" instrument_node="">: The Eiffel Tower rocket has lots of brass, gears, and very much fits the aesthetic of Jules Verne and H.G. Wells.</span></li><li data-dcnode-id="1140"><span data-dcnode-id="1144" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperPoweredRobotMeterMaids" title="/pmwiki/pmwiki.php/Main/SuperPoweredRobotMeterMaids"><span data-dcnode-id="1143" instrument_node="">Super-Powered Robot Meter Maids</span></a><span data-dcnode-id="1141" instrument_node="">: Athena was built for finding special people and giving them a special pin. All she needs for that is to be a charming little girl. She's also kitted out with gear and superhuman abilities that rivals or surpasses the Terminator, including having X-Ray vision.</span></li><li data-dcnode-id="1132"><span data-dcnode-id="1139" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SupernaturalProofFather" title="/pmwiki/pmwiki.php/Main/SupernaturalProofFather"><span data-dcnode-id="1138" instrument_node="">Supernatural-Proof Father</span></a><span data-dcnode-id="1136" instrument_node="">: Casey tries to convince her father that the pin is showing her another world but it doesn’t work on him, as it only make him think Casey was fooling around, prompting him to confiscate the pin from her, reprimand her and then seemingly ground her. </span><a class="twikilink" data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Justified" title="/pmwiki/pmwiki.php/Main/Justified"><span data-dcnode-id="1135" instrument_node="">Justified</span></a><span data-dcnode-id="1133" instrument_node=""> because Athena was earlier seen encoding it to Casey’s DNA.</span></li><li data-dcnode-id="1111"><span data-dcnode-id="1131" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeThat" title="/pmwiki/pmwiki.php/Main/TakeThat"><span data-dcnode-id="1130" instrument_node="">Take That!</span></a><span data-dcnode-id="1128" instrument_node="">: Against apocalyptic, "Bad Future" science fiction. The film argues that the genre's popularity is proof of mankind "giving up" and embracing imminent destruction rather than fighting against it.</span><ul data-dcnode-id="1112"><li data-dcnode-id="1113"><span data-dcnode-id="1127" instrument_node=""> Actually, this is simply </span><a class="twikilink" data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterFilibuster" title="/pmwiki/pmwiki.php/Main/CharacterFilibuster"><span data-dcnode-id="1126" instrument_node="">Governor Nix's opinion</span></a><span data-dcnode-id="1124" instrument_node="">. Brad Bird has </span><a class="urllink" data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hollywoodreporter.com/heat-vision/brad-bird-talks-tomorrowland-reception-829416"><span data-dcnode-id="1123" instrument_node="">gone on record</span><img data-dcnode-id="1122" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1120" instrument_node=""> that the film is not against dystopian fiction, but against the </span><a class="twikilink" data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SillyRabbitCynicismIsForLosers" title="/pmwiki/pmwiki.php/Main/SillyRabbitCynicismIsForLosers"><span data-dcnode-id="1119" instrument_node="">cynicism</span></a><span data-dcnode-id="1117" instrument_node=""> </span><em data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">behind</span></em><span data-dcnode-id="1114" instrument_node=""> such fiction.</span></li></ul></li><li data-dcnode-id="1103"><span data-dcnode-id="1110" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakingTheBullet" title="/pmwiki/pmwiki.php/Main/TakingTheBullet"><span data-dcnode-id="1109" instrument_node="">Taking the Bullet</span></a><span data-dcnode-id="1107" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1105" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1106" instrument_node="">Athena sees a tachyon image of Nix shooting Frank, and dives in front of the blast instead</span></span><span data-dcnode-id="1104" instrument_node="">.</span></li><li data-dcnode-id="1098"><span data-dcnode
