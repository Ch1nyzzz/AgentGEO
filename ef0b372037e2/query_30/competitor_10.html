</span><div class="article-content retro-folders" data-dcnode-id="888" id="main-article"><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2557"></p><div class="quoteright" data-dcnode-id="2554" style="width:298px;"><div class="lazy_load_img_box" data-dcnode-id="2555" style="padding-top:141.28%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/b967a372d3d91cc50152d0ce48f059f7.jpg" border="0" class="embeddedimage" data-dcnode-id="2556" height="421" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/b967a372d3d91cc50152d0ce48f059f7.jpg&amp;raw" width="298"></div></div><div class="acaptionright" data-dcnode-id="2552" style="width:298px;"><span data-dcnode-id="2553" instrument_node="">Remember Tomorrow?</span></div><em data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Tomorrowland</span></em><span data-dcnode-id="2549" instrument_node=""> is a 2015 film produced by </span><a class="twikilink" data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/Disney" title="/pmwiki/pmwiki.php/Creator/Disney"><span data-dcnode-id="2548" instrument_node="">Walt Disney Pictures</span></a><span data-dcnode-id="2546" instrument_node=""> and directed by </span><a class="twikilink" data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/BradBird" title="/pmwiki/pmwiki.php/Creator/BradBird"><span data-dcnode-id="2545" instrument_node="">Brad Bird</span></a><span data-dcnode-id="2543" instrument_node=""> and produced by </span><a class="twikilink" data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DamonLindelof" title="/pmwiki/pmwiki.php/Creator/DamonLindelof"><span data-dcnode-id="2542" instrument_node="">Damon Lindelof</span></a><span data-dcnode-id="2540" instrument_node="">. The film stars </span><a class="twikilink" data-dcnode-id="2538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/GeorgeClooney" title="/pmwiki/pmwiki.php/Creator/GeorgeClooney"><span data-dcnode-id="2539" instrument_node="">George Clooney</span></a><span data-dcnode-id="2537" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/BrittRobertson" title="/pmwiki/pmwiki.php/Creator/BrittRobertson"><span data-dcnode-id="2536" instrument_node="">Britt Robertson</span></a><span data-dcnode-id="2534" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/HughLaurie" title="/pmwiki/pmwiki.php/Creator/HughLaurie"><span data-dcnode-id="2533" instrument_node="">Hugh Laurie</span></a><span data-dcnode-id="2531" instrument_node="">, and is inspired by the Tomorrowland area found at the </span><a class="twikilink" data-dcnode-id="2529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Ride/DisneyThemeParks" title="/pmwiki/pmwiki.php/Ride/DisneyThemeParks"><span data-dcnode-id="2530" instrument_node="">Disney Theme Parks</span></a><span data-dcnode-id="2528" instrument_node="">. The first teaser trailer was released on October 9, 2014.</span><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2522"><span class="ad-caption" data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2523" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="2504"><span data-dcnode-id="2521" instrument_node="">In 1889 at the Exposition Universelle in Paris, a group of visionaries put aside their differences to discuss how to make the future happen: </span><a class="twikilink" data-dcnode-id="2519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JulesVerne" title="/pmwiki/pmwiki.php/Creator/JulesVerne"><span data-dcnode-id="2520" instrument_node="">Jules Verne</span></a><span data-dcnode-id="2518" instrument_node="">, Gustave Eiffel, </span><a class="twikilink" data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/NikolaTesla" title="/pmwiki/pmwiki.php/UsefulNotes/NikolaTesla"><span data-dcnode-id="2517" instrument_node="">Nikola Tesla</span></a><span data-dcnode-id="2515" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/ThomasEdison" title="/pmwiki/pmwiki.php/UsefulNotes/ThomasEdison"><span data-dcnode-id="2514" instrument_node="">Thomas Edison</span></a><span data-dcnode-id="2512" instrument_node="">. They established a secret society, known as Plus Ultra, to figure out how and where to change the world. Eventually, Tesla's experiments uncovered an alternate dimension, which would become their living laboratory: A realm that would become known as Tomorrowland. The Tomorrowland we know in the parks was a cover story/orientation space created by later member </span><a class="twikilink" data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/WaltDisney" title="/pmwiki/pmwiki.php/Creator/WaltDisney"><span data-dcnode-id="2511" instrument_node="">Walt Disney</span></a><span data-dcnode-id="2509" instrument_node="">, who was also giving lucky Plus Ultra inductees the opportunity to visit the real thing via a portal hidden beneath the 1964 New York World's Fair installation of </span><em data-dcnode-id="2506"><a class="twikilink" data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Ride/ItsASmallWorld" title="/pmwiki/pmwiki.php/Ride/ItsASmallWorld"><span data-dcnode-id="2508" instrument_node="">"it's a small world"</span></a></em><span data-dcnode-id="2505" instrument_node="">.</span></p><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">In the present day, a young aspiring astrophysics student and daughter of a NASA scientist, Casey Newton (Britt Robinson), stumbles upon the secret when she is given a mysterious pin by a youth named Athena (Raffey Cassidy). She leads her to a jaded ex-boy genius named Frank Walker (George Clooney), who first journeyed to Tomorrowland at the World's Fair. Evading agents seeking to maintain a post-60s masquerade of Plus Ultra's activities, they set out to Tomorrowland to find just what's been keeping the world away from the future.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2496"><span class="ad-caption" data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2497" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="2491"><span data-dcnode-id="2495" instrument_node="">A prequel novel, </span><em data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Before Tomorrowland</span></em><span data-dcnode-id="2492" instrument_node=""> was released in April 2015. It tells the story of a mother and son who stumble into a conflict between Plus Ultra, Nazi scientists and an embittered cyborg around the 1939 New York World's Fair.</span></p><p data-dcnode-id="2479"><span data-dcnode-id="2490" instrument_node="">(Note: </span><em data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Tomorrowland</span></em><span data-dcnode-id="2487" instrument_node=""> is not connected with a </span><a class="twikilink" data-dcnode-id="2485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DisneyChannel" title="/pmwiki/pmwiki.php/Creator/DisneyChannel"><span data-dcnode-id="2486" instrument_node="">Disney Junior</span></a><span data-dcnode-id="2484" instrument_node=""> animated series, </span><em data-dcnode-id="2481"><a class="twikilink" data-dcnode-id="2482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/MilesFromTomorrowland" title="/pmwiki/pmwiki.php/WesternAnimation/MilesFromTomorrowland"><span data-dcnode-id="2483" instrument_node="">Miles from Tomorrowland</span></a></em><span data-dcnode-id="2480" instrument_node="">.)</span></p><hr data-dcnode-id="2478"><h2 data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">The film provides examples of:</span></h2><p data-dcnode-id="2475"></p><ul data-dcnode-id="950"><li data-dcnode-id="2468"><span data-dcnode-id="2474" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActionGirl" title="/pmwiki/pmwiki.php/Main/ActionGirl"><span data-dcnode-id="2473" instrument_node="">Action Girl</span></a><span data-dcnode-id="2471" instrument_node="">: Athena, who rescues Casey </span><span class="spoiler" data-dcnode-id="2469" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2470" instrument_node="">from the Sci-Fi memorabilia store with gadgets, a blaster, and her fighting skills. However, she is revealed to be an Audio-Animatronic®, aka a robot.</span></span></li><li data-dcnode-id="2433"><span data-dcnode-id="2467" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnAesop" title="/pmwiki/pmwiki.php/Main/AnAesop"><span data-dcnode-id="2466" instrument_node="">An Aesop</span></a><span data-dcnode-id="2464" instrument_node="">: "Feed the right wolf." In other words, look for solutions and refuse to give up rather than surrender to despair and hopelessness.</span><ul data-dcnode-id="2434"><li data-dcnode-id="2460"><span data-dcnode-id="2463" instrument_node=""> "Never give up." As a child, Frank refuses to give up on his jet pack when his father tells him he'll never fix it. He also refuses to give up after Nix rebuffs him. His pamphlet for The World's Fair has "I'll never give up!" scrawled on it. </span><span class="spoiler" data-dcnode-id="2461" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2462" instrument_node="">In the end, Frank sends out a new wave of recruiter animatronics with pins, telling them to "Find the ones who haven't given up. They're the future."</span></span></li><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2454"><span class="ad-caption" data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2455" id="proper-ad-tvtropes_mobile_ad_3"></div></div><li data-dcnode-id="2449"><span data-dcnode-id="2453" instrument_node=""> Casey retells her father's parable about the "two wolves" to encourage him not to lose hope. An </span><a class="twikilink" data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EstablishingCharacterMoment" title="/pmwiki/pmwiki.php/Main/EstablishingCharacterMoment"><span data-dcnode-id="2452" instrument_node="">Establishing Character Moment</span></a><span data-dcnode-id="2450" instrument_node=""> montage has her attending classes in which teachers list numerous problems in the world while she struggles to get them to acknowledge her question, "What's the solution?"</span></li><li data-dcnode-id="2435"><span data-dcnode-id="2448" instrument_node=""> "Don't be so obsessed with your destination you forget to watch where you're going." This is figurative with Casey's </span><a class="twikilink" data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WindmillCrusader" title="/pmwiki/pmwiki.php/Main/WindmillCrusader"><span data-dcnode-id="2447" instrument_node="">attempts to keep NASA's last shuttle gantry from being dismantled</span></a><span data-dcnode-id="2445" instrument_node=""> - which get her arrested. It becomes very literal when she finds the Tomorrowland pin, is dazzled with wonder and starts blindly wandering the virtual landscape - </span><a class="twikilink" data-dcnode-id="2443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WatchOutForThatTree" title="/pmwiki/pmwiki.php/Main/WatchOutForThatTree"><span data-dcnode-id="2444" instrument_node="">into walls</span></a><span data-dcnode-id="2442" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StaircaseTumble" title="/pmwiki/pmwiki.php/Main/StaircaseTumble"><span data-dcnode-id="2441" instrument_node="">down staircases</span></a><span data-dcnode-id="2439" instrument_node=""> and into lakes </span><span class="spoiler" data-dcnode-id="2437" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2438" instrument_node="">until it runs out of power and she has to find her way to Tomorrowland for real</span></span><span data-dcnode-id="2436" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2413"><span data-dcnode-id="2432" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAestheticsOfTechnology" title="/pmwiki/pmwiki.php/Main/TheAestheticsOfTechnology"><span data-dcnode-id="2431" instrument_node="">The Aesthetics of Technology</span></a><span data-dcnode-id="2429" instrument_node="">: Best demonstrated by the methods used to reach Tomorrowland. </span><a class="twikilink" data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/NikolaTesla" title="/pmwiki/pmwiki.php/UsefulNotes/NikolaTesla"><span data-dcnode-id="2428" instrument_node="">Nikola Tesla</span></a><span data-dcnode-id="2426" instrument_node="">'s designs are </span><a class="twikilink" data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Steampunk" title="/pmwiki/pmwiki.php/Main/Steampunk"><span data-dcnode-id="2425" instrument_node="">Steampunk</span></a><span data-dcnode-id="2423" instrument_node="">; a wood, brass and steel spaceship out of </span><a class="twikilink" data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JulesVerne" title="/pmwiki/pmwiki.php/Creator/JulesVerne"><span data-dcnode-id="2422" instrument_node="">Jules Verne</span></a><span data-dcnode-id="2420" instrument_node="">. The equipment Frank finds under the 1964 World's Fair is </span><a class="twikilink" data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RaygunGothic" title="/pmwiki/pmwiki.php/Main/RaygunGothic"><span data-dcnode-id="2419" instrument_node="">Raygun Gothic</span></a><span data-dcnode-id="2417" instrument_node="">. The modern "bridgeway" is basically </span><a class="twikilink" data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EverythingIsAnIpodInTheFuture" title="/pmwiki/pmwiki.php/Main/EverythingIsAnIpodInTheFuture"><span data-dcnode-id="2416" instrument_node="">a giant IPod</span></a><span data-dcnode-id="2414" instrument_node="">.</span></li><li data-dcnode-id="2395"><span data-dcnode-id="2412" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllThereInTheManual" title="/pmwiki/pmwiki.php/Main/AllThereInTheManual"><span data-dcnode-id="2411" instrument_node="">All There in the Manual</span></a><span data-dcnode-id="2409" instrument_node="">: Much of the film's backstory is explored in </span><em data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">The Optimist</span></em><span data-dcnode-id="2406" instrument_node=""> ARG and the novel "Before Tomorrowland".</span><ul data-dcnode-id="2396"><li data-dcnode-id="2397"><span data-dcnode-id="2405" instrument_node=""> A </span><a class="urllink" data-dcnode-id="2402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DcHE0UjBSbfI%26t%3D387s"><span data-dcnode-id="2404" instrument_node="">deleted scene</span><img data-dcnode-id="2403" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2401" instrument_node=""> explains that Nix was able to turn Frank's invention into the best clean energy source ever discovered, and it is now Tomorrowland's primary source of power. </span><span class="spoiler" data-dcnode-id="2399" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2400" instrument_node="">This neatly explains why he doesn't want to turn it off</span></span><span data-dcnode-id="2398" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2387"><span data-dcnode-id="2394" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlternateRealityGame" title="/pmwiki/pmwiki.php/Main/AlternateRealityGame"><span data-dcnode-id="2393" instrument_node="">Alternate Reality Game</span></a><span data-dcnode-id="2391" instrument_node="">: </span><em data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">The Optimist</span></em><span data-dcnode-id="2388" instrument_node="">, which established the film's universe back in 2013.</span></li><li data-dcnode-id="2382"><span data-dcnode-id="2386" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlternateUniverse" title="/pmwiki/pmwiki.php/Main/AlternateUniverse"><span data-dcnode-id="2385" instrument_node="">Alternate Universe</span></a><span data-dcnode-id="2383" instrument_node="">: Tomorrowland is this, with accessibility through dimensional portals of various sophistications. The "T lapel pins" are more of a VR thing.</span></li><li data-dcnode-id="2377"><span data-dcnode-id="2381" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiHero" title="/pmwiki/pmwiki.php/Main/AntiHero"><span data-dcnode-id="2380" instrument_node="">Anti-Hero</span></a><span data-dcnode-id="2378" instrument_node="">: Frank is a cynical old Jedi master-type character who's seen the pins for what they really are and is quite rough around the edges.</span></li><li data-dcnode-id="2367"><span data-dcnode-id="2376" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ApocalypseCult" title="/pmwiki/pmwiki.php/Main/ApocalypseCult"><span data-dcnode-id="2375" instrument_node="">Apocalypse Cult</span></a><span data-dcnode-id="2373" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2369" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2372" instrument_node="">How Governor Nix sees the world he was born to. He warned everyone the end was coming and they turned it into </span><em data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">entertainment</span></em></span><span data-dcnode-id="2368" instrument_node="">.</span></li><li data-dcnode-id="2359"><span data-dcnode-id="2366" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArmorPiercingQuestion" title="/pmwiki/pmwiki.php/Main/ArmorPiercingQuestion"><span data-dcnode-id="2365" instrument_node="">Armor-Piercing Question</span></a><span data-dcnode-id="2363" instrument_node="">: When one of her teachers recites one of the calamities facing the world, Casey asks him </span><a class="twikilink" data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactWords" title="/pmwiki/pmwiki.php/Main/ExactWords"><span data-dcnode-id="2362" instrument_node="">"Can we fix it?".</span></a><span data-dcnode-id="2360" instrument_node=""> He is completely speechless after this.</span></li><li data-dcnode-id="2354"><span data-dcnode-id="2358" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialOutdoorsDisplay" title="/pmwiki/pmwiki.php/Main/ArtificialOutdoorsDisplay"><span data-dcnode-id="2357" instrument_node="">Artificial Outdoors Display</span></a><span data-dcnode-id="2355" instrument_node="">: The Monitor can show anywhere on Earth in a full 3-D display.</span></li><li data-dcnode-id="2325"><span data-dcnode-id="2353" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseBiology" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseBiology"><span data-dcnode-id="2352" instrument_node="">Artistic License – Biology</span></a><span data-dcnode-id="2350" instrument_node="">:</span><ul data-dcnode-id="2326"><li data-dcnode-id="2345"><span data-dcnode-id="2349" instrument_node=""> You cannot extract DNA from hair. Hair is all protein. </span><a class="twikilink" data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustifiedTrope" title="/pmwiki/pmwiki.php/Main/JustifiedTrope"><span data-dcnode-id="2348" instrument_node="">Justified</span></a><span data-dcnode-id="2346" instrument_node="">, though; if there's a skin cell on the hair, it can provide DNA, and the scanner in question is from Tomorrowland (which is centuries more advanced than the rest of the world).</span></li><li data-dcnode-id="2327"><span data-dcnode-id="2344" instrument_node=""> Losing "90% of your blood sugar in 1/100th of a second" </span><em data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">is</span></em><span data-dcnode-id="2341" instrument_node=""> survivable. The </span><a class="urllink" data-dcnode-id="2338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.guinnessworldrecords.com/world-records/highest-blood-sugar-level/"><span data-dcnode-id="2340" instrument_node="">highest ever recorded</span><img data-dcnode-id="2339" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2337" instrument_node=""> in someone who </span><em data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">survived</span></em><span data-dcnode-id="2334" instrument_node=""> was 2,656 mg/dl, and people are known to still be conscious at 27 mg/dl - let's just </span><a class="twikilink" data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HandWave" title="/pmwiki/pmwiki.php/Main/HandWave"><span data-dcnode-id="2333" instrument_node="">Hand Wave</span></a><span data-dcnode-id="2331" instrument_node=""> that powder Frank and Casey ate beforehand was some kind of ultra-tech "hyper sugar" meant specifically for this purpose. The catch is that climbing back up again is a living hell; Frank warns "You're gonna wish you were dead" but people usually have to lie very still for some time while their body assimilates the cup of honey or whatever they gulped down to save their lives - in many cases people have had to be </span><em data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">hospitalized</span></em><span data-dcnode-id="2328" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2320"><span data-dcnode-id="2324" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AwesomeButImpractical" title="/pmwiki/pmwiki.php/Main/AwesomeButImpractical"><span data-dcnode-id="2323" instrument_node="">Awesome, but Impractical</span></a><span data-dcnode-id="2321" instrument_node="">: Nix's view of Frank's jetpack.</span></li><li data-dcnode-id="2312"><span data-dcnode-id="2319" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BaitAndSwitch" title="/pmwiki/pmwiki.php/Main/BaitAndSwitch"><span data-dcnode-id="2318" instrument_node="">Bait-and-Switch</span></a><span data-dcnode-id="2316" instrument_node="">: The rocket launched from the Eiffel Tower makes the audience think the Tomorrowland is located on a distant planet. </span><span class="spoiler" data-dcnode-id="2314" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2315" instrument_node=""> In reality they only make it to high orbit because that iteration of the technology is so primitive it needs a “running start” to make the jump to a parallel universe</span></span><span data-dcnode-id="2313" instrument_node="">.</span></li><li data-dcnode-id="2283"><span data-dcnode-id="2311" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeethovenWasAnAlienSpy" title="/pmwiki/pmwiki.php/Main/BeethovenWasAnAlienSpy"><span data-dcnode-id="2310" instrument_node="">Beethoven Was an Alien Spy</span></a><span data-dcnode-id="2308" instrument_node="">: As revealed by </span><em data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">The Optimist</span></em><span data-dcnode-id="2305" instrument_node=""> and additional media, Tomorrowland was founded by a secret society called Plus Ultra formed by </span><a class="twikilink" data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/NikolaTesla" title="/pmwiki/pmwiki.php/UsefulNotes/NikolaTesla"><span data-dcnode-id="2304" instrument_node="">Nikola Tesla</span></a><span data-dcnode-id="2302" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/ThomasEdison" title="/pmwiki/pmwiki.php/UsefulNotes/ThomasEdison"><span data-dcnode-id="2301" instrument_node="">Thomas Edison</span></a><span data-dcnode-id="2299" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JulesVerne" title="/pmwiki/pmwiki.php/Creator/JulesVerne"><span data-dcnode-id="2298" instrument_node="">Jules Verne</span></a><span data-dcnode-id="2296" instrument_node=""> and Gustave Eiffel at the Exposition Universelle in 1889. Over the years, Plus Ultra has also counted </span><a class="twikilink" data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/AmeliaEarhart" title="/pmwiki/pmwiki.php/UsefulNotes/AmeliaEarhart"><span data-dcnode-id="2295" instrument_node="">Amelia Earhart</span></a><span data-dcnode-id="2293" instrument_node=""> (who survived the crash), </span><a class="twikilink" data-dcnode-id="2291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/MarkTwain" title="/pmwiki/pmwiki.php/Creator/MarkTwain"><span data-dcnode-id="2292" instrument_node="">Mark Twain</span></a><span data-dcnode-id="2290" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RayBradbury" title="/pmwiki/pmwiki.php/Creator/RayBradbury"><span data-dcnode-id="2289" instrument_node="">Ray Bradbury</span></a><span data-dcnode-id="2287" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="2285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/WaltDisney" title="/pmwiki/pmwiki.php/Creator/WaltDisney"><span data-dcnode-id="2286" instrument_node="">Walt Disney</span></a><span data-dcnode-id="2284" instrument_node=""> himself amongst their membership, with Disney's parks being Walt's way of preparing people for what Tomorrowland had to offer.</span></li><li data-dcnode-id="2272"><span data-dcnode-id="2282" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BenevolentAI" title="/pmwiki/pmwiki.php/Main/BenevolentAI"><span data-dcnode-id="2281" instrument_node="">Benevolent A.I.</span></a><span data-dcnode-id="2279" instrument_node="">: Athena, who wants to find Dreamers and fix the world. </span><span class="spoiler" data-dcnode-id="2274" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2278" instrument_node="">She even performs a </span><a class="twikilink" data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSuicide" title="/pmwiki/pmwiki.php/Main/HeroicSuicide"><span data-dcnode-id="2277" instrument_node="">Heroic Suicide</span></a><span data-dcnode-id="2275" instrument_node=""> at the end of film to save Frank and destroy the Monitor</span></span><span data-dcnode-id="2273" instrument_node="">.</span></li><li data-dcnode-id="2251"><span data-dcnode-id="2271" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackComedy" title="/pmwiki/pmwiki.php/Main/BlackComedy"><span data-dcnode-id="2270" instrument_node="">Black Comedy</span></a><span data-dcnode-id="2268" instrument_node="">:</span><ul data-dcnode-id="2252"><li data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node=""> In the "Blast from the Past" shop, Hugo shoots the blaster into the ceiling to show Casey they're serious. A dead bird then falls out of the sky.</span></li><li data-dcnode-id="2258"><span data-dcnode-id="2265" instrument_node=""> Athena (the little girl </span><span class="spoiler" data-dcnode-id="2263" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2264" instrument_node="">robot</span></span><span data-dcnode-id="2262" instrument_node="">) </span><span class="spoiler" data-dcnode-id="2260" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2261" instrument_node="">getting run over by a pickup truck</span></span><span data-dcnode-id="2259" instrument_node="">. She walks it off.</span></li><li data-dcnode-id="2253"><span data-dcnode-id="2257" instrument_node=""> Athena </span><span class="spoiler" data-dcnode-id="2255" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2256" instrument_node="">right before she has Frank drop her self-destructing body in the Monitor to destroy it</span></span><span data-dcnode-id="2254" instrument_node="">, she tells Frank why he could never make her laugh: "You're not funny."</span></li></ul></li><li data-dcnode-id="2243"><span data-dcnode-id="2250" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrickJoke" title="/pmwiki/pmwiki.php/Main/BrickJoke"><span data-dcnode-id="2249" instrument_node="">Brick Joke</span></a><span data-dcnode-id="2247" instrument_node="">: Frank uses a jetpack in the beginning and at the end of the film, and both times he performs an epic </span><a class="twikilink" data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Slapstick" title="/pmwiki/pmwiki.php/Main/Slapstick"><span data-dcnode-id="2246" instrument_node="">Slapstick</span></a><span data-dcnode-id="2244" instrument_node=""> crash landing.</span></li><li data-dcnode-id="2234"><span data-dcnode-id="2242" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterBlog" title="/pmwiki/pmwiki.php/Main/CharacterBlog"><span data-dcnode-id="2241" instrument_node="">Character Blog</span></a><span data-dcnode-id="2239" instrument_node="">: The Blast from the Past store </span><a class="urllink" data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/BlastFromPast"><span data-dcnode-id="2238" instrument_node="">has a Twitter account</span><img data-dcnode-id="2237" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2235" instrument_node="">, part of the film's lead-up viral campaign.</span></li><li data-dcnode-id="2226"><span data-dcnode-id="2233" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterFilibuster" title="/pmwiki/pmwiki.php/Main/CharacterFilibuster"><span data-dcnode-id="2232" instrument_node="">Character Filibuster</span></a><span data-dcnode-id="2230" instrument_node="">: Governor Nix's speech </span><span class="spoiler" data-dcnode-id="2228" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2229" instrument_node="">about society's obsession with dystopia/post-apocalyptic fiction generating complacency with the Earth's degrading state</span></span><span data-dcnode-id="2227" instrument_node="">.</span></li><li data-dcnode-id="2211"><span data-dcnode-id="2225" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChekhovsGun" title="/pmwiki/pmwiki.php/Main/ChekhovsGun"><span data-dcnode-id="2224" instrument_node="">Chekhov's Gun</span></a><span data-dcnode-id="2222" instrument_node="">:</span><ul data-dcnode-id="2212"><li data-dcnode-id="2217"><span data-dcnode-id="2221" instrument_node=""> The one 1-kiloton explosive that Frank gives to Athena as an "insurance policy". </span><span class="spoiler" data-dcnode-id="2219" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2220" instrument_node="">Although its intended use fails, it still brings about the villain's downfall by destroying the teleport gate and pinning him under the remains</span></span><span data-dcnode-id="2218" instrument_node="">.</span></li><li data-dcnode-id="2213"><span data-dcnode-id="2216" instrument_node=""> The tachyon-induced glimpses of the near future. </span><span class="spoiler" data-dcnode-id="2214" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2215" instrument_node=""> One glimpse shows Casey how to activate the explosive, while another one warns Athena that Nix will try to shoot Frank, giving her enough time to take the blast herself.</span></span></li></ul></li><li data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChildProdigy" title="/pmwiki/pmwiki.php/Main/ChildProdigy"><span data-dcnode-id="2209" instrument_node="">Child Prodigy</span></a><span data-dcnode-id="2207" instrument_node="">: Frank Walker used to be this before he went to Tomorrowland.</span></li><li data-dcnode-id="2199"><span data-dcnode-id="2205" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheChooserOfTheOne" title="/pmwiki/pmwiki.php/Main/TheChooserOfTheOne"><span data-dcnode-id="2204" instrument_node="">The Chooser of The One</span></a><span data-dcnode-id="2202" instrument_node="">: Athena senses in Casey the qualities she's looking for and gives Casey the means to see Tomorrowland. </span><span class="spoiler" data-dcnode-id="2200" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2201" instrument_node=""> This is actually her job, Frank was her first personal candidate; later after her passing, we see that Frank and Casey have set up a whole slew of new young recruiter units out to do exactly as she did.</span></span></li><li data-dcnode-id="2191"><span data-dcnode-id="2198" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClingyMacGuffin" title="/pmwiki/pmwiki.php/Main/ClingyMacGuffin"><span data-dcnode-id="2197" instrument_node="">Clingy MacGuffin</span></a><span data-dcnode-id="2195" instrument_node="">: The pin only works if the user is wearing it or holding it. </span><span class="spoiler" data-dcnode-id="2193" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2194" instrument_node=""> it can also be encoded to the DNA of a specific person so only they can use it</span></span><span data-dcnode-id="2192" instrument_node="">.</span></li><li data-dcnode-id="2182"><span data-dcnode-id="2190" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrapsackWorld" title="/pmwiki/pmwiki.php/Main/CrapsackWorld"><span data-dcnode-id="2189" instrument_node="">Crapsack World</span></a><span data-dcnode-id="2187" instrument_node="">: Our mundane world is this, with societal unrest, climate change, threats of nuclear armageddon, etcetera and this complacency with humanity's self-destruction is associated with the widespread popularity of apocalyptic/dystopian science fiction. Additionally, the continued decline of NASA is a major part of Casey's story, with Neil Degrasse Tyson's "</span><a class="urllink" data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thirdmonk.net/knowledge/neil-degrasse-tyson-we-stopped-dreaming-imbalance-nasa-military-budget.html"><span data-dcnode-id="2186" instrument_node="">We Stopped Dreaming</span><img data-dcnode-id="2185" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2183" instrument_node="">" speech being one of the major points of inspiration for the film's writers.</span></li><li data-dcnode-id="2174"><span data-dcnode-id="2181" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrazyPrepared" title="/pmwiki/pmwiki.php/Main/CrazyPrepared"><span data-dcnode-id="2180" instrument_node="">Crazy-Prepared</span></a><span data-dcnode-id="2178" instrument_node="">: Frank's house has secret escape routes, traps including magnets and laser cutters for robots and an escape pod for insurance. Lampshaded by Casey once it's all over: "You were </span><em data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">actually prepared for that?!?</span></em><span data-dcnode-id="2175" instrument_node="">"</span></li><li data-dcnode-id="2162"><span data-dcnode-id="2173" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreditsGag" title="/pmwiki/pmwiki.php/Main/CreditsGag"><span data-dcnode-id="2172" instrument_node="">Credits Gag</span></a><span data-dcnode-id="2170" instrument_node="">: The filming locations credit includes "Tomorrowland".</span><ul data-dcnode-id="2163"><li data-dcnode-id="2164"><span data-dcnode-id="2169" instrument_node=""> Which is true in a manner of speaking, scenes were shot on location at the </span><em data-dcnode-id="2166"><a class="twikilink" data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Ride/CarouselOfProgress" title="/pmwiki/pmwiki.php/Ride/CarouselOfProgress"><span data-dcnode-id="2168" instrument_node="">Carousel of Progress</span></a></em><span data-dcnode-id="2165" instrument_node=""> attraction at Walt Disney World's Tomorrowland, but these ended up getting deleted.</span></li></ul></li><li data-dcnode-id="2139"><span data-dcnode-id="2161" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurseCutShort" title="/pmwiki/pmwiki.php/Main/CurseCutShort"><span data-dcnode-id="2160" instrument_node="">Curse Cut Short</span></a><span data-dcnode-id="2158" instrument_node="">:</span><ul data-dcnode-id="2155"><li data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node=""> Casey when Athena suddenly shuts down mid-conversation.</span></li></ul><div class="indent" data-dcnode-id="2143"><span data-dcnode-id="2154" instrument_node=""> </span><strong data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Casey</span></strong><span data-dcnode-id="2151" instrument_node="">: </span><em data-dcnode-id="2148"><strong data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">SON OF A-</span></strong></em><span data-dcnode-id="2147" instrument_node=""> &lt;</span><em data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">engine revs</span></em><span data-dcnode-id="2144" instrument_node="">&gt;</span></div><ul data-dcnode-id="2140"><li data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node=""> Similarly, Frank mutters a "Son of a-" when he sees the flaming combine Casey has set rolling towards his house.</span></li></ul></li><li data-dcnode-id="2110"><span data-dcnode-id="2138" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DespairEventHorizon" title="/pmwiki/pmwiki.php/Main/DespairEventHorizon"><span data-dcnode-id="2137" instrument_node="">Despair Event Horizon</span></a><span data-dcnode-id="2135" instrument_node="">:</span><ul data-dcnode-id="2111"><li data-dcnode-id="2119"><span data-dcnode-id="2134" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2132" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2133" instrument_node="">Governor Nix</span></span><span data-dcnode-id="2131" instrument_node=""> crossed it when his warning to the people of Earth was completely ignored, triggering his </span><a class="twikilink" data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FaceHeelTurn" title="/pmwiki/pmwiki.php/Main/FaceHeelTurn"><span data-dcnode-id="2130" instrument_node="">Face–Heel Turn</span></a><span data-dcnode-id="2128" instrument_node="">.</span><ul data-dcnode-id="2120"><li data-dcnode-id="2121"><span data-dcnode-id="2127" instrument_node=""> More than that, </span><span class="spoiler" data-dcnode-id="2122" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2126" instrument_node="">it was triggered by </span><em data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">humanity in general</span></em><span data-dcnode-id="2123" instrument_node=""> crossing it and simply deciding to stop trying.</span></span></li></ul></li><li data-dcnode-id="2112"><span data-dcnode-id="2118" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2113" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2117" instrument_node=""> Casey comes close to one when she sees what Tomorrowland has become, until her </span><a class="twikilink" data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EurekaMoment" title="/pmwiki/pmwiki.php/Main/EurekaMoment"><span data-dcnode-id="2116" instrument_node="">"Eureka!" Moment</span></a><span data-dcnode-id="2114" instrument_node=""> pulls her out of it.</span></span></li></ul></li><li data-dcnode-id="2099"><span data-dcnode-id="2109" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DidNotDoTheBloodyResearch" title="/pmwiki/pmwiki.php/Main/DidNotDoTheBloodyResearch"><span data-dcnode-id="2108" instrument_node="">Did Not Do the Bloody Research</span></a><span data-dcnode-id="2106" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2104" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2105" instrument_node="">Governor Nix’s</span></span><span data-dcnode-id="2103" instrument_node=""> very last words are </span><span class="spoiler" data-dcnode-id="2101" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2102" instrument_node="">"Oh, bollocks"</span></span><span data-dcnode-id="2100" instrument_node="">, this was enough to get the film a 12A rating in the U.K. despite the film being rated P.G. in America.</span></li><li data-dcnode-id="2082"><span data-dcnode-id="2098" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DistinctionWithoutADifference" title="/pmwiki/pmwiki.php/Main/DistinctionWithoutADifference"><span data-dcnode-id="2097" instrument_node="">Distinction Without a Difference</span></a><span data-dcnode-id="2095" instrument_node="">:</span><div class="indent" data-dcnode-id="2083"><span data-dcnode-id="2094" instrument_node=""> </span><strong data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Casey:</span></strong><span data-dcnode-id="2091" instrument_node=""> Is that like a portal to Earth? </span><br data-dcnode-id="2090"><strong data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Governor Nix:</span></strong><span data-dcnode-id="2087" instrument_node=""> No, it's a </span><em data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">bridgeway</span></em><span data-dcnode-id="2084" instrument_node=""> to Earth.</span></div></li><li data-dcnode-id="2074"><span data-dcnode-id="2081" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoomsdayClock" title="/pmwiki/pmwiki.php/Main/DoomsdayClock"><span data-dcnode-id="2080" instrument_node="">Doomsday Clock</span></a><span data-dcnode-id="2078" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2076" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2077" instrument_node=""> Frank has one at home. It predicts that our planet has 56 days left to survive due to nuclear war, ecological meltdown and natural disaster. There's also a probability counter, showing the chance of that future coming to be an 100%, until Casey comes along and it drops just a bit</span></span><span data-dcnode-id="2075" instrument_node="">.</span></li><li data-dcnode-id="2060"><span data-dcnode-id="2073" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrivingQuestion" title="/pmwiki/pmwiki.php/Main/DrivingQuestion"><span data-dcnode-id="2072" instrument_node="">Driving Question</span></a><span data-dcnode-id="2070" instrument_node="">: From George Clooney's character, inventor Frank Walker:</span><div class="indent" data-dcnode-id="2061"><strong data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Frank:</span></strong><span data-dcnode-id="2067" instrument_node=""> What if there was a place... a secret place... where </span><em data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">nothing</span></em><span data-dcnode-id="2064" instrument_node=""> was impossible? A miraculous place where you could actually change the world? </span><a class="twikilink" data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallToAdventure" title="/pmwiki/pmwiki.php/Main/CallToAdventure"><span data-dcnode-id="2063" instrument_node="">You wanna go?</span></a></div></li><li data-dcnode-id="2050"><span data-dcnode-id="2059" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EurekaMoment" title="/pmwiki/pmwiki.php/Main/EurekaMoment"><span data-dcnode-id="2058" instrument_node="">"Eureka!" Moment</span></a><span data-dcnode-id="2056" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2051" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2055" instrument_node=""> Casey has one that shakes her out of her </span><a class="twikilink" data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DespairEventHorizon" title="/pmwiki/pmwiki.php/Main/DespairEventHorizon"><span data-dcnode-id="2054" instrument_node="">Despair Event Horizon</span></a><span data-dcnode-id="2052" instrument_node="">, when she realizes that the Monitor was broadcasting negative images in people's minds, to hasten the End of the World.</span></span></li><li data-dcnode-id="2042"><span data-dcnode-id="2049" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvenEvilHasLovedOnes" title="/pmwiki/pmwiki.php/Main/EvenEvilHasLovedOnes"><span data-dcnode-id="2048" instrument_node="">Even Evil Has Loved Ones</span></a><span data-dcnode-id="2046" instrument_node="">: Governor Nix is fond of Athena, despite the fact she's working against him. </span><span class="spoiler" data-dcnode-id="2044" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2045" instrument_node="">He is even horrified at shooting her by accident due to her taking the raygun shot meant for Frank</span></span><span data-dcnode-id="2043" instrument_node="">.</span></li><li data-dcnode-id="2035"><span data-dcnode-id="2041" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilBrit" title="/pmwiki/pmwiki.php/Main/EvilBrit"><span data-dcnode-id="2040" instrument_node="">Evil Brit</span></a><span data-dcnode-id="2038" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2036" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2037" instrument_node=""> Governor Nix. He's played by Hugh Laurie, what did you expect?</span></span></li><li data-dcnode-id="2027"><span data-dcnode-id="2034" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FallenStatesOfAmerica" title="/pmwiki/pmwiki.php/Main/FallenStatesOfAmerica"><span data-dcnode-id="2033" instrument_node="">Fallen States of America</span></a><span data-dcnode-id="2031" instrument_node="">: As implied with the </span><a class="twikilink" data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrapsackWorld" title="/pmwiki/pmwiki.php/Main/CrapsackWorld"><span data-dcnode-id="2030" instrument_node="">Crapsack World</span></a><span data-dcnode-id="2028" instrument_node="">, the United States is headed down this road.</span></li><li data-dcnode-id="2022"><span data-dcnode-id="2026" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyForbiddingFather" title="/pmwiki/pmwiki.php/Main/FantasyForbiddingFather"><span data-dcnode-id="2025" instrument_node="">Fantasy-Forbidding Father</span></a><span data-dcnode-id="2023" instrument_node="">: Frank's father, who says his attempt to build a jetpack is a waste of time.</span></li><li data-dcnode-id="2015"><span data-dcnode-id="2021" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FirstLove" title="/pmwiki/pmwiki.php/Main/FirstLove"><span data-dcnode-id="2020" instrument_node="">First Love</span></a><span data-dcnode-id="2018" instrument_node="">: </span><span class="spoiler" data-dcnode-id="2016" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2017" instrument_node=""> Athena is this to Frank. Which is why he's so bitter when they meet again, he never got over her even after his exile.</span></span></li><li data-dcnode-id="2003"><span data-dcnode-id="2014" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FunnyBackgroundEvent" title="/pmwiki/pmwiki.php/Main/FunnyBackgroundEvent"><span data-dcnode-id="2013" instrument_node="">Funny Background Event</span></a><span data-dcnode-id="2011" instrument_node="">: During Wallace's livestream for </span><em data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">The Optimist</span></em><span data-dcnode-id="2008" instrument_node=""> ARG, there is a </span><a class="urllink" data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D5LJrilA1G4A"><span data-dcnode-id="2007" instrument_node="">Tomorrow Land DVD</span><img data-dcnode-id="2006" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2004" instrument_node=""> sitting on his armoire.</span></li><li data-dcnode-id="1998"><span data-dcnode-id="2002" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FunWithAcronyms" title="/pmwiki/pmwiki.php/Main/FunWithAcronyms"><span data-dcnode-id="2001" instrument_node="">Fun with Acronyms</span></a><span data-dcnode-id="1999" instrument_node="">: In the expanded materials, the word PIN (in this case Casey's Pin) stands for Proximity Inversion Node.</span></li><li data-dcnode-id="1993"><span data-dcnode-id="1997" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GadgeteerGenius" title="/pmwiki/pmwiki.php/Main/GadgeteerGenius"><span data-dcnode-id="1996" instrument_node="">Gadgeteer Genius</span></a><span data-dcnode-id="1994" instrument_node="">: Frank Walker, the citizens of Tommorowland, and members of Plus Ultra are this.</span></li><li data-dcnode-id="1974"><span data-dcnode-id="1992" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GlamourFailure" title="/pmwiki/pmwiki.php/Main/GlamourFailure"><span data-dcnode-id="1991" instrument_node="">Glamour Failure</span></a><span data-dcnode-id="1989" instrument_node="">: Two notable examples...</span><ul data-dcnode-id="1975"><li data-dcnode-id="1984"><span data-dcnode-id="1988" instrument_node=""> This is how Casey realizes that </span><span class="spoiler" data-dcnode-id="1986" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1987" instrument_node="">Frank’s guard dog is a hologram. It doesn’t leave any footprints</span></span><span data-dcnode-id="1985" instrument_node="">.</span></li><li data-dcnode-id="1976"><span data-dcnode-id="1983" instrument_node=""> The main defect with "atomic T" pins. When touched they show a person </span><a class="twikilink" data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Arcadia" title="/pmwiki/pmwiki.php/Main/Arcadia"><span data-dcnode-id="1982" instrument_node="">an idyllic field of wheat</span></a><span data-dcnode-id="1980" instrument_node="">, with </span><a class="twikilink" data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RaygunGothic" title="/pmwiki/pmwiki.php/Main/RaygunGothic"><span data-dcnode-id="1979" instrument_node="">some sort of super-science city</span></a><span data-dcnode-id="1977" instrument_node=""> in the background that they can explore. However, they don’t transport the person anywhere, so when they walk they still interact and bump into the physical objects around them on Earth.</span></li></ul></li><li data-dcnode-id="1961"><span data-dcnode-id="1973" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GratuitousLatin" title="/pmwiki/pmwiki.php/Main/GratuitousLatin"><span data-dcnode-id="1972" instrument_node="">Gratuitous Latin</span></a><span data-dcnode-id="1970" instrument_node="">: Though "Plus Ultra" appears a kludge of </span><a class="twikilink" data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TotallyRadical" title="/pmwiki/pmwiki.php/Main/TotallyRadical"><span data-dcnode-id="1969" instrument_node="">Totally Radical</span></a><span data-dcnode-id="1967" instrument_node=""> words, in Latin it means "Further Beyond."</span><span class="notelabel" data-dcnode-id="1964" onclick="togglenote('note00sax');" style="cursor: pointer;"><sup data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1962" id="note00sax" isnote="true" onclick="togglenote('note00sax');" style="display: none; cursor: pointer;"><span data-dcnode-id="1963" instrument_node="">It's a reversal of the Latin phrase "Non Plus Ultra" (nothing further beyond), and represents the society's continuous search for new knowledge. Plus Ultra is also the motto of Spain.</span></span></li><li data-dcnode-id="1950"><span data-dcnode-id="1960" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrewBeyondTheirProgramming" title="/pmwiki/pmwiki.php/Main/GrewBeyondTheirProgramming"><span data-dcnode-id="1959" instrument_node="">Grew Beyond Their Programming</span></a><span data-dcnode-id="1957" instrument_node="">: Athena, who, </span><span class="spoiler" data-dcnode-id="1952" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1956" instrument_node="">in addition to her relationship with Frank, is the one who comes up with the idea to </span><a class="twikilink" data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="1955" instrument_node="">use her self-destruction to destroy the Monitor</span></a><span data-dcnode-id="1953" instrument_node="">, despite an earlier comment about how she doesn't have ideas</span></span><span data-dcnode-id="1951" instrument_node="">.</span></li><li data-dcnode-id="1945"><span data-dcnode-id="1949" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HandWave" title="/pmwiki/pmwiki.php/Main/HandWave"><span data-dcnode-id="1948" instrument_node="">Hand Wave</span></a><span data-dcnode-id="1946" instrument_node="">: David Nix's lack of aging between Frank's backstory and the present timeline is explained away as a shake he drinks every morning.</span></li><li data-dcnode-id="1938"><span data-dcnode-id="1944" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="1943" instrument_node="">Heroic Sacrifice</span></a><span data-dcnode-id="1941" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1939" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1940" instrument_node=""> Athena is damaged beyond repair when she takes an energy blast to the chest intended for Frank.</span></span></li><li data-dcnode-id="1931"><span data-dcnode-id="1937" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSuicide" title="/pmwiki/pmwiki.php/Main/HeroicSuicide"><span data-dcnode-id="1936" instrument_node="">Heroic Suicide</span></a><span data-dcnode-id="1934" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1932" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1933" instrument_node=""> Athena self-destructs to destroy the Monitor.</span></span></li><li data-dcnode-id="1909"><span data-dcnode-id="1930" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HiddenElfVillage" title="/pmwiki/pmwiki.php/Main/HiddenElfVillage"><span data-dcnode-id="1929" instrument_node="">Hidden Elf Village</span></a><span data-dcnode-id="1927" instrument_node="">: Tomorrowland. Notably, they didn't intend to </span><em data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">stay</span></em><span data-dcnode-id="1924" instrument_node=""> secret, they just decided it wasn't a good idea to share everything they created with </span><span class="spoiler" data-dcnode-id="1915" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1923" instrument_node="">a world that they warned of a coming catastrophe, but not only refused to change but </span><em data-dcnode-id="1920"><a class="twikilink" data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosyCatastrophe" title="/pmwiki/pmwiki.php/Main/CosyCatastrophe"><span data-dcnode-id="1922" instrument_node="">idealized</span></a></em><span data-dcnode-id="1919" instrument_node=""> it. However, Tomorrowland was hardly in an ideal state when Casey, Frank and Athena finally reached it - it was at its height when it was still accepting immigration from Earth. Tomorrowland's isolation was destroying it, and just </span><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">planning</span></em><span data-dcnode-id="1916" instrument_node=""> to bring in new recruits rejuvenated it.</span></span><span data-dcnode-id="1914" instrument_node="">.</span><div class="indent" data-dcnode-id="1910"><strong data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Hugo Gernsback</span></strong><span data-dcnode-id="1911" instrument_node="">: Have you ever wondered what would happen… if all the geniuses, the artists, the scientists, the… smartest, most creative people in the world… decided to actually change it? But where? Where could they even do such a thing? They’d need a place, free from politics, bureaucracy, distractions… Greed… A secret place. Where they could build whatever they were crazy enough to imagine.</span></div></li><li data-dcnode-id="1904"><span data-dcnode-id="1908" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HistoricalInJoke" title="/pmwiki/pmwiki.php/Main/HistoricalInJoke"><span data-dcnode-id="1907" instrument_node="">Historical In-Joke</span></a><span data-dcnode-id="1905" instrument_node="">: According to Frank, Tesla discovered the alternate dimension, and then Edison tried to take credit for it because the two hated each other.</span></li><li data-dcnode-id="1897"><span data-dcnode-id="1903" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HowWeGotHere" title="/pmwiki/pmwiki.php/Main/HowWeGotHere"><span data-dcnode-id="1902" instrument_node="">How We Got Here</span></a><span data-dcnode-id="1900" instrument_node="">: The movie begins with Frank telling his story, with Casey interjecting running commentary, in the present day, before cutting to the main action. </span><span class="spoiler" data-dcnode-id="1898" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1899" instrument_node=""> The movie ends where they leave off, revealing that Frank and Casey are telling their stories to a new line of androids, who will take on Athena's role to distribute newly-minted pins to the dreamers of the world, to invite them to Tomorrowland.</span></span></li><li data-dcnode-id="1880"><span data-dcnode-id="1896" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HurricaneOfPuns" title="/pmwiki/pmwiki.php/Main/HurricaneOfPuns"><span data-dcnode-id="1895" instrument_node="">Hurricane of Puns</span></a><span data-dcnode-id="1893" instrument_node="">:</span><ul data-dcnode-id="1881"><li data-dcnode-id="1882"><span data-dcnode-id="1892" instrument_node=""> Brad Bird tweeted a picture of the soundtrack album with the message "Another film, another great score by </span><a class="twikilink" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/MichaelGiacchino" title="/pmwiki/pmwiki.php/Creator/MichaelGiacchino"><span data-dcnode-id="1891" instrument_node="">@m_giacchino</span></a><span data-dcnode-id="1889" instrument_node="">, and most importantly, another bunch of crazy-ass cue titles—" which this time around include "You've Piqued My Pin-Trist," "Boat Wait, There's More!," "Home Wheat Home," "Pin-Ultimate Experience," "People Mover And Shaker," "What An Eiffel!" and "Sphere And Loathing." Giacchino stated that his music editor came up with most of the track titles, but Giacchino did admit he named the final cue on the album... "End Credits." The soundtrack also continues Giacchino's </span><a class="twikilink" data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RunningGag" title="/pmwiki/pmwiki.php/Main/RunningGag"><span data-dcnode-id="1888" instrument_node="">Running Gag</span></a><span data-dcnode-id="1886" instrument_node=""> with "World's Worst </span><span class="spoiler" data-dcnode-id="1884" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1885" instrument_node="">Shop Keepers"</span></span><span data-dcnode-id="1883" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1866"><span data-dcnode-id="1879" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hypocrite" title="/pmwiki/pmwiki.php/Main/Hypocrite"><span data-dcnode-id="1878" instrument_node="">Hypocrite</span></a><span data-dcnode-id="1876" instrument_node="">: David Nix, who criticizes Earth for giving up and embracing the Earth's destruction, when he too has given up and embraced the Earth's destruction, to the point that he purposefully tries to sabotage the heroes' attempts to save it. However, it's heavily implied by his </span><a class="twikilink" data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="1875" instrument_node="">"The Reason You Suck" Speech</span></a><span data-dcnode-id="1873" instrument_node=""> that it was </span><em data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">humanity</span></em><span data-dcnode-id="1870" instrument_node=""> apathy that lead him to his </span><a class="twikilink" data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DespairEventHorizon" title="/pmwiki/pmwiki.php/Main/DespairEventHorizon"><span data-dcnode-id="1869" instrument_node="">Despair Event Horizon</span></a><span data-dcnode-id="1867" instrument_node="">.</span></li><li data-dcnode-id="1851"><span data-dcnode-id="1865" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InsistentTerminology" title="/pmwiki/pmwiki.php/Main/InsistentTerminology"><span data-dcnode-id="1864" instrument_node="">Insistent Terminology</span></a><span data-dcnode-id="1862" instrument_node="">: The human robots being referred to as "AAs" or </span><a class="urllink" data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Audio-Animatronics"><span data-dcnode-id="1861" instrument_node="">"Audio-Animatronics"</span><img data-dcnode-id="1860" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1858" instrument_node="">, a </span><a class="twikilink" data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="1857" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="1855" instrument_node=""> as that's the term </span><a class="twikilink" data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/WaltDisney" title="/pmwiki/pmwiki.php/Creator/WaltDisney"><span data-dcnode-id="1854" instrument_node="">Walt Disney</span></a><span data-dcnode-id="1852" instrument_node=""> coined for all his company's robotic figures.</span></li><li data-dcnode-id="1843"><span data-dcnode-id="1850" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IWantMyJetpack" title="/pmwiki/pmwiki.php/Main/IWantMyJetpack"><span data-dcnode-id="1849" instrument_node="">I Want My Jetpack</span></a><span data-dcnode-id="1847" instrument_node="">: That, and a whole lot more, are available in Tomorrowland.</span><ul data-dcnode-id="1844"><li data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node=""> When Nix asked ten-year-old Frank why he built a jetpack, Frank answered "I got tired of waiting for someone else to do it."</span></li></ul></li><li data-dcnode-id="1835"><span data-dcnode-id="1842" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Jerkass" title="/pmwiki/pmwiki.php/Main/Jerkass"><span data-dcnode-id="1841" instrument_node="">Jerkass</span></a><span data-dcnode-id="1839" instrument_node="">: Governor Nix’s </span><a class="twikilink" data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EstablishingCharacterMoment" title="/pmwiki/pmwiki.php/Main/EstablishingCharacterMoment"><span data-dcnode-id="1838" instrument_node="">Establishing Character Moment</span></a><span data-dcnode-id="1836" instrument_node=""> consists of him being an asshole to a 10 year old kid for no good reason.</span></li><li data-dcnode-id="1827"><span data-dcnode-id="1834" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkassHasAPoint" title="/pmwiki/pmwiki.php/Main/JerkassHasAPoint"><span data-dcnode-id="1833" instrument_node="">Jerkass Has a Point</span></a><span data-dcnode-id="1831" instrument_node="">: Kind of. Governor Nix casually dismisses Casey as a "flicker" and in many ways, he's absolutely right. Her </span><a class="twikilink" data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WideEyedIdealism" title="/pmwiki/pmwiki.php/Main/WideEyedIdealism"><span data-dcnode-id="1830" instrument_node="">wide-eyed idealism</span></a><span data-dcnode-id="1828" instrument_node=""> only has the smallest of impacts on the probability of the world being destroyed, reducing it by less than a thousandth of a percent. However, this was the entire point of her character: She's just one little candle flickering in a sea of darkness, but as the old proverb goes, it's better to light one candle than to curse the darkness.</span></li><li data-dcnode-id="1822"><span data-dcnode-id="1826" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkWithAHeartOfGold" title="/pmwiki/pmwiki.php/Main/JerkWithAHeartOfGold"><span data-dcnode-id="1825" instrument_node="">Jerk with a Heart of Gold</span></a><span data-dcnode-id="1823" instrument_node="">: Frank is this when he first meets Casey, flattening her with the house defense system. He does eventually get his idealism back.</span></li><li data-dcnode-id="1817"><span data-dcnode-id="1821" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustAMachine" title="/pmwiki/pmwiki.php/Main/JustAMachine"><span data-dcnode-id="1820" instrument_node="">Just a Machine</span></a><span data-dcnode-id="1818" instrument_node="">: Frank originally says this about Athena, but later amends it.</span></li><li data-dcnode-id="1812"><span data-dcnode-id="1816" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustGotOutOfJail" title="/pmwiki/pmwiki.php/Main/JustGotOutOfJail"><span data-dcnode-id="1815" instrument_node="">Just Got Out of Jail</span></a><span data-dcnode-id="1813" instrument_node="">: The trailer starts with Casey picking up her possessions from a police station property room. Say,
